  "h2_112":"Surface synthesis",
  "p_113":"55 Cnc f is a sub-Saturn-mass gas/ice giant with no surface; this section covers the cloud-top &quot;surface&quot;. At T_eq ≈ 271 K it is <b>genuinely temperate</b> — the coldest of the four inner giants and the only one in the regime where ammonia clouds (Jupiter&#x27;s signature white clouds) can condense at the visible deck. Its eccentric orbit (e ≈ 0.063) carries the equilibrium temperature from ~263 K at apastron to ~280 K at periastron — straddling the water freezing point and spending most of the orbit inside the von Braun 2011 habitable zone (0.67–1.32 AU).",
  "p_114":"The cloud-top palette is therefore pale and cream-white (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>) — ammonia-cloud Jovian colors, distinctly cooler and whiter than the warm tans of b and c. Where ammonium-hydrosulfide (NH₄SH) clouds form they add tan/orange tints in the belts, as on Jupiter. The cool limb takes a pale blue Rayleigh tinge (<span class=\"hex-chip\" style=\"background:#dde4ec\"></span><code>#dde4ec</code>). Under the 5196 K yellow-orange host light the planet reads as a cool, cream-and-tan banded giant — the most &quot;Jupiter-like&quot; looking world of the inner system.",
  "p_115":"Morphology: Jupiter/Saturn-analog zonal banding with white ammonia zones and tan NH₄SH belts. As a temperate giant its banding contrast and storm activity (great-spot-like vortices, optional) are within the Solar-System-giant range.",
  "h2_116":"Atmosphere synthesis",
  "p_117":"55 Cnc f has a deep H₂/He envelope. At ~270 K the visible condensates are ammonia ice (NH₃) and, deeper, ammonium hydrosulfide (NH₄SH) and water — the same cloud chemistry that colors Jupiter and Saturn. This makes f the one inner 55 Cnc giant with a genuinely Solar-System-like cloud palette.",
  "li_118":"<b>Pressure / structure.</b> A continuous H₂/He atmosphere with an NH₃-ice cloud deck at the top, NH₄SH below, and deeper water clouds; no discrete surface.",
  "li_119":"<b>Composition.</b> H₂/He primary with NH₃, NH₄SH, and H₂O condensates; the super-metal-rich host suggests enhanced heavy-element abundance.",
  "li_120":"<b>Sky appearance.</b> From the upper atmosphere the sky would be a pale cream-blue, with the host star a modest 0.63° disk — only slightly larger than the Sun seen from Earth, the most &quot;Sun-like sky&quot; of the system&#x27;s giants.",
  "p_121":"<b>Habitable-zone note.</b> von Braun 2011 highlighted f as the HZ planet, but f is itself a gas giant — it cannot host surface liquid water. Its HZ residence matters only for hypothetical large moons, which could in principle be temperate. No such moon is observed; none is synthesized here (no fabricated bodies). The HZ residence is recorded as context, not as a habitability claim for f itself.",
  "h2_122":"Rotation &amp; spin synthesis",
  "p_123":"At 0.802 AU on a 260.6-day orbit, 55 Cnc f is far outside any tidal-locking regime and rotates freely. The orbit is mildly eccentric (e ≈ 0.063; Moutou 2025). No rotation period has been measured.",
  "p_124":"<b>KSP implementation note.</b> The cfg adopts a fast Jovian rotation (~10 h order, Jupiter/Saturn-analog) for visual banding. This is a tie-break; flag as unconstrained.",
  "p_125":"<b>Mild seasons.</b> The e ≈ 0.063 eccentricity gives a periastron-to- apastron insolation swing (T_eq ~280 K → ~263 K), a real ~6% temperature variation over the 260-day orbit, but with negligible obliquity there are no axial seasons.",
  "h2_126":"Visual styling",
  "li_127":"<b>Global appearance.</b> A cool, cream-and-tan banded giant at 0.802 AU — the most Jupiter-like-looking world of the inner system, grazing the habitable zone on its eccentric orbit.",
  "li_128":"<b>Cloud decks.</b> Jupiter-analog zonal banding: white ammonia zones (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>) and tan NH₄SH belts, with optional great-spot vortices.",
  "li_129":"<b>Limb / haze.</b> A pale cool-blue Rayleigh-tinged limb (<span class=\"hex-chip\" style=\"background:#dde4ec\"></span><code>#dde4ec</code>), cooler-toned than the warm inner giants.",
  "li_130":"<b>Star in sky.</b> 55 Cnc A subtends only 0.63° — barely larger than the Sun seen from Earth — the most Sun-like sky of any 55 Cnc giant.",
  "li_131":"<b>Sister planets in sky.</b> Planet c (inward at 0.247 AU) appears as a warm point; the cold giant d (outward at 5.6 AU) is a faint distant point. The distant M-dwarf companion 55 Cnc B (~1065 AU) is a faint orange-red second sun far beyond d.",
  "li_132":"<b>Seasonal brightness flicker (optional).</b> The ~6% insolation swing over the eccentric orbit could subtly modulate the cloud brightness on the 260-day period — a faithful but minor touch.",
  "li_133":"<b>No rings (default).</b> f is not the system&#x27;s ring-candidate body; no ring is rendered (the cold giant d carries the optional artistic ring).",
  "h2_134":"Bibliography",
  "h3_135":"Read (visual-informative, drove decisions above)",
  "li_136":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). Latest RV refit: planet f P = 260.58 d, a = 0.802 AU, e = 0.063, M sin i = 48.5 ± 2.8 M⊕; confirms f sits in the habitable zone between the runaway and maximum-greenhouse limits (Hill 2022) and that a temperate Earth-mass planet at 1–2 AU would be dynamically stable. <b>Phase 2 recommended orbit + mass.</b> Postdates the model cutoff — value-checked against the cached text.",
  "li_137":"<b>von Braun K. et al. 2011</b> — <i>The 55 Cancri System… Habitable Zone Planet…</i>, ApJ 740, 49 (<code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>). Host L = 0.582 L☉ → the T_eq derivation; identifies f as spending most of its eccentric orbit in the HZ (0.67–1.32 AU). <b>The HZ-residence anchor.</b>",
  "h3_138":"Read (context / methodology, not decision-driving)",
  "li_139":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>. Refit: f at a = 0.7708 AU, e = 0.08, M sin i = 47.8 M⊕ — documented-alternative orbit/mass (superseded by Moutou 2025).",
  "li_140":"<b>Fischer D. A. et al. 2008</b> — <code>2008ApJ...675..790F</code>. Discovery paper for f (0.15 M_Jup at 260 d); historical context.",
  "h3_141":"Read (instrument-only, not visual-informative)",
  "li_142":"<b>Hill M. L. et al. 2022</b> — places f within the runaway/maximum- greenhouse HZ limits (via Moutou 2025); HZ-geometry context.",
  "h3_143":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_144":"Dynamical-stability proceedings (Satyal &amp; Cuntz 2019 on the temperate-planet stability between 1–2 AU) and early RV-refinement papers. Full filtered bib in <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_145":"Open items for follow-up",
  "li_146":"<b>Radius.</b> No measured radius (non-transiting); ~0.7 R_Jup is estimate-only. An inclination/true-mass constraint would allow a radius refinement.",
  "li_147":"<b>Hypothetical moon.</b> f&#x27;s HZ residence is of interest for a large moon, but none is observed; per policy no body is fabricated. If a moon is ever detected, a temperate-moon Phase 3 follow-up would be warranted.",
  "li_148":"<b>Cloud chemistry.</b> The NH₃/NH₄SH cloud assignment is a temperature- based inference; the super-metal-rich host could shift the cloud colors. A future emission/transmission constraint would refine the palette.",
  "h2_149":"Related",

  "p_1":"55 Cnc f 는 이 계의 온대 거대 행성입니다: 55 Cnc A 주위를 260.6일, 이심(e ≈ 0.063) 궤도로 0.802 AU 에서 도는 ~0.15 M_Jup(M sin i ≈ 48.5 M⊕, Moutou 2025)의 가스/얼음 거대 행성입니다. Fischer 외 2008 이 발견했으며, von Braun 외 2011 이 이 계의 <b>거주 가능 영역 행성</b>으로 지목한 행성입니다. 그 논문은 f 가 &quot;이심 궤도 지속 시간의 대부분을 주성 거주 가능 영역 (0.67–1.32 AU)에서 보내며, 적당한 온실 가열이 있으면 액체 물을 품을 수도 있다&quot;고 했습니다. 통과하지 않으므로 측정된 반지름이 없습니다. 준-토성-질량 거대 행성이라면 ~0.7 R_Jup 근처의 반지름이 표준 추정입니다. 모성 광도 L = 0.582 L☉ 로 평형 온도는 T_eq(A=0) ≈ 271 K 가 유도됩니다—진정으로 온대로, 이심 궤도 전체에서 원점 ~263 K 와 근점 ~280 K 를 오갑니다.",
  "p_2":"<b>NearStars 시나리오 선택: 거주 가능 영역을 스치는 온대 가스/얼음 거대 행성(~0.15 M_Jup, ~270 K)으로, K0 모성의 노랑-주황 빛 아래 물-얼음 구름 덱 (이 계 안쪽 거대 행성 중 가장 차가운 띠 응결물) 가능성을 가진 차가운 띠 거대 행성으로 렌더링.</b> 질량은 Msini(RV), 반지름은 추정-전용 준-토성 값이며 cfg 가 둘 다 플래그합니다. f 자체가 거대 가스 행성이라, 그 HZ 거주는 가상의 위성에 대해서만 흥미롭습니다.",

  "td_111":"von Braun 2011 항성 Teff",
  "h2_112":"Surface synthesis",
  "p_113":"55 Cnc f 는 표면 없는 준-토성-질량 가스/얼음 거대 행성이라, 이 섹션은 구름 꼭대기 &quot;표면&quot;을 다룹니다. T_eq ≈ 271 K 에서 그것은 <b>진정으로 온대</b>—네 안쪽 거대 행성 중 가장 차갑고, 암모니아 구름(목성의 시그니처 흰 구름)이 가시 덱에서 응결할 수 있는 유일한 영역에 있습니다. 이심 궤도(e ≈ 0.063)는 평형 온도를 원점 ~263 K 에서 근점 ~280 K 로 운반하며—물의 어는점을 걸치고 궤도 대부분을 von Braun 2011 거주 가능 영역(0.67–1.32 AU) 안에서 보냅니다.",
  "p_114":"따라서 구름 꼭대기 팔레트는 옅고 크림-흰색(<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>)입니다—암모니아-구름 목성 색으로, b 와 c 의 따뜻한 황갈보다 뚜렷이 차갑고 흽니다. 암모늄 하이드로설파이드(NH₄SH) 구름이 형성되는 곳에서는 목성처럼 벨트에 황갈/주황 색조를 더합니다. 차가운 림은 옅은 청색 Rayleigh 색조(<span class=\"hex-chip\" style=\"background:#dde4ec\"></span><code>#dde4ec</code>)를 띱니다. 5196 K 노랑-주황 모성 빛 아래 행성은 차갑고 크림-황갈 띠 거대 행성으로 읽힙니다—안쪽 계에서 가장 &quot;목성다워&quot; 보이는 세계입니다.",
  "p_115":"형태: 흰 암모니아 존과 황갈 NH₄SH 벨트를 가진 목성/토성-유사체 띠 모양. 온대 거대 행성으로서 그 띠 대비와 폭풍 활동(대적점 같은 와류, 선택)은 태양계-거대-행성 범위 안에 있습니다.",
  "h2_116":"Atmosphere synthesis",
  "p_117":"55 Cnc f 는 심층 H₂/He 외피를 가집니다. ~270 K 에서 가시 응결물은 암모니아 얼음(NH₃)과, 더 깊이 암모늄 하이드로설파이드(NH₄SH) 및 물입니다— 목성과 토성에 색을 입히는 바로 그 구름 화학입니다. 이것이 f 를 진정으로 태양계-닮은 구름 팔레트를 가진 유일한 안쪽 55 Cnc 거대 행성으로 만듭니다.",
  "li_118":"<b>압력 / 구조.</b> 꼭대기에 NH₃-얼음 구름 덱, 그 아래 NH₄SH, 더 깊이 물 구름을 가진 연속 H₂/He 대기. 별개 표면 없음.",
  "li_119":"<b>조성.</b> H₂/He 주체에 NH₃, NH₄SH, H₂O 응결물. 초금속 풍부 모성은 향상된 중원소 풍부도를 시사.",
  "li_120":"<b>하늘 외관.</b> 상층 대기에서 하늘은 옅은 크림-청색으로, 모성은 0.63° 의 소박한 디스크—지구에서 본 태양보다 약간 클 뿐인, 이 계 거대 행성 중 가장 &quot;태양 같은 하늘&quot;입니다.",
  "p_121":"<b>거주 가능 영역 노트.</b> von Braun 2011 은 f 를 HZ 행성으로 지목했으나, f 자체가 거대 가스 행성입니다—표면 액체 물을 가질 수 없습니다. 그 HZ 거주는 가상의 큰 위성에 대해서만 의미가 있으며, 이 위성은 원리상 온대일 수 있습니다. 그런 위성은 관측되지 않았고, 여기서 합성하지 않습니다(지어낸 천체 없음). HZ 거주는 f 자체의 거주성 주장이 아니라 맥락으로 기록합니다.",
  "h2_122":"Rotation &amp; spin synthesis",
  "p_123":"0.802 AU 에서 260.6일 궤도로, 55 Cnc f 는 어떤 조석 고정 영역에서도 한참 벗어나 자유롭게 자전합니다. 궤도는 약하게 이심(e ≈ 0.063. Moutou 2025) 입니다. 자전 주기는 측정되지 않았습니다.",
  "p_124":"<b>KSP 구현 노트.</b> cfg 는 시각적 띠 모양을 위해 빠른 목성형 자전(~10시간 자릿수, 목성/토성 유사체)을 채택합니다. 이는 tie-break 이며 미제약으로 플래그합니다.",
  "p_125":"<b>약한 계절.</b> e ≈ 0.063 이심은 근점-원점 일사 변동(T_eq ~280 K → ~263 K) 을 주는데, 260일 궤도에 걸친 실제 ~6% 온도 변동이지만, 무시할 만한 자전축 경사라 축 계절은 없습니다.",
  "h2_126":"Visual styling",
  "li_127":"<b>전체 외관.</b> 0.802 AU 의 차갑고 크림-황갈 띠 거대 행성—안쪽 계에서 가장 목성다워 보이는 세계로, 이심 궤도에서 거주 가능 영역을 스칩니다.",
  "li_128":"<b>구름 덱.</b> 목성-유사체 띠 모양: 흰 암모니아 존(<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>)과 황갈 NH₄SH 벨트, 선택적 대적점 와류.",
  "li_129":"<b>림 / 헤이즈.</b> 옅은 차가운-청색 Rayleigh 색조 림(<span class=\"hex-chip\" style=\"background:#dde4ec\"></span><code>#dde4ec</code>), 따뜻한 안쪽 거대 행성보다 차가운 색조.",
  "li_130":"<b>하늘의 별.</b> 55 Cnc A 는 0.63° 만 차지—지구에서 본 태양보다 겨우 큼— 어느 55 Cnc 거대 행성보다 가장 태양 같은 하늘.",
  "li_131":"<b>하늘의 자매 행성.</b> 행성 c(0.247 AU 안쪽)는 따뜻한 점으로, 차가운 거대 행성 d(5.6 AU 바깥)는 희미한 먼 점으로 나타남. 먼 M형 왜성 동반성 55 Cnc B(~1065 AU)는 d 너머 희미한 주황-적색 두 번째 태양.",
  "li_132":"<b>계절 밝기 깜박임(선택).</b> 이심 궤도에 걸친 ~6% 일사 변동이 260일 주기로 구름 밝기를 미묘하게 변조할 수 있음—고증적이지만 사소한 터치.",
  "li_133":"<b>고리 없음(기본).</b> f 는 계의 고리-후보 천체가 아님. 고리는 렌더링 안 함(차가운 거대 행성 d 가 선택적 예술 고리를 가짐).",
  "h2_134":"Bibliography",
  "h3_135":"Read (visual-informative, drove decisions above)",
  "li_136":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). 최신 RV 재피팅: 행성 f P = 260.58 d, a = 0.802 AU, e = 0.063, M sin i = 48.5 ± 2.8 M⊕. f 가 폭주-온실과 최대-온실 한계 사이의 거주 가능 영역(Hill 2022)에 자리하고, 1–2 AU 의 온대 지구-질량 행성이 동역학적으로 안정함을 확인. <b>Phase 2 추천 궤도 + 질량.</b> 모델 컷오프 이후 출판 — 캐시 텍스트에 대조 확인.",
  "li_137":"<b>von Braun K. et al. 2011</b> — <i>The 55 Cancri System… Habitable Zone Planet…</i>, ApJ 740, 49 (<code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>). 모성 L = 0.582 L☉ → T_eq 유도. f 가 이심 궤도 대부분을 HZ(0.67–1.32 AU)에서 보냄을 식별. <b>HZ-거주 정박.</b>",
  "h3_138":"Read (context / methodology, not decision-driving)",
  "li_139":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>. 재피팅: f 가 a = 0.7708 AU, e = 0.08, M sin i = 47.8 M⊕ — 기록된-대안 궤도/질량(Moutou 2025 로 대체).",
  "li_140":"<b>Fischer D. A. et al. 2008</b> — <code>2008ApJ...675..790F</code>. f 의 발견 논문(260 d 의 0.15 M_Jup). 역사적 맥락.",
  "h3_141":"Read (instrument-only, not visual-informative)",
  "li_142":"<b>Hill M. L. et al. 2022</b> — f 를 폭주/최대-온실 HZ 한계 안에 자리매김(Moutou 2025 경유). HZ-기하 맥락.",
  "h3_143":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_144":"동역학-안정성 자료(1–2 AU 온대-행성 안정성에 관한 Satyal &amp; Cuntz 2019)와 초기 RV 정제 논문. 완전한 필터링 bib 는 <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_145":"Open items for follow-up",
  "li_146":"<b>반지름.</b> 측정 반지름 없음(비통과). ~0.7 R_Jup 은 추정-전용입니다. 경사/진질량 제약이 반지름 정제를 가능케 할 것입니다.",
  "li_147":"<b>가상 위성.</b> f 의 HZ 거주는 큰 위성에 흥미롭지만 관측된 것이 없으므로, 정책상 어떤 천체도 지어내지 않습니다. 위성이 언젠가 검출되면 온대-위성 Phase 3 후속이 정당화될 것입니다.",
  "li_148":"<b>구름 화학.</b> NH₃/NH₄SH 구름 배정은 온도 기반 추론입니다. 초금속 풍부 모성이 구름 색을 옮길 수 있습니다. 미래 방출/투과 제약이 팔레트를 다듬을 것입니다.",
  "h2_149":"Related",
  "li_150":"<a href=\"55-cnc.html\">55-cnc</a> — 모성(K0 IV-V, L = 0.582 L☉, HZ 0.67–1.32 AU)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
