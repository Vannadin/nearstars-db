  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 c has no surface in the geological sense. The envelope-retaining mini-Neptune scenario places c firmly above the photoevaporation valley: at 12.1 M⊕ and 17.3 S⊕, c sits comfortably inside the envelope-retention locus of Fulton 2017 and Rogers 2021 — well above the ~5 M⊕ threshold where XUV-driven mass-loss strips a substantial envelope over Gyr timescales, even for an old G-dwarf host. The cfg adopts the canonical Neptune-analog interior structure: a small (~3 M⊕) rocky/iron core, surrounded by a deep (~6 M⊕) supercritical H₂O / NH₃ / CH₄ ice mantle, with a thick (~3 M⊕, ~25% of total mass) H₂/He envelope on top. The &quot;surface&quot; the renderer sees is the cloud / haze deck at ~0.1 bar in the upper troposphere.",
  "p_178":"The envelope-retention reading is canonical at this point in the mass-insolation diagram — Lovis 2006 §5&#x27;s bare-core ambiguity that mattered for b (10 M⊕, 97 S⊕, marginal evaporation locus) does not apply to c. The photoevaporation timescale at 0.186 AU around an old G8V is several Gyr longer than at b&#x27;s 0.078 AU, and the host XUV luminosity (log L_X ≈ 26.7, Merloni 2024) is too feeble to drive significant mass-loss from a 12 M⊕ envelope over the system age. The cfg therefore picks the canonical envelope-retaining Neptune without a stripped-core variant.",
  "p_179":"The conceptual interior color for the cfg-variant cutaway renderer encodes a Neptune-analog deep mantle: <span class=\"hex-chip\" style=\"background:#5a7060\"></span><code>#5a7060</code> deep teal-grey for the supercritical ice mantle dominant body, with <span class=\"hex-chip\" style=\"background:#80a890\"></span><code>#80a890</code> warmer green-teal accents where convective plumes from the rocky core bring warmer material toward the envelope base. This is purely tie-break for the cfg&#x27;s interior-cutaway view; no observation constrains the deep-interior geometry. Below the supercritical-ice mantle, the inner rocky/iron core composition follows the metallicity scaling of the host star ([Fe/H] = −0.05), giving a slightly Fe-deficient core relative to Sol-analog assumptions but within the population-typical envelope.",
  "p_180":"The envelope&#x27;s deep base reaches ~3000 K at the ice-mantle / envelope boundary (pressure ~50 kbar, far below visible-photon escape depths). The renderer&#x27;s interior cutaway view shows the layered structure schematically — there is no observed property that constrains the internal energy budget beyond the modest tidal heating (~0.002 W/m²) from the e = 0.13 eccentricity, well below Neptune&#x27;s own intrinsic heat flux (~0.4 W/m²) and therefore subdominant to primordial heat of formation and radiogenic decay.",
  "h2_181":"Atmosphere synthesis",
  "p_182":"The atmosphere is c&#x27;s defining observable. Following Moses 2013 for warm-Neptune chemistry, the 520 K equilibrium temperature places c in the &quot;warm Neptune&quot; regime where CH₄ is the dominant carbon carrier (vs CO at hotter T &gt; 1000 K), NH₃ is stable in the lower stratosphere (vs N₂ at hotter T), and H₂O condensation is suppressed in favor of supercritical mixing at the envelope base. The visible cloud deck at ~0.1 bar comprises NH₃ ice / hydrosulfide (NH₄SH) cloud particles plus a photochemical sulfur-bearing chromophore haze in the upper stratosphere, analogous to the bright olive / yellow tints of Saturn&#x27;s photochemical hazes at mid-latitudes.",
  "p_183":"The cfg adopts a banded zonal flow morphology (<code>cloud_cover_fraction = 0.70</code>) with weak substellar / antistellar asymmetry. The pseudo-synchronous rotation state at P_rot ≈ 0.84 P_orb (Hut 1981, Greenberg 2009 e-dependent equilibrium) gives c a rotation period of ~26.5 days — slow enough that the Showman &amp; Polvani 2011 zonal-jet morphology develops modest banding but not the strong Saturn-Jupiter contrast. The cfg encodes ~3 alternating chromophore-rich (darker olive-gold) and chromophore-poor (lighter olive-cream) bands across the mid-latitudes, with a weaker tropical / polar contrast.",
  "p_184":"The atmospheric tint is <span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> warm olive-gold — Sudarsky 2003&#x27;s Class III (&quot;warm Neptune&quot;) palette with the photochemical chromophore contribution from Moses 2013&#x27;s sulfur-bearing hydrocarbon haze at 520 K. The host star is slightly cooler than Sol (5385 K vs 5772 K) so the perceived hue is shifted toward warmer/redder, but the dominant signal is the atmospheric chromophore chemistry rather than the stellar illumination. The cloud tint <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> is the brighter zones of the banded structure, visible at orbital scale as alternating belt-zone striping.",
  "p_185":"<b>Sky from the substellar region.</b> Above the cloud deck, the star fills a 2.3° disk in the sky — about 4× the apparent Sun-from-Earth diameter — and its slightly redder-than-Sol cream-yellow tint modulates the upper atmosphere. The warm dust belt at 0.7–1.5 AU is exterior to c by a factor of 4–8, and from c&#x27;s vantage projects as a faint amber band across the sky during alignment events, distinctly brighter than from b but still well below the host star&#x27;s overwhelming glow. The sister planet d at 0.63 AU appears at a 0.03° angular diameter from c during opposition (closest approach 0.44 AU), brighter than any star except HD 69830 itself.",
  "h2_186":"Rotation &amp; spin synthesis",
  "p_187":"Tidal damping for c at 31.56-day orbital period over 5.7 ± 1 Gyr does not reach full 1:1 synchronisation: the synchronisation timescale for a Neptune-class planet at 0.186 AU around an old G-dwarf is ≈ 10⁸ years (Heller 2011 scaling), comparable to but not significantly shorter than the system age. The equilibrium spin state for e = 0.13 is pseudo-synchronous (Hut 1981, Greenberg 2009), with rotation period P_rot ≈ 0.84 × P_orb = 26.5 days, giving the substellar point a slow ~5°/day drift in the inertial frame. Obliquity is partially damped to ~5° rather than the full 0° of a synchronous planet, preserved by the same e-driven forcing that establishes the pseudo-sync state.",
  "p_188":"The pseudo-sync rotation rate is much slower than the strong zonal-wind regime of close-in tidally-locked hot Jupiters (Showman &amp; Polvani 2011), but fast enough to drive equatorial superrotation by a factor ~2–3× the rotation rate of the surface frame. The resulting banded morphology is intermediate between Saturn&#x27;s strong belt-zone structure (3-day rotation) and Neptune&#x27;s weaker banding (16-hour rotation but cold) — c is closer to a warm-Saturn than a Neptune-analog in its visible atmospheric dynamics.",
  "p_189":"<b>KSP implementation note.</b> Rotation period = 26.5 days (2 289 600 s) under the pseudo-sync cfg. A canonical-alternative cfg variant with a free-rotator (P_rot ≈ 16 h, Neptune-analog) is preserved in Open items; under that reading the banding would be sharper and the substellar drift faster, but the equilibrium pseudo-sync state is the dynamically expected configuration for an old planet at e = 0.13.",
  "p_190":"<b>Eccentric-orbit insolation cycling.</b> At e = 0.13, the star-planet distance varies between 0.162 AU (perihelion) and 0.210 AU (aphelion) over each 31.56-day orbit, with insolation cycling between 22.9 S⊕ (perihelion) and 13.6 S⊕ (aphelion). The ~50% insolation amplitude drives a thermal-tide forcing on the upper atmosphere comparable to b&#x27;s, but at 520 K rather than 800 K the haze chemistry response is less dramatic — the cfg expects a ~30 K peak-to-peak swing at the upper cloud deck per orbit. Not animated; informational for the deeper interior model.",
  "h2_191":"Visual styling",
  "li_192":"<b>Global appearance.</b> A warm olive-gold disk (<span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> central tint, <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> brighter zonal bands) about 0.04° apparent diameter from a viewpoint at HD 69830 b — comparable to b&#x27;s apparent size from c. Player view from outside c shows banded olive-gold structure with ~3 chromophore-rich / chromophore-poor stripes resolvable at orbit-view scale, more visually distinctive than b&#x27;s uniform haze disk.",
  "li_193":"<b>Dayside detail.</b> Modest substellar dome brightening (~5% over the global tint) from chromophore chemistry at the warmest substellar point. The dayside ranges from <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> near the substellar point to <span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> at the terminator.",
  "li_194":"<b>Terminator band.</b> Gradient olive to dim olive-grey (<span class=\"hex-chip\" style=\"background:#5a6850\"></span><code>#5a6850</code>) with a soft Neptune-analog scattering profile, no sharp edge.",
  "li_195":"<b>Nightside.</b> Dim olive-grey glow from residual thermal emission of the 470 K nightside cloud deck. Visible only in cfg variants with night-side IR rendering enabled.",
  "li_196":"<b>Atmosphere &amp; cloud structure.</b> The defining feature is the banded zonal flow. Chromophore-rich darker bands at low-mid latitudes alternate with brighter chromophore-poor zones, ~3 bands across the visible hemisphere at orbit scale. Bands drift slowly with the pseudo-sync rotation; subtle wave patterns visible on close inspection.",
  "li_197":"<b>Star in sky.</b> HD 69830 fills 2.27° in c&#x27;s sky — about 4× the Sun&#x27;s apparent diameter from Earth, a large cream-yellow disk comparable to an apparent Sun seen from inside Mercury&#x27;s orbit.",
  "li_198":"<b>Sister planets in sky.</b> From c, planet b appears at angular diameter ~0.03° during conjunction (a/b separation 0.11 AU, b&#x27;s haze-disk radius ~16 600 km), and d at ~0.04° during d&#x27;s closest approach (a/d separation 0.44 AU, d&#x27;s radius ~28 400 km). d is the brighter of the two from c&#x27;s vantage because of its larger radius despite the greater distance.",
  "li_199":"<b>Warm dust ring from c&#x27;s perspective.</b> The dust belt at 0.7–1.5 AU is exterior to c&#x27;s 0.186 AU orbit by a factor of 4–8. From c, the belt is seen as an amber band across the orbital plane — narrower and dimmer than from a hypothetical outside-belt observer, but distinctly brighter than from b (which is 13× interior to the belt). Brightness peaks during perihelion alignments but stays well below the host star.",
  "h2_200":"Bibliography",
  "h3_201":"Read (visual-informative, drove decisions above)",
  "li_202":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). Discovery paper. P = 31.56 d, Msini = 11.8 M⊕, a = 0.186 AU, e = 0.13. Anchor for orbital + mass Decisions.",
  "li_203":"<b>Tanner A. et al. 2019</b> — <i>Stellar Parameters and the Habitable Zone of HD 69830</i>, ApJ 873, 91 (<code>2019ApJ...873...91T</code>, arXiv:1812.08964). Refined stellar parameters and minor RV re-analysis; Msini value 12.1 M⊕ adopted here as the consensus across Lovis 2006 + later HARPS extensions.",
  "li_204":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). Excludes grazing transit geometry for c; confirms only Msini constraint.",
  "li_205":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic forecasting of the masses and radii of other worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). Mass-radius probabilistic relation; 12 M⊕ → 3.4–3.5 R⊕ at the warm Neptune locus.",
  "li_206":"<b>Rogers J. G. et al. 2021</b> — <i>Conclusive evidence for a population of water worlds around M dwarfs that abounds with super-Earths</i>, ApJ 915, L12 (<code>2021ApJ...915L..12R</code>, arXiv:2105.03446). Population statistics of sub-Neptunes; supports the envelope-retaining Neptune reading at 12 M⊕ / 17 S⊕.",
  "li_207":"<b>Moses J. I. et al. 2013</b> — <i>Compositional Diversity in the Atmospheres of Hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). Warm Neptune photochemistry at 500–800 K; drives the CH₄ / NH₃ / chromophore composition adopted in the Decisions table.",
  "li_208":"<b>Sudarsky D. et al. 2003</b> — <i>Theoretical Spectra and Atmospheres of Extrasolar Giant Planets</i>, ApJ 588, 1121 (arXiv:astro-ph/0210216). Class III &quot;warm Neptune&quot; palette; anchors the olive-gold haze tint for c.",
  "li_209":"<b>Karkoschka E. &amp; Tomasko M. 2009</b> — <i>The haze and methane distributions on Uranus from HST-STIS spectroscopy</i>, Icarus 202, 287. Uranus-analog chromophore haze morphology; supports the 0.70 cloud-cover fraction and banded structure adopted by the cfg.",
  "h3_210":"Read (context / methodology, not decision-driving)",
  "li_211":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126. Pseudo-synchronous spin rate at finite eccentricity; drives the P_rot = 0.84 P_orb pick.",
  "li_212":"<b>Greenberg R. 2009</b> — <i>Frequency dependence of tidal q</i>, ApJ 698, L42. Refinement of Hut 1981 for e-dependent equilibrium spin; supports the pseudo-sync state.",
  "li_213":"<b>Heller R. et al. 2011</b> — <i>Tidal obliquity evolution of potentially habitable planets</i>, A&amp;A 528, A27 (arXiv:1101.2156). Tidal-synchronisation timescale scaling used for the pseudo-sync argument.",
  "li_214":"<b>Showman A. P. &amp; Polvani L. M. 2011</b> — <i>Equatorial superrotation on tidally locked exoplanets</i>, ApJ 738, 71 (arXiv:1103.3101). Jet morphology used to justify the banded zonal flow.",
  "li_215":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution</i>, AJ 154, 109. Defines the photoevaporation valley around 1.5–2 R⊕; supports envelope-retention reading for c at 3.46 R⊕.",
  "li_216":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic mass-radius relationship for sub-Neptune-sized planets</i>, ApJ 825, 19 (arXiv:1504.07557). Independent mass-radius constraint for the 3.46 R⊕ pick.",
  "li_217":"<b>Otegi J. F. et al. 2020</b> — <i>Revisited mass-radius relations for exoplanets below 120 M⊕</i>, A&amp;A 634, A43 (arXiv:1911.04745). Confirms the volatile-rich locus for c&#x27;s mass-radius.",
  "li_218":"<b>Atri D. 2019</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i>, MNRAS 500, L1 (arXiv:1910.09871). Models SPE-induced surface dose for terrestrial exoplanets with thin atmospheres; not directly applicable to c&#x27;s Neptune-class thick envelope. The 40 mSv/yr value is an independent order-of-magnitude synthesis estimate.",
  "h3_219":"Read (instrument / non-cfg-decisive)",
  "li_220":"<b>Beichman C. A. et al. 2005</b> — <i>An excess due to small grains around HD 69830</i>, ApJ 626, 1061. Dust belt geometry context; confirms c orbits interior to the belt without crossing it.",
  "h3_221":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_222":"HD 69830 b/c/d dynamical stability papers (Ji 2007, Payne 2009) — relevant for the orbital architecture but not visual.",
  "li_223":"Generic warm-Neptune characterisation papers (GJ 436 b, HAT-P-11 b, Kepler-89 e analogues) — context only; not HD 69830 c-specific.",
  "li_224":"Lisse 2007 catastrophic-event discussion — relevant for d (potential parent body); for c the relationship is geometric (interior to belt) rather than dynamic.",
  "h2_225":"Open items for follow-up",
  "li_226":"<b>Transit search refresh.</b> No published transit detection as of 2026; CHEOPS / TESS short-cadence monitoring could rule in or out a grazing geometry and pin a true radius. A transit detection for c would resolve the mass-radius tie-break and update <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> from 3.46 R⊕ to the measured value.",
  "li_227":"<b>Pseudo-sync vs free-rotator cfg variant.</b> The 26.5-day pseudo-sync state is the dynamically expected equilibrium; a free-rotator alternative (P_rot ≈ 16 h, Neptune-analog) is preserved as a cfg variant. The visual difference is in the sharpness of the banded structure — free rotation gives sharper bands and faster substellar drift.",
  "li_228":"<b>Direct atmospheric characterisation.</b> No JWST programme has targeted HD 69830 c through 2026 cycles. Future direct-imaging facilities (HabEx, LUVOIR, ELT/HARMONI) could resolve c at angular separation ~15 milliarcsec — within ELT capability for a planet/star contrast ~10⁻⁸. The cfg&#x27;s banded chromophore morphology would be testable through reflected-light spectroscopy.",
  "li_229":"<b>Resonance check vs b and d.</b> The b:c period ratio 31.56/8.667 = 3.64 is far from 4:1 mean-motion resonance; the c:d ratio 197/31.56 = 6.24 is also non-resonant. Long-term dynamical stability papers (Ji 2007, Payne 2009) confirm the system is stable in this non-resonant configuration. No cfg variant needed.",
  "li_230":"<b>Tidal heating cross-check.</b> The adopted 0.002 W/m² internal heat flux from e = 0.13 + Neptune-class Q is order-of-magnitude; more rigorous tidal-evolution modelling (Bolmont 2013-style) would refine this.",
  "h2_231":"Related",

  "p_1":"HD 69830 c 는 Lovis 외 2006 (HARPS, 4 년 캠페인) 이 발견한 세 개의 넵튠 질량 시선속도 행성 중 중간에 있습니다. P = 31.56 ± 0.04 일, Msini = 11.8–12.1 M⊕ (Lovis 2006 / Tanner 2019 refit), a = 0.186 AU, e = 0.13, ω = 221°. 모성이 L = 0.60 L☉ 이므로 c 의 일조량은 지구의 ~17 배, A = 0.3 본드 알베도에서 평형 온도는 519 K — 시스템 5.7 ± 1 Gyr 나이 안에 일차적 Neptune 급 H/He 외피가 편안히 유지되는 온도입니다. 통과 검출은 없습니다. Bonfils 2007 과 후속 측광이 예측된 ephemeris 를 배제하기 때문에 관측으로 제약되는 것은 Msini 와 궤도 요소뿐입니다. 궤도 장반경 0.186 AU 는 c 를 0.7–0.8 AU 의 따뜻한 먼지 벨트 내경 (Beichman 2005) 보다 ~3.8 배 안쪽에 두며, c 는 먼지 인구를 가로지르지 않고 그 안쪽에 단단히 자리합니다.",
  "p_2":"<b>NearStars 시나리오 선택. 따뜻한 외피-유지 Neptune analog 으로, 총 질량의 ~25% 에 해당하는 두꺼운 H₂/He 대기, 물 풍부 얼음 내부, 그리고 행성의 결정적 시각 시그니처를 만드는 chromophore 함유 광화학 haze 층을 가진 sub-Neptune 에서 mini-Neptune 급의 천체입 니다.</b> 28 cfg 픽 중 12 는 canonical-aligned (궤도 + 질량 파라미터, 유도된 일조량 / 평형 온도), 16 은 tie-break (외피-유지 mini-Neptune 윈도우의 반지름 / 밀도, 광화학 chromophore 색조, 적당한 조석-자전 결합 하의 구름 형태) 입니다. documented divergence 는 없습니다. 오래된 G8V 주위 17 S⊕ 의 12 M⊕ 행성에서 외피-유지 해석이 canonical 이며, 광증발 valley 바닥 위로 편안히 자리하고 Rogers 2021 의 외피-유지 위치에 들어 있습니다.",

  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 c 는 지질학적 의미의 표면이 없습니다. 외피-유지 mini- Neptune 시나리오는 c 를 광증발 valley 위로 단단히 놓습니다. 12.1 M⊕, 17.3 S⊕ 에서 c 는 Fulton 2017 과 Rogers 2021 의 외피-유지 위치 안에 편안히 자리합니다 — XUV 구동 질량 손실이 Gyr 시간 스케일에 걸쳐 substantial 한 외피를 박탈하는 ~5 M⊕ 임계값 위로 한참. 오래된 G 왜성 호스트라도 마찬가지입니다. cfg 는 canonical Neptune-analog 내부 구조를 채택합니다. 작은 (~3 M⊕) 암석/철 코어, 그를 둘러싼 깊은 (~6 M⊕) 초임계 H₂O / NH₃ / CH₄ 얼음 mantle, 그 위의 두꺼운 (~3 M⊕, 총 질량의 ~25%) H₂/He 외피. 렌더러가 보는 &quot;표면&quot; 은 상부 대류권 ~0.1 bar 의 구름 / haze 데크입니다.",
  "p_178":"외피-유지 해석은 질량-일조량 다이어그램의 이 지점에서 canonical 입니다 — b (10 M⊕, 97 S⊕, marginal 증발 위치) 에 중요했던 Lovis 2006 §5 의 bare-core 모호성은 c 에는 적용되지 않습니다. 오래된 G8V 주위 0.186 AU 에서의 광증발 시간 스케일은 b 의 0.078 AU 보다 수 Gyr 더 깁니다. 그리고 host XUV 광도 (log L_X ≈ 26.7, Merloni 2024) 가 시스템 나이에 걸쳐 12 M⊕ 외피로부터 의미 있는 질량 손실을 구동하기에 너무 약합니다. cfg 는 따라서 stripped-core 변형 없이 canonical 외피-유지 Neptune 을 선택합니다.",
  "p_179":"cfg-variant 컷어웨이 렌더러를 위한 개념적 내부 색은 Neptune-analog 깊은 mantle 을 인코딩합니다. 초임계 얼음 mantle 주체의 <span class=\"hex-chip\" style=\"background:#5a7060\"></span><code>#5a7060</code> 깊은 청회색, 그리고 암석 코어에서 오는 대류 plume 이 더 따뜻한 물질을 외피 바닥 쪽으로 가져오는 곳의 <span class=\"hex-chip\" style=\"background:#80a890\"></span><code>#80a890</code> 더 따뜻한 녹청색 액센트. 이는 순수한 tie-break 으로, cfg 의 내부 컷어웨이 뷰용입니다. 관측이 내부 지오메트리를 제약하지 않습니다. 초임계-얼음 mantle 아래, 내부 암석/철 코어 조성은 모성의 금속도 스케일링 ([Fe/H] = −0.05) 을 따르며, Sol-analog 가정에 대해 약간 Fe-결핍이지만 인구-전형 범위 안입니다.",
  "p_180":"외피의 깊은 바닥은 얼음-mantle / 외피 경계 (압력 ~50 kbar, 가시 광자 탈출 깊이 훨씬 아래) 에서 ~3000 K 에 도달합니다. 렌더러의 내부 컷어웨이 뷰는 층 구조를 도식적으로 보여줍니다 — modest 한 조석 가열 (e = 0.13 으로 ~0.002 W/m²) 너머 내부 에너지 예산을 제약하는 관측 속성이 없습니다. modest 조석 가열은 Neptune 자체의 내적 열 플럭스 (~0.4 W/m²) 보다 한참 아래이므로 형성의 primordial 열과 방사성 붕괴에 비해 부차적입니다.",
  "h2_181":"Atmosphere synthesis",
  "p_182":"대기는 c 의 결정적 관측 가능 요소입니다. Moses 2013 의 따뜻한 Neptune 화학을 따르면, 520 K 평형 온도는 c 를 &quot;따뜻한 Neptune&quot; 영역에 놓습니다. CH₄ 가 지배적인 탄소 운반체 (더 뜨거운 T &gt; 1000 K 의 CO 와 대조) 이고, NH₃ 가 하부 성층권에서 안정 (더 뜨거운 T 의 N₂ 와 대조) 하며, H₂O 응결이 외피 바닥의 초임계 혼합에 의해 억제됩니다. ~0.1 bar 의 가시 구름 데크는 NH₃ 얼음 / 하이드로 설파이드 (NH₄SH) 구름 입자와 상부 성층권의 광화학 황 함유 chromophore haze 로 구성되며, Saturn 의 중위도 광화학 haze 의 밝은 올리브 / 노란 색조와 유사합니다.",
  "p_183":"cfg 는 약한 substellar / antistellar 비대칭과 함께 띠 zonal flow 형태 (<code>cloud_cover_fraction = 0.70</code>) 를 채택합니다. P_rot ≈ 0.84 P_orb (Hut 1981, Greenberg 2009 의 e-의존 균형) 의 pseudo-synchronous 회전 상태는 c 에게 ~26.5 일의 자전 주기를 줍니다 — Showman &amp; Polvani 2011 zonal-jet 형태가 modest 한 띠 구조를 발달시키지만 강한 Saturn-Jupiter 대비는 아닐 정도로 느림. cfg 는 중위도를 가로지르는 ~3 개의 교차하는 chromophore-rich (어두운 올리브-골드) 와 chromophore-poor (더 밝은 올리브-크림) 띠를 인코딩하며, 더 약한 열대 / 극지 대비를 둡니다.",
  "p_184":"대기 색조는 <span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> 따뜻한 올리브-골드입니다 — Sudarsky 2003 의 Class III (&quot;따뜻한 Neptune&quot;) 팔레트에 520 K 에서 Moses 2013 의 황 함유 탄화수소 haze 의 광화학 chromophore 기여를 더한 것. 모성이 태양보다 살짝 더 차갑기 (5385 K vs 5772 K) 때문에 인지된 색조가 더 따뜻한 / 더 붉은 쪽으로 이동하지만, 지배적인 신호는 별 조명보다 대기 chromophore 화학에서 옵니다. 구름 색조 <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> 은 띠 구조의 밝은 zone 으로, 궤도 스케일에서 교차하는 belt-zone 줄무늬로 가시 입니다.",
  "p_185":"<b>substellar 영역에서 본 하늘.</b> 구름 데크 위에서 별이 2.3° 디스크 로 하늘을 채우며 — 지구에서 본 태양 겉보기 지름의 약 4 배 — 태양 보다 살짝 더 붉은 크림-노랑 색조가 상부 대기를 변조합니다. 0.7– 1.5 AU 의 따뜻한 먼지 벨트는 c 의 외부로 4–8 배 떨어져 있으며, c 의 시점에서 정렬 사건 동안 하늘을 가로지르는 희미한 호박색 띠로 투영됩니다 — b 에서보다 뚜렷이 더 밝지만 여전히 모성의 압도적 글로우 한참 아래. 0.63 AU 의 자매 행성 d 는 c 에서 opposition (최근접 0.44 AU) 동안 0.03° 각지름으로 나타나, HD 69830 자체를 제외한 어떤 별보다도 밝습니다.",
  "h2_186":"Rotation &amp; spin synthesis",
  "p_187":"5.7 ± 1 Gyr 에 걸친 c 의 31.56 일 궤도 주기 조석 damping 은 완전한 1:1 동기화에 도달하지 못합니다. 오래된 G 왜성 주위 0.186 AU 의 Neptune 급 행성에 대한 동기화 시간 스케일은 ≈ 10⁸ 년 (Heller 2011 스케일링) 으로 시스템 나이와 비슷하지만 의미 있게 짧지는 않습니다. e = 0.13 에 대한 평형 spin 상태는 pseudo-synchronous (Hut 1981, Greenberg 2009) 이며, 자전 주기 P_rot ≈ 0.84 × P_orb = 26.5 일로, substellar 점이 관성 좌표계에서 ~5°/day 의 느린 드리프트를 갖습니다. 황도 경사도는 sync 행성의 완전한 0° 대신 ~5° 로 부분적으로 damping 되며, pseudo-sync 상태를 확립하는 동일한 e 구동 강제력에 의해 보존됩니다.",
  "p_188":"pseudo-sync 자전율은 가까운 조석 고정 hot Jupiter 의 강한 zonal-wind 영역 (Showman &amp; Polvani 2011) 보다 훨씬 느리지만, 표면 좌표계 자전 율의 ~2–3 배만큼 적도 superrotation 을 구동할 정도로 빠릅니다. 결과 적인 띠 형태는 Saturn 의 강한 belt-zone 구조 (3 일 자전) 와 Neptune 의 더 약한 띠 (16 시간 자전이지만 차가움) 사이에 중간입니다 — c 는 가시 대기 동역학에서 Neptune-analog 보다 따뜻한 Saturn 에 더 가깝 습니다.",
  "p_189":"<b>KSP 구현 노트.</b> pseudo-sync cfg 에서 자전 주기 = 26.5 일 (2 289 600 s). canonical 대안 cfg 변형 (P_rot ≈ 16 h, Neptune- analog 자유 회전자) 이 Open items 에 보존됩니다. 그 해석 하에서는 띠가 더 sharp 하고 substellar 드리프트가 더 빠르겠지만, pseudo-sync 균형 상태가 e = 0.13 의 오래된 행성에 대한 동역학적으로 예상되는 구성입니다.",
  "p_190":"<b>이심 궤도 일조량 사이클링.</b> e = 0.13 에서 별-행성 거리가 각 31.56 일 궤도 동안 0.162 AU (근일점) 와 0.210 AU (원일점) 사이를 변하며, 일조량이 22.9 S⊕ (근일점) 와 13.6 S⊕ (원일점) 사이를 사이클링합니다. ~50% 일조량 진폭이 상부 대기에 b 와 비교 가능한 thermal-tide 강제력을 구동하지만, 800 K 가 아닌 520 K 에서 haze 화학 반응이 덜 극적입니다 — cfg 는 궤도당 상부 구름 데크에서 peak-to-peak ~30 K 의 스윙을 예상합니다. cfg 는 애니메이션하지 않습니다. 더 깊은 내부 모델용 정보입니다.",
  "h2_191":"Visual styling",
  "li_192":"<b>글로벌 외관.</b> 따뜻한 올리브-골드 디스크 (<span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> 중심 색조, <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> 더 밝은 zonal 띠), HD 69830 b 시점에서 약 0.04° 겉보기 지름 — c 에서 본 b 의 겉보기 크기와 비슷. c 외부 플레이어 시점 에서는 궤도 뷰 스케일에서 분해 가능한 ~3 개의 chromophore-rich / chromophore-poor 줄무늬가 있는 띠 올리브-골드 구조가 보이며, b 의 균일한 haze 디스크보다 시각적으로 더 두드러집니다.",
  "li_193":"<b>Dayside 디테일.</b> 가장 따뜻한 substellar 점에서의 chromophore 화학에서 오는 modest substellar dome brightening (글로벌 색조 대비 ~5%). dayside 는 substellar 점 근처의 <span class=\"hex-chip\" style=\"background:#c8d4a0\"></span><code>#c8d4a0</code> 에서 terminator 의 <span class=\"hex-chip\" style=\"background:#a8b885\"></span><code>#a8b885</code> 까지 범위.",
  "li_194":"<b>Terminator 밴드.</b> 부드러운 Neptune-analog 산란 프로필을 가진 올리브에서 어두운 올리브-회색 (<span class=\"hex-chip\" style=\"background:#5a6850\"></span><code>#5a6850</code>) 으로의 gradient. sharp edge 없음.",
  "li_195":"<b>Nightside.</b> 470 K 야측 구름 데크의 잔존 열 방출에서 오는 어둑한 올리브-회색 글로우. 야측 IR 렌더링이 활성화된 cfg 변형 에서만 보임.",
  "li_196":"<b>대기 &amp; 구름 구조.</b> 결정적 피처는 띠 zonal flow. 저-중위도의 chromophore-rich 어두운 띠가 더 밝은 chromophore-poor zone 과 교차하며, 궤도 스케일에서 가시 반구를 가로지르는 ~3 개의 띠. 띠는 pseudo-sync 회전과 함께 천천히 드리프트. 자세히 보면 미묘한 파동 패턴이 가시.",
  "li_197":"<b>하늘의 별.</b> HD 69830 이 c 의 하늘에서 2.27° — 지구에서 본 태양 겉보기 지름의 약 4 배, 수성 궤도 내부에서 본 태양과 비슷한 큰 크림-노랑 디스크.",
  "li_198":"<b>하늘의 자매 행성.</b> c 에서 b 는 합 (a/b 분리 0.11 AU, b 의 haze 디스크 반지름 ~16 600 km) 동안 각지름 ~0.03°, d 는 d 의 최근접 (a/d 분리 0.44 AU, d 의 반지름 ~28 400 km) 동안 ~0.04°. d 가 더 먼 거리에도 더 큰 반지름 덕분에 c 의 시점에서 둘 중 더 밝습니다.",
  "li_199":"<b>c 시점에서 본 따뜻한 먼지 고리.</b> 0.7–1.5 AU 의 먼지 벨트가 c 의 0.186 AU 궤도 외부로 4–8 배 떨어져 있습니다. c 에서는 궤도 평면을 가로지르는 호박색 띠로 보입니다 — 가상의 벨트 외부 관찰자 시점보다는 좁고 어둑하지만, b (벨트 안쪽으로 13 배) 에서보다 뚜렷이 더 밝습니다. 근일점 정렬 동안 밝기가 피크에 도달하지만 모성 한참 아래 머무릅니다.",
  "h2_200":"Bibliography",
  "h3_201":"Read (visual-informative, drove decisions above)",
  "li_202":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). 발견 논문. P = 31.56 d, Msini = 11.8 M⊕, a = 0.186 AU, e = 0.13. 궤도 + 질량 Decisions 의 앵커.",
  "li_203":"<b>Tanner A. et al. 2019</b> — <i>Stellar Parameters and the Habitable Zone of HD 69830</i>, ApJ 873, 91 (<code>2019ApJ...873...91T</code>, arXiv:1812.08964). 정련된 모성 파라미터와 미니 RV 재분석. Msini 값 12.1 M⊕ 이 Lovis 2006 + 이후 HARPS 확장의 컨센서스로 여기 채택.",
  "li_204":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). c 의 grazing transit 지오메트리를 배제. Msini 제약만 확인.",
  "li_205":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic forecasting of the masses and radii of other worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). 질량-반지름 확률 관계. 따뜻한 Neptune 위치에서 12 M⊕ → 3.4–3.5 R⊕.",
  "li_206":"<b>Rogers J. G. et al. 2021</b> — <i>Conclusive evidence for a population of water worlds around M dwarfs that abounds with super-Earths</i>, ApJ 915, L12 (<code>2021ApJ...915L..12R</code>, arXiv:2105.03446). sub-Neptune 모집단 통계. 12 M⊕ / 17 S⊕ 에서 외피-유지 Neptune 해석 지지.",
  "li_207":"<b>Moses J. I. et al. 2013</b> — <i>Compositional Diversity in the Atmospheres of Hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). 500–800 K 의 따뜻한 Neptune 광화학. Decisions 테이블이 채택한 CH₄ / NH₃ / chromophore 조성을 구동.",
  "li_208":"<b>Sudarsky D. et al. 2003</b> — <i>Theoretical Spectra and Atmospheres of Extrasolar Giant Planets</i>, ApJ 588, 1121 (arXiv:astro-ph/0210216). Class III &quot;따뜻한 Neptune&quot; 팔레트. c 에 대한 올리브-골드 haze 색조를 앵커.",
  "li_209":"<b>Karkoschka E. &amp; Tomasko M. 2009</b> — <i>The haze and methane distributions on Uranus from HST-STIS spectroscopy</i>, Icarus 202, 287. Uranus-analog chromophore haze 형태. cfg 가 채택한 0.70 구름 커버 분율과 띠 구조를 지지.",
  "h3_210":"Read (context / methodology, not decision-driving)",
  "li_211":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126. 유한 이심률에서의 pseudo-synchronous spin rate. P_rot = 0.84 P_orb 픽을 구동.",
  "li_212":"<b>Greenberg R. 2009</b> — <i>Frequency dependence of tidal q</i>, ApJ 698, L42. e-의존 평형 spin 에 대한 Hut 1981 의 정련. pseudo-sync 상태를 지지.",
  "li_213":"<b>Heller R. et al. 2011</b> — <i>Tidal obliquity evolution of potentially habitable planets</i>, A&amp;A 528, A27 (arXiv:1101.2156). pseudo-sync 논거에 사용한 조석 동기화 시간 스케일 스케일링.",
  "li_214":"<b>Showman A. P. &amp; Polvani L. M. 2011</b> — <i>Equatorial superrotation on tidally locked exoplanets</i>, ApJ 738, 71 (arXiv:1103.3101). 띠 zonal flow 정당화에 사용한 제트 형태.",
  "li_215":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution</i>, AJ 154, 109. 1.5–2 R⊕ 주변의 광증발 valley 정의. c 의 3.46 R⊕ 에서 외피-유지 해석을 지지.",
  "li_216":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic mass-radius relationship for sub-Neptune-sized planets</i>, ApJ 825, 19 (arXiv:1504.07557). 3.46 R⊕ 픽에 대한 독립 질량-반지름 제약.",
  "li_217":"<b>Otegi J. F. et al. 2020</b> — <i>Revisited mass-radius relations for exoplanets below 120 M⊕</i>, A&amp;A 634, A43 (arXiv:1911.04745). c 의 질량-반지름에 대한 휘발성 풍부 위치 확인.",
  "li_218":"<b>Atri D. 2019</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i>, MNRAS 500, L1 (arXiv:1910.09871). 얇은 대기를 가진 지구형 외계행성의 SPE 유발 표면 도즈를 모델링. c 의 Neptune 급 두꺼운 외피에는 직접 적용되지 않음. 40 mSv/yr 값은 독립적인 자릿수 합성 추정.",
  "h3_219":"Read (instrument / non-cfg-decisive)",
  "li_220":"<b>Beichman C. A. et al. 2005</b> — <i>An excess due to small grains around HD 69830</i>, ApJ 626, 1061. 먼지 벨트 지오메트리 컨텍스트. c 가 벨트를 가로지르지 않고 그 안쪽을 도는 것을 확인.",
  "h3_221":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_222":"HD 69830 b/c/d 동역학적 안정성 논문 (Ji 2007, Payne 2009) — 궤도 구조에는 관련하지만 시각에는 무관.",
  "li_223":"일반 따뜻한-Neptune 특성화 논문 (GJ 436 b, HAT-P-11 b, Kepler-89 e analog) — 컨텍스트만. HD 69830 c 특이성 없음.",
  "li_224":"Lisse 2007 catastrophic-event 논의 — d (잠재적 parent body) 에 관련. c 에 대해서는 관계가 동적이라기보다 기하학적 (벨트 안쪽).",
  "h2_225":"Open items for follow-up",
  "li_226":"<b>통과 탐색 갱신.</b> 2026 년 현재 발표된 통과 검출 없음. CHEOPS / TESS short-cadence 모니터링이 grazing 지오메트리를 ruling in/out 하고 진짜 반지름을 핀할 수 있습니다. c 에 대한 통과 검출은 질량- 반지름 tie-break 을 해소하고 <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> 를 3.46 R⊕ 에서 측정값으로 업데이트할 것.",
  "li_227":"<b>Pseudo-sync vs 자유 회전자 cfg 변형.</b> 26.5 일 pseudo-sync 상태 가 동역학적으로 예상되는 균형. 자유 회전자 대안 (P_rot ≈ 16 h, Neptune-analog) 이 cfg 변형으로 보존됨. 시각 차이는 띠 구조의 sharpness 에 있음 — 자유 회전이 더 sharp 한 띠와 더 빠른 substellar 드리프트를 줌.",
  "li_228":"<b>직접 대기 특성화.</b> 2026 사이클까지 JWST 프로그램이 HD 69830 c 를 타깃한 적 없음. 미래 직접 촬영 시설 (HabEx, LUVOIR, ELT/ HARMONI) 이 ~15 milliarcsec 각도 분리에서 c 를 해상할 수 있음 — 행성/별 명암비 ~10⁻⁸ 의 ELT 범위 안. cfg 의 띠 chromophore 형태가 반사광 분광으로 검증 가능.",
  "li_229":"<b>b 및 d 와의 공명 확인.</b> b:c 주기 비 31.56/8.667 = 3.64 는 4:1 평균 운동 공명에서 멀고, c:d 비 197/31.56 = 6.24 도 비공명. 장기 동역학적 안정성 논문 (Ji 2007, Payne 2009) 이 시스템이 이 비공명 구성에서 안정함을 확인. cfg 변형 필요 없음.",
  "li_230":"<b>조석 가열 교차 확인.</b> e = 0.13 + Neptune 급 Q 에서 채택한 0.002 W/m² 내부 열 플럭스는 자릿수 추정. 더 엄밀한 조석-진화 모델링 (Bolmont 2013 스타일) 이 이를 정련할 것.",
  "h2_231":"Related",

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
