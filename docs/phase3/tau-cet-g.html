  "h2_172":"Surface synthesis",
  "p_173":"τ Ceti g is in the <b>bare-rock</b> regime: 27.59 S⊕ insolation places it well inside the runaway-greenhouse limit (Kopparapu 2014 inner edge for a G8V is ~1.0 S⊕), but unlike Venus, g lacks the secondary outgassing rate to maintain a thick CO₂ atmosphere against Jeans escape over 7 Gyr. Two competing effects determine the outcome:",
  "p_174":"1. The host star is exceptionally quiet — log L_X ≤ 26.5 cgs (Schmitt 1985), log R&#x27;HK = −4.95 (Pavlenko 2012), basal FUV (Judge 2004). XUV-driven hydrodynamic escape is negligible. Heavy molecules (N₂, CO₂, SO₂) are not blow-off-limited. 2. But thermal Jeans escape at Teq = 638 K is non-negligible. The escape velocity for a 1.75 M⊕ planet of 1.18 R⊕ radius is 13.7 km/s; the thermal velocity of N₂ at 638 K is 0.67 km/s, giving a Jeans parameter of 21 — formally retained — but for the upper-atmosphere effective temperature (typically 2–4× the surface in a thin/no-atmosphere regime), the Jeans parameter drops to ~5–10, in the marginal-loss range over Gyr timescales.",
  "p_175":"The cfg adopts the <b>interesting-first</b> outcome: bare-rock airless. This produces a more visually distinctive Mercury-analog over the Venus-analog alternative and matches the system context — τ Ceti&#x27;s inner planet should look different from its outer planets, and g &quot;loses its atmosphere while h retains a thick CO₂ envelope&quot; is a visually informative within-system contrast.",
  "p_176":"The surface is heavily impact-cratered bedrock with no resurfacing on geological timescales. Tidal heating (e = 0.06 at 0.133 AU) is modest (~0.05 W/m², well below Io&#x27;s 2 W/m²) and does not drive active volcanism. Radiogenic heating is Earth-analog 0.04 W/m². The combined interior flux is too low to maintain a fluid mantle or sustained dynamo, but is sufficient to slowly bleed primordial heat over the system&#x27;s age.",
  "p_177":"<b>Color choice — ash-grey basaltic regolith.</b> Mercury and the Moon provide the empirical templates for unweathered silicate regolith on an airless body — both are dominantly dark grey (<span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code> to <span class=\"hex-chip\" style=\"background:#8c8478\"></span><code>#8c8478</code>) with localized brighter patches from ejecta or iron-poor basalts. On τ Ceti g the metal-poor primordial dust (from a [Fe/H] = −0.55 host) suggests less iron-staining of the original grain population than around the Sun; the cfg pick <span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code> is a slightly cleaner ash-grey than the Sol-system Mercury reference, biased toward grey rather than ochre. Photolytic iron-oxide weathering accumulates over 7 Gyr at the substellar region, giving localized rust-brown patches (<span class=\"hex-chip\" style=\"background:#8a4a30\"></span><code>#8a4a30</code>) at the ~5% surface-area level — a tie-break that adds visual distinctiveness over a uniform grey alternative.",
  "p_178":"<b>Mineralogy notes.</b> Without observation, mineralogy is inferred from formation: a 2 M⊕ rocky body forming inside the iceline of a metal-poor G dwarf should have Mg/Si ≈ 1.1–1.2 (slightly elevated because Fe is depleted), favoring olivine and pyroxene over plagioclase-dominated melts. Olivine-rich basaltic regolith would appear slightly greener-grey than terrestrial basalt; the cfg pick doesn&#x27;t try to encode this at the hex level but the surface morphology prose hints at it.",
  "p_179":"<b>No silicate-vapor cap.</b> At 700 K dayside temperature, silicate vapor pressure is well below 10⁻⁶ bar (silicate condensation temperature ~1500–2000 K). g is hot but not magma-ocean hot; no substellar silicate-vapor cloud is rendered.",
  "h2_180":"Atmosphere synthesis",
  "p_181":"The cfg adopts <b>no bulk atmosphere</b>. The reasoning is in the Surface synthesis above: thermal Jeans escape at 638 K Teq with modest upper-atmosphere heating bleeds N₂ and CO₂ over 7 Gyr on a 2 M⊕ body, and the quiet host produces no replenishing photochemistry of significance. The atmosphere is therefore vanishingly thin — a Mercury-analog exosphere with photolytically liberated Na, K, Si, O from the regolith at the substellar hot spot, dynamically ballistic on the surface scale and not in hydrostatic equilibrium.",
  "p_182":"<b>No global Rayleigh haze.</b> The cfg <span class=\"field-tt\" data-ko-tip=\"대기 limb (가장자리) 색조 hex.\" data-en-tip=\"Atmospheric limb tint as a hex color.\"><code>atmosphere_tint_rgb_hex</code></span> is <span class=\"hex-chip\" style=\"background:#000000\"></span><code>#000000</code> (imperceptible) and the limb appears sharp at PQS resolution.",
  "p_183":"<b>Sky appearance.</b> From the surface, the sky is black, dominated by the host star at 3.17° angular diameter — about 6× the Sun&#x27;s angular size from Earth. The surface receives 27.59 S⊕ of pale-yellow G8V illumination at the substellar point; dayside surface temperatures exceed 700 K. Other stars are easily visible during dayside because no atmosphere scatters the host light; the night sky is similar to the Moon&#x27;s, with deep field stars visible at full magnitude. The host&#x27;s metal-poor SED produces a slightly cleaner pale-yellow color than the Sun&#x27;s spectrum, perceptible as a marginally less warm disk.",
  "p_184":"<b>Counterfactual — Venus-analog cfg variant.</b> A reader interested in a &quot;g is the Venus, h is the Mercury&quot; alternative system description could swap the two — but the period and insolation ordering (g hottest, h next, f coldest) means the Venus-class runaway-greenhouse is best placed at h (the slightly cooler 7.7 S⊕ neighbor) where outgassing rates support a sustained thick CO₂ atmosphere. The Mercury-analog g is the more physically defensible pick.",
  "h2_185":"Rotation &amp; spin synthesis",
  "p_186":"τ Ceti g&#x27;s spin state is the most uncertain of the three planets. Two competing scenarios:",
  "p_187":"1. <b>3:2 spin-orbit resonance (Mercury analog).</b> At e = 0.06, capture probability into 3:2 is ~50–70% (Makarov 2018 Figure 7 for super-Earth-mass bodies at this period and eccentricity). The 3:2 capture creates a 40-day solar day with substantial thermal asymmetry between the libration regions. 2. <b>Asynchronous slow rotator.</b> If 3:2 capture failed, the planet rotates at a primordial period (could be anywhere from hours to days) with steady damping toward 3:2 or 1:1 — over 7 Gyr at this orbital period, damping should be close to complete.",
  "p_188":"The cfg adopts <b>3:2 (Mercury analog)</b> as the interesting-first pick. The 40-day solar day creates substantial diurnal cycling of surface temperature (subsolar swings 200 → 700 → 200 K over the solar day) and produces visually distinctive thermal asymmetry across the surface. The 1:1 lock alternative is preserved as a cfg variant in the Open items.",
  "p_189":"<b>KSP implementation note.</b> For 3:2: <code>rotationPeriod</code> = (2/3) × orbital period = 13.33 days (1.152×10⁶ s). For 1:1 alternative: 20 days (1.728×10⁶ s).",
  "p_190":"<b>Obliquity.</b> Tidal damping over 7 Gyr should pull obliquity to zero; cfg adopts 0°. Libration-induced insolation variation (~12% from e = 0.06) gives modest &quot;seasons&quot; over the 20-d orbital period — perceptible as a brightening/cooling cycle but not as hemispheric seasons.",
  "p_191":"<b>Magnetic dynamo expectation.</b> A 1.75 M⊕ body with 3:2 slow rotation (~40-d solar day) and probably cold interior is unlikely to sustain a global dynamo. Mercury&#x27;s dynamo is anomalously maintained by a partially-molten core; whether the same applies to a metal-poor super-Earth is unclear. The cfg pessimistically assumes no active dynamo, with possible Mercury-analog crustal remnant field at ~0.5 μT.",
  "h2_192":"Visual styling",
  "li_193":"<b>Global appearance.</b> A dark ash-grey rocky world (<span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code>) with localized rust-brown weathering patches (<span class=\"hex-chip\" style=\"background:#8a4a30\"></span><code>#8a4a30</code>) near the substellar libration region. Heavily impact-cratered, with visible ray systems from younger impacts. Visual character is closest to a slightly larger Mercury — almost airless, dark, cratered.",
  "li_194":"<b>Substellar region (libration zone).</b> Most heated, oldest oxidation patches concentrated here. Rust-brown weathering visible at PQS resolution as ~5% surface-area patches over the base ash-grey. Possible silicate-vapor-deposited bright patches near the largest impact crater rims (volatiles redeposited from the impact shock).",
  "li_195":"<b>Mid-latitudes / longitudes.</b> Ash-grey basalt with subtle variations in albedo from differential weathering. Crater rays visible as bright lineations.",
  "li_196":"<b>Terminator.</b> High contrast under grazing 5370 K G8V light; topographic shadows reveal cratering depth. The terminator band is sharp because the lack of atmosphere produces no scattering.",
  "li_197":"<b>Nightside.</b> Dark grey-black with faint cyan-white sheen from starlight reflecting off regolith. KSP nightside ambient ≈ 0.5% dayside. Visible features: crater rims catching star light at oblique angles.",
  "li_198":"<b>Atmosphere haze.</b> None — the limb is sharp at PQS resolution. The 0.1° Rayleigh scattering halo seen on Mercury in Earth observation is not rendered.",
  "li_199":"<b>Star in sky.</b> τ Ceti subtends 3.17° in g&#x27;s sky (6× the Sun from Earth). The disk is pale-yellow under metal-poor SED, much larger and brighter than the Sun seen from Earth, but somewhat cooler-yellow than Sol due to the lower Teff. Surface illumination at dayside peak is uncomfortably bright but not enough to incandesce the regolith.",
  "li_200":"<b>Sister planets in sky.</b> h (next outward) at angular size ~0.05° in conjunction; f (much further) at ~0.03°. The cold debris disk at ≥ 6 AU is far outside and appears as a faint outer band.",
  "h2_201":"Bibliography",
  "h3_202":"Read (visual-informative, drove decisions above)",
  "li_203":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, <a href=\"https://arxiv.org/abs/1708.02051\">arXiv:1708.02051</a>). Discovery + best constraint on g&#x27;s orbit (P = 20.00 ± 0.02 d), mass (Msini = 1.75 ± 0.25 M⊕), eccentricity (0.06). Anchors every orbital and physical Decisions row.",
  "li_204":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, <a href=\"https://arxiv.org/abs/1801.05415\">arXiv:1801.05415</a>). Confirms 20-day signal stability; controversial flag in NEA reflects amplitude-to-noise concerns.",
  "li_205":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. Capture probabilities for 3:2 vs. 1:1 spin-orbit resonance; supports the 3:2 cfg pick for g at e = 0.06.",
  "li_206":"<b>Makarov V. V. 2018</b> — <i>Tidal locking timescales and 3:2 capture for rocky planets</i>. Figure 7 gives 3:2 capture probability ~50–70% at g&#x27;s parameters.",
  "li_207":"<b>Zahnle K. J. et al. 2017</b> — <i>Cosmic shoreline</i>. Empirical framework for atmospheric retention thresholds; g sits just inside the shoreline for a quiet host, marginal for atmospheric retention.",
  "h3_208":"Read (context / methodology, not directly decision-driving)",
  "li_209":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones</i>. Inner-edge runaway-greenhouse limit for a G8V is ~1.0 S⊕; g at 25.85 S⊕ is far inside.",
  "li_210":"<b>Lawler S. M. et al. 2014</b> — τ Ceti debris disk inclination ~35° (Herschel); adopted by MacGregor et al. 2016 (ALMA) and used here as g&#x27;s orbital plane default.",
  "li_211":"<b>Bolmont E. et al. 2020</b> — Tidal evolution framework; g&#x27;s modest e = 0.06 at 0.133 AU gives ~0.05 W/m² flux.",
  "li_212":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>Evaporation valley</i>. Sub- Neptune envelope retention vs. mass + insolation framework; g is well below the sub-Neptune mass and above the bare-rock retention threshold.",
  "h3_213":"Read (instrument / non-cfg-decisive)",
  "li_214":"<b>Pavlenko Y. V. et al. 2012</b> — host star context.",
  "li_215":"<b>Schmitt J. H. M. M. et al. 1985</b> — host X-ray non-detection.",
  "h3_216":"Not read — no arXiv preprint or low-priority (~12 papers)",
  "li_217":"<b>Tuomi 2013 + 2014 erratum</b> — superseded by Feng 2017.",
  "li_218":"<b>Various SETI / technosignature papers</b> — no cfg relevance.",
  "li_219":"<b>Astrobiology speculation reviews</b> — generally do not individually address g (which is too hot for the conservative habitable category).",
  "h2_220":"Canonical alternatives",
  "h3_221":"Diverged cfg picks",

  "td_226":"<span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span>",
  "td_227":"false (bare-rock Mercury analog)",
  "td_228":"true, thick CO₂ Venus analog (~10 bar, T_surf ~700 K)",
  "td_229":"Both are defensible within the unconstrained window. Mercury-analog gives a visually distinctive cratered bedrock surface; Venus-analog gives an obscured cloud-covered yellow planet visually similar to τ Cet h. Interesting-first picks Mercury-analog to differentiate g visually from h. Venus-analog preserved as cfg variant.",
  "td_230":"<span class=\"field-tt\" data-ko-tip=\"조석 고정 여부. 행성이 모항성에 한 면만 보임 (true/false).\" data-en-tip=\"Tidal locking — same hemisphere always faces the host star (true/false).\"><code>tidally_locked</code></span>",
  "td_231":"maybe (3:2 resonance, 40-d solar day)",
  "td_232":"1:1 fully locked",
  "td_233":"Vinson 2017 / Makarov 2018 give 3:2 capture probability ~50–70% at e = 0.06. The cfg picks 3:2 for visual asymmetry (Mercury analog substellar libration zone vs. uniform thermal field of full lock). 1:1 alternative preserved as cfg variant.",
  "h2_234":"Open items for follow-up",
  "li_235":"<b>Controversial flag (<code>pl_controv_flag = 1</code>).</b> As for f, monitor for retraction by Figueira 2025 or a further ESPRESSO RV reanalysis.",
  "li_236":"<b>True mass.</b> Msini = 1.75 ± 0.25 M⊕; true mass depends on unknown i. Cfg adopts i ≈ 35° from disk → true mass ≈ 3.0 M⊕.",
  "li_237":"<b>Radius is assumed, not measured.</b> R = 1.18 R⊕ from mass– radius relation; unconstrained from below. If true mass is higher and the planet is denser-rocky, R could be 1.05 R⊕ with ρ ≈ 7 g/cc.",
  "li_238":"<b>Venus-analog cfg variant.</b> A 10-bar CO₂ atmosphere with H₂SO₄ clouds is the conservative alternative to the bare-rock pick. Visually it would look similar to τ Cet h — yellow-cream obscured cloud deck — so the cfg picks Mercury-analog for visual differentiation. The variant is preserved.",
  "li_239":"<b>1:1 spin-lock cfg variant.</b> If a future tidal-dissipation modeling campaign refines τ_tidal for super-Earths on metal- poor hosts, the spin-state could be revised. Currently the 3:2 vs. 1:1 question is essentially open.",
  "li_240":"<b>Mineralogy refinement.</b> A metal-poor (Mg/Si elevated) rocky body should be olivine-rich. If future cfg shaders support mineralogy-specific surface tinting, the <code>surface_tint</code> could shift toward olive-grey rather than the current ash-grey default.",
  "li_241":"<b>Trace exosphere.</b> A Mercury-analog Na/K/Si exosphere from photolytic regolith liberation is plausible but not visible at KSP rendering scales. Logged for future cfg refinement.",

  ko: {
  "p_1":"τ Ceti g 는 metal-poor G8V τ Ceti 주위를 20.0 일 주기로 0.133 AU 에서 도는 1.75 M⊕ (M sin i) RV 후보 행성입니다 (Feng 2017, <code>2017AJ....154..135F</code>). 현재 <code>db/systems/tau_cet.json</code> 에 들어 있는 세 행성 중 가장 안쪽이며, 호스트 광도 0.488 L☉ 기준 조사량은 <b>27.59 S⊕</b> — 더 어둡고 차가운 호스트라는 점을 빼면 거의 수성급 조명입니다. 평형 온도는 albedo 0 에서 638 K, 지구형 albedo 에서 584 K 로, H₂O 임계점보다 한참 위이고 일부 광물상의 규산염 기화에 접근합니다. 행성은 NEA 에서 <b>disputed</b> (<code>pl_controv_flag = 1</code>) 로 표시됩니다 — RV 단독, transit 없음, 직접 영상 없음.",
  "p_2":"<b>NearStars 시나리오 선택. 조용한 호스트 XUV 환경에도 불구하고 원시 대기 대부분을 잃은 뜨거운 맨 암석 super-Earth — 광분해 산화 패치를 가진 노출된 규산염 표면, substellar 점 근처에 가능한 규산염-증기 캡, 조용한 G8V 조명 아래 재-그레이 팔레트.</b> 호스트의 metal-poor SED 와 basal XUV 는 대기 탈출이 <i>thermal Jeans 만</i> 이고 hydrodynamic 손실은 없다는 의미지만, 638 K dayside 와 0.13 AU 간격에서는 7 Gyr 동안 저 분자량 종 (H₂O, CH₄) 에 대해 Jeans 탈출도 효율적입니다. 두꺼운 CO₂ Venus-analog 해석 대안은 cfg variant 로 보존. 이 합성은 <b>interesting-first</b> 룰에 따라 시각적으로 구별되는 맨 암석 결과를 픽합니다.",

  "td_159":"지구형 BSE(bulk-silicate-Earth) 방사성 열류속(현재값 ~0.04 W/m²)을 질량으로 스케일. 방법은 Wang et al. 2020 (<code>2020A&amp;A...644A..19W</code>)의 외계행성 방사성 열 프레임워크를 따름. 다만 Eu→Th/U 호스트 원소비 보정은 호스트별 원소비를 큐레이션하지 않아 적용하지 않았고, 대신 지구형 원소비를 가정함",

  "h2_172":"Surface synthesis",
  "p_173":"τ Ceti g 는 <b>맨 암석</b> 영역에 있습니다. 27.59 S⊕ 조사량은 runaway-greenhouse 한계 (Kopparapu 2014 G8V inner edge ~1.0 S⊕) 한참 안쪽에 두지만, Venus 와 달리 g 는 7 Gyr 동안 Jeans 탈출에 맞서 두꺼운 CO₂ 대기를 유지할 2차 탈가스 속도가 부족합니다. 결과를 결정 하는 두 경쟁 효과.",
  "p_174":"1. 호스트 별이 예외적으로 조용함 — log L_X ≤ 26.5 cgs (Schmitt 1985), log R&#x27;HK = −4.95 (Pavlenko 2012), basal FUV (Judge 2004). XUV 구동 hydrodynamic 탈출은 무시 가능. 무거운 분자 (N₂, CO₂, SO₂) 는 blow-off 제한이 아님. 2. 그러나 Teq = 638 K 에서의 thermal Jeans 탈출은 무시할 수 없음. 반지름 1.18 R⊕, 질량 1.75 M⊕ 행성의 탈출 속도는 13.7 km/s. 638 K 에서 N₂ 의 열 속도는 0.67 km/s 로 Jeans 파라미터 21 — 형식적으로는 유지 — 이지만, 상부 대기 유효 온도 (얇은/무대기 영역에서 일반적으로 표면의 2–4×) 에서는 Jeans 파라미터가 ~5–10 으로 떨어져 Gyr 시간 척도에 걸친 marginal-loss 범위.",
  "p_175":"cfg 는 <b>interesting-first</b> 결과를 채택합니다 — 맨 암석 무대기. Venus-analog 대안보다 시각적으로 더 구별되는 수성-analog 를 만들고 시스템 맥락과 잘 맞습니다 — τ Ceti 의 가장 안쪽 행성은 바깥쪽 행성 들과 달라 보여야 하고, &quot;g 는 대기를 잃고 h 는 두꺼운 CO₂ envelope 을 유지&quot; 는 시각적으로 유익한 시스템 내 대비입니다.",
  "p_176":"표면은 지질학적 시간 척도로 재포장되지 않은, 충돌구가 가득한 기반암. 조석 가열 (0.133 AU 에서 e = 0.06) 은 적당함 (~0.05 W/m², Io 의 2 W/m² 한참 아래) 이며 활성 화산을 구동하지 않습니다. 방사성 가열은 지구형 0.04 W/m². 결합한 내부 플럭스는 유체 맨틀이나 지속 dynamo 를 유지하기엔 너무 낮지만, 시스템 나이에 걸쳐 원시 열을 천천히 흘려 보내기엔 충분합니다.",
  "p_177":"<b>색 선택 — 재-그레이 현무암 regolith.</b> 수성과 달은 무대기 체의 풍화되지 않은 규산염 regolith 에 대한 경험적 템플릿을 제공합니다 — 둘 다 ejecta 나 철 부족 현무암에서 오는 국지적 밝은 패치와 함께 지배적으로 어두운 그레이 (<span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code> 에서 <span class=\"hex-chip\" style=\"background:#8c8478\"></span><code>#8c8478</code>). τ Ceti g 에서는 metal-poor 원시 먼지가 ([Fe/H] = −0.55 호스트로부터) 태양 주위보다 원래 입자 모집단의 철-염색이 덜했을 것임을 시사하며 — cfg 픽 <span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code> 은 Sol-system 수성 기준보다 살짝 더 깨끗한 재-그레이로, 황토 대신 그레이 쪽으로 편향. 광분해 산화철 풍화가 substellar 영역에 7 Gyr 동안 누적되어 ~5% 표면적 수준의 국지적 녹슨 갈색 패치 (<span class=\"hex-chip\" style=\"background:#8a4a30\"></span><code>#8a4a30</code>) 를 줍니다 — 균일 그레이 대안 위에 시각적 차별성을 더하는 tie-break.",
  "p_178":"<b>광물학 노트.</b> 관측 없이 광물학은 형성에서 추론. metal-poor G 왜성 의 iceline 안쪽에서 형성된 2 M⊕ 암석체는 Mg/Si ≈ 1.1–1.2 (Fe 가 고갈되어 살짝 상승) 를 가져 plagioclase 우세 melt 보다 olivine 과 pyroxene 을 선호. olivine 풍부 현무암 regolith 는 지구 현무암보다 살짝 더 푸른-그레이로 보일 것이며, cfg 픽은 hex 수준에서 이를 인코딩하지 않지만 표면 형태 산문이 힌트를 줍니다.",
  "p_179":"<b>규산염-증기 캡 없음.</b> 700 K dayside 온도에서 규산염 증기압은 10⁻⁶ bar 한참 아래 (규산염 응결 온도 ~1500–2000 K). g 는 뜨겁지만 마그마 바다 만큼은 아님. substellar 규산염-증기 구름 렌더링 없음.",
  "h2_180":"Atmosphere synthesis",
  "p_181":"cfg 는 <b>bulk 대기 없음</b> 을 채택합니다. 논리는 위의 Surface synthesis 에 있음 — 638 K Teq 에서 적당한 상부 대기 가열로 thermal Jeans 탈출이 2 M⊕ 체에서 N₂ 와 CO₂ 를 7 Gyr 에 걸쳐 흘려보내고, 조용한 호스트가 의미 있는 광화학 보충을 만들지 못함. 따라서 대기는 사라질 정도로 얇음 — substellar 핫스팟 regolith 에서 광분해로 풀려난 Na, K, Si, O 의 수성-analog 외기권으로, 표면 스케일에서 동역학적으로 ballistic 하며 정수압 평형이 아님.",
  "p_182":"<b>전구 Rayleigh 안개 없음.</b> cfg <span class=\"field-tt\" data-ko-tip=\"대기 limb (가장자리) 색조 hex.\" data-en-tip=\"Atmospheric limb tint as a hex color.\"><code>atmosphere_tint_rgb_hex</code></span> 는 <span class=\"hex-chip\" style=\"background:#000000\"></span><code>#000000</code> (감지 불가) 이고 림은 PQS 해상도에서 또렷.",
  "p_183":"<b>하늘 모습.</b> 표면에서 하늘은 검고, 호스트 별이 3.17° 각지름으로 지배 — 지구에서 본 태양 각지름의 약 6×. 표면은 substellar 점에서 27.59 S⊕ 의 옅은 노랑 G8V 조명을 받고, dayside 표면 온도는 700 K 초과. 호스트 빛을 산란하는 대기가 없으므로 dayside 에도 다른 별들이 쉽게 보임. 밤하늘은 달과 비슷하며 deep field 별들이 전 magnitude 로 보임. 호스트의 metal-poor SED 는 태양 스펙트럼보다 살짝 더 깨끗한 옅은 노랑 색을 만들어 marginal 하게 덜 따뜻한 원반으로 감지됨.",
  "p_184":"<b>Counterfactual — Venus-analog cfg variant.</b> &quot;g 가 Venus, h 가 Mercury&quot; 대안 시스템 설명에 흥미가 있는 독자는 둘을 바꿀 수 있음. 그러나 주기와 조사량 순서 (g 가 가장 뜨겁고, h 가 다음, f 가 가장 차가움) 는 Venus 급 runaway-greenhouse 를 h (살짝 더 시원한 7.7 S⊕ 이웃) 에 두는 게 최선임을 의미. 탈가스 속도가 지속 두꺼운 CO₂ 대기를 지지함. 수성-analog g 가 물리적으로 더 방어 가능한 픽.",
  "h2_185":"Rotation &amp; spin synthesis",
  "p_186":"τ Ceti g 의 spin 상태는 세 행성 중 가장 불확실합니다. 두 경쟁 시나리오.",
  "p_187":"1. <b>3:2 spin-orbit 공명 (수성 analog).</b> e = 0.06 에서 3:2 포획 확률 은 ~50–70% (Makarov 2018 Figure 7, 이 주기와 이심률의 super-Earth 질량체). 3:2 포획은 libration 영역들 간 상당한 열 비대칭을 가진 40 일 태양일을 만듦. 2. <b>비동기 느린 자전자.</b> 3:2 포획이 실패했다면 행성은 원시 주기 (시간에서 일까지 어디든 가능) 로 자전하며 3:2 나 1:1 쪽으로 꾸준한 damping. 이 궤도 주기에서 7 Gyr 에 걸친 damping 은 거의 완성에 가까울 것.",
  "p_188":"cfg 는 <b>3:2 (수성 analog)</b> 를 interesting-first 픽으로 채택. 40 일 태양일은 표면 온도의 상당한 일주 사이클 (subsolar 가 태양일에 걸쳐 200 → 700 → 200 K 사이를 swing) 을 만들고, 표면을 가로지르는 시각 적으로 구별되는 열 비대칭을 만듦. 1:1 고정 대안은 Open item 의 cfg variant 로 보존.",
  "p_189":"<b>KSP 구현 노트.</b> 3:2 의 경우. <code>rotationPeriod</code> = (2/3) × 궤도 주기 = 13.33 일 (1.152×10⁶ s). 1:1 대안은 20 일 (1.728×10⁶ s).",
  "p_190":"<b>Obliquity.</b> 7 Gyr 조석 damping 은 obliquity 를 0 으로 끌어내릴 것. cfg 는 0° 채택. libration 유도 조사량 변동 (e = 0.06 에서 ~12%) 은 20 일 궤도 주기에 걸쳐 적당한 &quot;계절&quot; 을 주지만 — 밝아짐/식어짐 사이클로는 감지되어도 반구 계절로는 아님.",
  "p_191":"<b>자기 dynamo 기대치.</b> 1.75 M⊕ 체에 3:2 느린 자전 (~40 일 태양일) 과 아마도 차가운 내부는 전구 dynamo 를 유지하기 어려움. 수성의 dynamo 는 부분적으로 녹은 코어에 의해 비정상적으로 유지됨. 같은 것이 metal-poor super-Earth 에 적용되는지는 불분명. cfg 는 비관적 으로 활성 dynamo 없음 + ~0.5 μT 의 수성-analog 외피 잔재 자기장 가능을 가정.",
  "h2_192":"Visual styling",
  "li_193":"<b>전구 외관.</b> substellar libration 영역 근처에 국지적 녹슨 갈색 풍화 패치 (<span class=\"hex-chip\" style=\"background:#8a4a30\"></span><code>#8a4a30</code>) 를 가진 어두운 재-그레이 암석 세계 (<span class=\"hex-chip\" style=\"background:#6c655c\"></span><code>#6c655c</code>). 충돌구가 많고, 더 젊은 충돌의 ray 시스템이 보임. 시각 캐릭터는 살짝 큰 수성에 가장 가까움 — 거의 무대기, 어둡고, 충돌구가 많음.",
  "li_194":"<b>Substellar 영역 (libration 존).</b> 가장 가열됨, 가장 오래된 산화 패치가 여기 집중. 녹슨 갈색 풍화가 기본 재-그레이 위에 ~5% 표면적 패치로 PQS 해상도에서 보임. 가장 큰 충돌구 림 근처에 규산염-증기-증착된 밝은 패치 가능 (충격에서 휘발성 재증착).",
  "li_195":"<b>중위도 / 경도.</b> 차등 풍화에서 오는 albedo 의 미세한 변동을 가진 재-그레이 현무암. 충돌구 ray 가 밝은 lineation 으로 보임.",
  "li_196":"<b>Terminator.</b> grazing 5370 K G8V 빛 아래 높은 대비. 지형 그림자 가 충돌구 깊이를 드러냄. 대기 부재가 산란을 만들지 않으므로 terminator 밴드는 또렷함.",
  "li_197":"<b>Nightside.</b> 별빛이 regolith 에 반사되는 희미한 cyan-white 광택과 함께 어두운 그레이-블랙. KSP nightside 환경광 ≈ dayside 의 0.5%. 보이는 피처. 충돌구 림이 비스듬한 각도에서 별빛을 잡음.",
  "li_198":"<b>대기 안개.</b> 없음 — 림은 PQS 해상도에서 또렷. 지구 관측에서 수성이 보이는 0.1° Rayleigh 산란 후광은 렌더링하지 않음.",
  "li_199":"<b>하늘의 별.</b> τ Ceti 는 g 하늘에서 3.17° 를 채움 (지구에서 본 태양의 6×). 원반은 metal-poor SED 아래 옅은 노랑이며, 지구에서 본 태양보다 한참 크고 밝지만 더 낮은 Teff 때문에 다소 더 차가운 노랑. dayside 피크의 표면 조명은 불편할 정도로 밝지만 regolith 를 백열시킬 정도는 아님.",
  "li_200":"<b>하늘의 자매 행성들.</b> h (바깥쪽 다음) 는 합 위치에서 각지름 ~0.05°. f (훨씬 더 멀음) 는 ~0.03°. ≥ 6 AU 의 차가운 잔해 원반은 한참 바깥에 있고 희미한 외곽 띠로 보임.",
  "h2_201":"Bibliography",
  "h3_202":"Read (visual-informative, drove decisions above)",
  "li_203":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, <a href=\"https://arxiv.org/abs/1708.02051\">arXiv:1708.02051</a>). 발견 + g 궤도 (P = 20.00 ± 0.02 d), 질량 (Msini = 1.75 ± 0.25 M⊕), 이심률 (0.06) 의 최선 제약. 모든 궤도 및 물리 Decisions 행을 정박.",
  "li_204":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, <a href=\"https://arxiv.org/abs/1801.05415\">arXiv:1801.05415</a>). 20 일 신호 안정성 확인. NEA 의 controversial 플래그는 amplitude-to-noise 우려 반영.",
  "li_205":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. 3:2 vs. 1:1 spin-orbit 공명 포획 확률. e = 0.06 의 g 에 대한 3:2 cfg 픽을 지지.",
  "li_206":"<b>Makarov V. V. 2018</b> — <i>Tidal locking timescales and 3:2 capture for rocky planets</i>. Figure 7 이 g 의 파라미터에서 3:2 포획 확률 ~50–70% 를 줌.",
  "li_207":"<b>Zahnle K. J. et al. 2017</b> — <i>Cosmic shoreline</i>. 대기 유지 임계값의 경험적 프레임워크. g 는 조용한 호스트의 shoreline 바로 안쪽에 위치, 대기 유지로는 marginal.",
  "h3_208":"Read (context / methodology, not directly decision-driving)",
  "li_209":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones</i>. G8V 의 inner-edge runaway-greenhouse 한계는 ~1.0 S⊕. 25.85 S⊕ 의 g 는 한참 안쪽.",
  "li_210":"<b>Lawler S. M. et al. 2014</b> — τ Ceti 잔해 원반 경사 ~35° (Herschel). MacGregor et al. 2016 (ALMA) 이 채택했고 여기서는 g 의 궤도면 기본값으로 사용.",
  "li_211":"<b>Bolmont E. et al. 2020</b> — 조석 진화 프레임워크. g 의 적당한 e = 0.06 가 0.133 AU 에서 ~0.05 W/m² 플럭스.",
  "li_212":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>Evaporation valley</i>. sub-Neptune envelope 유지 vs. 질량 + 조사량 프레임워크. g 는 sub-Neptune 질량 한참 아래이고 맨 암석 유지 임계값 위.",
  "h3_213":"Read (instrument / non-cfg-decisive)",
  "li_214":"<b>Pavlenko Y. V. et al. 2012</b> — 호스트 별 맥락.",
  "li_215":"<b>Schmitt J. H. M. M. et al. 1985</b> — 호스트 X 선 미검출.",
  "h3_216":"Not read — no arXiv preprint or low-priority (~12 papers)",
  "li_217":"<b>Tuomi 2013 + 2014 erratum</b> — Feng 2017 로 대체.",
  "li_218":"<b>SETI / technosignature 논문 다수</b> — cfg 관련성 없음.",
  "li_219":"<b>천체생물학 추측 리뷰</b> — 일반적으로 g 를 개별 다루지 않음 (보수적 거주가능 범주에는 너무 뜨거움).",
  "h2_220":"Canonical alternatives",

  "td_227":"false (맨 암석 수성 analog)",

  "td_229":"둘 다 미제약 윈도우 안에서 방어 가능. 수성-analog 는 시각적으로 구별되는 충돌구 기반암 표면을 줌. Venus-analog 는 τ Cet h 와 시각적으로 비슷한 구름 가린 노랑 행성을 줌. interesting-first 가 g 를 h 와 시각적으로 구분하기 위해 수성-analog 픽. Venus-analog 는 cfg variant 로 보존.",
  "td_230":"<span class=\"field-tt\" data-ko-tip=\"조석 고정 여부. 행성이 모항성에 한 면만 보임 (true/false).\" data-en-tip=\"Tidal locking — same hemisphere always faces the host star (true/false).\"><code>tidally_locked</code></span>",
  "td_231":"가능 (3:2 공명, 40 일 태양일)",
  "td_232":"1:1 완전 고정",
  "td_233":"Vinson 2017 / Makarov 2018 이 e = 0.06 에서 3:2 포획 확률 ~50–70% 를 줌. cfg 는 시각 비대칭 (수성 analog substellar libration 존 vs. 완전 고정의 균일 열장) 을 위해 3:2 픽. 1:1 대안은 cfg variant 로 보존.",
  "h2_234":"Open items for follow-up",
  "li_235":"<b>Controversial 플래그 (<code>pl_controv_flag = 1</code>).</b> f 와 마찬가지로 Figueira 2025 또는 추가 ESPRESSO RV 재분석에 의한 철회 모니터링.",
  "li_236":"<b>실제 질량.</b> Msini = 1.75 ± 0.25 M⊕. 실제 질량은 미지의 i 에 의존. cfg 는 원반에서 i ≈ 35° 채택 → 실제 질량 ≈ 3.0 M⊕.",
  "li_237":"<b>반지름은 가정 값, 측정 아님.</b> mass-radius 관계에서 R = 1.18 R⊕. 아래쪽으로 미제약. 실제 질량이 더 크고 행성이 더 밀도 높은 암석 이라면 R 은 1.05 R⊕ 까지 가능하며 ρ ≈ 7 g/cc.",
  "li_238":"<b>Venus-analog cfg variant.</b> H₂SO₄ 구름을 가진 10-bar CO₂ 대기가 맨 암석 픽에 대한 보수적 대안. 시각적으로는 τ Cet h 와 비슷해 보일 것 — 노랑-크림 가려진 구름 데크 — 그래서 cfg 는 시각 차별성을 위해 수성-analog 픽. variant 는 보존.",
  "li_239":"<b>1:1 spin-lock cfg variant.</b> metal-poor 호스트의 super-Earth 에 대한 미래 조석 소산 모델링 캠페인이 τ_tidal 을 정제하면 spin 상태가 수정될 수 있음. 현재는 3:2 vs. 1:1 질문이 본질적으로 열려 있음.",
  "li_240":"<b>광물학 정제.</b> metal-poor (Mg/Si 상승) 암석체는 olivine 풍부 여야 함. 미래 cfg shader 가 광물학-특이 표면 틴팅을 지원하면 <code>surface_tint</code> 가 현재 재-그레이 기본값 대신 올리브-그레이로 이동할 수 있음.",
  "li_241":"<b>미량 외기권.</b> 광분해 regolith 해방에서 오는 수성-analog Na/K/Si 외기권이 plausible 하지만 KSP 렌더링 스케일에서 보이지 않음. 미래 cfg 정제를 위해 로깅.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
