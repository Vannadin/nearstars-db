  "h2_89":"Surface synthesis",
  "p_90":"The photosphere of 40 Eridani C is the cool red surface of a late-M main-sequence dwarf — T_eff = 3167 K places it firmly in the partially convective transition regime where the radiative core is small or vanishing. At M = 0.2041 M☉ the star sits just above the fully- convective limit (≈ 0.35 M☉ for hydrogen-burning main-sequence stars); modern stellar-interior models (Chabrier &amp; Baraffe 1997, Baraffe 2015) predict that a thin radiative core may persist but most of the envelope&#x27;s heat transport is convective. This convective regime is the proximate driver of the strong magnetic dynamo and the persistent H-alpha emission that gives C its DY Eri variable designation.",
  "p_91":"The visible disk shows the canonical late-M molecular-band spectrum: strong TiO bands in the optical (heaviest near 705 nm, the γ-band heads dominating C&#x27;s red-orange appearance), VO absorption in the yellow, and FeH features in the near-IR. Continuum opacity from H⁻ peaks in the H-band region. The integrated Planck-locus color at 3167 K is in the warm red-orange region of CIE chromaticity (xy ≈ 0.55, 0.40); H-alpha emission contributes a narrow red boost at 656 nm.",
  "p_92":"Mann et al. 2015 specifically flag Gl 166 C as one of three stars where the BT-Settl model atmosphere disagrees with their empirical T_eff / R determination by more than the typical floor (Mann 2015 §5.4, around the discussion of Figure 16). The other two are PM I10430-0912 and EQ Peg B (Gl 896 B). Why this matters for Phase 3: the radius and T_eff we adopt are paper-measured (M_K relation + F_bol integration), not model-fit; the Mann 2015 Table 7 Dartmouth model fit would give R = 0.242 R☉ and T_eff = 3362 K — both ≈ 11–13% discrepant from the empirical row, which is exactly the M-dwarf model bias the Mann paper documents. The DB Phase 2 recommended entries are the empirical Table 5 row.",
  "p_93":"Spot coverage is large and animated, as expected for an active M4.5 V. Mann 2015 measures Hα equivalent-width emission across the 178-star sample but reports the GJ 166 C value as a single epoch only; the multi-survey scatter is pEW ≈ -2 to -4 Å (Schöfer 2019, Newton 2017, Reiners 2018) — implying tens of percent variability between epochs. A hypothetical observer near C&#x27;s habitable zone would see large starspots covering 10-30% of the disk during activity maxima, with plage-bright active regions and the occasional kilo-Gauss-scale flare flux outburst visible as a localized brightening of a few percent at optical wavelengths (canonical for M4.5 V flare stars, e.g. EV Lac, AD Leo).",
  "p_94":"The slight metal-poor [Fe/H] = -0.21 has only a modest effect on the SED — the BT-Settl grid at [Fe/H] = -0.2 vs solar predicts a Teff shift of ~30 K equivalent reddening, well within the curated 61 K uncertainty. C&#x27;s [Fe/H] is consistent within 1.5 sigma with the 40 Eri A value (-0.31, Sousa 2008), supporting system-coeval origin.",
  "h2_95":"Atmosphere synthesis",
  "p_96":"40 Eri C hosts a fully chromospherically active M-dwarf atmosphere typical of late-M flare stars. The chromosphere is filled with Hα, Ca II H&amp;K, Hβ, He I D3, and a wide range of UV emission lines (Mg II h&amp;k visible in the GALEX FUV, Lyα accessible to HST/STIS). The DY Eri variable designation reflects multi-decade ground-based monitoring showing photometric flares and persistent Hα emission across the chromospheric activity cycle.",
  "p_97":"X-ray emission is bright but quantitatively under-constrained for this synthesis. The ROSAT All-Sky Survey detected the BC pair but the 0.1–2.4 keV soft component blends contributions from C&#x27;s chromospheric corona and B&#x27;s photospheric thermal X-rays. A quantitative log L_X / L_bol for 40 Eri C alone is not currently in our bibliography; the qualitative expectation for an M4.5 V at this age is log L_X / L_bol ≈ -3 to -4 (typical M-dwarf activity sequence, e.g. Wright et al. 2011, Schmitt &amp; Liefke 2004), with cycle amplitude factor ~few. Flare X-ray peaks an order of magnitude above the quiescent level. The Open items list flags isolated-component X-ray measurement as a follow-up target.",
  "p_98":"The transition region produces a Lyman-α continuum + Lyα line typical of M4–M5 active stars; surface flux is several × 10⁵ erg s⁻¹ cm⁻² quiescent, with flare enhancement up to two orders of magnitude. Integrated XUV (10–100 nm) luminosity over Gyr timescales is significant for any potential planet — France et al. 2016 (MUSCLES) finds that active M4–M5 dwarfs deliver Earth-comparable cumulative XUV doses despite their lower bolometric luminosity, because their quiescent XUV / L_bol ratio is ~10⁴ × the solar value. No planets are curated around C; this regime informs only the system-level activity context.",
  "p_99":"C has no surface to constrain via atmosphere-photochemistry coupling (it&#x27;s a star). The &quot;atmosphere&quot; here refers to the chromosphere – transition region – corona structure, animated by the magnetic dynamo. The cfg implication: any future planet candidate around C would inherit a strong XUV environment from the chromospheric model, and reentry-effect renderers should saturate red wavelengths to reflect the Hα-dominated optical spectrum.",
  "h2_100":"Rotation &amp; spin synthesis",
  "p_101":"The rotation period is genuinely uncertain. Shan et al. 2024 (CARMENES VII) report a CARMENES activity-indicator time-series period of 8.56 d for Karmn J04153-076 = GJ 166 C, but classify the detection with quality flag D (&quot;debated&quot;; per Sect. 4 of the paper, 27 of 166 detected periods are debated and 68 are provisional). The Phase 2 DB records this in <code>meta_notes</code> only — there is no <code>rotation_measurements</code> recommended:true entry. An earlier 2026-05-27 working-note attribution to &quot;Kemmer 2025 ~137 d&quot; was retracted on cross-check: Y. Shan is first author of the actual paper (Kemmer is the 22nd of 47 co-authors), the year is 2024 not 2025, and the period differs by ~16×.",
  "p_102":"For NearStars purposes, the <b>cfg rotation period field for C is N/A</b>. Downstream cfg writers should leave the period unset and mark it as an explicit gap, or use an interesting-first placeholder (e.g. 9 d) with a clear cfg-level note that this is a tie-break within Shan 2024&#x27;s allowed window. Independent verification — via TESS short-cadence photometry, RV modulation phase-folding, or ZDI spectropolarimetry — would convert the entry from <code>n/a</code> to <code>recommended:false</code> then to <code>recommended:true</code> in a future pass.",
  "p_103":"A separate Phase 3 narrative point: 40 Eri C&#x27;s rotation state may preserve a fossil signature of mass transfer from B&#x27;s progenitor. Bond et al. 2017 §6.2 explicitly cites Fuhrmann et al. 2014 — the suggestion that C &quot;may have been spun up to a higher rotational velocity by accretion during the AGB phase of [40 Eri] B&quot;. The 40 Eri B progenitor had M_initial ≈ 1.8 M☉ and ascended the AGB before losing its envelope; some fraction of the lost envelope likely missed the WD remnant and could have been captured by C sitting at ≈ 33 AU. If a debated short-period rotation (8.56 d or similar) is eventually confirmed, this would qualitatively support the AGB-spin-up scenario. The cfg should encode this as a narrative hint rather than a quantitative rotation-rate prediction.",
  "p_104":"Obliquity is unconstrained; for visual rendering NearStars adopts a randomly-oriented spin axis, plausibly tilted ~30° to the BC orbital plane (analogous to other long-lived MS+WD binaries where tidal synchronization at 33 AU separation is negligible).",
  "h2_105":"Visual styling",
  "p_106":"In the NearStars renderer, 40 Eridani C is portrayed as a small, warm red-orange M4.5 V flare star — Planck-locus blackbody at 3167 K gives a base color near <span class=\"hex-chip\" style=\"background:#d97f4a\"></span><code>#d97f4a</code> (warm red-orange, CIE xy ≈ 0.55, 0.40); the Hα 656 nm emission pushes the perceived tint slightly further toward saturated red. The tie-break Confidence: low call is <i>interesting-first</i>: a range of reasonable hex values lie within the 3167 K Planck locus envelope, and the saturated red-orange option makes C visually distinct from the K0.5 V primary A (warm yellow- orange) and the blue-white WD B in mixed system renders.",
  "p_107":"At 5.01 pc viewed from Earth, V = 11.17 places 40 Eri C below the naked-eye limit but well within reach of small telescopes. From a hypothetical observer at C&#x27;s habitable-zone distance (≈ 0.1 AU based on L = 6.51e-3 L☉), the star fills an angular diameter of ~1.5° (2 R★ / a) — about three times the Sun&#x27;s apparent size from Earth. Disk features include large starspots (10–30% coverage during activity maxima), occasional flare brightenings at the few-percent optical level, and a strong red-orange limb darkening characteristic of the molecular-band atmosphere.",
  "p_108":"The companion B at 33 AU mean separation (BC orbit Mason 2017, e = 0.4300 → periastron ~19 AU, apastron ~47 AU) appears as a brilliant blue-white point of extraordinary brightness. With B&#x27;s M_V ≈ 11.0 (DA WD, T_eff ≈ 17,200 K), from a C-orbiting observer at 33 AU B&#x27;s apparent magnitude is roughly V ≈ -13 (mag = M_V + 5·log₁₀(33 AU / 10 pc) ≈ 11.0 − 24). Comparable to the full Moon at Earth in brightness — a small, intense blue-white point overwhelmingly dominant against C&#x27;s red illumination at conjunctions and still prominent at apastron (V ≈ -12). The orbital motion swings B visibly across the C-sky over decade-to-century timescales.",
  "p_109":"The primary A at ~2000 AU mean separation appears as a much fainter but still naked-eye orange &quot;distant sun&quot; — A&#x27;s M_V ≈ 5.9 with the distance modulus to 2000 AU gives apparent V ≈ -9 (mag = 5.9 − 15), still vastly brighter than any planet seen from Earth but on a strikingly different scale from B. The K0.5 V T_eff ≈ 5126 K provides a clear orange tint. The triple appears in C&#x27;s sky as: nearby C-disk illumination (the dominant red light source), a near-stellar blue-white searchlight (B), and a more distant orange point-source A — three light sources on widely different intensity and time scales (B moves visibly over decades, A is effectively fixed on human timescales given the ~8000-yr A-BC orbit).",
  "p_110":"Flare events drive Firefly-cfg-side plasma color choices: an active M4.5 V flare-star produces optical flare spectra dominated by Hα + Hβ + Ca II emission, biasing reentry plasma toward saturated red/ pink palettes during peak flare flux. The exact palette assembly is firefly-cfg-skill territory (see the periodic table of plasma colors in <code>firefly-cfg/</code>) but the Phase 3 hint here is: <b>prefer strong red over generic white plasma effects in C&#x27;s vicinity</b>, with optional Hα-red flare-event accent triggered on a DY Eri-class variability cadence (sub-hour rise, hours-decay flare profile).",
  "p_111":"Starspots, faculae, and prominences are rendered at active-M-dwarf scale during the (uncertain) activity cycle, with the cycle phase deferred until a paper-confirmed cycle period exists.",
  "h2_112":"Bibliography",
  "h3_113":"Read (decision-driving)",
  "li_114":"<b>Mason B. D., Hartkopf W. I., Miles K. N. 2017</b> — <i>Binary Star Orbits. V. The Nearby White Dwarf/Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, <a href=\"https://arxiv.org/abs/1707.03635\">arXiv:1707.03635</a>, DOI 10.3847/1538-3881/aa803e). Updated 230.09-yr BC visual- spectroscopic orbit; mass sum 0.776 ± 0.024 M☉, e = 0.4300, a = 6.93″. With Heintz 1974 mass ratio gives M_C = 0.2041 ± 0.0064 M☉. <b>Primary anchor for the C dynamical mass.</b>",
  "li_115":"<b>Mann A. W., Feiden G. A., Gaidos E., Boyajian T., von Braun K. 2015</b> — <i>How to Constrain Your M Dwarf: Measuring Effective Temperature, Bolometric Luminosity, Mass, and Radius</i>, ApJ 804, 64 (<code>2015ApJ...804...64M</code>, <a href=\"https://arxiv.org/abs/1501.01635\">arXiv:1501.01635</a>, DOI 10.1088/0004-637X/804/1/64). Empirical M-dwarf calibration; Table 5 &#x27;Gl 166 C&#x27; row gives R = 0.274 ± 0.011 R☉, T_eff = 3167 ± 61 K, [Fe/H] = -0.21 ± 0.08, and Hα EW. <b>Primary anchor for radius / T_eff / [Fe/H].</b> Table 7 Dartmouth model fit (R = 0.242, T_eff = 3362) is preserved as a documented sample-level model bias datapoint (§5.4 + Figure 16).",
  "li_116":"<b>Cifuentes C., Caballero J. A., Cortés-Contreras M. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. V. Luminosities, colours, and spectral energy distributions</i>, A&amp;A 642, A115 (<code>2020A&amp;A...642A.115C</code>, <a href=\"https://arxiv.org/abs/2007.15077\">arXiv:2007.15077</a>, DOI 10.1051/0004-6361/202038295). Multi-band SED integration for the CARMENES M-dwarf sample; Karmn J04153-076 = GJ 166 C entry (VizieR J/A+A/642/A115) gives L = (6.51 ± 0.13) × 10⁻³ L☉. <b>Primary anchor for luminosity.</b>",
  "li_117":"<b>Bond H. E., Bergeron P., Bédard A. 2017</b> — <i>The aged Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, <a href=\"https://arxiv.org/abs/1709.00478\">arXiv:1709.00478</a>, DOI 10.3847/1538-4357/aa8a63). HST/COS UV spectroscopy of 40 Eri B; full system reanalysis. §6.2 IFMR (Salaris et al. 2009, M_final = 0.134 M_initial + 0.331) implies M_progenitor ≈ 1.8 M☉ for B, giving system-coeval total age ≈ 1.8 Gyr. Same section cites Fuhrmann et al. 2014 on the AGB-mass-transfer spin-up scenario for C. <b>Primary anchor for age + AGB-spin-up narrative.</b>",
  "li_118":"<b>Shan Y., Reiners A., Fabbian D. et al. 2024</b> — <i>The CARMENES search for exoplanets around M dwarfs. VII. Photospheric rotation periods from the activity time series of 166 M dwarfs</i>, A&amp;A 684, A9 (<code>2024A&amp;A...684A...9S</code>, <a href=\"https://arxiv.org/abs/2401.09550\">arXiv:2401.09550</a>, DOI 10.1051/0004-6361/202346794). CARMENES activity-indicator time-series; Karmn J04153-076 P_rot = 8.56 d, quality flag D (&quot;debated&quot;). 27 of 166 periods are debated, 68 are provisional. <b>Recorded in DB meta_notes only — not a recommended measurement.</b>",
  "h3_119":"Read (context / methodology)",
  "li_120":"<b>Heintz W. D. 1974</b> — <i>Astrometric study of four visual binaries</i>, AJ 79, 819 (<code>1974AJ.....79..819H</code>). Provides the historic BC mass ratio used by Mason 2017 to split the mass sum.",
  "li_121":"<b>van Leeuwen F. 2007</b> — <i>Validation of the new Hipparcos reduction</i>, A&amp;A 474, 653 (<code>2007A&amp;A...474..653V</code>). Parallax used by Mason 2017 dynamical mass derivation.",
  "li_122":"<b>Cummings J. D., Kalirai J. S., Tremblay P.-E. et al. 2018</b> — <i>The white dwarf initial–final mass relation for progenitor masses up to 7.5 M☉</i>, ApJ 866, 21. IFMR used by Bond 2017 for the progenitor mass inversion of 40 Eri B.",
  "li_123":"<b>Fuhrmann K., Chini R., Buda L.-S. &amp; Pozo Nuñez F. 2014</b> — <i>On the Age of Gliese 86</i>, ApJ 785, 68 (<code>2014ApJ...785...68F</code>, DOI 10.1088/0004-637X/785/1/68). Primarily an age determination of the Gl 86 K+WD binary, with 40 Eri C cited as an analog case where the M-dwarf companion&#x27;s &quot;considerable projected rotational velocity&quot; is attributed to mass loss from a degenerate companion&#x27;s prior AGB phase. Cited by Bond 2017 §6.2 for the same spin-up hypothesis applied to 40 Eri C.",
  "li_124":"<b>Tokovinin A. 2018</b> — <i>The updated multiple-star catalog</i>, ApJS 235, 6 (<code>2018ApJS..235....6T</code>). Lists the A-BC pair as unfitted with ~8000-yr outer orbit.",
  "li_125":"<b>Burrows A. et al. 2024</b> — <i>The Death of Vulcan: NEID Reveals That the Planet Candidate Orbiting HD 26965 Is Stellar Activity</i>, AJ 167, 243 (<code>2024AJ....167..243B</code>, DOI 10.3847/1538-3881/ad34d5). NEID precision RV monitoring of HD 26965 (= 40 Eri A); refutes the Ma 2018 &quot;Vulcan&quot; planet candidate, attributing the ~42-day signal to rotationally modulated stellar activity (spots + convective blueshift suppression). Not directly about C but establishes the planet-free status of the system.",
  "li_126":"<b>Kopparapu R. K., Ramirez R. M., SchottelKotte J. et al. 2014</b> — <i>Habitable zones around main-sequence stars: dependence on planetary mass</i>, ApJ 787, L29 (<code>2014ApJ...787L..29K</code>, <a href=\"https://arxiv.org/abs/1404.5292\">arXiv:1404.5292</a>). HZ boundary scaling used to derive 40 Eri C&#x27;s HZ context values.",
  "h3_127":"Read (instrument / non-cfg-decisive)",
  "li_128":"<b>Schöfer P., Jeffers S. V., Reiners A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Activity indicators at visible and near-infrared wavelengths</i>, A&amp;A 623, A44 (<code>2019A&amp;A...623A..44S</code>, <a href=\"https://arxiv.org/abs/1903.06803\">arXiv:1903.06803</a>). CARMENES Hα EW time series; GJ 166 C is in the sample. Used for the Hα pEW range -2 to -4 Å (DB meta_notes).",
  "li_129":"<b>Newton E. R., Mondrik N., Irwin J. et al. 2017</b> — <i>New rotation period measurements for M dwarfs in the southern hemisphere</i>, AJ 154, 224 (<code>2017AJ....154..224N</code>, <a href=\"https://arxiv.org/abs/1611.04857\">arXiv:1611.04857</a>). MEarth- South photometric rotation periods; one of several survey Hα cross-references.",
  "li_130":"<b>Reiners A., Zechmeister M., Caballero J. A. et al. 2018</b> — <i>The CARMENES search for exoplanets around M dwarfs. High- resolution optical and near-infrared spectroscopy of 324 survey stars</i>, A&amp;A 612, A49 (<code>2018A&amp;A...612A..49R</code>, <a href=\"https://arxiv.org/abs/1711.06576\">arXiv:1711.06576</a>). CARMENES instrument paper; GJ 166 C parameter row.",
  "li_131":"<b>Wright N. J., Drake J. J., Mamajek E. E., Henry G. W. 2011</b> — <i>The stellar-activity-rotation relationship and the evolution of stellar dynamos</i>, ApJ 743, 48 (<code>2011ApJ...743...48W</code>). M-dwarf log L_X / L_bol calibration used qualitatively.",
  "li_132":"<b>France K., Loyd R. O. P., Youngblood A. et al. 2016</b> — <i>The MUSCLES treasury survey. I. Motivation and overview</i>, ApJ 820, 89 (<code>2016ApJ...820...89F</code>, <a href=\"https://arxiv.org/abs/1602.09142\">arXiv:1602.09142</a>). Context for XUV environment around active M dwarfs.",
  "h3_133":"Not read — no arXiv preprint or low-priority (~12 papers)",
  "p_134":"The full filtered bib (not regenerated for this stellar-only synthesis since no Phase 3 driver/system.yaml exists for 40 Eri yet) would include older multi-decade ground-based photometry of DY Eri (Hertzsprung 1922 et seq.), historic spectrum classifications (Joy 1947, Gliese 1957), and various activity-context M-dwarf catalog papers. None drive cfg-relevant Decisions rows beyond what the read set above already covers.",
  "h2_135":"Open items for follow-up",
  "li_136":"<b>Independent rotation-period verification.</b> Shan 2024 8.56 d is flagged quality D. Independent confirmation via TESS short-cadence photometry (40 Eri C is in TESS pointing 32 / 33), RV phase-folded modulation, or ZDI spectropolarimetric mapping would convert the Decisions row from <code>n/a</code> to a recommended:false-then-true entry.",
  "li_137":"<b>Single-paper Hα activity anchor.</b> The multi-survey scatter pEW = -2 to -4 Å covers the variable nature of an active flare star, but a dedicated long-baseline time-series measurement (e.g. CARMENES re-visit, HARPS-N follow-up) would let us record a paper-anchored mean + cycle amplitude rather than a range.",
  "li_138":"<b>Isolated 40 Eri C X-ray measurement.</b> ROSAT All-Sky Survey blends the BC pair. A Chandra or XMM-Newton dedicated pointing separating C from B&#x27;s photospheric thermal X-rays would give a paper-anchored log L_X / L_bol value. Currently qualitative only.",
  "li_139":"<b>Flare rate quantification.</b> DY Eri variability is well-known qualitatively but no survey-derived quantitative flare frequency (flares per day above an energy threshold) is in our current bibliography. A TESS Sector-by-Sector analysis or Evryscope flare-survey result for GJ 166 C would close this gap.",
  "li_140":"<b>AGB-spin-up scenario confirmation.</b> Fuhrmann 2014&#x27;s suggestion that C was spun up by B&#x27;s AGB-phase mass-transfer is consistent with (but not confirmed by) a debated short P_rot. A confirmed short rotation period plus a chemical-abundance signature (s-process enhancement, helium enrichment) in C&#x27;s atmosphere would be the decisive test. No Phase 3 cfg action; logged for narrative completeness.",
  "li_141":"<b>Spectral type M4.5 vs M4.7.</b> Mann 2015 Table 5 lists M4.7, community canonical is M4.5 Ve. Both are within MK classification scatter; no Phase 3 action required, but worth noting in any future schema-tier upgrade that records spectral type with explicit reference attribution.",
  "h2_142":"Related",

  ko: {
  "p_1":"40 Eridani C (GJ 166 C, HIP 19849 C, 변광성 명 DY Eri) 는 40 Eri 삼중계의 M4.5 Ve 플레어성 구성원입니다. 태양에서 5.01 pc 떨어져 있으며, DA2.9 백색왜성 40 Eri B 와 230.09 년 주기의 시각-분광 궤도를 그립니다 (Mason, Hartkopf &amp; Miles 2017, e = 0.4300, a = 6.93″, 평균 분리 ≈ 33 AU). 안쪽 BC 짝은 다시 K0.5 V 주성 40 Eri A 주위를 약 83″ 의 각분리로 돕니다. 미해결된 약 8000 년 외궤도입니다 (Tokovinin MSC 2018). V = 11.17, 수십 분의 일 등급 시각 변광을 가진 C 는 가장 가까운 광학 활동성 M 왜성 중 하나이며 고전적인 플레어성 관측 대상입니다. DY Eri 변광성 지정은 단발성 폭발이 아니라 지속적인 Hα 방출과 광도 플레어 활동을 반영합니다.",
  "p_2":"2026-05-29 에 검증된 Phase 2 앵커는 C 를 다음과 같이 단단히 묶습니다. 이중성 역학질량 M = 0.198 ± 0.0042 M☉ (Mason 2021), Mann et al. 2015 분광 Table 5 반지름 R = 0.274 ± 0.011 R☉ 와 유효 온도 T_eff = 3167 ± 61 K, Cifuentes 2020 CARMENES 볼로메트릭 광도 L = (6.51 ± 0.13) × 10⁻³ L☉, Mann 2015 [Fe/H] = -0.21 ± 0.08, 그리고 Bond et al. 2017 의 WD 전구체 IFMR 분석에서 나온 시스템 공시각 나이 1.8 ± 0.5 Gyr. 활동성 관련 두 값 — Shan et al. 2024 의 P_rot = 8.56 d 와 다중-서베이 Hα 등가폭 범위 pEW ≈ -2 ~ -4 Å — 은 DB <code>meta_notes</code> 에 기록되지만 recommended 측정값으로는 <b>아닙니다</b>. Shan 2024 자체가 8.56 d 주기를 quality D (debated, 같은 논문의 166 개 CARMENES 주기 중 27 개가 debated) 로 표시합니다. Hα 는 단일-논문 앵커가 없습니다.",
  "p_3":"<b>NearStars 시나리오 선택. 활동성 적색 M4.5 V 플레어성으로 렌더링하여, 가상의 인근 관측자에게 짙은 적색 광을 비추고 DY Eri 급 변광성에 맞는 cfg 박자로 H-알파 플레어를 애니메이트합니다.</b> 큐레이션된 행성은 없습니다 (주성 A 주위의 HD 26965 b 는 Burrows 2024 가 반박했고, C 로 확장된 적도 없습니다). 13 개 cfg 픽은 canonical 파라미터 셋을 따르며, 4 개의 tie-break 픽은 가상의 C-궤도 관측자에서 본 시각 hex 색조와 이중성 이벤트 지오메트리에 해당합니다.",

  "h2_89":"Surface synthesis",
  "p_90":"40 Eridani C 의 광구는 후기 M 형 주계열 왜성의 차가운 적색 표면입니다. T_eff = 3167 K 는 별을 부분 대류 전이 영역에 단단히 위치시키며, 이 영역에서는 복사 코어가 작거나 사라집니다. M = 0.2041 M☉ 의 별은 완전 대류 한계 (수소 연소 주계열별 기준 ≈ 0.35 M☉) 의 바로 위에 있습니다. 현대 항성 내부 모델 (Chabrier &amp; Baraffe 1997, Baraffe 2015) 은 얇은 복사 코어가 잔존할 수 있지만 외피층의 열 수송은 대부분 대류임을 예측합니다. 이 대류 영역이 강한 자기 다이나모와 C 에게 DY Eri 변광성 명칭을 안긴 지속적인 Hα 방출을 직접적으로 만들어 냅니다.",
  "p_91":"가시 디스크는 후기 M 형의 canonical 분자 밴드 스펙트럼을 보입니다. 광학에서 강한 TiO 밴드 (γ 밴드 헤드 705 nm 부근이 C 의 적-주황 외관을 주도), 황색의 VO 흡수, 근적외선의 FeH 특성. 연속 불투명도는 H⁻ 가 H 밴드 영역에서 피크를 찍습니다. 3167 K 에서 통합된 Planck 자취 색은 CIE 색도 다이어그램의 따뜻한 적-주황 영역 (xy ≈ 0.55, 0.40) 에 위치하며, Hα 방출은 656 nm 의 좁은 적색 부스트를 더합니다.",
  "p_92":"Mann et al. 2015 는 Gl 166 C 를 BT-Settl 대기 모델이 경험적 T_eff / R 결정과 전형적 하한보다 더 크게 어긋나는 세 별 중 하나로 특별히 지적합니다 (Mann 2015 §5.4, Figure 16 부근). 나머지 두 별은 PM I10430-0912 와 EQ Peg B (Gl 896 B) 입니다. 이것이 Phase 3 에 중요한 이유는, 채택한 반지름과 T_eff 가 모델 fit 이 아니라 논문 측정값 (M_K 관계 + F_bol 적분) 이라는 점입니다. Mann 2015 Table 7 의 Dartmouth 모델 fit 은 R = 0.242 R☉ 와 T_eff = 3362 K 를 주는데, 둘 다 경험적 행과 약 11–13% 어긋나며, 이는 Mann 논문이 문서화한 바로 그 M 왜성 모델 편향입니다. DB Phase 2 recommended 항목은 경험적 Table 5 행입니다.",
  "p_93":"흑점 면적은 활동성 M4.5 V 답게 크고 시간에 따라 변동합니다. Mann 2015 는 178 별 샘플에서 Hα 등가폭 방출을 측정했지만 GJ 166 C 값은 단일 epoch 만 보고합니다. 다중 서베이의 산포는 pEW ≈ -2 ~ -4 Å (Schöfer 2019, Newton 2017, Reiners 2018) 인데, epoch 간 수십 퍼센트 변동을 의미합니다. C 의 거주가능영역 근처에서 본 가상의 관측자는 활동 최대기에 디스크의 10-30% 를 덮는 큰 흑점, plage 로 밝아진 활동 영역, 그리고 광학 파장에서 수 퍼센트의 국지 밝아짐으로 나타나는 occasional 킬로-Gauss 자장 플레어 플럭스 폭발 (M4.5 V 플레어성의 canonical 예. EV Lac, AD Leo) 을 보게 됩니다.",
  "p_94":"약간 금속이 부족한 [Fe/H] = -0.21 은 SED 에 미미한 영향만 줍니다. BT-Settl 그리드에서 [Fe/H] = -0.2 vs 태양의 차이는 약 30 K 등가 reddening 인데, 큐레이션된 61 K 불확실성 안에 충분히 들어옵니다. C 의 [Fe/H] 는 40 Eri A 값 (-0.31, Sousa 2008) 과 1.5 sigma 안에서 일관되며, 시스템 공시각 기원을 뒷받침합니다.",
  "h2_95":"Atmosphere synthesis",
  "p_96":"40 Eri C 는 후기 M 형 플레어성에 전형적인 완전 색채권 활동성 M 왜성 대기를 가집니다. 색채권은 Hα, Ca II H&amp;K, Hβ, He I D3, 그리고 폭넓은 UV 방출선 (GALEX FUV 의 Mg II h&amp;k, HST/STIS 에 접근 가능한 Lyα) 으로 채워져 있습니다. DY Eri 변광성 지정은 색채권 활동 사이클 전반에서 광도 플레어와 지속적인 Hα 방출을 보여 준 수십 년 지상 모니터링에서 비롯됩니다.",
  "p_97":"X 선 방출은 밝지만 이 합성 단계에서는 정량적으로 제약이 약합니다. ROSAT All-Sky Survey 는 BC 페어를 검출했지만 0.1–2.4 keV 연 X 선 성분은 C 의 색채권 코로나와 B 의 광구 열 X 선 기여를 블렌딩합니다. 40 Eri C 단독의 정량적 log L_X / L_bol 은 현재 우리 참고문헌에 없습니다. 이 나이의 M4.5 V 에 대한 정성적 기대값은 log L_X / L_bol ≈ -3 ~ -4 (전형적 M 왜성 활동 시퀀스, 예 Wright et al. 2011, Schmitt &amp; Liefke 2004) 이며, 사이클 진폭은 몇 배 수준입니다. 플레어 X 선 피크는 정상상태보다 한 자릿수 더 높습니다. Open items 목록은 단독 성분 X 선 측정을 후속 대상으로 표시해 둡니다.",
  "p_98":"전이 영역은 M4–M5 활동성 별의 전형적인 Lyman-α 연속체 + Lyα 라인을 만듭니다. 표면 플럭스는 정상상태로 수 × 10⁵ erg s⁻¹ cm⁻², 플레어 강화로 두 자릿수까지 올라갑니다. Gyr 시간 스케일의 통합 XUV (10–100 nm) 광도는 잠재적 행성에 큰 의미가 있습니다. France et al. 2016 (MUSCLES) 는 활동성 M4–M5 왜성이 더 낮은 볼로메트릭 광도에도 불구하고 지구와 비교 가능한 누적 XUV 선량을 전달함을 발견했습니다 — 정상상태 XUV / L_bol 비율이 태양값의 약 10⁴ 배이기 때문입니다. C 주위에 큐레이션 행성은 없으며, 이 영역은 시스템 수준 활동 컨텍스트에만 정보를 줍니다.",
  "p_99":"C 는 대기-광화학 결합으로 제약할 표면을 갖지 않습니다 (별이니까). 여기서 &quot;대기&quot; 는 자기 다이나모로 동작하는 색채권 – 전이 영역 – 코로나 구조를 뜻합니다. cfg 함의. C 주위의 미래 행성 후보는 색채권 모델에서 강한 XUV 환경을 상속받게 되며, 재진입 효과 렌더러는 Hα 가 우세한 광학 스펙트럼을 반영하도록 적색 파장을 포화시켜야 합니다.",
  "h2_100":"Rotation &amp; spin synthesis",
  "p_101":"회전 주기는 진정으로 불확실합니다. Shan et al. 2024 (CARMENES VII) 는 Karmn J04153-076 = GJ 166 C 의 CARMENES 활동 지표 시계열 주기 8.56 d 를 보고하지만, 검출을 quality D 로 분류합니다 (&quot;debated&quot;. 논문 Sect. 4 에 따르면 검출된 166 개 주기 중 27 개가 debated, 68 개가 provisional). Phase 2 DB 는 이를 <code>meta_notes</code> 에만 기록합니다 — <code>rotation_measurements</code> recommended:true 항목이 없습니다. 2026-05-27 작업 노트의 &quot;Kemmer 2025 ~137 d&quot; 라는 이전 attribution 은 교차 확인 시 철회됐습니다. Y. Shan 이 실제 논문의 제1저자 (Kemmer 는 47 명의 공저자 중 22 번째) 이고, 연도는 2025 가 아니라 2024 이며, 주기 값은 약 16 배 차이가 납니다.",
  "p_102":"NearStars 목적상 <b>C 의 cfg 회전 주기 필드는 N/A</b> 입니다. 다운스트림 cfg 작성자는 주기를 unset 으로 두고 명시적 갭으로 표시하거나, Shan 2024 의 허용 범위 안에서의 tie-break 임을 분명히 한 cfg 레벨 노트를 달아 interesting-first 자리표시자 (예. 9 d) 를 쓸 수 있습니다. 독립적 검증 — TESS 단주기 광도, RV 변조 위상 폴딩, ZDI 분광편광 — 이 들어오면 항목이 <code>n/a</code> 에서 <code>recommended:false</code>, 그리고 다음 패스에서 <code>recommended:true</code> 로 전환됩니다.",
  "p_103":"별도의 Phase 3 내러티브 한 가지. 40 Eri C 의 회전 상태는 B 전구체로부터의 물질 이동의 fossil 흔적을 보존할 수 있습니다. Bond et al. 2017 §6.2 는 Fuhrmann et al. 2014 를 명시 인용합니다 — C 가 &quot;40 Eri B 전구체의 AGB 단계 중 강착으로 더 높은 회전 속도로 spin-up 됐을 수 있다&quot; 는 가설. 40 Eri B 전구체는 M_initial ≈ 1.8 M☉ 로 AGB 를 상승한 뒤 외피를 잃었으며, 잃어버린 외피의 일부분은 WD 잔재를 비껴 ≈ 33 AU 에 있는 C 에 포획됐을 가능성이 있습니다. 만약 debated 한 단주기 회전 (8.56 d 또는 비슷한 값) 이 결국 확정되면, AGB-spin-up 시나리오를 정성적으로 뒷받침하게 됩니다. cfg 는 정량적 회전율 예측이 아니라 내러티브 힌트로 이것을 인코딩해야 합니다.",
  "p_104":"자전축 경사는 제약되지 않습니다. 시각 렌더링을 위해 NearStars 는 무작위 배향 자전축을 채택하며, 그럴듯하게는 BC 궤도면에 대해 ~30° 기울어진 정도입니다 (33 AU 분리에서 조석 동기화가 무의미한 다른 장기 MS+WD 이중성과 유추).",
  "h2_105":"Visual styling",
  "p_106":"NearStars 렌더러에서 40 Eridani C 는 작고 따뜻한 적-주황 M4.5 V 플레어성 으로 묘사됩니다. 3167 K Planck 자취 흑체는 <span class=\"hex-chip\" style=\"background:#d97f4a\"></span><code>#d97f4a</code> 부근 (따뜻한 적-주황, CIE xy ≈ 0.55, 0.40) 의 기본 색을 주며, Hα 656 nm 방출은 지각 색조를 포화된 적색 쪽으로 약간 더 밀어냅니다. Confidence: low tie-break 호출은 <i>interesting-first</i> 입니다. 3167 K Planck 자취 envelope 안에 합당한 hex 값의 범위가 있고, 포화된 적-주황 옵션이 혼합 시스템 렌더에서 K0.5 V 주성 A (따뜻한 황-주황) 와 청-백색 WD B 로부터 C 를 시각적으로 뚜렷이 구분합니다.",
  "p_107":"지구에서 5.01 pc 거리에서 보면 V = 11.17 이 40 Eri C 를 맨눈 한계 아래로 두지만 작은 망원경 범위 안입니다. C 의 거주가능영역 거리 (L = 6.51e-3 L☉ 기반 ≈ 0.1 AU) 의 가상 관측자에서 보면 별이 ~1.5° (2 R★ / a) 의 각지름을 채웁니다 — 지구에서 본 태양 크기의 약 세 배입니다. 디스크 특징에는 큰 흑점 (활동 최대기에 10–30% 면적), occasional 광학 수 퍼센트 수준의 플레어 brightening, 그리고 분자 밴드 대기 특유의 강한 적-주황 limb darkening 이 포함됩니다.",
  "p_108":"평균 분리 33 AU 에 있는 동반자 B (BC 궤도 Mason 2017, e = 0.4300 → 근일점 ~19 AU, 원일점 ~47 AU) 는 빛나는 청-백색 점으로, 그 밝기가 대단합니다. B 의 M_V ≈ 11.0 (DA WD, T_eff ≈ 17 200 K) 을 33 AU 관측자 에 대입하면 겉보기 등급은 약 V ≈ -13 (mag = M_V + 5·log₁₀(33 AU / 10 pc) ≈ 11.0 − 24). 지구에서 본 보름달과 비교 가능한 밝기로, 작지만 강렬한 청-백색 점이 C 의 적색 조명을 압도하며 conjunction 에서 가장 밝고 원일점에서도 (V ≈ -12) 여전히 두드러집니다. 궤도 운동은 수십 년 에서 1 세기 시간 스케일로 B 를 C-하늘에서 시각적으로 가로지르게 만듭니다.",
  "p_109":"평균 분리 ~2000 AU 에 있는 주성 A 는 훨씬 더 어두우나 여전히 맨눈으로 보이는 주황 &quot;먼 태양&quot; 으로 나타납니다. A 의 M_V ≈ 5.9 에 2000 AU 거리 modulus 를 더하면 겉보기 V ≈ -9 (mag = 5.9 − 15). 지구에서 본 어떤 행성보다도 훨씬 더 밝지만, B 와는 인상적으로 다른 스케일의 밝기입니다. K0.5 V T_eff ≈ 5126 K 는 분명한 주황 색조를 줍니다. 삼중계는 C 의 하늘 에서 다음과 같이 나타납니다 — 가까운 C 디스크 조명 (지배적 적색 광원), 근-항성 청-백색 서치라이트 (B), 그리고 더 먼 주황 점 광원 A — 세 광원이 서로 매우 다른 강도와 시간 스케일을 가집니다 (B 는 수십 년에 걸쳐 시각적으로 이동하고, A 는 ~8000 년의 A-BC 궤도를 고려할 때 인간 시간 스케일에서는 사실상 고정).",
  "p_110":"플레어 이벤트는 Firefly-cfg 측 플라즈마 색 선택을 추동합니다. 활동성 M4.5 V 플레어성은 Hα + Hβ + Ca II 방출이 우세한 광학 플레어 스펙트럼을 만들며, 플레어 플럭스 피크 동안 재진입 플라즈마를 포화 적색/분홍 팔레트 쪽으로 편향시킵니다. 정확한 팔레트 조립은 firefly-cfg 스킬 영역 (<code>firefly-cfg/</code> 의 플라즈마 색 주기율표 참고) 이지만, 여기서의 Phase 3 힌트는 다음과 같습니다 — <b>C 부근에서는 일반적 흰색 플라즈마 효과보다 강한 적색을 선호</b>하며, DY Eri 급 변광성 박자 (한 시간 미만 상승, 수 시간 감쇠 플레어 프로파일) 로 트리거되는 선택적 Hα-적색 플레어 이벤트 액센트.",
  "p_111":"흑점, faculae, prominence 는 (불확실한) 활동 사이클 동안 활동성 M 왜성 스케일로 렌더링되며, 사이클 위상은 논문이 확정한 사이클 주기가 나올 때까지 유보됩니다.",
  "h2_112":"Bibliography",
  "h3_113":"Read (decision-driving)",
  "li_114":"<b>Mason B. D., Hartkopf W. I., Miles K. N. 2017</b> — <i>Binary Star Orbits. V. The Nearby White Dwarf/Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, <a href=\"https://arxiv.org/abs/1707.03635\">arXiv:1707.03635</a>, DOI 10.3847/1538-3881/aa803e). 갱신된 230.09 년 BC 시각-분광 궤도. 총질량 0.776 ± 0.024 M☉, e = 0.4300, a = 6.93″. Heintz 1974 질량비와 결합해 M_C = 0.2041 ± 0.0064 M☉ 산출. <b>C 역학질량의 주 앵커.</b>",
  "li_115":"<b>Mann A. W., Feiden G. A., Gaidos E., Boyajian T., von Braun K. 2015</b> — <i>How to Constrain Your M Dwarf: Measuring Effective Temperature, Bolometric Luminosity, Mass, and Radius</i>, ApJ 804, 64 (<code>2015ApJ...804...64M</code>, <a href=\"https://arxiv.org/abs/1501.01635\">arXiv:1501.01635</a>, DOI 10.1088/0004-637X/804/1/64). 경험적 M 왜성 보정. Table 5 &#x27;Gl 166 C&#x27; 행이 R = 0.274 ± 0.011 R☉, T_eff = 3167 ± 61 K, [Fe/H] = -0.21 ± 0.08, Hα EW 를 줌. <b>반지름 / T_eff / [Fe/H] 의 주 앵커.</b> Table 7 Dartmouth 모델 fit (R = 0.242, T_eff = 3362) 은 §5.4 + Figure 16 에서 문서화된 샘플 수준 모델 편향 데이터포인트로 보존.",
  "li_116":"<b>Cifuentes C., Caballero J. A., Cortés-Contreras M. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. V. Luminosities, colours, and spectral energy distributions</i>, A&amp;A 642, A115 (<code>2020A&amp;A...642A.115C</code>, <a href=\"https://arxiv.org/abs/2007.15077\">arXiv:2007.15077</a>, DOI 10.1051/0004-6361/202038295). CARMENES M 왜성 샘플의 다중 밴드 SED 적분. Karmn J04153-076 = GJ 166 C 항목 (VizieR J/A+A/642/A115) 이 L = (6.51 ± 0.13) × 10⁻³ L☉. <b>광도의 주 앵커.</b>",
  "li_117":"<b>Bond H. E., Bergeron P., Bédard A. 2017</b> — <i>The aged Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, <a href=\"https://arxiv.org/abs/1709.00478\">arXiv:1709.00478</a>, DOI 10.3847/1538-4357/aa8a63). 40 Eri B 의 HST/COS UV 분광. 전체 시스템 재분석. §6.2 의 IFMR (Salaris et al. 2009, M_final = 0.134 M_initial + 0.331) 가 B 의 M_progenitor ≈ 1.8 M☉ 을 시사하며, 시스템 공시각 총 나이 ≈ 1.8 Gyr 가 도출됩니다. 같은 섹션이 C 의 AGB 물질 이동 spin-up 시나리오에 대해 Fuhrmann et al. 2014 를 인용. <b>나이 + AGB-spin-up 내러티브의 주 앵커.</b>",
  "li_118":"<b>Shan Y., Reiners A., Fabbian D. et al. 2024</b> — <i>The CARMENES search for exoplanets around M dwarfs. VII. Photospheric rotation periods from the activity time series of 166 M dwarfs</i>, A&amp;A 684, A9 (<code>2024A&amp;A...684A...9S</code>, <a href=\"https://arxiv.org/abs/2401.09550\">arXiv:2401.09550</a>, DOI 10.1051/0004-6361/202346794). CARMENES 활동 지표 시계열. Karmn J04153-076 P_rot = 8.56 d, quality flag D (&quot;debated&quot;). 166 개 주기 중 27 개가 debated, 68 개가 provisional. <b>DB meta_notes 에만 기록 — recommended 측정값 아님.</b>",
  "h3_119":"Read (context / methodology)",
  "li_120":"<b>Heintz W. D. 1974</b> — <i>Astrometric study of four visual binaries</i>, AJ 79, 819 (<code>1974AJ.....79..819H</code>). Mason 2017 이 총질량 분할에 쓴 역사적 BC 질량비를 제공.",
  "li_121":"<b>van Leeuwen F. 2007</b> — <i>Validation of the new Hipparcos reduction</i>, A&amp;A 474, 653 (<code>2007A&amp;A...474..653V</code>). Mason 2017 의 역학질량 유도에 쓰인 시차.",
  "li_122":"<b>Cummings J. D., Kalirai J. S., Tremblay P.-E. et al. 2018</b> — <i>The white dwarf initial–final mass relation for progenitor masses up to 7.5 M☉</i>, ApJ 866, 21. Bond 2017 이 40 Eri B 의 전구체 질량 반전에 쓴 IFMR.",
  "li_123":"<b>Fuhrmann K., Chini R., Buda L.-S. &amp; Pozo Nuñez F. 2014</b> — <i>On the Age of Gliese 86</i>, ApJ 785, 68 (<code>2014ApJ...785...68F</code>, DOI 10.1088/0004-637X/785/1/68). 주로 Gl 86 K+WD 이중성의 나이 결정 논문. 40 Eri C 를 analog 사례로 인용해, M 왜성 동반자의 &quot;상당한 투영 회전 속도&quot; 가 degenerate 동반자의 이전 AGB 단계 물질 손실에서 유래한 것으로 봅니다. Bond 2017 §6.2 가 같은 spin-up 가설을 40 Eri C 에 적용하면서 인용.",
  "li_124":"<b>Tokovinin A. 2018</b> — <i>The updated multiple-star catalog</i>, ApJS 235, 6 (<code>2018ApJS..235....6T</code>). A-BC 페어를 ~8000 년 외궤도의 unfitted 항목으로 등재.",
  "li_125":"<b>Burrows A. et al. 2024</b> — <i>The Death of Vulcan: NEID Reveals That the Planet Candidate Orbiting HD 26965 Is Stellar Activity</i>, AJ 167, 243 (<code>2024AJ....167..243B</code>, DOI 10.3847/1538-3881/ad34d5). HD 26965 (= 40 Eri A) 의 NEID 정밀 RV 모니터링. Ma 2018 의 &quot;Vulcan&quot; 행성 후보를 반박하고, 약 42 일 신호를 회전 변조된 항성 활동 (흑점 + convective blueshift 억제) 으로 귀속. C 와 직접 관련은 없지만 시스템의 무행성 상태를 확립.",
  "li_126":"<b>Kopparapu R. K., Ramirez R. M., SchottelKotte J. et al. 2014</b> — <i>Habitable zones around main-sequence stars: dependence on planetary mass</i>, ApJ 787, L29 (<code>2014ApJ...787L..29K</code>, <a href=\"https://arxiv.org/abs/1404.5292\">arXiv:1404.5292</a>). 40 Eri C 의 HZ 컨텍스트 값 유도에 쓴 HZ 경계 스케일링.",
  "h3_127":"Read (instrument / non-cfg-decisive)",
  "li_128":"<b>Schöfer P., Jeffers S. V., Reiners A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Activity indicators at visible and near-infrared wavelengths</i>, A&amp;A 623, A44 (<code>2019A&amp;A...623A..44S</code>, <a href=\"https://arxiv.org/abs/1903.06803\">arXiv:1903.06803</a>). CARMENES Hα EW 시계열. GJ 166 C 가 샘플에 포함. DB meta_notes 의 Hα pEW 범위 -2 ~ -4 Å 에 쓰임.",
  "li_129":"<b>Newton E. R., Mondrik N., Irwin J. et al. 2017</b> — <i>New rotation period measurements for M dwarfs in the southern hemisphere</i>, AJ 154, 224 (<code>2017AJ....154..224N</code>, <a href=\"https://arxiv.org/abs/1611.04857\">arXiv:1611.04857</a>). MEarth-South 광도 회전 주기. 여러 서베이 Hα 교차 참조 중 하나.",
  "li_130":"<b>Reiners A., Zechmeister M., Caballero J. A. et al. 2018</b> — <i>The CARMENES search for exoplanets around M dwarfs. High- resolution optical and near-infrared spectroscopy of 324 survey stars</i>, A&amp;A 612, A49 (<code>2018A&amp;A...612A..49R</code>, <a href=\"https://arxiv.org/abs/1711.06576\">arXiv:1711.06576</a>). CARMENES 기기 논문. GJ 166 C 파라미터 행.",
  "li_131":"<b>Wright N. J., Drake J. J., Mamajek E. E., Henry G. W. 2011</b> — <i>The stellar-activity-rotation relationship and the evolution of stellar dynamos</i>, ApJ 743, 48 (<code>2011ApJ...743...48W</code>). M 왜성 log L_X / L_bol 보정에 정성적으로 사용.",
  "li_132":"<b>France K., Loyd R. O. P., Youngblood A. et al. 2016</b> — <i>The MUSCLES treasury survey. I. Motivation and overview</i>, ApJ 820, 89 (<code>2016ApJ...820...89F</code>, <a href=\"https://arxiv.org/abs/1602.09142\">arXiv:1602.09142</a>). 활동성 M 왜성 주변 XUV 환경의 컨텍스트.",
  "h3_133":"Not read — no arXiv preprint or low-priority (~12 papers)",
  "p_134":"전체 필터된 bib (이 항성 단독 합성에서는 40 Eri 의 Phase 3 driver / system.yaml 이 아직 없어 재생성하지 않음) 에는 DY Eri 의 옛 다중 십 년 지상 광도 (Hertzsprung 1922 등), 역사적 스펙트럼 분류 (Joy 1947, Gliese 1957), 그리고 다양한 활동 컨텍스트 M 왜성 카탈로그 논문이 포함됩니다. 위 read 셋이 이미 다룬 것 이외에 cfg 관련 Decisions 행을 추동하는 항목은 없습니다.",
  "h2_135":"Open items for follow-up",
  "li_136":"<b>독립적 회전 주기 검증.</b> Shan 2024 의 8.56 d 는 quality D 로 표시됨. TESS 단주기 광도 (40 Eri C 는 TESS pointing 32 / 33), RV 위상 폴딩 변조, ZDI 분광편광 매핑을 통한 독립 확인이 들어오면 Decisions 행이 <code>n/a</code> 에서 recommended:false → true 항목으로 전환됩니다.",
  "li_137":"<b>단일 논문 Hα 활동 앵커.</b> 다중 서베이 산포 pEW = -2 ~ -4 Å 는 활동성 플레어성의 변동 성격을 잘 담아내지만, 전용 장기 시계열 측정 (예. CARMENES 재방문, HARPS-N follow-up) 이 들어오면 범위 대신 논문 앵커 평균 + 사이클 진폭을 기록할 수 있습니다.",
  "li_138":"<b>40 Eri C 단독 X 선 측정.</b> ROSAT All-Sky Survey 는 BC 페어를 블렌딩. Chandra 또는 XMM-Newton 의 전용 포인팅으로 C 를 B 의 광구 열 X 선 기여에서 분리하면 논문 앵커된 log L_X / L_bol 값을 얻습니다. 현재는 정성적이기만 함.",
  "li_139":"<b>플레어 빈도 정량화.</b> DY Eri 변광성은 정성적으로 잘 알려져 있지만 서베이 기반 정량 플레어 빈도 (에너지 임계값 이상 일일 플레어 수) 가 현재 참고문헌에 없습니다. GJ 166 C 에 대한 TESS 섹터별 분석 또는 Evryscope 플레어 서베이 결과가 이 갭을 메울 것.",
  "li_140":"<b>AGB-spin-up 시나리오 확정.</b> Fuhrmann 2014 가 제안한, C 가 B 의 AGB 단계 물질 이동으로 spin-up 됐다는 시나리오는 debated 한 단주기 P_rot 과 일관됩니다 (단정은 아님). 확정된 단기 회전 주기에 더해 C 대기에서의 화학 풍부도 시그너처 (s-process 강화, 헬륨 증가) 가 결정적 검사가 됩니다. Phase 3 cfg 액션은 없음. 내러티브 완전성을 위해 기록.",
  "li_141":"<b>분광형 M4.5 vs M4.7.</b> Mann 2015 Table 5 는 M4.7, 커뮤니티 canonical 은 M4.5 Ve. 둘 다 MK 분류 산포 안. Phase 3 액션 불필요지만, 분광형을 명시 참조 attribution 으로 기록하는 미래 스키마 단계 업그레이드에서 명시할 만함.",
  "h2_142":"Related",
  "li_143":"<a href=\"40-eridani-a.md\">40-eridani-a</a> — K0.5 V 주성. 반박된 Vulcan 행성. BC 와 ~83″ 미해결",
  "li_144":"<a href=\"40-eridani-b.md\">40-eridani-b</a> — DA2.9 백색왜성 동반자. C 와 230.09 년 이중성 궤도",
  "li_145":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 표 스키마의 원본",
  "li_146":"<a href=\"../reference/binary-epoch-pipeline.md\">binary-epoch-pipeline</a> — BC 시각-분광 궤도 Kepler→ICRS 구성에 적용",
  "title":"40 Eridani C — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",

  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
