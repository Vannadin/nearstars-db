  "p_1":"V1400 Centauri (1SWASP J140747.93−394542.6) is a young pre-main-sequence K5 star in Centaurus, a ~16 Myr member of the Upper Centaurus-Lupus subgroup of the Sco-Cen association, at a Gaia DR3 distance of 138 pc (~451 ly). It sits <b>far beyond the 50 ly Kopernicus cap</b> and is curated as a beyond-implementation-range data / Phase-3 entry, not a placeable NearStars body. It earns its place for one reason: its companion <b>J1407b</b> is the candidate host of the largest ring system ever proposed — a &quot;super-Saturn&quot; some 200× the span of Saturn&#x27;s rings.",

  "p_108":"If depicted, J1407b is the spectacle: a small substellar globe encased in a vast, finely-banded, dusty-tan ring disc (<span class=\"hex-chip\" style=\"background:#c99878\"></span><code>#c99878</code>) tilted ~70°, with at least one clean gap, set against a young orange K-dwarf (<span class=\"hex-chip\" style=\"background:#ffd2a1\"></span><code>#ffd2a1</code>). The scale is the point — rings filling a region ~0.6 AU across would, seen from the host, span a large fraction of the sky. Because the detection is tentative, this is the &quot;interesting-first&quot; rendering of an unconfirmed object, and should be labelled as such in any presentation.",

  "p_110":"The cfg adopts the ringed-companion interpretation. The skeptical canonical reading, which the literature increasingly entertains, is:",

  "p_123":"The interesting-first choice is defensible because the 2007 light curve is real and the ring model is the most developed explanation — but the null/free-floating reading cannot be excluded and is the more conservative position.",

  ko: {
  "p_1":"V1400 Centauri(1SWASP J140747.93−394542.6)는 켄타우루스자리에 있는 어린 전주계열 K5 별로, Sco-Cen 회합체의 Upper Centaurus-Lupus 하위 그룹에 속하는 나이 ~16 Myr의 구성원이며, Gaia DR3 거리는 138 pc (~451 ly)입니다. 이 별은 <b>Kopernicus 50 ly 한계를 한참 벗어나</b> 있어 배치 가능한 NearStars 바디가 아니라 구현 범위 밖 데이터이자 Phase 3 엔트리로 큐레이션됩니다. 그럼에도 이 별이 자리를 얻은 이유는 단 하나로, 그 동반체인 <b>J1407b</b>가 지금까지 제안된 것 중 가장 거대한 고리계 — 토성 고리 폭의 약 200배에 이르는 &quot;super-Saturn&quot; — 의 후보 모천체이기 때문입니다.",
  "p_2":"증거는 단 한 번의 장관을 이룬 사건뿐입니다. 2007년 56일에 걸쳐 이 별은 깊고(≳3 mag) 정교하게 구조화된 감광을 겪었고, 이는 SuperWASP 아카이브 측광 자료에서 발견되어 Mamajek et al. 2012로 발표되었습니다. Kenworthy &amp; Mamajek 2015는 이 광도 곡선을 ~0.6 AU(~9천만 km)까지 뻗은 ~37개의 동심 고리에 둘러싸인 준항성 동반체의 통과로 모델링했으며, ~0.4 AU 부근의 날카로운 틈은 형성 중인 외위성(&lt; 0.8 M⊕)이 휩쓸어 비운 것으로 그럴듯하게 설명됩니다. 동반체 질량은 제대로 고정되지 않아, 측광 고리 피팅에서는 ~24 M_Jup이지만 고리가 결박 상태를 유지하려면 60–100 M_Jup이어야 하므로 (Rieder &amp; Kenworthy 2016), 거대 행성에서 갈색왜성까지 무엇이든 될 수 있습니다. 같은 동역학 연구는 고리가 살아남으려면 <b>역행</b>해야 한다는 사실도 밝혔습니다.",
  "p_3":"<b>이것은 진정으로 잠정적인 검출이며, 합성도 그에 걸맞게 다룹니다.</b> 지금까지 단 한 번의 식만이 관측되었습니다. Mentel et al. 2018은 1890–2018년에 걸친 사진 건판을 뒤졌지만 두 번째 감광을 찾지 못했고 — 2007년 사건이 결박된 천체였는지조차 확증하지 못했습니다. 이후 연구는 엄폐를 일으킨 것이 우연히 별 앞을 가로질러 떠다닌 원반을 두른 자유 부유 천체였다는 대안을 띄우기도 했습니다. 확실한 것은 광도 곡선과 잘 규명된 어린 모천체이며, 고리를 두른 행성은 설득력은 있으나 미확인이고 모델에 의존하는 해석입니다.",
  "p_4":"<b>NearStars의 시나리오 선택은, 어린 주황색 K형 왜성 주위에서 외위성이 휩쓴 틈을 지닌 광대하고 역행하는 다중 고리계에 둘러싸인 준항성 동반체 — 상징적인 super-Saturn — 를 묘사하되, 동반체 전체를 잠정적인 것으로 표시하는 것입니다.</b> 영(null) 해석 대신 고리 행성 해석을 택한 것은 진정으로 열려 있는 문제에 대한 흥미 우선 tie-break이며, 회의적인 canonical 해석은 <i>Canonical alternatives</i>에 기록되어 있습니다.",

  "h2_90":"Surface (host star)",
  "p_91":"모천체는 평범한 어린 주황색 왜성으로, K5에 Teff ~4500 K이므로 따뜻한 주황 색조(<span class=\"hex-chip\" style=\"background:#ffd2a1\"></span><code>#ffd2a1</code>)를 띱니다. 그 젊음은 빠른 자전(3.2 d)과 강한 활동성 — 포화에 가까운 X선(log L_X/L_bol ≈ −3.4), 약한 Hα 방출, 강한 리튬 흡수 — 에서 드러나며, 이는 아직 주계열에 안착하는 중인 ~16 Myr Sco-Cen 구성원과 모두 일치합니다. 별 자체에 대해 특별한 점은 없으며, 이 별은 주연이 아니라 무대입니다.",
  "h2_92":"The ring system (J1407b)",
  "p_93":"이것이 주인공입니다. 2007년 광도 곡선은 태양계의 어떤 행성 고리보다도 훨씬 거대한 구조를 요구했는데, 외반경이 ~0.6 AU로 토성 고리 폭의 대략 200배에 달하고, 날카로운 부분 식들에 의해 분해되어 지구 질량가량의 물질을 담은 ~37개의 뚜렷한 고리로 나뉩니다. ~0.4 AU 부근의 말끔한 틈은 자기 궤도를 휩쓰는 천체의 결정적 단서로 — 동반체를 ~1.7 yr마다 공전하는, ~0.8 M⊕ 미만의 형성 중인 외위성으로 모델링됩니다. 56일짜리 식에서 살아남으려면 고리가 <b>역행</b>해야 한다는 동역학적 요구 자체가 인상적이고 이례적인 예측입니다.",
  "p_94":"물리적으로 이 고리는, 성숙한 토성의 밝은 물-얼음 잔해라기보다, 먼지와 얼음이 여전히 위성으로 응집하고 있을 수도 있는 원위성 물질의 어린 주행성 원반으로 읽는 것이 가장 적절합니다. 그렇다면 토성의 옅은 금빛보다 먼지 낀 붉은 황갈 색조(<span class=\"hex-chip\" style=\"background:#c99878\"></span><code>#c99878</code>)가 더 타당하지만 측정된 색은 없으며, 이는 tie-break입니다.",

  "p_106":"동반체의 궤도는 가장 약한 고리로 — 주기는 느슨하게만 한정되어 있고 독립적으로 검증된 궤도는 없습니다. 역행하는 고리 기하와 높은 궤도 이심률이 함께 어우러져, 잠정적이라는 그 위상의 기준으로 보더라도 이 시스템을 동역학적으로 기묘한 것으로 만듭니다.",
  "h2_107":"Visual styling",
  "p_108":"묘사한다면 J1407b가 장관입니다. ~70° 기울어진 광대하고 곱게 띠진 먼지빛 황갈색 고리 원반(<span class=\"hex-chip\" style=\"background:#c99878\"></span><code>#c99878</code>)에 감싸인 작은 준항성 구체가, 적어도 하나의 말끔한 틈을 지닌 채, 어린 주황색 K형 왜성(<span class=\"hex-chip\" style=\"background:#ffd2a1\"></span><code>#ffd2a1</code>)을 배경으로 놓입니다. 규모가 핵심으로 — ~0.6 AU 폭의 영역을 가득 채운 고리는 모천체에서 보면 하늘의 큰 부분을 가로지를 것입니다. 검출이 잠정적이므로, 이것은 미확인 천체에 대한 &quot;흥미 우선&quot; 렌더링이며, 어떤 발표에서든 그렇게 표시되어야 합니다.",
  "h2_109":"Canonical alternatives",
  "p_110":"cfg는 고리를 두른 동반체 해석을 채택합니다. 문헌이 점점 더 진지하게 고려하는 회의적 canonical 해석은 다음과 같습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
