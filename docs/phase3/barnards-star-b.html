  "h2_150":"Surface synthesis",
  "p_151":"Barnard b&#x27;s surface is the cooler counterpart to sibling d: substellar temperatures of ~700 K stop short of widespread silicate partial-melt seen on d, so the cfg distinguishes b from d by <i>absence</i> of a partial-melt accent. The dominant tint is iron-oxidized basaltic regolith (<span class=\"hex-chip\" style=\"background:#5e3526\"></span><code>#5e3526</code>) — slightly darker and cooler in color than d because of the lower thermal-emission contribution at the same M-dwarf illumination. Terminator-ridge bedrock (<span class=\"hex-chip\" style=\"background:#7a4530\"></span><code>#7a4530</code>) provides modest visual variation.",
  "p_152":"The antistellar hemisphere is a deep cold-trap (~130 K — slightly warmer than d&#x27;s 100 K because of larger heat-flux retention in the slightly thicker thermal regolith), accumulating volatiles over Gyr timescales. As with d, volatile sequestration in the antistellar cold-trap is plausible but not directly observable.",
  "p_153":"Surface morphology follows the Mercury / hot-rocky template: 4 Gyr of impact cratering, no plate tectonics, and possible smooth sub-substellar zones if any past partial-melt mobilization occurred. The cfg&#x27;s <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> field captures the heavily cratered basaltic baseline with the substellar zone slightly smoother in texture than the terminator and antistellar regions.",
  "p_154":"The Stefanov 2024 TESS non-detection of transits provides an indirect constraint on b&#x27;s radius — if the planet were larger than about 1.5 R⊕, transits would have been detected in the existing photometric monitoring window. The cfg&#x27;s R = 0.72 R⊕ is well below this threshold; mass-radius scaling for 0.3 M⊕ Earth-analog rocky material gives 0.66–0.76 R⊕, with the 0.72 value chosen as the mid-range for visual distinction.",
  "h2_155":"Atmosphere synthesis",
  "p_156":"b has no significant atmosphere. The atmospheric loss calculation from France 2020 at the HZ (0.1 AU) gives ~87 Earth-atm Gyr⁻¹ of thermal escape under the 25% flare duty cycle. At b&#x27;s 0.0229 AU, the inner-system enhancement factor is roughly 19× (radial XUV scaling), so the cumulative loss over 10 Gyr is several orders of magnitude greater than any plausible primary atmosphere mass for a 0.3-M⊕ planet.",
  "p_157":"The surviving atmospheric signature is a sputter-driven sodium exosphere analog to Mercury&#x27;s. Barnard&#x27;s stellar wind impacting the basaltic surface continuously dislodges Na (and K, Ca trace) atoms, producing a gravitationally unbound exosphere with column density ~10¹⁰ atoms cm⁻². Surface pressure equivalent is ~10⁻⁹ Pa — far below any Rayleigh-scattering signature, so the visible appearance is dominated entirely by the surface tint (cfg <code>atmosphere_tint_rgb_hex = n/a</code>).",
  "p_158":"Episodic enhancement during Barnard&#x27;s modest flares (~25% duty cycle, individual energies ~10²⁹·² – 10²⁹·⁵ erg, France 2020) drives transient sputtering increases. These are much smaller than the analogous Proxima superflare events but contribute the bulk of the cumulative atmospheric loss over 10 Gyr. In-game effects are limited to sub-resolution rendering — no visible exospheric plumes.",
  "h2_159":"Rotation &amp; spin synthesis",
  "p_160":"b is tidally locked at 1:1 (synchronous) with substellar point fixed at the planetary-frame 0° meridian. Walterová 2020 tidal-locking timescales for a 0.3-M⊕ rocky planet at 0.0229 AU around a 0.16-M☉ M dwarf are well under 10⁵ years, far shorter than the 10 Gyr system age. Obliquity is similarly damped to 0°.",
  "p_161":"Basant 2025 e = 0.03 is consistent with circular at 1σ; SPOCK stability favors e &lt; 0.02. At this low eccentricity the 1:1 synchronous configuration dominates (no 3:2 trap), and libration amplitude is small (&lt; 1°).",
  "p_162":"Coupled with the other three planets, b participates in the compact near-resonant chain (period ratios 3.15:4.12 ≈ 4:5; 2.34:3.15 ≈ 3:4) but the system is <i>not</i> in a strict mean-motion resonance per Basant 2025 SPOCK analysis — the planets are well-spaced enough for long-term stability without resonance locking.",
  "h2_163":"Visual styling",
  "p_164":"Barnard b is the cooler dark-red sibling of d: the cfg&#x27;s <span class=\"hex-chip\" style=\"background:#5e3526\"></span><code>#5e3526</code> primary tint is darker and slightly browner than d&#x27;s <span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code>, reflecting both the lower substellar temperature (700 K vs 800 K) and the absence of partial-melt thermal emission. From orbit b displays the same sharp-terminator hot-rocky phase curve as d, with no atmospheric haze and minimal limb darkening.",
  "p_165":"Barnard subtends 4.3° in b&#x27;s sky — about 8× the apparent diameter of the Sun from Earth. The dim red illumination produces a perpetually dim warm-orange surface lighting; cumulative surface dose remains lethal under normal play (cfg <code>surface_radiation_dose_msv_yr = 7000</code>, slightly lower than d&#x27;s because of the cooler substellar T and reduced XUV flux at the larger orbital radius).",
  "p_166":"Aurora cfg fields are all <code>false</code> / <code>n/a</code>. Flare events from Barnard appear as transient ~5000-s ambient brightening at the cfg&#x27;s flare-duty-cycle rate (~25%), without exotic spectral features. The in-game rendering should emphasize the cooler-tone basaltic surface to visually distinguish b from the hotter, partial-melt-accented d.",
  "h2_167":"Bibliography",
  "h3_168":"Read (visual-informative, drove decisions above)",
  "li_169":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). The MAROON-X confirmation. P = 3.1542 d, Msini = 0.299 ± 0.026 M⊕, a = 0.0229 AU, T_eq = 438 K (A=0, full redistribution).",
  "li_170":"<b>González Hernández J. I. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>, arXiv:2410.00569). The ESPRESSO discovery; first confirmed planet of the modern Barnard system. T_eq = 400 K stated in the abstract from a slightly different stellar-parameter set.",
  "li_171":"<b>Stefanov A. K. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i> (arXiv:2410.00577). TESS non-detection ruling out transits; constrains R indirectly to &lt; 1.5 R⊕.",
  "li_172":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). Mega-MUSCLES HST + Chandra; 25% flare duty cycle; atmospheric loss rates underpinning b&#x27;s atmosphere-stripped scenario.",
  "li_173":"<b>Lubin J. et al. 2021</b> — <i>Stellar Activity Manifesting at a One-year Alias Explains Barnard b as a False Positive</i> (<code>2021AJ....162...61L</code>; no arXiv preprint). The refutation of Ribas 2018 — establishes that the current Barnard b is a different planet from the 2018 candidate.",
  "li_174":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i> (arXiv:2007.12459). Tidal-lock timescale scaling.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>Ribas I. et al. 2018</b> — <i>A candidate super-Earth planet orbiting near the snow line of Barnard&#x27;s star</i> (<code>2018Natur.563..365R</code>, arXiv:1811.05955). Historical claim, refuted; preserved as historical literature context for the b designation.",
  "li_177":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star</i> (arXiv:1812.06712). Host rotation + activity underlying the planet&#x27;s irradiation environment.",
  "h3_178":"Read (instrument-only, not visual-informative)",
  "li_179":"<b>Choi J. et al. 2013</b> — <i>Precise Doppler Monitoring of Barnard&#x27;s Star</i> (arXiv:1208.2273). Pre-discovery RV upper limits.",
  "h3_180":"Not read — no arXiv preprint or low-priority (~140 papers)",
  "p_181":"Mostly historical pre-2024 papers on Ribas 2018 candidate (now refuted), generic M-dwarf planet-formation theory, and instrumentation-development papers that mention Barnard as an RV standard. Preserved in <code>docs/phase3/_bib/barnards-star-b.yaml</code> with <code>status: skipped</code>.",
  "h2_182":"Open items for follow-up",
  "li_183":"<b>Direct radius measurement</b>: no transit. A future astrometric detection (Gaia DR4 or direct imaging) could constrain true mass and radius. The cfg&#x27;s <code>radius_rearth = 0.72</code> is a tie-break.",
  "li_184":"<b>Composition by mass–radius</b>: rocky vs. ice-rich is degenerate without radius. The cfg defaults to Earth-analog rocky; a Mercury-like iron-enriched alternative is within the window.",
  "li_185":"<b>Lubin 2021 retraction detail</b>: the refutation paper has no arXiv preprint. A future user-pasted abstract or full text would let us deep-read the refutation methodology rather than relying on the cited summary.",
  "li_186":"<b>Eccentricity vs. stability</b>: Basant 2025 e = 0.03 ± 0.03 leaves open whether b is exactly circular or weakly eccentric. Long-term monitoring at 30 cm/s precision could refine this.",
  "li_187":"<b>Atmosphere retention re-modeling</b>: France 2020 assumed an unmagnetized 1 M⊕ planet at 0.1 AU. A dedicated model for b&#x27;s 0.299 M⊕ at 0.0229 AU with M-dwarf wind ram-pressure scaling would refine the cfg&#x27;s <span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span> decision; current tie-break leans bare-rock.",
  "h2_188":"Related",

  ko: {
  "p_1":"Barnard&#x27;s Star b 는 두 번째로 가까운 항성 호스트 주위 4-행성 ESPRESSO/MAROON-X 시스템의 원래 &quot;헤드라인&quot; 행성입니다. González Hernández 외 2024 가 발견 논문에서 bona-fide 확정 행성으로 선언한 네 행성 중 유일한 것입니다. 후보 c, d, e 는 후속 Basant 외 2025 MAROON-X 분석에서 확정 상태로 격상되었습니다. 중요하게도, 현재 Barnard b 는 0.4 AU 의 역사적 Ribas 외 2018 super-Earth 후보와 <i>다른</i> 천체입니다 — Lubin 외 2021 이 그 검출을 항성 활동의 1년 alias 로 반박했고, González Hernández 2024 는 156 회 ESPRESSO 관측에서 Ribas 주기의 신호를 명시적으로 회수하지 못했습니다. NearStars 와 현재 문헌의 b 라벨은 전적으로 P = 3.154-d 행성을 가리킵니다.",
  "p_2":"행성은 0.0229 AU 의 거의 원형 3.1542-일 궤도에서 Msini = 0.299 ± 0.026 M⊕ 를 가집니다 (Basant 2025. ESPRESSO 전용 González Hernández 2024 는 0.37 M⊕ 를 보고했으나 공동 MAROON-X 피팅으로 정제). 지구의 6.8× 일사를 받아 평형 온도 438 K (Basant 2025 Table 3, A = 0, 완전 열재분배) 를 가지며 — Kopparapu 2014 의 M4 V 호스트 보수적 거주 가능 영역 (HZ 안쪽 가장자리 ~0.1 AU, P ≈ 10 d) 의 한참 안쪽입니다. 행성은 transit 을 보이지 않으므로 (González Hernández 2024 + Stefanov 2024 TESS 비검출), 반지름과 조성은 Msini 와 더 폭넓은 hot rocky USP analog 에서 추론됩니다.",
  "p_3":"3.15-일 궤도는 조석 잠금을 본질적으로 확실하게 만듭니다 (이 질량과 호스트에서 Walterová 2020 시간 척도 &lt; 10⁵ yr). substellar 점이 행성 프레임에 고정됩니다. Basant 2025 의 β-분포-prior 이심률은 e = 0.03 ± 0.03 — 원과 일치하며, SPOCK 안정성 테스트는 장기 4-행성 공존을 위해 e &lt; 0.02 를 선호합니다. 6.8 S⊕ 일사와 안쪽 형제 d 에 영향을 미치는 동일한 France 2020 대기 손실 환경에서, b 는 10 Gyr 에 걸쳐 어떤 1차 대기도 대부분 strip 된 것으로 예상됩니다. cfg 는 canonical 시각 기준선 으로 잔여 sodium-vapor exosphere 가 있는 노출 암석 시나리오를 채택합니다.",
  "p_4":"<b>NearStars 시나리오 선택. 노출된 basalt 표면, sub-Mercury exosphere, Barnard 의 flare 활동에 대한 대기 차폐가 없는 뜨거운 조석잠금 sub-Earth 질량 암석 행성입니다. 형제 d 보다 차갑지만 여전히 어떤 물 안정성 임계값 위에 잘 위치. 시각적으로 더 어두운 빨강-갈색 노출 암석 세계.</b> 32 cfg 픽. 16 canonical-aligned, 16 tie-break. 문서화된 divergence 없음.",

  "h2_150":"Surface synthesis",
  "p_151":"Barnard b 의 표면은 형제 d 의 더 차가운 대응물입니다. ~700 K 의 substellar 온도는 d 에서 보이는 광범위한 silicate partial-melt 에 도달하지 못하므로, cfg 는 d 의 partial-melt 액센트의 <i>부재</i> 로 b 를 d 와 구분합니다. 지배적인 톤은 산화철 basalt regolith (<span class=\"hex-chip\" style=\"background:#5e3526\"></span><code>#5e3526</code>) — 같은 M 왜성 조명에서 더 낮은 열복사 기여 때문에 d 보다 약간 더 어둡고 차가운 색입니다. terminator 산능 bedrock (<span class=\"hex-chip\" style=\"background:#7a4530\"></span><code>#7a4530</code>) 이 모데스트한 시각 변동을 제공합니다.",
  "p_152":"antistellar 반구는 깊은 cold-trap 입니다 (~130 K — d 의 100 K 보다 약간 더 따뜻한 이유는 약간 더 두꺼운 열적 regolith 의 더 큰 열-flux retention 때문). Gyr 시간 척도에 걸쳐 휘발성을 축적합니다. d 와 마찬가지로 antistellar cold-trap 에서의 휘발성 sequestration 은 plausible 이지만 직접 관측 가능하지 않습니다.",
  "p_153":"표면 형태는 Mercury / hot-rocky 템플릿을 따릅니다. 4 Gyr 의 impact cratering, 판 구조 없음, 그리고 과거 partial-melt 가동이 발생했다면 가능한 매끄러운 sub-substellar 영역. cfg 의 <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> 필드는 substellar 영역이 terminator 와 antistellar 영역보다 텍스처가 약간 더 매끄러운 크게 cratered 된 basalt 기준선을 캡처합니다.",
  "p_154":"Stefanov 2024 의 TESS transit 비검출은 b 의 반지름에 대한 간접 제약 을 제공합니다 — 행성이 약 1.5 R⊕ 보다 컸다면 기존 광도 모니터링 윈도우에서 transit 이 검출됐을 것입니다. cfg 의 R = 0.72 R⊕ 는 이 임계값 한참 아래이며, 0.3 M⊕ 지구 analog 암석 물질에 대한 질량-반지름 스케일링은 0.66–0.76 R⊕ 를 주며, 0.72 값이 시각 구분을 위한 중간값으로 선택됩니다.",
  "h2_155":"Atmosphere synthesis",
  "p_156":"b 는 의미 있는 대기가 없습니다. France 2020 의 HZ (0.1 AU) 에서의 대기 손실 계산은 25% flare 듀티 사이클 하에서 ~87 지구대기 Gyr⁻¹ 의 열적 escape 를 줍니다. b 의 0.0229 AU 에서 내부 시스템 강화 인자 는 대략 19× (반경 XUV 스케일링) 이므로, 10 Gyr 누적 손실은 0.3-M⊕ 행성에 대한 어떤 plausible 1차 대기 질량보다 수 자리수 더 큽니다.",
  "p_157":"살아남는 대기 서명은 Mercury 의 analog 인 sputter-구동 sodium exosphere 입니다. basalt 표면을 두드리는 Barnard 의 별바람은 Na (그리고 K, Ca 미량) 원자를 지속 분리시키며 ~10¹⁰ atoms cm⁻² 의 칼럼 밀도를 가진 중력적으로 unbound 인 exosphere 를 생성합니다. 표면 압력 등가는 ~10⁻⁹ Pa — 어떤 Rayleigh 산란 서명도 한참 밑돌아 가시 외관은 표면 톤에 의해 전적으로 지배됩니다 (cfg <code>atmosphere_tint_rgb_hex = n/a</code>).",
  "p_158":"Barnard 의 모데스트한 flare 동안의 에피소드 강화 (~25% 듀티 사이클, 개별 에너지 ~10²⁹·² – 10²⁹·⁵ erg, France 2020) 가 일시적인 sputtering 증가를 구동합니다. 이는 analog Proxima superflare 사건보다 훨씬 작지만, 10 Gyr 에 걸친 누적 대기 손실의 대부분에 기여합니다. 게임 내 효과는 sub-resolution 렌더링에 제한 — 가시 exospheric plume 없음.",
  "h2_159":"Rotation &amp; spin synthesis",
  "p_160":"b 는 1:1 (동기) 로 조석 잠겨 있으며 substellar 점이 행성 프레임 0° 경도에 고정되어 있습니다. 0.16 M☉ M 왜성 주위 0.0229 AU 의 0.3-M⊕ 암석 행성에 대한 Walterová 2020 조석 잠금 시간 척도는 10⁵ 년을 한참 밑돌아, 10 Gyr 시스템 나이보다 훨씬 짧습니다. 경사 또한 0° 로 감쇠.",
  "p_161":"Basant 2025 의 e = 0.03 은 1σ 에서 원과 일관됩니다. SPOCK 안정성은 e &lt; 0.02 를 선호합니다. 이 낮은 이심률에서 1:1 동기 구성이 지배하며 (3:2 trap 없음), libration 진폭은 작습니다 (&lt; 1°).",
  "p_162":"다른 세 행성과 결합해서, b 는 컴팩트 근-공명 체인에 참여합니다 (주기 비 3.15:4.12 ≈ 4:5. 2.34:3.15 ≈ 3:4). 그러나 시스템은 Basant 2025 SPOCK 분석 당 엄격한 mean-motion 공명에는 <i>없습니다</i> — 행성들은 공명 잠금 없이 장기 안정성을 위해 충분히 잘 분리되어 있습니다.",
  "h2_163":"Visual styling",
  "p_164":"Barnard b 는 d 의 더 차가운 어두운-빨강 형제입니다. cfg 의 <span class=\"hex-chip\" style=\"background:#5e3526\"></span><code>#5e3526</code> 1차 톤은 d 의 <span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code> 보다 더 어둡고 약간 더 갈색 톤입니다. 이는 더 낮은 substellar 온도 (700 K vs 800 K) 와 partial-melt 열복사의 부재 모두를 반영합니다. 궤도에서 b 는 d 와 동일한 sharp-terminator hot-rocky 위상 곡선을 보이며, 대기 헤이즈 없고 최소 limb darkening 입니다.",
  "p_165":"Barnard 는 b 의 하늘에서 4.3° 를 차지 — 지구에서 본 태양의 약 8× . 어둑한 빨강 조명은 영구히 어둑한 따뜻한-오렌지 표면 조명을 만듭니다. 누적 표면 dose 는 정상 플레이에서 치명적으로 유지됩니다 (cfg <code>surface_radiation_dose_msv_yr = 7000</code>, d 의 것보다 약간 낮음 — 차가운 substellar T 와 더 큰 궤도 반경에서의 감소된 XUV 플럭스 때문).",
  "p_166":"aurora cfg 필드는 모두 <code>false</code> / <code>n/a</code>. Barnard 의 flare 사건은 cfg 의 flare-duty-cycle 속도 (~25%) 에서 일시적인 ~5000-s 주변광 brightening 으로 나타나며, exotic 스펙트럼 특징은 없습니다. 게임 내 렌더링은 더 차가운 톤 basalt 표면을 강조해 b 를 더 뜨겁고 partial-melt 액센트가 있는 d 와 시각적으로 구분해야 합니다.",
  "h2_167":"Bibliography",
  "h3_168":"Read (visual-informative, drove decisions above)",
  "li_169":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). MAROON-X 확인. P = 3.1542 d, Msini = 0.299 ± 0.026 M⊕, a = 0.0229 AU, T_eq = 438 K (A=0, full redistribution).",
  "li_170":"<b>González Hernández J. I. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>, arXiv:2410.00569). ESPRESSO 발견. 현대 Barnard 시스템의 첫 확정 행성. 약간 다른 항성 매개변수 세트에서 abstract 에 T_eq = 400 K 명시.",
  "li_171":"<b>Stefanov A. K. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i> (arXiv:2410.00577). TESS 비검출이 transit 을 배제. R 을 간접적으로 &lt; 1.5 R⊕ 로 제약.",
  "li_172":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). Mega-MUSCLES HST + Chandra. 25% flare 듀티 사이클. b 의 대기-strip 시나리오를 뒷받침하는 대기 손실률.",
  "li_173":"<b>Lubin J. et al. 2021</b> — <i>Stellar Activity Manifesting at a One-year Alias Explains Barnard b as a False Positive</i> (<code>2021AJ....162...61L</code>. arXiv preprint 없음). Ribas 2018 반박 — 현재 Barnard b 가 2018 후보와 다른 행성임을 확립.",
  "li_174":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i> (arXiv:2007.12459). 조석 잠금 시간 척도 스케일링.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>Ribas I. et al. 2018</b> — <i>A candidate super-Earth planet orbiting near the snow line of Barnard&#x27;s star</i> (<code>2018Natur.563..365R</code>, arXiv:1811.05955). 역사적 클레임, 반박됨. b 라벨의 역사적 문헌 맥락으로 보존.",
  "li_177":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star</i> (arXiv:1812.06712). 행성의 일사 환경 기반의 호스트 회전 + 활동.",
  "h3_178":"Read (instrument-only, not visual-informative)",
  "li_179":"<b>Choi J. et al. 2013</b> — <i>Precise Doppler Monitoring of Barnard&#x27;s Star</i> (arXiv:1208.2273). 발견 이전 RV 상한.",
  "h3_180":"Not read — no arXiv preprint or low-priority (~140 papers)",
  "p_181":"대부분 Ribas 2018 후보 (현재 반박됨), 일반 M 왜성 행성 형성 이론, Barnard 를 RV 표준으로 언급하는 기기 개발 논문에 대한 역사적 2024 년 이전 논문. <code>docs/phase3/_bib/barnards-star-b.yaml</code> 에 <code>status: skipped</code> 로 보존.",
  "h2_182":"Open items for follow-up",
  "li_183":"<b>직접 반지름 측정</b>. transit 없음. 미래 astrometric 검출 (Gaia DR4 또는 직접 영상화) 이 실제 질량과 반지름을 제약할 수 있습니다. cfg 의 <code>radius_rearth = 0.72</code> 는 tie-break.",
  "li_184":"<b>질량-반지름에 의한 조성</b>. 반지름 없이는 암석 대 얼음 풍부가 축퇴됩니다. cfg 는 지구 analog 암석을 기본값으로 사용하며, Mercury 류 철 농축 대안도 윈도우 내.",
  "li_185":"<b>Lubin 2021 반박 세부</b>. 반박 논문은 arXiv preprint 가 없습니다. 미래 사용자가 붙여넣은 abstract 나 본문이 있다면 인용된 요약에 의존하지 않고 반박 방법론을 deep-read 할 수 있습니다.",
  "li_186":"<b>이심률 vs. 안정성</b>. Basant 2025 의 e = 0.03 ± 0.03 은 b 가 정확히 원이거나 약하게 이심률인지를 열어둡니다. 30 cm/s 정밀도의 장기 모니터링이 이를 개선할 수 있습니다.",
  "li_187":"<b>대기 유지 재-모델링</b>. France 2020 은 0.1 AU 의 자기장 없는 1 M⊕ 행성을 가정. M 왜성 바람 ram-pressure 스케일링과 0.0229 AU 의 0.299 M⊕ 에 대한 b 전용 모델은 cfg 의 <span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span> 결정을 개선할 것입니다. 현재 tie-break 은 노출 암석으로 기울어짐.",
  "h2_188":"Related",
  "li_189":"<a href=\"barnards-star.md\">barnards-star</a> — 호스트 별. 조용한 노쇠 M4 V",

  "li_191":"<a href=\"barnards-star-d.md\">barnards-star-d</a> — 안쪽 형제. 더 뜨거움 (substellar partial-melt 가시)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
