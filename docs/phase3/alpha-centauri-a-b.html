const T = {
  en: {
  "p_1":"α Centauri A b (&quot;S1&quot;) is a <b>JWST direct-imaging candidate</b> — a Saturn-class giant point source detected once, in August 2024, with JWST/MIRI&#x27;s F1550C coronagraph (15.5 µm) at a projected separation of 1.51″ (~2 AU) from the nearest Sun-like star (Beichman et al. 2025, &quot;Worlds Next Door I&quot;; Sanghi &amp; Beichman et al. 2025, &quot;II&quot;). The detection is faint — 3.5 ± 1.0 mJy, S/N 4–6 (≈4σ) — and was <b>not recovered</b> at two 2025 follow-up epochs, though orbit-fitting shows ~52% of the dynamically stable orbits are consistent with the planet simply having moved into a low-sensitivity region. The authors link S1 to <b>C1</b>, the 2019 VLT/NEAR candidate (Wagner et al. 2021), as the same object, and rule out detector, PSF, background, and Solar-System-object explanations. It is a genuine, well-vetted <b>candidate</b>, included in NearStars as a documented candidate (the tau Cet e / 40 Eri A b pattern) — the nearest candidate gas giant around a solar twin.",
  "p_2":"Everything physical is <b>model-derived from two mid-IR photometric points plus an orbit family</b>, not measured. The orbit splits into four stable families — {prograde, retrograde} × {a &lt; 2 AU, a &gt; 2 AU} — with eccentricity e ≈ 0.4 and periods of 2–3 yr; the authors favor the <b>a &lt; 2 AU family</b> (a ≈ 1.6 AU, T_eq ≈ 225 K) because the higher temperature better fits the F1550C brightness. The mass is <b>Saturn-class, 90–150 M⊕</b>, set by atmosphere fits restricted to log g 2.5–3.0 to respect the RV upper limits (Zhao et al. 2018). The favored atmosphere is a cool (~225 K), metal-enriched ([M/H] +0.5 to +1.0) H₂/He giant with <b>water clouds</b> — at this temperature ammonia has rained out and water is the condensing species, putting α Cen A b near the Sudarsky Class I/II water-cloud boundary.",

  "h2_155":"Surface synthesis",
  "p_156":"α Centauri A b has no solid surface — it is a ~120 M⊕ Saturn-class H₂/He giant. The &quot;surface&quot; for rendering is the cloud deck, and at ~225 K that deck is set by water.",
  "p_157":"The temperature regime is the key to the palette. At 1.6 AU around the 1.521 L☉ G2V star, the equilibrium temperature is ~225 K for the favored orbit family (Beichman 2025; recompute ≈ 224 K at A_B = 0.3). This is warmer than Jupiter (~165 K) and Saturn (~134 K), warm enough that <b>ammonia has rained out</b> and <b>water is the condensing cloud species</b> — placing α Cen A b near the Sudarsky Class I/II boundary. Water-cloud giants in this regime are bright, pale, and high-albedo, so the cfg renders the body as a <b>pale cool-white world</b> (<span class=\"hex-chip\" style=\"background:#dfe3e8\"></span><code>#dfe3e8</code> atmosphere, <span class=\"hex-chip\" style=\"background:#eef1f4\"></span><code>#eef1f4</code> clouds) with only faint zonal banding — distinct from Jupiter&#x27;s warm cream-amber. The metal enrichment ([M/H] +0.5 to +1.0, C/O ~2.5× solar; Beichman §5.2) and a moderate cloud compactness (f_sed 6) leave modest belt–zone contrast, brighter and more uniform than Jupiter.",
  "p_158":"Because internal heat is negligible (T_int &lt; 110 K; Beichman §5.1), the appearance is <b>insolation-set</b> — unlike the self-luminous super-Jupiter ε Indi A b, α Cen A b glows only as warm as its starlight makes it. The e ≈ 0.1 orbit swings the planet from ~1.44 AU (periastron) to ~1.76 AU (apastron), a mild ~1.5× insolation range, so the cloud deck likely brightens and the banding sharpens slightly near periastron — a gentle seasonal cycle on a ~2-yr period.",
  "p_159":"The defining visual is the <b>ring</b>. Adopting Beichman §5.3, α Cen A b carries a dark, optically thick rocky ring in its Roche zone (1.4–2.5 planetary radii), of cross-section ~0.9 R_Jup — about half the extent of Saturn&#x27;s rings. With an asteroid-like albedo (A_B ≈ 0.1) and a temperature of ~209–257 K, this is a <b>dark dusty ring</b> (<span class=\"hex-chip\" style=\"background:#6e6253\"></span><code>#6e6253</code>), not Saturn&#x27;s brilliant ice — a sombre, dust-coloured girdle around a pale giant.",
  "h2_160":"Atmosphere synthesis",
  "p_161":"<b>Pressure reference.</b> A gas giant has no solid surface; the cfg reference pressure is 1 bar (100 000 Pa), anchoring the cloud-deck render. The physically meaningful level is the water-cloud top.",
  "p_162":"<b>Composition.</b> Bulk H₂/He, as for any giant. The Beichman 2025 atmosphere fits that match the two mid-IR points require <b>metal enrichment</b> ([M/H] +0.5 to +1.0) and a cool ~225 K profile in which ammonia, methane, and water are in rainout chemistry — at 225 K ammonia has condensed/rained out below the visible deck and <b>water is the condensing cloud species</b>. The C/O ratio is fit-dependent: the §5.2 cloudy water-cloud fits use C/O ~2.5× solar, while the §5.3 model paired with the adopted ring is a clear atmosphere with C/O 1.5× and [M/H] +1.0. Solar-metallicity and hotter (≥250 K) models failed the photometry, so the metal-rich reading is the paper&#x27;s preferred fit; the cfg renders water clouds as the physically expected deck at 225 K and encodes the composition at medium confidence (model-constrained, exact mixing ratios less so).",
  "p_163":"<b>Sky appearance from a cloud-top / moon observer.</b> From the cloud tops the sky is a bright pale-white overcast, lit by a near-Sun-like star. α Cen A subtends ~0.41° at 1.6 AU — a touch smaller than our Sun, swinging from ~0.45° at periastron to ~0.37° at apastron — a warm-white G2V disk (<span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code>) delivering ~0.6 Earth&#x27;s insolation. The dark ring would arc across the sky as a dusty band, edge-lit by the star. The system&#x27;s spectacle is the <b>companion</b>: α Cen B, a K1V star, orbits the AB barycentre on an e ≈ 0.52 path from 11.2 to 35.6 AU, so from α Cen A b it is a brilliant orange second &quot;sun&quot; — at closest approach hundreds of times brighter than the full Moon, never a true disk but an intense point. Far beyond, Proxima hangs as a faint red speck at ~13 000 AU.",
  "p_164":"<b>Nightside.</b> With negligible internal heat the nightside is dark and cool (~225 K, radiating in the mid-IR — the band JWST detected it in). The quiet G2V stellar wind is a weak plasma driver, so no significant aurora is rendered (<code>aurora_present = false</code>), unlike the flare-host giants in the catalog.",
  "h2_165":"Rotation &amp; spin synthesis",
  "p_166":"No rotation measurement of α Cen A b exists — it is a single-epoch imaging candidate.",
  "p_167":"<b>Tidal damping argument.</b> At ~1.6 AU around a 1.1 M☉ star, the tidal timescale for a Saturn-class giant vastly exceeds the 5.3 Gyr age, so α Cen A b is <b>not</b> tidally locked (<code>tidally_locked = false</code>).",
  "p_168":"<b>Rotation period choice.</b> The cfg picks a Saturn/Jupiter-analog <code>rotation_period_hours = 10</code>, a within-window tie-break. Beichman §5.3 notes that the 1.1 R_Jup atmosphere-only radius would be unusually inflated for a mature giant unless it is <b>rapidly rotating and viewed near pole-on</b> — which is one motivation for the smaller ringed model the cfg adopts, and is consistent with a fast ~10 h spin.",
  "p_169":"<b>Obliquity.</b> Tie-break aesthetic: 27° (Saturn-analog) for a visually distinct tilt that reads naturally with the ring plane. The ring is rendered in the planet&#x27;s equatorial plane at this obliquity.",
  "p_170":"<b>KSP implementation note.</b> Rotation period = 10 h = 36 000 s (<code>rotationPeriod = 36000</code>); obliquity ≈ 27° from the orbital normal, with the <code>Ring</code> block sharing the equatorial plane.",
  "h2_171":"Visual styling",
  "p_172":"Combining the surface (cloud-deck), atmosphere, and ring decisions, α Cen A b renders as a pale, ringed, temperate Saturn-class giant — the nearest candidate gas giant around a solar twin:",
  "li_173":"<b>Global appearance.</b> From orbit, a pale cool-white disk (<span class=\"hex-chip\" style=\"background:#dfe3e8\"></span><code>#dfe3e8</code>) about 1.0 R_Jup (~71 000 km) across — a Saturn-mass world rendered bright and high-albedo (water clouds near the Class I/II boundary), deliberately distinct from Jupiter&#x27;s warm cream-amber.",
  "li_174":"<b>Cloud-deck detail.</b> A near-global pale water-cloud deck (~90% cover) with faint zonal banding (<span class=\"hex-chip\" style=\"background:#eef1f4\"></span><code>#eef1f4</code> clouds) and modest belt–zone contrast — brighter and more uniform than Jupiter, sharpening near periastron as insolation peaks.",
  "li_175":"<b>Ring.</b> A dark, dusty, optically thick rocky ring (<span class=\"hex-chip\" style=\"background:#6e6253\"></span><code>#6e6253</code>) in the Roche zone (1.4–2.5 planetary radii), cross-section ~0.9 R_Jup (~half Saturn&#x27;s extent), at ~209–257 K with asteroid-like low albedo — a sombre girdle, not Saturn&#x27;s brilliant ice. Inclined to the 27° obliquity.",
  "li_176":"<b>Limb.</b> A pale, bright water-cloud limb; thin and near-white.",
  "li_177":"<b>Nightside.</b> Dark and cool; no significant aurora (quiet G2V wind).",
  "li_178":"<b>Star in sky.</b> α Cen A subtends ~0.41° (periastron ~0.45°, apastron ~0.37°) — a warm-white G2V (<span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code>) near-Sun, ~0.6 Earth&#x27;s insolation.",
  "li_179":"<b>Companion suns.</b> α Cen B (K1V) sweeps from 11.2 to 35.6 AU on its e ≈ 0.52 orbit — a brilliant orange second sun, intense at periastron; far beyond, Proxima (M5.5Ve) is a faint red point at ~13 000 AU. The binary setting is the planet&#x27;s signature: an eccentric S-type giant in a close, bright two-star (plus distant red) sky.",
  "h2_180":"Canonical alternatives",
  "p_181":"The cfg renders the <b>ringed</b> reading; Beichman et al. 2025 §5.3 offers a co-equal ring-free interpretation of the same F1550C brightness.",
  "th_182":"cfg pick",
  "th_183":"Canonical alternative",
  "th_184":"Why cfg diverges",
  "td_185":"<code>ring_present = true</code>, <code>radius_rjup = 1.0</code> (smaller planet + optically thick dark ring)",
  "td_186":"<b>Ring-free inflated giant: <code>radius_rjup ≈ 1.1–1.15</code>, no ring</b> — the atmosphere-only best fit (Beichman §5.2). The larger radius alone supplies the cross-section that produces the F1550C brightness",
  "td_187":"Both are explicitly offered by Beichman as fitting the data equally; §5.3 notes 1.1 R_Jup is &quot;more commonly observed for hotter planets&quot; and is only plausible for a mature giant if rapidly rotating / pole-on, which motivates the ring alternative. The cfg picks the ring for visual distinctiveness (interesting-first), since it is paper-grounded and the more striking render. Users preferring the conservative reading should set <code>ring_present = false</code> and <code>radius_rjup = 1.1</code>",
  "td_188":"<code>eccentricity = 0.1</code>, <code>mutual_inclination = 16°</code> (stability-selected)",
  "td_189":"<b>Observed (Beichman): e ≈ 0.4, mutual inclination ≈ 50°</b> — the favored imaging-fit orbit",
  "td_190":"The observed orbit is Kozai-Lidov <b>unstable</b>: eccentric KL pumps e past 0.95 within ~30 kyr, periastron then crashing below the stellar radius over ~10⁵ yr (tidal disruption; REBOUND/IAS15, see <code>STABILITY_REPORT.md</code>). NearStars takes the median of the HZ-stable range instead. The Avatar canon 1.2 AU is a separate reading — dynamically stable but interior to α Cen A&#x27;s HZ (too warm), so 1.6 AU is the nearest robust HZ orbit",
  "p_191":"A second within-paper fork is the <b>orbit family</b>: the cfg uses the favored a &lt; 2 AU family (a ≈ 1.6 AU, T_eq ≈ 225 K). The a &gt; 2 AU family (a ≈ 2.1 AU, T_eq ≈ 195 K) is allowed but disfavored (lower T_eq fits the F1550C brightness less well). The Phase 2 DB orbital is now set to the favored a ≈ 1.6 AU family (reconciled from an earlier 1.9 AU midpoint).",
  "h2_192":"Cultural context — Avatar&#x27;s Polyphemus and Pandora",
  "p_193":"α Centauri A b is the real-world candidate that the science press and a 2025 follow-up identified with <b>Polyphemus</b>, the gas giant of James Cameron&#x27;s <i>Avatar</i>. In the films&#x27; canon Polyphemus is a Saturn-class gas giant orbiting <b>Alpha Centauri A</b> in its habitable zone, with fourteen moons — the fifth, <b>Pandora</b>, is the Na&#x27;vi homeworld. The match is close: a Saturn-class (90–150 M⊕) gas giant, no measured ring, in α Cen A&#x27;s HZ, at the nearest Sun-like star. When Beichman et al. 2025 reported S1, NPR and Live Science called it &quot;a real-life Pandora,&quot; and a 2025 astrobiology paper — <i>Seeking the Worlds of Avatar</i> — assessed the prospects for detecting exactly such habitable-zone moons.",
  "p_194":"This is naming/lore context only, kept separate from the measured science above. But the dynamical question it raises is real and is answered in <code>phase3/stability-sim</code>: can a Pandora-class habitable moon survive here? A REBOUND/IAS15 scan shows the observed eccentric/inclined orbit is Kozai-unstable (see Canonical alternatives), while the stability-selected orbit this synthesis uses (a = 1.6 AU, e = 0.1, mutual inclination ≈ 16°) keeps Polyphemus in the HZ over 10⁵ yr and hosts a Hill-stable Pandora-mass moon (0.45 M⊕) at ~225 000 km — a ~27 h tidally-locked day with Polyphemus spanning ~36° of its sky. The Avatar setup is dynamically viable, just not on the favored <i>observed</i> orbit. The Avatar canon places Polyphemus at 1.2 AU; that orbit is dynamically stable but sits interior to α Cen A&#x27;s habitable zone (too warm), so 1.6 AU is the nearest robust HZ orbit.",
  "h2_195":"Bibliography",
  "h3_196":"Read (drove decisions above)",
  "li_197":"<b>Beichman C. et al. 2025</b> — <i>JWST Observations of the Nearest Sun-Like Stars: Worlds Next Door I</i> (<code>2025ApJ...989L..22B</code>, doi:10.3847/2041-8213/adf53f, arXiv:2508.03814). The discovery paper. S1 = F1550C (15.5 µm) detection, 3.5 ± 1.0 mJy, 1.51″ (~2 AU), Aug 2024; four stable orbit families (e ≈ 0.4, P 2–3 yr, mutual i ≈ 50°/130°), a &lt; 2 AU favored; mass 90–150 M⊕; T_eq ≈ 225 K; metal-rich water-cloud atmosphere fits; <b>§5.3 the ring alternative</b> (~1 R_Jup + optically thick ring, Roche zone, A_B ≈ 0.1). Cornerstone — drives orbit, mass, temperature, atmosphere, and ring rows.",
  "li_198":"<b>Sanghi &amp; Beichman et al. 2025</b> — <i>Worlds Next Door II</i> (<a href=\"https://arxiv.org/abs/2508.03812\">arXiv:2508.03812</a>). The detection-vetting + orbit-dynamics paper. S/N 5.4 (≈4σ) PCA-KLIP detection; rules out detector / ε Mus PSF / α Cen B speckle / background / Solar-System-object explanations; links S1 to the 2019 VLT/NEAR <b>C1</b> (Wagner et al. 2021); ~52% of stable orbits consistent with the 2025 non-recoveries. Drives the detection-status framing and the candidate flag.",
  "h3_199":"Read (context / instrument-only, not decision-driving)",
  "li_200":"<b>Wagner K. et al. 2021</b> (VLT/NEAR, cited) — the 2019 <b>C1</b> candidate (11.25 µm, 1.2 ± 0.4 mJy, ~1.1 AU), originally read as a ≳300 K planet (radius ≳ 3.3 R⊕) or a 60-zodi dust clump; the JWST exozodi non-detection favors the planet interpretation, and S1+C1 are treated as one object.",
  "li_201":"<b>Zhao et al. 2018</b> (cited) — α Cen A RV upper limits (M sin i ≲ 100 M⊕ for P ≲ 1000 d) that bound the mass; α Cen A b is built to respect them.",
  "li_202":"<b>Akeson R. et al. 2021</b> (cited) — α Cen AB orbit (i_AB = 79.24°, Ω_AB = 205.07°) used to convert the mutual inclination to the sky plane.",
  "h3_203":"Not read — no arXiv full text / superseded",
  "li_204":"The PICASO / Sonora Flame Skimmer / ATMO2020++ model grids underlying the atmosphere fits are read for the best-fit parameters already cited but contribute no further cfg number. Comparable-system references (HD 196885 Ab, γ Cep Ab — S-type planets in close eccentric binaries) frame the architecture but add no per-planet visual field.",
  "h2_205":"Open items for follow-up",
  "li_206":"<b>Existence / recovery.</b> S1 is a single-roll detection not recovered in 2025. Confirmation needs a JWST epoch catching it back in the detectable separation range (~52% of orbits predict recovery on the next favourable epoch) or an independent imaging detection. If refuted, the entry should be reclassified.",
  "li_207":"<b>DB semi-major-axis (resolved).</b> The Phase 2 DB orbital originally used a = 1.9 AU (P = 2.5 yr), a midpoint that leaned toward the <b>disfavored</b> a &gt; 2 AU family. It was reconciled to the authors&#x27; favored a ≈ 1.6 AU / P 705 d (T_eq ≈ 225 K) so the in-game orbit matches this synthesis; the a &gt; 2 AU family (a ≈ 2.1 AU) is retained only in prose as the disfavored alternative.",
  "li_208":"<b>Dynamical stability (Kozai-Lidov) — resolved.</b> The orbit is now <b>stability-selected</b> (e = 0.1, mutual i ≈ 16°), the median of the HZ-stable range from a REBOUND/IAS15 scan (<code>phase3/stability-sim</code>, see <code>STABILITY_REPORT.md</code>): it keeps the planet in α Cen A&#x27;s habitable zone (orbit 1.345–1.854 AU, e_max 0.157, MEGNO 2.000) over 10⁵ yr and hosts a Hill-stable Pandora-mass moon. The Beichman-observed e ≈ 0.4 / mutual i ≈ 50° orbit is <b>Kozai-Lidov unstable</b> (eccentric KL pumps e past 0.95 within ~30 kyr, periastron then crashing below the stellar radius over ~10⁵ yr — tidal disruption) and is retained only as the unstable canonical alternative. The one remaining open item is the cfg-frame inclination: the constrained quantity is the mutual inclination to the AB plane (≈16°), which still needs converting to the system-frame value for the cfg.",
  "li_209":"<b>Ring vs inflated radius.</b> The ring (<code>ring_present = true</code>) and the ring-free 1.1 R_Jup giant are co-equal paper readings (<code>## Canonical alternatives</code>). A resolved image or a NIRCam 4–5 µm measurement (which would separate the clear vs cloudy/ringed models) would decide it.",
  "li_210":"<b>Atmosphere ingest.</b> α Cen A b has no Phase 2 atmosphere block in the DB (orbital + physical only). When the schema is extended, the Beichman 2025 metal-rich water-cloud best fit should be ingested as <code>atmosphere_measurements</code> matching the cfg picks here.",
  "li_211":"<b>Rotation / obliquity.</b> Both are within-window tie-breaks (10 h, 27°), unconstrained by any measurement.",
  "h2_212":"Related",
  "li_213":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a> — host star Phase 3 synthesis; provides the G2V Teff / L / R / mass / age, the binary-event geometry, and the illumination-color-temperature reference. (Its intro notes the candidate as &quot;unconfirmed&quot; — predates this planet-level synthesis.)",
  "li_214":"<a href=\"alpha-centauri-b.md\">alpha-centauri-b</a> — the K1V companion, the brilliant second sun in α Cen A b&#x27;s sky",
  "li_215":"<a href=\"proxima-cen-c.md\">proxima-cen-c</a> — the other new candidate in this triple; contrast Proxima c&#x27;s cold ice giant against α Cen A b&#x27;s temperate ringed Saturn-class giant",
  "li_216":"<a href=\"eps-ind-a-b.md\">eps-ind-a-b</a> — comparison giant around a nearby dwarf; contrast ε Indi A b&#x27;s massive, self-luminous super-Jupiter against α Cen A b&#x27;s lower-mass, insolation-set, ringed temperate giant",
  "li_217":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions schema",

  ko: {
  "p_1":"α Centauri A b (&quot;S1&quot;) 는 <b>JWST 직접 촬영 후보</b>입니다. 토성급 거대 행성의 점광원으로, 2024년 8월에 JWST/MIRI 의 F1550C 코로나그래프 (15.5 µm) 로 단 한 번 검출되었으며, 가장 가까운 태양형 별로부터 투영 이격 1.51″ (~2 AU) 지점에 있었습니다 (Beichman et al. 2025, &quot;Worlds Next Door I&quot;; Sanghi &amp; Beichman et al. 2025, &quot;II&quot;). 검출 신호는 어두워서 3.5 ± 1.0 mJy, S/N 4–6 (≈4σ) 수준이었고, 2025년 두 차례의 후속 관측에서는 <b>재검출되지 않았습니다</b>. 다만 궤도 피팅에 따르면 역학적으로 안정한 궤도의 ~52% 가 행성이 단순히 저감도 영역으로 이동했다는 설명과 양립합니다. 저자들은 S1 을 2019년 VLT/NEAR 후보 <b>C1</b> (Wagner et al. 2021) 과 동일한 천체로 연결하며, 검출기, PSF, 배경, 태양계 천체로 인한 설명을 배제합니다. 이것은 진짜이며 충분히 검증된 <b>후보</b>로서, NearStars 에는 문서화된 후보로 포함됩니다 (tau Cet e / 40 Eri A b 패턴). 태양 쌍둥이 별 주위에서 가장 가까운 후보 가스 행성입니다.",
  "p_2":"모든 물리량은 <b>두 개의 중적외선 측광점과 하나의 궤도 패밀리로부터 모델로 유도된 값</b>이며, 측정된 것이 아닙니다. 궤도는 네 개의 안정한 패밀리 — {순행, 역행} × {a &lt; 2 AU, a &gt; 2 AU} — 로 나뉘고, 이심률 e ≈ 0.4, 주기 2–3 년입니다. 저자들은 <b>a &lt; 2 AU 패밀리</b> (a ≈ 1.6 AU, T_eq ≈ 225 K) 를 선호하는데, 더 높은 온도가 F1550C 밝기에 더 잘 맞기 때문입니다. 질량은 <b>토성급 90–150 M⊕</b> 로, RV 상한 (Zhao et al. 2018) 을 존중하기 위해 log g 2.5–3.0 으로 제한한 대기 피팅에서 정해집니다. 선호되는 대기는 차갑고 (~225 K) 금속이 농축된 ([M/H] +0.5 ~ +1.0) H₂/He 거대 행성으로 <b>물 구름</b>을 가집니다. 이 온도에서는 암모니아가 비로 씻겨 내려가고 물이 응결종이 되며, 따라서 α Cen A b 는 Sudarsky Class I/II 물-구름 경계 근처에 놓입니다.",
  "p_3":"발견 논문은 같은 밝기에 대해 인상적인 대안을 하나 제시합니다. <b>더 작은 (~1 R_Jup, ~120 M⊕) 행성이 광학적으로 두꺼운 환주 고리로 둘러싸였다는 해석</b> (Beichman §5.3) 입니다. 단면적 ~64 000 km (≈ 0.9 R_Jup, 토성 고리 폭의 약 절반) 의 고리가 로슈 영역 (행성 반지름 의 1.4–2.5 배) 안에 ~209–257 K 로 자리하며, 소행성과 유사한 어두운 알베도를 가집니다. 이 고리 해석은 <b>논문에 근거한 것</b> (지어낸 것이 아님) 이고, 가장 가까운 태양형 별 주위의 고리 두른 거대 행성이 더 독특한 렌더이기 때문에, cfg 는 이 해석을 채택합니다.",
  "p_4":"<b>NearStars 시나리오 선택. G2V 태양 쌍둥이 α Centauri A 주위에서 안정성으로 선택한 거의 원형 궤도 (e ≈ 0.1) ~1.6 AU 를 도는 온화한 (~225 K) 토성급 가스 행성으로, 어둡고 광학적으로 두꺼운 암석 고리에 둘러싸인 단일-관측 JWST 후보이며, 가깝고 이심한 α Cen AB 쌍성계 안에 상호 경사 ~16° (관측된 ~50° 는 Kozai-불안정) 로 놓여 있습니다.</b> 질량, 온도, 물-구름 대기는 논문이 선호하는 해이며 canonical 과 정렬됩니다. 반면 궤도의 이심률과 경사는 NearStars 안정성 선택값입니다 (관측된 e ≈ 0.4 / i ≈ 50° 궤도는 Kozai-불안정. <code>## Canonical alternatives</code> 참조). 고리 (고리 없는 1.1 R_Jup 팽창 거대 행성 대신), 옅은 구름 색조, 자전, obliquity 는 tie-break 입니다. 고리 없는 해석은 <code>## Canonical alternatives</code> 에 보존됩니다.",
  "h2_5":"Decisions",
  "p_6":"Kopernicus / atmosphere cfg-ready 값입니다. <code>Confidence</code>. high = 직접 측정되었거나 강하게 제약됨, medium = 강한 근거를 갖춘 이론, low = 허용 범위 내의 미적 선택. 전체 하한선. 이 행성은 <b>확인되지 않은 단일-관측 후보</b>이므로, &quot;high&quot; 행도 행성의 존재와 선호 궤도 패밀리를 전제로 합니다.",

  "td_138":"Reiners &amp; Christensen 2010 (<a href=\"https://arxiv.org/abs/1007.1514\">arXiv:1007.1514</a>) 깊이 보정 dipole 스케일링. 0.378 M_Jup·5.3 Gyr에서 B_eq ≈ 172 µT (B_pol ≈ 345 µT), 목성에 같은 식을 넣은 sanity check 통과. 기존의 미근거 ~500 µT 토성 아날로그 추측을 대체. 단 0.378 M_Jup은 거대행성 영역 하한이라 He 성층화로 더 낮아질 수도 있음 (토성 ~21 µT). canonical method는 docs/reference/planetary-dynamo-scaling.md",

  "td_143":"<span class=\"field-tt\" data-ko-tip=\"하늘에서 모항성의 시직경 (도). 지구에서 본 태양 ≈ 0.53°.\" data-en-tip=\"Host star angular diameter as seen from the planet (degrees). Sun-from-Earth ≈ 0.53°.\"><code>star_apparent_angular_diameter_deg</code></span>",

  "td_151":"<code>companion_stars_in_sky</code>",
  "td_152":"α Cen B (K1V) 11.2–35.6 AU. Proxima (M5.5Ve) ~13 000 AU",
  "td_153":"high",
  "td_154":"Akeson et al. 2021 / Kervella 2017. 이심한 K형 왜성 동반성은 눈부신 두 번째 &quot;태양&quot;. Proxima 는 희미한 붉은 점",
  "h2_155":"Surface synthesis",
  "p_156":"α Centauri A b 는 고체 표면이 없습니다. ~120 M⊕ 토성급 H₂/He 거대 행성입니다. 렌더링에서 &quot;표면&quot;은 구름 데크이며, ~225 K 에서 그 데크는 물이 결정합니다.",
  "p_157":"온도 영역이 팔레트의 핵심입니다. 1.521 L☉ G2V 별 주위 1.6 AU 에서 평형 온도는 선호 궤도 패밀리에 대해 ~225 K 입니다 (Beichman 2025. A_B = 0.3 에서 재계산하면 ≈ 224 K). 이것은 목성 (~165 K) 과 토성 (~134 K) 보다 따뜻하며, <b>암모니아가 비로 씻겨 내려가고</b> <b>물이 응결 구름종</b>이 될 만큼 따뜻하여 α Cen A b 를 Sudarsky Class I/II 경계 근처에 놓습니다. 이 영역의 물-구름 거대 행성은 밝고 옅으며 고알베도이므로, cfg 는 이 천체를 옅은 zonal banding 만 있는 <b>옅은 차가운-흰 세계</b> (<span class=\"hex-chip\" style=\"background:#dfe3e8\"></span><code>#dfe3e8</code> 대기, <span class=\"hex-chip\" style=\"background:#eef1f4\"></span><code>#eef1f4</code> 구름) 로 렌더합니다 — 목성의 따뜻한 크림-호박색과 구별됩니다. 금속 농축 ([M/H] +0.5 ~ +1.0, C/O ~태양의 2.5배. Beichman §5.2) 과 적당한 구름 조밀도 (f_sed 6) 는 적당한 belt-zone 대비를 남겨, 목성보다 밝고 더 균일합니다.",
  "p_158":"내부열이 무시할 만하므로 (T_int &lt; 110 K. Beichman §5.1), 외관은 <b>일사로 결정됩니다</b> — 자체발광하는 슈퍼-목성 ε Indi A b 와 달리, α Cen A b 는 별빛이 데우는 만큼만 따뜻하게 빛납니다. e ≈ 0.1 궤도는 행성을 ~1.44 AU (근일점) 에서 ~1.76 AU (원일점) 까지 흔들어 ~1.5배의 완만한 일사 범위를 만들므로, 구름 데크는 근일점 근처에서 약간 밝아지고 banding 이 살짝 선명해질 가능성이 큽니다 — ~2 년 주기의 부드러운 계절 순환입니다.",
  "p_159":"대표적인 시각 요소는 <b>고리</b>입니다. Beichman §5.3 을 채택하면, α Cen A b 는 로슈 영역 (행성 반지름의 1.4–2.5 배) 에 어둡고 광학적으로 두꺼운 암석 고리를 두르고 있으며, 단면적은 ~0.9 R_Jup — 토성 고리 폭의 약 절반입니다. 소행성과 유사한 알베도 (A_B ≈ 0.1) 와 ~209–257 K 의 온도로, 이것은 토성의 눈부신 얼음이 아니라 <b>어두운 먼지질 고리</b> (<span class=\"hex-chip\" style=\"background:#6e6253\"></span><code>#6e6253</code>) 입니다 — 옅은 거대 행성을 두른 음울한 먼지색 띠입니다.",
  "h2_160":"Atmosphere synthesis",
  "p_161":"<b>압력 기준.</b> 가스 행성은 고체 표면이 없습니다. cfg 기준 압력은 1 bar (100 000 Pa) 로, 구름 데크 렌더를 고정합니다. 물리적으로 의미 있는 층은 물-구름 상단입니다.",
  "p_162":"<b>조성.</b> 여느 거대 행성과 마찬가지로 본체는 H₂/He 입니다. 두 중적외선 점에 맞는 Beichman 2025 대기 피팅은 <b>금속 농축</b> ([M/H] +0.5 ~ +1.0) 과 차가운 ~225 K 프로파일을 요구하며, 그 안에서 암모니아, 메탄, 물이 rainout 화학에 있습니다 — 225 K 에서 암모니아는 가시 데크 아래로 응결/씻겨 내려가고 <b>물이 응결 구름종</b>이 됩니다. C/O 비는 피팅 의존적입니다. §5.2 의 흐린 물-구름 피팅은 C/O ~태양의 2.5배를 쓰고, 채택된 고리와 짝지은 §5.3 모델은 C/O 1.5배, [M/H] +1.0 의 맑은 대기입니다. 태양 금속도 및 더 뜨거운 (≥250 K) 모델은 측광을 통과하지 못했으므로, 금속이 풍부한 해석이 논문이 선호하는 피팅입니다. cfg 는 225 K 에서 물리적으로 예상되는 데크로 물 구름을 렌더하고 조성을 medium 신뢰도로 인코딩합니다 (모델 제약. 정확한 혼합비는 그보다 덜 제약).",
  "p_163":"<b>구름 상단 / 위성 관측자에서 본 하늘.</b> 구름 상단에서 하늘은 거의 태양 같은 별이 비추는 밝고 옅은 흰 흐린 하늘입니다. α Cen A 는 1.6 AU 에서 ~0.41° 를 가립니다 — 우리 태양보다 약간 작고, 근일점에서 ~0.45°, 원일점에서 ~0.37° 로 흔들립니다 — 따뜻한 흰 G2V 원반 (<span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code>) 이 지구 일사의 ~0.6배를 전달합니다. 어두운 고리는 별빛에 가장자리가 비추는 먼지 띠로 하늘을 가로질러 호를 그립니다. 시스템의 볼거리는 <b>동반성</b>입니다. K1V 별 α Cen B 는 AB 무게중심을 e ≈ 0.52 경로로 11.2 에서 35.6 AU 까지 돌므로, α Cen A b 에서 보면 눈부신 주황색 두 번째 &quot;태양&quot;입니다 — 최근접에서 보름달보다 수백 배 밝지만 결코 진짜 원반은 아닌 강렬한 점입니다. 그 너머로 Proxima 가 ~13 000 AU 에 희미한 붉은 점으로 걸려 있습니다.",
  "p_164":"<b>밤면.</b> 내부열이 무시할 만하므로 밤면은 어둡고 차갑습니다 (~225 K, JWST 가 검출한 중적외선 대역에서 복사). 조용한 G2V 항성풍은 약한 플라스마 구동체이므로, 카탈로그의 플레어-호스트 거대 행성들과 달리 유의미한 오로라는 렌더하지 않습니다 (<code>aurora_present = false</code>).",
  "h2_165":"Rotation &amp; spin synthesis",
  "p_166":"α Centauri A b 의 자전 측정은 존재하지 않습니다 — 단일-에포크 촬영 후보입니다.",
  "p_167":"<b>조석 감쇠 논증.</b> 1.1 M☉ 별 주위 ~1.6 AU 에서, 토성급 거대 행성의 조석 시간은 5.3 Gyr 나이를 크게 초과하므로, α Cen A b 는 조석 고정되어 있지 <b>않습니다</b> (<code>tidally_locked = false</code>).",
  "p_168":"<b>자전 주기 선택.</b> cfg 는 토성/목성 아날로그 <code>rotation_period_hours = 10</code> 을 채택하며, 범위 내 tie-break 입니다. Beichman §5.3 은 1.1 R_Jup 대기 전용 반지름이 성숙한 거대 행성치고 비정상적으로 팽창한 값이 되는데, <b>빠르게 자전하며 거의 pole-on 으로 보는</b> 경우라면 가능하다고 언급합니다 — 이것이 cfg 가 채택한 더 작은 고리 모델의 동기 중 하나이며, 빠른 ~10 h spin 과 일관됩니다.",
  "p_169":"<b>Obliquity.</b> Tie-break 미학. 고리면과 자연스럽게 읽히는 시각적으로 구별되는 기울기를 위해 27° (토성 아날로그) 채택. 고리는 이 obliquity 에서 행성의 적도면에 렌더됩니다.",
  "p_170":"<b>KSP 구현 노트.</b> 자전 주기 = 10 h = 36 000 s (<code>rotationPeriod = 36000</code>). obliquity ≈ 27° (궤도 법선 기준), <code>Ring</code> 블록은 적도면을 공유합니다.",
  "h2_171":"Visual styling",
  "p_172":"표면 (구름 데크), 대기, 고리 결정을 종합하면, α Cen A b 는 옅고 고리를 두른 온화한 토성급 거대 행성으로 렌더됩니다 — 태양 쌍둥이 별 주위에서 가장 가까운 후보 가스 행성입니다.",
  "li_173":"<b>전역 외관.</b> 궤도에서 보면 폭 약 1.0 R_Jup (~71 000 km) 의 옅은 차가운-흰 원반 (<span class=\"hex-chip\" style=\"background:#dfe3e8\"></span><code>#dfe3e8</code>) — 밝고 고알베도로 (Class I/II 경계 근처의 물 구름) 렌더된 토성질량 세계로, 목성의 따뜻한 크림-호박색과 의도적으로 구별됩니다.",
  "li_174":"<b>구름 데크 디테일.</b> 옅은 zonal banding (<span class=\"hex-chip\" style=\"background:#eef1f4\"></span><code>#eef1f4</code> 구름) 과 적당한 belt-zone 대비를 동반한 거의 전역적인 옅은 물-구름 데크 (~90% 덮임) — 목성보다 밝고 더 균일하며, 일사가 정점에 달하는 근일점 근처에서 선명해집니다.",
  "li_175":"<b>고리.</b> 로슈 영역 (행성 반지름의 1.4–2.5 배) 에 있는 어둡고 먼지질 이며 광학적으로 두꺼운 암석 고리 (<span class=\"hex-chip\" style=\"background:#6e6253\"></span><code>#6e6253</code>), 단면적 ~0.9 R_Jup (~토성 폭의 절반), ~209–257 K 에 소행성과 유사한 저알베도 — 토성의 눈부신 얼음이 아닌 음울한 띠입니다. 27° obliquity 로 기울어져 있습니다.",
  "li_176":"<b>Limb.</b> 옅고 밝은 물-구름 limb. 얇고 거의 흰색입니다.",
  "li_177":"<b>밤면.</b> 어둡고 차가움. 유의미한 오로라 없음 (조용한 G2V 항성풍).",
  "li_178":"<b>하늘의 별.</b> α Cen A 는 ~0.41° (근일점 ~0.45°, 원일점 ~0.37°) 를 가립니다 — 따뜻한 흰 G2V (<span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code>) 근거리 태양으로, 지구 일사의 ~0.6배입니다.",
  "li_179":"<b>동반성 태양들.</b> α Cen B (K1V) 는 e ≈ 0.52 궤도에서 11.2 에서 35.6 AU 까지 휩쓸고 지납니다 — 눈부신 주황색 두 번째 태양으로 근일점 에서 강렬합니다. 그 너머로 Proxima (M5.5Ve) 가 ~13 000 AU 에 희미한 붉은 점입니다. 쌍성 배경은 이 행성의 시그니처입니다. 가깝고 밝은 두-별 (게다가 먼 붉은 별) 하늘 속의 이심한 S-type 거대 행성입니다.",
  "h2_180":"Canonical alternatives",
  "p_181":"cfg 는 <b>고리 두른</b> 해석을 렌더합니다. Beichman et al. 2025 §5.3 은 같은 F1550C 밝기에 대한 동등한 고리 없는 해석을 제시합니다.",
  "th_182":"cfg pick",
  "th_183":"Canonical alternative",
  "th_184":"Why cfg diverges",
  "td_185":"<code>ring_present = true</code>, <code>radius_rjup = 1.0</code> (더 작은 행성 + 광학적으로 두꺼운 어두운 고리)",
  "td_186":"<b>고리 없는 팽창 거대 행성: <code>radius_rjup ≈ 1.1–1.15</code>, 고리 없음</b> — 대기 전용 최적 피팅 (Beichman §5.2). 더 큰 반지름 단독으로 F1550C 밝기를 만드는 단면적을 공급",
  "td_187":"둘 다 Beichman 이 데이터에 동등하게 맞는다고 명시적으로 제시. §5.3 은 1.1 R_Jup 이 &quot;더 뜨거운 행성에서 더 흔히 관측된다&quot;고 언급하며, 성숙한 거대 행성에서는 빠르게 자전 / pole-on 인 경우에만 그럴듯하다고 보아 고리 대안의 동기가 됨. cfg 는 시각적 독특함 (interesting-first) 을 위해 고리를 선택하는데, 논문에 근거하며 더 인상적인 렌더이기 때문. 보수적 해석을 선호하는 사용자는 <code>ring_present = false</code> 와 <code>radius_rjup = 1.1</code> 로 설정",
  "td_188":"<code>eccentricity = 0.1</code>, <code>mutual_inclination = 16°</code> (안정성 선택값)",
  "td_189":"<b>관측값 (Beichman): e ≈ 0.4, 상호 경사 ≈ 50°</b> — 선호되는 영상-피팅 궤도",
  "td_190":"관측 궤도는 Kozai-Lidov <b>불안정</b>입니다. eccentric KL 이 ~30 kyr 안에 e 를 0.95 너머로 끌어올리고, 이후 ~10⁵년에 걸쳐 근일점이 별 반경 아래로 추락합니다 (조석 파괴. REBOUND/IAS15, <code>STABILITY_REPORT.md</code> 참조). NearStars 는 대신 HZ-안정 범위의 중앙값을 택합니다. 아바타 정전의 1.2 AU 는 별개의 해석으로, 동역학적으로는 안정하지만 α Cen A 의 HZ 안쪽 (너무 뜨거움) 에 있어 1.6 AU 가 가장 가까운 견고한 HZ 궤도입니다",
  "p_191":"논문 내부의 두 번째 분기점은 <b>궤도 패밀리</b>입니다. cfg 는 선호되는 a &lt; 2 AU 패밀리 (a ≈ 1.6 AU, T_eq ≈ 225 K) 를 씁니다. a &gt; 2 AU 패밀리 (a ≈ 2.1 AU, T_eq ≈ 195 K) 는 허용되지만 비선호입니다 (더 낮은 T_eq 가 F1550C 밝기에 덜 맞음). Phase 2 DB 궤도는 이제 선호되는 a ≈ 1.6 AU 패밀리로 설정돼 있습니다 (이전 1.9 AU 중간값에서 조정함).",
  "h2_192":"문화 컨텍스트 — 아바타의 폴리페무스와 판도라",
  "p_193":"α Centauri A b 는 과학 언론과 2025년 후속 연구가 제임스 캐머런 <i>아바타</i> 의 가스 행성 <b>폴리페무스</b>와 동일시한 현실 속 후보입니다. 영화의 설정 에서 폴리페무스는 <b>Alpha Centauri A</b> 의 거주 가능 영역을 도는 토성급 가스 행성으로 열네 개의 위성을 거느리며, 다섯 번째 위성 <b>판도라</b>가 나비족의 고향입니다. 일치도가 높습니다. 토성급 (90–150 M⊕) 가스 행성, 측정된 고리 없음, α Cen A 의 HZ 안, 가장 가까운 태양형 별. Beichman et al. 2025 가 S1 을 보고했을 때 NPR 과 Live Science 는 이를 &quot;현실 속 판도라&quot;라 불렀고, 2025년 우주생물학 논문 <i>Seeking the Worlds of Avatar</i> 는 바로 그런 거주 가능 영역 위성을 검출할 전망을 평가했습니다.",
  "p_194":"이것은 명명/설정 컨텍스트일 뿐이며, 위의 측정된 과학과는 분리해 둡니다. 하지만 이것이 제기하는 역학적 질문은 진짜이고 <code>phase3/stability-sim</code> 에서 답합니다. 판도라급 거주 가능 위성이 여기서 살아남을 수 있을까요? REBOUND/IAS15 스캔 결과 관측된 이심/경사 궤도는 Kozai-불안정이지만 (Canonical alternatives 참조), 이 합성이 사용하는 안정성 선택 궤도 (a = 1.6 AU, e = 0.1, 상호 경사 ≈ 16°) 는 폴리페무스를 10⁵ 년에 걸쳐 HZ 안에 유지하며 ~225 000 km 에 Hill-안정한 판도라질량 위성 (0.45 M⊕) 을 거느립니다 — 폴리페무스가 하늘의 ~36° 를 가리는 ~27 h 조석 고정된 하루입니다. 아바타 설정은 역학적으로 성립하며, 다만 선호되는 <i>관측</i> 궤도에서는 아닙니다. 아바타 정전은 폴리페무스를 1.2 AU 에 두는데, 그 궤도는 동역학적으로는 안정하지만 α Cen A 의 거주 가능 영역 안쪽 (너무 뜨거움) 에 자리해, 1.6 AU 가 가장 가까운 견고한 HZ 궤도입니다.",
  "h2_195":"Bibliography",
  "h3_196":"Read (drove decisions above)",
  "li_197":"<b>Beichman C. et al. 2025</b> — <i>JWST Observations of the Nearest Sun-Like Stars: Worlds Next Door I</i> (<code>2025ApJ...989L..22B</code>, doi:10.3847/2041-8213/adf53f, arXiv:2508.03814). 발견 논문. S1 = F1550C (15.5 µm) 검출, 3.5 ± 1.0 mJy, 1.51″ (~2 AU), 2024년 8월. 네 개의 안정한 궤도 패밀리 (e ≈ 0.4, P 2–3 년, 상호 i ≈ 50°/130°), a &lt; 2 AU 선호. 질량 90–150 M⊕. T_eq ≈ 225 K. 금속이 풍부한 물-구름 대기 피팅. <b>§5.3 의 고리 대안</b> (~1 R_Jup + 광학적으로 두꺼운 고리, 로슈 영역, A_B ≈ 0.1). 핵심 근거 — 궤도, 질량, 온도, 대기, 고리 행을 견인.",
  "li_198":"<b>Sanghi &amp; Beichman et al. 2025</b> — <i>Worlds Next Door II</i> (<a href=\"https://arxiv.org/abs/2508.03812\">arXiv:2508.03812</a>). 검출 검증 + 궤도 역학 논문. S/N 5.4 (≈4σ) PCA-KLIP 검출. 검출기 / ε Mus PSF / α Cen B speckle / 배경 / 태양계 천체 설명을 배제. S1 을 2019년 VLT/NEAR <b>C1</b> (Wagner et al. 2021) 과 연결. 안정 궤도의 ~52% 가 2025년 비재검출과 양립. 검출 상태 프레이밍과 후보 플래그를 견인.",
  "h3_199":"Read (context / instrument-only, not decision-driving)",
  "li_200":"<b>Wagner K. et al. 2021</b> (VLT/NEAR, 인용) — 2019년 <b>C1</b> 후보 (11.25 µm, 1.2 ± 0.4 mJy, ~1.1 AU). 원래는 ≳300 K 행성 (반지름 ≳ 3.3 R⊕) 또는 60-zodi 먼지 덩어리로 읽혔으나, JWST exozodi 비검출이 행성 해석을 선호하며 S1+C1 은 하나의 천체로 취급.",
  "li_201":"<b>Zhao et al. 2018</b> (인용) — α Cen A RV 상한 (P ≲ 1000 d 에서 M sin i ≲ 100 M⊕) 으로 질량을 한정. α Cen A b 는 이를 존중하도록 구성.",
  "li_202":"<b>Akeson R. et al. 2021</b> (인용) — 상호 경사를 시선 방향으로 변환하는 데 쓰인 α Cen AB 궤도 (i_AB = 79.24°, Ω_AB = 205.07°).",
  "h3_203":"Not read — no arXiv full text / superseded",
  "li_204":"대기 피팅의 기반이 되는 PICASO / Sonora Flame Skimmer / ATMO2020++ 모델 그리드는 이미 인용된 최적 피팅 파라미터를 위해 읽었으나 추가 cfg 수치를 제공하지 않음. 유사 시스템 참조 (HD 196885 Ab, γ Cep Ab — 가깝고 이심한 쌍성계의 S-type 행성) 는 아키텍처를 틀짓지만 행성별 시각 필드를 추가하지 않음.",
  "h2_205":"Open items for follow-up",
  "li_206":"<b>존재 / 재검출.</b> S1 은 2025년에 재검출되지 않은 단일-관측 검출입니다. 확인을 위해서는 검출 가능 이격 범위로 돌아온 행성을 포착하는 JWST 에포크 (다음 유리한 에포크에서 궤도의 ~52% 가 재검출 예측) 나 독립적인 촬영 검출이 필요합니다. 반증되면 엔트리는 재분류되어야 합니다.",
  "li_207":"<b>DB 장반경 (해결됨).</b> Phase 2 DB 궤도는 원래 a = 1.9 AU (P = 2.5 년) 를 썼는데, 이는 <b>비선호</b> a &gt; 2 AU 패밀리 쪽으로 기우는 중간값이었습니다. 저자들이 선호하는 a ≈ 1.6 AU / P 705 d (T_eq ≈ 225 K) 로 조정해 인게임 궤도가 이 합성과 일치하도록 했습니다. a &gt; 2 AU 패밀리 (a ≈ 2.1 AU) 는 비선호 대안으로 본문에만 남겨 둡니다.",
  "li_208":"<b>동역학 안정성 (Kozai-Lidov) — 해결됨.</b> 궤도는 이제 <b>안정성 선택값</b> (e = 0.1, 상호 i ≈ 16°) 으로, REBOUND/IAS15 스캔에서 나온 HZ-안정 범위의 중앙값입니다 (<code>phase3/stability-sim</code>, <code>STABILITY_REPORT.md</code> 참고). 이 궤도는 행성을 α Cen A 의 거주 가능 영역 (궤도 1.345–1.854 AU, e_max 0.157, MEGNO 2.000) 안에 10⁵ 년에 걸쳐 유지하며 Hill-안정한 판도라질량 위성을 거느립니다. Beichman 이 관측한 e ≈ 0.4 / 상호 i ≈ 50° 궤도는 <b>Kozai-Lidov 불안정</b> (eccentric KL 이 ~30 kyr 안에 e 를 0.95 너머로 끌어올리고, 이후 ~10⁵년에 걸쳐 근일점이 별 반경 아래로 추락 — 조석 파괴) 이며, 불안정한 canonical alternative 로만 남겨 둡니다. 남은 open item 하나는 cfg-frame 경사 입니다. 제약된 양은 AB 면에 대한 상호 경사 (≈16°) 이며, 이를 cfg 용 system-frame 값으로 변환하는 작업이 아직 필요합니다.",
  "li_209":"<b>고리 대 팽창 반지름.</b> 고리 (<code>ring_present = true</code>) 와 고리 없는 1.1 R_Jup 거대 행성은 동등한 논문 해석입니다 (<code>## Canonical alternatives</code>). 분해된 영상이나 NIRCam 4–5 µm 측정 (맑은 모델 대 흐린/고리 모델을 분리) 이 이를 판가름할 것입니다.",
  "li_210":"<b>대기 ingest.</b> α Cen A b 는 DB 에 Phase 2 대기 블록이 없습니다 (궤도 + 물리량만). 스키마가 확장되면 Beichman 2025 금속이 풍부한 물-구름 최적 피팅을 여기 cfg pick 에 맞춰 <code>atmosphere_measurements</code> 로 ingest 해야 합니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
