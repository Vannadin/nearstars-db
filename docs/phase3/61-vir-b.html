  "h2_137":"Surface synthesis",
  "p_138":"61 Vir b is the RV-only super-Earth archetype of a hot inner planet around a solar-twin host. Three observational anchors pin the synthesis:",
  "p_139":"1. <b>Insolation 326 S⊕</b> is the canonical &quot;lava world&quot; regime. Léger 2009 introduced this regime with CoRoT-7b (4.8 M⊕, S ≈ 2500 S⊕, T_eq ≈ 1810 K), and 55 Cnc e (8 M⊕, S ≈ 2400 S⊕, T_eq ≈ 2000 K) extended it; b sits at the cooler end of the lava-world family with T_eq ≈ 1180 K. At this temperature, a basaltic surface is solid in the bulk and partial-melt in the substellar hemisphere only, rather than fully molten across the dayside.",
  "p_140":"2. <b>No transit and no JWST follow-up.</b> The planet&#x27;s true mass and radius are unconstrained; b will not be transit-characterized without a future astrometric inclination or direct-imaging campaign. The cfg adopts Zeng 2016 mass–radius scaling for an Earth-composition rocky core: R ≈ 1.65 R⊕ for Msini = 5.1 M⊕, with surface gravity 1.87 g⊕ and bulk density 6.27 g/cc.",
  "p_141":"3. <b>Cosmochemical context.</b> 61 Vir&#x27;s [Fe/H] ≈ 0.0 dex (Pavlenko 2012) and ~6 Gyr age give b an Earth-analog initial volatile inventory but a much harsher atmospheric loss history. Owen &amp; Wu 2017&#x27;s photoevaporation-valley physics places b firmly in the &quot;core-only&quot; regime: any initial H/He envelope of a 5 M⊕ core at 0.05 AU around a G-dwarf is lost on a timescale ≲ 50 Myr, far shorter than the 6 Gyr system age. Secondary atmospheric retention depends on the balance between outgassing and XUV-driven loss; for b&#x27;s parameters, the equilibrium is marginal.",
  "p_142":"The cfg adopts the <b>partial-melt substellar magma ocean</b> scenario: the substellar hemisphere within ~30° of the substellar point hosts a shallow magma-ocean structure where surface temperatures exceed the silicate solidus (T ≈ 1500 K for tholeiitic basalts, lower for volatile-rich melts). This is a tie-break choice over the fully solidified &quot;Mercury-with-stronger-insolation&quot; interpretation; interesting-first picks the magma ocean because it gives b a visually distinctive feature absent in the rest of the system.",
  "p_143":"<b>Color choice.</b> Under the solar-twin illumination (Teff 5552 K, near-Sol SED), surface tints are perceived essentially as they would be from Earth — no significant M-dwarf red-shift correction needed. The primary surface tint <span class=\"hex-chip\" style=\"background:#3a2a22\"></span><code>#3a2a22</code> is a dark partial-melt basaltic crust tone, between fresh ultramafic black (~<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code>) and weathered Mercury regolith (~<span class=\"hex-chip\" style=\"background:#5a4a3a\"></span><code>#5a4a3a</code>). The accent <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> encodes the substellar magma-ocean glow as a visible red-orange patch — the Wien peak of 1450 K thermal emission is at λ ≈ 2 μm (near-IR) but the visible tail is bright enough to be perceptible against the cooler mid-latitude crust.",
  "p_144":"<b>Morphology under tidal lock.</b> The substellar magma pond is a slowly-librating substellar feature (e = 0.12 libration). Convective heat flow within the magma pond, sustained by stellar insolation rather than internal heating, drives partial silicate vapor outgassing into the exosphere. Mid-latitudes are crusted basaltic plains; the nightside is cold, dark, and volatile-stripped over the system&#x27;s 6 Gyr — Mercury- analog impact-cratered regolith covers the antistellar hemisphere with no detectable volatile cold-trap because there is no atmospheric transport from the dayside to deliver fresh volatiles.",
  "h2_145":"Atmosphere synthesis",
  "p_146":"The atmospheric inference for b is entirely theoretical. There is no JWST transit or eclipse measurement, and the planet is too faint in contrast for current-generation direct imaging. The cfg adopts a <b>vestigial silicate-vapor exosphere</b> with no visible Rayleigh atmosphere — the airless interpretation modified by ongoing magma-pond outgassing.",
  "p_147":"<b>Pressure choice.</b> Surface pressure 10⁻⁷ Pa is the equivalent column-density expression of a silicate-vapor exosphere produced by substellar magma sublimation (Schaefer &amp; Fegley 2009 scaling for hot rocky planets). This is well below any Rayleigh-scattering threshold and gives no visible limb haze. The full hydrostatic atmosphere is absent — the column density of ~10¹² atoms/cm² corresponds to a few Mercury exospheres in mass, biased to the substellar hemisphere where the magma pond actively sublimes silicates.",
  "p_148":"<b>Composition.</b> Schaefer &amp; Fegley 2009 give Na, K, SiO, O₂, and Fe-vapor as the dominant outgassing species over a partial-melt silicate magma ocean at 1400–1500 K. Na and K dominate by vapor pressure at these temperatures; SiO and O₂ are secondary; Fe-vapor condenses out before reaching exospheric altitudes. The cfg encodes &quot;Na, K, SiO, O₂ silicate-vapor&quot; as the composition string — this is the canonical Léger 2009 / Schaefer &amp; Fegley 2009 composition for the lava-world regime.",
  "p_149":"The XUV-driven loss budget runs at ~10⁹ g/s for b&#x27;s parameters (Owen &amp; Wu 2017 scaling; ~10⁻⁵ M⊕/Gyr). Continuous outgassing from the magma pond keeps the exosphere replenished at steady-state column density. There is no significant secondary atmospheric buildup because the loss rate exceeds the outgassing rate for any plausible mantle composition; the planet is <b>escaping</b> rather than accumulating.",
  "p_150":"<b>Sky appearance from the surface.</b> No atmosphere means no Rayleigh scattering — the sky is black at every elevation. 61 Vir dominates the dayside sky at angular diameter 1.02° (about 2× the Sun&#x27;s apparent size from Earth), and its solar-yellow disk is unblurred and unscattered. Surface brightness at the substellar point is ~326× Earth-noon-equivalent. The star&#x27;s spectrum is essentially Sol-like — a player standing on b&#x27;s dayside would see a yellow disk significantly larger and brighter than Sol-from-Earth, casting sharp shadows over the partial-melt landscape.",
  "p_151":"<b>Nightside.</b> No atmospheric transport means the nightside is genuinely dark, lit only by reflected light from sister planets at conjunction (c is most prominent, with d further out) and by distant starlight. Nightside surface temperatures of ~200 K and the absence of any sublimable volatile means the antistellar hemisphere is a darker analog of Mercury&#x27;s nightside.",
  "h2_152":"Rotation &amp; spin synthesis",
  "p_153":"The 4.215-day orbital period at 0.050 AU around a 0.94 M☉ host gives a tidal-locking timescale of ~10⁵–10⁶ years (standard equilibrium-tide estimate, Hut 1981), four to five orders of magnitude shorter than the 6 Gyr system age. The 1:1 spin-orbit resonance is fully established. Obliquity has damped to zero over the same timescale.",
  "p_154":"<b>Higher-order resonances.</b> At eccentricity 0.12 (Vogt 2010 fit), a spin-orbit stability analysis allows for a 3:2 resonance trap as an alternative to 1:1, by analogy with Mercury&#x27;s 3:2 lock at e = 0.205. The boundary is e ≈ 0.1–0.15 for a rocky planet of b&#x27;s mass at this orbital period; b sits <b>on</b> the boundary. The cfg adopts 1:1 as the canonical choice (the most likely outcome of slow eccentricity damping in a planetary chain) and notes the 3:2 alternative as a cfg variant in Open items.",
  "p_155":"<b>KSP implementation note.</b> Rotation period = orbital period = 4.215 days (364 176 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_156":"<b>No seasons.</b> Obliquity damped to zero; eccentricity-driven insolation variation (e=0.12) gives a peri-to-apo S range of S = (1 ± e)⁻² × 326 = 263 → 416 S⊕ over the orbit, but with a fixed substellar point the variation manifests as a modulation of the magma pond&#x27;s depth and outgassing rate rather than seasonal weather. The cfg&#x27;s static magma-pond rendering is a time-averaged scenario; variant rendering with periodic outgassing bursts could be added at the Phase 3.5 visual-detail layer.",
  "p_157":"<b>Tidal heating.</b> Bolmont 2020 scaling for e=0.12 at a 4.2-day period gives a tidal heating contribution of 0.1–1 W/m² for an Earth-analog interior rheology. This is modest relative to the 326 S⊕ insolation flux (~4.4 × 10⁵ W/m² absorbed at substellar) but non-trivial relative to Earth&#x27;s ~0.1 W/m² internal heat flow. The substellar magma pond is therefore <b>insolation-driven, not tidal-driven</b> — unlike Io&#x27;s tidal-heat-dominated volcanism.",
  "h2_158":"Visual styling",
  "p_159":"Combining the surface and atmosphere decisions for the orbital and surface renderers:",
  "li_160":"<b>Global appearance (orbit view).</b> A dark-bodied super-Earth with a glowing red-orange spot at the substellar point and dark near-uniform mid-latitude basaltic plains, fading to a black nightside. The substellar magma-ocean glow is the most visually distinctive feature in the entire 61 Vir inner system.",
  "li_161":"<b>Substellar magma ocean.</b> A ~30° radius disk centred on the substellar point, surface tint <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> (lava red-orange), with thermal-emission glow at λ ≳ 1 μm contributing additional brightness in the IR cfg. The pond is permanent (insolation-driven) but its depth modulates slightly over the eccentric orbit.",
  "li_162":"<b>Mid-latitude basaltic crust.</b> Tint <span class=\"hex-chip\" style=\"background:#3a2a22\"></span><code>#3a2a22</code> (dark brown-black partial-melt basalt). Sparse impact craters from 6 Gyr of bombardment, partially resurfaced by past magma-pond expansion during high-e excursions. Smooth lava plains predominate.",
  "li_163":"<b>Nightside.</b> Cold (~200 K) and dark; surface tint same as mid-latitudes but with no illumination. Visible only by sister-planet reflected light. Volatile-stripped Mercury-analog regolith.",
  "li_164":"<b>Terminator band.</b> Sharp due to the absence of atmospheric scattering. Topographic features cast long shadows in the grazing solar-yellow light.",
  "li_165":"<b>Atmosphere haze.</b> None visible; the silicate-vapor exosphere is ~10⁻⁷ Pa, well below any Rayleigh threshold. The limb is a clean edge from disk to space.",
  "li_166":"<b>Star in sky.</b> 61 Vir subtends 1.02° at b — about 2× the Sun&#x27;s angular size from Earth. Color essentially solar-yellow (Teff 5552 K → <span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-encoded tint). At 326× Earth-noon brightness the surface is illuminated like a hot-Mercury dayside.",
  "li_167":"<b>Sister planets in sky.</b> c (next out at 0.22 AU) at angular size ~0.05° from b&#x27;s perspective at inferior conjunction (every ~5 days by synodic period); d (at 0.48 AU) much smaller and not always visible.",
  "li_168":"<b>Optional magma-pond animation.</b> A subtle thermal pulsation of the magma-pond accent tint (modulating from <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> to a brighter <span class=\"hex-chip\" style=\"background:#e85a28\"></span><code>#e85a28</code> over the eccentricity cycle) would faithfully render the insolation-driven heat-flow modulation. Low-priority visual easter egg.",
  "h2_169":"Bibliography",
  "h3_170":"Read (visual-informative, drove decisions above)",
  "li_171":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). The discovery paper. Reports b&#x27;s orbit (P=4.215 d, a=0.0502 AU, e=0.12, ω=105°) and minimum mass (Msini = 5.1 ± 0.5 M⊕). HIRES + AAT joint RV solution. All Decisions table orbital + mass values anchor here.",
  "li_172":"<b>Léger A. et al. 2009</b> — <i>Transiting exoplanets from the CoRoT space mission VIII. CoRoT-7b: the first super-Earth with measured radius</i>, A&amp;A 506, 287 (<code>2009A&amp;A...506..287L</code>, arXiv:0908.0241). The lava-world template — establishes the magma-ocean dayside scenario for hot rocky super-Earths. b is a slightly cooler analog. Drives surface morphology + magma-pond visual decisions.",
  "li_173":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, arXiv:0905.4045). Outgassing chemistry of hot-rocky surfaces. Drives the <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> choice (Na, K, SiO, O₂ silicate-vapor dominant at 1400–1500 K substellar).",
  "li_174":"<b>Zeng L. et al. 2016</b> — <i>Mass-radius relation for rocky planets</i>, ApJ 819, 127 (<code>2016ApJ...819..127Z</code>, arXiv:1512.08827). Mass-radius scaling for Earth-composition rocky planets; gives R ≈ 1.65 R⊕ for 5.1 M⊕. Drives the <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break.",
  "li_175":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation-valley physics. Places b firmly in the &quot;core-only&quot; regime — any initial H/He envelope is lost on ≲ 50 Myr. Drives the <code>atmosphere_present = false</code> choice.",
  "li_176":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). Standard equilibrium-tide model; the tidal-locking timescale estimate for b&#x27;s parameters (~10⁵–10⁶ yr) follows from it. Anchors the <code>tidally_locked = true</code> choice.",
  "li_177":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution of TRAPPIST-1 planets</i> (<code>2020A&amp;A...644A.165B</code>). Tidal heating scaling for rocky exoplanets; provides the 0.1–1 W/m² estimate at e=0.12, P=4.2 d.",
  "h3_178":"Read (context / methodology, not decision-driving)",
  "li_179":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Inherited from the host-star synthesis. Gives 61 Vir age 6.1 ± 1.7 Gyr; sets the system-evolution timescale for atmospheric loss.",
  "li_180":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Effective temperatures, gravities, metallicities, and ages of 18 solar twin candidates</i> (<code>2012MNRAS.422..542P</code>, arXiv:1112.0590). Inherited from host-star synthesis. Confirms 61 Vir solar-twin abundance pattern.",
  "li_181":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i>, MNRAS 424, 1206 (<code>2012MNRAS.424.1206W</code>, arXiv:1204.6063). Inherited from host-star synthesis. Cited briefly because the cold debris belt at ~30 AU does not interact dynamically with the inner planets at b&#x27;s separation.",
  "li_182":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Sub-Neptune envelope mass-radius scaling; informs the bounds on b&#x27;s potential unphotoevaporated H/He envelope (excluded as discussed).",
  "li_183":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>). Used briefly in the context of envelope-vs-rocky decision; b is rocky.",
  "h3_184":"Read (instrument-only, not visual-informative)",
  "li_185":"<b>Marcy G. W. et al. 2014</b> — Kepler super-Earth statistics; b is not in the Kepler sample but used as a calibration anchor in follow-up studies.",
  "h3_186":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_187":"The b-specific arXiv record is small (the planet was discovered in 2010 with no follow-up transit or atmospheric characterization). The not-read set is predominantly:",
  "li_188":"<b>Dynamical-stability follow-ups</b> — Vogt 2010 + extensions; b is stable inside the Vogt 2010 dynamical solution, no further refinement needed for cfg purposes.",
  "li_189":"<b>Transit search non-detections</b> — confirmed b does not transit; no information beyond the inclination posterior already used.",
  "li_190":"<b>Atmospheric escape rate calculations</b> — uses generic XUV scaling rather than 61 Vir specific stellar wind models.",
  "h2_191":"Open items for follow-up",
  "li_192":"<b>True mass and radius.</b> b&#x27;s mass is Msini-only and the radius is a mass–radius scaling estimate. A future direct-imaging campaign (HabEx / LUVOIR era) or precise astrometric inclination from Gaia DR5+ would convert Msini to true mass and constrain radius from a thermal-emission detection. Until then, all radius-dependent fields carry Confidence=medium.",
  "li_193":"<b>Cfg variant: runaway-Venus retained atmosphere.</b> Even with the photoevaporation valley argument, a small fraction of secondary atmospheres (steam + CO₂ + N₂, ~1–10 bar) is consistent with the airless cfg&#x27;s parameters. A cfg variant with a thick steam atmosphere would render b as a cloud-covered featureless white-yellow disk (Venus-analog), distinct from the magma-pond visual. Preserve as a cfg switch for users who prefer the &quot;retained atmosphere&quot; reading.",
  "li_194":"<b>Cfg variant: 3:2 spin-orbit resonance.</b> At e=0.12, b sits on the 1:1/3:2 boundary. A 3:2 cfg variant (Mercury-analog) would render with a slowly drifting substellar magma pond rather than a fixed one — visually distinctive but harder to animate at KSP scale. Document as Phase 3.5 alternative.",
  "li_195":"<b>Surface mineralogy from future JWST or HabEx spectroscopy.</b> No current instrument can resolve b&#x27;s surface composition. If a reflected-light direct-imaging campaign yields a thermal-emission spectrum, surface-tint hex codes could be refined from the inferred basalt composition (basalt vs. ultramafic vs. silica-rich).",
  "li_196":"<b>Magma-pond outgassing rate.</b> Schaefer &amp; Fegley 2009&#x27;s outgassing scaling is well-established but planet-specific exospheric modeling is missing. A future Vidotto-style 3D MHD wind + outgassing model could refine the exosphere column density.",
  "li_197":"<b>Sister-planet conjunction visibility.</b> The eccentric d (e=0.35) and modestly eccentric c (e=0.14) produce time-variable conjunction geometries. Sub-Neptune c at ~5 R⊕ would reach mv ≈ −4 at b&#x27;s inferior-conjunction distance — bright enough to be a distinctive sky feature. Compute exact visibility for Phase 3.5 cfg.",
  "h2_198":"Related",

  "td_128":"지구형 BSE(bulk-silicate-Earth) 방사성 열류속(현재값 ~0.04 W/m²)을 ~5 M⊕로 질량 스케일했으며 부분 용융 내부와 일관됨. 방법은 Wang et al. 2020 (<code>2020A&amp;A...644A..19W</code>)의 외계행성 방사성 열 프레임워크를 따름. 다만 Eu→Th/U 호스트 원소비 보정은 호스트별 원소비를 큐레이션하지 않아 적용하지 않았고, 대신 지구형 원소비를 가정함",
  "td_129":"<span class=\"field-tt\" data-ko-tip=\"하늘에서 모항성의 시직경 (도). 지구에서 본 태양 ≈ 0.53°.\" data-en-tip=\"Host star angular diameter as seen from the planet (degrees). Sun-from-Earth ≈ 0.53°.\"><code>star_apparent_angular_diameter_deg</code></span>",
  "td_130":"1.02",
  "td_131":"high",
  "td_132":"유도. 2 × R★ / a × (180/π). 0.0502 AU 의 0.963 R☉",
  "td_133":"<span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span>",
  "td_134":"5552",
  "td_135":"high",
  "td_136":"호스트 Teff",
  "h2_137":"Surface synthesis",
  "p_138":"61 Vir b 는 솔라 트윈 호스트 주위의 RV-only 안쪽 행성 슈퍼지구 원형 입니다. 관측적 anchor 세 가지가 합성을 고정합니다.",
  "p_139":"1. <b>일조량 326 S⊕</b> 는 표준적인 &quot;용암 세계&quot; 영역입니다. Léger 2009 가 CoRoT-7b (4.8 M⊕, S ≈ 2500 S⊕, T_eq ≈ 1810 K) 로 이 영역을 도입하고 55 Cnc e (8 M⊕, S ≈ 2400 S⊕, T_eq ≈ 2000 K) 가 확장했습니다. b 는 T_eq ≈ 1180 K 로 용암-세계 가족의 차가운 끝쪽에 위치합니다. 이 온도 에서 basalt 표면은 본체는 고체이고 substellar 반구에서만 부분 용융 이며, dayside 전체가 완전 용융하지는 않습니다.",
  "p_140":"2. <b>트랜짓 없음, JWST follow-up 없음.</b> 행성의 진질량과 반지름은 제약되지 않습니다. 미래의 천체측정 경사각이나 직접 영상 캠페인 없이는 b 가 트랜짓 특성화되지 않습니다. cfg 는 지구 조성 암석 핵에 대한 Zeng 2016 mass-radius 스케일링을 채택. Msini = 5.1 M⊕ 에서 R ≈ 1.65 R⊕, 표면중력 1.87 g⊕, 벌크 밀도 6.27 g/cc.",
  "p_141":"3. <b>우주화학적 맥락.</b> 61 Vir 의 [Fe/H] ≈ 0.0 dex (Pavlenko 2012) 와 ~6 Gyr 나이는 b 에 지구 아날로그 초기 휘발성 inventory 를 주지만, 대기 손실 이력은 훨씬 가혹합니다. Owen &amp; Wu 2017 의 광증발 valley 물리는 b 를 &quot;코어만&quot; 영역에 단단히 위치시킵니다. G 왜성 0.05 AU 의 5 M⊕ 코어 위 초기 H/He 외피는 ≲ 50 Myr 시간 안에 손실되는데, 6 Gyr 시스템 나이보다 한참 짧습니다. 이차 대기 보유는 outgassing 과 XUV 손실의 균형에 달려 있는데, b 의 파라미터에서는 그 균형이 위태로 운 경계입니다.",
  "p_142":"cfg 는 <b>부분 용융 substellar 마그마-바다</b> 시나리오를 채택합니다. substellar 점 주위 ~30° 안의 substellar 반구가 표면 온도가 규산염 solidus (tholeiitic basalt 의 T ≈ 1500 K, 휘발성 풍부 용융의 경우 더 낮음) 를 초과하는 얕은 마그마-바다 구조를 호스트합니다. 이는 완전 고화된 &quot;더 강한 일조량을 받는 수성&quot; 해석에 대한 tie-break 선택입니다. interesting-first 가 마그마 바다를 선택한 이유는 그것이 시스템의 다른 어디에도 없는 시각적으로 두드러진 feature 를 b 에게 주기 때문입니다.",
  "p_143":"<b>색 선택.</b> 솔라 트윈 조명 (Teff 5552 K, 거의 태양 SED) 아래에서 표면 색조는 사실상 지구에서 보이는 그대로 인식됩니다. 의미 있는 M 왜성 적색 변위 보정이 필요 없습니다. primary 표면 색조 <span class=\"hex-chip\" style=\"background:#3a2a22\"></span><code>#3a2a22</code> 는 어두운 부분 용융 basalt 지각 톤으로, 신선한 ultramafic 검정 (~<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code>) 과 풍화된 수성 regolith (~<span class=\"hex-chip\" style=\"background:#5a4a3a\"></span><code>#5a4a3a</code>) 사이입니다. accent <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> 는 substellar 마그마-바다 glow 를 가시 적-주황 patch 로 인코딩합니다. 1450 K 열복사의 Wien 피크는 λ ≈ 2 μm (근적외) 에 있지만 가시 꼬리는 차가운 중위도 지각 대비 충분히 밝게 인식됩니다.",
  "p_144":"<b>조석 고정 하의 형태.</b> substellar 마그마 pond 는 천천히 librate 하는 substellar feature 입니다 (e = 0.12 libration). 내부 가열이 아닌 항성 일사로 유지되는 마그마 pond 내 대류 열흐름이 부분 규산염 증기 outgassing 을 외기권 으로 구동합니다. 중위도는 지각화된 basalt 평원이고, 야간면은 시스템의 6 Gyr 에 걸쳐 차갑고 어두우며 휘발성이 제거된 상태입니다. 수성 아날로그 충돌 크레이터화된 regolith 가 antistellar 반구를 덮습니다. dayside 에서 신선한 휘발성을 운반해 줄 대기 수송이 없으므로 검출 가능한 휘발성 cold-trap 도 없습니다.",
  "h2_145":"Atmosphere synthesis",
  "p_146":"b 에 대한 대기 추론은 완전히 이론적입니다. JWST 트랜짓이나 식 측정이 없고, 행성은 현 세대 직접 영상에 대비비로 너무 어둡습니다. cfg 는 <b>가시 Rayleigh 대기 없는 잔여 규산염 증기 외기권</b> 을 채택합니다 — 진행 중인 마그마-pond outgassing 으로 수정된 무대기 해석입니다.",
  "p_147":"<b>압력 선택.</b> 표면 압력 10⁻⁷ Pa 는 substellar 마그마 승화로 생성된 규산염 증기 외기권의 컬럼-밀도 등가 표현입니다 (뜨거운 암석 행성에 대한 Schaefer &amp; Fegley 2009 스케일링). 어떤 Rayleigh 산란 임계값보다도 한참 아래라 가시 limb haze 가 생기지 않습니다. 완전한 정수압 대기는 부재합니다 — 컬럼 밀도 ~10¹² atoms/cm² 는 수성 외기권 몇 개에 해당 하는 질량으로, 마그마 pond 가 활성으로 규산염을 승화시키는 substellar 반구 쪽으로 편향됩니다.",
  "p_148":"<b>조성.</b> Schaefer &amp; Fegley 2009 는 1400–1500 K 의 부분 용융 규산염 마그마 바다 위 dominant outgassing 종으로 Na, K, SiO, O₂, Fe-증기를 제시합니다. 이 온도에서 증기압상 Na 와 K 가 우세하고, SiO 와 O₂ 가 차순위이며, Fe-증기는 외기권 고도에 도달하기 전에 응결합니다. cfg 는 조성 문자열로 &quot;Na, K, SiO, O₂ 규산염-증기&quot; 를 인코딩합니다 — 용암-세계 영역에 대한 표준 Léger 2009 / Schaefer &amp; Fegley 2009 조성 입니다.",
  "p_149":"XUV 손실 예산은 b 의 파라미터에서 ~10⁹ g/s 로 작동합니다 (Owen &amp; Wu 2017 스케일링. ~10⁻⁵ M⊕/Gyr). 마그마 pond 에서의 지속적 outgassing 이 외기권을 정상상태 컬럼 밀도로 유지시킵니다. 손실율이 어떤 그럴 듯한 맨틀 조성에 대해서도 outgassing 율을 초과하므로 의미 있는 이차 대기 축적은 없습니다. 행성은 축적이 아닌 <b>탈출</b> 상태입니다.",
  "p_150":"<b>표면에서 본 하늘 외관.</b> 대기가 없으니 Rayleigh 산란도 없습니다 — 모든 고도에서 하늘은 검습니다. 61 Vir 는 각지름 1.02° 로 dayside 하늘을 지배하며 (지구에서 본 태양 겉보기 크기의 ~2 배), 태양빛 디스크는 흐림이나 산란 없이 또렷합니다. substellar 점의 표면 밝기는 ~326× 지구 정오 등가입니다. 별의 스펙트럼은 본질적으로 태양형 — b 의 dayside 에 서 있는 플레이어는 지구에서 본 태양보다 훨씬 크고 밝은 노란 디스크를 보며, 부분 용융 지형 위로 또렷한 그림자가 드리워집니다.",
  "p_151":"<b>야간면.</b> 대기 수송이 없으므로 야간면은 진정 어둡고, 합 시 자매 행성의 반사광 (c 가 가장 두드러지고, d 는 더 멀리) 과 먼 별빛으로만 조명됩니다. ~200 K 의 야간 표면 온도와 승화 가능한 휘발성의 부재는 antistellar 반구를 수성 야간면의 더 어두운 아날로그로 만듭니다.",
  "h2_152":"Rotation &amp; spin synthesis",
  "p_153":"0.94 M☉ 호스트 주위 0.050 AU 의 4.215 일 궤도 주기는 조석 고정 시간 ~10⁵–10⁶ 년 (표준 평형-조석 추정, Hut 1981) 을 주는데, 6 Gyr 시스템 나이보다 4–5 자릿수 더 짧습니다. 1:1 spin-orbit 공명이 완전히 자리잡혀 있습니다. 황도경사각은 같은 시간 스케일에 걸쳐 0 까지 감쇠했습니다.",
  "p_154":"<b>고차 공명.</b> 이심률 0.12 (Vogt 2010 fit) 에서 spin-orbit 안정성 분석은 1:1 의 대안으로 3:2 공명 trap 을 허용합니다. e = 0.205 의 수성 3:2 lock 과의 유추입니다. 경계는 이 궤도 주기에서 b 의 질량의 암석 행성에 대해 e ≈ 0.1–0.15 입니다. b 는 그 경계 <b>위</b> 에 앉아 있습니다. cfg 는 canonical 선택으로 1:1 을 채택 (행성 사슬 에서의 느린 이심률 감쇠의 가장 그럴듯한 결과) 하고 3:2 대안은 Open items 에서 cfg variant 로 명시합니다.",
  "p_155":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 4.215 일 (364 176 초). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 일치해야 합니다.",
  "p_156":"<b>계절 없음.</b> obliquity 가 0 까지 감쇠. 이심률 기반 일조량 변동 (e=0.12) 은 궤도에 걸쳐 S = (1 ± e)⁻² × 326 = 263 → 416 S⊕ 의 peri-to-apo S 범위를 주지만, substellar 점이 고정되어 있어 그 변동은 계절 날씨가 아닌 마그마 pond 의 깊이와 outgassing 율의 변조로 나타납니다. cfg 의 정적 마그마-pond 렌더링은 시간-평균 시나리오입니다. 주기적 outgassing burst 가 있는 변형 렌더링은 Phase 3.5 시각 디테일 레이어에서 추가할 수 있습니다.",
  "p_157":"<b>조석 가열.</b> 4.2 일 주기에서 e=0.12 에 대한 Bolmont 2020 스케일링은 지구 아날로그 내부 rheology 에서 0.1–1 W/m² 의 조석 가열 기여를 줍니다. 326 S⊕ 일조 flux (substellar 흡수 ~4.4 × 10⁵ W/m²) 에 비해 적당하지만, 지구의 ~0.1 W/m² 내부 열흐름에 비해서는 무시할 수 없습 니다. 따라서 substellar 마그마 pond 는 <b>일사 구동이지 조석 구동이 아니며</b>, Io 의 조석-열-지배 화산활동과는 다릅니다.",
  "h2_158":"Visual styling",
  "p_159":"궤도와 표면 렌더러를 위해 표면과 대기 결정을 결합하면 다음과 같습니다.",
  "li_160":"<b>전역 외관 (궤도 뷰).</b> substellar 점에서 빛나는 적-주황 spot 과 어두운 거의 균일한 중위도 basalt 평원을 가진 어두운 본체의 슈퍼 지구로, 검은 야간면으로 페이드 아웃됩니다. substellar 마그마-바다 glow 는 61 Vir 안쪽 시스템 전체에서 가장 시각적으로 두드러진 feature 입니다.",
  "li_161":"<b>substellar 마그마 바다.</b> substellar 점을 중심으로 하는 ~30° 반경 의 디스크. 표면 색조 <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> (lava 적-주황) 과 λ ≳ 1 μm 의 열복사 glow 가 IR cfg 에서 추가 밝기를 기여합니다. pond 는 영구적 (일사 구동) 이지만 그 깊이는 이심률 궤도에 따라 살짝 변조됩니다.",
  "li_162":"<b>중위도 basalt 지각.</b> 색조 <span class=\"hex-chip\" style=\"background:#3a2a22\"></span><code>#3a2a22</code> (어두운 갈색-검정 부분 용융 basalt). 6 Gyr 의 폭격에서 누적된 드문 충돌 크레이터, 높은 e excursion 동안의 과거 마그마-pond 확장으로 일부 리서피스됨. 매끈한 lava 평원이 주를 이룹니다.",
  "li_163":"<b>야간면.</b> 차갑고 (~200 K) 어두움. 표면 색조는 중위도와 같지만 조명이 없습니다. 자매 행성 반사광으로만 보입니다. 휘발성이 제거된 수성 아날로그 regolith.",
  "li_164":"<b>Terminator 밴드.</b> 대기 산란이 없어 또렷합니다. 지형 feature 가 스치는 태양빛 노란빛 아래로 긴 그림자를 드리웁니다.",
  "li_165":"<b>대기 haze.</b> 가시광에서 없음. 규산염-증기 외기권은 ~10⁻⁷ Pa 로 Rayleigh 임계값 한참 아래입니다. limb 는 디스크에서 우주로의 깨끗한 가장자리.",
  "li_166":"<b>하늘의 별.</b> 61 Vir 가 b 에서 1.02° 차지 — 지구에서 본 태양 각 크기의 약 2 배. 색은 본질적으로 태양빛 노란 (Teff 5552 K → <span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-인코딩 색조). 326× 지구 정오 밝기에서 표면은 뜨거운 수성 dayside 처럼 조명됩니다.",
  "li_167":"<b>하늘의 자매 행성.</b> c (다음 외측 0.22 AU) 가 b 의 시점에서 내합 시 각 크기 ~0.05° (회합 주기 ~5 일 마다). d (0.48 AU) 는 훨씬 작고 항상 보이지는 않습니다.",
  "li_168":"<b>선택적 마그마-pond 애니메이션.</b> 마그마-pond accent 색조의 미묘한 열 펄세이션 (이심률 사이클에 걸쳐 <span class=\"hex-chip\" style=\"background:#c84a18\"></span><code>#c84a18</code> 에서 더 밝은 <span class=\"hex-chip\" style=\"background:#e85a28\"></span><code>#e85a28</code> 으로 변조) 이 일사 구동 열흐름 변조를 충실하게 렌더링해 줍니다. 우선 순위 낮은 시각 이스터에그.",
  "h2_169":"Bibliography",
  "h3_170":"Read (visual-informative, drove decisions above)",
  "li_171":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). 발견 논문. b 의 궤도 (P=4.215 d, a=0.0502 AU, e=0.12, ω=105°) 와 최소 질량 (Msini = 5.1 ± 0.5 M⊕) 보고. HIRES + AAT 결합 RV 해. Decisions 표의 모든 궤도 + 질량 값이 여기에 묶입니다.",
  "li_172":"<b>Léger A. et al. 2009</b> — <i>Transiting exoplanets from the CoRoT space mission VIII. CoRoT-7b: the first super-Earth with measured radius</i>, A&amp;A 506, 287 (<code>2009A&amp;A...506..287L</code>, arXiv:0908.0241). 용암-세계 템플릿. 뜨거운 암석 슈퍼지구에 대한 마그마-바다 dayside 시나리오를 확립. b 는 약간 더 차가운 아날로그. 표면 형태 + 마그마- pond 시각 결정을 견인.",
  "li_173":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, arXiv:0905.4045). 뜨거운 암석 표면의 outgassing 화학. <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> 선택을 견인 (1400–1500 K substellar 에서 Na, K, SiO, O₂ 규산염 증기 우세).",
  "li_174":"<b>Zeng L. et al. 2016</b> — <i>Mass-radius relation for rocky planets</i>, ApJ 819, 127 (<code>2016ApJ...819..127Z</code>, arXiv:1512.08827). 지구 조성 암석 행성의 mass-radius 스케일링. 5.1 M⊕ 에서 R ≈ 1.65 R⊕. <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break 을 견인.",
  "li_175":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발-valley 물리. b 를 단단히 &quot;코어만&quot; 영역에 위치시킴 — 초기 H/He 외피는 ≲ 50 Myr 에 손실. <code>atmosphere_present = false</code> 선택을 견인.",
  "li_176":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). 표준 평형-조석 모델. b 의 파라미터 에서의 조석 고정 시간 추정 (~10⁵–10⁶ 년) 이 여기서 따라옵니다. <code>tidally_locked = true</code> 선택의 anchor.",
  "li_177":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution of TRAPPIST-1 planets</i> (<code>2020A&amp;A...644A.165B</code>). 암석 외계행성의 조석 가열 스케일링. e=0.12, P=4.2 d 에서 0.1–1 W/m² 추정값 제공.",
  "h3_178":"Read (context / methodology, not decision-driving)",
  "li_179":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 호스트 합성에서 상속. 61 Vir 나이 6.1 ± 1.7 Gyr. 대기 손실의 시스템 진화 시간 스케일을 결정.",
  "li_180":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Effective temperatures, gravities, metallicities, and ages of 18 solar twin candidates</i> (<code>2012MNRAS.422..542P</code>, arXiv:1112.0590). 호스트 합성에서 상속. 61 Vir 솔라 트윈 풍부도 패턴 확인.",
  "li_181":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i>, MNRAS 424, 1206 (<code>2012MNRAS.424.1206W</code>, arXiv:1204.6063). 호스트 합성에서 상속. ~30 AU 의 차가운 debris 띠가 b 의 분리에서 안쪽 행성과 동역학 적으로 상호작용하지 않으므로 간략히 인용.",
  "li_182":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). sub-Neptune envelope mass-radius 스케일링. b 의 잠재적 광증발되지 않은 H/He 외피에 대한 경계를 정보화 (논의된 대로 배제).",
  "li_183":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>). envelope-vs-rocky 결정의 맥락에서 간략히 사용. b 는 암석.",
  "h3_184":"Read (instrument-only, not visual-informative)",
  "li_185":"<b>Marcy G. W. et al. 2014</b> — Kepler 슈퍼지구 통계. b 는 Kepler 샘플이 아니지만 후속 연구의 보정 anchor 로 사용.",
  "h3_186":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_187":"b 특정 arXiv 기록은 작습니다 (행성은 2010 년 발견되었고 트랜짓이나 대기 특성화 follow-up 이 없습니다). 읽지 않은 집합은 주로 다음과 같습니다.",
  "li_188":"<b>동역학 안정성 follow-up.</b> Vogt 2010 + 확장. b 는 Vogt 2010 의 동역학 해 안에서 안정. cfg 목적으로 추가 정밀화 불필요.",
  "li_189":"<b>트랜짓 탐색 non-detection.</b> b 가 트랜짓하지 않음을 확인. 이미 사용된 경사각 posterior 너머의 정보 없음.",
  "li_190":"<b>대기 탈출율 계산.</b> 61 Vir 특정 항성풍 모델이 아닌 일반 XUV 스케일링을 사용.",
  "h2_191":"Open items for follow-up",
  "li_192":"<b>진질량과 반지름.</b> b 의 질량은 Msini 전용이고 반지름은 mass-radius 스케일링 추정치. 미래의 직접 영상 캠페인 (HabEx / LUVOIR 시대) 이나 Gaia DR5+ 의 정밀 천체측정 경사각이 Msini 를 진질량으로 변환하고 열복사 검출에서 반지름을 제약합니다. 그때까지는 반지름 의존 필드는 모두 Confidence=medium 유지.",
  "li_193":"<b>Cfg variant. runaway-Venus 보유 대기.</b> 광증발 valley 논거에도 불구하고 작은 비율의 이차 대기 (증기 + CO₂ + N₂, ~1–10 bar) 가 무대기 cfg 파라미터와 일관됩니다. 두꺼운 증기 대기가 있는 cfg variant 는 b 를 구름 덮인 featureless 흰-노란 디스크 (금성 아날로그) 로 렌더링하며 마그마-pond 시각과 구분됩니다. &quot;보유 대기&quot; 해석을 선호하는 사용자를 위한 cfg 스위치로 보존.",
  "li_194":"<b>Cfg variant. 3:2 spin-orbit 공명.</b> e=0.12 에서 b 는 1:1/3:2 경계 위에 위치. 3:2 cfg variant (수성 아날로그) 는 고정된 substellar 마그마 pond 대신 천천히 drift 하는 것으로 렌더링됩니다 — 시각적으로 두드러 지지만 KSP 스케일에서 애니메이션화하기 더 어려움. Phase 3.5 대안 으로 명시.",
  "li_195":"<b>미래 JWST 또는 HabEx 분광에서의 표면 광물학.</b> 현재 b 의 표면 조성을 분해할 수 있는 도구는 없음. 반사광 직접 영상 캠페인이 열복사 스펙트럼을 산출하면 추론된 basalt 조성 (basalt vs ultramafic vs 실리카-풍부) 에서 표면-색조 hex 코드를 정밀화 가능.",
  "li_196":"<b>마그마-pond outgassing 율.</b> Schaefer &amp; Fegley 2009 의 outgassing 스케일링은 잘 확립되어 있으나 행성 특정 외기권 모델링은 부재. 미래의 Vidotto 스타일 3D MHD 항성풍 + outgassing 모델이 외기권 컬럼 밀도를 정밀화 가능.",
  "li_197":"<b>자매 행성 합 가시성.</b> 이심 d (e=0.35) 와 적당히 이심한 c (e=0.14) 가 시간 가변 합 기하학을 생성. sub-Neptune c (~5 R⊕) 는 b 의 내합 거리에서 mv ≈ −4 에 도달 — 두드러진 sky feature 일 만큼 밝음. Phase 3.5 cfg 를 위한 정확한 가시성 계산.",
  "h2_198":"Related",

  "li_203":"<a href=\"proxima-cen-d.md\">proxima-cen-d</a> — sub-Earth USP RV-only 아날로그 (더 작고, M 왜성 주위).",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
