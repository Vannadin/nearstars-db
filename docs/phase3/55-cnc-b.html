  "h2_104":"Surface synthesis",
  "p_105":"55 Cnc b has no surface — it is a gas giant — so this section covers the cloud-top &quot;surface&quot; the renderer presents. At T_eq ≈ 708 K it is a <b>warm Jovian</b>: hot enough that the ammonia and water-ice clouds that give Jupiter its familiar palette cannot condense at the visible cloud deck, but cool enough that it is not an inflated, glowing hot Jupiter. The condensates that form at this temperature are silicates, alkali-metal salts, and sulfides, deeper and warmer than Jupiter&#x27;s cloud tops.",
  "p_106":"The visible cloud-top color is therefore warmer and more orange-tan than Jupiter&#x27;s — <span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code> for the banded decks, with a slightly warmer <span class=\"hex-chip\" style=\"background:#e8b888\"></span><code>#e8b888</code> limb haze. The host star&#x27;s super-solar metallicity ([Fe/H] ≈ +0.32) suggests an enriched atmospheric metallicity, which would deepen the cloud colors and strengthen the alkali-metal absorption features. Under the yellow-orange 5196 K light of 55 Cnc A, the planet reads as a warm tan-orange banded giant.",
  "p_107":"Morphology: standard gas-giant zonal banding (alternating prograde and retrograde jets), with the band contrast and number set by the rotation rate and internal heat flux. Without a measured rotation period the banding is a tie-break; the cfg renders Jupiter-analog banding warmed to the planet&#x27;s palette.",
  "h2_108":"Atmosphere synthesis",
  "p_109":"55 Cnc b has a deep H₂/He envelope with no surface. At ~700 K the dominant visible-altitude condensates are silicates (forsterite, enstatite), alkali-metal salts (Na₂S, KCl), and sulfides — not the ammonia/water ices of the Solar System giants. Gaseous sodium and potassium produce strong alkali absorption in the optical, which combined with the enriched (super-solar) host metallicity would make the atmosphere relatively opaque and warm-toned.",
  "li_110":"<b>Pressure / structure.</b> The visible cloud deck sits at the level where these condensates form; below it the atmosphere is a hot, clear, increasingly dense H₂/He fluid. No discrete surface.",
  "li_111":"<b>Composition.</b> H₂/He primary, with Na/K alkali metals, silicate and sulfide condensates, and (given the super-metal-rich host) likely enhanced heavy-element abundance.",
  "li_112":"<b>Sky appearance.</b> From within the upper atmosphere the sky would be a warm tan-orange, hazed by alkali/silicate clouds, with the enormous host star (4.3° angular diameter) dominating one hemisphere.",
  "h2_113":"Rotation &amp; spin synthesis",
  "p_114":"At 0.118 AU on a 14.65-day orbit, 55 Cnc b is not necessarily tidally locked — gas-giant tidal locking timescales are long, and the planet likely settles into a pseudo-synchronous rotation rather than a strict 1:1 lock. The orbit is essentially circular (e = 0.003; Moutou 2025), so any pseudo-synchronization would be close to synchronous. No rotation period has been measured.",
  "p_115":"<b>KSP implementation note.</b> Lacking a measured spin, the cfg adopts a fast Jovian rotation (~10 h order, Jupiter-analog) for visual banding rather than a synchronous lock — banding dynamics look more gas-giant-like at fast rotation. This is a tie-break; flag as unconstrained.",
  "p_116":"<b>No seasons.</b> Negligible obliquity and eccentricity → no seasonal variation.",
  "h2_117":"Visual styling",
  "li_118":"<b>Global appearance.</b> A warm tan-orange banded gas giant, roughly Jupiter-sized, at 0.118 AU — the innermost of the system&#x27;s four giants and the brightest sibling in 55 Cnc e&#x27;s sky.",
  "li_119":"<b>Cloud decks.</b> Zonal banding in warm tans and oranges (<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>), with alternating light zones and darker belts. Deeper, warmer condensates than Jupiter; no white ammonia clouds.",
  "li_120":"<b>Limb / haze.</b> A warm orange limb haze (<span class=\"hex-chip\" style=\"background:#e8b888\"></span><code>#e8b888</code>), with the alkali-metal absorption giving the limb a slightly deeper tone.",
  "li_121":"<b>Star in sky.</b> 55 Cnc A subtends 4.26° — about 8× the Sun&#x27;s angular size from Earth — a large warm-orange disk dominating the daytime hemisphere.",
  "li_122":"<b>Sister planets in sky.</b> The lava super-Earth e (inward at 0.0154 AU) appears as a bright point near the star; planet c (outward at 0.247 AU) is a fainter warm point. None rivals the host star.",
  "li_123":"<b>No rings (default).</b> Unlike the cold giant d, b is too warm and too close for a stable ice ring; no ring is rendered.",
  "h2_124":"Bibliography",
  "h3_125":"Read (visual-informative, drove decisions above)",
  "li_126":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). Latest RV refit: planet b P = 14.651552 d, a = 0.118 AU, e = 0.0029, M sin i = 276 ± 9 M⊕. <b>Phase 2 recommended orbit + mass.</b> Postdates the model cutoff — values value-checked against the cached text.",
  "li_127":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>. Host L = 0.582 L☉ → the T_eq derivation.",
  "h3_128":"Read (context / methodology, not decision-driving)",
  "li_129":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>. Homogeneous system refit: b at a = 0.1134 AU, e = 0.0, M sin i = 255.4 M⊕ — the documented-alternative orbit/mass (superseded by Moutou 2025 as recommended).",
  "li_130":"<b>Butler R. P. et al. 1997</b> — <code>1997ApJ...474L.115B</code>. Discovery paper (the 4th exoplanet ever found); historical context.",
  "h3_131":"Read (instrument-only, not visual-informative)",
  "li_132":"<b>Ehrenreich D. et al. 2012</b> — noted 55 Cnc b as a warm Jupiter &quot;possibly at the limit of atmospheric stability&quot; (via Bourrier 2018 intro); context for the warm-Jovian classification.",
  "h3_133":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_134":"Early RV-refinement papers (Marcy 2002, McArthur 2004, Fischer 2008 — superseded by Bourrier 2018 / Moutou 2025) and dynamical-stability proceedings. Full filtered bib in <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_135":"Open items for follow-up",
  "li_136":"<b>Radius.</b> No measured radius (non-transiting). If an astrometric or future direct-imaging constraint pins the inclination and true mass, the radius estimate can be replaced; for now ~1.0 R_Jup is an estimate-only standard value.",
  "li_137":"<b>Atmospheric metallicity.</b> The super-metal-rich host suggests an enriched atmosphere; a future transmission/emission constraint would refine the cloud composition and color.",
  "li_138":"<b>Rotation.</b> No measured spin; the cfg&#x27;s fast-Jovian rotation is a tie-break. Any measured rotation (e.g. from Doppler-imaging) would set the banding dynamics.",

  "p_105":"55 Cnc b 는 표면이 없습니다—거대 가스 행성입니다—그래서 이 섹션은 렌더러가 제시하는 구름 꼭대기 &quot;표면&quot;을 다룹니다. T_eq ≈ 708 K 에서 그것은 <b>따뜻한 목성형</b>입니다: 목성에 친숙한 팔레트를 주는 암모니아·물-얼음 구름이 가시 구름 덱에서 응결할 수 없을 만큼 뜨겁지만, 팽창하여 빛나는 뜨거운 목성은 아닐 만큼 차갑습니다. 이 온도에서 형성되는 응결물은 규산염, 알칼리-금속염, 황화물로, 목성의 구름 꼭대기보다 깊고 따뜻합니다.",
  "p_106":"따라서 가시 구름 꼭대기 색은 목성보다 따뜻하고 주황-황갈색입니다—띠 덱에 <span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>, 약간 더 따뜻한 <span class=\"hex-chip\" style=\"background:#e8b888\"></span><code>#e8b888</code> 림 헤이즈입니다. 모성의 초태양 금속도 ([Fe/H] ≈ +0.32)는 풍부한 대기 금속도를 시사하며, 이는 구름 색을 짙게 하고 알칼리-금속 흡수 특징을 강화할 것입니다. 55 Cnc A 의 노랑-주황 5196 K 빛 아래에서 행성은 따뜻한 황갈-주황 띠 거대 행성으로 읽힙니다.",
  "p_107":"형태: 표준 거대 가스 행성 띠 모양(순행과 역행 제트가 번갈음)으로, 띠 대비와 개수는 자전율과 내부 열류로 정해집니다. 측정된 자전 주기가 없어 띠 모양은 tie-break 입니다. cfg 는 행성 팔레트로 따뜻하게 한 목성-유사체 띠 모양을 렌더링합니다.",
  "h2_108":"Atmosphere synthesis",
  "p_109":"55 Cnc b 는 표면 없는 심층 H₂/He 외피를 가집니다. ~700 K 에서 가시-고도 주요 응결물은 규산염(포스테라이트, 엔스타타이트), 알칼리-금속염(Na₂S, KCl), 황화물로—태양계 거대 행성의 암모니아/물 얼음이 아닙니다. 기체상 나트륨과 칼륨이 광학에서 강한 알칼리 흡수를 만들며, 풍부한(초태양) 모성 금속도와 결합하면 대기가 비교적 불투명하고 따뜻한 색조가 될 것입니다.",
  "li_110":"<b>압력 / 구조.</b> 가시 구름 덱은 이 응결물이 형성되는 준위에 자리하며, 그 아래 대기는 뜨겁고 맑으며 점점 밀해지는 H₂/He 유체입니다. 별개 표면 없음.",
  "li_111":"<b>조성.</b> H₂/He 주체에 Na/K 알칼리 금속, 규산염·황화물 응결물, 그리고 (초금속 풍부 모성을 고려하면) 향상된 중원소 풍부도 가능성.",
  "li_112":"<b>하늘 외관.</b> 상층 대기 내부에서 하늘은 따뜻한 황갈-주황으로, 알칼리/ 규산염 구름으로 흐려지고, 거대한 모성(각지름 4.3°)이 한 반구를 지배합니다.",
  "h2_113":"Rotation &amp; spin synthesis",
  "p_114":"0.118 AU 에서 14.65일 궤도로, 55 Cnc b 는 반드시 조석 고정되지는 않습니다—거대 가스 행성 조석 고정 시간 척도는 길어서, 행성은 엄격한 1:1 고정보다 의사-동기 자전에 안착할 가능성이 높습니다. 궤도는 본질적으로 원형(e = 0.003. Moutou 2025)이라, 어떤 의사-동기화도 동기에 가까울 것입니다. 자전 주기는 측정되지 않았습니다.",
  "p_115":"<b>KSP 구현 노트.</b> 측정된 자전이 없으므로 cfg 는 시각적 띠 모양을 위해 동기 고정보다 빠른 목성형 자전(~10시간 자릿수, 목성 유사체)을 채택합니다— 띠 모양 동역학은 빠른 자전에서 더 거대-가스-행성답게 보입니다. 이는 tie-break 이며 미제약으로 플래그합니다.",
  "p_116":"<b>계절 없음.</b> 무시할 만한 자전축 경사와 이심 → 계절 변동 없음.",
  "h2_117":"Visual styling",
  "li_118":"<b>전체 외관.</b> 0.118 AU 의 대략 목성-크기 따뜻한 황갈-주황 띠 거대 가스 행성—이 계 네 거대 행성 중 가장 안쪽이며 55 Cnc e 의 하늘에서 가장 밝은 자매입니다.",
  "li_119":"<b>구름 덱.</b> 따뜻한 황갈과 주황(<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>)의 띠 모양으로, 밝은 존과 더 어두운 벨트가 번갈음. 목성보다 깊고 따뜻한 응결물. 흰 암모니아 구름 없음.",
  "li_120":"<b>림 / 헤이즈.</b> 따뜻한 주황 림 헤이즈(<span class=\"hex-chip\" style=\"background:#e8b888\"></span><code>#e8b888</code>)에, 알칼리-금속 흡수가 림을 약간 더 짙은 색조로.",
  "li_121":"<b>하늘의 별.</b> 55 Cnc A 는 4.26° 를 차지—지구에서 본 태양 각지름의 약 8 배—낮 반구를 지배하는 큰 따뜻-주황 디스크.",
  "li_122":"<b>하늘의 자매 행성.</b> 용암 초지구 e(0.0154 AU 안쪽)는 별 근처 밝은 점으로, 행성 c(0.247 AU 바깥)는 더 희미한 따뜻한 점으로 나타남. 어느 것도 모성에 견주지 못함.",
  "li_123":"<b>고리 없음(기본).</b> 차가운 거대 행성 d 와 달리 b 는 안정한 얼음 고리를 갖기엔 너무 따뜻하고 너무 가까움. 고리는 렌더링 안 함.",
  "h2_124":"Bibliography",
  "h3_125":"Read (visual-informative, drove decisions above)",
  "li_126":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). 최신 RV 재피팅: 행성 b P = 14.651552 d, a = 0.118 AU, e = 0.0029, M sin i = 276 ± 9 M⊕. <b>Phase 2 추천 궤도 + 질량.</b> 모델 컷오프 이후 출판 — 값을 캐시 텍스트에 대조 확인.",
  "li_127":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>. 모성 L = 0.582 L☉ → T_eq 유도.",
  "h3_128":"Read (context / methodology, not decision-driving)",
  "li_129":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>. 균질 계 재피팅: b 가 a = 0.1134 AU, e = 0.0, M sin i = 255.4 M⊕ — 기록된-대안 궤도/질량(Moutou 2025 가 추천으로 대체).",
  "li_130":"<b>Butler R. P. et al. 1997</b> — <code>1997ApJ...474L.115B</code>. 발견 논문 (역사상 4번째 외계행성). 역사적 맥락.",
  "h3_131":"Read (instrument-only, not visual-informative)",
  "li_132":"<b>Ehrenreich D. et al. 2012</b> — 55 Cnc b 를 &quot;대기 안정성 한계에 있을 수도 있는&quot; 따뜻한 목성으로 지목(Bourrier 2018 서론 경유). 따뜻-목성형 분류의 맥락.",
  "h3_133":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_134":"초기 RV 정제 논문(Marcy 2002, McArthur 2004, Fischer 2008 — Bourrier 2018 / Moutou 2025 로 대체)과 동역학-안정성 자료. 완전한 필터링 bib 는 <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_135":"Open items for follow-up",
  "li_136":"<b>반지름.</b> 측정 반지름 없음(비통과). 천체측정이나 미래 직접 영상이 경사와 진질량을 고정하면 반지름 추정을 교체할 수 있으며, 지금은 ~1.0 R_Jup 이 추정-전용 표준값입니다.",
  "li_137":"<b>대기 금속도.</b> 초금속 풍부 모성은 풍부한 대기를 시사합니다. 미래 투과/방출 제약이 구름 조성과 색을 다듬을 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
