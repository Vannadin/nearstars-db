  "h2_95":"Surface synthesis",
  "p_96":"Teegarden&#x27;s Star is one of the dimmest objects in the NearStars catalog, with only TRAPPIST-1 cooler. At 2904 K and 0.107 R☉ the photospheric SED is heavily depressed below ~7000 Å by overlapping TiO, VO, FeH, and H₂O absorption bands, leaving most of the integrated bolometric flux in the near- and mid-infrared. The Cifuentes 2020 SED fit (the CARMENES input catalogue paper) integrates broad-band photometry across optical-NIR to yield L = 7.32 × 10⁻⁴ L☉ — about 1/1370 of the Sun&#x27;s luminosity and roughly half of Proxima&#x27;s. Stefan- Boltzmann combining this L with the Cifuentes Teff = 2904 K produces R = 0.107 R☉, which agrees within uncertainty with Schweitzer 2019&#x27;s empirical mass-radius value of 0.107 ± 0.004 R☉; this self-consistency is what motivates Phase 2&#x27;s recommendation of the Schweitzer parameter set.",
  "p_97":"Dreizler 2024 reports an alternative parameter set using the Marfil 2021 spectroscopic grid: Teff = 3034 ± 45 K, R = 0.120 ± 0.012 R☉, M = 0.097 ± 0.010 M☉. These values come from evolutionary model matching rather than direct SED integration, and the higher Teff is not internally consistent with the published bolometric luminosity — Stefan-Boltzmann from L = 7.22 × 10⁻⁴ L☉ and Teff = 3034 K gives R ≈ 0.098 R☉, not 0.120. Phase 2 noted this 3σ disagreement and stayed with Schweitzer 2019. The cfg therefore renders Teegarden&#x27;s Star at R = 0.107 R☉, Teff = 2904 K. (See Open items for the Dreizler-variant runaway scenario for planet b.)",
  "p_98":"The limb-darkening profile has not been directly measured; the cfg adopts α(H) ≈ 0.5 by interpolating the Claret 2018 M-dwarf grid to Teff 2904 K, marking it as a low-confidence tie-break. This is steeper than for Proxima (0.4) and consistent with the trend toward stronger limb darkening at cooler photospheric temperatures.",
  "p_99":"Sunspot coverage is expected to be very low given the chromospheric quiet (log R&#x27;HK not published, but log L(Hα)/L_bol = −5.25 to −5.37 — about an order of magnitude below Proxima). Photometric variability in TESS sectors 43, 70, and 71 shows trends of only ~0.01 in normalized flux over a 27-day sector (Dreizler 2024 §4.1) with no clear rotational modulation, even though the 96-day rotation period should be marginally detectable — supporting the conclusion that spot contrast is small.",
  "h2_100":"Atmosphere synthesis",
  "p_101":"Teegarden&#x27;s Star is exceptionally quiet by ultra-cool dwarf standards, but it is not inactive. Fuhrmeister 2024 (arXiv:2504.02338) presents the first dedicated multi-wavelength activity study, combining 298 CARMENES spectra, 11 ESPRESSO spectra, dedicated Chandra (50 ks) and XMM-Newton (29 ks) X-ray pointings, and three TESS sectors. The quiescent X-ray luminosity from both X-ray observatories agrees at L_X ≈ 3.7 × 10²⁵ erg/s (log L_X = 25.57), giving log L_X / L_bol ≈ −4.9. This places Teegarden&#x27;s Star among the weakest known stellar X-ray sources in absolute terms, but its relative L_X / L_bol is still much higher than solar — the dim photosphere lets a modest corona dominate the energy ratio. The mean X-ray surface flux F_X obeys the &quot;minimum flux law&quot; of Schmitt (1997) for cool main sequence stars, so even the lowest-mass stars maintain a magnetically heated corona.",
  "p_102":"The chromospheric Hα line is filled in (not in emission) during quiet phases — when an emission line does appear, it is double-horned with the red horn slightly elevated, indicative of the mass motions seen in hydrodynamic flare simulations. Zechmeister 2019 quoted log L(Hα) / L_bol = −5.25 averaged over all CARMENES spectra; Fuhrmeister 2024 updates this to −5.37 with the larger dataset, with Hα varying from −5.58 in deepest quiescence to −4.26 during the brightest observed flares.",
  "p_103":"<b>Flares</b> are rare but real. Fuhrmeister 2024 identifies four flares with detailed coverage:",
  "li_104":"TESS Flare I (sector 43, 2021): total bolometric energy ≈ 1.3 × 10³² erg (T_flare = 15 000 K blackbody assumption), comparable to the largest solar flares.",
  "li_105":"TESS Flare II (sector 43, 2021): also ≈ 1.3 × 10³² erg, longer decay time but smaller peak.",
  "li_106":"XMM-Newton Flare III (2021): X-ray fluence 1.6 × 10²⁹ erg, peak L_X ≈ 9 × 10²⁶ erg/s. Shows the Neupert effect (X-ray rises after U-band).",
  "li_107":"XMM-Newton Flare IV: weaker U-band only, no X-ray counterpart detectable.",
  "p_108":"The overall observed flare rate of ~2 events per 80 days with energy ~10³² erg gives 2.6 ± 1.8 flares per 100 days — somewhat higher than Seli 2021 FFD predictions for very late-type M dwarfs, hinting that sector 43 may have caught Teegarden in a more active phase. Dreizler 2024&#x27;s complementary SPECULOOS photometric survey (142 h over 35 nights between 2021 and 2022) found 13 lower-energy flares with a power-law FFD of α = 1.84 ± 0.05, consistent with typical mid-to-late M dwarfs. Extrapolating, large prebiotic-relevant flares of ≥ 10³⁵ erg should occur at most once every 2.4 years.",
  "p_109":"A long-period sinusoidal trend on a timescale of ~2500 days (≈ 7 years) in both RV and spectroscopic activity indices (Dreizler 2024 §4.1, Fig. 12) is suggestive of an activity cycle, though the detection is at the edge of the data baseline and could equally be secular drift. The cfg adopts 7 yr with low confidence.",
  "p_110":"The combined picture is a star whose mean energy output is dominated by quiet thermal emission, with rare but proportionally significant flare excursions — much rarer than Proxima&#x27;s roughly daily flare rate. For exoplanet atmospheric retention, this is a far gentler environment than the typical M dwarf, and is one of the reasons Wandel 2019 finds both Teegarden b and c retain habitability ranges across a wide atmospheric-heating parameter space.",
  "h2_111":"Rotation &amp; spin synthesis",
  "p_112":"The 96-day rotation period is exceptionally slow even for an old M dwarf. Lafarga 2021 first identified it from CARMENES spectroscopic indices (CRX, dLW), and the same period has since been recovered by Terrien 2022 from HPF Zeeman signatures (100 d), Kemmer 2023 from clustered activity-index analysis (98 d), and Shan 2024 from CARMENES photometric monitoring (97.56 d). Dreizler 2024 adopts 96 d as the recommended value, with the noted caveat that an alternative 172-day signal in the RV residuals is also coherent over the dataset duration — its activity-indicator correlation makes a stellar origin more likely than a planetary one, but the case is not closed.",
  "p_113":"The slow rotation matches the expectation from gyrochronological spin-down (Newton 2018 MEarth South sample places only ~6 of 281 low- mass M stars at rotation periods &gt; 150 d; Shan 2024 finds similarly few). It also matches the prediction from a Rossby number of order unity (Wright 2011), since the empirical convective turnover time calibration of Wright 2011 Eq. 11 gives τ_c ≈ 130 days for M = 0.089 M☉ — close to the observed 97 d rotation, implying Teegarden&#x27;s Star is near saturation of the rotation-activity relation but with very weak absolute activity, consistent with the deep saturation regime for old fully convective stars.",
  "p_114":"The line-of-sight rotational broadening is unresolved in CARMENES (v sin i &lt; 2 km/s, Reiners 2018), implying the rotation axis inclination is consistent with the planetary orbital inclinations (near-edge-on) given R = 0.107 R☉ and P_rot = 96 d (equatorial velocity ≈ 0.06 km/s).",
  "p_115":"Asteroseismic p-modes are inaccessible for an M7 V due to the high surface gravity and tiny amplitudes; rotation is constrained entirely from photometric and spectroscopic modulation.",
  "h2_116":"Visual styling",
  "p_117":"Teegarden&#x27;s Star renders as a very deep red M7 V — even more red and dim than Proxima Centauri, with the integrated SED firmly in the near-infrared. The photospheric tint <span class=\"hex-chip\" style=\"background:#b03020\"></span><code>#b03020</code> is chosen slightly darker and redder than Proxima&#x27;s <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> to convey the cooler (2904 K vs 2980 K) and dimmer (7.3 × 10⁻⁴ vs 1.6 × 10⁻³ L☉) star. Viewed from Teegarden b at 0.0259 AU, the star fills 2.20° angular diameter (about 4× the apparent diameter of the Sun seen from Earth); from c at 0.046 AU it fills 1.25°; from d at 0.079 AU it fills 0.72°. On all three planets the host star is a large, dim, distinctly red disk dominating the daytime sky.",
  "p_118":"Flares are rare events. Compared to Proxima&#x27;s 1.49 flares per day with multiple superflares per year, Teegarden produces only ~2-3 ~10³² erg flares per 80 d, and ≥ 10³⁵ erg flares only once every couple of years. In-game rendering should reflect this rarity — a flare on Teegarden&#x27;s Star should be a striking visual event, not a routine nuisance. The flare colour <span class=\"hex-chip\" style=\"background:#ff5e2a\"></span><code>#ff5e2a</code> (Hα-dominated optical with broadband brightening) follows the Proxima precedent for game continuity.",
  "p_119":"The corona is rendered as a faint cyan-white halo modulating slowly with the ~7-year activity cycle; the modulation amplitude is much smaller than Proxima&#x27;s because Teegarden&#x27;s mean L_X is ~25× lower in absolute terms. Stellar wind streamers are not directly visible.",
  "p_120":"The most distinctive visual cue is the <b>slowness</b> of everything. The 96-day rotation makes any visible spot or active region drift across the disk on a timescale of weeks; the 7-year activity cycle makes brightness modulation an in-game seasonal effect; flare events are punctuations rather than weather. From a habitable-zone vantage this is what an &quot;old, settled&quot; red dwarf looks like.",
  "h2_121":"Bibliography",
  "h3_122":"Read (visual-informative, drove decisions above)",
  "li_123":"<b>Zechmeister M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two temperate Earth-mass planet candidates around Teegarden&#x27;s Star</i>, A&amp;A 627, A49 (<code>2019A&amp;A...627A..49Z</code>, arXiv:1906.07196). Discovery paper for planets b and c; baseline stellar parameters (Schweitzer 2019 referenced), log L(Hα)/L_bol = −5.25, kinematic age &gt; 8 Gyr, thick-disc UVW.",
  "li_124":"<b>Dreizler S. et al. 2024</b> — <i>Teegarden&#x27;s Star revisited. A nearby planetary system with at least three planets</i>, A&amp;A 684, A117 (<code>2024A&amp;A...684A.117D</code>, arXiv:2402.00923). Planet d discovery, refined b/c orbits, rotation period 96 d (Lafarga reference), updated Marfil 2021 stellar parameters, SPECULOOS flare FFD.",
  "li_125":"<b>Schweitzer A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Different roads to radii and masses of the target stars</i> (<code>2019A&amp;A...625A..68S</code>, arXiv:1904.03231). Empirical M-R relation; recommended M = 0.089 M☉, R = 0.107 R☉.",
  "li_126":"<b>Cifuentes C. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. V. Luminosities, colours, and spectral energy distributions</i> (<code>2020A&amp;A...642A.115C</code>, arXiv:2007.15077). SED-integrated bolometric L = 7.32 × 10⁻⁴ L☉; Teff = 2904 K; recommended luminosity and Teff.",
  "li_127":"<b>Passegger V. M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution spectroscopy</i> (<code>2019A&amp;A...627A.161P</code>, arXiv:1907.00807). High-res [Fe/H] = −0.19 ± 0.16; recommended metallicity.",
  "li_128":"<b>Fuhrmeister B. et al. 2024</b> — <i>Coronal and chromospheric activity of Teegarden&#x27;s star</i>, A&amp;A 691, A208 (<code>2024A&amp;A...691A.208F</code>, arXiv:2504.02338). Comprehensive activity census — TESS flare energies ≈ 1.3 × 10³² erg, Chandra + XMM L_X ≈ 3.7 × 10²⁵ erg/s, Neupert effect detection, chromospheric Hα variability.",
  "h3_129":"Read (context / methodology, not decision-driving)",
  "li_130":"<b>Marfil E. et al. 2021</b> — <i>Spectral synthesis of CARMENES M-type stars</i> (<code>2021A&amp;A...656A.162M</code>). Line list used by Dreizler 2024 for the alternative stellar parameter set (Teff = 3034 K, R = 0.120 R☉). Phase 2 did not adopt these because of internal Stefan-Boltzmann inconsistency.",
  "li_131":"<b>Lafarga M. et al. 2021</b> — Spectroscopic-index rotation periods for CARMENES targets. Source of the 96 d rotation period.",
  "li_132":"<b>Shan Y. et al. 2024</b> — <i>The PEPSI ultra-high resolution spectral library of M dwarfs</i> + CARMENES rotation period sample. Confirms P_rot = 97.56 d.",
  "li_133":"<b>Wandel A. &amp; Tal-Or L. 2019</b> — <i>On the Habitability of Teegarden&#x27;s Star planets</i>, ApJ 880, L21 (<code>2019ApJ...880L..21W</code>, arXiv:1906.07704). Stellar context for the habitability discussion of b and c.",
  "li_134":"<b>Newton E. R. et al. 2018</b> — MEarth M-dwarf rotation period catalogue. Context for slow-rotation outlier statistics.",
  "h3_135":"Read (instrument / non-cfg-decisive)",
  "li_136":"<b>Quirrenbach A. et al. 2014, 2020</b> — CARMENES instrument papers, cited but methodology only.",
  "li_137":"<b>Ribas I. et al. 2023</b> — CARMENES legacy data release. Provides the spectra reanalysed by Fuhrmeister 2024.",
  "h3_138":"Not read — no arXiv preprint or low-priority (~25 papers in stellar bib, marked <code>skipped</code>)",
  "p_139":"The stellar bibliography has 40 papers. Most of the 25 marked <code>skipped</code> are Sky &amp; Telescope / amateur-astronomy retrospectives on the star&#x27;s discovery (Sinnott; Stafford; Astrobites), early-21st-century parallax measurements superseded by Gaia (Gatewood 2009; West 2016), and CARMENES survey-overview papers (Quirrenbach 2014, 2020) that contribute methodology context but not new Teegarden-specific numbers. All are preserved in <code>docs/phase3/_bib/teegarden-s-star.yaml</code> with <code>status: skipped</code>.",
  "h2_140":"Open items for follow-up",
  "li_141":"<b>Stellar parameter ambiguity (Schweitzer 2019 vs Dreizler 2024)</b>: The 3σ disagreement between R = 0.107 R☉ (Phase 2 recommended) and R = 0.120 R☉ (Dreizler 2024 Marfil-grid) propagates directly into the insolation at planet b (1481 vs 1565 W/m²) and so into the habitable-vs-runaway choice. A future independent radius determination from CHEOPS-like photometry, JWST occultation, or a ground-based interferometric attempt would close this.",
  "li_142":"<b>172-day RV signal</b>: Dreizler 2024 cannot decisively distinguish whether this is stellar activity at twice the rotation period or a fourth planet at minimum mass ≈ 2.3 M⊕. The activity-indicator correlation suggests stellar origin, but a future ESPRESSO + MAROON-X baseline extension could settle it. If planetary, the cfg gains a &quot;Teegarden&#x27;s Star e&quot;.",
  "li_143":"<b>Suggestive 7.7-day signal</b>: Dreizler 2024 finds a 0.5 m/s residual signal near a 3:2 commensurability with b and c. If confirmed (mass ~0.5 M⊕), it would tighten the system into a TRAPPIST-1-like resonant chain.",
  "li_144":"<b>Activity cycle period</b>: ~2500 d trend is at the edge of the dataset baseline. Two-three more years of CARMENES monitoring would resolve whether the cycle exists and what its true period is.",
  "li_145":"<b>No published flare-spectrum colour</b>: The cfg flare tint <span class=\"hex-chip\" style=\"background:#ff5e2a\"></span><code>#ff5e2a</code> is the Proxima convention by analogy. A Teegarden-specific flare spectrum from ESPRESSO during a Flare I-class event would refine this.",
  "li_146":"<b>Long-term ZDI mapping</b>: Reiners 2018 inferred v sin i &lt; 2 km/s but did not map the surface magnetic geometry. A future spectropolarimetric (CARMENES-pol or future) ZDI map of the slowly rotating disc could constrain whether Teegarden hosts a Proxima-like kG dipole or a much weaker organized field.",
  "h2_147":"Related",

  ko: {
  "p_1":"티가든의 별 (GAT 1370, GJ J02530+1652) 은 3.832 ± 0.004 pc 거리에 있는 M7.0 V 극저온 왜성으로, 태양에서 24~25번째로 가까운 별입니다 (Zechmeister 2019; Dreizler 2024 참조). 질량은 0.089 ± 0.009 M☉, 반지름은 0.107 ± 0.004 R☉ (Schweitzer 2019 CARMENES SED + 경험적 질량-반지름 관계) 으로, 수소 연소 한계에 근접해 있으면서도 분명한 별의 영역에 속합니다. 유효 온도 2904 ± 51 K, 광도 7.32 × 10⁻⁴ L☉ (Cifuentes 2020 의 볼로메트릭 플럭스 적합) 은 프록시마 켄타우리 (M5.5 Ve, 2980 K) 보다 더 차갑고 어두우며, TRAPPIST-1 (M8 V, 2566 K) 과는 약간만 더 따뜻한 수준입니다. Stefan- Boltzmann 식으로 L 과 Teff 에서 역산하면 R = 0.107 R☉ 가 나오는데, 이는 Schweitzer 의 경험식 값과 내부적으로 일치합니다.",
  "p_2":"이 별은 진화된 두꺼운 원반 집단의 운동학적 특징을 보입니다 (U, V, W = −69, −71, −59 km/s; Cortés-Contreras 2016 via Zechmeister 2019). 운동학적 나이는 8 ± 3 Gyr 입니다. 색반사 활동도는 M7 V 분광형 치고 유난히 낮습니다. log L(Hα) / L_bol = −5.25 ~ −5.37 (Zechmeister 2019 평균 및 Fuhrmeister 2024 갱신값). 티가든의 별은 알려진 M7 V 왜성 중 가장 조용한 한두 별에 속합니다. 96 ± 2 일이라는 느린 자전 주기 (Lafarga 2021 분광 지표; Terrien 2022 HPF, Shan 2024 CARMENES 광도 측정과 5 % 이내 일치) 와 결합하면, 오래 전에 각운동량을 잃고 조용한 노년기에 접어든 별의 모습이 그려집니다.",
  "p_3":"티가든의 별은 세 개의 시선속도 행성을 거느리며, 모두 최소질량 1.2 M⊕ 이하 입니다. b (4.91 d, S ≈ 1.08 S⊕, 거주가능 영역 안쪽 가장자리), c (11.4 d, S ≈ 0.35 S⊕, 차가운 바깥 가장자리), d (26.13 d, S ≈ 0.12 S⊕, 거주가능 영역 밖 — Dreizler 2024 가 발견). 통과 관측된 행성은 없습니다. 인접 행성 쌍의 상호 Hill 분리는 13 mutual Hill radii 이상으로 안정적이어서, 역학적 으로는 TRAPPIST-1 보다는 GJ 1002 와 비슷한 &quot;느슨한&quot; 구조입니다. 다만 Dreizler 가 지적한 7.7 일 미해결 RV 신호가 진짜라면 네 번째 천체가 추가 되어 구조가 더 조밀해질 가능성도 남아 있습니다.",
  "p_4":"Dreizler 2024 가 Marfil 2021 선목록으로 별 매개변수를 재분석한 결과 (Teff = 3034 K, R = 0.120 R☉, M = 0.097 M☉) 는 Schweitzer 2019 의 권장값과 반지름에서 약 3σ 어긋납니다. Phase 2 는 Schweitzer 2019 값을 권장으로 채택했는데, 직접 측정된 광도와 Stefan-Boltzmann 적으로 내부 일치 하는 반면 Dreizler 의 더 높은 Teff 를 같은 L 에 대입하면 R ≈ 0.098 R☉ 가 나와 모순이 발생하기 때문입니다. 이 별 매개변수의 모호함은 행성 b 의 runaway-vs-habitable 결정에 직접 영향을 주며 Open items 에 기록되어 있습니다.",
  "p_5":"<b>NearStars 시나리오 선택: 조용한 짙은 빨강의 M7 V 왜성으로, 운동학적 나이 8 Gyr, 자전 주기 ~96 일, 낮은 색반사 Hα 및 X선 출력, 그리고 큰 플레어 (≥ 10³⁵ erg) 가 약 2.4 년에 한 번꼴로 드물게 발생합니다. 시각 스타일링은 매우 깊은 빨강 연속체, 장주기 변동성, 프록시마에 비해 극단적인 플레어가 드물다는 점을 강조합니다.</b> 19 cfg 선택; 16 canonical-aligned, 3 tie-break (림 다크닝 보간, 표면 색조 hex, 플레어 색조 hex).",

  "td_86":"Tie-break: Teff 2904 K 흑체 + 후기-M 분자 띠; 프록시마의 <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> 와 구별되도록 더 어둡고 빨갛게 선택",

  "td_89":"medium",
  "td_90":"Tie-break: 티가든-specific 플레어 스펙트럼 발표 없음; 게임 일관성을 위해 프록시마 / M-왜성 플레어 색조 관례 채택",

  "td_94":"Teff 에서 유도",
  "h2_95":"Surface synthesis",
  "p_96":"티가든의 별은 NearStars 카탈로그에서 가장 어둡고 빨간 별 중 하나이며, 오직 TRAPPIST-1 만 더 차갑습니다. 2904 K, 0.107 R☉ 에서 광구 SED 는 ~7000 Å 이하에서 TiO, VO, FeH, H₂O 흡수 띠가 겹쳐 강하게 억제되어, 적분 볼로메트릭 플럭스의 대부분이 근적외선과 중적외선에서 방출됩니다. Cifuentes 2020 의 SED 적합 (CARMENES 입력 카탈로그 논문) 은 가시광-NIR 의 광대역 측광을 적분해 L = 7.32 × 10⁻⁴ L☉ 를 산출했습니다. 태양의 약 1/1370, 프록시마의 약 절반 수준입니다. 이 L 과 Cifuentes 의 Teff = 2904 K 를 Stefan-Boltzmann 에 대입하면 R = 0.107 R☉ 가 나오고, 이는 Schweitzer 2019 의 경험적 질량-반지름 값 0.107 ± 0.004 R☉ 와 오차 안에서 일치합니다. 바로 이 자체 일관성이 Phase 2 가 Schweitzer 매개변수를 권장하는 근거 입니다.",
  "p_97":"Dreizler 2024 는 Marfil 2021 분광 격자를 사용한 대안 매개변수 세트를 보고합니다. Teff = 3034 ± 45 K, R = 0.120 ± 0.012 R☉, M = 0.097 ± 0.010 M☉. 이 값들은 직접 SED 적분이 아니라 진화 모델 매칭에서 나왔으며, 더 높은 Teff 는 발표된 볼로메트릭 광도와 내부적으로 일치하지 않습니다. L = 7.22 × 10⁻⁴ L☉ 와 Teff = 3034 K 에서 Stefan-Boltzmann 으로 풀면 R ≈ 0.098 R☉ 가 나와 발표된 0.120 과 어긋납니다. Phase 2 는 이 3σ 불일치를 지적하며 Schweitzer 2019 를 유지했고, cfg 도 따라서 R = 0.107 R☉, Teff = 2904 K 로 티가든의 별을 렌더링합니다 (행성 b 의 Dreizler- 변형 runaway 시나리오에 대해서는 Open items 참조).",
  "p_98":"림 다크닝 프로파일은 직접 측정되지 않았습니다. cfg 는 Claret 2018 M- 왜성 격자를 Teff 2904 K 로 보간한 α(H) ≈ 0.5 를 채택하고 신뢰도가 낮은 tie-break 로 표시합니다. 프록시마 (0.4) 보다 가파른 값이며, 광구 온도가 낮을수록 림 다크닝이 강해진다는 일반적인 경향과 일치합니다.",
  "p_99":"흑점 피복은 매우 적을 것으로 예상됩니다. log R&#x27;HK 는 발표되지 않았지만 log L(Hα)/L_bol = −5.25 ~ −5.37 은 프록시마보다 약 10 배 낮습니다. TESS 섹터 43, 70, 71 의 광도 변동성은 27 일 섹터 길이에 걸쳐 정규화 플럭스의 ~0.01 변화에 그치며 (Dreizler 2024 §4.1), 96 일 자전 주기가 빠듯하게 검출 가능해야 하는데도 명확한 회전 변조가 보이지 않아, 흑점 대비가 작다는 결론을 뒷받침합니다.",
  "h2_100":"Atmosphere synthesis",
  "p_101":"티가든의 별은 극저온 왜성치고 유난히 조용하지만 활동이 없는 것은 아닙니다. Fuhrmeister 2024 (arXiv:2504.02338) 는 최초로 종합적인 다중 파장 활동 연구를 수행해 298 개의 CARMENES 스펙트럼, 11 개의 ESPRESSO 스펙트럼, 전용 Chandra (50 ks) 와 XMM-Newton (29 ks) X선 관측, 그리고 TESS 세 섹터를 결합했습니다. 두 X선 망원경의 정적 X선 광도는 L_X ≈ 3.7 × 10²⁵ erg/s (log L_X = 25.57) 로 일치하며, log L_X / L_bol ≈ −4.9 가 나옵니 다. 절대값으로는 티가든의 별을 알려진 가장 약한 항성 X선 광원에 속하게 하지만, 상대 L_X / L_bol 은 여전히 태양보다 훨씬 높습니다. 어두운 광구 탓에 작은 코로나가 에너지 비율을 지배하는 셈입니다. 평균 X선 표면 플럭스 F_X 는 Schmitt (1997) 의 차가운 주계열성 &quot;최소 플럭스 법칙&quot; 을 따르며, 저질량 별 끝에서도 자기 가열된 코로나가 유지된다는 점을 보여줍니다.",
  "p_102":"색반사 Hα 선은 조용한 위상에서 채워져 있고 방출선이 보이지 않습니다. 방출선이 나타날 때는 이중 뿔 모양이며 빨강 뿔이 약간 높은데, 이는 유체역학적 플레어 시뮬레이션이 예측하는 질량 운동의 특징입니다. Zechmeister 2019 는 모든 CARMENES 스펙트럼 평균으로 log L(Hα) / L_bol = −5.25 를 인용했고, Fuhrmeister 2024 는 더 큰 데이터셋으로 이를 −5.37 로 갱신했습니다. 가장 깊은 정적기 −5.58 에서 관측된 가장 밝은 플레어 시 −4.26 까지 변동합니다.",
  "p_103":"<b>플레어</b> 는 드물지만 실재합니다. Fuhrmeister 2024 는 상세 관측이 있는 네 개의 플레어를 식별합니다.",
  "li_104":"TESS Flare I (섹터 43, 2021): 총 볼로메트릭 에너지 ≈ 1.3 × 10³² erg (T_flare = 15 000 K 흑체 가정), 가장 큰 태양 플레어급.",
  "li_105":"TESS Flare II (섹터 43, 2021): ≈ 1.3 × 10³² erg, 감쇠 시간은 더 길고 최고점은 더 낮음.",
  "li_106":"XMM-Newton Flare III (2021): X선 누적 1.6 × 10²⁹ erg, 최고 L_X ≈ 9 × 10²⁶ erg/s. Neupert 효과 확인 (X선이 U-밴드 뒤에 상승).",
  "li_107":"XMM-Newton Flare IV: 약한 U-밴드 단독, X선 대응 검출 불가.",
  "p_108":"활성 섹터 80 일에 ~10³² erg 플레어 ~2 회로, 100 일당 2.6 ± 1.8 회 빈도 입니다. Seli 2021 의 매우 후기-M 왜성 FFD 예측보다 약간 높아, 섹터 43 이 티가든의 더 활동적인 시기를 잡았을 가능성을 시사합니다. Dreizler 2024 의 보완적인 SPECULOOS 측광 (2021~2022 년 35 야간에 걸쳐 142 시간) 은 13 개의 저에너지 플레어를 찾았고 FFD 멱법칙 α = 1.84 ± 0.05 를 얻었습니다 — 중기- 후기 M 왜성의 전형적인 값입니다. 외삽하면 생명전 단계에 관련된 큰 플레어 (≥ 10³⁵ erg) 는 2.4 년에 한 번 꼴로 일어납니다.",
  "p_109":"데이터셋 길이에 가까운 ~2500 일 (≈ 7 년) 의 장주기 사인 추세가 RV 및 분광 활동 지표에서 모두 보입니다 (Dreizler 2024 §4.1, Fig. 12). 활동 주기를 시사할 가능성이 있지만 데이터 베이스라인 가장자리에 걸쳐 있어 세속 드리프트일 수도 있습니다. cfg 는 7 년을 낮은 신뢰도로 채택합니다.",
  "p_110":"종합하면 평균 에너지 출력은 조용한 열적 방출이 지배하고, 드물게 비례적으로 큰 플레어 사건이 일어나는 별입니다. 프록시마의 거의 매일 일어나는 플레어 빈도에 비하면 훨씬 부드러운 환경입니다. 행성 대기 보존 측면에서는 전형적인 M 왜성보다 훨씬 우호적이며, Wandel 2019 가 티가든 b 와 c 모두 넓은 대기 가열 매개변수 공간에서 거주가능성을 유지한다고 결론짓는 이유 중 하나입니다.",
  "h2_111":"Rotation &amp; spin synthesis",
  "p_112":"96 일 자전 주기는 오래된 M 왜성치고도 유난히 느립니다. Lafarga 2021 이 CARMENES 분광 지표 (CRX, dLW) 에서 처음 식별했고, 이후 Terrien 2022 의 HPF Zeeman 신호 (100 d), Kemmer 2023 의 클러스터 활동 지표 분석 (98 d), Shan 2024 의 CARMENES 광도 측정 (97.56 d) 에서 모두 같은 주기가 회수되었습니다. Dreizler 2024 는 96 일을 권장값으로 채택하며, RV 잔차 의 172 일 신호가 데이터셋 전체에 걸쳐 일관성 있게 나타난다는 점도 지적합니다. 이 신호의 활동 지표와의 상관성은 별 기원이 행성 기원보다 더 가능성 있게 만들지만 단정 짓기는 어렵습니다.",
  "p_113":"느린 자전은 자이로크로놀로지 적 스핀 다운 예측과 일치합니다 (Newton 2018 MEarth South 표본에서 281 개의 저질량 M 별 중 자전 주기 &gt; 150 d 인 별이 ~6 개에 불과; Shan 2024 도 유사). Rossby 수가 1 안팎이라는 예측 (Wright 2011) 과도 부합합니다. Wright 2011 식 (11) 의 경험적 대류 순환 시간은 M = 0.089 M☉ 에서 τ_c ≈ 130 일로, 관측된 97 일 자전과 가깝 습니다. 자전-활동 관계의 포화 영역 근처지만 절대 활동도는 매우 약하다는 것은 오래된 완전 대류 별의 깊은 포화 영역에 해당합니다.",
  "p_114":"시선 방향 회전 폭은 CARMENES 에서 분해되지 않습니다 (v sin i &lt; 2 km/s, Reiners 2018). R = 0.107 R☉ 와 P_rot = 96 d 에서 적도 속도 ≈ 0.06 km/s 입니다. 자전축 경사가 행성 궤도 경사 (거의 측면 정렬) 와 일치한다는 의미입니다.",
  "p_115":"별진동 p-모드는 M7 V 의 높은 표면 중력과 작은 진폭 탓에 접근 불가능 하므로, 자전 정보는 전적으로 광도와 분광 변조에서 얻습니다.",
  "h2_116":"Visual styling",
  "p_117":"티가든의 별은 매우 짙은 빨강의 M7 V 로 렌더링됩니다. 프록시마 켄타우리 보다도 더 빨갛고 어두우며, 적분 SED 는 근적외선에 단단히 자리 잡고 있습니다. 광구 색조 <span class=\"hex-chip\" style=\"background:#b03020\"></span><code>#b03020</code> 은 프록시마의 <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> 보다 약간 더 어둡 고 빨갛게 선택해 더 차갑고 (2904 K 대 2980 K) 더 어두운 (7.3 × 10⁻⁴ 대 1.6 × 10⁻³ L☉) 별을 표현합니다. 0.0259 AU 의 티가든 b 에서 보면 별의 시지름은 2.20° (지구에서 본 태양의 약 4 배), 0.046 AU 의 c 에서는 1.25°, 0.079 AU 의 d 에서는 0.72° 입니다. 세 행성 모두에서 모성은 주간 하늘을 지배하는 크고 어둑한 뚜렷한 빨강 원반입니다.",
  "p_118":"플레어는 드문 사건입니다. 프록시마의 하루 1.49 회 플레어와 매년 여러 번의 슈퍼플레어와 비교하면, 티가든은 80 일당 ~10³² erg 플레어 2~3 회 정도, ≥ 10³⁵ erg 플레어는 2 년에 한 번 정도만 일어납니다. 게임 내 렌더링 은 이 희소성을 반영해야 합니다. 티가든의 별 플레어는 일상적인 성가심이 아니라 강렬한 시각적 사건이어야 합니다. 플레어 색 <span class=\"hex-chip\" style=\"background:#ff5e2a\"></span><code>#ff5e2a</code> (Hα 우세 광학 + 광대역 밝아짐) 는 게임 일관성을 위해 프록시마 관례를 따릅니다.",
  "p_119":"코로나는 ~7 년 활동 주기에 맞춰 천천히 변하는 흐릿한 청백색 후광으로 렌더링합니다. 변조 진폭은 프록시마보다 훨씬 작은데, 절대값으로 티가든의 평균 L_X 가 약 25 배 낮기 때문입니다. 항성풍 스트리머는 직접 보이지 않습니다.",
  "p_120":"가장 두드러진 시각 단서는 모든 것이 <b>느리다는</b> 점입니다. 96 일 자전은 보이는 흑점이나 활동 영역이 원반을 가로지르는 데 몇 주가 걸리게 만들고, 7 년 활동 주기는 게임 내 계절적 효과처럼 밝기 변조를 일으키며, 플레어는 일상적 날씨가 아니라 구두점에 가깝습니다. 거주가능 영역의 시점에서 보면 &quot;늙고 정착한&quot; 빨강 왜성이 어떤 모습인지 보여주는 별입니다.",
  "h2_121":"Bibliography",
  "h3_122":"Read (visual-informative, drove decisions above)",
  "li_123":"<b>Zechmeister M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two temperate Earth-mass planet candidates around Teegarden&#x27;s Star</i>, A&amp;A 627, A49 (<code>2019A&amp;A...627A..49Z</code>, arXiv:1906.07196). 행성 b 와 c 의 발견 논문. 기준 별 매개변수 (Schweitzer 2019 참조), log L(Hα)/L_bol = −5.25, 운동학적 나이 &gt; 8 Gyr, 두꺼운 원반 UVW.",
  "li_124":"<b>Dreizler S. et al. 2024</b> — <i>Teegarden&#x27;s Star revisited. A nearby planetary system with at least three planets</i>, A&amp;A 684, A117 (<code>2024A&amp;A...684A.117D</code>, arXiv:2402.00923). 행성 d 발견, b/c 궤도 정밀화, 자전 주기 96 일 (Lafarga 참조), Marfil 2021 별 매개변수 갱신, SPECULOOS 플레어 FFD.",
  "li_125":"<b>Schweitzer A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Different roads to radii and masses of the target stars</i> (<code>2019A&amp;A...625A..68S</code>, arXiv:1904.03231). 경험적 M-R 관계. 권장 M = 0.089 M☉, R = 0.107 R☉.",
  "li_126":"<b>Cifuentes C. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. V. Luminosities, colours, and spectral energy distributions</i> (<code>2020A&amp;A...642A.115C</code>, arXiv:2007.15077). SED 적분 볼로메트릭 L = 7.32 × 10⁻⁴ L☉; Teff = 2904 K. 권장 광도와 Teff.",
  "li_127":"<b>Passegger V. M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution spectroscopy</i> (<code>2019A&amp;A...627A.161P</code>, arXiv:1907.00807). 고분산 [Fe/H] = −0.19 ± 0.16. 권장 금속함량.",
  "li_128":"<b>Fuhrmeister B. et al. 2024</b> — <i>Coronal and chromospheric activity of Teegarden&#x27;s star</i>, A&amp;A 691, A208 (<code>2024A&amp;A...691A.208F</code>, arXiv:2504.02338). 종합적 활동 조사 — TESS 플레어 에너지 ≈ 1.3 × 10³² erg, Chandra + XMM L_X ≈ 3.7 × 10²⁵ erg/s, Neupert 효과 검출, 색반사 Hα 변동.",
  "h3_129":"Read (context / methodology, not decision-driving)",
  "li_130":"<b>Marfil E. et al. 2021</b> — <i>Spectral synthesis of CARMENES M-type stars</i> (<code>2021A&amp;A...656A.162M</code>). Dreizler 2024 가 대안 별 매개변수 세트 (Teff = 3034 K, R = 0.120 R☉) 에 사용한 선목록. Phase 2 는 내부 Stefan-Boltzmann 불일치 때문에 채택하지 않음.",
  "li_131":"<b>Lafarga M. et al. 2021</b> — CARMENES 표적의 분광 지표 기반 자전 주기. 96 일 자전 주기의 출처.",

  "li_133":"<b>Wandel A. &amp; Tal-Or L. 2019</b> — <i>On the Habitability of Teegarden&#x27;s Star planets</i>, ApJ 880, L21 (<code>2019ApJ...880L..21W</code>, arXiv:1906.07704). b 와 c 의 거주가능성 논의를 위한 별 맥락.",

  "h3_138":"Not read — no arXiv preprint or low-priority (~25 papers in stellar bib, marked <code>skipped</code>)",
  "p_139":"별 참고문헌에는 40 개의 논문이 있습니다. <code>skipped</code> 로 표시된 25 개의 대부분은 별 발견에 대한 Sky &amp; Telescope / 아마추어 천문학 회고 (Sinnott; Stafford; Astrobites), Gaia 로 대체된 21 세기 초의 시차 측정 (Gatewood 2009; West 2016), 그리고 티가든-specific 한 새로운 수치가 아니라 방법론 맥락만 제공하는 CARMENES 서베이 개요 논문 (Quirrenbach 2014, 2020) 입니다. 모두 <code>docs/phase3/_bib/teegarden-s-star.yaml</code> 에 <code>status: skipped</code> 로 보존되어 있습니다.",
  "h2_140":"Open items for follow-up",
  "li_141":"<b>별 매개변수 모호함 (Schweitzer 2019 대 Dreizler 2024)</b>: R = 0.107 R☉ (Phase 2 권장) 와 R = 0.120 R☉ (Dreizler 2024 Marfil 격자) 사이의 3σ 불일치는 행성 b 의 입사 플럭스 (1481 대 1565 W/m²) 에 직접 전파 되고, 따라서 habitable-vs-runaway 선택에 영향을 줍니다. CHEOPS 급 광도 측정, JWST 차폐, M7 에서는 어려운 별진동, 또는 지상 간섭계의 미래 시도 같은 독립적인 반지름 측정이 이 문제를 닫을 수 있습니다.",
  "li_142":"<b>172 일 RV 신호</b>: Dreizler 2024 는 이것이 자전 주기의 두 배에서의 별 활동인지 아니면 최소질량 ≈ 2.3 M⊕ 의 네 번째 행성인지 결정적으로 구별하지 못합니다. 활동 지표와의 상관성은 별 기원을 시사하지만, 미래의 ESPRESSO + MAROON-X 베이스라인 확장이 이를 결론지을 수 있습니다. 행성이라면 cfg 에 &quot;티가든의 별 e&quot; 가 추가됩니다.",
  "li_143":"<b>시사적인 7.7 일 신호</b>: Dreizler 2024 는 b 와 c 와의 3:2 정류 정류 근처에서 0.5 m/s 잔차 신호를 찾습니다. 확인된다면 (질량 ~0.5 M⊕), 시스템을 TRAPPIST-1 같은 공명 사슬로 조밀화할 것입니다.",
  "li_144":"<b>활동 주기</b>: ~2500 일 추세는 데이터셋 베이스라인 가장자리에 있습니다. 2~3 년의 CARMENES 모니터링 연장이 주기의 실재 여부와 진짜 주기를 결정할 것입니다.",
  "li_145":"<b>티가든 플레어 스펙트럼 색의 미발표</b>: cfg 플레어 색조 <span class=\"hex-chip\" style=\"background:#ff5e2a\"></span><code>#ff5e2a</code> 는 프록시마 관례에서 유추한 것입니다. Flare I 급 사건 동안 ESPRESSO 의 티가든-specific 플레어 스펙트럼이 이를 정교화할 것입니다.",
  "li_146":"<b>장기 ZDI 매핑</b>: Reiners 2018 은 v sin i &lt; 2 km/s 를 추론했지만 표면 자기 기하학을 매핑하지 않았습니다. 미래의 분광편광 (CARMENES-pol 이나 후속 기기) ZDI 매핑이 티가든이 프록시마 같은 kG 쌍극자를 가지는지 훨씬 약한 조직된 장을 가지는지 제한할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
