  "h2_101":"Surface synthesis",
  "p_102":"The photosphere of 40 Eri B is a <b>purely radiative</b> layer at Teff = 17,200 K. There is no convection zone in the visible atmosphere — Bond 2017 §6.1 makes this explicit, and the value sits well above the canonical DA H-convection onset near 13,000 K. Granulation, supergranulation, sunspots, plages, and all of the classical FGK-stellar surface features are <b>absent</b>. The visible disk is a featureless, nearly uniform black-body emitter modulated only by surface gravity broadening of the H Balmer lines.",
  "p_103":"Even spectropolarimetric searches for surface magnetic structure have come up empty: Landstreet &amp; Bagnulo 2015 used ESPaDOnS at the CFHT with a novel broad-band circular-polarimetry technique to push the upper limit on any organized field to roughly 250 G, with mean noise σ⟨Bz⟩ ≈ 85 G — &quot;the smallest standard error of field measurement ever obtained for a white dwarf&quot; at the time of publication. An earlier Fabrika et al. 2003 BSAO programme had reported tentative variability with semi-amplitude ~4–5 kG and two candidate rotation periods (2h 25m and 5h 17m), but Fabrika himself noted the periods could not be &quot;firmly&quot; determined; the more sensitive Landstreet &amp; Bagnulo 2015 non-detection effectively refutes the kilogauss-level claim. For NearStars rendering this means <b>no animated magnetic features</b> — no Zeeman tomography map, no spot pattern, no aurorae.",
  "p_104":"The surface gravity log g = 7.957 ± 0.020 (cgs) translates to a photon-escape velocity v_esc ≈ 4,250 km/s and a gravitational redshift contribution to the radial velocity of 27.82 ± 0.97 km/s (Bond 2017). This redshift serves as a precision GR cross-check: an independent ESPaDOnS-derived spectroscopic gravitational redshift is consistent within 1σ, confirming that the dynamical mass and the SED radius are mutually self-consistent. For the KSP cfg this means the body&#x27;s gravity and its visual size faithfully scale with the canonical mass-radius relation for a CO-core WD with a thin H envelope.",
  "h2_105":"Atmosphere synthesis",
  "p_106":"40 Eri B has a <b>pure-hydrogen</b> photosphere with no detectable metal pollution. The Balmer-only spectroscopic fit of Bond 2017 adopts the Tremblay &amp; Bergeron 2009 LTE pure-H model grid; the clean Balmer profiles set Teff and log g with high precision and leave no residual evidence of metal absorption beyond Fabrika 2003&#x27;s ultra-weak features, which Fabrika attributed to circumstellar or interstellar gas accreting from the ISM and from a putative ~10⁻¹⁹ M☉/yr inflow from the dM4e companion 40 Eri C — not to photospheric pollution. 40 Eri B is therefore not a DAZ; it is a clean DA. No metal absorption layer is needed in the KSP cfg.",
  "p_107":"Spectral evolution is the defining long-term story. Bond 2017 §6.1 notes that the H layer is so thin (q_H ≈ 10⁻¹⁰) that as the star continues to cool, the bottom of the H convection zone that develops at lower Teff will eventually reach the underlying helium envelope. The two layers will mix and 40 Eri B will <b>transition from a DA into a helium-atmosphere DC</b> white dwarf. This is not imminent — 40 Eri B is presently DA2.9 at 17,200 K and cooling slowly; the DA → DC mixing event happens at much lower Teff (typically below 6,000 K for thin-H DAs). On the canonical NearStars temporal scale (in-game years) this transition is irrelevant; the cfg renders 40 Eri B in its current DA2.9 state.",
  "p_108":"There is no chromosphere, no transition region, no corona. The indicators that calibrate activity on FGK and M dwarfs — log R&#x27;HK, Hα emission, X-ray L_X cycles — have no physical meaning for a radiative-atmosphere white dwarf. The Phase 2 DB correctly records these fields as N/A. The XUV emission is limited to the thermal Wien tail of the 17,200 K black-body, and even that is below the threshold for chemical effects on any hypothetical orbiting body, since the bolometric luminosity itself is only 0.0135 L☉.",
  "h2_109":"Rotation &amp; spin synthesis",
  "p_110":"40 Eri B&#x27;s rotation is <b>not well constrained</b>. There is no photometric variability that survives modern monitoring; there is no detectable Zeeman polarization that would let spectropolarimetric Doppler imaging recover a period (Landstreet &amp; Bagnulo 2015 effectively refute the kilogauss field that Fabrika 2003&#x27;s variability claim would have required); and sub-projected v sin i upper limits from broadened Balmer profiles are model-degenerate with the pressure broadening at 17,200 K. The Phase 2 DB records <b>no rotation entry</b> for 40 Eri B; the Phase 3 synthesis carries that null forward.",
  "p_111":"For KSP cfg purposes this is not a missing field — it is an explicit absence. The body cfg can pick any rotation rate consistent with white-dwarf physics; the conventional choice is a slow rotation (P_rot of order hours to days) inherited from the AGB progenitor&#x27;s spun-down core, with the proviso that the AGB common-envelope or wind-loss phase may have transferred angular momentum to the M-dwarf companion 40 Eri C (Bond 2017 §6.2 cites Fuhrmann 2014 for the AGB-spin-up scenario on C). For visual rendering at NearStars scale, the rotation rate is imperceptible — the body is a point source even at high zoom.",
  "p_112":"40 Eri B is <b>outside</b> the DAV ZZ-Ceti instability strip. The empirical strip for DA white dwarfs lies between roughly 10,500 K and 12,500 K (Gianninas et al. 2011 and references therein); 17,200 K places 40 Eri B well above the blue edge. There are no observed pulsations and none are expected; the renderer therefore does not animate any surface brightness oscillation.",
  "h2_113":"Visual styling",
  "p_114":"In the NearStars renderer, 40 Eri B is portrayed as a brilliant <b>blue-white pinpoint</b> — saturated cyan-tinged white encoded as <span class=\"hex-chip\" style=\"background:#cfd9ff\"></span><code>#cfd9ff</code> against the canonical solar-white. At 17,200 K the Planck-locus chromaticity sits in the blue-white region of the Kelvin scale (between Vega&#x27;s ~9,600 K and the hottest O-stars&#x27; ~30,000+ K); rendering it as pure white would lose the visual distinction from the K-dwarf 40 Eri A and the M-dwarf 40 Eri C when the three components are framed together. The tie-break defaults to the saturated tint per the interesting-first rule.",
  "p_115":"At 5.01 pc viewed from Earth the apparent magnitude is V = 9.53 — naked-eye-invisible without a telescope despite the proximity, because the white dwarf&#x27;s tiny radius (0.013 R☉, ~1.4 R⊕) caps the bolometric output at 0.0135 L☉. The body cfg renders the star at its physical scale; at 1 AU separation the apparent angular diameter is ~25″ — well below the ~30′ disk that the Sun subtends from Earth, so even at close in-system fly-by distances 40 Eri B presents as a small bright disk rather than a resolved sphere.",
  "p_116":"The binary partner 40 Eri C orbits at a mean separation of ~34.7 AU (Mason 2017 a = 6.93″ × 5.01 pc), ranging from ~19.8 AU at periastron (e = 0.43) to ~49.6 AU at apastron over the 230-year orbit. From the cfg viewpoint of a body orbiting 40 Eri B, the M-dwarf companion 40 Eri C appears as a dim red point of variable brightness (DY Eri is a flare star) at arcminute-scale separation. The wider companion 40 Eri A sits at ~83″ (~415 AU at 5.01 pc), unbound on Kopernicus orbit timescales but visible as a bright orange K-dwarf &quot;second sun&quot; — V = 4.43, comparable to a magnitude-1 star in the night sky when seen from a hypothetical 40 Eri B planet.",
  "p_117":"The triple is best appreciated in a system-wide view: A as a bright orange disk, B as a blue-white pinpoint, C as a dimmer red flare star — three different stellar evolutionary endpoints arranged in a single 5-pc field. The Visual styling cfg should preserve this colour triad rather than blending B toward neutral white.",
  "h2_118":"Bibliography",
  "h3_119":"Read (decision-driving)",
  "li_120":"<b>Bond H. E., Bergeron P. &amp; Bédard A. 2017</b> — <i>Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, arXiv:1709.00478, DOI 10.3847/1538-4357/aa8a63). HST/FGS astrometry of the BC pair anchored on the Mason 2017 visual orbit; pure-H model atmosphere Balmer-line fit; SED fit to BVRI + ubvy + JHK + Hipparcos parallax. Headline parameters: M = 0.573 ± 0.018 M☉, R = 0.01308 ± 0.00020 R☉, Teff = 17,200 ± 110 K, log g = 7.957 ± 0.020, L = 0.01349 ± 0.00054 L☉, gravitational redshift 27.82 ± 0.97 km/s. §6.1 thin-H envelope (q_H ≈ 10⁻¹⁰) with purely radiative atmosphere; §6.2 IFMR-derived progenitor M_init ≈ 1.8 M☉, pre-WD lifetime 1.7 Gyr, total age 1.8 Gyr; §6.3 CO-core MRR consistency check across four nearby WDs; §6.4 conclusion that thin-H DAs are common.",
  "li_121":"<b>Landstreet J. D. &amp; Bagnulo S. 2015</b> — <i>A novel and sensitive method for measuring very weak magnetic fields of DA white dwarfs — A search for a magnetic field at the 250 G level in 40 Eridani B</i>, A&amp;A 580, A120 (<code>2015A&amp;A...580A.120L</code>, DOI 10.1051/0004-6361/201526434). ESPaDOnS broad-band circular polarimetry at CFHT; individual ⟨Bz⟩ measurements consistent with zero within σ ≈ 80–90 G; concludes a probable upper limit ⟨Bz⟩ ≲ 250 G, noting the noise is &quot;the smallest standard error of field measurement ever obtained for a white dwarf&quot;. This refutes the Fabrika 2003 kilogauss-variability claim.",
  "li_122":"<b>Mason B. D., Hartkopf W. I. &amp; Miles K. N. 2017</b> — <i>Binary Star Orbits V. The Nearby White Dwarf — Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, arXiv:1707.03635, DOI 10.3847/1538-3881/aa803e). Re-derived visual orbit incorporating speckle interferometry through 2016; grade-1 definitive solution Table 4: P = 230.09 ± 0.68 yr, T = 1847.60 ± 1.10, e = 0.4300 ± 0.0027, a = 6.9310 ± 0.0500″, i = 107.53° ± 0.29°, ω = 318.20° ± 1.10°, Ω = 151.44° ± 0.12°. Dynamical masses M_B = 0.575 ± 0.018 M☉, M_C = 0.2041 ± 0.0064 M☉ — consistent with Bond 2017 within errors.",
  "li_123":"<b>Gianninas A., Bergeron P. &amp; Ruiz M. T. 2011</b> — <i>A Spectroscopic Survey and Analysis of Bright, Hydrogen-Rich White Dwarfs</i>, ApJ 743, 138 (<code>2011ApJ...743..138G</code>, arXiv:1109.3171). Definitive DA spectral-temperature index survey adopting the DA1–DA9 Sion classification; 40 Eri B (WD 0413−077) carries the DA2.9 subtype in this work, the canonical post-2011 value used by Bond 2017 and subsequent literature.",
  "h3_124":"Read (context / methodology)",
  "li_125":"<b>Tremblay P.-E. &amp; Bergeron P. 2009</b> — <i>Spectroscopic Analysis of DA White Dwarfs: Stark Broadening of Hydrogen Lines Including Nonideal Effects</i>, ApJ 696, 1755 (<code>2009ApJ...696.1755T</code>). The pure-H model-atmosphere grid Bond 2017 adopts for the Balmer-line Teff and log g fit.",
  "li_126":"<b>Salaris M. et al. 2009</b> — <i>Semi-empirical White Dwarf Initial–Final Mass Relations: A Thorough Analysis of Systematic Uncertainties due to Stellar Evolution Models</i>, ApJ 692, 1013 (<code>2009ApJ...692.1013S</code>). The IFMR relation M_final = 0.134 M_init + 0.331 that Bond 2017 §6.2 inverts to recover M_init ≈ 1.8 M☉ from the measured M_final = 0.573 M☉.",
  "li_127":"<b>Fabrika S. N. et al. 2003</b> — <i>Looking for magnetic fields in white dwarfs. The B and M components of 40 Eri</i>, BSAO 55, 17 (arXiv:astro-ph/0006050). Earlier kilogauss variability claim (B_max ~ 4–5 kG; candidate periods 2h25m and 5h17m); the authors note no firm single period could be determined. Effectively superseded by Landstreet &amp; Bagnulo 2015&#x27;s null detection.",
  "li_128":"<b>Tokovinin A. 2018</b> — <i>The Updated Multiple Star Catalog</i>, ApJS 235, 6 (<code>2018ApJS..235....6T</code>). MSC entry for 40 Eri records the A↔BC outer pair at ~83″ separation, ~8,000-yr approximate period, no fitted Keplerian solution.",
  "h3_129":"Read (instrument-only / context)",
  "li_130":"<b>Mason B. D. et al. 2021</b> — <i>Speckle Interferometry at the US Naval Observatory. XXIV</i>, AJ 162, 53 (<code>2021AJ....162...53M</code>, DOI 10.3847/1538-3881/abfaa2). Newer BC orbit fit: P = 233.20 ± 0.65 yr, e = 0.4141 ± 0.0072, a = 6.88788 ± 0.03488″. Listed as the current Sixth Orbit Catalog entry; Phase 3 cfg keeps Mason 2017 for self-consistency with Bond 2017&#x27;s mass derivation, and the 2021 update is logged as a follow-up item below.",
  "li_131":"<b>Holberg J. B. et al. 2013</b> — <i>Where are all the Sirius-like binary systems?</i>, MNRAS 435, 2077 (<code>2013MNRAS.435.2077H</code>). Sets 40 Eri BC in the broader population of nearby Sirius-like (FGK + WD) systems for context, but does not re-measure 40 Eri B parameters.",
  "h3_132":"Not read — no decision impact (~12 papers)",
  "p_133":"Pre-Bond legacy parallax / orbit notes (Heintz 1974, Wegner 1974 spectroscopic redshift, McCook &amp; Sion 1999 WD catalogue classifications), DA spectropolarimetric surveys that include 40 Eri B as a non-detection without separate measurement (Kawka &amp; Vennes 2007, Aznar Cuadrado 2004), and recent catalogue / Gaia DR3 cross-match papers that quote Bond 2017 without independent measurement. The full filtered list is captured implicitly via the Phase 2 meta_notes citation chain; none would change the Decisions table.",
  "h2_134":"Open items for follow-up",
  "li_135":"<b>Mason 2021 orbit update.</b> Mason et al. 2021 (<code>2021AJ....162...53M</code>) supersedes the Mason 2017 visual orbit with P = 233.20 ± 0.65 yr, e = 0.4141 ± 0.0072, a = 6.88788 ± 0.03488″. A future reconciliation pass should adopt the 2021 elements and re-derive the dynamical mass with the same Bond 2017 HST/FGS astrometry; the resulting mass should differ from 0.573 M☉ by less than the current ±0.018 M☉ uncertainty, but the orbit period in particular matters for Principia long-period n-body integrations.",
  "li_136":"<b>DA → DC transition Teff threshold.</b> Bond 2017 §6.1 predicts mixing of the thin H layer into the He envelope at some Teff well below 17,200 K but does not quote a specific transition temperature for q_H ≈ 10⁻¹⁰. A future cfg variant could render the future DC state by interpolating between Bergeron-Wesemael cooling tracks; the present cfg uses only the current DA2.9 state.",
  "li_137":"<b>ZZ Ceti pulsation status.</b> 40 Eri B is well outside the DAV instability strip (10,500–12,500 K versus 17,200 K) and no oscillations are observed. If future TESS or CHEOPS long-baseline monitoring detected sub-mmag photometric variability, the cfg might gain a low-amplitude pulsation effect; presently none is recorded.",
  "li_138":"<b>Astrometric Gaia DR4 mass refinement.</b> Gaia DR4 (expected late-decade release) will deliver multi-epoch astrometry of the BC pair with sub-microarcsecond per-epoch precision; the 0.573 ± 0.018 M☉ dynamical mass may be tightened by an order of magnitude.",
  "li_139":"<b>Per-Phase-2-DB σ on total age.</b> Bond 2017 reports &quot;~1.8 Gyr&quot; without a paper-stated uncertainty; the Phase 2 DB carries σ = 0.5 Gyr as a curator estimate. The Phase 3 Decisions row mirrors that estimate; a reconciliation pass could either retain (as documented) or replace with a paper-cited σ if a follow-up cooling-track + IFMR Monte-Carlo analysis is published.",
  "h2_140":"Related",
  "li_141":"<a href=\"40-eridani-a.md\">40-eridani-a</a> — K0.5 V primary at ~83″ (~415 AU); host of the refuted &quot;Vulcan&quot; planet (Burrows et al. 2024)",

  "p_1":"40 Eridani B (HD 26976, WD 0413−077, EG 11) 은 5.01 pc 거리의 40 Eri 삼중계에서 호스트가 아닌 두 동반자 중 더 밝은 쪽으로, Sirius B 다음 가는 두 번째로 가까운 백색왜성입니다. K0.5 V 주성 40 Eri A 로부터 83″ 떨어진 V = 9.53 의 천체로, 맨눈으로 보이는 별과 시각적으로 가장 가까운 백색왜성이기도 합니다. M 왜성 40 Eri C 와 함께 230.09 년 주기의 시각 이중성을 이루며 (Mason, Hartkopf &amp; Miles 2017), HST/FGS 에 정박한 이 시스템의 역학 해는 가까운 들녘 백색왜성 중 가장 정밀한 질량 측정을 제공합니다. <b>M = 0.573 ± 0.018 M☉</b> (Bond et al. 2017). 여기에 SED-fit 으로 R = 0.01308 ± 0.00020 R☉, log g = 7.957 ± 0.020, Teff = 17,200 ± 110 K 를 묶으면 40 Eri B 는 CO-core 질량-반지름 관계 위에서 표준 이론이 예측하는 위치와 거의 정확히 일치합니다.",
  "p_2":"다만 Bond 2017 의 핵심 발견은 질량이 <b>아닌</b> <b>얇은</b> 수소 외피 입니다. 관측된 (M, R, Teff, L) 점에 냉각 곡선이 맞으려면 표면 H 층의 질량 분율이 q_H ≈ 10⁻¹⁰ 이어야 하며, 이는 canonical &quot;두꺼운&quot; 값 q_H ≈ 10⁻⁴ 보다 4 차수가 작습니다. Bond 2017 은 이를 상당 비율의 DA 백색왜성이 얇은 H 층을 갖고 태어났거나 그렇게 진화했다는 직접 증거로 읽으며, H 대류대 바닥이 결국 아래쪽 He 층에 닿아 별이 헬륨 대기로 섞여 들어가는 DA → DC 진화 시나리오를 지지합니다. 40 Eri B 는 17,200 K 의 <b>완전 복사 대기</b> 라 이 혼합 사건이 지금 일어나기에는 너무 뜨겁지만, 얇은 H 결과는 이 별의 장기적 운명을 고정합니다.",
  "p_3":"<b>NearStars 시나리오 선택. 40 Eri C 와 평균 ~33 AU 떨어져 도는 눈부신 청백색 점광원 백색왜성으로, canonical Bond 2017 파라미터 셋으로 렌더링합니다.</b> 측정 행 20 개 모두가 canonical 문헌과 일치하며, tie-break 은 표면 색조 hex 코드 (<span class=\"hex-chip\" style=\"background:#cfd9ff\"></span><code>#cfd9ff</code>) 한 개뿐 입니다. 태양형 흰색 동반자들과 게임 내에서 구분되도록 더 채도가 높은 청백색을 선택했습니다. divergence 가 없으므로 <code>## Canonical alternatives</code> 섹션도 없습니다.",

  "td_86":"6.9310 ± 0.0500",
  "td_87":"high",
  "td_88":"Mason, Hartkopf &amp; Miles 2017 Table 4. 투영 장반경. 5.01 pc 에서 ≈ 34.7 AU",

  "td_90":"<span class=\"hex-chip\" style=\"background:#cfd9ff\"></span><code>#cfd9ff</code> (채도 높은 청백색)",
  "td_91":"medium",
  "td_92":"Tie-break. 17,200 K 에서 Planck-locus 가 청백색 영역. 태양형 흰색 동반자들과 시각 구분을 위해 더 채도가 높은 색을 선택",
  "td_93":"<code>stellar_color_temp_k</code>",
  "td_94":"17200",
  "td_95":"high",
  "td_96":"clean 복사 DA 광구에서 Teff 와 동일",
  "td_97":"<code>visual_apparent_diameter_arcsec_at_1au</code>",
  "td_98":"25.09",
  "td_99":"high",
  "td_100":"기하학적 유도. 2 R★ / a × (180·3600/π), R★ = 0.01308 R☉ = 9.10×10⁶ m (~1.43 R⊕)",
  "h2_101":"Surface synthesis",
  "p_102":"40 Eri B 의 광구는 Teff = 17,200 K 의 <b>완전 복사</b> 층입니다. 가시 대기에 대류대가 없습니다. Bond 2017 §6.1 가 이를 명시하며, 이 값은 canonical DA H-대류 onset (약 13,000 K) 보다 충분히 위쪽에 있습니다. Granulation, supergranulation, sunspot, plage 등 고전적인 FGK 별의 표면 구조는 모두 <b>없습니다</b>. 가시 디스크는 H Balmer 선 의 surface gravity 광폭화 효과로만 변조되는, 거의 균일한 흑체 방사기로 나타납니다.",
  "p_103":"표면 자기 구조를 찾는 spectropolarimetric 탐색도 빈손이었습니다. Landstreet &amp; Bagnulo 2015 는 CFHT 의 ESPaDOnS 로 새로운 광역 원편광 기법을 적용해 어떤 조직화된 장 (organized field) 의 상한을 약 250 G 수준까지 낮췄으며, 평균 잡음 σ⟨Bz⟩ ≈ 85 G — 발표 당시 &quot;백색왜성에 대해 얻은 자기장 측정 표준 오차 중 가장 작은 값&quot; 이 었습니다. 그 이전 Fabrika et al. 2003 BSAO 프로그램은 반진폭 ~4–5 kG 의 잠정 변동성과 두 후보 자전 주기 (2시간 25분, 5시간 17분) 를 보고했지만, Fabrika 본인이 단일 주기를 &quot;확실히&quot; 결정할 수 없다고 밝혔습니다. Landstreet &amp; Bagnulo 2015 의 더 민감한 비검출은 이 kG 급 주장을 사실상 반박합니다. NearStars 렌더링 관점에서는 <b>자기 관련 애니메이션을 일체 두지 않는다</b> 는 뜻이 됩니다. Zeeman 지도도 없고, 점박이 패턴도 없고, 오로라도 없습니다.",
  "p_104":"표면 중력 log g = 7.957 ± 0.020 (cgs) 은 광자 탈출 속도 v_esc ≈ 4,250 km/s 와 27.82 ± 0.97 km/s 의 중력 적색편이 (Bond 2017) 로 번역됩니다. 이 적색편이는 정밀 GR cross-check 역할을 합니다. 독립적으로 ESPaDOnS 분광에서 얻은 중력 적색편이가 1σ 안에서 일치 하여, 역학 질량과 SED 반지름이 상호 일관됨을 확인해 줍니다. KSP cfg 입장에서 이는 보디의 중력과 시각적 크기가 얇은 H 외피를 가진 CO-core WD 의 canonical 질량-반지름 관계와 충실히 스케일링한다는 의미입니다.",
  "h2_105":"Atmosphere synthesis",
  "p_106":"40 Eri B 는 검출 가능한 금속 오염이 없는 <b>순수 수소</b> 광구를 가집니다. Bond 2017 의 Balmer-only 분광 fit 은 Tremblay &amp; Bergeron 2009 의 순수-H LTE 모델 그리드를 채택하며, 깨끗한 Balmer 프로파일이 Teff 와 log g 를 높은 정밀도로 고정합니다. Fabrika 2003 의 미약한 금속 흡수 흔적을 빼고 나면 남는 금속 잔재가 없으며, Fabrika 본인은 그 흡수선을 광구 오염이 아니라 ISM 및 dM4e 동반자 40 Eri C 로부터의 약 10⁻¹⁹ M☉/yr 추정 유입으로 흘러 들어오는 circumstellar/interstellar 가스로 귀속했습니다. 따라서 40 Eri B 는 DAZ 가 아니라 clean DA 입니다. KSP cfg 에 금속 흡수 층을 따로 둘 필요가 없습니다.",
  "p_107":"장기적인 이야기는 분광형 진화입니다. Bond 2017 §6.1 은 H 층이 너무 얇아서 (q_H ≈ 10⁻¹⁰) 별이 계속 냉각하면 더 낮은 Teff 에서 형성될 H 대류대의 바닥이 결국 아래쪽 헬륨 외피에 닿게 된다고 지적합니다. 두 층이 섞이면서 40 Eri B 는 <b>DA 에서 헬륨 대기 DC 백색왜성으로 전이</b> 합니다. 임박한 사건은 아닙니다. 40 Eri B 는 현재 17,200 K 에서 DA2.9 이며 천천히 냉각 중인데, DA → DC 혼합은 보통 6,000 K 이하 (얇은 H DA 의 경우) 에서 일어납니다. NearStars 의 canonical 시간 스케일 (인게임 연 단위) 에서 이 전이는 무의미하며, cfg 는 현재 DA2.9 상태로만 40 Eri B 를 렌더링합니다.",
  "p_108":"색채권도, 천이 영역도, 코로나도 없습니다. FGK 와 M 왜성에서 활동도를 교정하는 지표들 (log R&#x27;HK, Hα 방출, X 선 L_X 사이클) 은 복사 대기 백색왜성에 대해 물리적 의미가 없습니다. Phase 2 DB 가 해당 필드를 N/A 로 정확히 기록합니다. XUV 방출은 17,200 K 흑체의 열적 Wien 꼬리 한계까지로 제한되며, 그마저도 어떤 가상의 궤도 천체에 화학적 영향을 미칠 임계값 아래입니다. 볼로메트릭 광도 자체가 0.0135 L☉ 에 불과하기 때문입니다.",
  "h2_109":"Rotation &amp; spin synthesis",
  "p_110":"40 Eri B 의 자전은 <b>잘 제약되지 않습니다</b>. 현대 모니터링을 견디는 광도 변동성이 없습니다. spectropolarimetric Doppler 영상으로 주기를 복원해 줄 검출 가능한 Zeeman 편광도 없습니다 (Landstreet &amp; Bagnulo 2015 가 Fabrika 2003 의 변동성 주장을 가능하게 했던 kG 급 장을 사실상 반박했기 때문). 광폭화된 Balmer 프로파일에서 얻을 수 있는 sub-projected v sin i 상한은 17,200 K 에서의 압력 광폭화와 모델 축퇴를 일으킵니다. Phase 2 DB 는 40 Eri B 에 대해 <b>회전 entry 가 아예 없습니다</b>. Phase 3 합성도 그 null 을 그대로 이어받습니다.",
  "p_111":"KSP cfg 관점에서 이는 누락된 필드가 아니라 명시적 부재입니다. 보디 cfg 는 백색왜성 물리와 일관된 어떤 회전율도 고를 수 있으며, 관습적인 선택은 AGB progenitor 의 자전이 감속되어 핵에 남겨진 느린 회전 (시간 ~ 일 단위 P_rot) 입니다. 단, AGB common-envelope 또는 wind-loss 단계가 각운동량을 M 왜성 동반자 40 Eri C 로 옮겼을 가능성도 있습니다 (Bond 2017 §6.2 가 C 의 AGB-스핀업 시나리오로 Fuhrmann 2014 를 인용). NearStars 스케일의 시각 렌더링에서는 자전율이 감지되지 않습니다. 보디가 고배율에서도 점광원에 가깝게 보이기 때문입니다.",
  "p_112":"40 Eri B 는 DAV ZZ-Ceti 불안정 영역 <b>바깥</b> 에 있습니다. DA 백색왜성 의 경험적 불안정 영역은 대략 10,500 K 부터 12,500 K 사이에 있으며 (Gianninas et al. 2011 등), 17,200 K 는 청색 가장자리보다 충분히 위쪽에 위치합니다. 관측된 맥동도 없고 예상되는 맥동도 없습니다. 따라서 렌더러는 어떤 표면 밝기 진동도 애니메이션화하지 않습니다.",
  "h2_113":"Visual styling",
  "p_114":"NearStars 렌더러에서 40 Eri B 는 눈부신 <b>청백색 점광원</b> 으로 표현됩니다. canonical 태양 흰색에 대비되는 채도 높은 cyan-tinted white 를 <span class=\"hex-chip\" style=\"background:#cfd9ff\"></span><code>#cfd9ff</code> 로 인코딩했습니다. 17,200 K 에서 Planck-locus 색도는 Kelvin 스케일의 청백색 영역에 자리합니다 (Vega 의 ~9,600 K 와 가장 뜨거운 O 별의 ~30,000+ K 사이). 순수 흰색으로 렌더링하면 세 컴포넌트를 함께 프레임에 담을 때 K 왜성 40 Eri A 와 M 왜성 40 Eri C 와의 시각 구분이 사라집니다. tie-break 은 interesting-first 룰에 따라 채도가 더 강한 톤으로 기본값을 잡습니다.",
  "p_115":"5.01 pc 거리에서 본 Earth 시점 외관 등급은 V = 9.53. 가까움에도 망원경 없이 맨눈으로는 보이지 않습니다. 백색왜성의 작은 반지름 (0.013 R☉, ~1.4 R⊕) 이 볼로메트릭 출력을 0.0135 L☉ 로 제한하기 때문입니다. 보디 cfg 는 별을 물리 스케일 그대로 렌더링합니다. 1 AU 분리에서 외관 각지름은 ~25″ 입니다. Earth 에서 본 태양이 ~30′ 디스크를 차지하는 것과 비교해 한참 작은 값이라, 시스템 내 근접 fly-by 거리에서도 40 Eri B 는 해상된 구가 아니라 작고 밝은 원반으로 보입니다.",
  "p_116":"이중 짝 40 Eri C 는 평균 ~34.7 AU 분리 (Mason 2017 a = 6.93″ × 5.01 pc) 로 공전하며, 230 년 궤도에 걸쳐 근일점 ~19.8 AU (e = 0.43) 와 원일점 ~49.6 AU 사이를 움직입니다. 40 Eri B 를 도는 보디 시점에서 보면 M 왜성 40 Eri C 는 분각 분리에서 가변 밝기의 어두운 붉은 점 (DY Eri 는 flare star) 으로 보입니다. 더 멀리 있는 40 Eri A 는 ~83″ (5.01 pc 에서 ~415 AU) 떨어져 있으며, Kopernicus 궤도 시간 스케일에서 무묶임이지만 밝은 주황색 K 왜성 &quot;두 번째 태양&quot; 으로 보입니다. V = 4.43 으로, 가상의 40 Eri B 행성에서 보면 밤 하늘의 등급-1 별과 비슷한 밝기입니다.",
  "p_117":"이 삼중계는 시스템 전체 시점에서 가장 잘 음미됩니다. A 는 밝은 주황 디스크, B 는 청백색 점광원, C 는 어두운 붉은 flare star — 서로 다른 세 가지 stellar 진화 종점이 5 pc 한 화면 안에 배열돼 있습니다. Visual styling cfg 는 B 를 중성 흰색 쪽으로 섞지 말고 이 색채 삼중주를 보존해야 합니다.",
  "h2_118":"Bibliography",
  "h3_119":"Read (decision-driving)",
  "li_120":"<b>Bond H. E., Bergeron P. &amp; Bédard A. 2017</b> — <i>Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, arXiv:1709.00478, DOI 10.3847/1538-4357/aa8a63). Mason 2017 시각 궤도에 정박해 BC 페어를 HST/FGS 로 astrometry 한 결과를, 순수-H 모델 대기 Balmer-line fit 과 BVRI + ubvy + JHK + Hipparcos 시차 SED fit 과 결합. 표제 파라미터. M = 0.573 ± 0.018 M☉, R = 0.01308 ± 0.00020 R☉, Teff = 17,200 ± 110 K, log g = 7.957 ± 0.020, L = 0.01349 ± 0.00054 L☉, 중력 적색편이 27.82 ± 0.97 km/s. §6.1 얇은 H 외피 (q_H ≈ 10⁻¹⁰) + 완전 복사 대기. §6.2 IFMR 유도 progenitor M_init ≈ 1.8 M☉, pre-WD 수명 1.7 Gyr, 총 나이 1.8 Gyr. §6.3 가까운 WD 4 개에 걸친 CO-core MRR 일치 검사. §6.4 얇은 H DA 가 흔하다는 결론.",
  "li_121":"<b>Landstreet J. D. &amp; Bagnulo S. 2015</b> — <i>A novel and sensitive method for measuring very weak magnetic fields of DA white dwarfs — A search for a magnetic field at the 250 G level in 40 Eridani B</i>, A&amp;A 580, A120 (<code>2015A&amp;A...580A.120L</code>, DOI 10.1051/0004-6361/201526434). CFHT 의 ESPaDOnS 광역 원편광. 개별 ⟨Bz⟩ 측정이 σ ≈ 80–90 G 안에서 0 과 일치. 어떤 장이든 ⟨Bz⟩ ≲ 250 G 의 잠정 상한을 결론. 잡음이 &quot;백색왜성에 대해 얻은 자기장 측정 표준 오차 중 가장 작은 값&quot; 임을 명시. Fabrika 2003 의 kG 변동성 주장을 반박.",
  "li_122":"<b>Mason B. D., Hartkopf W. I. &amp; Miles K. N. 2017</b> — <i>Binary Star Orbits V. The Nearby White Dwarf — Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, arXiv:1707.03635, DOI 10.3847/1538-3881/aa803e). 2016 년 까지의 speckle interferometry 를 포함하는 시각 궤도 재유도. grade-1 definitive 해 Table 4. P = 230.09 ± 0.68 yr, T = 1847.60 ± 1.10, e = 0.4300 ± 0.0027, a = 6.9310 ± 0.0500″, i = 107.53° ± 0.29°, ω = 318.20° ± 1.10°, Ω = 151.44° ± 0.12°. 역학 질량 M_B = 0.575 ± 0.018 M☉, M_C = 0.2041 ± 0.0064 M☉ — Bond 2017 과 오차 내 일치.",
  "li_123":"<b>Gianninas A., Bergeron P. &amp; Ruiz M. T. 2011</b> — <i>A Spectroscopic Survey and Analysis of Bright, Hydrogen-Rich White Dwarfs</i>, ApJ 743, 138 (<code>2011ApJ...743..138G</code>, arXiv:1109.3171). DA 분광-온도 부분류 서베이의 결정판이며 DA1–DA9 Sion 분류를 채택. 40 Eri B (WD 0413−077) 는 이 작업에서 DA2.9 부분류를 받았고, 이 값이 2011 년 이후 Bond 2017 과 후속 문헌의 canonical 분광형이 됩니다.",
  "h3_124":"Read (context / methodology)",
  "li_125":"<b>Tremblay P.-E. &amp; Bergeron P. 2009</b> — <i>Spectroscopic Analysis of DA White Dwarfs: Stark Broadening of Hydrogen Lines Including Nonideal Effects</i>, ApJ 696, 1755 (<code>2009ApJ...696.1755T</code>). Bond 2017 이 Balmer-line Teff 및 log g fit 에 채택한 순수-H 모델 대기 그리드.",
  "li_126":"<b>Salaris M. et al. 2009</b> — <i>Semi-empirical White Dwarf Initial–Final Mass Relations: A Thorough Analysis of Systematic Uncertainties due to Stellar Evolution Models</i>, ApJ 692, 1013 (<code>2009ApJ...692.1013S</code>). Bond 2017 §6.2 가 뒤집어서 측정 M_final = 0.573 M☉ 에서 M_init ≈ 1.8 M☉ 을 복구할 때 쓴 관계 M_final = 0.134 M_init + 0.331.",
  "li_127":"<b>Fabrika S. N. et al. 2003</b> — <i>Looking for magnetic fields in white dwarfs. The B and M components of 40 Eri</i>, BSAO 55, 17 (arXiv:astro-ph/0006050). 앞선 kG 변동성 주장 (B_max ~ 4–5 kG, 후보 주기 2시간 25분 / 5시간 17분). 저자 본인은 단일 주기를 firmly 정할 수 없다고 명시. Landstreet &amp; Bagnulo 2015 의 비검출에 의해 사실상 대체됨.",
  "li_128":"<b>Tokovinin A. 2018</b> — <i>The Updated Multiple Star Catalog</i>, ApJS 235, 6 (<code>2018ApJS..235....6T</code>). 40 Eri 의 MSC entry 가 A↔BC 외곽 페어를 ~83″ 분리, ~8,000 년 근사 주기로 기록. 적합된 Kepler 해는 없습니다.",
  "h3_129":"Read (instrument-only / context)",
  "li_130":"<b>Mason B. D. et al. 2021</b> — <i>Speckle Interferometry at the US Naval Observatory. XXIV</i>, AJ 162, 53 (<code>2021AJ....162...53M</code>, DOI 10.3847/1538-3881/abfaa2). 최신 BC 궤도 fit. P = 233.20 ± 0.65 yr, e = 0.4141 ± 0.0072, a = 6.88788 ± 0.03488″. 현 Sixth Orbit Catalog 엔트리로 등재. Phase 3 cfg 는 Bond 2017 의 질량 유도와 자기 일관성을 유지하려고 Mason 2017 을 그대로 두며, 2021 업데이트는 아래 follow-up 항목에 남깁니다.",
  "li_131":"<b>Holberg J. B. et al. 2013</b> — <i>Where are all the Sirius-like binary systems?</i>, MNRAS 435, 2077 (<code>2013MNRAS.435.2077H</code>). 40 Eri BC 를 들녘 Sirius-like (FGK + WD) 시스템 집단의 맥락에 둡니다. 40 Eri B 파라미터를 새로 측정하지는 않습니다.",
  "h3_132":"Not read — no decision impact (~12 papers)",
  "p_133":"Bond 이전의 legacy 시차 / 궤도 기록 (Heintz 1974, Wegner 1974 spectroscopic redshift, McCook &amp; Sion 1999 WD catalog 분류), 40 Eri B 를 개별 측정 없이 비검출로만 포함하는 DA spectropolarimetric 서베이 (Kawka &amp; Vennes 2007, Aznar Cuadrado 2004), 그리고 Bond 2017 을 독립 측정 없이 인용한 최근 catalog / Gaia DR3 cross-match 논문들. 전체 필터링된 목록은 Phase 2 meta_notes 의 인용 사슬에서 함축적으로 잡힙니다. 어느 하나도 Decisions 표를 바꾸지 않습니다.",
  "h2_134":"Open items for follow-up",

  "li_137":"<b>ZZ Ceti 맥동 상태.</b> 40 Eri B 는 DAV 불안정 영역 (10,500–12,500 K) 의 한참 바깥 (17,200 K) 에 있으며 어떤 진동도 관측되지 않습니다. 만약 TESS 또는 CHEOPS 의 향후 장기 기준선 모니터링이 sub-mmag 광도 변동성을 검출한다면 cfg 가 낮은 진폭의 맥동 효과를 얻을 수 있겠지만, 현재 기록은 없습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
