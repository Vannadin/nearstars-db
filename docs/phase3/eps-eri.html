  "p_1":"ε Eridani (HD 22049, HIP 16537, GJ 144) is the second-nearest known planet-hosting star at 3.220 ± 0.001 pc (Gaia DR3 parallax 310.58 ± 0.14 mas), eclipsed only by Proxima. A young, magnetically active K2V dwarf with M = 0.82 ± 0.05 M☉ (Baines &amp; Armstrong 2012), R = 0.74 ± 0.01 R☉ (Baines &amp; Armstrong 2012 NOI interferometry), and Teff ≈ 5039 K, it sits ~0.32 L☉ on the main sequence with the activity signatures of a star roughly an order of magnitude younger than the Sun. The age is best estimated at ≈ 440 Myr from isochrone + kinematics + activity diagnostics (Mamajek &amp; Hillenbrand 2008; Janson 2008), placing ε Eri within the loose end of the AB Doradus / Local Association kinematic complex.",
  "p_2":"The distinguishing feature of the system is not the star but its debris architecture. ε Eri hosts a resolved triple-belt disk: an inner asteroid-belt analog at ≈ 3 AU detected by Spitzer (Backman 2009; Su 2017), an intermediate dust population near ≈ 20 AU inferred from Herschel (Greaves 2014; Booth 2017), and a cold Kuiper-analog ring at ≈ 64 AU resolved first by JCMT/SCUBA (Greaves 1998) and then at high fidelity by ALMA (MacGregor 2015; Booth 2017). The cold ring is narrow, eccentric (e ≈ 0.07), and bracketed by a total dust mass of ≈ 0.04 M⊕ — the canonical reading (Su 2017 &quot;Genie&quot; model) is that gap-clearing planets sculpt the multi-belt structure. The system also hosts the long-debated jovian ε Eri b, finally confirmed by direct imaging (Mawet 2019) and refined by an astrometric + RV combination (Llop-Sayson 2021): a true (astrometry- deprojected) mass M_b ≈ 0.66 M_Jup at i = 78.81°, a ≈ 3.5 AU, P ≈ 7.4 yr, e ≈ 0.07. A claimed outer &quot;ε Eri c&quot; (Quillen 2002; Benedict 2006) was ruled out by Mawet 2019 imaging non-detection.",

  "h2_154":"Surface synthesis",
  "p_155":"The photosphere of ε Eridani is a textbook K2V — modestly smaller and cooler than α Cen B (K1V, 5230 K, 0.86 R☉) and noticeably warmer than 61 Cyg A (K5V, 4400 K). At 5039 K, most of the continuum emerges between 5500 Å and 9000 Å, with the strongest molecular features being the MgH and CaH bands in the green and the TiO heads beginning to take a bite below ~6300 Å. The integrated luminosity 0.32 L☉ places ε Eri&#x27;s HZ at ≈ 0.48–0.93 AU — completely interior to the asteroid-belt analog and far inside the jovian at 3.5 AU. Limb darkening has not been measured directly for ε Eri; the cfg adopts a mid-K-dwarf power-law exponent α ≈ 0.20 interpolated from the Claret 2018 grid between Kervella&#x27;s α Cen B measurement (0.18) and cooler K dwarfs (0.25). This is a tie-break value within the model-grid window.",
  "p_156":"Granulation contrast is intermediate between the Sun and Proxima: modeled cell sizes ~150 km, contrast factor ~2× solar (Beeck 2013 3D MHD simulations of K-dwarf convection grids). What sets ε Eri apart from quieter K dwarfs is the spot coverage. Doppler-imaging campaigns by Roettenbacher 2016 (CHARA/MIRC) directly resolved the surface to find 5–10% spot coverage organized into two persistent polar caps plus equatorial active belts — the polar-spot dominance is characteristic of fast-rotating young K dwarfs and contrasts sharply with the Sun&#x27;s equatorial-band activity. During the ~3-year cycle maximum the spot pattern shifts toward higher amplitudes; in cycle minimum the polar caps thin but never fully disappear (Frohlich 2007 photometric decomposition).",
  "p_157":"The slightly sub-solar metallicity ([Fe/H] = −0.13) does not materially alter the SED tint — the dominant visual effect is the intrinsic orange continuum of a K2 photosphere. The cfg surface tint <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> encodes the warm K-dwarf orange, deliberately distinguished from α Cen B&#x27;s <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> to read as the somewhat cooler, more orange of the two in any side-by-side promotional render.",
  "p_158":"For an inner observer (any hypothetical rocky world in ε Eri&#x27;s HZ), the dust-shielding context matters: the inner asteroid belt at 3 AU sits well outside the HZ, so zodiacal-light contamination at the HZ planet&#x27;s location is similar to or slightly higher than the solar zodiacal background (Backman 2009 §6 quantifies the warm-dust emission as roughly 1–3× solar zodi). The cold ring at 64 AU is too faint to dominate any observer&#x27;s sky.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"ε Eri&#x27;s chromosphere and corona are the loudest of any NearStars catalog K dwarf except for the youngest M-dwarfs. The Ca II H&amp;K emission cores are conspicuously filled, with log R&#x27;HK ≈ −4.50 (Gomes da Silva 2021 AMBRE-HARPS; Henry 1996) placing ε Eri an order of magnitude more active than the modern Sun. The chromosphere drives strong UV continuum and line emission (Lyα, Mg II h&amp;k, Si IV, C IV) mapped by Linsky 1995 and France 2018 in the MUSCLES survey, where the FUV luminosity exceeds the solar value by a factor of 5–20 depending on band.",
  "p_161":"The corona is similarly active. Coffaro 2020 used 17 years of XMM monitoring to resolve a log L_X cycle ranging from 28.3 (cycle minimum) to 28.9 (cycle maximum) cgs in 0.2–2 keV — a factor-of-4 amplitude on a 2.92-year period (Coffaro 2020; Metcalfe 2013 first reported ~2.95 yr) that matches the Ca II HK cycle to within phase uncertainties. This makes ε Eri the shortest well-characterized stellar magnetic cycle in the solar neighborhood (about 4× shorter than the Sun&#x27;s 11-year cycle, again consistent with youth — the Bohm-Vitense 2007 dual-branch dynamo model places young K dwarfs on the active-branch cycle, where cycle period scales with rotation rate).",
  "p_162":"Flares occur but are not the defining feature the way they are for M dwarfs. XMM and Hubble FUV monitoring (France 2018; Coffaro 2020) catches flares of energy 10³⁰–10³² erg every few days — frequent on stellar standards, mild by M-dwarf standards. Superflares ≥ 10³⁴ erg are inferred at roughly once per year based on the extrapolated flare frequency distribution (Audard 2000 cross-K-dwarf compilation). For any HZ planet, the steady XUV background — not flares — drives the atmospheric erosion calculation: the FUV + EUV flux at 1 AU exceeds 10⁻³ L_bol, sufficient to materially erode an unmagnetized Earth-like atmosphere over the 440-Myr lifetime of the system to date, though magnetized atmospheres survive.",
  "p_163":"The strong magnetic field powers a hotter, denser stellar wind than the Sun. Wood 2002 Lyα absorption measurements place ε Eri&#x27;s mass loss rate at roughly 30× solar, with proportionally elevated CME flux for any inner planet. The wind pressure at 1 AU is closer to the heliospheric wind at 0.3 AU — relevant for any planet&#x27;s magnetospheric standoff.",
  "h2_164":"Rotation &amp; spin synthesis",
  "p_165":"The ≈ 11.45-day rotation period (Croll 2006 MOST photometry, two spots at 11.35 / 11.55 d; confirmed by Fröhlich 2007 and consistent with Donahue 1996&#x27;s Ca II HK period and Roettenbacher 2016 Doppler imaging) is fast for a main-sequence K dwarf — the Sun rotates in 25 days, α Cen B in ≈ 38 days. The Skumanich braking law P_rot ∝ √t implies ε Eri&#x27;s age is about (11.45/25)² ≈ 0.21 of the Sun&#x27;s, or ~950 Myr; the directly-fit Barnes 2007 gyrochronology gives 440 Myr (adopted by Coffaro 2020) from a slightly different braking calibration. The two differ by the factor-of-2 systematics expected for gyrochronology in this age range, and the cfg adopts the lower gyrochronology value (0.44 Gyr) with explicit ~100 Myr uncertainty — see Canonical alternatives for the young-vs-isochrone age split.",
  "p_166":"Doppler imaging by Roettenbacher 2016 directly resolved differential rotation: ε Eri&#x27;s equator rotates roughly 12% faster than its high latitudes (i.e. equator–pole shear ≈ 0.4 d), a similar fractional shear to the Sun but operating on a shorter mean period. The rotation axis inclination is well-constrained at i ≈ 30° from a joint fit to the spot pattern and the v sin i spectroscopic broadening (Roettenbacher 2016 §4) — close to the cold debris ring&#x27;s 34° inclination (Booth 2017), but NOT to the planet: Llop-Sayson 2021&#x27;s astrometric fit places ε Eri b at i = 78.81°, ~2σ away from the 34° ring plane (a coplanar 32° solution is only ~1σ allowed). So the planet is most probably misaligned with both the ring and the stellar spin axis, not coplanar with them.",
  "p_167":"Asteroseismic detection has been attempted but is marginal: Bonanno et al. 2008 reported a tentative ν_max ≈ 1700 μHz from radial- velocity monitoring, but follow-up has not been able to confirm individual mode frequencies — the high activity floor swamps the p-mode amplitudes. The cfg does not encode asteroseismic constraints for this reason.",
  "h2_168":"Canonical alternatives",
  "p_169":"<b>Age — young (gyrochronology/activity) vs isochrone.</b> The cfg adopts the young branch, <code>age_gyr = 0.44</code>, from Barnes 2007 gyrochronology (adopted by Coffaro 2020), because it is the value consistent with ε Eri&#x27;s measured high activity (log R&#x27;HK −4.50) and fast 11.45 d rotation. The Phase 2 DB flags this as a documented divergence: model isochrones place the star older — Baines &amp; Armstrong 2012 Y² ≈ 1 Gyr (the authors explicitly note this is older than other studies), Valenti &amp; Fischer 2005 ≈ 2.6 Gyr, and the Gomes da Silva 2021 isochrone fit ≈ 4.8 Gyr. Isochrone ages are unreliable for cool main-sequence dwarfs (the tracks bunch together), so the activity/gyro age is preferred for a magnetically active K dwarf; the literature range is 0.2–0.93 Gyr (Fuhrmann 2004; Song 2000). A future cfg could expose the older isochrone age as an alternate &quot;evolved&quot; scenario, but the young age is the physically motivated default.",
  "p_170":"<b>Radius/Teff — interferometry vs the earlier model values.</b> The cfg uses Baines &amp; Armstrong 2012 NOI interferometry (R 0.74, Teff 5039); the pre-Phase-2 narrative had used Rosenthal 2021 (R 0.759) and a 5180 K spectroscopic Teff. Boyajian et al. 2012 — often assumed to carry ε Eri — was verified to NOT contain it, so it is not cited.",
  "h2_171":"Visual styling",
  "p_172":"ε Eri renders as a warm orange K2V — the in-cfg tint <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> deliberately cooler-orange than the α Cen B reference <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> so side-by-side comparisons read as &quot;ε Eri is the deeper-orange one of the two K dwarfs in the nearest 4 pc&quot;. The chromospheric Hα and Ca II HK emission cores add a faint pink-warm component in high-resolution close-ups — animated to brighten by ~20% during the cycle maximum every 3 years (Metcalfe 2013), with rapid spot-induced modulation on the 11.2-day rotation period overlaid.",
  "p_173":"At 3.22 pc the apparent magnitude V = 3.74 makes ε Eri easily naked- eye from Earth — bright enough to anchor the constellation Eridanus but unspectacular. From a hypothetical inner planet in ε Eri&#x27;s HZ (say, 0.7 AU), the star fills 0.83° of angular diameter — about 50% larger than the Sun seen from Earth — and dominates the sky with its warm orange illumination.",
  "p_174":"The signature visual feature of the system is the triple-ring debris disk seen in wide-orbit fly-by views. The cold Kuiper-analog ring at 64 AU is the brightest in any inclined view: viewed from along the disk plane the narrow ring (width ~10 AU per Booth 2017) forms a discrete band, viewed from above it forms a clear annulus. The intermediate population at ~20 AU is dimmer and broader. The inner asteroid-belt analog at ~3 AU is the warmest and most optically thin; rendered as a faint warm-tinted dust scattering layer, distinct enough from the solar background to be visually identifiable as &quot;this is where the rocky planets would be if there were any&quot;. The per-belt cfg tints (<code>disk_&lt;belt&gt;_tint_rgb_hex</code>, ≈ <span class=\"hex-chip\" style=\"background:#fff4ea\"></span><code>#fff4ea</code>–<span class=\"hex-chip\" style=\"background:#fff5ef\"></span><code>#fff5ef</code>) are pale warm-cream, Confidence=low — eps Eri&#x27;s belts are resolved only in sub-mm/mm, so no optical scattered-light color exists; the Mie synthesis (disk_color_mie.py) gives a near-neutral reflectance off the silicate/icy grains, scattering the K2V starlight to pale warm-cream; the tints are synthesized from the K2V orange-white star color + grain albedo rather than measured.",
  "p_175":"ε Eri b is a Jupiter-mass jovian point of light at a ≈ 3.5 AU, embedded in the gap between the inner asteroid belt and the intermediate dust population. In wide-orbit fly-bys the planet reads as a bright dimmable point at ε Eri b&#x27;s elongation — animated through its 7.4-year orbit and modulated by its e ≈ 0.07 eccentricity. The planet&#x27;s atmosphere and detail (the Phase 3 follow-up) are out of scope here, but its position as the gap-clearing canonical sculptor of the multi-belt structure (Su 2017 Genie model) is acknowledged in the cfg via the <code>companion_jovian_present</code> decision row.",
  "p_176":"CME-driven illumination: during cycle maximum, the in-game corona brightens noticeably as a faint pinkish-warm halo, with sporadic flare events (10³⁰–10³² erg) producing brief 5–10% brightness spikes on hour timescales (France 2018 FUV monitoring scaled to optical). The visual cycle phase is encoded against the Metcalfe 2013 cycle epoch so the in-game player can correlate the activity visual with real-time progression.",
  "h2_177":"Bibliography",
  "h3_178":"Read (visual-informative, drove decisions above)",
  "li_179":"<b>Baines E. K. &amp; Armstrong J. T. 2012</b> — <i>Confirming Fundamental Properties of the Exoplanet Host Star ε Eridani Using the Navy Optical Interferometer</i>, ApJ 744, 138 (<code>2012ApJ...744..138B</code>, <a href=\"https://arxiv.org/abs/1112.0447\">arXiv:1112.0447</a>). NOI interferometry: θ_LD = 2.153 ± 0.028 mas → R = 0.74 ± 0.01 R☉, Teff = 5039 ± 126 K (θ_LD + bolometric flux), L = 0.32 ± 0.03 L☉, M = 0.82 ± 0.05 M☉ (Yonsei-Yale isochrone). Phase 2 recommended anchor for radius/Teff/luminosity/mass.",
  "li_180":"<b>Croll B. et al. 2006</b> — <i>Looking for Giant Earths in the HD 209458 System... MOST photometry of ε Eridani</i>, ApJ 648, 607 (<code>2006ApJ...648..607C</code>). MOST space photometry resolves two spots at P1 = 11.35 d, P2 = 11.55 d. Phase 2 recommended rotation period.",
  "li_181":"<b>Fröhlich H.-E. 2007</b> — <i>The differential rotation of ε Eri from MOST data</i>, AN 328, 1037 (<code>2007AN....328.1037F</code>, <a href=\"https://arxiv.org/abs/0711.0806\">arXiv:0711.0806</a>). Bayesian reanalysis confirms P1 = 11.348, P2 = 11.553 d, k ≈ 0.09.",
  "li_182":"<b>Gomes da Silva J. et al. 2021</b> — <i>Stellar chromospheric activity of 1674 FGK stars from the AMBRE-HARPS sample</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, <a href=\"https://arxiv.org/abs/2012.10199\">arXiv:2012.10199</a>). log R&#x27;HK = −4.496 from 553 spectra. Phase 2 recommended activity index.",
  "li_183":"<b>Santos N. C. et al. 2004</b> — <i>Spectroscopic metallicities for planet-host stars</i>, A&amp;A 415, 1153 (<code>2004A&amp;A...415.1153S</code>). [Fe/H] = −0.13 ± 0.04. Phase 2 recommended metallicity.",
  "li_184":"<b>Barnes S. A. 2007</b> — <i>Ages for Illustrative Field Stars Using Gyrochronology</i>, ApJ 669, 1167 (<code>2007ApJ...669.1167B</code>). Gyrochronology age ≈ 0.44 Gyr for ε Eri (adopted by Coffaro 2020); Phase 2 recommended age (young branch — see Canonical alternatives).",
  "li_185":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, <a href=\"https://arxiv.org/abs/0807.1686\">arXiv:0807.1686</a>). Combines Ca II HK + rotation + X-ray + isochrone to derive age ≈ 440 Myr for ε Eri; canonical youth attribution.",
  "li_186":"<b>Janson M. et al. 2008</b> — <i>Direct imaging detection of nearby stars including ε Eri</i> (<code>2008A&amp;A...488..771J</code>). Independent kinematic + activity-based age confirmation.",
  "li_187":"<b>Donahue R. A. et al. 1996</b> — <i>Rotation of Cool Main-Sequence Stars from the Mt. Wilson HK Project</i> (<code>1996ApJ...466..384D</code>). P_rot = 11.2 d from Ca II H&amp;K timeseries over ~14 years; consistent with (and superseded as the recommended value by) the Croll 2006 MOST two-spot period.",
  "li_188":"<b>Metcalfe T. S. et al. 2013</b> — <i>Magnetic Activity Cycles in the Exoplanet Host Star ε Eridani</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, <a href=\"https://arxiv.org/abs/1212.5343\">arXiv:1212.5343</a>). Resolves the 2.95-yr chromospheric magnetic cycle from Mt. Wilson + SMARTS Ca II HK.",
  "li_189":"<b>Coffaro M. et al. 2020</b> — <i>The active host of ε Eri: 17 years of X-ray monitoring</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, <a href=\"https://arxiv.org/abs/2003.07069\">arXiv:2003.07069</a>). XMM monitoring confirms the cycle in X-ray; log L_X ranges 28.3–28.9 cgs.",
  "li_190":"<b>Backman D. et al. 2009</b> — <i>Epsilon Eridani&#x27;s Planetary Debris Disk: Structure and Dynamics Based on Spitzer and Caltech Submillimeter Observatory Observations</i>, ApJ 690, 1522 (<code>2009ApJ...690.1522B</code>). Spitzer/IRS detects warm inner-belt emission; SED decomposition resolves a ~3 AU asteroid-belt analog.",
  "li_191":"<b>Greaves J. S. et al. 1998</b> — <i>A Dust Ring around ε Eridani: Analog to the Young Solar System</i>, ApJ 506, L133 (<code>1998ApJ...506L.133G</code>). JCMT/SCUBA first sub-mm imaging of the cold Kuiper-analog ring.",
  "li_192":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment in star-debris disc systems seen by Herschel</i> (<code>2014MNRAS.438L..31G</code>, <a href=\"https://arxiv.org/abs/1312.4087\">arXiv:1312.4087</a>). Herschel-resolved disk inclination + intermediate-belt inference.",
  "li_193":"<b>MacGregor M. A. et al. 2015</b> — <i>ALMA Observations of the Debris Disk around ε Eridani</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, <a href=\"https://arxiv.org/abs/1505.03879\">arXiv:1505.03879</a>). ALMA 1.3 mm imaging resolves the cold ring at 64.4 ± 0.5 AU with eccentricity e ≈ 0.07.",
  "li_194":"<b>Booth M. et al. 2017</b> — <i>The Northern arc of ε Eridani&#x27;s Debris Ring as seen by ALMA</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, <a href=\"https://arxiv.org/abs/1705.05868\">arXiv:1705.05868</a>). Multi-wavelength decomposition; confirms the three-belt structure; refines cold- ring geometry and inclination.",
  "li_195":"<b>Su K. Y. L. et al. 2017</b> — <i>The Inner 25 AU Debris Distribution in the ε Eri System</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, <a href=\"https://arxiv.org/abs/1703.10330\">arXiv:1703.10330</a>). The &quot;Genie&quot; multi-belt sculpting model; canonical reading for the triple-ring system + planetary perturbers.",
  "li_196":"<b>Mawet D. et al. 2019</b> — <i>Deep Exploration of ε Eridani with Keck Ms-band Vortex Coronagraphy and Radial Velocities</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, <a href=\"https://arxiv.org/abs/1810.03794\">arXiv:1810.03794</a>). Direct imaging confirmation of ε Eri b; rules out outer &quot;ε Eri c&quot;. RV lower limit M sin i = 0.72 M_Jup; with the uninformative edge-on prior M_b = 0.78 (−0.12/+0.38) M_Jup at i = 89° ± 42°; imposing a disk-coplanar Gaussian prior (i = 34° ± 2°) instead gives M_b ≈ 1.19 M_Jup. Superseded by Llop-Sayson 2021&#x27;s astrometry- tightened true mass.",
  "li_197":"<b>Llop-Sayson J. et al. 2021</b> — <i>Constraining the Orbit and Mass of ε Eridani b with Radial Velocities, Hipparcos IAD–Gaia DR2 Astrometry, and Multi-epoch Vortex Coronagraphy Upper Limits</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, <a href=\"https://arxiv.org/abs/2108.02305\">arXiv:2108.02305</a>). Joint RV + Hipparcos IAD–Gaia DR2 astrometric + direct-imaging upper-limit fit. Adopted true mass M_b = 0.66 (−0.09/+0.12) M_Jup at i = 78.81° (−22.41/+29.34); a = 3.5 AU. The astrometry favors a lower-mass, more edge-on planet, and places the orbit ~2σ off the cold ring&#x27;s 34° plane (a coplanar solution is only ~1σ allowed).",
  "li_198":"<b>Roettenbacher R. M. et al. 2022</b> — <i>No Reliable Astrometric Detection of ε Eri b</i> (<code>2022AJ....163...19R</code>, <a href=\"https://arxiv.org/abs/2110.10643\">arXiv:2110.10643</a>). Astrometric cross-check (NOT in the Phase 3 cache — unverified here; its coplanar-with-disk conclusion is not asserted as fact in this synthesis).",
  "li_199":"<b>Roettenbacher R. M. et al. 2016</b> — <i>No Sun-like Dynamo on the Active Star ζ Andromedae… and ε Eri Doppler Image</i> (<code>2016Natur.533..217R</code>). Includes ε Eri Doppler imaging with resolved polar-spot coverage.",
  "li_200":"<b>Hatzes A. P. et al. 2000</b> — <i>Evidence for a Long-Period Planet Orbiting ε Eridani</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). The RV discovery paper; sets the historical context.",
  "h3_201":"Read (context / methodology, not decision-driving)",
  "li_202":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey. I. A Catalog of 178 Planets from Precision Radial Velocity Monitoring of 719 Nearby Stars over Three Decades</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>). Source of the formerly-adopted R = 0.759 R☉ (now superseded by the Baines &amp; Armstrong 2012 interferometric R 0.74).",
  "li_203":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>Spectroscopic Properties of Cool Stars (SPOCS). I.</i> (<code>2005ApJS..159..141V</code>). [Fe/H] = −0.13 ± 0.04 from SME spectroscopy.",
  "li_204":"<b>Brewer J. M. et al. 2016</b> — <i>Spectral Properties of Cool Stars</i> (<code>2016ApJS..225...32B</code>). Spectroscopic Teff = 5180 K, [Fe/H] = −0.13 (the Teff superseded by the Baines 2012 interferometric 5039 K).",
  "li_205":"<b>Di Folco E. et al. 2007</b> — <i>CHARA/FLUOR interferometry of nearby stars including ε Eri</i> (<code>2007A&amp;A...475..243D</code>). θ_LD = 2.126 mas, the independent interferometric cross-check that corroborates Baines &amp; Armstrong 2012.",
  "li_206":"<b>Henry T. J. et al. 1996</b> — <i>The Solar Neighborhood. IV. Discovery of the Twentieth Nearest Star System</i> (<code>1996AJ....111..439H</code>). log R&#x27;HK reference for ε Eri.",
  "li_207":"<b>Zechmeister M. et al. 2013</b> — <i>The planet search programme at the ESO CES and HARPS</i> (<code>2013A&amp;A...552A..78Z</code>, <a href=\"https://arxiv.org/abs/1211.7263\">arXiv:1211.7263</a>). Updated Ca II HK index for ε Eri across modern epochs.",
  "li_208":"<b>France K. et al. 2018</b> — <i>The MUSCLES Treasury Survey</i> extension to K dwarfs (<code>2018ApJS..239...16F</code>). FUV / Lyα fluxes informing the atmospheric erosion estimate for any inner planet.",
  "li_209":"<b>Wood B. E. et al. 2002</b> — <i>Measured Mass Loss Rates of Solar- like Stars as a Function of Age and Activity</i> (<code>2002ApJ...574..412W</code>, arXiv:astro-ph/0203437). ε Eri&#x27;s mass-loss rate ~30× solar.",
  "li_210":"<b>Beeck B. et al. 2013</b> — <i>Three-dimensional simulations of near-surface convection in main-sequence stars. II.</i> (<a href=\"https://arxiv.org/abs/1308.4732\">arXiv:1308.4732</a>). K-dwarf granulation properties scaled for the cfg.",
  "li_211":"<b>Bonanno A. et al. 2008</b> — <i>Asteroseismology of ε Eridani</i> (<code>2008A&amp;A...488..685B</code>, <a href=\"https://arxiv.org/abs/0805.2580\">arXiv:0805.2580</a>). Marginal ν_max detection swamped by activity floor.",
  "li_212":"<b>Frohlich H.-E. et al. 2007</b> — <i>MOST photometry of ε Eri starspot modeling</i> (<code>2007A&amp;A...471..899F</code>). Photometric decomposition yielding 5–10% spot coverage.",
  "li_213":"<b>Croll B. et al. 2006</b> — <i>Differential Rotation of ε Eri Detected by MOST</i> (<code>2006ApJ...648..607C</code>). Independent confirmation of P_rot and differential rotation.",
  "h3_214":"Read (instrument / non-cfg-decisive)",
  "li_215":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>Structure in the ε Eridani Dusty Disk Caused by Mean Motion Resonances with a 0.3 Eccentricity Planet at 40 AU</i> (<code>2002ApJ...578L.149Q</code>). Original &quot;ε Eri c&quot; outer planet inference from disk structure; ruled out by Mawet 2019 but historically important.",
  "li_216":"<b>Benedict G. F. et al. 2006</b> — <i>The Extrasolar Planet ε Eridani b. Orbit and Mass</i> (<code>2006AJ....132.2206B</code>). Earlier HST FGS astrometric attempt on ε Eri b that has been superseded by direct imaging.",
  "li_217":"<b>Audard M. et al. 2000</b> — <i>Extreme-Ultraviolet Flare Activity in Late-Type Stars</i> (<code>2000ApJ...541..396A</code>). K-dwarf flare frequency distribution used for the superflare extrapolation.",
  "li_218":"<b>Linsky J. L. &amp; Wood B. E. 1995</b> — <i>The α Centauri line of sight and ε Eri Lyα profiles</i> (<code>1995ApJ...445L.139L</code>). FUV / Lyα baseline.",
  "h3_219":"Not read — no arXiv preprint or low-priority (~80 papers)",
  "p_220":"Conference proceedings on ε Eri activity (CS17, CS18, CS19), interstellar-medium / Strömgren-sphere studies of the ε Eri local environment, SETI / laser-emission searches (Marcy 2022, Tusay 2022, Saide 2023; ε Eri is a perennial target), late-1990s pre-Spitzer disk SED modeling, and stellar-population kinematics papers using ε Eri only as one of many tracers. The full filtered bib is preserved in <code>docs/phase3/_bib/eps-eri.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_221":"Open items for follow-up",
  "li_222":"<b>Disk geometry is multi-belt in <code>disks_curated.json</code></b> (audited 2026-05-29): eps Eri&#x27;s asteroid + intermediate + cold belts are separate <code>belt</code> entries (Backman 2009, Greaves 2014, MacGregor 2015), and the Decisions table renders them as per-belt <code>disk_&lt;belt&gt;_*</code> fields → one Kopernicus Ring each. Remaining: a grain-size / Mie color synthesis to replace the K2V-derived tie-break tints.",
  "li_223":"<b>ε Eri b planet Phase 3 follow-up</b>: the jovian companion&#x27;s atmosphere, ring-system possibility, color tint, and any moon population are out of scope for this stellar synthesis. A separate <code>docs/phase3/eps-eri-b.md</code> workspace is needed, anchored on Mawet 2019 + Llop-Sayson 2021 + Roettenbacher 2022 and the JWST followups expected 2026–2027.",
  "li_224":"<b>Historical &quot;ε Eri c&quot; debate</b>: Quillen 2002 inferred an outer ~40 AU planet from the cold-ring eccentricity, Benedict 2006 reported a candidate HST FGS astrometric signal, but Mawet 2019 direct-imaging non-detection rules out any planet &gt; 0.3 M_Jup beyond 30 AU. The Su 2017 &quot;Genie&quot; model accommodates the multi-belt structure with planets inside the cold ring instead of beyond it. Documentation interest only — no cfg row required; included here so the next session knows why the &quot;ε Eri c&quot; entry sometimes seen in legacy catalogs is excluded.",
  "li_225":"<b>Tie-break visual tints (<code>disk_tint_rgb_hex</code>, <code>limb_darkening_alpha_h</code>)</b>: both are within-window guesses. If a scattered-light visible imaging result for the ε Eri disk emerges (e.g. JWST/NIRCam coronagraph), the disk hex should be re-derived. If a K2V limb-darkening interferometric measurement becomes available (CHARA, VLTI), the α_h value should be replaced with the measured number.",
  "li_226":"<b>Cycle-phase synchronization at game epoch (J2000.0)</b>: the Metcalfe 2013 cycle and the Coffaro 2020 X-ray cycle have not been phase-locked to the in-game J2000 epoch. A future cfg revision could anchor the activity-driven visual brightening to a specific cycle phase so the player sees consistent timing across game years.",
  "h2_227":"Related",
  "li_228":"<a href=\"alpha-centauri-a.html\">alpha-centauri-a</a>, <a href=\"alpha-centauri-b.html\">alpha-centauri-b</a> — neighboring K1V comparator (B) and G2V comparator (A); ε Eri visual tint distinguished from α Cen B&#x27;s slightly warmer <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code>",
  "li_229":"<a href=\"proxima-cen.html\">proxima-cen</a> — nearest planet host; ε Eri is the second-nearest, only 0.27 pc + 1.9 pc further out",

  ko: {
  "p_1":"ε Eridani (HD 22049, HIP 16537, GJ 144) 는 Proxima 다음으로 가까운 행성 보유 별이며, 거리는 3.220 ± 0.001 pc 입니다 (Gaia DR3 시차 310.58 ± 0.14 mas). 어리고 자기 활동이 강한 K2V 왜성으로, 질량 M = 0.82 ± 0.05 M☉ (Baines &amp; Armstrong 2012), 반지름 R = 0.74 ± 0.01 R☉ (Baines &amp; Armstrong 2012 NOI 간섭계), 유효 온도 약 5039 K 입니다. 광도는 ≈ 0.32 L☉ 로 주계열 위에 자리하며, 활동도 지표는 태양보다 약 한 자릿수 더 어린 별의 특성을 보입니다. 나이는 isochrone + 운동학 + 활동도 진단을 결합해 ≈ 440 Myr 로 가장 잘 추정됩니다 (Mamajek &amp; Hillenbrand 2008. Janson 2008). ε Eri 는 AB Doradus / Local Association 운동학 복합체 의 느슨한 끝부분에 속합니다.",
  "p_2":"이 시스템에서 특별한 것은 별 자체보다 debris 배열입니다. ε Eri 는 분해된 삼중 belt 디스크를 가지고 있는데, 안쪽의 asteroid belt analog 가 ≈ 3 AU 에 있고 Spitzer 가 검출했으며 (Backman 2009. Su 2017), 중간 dust 성분이 ≈ 20 AU 부근에 Herschel 자료로부터 추정되며 (Greaves 2014. Booth 2017), 차가운 Kuiper analog 링이 ≈ 64 AU 에 있어 처음에는 JCMT/SCUBA (Greaves 1998), 이어서 ALMA 가 고정밀로 분해했습니다 (MacGregor 2015. Booth 2017). 차가운 링은 좁고 이심 (e ≈ 0.07) 하며, 전체 dust 질량은 ≈ 0.04 M⊕ 입니다. canonical 해석 (Su 2017 &quot;Genie&quot; 모델) 은 gap-clearing 행성들이 다중 belt 구조를 sculpting 한다는 것입니다. 시스템에는 오래 논쟁된 jovian ε Eri b 도 있으며, 결국 직접 촬영으로 확정되었고 (Mawet 2019) 천체 측정 + RV 조합으로 정밀화되었습니다 (Llop-Sayson 2021). 천체측정으로 역투영한 실제 질량은 M_b ≈ 0.66 M_Jup, i = 78.81°, a ≈ 3.5 AU, P ≈ 7.4 yr, e ≈ 0.07 입니다. 바깥쪽의 &quot;ε Eri c&quot; 후보 (Quillen 2002. Benedict 2006) 는 Mawet 2019 의 imaging 미검출로 배제됐습니다.",
  "p_3":"색채권은 시끄럽습니다. log R&#x27;HK ≈ −4.50 (Gomes da Silva 2021 AMBRE-HARPS, 553 스펙트럼. Henry 1996) 은 ε Eri 를 활동적 K 왜성 locus 의 한가운데 놓습니다. Croll 2006 은 MOST 광도에서 P_rot ≈ 11.45 d (흑점 두 개, 11.35 / 11.55 d) 를 측정했고 (Fröhlich 2007 확인, Donahue 1996 의 Ca II H&amp;K 주기와도 일관), 태양보다 두 배 빠르며 Skumanich braking 법칙과 ~440 Myr 나이와 일관됩니다. Coffaro 2020 은 색채권 자기 사이클을 ≈ 2.92 년으로 정밀화했고 (Metcalfe 2013 이 ~2.95 년으로 처음 보고. 주계열 기준으로 짧아 다시 한 번 어린 나이와 일관), 평행하게 X 선 사이클이 XMM 모니터링에서 검출됩니다 (Coffaro 2020).",
  "p_4":"<b>NearStars 시나리오 선택. 어리고 빠르게 자전하며 자기 활동이 매우 강한 K2V 왜성으로, 구조적으로 드문 삼중 링 debris 디스크와 확인된 ~0.66 M_Jup jovian 동반자를 3.5 AU 에 가집니다. 시각 스타일링은 주황색 K2V 연속체, 사이클 활동기의 따뜻한 corona 색조, 그리고 어떤 넓은 궤도 fly-by 에서든 시스템의 시그니처가 되는 세 개의 동심 디스크 링을 강조합니다.</b> 18 개 cfg 픽 중 15 개는 canonical 일치, 3 개는 tie-break (별 + 디스크 + jovian 점광원의 시각 hex 색조) 입니다.",

  "h2_154":"Surface synthesis",
  "p_155":"ε Eridani 의 광구는 교과서적인 K2V 입니다. α Cen B (K1V, 5230 K, 0.86 R☉) 보다 약간 더 작고 차가우며, 61 Cyg A (K5V, 4400 K) 보다는 눈에 띄게 따뜻합니다. 5039 K 에서는 연속체 대부분이 5500 Å 와 9000 Å 사이로 나오며, 가장 강한 분자 형상은 녹색에서의 MgH 와 CaH 밴드, 그리고 ~6300 Å 이하부터 본격적으로 들어오는 TiO 헤드입니다. 통합 광도 0.32 L☉ 는 ε Eri 의 HZ 를 ≈ 0.48–0.93 AU 에 놓으며, 안쪽 asteroid belt analog 보다 완전히 안쪽이고 3.5 AU 의 jovian 보다 한참 안쪽입니다. ε Eri 의 limb darkening 은 직접 측정된 적이 없으며, cfg 는 Claret 2018 그리드에서 Kervella 의 α Cen B 값 (0.18) 과 더 차가운 K 왜성 (0.25) 사이로 보간한 mid-K-dwarf power-law exponent α ≈ 0.20 를 채택합니다. 모델 그리드 윈도우 안의 tie-break 값입니다.",
  "p_156":"Granulation 대비는 태양과 Proxima 사이의 중간입니다. 모델 셀 크기 ~150 km, 대비 인자 ~2× 태양 (Beeck 2013 K 왜성 convection 3D MHD 시뮬레이션 그리드) 입니다. ε Eri 를 더 조용한 K 왜성들과 구분 짓는 것은 흑점 면적입니다. Roettenbacher 2016 의 Doppler imaging 캠페인 (CHARA/MIRC) 은 표면을 직접 분해해서 5–10% 의 흑점 면적이 두 개의 지속적 polar cap + 적도 활동 belt 로 조직돼 있음을 발견했습니다. polar-spot 우세는 빠르게 회전하는 어린 K 왜성의 특징이며, 태양의 적도 belt 활동과는 뚜렷이 대조됩니다. ~3 년 사이클 최대기 동안 흑점 패턴은 더 큰 진폭 쪽으로 이동합니다. 사이클 최소기에는 polar cap 이 얇아지지만 완전히 사라지지는 않습니다 (Frohlich 2007 광도 분해).",
  "p_157":"살짝 sub-solar 인 금속도 ([Fe/H] = −0.13) 는 SED 색조를 실질적으로 바꾸지 않습니다. 지배적 시각 효과는 K2 광구 고유의 주황색 연속체 입니다. cfg 표면 색조 <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> 는 K 왜성의 따뜻한 주황을 인코딩 하며, α Cen B 의 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 와 의도적으로 구분해 어떤 나란히 놓인 홍보 렌더에서도 두 K 왜성 중 ε Eri 가 약간 더 차갑고 더 주황인 쪽으로 읽히도록 합니다.",
  "p_158":"안쪽 관측자 (ε Eri HZ 의 가상의 암석 행성) 입장에서는 dust shielding 맥락이 중요합니다. 3 AU 의 안쪽 asteroid belt 는 HZ 바깥에 있어 HZ 행성 위치의 zodiacal light 오염은 태양 zodiacal 배경과 비슷 하거나 살짝 높습니다 (Backman 2009 §6 가 따뜻한 dust 방출을 태양 zodi 의 약 1–3× 로 정량화). 64 AU 의 차가운 링은 어떤 관측자의 하늘에서도 너무 흐려 지배적이지 않습니다.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"ε Eri 의 색채권과 corona 는 가장 어린 M 왜성들을 제외하면 NearStars 카탈로그의 어떤 K 왜성보다도 시끄럽습니다. Ca II H&amp;K 방출 코어가 눈에 띄게 채워져 있으며, log R&#x27;HK ≈ −4.50 (Gomes da Silva 2021 AMBRE-HARPS. Henry 1996) 은 ε Eri 를 현대 태양보다 한 자릿수 더 활동적인 위치에 놓습니다. 색채권은 강한 UV 연속체와 라인 방출 (Lyα, Mg II h&amp;k, Si IV, C IV) 을 구동하며 Linsky 1995 와 MUSCLES 서베이의 France 2018 이 매핑했는데, FUV 광도가 밴드에 따라 태양값을 5–20 배 초과합니다.",
  "p_161":"corona 도 마찬가지로 활동적입니다. Coffaro 2020 은 17 년 XMM 모니터링을 이용해 0.2–2 keV 에서 log L_X 사이클을 28.3 (사이클 최소) 부터 28.9 (사이클 최대) cgs 까지 분해했습니다. 2.92 년 주기에 4 배 진폭이며 (Coffaro 2020. Metcalfe 2013 이 ~2.95 년 처음 보고), Ca II HK 사이클과 위상 불확실도 내에서 일치합니다. 이로써 ε Eri 는 태양 근방에서 가장 잘 특성화된 별 자기 사이클 중 가장 짧은 사이클을 가집니다 (태양 11 년 사이클 보다 약 4 배 짧음. 다시 어린 나이와 일관. Bohm-Vitense 2007 의 이중 가지 dynamo 모델은 어린 K 왜성을 active-branch 사이클에 놓고 사이클 주기를 회전 속도에 스케일).",
  "p_162":"Flare 는 일어나지만 M 왜성에서처럼 정의적 특징은 아닙니다. XMM 과 Hubble FUV 모니터링 (France 2018. Coffaro 2020) 은 10³⁰–10³² erg 에너지의 flare 를 며칠에 한 번씩 잡습니다 (별 기준으로 빈번하지만 M 왜성 기준으로 온순함). ≥ 10³⁴ erg 의 super-flare 는 Audard 2000 의 K 왜성 종합 자료에서 외삽한 flare 빈도 분포 기준으로 연 1 회 정도로 추정됩니다. HZ 행성 입장에서 대기 침식을 좌우하는 것은 flare 가 아니라 정상 XUV 배경입니다. 1 AU 에서 FUV + EUV 플럭스가 10⁻³ L_bol 을 넘어, 현재까지 시스템 수명 440 Myr 동안 비자기화된 지구형 대기를 의미 있게 침식하기에 충분하지만, 자기화된 대기는 살아남습니다.",
  "p_163":"강한 자기장이 태양보다 더 뜨겁고 더 밀집된 항성풍을 구동합니다. Wood 2002 의 Lyα 흡수 측정은 ε Eri 의 질량 손실률을 태양의 약 30× 로 놓고, 어떤 안쪽 행성에 대해서도 CME 플럭스가 그에 비례해 높습니다. 1 AU 에서의 풍압은 0.3 AU 에서의 태양권 풍압에 가까운데, 어떤 행성 의 자기권 standoff 에도 영향을 줍니다.",
  "h2_164":"Rotation &amp; spin synthesis",
  "p_165":"≈ 11.45 일 회전 주기 (Croll 2006 MOST 광도, 흑점 두 개 11.35 / 11.55 d. Fröhlich 2007 확인, Donahue 1996 Ca II HK 주기 및 Roettenbacher 2016 Doppler imaging 과 일관) 는 주계열 K 왜성치고 빠릅니다. 태양은 25 일, α Cen B 는 ≈ 38 일에 자전합니다. Skumanich braking 법칙 P_rot ∝ √t 는 ε Eri 의 나이를 태양의 약 (11.45/25)² ≈ 0.21, 즉 ~950 Myr 로 시사합니다. 직접 fit 된 Barnes 2007 gyrochronology 는 (Coffaro 2020 채택) 살짝 다른 braking calibration 에서 440 Myr 를 줍니다. 둘은 이 나이 범위 gyrochronology 에서 예상되는 2 배 시스템 오차만큼 차이 나며, cfg 는 더 낮은 gyrochronology 값 (0.44 Gyr) 을 명시적 ~100 Myr 불확실도와 함께 채택합니다. 어린-vs-isochrone 나이 분기는 Canonical alternatives 참조.",
  "p_166":"Roettenbacher 2016 의 Doppler imaging 은 차등 회전을 직접 분해했 습니다. ε Eri 의 적도는 고위도보다 약 12% 빠르게 회전합니다 (즉 적도-극 shear ≈ 0.4 d). 태양과 비슷한 분수 shear 가 더 짧은 평균 주기에 작용하는 형태입니다. 회전축 inclination 은 Roettenbacher 2016 §4 의 흑점 패턴 + v sin i 분광 broadening 결합 fit 에서 i ≈ 30° 로 잘 제약됩니다. 차가운 debris 링의 34° inclination (Booth 2017) 과는 가깝지만, 행성과는 다릅니다. Llop-Sayson 2021 천체측정 fit 은 ε Eri b 를 i = 78.81° 에 놓아 34° 링 평면에서 ~2σ 벗어나 있습니다 (coplanar 한 32° 해는 ~1σ 만 허용). 즉 행성은 링과 별 자전축 어느 쪽과도 coplanar 가 아니라 어긋나 있을 가능성이 가장 높습니다.",
  "p_167":"Asteroseismic 검출은 시도된 적이 있지만 marginal 합니다. Bonanno et al. 2008 은 radial-velocity 모니터링에서 잠정적 ν_max ≈ 1700 μHz 를 보고했지만 후속 연구에서 개별 mode 주파수를 확정하지 못했습니다. 높은 활동 floor 가 p-mode 진폭을 가립니다. cfg 는 이 때문에 asteroseismic 제약을 인코딩하지 않습니다.",
  "h2_168":"Canonical alternatives",
  "p_169":"<b>나이 — 어린 값 (gyrochronology/활동도) vs isochrone.</b> cfg 는 어린 가지 <code>age_gyr = 0.44</code> 를 Barnes 2007 gyrochronology (Coffaro 2020 채택) 에서 채택합니다. ε Eri 의 측정된 강한 활동 (log R&#x27;HK −4.50) 과 빠른 11.45 d 회전과 일관된 값이기 때문입니다. Phase 2 DB 는 이를 documented divergence 로 표시합니다. 모델 isochrone 은 별을 더 늙게 놓습니다 — Baines &amp; Armstrong 2012 Y² ≈ 1 Gyr (저자가 다른 연구보다 늙다고 명시), Valenti &amp; Fischer 2005 ≈ 2.6 Gyr, Gomes da Silva 2021 isochrone fit ≈ 4.8 Gyr. isochrone 나이는 차가운 주계열 왜성에서 신뢰할 수 없으므로 (트랙들이 뭉칩니다) 자기 활동이 강한 K 왜성에는 활동도/gyro 나이가 선호됩니다. 문헌 범위는 0.2–0.93 Gyr 입니다 (Fuhrmann 2004. Song 2000). 향후 cfg 는 늙은 isochrone 나이를 대체 &quot;진화된&quot; 시나리오로 노출할 수 있으나, 어린 나이가 물리적으로 동기 부여된 기본값입니다.",
  "p_170":"<b>반지름/Teff — 간섭계 vs 이전 모델값.</b> cfg 는 Baines &amp; Armstrong 2012 NOI 간섭계 (R 0.74, Teff 5039) 를 씁니다. Phase 2 이전 서술은 Rosenthal 2021 (R 0.759) 과 5180 K 분광 Teff 를 썼습니다. ε Eri 를 담았다고 흔히 가정되는 Boyajian et al. 2012 는 실제로 담고 있지 않음이 확인되어 인용하지 않습니다.",
  "h2_171":"Visual styling",
  "p_172":"ε Eri 는 따뜻한 주황 K2V 로 렌더링됩니다. cfg 색조 <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> 는 α Cen B 참조 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 보다 의도적으로 더 차가운 주황이라, 나란히 놓인 비교에서 &quot;ε Eri 는 가장 가까운 4 pc 안 두 K 왜성 중 더 진한 주황&quot; 으로 읽히도록 했습니다. 색채권의 Hα 와 Ca II HK 방출 코어는 고해상도 클로즈업에서 옅은 분홍-따뜻 성분을 추가합니다. 3 년마다 사이클 최대기에 ~20% 밝아지도록 애니메이션되며 (Metcalfe 2013), 11.45 일 회전 주기 위에 빠른 흑점 변조가 겹쳐집니다.",
  "p_173":"지구에서 3.22 pc 거리에서 보면 겉보기 등급 V = 3.74 로 ε Eri 는 쉽게 맨눈으로 보입니다 (Eridanus 별자리를 잡는 정도지만 화려하지는 않음). ε Eri HZ 의 가상의 안쪽 행성 (예를 들어 0.7 AU) 에서는 별이 각지름 0.83° 를 채웁니다 (지구에서 본 태양보다 약 50% 큼). 따뜻한 주황 조명으로 하늘을 지배합니다.",
  "p_174":"시스템의 시그니처 시각 특징은 넓은 궤도 fly-by 뷰에서 보이는 삼중 링 debris 디스크입니다. 64 AU 의 차가운 Kuiper analog 링은 어떤 기울어진 뷰에서도 가장 밝습니다. 디스크 평면 방향에서 보면 좁은 링 (폭 ~10 AU. Booth 2017) 이 하나의 띠를 이루고, 위에서 보면 명확한 환을 이룹니다. ~20 AU 의 중간 성분은 더 어둡고 더 넓습니다. ~3 AU 의 안쪽 asteroid belt analog 가 가장 따뜻하고 가장 광학적으로 얇으며, 옅은 따뜻한 색조의 dust 산란 층으로 렌더링됩니다. 태양 배경과 구별되는 정도라 &quot;여기는 만약 암석 행성이 있었다면 자리잡았을 지점&quot; 으로 시각적으로 식별됩니다. belt별 cfg 색조 (<code>disk_&lt;belt&gt;_tint_rgb_hex</code>, ≈ <span class=\"hex-chip\" style=\"background:#fff4ea\"></span><code>#fff4ea</code>–<span class=\"hex-chip\" style=\"background:#fff5ef\"></span><code>#fff5ef</code>) 는 옅은 따뜻-크림색, Confidence=low 입니다. eps Eri 벨트는 sub-mm/mm 로만 분해돼 광학 산란광 색이 존재하지 않으므로, Mie 반사율 합성 (disk_color_mie.py) 이 규산염/얼음 grain 의 거의 중성인 반사율을 구해 K2V 별빛을 옅은 따뜻-크림색으로 산란시킵니다. 색조는 측정값이 아니라 K2V 주황-백색 별색 + grain albedo 에서 합성한 값입니다.",
  "p_175":"ε Eri b 는 a ≈ 3.5 AU 의 Jupiter 질량 jovian 점광원으로, 안쪽 asteroid belt 와 중간 dust 성분 사이의 갭에 박혀 있습니다. 넓은 궤도 fly-by 에서 행성은 ε Eri b 의 elongation 에서 밝게 어두워지는 점으로 읽힙니다. 7.4 년 궤도를 따라 애니메이션되며 e ≈ 0.07 이심으로 변조됩니다. 행성의 대기와 디테일 (Phase 3 후속) 은 여기서 범위 밖이지만, 다중 belt 구조의 gap-clearing canonical sculptor (Su 2017 Genie 모델) 로서의 위치는 <code>companion_jovian_present</code> 결정 행으로 cfg 에 인정됩니다.",
  "p_176":"CME 구동 조명. 사이클 최대기 동안 게임 내 corona 가 옅은 분홍-따뜻 후광으로 눈에 띄게 밝아지며, 산발적 flare 이벤트 (10³⁰–10³² erg) 가 시간 척도에서 짧은 5–10% 밝기 spike 를 만듭니다 (France 2018 FUV 모니터링을 가시광으로 스케일). 시각 사이클 위상은 Metcalfe 2013 사이클 epoch 에 맞춰 인코딩돼 있어, 플레이어가 활동 시각과 실시간 진행을 일관되게 상관 지을 수 있습니다.",
  "h2_177":"Bibliography",
  "h3_178":"Read (visual-informative, drove decisions above)",
  "li_179":"<b>Baines E. K. &amp; Armstrong J. T. 2012</b> — <i>Confirming Fundamental Properties of the Exoplanet Host Star ε Eridani Using the Navy Optical Interferometer</i>, ApJ 744, 138 (<code>2012ApJ...744..138B</code>, <a href=\"https://arxiv.org/abs/1112.0447\">arXiv:1112.0447</a>). NOI 간섭계: θ_LD = 2.153 ± 0.028 mas → R = 0.74 ± 0.01 R☉, Teff = 5039 ± 126 K (θ_LD + bolometric flux), L = 0.32 ± 0.03 L☉, M = 0.82 ± 0.05 M☉ (Yonsei-Yale isochrone). 반지름/Teff/광도/질량의 Phase 2 권장 앵커.",
  "li_180":"<b>Croll B. et al. 2006</b> — <i>MOST 으로 ε Eridani 흑점 탐색</i>, ApJ 648, 607 (<code>2006ApJ...648..607C</code>). MOST 우주 광도가 흑점 두 개를 분해 (P1 = 11.35 d, P2 = 11.55 d). Phase 2 권장 회전 주기.",
  "li_181":"<b>Fröhlich H.-E. 2007</b> — <i>MOST 자료로 본 ε Eri 의 차등 회전</i>, AN 328, 1037 (<code>2007AN....328.1037F</code>, <a href=\"https://arxiv.org/abs/0711.0806\">arXiv:0711.0806</a>). Bayesian 재분석이 P1 = 11.348, P2 = 11.553 d, k ≈ 0.09 를 확인.",
  "li_182":"<b>Gomes da Silva J. et al. 2021</b> — <i>AMBRE-HARPS 표본 1674 FGK 별의 색채권 활동도</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, <a href=\"https://arxiv.org/abs/2012.10199\">arXiv:2012.10199</a>). 553 스펙트럼에서 log R&#x27;HK = −4.496. Phase 2 권장 활동도 지수.",
  "li_183":"<b>Santos N. C. et al. 2004</b> — <i>행성 보유성의 분광 금속함량</i>, A&amp;A 415, 1153 (<code>2004A&amp;A...415.1153S</code>). [Fe/H] = −0.13 ± 0.04. Phase 2 권장 금속함량.",
  "li_184":"<b>Barnes S. A. 2007</b> — <i>Gyrochronology 를 이용한 예시 field 별 나이</i>, ApJ 669, 1167 (<code>2007ApJ...669.1167B</code>). ε Eri 의 gyrochronology 나이 ≈ 0.44 Gyr (Coffaro 2020 채택). Phase 2 권장 나이 (어린 가지 — Canonical alternatives 참조).",
  "li_185":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, <a href=\"https://arxiv.org/abs/0807.1686\">arXiv:0807.1686</a>). Ca II HK + 회전 + X 선 + isochrone 을 결합해 ε Eri 의 나이 ≈ 440 Myr 유도. canonical 어린 나이 부여.",
  "li_186":"<b>Janson M. et al. 2008</b> — <i>ε Eri 를 포함한 근방 별의 직접 촬영 검출</i> (<code>2008A&amp;A...488..771J</code>). 운동학 + 활동도 기반 나이의 독립 확인.",
  "li_187":"<b>Donahue R. A. et al. 1996</b> — <i>Mt. Wilson HK 프로젝트의 차가운 주계열 별 회전</i> (<code>1996ApJ...466..384D</code>). ~14 년 Ca II H&amp;K 시계열 에서 P_rot = 11.2 d. Croll 2006 MOST 두-흑점 주기와 일관하며 (권장값으로는 그쪽으로 대체됨).",
  "li_188":"<b>Metcalfe T. S. et al. 2013</b> — <i>외계행성 보유성 ε Eridani 의 자기 활동 사이클</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, <a href=\"https://arxiv.org/abs/1212.5343\">arXiv:1212.5343</a>). Mt. Wilson + SMARTS Ca II HK 에서 2.95 년의 색채권 자기 사이클 분해.",
  "li_189":"<b>Coffaro M. et al. 2020</b> — <i>ε Eri 의 활동 호스트. 17 년의 X 선 모니터링</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, <a href=\"https://arxiv.org/abs/2003.07069\">arXiv:2003.07069</a>). XMM 모니터링이 X 선에서 사이클 확인. log L_X 28.3–28.9 cgs.",
  "li_190":"<b>Backman D. et al. 2009</b> — <i>Epsilon Eridani 의 행성형 Debris Disk. Spitzer 와 Caltech Submillimeter Observatory 관측을 바탕으로 한 구조와 역학</i>, ApJ 690, 1522 (<code>2009ApJ...690.1522B</code>). Spitzer/IRS 가 따뜻한 안쪽 belt 방출 검출. SED 분해로 ~3 AU asteroid belt analog 가 분해됨.",
  "li_191":"<b>Greaves J. S. et al. 1998</b> — <i>ε Eridani 주위의 Dust Ring. 어린 태양계의 analog</i>, ApJ 506, L133 (<code>1998ApJ...506L.133G</code>). JCMT/SCUBA 가 차가운 Kuiper analog 링의 첫 sub-mm imaging.",
  "li_192":"<b>Greaves J. S. et al. 2014</b> — <i>Herschel 이 본 별-debris disc 시스템의 정렬</i> (<code>2014MNRAS.438L..31G</code>, <a href=\"https://arxiv.org/abs/1312.4087\">arXiv:1312.4087</a>). Herschel 분해 디스크 inclination + 중간 belt 추정.",
  "li_193":"<b>MacGregor M. A. et al. 2015</b> — <i>ε Eridani 주위 Debris Disk 의 ALMA 관측</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, <a href=\"https://arxiv.org/abs/1505.03879\">arXiv:1505.03879</a>). ALMA 1.3 mm imaging 이 차가운 링을 64.4 ± 0.5 AU 에서 분해하며 이심 e ≈ 0.07.",
  "li_194":"<b>Booth M. et al. 2017</b> — <i>ALMA 가 본 ε Eridani 의 Debris Ring 북쪽 호</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, <a href=\"https://arxiv.org/abs/1705.05868\">arXiv:1705.05868</a>). 다파장 분해. 삼중 belt 구조 확인. 차가운 링 지오메트리와 inclination 정련.",
  "li_195":"<b>Su K. Y. L. et al. 2017</b> — <i>ε Eri 시스템의 안쪽 25 AU Debris 분포</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, <a href=\"https://arxiv.org/abs/1703.10330\">arXiv:1703.10330</a>). &quot;Genie&quot; 다중 belt sculpting 모델. 삼중 링 시스템 + 행성 perturber 의 canonical 해석.",
  "li_196":"<b>Mawet D. et al. 2019</b> — <i>Deep Exploration of ε Eridani with Keck Ms-band Vortex Coronagraphy and Radial Velocities</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, <a href=\"https://arxiv.org/abs/1810.03794\">arXiv:1810.03794</a>). ε Eri b 직접 촬영 확정. 바깥쪽 &quot;ε Eri c&quot; 배제. RV 하한 M sin i = 0.72 M_Jup. 정보 없는 edge-on 사전분포로는 M_b = 0.78 (−0.12/+0.38) M_Jup, i = 89° ± 42°. 디스크 coplanar Gaussian 사전분포 (i = 34° ± 2°) 를 넣으면 대신 M_b ≈ 1.19 M_Jup. Llop-Sayson 2021 의 천체측정 정련 실제 질량으로 대체됨.",
  "li_197":"<b>Llop-Sayson J. et al. 2021</b> — <i>Constraining the Orbit and Mass of ε Eridani b with Radial Velocities, Hipparcos IAD–Gaia DR2 Astrometry, and Multi-epoch Vortex Coronagraphy Upper Limits</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, <a href=\"https://arxiv.org/abs/2108.02305\">arXiv:2108.02305</a>). RV + Hipparcos IAD–Gaia DR2 천체측정 + 직접 촬영 상한 결합 fit. 채택 실제 질량 M_b = 0.66 (−0.09/+0.12) M_Jup, i = 78.81° (−22.41/+29.34), a = 3.5 AU. 천체측정은 더 낮은 질량과 더 edge-on 인 행성을 선호하며, 궤도를 차가운 링의 34° 평면에서 ~2σ 벗어난 곳에 놓습니다 (coplanar 해는 ~1σ 만 허용).",
  "li_198":"<b>Roettenbacher R. M. et al. 2022</b> — <i>No Reliable Astrometric Detection of ε Eri b</i> (<code>2022AJ....163...19R</code>, <a href=\"https://arxiv.org/abs/2110.10643\">arXiv:2110.10643</a>). 천체측정 교차 확인 (Phase 3 캐시에 없음. 여기서는 unverified. 디스크와의 coplanar 결론은 이 합성에서 사실로 단정하지 않음).",
  "li_199":"<b>Roettenbacher R. M. et al. 2016</b> — <i>활동성 별 ζ Andromedae 의 태양형 dynamo 부재… 와 ε Eri Doppler Image</i> (<code>2016Natur.533..217R</code>). 분해된 polar-spot 면적이 있는 ε Eri Doppler imaging 포함.",
  "li_200":"<b>Hatzes A. P. et al. 2000</b> — <i>ε Eridani 주위 장주기 행성의 증거</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). RV 발견 논문. 역사적 맥락 설정.",
  "h3_201":"Read (context / methodology, not decision-driving)",
  "li_202":"<b>Rosenthal L. J. et al. 2021</b> — <i>California Legacy Survey. I. 근방 별 719 개의 정밀 RV 모니터링에서 도출한 행성 178 개 카탈로그</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>). 과거 채택값 R = 0.759 R☉ 의 출처 (현재 Baines &amp; Armstrong 2012 간섭계 R 0.74 로 대체됨).",
  "li_203":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>차가운 별의 분광 속성 (SPOCS). I.</i> (<code>2005ApJS..159..141V</code>). SME 분광에서 [Fe/H] = −0.13 ± 0.04.",
  "li_204":"<b>Brewer J. M. et al. 2016</b> — <i>차가운 별의 분광 속성</i> (<code>2016ApJS..225...32B</code>). 분광 Teff = 5180 K, [Fe/H] = −0.13 (Teff 는 Baines 2012 간섭계 5039 K 로 대체됨).",
  "li_205":"<b>Di Folco E. et al. 2007</b> — <i>ε Eri 를 포함한 근방 별의 CHARA/FLUOR 간섭계</i> (<code>2007A&amp;A...475..243D</code>). θ_LD = 2.126 mas, Baines &amp; Armstrong 2012 를 보강하는 독립 간섭계 교차 확인.",
  "li_206":"<b>Henry T. J. et al. 1996</b> — <i>Solar Neighborhood. IV. 스무 번째로 가까운 별 시스템 발견</i> (<code>1996AJ....111..439H</code>). ε Eri 의 log R&#x27;HK 참조.",
  "li_207":"<b>Zechmeister M. et al. 2013</b> — <i>ESO CES 와 HARPS 의 행성 탐색 프로그램</i> (<code>2013A&amp;A...552A..78Z</code>, <a href=\"https://arxiv.org/abs/1211.7263\">arXiv:1211.7263</a>). 현대 epoch 에서 ε Eri 의 Ca II HK 인덱스 갱신.",
  "li_208":"<b>France K. et al. 2018</b> — <i>MUSCLES Treasury Survey</i> 의 K 왜성 확장 (<code>2018ApJS..239...16F</code>). 안쪽 행성의 대기 침식 추정에 정보 를 주는 FUV / Lyα 플럭스.",
  "li_209":"<b>Wood B. E. et al. 2002</b> — <i>나이와 활동도의 함수로 측정한 태양형 별의 질량 손실률</i> (<code>2002ApJ...574..412W</code>, arXiv:astro-ph/0203437). ε Eri 의 질량 손실률 ~30× 태양.",
  "li_210":"<b>Beeck B. et al. 2013</b> — <i>주계열 별의 근표면 convection 3D 시뮬레이션. II.</i> (<a href=\"https://arxiv.org/abs/1308.4732\">arXiv:1308.4732</a>). cfg 용으로 스케일된 K 왜성 granulation 속성.",
  "li_211":"<b>Bonanno A. et al. 2008</b> — <i>ε Eridani 의 Asteroseismology</i> (<code>2008A&amp;A...488..685B</code>, <a href=\"https://arxiv.org/abs/0805.2580\">arXiv:0805.2580</a>). 활동 floor 에 잠긴 marginal ν_max 검출.",
  "li_212":"<b>Frohlich H.-E. et al. 2007</b> — <i>ε Eri 흑점 모델링의 MOST 광도</i> (<code>2007A&amp;A...471..899F</code>). 5–10% 흑점 면적을 주는 광도 분해.",
  "li_213":"<b>Croll B. et al. 2006</b> — <i>MOST 가 검출한 ε Eri 의 차등 회전</i> (<code>2006ApJ...648..607C</code>). P_rot 와 차등 회전의 독립 확인.",
  "h3_214":"Read (instrument / non-cfg-decisive)",
  "li_215":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>40 AU 의 이심 0.3 행성과 의 평균 운동 공명이 야기한 ε Eridani Dusty Disk 의 구조</i> (<code>2002ApJ...578L.149Q</code>). 디스크 구조에서 추정한 원래의 &quot;ε Eri c&quot; 바깥 행성. Mawet 2019 가 배제했지만 역사적으로 중요.",
  "li_216":"<b>Benedict G. F. et al. 2006</b> — <i>외계 행성 ε Eridani b. 궤도와 질량</i> (<code>2006AJ....132.2206B</code>). ε Eri b 에 대한 이전 HST FGS 천체 측정 시도. 직접 촬영이 대체.",
  "li_217":"<b>Audard M. et al. 2000</b> — <i>늦은 형 별의 극자외 Flare 활동</i> (<code>2000ApJ...541..396A</code>). super-flare 외삽에 사용된 K 왜성 flare 빈도 분포.",
  "li_218":"<b>Linsky J. L. &amp; Wood B. E. 1995</b> — <i>α Centauri 시선과 ε Eri 의 Lyα 프로파일</i> (<code>1995ApJ...445L.139L</code>). FUV / Lyα 기준선.",
  "h3_219":"Not read — no arXiv preprint or low-priority (~80 papers)",
  "p_220":"ε Eri 활동에 관한 학회 proceedings (CS17, CS18, CS19), ε Eri 국소 환경의 성간 매질 / Strömgren-sphere 연구, SETI / 레이저 방출 탐색 (Marcy 2022, Tusay 2022, Saide 2023. ε Eri 는 영원한 타깃), 1990 년대 후반 pre-Spitzer 디스크 SED 모델링, 그리고 ε Eri 를 여러 tracer 중 하나로만 사용한 별 종족 운동학 논문 등. 전체 필터된 bib 는 <code>docs/phase3/_bib/eps-eri.yaml</code> 에 <code>status: skipped</code> 주석으로 보존됩니다.",
  "h2_221":"Open items for follow-up",
  "li_222":"<b>disk 지오메트리가 <code>disks_curated.json</code> 에 multi-belt 로 기록됨</b> (2026-05-29 감사). eps Eri 의 asteroid + intermediate + cold 벨트가 별도 <code>belt</code> 항목 (Backman 2009, Greaves 2014, MacGregor 2015) 이며, Decisions 표가 belt별 <code>disk_&lt;belt&gt;_*</code> 필드로 렌더 → belt당 Kopernicus Ring 하나씩. 남은 것은 K2V 별색 기반 tie-break tint 를 대체할 grain-size / Mie 색 합성.",
  "li_223":"<b>ε Eri b 행성 Phase 3 후속.</b> jovian 동반자의 대기, 링 시스템 가능성, 색조, 그리고 위성 population 은 이 별 합성의 범위 밖입니다. Mawet 2019 + Llop-Sayson 2021 + Roettenbacher 2022 와 2026–2027 로 예상되는 JWST follow-up 에 닻을 둔 별도의 <code>docs/phase3/eps-eri-b.md</code> 워크스페이스가 필요합니다.",
  "li_224":"<b>역사적 &quot;ε Eri c&quot; 논쟁.</b> Quillen 2002 는 차가운 링의 이심에서 ~40 AU 바깥 행성을 추정했고, Benedict 2006 은 HST FGS 천체측정 신호 후보를 보고했지만, Mawet 2019 의 직접 촬영 미검출이 30 AU 너머의 &gt; 0.3 M_Jup 행성을 배제합니다. Su 2017 의 &quot;Genie&quot; 모델은 다중 belt 구조를 바깥이 아니라 차가운 링 안쪽의 행성들로 설명합니다. 문서적 관심만 있으며 cfg 행은 불필요. 다음 세션이 legacy 카탈로그에 가끔 보이는 &quot;ε Eri c&quot; 항목이 왜 제외되는지 알 수 있도록 여기 포함합니다.",
  "li_225":"<b>Tie-break 시각 색조 (<code>disk_tint_rgb_hex</code>, <code>limb_darkening_alpha_h</code>).</b> 둘 다 윈도우 내 추측입니다. ε Eri 디스크의 산란광 가시광 imaging 결과가 나오면 (예를 들어 JWST/NIRCam coronagraph), 디스크 hex 는 재유도되어야 합니다. K2V limb-darkening 간섭계 측정이 가능해지면 (CHARA, VLTI), α_h 값은 측정값으로 교체되어야 합니다.",
  "li_226":"<b>게임 epoch (J2000.0) 의 사이클 위상 동기화.</b> Metcalfe 2013 사이클과 Coffaro 2020 X 선 사이클은 게임 내 J2000 epoch 에 위상 동기화돼 있지 않습니다. 미래 cfg 개정에서 활동 구동 시각 밝기 변화를 특정 사이클 위상에 닻을 두면, 플레이어가 게임 연수에 걸쳐 일관된 타이밍을 볼 수 있습니다.",
  "h2_227":"Related",
  "li_228":"<a href=\"alpha-centauri-a.html\">alpha-centauri-a</a>, <a href=\"alpha-centauri-b.html\">alpha-centauri-b</a> — 이웃 K1V 비교군 (B) 과 G2V 비교군 (A). ε Eri 의 시각 색조는 α Cen B 의 약간 더 따뜻한 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 과 구분됨.",
  "li_229":"<a href=\"proxima-cen.html\">proxima-cen</a> — 가장 가까운 행성 호스트. ε Eri 는 두 번째로 가까우며, Proxima 보다 0.27 pc + 1.9 pc 더 멀리 있습니다.",
  "li_230":"<a href=\"../wiki/reference__binary-epoch-pipeline.html\">binary-epoch-pipeline</a> — 단일 별 천체측정만 해당. ε Eri 는 이중성 궤도 propagation 이 필요 없습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
