  "h2_122":"Surface synthesis",
  "p_123":"The photosphere of ε Eridani is a textbook K2V — modestly smaller and cooler than α Cen B (K1V, 5230 K, 0.86 R☉) and noticeably warmer than 61 Cyg A (K5V, 4400 K). At 5039 K (Baines &amp; Armstrong 2012 interferometric), most of the continuum emerges between 5500 Å and 9000 Å, with the strongest molecular features being the MgH and CaH bands in the green and the TiO heads beginning to take a bite below ~6300 Å. The integrated luminosity 0.320 ± 0.011 L☉ places ε Eri&#x27;s HZ at ≈ 0.50–0.92 AU — completely interior to the asteroid-belt analog and far inside the jovian at 3.5 AU. Limb darkening has not been measured directly for ε Eri; the cfg adopts a mid-K-dwarf power-law exponent α ≈ 0.20 interpolated from the Claret 2018 grid between Kervella&#x27;s α Cen B measurement (0.18) and cooler K dwarfs (0.25). This is a tie-break value within the model-grid window.",
  "p_124":"Granulation contrast is intermediate between the Sun and Proxima: modeled cell sizes ~150 km, contrast factor ~2× solar (Beeck 2013 3D MHD simulations of K-dwarf convection grids). What sets ε Eri apart from quieter K dwarfs is the spot coverage. Doppler-imaging campaigns by Roettenbacher 2016 (CHARA/MIRC) directly resolved the surface to find 5–10% spot coverage organized into two persistent polar caps plus equatorial active belts — the polar-spot dominance is characteristic of fast-rotating young K dwarfs and contrasts sharply with the Sun&#x27;s equatorial-band activity. During the ~3-year cycle maximum the spot pattern shifts toward higher amplitudes; in cycle minimum the polar caps thin but never fully disappear (Frohlich 2007 photometric decomposition).",
  "p_125":"The slightly sub-solar metallicity ([Fe/H] = −0.13) does not materially alter the SED tint — the dominant visual effect is the intrinsic orange continuum of a K2 photosphere. The cfg surface tint <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> encodes the warm K-dwarf orange, deliberately distinguished from α Cen B&#x27;s <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> to read as the somewhat cooler, more orange of the two in any side-by-side promotional render.",
  "p_126":"For an inner observer (any hypothetical rocky world in ε Eri&#x27;s HZ), the dust-shielding context matters: the inner asteroid belt at 3 AU sits well outside the HZ, so zodiacal-light contamination at the HZ planet&#x27;s location is similar to or slightly higher than the solar zodiacal background (Backman 2009 §6 quantifies the warm-dust emission as roughly 1–3× solar zodi). The cold ring at 64 AU is too faint to dominate any observer&#x27;s sky.",
  "h2_127":"Atmosphere synthesis",
  "p_128":"ε Eri&#x27;s chromosphere and corona are the loudest of any NearStars catalog K dwarf except for the youngest M-dwarfs. The Ca II H&amp;K emission cores are conspicuously filled, with log R&#x27;HK ≈ −4.4 (Henry 1996; updated by Zechmeister 2013) placing ε Eri an order of magnitude more active than the modern Sun. The chromosphere drives strong UV continuum and line emission (Lyα, Mg II h&amp;k, Si IV, C IV) mapped by Linsky 1995 and France 2018 in the MUSCLES survey, where the FUV luminosity exceeds the solar value by a factor of 5–20 depending on band.",
  "p_129":"The corona is similarly active. Coffaro 2020 used 17 years of XMM monitoring to resolve a log L_X cycle ranging from 28.3 (cycle minimum) to 28.9 (cycle maximum) cgs in 0.2–2 keV — a factor-of-4 amplitude on a 2.95-year period that matches the Metcalfe 2013 Ca II HK cycle to within phase uncertainties. This makes ε Eri the shortest well-characterized stellar magnetic cycle in the solar neighborhood (about 4× shorter than the Sun&#x27;s 11-year cycle, again consistent with youth — the Bohm-Vitense 2007 dual-branch dynamo model places young K dwarfs on the active-branch cycle, where cycle period scales with rotation rate).",
  "p_130":"Flares occur but are not the defining feature the way they are for M dwarfs. XMM and Hubble FUV monitoring (France 2018; Coffaro 2020) catches flares of energy 10³⁰–10³² erg every few days — frequent on stellar standards, mild by M-dwarf standards. Superflares ≥ 10³⁴ erg are inferred at roughly once per year based on the extrapolated flare frequency distribution (Audard 2000 cross-K-dwarf compilation). For any HZ planet, the steady XUV background — not flares — drives the atmospheric erosion calculation: the FUV + EUV flux at 1 AU exceeds 10⁻³ L_bol, sufficient to materially erode an unmagnetized Earth-like atmosphere over the 440-Myr lifetime of the system to date, though magnetized atmospheres survive.",
  "p_131":"The strong magnetic field powers a hotter, denser stellar wind than the Sun. Wood 2002 Lyα absorption measurements place ε Eri&#x27;s mass loss rate at roughly 30× solar, with proportionally elevated CME flux for any inner planet. The wind pressure at 1 AU is closer to the heliospheric wind at 0.3 AU — relevant for any planet&#x27;s magnetospheric standoff.",
  "h2_132":"Rotation &amp; spin synthesis",
  "p_133":"The 11.2-day rotation period (Donahue 1996, confirmed by Croll 2006 MOST photometry and Roettenbacher 2016 Doppler imaging) is fast for a main-sequence K dwarf — the Sun rotates in 25 days, α Cen B in ≈ 38 days. The Skumanich braking law P_rot ∝ √t implies ε Eri&#x27;s age is about (11.2/25)² ≈ 0.20 of the Sun&#x27;s, or ~900 Myr; the directly-fit Mamajek &amp; Hillenbrand 2008 gyrochronology gives 440 Myr from a slightly different braking calibration. Both numbers agree to within the factor-of-2 systematics expected for gyrochronology in this age range, and the cfg adopts the lower Mamajek value with explicit ~100 Myr uncertainty.",
  "p_134":"Doppler imaging by Roettenbacher 2016 directly resolved differential rotation: ε Eri&#x27;s equator rotates roughly 12% faster than its high latitudes (i.e. equator–pole shear ≈ 0.4 d), a similar fractional shear to the Sun but operating on a shorter mean period. The rotation axis inclination is well-constrained at i ≈ 30° from a joint fit to the spot pattern and the v sin i spectroscopic broadening (Roettenbacher 2016 §4) — coincidentally similar to the disk inclination (34°) and the inferred ε Eri b orbital inclination from astrometry (Roettenbacher 2022), suggesting a coplanar system.",
  "p_135":"Asteroseismic detection has been attempted but is marginal: Bonanno et al. 2008 reported a tentative ν_max ≈ 1700 μHz from radial- velocity monitoring, but follow-up has not been able to confirm individual mode frequencies — the high activity floor swamps the p-mode amplitudes. The cfg does not encode asteroseismic constraints for this reason.",
  "h2_136":"Visual styling",
  "p_137":"ε Eri renders as a warm orange K2V — the in-cfg tint <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> deliberately cooler-orange than the α Cen B reference <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> so side-by-side comparisons read as &quot;ε Eri is the deeper-orange one of the two K dwarfs in the nearest 4 pc&quot;. The chromospheric Hα and Ca II HK emission cores add a faint pink-warm component in high-resolution close-ups — animated to brighten by ~20% during the cycle maximum every 3 years (Metcalfe 2013), with rapid spot-induced modulation on the 11.2-day rotation period overlaid.",
  "p_138":"At 3.22 pc the apparent magnitude V = 3.74 makes ε Eri easily naked- eye from Earth — bright enough to anchor the constellation Eridanus but unspectacular. From a hypothetical inner planet in ε Eri&#x27;s HZ (say, 0.7 AU), the star fills 0.83° of angular diameter — about 50% larger than the Sun seen from Earth — and dominates the sky with its warm orange illumination.",
  "p_139":"The signature visual feature of the system is the triple-ring debris disk seen in wide-orbit fly-by views. The cold Kuiper-analog ring at 64 AU is the brightest in any inclined view: viewed from along the disk plane the narrow ring (width ~10 AU per Booth 2017) forms a discrete band, viewed from above it forms a clear annulus. The intermediate population at ~20 AU is dimmer and broader. The inner asteroid-belt analog at ~3 AU is the warmest and most optically thin; rendered as a faint warm-tinted dust scattering layer, distinct enough from the solar background to be visually identifiable as &quot;this is where the rocky planets would be if there were any&quot;. The cfg tint <code>disk_tint_rgb_hex = #bd8c5e</code> is a within-window tie-break — ALMA continuum carries no visible information, so the scattered-light tint defaults to a warm brown- orange consistent with old, processed silicate-rich dust.",
  "p_140":"ε Eri b is a Jupiter-mass jovian point of light at a ≈ 3.5 AU, embedded in the gap between the inner asteroid belt and the intermediate dust population. In wide-orbit fly-bys the planet reads as a bright dimmable point at ε Eri b&#x27;s elongation — animated through its 7.4-year orbit and modulated by its e ≈ 0.07 eccentricity. The planet&#x27;s atmosphere and detail (the Phase 3 follow-up) are out of scope here, but its position as the gap-clearing canonical sculptor of the multi-belt structure (Su 2017 Genie model) is acknowledged in the cfg via the <code>companion_jovian_present</code> decision row.",
  "p_141":"CME-driven illumination: during cycle maximum, the in-game corona brightens noticeably as a faint pinkish-warm halo, with sporadic flare events (10³⁰–10³² erg) producing brief 5–10% brightness spikes on hour timescales (France 2018 FUV monitoring scaled to optical). The visual cycle phase is encoded against the Metcalfe 2013 cycle epoch so the in-game player can correlate the activity visual with real-time progression.",
  "h2_142":"Bibliography",
  "h3_143":"Read (visual-informative, drove decisions above)",
  "li_144":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Combines Ca II HK + rotation + X-ray + isochrone to derive age ≈ 440 Myr for ε Eri; canonical youth attribution.",
  "li_145":"<b>Janson M. et al. 2008</b> — <i>Direct imaging detection of nearby stars including ε Eri</i> (<code>2008A&amp;A...488..771J</code>). Independent kinematic + activity-based age confirmation.",
  "li_146":"<b>Donahue R. A. et al. 1996</b> — <i>Rotation of Cool Main-Sequence Stars from the Mt. Wilson HK Project</i> (<code>1996ApJ...466..384D</code>). P_rot = 11.2 d from Ca II H&amp;K timeseries over ~14 years; the canonical rotation measurement.",
  "li_147":"<b>Metcalfe T. S. et al. 2013</b> — <i>Magnetic Activity Cycles in the Exoplanet Host Star ε Eridani</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, arXiv:1212.5343). Resolves the 2.95-yr chromospheric magnetic cycle from Mt. Wilson + SMARTS Ca II HK.",
  "li_148":"<b>Coffaro M. et al. 2020</b> — <i>The active host of ε Eri: 17 years of X-ray monitoring</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, arXiv:2003.07069). XMM monitoring confirms the cycle in X-ray; log L_X ranges 28.3–28.9 cgs.",
  "li_149":"<b>Backman D. et al. 2009</b> — <i>Epsilon Eridani&#x27;s Planetary Debris Disk: Structure and Dynamics Based on Spitzer and Caltech Submillimeter Observatory Observations</i>, ApJ 690, 1522 (<code>2009ApJ...690.1522B</code>). Spitzer/IRS detects warm inner-belt emission; SED decomposition resolves a ~3 AU asteroid-belt analog.",
  "li_150":"<b>Greaves J. S. et al. 1998</b> — <i>A Dust Ring around ε Eridani: Analog to the Young Solar System</i>, ApJ 506, L133 (<code>1998ApJ...506L.133G</code>). JCMT/SCUBA first sub-mm imaging of the cold Kuiper-analog ring.",
  "li_151":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment in star-debris disc systems seen by Herschel</i> (<code>2014MNRAS.438L..31G</code>, arXiv:1312.4087). Herschel-resolved disk inclination + intermediate-belt inference.",
  "li_152":"<b>MacGregor M. A. et al. 2015</b> — <i>ALMA Observations of the Debris Disk around ε Eridani</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, arXiv:1505.03879). ALMA 1.3 mm imaging resolves the cold ring at 64.4 ± 0.5 AU with eccentricity e ≈ 0.07.",
  "li_153":"<b>Booth M. et al. 2017</b> — <i>The Northern arc of ε Eridani&#x27;s Debris Ring as seen by ALMA</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, arXiv:1705.05868). Multi-wavelength decomposition; confirms the three-belt structure; refines cold- ring geometry and inclination.",
  "li_154":"<b>Su K. Y. L. et al. 2017</b> — <i>The Inner 25 AU Debris Distribution in the ε Eri System</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, arXiv:1703.10330). The &quot;Genie&quot; multi-belt sculpting model; canonical reading for the triple-ring system + planetary perturbers.",
  "li_155":"<b>Mawet D. et al. 2019</b> — <i>Deep Exploration of ε Eridani with Keck Ms-band Vortex Coronagraphy and Radial Velocities</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, arXiv:1810.03794). Direct imaging confirmation of ε Eri b; rules out outer &quot;ε Eri c&quot;.",
  "li_156":"<b>Llop-Sayson J. et al. 2021</b> — <i>Constraints on the Nature of ε Eri b from a Combined Analysis of Radial Velocities and Astrometry</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, arXiv:2108.05552). Joint RV + Hipparcos/Gaia astrometric fit; M_b = 0.78 M_Jup at i = 78.8°; a = 3.5 AU.",
  "li_157":"<b>Roettenbacher R. M. et al. 2022</b> — <i>No Reliable Astrometric Detection of ε Eri b</i> (<code>2022AJ....163...19R</code>, arXiv:2110.10643). Astrometric cross-check; provides ε Eri b inclination consistent with the disk plane.",
  "li_158":"<b>Roettenbacher R. M. et al. 2016</b> — <i>No Sun-like Dynamo on the Active Star ζ Andromedae… and ε Eri Doppler Image</i> (<code>2016Natur.533..217R</code>). Includes ε Eri Doppler imaging with resolved polar-spot coverage.",
  "li_159":"<b>Hatzes A. P. et al. 2000</b> — <i>Evidence for a Long-Period Planet Orbiting ε Eridani</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). The RV discovery paper; sets the historical context.",
  "li_160":"<b>Baines E. K. &amp; Armstrong J. T. 2012</b> — <i>Confirming Fundamental Properties of the Exoplanet Host Star ε Eridani Using the Navy Optical Interferometer and PAVO/CHARA</i>, ApJ 761, 57 (<code>2012ApJ...761...57B</code>, doi:10.1088/0004-637X/761/1/57). PAVO@CHARA limb-darkened angular diameter θ_LD = 2.126 ± 0.014 mas; combined with Hipparcos parallax gives R = 0.735 ± 0.005 R☉, and via L_bol + θ_LD Stefan-Boltzmann inversion T_eff = 5039 ± 126 K, L = 0.320 ± 0.011 L☉. <b>Primary Phase 2 anchor for ε Eri R / Teff / L</b> (most-direct method, all three derived self-consistently); supersedes the older Rosenthal 2021 SED-fit R = 0.759 R☉ picks used in an earlier draft of this synthesis.",
  "li_161":"<b>Donahue R. A., Saar S. H., Baliunas S. L. 1996</b> — <i>A Relationship between Mean Rotation Period in Lower Main-Sequence Stars and Its Observed Range</i>, ApJ 466, 384 (<code>1996ApJ...466..384D</code>, doi:10.1086/177517). Mt. Wilson Ca II HK Project ~14-yr timeseries gives P_rot = 11.20 ± 0.05 d for ε Eri. <b>Primary Phase 2 anchor for ε Eri rotation period.</b>",
  "h3_162":"Read (context / methodology, not decision-driving)",
  "li_163":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey. I. A Catalog of 178 Planets from Precision Radial Velocity Monitoring of 719 Nearby Stars over Three Decades</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>, doi:10.3847/1538-4365/abe23c). CLS table R = 0.759 ± 0.012 R☉ from SED fitting + Gaia parallax — ~3% higher than the modern Baines 2012 PAVO/CHARA direct interferometric pick; kept as a cross-check alternate.",
  "li_164":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>Spectroscopic Properties of Cool Stars (SPOCS). I.</i> (<code>2005ApJS..159..141V</code>, doi:10.1086/430500). SME spectroscopic Teff = 5146 ± 44 K, [Fe/H] = −0.13 ± 0.04 — primary [Fe/H] anchor, Teff cross-check.",
  "li_165":"<b>Brewer J. M. et al. 2016</b> — <i>Spectral Properties of Cool Stars</i> (<code>2016ApJS..225...32B</code>, doi:10.3847/0067-0049/225/2/32). SME Teff = 5076 ± 25 K, [Fe/H] = −0.10 ± 0.03 — independent spectroscopic cross-check, brackets VF05 within combined uncertainty.",
  "li_166":"<b>Tsantaki M. et al. 2013</b> — <i>Deriving precise parameters for cool solar-type stars: optimizing the iron line list</i> (<code>2013A&amp;A...555A.150T</code>, doi:10.1051/0004-6361/201321103). High-res Teff = 5077 ± 31 K, [Fe/H] = −0.09 ± 0.03 — homogeneous-pipeline spectroscopic cross-check.",
  "li_167":"<b>Takeda Y. et al. 2007</b> — <i>Structure and evolution of nearby stars with planets. II.</i> (<code>2007ApJS..168..297T</code>, doi:10.1086/509763). Evolutionary-model mass 0.83 ± 0.04 M☉ for ε Eri; cross-check on Llop-Sayson 2021 joint-fit mass.",
  "li_168":"<b>Barnes S. A. 2007</b> — <i>Ages for Illustrative Field Stars Using Gyrochronology</i> (<code>2007ApJ...669.1167B</code>, doi:10.1086/519295). Gyrochronology age 0.82 ± 0.05 Gyr for ε Eri from P_rot = 11.2 d alone — older than the Mamajek &amp; Hillenbrand 2008 activity-rotation joint fit (0.44 Gyr), illustrating the factor-of-2 systematics between gyrochrone calibrations at this age.",
  "li_169":"<b>Di Folco E. et al. 2007</b> — <i>VLTI/VINCI interferometry of nearby stars including ε Eri</i> (<code>2007A&amp;A...475..243D</code>, doi:10.1051/0004-6361:20065445). VLTI/VINCI θ_LD = 2.148 ± 0.029 mas → R = 0.74 ± 0.01 R☉ — independent interferometric cross-check on the Baines 2012 PAVO/CHARA primary pick.",
  "li_170":"<b>Henry T. J. et al. 1996</b> — <i>The Solar Neighborhood. IV. Discovery of the Twentieth Nearest Star System</i> (<code>1996AJ....111..439H</code>). log R&#x27;HK reference for ε Eri.",
  "li_171":"<b>Zechmeister M. et al. 2013</b> — <i>The planet search programme at the ESO CES and HARPS</i> (<code>2013A&amp;A...552A..78Z</code>, arXiv:1211.7263). Updated Ca II HK index for ε Eri across modern epochs.",
  "li_172":"<b>France K. et al. 2018</b> — <i>The MUSCLES Treasury Survey</i> extension to K dwarfs (<code>2018ApJS..239...16F</code>). FUV / Lyα fluxes informing the atmospheric erosion estimate for any inner planet.",
  "li_173":"<b>Wood B. E. et al. 2002</b> — <i>Measured Mass Loss Rates of Solar- like Stars as a Function of Age and Activity</i> (<code>2002ApJ...574..412W</code>, arXiv:astro-ph/0203437). ε Eri&#x27;s mass-loss rate ~30× solar.",
  "li_174":"<b>Beeck B. et al. 2013</b> — <i>Three-dimensional simulations of near-surface convection in main-sequence stars. II.</i> (arXiv:1308.4732). K-dwarf granulation properties scaled for the cfg.",
  "li_175":"<b>Bonanno A. et al. 2008</b> — <i>Asteroseismology of ε Eridani</i> (<code>2008A&amp;A...488..685B</code>, arXiv:0805.2580). Marginal ν_max detection swamped by activity floor.",
  "li_176":"<b>Frohlich H.-E. et al. 2007</b> — <i>MOST photometry of ε Eri starspot modeling</i> (<code>2007A&amp;A...471..899F</code>). Photometric decomposition yielding 5–10% spot coverage.",
  "li_177":"<b>Croll B. et al. 2006</b> — <i>Differential Rotation of ε Eri Detected by MOST</i> (<code>2006ApJ...648..607C</code>). Independent confirmation of P_rot and differential rotation.",
  "h3_178":"Read (instrument / non-cfg-decisive)",
  "li_179":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>Structure in the ε Eridani Dusty Disk Caused by Mean Motion Resonances with a 0.3 Eccentricity Planet at 40 AU</i> (<code>2002ApJ...578L.149Q</code>). Original &quot;ε Eri c&quot; outer planet inference from disk structure; ruled out by Mawet 2019 but historically important.",
  "li_180":"<b>Benedict G. F. et al. 2006</b> — <i>The Extrasolar Planet ε Eridani b. Orbit and Mass</i> (<code>2006AJ....132.2206B</code>). Earlier HST FGS astrometric attempt on ε Eri b that has been superseded by direct imaging.",
  "li_181":"<b>Audard M. et al. 2000</b> — <i>Extreme-Ultraviolet Flare Activity in Late-Type Stars</i> (<code>2000ApJ...541..396A</code>). K-dwarf flare frequency distribution used for the superflare extrapolation.",
  "li_182":"<b>Linsky J. L. &amp; Wood B. E. 1995</b> — <i>The α Centauri line of sight and ε Eri Lyα profiles</i> (<code>1995ApJ...445L.139L</code>). FUV / Lyα baseline.",
  "h3_183":"Not read — no arXiv preprint or low-priority (~80 papers)",
  "p_184":"Conference proceedings on ε Eri activity (CS17, CS18, CS19), interstellar-medium / Strömgren-sphere studies of the ε Eri local environment, SETI / laser-emission searches (Marcy 2022, Tusay 2022, Saide 2023; ε Eri is a perennial target), late-1990s pre-Spitzer disk SED modeling, and stellar-population kinematics papers using ε Eri only as one of many tracers. The full filtered bib is preserved in <code>docs/phase3/_bib/eps-eri.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_185":"Open items for follow-up",
  "li_186":"<b>Phase 2 <code>disk_measurements</code> ingest</b>: the DB schema currently has no <code>disk_measurements</code> array, so this synthesis cites Backman 2009, MacGregor 2015, and Booth 2017 directly from the literature rather than through Phase 2. When the DB schema is extended (or when a <code>db/disks/</code> companion is introduced), the three-belt geometry should be ingested as <code>disk_measurements</code> records with <code>recommended</code> flags matching the cfg picks above (<code>disk_inner_radius_au=3</code>, <code>disk_outer_radius_au=64</code>, <code>disk_morphology=&quot;three-belt&quot;</code>).",
  "li_187":"<b>ε Eri b planet Phase 3 follow-up</b>: the jovian companion&#x27;s atmosphere, ring-system possibility, color tint, and any moon population are out of scope for this stellar synthesis. A separate <code>docs/phase3/eps-eri-b.md</code> workspace is needed, anchored on Mawet 2019 + Llop-Sayson 2021 + Roettenbacher 2022 and the JWST followups expected 2026–2027.",
  "li_188":"<b>Historical &quot;ε Eri c&quot; debate</b>: Quillen 2002 inferred an outer ~40 AU planet from the cold-ring eccentricity, Benedict 2006 reported a candidate HST FGS astrometric signal, but Mawet 2019 direct-imaging non-detection rules out any planet &gt; 0.3 M_Jup beyond 30 AU. The Su 2017 &quot;Genie&quot; model accommodates the multi-belt structure with planets inside the cold ring instead of beyond it. Documentation interest only — no cfg row required; included here so the next session knows why the &quot;ε Eri c&quot; entry sometimes seen in legacy catalogs is excluded.",
  "li_189":"<b>Tie-break visual tints (<code>disk_tint_rgb_hex</code>, <code>limb_darkening_alpha_h</code>)</b>: both are within-window guesses. If a scattered-light visible imaging result for the ε Eri disk emerges (e.g. JWST/NIRCam coronagraph), the disk hex should be re-derived. If a K2V limb-darkening interferometric measurement becomes available (CHARA, VLTI), the α_h value should be replaced with the measured number.",
  "li_190":"<b>Cycle-phase synchronization at game epoch (J2000.0)</b>: the Metcalfe 2013 cycle and the Coffaro 2020 X-ray cycle have not been phase-locked to the in-game J2000 epoch. A future cfg revision could anchor the activity-driven visual brightening to a specific cycle phase so the player sees consistent timing across game years.",
  "h2_191":"Related",
  "li_192":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a>, <a href=\"alpha-centauri-b.md\">alpha-centauri-b</a> — neighboring K1V comparator (B) and G2V comparator (A); ε Eri visual tint distinguished from α Cen B&#x27;s slightly warmer <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code>",

  ko: {
  "p_1":"ε Eridani (HD 22049, HIP 16537, GJ 144) 는 Proxima 다음으로 가까운 행성 보유 별이며, 거리는 3.220 ± 0.001 pc 입니다 (Gaia DR3 시차 310.58 ± 0.14 mas). 어리고 자기 활동이 강한 K2V 왜성으로, 질량 M = 0.82 ± 0.02 M☉ (Llop-Sayson 2021), 반지름 R = 0.735 ± 0.005 R☉ (Baines &amp; Armstrong 2012 PAVO/CHARA 한계 어두워짐 각지름), 유효 온도 T_eff = 5039 ± 126 K (Baines 2012 간섭계. L_bol + θ_LD Stefan- Boltzmann 역산) 입니다. 광도는 0.320 ± 0.011 L☉ 로 주계열 위에 자리하며, 활동도 지표는 태양보다 약 한 자릿수 더 어린 별의 특성을 보입니다. 나이는 isochrone + 운동학 + 활동도 진단을 결합해 ≈ 440 Myr 로 가장 잘 추정됩니다 (Mamajek &amp; Hillenbrand 2008. Janson 2008). ε Eri 는 AB Doradus / Local Association 운동학 복합체의 느슨한 끝 부분에 속합니다.",
  "p_2":"이 시스템에서 특별한 것은 별 자체보다 debris 배열입니다. ε Eri 는 분해된 삼중 belt 디스크를 가지고 있는데, 안쪽의 asteroid belt analog 가 ≈ 3 AU 에 있고 Spitzer 가 검출했으며 (Backman 2009. Su 2017), 중간 dust 성분이 ≈ 20 AU 부근에 Herschel 자료로부터 추정되며 (Greaves 2014. Booth 2017), 차가운 Kuiper analog 링이 ≈ 64 AU 에 있어 처음에는 JCMT/SCUBA (Greaves 1998), 이어서 ALMA 가 고정밀로 분해했습니다 (MacGregor 2015. Booth 2017). 차가운 링은 좁고 이심 (e ≈ 0.07) 하며, 전체 dust 질량은 ≈ 0.04 M⊕ 입니다. canonical 해석 (Su 2017 &quot;Genie&quot; 모델) 은 gap-clearing 행성들이 다중 belt 구조를 sculpting 한다는 것입니다. 시스템에는 오래 논쟁된 jovian ε Eri b 도 있으며, 결국 직접 촬영으로 확정되었고 (Mawet 2019) 천체 측정 + RV 조합으로 정밀화되었습니다 (Llop-Sayson 2021. Roettenbacher 2022). M sin i ≈ 0.78 M_Jup, a ≈ 3.5 AU, P ≈ 7.4 yr, e ≈ 0.07. 바깥쪽의 &quot;ε Eri c&quot; 후보 (Quillen 2002. Benedict 2006) 는 Mawet 2019 의 imaging 미검출로 배제됐습니다.",
  "p_3":"색채권은 시끄럽습니다. log R&#x27;HK ≈ −4.4 (Henry 1996. Zechmeister 2013) 는 ε Eri 를 활동적 K 왜성 locus 의 한가운데 놓습니다. Donahue 1996 은 Mt. Wilson Ca II H&amp;K 시계열에서 P_rot = 11.2 d 를 측정했는데, 태양보다 두 배 빠르며 Skumanich braking 법칙과 ~440 Myr 나이와 일관됩니다. Metcalfe 2013 은 Ca II HK 기록에서 약 2.95 년의 색채권 자기 사이클을 분해했고 (주계열 기준으로 짧음. 다시 한 번 어린 나이와 일관), 평행하게 X 선 사이클이 XMM 모니터링에서 검출됩니다 (Coffaro 2020).",
  "p_4":"<b>NearStars 시나리오 선택. 어리고 빠르게 자전하며 자기 활동이 매우 강한 K2V 왜성으로, 구조적으로 드문 삼중 링 debris 디스크와 확인된 ~0.78 M_Jup jovian 동반자를 3.5 AU 에 가집니다. 시각 스타일링은 주황색 K2V 연속체, 사이클 활동기의 따뜻한 corona 색조, 그리고 어떤 넓은 궤도 fly-by 에서든 시스템의 시그니처가 되는 세 개의 동심 디스크 링을 강조합니다.</b> 18 개 cfg 픽 중 15 개는 canonical 일치, 3 개는 tie-break (별 + 디스크 + jovian 점광원의 시각 hex 색조) 입니다.",

  "h2_122":"Surface synthesis",
  "p_123":"ε Eridani 의 광구는 교과서적인 K2V 입니다. α Cen B (K1V, 5230 K, 0.86 R☉) 보다 약간 더 작고 차가우며, 61 Cyg A (K5V, 4400 K) 보다는 눈에 띄게 따뜻합니다. 5039 K (Baines &amp; Armstrong 2012 간섭계) 에서 연속체 대부분이 5500 Å 와 9000 Å 사이로 나오며, 가장 강한 분자 형상은 녹색에서의 MgH 와 CaH 밴드, 그리고 ~6300 Å 이하부터 본격적으로 들어오는 TiO 헤드입니다. 통합 광도 0.320 ± 0.011 L☉ 는 ε Eri 의 HZ 를 ≈ 0.50–0.92 AU 에 놓으며, 안쪽 asteroid belt analog 보다 완전히 안쪽이고 3.5 AU 의 jovian 보다 한참 안쪽입니다. ε Eri 의 limb darkening 은 직접 측정된 적이 없으며, cfg 는 Claret 2018 그리드에서 Kervella 의 α Cen B 값 (0.18) 과 더 차가운 K 왜성 (0.25) 사이로 보간한 mid-K-dwarf power-law exponent α ≈ 0.20 를 채택합니다. 모델 그리드 윈도우 안의 tie-break 값입니다.",
  "p_124":"Granulation 대비는 태양과 Proxima 사이의 중간입니다. 모델 셀 크기 ~150 km, 대비 인자 ~2× 태양 (Beeck 2013 K 왜성 convection 3D MHD 시뮬레이션 그리드) 입니다. ε Eri 를 더 조용한 K 왜성들과 구분 짓는 것은 흑점 면적입니다. Roettenbacher 2016 의 Doppler imaging 캠페인 (CHARA/MIRC) 은 표면을 직접 분해해서 5–10% 의 흑점 면적이 두 개의 지속적 polar cap + 적도 활동 belt 로 조직돼 있음을 발견했습니다. polar-spot 우세는 빠르게 회전하는 어린 K 왜성의 특징이며, 태양의 적도 belt 활동과는 뚜렷이 대조됩니다. ~3 년 사이클 최대기 동안 흑점 패턴은 더 큰 진폭 쪽으로 이동합니다. 사이클 최소기에는 polar cap 이 얇아지지만 완전히 사라지지는 않습니다 (Frohlich 2007 광도 분해).",
  "p_125":"살짝 sub-solar 인 금속도 ([Fe/H] = −0.13) 는 SED 색조를 실질적으로 바꾸지 않습니다. 지배적 시각 효과는 K2 광구 고유의 주황색 연속체 입니다. cfg 표면 색조 <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> 는 K 왜성의 따뜻한 주황을 인코딩 하며, α Cen B 의 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 와 의도적으로 구분해 어떤 나란히 놓인 홍보 렌더에서도 두 K 왜성 중 ε Eri 가 약간 더 차갑고 더 주황인 쪽으로 읽히도록 합니다.",
  "p_126":"안쪽 관측자 (ε Eri HZ 의 가상의 암석 행성) 입장에서는 dust shielding 맥락이 중요합니다. 3 AU 의 안쪽 asteroid belt 는 HZ 바깥에 있어 HZ 행성 위치의 zodiacal light 오염은 태양 zodiacal 배경과 비슷 하거나 살짝 높습니다 (Backman 2009 §6 가 따뜻한 dust 방출을 태양 zodi 의 약 1–3× 로 정량화). 64 AU 의 차가운 링은 어떤 관측자의 하늘에서도 너무 흐려 지배적이지 않습니다.",
  "h2_127":"Atmosphere synthesis",
  "p_128":"ε Eri 의 색채권과 corona 는 가장 어린 M 왜성들을 제외하면 NearStars 카탈로그의 어떤 K 왜성보다도 시끄럽습니다. Ca II H&amp;K 방출 코어가 눈에 띄게 채워져 있으며, log R&#x27;HK ≈ −4.4 (Henry 1996. Zechmeister 2013 갱신) 는 ε Eri 를 현대 태양보다 한 자릿수 더 활동적인 위치에 놓습니다. 색채권은 강한 UV 연속체와 라인 방출 (Lyα, Mg II h&amp;k, Si IV, C IV) 을 구동하며 Linsky 1995 와 MUSCLES 서베이의 France 2018 이 매핑했는데, FUV 광도가 밴드에 따라 태양값을 5–20 배 초과합니다.",
  "p_129":"corona 도 마찬가지로 활동적입니다. Coffaro 2020 은 17 년 XMM 모니터링을 이용해 0.2–2 keV 에서 log L_X 사이클을 28.3 (사이클 최소) 부터 28.9 (사이클 최대) cgs 까지 분해했습니다. 2.95 년 주기에 4 배 진폭이며, Metcalfe 2013 의 Ca II HK 사이클과 위상 불확실도 내에서 일치합니다. 이로써 ε Eri 는 태양 근방에서 가장 잘 특성화된 별 자기 사이클 중 가장 짧은 사이클을 가집니다 (태양 11 년 사이클 보다 약 4 배 짧음. 다시 어린 나이와 일관. Bohm-Vitense 2007 의 이중 가지 dynamo 모델은 어린 K 왜성을 active-branch 사이클에 놓고 사이클 주기를 회전 속도에 스케일).",
  "p_130":"Flare 는 일어나지만 M 왜성에서처럼 정의적 특징은 아닙니다. XMM 과 Hubble FUV 모니터링 (France 2018. Coffaro 2020) 은 10³⁰–10³² erg 에너지의 flare 를 며칠에 한 번씩 잡습니다 (별 기준으로 빈번하지만 M 왜성 기준으로 온순함). ≥ 10³⁴ erg 의 super-flare 는 Audard 2000 의 K 왜성 종합 자료에서 외삽한 flare 빈도 분포 기준으로 연 1 회 정도로 추정됩니다. HZ 행성 입장에서 대기 침식을 좌우하는 것은 flare 가 아니라 정상 XUV 배경입니다. 1 AU 에서 FUV + EUV 플럭스가 10⁻³ L_bol 을 넘어, 현재까지 시스템 수명 440 Myr 동안 비자기화된 지구형 대기를 의미 있게 침식하기에 충분하지만, 자기화된 대기는 살아남습니다.",
  "p_131":"강한 자기장이 태양보다 더 뜨겁고 더 밀집된 항성풍을 구동합니다. Wood 2002 의 Lyα 흡수 측정은 ε Eri 의 질량 손실률을 태양의 약 30× 로 놓고, 어떤 안쪽 행성에 대해서도 CME 플럭스가 그에 비례해 높습니다. 1 AU 에서의 풍압은 0.3 AU 에서의 태양권 풍압에 가까운데, 어떤 행성 의 자기권 standoff 에도 영향을 줍니다.",
  "h2_132":"Rotation &amp; spin synthesis",
  "p_133":"11.2 일 회전 주기 (Donahue 1996. Croll 2006 MOST 광도와 Roettenbacher 2016 Doppler imaging 으로 확인) 는 주계열 K 왜성치고 빠릅니다. 태양은 25 일, α Cen B 는 ≈ 38 일에 자전합니다. Skumanich braking 법칙 P_rot ∝ √t 는 ε Eri 의 나이를 태양의 약 (11.2/25)² ≈ 0.20, 즉 ~900 Myr 로 시사합니다. 직접 fit 된 Mamajek &amp; Hillenbrand 2008 gyrochronology 는 살짝 다른 braking calibration 에서 440 Myr 를 줍니다. 둘 다 이 나이 범위 gyrochronology 에서 예상되는 2 배 시스템 오차 안에서 일치하며, cfg 는 더 낮은 Mamajek 값을 명시적 ~100 Myr 불확실도와 함께 채택합니다.",
  "p_134":"Roettenbacher 2016 의 Doppler imaging 은 차등 회전을 직접 분해했 습니다. ε Eri 의 적도는 고위도보다 약 12% 빠르게 회전합니다 (즉 적도-극 shear ≈ 0.4 d). 태양과 비슷한 분수 shear 가 더 짧은 평균 주기에 작용하는 형태입니다. 회전축 inclination 은 Roettenbacher 2016 §4 의 흑점 패턴 + v sin i 분광 broadening 결합 fit 에서 i ≈ 30° 로 잘 제약됩니다. 우연히도 디스크 inclination (34°) 과 천체측정에서 추정된 ε Eri b 궤도 inclination (Roettenbacher 2022) 와도 비슷한 값이라, 시스템이 coplanar 임을 시사합니다.",
  "p_135":"Asteroseismic 검출은 시도된 적이 있지만 marginal 합니다. Bonanno et al. 2008 은 radial-velocity 모니터링에서 잠정적 ν_max ≈ 1700 μHz 를 보고했지만 후속 연구에서 개별 mode 주파수를 확정하지 못했습니다. 높은 활동 floor 가 p-mode 진폭을 가립니다. cfg 는 이 때문에 asteroseismic 제약을 인코딩하지 않습니다.",
  "h2_136":"Visual styling",
  "p_137":"ε Eri 는 따뜻한 주황 K2V 로 렌더링됩니다. cfg 색조 <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> 는 α Cen B 참조 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 보다 의도적으로 더 차가운 주황이라, 나란히 놓인 비교에서 &quot;ε Eri 는 가장 가까운 4 pc 안 두 K 왜성 중 더 진한 주황&quot; 으로 읽히도록 했습니다. 색채권의 Hα 와 Ca II HK 방출 코어는 고해상도 클로즈업에서 옅은 분홍-따뜻 성분을 추가합니다. 3 년마다 사이클 최대기에 ~20% 밝아지도록 애니메이션되며 (Metcalfe 2013), 11.2 일 회전 주기 위에 빠른 흑점 변조가 겹쳐집니다.",
  "p_138":"지구에서 3.22 pc 거리에서 보면 겉보기 등급 V = 3.74 로 ε Eri 는 쉽게 맨눈으로 보입니다 (Eridanus 별자리를 잡는 정도지만 화려하지는 않음). ε Eri HZ 의 가상의 안쪽 행성 (예를 들어 0.7 AU) 에서는 별이 각지름 0.83° 를 채웁니다 (지구에서 본 태양보다 약 50% 큼). 따뜻한 주황 조명으로 하늘을 지배합니다.",
  "p_139":"시스템의 시그니처 시각 특징은 넓은 궤도 fly-by 뷰에서 보이는 삼중 링 debris 디스크입니다. 64 AU 의 차가운 Kuiper analog 링은 어떤 기울어진 뷰에서도 가장 밝습니다. 디스크 평면 방향에서 보면 좁은 링 (폭 ~10 AU. Booth 2017) 이 하나의 띠를 이루고, 위에서 보면 명확한 환을 이룹니다. ~20 AU 의 중간 성분은 더 어둡고 더 넓습니다. ~3 AU 의 안쪽 asteroid belt analog 가 가장 따뜻하고 가장 광학적으로 얇으며, 옅은 따뜻한 색조의 dust 산란 층으로 렌더링됩니다. 태양 배경과 구별되는 정도라 &quot;여기는 만약 암석 행성이 있었다면 자리잡았을 지점&quot; 으로 시각적으로 식별됩니다. cfg 색조 <code>disk_tint_rgb_hex = #bd8c5e</code> 는 윈도우 내 tie-break 입니다. ALMA 연속체는 정의상 가시광 정보가 없으므로 산란광 색조는 오래되고 가공된 silicate-rich dust 와 일관된 따뜻한 갈색-주황으로 기본 설정됐습니다.",
  "p_140":"ε Eri b 는 a ≈ 3.5 AU 의 Jupiter 질량 jovian 점광원으로, 안쪽 asteroid belt 와 중간 dust 성분 사이의 갭에 박혀 있습니다. 넓은 궤도 fly-by 에서 행성은 ε Eri b 의 elongation 에서 밝게 어두워지는 점으로 읽힙니다. 7.4 년 궤도를 따라 애니메이션되며 e ≈ 0.07 이심으로 변조됩니다. 행성의 대기와 디테일 (Phase 3 후속) 은 여기서 범위 밖이지만, 다중 belt 구조의 gap-clearing canonical sculptor (Su 2017 Genie 모델) 로서의 위치는 <code>companion_jovian_present</code> 결정 행으로 cfg 에 인정됩니다.",
  "p_141":"CME 구동 조명. 사이클 최대기 동안 게임 내 corona 가 옅은 분홍-따뜻 후광으로 눈에 띄게 밝아지며, 산발적 flare 이벤트 (10³⁰–10³² erg) 가 시간 척도에서 짧은 5–10% 밝기 spike 를 만듭니다 (France 2018 FUV 모니터링을 가시광으로 스케일). 시각 사이클 위상은 Metcalfe 2013 사이클 epoch 에 맞춰 인코딩돼 있어, 플레이어가 활동 시각과 실시간 진행을 일관되게 상관 지을 수 있습니다.",
  "h2_142":"Bibliography",
  "h3_143":"Read (visual-informative, drove decisions above)",
  "li_144":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Ca II HK + 회전 + X 선 + isochrone 을 결합해 ε Eri 의 나이 ≈ 440 Myr 유도. canonical 어린 나이 부여.",
  "li_145":"<b>Janson M. et al. 2008</b> — <i>ε Eri 를 포함한 근방 별의 직접 촬영 검출</i> (<code>2008A&amp;A...488..771J</code>). 운동학 + 활동도 기반 나이의 독립 확인.",
  "li_146":"<b>Donahue R. A. et al. 1996</b> — <i>Mt. Wilson HK 프로젝트의 차가운 주계열 별 회전</i> (<code>1996ApJ...466..384D</code>). ~14 년 Ca II H&amp;K 시계열 에서 P_rot = 11.2 d. canonical 회전 측정.",
  "li_147":"<b>Metcalfe T. S. et al. 2013</b> — <i>외계행성 보유성 ε Eridani 의 자기 활동 사이클</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, arXiv:1212.5343). Mt. Wilson + SMARTS Ca II HK 에서 2.95 년의 색채권 자기 사이클 분해.",
  "li_148":"<b>Coffaro M. et al. 2020</b> — <i>ε Eri 의 활동 호스트. 17 년의 X 선 모니터링</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, arXiv:2003.07069). XMM 모니터링이 X 선에서 사이클 확인. log L_X 28.3–28.9 cgs.",
  "li_149":"<b>Backman D. et al. 2009</b> — <i>Epsilon Eridani 의 행성형 Debris Disk. Spitzer 와 Caltech Submillimeter Observatory 관측을 바탕으로 한 구조와 역학</i>, ApJ 690, 1522 (<code>2009ApJ...690.1522B</code>). Spitzer/IRS 가 따뜻한 안쪽 belt 방출 검출. SED 분해로 ~3 AU asteroid belt analog 가 분해됨.",
  "li_150":"<b>Greaves J. S. et al. 1998</b> — <i>ε Eridani 주위의 Dust Ring. 어린 태양계의 analog</i>, ApJ 506, L133 (<code>1998ApJ...506L.133G</code>). JCMT/SCUBA 가 차가운 Kuiper analog 링의 첫 sub-mm imaging.",
  "li_151":"<b>Greaves J. S. et al. 2014</b> — <i>Herschel 이 본 별-debris disc 시스템의 정렬</i> (<code>2014MNRAS.438L..31G</code>, arXiv:1312.4087). Herschel 분해 디스크 inclination + 중간 belt 추정.",
  "li_152":"<b>MacGregor M. A. et al. 2015</b> — <i>ε Eridani 주위 Debris Disk 의 ALMA 관측</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, arXiv:1505.03879). ALMA 1.3 mm imaging 이 차가운 링을 64.4 ± 0.5 AU 에서 분해하며 이심 e ≈ 0.07.",
  "li_153":"<b>Booth M. et al. 2017</b> — <i>ALMA 가 본 ε Eridani 의 Debris Ring 북쪽 호</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, arXiv:1705.05868). 다파장 분해. 삼중 belt 구조 확인. 차가운 링 지오메트리와 inclination 정련.",
  "li_154":"<b>Su K. Y. L. et al. 2017</b> — <i>ε Eri 시스템의 안쪽 25 AU Debris 분포</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, arXiv:1703.10330). &quot;Genie&quot; 다중 belt sculpting 모델. 삼중 링 시스템 + 행성 perturber 의 canonical 해석.",
  "li_155":"<b>Mawet D. et al. 2019</b> — <i>Keck Ms-band Vortex Coronagraphy 와 Radial Velocities 를 이용한 ε Eridani 의 심층 탐사</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, arXiv:1810.03794). ε Eri b 직접 촬영 확정. 바깥쪽 &quot;ε Eri c&quot; 배제.",
  "li_156":"<b>Llop-Sayson J. et al. 2021</b> — <i>Radial Velocities 와 Astrometry 의 결합 분석에서 도출한 ε Eri b 의 본질에 대한 제약</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, arXiv:2108.05552). RV + Hipparcos/Gaia 천체측정 결합 fit. M_b = 0.78 M_Jup, i = 78.8°, a = 3.5 AU.",
  "li_157":"<b>Roettenbacher R. M. et al. 2022</b> — <i>ε Eri b 의 신뢰할 만한 천체 측정 검출 없음</i> (<code>2022AJ....163...19R</code>, arXiv:2110.10643). 천체 측정 교차 확인. ε Eri b 의 inclination 이 디스크 평면과 일관.",
  "li_158":"<b>Roettenbacher R. M. et al. 2016</b> — <i>활동성 별 ζ Andromedae 의 태양형 dynamo 부재… 와 ε Eri Doppler Image</i> (<code>2016Natur.533..217R</code>). 분해된 polar-spot 면적이 있는 ε Eri Doppler imaging 포함.",
  "li_159":"<b>Hatzes A. P. et al. 2000</b> — <i>ε Eridani 주위 장주기 행성의 증거</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). RV 발견 논문. 역사적 맥락 설정.",
  "li_160":"<b>Baines E. K. &amp; Armstrong J. T. 2012</b> — <i>Navy Optical Interferometer 와 PAVO/CHARA 를 이용한 외계행성 호스트 별 ε Eridani 의 기본 속성 확인</i>, ApJ 761, 57 (<code>2012ApJ...761...57B</code>, doi:10.1088/0004-637X/761/1/57). PAVO@CHARA 한계 어두워짐 각지름 θ_LD = 2.126 ± 0.014 mas. Hipparcos 시차와 결합하면 R = 0.735 ± 0.005 R☉. L_bol + θ_LD Stefan-Boltzmann 역산으로 T_eff = 5039 ± 126 K, L = 0.320 ± 0.011 L☉. <b>ε Eri 의 R / Teff / L 1차 Phase 2 앵커</b> (가장 직접적인 방법. 세 양을 동일 fit 으로 자기일관적으로 유도). 이전 합성 초안의 Rosenthal 2021 SED fit R = 0.759 R☉ 픽을 대체.",
  "li_161":"<b>Donahue R. A., Saar S. H., Baliunas S. L. 1996</b> — <i>낮은 주계열 별의 평균 회전 주기와 관측된 범위 간의 관계</i>, ApJ 466, 384 (<code>1996ApJ...466..384D</code>, doi:10.1086/177517). Mt. Wilson Ca II HK Project ~14 년 시계열에서 ε Eri 의 P_rot = 11.20 ± 0.05 d. <b>ε Eri 회전 주기의 1차 Phase 2 앵커.</b>",
  "h3_162":"Read (context / methodology, not decision-driving)",
  "li_163":"<b>Rosenthal L. J. et al. 2021</b> — <i>California Legacy Survey. I. 근방 별 719 개의 정밀 RV 모니터링에서 도출한 행성 178 개 카탈로그</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>, doi:10.3847/1538-4365/abe23c). SED fit + Gaia 시차에서 CLS 표 R = 0.759 ± 0.012 R☉ — 현대 Baines 2012 PAVO/CHARA 직접 간섭계 픽보다 ~3% 높음. cross-check 대체값 으로 보존.",
  "li_164":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>차가운 별의 분광 속성 (SPOCS). I.</i> (<code>2005ApJS..159..141V</code>, doi:10.1086/430500). SME 분광에서 Teff = 5146 ± 44 K, [Fe/H] = −0.13 ± 0.04. 1차 [Fe/H] 앵커. Teff cross-check.",
  "li_165":"<b>Brewer J. M. et al. 2016</b> — <i>차가운 별의 분광 속성</i> (<code>2016ApJS..225...32B</code>, doi:10.3847/0067-0049/225/2/32). SME Teff = 5076 ± 25 K, [Fe/H] = −0.10 ± 0.03. 독립 분광 cross-check. VF05 와 결합 오차 안에서 일치.",
  "li_166":"<b>Tsantaki M. et al. 2013</b> — <i>차가운 태양형 별의 정밀 파라미터 유도. 철 라인 리스트 최적화</i> (<code>2013A&amp;A...555A.150T</code>, doi:10.1051/0004-6361/201321103). 고분해 Teff = 5077 ± 31 K, [Fe/H] = −0.09 ± 0.03. 동일 pipeline 분광 cross-check.",
  "li_167":"<b>Takeda Y. et al. 2007</b> — <i>행성을 가진 근방 별의 구조와 진화. II.</i> (<code>2007ApJS..168..297T</code>, doi:10.1086/509763). ε Eri 의 진화 모델 질량 0.83 ± 0.04 M☉. Llop-Sayson 2021 결합 fit 질량 cross- check.",
  "li_168":"<b>Barnes S. A. 2007</b> — <i>Gyrochronology 를 이용한 예시 field 별 나이</i> (<code>2007ApJ...669.1167B</code>, doi:10.1086/519295). P_rot = 11.2 d 단독에서 ε Eri 나이 0.82 ± 0.05 Gyr — Mamajek &amp; Hillenbrand 2008 의 활동-회전 결합 fit (0.44 Gyr) 보다 늙음. 이 나이대의 gyrochrone 보정 간 2 배 시스템 오차를 보여줌.",
  "li_169":"<b>Di Folco E. et al. 2007</b> — <i>ε Eri 를 포함한 근방 별의 VLTI/VINCI 간섭계</i> (<code>2007A&amp;A...475..243D</code>, doi:10.1051/0004-6361:20065445). VLTI/VINCI θ_LD = 2.148 ± 0.029 mas → R = 0.74 ± 0.01 R☉. Baines 2012 PAVO/CHARA 1차 픽의 독립 간섭계 cross-check.",
  "li_170":"<b>Henry T. J. et al. 1996</b> — <i>Solar Neighborhood. IV. 스무 번째로 가까운 별 시스템 발견</i> (<code>1996AJ....111..439H</code>). ε Eri 의 log R&#x27;HK 참조.",
  "li_171":"<b>Zechmeister M. et al. 2013</b> — <i>ESO CES 와 HARPS 의 행성 탐색 프로그램</i> (<code>2013A&amp;A...552A..78Z</code>, arXiv:1211.7263). 현대 epoch 에서 ε Eri 의 Ca II HK 인덱스 갱신.",
  "li_172":"<b>France K. et al. 2018</b> — <i>MUSCLES Treasury Survey</i> 의 K 왜성 확장 (<code>2018ApJS..239...16F</code>). 안쪽 행성의 대기 침식 추정에 정보 를 주는 FUV / Lyα 플럭스.",
  "li_173":"<b>Wood B. E. et al. 2002</b> — <i>나이와 활동도의 함수로 측정한 태양형 별의 질량 손실률</i> (<code>2002ApJ...574..412W</code>, arXiv:astro-ph/0203437). ε Eri 의 질량 손실률 ~30× 태양.",
  "li_174":"<b>Beeck B. et al. 2013</b> — <i>주계열 별의 근표면 convection 3D 시뮬레이션. II.</i> (arXiv:1308.4732). cfg 용으로 스케일된 K 왜성 granulation 속성.",
  "li_175":"<b>Bonanno A. et al. 2008</b> — <i>ε Eridani 의 Asteroseismology</i> (<code>2008A&amp;A...488..685B</code>, arXiv:0805.2580). 활동 floor 에 잠긴 marginal ν_max 검출.",
  "li_176":"<b>Frohlich H.-E. et al. 2007</b> — <i>ε Eri 흑점 모델링의 MOST 광도</i> (<code>2007A&amp;A...471..899F</code>). 5–10% 흑점 면적을 주는 광도 분해.",
  "li_177":"<b>Croll B. et al. 2006</b> — <i>MOST 가 검출한 ε Eri 의 차등 회전</i> (<code>2006ApJ...648..607C</code>). P_rot 와 차등 회전의 독립 확인.",
  "h3_178":"Read (instrument / non-cfg-decisive)",
  "li_179":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>40 AU 의 이심 0.3 행성과 의 평균 운동 공명이 야기한 ε Eridani Dusty Disk 의 구조</i> (<code>2002ApJ...578L.149Q</code>). 디스크 구조에서 추정한 원래의 &quot;ε Eri c&quot; 바깥 행성. Mawet 2019 가 배제했지만 역사적으로 중요.",
  "li_180":"<b>Benedict G. F. et al. 2006</b> — <i>외계 행성 ε Eridani b. 궤도와 질량</i> (<code>2006AJ....132.2206B</code>). ε Eri b 에 대한 이전 HST FGS 천체 측정 시도. 직접 촬영이 대체.",
  "li_181":"<b>Audard M. et al. 2000</b> — <i>늦은 형 별의 극자외 Flare 활동</i> (<code>2000ApJ...541..396A</code>). super-flare 외삽에 사용된 K 왜성 flare 빈도 분포.",
  "li_182":"<b>Linsky J. L. &amp; Wood B. E. 1995</b> — <i>α Centauri 시선과 ε Eri 의 Lyα 프로파일</i> (<code>1995ApJ...445L.139L</code>). FUV / Lyα 기준선.",
  "h3_183":"Not read — no arXiv preprint or low-priority (~80 papers)",
  "p_184":"ε Eri 활동에 관한 학회 proceedings (CS17, CS18, CS19), ε Eri 국소 환경의 성간 매질 / Strömgren-sphere 연구, SETI / 레이저 방출 탐색 (Marcy 2022, Tusay 2022, Saide 2023. ε Eri 는 영원한 타깃), 1990 년대 후반 pre-Spitzer 디스크 SED 모델링, 그리고 ε Eri 를 여러 tracer 중 하나로만 사용한 별 종족 운동학 논문 등. 전체 필터된 bib 는 <code>docs/phase3/_bib/eps-eri.yaml</code> 에 <code>status: skipped</code> 주석으로 보존됩니다.",
  "h2_185":"Open items for follow-up",
  "li_186":"<b>Phase 2 <code>disk_measurements</code> ingest.</b> DB 스키마에는 현재 <code>disk_measurements</code> 배열이 없으므로, 이 합성은 Backman 2009, MacGregor 2015, Booth 2017 를 Phase 2 를 거치지 않고 문헌에서 직접 인용합니다. DB 스키마가 확장되거나 (또는 <code>db/disks/</code> 동반 디렉터리 가 도입되면), 삼중 belt 지오메트리는 위 cfg 픽과 일치하는 <code>recommended</code> 플래그가 붙은 <code>disk_measurements</code> 레코드로 ingest 되어야 합니다 (<code>disk_inner_radius_au=3</code>, <code>disk_outer_radius_au=64</code>, <code>disk_morphology=&quot;three-belt&quot;</code>).",
  "li_187":"<b>ε Eri b 행성 Phase 3 후속.</b> jovian 동반자의 대기, 링 시스템 가능성, 색조, 그리고 위성 population 은 이 별 합성의 범위 밖입니다. Mawet 2019 + Llop-Sayson 2021 + Roettenbacher 2022 와 2026–2027 로 예상되는 JWST follow-up 에 닻을 둔 별도의 <code>docs/phase3/eps-eri-b.md</code> 워크스페이스가 필요합니다.",
  "li_188":"<b>역사적 &quot;ε Eri c&quot; 논쟁.</b> Quillen 2002 는 차가운 링의 이심에서 ~40 AU 바깥 행성을 추정했고, Benedict 2006 은 HST FGS 천체측정 신호 후보를 보고했지만, Mawet 2019 의 직접 촬영 미검출이 30 AU 너머의 &gt; 0.3 M_Jup 행성을 배제합니다. Su 2017 의 &quot;Genie&quot; 모델은 다중 belt 구조를 바깥이 아니라 차가운 링 안쪽의 행성들로 설명합니다. 문서적 관심만 있으며 cfg 행은 불필요. 다음 세션이 legacy 카탈로그에 가끔 보이는 &quot;ε Eri c&quot; 항목이 왜 제외되는지 알 수 있도록 여기 포함합니다.",
  "li_189":"<b>Tie-break 시각 색조 (<code>disk_tint_rgb_hex</code>, <code>limb_darkening_alpha_h</code>).</b> 둘 다 윈도우 내 추측입니다. ε Eri 디스크의 산란광 가시광 imaging 결과가 나오면 (예를 들어 JWST/NIRCam coronagraph), 디스크 hex 는 재유도되어야 합니다. K2V limb-darkening 간섭계 측정이 가능해지면 (CHARA, VLTI), α_h 값은 측정값으로 교체되어야 합니다.",
  "li_190":"<b>게임 epoch (J2000.0) 의 사이클 위상 동기화.</b> Metcalfe 2013 사이클과 Coffaro 2020 X 선 사이클은 게임 내 J2000 epoch 에 위상 동기화돼 있지 않습니다. 미래 cfg 개정에서 활동 구동 시각 밝기 변화를 특정 사이클 위상에 닻을 두면, 플레이어가 게임 연수에 걸쳐 일관된 타이밍을 볼 수 있습니다.",
  "h2_191":"Related",
  "li_192":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a>, <a href=\"alpha-centauri-b.md\">alpha-centauri-b</a> — 이웃 K1V 비교군 (B) 과 G2V 비교군 (A). ε Eri 의 시각 색조는 α Cen B 의 약간 더 따뜻한 <span class=\"hex-chip\" style=\"background:#ffcb91\"></span><code>#ffcb91</code> 과 구분됨.",
  "li_193":"<a href=\"proxima-cen.md\">proxima-cen</a> — 가장 가까운 행성 호스트. ε Eri 는 두 번째로 가까우며, Proxima 보다 0.27 pc + 1.9 pc 더 멀리 있습니다.",
  "li_194":"<a href=\"../reference/binary-epoch-pipeline.md\">binary-epoch-pipeline</a> — 단일 별 천체측정만 해당. ε Eri 는 이중성 궤도 propagation 이 필요 없습니다.",
  "li_195":"<a href=\"../reference/methodology.md\">methodology</a> — DB 스키마 원본.",
  "li_196":"<a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> — REX 는 ε Eri 에 기본적인 별 항목만 가지고 있으며, 삼중 링 디스크와 확정된 jovian 은 NearStars 고유의 추가 항목입니다.",
  "title":"ε Eridani — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",

  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
