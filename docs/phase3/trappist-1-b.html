  "p_141":"JWST MIRI 15 μm photometric eclipses (Greene 2023, five visits, 8.7σ detection) yield Fp/F★ = 861 ± 99 ppm, corresponding to a dayside brightness temperature of ≈ 503 +26/-27 K. Ih 2023 used this to bound atmospheric mass: any plausible atmosphere containing ≥100 ppm CO₂ is excluded above 0.3 bar at 3σ, and a Mars-like 6.5 mbar pure-CO₂ atmosphere is also excluded at 3σ.",
  "p_142":"Ducrot 2024 added 12.8 μm eclipses (in-band for CO₂&#x27;s 15 μm feature) and found Fp/F★ = 452 ± 86 ppm at 12.8 μm and 775 ± 90 ppm at 15 μm (combined re-analysis). Two models survive at 2σ: an airless ultramafic surface (preferred) and a thick pure-CO₂ atmosphere with photochemical hazes producing a stratospheric inversion (caveat: requires specific haze chemistry).",
  "p_143":"Ducrot 2025 closed the case: the MIRI 15 μm phase curve shows a dayside brightness temperature of 490 ± 17 K, no nightside flux detected (F_night,max = 39 +55/−27 ppm), and no measurable phase offset. Atmosphere models with surface pressure ≥1 bar and any significant greenhouse effect are excluded; b is &quot;unlikely to possess any substantial atmosphere.&quot;",
  "p_144":"For NearStars we adopt the <b>fully airless</b> interpretation:",
  "li_145":"<b>Pressure.</b> 0 Pa exactly. The 12.8/15 μm-consistent &quot;CO₂ + haze&quot; scenario is dropped because it conflicts with the absence of CO₂ on the neighboring planet c (Zieba 2023). If c — at lower insolation, closer to the cosmic shoreline — does not retain CO₂, b cannot plausibly hold a thicker one.",
  "li_146":"<b>No surface volatiles.</b> Dayside temperatures of ~500 K immediately photolyse and thermally desorb any surface H₂O, CO₂, or SO₂. The nightside, while cold (~80 K), has no atmospheric transport so volatiles cannot cold-trap there.",
  "p_147":"<b>Sky appearance.</b> No atmosphere means no Rayleigh scattering and no sky-color. The sky is uniformly black at every elevation. TRAPPIST-1 dominates the sky at angular size 5.51° (over ten times the Sun&#x27;s angular size from Earth) — by far the largest single object in the sky. Its color is deeply red-orange (≈2566 K blackbody → CIE chromaticity near <code>#ff7a1a</code>). The other six TRAPPIST-1 planets appear as bright stars in conjunction, with c (next planet out) reaching ~0.7° at inferior conjunction.",
  "h2_148":"Rotation &amp; spin synthesis",
  "p_149":"The TRAPPIST-1 b system parameters force a strongly synchronous configuration. Orbital eccentricity is small (0.00622; Agol 2021), obliquity is damped to zero by tidal forces over the ≳7.6 Gyr system age (Agol 2021 §6.2), and the spin-orbit resonance is most plausibly 1:1. Vinson 2017 and Makarov 2018 explored 3:2 alternatives for the inner TRAPPIST-1 planets and concluded 1:1 is overwhelmingly favored at b&#x27;s eccentricity (3:2 is stable only for e ≳ 0.01).",
  "p_150":"<b>KSP implementation note.</b> Rotation period = orbital period = 1.5109 days (130 540 s). In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds.",
  "p_151":"<b>No seasons.</b> With obliquity = 0 and essentially zero eccentricity-driven libration, the substellar point is fixed in the surface frame.",
  "p_152":"<b>Spin-orbit drift.</b> Lustig-Yaeger 2024 (2409.12065) computes a small secular drift of the substellar point due to the chain&#x27;s n-body precession — at b&#x27;s distance, the drift is ~0.6° per Myr, negligible on KSP gameplay timescales but worth noting in the cfg that the &quot;substellar point&quot; is a long-term mean.",
  "h2_153":"Visual styling",
  "p_154":"Combining the surface and atmosphere decisions:",
  "li_155":"<b>Global color palette.</b> Dark ultramafic body (<code>#1a1612</code> primary, <code>#7a2a10</code> lava-red accent) seen under intense red-orange stellar light appears as a glowing-charcoal world. The substellar hemisphere has visible cooling-lava patches catching the stellar light; the antistellar hemisphere is near-black.",
  "li_156":"<b>Dayside.</b> Bright substellar region (~503 K, ~230 °C) with textured low-relief lava plains. Substellar peak brightness in the cfg&#x27;s PQS should reach <code>#a04020</code> (lava red-orange) within ~15° of substellar point.",
  "li_157":"<b>Terminator band.</b> Narrow due to direct, low-redistribution illumination. High topographic contrast — basaltic ridges and impact crater rims throw long shadows in the grazing 2566 K light.",
  "li_158":"<b>Nightside.</b> Cold (~80 K) and entirely dark; only thermal IR emission, no visible-band features. KSP nightside lighting should be near-zero ambient. The only visible sources are reflected light from neighboring planets (c reaches mv ≈ −13 at conjunction, like Earth&#x27;s Moon).",
  "li_159":"<b>No atmosphere haze.</b> Limb is sharp — no scattering, no refraction, no glow. The transition from disk to space is a clean edge.",
  "li_160":"<b>Star in sky.</b> TRAPPIST-1 subtends 5.51° in b&#x27;s sky (about 11× the Sun&#x27;s angular size from Earth). Its color is deeply red-orange (≈2566 K → <code>#ff7a1a</code>), and the surface brightness is comparable to Mercury-from-Mercury solar brightness (~4.25 S⊕). At wavelengths beyond 1 μm the star is bright enough to show prominent solar flares (Howard 2023 in the d bibliography; Glazier 2020 for direct TRAPPIST-1 flare statistics) — for KSP, occasional flare lighting flickers would be a faithful but optional touch.",
  "li_161":"<b>Sister planets in sky.</b> When in inferior conjunction with b, TRAPPIST-1 c (next out) appears at angular size ~0.7° (1.5× Earth&#x27;s Moon). Near-coplanar geometry; these conjunctions occur every ~4 days (b-c synodic period).",
  "li_162":"<b>Magma ocean glow (optional).</b> If the substellar surface is truly close to solidus, very faint thermal red-orange emission at λ ≳ 2 μm might be visible at the substellar point during deep nightside flyovers in KSP — a low-priority visual easter egg.",
  "h2_163":"Bibliography",
  "h3_164":"Read (visual-informative, drove decisions above)",
  "li_165":"<b>2303.14849</b> Greene 2023 — JWST/MIRI F1500W secondary eclipse. Five visits, 8.7σ detection, Fp/F★ = 861 ± 99 ppm. Dayside brightness temperature ≈ 503 K. The discovery paper establishing b as a bare-rock candidate.",
  "li_166":"<b>2412.11627</b> Ducrot 2024 — Combined 12.8 + 15 μm MIRI eclipse analysis. Identifies two surviving models: unweathered ultramafic airless surface (preferred) vs. thick CO₂ + photochemical haze with stratospheric inversion. Drives the surface composition decision and the &quot;fresh / geologically active&quot; interpretation.",
  "li_167":"<b>2509.02128</b> Ducrot 2025 — JWST MIRI 15 μm thermal phase curve of b and c. Dayside T = 490 ± 17 K, no nightside emission, no phase offset. Definitively excludes ≳1 bar atmospheres. Closes the airless interpretation.",
  "li_168":"<b>2305.10414</b> Ih 2023 — Self-consistent radiative-convective model bounding b&#x27;s atmospheric thickness. Rules out plausible CO₂ atmospheres &gt; 0.3 bar at 3σ from the Greene 2023 data alone.",
  "li_169":"<b>2509.02120</b> Constraints from 3D GCM (anonymized — see YAML for authors). Explores the family of atmospheres compatible with eclipses but ruled out by the phase curve. Reinforces the airless conclusion.",
  "h3_170":"Read (context / methodology, not decision-driving)",
  "li_171":"<b>2309.07047</b> Lim 2023 — NIRISS transmission of b. Strong stellar contamination (spots in visit 1, faculae in visit 2). Cloud-free hydrogen-rich atmospheres rejected; cannot constrain secondary atmospheres. Important context that transmission spectroscopy on TRAPPIST-1 b is fundamentally limited by stellar variability.",
  "li_172":"<b>2412.16541</b> Stellar contamination correction using back-to-back b/c transits. Methodology paper relevant to all TRAPPIST-1 transmission work; not directly visual-informative.",
  "li_173":"<b>2507.02052</b> Uniform reanalysis of JWST MIRI 15 μm eclipses (frame-normalized PCA). Cross-check on Greene 2023 / Zieba 2023 reductions; consistent results.",
  "li_174":"<b>1905.00512</b> Bolmont 2019 — Tidal parameters of b and c. Estimates tidal heating flux of 0.04–0.2 W/m² for b depending on interior Q. Used in the &quot;resurfacing mechanism&quot; discussion.",
  "li_175":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d focus, but reviews b&#x27;s status as an exo-Venus / exo-Dead candidate in its introduction. Already read for d Phase 3.",
  "h3_176":"Read (instrument-only, not visual-informative)",
  "li_177":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series performance. Methodology only.",
  "h3_178":"Not read — no arXiv preprint or non-visual content (~30 papers)",
  "p_179":"The b bibliography includes ~30 papers without arXiv preprints, plus ~5 with arXiv but not visual-informative (instrument-only, biosignature biosphere modeling, etc.). The most likely visual-informative items in the not-read set:",
  "li_180":"<b>2026NatAs.tmp...88</b> &quot;The innermost planets in the TRAPPIST-1 system do not have thick atmospheres&quot; — likely Lustig-Yaeger-led recent Nature Astronomy summary. The arXiv preprint is on the way but not yet indexed at retrieval time (2026-05-21). <b>Flagged for re-fetch in a few weeks.</b>",
  "li_181":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — likely the Nature Astronomy publication of Ducrot 2025 (already covered via the arXiv preprint 2509.02128). Skip.",
  "li_182":"<b>2306.10150</b> Zieba 2023 — c&#x27;s eclipse paper. Read in detail for c synthesis; mentioned here because b is the comparison planet throughout.",
  "p_183":"---",
  "h2_184":"Open items for follow-up",
  "li_185":"Re-fetch the 2026 Nature Astronomy papers once arXiv preprints appear, in case the published versions tighten the atmosphere upper limits below the Ducrot 2025 / Greene 2023 values.",
  "li_186":"Validate the &quot;fresh ultramafic&quot; surface decision against any future high-resolution JWST spectroscopy (e.g., MIRI MRS) that could resolve specific mineralogical features.",
  "li_187":"Cross-check the <code>induction_heating_w_m2</code> range against more recent TRAPPIST-1 stellar-wind models if available — Cohen 2024 onward.",
  "li_188":"Cfg variant: a &quot;magma ocean residual&quot; interpretation with a visible substellar lava lake. Lower probability but visually distinctive; could be implemented as a Phase 3.5 alternative.",

  "p_1":"TRAPPIST-1 b 는 M8V ultra-cool dwarf 를 1.51 일 주기로 도는 1.12 R⊕, 1.37 M⊕ 의 암석 행성. TRAPPIST-1 의 7개 세계 중 가장 안쪽에 위치하며 지구 일사량의 4.3 배를 받음. JWST MIRI 의 12.8 μm 과 15 μm 에서의 secondary-eclipse 측정 (Greene 2023, Ducrot 2024) 과 전체 thermal phase curve (Ducrot 2025) 가 시스템에서 가장 깨끗한 &quot;맨 암석&quot; 답을 제공. dayside brightness temperature ≈ 490–503 K, 검출 가능한 nightside emission 없음, thermal phase offset 없음. ~0.3 bar 보다 두꺼운 (현실적 CO₂ 함량을 가진) 그럴듯한 대기는 3σ 에서 배제.",

  "h2_133":"표면 합성",
  "p_134":"Ducrot 2024 는 결합된 12.8 / 15 μm eclipse fit 을 통과하는 두 대기-또는- 표면 모델을 찾음. 광화학 안개를 가진 두꺼운 순수 CO₂ 대기 (성층권 inversion 과 emission 에서의 CO₂ feature 를 생성) 와 — 선호되는 — <b>미풍화 ultramafic 표면</b>을 가진 대기 없는 행성. ultramafic 해석이 중요. 달의 풍화된 basalt (regolith 노화) 는 낮은 broadband albedo 를 가지지만 특정 15 μm emissivity 는 데이터와 일치하지 않는 반면, 신선한 (지질학적으로 젊은) ultramafic 표면은 일치. 이는 진행 중이거나 최근의 지질학적 재포장을 함의.",
  "p_135":"Ducrot 2025 phase curve 가 이를 공고화. 검출된 nightside emission 없음 (15 μm 에서 ≲39 ppm), phase offset 없음, dayside flux 는 낮은 Bond albedo 와 비효율적인 열 재분배를 가진 맨 암석 모델과 일치. b 의 문헌 전반의 결론은 일관. <b>b 는 맨, 신선한, 어두운, 뜨거운 암석.</b>",
  "p_136":"<b>재포장 메커니즘.</b> 두 가지 물리적으로 그럴듯한 동인. (1) resonant chain 의 조석 가열 (Bolmont 2020 은 내부 dissipation 파라미터 Q 에 따라 b 에 대해 0.04–0.2 W/m² 추정). 비교를 위해 달-지구 조석 flux 는 ~1 mW/m²; Bolmont 범위의 하단조차 이를 초과하며, Io 의 ~2 W/m² 에는 도달하지 않지만 상단은 화성의 방사성 flux ~0.04 W/m² 에 접근. (2) 별의 바람을 통한 행성 운동에서 비롯되는 자기 induction heating (Grayver 2022, Cohen 2024), b 에 대해 0.4–4 W/m² 의 추정 — 부분 용융 화산활동을 유지하기에 충분. 시스템의 7.6 Gyr 나이를 고려하면 누적 효과는 지각 약점 영역에서 용암 흐름에 의해 지속적으로 새로워지는 표면이며, 일사량이 상부 지각을 solidus 에 가장 가깝게 미는 substellar 반구 쪽으로 편향.",
  "p_137":"<b>색 선택.</b> 호스트 별은 SED peak 이 1.1 μm 근처인 2566 K M8V dwarf — 인간 관찰자가 인지하는 표면 reflectance 는 본래 광물 색과 무관하게 강하게 적색-이동 (일반 M-dwarf 표면 조명 처리는 Domagal-Goldman 2010). 신선한 ultramafic 표면 (komatiite / olivine-pyroxene analog, broadband visible albedo ≈ 0.03–0.08) 의 경우 가장 가까운 태양계 reference 는 수성의 어두운 dorsa 또는 젊은 달 크레이터의 미풍화 floor. 우리는 <code>#1a1612</code> (매우 어두운 ultramafic) 을 primary, <code>#7a2a10</code> (식어가는-용암 빨강) 을 substellar 사분면 쪽으로 편향된 accent 로 선택.",
  "p_138":"<b>산화철.</b> d 보다 덜 두드러짐. Ducrot 2024 의 &quot;신선한&quot; ultramafic 추론은 유의미한 풍화에 적극 반대하므로, d 대비 산화철 patch 를 최소화. 존재하는 산화물은 표면 물질이 stellar UV 에 노출되지만 최근에 재포장되지 않은 terminator 와 antistellar 반구로 편향되어야 함.",
  "p_139":"<b>모양.</b> 세 가지 기여 과정. (1) 조석 + induction heating 에 의해 구동되는 부분 용융 화산활동에 의한 지속적 재포장 (Bolmont 2020, Grayver 2022) 으로, 주로 substellar 반구에서 신선한 용암 흐름과 shield-volcano feature 를 생성. (2) 잠긴 frame 에서 leading 반구 쪽으로 편향된 ~8 Gyr 의 누적 충돌, 다만 진행 중인 화산활동에 의해 부분적으로 지워짐. (3) 초기 ~500 Myr 강착 이후 단계의 마그마 바다 relict feature (b 는 더 강렬한 초기 에너지 flux 를 경험했고 마그마 바다를 더 오래 유지했을 것이므로 Piaulet 2025 §8 의 d 에 대한 논거를 b 까지 확장 가능). 기본 텍스처. substellar 점에서 방사하는 visible 용암 흐름 채널과 trailing 반구 highland 쪽에 충돌 크레이터가 집중된, 어둡고 유리질의 basaltic 평원.",
  "h2_140":"대기 합성",
  "p_141":"JWST MIRI 15 μm 광도측정 eclipse (Greene 2023, 다섯 visit, 8.7σ 검출) 이 Fp/F★ = 861 ± 99 ppm 산출, dayside brightness temperature ≈ 503 +26/-27 K 에 해당. Ih 2023 은 이로 대기 질량을 제한. ≥100 ppm CO₂ 를 함유한 그럴듯한 대기는 3σ 에서 0.3 bar 위에서 배제되고, 화성형 6.5 mbar 순수 CO₂ 대기도 3σ 에서 배제.",
  "p_142":"Ducrot 2024 는 12.8 μm eclipse (CO₂ 의 15 μm feature 의 in-band) 를 추가하고 12.8 μm 에서 Fp/F★ = 452 ± 86 ppm, 15 μm 에서 775 ± 90 ppm 을 발견 (결합 재분석). 2σ 에서 두 모델이 살아남음. 대기 없는 ultramafic 표면 (선호) 과 성층권 inversion 을 생성하는 광화학 안개를 가진 두꺼운 순수 CO₂ 대기 (caveat: 특정 안개 화학 필요).",
  "p_143":"Ducrot 2025 가 사건을 종결. MIRI 15 μm phase curve 는 dayside brightness temperature 490 ± 17 K, 검출된 nightside flux 없음 (F_night,max = 39 +55/−27 ppm), 측정 가능한 phase offset 없음을 보여줌. 표면 압력 ≥1 bar 와 유의미한 greenhouse 효과를 가진 대기 모델은 배제; b 는 &quot;어떤 실질적인 대기도 보유하지 않을 가능성이 높음.&quot;",
  "p_144":"NearStars 는 <b>완전히 대기 없는</b> 해석을 채택.",
  "li_145":"<b>압력.</b> 정확히 0 Pa. 12.8/15 μm 일관 &quot;CO₂ + 안개&quot; 시나리오는 이웃 행성 c 에 CO₂ 의 부재와 충돌하기 때문에 폐기 (Zieba 2023). 더 낮은 일사량의, cosmic shoreline 에 더 가까운 c 가 CO₂ 를 유지하지 않는다면, b 가 더 두꺼운 것을 보유하는 것은 그럴듯하지 않음.",
  "li_146":"<b>표면 volatile 없음.</b> ~500 K 의 dayside 온도는 표면 H₂O, CO₂, 또는 SO₂ 를 즉시 광분해하고 열적으로 desorb. nightside 는 차갑지만 (~80 K) 대기 수송이 없어 volatile 이 거기에 cold-trap 될 수 없음.",
  "p_147":"<b>하늘 외관.</b> 대기 없음은 Rayleigh scattering 도 sky-color 도 없음을 의미. 하늘은 모든 고도에서 균일하게 검음. TRAPPIST-1 이 각 크기 5.51° 로 하늘을 지배 (지구에서 본 태양 각 크기의 10배 이상) — 하늘에서 단연 가장 큰 단일 천체. 색은 깊은 적-오렌지 (≈2566 K blackbody → CIE chromaticity 가 <code>#ff7a1a</code> 근처). 다른 6개 TRAPPIST-1 행성은 합에서 밝은 별로 나타나며, c (다음 외행성) 는 내합에서 ~0.7° 에 도달.",
  "h2_148":"자전 &amp; spin 합성",
  "p_149":"TRAPPIST-1 b 시스템 파라미터가 강한 동기 회전 구성을 강제. 궤도 이심률은 작음 (0.00622; Agol 2021), 황도 경사각은 ≳7.6 Gyr 시스템 나이 동안 조석력에 의해 0 으로 damping (Agol 2021 §6.2), 회전-궤도 공명은 가장 그럴듯하게 1:1. Vinson 2017 과 Makarov 2018 은 안쪽 TRAPPIST-1 행성에 대해 3:2 대안을 탐색했고 b 의 이심률에서 1:1 이 압도적으로 선호된다고 결론 (3:2 는 e ≳ 0.01 에 대해서만 안정).",
  "p_150":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 1.5109 일 (130 540 s). Kopernicus 에서 body 의 <code>rotationPeriod</code> 가 궤도 <code>period</code> 와 초 단위로 같아야 함.",
  "p_151":"<b>계절 없음.</b> 황도 경사각 = 0 과 본질적으로 0 인 eccentricity-driven libration 으로, substellar 점이 표면 frame 에서 고정.",
  "p_152":"<b>회전-궤도 drift.</b> Lustig-Yaeger 2024 (2409.12065) 는 체인의 n-체 세차로 인한 substellar 점의 작은 secular drift 를 계산 — b 의 거리에서 drift 는 Myr 당 ~0.6°, KSP 게임플레이 시간 척도에서 무시할 만하지만 &quot;substellar 점&quot; 이 장기 평균임을 cfg 에 기록할 가치 있음.",
  "h2_153":"비주얼 스타일",
  "p_154":"표면과 대기 결정 결합.",
  "li_155":"<b>전역 색 팔레트.</b> 어두운 ultramafic body (<code>#1a1612</code> primary, <code>#7a2a10</code> 용암-빨강 accent) 가 강렬한 적-오렌지 별빛 아래 → 빛나는 charcoal 세계로 나타남. substellar 반구는 별빛을 받는 visible 식어가는-용암 patch 가 있음; antistellar 반구는 거의 검음.",
  "li_156":"<b>Dayside.</b> 밝은 substellar 영역 (~503 K, ~230 °C) 과 텍스처가 있는 저-기복 용암 평원. cfg 의 PQS 에서 substellar peak 밝기는 substellar 점에서 ~15° 이내에 <code>#a04020</code> (용암 적-오렌지) 에 도달해야 함.",
  "li_157":"<b>Terminator band.</b> 직접적, 낮은-재분배 조명으로 인해 좁음. 높은 지형 대비 — basaltic 능선과 충돌 크레이터 림이 스치는 2566 K 빛 아래 긴 그림자를 던짐.",
  "li_158":"<b>Nightside.</b> 차가움(~80 K) 하고 완전히 어두움; 열적외 emission 만, visible 대역 feature 없음. KSP nightside 조명은 거의 0 의 ambient 여야. 유일한 visible 광원은 이웃 행성에서 반사된 빛 (c 는 합에서 mv ≈ −13 에 도달, 지구의 달과 비슷).",
  "li_159":"<b>Atmosphere haze 없음.</b> Limb 가 sharp — scattering, 굴절, glow 없음. disk 에서 space 로의 전환은 깨끗한 가장자리.",
  "li_160":"<b>하늘의 별.</b> TRAPPIST-1 이 b 의 하늘에서 5.51° 차지 (지구에서 본 태양 각 크기의 약 11×). 색은 깊은 적-오렌지 (≈2566 K → <code>#ff7a1a</code>), 표면 밝기는 Mercury-from-Mercury 태양 밝기와 비슷 (~4.25 S⊕). 1 μm 이상 파장에서 별이 두드러진 solar flare 를 보일 만큼 밝음 (d bibliography 의 Howard 2023; TRAPPIST-1 flare 통계는 Glazier 2020 직접) — KSP 에서 가끔 flare 조명 깜빡임이 충실하지만 선택적인 터치가 될 것.",
  "li_161":"<b>하늘의 자매 행성.</b> b 와 내합 시, TRAPPIST-1 c (다음 외행성) 가 각 크기 ~0.7° 에 나타남 (지구 달의 1.5×). 거의 동일 평면 geometry; 이 conjunction 은 ~4 일마다 발생 (b-c 회합 주기).",
  "li_162":"<b>마그마 바다 glow (선택).</b> substellar 표면이 정말 solidus 에 가깝다면, λ ≳ 2 μm 에서 매우 희미한 적-오렌지 thermal emission 이 KSP 의 깊은 nightside flyover 동안 substellar 점에서 보일 수 있음 — 낮은 우선순위의 시각적 이스터에그.",
  "h2_163":"참고 문헌",
  "h3_164":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_165":"<b>2303.14849</b> Greene 2023 — JWST/MIRI F1500W secondary eclipse. 다섯 visit, 8.7σ 검출, Fp/F★ = 861 ± 99 ppm. Dayside brightness temperature ≈ 503 K. b 를 맨 암석 후보로 확립한 발견 논문.",
  "li_166":"<b>2412.11627</b> Ducrot 2024 — 결합된 12.8 + 15 μm MIRI eclipse 분석. 살아남는 두 모델 식별. 미풍화 ultramafic 대기 없는 표면 (선호) 대 성층권 inversion 을 가진 두꺼운 CO₂ + 광화학 안개. 표면 조성 결정과 &quot;신선한 / 지질학적으로 활성&quot; 해석을 견인.",
  "li_167":"<b>2509.02128</b> Ducrot 2025 — b 와 c 의 JWST MIRI 15 μm thermal phase curve. Dayside T = 490 ± 17 K, nightside emission 없음, phase offset 없음. ≳1 bar 대기를 결정적으로 배제. 대기 없음 해석을 종결.",
  "li_168":"<b>2305.10414</b> Ih 2023 — b 의 대기 두께를 제한하는 자기-일관 복사-대류 모델. Greene 2023 데이터만으로 3σ 에서 &gt; 0.3 bar 의 그럴듯한 CO₂ 대기를 배제.",
  "li_169":"<b>2509.02120</b> 3D GCM 의 제약 (익명화 — 저자는 YAML 참조). eclipse 와 호환되지만 phase curve 로 배제되는 대기군을 탐색. 대기 없음 결론을 강화.",
  "h3_170":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_171":"<b>2309.07047</b> Lim 2023 — b 의 NIRISS transmission. 강한 stellar contamination (visit 1 의 spot, visit 2 의 faculae). Cloud-free 수소-rich 대기 거부; 2차 대기는 제약 불가. TRAPPIST-1 b 의 transmission spectroscopy 가 stellar variability 에 의해 근본적으로 제한된다는 중요한 맥락.",
  "li_172":"<b>2412.16541</b> back-to-back b/c transit 을 사용한 stellar contamination 보정. 모든 TRAPPIST-1 transmission 작업에 관련된 방법론 논문; 직접 시각-정보 아님.",
  "li_173":"<b>2507.02052</b> JWST MIRI 15 μm eclipse 의 균일 재분석 (frame-normalized PCA). Greene 2023 / Zieba 2023 reduction 에 대한 교차 검증; 일관된 결과.",
  "li_174":"<b>1905.00512</b> Bolmont 2019 — b 와 c 의 조석 파라미터. 내부 Q 에 따라 b 에 대해 0.04–0.2 W/m² 의 조석 가열 flux 추정. &quot;재포장 메커니즘&quot; 논의에 사용.",
  "li_175":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d 초점이지만 서론에서 b 의 exo-Venus / exo-Dead 후보로서의 상태를 리뷰. d Phase 3 에 이미 읽음.",
  "h3_176":"읽음 (instrument-only, 시각 정보 아님)",
  "li_177":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series 성능. 방법론만.",
  "h3_178":"읽지 않음 — arXiv preprint 없거나 비시각 콘텐츠 (~30 편)",
  "p_179":"b bibliography 는 arXiv preprint 가 없는 ~30 편의 논문에 추가로 arXiv 가 있지만 시각-정보가 아닌 ~5 편 (instrument-only, biosignature biosphere 모델링 등) 을 포함. read-안 함 세트에서 시각-정보 가능성이 가장 높은 항목.",
  "li_180":"<b>2026NatAs.tmp...88</b> &quot;The innermost planets in the TRAPPIST-1 system do not have thick atmospheres&quot; — Lustig-Yaeger 가 이끄는 최근 Nature Astronomy 요약일 가능성. arXiv preprint 가 곧 나올 예정이지만 검색 시점 (2026-05-21) 에 아직 색인되지 않음. <b>몇 주 후 재검색을 위해 flag.</b>",
  "li_181":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — Ducrot 2025 의 Nature Astronomy 출판일 가능성 (arXiv preprint 2509.02128 로 이미 다룸). Skip.",
  "li_182":"<b>2306.10150</b> Zieba 2023 — c 의 eclipse 논문. c 합성을 위해 자세히 읽음; b 가 전반에서 비교 행성이기 때문에 여기에 언급.",
  "p_183":"---",
  "h2_184":"후속 follow-up 항목",
  "li_185":"arXiv preprint 가 나오면 2026 Nature Astronomy 논문 재검색, 출판된 버전이 Ducrot 2025 / Greene 2023 값 아래로 대기 상한을 조이는 경우에 대비.",
  "li_186":"특정 광물학적 feature 를 분해할 수 있는 향후 고해상도 JWST 분광 (예. MIRI MRS) 에 대해 &quot;신선한 ultramafic&quot; 표면 결정 검증.",
  "li_187":"가능하다면 더 최근의 TRAPPIST-1 항성풍 모델에 대해 <code>induction_heating_w_m2</code> 범위 교차 검증 — Cohen 2024 이후.",
  "li_188":"Cfg 변형. visible substellar 용암 호수를 가진 &quot;마그마 바다 잔존&quot; 해석. 더 낮은 확률이지만 시각적으로 독특함; Phase 3.5 대안으로 구현 가능.",
  "title":"TRAPPIST-1 b — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",
  "reports_index": "보고서 인덱스",

  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
