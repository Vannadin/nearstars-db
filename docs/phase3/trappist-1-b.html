  "h2_169":"Surface synthesis",
  "p_170":"Ducrot 2024 finds two atmosphere-or-surface models that pass the combined 12.8 / 15 μm eclipse fit: a thick pure-CO₂ atmosphere with photochemical haze (creating a stratospheric inversion and the CO₂ feature in emission), and — preferred — an airless planet with an <b>unweathered ultramafic surface</b>. The ultramafic interpretation matters: weathered basalts on the Moon (regolith-aged) have low broadband albedo but specific 15 μm emissivity that does not match the data, whereas a fresh (geologically young) ultramafic surface does. This implies ongoing or recent geological resurfacing.",
  "p_171":"The Ducrot 2025 phase curve consolidates this: no detected nightside emission (≲39 ppm at 15 μm), no phase offset, and the dayside flux matches a bare-rock model with low Bond albedo and inefficient heat redistribution. The conclusion across the b literature is consistent: <b>b is a bare, fresh, dark, hot rock.</b>",
  "p_172":"<b>Resurfacing mechanism.</b> Two physically plausible drivers: (1) Tidal heating from the resonant chain. Bolmont 2026 (2601.03408) revises older estimates substantially upward: for b&#x27;s measured core-mass-fraction range (Agol 2021: ~21 wt%) and the smallest plausible eccentricity, surface flux is <b>~0.5–1 W/m² (nominal)</b>, comparable to Io&#x27;s ~2 W/m². Higher-eccentricity solutions reach 10²–10³ W/m² but are ruled out by the JWST nightside constraint (Gillon 2025; T_2σ ≤ 291 K → Φ_2σ ≤ 407 W/m²). Even at the conservative ~0.5 W/m² value, tidal heating dominates Mars&#x27;s radiogenic ~0.04 W/m² by an order of magnitude. (2) Magnetic induction heating (Grayver 2022, Cohen 2024) adds another 0.4–4 W/m² from the planet&#x27;s motion through the stellar wind. The combined heat budget easily sustains partial-melt volcanism. Given the system&#x27;s 7.6 Gyr age, the surface is continuously refreshed by lava flows in regions of crustal weakness, biased toward the substellar hemisphere where insolation pushes the upper crust closest to solidus.",
  "p_173":"<b>Color choice.</b> The host star is a 2566 K M8V dwarf with SED peak near 1.1 μm — surface reflectance perceived by a human observer is strongly red-shifted regardless of intrinsic mineral color (Domagal-Goldman 2010 for the general M-dwarf surface illumination treatment). For a fresh ultramafic surface (komatiite / olivine-pyroxene analogue, broadband visible albedo ≈ 0.03–0.08), the closest Solar System reference is the dark dorsa of Mercury or the unweathered floor of a young lunar crater. We pick <span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> (very dark ultramafic) primary, <span class=\"hex-chip\" style=\"background:#7a2a10\"></span><code>#7a2a10</code> (cooling-lava red) accent biased toward the substellar quadrant.",
  "p_174":"<b>Iron oxide.</b> Less prominent than on d. The &quot;fresh&quot; ultramafic inference of Ducrot 2024 actively argues against significant weathering, so we minimize iron-oxide patches relative to d. What oxide there is should be biased to the terminator and antistellar hemisphere, where surface material is exposed to stellar UV but not recently resurfaced.",
  "p_175":"<b>Morphology.</b> Three contributing processes: (1) Continuous resurfacing by partial-melt volcanism driven by tidal + induction heating (Bolmont 2020, Grayver 2022), producing fresh lava flows and shield-volcano features predominantly in the substellar hemisphere. (2) ~8 Gyr of accumulated impacts, biased toward the leading hemisphere in the locked frame, but partially erased by ongoing volcanism. (3) Magma ocean relict features from the initial ~500 Myr post-accretion phase (extensible to b from Piaulet 2025 §8&#x27;s argument for d, since b experienced an even more intense initial energy flux and would have retained a magma ocean longer). Default texture: dark, glassy basaltic plains with visible lava-flow channels radiating from the substellar point and impact craters concentrating toward the trailing-hemisphere highlands.",
  "h2_176":"Atmosphere synthesis",
  "p_177":"JWST MIRI 15 μm photometric eclipses (Greene 2023, five visits, 8.7σ detection) yield Fp/F★ = 861 ± 99 ppm, corresponding to a dayside brightness temperature of ≈ 503 +26/-27 K. Ih 2023 used this to bound atmospheric mass: any plausible atmosphere containing ≥100 ppm CO₂ is excluded above 0.3 bar at 3σ, and a Mars-like 6.5 mbar pure-CO₂ atmosphere is also excluded at 3σ.",
  "p_178":"Ducrot 2024 added 12.8 μm eclipses (in-band for CO₂&#x27;s 15 μm feature) and found Fp/F★ = 452 ± 86 ppm at 12.8 μm and 775 ± 90 ppm at 15 μm (combined re-analysis). Two models survive at 2σ: an airless ultramafic surface (preferred) and a thick pure-CO₂ atmosphere with photochemical hazes producing a stratospheric inversion (caveat: requires specific haze chemistry).",
  "p_179":"Ducrot 2025 closed the case: the MIRI 15 μm phase curve shows a dayside brightness temperature of 490 ± 17 K, no nightside flux detected (F_night,max = 39 +55/−27 ppm), and no measurable phase offset. Atmosphere models with surface pressure ≥1 bar and any significant greenhouse effect are excluded; b is &quot;unlikely to possess any substantial atmosphere.&quot;",
  "p_180":"Two theoretical papers reinforce the airless interpretation on independent grounds. <b>2412.05188</b> (Chatterjee &amp; Pierrehumbert 2024) places b firmly inside the &quot;catastrophic escape&quot; regime of the revised cosmic shoreline — even continuous volcanic outgassing cannot rebuild a secondary atmosphere against b&#x27;s current XUV flux (~10³ × F⊕,XUV; ~10⁴–10⁵ during the superluminous pre-main-sequence phase). <b>1911.08878</b> (Turbet 2020) shows that b&#x27;s maximum retained water mass fraction is ≤ 2% for a terrestrial-core composition with the measured loss rate of 0.19%/Gyr, implying b is &quot;likely completely dry today&quot; — consistent with the airless surface.",
  "p_181":"<b>Initial-water inversion.</b> Gialluca 2024 (2405.02401) performs an MCMC fit using the joint constraint &quot;b airless + c retains thin O₂&quot; and finds initial surface water 8.2 +1.5/-1.0 Earth oceans (1σ). Mechanistically, ~3 TO sequestered in magma ocean, ~4 TO oxygen lost to hydrodynamic drag, ~385 bars dry crustal oxidation post-desiccation. The historical baseline of Bolmont 2017 (1605.00616) gave up to 13.5 EO H lost from b alone over the system&#x27;s lifetime, producing up to ~422 bars of abiotic O₂ that could have built up if oxygen sinks were ineffective. The Gialluca refinement constrains both upper and lower bounds.",
  "p_182":"One methodological caveat: <b>2601.12556</b> (Wirth, Powell &amp; Wordsworth 2026) finds that b has Λ ≤ 1 (Weak Temperature Gradient assumption fails), so heat-redistribution-only bounds on b&#x27;s atmosphere are weaker than usually assumed. However, Ih 2023&#x27;s 0.3-bar bound uses direct 15 μm CO₂ molecular absorption (not redistribution) and still holds. Ducrot 2025&#x27;s phase curve also measures redistribution directly, so this caveat does not change the airless decision.",
  "p_183":"For NearStars we adopt the <b>fully airless</b> interpretation:",
  "li_184":"<b>Pressure.</b> 0 Pa exactly. The 12.8/15 μm-consistent &quot;CO₂ + haze&quot; scenario is dropped because it conflicts with the absence of CO₂ on the neighboring planet c (Zieba 2023). If c — at lower insolation, closer to the cosmic shoreline — does not retain CO₂, b cannot plausibly hold a thicker one.",
  "li_185":"<b>No surface volatiles.</b> Dayside temperatures of ~500 K immediately photolyse and thermally desorb any surface H₂O, CO₂, or SO₂. The nightside, while cold (~80 K), has no atmospheric transport so volatiles cannot cold-trap there.",
  "p_186":"<b>Sky appearance.</b> No atmosphere means no Rayleigh scattering and no sky-color. The sky is uniformly black at every elevation. TRAPPIST-1 dominates the sky at angular size 5.51° (over ten times the Sun&#x27;s angular size from Earth) — by far the largest single object in the sky. Its color is deeply red-orange (≈2566 K blackbody → CIE chromaticity near <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code>). The other six TRAPPIST-1 planets appear as bright stars in conjunction, with c (next planet out) reaching ~0.7° at inferior conjunction.",
  "p_187":"<b>Radiation environment without an atmosphere.</b> With no atmospheric column to absorb energetic particles, b&#x27;s surface receives the full M-dwarf wind and flare flux directly. Garraffo 2017 (1706.04617) and Cohen 2014 (1405.7707) simulations show the planetary magnetic field — even at Earth-like strength — is compressed to ~1.5 R_p by the stellar wind, and frequently opens directly to the surface during the planet&#x27;s sub-Alfvénic crossings (≈50% of each orbit). Atri 2019 (1910.09871) gives a surface dose of ~80 Sv/yr under these conditions during typical flare activity, with single-flare spikes reaching 1–10 Gy. For Kerbalism cfg purposes this places b in the &quot;lethal without active shielding&quot; radiation bracket — crews on the surface accumulate lethal dose in minutes to hours, not days.",
  "h2_188":"Rotation &amp; spin synthesis",
  "p_189":"The TRAPPIST-1 b system parameters force a strongly synchronous configuration. Orbital eccentricity is small (0.00622; Agol 2021), obliquity is damped to zero by tidal forces over the ≳7.6 Gyr system age (Agol 2021 §6.2), and the spin-orbit resonance is most plausibly 1:1. Vinson 2017 and Makarov 2018 explored 3:2 alternatives for the inner TRAPPIST-1 planets and concluded 1:1 is overwhelmingly favored at b&#x27;s eccentricity (3:2 is stable only for e ≳ 0.01).",
  "p_190":"<b>KSP implementation note.</b> Rotation period = orbital period = 1.5109 days (130 540 s). In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds.",
  "p_191":"<b>No seasons.</b> With obliquity = 0 and essentially zero eccentricity-driven libration, the substellar point is fixed in the surface frame.",
  "p_192":"<b>Spin-orbit drift.</b> Lustig-Yaeger 2024 (2409.12065) computes a small secular drift of the substellar point due to the chain&#x27;s n-body precession — at b&#x27;s distance, the drift is ~0.6° per Myr, negligible on KSP gameplay timescales but worth noting in the cfg that the &quot;substellar point&quot; is a long-term mean. Revol 2024 (cited in Bolmont 2026 / 2601.03408) finds an even longer &quot;sidereal day&quot; of 69 yr for b under the full chain dynamics — again, irrelevant to gameplay but a faithful annotation.",
  "p_193":"<b>Tidal Love number signature.</b> Bolmont 2020 (2002.02015) shows that the TRAPPIST-1 b TTVs hint at an anomalously high planetary Love number (k₂ ≳ 1.5, well above Earth&#x27;s 0.299). If real, this is <b>direct dynamical evidence</b> for a liquid layer — likely the substellar magma reservoir already adopted in the surface synthesis. The signal is at the noise floor of current TTV fits, so the inference is tentative, but it independently supports the resurfacing interpretation.",
  "p_194":"<b>Magnetic dynamo expectation.</b> With 7.6 Gyr of system age and a tidally-locked 1.51-day rotation (slow compared to Earth&#x27;s 1 day), b&#x27;s internal dynamo is expected to be either weak-multipolar (RM22 / 2203.01065 scaling gives ~0.08 × Earth dipole moment) or absent. The induction heating from the stellar wind (Kislyakova 2018 / 1710.08761: 17% of radiogenic flux) keeps the deep interior warm enough that a frozen core is unlikely, so some residual dynamo activity is plausible. The cfg adopts ~3 μT surface field at the equator as a low-confidence estimate. This is enough field to produce a small magnetospheric &quot;bubble&quot; but not enough to deflect stellar wind from the surface during the system&#x27;s frequent sub-Alfvénic phases.",
  "h2_195":"Visual styling",
  "p_196":"Combining the surface and atmosphere decisions:",
  "li_197":"<b>Global color palette.</b> Dark ultramafic body (<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> primary, <span class=\"hex-chip\" style=\"background:#7a2a10\"></span><code>#7a2a10</code> lava-red accent) seen under intense red-orange stellar light appears as a glowing-charcoal world. The substellar hemisphere has visible cooling-lava patches catching the stellar light; the antistellar hemisphere is near-black.",
  "li_198":"<b>Dayside.</b> Bright substellar region (~503 K, ~230 °C) with textured low-relief lava plains. Substellar peak brightness in the cfg&#x27;s PQS should reach <span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code> (lava red-orange) within ~15° of substellar point.",
  "li_199":"<b>Terminator band.</b> Narrow due to direct, low-redistribution illumination. High topographic contrast — basaltic ridges and impact crater rims throw long shadows in the grazing 2566 K light.",
  "li_200":"<b>Nightside.</b> Cold (~80 K) and entirely dark; only thermal IR emission, no visible-band features. KSP nightside lighting should be near-zero ambient. The only visible sources are reflected light from neighboring planets (c reaches mv ≈ −13 at conjunction, like Earth&#x27;s Moon).",
  "li_201":"<b>No atmosphere haze.</b> Limb is sharp — no scattering, no refraction, no glow. The transition from disk to space is a clean edge.",
  "li_202":"<b>Star in sky.</b> TRAPPIST-1 subtends 5.51° in b&#x27;s sky (about 11× the Sun&#x27;s angular size from Earth). Its color is deeply red-orange (≈2566 K → <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code>), and the surface brightness is comparable to Mercury-from-Mercury solar brightness (~4.25 S⊕). At wavelengths beyond 1 μm the star is bright enough to show prominent solar flares (Howard 2023 in the d bibliography; Glazier 2020 for direct TRAPPIST-1 flare statistics) — for KSP, occasional flare lighting flickers would be a faithful but optional touch.",
  "li_203":"<b>Sister planets in sky.</b> When in inferior conjunction with b, TRAPPIST-1 c (next out) appears at angular size ~0.7° (1.5× Earth&#x27;s Moon). Near-coplanar geometry; these conjunctions occur every ~4 days (b-c synodic period).",
  "li_204":"<b>Magma ocean glow (optional).</b> If the substellar surface is truly close to solidus, very faint thermal red-orange emission at λ ≳ 2 μm might be visible at the substellar point during deep nightside flyovers in KSP — a low-priority visual easter egg.",
  "h2_205":"Bibliography",
  "h3_206":"Read (visual-informative, drove decisions above)",
  "li_207":"<b>2303.14849</b> Greene 2023 — JWST/MIRI F1500W secondary eclipse. Five visits, 8.7σ detection, Fp/F★ = 861 ± 99 ppm. Dayside brightness temperature ≈ 503 K. The discovery paper establishing b as a bare-rock candidate.",
  "li_208":"<b>2412.11627</b> Ducrot 2024 — Combined 12.8 + 15 μm MIRI eclipse analysis. Identifies two surviving models: unweathered ultramafic airless surface (preferred) vs. thick CO₂ + photochemical haze with stratospheric inversion. Drives the surface composition decision and the &quot;fresh / geologically active&quot; interpretation.",
  "li_209":"<b>2509.02128</b> Ducrot 2025 — JWST MIRI 15 μm thermal phase curve of b and c. Dayside T = 490 ± 17 K, no nightside emission, no phase offset. Definitively excludes ≳1 bar atmospheres. Closes the airless interpretation.",
  "li_210":"<b>2305.10414</b> Ih 2023 — Self-consistent radiative-convective model bounding b&#x27;s atmospheric thickness. Rules out plausible CO₂ atmospheres &gt; 0.3 bar at 3σ from the Greene 2023 data alone.",
  "li_211":"<b>2509.02120</b> Constraints from 3D GCM (anonymized — see YAML for authors). Explores the family of atmospheres compatible with eclipses but ruled out by the phase curve. Reinforces the airless conclusion.",
  "li_212":"<b>2412.05188</b> Chatterjee &amp; Pierrehumbert 2024 — Cosmic shoreline with hydrodynamic escape physics. Places b firmly in the &quot;catastrophic escape&quot; regime; even outgassing cannot rebuild a secondary atmosphere. Theoretical justification for airlessness independent of JWST data.",
  "li_213":"<b>2601.03408</b> Bolmont 2026 — Tidal-heating refinement using full interior structure + JWST nightside cap. Drives the upward revision of <span class=\"field-tt\" data-ko-tip=\"조석 가열 표면 flux (W/m²). Io ≈ 2.\" data-en-tip=\"Tidal heating surface flux (W/m²). Io ≈ 2.\"><code>tidal_heating_w_m2</code></span> from 0.04–0.2 to ~0.5–1 W/m² (nominal), with the JWST hard cap at 407 W/m² (Φ_2σ). Confirms that high-e, low-viscosity interior models for b are observationally excluded.",
  "li_214":"<b>1911.08878</b> Turbet 2020 — Water mass-radius relationships for irradiated rocky planets. Caps b&#x27;s retained water at ≤2% for an Earth-like core, supporting the &quot;dry today&quot; inference.",
  "li_215":"<b>2405.02401</b> Gialluca 2024 — MCMC initial-water inversion from b/c JWST constraints. Initial water 8.2 +1.5/-1.0 TO. Strengthens b&#x27;s airless interpretation and ties it to c&#x27;s thin O₂ atmosphere.",
  "li_216":"<b>2002.02015</b> Bolmont 2020 — TTV-derived tidal Love number for b. High k₂ ≳ 1.5 would dynamically signal a liquid magma layer; current TTV fits are at noise floor.",
  "li_217":"<b>1605.00616</b> Bolmont 2017 — Historical baseline for water loss from terrestrial planets orbiting ultracool dwarfs. Up to 13.5 EO H lost from b over system age; up to ~422 bars abiotic O₂ possible. Foundational citation for the airless interpretation.",
  "li_218":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. MHD simulations of planetary magnetospheres in the stellar wind. Sub-Alfvénic regime opens planetary field to surface for ~50% of each orbit.",
  "li_219":"<b>2203.01065</b> RM22 (Internal Structures and Magnetic Moments) — Dynamo scaling for tidally-locked rocky planets gives 0.01–0.1 × Earth dipole moment.",
  "li_220":"<b>1910.09871</b> Atri 2019 — Stellar Proton Event surface-dose calculations. Gives the per-event dose tables used for the radiation cfg.",
  "li_221":"<b>1710.08761</b> Kislyakova 2018 — Induction heating drives magma-ocean possibility on b/c/d via stellar-wind-induced electromagnetic dissipation.",
  "li_222":"<b>1405.7707</b> Cohen 2014 — Magnetospheric structure and atmospheric Joule heating for habitable-zone planets.",
  "h3_223":"Read (context / methodology, not decision-driving)",
  "li_224":"<b>2309.07047</b> Lim 2023 — NIRISS transmission of b. Strong stellar contamination (spots in visit 1, faculae in visit 2). Cloud-free hydrogen-rich atmospheres rejected; cannot constrain secondary atmospheres. Important context that transmission spectroscopy on TRAPPIST-1 b is fundamentally limited by stellar variability.",
  "li_225":"<b>2412.16541</b> Stellar contamination correction using back-to-back b/c transits. Methodology paper relevant to all TRAPPIST-1 transmission work; not directly visual-informative.",
  "li_226":"<b>2507.02052</b> Uniform reanalysis of JWST MIRI 15 μm eclipses (frame-normalized PCA). Cross-check on Greene 2023 / Zieba 2023 reductions; consistent results.",
  "li_227":"<b>1905.00512</b> Bolmont 2019 — Tidal parameters of b and c. Estimates tidal heating flux of 0.04–0.2 W/m² for b depending on interior Q. Used in the &quot;resurfacing mechanism&quot; discussion.",
  "li_228":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d focus, but reviews b&#x27;s status as an exo-Venus / exo-Dead candidate in its introduction. Already read for d Phase 3.",
  "li_229":"<b>2601.12556</b> Wirth, Powell &amp; Wordsworth 2026 — Analytic modeling of tidally-locked rocky planet atmospheres. Notes b has Λ ≤ 1 (WTG assumption fails) so heat-redistribution-only bounds are weak; cited as a methodological caveat in the atmosphere synthesis. Does not change the airless decision because the molecular-absorption bounds (Ih 2023) and phase-curve heat-redistribution measurement (Ducrot 2025) are independent of WTG.",
  "li_230":"<b>2512.07695</b> Allen 2025 — JWST TRAPPIST-1 e/b Program: First Observations. Uses b as airless stellar-contamination proxy for e. Reaffirms airless interpretation; no new b-specific constraints.",
  "li_231":"<b>1806.10084</b> Unterborn 2018 — Updated compositional models for b/c. Interior degeneracy: small core consistent with no water, larger core would require volatile envelope. Superseded by Agol 2021 + Turbet 2020 for the water-content question.",
  "h3_232":"Read (instrument-only, not visual-informative)",
  "li_233":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series performance. Methodology only.",
  "h3_234":"Not read — no arXiv preprint or non-visual content (~30 papers)",
  "p_235":"The b bibliography includes ~30 papers without arXiv preprints, plus ~5 with arXiv but not visual-informative (instrument-only, biosignature biosphere modeling, etc.). The most likely visual-informative items in the not-read set:",
  "li_236":"<b>2026NatAs.tmp...88</b> &quot;The innermost planets in the TRAPPIST-1 system do not have thick atmospheres&quot; — likely Lustig-Yaeger-led recent Nature Astronomy summary. The arXiv preprint is on the way but not yet indexed at retrieval time (2026-05-21). <b>Flagged for re-fetch in a few weeks.</b>",
  "li_237":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — likely the Nature Astronomy publication of Ducrot 2025 (already covered via the arXiv preprint 2509.02128). Skip.",
  "li_238":"<b>2306.10150</b> Zieba 2023 — c&#x27;s eclipse paper. Read in detail for c synthesis; mentioned here because b is the comparison planet throughout.",
  "p_239":"---",
  "h2_240":"Open items for follow-up",
  "li_241":"Re-fetch the 2026 Nature Astronomy papers once arXiv preprints appear, in case the published versions tighten the atmosphere upper limits below the Ducrot 2025 / Greene 2023 values.",
  "li_242":"Validate the &quot;fresh ultramafic&quot; surface decision against any future high-resolution JWST spectroscopy (e.g., MIRI MRS) that could resolve specific mineralogical features.",
  "li_243":"Cross-check the <span class=\"field-tt\" data-ko-tip=\"항성 자기장 유도 가열 (W/m²).\" data-en-tip=\"Stellar-field induction heating (W/m²).\"><code>induction_heating_w_m2</code></span> range against more recent TRAPPIST-1 stellar-wind models if available — Cohen 2024 onward.",
  "li_244":"Cfg variant: a &quot;magma ocean residual&quot; interpretation with a visible substellar lava lake. Lower probability but visually distinctive; could be implemented as a Phase 3.5 alternative.",
  "li_245":"The magnetic field estimates are low-confidence scaling-relation values. If a direct measurement (radio non-detection upper limit) appears for b, the cfg field strength may need adjustment.",
  "li_246":"Interesting-first tie-break: the magnetic dipole tilt of 10° was chosen to give a visually distinctive offset auroral cap rather than a uniform polar oval; both are physically plausible.",

  "p_1":"TRAPPIST-1 b 는 M8V ultra-cool dwarf 를 1.51 일 주기로 도는 1.12 R⊕, 1.37 M⊕ 의 암석 행성입니다. TRAPPIST-1 의 일곱 세계 중 가장 안쪽에 있고, 지구 일사량의 4.3 배를 받습니다. JWST MIRI 의 12.8 μm 과 15 μm secondary-eclipse 측정(Greene 2023, Ducrot 2024)과 전체 thermal phase curve(Ducrot 2025)가 결합되어, 이 시스템에서 가장 깨끗한 &quot;맨 암석&quot; 답을 내놓고 있습니다. dayside brightness temperature 는 약 490–503 K, nightside emission 은 검출되지 않고, thermal phase offset 도 없습니다. ~0.3 bar 이상의 두께를 가지면서 현실적인 CO₂ 함량을 가진 대기는 3σ 수준에서 모두 배제됩니다.",
  "p_2":"<b>NearStars 시나리오 선택은 substellar 점 부근에 국지적인 신선한 마그마 지형을 갖는 대기 없는 ultramafic 암석 표면입니다.</b> 이는 Ducrot 2024 가 선호한 해석(미풍화 ultramafic 표면은 최근 또는 진행 중인 지질학적 재포장을 함의)과 부합하며, Grayver 2022 / Bolmont 2020 의 induction-heating &quot;exo-Io&quot; 정황을 통합한 것입니다. 대안으로 광화학 haze 와 성층권 inversion 을 갖는 순수 CO₂ 대기 시나리오도 데이터상 형식적으로는 허용되지만, 우주화학적 근거에서 선호되지 않습니다 — b 가 그런 CO₂ 대기를 가졌다면 두 칸 바깥의 c 에는 CO₂ 가 살아남을 수 없기 때문입니다.",

  "td_168":"Bolmont 2026 (2601.03408) — 내부 구조 의존. JWST nightside 비검출이 Φ 를 ~407 W/m² (Φ_2σ) 로 캡",
  "h2_169":"표면 합성",
  "p_170":"Ducrot 2024 는 결합 12.8 / 15 μm eclipse fit 을 통과하는 대기-또는-표면 모델을 두 개 찾아냈습니다. 하나는 광화학 haze 를 가진 두꺼운 순수 CO₂ 대기(성층권 inversion 을 만들고 emission 으로 나타나는 CO₂ feature 를 생성)이고, 다른 하나는 — 그리고 더 선호되는 — <b>미풍화 ultramafic 표면</b>을 가진 대기 없는 행성입니다. ultramafic 해석은 중요한 의미를 갖습니다. 달의 풍화된 basalt(regolith 노화)는 broadband albedo 는 낮지만 15 μm 영역의 emissivity 가 데이터와 맞지 않는 반면, 신선한(지질학적으로 어린) ultramafic 표면은 데이터에 부합합니다. 이는 진행 중이거나 최근에 일어난 지질학적 재포장을 함의합니다.",
  "p_171":"Ducrot 2025 phase curve 는 이 결론을 굳혔습니다. nightside emission 은 검출되지 않고(15 μm 에서 ≲39 ppm), phase offset 도 없으며, dayside flux 는 낮은 Bond albedo 와 비효율적인 열 재분배를 갖는 맨 암석 모델과 일치합니다. b 관련 문헌 전반의 결론은 한결같습니다. <b>b 는 맨, 신선하고 어두우며 뜨거운 암석입니다.</b>",
  "p_172":"<b>재포장 메커니즘.</b> 물리적으로 그럴듯한 두 가지 동인이 있습니다. (1) 공명 사슬에서 비롯되는 조석 가열입니다. Bolmont 2026 (2601.03408) 은 과거 추정치를 상당히 상향 조정했는데, b 의 측정된 핵 질량비 범위(Agol 2021. 약 21 wt%)와 가장 작은 그럴듯한 이심률 조합에서 표면 flux 는 <b>명목상 약 0.5–1 W/m²</b>로, Io 의 ~2 W/m² 에 견줄 만합니다. 더 높은 이심률 해는 10²–10³ W/m² 까지 올라가지만, JWST nightside 제약 (Gillon 2025. T_2σ ≤ 291 K → Φ_2σ ≤ 407 W/m²)에 의해 배제됩니다. 보수적인 ~0.5 W/m² 값만 잡아도 화성의 방사성 ~0.04 W/m² 를 한 자릿수 차이로 압도합니다. (2) 자기 induction heating (Grayver 2022, Cohen 2024) 은 행성이 항성풍 속을 가르면서 추가로 0.4–4 W/m² 를 보탭니다. 이 둘을 합친 열 예산은 부분 용융 화산활동을 충분히 유지할 수 있습니다. 시스템 나이가 7.6 Gyr 임을 감안하면, 표면은 지각 약점부에서 용암류로 끊임없이 새로워지고, 일사가 상부 지각을 solidus 쪽으로 가장 가깝게 미는 substellar 반구로 그 활동이 편향됩니다.",
  "p_173":"<b>색 선택.</b> 호스트별은 SED 피크가 1.1 μm 근처인 2566 K M8V dwarf 라, 인간 관찰자가 인지하는 표면 reflectance 는 본래 광물색과 무관하게 강하게 적색쪽으로 치우칩니다 (일반적인 M-dwarf 표면 조명 처리는 Domagal-Goldman 2010 참조). 신선한 ultramafic 표면(komatiite / olivine-pyroxene 유사체, broadband visible albedo ≈ 0.03–0.08) 에 가장 가까운 태양계 reference 는 수성의 어두운 dorsa 또는 어린 달 크레이터의 미풍화 floor 입니다. primary 는 <span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> (매우 어두운 ultramafic), accent 는 <span class=\"hex-chip\" style=\"background:#7a2a10\"></span><code>#7a2a10</code> (식어가는 용암의 적색)으로 substellar 사분면 쪽으로 치우치게 잡았습니다.",
  "p_174":"<b>산화철.</b> d 보다는 덜 두드러집니다. Ducrot 2024 의 &quot;fresh&quot; ultramafic 추론은 의미 있는 풍화를 적극적으로 배제하기 때문에, d 에 비해 산화철 patch 는 최소화합니다. 산화물이 존재한다면 표면 물질이 항성 UV 에 노출은 되지만 최근에 재포장되지 않은 terminator 와 antistellar 반구로 치우치도록 배치하는 것이 맞습니다.",
  "p_175":"<b>지형.</b> 기여하는 과정은 세 가지입니다. (1) 조석과 induction heating 이 구동하는 부분 용융 화산활동에 의한 지속적 재포장(Bolmont 2020, Grayver 2022)으로, 주로 substellar 반구에 신선한 용암류와 shield-volcano 지형이 형성됩니다. (2) ~8 Gyr 에 걸친 누적 충돌은 조석 고정된 frame 에서 leading 반구 쪽으로 편향되지만, 진행 중인 화산활동에 의해 부분적으로 지워집니다. (3) 강착 직후 ~500 Myr 단계의 마그마 바다 잔존 지형도 있습니다 (Piaulet 2025 §8 가 d 에 대해 제시한 논거를 b 로 확장한 것 — b 는 초기 에너지 flux 가 더 강했고, 그래서 마그마 바다를 더 오래 유지했을 것임). 기본 텍스처는 substellar 점에서 방사상으로 뻗어 나가는 용암류 채널이 보이고 trailing 반구 고지대 쪽으로 충돌 크레이터가 집중되는, 어둡고 유리질의 basalt 평원입니다.",
  "h2_176":"대기 합성",
  "p_177":"JWST MIRI 15 μm 광도측정 eclipse(Greene 2023, 다섯 visit, 8.7σ 검출) 가 Fp/F★ = 861 ± 99 ppm 을 내놓았고, 이는 dayside brightness temperature 약 503 +26/-27 K 에 해당합니다. Ih 2023 은 이 값으로 대기 질량을 제한했는데, CO₂ 가 100 ppm 이상 들어 있는 어떤 그럴듯한 대기도 0.3 bar 이상에서 3σ 로 배제되며, 화성형 6.5 mbar 순수 CO₂ 대기도 3σ 로 배제됩니다.",
  "p_178":"Ducrot 2024 는 12.8 μm eclipse(CO₂ 의 15 μm feature 의 in-band) 를 추가하여 12.8 μm 에서 Fp/F★ = 452 ± 86 ppm, 15 μm 에서 775 ± 90 ppm 을 얻었습니다(결합 재분석). 2σ 에서 살아남는 모델은 두 개입니다. 대기 없는 ultramafic 표면(선호)과, 성층권 inversion 을 만드는 광화학 haze 를 갖는 두꺼운 순수 CO₂ 대기입니다(단, 후자는 특정 haze 화학을 요구한다는 단서가 붙습니다).",
  "p_179":"Ducrot 2025 가 사실상 사건을 종결시켰습니다. MIRI 15 μm phase curve 는 dayside brightness temperature 490 ± 17 K, nightside flux 비검출 (F_night,max = 39 +55/−27 ppm), 측정 가능한 phase offset 부재를 보여줍니다. 표면 압력 ≥1 bar 와 의미 있는 greenhouse 효과를 갖는 대기 모델은 배제되고, b 는 &quot;어떤 실질적인 대기도 보유하지 않을 가능성이 높음&quot;으로 정리됩니다.",
  "p_180":"이론 쪽에서 두 편의 논문이 독립적인 근거로 airless 해석을 보강합니다. <b>2412.05188</b> (Chatterjee &amp; Pierrehumbert 2024) 은 b 를 수정된 cosmic shoreline 의 &quot;catastrophic escape&quot; 영역 깊숙이 위치시킵니다. 현재 b 의 XUV flux(지구 XUV 의 ~10³ 배, pre-main-sequence 초광도 시기에는 ~10⁴–10⁵ 배)에 맞서서는 지속적인 화산 outgassing 으로도 2차 대기를 재건할 수 없습니다. <b>1911.08878</b> (Turbet 2020) 은 지구형 핵 조성과 측정된 손실율 0.19%/Gyr 을 가정할 때 b 가 보유할 수 있는 최대 물 질량비가 ≤ 2% 임을 보여, b 가 &quot;오늘날 거의 완전히 건조&quot;라는 추론을 뒷받침합니다 — airless 표면과 일관됩니다.",
  "p_181":"<b>초기 수분 역산.</b> Gialluca 2024 (2405.02401) 는 &quot;b 는 airless, c 는 얇은 O₂ 대기 보유&quot;라는 결합 제약 아래 MCMC fit 을 수행하여 초기 표면 수분량을 8.2 +1.5/-1.0 지구 해양(1σ)으로 산출합니다. 메커니즘별로 풀어보면, ~3 TO 는 마그마 바다에 격리되고, ~4 TO 분량의 산소는 유체역학적 drag 로 손실되며, 건조화 이후 ~385 bar 가량이 건조 지각 산화로 소비되는 그림입니다. 역사적 baseline 인 Bolmont 2017 (1605.00616) 은 시스템 수명 동안 b 한 행성에서만 최대 13.5 EO 의 수소가 손실되었고, 산소 sink 가 비효율적이었다면 그 결과로 ~422 bar 까지 무기 기원 O₂ 가 축적될 수도 있었다고 봤습니다. Gialluca 의 정밀화는 그 상한과 하한을 동시에 좁혀 줍니다.",
  "p_182":"방법론적 단서가 하나 있습니다. <b>2601.12556</b> (Wirth, Powell &amp; Wordsworth 2026) 은 b 가 Λ ≤ 1 (Weak Temperature Gradient 가정이 깨지는 영역) 이라는 점을 짚어, 열 재분배만으로 b 의 대기에 부과하는 상한은 흔히 가정하는 것보다 약하다고 지적합니다. 다만 Ih 2023 의 0.3 bar 상한은 재분배가 아니라 15 μm CO₂ 분자 흡수를 직접 사용한 결과라 여전히 유효하고, Ducrot 2025 phase curve 는 재분배 자체를 직접 측정한 것이라, 이 단서가 airless 결정을 흔들지는 않습니다.",
  "p_183":"NearStars 에서는 <b>완전 airless</b> 해석을 채택합니다.",
  "li_184":"<b>압력.</b> 정확히 0 Pa 입니다. 12.8/15 μm 데이터와 호환되는 &quot;CO₂ + haze&quot; 시나리오는 이웃 행성 c 에서 CO₂ 가 부재한다는 사실(Zieba 2023) 과 충돌하므로 폐기합니다. 일사가 더 낮고 cosmic shoreline 에 더 가까운 c 가 CO₂ 를 유지하지 못한다면, b 가 그보다 두꺼운 대기를 보유한다는 것은 그럴듯하지 않습니다.",
  "li_185":"<b>표면 volatile 없음.</b> ~500 K 의 dayside 온도는 표면의 H₂O, CO₂, SO₂ 를 곧장 광분해하고 열적으로 desorb 시켜 버립니다. nightside 는 ~80 K 로 차갑지만 대기 수송이 없어 volatile 이 거기로 cold-trap 될 수도 없습니다.",
  "p_186":"<b>하늘 외관.</b> 대기가 없으니 Rayleigh scattering 도 없고 하늘색도 없습니다. 하늘은 모든 고도에서 균일하게 검습니다. TRAPPIST-1 이 각 크기 5.51° 로 하늘을 지배하고(지구에서 본 태양 각 크기의 10 배가 넘음), 하늘에서 단연 가장 큰 단일 천체입니다. 별빛은 짙은 적-오렌지(≈2566 K blackbody → CIE chromaticity 가 <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code> 근처)이고, 나머지 여섯 개의 TRAPPIST-1 행성은 합 시에 밝은 별처럼 보입니다. 그중 다음 외측 행성인 c 는 inferior conjunction 에서 ~0.7° 까지 커집니다.",
  "p_187":"<b>대기 없는 환경에서의 방사선.</b> 에너지 입자를 흡수해 줄 대기 컬럼이 없으니, b 의 표면은 M-dwarf 항성풍과 플레어 flux 를 고스란히 직격으로 받습니다. Garraffo 2017 (1706.04617) 과 Cohen 2014 (1405.7707) 의 시뮬레이션을 보면, 행성 자기장이 지구 수준의 세기를 가졌다고 해도 항성풍에 눌려 ~1.5 R_p 까지 압축되고, 행성이 sub-Alfvénic 영역을 가로지르는 동안(매 궤도의 약 50%) 자기력선이 표면까지 그대로 열려 버리는 경우가 잦습니다. 평균적인 플레어 활동 수준에서 Atri 2019 (1910.09871) 가 산출한 표면 선량은 ~80 Sv/yr 이고, 단일 플레어 스파이크에서는 1–10 Gy 까지 치솟습니다. Kerbalism cfg 관점에서 보면 b 는 &quot;능동 차폐 없이는 치명적&quot;인 방사선 등급으로, 표면에 머무는 승무원은 며칠이 아니라 수 분에서 수 시간 단위로 치사 선량을 누적하게 됩니다.",
  "h2_188":"자전 &amp; spin 합성",
  "p_189":"TRAPPIST-1 b 시스템 파라미터는 강한 동기 자전 구성을 강제합니다. 궤도 이심률은 작고(0.00622, Agol 2021), 황도경사각은 ≳7.6 Gyr 의 시스템 나이에 걸쳐 조석력으로 0 까지 damping 되었으며(Agol 2021 §6.2), 회전-궤도 공명은 가장 그럴듯하게 1:1 입니다. Vinson 2017 과 Makarov 2018 은 내측 TRAPPIST-1 행성들에 대해 3:2 대안도 탐색했지만, b 의 이심률에서는 1:1 이 압도적으로 선호된다고 결론지었습니다 (3:2 는 e ≳ 0.01 에서만 안정).",
  "p_190":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 1.5109 일 (130 540 s) 입니다. Kopernicus 에서 body 의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 동일하게 설정합니다.",
  "p_191":"<b>계절 없음.</b> obliquity = 0 이고 이심률 기반 libration 도 사실상 0 이라, substellar 점은 표면 frame 에서 고정됩니다.",
  "p_192":"<b>Spin-orbit drift.</b> Lustig-Yaeger 2024 (2409.12065) 는 공명 사슬의 n-body 세차로 인해 substellar 점에 작은 secular drift 가 생긴다고 계산합니다 — b 거리에서는 Myr 당 약 0.6° 로, KSP 게임플레이 시간 스케일에서는 무시할 수준이지만, cfg 에서는 &quot;substellar 점&quot;이 장기 평균이라는 주석을 달아 두는 것이 정직합니다. Revol 2024 (Bolmont 2026 / 2601.03408 에 인용)는 사슬 전체의 동역학을 고려할 때 b 에 대해 무려 69 년 짜리 &quot;sidereal day&quot; 가 나온다고 봅니다 — 마찬가지로 게임플레이상 무관하지만, 충실한 주석거리는 됩니다.",
  "p_193":"<b>조석 Love number 신호.</b> Bolmont 2020 (2002.02015) 은 TRAPPIST-1 b 의 TTV 가 비정상적으로 큰 행성 Love number (k₂ ≳ 1.5, 지구의 0.299 를 한참 웃돔) 를 시사한다고 봅니다. 이 값이 사실이라면, 이는 액체층 — 표면 합성에서 이미 채택한 substellar 마그마 저장소일 가능성이 높음 — 에 대한 <b>직접적인 동역학적 증거</b>가 됩니다. 신호 자체는 현재 TTV fit 의 noise floor 부근에 머물러 추론의 강도는 잠정적이지만, 재포장 해석을 독립적으로 뒷받침한다는 점이 중요합니다.",
  "p_194":"<b>자기 다이나모 기대치.</b> 7.6 Gyr 의 시스템 나이와 조석 고정된 1.51 일 자전(지구의 하루보다 한참 느림) 을 감안하면, b 의 내부 다이나모는 약한 multipolar 형태이거나 아예 없을 것으로 예상됩니다 (RM22 / 2203.01065 의 스케일링에 따르면 지구 쌍극자 모멘트의 ~0.08 배). 항성풍에서 비롯되는 induction 가열(Kislyakova 2018 / 1710.08761. 방사성 flux 의 17%) 이 심부 내부를 충분히 따뜻하게 유지해 핵이 동결되었을 가능성은 낮으므로, 약하게나마 다이나모가 잔존할 여지는 있습니다. cfg 에서는 적도 표면 자기장을 ~3 μT 로 낮은 신뢰도로 잡았습니다. 이 정도면 작은 자기권 &quot;버블&quot;을 만들어 내기는 하지만, 잦은 sub-Alfvénic 국면에서 항성풍을 표면에서 떼어 놓기에는 부족합니다.",
  "h2_195":"비주얼 스타일",
  "p_196":"표면과 대기 결정을 종합하면 다음과 같습니다.",
  "li_197":"<b>전역 색 팔레트.</b> 어두운 ultramafic body(<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> primary, <span class=\"hex-chip\" style=\"background:#7a2a10\"></span><code>#7a2a10</code> 용암-적색 accent)가 강렬한 적-오렌지 별빛 아래에서는 벌겋게 달궈진 charcoal 같은 행성으로 보입니다. substellar 반구에는 별빛을 받는 식어가는 용암 patch 가 보이고, antistellar 반구는 거의 새까맣습니다.",
  "li_198":"<b>Dayside.</b> 밝은 substellar 영역(~503 K, ~230 °C)과 텍스처가 살아 있는 저-기복 용암 평원입니다. cfg 의 PQS 에서 substellar 정점 밝기는 substellar 점 반경 ~15° 안에서 <span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code> (용암 적-오렌지)에 도달하도록 맞춥니다.",
  "li_199":"<b>Terminator band.</b> 조명이 직접적이고 재분배가 적어 폭이 좁습니다. 지형 대비는 큽니다 — basalt 능선과 충돌 크레이터 림이 스치는 2566 K 빛 아래로 긴 그림자를 드리웁니다.",
  "li_200":"<b>Nightside.</b> 차갑고(~80 K) 완전히 어두우며, 열적외 emission 만 있고 가시광 대역의 feature 는 없습니다. KSP nightside 조명은 ambient 값을 거의 0 으로 두는 것이 맞습니다. 유일한 가시광원은 이웃 행성에서 반사된 빛으로, c 는 합 시 mv ≈ −13 까지 도달해 지구의 달과 비슷합니다.",
  "li_201":"<b>대기 haze 없음.</b> Limb 가 또렷합니다 — scattering, 굴절, glow 모두 없고, 행성 디스크에서 우주로의 전환은 깔끔한 가장자리로 끝납니다.",
  "li_202":"<b>하늘의 별.</b> TRAPPIST-1 이 b 의 하늘에서 5.51° 를 차지합니다 (지구에서 본 태양 각 크기의 약 11 배). 색은 짙은 적-오렌지(≈2566 K → <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code>)이고, 표면 밝기는 수성에서 본 태양 정도(~4.25 S⊕)입니다. 1 μm 이상의 파장에서는 별이 두드러진 항성 플레어를 보일 만큼 밝기 때문에 (d 의 bibliography 에 있는 Howard 2023, TRAPPIST-1 플레어 통계는 Glazier 2020) KSP 에서 가끔 플레어 조명의 깜빡임을 넣으면 충실하지만 선택적인 디테일이 됩니다.",
  "li_203":"<b>하늘의 자매 행성.</b> b 와 내합인 시점에 TRAPPIST-1 c (다음 외측 행성) 가 각 크기 ~0.7° 로 보입니다 (지구 달의 1.5 배). 기하학적으로 거의 동일 평면이고, 이 conjunction 은 약 4 일 주기(b-c 회합 주기)로 돌아옵니다.",
  "li_204":"<b>마그마 바다 glow (선택).</b> substellar 표면이 정말 solidus 에 가깝다면, λ ≳ 2 μm 에서 매우 희미한 적-오렌지 thermal emission 이 KSP 의 깊은 nightside 비행 중 substellar 점에서 잠시 보일 수도 있습니다 — 우선순위 낮은 시각 이스터에그입니다.",
  "h2_205":"참고 문헌",
  "h3_206":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_207":"<b>2303.14849</b> Greene 2023 — JWST/MIRI F1500W secondary eclipse. 다섯 visit, 8.7σ 검출, Fp/F★ = 861 ± 99 ppm. dayside brightness temperature 약 503 K. b 를 맨 암석 후보로 처음 확립한 발견 논문.",
  "li_208":"<b>2412.11627</b> Ducrot 2024 — 12.8 + 15 μm MIRI eclipse 결합 분석. 살아남는 모델 두 개를 식별. 미풍화 ultramafic airless 표면(선호) 대 성층권 inversion 을 갖는 두꺼운 CO₂ + 광화학 haze. 표면 조성 결정과 &quot;fresh / geologically active&quot; 해석을 견인.",
  "li_209":"<b>2509.02128</b> Ducrot 2025 — b 와 c 의 JWST MIRI 15 μm thermal phase curve. dayside T = 490 ± 17 K, nightside emission 없음, phase offset 없음. ≳1 bar 대기를 결정적으로 배제하면서 airless 해석을 종결지음.",
  "li_210":"<b>2305.10414</b> Ih 2023 — b 의 대기 두께를 제한하는 자기일관 복사-대류 모델. Greene 2023 데이터만으로 0.3 bar 이상의 그럴듯한 CO₂ 대기를 3σ 로 배제.",
  "li_211":"<b>2509.02120</b> 3D GCM 기반 제약 (저자 익명화 — YAML 참조). eclipse 와는 호환되지만 phase curve 로 배제되는 대기군을 탐색. airless 결론을 강화.",
  "li_212":"<b>2412.05188</b> Chatterjee &amp; Pierrehumbert 2024 — 유체역학적 escape 물리를 포함한 cosmic shoreline. b 를 &quot;catastrophic escape&quot; 영역에 확고히 위치시켜, outgassing 으로도 2차 대기를 재건할 수 없음을 보임. JWST 데이터와 독립적인 airless 의 이론적 정당화.",
  "li_213":"<b>2601.03408</b> Bolmont 2026 — 전체 내부 구조와 JWST nightside 캡을 활용한 조석 가열 정밀화. <span class=\"field-tt\" data-ko-tip=\"조석 가열 표면 flux (W/m²). Io ≈ 2.\" data-en-tip=\"Tidal heating surface flux (W/m²). Io ≈ 2.\"><code>tidal_heating_w_m2</code></span> 를 0.04–0.2 에서 명목값 ~0.5–1 W/m² 로 상향 조정하게 만든 근거이며, JWST 하드 캡은 407 W/m² (Φ_2σ). b 에 대해 고이심률, 저점성 내부 모델은 관측적으로 배제됨을 확정.",
  "li_214":"<b>1911.08878</b> Turbet 2020 — 강한 일사를 받는 암석 행성의 질량-반지름- 수분 관계. 지구형 핵에서 b 의 보유 가능 수분이 ≤ 2% 임을 캡 처리하여, &quot;오늘날 거의 건조&quot; 추론을 뒷받침.",
  "li_215":"<b>2405.02401</b> Gialluca 2024 — b/c JWST 제약을 입력으로 한 MCMC 초기 수분 역산. 초기 수분량 8.2 +1.5/-1.0 TO. b 의 airless 해석을 강화하면서 c 의 얇은 O₂ 대기와도 자연스럽게 연결.",
  "li_216":"<b>2002.02015</b> Bolmont 2020 — b 의 TTV 에서 유도되는 조석 Love number. k₂ ≳ 1.5 라는 큰 값은 액체 마그마층의 동역학적 신호가 될 수 있음. 다만 현재 TTV fit 은 noise floor 부근에 있음.",
  "li_217":"<b>1605.00616</b> Bolmont 2017 — 초저온 왜성 주위 지구형 행성의 수분 손실에 대한 역사적 baseline. 시스템 나이 동안 b 한 행성에서만 최대 13.5 EO 의 수소가 손실되고, 최대 ~422 bar 의 무기 O₂ 가 축적될 수 있음. airless 해석의 토대 인용.",
  "li_218":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. 항성풍 속 행성 자기권의 MHD 시뮬레이션. sub-Alfvénic 영역에서는 행성 자기력선이 매 궤도의 ~50% 동안 표면까지 열림.",
  "li_219":"<b>2203.01065</b> RM22 (Internal Structures and Magnetic Moments) — 조석 고정 암석 행성에 대한 다이나모 스케일링이 지구 쌍극자 모멘트의 0.01–0.1 배를 내놓음.",
  "li_220":"<b>1910.09871</b> Atri 2019 — Stellar Proton Event 표면 선량 계산. 방사선 cfg 에 쓰는 이벤트별 선량 표를 제공.",
  "li_221":"<b>1710.08761</b> Kislyakova 2018 — 항성풍 유도 전자기 dissipation 을 통해 b/c/d 의 마그마 바다 가능성을 induction 가열이 견인함.",
  "li_222":"<b>1405.7707</b> Cohen 2014 — 거주가능대 행성의 자기권 구조와 대기 Joule 가열.",
  "h3_223":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_224":"<b>2309.07047</b> Lim 2023 — b 의 NIRISS transmission. stellar contamination 이 강함 (visit 1 의 spot, visit 2 의 faculae). cloud-free 수소 풍부 대기는 기각, 2차 대기는 제약 불가. TRAPPIST-1 b 의 transmission spectroscopy 가 stellar variability 에 의해 근본적으로 제한된다는 중요한 맥락 제공.",
  "li_225":"<b>2412.16541</b> 등시간 b/c transit 짝을 활용한 stellar contamination 보정. 모든 TRAPPIST-1 transmission 작업에 적용되는 방법론 논문으로, 직접 시각 정보를 주지는 않음.",
  "li_226":"<b>2507.02052</b> JWST MIRI 15 μm eclipse 의 균일 재분석 (frame-normalized PCA). Greene 2023 / Zieba 2023 reduction 의 교차 검증으로 일관된 결과 도출.",
  "li_227":"<b>1905.00512</b> Bolmont 2019 — b 와 c 의 조석 파라미터. 내부 Q 값에 따라 b 의 조석 가열 flux 를 0.04–0.2 W/m² 로 추정. &quot;재포장 메커니즘&quot; 논의에 활용.",
  "li_228":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d 가 주제이지만 서론에서 b 의 exo-Venus / exo-Dead 후보 지위를 리뷰. d 의 Phase 3 작업에서 이미 읽음.",
  "li_229":"<b>2601.12556</b> Wirth, Powell &amp; Wordsworth 2026 — 조석 고정된 암석 행성 대기의 해석적 모델링. b 가 Λ ≤ 1 (WTG 가정이 깨지는 영역)에 있어, 열 재분배 기반 상한은 약하다는 점을 짚음. 대기 합성 절에서 방법론적 단서로 인용. 다만 분자 흡수 기반 상한(Ih 2023)과 phase curve 직접 측정 (Ducrot 2025)은 WTG 와 독립이라 airless 결정을 바꾸지는 않음.",
  "li_230":"<b>2512.07695</b> Allen 2025 — JWST TRAPPIST-1 e/b Program 첫 관측. b 를 e 의 stellar-contamination proxy 인 airless 행성으로 활용. airless 해석을 재확인하지만 b 자체에 대한 새 제약은 없음.",
  "li_231":"<b>1806.10084</b> Unterborn 2018 — b/c 의 갱신된 조성 모델. 내부 축퇴성 논의. 작은 핵은 무수 조성과 일치하고, 큰 핵은 휘발성 envelope 을 요구. 수분 함량 문제에 대해서는 Agol 2021 + Turbet 2020 으로 대체됨.",
  "h3_232":"읽음 (instrument-only, 시각 정보 아님)",
  "li_233":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec 실험실 시계열 성능. 방법론만 다룸.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
