  "h2_132":"Surface synthesis",
  "p_133":"55 Cnc d is a massive (~3.8 M_Jup) cold gas giant with no surface; this section covers the cloud-top &quot;surface&quot;. At T_eq ≈ 103 K it is the system&#x27;s only <b>cold Jovian</b> — colder than Jupiter (~110 K) — firmly in the ammonia-cloud regime. Its great mass makes it the system&#x27;s dominant outer body, on a long ~13-year orbit far beyond the inner four planets (the f–d gap is ~4 AU).",
  "p_134":"The cloud-top palette is a cool pale cream-grey (<span class=\"hex-chip\" style=\"background:#dcdcd0\"></span><code>#dcdcd0</code>) — deep ammonia clouds with NH₄SH and water clouds beneath, like the Solar System giants but cooler and slightly greyer. Methane absorption at this temperature can add a faint cool-blue tint to the limb (<span class=\"hex-chip\" style=\"background:#cdd8e4\"></span><code>#cdd8e4</code>). The super-metal-rich host suggests an enriched, high-contrast atmosphere. Under the 5196 K host light — now a small, bright, 0.09°-diameter point in d&#x27;s sky — the planet reads as a deep, high-contrast, cool-toned banded giant: the most classically &quot;gas giant&quot; world of the system.",
  "p_135":"Morphology: deep zonal banding with high belt/zone contrast (cold giants show strong banding), optional long-lived storm vortices, and — as an artistic option — a Saturn-like ring system (see below).",
  "h2_136":"Atmosphere synthesis",
  "p_137":"55 Cnc d has a deep, massive H₂/He envelope. At ~100 K the visible condensates are ammonia ice (NH₃), with ammonium hydrosulfide (NH₄SH) and water clouds deeper, plus possible gaseous methane producing a cool-blue absorption tint — the classic cold-giant cloud chemistry.",
  "li_138":"<b>Pressure / structure.</b> A deep H₂/He atmosphere with an NH₃-ice cloud deck, NH₄SH and water clouds below; no discrete surface. The great mass gives a deep, high-pressure interior.",
  "li_139":"<b>Composition.</b> H₂/He primary with NH₃, NH₄SH, H₂O, and possible CH₄; the super-metal-rich host suggests enhanced heavy-element abundance.",
  "li_140":"<b>Sky appearance.</b> From the upper atmosphere the sky would be a cool pale cream-blue, with the host star a small bright point (0.09°) — the dimmest stellar illumination of any 55 Cnc planet, plus the distant M-dwarf companion 55 Cnc B as a faint orange-red second sun far out at ~1065 AU.",
  "h2_141":"Rotation &amp; spin synthesis",
  "p_142":"At 5.6 AU on a ~4799-day orbit, 55 Cnc d is far outside any tidal-locking regime and rotates freely and fast, like the Solar System giants. The orbit is mildly eccentric (e ≈ 0.09; Moutou 2025), though both the eccentricity and the period are uncertain because the ~13-year orbit is entangled with the star&#x27;s ~10.5-year magnetic cycle. No rotation period has been measured.",
  "p_143":"<b>KSP implementation note.</b> The cfg adopts a fast Jovian rotation (~10 h order, Jupiter-analog) for visual banding. This is a tie-break; flag as unconstrained.",
  "p_144":"<b>No seasons.</b> Negligible obliquity → no axial seasons; the mild eccentricity gives only a tiny insolation swing on an already very low insolation (0.019 S⊕).",
  "h2_145":"Visual styling",
  "li_146":"<b>Global appearance.</b> A massive, cool, high-contrast banded gas giant at 5.6 AU — the system&#x27;s dominant outer body and most classically &quot;gas giant&quot; world, optionally crowned with a Saturn-like ring.",
  "li_147":"<b>Cloud decks.</b> Deep zonal banding in cool pale cream-greys (<span class=\"hex-chip\" style=\"background:#dcdcd0\"></span><code>#dcdcd0</code>), with high belt/zone contrast and optional long-lived storm vortices.",
  "li_148":"<b>Limb / haze.</b> A cool pale-blue, methane-tinged limb (<span class=\"hex-chip\" style=\"background:#cdd8e4\"></span><code>#cdd8e4</code>).",
  "li_149":"<b>Ring system (optional, artistic).</b> As the system&#x27;s ring-candidate body, d may be rendered with a Saturn-like icy ring (<span class=\"hex-chip\" style=\"background:#e8e4d8\"></span><code>#e8e4d8</code>, opacity 0.6, ~1.5–4.5 R_Jup, multi-ring with a Cassini-like gap). At ~100 K a water-ice ring is thermally stable. This is an <b>explicit artistic option, not an observation</b> (<code>ring_observed = false</code>) — included per the ring/disk policy as an allowed aesthetic choice for a cold giant, never presented as detected.",
  "li_150":"<b>Star in sky.</b> 55 Cnc A subtends only 0.090° — about ⅙ the Sun&#x27;s angular size from Earth — a small bright warm-orange point. The illumination is dim (0.019 S⊕, ~2% of Earth&#x27;s).",
  "li_151":"<b>Sister planets in sky.</b> The inner four planets are all close to the star from d&#x27;s vantage; the temperate f (inward at 0.80 AU) is the nearest, a faint point. The M-dwarf companion 55 Cnc B (~1065 AU) is a faint orange-red second sun far beyond d&#x27;s orbit.",
  "h2_152":"Canonical alternatives",
  "p_153":"55 Cnc d&#x27;s orbit is the system&#x27;s most contested signal, and the cfg makes a documented choice between two literature periods. The ring is handled separately as an explicit artistic option (flagged <code>ring_observed = false</code>) rather than a divergence, since no observation claims a ring either way.",
  "h3_154":"Diverged cfg picks",
  "th_155":"Field",
  "th_156":"Gameplay (in cfg)",

  "th_158":"Why diverged",
  "td_159":"<span class=\"field-tt\" data-ko-tip=\"항성일 기준 자전 주기 (일).\" data-en-tip=\"Sidereal rotation period (days).\"><code>sidereal_period_days</code></span> / <span class=\"field-tt\" data-ko-tip=\"궤도 긴반지름 (AU, 1 AU = 지구–태양 거리).\" data-en-tip=\"Orbital semi-major axis in AU (1 AU = Earth–Sun distance).\"><code>semi_major_axis_au</code></span>",
  "td_160":"4799 d / 5.6 AU (Moutou 2025)",
  "td_161":"5574 d / 5.96 AU (Bourrier 2018)",
  "td_162":"The two recommended-grade RV fits differ by 9σ in period because d&#x27;s ~13-yr orbit is entangled with the star&#x27;s ~10.5-yr magnetic cycle, and the result is sensitive to how the cycle is modeled (Keplerian vs GPR) and which instruments are combined. The cfg adopts the most recent value (Moutou 2025, 4799 d) as Phase 2 recommended; the Bourrier 2018 5574 d orbit is preserved as a cfg variant. Other studies span 4825–5285 d. This is a genuine measurement disagreement, not a gameplay choice — flagged so the cfg writer ships the recommended orbit but knows the alternative exists.",
  "h2_163":"Bibliography",
  "h3_164":"Read (visual-informative, drove decisions above)",
  "li_165":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, arXiv:2510.11523). Latest RV refit: planet d P = 4799 d (9σ shorter than Bourrier 2018&#x27;s 5574 d), a = 5.6 AU, e = 0.0913, M sin i = 1214 ± 41 M⊕ ≈ 3.8 M_Jup; notes the orbit is entangled with the ~10.5-yr magnetic cycle and a possible additional outer body (long-term RV trend, P &gt; 24 yr). <b>Phase 2 recommended orbit + mass.</b> Postdates the model cutoff — value-checked against the cached text.",
  "li_166":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, arXiv:1107.1936. Host L = 0.582 L☉ → the T_eq derivation.",
  "h3_167":"Read (context / methodology, not decision-driving)",
  "li_168":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, arXiv:1807.04301. Refit including the magnetic-cycle Keplerian: d at P = 5574 d, a = 5.957 AU, e = 0.13, M sin i = 991.6 M⊕ — the documented-alternative orbit (see Canonical alternatives).",
  "li_169":"<b>Marcy G. W. et al. 2002</b> — <code>2002ApJ...581.1375M</code>. Discovery paper for d (one of the longest-period giants known at the time); historical context.",
  "h3_170":"Read (instrument-only, not visual-informative)",
  "li_171":"(none specific to d beyond the system-level papers above.)",
  "h3_172":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_173":"Long-period-signal decomposition papers (Endl 2012, Baluev 2015, Rosenthal 2021, Laliotis 2023 — all give different d periods, captured qualitatively in the Canonical alternatives) and dynamical-stability proceedings. Full filtered bib in <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_174":"Open items for follow-up",
  "li_175":"<b>Orbit disambiguation.</b> d&#x27;s period is contested (4799 d Moutou 2025 vs 5574 d Bourrier 2018, range 4825–5285 d elsewhere) because of the magnetic-cycle entanglement. A homogeneous long-baseline nIR + optical RV campaign with a continuous activity indicator (Moutou 2025 Open items) would settle it; the cfg should re-derive a, T_eq, and the angular diameters if the period is revised.",
  "li_176":"<b>Possible additional outer body.</b> Moutou 2025 finds a long-term RV trend (0.84 m/s/yr) suggesting another body with P &gt; 24 yr; if confirmed, a sixth/seventh planet Decisions entry may be needed.",
  "li_177":"<b>Radius.</b> No measured radius (non-transiting); ~1.1 R_Jup is estimate-only. An inclination/true-mass or direct-imaging constraint would refine it.",
  "li_178":"<b>Ring variants.</b> The Saturn-like ring is an artistic option (<code>ring_observed = false</code>). Ship both a no-ring and a ringed cfg variant; the ring is never to be presented as detected.",
  "h2_179":"Related",

  "p_1":"55 Cnc d 는 이 계의 차가운 외곽 거대 행성입니다: 55 Cnc A 주위를 긴 ~4799일(~13.1년) 이심(e ≈ 0.09) 궤도로 5.6 AU 에서 도는 ~3.8 M_Jup (M sin i ≈ 1214 M⊕, Moutou 2025)의 거대 가스 행성입니다. 역사상 가장 먼저 발견된 장주기 거대 행성 중 하나로(Marcy 외 2002), 당시 알려진 가장 긴 궤도 주기에 속했습니다. 그 정확한 궤도는 이 계에서 가장 논쟁적인 신호로 남아 있는데, 주기가 별의 ~10.5년 자기 주기와 얽혀 있기 때문입니다—Bourrier 2018 은 5574 d / ~6 AU, Moutou 2025 는 4799 d / 5.6 AU 에 두었고, 다른 연구들은 4825–5285 d 에 걸칩니다. 통과하지 않으므로 측정된 반지름이 없습니다. ~3.8 M_Jup 거대 행성이라면 ~1.1–1.2 R_Jup 근처의 반지름이 표준 추정입니다(무거운 거대 행성은 약간 압축됨). 모성 광도 L = 0.582 L☉ 로 평형 온도는 T_eq(A=0) ≈ 103 K 가 유도됩니다—목성보다 차가운 진정한 <b>차가운 목성형</b>으로, 암모니아 구름과 가능한 고리/위성계가 안정한 영역에 있습니다.",
  "p_2":"<b>NearStars 시나리오 선택: 5.6 AU 의 차갑고 무거운 목성형(~3.8 M_Jup, ~100 K)으로, 차가운 차분한 색조의 깊은 암모니아-구름 거대 가스 행성으로 렌더링—그리고 디스크-색 / 고리 정책에 따라 이 계의 고리-후보 천체로서 선택적 예술적 토성 같은 고리계(관측 안 됨으로 플래그)를 가짐.</b> 질량은 Msini(RV), 반지름은 추정-전용이며, 고리는 관측이 아니라 명시적 예술 옵션입니다.",

  "h2_132":"Surface synthesis",
  "p_133":"55 Cnc d 는 표면 없는 무거운(~3.8 M_Jup) 차가운 거대 가스 행성이라, 이 섹션은 구름 꼭대기 &quot;표면&quot;을 다룹니다. T_eq ≈ 103 K 에서 그것은 이 계 유일의 <b>차가운 목성형</b>—목성(~110 K)보다 차가워—암모니아-구름 영역에 확고히 속합니다. 그 큰 질량은 d 를 안쪽 네 행성 한참 너머 긴 ~13년 궤도에서 계의 지배적 외곽 천체로 만듭니다(f–d 간극은 ~4 AU).",
  "p_134":"구름 꼭대기 팔레트는 차가운 옅은 크림-회색(<span class=\"hex-chip\" style=\"background:#dcdcd0\"></span><code>#dcdcd0</code>)입니다—그 아래 NH₄SH 와 물 구름을 가진 깊은 암모니아 구름으로, 태양계 거대 행성과 비슷하나 더 차갑고 약간 더 회색입니다. 이 온도의 메탄 흡수가 림에 희미한 차가운-청색 색조(<span class=\"hex-chip\" style=\"background:#cdd8e4\"></span><code>#cdd8e4</code>)를 더할 수 있습니다. 초금속 풍부 모성은 풍부하고 고대비의 대기를 시사합니다. 5196 K 모성 빛 아래—이제 d 의 하늘에서 작고 밝은 0.09° 지름 점인—행성은 깊고 고대비의 차가운-색조 띠 거대 행성으로 읽힙니다: 계에서 가장 고전적으로 &quot;거대 가스 행성&quot;다운 세계입니다.",
  "p_135":"형태: 높은 벨트/존 대비의 깊은 띠 모양(차가운 거대 행성은 강한 띠를 보임), 선택적 장수명 폭풍 와류, 그리고—예술 옵션으로—토성 같은 고리계(아래 참조).",
  "h2_136":"Atmosphere synthesis",
  "p_137":"55 Cnc d 는 깊고 무거운 H₂/He 외피를 가집니다. ~100 K 에서 가시 응결물은 암모니아 얼음(NH₃)이며, 더 깊이 암모늄 하이드로설파이드(NH₄SH)와 물 구름, 그리고 차가운-청색 흡수 색조를 만드는 가능한 기체상 메탄이 있습니다—고전적 차가운-거대-행성 구름 화학입니다.",
  "li_138":"<b>압력 / 구조.</b> NH₃-얼음 구름 덱, 그 아래 NH₄SH 와 물 구름을 가진 깊은 H₂/He 대기. 별개 표면 없음. 큰 질량이 깊고 고압인 내부를 줍니다.",
  "li_139":"<b>조성.</b> H₂/He 주체에 NH₃, NH₄SH, H₂O, 가능한 CH₄. 초금속 풍부 모성은 향상된 중원소 풍부도를 시사.",
  "li_140":"<b>하늘 외관.</b> 상층 대기에서 하늘은 차가운 옅은 크림-청색으로, 모성은 작고 밝은 점(0.09°)—어느 55 Cnc 행성보다 가장 어두운 항성 조명에, ~1065 AU 멀리의 M형 왜성 동반성 55 Cnc B 가 희미한 주황-적색 두 번째 태양으로 더해집니다.",
  "h2_141":"Rotation &amp; spin synthesis",
  "p_142":"5.6 AU 에서 ~4799일 궤도로, 55 Cnc d 는 어떤 조석 고정 영역에서도 한참 벗어나 태양계 거대 행성처럼 자유롭고 빠르게 자전합니다. 궤도는 약하게 이심(e ≈ 0.09. Moutou 2025)이나, ~13년 궤도가 별의 ~10.5년 자기 주기와 얽혀 있어 이심과 주기 둘 다 불확실합니다. 자전 주기는 측정되지 않았습니다.",
  "p_143":"<b>KSP 구현 노트.</b> cfg 는 시각적 띠 모양을 위해 빠른 목성형 자전(~10시간 자릿수, 목성 유사체)을 채택합니다. 이는 tie-break 이며 미제약으로 플래그합니다.",
  "p_144":"<b>계절 없음.</b> 무시할 만한 자전축 경사 → 축 계절 없음. 약한 이심은 이미 매우 낮은 일사(0.019 S⊕)에 작은 일사 변동만 줍니다.",
  "h2_145":"Visual styling",
  "li_146":"<b>전체 외관.</b> 5.6 AU 의 무겁고 차가운 고대비 띠 거대 가스 행성—이 계의 지배적 외곽 천체이자 가장 고전적으로 &quot;거대 가스 행성&quot;다운 세계로, 선택적 토성 같은 고리를 두를 수 있습니다.",
  "li_147":"<b>구름 덱.</b> 차가운 옅은 크림-회색(<span class=\"hex-chip\" style=\"background:#dcdcd0\"></span><code>#dcdcd0</code>)의 깊은 띠 모양으로, 높은 벨트/존 대비와 선택적 장수명 폭풍 와류.",
  "li_148":"<b>림 / 헤이즈.</b> 차가운 옅은-청색의 메탄 색조 림(<span class=\"hex-chip\" style=\"background:#cdd8e4\"></span><code>#cdd8e4</code>).",
  "li_149":"<b>고리계(선택, 예술).</b> 이 계의 고리-후보 천체로서 d 는 토성 같은 얼음 고리(<span class=\"hex-chip\" style=\"background:#e8e4d8\"></span><code>#e8e4d8</code>, 불투명도 0.6, ~1.5–4.5 R_Jup, Cassini 같은 간극을 가진 다중-고리)로 렌더링될 수 있습니다. ~100 K 에서 물-얼음 고리는 열적으로 안정합니다. 이는 <b>관측이 아니라 명시적 예술 옵션</b>(<code>ring_observed = false</code>)으로—고리/디스크 정책에 따라 차가운 거대 행성의 허용된 미적 선택으로 포함되며, 결코 검출된 것으로 제시되지 않습니다.",
  "li_150":"<b>하늘의 별.</b> 55 Cnc A 는 0.090° 만 차지—지구에서 본 태양 각지름의 약 1/6—작고 밝은 따뜻-주황 점. 조명은 어둡습니다(0.019 S⊕, 지구의 ~2%).",
  "li_151":"<b>하늘의 자매 행성.</b> 안쪽 네 행성은 d 의 시점에서 모두 별에 가깝습니다. 온대 f(0.80 AU 안쪽)가 가장 가까운, 희미한 점입니다. M형 왜성 동반성 55 Cnc B(~1065 AU)는 d 궤도 한참 너머 희미한 주황-적색 두 번째 태양입니다.",
  "h2_152":"Canonical alternatives",
  "p_153":"55 Cnc d 의 궤도는 이 계에서 가장 논쟁적인 신호이며, cfg 는 두 문헌 주기 사이에서 기록된 선택을 합니다. 고리는 어느 관측도 고리를 주장하지 않으므로 발산이 아니라 명시적 예술 옵션(<code>ring_observed = false</code> 플래그)으로 별도로 다룹니다.",
  "h3_154":"Diverged cfg picks",
  "th_155":"Field",
  "th_156":"Gameplay (in cfg)",
  "th_157":"Canonical alternative",
  "th_158":"Why diverged",
  "td_159":"<span class=\"field-tt\" data-ko-tip=\"항성일 기준 자전 주기 (일).\" data-en-tip=\"Sidereal rotation period (days).\"><code>sidereal_period_days</code></span> / <span class=\"field-tt\" data-ko-tip=\"궤도 긴반지름 (AU, 1 AU = 지구–태양 거리).\" data-en-tip=\"Orbital semi-major axis in AU (1 AU = Earth–Sun distance).\"><code>semi_major_axis_au</code></span>",
  "td_160":"4799 d / 5.6 AU(Moutou 2025)",
  "td_161":"5574 d / 5.96 AU(Bourrier 2018)",
  "td_162":"두 추천-급 RV 피팅이 주기에서 9σ 차이가 나는데, d 의 ~13년 궤도가 별의 ~10.5년 자기 주기와 얽혀 있고 결과가 주기 모델링 방식(케플러 vs GPR)과 결합 기기 선택에 민감하기 때문입니다. cfg 는 가장 최근값(Moutou 2025, 4799 d)을 Phase 2 추천으로 채택하고, Bourrier 2018 의 5574 d 궤도를 cfg 변종으로 보존합니다. 다른 연구는 4825–5285 d 에 걸칩니다. 이는 게임플레이 선택이 아니라 실제 측정 불일치입니다—cfg 작성자가 추천 궤도를 배포하되 대안의 존재를 알도록 플래그합니다.",
  "h2_163":"Bibliography",
  "h3_164":"Read (visual-informative, drove decisions above)",
  "li_165":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, arXiv:2510.11523). 최신 RV 재피팅: 행성 d P = 4799 d(Bourrier 2018 의 5574 d 보다 9σ 짧음), a = 5.6 AU, e = 0.0913, M sin i = 1214 ± 41 M⊕ ≈ 3.8 M_Jup. 궤도가 ~10.5년 자기 주기와 얽히고 가능한 추가 외곽 천체(장기 RV 추세, P &gt; 24 yr)가 있음을 지적. <b>Phase 2 추천 궤도 + 질량.</b> 모델 컷오프 이후 출판 — 캐시 텍스트에 대조 확인.",
  "li_166":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, arXiv:1107.1936. 모성 L = 0.582 L☉ → T_eq 유도.",
  "h3_167":"Read (context / methodology, not decision-driving)",
  "li_168":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, arXiv:1807.04301. 자기-주기 케플러를 포함한 재피팅: d 가 P = 5574 d, a = 5.957 AU, e = 0.13, M sin i = 991.6 M⊕ — 기록된-대안 궤도(Canonical alternatives 참조).",
  "li_169":"<b>Marcy G. W. et al. 2002</b> — <code>2002ApJ...581.1375M</code>. d 의 발견 논문 (당시 알려진 가장 긴 주기의 거대 행성 중 하나). 역사적 맥락.",
  "h3_170":"Read (instrument-only, not visual-informative)",
  "li_171":"(위 계-수준 논문 외에 d 에 특정한 항목 없음.)",
  "h3_172":"Not read — no arXiv preprint or low-priority (~15 papers)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
