  "h2_70":"Surface synthesis",
  "p_71":"The surface is designed, not observed, so the synthesis job here is self-consistency rather than literature reconciliation. Adopting Mercury&#x27;s mass and radius wholesale buys a physically tested package: an iron-rich ~5.5 g/cc interior, 0.38 g surface gravity, and a 4.3 km/s escape velocity that guarantees airlessness at this temperature. The design deliberately avoids inventing novel physical parameters that would each need separate justification.",
  "p_72":"<b>Thermal regime — baked rock, not lava.</b> At 2.55 S⊕ the equilibrium temperature is ~352 K (zero albedo) and the substellar dayside peak in the slow-rotation airless regime is ~490 K — hot enough to bake, two full regimes short of the ~1300 K silicate solidus. The physical-plausibility gate therefore forces the bare-rock reading; a lava or magma-pond rendering would be indefensible for this body and is explicitly excluded.",

  "p_79":"At a = 0.4 AU around 0.78 M☉ the tidal despinning timescale is short enough (small body, close orbit) that the primordial spin is gone — unlike b at 0.224 AU whose synthesis picked a free rotator on lock-timescale grounds, c&#x27;s smaller mass and the 1.8 Gyr age put it in the despun regime. The end state at e = 0.04 is then either synchronous 1:1 or a spin–orbit resonance.",

  "h2_81":"Visual styling",
  "li_82":"<b>Global appearance.</b> A gray, heavily cratered Mercury-analog (<span class=\"hex-chip\" style=\"background:#8d8781\"></span><code>#8d8781</code> base tint) with sharp airless shadows and a crisp terminator, lit noticeably orange by the 5143 K K0.5 V primary — the same illuminant shift that warms the whole 40 Eri A system palette relative to Sol.",
  "li_83":"<b>No atmosphere effects.</b> Black sky (<span class=\"hex-chip\" style=\"background:#000000\"></span><code>#000000</code>), no limb haze, no scattering — the rendering contrast to its two neighbors is the point: b is a thick-hazed hot super-Earth, d is a thin-atmosphere frost world, c is the airless control between them.",
  "li_84":"<b>Sky companions.</b> As everywhere in the 40 Eri system, the white-dwarf B / red-dwarf C pair (~400 AU out) appear as brilliant point companions in the black sky.",
  "li_85":"<b>Texture-pass notes.</b> Lobate scarps, ray craters, and slightly reduced crater density vs Mercury (1.8 Gyr vs 4.5 Gyr surface age).",
  "h2_86":"Canonical alternatives",
  "p_87":"<b>The canonical reading is no planet.</b> Unlike b (a real, refuted detection) there has never been any observational claim at this period — c is pure system-completion design. The canonical 40 Eridani A system in current catalogs contains zero confirmed planets; NearStars renders b, c, and d as a documented-divergence ensemble for gameplay variety and the <i>Star Trek</i> / <i>Project Hail Mary</i> cultural anchors.",

  ko: {
  "p_1":"40 Eridani A c 는 <b>완전히 지어낸 행성</b>입니다. 검출도, 후보 신호도, 문헌상의 주장도 뒤에 없습니다 — 이 천체가 존재하는 이유는 오직 NearStars Phase 4 보드가 문화적으로 요구된 b(&quot;Vulcan&quot;/&quot;Erid&quot;, 그 자체가 철회된 검출이지만 documented divergence 로 유지됨)와 d 의 <i>Project Hail Mary</i> Threeworld 아날로그 사이에 동역학적으로 그럴듯한 필러를 원했기 때문입니다. 아래의 모든 물리 행은 측정값이 아니라 설계값이며, 천체 전체가 <code>db/planets_curated.json</code> 에서 <code>method: theoretical</code> 로 표기됩니다.",
  "p_2":"<i>근거가 있는</i> 것은 동역학입니다. 궤도(a = 0.4 AU, e = 0.04, P = 104.62 d)는 먼저 선택된 뒤, 0.78 M☉ K0.5 V 주성 주위 세 행성 전체 시스템에 대한 REBOUND 안정성 적분으로 검증되었습니다. WHFast 로 10⁵ 년, 상대 에너지 오차 4.6×10⁻¹¹, MEGNO = 2.00(정칙, 비카오스)로 세 천체 모두 차분한 이심률 진화 속에 안정으로 판정되었습니다 (<code>phase3/stability-sim/results/40_eridani_summary.json</code>). 궤도는 b 바깥의 3:1 주기비 근처, d 안쪽의 2:1 근처에 자리하며 — 공명에 가깝지만 의도적으로 공명 안에는 들지 않게 배치되었습니다.",
  "p_3":"물리 설계는 <b>수성 아날로그</b>입니다. 0.055 M⊕ 와 0.38 R⊕ 는 두 자리까지 수성 자체의 질량과 반지름이며, 그 덕분에 유도되는 밀도(~5.5 g/cc), 표면 중력(0.38 g), 탈출 속도(4.3 km/s)가 자동으로 수성 값에 내려앉습니다. 0.408 L☉ 주성 주위 0.4 AU 에서 복사 조도는 2.5 S⊕ 로 — 원일점의 수성보다 따뜻하고 근일점의 수성보다는 차가워 — 수성 판독은 자기 일관적입니다. 대기 없이 구워지고 크레이터로 뒤덮인 맨암석 세계입니다. 물리적 타당성 게이트에 따르면 이것은 용암 세계가 <b>아닙니다</b>(평형 온도 ~352 K 는 규산염 용융점 근처에도 못 미치고, 적용될 내부 가열 메커니즘도 없습니다).",
  "p_4":"<b>NearStars 시나리오 선택: 3:2 자전-공전 공명에 든 수성 아날로그 무대기 암석 — 크레이터로 뒤덮인 현무암-회색 레골리스에 옅은 소듐 외기권을 두르고, 낮면은 구워지고 밤면은 얼어붙으며, K0.5 V 주성의 주황빛 아래에 놓입니다.</b>",

  "h2_70":"Surface synthesis",
  "p_71":"표면은 관측된 것이 아니라 설계된 것이므로, 여기서의 합성 작업은 문헌 정합이 아니라 자기 일관성입니다. 수성의 질량과 반지름을 통째로 채택하면 물리적으로 검증된 패키지를 얻습니다 — 철-풍부 ~5.5 g/cc 내부, 0.38 g 표면 중력, 그리고 이 온도에서 무대기를 보장하는 4.3 km/s 탈출 속도입니다. 설계는 각각 별도의 정당화가 필요한 새로운 물리 파라미터를 지어내는 일을 의도적으로 피합니다.",
  "p_72":"<b>열적 영역 — 용암이 아니라 구워진 암석.</b> 2.55 S⊕ 에서 평형 온도는 ~352 K(제로 알베도)이고, 저속 자전 무대기 영역에서 항성직하 낮면 정점은 ~490 K 로 — 굽기에는 충분히 뜨겁지만 ~1300 K 규산염 용융점에서 두 영역이나 모자랍니다. 따라서 물리적 타당성 게이트가 맨암석 판독을 강제합니다. 이 천체에 용암이나 마그마 못 렌더링은 옹호 불가하며 명시적으로 배제됩니다.",
  "p_73":"<b>크레이터투성이 수성 아날로그 지형.</b> 대기도 없고 내부 가열 메커니즘도 없으므로 표면 기록은 충돌이 지배합니다 — 심한 크레이터, 전지구 열수축에서 비롯한 엽상 단층애(이 질량대에서 수성의 상징적 구조 지형), 그리고 본드 알베도 ~0.09 까지 어두워진 우주 풍화 레골리스입니다. 1.8 Gyr 시스템 나이(호스트 합성에 채택된 Bond 2017 IFMR)는 4.5 Gyr 수성보다 크레이터가 다소 적음을 뜻하며, 이는 cfg 필드가 아니라 텍스처 패스용 메모입니다.",
  "p_74":"<b>낮-밤 대비.</b> 3:2 공명은 궤도 주기 두 배의 태양일(~209 d)을 주므로 각 반구가 몇 달 동안 구워졌다가 다시 몇 달 동안 얼어붙습니다 — 수성의 극단적 열 순환이 약간 더 높은 복사 조도에서 재현됩니다.",
  "h2_75":"Atmosphere synthesis",
  "p_76":"합성할 것이 없습니다. 4.3 km/s 탈출 속도와 ~350–490 K 낮면 온도에서 열적 (Jeans) 탈출이 탈가스된 휘발성 물질 재고를 지질학적으로 짧은 시간 척도에 전부 벗겨냅니다 — 수성에서와 똑같습니다. cfg 는 표면 압력을 0 으로 설정합니다.",
  "p_77":"<b>유일한 장식으로서의 소듐 외기권.</b> 수성은 태양풍과 미소 운석에 의해 레골리스에서 튀어나온 희박하고 광학적으로 무시할 만한 소듐 외기권을 유지합니다. 같은 메커니즘이 이곳에서도 K 왜성 항성풍 아래 작동합니다. 이는 조성 행에 플레이버로 기록될 뿐 — 압력도, 시각적 두께도 없고, 향후 아트 패스에서 옅은 방출 메모가 될 가능성 외에는 cfg 렌더링도 없습니다.",
  "h2_78":"Rotation &amp; spin synthesis",
  "p_79":"0.78 M☉ 주위 a = 0.4 AU 에서 조석 감쇠 시간 척도는 충분히 짧아(작은 천체, 가까운 궤도) 원시 자전은 사라졌습니다 — 0.224 AU 의 b 가 고정 시간 척도를 근거로 자유 자전체를 택했던 것과 달리, c 의 더 작은 질량과 1.8 Gyr 나이는 이 천체를 감쇠된 영역에 둡니다. 그렇다면 e = 0.04 에서 최종 상태는 동기 1:1 이거나 자전-공전 공명입니다.",
  "p_80":"<b>interesting-first 선택: 수성의 3:2.</b> 0 이 아닌 설계 이심률에서 3:2 자전-공전 공명으로의 포획은 수성 선례의 결과이며, 시각적으로도 더 흥미로운 쪽입니다 — 표면의 모든 점이 낮과 밤을 모두 겪고, 명암 경계가 이동하며, 열 순환이 위의 구워짐/얼어붙음 대비를 구동합니다. 자전 주기는 정확히 104.62-d 궤도 주기의 2/3(~69.7 d, 1674 h)입니다.",
  "h2_81":"Visual styling",
  "li_82":"<b>전체 외관.</b> 회색의 크레이터로 뒤덮인 수성 아날로그(<span class=\"hex-chip\" style=\"background:#8d8781\"></span><code>#8d8781</code> 기본 색조)로, 무대기의 날카로운 그림자와 선명한 명암 경계를 지니며, 5143 K K0.5 V 주성이 눈에 띄게 주황빛으로 비춥니다 — 40 Eri A 시스템 전체 팔레트를 Sol 대비 따뜻하게 만드는 바로 그 광원 이동입니다.",
  "li_83":"<b>대기 효과 없음.</b> 검은 하늘(<span class=\"hex-chip\" style=\"background:#000000\"></span><code>#000000</code>), 림 헤이즈 없음, 산란 없음 — 두 이웃과의 렌더링 대비가 핵심입니다. b 는 두꺼운 헤이즈의 뜨거운 super-Earth, d 는 얇은 대기의 서리 세계, c 는 그 사이의 무대기 대조군 입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
