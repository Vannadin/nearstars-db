  "h2_141":"Surface synthesis",
  "p_142":"Vega&#x27;s &quot;surface&quot; is not a single-temperature photosphere. The CHARA Array interferometric campaigns of Aufdenberg et al. 2006 and Monnier et al. 2012 resolve the star as an oblate rotator viewed nearly pole-on, with its rotation axis tipped just 6.2° off the line of sight to Earth. ω/ω_crit ≈ 0.91 — the equator is rotating at 91% of breakup velocity. The classical von Zeipel theorem (1924) predicts that flux ∝ g_eff^β with β = 0.25 for radiative envelopes; the empirical fit gives β ≈ 0.231 (Monnier 2012). The visible consequence is a hot bright pole — T_pole ≈ 10150 K — staring directly at the observer, surrounded by a cooler equatorial band at T_eq ≈ 7900 K that forms a darker, more yellow-toned annulus at the limb. This 2250 K pole-to-equator temperature gradient is the defining visual property of Vega and the reason every classical &quot;Vega is a hot blue-white A0&quot; textbook illustration is wrong in detail — what an observer sees is closer to a small, intensely bright white-blue dot with a subtle cooler halo.",
  "p_143":"The pole-on geometry has a second consequence relevant for the NearStars renderer: the equatorial limb darkening is dominated by gravity darkening, not by classical limb darkening. A single-parameter α exponent in the Claret 2011 / Kervella 2017 sense does not fit Vega&#x27;s H-band interferometric visibilities; the relevant cfg field is the gravity-darkening β coefficient and the inclination, which combine to produce the observed brightness profile. NearStars stores the inclination and pole/equator temperatures explicitly rather than collapsing to a single α.",
  "p_144":"Vega is also a member of the λ Boötis class of chemically peculiar A-stars (Adelman &amp; Gulliver 1990; Yoon 2010 adopts [M/H] ≈ −0.5 in best-fit models). The photosphere shows depleted heavy-element abundances compared with the bulk stellar composition, attributed to selective accretion of gas-depleted interstellar material or to circumstellar-disk fractionation. The surface metallicity tints the SED marginally toward the blue (less line blanketing in the UV), reinforcing the visual choice of <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> over a more cream blackbody match.",
  "p_145":"The photosphere is too hot to host significant convective granulation. The outer envelope is radiative; surface structure is dominated by rotation rather than by convective cells, and spot coverage is essentially zero. Petit et al. 2010 (<code>2010A&amp;A...523A..41P</code>) detected weak magnetic field (~0.6 G longitudinal) with ZDI suggesting a polar magnetic spot — this is one of the first magnetic detections on a &quot;non-Ap&quot; A-star and may explain the anomalously weak X-ray emission, but it produces no visible photometric variability at typical cfg time scales.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"A0V dwarfs do not have a chromosphere in the cool-star sense. The radiative envelope provides no convective dynamo to power Ca II H&amp;K emission, and the standard log R&#x27;HK activity index is undefined for Vega. The Mg II h+k and Ca II H&amp;K lines appear purely as photospheric absorption with no chromospheric core emission reversal — a defining feature of the photometric A0V standard.",
  "p_148":"Despite this, X-ray emission has been weakly detected at log L_X ≈ 25.5–26.0 erg/s (Robrade &amp; Schmitt 2011, <code>2011A&amp;A...531A..58R</code>), seven orders of magnitude fainter than the Sun&#x27;s coronal output, and somewhat puzzling given the lack of expected dynamo. Two hypotheses compete: a magnetic-pole-aligned weak corona consistent with Petit 2010&#x27;s ZDI polar spot detection (the X-rays would then come from a hot ring near the magnetic pole, again viewed nearly face-on), or contamination from a low-mass companion / coronal-mass-ejection-like activity from the disk. NearStars adopts no in-game flare model for Vega — the timescales and energies involved are well below player-perceptible levels.",
  "p_149":"The integrated UV output is, however, enormous: at 47 L☉ with a peak SED in the near-UV, Vega delivers ~30× the solar UV flux at equivalent distance. This XUV-driven photoevaporation has been invoked (Wilner 2002; Sibthorpe 2010) as the mechanism that clears small dust grains from the inner disk and may be partially responsible for the gap between the warm and cold belts. Any hypothetical inner planet would experience an extreme UV environment — relevant only as flavor text since no planet has been detected.",
  "p_150":"The visible &quot;sky&quot; of Vega, in the sense of any extended optical-depth structure, is dominated not by a chromosphere but by the surrounding debris disk seen in scattered light at small angular separations and by the gravity-darkened pole-equator gradient at the photosphere itself. There is no atmospheric haze, no corona-on-the-limb feature analogous to a G-dwarf, and no observable extended outflow.",
  "h2_151":"Rotation &amp; spin synthesis",
  "p_152":"Vega rotates at v_eq sin i = 22 ± 2 km/s in classical line-broadening measurements (Gulliver et al. 1994), which historically encouraged the misclassification of Vega as a slow rotator. The CHARA interferometric resolution (Aufdenberg 2006; Peterson 2006, <code>2006Natur.440..896P</code>) revealed that this small sin i is not a small v_eq but a small i: the true equatorial velocity is 274 ± 14 km/s viewed at i ≈ 6.2°. This places Vega at ω/ω_crit ≈ 0.91 — among the most rapidly rotating bright stars.",
  "p_153":"The corresponding equatorial rotation period derived from geometry is P_eq = 2π · R_eq / v_eq ≈ 2π · 2.726 · 696000 km / 274 km/s ≈ 12.5 hours. Petit et al. 2010 derived a 0.732-day (~17.6 hr) period from ZDI magnetic-field rotational modulation; this longer period is consistent with the magnetic structure being anchored at higher latitude where v_phys is smaller (differential rotation in a gravity-darkened envelope). NearStars uses the 12.5-hour equatorial period as the cfg-stable rotation handle; the ZDI value is preserved as an Open item for a future &quot;magnetic surface&quot; cfg variant.",
  "p_154":"The spin axis is the most-constrained orientation parameter in the entire star: i ≈ 6.2° ± 0.3° (Aufdenberg 2006), which means in the Kerbal frame Vega&#x27;s pole points almost exactly at Sol. The visual consequence in the NearStars renderer is that from any vantage point near Earth/Kerbin, the player looks down on Vega&#x27;s hot bright pole; the cooler equatorial band is seen edge-on as a darker rim. This is the geometry the cfg portrays — no need to invent a tilt, the literature gives it directly.",
  "p_155":"Obliquity of the disk and rotation axis are aligned within errors (Sibthorpe 2010; Su 2013), consistent with a coeval-formation scenario in which the disk and stellar spin share the original protoplanetary angular momentum vector. No precession or secular axis drift is implemented in the cfg.",
  "h2_156":"Visual styling",
  "li_157":"<b>Global appearance (orbit-view).</b> A small, intensely bright white-blue stellar disk (face-on pole; T ≈ 10150 K) surrounded by a faint warm-cream halo where the cooler equator forms a darker limb-band. At KSP rendering distances Vega appears as a nearly-point source with the gravity-darkened gradient just barely resolvable at very close fly-by — the visual is dominated by the spectacular surrounding face-on debris disk.",
  "li_158":"<b>Surface detail.</b> No granulation, no sunspots, no faculae. The dominant visible feature is the 2250 K pole-to-equator temperature gradient: a brilliant <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> near the apparent center fading to <span class=\"hex-chip\" style=\"background:#e8e2d6\"></span><code>#e8e2d6</code> near the equatorial limb. The transition is smooth (no sharp boundary) and roughly axisymmetric for the pole-on viewer.",
  "li_159":"<b>Polar / equatorial features.</b> A faint ZDI polar magnetic spot (Petit 2010) — not visually rendered in current cfg but listed as an Open items extension.",
  "li_160":"<b>Atmosphere haze.</b> None. A-stars have no chromosphere; the limb cuts cleanly without a soft haze band.",
  "li_161":"<b>Debris-disk visual (the showpiece feature).</b> Vega is the IRAS-archetype debris disk and the cfg portrays it as the visually dominant element of the system at distance. The disk renders as one Kopernicus <code>Ring</code> per belt (multi-belt): an inner warm belt at ~14 AU as a faint, dim, narrow torus glowing with <span class=\"hex-chip\" style=\"background:#f0d0a0\"></span><code>#f0d0a0</code> warm-amber tones (the 170 K dust population in scattered light), essentially invisible at orbit-view zoom and becoming visible when the player approaches the inner system; a cleared gap from 14 to 110 AU forming an empty annulus that visually identifies where unseen planetesimal-belt-stirring planets must exist — the cfg&#x27;s strongest visual hint at Vega&#x27;s &quot;missing planets&quot;; and an outer cold belt from 110 to 200 AU as the main visual element, a face-on bright ring with <span class=\"hex-chip\" style=\"background:#d8d8e4\"></span><code>#d8d8e4</code> faint cool-grey tones (50 K icy dust in scattered-light proxy color), opacity 0.06, sharper inner edge than outer per Sibthorpe 2010 morphology — the structure IRAS discovered and the cfg&#x27;s defining &quot;you are at Vega&quot; cue.",
  "li_162":"<b>Star in sky (from a hypothetical inner planet at 1 AU).</b> Apparent diameter ≈ 2 · R_eq / a · (180·60/π) ≈ 2 · 2.726 · 696000 / 1.496×10⁸ · (60·180/π) ≈ 0.087° (~5.2 arcmin) — about 16% of the Sun&#x27;s apparent diameter from Earth, but ~7× brighter per unit area (Teff ratio)^4. The illumination color temperature ~9700 K renders as a slightly blue daylight; sunlight has a noticeable extra blue cast vs. solar reference.",
  "li_163":"<b>Disk-in-sky from a hypothetical inner planet.</b> The outer belt at 110–200 AU subtends ~30° to ~90° in the sky as a face-on ring — a striking nighttime &quot;Vega ring&quot; easily one of the most visually distinctive features in NearStars. The pole-on geometry means the ring is seen as a true ring (full annulus), not as an edge-on streak.",
  "li_164":"<b>Sister planets in sky.</b> None confirmed; cfg has no planet bodies for Vega. If the Su 2013 gap-clearer planets are added in a future cfg variant, they would appear as inner-system point sources.",
  "h2_165":"Bibliography",
  "h3_166":"Read (visual-informative, drove decisions above)",
  "li_167":"<b>Aumann H. H. et al. 1984</b> — <i>Discovery of a Shell Around Alpha Lyrae</i>, ApJ 278, L23 (<code>1984ApJ...278L..23A</code>). The IRAS discovery paper that named the &quot;Vega phenomenon&quot;; 60 and 100 μm excess; first debris disk ever identified.",
  "li_168":"<b>Aufdenberg J. P. et al. 2006</b> — <i>First results from the CHARA Array. VII. Long-baseline interferometric measurements of Vega consistent with a pole-on, rapidly rotating star</i>, ApJ 645, 664 (<code>2006ApJ...645..664A</code>, arXiv:astro-ph/0603327). CHARA H-band interferometry; v_eq = 274 km/s, i = 5° ± 2°, T_pole = 10150 K, T_eq = 7900 K, ω/ω_crit = 0.91; defines the modern picture of Vega.",
  "li_169":"<b>Peterson D. M. et al. 2006</b> — <i>Vega is a rapidly rotating star</i>, Nature 440, 896 (<code>2006Natur.440..896P</code>). Independent NPOI interferometric confirmation; same conclusion as Aufdenberg.",
  "li_170":"<b>Yoon J. et al. 2010</b> — <i>A New View of Vega&#x27;s Composition, Mass, and Age</i>, ApJ 708, 71 (<code>2010ApJ...708...71Y</code>). Rotating evolutionary models fit to interferometric R and SED; M = 2.135 ± 0.075 M☉, age 0.455 ± 0.013 Gyr, [M/H] = −0.5; resolves the longstanding Vega &quot;metallicity problem&quot; as λ Boo surface depletion in an otherwise normal-metallicity envelope.",
  "li_171":"<b>Monnier J. D. et al. 2012</b> — <i>Resolving Vega and the Inclination Controversy with CHARA/MIRC</i>, ApJ 761, L3 (<code>2012ApJ...761L...3M</code>). Higher-resolution CHARA/MIRC imaging; R_eq = 2.726 ± 0.006 R☉; reconciles small Aufdenberg inclination with later concerns; age 0.7 ± 0.075 Gyr (note: differs from Yoon).",
  "li_172":"<b>Su K. Y. L. et al. 2013</b> — <i>Asteroid Belts in Debris Disk Twins: Vega and Fomalhaut</i>, ApJ 763, 118 (<code>2013ApJ...763..118S</code>, arXiv:1211.7298). Spitzer-IRS + Herschel-PACS two-component SED fit; warm 170 K inner belt at 14 AU, cold 50 K outer belt at ~110–200 AU; cleared gap implying planetesimal-stirring planets; defines the two-belt cfg morphology.",
  "li_173":"<b>Sibthorpe B. et al. 2010</b> — <i>The Vega debris disc: A view from Herschel</i>, A&amp;A 518, L130 (<code>2010A&amp;A...518L.130S</code>). Herschel-PACS 70/100/160 μm resolved imaging; disk radial profile with sharper inner edge than outer; supports radiation-pressure / PR-drag depletion of small grains; outer-edge radius ~200 AU.",
  "li_174":"<b>Holland W. S. et al. 1998</b> — <i>Submillimetre images of dusty debris around nearby stars</i>, Nature 392, 788 (<code>1998Natur.392..788H</code>). JCMT-SCUBA 850 μm; first sub-mm resolved image of Vega&#x27;s disk; established the cold debris ring structure.",
  "li_175":"<b>Hughes A. M. et al. 2012</b> — <i>Confirmation of the Vega Asteroid Belt with Combined Spitzer and Submillimeter Array Observations</i>, ApJ 750, 82 (<code>2012ApJ...750...82H</code>, arXiv:1203.0598). SMA / early-ALMA-era 880 μm observations; confirms cold-belt structure; constrains inner edge.",
  "li_176":"<b>Petit P. et al. 2010</b> — <i>A weak magnetic field at the surface of Vega</i>, A&amp;A 523, A41 (<code>2010A&amp;A...523A..41P</code>, arXiv:1006.5868). NARVAL spectropolarimetry; ~0.6 G longitudinal field, possible polar magnetic spot, P_rot ZDI estimate 0.732 d (longer than equatorial 12.5 h due to higher-latitude anchoring).",
  "h3_177":"Read (context / methodology, not directly decision-driving)",
  "li_178":"<b>Adelman S. J. &amp; Gulliver A. F. 1990</b> — Abundance analysis of Vega; identifies the λ Boötis spectral peculiarity. Methodology reference for the [M/H] = −0.5 photospheric value.",
  "li_179":"<b>Gulliver A. F. et al. 1994</b> — <i>The Spectrum of Vega: A Pole-on View of a Rapidly Rotating Star</i>, ApJ 429, L81. First spectroscopic suggestion (pre-CHARA) that Vega&#x27;s small v sin i hides a large v.",
  "li_180":"<b>Robrade J. &amp; Schmitt J. H. M. M. 2011</b> — <i>X-ray detection of the very low-mass companion of Vega-like α Lyrae</i>, A&amp;A 531, A58 (<code>2011A&amp;A...531A..58R</code>). XMM-Newton detection at log L_X ≈ 25.5–26 erg/s; controversial interpretation between weak corona and companion contamination.",
  "li_181":"<b>Hurt S. A. et al. 2021</b> — <i>A Decade of Radial Velocity Monitoring of Vega</i>, AJ 161, 157 (<code>2021AJ....161..157H</code>). Deepest RV upper limits to date; candidate 0.6-day signal at 0.04 AU, unconfirmed; rules out Saturn-mass companions inside ~7 AU.",
  "li_182":"<b>Wilner D. J. et al. 2002</b> — <i>Toward Imaging the Vega Belt</i>, ApJ 569, L115. OVRO 1.3 mm interferometric imaging; early sub-mm structure mapping.",
  "li_183":"<b>Hunsch M. &amp; Schmitt J. H. M. M. 2019</b> — Review of radial velocity constraints on A-star planet hosts including Vega; methodology reference for the no-planet RV upper limits.",
  "h3_184":"Read (instrument-only, not visual-informative)",
  "li_185":"<b>Decin G. et al. 2003</b> — ISO photometry of Vega cross-calibration; instrument paper.",
  "li_186":"<b>Marsh K. A. et al. 2006</b> — Submm imaging instrument validation using Vega as photometric standard; no morphology constraint.",
  "li_187":"<b>Absil O. et al. 2006</b> — CHARA/FLUOR K-band excess detection; ambiguous interpretation between hot exozodiacal dust and instrumental systematic.",
  "li_188":"<b>Defrère D. et al. 2011</b> — KIN nulling interferometry exozodi upper limit; no detection at the relevant baseline.",
  "h3_189":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_190":"The full filtered bib is preserved as a future task. Skipped entries include photometric-standard validation papers (Bohlin 2007, 2014, 2020 — Vega-as-photometric-zero-point, methodology only), SETI laser-emission searches (Stone 2005, Tellis 2017 — no cfg-decisive content), and conference abstracts on Vega in the context of WASP/CHARA pipeline development. The five most prominent skipped entries: Bohlin R. C. 2007 STIS spectrophotometric standard re-calibration using Vega (pure photometric methodology); Hinz P. M. et al. 2001 MMT Adaptive Optics imaging attempt (no morphological constraint beyond Spitzer); Greaves J. S. et al. 2014 JCMT POL-2 polarimetry follow-up (instrument-development paper, no new geometry); Defrère D. et al. 2021 LBTI exozodi survey results including Vega (consistent with non-detection); Su K. Y. L. et al. 2005 Spitzer-MIPS first-look paper (superseded by Su 2013).",
  "h2_191":"Open items for follow-up",
  "li_192":"<b>Disk geometry is multi-belt in <code>disks_curated.json</code></b> (audited 2026-05-29). Vega&#x27;s warm + cold belts are separate <code>belt</code> entries; the Decisions table renders them as per-belt <code>disk_&lt;belt&gt;_*</code> fields → one Kopernicus Ring each. Remaining: a grain-size / Mie color synthesis to replace the tie-break per-belt tints.",
  "li_193":"<b>Age disagreement between Yoon 2010 (0.455 ± 0.013 Gyr) and Monnier 2012 (0.7 ± 0.075 Gyr).</b> Both papers use rotating-model isochrones but with different boundary conditions; the cfg adopts the Yoon headline. Resolution requires a deeper read of Monnier 2012 §4 and possibly Tetzlaff 2011 kinematic-age cross-check.",
  "li_194":"<b>Hurt 2021 0.6-day candidate at 0.04 AU.</b> If a 2026+ follow-up confirms this as a real planet (currently unconfirmed; could be stellar activity), a new Decisions entry <code>circumstellar_planet_present: true</code> is required and a planet body cfg should be added.",
  "li_195":"<b>Su 2013 gap-clearer planets between 14 and 110 AU.</b> Currently inferred only from the disk morphology. A future direct-imaging confirmation (JWST-NIRCam or extreme-AO) would convert this from inference to confirmed planet bodies, triggering cfg additions.",
  "li_196":"<b>Conservative-opacity disk variant.</b> Current cfg uses <code>disk_opacity</code> = 0.06 (interesting-first tie-break); the observation-consistent value is τ ~ 10⁻⁴ (essentially invisible). A &quot;realistic&quot; cfg variant with the physically-faithful opacity should be authored as a player-selectable option.",
  "li_197":"<b>Polar magnetic spot from Petit 2010.</b> Not currently rendered. A future cfg variant could add a faint blue-shifted spot at the pole for the close fly-by view, matching the ZDI structure.",
  "li_198":"<b>Disk dust-size and color synthesis upgrade.</b> Current <code>disk_tint_rgb_hex</code> uses an HST-STIS-Fomalhaut palette convention; a proper synthesis from grain-size distribution + Vega illumination spectrum (Mie scattering) would give a defensible color rather than a tie-break.",
  "li_199":"<b>Cycle phase / epoch synchronization.</b> Vega has no observed activity cycle (radiative envelope), so unlike α Cen A no epoch synchronization is needed — but if the Petit 2010 magnetic geometry is implemented as a slowly-rotating polar feature, an epoch reference would become necessary.",
  "h2_200":"Related",
  "li_201":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a> — different scenario archetype: a quiet G2V solar analog vs. Vega&#x27;s young rapid-rotator A0V archetype. Read for the canonical stellar-Phase-3 structural template.",
  "li_202":"<a href=\"../reference/methodology.md\">methodology</a> — schema source for the Decisions table.",
  "li_203":"<a href=\"../reference/data-sources.md\">data-sources</a> — provenance for SIMBAD-derived astrometric + spectral fields in <code>db/systems/vega.json</code>.",

  ko: {
  "p_1":"Vega (α Lyrae, HD 172167, HIP 91262) 는 밤하늘에서 다섯 번째로 밝은 별이자 A0Va 왜성의 원형입니다. 거리는 7.679 pc (시차 130.23 mas, SIMBAD). 역사적으로 Johnson 측광 시스템의 영점이었으며, 1983 년 IRAS 가 적외선 초과를 검출한 이후로 잔해 원반의 원형이 되었습니다. &quot;Vega-like&quot; 라는 표현 자체가 여기서 만들어졌습니다 (Aumann 외 1984, <code>1984ApJ...278L..23A</code>). NearStars DB 가 기록하고 있는 항성 매개변수 — M = 2.135 ± 0.075 M☉ (Yoon 외 2010, <code>2010ApJ...708...71Y</code>), 적도 반지름 R = 2.726 ± 0.006 R☉ (Monnier 외 2012, <code>2012ApJ...761L...3M</code>) — 는 모두 Vega 가 천천히 자전하는 측광 표준이 아니라 거의 극을 향해 회전하는 빠른 자전체라는 현대적 이해의 산물입니다. 유효 온도는 9692 K 입니다 (SIMBAD harmonized; Aufdenberg 외 2006 의 CHARA 간섭계가 극 10150 K vs 적도 7900 K 의 기울기를 직접 측정, <code>2006ApJ...645..664A</code>).",
  "p_2":"Vega 에는 확정된 행성이 없습니다. 가장 깊은 RV 탐색 (Hunsch &amp; Schmitt 2019 및 후속 연구; Hurt 외 2021, <code>2021AJ....161..157H</code>) 도 ~7 AU 안쪽에서 0.3 M_Jup 보다 큰 동반체를 배제하고, 내부 소행성대 영역 전반에 ~토성 질량 상한을 둡니다. Hurt 2021 이 보고한 ~0.6 일 0.04 AU 신호 후보가 있으나 현 시점에서 확정 상태가 아닙니다. Vega 의 시각적 정체성을 결정짓는 것은 두 띠 (two-belt) 잔해 원반입니다 — 소행성대 유사 구조에 해당하는 ~14 AU 의 따뜻한 내부 영역, 그리고 ~70 AU 부터 ~200 AU 까지 분해된 차가운 외부 고리. 둘 사이의 비워진 간극은 14–70 AU 사이에 미발견 행성이 행성소체 띠를 휘젓고 있다는 가장 강한 간접 증거입니다 (Su 외 2013, <code>2013ApJ...763..118S</code>; Sibthorpe 외 2010, <code>2010A&amp;A...518L.130S</code>; Hughes 외 2012, <code>2012ApJ...750...82H</code>).",
  "p_3":"<b>NearStars 의 시나리오 선택. 거의 극을 향한 A0Va 빠른 자전체 (i ≈ 6°). 중력 감광으로 극 ~10150 K 에서 적도 ~7900 K 로 떨어지는 기울기를 가지고, 정면에서 보이는 두 띠 잔해 원반의 중심에 자리잡고 있는 별입니다.</b> Pole-on 기하가 시각적으로 가장 정의적인 특징입니다. 대부분의 A형 별 일러스트는 균일한 백청색 원반을 보여주지만, cfg 는 Vega 의 뜨겁고 밝은 극이 플레이어를 직접 바라보고 차가운 적도는 어두운 limb 띠를 형성하도록 묘사합니다. 원반은 IRAS 발견 시대의 정면 dust ring 으로 렌더링됩니다. Confidence=high 줄들은 모두 관측을 추종하고, 원반 기하 행 (row) 들은 분해 영상은 있으나 모델 매개변수화가 갈리는 (Su 2013 vs Sibthorpe 2010 의 inner radius 가 ~3 AU 차이) 부분이라 Confidence=medium 으로, tint hex 와 opacity 같은 합성-전용 필드는 Basis 컬럼에 명시된 tie-break 로 Confidence=low 입니다.",

  "td_140":"110–200 AU 의 dust 수명이 0.45 Gyr 시스템 연령보다 훨씬 짧음. 행성소체 보충 필수 (Sibthorpe 2010 §5)",
  "h2_141":"Surface synthesis",
  "p_142":"Vega 의 &quot;표면&quot; 은 단일 온도 광구가 아닙니다. Aufdenberg 외 2006 과 Monnier 외 2012 의 CHARA Array 간섭계 캠페인은 자전축이 지구 시선에서 6.2° 만 기울어진 거의 pole-on 으로 보이는 편구형 자전체로 별을 분해합니다. ω/ω_crit ≈ 0.91 — 적도가 breakup 속도의 91% 로 회전합니다. 고전적 von Zeipel 정리 (1924) 는 복사 외피에서 flux ∝ g_eff^β 와 β = 0.25 를 예측하며, 경험적 fit 은 β ≈ 0.231 (Monnier 2012) 입니다. 가시적 결과는 뜨겁고 밝은 극 — T_pole ≈ 10150 K — 이 관측자를 직접 향하고, 그 주위를 T_eq ≈ 7900 K 의 차가운 적도 띠가 limb 에서 어둡고 약간 노랗게 두른 환형으로 감쌉니다. 이 2250 K 의 극-적도 온도 기울기가 Vega 의 결정적 시각 속성이고, 모든 고전 &quot;Vega 는 뜨거운 청백색 A0&quot; 교과서 그림이 세부에서 틀린 이유입니다. 관측자가 실제로 보는 모습은 미세하게 차가운 후광을 두른, 작고 강렬하게 빛나는 백청색 점에 더 가깝습니다.",
  "p_143":"Pole-on 기하에는 NearStars 렌더러에 관련된 두 번째 결과가 있습니다. 적도 limb 어둠은 고전적 limb darkening 이 아니라 중력 감광이 지배합니다. Claret 2011 / Kervella 2017 류의 단일 매개변수 α exponent 는 Vega 의 H 밴드 간섭계 visibility 에 맞지 않습니다. cfg 에 유의미한 필드는 중력 감광 β 계수와 경사이며, 둘이 결합해 관측된 밝기 프로필을 만듭니다. NearStars 는 단일 α 로 압축하지 않고 경사와 극/적도 온도를 명시적으로 저장합니다.",
  "p_144":"Vega 는 또한 화학적으로 특이한 λ Boötis 등급 A형의 일원입니다 (Adelman &amp; Gulliver 1990; Yoon 2010 의 best-fit 모델이 [M/H] ≈ −0.5 를 채택). 광구는 별 전체 조성 대비 무거운 원소가 결핍되어 보이며, gas-depleted 성간 물질의 선택적 강착 또는 원반 분별 작용으로 설명됩니다. 표면 metallicity 가 SED 를 약간 푸른쪽으로 (UV line blanketing 감소) 이동시켜, cream 같은 흑체 매칭보다 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 의 시각 선택을 강화합니다.",
  "p_145":"광구는 의미 있는 대류 입상 구조를 호스트하기에 너무 뜨겁습니다. 외피가 복사이며, 표면 구조는 대류 cell 이 아니라 회전이 지배하고, spot coverage 는 본질적으로 0 입니다. Petit 외 2010 (<code>2010A&amp;A...523A..41P</code>) 이 ~0.6 G longitudinal 약자기장을 검출했고 ZDI 가 극 자기 spot 을 시사 — 이는 &quot;non-Ap&quot; A형의 첫 자기 검출 중 하나이고 비정상적으로 약한 X-ray 방출을 설명할 가능성이 있지만, 일반적인 cfg 시간 단위에서 가시 측광 변동은 만들지 않습니다.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"A0V 왜성은 차가운 별 의미의 채층을 가지지 않습니다. 복사 외피가 Ca II H&amp;K 방출을 구동할 대류 다이나모를 제공하지 않으므로 표준 log R&#x27;HK 활동 지수는 Vega 에 정의되지 않습니다. Mg II h+k 와 Ca II H&amp;K 선은 채층 core 반전 없이 순수 광구 흡수로만 나타나며, 이는 A0V 측광 표준의 정의적 특징입니다.",
  "p_148":"그럼에도 X-ray 방출이 log L_X ≈ 25.5–26.0 erg/s 로 약하게 검출되었습니다 (Robrade &amp; Schmitt 2011, <code>2011A&amp;A...531A..58R</code>). 태양 코로나 출력의 7 차수 약함이며 다이나모 부재 상황에서 다소 곤혹스러운 결과입니다. 두 가설이 경쟁 — Petit 2010 의 ZDI 극 spot 검출과 일치하는 자기 극 정렬 약한 코로나 (이 경우 X-ray 는 자기 극 근처 hot ring 에서 다시 거의 정면으로 보이는 형태) 와, 저질량 동반체 오염 또는 원반에서 비롯된 CME 류 활동. NearStars 는 Vega 에 인게임 플레어 모델을 채택하지 않습니다 — 관여 시간 단위와 에너지가 플레이어 인지 수준을 한참 밑돕니다.",
  "p_149":"다만 적분 UV 출력은 막대합니다. 47 L☉ 와 근자외선 SED peak 로 Vega 는 동등 거리에서 태양 UV flux 의 ~30 배를 전달합니다. XUV 광증발이 (Wilner 2002; Sibthorpe 2010) 내부 원반에서 작은 dust grain 을 제거하고 따뜻한 띠와 차가운 띠 사이 간극 형성에 부분적으로 기여한 메커니즘으로 제기되었습니다. 가상의 내부 행성은 극단적 UV 환경을 겪을 텐데, 행성 미검출이라 flavor text 수준의 관심사입니다.",
  "p_150":"확장된 광학 깊이 구조의 의미로 Vega 의 가시 &quot;하늘&quot; 은 채층이 아니라 작은 각거리에서 산란광으로 보이는 둘러싼 잔해 원반과, 광구 자체의 중력 감광 극-적도 기울기가 지배합니다. 대기 haze 도 없고, G 왜성처럼 limb 위 코로나 특징도 없고, 관측 가능한 확장 outflow 도 없습니다.",
  "h2_151":"Rotation &amp; spin synthesis",
  "p_152":"Vega 는 고전 line broadening 측정 (Gulliver 외 1994) 에서 v_eq sin i = 22 ± 2 km/s 로 회전합니다. 이 작은 값이 역사적으로 Vega 를 느린 자전체로 분류시켰습니다. CHARA 간섭계 분해 (Aufdenberg 2006; Peterson 2006, <code>2006Natur.440..896P</code>) 가 그 작은 sin i 가 작은 v_eq 가 아니라 작은 i 임을 밝혔습니다. 진짜 적도 속도는 i ≈ 6.2° 로 보이는 274 ± 14 km/s 입니다. Vega 를 ω/ω_crit ≈ 0.91 — 밝은 별 중 가장 빠르게 회전하는 부류 — 에 위치시킵니다.",
  "p_153":"기하에서 유도되는 적도 자전 주기는 P_eq = 2π · R_eq / v_eq ≈ 2π · 2.726 · 696000 km / 274 km/s ≈ 12.5 시간 입니다. Petit 외 2010 이 자기장 회전 변조 ZDI 에서 0.732 일 (~17.6 시간) 주기를 유도한 것은 자기 구조가 v_phys 가 더 작은 고위도에 anchor 되어 있는 것과 일관됩니다 (중력 감광 외피의 차등 회전). NearStars 는 cfg 안정 회전 핸들로 12.5 시간 적도 주기를 사용하고, ZDI 값은 미래 &quot;magnetic surface&quot; cfg variant 용 Open item 으로 보존합니다.",
  "p_154":"자전축은 전체 별에서 가장 잘 제약된 방향 매개변수입니다. i ≈ 6.2° ± 0.3° (Aufdenberg 2006), 즉 Kerbal 프레임에서 Vega 의 극이 거의 정확히 Sol 을 향합니다. NearStars 렌더러에서의 시각적 결과는, 지구/Kerbin 근처 어떤 시점에서든 플레이어는 Vega 의 뜨겁고 밝은 극을 내려다보고, 차가운 적도 띠는 edge-on 으로 어두운 rim 으로 보입니다. 이것이 cfg 가 묘사하는 기하 — tilt 를 발명할 필요 없고, 문헌이 직접 제공.",
  "p_155":"원반과 자전축의 obliquity 는 오차 내에서 정렬됩니다 (Sibthorpe 2010; Su 2013). 원반과 자전 spin 이 원래 원시 행성계 원반 각운동량 벡터를 공유하는 coeval-formation 시나리오와 일관됩니다. cfg 에는 세차나 secular axis drift 가 구현되지 않습니다.",
  "h2_156":"Visual styling",
  "li_157":"<b>글로벌 외관 (궤도 뷰).</b> 작고 강렬한 백청색 별 원반 (정면 극, T ≈ 10150 K) 주변에 차가운 적도가 어두운 limb 띠를 형성하는 옅은 따뜻한 크림 후광. KSP 렌더링 거리에서 Vega 는 거의 점광원이며 중력 감광 기울기는 매우 가까운 fly-by 에서만 간신히 분해 가능 — 시각은 둘러싼 정면 잔해 원반이 압도.",
  "li_158":"<b>표면 디테일.</b> 입상 구조 없음, 흑점 없음, faculae 없음. 지배적인 가시 특징은 2250 K 극-적도 온도 기울기. 시야 중심 근처의 찬란한 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 가 적도 limb 근처의 <span class=\"hex-chip\" style=\"background:#e8e2d6\"></span><code>#e8e2d6</code> 로 페이드. 전환은 매끄럽고 (선명한 경계 없음) pole-on 관측자에게는 거의 축대칭.",
  "li_159":"<b>극/적도 특징.</b> Petit 2010 의 옅은 ZDI 극 자기 spot — 현 cfg 에서는 미렌더링이지만 Open items 의 확장 후보.",
  "li_160":"<b>대기 haze.</b> 없음. A형은 채층이 없고, limb 가 부드러운 haze 띠 없이 깨끗하게 잘림.",
  "li_161":"<b>잔해 원반 시각 (간판 특징).</b> Vega 는 IRAS 원형 잔해 원반이고 cfg 는 이를 거리에서 시스템의 시각적 지배 요소로 묘사. 원반은 두 개의 구분된 성분을 가진 정면 luminous 구조로 렌더링됩니다. ~14 AU 의 내부 따뜻한 띠는 <span class=\"hex-chip\" style=\"background:#f0d0a0\"></span><code>#f0d0a0</code> 의 따뜻한 amber (170 K dust 의 산란광) 로 빛나는 옅고 좁은 환형, 궤도 뷰 zoom 에서는 본질적으로 비가시이고 플레이어가 내부 시스템에 접근할 때 보이기 시작; 14–110 AU 의 cleared gap 은 미발견 행성소체-휘젓는 행성이 존재해야 할 위치를 시각적으로 식별하는 빈 환형 — cfg 가 Vega 의 &quot;잃어버린 행성&quot; 을 가장 강력하게 암시; 110–200 AU 의 외부 차가운 띠는 주된 시각 요소, <span class=\"hex-chip\" style=\"background:#d8d8e4\"></span><code>#d8d8e4</code> 희미한 차가운 회색 톤 (50 K 얼음 dust 의 산란광 proxy 색), opacity 0.06, Sibthorpe 2010 morphology 따라 외부보다 내부 가장자리가 더 선명한 정면 밝은 ring — IRAS 가 발견한 구조이자 cfg 의 &quot;당신은 Vega 에 있다&quot; 단서.",
  "li_162":"<b>별이 하늘에서 보이는 모습 (1 AU 의 가상 내부 행성에서).</b> 각 지름 ≈ 2 · R_eq / a · (180·60/π) ≈ 0.087° (~5.2 arcmin) — 지구에서 본 태양의 ~16% 각 크기이지만 단위 면적당 ~7 배 밝음 (Teff 비율)^4. 조명 색온도 ~9700 K 는 약간 푸른 daylight 로 렌더링 — sunlight 가 태양 참조 대비 눈에 띄게 더 푸른 톤.",
  "li_163":"<b>가상 내부 행성에서 본 원반.</b> 110–200 AU 의 외부 띠가 정면 ring 으로 하늘에서 ~30° 에서 ~90° 까지 차지 — NearStars 에서 가장 시각적으로 두드러진 특징 중 하나인 striking 한 야간 &quot;Vega ring&quot;. Pole-on 기하 덕에 ring 이 edge-on streak 가 아니라 진짜 ring (완전 환형) 으로 보입니다.",
  "li_164":"<b>자매 행성이 하늘에서.</b> 확정 없음. cfg 에 Vega 의 행성 body 없음. Su 2013 의 gap-clearer 행성이 미래 cfg variant 에 추가되면 내부 시스템 점광원으로 등장할 예정.",
  "h2_165":"Bibliography",
  "h3_166":"Read (visual-informative, drove decisions above)",
  "li_167":"<b>Aumann H. H. 외 1984</b> — <i>Discovery of a Shell Around Alpha Lyrae</i>, ApJ 278, L23 (<code>1984ApJ...278L..23A</code>). &quot;Vega 현상&quot; 을 명명한 IRAS 발견 논문. 60 + 100 μm 초과. 최초로 식별된 잔해 원반.",
  "li_168":"<b>Aufdenberg J. P. 외 2006</b> — <i>First results from the CHARA Array. VII. Long-baseline interferometric measurements of Vega consistent with a pole-on, rapidly rotating star</i>, ApJ 645, 664 (<code>2006ApJ...645..664A</code>, arXiv:astro-ph/0603327). CHARA H 밴드 간섭계. v_eq = 274 km/s, i = 5° ± 2°, T_pole = 10150 K, T_eq = 7900 K, ω/ω_crit = 0.91. Vega 의 현대적 그림을 정의.",
  "li_169":"<b>Peterson D. M. 외 2006</b> — <i>Vega is a rapidly rotating star</i>, Nature 440, 896 (<code>2006Natur.440..896P</code>). 독립적 NPOI 간섭계 확인. Aufdenberg 와 동일 결론.",
  "li_170":"<b>Yoon J. 외 2010</b> — <i>A New View of Vega&#x27;s Composition, Mass, and Age</i>, ApJ 708, 71 (<code>2010ApJ...708...71Y</code>). 간섭계 R + SED 에 회전 진화 모델 fit. M = 2.135 ± 0.075 M☉, 연령 0.455 ± 0.013 Gyr, [M/H] = −0.5. 오래된 Vega &quot;metallicity problem&quot; 을 정상 metallicity 외피에서 λ Boo 표면 결핍으로 해소.",
  "li_171":"<b>Monnier J. D. 외 2012</b> — <i>Resolving Vega and the Inclination Controversy with CHARA/MIRC</i>, ApJ 761, L3 (<code>2012ApJ...761L...3M</code>). 더 높은 해상도 CHARA/MIRC 영상. R_eq = 2.726 ± 0.006 R☉. 작은 Aufdenberg 경사와 후속 우려를 조정. 연령 0.7 ± 0.075 Gyr (Yoon 과 다름에 주의).",
  "li_172":"<b>Su K. Y. L. 외 2013</b> — <i>Asteroid Belts in Debris Disk Twins: Vega and Fomalhaut</i>, ApJ 763, 118 (<code>2013ApJ...763..118S</code>, arXiv:1211.7298). Spitzer-IRS + Herschel-PACS 두 성분 SED fit. 14 AU 따뜻한 170 K 내부 띠 + ~110–200 AU 차가운 50 K 외부 띠. 행성소체-휘젓는 행성을 함의하는 cleared gap. 두 띠 cfg morphology 를 정의.",
  "li_173":"<b>Sibthorpe B. 외 2010</b> — <i>The Vega debris disc: A view from Herschel</i>, A&amp;A 518, L130 (<code>2010A&amp;A...518L.130S</code>). Herschel-PACS 70/100/160 μm 분해 영상. 외부 가장자리보다 내부 가장자리가 선명한 원반 radial profile. 작은 grain 의 radiation pressure / PR-drag 제거 지지. 외부 가장자리 반지름 ~200 AU.",
  "li_174":"<b>Holland W. S. 외 1998</b> — <i>Submillimetre images of dusty debris around nearby stars</i>, Nature 392, 788 (<code>1998Natur.392..788H</code>). JCMT-SCUBA 850 μm. Vega 원반의 첫 서브밀리미터 분해 영상. 차가운 잔해 ring 구조 확립.",
  "li_175":"<b>Hughes A. M. 외 2012</b> — <i>Confirmation of the Vega Asteroid Belt with Combined Spitzer and Submillimeter Array Observations</i>, ApJ 750, 82 (<code>2012ApJ...750...82H</code>, arXiv:1203.0598). SMA / 초기 ALMA 시대 880 μm 관측. 차가운 띠 구조 확인. 내부 가장자리 제약.",
  "li_176":"<b>Petit P. 외 2010</b> — <i>A weak magnetic field at the surface of Vega</i>, A&amp;A 523, A41 (<code>2010A&amp;A...523A..41P</code>, arXiv:1006.5868). NARVAL spectropolarimetry. ~0.6 G longitudinal 자기장. 가능한 극 자기 spot. P_rot ZDI 추정 0.732 d (적도 12.5 h 보다 길음, 고위도 anchored).",
  "h3_177":"Read (context / methodology, not directly decision-driving)",
  "li_178":"<b>Adelman S. J. &amp; Gulliver A. F. 1990</b> — Vega 의 abundance 분석. λ Boötis 분광 특이성 식별. [M/H] = −0.5 광구값의 methodology 참조.",
  "li_179":"<b>Gulliver A. F. 외 1994</b> — <i>The Spectrum of Vega: A Pole-on View of a Rapidly Rotating Star</i>, ApJ 429, L81. Vega 의 작은 v sin i 가 큰 v 를 숨긴다는 (CHARA 이전) 분광학적 첫 시사.",
  "li_180":"<b>Robrade J. &amp; Schmitt J. H. M. M. 2011</b> — <i>X-ray detection of the very low-mass companion of Vega-like α Lyrae</i>, A&amp;A 531, A58 (<code>2011A&amp;A...531A..58R</code>). XMM-Newton 검출 log L_X ≈ 25.5–26 erg/s. 약한 코로나 vs 동반체 오염의 논쟁적 해석.",
  "li_181":"<b>Hurt S. A. 외 2021</b> — <i>A Decade of Radial Velocity Monitoring of Vega</i>, AJ 161, 157 (<code>2021AJ....161..157H</code>). 현재까지 가장 깊은 RV 상한. 0.04 AU 의 0.6 일 후보 신호, 미확인. ~7 AU 이내 토성 질량 동반체 배제.",
  "li_182":"<b>Wilner D. J. 외 2002</b> — <i>Toward Imaging the Vega Belt</i>, ApJ 569, L115. OVRO 1.3 mm 간섭 영상. 초기 서브밀리미터 구조 매핑.",
  "li_183":"<b>Hunsch M. &amp; Schmitt J. H. M. M. 2019</b> — Vega 포함 A형 행성 host 에 대한 RV 제약 리뷰. no-planet RV 상한의 methodology 참조.",
  "h3_184":"Read (instrument-only, not visual-informative)",
  "li_185":"<b>Decin G. 외 2003</b> — Vega 의 ISO 측광 cross-calibration. 장비 논문.",
  "li_186":"<b>Marsh K. A. 외 2006</b> — Vega 를 측광 표준으로 사용하는 서브밀리미터 영상 장비 검증. morphology 제약 없음.",
  "li_187":"<b>Absil O. 외 2006</b> — CHARA/FLUOR K 밴드 초과 검출. 뜨거운 exozodiacal dust vs 장비 systematic 의 모호한 해석.",
  "li_188":"<b>Defrère D. 외 2011</b> — KIN nulling 간섭 exozodi 상한. 관련 baseline 에서 검출 없음.",
  "h3_189":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_190":"전체 filtered bib 는 미래 작업으로 보존됩니다. 스킵된 항목에는 측광 표준 검증 논문 (Bohlin 2007, 2014, 2020 — Vega 측광 영점, methodology only), SETI laser-emission 탐색 (Stone 2005, Tellis 2017 — cfg 결정 콘텐츠 없음), WASP/CHARA 파이프라인 개발 맥락의 Vega 컨퍼런스 abstract 가 포함됩니다. 가장 눈에 띄는 5개 스킵 항목. Bohlin R. C. 2007 STIS 스펙트로포토메트릭 표준 재보정 (순수 측광 methodology); Hinz P. M. 외 2001 MMT 적응광학 영상 시도 (Spitzer 이상의 morphology 제약 없음); Greaves J. S. 외 2014 JCMT POL-2 편광 후속 (장비 개발 논문, 새 기하 없음); Defrère D. 외 2021 Vega 포함 LBTI exozodi survey 결과 (non-detection 과 일관); Su K. Y. L. 외 2005 Spitzer-MIPS first-look (Su 2013 으로 대체됨).",
  "h2_191":"Open items for follow-up",
  "li_192":"<b>disk 지오메트리가 <code>disks_curated.json</code> 에 multi-belt 로 기록됨</b> (2026-05-29 감사). Vega 의 따뜻한 띠 + 차가운 띠가 별도 <code>belt</code> 항목이며, Decisions 표가 belt별 <code>disk_&lt;belt&gt;_*</code> 필드로 렌더 → belt당 Kopernicus Ring 하나씩. 남은 것은 tie-break per-belt tint 를 대체할 grain-size / Mie 색 합성.",
  "li_193":"<b>Yoon 2010 (0.455 ± 0.013 Gyr) 과 Monnier 2012 (0.7 ± 0.075 Gyr) 의 연령 불일치.</b> 두 논문 모두 회전 모델 isochrone 을 사용하지만 boundary condition 이 다름. cfg 는 Yoon 표제값 채택. 해결에는 Monnier 2012 §4 의 deep-read 와 Tetzlaff 2011 운동학 연령 cross-check 가 필요.",
  "li_194":"<b>Hurt 2021 의 0.04 AU 0.6 일 후보.</b> 2026 년 이후 후속 관측이 이를 진짜 행성으로 확정하면 (현재 미확인, 별 활동일 가능성) 새 Decisions 항목 <code>circumstellar_planet_present: true</code> 가 필요하고 행성 body cfg 가 추가되어야 함.",
  "li_195":"<b>Su 2013 의 14–110 AU gap-clearer 행성.</b> 현재는 원반 morphology 에서만 유도. 미래 JWST-NIRCam 또는 extreme-AO 직접 영상 확인이 추론을 확정된 행성 body 로 전환하면 cfg 추가 트리거.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
