  "h2_187":"Surface synthesis",
  "p_188":"Proxima b is the canonical M-dwarf eyeball planet candidate. Pierrehumbert 2011 first articulated the &quot;eyeball Earth&quot; climate state for tidally locked aquaplanets: under deep-red M-dwarf illumination, ice-albedo feedback combined with concentrated substellar heating produces a globally frozen world with a small liquid water region directly under the host star. The ratio of substellar liquid to global ice depends on insolation, atmospheric heat transport efficiency, and rotational state.",
  "p_189":"Boutle et al. 2017 GCM simulations specifically for Proxima b under 1-bar N₂+H₂O atmosphere show that the eyeball state is dynamically stable — convective updrafts at the substellar point efficiently remove the sea ice that would otherwise propagate inward from the poles, and the resulting cloud cover at the substellar zone provides a stabilizing albedo feedback (the &quot;M-dwarf cloud suppression&quot; mechanism is <i>not</i> a runaway-greenhouse pathway).",
  "p_190":"Turbet et al. 2016 considered three scenarios:",
  "li_191":"(A) Earth-twin 1-bar N₂+H₂O: eyeball with ~30% surface ice-free. Adopted.",
  "li_192":"(B) Snowball state with 1-bar CO₂ + ice: stable only at much lower CO₂ partial pressure.",
  "li_193":"(C) Hot greenhouse with thick CO₂ atmosphere: dynamically unstable; collapses to (A) over Myr timescales.",
  "p_194":"For NearStars cfg we adopt (A) as the canonical case.",
  "p_195":"<b>Color choice.</b> Ocean: very deep blue under M-dwarf illumination because water has very strong long-wavelength absorption — the preferential reflection at short wavelengths is fed by very little incident flux (M dwarf SED is dominated by IR), so the visible-band reflection is <i>bluer</i> than Earth&#x27;s ocean per surface, but <i>dimmer</i> in absolute brightness. RGB ≈ <span class=\"hex-chip\" style=\"background:#1a4060\"></span><code>#1a4060</code>.",
  "p_196":"<b>Surface ice.</b> M-dwarf illumination on H₂O ice produces a warm- tinted reflection (ice is bright across visible, so it accepts the red SED). RGB ≈ <span class=\"hex-chip\" style=\"background:#e0d8c0\"></span><code>#e0d8c0</code>. Polar caps appear as a warm cream-white fringe to a deep red-illuminated dark world.",
  "p_197":"<b>Continents.</b> Bare basalt + iron oxide weathering on M-dwarf worlds tends to produce surface oxidation as on TRAPPIST-1 d. Continents (if present) appear as dark brown-red patches between ice cap and substellar ocean.",
  "p_198":"<b>Substellar zone morphology.</b> Open ocean with persistent convective clouds; cloud cover ~50% (Boutle 2017). Cloud-decked ocean appears as a bright cream-white circle of ~30° angular diameter on the substellar point, embedded in surrounding ice. This is the &quot;eye&quot; of the eyeball Earth — the iconic visual feature.",
  "p_199":"<b>Cratering.</b> ~5 Gyr age + tidally locked → leading-hemisphere crater asymmetry (similar to Mercury&#x27;s old surface), but partly erased by ice resurfacing on the night/polar regions and by sediment burial in the substellar ocean.",
  "p_200":"<b>Habitability context.</b> Heller &amp; Armstrong 2014 &quot;Superhabitable worlds&quot; emphasizes that K-dwarf and earlier M-dwarf temperate worlds have stable long-baseline climates due to the host&#x27;s longer main-sequence lifetime. Proxima b at 5 Gyr is mid-life and could have hosted stable temperate conditions for the duration if (A) was its initial state.",
  "h2_201":"Atmosphere synthesis",
  "p_202":"No direct atmospheric observations exist for Proxima b. Theoretical inferences from XUV history, tidal locking, and equilibrium chemistry:",
  "p_203":"<b>XUV escape history.</b> Ribas et al. 2016 modeled cumulative XUV flux on b over 5 Gyr: ~10× current Earth value time-integrated. Sufficient to drive 1–10 Earth-ocean masses of water loss via hydrodynamic escape. <i>If</i> the initial water inventory was Earth- like, the residual water budget is uncertain — between fully desiccated (Zahnle &amp; Catling 2017 wet case) and ~Earth-equivalent (if the planet had significantly more initial water).",
  "p_204":"<b>Atmospheric retention.</b> Tian 2015 N₂ retention model predicts that a 1-bar N₂ atmosphere is stable against thermal escape for an Earth-mass planet at b&#x27;s orbit. Non-thermal escape (sputtering, ion pickup by stellar wind) is more aggressive — Garraffo et al. 2016 MHD models show partial atmospheric stripping during stellar wind enhancements. Net: ~0.1–1 bar N₂ atmosphere is plausible at present.",
  "p_205":"<b>Composition.</b> Outgassing balance from a mantle with Earth-like fO₂ produces dominant N₂ + CO₂ (~70:28) with trace H₂O. CH₄ and NH₃ are photolyzed by M-dwarf XUV faster than they can be replenished by volcanic outgassing. O₂ build-up from H₂O photolysis is possible but the inventory is sensitive to escape rates (Meadows 2017 false-positive biosignature analysis).",
  "p_206":"<b>Atmospheric circulation.</b> Standard tidally-locked GCM produces a single hemispheric convective cell with strong substellar updrafts, equatorial superrotating jet, and terminator-zone descending air. Day-night heat redistribution efficiency depends on surface pressure — at 0.5 bar, the night-side temperature is moderated to ~175 K (above CO₂ condensation, so no CO₂ ice cap).",
  "p_207":"<b>Lightning.</b> Braam et al. 2023 modeled lightning chemistry on tidally locked Earth-like worlds. Lightning-driven NO production in the substellar updraft is ~30% of Earth&#x27;s rate, producing detectable atmospheric chemistry signatures. For NearStars visual: occasional lightning flashes visible during the night-side passage under the substellar cloud deck.",
  "p_208":"<b>Cloud structure.</b> Cohen et al. 2022 show that &quot;traveling planetary-scale waves&quot; produce cloud variability on tidally locked aquaplanets — patches of stratus rotate with the planetary wave speed (~few day timescale). Visual: subglacial cloud bands at terminator zone, fragmenting and reforming on ~3-day timescale.",
  "p_209":"<b>Ozone.</b> Chen et al. 2023 model stratospheric ozone on synchronously rotating exoplanets: ozone is concentrated at the day-night terminator due to photolytic transport. Visual: faint UV-blue ozone layer at terminator only (not global).",
  "p_210":"<b>Flare atmosphere chemistry.</b> Howard 2023 flare statistics scaled to b&#x27;s orbit (0.0485 AU) give ~100 flares/yr at planet location. Each event temporarily dissociates the atmosphere by 30–80%, producing a &quot;flare smog&quot; of reactive nitrogen species that condense to NO₂/NO during the post-flare relaxation phase.",
  "h2_211":"Rotation &amp; spin synthesis",
  "p_212":"Tidal locking is essentially certain at b&#x27;s orbit: tidal synchronization timescale &lt;&lt; 5 Gyr (Barnes 2017 for moderate viscosity). Spin-orbit state could be:",
  "li_213":"<b>1:1</b> (default) — orbital eccentricity ≈ 0 favors this state. Adopted.",
  "li_214":"<b>3:2</b> — possible if orbit had been more eccentric in the past (Way et al. 2024 considers this for similar planets).",
  "p_215":"<b>Obliquity = 0.</b> Tidal damping over Gyr timescales drives obliquity to zero for tidally locked worlds without strong companion perturbation. Proxima&#x27;s wide AB hierarchical orbit provides negligible perturbation on b&#x27;s spin axis at present epoch.",
  "p_216":"<b>No day-night cycle.</b> With 1:1 lock and zero obliquity, the substellar point is fixed in surface coordinates. Visual: no diurnal lighting variation, no terminator drift. The only timescale is the stellar rotation period (83 d) producing slow stellar disk rotation, and the orbital period (11.2 d) producing eclipses / occultations of Alpha AB during conjunction.",
  "p_217":"<b>Day-night heat transport.</b> Despite the steady-state insolation geometry, large-scale atmospheric circulation produces strong day-night heat transport. The substellar warm pool (282 K) is balanced against the anti-stellar cold spot (~150 K with full atmospheric heat transport; ~120 K if atmosphere is thin/stripped).",
  "h2_218":"Visual styling",
  "p_219":"Combining surface and atmosphere decisions:",
  "li_220":"<b>Global color palette.</b> Deep-red ambient illumination from Proxima dominates. The substellar zone glows warm cream (cloud + ice + ocean blend); the polar zone is dim warm-cream ice; continents (if any) are dark brown-red basalt.",
  "li_221":"<b>Substellar view.</b> The &quot;iconic&quot; Proxima b appearance: looking down at the substellar point from above, the world resembles Pierrehumbert&#x27;s eyeball Earth — bright central cloud-decked ocean ringed by ice. The cloud center has detectable morphology (storms, convective cells).",
  "li_222":"<b>Terminator band.</b> The most dynamic region. Cloud bands fragment and reform; thin ozone layer creates a faint UV-blue glow visible from space at the day-night boundary; auroral emission from incoming stellar wind protons concentrated at ±50° magnetic latitude.",
  "li_223":"<b>Nightside.</b> Very dark and cold (~175 K). No insolation; only reflected light from Alpha AB (cream-yellow), aurora glow (greenish-red), and occasional lightning flashes during the substellar cloud convection. The Milky Way and Alpha AB dominate the night sky.",
  "li_224":"<b>Atmospheric haze.</b> The 0.5 bar atmosphere produces a faint pale tan-blue limb haze (~10 km thick), only visible against black-space limb illumination.",
  "li_225":"<b>Star in sky.</b> Proxima subtends ~1.5° (3× Sun-from-Earth&#x27;s apparent diameter). Deep red-orange (<code>~#ff6028</code>), visibly freckled with starspot complexes that drift on the 83-day rotation period. Solar-mass equivalent illumination (~0.65 S⊕) at orbit.",
  "li_226":"<b>Sister planet d in sky.</b> Proxima d at 0.0288 AU is closer to the star than b is. When in inferior conjunction with b, d passes within ~0.02 AU (~3 million km) of b — appears as a bright ~mV -2 star for several hours, then recedes. Not a full transit since orbits are not perfectly coplanar.",
  "li_227":"<b>Alpha AB in sky.</b> Brilliant point at V ≈ -7, cream-yellow, ~2° from a position that drifts very slowly over centuries. Bright enough to cast detectable shadows.",
  "li_228":"<b>Flare event visuals.</b> Once per ~4 days, a flare brightens Proxima by 5–50× for minutes. The substellar zone receives a brief intense UV-blue light pulse, washing out the normal red illumination. Aurora intensifies dramatically. The illuminating effect would be jarring for any KSP gameplay around b — a key feature of &quot;living near an active M dwarf.&quot;",
  "li_229":"<b>Superflare events.</b> Every ~1 yr at b&#x27;s orbit position, a ~10³³ erg flare brightens Proxima 100–1000×. Lasting 30 min, the planet briefly receives multi-solar-equivalent flux, triggering atmosphere chemistry and aurora storms.",
  "h2_230":"Bibliography",

  "p_260":"Key not-read examples:",
  "li_261":"&quot;A Catalog of Habitable Zone Exoplanets&quot; — context only.",
  "li_262":"&quot;Prospects for Cryovolcanic Activity on Cold Ocean Planets&quot; — intriguing but outside b&#x27;s parameter space (b is not cold-ocean per our cfg, it&#x27;s eyeball with substellar warm pool).",
  "li_263":"Multiple SETI search papers around Alpha + Proxima — null results, methodology only.",
  "p_264":"<b>User action requested.</b> If JWST or any future direct-imaging mission (HabEx, LUVOIR successor) produces actual atmospheric spectroscopy of b, the entire atmosphere section would need revision. The 2025–2026 ELT direct-imaging campaigns (Carlomagno 2023 framework) may produce first reflected-light constraints.",
  "p_265":"---",
  "h2_266":"Open items for follow-up",
  "li_267":"The inclination of b&#x27;s orbit is unconstrained (no transit detection). Adopted Msini → M_true factor 1.23 is a Mendillo 2018 statistical prior; a true direct measurement would tighten the mass.",
  "li_268":"The Pierrehumbert eyeball state assumption is robust per Boutle 2017 but depends on initial water inventory; if b is genuinely desiccated (Ribas 2016 worst case), the visual is closer to a baked Mars (cfg variant required).",
  "li_269":"The Earth-equivalent magnetic field assumption (35 μT equator) is based on terrestrial dipole scaling; if b has weaker dynamo due to tidal locking, the field could be &lt; 10 μT and aurora would be much brighter and lower-latitude.",
  "li_270":"The 3:2 spin-orbit resonance variant (Way 2024) would produce daylight migration cycles — a strikingly different cfg.",
  "li_271":"Lightning rate (Braam 2023) and visual flash frequency need better visual rendering — should appear as subtle subglacial flashes during the substellar cloud-deck pass.",
  "li_272":"The flare schedule (100/yr at b&#x27;s orbit) makes b&#x27;s &quot;living conditions&quot; notably hostile for any KSP crew operations — worth highlighting in cfg comments for radiation gameplay.",
  "li_273":"Direct-imaging follow-ups by 2030 (NEAR, ELT, KPIC) should refine the surface and atmosphere visual to the point where Phase 4 cfg revision is warranted.",

  "p_1":"NearStars KSP mod 의 Phase 3 행성 synthesis (2026-05-22 작성).",
  "p_2":"Proxima Cen b 는 1.302 pc 거리의 가장 가까운 거주 가능 행성 후보입니다. Anglada-Escudé et al. 2016 이 HARPS 의 radial velocity 로 발견, Faria et al. 2022 (ESPRESSO) 와 Suárez Mascareño et al. 2025 (HARPS+ESPRESSO+ NIRPS 결합) 가 정제. 지구 등급 질량의 세계 (Msini = 1.055 ± 0.055 M⊕, Suárez Mascareño 2025), 11.18일 궤도, 0.0485 AU, 지구 플럭스의 ~0.65× 수신 — 2904 K M5.5 호스트의 낙관적 거주 가능 영역 안쪽 가장자리 내부. 통과는 검출 안됨 (ASTERIA, TESS, MEarth-South, ATCA 후속의 다년간 탐색 모두 null), 지구 시선 기준 궤도 기울기 &lt; ~87° 의미.",
  "p_3":"투과 분광이 없어 대기 상태는 직접 관측으로 제약 안되고 이론적 고려에서 추론해야 함. 5 Gyr 동안의 XUV 견인 escape (Ribas et al. 2016, Zahnle &amp; Catling 2017), N₂/CO₂ 외기 균형 (Tian 2015, Lichtenberg 2024), tidally locked 조건의 GCM 기후 모델링 (Turbet et al. 2016, Boutle et al. 2017, Way et al. 2024 의 spin-orbit resonance 모음).",
  "p_4":"<b>NearStars 시나리오 선택. 지속적 substellar 해양과 frozen 극을 가진 온화 eyeball-Earth aquaplanet</b>, 얇은 N₂/CO₂ 대기 (~0.5 bar) 와 산재된 substellar 구름. 이는 JWST 등가 관측 방어 가능성과 2016 발견 발표 이래 대중 인식을 형성한 &quot;Proxima 의 푸른 점&quot; 모티프의 시각적 차별성 사이의 균형. 채택 desiccated 맨 암석 대안 (Ribas 2016 escape-dominated 케이스) 은 cfg variant 로 보존.",

  "td_183":"<span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span>",
  "td_184":"2904",

  "td_186":"Passegger 2019 SED 피팅",
  "h2_187":"Surface synthesis",
  "p_188":"Proxima b 는 정통 M-dwarf eyeball 행성 후보. Pierrehumbert 2011 이 tidally locked aquaplanet 의 &quot;eyeball Earth&quot; 기후 상태를 처음 articulate. deep-red M-dwarf 조명 아래, ice-albedo 피드백이 집중된 substellar 가열과 결합하여 호스트 별 바로 아래에 작은 액체 물 영역을 가진 글로벌 frozen world 생성. substellar liquid 대 글로벌 ice 비는 insolation, 대기 열 수송 효율, 자전 상태에 의존.",
  "p_189":"Boutle et al. 2017 의 Proxima b 에 특화된 1-bar N₂+H₂O 대기 GCM 시뮬레이션은 eyeball 상태가 역학적으로 안정 — substellar 점의 대류 updraft 가 그렇지 않으면 극에서 inward 로 전파될 sea ice 를 효율적으로 제거하고, substellar 영역의 결과 구름 cover 가 안정화 알베도 피드백 제공 (&quot;M-dwarf 구름 억제&quot; 메커니즘이 <i>runaway-greenhouse</i> 경로가 아님).",
  "p_190":"Turbet et al. 2016 이 세 시나리오 고려.",
  "li_191":"(A) Earth-twin 1-bar N₂+H₂O. ~30% 표면 ice-free 의 eyeball. 채택.",
  "li_192":"(B) 1-bar CO₂ + ice 의 snowball 상태. 훨씬 낮은 CO₂ 분압에서만 안정.",
  "li_193":"(C) 두꺼운 CO₂ 대기의 hot greenhouse. 역학적으로 불안정; Myr 시간 척도에서 (A) 로 붕괴.",
  "p_194":"NearStars cfg 는 (A) 를 canonical 케이스로 채택.",
  "p_195":"<b>색 선택.</b> 해양. M-dwarf 조명 아래 매우 깊은 푸름 — 물은 매우 강한 장파장 흡수가 있어 단파장에서의 선호 반사가 매우 작은 입사 플럭스로 공급 (M dwarf SED 가 IR 지배), 가시-밴드 반사가 표면당으로는 Earth 의 해양보다 <i>더 푸르</i>되 절대 밝기로는 <i>더 어두움</i>. RGB ≈ <span class=\"hex-chip\" style=\"background:#1a4060\"></span><code>#1a4060</code>.",
  "p_196":"<b>표면 빙.</b> H₂O 빙 위 M-dwarf 조명은 warm-tinted 반사 생성 (빙은 가시광에서 밝아 적색 SED 수용). RGB ≈ <span class=\"hex-chip\" style=\"background:#e0d8c0\"></span><code>#e0d8c0</code>. 극관은 deep red-illuminated 어두운 세계의 warm cream-white fringe 로 출현.",
  "p_197":"<b>대륙.</b> M-dwarf 세계의 맨 basalt + 산화철 weathering 은 TRAPPIST-1 d 에서처럼 표면 산화 경향. 대륙 (존재 시) 은 빙모와 substellar 해양 사이 어두운 brown-red 패치로 출현.",
  "p_198":"<b>Substellar 영역 형태.</b> 지속적 대류 구름이 있는 open ocean; 구름 cover ~50% (Boutle 2017). 구름 덮인 해양은 substellar 점에 ~30° 시직경의 밝은 cream-white 원으로 출현, 주변 빙에 embedded. 이것이 eyeball Earth 의 &quot;눈&quot; — 상징적 시각 feature.",
  "p_199":"<b>Cratering.</b> ~5 Gyr 나이 + tidally locked → leading hemisphere crater 비대칭 (Mercury 의 노년 표면과 유사), 그러나 야간/극 영역의 ice resurfacing 과 substellar 해양의 sediment burial 로 부분적으로 지워짐.",
  "p_200":"<b>거주 가능성 컨텍스트.</b> Heller &amp; Armstrong 2014 의 &quot;Superhabitable worlds&quot; 는 K-dwarf 와 더 이른 M-dwarf 온화 세계가 호스트의 더 긴 주계열 수명으로 안정 장기 baseline 기후를 가짐을 강조. 5 Gyr 의 Proxima b 는 중년이며 (A) 가 초기 상태라면 그 기간 동안 안정 온화 조건을 호스팅했을 수 있음.",
  "h2_201":"Atmosphere synthesis",
  "p_202":"Proxima b 의 직접 대기 관측 없음. XUV 역사, 조석 잠금, 평형 화학에서의 이론적 추론.",
  "p_203":"<b>XUV escape 역사.</b> Ribas et al. 2016 이 b 의 5 Gyr 누적 XUV flux 모델링. ~10× 현재 지구 값 시간 적분. 1–10 Earth-ocean 질량의 물 손실을 hydrodynamic escape 로 견인하기에 충분. 초기 물 인벤토리가 Earth-like 였다면, <i>잔류</i> 물 예산이 불확실 — fully desiccated (Zahnle &amp; Catling 2017 wet 케이스) 와 ~Earth-equivalent (행성이 훨씬 많은 초기 물을 가졌다면) 사이.",
  "p_204":"<b>대기 보존.</b> Tian 2015 N₂ 보존 모델은 1-bar N₂ 대기가 b 궤도의 Earth-mass 행성에 대해 thermal escape 에 안정 예측. 비-thermal escape (sputtering, stellar wind 의 ion pickup) 가 더 공격적 — Garraffo et al. 2016 MHD 모델은 stellar wind 강화 동안 부분 대기 stripping. Net. 현재 ~0.1–1 bar N₂ 대기 가능.",
  "p_205":"<b>조성.</b> Earth-like fO₂ 의 mantle 에서의 외기 균형은 dominant N₂ + CO₂ (~70:28) 와 trace H₂O 생성. CH₄ 와 NH₃ 는 M-dwarf XUV 에 의해 volcanic 외기로 보충될 수 있는 것보다 빠르게 광해리. H₂O 광해리에서 O₂ 축적 가능하나 인벤토리는 escape rate 에 민감 (Meadows 2017 false-positive biosignature 분석).",
  "p_206":"<b>대기 순환.</b> 표준 tidally-locked GCM 은 강한 substellar updraft, 적도 superrotating jet, terminator-zone descending air 의 단일 반구 대류 cell 생성. day-night 열 재분배 효율은 표면 압력에 의존 — 0.5 bar 에서 야간 온도가 ~175 K 로 조절 (CO₂ condensation 위, CO₂ 빙 cap 없음).",
  "p_207":"<b>번개.</b> Braam et al. 2023 이 tidally locked Earth-like 세계의 번개 화학 모델링. substellar updraft 의 lightning-driven NO 생성이 Earth rate 의 ~30%, 검출 가능한 대기 화학 서명 생성. NearStars 시각. substellar cloud deck 아래 야간 통과 동안 가시 가끔의 번개 섬광.",
  "p_208":"<b>구름 구조.</b> Cohen et al. 2022 가 &quot;traveling planetary-scale waves&quot; 가 tidally locked aquaplanet 의 구름 변광 생성을 보임 — 행성파 속도 (~며칠 시간 척도) 로 회전하는 stratus 패치. 시각. terminator 영역의 subglacial 구름 띠, ~3-일 시간 척도에 fragmenting 과 reforming.",
  "p_209":"<b>오존.</b> Chen et al. 2023 이 동기적으로 회전하는 외계행성의 성층권 오존 모델링. 오존은 day-night terminator 에 photolytic transport 로 집중. 시각. terminator 에만 옅은 UV-blue 오존 layer (글로벌 아님).",
  "p_210":"<b>Flare 대기 화학.</b> b 궤도 (0.0485 AU) 에 스케일된 Howard 2023 flare 통계는 행성 위치에서 ~100 flare/yr 부여. 각 이벤트가 대기를 일시적으로 30–80% 해리, post-flare relaxation phase 동안 NO₂/NO 로 condense 하는 반응성 질소 species 의 &quot;flare smog&quot; 생성.",
  "h2_211":"Rotation &amp; spin synthesis",
  "p_212":"조석 잠금은 b 궤도에서 본질적으로 확실. 동기화 시간 척도 &lt;&lt; 5 Gyr (Barnes 2017 의 적당 viscosity). Spin-orbit 상태 가능성.",
  "li_213":"<b>1:1</b> (default) — 궤도 이심률 ≈ 0 이 이 상태 선호. 채택.",
  "li_214":"<b>3:2</b> — 과거에 궤도가 더 이심적이었다면 가능 (Way et al. 2024 가 유사 행성들에 고려).",
  "p_215":"<b>Obliquity = 0.</b> Gyr 시간 척도의 조석 damping 이 강한 동반자 perturbation 없는 tidally locked 세계의 자전축 기울기를 0 으로 견인. Proxima 의 wide AB hierarchical 궤도가 현 에포크에서 b 의 spin axis 에 무시 가능 perturbation 제공.",
  "p_216":"<b>Day-night cycle 없음.</b> 1:1 잠금과 0 자전축 기울기로 substellar 점이 표면 좌표에 고정. 시각. 일주 조명 변광 없음, terminator drift 없음. 유일한 시간 척도는 별 자전 주기 (83 d) 가 생성하는 느린 별 디스크 자전과 합 (conjunction) 동안 Alpha AB 의 일식/엄폐를 생성하는 궤도 주기 (11.2 d).",
  "p_217":"<b>Day-night 열 수송.</b> 정상상태 insolation 기하임에도 대규모 대기 순환이 강한 day-night 열 수송 생성. substellar warm pool (282 K) 은 anti-stellar cold spot (~150 K 의 full atmospheric heat transport; 대기 얇거나 stripped 일 때 ~120 K) 에 대해 균형.",
  "h2_218":"Visual styling",
  "p_219":"표면과 대기 결정의 조합.",
  "li_220":"<b>전체 색 팔레트.</b> Proxima 에서 deep-red 환경 조명 지배. substellar 영역이 warm cream (구름 + 빙 + 해양 혼합) 글로우; 극 영역은 어두운 warm-cream 빙; 대륙 (있다면) 은 어두운 brown-red basalt.",
  "li_221":"<b>Substellar 뷰.</b> &quot;상징적&quot; Proxima b 외관. 위에서 substellar 점을 내려다보면 세계는 Pierrehumbert 의 eyeball Earth 닮음 — 밝은 중앙 구름-덮인 해양이 빙으로 둘러싸임. 구름 중심에 검출 가능한 형태 (폭풍, 대류 cell).",
  "li_222":"<b>Terminator 띠.</b> 가장 동적인 영역. 구름 띠가 fragment 와 reform; 얇은 오존 layer 가 day-night 경계에 공간에서 가시 옅은 UV-blue 글로우 생성; ±50° 자기 위도에 집중된 입사 stellar wind proton 의 오로라 발광.",
  "li_223":"<b>Nightside.</b> 매우 어둡고 차가움 (~175 K). insolation 없음; Alpha AB (cream-yellow) 의 반사광, 오로라 글로우 (greenish-red), substellar 구름 대류 동안 가끔의 번개 섬광만. Milky Way 와 Alpha AB 가 야간 하늘 지배.",
  "li_224":"<b>대기 헤이즈.</b> 0.5 bar 대기는 옅은 pale tan-blue limb 헤이즈 (~10 km 두께) 생성, 검은 우주 limb 조명에 대해서만 가시.",
  "li_225":"<b>하늘의 별.</b> Proxima 시직경 ~1.5° (지구에서 보는 태양의 3× 시직경). Deep red-orange (<code>~#ff6028</code>), 83-일 자전 주기에 drift 하는 흑점 complex 로 가시적 freckled. 궤도에서 태양-질량 등가 조명 (~0.65 S⊕).",
  "li_226":"<b>하늘의 sister 행성 d.</b> Proxima d 는 0.0288 AU 로 b 보다 별에 가까움. b 와의 inferior conjunction 시 d 는 ~0.02 AU (~3 백만 km) 안으로 지나감 — 수 시간 동안 밝은 ~mV -2 별로 출현 후 후퇴. 궤도가 완전 coplanar 가 아니어서 full transit 은 아님.",
  "li_227":"<b>하늘의 Alpha AB.</b> V ≈ -7 의 찬란한 점, cream-yellow, 수 세기 걸쳐 매우 느리게 drift 하는 위치에서 ~2°. 검출 가능한 그림자 던질 정도로 밝음.",
  "li_228":"<b>Flare 이벤트 시각.</b> 약 4일에 한 번 flare 가 Proxima 를 분 동안 5–50× 밝게 함. substellar 영역이 짧은 강한 UV-blue 빛 pulse 수신, 정상 적색 조명 wash out. 오로라가 극적으로 강화. 조명 효과는 b 주변 어떤 KSP 게임플레이에서나 jarring — &quot;활동적 M dwarf 근처에 사는 것&quot; 의 주요 feature.",
  "li_229":"<b>Superflare 이벤트.</b> b 의 궤도 위치에서 ~1 yr 마다 ~10³³ erg flare 가 Proxima 를 100–1000× 밝게. 30분 지속, 행성이 짧게 다중-태양 등가 플럭스 수신, 대기 화학과 오로라 폭풍 trigger.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
