  "p_1":"Proxima Centauri b is a 1.055-Earth-mass terrestrial planet on an 11.18-day, near-circular orbit around the closest star to the Sun (0.04848 AU semi-major axis, 0.65× Earth&#x27;s insolation). Discovered by Anglada-Escudé et al. 2016 (Nature 536, 437; <a href=\"https://arxiv.org/abs/1609.03449\">arXiv:1609.03449</a>) from a decade of HARPS, UVES, and follow-up RV monitoring, the planet has been refined through successive ESPRESSO + HARPS + NIRPS campaigns culminating in the Suárez Mascareño et al. 2025 (SM25) joint analysis. SM25 reports the current best orbital fit: P = 11.18465 ± 0.00053 d, a = 0.04848 AU, e ≈ 0 (consistent with circular at the precision of the fit), Msini = 1.055 ± 0.055 M⊕, mean anomaly at JD 2 460 548.59 of 0°. Both Faria 2022 and SM25 favor a circular orbit; the original Anglada-Escudé 2016 fit reported an upper limit e &lt; 0.35 rather than a best-fit non-zero eccentricity, and the later ESPRESSO + NIRPS data tighten this to e &lt; 0.1 (95% CL).",

  "td_201":"Proxima Teff",
  "h2_202":"Surface synthesis",
  "p_203":"Proxima b is the canonical &quot;eyeball Earth&quot; — a tidally-locked rocky planet with a substellar open-water disk surrounded by glacial ice. Boutle 2017 §3 demonstrates this geometry persists across both the Earth-like atmosphere (modern composition) and simplified-N₂ (1 bar N₂ + 376 ppm CO₂) scenarios; Del Genio 2019 confirms it survives the addition of a dynamic ocean component (which actually enhances heat redistribution and slightly widens the open-water disk).",
  "p_204":"The substellar open-water disk extends to roughly 60° from the substellar point — beyond this, surface temperatures fall below the freezing point and stable glacial ice forms. The boundary is not sharp: a transition annulus of sea-ice, slush, and intermittent melt-back produces a visually striking ring of color and texture shifts. The disk itself is dark — <span class=\"hex-chip\" style=\"background:#0a2238\"></span><code>#0a2238</code> in the cfg — because of the combination of low M-dwarf insolation (0.65 S⊕) and water&#x27;s deep absorption above 700 nm. To an observer in orbit, the ocean lens reads as a near-black disk against the bright glacial ice that covers the antistellar hemisphere.",
  "p_205":"The glacial ice surface (<span class=\"hex-chip\" style=\"background:#d4cab8\"></span><code>#d4cab8</code> cfg tint) covers ~75% of the planet. Sergeev 2020 (<a href=\"https://arxiv.org/abs/2004.03007\">arXiv:2004.03007</a>) finds that the substellar convective plume drives sustained subduction of warm air down to the surface beneath the open-water disk, which in turn maintains the ice boundary against the cold antistellar drag. Surface morphology at the terminator is dominated by ridges from glacial flow plus exposed bedrock at high-pressure ridge axes (cfg <code>surface_tint_rgb_hex_accent = #7a4a30</code> for the bedrock exposures).",
  "p_206":"Shields 2018 (<a href=\"https://arxiv.org/abs/1808.09977\">1808.09977</a>) raises the alternative hydrohalite-snowball scenario: if salinity is sufficient and the climate falls into a snowball regime, salt deposits on the ice surface enhance albedo and stabilize the snowball state. This is preserved as an Open-items variant rather than the canonical cfg choice.",
  "p_207":"The water mass fraction sets the depth of the open-water disk and the total subsurface ice reserve. Herath 2021 interior models allow 0.001 to 0.4 by mass, with no direct measurement to distinguish. The cfg&#x27;s 5–10% Earth-analog choice is a tie-break — it gives ~3-5 km mean ocean depth and recognizable Earth-like surface hydrology, but the range is broad. A drier (0.001) variant would shrink the open-water disk; a wetter (0.4) variant approaches Hycean geometry.",
  "h2_208":"Atmosphere synthesis",
  "p_209":"The cfg adopts the Boutle 2017 simplified-N₂ atmosphere as the canonical Proxima b scenario: 1 bar surface pressure, N₂-dominated (~99%), trace ~376 ppm CO₂, trace H₂O (saturated near the substellar surface, dropping to the dew point at higher altitudes and toward the terminator). Trace O₂ (≪ 1%) is included to support the [OI] 557.7 nm aurora emission; the source is photochemical (H₂O dissociation + escape of H), not biological.",
  "p_210":"This composition reproduces the canonical surface temperature distribution: T_substellar ≈ 290 K (peak dayside), T_nightside cold- trap minimum ≈ 150 K, T_global_mean ≈ 250 K (Boutle 2017 §3 + Fig. 2). Heat transport from substellar to nightside is dominated by atmospheric circulation under the simplified-N₂ scenario; addition of a dynamic ocean (Del Genio 2019) enhances the redistribution by ~10–20 K and raises nightside temperatures above the bare-N₂ cold-trap floor.",
  "p_211":"Cloud cover is 55% in the cfg — chosen as a midpoint of the Boutle 2017 + Cohen 2023 + Sergeev 2020 range. The cloud morphology is characteristic of tidally-locked synchronous M-dwarf planets: a substellar convective cluster (Sergeev 2020) with high cirrus shield, extra-tropical Rossby wave trains (Cohen 2023, <a href=\"https://arxiv.org/abs/2211.11887\">2211.11887</a>) that produce traveling cloud bands at ±30–60° latitude, and a clearer nightside (Joshi 2020 dark-side inversion analog). The cfg <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> field captures all three components in a single string.",
  "p_212":"Photochemistry (Yates 2020, <a href=\"https://arxiv.org/abs/1912.08743\">1912.08743</a>; Braam 2024, <a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) is dominated by O₃ production around the day-night terminator, with the canonical M-dwarf &quot;stratospheric ozone ring&quot; producing a UV signal that may be observable in future transmission spectroscopy (though Proxima b is non-transiting). Scheucher 2020 (<a href=\"https://arxiv.org/abs/2003.02036\">2003.02036</a>) adds the cosmic-ray-induced chemistry contribution — important during super-Alfvénic transits when the magnetosphere is heavily compressed.",
  "p_213":"The atmosphere is the planet&#x27;s primary radiation shield: the cfg&#x27;s <code>atmospheric_shielding_g_cm2 = 1000</code> (1 bar column) reduces the surface dose to ~5000 mSv/yr in quiet conditions (Atri 2020 Table 6 for analogous scenarios). Superflare events spike the dose to 10⁵ mSv per event, well above any biotic threshold but spatially and temporally localized.",
  "p_214":"Water-vapor transit ambiguity (Macdonald 2024, <a href=\"https://arxiv.org/abs/2402.12253\">2402.12253</a>) means even if Proxima b were transiting, distinguishing a humid 1-bar atmosphere from a desiccated surface would require very high- precision retrievals; the cfg&#x27;s atmospheric H₂O abundance is an inference rather than a measurement.",
  "h2_215":"Rotation &amp; spin synthesis",
  "p_216":"Proxima b is tidally locked, with the substellar point fixed at 0° in the planetary frame and the sidereal rotation period equal to the 11.18-day orbital period. Tidal locking timescales for a 1.055-M⊕ rocky planet at 0.04848 AU around a 0.122-M☉ M dwarf are &lt; 10⁵ years (Walterová 2020 Fig. 4), much shorter than the system age. Obliquity is similarly damped to 0°.",
  "p_217":"The spin-orbit resonance is 1:1 (synchronous) because the orbital eccentricity is zero (SM25). For any non-zero eccentricity Proxima b would migrate into a higher-order resonance (Makarov 2012 framework), producing intermittent insolation at the substellar point — Braam 2025 (<a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) explored spin-orbit resonance climate effects but the SM25 zero-eccentricity result rules them out for the cfg.",
  "p_218":"Libration amplitude is &lt; 1° (negligible). The substellar point&#x27;s fixed location creates the eyeball-Earth geometry described in the Surface synthesis section. The daily diurnal cycle is absent; the only temporal modulation comes from Proxima&#x27;s 7-year activity cycle, which slightly modulates the substellar insolation amplitude.",
  "p_219":"Magnetic dynamo: Zuluaga 2018 (<a href=\"https://arxiv.org/abs/1609.00707\">1609.00707</a>) finds that for a rocky planet of 1 M⊕ with Earth-like core structure and rotation periods of 10+ days, a modest intrinsic magnetic dipole is plausible (~ 0.01–1.0 M⊕ moment). The cfg adopts 0.1 M⊕ as a tie-break midpoint — sufficient for partial atmospheric shielding and visible aurora but not strong enough to fully repel Proxima&#x27;s stellar wind.",
  "h2_220":"Visual styling",
  "p_221":"In NearStars, Proxima b is the visual centerpiece of the system — the most-modeled tidally-locked rocky planet in the catalog, with a visually distinctive eyeball-Earth geometry. The substellar open-water disk (<span class=\"hex-chip\" style=\"background:#0a2238\"></span><code>#0a2238</code>) reads as a near-black eye on a bright glacial-white ice planet (<span class=\"hex-chip\" style=\"background:#d4cab8\"></span><code>#d4cab8</code>), with the warm-cream cloud cover (<span class=\"hex-chip\" style=\"background:#d8a888\"></span><code>#d8a888</code>) breaking up the surface into a distinctive substellar cluster + extratropical band pattern. The terminator ridges show exposed bedrock (<span class=\"hex-chip\" style=\"background:#7a4a30\"></span><code>#7a4a30</code>) — a warm earth-tone accent against the dominant cold palette.",
  "p_222":"Proxima fills 1.5° angular diameter in b&#x27;s sky — three times the apparent diameter of the Sun seen from Earth. The deep red M5.5V illumination (<code>stellar_color_temp_k = 2980</code>) saturates the entire surface with a warm cast. Aurora rings (<span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> primary, <span class=\"hex-chip\" style=\"background:#ff4d4d\"></span><code>#FF4D4D</code> secondary) ripple across the terminator during the frequent superflares, with the cfg <code>aurora_intensity_kR_typical = 500</code> producing visible-from-orbit glow during peak events.",
  "p_223":"Cloud-band morphology evolves on the 10-day rotation period of the substellar Rossby waves (Cohen 2023), giving in-game cloud animation a visible 1-week cadence. The substellar convective cluster pulses on a slightly faster ~5-day cycle (Sergeev 2020).",
  "p_224":"The atmosphere&#x27;s Rayleigh-scattering color is heavily reddened by the M-dwarf SED — instead of the blue sky of Earth, Proxima b&#x27;s atmosphere produces a dim, deep-red sky during day, transitioning through warm sunset tones to near-black at the terminator. The cfg <code>atmosphere_tint_rgb_hex = #4a3030</code> captures this red-shifted atmosphere visible from orbit. During Proxima superflares, the sky briefly brightens with intense UV + optical scattering, producing visually dramatic flare-events synchronized with the cfg <code>aurora_*</code> fields.",
  "h2_225":"Bibliography",
  "h3_226":"Read (visual-informative, drove decisions above)",
  "li_227":"<b>Anglada-Escudé G. et al. 2016</b> — <i>A terrestrial planet candidate in a temperate orbit around Proxima Centauri</i>, Nature 536, 437 (<a href=\"https://arxiv.org/abs/1609.03449\">arXiv:1609.03449</a>). Discovery paper. Best-fit P = 11.186 d, Msini = 1.27 M⊕, a = 0.0485 AU.",
  "li_228":"<b>Suárez Mascareño A. et al. 2025</b> — <i>Diving into the planetary system of Proxima with NIRPS</i> (<a href=\"https://arxiv.org/abs/2507.21751\">arXiv:2507.21751</a>). Current best orbital fit: P = 11.18465 d, e = 0, Msini = 1.055 M⊕.",
  "li_229":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (<a href=\"https://arxiv.org/abs/2005.12114\">arXiv:2005.12114</a>). Intermediate refinement.",
  "li_230":"<b>Faria J. P. et al. 2022</b> — <i>A candidate short-period sub-Earth orbiting Proxima Centauri</i> (<a href=\"https://arxiv.org/abs/2202.05188\">arXiv:2202.05188</a>). Refined b mass to 1.07 M⊕; companion Proxima d.",
  "li_231":"<b>Boutle I. A. et al. 2017</b> — <i>Exploring the climate of Proxima B with the Met Office Unified Model</i>, A&amp;A 601, A120 (<a href=\"https://arxiv.org/abs/1702.08463\">arXiv:1702.08463</a>). UK Met Office UM GCM; substellar open-water lens, eccentricity sensitivity, Earth-like and simplified-N₂ scenarios.",
  "li_232":"<b>Turbet M. et al. 2016</b> — <i>The habitability of Proxima Centauri b. II. Possible climates and observability</i>, A&amp;A 596, A112 (<a href=\"https://arxiv.org/abs/1608.06827\">arXiv:1608.06827</a>). 1D climate framework; aquaplanet to snowball range.",
  "li_233":"<b>Meadows V. S. et al. 2018</b> — <i>The Habitability of Proxima Centauri b: Environmental States and Observational Discriminants</i>, AsBio 18, 133 (<a href=\"https://arxiv.org/abs/1608.08620\">arXiv:1608.08620</a>). Atmospheric retention scenarios + observational discriminants.",
  "li_234":"<b>Del Genio A. D. et al. 2019</b> — <i>Habitable Climate Scenarios for Proxima Centauri b with a Dynamic Ocean</i>, AsBio 19, 99 (<code>2019AsBio..19...99D</code>; no arXiv preprint — Tier A manual followup, cited via Boutle / Sergeev / Salazar). Demonstrates dynamic ocean enhances heat redistribution and widens the open-water disk.",
  "li_235":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets</i>, ApJ 894, 84 (<a href=\"https://arxiv.org/abs/2004.03007\">arXiv:2004.03007</a>). Substellar convection plume drives heat transport.",
  "li_236":"<b>Salazar A. M. et al. 2020</b> — <i>The Effect of Substellar Continent Size on Ocean Dynamics of Proxima Centauri b</i>, ApJL 896, L34 (<a href=\"https://arxiv.org/abs/2005.14185\">arXiv:2005.14185</a>). Substellar continent geometry sensitivity.",
  "li_237":"<b>Lewis N. T. et al. 2018</b> — <i>The Influence of a Substellar Continent on the Climate of a Tidally Locked Exoplanet</i>, ApJ 854, 171 (<a href=\"https://arxiv.org/abs/1802.00378\">arXiv:1802.00378</a>). Dry substellar continent stabilizes circulation.",
  "li_238":"<b>Joshi M. M. et al. 2020</b> — <i>Earth&#x27;s Polar Night Boundary Layer as an Analog for Dark Side Inversions on Synchronously Rotating Planets</i>, ApJ 892, 81 (<a href=\"https://arxiv.org/abs/2003.06306\">arXiv:2003.06306</a>). Nightside inversion.",
  "li_239":"<b>Yates J. S. et al. 2020</b> — <i>Ozone chemistry on tidally locked M dwarf planets</i>, MNRAS 492, 1691 (<a href=\"https://arxiv.org/abs/1912.08743\">arXiv:1912.08743</a>). Terminator ozone ring.",
  "li_240":"<b>Cohen M. et al. 2023</b> — <i>Traveling Planetary-scale Waves Cause Cloud Variability on Tidally Locked Aquaplanets</i>, ApJ 942, 86 (<a href=\"https://arxiv.org/abs/2211.11887\">arXiv:2211.11887</a>). Rossby-wave cloud variability.",
  "li_241":"<b>Scheucher M. et al. 2020</b> — <i>Proxima Centauri b: A Strong Case for Including Cosmic-Ray-induced Chemistry in Atmospheric Biosignature Studies</i>, ApJ 893, 12 (<a href=\"https://arxiv.org/abs/2003.02036\">arXiv:2003.02036</a>). Cosmic-ray driven photochemistry.",
  "li_242":"<b>Shields A. L. et al. 2018</b> — <i>Hydrohalite Salt-albedo Feedback Could Cool M-dwarf Planets</i>, ApJL 866, L18 (<a href=\"https://arxiv.org/abs/1808.09977\">arXiv:1808.09977</a>). Snowball variant context.",
  "li_243":"<b>Zuluaga J. I. et al. 2018</b> — <i>Magnetic properties of Proxima Centauri b analogues</i>, MNRAS 480, 4225 (<a href=\"https://arxiv.org/abs/1609.00707\">arXiv:1609.00707</a>). Plausible dipole moment range.",
  "li_244":"<b>Atri D. et al. 2020</b> — <i>Stellar Proton Event-induced surface radiation dose</i> (<a href=\"https://arxiv.org/abs/1910.09871\">arXiv:1910.09871</a>). Surface dose calculation.",
  "li_245":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i> (<a href=\"https://arxiv.org/abs/2007.12459\">arXiv:2007.12459</a>). Tidal lock timescale.",
  "li_246":"<b>Garraffo C. et al. 2022</b> — <i>Revisiting the Space Weather Environment of Proxima Centauri b</i>, ApJL 941, L8 (<a href=\"https://arxiv.org/abs/2211.15697\">arXiv:2211.15697</a>). Stellar wind ram pressure spikes; magnetosphere compression.",
  "li_247":"<b>Lee Y. et al. 2021</b> — <i>Exosphere Modeling of Proxima b: A Case Study of Photochemical Escape</i> (<a href=\"https://arxiv.org/abs/2109.06963\">arXiv:2109.06963</a>). Venus-analog oxygen escape rate.",
  "li_248":"<b>Macdonald E. et al. 2024</b> — <i>Water vapour transit ambiguities for habitable M-Earths</i> (<a href=\"https://arxiv.org/abs/2402.12253\">arXiv:2402.12253</a>). Atmospheric humidity retrieval ambiguity.",
  "li_249":"<b>Galuzzo D. et al. 2021</b> — <i>Three-dimensional Climate Simulations for the Detectability of Proxima Centauri b</i>, ApJ 909, 191 (<a href=\"https://arxiv.org/abs/2102.03255\">arXiv:2102.03255</a>). 3D detectability framework.",
  "li_250":"<b>Braam M. et al. 2024</b> — <i>Earth-like Exoplanets in Spin–Orbit Resonances</i>, MNRAS 528, 3098 (<a href=\"https://arxiv.org/abs/2410.19108\">arXiv:2410.19108</a>). Climate dynamics + 3D photochemistry.",
  "h3_251":"Read (context / methodology, not decision-driving)",
  "li_252":"<b>Bonfils X. et al. 2018</b> — <i>A temperate exo-Earth around a quiet M dwarf at 3.4 parsec</i> (<a href=\"https://arxiv.org/abs/1711.06177\">arXiv:1711.06177</a>). Sister-system context.",
  "li_253":"<b>Jenkins J. S. et al. 2019</b> — <i>Proxima Centauri b is not a transiting exoplanet</i> (<a href=\"https://arxiv.org/abs/1905.01336\">arXiv:1905.01336</a>). Ruled out transit.",
  "li_254":"<b>Gilbert E. A. et al. 2021</b> — <i>No Transits of Proxima Centauri planets in high cadence TESS data</i> (<a href=\"https://arxiv.org/abs/2110.10702\">arXiv:2110.10702</a>). Reinforces Jenkins.",
  "li_255":"<b>Hammond T. et al. 2025</b> — Thermal emission spectra of nearby rocky exoplanets (<a href=\"https://arxiv.org/abs/2504.00978\">arXiv:2504.00978</a>). Multiple-planet spectra.",
  "li_256":"<b>De Luca P. et al. 2024</b> — Ozone-climate dynamics (<a href=\"https://arxiv.org/abs/2404.17972\">arXiv:2404.17972</a>).",
  "li_257":"<b>Boldog Á. et al. 2024</b> — Interior water content (<a href=\"https://arxiv.org/abs/2312.01893\">arXiv:2312.01893</a>).",
  "li_258":"<b>Noack L. et al. 2021</b> — <i>Interior heating and outgassing of Proxima Centauri b</i> (<code>2021A&amp;A...651A.103N</code>, no arXiv). Tier A manual followup; cited via abstract.",
  "li_259":"<b>Herath M. et al. 2021</b> — <i>Interior structures of Proxima b and Ross 128 b</i> (<code>2021MNRAS.500..333H</code>, no arXiv). Tier A manual followup; cited via abstract.",
  "li_260":"<b>Reiners A. et al. 2018</b> — Proxima magnetic field (<a href=\"https://arxiv.org/abs/1711.06576\">arXiv:1711.06576</a>).",
  "li_261":"<b>Vida K. et al. 2019</b> — Proxima flare statistics (<a href=\"https://arxiv.org/abs/1907.12580\">arXiv:1907.12580</a>).",
  "li_262":"<b>Fuhrmeister B. et al. 2022</b> — Proxima X-ray + FUV simultaneous flare (<a href=\"https://arxiv.org/abs/2204.09270\">arXiv:2204.09270</a>).",
  "h3_263":"Read (instrument / non-cfg-decisive)",
  "li_264":"<b>Hardegree-Ullman K. et al. 2025</b> — Bioverse direct-imaging prospects (<a href=\"https://arxiv.org/abs/2405.11423\">arXiv:2405.11423</a>). Future-observability framework.",
  "li_265":"<b>Singla M. et al. 2023</b> — Reflection spectra of terrestrial exoplanets (<a href=\"https://arxiv.org/abs/2303.00540\">arXiv:2303.00540</a>). High-contrast imaging.",
  "li_266":"<b>Pearce L. A. et al. 2025</b> — Direct-detection sky position predictions (<a href=\"https://arxiv.org/abs/2509.06747\">arXiv:2509.06747</a>). Mission planning.",
  "h3_267":"Not read — no arXiv preprint or low-priority (~85 papers)",
  "p_268":"Conference proceedings, biosignature speculations, technosignature searches, and gravitational-lens propulsion proposals; preserved in <code>docs/phase3/_bib/proxima-cen-b.yaml</code> with <code>status: skipped</code>. Three notable Tier A no-arXiv items captured in <code>phase3/alpha_centauri_proxima/manual-paper-followup.md</code>: <b>Del Genio 2019</b> (dynamic ocean), <b>Noack 2021</b> (interior outgassing), <b>Herath 2021</b> (interior structure).",
  "h2_269":"Open items for follow-up",
  "li_270":"<b>Atmosphere-stripped variant</b>: Atri 2020 + Garraffo 2022 + Lee 2021 all permit a stripped Proxima b under aggressive XUV / stellar-wind erosion scenarios. The cfg <code>atmosphere_present: true</code> is a tie-break; the alternative cfg variant has <code>atmosphere_present: false</code> and the surface becomes a hot-rocky desert with full Proxima irradiation. The downstream <code>kopernicus-cfg</code> writer can support both variants.",
  "li_271":"<b>Snowball variant</b>: Shields 2018 hydrohalite-snowball + Turbet 2016 low-CO₂ snowball give a fully ice-covered Proxima b with no substellar open-water disk. The cfg adopts the Boutle 2017 eyeball-Earth canonical, but the snowball is observationally consistent.",
  "li_272":"<b>Higher-water-content variant</b>: Herath 2021 interior models allow up to ~40 wt% water. A Hycean-style variant with much deeper substellar ocean and possible water-cloud opacity is another future cfg branch.",
  "li_273":"<b>Spin-orbit resonance climate</b>: Braam 2024 (<a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) explored non-synchronous spin-orbit resonance climates. SM25&#x27;s zero-eccentricity orbit makes the synchronous case canonical, but a re-analysis with weak eccentricity could change this.",
  "li_274":"<b>Direct imaging</b>: Sanghi 2025 + Beichman 2025 JWST programs may eventually constrain Proxima b&#x27;s reflected-light spectrum. If atmospheric features are detected, the cfg should be re-validated against the new constraints.",
  "li_275":"<b>Magnetic field measurement</b>: Zuluaga 2018 provides only a plausibility range. A future direct measurement via radio emission during a Proxima-wind transit could constrain the dipole moment.",

  ko: {
  "p_1":"Proxima Centauri b 는 태양에 가장 가까운 별을 11.18 일 거의 원형 궤도로 도는 1.055 지구질량 암석 행성입니다 (sma 0.04848 AU, 일조량 0.65× 지구). Anglada-Escudé 외 2016 (Nature 536, 437. <a href=\"https://arxiv.org/abs/1609.03449\">arXiv:1609.03449</a>) 가 10 년의 HARPS, UVES, follow-up RV 모니터링으로 발견했고, 이어진 ESPRESSO + HARPS + NIRPS 캠페인을 거치며 Suárez Mascareño 외 2025 (SM25) 의 결합 분석으로 정련됐습니다. SM25 가 보고한 현재 best 궤도 fit. P = 11.18465 ± 0.00053 d, a = 0.04848 AU, e ≈ 0 (fit 정밀도에서 원형과 일관), Msini = 1.055 ± 0.055 M⊕, JD 2 460 548.59 의 mean anomaly 0°. Faria 2022 와 SM25 모두 원형 궤도를 선호합니다. Anglada-Escudé 2016 의 원래 fit 은 non-zero best-fit eccentricity 가 아닌 e &lt; 0.35 의 상한이었고, 이후 ESPRESSO + NIRPS 데이터가 이를 e &lt; 0.1 (95% CL) 로 타이트하게 만들었 습니다.",
  "p_2":"행성은 통과하지 않습니다 (Jenkins et al. 2019, <a href=\"https://arxiv.org/abs/1905.01336\">arXiv:1905.01336</a>. Gilbert et al. 2021, <a href=\"https://arxiv.org/abs/2110.10702\">arXiv:2110.10702</a> — 여러 Spitzer + TESS 캠페인이 발견 주기에서 통과를 배제). 그래서 반지름, 밀도, 대기 성질은 측정값이 아니라 추론값입니다. Proxima b 의 기후 모델링은 이제 성숙했습니다. Turbet et al. 2016 가 1D 파라미터 공간을 처음 mapping 했고, Boutle et al. 2017 가 Met Office Unified Model (UM) 을 Earth-like 와 simplified- N₂ 시나리오로 돌렸으며, Del Genio et al. 2019 가 active ocean 컴포넌트 를 더했고, Sergeev et al. 2020 가 substellar convection 을 강조했으며, Salazar et al. 2020 와 Lewis et al. 2018 가 substellar continent 지오메트리를 탐색했고, Galuzzo 2021 가 3D 검출 가능성 시뮬레이션을 만들었고, Braam et al. (2022 / 2023 / 2024 / 2026) 가 trace species 스펙트라의 photochemistry framework 을 구축했습니다. Meadows et al. 2018 가 환경 상태와 관측 discriminant 를 열거했습니다.",
  "p_3":"대기 보유 질문 — Proxima 의 flare 환경에서 Proxima b 가 의미 있는 대기를 보유했는가 — 는 진짜로 열려 있습니다. Atri 2020 (<a href=\"https://arxiv.org/abs/1910.09871\">1910.09871</a>) 은 대기 없는 조건에서 다세포 생명에 lethal 한 표면 방사선 도즈를 계산하며, Lee 2021 (<a href=\"https://arxiv.org/abs/2109.06963\">2109.06963</a>) 은 ~10⁹ atoms cm⁻² s⁻¹ 의 Venus-analog photochemical 산소 escape 를 모델링하고, Garraffo 2022 (<a href=\"https://arxiv.org/abs/2211.15697\">2211.15697</a>) 는 super-Alfvénic transit 동안 항성풍 ram pressure 가 태양값의 10⁴–10⁶ 배 spike 함을 찾습니다. 반대편에서 Zuluaga 2018 (<a href=\"https://arxiv.org/abs/1609.00707\">1609.00707</a>) 은 적당한 고유 자기장 (~0.1 M⊕ 쌍극자 모멘트) 이 부분 차폐를 제공할 수 있음을 보이며, Meadows 2018 §3 는 모든 escape 계산이 초기 Proxima XUV 역사에 대한 가정에 의존하며 이 가정 자체가 10 배 수준에서 불확실하다고 지적 합니다. cfg 는 atmosphere-present 결정을 divergence 가 아니라 <b>tie-break</b> 으로 다룹니다. 문헌이 &quot;보유&quot; 와 &quot;박탈&quot; 시나리오 모두를 비슷한 plausibility 로 주며, NearStars 는 interesting-first 룰에 따라 시각적으로 구별되는 atmosphere-present 케이스를 선택합니다.",
  "p_4":"<b>NearStars 시나리오 선택. 1 bar N₂ + CO₂ 대기, substellar 점에서 ~60° 까지 뻗는 substellar 열린 물 ocean lens, 그 외 영역의 광범위한 빙하 ice 를 가진 1.055 M⊕ 의 조석 고정 암석 행성. 구름 덮개 55%, substellar convective cluster 와 Rossby-wave-driven extratropical 변동성 포함. 약한 고유 자기장 (~0.1 M⊕ 쌍극자 모멘트), 크게 압축된 magnetosphere, Proxima superflare 동안 잦은 aurora.</b> 42 cfg 픽. 31 canonical-aligned, 11 tie-break (hex 색상, 구름 morphology 디테일, 자기장 범위, 물 질량 분율). documented divergence 는 없습니다 — canonical reading (Boutle 2017 + Del Genio 2019 + Sergeev 2020 + Salazar 2020) 이 정확히 이 시나리오를 지지하며, snowball 과 desiccated 변형은 Open items 에 보존 됩니다.",

  "td_149":"Tie-break. Zuluaga 2018 plausibility 범위 0.01–1.0. 부분 차폐 regime 을 위해 0.1 선택. 암석형 다이나모 사다리(<a href=\"../wiki/reference__rocky-planet-dynamo-methodology.html\">rocky-planet-dynamo-methodology.md</a>, RM22)가 이를 보강한다. 지구질량 코어는 살아있지만 11.18일의 느린 조석고정 자전이 다극 regime 쪽으로 밀어 중심값은 ~0.06 M⊕ — 즉 0.1 선택값의 하위 절반에 해당한다",

  "h2_202":"Surface synthesis",
  "p_203":"Proxima b 는 canonical &quot;eyeball Earth&quot; 입니다 — 빙하 ice 로 둘러싸인 substellar 열린 물 디스크를 가진 조석 고정 암석 행성. Boutle 2017 §3 가 이 지오메트리가 Earth-like 대기 (현대 구성) 와 simplified-N₂ (1 bar N₂ + 376 ppm CO₂) 시나리오에 걸쳐 지속됨을 입증하며, Del Genio 2019 가 동적 ocean 컴포넌트를 추가해도 살아남음을 확인합니다 (실제로 열 재분배 를 강화해 열린 물 디스크를 약간 더 넓힙니다).",
  "p_204":"substellar 열린 물 디스크는 substellar 점에서 약 60° 까지 뻗으며, 이를 넘으면 표면 온도가 빙점 아래로 떨어지고 안정한 빙하 ice 가 형성됩니다. 경계는 sharp 하지 않고, sea-ice, slush, 간헐적 melt-back 의 전이 환이 시각적으로 인상적인 색과 텍스처 변화의 ring 을 만듭니다. 디스크 자체는 어둡습니다 — cfg 에서 <span class=\"hex-chip\" style=\"background:#0a2238\"></span><code>#0a2238</code> — 낮은 M 왜성 일조량 (0.65 S⊕) 과 물의 700 nm 이상 깊은 흡수가 결합한 결과입니다. 궤도의 관측자에게 ocean lens 는 antistellar 반구를 덮는 밝은 빙하 ice 대비 거의 검은 디스크로 보입니다.",
  "p_205":"빙하 ice 표면 (<span class=\"hex-chip\" style=\"background:#d4cab8\"></span><code>#d4cab8</code> cfg 색조) 이 행성의 ~75% 를 덮습니다. Sergeev 2020 (<a href=\"https://arxiv.org/abs/2004.03007\">arXiv:2004.03007</a>) 은 substellar convective 플룸이 열린 물 디스크 아래 표면까지 따뜻한 공기의 지속적인 subduction 을 구동하고, 이것이 다시 ice 경계를 차가운 antistellar drag 에 대해 유지함을 발견합니다. terminator 의 표면 morphology 는 빙하 흐름에서 온 ridge 와 고압 ridge 축의 노출된 bedrock 이 지배합니다 (bedrock 노출에 대한 cfg <code>surface_tint_rgb_hex_accent = #7a4a30</code>).",
  "p_206":"Shields 2018 (<a href=\"https://arxiv.org/abs/1808.09977\">1808.09977</a>) 은 대안 hydrohalite-snowball 시나리오를 제시합니다. 염도가 충분하고 기후가 snowball regime 으로 빠지면, ice 표면의 염 deposit 이 albedo 를 강화하고 snowball 상태를 안정화합니다. 이는 canonical cfg 선택 대신 Open items 변형으로 보존됩니다.",
  "p_207":"물 질량 분율이 열린 물 디스크의 깊이와 총 지하 ice 저장을 설정합니다. Herath 2021 내부 모델이 질량 기준 0.001 부터 0.4 까지 허용하며, 직접 측정으로 구분할 방법이 없습니다. cfg 의 5–10% 지구 analog 선택은 tie-break 입니다 — ~3-5 km 평균 ocean 깊이와 알아볼 수 있는 지구형 표면 hydrology 를 주지만, 범위가 넓습니다. 더 건조한 (0.001) 변형은 열린 물 디스크를 줄이고, 더 습한 (0.4) 변형은 Hycean 지오메트리에 접근합니다.",
  "h2_208":"Atmosphere synthesis",
  "p_209":"cfg 는 Boutle 2017 simplified-N₂ 대기를 canonical Proxima b 시나리오로 채택합니다. 1 bar 표면 압력, N₂ 우세 (~99%), trace ~376 ppm CO₂, trace H₂O (substellar 표면 근처 포화, 더 높은 고도와 terminator 쪽으로 dew point 까지 떨어짐). trace O₂ (≪ 1%) 가 [OI] 557.7 nm aurora 방출을 지원하기 위해 포함됩니다. 출처는 photochemical (H₂O 분해 + H escape) 이며 생물학적이 아닙니다.",
  "p_210":"이 구성은 canonical 표면 온도 분포를 재현합니다. T_substellar ≈ 290 K (peak dayside), T_nightside cold-trap 최소 ≈ 150 K, T_global_mean ≈ 250 K (Boutle 2017 §3 + Fig. 2). 열 수송이 substellar 에서 야측으로 simplified- N₂ 시나리오에서 대기 순환에 의해 지배되며, 동적 ocean (Del Genio 2019) 추가가 재분배를 ~10–20 K 강화하고 야측 온도를 bare-N₂ cold-trap 바닥 위로 올립니다.",
  "p_211":"구름 덮개는 cfg 에서 55% 입니다 — Boutle 2017 + Cohen 2023 + Sergeev 2020 범위의 중점으로 선택. 구름 morphology 는 조석 고정 동기 M 왜성 행성의 특징적인 형태. substellar convective cluster (Sergeev 2020) 와 높은 cirrus shield, extra-tropical Rossby wave trains (Cohen 2023, <a href=\"https://arxiv.org/abs/2211.11887\">2211.11887</a>) 가 ±30–60° 위도에 traveling 구름 밴드를 만들고, 더 맑은 야측 (Joshi 2020 dark-side inversion analog). cfg <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> 필드 가 세 컴포넌트 모두를 하나의 문자열로 잡습니다.",
  "p_212":"Photochemistry (Yates 2020, <a href=\"https://arxiv.org/abs/1912.08743\">1912.08743</a>. Braam 2024, <a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) 는 낮밤 terminator 주변의 O₃ 생성이 지배하며, canonical M 왜성 &quot;stratospheric ozone ring&quot; 이 미래 transmission spectroscopy 에서 관측 가능할 수 있는 UV 신호를 만듭니다 (Proxima b 가 비통과이지만). Scheucher 2020 (<a href=\"https://arxiv.org/abs/2003.02036\">2003.02036</a>) 이 우주선 유도 화학 기여를 더합니다 — magnetosphere 가 크게 압축되는 super-Alfvénic transit 동안 중요해집니다.",
  "p_213":"대기는 행성의 1차 방사선 차폐입니다. cfg 의 <code>atmospheric_shielding_g_cm2 = 1000</code> (1 bar 컬럼) 이 조용한 조건에서 표면 도즈를 ~5000 mSv/년으로 줄입니다 (Atri 2020 Table 6 의 비슷한 시나리오). Superflare 사건은 도즈를 사건당 10⁵ mSv 로 spike 시켜, 어떤 생물학적 임계점도 한참 넘기지만 공간적 시간적으로 국소화됩니다.",
  "p_214":"물 vapor transit 모호성 (Macdonald 2024, <a href=\"https://arxiv.org/abs/2402.12253\">2402.12253</a>) 은 Proxima b 가 통과했다 해도 1-bar 습한 대기와 desiccated 표면을 구분하려면 매우 고정밀 retrieval 이 필요함을 의미합니다. cfg 의 대기 H₂O 풍도는 측정값이 아니라 추론값입니다.",
  "h2_215":"Rotation &amp; spin synthesis",
  "p_216":"Proxima b 는 조석 고정 상태이며, substellar 점은 행성 frame 의 0° 에 고정되고 sidereal 회전 주기가 11.18 일 궤도 주기와 동일합니다. 0.122-M☉ M 왜성 주위 0.04848 AU 의 1.055-M⊕ 암석 행성에 대한 조석 고정 시간 스케일은 &lt; 10⁵ 년 (Walterová 2020 Fig. 4) 으로 시스템 나이보다 훨씬 짧습니다. 황도 경사도 비슷하게 0° 로 damping 됐습니다.",
  "p_217":"spin-orbit resonance 는 1:1 (동기) 인데, 궤도 이심률이 0 (SM25) 이기 때문입니다. 0 이 아닌 이심률이라면 Proxima b 는 더 높은 차수 resonance 로 migration 했을 것 (Makarov 2012 framework) 이며, substellar 점에서 간헐적 일조량이 만들어졌을 것입니다 — Braam 2025 (<a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) 가 spin-orbit resonance 기후 효과를 탐색했지만 SM25 의 0 이심률 결과가 cfg 에서 그것을 배제합니다.",
  "p_218":"Libration 진폭은 &lt; 1° 입니다 (무시할 수준). substellar 점의 고정된 위치 가 Surface synthesis 섹션에서 설명한 eyeball-Earth 지오메트리를 만듭니다. 일간 diurnal cycle 이 없고, 유일한 시간 변조는 Proxima 의 7 년 활동 사이클에서 옵니다 — substellar 일조량 진폭을 살짝 변조합니다.",
  "p_219":"자기 dynamo. Zuluaga 2018 (<a href=\"https://arxiv.org/abs/1609.00707\">1609.00707</a>) 은 지구형 핵 구조와 10+ 일 회전 주기를 가진 1 M⊕ 암석 행성에 대해 적당한 고유 자기 쌍극자가 plausible 함을 발견합니다 (~ 0.01–1.0 M⊕ 모멘트). cfg 는 0.1 M⊕ 를 tie-break 중점으로 채택합니다 — 부분 대기 차폐와 가시 aurora 에 충분하지만 Proxima 항성풍을 완전히 repel 할 만큼 강하지는 않습니다.",
  "h2_220":"Visual styling",
  "p_221":"NearStars 에서 Proxima b 는 시스템의 시각 centerpiece 입니다 — 카탈로그 에서 가장 많이 모델링된 조석 고정 암석 행성이며 시각적으로 구별되는 eyeball-Earth 지오메트리를 가집니다. substellar 열린 물 디스크 (<span class=\"hex-chip\" style=\"background:#0a2238\"></span><code>#0a2238</code>) 가 밝은 빙하-흰색 ice 행성 (<span class=\"hex-chip\" style=\"background:#d4cab8\"></span><code>#d4cab8</code>) 위에 거의 검은 눈으로 읽힙니다. 따뜻한 크림 구름 덮개 (<span class=\"hex-chip\" style=\"background:#d8a888\"></span><code>#d8a888</code>) 가 표면을 구분되는 substellar cluster + extratropical 밴드 패턴으로 쪼개고, terminator ridge 가 노출 된 bedrock (<span class=\"hex-chip\" style=\"background:#7a4a30\"></span><code>#7a4a30</code>) 을 보이며 — 지배적인 차가운 팔레트 대비 따뜻한 earth-tone 액센트입니다.",
  "p_222":"Proxima 가 b 의 하늘에서 각지름 1.5° 를 채웁니다 — 지구에서 본 태양 겉보기 지름의 3 배. 깊은 빨강 M5.5V 조명 (<code>stellar_color_temp_k = 2980</code>) 이 전체 표면을 따뜻한 cast 로 채웁니다. Aurora ring (<span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> 1차, <span class=\"hex-chip\" style=\"background:#ff4d4d\"></span><code>#FF4D4D</code> 2차) 이 잦은 superflare 동안 terminator 를 따라 일렁이며, cfg <code>aurora_intensity_kR_typical = 500</code> 이 peak 사건 동안 궤도에서 보이는 glow 를 만듭니다.",
  "p_223":"구름 밴드 morphology 는 substellar Rossby wave (Cohen 2023) 의 10 일 회전 주기로 진화하여, 게임 내 구름 애니메이션에 가시 1-주 cadence 를 줍니다. substellar convective cluster 는 살짝 빠른 ~5 일 사이클로 맥동 합니다 (Sergeev 2020).",
  "p_224":"대기의 Rayleigh 산란 색은 M 왜성 SED 에 의해 크게 reddening 됩니다 — 지구의 파란 하늘 대신 Proxima b 의 대기는 낮 동안 어둡고 깊은 빨강 하늘을 만들고, 따뜻한 sunset 톤을 거쳐 terminator 에서 거의 검정으로 전이합니다. cfg <code>atmosphere_tint_rgb_hex = #4a3030</code> 이 궤도에서 보이는 이 빨강-시프트된 대기를 잡습니다. Proxima superflare 동안 하늘이 강렬한 UV + 광학 산란과 함께 잠시 밝아져, cfg <code>aurora_*</code> 필드와 동기화된 시각 적으로 극적인 flare 이벤트를 만듭니다.",
  "h2_225":"Bibliography",

  "li_229":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (<a href=\"https://arxiv.org/abs/2005.12114\">arXiv:2005.12114</a>). 중간 단계 정련.",

  "li_232":"<b>Turbet M. et al. 2016</b> — <i>The habitability of Proxima Centauri b. II. Possible climates and observability</i>, A&amp;A 596, A112 (<a href=\"https://arxiv.org/abs/1608.06827\">arXiv:1608.06827</a>). 1D 기후 framework. aquaplanet 부터 snowball 까지 범위.",

  "li_235":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets</i>, ApJ 894, 84 (<a href=\"https://arxiv.org/abs/2004.03007\">arXiv:2004.03007</a>). substellar convection 플룸이 열 수송을 구동.",

  "li_240":"<b>Cohen M. et al. 2023</b> — <i>Traveling Planetary-scale Waves Cause Cloud Variability on Tidally Locked Aquaplanets</i>, ApJ 942, 86 (<a href=\"https://arxiv.org/abs/2211.11887\">arXiv:2211.11887</a>). Rossby-wave 구름 변동성.",

  "p_268":"학회 abstract, biosignature 추측, technosignature 탐색, gravitational- lens 추진 제안은 <code>docs/phase3/_bib/proxima-cen-b.yaml</code> 에 <code>status: skipped</code> 주석으로 보존됩니다. <code>phase3/alpha_centauri_proxima/manual-paper-followup.md</code> 에 잡힌 주목 할 만한 Tier A no-arXiv 항목 세 개. <b>Del Genio 2019</b> (동적 ocean), <b>Noack 2021</b> (내부 outgassing), <b>Herath 2021</b> (내부 구조).",
  "h2_269":"Open items for follow-up",
  "li_270":"<b>대기 박탈 변형.</b> Atri 2020 + Garraffo 2022 + Lee 2021 모두 공격적 XUV / 항성풍 침식 시나리오에서 박탈된 Proxima b 를 허용합니다. cfg <code>atmosphere_present: true</code> 는 tie-break 이며, 대안 cfg 변형은 <code>atmosphere_present: false</code> 로 표면이 완전한 Proxima 일조량을 받는 뜨거운 암석 사막이 됩니다. 하류 <code>kopernicus-cfg</code> writer 가 양쪽 변형을 지원할 수 있습니다.",
  "li_271":"<b>Snowball 변형.</b> Shields 2018 hydrohalite-snowball + Turbet 2016 저-CO₂ snowball 이 substellar 열린 물 디스크 없는 완전 ice-covered Proxima b 를 줍니다. cfg 는 Boutle 2017 eyeball-Earth canonical 을 채택하지만, snowball 은 관측과 일관됩니다.",
  "li_272":"<b>더 높은 물 함량 변형.</b> Herath 2021 내부 모델이 최대 ~40 wt% 물을 허용합니다. 훨씬 깊은 substellar ocean 과 가능한 물-구름 opacity 의 Hycean 식 변형은 또 다른 미래 cfg 분기입니다.",
  "li_273":"<b>Spin-orbit resonance 기후.</b> Braam 2024 (<a href=\"https://arxiv.org/abs/2410.19108\">2410.19108</a>) 이 비동기 spin-orbit resonance 기후를 탐색했습니다. SM25 의 0 이심률 궤도가 동기 케이스를 canonical 로 만들지만, 약한 이심률로 재분석하면 바뀔 수 있습니다.",
  "li_274":"<b>직접 촬영.</b> Sanghi 2025 + Beichman 2025 JWST 프로그램이 결국 Proxima b 의 반사광 스펙트럼을 제약할 수 있습니다. 대기 특징이 검출되면 cfg 가 새 제약에 대해 재검증돼야 합니다.",
  "li_275":"<b>자기장 측정.</b> Zuluaga 2018 가 plausibility 범위만 제공합니다. Proxima 항성풍 transit 동안의 라디오 방출을 통한 향후 직접 측정이 쌍극자 모멘트를 제약할 수 있습니다.",
  "h2_276":"Related",
  "li_277":"<a href=\"proxima-cen.html\">proxima-cen</a> — host 별 (M5.5Ve 플레어 환경. 대기 유지 문제는 host 의 XUV 이력에서 비롯됨)",
  "li_278":"<a href=\"proxima-cen-d.html\">proxima-cen-d</a> — 안쪽 형제 행성. USP Mercury-analog (대기 없음 예상) 으로 b 의 대기 유지 시나리오와 대비",
  "li_279":"<a href=\"trappist-1-e.html\">trappist-1-e</a> — 또 다른 온대 M-dwarf HZ aquaplanet analog. eyeball-Earth 의 substellar-ocean 기하를 공유",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
