  "h2_161":"Surface synthesis",
  "p_162":"AU Mic d is the most observationally uncertain of the AU Mic system&#x27;s four planets. Without a transit, the radius is not measured; the NASA Exoplanet Archive&#x27;s listed 1.02 R⊕ is a placeholder from a mass-radius relation (Chen &amp; Kipping 2017 probabilistic scaling), not an independent measurement. The cfg adopts this placeholder because (a) it is consistent with the Wittrock 2023 N-body-derived mass under an Earth-analog density assumption, and (b) the alternative (a smaller rocky planet at higher density, or a slightly larger sub-Neptune at lower density) would be no better constrained.",
  "p_163":"For NearStars purposes, d is therefore modeled as an Earth-analog rocky planet with density 5.45 g/cc and surface gravity 1.01 g_Earth — a plausible reading within the observational window. The surface is basaltic with iron-oxide reddening; the dark primary tone (<span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code>) reflects the M1V illumination + ferric mineral reddening common to weathered basalts under reducing atmospheric chemistry. The accent tone (<span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code>) represents active cooling-lava patches near the substellar point — a tie-break choice favoring visual interest over a uniformly weathered surface.",
  "p_164":"<b>Surface morphology under tidal lock.</b> With 1:1 spin-orbit synchronization, the substellar hemisphere remains permanently illuminated (530 K equilibrium) and the anti-substellar hemisphere remains permanently dark (250 K). Atmospheric heat transport is weak (thin atmosphere), so the temperature gradient across the terminator is steep — perhaps 50–80 K over ~1000 km. This drives:",
  "li_165":"<b>Substellar lava province.</b> Tidal heating + radiogenic heating + persistent stellar illumination keeps the substellar hemisphere warm enough for sustained volcanic activity. Cooling-lava patches are visible at 1000–1500 K (red-yellow glow) within active provinces; surrounding basaltic plains are at 530 K (dark).",
  "li_166":"<b>Mid-latitude weathered basalt.</b> The terminator zone (between substellar lava province and nightside cold trap) hosts weathered basaltic plains with photochemical iron-oxide reddening — the primary surface tint at <span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code>.",
  "li_167":"<b>Nightside cold trap.</b> Anti-substellar hemisphere accumulates frost from atmospheric transport — CO₂, SO₂, and trace H₂O condense. Surface ice caps are localized to the anti-substellar point; thin frost extends ~30° outward.",
  "p_168":"<b>Mineralogy.</b> Driven by AU Mic&#x27;s intense XUV flux, the upper-mm of the surface undergoes photochemical alteration: Fe²⁺-bearing silicates oxidize to Fe³⁺ on Gyr timescales, but at 22 Myr the process is only partially complete. The result is a surface with fresh dark basalt + partial weathered iron-oxide reddening — exactly the regolith reading the cfg adopts.",
  "p_169":"The youth of the system means <b>active resurfacing is plausible</b>. Driscoll &amp; Barnes 2015 framework for tidal-heating-driven volcanism on young rocky planets gives a tidal heat flux of ~0.1–1 W/m² for d at e = 0.003 — roughly equal to or slightly above Io&#x27;s flux of 2 W/m². This is sufficient to drive episodic volcanism that resurfaces substantial fractions of the planet on Myr timescales. The cfg&#x27;s substellar lava province + atmospheric SO₂ haze are the visible consequences.",
  "h2_170":"Atmosphere synthesis",
  "p_171":"The atmosphere of d is the cfg&#x27;s most consequential pick — and the one most exposed to revision. The dominant question is whether AU Mic&#x27;s super-flare bombardment over 22 Myr has stripped any primary H/He envelope (highly likely, given d&#x27;s small mass and AU Mic&#x27;s saturated XUV regime), and whether a thin secondary atmosphere sustained by outgassing is currently present.",
  "p_172":"<b>Documented divergence.</b> The canonical reading from XUV escape arguments (Owen &amp; Wu 2017; Cohen 2024 system-level MHD; Tristan 2023 super-flare census; Atri 2019 surface dose calculations) is that d should be airless: the rate of atmospheric stripping at d&#x27;s insolation under AU Mic&#x27;s XUV exceeds the rate of outgassing replenishment for Earth-mass volcanically-quiescent planets. The cfg picks differently — adopting a thin secondary atmosphere at ~10⁴ Pa (0.1 bar) — because (a) AU Mic&#x27;s young age makes d&#x27;s interior thermally active (tidal + radiogenic + residual accretion heat), (b) Driscoll &amp; Barnes 2015 framework supports active outgassing on Myr timescales, and (c) the atmosphere-present cfg provides a more visually distinctive presentation than a bare-rock airless analogue. The canonical airless reading is preserved as a cfg variant in Open items and listed in <code>## Canonical alternatives</code>.",
  "p_173":"<b>Pressure.</b> The cfg adopts ~10⁴ Pa (0.1 bar). At this pressure, visual atmospheric effects (Rayleigh scattering near the limb, sunset color, faint cloud cover) are present but subtle — closer to Mars&#x27;s atmosphere than Earth&#x27;s. The escape rate at this pressure balances against outgassing on Gyr timescales.",
  "p_174":"<b>Composition.</b> Volcanic outgassing of a relatively young rocky planet produces CO₂-dominated atmospheres (analog: early Earth, early Mars). The cfg composition (CO₂ ~85%, N₂ ~10%, SO₂ ~3%) reflects this canonical volcanic outgassing template, with SO₂ as a marker of active plume activity. H₂O is at trace levels — most water is either locked in interior reservoirs or has been photodissociated + lost (H escapes, O retained or oxidizes surface minerals).",
  "p_175":"<b>Sky appearance.</b> Under a thin CO₂ atmosphere at d, the daytime sky is a dim red-orange — Rayleigh scattering is minimal at 0.1 bar, so the sky is mostly dark even on the dayside, with the star&#x27;s direct glare and a faint dust-reddened haze. Looking horizontally through the atmosphere yields a deeper red-brown band — sunset geometry persists across the whole dayside. SO₂ aerosols from volcanic plumes give localized atmospheric haze patches with a warm cream tint (<span class=\"hex-chip\" style=\"background:#a08070\"></span><code>#a08070</code>). The nightside sky is dark with no illumination except for sister-planet conjunctions and starlight.",
  "p_176":"<b>Atmospheric retention.</b> Atri 2019 framework for surface dose under stellar proton events suggests that d&#x27;s atmosphere — even at 0.1 bar — provides limited radiation shielding (~100 g/cm² column, vs. Earth&#x27;s 1030 g/cm²). Super-flare events (Tristan 2023; Cully 1993) periodically strip the upper atmosphere; outgassing replenishes on timescales of years to decades. The cfg renders this as a faint upper-atmosphere glow during super-flare events — visible as a brief enhancement of the limb haze.",
  "h2_177":"Rotation &amp; spin synthesis",
  "p_178":"Tidal damping of an Earth-mass planet at 0.105 AU around 0.51 M☉ proceeds on a timescale of ~10⁵ years for rocky-planet Q ≈ 100 (Goldreich &amp; Soter 1966) — far shorter than the 22-Myr system age. d is fully locked into 1:1 spin-orbit synchronization. Eccentricity 0.003 (Wittrock 2023) is too low to support 3:2 spin-orbit (Vinson 2017 threshold ~0.01); 1:1 is unambiguous.",
  "p_179":"<b>KSP implementation note.</b> Rotation period = orbital period = 12.73596 days (1 100 234 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code>.",
  "p_180":"<b>No seasons.</b> Obliquity damped to zero. Eccentricity-induced insolation variation is ≲ 1% — negligible. Substellar and anti-substellar hemispheres are stable on geological timescales.",
  "p_181":"<b>Day-night thermal contrast.</b> With thin atmosphere (10⁴ Pa CO₂), day-night redistribution is weak. Expected contrast: 280 K (dayside 530 K, nightside 250 K). The substellar point is permanently at ~530 K, the terminator at ~390 K, and the anti-substellar point at ~250 K. These temperatures support the cfg&#x27;s surface morphology: substellar lava province, weathered terminator basalt, nightside frost cap.",
  "p_182":"<b>Slow rotation effects.</b> With a 12.74-day rotation period, Coriolis effects are weaker than Earth&#x27;s by an order of magnitude. Atmospheric circulation is dominated by direct day-to-night thermal forcing (Sergeev 2020 substellar convection framework) rather than zonal jets. Substellar convective cluster + nightside frost condensation form the dominant atmospheric pattern.",
  "h2_183":"Visual styling",
  "p_184":"The visual presentation of AU Mic d is a tidally-locked rocky world with a thin atmosphere — distinct from b/c&#x27;s gas-giant disks:",
  "li_185":"<b>Global appearance.</b> A dark basaltic disk with iron-oxide reddening and a bright substellar lava province, lit by AU Mic at 4.4° angular diameter (8× the Sun from Earth). The dayside hemisphere shows the characteristic &quot;eyeball&quot; geometry of a tidally-locked rocky planet with an active substellar zone; the substellar lava province is the brightest feature, glowing red-yellow at 1000–1500 K — visible from orbit as a bright patch ~30° in diameter.",
  "li_186":"<b>Substellar lava province.</b> Active cooling-lava patches at 1000–1500 K (red-yellow glow) within a roughly circular substellar region of ~30° radius. Surrounding basaltic plains (530 K) are dark (<span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code> primary tint). The contrast between glowing lava and dark basalt is the cfg&#x27;s most visually striking surface feature.",
  "li_187":"<b>Terminator weathered basalt.</b> Between substellar lava and nightside frost, the terminator zone shows weathered basaltic plains with iron-oxide reddening. Surface tint <span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code> primary with <span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code> accent at active volcanic patches. Long shadows at oblique illumination reveal subtle topographic relief.",
  "li_188":"<b>Nightside frost cap.</b> Anti-substellar hemisphere accumulates frost (CO₂, SO₂, trace H₂O) as the atmosphere transports volatiles to the cold trap. Visible as a localized bright patch (~30° diameter) centered on the anti-substellar point, surrounded by thin frost extending ~30° outward. Frost reflects starlight, making the nightside cold trap dimly visible.",
  "li_189":"<b>Atmospheric haze.</b> Pale red-brown limb glow (<span class=\"hex-chip\" style=\"background:#704030\"></span><code>#704030</code>) about 10–15 km thick — Rayleigh-scattered M-dwarf light + volcanic dust + SO₂ aerosol. Localized SO₂ plumes near active volcanic regions appear as warm cream patches (<span class=\"hex-chip\" style=\"background:#a08070\"></span><code>#a08070</code>) drifting on slow zonal winds.",
  "li_190":"<b>Auroras during super-flares.</b> Mars-analog visible aurora (<span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#ff6b6b</code> primary, CO₂⁺ Fox–Duffendack–Barker bands at 580–620 nm) appears during AU Mic super-flare events. Localized to the weak-magnetic-field poles; the auroral oval is at low magnetic latitude (~40°) because of the weak field. Visible from much of the nightside hemisphere during flare events; only at high magnetic latitude during quiescence.",
  "li_191":"<b>Star in sky.</b> AU Mic subtends 4.4° in d&#x27;s sky (8× the Sun from Earth) — a vast deep-red disk dominating the daytime sky. Surface illumination 9.3× Earth&#x27;s at substellar but red-shifted into the near-IR; the visible-light brightness is comparable to Earth&#x27;s noon sun. Super-flares brighten by 1–3 magnitudes for tens of minutes — visible as transient brightening of the substellar lava province.",
  "li_192":"<b>Sister planets.</b> b (innermost, puffy Neptune) at conjunction appears as a moderate dot ~0.3° in diameter; c (middle, sub-Neptune) smaller but still visible; e (outermost if confirmed) faint. The edge-on debris disk at 35–210 AU is visible as a thin bright streak on either side of AU Mic.",

  "td_199":"<span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span>",
  "td_200":"true (thin CO₂ ~0.1 bar; outgassing-replenished)",
  "td_201":"false (airless under AU Mic XUV bombardment)",
  "td_202":"Canonical interpretation under Owen &amp; Wu 2017 photoevaporation + Cohen 2024 system-level MHD + Tristan 2023 super-flare census is that Earth-mass d cannot retain a primary H/He envelope or a vapor-thin secondary atmosphere against AU Mic&#x27;s XUV flux at 0.105 AU. The cfg picks the volcanically-replenished thin-atmosphere reading because (a) d&#x27;s young age + tidal heating support active outgassing (Driscoll &amp; Barnes 2015), (b) the atmosphere-present visualization is meaningfully more interesting than a bare-rock airless analogue. The canonical airless variant is preserved in Open items as a cfg fallback.",
  "td_203":"<span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span>",

  "td_205":"0 (vacuum)",
  "td_206":"Downstream of atmosphere_present choice. Conservative variant ships pressure = 0 with all atmospheric visual layers disabled.",
  "td_207":"<span class=\"field-tt\" data-ko-tip=\"표면 액체수 해양 존재 여부.\" data-en-tip=\"Whether liquid-water surface ocean is present.\"><code>ocean_present</code></span>",
  "td_208":"false (visible surface dry; nightside cold trap accumulates ice/frost)",
  "td_209":"false (airless variant has no surface volatiles either)",
  "td_210":"The two variants converge on &quot;no liquid surface water&quot; but differ on whether nightside ice exists. Cfg keeps nightside ice in the atmosphere-present scenario; airless variant has no nightside ice (no atmosphere to transport volatiles).",
  "h2_211":"Bibliography",
  "h3_212":"Read (visual-informative, drove decisions above)",
  "li_213":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). N-body + TTV dynamical mass; introduces d as a TTV-only candidate at 12.74 d, mass 1.053 ± 0.511 M⊕. <b>Cornerstone discovery paper.</b>",
  "li_214":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO RV reanalysis recovers the d signal at marginal significance; confirms TTV-derived parameters within uncertainty.",
  "li_215":"<b>Driscoll P. E. &amp; Barnes R. 2015</b> — <i>Tidal Heating of Earth-like Exoplanets around M Stars</i>, Astrobiology 15, 739 (<code>2015AsBio..15..739D</code>, arXiv:1506.08077). Framework for tidal-heating-driven volcanism on young rocky planets at M-dwarf habitable zones. Adopted for d&#x27;s surface volcanism + atmosphere-replenishment argument.",
  "li_216":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation framework; canonical argument that small planets at d&#x27;s insolation under M-dwarf XUV strip atmospheres on Myr timescales. The cfg&#x27;s documented divergence is against this reading.",
  "li_217":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare census; rate 5.6/day above 10³¹ erg. Drives the atmospheric stripping argument for the canonical alternative.",
  "li_218":"<b>Atri D. 2019</b> — <i>Modelling stellar proton event-induced particle radiation dose on close-in exoplanets</i>, MNRAS 492, L28 (<code>2020MNRAS.492L..28A</code>, arXiv:1910.09871). Surface dose calculations for M-dwarf exoplanets under stellar proton events; informs the radiation environment and aurora intensity.",
  "li_219":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets: Insights from High-Resolution Simulations</i>, ApJ 894, 84 (<code>2020ApJ...894...84S</code>, arXiv:2004.03007). Substellar convection framework for tidally-locked thin-atmosphere planets.",
  "h3_220":"Read (context / methodology, not decision-driving)",
  "li_221":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS discovery of b; provides the stellar-activity context that informs d&#x27;s atmosphere retention discussion.",
  "li_222":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). Discovery of c; defines the inner planetary architecture that allowed TTV detection of d.",
  "li_223":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic Forecasting of the Masses and Radii of Other Worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). Mass-radius relation used by NASA Exoplanet Archive for the placeholder radius of d (1.02 R⊕).",
  "li_224":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). Tidal damping timescale framework used for the 1:1 spin-orbit conclusion.",
  "li_225":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>On the spin states of habitable zone exoplanets around M dwarfs: the effect of a near-resonant companion</i>, MNRAS 472, 3217 (<code>2017MNRAS.472.3217V</code>, arXiv:1709.00007). Spin-orbit resonance thresholds; e = 0.003 too low for 3:2.",
  "h3_226":"Read (instrument / non-decisive)",
  "li_227":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>). ZDI of host star; provides stellar magnetic-field context for the planetary radiation environment.",
  "li_228":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). Methodology for AU Mic RV detrending applied (indirectly) to Mallorquin 2024&#x27;s recovery of d.",
  "h3_229":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_230":"Several recent system-level dynamical studies (3-planet vs. 4-planet stability checks, TTV reanalysis with later TESS sectors) are noted in the ADS record but were not deep-read for this synthesis because they don&#x27;t change the headline mass/period parameters from Wittrock 2023. Proposal abstracts and conference summaries (DPS, EPSC) for d-specific characterization plans contribute no cfg-decisive content.",
  "h2_231":"Open items for follow-up",
  "li_232":"<b>Transit search for d.</b> If d&#x27;s orbital inclination is favorable (Wittrock 2023 TTV fit gives i ≈ 89.3° but with substantial uncertainty), a future TESS sector or PLATO observation could catch d&#x27;s transit and measure the radius directly. This would collapse the radius uncertainty + density uncertainty from low to high confidence.",
  "li_233":"<b>Independent confirmation.</b> d is currently TTV-only with marginal RV recovery. A second TTV epoch or higher-precision RV reduction would strengthen the planet&#x27;s confirmation. If d is retracted (unlikely given Mallorquin 2024 recovery but possible), the cfg should ship the AU Mic system with only b/c/e.",
  "li_234":"<b>Atmospheric detection / non-detection.</b> Any future transmission spectrum of d (if a transit is detected) would directly constrain the atmosphere-present cfg pick. A non-detection at high SNR would favor the canonical airless variant; a detection of CO₂/SO₂ would support the cfg&#x27;s outgassing scenario.",
  "li_235":"<b>Cfg variant: airless rocky d.</b> The canonical interpretation (canonical alternatives row) — d as an airless rocky planet stripped by AU Mic&#x27;s super-flare XUV bombardment — is preserved as a cfg variant. Surface tints remain similar (basaltic + iron-oxide), but atmosphere_present = false, ocean_present = false, no aurora, no atmospheric haze. The lava-province substellar feature persists in both variants (tidal + radiogenic heating).",
  "li_236":"<b>Cfg variant: massive d.</b> Wittrock 2023&#x27;s mass uncertainty spans 0.5–1.5 M⊕ (1σ). The high-mass end (1.5 M⊕) at the placeholder radius (1.02 R⊕) implies density 7.9 g/cc — a metal-rich composition like Mercury. This variant is unlikely to be visually distinguishable from the canonical reading but should be noted for interior-modeling consistency.",
  "li_237":"<b>Cfg variant: tidal heating extreme.</b> Driscoll &amp; Barnes 2015 framework allows for tidal heating up to ~10 W/m² in the high-e + high-Q range, sufficient to produce an Io-class globally-active d with widespread volcanism. The cfg adopts a moderate 0.1–1 W/m² reading; the Io-class variant would extend the substellar lava province to global coverage and increase atmospheric SO₂.",

  ko: {
  "p_1":"AU Microscopii d 는 22 Myr 의 M1Ve flare star AU Mic 주위 12.74-d 궤도를 도는 1.053 ± 0.511 M⊕ 지구질량 행성 후보입니다. Wittrock et al. 2023 (AJ 166, 232. <code>2023AJ....166..232W</code>, arXiv:2310.10719) 이 이미 알려진 행성 b 와 c 의 통과 타이밍 분석을 통해 TESS + 지상 결합 통과 데이터셋에서 발견했습니다. d 자체는 통과하지 않으며 (직접 반지름 측정 없음) 궤도 주기와 질량은 b 와 c 의 통과 시각에 새기는 중력 섭동에서 옵니다. Mallorquin et al. 2024 (<code>2024A&amp;A...689A.132M</code>) 의 독립적 ESPRESSO RV 재분석은 d 신호를 marginal RV 유의성에서 찾으며 TTV 유도 질량과 일관됩니다. NASA Exoplanet Archive 에 등재된 반지름 (1.02 R⊕) 은 측정값이 아니라 질량-반지름 관계의 placeholder 입니다.",
  "p_2":"d 가 통과하지 않으므로 bulk 밀도, 대기, 표면 속성은 측정이 아니라 추론됩니다. 질량 불확실도 (± 0.511 M⊕. 거의 50%) 가 큽니다. 0.105 AU 의 약 0.102 L☉ 일사량은 지구의 ~9.3 배 — 어떤 합리적 거주가능 영역 경계 안쪽으로도 깊이 들어가며, 지구 analog albedo 가정에서 평형 온도가 ~440 K 입니다. d 는 snow line 안쪽이자 분해된 잔해 원반 (35–210 AU) 안쪽을 돕니다. AU Mic 의 super-flare 폭격에 노출된 세 안쪽 작은 행성 (b 와 c 와 함께) 중 하나입니다.",
  "p_3":"<b>NearStars 시나리오 선택. 조석 lock 된 지구질량 암석 행성. 활발한 화산에서 outgassing 된 얇은 secondary 대기 (~10⁴ Pa, CO₂ 우세), 주간 측면에 철 산화물 reddening 이 있는 현무암 표면, substellar 부근에 부분 냉각 lava 피처, 그리고 전반적으로 뜨거운 terminator-to-야간 열 분포. 이 시나리오는 documented divergence 로 선택. AU Mic 의 XUV 폭격 하 canonical 해석은 airless (22 Myr 에 걸친 빠른 대기 스트립) 이지만 cfg 는 화산 보충 thin-atmosphere 해석을 택합니다 — 어리고 조석 가열되고 가능하면 magma-ocean-residual 인 행성에서의 outgassing 이 그럴듯한 보충원이며, 대기의 시각적 존재가 cfg 의 가장 구별되는 피처이기 때문.</b> 27 개 cfg 픽. 22 개 canonical-aligned, 3 개 tie-break, 2 개 documented divergence (atmosphere_present, ocean_present).",

  "h2_161":"Surface synthesis",
  "p_162":"AU Mic d 는 AU Mic 시스템의 네 행성 중 관측적으로 가장 불확실 합니다. 통과 없이 반지름은 측정되지 않습니다. NASA Exoplanet Archive 에 등재된 1.02 R⊕ 는 질량-반지름 관계 (Chen &amp; Kipping 2017 확률 스케일링) 의 placeholder 이지 독립 측정이 아닙니다. cfg 가 이 placeholder 를 채택하는 이유는 (a) 지구-analog 밀도 가정 하 Wittrock 2023 N-body 유도 질량과 일관되고, (b) 대안 (더 작은 암석 행성을 더 높은 밀도로, 또는 더 큰 sub-Neptune 을 더 낮은 밀도로) 이 더 잘 제약되지 않기 때문입니다.",
  "p_163":"NearStars 의 목적에서 d 는 따라서 밀도 5.45 g/cc, 표면 중력 1.01 g_Earth 의 지구-analog 암석 행성으로 모델링됩니다 — 관측 윈도우 안의 그럴듯한 reading. 표면은 철 산화물 reddening 을 가진 현무암 입니다. 어두운 주조 (<span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code>) 는 환원성 대기 화학 하 풍화된 현무암에 흔한 M1V 조명 + 철광물 reddening 을 반영합니다. accent 조 (<span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code>) 는 substellar 부근의 활동적 냉각 lava patch 를 표현 합니다 — 균일하게 풍화된 표면보다 시각적 흥미를 선호하는 tie-break 선택.",
  "p_164":"<b>조석 lock 하의 표면 형태.</b> 1:1 spin-orbit 동기화에서 substellar hemisphere 는 영구 조명을 받고 (530 K 평형) 반-substellar hemisphere 는 영구 어둡습니다 (250 K). 대기 열 운반이 약해 (얇은 대기) terminator 를 가로지르는 온도 구배가 가파릅니다 — ~1000 km 에 걸쳐 50–80 K 일 수 있음. 이는 다음을 구동합니다.",
  "li_165":"<b>substellar lava province.</b> 조석 가열 + 방사성 가열 + 지속적 항성 조명이 substellar hemisphere 를 지속적 화산 활동을 유지하기 에 충분히 따뜻하게 유지합니다. 냉각 lava patch 가 활동 province 안에서 1000–1500 K (붉은-노란 glow) 로 보입니다. 주변 현무암 평원 은 530 K (어두움).",
  "li_166":"<b>중위도 풍화 현무암.</b> terminator zone (substellar lava province 과 야간 cold trap 사이) 이 광화학 철 산화물 reddening 의 풍화된 현무암 평원을 호스트합니다 — 주 표면 색조 <span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code>.",
  "li_167":"<b>야간 cold trap.</b> 반-substellar hemisphere 가 대기 운반에서 서리 축적 — CO₂, SO₂, 미량 H₂O 가 응결. 표면 얼음 cap 이 반-substellar 점에 국한. 얇은 서리가 ~30° 바깥으로 뻗음.",
  "p_168":"<b>광물학.</b> AU Mic 의 강한 XUV 플럭스에 의해 구동된 표면의 상부 mm 가 광화학 변경을 겪습니다. Fe²⁺ 함유 규산염이 Gyr 시간 척도에서 Fe³⁺ 로 산화되지만, 22 Myr 에서는 과정이 부분 완료에 그칩니다. 결과 는 fresh 어두운 현무암 + 부분 풍화 철 산화물 reddening 의 표면 — 정확히 cfg 가 채택하는 regolith reading.",
  "p_169":"시스템의 어린 나이는 <b>활동적 resurfacing 이 그럴듯함</b> 을 의미합니다. 어린 암석 행성에 대한 조석 가열 구동 화산 활동의 Driscoll &amp; Barnes 2015 프레임워크는 e = 0.003 에서 d 에 대해 ~0.1–1 W/m² 의 조석 열 플럭스를 줍니다 — Io 의 2 W/m² 플럭스와 대략 같거나 약간 위. 이는 Myr 시간 척도에서 행성의 상당 부분을 resurface 하는 일시적 화산 활동을 구동하기에 충분합니다. cfg 의 substellar lava province + 대기 SO₂ haze 가 가시적 결과입니다.",
  "h2_170":"Atmosphere synthesis",
  "p_171":"d 의 대기는 cfg 의 가장 결과가 큰 픽이며 — 가장 수정에 노출된 픽 입니다. 지배적인 질문은 22 Myr 에 걸친 AU Mic 의 super-flare 폭격 이 어떤 primary H/He envelope 도 스트립했는지 (d 의 작은 질량과 AU Mic 의 포화 XUV 영역을 고려하면 매우 가능) 와, outgassing 으로 유지되는 얇은 secondary 대기가 현재 존재하는지입니다.",
  "p_172":"<b>Documented divergence.</b> XUV 탈출 논증의 canonical reading (Owen &amp; Wu 2017. Cohen 2024 시스템 수준 MHD. Tristan 2023 super-flare 센서스. Atri 2019 표면 dose 계산) 은 d 가 airless 여야 한다는 것 입니다. AU Mic 의 XUV 하 d 의 일사량에서의 대기 스트립 속도가 화산 활동이 잠잠한 지구질량 행성에 대한 outgassing 보충 속도를 초과합니다. cfg 는 다르게 선택 — ~10⁴ Pa (0.1 bar) 의 얇은 secondary 대기 채택 — 그 이유는 (a) AU Mic 의 어린 나이가 d 의 내부를 열적 으로 활동적으로 만들고 (조석 + 방사성 + 잔여 accretion 열), (b) Driscoll &amp; Barnes 2015 프레임워크가 Myr 시간 척도에서 활동 outgassing 을 뒷받침하며, (c) atmosphere-present cfg 가 bare-rock airless analog 보다 더 시각적으로 distinctive 한 표현을 제공하기 때문. canonical airless reading 은 Open items 의 cfg variant 로 보존되고 <code>## Canonical alternatives</code> 에 등재.",
  "p_173":"<b>압력.</b> cfg 는 ~10⁴ Pa (0.1 bar) 채택. 이 압력에서 시각적 대기 효과 (가장자리 근처의 Rayleigh 산란, 일몰 색, 옅은 구름 덮개) 는 존재하지만 미묘합니다 — 지구 대기보다는 Mars 대기에 가깝습니다. 이 압력에서의 탈출 속도가 Gyr 시간 척도에서 outgassing 과 균형을 이룹니다.",
  "p_174":"<b>조성.</b> 비교적 어린 암석 행성의 화산 outgassing 은 CO₂ 우세 대기 를 만듭니다 (analog. 초기 지구, 초기 Mars). cfg 조성 (CO₂ ~85%, N₂ ~10%, SO₂ ~3%) 이 이 canonical 화산 outgassing 템플릿을 반영 하며, SO₂ 는 활동 plume 활동의 마커입니다. H₂O 는 미량 수준 — 대부분 의 물은 내부 reservoir 에 갇혀 있거나 광분해 + 손실 (H 는 탈출, O 는 잔류하거나 표면 광물을 산화).",
  "p_175":"<b>하늘 외관.</b> d 의 얇은 CO₂ 대기 아래 주간 하늘은 흐릿한 적-주황 입니다 — Rayleigh 산란이 0.1 bar 에서 최소이므로 하늘은 주간에도 대부분 어둡고, 별의 직접 glare 와 옅은 먼지-reddening haze 만 있습니다. 대기를 수평으로 통과해 보면 더 깊은 red-brown 띠가 나옵니다 — 일몰 기하가 주간 전체에 걸쳐 지속됩니다. 화산 plume 의 SO₂ 에어로졸이 따뜻한 크림 색조 (<span class=\"hex-chip\" style=\"background:#a08070\"></span><code>#a08070</code>) 의 국지적 대기 haze patch 를 만듭니다. 야간 하늘은 자매 행성 conjunction 과 별빛 외에는 조명 없이 어둡습니다.",
  "p_176":"<b>대기 보전.</b> 항성 양성자 이벤트 하 표면 dose 의 Atri 2019 프레임 워크는 d 의 대기가 — 0.1 bar 에서도 — 제한된 복사 차폐를 제공함을 시사합니다 (~100 g/cm² column, 지구의 1030 g/cm² 대비). Super-flare 이벤트 (Tristan 2023. Cully 1993) 가 주기적으로 상층 대기를 스트립 합니다. outgassing 이 수년에서 수십 년 시간 척도에서 보충합니다. cfg 는 이를 super-flare 이벤트 동안의 옅은 상층 대기 glow 로 렌더링합니다 — 가장자리 haze 의 잠시 향상으로 보입니다.",
  "h2_177":"Rotation &amp; spin synthesis",
  "p_178":"0.51 M☉ 주위 0.105 AU 의 지구질량 행성에 대한 조석 감쇠는 암석 행성 Q ≈ 100 (Goldreich &amp; Soter 1966) 에서 ~10⁵ 년 시간 척도로 진행됩니다 — 22-Myr 시스템 나이보다 훨씬 짧습니다. d 는 1:1 spin-orbit 동기화에 완전히 잠겨 있습니다. 이심률 0.003 (Wittrock 2023) 은 3:2 spin-orbit (Vinson 2017 임계점 ~0.01) 을 지지하기에 너무 낮습니다. 1:1 이 분명합니다.",
  "p_179":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 12.73596 일 (1 100 234 초). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 일치해야 함.",
  "p_180":"<b>계절 없음.</b> Obliquity 가 0 으로 감쇠. 이심률 유도 일사 변동이 ≲ 1% — 무시 가능. substellar 와 반-substellar hemisphere 가 지질학적 시간 척도에서 안정.",
  "p_181":"<b>주야 열 대비.</b> 얇은 대기 (10⁴ Pa CO₂) 에서 주야 재분배가 약함. 예상 대비. 280 K (주간 530 K, 야간 250 K). substellar 점이 영구 ~530 K, terminator 가 ~390 K, 반-substellar 점이 ~250 K. 이 온도들이 cfg 의 표면 형태를 뒷받침합니다. substellar lava province, 풍화된 terminator 현무암, 야간 서리 cap.",
  "p_182":"<b>느린 자전 효과.</b> 12.74-일 자전 주기에서 Coriolis 효과는 지구의 한 자릿수 약합니다. 대기 순환은 zonal jet 보다는 직접적인 주야 열 forcing 에 지배됩니다 (Sergeev 2020 substellar 대류 프레임워크). substellar 대류 cluster + 야간 서리 응결이 지배적인 대기 패턴을 형성합니다.",
  "h2_183":"Visual styling",
  "p_184":"AU Mic d 의 시각 표현은 얇은 대기를 가진 조석 lock 암석 세계입니다 — b/c 의 가스 자이언트 디스크와 구별됨.",
  "li_185":"<b>전반 외관.</b> 철 산화물 reddening 과 밝은 substellar lava province 를 가진 어두운 현무암 디스크. 4.4° 각지름 (지구에서 본 태양의 8 배) 의 AU Mic 이 비춥니다. 주간 hemisphere 는 활동적 substellar zone 을 가진 조석 lock 암석 행성의 특징적 &quot;안구&quot; 기하를 보입니다. substellar lava province 가 가장 밝은 피처로 1000–1500 K 에서 red-yellow glow — 궤도에서 ~30° 지름의 밝은 patch 로 보임.",
  "li_186":"<b>substellar lava province.</b> ~30° 반지름의 대략 원형 substellar 영역 안에서 1000–1500 K (red-yellow glow) 의 활동적 냉각 lava patch. 주변 현무암 평원 (530 K) 은 어두움 (<span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code> 주 색조). 빛 나는 lava 와 어두운 현무암 간의 대비가 cfg 의 가장 시각적으로 돋보이는 표면 피처입니다.",
  "li_187":"<b>terminator 풍화 현무암.</b> substellar lava 와 야간 서리 사이에서 terminator zone 이 철 산화물 reddening 의 풍화된 현무암 평원을 보입니다. 표면 색조 <span class=\"hex-chip\" style=\"background:#5a4030\"></span><code>#5a4030</code> 주, 활동 화산 patch 에서 <span class=\"hex-chip\" style=\"background:#a04020\"></span><code>#a04020</code> accent. 비스듬한 조명에서의 긴 그림자가 미묘한 지형 기복을 드러 냅니다.",
  "li_188":"<b>야간 서리 cap.</b> 반-substellar hemisphere 가 서리 (CO₂, SO₂, 미량 H₂O) 를 축적하면서 대기가 cold trap 으로 volatile 을 운반 합니다. 반-substellar 점 중심의 국지적 밝은 patch (~30° 지름) 로 보이고, 얇은 서리가 ~30° 바깥으로 뻗습니다. 서리가 별빛을 반사 하여 야간 cold trap 이 흐릿하게 보입니다.",
  "li_189":"<b>대기 haze.</b> 옅은 red-brown 가장자리 glow (<span class=\"hex-chip\" style=\"background:#704030\"></span><code>#704030</code>) 약 10–15 km 두께 — Rayleigh 산란된 M-왜성 빛 + 화산 먼지 + SO₂ 에어로졸. 활동 화산 지역 근처의 국지적 SO₂ plume 이 느린 zonal wind 에 표류 하는 따뜻한 크림 patch (<span class=\"hex-chip\" style=\"background:#a08070\"></span><code>#a08070</code>) 로 보입니다.",
  "li_190":"<b>super-flare 동안의 오로라.</b> Mars-analog 가시 오로라 (<span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#ff6b6b</code> 주, CO₂⁺ Fox–Duffendack–Barker 밴드 580–620 nm) 가 AU Mic super-flare 이벤트 동안 나타납니다. 약한 자기장 극에 국한. 약한 필드 때문에 오로라 oval 이 낮은 자기 위도 (~40°) 에 있습니다. flare 이벤트 동안 야간 hemisphere 의 많은 곳에서 보임. 정적 동안에는 높은 자기 위도에서만.",
  "li_191":"<b>하늘의 별.</b> AU Mic 이 d 의 하늘에서 4.4° 를 차지 (지구에서 본 태양의 8 배) — 주간 하늘을 지배하는 광활한 깊은 붉은 디스크. substellar 에서 표면 조명 지구의 9.3 배이지만 근적외선 쪽으로 red-shift. 가시광 밝기는 지구의 정오 태양에 견줄 만함. Super-flare 가 10–60 분간 1–3 등급 밝힘 — substellar lava province 의 일시적 밝아짐으로 보임.",
  "li_192":"<b>자매 행성.</b> b (가장 안쪽, puffy Neptune) 가 conjunction 에서 ~0.3° 지름의 적당한 점으로 보임. c (중간, sub-Neptune) 가 더 작지만 여전히 보임. e (가장 바깥, 확인된다면) 가 옅음. 35–210 AU 의 가장자리 정면 잔해 원반이 AU Mic 양옆으로 가늘고 밝은 줄로 보임.",
  "h2_193":"Canonical alternatives",
  "h3_194":"Diverged cfg picks",
  "th_195":"Field",
  "th_196":"Gameplay (in cfg)",
  "th_197":"Canonical alternative",
  "th_198":"Why diverged",
  "td_199":"<span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span>",
  "td_200":"true (얇은 CO₂ ~0.1 bar. outgassing 보충)",
  "td_201":"false (AU Mic XUV 폭격 하 airless)",
  "td_202":"Owen &amp; Wu 2017 광증발 + Cohen 2024 시스템 수준 MHD + Tristan 2023 super-flare 센서스 하의 canonical 해석은 0.105 AU 의 AU Mic XUV 플럭스에 대해 지구질량 d 가 primary H/He envelope 도 vapor 두께의 secondary 대기도 보전할 수 없다는 것. cfg 는 화산 보충 thin-atmosphere reading 을 택함. 이유. (a) d 의 어린 나이 + 조석 가열이 활동 outgassing 을 뒷받침 (Driscoll &amp; Barnes 2015), (b) atmosphere-present 시각화가 bare-rock airless analog 보다 의미 있게 더 흥미. canonical airless variant 는 cfg fallback 으로 Open items 에 보존.",
  "td_203":"<span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span>",
  "td_204":"10000 (0.1 bar CO₂)",
  "td_205":"0 (진공)",
  "td_206":"atmosphere_present 선택의 downstream. 보수 variant 는 모든 대기 시각 레이어 비활성화로 pressure = 0 배포.",
  "td_207":"<span class=\"field-tt\" data-ko-tip=\"표면 액체수 해양 존재 여부.\" data-en-tip=\"Whether liquid-water surface ocean is present.\"><code>ocean_present</code></span>",
  "td_208":"false (가시 표면 건조. 야간 cold trap 이 얼음/서리 축적)",
  "td_209":"false (airless variant 도 표면 volatile 없음)",
  "td_210":"두 variant 가 &quot;표면 액체 물 없음&quot; 으로 수렴하지만 야간 얼음 존재 여부에서 다름. cfg 는 atmosphere-present 시나리오에서 야간 얼음 유지. airless variant 는 야간 얼음 없음 (volatile 운반할 대기 없음).",
  "h2_211":"Bibliography",
  "h3_212":"Read (visual-informative, drove decisions above)",
  "li_213":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). N-body + TTV 동역학 질량. 12.74 d, 질량 1.053 ± 0.511 M⊕ 의 TTV 전용 후보로 d 도입. <b>cornerstone 발견 논문.</b>",
  "li_214":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO RV 재분석이 d 신호를 marginal 유의성에서 회수. 불확실도 안에서 TTV 유도 파라미터 확인.",
  "li_215":"<b>Driscoll P. E. &amp; Barnes R. 2015</b> — <i>Tidal Heating of Earth-like Exoplanets around M Stars</i>, Astrobiology 15, 739 (<code>2015AsBio..15..739D</code>, arXiv:1506.08077). M-왜성 거주가능 영역의 어린 암석 행성에 대한 조석 가열 구동 화산 활동 프레임워크. d 의 표면 화산 + 대기 보충 논증에 채택.",
  "li_216":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발 프레임워크. M-왜성 XUV 하 d 의 일사량에서 작은 행성이 Myr 시간 척도에서 대기를 스트립한다는 canonical 논증. cfg 의 documented divergence 가 이 reading 에 반함.",
  "li_217":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare 센서스. 10³¹ erg 위 비율 5.6/일. canonical alternative 에 대한 대기 스트립 논증 구동.",
  "li_218":"<b>Atri D. 2019</b> — <i>Modelling stellar proton event-induced particle radiation dose on close-in exoplanets</i>, MNRAS 492, L28 (<code>2020MNRAS.492L..28A</code>, arXiv:1910.09871). 항성 양성자 이벤트 하 M-왜성 외계행성에 대한 표면 dose 계산. 복사 환경과 오로라 강도에 정보 제공.",
  "li_219":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets: Insights from High-Resolution Simulations</i>, ApJ 894, 84 (<code>2020ApJ...894...84S</code>, arXiv:2004.03007). 조석 lock thin-atmosphere 행성에 대한 substellar 대류 프레임워크.",
  "h3_220":"Read (context / methodology, not decision-driving)",
  "li_221":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS 의 b 발견. d 의 대기 보전 논의에 정보를 주는 항성 활동 맥락 제공.",
  "li_222":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). c 의 발견. d 의 TTV 검출을 가능하게 한 안쪽 행성 구조 정의.",
  "li_223":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic Forecasting of the Masses and Radii of Other Worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). d 의 placeholder 반지름 (1.02 R⊕) 에 NASA Exoplanet Archive 가 사용한 질량-반지름 관계.",
  "li_224":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). 1:1 spin-orbit 결론에 사용한 조석 감쇠 시간 척도 프레임워크.",
  "li_225":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>On the spin states of habitable zone exoplanets around M dwarfs: the effect of a near-resonant companion</i>, MNRAS 472, 3217 (<code>2017MNRAS.472.3217V</code>, arXiv:1709.00007). spin-orbit 공명 임계점. e = 0.003 이 3:2 에 너무 낮음.",
  "h3_226":"Read (instrument / non-decisive)",
  "li_227":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>). host 별 ZDI. 행성 복사 환경에 대한 항성 자기장 맥락 제공.",
  "li_228":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). Mallorquin 2024 의 d 회수에 (간접적으로) 적용된 AU Mic RV detrending 방법론.",
  "h3_229":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_230":"여러 최근 시스템 수준 동역학 연구 (3-행성 vs 4-행성 안정성 검사, 후기 TESS sector 의 TTV 재분석) 가 ADS 기록에 있지만, Wittrock 2023 의 headline 질량/주기 파라미터를 바꾸지 않아 이 합성을 위해 깊이 읽지 않았습니다. d-특정 특성화 계획에 대한 제안 초록과 학회 요약 (DPS, EPSC) 은 cfg-결정적 내용을 기여하지 않습니다.",
  "h2_231":"Open items for follow-up",
  "li_232":"<b>d 의 통과 탐색.</b> d 의 궤도 경사각이 호의적이라면 (Wittrock 2023 TTV fit 이 i ≈ 89.3° 를 주지만 상당한 불확실도) 미래의 TESS sector 나 PLATO 관측이 d 의 통과를 잡고 반지름을 직접 측정할 수 있습니다. 이는 반지름 불확실도 + 밀도 불확실도를 low 에서 high confidence 로 collapse 시킬 것입니다.",
  "li_233":"<b>독립 확인.</b> d 는 현재 marginal RV 회수의 TTV 전용입니다. 두 번째 TTV epoch 나 더 높은 정밀도 RV 환원이 행성 확인을 강화할 것입니다. d 가 철회된다면 (Mallorquin 2024 회수를 고려하면 가능성은 낮지만 가능함) cfg 는 AU Mic 시스템을 b/c/e 만 배포해야 합니다.",
  "li_234":"<b>대기 검출 / 비검출.</b> d 의 어떤 미래 투과 스펙트럼 (통과가 검출된다면) 도 atmosphere-present cfg 픽을 직접 제약할 것입니다. 높은 SNR 의 비검출은 canonical airless variant 를 선호하고, CO₂/SO₂ 검출은 cfg 의 outgassing 시나리오를 뒷받침할 것입니다.",
  "li_235":"<b>cfg variant. airless 암석 d.</b> canonical 해석 (canonical alternatives 행) — AU Mic 의 super-flare XUV 폭격에 의해 스트립된 airless 암석 행성으로서의 d — 가 cfg variant 로 보존됩니다. 표면 색조는 비슷하게 유지되지만 (현무암 + 철 산화물), atmosphere_present = false, ocean_present = false, 오로라 없음, 대기 haze 없음. lava province substellar 피처는 두 variant 모두에서 지속 (조석 + 방사성 가열).",
  "li_236":"<b>cfg variant. 무거운 d.</b> Wittrock 2023 의 질량 불확실도가 0.5–1.5 M⊕ (1σ) 에 걸칩니다. 고질량 끝 (1.5 M⊕) 이 placeholder 반지름 (1.02 R⊕) 에서 밀도 7.9 g/cc 를 함의 — Mercury 처럼 금속 풍부 조성. 이 variant 는 canonical reading 과 시각적으로 구별되지 않을 가능성이 크지만 내부 모델링 일관성을 위해 노트로 남겨야 합니다.",
  "li_237":"<b>cfg variant. 조석 가열 극단.</b> Driscoll &amp; Barnes 2015 프레임워크 가 고-e + 고-Q 범위에서 ~10 W/m² 까지의 조석 가열을 허용. 광범위한 화산 활동의 Io 급 전반 활동 d 를 만들기에 충분. cfg 는 적당한 0.1–1 W/m² reading 채택. Io 급 variant 는 substellar lava province 를 전 지구적 범위로 확장하고 대기 SO₂ 를 증가시킬 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
