  "p_95":"The photosphere of 55 Cnc A sits at the G–K boundary, ~580 K cooler than Sol. von Braun 2011 resolved it directly with the CHARA Array (θ_LD = 0.711 ± 0.004 mas), yielding R = 0.943 ± 0.010 R☉ and a bolometric Teff = 5196 ± 24 K — values that agree to within their errors with the Yee 2017 high-resolution spectroscopic 5172 ± 18 K and the Moutou 2025 SPIRou Zeeturbo 5198 ± 31 K. The IV-V luminosity class flags a star that has begun to evolve off the zero-age main sequence; combined with the 0.943 R☉ envelope this gives the modest 0.582 L☉ bolometric luminosity. The cfg <code>limb_darkening_alpha_h</code> is a 1D-atmosphere power-law estimate at α(H) ≈ 0.16, slightly stronger than Sol&#x27;s 0.14 at the cooler photosphere, consistent with the Claret–Bloemen 2011 grid for log g ≈ 4.4, Teff ≈ 5200 K. No direct interferometric limb-darkening profile has been published for the star.",
  "p_96":"The defining chemical feature is the extreme metal enrichment. 55 Cnc A is one of the most metal-rich stars in the solar neighborhood, [Fe/H] ≈ +0.31 to +0.42 (Soubiran 2024 +0.32 ± 0.02; Houdebine 2016 +0.42; literature spread +0.25 to +0.45). Per project policy this is not curated as a Phase 2 measurement — the line-blanketing reddening it produces is below the rendering perception threshold — but it is worth noting as the physical reason 55 Cnc A formed such a rich and massive planet retinue. Granulation patterns are expected to be Sun-like but ~10% smaller in linear scale at the cooler convective overturn.",
  "p_97":"Spot coverage is very low. log R&#x27;HK = −5.03 (Bourrier 2018) places 55 Cnc A in the lower decile of the local G/K activity distribution, quieter than the modern Sun, with peak-to-peak photometric variability of only ~2 mmag over the activity cycle. The cfg adopts a quiet-Sun spot envelope (~0.5% of disk at cycle maximum) and renders no prominent active-region structure. Moutou 2025&#x27;s SPIRou ZDI maps show a poloidal, mostly non-axisymmetric large-scale field of only 0.3 G at minimum — about ten times weaker than the Sun&#x27;s mean field.",
  "p_98":"The visual cream-orange tint <span class=\"hex-chip\" style=\"background:#ffeccf\"></span><code>#ffeccf</code> is interpolated from the K0 IV-V blackbody at 5196 K — ~200 K cooler than HD 69830 (5394 K, <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>), so a half-step warmer and oranger, but still well short of the deep orange of α Cen B (K1V). The super-solar metallicity nudges the SED marginally toward the red, but imperceptibly at rendering resolution.",
  "h2_99":"Atmosphere synthesis",
  "p_100":"55 Cnc A hosts a quiet K0 chromosphere–transition-region–corona structure typical of an old inactive late-G/early-K dwarf. The Ca II H&amp;K chromospheric index log R&#x27;HK = −5.03 (Bourrier 2018), confirmed by Moutou 2025&#x27;s 21-year mean of −5.01, sits at the inactive floor. Unlike most quiet field stars, 55 Cnc A has a <b>well-characterized activity cycle</b>: Bourrier 2018 detected a solar-like ≈ 10.5 ± 0.3 yr cycle in the KECK HIRES S-index (amplitude 0.024, nearly twice the Sun&#x27;s), with consistent ~11.8 yr in Hα and ~12.6 yr in archival RV (Baluev 2015). The cycle&#x27;s anti-correlation between Hα and S-index mirrors the behavior seen in a handful of other slow-rotating stars.",
  "p_101":"The large-scale magnetic field is unusually feeble. Moutou 2025&#x27;s SPIRou spectropolarimetric campaign caught the star at activity minimum and measured an unsigned field of just 0.3 G, rising to ~0.9 G as it left minimum, and ~3 G near the 2017 maximum (Folsom 2020) — about ten times weaker than the Sun&#x27;s 7–15 G range. This is consistent with the very low log R&#x27;HK and the old age.",
  "p_102":"No published long-baseline X-ray cycle exists for 55 Cnc A. The cfg adopts a log L_X range 26.8–27.3 cgs spanning Sun-quiet to Sun-cycle-max analog levels — a tie-break in the absence of a measured X-ray cycle amplitude, scaled from the quiet K0 V locus. The integrated XUV luminosity stays well below 10⁻⁴ L_bol, far too feeble to materially erode an Earth-equivalent atmosphere over Gyr timescales at the star&#x27;s habitable zone (~0.67–1.32 AU; von Braun 2011) — though planet f, which spends part of its eccentric orbit in that zone, is itself a gas giant.",
  "p_103":"The corona/chromosphere visual extent is rendered at the quiet-Sun reference — a thin chromospheric layer and a faint corona to ~3 R★, brightening by ~20% over the 10.5 yr cycle.",
  "h2_104":"Rotation &amp; spin synthesis",
  "p_105":"55 Cnc A has a robustly measured rotation period of P_rot = 38.8 ± 0.05 d (Bourrier 2018), derived from a sine fit to the Hα activity-index residuals after removing the magnetic cycle. It is corroborated from multiple independent channels: Season-9 APT photometry gives 40.4 ± 0.8 d (weighted-mean of all photometric seasons 40.04 ± 0.39 d), Henry 2000&#x27;s Ca II emission monitoring gives ~39 d, and Fischer 2008&#x27;s earlier APT photometry 42.7 ± 2.5 d. Moutou 2025 independently recovers 38.7 ± 0.8 d from a quasi-periodic GPR fit and adopts the 39 d ZDI value of Folsom 2020. The 34–43 d spread across methods is consistent with a modest level of differential rotation (Folsom 2020 places an upper limit of 0.065 rad/day).",
  "p_106":"The slow ~39 d rotation is itself the cleanest argument for the old age: Moutou 2025 notes that a rotation period &gt; 30 d is not expected for a 30 Myr solar-type star, which rules out the young (31 Myr) interferometric-radius branch of the Ligi 2016 stellar-evolution solution in favor of the &gt;10 Gyr branch — the configuration adopted here. The slow rotation is the product of ~10 Gyr of magnetic braking via the Skumanich law.",
  "p_107":"No asteroseismic mode detection drives the cfg; the predicted ν_max sits too high for the survey cadences deployed to date and the very low activity floor offers no help. The cfg adopts no oscillation-driven brightness modulation. Differential rotation is expected Sun-like but not directly resolved; the rotation-axis inclination is poorly constrained (ZDI assumed i ≈ 70–90°). For visual rendering NearStars adopts an axis tilted modestly to the mean orbital plane of the five-planet system.",
  "p_108":"In KSP units the cfg sets the stellar <code>rotationPeriod</code> to the measured 38.8 d (Bourrier 2018) — informational; Kopernicus does not animate stellar rotation directly, but Principia reads <code>rotationPeriod</code> for spin-axis bookkeeping.",
  "h2_109":"Visual styling",
  "li_110":"<b>Orbit view (system-overview render).</b> A warm yellow-orange K0 point hosting a tightly packed inner trio (e at 0.015 AU, lost in the glare; b at 0.118 AU; c at 0.247 AU), the eccentric f at 0.80 AU sweeping the inner edge of the habitable zone, and the cold giant d far out at 5.6 AU. The ~4 AU gap between f and d is the system&#x27;s defining architectural feature.",
  "li_111":"<b>Stellar disk (close-up).</b> Quiet K0 IV-V with the textbook H-band power-law limb darkening; granulation cells slightly smaller than Sol&#x27;s; no prominent active regions except a faint cycle-averaged spot brightness modulation (~0.5% peak-to-peak) at cfg cycle maximum.",
  "li_112":"<b>Stellar color.</b> Warm yellow-orange <span class=\"hex-chip\" style=\"background:#ffeccf\"></span><code>#ffeccf</code> — between Sol&#x27;s <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> and HD 69830&#x27;s <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>, a touch warmer than the latter at its ~200 K cooler Teff. 55 Cnc A is a &quot;redder, mildly evolved near-solar&quot; entry in the NS catalog.",
  "li_113":"<b>Activity cycle animation.</b> Over the 10.5 yr cycle (Bourrier 2018) the corona brightens by ~20% and the spot coverage peaks at ~0.5%; the large-scale field swings from 0.3 G (minimum) to ~3 G (maximum, Moutou 2025). Faint and slow by M-dwarf standards.",
  "li_114":"<b>The distant red second sun (55 Cnc B).</b> From any planet around A, the M4.5V companion at ~1065 AU is an unresolved orange-red point of light — far too distant to show a disk (angular diameter ≪ 1″), but a recognizably warm second star many magnitudes brighter than any background field star. Flagged in the cfg <code>visual_companion_event_distant_red_second_sun</code>. The A–B orbit is unmodeled (~30 000 yr period, no published Keplerian), so B&#x27;s position is treated as fixed on gameplay timescales.",
  "li_115":"<b>Star in sky from Earth.</b> V = 5.95 places 55 Cnc A at the naked-eye threshold in Cancer; in dark-sky conditions it is just visible, otherwise one of many 6th-magnitude field stars — distinguished only by the in-game telescope view that resolves the five-planet system.",
  "h2_116":"Bibliography",
  "h3_117":"Read (visual-informative, drove decisions above)",
  "li_118":"<b>von Braun K. et al. 2011</b> — <i>The 55 Cancri System: Fundamental Stellar Parameters, Habitable Zone Planet, and Super-Earth Diameter</i>, ApJ 740, 49 (<code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>). CHARA interferometry: θ_LD = 0.711 ± 0.004 mas → R = 0.943 ± 0.010 R☉, direct Teff = 5196 ± 24 K, bolometric L = 0.582 ± 0.014 L☉, evolutionary mass 0.905 ± 0.015 M☉, HZ 0.67–1.32 AU. <b>Phase 2 anchor for the entire stellar layer (R, Teff, L, M).</b>",
  "li_119":"<b>Bourrier V. et al. 2018</b> — <i>The 55 Cnc system reassessed</i>, A&amp;A 619, A1 (<code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>). Two decades of photometry + spectroscopy: P_rot = 38.8 ± 0.05 d, log R&#x27;HK = −5.03, solar-like magnetic cycle P_mag ≈ 10.5 ± 0.3 yr (S-index; ~11.8 yr Hα), confirming an old (~10 Gyr) quiet star. Homogeneous system refit including the magnetic-cycle Keplerian. <b>Phase 2 recommended mass / rotation / activity / planet-e anchor.</b>",
  "li_120":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou: questions about the magnetic cycle of 55 Cnc A and two new planets around B</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). SPIRou spectropolarimetry of both A and B; P_rot = 38.7 ± 0.8 d (GPR), ZDI field 0.3 G (min) – 3 G (max), ~10× weaker than the Sun; adopts age &gt; 10 Gyr; revised outer planet d (P 4799 d) and a possible 6th candidate / 13.15 yr 3.8 M_Jup signal; discovers two planets around 55 Cnc B. <b>Postdates the model knowledge cutoff — all values value-checked against the cached text.</b>",
  "h3_121":"Read (context / methodology, not directly decision-driving)",
  "li_122":"<b>Demory B.-O. et al. 2016</b> — <i>Variability in the super-Earth 55 Cnc e</i>, Nature 532, 207 (<code>2016Natur.532..207D</code>, <a href=\"https://arxiv.org/abs/1505.00269\">arXiv:1505.00269</a>). Spitzer 4.5 μm dayside thermal-emission variability; informs planet e&#x27;s surface/atmosphere synthesis, not the stellar layer.",
  "li_123":"<b>Soubiran C. et al. 2024</b> — Gaia FGK benchmark-star [Fe/H] update +0.32 ± 0.02 for 55 Cnc A. Metallicity context (not curated).",
  "li_124":"<b>Folsom C. P. et al. 2020</b> — ZDI of 55 Cnc A; P_rot = 39 d, large-scale field ~3 G near the 2017 maximum; differential-rotation upper limit. Corroborates the rotation period.",
  "li_125":"<b>Henry G. W. et al. 2000</b> — Ca II emission monitoring giving the ~39 d rotation period; long-baseline activity context.",
  "h3_126":"Read (instrument-only, not visual-informative)",
  "li_127":"<b>Ligi R. et al. 2016</b> — Interferometric stellar-evolution fit giving the two-solution (31 Myr young / 13.2 Gyr old) age degeneracy; the old branch is adopted on rotation grounds.",
  "li_128":"<b>Crida A. et al. 2018</b> — Transit-density + interferometry mass 1.015 ± 0.051 M☉ / R 0.98 R☉ (via Moutou 2025 Table 1); documented alternative to the von Braun 2011 mass/radius.",
  "h3_129":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_130":"Conference proceedings on 55 Cnc dynamical stability, the historical RV discovery papers (Butler 1997, Marcy 2002, McArthur 2004, Fischer 2008 — superseded for parameters by Bourrier 2018 / Moutou 2025), and stellar-population metallicity catalogs that use 55 Cnc only as one tracer. The full filtered bib is preserved in <code>docs/phase3/_bib/55-cnc.yaml</code> with <code>status</code> annotations.",
  "h2_131":"Open items for follow-up",
  "li_132":"<b>Sixth-planet candidate.</b> Moutou 2025 proposes a long-period (~13 yr or half) candidate entangled with the magnetic cycle, and a separate 13.15 yr / 3.8 M_Jup outer signal (possibly the same body as planet d under a different decomposition, possibly a distinct outer giant). If a future homogeneous nIR+optical RV campaign disentangles the cycle from the planets, a sixth-planet Decisions row may be needed.",
  "li_133":"<b>A–B binary orbit.</b> No published Keplerian (only ~1065 AU projected separation, ~30 000 yr estimated period). If astrometric acceleration from Gaia DR4 constrains the orbit, the A–B pair could be promoted from &quot;note only&quot; to a modeled wide binary.",
  "li_134":"<b>X-ray cycle detection.</b> No long-baseline X-ray monitoring; the cfg <code>x_ray_log_lx_cgs_min/max</code> are tie-break scalings. A Chandra / XMM campaign could pin the cycle amplitude.",
  "li_135":"<b>Metallicity escalation.</b> [Fe/H] is skipped per policy; if a future renderer becomes sensitive enough to show line-blanketing reddening, the +0.32 to +0.42 dex enrichment should be curated and the visual tint re-derived.",
  "h2_136":"Related",
  "li_137":"<a href=\"hd-69830.html\">hd-69830</a> — comparison K0 V quiet star; 55 Cnc A is ~200 K cooler, the &quot;redder near-solar&quot; of the two",
  "li_138":"<a href=\"alpha-centauri-b.html\">alpha-centauri-b</a> — comparison K1V quiet star (55 Cnc A sits warmer than B on the color sequence)",

  ko: {
  "p_1":"55 Cancri A(ρ¹ Cnc, HD 75732, HIP 43587, HR 3522, Gaia DR3 704967037090946688)는 밝고 가까운 K0 IV-V 왜성으로 G–K 경계에 자리하며, Gaia DR3 시차 79.448 ± 0.043 mas 기준 태양에서 12.59 ± 0.01 pc(41.0 광년) 떨어져 있습니다. V = 5.95 로 게자리에서 막 육안 한계에 걸리는 밝기이며, 통과(transit)하는 외계행성을 거느린 것으로 알려진 가장 밝은 별 셋 중 하나입니다. 기본 항성 파라미터는 von Braun 외 2011 의 전용 항성-파라미터 논문에 정박해 있으며, 이 연구는 CHARA 간섭계로 별을 직접 분해했습니다. θ_LD = 0.711 ± 0.004 mas → R = 0.943 ± 0.010 R☉, 직접 측정한 Teff = 5196 ± 24 K, 볼로메트릭 광도 L = 0.582 ± 0.014 L☉ 입니다. 이 별은 영년 주계열에서 약간 진화한 상태라 IV-V 광도 등급을 받지만, 그 외에는 약간 더 차갑고 약간 덜 밝은 준-태양형 항성입니다. 또한 극단적으로 금속이 풍부한 별([Fe/H] ≈ +0.31 ~ +0.42)로 유명한데, 이 값은 프로젝트 정책상 여기서 큐레이션하지 않습니다.",
  "p_2":"이 별은 늙고 매우 조용합니다. Bourrier 외 2018 은 자전 주기 38.8 ± 0.05 d (자기 주기를 제거한 뒤 Hα 활동 지수 잔차에 사인 곡선을 맞춰 도출, Season-9 APT 측광의 40.4 d 와 Henry 2000 의 ~39 d Ca II 주기가 보강), 채층 지수 log R&#x27;HK = −5.03, 그리고 ≈ 10.5 ± 0.3 yr 의 태양형 자기 활동 주기(KECK HIRES S-지수, Hα 에서는 ~11.8 yr)를 측정하여, 55 Cnc A 가 늙은(~10 Gyr) 비활동성 항성임을 확인했습니다. Moutou 외 2025 는 P_rot = 38.7 ± 0.8 d (준주기 GPR)를 독립적으로 재확인하고, 활동 극소기에 ~0.3 G, 극대기에 ~3 G 에 불과한 대규모 자기장—태양 자기장의 약 10 분의 1—을 측정했습니다. 이 계는 행성 다섯 개(주기 순으로 e, b, c, f, d)를 거느리며, USP 용암 초지구부터 차가운 ~3.8 M_Jup 거대 행성까지 걸쳐 있고, 자기 주기와 얽힌 장주기 후보 행성(여섯 번째 가능성)도 있습니다(Moutou 2025).",
  "p_3":"두 번째 태양이 이 계를 공유합니다. 55 Cnc B 는 중간 M형 적색왜성(M4.5V, Teff ≈ 3200 K, M ≈ 0.26 M☉)으로, 투영 이격 ~1065 AU(육안 84″, Eggenberger 2004 / Mugrauer 2006), 추정 공전 주기 ~30,000 yr(Moutou 2025)에 자리합니다. 이미 NearStars DB 에 별도 천체(<code>55_cnc_b</code>, 자체 행성 두 개 보유)로 등록되어 있으며 <b>공표된 케플러 궤도가 없어</b>, A–B 쌍은 모델링하지 않습니다(주석만). 따라서 여기서 이성 궤도는 합성하지 않습니다. A 의 행성에서 보면 B 는 멀리 떨어진 희미한 주황-적색의 두 번째 태양처럼 보일 것입니다.",
  "p_4":"<b>NearStars 시나리오 선택: 조용하고 약간 진화한 노란-주황색 K0 IV-V 준-태양형 항성—태양보다 약간 차갑고 어두우며 극단적으로 금속이 풍부하고 태양형 ~10.5 yr 활동 주기를 가짐—을 von Braun 2011 CHARA 간섭계에 정박시키고, 다섯 행성 무리와 ~1065 AU 의 먼 M4.5V 적색왜성 동반성(55 Cnc B)을 희미한 두 번째 태양으로 함께 묘사합니다.</b> 모든 물리/활동 행은 고증 파라미터 집합을 따르며, 시각 hex 색조와 동반성 이벤트 기하만 tie-break 입니다.",

  "td_72":"medium",
  "td_73":"Tie-break: 5196 K K0 IV-V 흑체. HD 69830 의 5394 K 보다 ~200 K 차가워 약간 더 따뜻하고 주황. 초태양 [Fe/H] 의 약한 line-blanketing 적색화는 지각 한계 이하",

  "td_80":"low",
  "td_81":"합성: 매우 비활동성(log R&#x27;HK −5.03), 주기 극대기에 디스크의 ~0.5% 흑점 면적(Bourrier 2018 측광 진폭 ~2 mmag)",

  "td_86":"<code>companion_present</code>",
  "td_87":"true(55 Cnc B, M4.5V, 투영 ~1065 AU)",
  "td_88":"high",
  "td_89":"Eggenberger 2004 / Mugrauer 2006 — 육안 84″. Moutou 2025 P ≈ 30,000 yr. 이미 DB 에 <code>55_cnc_b</code> 로 등록. A–B 는 공표된 케플러 궤도 없음(모델링 안 함)",
  "td_90":"<code>visual_companion_event_distant_red_second_sun</code>",
  "td_91":"true",
  "td_92":"low",
  "td_93":"Tie-break: A 의 어느 행성에서든 B 는 희미한 주황-적색 광점(M4.5V) — 이성 디스크가 아니라 먼 두 번째 태양",
  "h2_94":"Surface synthesis",
  "p_95":"55 Cnc A 의 광구는 G–K 경계에 자리하며 태양보다 ~580 K 차갑습니다. von Braun 2011 은 CHARA 배열로 별을 직접 분해(θ_LD = 0.711 ± 0.004 mas)하여 R = 0.943 ± 0.010 R☉ 와 볼로메트릭 Teff = 5196 ± 24 K 를 얻었으며, 이는 Yee 2017 고분해능 분광 5172 ± 18 K 및 Moutou 2025 SPIRou Zeeturbo 5198 ± 31 K 와 오차 내에서 일치합니다. IV-V 광도 등급은 별이 영년 주계열에서 진화하기 시작했음을 알려주며, 0.943 R☉ 외피와 결합하면 적당한 0.582 L☉ 볼로메트릭 광도가 나옵니다. cfg <code>limb_darkening_alpha_h</code> 는 1D 대기 멱법칙 추정값 α(H) ≈ 0.16 으로, 더 차가운 광구에서 태양의 0.14 보다 약간 강하며, Claret–Bloemen 2011 격자(log g ≈ 4.4, Teff ≈ 5200 K)와 일치합니다. 이 별에 대해 공표된 직접 간섭계 주연감광 프로파일은 없습니다.",
  "p_96":"가장 두드러진 화학적 특징은 극단적 금속 풍부도입니다. 55 Cnc A 는 태양 근방에서 가장 금속이 풍부한 별 중 하나로, [Fe/H] ≈ +0.31 ~ +0.42 (Soubiran 2024 +0.32 ± 0.02, Houdebine 2016 +0.42, 문헌 분포 +0.25 ~ +0.45)입니다. 프로젝트 정책상 Phase 2 측정값으로 큐레이션하지 않지만—여기서 생기는 line-blanketing 적색화는 렌더링 지각 한계 이하라서—55 Cnc A 가 이토록 풍부하고 무거운 행성 무리를 형성한 물리적 이유로서 주목할 만합니다. 입상 무늬는 태양형일 것으로 예상되나 더 차가운 대류 전환에서 선형 스케일이 ~10% 작습니다.",
  "p_97":"흑점 면적은 매우 낮습니다. log R&#x27;HK = −5.03(Bourrier 2018)은 55 Cnc A 를 국부 G/K 활동 분포의 하위 10분위에 두며, 현대 태양보다 조용하고, 활동 주기에 걸친 최대-최소 측광 변동은 ~2 mmag 에 불과합니다. cfg 는 조용한 태양형 흑점 외피(주기 극대기에 디스크의 ~0.5%)를 채택하고 두드러진 활동 영역 구조는 렌더링하지 않습니다. Moutou 2025 의 SPIRou ZDI 지도는 극소기에 0.3 G 에 불과한 폴로이달, 주로 비대칭의 대규모 자기장을 보여주는데—태양 평균 자기장의 약 10 분의 1입니다.",
  "p_98":"시각 크림-주황 색조 <span class=\"hex-chip\" style=\"background:#ffeccf\"></span><code>#ffeccf</code> 는 5196 K K0 IV-V 흑체에서 보간한 값으로, HD 69830(5394 K, <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>)보다 ~200 K 차가워 반 단계 더 따뜻하고 주황이지만, α Cen B(K1V)의 짙은 주황에는 한참 못 미칩니다. 초태양 금속 풍부도가 SED 를 미세하게 적색으로 밀지만 렌더링 분해능에서는 지각되지 않습니다.",
  "h2_99":"Atmosphere synthesis",
  "p_100":"55 Cnc A 는 늙고 비활동성인 후기-G/초기-K 왜성에 전형적인 조용한 K0 채층–전이영역–코로나 구조를 가집니다. Ca II H&amp;K 채층 지수 log R&#x27;HK = −5.03(Bourrier 2018)은 Moutou 2025 의 21년 평균 −5.01 로 확인되며, 비활동성 바닥에 자리합니다. 대다수 조용한 항성과 달리 55 Cnc A 는 <b>잘 특징화된 활동 주기</b>를 가집니다. Bourrier 2018 은 KECK HIRES S-지수에서 태양형 ≈ 10.5 ± 0.3 yr 주기(진폭 0.024, 태양의 거의 두 배)를 검출했고, Hα 에서 ~11.8 yr, 아카이브 RV 에서 ~12.6 yr(Baluev 2015)로 일관됩니다. 이 주기에서 Hα 와 S-지수의 반상관 관계는 몇몇 느린 자전 항성에서 관측되는 거동을 닮았습니다.",
  "p_101":"대규모 자기장은 유난히 약합니다. Moutou 2025 의 SPIRou 분광편광 캠페인은 별을 활동 극소기에 포착해 비부호 자기장을 0.3 G 로만 측정했고, 극소기를 벗어나며 ~0.9 G 로, 2017 극대기 근처에서는 ~3 G(Folsom 2020)로 상승했습니다—태양의 7–15 G 범위보다 약 10 배 약합니다. 이는 매우 낮은 log R&#x27;HK 및 늙은 나이와 일관됩니다.",
  "p_102":"55 Cnc A 에 대해 공표된 장기 X선 주기는 없습니다. cfg 는 log L_X 범위 26.8–27.3 cgs 를 채택하여 태양-조용기부터 태양-주기-극대기 유사 수준까지 포괄합니다—측정된 X선 주기 진폭이 없는 상황에서의 tie-break 로, 조용한 K0 V 영역에서 스케일링했습니다. 통합 XUV 광도는 10⁻⁴ L_bol 보다 한참 아래라, 별의 거주 가능 영역(~0.67–1.32 AU, von Braun 2011)에서 Gyr 시간 척도에 걸쳐 지구형 대기를 의미 있게 침식하기엔 너무 약합니다—다만 이심 궤도의 일부를 그 영역에서 보내는 행성 f 자체가 거대 가스 행성입니다.",
  "p_103":"코로나/채층 시각 범위는 조용한 태양 기준—얇은 채층과 ~3 R★ 까지의 희미한 코로나—으로 렌더링하며, 10.5 yr 주기에 걸쳐 ~20% 밝아집니다.",
  "h2_104":"Rotation &amp; spin synthesis",
  "p_105":"55 Cnc A 는 견고하게 측정된 자전 주기 P_rot = 38.8 ± 0.05 d(Bourrier 2018)를 가지며, 자기 주기를 제거한 뒤 Hα 활동 지수 잔차에 사인 곡선을 맞춰 도출했습니다. 여러 독립 채널이 이를 보강합니다. Season-9 APT 측광은 40.4 ± 0.8 d(모든 측광 시즌 가중 평균 40.04 ± 0.39 d), Henry 2000 의 Ca II 방출 모니터링은 ~39 d, Fischer 2008 의 초기 APT 측광은 42.7 ± 2.5 d 를 줍니다. Moutou 2025 는 준주기 GPR 피팅에서 38.7 ± 0.8 d 를 독립 재확인하고 Folsom 2020 의 39 d ZDI 값을 채택합니다. 방법별 34–43 d 분포는 적당한 차등 자전과 일관됩니다(Folsom 2020 은 0.065 rad/day 상한 설정).",
  "p_106":"느린 ~39 d 자전 자체가 늙은 나이의 가장 깔끔한 근거입니다. Moutou 2025 는 30 d 를 넘는 자전 주기가 30 Myr 태양형 항성에서는 예상되지 않는다고 지적하며, 이는 Ligi 2016 항성-진화 해의 젊은(31 Myr) 간섭계-반지름 가지를 배제하고 여기서 채택한 &gt;10 Gyr 가지를 지지합니다. 느린 자전은 Skumanich 법칙을 통한 ~10 Gyr 의 자기 제동의 산물입니다.",
  "p_107":"cfg 를 좌우하는 별진동 모드 검출은 없습니다. 예측 ν_max 가 지금까지 배치된 서베이 케이던스에 비해 너무 높고, 매우 낮은 활동 바닥도 도움이 되지 않습니다. cfg 는 진동 기반 밝기 변조를 인코딩하지 않습니다. 차등 자전은 태양형으로 예상되나 직접 분해되지 않았고, 자전축 경사는 잘 제약되지 않습니다(ZDI 는 i ≈ 70–90° 가정). 시각 렌더링을 위해 NearStars 는 다섯 행성계의 평균 궤도면에 대해 적당히 기울어진 자전축을 채택합니다.",
  "p_108":"KSP 단위로 cfg 는 별의 <code>rotationPeriod</code> 를 측정된 38.8 d(Bourrier 2018)로 설정합니다—정보용입니다. Kopernicus 는 별 자전을 직접 애니메이션하지 않지만, Principia 가 자전축 부기를 위해 <code>rotationPeriod</code> 를 읽습니다.",
  "h2_109":"Visual styling",
  "li_110":"<b>궤도 뷰(계 전체 렌더).</b> 빽빽한 안쪽 삼중주(0.015 AU 의 e, 빛에 묻힘. 0.118 AU 의 b. 0.247 AU 의 c)와, 거주 가능 영역 안쪽 가장자리를 쓰는 0.80 AU 의 이심 궤도 f, 그리고 5.6 AU 멀리의 차가운 거대 행성 d 를 거느린 따뜻한 노랑-주황 K0 광점. f 와 d 사이의 ~4 AU 간극이 이 계의 정의적 구조 특징입니다.",
  "li_111":"<b>항성 디스크(클로즈업).</b> 교과서적 H 밴드 멱법칙 주연감광을 가진 조용한 K0 IV-V. 입상 셀은 태양보다 약간 작으며, cfg 주기 극대기에 ~0.5% 최대-최소의 희미한 주기 평균 흑점 밝기 변조 외에는 두드러진 활동 영역이 없습니다.",
  "li_112":"<b>항성 색.</b> 따뜻한 노랑-주황 <span class=\"hex-chip\" style=\"background:#ffeccf\"></span><code>#ffeccf</code> — 태양의 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 과 HD 69830 의 <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code> 사이로, ~200 K 차가운 Teff 에서 후자보다 한 단계 더 따뜻합니다. 55 Cnc A 는 NS 카탈로그의 &quot;약간 더 붉고 약간 진화한 준-태양형&quot; 항목입니다.",
  "li_113":"<b>활동 주기 애니메이션.</b> 10.5 yr 주기(Bourrier 2018)에 걸쳐 코로나가 ~20% 밝아지고 흑점 면적이 ~0.5% 에서 정점을 찍으며, 대규모 자기장이 0.3 G(극소기)에서 ~3 G(극대기, Moutou 2025)로 진동합니다. M형 왜성 기준으로는 희미하고 느립니다.",
  "li_114":"<b>먼 적색의 두 번째 태양(55 Cnc B).</b> A 의 어느 행성에서든 ~1065 AU 의 M4.5V 동반성은 분해되지 않는 주황-적색 광점입니다—디스크를 보이기엔 너무 멀지만(각지름 ≪ 1″), 배경 항성보다 여러 등급 밝은 알아볼 수 있는 따뜻한 두 번째 별입니다. cfg <code>visual_companion_event_distant_red_second_sun</code> 에 플래그됩니다. A–B 궤도는 모델링하지 않으므로(~30,000 yr 주기, 케플러 궤도 미공표) B 의 위치는 게임플레이 시간 척도에서 고정으로 취급합니다.",
  "li_115":"<b>지구에서 본 별.</b> V = 5.95 는 55 Cnc A 를 게자리에서 육안 한계에 둡니다. 어두운 하늘에서는 막 보이고, 그렇지 않으면 수많은 6등급 배경 항성 중 하나로—다섯 행성계를 분해하는 인게임 망원경 뷰로만 구별됩니다.",
  "h2_116":"Bibliography",
  "h3_117":"Read (visual-informative, drove decisions above)",
  "li_118":"<b>von Braun K. et al. 2011</b> — <i>The 55 Cancri System: Fundamental Stellar Parameters, Habitable Zone Planet, and Super-Earth Diameter</i>, ApJ 740, 49 (<code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>). CHARA 간섭계: θ_LD = 0.711 ± 0.004 mas → R = 0.943 ± 0.010 R☉, 직접 Teff = 5196 ± 24 K, 볼로메트릭 L = 0.582 ± 0.014 L☉, 진화 질량 0.905 ± 0.015 M☉, HZ 0.67–1.32 AU. <b>전체 항성층의 Phase 2 정박 (R, Teff, L, M).</b>",
  "li_119":"<b>Bourrier V. et al. 2018</b> — <i>The 55 Cnc system reassessed</i>, A&amp;A 619, A1 (<code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>). 20년의 측광 + 분광: P_rot = 38.8 ± 0.05 d, log R&#x27;HK = −5.03, 태양형 자기 주기 P_mag ≈ 10.5 ± 0.3 yr(S-지수. Hα ~11.8 yr)로 늙고(~10 Gyr) 조용한 별 확인. 자기-주기 케플러를 포함한 균질 계 재피팅. <b>Phase 2 추천 질량 / 자전 / 활동 / 행성 e 정박.</b>",
  "li_120":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou: questions about the magnetic cycle of 55 Cnc A and two new planets around B</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, <a href=\"https://arxiv.org/abs/2510.11523\">arXiv:2510.11523</a>). A 와 B 양쪽의 SPIRou 분광편광. P_rot = 38.7 ± 0.8 d (GPR), ZDI 자기장 0.3 G(극소) – 3 G(극대), 태양보다 ~10× 약함. 나이 &gt; 10 Gyr 채택. 외행성 d 개정(P 4799 d)과 가능한 6번째 후보 / 13.15 yr 3.8 M_Jup 신호. 55 Cnc B 주위 행성 두 개 발견. <b>모델 지식 컷오프 이후 출판 — 모든 값을 캐시 텍스트에 대조 확인.</b>",
  "h3_121":"Read (context / methodology, not directly decision-driving)",
  "li_122":"<b>Demory B.-O. et al. 2016</b> — <i>Variability in the super-Earth 55 Cnc e</i>, Nature 532, 207 (<code>2016Natur.532..207D</code>, <a href=\"https://arxiv.org/abs/1505.00269\">arXiv:1505.00269</a>). Spitzer 4.5 μm 주간면 열복사 변동성. 항성층이 아니라 행성 e 의 표면/대기 합성에 정보를 줍니다.",

  "h2_131":"Open items for follow-up",
  "li_132":"<b>여섯 번째 행성 후보.</b> Moutou 2025 는 자기 주기와 얽힌 장주기(~13 yr 또는 그 절반) 후보와, 별도의 13.15 yr / 3.8 M_Jup 외행성 신호(다른 분해 하에서 행성 d 와 같은 천체일 수도, 별개 외행성일 수도)를 제안합니다. 미래의 균질 nIR+광학 RV 캠페인이 주기를 행성과 분리한다면 여섯 번째 행성 Decisions 행이 필요할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
