  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 d has no geological surface — it is the most canonical Neptune-analog of the three Lovis 2006 planets. At 18.4 M⊕ and 1.5 S⊕, d sits firmly in the envelope-retention locus (Fulton 2017, Rogers 2021): the photoevaporation timescale at 0.63 AU around an old G8V is several tens of Gyr, far longer than the system age, and the host XUV luminosity (log L_X ≈ 26.7) is too feeble to drive measurable mass-loss from a Neptune-class envelope at this orbital distance. The cfg adopts the canonical interior structure: a small (~3 M⊕) rocky/iron core, a deep (~9 M⊕) supercritical H₂O / NH₃ / CH₄ ice mantle, and a thick (~6 M⊕, ~30% of total mass) H₂/He envelope.",
  "p_178":"The &quot;surface&quot; the renderer sees is the tropospheric methane-cloud deck at ~1 bar. This is shallower than c&#x27;s haze-deck visible photosphere (c at ~0.1 bar) because d&#x27;s deeper atmosphere is cooler and methane condensation is the dominant cloud-formation mechanism in the upper troposphere. Below the methane cloud, the atmosphere transitions to a hydrogen-rich Rayleigh-scattering regime that gives d its defining deep-cyan tint — the same physics that makes Neptune blue, modulated only slightly by the host star&#x27;s marginally cooler illumination.",
  "p_179":"The conceptual interior color for the cfg-variant cutaway renderer encodes a Neptune-analog deep mantle: <span class=\"hex-chip\" style=\"background:#3a5060\"></span><code>#3a5060</code> deep blue-grey for the supercritical ice mantle dominant body, with <span class=\"hex-chip\" style=\"background:#5a7080\"></span><code>#5a7080</code> slightly warmer blue-grey accents at convective plume bases. The inner rocky/iron core follows the host star metallicity scaling ([Fe/H] = −0.05). The envelope&#x27;s deep base reaches ~3500 K at the ice-mantle / envelope boundary (pressure ~80 kbar), with the ice mantle itself reaching ~6000 K at the rock-core boundary — all far below visible photon escape depths.",
  "p_180":"The internal energy budget for d is dominated by primordial heat of formation plus radiogenic decay, with tidal dissipation (~0.0001 W/m² from e = 0.07 + Neptune-class Q) contributing negligibly. Neptune itself emits ~2.6× the radiation it absorbs from the Sun, implying a substantial intrinsic heat flux (~0.4 W/m²); the cfg assumes d follows the Neptune analog and includes no special interior heat source beyond the primordial budget. The modest tidal heating at e = 0.07 is well below the threshold where it would meaningfully modify the envelope structure.",
  "p_181":"<b>Parent body for the warm dust belt? (Lisse 2007 hypothesis).</b> Lisse 2007&#x27;s interpretation of the warm dust at 0.7–1.5 AU is post-collisional debris from a recent (≲ 1 Myr) catastrophic disruption of a dwarf-planet-class body. d at 0.63 AU is the nearest substantial gravitational perturber to this region, and its 18.4 M⊕ mass is large enough to gravitationally focus asteroid-class bodies into stable resonant orbits (Lisse 2007 identifies the 2:1 and 5:2 outer mean-motion resonances with d at 1.00 and 1.16 AU respectively, both squarely within the belt; the 3:2 outer MMR at 0.83 AU is a secondary near the cfg-widened belt inner edge). Under the catastrophic-event hypothesis, d&#x27;s gravity is the natural sculptor of the belt&#x27;s inner edge and the plausible source of the dynamically-excited parent body whose destruction supplied the observed sub-μm crystalline olivine grains. This is informational for the cfg&#x27;s visual styling: d is rendered as a Neptune-blue disk with no direct dust feature attached, but the system-overview render in the host star file (<code>hd-69830.html</code>) shows d&#x27;s geometric relationship to the belt prominently.",
  "h2_182":"Atmosphere synthesis",
  "p_183":"The atmosphere is d&#x27;s dominant observable, and unlike b&#x27;s haze- obscured stripped envelope or c&#x27;s chromophore-tinted warm haze, d&#x27;s atmosphere appears as essentially a smaller Neptune. The temperate equilibrium temperature 282 K places d firmly in the &quot;cold Neptune&quot; regime where CH₄ is the dominant carbon carrier in both the gas and condensed-phase upper troposphere, NH₃ is condensed out below the methane cloud, and the visible photosphere is dominated by Rayleigh scattering off the deep H₂ envelope with methane absorption bands carving the red end of the visible spectrum. This gives d its characteristic blue color — the same mechanism that makes Neptune deeper blue than Uranus despite their nearly identical compositions.",
  "p_184":"The cfg adopts Karkoschka 2011&#x27;s Neptune-analog cloud morphology with broken methane-ice cap clouds covering ~55% of the disk, predominantly at mid-latitudes where convective updrafts bring methane-rich air above the condensation altitude. Banded zonal flow develops with ~5 alternating darker (clearer, deeper) and brighter (cloudier, higher) bands across the disk, comparable to Neptune&#x27;s morphology but slightly enhanced by d&#x27;s stronger solar heating. Transient bright methane storms appear at mid-latitudes on decadal timescales (Sromovsky 2001 Neptune analog), and occasional Neptune-like Great Dark Spots — large anticyclonic vortices — develop, persist for years, then dissipate.",
  "p_185":"The atmospheric tint <span class=\"hex-chip\" style=\"background:#3a7090\"></span><code>#3a7090</code> is Neptune&#x27;s <span class=\"hex-chip\" style=\"background:#2a6ea0\"></span><code>#2a6ea0</code> warmed by ~5% toward the green-blue under HD 69830&#x27;s slightly cooler G8V illumination. The shift is subtle — the perceived color is still unambiguously &quot;Neptune blue&quot; — but the cfg encodes the small chromatic adjustment to differentiate d visually from a straight Neptune-copy. The cloud tint <span class=\"hex-chip\" style=\"background:#a0d0e0\"></span><code>#a0d0e0</code> is the bright methane-ice cap white-cyan, providing the bright zonal-band contrast against the deeper Rayleigh-blue Neptune background.",
  "p_186":"<b>Sky from d&#x27;s substellar region.</b> Above the methane cloud deck, the star fills a 0.67° disk in the sky — slightly larger than the Sun seen from Earth (0.53°) — with the slightly redder-than-Sol cream-yellow tint giving the daytime sky a warm cyan-cream appearance (Rayleigh-scattered G8V illumination off d&#x27;s H₂ atmosphere). The warm dust belt at 0.7–1.5 AU is <i>exterior</i> to d by only 10–60% in semi-major axis: from d&#x27;s vantage the belt fills a wide swath of the sky as a bright amber band, vastly more prominent than from b or c. The belt extends nearly to d&#x27;s own orbital region, with parent bodies (if Lisse 2007&#x27;s hypothesis holds) potentially visible as transient point sources in d&#x27;s sky during favourable geometry.",
  "h2_187":"Rotation &amp; spin synthesis",
  "p_188":"Tidal damping for d at 197-day orbital period over 5.7 ± 1 Gyr is utterly negligible: the synchronisation timescale for a Neptune-class planet at 0.63 AU around an old G-dwarf is ≈ 10¹¹ years (Heller 2011 scaling), far longer than the system age and far longer than the universe. d retains its primordial spin period and obliquity. The cfg adopts a Neptune-analog rotation of ~16 hours and an obliquity of 28° (very close to Neptune&#x27;s 28.3°), giving the planet a fast-rotating, dynamically active appearance with seasonal effects from the tilted spin axis.",
  "p_189":"Differential rotation is expected Neptune-like with the equator rotating ~10–15% faster than the polar latitudes (Sromovsky 1993, 2001), driving the banded zonal-flow morphology and the transient spot/storm features. The fast rotation period combined with the modest 280 K temperature produces a moderately strong zonal-jet regime — Showman &amp; Polvani 2011 / Polichtchouk 2014 predict ~5 alternating bands across each hemisphere, with the brightest methane-cloud cap concentrated at the equator and mid-latitudes.",
  "p_190":"<b>KSP implementation note.</b> Rotation period = 16.11 hours (58 000 s) under the Neptune-analog cfg. Obliquity = 28° tilted from the orbital plane normal, with the rotation axis pointing toward an arbitrary direction in inertial space (cfg adopts the same Neptune-analog longitude of ascending node as the planet&#x27;s orbit for simplicity).",
  "p_191":"<b>Seasonal cycling at e = 0.07.</b> The mild eccentricity drives a ~30% insolation amplitude over each 197-day orbit, with perihelion (0.586 AU) → 1.74 S⊕ and aphelion (0.674 AU) → 1.32 S⊕. Combined with the 28° obliquity, d experiences both eccentricity-driven and obliquity-driven seasons over the 6.5-month orbital period — the obliquity drives the dominant hemispheric asymmetry, with the eccentricity providing a modest global modulation. The seasonal pattern is therefore richer than Neptune&#x27;s (which has a 165-year period and 28° obliquity but near-zero eccentricity) but compressed into a much shorter orbital cycle. Not animated by the cfg; informational.",
  "h2_192":"Visual styling",
  "li_193":"<b>Global appearance.</b> A deep Neptune-cyan disk (<span class=\"hex-chip\" style=\"background:#3a7090\"></span><code>#3a7090</code> primary tint, <span class=\"hex-chip\" style=\"background:#a0d0e0\"></span><code>#a0d0e0</code> bright methane-cloud highlights) about 0.06° apparent diameter from a viewpoint at HD 69830 c during opposition. Banded zonal-flow structure is visible at orbit-view scale, with ~5 alternating darker/brighter bands per hemisphere. The visual signature is unambiguously &quot;Neptune-class&quot; — the most familiar of the three planets in the system.",
  "li_194":"<b>Dayside detail.</b> Modest substellar / equatorial brightening from enhanced methane-cloud activity at the warmest latitudes; ~5% peak-to-peak contrast over the global tint.",
  "li_195":"<b>Polar caps.</b> Tilted 28° obliquity gives d distinct polar regions visible from different orbital viewpoints. The pole facing the star at orbital &quot;summer&quot; shows reduced cloud cover (~30%) and a deeper blue Rayleigh-scattering exposure; the winter pole shows enhanced methane condensation and a brighter white-cyan cap (~75% cloud cover).",
  "li_196":"<b>Transient features.</b> Occasional bright methane storm cells at mid-latitudes (lifespan ~ months) and large anticyclonic dark spots (&quot;d-class GDS&quot;) at sub-decadal cadence. The cfg optionally animates these on a stochastic schedule with amplitude ~10% over the local cloud-tint baseline.",
  "li_197":"<b>Terminator band.</b> Gradient deep cyan to dim blue-grey (<span class=\"hex-chip\" style=\"background:#1a3848\"></span><code>#1a3848</code>) with a Rayleigh-scattering profile that gives the day-night limb a soft, extended ~3° feathered edge.",
  "li_198":"<b>Nightside.</b> Dim blue-grey glow from residual thermal emission at 270 K — Neptune&#x27;s 47 K is too cold to glow visibly in the renderer, but d at 270 K shows a faint thermal background.",
  "li_199":"<b>Star in sky.</b> HD 69830 fills 0.67° in d&#x27;s sky — slightly larger than the Sun from Earth, a small bright cream-yellow disk. From d&#x27;s vantage the star appears at typical HZ-comparable angular diameter, giving the daytime sky an Earth-like brightness level (modulated by d&#x27;s higher atmospheric albedo).",
  "li_200":"<b>Sister planets in sky.</b> From d, planet b appears at ~0.005° during conjunction (a/b separation 0.55 AU, b at Sun&#x27;s glare), and c at ~0.005° during c&#x27;s closest approach (a/c separation 0.44 AU, c&#x27;s haze-disk radius ~22 000 km). Both inner planets are essentially point sources from d.",
  "li_201":"<b>Warm dust ring from d&#x27;s perspective.</b> This is d&#x27;s most dramatic sky feature. The dust belt at 0.7–1.5 AU extends from just exterior to d&#x27;s orbit (0.7 AU is 11% beyond d&#x27;s semi-major axis 0.63 AU) outward to 1.5 AU, projecting from d&#x27;s vantage as a bright amber band ringing the sky at the forward orbital hemisphere. The belt is several degrees thick from d&#x27;s viewpoint and significantly brighter than from any of the inner planets. Forward-scattering off sub-μm olivine grains during morning / evening crescent geometry produces a striking bright limb feature.",
  "h2_202":"Bibliography",
  "h3_203":"Read (visual-informative, drove decisions above)",
  "li_204":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). Discovery paper. P = 197 d, Msini = 18.1 M⊕, a = 0.63 AU, e = 0.07. Anchor for orbital + mass Decisions.",
  "li_205":"<b>Tanner A. et al. 2019</b> — <i>Stellar Parameters and the Habitable Zone of HD 69830</i>, ApJ 873, 91 (<code>2019ApJ...873...91T</code>, arXiv:1812.08964). Refined stellar parameters; Msini value 18.4 M⊕ adopted here as the consensus across Lovis 2006 + later HARPS extensions. Identifies d as sitting at the inner edge of the optimistic HZ for HD 69830.",
  "li_206":"<b>Beichman C. A. et al. 2005</b> — <i>An Excess Due to Small Grains around the Nearby K0 V Star HD 69830</i>, ApJ 626, 1061 (<code>2005ApJ...626.1061B</code>, arXiv:astro-ph/0504491). Spitzer/IRS + MIPS SED fit placing the warm dust at 0.7–1.5 AU. <b>Anchor paper for d&#x27;s position at the dust belt&#x27;s inner shoulder.</b>",
  "li_207":"<b>Lisse C. M. et al. 2007</b> — <i>On the Nature of the Dust in the Debris Disk around HD 69830</i>, ApJ 658, 584 (<code>2007ApJ...658..584L</code>, arXiv:astro-ph/0611452). Catastrophic-event hypothesis identifying a recently-disrupted dwarf-planet-class parent body as the source of the warm dust. Identifies d&#x27;s 2:1 and 5:2 outer MMRs at 1.00 / 1.16 AU as the dynamical sculptor of the belt&#x27;s inner edge. Drives d&#x27;s role as the dynamical sculptor / plausible parent-body source.",
  "li_208":"<b>Wyatt M. C. et al. 2007</b> — <i>Steady State Evolution of Debris Disks around A Stars</i>, ApJ 663, 365 (arXiv:astro-ph/0703608). Collisional-cascade steady-state limit; supports the catastrophic-event interpretation that places d in the parent-body shepherding role.",
  "li_209":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). Excludes grazing transit geometry for d; confirms only Msini constraint.",
  "li_210":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic forecasting of the masses and radii of other worlds</i>, ApJ 834, 17 (arXiv:1603.08614). Mass-radius probabilistic relation; 18 M⊕ → 4.4–4.5 R⊕ at the temperate Neptune locus.",
  "li_211":"<b>Otegi J. F. et al. 2020</b> — <i>Revisited mass-radius relations</i>, A&amp;A 634, A43 (arXiv:1911.04745). Confirms the volatile-rich locus for d&#x27;s mass-radius.",
  "li_212":"<b>Karkoschka E. &amp; Tomasko M. 2011</b> — <i>The haze and methane distributions on Neptune from HST-STIS-04 observations</i>, Icarus 211, 780. Neptune-analog cloud morphology; drives the 0.55 cloud-cover fraction and banded structure adopted by the cfg.",
  "li_213":"<b>Sromovsky L. A. et al. 2001</b> — <i>Coordinated 1996 HST and IRTF Imaging of Neptune and Triton</i>, Icarus 149, 416. Banded zonal flow + transient storm morphology adopted for d&#x27;s visuals.",
  "li_214":"<b>Atreya S. K. &amp; Wong A. S. 2005</b> — <i>Coupled Clouds and Chemistry of the Giant Planets</i>, Space Sci Rev 116, 121. Neptune-analog atmospheric chemistry; supports the CH₄ ~ 1% composition.",
  "h3_215":"Read (context / methodology, not decision-driving)",
  "li_216":"<b>Heller R. et al. 2011</b> — <i>Tidal obliquity evolution of potentially habitable planets</i>, A&amp;A 528, A27 (arXiv:1101.2156). Tidal-synchronisation timescale; confirms d is a free rotator.",
  "li_217":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution</i>, AJ 154, 109. Photoevaporation valley; confirms envelope-retention reading for d.",
  "li_218":"<b>Rogers J. G. et al. 2021</b> — <i>Conclusive evidence for a population of water worlds around M dwarfs that abounds with super-Earths</i>, ApJ 915, L12 (arXiv:2105.03446). Population statistics of sub-Neptunes; d sits in the envelope-retention locus.",
  "li_219":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic mass-radius relationship for sub-Neptune-sized planets</i>, ApJ 825, 19 (arXiv:1504.07557). Independent mass-radius constraint.",
  "li_220":"<b>Pearl J. C. &amp; Conrath B. J. 1990</b> — <i>The albedo, effective temperature, and energy balance of Neptune</i>, JGR 96, 18921. Neptune Bond albedo 0.29 ± 0.04; anchors d&#x27;s <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> = 0.30.",
  "li_221":"<b>Encrenaz T. 2003</b> — <i>ISO observations of the giant planets and Titan</i>, Planet Space Sci 51, 89. Neptune CH₄ / NH₃ composition reference; supports the cfg&#x27;s atmosphere row.",
  "li_222":"<b>Lamy L. et al. 2017</b> — <i>Multispectral simultaneous diagnosis of Saturn&#x27;s aurorae</i>, JGR Planets 122, 1101. Aurora chemistry in H₂-dominated atmospheres; supports the blue-cyan aurora tint.",
  "li_223":"<b>Sromovsky L. A. 1993</b> — <i>Dynamics of Neptune&#x27;s major cloud features</i>, Icarus 105, 110. Differential rotation profile; supports the cfg&#x27;s banded zonal-flow morphology.",
  "li_224":"<b>Polichtchouk I. &amp; Cho J. Y.-K. 2014</b> — <i>Three-dimensional general circulation modeling of hot Neptunes</i>, MNRAS 437, 2715 (arXiv:1306.3231). Zonal-jet regime for warm Neptunes; supports the 5-band morphology.",
  "li_225":"<b>Atri D. &amp; Mogan S. R. C. 2019</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i>, MNRAS 500, L1 (arXiv:1910.09871). Scaling for the 12 mSv/yr radiation dose.",
  "h3_226":"Read (instrument / non-cfg-decisive)",
  "li_227":"<b>Hammel H. B. et al. 1989</b> — <i>Neptune&#x27;s wind speeds obtained by tracking clouds in Voyager 2 images</i>, Science 245, 1367. Voyager 2 baseline for Neptune zonal-flow dynamics; supports d&#x27;s analog rendering.",
  "h3_228":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_229":"HD 69830 b/c/d dynamical stability papers (Ji 2007, Payne 2009) — relevant for the orbital architecture but not visual.",
  "li_230":"Generic temperate-Neptune characterisation papers (Kepler-22 b follow-up, K2-18 b analogues) — context only; not HD 69830 d-specific.",
  "li_231":"Dust shepherding / parent-body dynamics in debris disks (Wyatt 2008, Mustill 2018) — relevant for d&#x27;s dust-belt role but not directly visual; deferred to a future Phase 3 revisit alongside JWST/MIRI resolved imaging if it becomes available.",
  "h2_232":"Open items for follow-up",
  "li_233":"<b>Transit search refresh.</b> No published transit detection as of 2026; the 197 d period is challenging for ground-based transit surveys but within CHEOPS / PLATO long-baseline capability. A transit detection would resolve the mass-radius tie-break and update <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> from the canonical 4.45 R⊕.",
  "li_234":"<b>Dust-belt resolved imaging.</b> SPHERE / JWST-MIRI / future ALMA imaging of the warm dust belt could constrain d&#x27;s role as the belt&#x27;s inner-edge shepherd. A resolved asymmetry in the inner belt edge would directly implicate d&#x27;s gravitational sculpting per Lisse 2007&#x27;s catastrophic-event hypothesis. The cfg should re-evaluate d&#x27;s &quot;parent body&quot; visual annotation once such imaging is published.",
  "li_235":"<b>Direct atmospheric characterisation.</b> No JWST programme has targeted HD 69830 d through 2026 cycles. Direct imaging by HabEx / LUVOIR / ELT/HARMONI could resolve d at angular separation ~50 milliarcsec — well within current ELT capability for a planet/star contrast ~5 × 10⁻⁹. The cfg&#x27;s Neptune-blue morphology would be directly testable.",
  "li_236":"<b>Seasonal cycle modeling.</b> The interaction between e = 0.07 eccentricity-driven insolation cycling and 28° obliquity-driven axial seasons over a 197-day orbit produces a richer seasonal pattern than any solar-system analog. Detailed GCM modeling (Polichtchouk 2014-style) for d&#x27;s specific parameters would refine the cfg&#x27;s seasonal-cap rendering.",
  "li_237":"<b>Catastrophic-event hypothesis cross-check.</b> If JWST/MIRI MRS resolves the parent-body olivine grain population spectrally consistent with a specific source body type, the cfg&#x27;s visual annotation of d as the &quot;dust belt sculptor&quot; could be upgraded from low-confidence inference to higher-confidence observation-anchored narrative.",
  "h2_238":"Related",

  "p_1":"HD 69830 d 는 Lovis 외 2006 (HARPS, 4 년 캠페인) 이 발견한 세 개의 넵튠 질량 시선속도 행성 중 가장 바깥에 있습니다. P = 197 ± 3 일, Msini = 18.1–18.4 M⊕ (Lovis 2006 / Tanner 2019 refit), a = 0.63 AU, e = 0.07, ω = 224°. 모성이 L = 0.60 L☉ 이므로 d 의 일조량은 지구 의 ~1.5 배, A = 0.3 본드 알베도에서 평형 온도는 282 K — HD 69830 의 optimistic 거주 가능 영역 안이지만 암석 표면이 아닌 Neptune 질량 외피를 가집니다. 0.63 AU 의 궤도는 따뜻한 먼지 인구의 내경 0.7–0.8 AU (Beichman 2005) 보다 살짝 안쪽에 자리하며, d 를 먼지 벨트의 내부 어깨에 놓아 내부 가장자리를 shepherding 하기에 동역학 적으로 특권적인 위치에 있고 Lisse 2007 이 가설한 catastrophic-event 급 잔해의 그럴듯한 parent body source 로 기능합니다. 통과 검출은 없습니다. Bonfils 2007 과 후속 측광이 예측된 ephemeris 를 배제 합니다.",
  "p_2":"<b>NearStars 시나리오 선택. 먼지 벨트의 내부 어깨에 있는 온대 외피-유지 Neptune analog 으로, 전체 Neptune 급 H₂/He 대기, 물 풍부 얼음 내부, 그리고 더 차가운 G8V 조명에 의해 변조된 거의 원형 그대로 의 깊은 cyan Neptune 팔레트를 가집니다. 행성의 따뜻한 먼지 벨트와 의 기하학적 근접성이 d 를 시스템의 동역학적 중심에 둡니다 — d 의 중력이 18 M⊕ 에서 충분히 강해 0.7–1.5 AU 영역의 parent body 인구 를 섭동할 수 있고, Lisse 2007 의 catastrophic-event 가설이 d 를 벨트 내경의 그럴듯한 sculptor 로 식별합니다.</b> 28 cfg 픽 중 14 는 canonical-aligned (궤도 + 질량 파라미터, Neptune-analog 반지름 / 밀도, 유도된 일조량), 14 는 tie-break (깊은 cyan Neptune 색조, 구름 띠 형태, 먼지 shepherding 역할) 입니다. documented divergence 는 없습니다. d 는 외피-유지 위치에 편안히 자리하며, 가시 외관은 Neptune / Uranus 문헌을 직접 따릅니다.",

  "td_175":"HD 69830 Teff",
  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 d 는 지질학적 표면이 없습니다 — Lovis 2006 의 세 행성 중 가장 canonical 한 Neptune-analog 입니다. 18.4 M⊕, 1.5 S⊕ 에서 d 는 외피-유지 위치 (Fulton 2017, Rogers 2021) 에 단단히 자리합니다. 오래된 G8V 주위 0.63 AU 에서의 광증발 시간 스케일은 수십 Gyr 로 시스템 나이보다 한참 더 길고, host XUV 광도 (log L_X ≈ 26.7) 가 이 궤도 거리에서 Neptune 급 외피로부터 측정 가능한 질량 손실을 구동하기 에 너무 약합니다. cfg 는 canonical 내부 구조를 채택합니다. 작은 (~3 M⊕) 암석/철 코어, 깊은 (~9 M⊕) 초임계 H₂O / NH₃ / CH₄ 얼음 mantle, 그리고 두꺼운 (~6 M⊕, 총 질량의 ~30%) H₂/He 외피.",
  "p_178":"렌더러가 보는 &quot;표면&quot; 은 ~1 bar 의 대류권 메탄 구름 데크입니다. 이는 c 의 haze-deck 가시 광권 (c 는 ~0.1 bar) 보다 더 얕은데, d 의 더 깊은 대기가 더 차갑고 메탄 응결이 상부 대류권의 지배적 구름 형성 메커니즘이기 때문입니다. 메탄 구름 아래, 대기는 d 에게 결정적인 깊은 cyan 색조를 주는 수소 풍부 Rayleigh-산란 영역으로 전환됩니다 — Neptune 을 푸르게 만드는 동일한 물리가, 모성의 marginally 더 차가운 조명에 의해 살짝만 변조됩니다.",
  "p_179":"cfg-variant 컷어웨이 렌더러를 위한 개념적 내부 색은 Neptune-analog 깊은 mantle 을 인코딩합니다. 초임계 얼음 mantle 주체의 <span class=\"hex-chip\" style=\"background:#3a5060\"></span><code>#3a5060</code> 깊은 청회색, 대류 plume 바닥의 <span class=\"hex-chip\" style=\"background:#5a7080\"></span><code>#5a7080</code> 살짝 더 따뜻한 청회색 액센트. 내부 암석/철 코어는 모성 금속도 스케일링 ([Fe/H] = −0.05) 을 따릅니다. 외피 의 깊은 바닥은 얼음-mantle / 외피 경계 (압력 ~80 kbar) 에서 ~3500 K 에 도달하며, 얼음 mantle 자체는 rock-core 경계에서 ~6000 K 에 도달 합니다 — 모두 가시 광자 탈출 깊이 한참 아래.",
  "p_180":"d 의 내부 에너지 예산은 형성의 primordial 열과 방사성 붕괴가 지배 하며, 조석 소산 (e = 0.07 + Neptune 급 Q 에서 ~0.0001 W/m²) 의 기여 는 무시할 수 있습니다. Neptune 자체가 태양에서 흡수하는 복사의 ~2.6 배를 방출하며 substantial 한 내적 열 플럭스 (~0.4 W/m²) 를 의미합니다. cfg 는 d 가 Neptune analog 을 따른다고 가정하고 primordial 예산 너머의 특별한 내부 열원을 포함하지 않습니다. e = 0.07 에서의 modest 조석 가열은 외피 구조를 의미 있게 변경할 임계값보다 한참 아래입니다.",
  "p_181":"<b>따뜻한 먼지 벨트의 parent body? (Lisse 2007 가설).</b> 0.7–1.5 AU 의 따뜻한 먼지에 대한 Lisse 2007 의 해석은 dwarf-planet 급 천체의 최근 (≲ 1 Myr) catastrophic 파괴에서 온 post-collisional 잔해입니다. 0.63 AU 의 d 는 이 영역에 대한 가장 가까운 substantial 중력 섭동자이며, 18.4 M⊕ 질량은 asteroid 급 천체를 안정한 공명 궤도로 중력적으로 집중시킬 만큼 충분히 큽니다 (Lisse 2007 은 d 와의 2:1 및 5:2 외부 평균 운동 공명을 1.00 과 1.16 AU 에서 식별하고 둘 다 벨트 안. 3:2 외부 MMR 은 0.83 AU 의 secondary 로 cfg-widened 벨트 안쪽 가장자리 근처). catastrophic-event 가설 하 에서 d 의 중력은 벨트 내경의 자연스러운 sculptor 이며 관측된 sub-μm 결정 olivine grain 을 공급한 동역학적으로 들뜬 parent body 의 그럴듯 한 source 입니다. 이는 cfg 의 시각 스타일링에 정보 제공용입니다. d 는 직접 먼지 피처가 붙지 않은 Neptune-블루 디스크로 렌더링되지만, 모성 파일 (<code>hd-69830.html</code>) 의 시스템 개요 렌더는 d 의 벨트와의 기하학적 관계를 두드러지게 보여줍니다.",
  "h2_182":"Atmosphere synthesis",
  "p_183":"대기는 d 의 지배적 관측 가능 요소이며, b 의 haze 가린 stripped 외피 나 c 의 chromophore 색조 따뜻한 haze 와 달리 d 의 대기는 본질적으로 더 작은 Neptune 으로 나타납니다. 온대 평형 온도 282 K 는 d 를 &quot;차가운 Neptune&quot; 영역에 단단히 놓습니다. CH₄ 가 기체와 응축상 상부 대류권 모두에서 지배적인 탄소 운반체이고, NH₃ 는 메탄 구름 아래 응결되며, 가시 광권은 깊은 H₂ 외피의 Rayleigh 산란이 지배하고 가시 스펙트럼의 빨강 끝은 메탄 흡수 밴드가 깎습니다. 이것이 d 에게 특징적인 푸른색을 주는 것 — Neptune 을 거의 동일한 조성에도 불구하고 Uranus 보다 더 깊은 푸른색으로 만드는 같은 메커니즘.",
  "p_184":"cfg 는 Karkoschka 2011 의 Neptune-analog 구름 형태를 채택하며, 대류 업드래프트가 메탄 풍부 공기를 응결 고도 위로 가져오는 중위도 중심으로 디스크의 ~55% 를 덮는 broken 메탄-얼음 캡 구름을 둡니다. ~5 개의 교차하는 어두운 (더 깨끗한, 더 깊은) 띠와 밝은 (더 흐린, 더 높은) 띠가 디스크를 가로지르는 zonal flow 가 발달하며, Neptune 의 형태와 비슷하지만 d 의 더 강한 태양 가열로 살짝 강화됩니다. 일시 적 밝은 메탄 storm 이 십년 시간 스케일로 중위도에 나타나고 (Sromovsky 2001 Neptune analog), 가끔 Neptune 같은 Great Dark Spot — 큰 anticyclonic 소용돌이 — 가 발달, 수년 지속, 소산합니다.",
  "p_185":"대기 색조 <span class=\"hex-chip\" style=\"background:#3a7090\"></span><code>#3a7090</code> 은 Neptune 의 <span class=\"hex-chip\" style=\"background:#2a6ea0\"></span><code>#2a6ea0</code> 이 HD 69830 의 살짝 더 차가운 G8V 조명에 의해 그린-블루 쪽으로 ~5% 따뜻해진 것. 이동은 미묘합니다 — 인지 색이 여전히 명확히 &quot;Neptune 블루&quot; — 하지만 cfg 는 d 를 곧장-Neptune-카피로부터 시각적으로 구분하기 위해 작은 색채 조정 을 인코딩합니다. 구름 색조 <span class=\"hex-chip\" style=\"background:#a0d0e0\"></span><code>#a0d0e0</code> 은 밝은 메탄-얼음 캡 화이트-cyan 으로, 더 깊은 Rayleigh-블루 Neptune 배경에 대해 밝은 zonal-띠 대비를 줍니다.",
  "p_186":"<b>d 의 substellar 영역에서 본 하늘.</b> 메탄 구름 데크 위에서 별이 0.67° 디스크로 하늘을 채우며 — 지구에서 본 태양 (0.53°) 보다 살짝 더 큰 — 태양보다 살짝 더 붉은 크림-노랑 색조가 d 의 H₂ 대기의 Rayleigh-산란 G8V 조명 덕분에 주간 하늘에 따뜻한 cyan-크림 외관을 줍니다. 0.7–1.5 AU 의 따뜻한 먼지 벨트는 d 의 <i>외부</i> 로 궤도 장반경 의 단 10–60% 만큼만 떨어져 있습니다. d 의 시점에서 벨트는 밝은 호박색 띠로 하늘의 wide swath 를 채우며, b 나 c 에서보다 vastly 더 두드러집니다. 벨트가 d 자신의 궤도 영역까지 거의 확장되며, Lisse 2007 의 가설이 성립한다면 parent body 가 우호적 지오메트리 동안 d 의 하늘에서 일시적 점 source 로 가시할 수도 있습니다.",
  "h2_187":"Rotation &amp; spin synthesis",
  "p_188":"5.7 ± 1 Gyr 에 걸친 d 의 197 일 궤도 주기 조석 damping 은 완전히 무시할 만합니다. 오래된 G 왜성 주위 0.63 AU 의 Neptune 급 행성에 대한 동기화 시간 스케일은 ≈ 10¹¹ 년 (Heller 2011 스케일링) 으로 시스템 나이보다 한참 더 길고 우주보다도 한참 더 깁니다. d 는 primordial 자전 주기와 황도 경사도를 유지합니다. cfg 는 ~16 시간의 Neptune-analog 자전과 28° 황도 경사도 (Neptune 의 28.3° 와 매우 가까움) 를 채택하여, 기울어진 spin 축에서 오는 계절 효과와 함께 빠르게 회전하는 동역학적으로 활발한 외관을 행성에 줍니다.",
  "p_189":"차등 자전은 Neptune 처럼 적도가 극지 위도보다 ~10–15% 빠르게 회전 한다고 예상됩니다 (Sromovsky 1993, 2001). 띠 zonal-flow 형태와 일시 적 spot/storm 피처를 구동합니다. 빠른 자전 주기가 modest 한 280 K 온도와 결합하여 적당히 강한 zonal-jet 영역을 생성합니다 — Showman &amp; Polvani 2011 / Polichtchouk 2014 가 각 반구에서 ~5 개의 교차하는 띠를 예측하며, 가장 밝은 메탄-구름 캡이 적도와 중위도에 집중됩니다.",
  "p_190":"<b>KSP 구현 노트.</b> Neptune-analog cfg 에서 자전 주기 = 16.11 시간 (58 000 s). 황도 경사도 = 궤도 평면 법선에서 28° 기울어짐. 자전 축이 관성 공간의 임의 방향을 가리키며 (cfg 는 단순화를 위해 행성 궤도와 같은 Neptune-analog 승교점 경도 채택).",
  "p_191":"<b>e = 0.07 에서의 계절 사이클링.</b> 약한 이심률이 각 197 일 궤도에 걸쳐 ~30% 일조량 진폭을 구동합니다. 근일점 (0.586 AU) → 1.74 S⊕, 원일점 (0.674 AU) → 1.32 S⊕. 28° 황도 경사도와 결합되어, d 는 6.5 개월 궤도 주기에 걸쳐 이심률 구동 계절과 황도 경사도 구동 계절을 모두 경험합니다 — 황도 경사도가 지배적인 반구 비대칭을 구동하며, 이심률이 modest 한 글로벌 변조를 제공합니다. 따라서 계절 패턴은 Neptune 의 것보다 더 풍부하지만 (Neptune 은 165 년 주기와 28° 황도 경사도지만 거의 0 이심률) 훨씬 더 짧은 궤도 사이클에 압축됩니다. cfg 가 애니메이션하지 않음. 정보 제공.",
  "h2_192":"Visual styling",
  "li_193":"<b>글로벌 외관.</b> 깊은 Neptune-cyan 디스크 (<span class=\"hex-chip\" style=\"background:#3a7090\"></span><code>#3a7090</code> 1차 색조, <span class=\"hex-chip\" style=\"background:#a0d0e0\"></span><code>#a0d0e0</code> 밝은 메탄-구름 하이라이트), HD 69830 c 에서 opposition 동안 약 0.06° 겉보기 지름. 띠 zonal-flow 구조가 궤도 뷰 스케일 에서 가시이며, 반구당 ~5 개의 교차하는 어두운/밝은 띠. 시각 시그니처가 명확히 &quot;Neptune 급&quot; — 시스템의 세 행성 중 가장 익숙합니다.",
  "li_194":"<b>Dayside 디테일.</b> 가장 따뜻한 위도에서의 강화된 메탄-구름 활동에서 오는 modest substellar / 적도 brightening. 글로벌 색조 대비 ~5% peak-to-peak.",
  "li_195":"<b>극지 캡.</b> 28° 기울어진 황도 경사도가 d 에 다른 궤도 시점에서 가시한 뚜렷한 극지를 줍니다. 궤도 &quot;여름&quot; 에 별을 향하는 극지는 감소한 구름 커버 (~30%) 와 더 깊은 푸른 Rayleigh-산란 노출을 보이고, 겨울 극지는 강화된 메탄 응결과 더 밝은 화이트-cyan 캡 (~75% 구름 커버) 을 보입니다.",
  "li_196":"<b>일시적 피처.</b> 중위도의 가끔의 밝은 메탄 storm 셀 (수명 ~ 개월) 과 sub-decadal cadence 의 큰 anticyclonic 어두운 spot (&quot;d 급 GDS&quot;). cfg 가 옵션으로 확률적 스케줄로 이를 애니메이션하며, 지역 구름-색조 baseline 대비 ~10% 진폭.",
  "li_197":"<b>Terminator 밴드.</b> Rayleigh-산란 프로필을 가진 깊은 cyan 에서 어둑한 청회색 (<span class=\"hex-chip\" style=\"background:#1a3848\"></span><code>#1a3848</code>) 으로의 gradient. 주야 limb 에 부드러운, 확장된 ~3° 깃털 가장자리를 줍니다.",
  "li_198":"<b>Nightside.</b> 270 K 의 잔존 열 방출에서 오는 어둑한 청회색 글로우 — Neptune 의 47 K 는 렌더러에서 가시적으로 글로우 하기 너무 차갑지만, 270 K 의 d 는 희미한 열 배경을 보입니다.",
  "li_199":"<b>하늘의 별.</b> HD 69830 이 d 의 하늘에서 0.67° — 지구에서 본 태양 보다 살짝 더 큰, 작은 밝은 크림-노랑 디스크. d 의 시점에서 별 은 전형적인 HZ-비교 가능 각지름으로 나타나며, 주간 하늘에 지구 같은 밝기 수준을 줍니다 (d 의 더 높은 대기 알베도에 의해 변조).",
  "li_200":"<b>하늘의 자매 행성.</b> d 에서 b 는 합 (a/b 분리 0.55 AU, b 가 태양 글레어에 있음) 동안 ~0.005°, c 는 c 의 최근접 (a/c 분리 0.44 AU, c 의 haze 디스크 반지름 ~22 000 km) 동안 ~0.005°. 두 내부 행성 모두 d 의 시점에서 본질적으로 점 source.",
  "li_201":"<b>d 시점에서 본 따뜻한 먼지 고리.</b> 이것이 d 의 가장 극적인 하늘 피처. 0.7–1.5 AU 의 먼지 벨트가 d 의 궤도 바로 외부에서 (0.7 AU 가 d 의 장반경 0.63 AU 보다 11% 더 멀음) 1.5 AU 바깥까지 확장되며, d 의 시점에서 forward 궤도 반구를 둘러싸는 밝은 호박색 띠로 투영됩니다. 벨트는 d 의 시점에서 수 도 두께이며 내부 행성 어느 것에서보다도 significantly 더 밝습니다. 아침 / 저녁 crescent 지오메트리 동안 sub-μm olivine grain 의 forward- scattering 이 인상적인 밝은 limb 피처를 만듭니다.",
  "h2_202":"Bibliography",
  "h3_203":"Read (visual-informative, drove decisions above)",
  "li_204":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). 발견 논문. P = 197 d, Msini = 18.1 M⊕, a = 0.63 AU, e = 0.07. 궤도 + 질량 Decisions 의 앵커.",
  "li_205":"<b>Tanner A. et al. 2019</b> — <i>Stellar Parameters and the Habitable Zone of HD 69830</i>, ApJ 873, 91 (<code>2019ApJ...873...91T</code>, arXiv:1812.08964). 정련된 모성 파라미터. Msini 값 18.4 M⊕ 이 Lovis 2006 + 이후 HARPS 확장의 컨센서스로 여기 채택. d 가 HD 69830 의 optimistic HZ 의 내경에 자리한다고 식별.",
  "li_206":"<b>Beichman C. A. et al. 2005</b> — <i>An Excess Due to Small Grains around the Nearby K0 V Star HD 69830</i>, ApJ 626, 1061 (<code>2005ApJ...626.1061B</code>, arXiv:astro-ph/0504491). 따뜻한 먼지를 0.7–1.5 AU 에 놓는 Spitzer/IRS + MIPS SED fit. <b>먼지 벨트의 내부 어깨에 있는 d 의 위치에 대한 앵커 논문.</b>",
  "li_207":"<b>Lisse C. M. et al. 2007</b> — <i>On the Nature of the Dust in the Debris Disk around HD 69830</i>, ApJ 658, 584 (<code>2007ApJ...658..584L</code>, arXiv:astro-ph/0611452). 최근 파괴된 dwarf-planet 급 parent body 를 따뜻한 먼지의 source 로 식별하는 catastrophic-event 가설. d 의 2:1 및 5:2 외부 MMR 을 1.00 / 1.16 AU 에서 띠 안쪽 가장자리의 역학적 sculptor 로 식별. d 의 동역학적 sculptor / 그럴듯한 parent-body source 역할을 구동.",
  "li_208":"<b>Wyatt M. C. et al. 2007</b> — <i>Steady State Evolution of Debris Disks around A Stars</i>, ApJ 663, 365 (arXiv:astro-ph/0703608). Collisional-cascade steady-state 한계. d 를 parent-body shepherding 역할에 두는 catastrophic-event 해석을 지지.",
  "li_209":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). d 의 grazing transit 지오메트리를 배제. Msini 제약만 확인.",
  "li_210":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic forecasting of the masses and radii of other worlds</i>, ApJ 834, 17 (arXiv:1603.08614). 질량-반지름 확률 관계. 온대 Neptune 위치에서 18 M⊕ → 4.4–4.5 R⊕.",

  "h2_232":"Open items for follow-up",
  "li_233":"<b>통과 탐색 갱신.</b> 2026 년 현재 발표된 통과 검출 없음. 197 일 주기는 지상 통과 측량에는 도전적이지만 CHEOPS / PLATO 장기 기준 선 능력 안. 통과 검출은 질량-반지름 tie-break 을 해소하고 <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> 를 canonical 4.45 R⊕ 에서 업데이트할 것.",
  "li_234":"<b>먼지-벨트 해상 이미징.</b> SPHERE / JWST-MIRI / 미래 ALMA 의 따뜻한 먼지 벨트 이미징이 벨트의 내경 shepherd 로서 d 의 역할을 제약할 수 있습니다. 내경에서 해상된 비대칭이 Lisse 2007 의 catastrophic-event 가설에 따라 d 의 중력적 sculpting 을 직접 연루시킬 것. 그런 이미징이 발표되면 cfg 는 d 의 &quot;parent body&quot; 시각 주석을 재평가해야 합니다.",
  "li_235":"<b>직접 대기 특성화.</b> 2026 사이클까지 JWST 프로그램이 HD 69830 d 를 타깃한 적 없음. HabEx / LUVOIR / ELT/HARMONI 의 직접 촬영이 ~50 milliarcsec 각도 분리에서 d 를 해상할 수 있음 — 행성/별 명암 비 ~5 × 10⁻⁹ 의 현재 ELT 능력 안. cfg 의 Neptune-블루 형태가 직접 검증 가능.",
  "li_236":"<b>계절 사이클 모델링.</b> e = 0.07 이심률 구동 일조량 사이클링과 28° 황도 경사도 구동 축 계절의 197 일 궤도 상호작용이 어떤 태양계 analog 보다 풍부한 계절 패턴을 만듭니다. d 의 구체적 파라미터에 대한 상세 GCM 모델링 (Polichtchouk 2014 스타일) 이 cfg 의 계절-캡 렌더링을 정련할 것.",
  "li_237":"<b>Catastrophic-event 가설 교차 확인.</b> JWST/MIRI MRS 가 parent- body olivine grain 인구를 특정 source body 유형과 분광적으로 일관되게 해상한다면, cfg 의 &quot;먼지 벨트 sculptor&quot; 로서 d 의 시각 주석이 낮은-신뢰도 추론에서 더 높은-신뢰도 관측-앵커링된 서사로 upgraded 될 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
