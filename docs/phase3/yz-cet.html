  "h2_101":"Surface synthesis",
  "p_102":"YZ Cet has the deep red photosphere typical of a mid-M dwarf. At Teff = 3100 K (Cifuentes 2020) the SED peaks in the near-infrared near ~0.93 μm, and the optical continuum is heavily suppressed by TiO and VO molecular bands — though not as totally strangled as the cooler M7 V Teegarden&#x27;s Star (2904 K). The three independent Teff determinations span only 3056–3151 K, so the temperature is robust and the rendered color is well constrained. With R = 0.1571 R☉ (Schweitzer 2019) and L = 0.0022 L☉ the star is roughly 1/450 of the Sun&#x27;s luminosity, far too faint to see by eye (V = 12.16) despite its 12.1-light-year proximity.",
  "p_103":"The defining surface property is moderate magnetic activity expressed as a slowly-rotating, spotted, flaring disk. The Ca II H&amp;K index log R&#x27;HK = −4.71 (Astudillo-Defru 2017) places YZ Cet in the moderately-active regime; the Hα is in modest emission (log L_Hα/L_bol = −4.32, Reiners 2018 via Pineda &amp; Villadsen 2023) and the coronal X-ray luminosity log L_X/L_bol = −4.13 (Stelzer 2013) gives L_X ≈ 10^27.1 erg/s, comparable to the quiet Sun (Trigilio 2023). The star is formally an eruptive variable of the UV-Ceti / BY-Draconis class: it shows frequent optical flares in its TESS light curve (Pineda &amp; Villadsen 2023) and rotational brightness modulation from cool starspots, which is what defines the 68.4 d photometric period (Stock 2020). For cfg rendering this means a deep-red disk carrying a low-to-moderate cool-spot fraction that drifts on the 68-day rotation, punctuated by bright flares — a livelier surface than the very quiet old dwarfs (Barnard, Teegarden) but not the near-continuous flaring of a young M dwarf like AU Mic.",
  "p_104":"The magnetic field anchoring all of this is strong. Zeeman-broadening gives a mean surface field ⟨Bf⟩ ≈ 2.2 kG (Moutou 2017), and the SPI radio modelling of Trigilio 2023 independently infers a large-scale polar field B_p ≈ 2.4 kG from the auroral-radio-emission spectrum. Mid-M dwarfs of this type &quot;tend to have strong, kG, axisymmetric dipolar field topologies&quot; (Kochukhov &amp; Lavail 2017, via Trigilio 2023), and YZ Cet fits that picture — the strong, ordered dipole is precisely what makes the planet-star flux tube efficient enough to produce detectable radio aurorae. (One caveat: the Moutou 2017 Zeeman-broadening value is a high outlier for YZ Cet&#x27;s Rossby number ~0.5 and may be systematically overestimated for slow rotators, per Reiners 2022.)",
  "p_105":"No metallicity is curated in the Phase 2 layer and none is synthesized here; at fixed Teff the metallicity effect on the rendered M-dwarf color is sub-perceptible, and project policy skips it for new hosts. There is no debris disk: no infrared-excess detection or resolved imaging of a disk around YZ Cet has been reported, so the star is rendered diskless.",
  "h2_106":"Atmosphere synthesis",
  "p_107":"A main-sequence star has no &quot;atmosphere&quot; in the planetary cfg sense; for a stellar synthesis this section covers the chromosphere, corona, flares, and — uniquely for YZ Cet — the magnetospheric radio environment that defines the system.",
  "p_108":"YZ Cet&#x27;s chromosphere and corona are those of a moderately active mid-M dwarf. The chromospheric Ca II H&amp;K index log R&#x27;HK = −4.71 (Astudillo-Defru 2017) and the Hα emission (log L_Hα/L_bol = −4.32; Reiners 2018) indicate a persistently warm chromosphere, and the coronal X-ray output (log L_X/L_bol = −4.13; Stelzer 2013) sits near the quiet-Sun level in absolute terms (L_X ≈ 10^27.1 erg/s; Trigilio 2023). The 68.4 d rotation gives a Rossby number Ro ≈ 0.5 (Pineda &amp; Villadsen 2023), placing YZ Cet in the unsaturated, magnetically-braked regime — active, but not saturated. The wind is modest: mass-loss-rate estimates cluster at Ṁ ≲ 0.2–5 Ṁ_⊙ depending on the model (Pineda &amp; Villadsen 2023 use Ṁ ≈ 0.25 Ṁ_⊙ in their realistic Model B; Trigilio 2023 adopt Ṁ ≈ 0.2 Ṁ_⊙).",
  "p_109":"The headline feature is the magnetospheric radio aurora. With a kG-scale ordered dipole, YZ Cet strongly confines its wind: Trigilio 2023 compute a wind magnetic confinement parameter η★ ≈ 10^8 and an Alfvén radius R_Alf ≈ 100 R★, so <b>all three planets orbit deep inside the star&#x27;s magnetosphere</b> in the sub-Alfvénic regime. The innermost planet b (a/R★ ≈ 21.9, orbital velocity ~87.6 km/s) ploughs through the closed stellar field, and the perturbation propagates back along the flux tube to the stellar poles, where electron-cyclotron-maser emission produces highly-circularly-polarized auroral radio bursts — exactly the Jupiter-Io mechanism, but star-sized. This is detected as ~100%-polarized 2–4 GHz bursts (Pineda &amp; Villadsen 2023, VLA) and 550–900 MHz bursts folding to two symmetric orbital-phase sectors of planet b (Trigilio 2023, uGMRT; 4.37σ). The ECM spectrum&#x27;s low-frequency cutoff ν_min ≈ 500 MHz implies B_min ≈ 90 G at the emission height, and the inferred polar field is B_p ≈ 2.4 kG.",
  "p_110":"Flares punctuate all of this. Beyond the coherent SPI bursts, YZ Cet shows incoherent gyrosynchrotron radio flares (Pineda &amp; Villadsen 2023, Epoch 2) and optical flares in TESS — the ordinary eruptive-variable behaviour expected of a UV-Ceti star. For cfg purposes the corona / chromosphere layer is &quot;moderately active with frequent flares,&quot; distinct from the quiescent-with-rare-flares old dwarfs and from the saturated young flare stars.",
  "h2_111":"Rotation &amp; spin synthesis",
  "p_112":"YZ Cet rotates slowly, with a photometric period P_rot = 68.4 ± 0.05 d (Stock 2020, combined V-band photometry; the R+I band gives 68.5 ± 1.0 d). This supersedes the earlier 83 d estimate of Astudillo-Defru 2017 and the ~68.5 d value Pineda &amp; Villadsen 2023 used for their synodic-period phase-wrapping. A 68-day period is slow but not extreme — far faster than the very old dwarfs Teegarden (96 d) or GJ 1151 (~130 d), and consistent with an intermediate-age, moderately-active mid-M dwarf. Engle &amp; Guinan 2017 use the rotation to estimate an age of ~3.8 Gyr; no formal age array is curated in Phase 2, so the cfg treats age as a low-confidence ~5 Gyr context number rather than a decision input.",
  "p_113":"<b>KSP implementation note.</b> Stellar rotation period = 68.4 d = 5 909 760 s. In Kopernicus the star body&#x27;s <code>rotationPeriod</code> is set in seconds; the slow rotation makes spin-related visual foreshortening negligible.",
  "p_114":"The rotation matters for the SPI rendering. Because the bursts recur near the planet&#x27;s orbital period rather than the stellar rotation period, the SPI signal is genuinely planet-driven and not a rotational artefact — but the ~68 d stellar rotation does modulate the geometry: between the Pineda &amp; Villadsen 2023 epochs (~90 d apart, 1.3 rotation periods) the tilted stellar dipole rotated significantly, which is why the bursts did not recur at exactly the same orbital phase. For a faithful cfg the radio-aurora animation should be keyed primarily to planet b&#x27;s 2.02-day orbit with a slower ~68-day modulation of the visible-pole geometry.",
  "p_115":"The rotation-axis inclination is unconstrained; Trigilio 2023&#x27;s geometric ARE model favours an orbital-plane inclination i ≈ 30°–60° and assumes the stellar dipole is roughly aligned with the rotation axis and perpendicular to the orbital plane. For NearStars visual rendering a generic axis orientation is adopted, since the slow rotation makes the precise spin axis visually unimportant for the photosphere (it matters only for the SPI flux-tube geometry).",
  "h2_116":"Visual styling",
  "p_117":"In the NearStars renderer, YZ Cet is portrayed as a pale warm orange M4.5 V flare star whose signature is its magnetic environment rather than its modest photosphere:",
  "li_118":"<b>Global appearance.</b> A pale warm orange disk encoded as <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>, the real integrated-SED color close to the 3100 K blackbody; the TiO/VO bands shift the displayed chromaticity only modestly. It is essentially the same hue as the M4 V Barnard&#x27;s Star (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>, near-identical Teff), both within the pale-warm-orange family. The illumination color temperature for scene lighting of the three planets is driven directly by the 3100 K SED.",
  "li_119":"<b>Spotted surface.</b> A low-to-moderate cool-spot fraction (<code>visual_spot_coverage_max ≈ 0.1</code>) drifting on the 68.4-day rotation reproduces the BY-Dra-class photometric modulation. Slowly-evolving dark spot groups, not a uniform disk.",
  "li_120":"<b>Flares.</b> Frequent bright optical flares (UV-Cet eruptive variable) — more active than Barnard or Teegarden, rendered as recurrent transient brightenings, but not the near-continuous flaring of a young M dwarf.",
  "li_121":"<b>Radio aurora (the headline).</b> Although the SPI emission is a radio phenomenon and not visible to the eye, it is the system&#x27;s defining feature and should be expressed visually: a Jupiter-Io-style flux tube connecting the innermost planet b to the stellar magnetic poles, with auroral footpoints brightening at b&#x27;s 2.02-day orbital cadence and the visible pole modulated on the 68-day rotation. From b&#x27;s point of view this is a stellar aurora at the foot of the flux tube — a visually distinctive, scientifically grounded effect unique to YZ Cet in the catalog.",
  "li_122":"<b>Star in the planets&#x27; skies.</b> From b (a = 0.0163 AU) the star subtends ~5.1° — about 10× the Sun&#x27;s angular size from Earth; from c (~3.9°) and d (~2.9°) it is smaller but still dominant. The disk is deep red-orange and floods the close-in worlds with infrared-rich light at 8.2, 4.7 and 2.7× Earth&#x27;s insolation respectively.",
  "li_123":"<b>From Earth.</b> YZ Cet is a V = 12.16 telescopic object, invisible to the naked eye despite its 12.1-light-year proximity, because of the tiny 0.0022 L☉ luminosity.",
  "h2_124":"Bibliography",
  "h3_125":"Read (drove Decisions above)",
  "li_126":"<b>Pineda J.S. &amp; Villadsen J. 2023</b> — <i>Coherent radio bursts from known M-dwarf planet host YZ Ceti</i>, Nature Astronomy (<a href=\"https://arxiv.org/abs/2304.00031\">arXiv:2304.00031</a>). The VLA 2–4 GHz discovery of ~100%-circularly-polarized coherent radio bursts whose recurrence nearly tracks planet b&#x27;s 2.02087 d orbit. Source for the SPI-candidate detection, the sub-Alfvénic environment (Model A/B winds, Rossby number ~0.5), the Table 1 stellar parameters (M, R, Teff, log L_X/L_bol = −4.13, log L_Hα/L_bol = −4.32, ⟨Bf⟩ ≈ 2.2 kG, P_rot ~68.5 d), and the planet b minimum field inference. Establishes YZ Cet as the prime SPI monitoring case.",
  "li_127":"<b>Trigilio C. et al. 2023</b> — <i>Star-Planet Interaction at radio wavelengths in YZ Ceti: Inferring planetary magnetic field</i>, ApJL (<a href=\"https://arxiv.org/abs/2305.00809\">arXiv:2305.00809</a>). uGMRT 550–900 MHz: 4/9 detections folding to two symmetric orbital-phase sectors of planet b, confirming ARE from SPI at 4.37σ (99.992%). Source for the confirmed-SPI decision, the inferred stellar polar field B_p ≈ 2.4 kG (from the ECM spectrum, s=2, ν_min ≈ 500 MHz), the η★ ≈ 10^8 / R_Alf ≈ 100 R★ sub-Alfvénic geometry, and the <b>planet b magnetic field lower limit B ≥ 0.4 G</b> — the first indirect exoplanet magnetic-field measurement.",
  "li_128":"<b>Stock S. et al. 2020</b> — <i>The CARMENES search for exoplanets around M dwarfs. Three temperate to warm super-Earths</i> (<code>2020A&amp;A...636A.119S</code>, doi:10.1051/0004-6361/201936732). Phase 2 recommended source for the rotation period (68.4 ± 0.05 d, combined V-band photometry) and for the planet b/c/d orbits and minimum masses. Supersedes the 83 d Astudillo-Defru 2017 rotation period.",
  "li_129":"<b>Cifuentes C. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. Photometric and astrometric properties</i> (<code>2020A&amp;A...642A.115C</code>, doi:10.1051/0004-6361/202038295). Phase 2 recommended source for the effective temperature (3100 K, SED fitting) and luminosity (0.0022 L☉, bolometric flux).",
  "li_130":"<b>Schweitzer A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Different roads to radii and masses of the target stars</i> (<code>2019A&amp;A...625A..68S</code>, doi:10.1051/0004-6361/201834965). Phase 2 recommended source for the mass (0.1368 M☉) and radius (0.1571 R☉).",
  "li_131":"<b>Astudillo-Defru N. et al. 2017</b> — <i>The HARPS search for southern extra-solar planets. A compact system of short-period super-Earths around YZ Ceti</i> (<code>2017A&amp;A...605L..11A</code>, doi:10.1051/0004-6361/201731581). Discovery paper for the three planets; Phase 2 recommended source for the activity index (log R&#x27;HK = −4.71) and spectral type. Earlier Teff/mass/radius alternatives retained as <code>recommended:false</code>.",
  "h3_132":"Read (context / methodology, not decision-driving)",
  "li_133":"<b>Moutou C. et al. 2017</b> — Zeeman-broadening mean field ⟨Bf⟩ ≈ 2.2 kG for YZ Cet (cited via Pineda &amp; Villadsen 2023 / Trigilio 2023). The magnetic-field-strength Decisions row traces to this; flagged as a possible slow-rotator overestimate by Reiners 2022.",
  "li_134":"<b>Stelzer B. et al. 2013</b> &amp; <b>Reiners A. et al. 2018</b> — coronal X-ray (log L_X/L_bol = −4.13) and Hα (log L_Hα/L_bol = −4.32) activity indices, both via the Pineda &amp; Villadsen 2023 Table 1 compilation. Context for the activity rows.",
  "li_135":"<b>Engle S.G. &amp; Guinan E.F. 2017</b> — rotation-age relation giving the ~3.8 Gyr age (cited via Trigilio 2023). Context only; not a Phase 2 curated value.",
  "h3_136":"Read (instrument-only, not visual-informative)",
  "li_137":"The radio-interferometry methodology in Pineda &amp; Villadsen 2023 (CASA / VLA self-calibration, Stokes V dynamic spectra) and Trigilio 2023 (uGMRT band-4 calibration, hollow-cone ARE geometry) is the instrument backbone of the SPI claim but contributes no direct visual field beyond the burst statistics already used above.",
  "h3_138":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_139":"The earlier Astudillo-Defru 2017 stellar-parameter alternatives (Teff = 3056 K, R = 0.168 R☉) are superseded by the recommended Cifuentes/Schweitzer values and retained only in the Phase 2 DB audit trail. Generic slow-rotator-M-dwarf radio-flare-statistics surveys (Villadsen &amp; Hallinan 2019, Callingham 2021) cited inside the SPI papers are read for context but contribute no YZ-Cet-specific cfg number. No debris-disk papers exist to read (none reported).",
  "h2_140":"Open items for follow-up",
  "li_141":"<b>Planet Phase 3 syntheses.</b> The three planets (b, c, d) are produced as separate Phase 3 docs (<code>yz-cet-b/c/d.md</code>). Planet b&#x27;s inferred ≥ 0.4 G magnetic field (Trigilio 2023) is the SPI driver and feeds the b synthesis directly.",
  "li_142":"<b>Stellar magnetic-field geometry.</b> No Zeeman-Doppler-Imaging (ZDI) map of YZ Cet&#x27;s large-scale field exists yet; both SPI papers scale from Proxima Cen&#x27;s topology. A direct ZDI map would pin the dipole tilt and inclination and sharpen the radio-aurora flux-tube animation in the cfg. The Moutou 2017 ⟨Bf⟩ ≈ 2.2 kG should be revisited if a ZDI-based field becomes available (Reiners 2022 suggests it may be a slow-rotator overestimate).",
  "li_143":"<b>Age.</b> No Phase 2 age array. If a future curation adds a gyrochronology or kinematic age, the low-confidence ~5 Gyr context number should be replaced.",
  "li_144":"<b>Flare-rate quantification.</b> The eruptive-variable classification is qualitative; a TESS flare census would let a future cfg attach a quantitative <code>flare_rate_per_day</code> to the rendering.",
  "li_145":"<b>SPI radio-aurora visualization fidelity.</b> The flux-tube footpoint brightening keyed to b&#x27;s 2.02 d orbit with 68 d rotational modulation is a tie-break visual choice grounded in the hollow-cone ARE model; refine once a renderer can show it.",
  "h2_146":"Related",

  "li_152":"<a href=\"teegardens-star.md\">teegardens-star</a> — comparison cooler, older, much quieter ultracool dwarf (M7 V, 96 d rotation)",

  ko: {
  "p_1":"YZ Cet (GJ 54.1. Gaia DR3 2358524597030794112) 은 3.717 pc 거리의 M4.5 V 적색왜성으로 (Gaia DR3 시차 269.06 mas), 약 12.1 광년 떨어져 있으며 태양에서 21번째로 가까운 항성계입니다. 기본 파라미터는 frozen Phase 2 레이어에서 가져옵니다. 유효온도 Teff = 3100 K (Cifuentes et al. 2020, SED 피팅. 세 독립 측정이 3056–3151 K 에 분포), 광도 L = 0.0022 ± 0.00005 L☉ (Cifuentes 2020, bolometric flux), 반지름 R = 0.1571 ± 0.0052 R☉ 와 질량 M = 0.1368 ± 0.0033 M☉ (둘 다 Schweitzer et al. 2019, CARMENES) 입니다. UV-Ceti / BY-Draconis 부류의 폭발 변광성 (flare star) 으로, P_rot = 68.4 d 로 느리게 자전하고 (Stock et al. 2020, V-band 측광) 색채권 활동 지표는 log R&#x27;HK = −4.71 ± 0.21 (Astudillo-Defru et al. 2017) — 중간-M 왜성치고 적당히 활동적이며, 느리게 변조되는 starspot 배경 위에 잦은 광학 flare 가 얹혀 있습니다.",
  "p_2":"NearStars 에서 YZ Cet 을 특별하게 만드는 것은 광구가 아니라 자기권입니다. YZ Cet 은 <b>항성-행성 자기 상호작용(SPI)의 전파 검출이 확인된 최초의 외계행성계</b> 입니다. Pineda &amp; Villadsen 2023 은 VLA 로 ~100% 원편광된 2–4 GHz coherent 전파 버스트를 검출했고, 그 재발 주기가 최내측 행성 b 의 2.02 일 궤도를 거의 따라갔으며, Trigilio et al. 2023 은 uGMRT 550–900 MHz 관측으로 SPI 를 4.37σ 로 확인하면서 오로라 전파 방출(ARE) 을 모델링해 항성 극자기장 B_p ≈ 2.4 kG 와 <b>b 의 행성 자기장이 최소 0.4 G</b> 임을 추론했습니다 — 외계행성 자기장의 첫 (간접) 측정입니다. 따라서 이 호스트는 목성-이오 식 flux tube 를 안쪽 행성까지 드리우고, 전자 사이클로트론 메이저 전파 오로라를 띠며, 평범한 flare 활동까지 한꺼번에 보입니다.",
  "p_3":"<b>NearStars 시나리오 선택. 깊은 붉은빛의, 적당히 활동적인, 느리게 자전하는 M4.5 V flare star 로, 최내측 행성과 목성-이오 식 항성-행성 자기 상호작용을 정박시키는 모습으로 렌더링합니다.</b> 항성 레이어는 frozen Phase 2 출처 (Cifuentes 2020 Teff/광도, Schweitzer 2019 질량/반지름, Stock 2020 자전, Astudillo-Defru 2017 활동) 와 두 SPI 전파 논문 (Pineda &amp; Villadsen 2023 검출, Trigilio 2023 확인 + 항성 자기장 추론) 위에 정박합니다. 알려진 주변 원반은 없습니다 — 검출 보고가 없으며 여기서 지어내지도 않습니다. tie-break 하나가 3100 K M4.5 V SED 의 시각 표면 색조를 정하고, SPI / 자기장 결정들은 기하가 모델 의존적 이라 medium-to-low 신뢰도에 둡니다.",

  "h2_101":"Surface synthesis",
  "p_102":"YZ Cet 은 중간-M 왜성에 전형적인 깊은 붉은 광구를 가집니다. Teff = 3100 K (Cifuentes 2020) 에서 SED 는 근적외선 ~0.93 μm 부근에서 정점을 이루고, 광학 연속체는 TiO 와 VO 분자 밴드에 강하게 억제됩니다 — 다만 더 차가운 M7 V 티가든 별 (2904 K) 만큼 완전히 질식하지는 않습니다. 세 독립 Teff 측정이 3056–3151 K 안에 그치므로 온도는 견고하고 렌더링되는 색도 잘 제약됩니다. R = 0.1571 R☉ (Schweitzer 2019) 과 L = 0.0022 L☉ 에서 별은 태양 광도의 약 1/450 이라, 12.1 광년 근접에도 맨눈으로는 너무 어둡습니다 (V = 12.16).",
  "p_103":"규정하는 표면 속성은, 느리게 자전하는 spotted 한 flaring 원반으로 표현되는 적당한 자기 활동입니다. Ca II H&amp;K 지표 log R&#x27;HK = −4.71 (Astudillo-Defru 2017) 은 YZ Cet 을 중간 활동 영역에 둡니다. Hα 는 약한 방출 상태이고 (log L_Hα/L_bol = −4.32, Reiners 2018, Pineda &amp; Villadsen 2023 경유), 코로나 X-선 광도 log L_X/L_bol = −4.13 (Stelzer 2013) 은 L_X ≈ 10^27.1 erg/s 로 조용한 태양에 필적합니다 (Trigilio 2023). 별은 형식적으로 UV-Ceti / BY-Draconis 부류의 폭발 변광성입니다. TESS 광도곡선에 잦은 광학 flare 가 보이고 (Pineda &amp; Villadsen 2023), cool starspot 에 의한 자전 밝기 변조가 68.4 d 측광 주기를 정의합니다 (Stock 2020). cfg 렌더링에서는, 68 일 자전을 따라 떠도는 낮은-중간 cool-spot 비율을 띤 깊은 붉은 원반에 밝은 flare 가 박힌 모습이 됩니다 — 매우 조용한 노령 왜성 (바너드, 티가든) 보다 활기차지만 AU Mic 같은 젊은 M 왜성의 거의 연속적인 flaring 은 아닙니다.",
  "p_104":"이 모든 것을 떠받치는 자기장은 강합니다. Zeeman-broadening 은 평균 표면장 ⟨Bf⟩ ≈ 2.2 kG (Moutou 2017) 을 주고, Trigilio 2023 의 SPI 전파 모델링은 오로라-전파-방출 스펙트럼에서 대규모 극자기장 B_p ≈ 2.4 kG 을 독립적으로 추론합니다. 이런 부류의 중간-M 왜성은 &quot;강한 kG 의 축대칭 쌍극자 자기장 위상을 가지는 경향&quot; 이 있고 (Kochukhov &amp; Lavail 2017, Trigilio 2023 경유), YZ Cet 도 그 그림에 맞습니다 — 강하고 정연한 쌍극자가 바로 행성-항성 flux tube 를 충분히 효율적으로 만들어 검출 가능한 전파 오로라를 내게 합니다. (한 가지 caveat. Moutou 2017 Zeeman-broadening 값은 YZ Cet 의 Rossby number ~0.5 대비 high outlier 라, 느린 자전체에 대해 체계적으로 과대평가됐을 수 있습니다, Reiners 2022.)",
  "p_105":"Phase 2 레이어에 금속도가 큐레이션되어 있지 않고 여기서 합성하지도 않습니다. 고정 Teff 에서 금속도가 렌더링 M-왜성 색에 미치는 영향은 sub-perception 이고, 프로젝트 정책은 신규 호스트에 대해 이를 스킵 합니다. 잔해 원반도 없습니다. YZ Cet 주위 원반의 적외선 초과 검출이나 분해 영상 보고가 없으므로, 별은 원반 없이 렌더링됩니다.",
  "h2_106":"Atmosphere synthesis",
  "p_107":"주계열 별은 행성 cfg 의미의 &quot;대기&quot; 를 갖지 않습니다. 항성 합성에서 이 섹션은 색채권, 코로나, flare, 그리고 — YZ Cet 만의 특징인 — 이 시스템을 규정하는 자기권 전파 환경을 다룹니다.",
  "p_108":"YZ Cet 의 색채권과 코로나는 적당히 활동적인 중간-M 왜성의 것입니다. 색채권 Ca II H&amp;K 지표 log R&#x27;HK = −4.71 (Astudillo-Defru 2017) 과 Hα 방출 (log L_Hα/L_bol = −4.32. Reiners 2018) 은 지속적으로 따뜻한 색채권을 가리키고, 코로나 X-선 출력 (log L_X/L_bol = −4.13. Stelzer 2013) 은 절대값으로 조용한 태양 수준에 가깝습니다 (L_X ≈ 10^27.1 erg/s. Trigilio 2023). 68.4 d 자전은 Rossby number Ro ≈ 0.5 (Pineda &amp; Villadsen 2023) 를 주어 YZ Cet 을 비saturated, 자기 제동 영역에 둡니다 — 활동적이지만 saturated 는 아닙니다. 항성풍은 적당합니다. 질량손실률 추정은 모델에 따라 Ṁ ≲ 0.2–5 Ṁ_⊙ 에 모입니다 (Pineda &amp; Villadsen 2023 은 현실적 Model B 에서 Ṁ ≈ 0.25 Ṁ_⊙, Trigilio 2023 은 Ṁ ≈ 0.2 Ṁ_⊙ 채택).",
  "p_109":"핵심 특징은 자기권 전파 오로라입니다. kG 규모의 정연한 쌍극자로 YZ Cet 은 항성풍을 강하게 가둡니다. Trigilio 2023 은 풍 자기 confinement 파라미터 η★ ≈ 10^8 과 Alfvén 반지름 R_Alf ≈ 100 R★ 을 계산했고, 따라서 <b>세 행성 모두 별의 자기권 깊숙이</b> sub-Alfvénic 영역에서 공전합니다. 최내측 행성 b (a/R★ ≈ 21.9, 궤도속도 ~87.6 km/s) 는 닫힌 항성 자기장을 헤집고 지나가며, 그 perturbation 이 flux tube 를 따라 항성 극으로 되돌아가, 거기서 전자-사이클로트론-메이저 방출이 강하게 원편광된 오로라 전파 버스트를 냅니다 — 바로 목성-이오 메커니즘인데 별 크기로 일어납니다. 이는 ~100% 편광된 2–4 GHz 버스트 (Pineda &amp; Villadsen 2023, VLA) 와, 행성 b 의 두 대칭 궤도-위상 sector 로 folding 되는 550–900 MHz 버스트 (Trigilio 2023, uGMRT. 4.37σ) 로 검출됩니다. ECM 스펙트럼의 저주파 cutoff ν_min ≈ 500 MHz 는 방출 고도에서 B_min ≈ 90 G 를 함의하고, 추론된 극자기장은 B_p ≈ 2.4 kG 입니다.",
  "p_110":"flare 가 이 모두를 점점이 끊습니다. coherent SPI 버스트 외에도 YZ Cet 은 비coherent gyrosynchrotron 전파 flare (Pineda &amp; Villadsen 2023, Epoch 2) 와 TESS 광학 flare 를 보입니다 — UV-Ceti 별에 기대되는 평범한 폭발 변광 거동입니다. cfg 목적상 코로나 / 색채권 레이어는 &quot;잦은 flare 를 동반한 적당히 활동적&quot; 으로, 정적-with-드문-flare 노령 왜성과도, saturated 젊은 flare star 와도 구별됩니다.",
  "h2_111":"Rotation &amp; spin synthesis",
  "p_112":"YZ Cet 은 느리게 자전하며, 측광 주기는 P_rot = 68.4 ± 0.05 d (Stock 2020, 결합 V-band 측광. R+I band 는 68.5 ± 1.0 d) 입니다. 이는 Astudillo-Defru 2017 의 이전 83 d 추정과 Pineda &amp; Villadsen 2023 이 synodic-period 위상 wrapping 에 쓴 ~68.5 d 값을 대체합니다. 68 일 주기는 느리지만 극단적이지는 않습니다 — 매우 노령인 티가든 (96 d) 이나 GJ 1151 (~130 d) 보다 훨씬 빠르고, 중간 나이의 적당히 활동적인 중간-M 왜성과 일관됩니다. Engle &amp; Guinan 2017 은 자전으로 ~3.8 Gyr 나이를 추정합니다. Phase 2 에 형식 나이 배열이 없으므로 cfg 는 나이를 결정 입력이 아니라 low-confidence ~5 Gyr 맥락 수치로 다룹니다.",
  "p_113":"<b>KSP 구현 노트.</b> 항성 자전 주기 = 68.4 d = 5 909 760 s. Kopernicus 에서 항성 바디의 <code>rotationPeriod</code> 는 초 단위로 설정합니다. 느린 자전이라 spin 관련 시각 foreshortening 은 무시할 만합니다.",
  "p_114":"자전은 SPI 렌더링에 중요합니다. 버스트가 항성 자전 주기가 아니라 행성 궤도 주기 부근에서 재발하므로 SPI 신호는 진짜 행성 구동이지 자전 artefact 가 아닙니다 — 다만 ~68 d 항성 자전은 기하를 변조합니다. Pineda &amp; Villadsen 2023 의 두 epoch 사이 (~90 d, 자전 주기의 1.3 배) 에 기울어진 항성 쌍극자가 크게 회전했고, 그래서 버스트가 정확히 같은 궤도 위상에서 재발하지 않았습니다. 충실한 cfg 라면 전파-오로라 애니메이션을 주로 행성 b 의 2.02 일 궤도에 키잉하고 가시 극 기하를 느린 ~68 일로 변조해야 합니다.",
  "p_115":"자전축 경사는 제약되지 않습니다. Trigilio 2023 의 기하적 ARE 모델은 궤도면 경사 i ≈ 30°–60° 를 선호하고 항성 쌍극자가 자전축과 대략 정렬되며 궤도면에 수직이라고 가정합니다. NearStars 시각 렌더링에는 일반적인 축 배향을 채택합니다. 느린 자전 때문에 정확한 spin 축은 광구 에는 시각적으로 중요하지 않고 (SPI flux-tube 기하에만 영향) 그렇습니다.",
  "h2_116":"Visual styling",
  "p_117":"NearStars 렌더러에서 YZ Cet 은, 시그니처가 수수한 광구가 아니라 자기 환경에 있는 옅은 따뜻한 주황빛의 M4.5 V flare star 로 그려집니다.",
  "li_118":"<b>전체 외형.</b> <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code> 으로 인코딩한 옅은 따뜻한 주황 원반. 3100 K 흑체에 가까운 실제 적분-SED 색이며, TiO/VO 밴드는 표시 색도를 약간만 이동시킵니다. M4 V 바너드 별 (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>, Teff 가 거의 같음) 과 사실상 같은 색조이고, 둘 다 옅은 따뜻한 주황 계열입니다. 세 행성의 장면 조명 색온도는 3100 K SED 가 직접 구동합니다.",
  "li_119":"<b>Spotted 표면.</b> 68.4 일 자전을 따라 떠도는 낮은-중간 cool-spot 비율 (<code>visual_spot_coverage_max ≈ 0.1</code>) 이 BY-Dra 부류 측광 변조를 재현합니다. 균일한 원반이 아니라 천천히 진화하는 어두운 spot 군집 입니다.",
  "li_120":"<b>Flare.</b> 잦은 밝은 광학 flare (UV-Cet 폭발 변광성) — 바너드나 티가든 보다 활동적이며, 반복되는 transient 밝아짐으로 렌더링하되 젊은 M 왜성의 거의 연속적인 flaring 은 아닙니다.",
  "li_121":"<b>전파 오로라 (헤드라인).</b> SPI 방출은 전파 현상이라 맨눈에 보이지는 않지만, 시스템을 규정하는 특징이므로 시각적으로 표현해야 합니다. 최내측 행성 b 를 항성 자기 극에 잇는 목성-이오 식 flux tube 로, 오로라 footpoint 가 b 의 2.02 일 궤도 cadence 로 밝아지고 가시 극은 68 일 자전으로 변조됩니다. b 의 시점에서 이는 flux tube 발치의 항성 오로라입니다 — 카탈로그에서 YZ Cet 만의, 시각적으로 독특하고 과학적으로 근거 있는 효과입니다.",
  "li_122":"<b>행성 하늘에서의 별.</b> b (a = 0.0163 AU) 에서 별은 ~5.1° 를 차지합니다 — 지구에서 본 태양의 약 10 배. c (~3.9°) 와 d (~2.9°) 에서는 더 작지만 여전히 압도적입니다. 원반은 깊은 적등색이고, 각각 지구 일사량의 8.2, 4.7, 2.7 배인 적외선이 풍부한 빛으로 가까운 세계들을 적십니다.",
  "li_123":"<b>지구에서.</b> YZ Cet 은 V = 12.16 의 망원경 천체로, 12.1 광년 근접에도 0.0022 L☉ 의 작은 광도 때문에 맨눈에는 보이지 않습니다.",
  "h2_124":"Bibliography",
  "h3_125":"Read (drove Decisions above)",
  "li_126":"<b>Pineda J.S. &amp; Villadsen J. 2023</b> — <i>Coherent radio bursts from known M-dwarf planet host YZ Ceti</i>, Nature Astronomy (<a href=\"https://arxiv.org/abs/2304.00031\">arXiv:2304.00031</a>). ~100% 원편광된 coherent 전파 버스트를 VLA 2–4 GHz 로 발견했고, 그 재발이 행성 b 의 2.02087 d 궤도를 거의 따라갑니다. SPI-후보 검출, sub-Alfvénic 환경 (Model A/B 풍, Rossby number ~0.5), Table 1 항성 파라미터 (M, R, Teff, log L_X/L_bol = −4.13, log L_Hα/L_bol = −4.32, ⟨Bf⟩ ≈ 2.2 kG, P_rot ~68.5 d), 행성 b 최소 자기장 추론의 출처. YZ Cet 을 핵심 SPI 모니터링 사례로 확립.",
  "li_127":"<b>Trigilio C. et al. 2023</b> — <i>Star-Planet Interaction at radio wavelengths in YZ Ceti: Inferring planetary magnetic field</i>, ApJL (<a href=\"https://arxiv.org/abs/2305.00809\">arXiv:2305.00809</a>). uGMRT 550–900 MHz. 9회 중 4회 검출이 행성 b 의 두 대칭 궤도-위상 sector 로 folding 되어 SPI 의 ARE 를 4.37σ (99.992%) 로 확인. 확인-SPI 결정, ECM 스펙트럼에서 추론한 항성 극자기장 B_p ≈ 2.4 kG (s=2, ν_min ≈ 500 MHz), η★ ≈ 10^8 / R_Alf ≈ 100 R★ sub-Alfvénic 기하, 그리고 <b>행성 b 자기장 하한 B ≥ 0.4 G</b> — 첫 간접 외계행성 자기장 측정 — 의 출처.",
  "li_128":"<b>Stock S. et al. 2020</b> — <i>The CARMENES search for exoplanets around M dwarfs. Three temperate to warm super-Earths</i> (<code>2020A&amp;A...636A.119S</code>, doi:10.1051/0004-6361/201936732). 자전 주기 (68.4 ± 0.05 d, 결합 V-band 측광) 와 행성 b/c/d 궤도 및 최소질량의 Phase 2 recommended 출처. Astudillo-Defru 2017 의 83 d 자전 주기를 대체.",
  "li_129":"<b>Cifuentes C. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. Photometric and astrometric properties</i> (<code>2020A&amp;A...642A.115C</code>, doi:10.1051/0004-6361/202038295). 유효온도 (3100 K, SED 피팅) 와 광도 (0.0022 L☉, bolometric flux) 의 Phase 2 recommended 출처.",
  "li_130":"<b>Schweitzer A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Different roads to radii and masses of the target stars</i> (<code>2019A&amp;A...625A..68S</code>, doi:10.1051/0004-6361/201834965). 질량 (0.1368 M☉) 과 반지름 (0.1571 R☉) 의 Phase 2 recommended 출처.",
  "li_131":"<b>Astudillo-Defru N. et al. 2017</b> — <i>The HARPS search for southern extra-solar planets. A compact system of short-period super-Earths around YZ Ceti</i> (<code>2017A&amp;A...605L..11A</code>, doi:10.1051/0004-6361/201731581). 세 행성의 발견 논문. 활동 지표 (log R&#x27;HK = −4.71) 와 분광형의 Phase 2 recommended 출처. 이전 Teff/질량/반지름 대안은 <code>recommended:false</code> 로 보존.",
  "h3_132":"Read (context / methodology, not decision-driving)",
  "li_133":"<b>Moutou C. et al. 2017</b> — YZ Cet 의 Zeeman-broadening 평균장 ⟨Bf⟩ ≈ 2.2 kG (Pineda &amp; Villadsen 2023 / Trigilio 2023 경유). 자기장-강도 Decisions 행이 여기서 옴. Reiners 2022 가 느린-자전체 과대평가 가능성을 표시.",
  "li_134":"<b>Stelzer B. et al. 2013</b> &amp; <b>Reiners A. et al. 2018</b> — 코로나 X-선 (log L_X/L_bol = −4.13) 과 Hα (log L_Hα/L_bol = −4.32) 활동 지표, 둘 다 Pineda &amp; Villadsen 2023 Table 1 컴파일레이션 경유. 활동 행의 맥락.",
  "li_135":"<b>Engle S.G. &amp; Guinan E.F. 2017</b> — ~3.8 Gyr 나이를 주는 자전-나이 관계 (Trigilio 2023 경유). 맥락만. Phase 2 큐레이션 값은 아님.",
  "h3_136":"Read (instrument-only, not visual-informative)",
  "li_137":"Pineda &amp; Villadsen 2023 (CASA / VLA self-calibration, Stokes V 동적 스펙트럼) 과 Trigilio 2023 (uGMRT band-4 보정, hollow-cone ARE 기하) 의 전파-간섭계 방법론은 SPI 주장의 기기적 골격이지만, 위에서 이미 쓴 버스트 통계 이상의 직접 시각 필드를 주지는 않습니다.",
  "h3_138":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_139":"이전 Astudillo-Defru 2017 항성-파라미터 대안 (Teff = 3056 K, R = 0.168 R☉) 은 recommended Cifuentes/Schweitzer 값으로 대체되었고 Phase 2 DB 감사 추적에만 보존됩니다. SPI 논문 안에 인용된 일반적인 느린-자전-M-왜성 전파-flare-통계 서베이 (Villadsen &amp; Hallinan 2019, Callingham 2021) 는 맥락용으로 읽었지만 YZ-Cet-고유 cfg 수치는 주지 않습니다. 읽을 잔해-원반 논문은 없습니다 (보고된 바 없음).",
  "h2_140":"Open items for follow-up",
  "li_141":"<b>행성 Phase 3 합성.</b> 세 행성 (b, c, d) 은 별도 Phase 3 문서 (<code>yz-cet-b/c/d.md</code>) 로 만듭니다. 행성 b 의 추론된 ≥ 0.4 G 자기장 (Trigilio 2023) 이 SPI 구동체이고 b 합성에 직접 들어갑니다.",
  "li_142":"<b>항성 자기장 기하.</b> YZ Cet 의 대규모 자기장 Zeeman-Doppler-Imaging (ZDI) 지도는 아직 없고, 두 SPI 논문 모두 Proxima Cen 의 위상에서 스케일합니다. 직접 ZDI 지도가 있으면 쌍극자 기울기와 경사를 못박아 cfg 의 전파-오로라 flux-tube 애니메이션을 다듬을 수 있습니다. Moutou 2017 ⟨Bf⟩ ≈ 2.2 kG 은 ZDI 기반 자기장이 나오면 재검토해야 합니다 (Reiners 2022 가 느린-자전체 과대평가 가능성 제기).",
  "li_143":"<b>나이.</b> Phase 2 나이 배열 없음. 미래 큐레이션이 자이로크로놀로지나 운동학 나이를 추가하면 low-confidence ~5 Gyr 맥락 수치를 교체해야 합니다.",
  "li_144":"<b>Flare-율 정량화.</b> 폭발 변광성 분류는 정성적입니다. TESS flare census 가 있으면 미래 cfg 가 정량적 <code>flare_rate_per_day</code> 를 렌더링에 붙일 수 있습니다.",
  "li_145":"<b>SPI 전파-오로라 시각화 충실도.</b> b 의 2.02 d 궤도에 키잉하고 68 d 자전으로 변조하는 flux-tube footpoint 밝아짐은 hollow-cone ARE 모델에 근거한 tie-break 시각 선택입니다. 렌더러가 표현 가능해지면 다듬습니다.",
  "h2_146":"Related",
  "li_147":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 표의 스키마 출처",
  "li_148":"<a href=\"yz-cet-b.md\">yz-cet-b</a> — 최내측 행성. 추론된 ≥ 0.4 G 자기장을 가진 SPI 구동체",
  "li_149":"<a href=\"yz-cet-c.md\">yz-cet-c</a> — 중간 행성",
  "li_150":"<a href=\"yz-cet-d.md\">yz-cet-d</a> — 최외측 행성",
  "li_151":"<a href=\"barnards-star.md\">barnards-star</a> — 비교 M 왜성 (M4.0 Ve, Teff 거의 동일). 바너드의 노령 정적 near-floor 활동과 YZ Cet 의 적당한 활동 및 SPI 전파 오로라를 대비",
  "li_152":"<a href=\"teegardens-star.md\">teegardens-star</a> — 비교용 더 차갑고 노령이며 훨씬 조용한 초저온 왜성 (M7 V, 96 d 자전)",
  "li_153":"<a href=\"proxima-cen.md\">proxima-cen</a> — 비교 M 왜성이자 두 전파 논문이 YZ Cet 자기장을 스케일하는 데 쓴 SPI 유사체",

  }

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
