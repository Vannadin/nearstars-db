  "h2_110":"Surface synthesis",
  "p_111":"τ Ceti&#x27;s photosphere is a colder, older, and substantially more iron-poor cousin of the Sun. The effective temperature of 5370 K (Korolik 2023 interferometric) sits ~400 K below Sol&#x27;s 5772 K; combined with R = 0.793 R☉, the measured bolometric luminosity is 0.488 L☉ (Teixeira 2009, M_V + bolometric correction; consistent with R and Teff via Stefan–Boltzmann), a little under half the solar reference. The G8.5 V classification (Gray et al. 2006) places τ Ceti at the cool faint end of the solar analog band, comparable in temperature to ε Eridani&#x27;s K2V but with the lower-gravity envelope of a true G dwarf rather than a young K star.",
  "p_112":"The metallicity [Fe/H] = −0.52 (Santos 2013, the Phase 2 recommended value) is the headline distinguishing feature. At roughly three times less iron than the Sun, line blanketing in the blue continuum is correspondingly weaker, and the integrated visible SED is marginally bluer than a solar-metallicity G8.5 V would be at the same Teff — the difference is small (~10–20 K equivalent blue-shift) but enough to push the cfg surface tint away from the warm-cream of α Cen A&#x27;s +0.24 dex metallicity toward a cleaner pale-yellow. Bruntt 2010&#x27;s [Fe/H] = −0.18 is a known α-enhanced outlier and is rejected; the Santos 2013 SWEET-Cat value anchors the DB.",
  "p_113":"Granulation is not directly imaged but is predicted to be Sun-like in pattern and somewhat slower in timescale because of the lower photospheric temperature (acoustic cut-off scales as √g/√T_eff, giving τ Ceti&#x27;s p-mode oscillations a slightly longer characteristic period than the Sun&#x27;s 5-minute oscillation). Teixeira 2009 detected the p-mode spectrum with HARPS, finding Δν = 169.0 ± 0.5 μHz and ν_max ≈ 4490 μHz, consistent with the asteroseismic radius and mass adopted above. Limb darkening IS now constrained: Korolik 2023 fit an H-band linear limb-darkening coefficient α ≈ 0.14 ± 0.03 directly from the CHARA/MIRC-X visibilities, which the cfg adopts.",
  "p_114":"Sunspot coverage is essentially undetectable at the photometric precision of long-term ground-based monitoring. With log R&#x27;HK = −4.977 (Gomes da Silva 2021), τ Ceti is fractionally less active than α Cen A and well below the modern Sun. It is NOT, however, a flat standard: Gomes da Silva 2021 explicitly find a ~11 yr cyclic variability superimposed on a long-term declining activity trend, and caution against using τ Ceti as a constant-activity reference — consistent with a quiet-but-cycling regime for an old, slowly rotating, low-metallicity G dwarf.",
  "h2_115":"Atmosphere synthesis",
  "p_116":"The chromosphere–transition-region–corona structure of τ Ceti is the canonical quiet G-dwarf reference. Gomes da Silva 2021&#x27;s log R&#x27;HK = −4.977 places the chromospheric Ca II H&amp;K emission near the basal flux floor — close to the minimum expected from acoustic heating — but with a real ~11 yr magnetic-cycle modulation and a long-term declining trend (Gomes da Silva 2021), so it is low-amplitude rather than truly flat. Hα is in absorption with only weak variability.",
  "p_117":"X-ray emission is below the EXOSAT detection threshold: Schmitt 1985 reports an upper limit log L_X ≤ 26.5 cgs (0.1–2.4 keV). Subsequent XMM-Newton and Chandra pointings (catalogued in Judge 2004 and subsequent compilations) have not produced a clean detection, and the quiescent corona is fainter than that of α Cen A during cycle minimum. There is no evidence of any X-ray activity cycle. FUV continuum emission (Judge 2004) is correspondingly weak, implying a transition region thinner and cooler than the modern Sun&#x27;s.",
  "p_118":"Flares are not detected. Long-term photometric monitoring (HIPPARCOS, Mt Wilson) shows no impulsive brightening events above the noise floor, and the surface magnetic field is below the Zeeman-broadening detection limit of ~50 G in the available high-resolution spectroscopy. The integrated XUV luminosity is well below 10⁻⁵ L_bol and would not materially erode an Earth-like atmosphere over Gyr timescales at any of the f / g / h planet orbits.",
  "p_119":"The implication for the planet roster is an exceptionally benign space-weather environment, distinctly milder than even the quiet α Cen A. Any inner-planet atmospheric escape calculation defaults to thermal Jeans loss without the augmented hydrodynamic loss driven by stellar XUV that is the rule for K and M dwarfs.",
  "h2_120":"Rotation &amp; spin synthesis",
  "p_121":"τ Ceti has NO directly measured photometric rotation period — it is nearly pole-on (inclination i = 7 ± 7°, v sin i ~0.1 km/s, Korolik 2023), so rotational modulation is not observable and periodogram peaks have false-alarm probabilities near unity. The cfg therefore carries the Korolik 2023 gyrochronological estimate of 46 ± 4 days (method recorded as unverified), against the older Baliunas 1996 Ca II H&amp;K value of ~34 d — a documented divergence (see Canonical alternatives). Both are slow, as expected for an old G dwarf.",
  "p_122":"The slow rotation is consistent with the old age. The cfg adopts the Di Folco 2004 isochrone age of ~10 Gyr (adopted by Korolik 2023) as the value most consistent with the very low activity and slow rotation, against the Mamajek &amp; Hillenbrand 2008 activity-age of 5.8 Gyr — a documented divergence within a literature range of 4.4–12.4 Gyr (Canonical alternatives). Gomes da Silva 2021&#x27;s isochrone fit of 0.028 Gyr is a metal-poor-star fit failure and is rejected.",
  "p_123":"Asteroseismic p-mode oscillations were detected by Teixeira 2009 in 8 nights of HARPS RV monitoring: Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz. The acoustic timescale 2π/Δν ≈ 1.6 h is shorter than the solar 5-minute oscillation when scaled correctly by the smaller radius and higher mean sound speed; this constrains the mass to 0.783 ± 0.012 M☉ and the radius to 0.793 ± 0.004 R☉ with percent-level precision, the values adopted in the Decisions table.",
  "p_124":"Differential rotation is not resolved. The rotation axis is nearly pole-on (i = 7 ± 7°, Korolik 2023), which NearStars reflects in the rendered spin geometry; note this stellar spin axis is misaligned with the debris-disk axis (i_disk ~35°, Lawler 2014), a misalignment Korolik 2023 explicitly flags.",
  "h2_125":"Canonical alternatives",
  "p_126":"<b>Age — isochrone vs activity.</b> The cfg adopts the Di Folco 2004 isochrone age ~10 Gyr (adopted by Korolik 2023), the value most consistent with τ Ceti&#x27;s very low activity and slow rotation. The documented alternative is the Mamajek &amp; Hillenbrand 2008 activity-age of 5.8 Gyr; the full literature spread is 4.4–12.4 Gyr (Korolik 2023). The Gomes da Silva 2021 isochrone fit (0.028 Gyr) is a metal-poor-star fit failure and is rejected. All credible methods agree τ Ceti is old; the divergence is whether it is ~6 or ~10 Gyr.",
  "p_127":"<b>Rotation — gyrochronology vs Ca II HK.</b> τ Ceti has NO direct photometric rotation period (it is pole-on, v sin i ~0.1 km/s). The cfg carries the Korolik 2023 gyrochronological 46 ± 4 d (recorded method=unverified, and tied to the ~10 Gyr age); the documented alternative is the older Baliunas 1996 Ca II H&amp;K ~34 d. Boro Saikia 2018 ZDI independently prefers ~46 d, supporting the cfg choice. The two are coupled to the age divergence above.",
  "h2_128":"Visual styling",
  "p_129":"In the NearStars renderer, τ Ceti is portrayed as a slightly cooler and visibly more pale-yellow star than α Cen A. The surface tint hex <span class=\"hex-chip\" style=\"background:#ffe9c8\"></span><code>#ffe9c8</code> encodes a cream-yellow with marginally less warmth than the canonical solar <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> or α Cen A&#x27;s metal-rich <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> — the metal-poor SED is the physical reason, captured by the tie-break rule. The chosen tint sits between Sol-yellow and a hypothetical pure G8V blackbody, biased toward visual distinguishability from the catalog&#x27;s other yellow dwarfs in side-by-side comparison.",
  "p_130":"At 11.91 ly (3.65 pc) viewed from Earth, the apparent magnitude V = 3.5 makes τ Ceti easily visible to the naked eye as a faint naked-eye solitary star in Cetus — culturally the nearest single Sun-like star and a long-standing SETI target since Drake&#x27;s Project Ozma in 1960. From a candidate planet in the τ Ceti habitable zone (planet f at 1.334 AU is the relevant case), the star would fill ≈ 0.34° angular diameter, smaller than the Sun seen from Earth (0.53°) because of f&#x27;s larger orbital radius. The illumination color seen from f&#x27;s surface is the same warm cream tint shifted toward a slightly cleaner pale-yellow by the combination of metal-poor SED and cooler Teff.",
  "p_131":"Sunspots and faculae are rendered only as a very low-amplitude feature — τ Ceti is quiet, but NOT flat: the chromospheric output is encoded with a shallow ~11 yr cycle plus a slow long-term decline (Gomes da Silva 2021), much milder than α Cen A&#x27;s 19-year Sun-like cycle. X-ray output stays near zero (below the historical EXOSAT limit; no Phase 2 X-ray measurement).",
  "p_132":"The defining visual element of the system is the cold debris disk. ALMA Band 6 imaging (MacGregor 2016) resolves a single broad ring extending from ~6 AU (inner edge) to ~55 AU (outer edge), with a peak surface density around 30 AU and a total dust mass of roughly 1.2 M⊕ — about 10–20× the dust inventory of our own Kuiper Belt. NearStars renders this as a faint, broad, dimly amber-grey annulus around τ Ceti, encoded with hex <span class=\"hex-chip\" style=\"background:#b8aa9c\"></span><code>#b8aa9c</code> and in-game opacity 0.15 (physical optical depth is ~10⁻³, but the cfg uses a higher visibility setting so the belt is recognizable against the deep-space background). The belt has no inner gap or shepherding structure resolved at ALMA precision, so the cfg ring is uniform across its 6–55 AU width. The metal-poor parent star likely formed grains slightly less iron-reddened than the Sol KBO analog, justifying a more achromatic grey-brown rather than the warmer ochre of a solar-metallicity Kuiper Belt — this is a tie-break documented in Basis.",
  "p_133":"Planet f / g / h are rendered as faint inner points all interior to the disk&#x27;s inner edge (f at 1.33 AU, h at 0.24 AU, g at 0.13 AU — all well within the 6 AU disk inner edge). The visual contrast of the inner planet system against the broad outer dust belt is the system&#x27;s signature framing in the NearStars renderer, distinct from the planet-only inner systems (TRAPPIST-1, Proxima) and the binary-pair framings (α Cen A/B).",
  "h2_134":"Bibliography",
  "h3_135":"Read (visual-informative, drove decisions above)",
  "li_136":"<b>Greaves J. S. et al. 2004</b> — <i>The debris disk around τ Ceti: a massive analogue to the Kuiper Belt</i>, MNRAS 351, L54 (<code>2004MNRAS.351L..54G</code>). JCMT/SCUBA 850 μm detection of cold dust excess; first identification of τ Ceti&#x27;s debris disk as a KBO analog ~10× more massive than the Sun&#x27;s.",
  "li_137":"<b>MacGregor M. A. et al. 2016</b> — <i>Constraints on planetesimal collision models in debris disks</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>, arXiv:1607.06900). ALMA Band 6 resolved imaging of τ Ceti&#x27;s disk; single broad ring 6–55 AU; dust mass ~1.2 M⊕; collisional cascade requires a parent planetesimal body belt. Anchors all <code>disk_*</code> Decisions rows.",
  "li_138":"<b>Korolik M. et al. 2023</b> — <i>Refining the Stellar Parameters of τ Ceti: a Pole-on Solar Analog</i>, AJ 166, 123 (<code>2023AJ....166..123K</code>, arXiv:2307.10394). CHARA/MIRC-X interferometry: θ_LD 2.019 ± 0.012 mas → R 0.793 ± 0.004 R☉; interferometric Teff 5370 ± 20 K (with Boyajian 2013 F_bol); H-band limb-darkening α ≈ 0.14; nearly pole-on (i = 7 ± 7°); gyrochronological P_rot 46 ± 4 d; adopts the Di Folco 2004 ~10 Gyr age. Phase 2 anchor for radius/Teff/limb-darkening/spin/ rotation.",
  "li_139":"<b>Teixeira T. C. et al. 2009</b> — <i>Solar-like oscillations in τ Ceti</i>, A&amp;A 494, 237 (<code>2009A&amp;A...494..237T</code>, arXiv:0811.3989). HARPS p-mode detection; asteroseismic mass 0.783 ± 0.012 M☉ and luminosity 0.488 ± 0.010 L☉ (M_V + bolometric correction). Phase 2 recommended mass + luminosity.",
  "li_140":"<b>Santos N. C. et al. 2013</b> — <i>SWEET-Cat: A catalogue of parameters for stars with exoplanets</i>, A&amp;A 556, A150 (<code>2013A&amp;A...556A.150S</code>, arXiv:1307.0354). Spectroscopic [Fe/H] = −0.52 ± 0.01. Phase 2 recommended metallicity (very iron-poor).",
  "li_141":"<b>Gomes da Silva J. et al. 2021</b> — <i>Stellar chromospheric activity of the AMBRE-HARPS sample</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, arXiv:2012.10199). log R&#x27;HK = −4.977; a ~11 yr cyclic variability with a long-term declining trend (NOT a flat activity standard). Phase 2 recommended activity.",
  "li_142":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric radii of nearby stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>). Isochrone age ~10 Gyr for τ Ceti, adopted by Korolik 2023; Phase 2 recommended age (see Canonical alternatives).",
  "li_143":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). Four-planet RV discovery (e, f, g, h). The DB Phase 2 stores planets f, g, h but omits e (see Open items). (Mass now anchored on Teixeira 2009, not Feng&#x27;s M–K relation.)",
  "li_144":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved age estimation for solar-type dwarfs using activity-rotation diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Activity-age 5.8 Gyr — the documented-divergence alternative to the Di Folco 2004 isochrone age (Canonical alternatives).",
  "li_145":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Spectral analysis of τ Ceti</i>, MNRAS 422, 542 (<code>2012MNRAS.422..542P</code>, arXiv:1112.1709). Earlier differential analysis ([Fe/H] −0.55, Teff 5344, log R&#x27;HK −4.95, age 7 Gyr) — SUPERSEDED across the board by the Phase 2 layer above; not in the Phase 2 bib.",
  "li_146":"<b>Baliunas S. L. et al. 1996</b> — <i>Chromospheric variations in main-sequence stars II</i>, ApJ 438, 269 (<code>1995ApJ...438..269B</code>). Mt Wilson Ca II H&amp;K survey; τ Ceti ~34 d (the documented-divergence alternative to the Korolik 2023 gyrochronological 46 d).",
  "h3_147":"Read (context / methodology, not directly decision-driving)",
  "li_148":"<b>Di Folco E. et al. 2007</b> — <i>VLTI/VINCI interferometric diameters of nearby exoplanet host stars</i>, A&amp;A 475, 243 (<code>2007A&amp;A...475..243D</code>, arXiv:0710.1731). VINCI K-band angular diameter; the earlier interferometric radius, consistent with and superseded by Korolik 2023 CHARA/MIRC-X.",
  "li_149":"<b>Schmitt J. H. M. M. et al. 1985</b> — <i>EXOSAT observations of nearby stars: τ Ceti upper limit</i>. log L_X ≤ 26.5 non-detection; historical X-ray context only — NOT in the Phase 2 layer, no cfg row.",
  "li_150":"<b>Judge P. G. et al. 2004</b> — <i>FUV spectroscopy of τ Ceti from FUSE: chromospheric basal flux</i>, ApJ 613, 1306. Quiescent chromosphere reference; basal flux floor.",
  "li_151":"<b>Gray R. O. et al. 2006</b> — <i>Contributions to the Nearby Stars (NStars) Project: spectroscopy of stars within 40 pc — south</i> (<code>2006AJ....132..161G</code>). G8.5 V spectral classification.",
  "li_152":"<b>Boro Saikia S. et al. 2018</b> — <i>Solar-type magnetic activity on τ Ceti from ZDI</i>, A&amp;A 620, L11. Zeeman-Doppler-imaging prefers a 46 d rotation — consistent with the Korolik 2023 gyrochronological 46 ± 4 d now carried by the cfg.",
  "h3_153":"Read (instrument / non-cfg-decisive)",
  "li_154":"<b>Lawler S. M. et al. 2014</b> — <i>Debris disks of τ Ceti and ε Eridani: SED modeling</i> (arXiv:1409.0023). SED-fit dust temperature and inferred grain size; superseded by MacGregor 2016 resolved imaging.",
  "h3_155":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_156":"SETI / laser-emission searches (Tarter 1981 Project Ozma followup, Tellis 2017, Margot 2018), conference abstracts (EPSC/AGU/DPS), and astrobiological habitability speculation papers contribute no cfg-decisive content for the host star. The full filtered bib is preserved in <code>docs/phase3/_bib/tau-cet.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_157":"Open items for follow-up",
  "li_158":"<b>Phase 2 disk_measurements + planet measurements re-ingest.</b> The DB Phase 2 currently has no <code>disk_measurements</code> block for τ Ceti — Greaves 2004 and MacGregor 2016 are cited only via this Phase 3 synthesis. A future DB schema migration should add a <code>disk_measurements: []</code> array under each star with appropriate entries from MacGregor 2016 (inner/outer radius, dust mass, resolved imaging flag). Similarly, the planet f / g / h curated entries currently lack physical parameters beyond Msini — radius columns from Feng 2017 should be re-verified against the original paper.",
  "li_159":"<b>τ Ceti e curation revisit.</b> The <a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> §6 documents that NearStars stores planets f, g, h from Feng 2017 but omits e, despite all four having the same <code>pl_controv_flag</code> in the source. Either deliberately dropped (e was the most disputed of the four detections — Feng 2017 §6 cautions about its inferior amplitude-to-noise ratio) or an oversight in the Phase 2 ingest. Should be documented in <code>db/systems/tau_cet.json::meta.notes</code> either way, and the follow-up Phase 3 planet workspace should decide whether to include e or formally drop it with cited justification.",
  "li_160":"<b>Planet f / g / h Phase 3 follow-up workspace.</b> This stellar-only synthesis defers the planet system to a separate Phase 3 workspace. Required inputs: Feng 2017 mass / period / semi-major axis (already in DB), plus literature-direct radius and equilibrium-temperature estimates that the DB does not yet carry. Once Phase 2 planet measurements are re-ingested per the first item, the planet workspace can proceed.",
  "li_161":"<b>τ Ceti age precision.</b> The adopted 7.0 ± 1.5 Gyr spans both Pavlenko 2012&#x27;s super-population kinematic estimate and Mamajek 2008&#x27;s gyrochronological estimate. A future Gaia DR4 or future asteroseismic-evolutionary modeling campaign (Joyce &amp; Chaboyer 2018 methodology applied to τ Ceti&#x27;s HARPS p-modes) could tighten this to ±0.5 Gyr, which would affect the habitability-history modeling for any planet f / g / h follow-up.",
  "li_162":"<b>Disk inner-edge fine structure.</b> MacGregor 2016 ALMA imaging is consistent with a clean inner edge at ~6 AU but does not rule out a faint inner extension or a shepherding feature beyond the noise floor. A future deeper ALMA campaign or JWST/MIRI direct imaging could detect inner-belt dust that the current cfg ignores; a subsequent Phase 3 revision could add a second inner-belt Decisions row if needed.",
  "h2_163":"Related",
  "li_164":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a> — nearest single G2V (metal-rich, +0.24 dex); structural template for this synthesis",

  ko: {
  "p_1":"τ Ceti (HD 10700, HIP 8102, GJ 71) 는 태양에 가장 가까운 단독 G 형 별로 거리 3.652 ± 0.002 pc / 11.91 ly 에 있습니다. Gaia DR3 시차 273.81 ± 0.17 mas (DB Phase 2). 분광형은 G8.5 V (Gray et al. 2006 NStars) 로 솔라 analog 분포의 차갑고 어두운 끝에 자리잡으며, 질량 M = 0.783 ± 0.012 M☉ (Teixeira 2009 asteroseismology), 반지름 R = 0.793 ± 0.004 R☉ (Korolik 2023 CHARA/MIRC-X 간섭계, θ_LD 2.019 mas), 유효 온도 Teff = 5370 ± 20 K (Korolik 2023 간섭계 θ_LD + Boyajian 2013 볼로메트릭 플럭스) 입니다. 가까운 G 왜성들 사이에서 가장 두드러진 특징은 이례적으로 낮은 금속도로, [Fe/H] = −0.52 ± 0.01 (Santos 2013) — 행성을 거느린 별로서는 매우 철-결핍이며 α Cen A 기준치 보다 약 0.8 dex 낮습니다.",
  "p_2":"τ Ceti 의 다른 큰 특징은 오래되고 운동학적으로 조용한 역사와 두드러진 차가운 잔해 원반입니다. 나이는 documented divergence 입니다 (Canonical alternatives 참조). cfg 는 Di Folco 2004 등시선 값 ~10 Gyr (Korolik 2023 이 채택) 를 택하는데, 매우 낮은 활동도와 느린 자전과 일관되며, 이는 Mamajek &amp; Hillenbrand 2008 의 활동도 나이 5.8 Gyr 에 맞서는 선택입니다. 문헌 범위는 4.4–12.4 Gyr 입니다. 직접 측정한 광도 자전 주기는 없습니다. τ Ceti 는 거의 pole-on 이라 (i = 7 ± 7°, v sin i ~0.1 km/s) cfg 는 Korolik 2023 의 gyrochronology 값 46 ± 4 d 를 담습니다 (Baliunas 1996 Ca II HK ~34 d 에 맞섬). 색채권 활동도는 <i>조용한</i> 방향으로 극단적입니다. log R&#x27;HK = −4.977 (Gomes da Silva 2021) 는 τ Ceti 를 가장 불활성한 G 왜성 중 하나로 두지만, Gomes da Silva 는 이것이 평탄한 표준이 아니라고 경고합니다 — ~11 yr 주기 변동에 더해 장기적으로 감소하는 추세를 보입니다. X 선 방출은 역사적 EXOSAT 임계값 아래입니다 (Schmitt 1985, log L_X ≤ 26.5; Phase 2 레이어에는 측정치 없음). 별 주위에는 차갑고 넓은 잔해 원반이 있는데, Greaves 2004 가 SCUBA 서브밀리 초과로 처음 검출하고 MacGregor 2016 가 ALMA Band 6 영상으로 약 6–55 AU 범위의 단일 고리로 분해했습니다. 총 먼지 질량은 태양의 카이퍼 벨트 대비 ~10–20 배로, 우리 외태양계와 가장 닮은 가까운 분해 잔해 원반 analog 입니다.",
  "p_3":"Phase 2 DB 는 Feng 2017 로부터 네 개의 확인 행성 (e, f, g, h) 을 기록하지만, <code>db/systems/tau_cet.json</code> 에는 τ Ceti e 가 빠진 상태로 f, g, h 만 존재합니다. rex-data-comparison 참조 문서는 이 점을 큐레이션 질문으로 표시합니다 (Feng 2017 은 네 행성 모두에 동일한 dispute flag 를 부여). 이 항성 합성은 따라서 host 만 다루며, 행성 f / g / h Phase 3 작업은 별도의 follow-up 워크스페이스로 미루고, τ Cet e 큐레이션 질문은 Open item 으로 남깁니다.",
  "p_4":"<b>NearStars 시나리오 선택. 태양 질량의 약 80%, 광도 46% 인 조용하고 오래되고 금속이 적은 G8V 별로, 태양보다 살짝 더 시원한 노란 색조를 띠며, ALMA 가 분해한 6–55 AU 의 넓은 잔해 벨트와 안쪽의 f / g / h 행성계가 희미한 점광원으로 보이는 모습으로 렌더링합니다.</b> 약 24 개 cfg 픽. 항성 레이어는 frozen Phase 2 출처 (Korolik 2023 간섭계, Teixeira 2009 asteroseismology, Santos 2013, Gomes da Silva 2021) 에 다시 정박했으며, 나이와 자전에는 documented divergence 가 있습니다.",

  "h2_110":"Surface synthesis",
  "p_111":"τ Ceti 의 광구는 더 차갑고 더 늙고 훨씬 더 철-결핍인 태양의 사촌 입니다. 유효 온도 5370 K (Korolik 2023 간섭계) 는 태양 5772 K 보다 ~400 K 낮으며, R = 0.793 R☉ 과 결합한 측정 볼로메트릭 광도는 0.488 L☉ (Teixeira 2009, M_V + 볼로메트릭 보정. Stefan–Boltzmann 으로 R 및 Teff 와 일관) 로 태양 기준의 절반에 약간 못 미칩니다. G8.5 V 분류 (Gray et al. 2006) 는 τ Ceti 를 솔라 analog 대역의 차갑고 어두운 끝에 놓는데, 온도는 ε Eridani 의 K2V 와 비슷하지만 envelope 표면중력은 어린 K 별이 아닌 진짜 G 왜성의 그것입니다.",
  "p_112":"금속도 [Fe/H] = −0.52 (Santos 2013, Phase 2 recommended 값) 가 가장 두드러진 특징입니다. 태양 대비 철이 약 3 배 적기 때문에 청색 연속체의 line blanketing 도 그만큼 약해지고, 통합 가시광 SED 는 같은 Teff 의 태양형 metallicity G8.5 V 보다 살짝 푸르게 보입니다. 차이 자체는 작지만 (~10–20 K 등가 청색 편이) cfg 표면 색조를 α Cen A 의 +0.24 dex 따뜻한 크림에서 좀 더 깨끗한 옅은 노랑 쪽으로 미는 데에는 충분합니다. Bruntt 2010 의 [Fe/H] = −0.18 은 알려진 α-enhanced outlier 라 기각되며, Santos 2013 SWEET-Cat 값이 DB 를 정박합니다.",
  "p_113":"Granulation 은 직접 영상으로 잡히지 않지만 패턴은 태양형이고 시간 스케일은 광구 온도가 낮은 만큼 살짝 느릴 것으로 예측됩니다 (음향 컷오프가 √g/√T_eff 로 스케일하기 때문에 τ Ceti 의 p-mode 진동은 태양의 5분 진동보다 특성 주기가 약간 길어집니다). Teixeira 2009 가 HARPS 로 p-mode 스펙트럼을 검출했으며, Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz 로 위에서 채택한 asteroseismic 반지름과 질량과 일관 됩니다. limb darkening 은 이제 제약됩니다. Korolik 2023 이 CHARA/MIRC-X 가시도에서 H 밴드 선형 limb-darkening 계수 α ≈ 0.14 ± 0.03 을 직접 fit 했고, cfg 가 이를 채택합니다.",
  "p_114":"흑점 면적은 장기 지상 모니터링의 광도 정밀도로는 사실상 검출 불가능합니다. log R&#x27;HK = −4.977 (Gomes da Silva 2021) 로 τ Ceti 는 α Cen A 보다 분수만큼 덜 활동적이고 현대 태양보다 훨씬 아래에 있습니다. 그러나 평탄한 표준은 아닙니다. Gomes da Silva 2021 은 장기적으로 감소하는 활동도 추세 위에 ~11 yr 주기 변동이 겹쳐 있음을 명시적으로 찾아내며, τ Ceti 를 활동도 상수 기준으로 쓰지 말라고 경고합니다 — 오래되고 느리게 자전하며 금속이 적은 G 왜성의 조용하지만-순환하는 영역과 일관됩니다.",
  "h2_115":"Atmosphere synthesis",
  "p_116":"τ Ceti 의 chromosphere–transition-region–corona 구조는 조용한 G 왜성의 canonical 기준입니다. Gomes da Silva 2021 의 log R&#x27;HK = −4.977 은 색채권 Ca II H&amp;K 방출을 basal flux floor — 음향 가열만으로 기대되는 최소값 — 근처에 두지만, 실제 ~11 yr 자기 사이클 변조와 장기적 감소 추세가 있어 (Gomes da Silva 2021) 완전히 평탄하다기보다 저진폭입니다. Hα 는 흡수로 나타나며 변동성은 약할 뿐입니다.",
  "p_117":"X 선 방출은 EXOSAT 검출 임계값 아래입니다. Schmitt 1985 는 상한 log L_X ≤ 26.5 cgs (0.1–2.4 keV) 를 보고합니다. 이후 XMM-Newton 과 Chandra 관측 (Judge 2004 와 후속 컴파일레이션에 정리) 도 깨끗한 검출을 만들지 못했고, 정적 코로나는 α Cen A 의 사이클 최소기보다 어둡습니다. X 선 활동 사이클 증거도 없습니다. FUV 연속체 방출 (Judge 2004) 역시 약하며, 이는 전이 영역이 현대 태양의 것보다 더 얇고 차갑다는 점을 시사합니다.",
  "p_118":"flare 는 검출되지 않습니다. 장기 광도 모니터링 (HIPPARCOS, Mt Wilson) 은 잡음 위로 충격적 밝아짐 이벤트를 보이지 않으며, 표면 자기장은 가용한 고분해 분광에서 Zeeman 폭증의 검출 한계 ~50 G 아래입니다. 통합 XUV 광도는 10⁻⁵ L_bol 보다 훨씬 작아 f / g / h 어느 행성 궤도에서도 Gyr 시간 스케일에 걸쳐 지구형 대기를 의미 있게 침식하지 못합니다.",
  "p_119":"행성계에 대한 함의는 조용한 α Cen A 와 비교해서도 뚜렷이 더 온화한, 예외적으로 우호적인 우주환경입니다. 안쪽 행성의 대기 침식 계산은 K 와 M 왜성에서 규칙으로 자리잡은 stellar XUV 구동 유체역학 손실 없이 thermal Jeans 손실만으로 기본값을 잡을 수 있습니다.",
  "h2_120":"Rotation &amp; spin synthesis",
  "p_121":"τ Ceti 는 직접 측정한 광도 자전 주기가 없습니다 — 거의 pole-on 이라 (경사 i = 7 ± 7°, v sin i ~0.1 km/s, Korolik 2023) 자전 변조가 관측되지 않고 periodogram 피크의 false-alarm 확률이 1 에 가깝습니다. 따라서 cfg 는 Korolik 2023 의 gyrochronology 추정값 46 ± 4 일을 담으며 (method 는 unverified 로 기록), 이는 더 오래된 Baliunas 1996 Ca II H&amp;K 값 ~34 일에 맞서는 documented divergence 입니다 (Canonical alternatives 참조). 둘 다 느린 값으로, 오래된 G 왜성에서 기대되는 바입니다.",
  "p_122":"느린 자전은 오래된 나이와 일관됩니다. cfg 는 Di Folco 2004 등시선 나이 ~10 Gyr (Korolik 2023 이 채택) 를 매우 낮은 활동도와 느린 자전에 가장 잘 맞는 값으로 채택하는데, 이는 Mamajek &amp; Hillenbrand 2008 의 활동도 나이 5.8 Gyr 에 맞서는 documented divergence 로 문헌 범위 4.4–12.4 Gyr 안에 있습니다 (Canonical alternatives). Gomes da Silva 2021 의 등시선 fit 0.028 Gyr 는 metal-poor 별에 대한 fit 실패라 기각됩니다.",
  "p_123":"Asteroseismic p-mode 진동은 Teixeira 2009 가 HARPS 8 야간 RV 모니터링에서 검출했습니다. Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz. 음향 시간 스케일 2π/Δν ≈ 1.6 h 는 더 작은 반지름과 더 높은 평균 음속으로 스케일하면 태양의 5분 진동보다 짧으며, 이로부터 질량 0.783 ± 0.012 M☉ 과 반지름 0.793 ± 0.004 R☉ 가 퍼센트 수준의 정밀도로 제약됩니다. Decisions 테이블이 채택한 값들입니다.",
  "p_124":"차등 회전은 분해되지 않습니다. 회전축은 거의 pole-on 이며 (i = 7 ± 7°, Korolik 2023) NearStars 가 이를 렌더 자전 기하에 반영합니다. 이 항성 자전축은 잔해 원반 축 (i_disk ~35°, Lawler 2014) 과 misaligned 인데, Korolik 2023 이 명시적으로 지적한 점입니다.",
  "h2_125":"Canonical alternatives",
  "p_126":"<b>나이 — 등시선 대 활동도.</b> cfg 는 Di Folco 2004 등시선 나이 ~10 Gyr (Korolik 2023 이 채택) 를 택하는데, τ Ceti 의 매우 낮은 활동도와 느린 자전에 가장 잘 맞는 값입니다. documented 대안은 Mamajek &amp; Hillenbrand 2008 의 활동도 나이 5.8 Gyr 이며, 전체 문헌 범위는 4.4–12.4 Gyr 입니다 (Korolik 2023). Gomes da Silva 2021 의 등시선 fit (0.028 Gyr) 는 metal-poor 별에 대한 fit 실패라 기각됩니다. 신뢰할 만한 방법은 모두 τ Ceti 가 오래되었다는 데 동의하며, 발산은 ~6 Gyr 냐 ~10 Gyr 냐의 문제입니다.",
  "p_127":"<b>자전 — gyrochronology 대 Ca II HK.</b> τ Ceti 는 직접 광도 자전 주기가 없습니다 (pole-on, v sin i ~0.1 km/s). cfg 는 Korolik 2023 의 gyrochronology 값 46 ± 4 일을 담으며 (method=unverified 로 기록, ~10 Gyr 나이와 묶임), documented 대안은 더 오래된 Baliunas 1996 Ca II H&amp;K ~34 일입니다. Boro Saikia 2018 ZDI 는 독립적으로 ~46 일을 선호해 cfg 선택을 뒷받침합니다. 둘은 위 나이 발산과 연동됩니다.",
  "h2_128":"Visual styling",
  "p_129":"NearStars 렌더러에서 τ Ceti 는 α Cen A 보다 살짝 더 차갑고 눈에 띄게 더 옅은 노란 별로 묘사됩니다. 표면 색조 hex <span class=\"hex-chip\" style=\"background:#ffe9c8\"></span><code>#ffe9c8</code> 는 태양형 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 이나 α Cen A 의 metal-rich <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> 보다 따뜻함이 살짝 덜한 크림-노랑을 인코딩합니다. metal-poor SED 가 물리적 이유이며 tie-break 룰이 이를 포착합니다. 선택된 색조는 Sol-노랑과 가상의 순수 G8V 흑체 사이에 위치해, 카탈로그의 다른 노란 왜성들과 나란히 놓고 비교할 때 시각적으로 구분되게 편향했습니다.",
  "p_130":"지구에서 11.91 ly (3.65 pc) 거리에서 보면 겉보기 등급 V = 3.5 로 τ Ceti 는 Cetus 자리에서 희미한 맨눈 단독성으로 쉽게 보입니다. 문화적으로는 가장 가까운 단독 태양형 별이며 Drake 의 1960 년 Project Ozma 이래 오래된 SETI 표적입니다. τ Ceti 거주가능영역의 후보 행성 (관련된 경우는 1.334 AU 의 행성 f) 에서 보면 별이 각지름 ≈ 0.34° 를 채우는데, f 의 더 큰 궤도 반지름 때문에 지구에서 태양 (0.53°) 보다 작습니다. f 표면에서 본 조명 색은 같은 따뜻한 크림 색조가 metal-poor SED 와 더 낮은 Teff 의 조합으로 살짝 더 깨끗한 옅은 노랑 쪽으로 이동한 모습입니다.",
  "p_131":"흑점과 faculae 는 매우 저진폭 피처로만 렌더링됩니다 — τ Ceti 는 조용하지만 평탄하지는 않습니다. 색채권 출력은 얕은 ~11 yr 사이클에 느린 장기 감소가 더해진 형태로 인코딩되며 (Gomes da Silva 2021), α Cen A 의 19 년 태양형 사이클보다 훨씬 온화합니다. X 선 출력은 0 에 가깝게 유지됩니다 (역사적 EXOSAT 한계 아래. Phase 2 X 선 측정치 없음).",
  "p_132":"이 시스템의 결정적인 시각 요소는 차가운 잔해 원반입니다. ALMA Band 6 영상 (MacGregor 2016) 은 약 6 AU (안쪽 가장자리) 부터 ~55 AU (바깥쪽 가장자리) 까지 뻗는 단일 넓은 고리를 분해하는데, 30 AU 근처에 표면 밀도 피크가 있고 총 먼지 질량은 약 1.2 M⊕ — 우리 카이퍼 벨트 먼지 인벤토리의 ~10–20 배입니다. NearStars 는 이를 τ Ceti 주위의 희미하고 넓고 어둑한 호박-회색 환대로 렌더링하며, hex <span class=\"hex-chip\" style=\"background:#b8aa9c\"></span><code>#b8aa9c</code> 와 게임 내 opacity 0.15 로 인코딩합니다 (물리 광학적 깊이는 ~10⁻³ 이지만, cfg 는 깊은 우주 배경 대비 벨트가 알아볼 수 있게 더 높은 가시성 설정을 사용). ALMA 정밀도에서 분해된 안쪽 갭 이나 shepherding 구조는 없어서 cfg 고리는 6–55 AU 폭 전체에 걸쳐 균일합니다. metal-poor 모성이 Sol KBO analog 보다 철-reddening 이 덜한 입자를 형성했을 가능성이 있어, 태양형 metallicity 카이퍼 벨트의 더 따뜻한 황토색보다 좀 더 무채색에 가까운 grey-brown 을 정당화합니다. 이는 Basis 에 문서화된 tie-break 입니다.",
  "p_133":"행성 f / g / h 는 원반 안쪽 가장자리 안쪽의 희미한 점으로 모두 렌더링됩니다 (f 는 1.33 AU, h 는 0.24 AU, g 는 0.13 AU — 모두 6 AU 의 원반 안쪽 가장자리 훨씬 안쪽). 넓은 바깥쪽 먼지 벨트 대비 안쪽 행성계의 시각 대비가 NearStars 렌더러에서 시스템의 시그니처 프레이밍으로, 행성-만-안쪽 시스템 (TRAPPIST-1, Proxima) 과 이중성 페어 프레이밍 (α Cen A/B) 모두와 구분되는 모습입니다.",
  "h2_134":"Bibliography",
  "h3_135":"Read (visual-informative, drove decisions above)",
  "li_136":"<b>Greaves J. S. et al. 2004</b> — <i>The debris disk around τ Ceti: a massive analogue to the Kuiper Belt</i>, MNRAS 351, L54 (<code>2004MNRAS.351L..54G</code>). JCMT/SCUBA 850 μm 차가운 먼지 초과 검출. τ Ceti 잔해 원반을 태양 카이퍼 벨트보다 ~10× 더 무거운 KBO analog 로 처음 식별.",
  "li_137":"<b>MacGregor M. A. et al. 2016</b> — <i>Constraints on planetesimal collision models in debris disks</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>, arXiv:1607.06900). τ Ceti 원반의 ALMA Band 6 분해 영상. 단일 넓은 고리 6–55 AU. 먼지 질량 ~1.2 M⊕. 충돌 cascade 가 부모 planetesimal 벨트를 요구. 모든 <code>disk_*</code> Decisions 행을 정박.",
  "li_138":"<b>Korolik M. et al. 2023</b> — <i>Refining the Stellar Parameters of τ Ceti: a Pole-on Solar Analog</i>, AJ 166, 123 (<code>2023AJ....166..123K</code>, arXiv:2307.10394). CHARA/MIRC-X 간섭계. θ_LD 2.019 ± 0.012 mas → R 0.793 ± 0.004 R☉. 간섭계 Teff 5370 ± 20 K (Boyajian 2013 F_bol 사용). H 밴드 limb-darkening α ≈ 0.14. 거의 pole-on (i = 7 ± 7°). gyrochronology P_rot 46 ± 4 d. Di Folco 2004 의 ~10 Gyr 나이 채택. 반지름/Teff/limb-darkening/spin/자전의 Phase 2 anchor.",
  "li_139":"<b>Teixeira T. C. et al. 2009</b> — <i>Solar-like oscillations in τ Ceti</i>, A&amp;A 494, 237 (<code>2009A&amp;A...494..237T</code>, arXiv:0811.3989). HARPS p-mode 검출. asteroseismic 질량 0.783 ± 0.012 M☉ 과 광도 0.488 ± 0.010 L☉ (M_V + 볼로메트릭 보정). Phase 2 recommended 질량 + 광도.",
  "li_140":"<b>Santos N. C. et al. 2013</b> — <i>SWEET-Cat: A catalogue of parameters for stars with exoplanets</i>, A&amp;A 556, A150 (<code>2013A&amp;A...556A.150S</code>, arXiv:1307.0354). 분광 [Fe/H] = −0.52 ± 0.01. Phase 2 recommended 금속도 (매우 철-결핍).",
  "li_141":"<b>Gomes da Silva J. et al. 2021</b> — <i>Stellar chromospheric activity of the AMBRE-HARPS sample</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, arXiv:2012.10199). log R&#x27;HK = −4.977. ~11 yr 주기 변동에 장기적 감소 추세 (평탄한 활동도 표준이 아님). Phase 2 recommended 활동도.",
  "li_142":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric radii of nearby stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>). τ Ceti 의 등시선 나이 ~10 Gyr, Korolik 2023 이 채택. Phase 2 recommended 나이 (Canonical alternatives 참조).",
  "li_143":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). 네 행성 RV 발견 (e, f, g, h). DB Phase 2 는 행성 f, g, h 만 저장하고 e 는 누락 (Open items 참조). (질량은 이제 Feng 의 M–K 관계가 아니라 Teixeira 2009 에 정박.)",
  "li_144":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved age estimation for solar-type dwarfs using activity-rotation diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 활동도 나이 5.8 Gyr — Di Folco 2004 등시선 나이에 맞서는 documented-divergence 대안 (Canonical alternatives).",
  "li_145":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Spectral analysis of τ Ceti</i>, MNRAS 422, 542 (<code>2012MNRAS.422..542P</code>, arXiv:1112.1709). 더 이른 differential 분석 ([Fe/H] −0.55, Teff 5344, log R&#x27;HK −4.95, 나이 7 Gyr) — 위 Phase 2 레이어로 전반적으로 SUPERSEDED. Phase 2 bib 에는 없음.",
  "li_146":"<b>Baliunas S. L. et al. 1996</b> — <i>Chromospheric variations in main-sequence stars II</i>, ApJ 438, 269 (<code>1995ApJ...438..269B</code>). Mt Wilson Ca II H&amp;K 서베이. τ Ceti ~34 일 (Korolik 2023 gyrochronology 46 일에 맞서는 documented-divergence 대안).",
  "h3_147":"Read (context / methodology, not directly decision-driving)",
  "li_148":"<b>Di Folco E. et al. 2007</b> — <i>VLTI/VINCI interferometric diameters of nearby exoplanet host stars</i>, A&amp;A 475, 243 (<code>2007A&amp;A...475..243D</code>, arXiv:0710.1731). VINCI K 밴드 각지름. 더 이른 간섭계 반지름으로 Korolik 2023 CHARA/MIRC-X 와 일관하며 그에 의해 대체.",
  "li_149":"<b>Schmitt J. H. M. M. et al. 1985</b> — <i>EXOSAT observations of nearby stars: τ Ceti upper limit</i>. log L_X ≤ 26.5 미검출. 역사적 X 선 맥락 only — Phase 2 레이어에는 없고 cfg 행 없음.",
  "li_150":"<b>Judge P. G. et al. 2004</b> — <i>FUV spectroscopy of τ Ceti from FUSE: chromospheric basal flux</i>, ApJ 613, 1306. 정적 색채권 기준. basal flux floor.",
  "li_151":"<b>Gray R. O. et al. 2006</b> — <i>Contributions to the Nearby Stars (NStars) Project: spectroscopy of stars within 40 pc — south</i> (<code>2006AJ....132..161G</code>). G8.5 V 분광 분류.",
  "li_152":"<b>Boro Saikia S. et al. 2018</b> — <i>Solar-type magnetic activity on τ Ceti from ZDI</i>, A&amp;A 620, L11. Zeeman-Doppler-imaging 이 46 일 자전을 선호 — cfg 가 지금 담고 있는 Korolik 2023 gyrochronology 46 ± 4 d 와 일관.",
  "h3_153":"Read (instrument / non-cfg-decisive)",
  "li_154":"<b>Lawler S. M. et al. 2014</b> — <i>Debris disks of τ Ceti and ε Eridani: SED modeling</i> (arXiv:1409.0023). SED-fit 먼지 온도와 추정 입자 크기. MacGregor 2016 분해 영상으로 대체.",
  "h3_155":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_156":"SETI / 레이저 방출 탐색 (Tarter 1981 Project Ozma followup, Tellis 2017, Margot 2018), 학회 초록 (EPSC/AGU/DPS), 천체생물학적 거주 가능성 추정 논문은 호스트 별에 cfg-결정적인 내용을 더하지 않습니다. 전체 필터링된 bib 는 <code>docs/phase3/_bib/tau-cet.yaml</code> 에 <code>status: skipped</code> annotation 으로 보존됩니다.",
  "h2_157":"Open items for follow-up",
  "li_158":"<b>Phase 2 disk_measurements + 행성 측정치 재수집.</b> DB Phase 2 는 현재 τ Ceti 에 대한 <code>disk_measurements</code> 블록이 없습니다. Greaves 2004 와 MacGregor 2016 는 이 Phase 3 합성을 통해서만 인용되는 상태입니다. 향후 DB 스키마 마이그레이션에서 별 단위로 <code>disk_measurements: []</code> 배열을 추가하고 MacGregor 2016 의 적절한 엔트리 (안쪽/바깥쪽 반경, 먼지 질량, 분해 영상 플래그) 를 넣어야 합니다. 마찬가지로 행성 f / g / h curated 엔트리는 현재 Msini 외의 물리 파라미터가 비어 있어, Feng 2017 원논문 대비 반지름 컬럼을 재검증해야 합니다.",
  "li_159":"<b>τ Ceti e 큐레이션 재방문.</b> <a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> §6 은 NearStars 가 Feng 2017 의 행성 f, g, h 를 저장하면서 e 는 누락 한다고 문서화합니다. 원본에서 네 행성 모두 동일한 <code>pl_controv_flag</code> 를 받았는데도 그렇습니다. 의도적으로 제외했거나 (e 는 네 검출 중 가장 논란이 컸음 — Feng 2017 §6 은 amplitude-to- noise 비율이 떨어진다고 경고) Phase 2 ingest 의 누락일 수 있습니다. 어느 쪽이든 <code>db/systems/tau_cet.json::meta.notes</code> 에 문서화해야 하며, follow-up Phase 3 행성 워크스페이스에서 e 를 포함할지 인용 근거로 정식 제외할지 결정해야 합니다.",
  "li_160":"<b>행성 f / g / h Phase 3 follow-up 워크스페이스.</b> 이 항성 전용 합성은 행성계를 별도의 Phase 3 워크스페이스로 미룹니다. 필요한 입력은 Feng 2017 의 질량 / 주기 / 장반경 (DB 에 이미 있음) 과 DB 가 아직 담고 있지 않은 문헌-직접 반지름 및 평형온도 추정입니다. 첫 번째 항목에 따라 행성 Phase 2 측정치가 재수집되면 행성 워크스페이스가 진행될 수 있습니다.",
  "li_161":"<b>τ Ceti 나이 정밀도.</b> 채택한 7.0 ± 1.5 Gyr 는 Pavlenko 2012 의 super-population 운동학 추정과 Mamajek 2008 의 gyrochronology 추정을 모두 포괄합니다. 미래의 Gaia DR4 또는 τ Ceti 의 HARPS p-mode 에 Joyce &amp; Chaboyer 2018 방법론을 적용한 asteroseismic- evolutionary 모델링 캠페인이 이를 ±0.5 Gyr 수준으로 좁힐 수 있으며, 이는 행성 f / g / h follow-up 의 거주가능성-역사 모델링 에 영향을 미칩니다.",
  "li_162":"<b>원반 안쪽 가장자리 미세 구조.</b> MacGregor 2016 ALMA 영상은 ~6 AU 의 깨끗한 안쪽 가장자리와 일관되지만, 잡음 임계값 너머의 희미한 안쪽 확장이나 shepherding 피처를 배제하지는 않습니다. 미래의 더 깊은 ALMA 캠페인이나 JWST/MIRI 직접 영상이 현재 cfg 가 무시하는 안쪽 벨트 먼지를 검출할 수 있고, 후속 Phase 3 개정에서 필요시 두 번째 안쪽 벨트 Decisions 행을 추가할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
