  "h2_102":"Surface synthesis",
  "p_103":"τ Ceti&#x27;s photosphere is a colder, older, and substantially more iron-poor cousin of the Sun. The effective temperature of 5344 K sits 433 K below Sol&#x27;s 5777 K; combined with R = 0.793 R☉, the Stefan–Boltzmann bolometric luminosity is 0.457 L☉, a little under half the solar reference. The G8V classification (Gray 2006) places τ Ceti at the cool faint end of the solar analog band, comparable in temperature to ε Eridani&#x27;s K2V but with the lower-gravity envelope of a true G dwarf rather than a young K star.",
  "p_104":"The metallicity [Fe/H] = −0.55 (Pavlenko 2012) is the headline distinguishing feature. At nearly four times less iron than the Sun, line blanketing in the blue continuum is correspondingly weaker, and the integrated visible SED is marginally bluer than a solar-metallicity G8V would be at the same Teff — the difference is small (~10–20 K equivalent blue-shift) but enough to push the cfg surface tint away from the warm-cream of α Cen A&#x27;s +0.24 dex metallicity toward a cleaner pale-yellow. Santos 2013&#x27;s [Fe/H] = −0.49 ± 0.05 measurement is statistically consistent and reinforces the picture, with the two analyses differing primarily in the model atmosphere grid used; Pavlenko 2012&#x27;s differential analysis against the Sun is preferred as the cleaner observable.",
  "p_105":"Granulation is not directly imaged but is predicted to be Sun-like in pattern and somewhat slower in timescale because of the lower photospheric temperature (acoustic cut-off scales as √g/√T_eff, giving τ Ceti&#x27;s p-mode oscillations a slightly longer characteristic period than the Sun&#x27;s 5-minute oscillation). Teixeira 2009 detected the p-mode spectrum with HARPS, finding Δν = 169.0 ± 0.5 μHz and ν_max ≈ 4490 μHz, consistent with the asteroseismic radius and mass adopted above. Limb darkening is not directly measured in H band (no VLTI interferometric campaign of τ Ceti at the precision of Kervella 2017 on α Cen A); the cfg leaves <code>limb_darkening_alpha_h</code> unfilled and adopts the Sun-like default in the downstream renderer.",
  "p_106":"Sunspot coverage is essentially undetectable at the photometric precision of long-term ground-based monitoring. With log R&#x27;HK = −4.95, τ Ceti is fractionally less active than α Cen A and well below the modern Sun — chromospheric Ca II H&amp;K emission shows no detectable cycle in the Baliunas 1996 record, consistent with a saturated-quiet regime expected for old, slowly rotating, low- metallicity G dwarfs.",
  "h2_107":"Atmosphere synthesis",
  "p_108":"The chromosphere–transition-region–corona structure of τ Ceti is the canonical quiet G-dwarf reference. Pavlenko 2012&#x27;s log R&#x27;HK = −4.95 places the chromospheric Ca II H&amp;K emission near the basal flux floor — the minimum expected from acoustic heating alone, with no detectable magnetic-cycle modulation. Hα is in absorption with no measurable variability.",
  "p_109":"X-ray emission is below the EXOSAT detection threshold: Schmitt 1985 reports an upper limit log L_X ≤ 26.5 cgs (0.1–2.4 keV). Subsequent XMM-Newton and Chandra pointings (catalogued in Judge 2004 and subsequent compilations) have not produced a clean detection, and the quiescent corona is fainter than that of α Cen A during cycle minimum. There is no evidence of any X-ray activity cycle. FUV continuum emission (Judge 2004) is correspondingly weak, implying a transition region thinner and cooler than the modern Sun&#x27;s.",
  "p_110":"Flares are not detected. Long-term photometric monitoring (HIPPARCOS, Mt Wilson) shows no impulsive brightening events above the noise floor, and the surface magnetic field is below the Zeeman-broadening detection limit of ~50 G in the available high-resolution spectroscopy. The integrated XUV luminosity is well below 10⁻⁵ L_bol and would not materially erode an Earth-like atmosphere over Gyr timescales at any of the f / g / h planet orbits.",
  "p_111":"The implication for the planet roster is an exceptionally benign space-weather environment, distinctly milder than even the quiet α Cen A. Any inner-planet atmospheric escape calculation defaults to thermal Jeans loss without the augmented hydrodynamic loss driven by stellar XUV that is the rule for K and M dwarfs.",
  "h2_112":"Rotation &amp; spin synthesis",
  "p_113":"τ Ceti rotates with a period of 34 days (Baliunas 1996 Mt Wilson Ca II H&amp;K monitoring, confirmed by Pavlenko 2012 from combined HK and photometric data). Some recent zeeman-doppler imaging (Boro Saikia 2018) prefers a 46 d period, but the HK-traced 34 d value remains the canonical reference and matches the Skumanich braking expectation for a 7 Gyr old G8V — P_rot ∝ √t, anchored to the solar 25-day rotation at 4.6 Gyr, predicts ~31 days at 7 Gyr, within the measurement scatter of 34 d.",
  "p_114":"The slow rotation is consistent with the old age inferred from Pavlenko 2012&#x27;s Eggen 1971 super-population kinematic membership and Mamajek &amp; Hillenbrand 2008&#x27;s gyrochronological calibration applied to the 34-d period (which yields 6.5 Gyr from the Skumanich law with their B–V color). The combined age estimate of 7.0 ± 1.5 Gyr is the cfg adoption, with the uncertainty range spanning both gyrochronology and kinematic estimates.",
  "p_115":"Asteroseismic p-mode oscillations were detected by Teixeira 2009 in 8 nights of HARPS RV monitoring: Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz. The acoustic timescale 2π/Δν ≈ 1.6 h is shorter than the solar 5-minute oscillation when scaled correctly by the smaller radius and higher mean sound speed; this constrains the mass to 0.783 ± 0.012 M☉ and the radius to 0.793 ± 0.004 R☉ with percent-level precision, the values adopted in the Decisions table.",
  "p_116":"Differential rotation is not resolved. The rotation axis inclination is poorly constrained; for visual rendering NearStars adopts a default ~30° tilt to the line of sight consistent with a randomly oriented spin axis.",
  "h2_117":"Visual styling",
  "p_118":"In the NearStars renderer, τ Ceti is portrayed as a slightly cooler and visibly more pale-yellow star than α Cen A. The surface tint hex <span class=\"hex-chip\" style=\"background:#ffe9c8\"></span><code>#ffe9c8</code> encodes a cream-yellow with marginally less warmth than the canonical solar <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> or α Cen A&#x27;s metal-rich <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> — the metal-poor SED is the physical reason, captured by the tie-break rule. The chosen tint sits between Sol-yellow and a hypothetical pure G8V blackbody, biased toward visual distinguishability from the catalog&#x27;s other yellow dwarfs in side-by-side comparison.",
  "p_119":"At 11.91 ly (3.65 pc) viewed from Earth, the apparent magnitude V = 3.5 makes τ Ceti easily visible to the naked eye as a faint naked-eye solitary star in Cetus — culturally the nearest single Sun-like star and a long-standing SETI target since Drake&#x27;s Project Ozma in 1960. From a candidate planet in the τ Ceti habitable zone (planet f at 1.334 AU is the relevant case), the star would fill ≈ 0.34° angular diameter, smaller than the Sun seen from Earth (0.53°) because of f&#x27;s larger orbital radius. The illumination color seen from f&#x27;s surface is the same warm cream tint shifted toward a slightly cleaner pale-yellow by the combination of metal-poor SED and cooler Teff.",
  "p_120":"Sunspots and faculae are not rendered as animated features — τ Ceti is too quiet to show resolved activity at the precision of the NearStars renderer. The X-ray and chromospheric output are encoded as a flat baseline with no cycle modulation, contrasting sharply with α Cen A&#x27;s 19-year Sun-like cycle.",
  "p_121":"The defining visual element of the system is the cold debris disk. ALMA Band 6 imaging (MacGregor 2016) resolves a single broad ring extending from ~6 AU (inner edge) to ~55 AU (outer edge), with a peak surface density around 30 AU and a total dust mass of roughly 1.2 M⊕ — about 10–20× the dust inventory of our own Kuiper Belt. NearStars renders this as a faint, broad, dimly amber-grey annulus around τ Ceti, encoded with hex <span class=\"hex-chip\" style=\"background:#b8aa9c\"></span><code>#b8aa9c</code> and in-game opacity 0.15 (physical optical depth is ~10⁻³, but the cfg uses a higher visibility setting so the belt is recognizable against the deep-space background). The belt has no inner gap or shepherding structure resolved at ALMA precision, so the cfg ring is uniform across its 6–55 AU width. The metal-poor parent star likely formed grains slightly less iron-reddened than the Sol KBO analog, justifying a more achromatic grey-brown rather than the warmer ochre of a solar-metallicity Kuiper Belt — this is a tie-break documented in Basis.",
  "p_122":"Planet f / g / h are rendered as faint inner points all interior to the disk&#x27;s inner edge (f at 1.33 AU, h at 0.24 AU, g at 0.13 AU — all well within the 6 AU disk inner edge). The visual contrast of the inner planet system against the broad outer dust belt is the system&#x27;s signature framing in the NearStars renderer, distinct from the planet-only inner systems (TRAPPIST-1, Proxima) and the binary-pair framings (α Cen A/B).",
  "h2_123":"Bibliography",
  "h3_124":"Read (visual-informative, drove decisions above)",
  "li_125":"<b>Greaves J. S. et al. 2004</b> — <i>The debris disk around τ Ceti: a massive analogue to the Kuiper Belt</i>, MNRAS 351, L54 (<code>2004MNRAS.351L..54G</code>). JCMT/SCUBA 850 μm detection of cold dust excess; first identification of τ Ceti&#x27;s debris disk as a KBO analog ~10× more massive than the Sun&#x27;s.",
  "li_126":"<b>MacGregor M. A. et al. 2016</b> — <i>Constraints on planetesimal collision models in debris disks</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>, arXiv:1607.06900). ALMA Band 6 resolved imaging of τ Ceti&#x27;s disk; single broad ring 6–55 AU; dust mass ~1.2 M⊕; collisional cascade requires a parent planetesimal body belt. Anchors all <code>disk_*</code> Decisions rows.",
  "li_127":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Spectral analysis of τ Ceti: abundances and age</i>, MNRAS 422, 542 (<code>2012MNRAS.422..542P</code>, arXiv:1112.1709). Differential LTE analysis vs Sun; [Fe/H] = −0.55 ± 0.05; log R&#x27;HK = −4.95; Eggen 1971 super-population age 7 ± 1 Gyr. Anchors metallicity, activity, age Decisions rows.",
  "li_128":"<b>Santos N. C. et al. 2013</b> — <i>SWEET-Cat: A catalogue of parameters for stars with exoplanets</i>, A&amp;A 556, A150 (<code>2013A&amp;A...556A.150S</code>, arXiv:1307.0354). Independent spectroscopic [Fe/H] = −0.49 ± 0.05 and Teff = 5333 ± 20 K, confirming Pavlenko 2012 within 1σ.",
  "li_129":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). Four-planet RV discovery (e, f, g, h); host mass M = 0.783 ± 0.012 M☉ adopted for the Decisions table. The DB Phase 2 stores planets f, g, h but omits e (see Open items).",
  "li_130":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved age estimation for solar-type dwarfs using activity-rotation diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Gyrochronological calibration applied to τ Ceti&#x27;s 34-d rotation yields ~6.5 Gyr, agreeing with Pavlenko 2012&#x27;s kinematic age.",
  "li_131":"<b>Baliunas S. L. et al. 1996</b> — <i>Chromospheric variations in main-sequence stars II</i>, ApJ 438, 269 (<code>1995ApJ...438..269B</code>). Mt Wilson Ca II H&amp;K survey; τ Ceti rotation period 34 d; exceptionally flat HK record without resolved cycle.",
  "h3_132":"Read (context / methodology, not directly decision-driving)",
  "li_133":"<b>Teixeira T. C. et al. 2009</b> — <i>Solar-like oscillations in τ Ceti</i>, A&amp;A 494, 237 (<code>2009A&amp;A...494..237T</code>, arXiv:0811.3989). HARPS p-mode detection; Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz; asteroseismic mass and radius cross-check.",
  "li_134":"<b>Di Folco E. et al. 2007</b> — <i>VLTI/VINCI interferometric diameters of nearby exoplanet host stars</i>, A&amp;A 475, 243 (<code>2007A&amp;A...475..243D</code>, arXiv:0710.1731). VINCI K-band angular diameter; consistent with Teixeira 2009 asteroseismic radius.",
  "li_135":"<b>Schmitt J. H. M. M. et al. 1985</b> — <i>EXOSAT observations of nearby stars: τ Ceti upper limit</i>. log L_X ≤ 26.5 non-detection; quiescent corona reference.",
  "li_136":"<b>Judge P. G. et al. 2004</b> — <i>FUV spectroscopy of τ Ceti from FUSE: chromospheric basal flux</i>, ApJ 613, 1306. Quiescent chromosphere reference; basal flux floor.",
  "li_137":"<b>Gray R. O. et al. 2006</b> — <i>Contributions to the Nearby Stars (NStars) Project: spectroscopy of stars within 40 pc — south</i>. G8V spectral classification.",
  "li_138":"<b>Boro Saikia S. et al. 2018</b> — <i>Solar-type magnetic activity on τ Ceti from ZDI</i>, A&amp;A 620, L11. Zeeman-Doppler-imaging prefers 46 d rotation; cfg retains 34 d Baliunas 1996 canonical value (see Decisions Basis).",
  "h3_139":"Read (instrument / non-cfg-decisive)",
  "li_140":"<b>Lawler S. M. et al. 2014</b> — <i>Debris disks of τ Ceti and ε Eridani: SED modeling</i> (arXiv:1409.0023). SED-fit dust temperature and inferred grain size; superseded by MacGregor 2016 resolved imaging.",
  "h3_141":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_142":"SETI / laser-emission searches (Tarter 1981 Project Ozma followup, Tellis 2017, Margot 2018), conference abstracts (EPSC/AGU/DPS), and astrobiological habitability speculation papers contribute no cfg-decisive content for the host star. The full filtered bib is preserved in <code>docs/phase3/_bib/tau-cet.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_143":"Open items for follow-up",
  "li_144":"<b>Phase 2 disk_measurements + planet measurements re-ingest.</b> The DB Phase 2 currently has no <code>disk_measurements</code> block for τ Ceti — Greaves 2004 and MacGregor 2016 are cited only via this Phase 3 synthesis. A future DB schema migration should add a <code>disk_measurements: []</code> array under each star with appropriate entries from MacGregor 2016 (inner/outer radius, dust mass, resolved imaging flag). Similarly, the planet f / g / h curated entries currently lack physical parameters beyond Msini — radius columns from Feng 2017 should be re-verified against the original paper.",
  "li_145":"<b>τ Ceti e curation revisit.</b> The <a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> §6 documents that NearStars stores planets f, g, h from Feng 2017 but omits e, despite all four having the same <code>pl_controv_flag</code> in the source. Either deliberately dropped (e was the most disputed of the four detections — Feng 2017 §6 cautions about its inferior amplitude-to-noise ratio) or an oversight in the Phase 2 ingest. Should be documented in <code>db/systems/tau_cet.json::meta.notes</code> either way, and the follow-up Phase 3 planet workspace should decide whether to include e or formally drop it with cited justification.",
  "li_146":"<b>Planet f / g / h Phase 3 follow-up workspace.</b> This stellar-only synthesis defers the planet system to a separate Phase 3 workspace. Required inputs: Feng 2017 mass / period / semi-major axis (already in DB), plus literature-direct radius and equilibrium-temperature estimates that the DB does not yet carry. Once Phase 2 planet measurements are re-ingested per the first item, the planet workspace can proceed.",
  "li_147":"<b>τ Ceti age precision.</b> The adopted 7.0 ± 1.5 Gyr spans both Pavlenko 2012&#x27;s super-population kinematic estimate and Mamajek 2008&#x27;s gyrochronological estimate. A future Gaia DR4 or future asteroseismic-evolutionary modeling campaign (Joyce &amp; Chaboyer 2018 methodology applied to τ Ceti&#x27;s HARPS p-modes) could tighten this to ±0.5 Gyr, which would affect the habitability-history modeling for any planet f / g / h follow-up.",
  "li_148":"<b>Disk inner-edge fine structure.</b> MacGregor 2016 ALMA imaging is consistent with a clean inner edge at ~6 AU but does not rule out a faint inner extension or a shepherding feature beyond the noise floor. A future deeper ALMA campaign or JWST/MIRI direct imaging could detect inner-belt dust that the current cfg ignores; a subsequent Phase 3 revision could add a second inner-belt Decisions row if needed.",
  "h2_149":"Related",

  ko: {
  "p_1":"τ Ceti (HD 10700, HIP 8102, GJ 71) 는 태양에 가장 가까운 단독 G 형 별로 거리 3.652 ± 0.002 pc / 11.91 ly 에 있습니다. Gaia DR3 시차 273.81 ± 0.17 mas (DB Phase 2). 분광형은 G8V (Gray 2006) 로 솔라 analog 분포의 차갑고 어두운 끝에 자리잡으며, 질량 M = 0.783 ± 0.012 M☉ (Feng 2017), 반지름 R = 0.793 ± 0.004 R☉ (Teixeira 2009 asteroseismology + Di Folco 2007 간섭계), 유효 온도 Teff = 5344 ± 50 K (Pavlenko 2012) 입니다. 가까운 G 왜성들 사이에서 가장 두드러진 특징은 이례적으로 낮은 금속도로, [Fe/H] = −0.55 ± 0.05 (Pavlenko 2012; Santos 2013 의 −0.49 ± 0.05 와 잘 일치) — 행성을 거느린 별로서는 매우 철-결핍이며 α Cen A 기준치 보다 약 0.8 dex 낮습니다.",
  "p_2":"τ Ceti 의 다른 큰 특징은 오래되고 운동학적으로 조용한 역사와 두드러진 차가운 잔해 원반입니다. Pavlenko 2012 는 τ Ceti 를 Eggen 1971 의 오래된 원반 종족 별 super-population 에 위치시킵니다. 이를 34 일 회전 주기 (Baliunas 1996 Mt Wilson Ca II H&amp;K 모니터링) 및 Mamajek &amp; Hillenbrand 2008 gyrochronology 보정과 결합하면 나이는 7 ± 1.5 Gyr 입니다. 색채권 활동도는 <i>조용한</i> 방향으로 극단적입니다. log R&#x27;HK = −4.95 (Pavlenko 2012) 는 τ Ceti 를 HK 서베이에서 가장 불활성한 G 왜성 중 하나로 두며, X 선 방출은 EXOSAT 검출 임계값 아래입니다 (Schmitt 1985, log L_X ≤ 26.5). 별 주위에는 차갑고 넓은 잔해 원반이 있는데, Greaves 2004 가 SCUBA 서브밀리 초과로 처음 검출하고 MacGregor 2016 가 ALMA Band 6 영상으로 약 6–55 AU 범위의 단일 고리로 분해했습니다. 총 먼지 질량은 태양의 카이퍼 벨트 대비 ~10–20 배로, 우리 외태양계와 가장 닮은 가까운 분해 잔해 원반 analog 입니다.",
  "p_3":"Phase 2 DB 는 Feng 2017 로부터 네 개의 확인 행성 (e, f, g, h) 을 기록하지만, <code>db/systems/tau_cet.json</code> 에는 τ Ceti e 가 빠진 상태로 f, g, h 만 존재합니다. rex-data-comparison 참조 문서는 이 점을 큐레이션 질문으로 표시합니다 (Feng 2017 은 네 행성 모두에 동일한 dispute flag 를 부여). 이 항성 합성은 따라서 host 만 다루며, 행성 f / g / h Phase 3 작업은 별도의 follow-up 워크스페이스로 미루고, τ Cet e 큐레이션 질문은 Open item 으로 남깁니다.",
  "p_4":"<b>NearStars 시나리오 선택. 태양 질량의 약 80%, 광도 46% 인 조용하고 오래되고 금속이 적은 G8V 별로, 태양보다 살짝 더 시원한 노란 색조를 띠며, ALMA 가 분해한 6–55 AU 의 넓은 잔해 벨트와 안쪽의 f / g / h 행성계가 희미한 점광원으로 보이는 모습으로 렌더링합니다.</b> 22 개 cfg 픽 중 18 개는 canonical-aligned, 4 개는 tie-break (시각 hex, 원반 hex, 원반 opacity, 원반 morphology 의 조성 추론) 입니다.",

  "td_77":"Tie-break. 조성은 직접 측정되지 않음. 모성이 metal-poor 라 원시 입자에 철이 덜 들어가 reddening 도 적었을 것이라는 가정으로 Sol KBO 기준보다 덜 붉은 색조를 채택. interesting-first 룰 적용",

  "td_80":"low",
  "td_81":"Tie-break. MacGregor 2016 의 먼지 질량 + 고리 기하에서 나오는 물리 광학적 깊이는 ~10⁻³ 이지만, 게임 내에서 우주 배경 대비 가시성을 살리기 위해 cfg 는 0.15 를 사용. 렌더 가시성 trade-off 로 문서화",

  "td_98":"<code>disk_planetesimal_belt_inferred</code>",

  "td_100":"high",
  "td_101":"MacGregor 2016 §5. 충돌 cascade 가 먼지를 보충하려면 부모 planetesimal 벨트가 필요",
  "h2_102":"Surface synthesis",
  "p_103":"τ Ceti 의 광구는 더 차갑고 더 늙고 훨씬 더 철-결핍인 태양의 사촌 입니다. 유효 온도 5344 K 는 태양 5777 K 보다 433 K 낮으며, R = 0.793 R☉ 과 결합한 Stefan–Boltzmann 볼로메트릭 광도는 0.457 L☉ 로 태양 기준의 절반에 약간 못 미칩니다. G8V 분류 (Gray 2006) 는 τ Ceti 를 솔라 analog 대역의 차갑고 어두운 끝에 놓는데, 온도는 ε Eridani 의 K2V 와 비슷하지만 envelope 표면중력은 어린 K 별이 아닌 진짜 G 왜성의 그것입니다.",
  "p_104":"금속도 [Fe/H] = −0.55 (Pavlenko 2012) 가 가장 두드러진 특징입니다. 태양 대비 철이 약 4 배 적기 때문에 청색 연속체의 line blanketing 도 그만큼 약해지고, 통합 가시광 SED 는 같은 Teff 의 태양형 metallicity G8V 보다 살짝 푸르게 보입니다. 차이 자체는 작지만 (~10–20 K 등가 청색 편이) cfg 표면 색조를 α Cen A 의 +0.24 dex 따뜻한 크림에서 좀 더 깨끗한 옅은 노랑 쪽으로 미는 데에는 충분합니다. Santos 2013 의 [Fe/H] = −0.49 ± 0.05 측정은 통계적으로 일관되어 그림을 보강하는데, 두 분석의 주요 차이는 사용한 모형 대기 격자입니다. Pavlenko 2012 의 태양 대비 differential 분석이 더 깨끗한 관측치라 선호됩니다.",
  "p_105":"Granulation 은 직접 영상으로 잡히지 않지만 패턴은 태양형이고 시간 스케일은 광구 온도가 낮은 만큼 살짝 느릴 것으로 예측됩니다 (음향 컷오프가 √g/√T_eff 로 스케일하기 때문에 τ Ceti 의 p-mode 진동은 태양의 5분 진동보다 특성 주기가 약간 길어집니다). Teixeira 2009 가 HARPS 로 p-mode 스펙트럼을 검출했으며, Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz 로 위에서 채택한 asteroseismic 반지름과 질량과 일관 됩니다. H 밴드 limb darkening 은 직접 측정되지 않았습니다 (Kervella 2017 가 α Cen A 에 한 수준의 VLTI 간섭계 캠페인이 τ Ceti 에는 없습니다). cfg 는 <code>limb_darkening_alpha_h</code> 를 비워 두고 하위 렌더러에서 태양형 기본값을 사용합니다.",
  "p_106":"흑점 면적은 장기 지상 모니터링의 광도 정밀도로는 사실상 검출 불가능합니다. log R&#x27;HK = −4.95 로 τ Ceti 는 α Cen A 보다 분수만큼 덜 활동적이고 현대 태양보다 훨씬 아래에 있습니다. Baliunas 1996 기록에서 색채권 Ca II H&amp;K 방출은 검출 가능한 사이클 없이 평탄하며, 이는 오래되고 느리게 자전하며 금속이 적은 G 왜성에서 기대되는 포화-조용 영역과 일관됩니다.",
  "h2_107":"Atmosphere synthesis",
  "p_108":"τ Ceti 의 chromosphere–transition-region–corona 구조는 조용한 G 왜성의 canonical 기준입니다. Pavlenko 2012 의 log R&#x27;HK = −4.95 는 색채권 Ca II H&amp;K 방출을 basal flux floor — 음향 가열만으로 기대되는 최소값 — 근처에 두며, 자기 사이클 변조도 검출되지 않습니다. Hα 는 흡수로 나타나며 측정 가능한 변동성은 없습니다.",
  "p_109":"X 선 방출은 EXOSAT 검출 임계값 아래입니다. Schmitt 1985 는 상한 log L_X ≤ 26.5 cgs (0.1–2.4 keV) 를 보고합니다. 이후 XMM-Newton 과 Chandra 관측 (Judge 2004 와 후속 컴파일레이션에 정리) 도 깨끗한 검출을 만들지 못했고, 정적 코로나는 α Cen A 의 사이클 최소기보다 어둡습니다. X 선 활동 사이클 증거도 없습니다. FUV 연속체 방출 (Judge 2004) 역시 약하며, 이는 전이 영역이 현대 태양의 것보다 더 얇고 차갑다는 점을 시사합니다.",
  "p_110":"flare 는 검출되지 않습니다. 장기 광도 모니터링 (HIPPARCOS, Mt Wilson) 은 잡음 위로 충격적 밝아짐 이벤트를 보이지 않으며, 표면 자기장은 가용한 고분해 분광에서 Zeeman 폭증의 검출 한계 ~50 G 아래입니다. 통합 XUV 광도는 10⁻⁵ L_bol 보다 훨씬 작아 f / g / h 어느 행성 궤도에서도 Gyr 시간 스케일에 걸쳐 지구형 대기를 의미 있게 침식하지 못합니다.",
  "p_111":"행성계에 대한 함의는 조용한 α Cen A 와 비교해서도 뚜렷이 더 온화한, 예외적으로 우호적인 우주환경입니다. 안쪽 행성의 대기 침식 계산은 K 와 M 왜성에서 규칙으로 자리잡은 stellar XUV 구동 유체역학 손실 없이 thermal Jeans 손실만으로 기본값을 잡을 수 있습니다.",
  "h2_112":"Rotation &amp; spin synthesis",
  "p_113":"τ Ceti 의 회전 주기는 34 일입니다 (Baliunas 1996 Mt Wilson Ca II H&amp;K 모니터링, Pavlenko 2012 가 HK 와 광도 데이터 결합으로 확인). 최근 zeeman-doppler imaging (Boro Saikia 2018) 은 46 일 주기를 선호하지만, HK 추적의 34 일 값이 canonical 기준이며 7 Gyr G8V 의 Skumanich braking 기대치 — 태양의 25 일 자전을 4.6 Gyr 에 고정해 P_rot ∝ √t 로 외삽하면 7 Gyr 에 ~31 일 — 와 측정 산포 안에서 일치합니다.",
  "p_114":"느린 자전은 Pavlenko 2012 의 Eggen 1971 super-population 운동학 멤버십에서 나오는 오래된 나이와 Mamajek &amp; Hillenbrand 2008 의 gyrochronology 보정 (34 일 주기와 B–V 색지수로 Skumanich 법칙 적용 시 6.5 Gyr) 모두와 일관됩니다. 결합 나이 추정치 7.0 ± 1.5 Gyr 가 cfg 채택값으로, 불확실성 범위는 gyrochronology 와 운동학 추정을 모두 포괄합니다.",
  "p_115":"Asteroseismic p-mode 진동은 Teixeira 2009 가 HARPS 8 야간 RV 모니터링에서 검출했습니다. Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz. 음향 시간 스케일 2π/Δν ≈ 1.6 h 는 더 작은 반지름과 더 높은 평균 음속으로 스케일하면 태양의 5분 진동보다 짧으며, 이로부터 질량 0.783 ± 0.012 M☉ 과 반지름 0.793 ± 0.004 R☉ 가 퍼센트 수준의 정밀도로 제약됩니다. Decisions 테이블이 채택한 값들입니다.",
  "p_116":"차등 회전은 분해되지 않습니다. 회전축 경사는 잘 제약되지 않아, 시각 렌더링을 위해 NearStars 는 무작위 정렬 자전축에 부합하는 시선 기준 ~30° 기울임을 기본값으로 채택했습니다.",
  "h2_117":"Visual styling",
  "p_118":"NearStars 렌더러에서 τ Ceti 는 α Cen A 보다 살짝 더 차갑고 눈에 띄게 더 옅은 노란 별로 묘사됩니다. 표면 색조 hex <span class=\"hex-chip\" style=\"background:#ffe9c8\"></span><code>#ffe9c8</code> 는 태양형 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 이나 α Cen A 의 metal-rich <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> 보다 따뜻함이 살짝 덜한 크림-노랑을 인코딩합니다. metal-poor SED 가 물리적 이유이며 tie-break 룰이 이를 포착합니다. 선택된 색조는 Sol-노랑과 가상의 순수 G8V 흑체 사이에 위치해, 카탈로그의 다른 노란 왜성들과 나란히 놓고 비교할 때 시각적으로 구분되게 편향했습니다.",
  "p_119":"지구에서 11.91 ly (3.65 pc) 거리에서 보면 겉보기 등급 V = 3.5 로 τ Ceti 는 Cetus 자리에서 희미한 맨눈 단독성으로 쉽게 보입니다. 문화적으로는 가장 가까운 단독 태양형 별이며 Drake 의 1960 년 Project Ozma 이래 오래된 SETI 표적입니다. τ Ceti 거주가능영역의 후보 행성 (관련된 경우는 1.334 AU 의 행성 f) 에서 보면 별이 각지름 ≈ 0.34° 를 채우는데, f 의 더 큰 궤도 반지름 때문에 지구에서 태양 (0.53°) 보다 작습니다. f 표면에서 본 조명 색은 같은 따뜻한 크림 색조가 metal-poor SED 와 더 낮은 Teff 의 조합으로 살짝 더 깨끗한 옅은 노랑 쪽으로 이동한 모습입니다.",
  "p_120":"흑점과 faculae 는 애니메이션 피처로 렌더링되지 않습니다. τ Ceti 는 NearStars 렌더러의 정밀도로는 분해 가능한 활동을 보이기에는 너무 조용합니다. X 선과 색채권 출력은 사이클 변조 없는 평탄한 기준선 으로 인코딩되어, α Cen A 의 19 년 태양형 사이클과 뚜렷이 대조됩니다.",
  "p_121":"이 시스템의 결정적인 시각 요소는 차가운 잔해 원반입니다. ALMA Band 6 영상 (MacGregor 2016) 은 약 6 AU (안쪽 가장자리) 부터 ~55 AU (바깥쪽 가장자리) 까지 뻗는 단일 넓은 고리를 분해하는데, 30 AU 근처에 표면 밀도 피크가 있고 총 먼지 질량은 약 1.2 M⊕ — 우리 카이퍼 벨트 먼지 인벤토리의 ~10–20 배입니다. NearStars 는 이를 τ Ceti 주위의 희미하고 넓고 어둑한 호박-회색 환대로 렌더링하며, hex <span class=\"hex-chip\" style=\"background:#b8aa9c\"></span><code>#b8aa9c</code> 와 게임 내 opacity 0.15 로 인코딩합니다 (물리 광학적 깊이는 ~10⁻³ 이지만, cfg 는 깊은 우주 배경 대비 벨트가 알아볼 수 있게 더 높은 가시성 설정을 사용). ALMA 정밀도에서 분해된 안쪽 갭 이나 shepherding 구조는 없어서 cfg 고리는 6–55 AU 폭 전체에 걸쳐 균일합니다. metal-poor 모성이 Sol KBO analog 보다 철-reddening 이 덜한 입자를 형성했을 가능성이 있어, 태양형 metallicity 카이퍼 벨트의 더 따뜻한 황토색보다 좀 더 무채색에 가까운 grey-brown 을 정당화합니다. 이는 Basis 에 문서화된 tie-break 입니다.",
  "p_122":"행성 f / g / h 는 원반 안쪽 가장자리 안쪽의 희미한 점으로 모두 렌더링됩니다 (f 는 1.33 AU, h 는 0.24 AU, g 는 0.13 AU — 모두 6 AU 의 원반 안쪽 가장자리 훨씬 안쪽). 넓은 바깥쪽 먼지 벨트 대비 안쪽 행성계의 시각 대비가 NearStars 렌더러에서 시스템의 시그니처 프레이밍으로, 행성-만-안쪽 시스템 (TRAPPIST-1, Proxima) 과 이중성 페어 프레이밍 (α Cen A/B) 모두와 구분되는 모습입니다.",
  "h2_123":"Bibliography",
  "h3_124":"Read (visual-informative, drove decisions above)",
  "li_125":"<b>Greaves J. S. et al. 2004</b> — <i>The debris disk around τ Ceti: a massive analogue to the Kuiper Belt</i>, MNRAS 351, L54 (<code>2004MNRAS.351L..54G</code>). JCMT/SCUBA 850 μm 차가운 먼지 초과 검출. τ Ceti 잔해 원반을 태양 카이퍼 벨트보다 ~10× 더 무거운 KBO analog 로 처음 식별.",
  "li_126":"<b>MacGregor M. A. et al. 2016</b> — <i>Constraints on planetesimal collision models in debris disks</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>, arXiv:1607.06900). τ Ceti 원반의 ALMA Band 6 분해 영상. 단일 넓은 고리 6–55 AU. 먼지 질량 ~1.2 M⊕. 충돌 cascade 가 부모 planetesimal 벨트를 요구. 모든 <code>disk_*</code> Decisions 행을 정박.",
  "li_127":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Spectral analysis of τ Ceti: abundances and age</i>, MNRAS 422, 542 (<code>2012MNRAS.422..542P</code>, arXiv:1112.1709). 태양 대비 differential LTE 분석. [Fe/H] = −0.55 ± 0.05. log R&#x27;HK = −4.95. Eggen 1971 super-population 나이 7 ± 1 Gyr. 금속도, 활동도, 나이 Decisions 행을 정박.",
  "li_128":"<b>Santos N. C. et al. 2013</b> — <i>SWEET-Cat: A catalogue of parameters for stars with exoplanets</i>, A&amp;A 556, A150 (<code>2013A&amp;A...556A.150S</code>, arXiv:1307.0354). 독립 분광 측정으로 [Fe/H] = −0.49 ± 0.05 와 Teff = 5333 ± 20 K 를 얻어 Pavlenko 2012 를 1σ 안에서 확인.",
  "li_129":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). 네 행성 RV 발견 (e, f, g, h). 호스트 질량 M = 0.783 ± 0.012 M☉ 를 Decisions 테이블이 채택. DB Phase 2 는 행성 f, g, h 만 저장하고 e 는 누락 (Open items 참조).",
  "li_130":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved age estimation for solar-type dwarfs using activity-rotation diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). τ Ceti 의 34 일 회전에 적용한 gyrochronology 보정이 ~6.5 Gyr 를 주어 Pavlenko 2012 의 운동학 나이와 일치.",
  "li_131":"<b>Baliunas S. L. et al. 1996</b> — <i>Chromospheric variations in main-sequence stars II</i>, ApJ 438, 269 (<code>1995ApJ...438..269B</code>). Mt Wilson Ca II H&amp;K 서베이. τ Ceti 회전 주기 34 일. 분해 가능한 사이클 없는 예외적으로 평탄한 HK 기록.",
  "h3_132":"Read (context / methodology, not directly decision-driving)",
  "li_133":"<b>Teixeira T. C. et al. 2009</b> — <i>Solar-like oscillations in τ Ceti</i>, A&amp;A 494, 237 (<code>2009A&amp;A...494..237T</code>, arXiv:0811.3989). HARPS p-mode 검출. Δν = 169.0 ± 0.5 μHz, ν_max ≈ 4490 μHz. asteroseismic 질량과 반지름 cross-check.",

  "li_144":"<b>Phase 2 disk_measurements + 행성 측정치 재수집.</b> DB Phase 2 는 현재 τ Ceti 에 대한 <code>disk_measurements</code> 블록이 없습니다. Greaves 2004 와 MacGregor 2016 는 이 Phase 3 합성을 통해서만 인용되는 상태입니다. 향후 DB 스키마 마이그레이션에서 별 단위로 <code>disk_measurements: []</code> 배열을 추가하고 MacGregor 2016 의 적절한 엔트리 (안쪽/바깥쪽 반경, 먼지 질량, 분해 영상 플래그) 를 넣어야 합니다. 마찬가지로 행성 f / g / h curated 엔트리는 현재 Msini 외의 물리 파라미터가 비어 있어, Feng 2017 원논문 대비 반지름 컬럼을 재검증해야 합니다.",

  "li_147":"<b>τ Ceti 나이 정밀도.</b> 채택한 7.0 ± 1.5 Gyr 는 Pavlenko 2012 의 super-population 운동학 추정과 Mamajek 2008 의 gyrochronology 추정을 모두 포괄합니다. 미래의 Gaia DR4 또는 τ Ceti 의 HARPS p-mode 에 Joyce &amp; Chaboyer 2018 방법론을 적용한 asteroseismic- evolutionary 모델링 캠페인이 이를 ±0.5 Gyr 수준으로 좁힐 수 있으며, 이는 행성 f / g / h follow-up 의 거주가능성-역사 모델링 에 영향을 미칩니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
