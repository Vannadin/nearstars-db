  "h2_141":"Surface synthesis",
  "p_142":"Proxima d&#x27;s surface is governed by two competing thermal regimes: a hot but airless dayside and a deeply cold nightside, with sharp terminator gradients. At ~1.9× Earth&#x27;s insolation and an albedo of 0.15, the equilibrium temperature (326 K) is a global mean — the airless substellar point (no day-night redistribution) peaks only around 460 K.",
  "p_143":"That ~460 K substellar peak is far below the basalt/silicate solidus of ~1200–1300 K, so the dayside is a solid, sun-baked basaltic surface — there is no melt and no magma pond. An Io-style silicate volcanism would require a tidal-heating engine, but Proxima d has no significant tidal heat, so that pathway is ruled out as well. The substellar accent is therefore a dry regolith-reddening tone rather than a glow: warm baked basalt visible from a hypothetical spacecraft as the planet approaches mid-day terminator (<code>surface_tint_rgb_hex_accent = #6a4632</code>).",
  "p_144":"The antistellar hemisphere is a volatile cold-trap analog of Mercury&#x27;s permanently-shadowed polar craters — temperatures near 80 K can sequester water ice, methane, and sodium volatiles brought in by the few interstellar / cometary deliveries. The Ipatov 2023 dust / icy planetesimal delivery models (cited via the system bibliography) suggest persistent low-flux volatile flux at the inner Proxima system; volatile retention in the antistellar cold-trap is plausible but not directly measurable.",
  "p_145":"Surface morphology — impact craters from 4 Gyr of bombardment, with the sun-baked substellar regolith overprinting older terrain — is inferred entirely from the Mercury analog. The cfg <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> field captures this with the standard Mercury-style hummocky basaltic texture, biased toward the brown-red end of the silicate palette by the M-dwarf illumination spectrum.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"Proxima d has effectively no atmosphere in the conventional sense. At the surface gravity of 0.62 g_⊕ and a substellar peak ~460 K, the Jeans-escape parameter for any plausible secondary atmosphere is favorable for H₂ and H₂O over Gyr timescales. Proxima&#x27;s intense XUV output also drives strong hydrodynamic escape; Lee 2021 (2109.06963) found that even Proxima b at 0.05 AU experiences Venus-analog escape rates, and at d&#x27;s much closer 0.029 AU the loss rates scale up by another order of magnitude.",
  "p_148":"What remains is a vestigial sodium-vapor exosphere — the cfg tie-break choice over a fully airless model. Sputtering by Proxima&#x27;s stellar wind on basaltic surfaces continuously liberates Na atoms from feldspar / pyroxene lattices, producing a thin, gravitationally unbound exosphere with column densities ~10¹⁰ atoms/cm² (by analogy to Mercury, Killen 2007). The associated pressure equivalent (10⁻⁹ Pa) is well below any visible Rayleigh-scattering or absorption signature, so the cfg <span class=\"field-tt\" data-ko-tip=\"대기 limb (가장자리) 색조 hex.\" data-en-tip=\"Atmospheric limb tint as a hex color.\"><code>atmosphere_tint_rgb_hex</code></span> is set to &quot;n/a&quot; — the visible appearance is dominated entirely by the surface tint.",
  "p_149":"Episodic enhancements of the Na exosphere can be expected during Proxima superflares (~3 of 10³³ erg per year, Vida 2019) when increased XUV and particle flux dramatically increase the sputtering yield. These events do not produce visible plumes at the cfg&#x27;s scalar tint resolution but are flagged in Open items as a future cfg variant.",
  "h2_150":"Rotation &amp; spin synthesis",
  "p_151":"Proxima d is tidally locked, with the substellar point fixed at the 0° meridian and a sidereal rotation period equal to its 5.122-day orbit. Tidal damping timescales for a 0.26-M⊕ rocky planet at 0.029 AU around a 0.12-M☉ M dwarf are &lt; 10⁵ years (Walterová 2020 scaling from Proxima b&#x27;s longer-period calculation), well within the ~4.85 Gyr system age. Obliquity is similarly damped to 0°.",
  "p_152":"The spin-orbit resonance is presumed to be 1:1 (synchronous) rather than the 3:2 resonance held by Mercury, because the orbital eccentricity is effectively zero (SM25 fit) and only modest e is required to drive a higher-order resonance trap (Makarov 2012). The cfg <code>tidally_locked: true</code> and <code>obliquity_deg: 0</code> capture this synchronous state.",
  "p_153":"Libration amplitude around the synchronous state is small (&lt; 1°), limited by the negligible orbital eccentricity. The substellar point is fixed in the planetary frame; the daily diurnal cycle disappears entirely, replaced by the much slower 7-year stellar activity cycle modulation of substellar temperature.",
  "h2_154":"Visual styling",
  "p_155":"Proxima d is the most visually muted of the five entries in this synthesis. The deep red M5.5V illumination (<code>stellar_color_temp_k = 2980</code>) combined with the iron-oxidized basaltic surface produces a warm, saturated red-brown global tint (<span class=\"hex-chip\" style=\"background:#5a3a2a\"></span><code>#5a3a2a</code>), with a subtle warmer accent (<span class=\"hex-chip\" style=\"background:#6a4632\"></span><code>#6a4632</code>) at the sun-baked substellar region. Cratering and ridge geometry follow the Mercury-analog template.",
  "p_156":"From orbit, the planet shows the classic hot-Mercury phase curve: sharp terminator with no atmospheric haze, near-zero limb darkening beyond the photometric noise, and a fully-illuminated dayside that fades rapidly into the dark nightside. Proxima fills 2.5° angular diameter in d&#x27;s sky — 5× the apparent diameter of the Sun seen from Earth — and its deep red light dominates the visual scene.",
  "p_157":"During a Proxima superflare, the planet&#x27;s dayside experiences a brief brightening as the increased UV / optical flux scatters off the surface; the cfg encodes this as a temporary tint modifier on the visible side. The cumulative flare dose for any object on the surface reaches lethal levels (10⁴ mSv per ≥ 10³³-erg superflare per the Atri 2020 scaling), making in-game habitability impossible. The planet is purely a hot-rocky visual destination for player exploration.",
  "h2_158":"Bibliography",
  "h3_159":"Read (visual-informative, drove decisions above)",
  "li_160":"<b>Faria J. P. et al. 2022</b> — <i>A candidate short-period sub-Earth orbiting Proxima Centauri</i>, A&amp;A 658, A115 (<code>2022A&amp;A...658A.115F</code>, arXiv:2202.05188). The discovery paper. Reports P = 5.122 d, Msini = 0.26 M⊕. Orbital eccentricity is consistent with circular at the precision of the fit.",
  "li_161":"<b>Suárez Mascareño A. et al. 2025</b> — <i>Diving into the planetary system of Proxima with NIRPS: Breaking the m/s barrier</i>, A&amp;A 700, A11 (arXiv:2507.21751). Confirms Proxima d at high significance; refines orbital fit; constrains inclination to high values precluding transits in the photometric monitoring envelope.",
  "li_162":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (arXiv:2005.12114). Pre-discovery upper limits consistent with a 0.3-M⊕ planet at 5 d.",
  "li_163":"<b>Anglada-Escudé G. et al. 2016</b> — <i>A terrestrial planet candidate in a temperate orbit around Proxima Centauri</i>, Nature 536, 437 (arXiv:1609.03449). Host star context — Proxima b discovery used the same data baseline that constrained d&#x27;s eventual identification.",
  "li_164":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i>, ApJ 757, 112 (arXiv:1208.2431). Proxima R = 0.1542 R☉; sets the insolation calculation.",
  "li_165":"<b>Atri D. et al. 2020</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i> (arXiv:1910.09871). Used for the radiation-dose Decisions row.",
  "li_166":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i>, ApJ 900, 24 (arXiv:2007.12459). Tidal-locking timescale scaling.",
  "li_167":"<b>Vida K. et al. 2019</b> — <i>Flaring Activity of Proxima Centauri from TESS Observations</i> (arXiv:1907.12580). Superflare rate + energy distribution for the dose scaling.",
  "h3_168":"Read (context / methodology, not decision-driving)",
  "li_169":"<b>Lee Y. et al. 2021</b> — <i>Exosphere Modeling of Proxima b</i> (arXiv:2109.06963). Order-of-magnitude scaling for d&#x27;s escape rate.",
  "li_170":"<b>Kossakowski D. et al. 2023</b> — <i>The CARMENES search for exoplanets around M dwarfs: Wolf 1069 b</i> (arXiv:2301.02477). Sister-system analog; useful for cross-checking USP rocky planet scenarios.",
  "h3_171":"Read (instrument / non-cfg-decisive)",
  "li_172":"(none; the deep_read set is small for d).",
  "h3_173":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "li_174":"Mostly Wolf 1069 b and TOI-2095 sister-system papers from the expanded bibliography; preserved in <code>docs/phase3/_bib/proxima-cen-d.yaml</code> with <code>status: skipped</code>.",
  "h2_175":"Open items for follow-up",
  "li_176":"<b>Direct radius measurement</b>: SM25 confirms no transit detection in the current monitoring envelope. A future direct-imaging or high-precision astrometric campaign could yield true mass + radius (currently only Msini is constrained). The cfg <code>radius_rearth = 0.65</code> is a placeholder tie-break.",
  "li_177":"<b>Composition by mass–radius relation</b>: with only Msini, the composition (rocky vs. ice-rich) is unconstrained. The cfg defaults to a rocky Earth-analog density (5.2 g/cc); a confirmed smaller radius would push toward higher density (Mercury-like iron-enriched).",
  "li_178":"<b>Volatile cold-trap signature</b>: the antistellar cold-trap could retain water ice and other volatiles delivered by cometary flux. A future cfg variant could add a small <code>subsurface_ice</code> patch at the antistellar pole.",
  "li_179":"<b>Stellar wind sputtering yield</b>: the cfg adopts a Mercury-analog Na exosphere as a tie-break, but no direct modeling exists for Proxima d&#x27;s stellar wind environment. A future Garraffo-style 3D MHD wind simulation tailored to d could refine the exosphere column density and species composition.",
  "li_180":"<b>Superflare albedo modulation</b>: the cfg currently encodes only the time-averaged Bond albedo. The ~3-superflare-per-year cadence (Vida 2019) produces transient albedo enhancements during XUV-bright phases.",
  "h2_181":"Related",
  "li_182":"<a href=\"proxima-cen.md\">proxima-cen</a> — host star; flare environment drives the atmosphere-stripped scenario",

  ko: {
  "p_1":"Proxima Centauri d 는 Faria 외 2022 (<code>2022A&amp;A...658A.115F</code>, arXiv:2202.05188) 가 5.122 일 주기의 0.26 M⊕ 천체로 처음 보고하고, 그 뒤 Suárez Mascareño 외 2025 (<code>2025A&amp;A...700A..11S</code>, arXiv:2507.21751) 의 NIRPS + ESPRESSO 결합 분석에서 높은 유의도로 확정된 sub-Earth-mass ultra-short-period (USP) 행성 후보입니다. 0.029 AU 의 짧은 sma 로 어떤 거주가능영역 해석에서도 안쪽 끝 안에 들어가지만, Proxima 의 희미한 M5.5V 조명 (L = 0.00155 L☉) 에서는 일조량이 지구의 ~1.9 배에 그치며, 평형 온도는 326 K (A = 0.3) — Mercury 와 비슷하고 어떤 액체 물 임계점 보다도 높습니다.",
  "p_2":"행성은 통과로 보이지 않습니다. Suárez Mascareño 2025 §4 가 확인한 높은 궤도 경사가 통과 지오메트리를 광도 모니터링 envelope 밖에 둡니다. 결과 적으로 최소 질량과 궤도 주기만 관측으로 제약되며, 거의 모든 다른 Decisions 행은 가장 잘 연구된 USP analog 인 Mercury 비교와 M 왜성 조사 + Proxima flare 환경 제약을 결합해 추론합니다.",
  "p_3":"<b>NearStars 시나리오 선택. airless 하게 햇볕에 구워진 basalt 표면 (substellar 최고 ~460 K, silicate solidus 한참 아래 → 용융 없음), vestigial sodium-vapor exosphere 를 가진 뜨거운 조석 고정 Mercury-like sub-Earth-mass 암석 행성으로, Proxima 의 flare 출력에 대한 대기 차폐가 없습니다.</b> 32 cfg 픽. 17 은 canonical-aligned (궤도 + 벌크 파라미터), 15 는 tie-break (표면 시각, 약한 대기 / exosphere 선택, 자기장 추론) 로 문헌이 특정 값에 침묵하는 영역입니다. documented divergence 는 없습니다 — Proxima d 는 너무 최근에 발견되어 canonical 기후 모델이 아직 존재하지 않습니다.",

  "h2_141":"Surface synthesis",
  "p_142":"Proxima d 의 표면은 두 가지 경쟁하는 열 regime 에 의해 지배됩니다. 뜨겁지만 airless 한 dayside 와 깊이 차가운 nightside 가 sharp 한 terminator 기울기를 만듭니다. ~1.9 배 지구 일조량과 albedo 0.15 에서 평형 온도 (326 K) 는 전역 평균값입니다. airless substellar 점은 (주야 재분배 없음) 최고 ~460 K 정도까지만 올라갑니다.",
  "p_143":"이 ~460 K substellar 최고치는 basalt/silicate solidus 인 ~1200–1300 K 보다 한참 아래라서, dayside 는 고체로 햇볕에 구워진 basalt 표면입니다 — 용융도 magma pond 도 없습니다. Io 식 silicate 화산활동은 조석 가열 엔진이 있어야 하지만 Proxima d 는 의미 있는 조석 가열이 없어서 그 경로도 배제됩니다. 따라서 substellar 액센트는 광채가 아니라 건조한 regolith reddening 톤입니다. 가상 우주선이 행성에 접근하면서 mid-day terminator 에 다가가는 모습에서 보이는 따뜻하게 구워진 basalt 입니다 (<code>surface_tint_rgb_hex_accent = #6a4632</code>).",
  "p_144":"antistellar 반구는 Mercury 의 영구 그늘진 극지방 크레이터의 volatile cold-trap analog 입니다. 온도가 80 K 가까이 떨어지면 물 얼음, 메탄, 소듐 volatile 을 sequester 할 수 있는데, 이들은 드문 인터스텔라 / 혜성 전달로 들어옵니다. Ipatov 2023 의 먼지 / 얼음 planetesimal 전달 모델 (시스템 bibliography 통해 인용) 은 안쪽 Proxima 시스템에 지속적인 낮은 플럭스의 volatile 유입을 시사합니다. antistellar cold-trap 의 volatile 보유는 가능하지만 직접 측정 불가능합니다.",
  "p_145":"표면 morphology — 4 Gyr 의 폭격에서 온 충돌 크레이터, 더 오래된 지형 위에 overprint 된 햇볕에 구워진 substellar regolith — 는 전부 Mercury analog 에서 추론됩니다. cfg <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> 필드가 표준 Mercury 식 hummocky basalt 텍스처로 이를 잡으며, M 왜성 조명 스펙트럼이 silicate 팔레트의 빨강-갈색 끝 쪽으로 편향시킵니다.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"Proxima d 는 일반적인 의미에서 효과적으로 대기를 갖지 않습니다. 표면 중력 0.62 g_⊕ 와 substellar 최고치 ~460 K 에서 어떤 그럴듯한 secondary atmosphere 의 Jeans-escape 파라미터도 H₂ 와 H₂O 에 대해 Gyr 시간 스케일 에서 thermal escape 에 우호적입니다. Proxima 의 강한 XUV 출력은 hydrodynamic escape 도 강하게 구동합니다. Lee 2021 (2109.06963) 은 Proxima b 도 0.05 AU 에서 Venus-analog escape rate 를 경험한다고 발견했으며, d 의 훨씬 더 가까운 0.029 AU 에서는 손실 비율이 한 자리수 더 스케일됩니다.",
  "p_148":"남는 것은 vestigial sodium-vapor exosphere 입니다 — 완전 airless 모델에 대한 cfg tie-break 선택입니다. basalt 표면에 대한 Proxima 항성풍 sputtering 이 feldspar / pyroxene 격자에서 Na 원자를 지속적으로 해방시켜, 컬럼 밀도 ~10¹⁰ atoms/cm² (Mercury analogy, Killen 2007) 의 얇고 중력적으로 자유로운 exosphere 를 만듭니다. 관련된 등가 압력 (10⁻⁹ Pa) 은 가시 Rayleigh 산란 이나 흡수 시그니처 한참 아래 있어서, cfg <span class=\"field-tt\" data-ko-tip=\"대기 limb (가장자리) 색조 hex.\" data-en-tip=\"Atmospheric limb tint as a hex color.\"><code>atmosphere_tint_rgb_hex</code></span> 는 &quot;n/a&quot; 로 설정됩니다 — 가시 외관은 전적으로 표면 색조가 지배합니다.",
  "p_149":"Na exosphere 의 일시적 enhancement 는 Proxima superflare 동안 예상할 수 있습니다 (연 ~3 회 의 10³³ erg, Vida 2019). 증가한 XUV 와 입자 플럭스가 sputtering 산출을 극적으로 증가시키기 때문입니다. 이 사건들은 cfg 스칼라 색조 해상도에서 가시 플룸을 만들지 않지만, 향후 cfg 변형으로 Open items 에 표시됩니다.",
  "h2_150":"Rotation &amp; spin synthesis",
  "p_151":"Proxima d 는 조석 고정 상태이며, substellar 점은 0° meridian 에 고정되고 sidereal 회전 주기가 5.122 일 궤도와 동일합니다. 0.12-M☉ M 왜성 주위 0.029 AU 의 0.26-M⊕ 암석 행성에 대한 조석 damping 시간 스케일은 &lt; 10⁵ 년입니다 (Walterová 2020 가 Proxima b 의 더 긴 주기 계산에서 스케일). 시스템 ~4.85 Gyr 나이 안에 충분합니다. 황도 경사도 비슷하게 0° 로 damping 됐습니다.",
  "p_152":"spin-orbit resonance 는 1:1 (동기) 로 가정합니다. Mercury 가 가진 3:2 resonance 보다는 동기 상태인데, 궤도 이심률이 실질적으로 0 (SM25 fit) 이고 더 높은 차수 resonance trap 을 구동하려면 적당한 e 가 필요하기 때문입니다 (Makarov 2012). cfg <code>tidally_locked: true</code> 와 <code>obliquity_deg: 0</code> 이 이 동기 상태를 잡습니다.",
  "p_153":"동기 상태 주변 libration 진폭은 작습니다 (&lt; 1°). 무시할 만한 궤도 이심률로 제한되기 때문입니다. substellar 점이 행성 frame 에 고정되고, 일간 diurnal cycle 이 완전히 사라지며, 이는 substellar 온도의 7 년 항성 활동 사이클 변조라는 훨씬 느린 modulation 으로 대체됩니다.",
  "h2_154":"Visual styling",
  "p_155":"Proxima d 는 이 합성의 5 entry 가운데 시각적으로 가장 muted 합니다. 깊은 빨강 M5.5V 조명 (<code>stellar_color_temp_k = 2980</code>) 과 iron-oxidized basalt 표면이 결합해 따뜻하고 채도가 높은 빨강-갈색 글로벌 색조 (<span class=\"hex-chip\" style=\"background:#5a3a2a\"></span><code>#5a3a2a</code>) 를 만들고, 햇볕에 구워진 substellar 영역에 미묘하게 더 따뜻한 액센트 (<span class=\"hex-chip\" style=\"background:#6a4632\"></span><code>#6a4632</code>) 가 들어갑니다. cratering 과 ridge 지오메트리는 Mercury-analog 템플릿을 따릅니다.",
  "p_156":"궤도에서 보면 행성이 클래식한 뜨거운-Mercury 위상 곡선을 보입니다. 대기 haze 없는 sharp 한 terminator, 광도 잡음 너머의 거의 0 인 limb darkening, 어두운 야측으로 빠르게 fading 하는 완전 조명된 dayside. Proxima 가 d 의 하늘에서 각지름 2.5° 를 채우며 — 지구에서 본 태양 겉보기 지름의 5 배 — 그 깊은 빨강 빛이 시각 장면을 지배합니다.",
  "p_157":"Proxima superflare 동안 행성의 dayside 는 증가한 UV / 광학 플럭스가 표면에 산란되면서 짧은 brightening 을 겪습니다. cfg 가 이를 가시 면에 대한 일시적 색조 modifier 로 인코딩합니다. 표면의 어떤 객체에 대해서도 누적 flare 도즈가 lethal level 에 도달하며 (≥ 10³³-erg superflare 당 10⁴ mSv, Atri 2020 스케일링), 게임 내 거주 가능성은 불가능합니다. 행성은 플레이어 탐사를 위한 순수한 뜨거운 암석 시각 destination 입니다.",
  "h2_158":"Bibliography",
  "h3_159":"Read (visual-informative, drove decisions above)",
  "li_160":"<b>Faria J. P. et al. 2022</b> — <i>A candidate short-period sub-Earth orbiting Proxima Centauri</i>, A&amp;A 658, A115 (<code>2022A&amp;A...658A.115F</code>, arXiv:2202.05188). 발견 논문. P = 5.122 d, Msini = 0.26 M⊕ 보고. 궤도 이심률은 fit 의 정밀도에서 원형과 일관.",
  "li_161":"<b>Suárez Mascareño A. et al. 2025</b> — <i>Diving into the planetary system of Proxima with NIRPS: Breaking the m/s barrier</i>, A&amp;A 700, A11 (arXiv:2507.21751). Proxima d 를 높은 유의도로 확정. 궤도 fit 정련. 광도 모니터링 envelope 에서 통과를 배제하는 높은 값으로 경사 제약.",
  "li_162":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (arXiv:2005.12114). 5 d 의 0.3-M⊕ 행성과 일관된 발견 이전 상한.",
  "li_163":"<b>Anglada-Escudé G. et al. 2016</b> — <i>A terrestrial planet candidate in a temperate orbit around Proxima Centauri</i>, Nature 536, 437 (arXiv:1609.03449). 호스트 별 컨텍스트 — Proxima b 발견이 d 의 최종 식별을 제약한 같은 데이터 baseline 을 사용했습니다.",
  "li_164":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i>, ApJ 757, 112 (arXiv:1208.2431). Proxima R = 0.1542 R☉. 일조량 계산의 기준.",
  "li_165":"<b>Atri D. et al. 2020</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i> (arXiv:1910.09871). 방사선 도즈 Decisions 행에 사용.",
  "li_166":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i>, ApJ 900, 24 (arXiv:2007.12459). 조석 고정 시간 스케일 스케일링.",
  "li_167":"<b>Vida K. et al. 2019</b> — <i>Flaring Activity of Proxima Centauri from TESS Observations</i> (arXiv:1907.12580). 도즈 스케일링을 위한 superflare 빈도 + 에너지 분포.",
  "h3_168":"Read (context / methodology, not decision-driving)",
  "li_169":"<b>Lee Y. et al. 2021</b> — <i>Exosphere Modeling of Proxima b</i> (arXiv:2109.06963). d 의 escape rate 에 대한 자릿수 스케일링.",
  "li_170":"<b>Kossakowski D. et al. 2023</b> — <i>The CARMENES search for exoplanets around M dwarfs: Wolf 1069 b</i> (arXiv:2301.02477). 자매 시스템 analog. USP 암석 행성 시나리오 교차 확인에 유용.",
  "h3_171":"Read (instrument / non-cfg-decisive)",

  "h2_175":"Open items for follow-up",
  "li_176":"<b>직접 반지름 측정.</b> SM25 가 현재 모니터링 envelope 에서 통과 미검출을 확정. 향후 직접 촬영이나 고정밀 astrometric 캠페인이 진짜 질량 + 반지름을 산출할 수 있습니다 (현재는 Msini 만 제약). cfg <code>radius_rearth = 0.65</code> 는 placeholder tie-break.",
  "li_177":"<b>질량-반지름 관계로 구성.</b> Msini 만 있어서 구성 (암석 vs. 얼음 풍부) 은 제약되지 않습니다. cfg 는 지구형 암석 밀도 (5.2 g/cc) 로 디폴트. 확정된 더 작은 반지름은 더 높은 밀도 (Mercury 형 iron 풍부) 쪽으로 미는 것을 시사합니다.",
  "li_178":"<b>Volatile cold-trap 시그니처.</b> antistellar cold-trap 은 혜성 플럭스로 전달된 물 얼음과 다른 volatile 을 보유할 수 있습니다. 향후 cfg 변형이 antistellar 극에 작은 <code>subsurface_ice</code> 패치를 추가할 수 있습니다.",
  "li_179":"<b>항성풍 sputtering 산출.</b> cfg 는 tie-break 으로 Mercury-analog Na exosphere 를 채택하지만, Proxima d 의 항성풍 환경에 맞춘 직접 모델링은 없습니다. d 에 맞춘 향후 Garraffo 식 3D MHD 항성풍 시뮬레이션이 exosphere 컬럼 밀도와 종 구성을 정련할 수 있습니다.",
  "li_180":"<b>Superflare albedo modulation.</b> cfg 는 현재 시간 평균 Bond albedo 만 인코딩합니다. ~3 superflare/년 cadence (Vida 2019) 가 XUV-bright 단계 동안 일시적인 albedo enhancement 를 만듭니다.",
  "h2_181":"Related",

  "li_183":"<a href=\"proxima-cen-b.md\">proxima-cen-b</a> — HZ 에 위치한 외곽 형제. 대조 — d 는 지구의 ~1.9 배 일사로 어떤 HZ 해석에서도 내측 경계 안쪽에 놓입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
