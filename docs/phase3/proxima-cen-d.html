  "h2_167":"Surface synthesis",
  "p_168":"Proxima d&#x27;s surface state is set by three competing processes:",
  "li_169":"(1) Stellar XUV erosion of any atmosphere over 5 Gyr — Tian 2015 scaling for sub-Earth-mass planets at high insolation predicts complete loss of N₂/CO₂ atmosphere within ~100 Myr.",
  "li_170":"(2) Tidal heating from any remaining eccentricity — Bolmont 2017 estimates F_int ≈ 0.05 W/m² for e ≈ 0.01 (the Suárez Mascareño 2025 upper limit), which is sub-runaway.",
  "li_171":"(3) Surface-vapor cycle from photoevaporation of any volatiles delivered by impact or outgassing — produces a transient Na exosphere similar to Mercury but on a smaller scale.",
  "p_172":"The dominant outcome is <b>bare rock with permanent night-side cold trap volatile deposit</b> — a Mercury analog scaled down by ~2.5× in radius. The dayside surface is at 540 K substellar (well below basalt solidus ~1400 K but warm enough for active surface chemistry: photolytic oxidation, alkali volatilization, slow weathering).",
  "p_173":"<b>Color choice.</b> Bare basalt + iron oxide overlay under M-dwarf red illumination. Same dark gray-brown palette as TRAPPIST-1 d (<span class=\"hex-chip\" style=\"background:#3a2818\"></span><code>#3a2818</code> primary), with brown-red iron-oxide accent (<span class=\"hex-chip\" style=\"background:#7a4020\"></span><code>#7a4020</code>). The accent is slightly warmer than TRAPPIST-1 d&#x27;s <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> because d (Proxima) is at higher insolation and the cumulative photo- oxidation is more complete.",
  "p_174":"<b>Magma-ocean relicts.</b> d&#x27;s lower mass means a magma ocean phase of ~100 Myr (vs ~500 Myr for TRAPPIST-1 d). Relict morphology is present but more eroded than TRAPPIST-1 d&#x27;s. Visible as smoothed basaltic plains on the leading hemisphere, with occasional fracture systems where the cooling magma contracted.",
  "p_175":"<b>Night-side cold trap.</b> Mercury hosts H₂O ice in permanently shadowed polar craters (Lawrence 2013, Neumann 2013 MESSENGER data). Proxima d, being tidally locked rather than rotating, has a fixed anti-stellar point that is permanently dark and cold (~90 K without atmospheric heat transport). Any volatiles delivered by impact or photolytic transport from the dayside accumulate in this region — H₂O ice, CO₂ ice, and possibly Na/K alkali frost. Estimated coverage: ~5% of the anti-stellar hemisphere within ~30° of the cold pole.",
  "p_176":"<b>Crater morphology.</b> d&#x27;s smaller mass + smaller gravity gives larger crater diameters per impactor mass — typical crater diameters might be 2× larger than equivalent Earth craters per impactor. The leading hemisphere accumulates impacts preferentially. Surface age: ~5 Gyr, mostly heavily cratered to lunar-highlands density.",
  "p_177":"<b>Surface chemistry.</b> At 540 K substellar T:",
  "li_178":"Active alkali volatilization (Na, K)",
  "li_179":"Photolytic oxidation of basalt surface to hematite/ilmenite",
  "li_180":"Possible aluminum/calcium silicate vapor transport in transient flare-driven heating events",
  "li_181":"No carbonate-silicate cycle (no atmosphere)",
  "p_182":"The Na exosphere from alkali volatilization would be visible through ground-based spectroscopy (Na D doublet absorption) if it ever transits — but with no transit detected, this remains unobserved.",
  "h2_183":"Atmosphere synthesis",
  "p_184":"<b>Canonical case: no atmosphere.</b> The combination of:",
  "li_185":"(1) High XUV flux at 0.029 AU (~5× Earth-orbit values)",
  "li_186":"(2) Low planet mass (0.32 M⊕) and surface gravity (0.74 g_E)",
  "li_187":"(3) 5 Gyr cumulative escape history",
  "li_188":"(4) Frequent flare events providing acute escape episodes",
  "p_189":"drives the dominant outcome: complete loss of any primary or secondary atmosphere down to the bare-rock surface, with only transient (~hours) exospheric features during outgassing or volatile-impact events.",
  "p_190":"<b>Variant: thin CO₂ envelope.</b> If d outgassed CO₂ at a rate similar to current Mars and the escape rate is at the lower end of Tian 2015 predictions, a residual ~50 Pa CO₂ atmosphere could persist. This is consistent with the JWST upper limit on similar hot rocky exoplanets (Greene 2023 for TRAPPIST-1 b: &lt; 0.5 bar CO₂ at 99%). For NearStars cfg variant: ~50 Pa CO₂ + trace Na + trace water vapor, with a barely detectable Rayleigh limb haze.",
  "p_191":"<b>No oceans, no clouds.</b> Even if water was delivered post-magma- ocean phase, the dayside is too hot for liquid water (and too dry without an atmosphere); the night-side cold-trap volatiles are locked as frost, not free.",
  "p_192":"<b>Surface chemistry from flare impacts.</b> Each Proxima flare (~10⁴/yr at d&#x27;s orbit) deposits a UV+X-ray pulse that drives surface photochemistry — slow oxidation of basalt to hematite, chemical weathering of feldspars, and transient generation of sodium and potassium vapor that condense back to the surface within hours.",
  "h2_193":"Rotation &amp; spin synthesis",
  "p_194":"Tidal locking is essentially certain (5.12 d period &gt;&gt; sync timescale; Barnes 2017). Spin-orbit state:",
  "li_195":"<b>1:1</b> (default, eccentricity ≈ 0). Adopted.",
  "li_196":"3:2 not possible at e = 0.",
  "p_197":"<b>Obliquity = 0.</b> Tidal damping over Gyr.",
  "p_198":"<b>No day-night cycle.</b> Substellar point fixed; only motion is slow stellar rotation (83 d) of Proxima&#x27;s disk in d&#x27;s sky.",
  "p_199":"<b>Tidal heating.</b> With e ≈ 0 (Suárez Mascareño 2025), the tidal heating contribution is negligible — Bolmont 2017 scaling gives F_int ≈ 0.05 W/m², well below runaway threshold. The slight upward eccentricity envelope from Faria 2022 (e ≤ 0.04) gives upper limit F_int &lt; 0.5 W/m², still sub-runaway.",
  "p_200":"<b>No seasons.</b> Same as TRAPPIST-1 d: constant insolation, no diurnal cycle, no seasonal cycle.",
  "h2_201":"Visual styling",
  "li_202":"<b>Global appearance.</b> Dark gray-brown bare-rock world under deep-red M-dwarf illumination. Visually similar to TRAPPIST-1 d but warmer/dimmer accent due to higher insolation and longer photolytic oxidation history.",
  "li_203":"<b>Dayside.</b> Hot substellar zone (540 K) appears slightly blackbody-glowing if rendered at high dynamic range — the surface emits thermal IR strongly but visible-band emission is dim (kT ≈ 0.05 eV vs visible-band 1.5 eV). For KSP rendering, treat as reflective-only.",
  "li_204":"<b>Terminator.</b> No atmospheric optical features. Sharp shadow transition at the terminator (no haze, no glow).",
  "li_205":"<b>Nightside.</b> Very dark (~90 K). Tiny frost-cap region around anti-stellar point appears warm-cream (<span class=\"hex-chip\" style=\"background:#fff8e0\"></span><code>#fff8e0</code>) if directly illuminated by Alpha AB starlight (rare geometry). Otherwise invisible.",
  "li_206":"<b>Frost cap.</b> ~5% coverage centered on anti-stellar point. Visible from space when viewed from a Proxima b position with d in opposition — appears as a small bright spot on an otherwise dark hemisphere.",
  "li_207":"<b>Atmosphere.</b> None canonical. If variant 50 Pa CO₂ enabled, add a thin pale-grey limb haze (~2 km thick) barely detectable.",
  "li_208":"<b>Star in sky.</b> Proxima subtends ~2.6° (~5× Sun-from-Earth&#x27;s apparent diameter). The largest stellar disk in any NearStars planet&#x27;s sky. Deep red-orange with prominent visible starspot complexes.",
  "li_209":"<b>Sister planet b in sky.</b> Proxima b at 0.0485 AU is further from Proxima than d (0.0288 AU). In conjunction, b passes at closest distance ~0.02 AU (~3 million km) — appears as bright ~mV -2 disk-resolved (~3&#x27;) for several hours, then recedes.",
  "li_210":"<b>Alpha AB in sky.</b> Brilliant point V ≈ -7, cream-yellow, ~2° from a slowly-drifting position. Bright enough to cast visible shadows; provides notable night-side illumination on the anti-stellar hemisphere.",
  "li_211":"<b>Flare events.</b> Each Proxima flare delivers intense UV+visible brightening for minutes. d&#x27;s dayside is briefly heated by 10–100×; transient surface-volatile vaporization produces short-lived &quot;auroral&quot; emission from the resulting Na vapor cloud (though no actual aurora — no atmosphere). Looks like a brief red glow around the leading hemisphere.",
  "h2_212":"Bibliography",
  "h3_213":"Read (visual-informative, drove decisions above)",
  "li_214":"<b>2022A&amp;A...658A.115F</b> Faria et al. 2022 — Proxima d discovery via ESPRESSO RV (Msini = 0.26 M⊕, P = 5.12 d). Definitive discovery characterization.",
  "li_215":"<b>2025A&amp;A...700A..11M</b> Suárez Mascareño et al. 2025 — Combined HARPS + ESPRESSO + NIRPS analysis. Refined parameters used as Phase 2 recommended.",
  "li_216":"<b>2405.05013</b> Lobo &amp; Bouchy 2024 — Potential surface ice distribution on close-in terrestrial exoplanets around M dwarfs. Directly addresses cold-trap ice deposits on M-dwarf planets in d&#x27;s parameter regime. Drives the night-side frost cap visual.",
  "li_217":"<b>2102.06318</b> Howard et al. 2018 — Proxima flare distribution. Scaled to d&#x27;s orbit (0.029 AU) gives ~10⁴ flares/yr.",
  "h3_218":"Read (context / methodology, not decision-driving)",
  "li_219":"<b>2204.09270</b> Diamond-Lowe et al. 2022 — Simultaneous X-ray + FUV monitoring of Proxima. Radiation environment.",
  "li_220":"<b>MacGregor et al. 2018 (1803.07581)</b> — March 2016 ALMA superflare. Drives flare-event-rate envelope at d&#x27;s orbit.",
  "li_221":"<b>2402.00115</b> Yaptangco et al. 2025 — Short-timescale activity effects on transit detection. Context for non-detection of d transits.",
  "li_222":"<b>2409.06637</b> Wanderley et al. 2024 — Magnetic fields in M dwarf planet hosts. Context for B-field environment.",
  "li_223":"<b>2301.02477</b> Kossakowski et al. 2023 — Wolf 1069 b characterization. Comparable HZ-edge M-dwarf rocky planet; cross-reference for parameter envelope.",
  "li_224":"<b>2304.09220</b> TOI-2095 paper — comparable system, methodology.",
  "li_225":"<b>2207.13727</b> MIRECLE mission concept — future-instrument context for hot-rocky-planet characterization.",
  "h3_226":"Read (instrument-only, not visual-informative)",
  "li_227":"<b>2504.18485</b> ESPRESSO iodine cell calibration. Methodology.",
  "li_228":"<b>2102.01910</b> Optical SETI search of Proxima. Null result.",
  "li_229":"<b>2311.04316</b> Planetary perturbers paper. Different system.",
  "li_230":"<b>2209.11346</b> Multiple-star planet host catalog. Context.",
  "h3_231":"Not read — no arXiv preprint available (2 papers)",
  "li_232":"&quot;MOST Observations of Proxima Centauri&quot; abstract — superseded by published Davenport 2016 paper which is already in the read set for Proxima Cen synthesis.",
  "p_233":"<b>User action requested.</b> None at this time. d is observationally poorly constrained, so theoretical predictions dominate. If post-2026 transit attempts succeed or direct imaging produces phase-curve photometry, the surface temperature distribution could be measured directly.",
  "p_234":"---",
  "h2_235":"Open items for follow-up",
  "li_236":"The inclination of d&#x27;s orbit is unconstrained. Adopted Msini → M_true factor 1.23 is statistical; direct mass measurement would tighten.",
  "li_237":"The cold-trap volatile deposit (Lobo &amp; Bouchy 2024 framework) is highly model-dependent. The 5% coverage estimate could be off by an order of magnitude in either direction.",
  "li_238":"Magnetic field strength (0.5 μT) for a sub-Mars-mass body is poorly constrained by terrestrial scaling laws. RM22&#x27;s framework was developed for Earth-mass bodies and may not extrapolate accurately to 0.32 M⊕.",
  "li_239":"The variant 50 Pa CO₂ atmosphere is allowed by current limits but unobserved. Phase 4 cfg should explicitly support both bare-rock and thin-CO₂ variants.",
  "li_240":"The Mercury polar volatile analog assumes similar impact- delivery rates and photolytic transport efficiency. These could differ for a tidally locked body around an M dwarf.",
  "li_241":"Surface chemistry under M-dwarf XUV (alkali volatilization, hematite formation) needs laboratory validation under realistic flux conditions — current model assumes Earth-equivalent.",
  "li_242":"The Suárez Mascareño 2025 eccentricity e = 0 is consistent with no tidal heating; if future RV data find non-zero e, the surface heat flux could approach habitable temperatures.",

  ko: {
  "p_1":"NearStars KSP mod 의 Phase 3 행성 synthesis (2026-05-22 작성).",
  "p_2":"Proxima Cen d 는 태양계와 가장 가까운 sub-Earth-mass 행성. Faria et al. 2022 가 0.4 m/s 진폭 수준에서 ESPRESSO RV 로 발견, Suárez Mascareño et al. 2025 가 정제 (Msini = 0.26 ± 0.038 M⊕, P = 5.12 d, a = 0.0288 AU). 최소 질량은 ~2.4× Mars 로, 2025 발표 기준 태양계 너머 알려진 가장 작은 확인 행성. Proxima 의 거주 가능 영역 깊숙이 — 지구 플럭스의 ~3× 수신 — 어떤 volatile 인벤토리도 극단적 XUV 노출과 조석 가열에 직면.",
  "p_3":"통과는 검출 안됨; 대기 데이터 없음. 행성의 특성은 전적으로 이론적 고려에서 추론해야 함. 열 escape (Tian 2015 의 sub-Earth 스케일링), 고 insolation 에서의 silicate vaporization (Way 2024 의 hot-Mercury analog), 이심 궤도 에서의 조석 가열 (Bolmont 2017 의 Proxima d 는 2022 발견 이래 아직 출판 안됨).",
  "p_4":"<b>NearStars 시나리오 선택. 야간 극에 얇은 volatile frost 를 가진 Mercury- analog 뜨거운 맨 암석</b>, basaltic / ultramafic 표면 조성과 leading dayside 반구의 relict magma-ocean 형태로 anchored. 이는 &quot;documented divergence&quot; cfg — 게임플레이 관련 야간 frost cap 이 균일 뜨거운 암석 너머의 시각 다양성 제공; canonical &quot;완전 desiccated 맨 암석&quot; 은 cfg variant 로 보존.",

  "h2_167":"Surface synthesis",
  "p_168":"Proxima d 의 표면 상태는 세 경쟁 과정에 의해 설정.",
  "li_169":"(1) 5 Gyr 동안 stellar XUV 의 대기 erosion — 고 insolation 의 sub-Earth- mass 행성에 대한 Tian 2015 스케일링은 ~100 Myr 안에 N₂/CO₂ 대기 완전 손실 예측.",
  "li_170":"(2) 남은 이심률에서의 조석 가열 — Bolmont 2017 은 e ≈ 0.01 (Suárez Mascareño 2025 상한) 에서 F_int ≈ 0.05 W/m² 추정, sub-runaway.",
  "li_171":"(3) 충돌 또는 외기로 전달된 volatile 의 photoevaporation 에서의 표면- vapor cycle — Mercury 와 유사하나 더 작은 규모의 transient Na exosphere 생성.",
  "p_172":"지배 결과는 <b>반구 영구 cold trap volatile 침전을 가진 맨 암석</b> — 반지름이 ~2.5× 축소된 Mercury analog. dayside 표면은 substellar 540 K (basalt solidus ~1400 K 보다 한참 낮지만 활동적 표면 화학 가능. photolytic oxidation, 알칼리 휘발, 느린 weathering).",
  "p_173":"<b>색 선택.</b> M-dwarf 적색 조명 아래 맨 basalt + 산화철 overlay. TRAPPIST-1 d 와 같은 어두운 회갈색 팔레트 (<span class=\"hex-chip\" style=\"background:#3a2818\"></span><code>#3a2818</code> primary), brown-red 산화철 accent (<span class=\"hex-chip\" style=\"background:#7a4020\"></span><code>#7a4020</code>). accent 는 TRAPPIST-1 d 의 <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> 보다 약간 더 따뜻, 이는 d (Proxima) 가 더 높은 insolation 에 있고 누적 photo-oxidation 이 더 완전 하기 때문.",
  "p_174":"<b>마그마-바다 relict.</b> d 의 더 낮은 질량은 ~100 Myr 의 마그마 바다 phase (TRAPPIST-1 d 의 ~500 Myr 대비). Relict 형태는 존재하나 TRAPPIST-1 d 보다 더 erosion. leading hemisphere 의 부드러운 basaltic 평원으로 가시, cooling 마그마가 수축한 가끔의 fracture 시스템.",
  "p_175":"<b>야간 cold trap.</b> Mercury 는 영구적으로 그늘진 극 crater 의 H₂O 빙 호스팅 (Lawrence 2013, Neumann 2013 MESSENGER 데이터). 자전이 아닌 조석 잠금의 Proxima d 는 영구히 어둡고 차가운 (대기 열 수송 없이 ~90 K) 고정 anti-stellar 점 가짐. 충돌 또는 dayside 의 photolytic transport 로 전달된 어떤 volatile 도 이 영역에 축적 — H₂O 빙, CO₂ 빙, Na/K 알칼리 frost 가능성. 추정 coverage. cold pole 의 ~30° 안에 anti-stellar 반구의 ~5%.",
  "p_176":"<b>Crater 형태.</b> d 의 더 작은 질량 + 더 작은 중력이 충돌체 질량당 더 큰 crater 직경 부여 — 전형적 crater 직경이 동등 충돌체당 Earth crater 의 2× 더 클 수 있음. leading hemisphere 가 충돌 선호 축적. 표면 나이. ~5 Gyr, 대부분 lunar-highlands 밀도로 심하게 cratered.",
  "p_177":"<b>표면 화학.</b> 540 K substellar T 에서.",
  "li_178":"활동적 알칼리 휘발 (Na, K)",
  "li_179":"basalt 표면의 photolytic oxidation → hematite/ilmenite",
  "li_180":"transient flare-driven 가열 이벤트에서 알루미늄/칼슘 silicate vapor 수송 가능",
  "li_181":"carbonate-silicate 사이클 없음 (대기 없음)",
  "p_182":"알칼리 휘발에서의 Na exosphere 는 통과한다면 지상 분광 (Na D doublet 흡수) 으로 가시 — 그러나 통과 검출 없어 미관측 유지.",
  "h2_183":"Atmosphere synthesis",
  "p_184":"<b>Canonical 케이스. 대기 없음.</b> 다음 조합.",
  "li_185":"(1) 0.029 AU 에서의 높은 XUV 플럭스 (~5× 지구 궤도 값)",
  "li_186":"(2) 낮은 행성 질량 (0.32 M⊕) 과 표면 중력 (0.74 g_E)",
  "li_187":"(3) 5 Gyr 누적 escape 역사",
  "li_188":"(4) 빈번한 flare 이벤트가 acute escape episode 제공",
  "p_189":"이 지배 결과 견인. 어떤 1차 또는 2차 대기든 맨 암석 표면까지 완전 손실, 외기 또는 volatile-impact 이벤트 동안의 transient (~시간) exospheric feature 만 가능.",
  "p_190":"<b>Variant. 얇은 CO₂ envelope.</b> d 가 현재 Mars 와 유사한 rate 로 CO₂ 외기 하고 escape rate 가 Tian 2015 예측의 lower end 라면 잔류 ~50 Pa CO₂ 대기 지속 가능. 유사한 뜨거운 암석 외계행성에 대한 JWST 상한 (Greene 2023 TRAPPIST-1 b. 99% 에서 &lt; 0.5 bar CO₂) 과 일관. NearStars cfg variant. ~50 Pa CO₂ + trace Na + trace water vapor, 간신히 검출 가능한 Rayleigh limb 헤이즈.",
  "p_191":"<b>해양 없음, 구름 없음.</b> 마그마-바다 phase 후 물이 전달되었더라도 dayside 는 액체 물에 너무 뜨겁고 (대기 없이 너무 건조) 야간 cold-trap volatile 은 free 가 아닌 frost 로 잠겨 있음.",
  "p_192":"<b>Flare 충돌의 표면 화학.</b> 각 Proxima flare (d 궤도에서 ~10⁴/yr) 는 표면 photochemistry 견인하는 UV+X-ray pulse 침전 — basalt 의 느린 hematite 산화, 장석의 화학 weathering, 시간 안에 표면으로 condense 되돌아가는 sodium 과 potassium vapor 의 transient 생성.",
  "h2_193":"Rotation &amp; spin synthesis",
  "p_194":"조석 잠금 본질적으로 확실 (5.12 d 주기 &gt;&gt; sync 시간 척도; Barnes 2017). Spin-orbit 상태.",
  "li_195":"<b>1:1</b> (default, 이심률 ≈ 0). 채택.",
  "li_196":"3:2 는 e = 0 에서 불가능.",
  "p_197":"<b>Obliquity = 0.</b> Gyr 시간 척도의 조석 damping.",
  "p_198":"<b>Day-night cycle 없음.</b> substellar 점 고정; d 의 하늘에서 Proxima 디스크 의 느린 별 자전 (83 d) 만 움직임.",
  "p_199":"<b>조석 가열.</b> e ≈ 0 (Suárez Mascareño 2025) 으로 조석 가열 기여는 무시 가능 — Bolmont 2017 스케일링은 F_int ≈ 0.05 W/m², runaway 임계값 한참 아래. Faria 2022 의 약간 상향 이심률 envelope (e ≤ 0.04) 은 상한 F_int &lt; 0.5 W/m² 부여, 여전히 sub-runaway.",
  "p_200":"<b>계절 없음.</b> TRAPPIST-1 d 와 동일. 일정 insolation, 일주 사이클 없음, 계절 사이클 없음.",
  "h2_201":"Visual styling",
  "li_202":"<b>전체 모습.</b> Deep-red M-dwarf 조명 아래의 어두운 회갈색 맨 암석 세계. TRAPPIST-1 d 와 시각적으로 유사하나 더 높은 insolation 과 더 긴 photolytic oxidation 역사로 인해 더 따뜻/어두운 accent.",
  "li_203":"<b>Dayside.</b> 뜨거운 substellar 영역 (540 K) 이 high dynamic range 로 렌더링 되면 약간 흑체 발광 — 표면이 강하게 thermal IR 방출하지만 가시-밴드 발광은 희미 (kT ≈ 0.05 eV vs 가시-밴드 1.5 eV). KSP 렌더링은 reflective-only 처리.",
  "li_204":"<b>Terminator.</b> 대기 optical feature 없음. terminator 에 sharp 그림자 전환 (헤이즈 없음, 글로우 없음).",
  "li_205":"<b>Nightside.</b> 매우 어둠 (~90 K). anti-stellar 점 주변의 작은 frost-cap 영역이 Alpha AB 별빛으로 직접 조명되면 (드문 기하) warm-cream (<span class=\"hex-chip\" style=\"background:#fff8e0\"></span><code>#fff8e0</code>) 출현. 그렇지 않으면 invisible.",
  "li_206":"<b>Frost cap.</b> anti-stellar 점 중심으로 ~5% coverage. Proxima b 위치에서 d 가 opposition 일 때 공간에서 가시 — 그렇지 않으면 어두운 반구에 작은 밝은 점으로 출현.",
  "li_207":"<b>대기.</b> Canonical 에서 없음. Variant 50 Pa CO₂ 활성화 시 간신히 검출 가능한 thin pale-grey limb 헤이즈 (~2 km 두께) 추가.",
  "li_208":"<b>하늘의 별.</b> Proxima 시직경 ~2.6° (~5× 지구에서 보는 태양 시직경). NearStars 행성의 하늘에 가장 큰 별 디스크. 두드러진 가시 흑점 complex 가 있는 deep red-orange.",
  "li_209":"<b>하늘의 sister 행성 b.</b> Proxima b (0.0485 AU) 는 d (0.0288 AU) 보다 Proxima 에서 더 멀음. 합 시 b 는 가장 가까운 거리 ~0.02 AU (~3 백만 km) 지나감 — 수 시간 동안 디스크-분해된 밝은 ~mV -2 (~3&#x27;) 출현, 후 후퇴.",
  "li_210":"<b>하늘의 Alpha AB.</b> V ≈ -7 의 찬란한 점, cream-yellow, 느리게 drift 하는 위치에서 ~2°. 가시 그림자 던지기에 충분히 밝음; anti-stellar 반구에 주목할 만한 야간 조명 제공.",
  "li_211":"<b>Flare 이벤트.</b> 각 Proxima flare 가 분 동안 강한 UV+가시 밝기 증가 전달. d 의 dayside 가 짧게 10–100× 가열; transient 표면-volatile 증발이 결과 Na vapor 구름에서 단기 &quot;오로라&quot; 발광 (실제 오로라 아님 — 대기 없음). leading hemisphere 주위의 짧은 적색 글로우처럼 보임.",
  "h2_212":"Bibliography",
  "h3_213":"Read (visual-informative, drove decisions above)",
  "li_214":"<b>2022A&amp;A...658A.115F</b> Faria et al. 2022 — ESPRESSO RV 의 Proxima d 발견 (Msini = 0.26 M⊕, P = 5.12 d). 결정적 발견 특성화.",
  "li_215":"<b>2025A&amp;A...700A..11M</b> Suárez Mascareño et al. 2025 — 결합 HARPS + ESPRESSO + NIRPS 분석. Phase 2 추천에 사용된 정제 파라미터.",
  "li_216":"<b>2405.05013</b> Lobo &amp; Bouchy 2024 — M dwarf 주위 close-in 지구형 외계행성의 표면 빙 분포 가능성. d 의 파라미터 영역의 M-dwarf 행성에 cold-trap 빙 침전을 직접 다룸. 야간 frost cap 시각 견인.",
  "li_217":"<b>2102.06318</b> Howard et al. 2018 — Proxima flare 분포. d 궤도 (0.029 AU) 에 스케일하면 ~10⁴ flare/yr.",
  "h3_218":"Read (context / methodology, not decision-driving)",
  "li_219":"<b>2204.09270</b> Diamond-Lowe et al. 2022 — Proxima 의 동시 X-ray + FUV 모니터링. 방사선 환경.",
  "li_220":"<b>MacGregor et al. 2018 (1803.07581)</b> — 2016년 3월 ALMA superflare. d 궤도의 flare-event-rate envelope 견인.",
  "li_221":"<b>2402.00115</b> Yaptangco et al. 2025 — 통과 검출에 대한 short-timescale 활동 효과. d 통과 비검출 컨텍스트.",
  "li_222":"<b>2409.06637</b> Wanderley et al. 2024 — M dwarf 행성 호스트의 자기장. B-field 환경 컨텍스트.",
  "li_223":"<b>2301.02477</b> Kossakowski et al. 2023 — Wolf 1069 b 특성화. 비교 가능한 HZ-edge M-dwarf 암석 행성; 파라미터 envelope 교차 reference.",
  "li_224":"<b>2304.09220</b> TOI-2095 paper — 비교 가능한 시스템, 방법론.",
  "li_225":"<b>2207.13727</b> MIRECLE 미션 컨셉 — 뜨거운-암석-행성 특성화의 future- instrument 컨텍스트.",
  "h3_226":"Read (instrument-only, not visual-informative)",
  "li_227":"<b>2504.18485</b> ESPRESSO 요오드 cell 보정. 방법론.",
  "li_228":"<b>2102.01910</b> Proxima 의 광학 SETI 탐색. Null 결과.",
  "li_229":"<b>2311.04316</b> Planetary perturbers paper. 다른 시스템.",
  "li_230":"<b>2209.11346</b> 다중-별 행성 호스트 catalog. 컨텍스트.",
  "h3_231":"Not read — no arXiv preprint available (2 papers)",
  "li_232":"&quot;MOST Observations of Proxima Centauri&quot; abstract — 출판된 Davenport 2016 paper 로 대체, 이미 Proxima Cen synthesis 의 read set 에 있음.",
  "p_233":"<b>사용자 액션 요청.</b> 지금 시점에 없음. d 는 관측적으로 약하게 제약되어 이론 예측이 지배. 2026년 이후 통과 시도가 성공하거나 직접 이미징이 phase- curve 측광 생성하면 표면 온도 분포 직접 측정 가능.",
  "p_234":"---",
  "h2_235":"Open items for follow-up",
  "li_236":"d 의 궤도 기울기 미제약. 채택 Msini → M_true factor 1.23 은 통계적; 직접 질량 측정이 좁힘.",
  "li_237":"cold-trap volatile 침전 (Lobo &amp; Bouchy 2024 framework) 은 고도로 모델 의존적. 5% coverage 추정은 어느 방향으로든 자릿수 차이 가능.",
  "li_238":"sub-Mars-mass 본체의 자기장 강도 (0.5 μT) 가 지구 스케일링 법칙에 의해 약하게 제약. RM22 의 framework 가 Earth-mass 본체용으로 개발되어 0.32 M⊕ 에 정확히 extrapolate 안할 수 있음.",
  "li_239":"variant 50 Pa CO₂ 대기는 현재 한계에 의해 허용되나 미관측. Phase 4 cfg 는 맨 암석과 thin-CO₂ variant 모두 명시적으로 지원해야.",
  "li_240":"Mercury 극 volatile analog 은 유사한 impact-delivery rate 와 photolytic transport 효율을 가정. M dwarf 주위의 tidally locked body 에는 다를 수 있음.",
  "li_241":"M-dwarf XUV 아래의 표면 화학 (알칼리 휘발, hematite 형성) 은 현실적 플럭스 조건에서 실험실 검증 필요 — 현재 모델은 Earth 등가 가정.",
  "li_242":"Suárez Mascareño 2025 이심률 e = 0 은 조석 가열 없음과 일관; 미래 RV 데이터가 non-zero e 찾으면 표면 열 플럭스가 거주 가능 온도에 접근 가능.",
  "title":"Proxima Cen d — Phase 3 Synthesis",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
