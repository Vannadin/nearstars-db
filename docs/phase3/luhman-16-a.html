  en: {
  "p_1":"Luhman 16 A (WISE J104915.57−531906.1 A) is the brighter, cooler-cloud component of the nearest brown-dwarf binary — the third-closest system to the Sun after α Centauri and Barnard&#x27;s Star, at 1.9938 ± 0.0004 pc (501.557 mas absolute parallax, Lazorenko &amp; Sahlmann 2018). It is an <b>L7.5 dwarf</b> (Burgasser et al. 2013, adopted by Faherty 2014), sitting just on the L side of the L/T transition where photospheric condensate clouds are at their thickest. Its companion Luhman 16 B (T0.5) orbits it every 27.5 years on a moderately eccentric (e = 0.34) 3.56-AU relative orbit (Lazorenko &amp; Sahlmann 2018).",
  "p_2":"This is not a star. With a dynamical mass of 33.5 M_Jup = 0.0320 M☉ (Lazorenko &amp; Sahlmann 2018) it is far below the ~0.075 M☉ hydrogen-burning limit; the strong 6708 Å lithium line detected by Faherty 2014 (EW 8.0 Å) — the lithium test — confirms the substellar, never-fused core. Luhman 16 A shines only on residual gravitational/contraction heat, with a bolometric luminosity of log L/L☉ = −4.67 (≈ 2.1 × 10⁻⁵ L☉) radiated almost entirely in the infrared from an ~1310 K photosphere.",
  "p_3":"In NearStars terms it renders as a <b>dim, deep-red incandescent sphere roughly the size of Jupiter</b> (≈ 0.090 R☉, the standard field-brown-dwarf radius Faherty 2014 assumes), wrapped in thick, near-featureless silicate and iron clouds. Unlike its restless companion B, A is photometrically quiet — the calm member of the pair.",

  "td_53":"Millar-Blanchaer et al. 2020 (<code>2020ApJ...894...42M</code>, H-band VLT/NaCo polarimetry p_A = 0.031% ± 0.004%) shows A&#x27;s polarization requires CONSTANT LONGITUDINAL cloud bands — an oblate homogeneous atmosphere is ruled out, a two-banded morphology reproduces the signal. Biller et al. 2024/2025 (<code>2505.00794</code>) JWST adds patchy clouds (deep 1–2.5 µm) + high-altitude hot spots + small-grain silicates (8.5–11 µm). Both revise the earlier &quot;near-uniform / quiet&quot; reading (Crossfield 2014 left A unmapped)",
  "h2_54":"Surface synthesis",
  "p_55":"There is no solid surface — the visible &quot;surface&quot; is the τ ≈ 1 photosphere at ~1310 K, deep inside a hydrogen/helium envelope laced with condensate clouds. At this temperature the chemistry is dominated by neutral alkalis (the broad, pressure-broadened Na and K resonance doublets that drink most of the optical flux), water and CO/CH₄ in the near-IR, and FeH (Faherty 2014 detects the 0.9896 µm Wing–Ford band in both components). The condensates are silicate and iron grains plus corundum — the same 1300–2000 K mineral dust that the color-materials catalog ties to grey-to-reddened cloud decks. On the L7.5 primary these clouds are at their thickest and most uniform; little of the deeper, hotter gas shows through.",
  "h2_56":"Atmosphere / cloud layer",
  "p_57":"For a self-luminous brown dwarf the &quot;atmosphere&quot; <i>is</i> the visible body. Faherty 2014 finds A&#x27;s clouds are thicker and more homogeneous than B&#x27;s — the strong, similar FeH in both components argues for comparably cloudy photospheres, but A shows the weaker alkali continuum, consistent with looking only into the upper, cooler cloud tops. The result is a smooth, slightly hazy globe with no strong banding. This is the visual opposite of B: where B is a fast-changing weather map, A is a near-static dusty ball. For an EVE-style treatment A wants a single thick, low-contrast cloud layer with very slow evolution.",
  "h2_58":"Rotation &amp; spin",
  "p_59":"Brown dwarfs are fast rotators (a few hours). A&#x27;s period is genuinely uncertain: Gillon 2013 detected <b>no</b> periodic signal from A in 12 nights of TRAPPIST photometry (all the ~4.87 hr variability came from B); Crossfield 2014 measured v sin i = 17.6 ± 0.1 km/s — slower than B&#x27;s 26.1 km/s — but did not recover a period, calling A&#x27;s rotation &quot;the best way&quot; to advance the system. Apai 2021 <i>speculates</i> that a weak 6.94 hr peak in the TESS periodogram belongs to A, while Mancini 2015 favored ~8 hr and Millar-Blanchaer 2020 simply assumed 5 or 8 hr. The cfg adopts 6.94 hr at low confidence; the spin axis is plausibly near-equator-on (Apai 2021 reconciles the periods with the v sin i values under near-edge-on viewing).",
  "h2_60":"Visual styling",
  "p_61":"The defensible base color is blackbody incandescence at 1310 K — a deep red-orange (sRGB hue #FF5900 from <code>cie_color.py</code>, Planck + CIE 1931). But Luhman 16 A is extraordinarily dim (L ≈ 2 × 10⁻⁵ L☉, most of it infrared), so the <i>perceived</i> color is a dark ember rather than a bright orange — the cfg tint <span class=\"hex-chip\" style=\"background:#662400\"></span><code>#662400</code> is the 1310 K hue scaled to ~40% value. Dusty silicate cloud tops and the broad alkali absorption push it a touch redder and muddier still. In-engine A should read as a quietly glowing dull-red sphere, Jupiter-sized, its illumination color set to the same deep-red 1310 K temperature so any nearby body (its companion B) is lit in that ember light. Magenta — sometimes quoted as &quot;the color of a brown dwarf&quot; — is deliberately <b>not</b> used here: it is a non-spectral hue requiring a green-notch absorber and only emerges in the much cooler late-T/Y dwarfs, not at L7.5 (see Open items).",

  "p_68":"<b>Context:</b>",

  "h2_72":"Open items for follow-up",

  ko: {
  "p_1":"Luhman 16 A (WISE J104915.57−531906.1 A)는 가장 가까운 갈색왜성 쌍성에서 구름이 더 차가운 쪽이자 더 밝은 성분으로, α Centauri와 Barnard&#x27;s Star에 이은 태양에서 세 번째로 가까운 시스템입니다. 거리는 1.9938 ± 0.0004 pc이며 (절대 시차 501.557 mas, Lazorenko &amp; Sahlmann 2018), 분광형은 <b>L7.5 왜성</b>으로 (Burgasser et al. 2013, Faherty 2014이 채택) 광구의 응결물 구름이 가장 두꺼운 L/T 전이의 L쪽 경계에 막 걸쳐 있습니다. 동반체 Luhman 16 B (T0.5)는 27.5년 주기로 A를 공전하며, 다소 이심률이 높은(e = 0.34) 3.56 AU 상대 궤도를 돕니다 (Lazorenko &amp; Sahlmann 2018).",
  "p_2":"이 천체는 별이 아닙니다. 역학적 질량이 33.5 M_Jup = 0.0320 M☉으로 (Lazorenko &amp; Sahlmann 2018) 수소 연소 한계인 ~0.075 M☉을 한참 밑돌며, Faherty 2014이 검출한 강한 6708 Å 리튬선(EW 8.0 Å)은 — 이른바 리튬 검정 — 한 번도 핵융합한 적 없는 준항성 코어임을 확정합니다. Luhman 16 A는 오로지 잔여 중력/수축열로만 빛나며, 복사광도는 log L/L☉ = −4.67 (≈ 2.1 × 10⁻⁵ L☉)로 ~1310 K 광구에서 거의 전부 적외선으로 방출됩니다.",
  "p_3":"NearStars 관점에서 이 천체는 <b>목성만 한 크기의 어둡고 짙은 적색 백열 구체</b>로 렌더링되며(≈ 0.090 R☉, Faherty 2014이 가정하는 표준 장(field) 갈색왜성 반지름), 두껍고 거의 무특징한 규산염·철 구름에 감싸여 있습니다. 분주한 동반체 B와 달리 A는 측광적으로 조용한, 이 쌍에서 차분한 쪽입니다.",
  "p_4":"<b>NearStars 시나리오 선택: 둔탁한 잉걸불빛 적색으로 빛나는, 목성만 한 준항성 &quot;실패한 별&quot;이며, 더 극적인 날씨 행성 B와 27년 주기의 좁은 상호 궤도로 묶여 있는 모습입니다.</b> 모든 물리값은 Phase 2 측정치를 따르고, 유일한 tie-break은 1310 K 흑체에서 계산해 먼지 광구에 맞춰 붉게 보정한 표면 색조 hex입니다.",

  "td_33":"Luhman 16AB는 Oceanus 운동성단의 운동학적 구성원(나이 ~500 Myr, Gagné et al. 2023); de Regt et al. 2026 (<code>2602.03409</code>)이 ¹²C/¹³C = 74로 이를 뒷받침(현재 성간물질 값과 일치하며 태양값보다 낮음 → 최근에 물려받은 조성). Faherty 2014의 장(field) 나이(1.5 Gyr, 범위 0.1–3)를 대체",

  "td_41":"Tie-break: 1310 K 흑체 색상 #FF5900 (cie_color.py)을 잉걸불로 어둡게 + 먼지 규산염/알칼리 적색 보정",

  "td_47":"&lt; 4.5 (지상 관측); JWST에서는 파장 의존적",
  "td_48":"중간",
  "td_49":"Buenzli 2015 지상 관측 저진폭; Biller et al. 2025 (<code>2505.00794</code>) JWST는 A에서 파장 의존적 다층 변광을 드러냄(무특징 아님) — 진폭이 압력 층마다 달라짐",
  "td_50":"<span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>",
  "td_51":"규산염 + 철 응결물로 이루어진 항상적인 경도 방향(목성형) 구름 띠, 여기에 군데군데 뚫린 구조 + 핫스팟; 파장 의존적 다층 날씨(B보다는 미묘함)",
  "td_52":"중간",
  "td_53":"Millar-Blanchaer et al. 2020 (<code>2020ApJ...894...42M</code>, H밴드 VLT/NaCo 편광 관측 p_A = 0.031% ± 0.004%)은 A의 편광이 항상적인 경도 방향 구름 띠를 요구함을 보여줍니다. 편평한 균질 대기는 배제되고, 두 줄 띠 형태가 신호를 재현합니다. Biller et al. 2024/2025 (<code>2505.00794</code>) JWST는 여기에 군데군데 뚫린 구름(깊은 1–2.5 µm) + 고고도 핫스팟 + 작은 입자 규산염(8.5–11 µm)을 더합니다. 둘 다 기존의 &quot;거의 균일 / 조용함&quot; 해석(Crossfield 2014은 A를 매핑하지 못함)을 수정합니다",
  "h2_54":"표면 합성",
  "p_55":"고체 표면은 없습니다. 보이는 &quot;표면&quot;은 ~1310 K의 τ ≈ 1 광구로, 응결물 구름이 스민 수소/헬륨 외피 깊숙한 곳에 있습니다. 이 온도에서 화학은 중성 알칼리(가시광 플럭스를 대부분 흡수하는 넓고 압력 확장된 Na·K 공명 이중선), 근적외의 물과 CO/CH₄, 그리고 FeH가 지배합니다(Faherty 2014은 양쪽 성분 모두에서 0.9896 µm Wing–Ford 밴드를 검출). 응결물은 규산염·철 입자에 강옥(corundum)으로, 색-물질 카탈로그가 회색에서 붉어지는 구름층과 결부시키는 바로 그 1300–2000 K 광물 먼지입니다. L7.5 주성에서 이 구름들은 가장 두껍고 가장 균일하며, 더 깊고 더 뜨거운 가스는 거의 비쳐 보이지 않습니다.",
  "h2_56":"대기 / 구름층",
  "p_57":"스스로 빛나는 갈색왜성에게 &quot;대기&quot;는 <i>곧</i> 보이는 천체 자체입니다. Faherty 2014은 A의 구름이 B의 것보다 더 두껍고 더 균질하다고 보는데, 양쪽 성분의 강하고 비슷한 FeH는 광구의 구름 정도가 엇비슷함을 시사하지만, A는 더 약한 알칼리 연속선을 보여 더 높고 더 차가운 구름 꼭대기만 들여다보는 것과 부합합니다. 그 결과 강한 띠 구조가 없는 매끄럽고 약간 흐린 구체가 됩니다. 이는 B와 정반대의 모습으로, B가 빠르게 변하는 날씨 지도라면 A는 거의 정지한 먼지 공입니다. EVE식 처리에서 A에는 진화가 매우 느린, 두껍고 대비가 낮은 단일 구름층 하나가 어울립니다.",
  "h2_58":"자전과 스핀",
  "p_59":"갈색왜성은 빠른 자전체(수 시간)입니다. A의 주기는 정말로 불확실합니다. Gillon 2013은 12박의 TRAPPIST 측광에서 A로부터 주기 신호를 <b>전혀</b> 검출하지 못했고 (~4.87 hr 변광은 모두 B에서 나왔습니다), Crossfield 2014은 v sin i = 17.6 ± 0.1 km/s로 — B의 26.1 km/s보다 느립니다 — 측정했으나 주기는 복원하지 못한 채 A의 자전을 시스템 이해를 진전시킬 &quot;최선의 방법&quot;이라 불렀습니다. Apai 2021은 TESS periodogram의 약한 6.94 hr 봉우리가 A의 것이라 <i>추정</i>하고, Mancini 2015은 ~8 hr를 선호했으며 Millar-Blanchaer 2020은 그냥 5 또는 8 hr로 가정했습니다. cfg는 6.94 hr를 낮은 신뢰도로 채택하며, 자전축은 거의 적도 정면(equator-on)일 개연성이 큽니다 (Apai 2021이 거의 측면(edge-on) 관측 가정 아래 주기와 v sin i 값을 정합시킴).",
  "h2_60":"시각 스타일",
  "p_61":"방어 가능한 기준 색은 1310 K 흑체 백열입니다 — 짙은 적등색(sRGB 색상 #FF5900, <code>cie_color.py</code>, Planck + CIE 1931). 그러나 Luhman 16 A는 극도로 어둡기 때문에 (L ≈ 2 × 10⁻⁵ L☉, 대부분 적외선) <i>지각되는</i> 색은 밝은 주황이 아니라 어두운 잉걸불입니다 — cfg 색조 <span class=\"hex-chip\" style=\"background:#662400\"></span><code>#662400</code>은 1310 K 색상을 명도 ~40%로 낮춘 값입니다. 먼지투성이 규산염 구름 꼭대기와 넓은 알칼리 흡수가 여기에 조금 더 붉고 탁한 기운을 더합니다. 엔진 안에서 A는 조용히 빛나는 목성 크기의 둔탁한 적색 구체로 읽혀야 하며, 조명 색도 같은 짙은 적색 1310 K 온도로 설정해 인근 천체(동반체 B)가 그 잉걸불빛에 비치도록 합니다. 마젠타는 — 때때로 &quot;갈색왜성의 색&quot;으로 인용되지만 — 여기서 의도적으로 <b>사용하지 않습니다</b>. 그것은 녹색 노치 흡수체가 필요한 비분광 색상이며, L7.5가 아니라 훨씬 더 차가운 후기 T/Y 왜성에서만 나타납니다(후속 확인 항목 참조).",
  "h2_62":"참고문헌",
  "p_63":"<b>정독(Decisions 행 결정):</b>",
  "li_64":"Lazorenko &amp; Sahlmann 2018, A&amp;A 618, A111 (arXiv <a href=\"https://arxiv.org/abs/1808.07835\">1808.07835</a>) — 측성 궤도, 역학적 질량, 시차.",
  "li_65":"Faherty et al. 2014, ApJ 790, 90 (arXiv <a href=\"https://arxiv.org/abs/1406.1518\">1406.1518</a>) — Li, FeH, 복사광도, Teff, 나이, 가정 반지름.",
  "li_66":"Apai et al. 2021, ApJ 906, 64 (arXiv <a href=\"https://arxiv.org/abs/2101.02253\">2101.02253</a>) — TESS 자전; A에 대한 잠정 6.94 hr.",
  "li_67":"Crossfield et al. 2014, Nature 505, 654 (arXiv <a href=\"https://arxiv.org/abs/1401.8145\">1401.8145</a>) — Doppler v sin i; A는 매핑 안 됨.",
  "p_68":"<b>맥락:</b>",
  "li_69":"Gillon et al. 2013, A&amp;A 555, L5 (arXiv <a href=\"https://arxiv.org/abs/1304.0481\">1304.0481</a>) — A로부터 주기 신호 없음.",
  "li_70":"Burgasser et al. 2013 — L7.5/T0.5 분광 분류.",
  "li_71":"Bedin et al. 2024 (arXiv <a href=\"https://arxiv.org/abs/2403.08865\">2403.08865</a>), Garcia et al. 2017 (arXiv <a href=\"https://arxiv.org/abs/1708.02714\">1708.02714</a>) — 대안 역학적 질량.",
  "h2_72":"후속 확인 항목",
  "li_73":"<b>마젠타 문제.</b> 통합광 재구성은 때때로 갈색왜성을 마젠타/보라로 렌더링합니다 (깊은 CH₄ + Na/K가 녹–황색을 깎아냄). 이는 후기 T/Y 효과이며, L7.5의 A는 확실히 붉은색입니다. 향후 아트 패스가 마젠타 색조를 원한다면 그것은 A가 아니라 더 차가운 천체에 속합니다 — 표시만 하고 채택하지 않습니다.",
  "li_74":"<b>반지름은 측정이 아닌 가정입니다.</b> 0.9 R_Jup은 표준 장(field) BD 값이며, 직접 측정된 반지름을 가진 L/T 왜성은 없습니다. JWST/간섭계 제약이 렌더링 크기를 정밀화할 수 있습니다.",
  "li_75":"<b>A의 자전은 미확정입니다</b>(~5–8 hr). 전용 주기 측정이 있으면 스핀을 더 높은 신뢰도로 설정할 수 있습니다.",
  "h2_76":"Related",

  "li_79":"<a href=\"../wiki/reference__stellar-photospheric-color-methodology.html\">stellar-photospheric-color-methodology</a> — 이 L형 왜성의 광구색 도출 근거입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
