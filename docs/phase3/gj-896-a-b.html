  "h2_144":"Surface synthesis",
  "p_145":"GJ 896 A b is a gas giant with no solid surface; this section covers the cloud-deck &quot;surface&quot; an observer would see and the bulk-structure reasoning behind it. The one firmly measured physical quantity is the mass: m_b = 2.26 ± 0.57 M_Jup (Curiel 2022), a <b>true mass</b> rather than a minimum mass because the astrometric orbit breaks the sin i degeneracy that radial velocity leaves open. At 2.3 M_Jup the planet is a massive, mature jovian; evolutionary tracks for such a planet at any plausible system age put the radius near ~1.0–1.1 R_Jup, so the cfg adopts R ≈ 1.1 R_Jup. The DB stores <code>radius_rearth = 13.3</code> (≈ 1.19 R_Jup), which is a NASA-archive model placeholder rather than a measurement, but it is consistent with this range. The implied bulk density is high (~2 g/cc, denser than Jupiter) and the surface gravity is large (~58 g⊕), so the visible atmosphere is compact with a small ~9 km scale height.",
  "p_146":"The thermal state is cold-to-warm. With the host&#x27;s luminosity not measured in Phase 2, the equilibrium temperature is synthesized from L ≈ 0.02 L☉ (the Stefan-Boltzmann / mass-luminosity estimate from the stellar synthesis) and is flagged low-confidence: T_eq ≈ 130 K at the 0.64 AU semi-major axis, swinging from ~110 K at aphelion (0.86 AU) to ~165 K at perihelion (0.42 AU) over the eccentric orbit. Curiel 2022 locates the host&#x27;s habitable zone at 0.18–0.26 AU and the snow line at ~0.51 AU, so GJ 896 A b sits well outside the HZ and oscillates around the snow line — inside it near perihelion, outside it for most of the orbit. At ~130 K the dominant condensate is ammonia ice, so the visible cloud-deck &quot;surface&quot; is an ammonia-ice deck near the 0.5–1 bar level.",
  "p_147":"Under the deep-red M3.5 V illumination the rendered cloud deck is a warm cream-tan (<span class=\"hex-chip\" style=\"background:#e6d2b4\"></span><code>#e6d2b4</code> zones, <span class=\"hex-chip\" style=\"background:#c0a070\"></span><code>#c0a070</code> belts): Saturn&#x27;s ammonia clouds appear cream-white under solar light, and the ~3300 K synthesized SED shifts the perceived hue further into warm cream. The belt/zone contrast is moderate — the low insolation gives a weaker convective drive than Jupiter, so the bands are present but less vivid. All of the surface/cloud color and morphology fields are jovian-analog tie-breaks: no transmission or thermal-emission spectrum of GJ 896 A b exists, so the cfg defaults to the most interesting spectrally-plausible reading (banded ammonia-ice jovian) rather than a featureless disk.",
  "h2_148":"Atmosphere synthesis",
  "p_149":"GJ 896 A b has a deep H₂/He envelope inferred from its 2.3 M_Jup mass at a jovian radius; the atmosphere is the planet, so this section covers composition, the cloud/haze structure, and the sky an observer in the upper atmosphere would see.",
  "p_150":"<b>Composition.</b> With no spectrum, the cfg adopts a solar-composition jovian default (Lodders 2003 protosolar abundances): H₂ ~89%, He ~10%, with CH₄ (~0.2%), NH₃ (~0.02%), and deep H₂O as the principal volatiles, plus trace photochemical products. The condensation chemistry is truncated at the ~130 K equilibrium temperature, which puts the ammonia cloud deck near 0.5–1 bar and a deeper water-cloud deck below (inaccessible to visible imaging). This is the same composition tie-break used for the other NearStars cool jovians; it will be replaced if a spectrum is ever obtained.",
  "p_151":"<b>Photochemistry under an active host.</b> The headline atmospheric modifier is the host star. GJ 896 A is a very active flare star with a kG-scale field and frequent radio/X-ray bursts (Curiel 2022), so the incident UV and flare-particle flux at 0.64 AU is elevated relative to a quiet-host jovian. This drives CH₄ photolysis above the ~100 mbar level and is expected to build a thin hydrocarbon/photochemical haze layer, rendered as a faint warm-tan limb haze (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) above the ammonia deck — slightly more prominent than the haze on a jovian around a quiet star, but still a subtle limb effect rather than a dominant tint. The flare-particle flux also feeds the auroral activity (below).",
  "p_152":"<b>Sky appearance.</b> From within the upper atmosphere the sky is a deep ammonia-cloud haze lit warm cream-tan by the red host star. The dominant light source is GJ 896 A&#x27;s deep-red disk, subtending ~0.29° at the semi-major axis (growing to ~0.44° near perihelion) — a little over half the Sun&#x27;s apparent size from Earth, deep red-orange, flooding the cloud tops with infrared-rich light at a few percent of Earth&#x27;s insolation. The second sun, GJ 896 B, is a far smaller but distinct bright red point on its wide retrograde orbit.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"GJ 896 A b is <b>not tidally locked</b>: at a = 0.64 AU around a 0.44 M☉ star the tidal spin-down timescale vastly exceeds the system age, so the planet retains a fast primordial rotation like the Solar System&#x27;s giant planets. The cfg adopts a Jupiter-analog ~10-hour rotation period — a massive young jovian carries a large primordial spin angular momentum, favoring Jupiter-class rapid rotation over the slower Saturn-like (10.7 h) or Uranus-like (17 h) values. This is a tie-break: no rotation measurement exists.",
  "p_155":"<b>KSP implementation note.</b> Planet rotation period ≈ 10 h = 36 000 s, set in seconds on the planet body in Kopernicus. The fast rotation drives the zonal banding and the oblate figure typical of a rapidly rotating gas giant.",
  "p_156":"<b>Obliquity and the binary architecture.</b> The cfg picks a Saturn-like obliquity of ~25° (tie-break, no measurement) over a Jupiter-like ~3°, for a visually distinctive axis tilt within the dynamical window for a 0.64 AU jovian. There is a physical hook for a non-trivial obliquity here: Curiel 2022 finds a large mutual inclination Φ = 148° between the planetary orbital plane and the wide binary orbital plane (a retrograde configuration), the kind of misaligned architecture that can excite and maintain a substantial planetary obliquity through secular forcing from the stellar companion. The eccentric (e = 0.35) orbit gives the planet a genuine seasonal/insolation cycle as it swings between 0.42 and 0.86 AU, on top of any obliquity seasons — distinct from the near-circular orbits of most catalog jovians.",
  "h2_157":"Visual styling",
  "p_158":"In the NearStars renderer, GJ 896 A b is portrayed as a warm, banded, red-dwarf-lit Jovian on a visibly eccentric orbit:",
  "li_159":"<b>Global appearance (orbit view).</b> A massive ~1.1 R_Jup gas giant with warm cream-tan zonal bands (<span class=\"hex-chip\" style=\"background:#e6d2b4\"></span><code>#e6d2b4</code> zones, <span class=\"hex-chip\" style=\"background:#c0a070\"></span><code>#c0a070</code> belts), lit deep red by the M3.5 V host — the banding present but moderate in contrast given the weak convective drive at low insolation. An oblate figure from the fast ~10 h rotation.",
  "li_160":"<b>Dayside detail.</b> Distinct Jupiter/Saturn-style belts and zones; the ammonia-ice cloud deck reads warm cream under the ~3300 K SED, with belt regions a deeper tan-brown where the cloud deck thins.",
  "li_161":"<b>Terminator band.</b> A faint warm-tan photochemical haze layer (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) sits above the cloud deck along the limb — a touch more prominent than on a quiet-host jovian because of GJ 896 A&#x27;s elevated UV and flare flux.",
  "li_162":"<b>Nightside.</b> Dark, with possible auroral glow near the magnetic poles (below).",
  "li_163":"<b>Aurorae.</b> GJ 896 A&#x27;s strong flare/radio activity and elevated stellar wind drive a vigorous magnetosphere-fed aurora; rendered as red-pink H-Balmer-α auroral ovals (<span class=\"hex-chip\" style=\"background:#c84080\"></span><code>#c84080</code>) at the magnetic poles, brightening in step with the host&#x27;s frequent flares — a distinctive, scientifically-grounded effect given the unusually active host.",
  "li_164":"<b>No ring.</b> No ring is rendered (tie-break: no detection, and no fabricated feature per the search-and-verify policy).",
  "li_165":"<b>Host star in the sky.</b> GJ 896 A&#x27;s deep-red disk subtends ~0.29° at the semi-major axis, growing to ~0.44° near perihelion — a little over half to nearly the full Sun&#x27;s apparent size from Earth — and floods the cloud tops with infrared-rich red light. The eccentric orbit makes the star visibly swell and shrink over each 284-day year.",
  "li_166":"<b>Second sun.</b> GJ 896 B, the M4.5 companion, appears as a smaller but distinct bright red point on its wide 229-year retrograde orbit (a = 31.6 AU) — a true two-sun sky, both suns deep red.",
  "h2_167":"Bibliography",
  "h3_168":"Read (drove Decisions above)",
  "li_169":"<b>Curiel S. et al. 2022</b> — <i>3D orbital architecture of a dwarf binary system and its planetary companion</i>, AJ 164, 93 (<code>2022AJ....164...93C</code>, doi:10.3847/1538-3881/ac7c66, arXiv:2208.14553). The VLBA + optical/IR astrometric discovery of GJ 896 A b. Phase 2 recommended source for the true mass (2.26 ± 0.57 M_Jup = 718.29 M⊕), the full orbital element set (a = 0.63965 AU, P = 284.39 d, e = 0.35, i = 69.2°, Ω = 45.62°, ω = 353.11°), the habitable-zone (0.18–0.26 AU) and snow-line (~0.51 AU) estimates that place the planet&#x27;s thermal regime, and the large 148° planetary-vs-binary mutual inclination / retrograde architecture used in the obliquity reasoning. Also the host context (M3.5 Ve flare star, GJ 896 B companion) feeding the illumination and second-sun rendering.",
  "h3_170":"Read (context / methodology, not decision-driving)",
  "li_171":"<b>Fortney J.J. et al. 2007</b> &amp; <b>Burrows A. et al.</b> (evolutionary giant-planet mass-radius-age tracks) — the basis for the ~1.0–1.1 R_Jup radius tie-break for a mature 2.3 M_Jup jovian. Read for the radius row only; no GJ-896-specific content.",
  "li_172":"<b>Lodders K. 2003</b> — protosolar elemental abundances; the basis for the solar-composition atmosphere tie-break. Methodology context.",
  "h3_173":"Read (instrument-only, not visual-informative)",
  "li_174":"The VLBA astrometric orbit-fitting methodology in Curiel 2022 (AIPS phase-referencing, AGA / least-squares + MCMC orbit solution) is the instrument backbone of the true-mass and orbital-element measurement but contributes no direct visual field beyond the parameters already used above.",
  "h3_175":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_176":"No transmission, emission, or reflected-light spectrum of GJ 896 A b exists, so the atmosphere/cloud composition and color fields are all jovian-analog tie-breaks with no paper to read. Generic cool-jovian atmosphere / photochemistry surveys (e.g. Sudarsky albedo classes, Marley cloud models) inform the qualitative banded-ammonia-jovian picture but supply no GJ-896-b-specific number to curate. The single-companion orbit fit (Curiel 2022 Table 2 col 3: a = 0.6352 AU, P = 281.56 d, e = 0.30) is retained in the DB as the <code>recommended:false</code> alternative.",
  "h2_177":"Open items for follow-up",
  "li_178":"<b>Direct imaging + spectroscopy.</b> Curiel 2022 notes GJ 896 A b is one of the nearest Jovians known and &quot;well suited&quot; for direct imaging and spectroscopy. A future spectrum would replace the tie-break atmosphere composition, cloud tints, and haze with measured values and upgrade those rows from low to high confidence.",
  "li_179":"<b>Host Teff / luminosity.</b> The planet&#x27;s insolation and equilibrium temperature are synthesized from a non-measured host luminosity (L ≈ 0.02 L☉). A curated Teff/L for GJ 896 A would sharpen T_eq (currently ~130 K, low confidence) and the insolation row.",
  "li_180":"<b>Radius measurement.</b> No transit (the astrometric i = 69.2° is not edge-on, and the planet is not known to transit), so the radius stays a model-derived ~1.1 R_Jup tie-break; the DB <code>radius_rearth = 13.3</code> placeholder should be treated as such until a real measurement exists.",
  "li_181":"<b>GJ 896 B as a DB body.</b> The second sun in the planet&#x27;s sky is not yet a separate DB body; adding it (and the binary_orbit cfg for the 229-year retrograde pair) would let the two-sun sky and the secular obliquity forcing be rendered faithfully.",
  "li_182":"<b>Obliquity / spin.</b> The Saturn-like ~25° obliquity and ~10 h rotation are tie-breaks; the 148° mutual-inclination architecture motivates a non-trivial obliquity but does not pin it. Refine if a dynamical study of the misaligned system constrains the planet&#x27;s spin state.",
  "h2_183":"Related",
  "li_184":"<a href=\"../reference/methodology.md\">methodology</a> — schema source for the Decisions table",

  "p_1":"GJ 896 A b 는 젊고 활동적인 M3.5 Ve flare star GJ 896 A 를 a = 0.63965 ± 0.00067 AU 에서 284.39 ± 1.47 d 주기로, 적당히 이심적인 궤도 e = 0.35 ± 0.19 (Curiel et al. 2022) 으로 도는 따뜻한 ~2.3 M_Jup 가스 거성입니다. VLBA + 광학/적외선 천체측정으로 발견되었고, 이는 최소 질량이 아니라 <b>진질량</b> 을 줍니다. m_b = 2.26 ± 0.57 M_Jup (= 718.29 ± 181.16 M⊕), 궤도 경사 i = 69.2° 입니다. 이로써 GJ 896 A b 는 천체측정으로 발견된 쌍성계 별의 첫 행성 동반체이고 — 6.26 pc 에서 — 알려진 가장 가까운 Jovian-질량 행성 중 하나입니다. 투과나 열-방출 스펙트럼은 없습니다. 행성의 대기 조성, 반지름, 자전, 그리고 위성이나 고리는 제약되지 않으므로, 그 필드들은 적색왜성 조명 아래의 jovian-analog tie-break 입니다.",
  "p_2":"<b>NearStars 시나리오 선택. 따뜻하고 (장반경에서 T_eq ≈ 130 K, 이심 궤도에서 ~110–165 K 를 오감), 성숙한 ~2.3 M_Jup jovian 으로, 0.64 AU 궤도에서 깊은 붉은 M3.5 Ve flare star 의 빛을 받는 모습으로 렌더링합니다.</b> 호스트의 좁은 거주가능영역 (Curiel 2022: 0.18–0.26 AU) 밖에 있고 snow line (~0.51 AU) 주위를 진동하므로, 궤도가 물-얼음선 바로 안쪽에서 한참 바깥쪽까지 데려가는 cold-to-warm Jovian 입니다. 시각 styling 은 이를 Jupiter-질량 analog 로 다뤄, M-왜성 조명 아래 따뜻하게 렌더링되는 암모니아-얼음 구름 띠, 활동적 호스트의 높아진 UV/flare 에서 오는 옅은 광화학 haze, 고리 없음, Jupiter-스케일 자기권 으로 처리합니다. 궤도와 진질량이 high-confidence Phase 2 앵커이고, 반지름, 대기, 구름, 자전, 자기권은 jovian-analog tie-break (아직 스펙트럼이나 열 지도 없음) 입니다.",

  "td_143":"호스트의 M3.5 V 분광형에서 합성 (Phase 2 Teff 없음). 깊은 붉은 M-왜성 조명",
  "h2_144":"Surface synthesis",
  "p_145":"GJ 896 A b 는 고체 표면이 없는 가스 거성입니다. 이 섹션은 관측자가 볼 구름-deck &quot;표면&quot; 과 그 뒤의 bulk-구조 논리를 다룹니다. 확실히 측정된 물리량은 질량입니다. m_b = 2.26 ± 0.57 M_Jup (Curiel 2022) 로, 최소 질량이 아니라 <b>진질량</b> 인데, 천체측정 궤도가 시선속도가 열어두는 sin i 축퇴를 깨기 때문입니다. 2.3 M_Jup 에서 행성은 무겁고 성숙한 jovian 입니다. 어떤 그럴듯한 시스템 나이에서든 이런 행성의 진화 트랙은 반지름을 ~1.0–1.1 R_Jup 부근에 두므로, cfg 는 R ≈ 1.1 R_Jup 을 채택합니다. DB 는 <code>radius_rearth = 13.3</code> (≈ 1.19 R_Jup) 을 저장하는데, 이는 측정이 아니라 NASA-archive 모델 placeholder 이지만 이 범위와 일관됩니다. 함의되는 bulk 밀도는 높고 (~2 g/cc, Jupiter 보다 조밀), 표면 중력은 큽니다 (~58 g⊕). 그래서 가시 대기는 작은 ~9 km scale height 로 콤팩트합니다.",
  "p_146":"열 상태는 cold-to-warm 입니다. 호스트 광도가 Phase 2 에 측정되어 있지 않으므로, 평형온도는 L ≈ 0.02 L☉ (항성 합성의 Stefan-Boltzmann / 질량-광도 추정치) 에서 합성하고 low-confidence 로 표시합니다. T_eq ≈ 130 K (0.64 AU 장반경) 로, 이심 궤도에서 원일점 (0.86 AU) ~110 K 부터 근일점 (0.42 AU) ~165 K 까지 오갑니다. Curiel 2022 는 호스트의 거주가능영역을 0.18–0.26 AU, snow line 을 ~0.51 AU 에 둡니다. 따라서 GJ 896 A b 는 HZ 한참 밖에 있고 snow line 주위를 진동합니다 — 근일점 근처에서는 안쪽, 궤도 대부분에서는 바깥쪽입니다. ~130 K 에서 지배적 응축물은 암모니아 얼음이므로, 가시 구름-deck &quot;표면&quot; 은 0.5–1 bar 레벨 부근의 암모니아-얼음 deck 입니다.",
  "p_147":"깊은 붉은 M3.5 V 조명 아래 렌더링되는 구름 deck 은 따뜻한 크림-tan (<span class=\"hex-chip\" style=\"background:#e6d2b4\"></span><code>#e6d2b4</code> zone, <span class=\"hex-chip\" style=\"background:#c0a070\"></span><code>#c0a070</code> 띠) 입니다. Saturn 의 암모니아 구름은 태양광 아래 크림-흰색으로 보이고, ~3300 K 합성 SED 가 인지 색조를 따뜻한 크림으로 더 옮깁니다. 띠/zone 대비는 중간입니다 — 낮은 일사량이 Jupiter 보다 약한 대류 구동을 주므로 띠는 있지만 덜 선명합니다. 표면/구름 색과 형태 필드는 모두 jovian-analog tie-break 입니다. GJ 896 A b 의 투과나 열-방출 스펙트럼이 없으므로, cfg 는 featureless 원반 대신 가장 흥미롭고 스펙트럼적으로 그럴듯한 읽기 (띠를 두른 암모니아-얼음 jovian) 를 기본으로 합니다.",
  "h2_148":"Atmosphere synthesis",
  "p_149":"GJ 896 A b 는 2.3 M_Jup 질량과 jovian 반지름에서 추론된 깊은 H₂/He 외피를 가집니다. 대기가 곧 행성이므로, 이 섹션은 조성, 구름/haze 구조, 그리고 상층 대기 관측자가 볼 하늘을 다룹니다.",
  "p_150":"<b>조성.</b> 스펙트럼이 없으므로 cfg 는 태양-조성 jovian 기본값 (Lodders 2003 protosolar abundance) 을 채택합니다. H₂ ~89%, He ~10%, 주요 휘발성 물질로 CH₄ (~0.2%), NH₃ (~0.02%), 심부 H₂O, 그리고 미량 광화학 산물 입니다. 응축 화학은 ~130 K 평형온도에서 끊겨 암모니아 구름 deck 을 0.5–1 bar 부근에, 더 깊은 물-구름 deck 을 그 아래에 (가시 영상에는 접근 불가) 둡니다. 이는 다른 NearStars 차가운 jovian 에 쓴 것과 같은 조성 tie-break 이고, 스펙트럼이 얻어지면 교체됩니다.",
  "p_151":"<b>활동적 호스트 아래의 광화학.</b> 헤드라인 대기 modifier 는 호스트 별입니다. GJ 896 A 는 kG 규모 자기장과 잦은 전파/X-선 버스트를 가진 매우 활동적인 flare star 이므로 (Curiel 2022), 0.64 AU 에서 입사 UV 와 flare-입자 flux 가 조용한-호스트 jovian 보다 높습니다. 이는 ~100 mbar 레벨 위에서 CH₄ 광분해를 구동하고 옅은 탄화수소/광화학 haze 층을 쌓을 것으로 예상되며, 암모니아 deck 위 옅은 따뜻한-tan limb haze (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) 로 렌더링됩니다 — 조용한 별 주위 jovian 의 haze 보다 약간 더 두드러지나 여전히 지배적 색조가 아닌 옅은 limb 효과입니다. flare-입자 flux 는 또한 오로라 활동에 먹이를 줍니다 (아래).",
  "p_152":"<b>하늘 외형.</b> 상층 대기 안에서 하늘은 붉은 호스트 별이 따뜻한 크림-tan 으로 비추는 깊은 암모니아-구름 haze 입니다. 지배적 광원은 GJ 896 A 의 깊은 붉은 원반으로, 장반경에서 ~0.29° (근일점 근처 ~0.44° 까지 성장) 를 차지합니다 — 지구에서 본 태양 겉보기 크기의 절반 남짓이며, 깊은 적등색으로, 지구 일사량 수 % 의 적외선이 풍부한 빛으로 구름 꼭대기를 적십니다. 두 번째 태양 GJ 896 B 는 넓은 역행 궤도의 훨씬 작지만 뚜렷한 밝은 붉은 점입니다.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"GJ 896 A b 는 <b>조석 고정되어 있지 않습니다</b>. 0.44 M☉ 별 주위 0.64 AU 에서 조석 spin-down 시간척도가 시스템 나이를 크게 초과하므로, 행성은 태양계 거대행성처럼 빠른 원시 자전을 유지합니다. cfg 는 Jupiter-analog ~10 시간 자전 주기를 채택합니다 — 무겁고 젊은 jovian 은 큰 원시 spin 각운동량을 가져, 느린 Saturn 식 (10.7 h) 이나 Uranus 식 (17 h) 값보다 Jupiter-부류 빠른 자전을 선호합니다. 이는 tie-break 입니다. 자전 측정이 없습니다.",
  "p_155":"<b>KSP 구현 노트.</b> 행성 자전 주기 ≈ 10 h = 36 000 s 로, Kopernicus 에서 행성 바디에 초 단위로 설정합니다. 빠른 자전이 zonal 띠와 빠르게 자전하는 가스 거성에 전형적인 oblate 형태를 구동합니다.",
  "p_156":"<b>Obliquity 와 쌍성 architecture.</b> cfg 는 0.64 AU jovian 의 동역학 창 안에서 시각적으로 뚜렷한 축 기울기를 위해 Jupiter 식 ~3° 대신 Saturn 식 obliquity ~25° (tie-break, 측정 없음) 를 선택합니다. 여기엔 비자명 obliquity 의 물리적 hook 이 있습니다. Curiel 2022 는 행성 궤도면과 넓은 쌍성 궤도면 사이에 큰 mutual inclination Φ = 148° (역행 구성) 를 찾는데, 이는 항성 동반체의 세속적 forcing 으로 상당한 행성 obliquity 를 들뜨게 하고 유지할 수 있는 종류의 misaligned architecture 입니다. 이심 (e = 0.35) 궤도는 행성이 0.42 와 0.86 AU 사이를 오감에 따라 obliquity 계절 위에 진짜 계절/일사 주기를 줍니다 — 대부분 카탈로그 jovian 의 거의 원형인 궤도와 구별됩니다.",
  "h2_157":"Visual styling",
  "p_158":"NearStars 렌더러에서 GJ 896 A b 는 가시적으로 이심적인 궤도 위의 따뜻하고, 띠를 두른, 적색왜성-조명 Jovian 으로 그려집니다.",
  "li_159":"<b>전체 외형 (궤도 뷰).</b> 따뜻한 크림-tan zonal 띠 (<span class=\"hex-chip\" style=\"background:#e6d2b4\"></span><code>#e6d2b4</code> zone, <span class=\"hex-chip\" style=\"background:#c0a070\"></span><code>#c0a070</code> 띠) 를 가진 무거운 ~1.1 R_Jup 가스 거성. M3.5 V 호스트가 깊은 붉은빛으로 비추며, 낮은 일사량에서의 약한 대류 구동 때문에 띠는 있되 대비는 중간입니다. 빠른 ~10 h 자전에서 온 oblate 형태.",
  "li_160":"<b>주간면 상세.</b> 뚜렷한 Jupiter/Saturn 식 띠와 zone. 암모니아-얼음 구름 deck 이 ~3300 K SED 아래 따뜻한 크림으로 읽히고, 띠 영역은 구름 deck 이 얇아지는 곳에서 더 깊은 tan-갈색입니다.",
  "li_161":"<b>종단 띠.</b> 옅은 따뜻한-tan 광화학 haze 층 (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) 이 구름 deck 위 limb 을 따라 자리합니다 — GJ 896 A 의 높아진 UV 와 flare flux 때문에 조용한-호스트 jovian 보다 약간 더 두드러집니다.",
  "li_162":"<b>야간면.</b> 어둡고, 자기 극 근처에 가능한 오로라 glow (아래).",
  "li_163":"<b>오로라.</b> GJ 896 A 의 강한 flare/전파 활동과 높아진 항성풍이 활발한 자기권-feed 오로라를 구동. 자기 극에 적-분홍 H-Balmer-α 오로라 oval (<span class=\"hex-chip\" style=\"background:#c84080\"></span><code>#c84080</code>) 로 렌더링되며, 호스트의 잦은 flare 에 맞춰 밝아집니다 — 이례적으로 활동적인 호스트를 감안한 뚜렷하고 과학적으로 근거 있는 효과입니다.",
  "li_164":"<b>고리 없음.</b> 고리는 렌더링하지 않습니다 (tie-break. 검출 없음, search-and-verify 정책에 따라 지어낸 feature 없음).",
  "li_165":"<b>하늘의 호스트 별.</b> GJ 896 A 의 깊은 붉은 원반은 장반경에서 ~0.29°, 근일점 근처에서 ~0.44° 를 차지합니다 — 지구에서 본 태양 겉보기 크기의 절반 남짓에서 거의 그 전부까지 — 그리고 구름 꼭대기를 적외선이 풍부한 붉은빛으로 적십니다. 이심 궤도가 매 284 일 해마다 별을 눈에 띄게 부풀고 줄어들게 만듭니다.",
  "li_166":"<b>두 번째 태양.</b> M4.5 동반체 GJ 896 B 는 넓은 229 년 역행 궤도 (a = 31.6 AU) 의 더 작지만 뚜렷한 밝은 붉은 점으로 나타납니다 — 두 태양 모두 깊은 붉은빛인 진짜 두-태양 하늘입니다.",
  "h2_167":"Bibliography",
  "h3_168":"Read (drove Decisions above)",
  "li_169":"<b>Curiel S. et al. 2022</b> — <i>3D orbital architecture of a dwarf binary system and its planetary companion</i>, AJ 164, 93 (<code>2022AJ....164...93C</code>, doi:10.3847/1538-3881/ac7c66, arXiv:2208.14553). GJ 896 A b 의 VLBA + 광학/적외선 천체측정 발견. 진질량 (2.26 ± 0.57 M_Jup = 718.29 M⊕), 전체 궤도 요소 세트 (a = 0.63965 AU, P = 284.39 d, e = 0.35, i = 69.2°, Ω = 45.62°, ω = 353.11°), 행성의 열 영역을 정하는 거주가능영역 (0.18–0.26 AU) 과 snow-line (~0.51 AU) 추정치, obliquity 논리에 쓴 큰 148° 행성-대-쌍성 mutual inclination / 역행 architecture 의 Phase 2 recommended 출처. 조명과 두-번째-태양 렌더링에 먹이를 주는 호스트 맥락 (M3.5 Ve flare star, GJ 896 B 동반체) 도 여기서 옴.",
  "h3_170":"Read (context / methodology, not decision-driving)",
  "li_171":"<b>Fortney J.J. et al. 2007</b> &amp; <b>Burrows A. et al.</b> (진화 거대행성 질량-반지름-나이 트랙) — 성숙한 2.3 M_Jup jovian 의 ~1.0–1.1 R_Jup 반지름 tie-break 의 근거. 반지름 행에만 읽음. GJ-896-고유 내용 없음.",
  "li_172":"<b>Lodders K. 2003</b> — protosolar 원소 abundance. 태양-조성 대기 tie-break 의 근거. 방법론 맥락.",
  "h3_173":"Read (instrument-only, not visual-informative)",
  "li_174":"Curiel 2022 의 VLBA 천체측정 궤도-피팅 방법론 (AIPS phase-referencing, AGA / least-squares + MCMC 궤도 해) 은 진질량과 궤도-요소 측정의 기기적 골격이지만, 위에서 이미 쓴 파라미터 이상의 직접 시각 필드를 주지는 않습니다.",
  "h3_175":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_176":"GJ 896 A b 의 투과, 방출, 반사광 스펙트럼이 없으므로, 대기/구름 조성과 색 필드는 모두 읽을 논문이 없는 jovian-analog tie-break 입니다. 일반적인 차가운-jovian 대기 / 광화학 서베이 (예: Sudarsky 알베도 부류, Marley 구름 모델) 는 정성적 띠-두른-암모니아-jovian 그림에 정보를 주지만 큐레이션할 GJ-896-b-고유 수치는 주지 않습니다. 단일-동반체 궤도 피팅 (Curiel 2022 Table 2 col 3: a = 0.6352 AU, P = 281.56 d, e = 0.30) 은 DB 에 <code>recommended:false</code> 대안으로 보존됩니다.",
  "h2_177":"Open items for follow-up",
  "li_178":"<b>직접 영상 + 분광.</b> Curiel 2022 는 GJ 896 A b 가 알려진 가장 가까운 Jovian 중 하나이며 직접 영상과 분광에 &quot;잘 맞는다&quot; 고 언급합니다. 미래 스펙트럼이 tie-break 대기 조성, 구름 색조, haze 를 측정값으로 교체하고 그 행들을 low 에서 high 신뢰도로 끌어올립니다.",
  "li_179":"<b>호스트 Teff / 광도.</b> 행성의 일사량과 평형온도는 미측정 호스트 광도 (L ≈ 0.02 L☉) 에서 합성합니다. GJ 896 A 의 큐레이션된 Teff/L 이 T_eq (현재 ~130 K, low confidence) 와 일사량 행을 sharpen 합니다.",
  "li_180":"<b>반지름 측정.</b> 통과 없음 (천체측정 i = 69.2° 가 edge-on 이 아니고, 행성이 통과하는 것으로 알려지지 않음) 이라 반지름은 모델-유도 ~1.1 R_Jup tie-break 로 남습니다. DB <code>radius_rearth = 13.3</code> placeholder 는 진짜 측정이 나올 때까지 그대로 취급해야 합니다.",
  "li_181":"<b>GJ 896 B 를 DB 바디로.</b> 행성 하늘의 두 번째 태양은 아직 별도 DB 바디가 아닙니다. 이를 (그리고 229 년 역행 쌍의 binary_orbit cfg 를) 추가하면 두-태양 하늘과 세속적 obliquity forcing 을 충실히 렌더링할 수 있습니다.",
  "li_182":"<b>Obliquity / spin.</b> Saturn 식 ~25° obliquity 와 ~10 h 자전은 tie-break 입니다. 148° mutual-inclination architecture 가 비자명 obliquity 를 동기부여하지만 못박지는 않습니다. misaligned 시스템의 동역학 연구가 행성 spin 상태를 제약하면 다듬습니다.",
  "h2_183":"Related",
  "li_184":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 표의 스키마 출처",
  "li_185":"<a href=\"gj-896-a.md\">gj-896-a</a> — 호스트 M3.5 Ve flare star. 조명 색, 일사량, 두-번째-태양 맥락의 출처",
  "li_186":"<a href=\"eps-eri-b.md\">eps-eri-b</a> — 비교 차가운 jovian (~0.78 M_Jup, K2V 주위 3.5 AU). 그것의 거의 원형 궤도와 단일성계를 GJ 896 A b 의 이심 궤도 및 misaligned 쌍성 architecture 와 대비",
  "title":"GJ 896 A b — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",

  "footer_note": "NearStars · Phase 3 합성 보고서 · gj-896-a-b.md + ko/ 미러에서 자동 생성"
  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
