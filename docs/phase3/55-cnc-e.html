  "h2_152":"Surface synthesis",
  "p_153":"55 Cnc e is the headline body of the system: a transiting USP super-Earth whose 0.737-day orbit at 0.0154 AU bathes it in ~2450× Earth&#x27;s insolation. The measured bulk density of 6.7 ± 0.4 g/cc (Bourrier 2018) is consistent with a rocky / silicate-dominated interior — denser than a pure-water world, lighter than an iron-rich Mercury-analog — with at most a thin volatile envelope contributing a few percent of the radius. At T_eq ≈ 1959 K and substellar peak temperatures reaching ~2700 K, the dayside lithosphere is at or above the silicate solidus for most plausible mineral compositions: <b>the substellar hemisphere is a magma ocean.</b>",
  "p_154":"The cleanest observational anchor is the Demory 2016 Spitzer 4.5 μm dayside thermal-emission campaign, which detected a 4σ <b>variability</b>: the dayside brightness temperature swung from 1365 +219/−257 K in 2012 to 2528 +224/−229 K in 2013 — a factor-3.7 change in occultation depth (47 → 176 ppm) over a single year, with a full toy-model envelope of ~1273–2816 K. This variability cannot be explained by stellar spots or by slow compositional drift; Demory 2016 invokes either large-scale surface activity (Io-like volcanic resurfacing driven by strong tidal heating) or episodic circumstellar/circumplanetary material. For NearStars this motivates a visually dynamic, volcanically resurfaced dayside rather than a static lava plain.",
  "p_155":"<b>Color choice.</b> The dayside is dominated not by reflectance but by <b>thermal emission</b>: silicate melt at 2400–2700 K radiates strongly in the visible, peaking in the orange-red. The substellar accent <span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code> encodes this incandescence — a glowing magma surface, by far the brightest feature on the planet. Where the surface has solidified (the cooler terminator and nightside), the quenched ultramafic crust is very dark, <span class=\"hex-chip\" style=\"background:#2a1c14\"></span><code>#2a1c14</code>. The contrast between the glowing day and the dark night is the planet&#x27;s defining visual signature. The host star&#x27;s warm 5196 K K0 light is far less important here than the planet&#x27;s own glow on the dayside.",
  "p_156":"<b>Morphology.</b> Three contributing processes: (1) a substellar magma ocean, convecting and possibly draining toward the terminator where it quenches; (2) Io-like volcanic resurfacing driven by tidal heating (Demory 2016) — episodic plumes and lava flows that produce the observed brightness variability; (3) a solidified, fractured nightside crust where re-radiated heat and any atmospheric transport keep temperatures near ~1300 K. The default texture: a glowing orange substellar lava pool grading through a narrow incandescent terminator into a dark, cracked basaltic nightside.",
  "h2_157":"Atmosphere synthesis",
  "p_158":"The atmospheric nature of 55 Cnc e has been debated for over a decade, and the JWST era has tilted the evidence toward an <b>outgassed secondary atmosphere</b>. Bourrier 2018&#x27;s interior modeling, combining the 8.0 M⊕ mass and 1.88 R⊕ optical radius, favors a &quot;heavyweight&quot; atmosphere contributing a few percent of the planet radius; a primordial H/He envelope is excluded because it would be lost within ~80 000 years (and no hydrogen exosphere is detected; Ehrenreich 2012), and an extended water-rich envelope is disfavored (Esteves 2017). The dry-scenario mean molecular weight is high, μ = 13.5 +17.9/−7.7 g/mol. Hu et al. 2024 (JWST MIRI/NIRCam secondary eclipse) found the emission spectrum favors a volatile-rich atmosphere with <b>CO and CO₂</b> over both a bare lava surface and a primordial envelope — an atmosphere outgassed from the underlying magma ocean.",
  "li_159":"<b>Pressure.</b> The cfg adopts ~1 bar (100 000 Pa) as an order-of-magnitude outgassed-atmosphere choice (Confidence=low — the absolute surface pressure is not directly measured). This is a tie-break: a thin, high-mean-molecular-weight CO₂/CO envelope in vapor-pressure equilibrium with the magma ocean, not a thick greenhouse.",
  "li_160":"<b>Composition.</b> CO₂ + CO dominant (Hu 2024), with silicate-vapor species (SiO, Na, etc.) near the molten substellar point. High mean molecular weight (Bourrier 2018), consistent with no H/He and no extended water.",
  "li_161":"<b>Sky appearance.</b> From the dayside surface, the sky would be a hazy, warm-toned veil of CO₂/silicate vapor (<span class=\"hex-chip\" style=\"background:#d9c4a0\"></span><code>#d9c4a0</code> limb tint), thin enough that the enormous host star dominates. Silicate/metal-oxide clouds (forsterite/enstatite grey, <span class=\"hex-chip\" style=\"background:#b0a088\"></span><code>#b0a088</code>) may condense near the cooler terminator and over the nightside, but are suppressed over the incandescent substellar magma where temperatures are too high for condensation (Madhusudhan 2015).",
  "p_162":"The variability (Demory 2016) plausibly reflects episodic injection of silicate dust or volcanic opacity into this atmosphere — tens of scale heights of optically thick material absorbing in the 4.5 μm band — so the atmosphere is best rendered as dynamic and patchy rather than uniform.",
  "h2_163":"Rotation &amp; spin synthesis",
  "p_164":"At 0.0154 AU with a 0.737-day orbit, 55 Cnc e is firmly tidally locked in a 1:1 spin-orbit resonance. The orbit is essentially circularized (e = 0.05, consistent with 0 at 2σ; Bourrier 2018), which per the Vinson 2017 / Makarov 2018 criterion (3:2 stable only for e ≳ 0.01, 1:1 favored below) puts e in the synchronous-rotation regime. Obliquity is damped to zero. The substellar point is therefore fixed in the surface frame — the magma ocean is permanently anchored under the star.",
  "p_165":"<b>KSP implementation note.</b> Rotation period = orbital period = 0.7365474 days (63 638 s). In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds.",
  "p_166":"<b>No seasons.</b> With obliquity = 0 and near-zero eccentricity-driven libration, there are no seasonal cycles; the only temporal variation is the (real, observed) episodic volcanic/atmospheric variability of Demory 2016, which the cfg can render as slow brightness flickering of the substellar region on multi-year timescales.",
  "h2_167":"Visual styling",
  "p_168":"Combining the surface and atmosphere decisions:",
  "li_169":"<b>Global appearance (orbit view).</b> A small, intensely glowing world hugging its star — the dayside an orange-incandescent magma hemisphere (<span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code>), the nightside a dark fractured crust (<span class=\"hex-chip\" style=\"background:#2a1c14\"></span><code>#2a1c14</code>), with a sharp, dramatic day-night terminator between them.",
  "li_170":"<b>Dayside.</b> A molten substellar magma ocean radiating in the orange-red (~2400–2700 K). The substellar PQS/emissive map should peak at <span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code>–<span class=\"hex-chip\" style=\"background:#ff8030\"></span><code>#ff8030</code> within ~30° of the substellar point, fading outward as the surface cools toward the terminator. This is the brightest single surface feature in the inner 55 Cnc system.",
  "li_171":"<b>Terminator band.</b> Narrow and dramatic — the incandescent dayside drops sharply to the dark nightside over a thin band where the magma quenches and silicate clouds condense. High visual contrast; the signature look of the planet.",
  "li_172":"<b>Nightside.</b> Much darker (~1300 K) — dark basaltic crust with only faint residual thermal-IR glow and occasional volcanic hotspots (Io-like, per Demory 2016). Not fully black like an airless rock, because re-radiation and atmospheric transport keep it warm.",
  "li_173":"<b>Atmosphere haze.</b> A thin, hazy warm-grey CO₂/silicate-vapor veil (<span class=\"hex-chip\" style=\"background:#d9c4a0\"></span><code>#d9c4a0</code> limb), with patchy silicate/metal-oxide clouds (<span class=\"hex-chip\" style=\"background:#b0a088\"></span><code>#b0a088</code>) near the terminator and nightside. The limb shows a faint glowing rim where the hot dayside atmosphere catches the line of sight.",
  "li_174":"<b>Star in sky.</b> 55 Cnc A is enormous: 32.6° angular diameter — the star fills roughly a third of the sky, a vast warm-orange (5196 K) dome rather than a point. Its surface brightness dominates everything; the dayside is in perpetual blinding daylight.",
  "li_175":"<b>Sister planets in sky.</b> Planet b (next out at 0.118 AU) appears as a bright warm point; at conjunction it subtends only a small angle. None of the sibling planets rivals the host star&#x27;s dominance.",
  "li_176":"<b>Volcanic flicker (optional, faithful).</b> Per Demory 2016&#x27;s observed factor-3.7 variability, the substellar glow can be animated to brighten and dim on multi-year timescales, with occasional Io-like plume/lava-flow events — a distinctive and physically motivated visual touch.",
  "h2_177":"Canonical alternatives",
  "p_178":"The atmosphere of 55 Cnc e is the one place where the cfg makes a documented choice between two literature-supported readings. The cfg adopts the <b>outgassed-secondary-atmosphere</b> scenario (Hu 2024) as default but preserves the bare-lava-rock alternative.",
  "h3_179":"Diverged cfg picks",
  "th_180":"Field",
  "th_181":"Gameplay (in cfg)",

  "th_183":"Why diverged",
  "td_184":"<span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span> / <span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span>",
  "td_185":"true / 100000 Pa (CO₂/CO outgassed secondary atmosphere, Hu 2024)",
  "td_186":"false / 0 Pa (bare lava surface with no atmosphere; the older Demory 2016a &quot;no-atmosphere magmatic surface&quot; reading and the long-standing airless-USP prior)",
  "td_187":"Both are within the observation window: the JWST emission spectrum (Hu 2024) favors a volatile atmosphere, but a bare incandescent lava surface remains a viable interpretation and is the default expectation for most USP planets. The cfg picks the atmosphere because the outgassed CO₂/CO veil + silicate clouds give a richer, more distinctive render (haze, terminator clouds, limb glow) than a bare rock, and because Hu 2024 is the most recent direct constraint. The airless-lava variant is preserved in Open items.",
  "h2_188":"Bibliography",
  "h3_189":"Read (visual-informative, drove decisions above)",
  "li_190":"<b>Bourrier V. et al. 2018</b> — <i>The 55 Cnc system reassessed</i>, A&amp;A 619, A1 (<code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>). Planet e mass 8.0 ± 0.3 M⊕, HST/STIS optical radius 1.88 ± 0.03 R⊕, density 6.7 ± 0.4 g/cc; interior model favors a heavyweight few-percent-radius atmosphere, rules out H/He (lost in ~80 000 yr) and extended water. <b>Phase 2 anchor for orbit / mass / radius / density.</b>",
  "li_191":"<b>Demory B.-O. et al. 2016</b> — <i>Variability in the super-Earth 55 Cnc e</i>, Nature 532, 207 (<code>2016Natur.532..207D</code>, <a href=\"https://arxiv.org/abs/1505.00269\">arXiv:1505.00269</a>). Spitzer 4.5 μm dayside brightness temperature variable from 1365 to 2528 K over a year (4σ; full range ~1273–2816 K); T_eq ~2400 K; attributes variability to Io-like surface/volcanic activity or circumstellar material. <b>The anchor for the dayside temperatures, magma-ocean surface, and the volcanic-variability visual.</b>",
  "li_192":"<b>Hu R. et al. 2024</b> — <i>A secondary atmosphere on the rocky exoplanet 55 Cnc e</i>, Nature 630, 609 (<code>2024Natur.630..609H</code>; no arXiv preprint — read via the Nature abstract / Phase 2 bib annotation). JWST MIRI/NIRCam secondary eclipse favors a volatile (CO/CO₂) outgassed secondary atmosphere over a bare lava surface or a primordial envelope. <b>Drives the atmosphere-present decision.</b> Tier-A manual followup — re-verify the exact CO/CO₂ mixing ratios when the full text is pasted.",
  "h3_193":"Read (context / methodology, not decision-driving)",
  "li_194":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>. Stellar R/Teff/L anchor → the L = 0.582 L☉ used in the T_eq derivation; model-independent super-Earth diameter ~2.1 R⊕ (superseded by Bourrier 2018&#x27;s STIS 1.88 R⊕).",
  "li_195":"<b>Madhusudhan N. &amp; Redfield S. 2015</b> — clouds less likely on the hottest exoplanet daysides; informs the suppressed-substellar-cloud choice.",
  "h3_196":"Read (instrument-only, not visual-informative)",
  "li_197":"<b>Ehrenreich D. et al. 2012</b> — no hydrogen exosphere detected on 55 Cnc e; rules out a primordial H envelope.",
  "li_198":"<b>Esteves L. et al. 2017</b> — no extended water-rich atmosphere; disfavors the wet-envelope scenario.",
  "h3_199":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_200":"Early radius/phase-curve papers (Winn 2011, Gillon 2012, Dragomir 2014), the disintegrating-exomercury comparison literature, and JWST follow-up conference proceedings. The full filtered bib is preserved in <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_201":"Open items for follow-up",
  "li_202":"<b>Hu 2024 full text.</b> The CO/CO₂ atmosphere decision rests on the Nature abstract; when the full text is pasted, re-verify the exact composition, mixing ratios, and dayside temperature retrieval, and refine <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> / <span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span> from tie-break toward measured.",
  "li_203":"<b>Airless-lava cfg variant.</b> Preserved per the Canonical alternatives: a bare incandescent lava surface with <code>atmosphere_present = false</code>, no haze, sharper limb, and a fully thermal-emission dayside. Ship as an alternate cfg.",
  "li_204":"<b>Variability animation.</b> Demory 2016&#x27;s factor-3.7 dayside variability is real and unique among super-Earths; a cfg that animates the substellar brightness on multi-year timescales (with occasional volcanic plume/lava events) would be the most faithful rendering. Refine the timescale if longer-baseline JWST monitoring publishes a period.",
  "li_205":"<b>Refine albedo / temperatures.</b> The Bond albedo (0.1) and nightside temperature (1300 K) are medium/low confidence; a JWST phase curve (analogous to the TRAPPIST-1 b/c thermal phase curves) would pin the redistribution and tighten these.",

  ko: {
  "p_1":"55 Cnc e 는 밝은 K0 IV-V 항성 55 Cnc A 주위를 0.737일(17.7시간) 주기로 도는 1.88 R⊕, 8.0 M⊕ 의 초단주기(USP) 초지구로, 궤도 장반경은 고작 0.0154 AU 입니다. 지구의 ~2450배 일사를 받아 평형 온도 T_eq(A=0) ≈ 1959 K 가 나옵니다(모성 L = 0.582 L☉ 에서 T_eq = 278.3·L^0.25/√a 로 유도). 또한 통과합니다—통과 행성을 거느린 가장 밝은 별이라—반지름이 고정되며(Bourrier 2018 HST/STIS: 530–750 nm 에서 1.88 ± 0.03 R⊕), RV 질량(8.0 ± 0.3 M⊕)과 함께 벌크 밀도(6.7 ± 0.4 g/cc, 기껏해야 얇은 휘발성 외피를 가진 암석/규산염 조성과 일관)도 정해집니다. Spitzer 4.5 μm 주간면 열복사는 강하게 <b>변동</b>합니다—Demory 2016 은 주간면 밝기 온도가 단 1년 사이에 ~1365 K 와 ~2528 K 를 오가는 것을(4σ) 측정했고, 전체 범위는 ~1300–2800 K 에 걸칩니다. JWST MIRI/NIRCam 이차 식 관측(Hu 외 2024, Nature)은 벗은 용암 표면이나 원시 외피보다 휘발성 풍부한 <b>탈가스 이차 대기</b>(CO/CO₂)를 선호합니다.",
  "p_2":"<b>NearStars 시나리오 선택: 가시광으로 빛나는 용융 주간면(~2000–2700 K)을 가진 빛나는 용암 초지구, 마그마 바다에서 공급된 CO₂/CO 의 탈가스 이차 대기, 그리고 작열하는 주간면과 훨씬 어둡고 부분적으로 고화된 야간면을 가르는 극적인 주-야 종단선.</b> 이는 Hu 2024 의 탈가스-대기 해석 및 Demory 2016 의 마그마-바다 / 화산 변동성 힌트와 일치합니다. 벗은-무대기-암석 대안은 cfg 변종으로 보존합니다.",

  "td_150":"high",
  "td_151":"von Braun 2011 항성 Teff",
  "h2_152":"Surface synthesis",
  "p_153":"55 Cnc e 는 이 계의 헤드라인 천체입니다. 0.0154 AU 에서 0.737일 궤도가 지구의 ~2450배 일사를 퍼붓는 통과 USP 초지구입니다. 측정된 벌크 밀도 6.7 ± 0.4 g/cc(Bourrier 2018)는 암석 / 규산염 주도 내부와 일관됩니다—순수 물 세계보다 밀하고 철이 풍부한 수성 유사체보다 가벼우며—기껏해야 반지름의 수%를 차지하는 얇은 휘발성 외피를 가집니다. T_eq ≈ 1959 K 이고 점성점 정점 온도가 ~2700 K 에 이르는 가운데, 주간면 암석권은 대부분의 그럴듯한 광물 조성에서 규산염 고상선에 있거나 그 이상입니다. <b>주간 반구는 마그마 바다입니다.</b>",
  "p_154":"가장 깔끔한 관측 정박은 Demory 2016 의 Spitzer 4.5 μm 주간면 열복사 캠페인으로, 4σ <b>변동성</b>을 검출했습니다. 주간면 밝기 온도가 2012 년의 1365 +219/−257 K 에서 2013 년의 2528 +224/−229 K 로 출렁였습니다—단 1년 사이 식 깊이의 배수 3.7 변화(47 → 176 ppm), 전체 토이-모델 외피는 ~1273–2816 K 입니다. 이 변동성은 항성 흑점이나 느린 조성 표류로는 설명되지 않습니다. Demory 2016 은 대규모 표면 활동(강한 조석 가열에 의한 Io 같은 화산 재포장)이나 일시적 주성/주행성 물질 중 하나를 소환합니다. NearStars 에서는 이것이 정적인 용암 평원이 아니라 시각적으로 역동적이고 화산으로 재포장된 주간면을 동기 부여합니다.",
  "p_155":"<b>색 선택.</b> 주간면은 반사가 아니라 <b>열복사</b>가 지배합니다: 2400–2700 K 의 규산염 용융은 가시광에서 강하게 복사하며 주황-적색에서 정점을 찍습니다. 점성점 액센트 <span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code> 은 이 작열을 인코딩합니다—빛나는 마그마 표면으로, 행성에서 단연 가장 밝은 특징입니다. 표면이 고화된 곳(더 차가운 종단선과 야간면)에서 급랭된 ultramafic 지각은 매우 어두워 <span class=\"hex-chip\" style=\"background:#2a1c14\"></span><code>#2a1c14</code> 입니다. 빛나는 낮과 어두운 밤의 대비가 행성의 정의적 시각 특징입니다. 주간면에서는 모성의 따뜻한 5196 K K0 빛보다 행성 자체의 작열이 훨씬 중요합니다.",
  "p_156":"<b>형태.</b> 세 가지 기여 과정: (1) 대류하며 종단선으로 흘러가 급랭될 수도 있는 점성점 마그마 바다. (2) 조석 가열로 구동되는 Io 같은 화산 재포장(Demory 2016)—관측된 밝기 변동성을 만드는 일시적 플룸과 용암류. (3) 재복사된 열과 대기 수송이 온도를 ~1300 K 근처로 유지하는 고화·균열된 야간면 지각. 기본 텍스처: 좁은 작열 종단선을 거쳐 어둡고 갈라진 현무암질 야간면으로 옮겨가는 빛나는 주황 점성점 용암 못입니다.",
  "h2_157":"Atmosphere synthesis",
  "p_158":"55 Cnc e 의 대기 본질은 10년 넘게 논쟁되었고, JWST 시대가 증거를 <b>탈가스 이차 대기</b>로 기울였습니다. Bourrier 2018 의 내부 모델링은 8.0 M⊕ 질량과 1.88 R⊕ 광학 반지름을 결합해 반지름의 수%를 차지하는 &quot;무거운&quot; 대기를 선호합니다. 원시 H/He 외피는 ~80,000년 안에 손실되므로 배제되고(수소 외기권도 검출 안 됨, Ehrenreich 2012), 확장 물 풍부 외피도 비선호됩니다 (Esteves 2017). 건조 시나리오 평균 분자량은 높아서 μ = 13.5 +17.9/−7.7 g/mol 입니다. Hu 외 2024(JWST MIRI/NIRCam 이차 식)는 방출 스펙트럼이 벗은 용암 표면과 원시 외피 모두보다 <b>CO 와 CO₂</b> 의 휘발성 풍부 대기를 선호함을 밝혔습니다—아래의 마그마 바다에서 탈가스된 대기입니다.",
  "li_159":"<b>압력.</b> cfg 는 ~1 bar(100,000 Pa)를 자릿수 수준의 탈가스-대기 선택으로 채택합니다(Confidence=low — 절대 표면 압력은 직접 측정되지 않음). 이는 tie-break 입니다: 두꺼운 온실이 아니라 마그마 바다와 증기압 평형을 이루는 얇고 높은 평균 분자량의 CO₂/CO 외피입니다.",
  "li_160":"<b>조성.</b> CO₂ + CO 주도(Hu 2024), 용융 점성점 근처에 규산염-증기 화학종(SiO, Na 등). 높은 평균 분자량(Bourrier 2018), H/He 없고 확장 물 없음과 일관.",
  "li_161":"<b>하늘 외관.</b> 주간면 표면에서 하늘은 흐릿한 따뜻-색조의 CO₂/규산염 증기 베일(<span class=\"hex-chip\" style=\"background:#d9c4a0\"></span><code>#d9c4a0</code> 림 색조)로, 거대한 모성이 지배할 만큼 얇습니다. 규산염/ 금속-산화물 구름(포스테라이트/엔스타타이트 회색, <span class=\"hex-chip\" style=\"background:#b0a088\"></span><code>#b0a088</code>)은 더 차가운 종단선과 야간면 위에 응결할 수 있으나, 응결하기엔 온도가 너무 높은 작열 점성점 마그마 위에서는 억제됩니다(Madhusudhan 2015).",
  "p_162":"변동성(Demory 2016)은 이 대기에 규산염 먼지나 화산 불투명도가 일시적으로 주입되는 것을 그럴듯하게 반영합니다—4.5 μm 밴드에서 흡수하는 광학적으로 두꺼운 물질 수십 척도 높이 분량—따라서 대기는 균일하기보다 역동적이고 패치형으로 렌더링하는 것이 가장 좋습니다.",
  "h2_163":"Rotation &amp; spin synthesis",
  "p_164":"0.0154 AU 에서 0.737일 궤도로, 55 Cnc e 는 1:1 자전-궤도 공명에 확고히 조석 고정되어 있습니다. 궤도는 본질적으로 원형화되어(e = 0.05, 2σ 에서 0 과 일관. Bourrier 2018) Vinson 2017 / Makarov 2018 기준(3:2 는 e ≳ 0.01 에서만 안정, 그 아래는 1:1 선호)에 따라 e 를 동기 자전 영역에 둡니다. 자전축 경사는 0 으로 감쇠합니다. 따라서 점성점은 표면 좌표계에서 고정— 마그마 바다는 별 아래 영구히 고정됩니다.",
  "p_165":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 0.7365474일(63,638초). Kopernicus 에서 천체의 <code>rotationPeriod</code> 는 궤도 <code>period</code>(초)와 같아야 합니다.",
  "p_166":"<b>계절 없음.</b> 자전축 경사 = 0 이고 이심에 의한 칭동이 거의 0 이라 계절 주기가 없습니다. 유일한 시간 변동은 Demory 2016 의 (실제로 관측된) 일시적 화산/대기 변동성으로, cfg 는 점성점 영역의 느린 밝기 깜박임으로 수년 척도에 렌더링할 수 있습니다.",
  "h2_167":"Visual styling",
  "p_168":"표면과 대기 결정을 종합하면 다음과 같습니다.",
  "li_169":"<b>전체 외관(궤도 뷰).</b> 별을 바싹 끌어안은 작고 강렬하게 빛나는 세계— 주간면은 주황-작열 마그마 반구(<span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code>), 야간면은 어둡게 갈라진 지각 (<span class=\"hex-chip\" style=\"background:#2a1c14\"></span><code>#2a1c14</code>), 그 사이를 날카롭고 극적인 주-야 종단선이 가릅니다.",
  "li_170":"<b>주간면.</b> 주황-적색(~2400–2700 K)으로 복사하는 용융 점성점 마그마 바다. 점성점 PQS/방출 맵은 점성점에서 ~30° 이내에 <span class=\"hex-chip\" style=\"background:#ff5a18\"></span><code>#ff5a18</code>–<span class=\"hex-chip\" style=\"background:#ff8030\"></span><code>#ff8030</code> 에서 정점을 찍고, 바깥으로 갈수록 표면이 종단선 쪽으로 식으며 옅어집니다. 이는 안쪽 55 Cnc 계에서 가장 밝은 단일 표면 특징입니다.",
  "li_171":"<b>종단선 띠.</b> 좁고 극적—작열하는 주간면이 마그마가 급랭하고 규산염 구름이 응결하는 얇은 띠를 거쳐 어두운 야간면으로 급격히 떨어집니다. 높은 시각 대비. 행성의 시그니처 외관입니다.",
  "li_172":"<b>야간면.</b> 훨씬 어두움(~1300 K)—희미한 잔여 열-IR 작열과 간헐적 화산 핫스폿(Io 같음, Demory 2016)만 있는 어두운 현무암질 지각. 재복사와 대기 수송이 따뜻하게 유지하므로 벗은 암석처럼 완전히 검지는 않습니다.",
  "li_173":"<b>대기 헤이즈.</b> 얇고 흐릿한 따뜻-회색 CO₂/규산염-증기 베일(<span class=\"hex-chip\" style=\"background:#d9c4a0\"></span><code>#d9c4a0</code> 림)에, 종단선과 야간면 근처에 패치형 규산염/금속-산화물 구름(<span class=\"hex-chip\" style=\"background:#b0a088\"></span><code>#b0a088</code>). 뜨거운 주간면 대기가 시선에 걸리는 곳에서 림이 희미하게 빛나는 테를 보입니다.",
  "li_174":"<b>하늘의 별.</b> 55 Cnc A 는 거대합니다: 각지름 32.6° — 별이 하늘의 약 1/3 을 채우며, 점이 아니라 광활한 따뜻-주황(5196 K) 돔입니다. 그 표면 밝기가 모든 것을 압도하며, 주간면은 영원한 눈부신 대낮입니다.",
  "li_175":"<b>하늘의 자매 행성.</b> 행성 b(0.118 AU 바깥)는 밝은 따뜻한 점으로 나타나며, 합 때에도 작은 각만 차지합니다. 어떤 자매 행성도 모성의 지배에 견주지 못합니다.",
  "li_176":"<b>화산 깜박임(선택, 고증적).</b> Demory 2016 이 관측한 배수 3.7 변동성에 따라, 점성점 작열을 수년 척도로 밝아지고 어두워지게 애니메이션하고 간헐적 Io 같은 플룸/용암류 이벤트를 넣을 수 있습니다—독특하고 물리적으로 동기 부여된 시각 터치입니다.",
  "h2_177":"Canonical alternatives",
  "p_178":"55 Cnc e 의 대기는 cfg 가 문헌이 지지하는 두 읽기 사이에서 기록된 선택을 하는 유일한 지점입니다. cfg 는 <b>탈가스-이차-대기</b> 시나리오(Hu 2024)를 기본으로 채택하되 벗은-용암-암석 대안을 보존합니다.",
  "h3_179":"Diverged cfg picks",
  "th_180":"Field",
  "th_181":"Gameplay (in cfg)",
  "th_182":"Canonical alternative",
  "th_183":"Why diverged",
  "td_184":"<span class=\"field-tt\" data-ko-tip=\"대기 존재 여부 (true/false 또는 정성 표현).\" data-en-tip=\"Whether the planet has an atmosphere (true/false or qualitative).\"><code>atmosphere_present</code></span> / <span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span>",
  "td_185":"true / 100000 Pa(CO₂/CO 탈가스 이차 대기, Hu 2024)",
  "td_186":"false / 0 Pa(대기 없는 벗은 용암 표면. 더 오래된 Demory 2016a &quot;무대기 마그마 표면&quot; 읽기와 오랜 무대기-USP 사전 기대)",
  "td_187":"둘 다 관측 윈도 안: JWST 방출 스펙트럼(Hu 2024)은 휘발성 대기를 선호하나, 벗은 작열 용암 표면도 여전히 유효한 해석이며 대부분 USP 행성의 기본 기대입니다. cfg 는 탈가스 CO₂/CO 베일 + 규산염 구름이 벗은 암석보다 더 풍부하고 독특한 렌더(헤이즈, 종단선 구름, 림 작열)를 주고 Hu 2024 가 가장 최근의 직접 제약이라 대기를 택합니다. 무대기-용암 변종은 Open items 에 보존됩니다.",
  "h2_188":"Bibliography",
  "h3_189":"Read (visual-informative, drove decisions above)",
  "li_190":"<b>Bourrier V. et al. 2018</b> — <i>The 55 Cnc system reassessed</i>, A&amp;A 619, A1 (<code>2018A&amp;A...619A...1B</code>, <a href=\"https://arxiv.org/abs/1807.04301\">arXiv:1807.04301</a>). 행성 e 질량 8.0 ± 0.3 M⊕, HST/STIS 광학 반지름 1.88 ± 0.03 R⊕, 밀도 6.7 ± 0.4 g/cc. 내부 모델은 무거운 반지름 수% 대기를 선호하고, H/He(~80,000 yr 에 손실)와 확장 물을 배제. <b>궤도 / 질량 / 반지름 / 밀도의 Phase 2 정박.</b>",
  "li_191":"<b>Demory B.-O. et al. 2016</b> — <i>Variability in the super-Earth 55 Cnc e</i>, Nature 532, 207 (<code>2016Natur.532..207D</code>, <a href=\"https://arxiv.org/abs/1505.00269\">arXiv:1505.00269</a>). Spitzer 4.5 μm 주간면 밝기 온도가 1년 사이 1365 에서 2528 K 로 변동(4σ. 전체 범위 ~1273–2816 K). T_eq ~2400 K. 변동성을 Io 같은 표면/화산 활동이나 주성 물질에 귀속. <b>주간면 온도, 마그마-바다 표면, 화산-변동성 시각의 정박.</b>",
  "li_192":"<b>Hu R. et al. 2024</b> — <i>A secondary atmosphere on the rocky exoplanet 55 Cnc e</i>, Nature 630, 609 (<code>2024Natur.630..609H</code>. arXiv 프리프린트 없음 — Nature 초록 / Phase 2 bib 주석 경유로 읽음). JWST MIRI/NIRCam 이차 식이 벗은 용암 표면이나 원시 외피보다 휘발성(CO/CO₂) 탈가스 이차 대기를 선호. <b>대기-존재 결정을 좌우.</b> Tier-A 수동 후속 — 전체 텍스트가 붙여지면 정확한 CO/CO₂ 혼합비를 재확인.",
  "h3_193":"Read (context / methodology, not decision-driving)",
  "li_194":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, <a href=\"https://arxiv.org/abs/1107.1936\">arXiv:1107.1936</a>. 항성 R/Teff/L 정박 → T_eq 유도에 쓰인 L = 0.582 L☉. 모델-독립 초지구 지름 ~2.1 R⊕(Bourrier 2018 STIS 1.88 R⊕ 로 대체됨).",
  "li_195":"<b>Madhusudhan N. &amp; Redfield S. 2015</b> — 가장 뜨거운 외계행성 주간면에 구름이 덜 형성됨. 점성점-구름 억제 선택에 정보를 줌.",
  "h3_196":"Read (instrument-only, not visual-informative)",
  "li_197":"<b>Ehrenreich D. et al. 2012</b> — 55 Cnc e 에 수소 외기권 미검출. 원시 H 외피 배제.",
  "li_198":"<b>Esteves L. et al. 2017</b> — 확장 물 풍부 대기 없음. 습윤-외피 시나리오 비선호.",
  "h3_199":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_200":"초기 반지름/위상-곡선 논문(Winn 2011, Gillon 2012, Dragomir 2014), 붕괴-외계수성 비교 문헌, JWST 후속 학회 자료. 완전한 필터링 bib 는 <code>docs/phase3/_bib/55-cnc.yaml</code> 에 보존됩니다.",
  "h2_201":"Open items for follow-up",
  "li_202":"<b>Hu 2024 전체 텍스트.</b> CO/CO₂ 대기 결정은 Nature 초록에 기댑니다. 전체 텍스트가 붙여지면 정확한 조성, 혼합비, 주간면 온도 검색을 재확인하고 <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> / <span class=\"field-tt\" data-ko-tip=\"표면 대기압 (Pa). 1 bar = 100,000 Pa.\" data-en-tip=\"Surface atmospheric pressure in Pa. 1 bar = 100,000 Pa.\"><code>atmosphere_surface_pressure_pa</code></span> 를 tie-break 에서 측정값으로 다듬어야 합니다.",
  "li_203":"<b>무대기-용암 cfg 변종.</b> Canonical alternatives 에 따라 보존: 벗은 작열 용암 표면으로 <code>atmosphere_present = false</code>, 헤이즈 없음, 날카로운 림, 완전 열복사 주간면. 대체 cfg 로 배포.",
  "li_204":"<b>변동성 애니메이션.</b> Demory 2016 의 배수 3.7 주간면 변동성은 실재하며 초지구 중 유일합니다. 점성점 밝기를 수년 척도로(간헐적 화산 플룸/용암 이벤트와 함께) 애니메이션하는 cfg 가 가장 고증적인 렌더가 될 것입니다. 더 긴 베이스라인 JWST 모니터링이 주기를 출판하면 시간 척도를 다듬습니다.",
  "li_205":"<b>알베도 / 온도 정제.</b> 본드 알베도(0.1)와 야간면 온도(1300 K)는 medium/low 신뢰도입니다. (TRAPPIST-1 b/c 열 위상 곡선에 준하는) JWST 위상 곡선이 재분배를 고정하고 이들을 조일 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
