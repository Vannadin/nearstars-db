  "h2_105":"Surface synthesis",
  "p_106":"61 Vir&#x27;s photosphere sits ~200 K cooler than Sol — Teff 5568 K (Rathsam 2023) versus the 5772 K solar reference — but at otherwise solar-twin parameters: mass 0.93 M☉ (Rathsam 2023), radius 0.987 R☉ (von Braun 2014 CHARA), [Fe/H] within 0.01 dex of solar (Rathsam 2023). The luminosity 0.822 L☉ is the natural consequence of the slightly lower temperature given an essentially solar radius. In the visible band the spectrum carries the canonical G-dwarf Ca II H&amp;K, Mg b, Na D, and Hα signature with line depths intermediate between a Sun-like G2V and a slightly redder K0V; high-resolution differential spectroscopy by Rathsam et al. 2023 (anchored on solar-analog lithium depletion) confirms the solar-twin abundance pattern, with no anomalous lithium depletion or rapid-rotator veiling.",
  "p_107":"Granulation patterns from 3D radiative-hydrodynamic simulations (STAGGER/CO5BOLD family, as applied to similar G6/G7V targets in the Magic 2013 grid) predict cell sizes ~10% larger than solar and contrast slightly higher than Sol, scaling with the slower convective turnover at the cooler Teff. Sunspot coverage tracks the chromospheric log R&#x27;HK = −5.0 (Isaacson &amp; Fischer 2010), placing 61 Vir in the quiet-dwarf locus alongside τ Ceti and α Cen B — peak coverage during any inferred activity cycle would be ≲ 0.3% of the visible disk, slightly less than Sol&#x27;s solar-maximum.",
  "p_108":"Limb darkening at H band is not directly measured for 61 Vir (no PIONIER campaign comparable to α Cen A&#x27;s Kervella 2017), but the 1D-atmosphere prediction places α_H ≈ 0.20 — slightly stronger than α Cen A&#x27;s measured 0.14 in line with the cooler Teff. NearStars adopts the 1D prediction with Confidence=medium pending direct interferometric follow-up.",
  "p_109":"The slight amber shift in the visual tint is a tie-break: the blackbody peak at 5568 K is shifted ~7% redward of solar in λ_max terms, contributing to the slightly creamier visual cue selected over a pure solar match.",
  "h2_110":"Atmosphere synthesis",
  "p_111":"61 Vir hosts a quiet G-dwarf chromosphere–transition-region–corona structure characteristic of an old, magnetically inactive solar twin. The chromospheric S-index (Wilson 1968 Mt Wilson convention) translates to log R&#x27;HK ≈ −5.0 (Isaacson &amp; Fischer 2010), about 0.05 dex quieter than the modern Sun at solar minimum and a full 0.20 dex below typical young G-dwarfs. The transition-region UV emission and the X-ray luminosity log L_X = 26.7–27.0 cgs (0.1–2 keV, Schmitt &amp; Liefke 2004 NEXXUS-2 catalog) place 61 Vir squarely in the inactive G-dwarf locus.",
  "p_112":"No long-term activity cycle has been resolved for 61 Vir comparable to α Cen A&#x27;s 19-yr Robrade 2016 detection — the chromospheric monitoring record is shorter and the underlying cycle amplitude is expected to be small. Flares above the photometric noise floor are not reported; 61 Vir provides a benign space-weather environment for any inner planet (and the three Vogt 2010 planets all sit inside a &lt; 0.5 AU envelope).",
  "p_113":"The integrated XUV luminosity is below 10⁻⁴ L_bol, similar to or quieter than solar, and would be unable to materially erode an Earth-mass primary atmosphere on Gyr timescales for any planet at or beyond ~0.3 AU. The inner planet b (0.050 AU, separate Phase 3 workspace) sits in the photoevaporation-influenced regime, but the stellar XUV contribution is no more aggressive than Sol&#x27;s at the equivalent insolation.",
  "h2_114":"Rotation &amp; spin synthesis",
  "p_115":"The 32.1 ± 0.2 day rotation period (Yu et al. 2024 from a multidimensional Gaussian-process fit to 18 years of HARPS RV and activity-indicator time series) is the first direct detection, superseding the older Wright 2004 estimate (~29 d from chromospheric S_HK fluctuations) and the Vogt 2010 §4 RV-jitter inference (28–30 d power in the residuals). At ~8 Gyr (Rathsam 2023 isochrone) and via the Skumanich braking law P_rot ∝ √t scaled from a solar-type ZAMS spin, the expected rotation period is 30–35 d, which 61 Vir&#x27;s measured 32.1 d matches exactly — the new value is in better accord with the modern isochrone age than the older 29 d figure was with the Mamajek 2008 activity age, and provides additional support for the isochrone-led age picture.",
  "p_116":"Asteroseismic detections are not yet available for 61 Vir — the star&#x27;s Vmag = 4.71 makes it observable but no dedicated p-mode campaign equivalent to Bedding 2004 for α Cen A has been carried out; HARPS RV time series would in principle support a detection. Differential rotation is not directly resolved; following the Skumanich locus solar analog, the equator is expected to rotate ~20% faster than the poles.",
  "p_117":"The rotation axis inclination is unconstrained — for visual rendering NearStars adopts an axis tilted 30° to the ecliptic of the inner planetary system, consistent with a randomly oriented spin axis. The Vogt 2010 inclination posterior for b/c/d is consistent with a co-planar near-edge-on system but cannot be tied directly to the stellar spin.",
  "h2_118":"Visual styling",
  "p_119":"In the NearStars renderer, 61 Vir is portrayed as a warm-cream G6.5V star — visually close to Sol but tinted slightly amber to encode the ~200 K cooler photosphere. The visual hex <span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> is a tie-break choice against a pure solar match: it gives the player an immediate cue that this is a cooler G-dwarf than their Sol reference, which helps distinguish 61 Vir from other near-solar Phase 3 targets (α Cen A&#x27;s <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> cream, 47 UMa, etc.).",
  "li_120":"<b>Orbit view (system entry)</b>: solar-yellow point source surrounded by a faint, near-circular debris ring centred at ~30 AU radius, extending out to ~96 AU. The ring is rendered as a thin grey-blue scattering band with opacity 0.10 — visible but obviously faint, not a Saturn-class ring.",
  "li_121":"<b>Close-in view (within the planet zone, &lt; 1 AU)</b>: the debris ring recedes into the background; the three inner planets (b at 0.05 AU, c at 0.22 AU, d at 0.48 AU) appear as foreground points of light during planet phase, with b&#x27;s super-Earth disk and c/d&#x27;s sub-Neptune disks resolved only at very close range.",
  "li_122":"<b>Surface view (from a planet)</b>: a recognizable solar-type disk with mild limb darkening, granulation pattern, and faint sunspots during any active phase. The 0.96 R☉ star at 0.48 AU (planet d) would span ~0.53° angular diameter, almost exactly the Sun&#x27;s apparent size from Earth — a near-perfect Sol analog for the outer-planet observer.",
  "li_123":"<b>Star in sky from Earth</b>: at Vmag 4.71 the star is naked-eye but unremarkable, embedded in the constellation Virgo near the ecliptic; in NearStars&#x27; real-stars-only mode the star appears at its Gaia DR3 J2016.0 sky position propagated linearly to the game epoch.",
  "li_124":"<b>Debris ring viewed from a hypothetical outer planet</b>: at, say, 10 AU the ring would form a thin diffuse band along the ecliptic, brightest in scattered light when illuminated from the back side — analogous to how the Sun&#x27;s Edgeworth–Kuiper belt would appear to an observer at Neptune&#x27;s orbit but 6–8× brighter due to the higher dust mass.",
  "li_125":"<b>Quiet-star animation</b>: spot rendering is muted — peak coverage ≲ 0.3% of the disk, much less dramatic than Sol&#x27;s solar-maximum spotting. No prominent flare or CME visual effects.",
  "h2_126":"Bibliography",
  "h3_127":"Read (visual-informative, drove decisions above)",
  "li_128":"<b>Rathsam A., Meléndez J. &amp; Carvalho Silva G. 2023</b> — <i>Lithium depletion in solar analogs: age and mass effects</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589, arXiv:2309.00471). Solar-analog differential high-resolution spectroscopy; supplies the Phase 2 anchors for Teff (5568 ± 4 K), mass (0.93 ± 0.01 M☉), [Fe/H] (+0.006 ± 0.004), age (7.70 +0.28/-0.26 Gyr), and log g (4.390 ± 0.012). <b>Primary Phase 2 anchor for 61 Vir</b> (newest paper, smallest uncertainties); replaces Pavlenko 2012 in the earlier draft.",
  "li_129":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters and temperatures V — 11 newly characterized exoplanet host stars</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360, arXiv:1312.1792). CHARA long-baseline optical interferometry — direct angular diameter for 61 Vir combined with Hipparcos parallax. Supplies the <b>only direct radius</b> (R = 0.9867 ± 0.0048 R☉) and the canonical bolometric luminosity (L = 0.8222 ± 0.0033 L☉). Earlier Phase 3 drafts incorrectly attributed Vogt 2010 as the interferometric source — that attribution was wrong (Vogt 2010 used Takeda 2007 isochrone) and is corrected here.",
  "li_130":"<b>Yu H. et al. 2024</b> — <i>Modelling stellar variability in archival HARPS data: I — Rotation and activity properties with multidimensional Gaussian processes</i>, MNRAS 528, 5511 (<code>2024MNRAS.528.5511Y</code>, doi:10.1093/mnras/stae137, arXiv:2401.05528). First direct rotation-period detection for 61 Vir: P_rot = 32.1 ± 0.2 d from a multidimensional-GP fit to 18 years of HARPS RV + activity time series. Supersedes the Wright 2004 / Vogt 2010 §4 inferences of ~29 d.",
  "li_131":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>, doi:10.1088/0004-637X/708/2/1366). The foundational paper for the three planet detections (b 4.215 d, c 38.021 d, d 123.01 d) — HIRES + AAT joint RV solution. Adopts Takeda 2007 stellar parameters (M = 0.942 ± 0.034 M☉, R = 0.963 ± 0.011 R☉, age 8.96 +2.76/-3.08 Gyr from isochrone). Now demoted to cross-check for stellar parameters; remains the primary planet detection paper.",
  "li_132":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir: implications for the prevalence of debris in low-mass planetary systems</i>, MNRAS 424, 1206 (<code>2012MNRAS.424.1206W</code>, doi:10.1111/j.1365-2966.2012.21298.x, arXiv:1206.2370 — earlier draft cited 1204.6063 in error). Herschel/PACS resolved imaging of the cold debris belt at 70/100/160 μm; single broad ring centred near ~30 AU extending to ~96 AU, dust temperature ~50 K, dust mass 6–8× Sun&#x27;s KBO inventory. Anchors every Circumstellar-disk Decisions row.",
  "li_133":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Chromospheric activity-age + isochrone combo giving 6.1 ± 1.7 Gyr — the <b>younger end</b> of the literature spread. <b>Documented divergence</b> vs. Rathsam 2023 / von Braun 2014 / Vogt 2010 isochrone consensus (~7.7–9 Gyr); Phase 3 picks the isochrone value but flags Confidence=medium to reflect the unresolved split.",
  "li_134":"<b>Wright J. T. et al. 2004</b> — <i>Chromospheric Ca II Emission in Nearby F, G, K, and M Stars</i>, ApJS 152, 261 (<code>2004ApJS..152..261W</code>, doi:10.1086/386283). Catalog of Mt-Wilson S-indices and inferred rotation periods; 61 Vir P_rot ≈ 29 d from S_HK fluctuations — now superseded by Yu 2024&#x27;s direct 32.1 ± 0.2 d. Cross-check.",
  "h3_135":"Read (context / methodology, not directly decision-driving)",
  "li_136":"<b>Isaacson H. &amp; Fischer D. 2010</b> — <i>Chromospheric Activity and Jitter Measurements for 2630 Stars on the California Planet Search</i>, ApJ 725, 875 (<code>2010ApJ...725..875I</code>, arXiv:1009.2301). The California HK catalog refit; 61 Vir log R&#x27;HK ≈ −5.0 confirmed stable across multiple seasons.",
  "li_137":"<b>Schmitt J. H. M. M. &amp; Liefke C. 2004</b> — <i>NEXXUS: A Comprehensive ROSAT survey of coronal X-ray emission among nearby solar-like stars</i>, A&amp;A 417, 651 (<code>2004A&amp;A...417..651S</code>). NEXXUS-2 catalog; 61 Vir log L_X ≈ 26.7–27.0 cgs, quiet G-dwarf locus.",
  "li_138":"<b>Tanner A. et al. 2014</b> — context paper for the 61 Vir disk SED + imaging follow-up; reinforces the Wyatt 2012 cold-belt geometry.",
  "li_139":"<b>Su K. Y. L. et al. 2017</b> — <i>Hot extended Solar System dust and cold debris disks in the Spitzer + Herschel surveys</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>). 61 Vir in the cold-disk sample; consistent with Wyatt 2012.",
  "li_140":"<b>Sousa S. G. et al. 2008</b> — <i>Spectroscopic parameters for 451 stars in the HARPS GTO planet search program</i>, A&amp;A 487, 373 (<code>2008A&amp;A...487..373S</code>, doi:10.1051/0004-6361:200809698). High-res spectroscopic parameters for 61 Vir (Teff = 5558 ± 19 K, [Fe/H] = -0.02 ± 0.01, log g = 4.36). Cross-check for Teff and [Fe/H].",
  "li_141":"<b>Maldonado J. et al. 2015</b> — <i>Stellar parameters of cool dwarfs and subgiants</i>, A&amp;A 579, A20 (<code>2015A&amp;A...579A..20M</code>, doi:10.1051/0004-6361/201525764). Independent high-res spectroscopic refit; Teff = 5579 ± 10 K, [Fe/H] = -0.02 ± 0.01 — agrees with the near-solar consensus.",
  "li_142":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey I.</i> ApJS 255, 8 (<code>2021ApJS..255....8R</code>, doi:10.3847/1538-4365/abe23c). California Planet Search 30-year RV refit including 61 Vir; reports Teff = 5585.57 ± 78.88 K, M = 0.914 ± 0.037, R = 1.033 ± 0.023, [Fe/H] = +0.0275 ± 0.06. Cross-check; consistent at the 1σ level with the Rathsam 2023 / von Braun 2014 picks.",
  "li_143":"<b>Sanz-Forcada J. et al. 2010</b> — <i>X-ray ages for nearby stars</i>, A&amp;A 511, L8 (<code>2010A&amp;A...511L...8S</code>, doi:10.1051/0004-6361/200913670). 61 Vir X-ray-inferred age 7.96 Gyr, consistent with the isochrone consensus (~8 Gyr) and inconsistent with the younger Mamajek 2008 activity age.",
  "h3_144":"Read (instrument-only, not visual-informative)",
  "li_145":"<b>Gray R. O. et al. 2006</b> — <i>Contributions to the Nearby Stars (NStars) Project: Spectroscopy of Stars Earlier than M0 Within 40 pc — The Southern Sample</i>, AJ 132, 161 (<code>2006AJ....132..161G</code>, doi:10.1086/504637). G6.5V spectral classification for 61 Vir. Note: earlier Phase 3 drafts attributed the G6.5V to &quot;Gaia DR3 label&quot; — Gray 2006 NStars is the actual primary classification source.",
  "li_146":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Effective temperatures, gravities, metallicities, and ages of 18 solar twin candidates</i> (<code>2012MNRAS.422..542P</code>, arXiv:1112.0590). High-resolution spectroscopy of solar-twin candidates including 61 Vir; consistent with near-solar [Fe/H] within 0.05 dex. Demoted to cross-check (smaller sample, larger formal uncertainty than Rathsam 2023).",
  "li_147":"<b>Bensby T. et al. 2014</b> — <i>Exploring the Milky Way stellar disk: a detailed elemental abundance study of 714 F and G dwarfs</i>, A&amp;A 562, A71 (<code>2014A&amp;A...562A..71B</code>, arXiv:1309.2631). 61 Vir in the thin-disk metallicity sample; [Fe/H] consistent with solar.",
  "li_148":"<b>Brewer J. M. et al. 2016</b> — <i>Spectral Properties of Cool Stars (SPOCS): extended catalog of 1626 stars</i>, ApJS 225, 32 (<code>2016ApJS..225...32B</code>, arXiv:1606.07929). SPOCS extended catalog; refit of [Fe/H], Teff, log g for 61 Vir consistent with the near-solar values.",
  "li_149":"<b>Lawler S. M. et al. 2014</b> — context paper for the cold-disk population around solar-type stars; 61 Vir cited.",
  "li_150":"<b>Magic Z. et al. 2013</b> — STAGGER 3D RHD grid for cool dwarfs; cited via granulation discussion.",
  "h3_151":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_152":"Conference abstracts (DDA, EPSC), SETI / laser-emission searches, brown-dwarf companion radial-velocity follow-up at very large separations, and astrobiology white papers contribute no cfg-decisive content. The full filtered bib would be preserved in <code>docs/phase3/_bib/61-vir.yaml</code> once the system.yaml-driven Stage 5 filter is run; for this literature-direct stellar synthesis no bib yaml exists yet.",
  "h2_153":"Open items for follow-up",
  "li_154":"<b>Phase 2 <code>disk_measurements</code> ingest</b>: this synthesis cites Wyatt 2012, Tanner 2014, and Su 2017 directly. Adding a structured <code>disk_measurements</code> array to <code>db/systems/61_vir.json</code> (with the Wyatt 2012 geometry + dust mass as the recommended entry) would formalize the audit trail; Confidence on the disk geometry rows would not change (already high), but the literature-direct flag in Basis could be replaced with a clean DB reference.",
  "li_155":"<b>Planets b/c/d Phase 3 follow-up</b>: a separate workspace (<code>phase3/61_vir_planets/</code>) will synthesize the three Vogt 2010 planets. b is a 5.1 M⊕ super-Earth at 0.050 AU (likely hot rocky / steam-atmosphere category); c is a warm sub-Neptune at 0.22 AU (~18 M⊕); d is a cooler sub-Neptune at 0.48 AU (~23 M⊕). None transit (RV-only), so atmospheric characterization is in reflected-light regime via direct imaging proposals.",
  "li_156":"<b>Asteroseismic campaign</b>: 61 Vir at Vmag 4.71 is HARPS/ESPRESSO reachable; a dedicated p-mode detection would tighten the asteroseismic age and arbitrate the isochrone-vs-activity age divergence (Rathsam 2023 7.70 +0.28/-0.26 Gyr vs Mamajek 2008 6.1 ± 1.7 Gyr — the two pipelines differ by ~1.5σ in opposite directions). An age tied to seismic Δν + ν_max would drop the uncertainty by a factor of ~3 and likely confirm the isochrone reading given the Yu 2024 P_rot = 32.1 d already aligns with the ~8 Gyr Skumanich expectation.",
  "li_157":"<b>Direct-imaging follow-up of the debris ring</b>: ALMA millimetre imaging (CO + dust continuum) would refine the ring geometry beyond Herschel&#x27;s spatial resolution; if a sharp inner edge or asymmetry is detected, the <code>disk_morphology</code> field could be upgraded from &quot;single cold belt, KBO analog&quot; to a more detailed shape.",
  "li_158":"<b>Long-term activity cycle</b>: 61 Vir&#x27;s chromospheric monitoring record is too short to confirm or refute a solar-like cycle; a Mt Wilson / California HK follow-up over the next decade would populate the <code>activity_cycle_years</code> field.",
  "h2_159":"Related",

  ko: {
  "p_1":"61 Virginis (HD 115617, HIP 64924, GJ 506) 은 8.534 ± 0.001 pc (Gaia DR3 시차 117.17 ± 0.15 mas, 27.83 광년) 거리의 처녀자리에 위치한 맨눈 가시 G6.5V 솔라 트윈입니다. G6.5V 분광형은 Gray 2006 NStars 의 분류이며, Gray 2003 의 G7V 와도 호환되는 더 세분된 subtype 입니다. 유효 온도 Teff = 5568 ± 4 K (Rathsam et al. 2023, 솔라 아날로그 high-res 차등 분광) 는 태양보다 약 200 K 낮습니다. 반지름은 CHARA 장기선 광간섭 측정으로 직접 측정되어 R = 0.9867 ± 0.0048 R☉ 입니다 (von Braun et al. 2014). 질량은 0.93 ± 0.01 M☉ (Rathsam 2023 Yale-Potsdam isochrone) 이고, 볼로메트릭 광도 L = 0.8222 ± 0.0033 L☉ (von Braun 2014 의 SED 적분 + Hipparcos 시차) 가 canonical 직접 값 입니다. 금속도는 사실상 태양과 같으며 ([Fe/H] = +0.006 ± 0.004, Rathsam 2023. Sousa 2008, Maldonado 2015, Vogt 2010 모두 ±0.02 dex 이내에서 일치), 현대 isochrone 나이는 7.70 +0.28/-0.26 Gyr 입니다 (Rathsam 2023). 이는 Mamajek &amp; Hillenbrand 2008 의 색채권 활동도-나이 ~6 Gyr 보다 오래되었지만, Vogt 2010 / von Braun 2014 / Sanz-Forcada 2010 의 isochrone consensus (~8–9 Gyr) 와 일치합니다. 별 자체는 조용한 상태로, 광구 회전 주기 P_rot = 32.1 ± 0.2 일 (Yu et al. 2024 가 18 년치 HARPS RV + 활동 지표 시계열에 Gaussian-process 모델을 적용해 직접 검출. Wright 2004 의 S-index 변동에서 추정한 ~29 일을 대체), log R&#x27;HK ≈ −5.0 (Isaacson &amp; Fischer 2010. Henry 1996 교차 확인), 그리고 X 선 광도 log L_X ≈ 26.7–27.0 cgs (Schmitt &amp; Liefke 2004 NEXXUS-2) 로 모두 비활성 locus 에 있습니다.",
  "p_2":"61 Vir 는 RV 로 검출된 행성 세 개를 거느립니다 (Vogt 2010 의 HIRES + AAT 결합 해). b 는 4.215 일 주기 5.1 M⊕ Msini 의 슈퍼지구, c 는 38.021 일 주기 18.2 M⊕ 의 따뜻한 sub-Neptune, d 는 123.01 일 주기 22.9 M⊕ 의 sub-Neptune 입니다. 행성대 바깥에서는 <b>Wyatt et al. 2012 의 Herschel/PACS 영상이 ≈ 30 AU 부근을 중심으로 하는 차가운 debris 띠를 분해</b>하며, 바깥쪽은 ≈ 96 AU 까지 뻗고 dust 온도 ~50 K 인 전형적 KBO 아날로그입니다. dust 질량은 태양의 Edgeworth–Kuiper 띠 잔존량의 6–8 배에 달합니다.",
  "p_3":"<b>NearStars 시나리오 선택. 약간 더 차가운 G6.5V 솔라 트윈, ~30 AU 의 단일 차가운 debris 띠가 분해되며, 안쪽 행성 세 개가 전경의 점광원으로 함께 보이는 모습으로 렌더링합니다.</b> Stellar Physical 행들은 새 Phase 2 앵커와 일치하도록 갱신되었습니다. 반지름 행은 attribution 이 수정되어 canonical CHARA 간섭 측정값 (von Braun 2014) 을 인용하며, 이전 초안이 &quot;interferometric&quot; 으로 잘못 표기했던 Vogt 2010 의 evolutionary 반지름은 교차 확인으로 강등되었습니다. 나이 행은 이제 isochrone (Rathsam 2023) 주도이며, 오래된 활동도-나이 (Mamajek 2008) 는 교차 확인으로 강등됩니다. 문헌은 방법에 따라 ~6 Gyr 와 ~8 Gyr 사이로 갈리며, Phase 3 는 isochrone consensus 를 Confidence=medium 으로 채택해 미해결 분할을 플래그합니다. tie-break 세 행은 시각 색조, debris 띠 산란 색조, debris 띠 불투명도로 Herschel 의 원적외선 검출이 광학 외관을 제약하지 않는 영역의 미적 선택입니다.",

  "h2_105":"Surface synthesis",
  "p_106":"61 Vir 의 광구는 태양보다 ~200 K 더 차갑습니다. Teff 5568 K (Rathsam 2023) 대 태양 기준 5772 K 입니다. 다른 솔라 트윈 파라미터에서는 거의 같으며, 질량 0.93 M☉ (Rathsam 2023), 반지름 0.987 R☉ (von Braun 2014 CHARA), [Fe/H] 가 태양과 0.01 dex 이내 (Rathsam 2023) 입니다. 광도 0.822 L☉ 는 거의 태양과 같은 반지름에 약간 더 낮은 온도가 결합된 자연스러운 결과입니다. 가시 영역에서 스펙트럼은 canonical G 왜성 Ca II H&amp;K, Mg b, Na D, Hα 시그니처를 가지며, 선 깊이는 태양형 G2V 와 약간 더 붉은 K0V 의 중간쯤에 위치합니다. Rathsam et al. 2023 의 솔라 아날로그 Li-결핍 고분해 차등 분광은 솔라 트윈 풍부도 패턴을 확인했으며, 비정상적인 리튬 결핍이나 빠른 회전 veiling 은 없습니다.",
  "p_107":"3D 복사-유체역학 시뮬레이션 (비슷한 G6/G7V 타깃에 적용된 Magic 2013 의 STAGGER/CO5BOLD 계열 그리드) 은 granulation 셀 크기가 태양보다 ~10% 더 크고 대비가 약간 더 강할 것으로 예측합니다. 더 차가운 Teff 에서 대류 turnover 가 느려지는 효과입니다. 흑점 면적은 색채권 log R&#x27;HK = −5.0 (Isaacson &amp; Fischer 2010) 을 따라가며, 61 Vir 를 τ Ceti 나 α Cen B 같은 조용한 왜성 locus 에 놓습니다. 추정된 활동 사이클의 최대점에서도 흑점 피크 면적은 가시 디스크의 ≲ 0.3% 로, 태양 극대기 보다도 살짝 적습니다.",
  "p_108":"H 밴드 limb darkening 은 61 Vir 에 대해 직접 측정된 적이 없습니다. α Cen A 의 Kervella 2017 같은 PIONIER 캠페인이 없기 때문입니다. 다만 1D 대기 예측은 α_H ≈ 0.20 을 줍니다. α Cen A 의 측정값 0.14 보다 살짝 더 강한 값으로, 더 차가운 Teff 와 일관됩니다. NearStars 는 직접 간섭 후속 관측이 나오기 전까지는 Confidence=medium 으로 1D 예측을 채택합니다.",
  "p_109":"시각 색조의 약한 호박색 변위는 tie-break 입니다. 5568 K 흑체 피크는 λ_max 기준 태양보다 ~7% 더 붉은 쪽으로 이동해 있으며, 이는 순수한 태양 일치가 아닌 약간 더 크림이 도는 시각 단서를 채택한 근거 중 하나입니다.",
  "h2_110":"Atmosphere synthesis",
  "p_111":"61 Vir 는 오래되고 자기적으로 비활성인 솔라 트윈답게 조용한 G 왜성 chromosphere–transition-region–corona 구조를 가집니다. 색채권 S-index (Wilson 1968 Mt Wilson 컨벤션) 는 log R&#x27;HK ≈ −5.0 으로 환산됩니다 (Isaacson &amp; Fischer 2010). 현대 태양의 극소기보다 약 0.05 dex 더 조용 하며, 전형적인 어린 G 왜성보다는 0.20 dex 더 낮습니다. 전이 영역 UV 방출과 X 선 광도 log L_X = 26.7–27.0 cgs (0.1–2 keV, Schmitt &amp; Liefke 2004 NEXXUS-2 카탈로그) 는 61 Vir 를 비활성 G 왜성 locus 한가운데 에 분명히 배치합니다.",
  "p_112":"α Cen A 의 Robrade 2016 가 검출한 19 년 사이클에 견줄 만한 장기 활동 사이클은 61 Vir 에서 아직 분해되지 않았습니다. 색채권 모니터링 기록이 더 짧고, 잠재된 사이클 진폭도 작을 것으로 예상됩니다. 광도 잡음 위로 올라오는 flare 도 보고된 바 없습니다. 61 Vir 는 모든 안쪽 행성에 우호적인 우주환경을 제공합니다 (Vogt 2010 세 행성 모두 &lt; 0.5 AU 안에 들어 있습니다).",
  "p_113":"통합 XUV 광도는 10⁻⁴ L_bol 이하로 태양과 비슷하거나 더 조용하며, ~0.3 AU 이상에 있는 어떤 지구 질량 행성의 일차 대기도 Gyr 시간 스케일 에 걸쳐 의미 있게 침식할 수 없습니다. 안쪽 행성 b (0.050 AU, 별도 Phase 3 워크스페이스) 는 광증발 영향 영역에 있지만, 별의 XUV 기여는 동일 일조량 에서 태양보다 더 공격적이지 않습니다.",
  "h2_114":"Rotation &amp; spin synthesis",
  "p_115":"32.1 ± 0.2 일 회전 주기 (Yu et al. 2024 가 18 년치 HARPS RV + 활동 지표 시계열에 multidimensional Gaussian-process 모델을 적용해 얻은 결과) 는 첫 직접 검출로, Wright 2004 의 추정 (~29 일, S_HK 변동에서) 과 Vogt 2010 §4 의 RV jitter 추정 (28–30 일 power) 을 대체합니다. ~8 Gyr (Rathsam 2023 isochrone) 에서 Skumanich braking 법칙 P_rot ∝ √t 를 태양형 ZAMS 회전에서 스케일하면 기대 회전 주기는 30–35 일인데, 61 Vir 의 측정값 32.1 일은 정확히 일치합니다. 이 새로운 값은 이전 29 일 값이 Mamajek 2008 활동도-나이와 보였던 것보다 현대 isochrone 나이와 더 잘 맞으며, isochrone 주도의 나이 그림에 추가 지지를 제공합니다.",
  "p_116":"61 Vir 에는 아직 asteroseismic 검출이 없습니다. Vmag = 4.71 이라 관측은 가능하지만, α Cen A 의 Bedding 2004 같은 전용 p-mode 캠페인이 수행된 적이 없습니다. 원칙적으로는 HARPS RV 시계열로 검출이 가능합니다. 차등 회전은 직접 분해되지 않지만, Skumanich locus 솔라 아날로그를 따라 적도가 극보다 ~20% 빠르게 회전할 것으로 예상됩니다.",
  "p_117":"회전축 경사는 제약되지 않습니다. 시각 렌더링을 위해 NearStars 는 안쪽 행성계 황도에 대해 30° 기울어진 축을 채택하며, 이는 무작위로 정렬된 자전축 가정과 일관됩니다. Vogt 2010 의 b/c/d 경사 posterior 는 거의 정렬된 거의 edge-on 시스템과 호환되지만, 별의 spin 과 직접 연결 짓기는 어렵습니다.",
  "h2_118":"Visual styling",
  "p_119":"NearStars 렌더러에서 61 Vir 는 따뜻한 크림 G6.5V 별로 묘사됩니다. 태양과 시각적으로 가깝지만 ~200 K 더 차가운 광구를 호박색으로 살짝 가미한 색조를 인코딩합니다. 시각 hex <span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> 는 순수한 태양 일치 에 대한 tie-break 선택입니다. 플레이어에게 자기 태양 기준보다 더 차가운 G 왜성이라는 즉각적인 단서를 주고, α Cen A 의 <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> 크림 이나 47 UMa 같은 다른 근태양 Phase 3 타깃들과 61 Vir 를 구분하는 데 도움이 됩니다.",
  "li_120":"<b>궤도 뷰 (시스템 진입)</b>. 태양빛 점광원이 ~30 AU 반경 중심의 거의 원형 debris 띠로 둘러싸여 있으며, 띠는 ~96 AU 까지 뻗어 있습니다. 띠는 가는 회청색 산란 밴드로 불투명도 0.10 으로 렌더링됩니다. 보이지만 분명히 희미하며, 토성급 고리가 아닙니다.",
  "li_121":"<b>근접 뷰 (행성대 안, &lt; 1 AU)</b>. debris 띠는 배경으로 멀어지고, 안쪽 행성 세 개 (b 0.05 AU, c 0.22 AU, d 0.48 AU) 가 행성 위상 동안 전경 점광원으로 나타납니다. b 의 슈퍼지구 디스크와 c/d 의 sub-Neptune 디스크는 매우 가까운 거리에서만 분해됩니다.",
  "li_122":"<b>표면 뷰 (행성에서)</b>. 완만한 limb darkening, granulation 패턴, 활동 시기의 희미한 흑점이 있는 알아볼 만한 태양형 디스크입니다. 0.48 AU (행성 d) 의 0.96 R☉ 별은 각지름 ~0.53° 를 차지하는데, 지구에서 본 태양의 겉보기 크기와 거의 같습니다. 외행성 관측자에게는 거의 완벽한 태양 아날로그입니다.",
  "li_123":"<b>지구에서 본 별</b>. Vmag 4.71 로 맨눈 가시이지만 두드러지지 않으며, 처녀자리 황도 근처에 들어 있습니다. NearStars 의 실제 별 모드에서는 Gaia DR3 J2016.0 sky 위치가 게임 epoch 까지 선형 propagation 된 자리에 나타납니다.",
  "li_124":"<b>가상의 외행성에서 본 debris 띠</b>. 예를 들어 10 AU 위치에서 띠는 황도를 따라 얇고 흐릿한 밴드로 형성됩니다. 뒷쪽에서 비추일 때 산란광 으로 가장 밝아지는데, 해왕성 궤도 관측자가 태양계 Edgeworth–Kuiper 띠를 본다면 보일 모습과 비슷하되 dust 질량이 6–8 배 더 많아 더 밝습니다.",
  "li_125":"<b>조용한 별 애니메이션</b>. 흑점 렌더링은 절제됩니다. 피크 면적은 디스크의 ≲ 0.3% 로 태양 극대기보다 훨씬 덜 극적입니다. 두드러진 flare 나 CME 시각 효과는 없습니다.",
  "h2_126":"Bibliography",
  "h3_127":"Read (visual-informative, drove decisions above)",
  "li_128":"<b>Rathsam A., Meléndez J. &amp; Carvalho Silva G. 2023</b> — <i>Lithium depletion in solar analogs: age and mass effects</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589, arXiv:2309.00471). 솔라 아날로그 고분해 차등 분광. Phase 2 앵커로 Teff (5568 ± 4 K), 질량 (0.93 ± 0.01 M☉), [Fe/H] (+0.006 ± 0.004), 나이 (7.70 +0.28/ -0.26 Gyr), log g (4.390 ± 0.012) 를 공급. <b>61 Vir 의 주된 Phase 2 앵커</b> (가장 최신, 가장 작은 불확실도). 이전 초안의 Pavlenko 2012 를 대체합니다.",
  "li_129":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters and temperatures V — 11 newly characterized exoplanet host stars</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360, arXiv:1312.1792). CHARA 장기선 광간섭으로 61 Vir 의 각지름을 직접 측정 후 Hipparcos 시차와 결합. <b>유일한 직접 반지름</b> (R = 0.9867 ± 0.0048 R☉) 과 canonical bolometric 광도 (L = 0.8222 ± 0.0033 L☉) 공급. 이전 Phase 3 초안이 Vogt 2010 을 interferometric 출처로 잘못 attribution 했던 점 (Vogt 2010 은 Takeda 2007 isochrone 을 사용) 을 여기서 수정합니다.",
  "li_130":"<b>Yu H. et al. 2024</b> — <i>Modelling stellar variability in archival HARPS data: I — Rotation and activity properties with multidimensional Gaussian processes</i>, MNRAS 528, 5511 (<code>2024MNRAS.528.5511Y</code>, doi:10.1093/mnras/stae137, arXiv:2401.05528). 61 Vir 의 첫 회전 주기 직접 검출. P_rot = 32.1 ± 0.2 일을 18 년치 HARPS RV + 활동 시계열에 대한 multidimensional-GP fit 으로 얻음. Wright 2004 / Vogt 2010 §4 의 ~29 일 추정을 대체.",
  "li_131":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>, doi:10.1088/0004-637X/708/2/1366). 세 행성 검출 (b 4.215 일, c 38.021 일, d 123.01 일) 의 기초 논문. HIRES + AAT RV 결합 해. Takeda 2007 의 항성 파라미터를 채택 (M = 0.942 ± 0.034 M☉, R = 0.963 ± 0.011 R☉, isochrone 나이 8.96 +2.76/-3.08 Gyr). 항성 파라미터에 대해서는 교차 확인으로 강등되며, 행성 검출 논문으로서의 지위는 유지됩니다.",
  "li_132":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir: implications for the prevalence of debris in low-mass planetary systems</i>, MNRAS 424, 1206 (<code>2012MNRAS.424.1206W</code>, doi:10.1111/j.1365-2966.2012.21298.x, arXiv:1206.2370). Herschel/PACS 로 70/100/160 μm 에서 차가운 debris 띠를 분해 영상화. ~30 AU 중심, ~96 AU 까지 뻗는 단일한 넓은 띠, dust 온도 ~50 K, dust 질량 태양 KBO 잔존량의 6–8 배. Circumstellar-disk 모든 Decisions 행의 anchor.",
  "li_133":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 색채권 활동도-나이 + isochrone 결합으로 6.1 ± 1.7 Gyr — 문헌 분포의 <b>젊은 쪽</b>. Rathsam 2023 / von Braun 2014 / Vogt 2010 의 isochrone consensus (~7.7–9 Gyr) 와 <b>documented divergence</b>. Phase 3 는 isochrone 값을 채택하되 미해결 분할을 반영하기 위해 Confidence=medium 플래그합니다.",
  "li_134":"<b>Wright J. T. et al. 2004</b> — <i>Chromospheric Ca II Emission in Nearby F, G, K, and M Stars</i>, ApJS 152, 261 (<code>2004ApJS..152..261W</code>, doi:10.1086/386283). Mt-Wilson S-index 와 유도된 회전 주기 카탈로그. 61 Vir P_rot ≈ 29 일 을 S_HK 변동에서 — 이제 Yu 2024 의 직접 32.1 ± 0.2 일에 의해 대체됨. 교차 확인.",
  "h3_135":"Read (context / methodology, not directly decision-driving)",
  "li_136":"<b>Isaacson H. &amp; Fischer D. 2010</b> — <i>Chromospheric Activity and Jitter Measurements for 2630 Stars on the California Planet Search</i>, ApJ 725, 875 (<code>2010ApJ...725..875I</code>, arXiv:1009.2301). California HK 카탈로그 refit. 61 Vir log R&#x27;HK ≈ −5.0 이 여러 시즌에 걸쳐 안정함을 확인.",
  "li_137":"<b>Schmitt J. H. M. M. &amp; Liefke C. 2004</b> — <i>NEXXUS: A Comprehensive ROSAT survey of coronal X-ray emission among nearby solar-like stars</i>, A&amp;A 417, 651 (<code>2004A&amp;A...417..651S</code>). NEXXUS-2 카탈로그. 61 Vir log L_X ≈ 26.7–27.0 cgs, 조용한 G 왜성 locus.",
  "li_138":"<b>Tanner A. et al. 2014</b> — 61 Vir disk SED + 영상 follow-up 의 context 논문. Wyatt 2012 의 차가운 띠 지오메트리를 강화.",
  "li_139":"<b>Su K. Y. L. et al. 2017</b> — <i>Hot extended Solar System dust and cold debris disks in the Spitzer + Herschel surveys</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>). 차가운 disk 샘플의 61 Vir. Wyatt 2012 와 일관.",
  "li_140":"<b>Sousa S. G. et al. 2008</b> — <i>Spectroscopic parameters for 451 stars in the HARPS GTO planet search program</i>, A&amp;A 487, 373 (<code>2008A&amp;A...487..373S</code>, doi:10.1051/0004-6361:200809698). 61 Vir 의 고분해 분광 파라미터 (Teff = 5558 ± 19 K, [Fe/H] = -0.02 ± 0.01, log g = 4.36). Teff 와 [Fe/H] 교차 확인.",
  "li_141":"<b>Maldonado J. et al. 2015</b> — <i>Stellar parameters of cool dwarfs and subgiants</i>, A&amp;A 579, A20 (<code>2015A&amp;A...579A..20M</code>, doi:10.1051/0004-6361/201525764). 독립적인 고분해 분광 refit. Teff = 5579 ± 10 K, [Fe/H] = -0.02 ± 0.01 — 거의 태양 consensus 와 일치.",
  "li_142":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey I.</i> ApJS 255, 8 (<code>2021ApJS..255....8R</code>, doi:10.3847/1538-4365/abe23c). California Planet Search 30 년 RV refit 으로 61 Vir 를 포함. Teff = 5585.57 ± 78.88 K, M = 0.914 ± 0.037, R = 1.033 ± 0.023, [Fe/H] = +0.0275 ± 0.06. Rathsam 2023 / von Braun 2014 의 picks 와 1σ 수준에서 일관된 교차 확인.",
  "li_143":"<b>Sanz-Forcada J. et al. 2010</b> — <i>X-ray ages for nearby stars</i>, A&amp;A 511, L8 (<code>2010A&amp;A...511L...8S</code>, doi:10.1051/0004-6361/200913670). 61 Vir 의 X-ray 추정 나이 7.96 Gyr. isochrone consensus (~8 Gyr) 와 일관되며 더 젊은 Mamajek 2008 활동도-나이와는 불일치.",
  "h3_144":"Read (instrument-only, not visual-informative)",
  "li_145":"<b>Gray R. O. et al. 2006</b> — <i>Contributions to the Nearby Stars (NStars) Project: Spectroscopy of Stars Earlier than M0 Within 40 pc — The Southern Sample</i>, AJ 132, 161 (<code>2006AJ....132..161G</code>, doi:10.1086/504637). 61 Vir 의 G6.5V 분광 분류. 이전 Phase 3 초안은 G6.5V 를 &quot;Gaia DR3 라벨&quot; 로 attribution 했으나, Gray 2006 NStars 가 실제 일차 분류 출처.",
  "li_146":"<b>Pavlenko Y. V. et al. 2012</b> — <i>Effective temperatures, gravities, metallicities, and ages of 18 solar twin candidates</i> (<code>2012MNRAS.422..542P</code>, arXiv:1112.0590). 솔라 트윈 후보의 고분해 분광 (61 Vir 포함). 태양으로부터 0.05 dex 이내의 [Fe/H] 와 일관. Rathsam 2023 보다 샘플 크기가 작고 형식 불확실도가 커서 교차 확인으로 강등.",
  "li_147":"<b>Bensby T. et al. 2014</b> — <i>Exploring the Milky Way stellar disk: a detailed elemental abundance study of 714 F and G dwarfs</i>, A&amp;A 562, A71 (<code>2014A&amp;A...562A..71B</code>, arXiv:1309.2631). 얇은 원반 금속도 샘플 의 61 Vir. [Fe/H] 가 태양과 일관.",
  "li_148":"<b>Brewer J. M. et al. 2016</b> — <i>Spectral Properties of Cool Stars (SPOCS): extended catalog of 1626 stars</i>, ApJS 225, 32 (<code>2016ApJS..225...32B</code>, arXiv:1606.07929). SPOCS 확장 카탈로그. 61 Vir 의 [Fe/H], Teff, log g refit 이 거의 태양 값과 일관.",
  "li_149":"<b>Lawler S. M. et al. 2014</b> — 태양형 별 주위 차가운 disk 인구의 context 논문. 61 Vir 가 인용됨.",
  "li_150":"<b>Magic Z. et al. 2013</b> — 차가운 왜성용 STAGGER 3D RHD 그리드. granulation 논의에서 인용.",
  "h3_151":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_152":"학회 abstract (DDA, EPSC), SETI / 레이저 방출 탐색, 매우 큰 분리에서의 brown-dwarf 동반자 radial-velocity follow-up, 그리고 astrobiology white paper 등은 cfg 결정에 영향이 없습니다. 전체 필터된 bib 는 system.yaml 기반 Stage 5 필터가 실행되면 <code>docs/phase3/_bib/61-vir.yaml</code> 에 보존됩니다. 이 literature-direct 항성 합성에서는 아직 bib yaml 이 존재하지 않습니다.",
  "h2_153":"Open items for follow-up",
  "li_154":"<b>Phase 2 <code>disk_measurements</code> ingest.</b> 이 합성은 Wyatt 2012, Tanner 2014, Su 2017 을 직접 인용합니다. <code>db/systems/61_vir.json</code> 에 구조화된 <code>disk_measurements</code> 배열을 추가하면 (Wyatt 2012 의 지오메트리 + dust 질량을 recommended 항목으로) 감사 추적이 정식화됩니다. disk 지오메트리 행의 Confidence 는 바뀌지 않지만 (이미 high), Basis 의 literature-direct 플래그가 깔끔한 DB 참조로 대체됩니다.",
  "li_155":"<b>행성 b/c/d Phase 3 follow-up.</b> 별도 워크스페이스 (<code>phase3/61_vir_planets/</code>) 에서 Vogt 2010 의 세 행성을 합성합니다. b 는 0.050 AU 의 5.1 M⊕ 슈퍼지구 (뜨거운 암석 / 증기 대기 범주에 가능성), c 는 0.22 AU 의 따뜻한 sub-Neptune (~18 M⊕), d 는 0.48 AU 의 더 차가운 sub-Neptune (~23 M⊕) 입니다. 셋 다 transit 하지 않으므로 (RV-only), 대기 특성화는 직접 영상 제안서를 통한 반사광 영역에서 이루어집니다.",
  "li_156":"<b>Asteroseismic 캠페인.</b> Vmag 4.71 의 61 Vir 는 HARPS/ESPRESSO 로 접근 가능합니다. 전용 p-mode 검출이 이루어지면 asteroseismic 나이가 좁혀지고, isochrone-대-활동도 나이 분기 (Rathsam 2023 의 7.70 +0.28/-0.26 Gyr 대 Mamajek 2008 의 6.1 ± 1.7 Gyr — 두 파이프라인이 반대 방향으로 ~1.5σ 차이) 를 중재할 수 있습니다. Δν + ν_max 에 묶인 나이는 불확실도를 약 3 배 줄이며, Yu 2024 의 P_rot = 32.1 일이 이미 ~8 Gyr Skumanich 기대치와 일치하는 점을 고려하면 isochrone 해석을 확인할 가능성이 높습니다.",
  "li_157":"<b>debris 띠의 직접 영상 follow-up.</b> ALMA 밀리미터 영상 (CO + dust 연속체) 은 Herschel 의 공간 분해능을 넘어 띠 지오메트리를 정련합니다. 날카로운 안쪽 경계나 비대칭이 검출되면 <code>disk_morphology</code> 필드를 &quot;single cold belt, KBO analog&quot; 에서 더 상세한 모양으로 격상할 수 있습니다.",
  "li_158":"<b>장기 활동 사이클.</b> 61 Vir 의 색채권 모니터링 기록은 태양형 사이클을 확인하거나 부정하기에는 너무 짧습니다. 향후 10 년 동안의 Mt Wilson / California HK follow-up 이 <code>activity_cycle_years</code> 필드를 채울 것입니다.",
  "h2_159":"Related",
  "li_160":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a> — 솔라 트윈 비교. 61 Vir 는 8.53 pc 거리의 더 차갑고 더 조용한 아날로그. α Cen A 는 1.34 pc.",
  "li_161":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 표 스키마의 원본.",

  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
