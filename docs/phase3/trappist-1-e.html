  "h2_157":"Surface synthesis",
  "p_158":"TRAPPIST-1 e is the system&#x27;s most likely habitable world. Three lines of evidence converge:",
  "p_159":"1. <b>Insolation</b> (0.66 S⊕) places it inside the conservative habitable zone (Kopparapu 2013 / 2014) for any reasonable atmosphere with greenhouse warming. Without an atmosphere, e freezes; with 1 bar N₂/CO₂, it supports surface liquid water (Wolf 2017, Turbet 2018 §4).",
  "p_160":"2. <b>Density</b> (4.92 g/cc from Agol 2021) is lower than Earth&#x27;s 5.51 g/cc, consistent with a non-trivial water mass fraction. Magma-Ocean modeling (Bourgeois et al. 2024 — 2008.09599) gives a water mass fraction of 0–0.23 for e, with central estimates around 0.05–0.10 (several percent by mass = several Earth oceans worth of water).",
  "p_161":"3. <b>Observational consistency.</b> Glidden 2025 (DREAMS) rules out H₂-rich and weakly disfavors Venus-analog atmospheres, but explicitly permits N₂-rich atmospheres with trace CO₂ and CH₄ — exactly the canonical Earth-analog secondary atmosphere.",
  "p_162":"For the surface morphology, the tidally-locked aquaplanet template (Pierrehumbert 2011, Hu &amp; Yang 2014, Wolf 2017) gives a distinctive &quot;eyeball Earth&quot; pattern:",
  "li_163":"<b>Substellar disk</b> (≲35° from substellar point): open ocean, warm enough for liquid water (substellar surface temperature ~290 K in Wolf 2017 Aquaplanet scenario), possible cirrus clouds.",
  "li_164":"<b>Mid-latitudes / mid-longitudes</b> (35–90° from substellar): sea ice with thickness varying from a few meters at the ice line to hundreds of meters near the terminator.",
  "li_165":"<b>Terminator and nightside</b> (&gt;90° from substellar): thick glacial ice (&gt;1 km) over a frozen ocean; possible emerged terrain at ridge tops where ice has fractured around tectonic features.",
  "p_166":"<b>Color choice.</b> Two competing effects: (a) intrinsic ice/snow albedo is high (0.6–0.8) and bluish-white, (b) the 2566 K M-dwarf illumination shifts perceived hue strongly to red-orange. The combination produces a warm cream-white for ice cover (<code>#d8d0c4</code>) and a dark navy-violet for deep ocean (<code>#1a2540</code>). Hu 2014 explicitly notes that aquaplanets around M-dwarfs appear &quot;less blue&quot; than Earth because the stellar SED has minimal short-wavelength flux to Rayleigh-scatter.",
  "p_167":"<b>Iron oxide / bedrock.</b> Limited exposure — most surface area is ice-covered. Bedrock appearance limited to ridge tops near the terminator where glacial flow has thinned ice. The accent <code>#7a6a58</code> is a muted weathered-basalt tone under M-dwarf light.",
  "p_168":"<b>Morphology under tidal lock.</b> The substellar disk hosts active hydrological circulation — surface heating drives evaporation, condensation in the polar / nightside cold-traps creates persistent glaciers, glacial flow returns water toward the substellar disk. This pattern is stable on geological timescales (Wolf 2017 §6), producing a planet with permanent climatic zones rather than seasonal cycles.",
  "h2_169":"Atmosphere synthesis",
  "p_170":"Glidden 2025 (DREAMS NIRSpec PRISM, 4 transits) presents the first JWST transmission spectra of e. Significant stellar contamination across 0.6–5 μm complicates the inference, but after marginalizing over stellar features with Gaussian processes they find:",
  "li_171":"H₂-rich (≳80% by volume) cloudy atmospheres excluded at &gt;3σ",
  "li_172":"Venus-analog CO₂-rich atmospheres weakly disfavored at 2σ",
  "li_173":"N₂-rich atmospheres with trace CO₂ and CH₄ are <b>fully permitted</b>",
  "li_174":"Bare-rock interpretation also adequate but with unexplained features",
  "p_175":"This is consistent with — and rather supports — the Earth-analog secondary atmosphere expected from Wolf 2017 / Lincowski 2018 / Way 2025 modeling.",
  "p_176":"For NearStars we adopt the <b>1 bar N₂-rich aquaplanet atmosphere</b>:",
  "li_177":"<b>Pressure</b> 1 bar (100 kPa) — Earth-analog, comfortably within the Glidden 2025 N₂-rich consistency window.",
  "li_178":"<b>Composition</b> N₂ 78% (Earth-like background), Ar 0.5%, CO₂ 1% (elevated vs. Earth&#x27;s 0.04% to provide outer-HZ greenhouse warming; Wolf 2017 finds 1–10× CO₂ enhancement needed for habitable surface), H₂O 0.1–1% (saturated near substellar surface, much less elsewhere), O₂ ~5% (abiotic photolysis-driven O₂; below current Earth&#x27;s 21% because no oxygenic biosphere is assumed in the cfg).",
  "li_179":"<b>Clouds.</b> Wolf 2017 GCM produces ~55% global cloud cover, mostly stratocumulus over the open-water disk and high cirrus elsewhere. Cirrus contributes 5–10% greenhouse warming.",
  "p_180":"<b>Sky appearance.</b> The 1 bar N₂ atmosphere has Earth-like Rayleigh scattering at short wavelengths, but the 2566 K stellar SED has minimal flux below 0.5 μm — so the scattered sky color is much dimmer and shifted toward orange compared to Earth&#x27;s blue. The zenith sky is a dim red-blue mix (~<code>#3a4060</code>), transitioning to a warm orange near the horizon (<code>#a07050</code>). Water cloud features appear as warm cream patches (<code>#c0a890</code>) catching the red stellar light.",
  "p_181":"The host star dominates the daytime sky at angular size 2.17° (about 4× the Sun&#x27;s angular size from Earth). Surface illumination at the substellar point is about 0.66 × Earth&#x27;s, similar to a heavily overcast Earth day — but with the spectral peak shifted firmly into the red/near-IR.",
  "p_182":"<b>Nightside.</b> No direct stellar illumination; the only light sources are (a) scattered light from the dayside transported via atmospheric circulation (negligible), (b) reflected light from sister planets (f and d at conjunction, ~0.4–0.5° angular diameter, mv ≈ −10 to −13), and (c) starlight from distant stars (visible because there is no atmospheric scattering from the absent sun). Nightside sky is dramatically dark — KSP nightside ambient should be ~1% of dayside.",
  "h2_183":"Rotation &amp; spin synthesis",
  "p_184":"Tidal damping for e at 6.10-day period over 7.6 Gyr establishes the synchronous (1:1) configuration unambiguously. Obliquity damped to zero (Agol 2021 §6.2). Eccentricity is 0.00510 (Agol 2021), too low for 3:2 spin-orbit (Vinson 2017).",
  "p_185":"<b>KSP implementation note.</b> Rotation period = orbital period = 6.1010 days (527 127 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_186":"<b>Slow rotation effects.</b> With a 6.1-day rotation period, Coriolis effects are weaker than on Earth (Rossby number elevated). Wolf 2017 GCM shows this produces a slow, broad east-to-west zonal circulation in the substellar disk rather than Earth&#x27;s narrow jet streams. The visual implication for cloud patterns: smoother, larger-scale cloud bands; less cyclonic activity.",
  "p_187":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.4%. The substellar point and its open-water disk are fixed in the surface frame.",
  "h2_188":"Visual styling",
  "p_189":"Combining surface and atmosphere decisions:",
  "li_190":"<b>Global appearance.</b> From orbit, e looks like a snowball with a warm-cream open-water &quot;pupil&quot; near the substellar point, ringed by a fractal sea-ice transition zone, and entirely white-cream glacial ice beyond. Persistent cloud cover (~55% global) softens the appearance, with stratocumulus over the substellar ocean and high cirrus over the ice zones.",
  "li_191":"<b>Substellar disk (open water).</b> Dark navy ocean (<code>#1a2540</code>) under intense red-orange illumination, dotted with warm cream clouds (<code>#c0a890</code>). Most visually striking feature of the planet.",
  "li_192":"<b>Ice transition band.</b> Fractal pattern of warm cream (<code>#d8d0c4</code>) ice and dark ocean (<code>#1a2540</code>) — broken sea ice with open leads. The transition radius is about 35° from substellar (Wolf 2017); KSP terrain should show this as a roughly circular ice line.",
  "li_193":"<b>Glacial ice zone.</b> Smooth warm cream (<code>#d8d0c4</code>) with subtle topographic relief where glacial flow encounters bedrock. The terminator is the brightest zone in oblique illumination — long shadows reveal pressure ridges and crevasses.",
  "li_194":"<b>Nightside.</b> Dark with a faint cyan-white sheen from starlight-reflecting ice. Visible features: pressure ridges, fractures, and the occasional refrozen lead. KSP nightside ambient ≈ 1% dayside; rendering should show ice-features only.",
  "li_195":"<b>Atmosphere haze.</b> Pale gray-blue limb glow (<code>#5a7090</code>) about 15–25 km thick — Rayleigh-scattered M-dwarf light. Significantly fainter than Earth&#x27;s blue limb because of the M-dwarf SED.",
  "li_196":"<b>Star in sky.</b> TRAPPIST-1 subtends 2.17° in e&#x27;s sky (4× the Sun from Earth) — appears as a deep red-orange disk (<code>#ff7a1a</code>) about the size of a large dinner plate held at arm&#x27;s length. The illumination on the surface feels like &quot;perpetual sunset&quot; at the substellar point, fading to dusk and full night moving away.",
  "li_197":"<b>Sister planets in sky.</b> d (next inward) at angular size ~0.3° in conjunction; f (next outward) at ~0.4°. Conjunctions every few days due to the resonant chain. The full system is near-coplanar.",
  "h2_198":"Bibliography",
  "h3_199":"Read (visual-informative, drove decisions above)",
  "li_200":"<b>2509.05414</b> Glidden 2025 (DREAMS NIRSpec PRISM) — first JWST transmission spectra of e (4 visits). Excludes cloudy H₂-rich atmospheres at &gt;3σ; constrains stellar contamination methods. Cornerstone observational paper.",
  "li_201":"<b>2509.05407</b> Glidden 2025 (DREAMS Secondary Atmospheres) — companion paper. <b>N₂-rich atmospheres with trace CO₂ and CH₄ fully permitted; weak disfavor of Venus-analog at 2σ.</b> Drives the scenario choice.",
  "li_202":"<b>2510.18704</b> Bourgeois 2025 — Multimodel ensemble (photochemistry + 3D climate + transmission spectra) for e. Explores N₂/CO₂/CH₄/H₂O composition space, water clouds, and photochemical hazes. Informs the cloud cover fraction and atmospheric composition mix.",
  "li_203":"<b>2502.00132</b> Way 2025 — ROCKE-3D GCM suite for TRAPPIST-1 d but with extensive comparison to e. Locates e in the habitable parameter space and discusses the Earth/Venus/Dead trichotomy. Already read for d Phase 3.",
  "li_204":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of all TRAPPIST-1 planets. &quot;Aqua planet e could maintain a temperate surface given Earth-like geological outgassing and CO₂.&quot; Directly motivates the aquaplanet cfg choice.",
  "li_205":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry atmospheres of e and f. Confirms e can be temperate with E-like geology + CO₂. Supports cfg composition decisions.",
  "li_206":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution of e/f/g. Gives water mass fraction range 0–0.23 for e; sets the bedrock water budget. Used in surface synthesis.",
  "h3_207":"Read (context / methodology, not decision-driving)",
  "li_208":"<b>2403.03403</b> How habitable are M dwarf exoplanets? Modeling surface conditions. General M-dwarf HZ context; not e-specific.",
  "li_209":"<b>2412.10192</b> From CO₂- to H₂O-dominated atmospheres. Background on volatile cycling in habitable-zone planets; informs the CO₂ fraction choice (1% rather than 0.04% for outer-HZ warming).",
  "li_210":"<b>2206.00028</b> Felton 2022 — Atmospheric exchange biosignature false positives (O₂ from d transported to e). Already read for d Phase 3. Constrains the abiotic O₂ background but doesn&#x27;t change the visual cfg.",
  "li_211":"<b>2310.15992</b> New 2D Energy Balance Model for slowly-rotating tidally-locked planets. Methodology context for the substellar disk modeling.",
  "li_212":"<b>2211.11887</b> Cohen 2022 — Traveling planetary-scale waves on tidally-locked aquaplanets. Predicts cloud variability that could add visual interest but is gameplay-irrelevant for KSP.",
  "li_213":"<b>2305.08813</b> <i>(in d bibliography, not e)</i> Various contamination / characterization works — context only.",
  "h3_214":"Read (instrument-only, not visual-informative)",
  "li_215":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series. Methodology only.",
  "li_216":"<b>2407.19167</b> Machine-assisted biosignature classification. Not e-specific.",
  "h3_217":"Not read — no arXiv preprint or low-priority (~34 papers)",
  "p_218":"The e bibliography is the second-largest (64 papers, 30 with arXiv). Most non-arXiv papers are conference abstracts on biosignatures or ELT-specific characterization plans, not visual-informative. Notable items skipped:",
  "li_219":"<b>2024–2025 various</b> — biosignature feasibility studies and JWST proposal abstracts. Skip unless updating the cfg-relevant atmospheric composition.",
  "li_220":"<b>Photochemistry program proposals</b> — methodology only.",
  "p_221":"---",
  "h2_222":"Open items for follow-up",
  "li_223":"The Glidden 2025 DREAMS papers acknowledge &quot;features which may be due to either uncorrected stellar contamination or planetary signal.&quot; If a future re-reduction or a new instrument (NIRISS, MIRI MRS) on e finds molecular features, the atmospheric composition table may need updating.",
  "li_224":"The water mass fraction range (0.05–0.10 adopted) is the median of Bourgeois 2024&#x27;s 0–0.23 — could narrow if Acuña 2025 or later interior fits improve.",
  "li_225":"Cfg variant for the &quot;Venus-analog&quot; interpretation (1 bar CO₂ + H₂SO₄ clouds): visually distinctive yellow-cream world with no ocean. Weakly disfavored at 2σ by Glidden 2025 but not excluded.",
  "li_226":"Cfg variant for the &quot;bare-rock airless&quot; interpretation: similar visuals to b/c but at e&#x27;s much colder dayside temperatures (T_eq ≈ 250 K → mostly ice-coated bare rock).",
  "li_227":"Cross-check the 5% abiotic O₂ choice — could be 10–20% in some Lincowski 2018 scenarios. Lower bound matches &quot;minimum photolytic&quot; expectation; upper bound is more &quot;post-runaway&quot;.",

  "td_152":"derived. 2 × R★ / a × (180/π)",
  "td_153":"<code>stellar_illumination_color_temp_k</code>",
  "td_154":"2566",
  "td_155":"high",
  "td_156":"Agol 2021 SED fit",
  "h2_157":"표면 합성",
  "p_158":"TRAPPIST-1 e 는 시스템에서 가장 거주 가능성이 높은 세계. 세 가지 증거선이 수렴.",
  "p_159":"1. <b>일조량</b> (0.66 S⊕) 이 온실 가열을 동반한 어떤 합리적 대기에 대해서도 보수적 거주 가능 영역 (Kopparapu 2013 / 2014) 안에 위치. 대기 없으면 e 는 얼어붙음; 1 bar N₂/CO₂ 면 표면 액체 물을 유지 (Wolf 2017, Turbet 2018 §4).",
  "p_160":"2. <b>밀도</b> (Agol 2021 의 4.92 g/cc) 가 지구의 5.51 g/cc 보다 낮으며 non-trivial 한 물 질량 분율과 일관. 마그마 바다 모델링 (Bourgeois et al. 2024 — 2008.09599) 이 e 에 대해 물 질량 분율 0–0.23 을 제시, 중앙 추정값은 약 0.05–0.10 (질량으로 수 퍼센트 = 지구 해양 분량의 수 배).",
  "p_161":"3. <b>관측 일관성.</b> Glidden 2025 (DREAMS) 가 H₂-rich 를 배제하고 Venus-analog 대기를 약하게 disfavor 하지만, 미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기는 명시적으로 허용 — 정확히 canonical 지구 analog 2차 대기.",
  "p_162":"표면 morphology 의 경우, tidally-locked aquaplanet 템플릿 (Pierrehumbert 2011, Hu &amp; Yang 2014, Wolf 2017) 이 독특한 &quot;eyeball Earth&quot; 패턴을 제공.",
  "li_163":"<b>Substellar disk</b> (substellar 점에서 ≲35°). 열린 해양, 액체 물에 충분히 따뜻 (Wolf 2017 Aquaplanet 시나리오에서 substellar 표면 온도 ~290 K), cirrus 구름 가능.",
  "li_164":"<b>중위도 / 중경도</b> (substellar 에서 35–90°). ice line 의 수 m 부터 terminator 근처의 수백 m 까지 두께가 변하는 sea ice.",
  "li_165":"<b>Terminator 와 nightside</b> (substellar 에서 &gt;90°). 얼어붙은 해양 위 두꺼운 빙하 얼음 (&gt;1 km); 얼음이 tectonic feature 주변에서 깨진 ridge 정상에 노출 지형 가능.",
  "p_166":"<b>색 선택.</b> 두 가지 경쟁 효과. (a) 내재적 얼음/눈 albedo 는 높음 (0.6–0.8) 이고 푸르스름한 흰색, (b) 2566 K M-dwarf 조명이 인지되는 hue 를 적-오렌지 쪽으로 강하게 이동. 결합 결과 얼음 커버에 대해 warm cream-white (<code>#d8d0c4</code>) 와 깊은 해양에 대해 어두운 navy-violet (<code>#1a2540</code>). Hu 2014 가 명시적으로 지적하기를, M-dwarf 주위 aquaplanet 은 stellar SED 가 Rayleigh-scatter 할 단파장 flux 가 최소이기 때문에 지구보다 &quot;덜 푸르게&quot; 보임.",
  "p_167":"<b>산화철 / 기반암.</b> 노출 제한 — 대부분의 표면적이 얼음으로 덮임. 기반암 외관은 빙하 흐름이 얼음을 얇게 만든 terminator 근처 ridge 정상에 한정. accent <code>#7a6a58</code> 은 M-dwarf 빛 아래의 muted weathered- basalt 톤.",
  "p_168":"<b>조석 lock 하의 morphology.</b> Substellar disk 가 활발한 수문학적 순환을 hosting — 표면 가열이 증발을 이끌고, polar / nightside cold-trap 에서의 응결이 영구 빙하를 만들고, 빙하 흐름이 물을 substellar disk 쪽으로 되돌림. 이 패턴은 지질학적 시간 척도에서 안정 (Wolf 2017 §6), 계절 사이클이 아닌 영구 기후 영역을 가진 행성을 만들어냄.",
  "h2_169":"대기 합성",
  "p_170":"Glidden 2025 (DREAMS NIRSpec PRISM, 4 transit) 가 e 의 첫 JWST transmission 스펙트럼을 제시. 0.6–5 μm 전반의 상당한 stellar contamination 이 추론을 복잡하게 만들지만, Gaussian process 로 stellar feature 를 marginalize 한 후 다음을 발견.",
  "li_171":"H₂-rich (부피로 ≳80%) 구름낀 대기 &gt;3σ 에서 배제",
  "li_172":"Venus-analog CO₂-rich 대기 2σ 에서 약하게 disfavor",
  "li_173":"미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기는 <b>완전히 허용</b>",
  "li_174":"맨 암석 해석도 적합하지만 설명되지 않은 feature 동반",
  "p_175":"이는 Wolf 2017 / Lincowski 2018 / Way 2025 모델링에서 기대되는 지구 analog 2차 대기와 일관 — 오히려 지지.",
  "p_176":"NearStars 는 <b>1 bar N₂-rich aquaplanet 대기</b>를 채택.",
  "li_177":"<b>압력</b> 1 bar (100 kPa) — 지구 analog, Glidden 2025 N₂-rich 일관성 윈도우 내에 편안하게 위치.",
  "li_178":"<b>조성</b> N₂ 78% (지구형 배경), Ar 0.5%, CO₂ 1% (outer-HZ 온실 가열 제공을 위해 지구의 0.04% 대비 상승; Wolf 2017 이 거주 가능 표면을 위해 1–10× CO₂ 향상 필요하다고 발견), H₂O 0.1–1% (substellar 표면 근처는 포화, 그 외에서는 훨씬 적음), O₂ ~5% (abiotic 광분해 구동 O₂; cfg 에서 산소 발생 생물권을 가정하지 않으므로 현재 지구의 21% 보다 낮음).",
  "li_179":"<b>구름.</b> Wolf 2017 GCM 이 ~55% 전역 구름 커버리지를 만들어냄, 대부분 열린 물 disk 위의 stratocumulus 와 그 외의 high cirrus. Cirrus 가 5–10% 온실 가열 기여.",
  "p_180":"<b>하늘 외관.</b> 1 bar N₂ 대기는 단파장에서 지구형 Rayleigh scattering 을 가지지만, 2566 K stellar SED 는 0.5 μm 아래에서 최소 flux 를 가짐 — 그래서 산란된 하늘 색은 지구의 푸름에 비해 훨씬 어둡고 오렌지 쪽으로 이동. 천정 하늘은 dim 한 red-blue 혼합 (~<code>#3a4060</code>), horizon 근처에서 warm orange (<code>#a07050</code>) 로 전환. 물 구름 feature 는 적색 stellar light 를 받는 warm cream 패치 (<code>#c0a890</code>) 로 나타남.",
  "p_181":"호스트 별이 각 크기 2.17° 로 낮의 하늘을 지배 (지구에서 본 태양 각 크기의 약 4배). substellar 점의 표면 조명은 지구의 약 0.66배, 짙게 흐린 지구의 하루와 유사 — 다만 spectral peak 이 적색/근적외선 쪽으로 확실히 이동.",
  "p_182":"<b>Nightside.</b> 직접적인 stellar 조명 없음; 유일한 광원은 (a) 대기 순환을 통해 dayside 에서 운반된 산란광 (무시 가능), (b) 자매 행성에서 반사된 빛 (합 시 f 와 d, 각 크기 ~0.4–0.5°, mv ≈ −10 ~ −13), (c) 먼 별로부터의 starlight (부재한 태양에서의 대기 산란이 없어 보임). Nightside 하늘은 극적으로 어두움 — KSP nightside ambient 는 dayside 의 ~1% 여야.",
  "h2_183":"자전 &amp; spin 합성",
  "p_184":"e 의 7.6 Gyr 동안 6.10 일 주기에서의 조석 damping 이 동기 (1:1) 구성을 모호함 없이 확립. 황도 경사각은 0 으로 damping (Agol 2021 §6.2). Eccentricity 는 0.00510 (Agol 2021), 3:2 spin-orbit 에는 너무 낮음 (Vinson 2017).",
  "p_185":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 6.1010 일 (527 127 s). Kopernicus <code>rotationPeriod</code> 가 궤도 <code>period</code> 와 초 단위로 같아야 함.",
  "p_186":"<b>느린 자전 효과.</b> 6.1 일 자전 주기로 Coriolis 효과는 지구보다 약함 (Rossby number 상승). Wolf 2017 GCM 은 이것이 지구의 좁은 jet stream 대신 substellar disk 에서 느리고 넓은 동→서 zonal 순환을 만든다고 보임. 구름 패턴에 대한 시각적 함의. 더 매끄럽고 더 큰 규모의 구름 band; 더 적은 cyclonic 활동.",
  "p_187":"<b>계절 없음.</b> 황도 경사각 = 0; libration 유도 일조량 변동 &lt; 0.4%. substellar 점과 그 열린 물 disk 가 표면 frame 에서 고정.",
  "h2_188":"비주얼 스타일",
  "p_189":"표면과 대기 결정 결합.",
  "li_190":"<b>전역 외관.</b> 궤도에서 보면 e 는 substellar 점 근처의 warm-cream 열린 물 &quot;동공&quot; 과 그 주위를 둘러싼 fractal sea-ice 전이 영역, 그리고 그 너머의 완전한 흰색-크림 빙하 얼음을 가진 눈공처럼 보임. 영구 구름 커버 (~55% 전역) 가 외관을 부드럽게 만들고, substellar 해양 위에는 stratocumulus, 얼음 영역 위에는 high cirrus.",
  "li_191":"<b>Substellar disk (열린 물).</b> 강렬한 적-오렌지 조명 아래 어두운 navy 해양 (<code>#1a2540</code>), warm cream 구름 (<code>#c0a890</code>) 으로 점점이 박힘. 행성의 가장 시각적으로 인상적인 feature.",
  "li_192":"<b>얼음 전이 band.</b> warm cream (<code>#d8d0c4</code>) 얼음과 어두운 해양 (<code>#1a2540</code>) 의 fractal 패턴 — 열린 lead 를 가진 깨진 sea ice. 전이 반경은 substellar 에서 약 35° (Wolf 2017); KSP 지형이 이것을 대략 원형의 ice line 으로 보여야 함.",
  "li_193":"<b>빙하 얼음 영역.</b> 빙하 흐름이 기반암과 만나는 곳에 미묘한 지형 기복을 가진 매끄러운 warm cream (<code>#d8d0c4</code>). Terminator 는 비스듬한 조명에서 가장 밝은 영역 — 긴 그림자가 압력 ridge 와 crevasse 를 드러냄.",
  "li_194":"<b>Nightside.</b> Starlight 를 반사하는 얼음에서 옅은 cyan-white sheen 을 가진 어두움. 보이는 feature. 압력 ridge, 균열, 가끔의 refrozen lead. KSP nightside ambient ≈ dayside 의 1%; 렌더링은 얼음 feature 만 보여야.",
  "li_195":"<b>Atmosphere haze.</b> 약 15–25 km 두께의 옅은 gray-blue limb glow (<code>#5a7090</code>) — Rayleigh-산란된 M-dwarf 빛. M-dwarf SED 때문에 지구의 푸른 limb 보다 상당히 흐릿.",
  "li_196":"<b>하늘의 별.</b> TRAPPIST-1 이 e 의 하늘에서 2.17° 차지 (지구에서 본 태양의 4배) — 팔 길이로 든 큰 식기 접시 정도 크기의 깊은 적-오렌지 disk (<code>#ff7a1a</code>) 로 나타남. substellar 점에서의 표면 조명은 &quot;영원한 일몰&quot; 처럼 느껴지며, 멀어질수록 황혼과 완전한 밤으로 흐려짐.",
  "li_197":"<b>하늘의 자매 행성.</b> d (다음 안쪽) 가 합에서 각 크기 ~0.3°; f (다음 바깥쪽) 가 ~0.4°. 공명 체인 때문에 며칠마다 합. 전체 시스템은 거의 동일 평면.",
  "h2_198":"참고 문헌",
  "h3_199":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_200":"<b>2509.05414</b> Glidden 2025 (DREAMS NIRSpec PRISM) — e 의 첫 JWST transmission 스펙트럼 (4 visit). 구름낀 H₂-rich 대기를 &gt;3σ 에서 배제; stellar contamination 방법 제약. 초석이 되는 관측 논문.",
  "li_201":"<b>2509.05407</b> Glidden 2025 (DREAMS Secondary Atmospheres) — 동반 논문. <b>미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기 완전히 허용; Venus-analog 를 2σ 에서 약하게 disfavor.</b> 시나리오 선택 견인.",
  "li_202":"<b>2510.18704</b> Bourgeois 2025 — e 에 대한 다중모델 앙상블 (광화학 + 3D 기후 + transmission 스펙트럼). N₂/CO₂/CH₄/H₂O 조성 공간, 물 구름, 광화학 haze 탐구. 구름 커버 분율과 대기 조성 혼합에 정보 제공.",
  "li_203":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d 를 위한 ROCKE-3D GCM 스위트지만 e 와의 광범위한 비교 동반. e 를 거주 가능 파라미터 공간에 위치시키고 Earth/Venus/Dead 삼분법 논의. d Phase 3 에서 이미 읽음.",
  "li_204":"<b>1809.07498</b> Lincowski 2018 — 모든 TRAPPIST-1 행성의 진화한 기후. &quot;Aqua planet e 가 지구형 지질학적 outgassing 과 CO₂ 가 주어지면 온대 표면을 유지할 수 있음.&quot; Aquaplanet cfg 선택을 직접 동기 부여.",
  "li_205":"<b>2006.11349</b> Wunderlich 2020 — e 와 f 의 wet vs. dry 대기. e 가 E-like geology + CO₂ 로 온대일 수 있음을 확인. cfg 조성 결정을 지지.",
  "li_206":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 마그마 바다 진화. e 에 대해 물 질량 분율 범위 0–0.23 제공; 기반암 물 예산 설정. 표면 합성에 사용.",
  "h3_207":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_208":"<b>2403.03403</b> M dwarf 외계행성이 얼마나 거주 가능한가? 표면 조건 모델링. 일반 M-dwarf HZ 맥락; e 특화 아님.",
  "li_209":"<b>2412.10192</b> CO₂-에서 H₂O-지배 대기로. 거주 가능 영역 행성의 휘발성 cycling 배경; CO₂ 분율 선택에 정보 제공 (outer-HZ 가열을 위해 0.04% 대신 1%).",
  "li_210":"<b>2206.00028</b> Felton 2022 — 대기 교환 biosignature false-positive (d 의 O₂ 가 e 로 운반). d Phase 3 에서 이미 읽음. abiotic O₂ 배경을 제약하지만 시각 cfg 를 바꾸지 않음.",
  "li_211":"<b>2310.15992</b> 느리게 자전하는 tidally-locked 행성을 위한 새 2D Energy Balance Model. substellar disk 모델링의 방법론 맥락.",
  "li_212":"<b>2211.11887</b> Cohen 2022 — tidally-locked aquaplanet 의 traveling planetary-scale wave. 시각적 흥미를 더할 수 있는 구름 가변성을 예측하지만 KSP 에서는 게임플레이 무관.",
  "li_213":"<b>2305.08813</b> <i>(d 참고문헌에 있음, e 가 아님)</i> 다양한 contamination / 특성화 작업 — 맥락만.",
  "h3_214":"읽음 (instrument-only, 시각 정보 아님)",
  "li_215":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series. 방법론만.",
  "li_216":"<b>2407.19167</b> 기계 보조 biosignature 분류. e 특화 아님.",
  "h3_217":"읽지 않음 — arXiv preprint 없음 또는 낮은 우선순위 (~34 편)",
  "p_218":"e 의 참고문헌은 두 번째로 큼 (64 편, 30 편이 arXiv). 대부분의 비-arXiv 논문은 biosignature 나 ELT 특화 특성화 계획에 대한 conference abstract 이며 시각-정보 제공 아님. 주목할 만한 skip 항목.",
  "li_219":"<b>2024–2025 다양</b> — biosignature 가능성 연구와 JWST 제안 abstract. cfg 관련 대기 조성 업데이트할 때만 skip 하지 않음.",
  "li_220":"<b>광화학 프로그램 제안서</b> — 방법론만.",
  "p_221":"---",
  "h2_222":"후속 follow-up 항목",
  "li_223":"Glidden 2025 DREAMS 논문은 &quot;보정되지 않은 stellar contamination 또는 행성 신호 때문일 수 있는 feature&quot; 를 인정. 미래의 재환원이나 새 instrument (NIRISS, MIRI MRS) 가 e 에서 분자 feature 를 발견하면 대기 조성 표 업데이트 필요할 수 있음.",
  "li_224":"물 질량 분율 범위 (채택된 0.05–0.10) 는 Bourgeois 2024 의 0–0.23 의 중앙값 — Acuña 2025 나 이후의 내부 fit 가 개선되면 좁힐 수 있음.",
  "li_225":"&quot;Venus-analog&quot; 해석 (1 bar CO₂ + H₂SO₄ 구름) cfg 변형. 해양 없는 시각적으로 독특한 yellow-cream 세계. Glidden 2025 가 2σ 에서 약하게 disfavor 지만 배제는 아님.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
