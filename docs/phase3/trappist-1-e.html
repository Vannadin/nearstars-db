  "h2_165":"Surface synthesis",
  "p_166":"TRAPPIST-1 e is the system&#x27;s most likely habitable world. Three lines of evidence converge:",
  "p_167":"1. <b>Insolation</b> (0.66 S⊕) places it inside the conservative habitable zone (Kopparapu 2013 / 2014) for any reasonable atmosphere with greenhouse warming. Without an atmosphere, e freezes; with 1 bar N₂/CO₂, it supports surface liquid water (Wolf 2017, Turbet 2018 §4).",
  "p_168":"2. <b>Density</b> (4.92 g/cc from Agol 2021) is lower than Earth&#x27;s 5.51 g/cc, consistent with a non-trivial water mass fraction. Magma-Ocean modeling (Bourgeois et al. 2024 — 2008.09599) gives a water mass fraction of 0–0.23 for e, with central estimates around 0.05–0.10 (several percent by mass = several Earth oceans worth of water).",
  "p_169":"3. <b>Observational consistency.</b> Glidden 2025 (DREAMS) rules out H₂-rich and weakly disfavors Venus-analog atmospheres, but explicitly permits N₂-rich atmospheres with trace CO₂ and CH₄ — exactly the canonical Earth-analog secondary atmosphere.",
  "p_170":"For the surface morphology, the tidally-locked aquaplanet template (Pierrehumbert 2011, Hu &amp; Yang 2014, Wolf 2017) gives a distinctive &quot;eyeball Earth&quot; pattern:",
  "li_171":"<b>Substellar disk</b> (≲35° from substellar point): open ocean, warm enough for liquid water (substellar surface temperature ~290 K in Wolf 2017 Aquaplanet scenario), possible cirrus clouds.",
  "li_172":"<b>Mid-latitudes / mid-longitudes</b> (35–90° from substellar): sea ice with thickness varying from a few meters at the ice line to hundreds of meters near the terminator.",
  "li_173":"<b>Terminator and nightside</b> (&gt;90° from substellar): thick glacial ice (&gt;1 km) over a frozen ocean; possible emerged terrain at ridge tops where ice has fractured around tectonic features.",
  "p_174":"<b>Color choice.</b> Two competing effects: (a) intrinsic ice/snow albedo is high (0.6–0.8) and bluish-white, (b) the 2566 K M-dwarf illumination shifts perceived hue strongly to red-orange. The combination produces a warm cream-white for ice cover (<code>#d8d0c4</code>) and a dark navy-violet for deep ocean (<code>#1a2540</code>). Hu 2014 explicitly notes that aquaplanets around M-dwarfs appear &quot;less blue&quot; than Earth because the stellar SED has minimal short-wavelength flux to Rayleigh-scatter.",
  "p_175":"<b>Iron oxide / bedrock.</b> Limited exposure — most surface area is ice-covered. Bedrock appearance limited to ridge tops near the terminator where glacial flow has thinned ice. The accent <code>#7a6a58</code> is a muted weathered-basalt tone under M-dwarf light.",
  "p_176":"<b>Morphology under tidal lock.</b> The substellar disk hosts active hydrological circulation — surface heating drives evaporation, condensation in the polar / nightside cold-traps creates persistent glaciers, glacial flow returns water toward the substellar disk. This pattern is stable on geological timescales (Wolf 2017 §6), producing a planet with permanent climatic zones rather than seasonal cycles.",
  "h2_177":"Atmosphere synthesis",
  "p_178":"Glidden 2025 (DREAMS NIRSpec PRISM, 4 transits) presents the first JWST transmission spectra of e. Significant stellar contamination across 0.6–5 μm complicates the inference, but after marginalizing over stellar features with Gaussian processes they find:",
  "li_179":"H₂-rich (≳80% by volume) cloudy atmospheres excluded at &gt;3σ",
  "li_180":"Venus-analog CO₂-rich atmospheres weakly disfavored at 2σ",
  "li_181":"N₂-rich atmospheres with trace CO₂ and CH₄ are <b>fully permitted</b>",
  "li_182":"Bare-rock interpretation also adequate but with unexplained features",
  "p_183":"This is consistent with — and rather supports — the Earth-analog secondary atmosphere expected from Wolf 2017 / Lincowski 2018 / Way 2025 modeling.",
  "p_184":"For NearStars we adopt the <b>1 bar N₂-rich aquaplanet atmosphere</b>:",
  "li_185":"<b>Pressure</b> 1 bar (100 kPa) — Earth-analog, comfortably within the Glidden 2025 N₂-rich consistency window.",
  "li_186":"<b>Composition</b> N₂ 78% (Earth-like background), Ar 0.5%, CO₂ 1% (elevated vs. Earth&#x27;s 0.04% to provide outer-HZ greenhouse warming; Wolf 2017 finds 1–10× CO₂ enhancement needed for habitable surface), H₂O 0.1–1% (saturated near substellar surface, much less elsewhere), O₂ ~5% (abiotic photolysis-driven O₂; below current Earth&#x27;s 21% because no oxygenic biosphere is assumed in the cfg).",
  "li_187":"<b>Clouds.</b> Wolf 2017 GCM produces ~55% global cloud cover, mostly stratocumulus over the open-water disk and high cirrus elsewhere. Cirrus contributes 5–10% greenhouse warming.",
  "p_188":"<b>Sky appearance.</b> The 1 bar N₂ atmosphere has Earth-like Rayleigh scattering at short wavelengths, but the 2566 K stellar SED has minimal flux below 0.5 μm — so the scattered sky color is much dimmer and shifted toward orange compared to Earth&#x27;s blue. The zenith sky is a dim red-blue mix (~<code>#3a4060</code>), transitioning to a warm orange near the horizon (<code>#a07050</code>). Water cloud features appear as warm cream patches (<code>#c0a890</code>) catching the red stellar light.",
  "p_189":"The host star dominates the daytime sky at angular size 2.17° (about 4× the Sun&#x27;s angular size from Earth). Surface illumination at the substellar point is about 0.66 × Earth&#x27;s, similar to a heavily overcast Earth day — but with the spectral peak shifted firmly into the red/near-IR.",
  "p_190":"<b>Nightside.</b> No direct stellar illumination; the only light sources are (a) scattered light from the dayside transported via atmospheric circulation (negligible), (b) reflected light from sister planets (f and d at conjunction, ~0.4–0.5° angular diameter, mv ≈ −10 to −13), and (c) starlight from distant stars (visible because there is no atmospheric scattering from the absent sun). Nightside sky is dramatically dark — KSP nightside ambient should be ~1% of dayside.",
  "h2_191":"Rotation &amp; spin synthesis",
  "p_192":"Tidal damping for e at 6.10-day period over 7.6 Gyr establishes the synchronous (1:1) configuration unambiguously. Obliquity damped to zero (Agol 2021 §6.2). Eccentricity is 0.00510 (Agol 2021), too low for 3:2 spin-orbit (Vinson 2017).",
  "p_193":"<b>KSP implementation note.</b> Rotation period = orbital period = 6.1010 days (527 127 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_194":"<b>Slow rotation effects.</b> With a 6.1-day rotation period, Coriolis effects are weaker than on Earth (Rossby number elevated). Wolf 2017 and Cohen 2022 (2211.11887, Met Office UM GCM) agree that e sits in the <b>double mid-latitude jet regime</b> (mean zonal wind ~18 m/s) — not Earth&#x27;s single equatorial jet. Two stationary Rossby gyres form at 60–70°N/S, with the eastern gyre&#x27;s center oscillating between 30–60°E and 120–150°E on a ~20-day cycle. The substellar cloud disk reaches only ±30° in latitude (vs. ±60° on Proxima b in the same study). The visual implication for KSP: cloud patterns dominated by two mid-latitude bands of stratocumulus and a quasi-stationary substellar cloud cluster, with subtle 20-day variability that won&#x27;t be visible at typical KSP gameplay speeds.",
  "p_195":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.4%. The substellar point and its open-water disk are fixed in the surface frame.",
  "h2_196":"Visual styling",
  "p_197":"Combining surface and atmosphere decisions:",
  "li_198":"<b>Global appearance.</b> From orbit, e looks like a snowball with a warm-cream open-water &quot;pupil&quot; near the substellar point, ringed by a fractal sea-ice transition zone, and entirely white-cream glacial ice beyond. Persistent cloud cover (~55% global) softens the appearance, with stratocumulus over the substellar ocean and high cirrus over the ice zones.",
  "li_199":"<b>Substellar disk (open water).</b> Dark navy ocean (<code>#1a2540</code>) under intense red-orange illumination, dotted with warm cream clouds (<code>#c0a890</code>). Most visually striking feature of the planet.",
  "li_200":"<b>Ice transition band.</b> Fractal pattern of warm cream (<code>#d8d0c4</code>) ice and dark ocean (<code>#1a2540</code>) — broken sea ice with open leads. The transition radius is about 35° from substellar (Wolf 2017); KSP terrain should show this as a roughly circular ice line.",
  "li_201":"<b>Glacial ice zone.</b> Smooth warm cream (<code>#d8d0c4</code>) with subtle topographic relief where glacial flow encounters bedrock. The terminator is the brightest zone in oblique illumination — long shadows reveal pressure ridges and crevasses.",
  "li_202":"<b>Nightside.</b> Dark with a faint cyan-white sheen from starlight-reflecting ice. Visible features: pressure ridges, fractures, and the occasional refrozen lead. KSP nightside ambient ≈ 1% dayside; rendering should show ice-features only.",
  "li_203":"<b>Atmosphere haze.</b> Pale gray-blue limb glow (<code>#5a7090</code>) about 15–25 km thick — Rayleigh-scattered M-dwarf light. Significantly fainter than Earth&#x27;s blue limb because of the M-dwarf SED.",
  "li_204":"<b>Star in sky.</b> TRAPPIST-1 subtends 2.17° in e&#x27;s sky (4× the Sun from Earth) — appears as a deep red-orange disk (<code>#ff7a1a</code>) about the size of a large dinner plate held at arm&#x27;s length. The illumination on the surface feels like &quot;perpetual sunset&quot; at the substellar point, fading to dusk and full night moving away.",
  "li_205":"<b>Sister planets in sky.</b> d (next inward) at angular size ~0.3° in conjunction; f (next outward) at ~0.4°. Conjunctions every few days due to the resonant chain. The full system is near-coplanar.",
  "h2_206":"Bibliography",
  "h3_207":"Read (visual-informative, drove decisions above)",
  "li_208":"<b>2509.05414</b> Glidden 2025 (DREAMS NIRSpec PRISM) — first JWST transmission spectra of e (4 visits). Excludes cloudy H₂-rich atmospheres at &gt;3σ; constrains stellar contamination methods. Cornerstone observational paper.",
  "li_209":"<b>2509.05407</b> Glidden 2025 (DREAMS Secondary Atmospheres) — companion paper. <b>N₂-rich atmospheres with trace CO₂ and CH₄ fully permitted; weak disfavor of Venus-analog at 2σ.</b> Drives the scenario choice.",
  "li_210":"<b>2510.18704</b> Bourgeois 2025 — Multimodel ensemble (photochemistry + 3D climate + transmission spectra) for e. Explores N₂/CO₂/CH₄/H₂O composition space, water clouds, and photochemical hazes. Informs the cloud cover fraction and atmospheric composition mix.",
  "li_211":"<b>2502.00132</b> Way 2025 — ROCKE-3D GCM suite for TRAPPIST-1 d but with extensive comparison to e. Locates e in the habitable parameter space and discusses the Earth/Venus/Dead trichotomy. Already read for d Phase 3.",
  "li_212":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of all TRAPPIST-1 planets. &quot;Aqua planet e could maintain a temperate surface given Earth-like geological outgassing and CO₂.&quot; Directly motivates the aquaplanet cfg choice.",
  "li_213":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry atmospheres of e and f. Confirms e can be temperate with E-like geology + CO₂. Supports cfg composition decisions.",
  "li_214":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution of e/f/g. Gives water mass fraction range 0–0.23 for e; sets the bedrock water budget. Used in surface synthesis.",
  "h3_215":"Read (context / methodology, not decision-driving)",
  "li_216":"<b>2403.03403</b> How habitable are M dwarf exoplanets? Modeling surface conditions. General M-dwarf HZ context; not e-specific.",
  "li_217":"<b>2412.10192</b> From CO₂- to H₂O-dominated atmospheres. Background on volatile cycling in habitable-zone planets; informs the CO₂ fraction choice (1% rather than 0.04% for outer-HZ warming).",
  "li_218":"<b>2206.00028</b> Felton 2022 — Atmospheric exchange biosignature false positives (O₂ from d transported to e). Already read for d Phase 3. Constrains the abiotic O₂ background but doesn&#x27;t change the visual cfg.",
  "li_219":"<b>2310.15992</b> New 2D Energy Balance Model for slowly-rotating tidally-locked planets. Methodology context for the substellar disk modeling.",
  "li_220":"<b>2211.11887</b> Cohen 2022 — Traveling planetary-scale waves on tidally-locked aquaplanets, Met Office UM GCM. Drives the <b>cloud morphology</b> decision: e sits in the double mid-latitude jet regime (~18 m/s mean zonal wind), with substellar cloud disk reaching only ±30° in latitude. Two stationary Rossby gyres at 60–70°N/S; eastern gyre oscillates on a ~20-day cycle. Mean cloud fraction 60%, confirming Wolf 2017.",
  "li_221":"<b>2312.01893</b> Boldog 2023 — Water content of HZ rocky planets. e has subsurface ocean probability 87.56% (highest tier in their catalog). Rock-ice-boundary tidal heat 0.21 W/m² (range 0.18–0.24, much larger than surface flux). Supports the water-rich aquaplanet cfg choice.",
  "li_222":"<b>1906.06797</b> Yamashiki 2019 — Stellar superflare habitability impact. TRAPPIST-1&#x27;s Spot Maximum Flare = 9.09×10³² erg. With a 1 bar N₂/O₂ atmosphere + Earth-level magnetic field, ground-level dose stays non-lethal even under Spot Maximum (≤1.18×10⁴ Sv at top-of-atmosphere → manageable at surface). Critical atmospheric column for complex life: ~2.04×10² g/cm² (20% Earth). Supports keeping the 1 bar atmosphere cfg.",
  "li_223":"<b>2309.15239</b> + <b>2405.20167</b> Cooke 2023 / 2024 — WACCM6 Earth-like-continents simulations for e. Global mean surface T 219–231 K (cooler than Wolf 2017 aquaplanet&#x27;s 270 K) because of realistic land-ocean partitioning. O₃ column 50–1310 DU depending on stellar UV scenario. The aquaplanet cfg chooses the warmer Wolf 2017 baseline; WACCM6 is a colder alternative for the &quot;less habitable&quot; cfg variant.",
  "li_224":"<b>2601.18324</b> Bourgeois 2026 — Early Great Oxidation Event on TRAPPIST-1 e (~700 Myr earlier than Earth, K_oxy ~0.83 vs 1.0). M-dwarf UV distribution favors O₃ over O₂ photolysis, producing a thick O₃ layer at lower atmospheric O₂. Reinforces the cfg&#x27;s inclusion of trace O₃ in atmospheric composition.",
  "li_225":"<b>2305.08813</b> <i>(in d bibliography, not e)</i> Various contamination / characterization works — context only.",
  "h3_226":"Read (instrument-only, not visual-informative)",
  "li_227":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series. Methodology only.",
  "li_228":"<b>2407.19167</b> Machine-assisted biosignature classification. Not e-specific.",
  "h3_229":"Not read — no arXiv preprint or low-priority (~34 papers)",
  "p_230":"The e bibliography is the second-largest (64 papers, 30 with arXiv). Most non-arXiv papers are conference abstracts on biosignatures or ELT-specific characterization plans, not visual-informative. Notable items skipped:",
  "li_231":"<b>2024–2025 various</b> — biosignature feasibility studies and JWST proposal abstracts. Skip unless updating the cfg-relevant atmospheric composition.",
  "li_232":"<b>Photochemistry program proposals</b> — methodology only.",
  "p_233":"---",
  "h2_234":"Open items for follow-up",
  "li_235":"The Glidden 2025 DREAMS papers acknowledge &quot;features which may be due to either uncorrected stellar contamination or planetary signal.&quot; If a future re-reduction or a new instrument (NIRISS, MIRI MRS) on e finds molecular features, the atmospheric composition table may need updating.",
  "li_236":"The water mass fraction range (0.05–0.10 adopted) is the median of Bourgeois 2024&#x27;s 0–0.23 — could narrow if Acuña 2025 or later interior fits improve.",
  "li_237":"Cfg variant for the &quot;Venus-analog&quot; interpretation (1 bar CO₂ + H₂SO₄ clouds): visually distinctive yellow-cream world with no ocean. Weakly disfavored at 2σ by Glidden 2025 but not excluded.",
  "li_238":"Cfg variant for the &quot;bare-rock airless&quot; interpretation: similar visuals to b/c but at e&#x27;s much colder dayside temperatures (T_eq ≈ 250 K → mostly ice-coated bare rock).",
  "li_239":"Cross-check the 5% abiotic O₂ choice — could be 10–20% in some Lincowski 2018 scenarios. Lower bound matches &quot;minimum photolytic&quot; expectation; upper bound is more &quot;post-runaway&quot;.",

  "p_1":"TRAPPIST-1 e 는 M8V ultra-cool dwarf 를 6.10 일 주기로 도는 0.92 R⊕, 0.69 M⊕ 의 암석 행성입니다. 안쪽에서 네 번째 행성이며 지구 일조량의 0.66배를 받아 보수적 거주 가능 영역 한가운데에 자리잡고 있고, TRAPPIST-1 시스템 전체를 통틀어 <b>거주 가능성이 가장 높은 단일 세계</b>로 꼽힙니다 (Wolf 2017, Turbet 2018, Lincowski 2018, Way 2025). 최근 JWST NIRSpec PRISM transmission 스펙트럼 (Glidden et al. 2025 DREAMS, 4회 방문) 은 상당한 stellar contamination 에 시달리지만, 그럼에도 H₂-rich 대기를 배제하고 Venus 형 CO₂-rich 대기를 2σ 수준에서 약하게 disfavor 합니다. 미량의 CO₂ 와 CH₄ 를 동반한 N₂-rich 대기는 완전히 허용되며, 맨 암석 해석도 관측과 모순되지 않습니다.",
  "p_2":"<b>NearStars 시나리오 선택. 1 bar N₂/CO₂/H₂O 대기를 가진 온대 aqua-planet 으로, 해양을 보유하고 substellar 지점 부근에 열린 물, terminator 와 nightside 에 얼음을 가진 조석 고정 &quot;안구(eyeball)&quot; geometry 입니다.</b> 이것이 canonical &quot;최선의 거주 가능 후보&quot; cfg 변형이며, (여전히 관측과 양립 가능한) 여러 옵션 가운데 Wolf 2017 / Turbet 2018 / Way 2025 의 aquaplanet 시나리오를 채택했습니다. 대안인 맨 암석 해석은 백업 cfg 변형으로 남겨둡니다.",

  "h2_165":"Surface synthesis",
  "p_166":"TRAPPIST-1 e 는 시스템에서 거주 가능성이 가장 높은 세계입니다. 세 가지 증거선이 한 점으로 수렴합니다.",
  "p_167":"1. <b>일조량</b> (0.66 S⊕) 은 온실 가열을 동반한 어떤 합리적 대기에 대해서도 보수적 거주 가능 영역 (Kopparapu 2013 / 2014) 안에 위치합니다. 대기가 없으면 e 는 얼어붙고, 1 bar N₂/CO₂ 면 표면 액체 물을 유지합니다 (Wolf 2017, Turbet 2018 §4).",
  "p_168":"2. <b>밀도</b> (Agol 2021 의 4.92 g/cc) 는 지구의 5.51 g/cc 보다 낮아 non-trivial 한 물 질량 분율과 양립합니다. 마그마 바다 모델링 (Bourgeois et al. 2024 — 2008.09599) 은 e 의 물 질량 분율을 0–0.23 범위로 제시하며 중심 추정값은 0.05–0.10 수준입니다 (질량 기준 수 퍼센트는 지구 해양 분량의 수 배에 해당).",
  "p_169":"3. <b>관측 일관성.</b> Glidden 2025 (DREAMS) 는 H₂-rich 를 배제하고 Venus 형 대기를 약하게 disfavor 하지만, 미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기는 명시적으로 허용합니다 — 정확히 canonical 한 지구형 2차 대기입니다.",
  "p_170":"표면 morphology 의 경우, 조석 고정 aquaplanet 템플릿 (Pierrehumbert 2011, Hu &amp; Yang 2014, Wolf 2017) 이 독특한 &quot;eyeball Earth&quot; 패턴을 제시합니다.",
  "li_171":"<b>Substellar disk</b> (substellar 지점에서 ≲35°). 열린 해양이며 액체 물을 유지할 만큼 따뜻합니다 (Wolf 2017 Aquaplanet 시나리오의 substellar 표면 온도 ~290 K). cirrus 구름이 동반될 수 있습니다.",
  "li_172":"<b>중위도 / 중경도</b> (substellar 에서 35–90°). sea ice 가 자리잡고, 두께는 ice line 의 수 m 에서 terminator 부근의 수백 m 까지 변합니다.",
  "li_173":"<b>Terminator 와 nightside</b> (substellar 에서 &gt;90°). 얼어붙은 해양 위 두꺼운 빙하 얼음 (&gt;1 km) 이 덮고 있으며, 얼음이 tectonic feature 주변에서 갈라진 ridge 정상에는 노출 지형이 가능합니다.",
  "p_174":"<b>색 선택.</b> 두 가지 효과가 맞붙습니다. (a) 본래 얼음/눈 albedo 는 높고 (0.6–0.8) 푸르스름한 흰색이지만, (b) 2566 K M-dwarf 조명이 인지 hue 를 적-오렌지 쪽으로 강하게 끌어당깁니다. 결과적으로 얼음 표면은 warm cream-white (<code>#d8d0c4</code>), 깊은 해양은 어두운 navy-violet (<code>#1a2540</code>) 로 잡힙니다. Hu 2014 도 명시적으로 지적했듯, M-dwarf 주위 aquaplanet 은 stellar SED 가 Rayleigh-scatter 할 단파장 flux 를 거의 갖지 않기 때문에 지구보다 &quot;덜 푸르게&quot; 보입니다.",
  "p_175":"<b>산화철 / 기반암.</b> 노출은 제한적입니다 — 표면 대부분이 얼음으로 덮여 있기 때문입니다. 기반암 외관은 빙하 흐름이 얼음을 얇게 만든 terminator 부근 ridge 정상에 국한됩니다. accent <code>#7a6a58</code> 은 M-dwarf 빛 아래의 muted weathered-basalt 톤입니다.",
  "p_176":"<b>조석 고정 하의 morphology.</b> Substellar disk 가 활발한 수문학적 순환의 무대가 됩니다 — 표면 가열이 증발을 일으키고, polar / nightside cold-trap 에서 응결이 영구 빙하를 형성하며, 빙하 흐름이 다시 물을 substellar disk 쪽으로 되돌립니다. 이 패턴은 지질학적 시간 척도에서 안정적이어서 (Wolf 2017 §6) 계절 사이클 대신 영구적인 기후 영역을 가진 행성을 만들어냅니다.",
  "h2_177":"Atmosphere synthesis",
  "p_178":"Glidden 2025 (DREAMS NIRSpec PRISM, 4 transit) 는 e 의 첫 JWST transmission 스펙트럼을 제시합니다. 0.6–5 μm 전반에 걸친 상당한 stellar contamination 이 추론을 복잡하게 만들지만, Gaussian process 로 stellar feature 를 marginalize 한 결과 다음을 확인했습니다.",
  "li_179":"H₂-rich (부피로 ≳80%) 구름 동반 대기는 &gt;3σ 에서 배제",
  "li_180":"Venus 형 CO₂-rich 대기는 2σ 에서 약하게 disfavor",
  "li_181":"미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기는 <b>완전히 허용</b>",
  "li_182":"맨 암석 해석도 적합하지만 설명되지 않은 feature 가 남음",
  "p_183":"이는 Wolf 2017 / Lincowski 2018 / Way 2025 모델링이 기대하는 지구형 2차 대기와 부합하며 — 오히려 그것을 뒷받침합니다.",
  "p_184":"NearStars 에서는 <b>1 bar N₂-rich aquaplanet 대기</b>를 채택합니다.",
  "li_185":"<b>압력</b> 1 bar (100 kPa) — 지구형 값으로, Glidden 2025 N₂-rich 일관성 윈도우 안에 여유 있게 들어갑니다.",
  "li_186":"<b>조성</b> N₂ 78% (지구형 배경), Ar 0.5%, CO₂ 1% (outer-HZ 온실 가열을 위해 지구의 0.04% 보다 올림. Wolf 2017 은 거주 가능 표면 유지에 1–10× CO₂ 증대가 필요하다고 보고), H₂O 0.1–1% (substellar 표면 부근은 포화, 그 외는 훨씬 적음), O₂ ~5% (abiotic 광분해 기원 O₂. cfg 에서 산소 생산 생물권을 가정하지 않으므로 현재 지구의 21% 보다 낮게 둠).",
  "li_187":"<b>구름.</b> Wolf 2017 GCM 은 전역 구름 커버리지 약 55% 를 만들어내며, 열린 물 disk 위에는 주로 stratocumulus, 그 외에는 high cirrus 가 자리잡습니다. cirrus 가 온실 가열에 5–10% 기여합니다.",
  "p_188":"<b>하늘 외관.</b> 1 bar N₂ 대기는 단파장에서 지구형 Rayleigh scattering 을 보이지만, 2566 K stellar SED 는 0.5 μm 아래에서 flux 가 거의 없습니다 — 따라서 산란된 하늘 색은 지구의 푸름에 비해 훨씬 어둡고 오렌지 쪽으로 이동합니다. 천정 하늘은 dim 한 red-blue 혼합 (~<code>#3a4060</code>) 이고 horizon 으로 갈수록 warm orange (<code>#a07050</code>) 로 전환됩니다. 물 구름 feature 는 적색 stellar light 를 받는 warm cream 패치 (<code>#c0a890</code>) 로 나타납니다.",
  "p_189":"호스트 별이 각 크기 2.17° 로 낮 하늘을 지배합니다 (지구에서 본 태양 각 크기의 약 4배). substellar 지점의 표면 조명은 지구의 약 0.66배로 짙게 흐린 지구의 하루와 비슷하지만, spectral peak 이 적색 / 근적외선 쪽으로 확실히 밀려 있습니다.",
  "p_190":"<b>Nightside.</b> 직접적인 stellar 조명은 없습니다. 광원은 (a) 대기 순환 을 통해 dayside 에서 운반된 산란광 (무시 가능), (b) 자매 행성에서 반사된 빛 (합 시 f 와 d 가 각 크기 ~0.4–0.5°, mv ≈ −10 ~ −13), (c) 멀리 있는 별빛 (부재한 태양 때문에 대기 산란이 없어 잘 보임) 정도가 전부입니다. nightside 하늘은 극적으로 어두워서 — KSP 의 nightside ambient 는 dayside 의 약 1% 수준으로 두어야 합니다.",
  "h2_191":"Rotation &amp; spin synthesis",
  "p_192":"7.6 Gyr 동안 6.10 일 주기에서 작용한 조석 damping 은 동기 (1:1) 구성을 모호함 없이 확립시켰습니다. 황도 경사각은 0 으로 damping 되었고 (Agol 2021 §6.2), eccentricity 0.00510 (Agol 2021) 은 3:2 spin-orbit 에 들어 가기에는 지나치게 낮습니다 (Vinson 2017).",
  "p_193":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 6.1010 일 (527 127 s). Kopernicus 의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 일치해야 합니다.",
  "p_194":"<b>느린 자전 효과.</b> 6.1 일 자전 주기에서는 Coriolis 효과가 지구보다 약합니다 (Rossby number 상승). Wolf 2017 과 Cohen 2022 (2211.11887, Met Office UM GCM) 는 e 가 지구의 단일 적도 jet 가 아닌 <b>이중 중위도 jet regime</b> (평균 zonal wind ~18 m/s) 에 자리잡는다고 일치된 결과를 보여줍니다. 두 개의 정상 Rossby gyre 가 60–70°N/S 에 형성되며, 동쪽 gyre 의 중심은 약 20일 주기로 30–60°E 와 120–150°E 사이를 진동합니다. substellar 구름 disk 는 위도 ±30° 까지만 도달합니다 (같은 연구에서 Proxima b 의 ±60° 와 대조). KSP 비주얼 측면의 함의. 구름 패턴은 두 줄기의 중위도 stratocumulus 밴드와 substellar 의 준정상 구름 클러스터 가 주도하며, 미세한 20일 가변성은 일반적인 KSP 게임플레이 속도에서는 보이지 않습니다.",
  "p_195":"<b>계절 없음.</b> 황도 경사각 = 0. libration 유도 일조량 변동은 0.4% 미만입니다. substellar 지점과 그 열린 물 disk 는 표면 frame 에서 고정되어 있습니다.",
  "h2_196":"Visual styling",
  "p_197":"표면과 대기 결정 사항을 결합한 결과입니다.",
  "li_198":"<b>전역 외관.</b> 궤도에서 보면 e 는 substellar 지점 부근에 warm-cream 열린 물 &quot;동공&quot;을 가진 눈공처럼 보이고, 그 주위는 fractal 한 sea-ice 전이대, 그 너머는 완전한 흰색-크림 빙하 얼음으로 덮여 있습니다. 영구적 구름 커버 (전역 ~55%) 가 외관을 부드럽게 만들고, substellar 해양 위에는 stratocumulus, 얼음 영역 위에는 high cirrus 가 자리잡 습니다.",
  "li_199":"<b>Substellar disk (열린 물).</b> 강렬한 적-오렌지 조명 아래의 어두운 navy 해양 (<code>#1a2540</code>) 에 warm cream 구름 (<code>#c0a890</code>) 이 점점이 박힌 모습. 행성에서 시각적으로 가장 인상적인 feature 입니다.",
  "li_200":"<b>얼음 전이 밴드.</b> warm cream (<code>#d8d0c4</code>) 얼음과 어두운 해양 (<code>#1a2540</code>) 의 fractal 패턴 — 열린 lead 가 보이는 깨진 sea ice 입니다. 전이 반경은 substellar 에서 약 35° (Wolf 2017) 이며, KSP 지형은 이를 거의 원형의 ice line 으로 표현해야 합니다.",
  "li_201":"<b>빙하 얼음 영역.</b> 빙하 흐름이 기반암과 만나는 곳에 미세한 지형 기복을 가진 매끄러운 warm cream (<code>#d8d0c4</code>). terminator 는 비스듬한 조명에서 가장 밝은 영역으로, 긴 그림자가 압력 ridge 와 crevasse 를 드러냅니다.",
  "li_202":"<b>Nightside.</b> starlight 를 반사하는 얼음의 옅은 cyan-white sheen 만 남는 어두움. 보이는 feature 는 압력 ridge, 균열, 가끔의 refrozen lead 정도입니다. KSP nightside ambient ≈ dayside 의 1%, 렌더링은 얼음 feature 만 드러내야 합니다.",
  "li_203":"<b>Atmosphere haze.</b> 약 15–25 km 두께의 옅은 gray-blue limb glow (<code>#5a7090</code>) — Rayleigh 산란된 M-dwarf 빛입니다. M-dwarf SED 때문에 지구의 푸른 limb 보다 훨씬 흐릿합니다.",
  "li_204":"<b>하늘의 별.</b> TRAPPIST-1 이 e 의 하늘에서 2.17° 를 차지합니다 (지구에서 본 태양의 4배). 팔 길이로 든 큰 식기 접시 정도 크기의 깊은 적-오렌지 disk (<code>#ff7a1a</code>) 로 보이며, substellar 지점의 표면 조명은 &quot;영원한 일몰&quot; 같은 느낌이고, 멀어질수록 황혼에서 완전한 밤으로 흐려집니다.",
  "li_205":"<b>하늘의 자매 행성.</b> d (안쪽 이웃) 는 합에서 각 크기 ~0.3°, f (바깥쪽 이웃) 는 ~0.4°. 공명 체인 덕분에 며칠마다 합이 발생하며, 전체 시스템은 거의 동일 평면입니다.",
  "h2_206":"Bibliography",
  "h3_207":"Read (visual-informative, drove decisions above)",
  "li_208":"<b>2509.05414</b> Glidden 2025 (DREAMS NIRSpec PRISM) — e 의 첫 JWST transmission 스펙트럼 (4 visit). 구름 동반 H₂-rich 대기를 &gt;3σ 에서 배제하고 stellar contamination 처리 방법을 제약합니다. 초석이 되는 관측 논문입니다.",
  "li_209":"<b>2509.05407</b> Glidden 2025 (DREAMS Secondary Atmospheres) — 동반 논문입니다. <b>미량 CO₂ 와 CH₄ 를 가진 N₂-rich 대기 완전히 허용, Venus 형은 2σ 에서 약하게 disfavor.</b> 시나리오 선택의 결정적 근거입니다.",
  "li_210":"<b>2510.18704</b> Bourgeois 2025 — e 에 대한 다중모델 앙상블 (광화학 + 3D 기후 + transmission 스펙트럼). N₂/CO₂/CH₄/H₂O 조성 공간, 물 구름, 광화학 haze 를 탐구하며 구름 커버 분율과 대기 조성 혼합에 정보를 제공합니다.",
  "li_211":"<b>2502.00132</b> Way 2025 — TRAPPIST-1 d 를 위한 ROCKE-3D GCM 스위트 지만 e 와의 광범위한 비교를 동반합니다. e 를 거주 가능 파라미터 공간 안에 위치시키고 Earth/Venus/Dead 삼분법을 논의합니다. d Phase 3 에서 이미 검토되었습니다.",
  "li_212":"<b>1809.07498</b> Lincowski 2018 — 모든 TRAPPIST-1 행성의 진화한 기후. &quot;Aqua planet e 는 지구형 지질 outgassing 과 CO₂ 가 주어지면 온대 표면을 유지할 수 있다.&quot; aquaplanet cfg 선택의 직접적 동기입니다.",
  "li_213":"<b>2006.11349</b> Wunderlich 2020 — e 와 f 의 wet vs. dry 대기. e 가 지구형 geology + CO₂ 조건에서 온대일 수 있음을 확인하며 cfg 조성 결정을 뒷받침합니다.",
  "li_214":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 마그마 바다 진화. e 의 물 질량 분율 범위 0–0.23 을 제시해 기반암 물 예산을 설정합니다. 표면 합성에서 사용했습니다.",
  "h3_215":"Read (context / methodology, not decision-driving)",
  "li_216":"<b>2403.03403</b> M dwarf 외계행성은 얼마나 거주 가능한가? 표면 조건 모델링. 일반 M-dwarf HZ 맥락이며 e 특화는 아닙니다.",
  "li_217":"<b>2412.10192</b> CO₂ 지배에서 H₂O 지배 대기로. 거주 가능 영역 행성의 휘발성 cycling 배경이며, CO₂ 분율 선택 (outer-HZ 가열을 위해 0.04% 대신 1%) 에 정보를 제공합니다.",
  "li_218":"<b>2206.00028</b> Felton 2022 — 대기 교환 biosignature false-positive (d 의 O₂ 가 e 로 운반). d Phase 3 에서 이미 검토. abiotic O₂ 배경을 제약하지만 비주얼 cfg 는 바꾸지 않습니다.",
  "li_219":"<b>2310.15992</b> 느리게 자전하는 조석 고정 행성을 위한 새로운 2D Energy Balance Model. substellar disk 모델링의 방법론적 맥락 입니다.",
  "li_220":"<b>2211.11887</b> Cohen 2022 — 조석 고정 aquaplanet 의 traveling planetary-scale wave, Met Office UM GCM. <b>cloud morphology</b> 결정을 주도합니다. e 는 이중 중위도 jet regime (평균 zonal wind ~18 m/s) 에 자리잡고, substellar 구름 disk 는 위도 ±30° 까지만 도달합니다. 두 개의 정상 Rossby gyre 가 60–70°N/S 에 있고, 동쪽 gyre 는 약 20일 주기로 진동합니다. 평균 구름 분율 60% 로 Wolf 2017 을 확인해줍니다.",
  "li_221":"<b>2312.01893</b> Boldog 2023 — HZ 암석 행성의 물 함량. e 의 subsurface ocean probability 가 87.56% (그들의 카탈로그 최상위 등급). 암석-얼음 경계의 조석 가열은 0.21 W/m² (범위 0.18–0.24) 로 표면 flux 보다 훨씬 큽니다. water-rich aquaplanet cfg 선택을 뒷받침합니다.",
  "li_222":"<b>1906.06797</b> Yamashiki 2019 — 별의 superflare 가 거주 가능성에 미치는 영향. TRAPPIST-1 의 Spot Maximum Flare = 9.09×10³² erg. 1 bar N₂/O₂ 대기 + 지구 수준 자기장이 있으면 Spot Maximum 하에서도 지표 dose 가 비치사 수준으로 유지됩니다 (대기 상층 ≤1.18×10⁴ Sv → 지표에서는 관리 가능). 복잡한 생명에 필요한 임계 대기 column 은 ~2.04×10² g/cm² (지구의 20%) 입니다. 1 bar 대기 cfg 를 유지할 근거 를 제공합니다.",
  "li_223":"<b>2309.15239</b> + <b>2405.20167</b> Cooke 2023 / 2024 — e 에 대한 WACCM6 지구형 대륙 시뮬레이션. 현실적 육해 분포 때문에 전역 평균 표면 T 가 219–231 K 로 Wolf 2017 aquaplanet 의 270 K 보다 차갑게 나옵니다. O₃ column 은 stellar UV 시나리오에 따라 50–1310 DU. aquaplanet cfg 는 더 따뜻한 Wolf 2017 베이스라인을 택하고, WACCM6 은 &quot;덜 거주 가능한&quot; cfg 변형용 차가운 대안으로 둡니다.",
  "li_224":"<b>2601.18324</b> Bourgeois 2026 — TRAPPIST-1 e 의 이른 Great Oxidation Event (지구보다 약 700 Myr 빠름, K_oxy ~0.83 vs 1.0). M-dwarf UV 분포가 O₂ 광분해보다 O₃ 형성에 유리해, 낮은 대기 O₂ 에서도 두꺼운 O₃ 층이 만들어집니다. cfg 가 대기 조성에 미량 O₃ 를 포함하는 선택 을 강화합니다.",
  "li_225":"<b>2305.08813</b> <i>(d 의 참고문헌, e 가 아님)</i> 다양한 contamination / 특성화 작업 — 맥락만 제공합니다.",

  "li_228":"<b>2407.19167</b> 기계 보조 biosignature 분류. e 특화가 아닙니다.",

  "p_230":"e 의 참고문헌은 두 번째로 큽니다 (64 편, 그중 30 편 arXiv). 비-arXiv 논문 대부분은 biosignature 또는 ELT 특화 특성화 계획에 대한 conference abstract 로, 비주얼-정보 제공은 아닙니다. 주목할 만한 skip 항목.",
  "li_231":"<b>2024–2025 다양</b> — biosignature 가능성 연구와 JWST 제안 abstract. cfg 관련 대기 조성을 갱신할 때가 아니면 그냥 skip 합니다.",
  "li_232":"<b>광화학 프로그램 제안서</b> — 방법론만 다룹니다.",

  "li_235":"Glidden 2025 DREAMS 논문은 &quot;보정되지 않은 stellar contamination 또는 행성 신호일 수 있는 feature&quot; 가 남아 있음을 인정합니다. 향후 재환원 이나 새 instrument (NIRISS, MIRI MRS) 가 e 에서 분자 feature 를 찾아낸다면 대기 조성 표 갱신이 필요할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
