  "p_1":"Teegarden&#x27;s Star c is a 1.05 M⊕ minimum-mass rocky planet on an 11.416-day orbit around the M7.0 V host, with semi-major axis 0.0455 AU and insolation 0.35 ± 0.02 S⊕ (Dreizler 2024). Equilibrium temperature with Bond albedo 0.3 is 209 ± 4 K — 64 K below the freezing point of water. The Earth Similarity Index, which uses a simple bulk- parameter weighting, comes out high (ESI = 0.88, &quot;closely resembling Proxima b&quot; per Dreizler 2024), but that is misleading: c sits at or beyond the outer edge of the conservative habitable zone, and the most recent dedicated 3D GCM study finds it locked in a global snowball state for every atmospheric composition tested. The cfg therefore renders c as a <b>cold, globally ice-covered world</b> — not as a temperate Earth-analog.",

  "h2_154":"Surface synthesis",
  "p_155":"Teegarden c sits at S = 0.35 S⊕ — about a third of Earth&#x27;s insolation and at or below the conservative outer-HZ limit (Kopparapu 2013 S_outer ≈ 0.36 for an M dwarf with full atmospheric circulation). The cfg&#x27;s snowball pick rests on Hammond 2025 (arXiv:2504.00978), the most recent dedicated 3D GCM study of c.",
  "p_156":"Hammond&#x27;s ExoCAM grid runs c at three CO₂ scenarios — 100 μbar CO₂ over 1 bar N₂, 0.1 bar CO₂ over 1 bar N₂, and 2 bar CO₂ with no N₂ background — and finds c ice-covered in all three. The paper states plainly that &quot;all planet cases except Teegarden&#x27;s Star c have some habitable surface area with temperatures above the freezing point of water, while Teegarden&#x27;s Star c is ice-covered for all pCO₂ values considered,&quot; and that c &quot;has a fully ice-covered surface even at a CO₂ partial pressure of 2 bar.&quot; The qualitative picture across the three cases (warming with increasing pCO₂ but never crossing the freezing point) is:",
  "li_157":"<b>100 μbar CO₂</b>: the coldest case; surface temperatures fall to the nightside cold-trap minimum and the thin CO₂ reservoir is most vulnerable to freeze-out.",
  "li_158":"<b>0.1 bar CO₂</b>: stable, warmer, but still ice-covered — adopted as the cfg&#x27;s &quot;warm-edge snowball.&quot;",
  "li_159":"<b>2 bar CO₂</b>: the warmest case; the dayside warms but stays below freezing — the maximum greenhouse warming in the simulation does not lift the surface above the freezing point anywhere.",
  "p_160":"(Per-cell temperatures above are read from the surface-temperature maps in the paper&#x27;s Figure 1, not quoted numbers; the cached text does not reproduce the Appendix A global-mean table, so the specific substellar/nightside values in the Decisions table are figure-level estimates with medium confidence.)",
  "p_161":"The reason c stays frozen even at extreme greenhouse loading is the combination of low instellation (only 0.35 S⊕) and a high ice albedo that the M-dwarf SED struggles to overcome. Late-M illumination peaks in the near-IR, where water ice has surprisingly high absorptivity (unlike at visible wavelengths where ice albedo is 0.7–0.9), but the substellar dayside still requires the bulk of incident flux to be at shorter wavelengths to break out of the ice-albedo feedback loop — exactly what an M7 V host fails to provide.",
  "p_162":"The cfg therefore renders c as a <b>uniform ice-covered surface</b> with:",
  "li_163":"<b>Substellar dayside</b>: warmest ice (~230 K at high pCO₂). Ice may be thin enough to be photically transparent in rare cases, but no melt pools form. Surface morphology is hummocky, with pressure ridges where atmospheric circulation drives ice convergence.",
  "li_164":"<b>Mid-latitudes / longitudes</b>: glacial ice sheet ~50–300 m thick over the frozen ocean substrate (if any subsurface water exists from primordial accretion).",
  "li_165":"<b>Nightside</b>: permanent CO₂-frost cold-trap (~170 K), possibly with CO₂ ice deposition reducing atmospheric pressure locally — a Martian-style polar-CO₂-frost analog but over the entire nightside hemisphere.",
  "p_166":"<b>Colour choice.</b> The surface is overwhelmingly water-ice with an M-dwarf-illumination-shifted warm cream <span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>. The accent <span class=\"hex-chip\" style=\"background:#4a3030\"></span><code>#4a3030</code> (dark mafic bedrock) appears at sparse impact craters where ejecta has temporarily exposed sub-ice material — these would be the most visually distinctive features for a player flying over the surface.",
  "h2_167":"Atmosphere synthesis",
  "p_168":"The cfg adopts Hammond 2025&#x27;s <b>0.1 bar CO₂ over 1 bar N₂</b> scenario (~1.1 bar total, ~9% CO₂ by partial pressure) — the warm-edge member of the snowball regime. It is the warmest of Hammond&#x27;s two N₂-background cases but explicitly does not lift the surface above freezing. The composition is:",
  "li_169":"<b>Pressure</b> ~1.1 bar (110 kPa) — 0.1 bar CO₂ on a 1 bar N₂ background, per Hammond 2025&#x27;s intermediate case.",
  "li_170":"<b>Composition</b> N₂ ~91%, CO₂ ~9% (0.1 bar), H₂O trace (saturated at ~6×10⁻⁵ at 200 K), with minor Ar. Note that Hammond&#x27;s <i>thickest</i> case is pure 2 bar CO₂ with no N₂; the cfg deliberately picks the N₂-background intermediate case rather than the pure-CO₂ end-member.",
  "li_171":"<b>Clouds.</b> Hammond 2025 finds c to be the cloud-water-path outlier of the seven targets — the ice-covered surface keeps total atmospheric water vapor far below the other six. What little cloud forms is advected eastward of the substellar point by the superrotating jet (the general pattern Hammond reports for the low-pCO₂ cases), not concentrated at the terminator. Total cloud cover is therefore low (~35%). CO₂-ice clouds may form on the nightside if surface temperatures drop below the CO₂ frost point.",
  "p_172":"<b>Sky appearance.</b> The atmosphere has Rayleigh scattering at short wavelengths, but with the 2904 K stellar SED there is very little short-wavelength flux — the scattered sky is dim and shifted toward red. Zenith sky <span class=\"hex-chip\" style=\"background:#3a2a35\"></span><code>#3a2a35</code>, horizon <span class=\"hex-chip\" style=\"background:#7a5040\"></span><code>#7a5040</code>.",
  "p_173":"The host star angular size is 1.25° (about 2.3× the Sun&#x27;s angular size from Earth). Surface illumination at substellar is 0.35 × Earth&#x27;s bolometric flux — comparable to twilight on Earth, with the spectral peak firmly in the near-IR. Most of the incident energy is absorbed by water-ice with high near-IR absorptivity, but most of the upwelling thermal emission radiates back to space because the atmosphere is optically thin in the 8–13 μm window.",
  "p_174":"<b>Atmospheric escape and stability.</b> The 7–8 Gyr old quiet host star favors atmospheric retention as long as the planet built and kept a secondary CO₂/N₂ atmosphere via outgassing. Hammond 2025 does not include escape; Wandel 2019 reviewed retention and found old quiet M dwarfs less hostile than younger active ones. The CO₂–N₂ atmosphere is heavier than the H₂/He primordial atmosphere typical of pre-MS escape and is less susceptible to thermal escape.",
  "p_175":"<b>Auroras.</b> Weak (15 kR typical — much fainter than a thick-atmosphere HZ world). The low flare frequency at Teegarden combined with the modest atmosphere produces a sparse auroral display. Visible emission is dominated by [OI] 557.7 nm green (<span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code>) where O is present from minor CO₂ photolysis, with a CO₂⁺ red-orange accent (<span class=\"hex-chip\" style=\"background:#ff4d4d\"></span><code>#FF4D4D</code>) in the 580–700 nm Fox-Duffendack-Barker bands becoming significant if the CO₂ fraction is high.",
  "h2_176":"Rotation &amp; spin synthesis",
  "p_177":"c at P_orb = 11.4 d is firmly inside the tidal-locking timescale (Griessmeier 2009) over 7–8 Gyr; the cfg assumes synchronous rotation, consistent with the 1:1 spin-orbit state Hammond 2025 adopts for its GCM and with Wandel 2019&#x27;s locked-planet treatment. Obliquity damped to zero. Eccentricity is 0.04 (Dreizler 2024, +0.07/−0.03) — low and consistent with near-circular, so the cfg renders the spin as near-1:1 / pseudo-synchronous rather than a captured 3:2 resonance.",
  "p_178":"<b>KSP implementation note.</b> Rotation period = orbital period = 11.416 days (986 342 s).",
  "p_179":"<b>Atmospheric circulation.</b> Hammond 2025 finds that all of its seven tidally-locked cases (including c) develop an equatorial superrotating jet (their Figure 3, zonal-mean zonal wind). Surface flow is weaker. This is canonical for slowly-rotating tidally-locked planets and matches the &quot;thermal superrotation&quot; regime (Pierrehumbert &amp; Hammond 2019), which Hammond cites. c is in the Rhines-rotator dynamical regime in Hammond&#x27;s classification.",
  "p_180":"<b>No seasons.</b> Obliquity = 0; libration amplitude small.",
  "p_181":"<b>Magnetic dynamo.</b> Earth-mass c likely supports a modest dynamo from core convection. The cfg picks a low Earth-analog field (20 μT) as a tie-break. No measurement.",
  "h2_182":"Visual styling",
  "p_183":"Combining surface and atmosphere decisions, c renders as a uniform white-cream snowball world:",
  "li_184":"<b>Global appearance from orbit.</b> A nearly featureless ice sphere with subtle variations in surface roughness. Terminator features (pressure ridges, glacial flow lines) become visible only at oblique illumination. The thin atmosphere produces almost no limb haze.",
  "li_185":"<b>Substellar zone</b>: slightly warmer ice (~230 K), possibly with rare thin transparent ice patches. Surface morphology shows convergence-driven pressure ridges where the superrotating jet drives ice convergence.",
  "li_186":"<b>Mid-latitudes</b>: uniform glacial sheet, smooth on large scales, with occasional impact craters exposing dark <span class=\"hex-chip\" style=\"background:#4a3030\"></span><code>#4a3030</code> bedrock at the impact center.",
  "li_187":"<b>Nightside</b>: dark, possibly with bright patches of CO₂-frost deposition where surface temperature drops below the CO₂ frost point. The cold trap reads as a uniformly dim region.",
  "li_188":"<b>Atmosphere haze.</b> Very thin pale violet limb glow (<span class=\"hex-chip\" style=\"background:#4a3a50\"></span><code>#4a3a50</code>), ~8–12 km thick.",
  "li_189":"<b>Star in sky.</b> Teegarden&#x27;s Star subtends 1.25° in c&#x27;s sky (2.3× the Sun from Earth). Appears as a deep red-orange disk; illumination feels like deep twilight, never noon.",
  "li_190":"<b>Sister planets in sky.</b> b (inner, ~4.91 d) and d (outer, ~26 d) pass through conjunctions; b is the brighter and closer of the two at inferior conjunction.",
  "p_191":"The overall visual impression should evoke a Hoth-like ice world but with the perpetual red-orange illumination of an ultra-cool dwarf. c is visually less striking than b (no ocean-pupil contrast) but forms a distinct &quot;frozen sibling&quot; companion in the system view.",
  "h2_192":"Bibliography",
  "h3_193":"Read (visual-informative, drove decisions above)",
  "li_194":"<b>2402.00923</b> Dreizler S. et al. 2024 — <i>Teegarden&#x27;s Star revisited</i> (<code>2024A&amp;A...684A.117D</code>). Table 4 refined c orbit (P = 11.416 d, e = 0.04, msini = 1.05 M⊕, T_eq = 209 K @ A=0.3, S = 0.35 S⊕, ESI = 0.88 &quot;closely resembling Proxima b&quot;).",
  "li_195":"<b>2504.00978</b> Hammond T. et al. 2025 — <i>The climates and thermal emission spectra of prime nearby temperate rocky exoplanet targets</i> (<code>2025ApJ...984..181H</code>). 3D ExoCAM GCM of c at 100 μbar / 0.1 bar / 2 bar CO₂ — c is ice-covered everywhere for all pCO₂, the only one of seven targets that never reaches liquid water. Driver of the cfg&#x27;s snowball choice.",
  "li_196":"<b>1906.07704</b> Wandel A. &amp; Tal-Or L. 2019 — <i>On the Habitability of Teegarden&#x27;s Star planets</i> (<code>2019ApJ...880L..21W</code>). 1D analytic habitability range H_atm = 1–12 for c (f=0.5, T_max=340 K) — the older, more optimistic reading superseded for the cfg by Hammond 2025.",
  "li_197":"<b>1906.07196</b> Zechmeister M. et al. 2019 — discovery paper for b and c (<code>2019A&amp;A...627A..49Z</code>). Original orbital parameters and host characterization.",
  "h3_198":"Read (context / methodology, not decision-driving)",
  "li_199":"<b>2007.15077</b> Cifuentes C. et al. 2020 — CARMENES input catalogue of M dwarfs (<code>2020A&amp;A...642A.115C</code>). M-dwarf Teff/spectral-type calibration context (M7.0 V bin); the adopted host Teff of 2904 K is from Schweitzer 2019, not this catalogue&#x27;s bin median.",
  "li_200":"<b>2512.16575</b> Fujii et al. — climate / habitability methodology context for M-dwarf HZ planets.",
  "li_201":"<b>Schweitzer A. et al. 2019</b> — host stellar parameters (Teff 2904 K, L, M, R); used via the host synthesis.",
  "h3_202":"Read (instrument / non-cfg-decisive)",

  "h2_207":"Open items for follow-up",
  "li_208":"<b>Hammond 2025 vs Wandel 2019 (cfg variant)</b>: the cfg&#x27;s snowball pick follows Hammond 2025&#x27;s 3D ExoCAM result. Wandel 2019&#x27;s older 1D analytic model gives a more optimistic H_atm = 1–12 habitability range for c, with a narrow habitable patch at the substellar point. The conservative-but-interesting <b>variant</b> the cfg writer can ship instead is a marginal &quot;eyeball with a thin substellar warm spot.&quot; If a future independent 3D GCM (THAI-style intercomparison, or a ROCKE-3D study of c specifically) finds liquid water at substellar for high pCO₂, the cfg should shift to that variant. For now, snowball is canonical and the cfg agrees with it.",
  "li_209":"<b>Surface temperatures are figure-read, not quoted</b>: the cached Hammond 2025 text does not reproduce the Appendix A global-mean table; the substellar/nightside/global-mean K values in the Decisions table are estimates read from the Figure 1 maps. Tighten these if the numerical table becomes available.",
  "li_210":"<b>2-bar CO₂ end-member</b>: Hammond 2025 tested up to 2 bar CO₂ (pure, no N₂) with no surface melt. A higher CO₂ atmosphere (e.g., 10 bar Venus-like) was not tested and could in principle warm the surface above freezing — but at that pressure other effects (CO₂ condensation onto the nightside, atmospheric collapse) become important.",
  "li_211":"<b>No transit confirmation</b>: all parameters RV-derived; the system is non-transiting (TESS + SPECULOOS).",
  "li_212":"<b>Subsurface ocean</b>: Hammond 2025 does not model interior structure. If c has a primordial water reservoir, a liquid subsurface ocean could exist beneath the global ice sheet (Europa-like). The cfg does not render it as visible from orbit but could add a Kerbalism subsurface-water flag.",
  "li_213":"<b>Atmospheric escape over 7–8 Gyr</b>: not modeled. The cfg assumes retention based on the quiet present-day star and the old age. A Lammer-style escape calculation specifically for c would tighten the atmospheric column.",

  ko: {
  "p_1":"Teegarden&#x27;s Star c 는 M7.0 V 모성을 11.416 일 주기로 도는 최소질량 1.05 M⊕ 의 암석 행성으로, 궤도 장반경은 0.0455 AU, 입사 플럭스는 0.35 ± 0.02 S⊕ 입니다 (Dreizler 2024). Bond 알베도 0.3 기준 평형 온도는 209 ± 4 K 로, 물의 어는점보다 64 K 낮습니다. 단순한 벌크 매개변수 가중을 쓰는 Earth Similarity Index 는 높게 나오지만 (ESI = 0.88, Dreizler 2024 의 표현으로 &quot;프록시마 b 와 매우 닮음&quot;), 이 수치는 오해를 부릅니다. c 는 보수적 거주가능 영역의 바깥 가장자리에 있거나 그 너머에 있고, 가장 최근의 전용 3D GCM 연구는 시뮬레이션된 모든 대기 조성에서 c 가 전 지구 눈덩이 상태에 갇혀 있다고 봅니다. 그래서 cfg 는 c 를 <b>춥고 전 지구적으로 얼음에 덮인 세계</b> 로 렌더링하며, 온대 지구- 아날로그로 두지 않습니다.",
  "p_2":"c 의 cfg 결정적 결과는 Hammond 2025 (arXiv:2504.00978) 에서 나옵니다. 이 논문은 ExoCAM GCM 모음을 일곱 개의 가까운 HZ 표적에 (티가든 c 포함) pCO₂ 를 100 μbar 부터 2 bar 까지 바꾸며 돌립니다. 일곱 표적 가운데 최대 2-bar CO₂ 온실 가열에서도 표면 어디서든 액체 물을 지지하지 못한 <b>유일한</b> 행성이 c 입니다. 논문은 c 가 &quot;CO₂ 분압 2 bar 에서도 표면이 완전히 얼음에 덮인다&quot; 고 명시합니다. 낮은 입사 플럭스 (Hammond 의 매개변수 세트에서 S = 0.37), 높은 얼음 알베도 피드백, 그리고 M-왜성 SED 의 제한된 단파장 가열 효율이 결합되어, 얼마만큼의 온실 가스를 실어도 c 를 단단히 눈덩이로 밀어 넣습니다.",
  "p_3":"Wandel 2019 의 오래된 1D 분석 모델은 더 낙관적인 거주가능성 범위를 줬습니다 (f = 0.5 에서 H_atm = 1–12, H_atm = 1 일 때 substellar 점에 좁은 거주가능 구역). 하지만 그 모델은 대기 가열을 매개변수로 다루며 얼음 알베도 피드백과 3D 열 재분배 물리학을 결여합니다. Hammond 2025 의 3D GCM 이 더 최근이고 행성별이며 더 무거운 독해이므로, cfg 는 이를 따릅니다. cfg 의 눈덩이 선택은 정전적 독해와 <i>일치하므로</i> (발산이 아니므로) Canonical- alternatives 발산 항목이 필요 없으며, 낙관적 Wandel 독해는 Open items 의 cfg 변형으로 보존합니다.",
  "p_4":"<b>NearStars 시나리오 선택은 ~1 bar N₂ + 0.1 bar CO₂ 대기를 가진 전 지구적 얼음 피복 &quot;눈덩이&quot; 행성입니다. 조석 고정되어 있고, 표면 온도가 어디서든 273 K 아래이며, 액체 물이 없고, 대기 순환은 적도 초회전 제트가 지배합니다.</b> cfg 는 구조적으로 b 의 안구 aquaplanet 과 d 의 황량한 암석과 구별됩니다 — c 는 시스템의 전형적 눈덩이입니다.",

  "td_153":"Schweitzer 2019 (모성 Teff 2904 K; 고분산 분광)",
  "h2_154":"Surface synthesis",
  "p_155":"티가든 c 는 S = 0.35 S⊕ 에 있습니다 — 지구 입사 플럭스의 약 1/3 로, 보수적 바깥-HZ 한계에 있거나 그 아래입니다 (Kopparapu 2013, 완전 대기 순환 가정 시 M 왜성 S_outer ≈ 0.36). cfg 의 눈덩이 선택은 c 에 대한 가장 최근의 전용 3D GCM 연구인 Hammond 2025 (arXiv:2504.00978) 에 기반합니다.",
  "p_156":"Hammond 의 ExoCAM 격자는 c 를 세 가지 CO₂ 시나리오로 돌립니다 — 1 bar N₂ 위 100 μbar CO₂, 1 bar N₂ 위 0.1 bar CO₂, 그리고 N₂ 배경 없는 2 bar CO₂ — 그리고 세 경우 모두 c 가 얼음에 덮인다고 봅니다. 논문은 &quot;티가든 c 를 제외한 모든 행성 사례는 물의 어는점 위 온도를 가진 거주가능 표면 영역이 일부 있지만, 티가든 c 는 고려한 모든 pCO₂ 값에서 얼음에 덮인다&quot; 고, 또 c 가 &quot;CO₂ 분압 2 bar 에서도 표면이 완전히 얼음에 덮인다&quot; 고 명시합니다. 세 경우에 걸친 정성적 그림은 (pCO₂ 가 커질수록 따뜻해지지만 결코 빙점을 넘지 못함) 다음과 같습니다.",
  "li_157":"<b>100 μbar CO₂</b>: 가장 차가운 경우. 표면 온도가 야간측 차가운 트랩 최저값까지 떨어지고, 얇은 CO₂ 저장소가 동결-증발에 가장 취약합니다.",
  "li_158":"<b>0.1 bar CO₂</b>: 안정적이고 더 따뜻하지만 여전히 얼음 피복 — cfg 의 &quot;따뜻한 가장자리 눈덩이&quot; 로 채택.",
  "li_159":"<b>2 bar CO₂</b>: 가장 따뜻한 경우. 주간측이 따뜻해지지만 빙점 아래 유지 — 시뮬레이션의 최대 온실 가열도 어디서도 표면을 빙점 위로 올리지 못합니다.",
  "p_160":"(위의 셀별 온도는 논문 Figure 1 의 표면 온도 지도에서 읽은 것으로, 인용 수치가 아닙니다. 캐시된 본문이 Appendix A 의 global-mean 표를 재현하지 않으므로, Decisions 표의 substellar/야간측 구체값은 medium confidence 의 figure-level 추정입니다.)",
  "p_161":"c 가 극단적 온실 부하에서도 얼어붙은 채로 있는 이유는 낮은 입사 플럭스 (0.35 S⊕ 에 불과) 와 M-왜성 SED 가 깨기 어려운 높은 얼음 알베도의 조합 때문입니다. 후기-M 조명은 근적외선에서 피크를 이루는데, 그곳에서 물 얼음은 놀랍게도 흡수성이 높지만 (가시 파장에서 얼음 알베도가 0.7–0.9 인 것과 달리), substellar 주간측은 여전히 얼음-알베도 피드백 루프를 깨기 위해 입사 플럭스의 대부분이 더 짧은 파장에 있어야 합니다 — 정확히 M7 V 모성이 제공하지 못하는 것입니다.",
  "p_162":"따라서 cfg 는 c 를 <b>균일한 얼음 피복 표면</b> 으로 렌더링합니다.",
  "li_163":"<b>substellar 주간측</b>: 가장 따뜻한 얼음 (높은 pCO₂ 에서 ~230 K). 드물게 광학적으로 투명할 만큼 얇을 수 있지만 녹은 웅덩이는 형성되지 않습니다. 표면 형태론은 험준하고, 대기 순환이 얼음 수렴을 일으키는 곳에 압력 능선이 있습니다.",
  "li_164":"<b>중위도 / 중경도</b>: 얼어붙은 바다 기질 위 (원시 액체 물이 있다면) ~50–300 m 두께의 빙판.",
  "li_165":"<b>야간측</b>: 영구 CO₂-서리 차가운 트랩 (~170 K). CO₂ 가 얼음으로 침전되며 국소적으로 대기 압력이 떨어질 가능성 — 화성식 극지 CO₂-서리 아날로그 지만 야간측 전체 반구에서 일어납니다.",
  "p_166":"<b>색조 선택.</b> 표면은 압도적으로 물 얼음이며, M-왜성 조명에 치우친 따뜻한 크림 <span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code> 입니다. 액센트 <span class=\"hex-chip\" style=\"background:#4a3030\"></span><code>#4a3030</code> (어두운 마픽 암반) 은 ejecta 가 일시적으로 얼음 아래 물질을 노출시킨 드문 충돌 분화구에 나타납니다 — 표면 위를 비행하는 플레이어에게 가장 시각적으로 두드러진 특징이 될 것입니다.",
  "h2_167":"Atmosphere synthesis",
  "p_168":"cfg 는 Hammond 2025 의 <b>1 bar N₂ 위 0.1 bar CO₂</b> 시나리오 (총 ~1.1 bar, 분압 기준 ~9% CO₂) 를 채택합니다 — 눈덩이 체제 중 따뜻한 가장자리에 해당 합니다. Hammond 의 두 N₂-배경 사례 중 더 따뜻하지만, 명시적으로 표면을 빙점 위로 올리지는 않습니다. 조성은 다음과 같습니다.",
  "li_169":"<b>압력</b> ~1.1 bar (110 kPa) — Hammond 2025 의 중간 사례에 따라 1 bar N₂ 배경 위 0.1 bar CO₂.",
  "li_170":"<b>조성</b> N₂ ~91%, CO₂ ~9% (0.1 bar), H₂O 미량 (200 K 에서 ~6×10⁻⁵ 포화), 소량의 Ar. Hammond 의 가장 두꺼운 사례는 N₂ 없는 순수 2 bar CO₂ 라는 점에 유의하며, cfg 는 순수-CO₂ 끝값이 아니라 N₂-배경 중간 사례를 의도적으로 택합니다.",
  "li_171":"<b>구름.</b> Hammond 2025 는 c 를 일곱 표적 중 cloud-water-path 이상치로 봅니다 — 얼음 피복 표면이 총 대기 수증기를 다른 여섯보다 훨씬 낮게 유지합니다. 형성되는 적은 구름은 종단경계에 모이는 것이 아니라 초회전 제트에 의해 substellar 점 동쪽으로 실려갑니다 (Hammond 이 저-pCO₂ 사례에서 보고하는 일반적 패턴). 따라서 총 구름 피복은 낮습니다 (~35%). 야간측 표면 온도가 CO₂ 서리점 아래로 떨어지면 CO₂-얼음 구름이 형성될 수 있습니다.",
  "p_172":"<b>하늘 모습.</b> 대기는 단파장에서 Rayleigh 산란을 하지만, 2904 K 모성 SED 에서는 단파장 플럭스가 매우 적습니다 — 산란 하늘은 어둑하고 빨강으로 치우칩니다. 천정 하늘 <span class=\"hex-chip\" style=\"background:#3a2a35\"></span><code>#3a2a35</code>, 지평선 <span class=\"hex-chip\" style=\"background:#7a5040\"></span><code>#7a5040</code>.",
  "p_173":"모성의 시지름은 1.25° (지구에서 본 태양 시지름의 약 2.3 배) 입니다. substellar 의 표면 조명은 0.35 × 지구의 볼로메트릭 플럭스 — 지구에서의 황혼에 비유할 만하며, 스펙트럼 피크는 단단히 근적외선에 있습니다. 입사 에너지의 대부분은 근적외선 흡수성이 높은 물-얼음에 흡수되지만, 상향 열 방출의 대부분은 대기가 8–13 μm 창에서 광학적으로 얇기 때문에 우주로 다시 복사됩니다.",
  "p_174":"<b>대기 손실과 안정성.</b> 7–8 Gyr 의 늙고 조용한 모성은, 행성이 외기 방출로 2차 CO₂/N₂ 대기를 만들고 유지하는 한 대기 보존에 유리합니다. Hammond 2025 는 탈출을 포함하지 않습니다. Wandel 2019 는 보존을 리뷰하고 늙고 조용한 M 왜성이 더 젊고 활동적인 별보다 덜 적대적이라고 봅니다. CO₂–N₂ 대기는 전-MS 탈출에 전형적인 원시 H/He 대기보다 무거워 열 탈출에 덜 취약합니다.",
  "p_175":"<b>오로라.</b> 약함 (전형 15 kR — 두꺼운 대기의 HZ 세계보다 훨씬 희미함). 티가든의 낮은 플레어 빈도와 적당한 대기가 결합해 희박한 오로라 디스플레이 를 만듭니다. 가시 방출은 [OI] 557.7 nm 녹색 (<span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code>) 이 지배하는데, 여기서 O 는 미세한 CO₂ 광분해에서 나옵니다. CO₂ 분율이 높으면 580–700 nm Fox-Duffendack-Barker 띠의 CO₂⁺ 빨강-주황 액센트 (<span class=\"hex-chip\" style=\"background:#ff4d4d\"></span><code>#FF4D4D</code>) 가 유의해 집니다.",
  "h2_176":"Rotation &amp; spin synthesis",
  "p_177":"c 의 P_orb = 11.4 d 는 7–8 Gyr 에 걸쳐 Griessmeier 2009 의 조석 고정 시간 척도 안에 단단히 있습니다. cfg 는 동기 자전을 가정하며, 이는 Hammond 2025 가 GCM 에 쓴 1:1 스핀-궤도 상태 및 Wandel 2019 의 조석 고정 행성 처리와 일치합니다. 자전축 기울기는 0 으로 감쇠합니다. 이심률은 0.04 (Dreizler 2024, +0.07/−0.03) 로 낮고 거의 원형에 일관되므로, cfg 는 스핀을 포획된 3:2 공명이 아니라 near-1:1 / pseudo-synchronous 로 렌더링합니다.",
  "p_178":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 11.416 일 (986 342 s).",
  "p_179":"<b>대기 순환.</b> Hammond 2025 는 일곱 개의 조석 고정 사례 (c 포함) 모두가 적도 초회전 제트를 발달시킨다고 봅니다 (Fig. 3, zonal-mean zonal wind). 표면 흐름은 더 약합니다. 이는 느리게 자전하는 조석 고정 행성에 대해 정전적이며, Hammond 이 인용하는 &quot;열 초회전&quot; 체제 (Pierrehumbert &amp; Hammond 2019) 와 일치합니다. c 는 Hammond 의 분류에서 Rhines-rotator 동역학 체제에 있습니다.",
  "p_180":"<b>계절 없음.</b> 자전축 기울기 = 0; libration 진폭 작음.",
  "p_181":"<b>자기 다이나모.</b> 지구 질량 c 는 핵 대류에서 적당한 다이나모를 지지할 가능성이 있습니다. cfg 는 낮은 지구형 장 (20 μT) 을 tie-break 으로 선택합니다. 측정 없음.",
  "h2_182":"Visual styling",
  "p_183":"표면과 대기 결정을 결합하면, c 는 균일한 흰-크림 눈덩이 세계로 렌더링 됩니다.",
  "li_184":"<b>궤도에서 본 전체 모습.</b> 거의 특징 없는 얼음 구체로, 표면 거칠기에 미묘한 변화가 있습니다. 종단경계 특징 (압력 능선, 빙하 흐름 선) 은 비스듬한 조명에서만 보입니다. 얇은 대기는 거의 림 안개를 만들지 않습니다.",
  "li_185":"<b>substellar 영역</b>: 약간 더 따뜻한 얼음 (~230 K), 가능한 드문 얇은 투명 얼음 패치. 표면 형태론은 초회전 제트가 얼음 수렴을 일으키는 곳에 수렴-구동 압력 능선을 보여줍니다.",
  "li_186":"<b>중위도</b>: 균일한 빙판, 큰 규모에서 매끄럽고, 충돌 중심에 어두운 <span class=\"hex-chip\" style=\"background:#4a3030\"></span><code>#4a3030</code> 암반이 노출된 가끔의 충돌 분화구.",
  "li_187":"<b>야간측</b>: 어두움. 표면 온도가 CO₂ 서리점 아래로 떨어지는 곳의 CO₂-서리 침전이 밝은 패치를 만들 수 있습니다. 차가운 트랩은 균일하게 어둑한 영역으로 보입니다.",
  "li_188":"<b>대기 안개.</b> ~8–12 km 두께의 매우 얇은 옅은 보라 림 빛 (<span class=\"hex-chip\" style=\"background:#4a3a50\"></span><code>#4a3a50</code>).",
  "li_189":"<b>하늘의 별.</b> 티가든의 별은 c 의 하늘에서 1.25° 시지름 (지구에서 본 태양의 2.3 배) 으로 보입니다. 짙은 빨강-주황 원반으로 나타나며, 조명은 깊은 황혼처럼 느껴지고 결코 한낮이 되지 않습니다.",

  "p_191":"전체적 시각 인상은 호스(Hoth) 같은 얼음 세계지만 극저온 왜성의 영구 빨강-주황 조명을 가진 모습이어야 합니다. c 는 시각적으로 b 보다 덜 강렬하지만 (바다-동공 대비 없음) 시스템 뷰에서 뚜렷한 &quot;얼어붙은 자매&quot; 동반자를 이룹니다.",

  "h3_193":"Read (visual-informative, drove decisions above)",

  "li_195":"<b>2504.00978</b> Hammond T. et al. 2025 — <i>The climates and thermal emission spectra of prime nearby temperate rocky exoplanet targets</i> (<code>2025ApJ...984..181H</code>). 100 μbar / 0.1 bar / 2 bar CO₂ 의 c 3D ExoCAM GCM — c 는 모든 pCO₂ 에서 어디든 얼음 피복으로, 일곱 표적 중 결코 액체 물에 도달하지 못하는 유일한 행성. cfg 의 눈덩이 선택을 결정.",

  "h2_207":"Open items for follow-up",
  "li_208":"<b>Hammond 2025 대 Wandel 2019 (cfg 변형)</b>: cfg 의 눈덩이 선택은 Hammond 2025 의 3D ExoCAM 결과를 따릅니다. Wandel 2019 의 오래된 1D 분석 모델은 c 에 대해 더 낙관적인 H_atm = 1–12 거주가능성 범위를, substellar 점에 좁은 거주가능 패치와 함께 줍니다. cfg 작성자가 대신 만들 수 있는 보수적이지만 흥미로운 <b>변형</b> 은 &quot;얇은 substellar 따뜻한 점이 있는 안구&quot; 입니다. 미래의 독립적 3D GCM (THAI-style intercomparison, 또는 c 에 대한 ROCKE-3D 연구 specific) 이 높은 pCO₂ 에서 substellar 액체 물을 찾으면 cfg 는 그 변형으로 이동해야 합니다. 지금은 눈덩이가 정전적이고 cfg 가 이에 일치합니다.",
  "li_209":"<b>표면 온도는 figure 에서 읽은 값이지 인용 수치가 아님</b>: 캐시된 Hammond 2025 본문은 Appendix A 의 global-mean 표를 재현하지 않으므로, Decisions 표의 substellar/야간측/global-mean K 값은 Figure 1 지도에서 읽은 추정값입니다. 수치 표가 확보되면 조여야 합니다.",
  "li_210":"<b>2-bar CO₂ 끝값</b>: Hammond 2025 는 표면 녹음 없이 2 bar CO₂ (순수, N₂ 없음) 까지 테스트했습니다. 더 높은 CO₂ 대기 (예: 10 bar Venus-like) 는 테스트되지 않았고 원칙적으로 표면을 빙점 위로 데울 수 있지만, 그 압력에서는 다른 효과 (CO₂ 야간측 응결, 대기 붕괴) 가 중요해집니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
