  "p_1":"ε Eridani b is a ~0.78 M_Jup gas giant orbiting the young active K2V dwarf ε Eridani at a = 3.53 ± 0.03 AU with a 2671 ± 17 d (7.32 yr) period and low eccentricity e = 0.07. After two decades of contested radial-velocity history (Hatzes 2000 discovery; Benedict 2006 HST FGS attempt; intermittent activity-induced spurious-signal rebuttals), the planet was finally confirmed by direct imaging at L′ and Ms band (Mawet 2019, Keck/NIRC2 vortex coronagraph) and refined by combined RV + Hipparcos/Gaia astrometry (Llop-Sayson 2021). The astrometric inclination is degenerate with the disk plane (Roettenbacher 2022) — i ≈ 34° matches the Booth 2017 ALMA-resolved disk inclination, favoring a coplanar system. No transmission or thermal-emission spectrum exists yet; the planet&#x27;s atmospheric composition, rotation, and any moon population are unconstrained.",
  "p_2":"<b>Scenario choice for NearStars: a cold (T_eq ≈ 110 K), young (~440 Myr) jovian on a 3.5 AU low-eccentricity orbit, sitting in the inner-belt-to-intermediate-belt gap (3–20 AU) of the ε Eri three-belt debris disk and identified by Su 2017&#x27;s Genie model as the inner- gap sculptor. Visual styling treats it as a Saturn-analog cool jovian with ammonia-ice cloud bands rendered in warm cream under K2V illumination, a faint photochemical haze layer from CH₄ photolysis under elevated K-dwarf UV, no ring, and Jupiter-scaled magnetosphere driving H-Balmer α aurorae visible from a Hill-sphere observer.</b> 35 cfg picks; 13 canonical-aligned, 21 tie-break (jovian-analog defaults under K2V illumination — no spectrum or thermal map yet), 1 documented divergence (inclination 34° vs DB-stored 78.8°).",

  "h2_177":"Surface synthesis",
  "p_178":"ε Eridani b has no solid surface in the conventional sense — it is a Jupiter-mass H₂/He gas giant. The &quot;surface&quot; relevant for visual rendering is the cloud deck, conventionally referenced to the 1 bar pressure level where the optical opacity transitions from clear gas above to dense particulate-laden gas below.",
  "p_179":"The equilibrium temperature at 3.5 AU under L_star = 0.32 L☉ is T_eq ≈ 111 K (A = 0) or 102 K (A = 0.3). Both values are colder than Jupiter (T_eq ≈ 110 K) and warmer than Saturn (T_eq ≈ 81 K). The condensation chemistry on a H₂/He atmosphere at these temperatures follows the well-established Lewis 1969 / Atreya 1999 thermochemical sequence: ammonia (NH₃) condenses near the 1 bar level, water (H₂O) condenses deeper at ≈ 5 bar, and methane (CH₄) remains gaseous at all accessible levels (the CH₄ condensation point requires T &lt; 75 K, beyond ε Eri b&#x27;s reach). The cfg therefore renders ε Eri b as an ammonia-cloud-deck jovian, structurally most similar to Saturn but warmer and with Jupiter-like rotational dynamics expected from its higher mass.",
  "p_180":"The cloud deck reads as warm cream-white (<span class=\"hex-chip\" style=\"background:#e8dac4\"></span><code>#e8dac4</code>) under K2V illumination. Ammonia ice in the laboratory has an intrinsic albedo in the visible near 0.8–0.9 with a slight yellow tint from trace absorption at 1.5–2.0 μm; under 5039 K K2V illumination the perceived hue shifts further toward warm cream relative to the Sun-illuminated Jupiter palette. Belt-zone contrast (<span class=\"hex-chip\" style=\"background:#c4a878\"></span><code>#c4a878</code> warm cream-brown for belt bands) is muted compared to Jupiter because the convective drive at T_eq ≈ 111 K is weaker than Jupiter&#x27;s, but stronger than Saturn&#x27;s because the planet&#x27;s internal heat flux (~0.5 W/m² adopted) gives a nontrivial convective overturn — broadly consistent with Sromovsky 2007 belt-zone amplitude scaling.",
  "p_181":"Above the ammonia cloud deck, ε Eri&#x27;s elevated K-dwarf FUV flux (France 2018 MUSCLES: 5–20× solar at the same orbital distance) drives methane photolysis at ≈ 0.1–10 mbar pressure levels. The photochemical products — heavier hydrocarbons (C₂H₂, C₂H₆) and tholin- like polymers — accumulate as a stratospheric haze layer with absorption signatures in the UV and blue (Khare 1984; Hörst 2018). The cfg encodes this as <code>photochemical_haze_present = true</code> with a faint tholin tint <span class=\"hex-chip\" style=\"background:#b08858\"></span><code>#b08858</code> rendered as a thin limb-haze layer overlying the cream-white cloud deck. The haze does not dominate the visual appearance — even Jupiter&#x27;s stratospheric haze produces only subtle limb-darkening at visible wavelengths — but it is the most likely first-order spectroscopic signature in future JWST coronagraph or ELT high-contrast imaging.",
  "p_182":"No surface features map to the planet&#x27;s interior — convective overturn maintains a vertically mixed adiabat below the ammonia cloud deck. The interior structure is fully fluid down to the metallic- hydrogen transition at ≈ 1 Mbar (≈ 90% of the radius), with a possible heavy-element core of 5–25 M⊕ inferred indirectly from mass-radius models (cfg does not encode core mass — no observational constraint).",
  "h2_183":"Atmosphere synthesis",
  "p_184":"No transmission or thermal-emission spectrum of ε Eri b exists. Mawet 2019&#x27;s Ms-band (4.6 μm) direct-imaging contrast measurement gives only a broad upper limit on hot-start luminosity, ruling out very young, very inflated jovian evolutionary tracks (Spiegel &amp; Burrows 2012 hot-start models with T_eff &gt; 700 K are excluded at the ~2σ level) but leaving the canonical &quot;cold-start&quot; thermal-equilibrium prediction (T_eff ≈ 150 K including internal flux) consistent with the data. The atmospheric composition is therefore drawn entirely from the solar-composition jovian default per Lodders 2003 protosolar abundance + Atreya 1999 condensation chemistry truncated at T = 111 K.",
  "p_185":"<b>Pressure reference.</b> Gas giants have no solid surface; the cfg reference pressure is set at 1 bar (100 000 Pa) where the ammonia cloud deck condenses. Conventional KSP atmosphere altitude origin matches this level. Above 1 bar, pressure decreases with scale height H ≈ 23 km — somewhat below Earth&#x27;s and Jupiter&#x27;s scale heights because of the colder temperature combined with higher gravity.",
  "p_186":"<b>Composition.</b> H₂ ≈ 89%, He ≈ 10% by volume — solar protosolar ratios with He depletion negligible at this mass and age. Volatiles: CH₄ ≈ 0.2% (Jupiter is 0.21%, slightly enhanced above protosolar by ~3× per Wong 2004 Galileo probe; cfg picks Jupiter-analog 0.2%), NH₃ ≈ 200 ppm (depleted above the cloud deck by condensation), H₂O ≈ 100 ppm (depleted above the deeper water cloud deck), trace CO ~ 1 ppb and HCN ~ 0.1 ppb from CH₄ + N₂ photochemistry. These volatile abundances are entirely tie-break defaults — no spectrum constrains them — but the cfg picks Jupiter-analog values because the 0.78 M_Jup mass and protosolar metallicity context favor a Jupiter-class disk-accretion formation history.",
  "p_187":"<b>Photochemistry signature.</b> ε Eri&#x27;s elevated FUV (Lyα, France 2018 MUSCLES: 8 × 10⁻⁴ L_bol vs Sun&#x27;s ≈ 6 × 10⁻⁵ L_bol) drives stronger methane photolysis than Jupiter receives. The resulting hydrocarbon chain (CH₄ → C₂H₆, C₂H₂, C₂H₄ → tholin polymers) produces a stratospheric haze layer above ≈ 100 mbar pressure. Quantitative modeling (Moses 2005 Saturn; Hörst 2018 sub-Neptune tholin chemistry extended to jovians) predicts ε Eri b&#x27;s haze optical depth at 1 μm to be roughly 2–5× Jupiter&#x27;s, sufficient to produce visibly enhanced limb darkening and a detectable absorption feature at 0.6–0.8 μm in future spectroscopy. Aurora-related N₂⁺ / H₃⁺ emission lines in the near-IR (Drossart 1989 Jupiter H₃⁺ at 3.4 μm) would be the most diagnostic future detection channel; cfg encodes the haze presence without committing to a specific optical depth.",
  "p_188":"<b>Sky appearance from a Hill-sphere observer.</b> The Hill sphere radius for 0.78 M_Jup at 3.53 AU around 0.82 M☉ is r_H ≈ 0.237 AU = 472 R_planet — large enough to host substantial moon populations. From an observer on a hypothetical large moon at, say, 20 R_planet (Io-analog distance scaled to ε Eri b&#x27;s larger radius), the planet subtends ≈ 5.7° in the sky — nearly 12× the lunar diameter from Earth — and dominates the daytime sky with a banded cream-white disk. The ε Eri star itself is a tiny 0.112° point — 1/4 the Sun&#x27;s angular size from Earth, comparable to Sun-from-Jupiter geometry — appearing as a deep orange point with the K2V color temperature. The contrast between the warm-cream planet disk and the orange stellar point would be the system&#x27;s most photogenic feature in any wide-orbit fly-by render.",
  "p_189":"<b>Nightside.</b> No direct stellar illumination. The planet&#x27;s own internal flux (~0.5 W/m²) produces a near-IR thermal glow at ~110 K peak (28 μm) — invisible to the unaided eye, but a faint self-illuminated reddish-warm cast at 4.6 μm where Mawet 2019 detected the planet. Aurora emission at high magnetic latitudes provides the only visible-light nightside signal: a faint H-Balmer α red-pink ring at ~70° magnetic latitude, brighter than Jupiter&#x27;s visible aurora by perhaps 10× given ε Eri&#x27;s elevated stellar wind.",
  "h2_190":"Rotation &amp; spin synthesis",
  "p_191":"No direct rotation measurement of ε Eri b exists. Doppler-broadened near-IR spectra (the technique Snellen 2014 applied to β Pictoris b to measure v sin i = 25 km/s) require high-contrast spectroscopic imaging at &lt; 0.5 arcsec separation — ε Eri b&#x27;s angular separation is ≈ 1.1 arcsec from the host, accessible to current instruments but the small mass (0.78 M_Jup) and faint thermal emission have so far prevented a rotation measurement.",
  "p_192":"<b>Tidal damping argument.</b> At 3.5 AU around a 0.82 M☉ host, the tidal timescale for a Jupiter-mass planet is τ_tide ≈ 10⁴⁰ s (Goldreich &amp; Soter 1966 with Q_p ≈ 10⁵) — orders of magnitude longer than the age of the universe. ε Eri b is <b>not</b> tidally locked. The cfg encodes <code>tidally_locked = false</code>.",
  "p_193":"<b>Rotation period choice.</b> Among observed gas giants, rotation period scales weakly with mass: Jupiter (1.0 M_Jup) ≈ 9.93 h, Saturn (0.3 M_Jup) ≈ 10.7 h, Uranus (0.046 M_Jup) ≈ 17.2 h, Neptune (0.054 M_Jup) ≈ 16.1 h. For ε Eri b at 0.78 M_Jup, the angular-momentum budget inherited from disk accretion at 3.5 AU favors Jupiter-class rapid rotation. The cfg picks <code>rotation_period_hours = 10</code> as a round Jupiter-analog value — within-window tie-break, not constrained.",
  "p_194":"<b>Obliquity.</b> Tie-break aesthetic choice. Jupiter&#x27;s 3.1° vs Saturn&#x27;s 26.7° vs Uranus&#x27;s 97.8° — no observation either way. cfg picks 25° (Saturn-analog) because the moderate obliquity reads as visually distinct from &quot;tipped over&quot; Uranus extremes while still giving an animated axis tilt in render. With the 7.32-yr orbital period, even the moderate obliquity does not produce observable seasonal effects in the cloud deck — convective overturn timescales (~years) are comparable to the orbital period.",
  "p_195":"<b>KSP implementation note.</b> Rotation period = 10 h = 36 000 s. Kopernicus <code>rotationPeriod = 36000</code>. Obliquity (<code>initialRotation</code> or axis-tilt cfg) = 25° from orbital normal.",
  "p_196":"<b>Magnetic dynamo expectation.</b> A H₂/He envelope with vigorous convection and a Jupiter-class rotation period (10 h) sustains a strong dipolar field. Scaling from Jupiter (surface equatorial field ≈ 430 μT, dipole moment ≈ 2 × 10⁴ × Earth) by linear mass gives ε Eri b ≈ 400 μT and ≈ 1.56 × 10⁴ × Earth — both adopted in the cfg. The dipole tilt is set to Jupiter-analog 10° for visually distinct auroral oval rendering. The Jupiter-analog rotation + magnetic field combination places ε Eri b firmly in the &quot;strong magnetosphere&quot; regime, with magnetopause standoff ≳ 50 R_planet against a 30× solar wind background.",
  "h2_197":"Visual styling",
  "p_198":"Combining surface (cloud-deck) and atmosphere decisions:",
  "li_199":"<b>Global appearance.</b> From orbit, ε Eri b reads as a banded cream-white jovian about 20% smaller than Jupiter — ~1.05 R_Jup = 75 000 km. Belt-zone contrast is modest (<span class=\"hex-chip\" style=\"background:#e8dac4\"></span><code>#e8dac4</code> cream-white zones, <span class=\"hex-chip\" style=\"background:#c4a878\"></span><code>#c4a878</code> warm cream-brown belts), less vivid than Jupiter but visible at moderate render distance. Persistent zonal banding (~5 belts and zones) covers ~85% of the visible disk.",
  "li_200":"<b>Cloud-deck detail.</b> Ammonia-ice cloud zones appear as smooth cream-white bands with faint cyclonic eddies — no equivalent of Jupiter&#x27;s Great Red Spot is constrained, so cfg picks a few small storm vortices (drift signatures only) as visual interest. Bands run east-west, latitudinal banding pattern with widths scaling to the planet&#x27;s Coriolis parameter at 10 h rotation + 1.05 R_Jup radius.",
  "li_201":"<b>Polar regions.</b> No constraint. Tie-break aesthetic: cfg renders a faint cyclonic polar hood structure inspired by Saturn&#x27;s polar hexagon morphology but without committing to a specific geometric pattern.",
  "li_202":"<b>Limb haze.</b> Pale cream-tan limb glow (<span class=\"hex-chip\" style=\"background:#d8c098\"></span><code>#d8c098</code>) about 20–40 km thick — Rayleigh + Mie scattering off the ammonia cloud deck under K2V illumination, with a thin overlying tholin haze layer (<span class=\"hex-chip\" style=\"background:#b08858\"></span><code>#b08858</code>) adding subtle absorption at the day-night terminator.",
  "li_203":"<b>Aurora ring.</b> At high magnetic latitudes (~70° in the cfg) both north and south poles show faint H-Balmer α red-pink (<span class=\"hex-chip\" style=\"background:#c84080\"></span><code>#c84080</code>) auroral rings, brighter than Jupiter&#x27;s visible aurora by ~10× given ε Eri&#x27;s elevated stellar wind. Visible from nightside angles only; obscured by the cloud deck on the dayside.",
  "li_204":"<b>Star in sky.</b> ε Eridani subtends 0.112° from ε Eri b — about the angular diameter of Saturn from Earth — appearing as a deep orange (K2V <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code>) point/disk. From a hypothetical large moon at 20 R_planet, the planet itself dominates the sky at ~5.7°, with the star reduced to a brilliant orange pinpoint nearby.",
  "li_205":"<b>Sister planets in sky.</b> No other confirmed planet in the ε Eri system as of Mawet 2019&#x27;s coronagraphic non-detection. The intermediate debris belt at ~20 AU and the cold ring at ~64 AU are visible from ε Eri b&#x27;s viewpoint only as faint diffuse glow bands at large heliocentric phase angles — no discrete companion bodies detected.",
  "li_206":"<b>Ring system.</b> No ring (cfg <code>ring_present = false</code>). Mawet 2019 Ms-band imaging would have detected a Saturn-bright ring system at the 3.5 AU separation; non-detection sets <code>ring_present = false</code> with medium confidence (a Jupiter-faint ring is below the Mawet detection threshold and not excluded).",
  "li_207":"<b>Hill-sphere context.</b> r_H ≈ 0.237 AU = 472 R_planet. Large enough to host a substantial moon population; cfg does not commit to specific moons (out of scope for this Phase 3) but the Hill-sphere extent itself is a visual landmark when rendered as a faint sphere of influence boundary.",
  "h2_208":"Canonical alternatives",
  "h3_209":"Diverged cfg picks",
  "th_210":"Field",
  "th_211":"Gameplay (in cfg)",
  "th_212":"Canonical alternative",
  "th_213":"Why diverged",
  "td_214":"<span class=\"field-tt\" data-ko-tip=\"시선 방향에 대한 궤도면 기울기 (도).\" data-en-tip=\"Orbital inclination relative to line of sight (degrees).\"><code>inclination_deg</code></span>",
  "td_215":"34° (Roettenbacher 2022 + disk-plane coplanarity reading; matches Booth 2017 ALMA disk inclination)",
  "td_216":"78.81° ± 29.34° (Llop-Sayson 2021 RV-only fit, stored verbatim in DB Phase 2)",
  "td_217":"The Llop-Sayson value has very large uncertainty (±29°) and is essentially unconstrained by RV alone — the prior on inclination was nearly uniform. Roettenbacher 2022&#x27;s combined astrometric + disk-plane reading favors 34° at the same level of statistical support, and Booth 2017&#x27;s resolved disk inclination of 34 ± 2° provides an independent coplanarity argument. cfg picks the coplanar 34° because it is consistent with the host Phase 3&#x27;s <code>disk_imaging_inclination_deg</code> adoption and produces a physically self-consistent system architecture. The DB-stored 78.81° is preserved verbatim for traceability but will be updated when Phase 2 of <code>eps_eri_b</code> is refreshed.",
  "h2_218":"Bibliography",
  "h3_219":"Read (visual-informative, drove decisions above)",
  "li_220":"<b>Hatzes A. P. et al. 2000</b> — <i>Evidence for a Long-Period Planet Orbiting ε Eridani</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). The original radial-velocity discovery paper; sets P ≈ 6.85 yr and M sin i ≈ 0.86 M_Jup as the initial values (later refined).",
  "li_221":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>Structure in the ε Eridani Dusty Disk Caused by Mean Motion Resonances with a 0.3 Eccentricity Planet at 40 AU</i>, ApJ 578, L149 (<code>2002ApJ...578L.149Q</code>). Historical inference of an outer &quot;ε Eri c&quot; from cold-ring eccentricity; ruled out by Mawet 2019 direct imaging but important for the multi-belt-sculpting context.",
  "li_222":"<b>Benedict G. F. et al. 2006</b> — <i>The Extrasolar Planet ε Eridani b. Orbit and Mass from Combined Astrometric and Spectroscopic Data</i>, AJ 132, 2206 (<code>2006AJ....132.2206B</code>). HST FGS astrometric attempt; superseded by direct imaging but historically important for the mass determination chain.",
  "li_223":"<b>Mawet D. et al. 2019</b> — <i>Deep Exploration of ε Eridani with Keck Ms-band Vortex Coronagraphy and Radial Velocities</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, arXiv:1810.03794). Direct imaging confirmation of ε Eri b at L′ and Ms band; rules out outer ε Eri c with planet mass &gt; 0.3 M_Jup beyond 30 AU; constrains thermal-emission upper limit excluding hot-start inflated jovian models. <b>Cornerstone observational paper.</b>",
  "li_224":"<b>Llop-Sayson J. et al. 2021</b> — <i>Constraints on the Nature of ε Eri b from a Combined Analysis of Radial Velocities and Astrometry</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, arXiv:2108.05552). Joint RV + Hipparcos/Gaia astrometric fit; M sin i ≈ 0.66 M_Jup; deprojected mass 0.78 ± 0.12 M_Jup using disk-aligned i = 34°; a = 3.5 AU. <b>Cornerstone observational paper.</b>",
  "li_225":"<b>Roettenbacher R. M. et al. 2022</b> — <i>No Reliable Astrometric Detection of ε Eridani b</i>, AJ 163, 19 (<code>2022AJ....163...19R</code>, arXiv:2110.10643). Astrometric cross-check across multiple missions; the individual signal is marginal but combined with the disk-plane coplanarity argument favors i ≈ 34° over Llop-Sayson&#x27;s RV-only 78.8°.",
  "li_226":"<b>MacGregor M. A. et al. 2015</b> — <i>ALMA Observations of the Debris Disk around ε Eridani</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, arXiv:1505.03879). ALMA 1.3 mm imaging resolves the cold ring at 64.4 ± 0.5 AU with eccentricity e ≈ 0.07; provides the disk inclination reference frame.",
  "li_227":"<b>Booth M. et al. 2017</b> — <i>The Northern arc of ε Eridani&#x27;s Debris Ring as seen by ALMA</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, arXiv:1705.05868). Multi-wavelength decomposition; three-belt structure; cold-ring inclination 34 ± 2° — the canonical inclination reference matched by ε Eri b&#x27;s orbital plane.",
  "li_228":"<b>Su K. Y. L. et al. 2017</b> — <i>The Inner 25 AU Debris Distribution in the ε Eri System</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, arXiv:1703.10330). The &quot;Genie&quot; multi-belt sculpting model; identifies ε Eri b as the inner-gap sculptor between the 3 AU asteroid analog and the 20 AU intermediate belt. <b>Drives the <code>companion_position_relative_belts</code> decision row.</b>",
  "h3_229":"Read (context / methodology, not decision-driving)",
  "li_230":"<b>Burrows A. et al. 2003</b> — <i>Beyond the T dwarfs</i> and related cool-jovian evolutionary tracks (<code>2003ApJ...596..587B</code>). Mass- radius-age tracks for 0.5–1.5 M_Jup planets; used to estimate ε Eri b&#x27;s radius and intrinsic luminosity from 0.78 M_Jup, 0.44 Gyr.",
  "li_231":"<b>Fortney J. J. et al. 2007</b> — <i>Planetary Radii across Five Orders of Magnitude in Mass and Stellar Insolation</i> (<code>2007ApJ ...659.1661F</code>). Confirms Burrows tracks across the relevant mass- age window for ε Eri b&#x27;s radius choice.",
  "li_232":"<b>Spiegel D. S. &amp; Burrows A. 2012</b> — <i>Spectral and Photometric Diagnostics of Giant Planet Formation Scenarios</i> (<code>2012ApJ...745 ..174S</code>). Hot-start vs cold-start jovian evolutionary tracks; the Mawet 2019 contrast measurement rules out hot-start tracks for ε Eri b.",
  "li_233":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i> (<code>2003ApJ...591.1220L</code>). Protosolar abundance reference; drives the atmosphere composition default.",
  "li_234":"<b>Atreya S. K. et al. 1999</b> — <i>A comparison of the atmospheres of Jupiter and Saturn</i> and related condensation chemistry references. Sets the ammonia / water cloud-deck altitude framework.",
  "li_235":"<b>Lewis J. S. 1969</b> — <i>The clouds of Jupiter and the NH₃-H₂O and NH₃-H₂S systems</i> (<code>1969Icar...10..365L</code>). Original thermo- chemical cloud-deck sequence; still the framework used in modern jovian atmosphere modeling.",
  "li_236":"<b>Sromovsky L. A. et al. 2007</b> — Jupiter/Saturn convective drive and belt-zone amplitude scaling. Used to estimate ε Eri b&#x27;s belt-zone contrast vs Jupiter and Saturn.",
  "li_237":"<b>Khare B. N. et al. 1984</b> — <i>Optical constants of organic tholins produced in a simulated Titanian atmosphere</i> (<code>1984Icar ...60..127K</code>). Laboratory tholin chemistry; absorption signatures used in the photochemical haze tint choice.",
  "li_238":"<b>Hörst S. M. et al. 2018</b> — <i>Haze Production Rates in Super- Earth and Mini-Neptune Atmosphere Experiments</i> (<code>2018Natur ...2..303H</code>). Sub-Neptune tholin chemistry extended to jovians; drives the haze-optical-depth scaling vs Jupiter.",
  "li_239":"<b>Moses J. I. et al. 2005</b> — <i>Photochemistry of Saturn&#x27;s atmosphere</i> (<code>2005JGRE..110.8001M</code>). Saturn UV photochemistry reference; scaled to ε Eri b under K2V FUV.",
  "li_240":"<b>Wood B. E. et al. 2002</b> — <i>Measured Mass Loss Rates of Solar- like Stars as a Function of Age and Activity</i> (<code>2002ApJ...574 ..412W</code>, arXiv:astro-ph/0203437). ε Eri&#x27;s mass-loss rate ~30× solar; drives the magnetosphere driver strength.",
  "li_241":"<b>France K. et al. 2018</b> — <i>The MUSCLES Treasury Survey</i> extension to K dwarfs (<code>2018ApJS..239...16F</code>). FUV / Lyα fluxes for ε Eri; drives the photochemistry-strength estimate.",
  "li_242":"<b>Reiners A. &amp; Christensen U. R. 2010</b> — <i>A magnetic field evolution scenario for brown dwarfs and giant planets</i> (<code>2010 A&amp;A...522A..13R</code>). Dynamo scaling for jovians; consistent with the cfg&#x27;s 400 μT pick from Jupiter scaling.",
  "li_243":"<b>Metcalfe T. S. et al. 2013</b> — <i>Magnetic Activity Cycles in the Exoplanet Host Star ε Eridani</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, arXiv:1212.5343). First report of the ~2.95-yr chromospheric activity cycle; drives the cycle-phase magnetospheric-driver synchronization noted in Open items. (Not fetched in the b-bibliography; cited from the host Phase 3.)",
  "li_244":"<b>Coffaro M. et al. 2020</b> — <i>A solar-like magnetic cycle on the mature K-dwarf 61 Cygni A and the X-ray cycle of ε Eridani</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, arXiv:2002.11009). Refines the X-ray cycle amplitude that modulates the wind driver at ε Eri b&#x27;s orbit. (Pinned in the host bibliography <code>eps-eri.yaml</code>, status fetched; not separately pinned for b.)",
  "li_245":"<b>Canup R. M. &amp; Ward W. R. 2002</b> — <i>Formation of the Galilean Satellites: Conditions of Accretion</i>, AJ 124, 3404 (<code>2002AJ....124.3404C</code>). Circumplanetary-disk satellite-accretion framework; context for the speculative moon-system Open item. (Not fetched in the b-bibliography.)",
  "h3_246":"Read (instrument / non-cfg-decisive)",
  "li_247":"<b>Snellen I. A. G. et al. 2014</b> — <i>Fast spin of the young extrasolar planet β Pictoris b</i> (<code>2014Natur.509...63S</code>). Doppler- broadened spectroscopy technique; not yet applied to ε Eri b.",
  "li_248":"<b>Drossart P. et al. 1989</b> — <i>Detection of H₃⁺ on Jupiter</i> (<code>1989Natur.340..539D</code>). H₃⁺ emission as future aurora detection channel for ε Eri b.",
  "li_249":"<b>Clarke J. T. et al. 1996, 2009</b> — Jupiter HST FUV aurora observations; provides the auroral-oval geometry reference scaled to ε Eri b.",
  "li_250":"<b>Bonfond B. 2017</b> — <i>Jovian auroral aspects</i> (<code>2017JGRA ...122.4548B</code>). Jupiter auroral oval latitude reference.",
  "li_251":"<b>Wong M. H. et al. 2004</b> — <i>Updated Galileo probe abundance measurements</i> (<code>2004Icar..171..153W</code>). Jupiter CH₄ / NH₃ abundance reference; cfg adopts Jupiter-analog values.",
  "li_252":"<b>Hanel R. A. et al. 1983, Li L. et al. 2018</b> — Saturn Bond albedo measurements (<code>1983Icar...53..262H</code>; <code>2018NatCo...9.3709L</code>). Reference values for the cool-jovian Bond albedo tie-break.",
  "li_253":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i> (<code>1966Icar....5..375G</code>). Tidal-dissipation Q factor reference for the tidal-lock timescale calculation.",
  "h3_254":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "li_255":"Hatzes 2013 follow-up RV monitoring papers — superseded by Llop- Sayson 2021&#x27;s combined analysis.",
  "li_256":"2000s-era ε Eri b activity-contamination rebuttal series (Anglada- Escudé 2012, Zechmeister 2013) — historical context; superseded by Mawet 2019 direct imaging confirmation.",
  "li_257":"ε Eri b moon-system speculative papers — not observationally motivated; out of scope for first-pass Phase 3.",
  "li_258":"SETI / laser-emission searches targeting ε Eri (Marcy 2022, Tusay 2022, Saide 2023) — already cited in host Phase 3, not relevant to b.",
  "p_259":"The host star Phase 3 audit trail is preserved in <code>phase3/eps_eri/system.yaml</code> + workspace notes, but its pinned bibliography (<code>docs/phase3/_bib/eps-eri.yaml</code>) contains only the stellar papers — it has zero planet-b entries. The planet-b paper set (Hatzes 2000, Mawet 2019, Llop-Sayson 2021, Roettenbacher 2022, Booth 2017, Su 2017) is cited in this document&#x27;s own Bibliography above but is not yet pinned/cached in a <code>docs/phase3/_bib/eps-eri-b.yaml</code>; a dedicated b-bibliography fetch is a follow-up pass.",
  "h2_260":"Open items for follow-up",
  "li_261":"<b>JWST coronagraph spectroscopy of ε Eri b (Cycle 4+)</b> — NIRCam or MIRI coronagraph at 4–5 μm could yield first thermal-emission spectrum, constraining T_eff, CH₄/NH₃ abundance ratios, and the photochemical haze optical depth. If detected, the Decisions table rows <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <code>photochemical_haze_present</code>, and <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> should be re-derived from the spectrum.",
  "li_262":"<b>Doppler-broadened rotation measurement</b> — VLT/CRIRES+ or ELT/HARMONI could measure v sin i at the ~1.1 arcsec separation if the planet&#x27;s thermal contrast can be extracted. Currently the 10 h rotation period is a within-window tie-break; a measured period would shift Confidence from low to high.",
  "li_263":"<b>Inclination-DB consistency</b>: the cfg adopts i = 34° (coplanar with disk; Roettenbacher 2022 + Booth 2017) while the DB Phase 2 still stores i = 78.81° ± 29.34° (Llop-Sayson 2021 RV-only). A future Phase 2 refresh should update the DB to the coplanar value or carry both as alternative measurements.",
  "li_264":"<b>Moon system Phase 3</b>: Hill-sphere radius ~0.237 AU is large enough to host a substantial moon population. A future Phase 3 follow-up could speculate on icy/rocky moons in the 5–50 R_planet range, anchored on (a) the protoplanetary-disk circumplanetary- feeding context (Canup 2002) and (b) any future ALMA/JWST circumplanetary-disk dust constraint. Out of scope for this first-pass Phase 3.",
  "li_265":"<b>Ring system tie-break preservation</b>: cfg picks <code>ring_present = false</code> based on Mawet 2019 Ms-band non-detection of a Saturn- bright ring. A Jupiter-faint ring system would be below the Mawet detection threshold and not excluded; this is preserved here as the alternative cfg variant for users who prefer a faint ring.",
  "li_266":"<b>Cycle-phase magnetospheric driver synchronization</b>: the host star&#x27;s 2.95-yr activity cycle (Metcalfe 2013) modulates the wind driver at ε Eri b&#x27;s orbit by a factor of ~4 (Coffaro 2020 X-ray cycle amplitude). A future cfg revision could phase-lock the aurora intensity rendering to the host cycle epoch so the player sees consistent timing across game years — same enhancement flagged in the host eps-eri.md Open items.",
  "li_267":"<b>Phase 2 <code>disk_measurements</code>/<code>planet_atmosphere_measurements</code> ingest</b>: ε Eri b currently has no Phase 2 atmosphere block in the DB. When the DB schema is extended (or when a <code>db/planets_atmospheres/</code> companion is introduced), the Mawet 2019 thermal-emission upper limit and any future JWST measurement should be ingested as <code>atmosphere_measurements</code> records with <code>recommended</code> flags matching the cfg picks above.",
  "h2_268":"Related",

  "td_148":"Tie-break. Jupiter 9.6°, Saturn 0°, Neptune 47°. cfg 는 시각적으로 명확한 오로라 oval 오프셋을 위해 Jupiter analog 10° 채택. Saturn-aligned 0° 는 시각적으로 단조로움",
  "td_149":"<span class=\"field-tt\" data-ko-tip=\"오로라 발생 여부 (대기 + 자기장 동시 필요).\" data-en-tip=\"Auroral activity present — requires both atmosphere and magnetic field.\"><code>aurora_present</code></span>",
  "td_150":"true",
  "td_151":"medium",
  "td_152":"ε Eri 의 항성풍 ≈ 30× 태양 질량 손실률 (Wood 2002) + 사이클 활동 corona 가 3.5 AU 에서 강한 입사 플라즈마 flux 구동. jovian 자기권 포획과 결합하면 Jupiter 와 비슷한 오로라 방출이 더 강한 구동으로 나타남",
  "td_153":"<span class=\"field-tt\" data-ko-tip=\"주 오로라 색 hex. 발광 종(species) 에 의해 결정.\" data-en-tip=\"Primary auroral color hex — determined by the dominant emission species.\"><code>aurora_color_primary_hex</code></span>",
  "td_154":"<span class=\"spectrum-bar\" style=\"background:linear-gradient(to right, #ff3400, #ff2400, #ff1200, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000, #ff0000)\"><div class=\"marker\" style=\"left:50.0%\"></div></span><span class=\"spectrum-range\">636–676 nm · peak 656.0 nm</span> <span class=\"hex-chip\" style=\"background:#c84080\"></span><code>#c84080</code> H₂ 풍부 jovian 대기에서 지배적인 H-Balmer α 656 nm 적-분홍",
  "td_155":"low",
  "td_156":"Tie-break. Jupiter UV 오로라는 Lyα + H₂ Lyman/Werner 밴드에서 가장 밝지만 가시광 성분은 H-Balmer α. K2V 조명 맥락에서 가시광 오로라는 적-분홍으로 읽힘",
  "td_157":"<span class=\"field-tt\" data-ko-tip=\"오로라 오벌 중심 자기 위도 (도). 지구 ≈ 67°.\" data-en-tip=\"Auroral oval magnetic latitude (degrees). Earth ≈ 67°.\"><code>aurora_oval_magnetic_latitude_deg</code></span>",

  "td_167":"high",
  "td_168":"Su 2017 §4. gap-clearing 은 두 belt 사이에 M ≳ 0.5 M_Jup 의 행성을 요구. ε Eri b 의 질량과 위치가 요구 조건과 일치",

  "td_173":"<span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span>",
  "td_174":"5039",
  "td_175":"high",
  "td_176":"host Phase 3 (<code>docs/phase3/eps-eri.md</code>) 에서 상속",
  "h2_177":"Surface synthesis",
  "p_178":"ε Eridani b 는 통상적 의미의 단단한 표면을 가지지 않습니다. 1 M_Jup 규모의 H₂/He 가스 행성입니다. 시각 렌더링에 관련된 &quot;표면&quot; 은 구름 데크로, 광학 불투명도가 위쪽의 맑은 가스에서 아래쪽의 입자 부유 가스로 전환되는 1 bar 압력 레벨이 관례적 기준입니다.",
  "p_179":"3.5 AU 에서 L_star = 0.32 L☉ 아래의 평형 온도는 T_eq ≈ 111 K (A = 0) 혹은 102 K (A = 0.3) 로, 두 값 모두 Jupiter (T_eq ≈ 110 K) 보다 차갑고 Saturn (T_eq ≈ 81 K) 보다 따뜻합니다. 이 온도에서의 H₂/He 대기 응결 화학은 잘 정립된 Lewis 1969 / Atreya 1999 열화학 시퀀스를 따릅니다. 암모니아 (NH₃) 가 1 bar 레벨 근처에서 응결하고, 물 (H₂O) 이 약 5 bar 깊이에서 더 깊게 응결하며, 메탄 (CH₄) 은 접근 가능한 모든 레벨에서 기체로 남습니다 (CH₄ 응결점은 T &lt; 75 K 를 요구하는데 ε Eri b 의 도달 범위를 넘음). 따라서 cfg 는 ε Eri b 를 암모니아 구름 데크 jovian 으로 렌더링하며, 구조적으로 Saturn 과 가장 유사하지만 더 따뜻하고 더 큰 질량에서 기대되는 Jupiter-like 자전 역학을 가집니다.",
  "p_180":"구름 데크는 K2V 조명 아래에서 따뜻한 크림-흰색 (<span class=\"hex-chip\" style=\"background:#e8dac4\"></span><code>#e8dac4</code>) 으로 읽힙니다. 실험실에서 암모니아 얼음은 가시광에서 0.8–0.9 의 내재 알베도를 가지며 1.5–2.0 μm 의 미량 흡수에서 옅은 노란 색조를 띱니다. 5039 K K2V 조명 아래에서는 태양광 Jupiter 팔레트 대비 더 따뜻한 크림 쪽으로 인식이 이동합니다. belt-zone 대비 (belt band 에 <span class=\"hex-chip\" style=\"background:#c4a878\"></span><code>#c4a878</code> 따뜻한 크림-갈색) 는 Jupiter 보다 완화되어 있는데, T_eq ≈ 111 K 에서의 대류 구동이 Jupiter 보다 약하기 때문입니다. 그래도 Saturn 보다는 강합니다. 행성 내부 열 flux (~0.5 W/m² 채택) 가 무시할 수 없는 대류 overturn 을 만들기 때문입니다. 이는 Sromovsky 2007 의 belt-zone 진폭 스케일링과 대체로 일관됩니다.",
  "p_181":"암모니아 구름 데크 위에서는 ε Eri 의 강화된 K-왜성 FUV flux (France 2018 MUSCLES. 같은 궤도 거리에서 태양의 5–20 배) 가 약 0.1–10 mbar 압력 레벨에서 메탄 광분해를 구동합니다. 광화학 산물 — 더 무거운 탄화수소 (C₂H₂, C₂H₆) 와 톨린 유사 폴리머 — 가 자외선과 청색에 흡수 특성을 갖는 성층권 haze 층으로 축적됩니다 (Khare 1984. Hörst 2018). cfg 는 이를 <code>photochemical_haze_present = true</code> 와 크림-흰 구름 데크 위를 덮는 얇은 limb-haze 층으로 렌더링되는 옅은 톨린 색조 <span class=\"hex-chip\" style=\"background:#b08858\"></span><code>#b08858</code> 로 인코딩합니다. haze 가 시각 외관을 지배하지는 않습니다. Jupiter 의 성층권 haze 도 가시 파장에서는 미묘한 limb 어두워짐만 만듭니다. 그러나 앞으로의 JWST coronagraph 나 ELT 고대비 촬영에서 가장 가능성 높은 1차 분광 시그니처일 것입니다.",
  "p_182":"행성 내부에 매핑되는 표면 feature 는 없습니다. 대류 overturn 이 암모니아 구름 데크 아래에서 수직 혼합된 단열선을 유지합니다. 내부 구조는 약 1 Mbar (≈ 반지름의 90%) 의 금속 수소 전이까지 완전히 유체이며, 5–25 M⊕ 의 중원소 코어가 질량-반지름 모델에서 간접 추론 됩니다 (cfg 는 코어 질량을 인코딩하지 않음. 관측 제약 없음).",
  "h2_183":"Atmosphere synthesis",
  "p_184":"ε Eri b 의 투과 / 열방출 스펙트럼은 존재하지 않습니다. Mawet 2019 의 Ms-band (4.6 μm) 직접 촬영 대비 측정은 hot-start 광도에 대한 넓은 상한만 제공하여, 매우 어리고 매우 인플레이션된 jovian 진화 트랙 (Spiegel &amp; Burrows 2012 의 T_eff &gt; 700 K hot-start 모델) 을 약 2σ 수준에서 배제하지만 canonical 한 &quot;cold-start&quot; 열평형 예측 (내부 flux 를 포함해 T_eff ≈ 150 K) 은 데이터와 일관되게 유지합니다. 따라서 대기 조성은 전적으로 Lodders 2003 의 protosolar 풍부도 + Atreya 1999 의 T = 111 K 평형에서 절단된 응결 화학을 따르는 태양 조성 jovian 디폴트에서 가져옵니다.",
  "p_185":"<b>압력 기준.</b> 가스 행성은 단단한 표면을 갖지 않습니다. cfg 기준 압력은 암모니아 구름 데크가 응결하는 1 bar (100 000 Pa) 로 설정됩니다. KSP 관례의 대기 고도 원점이 이 레벨과 일치합니다. 1 bar 위에서는 압력이 H ≈ 23 km 의 척도 높이로 감소합니다. 더 차가운 온도와 더 높은 중력의 조합 때문에 지구나 Jupiter 의 척도 높이보다 다소 낮습니다.",
  "p_186":"<b>조성.</b> 부피로 H₂ ≈ 89%, He ≈ 10% — 태양 protosolar 비율이며 이 질량과 나이에서는 He 고갈이 무시 가능합니다. volatile. CH₄ ≈ 0.2% (Jupiter 는 0.21%. Wong 2004 Galileo probe 에 따라 protosolar 대비 약 3× 강화. cfg 는 Jupiter analog 0.2% 채택), NH₃ ≈ 200 ppm (구름 데크 위에서는 응결로 고갈), H₂O ≈ 100 ppm (더 깊은 물 구름 데크 위에서 고갈), 미량 CO ~ 1 ppb 와 HCN ~ 0.1 ppb 는 CH₄ + N₂ 광화학에서 옴. 이 volatile 풍부도는 전적으로 tie-break 디폴트이며 스펙트럼이 어느 것도 제약하지 않습니다. 그러나 cfg 가 Jupiter analog 값을 선택하는 이유는 0.78 M_Jup 의 질량과 protosolar metallicity 맥락이 Jupiter 급 disk-accretion 형성 이력을 선호하기 때문입니다.",
  "p_187":"<b>광화학 시그니처.</b> ε Eri 의 강화된 FUV (Lyα. France 2018 MUSCLES. 8 × 10⁻⁴ L_bol 대 태양의 ≈ 6 × 10⁻⁵ L_bol) 는 Jupiter 가 받는 것보다 더 강한 메탄 광분해를 구동합니다. 그 결과의 탄화수소 사슬 (CH₄ → C₂H₆, C₂H₂, C₂H₄ → 톨린 폴리머) 이 약 100 mbar 압력 위에 성층권 haze 층을 만듭니다. 정량적 모델링 (Moses 2005 Saturn. Hörst 2018 의 sub-Neptune 톨린 화학을 jovian 으로 확장) 은 ε Eri b 의 1 μm 에서의 haze 광학적 깊이가 Jupiter 의 약 2–5 배일 것으로 예측하여, 가시적으로 강화된 limb 어두워짐과 향후 분광에서의 검출 가능한 0.6–0.8 μm 흡수 특성을 만들기에 충분합니다. 근적외선의 오로라 관련 N₂⁺ / H₃⁺ 방출선 (Drossart 1989 의 Jupiter 3.4 μm H₃⁺) 이 향후 가장 진단적인 검출 채널이 될 것입니다. cfg 는 특정 광학적 깊이를 지정하지 않고 haze 의 존재만 인코딩합니다.",
  "p_188":"<b>Hill sphere 관측자가 보는 하늘.</b> 0.82 M☉ 주위 3.53 AU 의 0.78 M_Jup 에 대한 Hill sphere 반경은 r_H ≈ 0.237 AU = 472 R_planet 입니다 — 상당한 위성 집단을 수용할 만큼 큽니다. 가상의 20 R_planet (ε Eri b 의 큰 반지름에 스케일된 Io analog 거리) 큰 위성 위의 관측자에게 행성은 하늘에서 ≈ 5.7° 의 시지름 — Earth 에서 본 달 지름의 거의 12 배 — 으로 보이며 띠 진 크림-흰색 디스크로 낮 하늘을 지배합니다. ε Eri 별 자체는 작은 0.112° 의 점입니다 — Earth 에서 본 태양 크기의 1/4, Jupiter 에서 본 태양 기하와 비슷 — K2V 색온도의 짙은 주황 점으로 나타납니다. 따뜻한 크림 행성 디스크와 주황 점광원 사이의 대비가 어떤 wide-orbit fly-by 렌더에서도 시스템에서 가장 사진 같은 feature 일 것입니다.",
  "p_189":"<b>Nightside.</b> 직접 항성 조명 없음. 행성 자신의 내부 flux (~0.5 W/m²) 가 ~110 K 피크 (28 μm) 의 근적외 열 글로를 만듭니다 — 육안에는 보이지 않지만 Mawet 2019 가 행성을 검출한 4.6 μm 에서는 옅은 자체 조명의 적-따뜻 cast 입니다. 오로라 방출이 고자기위도에서 nightside 의 유일한 가시광 시그널을 제공합니다. ≈ 70° 자기 위도의 옅은 H-Balmer α 적-분홍 고리로, ε Eri 의 강화된 항성풍을 고려하면 Jupiter 의 가시광 오로라보다 약 10 배 밝습니다.",
  "h2_190":"Rotation &amp; spin synthesis",
  "p_191":"ε Eri b 의 자전 측정은 존재하지 않습니다. 도플러 확장 근적외 스펙트럼 (Snellen 2014 가 β Pictoris b 에 적용한 v sin i = 25 km/s 측정 기법) 은 &lt; 0.5 arcsec 분리에서의 고대비 분광 촬영을 요구합니다. ε Eri b 는 host 에서 ≈ 1.1 arcsec 분리되어 현재 장비로도 접근 가능하지만, 작은 질량 (0.78 M_Jup) 과 약한 열방출이 자전 측정을 지금까지 가로막아 왔습니다.",
  "p_192":"<b>조석 감쇠 논증.</b> 0.82 M☉ host 주위 3.5 AU 의 Jupiter 질량 행성 조석 시간 척도는 τ_tide ≈ 10⁴⁰ s (Goldreich &amp; Soter 1966. Q_p ≈ 10⁵) — 우주 나이보다 수십 자릿수 더 깁니다. ε Eri b 는 <b>조석 잠금 이 아닙니다</b>. cfg 는 <code>tidally_locked = false</code> 로 인코딩합니다.",
  "p_193":"<b>자전 주기 선택.</b> 관측된 가스 행성들 사이에서 자전 주기는 질량에 약하게 의존합니다. Jupiter (1.0 M_Jup) ≈ 9.93 h, Saturn (0.3 M_Jup) ≈ 10.7 h, Uranus (0.046 M_Jup) ≈ 17.2 h, Neptune (0.054 M_Jup) ≈ 16.1 h. 0.78 M_Jup 의 ε Eri b 는 3.5 AU 의 disk accretion 에서 상속한 각운동량 예산이 Jupiter 급 고속 자전을 선호합니다. cfg 는 <code>rotation_period_hours = 10</code> 을 둥근 Jupiter analog 값으로 채택 — 윈도우 내 tie-break 이며 제약 없음.",
  "p_194":"<b>자전축 기울기.</b> tie-break 미적 선택. Jupiter 의 3.1° 대 Saturn 의 26.7° 대 Uranus 의 97.8° — 어느 쪽 관측도 없음. cfg 는 25° (Saturn analog) 를 채택. 적당한 기울기가 Uranus 극단의 &quot;넘어진&quot; 느낌과 시각적으로 구분되면서 렌더에서 애니메이션 축 기울기를 제공하기 때문입니다. 7.32 년 궤도 주기에서는 적당한 기울기도 구름 데크의 관측 가능한 계절 효과를 만들지 않습니다. 대류 overturn 시간 척도 (~년) 가 궤도 주기와 비슷한 정도입니다.",
  "p_195":"<b>KSP 구현 노트.</b> 자전 주기 = 10 h = 36 000 s. Kopernicus <code>rotationPeriod = 36000</code>. 축 기울기 (<code>initialRotation</code> 또는 axis- tilt cfg) = 궤도면 법선으로부터 25°.",
  "p_196":"<b>자기 다이나모 기대.</b> 강한 대류를 가진 H₂/He envelope 와 Jupiter 급 자전 주기 (10 h) 가 강한 dipolar 자기장을 유지합니다. Jupiter (표면 적도 자기장 ≈ 430 μT, dipole moment ≈ 2 × 10⁴ × Earth) 에서 선형 질량 스케일링하면 ε Eri b 는 ≈ 400 μT 와 ≈ 1.56 × 10⁴ × Earth 가 되며, 둘 다 cfg 에서 채택됩니다. dipole tilt 는 시각적으로 명확한 오로라 oval 렌더링을 위해 Jupiter analog 10° 로 설정합니다. Jupiter-analog 자전 + 자기장 조합은 ε Eri b 를 &quot;강한 자기권&quot; 영역에 확고히 놓으며, 30× 태양풍 배경에 대해 magnetopause standoff 가 ≳ 50 R_planet 입니다.",
  "h2_197":"Visual styling",
  "p_198":"표면 (구름 데크) 과 대기 결정을 조합하면.",
  "li_199":"<b>전역 외관.</b> 궤도에서 ε Eri b 는 Jupiter 보다 약 20% 작은 띠 진 크림-흰색 jovian — ~1.05 R_Jup = 75 000 km — 으로 읽힙니다. belt-zone 대비는 보통 수준 (zone 에 <span class=\"hex-chip\" style=\"background:#e8dac4\"></span><code>#e8dac4</code> 크림-흰, belt 에 <span class=\"hex-chip\" style=\"background:#c4a878\"></span><code>#c4a878</code> 따뜻한 크림-갈색) 으로 Jupiter 만큼 강렬하지 않지만 중간 렌더 거리에서는 가시적. 지속적인 zonal banding (~5 개의 belt 와 zone) 이 가시 디스크의 ~85% 를 덮음.",
  "li_200":"<b>구름 데크 세부.</b> 암모니아 얼음 구름 zone 이 옅은 cyclonic eddy 와 함께 매끄러운 크림-흰 띠로 나타남. Jupiter 의 Great Red Spot 같은 등가물은 제약되지 않으므로 cfg 는 시각 관심을 위해 몇 개의 작은 폭풍 vortex (drift 시그너처만) 를 채택. 띠는 동서로 흐르며, 10 h 자전 + 1.05 R_Jup 반지름에서 행성의 코리올리 파라미터에 맞춰 폭이 스케일된 위도 띠 패턴.",
  "li_201":"<b>극지방.</b> 제약 없음. tie-break 미적. cfg 는 Saturn 의 극 hexagon 형태에서 영감을 받은 옅은 cyclonic polar hood 구조를 렌더하되 특정 기하 패턴을 확정하지는 않음.",
  "li_202":"<b>Limb haze.</b> K2V 조명 하의 암모니아 구름 데크에서 산란된 Rayleigh + Mie 가 만드는 약 20–40 km 두께의 옅은 크림-탄 limb 글로 (<span class=\"hex-chip\" style=\"background:#d8c098\"></span><code>#d8c098</code>). 그 위에 day-night terminator 에서 미묘한 흡수를 더하는 얇은 톨린 haze 층 (<span class=\"hex-chip\" style=\"background:#b08858\"></span><code>#b08858</code>) 이 덮임.",
  "li_203":"<b>오로라 고리.</b> 고자기 위도 (cfg 에서 ~70°) 의 북남 양극 모두에서 옅은 H-Balmer α 적-분홍 (<span class=\"hex-chip\" style=\"background:#c84080\"></span><code>#c84080</code>) 오로라 고리가 보임. ε Eri 의 강화된 항성풍을 고려하면 Jupiter 의 가시광 오로라보다 ~10 배 더 밝음. nightside 각도에서만 보이며, dayside 에서는 구름 데크에 가려짐.",
  "li_204":"<b>하늘의 별.</b> ε Eridani 는 ε Eri b 에서 0.112° 시지름 — Earth 에서 본 Saturn 의 시지름과 비슷 — 으로 K2V <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code> 짙은 주황색의 점/ 디스크로 나타남. 20 R_planet 의 가상의 큰 위성에서는 행성 자체가 하늘을 ~5.7° 로 지배하고 별은 근처의 강렬한 주황 핀포인트로 축소.",
  "li_205":"<b>하늘의 자매 행성.</b> Mawet 2019 coronagraphic 미검출 이후 ε Eri 시스템에서 확인된 다른 행성은 없음. ~20 AU 의 중간 debris belt 와 ~64 AU 의 차가운 고리는 ε Eri b 시점에서 큰 일심 위상각에서만 옅은 확산 글로 띠로 보이며, 분리된 동반체는 검출되지 않음.",
  "li_206":"<b>고리 시스템.</b> 고리 없음 (cfg <code>ring_present = false</code>). Mawet 2019 Ms-band 촬영은 3.5 AU 분리에서 Saturn 밝기 고리 시스템을 검출 했어야 함. 미검출이 medium confidence 로 <code>ring_present = false</code> 설정 (Jupiter 만큼 약한 고리는 Mawet 검출 임계값 아래이며 배제되지 않음).",
  "li_207":"<b>Hill sphere 맥락.</b> r_H ≈ 0.237 AU = 472 R_planet. 상당한 위성 집단을 수용할 만큼 큼. cfg 는 특정 위성을 확정하지는 않음 (이번 Phase 3 의 scope 밖) 그러나 Hill sphere 범위 자체가 영향 권역 경계의 옅은 구로 렌더될 때 시각적 landmark.",
  "h2_208":"Canonical alternatives",
  "h3_209":"Diverged cfg picks",
  "th_210":"Field",
  "th_211":"Gameplay (in cfg)",
  "th_212":"Canonical alternative",
  "th_213":"Why diverged",
  "td_214":"<span class=\"field-tt\" data-ko-tip=\"시선 방향에 대한 궤도면 기울기 (도).\" data-en-tip=\"Orbital inclination relative to line of sight (degrees).\"><code>inclination_deg</code></span>",
  "td_215":"34° (Roettenbacher 2022 + 디스크 평면 coplanar 해석. Booth 2017 ALMA 디스크 경사각과 일치)",
  "td_216":"78.81° ± 29.34° (Llop-Sayson 2021 RV 전용 fit. DB Phase 2 에 그대로 저장)",
  "td_217":"Llop-Sayson 값은 불확실도가 매우 크고 (±29°) RV 만으로는 사실상 제약되지 않음 — 경사각에 대한 사전 분포가 거의 균일. Roettenbacher 2022 의 천체측정 + 디스크 평면 결합 해석은 같은 통계 지지 수준에서 34° 를 선호하고, Booth 2017 의 분해 디스크 경사각 34 ± 2° 가 독립적인 coplanarity 논증을 제공. cfg 는 coplanar 34° 를 채택하는데, host Phase 3 의 <code>disk_imaging_inclination_deg</code> 채택과 일관되고 물리적으로 자기 일관적 시스템 구조를 만들기 때문. DB 저장값 78.81° 는 추적성을 위해 그대로 보존되며 <code>eps_eri_b</code> Phase 2 갱신 시 업데이트 예정.",
  "h2_218":"Bibliography",
  "h3_219":"Read (visual-informative, drove decisions above)",
  "li_220":"<b>Hatzes A. P. et al. 2000</b> — <i>Evidence for a Long-Period Planet Orbiting ε Eridani</i>, ApJ 544, L145 (<code>2000ApJ...544L.145H</code>). 원래의 시선속도 발견 논문. 초기값 P ≈ 6.85 yr, M sin i ≈ 0.86 M_Jup 을 설정 (이후 정밀화됨).",
  "li_221":"<b>Quillen A. C. &amp; Thorndike S. 2002</b> — <i>Structure in the ε Eridani Dusty Disk Caused by Mean Motion Resonances with a 0.3 Eccentricity Planet at 40 AU</i>, ApJ 578, L149 (<code>2002ApJ...578L.149Q</code>). 차가운 고리 이심률에서 외부 &quot;ε Eri c&quot; 를 추론한 역사적 시도. Mawet 2019 직접 촬영으로 배제되었으나 다중 belt 조각 sculpting 맥락에서 중요.",
  "li_222":"<b>Benedict G. F. et al. 2006</b> — <i>The Extrasolar Planet ε Eridani b. Orbit and Mass from Combined Astrometric and Spectroscopic Data</i>, AJ 132, 2206 (<code>2006AJ....132.2206B</code>). HST FGS 천체측정 시도. 직접 촬영으로 대체되었으나 질량 결정 체인에서 역사적으로 중요.",
  "li_223":"<b>Mawet D. et al. 2019</b> — <i>Deep Exploration of ε Eridani with Keck Ms-band Vortex Coronagraphy and Radial Velocities</i>, AJ 157, 33 (<code>2019AJ....157...33M</code>, arXiv:1810.03794). L′ / Ms band 에서의 ε Eri b 직접 촬영 확정. 30 AU 외부에서 행성 질량 &gt; 0.3 M_Jup 의 외부 ε Eri c 배제. hot-start 인플레이션 jovian 모델을 배제하는 열방출 상한 제약. <b>핵심 관측 논문</b>.",
  "li_224":"<b>Llop-Sayson J. et al. 2021</b> — <i>Constraints on the Nature of ε Eri b from a Combined Analysis of Radial Velocities and Astrometry</i>, AJ 162, 181 (<code>2021AJ....162..181L</code>, arXiv:2108.05552). RV + Hipparcos/Gaia 천체측정 결합 fit. M sin i ≈ 0.66 M_Jup. 디스크 정렬 i = 34° 로 deproject 한 질량 0.78 ± 0.12 M_Jup. a = 3.5 AU. <b>핵심 관측 논문</b>.",
  "li_225":"<b>Roettenbacher R. M. et al. 2022</b> — <i>No Reliable Astrometric Detection of ε Eridani b</i>, AJ 163, 19 (<code>2022AJ....163...19R</code>, arXiv:2110.10643). 여러 미션에 걸친 천체측정 cross-check. 개별 시그널은 marginal 하지만 디스크 평면 coplanarity 논증과 결합하면 Llop-Sayson 의 RV 전용 78.8° 보다 i ≈ 34° 를 선호.",
  "li_226":"<b>MacGregor M. A. et al. 2015</b> — <i>ALMA Observations of the Debris Disk around ε Eridani</i>, ApJ 809, L47 (<code>2015ApJ...809L..47M</code>, arXiv:1505.03879). ALMA 1.3 mm 촬영이 차가운 고리를 64.4 ± 0.5 AU 에서 e ≈ 0.07 로 분해. 디스크 경사각 기준 좌표계 제공.",
  "li_227":"<b>Booth M. et al. 2017</b> — <i>The Northern arc of ε Eridani&#x27;s Debris Ring as seen by ALMA</i>, MNRAS 469, 3200 (<code>2017MNRAS.469.3200B</code>, arXiv:1705.05868). 다중 파장 분해. 삼중 belt 구조. 차가운 고리 경사각 34 ± 2° — ε Eri b 의 궤도면과 일치 하는 canonical 경사각 기준.",
  "li_228":"<b>Su K. Y. L. et al. 2017</b> — <i>The Inner 25 AU Debris Distribution in the ε Eri System</i>, AJ 153, 226 (<code>2017AJ....153..226S</code>, arXiv:1703.10330). &quot;Genie&quot; 다중 belt 조각 sculpting 모델. 3 AU asteroid analog 와 20 AU 중간 belt 사이의 inner-gap sculptor 로 ε Eri b 를 지목. <b><code>companion_position_relative_belts</code> 결정을 구동.</b>",
  "h3_229":"Read (context / methodology, not decision-driving)",
  "li_230":"<b>Burrows A. et al. 2003</b> — <i>Beyond the T dwarfs</i> 와 관련 차가운 jovian 진화 트랙 (<code>2003ApJ...596..587B</code>). 0.5–1.5 M_Jup 행성의 질량-반지름-나이 트랙. 0.78 M_Jup, 0.44 Gyr 에서 ε Eri b 의 반지름 과 내부 광도 추정에 사용.",
  "li_231":"<b>Fortney J. J. et al. 2007</b> — <i>Planetary Radii across Five Orders of Magnitude in Mass and Stellar Insolation</i> (<code>2007ApJ ...659.1661F</code>). ε Eri b 의 반지름 선택과 관련된 질량-나이 윈도우 에서 Burrows 트랙을 확인.",
  "li_232":"<b>Spiegel D. S. &amp; Burrows A. 2012</b> — <i>Spectral and Photometric Diagnostics of Giant Planet Formation Scenarios</i> (<code>2012ApJ...745 ..174S</code>). hot-start 대 cold-start jovian 진화 트랙. Mawet 2019 대비 측정이 ε Eri b 의 hot-start 트랙을 배제.",
  "li_233":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i> (<code>2003ApJ...591.1220L</code>). protosolar 풍부도 기준. 대기 조성 디폴트를 구동.",
  "li_234":"<b>Atreya S. K. et al. 1999</b> — <i>A comparison of the atmospheres of Jupiter and Saturn</i> 과 관련 응결 화학 참고. 암모니아 / 물 구름 데크 고도 프레임워크 설정.",
  "li_235":"<b>Lewis J. S. 1969</b> — <i>The clouds of Jupiter and the NH₃-H₂O and NH₃-H₂S systems</i> (<code>1969Icar...10..365L</code>). 원래의 열화학 구름 데크 시퀀스. 현대 jovian 대기 모델링에서도 여전히 사용되는 프레임워크.",
  "li_236":"<b>Sromovsky L. A. et al. 2007</b> — Jupiter/Saturn 대류 구동과 belt-zone 진폭 스케일링. Jupiter 와 Saturn 에 대비한 ε Eri b 의 belt-zone 대비 추정에 사용.",
  "li_237":"<b>Khare B. N. et al. 1984</b> — <i>Optical constants of organic tholins produced in a simulated Titanian atmosphere</i> (<code>1984Icar ...60..127K</code>). 실험실 톨린 화학. 광화학 haze 색조 선택에 사용된 흡수 시그너처.",
  "li_238":"<b>Hörst S. M. et al. 2018</b> — <i>Haze Production Rates in Super- Earth and Mini-Neptune Atmosphere Experiments</i> (<code>2018Natur ...2..303H</code>). sub-Neptune 톨린 화학을 jovian 으로 확장. Jupiter 대비 haze 광학적 깊이 스케일링을 구동.",
  "li_239":"<b>Moses J. I. et al. 2005</b> — <i>Photochemistry of Saturn&#x27;s atmosphere</i> (<code>2005JGRE..110.8001M</code>). Saturn UV 광화학 기준. K2V FUV 하의 ε Eri b 로 스케일.",
  "li_240":"<b>Wood B. E. et al. 2002</b> — <i>Measured Mass Loss Rates of Solar- like Stars as a Function of Age and Activity</i> (<code>2002ApJ...574 ..412W</code>, arXiv:astro-ph/0203437). ε Eri 의 질량 손실률 ~30× 태양. 자기권 구동 강도를 구동.",
  "li_241":"<b>France K. et al. 2018</b> — <i>The MUSCLES Treasury Survey</i> K 왜성 확장 (<code>2018ApJS..239...16F</code>). ε Eri 의 FUV / Lyα flux. 광화학 강도 추정을 구동.",
  "li_242":"<b>Reiners A. &amp; Christensen U. R. 2010</b> — <i>A magnetic field evolution scenario for brown dwarfs and giant planets</i> (<code>2010 A&amp;A...522A..13R</code>). jovian 다이나모 스케일링. Jupiter 스케일링 에서 cfg 의 400 μT 선택과 일관.",
  "li_243":"<b>Metcalfe T. S. et al. 2013</b> — <i>Magnetic Activity Cycles in the Exoplanet Host Star ε Eridani</i>, ApJ 763, L26 (<code>2013ApJ...763L..26M</code>, arXiv:1212.5343). ~2.95 년 채층 활동 사이클의 최초 보고. Open items 에 적힌 사이클 위상 자기권 구동 동기화를 구동. (b-bibliography 에는 미fetch. host Phase 3 에서 인용.)",
  "li_244":"<b>Coffaro M. et al. 2020</b> — <i>A solar-like magnetic cycle on the mature K-dwarf 61 Cygni A and the X-ray cycle of ε Eridani</i>, A&amp;A 636, A49 (<code>2020A&amp;A...636A..49C</code>, arXiv:2002.11009). ε Eri b 궤도 에서 wind 구동을 변조하는 X 선 사이클 진폭을 정밀화. (host bibliography <code>eps-eri.yaml</code> 에 핀됨, status fetched. b 용으로는 별도 핀 안 됨.)",
  "li_245":"<b>Canup R. M. &amp; Ward W. R. 2002</b> — <i>Formation of the Galilean Satellites: Conditions of Accretion</i>, AJ 124, 3404 (<code>2002AJ....124.3404C</code>). circumplanetary-disk 위성 강착 프레임워크. 추측성 위성 시스템 Open item 의 맥락. (b-bibliography 에는 미fetch.)",
  "h3_246":"Read (instrument / non-cfg-decisive)",
  "li_247":"<b>Snellen I. A. G. et al. 2014</b> — <i>Fast spin of the young extrasolar planet β Pictoris b</i> (<code>2014Natur.509...63S</code>). 도플러 확장 분광 기법. ε Eri b 에는 아직 적용 안 됨.",
  "li_248":"<b>Drossart P. et al. 1989</b> — <i>Detection of H₃⁺ on Jupiter</i> (<code>1989Natur.340..539D</code>). ε Eri b 의 향후 오로라 검출 채널로서의 H₃⁺ 방출.",
  "li_249":"<b>Clarke J. T. et al. 1996, 2009</b> — Jupiter HST FUV 오로라 관측. ε Eri b 에 스케일된 오로라 oval 기하 기준 제공.",
  "li_250":"<b>Bonfond B. 2017</b> — <i>Jovian auroral aspects</i> (<code>2017JGRA ...122.4548B</code>). Jupiter 오로라 oval 위도 기준.",
  "li_251":"<b>Wong M. H. et al. 2004</b> — <i>Updated Galileo probe abundance measurements</i> (<code>2004Icar..171..153W</code>). Jupiter CH₄ / NH₃ 풍부도 기준. cfg 가 Jupiter analog 값 채택.",
  "li_252":"<b>Hanel R. A. et al. 1983, Li L. et al. 2018</b> — Saturn Bond 알베도 측정 (<code>1983Icar...53..262H</code>. <code>2018NatCo...9.3709L</code>). 차가운 jovian Bond 알베도 tie-break 기준값.",
  "li_253":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i> (<code>1966Icar....5..375G</code>). 조석 잠금 시간 척도 계산을 위한 조석 소산 Q factor 기준.",
  "h3_254":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "li_255":"Hatzes 2013 follow-up RV 모니터링 — Llop-Sayson 2021 의 결합 분석 으로 대체.",
  "li_256":"2000년대 ε Eri b 활동도-오염 반박 시리즈 (Anglada-Escudé 2012. Zechmeister 2013) — 역사적 맥락. Mawet 2019 직접 촬영 확정으로 대체.",
  "li_257":"ε Eri b 위성 시스템 추측 논문 — 관측적 동기 없음. 첫 패스 Phase 3 의 scope 밖.",
  "li_258":"ε Eri 표적 SETI / 레이저 방출 검색 (Marcy 2022. Tusay 2022. Saide 2023) — host Phase 3 에서 이미 인용. b 에 무관.",
  "p_259":"host star Phase 3 audit trail 은 <code>phase3/eps_eri/system.yaml</code> 과 워크스페이스 노트에 보존되지만, 핀된 bibliography (<code>docs/phase3/_bib/eps-eri.yaml</code>) 는 항성 논문만 담고 있으며 행성 b 항목은 하나도 없습니다. 행성 b 논문 집합 (Hatzes 2000, Mawet 2019, Llop-Sayson 2021, Roettenbacher 2022, Booth 2017, Su 2017) 은 이 문서 위쪽의 자체 Bibliography 에 인용되어 있으나 아직 <code>docs/phase3/_bib/eps-eri-b.yaml</code> 로 핀/캐시되지 않았습니다. 전용 b-bibliography fetch 는 follow-up 패스입니다.",
  "h2_260":"Open items for follow-up",
  "li_261":"<b>JWST coronagraph 분광 of ε Eri b (Cycle 4+)</b> — NIRCam 또는 MIRI coronagraph 가 4–5 μm 에서 첫 열방출 스펙트럼을 산출할 수 있고, T_eff, CH₄/NH₃ 풍부도 비율, 광화학 haze 광학적 깊이를 제약. 검출되면 <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <code>photochemical_haze_present</code>, <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> Decisions 행을 스펙트럼에서 재유도.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
