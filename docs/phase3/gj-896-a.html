  "h2_85":"Surface synthesis",
  "p_86":"GJ 896 A has the deep red photosphere typical of an early-mid M dwarf. There is a structural caveat worth stating plainly: the Phase 2 layer carries <b>no measured effective temperature or luminosity</b> — the Curiel et al. 2022 astrometric study measures the mass and orbit but not the photospheric parameters, so its <code>teff_measurements</code> and <code>luminosity_measurements</code> arrays are empty. For the cfg the temperature is therefore synthesized from the M3.5 V spectral type, which corresponds to a typical Teff in the ~3200–3400 K range (the Gaia DR3 raw catalog value of 3334 K is consistent and is carried only as context, not as a curated measurement). At this temperature the SED peaks in the near-infrared and the optical continuum is suppressed by TiO and VO molecular bands — though less totally than the cooler M4.5 YZ Cet (3100 K) or M7 V Teegarden&#x27;s Star (2904 K). The rendered color is correspondingly a deep red-orange, but is explicitly flagged as a low-confidence synthesis because no Teff was measured.",
  "p_87":"With R ≈ 0.35 R☉ (Curiel 2022, quoting Morin 2008 / Pearce 2020) and a synthesized Teff ~3300 K, the Stefan-Boltzmann luminosity is roughly L ≈ 0.014 L☉; Curiel&#x27;s own habitable-zone calculation uses a mass-luminosity relation that implies a similar ~0.02 L☉ for the 0.436 M☉ star. Either way GJ 896 A is roughly 1/50–1/70 of the Sun&#x27;s luminosity — low enough that at V = 10.29 it is below naked-eye visibility despite its 20.4-light-year proximity. These luminosity figures are used only to bracket the planet&#x27;s insolation downstream; they are not curated Phase 2 values.",
  "p_88":"The defining surface property is strong magnetic activity expressed as a fast-rotating, heavily-spotted, flaring disk. GJ 896 A is one half of the well-known flare-star binary EQ Peg, and both components are long-established radio-burst sources and flaring X-ray emitters (Pallavicini 1985; Benz 1995; Robrade 2004; Liefke 2008; Crosley &amp; Osten 2018; Villadsen &amp; Hallinan 2019, all via Curiel 2022). The extremely fast 1.061-day rotation (rooted in the Morin et al. 2008 ZDI study) places GJ 896 A in the saturated regime of the rotation-activity relation, where mid-M dwarfs carry strong, kG-scale, large-scale magnetic fields. For cfg rendering this means a deep-red disk carrying a substantial cool-spot fraction that drifts rapidly on the ~1-day rotation, punctuated by frequent bright flares — a far livelier, younger-looking surface than the quiet old dwarfs (Barnard, Teegarden) and more active even than the moderately-active YZ Cet.",
  "p_89":"No metallicity is curated in the Phase 2 layer and none is synthesized here; at fixed Teff the metallicity effect on the rendered M-dwarf color is sub-perceptible, and project policy skips it for new hosts. There is no debris disk: no infrared-excess detection or resolved imaging of a disk around GJ 896 A has been reported, so the star is rendered diskless.",
  "h2_90":"Atmosphere synthesis",
  "p_91":"A main-sequence star has no &quot;atmosphere&quot; in the planetary cfg sense; for a stellar synthesis this section covers the chromosphere, corona, and — the headline for GJ 896 A — its strong flare and radio-burst activity.",
  "p_92":"GJ 896 A&#x27;s chromosphere and corona are those of a young, very active mid-M dwarf at the saturated end of the activity sequence. The Phase 2 layer carries no quantitative chromospheric (log R&#x27;HK) or coronal (log L_X) index — the Curiel 2022 astrometric study does not measure them — so the activity is characterized qualitatively here from the EQ Peg literature that Curiel compiles. Both EQ Peg components are flaring X-ray emitters (Robrade 2004; Liefke 2008) and recurrent radio-burst sources (Pallavicini 1985; Benz 1995; Crosley &amp; Osten 2018; Villadsen &amp; Hallinan 2019). The extremely fast 1.061-day rotation implies a very small Rossby number and hence a saturated dynamo, the regime where mid-M dwarfs reach their maximum fractional X-ray and chromospheric output and carry the strongest large-scale fields. The Morin et al. 2008 ZDI study of EQ Peg A (the source of the rotation period) maps exactly this kind of strong, ordered kG field.",
  "p_93":"The headline feature is flaring. GJ 896 A is a textbook UV-Cet-class flare star: it produces frequent optical flares and was detected at multiple VLBA epochs with compact, variable radio emission (Bower 2009, 2011, via Curiel 2022) — the radio variability is itself the signature of an active corona and recurrent flaring. For cfg purposes the corona / chromosphere layer is &quot;very active with frequent flares,&quot; distinct from the quiescent-with-rare-flares old dwarfs (Barnard, Teegarden) and more active than the moderately-active YZ Cet. The fast rotation also means the spotted disk and any flare-related brightening modulate on a roughly daily cadence rather than the months-long periods of the slow rotators.",
  "h2_94":"Rotation &amp; spin synthesis",
  "p_95":"GJ 896 A rotates very fast, with P_rot = 1.061 d (Curiel 2022, compiling Delfosse 1999 / Morin 2008 / Davison 2015 / Pearce 2020; the underlying determination is the Morin et al. 2008 spectropolarimetric / ZDI study of EQ Peg A). This is among the fastest rotators in the NearStars M-dwarf set — roughly 65× faster than the moderately-active YZ Cet (68.4 d) and ~90× faster than the old quiet Teegarden&#x27;s Star (96 d). Such rapid rotation is the fingerprint of youth: the star has not yet spun down through magnetic braking, consistent with the ≲100 Myr pre-main-sequence age that Riedel 2011 and Zuckerman 2013 argue for (Curiel 2022 also notes the older ~950 Myr Parsamyan 1995 estimate, so the age itself is uncertain and not Phase-2-curated). The fast spin drives the saturated dynamo behind the strong activity.",
  "p_96":"<b>KSP implementation note.</b> Stellar rotation period = 1.061 d = 91 670 s. In Kopernicus the star body&#x27;s <code>rotationPeriod</code> is set in seconds; at ~1 day the rotation is fast enough that rotational modulation of the spotted disk is visible on a roughly daily cadence, unlike the effectively-static slow rotators elsewhere in the catalog.",
  "p_97":"The rotational inclination is ~60° (Curiel 2022, from the same ZDI literature compilation). For NearStars visual rendering this is taken as the spin-axis orientation, giving an intermediate-tilt view of the spotted disk rather than pole-on or perfectly equator-on; it informs which hemisphere&#x27;s starspots and flare footpoints are most visible but is not otherwise cfg-decisive. No asteroseismic constraint is available (the star is far too cool and too small for detectable p-mode oscillations).",
  "h2_98":"Visual styling",
  "p_99":"In the NearStars renderer, GJ 896 A is portrayed as a pale warm orange, young, fast-rotating M3.5 Ve flare star — the brighter &quot;first sun&quot; of a wide M-dwarf binary:",
  "li_100":"<b>Global appearance.</b> A pale warm orange disk encoded as <span class=\"hex-chip\" style=\"background:#ffd088\"></span><code>#ffd088</code>, the real integrated-SED color close to the ~3300 K blackbody; the TiO/VO bands shift the displayed chromaticity only modestly. The M-sequence chromaticity is nearly flat, so this sits essentially alongside the M4 V Barnard (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>) and M4.5 YZ Cet (<span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>), all within the pale-warm-orange family. Because no Teff is measured, this hue is a low-confidence synthesis from the M3.5 V spectral type rather than a Teff-pinned value. The scene-illumination color temperature for the planet is driven by the synthesized ~3300 K SED.",
  "li_101":"<b>Heavily spotted surface.</b> A substantial cool-spot fraction (<code>visual_spot_coverage_max ≈ 0.2</code>) drifting rapidly on the 1.061-day rotation — strong rotational brightness modulation befitting a young, saturated-dynamo flare star, far more active than the near-uniform disks of the old quiet dwarfs.",
  "li_102":"<b>Frequent flares.</b> Bright optical flares (UV-Cet eruptive variable, the EQ Peg signature) rendered as recurrent transient brightenings on a roughly daily cadence — the liveliest stellar surface among the catalog&#x27;s M dwarfs, short of a continuously-erupting protostar.",
  "li_103":"<b>A second red sun (binary companion).</b> GJ 896 A shares the system with GJ 896 B, an M4.5 dwarf (0.16527 M☉, R ≈ 0.25 R☉, P_rot 0.404 d) on a wide a = 31.635 AU, 229-year <b>retrograde</b> orbit (mutual inclination Φ = 148° between the binary and planetary planes; Curiel 2022). From GJ 896 A&#x27;s planet b, GJ 896 B is a second deep-red sun — far smaller than the primary in the sky but a distinct bright point, itself an active flare star. (GJ 896 B is not yet a separate DB body; flagged for follow-up.)",
  "li_104":"<b>Star in planet b&#x27;s sky.</b> From planet b at the semi-major axis a = 0.64 AU, GJ 896 A subtends ~0.29° — a little over half the Sun&#x27;s angular size from Earth; near perihelion (0.42 AU) it grows to ~0.44°, close to the Sun&#x27;s apparent size, and the deep-red disk floods the warm Jovian with infrared-rich light at a few percent of Earth&#x27;s insolation.",
  "li_105":"<b>From Earth.</b> GJ 896 A is a V = 10.29 telescopic object, below naked-eye visibility despite its 20.4-light-year proximity, because of its low M-dwarf luminosity.",
  "h2_106":"Bibliography",
  "h3_107":"Read (drove Decisions above)",
  "li_108":"<b>Curiel S. et al. 2022</b> — <i>3D orbital architecture of a dwarf binary system and its planetary companion</i>, AJ 164, 93 (<code>2022AJ....164...93C</code>, doi:10.3847/1538-3881/ac7c66, <a href=\"https://arxiv.org/abs/2208.14553\">arXiv:2208.14553</a>). The VLBA + optical/IR astrometric discovery of the Jovian companion GJ 896 A b. Phase 2 recommended source for the stellar mass (0.43599 ± 0.00092 M☉, full combined binary-orbit fit), the quoted radius (~0.35 R☉, from Morin 2008 / Pearce 2020), the rotation period (1.061 d) and rotational inclination (~60°), the spectral type (M3.5 Ve), the binary companion parameters (GJ 896 B, 0.16527 M☉, a = 31.635 AU, P = 229.06 yr, retrograde, Φ = 148°), and the flare-star / radio-burst activity context (compiling Pallavicini 1985, Benz 1995, Robrade 2004, Liefke 2008, Bower 2009/2011, Crosley &amp; Osten 2018, Villadsen &amp; Hallinan 2019). Also the habitable-zone (0.18–0.26 AU) and snow-line (~0.51 AU) estimates used in the planet synthesis.",
  "h3_109":"Read (context / methodology, not decision-driving)",
  "li_110":"<b>Morin J. et al. 2008</b> — spectropolarimetric / Zeeman-Doppler-Imaging study of mid-M dwarfs including EQ Peg A, the underlying source of the 1.061 d rotation period and the kG-scale large-scale field picture (cited via Curiel 2022). The rotation and magnetic-field Decisions rows trace to this work.",
  "li_111":"<b>Pearce L.A. et al. 2020</b> &amp; <b>Davison C.L. et al. 2015</b> &amp; <b>Delfosse X. et al. 1999</b> — the prior-literature compilation Curiel 2022 draws the ~0.35 R☉ radius and the rotation/inclination from. Context for the radius and spin rows.",
  "h3_112":"Read (instrument-only, not visual-informative)",
  "li_113":"The VLBA radio-interferometric astrometry methodology in Curiel 2022 (AIPS phase-referencing, AGA / least-squares orbit fitting) is the instrument backbone of the mass and binary-orbit measurement but contributes no direct visual field beyond the parameters already used above.",
  "h3_114":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_115":"The age-controversy references (Parsamyan 1995 ~950 Myr; Riedel 2011 / Zuckerman 2013 ≲100 Myr PMS) are read only through Curiel 2022&#x27;s summary, since the age is not Phase-2-curated and is not cfg-decisive. The historical EQ Peg flare / radio survey papers (Pallavicini 1985, Benz 1995, Robrade 2004, Liefke 2008, Crosley &amp; Osten 2018, Villadsen &amp; Hallinan 2019) are cited via Curiel 2022 for the qualitative activity picture; none supplies a single Phase-2 activity index to curate. No debris-disk papers exist to read (none reported).",
  "h2_116":"Open items for follow-up",
  "li_117":"<b>GJ 896 B as a separate DB body.</b> The M4.5 companion (0.16527 M☉, R ≈ 0.25 R☉, P_rot 0.404 d, a = 31.635 AU, P = 229.06 yr, retrograde) is a second active flare star and a &quot;second sun&quot; in the planet&#x27;s sky. A follow-up should add GJ 896 B to the DB and produce its own stellar Phase 3 synthesis, plus the binary_orbit cfg for the wide retrograde pair.",
  "li_118":"<b>Teff / luminosity measurement.</b> No Phase 2 Teff or luminosity is curated; the cfg synthesizes them from the M3.5 V spectral type at low confidence. A future curation of a measured Teff (e.g. from a CARMENES / SED study of EQ Peg A) should replace the synthesized ~3300 K and sharpen the surface-tint hex from a low-confidence to a high-confidence value.",
  "li_119":"<b>Age resolution.</b> The ~950 Myr vs ≲100 Myr (PMS) age ambiguity is unresolved. If confirmed pre-main-sequence, GJ 896 AB would be among the closest PMS stars known, which would justify an even more-active, possibly inflated-radius rendering.",
  "li_120":"<b>Quantitative activity indices.</b> No log R&#x27;HK, X-ray flux, or flare rate is curated. A dedicated EQ Peg A activity census (Ca II H&amp;K, Chandra/XMM, TESS flares) would let a future cfg attach quantitative <code>activity_log_rhk</code>, <code>x_ray_log_lx</code>, and <code>flare_rate_per_day</code> values to the currently-qualitative activity rendering.",
  "li_121":"<b>Magnetic-field map.</b> The Morin 2008 ZDI provides a kG-scale field qualitatively; a refreshed large-scale field map would pin the dipole geometry for a faithful spot / flare-footpoint animation keyed to the 1.061-day rotation.",
  "h2_122":"Related",
  "li_123":"<a href=\"../reference/methodology.md\">methodology</a> — schema source for the Decisions table",

  ko: {
  "p_1":"GJ 896 A (EQ Peg A. BD+19 5116 A. Gaia DR3 2824770686019003904) 는 가까운 저질량 M-왜성 쌍성 GJ 896 AB 에서 더 무거운 성분으로, 6.263 pc 거리에 (Gaia DR3 시차 159.66 mas) 있으며 태양에서 약 20.4 광년 떨어져 있습니다. 기본 파라미터는 frozen Phase 2 레이어에서 가져오며, Curiel et al. 2022 (VLBA + 광학/적외선 천체측정) 에 정박합니다. 질량 M = 0.43599 ± 0.00092 M☉ 는 전체 결합 쌍성-궤도 피팅에서 나오고, 반지름 R ≈ 0.35 R☉ 는 Curiel 이 직접 측정한 것이 아니라 이전 문헌 (Morin et al. 2008. Pearce et al. 2020) 에서 인용한 값입니다. 분광형은 M3.5 Ve 입니다. 특기할 점은, <b>Phase 2 에 유효온도나 광도가 큐레이션되어 있지 않다는 것</b> 입니다 — Curiel 의 천체측정 연구는 둘 다 측정하지 않으므로 <code>teff_measurements</code> 와 <code>luminosity_measurements</code> 배열이 비어 있고, cfg 의 Teff/광도는 분광형에서 low confidence 로 합성합니다 (아래 참조).",
  "p_2":"NearStars 에서 GJ 896 A 를 규정하는 것은 그것이 <b>젊고, 매우 활동적이며, 빠르게 자전하는 M3.5 Ve flare star</b> 라는 점입니다 — 고전적 flare-star 쌍성 EQ Peg 의 한쪽입니다. 매우 빠르게 자전하여 P_rot = 1.061 d 이고 (Curiel 2022 가 Delfosse 1999 / Morin 2008 / Davison 2015 / Pearce 2020 을 컴파일. 근원 측정은 Morin et al. 2008 의 분광편광 / ZDI 연구), 자전 경사는 ~60° 입니다. EQ Peg 의 두 성분은 오래전부터 알려진 전파-버스트 원이자 flaring X-선 방출체입니다 (Pallavicini 1985. Benz 1995. Crosley &amp; Osten 2018. Villadsen &amp; Hallinan 2019. Robrade 2004. Liefke 2008, 모두 Curiel 2022 경유). 시스템의 나이는 논쟁적입니다. Parsamyan 1995 는 ~950 Myr 를 주지만, 몇몇 운동학 연구 (Riedel 2011. Zuckerman 2013, Curiel 2022 경유) 는 ≲100 Myr 를 주장하며, 이 경우 GJ 896 AB 는 알려진 가장 가까운 전주계열 별 중 하나가 됩니다. 빠른 자전과 강한 활동도는 자전-활동 관계의 saturated 끝에서의 젊음과 일관됩니다.",
  "p_3":"<b>NearStars 시나리오 선택. 깊은 붉은빛의, 젊고, 빠르게 자전하는 (1.061 d) M3.5 Ve flare star 로, 강한 starspot 과 잦은 flare, kG 규모 자기장을 띤 — 넓은 M-왜성 쌍성의 더 밝은 &quot;첫 번째 태양&quot; 으로, 284 일 궤도의 따뜻한 Jovian 동반체를 거느린 모습으로 렌더링합니다.</b> 항성 레이어는 frozen Phase 2 출처 (Curiel 2022 질량, 반지름, 자전, 분광형) 위에 정박합니다. Phase 2 에 Teff 나 광도 측정이 없으므로, 시각 표면 색조와 색온도는 M3.5 V 분광형에서 합성하고 — ~3200–3400 K 대역의 깊은 붉은 광구로 — 정확한 Teff 에 못박는 대신 명시적으로 low-confidence 로 표시합니다. 알려진 주변 원반은 없으며 지어내지도 않습니다. 활동 행 (자전, flare, 자기장) 이 헤드라인이고, spin/시각 선택들은 medium-to-low 신뢰도에 둡니다.",

  "td_57":"<code>visual_surface_tint_hex_primary</code>",
  "td_58":"<span class=\"hex-chip\" style=\"background:#ffd088\"></span><code>#ffd088</code> (옅은 따뜻한 주황, M3.5 V)",
  "td_59":"low",
  "td_60":"실제 광구 색 (합성). ~3300 K 부근의 Pickles 1998 관측 M-왜성 SED 를 공유 CIE→sRGB 엔진 (<code>scripts/refs/stellar_photospheric_color.py</code>) 으로 적분하고 peak-channel 정규화한 값. 옅은 따뜻한 주황으로, ~3300 K 흑체가 그럴듯한 1차 근사이며 TiO/VO 밴드는 표시 색도를 약간만 이동시킵니다 (큰 효과는 가시 색조가 아니라 색지수에 나타남). M4 V 바너드 <span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code> 와 M4.5 YZ Cet <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code> 에 대비해 거의 평평하며, 모두 옅은 따뜻한 주황 계열입니다. Teff 가 미측정이라 low 로 표시. (앞서의 렌더-포화된 brick-red 짐작값 <span class=\"hex-chip\" style=\"background:#d05a2e\"></span><code>#d05a2e</code> 를 대체합니다.)",
  "td_61":"<code>stellar_color_temp_k</code>",
  "td_62":"~3300 (합성)",
  "td_63":"low",
  "td_64":"분광형 M3.5 V 에서 합성 (Phase 2 Teff 없음). 장면-조명 색온도로 사용. 정확한 값에 못박지 않음",

  "td_68":"Tie-break. 빠르게 자전하는 매우 활동적인 flare star 는 조용한 노령 왜성 (바너드, 티가든) 보다 큰 cool-spot 비율을 가짐. ~0.2 가 1.061 d 주기의 강한 자전 변조를 재현. 측정된 filling factor 는 아님",

  "td_72":"Gaia DR3 V (변환). 6.263 pc 근접에도 맨눈 가시성에 못 미침. 낮은 M-왜성 광도 때문",

  "td_79":"high",
  "td_80":"GJ 896 A 의 잔해 원반 보고가 문헌에 없음. 지어내지 않음 (search-and-verify 정책)",
  "td_81":"<code>binary_companion</code>",
  "td_82":"GJ 896 B (M4.5, 0.165 M☉)",
  "td_83":"high",
  "td_84":"Curiel et al. 2022 — 전체 결합 피팅. a = 31.635 ± 0.033 AU, P = 229.06 yr 의 넓은 역행 동반체 (Visual styling 참조. 동반체는 아직 별도 DB 바디 아님)",
  "h2_85":"Surface synthesis",
  "p_86":"GJ 896 A 는 초기-중간 M 왜성에 전형적인 깊은 붉은 광구를 가집니다. 명확히 짚을 구조적 caveat 이 있습니다. Phase 2 레이어에 <b>측정된 유효온도나 광도가 없습니다</b> — Curiel et al. 2022 의 천체측정 연구는 질량과 궤도를 측정하지만 광구 파라미터는 측정하지 않으므로, <code>teff_measurements</code> 와 <code>luminosity_measurements</code> 배열이 비어 있습니다. 따라서 cfg 에서 온도는 M3.5 V 분광형에서 합성하고, 이는 전형적으로 ~3200–3400 K 대역의 Teff 에 대응합니다 (Gaia DR3 raw 카탈로그 값 3334 K 가 일관되며, 큐레이션 측정이 아니라 맥락으로만 가지고 있습니다). 이 온도에서 SED 는 근적외선에서 정점을 이루고 광학 연속체는 TiO 와 VO 분자 밴드에 억제됩니다 — 다만 더 차가운 M4.5 YZ Cet (3100 K) 이나 M7 V 티가든 별 (2904 K) 만큼 완전하지는 않습니다. 렌더링되는 색은 그에 따라 깊은 적등색이지만, Teff 가 미측정이라 low-confidence 합성으로 명시 표시합니다.",
  "p_87":"R ≈ 0.35 R☉ (Curiel 2022, Morin 2008 / Pearce 2020 인용) 과 합성된 Teff ~3300 K 에서 Stefan-Boltzmann 광도는 대략 L ≈ 0.014 L☉ 이고, Curiel 자신의 거주가능영역 계산은 0.436 M☉ 별에 ~0.02 L☉ 를 함의하는 질량-광도 관계를 씁니다. 어느 쪽이든 GJ 896 A 는 태양 광도의 약 1/50–1/70 정도라, V = 10.29 에서 20.4 광년 근접에도 맨눈 가시성에 못 미칩니다. 이 광도 수치들은 하류에서 행성 일사량을 괄호치는 데만 쓰이며, 큐레이션된 Phase 2 값은 아닙니다.",
  "p_88":"규정하는 표면 속성은, 빠르게 자전하는 heavily-spotted 한 flaring 원반 으로 표현되는 강한 자기 활동입니다. GJ 896 A 는 잘 알려진 flare-star 쌍성 EQ Peg 의 한쪽이고, 두 성분 모두 오래전부터 확립된 전파-버스트 원이자 flaring X-선 방출체입니다 (Pallavicini 1985. Benz 1995. Robrade 2004. Liefke 2008. Crosley &amp; Osten 2018. Villadsen &amp; Hallinan 2019, 모두 Curiel 2022 경유). 극도로 빠른 1.061 일 자전 (Morin et al. 2008 ZDI 연구에 뿌리) 은 GJ 896 A 를 자전-활동 관계의 saturated 영역에 두며, 거기서 중간-M 왜성은 강한 kG 규모 대규모 자기장을 가집니다. cfg 렌더링에서는, ~1 일 자전을 따라 빠르게 떠도는 상당한 cool-spot 비율을 띤 깊은 붉은 원반에 잦은 밝은 flare 가 박힌 모습이 됩니다 — 조용한 노령 왜성 (바너드, 티가든) 보다, 또 적당히 활동적인 YZ Cet 보다도 훨씬 활기차고 젊어 보이는 표면입니다.",
  "p_89":"Phase 2 레이어에 금속도가 큐레이션되어 있지 않고 여기서 합성하지도 않습니다. 고정 Teff 에서 금속도가 렌더링 M-왜성 색에 미치는 영향은 sub-perception 이고, 프로젝트 정책은 신규 호스트에 대해 이를 스킵 합니다. 잔해 원반도 없습니다. GJ 896 A 주위 원반의 적외선 초과 검출이나 분해 영상 보고가 없으므로, 별은 원반 없이 렌더링됩니다.",
  "h2_90":"Atmosphere synthesis",
  "p_91":"주계열 별은 행성 cfg 의미의 &quot;대기&quot; 를 갖지 않습니다. 항성 합성에서 이 섹션은 색채권, 코로나, 그리고 — GJ 896 A 의 헤드라인인 — 강한 flare 및 전파-버스트 활동을 다룹니다.",
  "p_92":"GJ 896 A 의 색채권과 코로나는 활동 시퀀스의 saturated 끝에 있는 젊고 매우 활동적인 중간-M 왜성의 것입니다. Phase 2 레이어는 정량적 색채권 (log R&#x27;HK) 이나 코로나 (log L_X) 지표를 갖지 않습니다 — Curiel 2022 의 천체측정 연구가 그것들을 측정하지 않으므로 — 따라서 여기서는 Curiel 이 컴파일한 EQ Peg 문헌에서 활동을 정성적으로 특성화합니다. EQ Peg 두 성분 모두 flaring X-선 방출체이고 (Robrade 2004. Liefke 2008) 반복적인 전파-버스트 원입니다 (Pallavicini 1985. Benz 1995. Crosley &amp; Osten 2018. Villadsen &amp; Hallinan 2019). 극도로 빠른 1.061 일 자전은 매우 작은 Rossby number 를, 따라서 saturated 다이너모를 함의하며, 이는 중간-M 왜성이 최대 분율 X-선 및 색채권 출력에 도달하고 가장 강한 대규모 자기장을 가지는 영역입니다. Morin et al. 2008 의 EQ Peg A ZDI 연구 (자전 주기의 출처) 가 바로 이런 강하고 정연한 kG 자기장을 지도화합니다.",
  "p_93":"핵심 특징은 flaring 입니다. GJ 896 A 는 교과서적 UV-Cet 부류 flare star 입니다. 잦은 광학 flare 를 내고 여러 VLBA epoch 에서 compact 한 가변 전파 방출로 검출되었습니다 (Bower 2009, 2011, Curiel 2022 경유) — 전파 가변성 자체가 활동적 코로나와 반복 flaring 의 시그니처입니다. cfg 목적상 코로나 / 색채권 레이어는 &quot;잦은 flare 를 동반한 매우 활동적&quot; 으로, 정적-with-드문-flare 노령 왜성 (바너드, 티가든) 과도, 적당히 활동적인 YZ Cet 보다도 더 활동적입니다. 빠른 자전은 또한 spotted 원반과 flare 관련 밝아짐이 느린 자전체의 수개월 주기가 아니라 대략 하루 cadence 로 변조됨을 의미합니다.",
  "h2_94":"Rotation &amp; spin synthesis",
  "p_95":"GJ 896 A 는 매우 빠르게 자전하며, P_rot = 1.061 d (Curiel 2022 가 Delfosse 1999 / Morin 2008 / Davison 2015 / Pearce 2020 을 컴파일. 근원 측정은 Morin et al. 2008 의 EQ Peg A 분광편광 / ZDI 연구) 입니다. 이는 NearStars M-왜성 세트에서 가장 빠른 자전체 중 하나입니다 — 적당히 활동적인 YZ Cet (68.4 d) 보다 약 65배, 노령 조용한 티가든 별 (96 d) 보다 ~90배 빠릅니다. 이런 빠른 자전은 젊음의 지문입니다. 별이 아직 자기 제동으로 spin-down 하지 않은 것으로, Riedel 2011 과 Zuckerman 2013 이 주장하는 ≲100 Myr 전주계열 나이와 일관됩니다 (Curiel 2022 는 더 오래된 ~950 Myr Parsamyan 1995 추정도 언급하므로 나이 자체가 불확실하며 Phase 2 큐레이션이 아닙니다). 빠른 spin 이 강한 활동 뒤의 saturated 다이너모를 구동합니다.",
  "p_96":"<b>KSP 구현 노트.</b> 항성 자전 주기 = 1.061 d = 91 670 s. Kopernicus 에서 항성 바디의 <code>rotationPeriod</code> 는 초 단위로 설정합니다. ~1 일에서는 자전이 충분히 빨라 spotted 원반의 자전 변조가 대략 하루 cadence 로 보이며, 카탈로그의 사실상 정지한 느린 자전체와 다릅니다.",
  "p_97":"자전 경사는 ~60° 입니다 (Curiel 2022, 같은 ZDI 문헌 컴파일에서). NearStars 시각 렌더링에는 이를 spin-축 배향으로 취해, pole-on 이나 완전 equator-on 이 아닌 중간-기울기로 spotted 원반을 보여줍니다. 어느 반구의 starspot 과 flare footpoint 가 가장 잘 보이는지에 정보를 주지만 그 외에는 cfg 결정 사항이 아닙니다. 사용 가능한 별진동 제약은 없습니다 (별이 검출 가능한 p-mode 진동에 너무 차갑고 너무 작음).",
  "h2_98":"Visual styling",
  "p_99":"NearStars 렌더러에서 GJ 896 A 는 옅은 따뜻한 주황빛의, 젊고, 빠르게 자전하는 M3.5 Ve flare star — 넓은 M-왜성 쌍성의 더 밝은 &quot;첫 번째 태양&quot; 으로 그려집니다.",
  "li_100":"<b>전체 외형.</b> <span class=\"hex-chip\" style=\"background:#ffd088\"></span><code>#ffd088</code> 으로 인코딩한 옅은 따뜻한 주황 원반. ~3300 K 흑체에 가까운 실제 적분-SED 색이며, TiO/VO 밴드는 표시 색도를 약간만 이동시킵니다. M-계열 색도는 거의 평평해서, 이 값은 M4 V 바너드 (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>) 와 M4.5 YZ Cet (<span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>) 와 사실상 나란히 자리하며, 모두 옅은 따뜻한 주황 계열입니다. Teff 가 미측정이라 이 색조는 정확한 값에 못박은 게 아니라 M3.5 V 분광형에서의 low-confidence 합성입니다. 행성의 장면-조명 색온도는 합성된 ~3300 K SED 가 구동합니다.",
  "li_101":"<b>Heavily spotted 표면.</b> 1.061 일 자전을 따라 빠르게 떠도는 상당한 cool-spot 비율 (<code>visual_spot_coverage_max ≈ 0.2</code>) — 젊고 saturated- 다이너모 flare star 에 어울리는 강한 자전 밝기 변조로, 노령 조용한 왜성의 거의 균일한 원반보다 훨씬 활동적입니다.",
  "li_102":"<b>잦은 flare.</b> 밝은 광학 flare (UV-Cet 폭발 변광성, EQ Peg 시그니처) 를 대략 하루 cadence 로 반복되는 transient 밝아짐으로 렌더링 — 끊임없이 분출하는 원시성을 빼면 카탈로그 M 왜성 중 가장 활기찬 항성 표면입니다.",
  "li_103":"<b>두 번째 붉은 태양 (쌍성 동반체).</b> GJ 896 A 는 시스템을 GJ 896 B 와 공유합니다. M4.5 왜성 (0.16527 M☉, R ≈ 0.25 R☉, P_rot 0.404 d) 으로 넓은 a = 31.635 AU, 229 년 <b>역행</b> 궤도에 있습니다 (쌍성면과 행성면의 mutual inclination Φ = 148°. Curiel 2022). GJ 896 A 의 행성 b 에서 GJ 896 B 는 두 번째 깊은 붉은 태양입니다 — 하늘에서 주성보다 훨씬 작지만 뚜렷한 밝은 점이고, 그 자체로 활동적 flare star 입니다. (GJ 896 B 는 아직 별도 DB 바디가 아님. follow-up 으로 표시.)",
  "li_104":"<b>행성 b 의 하늘에서의 별.</b> 행성 b 의 장반경 a = 0.64 AU 에서 GJ 896 A 는 ~0.29° 를 차지합니다 — 지구에서 본 태양 각크기의 절반 남짓. 근일점 (0.42 AU) 에서는 ~0.44° 로 커져 태양의 겉보기 크기에 가까워지고, 깊은 붉은 원반이 지구 일사량 수 % 의 적외선이 풍부한 빛으로 이 따뜻한 Jovian 을 적십니다.",
  "li_105":"<b>지구에서.</b> GJ 896 A 는 V = 10.29 의 망원경 천체로, 20.4 광년 근접에도 낮은 M-왜성 광도 때문에 맨눈에 못 미칩니다.",
  "h2_106":"Bibliography",
  "h3_107":"Read (drove Decisions above)",
  "li_108":"<b>Curiel S. et al. 2022</b> — <i>3D orbital architecture of a dwarf binary system and its planetary companion</i>, AJ 164, 93 (<code>2022AJ....164...93C</code>, doi:10.3847/1538-3881/ac7c66, <a href=\"https://arxiv.org/abs/2208.14553\">arXiv:2208.14553</a>). Jovian 동반체 GJ 896 A b 의 VLBA + 광학/적외선 천체측정 발견. 항성 질량 (0.43599 ± 0.00092 M☉, 전체 결합 쌍성-궤도 피팅), 인용 반지름 (~0.35 R☉, Morin 2008 / Pearce 2020 에서), 자전 주기 (1.061 d) 와 자전 경사 (~60°), 분광형 (M3.5 Ve), 쌍성 동반체 파라미터 (GJ 896 B, 0.16527 M☉, a = 31.635 AU, P = 229.06 yr, 역행, Φ = 148°), flare-star / 전파-버스트 활동 맥락 (Pallavicini 1985, Benz 1995, Robrade 2004, Liefke 2008, Bower 2009/2011, Crosley &amp; Osten 2018, Villadsen &amp; Hallinan 2019 컴파일) 의 Phase 2 recommended 출처. 행성 합성에 쓴 거주가능영역 (0.18–0.26 AU) 과 snow-line (~0.51 AU) 추정치의 출처이기도 함.",
  "h3_109":"Read (context / methodology, not decision-driving)",
  "li_110":"<b>Morin J. et al. 2008</b> — EQ Peg A 를 포함한 중간-M 왜성의 분광편광 / Zeeman-Doppler-Imaging 연구. 1.061 d 자전 주기와 kG 규모 대규모 자기장 그림의 근원 출처 (Curiel 2022 경유). 자전과 자기장 Decisions 행이 여기서 옴.",
  "li_111":"<b>Pearce L.A. et al. 2020</b> &amp; <b>Davison C.L. et al. 2015</b> &amp; <b>Delfosse X. et al. 1999</b> — Curiel 2022 가 ~0.35 R☉ 반지름과 자전/경사를 끌어온 이전-문헌 컴파일. 반지름과 spin 행의 맥락.",
  "h3_112":"Read (instrument-only, not visual-informative)",

  "h2_116":"Open items for follow-up",
  "li_117":"<b>GJ 896 B 를 별도 DB 바디로.</b> M4.5 동반체 (0.16527 M☉, R ≈ 0.25 R☉, P_rot 0.404 d, a = 31.635 AU, P = 229.06 yr, 역행) 는 두 번째 활동적 flare star 이자 행성 하늘의 &quot;두 번째 태양&quot; 입니다. follow-up 에서 GJ 896 B 를 DB 에 추가하고 자체 항성 Phase 3 합성을, 또 넓은 역행 쌍의 binary_orbit cfg 를 만들어야 합니다.",
  "li_118":"<b>Teff / 광도 측정.</b> Phase 2 Teff 나 광도가 큐레이션되어 있지 않아 cfg 가 M3.5 V 분광형에서 low confidence 로 합성합니다. 미래에 측정된 Teff (예: EQ Peg A 의 CARMENES / SED 연구) 가 큐레이션되면 합성된 ~3300 K 를 교체하고 표면-색조 hex 를 low 에서 high 신뢰도로 끌어올려야 합니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
