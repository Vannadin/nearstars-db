  abstract: M dwarfs, the most common type of star in the Solar neighborhood, exhibit higher Doppler radial velocities when
    orbited by a terrestrial mass planet than F, G, K dwarfs since they have lower mass. Unfortunately, late M dwarfs have
    low optical luminosities, emitting most of their flux in the near-infrared (NIR). The ExoPlanet Task Force has recommended
    that NIR RV instruments be made a high priority. We have been developing such an instrument at Penn State and preliminary
    results for our "pathfinder" instrument have been published in PASP (120:870, 2008, p. 887). These studies have been extended
    with a significant upgrade which includes better optimized gratings and a substantially improved calibration system. We
    present recent results from Y- and J-band observations in the near-Infrared using the Earth's rotational velocity with
    respect to the Sun as a test signal and a Hawaii-1K array. We use these results, along with a high resolution spectrum
    of Barnard's Star (M4) at red limit of the CCD to estimate the achievable precision when we move the pathfinder to the
    Hobby-Eberly telescope in the Spring of 2010.
