  arxiv_id: null
  ads_bibcode: 2000AcAau..47..885M
  title: The gravitational lenses of alpha centauri a, b, c and of barnard's star
  authors:
  - Maccone, C.
  year: '2000'
  pubdate: '2000-12-00'
  doi: 10.1016/S0094-5765(00)00138-7
  abstract: 'The gravitational lenses of the three nearest stars, Alpha Centauri A, B and C (Proxima Centauri), are studied
    in this paper. For each star, the minimal focal distance is found, and turns out to equal 679.263, 563.485 and 112.138
    AU, respectively, plus or minus the (large) uncertainties deriving from the uncertainties in the estimates of the star
    masses and radii. A comparison of these three minimal focal distances against the corresponding value for the Sun (550
    AU, or, more correctly, 548.230 AU) is then made, but it is clearly pointed out that all these minimal focal distances
    are just the theoretical values given by Einstein''s deflection formula for the corresponding "naked star", i.e. the star
    as if it had no corona around! The study of the true focal distances that follow from taking the corona into account is
    much more difficult and uncertain, and has to be delayed to further research. For the naked stars, we study the deflection
    of radio waves for five different frequencies: the hydrogen line at 1.420 GHz, the water maser at 22 GHz, NASA''s Interstellar
    Probe (ISP) telecommunication frequency at 32 GHz (K <SUB>a</SUB> band), the Cosmic Microwave Background peak frequency
    at 160.378 GHz and finally the positronium frequency at 203.385 GHz. For each frequency the antenna patterns of the three
    naked stars gravitational lenses are given. Finally, all the above data are derived also for the fourth star in increasing
    distance from the Sun, Barnard''s star.'
