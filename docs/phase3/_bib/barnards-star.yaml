- &id054
  arxiv_id: null
  ads_bibcode: 2018csss.confE..83I
  title: High-Resolution Near-Infrared Spectroscopy of Barnard's Star with IRD/Subaru Telescope
  authors:
  - Ishikawa, Hiroyuki Tako
  - Aoki, Wako
  - Kotani, Takayuki
  - Omiya, Masashi
  - Kuzuhara, Masayuki
  - Usuda, Tomonori
  - Hayashi, Saeko
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.5281/zenodo.1489315
  abstract: Recent studies have been detecting many planets around M dwarfs. Determining the detailed chemical compositions
    of M dwarfs is crucial for revealing the formation processes of the planetary systems and constraining the internal structures
    of the terrestrial planets around them. However, their intrinsic faintness and dominant molecular absorption hinder the
    well-established measurements of accurate chemical composition with high-resolution optical spectra.<BR /> <P />The problems
    are mitigated in near-infrared wavelength. The high-resolution near-infrared spectroscopy is now promising because of
    the increasing development of new spectrometers enabling it. IRD is such a new instrument for the Subaru Telescope constructed
    for a planet search around nearby M dwarfs. IRD is the first instrument for 8m-class telescopes to cover the Y, J, and
    H bands simultaneously with a maximum spectral resolution of 70,000. The large diameter and broadband coverage have made
    it possible to observe more atomic lines than ever before in near-IR spectra of faint M dwarfs. We verified that the quality
    of IRD spectra is comparable to the existing ones such as CRIRES spectra in terms of wavelength assignment and resolution.
    We report the interpretation of IRD spectra of Barnard’s Star. We identified the absorption lines throughout the Y, J,
    and H bands. We detected more than 100 FeH lines, which are dominant in Y band, and examined their behavior. We also determined
    the elemental abundances for Fe, Ti, Cr, Na, Mg, Al, Si, K, Ca, V, and Mn, based on the equivalent width of the corresponding
    atomic lines. The result, where the metallicity is lower than the Sun and the abundances of alpha elements (Mg, Al, Si,
    Ti) are higher than that of Fe, is consistent with the prediction from kinematics and rotation period that the Barnard’s
    Star is an old star belonging to the thick disk in our galaxy. Besides, we observed LHS 1140 with a similar temperature
    to the Barnard’s Star and found that it is metal-richer and alpha-poorer than Barnard’s Star.
