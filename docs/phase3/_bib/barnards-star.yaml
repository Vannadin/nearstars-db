  arxiv_id: '1811.05920'
  ads_bibcode: 2019A&A...623A..10T
  title: Prospects for detecting the astrometric signature of Barnard's Star b
  authors:
  - Tal-Or, L.
  - Zucker, S.
  - Ribas, I.
  - Anglada-Escudé, G.
  - Reiners, A.
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.1051/0004-6361/201834643
  abstract: A low-amplitude periodic signal in the radial velocity (RV) time series of Barnard's Star was recently attributed
    to a planetary companion with a minimum mass of 3.2 M<SUB>⊕</SUB> at an orbital period of 233 days. The relatively long
    orbital period and the proximity of Barnard's Star to the Sun raises the question whether the true mass of the planet
    can be constrained by accurate astrometric measurements. By combining the assumption of an isotropic probability distribution
    of the orbital orientation with the RV-analysis results, we calculated the probability density function of the astrometric
    signature of the planet. In addition, we reviewed the astrometric capabilities and limitations of current and upcoming
    astrometric instruments. We conclude that Gaia and the Hubble Space Telescope (HST) are currently the best-suited instruments
    to perform the astrometric follow-up observations. Taking the optimistic estimate of their single-epoch accuracy to be
    30μas, we find a probability of 10% to detect the astrometric signature of Barnard's Star b with 50 individual-epoch observations.
    In case of no detection, the implied mass upper limit would be 8 M<SUB>⊕</SUB>, which would place the planet in the super-Earth
    mass range. In the next decade, observations with the Wide-Field Infrared Space Telescope (WFIRST) may increase the prospects
    of measuring the true mass of the planet to 99%.
