  ads_bibcode: 2021MNRAS.504.5788R
  title: Characterization of 92 southern TESS candidate planet hosts and a new photometric [Fe/H] relation for cool dwarfs
  authors:
  - Rains, Adam D.
  - Žerjal, Maruša
  - Ireland, Michael J.
  - Nordlander, Thomas
  - Bessell, Michael S.
  - Casagrande, Luca
  - Onken, Christopher A.
  - Joyce, Meridith
  - Kammerer, Jens
