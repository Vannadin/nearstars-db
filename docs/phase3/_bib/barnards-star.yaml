  arxiv_id: '1201.2189'
  ads_bibcode: 2012ApJ...747..144M
  title: 'Characterizing the Cool KOIs. III. KOI 961: A Small Star with Large Proper Motion and Three Small Planets'
  authors:
  - Muirhead, Philip S.
  - Johnson, John Asher
  - Apps, Kevin
  - Carter, Joshua A.
  - Morton, Timothy D.
  - Fabrycky, Daniel C.
  - Pineda, John Sebastian
  - Bottom, Michael
  - Rojas-Ayala, Bárbara
  - Schlawin, Everett
  - Hamren, Katherine
