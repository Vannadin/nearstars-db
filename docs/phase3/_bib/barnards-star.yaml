- &id055
  arxiv_id: null
  ads_bibcode: 2013AcAau..82..246M
  title: Galactic Internet made possible by star gravitational lensing
  authors:
  - Maccone, Claudio
  year: '2013'
  pubdate: '2013-02-00'
  doi: 10.1016/j.actaastro.2012.07.015
  abstract: 'In this paper we study how to create a radio bridge between the Sun and any other star made up by both the gravitational
    lenses of the Sun and that star. The alignment for this radio bridge to work is very strict, but the power-saving is enormous,
    due to the huge contributions of the two stars'' lenses to the overall antenna gain of the system. In particular, we study
    in detail: <P />The Sun-Alpha Centauri A radio bridge. <P />The Sun-Barnard''s star radio bridge. <P />The Sun-Sirius
    A radio bridge. <P />The radio bridge between the Sun and any Sun-like star located in the Galactic Bulge. <P />The radio
    bridge between the Sun and a similar Sun-like star located inside the Andromeda galaxy (M31). <P />Finally, we find the
    information channel capacity for each of the above radio bridges, putting thus a physical constraint to the maximum information
    transfer that will be enabled even by exploiting the stars as gravitational lenses. The conclusion is that a Galactic
    Internet is indeed physically possible. May be the Galactic Internet already is in existence, and was created long ago
    by civilizations more advanced than ours. But the potential for creating such a system has only recently been realized
    by Humans.'
