  ads_bibcode: 2011AcAau..68...76M
  title: Interstellar radio links enhanced by exploiting the Sun as a Gravitational Lens
  authors:
  - Maccone, Claudio
  year: '2011'
  pubdate: '2011-01-00'
  doi: 10.1016/j.actaastro.2010.06.039
  abstract: 'The gravitational lens of the Sun is an astrophysical phenomenon predicted by Einstein''s general theory of relativity.
    It implies that if we can send a probe along any radial direction away from the Sun up to the minimal distance of 550
    AU and beyond, the Sun''s mass will act as a huge magnifying lens, letting us "see" detailed radio maps of whatever may
    lie on the other side of the Sun even at very large distances. The recent book by this author (Claudio Maccone, Deep Space
    Flight and Communications, 414 pages, Praxis-Springer, 2009) describes such future FOCAL space missions to 550 AU and
    beyond. In this paper, however, we want to study another possibility yet: how to enable the future interstellar radio
    links between the solar system and any future interstellar probe by utilizing the gravitational lens of the Sun as a huge
    antenna. In particular, we compare the bit error rate (BER) across interstellar distances with and without using the gravitational
    lens effect of the Sun. The conclusion is that only when we will exploit the Sun as a gravitational lens we will be able
    to communicate with our own probes (or with nearby Aliens) across the distances of even the nearest stars to us in the
    Galaxy and that at a reasonable bit error rate. Furthermore, we study the radio bridge between the Sun and any other Star
    that is made up by the two gravitational lenses of both the Sun and that Star. The alignment for this radio bridge to
    work is very strict, but the power saving is enormous, due to the huge contributions of the two stars'' lenses to the
    overall antenna gain of the system. For instance, we study in detail: The Sun-Alpha Cen A radio bridge. <P />The Sun-Barnard''s
    star radio bridge. <P />The Sun-Sirius A radio bridge. <P />The radio bridge between the Sun and any Sun-like star located
    in the galactic bulge. <P />The radio bridge between the Sun and any Sun-like star located inside the Andromeda galaxy
    (M 31). <P />The conclusion is that a radio interstellar communications network can indeed be built if the gravitational
    lenses of all stars involved are exploited. Then, the new question arises: has any advanced civilization already built
    such a radio telecommunication network? If so, our current and future SETI searches should be tuned-up to match with this
    newly realized possibility.'
