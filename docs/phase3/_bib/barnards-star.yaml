    Hz. The mission was to Barnard''s star 5.9 light years away in a duration of around 50 years. This paper is related to
    the successor Project Icarus, a theoretical engineering design study that began on 30 September 2009 and is a joint initiative
    between the Tau Zero Foundation and The British Interplanetary Society. In the first part of this paper, we explore ''flyby''
    variations on the Daedalus propellant utilisation for two different mission targets: Barnard''s star and Epsilon Eridani,
    10.7 light years away. With a fixed propellant mass a number of staged configurations (1-4) are derived for an optimal
    configuration but then moving to an off-optimal configuration due to the requirement for a high final science payload
    mass. Some comments are then made on the ICF pellet configuration compared to the typical pellets fielded at the National
    Ignition Facility (NIF) and those proposed for the Vista and Longshot fusion based propulsion designs. This is a working
    progress report, which aims to study perturbations of the Daedalus baseline design as part of a trade study. This is a
