  ads_bibcode: 2019AAS...23330401B
  title: 'The Oxyometer: A Novel Instrument Concept for Characterizing Exoplanet Atmospheres'
  authors:
  - Baker, Ashley
  - Blake, Cullen
  - Halverson, Sam
  year: '2019'
  pubdate: '2019-01-00'
  doi: null
  abstract: With TESS and ground-based surveys searching for rocky exoplanets around cooler, nearby stars, the number of terrestrial
    exoplanets that are well-suited for atmospheric follow-up studies will increase significantly. For atmospheric characterization,
    JWST will only be able to target a small fraction of the most interesting systems, and the usefulness of ground-based
    observatories will remain limited by a range of effects related to Earth's atmosphere. Here, we explore a new method for
    ground-based exoplanet atmospheric characterization that relies on simultaneous, differential, ultra-narrow-band photometry.
    The instrument uses a narrow-band interference filter and an optical design that enables simultaneous observing over two
    0.3 nm wide bands spaced 1 nm apart. We consider the capabilities of this instrument in the case where one band is centered
    on an oxygen-free continuum region while the other one band overlaps the 760 nm oxygen band head in the transmission spectrum
    of the exoplanet, which can be accessible from Earth in systems with large negative line-of-sight velocities. Given the
    expected planet yield from TESS, we estimate that multiple systems discovered by the next generation of exoplanet surveys
    will be amenable to ground-based characterization by an instrument of this type, which we call an oxyometer. We show that
    observations of an Earth-like planet orbiting a star similar to Barnard's star using an oxyometer on a 15-m telescope
    can achieve a signal-to-noise ratio of three by combining data from 20 transits and also present estimates of the observing
    time required for an oxyometer on an ELT-sized telescope to detect oxygen for M dwarfs at a range of distances. We describe
    the design of our oxyometer and present a detection of a 50 ppm simulated transit signal in the lab, in addition to on-sky
    photometry tests that demonstrate the ease of use of the compact instrument design. This technique is simple, versatile,
    and could be adapted to enable the study of a wide range of atmospheric species.
