- arxiv_id: null
  ads_bibcode: 1995Ap&SS.223..161I
  title: 'Barnard''s star: twenty years of McCormick observations.'
  authors:
  - Ianna, P. A.
  year: '1995'
  pubdate: '1995-01-00'
  doi: null
  abstract: The Barnard's star planetary saga began in 1963 with the first in a series of Sproul Observatory studies by Peter
    van de Kamp suggesting the presence of a small amplitude astrometric perturbation. Investigations at observatories other
    than Sproul, however, failed to confirm the existence of a perturbation in the Barnard's star path. The results from 24
    years of observations of Barnard's star with the Leander McCormick refractor are presented here. Photographic plates obtained
    between 1969 and 1993 have been scanned on our PDS 1010GM; 499 images on 143 plates are included in this analysis. The
    McCormick data do not fit the Sproul perturbation very well, but do not absolutely exclude it at this stage. A simple
    periodogram analysis shows neither 12 or 20 year periods nor other periods of significance in the two coordinates. Further
    astrometric observations over the next decade are recommended during which the two planet displacement curves reach maximum
    again. This work has been supported in part by the NSF through several grants, the most recent being AST-9016686, and
    by the Estate of Leander J. McCormick.
