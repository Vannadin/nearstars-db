  abstract: Recently, the discovery of a brown dwarf binary only 2 parsecs from the sun was announced, making it our 3rd closest
    neighbor after Alpha-Centauri and Barnard's star (Luhman et al. 2013). Incredibly, large-amplitude variability (11% in
    an i+z filter) was announced for the secondary ~T0 component shortly after (Gillon et al. 2013), indicative of patchy
    clouds. Here we propose to obtain time series observations of this benchmark system with Spitzer to probe cloud structure
    in its upper atmosphere. As the only brown dwarf system whose mass can be independently constrained from an orbital measurement,
    and whose 3D clouds structure can be probed from time-domain studies, the Luhman 16 system provides singular opportunity
    to investigate the sensitive dependence of cloud structure at the L/T transition on effective temperature and surface
    gravity.
