  abstract: We present optical spectra of a flare on Barnard's star. Several photospheric and chromospheric species were enhanced
    by the flare heating. An analysis of the Balmer lines shows that their shapes are best explained by Stark broadening rather
    than chromospheric mass motions. We estimate the temperature of the flaring region in the lower atmosphere to be &gt;=8000
    K and the electron density to be ~10<SUP>14</SUP> cm<SUP>-3</SUP>, similar to values observed in other dM flares. Because
    Barnard's star is considered to be one of our oldest neighbors, a flare of this magnitude is probably quite rare.
