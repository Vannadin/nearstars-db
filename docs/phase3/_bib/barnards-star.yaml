  ads_bibcode: 2012ApJ...757..112B
  title: Stellar Diameters and Temperatures. II. Main-sequence K- and M-stars
  authors:
  - Boyajian, Tabetha S.
  - von Braun, Kaspar
  - van Belle, Gerard
  - McAlister, Harold A.
  - ten Brummelaar, Theo A.
  - Kane, Stephen R.
  - Muirhead, Philip S.
  - Jones, Jeremy
  - White, Russel
  - Schaefer, Gail
  - Ciardi, David
