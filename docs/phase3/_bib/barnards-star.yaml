- arxiv_id: null
  ads_bibcode: 2019hst..prop15884B
  title: Confirmation of an Astrometrically Detected Exoplanet Candidate Orbiting the closest Brown Dwarfs
  authors:
  - Bedin, Luigi R.
  - Apai, Daniel
  - Burgasser, Adam J.
  - Libralato, Mattia
  year: '2019'
  pubdate: '2019-06-00'
  doi: null
  abstract: 'At a distance of slightly less than 2 pc WISE 1049-5319 (or Luhman 16 AB) is the closest system to Earth after
    those of alpha Centauri and Barnard''s Star. <P />The analysis of astrometric measurements collected in 12 HST epochs
    (between 2014.64 and 2016.76) revealed a weak astrometric signature indicating the presence of an exoplanet in the Luh16AB
    system. This candidate was reported in 2017. A single additional epoch --collected in August 2018-- and re-analysis of
    the data with more advanced methods increased the significance level of the planet candidate. <P />Here we propose to
    use HST in the same observing mode to collect data at two new epochs to confirm or disprove the astrometric signature
    that suggest the presence of a sub-Neptune-mass exoplanet orbiting one component of the closest known brown dwarf system.
    If confirmed, it would be the first astrometrically detected exoplanet around a brown dwarf and the third closest known
    exoplanet; a major discovery which only requires a relatively modest investment of two additional HST orbits. <P />The
    proposed epochs will extend the temporal coverage of the astrometric monitoring to two planet orbital periods (based on
    the current orbit fits). Coverage over two periods is required to: (a) confirm that our model of the planetary system
    is predictive, and (b) verify and refine uncertainty estimates. Furthermore, should the orbit be non-circular, these additional
    measurements will determine this and significantly improve the orbital semi-major axis measurement.'
