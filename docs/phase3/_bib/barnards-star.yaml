  year: '2009'
  pubdate: '2009-06-00'
  doi: null
  abstract: We present results from our search programme for extrasolar planets around M dwarfs carried out with UVES between
    2000 and 2007 and enjoying ESO Large Programme status from April 2004 to March 2006. In our sample of 41 stars we have
    found one “brown dwarf desert” companion candidate, but no planetary mass companions. We have determined upper limits
    to the mass of possible companions, which, in the habitable zones of our better observed stars, reach the regime of a
    few Earth masses. Significant periodic variability observed in Barnard's star is attributed to stellar activity.
