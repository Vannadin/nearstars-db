  ads_bibcode: 2019ESS.....431103Q
  title: 'Terrestrial Planets from CARMENES: Extremely Close, Extremely Interesting'
  authors:
  - Quirrenbach, Andreas
  year: '2019'
  pubdate: '2019-08-00'
  doi: null
  abstract: The CARMENES consortium is conducting a survey of more than 300 nearby M dwarfs (average distance only 13pc),
    with the goal of finding terrestrial planets in their habitable zones. To make this survey possible, we have built a pair
    of spectrographs optimized for measuring precise radial velocities of cool stars; together they cover 520 to 1710 nm with
    resolution &gt; 80,000. The instrument has been operational since January 2016 at the 3.5m telescope on Calar Alto, Spain.
    So far more than 13,000 spectra have been taken, covering all spectral subtypes from M0V to M7V. 22 new planets have been
    discovered by CARMENES, almost all of them with masses in the Super-Earth and Earth-like range. In addition, a number
    of previously known planets could be confirmed. Among the CARMENES discoveries are a cold Super-Earth orbiting Barnard's
    star, and two planets with 1.05 and 1.1 Earth masses in the habitable zone of their host star. At the other end of the
    mass range, Jovian planets challenge planet formation models based on the pebble accretion paradigm. Because of their
    proximity, the CARMENES planets offer unique follow-up opportunities with space missions and extremely large ground-based
    telescopes. Some CARMENES planets are easily detectable astrometrically by Gaia, and Gaia should also reveal the outer
    planets in those systems where CARMENES detects the inner ones. If "scaled-down" twins of the Solar System (with an M
    dwarf host, one or two habitable-zone Earths, and icy or gaseous planets at a few AU) are common, they should be found
    in the combined CARMENES and Gaia data. Among the CARMENES planets are also some of the best targets for follow-up spectroscopy,
    which can characterize their atmospheres. Since the stars in our survey are typically only a few pc away, their habitable
    zones can be resolved with adaptive optics on 30m class telescopes, making them accessible to high-resolution spectrographs
    coupled to coronographs. In addition, a subproject of the CARMENES survey that is performing follow-up observations of
    TESS planets has already discovered the transiting Earth-like planet best suited for characterization with JWST.
