  abstract: Only a few decades have been necessary to change our picture of a lonely Universe. Nowadays, red stars have become
    one of the most exciting hosts of exoplanets (e.g. Proxima Cen te{anglada2016a}, Trappist-1 te{gillon2017}, Barnard's
    star te{ribas2018}). However, the most popular techniques used to detect exoplanets, i.e. the radial velocities and transit
    methods, are indirect. As a consequence, the exoplanet parameters obtained are always relative to the stellar parameters.
    The study of stellar pulsations has demonstrated to be able to give some of the stellar parameters at an unprecedented
    level of accuracy, thus accordingly decreasing the uncertainties of the mass and radii parameters estimated for their
    exoplanets. Theoretical studies predict that M dwarfs can pulsate, i.e. they can drive and maintain stellar oscillations,
    however, no observational confirmation has been reported yet. The Beating Red Dots project uses the HARPS and HARPS-N
    high-resolution spectrographs with the aim of detecting pulsations in M dwarfs for the first time. Here, we summarise
    the project details as well as presenting the first results and future prospects.
