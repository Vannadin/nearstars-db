- &id053
  arxiv_id: null
  ads_bibcode: 2020pgso.confE...9F
  title: Study of Barnard's Star B as an Analog for Titan-like Exoplanets
  authors:
  - Felton, Ryan
  - Domagal-Goldman, Shawn
  - Arney, Giada
  - Gao, Peter
  - Lora, Juan
  - Villaneuva, Geronimo
  - Hebrard, Eric
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.5281/zenodo.4435579
  abstract: 'Radial velocity measurements of Barnard''s Star have shown the potential for there to be a planet - Barnard''s
    Star b - with a minimum mass of 3.2 Me, orbiting with a semimajor axis near the snow-line of the system. The size and
    orbital properties of Barnard b are somewhat Titan-like in nature: Barnard b is a potentially rocky planet with a thick
    atmosphere above it, orbiting at a distance at which methane could condense. Further, Barnard''s Star is 1.8 parsecs from
    the Sun, which is close enough to allow direct-imaging of this world with a large space-based telescope such as LUVOIR-A.
    We present simulations of the observational features of Titan, as an exoplanet, using the known properties of Barnard
    b and the performance of LUVOIR''s coronagraph (ECLIPS). These simulations were done using the Planetary Spectrum Generator
    (PSG) to produce synthetic reflectance spectrum of a Titan-like Barnard''s Star b. First, we discuss our efforts to validate
    PSG against Titan observations for transit and reflection spectroscopy. We discuss validation issues encountered and how
    they were mitigated and present simulations for Barnard''s Star b, pointing out the observable features of that planet.'
