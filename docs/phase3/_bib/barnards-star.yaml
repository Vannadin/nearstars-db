  year: '2012'
  pubdate: '2012-03-00'
  doi: 10.1088/0004-637X/747/2/144
  abstract: We characterize the star KOI 961, an M dwarf with transit signals indicative of three short-period exoplanets
    discovered by the Kepler mission. We proceed by comparing KOI 961 to Barnard's Star, a nearby, well-characterized mid-M
    dwarf. We compare colors, optical and near-infrared spectra, and find remarkable agreement between the two, implying similar
    effective temperatures and metallicities. Both are metal-poor compared to the Solar neighborhood, have low projected rotational
    velocity, high absolute radial velocity, large proper motion, and no quiescent Hα emission—all of which are consistent
    with being old M dwarfs. We combine empirical measurements of Barnard's Star and expectations from evolutionary isochrones
    to estimate KOI 961's mass (0.13 ± 0.05 M <SUB>☉</SUB>), radius (0.17 ± 0.04 R <SUB>☉</SUB>), and luminosity (2.40 × 10<SUP>-3.0
    ± 0.3</SUP> L <SUB>☉</SUB>). We calculate KOI 961's distance (38.7 ± 6.3 pc) and space motions, which, like Barnard's
    Star, are consistent with a high scale-height population in the Milky Way. We perform an independent multi-transit fit
    to the public Kepler light curve and significantly revise the transit parameters for the three planets. We calculate the
    false-positive probability for each planet candidate, and find a less than 1% chance that any one of the transiting signals
    is due to a background or hierarchical eclipsing binary, validating the planetary nature of the transits. The best-fitting
    radii for all three planets are less than 1 R <SUB>⊕</SUB>, with KOI 961.03 being Mars-sized (R<SUB>P</SUB> = 0.57 ± 0.18
    R <SUB>⊕</SUB>), and they represent some of the smallest exoplanets detected to date.
