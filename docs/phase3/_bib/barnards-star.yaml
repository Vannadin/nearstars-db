  title: Measuring Sub-Kelvin Variations in Stellar Temperature
  authors:
  - Artigau, Etienne
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.5281/zenodo.13310369
  abstract: This presentation introduces a novel method to measure stellar activity through precise differential temperature
    measurement. The method is inspired by precision radial velocity algorithms, used in the temperature space; they lead
    to a sub-Kelvin accuracy, using the correlated changes in fractional depth of all spectroscopic features in a given spectrum.
    The technique is based on a library of spectra with known temperatures, enabling the derivation of temperature changes
    and uncertainties for each spectral line and a combined differential temperature accuracy that is unprecedented and opens
    a new tool for stellar physics. We demonstrate the power of this technique by retrieving rotation periods of inactive
    stars (e.g., Barnard star), in retrieving the starspot evolution in moderately active stars (e.g., Proxima, Epsilon Eridani)
    as well as very young objects (e.g., AU Mic). We also showcase the detection of an equivalent to the detection of the
    Rossiter effect in temperature space, where a transiting planet changes the disk-averaged temperature of the host star,
    providing a unique constraint on the geometry of exoplanet systems.
