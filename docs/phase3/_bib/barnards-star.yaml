  arxiv_id: astro-ph/9806276
  ads_bibcode: 1998AJ....116..429B
  title: 'Photometry of Proxima Centauri and Barnard''s Star Using Hubble Space Telescope Fine Guidance Sensor 3: A Search
    for Periodic Variations'
  authors:
  - Benedict, G. Fritz
  - McArthur, Barbara
  - Nelan, E.
