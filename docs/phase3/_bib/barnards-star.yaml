- &id052
  arxiv_id: null
  ads_bibcode: 2021PhDT.........2F
  title: 'The Titan Laboratory: Studies of Hazy and Reducing Atmospheres Near and Far'
  authors:
  - Felton, Ryan Christopher
  year: '2021'
  pubdate: '2021-00-00'
  doi: null
  abstract: 'Titan is one of the most unique terrestrial worlds, besides our own planet, in our solar system. Orbiting Saturn
    at 9.5 AU from the Sun it is the only moon with an appreciable haze and so cold that instead of liquid water, there is
    liquid methane that forms when the methane condenses and rains out. The puffy extended atmosphere (1400 km high) hides
    the surface with a shroud of haze that forms from the photolysis of methane high up in the atmosphere which produce aggregates
    of tar-like particles. With almost 6% methane near the surface and 1.4% in the stratosphere this world is far more reducing
    (hydrogen rich) than the oxidized (oxygen rich) Archean eon of Earth and the Modern Earth. With such an alien world right
    here in our back yard it is paramount that we understand the processes that control it while comparing it to our own planet
    as we search the galaxy for terrestrial exoplanets. <P />In this dissertation I focus on answering three main questions.
    The first one is: Using the Titan-Enceladus cryovolcano oxygen exchange as a starting point, can external material entering
    a terrestrial atmosphere trigger a methane-oxygen false-positive biosignature observation? Methane and oxygen are a strong
    biosignature pair due to the way the two gases destroy one another unless a constant source is provided. Using a 1D-photochemical
    model I produce atmospheres with abiotic and biotic levels of oxygen and water entering a terrestrial world and then observe
    the spectra of the planet with a synthetic spectrum generator to look for the presence of the methane-oxygen pair. Simulating
    observations with next generation and future generation space-based telescopes, my results show that a false positive
    biosignature will not be triggered unless unphysically high external fluxes of material are used and even than the signal-to-noise-ratios
    of the spectra are not strong enough to be considered reliable. <P />The second question I answer is: Can Titan-like exoplanets
    be characterized with next-generation space-based observatories and what role if any does haze play? In this work Titan-like
    means a rocky body that is along the snow-line of its system where it is assumed to be cold enough for methane to condense,
    be highly reducing and have a hazy atmosphere. An exoplanet 6 light years away was recently detected by the radial velocity
    method, orbiting Barnard''s Star. The planet, Barnard''s Star b, is along the snow-line of its system with a minimum mass
    of 3.2 Earth masses. Using a 1D-photochemical model and synthetic spectrum generator I model this exoplanet as a Titan-like
    super Earth and apply a mass-radii relation to arrive at a minimum radius of 11053 km. With these parameters I simulated
    the observation of the exoplanet with LUVOIR-A, the 15 m mirror future-generation space-based telescope. My results show
    strong signals for methane in the visible and near-infrared and the suppression of the Rayleigh tail in the ultra-violet,
    that mirror the spectral methane windows seen in observations of Titan. <P />The third and final question is focused on
    how atmosphere transitions behave on rocky planets as they move from reducing to oxidized atmosphere conditions and whether
    or not Great Oxidation Event similarities occur. The Great Oxidation Event (GOE) was a period in Earth''s past, during
    the Proterozoic eon, when the planet quickly transitioned from a reducing to highly oxygenated atmosphere. One of the
    hallmarks of the GOE was a sharp spike and stepwise behavior in the abundance of atmospheric oxygen. Titan is on the far
    end of the reduced atmosphere spectrum, in contrast to the Archean and Modern Earth, and in my work I use a 1D-photochemical
    model to simulate Titan transitioning to an oxidized state. Methane and carbon-dioxide are gradually adjusted to make
    the atmosphere more oxidized while looking for evidence of stepwise changes in the abundances and column densities of
    major oxygenated species. The simulations are also performed for G, K and M host star types. However, neither oxygen nor
    ozone were included in the model at this time. My results do not show signs of pronounced stepwise behavior, but they
    do show gradual stepwise behavior for atmospheric water in the G and M star cases, while K star simulations made it difficult
    for the atmospheres to transition very far in the direction of oxidation.'
