- arxiv_id: null
  ads_bibcode: 2026AAS...24716502S
  title: 'E.E. Barnard''s Mystery Star Near Venus: An unexpected solution to a 120-year-old enigma'
  authors:
  - Sheehan, William
  - Sheehan, William
  - Schaefer, Bradley
  - Levy, David
  - Briggs, John
  - ceragioli, roger
  - Hunter, Tim
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: Edward Emerson Barnard is regarded as one of the greatest astronomical observers of all time. He discovered numerous
    comets, the fifth satellite of Jupiter, and pioneered the wide-angle photography of the Milky Way. His name is attached
    to the star with the greatest known proper motion, the large nebulous loop in Orion, and numerous Milky Way dark nebulae
    cataloged as Barnard Objects. Despite his reputation, an observation of a 7th-magnitude star near Venus with the 36-inch
    refractor of Lick Observatory on 13 August 1892 has long intrigued and baffled astronomers and historians of astronomy,
    and never been explained. Barnard recorded it incidentally while involved in a hitherto little-noted search for Venusian
    satellites, and at first apparently dismissed it as an ordinary field star. Later he established that it did not correspond
    in position to any known star. As was usual with him for doubtful observations, he held back the observation for 14 years,
    then in publishing reiterated his confidence in his original observations-there was no star of 7th magnitude in this position,
    the closest candidate to his position being being 11th magnitude TYC 1348-1601-01. Barnard himself ruled out that it could
    be one of the brighter asteroids, an intra-mercurial planet, etc., but made no suggestions as to what it might have been.
    Over the years, the observation has continued to nag at historians of astronomy, and it has been suggested, inconclusively,
    that it might have been a nova, or (less likely) a sun-grazing comet. At the end of 2024 and into the spring of 2025,
    the present authors made an all-out effort to settle the matter by testing all possible astrophysical and telescopic mechanisms
    for a transient source (novae, comets, asteroids, variable stars of all types, and even various classes of optical ghost
    images). Every possible precaution was taken, and all astronomical explanations were finally and exhaustively ruled out.
    In the end, we were enlightened only by a serendipitous observation. One of the authors, in a spirit of extreme caution,
    was rigorously checking the "ghost image" theory with a small telescope one last time, and noticed a surprisingly bright
    star near Venus under similar circumstances to Barnard's. The star's actual magnitude when checked proved to be much less
    than expected. Thus, we were led to investigate star visibility in twilight conditions. We succeeded in showing, conclusively,
    that Barnard-only just recently given regular time on the 36-inch refractor at the time-had simply overestimated the magnitude
    of the star in the field. The mystery star was the 11th-mag. field star TYC 1348-1601-1.
