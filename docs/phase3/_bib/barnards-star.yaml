- &id032
  arxiv_id: '2506.20864'
  ads_bibcode: 2025PASP..137i4503R
  title: 'The Rayleigh Criterion: Resolution Limits of Astronomical Periodograms'
  authors:
  - Ramirez Delgado, Victor
  - Caicedo Vivas, Joan Sebastián
  - Dodson-Robinson, Sally
  - Haley, Charlotte
  year: '2025'
  pubdate: '2025-09-00'
  doi: 10.1088/1538-3873/adffed
  abstract: The Rayleigh criterion determines the resolution limit of a periodogram, which is the minimum frequency separation
    required to barely resolve two sinusoids. Failing to consider the Rayleigh criterion may result in incorrect interpretations
    of long-period signals or spurious claims that two closely spaced periodogram peaks represent two distinct physical processes.
    Resolution considerations can help astronomers decide which periodogram peaks truly represent oscillatory signals, a question
    that is of great importance for exoplanet detection. We demonstrate how applying the Rayleigh criterion can help observers
    avoid false positive detections caused by uneven observing cadence or insufficient observing time baseline. We present
    three synthetic data sets that showcase the importance of the Rayleigh criterion in interpreting the generalized Lomb─Scargle
    and Bayesian periodograms. Our synthetic data sets illustrate (1) a single oscillation with a split Lomb─Scargle periodogram
    peak resulting from uneven observing cadence can be mistaken for two oscillations if the Rayleigh criterion is neglected,
    (2) oversampling a periodogram's frequency grid does not improve resolution, and (3) observing time baseline requirements
    for resolving two closely spaced oscillations. We use the Rayleigh criterion to revisit detections of planets, stellar
    activity, and differential rotation from four published data sets. We show that the frequency separation between planet
    55 Cnc d and the activity cycle is too small to distinguish the two phenomena based on published radial velocities (RVs)
    alone. Likewise, the contested 4970 days planet orbiting HD 99492 cannot be statistically separated from zero frequency.
    We determine that a cubic polynomial better explains the long-term RV variability of Barnard's star than a sinusoid model.
    Finally, our re-analysis of Kepler observations of two active stars shows that the signals previously attributed to differential
    rotation can be modeled by a Gaussian process with a single quasiperiodicity. This work demonstrates the importance of
    considering Rayleigh resolution when constructing a time-domain model.
