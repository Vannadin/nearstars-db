  abstract: Barnard's Star should have significant secular acceleration because it lies close to the Sun and has the highest
    known proper motion along with a large radial velocity. It will pass within about 1.4 pc in another 9,750 years. Secular
    changes in proper motion and radial velocity are essentially the Coriolis and centrifugal accelerations, respectively,
    arising from use of a rotating coordinate system defined by the Sun-star radius vector. Although stellar space velocities
    measured with respect to the Sun are essentially constant, these perspective effects arise with changing distance and
    viewing angle. <P />Hipparcos-2 plus Nidever et al. (2002) predict a perspective change in the proper motion of 1.285±0.006
    mas yr<SUP>-2 </SUP>for Barnard's Star. Recent analysis of 900+ photographic plates between 1968 and 1998 with the 26.25-in
    (0.67-m) McCormick refractor detected a secular acceleration of 1.25±0.04 mas yr<SUP>-2</SUP>, which agrees with the predicted
    value within the measurement errors. Earlier, Benedict et al. (1999) measured its secular acceleration to be 1.2±0.2 mas
    yr<SUP>-2 </SUP>using 3 years of HST FGS observations. <P />Similarly, a perspective change in radial velocity of 4.50±0.01
    m s<SUP>-1</SUP> yr<SUP>-1</SUP> can be predicted for Barnard's Star. Kürster et al. (2003) detected variations in their
    observations of it that are largely attributable to secular acceleration along the line of sight with some contribution
    from stellar activity. <P />Although secular acceleration effects have been limited for past studies of stellar motions,
