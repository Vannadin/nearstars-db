  arxiv_id: astro-ph/0303528
  ads_bibcode: 2003A&A...403.1077K
  title: The low-level radial velocity variability   in Barnard's star (= GJ 699).  Secular acceleration, indications for
    convective redshift,  and planet mass limits
  authors:
  - Kürster, M.
  - Endl, M.
  - Rouesnel, F.
  - Els, S.
  - Kaufer, A.
  - Brillant, S.
  - Hatzes, A. P.
  - Saar, S. H.
  - Cochran, W. D.
  year: '2003'
  pubdate: '2003-06-00'
  doi: 10.1051/0004-6361:20030396
  abstract: We report results from 2 1/2 yr of high precision radial velocity (RV) monitoring of Barnard's star. The high
    RV measurement precision of the VLT-UT2+UVES of 2.65 m s<SUP>-1</SUP> made the following findings possible. (1) The first
    detection of the change in the RV of a star caused by its space motion (RV secular acceleration). (2) An anti-correlation
    of the measured RV with the strength of the filling-in of the H_alpha line by emission. (3) Very stringent mass upper
    limits to planetary companions. Using only data from the first 2 years, we obtain a best-fit value for the RV secular
    acceleration of 5.15+/- 0.89 m s<SUP>-1</SUP> yr<SUP>-1</SUP>. This agrees within 0.95sigma with the predicted value of
    4.50 m s<SUP>-1</SUP> yr<SUP>-1</SUP> based on the Hipparcos proper motion and parallax combined with the known absolute
    radial velocity of the star. When the RV data of the last half-year are added the best-fit slope is strongly reduced to
    2.97+/- 0.51 m s<SUP>-1</SUP> yr<SUP>-1</SUP> (3.0sigma away from the predicted value), clearly suggesting the presence
    of additional RV variability in the star. Part of it can be attributed to stellar activity as we demonstrate by correlating
    the residual RVs with an index that describes the filling-in of the H_alpha line by emission. A correlation coefficient
    of -0.50 indicates that the appearance of active regions causes a blueshift of photospheric absorption lines. Assuming
    that active regions basically inhibit convection we discuss the possibility that the fundamental (inactive) convection
    pattern in this M4V star produces a convective redshift which would indicate that the majority of the absorption lines
    relevant for our RV measurements is formed in a region of convective overshoot. This interpretation could possibly extend
    a trend indicated in the behaviour of earlier spectral types that exhibit convective blueshift, but with decreasing line
    asymmetries and blueshifts as one goes from G to K dwarfs. Based on this assumption, we estimate that the variation of
    the visible plage coverage is about 20%. We also determine upper limits to the projected mass msin i and to the true mass
    m of hypothetical planetary companions in circular orbits. For the separation range 0.017-0.98 AU we exclude any planet
    with msin i&gt; 0.12 M<SUB>Jupiter</SUB> and m&gt; 0.86 M<SUB>Jupiter</SUB>. Throughout the habitable zone around Barnard's
    star, i.e. 0.034-0.082 AU, we exclude planets with msin i&gt; 7.5 M<SUB>Earth</SUB> and m&gt; 3.1 M<SUB>Neptune</SUB>.
    <P />Based on observations collected at the European Southern Observatory, Paranal, Chile (ESO programmes 65.L-0428, 66.C-0446,
    267.C-5700, 68.C-0415, and 69.C-0722).
