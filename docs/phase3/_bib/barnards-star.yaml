  title: The CARMENES search for exoplanets around M dwarfs. Stellar atmospheric parameters of target stars with SteParSyn
  authors:
  - Marfil, E.
  - Tabernero, H. M.
  - Montes, D.
  - Caballero, J. A.
  - Lázaro, F. J.
