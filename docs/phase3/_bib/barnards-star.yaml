- arxiv_id: null
  ads_bibcode: 2002BASI...30..517B
  title: 'Book Review: Distant wanderers / Copernicus Books/Springer , 2001/2002'
  authors:
  - Bhatt, H. C.
  year: '2002'
  pubdate: '2002-06-00'
  doi: null
  abstract: Are we alone in the Universe? The Earth, teeming with life, as we know it, is only one amongst the nine planets
    (wanderers) that wander around the Sun in more or less circular orbits. Do distant stars also have planets circling them?
    Are some of them similar to Earth and support life? These questions have long occupied the human mind. However, until
    the closing years of the twentieth century, the idea that there are stars, other than the Sun, that have planets orbiting
    them, remained a subject of speculation and controversy because the astronomical observing techniques used for the detection
    of planetary companions of stars did not have the necessary precision. During the past several years, advances in technology
    and dedicated efforts of planet-hunting astronomers have made it possible to detect Jupiter-like or more massive planets
    around nearby stars. So far about 70 such extra-solar planets have been discovered indicating that our solar system is
    not unique and distant wanderers are not uncommon. Distant Wanderers narrates the story of the search for extra-solar
    planets, even as the search is becoming more vigorous with newer instruments pushing the limits of sensitivity that has
    often resulted in the detection of planetary systems with totally unexpected characteristics. The book is primarily aimed
    at non specialists, but practicing scientists, including astronomers, will find the narrative very interesting and sometimes
    offering a perspective that is unfamiliar to professionals. The book begins with an introduction to some basic astronomical
    facts about the Universe, evolution of stars, supernovae and formation of pulsars. The first extra-solar planets were
    discovered in 1992 around a radio pulsar (PSR 1257+12) by measuring the oscillatory perturbations in the pulse arrival
    times from the pulsar caused by the presence of orbiting earth-sized planets as their gravity forces the pulsar also to
    move in orbit around the system barycenter. Such planetary systems are, however, very rare and only one other planet around
    a pulsar has so far been found. The first extra-solar planet around a sun-like star was discovered in 1995 by M. Mayor
    and D. Queloz circling the star 51 Pegasi by the method of Doppler spectroscopy. Since then about 70 extra-solar planets
    have been discovered. Most of these have been detected by Doppler spectroscopy, but now newer methods like occultation
    and gravitational lensing have also begun to reveal extra-solar planets and candidate extra-solar planets. Distant Wanderers
    gives a brief description of current theories of planet formation in dusty disks around stars as they form by gravitational
    collapse of rotating interstellar clouds. Various techniques used by astronomers for the detection of extra-solar planets
    are discussed. Important astrophysical concepts relevant to planet formation and their detection are also explained. The
    reader is taken to observatories on mountain tops, laboratories where instruments are built and conferences where astronomers
    announce their discoveries, debate the results and discuss future strategies for the search for distant wanderers. The
    extra-solar planets discovered so far, around sun-like stars, are similar in mass to Jupiter or more massive. Their orbits
    show a great variety. Some are in very close orbits (orbital periods of a few days) about the parent star, and are therefore
    very hot (hot Jupiters), while others are in wider orbits and cold. Some have nearly circular orbits, while many of them
    have highly eccentric orbits. There are extra-solar planets with masses as large as about 10 times the mass of Jupiter,
    close to being brown dwarfs. The existence of such planetary systems was never predicted by the standard theories of planet
    and star formation. As the hunt for extra-solar planets continues with more sophisticated instruments using innovative
    ideas, astronomers can be sure to be rewarded with more surprises. In Distant Wanderers, these discoveries and technological
    developments, currently taking place and being planned for the future, in the search for extra-solar planets, are narrated
    by the author, Bruce Dorminey, in simple language and lucid style. There are a few technical errors in the book. For example,
    on page 4, the angular momentum , which must always be conserved, is said to be created. In the discussion of the proper
    motion (which is measured on the plane of the sky) of Barnard's star, on page 111, it is incorrect to say that the star
    is moving toward the Sun. The book is, otherwise, well written and succeeds in communicating the excitement of the hunt
    for the distant wanderers.
