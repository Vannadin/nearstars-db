- &id028
  arxiv_id: '2201.11288'
  ads_bibcode: 2022ApJ...927L..11T
  title: Rotational Modulation of Spectroscopic Zeeman Signatures in Low-mass Stars
  authors:
  - Terrien, Ryan C.
  - Keen, Allison
  - Oda, Katy
  - Parts(they/them), Winter
  - Stefánsson, Guðmundur
  - Mahadevan, Suvrath
  - Robertson, Paul
  - Ninan, Joe P.
  - Beard, Corey
  - Bender, Chad F.
  - Cochran, William D.
  - Cunha, Katia
  - Diddams, Scott A.
  - Fredrick, Connor
  - Halverson, Samuel
  - Hearty, Fred
  - Ickler, Adam
  - Kanodia, Shubham
  - Libby-Roberts, Jessica E.
  - Lubin, Jack
  - Metcalf, Andrew J.
