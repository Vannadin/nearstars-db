  arxiv_id: '1501.01305'
  ads_bibcode: 2015ApJ...801...18M
  title: Kepler-445, Kepler-446 and the Occurrence of Compact Multiples Orbiting Mid-M Dwarf Stars
  authors:
  - Muirhead, Philip S.
  - Mann, Andrew W.
  - Vanderburg, Andrew
  - Morton, Timothy D.
