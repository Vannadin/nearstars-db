  abstract: The smaller the mass of a star, the lower its central temperature and the lower its luminosity. The zero-age Main
    Sequence is thus explained down to its lower, red dwarf section; there is, however, a critical mass value below which
    the central temperature is too low to permit conventional nuclear energy production, and the resulting objects are designated
    substellar, black, brown, or even 'dark red' stars. The present consideration of the dark companions of stars gives attention
    to visible and invisible dark dwarfs, as well as to the stars Sirius and Procyon, the planets Neptune and Pluto, spectroscopic,
    photometric, and eclipsing companion stars, the serendipitously discovered cases of Ross 614 and VW Cephei C, and astrometric
    study results for Barnard's star.
