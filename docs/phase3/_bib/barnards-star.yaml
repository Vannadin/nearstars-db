  year: '2021'
  pubdate: '2021-07-00'
  doi: 10.1093/mnras/stab1167
  abstract: We present the results of a medium-resolution optical spectroscopic survey of 92 cool ($3000 \,\mathrm{ K}\lesssim
    T_{\rm eff} \lesssim 4500\,$K) southern TESS candidate planet hosts, and describe our spectral fitting methodology used
    to recover stellar parameters. We quantify model deficiencies at predicting optical fluxes, and while our technique works
    well for T<SUB>eff</SUB>, further improvements are needed for [Fe/H]. To this end, we developed an updated photometric
    [Fe/H] calibration for isolated main-sequence stars built upon a calibration sample of 69 cool dwarfs in binary systems,
    precise to $\pm 0.19\,$dex, from supersolar to metal poor, over 1.51 &lt; Gaia (B<SUB>P</SUB> - R<SUB>P</SUB>) &lt; 3.3.
    Our fitted T<SUB>eff</SUB> and R<SUB>⋆</SUB> have median precisions of 0.8 per cent and 1.7 per cent, respectively, and
    are consistent with our sample of standard stars. We use these to model the transit light curves and determine exoplanet
    radii for 100 candidate planets to 3.5 per cent precision and see evidence that the planet radius gap is also present
    for cool dwarfs. Our results are consistent with the sample of confirmed TESS planets, with this survey representing one
    of the largest uniform analyses of cool TESS candidate planet hosts to date.
