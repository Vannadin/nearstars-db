- &id043
  arxiv_id: '1202.2570'
  ads_bibcode: 2012ApJS..200...15A
  title: The HARPS-TERRA Project. I. Description of the Algorithms, Performance, and New Measurements on a Few Remarkable
    Stars Observed by HARPS
  authors:
  - Anglada-Escudé, Guillem
  - Butler, R. Paul
  year: '2012'
  pubdate: '2012-06-00'
  doi: 10.1088/0067-0049/200/2/15
  abstract: Doppler spectroscopy has uncovered or confirmed all the known planets orbiting nearby stars. Two main techniques
    are used to obtain precision Doppler measurements at optical wavelengths. The first approach is the gas cell method, which
    consists of least-squares matching of the spectrum of iodine imprinted on the spectrum of the star. The second method
    relies on the construction of a stabilized spectrograph externally calibrated in wavelength. The most precise stabilized
    spectrometer in operation is the High Accuracy Radial velocity Planet Searcher (HARPS), operated by the European Southern
    Observatory in La Silla Observatory, Chile. The Doppler measurements obtained with HARPS are typically obtained using
    the cross-correlation function (CCF) technique. This technique consists of multiplying the stellar spectrum by a weighted
    binary mask and finding the minimum of the product as a function of the Doppler shift. It is known that CCF is suboptimal
    in exploiting the Doppler information in the stellar spectrum. Here we describe an algorithm to obtain precision radial
    velocity measurements using least-squares matching of each observed spectrum to a high signal-to-noise ratio template
    derived from the same observations. This algorithm is implemented in our software HARPS-TERRA (Template-Enhanced Radial
    velocity Re-analysis Application). New radial velocity measurements on a representative sample of stars observed by HARPS
    are used to illustrate the benefits of the proposed method. We show that, compared with CCF, template matching provides
    a significant improvement in accuracy, especially when applied to M dwarfs.
