  year: '2001'
  pubdate: '2001-05-00'
  doi: null
  abstract: Barnard's Star is of particular interest due to its high proper motion, nearness to the Solar System, and previous
    claims of planetary companions. Based upon observations made at the Sproul Observatory between 1916 and 1962, Peter van
    de Kamp claimed the star had a 24-year period and a planetary companion of about 1.6 Jupiter masses (Van de Kamp, AJ,
    68, 515, 1963). Later, based on Sproul observations from 1938 to 1974, Van de Kamp found that the perturbation was better
    fit by two companions with 11.5- and 20 or 25-year orbits and corresponding masses of 1 and 0.5 Jupiter masses (Van de
    Kamp, ARA&amp;A, 13, 295, 1975). Searches by other observers over shorter periods of time or with fewer exposures failed
    to find clear indications of planetary companions (Gatewood and Eichhorn, AJ, 78, 769, 1973). However, the McCormick Observatory
    has more than 900 exposures made on photographic plates between 1969 and 1998. In view of the continuing controversy,
    reviewing these data to identify any perturbations indicative of a companion is worthwhile. Therefore, we scanned the
    plates on the microdensitometer (PDS) at the McCormick Observatory. We present the results of a time-series analysis to
    search these observations for one or more perturbations. We acknowledge support from NSF grant AST 98-20711 and from Litton
    Marine Systems, Incorporated.
