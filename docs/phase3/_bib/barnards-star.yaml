- &id021
  arxiv_id: '2511.05331'
  ads_bibcode: 2025A&A...704A.323P
  title: 'EMPEROR: I. Exoplanet MCMC parallel tempering for RV orbit retrieval'
  authors:
  - Peña R., Pablo A.
  - Jenkins, James S.
  year: '2025'
  pubdate: '2025-12-00'
  doi: 10.1051/0004-6361/202554336
  abstract: Aims. This paper presents EMPEROR, an open-source Python-based framework designed for the efficient detection
    and characterisation of exoplanets by using radial velocity (RV) methods. Its combination of performance, flexibility,
    and ease of use makes it a robust tool for any exoplanet detection endeavour. EMPEROR integrates dynamic nested sampling
    (DNS) and adaptive parallel tempering (APT) Markov chain Monte Carlo (MCMC) techniques, supporting multiple noise models
    such as Gaussian processes (GPs) and moving averages (MA). The framework facilitates systematic model comparison using
    statistical metrics, including Bayesian evidence (ln 𝒵) and Bayesian information criterion (BIC), while providing automated,
    publish-ready visualisations. Methods. EMPEROR was evaluated across three distinct systems to assess its capabilities
    in different detection scenarios. The sampling performance, model selection, and search for Earth-mass planets were investigated
    in data for 51 Pegasi, HD 55693, and Barnard's star (GJ 699). Results. For 51 Pegasi, we find APT achieves an effective
    sampling increase by a factor of 3.76 over DNS, while retrieving tighter parameter estimates. For HD 55693, the stellar
    rotation, P<SUB>rot</SUB> = 29.72<SUB>−0.02</SUB>+<SUP>0.01</SUP>, and magnetic cycle, P<SUB>mag</SUB> = 2557.0<SUP>−36.7</SUP>+<SUP>70.1</SUP>,
    were recovered, while demonstrating the sensitivity of ln 𝒵 to prior selection. For Barnard's star, several noise models
    were compared and the confirmed planet parameters were successfully retrieved with all of them. The best model shows a
    period of 3.1536±0.0003 d, minimum mass of 0.38±0.03 M<SUB>⊕</SUB>, and semi-major axis of 0.02315±0.00039 AU. Conclusions.
    Purely statistical inference might be insufficient on its own for robust exoplanet detection. Effective methodologies
    must integrate domain knowledge, heuristic criteria, and multi-faceted model comparisons. The versatility of EMPEROR in
    handling diverse noise structures, its systematic model selection, and its improved performance make it a valuable tool
    for RV exoplanetary studies.
