  doi: null
  abstract: Current developments such as the Ion Compressed Antimatter Nuclear (ICAN-II) propulsion system proposed by the
    Pennsylvania State University Center for Space Propulsion Engineering open the way to the possible use of available supplies
    of antiprotons to power antimatter assisted inertial confinement fusion (AAICF) propulsion systems for interstellar missions.
    Analysis indicates that light weight AAICF propulsion systems with specific impulses in excess of seven hundred thousand
    seconds may be feasible within the next 30 years. AAICF should prove to be the optimum propulsion system since it possesses
