- &id026
  arxiv_id: '2207.13524'
  ads_bibcode: 2022AJ....164...84A
  title: 'Line-by-line Velocity Measurements: an Outlier-resistant Method for Precision Velocimetry'
  authors:
  - Artigau, Étienne
  - Cadieux, Charles
  - Cook, Neil J.
  - Doyon, René
  - Vandal, Thomas
  - Donati, Jean-François
  - Moutou, Claire
  - Delfosse, Xavier
  - Fouqué, Pascal
  - Martioli, Eder
  - Bouchy, François
  - Parsons, Jasmine
  - Carmona, Andres
  - Dumusque, Xavier
  - Astudillo-Defru, Nicola
  - Bonfils, Xavier
  - Mignon, Lucille
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.3847/1538-3881/ac7ce6
  abstract: We present a new algorithm for precision radial velocity (pRV) measurements, a line-by-line (LBL) approach designed
    to handle outlying spectral information in a simple but efficient manner. The effectiveness of the LBL method is demonstrated
    on two data sets, one obtained with SPIRou on Barnard's star, and the other with the High Accuracy Radial velocity Planet
    Searcher (HARPS) on Proxima Centauri. In the near-infrared, the LBL provides a framework for meters-per-second-level accuracy
    in pRV measurements despite the challenges associated with telluric absorption and sky emission lines. We confirm with
    SPIRou measurements spanning 2.7 yr that the candidate super-Earth on a 233 day orbit around Barnard's star is an artifact
    due to a combination of time sampling and activity. The LBL analysis of the Proxima Centauri HARPS post-upgrade data alone
    easily recovers the Proxima b signal and also provides a 2σ detection of the recently confirmed 5 day Proxima d planet,
    but argues against the presence of the candidate Proxima c with a period of 1900 days. We provide evidence that the Proxima
    c signal is associated with small, unaccounted systematic effects affecting the HARPS-TERRA template-matching radial velocity
    extraction method for long-period signals. Finally, the LBL framework provides a very effective activity indicator, akin
    to the FWHM derived from the cross-correlation function, from which we infer a rotation period of ${92.1}_{-3.5}^{+4.2}$
    days for Proxima.
