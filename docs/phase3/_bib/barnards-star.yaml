  year: '1999'
  pubdate: '1999-08-00'
  doi: 10.1086/300975
  abstract: We report on a substellar-companion search utilizing interferometric fringe-tracking astrometry acquired with
    Fine Guidance Sensor 3 on the Hubble Space Telescope. Our targets were Proxima Centauri and Barnard's star. We obtain
    absolute parallax values of pi_abs=0.7687"+/-0.0003" for Proxima Cen and pi_abs=0.5454"+/-0.0003" for Barnard's star.
    Once low-amplitude instrumental systematic errors are identified and removed, our companion detection sensitivity is less
    than or equal to one Jupiter mass for periods longer than 60 days for Proxima Cen. Between the astrometry and the recent
    radial velocity results of Kürster et al., we exclude all companions with M&gt;0.8M_Jup for the range of periods 1 day&lt;P&lt;1000
    days. For Barnard's star, our companion detection sensitivity is less than or equal to one Jupiter mass for periods longer
    than 150 days. Our null results for Barnard's star are consistent with those reported by Gatewood in 1995.
