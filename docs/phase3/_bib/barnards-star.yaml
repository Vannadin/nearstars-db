  abstract: The InfraRed Doppler (IRD) instrument is a high-dispersion spectrograph that is available on Subaru Telescope
    to explore extrasolar planets via infrared radial velocity (RV) observations. The Subaru/IRD is especially useful in the
    search of a low-mass planet around cool M-type dwarfs for which infrared RV observations are essential. We report our
    early performance tests for IRD. IRD's two H2RG detectors have been evaluated with our detector readout technique, ensuring
    that their readout noise is made sufficiently smaller than the stellar photon noise expected in our planned survey. We
    have also tested the instrumental stability of RV measurements from the laboratory data obtained with the IRD's calibration
    systems including a laser frequency comb (LFC). Among our tested three types of velocity stability, the stability of comb
    spectra obtained with a multi-mode fiber (MMF) relative to that with another MMF is measured to be ∼1 m s<SUP>-1</SUP>.
    We also infer from these tests that stellar RV measurements with an MMF can be calibrated with a short-term stability
    of 2 m s<SUP>-1</SUP> or better by the simultaneously-observed reference spectra of LFC. Furthermore, we report preliminary
    on-sky RV measurements calibrated with a Thorium-Argon hollow-cathode lamp for RV-stable stars (τ Ceti and Barnard's star)
    and a planet-host (51 Pegasi). These preliminary RV measurements help the further performance test of IRD that will be
    performed by the on-sky observations with LFC.
