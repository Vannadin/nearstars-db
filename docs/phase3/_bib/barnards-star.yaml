  doi: null
  abstract: In this talk, I will summarize current knowledge of the planetary systems within 10 pc. Not including the solar
    system, the 10-pc sample includes 105 planets in 58 planetary systems. While 88% of these systems orbit M dwarfs, the
    10-pc sample also includes four systems orbiting K stars and three orbiting G stars. Roughly half of the systems have
    only a single known planet, 25% have two known planets, and 20% have three known planets. The systems with the highest
    planetary multiplicity are Barnard's star (4 planets), GJ 876 (4 planets), and HD 219134 (5 planets). Nearly all of the
    planets were detected via radial velocity and therefore have only minimum masses, but the sample also contains twenty
    planets with measured masses. Ten of those planets transit, and five of them have been spectroscopically characterized
    with JWST. Approximately 70% of the planets have (minimum) masses below 10 Earth masses and seven planets may be less
    massive than Earth. The sample also includes 21 planets with (minimum) masses of 1-2 Earth masses. The distribution of
    orbital periods spans multiple orders of magnitude from less than a day to more than a decade. A typical 10-pc planet
    has an orbital period of 19 days and receives roughly three times as much irradiation as the Earth, which places it significantly
    inside the inner edge of the habitable zone. However, the sample also includes 19 habitable zone planets with minimum
    masses below 10 Earth masses. None of those planets are known to transit, but they are enticing targets for direct imaging
    from large ground-based telescopes.
