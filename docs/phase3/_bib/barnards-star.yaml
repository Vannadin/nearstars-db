  arxiv_id: '1507.01254'
  ads_bibcode: 2015MNRAS.452.1677G
  title: Constraints on the substellar companions in wide orbits around the Barnard's Star from CanariCam mid-infrared imaging
  authors:
  - Gauza, B.
  - Béjar, V. J. S.
  - Rebolo, R.
  - Álvarez, C.
  - Bihain, G.
