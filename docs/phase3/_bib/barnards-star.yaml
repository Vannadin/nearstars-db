  doi: 10.1002/asna.201211775
  abstract: The current precision radial velocities techniques to detect low mass planets in M dwarf are quickly reviewed.
    This includes high resolution spectroscopic observations made both in the optical and in the near infrared. We discuss
    that, given the current instrumental performance, optical RVs are still far ahead over other approaches. However, this
    situation might change soon with the advent of new spectrographs with red/nIR capabilities. We review a newly developed
    method to obtain precision RV measurements on stabilized spectrographs and how it is implemented to archival HARPS observations.
    In addition to get much closer to the photon noise, this approach allows us to identify and filter out wavelength dependent
    noise sources achieving unprecedented accuracy on G, K and specially M dwarfs. We show how including red/infrared observations
    is of paramount importance to efficiently and unambiguously detect very low mass planets around cool spectral types. As
    examples, we show new measurements on Barnard's star indicating that the star is stable down to 0.9 cm s^-1 over a time-span
    of 4 years and how RV signals correlated with activity indices disappear when using the reddest half of the HARPS wavelength
    range. To conclude, we present new results, detections and describe the implications in terms of planet/multi-planet abundances
    around cool stars.
