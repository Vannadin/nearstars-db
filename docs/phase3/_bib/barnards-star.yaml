  title: Red noise-based false alarm thresholds for astrophysical periodograms via Whittle's approximation to the likelihood
  authors:
  - Ejaz, Amna
  - Dodson-Robinson, Sarah
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: Astronomers who search for periodic signals using variants of the Lomb-Scargle periodogram rely on false alarm
    level (FAL) estimates to identify statistically significant peaks. Although FALs are often calculated according to white
    noise models, many astronomical time series suffer from red noise. Prewhitening is a statistical technique in which a
    continuum model is subtracted from the log power spectrum estimate, after which the observer can proceed with a white-noise
    treatment. Here, we present a prewhitening-based method of calculating frequency-dependent FALs. We fit power law models
    and autoregressive models of order 1 to each Lomb-Scargle periodogram by minimizing the Whittle approximation to the negative
    log-likelihood (NLL), then calculate FALs based on the best-fit model power spectrum. Our technique is a novel extension
    of the Whittle NLL to datasets with uneven time sampling. We demonstrate FAL calculations using archival observations
    of Cen B and Barnard's star. A high-frequency oscillation injected into Cen B activity indicator R'HK observations correctly
    exceeds the 1% red-noise FAL despite having only 8.9% of the power of the dominant rotation signal. In a periodogram of
    Barnard's star RVs, peaks associated with planets b, c, d, and e are detected against the 5% red-noise FAL without iterative
    model fitting and subtraction. Software for calculating red noise-based FALs for Lomb-Scargle periodograms is available
    on GitHub.
