  arxiv_id: '1208.2273'
  ads_bibcode: 2013ApJ...764..131C
  title: Precise Doppler Monitoring of Barnard's Star
  authors:
  - Choi, Jieun
  - McCarthy, Chris
  - Marcy, Geoffrey W.
  - Howard, Andrew W.
  - Fischer, Debra A.
  - Johnson, John A.
  - Isaacson, Howard
