  doi: 10.1086/300420
  abstract: 'We have observed Proxima Centauri and Barnard''s star with the Hubble Space Telescope Fine Guidance Sensor 3.
    Proxima Cen exhibits small-amplitude, periodic photometric variations. Once several sources of systematic photometric
    error are corrected, we obtain 2 mmag internal photometric precision. We identify two distinct behavior modes over the
    past 4 years: higher amplitude, longer period and smaller amplitude, shorter period. Within the errors, one period (P
    ~ 83 days) is twice the other. Barnard''s star shows very weak evidence for periodicity on a timescale of approximately
    130 days. If we interpret these periodic phenomena as rotational modulation of starspots, we identify three discrete spots
    on Proxima Cen and possibly one spot on Barnard''s star. We find that the disturbances change significantly on timescales
    as short as one rotation period. Based on observations with the NASA/ESA Hubble Space Telescope, obtained at the Space
    Telescope Science Institute, which is operated by the Association of Universities for Research in Astronomy, Inc., under
    NASA contract NAS 5-26555.'
