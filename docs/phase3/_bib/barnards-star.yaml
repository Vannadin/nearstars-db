  abstract: Any planetary body orbiting a star may lose atmosphere if sufficient energy is provided to atmospheric particles.
    Atmospheric species can be lost via a variety of processes, including hydrodynamic escape, Jeans escape, photochemical
    escape, ion escape, and sputtering. The rate of escape of different species via the different processes is controlled
    by a number of parameters related to the planet, its atmosphere, and its host star. <P />Here we present recent results
    from the Retention of Habitable Atmospheres in Planetary Systems (RHAPS) project, a multi-disciplinary modeling effort
    to determine the attributes of planets and their host stars that lead to significant atmospheric retention (i.e. low escape
    rates) over long timescales. Specifically, we present final estimated escape rates from present-day Mars if it orbited
    Barnard's Star and escape rates from present-day Venus if it orbited G stars of different ages. We also present progress
    on estimating atmospheric escape from rocky planets orbiting different M stars, and additional new results obtained by
    RHAPS team members.
