- &id286
  arxiv_id: '1511.08901'
  ads_bibcode: 2016ApJ...820...99T
  title: Detection of an Atmosphere Around the Super-Earth 55 Cancri e
  authors:
  - Tsiaras, A.
  - Rocchetto, M.
  - Waldmann, I. P.
  - Venot, O.
  - Varley, R.
  - Morello, G.
  - Damiano, M.
  - Tinetti, G.
  - Barton, E. J.
  - Yurchenko, S. N.
  - Tennyson, J.
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.3847/0004-637X/820/2/99
  abstract: We report the analysis of two new spectroscopic observations in the near-infrared of the super-Earth 55 Cancri
    e, obtained with the WFC3 camera on board the Hubble Space Telescope. 55 Cancri e orbits so close to its parent star that
    temperatures much higher than 2000 K are expected on its surface. Given the brightness of 55 Cancri, the observations
    were obtained in scanning mode, adopting a very long scanning length and a very high scanning speed. We use our specialized
    pipeline to take into account systematics introduced by these observational parameters when coupled with the geometrical
    distortions of the instrument. We measure the transit depth per wavelength channel with an average relative uncertainty
    of 22 ppm per visit and find modulations that depart from a straight line model with a 6σ confidence level. These results
    suggest that 55 Cancri e is surrounded by an atmosphere, which is probably hydrogen-rich. Our fully Bayesian spectral
    retrieval code, { T }-REx, has identified HCN to be the most likely molecular candidate able to explain the features at
    1.42 and 1.54 μm. While additional spectroscopic observations in a broader wavelength range in the infrared will be needed
    to confirm the HCN detection, we discuss here the implications of such a result. Our chemical model, developed with combustion
    specialists, indicates that relatively high mixing ratios of HCN may be caused by a high C/O ratio. This result suggests
    this super-Earth is a carbon-rich environment even more exotic than previously thought.
  source: citation_of=2023A&A...677A..14A
