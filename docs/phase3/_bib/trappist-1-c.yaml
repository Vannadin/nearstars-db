- &id178
  arxiv_id: '2207.00014'
  ads_bibcode: 2023MNRAS.521.2535G
  title: Mantle mineralogy limits to rocky planet water inventories
  authors:
  - Guimond, Claire Marie
  - Shorttle, Oliver
  - Rudge, John F.
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.1093/mnras/stad148
  abstract: Nominally anhydrous minerals in rocky planet mantles can sequester multiple Earth-oceans' worth of water. Mantle
    water storage capacities therefore provide an important constraint on planet water inventories. Here we predict silicate
    mantle water capacities from the thermodynamically-limited solubility of water in their constituent minerals. We report
    the variability of upper mantle and bulk mantle water capacities due to (i) host star refractory element abundances that
    set mantle mineralogy, (ii) realistic mantle temperature scenarios, and (iii) planet mass. We find that transition zone
    minerals almost unfailingly dominate the water capacity of the mantle for planets of up to ~1.5 Earth masses, possibly
    creating a bottleneck to deep water transport, although the transition zone water capacity discontinuity is less pronounced
    at lower Mg/Si. The pressure of the ringwoodite-perovskite phase boundary defining the lower mantle is roughly constant,
    so the contribution of the upper mantle reservoir becomes less important for larger planets. If perovskite and postperovskite
    are relatively dry, then increasingly massive rocky planets would have increasingly smaller fractional interior water
    capacities. In practice, our results represent initial water concentration profiles in planetary mantles where their primordial
    magma oceans are water-saturated. This work is a step towards understanding planetary deep water cycling, thermal evolution
    as mediated by rheology and melting, and the frequency of ocean planets.
