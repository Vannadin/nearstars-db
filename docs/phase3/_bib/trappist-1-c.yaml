  abstract: The study of exoplanets and especially their atmospheres can reveal key insights on their evolution by identifying
    specific atmospheric species. For such atmospheric investigations, high-resolution transmission spectroscopy has shown
    great success, especially for Jupiter-type planets. Towards the atmospheric characterization of smaller planets, the super-Earth
