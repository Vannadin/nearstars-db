  arxiv_id: null
  ads_bibcode: 2024ApJ...970L...4D
  title: Updated Spectral Characteristics for the Ultracool Dwarf TRAPPIST-1
  authors:
  - Davoudi, Fatemeh
  - Rackham, Benjamin V.
  - Gillon, Michaël
  - de Wit, Julien
  - Burgasser, Adam J.
  - Delrez, Laetitia
  - Iyer, Aishwarya
