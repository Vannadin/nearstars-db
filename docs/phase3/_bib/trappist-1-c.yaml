  arxiv_id: '2311.08444'
  ads_bibcode: 2023Natur.620..287S
  title: A cool runaway greenhouse without surface magma ocean
  authors:
  - Selsis, Franck
  - Leconte, Jérémy
  - Turbet, Martin
  - Chaverot, Guillaume
  - Bolmont, Émeline
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1038/s41586-023-06258-3
  abstract: Water vapour atmospheres with content equivalent to the Earth's oceans, resulting from impacts<SUP>1</SUP> or
    a high insolation<SUP>2,3</SUP>, were found to yield a surface magma ocean<SUP>4,5</SUP>. This was, however, a consequence
    of assuming a fully convective structure<SUP>2-11</SUP>. Here, we report using a consistent climate model that pure steam
    atmospheres are commonly shaped by radiative layers, making their thermal structure strongly dependent on the stellar
    spectrum and internal heat flow. The surface is cooler when an adiabatic profile is not imposed; melting Earth's crust
    requires an insolation several times higher than today, which will not happen during the main sequence of the Sun. Venus's
    surface can solidify before the steam atmosphere escapes, which is the opposite of previous works<SUP>4,5</SUP>. Around
    the reddest stars (T<SUB>eff</SUB> &lt; 3,000 K), surface magma oceans cannot form by stellar forcing alone, whatever
    the water content. These findings affect observable signatures of steam atmospheres and exoplanet mass-radius relationships,
    drastically changing current constraints on the water content of TRAPPIST-1 planets. Unlike adiabatic structures, radiative-convective
    profiles are sensitive to opacities. New measurements of poorly constrained high-pressure opacities, in particular far
    from the H<SUB>2</SUB>O absorption bands, are thus necessary to refine models of steam atmospheres, which are important
    stages in terrestrial planet evolution.
