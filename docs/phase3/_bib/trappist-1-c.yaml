  arxiv_id: '2204.05971'
  ads_bibcode: 2022MNRAS.513.4015G
  title: 'Chemical diversity of the atmospheres and interiors of sub-Neptunes: a case study of GJ 436 b'
  authors:
  - Guzmán-Mesa, Andrea
  - Kitzmann, Daniel
  - Mordasini, Christoph
  - Heng, Kevin
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.1093/mnras/stac1066
  abstract: The atmospheres of sub-Neptunes are expected to exhibit considerable chemical diversity, beyond what is anticipated
    for gas-giant exoplanets. In the current study, we construct self-consistent radiative transfer and equilibrium chemistry
    models to explore this chemical diversity. We use GJ 436 b as a case study to further study joint atmosphere-interior
    models. In particular, we constrain the properties of the interior and atmosphere of the planet based on the available
    Spitzer measurements. While it is possible to fit the emission spectrum of GJ 436 b using a high-metallicity model, we
    demonstrate that such an atmosphere is inconsistent with physically plausible interior structures. It remains the case
    that no existing study can adequately fit the 4.5-$\mu$m Spitzer secondary eclipse measurement, which is probably caused
    by chemical disequilibrium. Finally, an information content analysis reveals that emission and transmission spectra constrain
    the carbon-to-oxygen ratio and metallicity at different wavelengths, but the former are less susceptible to flat spectra
    stemming from highly metal-enriched atmospheres. With the recently launched James Webb Space Telescope, we recommend that
    future analysis of emission and transmission spectra of sub-Neptune planets are carried out self-consistently using both
    the atmospheric and interior structure models.
