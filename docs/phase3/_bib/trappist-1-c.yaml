  ads_bibcode: 2021AGUA....200323D
  title: Constraining the Volume of Earth's Early Oceans With a Temperature Dependent Mantle Water Storage Capacity Model
  authors:
  - Dong, Junjie
  - Fischer, Rebecca A.
  - Stixrude, Lars P.
  - Lithgow-Bertelloni, Carolina R.
  year: '2021'
  pubdate: '2021-03-00'
  doi: 10.1029/2020AV000323
  abstract: 'The water content in Earth''s mantle today remains poorly constrained, but the bulk water storage capacity in
    the solid mantle can be quantified based on experimental data and may amount to a few times the modern surface ocean mass
    (OM). An appreciation of the mantle water storage capacity is indispensable to our understanding of how water may have
    cycled between the surface and mantle reservoirs and changed the volume of the oceans through time. In this study, we
    parameterized high pressure temperature experimental data on water storage capacities in major rock forming minerals to
    track the bulk water storage capacity in Earth''s solid mantle as a function of temperature. We find that the mantle water
    storage capacity decreases as mantle potential temperature (T<SUB>p</SUB>) increases, and its estimated value depends
    on the water storage capacity of bridgmanite in the lower mantle: 1.86-4.41 OM with a median of 2.29 OM for today (T<SUB>p</SUB>
    = 1600 K), and 0.52-1.69 OM with a median of 0.72 OM for the early Earth''s solid mantle (for a T<SUB>p</SUB> that was
    300 K higher). An increase in T<SUB>p</SUB> by 200-300 K results in a decrease in the mantle water storage capacity by
    1.19‒0.16+0.9 -1.56‒0.22+1.1 OM. We explored how the volume of early oceans may have controlled sea level during the early
    Archean (4-3.2 Ga) with some additional assumptions about early continents. We found that more voluminous surface oceans
    might have existed if the actual mantle water content today is &gt; 0.3-0.8 OM and the early Archean T<SUB>p</SUB> was
    ≥1900 K.'
