  arxiv_id: '0710.5651'
  ads_bibcode: 2008Icar..193..641L
  title: A proof that tidal heating in a synchronous rotation is always larger than in an asymptotic nonsynchronous rotation
    state
  authors:
  - Levrard, B.
  year: '2008'
  pubdate: '2008-02-00'
  doi: 10.1016/j.icarus.2007.10.003
  abstract: In a recent paper, Wisdom [Wisdom, J., 2008. Icarus, 193, 637-640] derived concise expressions for the rate of
    tidal dissipation in a synchronously rotating body for arbitrary orbital eccentricity and obliquity. He provided numerical
    evidence than the derived rate is always larger than in an asymptotic nonsynchronous rotation state at any obliquity and
    eccentricity. Here, I present a simple mathematical proof of this conclusion and show that this result still holds for
    any spin-orbit resonance.
