- &id327
  arxiv_id: '2007.12037'
  ads_bibcode: 2020E&PSL.55016546L
  title: Can volcanism build hydrogen-rich early atmospheres?
  authors:
  - Liggins, Philippa
  - Shorttle, Oliver
  - Rimmer, Paul B.
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.1016/j.epsl.2020.116546
  abstract: Hydrogen in rocky planet atmospheres has been invoked in arguments for extending the habitable zone via N<SUB>2</SUB>-H<SUB>2</SUB>
    and CO<SUB>2</SUB>-H<SUB>2</SUB> greenhouse warming, and providing atmospheric conditions suitable for efficient production
    of prebiotic molecules. On Earth and Super-Earth-sized bodies, where hydrogen-rich primordial envelopes are quickly lost
    to space, volcanic outgassing can act as a hydrogen source, provided it balances the hydrogen loss rate from the top of
    the atmosphere. Here, we show that both Earth-like and Mars-like planets can sustain atmospheric H<SUB>2</SUB> fractions
    of several percent across relevant magmatic fO<SUB>2</SUB> ranges. In general this requires hydrogen escape to operate
    somewhat less efficiently than the diffusion limit. We use a thermodynamical model of magma degassing to determine which
    combinations of magma oxidation, volcanic flux and hydrogen escape efficiency can build up appreciable levels of hydrogen
    in a planet's secondary atmosphere. On a planet similar to the Archean Earth and with a similar magmatic fO<SUB>2</SUB>,
    we suggest that the mixing ratio of atmospheric H<SUB>2</SUB> could have been in the range 0.2-3%, from a parameter sweep
    over a variety of plausible surface pressures, volcanic fluxes, and H<SUB>2</SUB> escape rates. A planet erupting magmas
    around the Iron-Wüstite (IW) buffer (i.e., ∼3 log fO<SUB>2</SUB> units lower than the inferred Archean mantle fO<SUB>2</SUB>),
    but with otherwise similar volcanic fluxes and H<SUB>2</SUB> loss rates to early Earth, could sustain an atmosphere with
    approximately 10-20% H<SUB>2</SUB>. For an early Mars-like planet with magmas around IW, but a lower range of surface
    pressures and volcanic fluxes compared to Earth, an atmospheric H<SUB>2</SUB> mixing ratio of ∼2-8% is possible. On early
    Mars, this H<SUB>2</SUB> mixing ratio could be sufficient to deglaciate the planet. However, the sensitivity of these
    results to primary magmatic water contents and volcanic fluxes show the need for improved constraints on the crustal recycling
    efficiency and mantle water contents of early Mars.
