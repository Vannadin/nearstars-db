- &id266
  arxiv_id: '1810.06559'
  ads_bibcode: 2019AJ....157...64L
  title: 'starry: Analytic Occultation Light Curves'
  authors:
  - Luger, Rodrigo
  - Agol, Eric
  - Foreman-Mackey, Daniel
  - Fleming, David P.
  - Lustig-Yaeger, Jacob
  - Deitrick, Russell
  year: '2019'
  pubdate: '2019-02-00'
  doi: 10.3847/1538-3881/aae8e5
  abstract: We derive analytic, closed form, numerically stable solutions for the total flux received from a spherical planet,
    moon, or star during an occultation if the specific intensity map of the body is expressed as a sum of spherical harmonics.
    Our expressions are valid to arbitrary degree and may be computed recursively for speed. The formalism we develop here
    applies to the computation of stellar transit light curves, planetary secondary eclipse light curves, and planet-planet/planet-moon
    occultation light curves, as well as thermal (rotational) phase curves. In this paper, we also introduce starry, an open-source
    package written in C++ and wrapped in Python that computes these light curves. The algorithm in starry is six orders of
    magnitude faster than direct numerical integration and several orders of magnitude more precise. starry also computes
    analytic derivatives of the light curves with respect to all input parameters for use in gradient-based optimization and
    inference, such as Hamiltonian Monte Carlo (HMC), allowing users to quickly and efficiently fit observed light curves
    to infer properties of a celestial body’s surface map. (Please see <A href="https://github.com/rodluger/starry">https://github.com/rodluger/starry</A>,
    <A href="https://rodluger.github.io/starry/">https://rodluger.github.io/starry/</A>, and <A href="https://doi.org/10.5281/zenodo.1312286">https://doi.org/10.5281/zenodo.1312286</A>).
