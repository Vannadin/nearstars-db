  arxiv_id: '1811.04877'
  ads_bibcode: 2019AJ....157...11W
  title: 'Disentangling the Planet from the Star in Late-Type M Dwarfs: A Case Study of TRAPPIST-1g'
  authors:
  - Wakeford, H. R.
  - Lewis, N. K.
  - Fowler, J.
  - Bruno, G.
  - Wilson, T. J.
  - Moran, S. E.
  - Valenti, J.
  - Batalha, N. E.
  - Filippazzo, J.
  - Bourrier, V.
