  arxiv_id: '1704.02957'
  ads_bibcode: 2017ApJ...840L..19T
  title: Convergent Migration Renders TRAPPIST-1 Long-lived
  authors:
  - Tamayo, Daniel
  - Rein, Hanno
  - Petrovich, Cristobal
  - Murray, Norman
  year: '2017'
  pubdate: '2017-05-00'
  doi: 10.3847/2041-8213/aa70ea
  abstract: TRAPPIST-1 is a late M-dwarf orbited by seven Earth-sized planets with orbital period ratios near a chain of mean
    motion resonances. Due to uncertain system parameters, most orbital configurations drawn from the inferred posterior distribution
    are unstable on short timescales of ∼0.5 Myr, even when including the eccentricity damping effect of tides. By contrast,
    we show that most physically plausible resonant configurations generated through disk migration are stable even without
    tidal dissipation on timescales of at least 50 Myr (10<SUP>10</SUP> orbits), an increase of at least two orders of magnitude.
    This result, together with the remarkable chain of period ratios in the system, provide strong evidence for convergent
    migration naturally emplacing the system near an equilibrium configuration forced by the resonant chain. We provide an
    openly available database of physically plausible initial conditions for TRAPPIST-1 generated through parameterized planet-disk
    interactions, as well as bit-by-bit reproducible N-body integrations over 10<SUP>9</SUP>-10<SUP>10</SUP> orbits.
