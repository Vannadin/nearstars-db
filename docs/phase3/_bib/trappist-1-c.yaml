  arxiv_id: '2503.09698'
  ads_bibcode: 2025AJ....169..239M
  title: Low 4.5 μm Dayside Emission Disfavors a Dark Bare-rock Scenario for the Hot Super-Earth TOI-431 b
  authors:
  - Monaghan, Christopher
  - Roy, Pierre-Alexis
  - Benneke, Björn
  - Crossfield, Ian J. M.
  - Coulombe, Louis-Philippe
  - Piaulet-Ghorayeb, Caroline
