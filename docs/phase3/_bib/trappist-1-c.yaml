  doi: 10.3847/2041-8213/aa7eca
  abstract: The discovery of exoplanets orbiting red dwarfs, such as Proxima Centauri b, has led to questions of their habitability
    and capacity to retain liquid surface water. While Proxima b is in a “temperate orbit,” I.e., an Earth at that location
    would not freeze or boil its oceans, its proximity to a parent star with quite high magnetic activity is likely to influence
    its atmospheric evolution and habitability. Planetary magnetic fields can prevent direct stripping away of the planetary
    atmosphere by the stellar wind, but ion escape can still occur at the magnetic poles. This process, the polar wind, is
    well known to occur at Earth and may have contributed to the habitability of Earth’s early atmosphere. The polar wind
    is highly variable and sensitive to both ionizing radiation and geomagnetic activity. The higher ionizing radiation levels
    of M dwarfs at habitable zone distances are expected to increase the polar wind by orders of magnitude and, instead of
    helping create a habitable atmosphere, may strip away enough volatiles to render the planet inhospitable. Here, we compute
    the ionospheric outflow of an Earth-twin subject to the enhanced stellar EUV flux of Proxima b, and the effect on atmospheric
    escape timescales. We show that an Earth-like planet would not survive the escape of its atmosphere at that location,
    and therefore the pathway to habitability for Proxima b requires a very different atmospheric history than that of Earth.
