- &id285
  arxiv_id: '1603.09167'
  ads_bibcode: 2016MNRAS.459.2408A
  title: 'K2SC: flexible systematics correction and detrending of K2 light curves using Gaussian process regression'
  authors:
  - Aigrain, S.
  - Parviainen, H.
  - Pope, B. J. S.
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.1093/mnras/stw706
  abstract: We present K2SC (K2 Systematics Correction), a PYTHON pipeline to model instrumental systematics and astrophysical
    variability in light curves from the K2 mission. K2SC uses Gaussian Process regression to model position-dependent systematics
    and time-dependent variability simultaneously, enabling the user to remove both (e.g. for transit searches) or to remove
    systematics while preserving variability (for variability studies). For periodic variables, K2SC automatically computes
    estimates of the period, amplitude and evolution time-scale of the variability. We apply K2SC to publicly available K2
    data from Campaigns 3-5 showing that we obtain photometric precision approaching that of the original Kepler mission.
    We compare our results to other publicly available K2 pipelines, showing that we obtain similar or better results, on
    average. We use transit injection and recovery tests to evaluate the impact of K2SC on planetary transit searches in K2
    Pre-search Data Conditioning data, for planet-to-star radius ratios down to R<SUB>p</SUB>/R<SUB>*</SUB> = 0.01 and periods
    up to P = 40 d, and show that K2SC significantly improves the ability to distinguish between true and false detections,
    particularly for small planets. K2SC can be run automatically on many light curves, or manually tailored for specific
    objects such as pulsating stars or large amplitude eclipsing binaries. It can be run on ASCII and FITS light-curve files,
    regardless of their origin. Both the code and the processed light curves are publicly available, and we provide instructions
    for downloading and using them. The methodology used by K2SC will be applicable to future transit search missions such
    as TESS and PLATO.
  source: citation_of=2018A&A...613A..68G
