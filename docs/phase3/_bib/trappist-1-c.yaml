  abstract: Carbon dioxide (CO<SUB>2</SUB>) is a key chemical species that is found in a wide range of planetary atmospheres.
    In the context of exoplanets, CO<SUB>2</SUB> is an indicator of the metal enrichment (that is, elements heavier than helium,
    also called `metallicity')<SUP>1-3</SUP>, and thus the formation processes of the primary atmospheres of hot gas giants<SUP>4-6</SUP>.
    It is also one of the most promising species to detect in the secondary atmospheres of terrestrial exoplanets<SUP>7-9</SUP>.
    Previous photometric measurements of transiting planets with the Spitzer Space Telescope have given hints of the presence
    of CO<SUB>2</SUB>, but have not yielded definitive detections owing to the lack of unambiguous spectroscopic identification<SUP>10-12</SUP>.
    Here we present the detection of CO<SUB>2</SUB> in the atmosphere of the gas giant exoplanet WASP-39b from transmission
    spectroscopy observations obtained with JWST as part of the Early Release Science programme<SUP>13,14</SUP>. The data
    used in this study span 3.0-5.5 micrometres in wavelength and show a prominent CO<SUB>2</SUB> absorption feature at 4.3
    micrometres (26-sigma significance). The overall spectrum is well matched by one-dimensional, ten-times solar metallicity
    models that assume radiative-convective-thermochemical equilibrium and have moderate cloud opacity. These models predict
    that the atmosphere should have water, carbon monoxide and hydrogen sulfide in addition to CO<SUB>2</SUB>, but little
    methane. Furthermore, we also tentatively detect a small absorption feature near 4.0 micrometres that is not reproduced
    by these models.
