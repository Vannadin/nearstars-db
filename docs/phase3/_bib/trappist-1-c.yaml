  - Hooton, M. J.
  - Kitzmann, D.
  - Prinoth, B.
  - Eastman, J. D.
  - Barnes, R.
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.1051/0004-6361/202452611
  abstract: Context. M-dwarf systems offer an opportunity to study terrestrial exoplanetary atmospheres due to their small
    size and cool temperatures. However, the extreme conditions imposed by these host stars raise a question about whether
    their close-in rocky planets are able to retain any atmosphere at all. Aims. The Hot Rocks Survey aims to answer this
    question by targeting nine different M-dwarf rocky planets spanning a range of planetary and stellar properties. Of these,
    LHS 1478 b orbits an M3-type star, has an equilibrium temperature of T<SUB>eq</SUB> = 585 K, and receives 21 times Earth's
    instellation. Methods. We observed two secondary eclipses of LHS 1478 b using photometric imaging at 15 µm using the Mid-Infrared
    Instrument on the James Webb Space Telescope (JWST MIRI) to measure thermal emission from the dayside of the planet. We
    compared these values to atmospheric models to evaluate potential heat transport and CO<SUB>2</SUB> absorption signatures.
    Results. We find that a secondary eclipse depth of 138 ± 53 ppm at the expected time for a circular orbit is preferred
    over a null model at 2.8σ, a moderate detection, though dynamical models do favour a non-eccentric orbit for this planet.
    The second observation results in a non-detection due to significantly larger unexplained systematics. Based on the first
    observation alone, we can reject the null hypothesis of the dark (zero Bond albedo) no atmosphere bare rock model with
    a confidence level of 3.3σ, though for A<SUB>B</SUB> = 0.2 the significance decreases to 2.1σ. The tentative secondary
    eclipse depth is consistent with the majority of the atmospheric scenarios we considered, spanning CO<SUB>2</SUB>-rich
    atmospheres with surface pressures from 0.1 to 10 bar. However, we stress that the two observations from our programme
    do not yield consistent results, and more observations are needed to verify our findings. The Hot Rocks Survey serves
    as a relevant primer for future endeavours such as the Director's Discretionary Time (DDT) Rocky Worlds programme.
