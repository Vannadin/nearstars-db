  arxiv_id: '1907.13150'
  ads_bibcode: 2019ApJ...886..141M
  title: Identifying Atmospheres on Rocky Exoplanets through Inferred High Albedo
  authors:
  - Mansfield, Megan
  - Kite, Edwin S.
  - Hu, Renyu
  - Koll, Daniel D. B.
  - Malik, Matej
  - Bean, Jacob L.
