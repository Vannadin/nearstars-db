- &id089
  arxiv_id: '2308.15110'
  ads_bibcode: 2023A&A...679A.126T
  title: Water condensation zones around main sequence stars
  authors:
  - Turbet, Martin
  - Fauchez, Thomas J.
  - Leconte, Jeremy
  - Bolmont, Emeline
  - Chaverot, Guillaume
  - Forget, Francois
  - Millour, Ehouarn
  - Selsis, Franck
  - Charnay, Benjamin
  - Ducrot, Elsa
  - Gillon, Michaël
  - Maurel, Alice
  - Villanueva, Geronimo L.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1051/0004-6361/202347539
  abstract: Understanding the set of conditions that allow rocky planets to have liquid water on their surface, in the form
    of lakes, seas, or oceans, is a major scientific step in determining the fraction of planets potentially suitable for
    the emergence and development of life as we know it on Earth. This effort is also necessary to define and refine what
    is known as the habitable zone (HZ) in order to guide the search for exoplanets likely to harbor remotely detectable life
    forms. To date, most numerical climate studies on this topic have focused on the conditions necessary to maintain oceans,
    but not to form them in the first place. Here we use the three-dimensional Generic Planetary Climate Model, historically
    known as the LMD generic global climate model, to simulate water-dominated planetary atmospheres around different types
    of main sequence stars. The simulations are designed to reproduce the conditions of early ocean formation on rocky planets
    due to the condensation of the primordial water reservoir at the end of the magma ocean phase. We show that the incoming
    stellar radiation (ISR) required to form oceans by condensation is always drastically lower than that required to vaporize
    oceans. We introduce a water condensation limit, which lies at significantly lower ISR than the inner edge of the HZ calculated
    with three-dimensional numerical climate simulations. This difference is due to a behavior change of water clouds, from
    low-altitude dayside convective clouds to high-altitude nightside stratospheric clouds. Finally, we calculated the transit
    spectra, emission spectra, and thermal phase curves of TRAPPIST-1b, c, and d with H<SUB>2</SUB>O-rich atmospheres, and
    compared them to CO<SUB>2</SUB> atmospheres and bare rock simulations. We show using these observables that JWST has the
    capability to probe steam atmospheres on low-mass planets, and could possibly test the existence of nightside water clouds.
  source: citation_of=2025ApJ...979L...5R
