  arxiv_id: '2206.08247'
  ads_bibcode: 2022MNRAS.517.4070S
  title: 'FASTCHEM 2 : an improved computer program to determine the gas-phase chemical equilibrium composition for arbitrary
    element distributions'
  authors:
  - Stock, Joachim W.
  - Kitzmann, Daniel
  - Patzer, A. Beate C.
  year: '2022'
  pubdate: '2022-12-00'
  doi: 10.1093/mnras/stac2623
  abstract: The computation of complex neutral/ionized chemical equilibrium compositions is invaluable to obtain scientific
    insights of, for example, the atmospheres of extrasolar planets and cool stars. We present FASTCHEM 2 , a new version
    of the established semi-analytical thermochemical equilibrium code FASTCHEM. Whereas the original version is limited to
    atmospheres containing a significant amount of hydrogen, FASTCHEM 2 is also applicable to chemical mixtures dominated
    by any other species, such as CO<SUB>2</SUB> or N<SUB>2</SUB>. The new C++ code and an optional PYTHON module are publicly
    available under the GPLv3 license. The program is backward compatible so that the previous version can be easily substituted.
    We updated the thermochemical data base by adding HNC, FeH, TiH, Ca<SUP>-</SUP>, and some organic molecules. In total
    523 species are now in the thermochemical data base including 28 chemical elements. The user can reduce the total number
    of species to, for example, increase the computation performance or can add further species if the thermochemical data
    are available. The program is validated against its previous version and extensively tested over an extended pressure-temperature
    grid with pressures ranging from $10^{-13}$ up to $10^3\, \mathrm{bar}$ and temperatures between $100$ and $6000\, \mathrm{K}$.
    FASTCHEM 2 is successfully applied to a number of different scenarios including nitrogen-, carbon-, and oxygen-dominated
    atmospheres and test cases without hydrogen and helium. Averaged over the extended pressure-temperature grid FASTCHEM
    2 is up to 50 times faster than the previous version and is also applicable to situations not treatable with version 1.
