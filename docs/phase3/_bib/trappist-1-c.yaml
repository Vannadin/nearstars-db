  ads_bibcode: 2023AN....34430075J
  title: The sulfur species in hot rocky exoplanet atmospheres
  authors:
  - Janssen, L. J.
  - Woitke, P.
  - Herbort, O.
  - Min, M.
  - Chubb, K. L.
  - Helling, Ch.
  - Carone, L.
  year: '2023'
  pubdate: '2023-12-00'
  doi: 10.1002/asna.20230075
  abstract: The first JWST observations of hot Jupiters showed an unexpected detection of SO in their hydrogen−rich atmospheres.
    We investigate how much sulfur can be expected in the atmospheres of rocky exoplanets and which sulfur molecules can be
    expected to be most abundant and detectable by transmission spectroscopy. We run thermochemical equilibrium models at
    the crust─atmosphere interface, considering surface temperatures 500─5000 K, surface pressures 1─100 bar, and various
    sets of element abundances based on common rock compositions. Between 1000 and 2000 K, we find gaseous sulfur concentrations
    of up to 25% above the rock in our models. SO, SO, HS, and S are by far the most abundant sulfur molecules. SO shows potentially
    detectable features in transmission spectra at about 4 m, between 7 and 8 m, and beyond 15 m. In contrast, the sometimes
    abundant HS molecule is difficult to detect in these spectra, which are mostly dominated by HO and CO. Although the molecule
    PS only occurs with concentrations ppm, it can cause a strong absorption feature between 0.3 and 0.65 m in some of our
    models for high surface pressures. The detection of sulfur molecules would enable a better characterization of the planetary
    surface.
