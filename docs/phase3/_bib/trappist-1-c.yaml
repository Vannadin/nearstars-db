  ads_bibcode: 2024ApJ...974L...7F
  title: Lava Worlds Surface Measurements at High Temperatures
  authors:
  - Fortin, Marc-Antoine
  - Gazel, Esteban
  - Williams, Daniel B.
  - Thompson, James O.
  - Kaltenegger, Lisa
  - Ramsey, Michael S.
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.3847/2041-8213/ad7d89
  abstract: First measurements of the emission of lava worlds with the James Webb Space Telescope (JWST) probe the conditions
    on worlds so hot that their surfaces are likely molten or partially molten. These observations provide a unique opportunity
    to explore rocky planets' evolution. Surfaces of lava world exoplanets can give insights into their composition and their
    interior workings. However, data of spectral emissivity of a wide range of potential exoplanet surface compositions and
    temperatures is required to understand JWST data. Here, we chose eight synthetic, potential exoplanet surfaces that span
    a wide range of chemical compositions to provide observers with a tool for the interpretation of JWST data for the exploration
    of lava worlds. We present the measured infrared emissivity spectra (2.5─20 μm) of these materials for temperatures between
    800° C and 1350° C. Our data comprise the first spectral library of possible high-temperature exoplanet surfaces. From
    these measurements, we establish the link between composition and a strong spectral feature at around 9 μm, the Christiansen
    frequency (CF) for different temperatures. Additionally, we report that the shift in the CF associated with the bulk composition
    of the material is significantly more important than its temperature. This provides a critical tool to aid in interpreting
    future spectra of lava worlds that will be collected by the JWST and future missions.
