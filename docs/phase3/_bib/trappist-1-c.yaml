  title: Hot, rocky and warm, puffy super-Earths orbiting TOI-402 (HD 15337)
  authors:
  - Dumusque, Xavier
  - Turner, Oliver
  - Dorn, Caroline
  - Eastman, Jason D.
  - Allart, Romain
  - Adibekyan, Vardan
