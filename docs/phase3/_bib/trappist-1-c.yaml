  title: The nature of the TRAPPIST-1 exoplanets
  authors:
  - Grimm, Simon L.
  - Demory, Brice-Olivier
  - Gillon, Michaël
  - Dorn, Caroline
  - Agol, Eric
  - Burdanov, Artem
  - Delrez, Laetitia
  - Sestovic, Marko
  - Triaud, Amaury H. M. J.
  - Turbet, Martin
  - Bolmont, Émeline
  - Caldas, Anthony
  - de Wit, Julien
  - Jehin, Emmanuël
  - Leconte, Jérémy
  - Raymond, Sean N.
  - Van Grootel, Valérie
  - Burgasser, Adam J.
  - Carey, Sean
  - Fabrycky, Daniel
  - Heng, Kevin
