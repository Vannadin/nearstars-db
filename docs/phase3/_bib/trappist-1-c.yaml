  abstract: We have recently completed reconnaissance studies of the TRAPPIST-1 system with the Spitzer and Hubble Space Telescopes.
    Owing to a 20-d long follow-up with Spitzer, we have now constrained the system architecture up to the ice line. Thanks
    to 4 non-consecutive HST/STIS orbits, we have determined the potential for further studies of the system in the UV--notably
    to search for hydrogen exospheres--and characterized the UV environment of TRAPPIST-1's planets, which is an essential
    contributing factor to their potential habitability. These reconnaissance studies with the synergetic Great Observatories
    emphasize the system uniqueness for Earth-sized comparative planetology and for the search for extrasolar habitats. <P
    />We request here 5 consecutive HST/STIS orbits to build upon our UV exploratory program and confirm the presence of an
    extended exosphere exosphere around TRAPPIST-1~c. These observations will inform us on its volatile reservoir while complementing
    the insights gained with HST/WFC3 (GOs 14500 and 14873). Our request for immediate HST/STIS followup will fulfill the
    urgent need to inform the community about TRAPPIST-1 planets in order to guide their follow-up, notably in the context
    of the upcoming JWST Cycle 1 proposal.
