  arxiv_id: '2001.05037'
  ads_bibcode: 2020ApJS..247...55H
  title: An Accurate, Extensive, and Practical Line List of Methane for the HITEMP Database
  authors:
  - Hargreaves, Robert J.
  - Gordon, Iouli E.
  - Rey, Michael
  - Nikitin, Andrei V.
  - Tyuterev, Vladimir G.
  - Kochanov, Roman V.
