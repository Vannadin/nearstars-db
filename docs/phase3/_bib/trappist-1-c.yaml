  abstract: We report the discovery and characterization of two small transiting planets orbiting the bright M3.0V star TOI-1468
    (LSPM J0106+1913), whose transit signals were detected in the photometric time series in three sectors of the TESS mission.
    We confirm the planetary nature of both of them using precise radial velocity measurements from the CARMENES and MAROON-X
    spectrographs, and supplement them with ground-based transit photometry. A joint analysis of all these data reveals that
    the shorter-period planet, TOI-1468 b (P<SUB>b</SUB> = 1.88 d), has a planetary mass of M<SUB>b</SUB> = 3.21 ± 0.24M<SUB>⊕</SUB>
    and a radius of R<SUB>b</SUB> = 1.280<SUB>‒0.039</SUB><SUP>+0.038</SUP> R<SUB>⊕</SUB>, resulting in a density of ρ<SUB>b</SUB>
    = 8.39<SUB>‒0.92</SUB><SUP>+1.05</SUP> g cm<SUP>‒3</SUP>, which is consistent with a mostly rocky composition. For the
    outer planet, TOI-1468 c (P<SUB>c</SUB> = 15.53 d), we derive a mass of M<SUB>c</SUB> = 6.64<SUB>‒0.68</SUB><SUP>+0.67</SUP>
    M<SUB>⊕</SUB>,aradius of R<SUB>c</SUB> = 2.06 ± 0.04 R<SUB>⊕</SUB>, and a bulk density of ρ<SUB>c</SUB> = 2.00<SUB>‒0.19</SUB><SUP>+0.21</SUP>
    g cm<SUP>‒3</SUP>, which corresponds to a rocky core composition with a H/He gas envelope. These planets are located on
    opposite sides of the radius valley, making our system an interesting discovery as there are only a handful of other systems
    with the same properties. This discovery can further help determine a more precise location of the radius valley for small
    planets around M dwarfs and, therefore, shed more light on planet formation and evolution scenarios. <P />Radial velocities
    and photometry are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A>
