- &id331
  arxiv_id: null
  ads_bibcode: 2017JGRE..122.1539M
  title: Thermal radiation of magma ocean planets using a 1-D radiative-convective model of H<SUB>2</SUB>O-CO<SUB>2</SUB>
    atmospheres
  authors:
  - Marcq, E.
  - Salvador, A.
  - Massol, H.
  - Davaille, A.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.1002/2016JE005224
  abstract: 'This paper presents an updated version of the simple 1-D radiative-convective H<SUB>2</SUB>O-CO<SUB>2</SUB> atmospheric
    model from Marcq (2012) and used by Lebrun et al. (2013) in their coupled interior-atmosphere model. This updated version
    includes a correction of a major miscalculation of the outgoing longwave radiation (OLR) and extends the validity of the
    model (P coordinate system, possible inclusion of N<SUB>2</SUB>, and improved numerical stability). It confirms the qualitative
    findings of Marcq (2012), namely, (1) the existence of a blanketing effect in any H<SUB>2</SUB>O-dominated atmosphere:
    the outgoing longwave radiation (OLR) reaches an asymptotic value, also known as Nakajima''s limit and first evidenced
    by Nakajima et al. (1992), around 280 W/m<SUP>2</SUP> neglecting clouds, significantly higher than our former estimate
    from Marcq (2012). (2) The blanketing effect breaks down for a given threshold temperature T<SUB>∊</SUB>, with a fast
    increase of OLR with increasing surface temperature beyond this threshold, making extrasolar planets in such an early
    stage of their evolution easily detectable near 4 μm provided they orbit a red dwarf. T<SUB>∊</SUB> increases strongly
    with H<SUB>2</SUB>O surface pressure, but increasing CO<SUB>2</SUB> pressure leads to a slight decrease of T<SUB>∊</SUB>.
    (3) Clouds act both by lowering Nakajima''s limit by up to 40% and by extending the blanketing effect, raising the threshold
    temperature T<SUB>∊</SUB> by about 10%.'
