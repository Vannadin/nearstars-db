- &id092
  arxiv_id: '2301.03466'
  ads_bibcode: 2023A&A...675A.122B
  title: Redox state and interior structure control on the long-term habitability of stagnant-lid planets
  authors:
  - Baumeister, Philipp
  - Tosi, Nicola
  - Brachmann, Caroline
  - Grenfell, John Lee
  - Noack, Lena
  year: '2023'
  pubdate: '2023-07-00'
  doi: 10.1051/0004-6361/202245791
  abstract: 'Context. A major goal in the search for extraterrestrial life is the detection of liquid water on the surface
    of exoplanets. On terrestrial planets, volcanic outgassing is a significant source of atmospheric and surface water and
    a major contributor to the long-term evolution of the atmosphere. The rate of volcanism depends on the interior evolution
    and on numerous feedback processes between the atmosphere and interior, which continuously shape atmospheric composition,
    pressure, and temperature. <BR /> Aims: We explore how key planetary parameters, such as planet mass, interior structure,
    mantle water content, and redox state, shape the formation of atmospheres that permit liquid water on the surface of planets.
    <BR /> Methods: We present the results of a comprehensive 1D model of the coupled evolution of the interior and atmosphere
    of rocky exoplanets that combines central feedback processes between these two reservoirs. We carried out more than 280
    000 simulations over a wide range of mantle redox states and volatile content, planetary masses, interior structures,
    and orbital distances in order to robustly assess the emergence, accumulation, and preservation of surface water on rocky
    planets. To establish a conservative baseline of which types of planets can outgas and sustain water on their surface,
    we focus here on stagnant-lid planets. <BR /> Results: We find that only a narrow range of the mantle redox state around
    the iron-wüstite buffer allows the formation of atmospheres that lead to long-term habitable conditions. At oxidizing
    conditions similar to those of the Earth''s mantle, most stagnant-lid planets end up in a hothouse regime akin to Venus
    due to strong CO<SUB>2</SUB> outgassing. At more reducing conditions, the amount of outgassed greenhouse gases is often
    too low to keep surface water from freezing. In addition, Mercury-like planets with large metallic cores are able to sustain
    habitable conditions at an extended range of orbital distances as a result of lower volcanic activity.'
  source: citation_of=2025MNRAS.536.2957N
