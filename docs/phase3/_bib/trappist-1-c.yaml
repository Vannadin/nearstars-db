  ads_bibcode: 2021A&A...653A..65W
  title: 'MPS-ATLAS: A fast all-in-one code for synthesising stellar spectra'
  authors:
  - Witzke, V.
  - Shapiro, A. I.
  - Cernetic, M.
  - Tagirov, R. V.
