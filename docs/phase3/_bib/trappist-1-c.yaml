  arxiv_id: '2009.07761'
  ads_bibcode: 2020PSJ.....1...58W
  title: Abundant Atmospheric Methane from Volcanism on Terrestrial Planets Is Unlikely and Strengthens the Case for Methane
    as a Biosignature
  authors:
  - Wogan, Nicholas
  - Krissansen-Totton, Joshua
  - Catling, David C.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.3847/PSJ/abb99e
  abstract: The disequilibrium combination of abundant methane and carbon dioxide has been proposed as a promising exoplanet
    biosignature that is readily detectable with upcoming telescopes such as the James Webb Space Telescope. However, few
    studies have explored the possibility of nonbiological CH<SUB>4</SUB> and CO<SUB>2</SUB> and related contextual clues.
    Here we investigate whether magmatic volcanic outgassing on terrestrial planets can produce atmospheric CH<SUB>4</SUB>
    and CO<SUB>2</SUB> with a thermodynamic model. Our model suggests that volcanoes are unlikely to produce CH<SUB>4</SUB>
    fluxes comparable to biological fluxes. Improbable cases where volcanoes produce biological amounts of CH<SUB>4</SUB>
    also produce ample carbon monoxide. We show, using a photochemical model, that high abiotic CH<SUB>4</SUB> abundances
    produced by volcanoes would be accompanied by high CO abundances, which could be a detectable false-positive diagnostic.
    Overall, when considering known mechanisms for generating abiotic CH<SUB>4</SUB> on terrestrial planets, we conclude that
    observations of atmospheric CH<SUB>4</SUB> with CO<SUB>2</SUB> are difficult to explain without the presence of biology
    when the CH<SUB>4</SUB> abundance implies a surface flux comparable to modern Earth's biological CH<SUB>4</SUB> flux.
    A small or negligible CO abundance strengthens the CH<SUB>4</SUB>+CO<SUB>2</SUB> biosignature because life readily consumes
    atmospheric CO, while reducing volcanic gases likely cause CO to build up in a planet's atmosphere. Furthermore, the difficulty
    of volcanically generated CH<SUB>4</SUB>-rich atmospheres suitable for an origin of life may favor alternatives such as
    impact-induced reducing atmospheres.
