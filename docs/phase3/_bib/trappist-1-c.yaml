- &id081
  arxiv_id: '2405.05396'
  ads_bibcode: 2024ApJ...970...32G
  title: 'Carbon Cycle Instability for High-CO<SUB>2</SUB> Exoplanets: Implications for Habitability'
  authors:
  - Graham, R. J.
  - Pierrehumbert, R. T.
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/1538-4357/ad45fb
  abstract: Implicit in the definition of the classical circumstellar habitable zone (HZ) is the hypothesis that the carbonate-silicate
    cycle can maintain clement climates on exoplanets with land and surface water across a range of instellations by adjusting
    atmospheric CO<SUB>2</SUB> partial pressure (pCO<SUB>2</SUB>). This hypothesis is made by analogy to the Earth system,
    but it is an open question whether silicate weathering can stabilize climate on planets in the outer reaches of the HZ,
    where instellations are lower than those received by even the Archean Earth and CO<SUB>2</SUB> is thought likely to dominate
    atmospheres. Since weathering products are carried from land to ocean by the action of water, silicate weathering is intimately
    coupled to the hydrologic cycle, which intensifies with hotter temperatures under Earth-like conditions. Here, we use
    global climate model simulations to demonstrate that the hydrologic cycle responds counterintuitively to changes in climate
    on planets with CO<SUB>2</SUB>-H<SUB>2</SUB>O atmospheres at low instellations and high pCO<SUB>2</SUB>, with global evaporation
    and precipitation decreasing as pCO<SUB>2</SUB> and temperatures increase at a given instellation. Within the Maher &amp;
    Chamberlain (or MAC) weathering formulation, weathering then decreases with increasing pCO<SUB>2</SUB> for a range of
    instellations and pCO<SUB>2</SUB> typical of the outer reaches of the HZ, resulting in an unstable carbon cycle that may
    lead to either runaway CO<SUB>2</SUB> accumulation or depletion of CO<SUB>2</SUB> to colder (possibly snowball) conditions.
    While the behavior of the system has not been completely mapped out, the results suggest that silicate weathering could
    fail to maintain habitable conditions in the outer reaches of the nominal HZ.
