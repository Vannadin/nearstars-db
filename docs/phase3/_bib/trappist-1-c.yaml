- &id228
  arxiv_id: '2304.02698'
  ads_bibcode: 2023ApJ...953..168I
  title: The Runaway Greenhouse Effect on Hycean Worlds
  authors:
  - Innes, Hamish
  - Tsai, Shang-Min
  - Pierrehumbert, Raymond T.
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.3847/1538-4357/ace346
  abstract: Hycean worlds are a proposed subset of sub-Neptune exoplanets with substantial water inventories, liquid surface
    oceans, and extended hydrogen-dominated atmospheres favorable for habitability. We aim to quantitatively define the inner
    edge of the Hycean habitable zone (HZ) using a 1D radiative-convective model. As a limiting case, we model a dry hydrogen-helium
    envelope above a surface ocean. For a 1 bar (10,100 bar) atmosphere, the hydrogen greenhouse effect alone sets the inner
    edge of the HZ at 0.216 au (0.58, 3.71 au) for a Sun-like G star and at 0.0364 au (0.110, 0.774 au) for an 3500 K M star.
    Introducing water vapor into the atmosphere, the runaway greenhouse instellation limit is greatly reduced due to the presence
    of superadiabatic layers where convection is inhibited. This moves the inner edge of the HZ from ≈1 au for a G star to
    1.6 au (3.85 au) for a Hycean world with a H<SUB>2</SUB>-He inventory of 1 bar (10 bar). For an M star, the inner edge
    is equivalently moved from 0.17-0.28 au (0.54 au). Our results suggest that most of the current Hycean world observational
    targets are not likely to sustain a liquid water ocean. We present an analytical framework for interpreting our results,
    finding that the maximum possible outgoing longwave radiation scales approximately inversely with the dry mass inventory
    of the atmosphere. We discuss the possible limitations of our 1D modeling and recommend the use of 3D convection-resolving
    models to explore the robustness of superadiabatic layers.
