  title: 'Refining the Transit-timing and Photometric Analysis of TRAPPIST-1: Masses, Radii, Densities, Dynamics, and Ephemerides'
  authors:
  - Agol, Eric
  - Dorn, Caroline
  - Grimm, Simon L.
  - Turbet, Martin
  - Ducrot, Elsa
  - Delrez, Laetitia
  - Gillon, Michaël
  - Demory, Brice-Olivier
  - Burdanov, Artem
  - Barkaoui, Khalid
  - Benkhaldoun, Zouhair
  - Bolmont, Emeline
  - Burgasser, Adam
  - Carey, Sean
  - de Wit, Julien
  - Fabrycky, Daniel
  - Foreman-Mackey, Daniel
  - Haldemann, Jonas
  - Hernandez, David M.
  - Ingalls, James
  - Jehin, Emmanuel
  - Langford, Zachary
  - Leconte, Jérémy
  - Lederer, Susan M.
  - Luger, Rodrigo
  - Malhotra, Renu
  - Meadows, Victoria S.
  - Morris, Brett M.
  - Pozuelos, Francisco J.
  - Queloz, Didier
  - Raymond, Sean N.
