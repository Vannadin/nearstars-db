- &id281
  arxiv_id: '1611.02897'
  ads_bibcode: 2017AJ....153...21L
  title: 'Abundances in the Local Region II: F, G, and K Dwarfs and Subgiants'
  authors:
  - Luck, R. Earle
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.3847/1538-3881/153/1/21
  abstract: 'Parameters and abundances have been derived for 1002 stars of spectral types F, G, and K, and luminosity classes
    IV and V. After culling the sample for rotational velocity and effective temperature, 867 stars remain for discussion.
    Twenty-eight elements are considered in the analysis. The α, iron-peak, and Period 5 transition metal abundances for these
    stars show a modest enhancement over solar averaging about 0.05 dex. The lanthanides are more abundant, averaging about
    +0.2 dex over solar. The question is: Are these stars enhanced, or is the Sun somewhat metal-poor relative to these stars?
    The consistency of the abundances derived here supports an argument for the latter view. Lithium, carbon, and oxygen abundances
    have been derived. The stars show the usual lithium astration as a function of mass/temperature. There are more than 100
    planet-hosts in the sample, and there is no discernible difference in their lithium content, relative to the remaining
    stars. The carbon and oxygen abundances show the well-known trend of decreasing [x/Fe] ratio with increasing [Fe/H].'
  source: citation_of=2023A&A...677A..14A
