- &id205
  arxiv_id: '1001.0012'
  ads_bibcode: 2011ApJ...729...54C
  title: The Statistics of Albedo and Heat Recirculation on Hot Exoplanets
  authors:
  - Cowan, Nicolas B.
  - Agol, Eric
  year: '2011'
  pubdate: '2011-03-00'
  doi: 10.1088/0004-637X/729/1/54
  abstract: 'If both the day-side and night-side effective temperatures of a planet can be measured, it is possible to estimate
    its Bond albedo, 0 &lt; A<SUB>B</SUB> &lt; 1, as well as its day-night heat redistribution efficiency, 0 &lt; ∊ &lt; 1.
    We attempt a statistical analysis of the albedo and redistribution efficiency for 24 transiting exoplanets that have at
    least one published secondary eclipse. For each planet, we show how to calculate a sub-stellar equilibrium temperature,
    T <SUB>0</SUB>, and associated uncertainty. We then use a simple model-independent technique to estimate a planet''s effective
    temperature from planet/star flux ratios. We use thermal secondary eclipse measurements—those obtained at λ&gt;0.8 μm—to
    estimate day-side effective temperatures, T <SUB>d</SUB>, and thermal phase variations—when available—to estimate night-side
    effective temperature. We strongly rule out the "null hypothesis" of a single A<SUB>B</SUB> and ∊ for all 24 planets.
    If we allow each planet to have different parameters, we find that low Bond albedos are favored (A<SUB>B</SUB> &lt; 0.35
    at 1σ confidence), which is an independent confirmation of the low albedos inferred from non-detections of reflected light.
    Our sample exhibits a wide variety of redistribution efficiencies. When normalized by T <SUB>0</SUB>, the day-side effective
    temperatures of the 24 planets describe a uni-modal distribution. The two biggest outliers are GJ 436b (abnormally hot)
    and HD 80606b (abnormally cool), and these are the only eccentric planets in our sample. The dimensionless quantity T
    <SUB>d</SUB>/T <SUB>0</SUB> exhibits no trend with the presence or absence of stratospheric inversions. There is also
    no clear trend between T <SUB>d</SUB>/T <SUB>0</SUB> and T <SUB>0</SUB>. That said, the six planets with the greatest
    sub-stellar equilibrium temperatures (T &gt; 2400 K) have low ∊, as opposed to the 18 cooler planets, which show a variety
    of recirculation efficiencies. This hints that the very hottest transiting giant planets are qualitatively different from
    the merely hot Jupiters. We propose an explanation of this trend based on how a planet''s radiative and advective times
    scale with temperature: both timescales are expected to be shorter for hotter planets, but the temperature dependence
    of the radiative timescale is stronger, leading to decreased heat recirculation efficiency.'
