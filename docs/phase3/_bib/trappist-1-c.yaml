- &id301
  arxiv_id: '1403.1895'
  ads_bibcode: 2014ApJ...787..132D
  title: 'TTVFast: An Efficient and Accurate Code for Transit Timing Inversion Problems'
  authors:
  - Deck, Katherine M.
  - Agol, Eric
  - Holman, Matthew J.
  - Nesvorný, David
  year: '2014'
  pubdate: '2014-06-00'
  doi: 10.1088/0004-637X/787/2/132
  abstract: Transit timing variations (TTVs) have proven to be a powerful technique for confirming Kepler planet candidates,
    for detecting non-transiting planets, and for constraining the masses and orbital elements of multi-planet systems. These
    TTV applications often require the numerical integration of orbits for computation of transit times (as well as impact
    parameters and durations); frequently tens of millions to billions of simulations are required when running statistical
    analyses of the planetary system properties. We have created a fast code for transit timing computation, TTVFast, which
    uses a symplectic integrator with a Keplerian interpolator for the calculation of transit times. The speed comes at the
    expense of accuracy in the calculated times, but the accuracy lost is largely unnecessary, as transit times do not need
    to be calculated to accuracies significantly smaller than the measurement uncertainties on the times. The time step can
    be tuned to give sufficient precision for any particular system. We find a speed-up of at least an order of magnitude
    relative to dynamical integrations with high precision using a Bulirsch-Stoer integrator.
