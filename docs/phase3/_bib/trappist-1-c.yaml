  title: 'Earth as an Extrasolar Planet: Earth Model Validation Using EPOXI Earth Observations'
  authors:
  - Robinson, Tyler D.
  - Meadows, Victoria S.
  - Crisp, David
  - Deming, Drake
  - A'Hearn, Michael F.
  - Charbonneau, David
  - Livengood, Timothy A.
  - Seager, Sara
  - Barry, Richard K.
  - Hearty, Thomas
  - Hewagama, Tilak
  - Lisse, Carey M.
  - McFadden, Lucy A.
