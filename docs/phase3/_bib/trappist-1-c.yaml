  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.1051/0004-6361/201935957
  abstract: '<BR /> Aims: L 98-59 (TIC 307210830, TOI-175) is a nearby M3 dwarf around which TESS revealed three small transiting
    planets (0.80, 1.35, 1.57 Earth radii) in a compact configuration with orbital periods shorter than 7.5 days. Here we
    aim to measure the masses of the known transiting planets in this system using precise radial velocity (RV) measurements
    taken with the HARPS spectrograph. <BR /> Methods: We considered both trained and untrained Gaussian process regression
    models of stellar activity, which are modeled simultaneously with the planetary signals. Our RV analysis was then supplemented
    with dynamical simulations to provide strong constraints on the planets'' orbital eccentricities by requiring long-term
    stability. <BR /> Results: We measure the planet masses of the two outermost planets to be 2.42 ± 0.35 and 2.31 ± 0.46
    Earth masses, which confirms the bulk terrestrial composition of the former and eludes to a significant radius fraction
    in an extended gaseous envelope for the latter. We are able to place an upper limit on the mass of the smallest, innermost
    planet of &lt;1.01 Earth masses with 95% confidence. Our RV plus dynamical stability analysis places strong constraints
    on the orbital eccentricities and reveals that each planet''s orbit likely has e &lt; 0.1. <BR /> Conclusions: L 98-59
    is likely a compact system of two rocky planets plus a third outer planet with a lower bulk density possibly indicative
    of the planet having retained a modest atmosphere. The system offers a unique laboratory for studies of planet formation,
    dynamical stability, and comparative atmospheric planetology as the two outer planets are attractive targets for atmospheric
    characterization through transmission spectroscopy. Continued RV monitoring will help refine the characterization of the
    innermost planet and potentially reveal additional planets in the system at wider separations. <P />Full Tables 2 and
    A.1 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/629/A111">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/629/A111</A>Based
    on observations made with the HARPS instrument on the ESO 3.6 m telescope under the program IDs 198.C-0838(A), 1102.C-0339(A),
    0102.C-0525, and 0102.D-0483(A) at Cerro La Silla (Chile).'
