- &id206
  arxiv_id: '0808.1908'
  ads_bibcode: 2008ApJ...688..628E
  title: Coreless Terrestrial Exoplanets
  authors:
  - Elkins-Tanton, Linda T.
  - Seager, Sara
  year: '2008'
  pubdate: '2008-11-00'
  doi: 10.1086/592316
  abstract: Differentiation in terrestrial planets is expected to include the formation of a metallic iron core. We predict
    the existence of terrestrial planets that have differentiated but have no metallic core, planets that are effectively
    a giant silicate mantle. We discuss two paths to forming a coreless terrestrial planet, whereby the oxidation state during
    planetary accretion and solidification will determine the size or existence of any metallic core. Under this hypothesis,
    any metallic iron in the bulk accreting material is oxidized by water, binding the iron in the form of iron oxide into
    the silicate minerals of the planetary mantle. The existence of such silicate planets has consequences for interpreting
    the compositions and interior density structures of exoplanets based on their mass and radius measurements.
