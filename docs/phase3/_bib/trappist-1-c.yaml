  abstract: DISORT (DIScrete Ordinate Radiative Transfer) solves the problem of 1D scalar radiative transfer in a single optical
    medium, such as a planetary atmosphere. The code correctly accounts for multiple scattering by an isotropic or plane-parallel
    beam source, internal Planck sources, and reflection from a lower boundary. Provided that polarization effects can be
    neglected, DISORT efficiently calculates accurate fluxes and intensities at any user-specified angle and location within
    the user-specified medium.
