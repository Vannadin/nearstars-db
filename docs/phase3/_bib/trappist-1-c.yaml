- &id170
  arxiv_id: '2303.15418'
  ads_bibcode: 2024AJ....168...82R
  title: Toward Robust Corrections for Stellar Contamination in JWST Exoplanet Transmission Spectra
  authors:
  - Rackham, Benjamin V.
  - de Wit, Julien
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.3847/1538-3881/ad5833
  abstract: Transmission spectroscopy is still the preferred characterization technique for exoplanet atmospheres, although
    it presents unique challenges that translate into characterization bottlenecks when robust mitigation strategies are missing.
    Stellar contamination is one such challenge that can overpower the planetary signal by up to an order of magnitude, and
    thus not accounting for it can lead to significant biases in the derived atmospheric properties. Yet this accounting may
    not be straightforward, as important discrepancies exist between state-of-the-art stellar models and measured spectra
    and between models themselves. Here we explore the extent to which stellar models can be used to reliably correct for
    stellar contamination and yield a planet's uncontaminated transmission spectrum. We find that discrepancies between stellar
    models can significantly contribute to the noise budget of JWST transmission spectra of planets around stars with heterogeneous
    photospheres, the true number of unique photospheric spectral components and their properties can only be accurately retrieved
    when the stellar models have sufficient fidelity, and under such optimistic circumstances the contribution of stellar
    contamination to the noise budget of a transmission spectrum is considerably below that of the photon noise for the standard
    transit observation setup. Therefore, we advocate for further development of model spectra of stars and their active regions
    in a data-driven manner, empirical approaches for deriving spectra of photospheric components using the observatories
    with which the atmospheric explorations are carried out, and analysis techniques accounting for multimodal posterior distributions
    for photospheric parameters of interest, which will be increasingly revealed by precise JWST measurements.
  source: citation_of=2025ApJ...979L...5R
