- &id055
  arxiv_id: '1905.06035'
  ads_bibcode: 2019MNRAS.487.1634B
  title: Ground-based follow-up observations of TRAPPIST-1 transits in the near-infrared
  authors:
  - Burdanov, A. Y.
  - Lederer, S. M.
  - Gillon, M.
  - Delrez, L.
  - Ducrot, E.
  - de Wit, J.
  - Jehin, E.
