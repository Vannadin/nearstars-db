  arxiv_id: '1811.06938'
  ads_bibcode: 2019ApJ...871...63M
  title: How to Constrain Your M Dwarf. II. The Mass-Luminosity-Metallicity Relation from 0.075 to 0.70 Solar Masses
  authors:
  - Mann, Andrew W.
  - Dupuy, Trent
  - Kraus, Adam L.
  - Gaidos, Eric
  - Ansdell, Megan
  - Ireland, Michael
  - Rizzuto, Aaron C.
  - Hung, Chao-Ling
  - Dittmann, Jason
  - Factor, Samuel
  - Feiden, Gregory
  - Martinez, Raquel A.
  - Ruíz-Rodríguez, Dary
  - Thao, Pa Chia
  year: '2019'
  pubdate: '2019-01-00'
  doi: 10.3847/1538-4357/aaf3bc
  abstract: The mass-luminosity relation for late-type stars has long been a critical tool for estimating stellar masses.
    However, there is growing need for both a higher-precision relation and a better understanding of systematic effects (e.g.,
    metallicity). Here we present an empirical relationship between {M}<SUB>{K</SUB><SUB>S</SUB>} and M <SUB>*</SUB> spanning
    0.075 M <SUB>☉</SUB> &lt; M <SUB>*</SUB> &lt; 0.70 M <SUB>☉</SUB>. The relation is derived from 62 nearby binaries, whose
    orbits we determine using a combination of Keck/NIRC2 imaging, archival adaptive optics data, and literature astrometry.
    From their orbital parameters, we determine the total mass of each system, with a precision better than 1% in the best
    cases. We use these total masses, in combination with resolved K <SUB> S </SUB> magnitudes and system parallaxes, to calibrate
    the {M}<SUB>{K</SUB><SUB>S</SUB>}-M <SUB>*</SUB> relation. The resulting posteriors can be used to determine masses of
    single stars with a precision of 2%-3%, which we confirm by testing the relation on stars with individual dynamical masses
    from the literature. The precision is limited by scatter around the best-fit relation beyond measured M <SUB>*</SUB> uncertainties,
    perhaps driven by intrinsic variation in the {M}<SUB>{K</SUB><SUB>S</SUB>}-M <SUB>*</SUB> relation or underestimated uncertainties
    in the input parallaxes. We find that the effect of [Fe/H] on the {M}<SUB>{K</SUB><SUB>S</SUB>}-M <SUB>*</SUB> relation
    is likely negligible for metallicities in the solar neighborhood (0.0% ± 2.2% change in mass per dex change in [Fe/H]).
    This weak effect is consistent with predictions from the Dartmouth Stellar Evolution Database, but inconsistent with those
    from MESA Isochrones and Stellar Tracks (at 5σ). A sample of binaries with a wider range of abundances will be required
    to discern the importance of metallicity in extreme populations (e.g., in the Galactic halo or thick disk).
