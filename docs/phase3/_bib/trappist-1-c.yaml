  arxiv_id: null
  ads_bibcode: 2024EGUGA..2618489Z
  title: No thick carbon dioxide atmosphere on the rocky exoplanet TRAPPIST-1 c
  authors:
  - Zieba, Sebastian
  - Kreidberg, Laura
  - Ducrot, Elsa
  - Gillon, Michaël.
  - Morley, Caroline
  - Schaefer, Laura
  - Tamburo, Patrick
  - Koll, Daniel D. B.
  - Lyu, Xintong
  - Acuña, Lorena
  - Agol, Eric
  - Iyer, Aishwarya R.
