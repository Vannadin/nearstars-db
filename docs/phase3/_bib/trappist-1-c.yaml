- &id121
  arxiv_id: '2409.16270'
  ads_bibcode: 2025PNAS..12223473L
  title: Extreme weather variability on hot rocky exoplanet 55 Cancri e explained by magma temperature-cloud feedback
  authors:
  - Loftus, Kaitlyn
  - Luo, Yangcheng
  - Fan, Bowen
  - Kite, Edwin S.
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.1073/pnas.2423473122
  abstract: 'This study proposes feedback between magma ocean surface temperature and reflective silicate cloud cover and
    shows how it could generate self-sustained oscillations on ultrahot rocky planets with atmospheres, driving extreme weather
    variability. These oscillations may explain three puzzling dynamic features of the exoplanet 55 Cancri e: its varying
    brightness, the changing amplitude of brightness variations over an orbit, and the shifting location of the brightest
    point on the planet. This work provides insight into how planetary-scale ocean-cloud feedbacks can drive nonlinear behaviors
    like self-oscillations in climate systems, potentially inspiring research on similar phenomena on lava planets and their
    observational prospects. If confirmed, this study would open a window into the composition, evolution, and fate of rocky
    planet volatiles.'
