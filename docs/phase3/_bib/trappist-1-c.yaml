  arxiv_id: '2005.01740'
  ads_bibcode: 2020AJ....159..275B
  title: 'A Coupled Analysis of Atmospheric Mass Loss and Tidal Evolution in XUV Irradiated Exoplanets: The TRAPPIST-1 Case
    Study'
  authors:
  - Becker, Juliette
  - Gallo, Elena
  - Hodges-Kluck, Edmund
  - Adams, Fred C.
  - Barnes, Rory
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/1538-3881/ab8fb0
  abstract: Exoplanets residing close to their stars can experience evolution of both their physical structures and their
    orbits due to the influence of their host stars. In this work, we present a coupled analysis of dynamical tidal dissipation
    and atmospheric mass loss for exoplanets in X-ray and ultraviolet (XUV) irradiated environments. As our primary application,
    we use this model to study the TRAPPIST-1 system and place constraints on the interior structure and orbital evolution
    of the planets. We start by reporting on an ultraviolet continuum flux measurement (centered around ∼1900 Å) for the star
    TRAPPIST-1, based on 300 ks of Neil Gehrels Swift Observatory data, and which enables an estimate of the XUV-driven thermal
    escape arising from XUV photodissociation for each planet. We find that the X-ray flaring luminosity, measured from our
    X-ray detections, of TRAPPIST-1 is 5.6 × 10<SUP>-4</SUP> L<SUB>*</SUB>, while the full flux including non-flaring periods
    is 6.1 × 10<SUP>-5</SUP> L<SUB>*</SUB>, when L<SUB>*</SUB> is TRAPPIST-1's bolometric luminosity. We then construct a
    model that includes both atmospheric mass loss and tidal evolution and requires the planets to attain their present-day
    orbital elements during this coupled evolution. We use this model to constrain the ratio $Q^{\prime} =3Q/2{k}_{2}$ for
    each planet. Finally, we use additional numerical models implemented with the Virtual Planet Simulator VPLanet to study
    ocean retention for these planets using our derived system parameters.
