- &id139
  arxiv_id: '2204.09946'
  ads_bibcode: 2022PSJ.....3..115I
  title: 'Reduced Atmospheres of Post-impact Worlds: The Early Earth'
  authors:
  - Itcovitz, Jonathan P.
  - Rae, Auriol S. P.
  - Citron, Robert I.
  - Stewart, Sarah T.
  - Sinclair, Catriona A.
  - Rimmer, Paul B.
  - Shorttle, Oliver
  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/PSJ/ac67a9
  abstract: 'Impacts may have had a significant effect on the atmospheric chemistry of the early Earth. Reduced phases in
    the impactor (e.g., metallic iron) can reduce the planet''s H<SUB>2</SUB>O inventory to produce massive atmospheres rich
    in H<SUB>2</SUB>. While previous studies have focused on the interactions between the impactor and atmosphere in such
    scenarios, we investigate two further effects: (1) the distribution of the impactor''s iron inventory during impact between
    the target interior, target atmosphere, and escaping the target; and (2) interactions between the post-impact atmosphere
    and the impact-generated melt phase. We find that these two effects can potentially counterbalance each other, with the
    melt-atmosphere interactions acting to restore reducing power to the atmosphere that was initially accreted by the melt
    phase. For a ~10<SUP>22</SUP> kg impactor, when the iron accreted by the melt phase is fully available to reduce this
    melt, we find an equilibrium atmosphere with H<SUB>2</SUB> column density ~10<SUP>4</SUP> moles cm<SUP>-2</SUP> (pH<SUB>2</SUB>
    ~ 120 bars, X <SUB>H2</SUB> ~ 0.77), consistent with previous estimates. However, when the iron is not available to reduce
    the melt (e.g., sinking out in large diameter blobs), we find significantly less H<SUB>2</SUB> (7 × 10<SUP>2</SUP> - 5
    × 10<SUP>3</SUP> moles cm<SUP>-2</SUP>, pH<SUB>2</SUB> ≲ 60 bars, X <SUB>H2</SUB> ≲ 0.41). These lower H<SUB>2</SUB> abundances
    are sufficiently high that species important to prebiotic chemistry can form (e.g., NH<SUB>3</SUB>, HCN), but sufficiently
    low that the greenhouse heating effects associated with highly reducing atmospheres, which are problematic to such chemistry,
    are suppressed. The manner in which iron is accreted by the impact-generated melt phase is critical in determining the
    reducing power of the atmosphere and resolidified melt pool in the aftermath of impact.'
