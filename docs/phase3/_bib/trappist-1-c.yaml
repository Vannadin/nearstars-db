  doi: 10.1016/j.icarus.2018.02.009
  abstract: In this work, we measured the absorption by CO<SUB>2 </SUB>+ H<SUB>2</SUB>O mixtures from 2400 to 2600 cm<SUP>-1</SUP>
    which corresponds to the spectral region beyond the ν<SUB>3</SUB> band head of CO<SUB>2</SUB>. Transmission spectra of
    CO<SUB>2</SUB> mixed with water vapor were recorded with a high-resolution Fourier-transform spectrometer for various
    pressure, temperature and concentration conditions. The continuum absorption by CO<SUB>2</SUB> due to the presence of
    water vapor was determined by subtracting from measured spectra the contribution of local lines of both species, that
    of the continuum of pure CO<SUB>2</SUB> as well as of the self- and CO<SUB>2</SUB>-continua of water vapor induced by
    the H<SUB>2</SUB>O-H<SUB>2</SUB>O and H<SUB>2</SUB>O-CO<SUB>2</SUB> interactions. The obtained results are in very good
    agreement with the unique previous measurement (in a narrower spectral range). They confirm that the H<SUB>2</SUB>O-continuum
    of CO<SUB>2</SUB> is significantly larger than that observed for pure CO<SUB>2</SUB>. This continuum thus must be taken
    into account in radiative transfer calculations for media involving CO<SUB>2</SUB>+ H<SUB>2</SUB>O mixture. An empirical
    model, using sub-Lorentzian line shapes based on some temperature-dependent correction factors χ is proposed which enables
    an accurate description of the experimental results.
