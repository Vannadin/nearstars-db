    two regards. First, the contribution due to the dissipation in the secondary averages out when the apsidal precession
    is uniform. Second, we have obtained an additional term which emerges owing to the conservation of the angular momentum:
    a change in the inclination of the orbit causes a change of the primary''s plane of equator.'
