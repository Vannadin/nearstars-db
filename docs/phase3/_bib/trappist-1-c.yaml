- &id118
  arxiv_id: '1204.1544'
  ads_bibcode: 2012ApJ...752....7H
  title: Theoretical Spectra of Terrestrial Exoplanet Surfaces
  authors:
  - Hu, Renyu
  - Ehlmann, Bethany L.
  - Seager, Sara
  year: '2012'
  pubdate: '2012-06-00'
  doi: 10.1088/0004-637X/752/1/7
  abstract: 'We investigate spectra of airless rocky exoplanets with a theoretical framework that self-consistently treats
    reflection and thermal emission. We find that a silicate surface on an exoplanet is spectroscopically detectable via prominent
    Si-O features in the thermal emission bands of 7-13 μm and 15-25 μm. The variation of brightness temperature due to the
    silicate features can be up to 20 K for an airless Earth analog, and the silicate features are wide enough to be distinguished
    from atmospheric features with relatively high resolution spectra. The surface characterization thus provides a method
    to unambiguously identify a rocky exoplanet. Furthermore, identification of specific rocky surface types is possible with
    the planet''s reflectance spectrum in near-infrared broad bands. A key parameter to observe is the difference between
    K-band and J-band geometric albedos (A <SUB>g</SUB>(K) - A <SUB>g</SUB>(J)): A <SUB>g</SUB>(K) - A <SUB>g</SUB>(J) &gt;
    0.2 indicates that more than half of the planet''s surface has abundant mafic minerals, such as olivine and pyroxene,
    in other words primary crust from a magma ocean or high-temperature lavas; A <SUB>g</SUB>(K) - A <SUB>g</SUB>(J) &lt;
    -0.09 indicates that more than half of the planet''s surface is covered or partially covered by water ice or hydrated
    silicates, implying extant or past water on its surface. Also, surface water ice can be specifically distinguished by
    an H-band geometric albedo lower than the J-band geometric albedo. The surface features can be distinguished from possible
    atmospheric features with molecule identification of atmospheric species by transmission spectroscopy. We therefore propose
    that mid-infrared spectroscopy of exoplanets may detect rocky surfaces, and near-infrared spectrophotometry may identify
    ultramafic surfaces, hydrated surfaces, and water ice.'
