  arxiv_id: '1702.07004'
  ads_bibcode: 2017A&A...599L...3B
  title: Reconnaissance of the TRAPPIST-1 exoplanet system in the Lyman-α line
  authors:
  - Bourrier, V.
  - Ehrenreich, D.
  - Wheatley, P. J.
  - Bolmont, E.
  - Gillon, M.
  - de Wit, J.
  - Burgasser, A. J.
  - Jehin, E.
