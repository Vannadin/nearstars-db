  arxiv_id: '2310.01725'
  ads_bibcode: 2024ApJ...964..152L
  title: Super-Earth LHS3844b is Tidally Locked
  authors:
  - Lyu, Xintong
  - Koll, Daniel D. B.
  - Cowan, Nicolas B.
  - Hu, Renyu
  - Kreidberg, Laura
  - Rose, Brian E. J.
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.3847/1538-4357/ad2077
  abstract: Short-period exoplanets on circular orbits are thought to be tidally locked into synchronous rotation. If tidally
    locked, these planets must possess permanent day- and night-sides, with extreme irradiation on the dayside and none on
    the nightside. However, so far the tidal locking hypothesis for exoplanets is supported by little to no empirical evidence.
    Previous work showed that the super-Earth LHS 3844b likely has no atmosphere, which makes it ideal for constraining the
    planet's rotation. Here we revisit the Spitzer phase curve of LHS 3844b with a thermal model of an atmosphere-less planet
    and analyze the impact of nonsynchronous rotation, eccentricity, tidal dissipation, and surface composition. Based on
    the lack of observed strong tidal heating we rule out rapid nonsynchronous rotation (including a Mercury-like 3:2 spin─orbit
    resonance) and constrain the planet's eccentricity to less than ∼0.001 (more circular than Io's orbit). In addition, LHS
    3844b's phase curve implies that the planet either still experiences weak tidal heating via a small-but-nonzero eccentricity
    (requiring an undetected orbital companion), or that its surface has been darkened by space weathering; of these two scenarios
    we consider space weathering more likely. Our results thus support the hypothesis that short-period rocky exoplanets are
    tidally locked, and further show that space weathering can significantly modify the surfaces of atmosphere-less exoplanets.
