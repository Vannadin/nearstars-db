  arxiv_id: '1908.06834'
  ads_bibcode: 2019Natur.573...87K
  title: Absence of a thick atmosphere on the terrestrial exoplanet LHS 3844b
  authors:
  - Kreidberg, Laura
  - Koll, Daniel D. B.
  - Morley, Caroline
  - Hu, Renyu
  - Schaefer, Laura
  - Deming, Drake
  - Stevenson, Kevin B.
  - Dittmann, Jason
  - Vanderburg, Andrew
  - Berardo, David
  - Guo, Xueying
  - Stassun, Keivan
