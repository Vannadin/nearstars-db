- &id284
  arxiv_id: '1608.03592'
  ads_bibcode: 2016ApJ...828L...2A
  title: Prompt Planetesimal Formation beyond the Snow Line
  authors:
  - Armitage, Philip J.
  - Eisner, Josh A.
  - Simon, Jacob B.
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.3847/2041-8205/828/1/L2
  abstract: We develop a simple model to predict the radial distribution of planetesimal formation. The model is based on
    the observed growth of dust to millimeter-sized particles, which drift radially, pile-up, and form planetesimals where
    the stopping time and dust-to-gas ratio intersect the allowed region for streaming instability-induced gravitational collapse.
    Using an approximate analytic treatment, we first show that drifting particles define a track in metallicity-stopping
    time space whose only substantial dependence is on the disk’s angular momentum transport efficiency. Prompt planetesimal
    formation is feasible for high particle accretion rates (relative to the gas, {\dot{M}}<SUB>p</SUB>/\dot{M}≳ 3× {10}<SUP>-2</SUP>
    for α ={10}<SUP>-2</SUP>), which could only be sustained for a limited period of time. If it is possible, it would lead
    to the deposition of a broad and massive belt of planetesimals with a sharp outer edge. Numerically including turbulent
    diffusion and vapor condensation processes, we find that a modest enhancement of solids near the snow line occurs for
    centimeter-sized particles, but that this is largely immaterial for planetesimal formation. We note that radial drift
    couples planetesimal formation across radii in the disk, and suggest that considerations of planetesimal formation favor
    a model in which the initial deposition of material for giant planet cores occurs well beyond the snow line.
  source: citation_of=2018A&A...613A..68G
