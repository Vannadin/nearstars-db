- &id300
  arxiv_id: '1405.7433'
  ads_bibcode: 2014ApJ...790...58N
  title: The Effect of Conjunctions on the Transit Timing Variations of Exoplanets
  authors:
  - Nesvorný, David
  - Vokrouhlický, David
  year: '2014'
  pubdate: '2014-07-00'
  doi: 10.1088/0004-637X/790/1/58
  abstract: 'We develop an analytic model for transit timing variations produced by orbital conjunctions between gravitationally
    interacting planets. If the planetary orbits have tight orbital spacing, which is a common case among the Kepler planets,
    the effect of a single conjunction can be best described as: (1) a step-like change of the transit timing ephemeris with
    subsequent transits of the inner planet being delayed and those of the outer planet being sped up, and (2) a discrete
    change in sampling of the underlying oscillations from eccentricity-related interaction terms. In the limit of small orbital
    eccentricities, our analytic model gives explicit equations for these effects as a function of the mass and orbital separation
    of planets. We point out that a detection of the conjunction effect in real data is of crucial importance for the physical
    characterization of planetary systems from transit timing variations.'
