  ads_bibcode: 2024A&A...690A.159P
  title: JWST reveals the rapid and strong day-side variability of 55 Cancri e
  authors:
  - Patel, J. A.
  - Brandeker, A.
  - Kitzmann, D.
  - Petit dit de la Roche, D. J. M.
  - Bello-Arufe, A.
  - Heng, K.
  - Meier Valdés, E.
