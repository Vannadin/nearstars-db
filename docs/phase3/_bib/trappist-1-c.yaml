  arxiv_id: '1607.03906'
  ads_bibcode: 2016ApJ...829...63S
  title: Predictions of the Atmospheric Composition of GJ 1132b
  authors:
  - Schaefer, Laura
  - Wordsworth, Robin D.
  - Berta-Thompson, Zachory
  - Sasselov, Dimitar
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.3847/0004-637X/829/2/63
  abstract: GJ 1132b is a nearby Earth-sized exoplanet transiting an M dwarf, and is among the most highly characterizable
    small exoplanets currently known. In this paper, we study the interaction of a magma ocean with a water-rich atmosphere
    on GJ 1132b and determine that it must have begun with more than 5 wt% initial water in order to still retain a water-based
    atmosphere. We also determine the amount of O<SUB>2</SUB> that can build up in the atmosphere as a result of hydrogen
    dissociation and loss. We find that the magma ocean absorbs at most ∼10% of the O<SUB>2</SUB> produced, whereas more than
    90% is lost to space through hydrodynamic drag. The most common outcome for GJ 1132b from our simulations is a tenuous
    atmosphere dominated by O<SUB>2</SUB>, though, for very large initial water abundances, atmospheres with several thousands
    of bars of O<SUB>2</SUB> are possible. A substantial steam envelope would indicate either the existence of an earlier
    H<SUB>2</SUB> envelope or low XUV flux over the system’s lifetime. A steam atmosphere would also imply the continued existence
    of a magma ocean on GJ 1132b. Further modeling is needed to study the evolution of CO<SUB>2</SUB> or N<SUB>2</SUB>-rich
    atmospheres on GJ 1132b.
