  doi: 10.3847/1538-3881/abe382
  abstract: We search for escaping helium from the hot super-Earth 55 Cnc e by taking high-resolution spectra of the 1083
    nm line during two transits using Keck/NIRSPEC. We detect no helium absorption down to a 90% upper limit of 250 ppm in
    excess absorption or 0.27 mÅ in equivalent width. This corresponds to a mass-loss rate of less than ∼10<SUP>9</SUP> g
    s<SUP>-1</SUP> assuming a Parker wind model with a plausible exosphere temperature of 5000-6000 K, although the precise
    constraint is heavily dependent on model assumptions. We consider both hydrogen- and helium-dominated atmospheric compositions
    and find similar bounds on the mass-loss rate in both scenarios. Our hydrodynamical models indicate that if a lightweight
    atmosphere exists on 55 Cnc e, our observations would have easily detected it. Together with the nondetection of Lyα absorption
    by Ehrenreich et al., our helium nondetection indicates that 55 Cnc e either never accreted a primordial atmosphere in
    the first place or lost its primordial atmosphere shortly after the dissipation of the gas disk. * The data presented
    herein were obtained at the W. M. Keck Observatory, which is operated as a scientific partnership among the California
    Institute of Technology, the University of California, and the National Aeronautics and Space Administration. The Observatory
    was made possible by the generous financial support of the W. M. Keck Foundation.
