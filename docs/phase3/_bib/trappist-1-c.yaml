- &id296
  arxiv_id: '1410.3832'
  ads_bibcode: 2014A&A...572A..78D
  title: Can dust coagulation trigger streaming instability?
  authors:
  - Drążkowska, J.
  - Dullemond, C. P.
  year: '2014'
  pubdate: '2014-12-00'
  doi: 10.1051/0004-6361/201424809
  abstract: 'Context. Streaming instability can be a very efficient way of overcoming growth and drift barriers to planetesimal
    formation. However, it was shown that strong clumping, which leads to planetesimal formation, requires a considerable
    number of large grains. State-of-the-art streaming instability models do not take into account realistic size distributions
    resulting from the collisional evolution of dust. <BR /> Aims: We investigate whether a sufficient quantity of large aggregates
    can be produced by sticking and what the interplay of dust coagulation and planetesimal formation is. <BR /> Methods:
    We develop a semi-analytical prescription of planetesimal formation by streaming instability and implement it in our dust
    coagulation code based on the Monte Carlo algorithm with the representative particles approach. <BR /> Results: We find
    that planetesimal formation by streaming instability may preferentially work outside the snow line, where sticky icy aggregates
    are present. The efficiency of the process depends strongly on local dust abundance and radial pressure gradient, and
    requires a super-solar metallicity. If planetesimal formation is possible, the dust coagulation and settling typically
    need ~100 orbits to produce sufficiently large and settled grains and planetesimal formation lasts another ~1000 orbits.
    We present a simple analytical model that computes the amount of dust that can be turned into planetesimals given the
    parameters of the disk model.'
