  ads_bibcode: 2025ApJ...979L...5R
  title: 'Promise and Peril: Stellar Contamination and Strict Limits on the Atmosphere Composition of TRAPPIST-1 c from JWST
    NIRISS Transmission Spectra'
  authors:
  - Radica, Michael
