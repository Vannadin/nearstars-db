  arxiv_id: '2311.16722'
  ads_bibcode: 2024MNRAS.529.2686L
  title: Dynamically coupled kinetic chemistry in brown dwarf atmospheres - II. Cloud and chemistry connections in directly
    imaged sub-Jupiter exoplanets
  authors:
  - Lee, Elspeth K. H.
  - Tan, Xianyu
  - Tsai, Shang-Min
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.1093/mnras/stae537
  abstract: With JWST slated to gain high-fidelity time-dependent data on brown dwarf atmospheres, it is highly anticipated
    to do the same for directly imaged, sub-Jupiter exoplanets. With this new capability, the need for a full three-dimensional
    (3D) understanding to explain spectral features and their time dependence is becoming a vital aspect for consideration.
    To examine the atmospheric properties of directly imaged sub-Jupiter exoplanets, we use the 3D Exo-FMS general circulation
    model to simulate a metal-enhanced generic young sub-Jupiter object. We couple Exo-FMS to a kinetic chemistry scheme,
    a tracer-based cloud formation scheme and a spectral radiative-transfer model to take into account the chemical and cloud
    feedback on the atmospheric thermochemical and dynamical properties. Our results show a highly complex feedback between
    clouds and chemistry on to the 3D temperature structure of the atmosphere, bringing about latitudinal differences and
    inducing time-dependent stormy features at photospheric pressures. This suggests a strong connection and feedback between
    the spatial cloud coverage and chemical composition of the atmosphere, with the temperature changes and dynamical motions
    induced by cloud opacity and triggered convection feedback driving chemical species behaviour. In addition, we also produce
    synthetic latitude-dependent and time-dependent spectra of our model to investigate atmospheric variability and periodicity
    in commonly used photometric bands. Overall, our efforts put the included physics in 3D simulations of exoplanets on par
    with contemporary 1D radiative-convective equilibrium modelling.
