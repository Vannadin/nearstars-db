- &id158
  arxiv_id: '1412.5575'
  ads_bibcode: 2015ApJ...806..180W
  title: Atmospheric Heat Redistribution and Collapse on Tidally Locked Rocky Planets
  authors:
  - Wordsworth, Robin
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/0004-637X/806/2/180
  abstract: Atmospheric collapse is likely to be of fundamental importance to tidally locked rocky exoplanets, but it remains
    understudied. Here, general results on the heat transport and stability of tidally locked terrestrial-type atmospheres
    are reported. First, the problem is modeled with an idealized three-dimensional (3D) general circulation model (GCM) with
    gray gas radiative transfer. It is shown that over a wide range of parameters that the atmospheric boundary layer, rather
    than the large-scale circulation, is the key to understanding the planetary energy balance. Through a scaling analysis
    of the interhemispheric energy transfer, theoretical expressions for the day-night temperature difference and surface
    wind speed are created that reproduce the GCM results without tuning. Next, the GCM is used with correlated-k radiative
    transfer to study heat transport for two real gases ({{CO}}<SUB>2</SUB> and CO). For {{CO}}<SUB>2</SUB>, empirical formulae
    for the collapse pressure as a function of planetary mass and stellar flux are produced, and critical pressures for atmospheric
    collapse at Earth’s stellar flux are obtained that are around five times higher (0.14 bar) than previous gray gas estimates.
    These results provide constraints on atmospheric stability that will aid in future interpretations of observations and
    exoplanet habitability modeling.
  source: citation_of=2023ApJ...955L...7L
