  arxiv_id: '2210.10463'
  ads_bibcode: 2023M&PS...58.1149V
  title: 'LavAtmos: An open-source chemical equilibrium vaporization code for lava worlds'
  authors:
  - van Buchem, Christiaan P. A.
  - Miguel, Yamila
  - Zilinskas, Mantas
  - van Westrenen, Wim
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1111/maps.13994
  abstract: To date, over 500 short-period rocky planets with equilibrium temperatures above 1500 K have been discovered.
    Such planets are expected to support magma oceans, providing a direct interface between the interior and the atmosphere.
    This provides a unique opportunity to gain insight into their interior compositions through atmospheric observations.
    A key process in doing such work is the vapor outgassing from the lava surface. LavAtmos is an open-source code that calculates
    the equilibrium chemical composition of vapor above a dry melt for a given composition and temperature. Results show that
    the produced output is in good agreement with the partial pressures obtained from experimental laboratory data as well
    as with other similar codes from literature. LavAtmos allows for the modeling of vaporization of a wide range of different
    mantle compositions of hot rocky exoplanets. In combination with atmospheric chemistry codes, this enables the characterization
    of interior compositions through atmospheric signatures.
