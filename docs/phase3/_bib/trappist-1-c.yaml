- &id290
  arxiv_id: '1503.02728'
  ads_bibcode: 2015MNRAS.452.1934H
  title: Symplectic integration for the collisional gravitational N-body problem
  authors:
  - Hernandez, David M.
  - Bertschinger, Edmund
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1093/mnras/stv1439
  abstract: We present a new symplectic integrator designed for collisional gravitational N-body problems which makes use
    of Kepler solvers. The integrator is also reversible and conserves nine integrals of motion of the N-body problem to machine
    precision. The integrator is second order, but the order can easily be increased by the method of Yoshida. We use fixed
    time step in all tests studied in this paper to ensure preservation of symplecticity. We study small N collisional problems
    and perform comparisons with typically used integrators. In particular, we find comparable or better performance when
    compared to the fourth-order Hermite method and much better performance than adaptive time step symplectic integrators
    introduced previously. We find better performance compared to SAKURA, a non-symplectic, non-time-reversible integrator
    based on a different two-body decomposition of the N-body problem. The integrator is a promising tool in collisional gravitational
    dynamics.
  source: citation_of=2018A&A...613A..68G
