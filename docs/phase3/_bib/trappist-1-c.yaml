  arxiv_id: '2011.10158'
  ads_bibcode: 2021ApJ...907...91L
  title: HAZMAT. VII. The Evolution of Ultraviolet Emission with Age and Rotation for Early M Dwarf Stars
  authors:
  - Loyd, R. O. Parke
  - Shkolnik, Evgenya L.
  - Schneider, Adam C.
  - Richey-Yowell, Tyler
  - Jackman, James A. G.
  - Peacock, Sarah
  - Barman, Travis S.
  - Pagano, Isabella
  - Meadows, Victoria S.
  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.3847/1538-4357/abd0f0
  abstract: The ultraviolet (UV) emission from the most numerous stars in the universe, M dwarfs, impacts the formation, chemistry,
    atmospheric stability, and surface habitability of their planets. We have analyzed the spectral evolution of UV emission
    from M0-M2.5 (0.3-0.6 M<SUB>☉</SUB>) stars as a function of age, rotation, and Rossby number using Hubble Space Telescope
    observations of Tucana-Horologium (40 Myr), Hyades (650 Myr), and field (2-9 Gyr) objects. The quiescent surface flux
    of their C II, C III, C IV, He II, N V, Si III, and Si IV emission lines, formed in the stellar transition region, remains
    elevated at a constant level for 240 ± 30 Myr before declining by 2.1 orders of magnitude to an age of 10 Gyr. The Mg
    II and far-UV pseudocontinuum emission, formed in the stellar chromosphere, exhibits more gradual evolution with age,
    declining by 1.3 and 1.7 orders of magnitude, respectively. The youngest stars exhibit a scatter of 0.1 dex in far-UV
    line and pseudocontinuum flux attributable only to rotational modulation, long-term activity cycles, or an unknown source
    of variability. Saturation-decay fits to these data can predict an M0-M2.5 star's quiescent emission in UV lines and the
    far-UV pseudocontinuum with an accuracy of 0.2-0.3 dex, the most accurate means presently available. Predictions of UV
    emission will be useful for studying exoplanetary atmospheric evolution and the destruction and abiotic production of
    biologically relevant molecules and interpreting infrared and optical planetary spectra measured with observatories like
    the James Webb Space Telescope.
