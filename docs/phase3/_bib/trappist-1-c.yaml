  arxiv_id: '1412.6304'
  ads_bibcode: 2015MNRAS.447.2880A
  title: Precise time series photometry for the Kepler-2.0 mission
  authors:
  - Aigrain, S.
  - Hodgkin, S. T.
  - Irwin, M. J.
  - Lewis, J. R.
  - Roberts, S. J.
  year: '2015'
  pubdate: '2015-03-00'
  doi: 10.1093/mnras/stu2638
  abstract: The recently approved NASA K2 mission has the potential to multiply by an order of magnitude the number of short-period
    transiting planets found by Kepler around bright and low-mass stars, and to revolutionize our understanding of stellar
    variability in open clusters. However, the data processing is made more challenging by the reduced pointing accuracy of
    the satellite, which has only two functioning reaction wheels. We present a new method to extract precise light curves
    from K2 data, combining list-driven, soft-edged aperture photometry with a star-by-star correction of systematic effects
    associated with the drift in the roll angle of the satellite about its boresight. The systematics are modelled simultaneously
    with the stars' intrinsic variability using a semiparametric Gaussian process model. We test this method on a week of
    data collected during an engineering test in 2014 January, perform checks to verify that our method does not alter intrinsic
    variability signals, and compute the precision as a function of magnitude on long-cadence (30 min) and planetary transit
    (2.5 h) time-scales. In both cases, we reach photometric precisions close to the precision reached during the nominal
    Kepler mission for stars fainter than 12th magnitude, and between 40 and 80 parts per million for brighter stars. These
    results confirm the bright prospects for planet detection and characterization, asteroseismology and stellar variability
    studies with K2. Finally, we perform a basic transit search on the light curves, detecting two bona fide transit-like
    events, seven detached eclipsing binaries and 13 classical variables.
