  arxiv_id: '2505.22186'
  ads_bibcode: 2025A&A...701A..25F
  title: 'Hot Rocks Survey: III. A deep eclipse for LHS 1140c and a new Gaussian process method to account for correlated
    noise in individual pixels'
  authors:
  - Fortune, Mark
  - Gibson, Neale P.
  - Diamond-Lowe, Hannah
  - Mendonça, João M.
  - Gressier, Amélie
  - Kitzmann, Daniel
  - Allen, Natalie H.
  - August, Prune C.
  - Ih, Jegug
