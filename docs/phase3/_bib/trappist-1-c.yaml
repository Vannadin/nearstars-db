  year: '2012'
  pubdate: '2012-01-00'
  doi: 10.1029/2011JE003912
  abstract: In order to understand the early history of telluric interiors and atmospheres during the ocean magma stage, a
    coupled interior-atmosphere-escape model is being developed. This paper describes the atmospheric part and its first preliminary
    results. A unidimensional, radiative-convective, H<SUB>2</SUB>O-CO<SUB>2</SUB> atmosphere is modeled following a vertical
    T(z) profile similar to Kasting (1988) and Abe and Matsui (1988). Opacities in the thermal IR are then computed using
    a k-correlated code (KSPECTRUM), tabulated continuum opacities for H<SUB>2</SUB>O-H<SUB>2</SUB>O and CO<SUB>2</SUB>-CO<SUB>2</SUB>
    absorption, and water or sulphuric acid clouds in the moist convective zone (whenever present). The first results show
    the existence of two regimes depending on the relative value of the surface temperature T<SUB>s</SUB> compared to a threshold
    temperature T<SUB>c</SUB> depending on the total gaseous inventory. For T<SUB>s</SUB> &lt; T<SUB>c</SUB>, efficient blanketing
    results in a cool upper atmosphere, a cloud cover, and a long lifetime for the underneath magma ocean with a net thermal
    IR flux between 160 and 200 Wm<SUP>-2</SUP>. For T<SUB>s</SUB> &gt; T<SUB>c</SUB>, the blanketing is not efficient enough
    to prevent large radiative heat loss to space through a hot, cloudless atmosphere. Our current calculations may underestimate
    the thermal flux in the case of hot surfaces with little gaseous content in the atmosphere.
