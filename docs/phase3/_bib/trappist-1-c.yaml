  ads_bibcode: 2016Natur.533..221G
  title: Temperate Earth-sized planets transiting a nearby ultracool dwarf star
  authors:
  - Gillon, Michaël
  - Jehin, Emmanuël
  - Lederer, Susan M.
  - Delrez, Laetitia
