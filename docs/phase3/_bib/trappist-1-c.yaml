- &id090
  arxiv_id: '2308.00592'
  ads_bibcode: 2023A&A...678A..29M
  title: Interior dynamics of super-Earth 55 Cancri e
  authors:
  - Meier, Tobias G.
  - Bower, Dan J.
  - Lichtenberg, Tim
  - Hammond, Mark
  - Tackley, Paul J.
  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.1051/0004-6361/202346950
  abstract: The ultra-short-period super-Earth 55 Cancri e has a measured radius of 1.88 Earth radii. Previous thermal phase
    curve observations suggest a strong temperature contrast between the dayside and nightside of around 1000 K; the hottest
    point is shifted 41 ± 12 degrees east from the substellar point, indicating some degree of heat circulation. The dayside
    (and potentially even the nightside) is hot enough to harbour a magma ocean. We used results from general circulation
    models (GCMs) of atmospheres to constrain the surface temperature contrasts. There is still a large uncertainty on the
    vigour and style of mantle convection in super-Earths, especially those that experience stellar irradiation high enough
    to harbour a magma ocean. In this work our aim is to constrain the mantle dynamics of the tidally locked lava world 55
    Cancri e. Using the surface temperature contrasts as a boundary condition, we model the mantle flow of 55 Cancri e using
    2D mantle convection simulations, and investigate how the convection regimes are affected by the different climate models.
    We find that large super-plumes form on the dayside if that hemisphere is covered by a magma ocean and the nightside remains
    solid or only partially molten. Cold material descends into the deep interior on the nightside, but no strong downwellings
    form. In some cases the super-plume also moves several tens of degrees towards the terminator. A convective regime where
    the upwelling is preferentially on the dayside might lead to preferential outgassing on that hemisphere which could lead
    to the build-up of atmospheric species that could be chemically distinct from the nightside.
  source: citation_of=2025MNRAS.536.2957N
