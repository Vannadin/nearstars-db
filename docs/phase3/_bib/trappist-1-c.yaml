  abstract: 'We propose to elucidate the origin of several puzzling observations relative to the thermal fluxes of TRAPPIST-1
    b and c in the mid-infrared. Recent observations of five secondary eclipses of TRAPPIST-1 b and a partial eclipse of c
    in the F1280W band have revealed two puzzling findings: - During one visit, JWST recorded a partial eclipse of TRAPPIST-1
    c with an unexpectedly large occultation depth, contradicting previous 15microns measurements and equilibrium temperature
    predictions. - Brightness variations between visits during the five TRAPPIST-1 b eclipses, not seen at 15 microns, suggest
    intriguing potential origin such as star-planet interactions through photochemistry or outgassing. To solve both these
    mysteries at once and save telescope time, we propose to observe four eclipses of TRAPPIST-1 b and c one after the other
    during the same visits, requiring a total of 23.3 hours. This proposal is key to unraveling the TRAPPIST-1 innermost planets''
    internal heating and atmospheric characteristics, and will have major implications for the system''s outer, potentially
    habitable planets'
