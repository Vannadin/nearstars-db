  arxiv_id: '2212.08477'
  ads_bibcode: 2023NatAs...7..206P
  title: Evidence for the volatile-rich composition of a 1.5-Earth-radius planet
  authors:
  - Piaulet, Caroline
  - Benneke, Björn
  - Almenara, Jose M.
  - Dragomir, Diana
  - Knutson, Heather A.
  - Thorngren, Daniel
  - Peterson, Merrin S.
  - Crossfield, Ian J. M.
  - Kempton, Eliza M.-R.
  - Kubyshkina, Daria
  - Howard, Andrew W.
  - Angus, Ruth
  - Isaacson, Howard
  - Weiss, Lauren M.
  - Beichman, Charles A.
  - Fortney, Jonathan J.
  - Fossati, Luca
  - Lammer, Helmut
  - McCullough, P. R.
  - Morley, Caroline V.
  - Wong, Ian
  year: '2023'
  pubdate: '2023-02-00'
  doi: 10.1038/s41550-022-01835-4
  abstract: The population of planets smaller than approximately 1.7 Earth radii (R<SUB>⊕</SUB>) is widely interpreted as
    consisting of rocky worlds, generally referred to as super-Earths. This picture is largely corroborated by radial velocity
    mass measurements for close-in super-Earths but lacks constraints at lower insolations. Here we present the results of
    a detailed study of the Kepler-138 system using 13 Hubble and Spitzer transit observations of the warm-temperate 1.51
    ± 0.04 R<SUB>⊕</SUB> planet Kepler-138 d (T<SUB>e q ,A<SUB>B</SUB>=0.3</SUB>≈350 K ) combined with new radial velocity
    measurements of its host star obtained with the Keck/High Resolution Echelle Spectrometer. We find evidence for a volatile-rich
    `water world' nature of Kepler-138 d, with a large fraction of its mass $M_{{d}}$ contained in a thick volatile layer.
    This finding is independently supported by transit timing variations and radial velocity observations (M<SUB>d</SUB>=2
    .1<SUB>‒0.7</SUB><SUP>+0.6</SUP>M<SUB>⊕</SUB> ), as well as the flat optical/infrared transmission spectrum. Quantitatively,
    we infer a composition of 1 1<SUB>‒4</SUB><SUP>+3</SUP>% volatiles by mass or ~51% by volume, with a 2,000-km-deep water
    mantle and atmosphere on top of a core with an Earth-like silicates/iron ratio. Any hypothetical hydrogen layer consistent
    with the observations (&lt;0.003 M<SUB>⊕</SUB>) would have swiftly been lost on a ~10 Myr timescale. The bulk composition
    of Kepler-138 d therefore resembles those of the icy moons, rather than the terrestrial planets, in the Solar System.
    We conclude that not all super-Earths are rocky worlds, but that volatile-rich water worlds exist in an overlapping size
    regime, especially at lower insolations. Finally, our photodynamical analysis also reveals that Kepler-138 c (with a R<SUB>c</SUB>
    = 1.51 ± 0.04 R<SUB>⊕</SUB> and a M<SUB>c</SUB>=2 .3<SUB>‒0.5</SUB><SUP>+0.6</SUP>M<SUB>⊕</SUB> ) is a slightly warmer
    twin of Kepler-138 d (that is, another water world in the same system) and we infer the presence of Kepler-138 e, a likely
    non-transiting planet at the inner edge of the habitable zone.
