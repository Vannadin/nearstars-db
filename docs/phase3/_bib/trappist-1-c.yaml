  arxiv_id: '1703.10375'
  ads_bibcode: 2017AJ....154..109F
  title: The California-Kepler Survey. III. A Gap in the Radius Distribution of Small Planets
  authors:
  - Fulton, Benjamin J.
  - Petigura, Erik A.
  - Howard, Andrew W.
  - Isaacson, Howard
  - Marcy, Geoffrey W.
  - Cargile, Phillip A.
  - Hebb, Leslie
  - Weiss, Lauren M.
  - Johnson, John Asher
  - Morton, Timothy D.
  - Sinukoff, Evan
  - Crossfield, Ian J. M.
