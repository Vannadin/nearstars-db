  arxiv_id: '2201.04299'
  ads_bibcode: 2022MNRAS.514.6025M
  title: The importance of silicate vapour in determining the structure, radii, and envelope mass fractions of sub-Neptunes
  authors:
  - Misener, William
  - Schlichting, Hilke E.
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.1093/mnras/stac1732
  abstract: Substantial silicate vapour is expected to be in chemical equilibrium at temperature conditions typical of the
    silicate-atmosphere interface of sub-Neptune planets, which can exceed 5000 K. Previous models of the atmospheric structure
    and evolution of these exoplanets, which have been used to constrain their atmospheric mass fractions, have neglected
    this compositional coupling. In this work, we show that silicate vapour in a hydrogen-dominated atmosphere acts as a condensable
    species, decreasing in abundance with altitude. The resultant mean molecular weight gradient inhibits convection at temperatures
    above ~4000 K, inducing a near-surface radiative layer. This radiative layer decreases the planet's total radius compared
    to a planet with the same base temperature and a convective, pure H/He atmosphere. Therefore, we expect silicate vapour
    to have major effects on the inferred envelope mass fraction and thermal evolution of sub-Neptune planets. We demonstrate
    that differences in radii, and hence in inferred atmospheric masses, are largest for planets which have larger masses,
    equilibrium temperatures, and atmospheric mass fractions. The effects are largest for younger planets but differences
    can persist on gigayear time-scales for some sub-Neptunes. For a 10 M<SUB>⊕</SUB> planet with T<SUB>eq</SUB> = 1000 K
    and an age of ~300 Myr, an observed radius consistent with an atmospheric mass fraction of 10 per cent when accounting
    for silicate vapour would be misinterpreted as indicating an atmospheric mass fraction of 2 per cent if an H/He-only atmosphere
    were assumed. The presence of silicate vapour in the atmosphere is also expected to have important implications for the
    accretion and loss of primordial hydrogen atmospheres.
