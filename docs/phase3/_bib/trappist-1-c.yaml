  pubdate: '2022-11-00'
  doi: 10.1016/j.gca.2022.08.032
  abstract: 'We have determined the S contents of 14 different silicate melts equilibrated with Air/SO<SUB>2</SUB> mixtures
    at 1 atm pressure and temperatures of 1473-1773 K in 50 K intervals. Under these oxidizing conditions sulfur dissolves
    in the melts predominantly as sulfate (S<SUP>6+</SUP> or SO<SUB>4</SUB><SUP>2-</SUP>). The sulfur contents of the quenched
    products were determined by EPMA (Electron Probe Micro-Analysis) and by SIMS (Secondary Ion-Mass Spectrometry) with the
    latter being employed for low sulfur contents (i.e., ≤60 ppm). Equilibrium S contents were found to increase strongly
    with decreasing temperature and with some compositional parameters, especially CaO content. The data were used to calculate
    the sulfate capacity (log C<SUB>S6+</SUB>), for each melt composition at each temperature. Sulfate capacity is related
    to the equilibrium constant for sulfur dissolution and is defined as follows in terms of SO<SUB>4</SUB><SUP>2-</SUP> concentration
    and fugacities of oxygen and sulfur: <P />logC<SUB>S<SUP>6+</SUP></SUB> = log SO<SUB>4</SUB><SUP>melt</SUP> 2 - (wt .
    %) -1/2 logfS<SUB>2</SUB> -3/2 logfO<SUB>2</SUB> <P />By determining log C<SUB>S6+</SUB> at different Air/SO<SUB>2</SUB>
    ratios we showed that log C<SUB>S6+</SUB> is independent of sulfur content and hence that Henry''s Law is obeyed in the
    experimental composition and temperature range. We used stepwise linear regression to fit sulfate capacity to an equation
    incorporating compositional and temperature terms. Parameters which did not pass the F-test at the 95% confidence level
    were excluded. This approach led to the following fit equation: <P />logC<SUB>S<SUP>6+</SUP></SUB> = - 12.659 + (3692X<SUB>CaO</SUB>
    - 7592X<SUB>SiO<SUB>2</SUB></SUB> - 13736X<SUB>TiO<SUB>2</SUB></SUB> + 3762X<SUB>AlO<SUB>1.5</SUB></SUB> + 34483) / T
    <P />The standard error of the fit is 0.154 and R<SUP>2</SUP> is 0.985. <P />The data were used to simulate scenarios
    for SO<SUB>2</SUB>-degassing from ascending silicate melts of basaltic and andesitic compositions. The important observations
    are that SO<SUB>2</SUB> partitions strongly into an H<SUB>2</SUB>O-rich fluid phase and that most S is lost at relatively
    high pressures in the crust. So, for example we estimate that ≥85% of the initial S should be lost before the ascending
    magma reaches 100 MPa pressure.'
