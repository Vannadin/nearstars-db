- &id095
  arxiv_id: '2302.04241'
  ads_bibcode: 2023PSJ.....4...41T
  title: Constraints on the Size and Composition of the Ancient Martian Atmosphere from Coupled CO<SUB>2</SUB>-N<SUB>2</SUB>-Ar
    Isotopic Evolution Models
  authors:
  - Thomas, Trent B.
  - Hu, Renyu
  - Lo, Daniel Y.
  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.3847/PSJ/acb924
  abstract: Present-day Mars is cold and dry, but mineralogical and morphological evidence shows that liquid water existed
    on the surface of ancient Mars. In order to explain this evidence and assess ancient Mars's habitability, one must understand
    the size and composition of the ancient atmosphere. Here we place constraints on the ancient Martian atmosphere by modeling
    the coupled, self-consistent evolution of atmospheric CO<SUB>2</SUB>, N<SUB>2</SUB>, and Ar on Mars from 3.8 billion years
    ago (Ga) to the present. Our model traces the evolution of these species' abundances and isotopic composition caused by
    atmospheric escape, volcanic outgassing, and crustal interaction. Using a Markov Chain Monte Carlo method to explore a
    plausible range of parameters, we find hundreds of thousands of model solutions that recreate the modern Martian atmosphere.
    These solutions indicate that Mars's atmosphere contained 0.3-1.5 bar CO<SUB>2</SUB> and 0.1-0.5 bar N<SUB>2</SUB> at
    3.8 Ga. The global volume of deposited carbonates critically determines the ancient atmospheric composition. For example,
    a ~1 bar CO<SUB>2</SUB> ancient atmosphere with 0.2-0.4 bar N<SUB>2</SUB> requires ~0.9 bar CO<SUB>2</SUB> deposited in
    carbonates primarily in open-water systems. With the joint analysis of C, N, and Ar isotopes, we refine the constraints
    on the relative strengths of outgassing and sputtering, leading to an indication of a reduced early mantle from which
    the outgassing is sourced. Our results indicate that a CO<SUB>2</SUB>-N<SUB>2</SUB> atmosphere with a potential H<SUB>2</SUB>
    component on ancient Mars is consistent with Mars's geochemical evolution and may explain the evidence for its past warm
    and wet climate.
