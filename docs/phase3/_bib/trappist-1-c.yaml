  doi: 10.1088/1538-3873/acbe66
  abstract: The Mid-Infrared Instrument (MIRI) extends the reach of the James Webb Space Telescope (JWST) to 28.5 μm. It provides
    subarcsecond-resolution imaging, high sensitivity coronagraphy, and spectroscopy at resolutions of λ/∆λ ~ 100-3500, with
    the high-resolution mode employing an integral field unit to provide spatial data cubes. The resulting broad suite of
    capabilities will enable huge advances in studies over this wavelength range. This overview describes the history of acquiring
    this capability for JWST. It discusses the basic attributes of the instrument optics, the detector arrays, and the cryocooler
    that keeps everything at approximately 7 K. It gives a short description of the data pipeline and of the instrument performance
    demonstrated during JWST commissioning. The bottom line is that the telescope and MIRI are both operating to the standards
    set by pre-launch predictions, and all of the MIRI capabilities are operating at, or even a bit better than, the level
    that had been expected. The paper is also designed to act as a roadmap to more detailed papers on different aspects of
    MIRI.
