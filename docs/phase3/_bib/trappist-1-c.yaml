  arxiv_id: '1904.02180'
  ads_bibcode: 2020MNRAS.493.3132S
  title: 'DYNESTY: a dynamic nested sampling package for estimating Bayesian posteriors and evidences'
  authors:
  - Speagle, Joshua S.
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.1093/mnras/staa278
  abstract: We present DYNESTY, a public, open-source, PYTHON package to estimate Bayesian posteriors and evidences (marginal
    likelihoods) using the dynamic nested sampling methods developed by Higson et al. By adaptively allocating samples based
    on posterior structure, dynamic nested sampling has the benefits of Markov chain Monte Carlo (MCMC) algorithms that focus
    exclusively on posterior estimation while retaining nested sampling's ability to estimate evidences and sample from complex,
    multimodal distributions. We provide an overview of nested sampling, its extension to dynamic nested sampling, the algorithmic
    challenges involved, and the various approaches taken to solve them in this and previous work. We then examine DYNESTY's
    performance on a variety of toy problems along with several astronomical applications. We find in particular problems
    DYNESTY can provide substantial improvements in sampling efficiency compared to popular MCMC approaches in the astronomical
    literature. More detailed statistical results related to nested sampling are also included in the appendix.
