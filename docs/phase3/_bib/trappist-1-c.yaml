  arxiv_id: '1807.04301'
  ads_bibcode: 2018A&A...619A...1B
  title: The 55 Cancri system reassessed
  authors:
  - Bourrier, V.
  - Dumusque, X.
  - Dorn, C.
  - Henry, G. W.
  - Astudillo-Defru, N.
  - Rey, J.
  - Benneke, B.
  - Hébrard, G.
  - Lovis, C.
  - Demory, B. O.
  - Moutou, C.
  - Ehrenreich, D.
  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.1051/0004-6361/201833154
  abstract: Orbiting a bright, nearby star the 55 Cnc system offers a rare opportunity to study a multiplanet system that
    has a wide range of planetary masses and orbital distances. Using two decades of photometry and spectroscopy data, we
    have measured the rotation of the host star and its solar-like magnetic cycle. Accounting for this cycle in our velocimetric
    analysis of the system allows us to revise the properties of the outermost giant planet and its four planetary companions.
    The innermost planet 55 Cnc e is an unusually close-in super-Earth, whose transits have allowed for detailed follow-up
    studies. Recent observations favor the presence of a substantial atmosphere yet its composition, and the nature of the
    planet, remain unknown. We combined our derived planet mass (M<SUB>p</SUB> = 8.0 ± 0.3 M<SUB>Earth</SUB>) with refined
    measurement of its optical radius derived from HST/STIS observations (R<SUB>p</SUB> = 1.88 ± 0.03 R<SUB>Earth</SUB> over
    530-750 nm) to revise the density of 55 Cnc e (ρ = 6.7 ± 0.4 g cm<SUP>-3</SUP>). Based on these revised properties we
    have characterized possible interiors of 55 Cnc e using a generalized Bayesian model. We confirm that the planet is likely
    surrounded by a heavyweight atmosphere, contributing a few percents of the planet radius. While we cannot exclude the
    presence of a water layer underneath the atmosphere, this scenario is unlikely given the observations of the planet across
    the entire spectrum and its strong irradiation. Follow-up observations of the system in photometry and in spectroscopy
    over different time-scales are needed to further investigate the nature and origin of this iconic super-Earth. <P />Individual
    APT photometric measurements for 55 Cnc and its comparison stars, as well as RV measurements of 55 Cnc, are only available
    at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5)
    or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/619/A1">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/619/A1</A>
