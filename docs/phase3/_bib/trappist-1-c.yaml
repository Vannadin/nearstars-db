  title: HELIOS-K 2.0 Opacity Calculator and Open-source Opacity Database for Exoplanetary Atmospheres
  authors:
  - Grimm, Simon L.
  - Malik, Matej
  - Kitzmann, Daniel
  - Guzmán-Mesa, Andrea
  - Hoeijmakers, H. Jens
  - Fisher, Chloe
  - Mendonça, João M.
