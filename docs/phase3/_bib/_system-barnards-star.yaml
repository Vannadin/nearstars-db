  doi: 10.48550/arXiv.2602.00382
  abstract: We present the results from a five-year campaign to gather multi-epoch, high-resolution spectra of a volume-complete
    sample of 413 M dwarfs with masses 10-30% that of the Sun that lie within 15 parsecs. We report weighted mean systemic
    radial velocities (RV) and rotational broadening measurements ($v \sin i$) for our targets. Our typical relative RV uncertainties
    are less than $50$ m/s for the isolated, slowly rotating targets in our sample, and increase but remain less than 1 km/s
    for more rapidly rotating stars. The majority of the single stars in our sample ($71\pm3$%) have rotational broadening
    below our detection limit of 3.4 km/s. When combined with astrometric data, our radial velocities allow us to calculate
    galactic space motions, which we use to assign thin or thick disk membership. We determine that 81% and 8% of our sample
    are highly probable thin and highly probable thick disk members, respectively. We report seven new multi-lined multiple
    systems and identify six additional targets with velocity variations indicative of long-period binaries, of which three
    are new detections. Finally, we find no significant difference in the stellar multiplicity rates of the thin disk ($22\pm2$%)
