  doi: 10.1016/j.actaastro.2022.04.006
  abstract: Here we present a detailed analysis of a new concept for beam propulsion that extends the propagation range through
    space by circumventing fundamental limitations on the beam divergence. Using a combination of spatially overlapped continuous
    laser and neutral particle beams, opto-mechanical forces and light refraction are simultaneously exploited to produce
    self-guided modes. The aim of the present work is to elucidate the relevant physical phenomena, their relation to the
    conditions for self-guiding, and practical considerations for the design parameters of such a propulsion system. Methods
    for computing the lowest order axisymmetric self-guided modes are presented along with the resulting spatial mode structure.
    Key non-dimensional parameters are derived, including the use of linear stability analysis to determine features of the
    dynamic interaction. Based on these findings, a beam parameter optimization framework is proposed and applied to a 100-year
    interstellar flyby mission to Proxima b. With 200 GW of combined laser and particle beam power, we find that a 0.3 kg
    spacecraft could be accelerated to 0 . 044 c over a distance of 4 . 37 × 10<SUP>6</SUP> km (0.029 AU) using a small 1
    m<SUP>2</SUP> beam cross-section. Compared to an equivalent particle beam with no self-guiding, this represents an over
    50 × increase in payload. Similar payload mass would be possible by laser propulsion with an approximately 10<SUP>4</SUP>
    m<SUP>2</SUP> area laser array. These results suggest that self-guided beam propulsion possesses unique attributes that
    could enable the acceleration of larger spacecraft to relativistic velocities and enhance scientific capabilities for
    future interstellar and interstellar-precursor missions.
