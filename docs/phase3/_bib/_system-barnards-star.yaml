  abstract: Barnard's star is a primary target within the ESPRESSO guaranteed time observations (GTO) as it is the second
    closest neighbour to our Sun after the $α$ Centauri stellar system. We present here a large set of 156 ESPRESSO observations
    of Barnard's star carried out over four years with the goal of exploring periods of shorter than 50 days, thus including
    the habitable zone (HZ). Our analysis of ESPRESSO data using Gaussian process (GP) to model stellar activity suggests
    a long-term activity cycle at 3200d and confirms stellar activity due to rotation at 140d as the dominant source of radial
    velocity (RV) variations. These results are in agreement with findings based on publicly available HARPS, HARPS-N, and
    CARMENES data. ESPRESSO RVs do not support the existence of the previously reported candidate planet at 233d. After subtracting
    the GP model, ESPRESSO RVs reveal several short-period candidate planet signals at periods of 3.15d, 4.12d, 2.34d, and
    6.74d. We confirm the 3.15d signal as a sub-Earth mass planet, with a semi-amplitude of $55 \pm 7$cm/s, leading to a planet
    minimum mass $m_p \sin i$ of $0.37 \pm 0.05$Mearth, which is about three times the mass of Mars. ESPRESSO RVs suggest
    the possible existence of a candidate system with four sub-Earth mass planets in circular orbits with semi-amplitudes
    from 20 to 47cm/s, thus corresponding to minimum masses in the range of 0.17-0.32Mearth. The sub-Earth mass planet at
    $3.1533 \pm 0.0006$d is in a close-to circular orbit with a semi-major axis of $0.0229 \pm 0.0003$AU, thus located inwards
    from the HZ of Barnard's star, with an equilibrium temperature of 400K. Additional ESPRESSO observations would be required
    to confirm that the other three candidate signals originate from a compact short-period planet system orbiting Barnard's
    star inwards from its HZ.
