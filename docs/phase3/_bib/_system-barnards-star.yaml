  abstract: The stars within 25 pc constitute the sample that we aspire to know thoroughly. A well-understood, volume-limited
    sample of nearby stars is an essential input for the stellar luminosity function, the mass-luminosity relationship, the
    stellar velocity distribution, and the stellar multiplicity fraction, including substellar companions. Such samples help
    define stellar populations and estimate the amount mass contributed by local stars. In addition, the stars in this volume
    provide insight into stellar evolution and the history of star formation in the disk. These physical relationships and
    subsamples describe the makeup of our Galaxy and, by extension, more distant galaxies. However, models are being developed
    from an incomplete catalog with limited parameters. Although trigonometric parallaxes establish both sample membership
    and the cosmic distance scale, many objects within reach of ground-based telescopes remain unmeasured. To advance the
    solar neighborhood census, observations of 56 nearby stars are presented, including astrometric companion search results,
    along with a possible a new infrared parallax program.
