- arxiv_id: null
  ads_bibcode: 1992AdSpR..12d.157P
  title: The search for extra-solar planetary systems
  authors:
  - Paresce, Francesco
  year: '1992'
  pubdate: '1992-00-00'
  doi: 10.1016/0273-1177(92)90169-X
  abstract: 'I review the observational evidence for planetary systems around nearby stars and, using our own solar system
    as a guide, assess the stringent requirements that new searches need to meet in order to unambiguously establish the presence
    of another planetary system. Basically, these requirements are: 1 milliarcsecond or better positional accuracy for astrometric
    techniques, 9 orders of magnitude or better star to planet luminosity ratio discrimination at 0.5 to 1'''' separation
    in the optical for direct imaging techniques, 10 meters sec<SUP>-1</SUP> or better radial velocity accuracy for reflex
    motion techniques and +/-1% or better brightness fluctuation accuracy for planet/star occultation measurements. The astrometric
    accuracy is in reach of HST, direct imaging will require much larger telescopes and/or a 50 times smoother mirror than
    HST while the reflex motion and occultation techniques best performed on the ground are just becoming viable and promise
    exciting new discoveries. On the other hand, new indirect evidence on the existence of other planetary systems also comes
    from the observation of large dusty disks around nearby main sequence stars not too dissimilar from our sun. In one particular
    case, that of Beta Pictoris, a flattened disk seen nearly edge-on has been imaged in the optical and near IR down to almost
    70 AU of the star. It probably represents a young planetary system in its clearing out phase as planetesimals collide,
    erode and are swept out of the inner system by radiation pressure. The hypothesized Kuiper belt around our solar system
    may be the analogous structure in a later evolutionary stage. Features of this type have been detected in the far IR and
    sub-millimeter wavelength regions around 50-100 nearby main sequence and pre-main sequence stars. I discuss a battery
    of new accurate observations planned in the near future of these objects some of which may actually harbour planets or
    planetesimals that will certainly dramatically improve our knowledge of planetary system formation processes and our peculiar
    position in this scheme. <P />Affiliated with the Astrophysics Division, Space Science Department, ESA'
