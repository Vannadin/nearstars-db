  abstract: A sub-Earth-mass planet orbiting Barnard's star, designated as Barnard b, has been recently announced. At almost
    the same time, the first photometric data of Barnard's star by the Transit Exoplanet Survey Satellite (TESS) was released
    in Sector 80. We explore the possibility of emergent transits of Barnard b in TESS photometry. The detrended 2 min light
