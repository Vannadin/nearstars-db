  abstract: We report the discovery of a nearby star with a very large proper motion of 5.06 +/- 0.03 arcsec/yr. The star
    is called SO025300.5+165258 and referred to herein as HPMS (high proper motion star). The discovery came as a result of
    a search of the SkyMorph database, a sensitive and persistent survey that is well suited for finding stars with high proper
    motions. There are currently only 7 known stars with proper motions > 5 arcsec/yr. We have determined a preliminary value
    for the parallax of 0.43 +/- 0.13 arcsec. If this value holds our new star ranks behind only the Alpha Centauri system
    (including Proxima Centauri) and Barnard's star in the list of our nearest stellar neighbors. The spectrum and measured
    tangential velocity indicate that HPMS is a main-sequence star with spectral type M6.5. However, if our distance measurement
    is correct, the HPMS is underluminous by 1.2 +/- 0.7 mag.
