  title: Radial and Rotational Velocities of a Volume-Complete Sample of M Dwarfs with Masses 0.1-0.3 Msun within 15 parsecs
  authors:
  - Winters, Jennifer G.
  - Pass, Emily K.
  - Charbonneau, David
  - Irwin, Jonathan
  - Latham, David W.
  - Mink, Jessica
  - Esquerdo, Gilbert A.
