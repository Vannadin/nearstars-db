  abstract: 'Atmospheric escape from exoplanets is a topic of great interest for the exoplanet community since atmospheric
    retention is an important component of surface habitability. While atmospheric escape has been detected from large exoplanets,
    it remains difficult to measure for smaller (rocky) planets. Indeed, for rocky planets orbiting active stars it is thought
    that it may be difficult for atmospheres to be retained at all. In the absence of detailed observations, one option is
    to leverage observations and models for planets in our own solar system. Here we consider atmospheric escape from Mars
    if it orbited an M Dwarf star similar to Barnards star. Our analysis considers five escape processes: hydrodynamic escape,
    thermal escape, photochemical escape, ion escape, and sputtering. To estimate the escape rate via each process from our
    hypothetical ExoMars, we use a combination of scaling laws derived from spacecraft observations of escape from present
    day Mars, and models for escape that have been validated using observations. We provide escape rate estimates for important
    species in the Martian upper atmosphere: O, O2, H, and CO2, and use them to estimate the lifetime of the Martian atmosphere.'
