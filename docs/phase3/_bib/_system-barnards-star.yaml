  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.3390/universe8080421
  abstract: To transport a spacecraft to distances far beyond the solar heliosphere and around the planets of other stars
    will require advanced space propulsion systems that go beyond the existing technological state of the art. The release
    of fusion energy from the interaction of two low mass atomic nuclei that are able to overcome the Coulomb barrier offers
    the potential for ∼10<SUP>11</SUP>J/g specific energy release and implies that robotic missions to the nearby stars to
    distances of ∼5─10 ly may be possible in trip durations of the order of ∼50─100 years, travelling at cruise speeds of
    the order of ∼0.05─0.15 c. Such missions would be characterised with ∼kN-MN thrust levels, ∼GW-TW jet powers, ∼kW/kg-MW/kg
    specific powers. One of the innovative methods by which fusion reactions can be ignited is via the impingement of laser
    beams onto an inertial confinement fusion capsule, imploding it to a thermonuclear state. This paper gives an overview
    of the physics of inertial confinement fusion and the interaction of a laser beam with a capsule to include the simulation
    of a 1D particle-in-cell code calculation to illustrate the effects. In the application to deep space missions, various
    spacecraft concepts from the literature are discussed, and the range of values assumed for the pulse frequency, burn fraction
    and areal density appropriate for the mission are presented. It is concluded that advanced space propulsion via inertial
    confinement fusion is a plausible part of our future, provided that experimental validation of ignition is on the horizon
    and numerical models for feasibility concepts are developed to high fidelity and on a consistent basis.
