  abstract: We report on a sub-stellar companion search utilizing interferometric fringe-tracking astrometry acquired with
    Fine Guidance Sensor 3 (FGS 3) on the Hubble Space Telescope. Our targets were Proxima Centauri and Barnard's Star. We
    obtain absolute parallax values for Proxima Cen pi_{abs} = 0.7687 arcsecond and for Barnard's Star pi_{abs} = 0.5454 arcsecond.
