  abstract: We report high-resolution spectroscopic detection of TiO molecular signature in the day-side spectra of WASP-33
    b, the second hottest known hot Jupiter. We used High-Dispersion Spectrograph (HDS; R $\sim$ 165,000) in the wavelength
    range of 0.62 -- 0.88 $μ$m with the Subaru telescope to obtain the day-side spectra of WASP-33 b. We suppress and correct
