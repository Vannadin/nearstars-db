  arxiv_id: '1705.01481'
  ads_bibcode: 2017MNRAS.470.3664H
  title: Relativistic generalization of the incentive trap of interstellar travel with application to Breakthrough Starshot
  authors:
  - Heller, René
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.1093/mnras/stx1493
  abstract: As new concepts of sending interstellar spacecraft to the nearest stars are now being investigated by various
    research teams, crucial questions about the timing of such a vast financial and labour investment arise. If humanity could
    build high-speed interstellar lightsails and reach α Centauri 20 yr after launch, would it be better to wait a few years,
    then take advantage of further technology improvements and arrive earlier despite waiting? The risk of being overtaken
    by a future, faster probe has been described earlier as the incentive trap. Based on 211 yr of historical data, we find
    that the speed growth of artificial vehicles, from steam-driven locomotives to Voyager 1, is much faster than previously
    believed, about 4.72 per cent annually or a doubling every 15 yr. We derive the mathematical framework to calculate the
    minimum of the wait time to launch t plus travel time τ(t) and extend it into the relativistic regime. We show that the
    t + τ(t) minimum disappears for nearby targets. There is no use of waiting once we can reach an object within about 20
    yr of travel, irrespective of the actual speed. In terms of speed, the t + τ(t) minimum for a travel to α Centauri occurs
    at 19.6 per cent the speed of light (c), in agreement with the 20 per cent c proposed by the Breakthrough Starshot initiative.
    If interstellar travel at 20 per cent c could be achieved within 45 yr from today and the kinetic energy be increased
    at a rate consistent with the historical record, then humans can reach the 10 most nearby stars within 100 yr from today.
