    implies the existence of stratosphere in its atmosphere, however, we were unable to constrain the volume-mixing ratio
    of the detected TiO. We also measure the stellar radial velocity and use it to obtain a more stringent constraint on the
    orbital velocity, $K_{p} = 239.0^{+2.0}_{-1.0}$ km s$^{-1}$. Our results demonstrate that high-dispersion spectroscopy
    is a powerful tool to characterize the atmosphere of an exoplanet, even in the optical wavelength range, and show a promising
    potential in using and developing similar techniques with high-dispersion spectrograph on current 10m-class and future
    extremely large telescopes.
