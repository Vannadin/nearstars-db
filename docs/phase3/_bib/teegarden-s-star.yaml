  doi: 10.3847/2041-8213/ab2df7
  abstract: We study the habitability of the two 1-2 Earth-mass planets, recently detected by the CARMENES collaboration,
    around the ultra-cool nearby M dwarf Teegarden's Star. With orbital periods of 4.9 and 11.4 days, both planets are likely
    to be within the Habitable Zone and tidally locked. They are among the most Earth-like exoplanets yet discovered. Applying
    an analytical habitability model we find that surface liquid water could be present on both planets for a wide range of
    atmospheric properties, which makes them attractive targets for bio-signature searches. The prospects of the planets retaining
    such an atmosphere over their history are discussed.
