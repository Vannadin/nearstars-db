- arxiv_id: null
  ads_bibcode: 2024AAS...24325909M
  title: Habitability of the Planets Around Teegarden's Star in the Radio Spectrum
  authors:
  - Molina, Alexander
  - Olivieri, Vanelie
  - Mendez, Abel
  - Roshi, D. Anish
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: 'Red dwarf stars have emerged as a focal point of astronomical research due to their potential to host life-sustaining
    exoplanets. Their abundance throughout the universe, remarkable longevity, and the presence of orbiting exoplanets have
    driven extensive investigations. However, the mere discovery of exoplanets orbiting these stars does not guarantee habitability;
    critical factors such as the habitable zone, radiation emissions, and stellar activity must be meticulously examined.
    This research aims to analyze the stellar activity of Teegarden''s Star in the radio spectrum. The observations were done
    using the Arecibo Observatory''s 12-meter and 305-meter telescopes in the L, C, and X- bands to measure the total flux,
    spectral lines, and variability of Teegarden''s Star. Potential stellar flares were detected from Teegarden''s Star. Our
    findings suggest that this star exhibits a remarkable level of stability compared to other younger and more active dwarfs.
    These results raise the prospects for the potential habitability of exoplanets residing within Teegarden''s Star Habitable
    Zone. Factors such as Teegarden''s advanced age, relatively low radiation emissions, and infrequent stellar flare events
    offer promising conditions conducive to life on its exoplanets. This study contributes valuable insights to the search
    for habitable environments beyond our solar system, emphasizing the importance of understanding the activity and habitability
    of red dwarf stars in the search for extraterrestrial life. Keywords: Teegarden''s Star, Red Dwarf Star, Stellar Flare,
    Habitable Zone, Habitability'
