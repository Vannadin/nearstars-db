  doi: null
  abstract: CARMENES is a pair of high-resolution spectrographs optimized for measuring radial velocities in the wavelength
    range from 0.52 to 1.71 mu m; it has been in operation at Calar Alto Observatory since January 2016. The CARMENES survey
    is targeting 342 M dwarfs; it aims at obtaining at least 50 spectra for each of them. In the first three years of the
    survey, the signatures of several previously known planets have been detected, and new planets with masses almost down
    to 1 M_oplus have been discovered. The most remarkable discoveries include a cold super-Earth orbiting Barnard's star
    and a pair of Earth twins in the habitable zone of Teegarden's star. CARMENES has also been used for observations of evaporating
    atmospheres of hot Jupiters in the He I lambda 10830 Å line.
