  arxiv_id: '2411.07922'
  ads_bibcode: 2024ApJ...977...88B
  title: The Impact of Water Clouds on the Prospective Emission Spectrum of Teegarden's Star b as Observed by LIFE
  authors:
  - Boukrouche, Ryan
  - Caballero, Rodrigo
  - Janson, Markus
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/1538-4357/ad8f30
  abstract: Nontransiting terrestrial planets will be accessible by upcoming observatories of which LIFE is an example. Planet
    b orbiting Teegarden's Star is one of the optimal targets for such missions. We use a one-dimensional atmospheric model
    with real gas radiation, a multispecies pseudo-adiabatic convection-condensation scheme, and a water cloud scheme to estimate
    the impact of the cloud coverage on the emission spectrum of the target, as well as to assess how sensitive LIFE could
    be to changes in outgoing flux caused by these clouds. Though the emergent flux decreases with a higher cloud coverage,
    it does not decrease by more than 1 order of magnitude as the coverage increases from 0% to 90%. This allows LIFE to retain
    a high sensitivity to the cloud cover fraction for wavelengths longer than 7 μm. In this spectral range, with at least
    1 bar of N<SUB>2</SUB>, LIFE is able to distinguish cloud cover fractions as small as 10% given an integration time of
    24 hr, and yields much better precision with a week-long integration. An integration time of 1 week also allows the resolution
    of local variations in spectral flux, which can lead to easier molecule identification. This ability remains if the planet
    is a CO<SUB>2</SUB>-dominated Venus analog. Partial pressures of N<SUB>2</SUB> lower than 1 bar may create a degeneracy
    with the cloud cover fraction. LIFE shows promising potential for detecting and characterizing atmospheres even with a
    high cloud coverage, and retaining a fine sensitivity to relatively small differences in cloud cover fractions.
