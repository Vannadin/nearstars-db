  ads_bibcode: 2024csss.confE..58M
  title: In search of accurate indicators for stellar parameter determinations in very cool M dwarfs
  authors:
  - Marfil, Emilio
  - Montes, David
  - Schweitzer, Andreas
  - Caballero, José Antonio
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.5281/zenodo.13000681
  abstract: 'Accurate parameter determinations (effective temperature, surface gravity, and metallicity) from stellar spectra
    in very cool M dwarfs (M7.0 V and beyond) still prove extremely elusive, mostly due to the absence of useful line indicators
    used in early M dwarfs (e.g. Fe I, Ti I lines) and the impact of stronger molecular absorption bands (TiO, VO) that severely
    disrupt their spectra. Additionally, the presence of more intense magnetic fields and violent activity phenomena make
    such determinations even more challenging. However, these accurate parameter determinations are still essential to better
    characterize the exoplanetary systems (i.e. habitability zone and the constraints on exoplanetary mass, radius, and composition)
    discovered around very cool M dwarfs: for instance, the M8.0 V exoplanet host star TRAPPIST-1 or the M7.0 V host Teegarden''s
    Star. In this contribution, we aim to expand the methodology used by Marfil et al. (2021), based on spectral synthesis,
    to characterize the coolest M dwarfs observed with CARMENES. To do so, we delve into the selection of the most reliable
    spectral indicators for stellar parameter determinations in a collection of very high-resolution (R=90,000), high signal-to-noise
    spectra in the optical and near-infrared wavelength regions (520-1710 nm). With this goal in mind, we employed a new grid
    of atmospheric models called NewEra (Hauschildt et al. in prep.), which introduces significant improvements to previous
    grids (e.g. PHOENIX-ACES, BT-Settl, MARCS), such as updated molecular line lists. To validate such analysis, we compared
    the results obtained with the analysis done by Marfil et al. (2021) for the CARMENES M-dwarf GTO sample up to M7.0 V.
    Themes: Cool Stars as Stellar Systems, Brown Dwarfs and Giant Exoplanets: Future Prospects and Thirty Years of Discovery'
