  title: The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution
    spectroscopy. II. Simultaneous multiwavelength range modeling of activity insensitive lines
  authors:
  - Passegger, V. M.
  - Schweitzer, A.
  - Shulyak, D.
  - Nagel, E.
  - Hauschildt, P. H.
  - Reiners, A.
  - Amado, P. J.
  - Caballero, J. A.
  - Cortés-Contreras, M.
  - Domínguez-Fernández, A. J.
  - Quirrenbach, A.
  - Ribas, I.
  - Azzaro, M.
  - Anglada-Escudé, G.
  - Bauer, F. F.
  - Béjar, V. J. S.
