  ads_bibcode: 2019ESS.....433127W
  title: Habitability of the Teegarden's Star Planets
  authors:
  - Wandel, Amri
  - Tal-Or, Lev
  year: '2019'
  pubdate: '2019-08-00'
  doi: null
  abstract: We study the habitability of the two 1.5±0.4 Earth-mass planets, recently detected by the CARMENES collaboration,
    around the ultra-cool nearby M dwarf Teegarden's Star. With orbital periods of 4.9 and 11.4 days, both planets are likely
    to be within the Habitable Zone and tidally locked. They are among the most Earth-like exoplanets yet discovered. We find
    (Wandel and Tal-Or 2019, ApJL) that one or both planets are likely to support liquid water on at least part of their surface
    for a wide range of possible atmospheres, characterized by their atmospheric heating factor (i.a. the greenhouse effect)
    and global circulation. At least one of the TG planets may be habitable for atmospheric heating in the range 0.3-15 that
    of Earth. As demonstrated by detailed numerical calculations of similar planets, Teegarden's Star present calmness and
    old age favor the retaining or reproduction of a sufficiently massive atmosphere, within the habitability range. The demonstrated
    habitability of the Teegarden's Star planets for a wide range of atmospheres, combined with their small distance (3.85
    pc) and highest similarity to Earth (ESI=0.94) makes them most attractive targets for bio-signature searches.
