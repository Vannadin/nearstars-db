  year: '2005'
  pubdate: '2005-12-00'
  doi: null
  abstract: 'The first preliminary relative parallaxes from new astrometric programs at the Allegheny and Las Campanas observatories
    are presented below, in units of milliarcseconds, along with their standard errors: <P />\begin{tabular}{llcccccclll}
    Name &amp;Mv &amp;h &amp;m &amp;s &amp;o &amp;'' &amp;" &amp;paral &amp;s.e. &amp;Telescope <P />Teegarden''s &amp;15.40
    &amp;02 &amp;53 &amp;00.9 &amp;16 &amp;52 &amp;53 &amp;254.6 &amp;0.8 &amp;Thaw <P />LP 335-12 &amp;17.90 &amp;18 &amp;39
    &amp;33.1 &amp;29 &amp;52 &amp;16 &amp;85.3 &amp;0.8 &amp;Thaw <P />GJ 3001 &amp;14.90 &amp;00 &amp;02 &amp;40.1 &amp;-34
    &amp;13 &amp;39 &amp;75.7 &amp;1.3 &amp;duPont <P />LP 349-25 &amp;17.56 &amp;00 &amp;27 &amp;55.7 &amp;22 &amp;19 &amp;37
    &amp;67.6 &amp;2.0 &amp;Thaw <P />LP 397-10 &amp;17.86 &amp;21 &amp;16 &amp;06.3 &amp;22 &amp;38 &amp;35 &amp;47.3 &amp;1.2
    &amp;Thaw <P />We consider these parallaxes preliminary because they are all based on fewer than two years of data. The
    instrument used in the northern hemisphere program, the Allegheny Multifiltered Astrometric Camera (AMAC) (Gatewood 2004,
    BAAS, 36, #2, 7.21) replaces the Multichannel Astrometric Photometer (MAP) (Gatewood 1987, AJ, 94, 213). The results from
    the southern hemisphere program are based upon data taken with the Tek#5 camera at the f/7.5 Cassegrain focus on Carnegie''s
    2.5-m du Pont telescope. The latter data were acquired during photometric studies of the regions to be included in the
    observational program of the Carnegie Astrometric Planet Search (CAPS) camera (Boss et al. 2005, Astrobiology, 5, 206).
    These initial studies indicate that the existing CCD cameras have more than twice the precision of the MAP. Studies of
    the field of the open cluster M7 indicate that the CAPS camera should be able to achieve a precision of better than 0.25
    mas per hour, sufficient for the detection of long period gas giant planets orbiting nearby low mass stars. For additional
    information, see http://www.pitt.edu/ aobsvtry/research.html and http://www.dtm.ciw.edu/boss/dupont.html .'
