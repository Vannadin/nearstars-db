  title: The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution
    spectroscopy. II. Simultaneous multiwavelength range modeling of activity insensitive lines
  authors:
  - Passegger, V. M.
  - Schweitzer, A.
  - Shulyak, D.
  - Nagel, E.
  - Hauschildt, P. H.
  - Reiners, A.
  - Amado, P. J.
  - Caballero, J. A.
  - Cortés-Contreras, M.
  - Domínguez-Fernández, A. J.
  - Quirrenbach, A.
  - Ribas, I.
  - Azzaro, M.
  - Anglada-Escudé, G.
  - Bauer, F. F.
  - Béjar, V. J. S.
  - Dreizler, S.
  - Guenther, E. W.
  - Henning, T.
  - Jeffers, S. V.
  - Kaminski, A.
  - Kürster, M.
  - Lafarga, M.
  - Martín, E. L.
  - Montes, D.
  - Morales, J. C.
  - Schmitt, J. H. M. M.
  - Zechmeister, M.
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.1051/0004-6361/201935679
  abstract: We present precise photospheric parameters of 282 M dwarfs determined from fitting the most recent version of
    PHOENIX models to high-resolution CARMENES spectra in the visible (0.52-0.96 μm) and NIR wavelength range (0.96-1.71 μm).
    With its aim to search for habitable planets around M dwarfs, several planets of different masses have been detected.
    The characterization of the target sample is important for the ability to derive and constrain the physical properties
    of any planetary systems that are detected. As a continuation of previous work in this context, we derived the fundamental
    stellar parameters effective temperature, surface gravity, and metallicity of the CARMENES M-dwarf targets from PHOENIX
    model fits using a χ<SUP>2</SUP> method. We calculated updated PHOENIX stellar atmosphere models that include a new equation
    of state to especially account for spectral features of low-temperature stellar atmospheres as well as new atomic and
    molecular line lists. We show the importance of selecting magnetically insensitive lines for fitting to avoid effects
    of stellar activity in the line profiles. For the first time, we directly compare stellar parameters derived from multiwavelength
    range spectra, simultaneously observed for the same star. In comparison with literature values we show that fundamental
    parameters derived from visible spectra and visible and NIR spectra combined are in better agreement than those derived
    from the same spectra in the NIR alone. <P />Full Tables B.1 and B.2 are only available at the CDS via anonymous ftp to
    <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/627/A161">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/627/A161</A>
