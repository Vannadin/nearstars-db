  ads_bibcode: 2024eas..conf..384O
  title: 'Telegram to a planet: students send a radio message to Teegarden b'
  authors:
  - Ortiz-Gil, Amelia
  - Ballesteros, Fernando
  - Ramírez Velado, Beatriz
  - Moya Lucas, Maria Jesús
  - Fernández-Soto, Alberto
  year: '2024'
  pubdate: '2024-07-00'
  doi: null
  abstract: 'Imagine you were the first person to contact an alien civilization. What would you tell them? Once you have thought
    out your message, put it graphically in a pictogram on a 73x73 pixel grid. No, it''s not easy at all. Well, this is what
    the students who participated in "Telegrama a un Planeta", the first educational contest to send a message to a potentially
    inhabited exoplanet, managed to do. <P />We will present the fascinating challenge we went through since the very first
    moment when TV3 (Televisió de Catalunya) came up with an idea to develop a TV show, until the actual transmission of the
    message towards Teegarden b, a potentially habitable planet 12.5 light-years away, on November 2023, using two 15-meter
    satellite communications antennas at INTA-Madrid. <P />This is an opportunity to bring to our classrooms several scientific
    topics to work on: astrobiology, SETI, METI, exoplanets, alien civilizations under the light of science... but it also
    requires breaking with many previous misconceptions related to extraterrestrial life, and facing the difficulty of composing
    a graphic message with scientific content that should be understandable for a non-human intelligence and establish "the
