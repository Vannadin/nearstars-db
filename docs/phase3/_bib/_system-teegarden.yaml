  doi: 10.1051/0004-6361/202451697
  abstract: 'Teegarden''s star is a late-type M-dwarf planet host, typically showing only rather low levels of activity. In
    this paper we present an extensive characterisation of this activity at photospheric, chromospheric, and coronal levels.
    We specifically investigated TESS observations of Teegarden''s star, which showed two very large flares with an estimated
    flare fluence between 10<SUP>29</SUP> and 10<SUP>32</SUP> erg comparable to the largest solar flares. We furthermore analysed
    nearly 300 CARMENES spectra and 11 ESPRESSO spectra covering all the usually used chromospheric lines in the optical from
    the Ca II H &amp; K lines at 3930 Å to the He I infrared triplet at 10 830 Å. These lines show different behaviour: The
    He I infrared triplet is the only one absent in all spectra, some lines show up only during flares, and others are always
    present and highly variable. Specifically, the Hα line is more or less filled in during quiescence; however, the higher
    Balmer lines are still observed in emission. Many chromospheric lines show a correlation with Hα variability, which, in
    addition to stochastic behaviour, shows systematic behaviour on different timescales including the rotation period. Moreover,
    we found several flares and also report hints of an erupting prominence, which may have led to a coronal mass ejection.
    Finally, we present X-ray observations of Teegarden''s star (i.e. a discovery pointing obtained with the Chandra observatory)
    and an extensive study with the XMM-Newton observatory, which observed two large flares. One of these showed clear signatures
    of the Neupert effect, suggesting the production of hard X-rays in the system.'
