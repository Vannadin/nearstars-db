  ads_bibcode: 2023xrp..prop...75T
  title: Characterizing the Lowest-mass Planet Hosts and Investigating the Potential Link between Stellar Surface Gravity
    and Planet Occurrence
  authors:
  - Theissen, Christopher A.
  year: '2023'
  pubdate: '2023-00-00'
  doi: null
  abstract: 'The frequency of terrestrial planets increases with decreasing stellar host mass, with M dwarfs hosting on average
    2-3 terrestrial planets per star. This trend is well-documented down to the mid-type M dwarfs (~M5), but limitations in
    sensitivity and corresponding small samples have limited our ability to study exoplanet population statistics among the
    lowest-mass stars and brown dwarfs, also known as ultracool dwarfs (UCDs). This ubiquitous and long-lived class of star
    are important in the search for potentially habitable worlds, as the habitable zones (HZs) of these systems are sufficiently
    close to their host star to enable efficient detection with transit and radial velocity techniques. Indeed, the two lowest-mass
    exoplanet-host stars, Teegarden''s Star and TRAPPIST-1, both host multi-planet systems, with at least two planets in each
    of their stellar HZs. <P />The faint luminosities of UCDs means that exoplanet search programs using transit or radial
    velocity methods must monitor each source one at a time. This limitation mandates target prioritization for the most probable
    exoplanet hosts. We have identified a potential spectroscopic indicator of exoplanet host status in a shared peculiarity
    in the low-resolution infrared spectra of both Teegarden''s Star and TRAPPIST-1, which can be specifically attributed
    to radius inflation from exoplanet tidal interaction or co-evolution. In this NASA XRP proposal, we propose to investigate
    this spectroscopic exoplanet indicator in greater detail. Specifically, we will: 1) obtain and curate archival low-resolution
    near-infrared (NIR) spectroscopy for a volume limited sample (30 pc) of UCDs; 2) obtain and curate archival high-resolution
    NIR spectroscopy for the brightest UCDs; 3) develop new simulations to investigate the effects of tidal interactions between
    exoplanet and low-mass stars during pre-main sequence contraction; and 4) construct a sample of high-probability UCD exoplanet
    host candidates to prioritize follow-up with current and next-generation transit and radial velocity surveys. <P />Our
    program will significantly expand the potential yield of exoplanets in both the Kepler/K2 and TESS missions, and ground-based
    transit search programs. We will determine accurate identifications and characterizations of UCDs imaged in these surveys
    through a combination of updated Gaia astrometry, accurate spectral energy distribution analysis, and uniform NIR spectral
    characterization for a volume-limited sample of roughly 600 nearby UCDs. We will model the occurrence rate of planets
    around UCDs as a function of spectral type and spectral peculiarity to quantify the reliability of the spectral exoplanet
    indicator, and investigate the theoretical origins of this feature as a signature of exoplanet formation and/or ongoing
    tidal interaction. We will also model the effect of tidal interactions during the epoch of star/planet formation using
    the Modules for Experiments in Stellar Astrophysics (MESA) code, and develop a new grid of stellar photosphere models
    to more thoroughly investigate differences in surface gravity, metallicity, and alpha abundance between planet hosting
    stars and field stars. Finally, we will use this dataset to construct a comprehensive catalog of high-priority UCDs for
    ongoing follow-up with current ground-based transit surveys such as MEarth, the TRAnsiting Planets and PlanetesImals Small
    Telescope (TRAPPIST), the Search for habitable Planets EClipsing ULtra-cOOl Stars (SPECULOOS), and the Perkins INfrared
    Exosatellite Survey (PINES); and future radial velocity surveys made possible by the next generation of 30m-class telescopes.'
