    Subsequent analysis will extend this to the full range for this flight of 60-8000 keV. The 56Co radioactive decay line
    at 1238 keV was detected at a level of (8.1 +/- 1.7) x 10**-4 photons cm**-2 s**-1. (The error quoted is statistical only;
    systematic uncertainties remain to be evaluated.) The statistical significance of this result is 4.9 sigma. Rough estimation
    indicates a centroid consistent with no doppler shift and a width of 15-25 keV (3600-6000 km/s). The 1238-keV line width
    is significantly larger than the instrumental line width, but proper deconvolution with the instrument response function
    has not yet been performed. Such a large broadening may indicate a substantial amount of mixing of the freshly synthesized
    material with the overlying mantle. The data also indicate an excess in the vicinity of the 847- keV 56Co line. Analysis
    is complicated by the presence of a strong instrumental background line at 844 keV. In addition, a strong continuum signal
    was detected in the 120- to 700-keV band. Further results on these are expected at a later date. Visual magnitude estimates
    by A. C. Beresford, Adelaide, South Australia: May 7.55 UT, 7.5; 9.39, 7.6; 10.38, 7.7.'
