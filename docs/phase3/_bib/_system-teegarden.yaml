  title: 'Jahn-Teller Effect on the Structure of the Emission Produced by Excitation in the A Band of KI: Tl-Type Phosphors.
    Two Kinds of Minima on the Γ<SUB>4</SUB><SUP>- </SUP>(<SUP>3</SUP>T<SUB>1u</SUB>) Adiabatic Potential-Energy Surface'
  authors:
