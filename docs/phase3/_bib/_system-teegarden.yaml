    a high-resolution germanium spectrometer having a 20 deg FWHM field of view flown on high-altitude balloons over Alice
    Springs. Twelve hours of data were obtained on 1988 May 1 and again on Oct. 29. An additional eight hours of data were
    obtained from a point in the galactic plane 25 deg west of the center (l = 335 deg, b = 0 deg) on Oct. 30. The experiment
    alternated between source and background pointings every 20 min. Preliminary results for the line fluxes (in units of
    10**-4 photons cm**-2 s**-1) are 11.4 +/- 1.2 from the galactic center (average of the two measurements) and 2.4 +/- 1.6
    from the off-center pointing. (The quoted errors are 1 sigma statistical errors only). Previous measurements made with
    similar balloon and satellite instruments during the period 1980-1984 indicated that the compact 511-keV source had gone
    into a quiescent state. Apparently it reemerged some time during 1984-1988 at a flux level indistinguishable from those
    reported during the 1970s.
