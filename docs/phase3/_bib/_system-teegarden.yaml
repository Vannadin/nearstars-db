  abstract: The GRIS collaboration (S. Barthelmy, N. Gehrels, B. J. Teegarden and J. Tueller, Goddard Space Flight Center;
    M. Leventhal, AT&amp;T/Bell Laboratories; and C. J. MacCallum, Sandia National Laboratories) reports the detection of
