  - Quirrenbach, A.
  - Amado, P. J.
  - Aceituno, J.
  - Anglada-Escudé, G.
  - Bauer, F. F.
  - Dreizler, S.
  - Jeffers, S. V.
  - Guenther, E. W.
  - Henning, T.
  - Kaminski, A.
  - Lafarga, M.
  - Marfil, E.
  - Morales, J. C.
