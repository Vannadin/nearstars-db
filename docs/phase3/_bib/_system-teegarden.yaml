  doi: null
  abstract: 'The GRIS collaboration (S. Barthelmy and N. Gehrels, Goddard Space Flight Center; M. Leventhal, ATT/Bell Laboratories;
    C. J. MacCallum, Sandia National Laboratory; and B. J. Teegarden and J. Tueller, GSFC) communicates: "We report detection
    of gamma-ray lines from SN 1987A. The GRIS payload is an array of high-resolution, cooled germanium detectors for gamma-ray
    spectroscopy. The payload was launched on a high-altitude balloon from Alice Springs, Australia, on the evening of 1988
    Oct. 28 (day 613). Two transits of SN 1987A were obtained for a total of 16 hr on-source. Both the 847- and 1238-keV lines
    from the decay of 56Co were observed, at the 4.6-sigma and 3.4-sigma significance levels, respectively. A least-squares
    fit to a gaussian line profile has been performed on both lines. The fluxes determined from these fits are (6.5 +/- 1.4)
    x 10E-4 photons/cm2/s for the 847-keV line and (3.1 +/- 0.9) x 10E-4 photons/cm2/s for the 1238-keV line. These fluxes
    are in reasonable agreement with theoretical models like the 10HMM model of Pinto and Woosley (1988, Nature 333, 534,
    and private communication). The peak energy determined from the fit for the 847-keV line is 844.2 +/- 1.3 keV and the
    FWHM is 10.8 +2.9/-2.4 keV. For the 1238-keV line, the peak energy is 1233.5 +/- 1.8 keV and the FWHM is 11.0 +3.7/-3.1
    keV. Both line profiles are consistent with a single velocity distribution at the source (mean velocity corrected for
    LMC redshift is -770 +/- 320 km/s and FWHM is 3200 +680/-570 km/s), but peak energies are not consistent (&gt; 3 sigma
    for each line) with the 10HMM model or other spherically symmetric mixed models, which all predict blueshifted lines.
    The line widths are consistently about a factor of two larger than predicted (1.5-sigma to 2-sigma significance for each
    line). These results are consistent with the line profile observed in the previous GRIS flight on day 433 (IAUC 4593)."'
