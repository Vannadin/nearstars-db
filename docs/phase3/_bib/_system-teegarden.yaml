  doi: 10.1109/ICAPC57304.2022.00037
  abstract: With an increasing curiosity for exoplanet habitability, more research concerning the basic planetary properties
    are needed and necessary for contemporary astrophysics and cosmology. Thereinto, Teegarden's b is an exoplanet with high
    potential habitability. However, it is impossible to measure the radius directly and explore other physical properties
    with its transits undetected. This paper presents an estimation approach for the radius of Teegarden's b based on the
    rough density of the planet's material. On this basis, the diagram of the density-radius relationship is demonstrated
    as well as its corresponding radius. The data used in this research is collected from The CARMENES for Exoplanets around
    M Dwarfs by M. Zechmeister, etc. According to the analysis, the estimation for the radius of Teegarden's b is 1.5R ⊗,
    which is a little bigger than the mean value by the previous estimation. Overall, these results shed light on further
    research for other aspects of the planet (e.g., its classification and its ESI calculation to evaluate human beings' living
    feasibility.
