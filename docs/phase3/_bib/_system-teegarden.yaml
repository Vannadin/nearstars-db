  abstract: Pioneer 10 observations of electrons in the energy range from 1.75 to 25 MeV over the heliocentric radial distance
    1.0-21.5 AU are presented. The minimum intensity levels of 1-25 MeV electrons about 4.5 AU upwind of Jupiter and about
    16.5 AU downwind of Jupiter's orbit are of Jovian origin. The expected galactic electron flux at 1 AU is found to be a
    factor of 50 or more below the observed quiet-time 12 MeV electron flux, and the evidence confirms the hypothesis advanced
    by Teegarden et al. (1974) that Jupiter is the source of the approximately 1-25 MeV quiet-time electrons near 1 AU. No
    evidence was found to support the hypotheses that electrons of either solar or galactic origin contribute significantly
    to the quiet-time flux inside of 22 AU at low heliographic latitudes.
