  doi: 10.1103/PhysRevB.1.4161
  abstract: Emission spectra, excitation spectra, and decay times of Ga<SUP>+</SUP>, In<SUP>+</SUP>, and Ti<SUP>+</SUP> in
    KI, KBr, KCl, and NaCl have been investigated at 1.8-300°K under excitation in the A-absorption band. There are three
    types of temperature variation of the emission spectra; these types are represented by KI:Tl, KBr:Tl, and KCl:Tl, respectively.
    In case of types (1) and (2), two emission bands, A<SUB>T</SUB> (high energy) and A<SUB>X</SUB> (low energy), are observed.
    The excitation spectrum for the A<SUB>T</SUB> emission is slightly different from that for the A<SUB>X</SUB> emission.
    The decay times of the A<SUB>X</SUB> emission are complex and temperature dependent, as exemplified in KI:Ga and KI:In.
    The A<SUB>T</SUB> emission is surely due to the inverse process of the A absorption, Γ<SUB>4</SUB><SUP>- </SUP>(<SUP>3</SUP>T<SUB>1u</SUB>)--&gt;Γ<SUB>1</SUB><SUP>+</SUP>(<SUP>1</SUP>A<SUB>1g</SUB>).
    Four reasons are given why the A<SUB>X</SUB> emission is not due to the inverse process of the D absorption as proposed
    by Illingworth and supported by Donahue and Teegarden. To explain the A<SUB>X</SUB> emission, the Jahn-Teller effect on
    the <SUP>3</SUP>T<SUB>1u</SUB> state has been considered by assuming Russell-Saunders coupling. Since the correlation
    of polarization indicates the existence of tetragonal minima, adiabatic potential-energy surfaces (APES's) in the E<SUB>g</SUB>(Q<SUB>2</SUB>,
    Q<SUB>3</SUB>) configuration coordinate space have been obtained for the Γ<SUB>4</SUB><SUP>-</SUP>(<SUP>3</SUP>T<SUB>1u</SUB>)
    and Γ<SUB>1</SUB><SUP>-</SUP>(<SUP>3</SUP>T<SUB>1u</SUB>) states. When the spin-orbit interaction is of suitable value
    as compared with the Jahn-Teller (electron-lattice) interaction, the obtained APES's have two kinds of minima. Emission
    is considered to occur from these minima to the ground state, at least at low temperatures. The APES's can explain why
    there exist the three types of the emission spectra as well as the characteristic features of the emission spectra, excitation
    spectra, decay times, and polarization. The importance of these APES's for analyzing the stress, Stark, and Zeeman effects
    on the A<SUB>T</SUB> and A<SUB>X</SUB> emission is pointed out.
