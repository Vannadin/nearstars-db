    range from 0.52 to 1.71 mu m; it has been in operation at Calar Alto Observatory since January 2016. The CARMENES survey
    is targeting 342 M dwarfs; it aims at obtaining at least 50 spectra for each of them. In the first three years of the
    survey, the signatures of several previously known planets have been detected, and new planets with masses almost down
