- arxiv_id: null
  ads_bibcode: 2019ESS.....410202D
  title: Rocky planets from the CARMENES Survey
  authors:
  - Dreizler, Stefan
  year: '2019'
  pubdate: '2019-08-00'
  doi: null
  abstract: Since the first discovery, more than 800 exoplanets have been detected through the radial velocity method, the
    majority orbiting solar-like stars. Although M-stars are the most frequent stars, very few planets have yet been found
    around M-stars of late spectral type. <P />CARMENES, operated since 2016, is a high-resolution visible-near-IR spectrograph
    dedicated to search for such low-mass planets around low-mass stars and already doubled the number of known planets with
    host stars below 0.2 M<SUB>Sun</SUB>. Not surprisingly, also this stellar parameter range has its surprises in terms of
    planetary system architectures. We will give an overview of exoplanet detections (published and unpublished) from the
    CARMENES survey and then concentrate on the low-mass planets, including the very recent detection of two Earth-mass planets
    around Teegarden's star highlighting the capability of CARMENES. The planetary system is special since Teegarden's star
    is only one out of three planet host stars with an effective temperature below 3000K. Its two planets are within the optimistic
    and conservative habitable zone, respectively. Notably, the Earth, as well as other Solar System planets are currently
    or in near future in the transit visibility zone see from Teegarden's star.
