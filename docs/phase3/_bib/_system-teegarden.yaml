  doi: null
  abstract: The recent discovery of several Earth-like exoplanets able to support or mantain liquid water on its surface under
    adequate conditions has spurred interest in the prediction of planetary compositions compatible with the scarce data available
    for them, namely their mass and radius. In this work, we present a new program that proposes multiple compositions for
    differentiated planetary interiors that are compatible with the observed mass and radius. The program uses an internal
    database of equations of state for candidate planetary materials based on available knowledge of solar system planets
    and chondrite meteorites. After numerical integration of the hydrostatic equilibrium differential equations and requiring
    a zero pressure value at the planet surface, the code provides the pressure-density-radius profile for the planet. The
    program generates a number of likely candidate compositions that can be used to constrain our knowledge of the planet's
    internal structure. The equation of state database contains Earth-like materials like iron-nickel alloys and silicates
    but also other materials found in these chondrite meteorites like silicon carbide, Mg/Al spinel, water, and others. We
    used our program to explore the compositions of several recently discovered exoplanets (where some of us have participated)
    focusing on the Earth-like planets Teegarden b and c [1] and the super-Earth K2-286b [2]. The first two display a high
    Earth Similarity Index (ESI<SUB>⊕</SUB>=1), being ESI values for Teegarden b and c 0.94 and 0.8, respectively [1]. We
    have been able to successfully rule out some compositions for these planets and also to constrain our knowledge on the
    components of their internal structure. In the figure below, we show a relevant example of a pressure-density-radius profile
    of a likely 50% H<SUB>2</SUB>O, 33.33% SiC, 16.67% kamazite-like Ni-Fe alloy composition for K2-286b, which is compatible
    with its 2.1 R<SUB>⊕</SUB> and 6.8 M<SUB>⊕</SUB> central values reported in [2]. <P />[1] M. Zechmeister et al., 2019,
