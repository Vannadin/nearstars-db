  - Seifert, W.
  - Solano, E.
  - Tabernero, H. M.
  - Zechmeister, M.
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.1051/0004-6361/201834965
  abstract: '<BR /> Aims: We determine the radii and masses of 293 nearby, bright M dwarfs of the CARMENES survey. This is
    the first time that such a large and homogeneous high-resolution (R &gt; 80 000) spectroscopic survey has been used to
    derive these fundamental stellar parameters. <BR /> Methods: We derived the radii using Stefan-Boltzmann''s law. We obtained
    the required effective temperatures T<SUB>eff</SUB> from a spectral analysis and we obtained the required luminosities
    L from integrated broadband photometry together with the Gaia DR2 parallaxes. The mass was then determined using a mass-radius
    relation that we derived from eclipsing binaries known in the literature. We compared this method with three other methods:
    (1) We calculated the mass from the radius and the surface gravity log g, which was obtained from the same spectral analysis
    as T<SUB>eff</SUB>. (2) We used a widely used infrared mass-magnitude relation. (3) We used a Bayesian approach to infer
    stellar parameters from the comparison of the absolute magnitudes and colors of our targets with evolutionary models.
    <BR /> Results: Between spectral types M0 V and M7 V our radii cover the range 0.1 R<SUB>☉</SUB> &lt; R &lt; 0.6 R<SUB>☉</SUB>
    with an error of 2-3% and our masses cover 0.09 ℳ<SUB>☉</SUB> &lt; ℳ&lt; 0.6ℳ<SUB>☉</SUB> with an error of 3-5%. We find
    good agreement between the masses determined with these different methods for most of our targets. Only the masses of
    very young objects show discrepancies. This can be well explained with the assumptions that we used for our methods. <P
    />Table B.1 (stellar parameters) is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/625/A68">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/625/A68</A>'
