- arxiv_id: null
  ads_bibcode: 2019cxo..prop.5582S
  title: X-ray emission from Teegarden's star
  authors:
  - Schmitt, Jürgen
  year: '2019'
  pubdate: '2019-09-00'
  doi: null
  abstract: We propose to carry out a deep 50 ksec at Teegarden's star with the Chandra HRC-I. Teegarden's star is a very
    close (d = 3.8pc) and a very late star of spectral type MV7, which is orbited by two earth-like planets in the habitable
    zone. The proposed HRC-I observation is deep enough to detect X-ray emission even for the minimally expected X-ray flux
    levels. If we fail to detect X-ray emission, a counter example to the minimal coronal flux paradigm would have been found,
    otherwise we expect to characterize the effects of stellar X-ray irradiation in two very nearby and close-in extrasolar
    planets (d = 0.026 au, d = 0.045 au).
