  ads_bibcode: 2007AAS...210.4305W
  title: Search for Unpredicted Gamma-ray Lines with INTEGRAL/SPI
  authors:
  - Watanabe, Ken
  - Teegarden, B. J.
  year: '2007'
  pubdate: '2007-05-00'
  doi: null
  abstract: Gamma-Ray line studies are one of the prime scientific goals of ESA's INTEGRAL mission. The INTEGRAL Spectrometer
    (SPI) is designed to detect and measure lines in the 20-8000 keV range with energy resolution of 2-8 keV. We made a comprehensive
    search for Gamma-ray lines using the first year (AO-1) of the SPI public data. We found no evidence for any previously
    unpredicted lines (Teegarden &amp; Watanabe 2006). We continue the search with the second year (AO-2) of the public data
    as well as recently observed the AO-4 Key Program (KP) data. We will show our preliminary results and discuss our findings.
