  doi: 10.1117/12.2677503
  abstract: Looking to the future of exo-Earth imaging from the ground, core technology developments are required in visible
    Extreme Adaptive Optics (ExAO) to enable the observation of atmospheric features such as oxygen on rocky planets in visible
    light. UNDERGROUND (Ultra-fast AO techNology Determination for Exoplanet imageRs from the GROUND), a collaboration built
    in Feb. 2023 at the Optimal Exoplanet Imagers Lorentz Workshop, aims to (1) motivate oxygen detection in Proxima Centauri
    b and analogs as an informative science case for high-contrast imaging and direct spectroscopy, (2) overview the state
    of the field with respect to visible exoplanet imagers, and (3) set the instrumental requirements to achieve this goal
    and identify what key technologies require further development.
