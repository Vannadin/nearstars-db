- &id008
  arxiv_id: '2311.18117'
  ads_bibcode: 2024AJ....167...37Z
  title: Detecting Biosignatures in Nearby Rocky Exoplanets Using High-contrast Imaging and Medium-resolution Spectroscopy
    with the Extremely Large Telescope
  authors:
  - Zhang, Huihao
  - Wang, Ji
  - Plummer, Michael K.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-3881/ad109e
  abstract: In the upcoming decades, one of the primary objectives in exoplanet science is to search for habitable planets
    and signs of extraterrestrial life in the Universe. Signs of life can be indicated by thermal-dynamical imbalance in terrestrial
    planet atmospheres. O<SUB>2</SUB> and CH<SUB>4</SUB> in the modern Earth's atmosphere are such signs, commonly termed
    biosignatures. These biosignatures in exoplanetary atmospheres can potentially be detectable through high-contrast imaging
    instruments on future extremely large telescopes. To quantify the signal-to-noise ratio (S/N) with extremely large telescopes,
    we select up to 10 nearby rocky planets and simulate medium-resolution (R ~ 1000) direct imaging of these planets using
    the Mid-infrared ELT Imager and Spectrograph (ELT/METIS, 3-5.6 μm) and the High Angular Resolution Monolithic Optical
    and Near-infrared Integral field spectrograph (ELT/HARMONI, 0.5-2.45 μm). We calculate the S/N for the detection of biosignatures
    including CH<SUB>4</SUB>, O<SUB>2</SUB>, H<SUB>2</SUB>O, and CO<SUB>2</SUB>. Our results show that GJ 887 b has the highest
    detection of S/N for biosignatures, and Proxima Cen b exhibits the only detectable CO<SUB>2</SUB> among the targets for
    ELT/METIS direct imaging. We also investigate the TRAPPIST-1 system, the archetype of nearby transiting rocky planet systems,
    and compare the biosignature detection of transit spectroscopy with JWST versus direct spectroscopy with ELT/HARMONI.
    Our findings indicate JWST is more suitable for detecting and characterizing the atmospheres of transiting planet systems
    such as TRAPPIST-1 that are relatively further away and have smaller angular separations than more nearby nontransiting
    planets.
