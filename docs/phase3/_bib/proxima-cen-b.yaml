- &id040
  arxiv_id: null
  ads_bibcode: 2021cosp...43E.501M
  title: Multi-Parameter Approach to Habitability (M-PAtH)
  authors:
  - Mcintyre, Sarah
  year: '2021'
  pubdate: '2021-01-00'
  doi: null
  abstract: We are standing on the cusp of a major discovery in planetary sciences. For the first time in human history, upcoming
    surveys and telescopes working together will be able to remotely detect potential biosignatures in exo-Earth atmospheres
    and discover signs of life beyond our Solar System. In order to make the most of the near-future observational opportunities,
    optimal target selection will be of the utmost importance. Selection of targets for this characterisation relies on the
    ambiguously defined concept of habitability, which is currently constrained by only the density of the planet and the
    distance from its host star. With the expected increase in the number of detected exoplanets from TESS, we might end up
    with hundreds of planets that suit these criteria and are accordingly all equally likely to host life. Therefore, we must
    rethink our classification of what makes a planet habitable. On Earth plate tectonics and planetary magnetism are postulated
    to play an integral role in planetary temperature regulation and protection from solar winds and flares and are a critical
    component in supporting conditions for long-term surface liquid water. We utilise Jackson et al. 's (2008) equations to
    model tidal heating and Olson &amp; Christensen's (2006) model to estimate magnetic dipole moments of rocky exoplanets
    with radii R$ _{p}$ $\le$≤ 1.23 R$_\oplus$. When examining exoplanets located within the circumstellar habitable zone,
    only Trappist-1f, Trappist-1g, Ross 128 b, and Proxima Cen b were within the range where there is enough tidal heating
    for plate tectonics to occur, but not to the extent that it escalates to extreme planet-wide volcanism. Additionally,
    when modelling maximum magnetic dipole moments, only Kepler-186 f has a magnetic dipole moment larger than the Earth's,
    and only 22% $\pm$ 1% of rocky exoplanets detected in the circumstellar habitable zone have a dipole moment sufficient
    to support long-term liquid water. Furthermore, combining the two habitability factors - plate tectonics and planetary
    magnetism - Trappist-1 g shows the highest potential to have both the presence of plate tectonics and a magnetic field
    sufficiently strong to preserve surface liquid water. Continuing to expand to a multi-parameter approach to habitability
    (M-PAtH) by including factors such as magnetic field, plate tectonics, albedo, stellar type, orbit characteristics, tidal
    locking, and impact events, will enable us to prioritise planets most likely to maintain liquid water. By analysing, modelling,
    and constraining how these factors interact on any given planetary body, we can generate a flexible framework for prioritisation
    involving multiple observable characteristics that influence continuous planetary habitability. Based on the results,
    we will be able to provide a revised model of planetary habitability and suggest a suitable strategy for future astrobiological
    and biosignature observations of life in the universe. In conjunction with the rapidly increasing information from exoplanet
    databases expected within the next decade, this research will help determine optimal targets for near-future ground- and
    space-based spectroscopic observations of planetary atmospheres and the possible detection of life in space.
