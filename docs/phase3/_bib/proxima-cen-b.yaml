  abstract: In the near future, extremely large ground-based telescopes (ELTs) will revolutionize our search for habitable
    and potentially life-harboring terrestrial exoplanets. These telescopes, equipped with high-resolution spectrometers,
    will allow us to probe the atmospheres of nearby transiting and non-transiting terrestrial exoplanets. While previous
    studies have focused mainly on estimating the detectability of O<SUB>2</SUB> with these telescopes, other gases are needed
    to contextualize O<SUB>2</SUB> in its environment. We have previously shown that other gases such as CH<SUB>4</SUB>, CO<SUB>2</SUB>,
