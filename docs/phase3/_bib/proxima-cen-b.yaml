  arxiv_id: null
  ads_bibcode: 2023AsBio..23..705A
  title: 'Impact of M Dwarfs Ultraviolet Radiation on Prebiotic Chemistry: The Case of Adenine'
  authors:
  - Armas-Vázquez, M. Zulema
  - González-Espinoza, Cristina E.
  - Segura, Antígona
  - Heredia, Alejandro
  - Miranda-Rosete, Arturo
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.1089/ast.2022.0050
  abstract: To date, several exoplanets have been found to orbit within the habitable zone of main sequence M stars (M dwarfs).
    These stars exhibit different levels of chromospheric activity that produces ultraviolet (UV) radiation. UV may be harmful
    to life, but it can also trigger reactions of prebiotic importance on the surface of a potentially habitable planet (PHP).
    We created a code to obtain the adenine yield for a known adenine synthesis route from diaminomaleonitrile (DAMN). We
    used computational methods to calculate the reaction coefficient rates (photolysis rate J and rate constant K) for the
    intermediate molecules DAMN, diaminofumaronitrile (DAFN), and 4-aminoimidazole-5-carbonitrile (AICN) of the adenine synthesis
    route. We used stellar UV sources and a mercury lamp to compare the theoretical results with experiments performed with
    lamps. The surface UV flux of planets in the habitable zone of two active M dwarfs (Proxima Centauri and AD Leonis) and
    the prebiotic Earth was calculated using the photochemical model ATMOS, considering a CO<SUB>2</SUB>-N<SUB>2</SUB>-H<SUB>2</SUB>O
    atmosphere. We obtained UV absorption coefficients for DAMN and DAFN and thermodynamic parameters that are useful for
    prebiotic chemistry studies. According to our results, experiments using UV lamps may underestimate the photolysis production
    of molecules of prebiotic importance. Our results indicate that photolysis reactions are fast with a yield of 50% of AICN
    in 10 s for the young Sun and ∼1 h for Proxima Centauri b. Planets around active M dwarfs may provide the most favorable
    environment for UV-mediated production of compounds relevant to the origins of life. The kinetic reaction AICN + HCN 
    adenine is the bottleneck of the pathway with reaction rates &lt;10<SUP>‒22</SUP> L/(mol.s).
