  ads_bibcode: 2019AAS...23334601C
  title: 'The Search for Extraterrestrial Life: An Astro-ecological Modeling Approach for Characterizing Exoplanet Habitability'
  authors:
  - Ceja, Alma Y.
  - Kane, Stephen
  year: '2019'
  pubdate: '2019-01-00'
  doi: null
  abstract: The field of astrobiology aims to determine whether life exists elsewhere in the Universe. A necessary first step
    in this endeavor is investigating the habitability of known exoplanets. We define the habitability of an exoplanet by
    its potential to sustain life. Here, an integrative approach is applied to explore the relationship between alien environments
    and terrestrial life. A probabilistic astro-ecology model is implemented in which the survivability of an organism is
    determined by its thermal response to local and global exoplanet temperatures. Exoplanet thermal environments are simulated
    using the climate model, Resolving Orbital and Climate Keys of Earth and Exoplanet Environments (ROCKE-3D). ROCKE-3D is
    a fully-coupled 3-dimensional oceanic-atmospheric general circulation model (GCM, NASA-Goddard Institute for Space Studies).
    The GCM features interactive atmospheric chemistry, aerosols, the carbon cycle, vegetation, and other tracers, as well
    as the standard ocean, sea ice, and land surface components. It has been used to model Earth, Mars, ancient Venus, and
    the exoplanet Proxima Centauri b. The GCM output is coupled in the astro-ecology model with empirically-derived thermal
    performance curves of 1,627 cell strains representing extremophiles from all six Kingdoms, termed the biokinetic spectrum
    for temperature (Corkrey et al. 2016). The spectrum arises from a meta-analysis of cellular growth rate as a function
    of temperature. This work quantifies aspects of exoplanet habitability using terrestrial-based thermophysiology. Life,
    however, is dependent upon multiple variables including the presence of liquid water, nutrient content, and an energy
    source. Caveats of the methodology and application of our results are discussed with implications for extraterrestrial
    evolution. These results can be further applied to target selection for future missions designed for detecting biosignatures.
