    109(E10). [6] Tasker, E. J. et al. (2020). Astronom. J., 159(2), 41. [7] Marcy, G. W. et al. (2014). PNAS, 111(35), 12655-12660.
    [8] Kieffer S. W. and Simonds C. H. (1980) Rev. Geophys. Space Phys., 18, 143-181. [9] Pierazzo E., and H.J. Melosh (2000).
