    Solar system and in several exoplanetary systems // Solar System Research. 58, Suppl. 1, pp. S50-S63. https://doi.org/10.1134/S0038094623600105.
    https://rdcu.be/d04Q0, http://arxiv.org/abs/2411.05436. Marov M.Ya., Ipatov S.I. (2023) Migration processes in the Solar
    System and their role in the evolution of the Earth and planets // Physics-Uspekhi. 66:2-31. https://doi.org/10.3367/UFNe.2021.08.039044.
