  abstract: We propose deep NIRSpec IFU observations from 1.66 to 5.27 micron of two disks orbiting very-low mass stars (VLMS).
    VLMS host a rich population of potentially habitable planets (e.g. Proxima Centauri b). Because their disks are faint,
    little is known about the formation of this planet population. The first MIRI-MRS observations of the two targets have
    already revealed an extremely rich hydrocarbon chemistry, potentially related to the destruction of refractory carbon.
    This suggests that planets formed around VLMS could have very distinct elemental compositions compared with more massive
    stars. However, NIRSpec spectroscopic observations of VLMS disks are critically lacking to establish a global view of
    the inner disk composition. The proposed NIRSpec observations will allow to (1) measure for the first time the C/O elemental
    ratio in the gas, (2) infer the radial distribution of elements across the disk, and (3) search for new gas-phase species
    and refractory carbon. This program will provide legacy value to the community by demonstrating the potential of NIRSpec
    observations of VLMS disks in combination of MIRI-MRS, and by providing necessary constraints to link the composition
    of exoplanets to their formation history.
