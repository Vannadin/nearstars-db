- arxiv_id: '2602.07127'
  ads_bibcode: 2026arXiv260207127J
  title: A New Strategy for Using Spectroscopic Phase Curves to Characterize Non-Transiting Planets
  authors:
  - Johnson, Ted M.
  - Mandell, Avi M.
  year: '2026'
  pubdate: '2026-02-00'
  doi: 10.48550/arXiv.2602.07127
  abstract: 'We introduce a new time-series analysis strategy for combined-light exoplanet spectroscopic phase curves called
    the Variable Planetary Infrared Excess (VPIE) method. VPIE can be used to extract information about the planetary flux
    contribution without the need for the planet to transit, or use of a stellar spectral model. VPIE utilizes a linear combination
    of a small set of individual spectra to produce an empirical model of the stellar contribution at each time step, thereby
    normalizing each spectrum and leaving only an imprint of the planet''s flux in the residual data. We demonstrate the effectiveness
    of VPIE through simulated James Webb Space Telescope (JWST) observations of three known exoplanet orbiting late-type M
    stars: the warm giant TOI-519 b, the warm sub-Neptune GJ 876 d, and the temperate super-Earth Proxima Centauri b. Our
    results indicate that though VPIE loses sensitivity for very high redistribution values, it can successfully distinguish
    between various atmospheric circulation regimes (zero, moderate, or high heat redistribution) and constrain planetary
    radii for non-unity day-night temperature ratios. While performance for cooler targets may be limited by JWST spectroscopic
    capabilities at longer wavelengths, future VPIE improvements or new instrumentation could enable characterization of potentially
    habitable planets. VPIE offers a promising new framework for pulling back the veil on the population of non-transiting
    planets around nearby M-stars that are otherwise inaccessible to current techniques.'
