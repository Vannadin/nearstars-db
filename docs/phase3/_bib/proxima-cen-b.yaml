- &id069
  arxiv_id: null
  ads_bibcode: 2022xrp..prop...98T
  title: Assessing Atmospheric Impacts of X-ray and UV Irradiation on Earth-like Planets in Directly Imageable Habitable Zones
  authors:
  - Turnbull, Margaret C.
  year: '2022'
  pubdate: '2022-00-00'
  doi: null
  abstract: 'Scientific Objectives. From the time of their formation, planets in the habitable zones (HZs) experience high
    levels of X-ray and extreme ultraviolet (EUV; X-ray + EUV = XUV) radiation, which directly influences atmospheric survival,
    composition, and long-term evolution. In some cases, planetary atmospheres and surface volatiles can be entirely driven
    away by XUV irradiation. In cases where planets can retain and/or replenish their atmospheres to remain habitable, the
    survival and abundance of atmospheric biosignatures would be strongly impacted by ultraviolet (UV)-driven photochemistry.
    While the nearest stars will always be the best targets for future exoplanet direct-imaging campaigns and habitability
    analysis due to favorable signal-to-noise ratios and angular separation of orbiting planets, no comprehensive, curated
    resource exists for systematically evaluating each system based on extant panchromatic observations. Here we describe
    a three-year effort to explore the impacts of XUV and UV emission on the atmospheres of terrestrial planets orbiting in
    directly imageable HZs. This effort will conduct critical precursor science constituting an upgradeable resource for evaluating
    the characteristics of nearby planetary systems, informing future observations. Specifically, we will: <P />(1) Generate
    panchromatic spectra for all directly imageable systems with existing X-ray and UV observations, using these archival
    observations to guide and validate PHOENIX upper atmosphere models that will fill observational gaps, including the EUV
    wavelengths. We will also use these archival observations to characterize stellar activity levels. We will target systems
    with only X-ray or UV observations for future observations in the missing bandpass. <P />(2) Calculate ensembles of possible
    atmospheric escape histories for planets within the HZs of these systems based on both thermal and ion escape using the
    GITM and PWOM models. Archival X-ray observations and synthetic EUV spectra will be used as input in this objective. In
    addition, we will account for the dynamical stability of the HZ for those systems where existing planets are known. <P
    />(3) Use our semi-empirical spectra to upgrade photochemical models and investigate chemical states for select HZ planets
    in target systems, including biosignature (O2, O3, CH4) lifetimes. From these synthetic data, we will generate reflected
    light spectra. <P />Stellar Systems Included in this Investigation. With a few notable exceptions (e.g. Proxima Cen b),
    terrestrial-sized planets orbiting nearby stars are not within the current detection limits of RV searches and do not
    transit. However, given the occurrence rates derived from Kepler, we expect that terrestrial planets are present within
    the HZs of a large fraction (~50%) of these targets. These planets will be within reach of future direct-imaging surveys.
    Our preliminary archival analysis suggests 112 stars have existing X-ray observations via Chandra, XMM-Newton/EPIC/MOS,
    or Swift/XRT (and additional 28 stars have X-ray fluxes from ROSAT) and 90 FUV-NUV observations via the XMM-Newton/OM,
    GALEX, FUSE, or Hubble. Overall, of 175 systems with directly imagable HZs, 156 have at least partial empirical data through
    which semi-empirical XUV+UV spectra can be derived, and 66 systems have both existing X-ray and UV observations. Given
    recent extrapolations of terrestrial exoplanet occurrence rates, we estimate there are ~100[40] planets orbiting within
    the HZs of these 175[66] systems. <P />Relevance. The XRP solicitation states that "Archival investigations that are focused
    on the formation, evolution, detection, or characterization of protoplanetary and debris disks, exoplanets, exoplanetary
    systems, or the demographics of the exoplanet population are within the scope of XRP." As an investigation of atmosphere
    and biosignature survival, our proposed study is relevant to the evolution and characterization of exoplanets and within
    the scope of XRP.'
