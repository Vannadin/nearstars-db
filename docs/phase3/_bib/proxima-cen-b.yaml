- arxiv_id: null
  ads_bibcode: 2020EPSC...14..664C
  title: 'EXO-ATMOS: A scalable grid of hypothetical planetary atmospheres'
  authors:
  - Chopra, Aditya
  - Bell, Aaron
  - Fawcett, William
  - Talebi, Rodd
  - Angerhausen, Daniel
  - Güneș Baydin, Atılım
  - Berea, Anamaria
  - Cabrol, Nathalie A.
  - Kempes, Christopher P.
  - Mascaro, Massimo
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.5194/epsc2020-664
  abstract: 'Summary: As part of the NASA Frontier Development Lab, we implemented a parallelized cloud-based exploration
    strategy to better understand the statistical distributions and properties of potential planetary atmospheres. Starting
    with a modern-day Earth atmosphere, we iteratively and incrementally simulated a range of atmospheres to infer the landscape
    of the multi-parameter space, such as the abundances of biological mediated gases that would yield stable (non-runaway)
    planetary atmospheres on Earth-like planets around solar-type stars. Our current dataset comprises of 124,314 simulated
    models of earth-like exoplanet atmospheres and is available publicly on the NASA Exoplanet Archive. Our scalable approach
    of analysing atmospheres could also help interpret future observations of planetary atmospheres by providing estimates
    of atmospheric gas fluxes and temperatures as a function of altitude, and thereby enable high-throughput first-order assessment
    of the potential habitability of exoplanetary surfaces.Introduction: The NASA Frontier Development Laboratory (FDL) is
    an annual science accelerator that focuses on applying machine learning and large-scale computing to challenges in space
    science and exploration (Cabrol et al. 2018). FDL engages interdisciplinary teams of computer scientists and space science
    domain experts and tasks them to solve problems that are valuable to NASA and humanity"s future. We implemented a cloud-based
    strategy to better understand the statistical distributions of habitable planets and life in the universe and layout an
    avenue to characterize the potential role of biological regulation of planetary atmospheres.We simulated a range of atmospheres
    to infer the landscape of the multi-parameter space, such as the abundances of biological mediated gases that would yield
    stable (non-runaway) planetary atmospheres on Earth-like planets around solar-type stars. Our scalable tool, once coupled
    to a generalized ecosystem model, could help derive estimates of the biological mediated atmospheric gas fluxes and help
    constrain the type and the extent of exobiology on exoplanets based on the remotely detected atmospheric compositions.Method:
    Our team generated data for a wide variety of hypothetical biospheres to scope out the plausible range of habitable atmospheres
    and metabolisms that could be present in the universe. We implemented a cloud-based massively parallelized procedural
    parameter search for a wide range of planetary atmospheres. Since existing tools were not capable of broad parameter scans,
    we streamlined the ATMOS 1-D atmospheric simulation code developed by the NASA Virtual Planetary Laboratory (Arney et
    al. 2016, Meadows et al. 2016). and produced a package for the community called PyAtmos (https://github.com/PyAtmos).
    This package dramatically increases the usability and accessibility of the ATMOS 1-D software across a range of platforms.We
    then used PyAtmos on the Google Cloud Platform in an automated and scalable procedure to search the parameter space of
    atmospheric compositions. Our search considered the relative concentrations of greenhouse gases such as methane, carbon
    dioxide and water. 124,314 different atmospheres were simulated and then analyzed to establish if the planetary surface
    temperatures and fluxes of gases were compatible with conditions that could maintain a liquid water inventory on the planetary
    surface.Results: The dataset of planetary atmospheres we have generated can be used for training machine learning models
    to bootstrap the ATMOS code. It is an open-source dataset (https://exoplanetarchive.ipac.caltech.edu/cgi-bin/FDL/nph-fdl?atmos)
    available for the community to understand distributions of habitability parameters such as surface temperatures and free
    energy available to life on different classes of atmosphere bearing planets.All of these are based around an Earth-like
    planet that orbits a star similar to the Sun, but with different gas mixtures in their atmospheres. A parameter space
    of possible atmospheres was scanned by varying the concentrations of six gases - Carbon dioxide, Oxygen, Water, Methane,
    Hydrogen and Nitrogen.In future work, we plan to include parameters such as star type, planet size and distance from the
    host star when evaluating the range of different atmospheres that may be habitable. The scalability of our framework provides
    a mechanism to incorporate complex biogeochemical and global climate models to better understand the co-evolution of the
    atmosphere and biosphere (e.g. Chopra et al. 2016, Gebauer et al. 2017, Nicholson et al. 2018, Lineweaver et al. 2018).
    Analyses of such multi-dimensional datasets will enable better interpretations of future observations of exo-atmospheres
    and biosignatures by upcoming telescopes (Fuji et al. 2018).ReferencesArney, G. N. et al. (2016) The Pale Orange Dot:
    The Spectrum and Habitability of Hazy Archean Earth. Astrobiology, 16(11), 873-899.Cabrol, N. A., et al. (2018) Advancing
    Astrobiology Through Public/Private Partnership: The FDL Model. In: Lunar and Planetary Science Conference. Vol. 49. Lunar
    and Planetary Science Conference, 1275.Chopra, A. and Lineweaver, C. H. (2016) The Case for a Gaian Bottleneck: The Biology
    of Habitability. Astrobiology, 16(1), 7-22.Fujii, Y. et al. (2018) Exoplanet Biosignatures: Observational Prospects. Astrobiology,
    18(6).Gebauer, S. et al. (2017) Evolution of Earth-like Extrasolar Planetary Atmospheres: Assessing the Atmospheres and
    Biospheres of Early Earth Analog Planets with a Coupled Atmosphere Biogeochemical Model. Astrobiology, 17(1), 27-54.Lineweaver,
    C. H. et al. (2018), The Evolution of Habitability: Characteristics of Habitable Planets, in Vera M. Kolb (Ed.) Handbook
    of Astrobiology, Taylor &amp; FrancisMeadows, V. S. et al. (2016) The Habitability of Proxima Centauri b: Environmental
    States and Observational Discriminants. Astrobiology, 18(2), 133- 189.Nicholson, A. E. et al. (2018). Gaian bottlenecks
    and planetary habitability maintained by evolving model biospheres: The ExoGaia model. Monthly Notices of the Royal Astronomical
    Society, 477(1), 727-740.'
