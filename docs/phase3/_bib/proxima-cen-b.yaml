- &id022
  arxiv_id: null
  ads_bibcode: 2021A&A...651A.103N
  title: 'Interior heating and outgassing of Proxima Centauri b: Identifying critical parameters'
  authors:
  - Noack, L.
  - Kislyakova, K. G.
  - Johnstone, C. P.
  - Güdel, M.
  - Fossati, L.
  year: '2021'
  pubdate: '2021-07-00'
  doi: 10.1051/0004-6361/202040176
  abstract: 'Context. Since the discovery of a potentially low-mass exoplanet around our nearest neighbour star Proxima Centauri,
    several works have investigated the likelihood of a shielding atmosphere and therefore the potential surface habitability
    of Proxima Cen b. However, outgassing processes are influenced by several different (unknown) factors such as the actual
    planet mass, mantle and core composition, and different heating mechanisms in the interior. <BR /> Aims: We aim to identify
    the critical parameters that influence the mantle and surface evolution of the planet over time, as well as to potentially
    constrain the time-dependent input of volatiles from mantle into the atmosphere. <BR /> Methods: To study the coupled
    star-planet evolution, we analysed the heating produced in the interior of Proxima Cen b due to induction heating, which
    strongly varies with both depth and latitude. We calculated different rotation evolutionary tracks for Proxima Centauri
    and investigated the change in its rotation period and magnetic field strength. Unlike the Sun, Proxima Centauri possesses
    a very strong magnetic field of at least a few hundred Gauss, which was likely even stronger in the past. We applied an
    interior structure model for varying planet masses (derived from the unknown inclination of observation of the Proxima
    Centauri system) and iron weight fractions, that is, different core sizes, in the range of observed Fe-Mg variations in
    the stellar spectrum. We used a mantle convection model to study the thermal evolution and outgassing efficiency of Proxima
    Cen b. For unknown planetary parameters such as initial conditions, we chose randomly selected values. We took heating
    in the interior due to variable radioactive heat sources and induction heating into account and compared the heating efficiency
    to tidal heating. <BR /> Results: Our results show that induction heating may have been significant in the past, leading
    to local temperature increases of several hundreds of Kelvin. This early heating leads to an earlier depletion of the
    interior and volatile outgassing compared to if the planet had not been subject to induction heating. We show that induction
    heating has an impact comparable to tidal heating when assuming latest estimates on its eccentricity. Furthermore, we
    find that the planet mass (linked to the planetary orbital inclination) has a first-order influence on the efficiency
    of outgassing from the interior.'
