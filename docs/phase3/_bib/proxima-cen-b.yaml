- &id009
  arxiv_id: null
  ads_bibcode: 2023ApJ...956...29Q
  title: Prospects for Cryovolcanic Activity on Cold Ocean Planets
  authors:
  - Quick, Lynnae C.
  - Roberge, Aki
  - Mendoza, Guadalupe Tovar
  - Quintana, Elisa V.
  - Youngblood, Allison A.
  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.3847/1538-4357/ace9b6
  abstract: We have estimated total internal heating rates and depths to possible subsurface oceans for 17 planets that may
    be cold ocean planets, low-mass exoplanets with equilibrium surface temperatures and/or densities that are consistent
    with icy surfaces and a substantial H<SUB>2</SUB>O content. We have also investigated the potential for tidally driven
    cryovolcanism and exosphere formation on these worlds. Estimated internal heating rates from tidal and radiogenic sources
    are large enough that all planets in our study may harbor subsurface oceans, and their geological activity rates are likely
    to exceed the geological activity rates on Jupiter's moon Europa. Several planets are likely to experience enhanced volcanic
    activity rates that exceed that of Io. Owing to their relatively thin ice shells and high rates of internal heating, Proxima
    Cen b and LHS 1140 b are the most favorable candidates for telescopic detection of explosive, tidally driven cryovolcanism.
    Estimates for thin ice shells on Proxima Cen b, LHS 1140 b, Trappist-1f, and several Kepler planets suggest that any H<SUB>2</SUB>O
    vented into space during explosive cryovolcanic eruptions on these worlds could be sourced directly from their subsurface
    oceans. Like the icy moons in our outer solar system, cold ocean planets may be astrobiologically significant worlds that
    harbor habitable environments beneath their icy surfaces. These possibilities should be considered during analyses of
    observational data for small exoplanets from current and upcoming telescopes and during planning for a future space telescope
    mission aimed at characterization of potentially habitable exoplanets (e.g., Habitable Worlds Observatory).
