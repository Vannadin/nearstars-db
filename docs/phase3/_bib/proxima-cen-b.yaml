- &id045
  arxiv_id: '2405.11423'
  ads_bibcode: 2025AJ....169..171H
  title: 'Bioverse: Giant Magellan Telescope and Extremely Large Telescope Direct Imaging and High-resolution Spectroscopy
    Assessment—Surveying Exo-Earth O<SUB>2</SUB> and Testing the Habitable Zone Oxygen Hypothesis'
  authors:
  - Hardegree-Ullman, Kevin K.
  - Apai, Dániel
  - Haffert, Sebastiaan Y.
  - Schlecker, Martin
  - Kasper, Markus
  - Kammerer, Jens
  - Wagner, Kevin
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.3847/1538-3881/adb02f
  abstract: Biosignature detection in the atmospheres of Earth-like exoplanets is one of the most significant and ambitious
    goals for astronomy, astrobiology, and humanity. Molecular oxygen is among the strongest indicators of life on Earth,
    but it will be extremely difficult to detect via transmission spectroscopy. We used the Bioverse statistical framework
    to assess the ability to probe Earth-like O<SUB>2</SUB> levels on hypothetical nearby habitable zone exo-Earth candidates
    (EECs) using direct imaging and high-resolution spectroscopy on the Giant Magellan Telescope (GMT) and the Extremely Large
    Telescope (ELT). Assuming continued improvement in instruments and data processing, our analysis highlights the best-case
    scenarios. Earth-like O<SUB>2</SUB> levels could be probed on up to ∼7 and ∼19 EECs orbiting bright M dwarfs within 20
    pc in a hypothetical 10 yr survey on the GMT and ELT, respectively. Four known super-Earth candidates, including Proxima
    Centauri b, could be probed for O<SUB>2</SUB> within about 1 week of observations on the ELT and a few months on the GMT.
    We also assessed the ability of the ELT to test the habitable zone oxygen hypothesis—that habitable zone Earth-sized planets
    are more likely to have O<SUB>2</SUB>—within a 10 yr survey using Bioverse. Testing this hypothesis requires either ∼one-half
    of the EECs to have O<SUB>2</SUB> or ∼one-third if η<SUB>⊕</SUB> is large. A Northern Hemisphere large-aperture telescope,
    such as the Thirty Meter Telescope, would expand the target star pool by about 25%, reduce the time to probe biosignatures
    on individual targets, and provide an additional independent check on potential biosignature detections.
