  arxiv_id: '2509.06747'
  ads_bibcode: 2025PASP..137i4401P
  title: 'Direct Detection of Known Exoplanets in Reflected Light: Predicting Sky Position with Literature Orbit Solutions'
  authors:
  - Pearce, Logan A.
  - Males, Jared R.
  - Limbach, Mary Anne
  year: '2025'
  pubdate: '2025-09-00'
  doi: 10.1088/1538-3873/ae015e
  abstract: 'The next generation of ground- and space-based observatories will enable direct imaging and characterization
    of cold, mature planets through thermal emission and, for the first time, reflected light detection. Known RV and astrometrically
    detected planets provide a known population for detection and characterization observations. However, many of the most
    promising targets lack orbital parameters of sufficient precision to confidently predict their location on relative to
    the star for a direct imaging campaign. We have developed projecc, an open source Python package designed to generate
    sky-plane planet location posteriors from literature orbit solutions. This tool aims to facilitate community preparation
    for direct imaging observations of known planets. In this work we describe projecc and use it to examine two case study
    systems relevant to reflected light imaging with ELTs: GJ 876 b, which we find has a well-constrained prediction, and
    Proxima Centauri b, whose location remains highly uncertain. We provide a web app for exploring reflected light planet
    targets and their orbit solutions, including predictions from literature for 17 additional planets, located at https://reflected-light-planets.streamlit.app/.
    We also discuss future upgrades to projecc.'
