  ads_bibcode: 2026exoe.confE..61H
  title: Exploring the habitability and observability of Proxima b with ANDES and PCS
  authors:
  - Houelle, Mathilde
  - Bolmont, Emeline
  - Lovis, Christophe
  year: '2026'
  pubdate: '2026-04-00'
  doi: 10.5281/zenodo.19686530
  abstract: 'Upcoming ELT instruments such as ANDES and PCS will soon enable atmospheric characterization of nearby non-transiting
    terrestrial exoplanets around M dwarf stars that were previously not accessible thanks to a new method combining high-contrast
    imaging and high-resolution spectroscopy in reflected light. A "golden sample" of five temperate rocky exoplanets was
    identified and will be observed with ANDES. In this study, we will focus on one of these targets: Proxima Centauri b.
    Previous studies performed climate simulations of Proxima b to explore its habitability. They showed that a broad range
    of atmospheric compositions allows the planet to sustain liquid water on its surface, suggesting that the planet could
    be habitable. In this study, we aim to re-explore the possible climate regimes of Proxima b using a fast new ocean model
    coupled to the Generic Planetary Climate Model (GPCM, Forget et al. in prep), which is a compromise between the simple
    version of the static ocean model used in Turbet et al. (2016) and a full 3D dynamic ocean model as in Del Genio et al.
    (2019). Additionally, to prepare upcoming observations, we aim to study the detectability of the planet to be able to
    efficiently characterize its atmosphere. In particular, we will present synthetic reflected light spectra of the simulated
    climates of Proxima b, which can be directly used to predict observables that will be characterized with RISTRETTO, ANDES,
    and PCS in the upcoming years.'
