  ads_bibcode: 2024maeu.conf..845I
  title: Migration of planetesimals and dust particles in the Proxima Centauri exoplanetary system
  authors:
  - Ipatov, S.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.26119/VAK2024.134
  abstract: The motion of the planetesimals and dust particles from the vicinity of the orbit of planet c in the Proxima Centauri
    exoplanetary system was studied. The computer simulations of planetesimal motion showed that during the growth of the
    mass of planet c by a factor of 2, the semimajor axis of its orbit could decrease by at least a factor of 1.5. After hundreds
    of millions of years, some planetesimals could still move in elliptical resonant orbits inside the feeding zone of planet
    c that had been mainly cleared from planetesimals. The amount of water delivered to the inner planet Proxima Centauri
    b probably exceeded the mass of water in Earth's oceans. It is difficult to expect the existence of such a massive analogue
    of the Oort cloud around Proxima Centauri as around the Sun. The probability of the collisions of the dust particles with
    a diameter of about 100 microns migrated from the feeding zone of planet c with planet b could exceed 0.1, and it could
    be much greater than for the planetesimals from the same zone. More particles with diameters of the order of 10 and 100
    microns can be delivered from the feeding zone of planet c to planet b than to planet c.
