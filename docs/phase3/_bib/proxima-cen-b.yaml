    the spatial problem is explored by computing families of Halo orbits and procuring invariant tube manifolds associated
    with them, precisely mapping the possible regions of motion that emanate from these orbits. The orbits are generated using
    a robust differential correction and numerical integration scheme. The results contribute to our knowledge of the gravitational
    dynamics at work and provide important data that could potentially guide future expeditions to this exotic exoplanetary
    system.
