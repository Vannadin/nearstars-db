- arxiv_id: null
  ads_bibcode: 2022hw...prop...39K
  title: Characterizing the gamut of habitable zone rocky exoplanets around M-dwarfs with next-generation observatories
  authors:
  - Komacek, Thaddeus
  year: '2022'
  pubdate: '2022-00-00'
  doi: null
  abstract: A panoply of habitable worlds orbiting M dwarf stars exist in our galaxy. A subset of those that are nearby are
    pristine targets for the NASA James Webb Space Telescope (JWST) and upcoming ground-based ELTs and future space mission
    concepts including MIRECLE, the Habitable Worlds Observatory, and eventually the Far-IR Surveyor and LIFE flagships. The
    upcoming observational characterization of these planets necessitates the development of detailed theoretical expectations
    for their atmospheric conditions, including composition, thermal structure, cloud cover, and resulting observable properties.
    Previous one-dimensional and three-dimensional modeling work has demonstrated that photochemistry and hazes induced by
    high-energy radiation from the host star and dayside cloud cover driven by deep convection, respectively, will impact
    the atmospheric composition, climate state, and spectra of habitable rocky exoplanets orbiting M dwarf stars. However,
    the possible parameter space of habitable rocky planets is vast, and detailed theoretical expectations must be developed
    in order to ensure robust inferences when interpreting upcoming observations. <P />The primary objective of this proposal
    develop a broad suite of theoretical predictions for the observable properties of rocky planets orbiting M dwarf stars
    using state-of-the-art modeling toolkits in order to determine our ability to interpret upcoming astronomical observations.
    In this work, we will utilize the CLIMA and Atmos models to develop theoretical expectations for the 1D climate state
    and resulting atmospheric composition and how it is shaped by photochemistry. We will use this atmospheric composition
    as input to develop predictions for the three-dimensional climate of habitable exoplanets with the ExoCAM General Circulation
    Model (GCM), which has been broadly used to study the climates of temperate rocky exoplanets. We will then post-process
    our ExoCAM simulations with the NASA Planetary Spectrum Generator (PSG) to develop comprehensive predictions for the observable
    properties of rocky exoplanets orbiting M dwarf stars. <P />The proposed work would develop comprehensive model predictions
    using Atmos, and ExoCAM in series for rocky planets orbiting M dwarf stars over a broad range of surface pressure, instellation,
    planetary radius, and atmospheric composition, as well as for varying assumptions about the relative coverage and distribution
    of continents and ocean basins. This will test existing theories for the effect of planetary parameters on climate. We
    will additionally conduct this same suite of models for pristine rocky exoplanet targets, both transiting and non-transiting,
    that may be habitable. This set of planets will include Proxima Centauri b, TRAPPIST-1e, Wolf 1069b, and LP 890-9c, along
    with any other newly discovered targets with comparable signal-to-noise. We will use our model predictions to simulate
    observations of these planets with PSG both for near-term transmission spectroscopy observations with JWST and future
    phase-resolved emission observations in the mid-infrared with MIRECLE/FIR Surveyor/LIFE and ground-based high dispersion
    and high contrast imaging with ELTs. We will similarly use the results of our large grid of models to simulate the impacts
    of planetary parameters on observations with future observatories.
