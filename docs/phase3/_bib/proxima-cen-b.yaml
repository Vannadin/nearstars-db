  abstract: Close-in exoplanets around magnetically active M dwarfs are expected to be subject to high XUV fluxes, massive
    and fast stellar winds, and coronal mass ejection. The fate of thick atmospheres of rocky exoplanets exposed to these
    fluxes that are the major ingredient for habitability remains poorly understood. The exoplanetary atmospheres can be significantly
    heated through Joule-heating caused by ionospheric electric currents and energetic particle precipitation. Here we use
    the observational constraints for stellar wind environments of the cool M5.5 dwarf star, Proxima Centauri to calculate
    the rates of atmospheric heating induced by stellar wind at the orbital location of Proxima Centauri b. We will report
    the results of global MHD simulations of magnetic interaction between magnetic fields of stellar wind and exoplanetary
    magnetosphere. We then will use the output field aligned currents and the ionospheric conductance consistently calculated
    using Superthermal Proton, Electron and Atomic Hydrogen-tRansport in the Ionosphere and Thermosphere (SPEAH-RIT) to calculate
    the resultant Joule heating rates in exoplanetary atmospheres. We will compare these heating rates with the ones induced
    by XUV driven heating and discuss implication for habitability.
