  ads_bibcode: 2022cosp...44.1395S
  title: 'Identifying the Terrestrial Exoplanets which Deserve More Scrutiny for Atmosphere Viability: the mASC method'
  authors:
  - Samara, Evangelia
  - Patsourakos, Spiros
  - Georgoulis, Manolis K.
  year: '2022'
  pubdate: '2022-07-00'
  doi: null
  abstract: We introduce a practical and physically intuitive method to assess whether a given exoplanet is a viable candidate
    for the existence of an atmosphere, thanks to an efficient magnetospheric shielding from intense space weather activity
    from its host star. Our proposed mASC (magnetic Atmosphere Sustainability Constraint) relies on a best-case scenario for
    a dynamo-generated planetary magnetic field and subsequent magnetic pressure, and a worst-case scenario for the magnetic
    pressure of stellar CMEs. The method estimates a dimensionless ratio R whose excursion from unity implies accordingly
    an "atmosphere likely" (R &lt; 1) or an "atmosphere unlikely" (R &gt; 1) scenario. In this work, we implement our mASC
    on six "famous" exoplanets whose discovery was greeted with praise and hopes of habitability. These are Kepler-438b, Proxima-Centauri
    b, and Trappist-1d, -1e, -1f, -1g. We conclude that for none of them the existence of an atmosphere is likely while our
    findings are robust for five out of six cases. We conclude that the mASC ratio could help set observing priorities and
    suggest which exoplanets deserve further scrutiny, possibly toward the ultimate search of potential biosignatures, among
    other objectives.
