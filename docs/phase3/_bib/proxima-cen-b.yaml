  doi: null
  abstract: Recent discoveries of earth-like planets around M-stars have highlighted the importance of understanding planet
    formation around late-type stars. However, this effort has been hampered by the lack of resolved observations of protoplanetary
    disks. In particular, scattered light images of M-star disks near the age of dispersal are critical to making further
    progress. The Upper Sco region provides a promising venue to remedy this situation, as it is the closest region with an
    age of 5-11 Myrs, commensurate with dispersal timescales. We propose to observe three M-star protoplanetary disks in the
    Upper Sco association using HST/STIS coronography to resolve the disks in scattered-light for the first time and to search
    for morphological signatures of forming planets. These three disks have been selected based on ALMA mm-dust and CO measurements
    that display radii within the STIS field of view and outside its inner working angle (IWA). We will use these observations
    to carry out a comparative study of the evolutionary state between M-star disks in Upper Sco and the younger 1-2 Myr Taurus
    region, leveraging both previous scattered-light images of disks in Taurus, as well as previous observations of the mm-dust
    and CO in both regions. All three targets are too faint to be observed using ground-based AO. Therefore, HST/STIS is the
    only instrument able to make these important measurements. These observations will act as critical diagnostics of the
    evolutionary state of nearby M-star protoplanetary disks, that will inform theories of planet formation and will further
    our understanding of the evolution of the planets around M-stars, such as our nearest neighbor Proxima Centauri b.
