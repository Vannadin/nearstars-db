    system // Modern astronomy: from the Early Universe to exoplanets and black holes. P. 852-855. https://doi.org/10.26119/VAK2024.135.
    https://www.researchgate.net/publication/387472279. Ipatov S.I. (2024c) Migration of planetesimals in the TRAPPIST-1 and
    GLISSE 581 exoplanetary systems // The Fifteenth Moscow Solar System Symposium (October 21- 25, 2024). https://ms2024.cosmos.ru/docs/2024/15-MS3_Abstract_Book-10-18.pdf.
