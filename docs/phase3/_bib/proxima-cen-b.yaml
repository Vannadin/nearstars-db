- &id043
  arxiv_id: '1802.00378'
  ads_bibcode: 2018ApJ...854..171L
  title: The Influence of a Substellar Continent on the Climate of a Tidally Locked Exoplanet
  authors:
  - Lewis, Neil T.
  - Lambert, F. Hugo
  - Boutle, Ian A.
  - Mayne, Nathan J.
  - Manners, James
  - Acreman, David M.
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.3847/1538-4357/aaad0a
  abstract: Previous studies have demonstrated that continental carbon-silicate weathering is important to the continued habitability
    of a terrestrial planet. Despite this, few studies have considered the influence of land on the climate of a tidally locked
    planet. In this work we use the Met Office Unified Model, coupled to a land-surface model, to investigate the climate
    effects of a continent located at the substellar point. We choose to use the orbital and planetary parameters of Proxima
    Centauri B as a template, to allow comparison with the work of others. A region of the surface where T <SUB>s</SUB> &gt;
    273.15 K is always retained, and previous conclusions on the habitability of Proxima Centauri B remain intact. We find
    that substellar land causes global cooling and increases day-night temperature contrasts by limiting heat redistribution.
    Furthermore, we find that substellar land is able to introduce a regime change in the atmospheric circulation. Specifically,
    when a continent offset to the east of the substellar point is introduced, we observe the formation of two mid-latitude
    counterrotating jets, and a substantially weakened equatorial superrotating jet.
