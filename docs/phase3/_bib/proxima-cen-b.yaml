  arxiv_id: '2204.03501'
  ads_bibcode: 2022A&A...662A..15M
  title: Tidally driven tectonic activity as a parameter in exoplanet habitability
  authors:
  - McIntyre, S. R. N.
  year: '2022'
  pubdate: '2022-06-00'
  doi: 10.1051/0004-6361/202141112
  abstract: 'Context. The habitability of an exoplanet is defined by its ability to support surface liquid water. The long-term
    carbon cycle plays an important role in regulating planetary temperature, thus supporting the conditions for the preservation
    of surface liquid water and, consequently, the habitability of exoplanets. <BR /> Aims: On Earth, plate tectonics play
    an integral role in driving the long-term carbon cycle; however, on tidally locked rocky exoplanets, alternative tectonic
    mechanisms driven by tidal stress and tidal heating could serve this purpose in an analogous way. <BR /> Methods: We calculated
    tidal stress and tidal heating rates to model the likelihood of tectonic activity maintaining stable climates suitable
    for surface liquid water on tidally locked rocky exoplanets with radii of R<SUB>p</SUB> ≤ 1.23 R<SUB>⊕</SUB>. <BR /> Results:
    Applying the tidal models to our sample of 767 tidally locked rocky exoplanets reveals that ~10% of exoplanets, including
    Proxima Cen b and GJ 1061 d from the circumstellar habitable zone (CHZ), pass the tidal stress subduction threshold for
    mobile lid tectonic activity and simultaneously reside within the optimal tidal heating zone. This subset of exoplanets
    could sustain tidally induced temperate mobile lid tectonic activity that is comparable to plate tectonics on Earth, aiding
    in maintaining the presence of surface liquid water. Furthermore, ~40% of exoplanets from our sample located in the CHZ
    would be unable to maintain the tectonic activity needed to stabilise the climate and are unlikely to retain surface liquid
    water. When broadening our modelling to establish the overlap between tidal stress, tidal heating, and the CHZ to discover
    optimal regions to target for future observations, we determined that tidally driven tectonic activity conducive to the
    maintenance of surface liquid water occurs predominantly around M dwarfs. We identified intersections, where both mobile
    lid and optimal tidal heating could be sustained on eccentric (e &gt; 0.1) Earth-sized exoplanets (R<SUB>p</SUB> = 1.0-1.23
    R<SUB>⊕</SUB>) orbiting in the CHZ of low-mass M dwarfs. <P />Table 1 is only available at the CDS via anonymous ftp to
    <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/662/A15">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/662/A15</A>'
