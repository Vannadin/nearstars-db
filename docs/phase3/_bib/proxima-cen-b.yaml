  arxiv_id: null
  ads_bibcode: 2023AAS...24120410F
  title: Climate analysis on a newly discovered non-transiting nearby terrestrial exoplanet
  authors:
  - Fauchez, Thomas
  - Crouse, Jaime
  - Wolf, Eric
