  ads_bibcode: 2021spc..confE..23C
  title: 'Planet formation around very low mass stars: the case of CIDA 1'
  authors:
  - Curone, Pietro
  year: '2021'
  pubdate: '2021-10-00'
  doi: 10.5281/zenodo.5607750
  abstract: A groundbreaking result of exoplanetary research is the detection of rocky and gas giant planets orbiting around
    very low mass stars located in the Solar neighborhood (e.g., TRAPPIST-1 system, Proxima Centauri b, GJ 3512 b). However,
    current theoretical models predict that planet formation in these environments is problematic, and the development of
    gas giants is even excluded. Nowadays, high-resolution and high-sensitivity observations from ALMA are able to resolve
    possibly planet-induced substructures in protoplanetary disks around very low mass stars. An excellent case study is CIDA
    1, a 0.1-0.2 solar masses star in Taurus hosting a disk observed by ALMA, whose dust emission shows a gap hinting at the
    presence of a massive planet. Due to the complex dynamics of such a system, challenging numerical simulations are needed
    to interpret the ALMA data. I performed Smoothed Particle Hydrodynamics (SPH) simulations to model the planet-disk interactions.
    Then, I post-processed the results with radiative transfer simulations and, finally, obtained synthetic images of the
    dust and gas emissions to compare to the observations. I found that an embedded planet with a minimum mass of 1.4 Jupiter
    masses can explain the observed structures in CIDA 1. Therefore, this result suggests the presence of a giant planet around
    a young very low mass star, questioning our understanding of planet formation in this low-stellar-mass regime.
