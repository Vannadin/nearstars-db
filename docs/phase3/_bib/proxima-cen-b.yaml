  title: Dynamics of a QBO-Like Phenomenon on a Tidally Locked Planet
  authors:
  - Cohen, Maureen
  - Bollasina, Massimo
  - Palmer, Paul
  year: '2021'
  pubdate: '2021-12-00'
  doi: null
  abstract: On Earth, equatorial stratospheric jets reverse direction every 26-28 months in a phenomenon known as the quasi-biennial
    oscillation (QBO). The QBO is driven by interactions between equatorial waves and the background flow. In this presentation,
    I discuss the dynamics of a QBO-like phenomenon simulated in an idealized tidally locked general circulation model of
    Proxima Centauri b based on the Met Office Unified Model. Tidally locked planets receive radiation on only one hemisphere
    and, as a result, develop an asymmetric background flow characterised by standing planetary-scale Rossby waves and spatially
    localized generation of internal gravity waves. The interaction between the gravity waves and the Rossby waves drives
    a stratospheric wind oscillation whose amplitude and timing vary with longitude, exhibiting a damped oscillation at the
    antistellar point and a maximum at the western terminator.
