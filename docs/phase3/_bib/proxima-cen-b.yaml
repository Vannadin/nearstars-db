  abstract: The scenario and the efficiency of water transport by icy asteroids and comets are still amongst the most important
    unresolved questions of planetary systems. The detection of Proxima Centauri b (PCb), which moves in the habitable zone
    of this system, triggered a debate whether or not this planet can be habitable depending on its formation history and
    available water content. A better understanding of cometary dynamics in extrasolar systems shall provide information about
    cometary reservoirs and give an insight into water transport especially to planets in the habitable zone. <P />In our
    study we perform numerous N-body simulations with PCb and an outer reservoir of comets. We investigate close encounters
    and collisions with the planet, which are important for the transport of water. Observers found hints for a second planet
    with a period longer than 60 days. Our studies show, that from the dynamical point of view, two planets are stable even
    for a massive second planet with up to 12 Earth masses (Schwarz et al. 2018). In a third model we perform simulations
    including exocomets, a second planet, and the influence of the binary alpha-Centauri. <P />The studies on the dynamics
    of exocomets reveal that the outer limit for water transport is between 100 and 200 au. In addition we could show that
    water transport would be possible for a close in planetesimal cloud (1-4 au) which was detected by Anglada et al. 2017.
    From our simulations we estimate the water mass delivered to the planets to be between 0 and 30 Earth oceans.
