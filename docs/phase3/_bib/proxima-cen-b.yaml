  ads_bibcode: 2018shin.confE...5S
  title: Predicting Radio Emission of Exoplanets in Enhanced Stellar Wind Environments
  authors:
  - Sciola, Anthony
  - Toffoletto, Frank
  - Alexander, David
  year: '2018'
  pubdate: '2018-07-00'
  doi: null
  abstract: The Radiometric Bode's Law is a scaling law that predicts the power of a planet's radio emission based on the
    incident stellar wind power, which works for the magnetized solar system planets. This scaling law has since been used
    to predict the radio emission from exoplanets such as Proxima Centauri b without addressing several space weather factors
    that greatly alter the assumptions used in the calculation, which may result in an incorrect prediction of the actual
    emission power. Utilizing 3D MHD modeling coupled with inner magnetosphere and ionosphere, we provide a means of more
    accurately estimating the efficiency at which the incident stellar wind power penetrates into the ionosphere and is available
    for the production of planetary radio emission. This more representative efficiency can be taken into account when using
    the Radiometric Bode's Law for exoplanetary systems whose space weather environment strongly differ from that of our solar
    system.
