  abstract: Earth-like exoplanets are, by nature, among the most difficult exoplanets to observe, requiring instrumentation
    beyond current limits. Even with upcoming telescopes, the data necessary to detect life will be buried in noise. Thus,
    techniques for noise removal are a major limiting factor in the search for life. Here we present application of several
    innovative photometric and light-curve modeling techniques to Spitzer light curves and synthetic James Webb Space Telescope
    images. During a search for transits of Proxima Centauri b, I found clear evidence of a vibrational telescope effect that
    mimics planetary or cometary transits. Studying this effect led to the development of an elliptical photometry routine,
    which adapts to the shape of the point-spread function throughout an observation, removing the effect of the vibration
    and improving exoplanet signals. I studied the impact of this photometry technique, as well as two correlated noise modeling
    methods, BiLinearly Interpolated Subpixel Sensitivity maps and Pixel-Level Decorrelation, on orbital and atmospheric retrievals
    using low signal-to-noise Spitzer eclipses of WASP-29b, WASP-34b, and GJ 436b. I also studied synthetic James Webb Space
    Telescope observations, using ExoSim to simulate individual noise-injected image readouts and extracting spectra, to provide
    accurate, realistic estimates of science possibilities for transiting exoplanet science in the coming era. Spitzer is
    operated by the Jet Propulsion Laboratory, California Institute of Technology, under a contract with NASA. This work was
    supported by NASA Planetary Atmospheres grant NNX12AI69G, NASA Astrophysics Data Analysis Program grant NNX13AF38G, and
    NASA Exoplanet Research Program grant NNX17AB62G.
