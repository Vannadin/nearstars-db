  abstract: This article investigates the state of an infinitesimal third body within the Proxima Centauri─Proxima Centauri
    <inline-formula><mml:math><mml:mi>b</mml:mi></mml:math></inline-formula> dynamical system. Within this framework, the
    authors discover the Lagrange points <inline-formula><mml:math><mml:mrow><mml:msub><mml:mi>L</mml:mi><mml:mi>i</mml:mi></mml:msub><mml:mspace></mml:mspace><mml:mrow><mml:mo>(</mml:mo><mml:mi>i</mml:mi><mml:mo>=</mml:mo><mml:mn>1</mml:mn><mml:mo>,</mml:mo><mml:mn>2</mml:mn><mml:mo>,</mml:mo><mml:mn>3</mml:mn><mml:mo>,</mml:mo><mml:mn>4</mml:mn><mml:mo>,</mml:mo><mml:mn>5</mml:mn><mml:mo>)</mml:mo></mml:mrow></mml:mrow></mml:math></inline-formula>
    and trace the zero velocity curves to facilitate motion analysis. The study primarily focuses on the stability analysis
    and construction of planar Lyapunov orbits around the collinear Lagrange points <inline-formula><mml:math><mml:msub><mml:mi>L</mml:mi><mml:mn>1</mml:mn></mml:msub></mml:math></inline-formula>
