  arxiv_id: '2512.16619'
  ads_bibcode: 2026A&A...707A.281B
  title: 'Observing spatial and temporal variations in the atmospheric chemistry of rocky exoplanets: Prospects for mid-infrared
    spectroscopy'
  authors:
  - Braam, M.
  - Angerhausen, D.
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.1051/0004-6361/202557807
  abstract: Context. Future telescopes such as the Large Interferometer For Exoplanets (LIFE) will enable the unprecedented
    characterisation of the atmospheres of nearby rocky exoplanets, probing mid-infrared signatures of key molecules (e.g.
    CO<SUB>2</SUB>, H<SUB>2</SUB>O, O<SUB>3</SUB>, and CH<SUB>4</SUB>). Whilst 4D spatial and temporal variations of Earth
    as an exoplanet are below spectroscopic detection limits, such variability is strongly planet-specific. Aims. We investigated
    LIFE's ability to detect 4D spatial and temporal variability in the atmospheres of tidally locked exoplanets. Methods.
    We created daily synthetic LIFE observations of Proxima Centauri b in a 1:1 and an eccentric 3:2 spin-orbit resonance
    (SOR), using LIFESIM on spectra from daily 3D climate-chemistry model (CCM) outputs of an aquaplanet with Earth-like composition.
    The spectra assume an inclination of 70<SUP>◦</SUP>. Results. Hemispheric distributions of temperature, clouds, and chemical
    species determine spectral signatures and variability with orbital phase angle. Such variability dictates the extent to
    which parameters (e.g. radius, temperature, or chemical abundances) can be reliably inferred from snapshot spectra at
    arbitrary viewing geometries. In the 1:1 SOR, the MIR spectra vary significantly with viewing geometry and indirectly
    probe atmospheric circulation. Nightside temperature inversions generate O<SUB>3</SUB>, CO<SUB>2</SUB>, and H<SUB>2</SUB>O
    emission features, though these lie below LIFE's detection threshold; instead, O<SUB>3</SUB> features disappear at certain
    phase angles. In contrast, the 3:2 SOR yields a more homogeneous atmosphere with weaker phase variability but enhanced
    bolometric flux due to eccentric heating. Phase-resolved LIFE observations confidently distinguish between the SORs and
    capture seasonal O<SUB>3</SUB> variability for golden targets such as Proxima Centauri b. In the case of abiotic O<SUB>2</SUB>
    and O<SUB>3</SUB> build-up, the O<SUB>3</SUB> variability presents a potential false positive scenario. Conclusions. Hence,
    LIFE can disentangle different spin-orbit states and resolve 4D atmospheric variability, enabling the daily characterisation
    of the 4D physical and chemical state of nearby terrestrial worlds. Importantly, this characterisation requires phase-resolved
    rather than snapshot spectra.
