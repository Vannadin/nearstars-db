  arxiv_id: '2404.17972'
  ads_bibcode: 2024MNRAS.531.1471D
  title: 'The impact of ozone on Earth-like exoplanet climate dynamics: the case of Proxima Centauri b'
  authors:
  - De Luca, P.
  - Braam, M.
  - Komacek, T. D.
  - Hochman, A.
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1093/mnras/stae1199
  abstract: The emergence of the JWST and the development of other advanced observatories (e.g. ELTs, LIFE, and HWO) marks
    a pivotal moment in the quest to characterize the atmospheres of Earth-like exoplanets. Motivated by these advancements,
    we conduct theoretical explorations of exoplanetary atmospheres, focusing on refining our understanding of planetary climate
    and habitability. Our study investigates the impact of ozone on the atmosphere of Proxima Centauri b in a synchronous
    orbit, utilizing coupled climate chemistry model simulations and dynamical systems theory. The latter quantifies compound
    dynamical metrics in phase space through the inverse of co-persistence (θ) and co-dimension (d), of which low values correspond
    to stable atmospheric states. Initially, we scrutinized the influence of ozone on temperature and wind speed. Including
    interactive ozone [i.e. coupled atmospheric (photo)chemistry] reduces the hemispheric difference in temperature from 68
    °K to 64 °K, increases (~+7 °K) atmospheric temperature at an altitude range of ~20-50 km, and increases variability in
    the compound dynamics of temperature and wind speed. Moreover, with interactive ozone, wind speed during highly temporally
    stable states is weaker than for unstable ones, and ozone transport to the nightside gyres during unstable states is enhanced
    compared to stable ones (~+800 DU). We conclude that including interactive ozone significantly influences Earth-like exoplanets'
    chemistry and climate dynamics. This study establishes a novel pathway for comprehending the influence of photochemical
    species on the climate dynamics of potentially habitable Earth-like exoplanets. We envisage an extension of this framework
    to other exoplanets.
