  doi: null
  abstract: Classically, the "habitable zone" of a star has been defined based on the orbital radius at which water could
    remain liquid, and therefore usable by life (as we know it to exist on Earth) (Huang, 1959). However, with the upcoming
    launch of the James Webb Space Telescope, and potential future missions including LUVOIR and HabEx, in order to effectively
    seek out and analyze data, it will be critical to pursue a more refined definition of what it means for a planet to be
    considered habitable. Herein, we investigate whether stellar insolation or planetary rotation rate has any impact on the
    percentage of a planet's surface and volume that can be considered habitable. Extending upon the ROCKE-3D GCM simulations
    of Way et al. (2018), habitability fractions (Spiegel et al., 2008) were computed based on not only temperature (0 - 100C),
    but also water availability in the form of soil wetness, lake fraction, and ice-free ocean volume (Sparrman, 2020). Both
    volumetric and surface area habitability fractions were derived, and the results have been separated into ocean and land
    habitabilities. The simulation analysis shows that as stellar insolation increases, so does habitability. Further simulations
    are necessary to determine an upper limit of stellar insolation, due to the current model's radiation scheme breaking
    down at higher incident stellar radiation levels. Additionally, as rotation rate decreases (increasing the planet's sidereal
    day length), the data points' spread for a given rotation rate increases, leading to an overall decrease in average habitability.
    Huang, S. (1959). Occurrence of life in the universe. American Scientist, 47(3):397402. Sparrman, V. (2020). Estimates
    of fractional habitability for proxima centauri b using a 3d gcm. Spiegel, D. S., Menou, K., and Scharf, C. A. (2008).
