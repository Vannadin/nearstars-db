  ads_bibcode: 2026AAS...24731201H
  title: Estimating Magnetic Fields and Bulk Chemistry in Rocky Exoplanets and Their Consequences for Surface Habitability
  authors:
  - Hart, Roger
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: 'This study expands on prior work linking stellar metallicity to planetary geophysical properties, including bulk
    chemistry, interior structure, and surface habitability of rocky exoplanets. Using stellar compositions from the Hypatia
    Catalog, we infer plausible planetary chemistries and mantle mineralogies, then couple these to magnetic field scaling
    laws to estimate dynamo-generated field strengths. Earth and selected Solar System bodies provide reference cases for
    rocky exoplanets spanning ~0.8─9 M⊕ and 1─2.5 R⊕. Stellar metallicity exerts first-order control on planetary differentiation,
    with Fe/Mg/Si ratios determining core size and mantle composition. Consistent with prior studies, the results show predicted
    mantle mineralogies dominated by olivine and orthopyroxene, though some planets deviate depending on stellar chemistry.
    These interior variations influence both the capacity to sustain convection-driven dynamos and the character of surface
    geology—ranging from basaltic crusts similar to Earth''s oceanic plates to more silica-rich volcanic provinces. Planets
    such as TRAPPIST-1e, LHS 1140 b, and Kepler-442b are compelling examples: their host star metallicities suggest Earth-like
    chemistries, while magnetic field scaling predicts sufficient shielding to preserve atmospheres. In contrast, planets
    orbiting metal-poor or highly active stars (e.g., Proxima Centauri b) may develop weaker dynamos or unstable mantle dynamics,
    reducing long-term habitability. Together, these results emphasize the coupled role of stellar metallicity, mantle mineralogy,
    and magnetic field scaling laws in setting the geophysical and geochemical boundary conditions for rocky exoplanet habitability.'
