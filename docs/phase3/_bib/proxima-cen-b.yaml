  abstract: We simulated the detectability of a NIR absorbing surface biosignature feature with simulated spectral observations
    of the nearby exoplanet Proxima Centauri-b. We modeled the surface biosignature feature with a reflectance spectrum based
    on a photosynthetic terrestrial bacteria species. We modeled surface distributions of the organism on the planet's surface
    based on climate states from a General Circulation Model. We simulated observations of Proxima Centauri-b with the LUVOIR
    A/B concepts, with the latter serving as a proxy to the planned Habitable Worlds Observatory. Using the simulated observations,
    we calculated integration times necessary to detect the biosignature. We found that such a spectral biosignature would
    be detectable on Proxima Centauri-b if the organism is moderately abundant (greater than a few percent global surface
    area coverage), and as long as the atmosphere is not too opaque in the wavelength range under consideration. There is
    a methane absorbance feature that spectrally overlaps with the biosignature, but we find the features to be non-degenerate.
    We find that small amounts of methane, water clouds, and organic haze do not greatly impede detectability. We also find
    evidence that such a surface biosignature could be detectable on exoplanets within 15pc, but future work is needed to
    corroborate this.
