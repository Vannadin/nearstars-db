  abstract: Recent JWST NIRSpec PRISM observations of TRAPPIST-1 h provide new insights
    into the atmospheric and stellar characteristics of this intriguing M dwarf system.
    As part of a larger program aimed at empirically testing the validity of the "cosmic
    shoreline" in M dwarf planetary systems, we conducted two visits of TRAPPIST-1
    h. During the second visit, a stellar flare occurred just prior to the planet's
    transit, and the innermost planet, TRAPPIST-1 b, also transited during the middle
    of the planet h's transit. We will present our in-depth analysis of the atmospheres
