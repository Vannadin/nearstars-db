- &id111
  arxiv_id: '2409.18940'
  ads_bibcode: 2024NatCo..15.8374K
  title: The erosion of large primary atmospheres typically leaves behind substantial
    secondary atmospheres on temperate rocky planets
  authors:
  - Krissansen-Totton, Joshua
  - Wogan, Nicholas
  - Thompson, Maggie
  - Fortney, Jonathan J.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.1038/s41467-024-52642-6
  abstract: Exoplanet exploration has revealed that many—perhaps most—terrestrial
    exoplanets formed with substantial H<SUB>2</SUB>-rich envelopes, seemingly in
    contrast to solar system terrestrials, for which there is scant evidence of long-lived
    primary atmospheres. It is not known how a long-lived primary atmosphere might
    affect the subsequent habitability prospects of terrestrial exoplanets. Here,
    we present a new, self-consistent evolutionary model of the transition from primary
    to secondary atmospheres. The model incorporates all Fe-C-O-H-bearing species
    and simulates magma ocean solidification, radiative-convective climate, thermal
    escape, and mantle redox evolution. For our illustrative example TRAPPIST-1, our
    model strongly favors atmosphere retention for the habitable zone planet TRAPPIST-1e.
    In contrast, the same model predicts a comparatively thin atmosphere for the Venus-analog
    TRAPPIST-1b, which would be vulnerable to complete erosion via non-thermal escape
    and is consistent with JWST observations. More broadly, we conclude that the erosion
    of primary atmospheres typically does not preclude surface habitability, and frequently
    results in large surface water inventories due to the reduction of FeO by H<SUB>2</SUB>.
