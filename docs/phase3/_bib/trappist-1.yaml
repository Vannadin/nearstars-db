  arxiv_id: '2604.05221'
  ads_bibcode: 2026ApJ..1001L..28S
  title: A Chemical Mismatch between Young Stars and Their Inner Disks
  authors:
  - Souto, Diogo
  - Pascucci, Ilaria
  - Cunha, Katia
  - Kanodia, Shubham
  year: '2026'
  pubdate: '2026-04-00'
  doi: 10.3847/2041-8213/ae5b7c
  abstract: We present the first stellar elemental abundance study for two very low-mass
    stars, similar in mass to TRAPPIST-1, in the ∼5─10 Myr old Upper Scorpius association.
    Their mid-infrared JWST/MIRI spectra, like those of many very low-mass stars,
    are hydrocarbon-rich, indicating C/O ratios greater than unity in the inner disk
    gas inside their snowlines. By fitting synthetic spectra to high-resolution Apache
    Point Observatory Galactic Evolution Experiment near-infrared stellar spectra,
    we show that, unlike their inner disks, both stars have solar C/O ratios. Their
    Fe, C, O, Mg, and Ca abundances are likewise consistent with solar values, placing
    them within the Galactic thin-disk population, as expected for nearby star-forming
    regions. This contrast between stellar and inner disk C/O ratios provides the
    first direct evidence that the inner disk's supersolar values are not inherited
    from the natal cloud but arise from disk processes. If these enhanced C/O ratios
    are primarily driven by inward drift of icy pebbles, there are major implications
    for disk evolution and planet formation, which we also discuss.
