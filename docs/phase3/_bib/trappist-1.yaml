  ads_bibcode: 2024A&A...684A.117D
  title: Teegarden's Star revisited. A nearby planetary system with at least three
    planets
  authors:
  - Dreizler, S.
  - Luque, R.
  - Ribas, I.
  - Koseleva, V.
