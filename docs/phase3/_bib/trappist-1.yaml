- &id068
  arxiv_id: '2410.01621'
  ads_bibcode: 2024ApJ...976...65R
  title: 'Magnetized Winds of M-type Stars and Star─Planet Magnetic Interactions:
    Uncertainties and Modeling Strategy'
  authors:
  - Réville, Victor
  - Jasinski, Jamie M.
  - Velli, Marco
  - Strugarek, Antoine
  - Brun, Allan Sacha
  - Murphy, Neil
  - Regoli, Leonardo H.
  - Rouillard, Alexis P.
  - Varela, Jacobo
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.3847/1538-4357/ad8132
  abstract: M-type stars are the most common stars in the Universe. They are ideal
    hosts for the search of exoplanets in the habitable zone (HZ), as their small
    size and low temperature make the HZ much closer-in than their solar twins. Harboring
    very deep convective layers, they also usually exhibit very intense magnetic fields.
    Understanding their environment, in particular their coronal and wind properties,
    is thus very important, as they might be very different from what is observed
    in the solar system. The mass-loss rate of M-type stars is poorly known observationally,
    and recent attempts to estimate it for some of them (e.g., TRAPPIST-1 and Proxima
    Centauri) can vary by an order of magnitude. In this work, we revisit the stellar
    wind properties of M dwarfs in the light of the latest estimates of <inline-formula>
    <mml:math overflow="scroll"><mml:mover accent="true"><mml:mrow><mml:mi>M</mml:mi></mml:mrow><mml:mrow><mml:mo>̇</mml:mo></mml:mrow></mml:mover></mml:math>
    </inline-formula> through Lyα absorption at the astropause and slingshot prominences.
    We outline a modeling strategy to estimate the mass-loss rate, radiative loss,
    and wind speed, with uncertainties, based on an Alfvén-wave-driven stellar wind
    model. We find that it is very likely that several TRAPPIST-1 planets lie within
    the Alfvén surface, which implies that these planets experience star─planet magnetic
    interactions (SPMIs). We also find that SPMIs between Proxima Cen b and its host
    star could be the reason for recently observed radio emissions.
