  title: 'Atmospheric Reconnaissance of TRAPPIST-1 b with JWST/NIRISS: Evidence for
    Strong Stellar Contamination in the Transmission Spectra'
  authors:
  - Olivia Lim
  - Björn Benneke
  - René Doyon
  - Ryan J. MacDonald
  - Caroline Piaulet
  - Étienne Artigau
  - Louis-Philippe Coulombe
  - Michael Radica
  - Alexandrine L'Heureux
  - Loïc Albert
  - Benjamin V. Rackham
