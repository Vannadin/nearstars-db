- arxiv_id: null
  ads_bibcode: 2026AAS...24711505W
  title: Dearth of Photosynthetically Active Radiation Suggests No Complex Life on
    Late M-Star Exoplanets
  authors:
  - Welsh, William
  - Soliz, Joseph
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: 'The origin of oxygenic photosynthesis is arguably the most important
    event in the history of life on Earth apart from the origin of life itself. It
    then took ~700 million years for oxygen to reach appreciable levels in the atmosphere:
    the "Great Oxygenic Event" (GOE) at ~2.3 Gya. Assuming this time lag is proportional
    to the rate of oxygen generation, we can estimate how long it would take for a
    GOE-like event to occur on a hypothetical Earth-analog planet orbiting a late
    M-type star such as TRAPPIST-1. Oxygenic photosynthesis uses 400-700 nm light,
    known as "Photosynthetically Active Radiation" (PAR). TRAPPIST-1 is an ultra-cool
    M dwarf (Teff ~2560 K) emitting mostly in the near-IR. If the Earth orbited TRAPPIST-1
    at the same distance as TRAPPIST-1e, it would be in the habitable zone but receive
    only ~0.9% of the PAR that it gets from the Sun. Assuming oxygen production on
    this hypothetical Earth is linearly proportional to the number of PAR photons,
    it would take a staggering ~77 billion years for a GOE, and ~270 billion years
    for a Cambrian Explosion. But the linear assumption is problematic: as light levels
    increase, photosynthesis saturates then declines - an effect known as "photoinhibition".
    Photoinhibition varies greatly from species to species and depends on a host of
    environmental factors. There is also very high sensitivity to the upper wavelength
    limit of the PAR: Extending out just 50 nm doubles the number of photons. Attempting
    to include these and other factors (e.g. stellar evolution) leads to a timescale
    for the GOE of ~2-4 Gyrs; a Cambrian Explosion would take ~6-13 Gyrs. By contrast,
    non-oxygenic photosynthetic bacteria make use of near-IR photons out to ~1100
    nm. For a TRAPPIST-1 star this provides over 50 times as many photons. Non-oxygenic
    photoautotrophs would have a huge advantage and likely dominate the biosphere.
    We speculate that on such a hypothetical planet, oxygen would never reach significant
    levels in the atmosphere, let alone a Cambrian Explosion. Thus complex animal
    life on such planets is very unlikely.'
