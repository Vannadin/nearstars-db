- &id161
  arxiv_id: '2601.20966'
  ads_bibcode: 2026arXiv260120966D
  title: 'The Third Option: Color Phase Curves to Characterize the Atmospheres of
    Temperate Rocky Exoplanets'
  authors:
  - Deming, Drake
  - Lincowski, Andrew
  - Kreidberg, Laura
  - Currie, Miles
  - Desert, Jean-Michel
  - Fu, Guangwei
  - Lustig-Yaeger, Jacob
  - Meadows, Victoria
  - Snellen, Ignas
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.48550/arXiv.2601.20966
  abstract: Detecting and characterizing the atmospheres of rocky exoplanets has proven
    to be challenging for JWST. Transit spectroscopy of the TRAPPIST-1 planets has
    been impacted by the effects of spots and faculae on the host star. Secondary
    eclipses have detected hot rocks, but evidence for atmospheres has been difficult
    to obtain. However, there is a third option that we call color phase curves. This
    method will apply to synchronously rotating non-transiting planets as well as
    transiting planets. A color phase curve uses photometry at a long-IR wavelength
    near the peak of the planetary thermal emission (e.g., 21 microns) divided by
    photometry at a shorter wavelength where the star dominates more strongly (e.g.,
    12 microns). We avoid wavelengths having potentially strong molecular absorption
    (e.g., 15 microns) to minimize degeneracies in the color phase curve, and we aim
    to detect and characterize the planetary atmosphere via its longitudinal heat
    transfer. The ratio of two wavelengths observed nearly simultaneously is designed
    to isolate thermal emission from the planet, discriminate against the star, and
    largely cancel instrumental systematic effects. Moreover, we show that invoking
    mass-radius relations, and using self-consistent physical models, will permit
    the longitudinal heat transfer to be measured independent of the orbital inclination.
    Radial velocity surveys are detecting many new exoplanets, including temperate
    rocky worlds with Earth-like masses. Most of those planets will not transit, but
    color phase curves have the potential to detect and characterize their atmospheres.
