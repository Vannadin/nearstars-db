  title: 'Constraints on the possible atmospheres on TRAPPIST-1 b: insights from 3D
    climate modeling'
  authors:
  - Maurel, Alice
  - Turbet, Martin
  - Ducrot, Elsa
  - Leconte, Jérémy
  - Chaverot, Guillaume
  - Milcareck, Gwenael
  - Revol, Alexandre
  - Charnay, Benjamin
