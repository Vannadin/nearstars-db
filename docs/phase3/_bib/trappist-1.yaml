  title: JWST Constraints on the Nature and Evolution of M Dwarf Terrestrial Planets
    in the TRAPPIST-1 System
  authors:
  - Gialluca, Megan
  - Meadows, Victoria
  - Thomas, Trent
  - Barnes, Rory
  - Garcia, Rodolfo
  - Birky, Jessica
