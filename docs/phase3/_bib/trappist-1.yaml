  abstract: The motion of bodies-planetesimals was studied in the Proxima Centauri
    and TRAPPIST 1 exoplanetary systems. The size of the feeding zone of planet Proxima
    Centauri c is discussed in [1]. It was noted that after hundreds of Myrs, some
    planetesimals could still move in elliptical resonant orbits inside the feeding
    zone of this planet that had been mainly cleared from planetesimals. The probability
    of a collision of a planetesimal initially located in the feeding zone of planet
    c with inner planet b was obtained to be about 2·10-4 and 10-3 at initial eccentricity
    of orbits of planetesimals equal to 0.02 or 0.15, respectively [2]. A lot of icy
    material and volatiles could be delivered from icy zone near planet c to inner
    planets b and d. The inclinations of orbits of 80% of the planetesimals that moved
    between 500 or 1200 AU from the star did not exceed 10o [3]. It was obtained that
    several planets in the TRAPPIST-1 system accumulated planetesimals initially located
    at the same distance. Outer layers of neighbouring planets can include similar
    material. For comparison, it was concluded in [4] that each terrestrial planet
    incorporated planetesimals from the feeding zones of all terrestrial planets.
    The studies were carried out under government-financed research project for the
    Vernadsky Institute. [1] Ipatov S.I. Solar System Research, 2023. 57. 236-248.
    [2] Ipatov S.I. Meteoritics and Planetary Science. 2023. 58. 752-774. [3] Ipatov
    S.I. Solar System Research. 2023. 57. 612-628. [4] Marov M.Ya, Ipatov S.I. Physics─Uspekhi.
    2023. 66, 2-31.
