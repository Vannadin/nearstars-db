- arxiv_id: null
  ads_bibcode: 2025epsc.conf..580B
  title: 'High-Resolution Transmission Spectroscopy of Venus: A Proxy for Atmospheric
    Characterization of Earth-Sized Exoplanets'
  authors:
  - Branco, Alexandre
  - Machado, Pedro
  - Demangeon, Olivier
  - Azevedo Silva, Tomás
  - Sousa-Silva, Clara
  - Jaeggli, Sarah A.
