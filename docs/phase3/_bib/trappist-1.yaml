- &id131
  arxiv_id: '2405.11149'
  ads_bibcode: 2024ApJ...969...20S
  title: Artificial Greenhouse Gases as Exoplanet Technosignatures
  authors:
  - Schwieterman, Edward W.
  - Fauchez, Thomas J.
  - Haqq-Misra, Jacob
  - Kopparapu, Ravi K.
  - Angerhausen, Daniel
  - Pidhorodetska, Daria
  - Leung, Michaela
  - Sneed, Evan L.
  - Ducrot, Elsa
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/1538-4357/ad4ce8
  abstract: Atmospheric pollutants such as chlorofluorocarbons and NO<SUB>2</SUB>
    have been proposed as potential remotely detectable atmospheric technosignature
    gases. Here we investigate the potential for artificial greenhouse gases including
    CF<SUB>4</SUB>, C<SUB>2</SUB>F<SUB>6</SUB>, C<SUB>3</SUB>F<SUB>8</SUB>, SF<SUB>6</SUB>,
    and NF<SUB>3</SUB> to generate detectable atmospheric signatures. In contrast
    to passive incidental by-products of industrial processes, artificial greenhouse
    gases would represent an intentional effort to change the climate of a planet
    with long-lived, low-toxicity gases and would possess low false positive potential.
    An extraterrestrial civilization may be motivated to undertake such an effort
    to arrest a predicted snowball state on their home world or to terraform an otherwise
    uninhabitable terrestrial planet within their system. Because artificial greenhouse
    gases strongly absorb in the thermal mid-infrared window of temperate atmospheres,
    a terraformed planet will logically possess strong absorption features from these
    gases at mid-infrared wavelengths (∼8─12 μm), possibly accompanied by diagnostic
    features in the near-infrared. As a proof of concept, we calculate the needed
    observation time to detect 1 [10](100) ppm of C<SUB>2</SUB>F<SUB>6</SUB>/C<SUB>3</SUB>F<SUB>8</SUB>/SF<SUB>6</SUB>
    on TRAPPIST-1 f with JWST MIRI's Low Resolution Spectrometer (LRS) and NIRSpec.
    We find that a combination of 1[10](100) ppm each of C<SUB>2</SUB>F<SUB>6</SUB>,
    C<SUB>3</SUB>F<SUB>8</SUB>, and SF<SUB>6</SUB> can be detected with a signal-to-noise
    ratio ≧ 5 in as few as 25[10](5) transits with MIRI/LRS. We further explore mid-infrared
    direct-imaging scenarios with the Large Interferometer for Exoplanets mission
    concept and find these gases are more detectable than standard biosignatures at
    these concentrations. Consequently, artificial greenhouse gases can be readily
    detected (or excluded) during normal planetary characterization observations with
    no additional overhead.
