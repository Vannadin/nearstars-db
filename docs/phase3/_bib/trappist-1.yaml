- &id123
  arxiv_id: '2007.03334'
  ads_bibcode: null
  title: A review of possible planetary atmospheres in the TRAPPIST-1 system
  authors:
  - Martin Turbet
  - Emeline Bolmont
  - Vincent Bourrier
  - Brice-Olivier Demory
  - Jérémy Leconte
  - James Owen
  - Eric T. Wolf
  year: '2020'
  pubdate: '2020-07-07'
  doi: 10.1007/s11214-020-00719-1
  abstract: TRAPPIST-1 is a fantastic nearby (~39.14 light years) planetary system
    made of at least seven transiting terrestrial-size, terrestrial-mass planets all
    receiving a moderate amount of irradiation. To date, this is the most observationally
    favourable system of potentially habitable planets. Since the announcement of
    the discovery of TRAPPIST-1 planets in 2016, a growing number of techniques and
    approaches have been used and proposed to reveal its true nature. Here we have
    compiled a state-of-the-art overview of all the observational and theoretical
    constraints that have been obtained so far using these techniques and approaches.
    The goal is to get a better understanding of whether or not TRAPPIST-1 planets
    can have atmospheres, and if so, what they are made of. For this, we surveyed
    the literature on TRAPPIST-1 about topics as broad as irradiation environment,
    orbital architecture, transit observations, density measurements, stellar contamination,
    and numerical climate and escape models. Each of these topics adds a brick to
    our understanding of the likely atmospheres of the seven planets. We show that
    (i) HST transit observations, (ii) density measurements, (iii) atmospheric escape
    modelling, and (iv) gas accretion modelling altogether offer solid evidence against
    the presence of H2-dominated atmospheres around TRAPPIST-1 planets. This means
    they likely have either (i) a high molecular weight atmosphere or (ii) no atmosphere
    at all. There are several key challenges ahead to characterize the bulk compositions
    of the atmospheres (if present) of TRAPPIST-1 planets. The main one so far is
    characterizing and correcting for the effects of stellar contamination. Fortunately,
    a new wave of observations with the James Webb Space Telescope and near-infrared
    high-resolution ground-based spectrographs on very large telescopes will bring
    significant advances in the coming decade.
