- arxiv_id: null
  ads_bibcode: 2025EGUGA..2719977K
  title: 'From Surface to Spectra: Characterizing TRAPPIST-1e''s Atmosphere and Climate'
  authors:
  - Krilanovic, Marija
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.5194/egusphere-egu25-19977
  abstract: The study of exoplanets has advanced significantly since the discovery
    of the first exoplanet orbiting a Sun-like star in 1995, with over 5,800 exoplanets
    identified to date. This research focuses on TRAPPIST-1e, one of seven rocky planets
    in the TRAPPIST-1 system discovered using the transit method. TRAPPIST-1e is of
    particular interest due to its position within the habitable zone, where liquid
    water could exist, and its Earth-like characteristics, such as similar mass, radius,
    and surface gravity.The tidally locked nature of TRAPPIST-1e presents unique atmospheric
    and climatic dynamics, significantly different from Earth's, making it an excellent
    candidate for theoretical and observational studies. This research employs the
    NASA developped ROCKE-3D Global Circulation Model to simulate various atmospheric
    scenarios, ranging from Venus-like conditions to aquaplanets with varying ocean
    depths and nitrogen-carbon dioxide compositions. Synthetic transmission spectra
    and climate data are generated to explore these scenarios, providing insights
    into potential habitability and atmospheric behavior.Given the current limitations
    in observational technology, simulations play a vital role in understanding TRAPPIST-1e's
    atmosphere. Using specifications from instruments such as ELT ANDES, VLT CRIRES+,
    and JWST MIRI, the project evaluates the spectral resolution required to extract
    meaningful atmospheric features. These findings aim to bridge gaps in exoplanetary
    atmospheric studies and prepare for future missions, contributing to our understanding
    of the diversity of worlds beyond our Solar System.
