- &id027
  arxiv_id: '2601.00386'
  ads_bibcode: 2026ApJ...998L...7S
  title: Molecular Hydrogen Controls the Temperatures of Flares on TRAPPIST-1
  authors:
  - Shapiro, A. I.
  - Kostogryz, N.
  - Seager, S.
  - Witzke, V.
  - de Wit, J.
