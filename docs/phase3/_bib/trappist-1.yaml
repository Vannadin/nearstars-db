  doi: null
  abstract: JWST is currently conducting observations of Earth-sized planets, including
    those within the Habitable Zone (HZ), around other stars. Among these, the 7-planet
    TRAPPIST-1 system stands out, with 3-4 planets within the HZ boundaries. Recent
    observations include both thermal emission and transit transmission, though transit
    observations have been difficult to interpret due contamination by stellar phenomena.
    With likely synchronous rotation, these planets may have permanent day and night
    sides, with large day-night temperature differences, which must be captured when
    modeling secondary eclipse and phase curve observations. <P />While 1D climate
    models can be easily coupled to photochemistry for atmospheric compositional versatility,
    they produce globally-averaged temperatures, and so cannot be used to predict
    day-night temperature differences and phase curves, or to evaluate atmospheric
    stability. 3D models can predict day-night temperature differences, but for more
    limited atmospheric compositions. There have been GCM studies using 3D photochemistry
    for M dwarf planets, but their computational requirements limited their parameter
    space. <P />To bridge the 1D and 3D capabilities and predict day-night temperature
    contrasts, we developed a two-column climate mode for a 1D climate-photochemical
    model framework. We use this model to generate spectra from self-consistent atmospheres
    for comparison with recently obtained observations of TRAPPIST-1 planets.
