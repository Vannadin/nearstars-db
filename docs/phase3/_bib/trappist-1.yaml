  abstract: 'Teegarden''s Star (TGS) is an inactive M7V star that is only ~12.6 ly
    away, and hosts two of the most promising planets for potential extraterrestrial
    life. TGS hosts at least three exoplanets, two of which are in its habitable zone
    (HZ): TGS-b and TGS-c (Zechmeister et. al. 2019). These earth-size planets are
    listed in the Habitable Worlds Catalog, with Earth Similarity Indices (ESI) of
    0.97 (revised to 0.93) and 0.66 respectively. TGS-b is located on the inner (hot)
    edge of the star''s HZ with a = 0.0259 AU. It has an orbital period of P<SUB>rot</SUB>
    = 4.91 days, an approximate mass of M<SUB>p</SUB> sin i ≈ 1.16 M<SUB></SUB>, bolometric
    irradiance of S/S<SUB></SUB> ≈ 1.08, and an equilibrium temperature of T<SUB>eq</SUB>
    ≈ 263 K. TGS-c is located inside the outer (cold) edge of the HZ with a = 0.0445
    AU. It has an orbital period of P<SUB>rot</SUB> = 11.4 days, an approximate mass
    of M<SUB>p</SUB> sin i ≈ 1.05 M<SUB></SUB>, a bolometric irradiance of S/S<SUB></SUB>
    ≈ 0.35, and an equilibrium temperature of T<SUB>eq</SUB> ≈ 263 K. The potential
    for these planets to be habitable is strongly dependent on the radiative and magnetic
    properties of the host star, as well as the age, environmental, and geomagnetic
    properties of the planets. One of most important measurable properties is the
    planet''s age, which we determined through a combination of known rotation period
    (with gyrochronology), metallicity, kinematics, and X-ray measurements of the
    host star. Utilizing the P<SUB>rot</SUB> - Age relationship from Engle &amp; Guinan
    (2023), we find that TGS is likely very old (8±2 Gyr). This is ~3.5 billion years
    older than Earth, and provides more than enough time for complex life (if any)
    to arise. Utilizing X-ray measurements from XMM-Newton, we determined that TGS-b
    and TGS-c, respectively, receive ~100 and ~33 times the Earth''s X-ray irradiance.
    Adopting our age estimate and using the F<SUB>Ly</SUB><SUB></SUB><SUB></SUB> -
    Age relations from Engle (2024), we find well as that TGS-b and -c receive 4.7
    and 1.5 times the Earth''s Lyman- FUV flux. These XUV irradiances are significantly
    lower than similar exoplanetary systems, such as TRAPPIST-1, and gives some hope
    for these TGS planets to retain their atmospheres/water and to support life.'
