  title: Chemistry, Climate, and Transmission Spectra of TRAPPIST-1 e Explored with
    a Multimodel Sparse Sampled Ensemble
  authors:
  - Wolf, Eric T.
  - Schwieterman, Edward W.
  - Haqq-Misra, Jacob
