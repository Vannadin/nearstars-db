  doi: 10.1051/0004-6361/202451017
  abstract: Migration is a key ingredient for the formation of close-in super-Earth
    and mini-Neptune systems, as it sets in which resonances planets can be trapped.
    Slower migration rates result in wider resonance configurations compared to higher
    migration rates. We investigate the influence of different migration rates, set
    by the disc's viscosity, on the structure of multi-planet systems growing by pebble
    accretion via N-body simulations. Planets in low viscosity environments migrate
    slower due to partial gap opening. Thus systems formed in low viscosity environments
    tend to have planets trapped in wider resonant configurations (typically 4:3,
    3:2 and 2:1), compared to their high viscosity counterparts (mostly 7:6, 5:4 and
    4:3 resonances). After gas disc dissipation, the damping forces cease and the
    systems can undergo instabilities, rearranging their configurations and breaking
    the resonance chains. The low viscosity discs naturally account for the resonant
    chains like Trappist-1, TOI-178 and Kepler-223, unlike high viscosity simulations
    which produce relatively more compact chains. About 95% of our low viscosity resonant
    chains became unstable, experiencing giant impacts. Dynamical instabilities in
    our low viscosity simulations are more violent than those of high viscosity simulations
    due to the effects of leftover external perturbers (P>200 days). About 50% of
    our final system ended with no planets within 200 days, while all our systems
    have remaining outer planets. We speculate that this process could be qualitatively
    consistent with the lack of inner planets in a large fraction of Sun-like stars.
    Systems produced in low viscosity simulations alone do not match the overall period
    ratio distribution of observations, but give a better match to the period distributions
    of chains, which may suggest that systems of super-Earths and mini-Neptunes form
    in natal discs with a diversity of viscosities.
