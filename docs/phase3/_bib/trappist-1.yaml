  abstract: Proxima b is a potentially rocky exoplanet that lies in the habitable
    zone of Proxima Centauri. Given the activity of its M-Dwarf host, it is uncertain
    if Proxima b has retained an atmosphere or what any atmosphere might be like.
    Thus, it provides an important baseline for the types of atmospheres we can expect
    around M-Dwarfs and a crucial independent data point to compare to the possible
    atmospheres of other similar planets, like those in orbit of TRAPPIST-1. Together,
    these will provide us with a first indication on the prevalence of habitable planets
    in the galaxy. Several instruments have proposed to characterize Proxima b's atmosphere
    by leveraging the spatial resolution of the ELT to resolve it from Proxima Centauri
    and extract the faint spectrum of the exoplanet from the glare of its host star.
