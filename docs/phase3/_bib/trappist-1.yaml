- arxiv_id: null
  ads_bibcode: 2024AAS...24323006H
  title: The Coupled Impacts of Atmospheric Composition and Obliquity on the Climate
    Dynamics of TRAPPIST-1e
  authors:
  - Hammond, Tobi
  - Komacek, Thaddeus
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: Numerous previous studies have evaluated the climate state of temperate
    rocky exoplanets, but few have explored the implications of varying obliquity.
    Planets in multi-planet systems are expected to migrate as resonant chains, thus
    allowing them to undergo planet-planet interactions and possibly maintain a non-zero
    obliquity. The TRAPPIST-1 system is in such a near-resonant configuration, making
    it plausible that TRAPPIST-1e has a non-zero obliquity. In this work, we use ExoCAM
    to study the possible climates of TRAPPIST-1e at varying obliquities and atmospheric
