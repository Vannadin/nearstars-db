- &id036
  arxiv_id: '2402.13682'
  ads_bibcode: 2024A&A...686A..58B
  title: The effect of lightning on the atmospheric chemistry of exoplanets and potential
    biosignatures
  authors:
  - Barth, Patrick
  - Stüeken, Eva E.
  - Helling, Christiane
  - Schwieterman, Edward W.
  - Telling, Jon
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1051/0004-6361/202347286
  abstract: 'Context. Lightning has been suggested to play a role in triggering the
    occurrence of bio-ready chemical species. Future missions such as PLATO, ARIEL,
    HWO, and LIFE, as well as ground-based extremely large telescopes (ELTs), will
    carry out investigations of the atmospheres of potentially habitable exoplanets.
    <BR /> Aims: We aim to study the effect of lightning on the atmospheric chemistry.
    We also consider how it affects false-positive and false-negative biosignatures
    and whether these effects would be observable on exo-Earth and TRAPPIST-1 planets.
    <BR /> Methods: We utilised a combination of laboratory experiments and photochemical
    and radiative transfer modelling. We conducted spark discharge experiments in
    N<SUB>2</SUB>‒CO<SUB>2</SUB>‒H<SUB>2</SUB> gas mixtures, representing a range
    of possible rocky-planet atmospheres. We investigated the production of potential
    lightning signatures (CO and NO), possible biosignature gases (N<SUB>2</SUB>O,
    NH<SUB>3</SUB>, and CH<SUB>4</SUB>), and important prebiotic precursors (HCN and
    urea). Using the measured CO and NO production rates, we conducted photochemical
    simulations for oxygen-rich and anoxic atmospheres for rocky planets orbiting
    in the habitable zones of the Sun and TRAPPIST-1 for a range of lightning flash
    rates. Synthetic spectra were calculated using SMART to study the atmosphere''s
    reflectance, along with the emission and transmission spectra. <BR /> Results:
    Lightning enhances the spectral features of NO, NO<SUB>2</SUB>, and (in some cases)
    CO through direct production; whereas CH<SUB>4</SUB> and C<SUB>2</SUB>H<SUB>6</SUB>
    may be enhanced indirectly. Lightning at a flash rate slightly higher than on
    modern-day Earth is able to mask the ozone features of an oxygen-rich, biotic
    atmosphere, making it harder to detect the biosphere of such a planet. Similarly,
    lightning at a flash rate at least ten times higher than on modern-day Earth is
    also able to mask the presence of ozone in the anoxic, abiotic atmosphere of a
    planet orbiting a late M dwarf, reducing the potential for a false-positive life
    detection. <BR /> Conclusions: The threshold lightning flash rates to eliminate
    oxygen (&gt;0.1%) and ozone false positive biosignatures on planets orbiting ultra-cool
    dwarfs is up to ten times higher than the modern flash rate. This result indicates
    that lightning cannot always prevent these false-positive scenarios.'
