- &id006
  arxiv_id: '2505.03672'
  ads_bibcode: 2025PSJ.....6..126T
  title: Statistical Geochemical Constraints on Present-day Water Outgassing as a
    Source of Secondary Atmospheres on the TRAPPIST-1 Exoplanets
  authors:
  - Thomas, Trent B.
  - Meadows, Victoria S.
  - Krissansen-Totton, Joshua
  - Gialluca, Megan T.
  - Wogan, Nicholas F.
  - Catling, David C.
  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.3847/PSJ/add261
  abstract: The TRAPPIST-1 planetary system is observationally favorable for studying
    if planets orbiting M stars can retain atmospheres and host habitable conditions.
    Recent JWST secondary eclipse observations of TRAPPIST-1 c rule out a thick CO<SUB>2</SUB>
    atmosphere but do not rule out atmospheric water vapor or its photochemical product,
    oxygen. Given the high expected escape rate, maintenance of atmospheric water
    vapor would require a present-day water source, such as volcanic outgassing. Here,
    we simulate water outgassing on the TRAPPIST-1 planets over a broad phase space
    that is based on solar system terrestrial bodies. We then apply two filters based
    on observation and geochemistry that narrow this phase space and constrain the
    plausible outgassing scenarios. For all seven TRAPPIST-1 planets, we find that
    the water outgassing rate is most likely ∼0.03x Earth's but has upper limits of
    ∼8x Earth's. The allowed range also implies low, Mars-like magma emplacement rates
    and relatively dry, Earth-like mantles, although mantle water mass fractions up
    to 1 wt% are possible. We also present scenarios with magma emplacement rates
    similar to Mars, Earth, and Io, resulting in different preferred mantle water
    content and outgassing rates. We find that water outgassing rates are potentially
    high enough to balance water escape rates, providing a theoretical pathway for
    the TRAPPIST-1 planets to maintain surface water or water-vapor-containing atmospheres
    over long timescales. The bounds on outgassing rates and interior properties can
    be used in atmospheric chemistry and escape models to contextualize future observations
    of the TRAPPIST-1 planets, and may be applicable to other terrestrial exoplanets.
