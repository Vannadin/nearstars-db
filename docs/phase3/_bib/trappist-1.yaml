- &id135
  arxiv_id: '2311.08444'
  ads_bibcode: null
  title: A cool runaway greenhouse without surface magma ocean
  authors:
  - Franck Selsis
  - Jérémy Leconte
  - Martin Turbet
  - Guillaume Chaverot
  - Émeline Bolmont
  year: '2023'
  pubdate: '2023-11-14'
  doi: 10.1038/s41586-023-06258-3
  abstract: 'Water vapour atmospheres with content equivalent to the Earth''s oceans,
    resulting from impacts or a high insolation, were found to yield a surface magma
    ocean. This was, however, a consequence of assuming a fully convective structure.
    Here we report, using a consistent climate model, that pure steam atmospheres
    are commonly shaped by radiative layers, making their thermal structure strongly
    dependent on the stellar spectrum and internal heat flow. The surface is cooler
    when an adiabatic profile is not imposed: melting Earth''s crust requires an insolation
    several times higher than today, which will not happen during the main-sequence
    of the Sun. Venus'' surface can solidify before the steam atmosphere escapes,
    which is opposite to previous works. Around the reddest stars ($T_{eff}<$3000K),
    surface magma oceans cannot form by stellar forcing alone, whatever the water
    content. These findings affect observable signatures of steam atmospheres and
    exoplanet mass-radius relationships, drastically changing current constraints
    on the water content of Trappist-1 planets. Unlike adiabatic structures, radiative-convective
    profiles are sensitive to opacities. New measurements of poorly constrained high-pressure
    opacities, in particular far from the H$_2$O absorption bands, are thus necessary
    to refine models of steam atmospheres, which are important stages in terrestrial
    planet evolution.'
