- &id038
  arxiv_id: '1706.02018'
  ads_bibcode: 2017ApJ...845..110B
  title: On the Age of the TRAPPIST-1 System
  authors:
  - Burgasser, Adam J.
  - Mamajek, Eric E.
  year: '2017'
  pubdate: '2017-08-00'
  doi: 10.3847/1538-4357/aa7fea
  abstract: The nearby (d = 12 pc) M8 dwarf star TRAPPIST-1 (2MASS J23062928-0502285)
    hosts a compact system of at least seven exoplanets with sizes similar to Earth.
    Given its importance for testing planet formation and evolution theories, and
    for assessing the prospects for habitability among Earth-size exoplanets orbiting
    the most common type of star in the Galaxy, we present a comprehensive assessment
    of the age of this system. We collate empirical age constraints based on the color-absolute
    magnitude diagram, average density, lithium absorption, surface gravity features,
    metallicity, kinematics, rotation, and magnetic activity; and conclude that TRAPPIST-1
    is a transitional thin/thick disk star with an age of 7.6 ± 2.2 Gyr. The star’s
    color-magnitude position indicates that it is slightly metal-rich, which is consistent
    with the previously reported near-infrared spectroscopic metallicity; and it has
    a radius (R=0.121 +/- 0.003 {R}<SUB>☉ </SUB>) that is larger by 8%-14% than the
    predictions of solar-metallicity evolutionary models. We discuss some implications
    of the old age of this system with regard to the stability and habitability of
    its planets.
