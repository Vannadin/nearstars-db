- &id079
  arxiv_id: '2509.15941'
  ads_bibcode: 2025A&A...703A.122R
  title: HiPERCAM and TESS observations of the rapidly rotating M7V star LP 89─187
  authors:
  - Ramsay, Gavin
  - Gerry Doyle, J.
  - Littlefair, Stuart
  - Dhillon, V. S.
  - Garcia Alvarez, David
  year: '2025'
  pubdate: '2025-11-00'
  doi: 10.1051/0004-6361/202554275
  abstract: The discovery of a significant number of rapidly rotating low-mass stars
    showing no or few flares in TESS observations was a surprise, as rapid rotation
    has previously been linked to high stellar activity. Here we present TESS and
    HiPERCAM u<SUB>s</SUB>g<SUB>s</SUB>r<SUB>s</SUB>i<SUB>s</SUB>z<SUB>s</SUB> observations
    of one of these stars, LP 89-187, which has a rotation period of 0.117 d. TESS
    data covering three sectors (64.6 d) only show three flares, which have energies
    of a few times 10<SUP>33</SUP> erg, whilst HiPERCAM observations, which cover
    0.78 of the rotation period, show no evidence of flares more energetic than approximately
    10<SUP>31</SUP> erg. Intriguingly, other surveys show that LP 89-187 has a weak
    Hα emission. We compared the flare energy distribution of LP 89-187 with low-mass
    stars in the β Pic moving group, which have an age of approximately 24 Myr. We
    find that LP 89-187 has a lower flare rate than the β Pic stars. In addition,
    we find that TRAPPIST-1 analogue stars, which likely are significantly older than
    the β Pic stars, show fewer flares with energies greater than 10<SUP>33</SUP>
    erg in TESS data. We examined the relationship between amplitude and period for
    a sample of low-mass stars and find that more rapid rotators have a higher amplitude.
