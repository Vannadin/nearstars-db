  arxiv_id: '2604.00191'
  ads_bibcode: 2026MNRAS.549ag638G
  title: Resistive MHD simulations of stellar wind─magnetosphere coupling in TRAPPIST-1e
  authors:
  - González-Avilés, J J
  - Pérez-Negrón, N Baltazar
  - Segura, A
  year: '2026'
  pubdate: '2026-06-00'
  doi: 10.1093/mnras/stag638
  abstract: Close-in terrestrial exoplanets around M dwarfs reside in dense, magnetized
    winds, where non-ideal plasma coupling can strongly affect how electromagnetic
    energy is redistributed within the dayside interaction region. We present three-dimensional
    resistive magnetohydrodynamic simulations of the TRAPPIST-1 wind interacting with
    a dipolar TRAPPIST-1e magnetosphere for three stellar-wind forcing cases and four
    prescribed magnetic diffusivities, <inline-formula><tex-math>$\eta =(0,\ 538.018,\
    5.380\,18\times 10^{8},\ 5.380\,18\times 10^{12})$</tex-math></inline-formula>
    cm<SUP>2</SUP> s<SUP>−1</SUP>. Energy transport is diagnosed using maps of the
    total energy density, the magnitude of the total Poynting flux, and the divergence
    of the total Poynting flux. We further estimate a radio-power proxy from the volume
    integral of <inline-formula><tex-math>$\nabla \cdot {\boldsymbol{ S}}_{\rm total}$</tex-math></inline-formula>
    over the dayside bow-shock and magnetopause layers. Across all cases, increasing
    prescribed <inline-formula><tex-math>$\eta$</tex-math></inline-formula> broadens
    the coupling layer and shifts the dominant energy-conversion regions from thin,
    patchy boundary arcs to thicker, more spatially extended structures, with an increasing
    relative contribution from the magnetopause. The inferred radio-power proxy increases
    by several orders of magnitude across the explored scan. However, because the
    estimated numerical magnetic diffusivity in the strongest gradient regions is
    <inline-formula><tex-math>$\eta _{\rm num}\sim 10^{15}$</tex-math></inline-formula>─<inline-formula><tex-math>$10^{16}$</tex-math></inline-formula>
    cm<inline-formula><tex-math>$^{2}$</tex-math></inline-formula> s<inline-formula><tex-math>$^{-1}$</tex-math></inline-formula>,
    the present <inline-formula><tex-math>$\eta$</tex-math></inline-formula> scan
    is best interpreted as a controlled sensitivity study rather than as a direct
    constraint on the physical diffusivity of the TRAPPIST-1e environment. For the
    adopted planetary fields (<inline-formula><tex-math>$B_{\rm eq}=0.32$</tex-math></inline-formula>─1.28
    G), the maximum cyclotron frequencies are <inline-formula><tex-math>$\nu _{\rm
    c,\max }\approx 1.8$</tex-math></inline-formula>─7.2 MHz, below the ground-based
    window, implying that meaningful radio constraints on TRAPPIST-1e magnetism will
    require space-based observations below 10 MHz or substantially stronger planetary
    fields than those assumed here.
