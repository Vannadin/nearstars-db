- &id063
  arxiv_id: '2511.10801'
  ads_bibcode: 2025arXiv251110801P
  title: 'What''s Inside Matters: The Effect of Oxygen Fugacity and Initial Volatile
    Abundance on the Atmospheres of the TRAPPIST-1 Planets'
  authors:
  - Perez, Junellie
  - Schaefer, Laura K.
  - Schwieterman, Edward
  - Stevenson, Kevin B.
  - Chen, Howard
  - Lustig-Yaeger, Jacob
  year: '2025'
  pubdate: '2025-11-00'
  doi: 10.48550/arXiv.2511.10801
  abstract: 'The TRAPPIST-1 planets have become prime targets for studying the atmospheric
    and geophysical properties of planets around M-dwarf stars. To effectively identify
    their atmospheric composition, we first must understand their geological evolution.
    For this study, we focus on enhancing an existing atmosphere-interior exchange
    model by incorporating additional geological processes relevant to rocky planets.
    We have extended the model to include the carbon cycle, which enables the model
    to track four key gas species - CO$_2$, CO, H$_2$O, and H$_2$ - across four planetary
    reservoirs: the mantle, plate, ocean, and atmosphere. Major features added include
    surface temperature calculations which are crucial for the carbon cycle, oxygen
    fugacity as a planetary interior parameter in the model, and oxidation reactions
    and diffusion-limited escape calculations to the atmosphere portion of the model.
    We successfully validated the model for Earth and applied this model to study
    the effect of oxygen fugacity and initial water abundance on TRAPPIST-1 d, e and
    f. Our results for present-day abundances show that oxygen fugacity significantly
    affects the partial pressures of H$_2$ and CO$_2$ for all three planets with minor
    effects for CO on two of the planets. We also found that H$_2$ is strongly dependent
    on water mass fraction (WMF). The addition of atmospheric processes produced a
    significant difference in the H$_2$ and CO abundances at present-day. These results
    highlight the importance of considering interior parameters to be able to further
    constrain the geological evolution of these planets and effectively put atmosphere
    observations into context.'
