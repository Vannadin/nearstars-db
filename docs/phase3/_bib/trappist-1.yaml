- &id138
  arxiv_id: '2310.03792'
  ads_bibcode: null
  title: Characterizing the Near-infrared Spectra of Flares from TRAPPIST-1 During
    JWST Transit Spectroscopy Observations
  authors:
  - Ward S. Howard
  - Adam F. Kowalski
  - Laura Flagg
  - Meredith A. MacGregor
  - Olivia Lim
  - Michael Radica
  - Caroline Piaulet
  - Pierre-Alexis Roy
  - David Lafrenière
  - Björn Benneke
  - Alexander Brown
  - Néstor Espinoza
  - René Doyon
  - Louis-Philippe Coulombe
  - Doug Johnstone
  - Nicolas B. Cowan
  - Ray Jayawardhana
  - Jake D. Turner
  - Lisa Dang
  year: '2023'
  pubdate: '2023-10-05'
  doi: null
  abstract: We present the first analysis of JWST near-infrared spectroscopy of stellar
    flares from TRAPPIST-1 during transits of rocky exoplanets. Four flares were observed
    from 0.6--2.8 $μ$m with NIRISS and 0.6--3.5 $μ$m with NIRSpec during transits
    of TRAPPIST-1b, f, and g. We discover P$α$ and Br$β$ line emission and characterize
    flare continuum at wavelengths from 1--3.5 $μ$m for the first time. Observed lines
    include H$α$, P$α$-P$ε$, Br$β$, He I $λ$0.7062$μ$m, two Ca II infrared triplet
    (IRT) lines, and the He I IRT. We observe a reversed Paschen decrement from P$α$-P$γ$
    alongside changes in the light curve shapes of these lines. The continuum of all
    four flares is well-described by blackbody emission with an effective temperature
    below 5300 K, lower than temperatures typically observed at optical wavelengths.
    The 0.6--1 $μ$m spectra were convolved with the TESS response, enabling us to
    measure the flare rate of TRAPPIST-1 in the TESS bandpass. We find flares of 10$^{30}$
    erg large enough to impact transit spectra occur at a rate of 3.6$\substack{+2.1
    \\ -1.3}$ flare d$^{-1}$, $\sim$10$\times$ higher than previous predictions from
    K2. We measure the amount of flare contamination at 2 $μ$m for the TRAPPIST-1b
    and f transits to be 500$\pm$450 and 2100$\pm$400 ppm, respectively. We find up
    to 80% of flare contamination can be removed, with mitigation most effective from
    1.0--2.4 $μ$m. These results suggest transits affected by flares may still be
    useful for atmospheric characterization efforts.
