- &id067
  arxiv_id: '2502.20337'
  ads_bibcode: 2025ApJ...982..111C
  title: Observational Signatures of a Previous Dynamical Instability in Multi-planet
    M-dwarf Systems
  authors:
  - Childs, Anna C.
  - Hua, Alexa P. S.
  - Martin, Rebecca G.
  - Yang, Chao-Chin
  - Geller, Aaron M.
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.3847/1538-4357/adbb53
  abstract: We identify observational signatures suggesting a history of dynamical
    instability in 26 out of 34 M-dwarf multi-planet systems containing no large planets.
    These systems may have primarily formed in a gas-rich environment, potentially
    hosted more planets, and were more compact. We extend previous simulations of
    the formation of the TRAPPIST-1 system to 100 Myr to test the stability of these
    systems without gas. We find that the absence of a strong mean motion resonance
    in the innermost planet pair and the absence of three-body resonances throughout
    the system are likely to result in the merging and ejection of planets after the
    gas disk disperses. The runs that experience such an instability tend to produce
    final systems with lower multiplicities, period ratios larger than two, increased
    orbital spacings, higher planetary angular momentum deficits, and slightly smaller
    mass ratios between adjacent planets. Remarkably, we find these same trends in
    the observations of M-dwarf multi-planet systems containing no large planets.
    Our work allows us to identify specific systems that may have experienced an instability,
    and it suggests that only ∼25% of these systems formed in their current observed
    state, while most systems were likely more compact and multiplicitous earlier
    in time. Previous research indicates that planets that have experienced a late-stage
    giant impact may potentially be more habitable than those that did not. With this
    in mind, we suggest systems around M-dwarfs that contain period ratios larger
    than two be given priority in the search for habitable worlds.
