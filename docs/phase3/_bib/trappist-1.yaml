  arxiv_id: null
  ads_bibcode: 2024PSJ.....5..154G
  title: Simulated Climate of TRAPPIST-1e Using MPAS-A and Comparisons with Other
    GCMs
  authors:
  - Gu, Lixiang
  - Yang, Jun
  - Yan, Mingyu
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/PSJ/ad5546
  abstract: Dayside convection is one of the most important contributors to a tidally
    locked planet's climate. Considering the long-standing challenge of simulating
    convections, we employ a convection-resolving model known as the Model for Prediction
    across Scales—Atmosphere and perform a series of simulations with spatial resolution
    ranging from 960 to 10 km. With TRAPPIST-1e, a potentially habitable exoplanet,
    as the target, we aim to draw a comparative analysis against the results from
    the TRAPPIST-1 Habitable Atmosphere Intercomparison project. Regarding the overall
    climate states, our simulations reaffirm the findings of the previous general
    circulation model (GCM). Both the extensive substellar cloud cluster and the intricate
    cloud street feature are successfully reproduced. The influence of varying grid
    resolution exhibits a remarkably marginal impact across our resolution spectrum,
    albeit with a slightly heightened sensitivity observed at the nightside. Major
    differences center around the cloud-related variables, including cloud phase (liquid
    and ice), amount, and height, in both the grid resolution assessments and GCM
    intercomparison scenarios. Furthermore, we explore the repercussions on the phase
    curve and transit spectrum.
