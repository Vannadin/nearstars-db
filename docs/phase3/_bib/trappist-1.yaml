  ads_bibcode: null
  title: Detecting Biosignatures in Nearby Rocky Exoplanets using High-Contrast Imaging
    and Medium-Resolution Spectroscopy with Extremely Large Telescope
  authors:
  - Huihao Zhang
  - Ji Wang
  - Michael K. Plummer
  year: '2023'
  pubdate: '2023-11-29'
  doi: 10.3847/1538-3881/ad109e
  abstract: In the upcoming decades, one of the primary objectives in exoplanet science
    is to search for habitable planets and signs of extraterrestrial life in the universe.
    Signs of life can be indicated by thermal-dynamical imbalance in terrestrial planet
    atmospheres. O$_2$ and CH$_4$ in the modern Earth's atmosphere are such signs,
    commonly termed biosignatures. These biosignatures in exoplanetary atmospheres
    can potentially be detectable through high-contrast imaging instruments on future
    extremely large telescopes (ELTs). To quantify the signal-to-noise ($S/N$) ratio
    with ELTs, we select up to 10 nearby rocky planets and simulate medium resolution
    (R $\sim$ 1000) direct imaging of these planets using the Mid-infrared ELT Imager
    and Spectrograph (ELT/METIS, 3-5.6 $μ$m) and the High Angular Resolution Monolithic
    Optical and Near-infrared Integral field spectrograph (ELT/HARMONI, 0.5-2.45 $μ$m).
    We calculate the $S/N$ for the detection of biosignatures including CH$_4$, O$_2$,
    H$_2$O, and CO$_2$. Our results show that GJ 887~b has the highest detection $S/N$
    for biosignatures and Proxima Cen b exhibits the only detectable CO$_2$ among
    the targets for ELT/METIS direct imaging. We also investigate the TRAPPIST-1 system,
    the archetype of nearby transiting rocky planet systems, and compare the biosignature
    detection $S/N$ of transit spectroscopy with JWST versus direct spectroscopy with
    ELT/HARMONI. Our findings indicate JWST is more suitable for detecting and characterizing
    the atmospheres of transiting planet systems such as TRAPPIST-1 that are relatively
    further away and have smaller angular separations than more nearby non-transiting
    planets.
