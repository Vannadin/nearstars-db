  ads_bibcode: null
  title: 'The TRAPPIST-1 Habitable Atmosphere Intercomparison (THAI). Part III: Simulated
    Observables -- The return of the spectrum'
  authors:
  - Thomas J. Fauchez
  - Geronimo L. Villanueva
  - Denis E. Sergeev
  - Martin Turbet
  - Ian A. Boutle
  - Kostas Tsigaridis
  - Michael J. Way
  - Eric T. Wolf
  - Shawn D. Domagal-Goldman
  - Francois Forget
  - Jacob Haqq-Misra
