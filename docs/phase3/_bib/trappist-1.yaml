  ads_bibcode: 2026MNRAS.547ag070S
  title: Two temperate Earth- and Neptune-sized planets orbiting fully convective
    M dwarfs
  authors:
  - Scott, Madison G.
  - Dransfield, Georgina
  - Timmermans, Mathilde
  - Triaud, Amaury H. M. J.
