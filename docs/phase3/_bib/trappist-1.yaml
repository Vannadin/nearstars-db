- &id141
  arxiv_id: '2302.11561'
  ads_bibcode: null
  title: Sporadic Spin-Orbit Variations in Compact Multi-planet Systems and their
    Influence on Exoplanet Climate
  authors:
  - Howard Chen
  - Gongjie Li
  - Adiv Paradise
  - Ravi Kopparapu
  year: '2023'
  pubdate: '2023-02-22'
  doi: 10.3847/2041-8213/acbd33
  abstract: Climate modeling has shown that tidally influenced terrestrial exoplanets,
    particularly those orbiting M-dwarfs, have unique atmospheric dynamics and surface
    conditions that may enhance their likelihood to host viable habitats. However,
    sporadic libration and rotation induced by planetary interactions, such as that
    due to mean motion resonances (MMRs) in compact planetary systems may destabilize
    attendant exoplanets away from synchronized states (or 1:1 spin-orbit ratio).
    Here, we use a three-dimensional N-Rigid-Body integrator and an intermediately-complex
    general circulation model to simulate the evolving climates of TRAPPIST-1 e and
    f with different orbital and spin evolution pathways. Planet f perturbed by MMR
    effects with chaotic spin-variations are colder and dryer compared to their synchronized
    counterparts due to the zonal drift of the substellar point away from open ocean
    basins of their initial eyeball states. On the other hand, the differences between
    perturbed and synchronized planet e are minor due to higher instellation, warmer
    surfaces, and reduced climate hysteresis. This is the first study to incorporate
    the time-dependent outcomes of direct gravitational N-Rigid-Body simulations into
    3D climate modeling of extrasolar planets and our results show that planets at
    the outer edge of the habitable zones in compact multiplanet systems are vulnerable
    to rapid global glaciations. In the absence of external mechanisms such as orbital
    forcing or tidal heating, these planets could be trapped in permanent snowball
    states.
