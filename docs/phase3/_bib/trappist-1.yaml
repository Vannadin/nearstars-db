  doi: 10.48550/arXiv.2411.05954
  abstract: The motion of planetesimals was studied in the Proxima Centauri and TRAPPIST
    1 exoplanetary systems. The size of the feeding zone of planet Proxima Centauri
    c is discussed. It was noted that after hundreds of Myrs, some planetesimals could
    still move in elliptical resonant orbits inside the feeding zone of this planet
    that had been mainly cleared from planetesimals. The probability of a collision
    of a planetesimal initially located in the feeding zone of planet c with inner
    planet b was obtained to be about 0.0002 and 0.001 at initial eccentricity of
    orbits of planetesimals equal to 0.02 or 0.15, respectively. A lot of icy material
    and volatiles could be delivered from the icy zone near the orbit of planet c
    to inner planets b and d. The inclinations of orbits of 80% of the planetesimals
    that moved between 500 or 1200 AU from the star did not exceed 10o. It was obtained
    that several planets in the TRAPPIST-1 system accumulated planetesimals initially
    located at the same distance. Outer layers of neighbouring TRAPPIST-1 planets
    can include similar material.
