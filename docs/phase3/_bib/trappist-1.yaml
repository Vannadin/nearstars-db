  doi: null
  abstract: The prevalence of M-dwarf stars in the nearby stellar population, as well
    as their smaller radii and cooler temperatures, present an opportunity to measure
    the emission and reflection spectra of rocky planets in their habitable zones
    with current or near-term observatories. Thermal emission measurements of transiting
    planets like the TRAPPIST-1 planets using the Mid-Infrared Instrument (MIRI) photometry
    mode on JWST demonstrate the potential for studying the atmospheric composition
    of these rocky worlds in the mid infrared (Greene et al. 2023, Zieba et al. 2023).
    These techniques have now garnered a 500-hour DDT Program over the next several
    observing cycles, but progress is slow due to the lack of high-precision spectroscopic
    capabilities beyond 11 microns. The recently proposed "Planetary Infrared Excess"
    technique (Stevenson 2020) may also present the opportunity to study the atmospheres
    of non-transiting planets by simultaneous fitting of both the stellar spectra
    and the planetary infrared emission, but would be limited to hotter and dimmer
    planets using JWST's instrumentation (Mandell et al. 2022). These limitations
    in JWST's instrumentation in the mid infrared indicate a need for future missions
    that prioritize observations to enhance our understanding of HZ planets around
    M-dwarfs. We utilize 3D General Circulation Models (GCMs) from the ExoCAM framework,
    along with 3D radiative transfer using the Planetary Spectrum Generator (PSG)
    GlobES tool, to simulate observations of habitable M-Earths for a range of telescope
    sizes and instrument capabilities. We then use these simulated thermal emission
    spectra to examine the constraints that could be placed on the thermal structure
    and composition of these planetary atmospheres and evaluate the potential to detect
    signs of life.
