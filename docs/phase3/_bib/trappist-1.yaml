  arxiv_id: '2102.11415'
  ads_bibcode: 2021ApJ...911...18W
  title: The Mega-MUSCLES Spectral Energy Distribution of TRAPPIST-1
  authors:
  - Wilson, David J.
  - Froning, Cynthia S.
  - Duvvuri, Girish M.
  - France, Kevin
  - Youngblood, Allison
  - Schneider, P. Christian
  - Berta-Thompson, Zachory
  - Brown, Alexander
  - Buccino, Andrea P.
  - Hawley, Suzanne
  - Irwin, Jonathan
  - Kaltenegger, Lisa
  - Kowalski, Adam
  - Linsky, Jeffrey
  - Loyd, R. O. Parke
  - Miguel, Yamila
  - Pineda, J. Sebastian
  - Redfield, Seth
  - Roberge, Aki
  - Rugheimer, Sarah
  - Tian, Feng
  - Vieytes, Mariela
  year: '2021'
  pubdate: '2021-04-00'
  doi: 10.3847/1538-4357/abe771
  abstract: We present a 5 Å-100 μm spectral energy distribution (SED) of the ultracool
    dwarf star TRAPPIST-1, obtained as part of the Mega-MUSCLES Treasury Survey. The
    SED combines ultraviolet and blue-optical spectroscopy obtained with the Hubble
    Space Telescope, X-ray spectroscopy obtained with XMM-Newton, and models of the
    stellar photosphere, chromosphere, transition region, and corona. A new differential
    emission measure model of the unobserved extreme-ultraviolet spectrum is provided,
    improving on the Lyα-EUV relations often used to estimate the 100-911 Å flux from
    low-mass stars. We describe the observations and models used, as well as the recipe
    for combining them into an SED. We also provide a semiempirical, noise-free model
    of the stellar ultraviolet spectrum based on our observations for use in atmospheric
    modeling of the TRAPPIST-1 planets.
