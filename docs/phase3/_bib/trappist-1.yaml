- &id033
  arxiv_id: '2412.11987'
  ads_bibcode: 2025MNRAS.536.2957N
  title: Convective shutdown in the atmospheres of lava worlds
  authors:
  - Nicholls, Harrison
  - Pierrehumbert, Raymond T.
  - Lichtenberg, Tim
  - Soucasse, Laurent
  - Smeets, Stef
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.1093/mnras/stae2772
  abstract: 'Atmospheric energy transport is central to the cooling of primordial
    magma oceans. Theoretical studies of atmospheres on lava planets have assumed
    that convection is the only process involved in setting the atmospheric temperature
    structure. This significantly influences the ability for a magma ocean to cool.
    It has been suggested that convective stability in these atmospheres could preclude
    permanent magma oceans. We develop a new 1D radiative-convective model in order
    to investigate when the atmospheres overlying magma oceans are convectively stable.
    Using a coupled interior-atmosphere framework, we simulate the early evolution
    of two terrestrial-mass exoplanets: TRAPPIST-1 c and HD 63433 d. Our simulations
    suggest that the atmosphere of HD 63433 d exhibits deep isothermal layers which
    are convectively stable. However, it is able to maintain a permanent magma ocean
    and an atmosphere depleted in <inline-formula><tex-math id="TM0001" notation="LaTeX">$\mathrm{H_{2}O}$</tex-math></inline-formula>.
    It is possible to maintain permanent magma oceans underneath atmospheres without
    convection. Absorption features of <inline-formula><tex-math id="TM0002" notation="LaTeX">$\mathrm{CO_{2}}$</tex-math></inline-formula>
    and <inline-formula><tex-math id="TM0003" notation="LaTeX">$\mathrm{SO_{2}}$</tex-math></inline-formula>
    within synthetic emission spectra are associated with mantle redox state, meaning
    that future observations of HD 63433 d may provide constraints on the geochemical
    properties of a magma ocean analogous with the early Earth. Simulations of TRAPPIST-1
    c indicate that it is expected to have solidified within <inline-formula><tex-math
    id="TM0004" notation="LaTeX">$100 \,\mathrm{M}\rm {yr}$</tex-math></inline-formula>,
    outgassing a thick atmosphere in the process. Cool isothermal stratospheres generated
    by low-molecular-weight atmospheres can mimic the emission of an atmosphere-less
    body. Future work should consider how atmospheric escape and chemistry modulates
    the lifetime of magma oceans, and the role of tidal heating in sustaining atmospheric
    convection.'
