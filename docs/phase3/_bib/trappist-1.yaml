  abstract: Lyα observations provide a powerful probe of stellar activity and atmospheric
    escape in exoplanetary systems. We present here an analysis of 109 Hubble Space
    Telescope (HST)/Space Telescope Imaging Spectrograph (STIS) orbits monitoring
    the TRAPPIST-1 system between 2017 and 2022, covering three to five transits for
