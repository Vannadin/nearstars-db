  year: '2024'
  pubdate: '2024-07-00'
  doi: null
  abstract: 'We are performing climate simulations of rocky planets using a Global
    Climate Model (GCM) named DRAMATIC (Dynamics, RAdiation, MAterial Transport and
    their mutual InteraCtions). It has the dynamical core of MIROC (Model for Interdisciplinary
    Research On Climate) spectral solver developed in Japan, and the applications
    to present Mars (e.g. Kuroda et al. 2005, 2013, 2015, 2020), paleo Mars (Kamada
    et al. 2020, 2021, 2022), and present Venus (Karyu et al. 2023) have been done.
    Additionally, the applications to paleo Venus and TRAPPIST-1 planets are ongoing.
    <P />As for the present and paleo Mars, the evolution of water environment from
    the early (~3.8 Ga) state with liquid oceans on surface to the current dry state
    is important for the investigations of possible presence of life and future explorations
    to obtain water resources there. We have developed the coupled global Mars climate
    models, including the water adsorption by regolith for present and recent millions
    of years, and the surface river flow, ice sheet formation and subglacial melting
    for billions of years from the early state. With the models we have obtained indications
    for the condition of the formation of valley networks which exist on the surface
    on Mars and recent subsurface water evolution down to ~1 km there. Moreover, these
    coupled simulations of water evolution have been extended to the TRAPPIST-1 planets,
    investigating possible water-driven climate features on tidally-locked planets
    orbiting M-dwarfs. <P />As for Venus, our interest focuses on possible climate
    and habitability in the early state. The weaker solar insolation than present
    (Faint Young Sun), as well as cooling by sulfuric acid aerosols emitted by volcanic
    activities, might make the climate of early Venus habitable. We are investigating
    the climate evolution of early Venus from the magma-ocean state with H <SUB>2</SUB>O/CO
    <SUB>2</SUB> atmosphere, especially how the water clouds can form and how much
    the clouds and aerosols may cool the planet. <P />Acknowledgement: This work is
    supported by JST FOREST Program (Grant Number JPMJFR212U) and Astrobiology Center
    of NINS (Grant Number AB0509).'
