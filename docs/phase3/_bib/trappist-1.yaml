- &id197
  arxiv_id: '2412.07853'
  ads_bibcode: null
  title: 'Probing the gas that builds planets: Results from the JWST MINDS program'
  authors:
  - E. F. van Dishoeck
  - the MINDS team
  year: '2024'
  pubdate: '2024-12-10'
  doi: null
  abstract: 'Infrared observations with JWST open up a new window into the chemical
    composition of the gas in the inner disk (<few au) where planets are built. Results
    from the MIRI GTO program MINDS (PI: Th. Henning, co-PI: I. Kamp) are presented
    for several disks around T Tauri and lower-mass stars. A large diversity in spectra
    is found. Some disks are very rich in H2O lines whereas other disks show prominent
    CO2. The spectra of disks around very low-mass stars (<0.3 MSun, late-M type stars
    like Trappist-1) are dominated by C2H2 and other hydrocarbon features including
    those of benzene, suggesting volatile C/O>1. Together these data point to a rich
    chemistry in the inner regions that is linked to the physical structure of these
    disks (e.g., dust traps) and that may be affected by processes such as radial
    drift of icy pebbles from the outer to the inner disk.'
