    atmospheric retrievals, modeling stellar limb darkening, and constraining surface
    heterogeneity at the time of observation. These results offer a detailed look
    into the complex interplay between stellar activity and planetary atmospheres,
    with implications for understanding the habitability and atmospheric retention
    of planets in M dwarf systems.
