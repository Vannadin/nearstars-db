  arxiv_id: '2002.04798'
  ads_bibcode: null
  title: The TRAPPIST-1 JWST Community Initiative
  authors:
  - Michaël Gillon
  - Victoria Meadows
  - Eric Agol
  - Adam J. Burgasser
  - Drake Deming
  - René Doyon
