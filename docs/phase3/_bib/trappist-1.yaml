- arxiv_id: null
  ads_bibcode: 2024AGUFMDI31C2945A
  title: 'The Influence of Planetary Accretion on Mantle Oxidation State: Does Size
    Really Matter?'
  authors:
  - Alvarado-Anderson, Chase
  - Schaefer, Laura
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: TRAPPIST-1, an ultra-cool dwarf star, hosts seven Earth-like, temperate
    exoplanets that formed through accretionary processes. This situates this system,
    a compact analogue of the inner Solar System, as the optimal setting to study
    the evolution and formation of terrestrial planets that formed in the same protoplanetary
    disk and under similar conditions. Understanding how this system's bodies grew
    and settled with equilibrium temperatures that can sustain liquid surface water
    is one of the driving questions of understanding planetary formation histories
    that yield habitable planets. Clarity surrounding the formation of rocky worlds
    still eludes us, and consequently, the physical and geochemical evolution of these
    planets needs further exploration. Utilizing N-Body simulations and geochemical
    modeling, this study explores how the core-mass fraction and mantle oxidation
    state of terrestrial bodies with varying initial parameters changes as they accrete
    over time. Specifically, we incorporate volatile reactions and metal-silicate
    partitioning to find the characteristics of bodies undergoing the metal-silicate
    fractionation processes inherent to planetary formation. We present the geochemical
    and geophysical characteristics of several simulated planetary systems, where
    H, N, O, and Fe speciation is tracked. This work strives to yield a greater understanding
    of the role of volatile partitioning in establishing a mantle redox state and
    how formation processes vary across a single planetary system.
