    detailed simulations of HARMONI/ELT which demonstrate the feasibility of characterizing
    the reflected light of an Earth-like Proxima b. Additionally, I will show initial
    work on similarly detailed simulations at longer wavelengths for observations
    with METIS/ELT and discuss what synergies these may have with each other and with
    ANDES/ELT. Finally, I will discuss possible observing strategies to make the most
