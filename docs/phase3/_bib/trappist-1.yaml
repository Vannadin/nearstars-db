- &id180
  arxiv_id: '2202.06585'
  ads_bibcode: null
  title: Orbital Evolution of Close-in Super-Earths Driven by Atmospheric Escape
  authors:
  - Naho Fujita
  - Yasunori Hori
  - Takanori Sasaki
  year: '2022'
  pubdate: '2022-02-14'
  doi: 10.3847/1538-4357/ac558c
  abstract: The increasing number of super-Earths close to their host stars revealed
    a scarcity of close-in small planets with 1.5-2.0$\,R_\oplus$ in the radius distribution
    of ${\it Kepler}$ planets. The atmospheric escape of super-Earths by photoevaporation
    can explain the origin of the observed "radius gap." Many theoretical studies
    considered the in-situ mass loss of a close-in planet. Planets that undergo the
    atmospheric escape, however, move outward due to the change in the orbital angular
    momentum of their star-planet systems. In this study, we calculate the orbital
    evolution of an evaporating super-Earth with a H$_2$/He atmosphere around FGKM-type
    stars under a stellar X-ray and extreme UV irradiation (XUV). The rate of increase
    in the orbital radius of an evaporating planet is approximately proportional to
    that of the atmospheric mass loss during a high stellar XUV phase. We show that
    super-Earths with a rocky core of $\lesssim$ 10$\,M_\oplus$ and a H$_2$/He atmosphere
    at $\lesssim$ 0.03-0.1$\,$au ($\lesssim$ 0.01-0.03$\,$au) around G-type stars
    (M-type stars) are prone to the outward migration driven by photoevaporation.
    Although the changes in the orbits of the planets would be small, they would rearrange
    the orbital configurations of compact, multi-planet systems, such as the TRAPPIST-1
    system. We also find that the radius gap and the so-called "Neptune desert" in
    the observed population of close-in planets around FGK-type stars still appear
    in our simulations. On the other hand, the observed planet population around M-type
    stars can be reproduced only by a high stellar XUV luminosity model.
