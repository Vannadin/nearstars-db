  doi: null
  abstract: Thousands of exoplanets have been discovered in the last several decades
    and as the number of exoplanets increases, the need to characterize these exoplanets
    has continued to grow. JWST has pushed the boundaries of exoplanet science and
    has started to show that it can probe smaller, rocky planets such as the inner
    planets in the TRAPPIST-1 system. One of the big questions is whether these small,
    rocky exoplanets around M-dwarfs could have atmospheres and if so, what can we
    say about their composition. However, this is just the beginning in the quest
    to understand habitability in such planets. In order to fully understand these
    exoplanets, we need to understand their geological evolution since that can directly
    impact their atmospheres and hence play a role in habitability. In this research,
    I will start to address how the atmosphere-interior exchange resulting from geochemical
    cycles, such as the carbonate silicate cycle and the deep water cycle, can impact
    the atmospheric composition of these rocky exoplanets. While previous studies
    have looked at late-stage geological evolution on the TRAPPIST-1 planets (Gonzalez-Quiles
    et al. in prep), we aim to build a full geological evolution mode including a
    magma ocean phase that we can use to study rocky exoplanets observed with JWST.
    Since most of the exoplanets observed by JWST have higher equilibrium temperatures,
    this can indicate that they may have or are currently undergoing that phase, which
    can affect the gas abundances prior to the planet solidifying and therefore the
    late-stage atmosphere-interior exchange. We will present the preliminary list
    of exoplanets that will be part of this study and preliminary results from the
    models that the community can use moving forward.
