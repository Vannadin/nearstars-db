    next-generation telescopes, it is critical to prioritize targets by the potential
    to detect biosignatures in their atmospheres and to expand the search for life
    beyond the perspective of modern Earth. Building on earlier habitable zone catalogs,
    we identify 11 of the most potentially Earth-like rocky worlds, generating spectra
    for each planet based on atmospheric models of modern Earth and of Earth 0.8 Gyr
