  year: '2025'
  pubdate: '2025-03-00'
  doi: null
  abstract: The detection of the atmosphere of a terrestrial planet in the habitable
    zone of its host star is one of the main goals of the exoplanet community. In
    order to see the small signals from terrestrial atmospheres using transmission
    spectroscopy, small host stars are necessary, as the transit depth is directly
    dependent on the relative size of the planet to the star. However, early observations
    of terrestrial planets around small stars with JWST have shown that these small
    M dwarfs are dangerous. Heterogeneities on the stellar surface, common for M dwarfs,
    can contaminate the transmission spectrum and cause variations on a level much
    larger than any atmospheric signals. However, the TRAPPIST-1 system contains a
    possible solution to overcome this stellar contamination. Using the multiplicative
    effect of the stellar contamination signal to our advantage, we propose to observe
    close (but not overlapping) transits of TRAPPIST-1 b and TRAPPIST-1 e. The ratio
    of the resulting transmission spectrum will correct for the signal from the stellar
    contamination, and leave only the ratio of their atmospheric opacities. Assuming
    little to no atmospheric signal from TRAPPIST-1 b based on the thermal emission
    observations, we expect this ratio to result in the transmission spectrum of TRAPPIST-1
    e normalized by the flat transit depth of TRAPPIST-1 b. Using this method, we
    can detect an Earthlike atmosphere on TRAPPIST-1 e using 15 close transits of
    TRAPPIST-1 b and e to 3 sigma significance.
