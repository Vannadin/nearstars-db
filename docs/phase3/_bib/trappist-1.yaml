  abstract: We present the first analysis of near-infrared JWST spectroscopy of stellar
    flares from TRAPPIST-1 during transits of rocky exoplanets. Four flares were observed
    with NIRISS and NIRSpec during transit spectroscopy observations of TRAPPIST-1b,
    f, and g. Flares emit across the entire electromagnetic spectrum and must be considered
    as a key source of stellar contamination. Although not previously characterized
    at wavelengths of 1-3.5µm, continuum emission is expected to be the dominant source
    of flare contamination. We strongly detect continuum in all four flares across
    the wavelength range of the instruments. We also characterize the He I infrared
    triplet and Paschen and Brackett series lines observed in the flares in order
    to identify which lines are likely to impact transit spectra from 1-3.5µm. The
    degree of flare contamination is quantified as a function of flare size and wavelength,
    with contamination levels at 2µm of 2100±400 and 500±450 ppm observed for the
    TRAPPIST-1f and b transits, respectively. We model the line and continuum emission
    of the flares to discover that up to 80% of flare contamination can be removed,
    with mitigation most effective from 1-2.4µm. Our results suggest flare mitigation
    is a viable pathway to increase the scientific impact of transit observations
    of small planets around active stars.
