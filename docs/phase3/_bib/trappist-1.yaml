  ads_bibcode: null
  title: Reconstructing the Extreme Ultraviolet Emission of Cool Dwarfs Using Differential
    Emission Measure Polynomials
  authors:
  - Girish M. Duvvuri
  - J. Sebastian Pineda
  - Zachory K. Berta-Thompson
  - Alexander Brown
  - Kevin France
  - Adam F. Kowalski
  - Seth Redfield
