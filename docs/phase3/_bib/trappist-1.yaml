  doi: null
  abstract: Accurately characterizing exoplanets, particularly those in close orbits
    around their host stars is critical for identifying promising targets for future
    study. Current stellar illumination models assume a parallel ray model, which
    work well for the Earth-Sun system but fail for close-in orbiting exoplanets.
    These assumptions lead to significant biases in estimates of planetary properties.
    In this work, we present improved stellar illumination models that account for
    the finite angular size of the host star, revealing complex illumination geometries
    that include fully illuminated, penumbral and unilluminated zones. This more realistic
    treatment shows that a majority of a close-in planet's surface may receive at
    least partial illumination. We integrate these corrections into EXONEST, a Bayesian
    machine learning tool for exoplanet characterization and discuss their implications
    for climate simulations using NASA's ROCKE-3D General Circulation Model. These
    enhancements are particularly impactful for modeling the climates and surface
    conditions of potentially habitable exoplanets orbiting M-dwarf stars, such as
    the TRAPPIST-1 system.
