  abstract: Various problems of the formation and evolution of planetary systems are
    studied. Most of the studies are devoted to the Solar System. The collapse of
    the presolar cloud and the accumulation of planets are studied. The author considers
    the formation of the Earth-Moon system, binary trans-Neptunian objects, and the
    axial rotations of planets. He discusses the formation of asteroid and trans-Neptunian
    belts, including the evolution of resonant asteroid orbits and the formation of
    the Kirkwood gaps in the asteroid belt. The book discusses the migration of bodies
    during the formation of the Solar System and at present, including a discussion
    of the delivery of icy bodies from beyond the ice line to the terrestrial planets
    and the formation of craters on the Moon. The Deep Impact mission is discussed;
    during this mission the impact module of the spacecraft collided with the comet
    Tempel 1. The book studies the migration of dust in the Solar System and the formation
    of the zodiacal belt, as well as the migration of bodies and dust particles ejected
    from the terrestrial planets and the Moon. The author considers the migration
    of bodies in some exoplanetary systems (Proxima Centauri, Trappist 1, and Gliese
    581), the spectra of Earth-like exoplanets with different rotation periods, as
