  ads_bibcode: 2024AGUFMU13C...01K
  title: 'The atmosphere-interior interaction of rocky exoplanets: what can we learn
    from JWST observations and geochemical evolution models?'
  authors:
  - Krissansen-Totton, Joshua
  - Wogan, Nick
  - Thompson, Margaret
  - Fortney, Jonathan J.
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: The James Webb Space Telescope (JWST) has provided a tantalizing first
    glimpse at the atmospheres and surfaces of terrestrial exoplanets, including a
    handful of rocky planets in the habitable zone. The atmospheres (or lack thereof)
    of these JWST targets are the product of billions of years of volatile exchange
    between the atmosphere and interior, secular cooling, redox evolution, and volatile
    escape to space. Interpretations of these observations therefore require careful
    modeling to disentangle the primary drivers of planetary evolution. While these
    efforts are in their infancy, we can begin to explore the implications of early
    observations. For example, JWST observations of TRAPPIST-1b [1] and c [2] disfavor
    substantial atmospheres containing CO<SUB>2</SUB>. Given the similar densities
    of all TRAPPIST-1 planets, and the theoretical potential for atmospheric erosion
    around late M-dwarfs, this observation might be assumed to imply atmospheres are
    also unlikely for the outer planets. However, we use an atmosphere-interior evolution
    model to show that an airless TRAPPIST-1b and c only weakly constrains stellar
    evolution, and that the odds of outer planets e and f retaining substantial atmospheres
    remain favorable. The reason for this result is that b and c sit unambiguously
    interior to the runaway greenhouse limit, and so have potentially experienced
    ~8 Gyr of XUV-driven hydrodynamic escape, whereas, in contrast, e and f reside
    within the habitable zone, and likely experienced a comparatively short steam
    atmosphere during TRAPPIST-1's pre-main sequence. In fact, a more sophisticated
    model of volatile evolution and escape during magma ocean solidification predicts
    habitable zone planets around M-dwarfs such as TRAPPIST-1e and f are highly likely
    to retain secondary atmospheres across a broad swath of initial compositions,
    a prediction that is imminently testable with JWST.
