- &id062
  arxiv_id: '2511.01231'
  ads_bibcode: 2025arXiv251101231H
  title: Limits on forming coreless terrestrial worlds in the TRAPPIST-1 system
  authors:
  - Huang, Dongyang
  - Dorn, Caroline
  year: '2025'
  pubdate: '2025-11-00'
  doi: 10.48550/arXiv.2511.01231
  abstract: With seven temperate Earth-sized planets revolving around an ultracool
    red dwarf, the nearby TRAPPIST-1 system offers a unique opportunity to verify
    models of exoplanet composition, differentiation, and interior structure. In particular,
    the low bulk densities of the TRAPPIST-1 planets, compared to terrestrial planets
    in our solar system, require either substantial amount of volatiles to be present
    or a corefree scenario where the metallic core is fully oxidised. Here, using
    an updated metal-silicate partitioning model, we show that during core-mantle
    differentiation oxygen becomes more siderophile (iron-loving) implying larger
    planet radii. For the seven TRAPPIST-1 planets, however, we find that they are
    not sufficiently large to oxidise all the iron in the core, if they differentiate
    from an Earth-like composition. Oxygen partitioning in rocky worlds precludes
    coreless planets up to about 4 Earth masses. The observed density deficit in the
    TRAPPIST-1 planets, and more generally in M dwarf systems if confirmed by future
    observations, may be explained by system-dependent element budgets during planet
    formation, which are intrinsically linked to their stellar metallicity.
