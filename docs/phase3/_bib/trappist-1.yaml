  doi: null
  abstract: The vast majority of our nearest exoplanetary neighbors are non-transiting
    and inaccessible to characterization via direct imaging techniques. The tools
    needed to study the atmospheres of these exoplanets are still in their infancy,
    but have made significant strides in recent years. The planetary infrared excess
    (PIE) technique has the potential to efficiently detect and characterize the thermal
    spectra of both transiting and non-transiting exoplanets. We follow the unfolding
    discoveries in the TRAPPIST-1 system, in an idealized test bed of blackbody assumptions,
    and present the results from the PIE technique at every stage of discovery. We
    find that with JWST and MIRECLE-like concepts, we can infer the presence of multiple
    planets in the system and, when combined with additional constraints from other
    techniques, we can constrain the orbital periods and equilibrium temperatures
    of a compact multiplanet system. Yet, M-dwarf and planetary atmospheres are not
    well-represented by simple blackbodies. We discuss the latest efforts in non-transiting
    planet detection and characterization with realistic stellar and planetary atmospheres
    and the remaining barriers.
