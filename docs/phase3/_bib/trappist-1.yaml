  doi: 10.3847/1538-4357/aa6f05
  abstract: We analyze the K2 light curve of the TRAPPIST-1 system. The Fourier analysis
    of the data suggests P <SUB>rot</SUB> = 3.295 ± 0.003 days. The light curve shows
    several flares, of which we analyzed 42 events with integrated flare energies
    of 1.26 × 10<SUP>30</SUP>-1.24 × 10<SUP>33</SUP> erg. Approximately 12% of the
    flares were complex, multi-peaked eruptions. The flaring and the possible rotational
    modulation shows no obvious correlation. The flaring activity of TRAPPIST-1 probably
    continuously alters the atmospheres of the orbiting exoplanets, which makes these
    less favorable for hosting life.
