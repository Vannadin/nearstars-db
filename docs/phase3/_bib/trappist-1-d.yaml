  title: The feasibility of detecting biosignatures in the TRAPPIST-1 system with JWST
  authors:
  - Meadows, Victoria
  - Lincowski, Andrew
  - Lustig-Yaeger, Jacob
  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: JWST will likely provide the first opportunity to detect gases in the atmospheres of planets orbiting M dwarfs,
    thereby enabling the first searches for signs of life on terrestrial exoplanets. The TRAPPIST-1 planets are JWST's best
    target for biosignature searches, as the atmospheric signals are likely to be relatively large, and the host star's UV
    spectrum could allow biologically-generated gases to build to higher abundances. However, whether JWST will have the sensitivity
    to detect and interpret atmospheric biosignatures is a largely open question. We have simulated TRAPPIST-1 d and e environments
    to explore the detectability of a comprehensive suite of biosignature gases that may have been episodically prevalent
    across Earth's history. Our simulations use coupled 1-D climate-photochemical models to generate self-consistent inhabited
    terrestrial planetary environments — including cloudy and/or hazy Archean-Earth-like environments with either a dominant
    sulfur- or methane-producing biosphere; and clear and cloudy modern Earth-like environments with photosynthetic oxygen-producing
    biospheres. We simulate transmission spectra, and determine JWST detectability of different biosignatures. Our simulations
    show that biogenically-generated O<SUB>2</SUB> and its photosynthetic byproduct O<SUB>3</SUB> will likely be extremely
    difficult to detect. We also explored the detectability of methyl chloride (CH<SUB>3</SUB>Cl) as an alternative indicator
    for a photosynthetic biosphere, but find that it would require significantly higher global surface fluxes than Earth's
    to be detectable. For the Archean Earth, organic haze, and the more challenging methyl mercaptan (CH<SUB>3</SUB>SH) are
    potentially detectable biosignatures for a sulfur biosphere. However, in all cases considered, the most detectable biosignature
    is the CH<SUB>4</SUB> and CO<SUB>2</SUB> disequilibrium pair, which likely requires ~10 transits for detection in both
    the methanogen-dominated Archean-like environment and the modern photosynthetic-dominated biosphere — even in cloudy atmospheres.
    While CH<SUB>4</SUB> that is volcanically outgassed from a more chemically-reducing mantle could pose a false positive
    for this biosignature, the presence of abundant CO, the false positive discriminant, is also potentially detectable in
    under 10 transits. Given the likely difficulties in observing an oxygenic photosynthetic biosphere, we conclude that searching
    for methanogenesis via the combination of outgassed CO<SUB>2</SUB> in the presence of methanogenically-generated CH<SUB>4</SUB>
    may be the most persistent and JWST-accessible biosignature for an Earth-like planet.
