  arxiv_id: '2006.06899'
  ads_bibcode: 2020ApJ...905..131L
  title: JWST Transit Spectra. I. Exploring Potential Biases and Opportunities in Retrievals of Tidally Locked Hot Jupiters
    with Clouds and Hazes
  authors:
  - Lacy, Brianna I.
  - Burrows, Adam
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.3847/1538-4357/abc01c
  abstract: 'The atmospheres on tidally locked planets likely exhibit large differences between their day- and night-sides.
    In this paper, we illustrate how the combined effects of aerosols and day-night temperature gradients shape transit spectra
    of tidally locked exoplanets and evaluate the implications for retrievals of atmospheric properties. We have developed
    a new code, Multi-dimensional Exoplanet TransIt Spectra (METIS), which can compute transit spectra for arbitrary longitude-latitude-altitude
    grids of temperature and pressure. Using METIS, we pair flexible treatments of clouds and hazes with simple parameterized
    day-night temperature gradients to compute transit spectra and perform retrieval experiments across a wide array of possible
    exoplanet atmospheric properties. Our key findings are that: (1) the presence of aerosols can increase the effects of
    day-night temperature gradients on transit spectra; (2) ignoring day-night temperature gradients when attempting to perform
    Bayesian parameter estimation will return biased results, even when aerosols are present; (3) when a day-night temperature
    gradient is accounted for in the retrieval, some spectra contain sufficient information to constrain temperatures and
    the width of the transition from day to night. The presence of clouds and hazes can actually tighten such constraints,
    but also weaken constraints on metallicity and reference pressure. These last findings are predicated on the assumptions
    made in parameterizing the day-night atmospheric structure and the assumption of thermochemical equilibrium. Our results
    imply that this may be a promising avenue to pursue and represent a step toward the larger goal of developing models and
    theory of adequate complexity to match the superior-quality data that will soon be available.'
