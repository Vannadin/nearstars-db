  ads_bibcode: 2022PSJ.....3..211T
  title: The TRAPPIST-1 Habitable Atmosphere Intercomparison (THAI). I. Dry Cases-The Fellowship of the GCMs
  authors:
  - Turbet, Martin
  - Fauchez, Thomas J.
  - Sergeev, Denis E.
  - Boutle, Ian A.
  - Tsigaridis, Kostas
  - Way, Michael J.
