- &id096
  arxiv_id: '1810.10072'
  ads_bibcode: 2018ApJ...869...46K
  title: Climate Modeling of a Potential ExoVenus
  authors:
  - Kane, Stephen R.
  - Ceja, Alma Y.
  - Way, Michael J.
  - Quintana, Elisa V.
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.3847/1538-4357/aaec68
  abstract: The planetary mass and radius sensitivity of exoplanet discovery capabilities has reached into the terrestrial
    regime. The focus of such investigations is to search within the Habitable Zone where a modern Earth-like atmosphere may
    be a viable comparison. However, the detection bias of the transit and radial velocity methods lies close to the host
    star where the received flux at the planet may push the atmosphere into a runaway greenhouse state. One such exoplanet
    discovery, Kepler-1649b, receives a similar flux from its star as modern Venus does from the Sun, and so was categorized
    as a possible exoVenus. Here we discuss the planetary parameters of Kepler-1649b in relation to Venus to establish its
    potential as a Venus analog. We utilize the general circulation model ROCKE-3D to simulate the evolution of the surface
    temperature of Kepler-1649b under various assumptions, including relative atmospheric abundances. We show that in all
    our simulations the atmospheric model rapidly diverges from temperate surface conditions toward a runaway greenhouse with
    rapidly escalating surface temperatures. We calculate transmission spectra for the evolved atmosphere and discuss these
    spectra within the context of the James Webb Space Telescope Near-Infrared Spectrograph capabilities. We thus demonstrate
    the detectability of the key atmospheric signatures of possible runaway greenhouse transition states and outline the future
    prospects of characterizing potential Venus analogs.
  source: citation_of=2025ApJ...980L...7W
