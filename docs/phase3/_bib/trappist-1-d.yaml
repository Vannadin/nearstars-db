  doi: 10.1016/j.pss.2006.05.029
  abstract: 'The Cassini plasma spectrometer (CAPS) instrument made measurements of Titan''s plasma environment when the Cassini
    Orbiter flew through the moon''s plasma wake October 26, 2004 (flyby TA). Initial CAPS ion and electron measurements from
    this encounter will be compared with measurements made by the Voyager 1 plasma science instrument (PLS). The comparisons
    will be used to evaluate previous interpretations and predictions of the Titan plasma environment that have been made
    using PLS measurements. The plasma wake trajectories of flyby TA and Voyager 1 are similar because they occurred when
    Titan was near Saturn''s local noon. These similarities make possible direct, meaningful comparisons between the various
    plasma wake measurements. They lead to the following: (A) The light and heavy ions, H <SUP>+</SUP>and N <SUP>+</SUP>/O
    <SUP>+</SUP>, were observed by PLS in Saturn''s magnetosphere in the vicinity of Titan while the higher mass resolution
    of CAPS yielded H <SUP>+</SUP> and H <SUB>2</SUB><SUP>+</SUP>as the light constituents and O <SUP>+</SUP>/CH <SUB>4</SUB><SUP>+</SUP>
    as the heavy ions. (B) Finite gyroradius effects were apparent in PLS and CAPS measurements of ambient O <SUP>+</SUP>
    ions as a result of their absorption by Titan''s extended atmosphere. (C) The principal pickup ions inferred from both
    PLS and CAPS measurements are H <SUP>+</SUP>, H <SUB>2</SUB><SUP>+</SUP>, N <SUP>+</SUP>, CH <SUB>4</SUB><SUP>+</SUP>
    and N <SUB>2</SUB><SUP>+</SUP>. (D) The inference that heavy pickup ions, observed by PLS, were in narrow beam distributions
    was empirically established by the CAPS measurements. (E) Slowing down of the ambient plasma due to pickup ion mass loading
    was observed by both instruments on the anti-Saturn side of Titan. (F) Strong mass loading just outside the ionotail by
    a heavy ion such as N <SUB>2</SUB><SUP>+</SUP> is apparent in PLS and CAPS measurements. (G) Except for the expected differences
    due to the differing trajectories, the magnitudes and structures of the electron densities and temperatures observed by
    both instruments are similar. The high-energy electron bite-out observed by PLS in the magnetotail is consistent with
    that observed by CAPS.'
