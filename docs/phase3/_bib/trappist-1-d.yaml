  arxiv_id: '1905.05900'
  ads_bibcode: 2019AJ....158...75H
  title: Kepler Planet Occurrence Rates for Mid-type M Dwarfs as a Function of Spectral Type
  authors:
  - Hardegree-Ullman, Kevin K.
  - Cushing, Michael C.
  - Muirhead, Philip S.
