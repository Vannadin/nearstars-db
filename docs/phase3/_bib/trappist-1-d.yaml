  title: No thick carbon dioxide atmosphere on the rocky exoplanet TRAPPIST-1 c
  authors:
  - Zieba, Sebastian
  - Kreidberg, Laura
  - Ducrot, Elsa
  - Gillon, Michaël
  - Morley, Caroline
  - Schaefer, Laura
  - Tamburo, Patrick
  - Koll, Daniel D. B.
  - Lyu, Xintong
  - Acuña, Lorena
  - Agol, Eric
  - Iyer, Aishwarya R.
  - Hu, Renyu
  - Lincowski, Andrew P.
  - Meadows, Victoria S.
  - Selsis, Franck
  - Bolmont, Emeline
  - Mandell, Avi M.
  - Suissa, Gabrielle
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1038/s41586-023-06232-z
  abstract: Seven rocky planets orbit the nearby dwarf star TRAPPIST-1, providing a unique opportunity to search for atmospheres
    on small planets outside the Solar System<SUP>1</SUP>. Thanks to the recent launch of the James Webb Space Telescope (JWST),
    possible atmospheric constituents such as carbon dioxide (CO<SUB>2</SUB>) are now detectable<SUP>2,3</SUP>. Recent JWST
    observations of the innermost planet TRAPPIST-1 b showed that it is most probably a bare rock without any CO<SUB>2</SUB>
    in its atmosphere<SUP>4</SUP>. Here we report the detection of thermal emission from the dayside of TRAPPIST-1 c with
    the Mid-Infrared Instrument (MIRI) on JWST at 15 µm. We measure a planet-to-star flux ratio of f<SUB>p</SUB>/f<SUB>⁎</SUB>
    = 421 ± 94 parts per million (ppm), which corresponds to an inferred dayside brightness temperature of 380 ± 31 K. This
    high dayside temperature disfavours a thick, CO<SUB>2</SUB>-rich atmosphere on the planet. The data rule out cloud-free
    O<SUB>2</SUB>/CO<SUB>2</SUB> mixtures with surface pressures ranging from 10 bar (with 10 ppm CO<SUB>2</SUB>) to 0.1 bar
    (pure CO<SUB>2</SUB>). A Venus-analogue atmosphere with sulfuric acid clouds is also disfavoured at 2.6σ confidence. Thinner
    atmospheres or bare-rock surfaces are consistent with our measured planet-to-star flux ratio. The absence of a thick,
    CO<SUB>2</SUB>-rich atmosphere on TRAPPIST-1 c suggests a relatively volatile-poor formation history, with less than 9.5<SUB>‒2.3</SUB><SUP>+7.5</SUP>
    Earth oceans of water. If all planets in the system formed in the same way, this would indicate a limited reservoir of
    volatiles for the potentially habitable planets in the system.
