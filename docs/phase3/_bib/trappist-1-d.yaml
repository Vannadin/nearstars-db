- &id254
  arxiv_id: '2005.01440'
  ads_bibcode: 2020A&A...641A.170S
  title: Occurrence rate of exoplanets orbiting ultracool dwarfs as probed by K2
  authors:
  - Sestovic, Marko
  - Demory, Brice-Olivier
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.1051/0004-6361/202037732
  abstract: 'Context. With the discovery of a planetary system around the ultracool dwarf TRAPPIST-1, there has been a surge
    of interest in such stars as potential planet hosts. Planetary systems around ultracool dwarfs represent our best chance
    of characterising temperate rocky-planet atmospheres with the James Webb Space Telescope. However, TRAPPIST-1 remains
    the only known system of its kind and the occurrence rate of planets around ultracool dwarfs is still poorly constrained.
    <BR /> Aims: We seek to perform a complete transit search on the ultracool dwarfs observed by NASA''s K2 mission, and
    use the results to constrain the occurrence rate of planets around these stars. <BR /> Methods: We filter and characterise
    the sample of ultracool dwarfs observed by K2 by fitting their spectral energy distributions and using parallaxes from
    Gaia. We build an automatic pipeline to perform photometry, detrend the light curves, and search for transit signals.
    Using extensive injection-recovery tests of our pipeline, we compute the detection sensitivity of our search, and thus
    the completeness of our sample. We infer the planetary occurrence rates within a hierarchical Bayesian model (HBM) to
    treat uncertain planetary parameters. With the occurrence rate parametrised by a step-wise function, we present a convenient
    way to directly marginalise over the second level of our HBM (the planetary parameters). Our method is applicable generally
    and can greatly speed up inference with larger catalogues of detected planets. <BR /> Results: We detect one planet in
    our sample of 702 ultracool dwarfs: a previously validated mini-Neptune. We thus infer a mini-Neptune (2-4 R<SUB>⊕</SUB>)
    occurrence rate of η = 0.20<SUB>-0.11</SUB><SUP>+0.16</SUP> within orbital periods of 1-20 days. For super-Earths (1-2
    R<SUB>⊕</SUB>) and ice or gas giants (4-6 R<SUB>⊕</SUB>) within 1-20 days, we place 95% credible intervals of η &lt; 1.14
    and η &lt; 0.29, respectively. If TRAPPIST-1-like systems were ubiquitous, we would have a ~96% chance of finding at least
    one. <P />The data are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/641/A170">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/641/A170</A>.'
