- &id188
  arxiv_id: '2003.01814'
  ads_bibcode: 2020AJ....159..175D
  title: 'EXOREL ${}^{{\mathfrak{R}}} : A Bayesian Inverse Retrieval Framework for Exoplanetary Reflected Light Spectra'
  authors:
  - Damiano, Mario
  - Hu, Renyu
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-3881/ab79a5
  abstract: 'The high-contrast imaging technique is meant to provide insight into those planets orbiting several astronomical
    units from their host star. Space missions such as Wide-Field InfraRed Survey Telescope, Habitable Exoplanet Imaging Mission,
    and Large Ultra-Violet/Optical/InfraRed Surveyor will measure reflected light spectra of cold gaseous and rocky planets.
    To interpret these observations, we introduce EXOREL ${}^{{\mathfrak{R}}} (Exoplanetary Reflected Light Retrieval), a
    novel Bayesian retrieval framework to retrieve cloud properties and atmospheric structures from exoplanetary reflected
    light spectra. As a unique feature, it assumes a vertically nonuniform volume mixing ratio (VMR) profile of water and
    ammonia, and uses it to construct cloud densities. In this way, clouds and molecular mixture ratios are consistent. We
    apply EXOREL ${}^{{\mathfrak{R}}} on three test cases: two exoplanets (υ And e and 47 Uma b) and Jupiter. We show that
    we are able to retrieve the concentration of methane in the atmosphere, and estimate the position of clouds when the signal-to-noise
    ratio of the spectrum is higher than 15, in line with previous works. Moreover, we described the ability of our model
    to give a chemical identity to clouds, and we discussed whether or not we can observe this difference in the planetary
    reflection spectrum. Finally, we demonstrate how it could be possible to retrieve molecular concentrations (water and
    ammonia in this work) below the clouds by linking the nonuniform VMR profile to the cloud presence. This will help to
    constrain the concentration of water and ammonia unseen in direct measurements.'
