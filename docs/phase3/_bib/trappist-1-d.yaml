    f and g, and therefore our results do not offer substantial improvement over the original HST results. <P />Our findings
    support secondary rather than primordial atmospheres for the TRAPPIST-1 planets and allow for substantial evolution of
    these atmospheres over their lifetimes, as found in previous studies. Beyond the TRAPPIST-1 system, this study has broader
    implications for other M-dwarf hosted terrestrial planets.'
