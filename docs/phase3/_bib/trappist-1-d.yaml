  ads_bibcode: 2018AsBio..18..133M
  title: 'The Habitability of Proxima Centauri b: Environmental States and Observational Discriminants'
  authors:
  - Meadows, Victoria S.
  - Arney, Giada N.
  - Schwieterman, Edward W.
  - Lustig-Yaeger, Jacob
  - Lincowski, Andrew P.
  - Robinson, Tyler
  - Domagal-Goldman, Shawn D.
  - Deitrick, Russell
  - Barnes, Rory K.
  - Fleming, David P.
  - Luger, Rodrigo
  - Driscoll, Peter E.
  - Quinn, Thomas R.
  - Crisp, David
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.1089/ast.2016.1589
  abstract: Proxima Centauri b provides an unprecedented opportunity to understand the evolution and nature of terrestrial
    planets orbiting M dwarfs. Although Proxima Cen b orbits within its star's habitable zone, multiple plausible evolutionary
    paths could have generated different environments that may or may not be habitable. Here, we use 1-D coupled climate-photochemical
    models to generate self-consistent atmospheres for several evolutionary scenarios, including high-O<SUB>2</SUB>, high-CO<SUB>2</SUB>,
    and more Earth-like atmospheres, with both oxic and anoxic compositions. We show that these modeled environments can be
    habitable or uninhabitable at Proxima Cen b's position in the habitable zone. We use radiative transfer models to generate
    synthetic spectra and thermal phase curves for these simulated environments, and use instrument models to explore our
    ability to discriminate between possible planetary states. These results are applicable not only to Proxima Cen b but
    to other terrestrial planets orbiting M dwarfs. Thermal phase curves may provide the first constraint on the existence
    of an atmosphere. We find that James Webb Space Telescope (JWST) observations longward of 10 μm could characterize atmospheric
    heat transport and molecular composition. Detection of ocean glint is unlikely with JWST but may be within the reach of
    larger-aperture telescopes. Direct imaging spectra may detect O<SUB>4</SUB> absorption, which is diagnostic of massive
    water loss and O<SUB>2</SUB> retention, rather than a photosynthetic biosphere. Similarly, strong CO<SUB>2</SUB> and CO
    bands at wavelengths shortward of 2.5 μm would indicate a CO<SUB>2</SUB>-dominated atmosphere. If the planet is habitable
    and volatile-rich, direct imaging will be the best means of detecting habitability. Earth-like planets with microbial
    biospheres may be identified by the presence of CH<SUB>4</SUB>—which has a longer atmospheric lifetime under Proxima Centauri's
    incident UV—and either photosynthetically produced O<SUB>2</SUB> or a hydrocarbon haze layer.
