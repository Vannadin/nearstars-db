  arxiv_id: '2401.06043'
  ads_bibcode: 2024AJ....167...90K
  title: JWST/NIRCam Transmission Spectroscopy of the Nearby Sub-Earth GJ 341b
  authors:
  - Kirk, James
  - Stevenson, Kevin B.
  - Fu, Guangwei
  - Lustig-Yaeger, Jacob
  - Moran, Sarah E.
  - Peacock, Sarah
  - Alam, Munazza K.
  - Batalha, Natasha E.
  - Bennett, Katherine A.
  - Gonzalez-Quiles, Junellie
  - López-Morales, Mercedes
  - Lothringer, Joshua D.
  - MacDonald, Ryan J.
  - May, E. M.
  - Mayorga, L. C.
  - Rustamkulov, Zafar
  - Sing, David K.
  - Sotzen, Kristin S.
  - Valenti, Jeff A.
  - Wakeford, Hannah R.
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.3847/1538-3881/ad19df
  abstract: We present a JWST/Near Infrared Camera (NIRCam) transmission spectrum from 3.9 to 5.0 μm of the recently validated
    sub-Earth GJ 341b (R <SUB>P</SUB> = 0.92 R <SUB>⊕</SUB>, T <SUB>eq</SUB> = 540 K) orbiting a nearby bright M1 star (d
    = 10.4 pc, K <SUB>mag</SUB> = 5.6). We use three independent pipelines to reduce the data from the three JWST visits and
    perform several tests to check for the significance of an atmosphere. Overall, our analysis does not uncover evidence
    of an atmosphere. Our null hypothesis tests find that none of our pipelines' transmission spectra can rule out a flat
    line, although there is weak evidence for a Gaussian feature in two spectra from different pipelines (at 2.3 and 2.9σ).
    However, the candidate features are seen at different wavelengths (4.3 μm versus 4.7 μm), and our retrieval analysis finds
    that different gas species can explain these features in the two reductions (CO<SUB>2</SUB> at 3.1σ compared to O<SUB>3</SUB>
    at 2.9σ), suggesting that they are not real astrophysical signals. Our forward-model analysis rules out a low-mean-molecular-weight
    atmosphere (&lt;350× solar metallicity) to at least 3σ, and disfavors CH<SUB>4</SUB>-dominated atmospheres at 1─3σ, depending
    on the reduction. Instead, the forward models find our transmission spectra are consistent with no atmosphere, a hazy
    atmosphere, or an atmosphere containing a species that does not have prominent molecular bands across the NIRCam/F444W
    bandpass, such as a water-dominated atmosphere. Our results demonstrate the unequivocal need for two or more transit observations
    analyzed with multiple reduction pipelines, alongside rigorous statistical tests, to determine the robustness of molecular
    detections for small exoplanet atmospheres.
