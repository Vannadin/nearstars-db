- &id291
  arxiv_id: null
  ads_bibcode: 2019AAS...23310304M
  title: 'Limits on Clouds and Hazes in the TRAPPIST-1 Planets: insights from the laboratory and models'
  authors:
  - Moran, Sarah E.
  - Horst, Sarah M.
  - Batalha, Natasha E.
  - Lewis, Nikole K.
  - Wakeford, Hannah R.
  year: '2019'
  pubdate: '2019-01-00'
  doi: null
  abstract: 'As the first known multi-planet system of Earth-sized worlds, the TRAPPIST-1 system has been the subject of intense
    study since its discovery. With at least three of its planets in the traditional habitable zone, the TRAPPIST-1 system
    offers an exceptional opportunity to study the evolution, potential habitability, and possible aerosol formation of planetary
    atmospheres around M-dwarf stars. Using a combination of laboratory results for temperate exoplanet atmospheres and a
    1-D atmospheric model, we explored the feasibility of aerosols in hydrogen-rich atmospheres to explain the featureless
    Hubble Space Telescope (HST) transmission spectra of TRAPPIST-1 d, e, f, and g. From the laboratory, we have constraints
    on haze particle size and production rate. Using these constraints as a guideline, we found that based on physically realistic
    haze formation scenarios, TRAPPIST-1 d and e likely do not have hydrogen-rich atmospheres with hazes muting spectroscopic
    features. We also investigated the effect of an opaque cloud layer in hydrogen-rich atmospheres: high altitude clouds
    are needed in these models to explain the HST transmission spectra for TRAPPIST-1 d and e. At the required altitudes,
    it is unlikely that an optically thick cloud could form due to the lack of material available. Finally, I will present
    lower limits for the mean molecular weights of the TRAPPIST-1 atmospheres, both with and without an opaque cloud deck.
    Current observational precision is not yet strong enough to rule out extended hydrogen-rich atmospheres for TRAPPIST-1
    f and g, and these worlds will require follow-up with more powerful observatories, such as the James Webb Space Telescope.
    Our findings support secondary rather than primordial atmospheres for the TRAPPIST-1 planets and allow for substantial
    evolution of these atmospheres over their lifetimes, as found in previous studies. Beyond the TRAPPIST-1 system, this
    study has broader implications for other M-dwarf hosted terrestrial planets, which should also be expected to have secondary
    rather than primordial, hydrogen-rich atmospheres.'
