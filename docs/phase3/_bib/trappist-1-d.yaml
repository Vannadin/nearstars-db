- &id069
  arxiv_id: '2401.15548'
  ads_bibcode: 2024ApJ...962L..20R
  title: Muted Features in the JWST NIRISS Transmission Spectrum of Hot Neptune LTT 9779b
  authors:
  - Radica, Michael
  - Coulombe, Louis-Philippe
  - Taylor, Jake
  - Albert, Loic
  - Allart, Romain
  - Benneke, Björn
  - Cowan, Nicolas B.
  - Dang, Lisa
  - Lafrenière, David
  - Thorngren, Daniel
  - Artigau, Étienne
  - Doyon, René
  - Flagg, Laura
  - Johnstone, Doug
  - Pelletier, Stefan
