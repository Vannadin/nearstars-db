- &id193
  arxiv_id: '1906.05079'
  ads_bibcode: 2019AJ....158...83A
  title: 'A Thousand Earths: A Very Large Aperture, Ultralight Space Telescope Array for Atmospheric Biosignature Surveys'
  authors:
  - Apai, Dániel
  - Milster, Tom D.
  - Kim, Dae Wook
  - Bixel, Alex
  - Schneider, Glenn
  - Liang, Ronguang
  - Arenberg, Jonathan
  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.3847/1538-3881/ab2631
  abstract: An outstanding, multidisciplinary goal of modern science is the study of the diversity of potentially Earth-like
    planets and the search for life in them. This goal requires a bold new generation of space telescopes, but even the most
    ambitious designs yet hope to characterize several dozen potentially habitable planets. Such a sample may be too small
    to truly understand the complexity of exo-earths. We describe here a notional concept for a novel space observatory designed
    to characterize 1000 transiting exo-earth candidates. The Nautilus concept is based on an array of inflatable spacecraft
    carrying very large diameter (8.5 m), very low weight, multiorder diffractive optical elements (MODE lenses) as light-collecting
    elements. The mirrors typical to current space telescopes are replaced by MODE lenses with a 10 times lighter areal density
    that are 100 times less sensitive to misalignments, enabling lightweight structure. MODE lenses can be cost-effectively
    replicated through molding. The Nautilus mission concept has a potential to greatly reduce fabrication and launch costs
    and mission risks compared to the current space telescope paradigm through replicated components and identical, lightweight
    unit telescopes. Nautilus is designed to survey transiting exo-earths for biosignatures up to a distance of 300 pc, enabling
    a rigorous statistical exploration of the frequency and properties of life-bearing planets and the diversity of exo-earths.
  source: citation_of=2023AJ....165..267H
