  arxiv_id: '1911.05179'
  ads_bibcode: 2020MNRAS.491.5361B
  title: WASP-52b. The effect of star-spot correction on atmospheric retrievals
  authors:
  - Bruno, Giovanni
  - Lewis, Nikole K.
  - Alam, Munazza K.
  - López-Morales, Mercedes
  - Barstow, Joanna K.
  - Wakeford, Hannah R.
  - Sing, David K.
  - Henry, Gregory W.
  - Ballester, Gilda E.
  - Bourrier, Vincent
  - Buchhave, Lars A.
  - Cohen, Ofer
  - Mikal-Evans, Thomas
  - García Muñoz, Antonio
  - Lavvas, Panayotis
  - Sanz-Forcada, Jorge
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.1093/mnras/stz3194
  abstract: We perform atmospheric retrievals on the full optical to infrared (0.3-5 μ m) transmission spectrum of the inflated
    hot Jupiter WASP-52b by combining HST/STIS, WFC3 IR, and Spitzer/IRAC observations. As WASP-52 is an active star that
    shows both out-of-transit photometric variability and star-spot crossings during transits, we account for the contribution
    of non-occulted active regions in the retrieval. We recover a 0.1-10× solar atmospheric composition, in agreement with
    core accretion predictions for giant planets, and no significant contribution of aerosols. We also obtain a &lt;3000 K
    temperature for the star-spots, a measure which is likely affected by the models used to fit instrumental effects in the
    transits, and a 5 per cent star-spot fractional coverage, compatible with expectations for the host star's spectral type.
    Such constraints on the planetary atmosphere and on the activity of its host star will inform future JWST GTO observations
    of this target.
