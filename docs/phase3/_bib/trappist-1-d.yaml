  arxiv_id: '1903.11533'
  ads_bibcode: 2019ApJ...876...17B
  title: Ohmic Heating of Asteroids around Magnetic Stars
  authors:
  - Bromley, Benjamin C.
  - Kenyon, Scott J.
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.3847/1538-4357/ab12e9
  abstract: We consider the impact of electromagnetic induction and ohmic heating on a conducting planetary object that orbits
    a magnetic star. Power dissipated as heat saps orbital energy. If this heat is trapped by an insulating crust or mantle,
    interior temperatures increase substantially. We provide a quantitative description of this behavior and discuss the astrophysical
    scenarios in which it might occur. Magnetic fields around some main-sequence stars and white dwarfs are strong enough
    to cause the decay of close-in orbits of asteroids and dwarf planets, drawing them through the Roche limit on megayear
    timescales. We confirm that ohmic heating around neutron stars is driven by the rotation of the stellar magnetic dipole,
    not orbital dynamics. In any case, heating can raise interior temperatures of asteroids or dwarf planets on close-in orbits
    to well above liquidus. Hot material escaping to the surface may lead to volcanic ejections that can obscure the host
    star (as in the light curve of KIC 8462852) and pollute its atmosphere (as observed with metal-rich white dwarfs). We
    speculate that mixing of a volatile-rich mantle or crust with material from an induction-heated core may lead to an explosion
    that could destroy the asteroid prior to tidal breakup.
  source: citation_of=2025ApJ...980L...7W
