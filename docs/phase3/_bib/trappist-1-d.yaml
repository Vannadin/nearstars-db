- &id259
  arxiv_id: '2004.04160'
  ads_bibcode: 2020MNRAS.495..224G
  title: Molecular cross-sections for high-resolution spectroscopy of super-Earths, warm Neptunes, and hot Jupiters
  authors:
  - Gandhi, Siddharth
  - Brogi, Matteo
  - Yurchenko, Sergei N.
  - Tennyson, Jonathan
  - Coles, Phillip A.
  - Webb, Rebecca K.
  - Birkby, Jayne L.
  - Guilluy, Gloria
  - Hawker, George A.
  - Madhusudhan, Nikku
  - Bonomo, Aldo S.
  - Sozzetti, Alessandro
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.1093/mnras/staa981
  abstract: High-resolution spectroscopy (HRS) has been used to detect a number of species in the atmospheres of hot Jupiters.
    Key to such detections is accurately and precisely modelled spectra for cross-correlation against the R ≳ 20 000 observations.
    There is a need for the latest generation of opacities which form the basis for high signal-to-noise detections using
    such spectra. In this study we present and make publicly available cross-sections for six molecular species, H<SUB>2</SUB>O,
    CO, HCN, CH<SUB>4</SUB>, NH<SUB>3</SUB>, and CO<SUB>2</SUB> using the latest line lists most suitable for low- and high-resolution
    spectroscopy. We focus on the infrared (0.95-5 μm) and between 500 and 1500 K where these species have strong spectral
    signatures. We generate these cross-sections on a grid of pressures and temperatures typical for the photospheres of super-Earth,
    warm Neptunes, and hot Jupiters using the latest H<SUB>2</SUB> and He pressure broadening. We highlight the most prominent
    infrared spectral features by modelling three representative exoplanets, GJ 1214 b, GJ 3470 b, and HD 189733 b, which
    encompass a wide range in temperature, mass, and radii. In addition, we verify the line lists for H<SUB>2</SUB>O, CO,
    and HCN with previous high-resolution observations of hot Jupiters. However, we are unable to detect CH<SUB>4</SUB> with
    our new cross-sections from HRS observations of HD 102195 b. These high-accuracy opacities are critical for atmospheric
    detections with HRS and will be continually updated as new data become available.
