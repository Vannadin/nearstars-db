- &id094
  arxiv_id: '1902.05231'
  ads_bibcode: 2019ApJ...874...61A
  title: Aggregate Hazes in Exoplanet Atmospheres
  authors:
  - Adams, Danica
  - Gao, Peter
  - de Pater, Imke
  - Morley, Caroline V.
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.3847/1538-4357/ab074c
  abstract: Photochemical hazes have frequently been used to interpret exoplanet transmission spectra that show an upward
    slope toward shorter wavelengths and weak molecular features. While previous studies have only considered spherical haze
    particles, photochemical hazes composed of hydrocarbon aggregate particles are common throughout the solar system. We
    use an aerosol microphysics model to investigate the effect of aggregate photochemical haze particles on the transmission
    spectra of warm exoplanets. We find that the wavelength dependence of the optical depth of aggregate particle hazes is
    flatter than for spheres because aggregates grow to larger radii. Consequently, while spherical haze opacity displays
    a scattering slope toward shorter wavelengths, aggregate haze opacity can be gray in the optical and near-infrared, similar
    to those assumed for condensate cloud decks. We further find that haze opacity increases with increasing production rate,
    decreasing eddy diffusivity, and increasing monomer size, although the magnitude of the latter effect is dependent on
    production rate and the atmospheric pressure levels probed. We generate synthetic exoplanet transmission spectra to investigate
    the effect of these hazes on spectral features. For high haze opacity cases, aggregate hazes lead to flat, nearly featureless
    spectra, while spherical hazes produce sloped spectra with clear spectral features at long wavelengths. Finally, we generate
    synthetic transmission spectra of GJ 1214b for aggregate and spherical hazes and compare them to space-based observations.
    We find that aggregate hazes can reproduce the data significantly better than spherical hazes, assuming a production rate
    that is limited by delivery of methane to the upper atmosphere.
  source: citation_of=2021ApJ...913..114W
