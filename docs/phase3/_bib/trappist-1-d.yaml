  abstract: 'Observatory end-to-end science operations is the overall process starting with a scientific question, represented
    by a proposal requesting observing time; ending with the analysis of observation data addressing that question; and including
    all of the intermediate steps needed to plan, schedule, obtain, and process these observations. Increasingly complex observing
    facilities demand a highly efficient science operations approach and at the same time must be user friendly to the astronomical
