- &id181
  arxiv_id: '2002.02945'
  ads_bibcode: 2020MNRAS.497.4183B
  title: 'Unveiling cloudy exoplanets: the influence of cloud model choices on retrieval solutions'
  authors:
  - Barstow, Joanna K.
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.1093/mnras/staa2219
  abstract: In recent years, it has become clear that a substantial fraction of transiting exoplanets have some form of aerosol
    present in their atmospheres. Transit spectroscopy - mostly of hot Jupiters, but also of some smaller planets - has provided
    evidence for this, in the form of steep downward slopes from blue to red in the optical part of the spectrum, and muted
    gas absorption features throughout. Retrieval studies seeking to constrain the composition of exoplanet atmospheres must
    therefore account for the presence of aerosols. However, clouds and hazes are complex physical phenomena, and the transit
    spectra that are currently available allow us to constrain only some of their properties. Therefore, representation of
    aerosols in retrieval models requires that they are described by only a few parameters, and this has been done in a variety
    of ways within the literature. Here, I investigate a range of parametrizations for exoplanet aerosol and their effects
    on retrievals from transmission spectra of hot Jupiters HD 189733b and HD 209458b. I find that results qualitatively agree
    for the cloud/haze itself regardless of the parametrization used, and indeed using multiple approaches provides a more
    holistic picture; the retrieved abundance of H<SUB>2</SUB>O is also very robust to assumptions about aerosols. I also
    find strong evidence that aerosol on HD 209458b covers less than half of the terminator region, whilst the picture is
    less clear for HD 189733b.
