  abstract: We present a new transit of TRAPPIST-1 d from 2021 August 25. The measured mid-point of this transit agrees with
    the prediction from a recently published dynamical model for the TRAPPIST-1 system and differs significantly from a naive
    prediction from a simple linear ephemeris. This difference underlines the importance for using dynamical models to predict
