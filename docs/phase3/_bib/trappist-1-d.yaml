- &id110
  arxiv_id: '1501.06876'
  ads_bibcode: 2015ApJ...806..249G
  title: Stability of CO2 Atmospheres on Desiccated M Dwarf Exoplanets
  authors:
  - Gao, Peter
  - Hu, Renyu
  - Robinson, Tyler D.
  - Li, Cheng
  - Yung, Yuk L.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/0004-637X/806/2/249
  abstract: We investigate the chemical stability of CO<SUB>2</SUB>-dominated atmospheres of desiccated M dwarf terrestrial
    exoplanets using a one-dimensional photochemical model. Around Sun-like stars, CO<SUB>2</SUB> photolysis by Far-UV (FUV)
    radiation is balanced by recombination reactions that depend on water abundance. Planets orbiting M dwarf stars experience
    more FUV radiation, and could be depleted in water due to M dwarfs’ prolonged, high-luminosity pre-main sequences. We
    show that, for water-depleted M dwarf terrestrial planets, a catalytic cycle relying on H<SUB>2</SUB>O<SUB>2</SUB> photolysis
    can maintain a CO<SUB>2</SUB> atmosphere. However, this cycle breaks down for atmospheric hydrogen mixing ratios &lt;1
    ppm, resulting in ∼40% of the atmospheric CO<SUB>2</SUB> being converted to CO and O<SUB>2</SUB> on a timescale of 1 Myr.
    The increased O<SUB>2</SUB> abundance leads to high O<SUB>3</SUB> concentrations, the photolysis of which forms another
    CO<SUB>2</SUB>-regenerating catalytic cycle. For atmospheres with &lt;0.1 ppm hydrogen, CO<SUB>2</SUB> is produced directly
    from the recombination of CO and O. These catalytic cycles place an upper limit of ∼50% on the amount of CO<SUB>2</SUB>
    that can be destroyed via photolysis, which is enough to generate Earth-like abundances of (abiotic) O<SUB>2</SUB> and
    O<SUB>3</SUB>. The conditions that lead to such high oxygen levels could be widespread on planets in the habitable zones
    of M dwarfs. Discrimination between biological and abiotic O<SUB>2</SUB> and O<SUB>3</SUB> in this case can perhaps be
    accomplished by noting the lack of water features in the reflectance and emission spectra of these planets, which necessitates
    observations at wavelengths longer than 0.95 μm.
