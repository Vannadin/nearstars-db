  arxiv_id: '1905.10659'
  ads_bibcode: 2019AJ....158...33C
  title: An Ensemble of Bayesian Neural Networks for Exoplanetary Atmospheric Retrieval
  authors:
  - Cobb, Adam D.
  - Himes, Michael D.
  - Soboczenski, Frank
  - Zorzan, Simone
  - O'Beirne, Molly D.
  - Güneș Baydin, Atılım
  - Gal, Yarin
  - Domagal-Goldman, Shawn D.
  - Arney, Giada N.
  - Angerhausen, Daniel
  - 2018 NASA FDL Astrobiology Team, II
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.3847/1538-3881/ab2390
  abstract: Machine learning (ML) is now used in many areas of astrophysics, from detecting exoplanets in Kepler transit signals
    to removing telescope systematics. Recent work demonstrated the potential of using ML algorithms for atmospheric retrieval
    by implementing a random forest (RF) to perform retrievals in seconds that are consistent with the traditional, computationally
    expensive nested-sampling retrieval method. We expand upon their approach by presenting a new ML model, plan-net, based
    on an ensemble of Bayesian neural networks (BNNs) that yields more accurate inferences than the RF for the same data set
    of synthetic transmission spectra. We demonstrate that an ensemble provides greater accuracy and more robust uncertainties
    than a single model. In addition to being the first to use BNNs for atmospheric retrieval, we also introduce a new loss
    function for BNNs that learns correlations between the model outputs. Importantly, we show that designing ML models to
    explicitly incorporate domain-specific knowledge both improves performance and provides additional insight by inferring
    the covariance of the retrieved atmospheric parameters. We apply plan-net to the Hubble Space Telescope Wide Field Camera
    3 transmission spectrum for WASP-12b and retrieve an isothermal temperature and water abundance consistent with the literature.
    We highlight that our method is flexible and can be expanded to higher-resolution spectra and a larger number of atmospheric
    parameters.
