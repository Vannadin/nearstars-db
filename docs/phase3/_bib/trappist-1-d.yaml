  title: Experimental Constraints for Improving Terrestrial Exoplanet Photochemical Models (ExCITE-PM)
  authors:
  - Schwieterman, Edward W.
  year: '2021'
  pubdate: '2021-00-00'
  doi: null
  abstract: 'A key goal of exoplanet science is the characterization of terrestrial exoplanet atmospheres, for which the most
    compelling targets include the TRAPPIST-1 system. The 7 terrestrial planets of TRAPPIST-1 are uniquely accessible to atmospheric
    characterization due to the proximity and small size of TRAPPIST-1. These worlds receive diverse stellar irradiation,
    providing an exceptional opportunity for comparative planetology [106]. Consequently, TRAPPIST-1 is a high-priority observational
    target for upcoming facilities like the James Webb Space Telescope (JWST). Notably, multiple approved JWST programs target
    the atmospheres of the TRAPPIST-1 worlds. <P />Photochemical models are required to plan and interpret observations of
    terrestrial exoplanets like TRAPPIST-1bcdefgh. However, these models are only as good as their input chemical data, and
    "the limited laboratory and ab initio data covering the parameter space relevant to exoplanets is a barrier to accurate
    models of exoplanet atmospheres" [76]. We propose 5 investigations targeted at this barrier, rendered urgent by the upcoming
    JWST observations: <P />1. CO/O2 Runaway: [46] report that planets with CO2-rich atmospheres orbiting M-dwarfs (e.g.,
    TRAPPIST-1e(fg)) should have abundant photochemical O2 and CO (&gt;0.05 bar). We will attempt to replicate the finding
    of [46] with 2 models, identify any sensitivity to photochemical assumptions, and flag them for priority empirical follow
    up (e.g. [83]). <P />2. HSO and HNO Sensitivity Tests: The cross-sections of HSO and HNO are not known; these molecules
    are included in models by proxy. We will conduct sensitivity tests to determine the prioritization of these parameters
    for detailed characterization. <P />3. S2 UV Cross-Sections: S2 photolysis is a key process en route to observationally-detectable
    species like S8, but UV absorption properties of S2 are not known. Rather, S2 photolysis is estimated, based on e.g.,
    scaling from comet measurements. We will use recent experimental data [103] to construct line-by-line and cross-section
    parametrizations of S2 UV absorption. <P />4. Rate Constants for Key Sulfur Reactions: The reaction S+CO+M─&gt;OCS+M has
    not been measured or calculated, but is nonetheless commonly assumed to proceed in models by analogy with O+CO+M─&gt;CO2+M.
    Absent this reaction, [OCS] is suppressed by &gt;15 orders of magnitude, and models cannot reproduce Venusian [OCS]. Similarly,
    the reaction S+CO2─&gt;SO+CO has not been observed, but is often assumed in photochemical models where it significantly
    influences atmospheric composition, e.g., the abundance of CO. We will experimentally evaluate the rates of both reactions
    using shock tube measurements conducted over a range of temperature, pressure and mixture composition and employing a
    variety of species-sensitive optical diagnostics. <P />5. Model incorporation: We will incorporate our results into 2
    independent photochemical models [6,47], and explore the implications for potential observables in the TRAPPIST-1 system.
    Investigations 1-4 are relevant for potentially habitable planets, e.g., TRAPPIST-1(d)ef(g). Investigations 2-4 are relevant
    for potentially Venus-like planets, e.g., TRAPPIST-1bc(d) [106]. While motivated by TRAPPIST-1, our investigations are
    applicable to terrestrial exoplanets in general. <P />Our proposal aligns with the Exoplanets Research Program goal of
    "Exploration of the chemical...processes of exoplanets (including...their...atmospheres)". Our work addresses Objective
    1.1 "Searching for Life Elsewhere" of the 2018 NASA Strategic Plan, the "Laboratory Measurements and Ab Initio Calculations"
    overarching challenge in the 2018 NAS Exoplanet Science Strategy, and the community mandate for better exoplanet model
    inputs [26,27]. <P />[106] Turbet et al. 2020 [76] NAS Exoplanet Science Strategy 2018 [46] Hu et al. 2020 [83] Ranjan
    et al. 2020 [103] Stark et al. 2018 [47] Hu et al. 2012 [6] Arney et al. 2016 [26] Fortney et al. 2016 [27] Fortney et
    al. 2019'
