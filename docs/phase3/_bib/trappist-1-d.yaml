  arxiv_id: '1908.00619'
  ads_bibcode: 2019AJ....158...91S
  title: 'The Hubble Space Telescope PanCET Program: Exospheric Mg II and Fe II in the Near-ultraviolet Transmission Spectrum
    of WASP-121b Using Jitter Decorrelation'
  authors:
  - Sing, David K.
  - Lavvas, Panayotis
  - Ballester, Gilda E.
  - Lecavelier des Etangs, Alain
  - Marley, Mark S.
  - Nikolov, Nikolay
  - Ben-Jaffel, Lotfi
  - Bourrier, Vincent
  - Buchhave, Lars A.
  - Deming, Drake L.
  - Ehrenreich, David
  - Mikal-Evans, Thomas
  - Kataria, Tiffany
  - Lewis, Nikole K.
  - López-Morales, Mercedes
  - García Muñoz, Antonio
