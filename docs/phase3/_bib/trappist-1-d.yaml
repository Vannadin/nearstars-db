  abstract: The Cassini-Huygens probe gas chromatograph mass spectrometer (GCMS) determined the composition of the Titan atmosphere
    from ∼140 km altitude to the surface. After landing, it returned composition data of gases evaporated from the surface.
    Height profiles of molecular nitrogen (N<SUB>2</SUB>), methane (CH<SUB>4</SUB>), and molecular hydrogen (H<SUB>2</SUB>)
    were determined. Traces were detected on the surface of evaporating methane, ethane (C<SUB>2</SUB>H<SUB>6</SUB>), acetylene
    (C<SUB>2</SUB>H<SUB>2</SUB>), cyanogen (C<SUB>2</SUB>N<SUB>2</SUB>), and carbon dioxide (CO<SUB>2</SUB>). The methane
    data showed evidence that methane precipitation occurred recently. The methane mole fraction was (1.48 ± 0.09) × 10<SUP>-2</SUP>
    in the lower stratosphere (139.8-75.5 km) and (5.65 ± 0.18) × 10<SUP>-2</SUP> near the surface (6.7 km to the surface).
    The molecular hydrogen mole fraction was (1.01 ± 0.16) × 10<SUP>-3</SUP> in the atmosphere and (9.90 ± 0.17) × 10<SUP>-4</SUP>
    on the surface. Isotope ratios were 167.7 ± 0.6 for <SUP>14</SUP>N/<SUP>15</SUP>N in molecular nitrogen, 91.1 ± 1.4 for
    <SUP>12</SUP>C/<SUP>13</SUP>C in methane, and (1.35 ± 0.30) × 10<SUP>-4</SUP> for D/H in molecular hydrogen. The mole
    fractions of <SUP>36</SUP>Ar and radiogenic <SUP>40</SUP>Ar are (2.1 ± 0.8) × 10<SUP>-7</SUP> and (3.39 ± 0.12) × 10<SUP>-5</SUP>,
    respectively. <SUP>22</SUP>Ne has been tentatively identified at a mole fraction of (2.8 ± 2.1) × 10<SUP>-7</SUP>. Krypton
    and xenon were below the detection threshold of 1 × 10<SUP>-8</SUP> mole fraction. Science data were not retrieved from
    the gas chromatograph subsystem as the abundance of the organic trace gases in the atmosphere and on the ground did not
    reach the detection threshold. Results previously published from the GCMS experiment are superseded by this publication.
