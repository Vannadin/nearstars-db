- &id191
  arxiv_id: '1908.06192'
  ads_bibcode: 2019ApJ...883L..15P
  title: The Impact of Stripped Cores on the Frequency of Earth-size Planets in the Habitable Zone
  authors:
  - Pascucci, Ilaria
  - Mulders, Gijs D.
  - Lopez, Eric
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.3847/2041-8213/ab3dac
  abstract: The frequency of Earth-size planets in the habitable zone (HZ) of Sun-like stars, hereafter η <SUB>⊕</SUB>, is
    a key parameter to evaluate the yield of nearby Earth analogs that can be detected and characterized by future missions.
    Yet, this value is poorly constrained as there are no reliable exoplanet candidates in the HZ of Sun-like stars in the
    Kepler field. Here, we show that extrapolations relying on the population of small (&lt;1.8 R <SUB>⊕</SUB>), short-period
    (&lt;25 days) planets bias η <SUB>⊕</SUB> to large values. As the radius distribution at short orbital periods is strongly
    affected by atmospheric loss, we reevaluate η <SUB>⊕</SUB> using exoplanets at larger separations. We find that η <SUB>⊕</SUB>
    drops considerably, to values of only ∼5%-10%. Observations of young (&lt;100 Myr) clusters can probe short-period sub-Neptunes
    that still retain most of their envelope mass. As such, they can be used to quantify the contamination of sub-Neptunes
    to the population of Kepler short-period small planets and aid in more reliable estimates of η <SUB>⊕</SUB>.
  source: citation_of=2023AJ....165..267H
