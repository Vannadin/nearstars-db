  arxiv_id: '2004.10106'
  ads_bibcode: 2020AJ....160...15G
  title: Information Content of JWST NIRSpec Transmission Spectra of Warm Neptunes
  authors:
  - Guzmán-Mesa, Andrea
  - Kitzmann, Daniel
  - Fisher, Chloe
  - Burgasser, Adam J.
  - Hoeijmakers, H. Jens
  - Márquez-Neila, Pablo
  - Grimm, Simon L.
  - Mandell, Avi M.
  - Sznitman, Raphael
  - Heng, Kevin
  year: '2020'
  pubdate: '2020-07-00'
  doi: 10.3847/1538-3881/ab9176
  abstract: 'Warm Neptunes offer a rich opportunity for understanding exo-atmospheric chemistry. With the upcoming James Webb
    Space Telescope (JWST), there is a need to elucidate the balance between investments in telescope time versus scientific
    yield. We use the supervised machine-learning method of the random forest to perform an information content (IC) analysis
    on a 11-parameter model of transmission spectra from the various NIRSpec modes. The three bluest medium-resolution NIRSpec
    modes (0.7-1.27 μm, 0.97-1.84 μm, 1.66-3.07 μm) are insensitive to the presence of CO. The reddest medium-resolution mode
    (2.87-5.10 μm) is sensitive to all of the molecules assumed in our model: CO, CO<SUB>2</SUB>, CH<SUB>4</SUB>, C<SUB>2</SUB>H<SUB>2</SUB>,
    H<SUB>2</SUB>O, HCN, and NH<SUB>3</SUB>. It competes effectively with the three bluest modes on the information encoded
    on cloud abundance and particle size. It is also competitive with the low-resolution prism mode (0.6-5.3 μm) on the inference
    of every parameter except for the temperature and ammonia abundance. We recommend astronomers to use the reddest medium-resolution
    NIRSpec mode for studying the atmospheric chemistry of 800-1200 K warm Neptunes; its corresponding high-resolution counterpart
    offers diminishing returns. We compare our findings to previous JWST IC analyses that favor the blue orders and suggest
    that the reliance on chemical equilibrium could lead to biased outcomes if this assumption does not apply. A simple, pressure-independent
    diagnostic for identifying chemical disequilibrium is proposed based on measuring the abundances of H<SUB>2</SUB>O, CO,
    and CO<SUB>2</SUB>.'
