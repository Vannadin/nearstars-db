  arxiv_id: '2010.03576'
  ads_bibcode: 2021AJ....161..115S
  title: JWST Noise Floor. II. Systematic Error Sources in JWST NIRCam Time Series
  authors:
  - Schlawin, Everett
  - Leisenring, Jarron
  - McElwain, Michael W.
  - Misselt, Karl
  - Don, Kenneth
  - Greene, Thomas P.
  - Beatty, Thomas
