- &id331
  arxiv_id: '1705.05791'
  ads_bibcode: 2018AsBio..18..663S
  title: 'Exoplanet Biosignatures: A Review of Remotely Detectable Signs of Life'
  authors:
  - Schwieterman, Edward W.
  - Kiang, Nancy Y.
  - Parenteau, Mary N.
  - Harman, Chester E.
  - DasSarma, Shiladitya
  - Fisher, Theresa M.
  - Arney, Giada N.
  - Hartnett, Hilairy E.
  - Reinhard, Christopher T.
  - Olson, Stephanie L.
  - Meadows, Victoria S.
