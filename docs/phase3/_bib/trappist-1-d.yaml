  doi: 10.1051/0004-6361/201935593
  abstract: The opacity of alkali atoms, most importantly of Na and K, plays a crucial role in the atmospheres of brown dwarfs
    and exoplanets. We present a comprehensive study of Na-H<SUB>2</SUB> collisional profiles at temperatures from 500 to
    3000 K, the temperatures prevailing in the atmosphere of brown dwarfs and Jupiter-mass planets. The relevant H<SUB>2</SUB>
    perturber densities reach several 10<SUP>19</SUP> cm<SUP>-3</SUP> in hot (T<SUB>eff</SUB> ≳ 1500 K) Jupiter-mass planets
    and can exceed 10<SUP>20</SUP> cm<SUP>-3</SUP> for more massive or cooler objects. Accurate pressure-broadened profiles
    that are valid at high densities of H<SUB>2</SUB> should be incorporated into spectral models. Unified profiles of sodium
    perturbed by molecular hydrogen were calculated in the semi-classical approach using up-to-date molecular data. New Na-H<SUB>2</SUB>
    collisional profiles and their effects on the synthetic spectra of brown dwarfs and hot Jupiters computed with petitCODE
    are presented. <P />Opacity tables are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/628/A120">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/628/A120</A>
