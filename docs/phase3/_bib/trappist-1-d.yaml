- &id111
  arxiv_id: '1304.3714'
  ads_bibcode: 2013ApJ...778..109Z
  title: Toward the Minimum Inner Edge Distance of the Habitable Zone
  authors:
  - Zsom, Andras
  - Seager, Sara
  - de Wit, Julien
  - Stamenković, Vlada
  year: '2013'
  pubdate: '2013-12-00'
  doi: 10.1088/0004-637X/778/2/109
  abstract: We explore the minimum distance from a host star where an exoplanet could potentially be habitable in order not
    to discard close-in rocky exoplanets for follow-up observations. We find that the inner edge of the Habitable Zone for
    hot desert worlds can be as close as 0.38 AU around a solar-like star, if the greenhouse effect is reduced (~1% relative
    humidity) and the surface albedo is increased. We consider a wide range of atmospheric and planetary parameters such as
    the mixing ratios of greenhouse gases (water vapor and CO<SUB>2</SUB>), surface albedo, pressure, and gravity. Intermediate
    surface pressure (~1-10 bars) is necessary to limit water loss and to simultaneously sustain an active water cycle. We
    additionally find that the water loss timescale is influenced by the atmospheric CO<SUB>2</SUB> level, because it indirectly
    influences the stratospheric water mixing ratio. If the CO<SUB>2</SUB> mixing ratio of dry planets at the inner edge is
    smaller than 10<SUP>-4</SUP>, the water loss timescale is ~1 billion years, which is considered here too short for life
    to evolve. We also show that the expected transmission spectra of hot desert worlds are similar to an Earth-like planet.
    Therefore, an instrument designed to identify biosignature gases in an Earth-like atmosphere can also identify similarly
    abundant gases in the atmospheres of dry planets. Our inner edge limit is closer to the host star than previous estimates.
    As a consequence, the occurrence rate of potentially habitable planets is larger than previously thought.
