  arxiv_id: null
  ads_bibcode: 2009Icar..201..226K
  title: A photochemical model of Titan's atmosphere and ionosphere
  authors:
  - Krasnopolsky, Vladimir A.
  year: '2009'
  pubdate: '2009-05-00'
  doi: 10.1016/j.icarus.2008.12.038
  abstract: A global-mean model of coupled neutral and ion chemistry on Titan has been developed. Unlike the previous coupled
    models, the model involves ambipolar diffusion and escape of ions, hydrodynamic escape of light species, and calculates
    the H <SUB>2</SUB> and CO densities near the surface that were assigned in some previous models. We tried to reduce the
    numbers of species and reactions in the model and remove all species and reactions that weakly affect the observed species.
    Hydrocarbon chemistry is extended to C <SUB>12</SUB>H <SUB>10</SUB> for neutrals and C <SUB>10</SUB>H <SUP>+</SUP><SUB>11</SUB>
    for ions but does not include PAHs. The model involves 415 reactions of 83 neutrals and 33 ions, effects of magnetospheric
    electrons, protons, and cosmic rays. UV absorption by Titan's haze was calculated using the Huygens observations and a
    code for the aggregate particles. Hydrocarbon, nitrile, and ion chemistries are strongly coupled on Titan, and attempt
    to calculate them separately (e.g., in models of ionospheric composition) may result in significant error. The model densities
    of various species are typically in good agreement with the observations except vertical profiles in the stratosphere
    that are steeper than the CIRS limb data. (A model with eddy diffusion that facilitates fitting to the CIRS limb data
    is considered as well.) The CO densities are supported by the O <SUP>+</SUP> flux from Saturn's magnetosphere. The ionosphere
    includes a peak at 80 km formed by the cosmic rays, steplike layers at 500-700 and 700-900 km and a peak at 1060 km (SZA
    = 60°). Nighttime densities of major ions agree with the INMS data. Ion chemistry dominates in the production of bicyclic
    aromatic hydrocarbons above 600 km. The model estimates of heavy positive and negative ions are in reasonable agreement
    with the Cassini results. The major haze production is in the reactions C <SUB>6</SUB>H + C <SUB>4</SUB>H <SUB>2</SUB>,
    C <SUB>3</SUB>N + C <SUB>4</SUB>H <SUB>2</SUB>, and condensation of hydrocarbons below 100 km. Overall, precipitation
    rate of the photochemical products is equal to 4-7 kg cm <SUP>-2</SUP> Byr <SUP>-1</SUP> (50-90 m Byr <SUP>-1</SUP> while
    the global-mean depth of the organic sediments is ∼3 m). Escape rates of methane and hydrogen are 2.9 and 1.4 kg cm <SUP>-2</SUP>
    Byr <SUP>-1</SUP>, respectively. The model does not support the low C/N ratio observed by the Huygens ACP in Titan's haze.
  source: citation_of=2022JGRE..12706853F
