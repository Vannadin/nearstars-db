  doi: 10.1051/0004-6361/201117377
  abstract: Cryovolcanic activity near the south pole of Saturn's moon Enceladus produces plumes of H<SUB>2</SUB>O-dominated
    gases and ice particles, which escape and populate a torus-shaped cloud. Using submillimeter spectroscopy with Herschel,
    we report the direct detection of the Enceladus water vapor torus in four rotational lines of water at 557, 987, 1113,
    and 1670 GHz, and probe its physical conditions and structure. We determine line-of-sight H<SUB>2</SUB>O column densities
    of ~4 × 10<SUP>13</SUP> cm<SUP>-2</SUP> near the equatorial plane, with a ~50 000 km vertical scale height. The water
    torus appears to be rotationally cold (e.g. an excitation temperature of 16 K is measured for the 1113 GHz line) but dynamically
    excited, with non-Keplerian dispersion velocities of ~2 km s<SUP>-1</SUP>, and appears to be largely shaped by molecular
    collisions. From estimates of the influx rates of torus material into Saturn and Titan, we infer that Enceladus' activity
    is likely to be the ultimate source of water in the upper atmosphere of Saturn, but not in Titan's. <P />Herschel is an
    ESA space observatory with science instruments provided by European-led Principal Investigator consortia and with important
    participation from NASA. HIFI has been designed and built by a consortium of institutes and university departments from
    across Europe, Canada and the United States under the leadership of SRON Netherlands Institute for Space Research, Groningen,
    The Netherlands and with major contributions from Germany, France and the US.Figures 4 and 5 are available in electronic
    form at <A href="http://www.aanda.org">http://www.aanda.org</A>
