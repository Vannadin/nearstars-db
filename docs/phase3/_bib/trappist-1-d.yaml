  abstract: The TRAPPIST-1 planets have become prime targets for studying the habitability of planets around M-dwarf stars.
    Modeling geochemical cycles in these planets can provide insight on their evolution and their potential for habitability.
    Through planet formation and long-term tectonic evolution, there is an exchange of volatiles between the interior and
    the atmosphere of rocky planets. We model the combined deep water and carbonate-silicate cycles to trace the production
    of different gas species including hydrogen, water, carbon dioxide, and carbon monoxide. We also aim to study how exoplanet
    interior structure and material properties, like oxygen fugacity, influence the atmospheres of these planets. These outgassing
    models can help us understand the evolution of the atmospheric composition and its effect on planetary climate. We present
    the results from our models, which include the atmospheric abundances as well as the surface and mantle temperatures of
    exoplanets TRAPPIST-1 d, e and f.
