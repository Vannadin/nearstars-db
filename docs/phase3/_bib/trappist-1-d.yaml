- &id305
  arxiv_id: '1605.08810'
  ads_bibcode: 2016AJ....152..203L
  title: No Thermal Inversion and a Solar Water Abundance for the Hot Jupiter HD 209458b from HST/WFC3 Spectroscopy
  authors:
  - Line, Michael R.
  - Stevenson, Kevin B.
  - Bean, Jacob
  - Desert, Jean-Michel
  - Fortney, Jonathan J.
  - Kreidberg, Laura
  - Madhusudhan, Nikku
  - Showman, Adam P.
