  arxiv_id: '2005.08880'
  ads_bibcode: 2020ApJ...895L..47O
  title: Super-Rayleigh Slopes in Transmission Spectra of Exoplanets Generated by Photochemical Haze
  authors:
  - Ohno, Kazumasa
  - Kawashima, Yui
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/2041-8213/ab93d7
  abstract: Spectral slopes in optical transmission spectra of exoplanetary atmospheres encapsulate information on the properties
    of exotic clouds. The slope is usually attributed to the Rayleigh scattering caused by tiny aerosol particles, whereas
    recent retrieval studies have suggested that the slopes are often steeper than the canonical Rayleigh slopes. Here, we
    propose that photochemical haze formed in vigorously mixing atmospheres can explain such super-Rayleigh slopes. We first
    analytically show that the spectral slope can be steepened by the vertical opacity gradient in which atmospheric opacity
    increases with altitude. Using a microphysical model, we demonstrate that such an opacity gradient can be naturally generated
    by photochemical haze, especially when the eddy mixing is substantially efficient. The transmission spectra of hazy atmospheres
    can be demarcated into four typical regimes in terms of the haze mass flux and eddy diffusion coefficient. We find that
    the transmission spectrum can have a spectral slope 2-4 times steeper than the Rayleigh slope if the eddy diffusion coefficient
    is sufficiently high and the haze mass flux falls into a moderate value. Based on the eddy diffusion coefficient suggested
    by a recent study of atmospheric circulations, we suggest that photochemical haze preferentially generates super-Rayleigh
    slopes at planets with equilibrium temperatures of 1000-1500 K, which might be consistent with results of recent retrieval
    studies. Our results would help interpret the observations of spectral slopes from the perspective of haze formation.
