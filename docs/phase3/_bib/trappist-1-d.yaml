  arxiv_id: '1705.10362'
  ads_bibcode: 2017ApJ...845....5K
  title: Habitable Moist Atmospheres on Terrestrial Planets near the Inner Edge of the Habitable Zone around M Dwarfs
  authors:
  - Kopparapu, Ravi kumar
  - Wolf, Eric T.
  - Arney, Giada
  - Batalha, Natasha E.
  - Haqq-Misra, Jacob
  - Grimm, Simon L.
  - Heng, Kevin
  year: '2017'
  pubdate: '2017-08-00'
  doi: 10.3847/1538-4357/aa7cf9
  abstract: Terrestrial planets in the habitable zones (HZs) of low-mass stars and cool dwarfs have received significant scrutiny
    recently. Transit spectroscopy of such planets with the James Webb Space Telescope (JWST) represents our best shot at
    obtaining the spectrum of a habitable planet within the next decade. As these planets are likely tidally locked, improved
    3D numerical simulations of such planetary atmospheres are needed to guide target selection. Here we use a 3D climate
    system model, updated with new water-vapor absorption coefficients derived from the HITRAN 2012 database, to study ocean-covered
    planets at the inner edge of the HZ around late M to mid-K stars (2600 {{K}}≤slant {T}<SUB>{eff</SUB>}≤slant 4500 {{K}}).
    Our results indicate that these updated water-vapor coefficients result in significant warming compared to previous studies,
    so the inner HZ around M dwarfs is not as close as suggested by earlier work. Assuming synchronously rotating Earth-sized
    and Earth-mass planets with background 1 bar {{{N}}}<SUB>2</SUB> atmospheres, we find that planets at the inner HZ of
    stars with {T}<SUB>{eff</SUB>}&gt; 3000 {{K}} undergo the classical “moist greenhouse” ({{{H}}}<SUB>2</SUB>{{O}} mixing
    ratio &gt; {10}<SUP>-3</SUP> in the stratosphere) at significantly lower surface temperature (∼280 K) in our 3D model
    compared with 1D climate models (∼340 K). This implies that some planets around low-mass stars can simultaneously undergo
    water loss and remain habitable. However, for stars with {T}<SUB>{eff</SUB>}≤slant 3000 {{K}}, planets at the inner HZ
    may directly transition to a runaway state, while bypassing the moist greenhouse water loss entirely. We analyze transmission
    spectra of planets in a moist greenhouse regime and find that there are several prominent {{{H}}}<SUB>2</SUB>{{O}} features,
    including a broad feature between 5 and 8 μm, within JWST MIRI instrument range. Thus, relying only on standard Earth-analog
    spectra with 24 hr rotation period around M dwarfs for habitability studies will miss the strong {{{H}}}<SUB>2</SUB>{{O}}
    features that one would expect to see on synchronously rotating planets around M dwarf stars, with JWST.
