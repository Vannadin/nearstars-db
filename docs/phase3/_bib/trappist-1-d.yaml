- &id020
  arxiv_id: '1707.06927'
  ads_bibcode: 2018A&A...612A..86T
  title: Modeling climate diversity, tidal dynamics and the fate of volatiles on TRAPPIST-1 planets
  authors:
  - Turbet, Martin
  - Bolmont, Emeline
  - Leconte, Jeremy
  - Forget, François
  - Selsis, Franck
  - Tobie, Gabriel
  - Caldas, Anthony
  - Naar, Joseph
  - Gillon, Michaël
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.1051/0004-6361/201731620
  abstract: TRAPPIST-1 planets are invaluable for the study of comparative planetary science outside our solar system and
    possibly habitability. Both transit timing variations (TTV) of the planets and the compact, resonant architecture of the
    system suggest that TRAPPIST-1 planets could be endowed with various volatiles today. First, we derived from N-body simulations
    possible planetary evolution scenarios, and show that all the planets are likely in synchronous rotation. We then used
    a versatile 3D global climate model (GCM) to explore the possible climates of cool planets around cool stars, with a focus
    on the TRAPPIST-1 system. We investigated the conditions required for cool planets to prevent possible volatile species
    to be lost permanently by surface condensation, irreversible burying or photochemical destruction. We also explored the
    resilience of the same volatiles (when in condensed phase) to a runaway greenhouse process. We find that background atmospheres
    made of N<SUB>2</SUB>, CO, or O<SUB>2</SUB> are rather resistant to atmospheric collapse. However, even if TRAPPIST-1
    planets were able to sustain a thick background atmosphere by surviving early X/EUV radiation and stellar wind atmospheric
    erosion, it is difficult for them to accumulate significant greenhouse gases like CO<SUB>2</SUB>, CH<SUB>4</SUB>, or NH<SUB>3</SUB>.
    CO<SUB>2</SUB> can easily condense on the permanent nightside, forming CO<SUB>2</SUB> ice glaciers that would flow toward
    the substellar region. A complete CO<SUB>2</SUB> ice surface cover is theoretically possible on TRAPPIST-1g and h only,
    but CO<SUB>2</SUB> ices should be gravitationally unstable and get buried beneath the water ice shell in geologically
    short timescales. Given TRAPPIST-1 planets large EUV irradiation (at least 10<SUP>3</SUP> × Titan's flux), CH<SUB>4</SUB>
    and NH<SUB>3</SUB> are photodissociated rapidly and are thus hard to accumulate in the atmosphere. Photochemical hazes
    could then sedimentate and form a surface layer of tholins that would progressively thicken over the age of the TRAPPIST-1
    system. Regarding habitability, we confirm that few bars of CO<SUB>2</SUB> would suffice to warm the surface of TRAPPIST-1f
    and g above the melting point of water. We also show that TRAPPIST-1e is a remarkable candidate for surface habitability.
    If the planet is today synchronous and abundant in water, then it should very likely sustain surface liquid water at least
    in the substellar region, whatever the atmosphere considered.
  source: citation_of=2018AJ....156..252M
