- &id129
  arxiv_id: '2111.14144'
  ads_bibcode: 2022A&A...658A.180H
  title: The atmospheres of rocky exoplanets. II. Influence of surface composition on the diversity of cloud condensates
  authors:
  - Herbort, O.
  - Woitke, P.
  - Helling, Ch.
  - Zerkle, A. L.
  year: '2022'
  pubdate: '2022-02-00'
  doi: 10.1051/0004-6361/202141636
  abstract: Clouds are an integral part of planetary atmospheres, with most planets hosting clouds. Understanding not only
    the formation, but also the composition of clouds, is crucial to understand future observations. As observations of the
    planet's surface will remain very difficult, it is essential to link the observable high atmosphere gas and cloud composition
    to the surface conditions. We present a fast and simple chemical equilibrium model for the troposphere of rocky exoplanets,
    which is in chemical and phase equilibrium with the crust. The hydrostatic equilibrium atmosphere is built from bottom
    to top. In each atmospheric layer, chemical equilibrium is solved and all thermally stable condensates are removed, depleting
    the atmosphere above in the effected elements. These removed condensates build an upper limit for cloud formation and
    can be separated into high and low temperature condensates. The most important cloud condensates for 1000 K ≳ T<SUB>gas</SUB>
    ≳ 400 K are KCl[s], NaCl[s], FeS[s], FeS<SUB>2</SUB>[s], FeO[s], Fe<SUB>2</SUB>O<SUB>3</SUB>[s], and Fe<SUB>3</SUB>O<SUB>4</SUB>[s].
    For T<SUB>gas</SUB> ≲ 400 K H<SUB>2</SUB>O[l,s], C[s], NH<SUB>3</SUB>[s], NH<SUB>4</SUB>Cl[s], and NH<SUB>4</SUB>SH[s]
    are thermally stable, while for even lower temperatures of T<SUB>gas</SUB> ≲ 150 K CO<SUB>2</SUB>[s], CH<SUB>4</SUB>[s],
    NH<SUB>3</SUB>[s], and H<SUB>2</SUB>S[s] become stable. The inclusion of clouds with trace abundances results in the thermal
    stability of a total of 72 condensates for atmospheres with different surface conditions (300 K ≤ T<SUB>surf</SUB> ≤ 1000
    K and p<SUB>surf</SUB> = 1 bar, 100 bar). The different cloud condensates are not independent of each other, but follow
    sequences of condensation, which are robust against changes in crust composition, surface pressure, and surface temperature.
    Independent of the existence of water as a crust condensate, H<SUB>2</SUB>O[l,s] is a thermally stable cloud condensate
    for all investigated elemental abundances. However, the water cloud base depends on the hydration level of the crust.
    Therefore, the detection of water condensates alone does not necessarily imply stable water on the surface, even if the
    temperature could allow for water condensation.
  source: citation_of=2025ApJ...989..181P
