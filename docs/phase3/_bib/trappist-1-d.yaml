  abstract: The detection of O<SUP>+</SUP> precipitating into Titan's atmosphere by the Cassini Plasma Spectrometer (CAPS)
    represents the discovery of a previously unknown source of oxygen in Titan's atmosphere. The photochemical model presented
    here shows that those oxygen ions are incorporated into CO and CO<SUB>2</SUB>. We show that the observed abundances of
    CO, CO<SUB>2</SUB> and H<SUB>2</SUB>O can be simultaneously reproduced using an oxygen flux consistent with the CAPS observations
    and an OH flux consistent with predicted production from micrometeorite ablation. It is therefore unnecessary to assume
    that the observed CO abundance is the remnant of a larger primordial CO abundance or to invoke outgassing of CO from Titan's
    interior as a source of CO.
