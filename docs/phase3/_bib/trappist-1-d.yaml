  arxiv_id: '1308.2106'
  ads_bibcode: 2013MNRAS.435.3481W
  title: 'HST hot Jupiter transmission spectral survey: detection of water in HAT-P-1b from WFC3 near-IR spatial scan observations'
  authors:
  - Wakeford, H. R.
  - Sing, D. K.
  - Deming, D.
  - Gibson, N. P.
  - Fortney, J. J.
  - Burrows, A. S.
  - Ballester, G.
  - Nikolov, N.
  - Aigrain, S.
  - Henry, G.
