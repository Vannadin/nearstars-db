  arxiv_id: '2010.03564'
  ads_bibcode: 2020AJ....160..231S
  title: JWST Noise Floor. I. Random Error Sources in JWST NIRCam Time Series
  authors:
  - Schlawin, Everett
  - Leisenring, Jarron
  - Misselt, Karl
  - Greene, Thomas P.
  - McElwain, Michael W.
  - Beatty, Thomas
  - Rieke, Marcia
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.3847/1538-3881/abb811
  abstract: 'James Webb Space Telescope (JWST) transmission and emission spectra will provide invaluable glimpses of transiting
    exoplanet atmospheres, including possible biosignatures. This promising science from JWST, however, will require exquisite
    precision and understanding of systematic errors that can impact the time series of planets crossing in front of and behind
    their host stars. Here, we provide estimates of the random noise sources affecting JWST Near-Infrared Camera (NIRCam)
    time-series data on the integration-to-integration level. We find that 1/f noise can limit the precision of grism time
    series for two groups (230-1000 ppm depending on the extraction method and extraction parameters), but will average down
    like the square root of N frames/reads. The current NIRCam grism time-series mode is especially affected by 1/f noise
    because its GRISMR dispersion direction is parallel to the detector fast-read direction, but could be alleviated in the
    GRISMC direction. Care should be taken to include as many frames as possible per visit to reduce this 1/f noise source:
    thus, we recommend the smallest detector subarray sizes one can tolerate, four output channels, and readout modes that
    minimize the number of skipped frames (RAPID or BRIGHT2). We also describe a covariance-weighting scheme that can significantly
    lower the contributions from 1/f noise as compared to sum extraction. We evaluate the noise introduced by pre-amplifier
    offsets, random telegraph noise, and high dark current resistor capacitor (RC) pixels and find that these are correctable
    below 10 ppm once background subtraction and pixel masking are performed. We explore systematic error sources in a companion
    paper.'
