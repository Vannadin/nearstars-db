- &id104
  arxiv_id: '1606.01103'
  ads_bibcode: 2016Natur.537...69D
  title: A combined transmission spectrum of the Earth-sized exoplanets TRAPPIST-1 b and c
  authors:
  - de Wit, Julien
  - Wakeford, Hannah R.
  - Gillon, Michaël
  - Lewis, Nikole K.
  - Valenti, Jeff A.
  - Demory, Brice-Olivier
  - Burgasser, Adam J.
  - Burdanov, Artem
  - Delrez, Laetitia
  - Jehin, Emmanuël
  - Lederer, Susan M.
  - Queloz, Didier
  - Triaud, Amaury H. M. J.
  - Van Grootel, Valérie
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.1038/nature18641
  abstract: Three Earth-sized exoplanets were recently discovered close to the habitable zone of the nearby ultracool dwarf
    star TRAPPIST-1 (ref. 3). The nature of these planets has yet to be determined, as their masses remain unmeasured and
    no observational constraint is available for the planetary population surrounding ultracool dwarfs, of which the TRAPPIST-1
    planets are the first transiting example. Theoretical predictions span the entire atmospheric range, from depleted to
    extended hydrogen-dominated atmospheres. Here we report observations of the combined transmission spectrum of the two
    inner planets during their simultaneous transits on 4 May 2016. The lack of features in the combined spectrum rules out
    cloud-free hydrogen-dominated atmospheres for each planet at ≥10σ levels; TRAPPIST-1 b and c are therefore unlikely to
    have an extended gas envelope as they occupy a region of parameter space in which high-altitude cloud/haze formation is
    not expected to be significant for hydrogen-dominated atmospheres. Many denser atmospheres remain consistent with the
    featureless transmission spectrum—from a cloud-free water-vapour atmosphere to a Venus-like one.
