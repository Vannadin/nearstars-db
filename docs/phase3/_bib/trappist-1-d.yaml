- &id352
  arxiv_id: '1401.0022'
  ads_bibcode: 2014Natur.505...69K
  title: Clouds in the atmosphere of the super-Earth exoplanet GJ1214b
  authors:
  - Kreidberg, Laura
  - Bean, Jacob L.
  - Désert, Jean-Michel
  - Benneke, Björn
  - Deming, Drake
  - Stevenson, Kevin B.
  - Seager, Sara
  - Berta-Thompson, Zachory
  - Seifahrt, Andreas
