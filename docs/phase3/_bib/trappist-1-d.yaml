  arxiv_id: '2112.02054'
  ads_bibcode: 2022A&A...664A..23K
  title: Large Interferometer For Exoplanets (LIFE). III. Spectral resolution, wavelength range, and sensitivity requirements
    based on atmospheric retrieval analyses of an exo-Earth
  authors:
  - Konrad, B. S.
  - Alei, E.
  - Quanz, S. P.
  - Angerhausen, D.
  - Carrión-González, Ó.
  - Fortney, J. J.
  - Grenfell, J. L.
  - Kitzmann, D.
  - Mollière, P.
  - Rugheimer, S.
  - Wunderlich, F.
  - LIFE Collaboration
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.1051/0004-6361/202141964
  abstract: 'Context. Temperate terrestrial exoplanets are likely to be common objects, but their discovery and characterization
    is very challenging because of the small intrinsic signal compared to that of their host star. Various concepts for optimized
    space missions to overcome these challenges are currently being studied. The Large Interferometer For Exoplanets (LIFE)
    initiative focuses on the development of a spacebased mid-infrared (MIR) nulling interferometer probing the thermal emission
    of a large sample of exoplanets. <BR /> Aims: This study derives the minimum requirements for the signal-to-noise ratio
    (S/N), the spectral resolution (R), and the wavelength coverage for the LIFE mission concept. Using an Earth-twin exoplanet
    as a reference case, we quantify how well planetary and atmospheric properties can be derived from its MIR thermal emission
    spectrum as a function of the wavelength range, S/N, and R. <BR /> Methods: We combined a cloud-free 1D atmospheric radiative
    transfer model, a noise model for observations with the LIFE interferometer, and the nested sampling algorithm for Bayesian
    parameter inference to retrieve planetary and atmospheric properties. We simulated observations of an Earth-twin exoplanet
    orbiting a G2V star at 10 pc from the Sun with different levels of exozodiacal dust emissions. We investigated a grid
    of wavelength ranges (3-20 μm, 4-18.5 μm, and 6-17 μm), S/Ns (5, 10, 15, and 20 determined at a wavelength of 11.2 μm),
    and Rs (20, 35, 50, and 100). <BR /> Results: We find that H<SUB>2</SUB>O, CO<SUB>2</SUB>, and O<SUB>3</SUB> are detectable
    if S/N ≥ 10 (uncertainty ≤ ± 1.0 dex). We find upper limits for N<SUB>2</SUB>O (abundance ≲10<SUP>‒3</SUP>). In conrtrast,
    CO, N<SUB>2</SUB>, and O<SUB>2</SUB> are unconstrained. The lower limits for a CH<SUB>4</SUB> detection are R = 50 and
    S/N = 10. Our retrieval framework correctly determines the exoplanet''s radius (uncertainty ≤ ± 10%), surface temperature
    (uncertainty ≤ ± 20 K), and surface pressure (uncertainty ≤ ± 0.5 dex) in all cloud-free retrieval analyses. Based on
    our current assumptions, the observation time required to reach the specified S/N for an Earth-twin at 10 pc when conservatively
    assuming a total instrument throughput of 5% amounts to ≈6‒7 weeks with four 2m apertures. <BR /> Conclusions: We provide
    first order estimates for the minimum technical requirements for LIFE via the retrieval study of an Earth-twin exoplanet.
    We conclude that a minimum wavelength coverage of 4-18.5 μm, an R of 50, and an S/N of at least 10 is required. With the
    current assumptions, the atmospheric characterization of several Earth-like exoplanets at a distance of 10 pc and within
    a reasonable amount of observing time will require apertures ≥ 2m.'
