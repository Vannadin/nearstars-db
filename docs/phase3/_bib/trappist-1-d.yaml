- &id328
  arxiv_id: null
  ads_bibcode: 2022Sci...377.1156T
  title: Three types of planets orbit red dwarfs
  authors:
  - Teske, Johanna
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.1126/science.add7175
  abstract: 'Small planets orbiting faint red stars less than half the size of the Sun are numerous and could be the best
    places to search for signatures of life (1). However, the detailed compositions of these planets—and the implications
    for how they formed and evolved—have been difficult to study because of how far away they are from Earth and because of
    the red light that their stars emit. On page 1211 of this issue, Luque and Pallé (2) present refined compositions of small
    planets orbiting around red dwarf stars. They find evidence that the planets fall into three main types: rocky, watery
    (including icy), and gassy. This result differs from most previous studies of small planets that have suggested only rocky
    and gassy types (3, 4). Although the presence of watery small exoplanets is particularly enticing, all three types of
    planets around red dwarfs could present potentially habitable conditions for life.'
