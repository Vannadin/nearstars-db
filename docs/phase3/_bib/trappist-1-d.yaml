  arxiv_id: '2310.14950'
  ads_bibcode: 2024MNRAS.528.3354F
  title: 'Near-infrared transmission spectroscopy of HAT-P-18 b with NIRISS: Disentangling planetary and stellar features
    in the era of JWST'
  authors:
  - Fournier-Tondreau, Marylou
  - MacDonald, Ryan J.
  - Radica, Michael
  - Lafrenière, David
  - Welbanks, Luis
  - Piaulet, Caroline
  - Coulombe, Louis-Philippe
  - Allart, Romain
  - Morel, Kim
  - Artigau, Étienne
  - Albert, Loïc
  - Lim, Olivia
  - Doyon, René
  - Benneke, Björn
  - Rowe, Jason F.
  - Darveau-Bernier, Antoine
  - Cowan, Nicolas B.
  - Lewis, Nikole K.
  - Cook, Neil J.
  - Flagg, Laura
  - Genest, Frédéric
  - Pelletier, Stefan
  - Johnstone, Doug
  - Dang, Lisa
  - Kaltenegger, Lisa
