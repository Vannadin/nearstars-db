  doi: 10.3847/1538-3881/aa674a
  abstract: We report the discovery of HAT-P-67b, which is a hot-Saturn transiting a rapidly rotating F-subgiant. HAT-P-67b
    has a radius of {R}<SUB>{{p</SUB>}}={2.085}<SUB>-0.071</SUB><SUP>+0.096</SUP> {R}<SUB>{{J</SUB>}}, and orbites a {M}<SUB>*
    </SUB>={1.642}<SUB>-0.072</SUB><SUP>+0.155</SUP> {M}<SUB>☉ </SUB>, {R}<SUB>* </SUB>={2.546}<SUB>-0.084</SUB><SUP>+0.099</SUP>
    {R}<SUB>☉ </SUB> host star in a ∼4.81 day period orbit. We place an upper limit on the mass of the planet via radial velocity
    measurements to be {M}<SUB>{{p</SUB>}}&lt; 0.59 {M}<SUB>{{J</SUB>}}, and a lower limit of &gt; 0.056 {M}<SUB>{{J</SUB>}}
    by limitations on Roche lobe overflow. Despite being a subgiant, the host star still exhibits relatively rapid rotation,
    with a projected rotational velocity of v\sin {I}<SUB>\star </SUB>=35.8+/- 1.1 {km} {{{s}}}<SUP>-1</SUP>, which makes
    it difficult to precisely determine the mass of the planet using radial velocities. We validated HAT-P-67b via two Doppler
    tomographic detections of the planetary transit, which eliminate potential eclipsing binary blend scenarios. The Doppler
    tomographic observations also confirm that HAT-P-67b has an orbit that is aligned to within 12°, in projection, with the
    spin of its host star. HAT-P-67b receives strong UV irradiation and is among one of the lowest density planets known,
    which makes it a good candidate for future UV transit observations in the search for an extended hydrogen exosphere. <P
    />Based on observations obtained with the Hungarian-made Automated Telescope Network. Based in part on observations made
    with the Keck-I telescope at Mauna Kea Observatory, HI (Keck time awarded through NASA programs N029Hr, N108Hr, N154Hr,
    and N130Hr; and NOAO programs A289Hr and A284Hr). Based in part on observations obtained with the Tillinghast Reflector
    1.5 m telescope and the 1.2 m telescope, both of which are operated by the Smithsonian Astrophysical Observatory at the
    Fred Lawrence Whipple Observatory in Arizona. This work makes use of the Smithsonian Institution High Performance Cluster
    (SI/HPC). Based in part on observations made with the Nordic Optical Telescope, operated on the island of La Palma jointly
    by Denmark, Finland, Iceland, Norway, and Sweden, in the Spanish Observatorio del Roque de los Muchachos of the Instituto
    de Astrofísica de Canarias.
