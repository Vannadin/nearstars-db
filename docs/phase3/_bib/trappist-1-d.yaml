  doi: 10.1117/12.2529428
  abstract: We describe a novel space observatory concept that is enabled by very large (8.5m-diameter), ultralight-weight
    multi-order diffractive lenses that can be cost-effectively replicated. The observatory utilizes an array of identical
    telescopes with a total combined light collecting area equivalent to that of a 50m-diameter telescope. Here we review
    the capabilities of a Nautilus unit telescope, the observatory concept, and the technology readiness of the key components.
    The Nautilus Observatory is capable of surveying a thousand transiting exo-earth candidates to 300 pc for biosignatures,
    enabling a rigorous statistical exploration of potentially life-bearing planets and the diversity of exo-earths.
