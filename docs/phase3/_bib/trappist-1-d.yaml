  doi: 10.3847/1538-4365/ac4414
  abstract: This paper documents the seventeenth data release (DR17) from the Sloan Digital Sky Surveys; the fifth and final
    release from the fourth phase (SDSS-IV). DR17 contains the complete release of the Mapping Nearby Galaxies at Apache Point
    Observatory (MaNGA) survey, which reached its goal of surveying over 10,000 nearby galaxies. The complete release of the
    MaNGA Stellar Library accompanies this data, providing observations of almost 30,000 stars through the MaNGA instrument
    during bright time. DR17 also contains the complete release of the Apache Point Observatory Galactic Evolution Experiment
    2 survey that publicly releases infrared spectra of over 650,000 stars. The main sample from the Extended Baryon Oscillation
    Spectroscopic Survey (eBOSS), as well as the subsurvey Time Domain Spectroscopic Survey data were fully released in DR16.
    New single-fiber optical spectroscopy released in DR17 is from the SPectroscipic IDentification of ERosita Survey subsurvey
    and the eBOSS-RM program. Along with the primary data sets, DR17 includes 25 new or updated value-added catalogs. This
    paper concludes the release of SDSS-IV survey data. SDSS continues into its fifth phase with observations already underway
    for the Milky Way Mapper, Local Volume Mapper, and Black Hole Mapper surveys.
