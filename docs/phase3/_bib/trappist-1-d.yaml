  arxiv_id: '2204.08540'
  ads_bibcode: 2022SSRv..218...56G
  title: 'The Long-Term Evolution of the Atmosphere of Venus: Processes and Feedback Mechanisms'
  authors:
  - Gillmann, Cedric
  - Way, M. J.
  - Avice, Guillaume
  - Breuer, Doris
  - Golabek, Gregor J.
  - Höning, Dennis
  - Krissansen-Totton, Joshua
  - Lammer, Helmut
  - O'Rourke, Joseph G.
