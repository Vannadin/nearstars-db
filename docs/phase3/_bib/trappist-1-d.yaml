- &id316
  arxiv_id: '1401.0948'
  ads_bibcode: 2014ApJ...784...63H
  title: Photochemistry in Terrestrial Exoplanet Atmospheres. III. Photochemistry and Thermochemistry in Thick Atmospheres
    on Super Earths and Mini Neptunes
  authors:
  - Hu, Renyu
  - Seager, Sara
  year: '2014'
  pubdate: '2014-03-00'
  doi: 10.1088/0004-637X/784/1/63
  abstract: Some super Earths and mini Neptunes will likely have thick atmospheres that are not H<SUB>2</SUB>-dominated. We
    have developed a photochemistry-thermochemistry kinetic-transport model for exploring the compositions of thick atmospheres
    on super Earths and mini Neptunes, applicable for both H<SUB>2</SUB>-dominated atmospheres and non-H<SUB>2</SUB>-dominated
    atmospheres. Using this model to study thick atmospheres for wide ranges of temperatures and elemental abundances, we
    classify them into hydrogen-rich atmospheres, water-rich atmospheres, oxygen-rich atmospheres, and hydrocarbon-rich atmospheres.
    We find that carbon has to be in the form of CO<SUB>2</SUB> rather than CH<SUB>4</SUB> or CO in a H<SUB>2</SUB>-depleted
    water-dominated thick atmosphere and that the preferred loss of light elements from an oxygen-poor carbon-rich atmosphere
    leads to the formation of unsaturated hydrocarbons (C<SUB>2</SUB>H<SUB>2</SUB> and C<SUB>2</SUB>H<SUB>4</SUB>). We apply
    our self-consistent atmosphere models to compute spectra and diagnostic features for known transiting low-mass exoplanets
    GJ 1214 b, HD 97658 b, and 55 Cnc e. For GJ 1214 b, we find that (1) C<SUB>2</SUB>H<SUB>2</SUB> features at 1.0 and 1.5
    μm in transmission and C<SUB>2</SUB>H<SUB>2</SUB> and C<SUB>2</SUB>H<SUB>4</SUB> features at 9-14 μm in thermal emission
    are diagnostic for hydrocarbon-rich atmospheres; (2) a detection of water-vapor features and a confirmation of the nonexistence
    of methane features would provide sufficient evidence for a water-dominated atmosphere. In general, our simulations show
    that chemical stability has to be taken into account when interpreting the spectrum of a super Earth/mini Neptune. Water-dominated
    atmospheres only exist for carbon to oxygen ratios much lower than the solar ratio, suggesting that this kind of atmospheres
    could be rare.
