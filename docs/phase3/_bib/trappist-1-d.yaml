  arxiv_id: '2008.01856'
  ads_bibcode: 2020MNRAS.498.4680G
  title: A library of self-consistent simulated exoplanet atmospheres
  authors:
  - Goyal, Jayesh M.
  - Mayne, Nathan
  - Drummond, Benjamin
  - Sing, David K.
  - Hébrard, Eric
  - Lewis, Nikole
  - Tremblin, Pascal
