  arxiv_id: '1706.06005'
  ads_bibcode: 2017ApJ...844...19A
  title: 'Comparative Climates of the Trappist-1 Planetary System: Results from a Simple Climate-vegetation Model'
  authors:
  - Alberti, Tommaso
  - Carbone, Vincenzo
  - Lepreti, Fabio
  - Vecchio, Antonio
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-4357/aa78a2
  abstract: 'The recent discovery of the planetary system hosted by the ultracool dwarf star TRAPPIST-1 could open new paths
    for investigations of the planetary climates of Earth-sized exoplanets, their atmospheres, and their possible habitability.
    In this paper, we use a simple climate-vegetation energy-balance model to study the climate of the seven TRAPPIST-1 planets
    and the climate dependence on various factors: the global albedo, the fraction of vegetation that could cover their surfaces,
    and the different greenhouse conditions. The model allows us to investigate whether liquid water could be maintained on
    the planetary surfaces (I.e., by defining a “surface water zone (SWZ)”) in different planetary conditions, with or without
    the presence of a greenhouse effect. It is shown that planet TRAPPIST-1d seems to be the most stable from an Earth-like
    perspective, since it resides in the SWZ for a wide range of reasonable values of the model parameters. Moreover, according
    to the model, outer planets (f, g, and h) cannot host liquid water on their surfaces, even with Earth-like conditions,
    entering a snowball state. Although very simple, the model allows us to extract the main features of the TRAPPIST-1 planetary
    climates.'
