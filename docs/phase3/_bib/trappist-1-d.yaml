- &id087
  arxiv_id: '1909.03233'
  ads_bibcode: 2020MNRAS.493..106I
  title: '2.5D retrieval of atmospheric properties from exoplanet phase curves: application to WASP-43b observations'
  authors:
  - Irwin, Patrick G. J.
  - Parmentier, Vivien
  - Taylor, Jake
  - Barstow, Jo
  - Aigrain, Suzanne
  - Lee, Elspeth K. H.
  - Garland, Ryan
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.1093/mnras/staa238
  abstract: We present a novel retrieval technique that attempts to model phase curve observations of exoplanets more realistically
    and reliably, which we call the 2.5-dimensional (2.5D) approach. In our 2.5D approach we retrieve the vertical temperature
    profile and mean gaseous abundance of a planet at all longitudes and latitudes simultaneously, assuming that the temperature
    or composition, X, at a particular longitude and latitude (Λ, Φ) is given by X(Λ ,Φ) = \bar{X} + (X(Λ ,0) - \bar{X})cos
    ^nΦ, where \bar{X} is the mean of the morning and evening terminator values of X(Λ, 0), and n is an assumed coefficient.
    We compare our new 2.5D scheme with the more traditional 1D approach, which assumes the same temperature profile and gaseous
    abundances at all points on the visible disc of a planet for each individual phase observation, using a set of synthetic
    phase curves generated from a GCM-based simulation. We find that our 2.5D model fits these data more realistically than
    the 1D approach, confining the hotter regions of the planet more closely to the dayside. We then apply both models to
    WASP-43b phase curve observations of HST/WFC3 and Spitzer/IRAC. We find that the dayside of WASP-43b is apparently much
    hotter than the nightside and show that this could be explained by the presence of a thick cloud on the nightside with
    a cloud top at pressure &lt;0.2 bar. We further show that while the mole fraction of water vapour is reasonably well constrained
    to (1-10) × 10<SUP>-4</SUP>, the abundance of CO is very difficult to constrain with these data since it is degenerate
    with temperature and prone to possible systematic radiometric differences between the HST/WFC3 and Spitzer/IRAC observations.
    Hence, it is difficult to reliably constrain C/O.
