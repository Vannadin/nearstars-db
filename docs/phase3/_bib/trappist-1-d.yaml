  ads_bibcode: 2017Sci...356..628W
  title: 'HAT-P-26b: A Neptune-mass exoplanet with a well-constrained heavy element abundance'
  authors:
  - Wakeford, Hannah R.
  - Sing, David K.
  - Kataria, Tiffany
  - Deming, Drake
  - Nikolov, Nikolay
  - Lopez, Eric D.
  - Tremblin, Pascal
  - Amundsen, David S.
