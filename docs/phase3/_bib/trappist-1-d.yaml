- &id156
  arxiv_id: '1403.4602'
  ads_bibcode: 2014ApJ...794..155K
  title: Hubble Space Telescope Near-IR Transmission Spectroscopy of the Super-Earth HD 97658b
  authors:
  - Knutson, Heather A.
  - Dragomir, Diana
  - Kreidberg, Laura
  - Kempton, Eliza M.-R.
  - McCullough, P. R.
  - Fortney, Jonathan J.
  - Bean, Jacob L.
  - Gillon, Michael
  - Homeier, Derek
  - Howard, Andrew W.
  year: '2014'
  pubdate: '2014-10-00'
  doi: 10.1088/0004-637X/794/2/155
  abstract: Recent results from the Kepler mission indicate that super-Earths (planets with masses between 1-10 times that
    of the Earth) are the most common kind of planet around nearby Sun-like stars. These planets have no direct solar system
    analogue, and are currently one of the least well-understood classes of extrasolar planets. Many super-Earths have average
    densities that are consistent with a broad range of bulk compositions, including both water-dominated worlds and rocky
    planets covered by a thick hydrogen and helium atmosphere. Measurements of the transmission spectra of these planets offer
    the opportunity to resolve this degeneracy by directly constraining the scale heights and corresponding mean molecular
    weights of their atmospheres. We present Hubble Space Telescope near-infrared spectroscopy of two transits of the newly
    discovered transiting super-Earth HD 97658b. We use the Wide Field Camera 3's (WFC3) scanning mode to measure the wavelength-dependent
    transit depth in 30 individual bandpasses. Our averaged differential transmission spectrum has a median 1σ uncertainty
    of 23 ppm in individual bins, making this the most precise observation of an exoplanetary transmission spectrum obtained
    with WFC3 to date. Our data are inconsistent with a cloud-free solar metallicity atmosphere at the 10σ level. They are
    consistent at the 0.4σ level with a flat line model, as well as effectively flat models corresponding to a metal-rich
    atmosphere or a solar metallicity atmosphere with a cloud or haze layer located at pressures of 10 mbar or higher.
