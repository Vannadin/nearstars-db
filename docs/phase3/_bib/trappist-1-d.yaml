- &id163
  arxiv_id: '2407.05838'
  ads_bibcode: 2025PSJ.....6..206W
  title: A Novel Metric for Assessing Climatological Surface Habitability
  authors:
  - Woodward, Hannah L.
  - Rushby, Andrew J.
  - Mayne, Nathan J.
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/PSJ/adf3ab
  abstract: Planetary surface habitability has so far been considered, in the main, on a global scale. The increasing number
    of 3D modelling studies of (exo)planetary climate has highlighted the need for a more nuanced understanding of surface
    habitability. Using satellite-derived data of photosynthetic life to represent the observed surface habitability of modern
    Earth, we validate a set of climatologically defined metrics previously used in habitability studies. The comparison finds
    that the metrics defined by surface temperature alone show spatial patterns of habitability distinct to those defined
    by aridity or water availability, with no metric able to completely replicate the observed habitability. We build upon
    these results to introduce a new metric defined by the observed thermal limits of modern Earth-based life, along with
    surface water fluxes as an analog for water and nutrient availability. Furthermore, we pay attention to not only the thermal
    bounds of macroscopic complex life, but additionally the limits of microbial life which have been vital to the generation
    of Earth's biosignatures, thus expanding considerations of climatic habitability out of a historically binary definition.
    Repeating the validation for our metric, along with another that uses a similar definition that incorporates conditions
    for both temperature and water availability, shows a significant improvement in capturing the broad patterns of surface
    habitability, laying the groundwork for more comprehensive assessments of potential life-supporting climates upon other
    planets.
  source: citation_of=2025ApJ...980L...7W
