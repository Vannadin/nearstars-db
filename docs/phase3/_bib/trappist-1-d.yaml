  doi: 10.2138/am-2019-6884
  abstract: 'The geologic carbon cycle plays a fundamental role in controlling Earth''s climate and habitability. For billions
    of years, stabilizing feedbacks inherent in the cycle have maintained a surface environment that could sustain life. Carbonation/decarbonation
    reactions are the primary mechanisms for transferring carbon between the solid Earth and the ocean─atmosphere system.
    These processes can be broadly represented by the reaction: <inline-formula><mml:math><mml:mrow><mml:msub><mml:mrow><mml:mtext>CaSiO</mml:mtext></mml:mrow><mml:mrow><mml:mtext>3</mml:mtext><mml:mtext>
    </mml:mtext><mml:mtext> </mml:mtext><mml:mrow><mml:mo>(</mml:mo><mml:mrow><mml:mtext>wollastonite</mml:mtext></mml:mrow><mml:mo>)</mml:mo></mml:mrow></mml:mrow></mml:msub><mml:mo>+</mml:mo><mml:msub><mml:mrow><mml:mtext>CO</mml:mtext></mml:mrow><mml:mrow><mml:mtext>2</mml:mtext><mml:mtext>
    </mml:mtext><mml:mtext> </mml:mtext><mml:mrow><mml:mo>(</mml:mo><mml:mrow><mml:mtext>gas</mml:mtext></mml:mrow><mml:mo>)</mml:mo></mml:mrow></mml:mrow></mml:msub><mml:mo>↔</mml:mo><mml:msub><mml:mrow><mml:mtext>CaCO</mml:mtext></mml:mrow><mml:mrow><mml:mtext>3</mml:mtext><mml:mtext>
    </mml:mtext><mml:mtext> </mml:mtext><mml:mrow><mml:mo>(</mml:mo><mml:mrow><mml:mtext>calcite</mml:mtext></mml:mrow><mml:mo>)</mml:mo></mml:mrow></mml:mrow></mml:msub><mml:mo>+</mml:mo><mml:msub><mml:mrow><mml:mtext>SiO</mml:mtext></mml:mrow><mml:mrow><mml:mtext>2</mml:mtext><mml:mtext>
    </mml:mtext><mml:mtext> </mml:mtext><mml:mrow><mml:mo>(</mml:mo><mml:mrow><mml:mtext>quartz</mml:mtext></mml:mrow><mml:mo>)</mml:mo></mml:mrow></mml:mrow></mml:msub><mml:mo>.</mml:mo></mml:mrow></mml:math></inline-formula>This
    class of reactions is therefore critical to Earth''s past and future habitability. Here, we summarize their significance
    as part of the Deep Carbon Obsevatory''s "Earth in Five Reactions" project. In the forward direction, carbonation reactions
    like the one above describe silicate weathering and carbonate formation on Earth''s surface. Recent work aims to resolve
    the balance between silicate weathering in terrestrial and marine settings both in the modern Earth system and through
    Earth''s history. Rocks may also undergo carbonation reactions at high temperatures in the ultramafic mantle wedge of
    a subduction zone or during retrograde regional metamorphism. In the reverse direction, the reaction above represents
    various prograde metamorphic decarbonation processes that can occur in continental collisions, rift zones, subduction
    zones, and in aureoles around magmatic systems. We summarize the fluxes and uncertainties of major carbonation/decarbonation
    reactions and review the key feedback mechanisms that are likely to have stabilized atmospheric CO<SUB>2</SUB> levels.
    Future work on planetary habitability and Earth''s past and future climate will rely on an enhanced understanding of the
    long-term carbon cycle.'
