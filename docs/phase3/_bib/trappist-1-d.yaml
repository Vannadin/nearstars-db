  arxiv_id: null
  ads_bibcode: 2018xrp..prop.2118H
  title: Thermal Structure, Chemistry, and Observational Signatures of Cold Exoplanet Atmospheres
  authors:
  - Hu, Renyu
  year: '2018'
  pubdate: '2018-00-00'
  doi: null
  abstract: 'We propose to develop the basic theories and models of the atmospheric thermal structure and composition of cold
    exoplanets, i.e., the exoplanets that have conditions for water to condense in their atmospheres. Kepler, K2, and ground-based
    transit surveys have found ~80 cold exoplanets in transiting orbits. Among these planets, one Jupiter-sized planet and
    8 smaller planets already have HST observations at 1 ─ 2 microns. JWST will be capable of providing a more detailed look
    into the atmospheres of these cold planets, as well as other cold planets soon to be discovered by TESS. To interpret
    the current observations and develop science cases for JWST observations will require a first-principle approach. <P />Building
    upon existing models, we will develop a 1D numerical model to simulate the atmospheres of cold exoplanets that may or
    may not be H2-rich. Such a tool is not currently available. Highlights of our approach include (1) a radiative-convective
    method that allows condensation of a major constituent in the atmosphere, (2) a self-consistent determination of a potential
    ocean-atmosphere interface, in presence of other soluble and insoluble species, (3) a treatment of condensation and dissolution
    of atmospheric NH3/H2SO4 and H2O in the exoplanet context, and (4) coupling between the atmospheric models and a state-of-the-art
    JWST simulation tools. With the models we will (1) determine the possible ocean-atmosphere interface of cold, water-rich
    exoplanets as a function of stellar irradiation, water abundance, and internal heat flux; (2) simulate a range of atmospheric
    transit spectra for the cold giant planet Kepler-16 b, PH2 b (Kepler-86 b), and Kepler-167 e and the cold and small planets
    K2-18 b, K2-3 d, LHS 1140 b, and TRAPPIST-1 d-h and to interpret the current observations; (3) determine the optimal wavelength
    ranges and observation modes with JWST to characterize the cloud pressure, ammonia dissolution in cloud droplets, and
    formation of sulfuric acid clouds on cold exoplanets. <P />This investigation is directly relevant to the Exoplanet Research
    Program because our proposed tasks will address a key objective in the NASA NRA: understand the chemical and physical
    processes of exoplanets. The proposed research will quantify key chemical and cloud-formation products in cold exoplanet
    atmospheres of a wide range of redox states and will establish spectral diagnostics of atmospheric composition for exoplanets
    in which water clouds can exist. Our modeling efforts will significantly facilitate the interpretation of current Hubble
    observations and will provide clear science cases for observations of a few cold exoplanets with JWST. The proposed research
    will also lead to realistic models of the reflected light spectra of small exoplanets at wide orbital separations, essential
    for evaluating future mission options including HabEx and LUVOIR.'
