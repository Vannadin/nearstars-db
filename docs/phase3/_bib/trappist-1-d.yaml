  arxiv_id: '1904.05356'
  ads_bibcode: 2019AJ....157..206W
  title: On Degeneracies in Retrievals of Exoplanetary Transmission Spectra
  authors:
  - Welbanks, Luis
  - Madhusudhan, Nikku
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.3847/1538-3881/ab14de
  abstract: Accurate estimations of atmospheric properties of exoplanets from transmission spectra require the understanding
    of degeneracies between model parameters and observations that can resolve them. We conduct a systematic investigation
    of such degeneracies using a combination of detailed atmospheric retrievals and a range of model assumptions, focusing
    on H<SUB>2</SUB>-rich atmospheres. As a case study, we consider the well-studied hot Jupiter HD 209458 b. We perform extensive
    retrievals with models ranging from simple isothermal and isobaric atmospheres to those with full pressure-temperature
    profiles, inhomogeneous cloud/haze coverage, multiple-molecular species, and data in the optical-infrared wavelengths.
    Our study reveals four key insights. First, we find that a combination of models with minimal assumptions and broadband
    transmission spectra with current facilities allows precise estimates of chemical abundances. In particular, high-precision
    optical and infrared spectra, along with models including variable cloud coverage and prominent opacity sources, with
    Na and K being important in the optical, provide joint constraints on cloud/haze properties and chemical abundances. Second,
    we show that the degeneracy between planetary radius and its reference pressure is well characterized and has little effect
    on abundance estimates, contrary to previous claims using semi-analytic models. Third, collision-induced absorption due
    to H<SUB>2</SUB>-H<SUB>2</SUB> and H<SUB>2</SUB>-He interactions plays a critical role in correctly estimating atmospheric
    abundances. Finally, our results highlight the inadequacy of simplified semi-analytic models with isobaric assumptions
    for reliable retrievals of transmission spectra. Transmission spectra obtained with current facilities such as the Hubble
    Space Telescope and Very Large Telescope can provide strong constraints on atmospheric abundances of exoplanets.
