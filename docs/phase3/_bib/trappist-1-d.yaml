- arxiv_id: null
  ads_bibcode: 2017jwst.prop.1201L
  title: NIRISS Exploration of the Atmospheric diversity of Transiting exoplanets (NEAT)
  authors:
  - Lafreniere, David
  year: '2017'
  pubdate: '2017-07-00'
  doi: null
  abstract: We will use NIRISS SOSS to acquire transit and eclipse observations of a sample of 13 exoplanets that span the
    full available range of equilibrium temperatures (300-3000 K) and masses (1 MEarth-10 MJup) for planets amenable to atmospheric
    characterization. Our observations will measure the abundance of the molecules and aerosols present in the exoplanets’
    atmosphere and determine the vertical temperature structure of the hottest targets. These results will allow us to address
    fundamental issues such as the formation process and formation location of these close-in planets, the presence and characteristics
    of particulate clouds, and non-equilibrium chemistry effects that might be at play in their atmosphere. Six of our targets
    are rocky and for these we intend to place some of the first constraints on the mean molecular weight - and hence bulk
    composition - of their atmospheres. In particular, we will observe multiple transits of the potentially habitable earth-like
    planets TRAPPIST-1 d &amp; f, aiming to make the first detection of the atmosphere of a habitable planet. Finally, for
    two targets, WASP-121b and TOI193.01, we will acquire observations continuously throughout a full orbital period to constrain
    their temperature-pressure profile as a function of longitude and study how heat is absorbed and redistributed in their
    atmosphere.
