- &id182
  arxiv_id: '2006.12821'
  ads_bibcode: 2020A&A...642A..28M
  title: The ARCiS framework for exoplanet atmospheres. Modelling philosophy and retrieval
  authors:
  - Min, Michiel
  - Ormel, Chris W.
  - Chubb, Katy
  - Helling, Christiane
  - Kawashima, Yui
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.1051/0004-6361/201937377
  abstract: '<BR /> Aims: We present ARCiS, a novel code for the analysis of exoplanet transmission and emission spectra.
    The aim of the modelling framework is to provide a tool able to link observations to physical models of exoplanet atmospheres.
    <BR /> Methods: The modelling philosophy chosen in this paper is to use physical and chemical models to constrain certain
    parameters while leaving certain parts of the model, where our physical understanding remains limited, free to vary. This
    approach, in between full physical modelling and full parameterisation, allows us to use the processes we understand well
    and parameterise those less understood. We implemented a Bayesian retrieval framework and applied it to the transit spectra
    of a set of ten hot Jupiters. The code contains chemistry and cloud formation and has the option for self-consistent temperature
    structure computations. <BR /> Results: The code presented is fast and flexible enough to be used for retrieval and for
    target list simulations for JWST or the ESA Ariel missions for example. We present results for the retrieval of elemental
    abundance ratios using the physical retrieval framework and compare this to results obtained using a parameterised retrieval
    setup. <BR /> Conclusions: We conclude that for most of the targets considered, their elemental abundance ratios cannot
    be reliably constrained based on the current dataset. We find no significant correlations between different physical parameters.
    We confirm that planets in our sample with a strong slope in the optical transmission spectrum are those for which we
    find cloud formation to be most active. Finally, we conclude that with ARCiS we have a computationally efficient tool
    to analyse exoplanet observations in the context of physical and chemical models. <P />Numerical implementations of some
    of the modules presented in this paper can be found at <A href="http://www.exoclouds.com">http://www.exoclouds.com</A>.
    <P />All data used and created in this paper are available online at <A href="https://zenodo.org/record/3964430">https://zenodo.org/record/3964430</A>'
