- &id064
  arxiv_id: '2408.15123'
  ads_bibcode: 2024ApJ...975L..22W
  title: No Thick Atmosphere on the Terrestrial Exoplanet Gl 486b
  authors:
  - Weiner Mansfield, Megan
  - Xue, Qiao
  - Zhang, Michael
  - Mahajan, Alexandra S.
  - Ih, Jegug
  - Koll, Daniel
  - Bean, Jacob L.
  - Coy, Brandon Park
  - Eastman, Jason D.
  - Kempton, Eliza M.-R.
  - Kite, Edwin S.
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.3847/2041-8213/ad8161
  abstract: A primary science goal for JWST is to detect and characterize the atmospheres of terrestrial planets orbiting
    M dwarfs (M-Earths). The existence of atmospheres on M-Earths is highly uncertain because their host stars' extended history
    of high X-ray and ultraviolet irradiation may act to completely remove their atmospheres. We present two JWST secondary
    eclipse observations of the M-Earth Gl 486b (also known as GJ 486b) between 5 and 12 μm. We combined these observations
    with a precise analysis of the host star parameters to derive a planetary dayside temperature of T <SUB>p</SUB> = 865
    ± 14 K. We compared this temperature to the maximum expected temperature for a zero albedo, zero heat redistribution bare
    rock and derived a temperature ratio of <inline-formula> <mml:math overflow="scroll"><mml:mi class="MJX-tex-calligraphic"
    mathvariant="script">R</mml:mi><mml:mo>=</mml:mo><mml:mfrac><mml:mrow><mml:msub><mml:mrow><mml:mi>T</mml:mi></mml:mrow><mml:mrow><mml:mi
    mathvariant="normal">p</mml:mi><mml:mo>,</mml:mo><mml:mi mathvariant="normal">dayside</mml:mi></mml:mrow></mml:msub></mml:mrow><mml:mrow><mml:msub><mml:mrow><mml:mi>T</mml:mi></mml:mrow><mml:mrow><mml:mi
    mathvariant="normal">p</mml:mi><mml:mo>,</mml:mo><mml:mi mathvariant="normal">max</mml:mi></mml:mrow></mml:msub></mml:mrow></mml:mfrac><mml:mo>=</mml:mo><mml:mn>0.97</mml:mn><mml:mo>±</mml:mo><mml:mn>0.01</mml:mn></mml:math>
    </inline-formula>. This value is consistent with an airless body with a slight nonzero albedo or a thin atmosphere with
    &lt;1% H<SUB>2</SUB>O or &lt;1 ppm CO<SUB>2</SUB>. However, it is inconsistent with an Earth- or Venus-like atmosphere,
    and the spectrum shows no clear emission or absorption features. Additionally, our observations are inconsistent with
    the water-rich atmospheric scenario allowed by previous transit observations and suggest the transmission spectrum was
    instead shaped by stellar contamination. Given the potential for atmospheric escape throughout the system's ≥6.6 Gyr lifetime,
    we conclude that the observations are likely best explained by an airless planet. This result is the most precise measurement
    yet of terrestrial exoplanet thermal emission with JWST, which places a strong constraint on the position of the "cosmic
    shoreline" between airless bodies and those with atmospheres.
