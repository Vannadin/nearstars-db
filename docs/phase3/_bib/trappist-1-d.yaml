  arxiv_id: '1111.5621'
  ads_bibcode: 2012ApJ...747...35B
  title: The Flat Transmission Spectrum of the Super-Earth GJ1214b from Wide Field Camera 3 on the Hubble Space Telescope
  authors:
  - Berta, Zachory K.
  - Charbonneau, David
  - Désert, Jean-Michel
  - Miller-Ricci Kempton, Eliza
  - McCullough, Peter R.
  - Burke, Christopher J.
  - Fortney, Jonathan J.
  - Irwin, Jonathan
  - Nutzman, Philip
  - Homeier, Derek
  year: '2012'
  pubdate: '2012-03-00'
  doi: 10.1088/0004-637X/747/1/35
  abstract: Capitalizing on the observational advantage offered by its tiny M dwarf host, we present Hubble Space Telescope/Wide
    Field Camera 3 (WFC3) grism measurements of the transmission spectrum of the super-Earth exoplanet GJ1214b. These are
    the first published WFC3 observations of a transiting exoplanet atmosphere. After correcting for a ramp-like instrumental
    systematic, we achieve nearly photon-limited precision in these observations, finding the transmission spectrum of GJ1214b
    to be flat between 1.1 and 1.7 μm. Inconsistent with a cloud-free solar composition atmosphere at 8.2σ, the measured achromatic
    transit depth most likely implies a large mean molecular weight for GJ1214b's outer envelope. A dense atmosphere rules
    out bulk compositions for GJ1214b that explain its large radius by the presence of a very low density gas layer surrounding
    the planet. High-altitude clouds can alternatively explain the flat transmission spectrum, but they would need to be optically
    thick up to 10 mbar or consist of particles with a range of sizes approaching 1 μm in diameter.
