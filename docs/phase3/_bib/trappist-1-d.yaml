  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.3847/1538-3881/ab21d2
  abstract: Previous studies of planet occurrence rates largely relied on photometric stellar characterizations. In this paper,
    we present planet occurrence rates for mid-type M dwarfs using spectroscopy, parallaxes, and photometry to determine stellar
    characteristics. Our spectroscopic observations have allowed us to constrain spectral type, temperatures, and, in some
    cases, metallicities for 337 out of 561 probable mid-type M dwarfs in the primary Kepler field. We use a random forest
    classifier to assign a spectral type to the remaining 224 stars. Combining our data with Gaia parallaxes, we compute precise
    (∼3%) stellar radii and masses, which we use to update planet parameters and occurrence rates for Kepler mid-type M dwarfs.
    Within the Kepler field, there are seven M3 V to M5 V stars that host 13 confirmed planets between 0.5 and 2.5 Earth radii
    and at orbital periods between 0.5 and 10 days. For this population, we compute a planet occurrence rate of {1.19}<SUB>-0.49</SUB><SUP>+0.70</SUP>
    planets per star. For M3 V, M4 V, and M5 V, we compute planet occurrence rates of {0.86}<SUB>-0.68</SUB><SUP>+1.32</SUP>,
    {1.36}<SUB>-1.02</SUB><SUP>+2.30</SUP>, and {3.07}<SUB>-2.49</SUB><SUP>+5.49</SUP> planets per star, respectively.
