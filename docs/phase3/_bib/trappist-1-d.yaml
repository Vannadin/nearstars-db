  ads_bibcode: 2021AREPS..49..253O
  title: Hydration and Dehydration in Earth's Interior
  authors:
  - Ohtani, Eiji
  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.1146/annurev-earth-080320-062509
  abstract: 'Hydrogen and deuterium isotopic evidence indicates that the source of terrestrial water was mostly meteorites,
    with additional influx from nebula gas during accretion. There are two Earth models, with large (7-12 ocean masses) and
    small (1-4 ocean masses) water budgets that can explain the geochemical, cosmochemical, and geological observations. Geophysical
    and mineral physics data indicate that the upper and lower mantles are generally dry, whereas the mantle transition zone
    is wetter, with heterogeneous water distribution. Subducting slabs are a source of water influx, and there are three major
    sites of deep dehydration: the base of the upper mantle, and the top and bottom of the lower mantle in addition to slabs
    in the shallow upper mantle. Hydrated regions surround these dehydration sites. The core may be a hidden reservoir of
    hydrogen under the large water budget model. Earth is a water planet. Where and when was water delivered, and how much?
    How does water circulate in Earth? This review looks at the current answers to these fundamental questions.'
