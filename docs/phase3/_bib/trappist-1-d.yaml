- arxiv_id: null
  ads_bibcode: 2012E&PSL.341...48H
  title: Magma ocean influence on early atmosphere mass and composition
  authors:
  - Hirschmann, Marc M.
  year: '2012'
  pubdate: '2012-08-00'
  doi: 10.1016/j.epsl.2012.06.015
  abstract: Redox conditions in magma oceans (MOs) have a key influence on the mass and composition of Earth's early atmosphere.
    If the shallow part of the MO is oxidized, it may be overlain by an H<SUB>2</SUB>O-CO<SUB>2</SUB> atmosphere, but if the
    near-surface magma is close to equilibrium with Fe-rich alloy, then the atmosphere will consist chiefly of H<SUB>2</SUB>,
    H<SUB>2</SUB>O, and CO, and on cooling will be rich in CH<SUB>4</SUB>. Although MOs are intimately associated with core-forming
    metal, the redox conditions in their shallow parts are not necessarily reducing. The magmatic Fe<SUP>3+</SUP>/Fe<SUP>T</SUP>
    ratio is set by equilibrium with metal at depth and homogenized through the magma column by convection. Indirect evidence
    suggests that the Fe<SUP>3+</SUP>/Fe<SUP>T</SUP> ratio of magmas in equilibrium with alloy at high pressure is greater
    than at low pressure, such that the shallow part of the MO may be comparatively oxidized and coexist with an atmosphere
    consisting chiefly of H<SUB>2</SUB>O and CO<SUB>2</SUB>. The mass of the atmosphere is dictated by the concentrations
    of volatile-species dissolved in the magma, which in turn are determined by partitioning between magma and alloy. Very
    strong partitioning of C into alloy may capture most of the carbon delivered to the growing planet, leaving behind a C-poor
    bulk silicate Earth (BSE) and a C-poor atmosphere. However, modest solubility of CH<SUB>4</SUB> in the magma may allow
    the BSE to retain significant C. Alternatively, if partitioning of C into alloy is extreme but the fraction of metal equilibrated
    with the MO is small, the alloy may become saturated with diamond. Floatation of diamond in the MO may retain a substantial
    inventory of C in the early mantle. BSE C may also have been replenished in a late veneer. Following segregation of metal
    to the core, crystallization of the MO may have prompted precipitation of C-rich phases (graphite, diamond, carbide),
    limiting the C in the early atmosphere and creating a substantial interior C inventory that may account for the large
    fraction of BSE carbon in the mantle today. Such precipitation could have occurred owing to a combination of the redox
    evolution of the crystallizing MO and cooling.
