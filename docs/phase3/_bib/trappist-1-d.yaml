  abstract: The collision-induced fundamental vibration-rotation band at 6.4 μm is the strongest absorption feature from O<SUB>2</SUB>
    in the infrared<SUP>1-3</SUP>, yet it has not been previously incorporated into exoplanet spectral analyses for several
    reasons. Either collision-induced absorptions (CIAs) were not included or incomplete/obsolete CIA databases were used.
    Also, the current version of HITRAN does not include CIAs at 6.4 μm with other collision partners (O<SUB>2</SUB>-X). We
    include O<SUB>2</SUB>-X CIA features in our transmission spectroscopy simulations by parameterizing the 6.4-μm O<SUB>2</SUB>-N<SUB>2</SUB>
    CIA based on ref. <SUP>3</SUP> and the O<SUB>2</SUB>-CO<SUB>2</SUB> CIA based on ref. <SUP>4</SUP>. Here we report that
    the O<SUB>2</SUB>-X CIA may be the most detectable O<SUB>2</SUB> feature for transit observations. For a potential TRAPPIST-1
    e analogue system within 5 pc of the Sun, it could be the only O<SUB>2</SUB> signature detectable with the James Webb
    Space Telescope (JWST) (using MIRI LRS (Mid-Infrared Instrument low-resolution spectrometer)) for a modern Earth-like
    cloudy atmosphere with biological quantities of O<SUB>2</SUB>. Also, we show that the 6.4-μm O<SUB>2</SUB>-X CIA would
    be prominent for O<SUB>2</SUB>-rich desiccated atmospheres<SUP>5</SUP> and could be detectable with JWST in just a few
    transits. For systems beyond 5 pc, this feature could therefore be a powerful discriminator of uninhabited planets with
    non-biological `false-positive' O<SUB>2</SUB> in their atmospheres, as they would only be detectable at these higher O<SUB>2</SUB>
    pressures.
