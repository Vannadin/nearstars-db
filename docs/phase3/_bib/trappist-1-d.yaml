- &id109
  arxiv_id: '1505.06576'
  ads_bibcode: 2015A&A...580A..12L
  title: Modelling the local and global cloud formation on HD 189733b
  authors:
  - Lee, E.
  - Helling, Ch.
  - Dobbs-Dixon, I.
  - Juncher, D.
  year: '2015'
  pubdate: '2015-08-00'
  doi: 10.1051/0004-6361/201525982
  abstract: 'Context. Observations suggest that exoplanets such as HD 189733b form clouds in their atmospheres which have
    a strong feedback onto their thermodynamical and chemical structure, and overall appearance. <BR /> Aims: Inspired by
    mineral cloud modelling efforts for brown dwarf atmospheres, we present the first spatially varying kinetic cloud model
    structures for HD 189733b. <BR /> Methods: We apply a 2-model approach using results from a 3D global radiation-hydrodynamic
    simulation of the atmosphere as input for a detailed, kinetic cloud formation model. Sampling the 3D global atmosphere
    structure with 1D trajectories allows us to model the spatially varying cloud structure on HD 189733b. The resulting cloud
    properties enable the calculation of the scattering and absorption properties of the clouds. <BR /> Results: We present
    local and global cloud structure and property maps for HD 189733b. The calculated cloud properties show variations in
    composition, size and number density of cloud particles which are strongest between the dayside and nightside. Cloud particles
    are mainly composed of a mix of materials with silicates being the main component. Cloud properties, and hence the local
    gas composition, change dramatically where temperature inversions occur locally. The cloud opacity is dominated by absorption
    in the upper atmosphere and scattering at higher pressures in the model. The calculated 8 μm single scattering albedo
    of the cloud particles are consistent with Spitzer bright regions. The cloud particles scattering properties suggest that
    they would sparkle/reflect a midnight blue colour at optical wavelengths.'
