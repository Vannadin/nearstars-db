- &id285
  arxiv_id: '1905.05862'
  ads_bibcode: 2019AJ....158...24L
  title: Optimizing Ground-based Observations of O<SUB>2</SUB> in Earth Analogs
  authors:
  - López-Morales, Mercedes
  - Ben-Ami, Sagi
  - Gonzalez-Abad, Gonzalo
  - García-Mejía, Juliana
  - Dietrich, Jamie
  - Szentgyorgyi, Andrew
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.3847/1538-3881/ab21d7
  abstract: We present the result of calculations to optimize the search for molecular oxygen, O<SUB>2</SUB>, in Earth analogs
    transiting around nearby, low-mass stars using ground-based, high-resolution Doppler shift techniques. We investigate
    a series of parameters, namely spectral resolution, wavelength coverage of the observations, and sky coordinates and systemic
    velocity of the exoplanetary systems, to find the values that optimize detectability of O<SUB>2</SUB>. We find that increasing
    the spectral resolution of observations to R ∼ 300,000-400,000 from the typical R ∼ 100,000 more than doubles the average
    depth of O<SUB>2</SUB> lines in planets with atmospheres similar to Earth’s. Resolutions higher than ∼500,000 do not produce
    significant gains in the depths of the O<SUB>2</SUB> lines. We confirm that observations in the O<SUB>2</SUB> A-band are
    the most efficient except for M9V host stars, for which observations in the O<SUB>2</SUB> near-infrared (NIR) band are
    more efficient. Combining observations in the O<SUB>2</SUB> A, B, and NIR bands can reduce the number of transits needed
    to produce a detection of O<SUB>2</SUB> by about one-third in the case of white noise limited observations. However, that
    advantage disappears in the presence of typical levels of red noise. Therefore, combining observations in more than one
    band produces no significant gain versus observing only in the A band, unless red noise can be significantly reduced.
