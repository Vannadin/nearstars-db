- &id350
  arxiv_id: null
  ads_bibcode: 2017ApJ...843..120S
  title: Redox States of Initial Atmospheres Outgassed on Rocky Planets and Planetesimals
  authors:
  - Schaefer, Laura
  - Fegley, Bruce, Jr.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-4357/aa784f
  abstract: The Earth and other rocky planets and planetesimals in the solar system formed through the mixing of materials
    from various radial locations in the solar nebula. This primordial material likely had a range of oxidation states as
    well as bulk compositions and volatile abundances. We investigate the oxygen fugacity produced by the outgassing of mixtures
    of solid meteoritic material, which approximate the primitive nebular materials. We find that the gas composition and
    oxygen fugacity of binary and ternary mixtures of meteoritic materials vary depending on the proportion of reduced versus
    oxidized material, and also find that mixtures using differentiated materials do not show the same oxygen fugacity trends
    as those using similarly reduced but undifferentiated materials. We also find that simply mixing the gases produced by
    individual meteoritic materials together does not correctly reproduce the gas composition or oxygen fugacity of the binary
    and ternary mixtures. We provide tabulated fits for the oxygen fugacities of all of the individual materials and binary
    mixtures that we investigate. These values may be useful in planetary formation models, models of volatile transport on
    planetesimals or meteorite parent bodies, or models of trace element partitioning during metal-silicate fractionation.
