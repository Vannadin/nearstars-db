  arxiv_id: '1812.06159'
  ads_bibcode: 2019ApJ...871..235P
  title: 'Predicting the Extreme Ultraviolet Radiation Environment of Exoplanets around Low-mass Stars: The TRAPPIST-1 System'
  authors:
  - Peacock, Sarah
  - Barman, Travis
  - Shkolnik, Evgenya L.
  - Hauschildt, Peter H.
  - Baron, E.
  year: '2019'
  pubdate: '2019-02-00'
  doi: 10.3847/1538-4357/aaf891
  abstract: The high energy radiation environment around M dwarf stars strongly impacts the characteristics of close-in exoplanet
    atmospheres, but these wavelengths are difficult to observe due to geocoronal and interstellar contamination. On account
    of these observational restrictions, a stellar atmosphere model may be used to compute the stellar extreme ultraviolet
    (EUV; 100-912 Å) spectrum. We construct semiempirical nonlocal thermodynamic equilibrium model spectra of the ultracool
    M8 star TRAPPIST-1 that span EUV to infrared wavelengths (100 Å-2.5 μm) using the atmosphere code PHOENIX. These upper
    atmosphere models contain prescriptions for the chromosphere and transition region and include newly added partial frequency
    redistribution capabilities. In the absence of broadband UV spectral observations, we constrain our models using Hubble
    Space Telescope Lyman α observations from TRAPPIST-1 and Galaxy Evolution Explorer UV photometric detections from a set
    of old M8 stars (&gt;1 Gyr). We find that calibrating the models using both data sets separately yield similar far-ultraviolet
    and NUV fluxes, and EUV fluxes that range from (1.32-17.4) × 10<SUP>-14</SUP> ergs s<SUP>-1</SUP> cm<SUP>-2</SUP>. The
    results from these models demonstrate that the EUV emission is very sensitive to the temperature structure in the transition
    region. Our lower activity models predict EUV fluxes similar to previously published estimates derived from semiempirical
    scaling relationships, while the highest activity model predicts EUV fluxes a factor of 10 higher. Results from this study
    support the idea that the TRAPPIST-1 habitable zone planets likely do not have much liquid water on their surfaces due
    to the elevated levels of high energy radiation emitted by the host star.
