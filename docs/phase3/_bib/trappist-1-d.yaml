  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.1051/0004-6361/202142828
  abstract: '<BR /> Aims: We present the complete Bayesian statistical analysis of the HArps-n red Dwarf Exoplanet Survey
    (HADES), which monitored the radial velocities of a large sample of M dwarfs with HARPS-N at TNG over the last 6 yr. <BR
    /> Methods: The targets were selected in a narrow range of spectral types from M0 to M3, 0.3 M<SUB>☉</SUB> &lt; M<SUB>★</SUB>
    &lt; 0.71 M<SUB>☉</SUB>, in order to study the planetary population around a well-defined class of host stars. We take
    advantage of Bayesian statistics to derive an accurate estimate of the detectability function of the survey. Our analysis
    also includes the application of a Gaussian Process approach to take into account stellar-activity-induced radial velocity
    variations and improve the detection limits around the most-observed and most-active targets. The Markov chain Monte Carlo
    and Gaussian process technique we apply in this analysis has proven very effective in the study of M-dwarf planetary systems,
    helping the detection of most of the HADES planets. <BR /> Results: From the detectability function we can calculate the
    occurrence rate of small-mass planets around early-M dwarfs, either taking into account only the 11 already published
    HADES planets or adding the five new planetary candidates discovered in this analysis, and compare them with the previous
    estimates of planet occurrence around M-dwarf or solar-type stars: considering only the confirmed planets, we find the
    highest frequency for low-mass planets (1 M<SUB>⊕</SUB> &lt; m<SUB>p</SUB> sin i &lt; 10 M<SUB>⊕</SUB>) with periods 10
    d &lt; P &lt; 100 d, f<SUB>occ</SUB> = 0.85<SUB> - 0.21</SUB><SUP> + 0.46</SUP>, while for short-period planets (1 d &lt;
    P &lt; 10 d) we find a frequency of f<SUB>occ</SUB> = 0.10<SUB> - 0.03</SUB><SUP> + 0.10</SUP>, significantly lower than
    for later-M dwarfs; if instead we also take into account the new candidates, we observe the same general behaviours, but
    with consistently higher frequencies of low-mass planets. We also present new estimates of the occurrence rates of long-period
    giant planets and temperate planets inside the habitable zone of early-M dwarfs: in particular we find that the frequency
    of habitable planets could be as low as η<SUB>⊕</SUB> &lt; 0.23. These results, and their comparison with other surveys
    focused on different stellar types, confirm the central role that stellar mass plays in the formation and evolution of
    planetary systems. <P />All RV and activity data are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/664/A65">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/664/A65</A>'
