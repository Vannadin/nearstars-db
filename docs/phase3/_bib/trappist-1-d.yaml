  arxiv_id: null
  ads_bibcode: 2018ApJ...866...56H
  title: 'Abiotic O<SUB>2</SUB> Levels on Planets around F, G, K, and M Stars: Effects of Lightning-produced Catalysts in
    Eliminating Oxygen False Positives'
  authors:
  - Harman, C. E.
  - Felton, R.
  - Hu, R.
  - Domagal-Goldman, S. D.
  - Segura, A.
  - Tian, F.
