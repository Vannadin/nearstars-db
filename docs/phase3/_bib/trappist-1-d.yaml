- &id270
  arxiv_id: '1912.02787'
  ads_bibcode: 2020A&A...633A..86S
  title: 'Wind of change: retrieving exoplanet atmospheric winds from high-resolution spectroscopy'
  authors:
  - Seidel, J. V.
  - Ehrenreich, D.
  - Pino, L.
  - Bourrier, V.
  - Lavie, B.
  - Allart, R.
  - Wyttenbach, A.
  - Lovis, C.
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.1051/0004-6361/201936892
  abstract: 'Context. The atmosphere of exoplanets has been studied extensively in recent years, making use of numerical models
    to retrieve chemical composition, dynamical circulation, or temperature from the data. One of the best observational probes
    in transmission is the sodium doublet thanks to its extensive cross-section. However, modelling the shape of planetary
    sodium lines has proven to be challenging. Models with different assumptions regarding the atmosphere have been employed
    to fit the lines in the literature, yet statistically-sound, direct comparisons of different models are needed to paint
    a clear picture. <BR /> Aims: We aim to compare different wind and temperature patterns, as well as to provide a tool
    to distinguish them based on their best fit for the sodium transmission spectrum of the hot Jupiter HD 189733b. We parametrise
    different possible wind patterns that have already been tested the in literature and introduce the new option of an upwards-driven
    vertical wind. <BR /> Methods: We construct a forward model where the wind speed, wind geometry, and temperature are injected
    into the calculation of the transmission spectrum. We embed this forward model in a nested sampling retrieval code to
    rank the models via their Bayesian evidence. <BR /> Results: We retrieve a best-fit to the HD 189733b data for vertical
    upward winds |v<SUB>ver</SUB>(mean)| = 40 ± 4 km s<SUP>-1</SUP> at altitudes above 10<SUP>-6</SUP> bar. With the current
    data from HARPS, we cannot distinguish wind patterns for higher-pressure atmospheric layers. <BR /> Conclusions: We show
    that vertical upwards winds in the upper atmosphere provide a possible explanation for the broad sodium signature in hot
    Jupiters. We highlight other influences on the width of the doublet and we explore strong magnetic fields acting on the
    lower atmosphere as one possible origin of the retrieved wind speed.'
