  arxiv_id: '1607.00524'
  ads_bibcode: 2016AJ....152..100L
  title: 'EVEREST: Pixel Level Decorrelation of K2 Light Curves'
  authors:
  - Luger, Rodrigo
  - Agol, Eric
  - Kruse, Ethan
  - Barnes, Rory
  - Becker, Andrew
  - Foreman-Mackey, Daniel
  - Deming, Drake
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.3847/0004-6256/152/4/100
  abstract: We present EPIC Variability Extraction and Removal for Exoplanet Science Targets (EVEREST), an open-source pipeline
    for removing instrumental noise from K2 light curves. EVEREST employs a variant of pixel level decorrelation to remove
    systematics introduced by the spacecraft’s pointing error and a Gaussian process to capture astrophysical variability.
    We apply EVEREST to all K2 targets in campaigns 0-7, yielding light curves with precision comparable to that of the original
    Kepler mission for stars brighter than {K}<SUB>p</SUB>≈ 13, and within a factor of two of the Kepler precision for fainter
    targets. We perform cross-validation and transit injection and recovery tests to validate the pipeline, and compare our
    light curves to the other de-trended light curves available for download at the MAST High Level Science Products archive.
    We find that EVEREST achieves the highest average precision of any of these pipelines for unsaturated K2 stars. The improved
    precision of these light curves will aid in exoplanet detection and characterization, investigations of stellar variability,
    asteroseismology, and other photometric studies. The EVEREST pipeline can also easily be applied to future surveys, such
    as the TESS mission, to correct for instrumental systematics and enable the detection of low signal-to-noise transiting
    exoplanets. The EVEREST light curves and the source code used to generate them are freely available online.
  source: citation_of=2022ApJ...928L...7R
