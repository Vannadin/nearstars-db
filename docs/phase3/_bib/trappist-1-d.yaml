- &id183
  arxiv_id: '2007.06618'
  ads_bibcode: 2020AJ....160..140M
  title: Introducing a New Spitzer Master BLISS Map to Remove the Instrument Systematic Phase-curve-parameter Degeneracy,
    as Demonstrated by a Reanalysis of the 4.5 μm WASP-43b Phase Curve
  authors:
  - May, E. M.
  - Stevenson, K. B.
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.3847/1538-3881/aba833
  abstract: While Spitzer Infrared Array Camera (IRAC) systematics are generally well understood, each data set can provide
    its own challenges that continue to teach us about the underlying functional form of these systematics. Multiple groups
    have analyzed the phase curves of WASP-43b with varying detrending techniques, each obtaining different results. In this
    work, we take another look at WASP-43b while exploring the degenerate relation between Bilinearly Interpolated Subpixel
    Sensitivity (BLISS) mapping, point response function (PRF)-FWHM detrending, and phase curve parameters. We find that there
    is a strong correlation between the detrending parameters in the two models, and best-fit phase curve amplitudes vary
    strongly when the data are temporally binned. To remove this degeneracy, we present a new Gaussian centroided intrapixel
    sensitivity map (hereafter fixed sensitivity map), generated using 3,712,830 exposures spanning 5 yr, for a variety of
    aperture sizes at 4.5 μm. We find evidence for time variability in the sensitivity at 3.6 μm and do not generate a visit-independent
    map for this channel. With the fixed 4.5 μm intrapixel sensitivity map, the best fits for WASP-43b no longer vary strongly
    with bin size and PRF-FWHM detrending is no longer required to remove correlated noise. For data sets that do not fall
    completely within the sweet spot, temporal binning should not be used in the analysis of Spitzer phase curves. We confirm
    nightside emission for WASP-43b with a disk-integrated nightside temperature of 806 ± 48 K at 4.5 μm. The 4.5 μm maps
    are available at github.com/kevin218/POET.
