  arxiv_id: '2005.01587'
  ads_bibcode: 2020ApJ...896..131B
  title: 'Testing Earthlike Atmospheric Evolution on Exo-Earths through Oxygen Absorption: Required Sample Sizes and the Advantage
    of Age-based Target Selection'
  authors:
  - Bixel, Alex
  - Apai, Dániel
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/1538-4357/ab8fad
  abstract: Life has had a dramatic impact on the composition of Earth's atmosphere over time, which suggests that statistical
    studies of other inhabited planets' atmospheres could reveal how they coevolve with life. While many evolutionary pathways
    are possible for inhabited worlds, a possible starting hypothesis is that most of them evolve similarly to Earth, which
    we propose could lead to a positive "age-oxygen correlation" between the ages of inhabited planets and the fraction which
    have oxygen-rich atmospheres. We demonstrate that next-generation space observatories currently under consideration could
    test this hypothesis, but only if the stellar age distribution of the target sample is carefully considered. We explore
    three possible parameterizations of the age-oxygen correlation, finding that they yield similar results. Finally, we examine
    how abiotic oxygen sources could affect the results, and discuss how measuring the age dependence of oxygen could shed
    light on whether it is a reliable biosignature. Future efforts can expand upon this groundwork by incorporating detailed
    models of the redox balance of terrestrial planets and its dependence on stellar and planetary properties.
  source: citation_of=2023AJ....165..267H
