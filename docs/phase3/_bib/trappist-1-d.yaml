  ads_bibcode: 2020AJ....160..280C
  title: An Unusual Transmission Spectrum for the Sub-Saturn KELT-11b Suggestive of a Subsolar Water Abundance
  authors:
  - Colón, Knicole D.
  - Kreidberg, Laura
  - Welbanks, Luis
  - Line, Michael R.
  - Madhusudhan, Nikku
  - Beatty, Thomas
  - Tamburo, Patrick
  - Stevenson, Kevin B.
  - Mandell, Avi
  - Rodriguez, Joseph E.
  - Barclay, Thomas
  - Lopez, Eric D.
  - Stassun, Keivan G.
  - Angerhausen, Daniel
  - Fortney, Jonathan J.
  - James, David J.
  - Pepper, Joshua
  - Ahlers, John P.
  - Plavchan, Peter
  - Awiphan, Supachai
  - Kotnik, Cliff
  - McLeod, Kim K.
  - Murawski, Gabriel
  - Chotani, Heena
  - LeBrun, Danny
  - Matzko, William
  - Rea, David
  - Vidaurri, Monica
  - Webster, Scott
  - Williams, James K.
  - Cox, Leafia Sheraden
  - Tan, Nicole
  - Gilbert, Emily A.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.3847/1538-3881/abc1e9
  abstract: We present an optical-to-infrared transmission spectrum of the inflated sub-Saturn KELT-11b measured with the
    Transiting Exoplanet Survey Satellite (TESS), the Hubble Space Telescope (HST) Wide Field Camera 3 G141 spectroscopic
    grism, and the Spitzer Space Telescope (Spitzer) at 3.6 μm, in addition to a Spitzer 4.5 μm secondary eclipse. The precise
    HST transmission spectrum notably reveals a low-amplitude water feature with an unusual shape. Based on free-retrieval
    analyses with varying molecular abundances, we find strong evidence for water absorption. Depending on model assumptions,
    we also find tentative evidence for other absorbers (HCN, TiO, and AlO). The retrieved water abundance is generally ≲0.1×
    solar (0.001-0.7× solar over a range of model assumptions), several orders of magnitude lower than expected from planet
    formation models based on the solar system metallicity trend. We also consider chemical-equilibrium and self-consistent
    1D radiative-convective equilibrium model fits and find that they, too, prefer low metallicities ([M/H] ≲ -2, consistent
    with the free-retrieval results). However, all of the retrievals should be interpreted with some caution because they
    either require additional absorbers that are far out of chemical equilibrium to explain the shape of the spectrum or are
    simply poor fits to the data. Finally, we find that the Spitzer secondary eclipse is indicative of full heat redistribution
    from KELT-11b's dayside to nightside, assuming a clear dayside. These potentially unusual results for KELT-11b's composition
    are suggestive of new challenges on the horizon for atmosphere and formation models in the face of increasingly precise
    measurements of exoplanet spectra.
