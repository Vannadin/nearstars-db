  ads_bibcode: 2018RSPTA.37670405C
  title: Geological archive of the onset of plate tectonics
  authors:
  - Cawood, Peter A.
  - Hawkesworth, Chris J.
  - Pisarevsky, Sergei A.
  - Dhuime, Bruno
  - Capitanio, Fabio A.
  - Nebel, Oliver
  year: '2018'
  pubdate: '2018-11-00'
  doi: 10.1098/rsta.2017.0405
  abstract: 'Plate tectonics, involving a globally linked system of lateral motion of rigid surface plates, is a characteristic
    feature of our planet, but estimates of how long it has been the modus operandi of lithospheric formation and interactions
    range from the Hadean to the Neoproterozoic. In this paper, we review sedimentary, igneous and metamorphic proxies along
    with palaeomagnetic data to infer both the development of rigid lithospheric plates and their independent relative motion,
    and conclude that significant changes in Earth behaviour occurred in the mid- to late Archaean, between 3.2 Ga and 2.5
    Ga. These data include: sedimentary rock associations inferred to have accumulated in passive continental margin settings,
    marking the onset of sea-floor spreading; the oldest foreland basin deposits associated with lithospheric convergence;
    a change from thin, new continental crust of mafic composition to thicker crust of intermediate composition, increased
    crustal reworking and the emplacement of potassic and peraluminous granites, indicating stabilization of the lithosphere;
    replacement of dome and keel structures in granite-greenstone terranes, which relate to vertical tectonics, by linear
    thrust imbricated belts; the commencement of temporally paired systems of intermediate and high dT/dP gradients, with
    the former interpreted to represent subduction to collisional settings and the latter representing possible hinterland
    back-arc settings or ocean plateau environments. Palaeomagnetic data from the Kaapvaal and Pilbara cratons for the interval
    2780-2710 Ma and from the Superior, Kaapvaal and Kola-Karelia cratons for 2700-2440 Ma suggest significant relative movements.
    We consider these changes in the behaviour and character of the lithosphere to be consistent with a gestational transition
    from a non-plate tectonic mode, arguably with localized subduction, to the onset of sustained plate tectonics. <P />This
    article is part of a discussion meeting issue `Earth dynamics and the development of plate tectonics''.'
