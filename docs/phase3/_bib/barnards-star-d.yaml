  abstract: While the pure elements tend to exhibit type-I rather than type-II superconductivity, nearly all compound superconductors
    are type-II, with only a few known exceptions. We report single-crystal growth and physical characterization of the rhenium
    aluminide Al<SUB>6</SUB>Re , which we conclude is a type-I superconductor based on magnetization, ac susceptibility, and
