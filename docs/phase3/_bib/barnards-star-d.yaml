  abstract: 'We extend a recently developed method (K. Barnard and D. Forsyth, 2001) for learning the semantics of image databases
    using text and pictures. We incorporate statistical natural language processing in order to deal with free text. We demonstrate
    the current system on a difficult dataset, namely 10000 images of work from the Fine Arts Museum of San Francisco. The
    images include line drawings, paintings, and pictures of sculpture and ceramics. Many of the images have associated free
    text which varies greatly from physical description to interpretation and mood. We use WordNet to provide semantic grouping
    information and to help disambiguate word senses, as well as emphasize the hierarchical nature of semantic relationships.
    This allows us to impose a natural structure on the image collection that reflects semantics to a considerable degree.
    Our method produces a joint probability distribution for words and picture elements. We demonstrate that this distribution
    can be used: (a) to provide illustrations for given captions, and (b) to generate words for images outside the training
    set. Results from this annotation process yield a quantitative study of our method. Finally, the annotation process can
    be seen as a form of object recognizer that has been learned through a partially supervised process.'
