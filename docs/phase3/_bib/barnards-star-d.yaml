  title: Applied light-side coupling with optimized spiral-patterned zinc oxide nanorod coatings for multiple optical channel
    alcohol vapor sensing
  authors:
  - Bin Abdul Rahim, Hazli Rafis
  - Bin Lokman, Muhammad Quisar
  - Harun, Sulaiman Wadi
  - Hornyak, Gabor Louis
  - Sterckx, Karel
  - Mohammed, Waleed Soliman
  - Dutta, Joydeep
