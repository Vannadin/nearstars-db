  title: Manipulation of invisible cloaking in <inline-formula id="IEq1"><mml:math display="block"><mml:mrow><mml:mi mathvariant="script">P</mml:mi><mml:mi
    mathvariant="script">T</mml:mi></mml:mrow></mml:math></inline-formula>-symmetric thermoacoustic dimer
  authors:
