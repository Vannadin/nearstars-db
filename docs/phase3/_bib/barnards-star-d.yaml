  year: '2017'
  pubdate: '2017-11-00'
  doi: 10.3938/jkps.71.692
  abstract: In this study, we fabricated and characterized graphene/molecule/graphene (GMG) vertical junctions with aryl alkane
    monolayers. The constituent molecules were chemically self-assembled via electrophilic diazonium reactions into a monolayer
    on the graphene bottom electrode, while the other end physically contacted the graphene top electrode. A full understanding
    of the transport properties of molecular junctions is a key step in the realization of molecular-scale electronic devices
    and requires detailed microscopic characterization of the junction's active region. Using a multiprobe approach combining
    a variety of transport techniques, we elucidated the transport mechanisms and electronic structure of the GMG junctions,
    including temperature- and length-variable transport measurements, and transition voltage spectroscopy. These results
    provide criteria to establish a valid molecular junction and to determine the most probable transport characteristics
    of the GMG junctions.
