  title: Potential of tilapia (Oreochromis niloticus) viscera bioactive peptides as antiviral for SARS-CoV-2 (COVID 19)
  authors:
  - Riyadi, P. H.
  - Tanod, W. A.
  - Wahyudi, D.
  - Susanto, E.
  - Fahmi, A. S.
  - Aisiah, S.
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.1088/1755-1315/584/1/012004
  abstract: 'Pandemic SARS-CoV-2 (COVID-19) is a severe problem in the world today. The SARS-CoV-2 virus contains protease
    and glycoprotein spike, which was used infection and development. The RBD (Receptor Binding Domain) of the glycoprotein
    Spike (RBD-S) can bind to the ACE2 receptor (Angiotensin Converting Enzyme-2) on the Domain protease (PD) (PD-ACE2) of
    the host cell causing virus infection. This study aimed to evaluate the potential of bioactive peptides from tilapia viscera
    hydrolysate as an antiviral peptide to attempt a simulated docking with four protein target virus COVID 19. The research
    was conducted by molecular docking using the PyRx software. Selected protein targets were SARS-CoV-2 protease (GDP ID:
    6LU7), SPIKE COVID 19 (PDB ID: 6LVN), ACE2 (GDP ID: 6VW1), and deubiquitinase inhibitors block the SARS virus replication
    (PDB ID: 3E9S). The formed binding affinity was represented as a docking score. The results showed that both the Asp-Trp
    and Val-Tyr peptides were potential as SARS-CoV-2 antiviral, with an affinity strength equal to chloroquine and favipiravir.
    The Asp-Trp and Val-Tyr peptides could bind to all four receptor proteins target on the active side. Therefore, it potentially
    inhibits the virus sticking to proteins target that results in inhibition of virus replication. Generally, the Asp-Trp
    and Val-Tyr peptides of tilapia viscera hydrolysate are potential as an alternative antiviral peptide to medicate the
    infections and replication of COVID-19.'
