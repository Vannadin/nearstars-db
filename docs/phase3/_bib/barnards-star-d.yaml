  abstract: We propose a solvable model of topological characteristics for a microwave signal transmitting system, which is
    named as a repairable linear m-consecutive-k-out-of-n:F system with l repairers. It is assumed that both the working time
    and repair time of each component are exponentially distributed, and the repair is perfect. The transition rate matrix
    is determined by defining the generalized transition probability. Furthermore, some important reliability indices are
    evaluated. Finally, the proposed approach is illustrated by a numerical example. The results are helpful to guide the
    stability of network nodes and the reliability of microwave signal transmitting systems.
