  abstract: We study a problem with the Maximum Entropy Technique (MENT) when applied to tomographic measurements of the transverse
    phase space of electron beams, and suggest some ways to improve its reliability. We show that the outcome of a phase space
    reconstruction can be highly sensitive to the choice of projection angles. It is quite likely to obtain reconstructed
    distributions of the phase space that are obviously different from the actual distributions. We propose a method to obtain
    a ``good'' choice of projections angles using a normalised phase space. We demonstrate that the resulting reconstructions
    of the phase space can be significantly improved.
