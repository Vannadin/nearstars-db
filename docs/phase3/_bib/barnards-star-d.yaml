  abstract: Accurate values for polarization discontinuities between pyroelectric materials are critical for understanding
    and designing the electronic properties of heterostructures. For wurtzite materials, the zincblende structure has been
    used in the literature as a reference to determine the effective spontaneous polarization constants. We show that, because
    the zincblende structure has a nonzero formal polarization, this method results in a spurious contribution to the spontaneous
