  abstract: In this paper we investigate the next-to-minimal composite Higgs model with a SO (6 ) /SO (5 ) coset, whose pseudo-Nambu-Goldstone
    boson sector includes a Standard Model singlet in addition to the usual Higgs doublet. The fermions are embedded in the
    representation 6 of SO(6). We study the region of parameter space of the model where the radiatively generated potential
    has global minima with both the doublet and the singlet fields developing vacuum expectation values. We investigate the
