  doi: 10.5066/P9K56TBC
  abstract: 'This dataset includes probabilistic outputs for estimating areal coverage of current wetland coverage and potential
    wetland migration under various relative sea-level rise scenarios in Nassau and Duval Counties, which includes the City
    of Jacksonville and the U.S. National Park Service''s Timucuan Ecological and Historic Preserve. These data contain potential
    migration for regularly oceanic-flooded wetlands (that is, flooded by oceanic water daily) and irregularly oceanic-flooded
    wetlands (that is, flooded by oceanic water less frequently than daily). The products in this data release were created
    using an approach that involved digital elevation model error reduction in wetlands (that is, overestimation of elevation
    in wetlands) and the use of uncertainty assumptions regarding contemporary water levels (that is, tides and extreme water
    levels), and future sea levels to produce probabilistic estimates of wetland migration into upslope/adjacent areas. Specifically,
    this data release includes results from analyses of two local sea-level rise scenarios for two-time steps — Intermediate-Low
    and Intermediate-High for 2050 and 2100 from Sweet and others (2022). The data release includes continuous probability
    layers and layers with probability binned into three classes, and the probability bins with overlapping land cover classes.
