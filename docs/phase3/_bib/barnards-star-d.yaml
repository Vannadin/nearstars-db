  abstract: We report the first experimental detection of a zero-frequency fluctuation that is pumped by an Alfvén mode in
    a magnetically confined plasma. Core-localized Alfvén modes of frequency inside the toroidicity-induced gap (and its harmonics)
    exhibit three-wave coupling interactions with a zero-frequency fluctuation. The observation of the zero-frequency fluctuation
    is consistent with theoretical and numerical predictions of zonal modes pumped by Alfvén modes, and is correlated with
    an increase in the deep core ion temperature, temperature gradient, confinement factor <inline-formula><mml:math display="inline"><mml:mrow><mml:msub><mml:mrow><mml:mi>H</mml:mi></mml:mrow><mml:mrow><mml:mn>89</mml:mn><mml:mo>,</mml:mo><mml:mi>P</mml:mi></mml:mrow></mml:msub></mml:mrow></mml:math></inline-formula>,
    and a reduction in the main ion heat diffusivity. Despite the energetic particle transport induced by the Alfvén eigenmodes,
    the generation of a zero-frequency fluctuation that can suppress the turbulence leads to an overall improvement of confinement.
