- arxiv_id: '2301.05524'
  ads_bibcode: 2023PhRvD.108c5048D
  title: Veltman criteria in the beyond standard model effective field theory of a complex scalar triplet
  authors:
  - Das, Jaydeb
  - Kumar, Nilanjana
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1103/PhysRevD.108.035048
  abstract: The Higgs mass is not protected by any symmetry in the Standard Model. Hence, the self-energy corrections to the
    Higgs mass become large due to the quadratic divergence terms. The Veltman condition (V.C.) ensures that the coefficient
    of the quadratic divergent term either vanishes or becomes negligible. The nonobservation of new physics has pushed the
    new physics scale to be larger than 1 TeV, making it impossible to satisfy the Veltman condition in the Standard Model
    without a very large fine-tuning. Many attempts are made to satisfy the V.C. in beyond the Standard Model theories, but
    the V.C. is hard to achieve at a very large scale (Λ ). Alternatively, it is possible that the new physics appears much
    above the electroweak scale, and the effect of the new physics is observed in terms of the Wilson coefficients of the
    Standard Model effective field theory (SMEFT) operators. The V.C. can be addressed in the SMEFT framework. In this paper,
    some specific new physics scenarios are considered at a very large scale. Below that scale, the effect of the new physics
    is observed as beyond the SMEFT. We particularly study the type-II seesaw model with the complex scalar triplet (Y =1
    ) in the context of V.C. We found that this particular model is the minimal model to generate all SMEFT operators that
    appear in V.C. and satisfies V.C. We also examine the model parameter dependence of the Wilson coefficients in detail
    and show how the cancellation of the Wilson coefficients is highly dependent on some specific values of the model parameters.
