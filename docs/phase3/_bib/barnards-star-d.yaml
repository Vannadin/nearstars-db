  abstract: We studied the effect of plasma treatment on the optical, structural and biological properties of Neurospora crassa
    (N. crassa) spores. An atmospheric-pressure plasma jet (APPJ) was used to generate reactive oxygen and nitrogen species
    in aqueous solution. The APPJ treatment of N. crassa spores in water significantly reduced the viability of spores. The
    reduction in the spore viability can be attributed to the reactive species from the plasma itself and those derived from
    the reaction of plasma radicals with aqueous solution. These structural modifications were contingent on the medium in
    which N. crassa spores were suspended; plasma treatment of N. crassa spores in PBS did not significantly affect the viability
    of spores as compared with N. crassa spores in water. Scanning electron microscopy images and circular dichroism spectra
    indicated that the spore cell wall was damaged by plasma treatment. The optical absorption spectrum of untreated N. crassa
    spores exhibited two resonance absorption bands at approximately λ<SUB>1</SUB> ≈ 260 nm and λ<SUB>2</SUB> ≈ 472 nm, originating
    from deoxyribonucleic acid (DNA) and β-carotene. The Raman spectrum of untreated N. crassa spores exhibited three main
    peaks at 1519, 1157 and 1006 cm <SUP>-1</SUP>, attributed to β-carotene inside the cell wall. The Raman spectra showed
    that the APPJ treatment of N. crassa spores in water caused degradation of β-carotene, affecting the viability of spores.
