  title: Nonlinear ultrasonic inspection of cohesive failure in adhesive due to contaminants in the manufacturing process
  authors:
  - Pyun, Do-Kyung
  - Koester, Lucas W.
  - Barnard, Daniel J.
  - Bond, Leonard J.
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.1117/12.2612271
  abstract: Adhesive joints have been an effective alternative to conventional mechanical fasteners for joining similar and
    dissimilar materials in the aerospace industry. Adhesive joints have various advantages, including uniform stress distribution,
    lower weight, and design flexibility, but quality issues and possible defects in these joints have limited wider use.
    In this study, contaminants mixed into the epoxy-adhesive, which cause cohesive failure, were investigated. In the manufacturing
    process there can be various contaminants, such as release agents, oils, and moisture. Since release agents are essential
    materials during the manufacturing process, these were used in this study. A nonlinear ultrasonic technique was employed
    to evaluate the micro-scale defects in the adhesive due to contaminants. The experiments measured the nonlinearity parameter,
    with varying the contamination level, at 0, 0.5, 1.0, and 1.5% of the total weight of the epoxy mixture. The nonlinearity
    parameter exhibited higher sensitivity than the sound velocity, which is a conventional linear ultrasonic parameter, for
    the differentiation of the contamination levels in the adhesive. Furthermore, differential scanning calorimetry (DSC)
    and Rockwell hardness testing were conducted to monitor changes in chemical and mechanical properties respectively, with
    varying degrees of the contamination. It is shown that using the correlation between the nonlinearity parameter and chemical,
    and mechanical properties of the adhesive, there is the basis for an advanced inspection system, which has potential to
    improve the detectability of micro-scale defects in adhesively jointed structures.
