  abstract: 'Misrepair accumulation theory is a novel theory in interpreting aging phenomena. With a new concept of Misrepair,
    this theory reaches a unified understanding of aging: aging of an organism is a result of accumulation of Misrepairs of
    its structure. Misrepair accumulation theory (MA theory) is distinct and it can improve our understanding of life on several
    aspects. I. MA theory is fundamentally different from other theories by: A. proposing a generalized concept of Misrepair;
    B. pointing out the evolutionary advantage of aging mechanism; and C. distinguishing between aging of a cell and aging
    of a tissue. II. MA theory overcomes the limitations of traditional theories on interpreting the phenomena of tissue fibrosis
    and cancer development. Tissue fibrosis, as a result of accumulation of Misrepairs with collagen fibers, is a powerful
    evidence for demonstrating the central role of Misrepairs in aging. Cancer development is a result of accumulation of
    DNA Misrepairs in somatic cells, which needs to proceed over many generations of cells in a regenerable tissue. III. MA
    theory improves also our understanding on longevity, premature aging, adaptation, and species evolution. The potential
    of longevity of an organism is hidden in the complexity of its structure. IV. MA theory suggests that for retarding aging,
    the most important is to reduce the opportunity of damage-exposure.'
