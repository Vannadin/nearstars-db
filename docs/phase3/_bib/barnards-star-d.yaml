  title: Unique Challenges for Modeling Defect Dynamics in Concentrated Solid-Solution Alloys
  authors:
  - Zhao, Shijun
  - Weber, William J.
  - Zhang, Yanwen
  year: '2017'
  pubdate: '2017-11-00'
  doi: 10.1007/s11837-017-2461-0
  abstract: Recently developed concentrated solid solution alloys (CSAs) are shown to have improved performance under irradiation
    that depends strongly on the number of alloying elements, alloying species, and their concentrations. In contrast to conventional
    dilute alloys, CSAs are composed of multiple principal elements situated randomly in a simple crystalline lattice. As
    a result, the intrinsic disorder has a profound influence on energy dissipation pathways and defect evolution when these
    CSAs are subjected to energetic particle irradiation. Extraordinary irradiation resistance, including suppression of void
    formation by two orders of magnitude at an elevated temperature, has been achieved with increasing compositional complexity
    in CSAs. Unfortunately, the loss of translational invariance associated with the intrinsic chemical disorder poses great
    challenges to theoretical modeling at the electronic and atomic levels. Based on recent computer simulation results for
    a set of novel Ni-containing, face-centered cubic CSAs, we review theoretical modeling progress in handling disorder in
    CSAs and underscore the impact of disorder on defect dynamics. We emphasize in particular the unique challenges associated
    with the description of defect dynamics in CSAs.
