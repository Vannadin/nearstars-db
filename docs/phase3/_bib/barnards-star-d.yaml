- arxiv_id: '2601.10273'
  ads_bibcode: 2026arXiv260110273T
  title: Nonadiabatic couplings drive ultrafast, mode-selective intramolecular vibrational energy redistribution in flavins
  authors:
  - Timmer, Daniel
  - Kumar, Krishan
  - Götze, Jan P.
  - Saalfrank, Peter
  - De Sio, Antonietta
  - Lienau, Christoph
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.48550/arXiv.2601.10273
  abstract: Flavins are the chromophores in several blue-light-sensitive photoreceptor proteins and act as redox cofactors
    in many enzymes relevant for biological processes. Despite their biological relevance and numerous, detailed optical investigations
    of their photophysical properties, the ultrafast nonequilibrium dynamics of their elementary optical excitations are not
    yet fully known. Here, we use ultrafast coherent vibrational spectroscopy with 10-fs time resolution in the 450-nm spectral
    range to study their excited state coherent vibrational dynamics. We observe that coherent wavepacket motion along high-frequency
    C-C stretching modes with ~ 20-fs period is rapidly damped on a 20-fs timescale. In contrast, coherent motion along several
    low-frequency modes persists much longer. We attribute this to a mode-selective intramolecular vibrational energy redistribution
    driven by nonadiabatic couplings between the optical bright state and a close-lying dark electronic state, in accordance
    with model calculations. Our results may be of relevance for the formation of long-lived radical pair states in magnetic-field
    sensitive proteins.
