- arxiv_id: '2507.03406'
  ads_bibcode: 2025arXiv250703406S
  title: Testing Hypotheses regarding Covariance and Correlation matrices with the R package CovCorTest
  authors:
  - Sattler, Paavo
  - Jedhoff, Svenja
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.48550/arXiv.2507.03406
  abstract: In addition to the commonly analyzed measures of location, dispersion measurements such as variance and correlation
    provide many valuable information. Consequently, they play a crucial role in multivariate statistics, which leads to tests
    regarding covariance and correlation matrices. Furthermore, also the structure of these matrices leads to important hypotheses
    of interest, since it contains substantial information about the underlying model. In fact, assumptions regarding the
    structures of covariance and correlation matrices are often fundamental in statistical modelling and testing. In this
    context, semi-parametric settings with minimal distributional assumptions and very general hypotheses are essential for
    enabling manifold usage. The free available package CovCorTest provides suitable tests addressing all aforementioned issues,
    using bootstrap and similar techniques to achieve good performance, particularly in small samples. Additionally, the package
    offers flexible specification options for the hypotheses under investigation in two central tests, accommodating users
    with varying levels of expertise, which results in high flexibility and user-friendliness at the same time. This paper
    also presents the application of \textbf{CovCorTest} for various issues, illustrated by multiple examples, where the tests
    are applied to a real-world dataset.
