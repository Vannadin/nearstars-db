  abstract: Composite structures have played a significant role in enhancing airplane’s performance However, defects inside
    can be a potential threat to flight safety. To resolve the hazard. FMECA was applied to the defect analysis of composite
    structures on airplane’s wing. And the failure mode of the highest criticality was found to be the impact damage. Then
    impact test on typical composite laminates was carried out. The caused damage was qualitatively analysed and proved impact
