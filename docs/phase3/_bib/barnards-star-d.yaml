    100 K showed promise because they enable a significant improvement to model performance and because they are accessible
    to flexible ab initio quantum mechanical methods readily applicable to almost all systems. This advancement in computationally
    accessible features for machine learning predictions GFA will enable future models to more accurately predict new glass
    forming alloys.
