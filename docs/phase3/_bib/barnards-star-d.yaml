  ads_bibcode: 2022arXiv221002446A
  title: Ultrasonic Estimation of Soft Tissue Visco Elastic Properties
  authors:
  - Ahmed, Hassan M.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.48550/arXiv.2210.02446
  abstract: Conventional imaging of diagnostic ultrasound is widely used. Although it makes the differences in the soft tissues
    echogenicities' apparent and clear, it fails in describing and estimating the soft tissue mechanical properties. It cannot
    portray their mechanical properties, such as the elasticity and stiffness. Estimating the mechanical properties increases
    chances of the identification of lesions or any pathological changes. Physicians are now characterizing the tissue's mechanical
    properties as diagnostic metrics. Estimating the tissue's mechanical properties is achieved by applying an Acoustic Radiation
    Force Impulse (ARFI) on the tissue and calculating the resulted shear wave speed. Due to the difficulty of calculating
    the shear wave speed precisely inside the tissue, it is estimated by analyzing ultrasound images of the tissue at a very
    high frame rate. In this study, the shear wave speed is estimated using finite element analysis. A two-dimensional model
    is constructed to simulate the tissue's mechanical properties. For a generalized soft tissue model, Agar-gelatine model
    is used because it has similar properties to the soft tissue. A point force is applied at the center of the proposed model.
    As a result of this force, a deformation is caused. Peak displacements are tracked along the lateral dimension of the
    model to estimate the shear wave speed of the propagating wave using the Time-To-Peak displacement (TTP) method.
