  title: 'Discipline-Based Education Research: Understanding and Improving Learning in Undergraduate Science and Engineering'
  authors:
  - National Research Council
  year: '2012'
  pubdate: '2012-05-00'
  doi: 10.17226/13362
  abstract: The National Science Foundation funded a synthesis study on the status, contributions, and future direction of
    discipline-based education research (DBER) in physics, biological sciences, geosciences, and chemistry. DBER combines
    knowledge of teaching and learning with deep knowledge of discipline-specific science content. It describes the discipline-specific
    difficulties learners face and the specialized intellectual and instructional resources that can facilitate student understanding.
    Discipline-Based Education Research is based on a 30-month study built on two workshops held in 2008 to explore evidence
    on promising practices in undergraduate science, technology, engineering, and mathematics (STEM) education. This book
    asks questions that are essential to advancing DBER and broadening its impact on undergraduate science teaching and learning.
    The book provides empirical research on undergraduate teaching and learning in the sciences, explores the extent to which
    this research currently influences undergraduate instruction, and identifies the intellectual and material resources required
    to further develop DBER. Discipline-Based Education Research provides guidance for future DBER research. In addition,
    the findings and recommendations of this report may invite, if not assist, post-secondary institutions to increase interest
    and research activity in DBER and improve its quality and usefulness across all natural science disciples, as well as
    guide instruction and assessment across natural science courses to improve student learning. The book brings greater focus
    to issues of student attrition in the natural sciences that are related to the quality of instruction. Discipline-Based
    Education Research will be of interest to educators, policy makers, researchers, scholars, decision makers in universities,
    government agencies, curriculum developers, research sponsors, and education advocacy groups.
