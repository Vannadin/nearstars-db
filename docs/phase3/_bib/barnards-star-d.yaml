  title: Estimating crop stomatal conductance from RGB, NIR, and thermal infrared images
  authors:
  - Zhang, Junxiao
  - Thapa, Kantilata
  - Chamara, Nipuna
  - Bai, Geng
  - Ge, Yufeng
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.1117/12.2663888
  abstract: As the global population continues to increase, the demand for food production rises accordingly. The water availability
    of crops has a significant impact on their yield during the processes of photosynthesis and transpiration. Crops exchange
    carbon dioxide and water with the atmosphere through stomata. When crops undergo water stress, they tend to close their
    stomata to reduce water loss. However, this can also negatively affect the crop's photosynthetic rate and carbon assimilation,
    leading to low yields. Stomatal conductance (SC) quantifies the rate of gas exchange between crops and the atmosphere
    and can inform the crop's water status. SC measurements require the use of contact-type instruments, which is time-consuming
    and labor-intensive. This study examined the accuracy of multiple linear regression (MLR), support vector regression (SVR),
    and convolutional neural network (CNN) models for SC estimation in corn and soybean using RGB, near-infrared, and thermal-infrared
    images from a field phenotyping platform. The results show that the CNN model outperformed other two models, with R 2
    value of 0.52. Furthermore, adding soil moisture as a variable to the model improved its accuracy, decreasing model RMSE
    from 0.147 to 0.137 mol/(m2*s). This study highlights the potential of estimating SC from remote sensing platforms to
    help growers obtain information about their crop water status and plan irrigation more effectively.
