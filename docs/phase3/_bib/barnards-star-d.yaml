  abstract: The level of supercoiling in the chromosome can affect gene expression. To clarify the basis of supercoiling sensitivity,
    we analyzed the structural features of nucleotide sequences in the vicinity of promoters for the genes with expression
    enhanced and decreased in response to loss of chromosomal supercoiling in E. coli. Fourier analysis of promoter sequences
    for supercoiling-sensitive genes reveals the tendency in selection of sequences with helical periodicities close to 10
    nt for relaxation-induced genes and to 11 nt for relaxation-repressed genes. The helical periodicities in the subsets
