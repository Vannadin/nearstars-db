  ads_bibcode: 2026arXiv260223285J
  title: 'ODEBrain: Continuous-Time EEG Graph for Modeling Dynamic Brain Networks'
  authors:
  - Jia, Haohui
  - Chen, Zheng
  - Zhu, Lingwei
  - Kotoge, Rikuto
  - Pradeepkumar, Jathurshan
  - Matsubara, Yasuko
  - Sun, Jimeng
  - Sakurai, Yasushi
  - Matsubara, Takashi
  year: '2026'
  pubdate: '2026-02-00'
  doi: 10.48550/arXiv.2602.23285
  abstract: Modeling neural population dynamics is crucial for foundational neuroscientific research and various clinical
    applications. Conventional latent variable methods typically model continuous brain dynamics through discretizing time
    with recurrent architecture, which necessarily results in compounded cumulative prediction errors and failure of capturing
    instantaneous, nonlinear characteristics of EEGs. We propose ODEBRAIN, a Neural ODE latent dynamic forecasting framework
    to overcome these challenges by integrating spatio-temporal-frequency features into spectral graph nodes, followed by
    a Neural ODE modeling the continuous latent dynamics. Our design ensures that latent representations can capture stochastic
    variations of complex brain states at any given time point. Extensive experiments verify that ODEBRAIN can improve significantly
    over existing methods in forecasting EEG dynamics with enhanced robustness and generalization capabilities.
