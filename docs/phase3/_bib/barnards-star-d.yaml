  title: Nuclear Data Sheets for A = 85
  authors:
  - Singh, Balraj
  - Chen, Jun
  year: '2014'
  pubdate: '2014-02-00'
  doi: 10.1016/j.nds.2014.01.001
  abstract: Evaluated experimental data are presented for 13 known nuclides of mass 85 (Zn, Ga, Ge, As, Se, Br, Kr, Rb, Sr,
    Y, Zr, Nb, Mo). Since the previous 1990 evaluation of A = 85, <SUP>85</SUP>Zn, <SUP>85</SUP>Ga, <SUP>85</SUP>Ge and <SUP>85</SUP>nuclides
    are newly added here. Excited state data for <SUP>85</SUP>Se, <SUP>85</SUP>Zr have become available from radioactive decay
    and in-beam γ-ray studies. New and improved high-spin data are available for <SUP>85</SUP>Br, <SUP>85</SUP>Kr, <SUP>85</SUP>Rb,
    <SUP>85</SUP>Y, <SUP>85</SUP>Nb and <SUP>85</SUP>Mo. New direct and precise measurement of atomic masses of <SUP>85</SUP>Ge,
    <SUP>85</SUP>As, <SUP>85</SUP>Se, <SUP>85</SUP>Br, <SUP>85</SUP>Rb, <SUP>85</SUP>Zr, <SUP>85</SUP>Nb and <SUP>85</SUP>Mo
    have greatly improved the landscape of β decay-Q values and separation energies in this mass region. <P />In spite of
    extensive experimental work on the isobaric nuclei of this mass chain several deficiencies remain. No excited states are
    known in <SUP>85</SUP>Zn, <SUP>85</SUP>Ga, <SUP>85</SUP>As. Only a few excited state are assigned in <SUP>85</SUP>Ge from
    <SUP>85</SUP>Ga β- decay. From radioactivity studies, the decay schemes of <SUP>85</SUP>Zn and <SUP>85</SUP>Mo are not
    known, and those for <SUP>85</SUP>Ga, <SUP>85</SUP>Ge, <SUP>85</SUP>As and 10.9-s isomer of <SUP>85</SUP>Zr are incomplete.
    Level lifetimes are not known for excited states in <SUP>85</SUP>Se, <SUP>85</SUP>Br, <SUP>85</SUP>Nb and <SUP>85</SUP>Mo.
    The <SUP>85</SUP>Tc nuclide has not been detected in fragmentation experiments at GANIL, alluding to its unbound nature
    for proton emission. The <SUP>85</SUP>Kr, <SUP>85</SUP>Rb, <SUP>85</SUP>Sr, and <SUP>85</SUP>Y nuclides remain the most
    extensively studied from many different reactions and decays. <P />The evaluation of A = 85 nuclides has been done after
    a span of 23 years, thus includes an extensive amount of new data for almost each nuclide. This work supersedes the data
    for A = 85 nuclides presented in earlier full NDS publication by J. Tepel in 1980Te04 and a later one published in an
    update mode by H. Sievers in 1991Si01
