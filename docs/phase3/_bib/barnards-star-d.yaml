  ads_bibcode: 2017nap..book24622N
  title: 'Undergraduate Research Experiences for STEM Students: Successes, Challenges, and Opportunities'
  authors:
  - National Academies of Sciences, Engineering, and Medicine
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.17226/24622
  abstract: Undergraduate research has a rich history, and many practicing researchers point to undergraduate research experiences
    (UREs) as crucial to their own career success. There are many ongoing efforts to improve undergraduate science, technology,
    engineering, and mathematics (STEM) education that focus on increasing the active engagement of students and decreasing
    traditional lecture-based teaching, and UREs have been proposed as a solution to these efforts and may be a key strategy
    for broadening participation in STEM. In light of the proposals questions have been asked about what is known about student
    participation in UREs, best practices in UREs design, and evidence of beneficial outcomes from UREs. Undergraduate Research
    Experiences for STEM Students provides a comprehensive overview of and insights about the current and rapidly evolving
    types of UREs, in an effort to improve understanding of the complexity of UREs in terms of their content, their surrounding
    context, the diversity of the student participants, and the opportunities for learning provided by a research experience.
    This study analyzes UREs by considering them as part of a learning system that is shaped by forces related to national
    policy, institutional leadership, and departmental culture, as well as by the interactions among faculty, other mentors,
    and students. The report provides a set of questions to be considered by those implementing UREs as well as an agenda
    for future research that can help answer questions about how UREs work and which aspects of the experiences are most powerful.
