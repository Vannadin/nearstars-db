  abstract: We introduce deep scale-spaces (DSS), a generalization of convolutional neural networks, exploiting the scale
    symmetry structure of conventional image recognition tasks. Put plainly, the class of an image is invariant to the scale
    at which it is viewed. We construct scale equivariant cross-correlations based on a principled extension of convolutions,
    grounded in the theory of scale-spaces and semigroups. As a very basic operation, these cross-correlations can be used
