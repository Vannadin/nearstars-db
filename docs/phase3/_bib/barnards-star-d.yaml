- arxiv_id: '1607.05253'
  ads_bibcode: 2016arXiv160705253K
  title: 'Ag diffusion in SiC high-energy grain boundaries: kinetic Monte Carlo study with first-principle calculations'
  authors:
  - Ko, Hyunseok
  - Deng, Jie
  - Szlufarska, Izabela
