  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: 'Selenium (Se) is an essential element for human health and has an important marine component to its biogeochemical
    cycle. Recent studies estimate 29-36 Gg of Se cycling through the atmosphere per year<SUP>1</SUP>. Inorganic, oxidized
    Se emitted to the oceans is assimilated by phytoplankton with subsequent bio-reduction leading to the incorporation into
    selenoproteins and other organo-Se species. Further transformations of these Se containing biochemicals result in the
    production of volatile organic selenium (VOSe) species such as dimethyl selenide (DMSe) and dimethyl diselenide (DMDSe).
    Our research focuses on the evaluation of the spatiotemporal and physiochemical fate of VOSe in the gas phase related
    to marine environments. <P />In this work, we use proton transfer reaction time-of-flight (PTR-TOF) mass spectrometry
    (MS), Vocus (TOFWERK, Aerodyne, Inc.) in conjunction with online gas chromatography (GC) (Aerodyne, Inc.) and <SUP>77</SUP>Se
    NMR spectroscopy to study the fate of the oxidative transformation of DMSe and DMDSe. We first investigated the rate constants
    of VOSe species with ozone (O<SUB>3</SUB>) since this oxidant is most relevant for remote marine environments. DMSe reacted
    with an excess of O<SUB>3</SUB> under pseudo first order reaction conditions with a rate constant of 5.8 x 10<SUP>-17</SUP>
    molecules · s<SUP>-1</SUP> · cm<SUP>-3</SUP>. The reaction of DMDSe with an excess of O<SUB>3</SUB> resulted in a slower
    rate constant of 3.0 x 10<SUP>-17</SUP> molecules · s<SUP>-1</SUP> · cm<SUP>-3</SUP>. Overall, the lifetimes of DMSe and
    DMSe against O<SUB>3</SUB> are 10.2 hours and 19.7 hours, respectively, at 20 ppbv of O<SUB>3</SUB>. Furthermore, our
    untargeted analysis of high time resolution mass spectrometry data identified C<SUB>2</SUB>H<SUB>6</SUB>SeO and CH<SUB>4</SUB>SeO<SUB>2</SUB>
    as the major products of the ozonolysis of DMSe and DMDSe, respectively. These obtained molecular formulas are assignable
    to the chemical species dimethyl selenoxide (DMSeO) and methylselenic acid (MeSeOOH). Interestingly, these findings are
    consistent with liquid phase studies<SUP>3</SUP> of the same reactions. Considering the low volatility of DMSeO and MeSeOOH
    and wet deposition as the predominant removal mechanism of particulate Se<SUP>4</SUP>, our preliminary results imply a
    rapid atmospheric turnover by returning VOSe back to its source. Future efforts are targeted towards synthesizing DMSeO
    and MeSeOOH and subsequent analysis using <SUP>77</SUP>Se NMR to verify the reaction products. These findings aid in the
    elucidation of the spatiotemporal and physiochemical fate of VOSe emitted by marine environments. Ultimately, this research
    provides insight into currently unknown aspects of marine gas exchange of selenium leading to an improved understanding
    of sea-air interactions. <P />References: <P />(1) Feinberg, A.; Stenke, A.; Peter, T.; Winkel, L. H. E. Constraining
    Atmospheric Selenium Emissions Using Observations, Global Modeling, and Bayesian Inference. Environ. Sci. Technol. 2020,
    54 (12), 7146-7155. <P />(2) Atkinson, R.; Aschmann, S. M.; Hasegawa, D.; Thompson-Eagle, E. T.; Frankenberger, W. T.
    Kinetics of the Atmospherically Important Reactions of Dimethyl Selenide. Environ. Sci. Technol. 1990, 24 (9), 1326-1332.
    <P />(3) Ayrey, G.; Barnard, D.; Woodbridge, D. T. 401. The Oxidation of Organoselenium Compounds by Ozone. J. Chem. Soc.
    Resumed 1962, 2089. <P />(4) Wen, H.; Carignan, J. Reviews on Atmospheric Selenium: Emissions, Speciation and Fate. Atmos.
    Environ. 2007, 41 (34), 7151-7165.'
