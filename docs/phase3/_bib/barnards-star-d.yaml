  title: Longitudinal confinement and matching of an intense electron beam
  authors:
  - Beaudoin, B.
  - Haber, I.
  - Kishek, R. A.
  - Bernal, S.
  - Koeth, T.
  - Sutter, D.
  - O'Shea, P. G.
  - Reiser, M.
  year: '2011'
  pubdate: '2011-01-00'
  doi: 10.1063/1.3537820
  abstract: An induction cell has successfully been demonstrated to longitudinally confine a space-charge dominated bunch
    for over a thousand turns (&gt;11.52 km) in the University of Maryland Electron Ring [Haber et al., Nucl. Instrum. Methods
    Phys. Res. A 606, 64 (2009) and R. A. Kishek et al., Int. J. Mod. Phys. A 22, 3838 (2007)]. With the use of synchronized
    periodic focusing fields, the beam is confined for multiple turns overcoming the longitudinal space-charge forces. Experimental
    results show that an optimum longitudinal match is obtained when the focusing frequency for containment of the 0.52 mA
    beam is applied at every fifth turn. Containment of the beam bunch is achievable at lower focusing frequencies, at the
    cost of a reduction in the transported charge from the lack of sufficient focusing. Containment is also obtainable, if
    the confinement fields overfocus the bunch, exciting multiple waves at the bunch ends, which propagate into the central
    region of the beam, distorting the overall constant current beam shape.
