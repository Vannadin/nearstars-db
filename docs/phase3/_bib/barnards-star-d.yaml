  abstract: The evaluated experimental data are presented for 14 known nuclides of mass 87 (Ga, Ge, As, Se, Br, Kr, Rb, Sr,
    Y, Zr, Nb, Mo, Tc, Ru). New datasets have been added for <SUP>87</SUP>Ga, <SUP>87</SUP>Se, <SUP>87</SUP>Kr, <SUP>87</SUP>Rb,
    <SUP>87</SUP>Sr, <SUP>87</SUP>Nb, and <SUP>87</SUP>Tc. The observation of and new lifetime measurements for <SUP>87</SUP>As
    at the NSCL Coupled Cyclotron Facility and the Oak Ridge Isochronous Cyclotron at the HRIBF-ORNL Facility are included
    in the adopted levels for this isotope. The new evaluation also includes an isomeric level at unknown energy for <SUP>87</SUP>Tc,
    changes to the adopted levels for <SUP>87</SUP>Nb based on newly published data including an extension of the high spin
    levels and new lifetime measurements, and new heavy ion data for <SUP>87</SUP>Kr. New high spin levels for <SUP>87</SUP>Rb
    were observed, indicating possible neutron core excitations. In addition, the ground state lifetime of <SUP>87</SUP>Rb
    has been revised and a new lifetime measurement for an excited level in <SUP>87</SUP>Rb indicates a possible proton spin
    flip. New excitation levels have been observed for the first time in <SUP>87</SUP>Se. New direct and precise measurement
    of atomic masses of <SUP>87</SUP>Tc, <SUP>87</SUP>Mo, <SUP>87</SUP>Nb, <SUP>87</SUP>Zr, <SUP>87</SUP>Mo and <SUP>87</SUP>Tc
    have greatly improved the Q value landscape in this mass region. This work supersedes the previous A=87 evaluation published
    in 2002He09, and Q values for all isotopes were updated to incorporate the mass evaluation in 2012Wa38.
