  doi: 10.1088/1742-6596/1865/2/022006
  abstract: Neutron logging is a method of measuring uranium fission neutrons by bombarding uranium in ore beds with neutrons
    emitted by neutron sources or neutron generators. The pulsed neutron logging technology of uranium ore has been popularized
    and applied in the United States, Russia, Australia and other countries. The key technology is almost monopolized by these
    countries, but the technology is prohibited in China. In the field of uranium logging, natural gamma logging has always
    been used in China for uranium quantification, which is characterized by large error, low efficiency, high cost and technical
    and economic bottlenecks. Due to the fact that the research and application of pulsed neutron log in the field of petroleum
    exploration and production is relatively mature in China, it is urgent to develop relevant logging instruments and uranium
    quantitative interpretation methods as independent intellectual property rights. This will lead to a change in the backward
    appearance of uranium logging. This paper analyzes the research status and development trend of neutron logging in uranium
    at home and abroad.
