  abstract: A lack of spatial inversion symmetry gives rise to a variety of unconventional physics, from noncollinear order
    and Skyrmion lattice phases in magnetic materials to topologically protected surface states in certain band insulators
    to mixed-parity pairing states in superconductors. The search for exotic physics in such materials is largely limited
    by a lack of candidate materials and often by difficulty in obtaining crystals. Here, we report the single-crystal growth
