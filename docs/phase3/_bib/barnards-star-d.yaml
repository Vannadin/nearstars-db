  ads_bibcode: 2019AstL...45..528S
  title: High Resolution Optical Spectroscopy of a B-type Abundance Standard Candidate in Ori OB1—HD 35039
  authors:
  - Şahin, Timur
  - Dervișoğlu, Ahmet
  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.1134/S1063773719080073
  abstract: 'We present LTE analysis of high resolution optical spectra for the B-type abundance standard candidate HD 35039
    (HR 1765, 22 Ori) with an ambigous binary nature. The spectra were obtained with the 3.9-m Anglo-Australian Telescope
    (AAT) and the UCLES spectrograph. The standard 1D LTE analysis with line-blanketed LTE model atmospheres and spectral
    synthesis provided fundamental atmospheric parameters of T <SUB>eff</SUB> = 22000 ± 1300 K, log g = 3.5 ± 0.3, ξ = 6.0
    ± 3.0 km s<SUP>-1</SUP>, v sin i = 5.0 ± 1.0 km s<SUP>-1</SUP>, [Fe/H] = -0.3 dex, and the photospheric abundances of
    eleven elements. The FEROS spectrum of the star from the public spectra archive were also obtained and used to test the
    model parameters of the star: Hydrogen Paschen lines (P<SUB>12</SUB>, P<SUB>13</SUB>, and P<SUB>14</SUB>) provided a good
    fit for the reported model parameters. We have also acquired high resolution HIDES and HERMES spectra of the star. The
    error margins in the reported model parameters as well as their degeneracies were tested by the Bayesian inference method.
    We detect for the first time the P III 4059, 4222, and 4246 Å lines and determine the phosphorus abundance, log ∊(P)=
    4.95 ± 0.3 dex (i.e., [P/Fe] = -0.15 dex), from line synthesis. The obtained argon abundance, log ∊(Ar) = 6.55 ± 0.19
    dex, agrees well with the literature measurements. For the remaining elements, abundances determined in this study for
    HD 35039 are lower than the average abundances of B dwarfs of well studied OB associations as well as the mean abundances
    of a sample of early B-type stars in the solar neighbourhood, by up to 0.3 dex. In the FEROS, HIDES, and HERMES spectra,
    we observe the emission in the high-excitation lines of Si II and Al II. We find a variable radial velocity, with a peak-to-peak
    amplitude of about 10 km s<SUP>-1</SUP>.'
