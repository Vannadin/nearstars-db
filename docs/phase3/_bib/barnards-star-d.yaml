  ads_bibcode: 2023nap..book26757N
  title: Review of the Draft Fifth National Climate Assessment
  authors:
  - National Academies of Sciences, Engineering, and Medicine
  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.17226/26757
  abstract: 'Roughly every four years, the U.S. Global Change Research Program produces a congressionally mandated assessment
    of global change science and the impacts, adaptation, and mitigation of climate change in the United States. The draft
    Fifth National Climate Assessment (NCA5), released publicly in November 2022, covers a wide range of U.S. impacts, from
    human health and community well-being to the built environment, businesses and economies, and ecosystems and water resources.
    NCA5 had the largest scale of collaboration to date in the series, with input from hundreds of experts from all levels
    of governments, academia, non-government organizations, the private sector, and the public. The National Academies report
    provides an independent, comprehensive review and makes recommendations to strengthen the accuracy, credibility, and accessibility
    of the draft NCA5 report. The National Academies'' review of the draft NCA5 report finds that it successfully meets the
    requirements of the federal mandate, provides accurate information, and effectively communicates climate science to the
    public, decision makers, and other stakeholders. The review makes recommendations for ways the draft NCA5 report could
    be strengthened, including: adopting more clear and consistent structure for key messages and figures across the report;
    resolving inconsistencies between chapters in how terms and topics are discussed, for example the use of scenarios and
    projections; intentionally applying an equity and justice lens across chapters; and increasing emphasis on certain topical
    areas.'
