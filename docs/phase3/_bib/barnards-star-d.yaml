  abstract: Curved surface is widely exist in key parts of energy and power equipment, such as, turbine blade cylinder block
    and so on. Cycling loading and harsh working condition of enable fatigue cracks appear on the surface. The crack should
    be found in time to avoid catastrophic damage to the equipment. A flexible 2D array transducer was developed. 2D Phased
    Array focusing method (2DPA), Mode-Spatial Double Phased focusing method (MSDPF) and the imaging method using the flexible
    2D array probe are studied. Experiments using these focusing and imaging method are carried out. Surface crack image is
    obtained with both 2DPA and MSDPF focusing method. It have been proved that MSDPF can be more adaptable for curved surface
    and more calculate efficient than 2DPA.
