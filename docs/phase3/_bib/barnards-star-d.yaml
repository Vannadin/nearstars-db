  ads_bibcode: 2011ChPhL..28h4302H
  title: Simultaneous Measurements of Harmonic Waves at Fatigue-Cracked Interfaces
  authors:
  - Hyunjo, Jeong
  - Dan, Barnard
  year: '2011'
  pubdate: '2011-08-00'
  doi: 10.1088/0256-307X/28/8/084302
  abstract: Nonlinear harmonic waves generated at cracked interfaces are investigated theoretically and experimentally. A
    compact tension specimen is fabricated and the amplitude of the transmitted wave is analyzed as a function of position
    along the fatigued crack surface. In order to measure as many nonlinear harmonic components as possible, broadband lithium
    niobate (LiNbO<SUB>3</SUB>) transducers are employed together with a calibration technique for making absolute amplitude
    measurements with fluid-coupled receiving transducers. Cracked interfaces are shown to generate high acoustic nonlinearities,
    which are manifested as harmonics in the power spectrum of the received signal. The first subharmonic f/2 and the second
    harmonic 2f waves are found to be dominant nonlinear components for an incident toneburst signal of frequency f. To explain
    the observed nonlinear behavior, a partially closed crack is modeled by planar half interfaces that can account for crack
    parameters, such as crack opening displacement and crack surface conditions. The simulation results show reasonable agreement
    with the experimental results.
