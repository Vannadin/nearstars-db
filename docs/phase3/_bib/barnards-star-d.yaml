    for study of correlations between the intensities of periodicities in promoter sequences and the expression levels of
    corresponding genes. Significant correlations of expression with the AT content and with AT periodicities about 10, 11,
    and 50 nt indicate their role in regulation of supercoiling-sensitive genes.
