  year: '2023'
  pubdate: '2023-02-00'
  doi: 10.17226/26803
  abstract: Individuals from minoritized racial and ethnic groups continue to face systemic barriers that impede their ability
    to access, persist, and thrive in science, technology, engineering, mathematics, and medicine (STEMM) higher education
    and workforce. Without actively dismantling policies and practices that disadvantage people from minoritized groups, STEMM
    organizations stand to lose much needed talent and innovation as well as the ideas that come from having a diverse workforce.
    A new report from the Board on Behavioral, Cognitive, and Sensory Sciences examines the backdrop of systemic racism in
    the United States that has harmed and continues to harm people from minoritized groups, which is critical for understanding
    the unequal representation in STEMM. The report outlines actions that top leaders and gatekeepers in STEMM organizations,
    such as presidents and chief executive officers, can take to foster a culture and climate of antiracism, diversity, equity,
    and inclusion that is genuinely accessible and supportive to all.
