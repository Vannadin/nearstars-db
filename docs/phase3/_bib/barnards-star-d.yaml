- arxiv_id: '2405.00734'
  ads_bibcode: 2024arXiv240500734S
  title: 'EEG-MACS: Manifold Attention and Confidence Stratification for EEG-based Cross-Center Brain Disease Diagnosis under
    Unreliable Annotations'
  authors:
  - Song, Zhenxi
  - Qin, Ruihan
  - Ren, Huixia
  - Liang, Zhen
  - Guo, Yi
  - Zhang, Min
  - Zhang, Zhiguo
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.48550/arXiv.2405.00734
  abstract: 'Cross-center data heterogeneity and annotation unreliability significantly challenge the intelligent diagnosis
    of diseases using brain signals. A notable example is the EEG-based diagnosis of neurodegenerative diseases, which features
    subtler abnormal neural dynamics typically observed in small-group settings. To advance this area, in this work, we introduce
    a transferable framework employing Manifold Attention and Confidence Stratification (MACS) to diagnose neurodegenerative
    disorders based on EEG signals sourced from four centers with unreliable annotations. The MACS framework''s effectiveness
    stems from these features: 1) The Augmentor generates various EEG-represented brain variants to enrich the data space;
    2) The Switcher enhances the feature space for trusted samples and reduces overfitting on incorrectly labeled samples;
    3) The Encoder uses the Riemannian manifold and Euclidean metrics to capture spatiotemporal variations and dynamic synchronization
    in EEG; 4) The Projector, equipped with dual heads, monitors consistency across multiple brain variants and ensures diagnostic
    accuracy; 5) The Stratifier adaptively stratifies learned samples by confidence levels throughout the training process;
    6) Forward and backpropagation in MACS are constrained by confidence stratification to stabilize the learning system amid
    unreliable annotations. Our subject-independent experiments, conducted on both neurocognitive and movement disorders using
    cross-center corpora, have demonstrated superior performance compared to existing related algorithms. This work not only
    improves EEG-based diagnostics for cross-center and small-setting brain diseases but also offers insights into extending
    MACS techniques to other data analyses, tackling data heterogeneity and annotation unreliability in multimedia and multimodal
    content understanding.'
