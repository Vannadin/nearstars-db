- arxiv_id: '2604.21628'
  ads_bibcode: 2026arXiv260421628E
  title: 'Time vs. Layer: Locating Predictive Cues for Dysarthric Speech Descriptors in wav2vec 2.0'
  authors:
  - Engert, Natalie
  - Wagner, Dominik
  - Riedhammer, Korbinian
  - Bocklet, Tobias
  year: '2026'
  pubdate: '2026-04-00'
  doi: 10.48550/arXiv.2604.21628
  abstract: 'Wav2vec 2.0 (W2V2) has shown strong performance in pathological speech analysis by effectively capturing the
    characteristics of atypical speech. Despite its success, it remains unclear which components of its learned representations
    are most informative for specific downstream tasks. In this study, we address this question by investigating the regression
    of dysarthric speech descriptors using annotations from the Speech Accessibility Project dataset. We focus on five descriptors,
    each addressing a different aspect of speech or voice production: intelligibility, imprecise consonants, inappropriate
    silences, harsh voice and monoloudness. Speech representations are derived from a W2V2-based feature extractor, and we
    systematically compare layer-wise and time-wise aggregation strategies using attentive statistics pooling. Our results
    show that intelligibility is best captured through layer-wise representations, whereas imprecise consonants, harsh voice
    and monoloudness benefit from time-wise modeling. For inappropriate silences, no clear advantage could be observed for
    either approach.'
