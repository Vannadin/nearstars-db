  ads_bibcode: 2024usgs.data...52T
  title: Sea-level rise and high tide flooding inundation probability and depth statistics in Nassau and Duval Counties, Florida
  authors:
  - Thurman, Hana R.
  - Enwright, Nicholas M.
  - Osland, Michael J.
  - Passeri, Davina L.
  - Day, Richard H.
  - Simons, Bethanie M.
  year: '2024'
  pubdate: '2024-00-00'
  doi: 10.5066/P9K7S6V5
  abstract: 'This dataset includes elevation-based probability and depth statistics for estimating inundation under various
    sea-level rise and high tide flooding scenarios in and around the National Park Service''s Timucuan Ecological and Historic
    Preserve. These datasets were developed using 1-m digital elevation model (DEM) from 2018 with reduced elevation error
    in coastal wetlands (McHenry and others, 2023). This data release includes results from analyses of two local sea-level
    rise scenarios for two-time steps — the Intermediate-Low and Intermediate-High for 2050 and 2100 from Sweet and others
    (2022). Additionally, this data release includes maps of inundation probability under the minor, moderate, and major high
    tide flooding thresholds defined by the National Oceanic and Atmospheric Administration (NOAA). We estimated the probability
    of an area being inundated under a given scenario using Monte Carlo simulations with 1,000 iterations. For an individual
    iteration, each pixel of the DEM was randomly propagated based on the lidar data uncertainty, while the sea-level rise
    and high tide flooding water level estimates were also propagated based on uncertainty in the sea-level rise estimate
    (Sweet and others, 2022) and tidal datum transformation, respectively. Moreover, the probability of a pixel being inundated
    was calculated by summing the binary simulation outputs and dividing by 1,000. Following, probability was binned into
    the following classes: 1) Unlikely, probability ≤0.33; 2) Likely as not, probability &gt;0.33 and ≤0.66; and 3) Likely,
    probability &gt;0.66. Finally, depth statistics were only recorded when depth was equal to or greater than 0. We calculated
    the median depth, 25th percentile, 75th percentile, and interquartile range using all the pixels that met this criterion.
    When utilizing the depth statistics, it is important to also consider the probability of this pixel being flooded. In
    other words, the depth layers may show some depth returns, but the pixel may have rarely been inundated for the 1,000
    iterations. References: McHenry, C.E., Enwright, N.M., Vervaeke, W.C., Thurman, H.R., Patton, B.A., Stoker, J.M., Osland,
    M.J., Day, R.H., Anderson, G.H., Passeri, D.L., and Simons, B.M., 2023, Corrected digital elevation model in coastal wetlands
    in Nassau and Duval Counties, Florida, 2018: U.S. Geological Survey data release, https://doi.org/10.5066/P941Z77K. Sweet,
    W.V., B.D. Hamlington, R.E. Kopp, C.P. Weaver, P.L. Barnard, D. Bekaert, W. Brooks, M. Craghan, G. Dusek, T. Frederikse,
    G. Garner, A.S. Genz, J.P. Krasting, E. Larour, D. Marcy, J.J. Marra, J. Obeysekera, M. Osler, M. Pendleton, D. Roman,
    L. Schmied, W. Veatch, K.D. White, and C. Zuzak. 2022. Global and Regional Sea Level Rise Scenarios for the United States:
    Updated Mean Projections and Extreme Water Level Probabilities Along U.S. Coastlines. NOAA Technical Report NOS 01, National
    Oceanic and Atmospheric Administration, National Ocean Service, Silver Spring, MD, 111p.'
