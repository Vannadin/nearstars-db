  abstract: The nearest stars provide a fundamental constraint for our understanding of stellar physics and the Galaxy. The
    nearby sample serves as an anchor where all objects can be studied and understood with precise data. This work is an update
    of the 10 pc sample published by Reylé et al. (2021) that used the unprecedented high precision parallax measurements
    from the early third data release of the astrometric space mission Gaia. We review this census, all updates being related
    to close binaries, brown dwarfs and exoplanets. We provide a new catalogue of 541 stars, brown dwarfs, and exoplanets
    in 336 systems within 10 pc from the Sun. This list is as volume-complete as possible from current knowledge and it provides
    a list of benchmark stars. We also explore the new products made available in the most recent third Gaia data release.
