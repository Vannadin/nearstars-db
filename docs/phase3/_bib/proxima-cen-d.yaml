- arxiv_id: '2404.15422'
  ads_bibcode: 2024RvMG...90....1H
  title: Host Stars and How Their Compositions Influence Exoplanets
  authors:
  - Hinkel, Natalie R.
  - Youngblood, Allison
  - Soares-Furtado, Melinda
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.2138/rmg.2024.90.01
  abstract: It has become a common practice within the exoplanet field to say that "to know the star is to know the planet."
    The properties of the host star have a strong, direct influence on the interior and surface conditions of the orbiting
    planet and oftentimes measurements of planetary properties are made relative to the star's properties. Not only are observational
    measurements of the star necessary to determine even the most basic aspects of the planet (such as mass and radius), but
    the stellar environment influences how the planet evolves. Therefore, in this chapter, we begin by discussing the basics
    of stars, providing an overview of stellar formation, structure, photon and particle emissions, and evolution. Next, we
    go over the possible ways to determine the age of a star. We then outline how different kinds of stars are distributed
    within the Milky Way galaxy. Afterwards, we explain how to measure the composition of stars and the underlying math inherent
    to those observations, including caveats that are important when using the data for research applications. Finally, we
    explain the underlying physics and observations that enable stellar composition to be used as a proxy for planetary composition.
    In addition, given that this chapter focuses more on astronomy/astrophysics and uses a variety of important terms that
    may not be familiar to all readers, we have defined many terms either within the text or as a footnote for better interdisciplinary
    comprehension.
