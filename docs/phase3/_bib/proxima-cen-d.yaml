  arxiv_id: '2309.00695'
  ads_bibcode: 2023M&PS...58..752I
  title: Delivery of icy planetesimals to inner planets in the Proxima Centauri planetary system
  authors:
  - Ipatov, Sergei I.
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.1111/maps.13985
  abstract: The estimates of the delivery of icy planetesimals from the feeding zone of Proxima Centauri c (with mass equal
    to 7m<SUB>E</SUB>, m<SUB>E</SUB> is the mass of the Earth) to inner planets b and d were made. They included the studies
    of the total mass of planetesimals in the feeding zone of planet c and the probabilities of collisions of such planetesimals
    with inner planets. This total mass could be about 10-15m<SUB>E</SUB>. It was estimated based on studies of the ratio
    of the mass of planetesimals ejected into hyperbolic orbits to the mass of planetesimals collided with forming planet
    c. At integration of the motion of planetesimals, the gravitational influence of planets c and b and the star was taken
    into account. In most series of calculations, planetesimals collided with planets were excluded from integrations. Based
    on estimates of the mass of planetesimals ejected into hyperbolic orbits, it was concluded that during the growth of the
    mass of planet c the semi-major axis of its orbit could decrease by at least a factor of 1.5. Depending on possible gravitational
    scattering due to mutual encounters of planetesimals, the total mass of material delivered by planetesimals from the feeding
    zone of planet c to planet b was estimated to be between 0.002m<SUB>E</SUB> and 0.015m<SUB>E</SUB>. Probably, the amount
    of water delivered to Proxima Centauri b exceeded the mass of water in Earth's oceans. The amount of material delivered
    to planet d could be a little less than that delivered to planet b.
