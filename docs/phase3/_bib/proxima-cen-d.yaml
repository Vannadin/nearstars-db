  arxiv_id: '2504.18485'
  ads_bibcode: 2025MNRAS.539.3301S
  title: Validation of the ESPRESSO wavelength calibration using iodine absorption cell spectra
  authors:
  - Schmidt, Tobias M.
  - Reiners, Ansgar
  - Murphy, Michael T.
  - Lo Curto, Gaspare
  - Martins, Carlos J. A. P.
  - Huke, Philipp
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.1093/mnras/staf588
  abstract: High-quality wavelength calibration is crucial for science cases like radial-velocity studies of exoplanets, the
    search for a possible variation of fundamental constants, and the redshift drift experiment. However, for state-of-the-art
    spectrographs, it has become difficult to verify the wavelength calibration on sky because no astrophysical source provides
    spectra with sufficiently stable or accurate wavelength information. We therefore propose to use iodine absorption cells
    to validate the wavelength calibration. Observing a bright and featureless star through the iodine cell emulates an astrophysical
    target with exactly known spectral features that can be analysed like any other science target, allowing to verify the
    wavelength calibration derived from the internal calibration sources and to identify systematics in the data processing.
    As demonstration, we temporarily installed an <inline-formula><tex-math>$\mathrm{I_2}$</tex-math></inline-formula> absorption
    cell at ESPRESSO. Employing a full forward modelling approach of the <inline-formula><tex-math>$\mathrm{I_2}$</tex-math></inline-formula>
    spectrum, including the instrumental line-spread function, we demonstrate wavelength calibration accuracy at the level
    of a few <inline-formula><tex-math>$\mathrm{m\,s^{-1}}$</tex-math></inline-formula>. We also show that wavelength measurements
    do depend on the geometry of the light-injection into the spectrograph fibers. This highlights the importance of probing
    exactly the same light path as science targets, something not possible with internal calibration sources alone. We also
    demonstrate excellent radial-velocity stability at the <inline-formula><tex-math>${{&lt; 20\, \mathrm{cm\,s^{-1}}}}$</tex-math></inline-formula>
    level in a full end-to-end fashion, from sky to data product. Our study therefore showcases the great potential of absorption
    cells for the verification and long-term monitoring of the wavelength calibration as well as the unique insights they
    can provide.
