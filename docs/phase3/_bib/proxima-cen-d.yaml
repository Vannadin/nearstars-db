  arxiv_id: '2405.05013'
  ads_bibcode: 2024MNRAS.531..251O
  title: Potential surface ice distribution on close-in terrestrial exoplanets around M dwarfs
  authors:
  - Ouyang, Yueyun
  - Ding, Feng
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1093/mnras/stae1200
  abstract: Previous studies suggested that surface ice could be distributed on close-in terrestrial exoplanets around M-dwarfs
    if heat redistribution on the planets is very inefficient. In general, orbital and atmospheric parameters play an important
    role in the climate on terrestrial planets, including the cold-trap region where the permanent surface water reservoir
    can potentially be distributed. Here, we develop a simple coupled land-atmosphere model to explore the potential surface
    ice distribution on close-in terrestrial planets with various orbital and atmospheric parameters, assuming that the planets
    are airless or have a thin N<SUB>2</SUB> atmosphere. We find that the most significant factors in deciding the surface
    cold trap region are the spin-orbit ratio and obliquity. The incident stellar flux and the surface pressure play a limited
    role in the thin N<SUB>2</SUB> simulations for incident flux smaller than Mercury's and surface pressure lower than 10<SUP>4</SUP>
    Pa. Our result illustrates the possible distribution of surface ice on arid terrestrial planets and can help to understand
    the climate of these exoplanets.
