  title: Magnetic Fields in a Sample of Planet-hosting M Dwarf Stars from Kepler, K2, and TESS Observed by APOGEE
  authors:
  - Wanderley, Fábio
  - Cunha, Katia
  - Smith, Verne V.
  - Kochukhov, Oleg
  - Souto, Diogo
