  doi: 10.48550/arXiv.1712.06639
  abstract: We have previously argued that targeted interstellar communication has a physical optimum at narrowband X-ray
    wavelengths $\lambda\approx1\,$nm, limited by the surface roughness of focusing devices at the atomic level (arXiv:1711.05761).
    We search 24,247 archival X-ray spectra (of 6,454 unique objects) for such features and present 19 sources with monochromatic
