  arxiv_id: '2311.04316'
  ads_bibcode: 2024MNRAS.527.3395I
  title: 'Planetary perturbers: flaring star-planet interactions in Kepler and TESS'
  authors:
  - Ilin, Ekaterina
  - Poppenhäger, Katja
  - Chebly, Judy
  - Ilić, Nikoleta
  - Alvarado-Gómez, Julián D.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.1093/mnras/stad3398
  abstract: In many star-planet systems discovered so far, the innermost planet orbits within only a few stellar radii. In
    these systems, planets could become in situ probes of the extended stellar magnetic field. Because they disturb the field
    as they move, they are expected to trigger flares in the corona. Potential differences to the energies and morphologies
    of intrinsic flares are poorly constrained. However, as we expect planet-induced flares to correlate with the planet's
    orbital period, we can identify them from a clustering of flares in phase with the planet's orbit. We used the excellent
    phase coverage from Kepler and the Transiting Exoplanet Survey Satellite to find flaring star-planet systems, compile
    a catalogue of all their flares, and measure how much they cluster in orbital phase. In the 1811 searched systems, we
    found 25 single stars with three or more flares each. We quantified the significance of the clustering in each system,
    and compared it against the theoretically expected power of magnetic interaction that leads to planet-induced flaring.
    Most systems do not show any clustering, consistent with low expected power. Those we expect to show clustering fall on
    two branches. An inactive one, without any signs of clustering, and a tentative active one, where the clustering becomes
    more pronounced as the expected power of interaction increases. The flares in HIP 67522 are prominently clustered (p &lt;
    0.006). This young hot Jupiter system is the most promising candidate for magnetic star-planet interaction in our sample.
