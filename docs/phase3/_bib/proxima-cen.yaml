  ads_bibcode: 2026AAS...24744902S
  title: The MIR Exoplanet CLimate Explorer MIRECLE, a Space Mission Dedicated to Exoplanet Transit and Phase Curve Spectroscopy
  authors:
  - Staguhn, Johannes
  - Mandell, Avi
  - Fixsen, Dale
  - Sharp, Elmer
  - Maher, Steve
  - Brown, Ari
  - Stevenson, Kevin
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: 'For terrestrial exo-planets orbiting within the HZ of mid-to-late M-dwarf stars, the planet-to-star flux contrast
    ratio becomes favorable at wavelengths &gt; 5 μm . Accounting for the decrease in photon rates at longer wavelengths,
    the signal-to-noise ratio is favorable out to ~25 μm. Within this wavelength range, there are prominent absorption features
    due to CH<SUB>4</SUB>, CO<SUB>2</SUB>, O<SUB>3</SUB>, NH<SUB>3</SUB>, N<SUB>2</SUB>O, and SO<SUB>2</SUB>, as well as the
    H<SUB>2</SUB>O vapor continuum. These features can readily distinguish a wet Earth-like planet from a dry, Venus-like
    planet with a dense CO<SUB>2</SUB> atmosphere and a Mars-like planet with a thin CO<SUB>2</SUB> atmosphere. The strong
    ozone band at 9.7 μm allows for detecting the presence of molecular oxygen in the atmosphere, which is a powerful biosignature
    when combined with other out-of- equilibrium molecular species (such as CH<SUB>4</SUB> at 7.7 μm and/or N<SUB>2</SUB>O
    at 17 μm). Additionally, emission spectroscopy uniquely probes a planet''s thermal structure, which is critical towards
    assessing its habitability. The required sensitivity for the observation of a spectral line in transit observations is
    given by the ratio between the line depth and the "continuum" emission from the stellar host. This required ratio is independent
    of the telescope size, but it only depends on the type of planet and its host star. The simultaneous detection of the
    biosignatures O<SUB>3</SUB> and CH<SUB>4</SUB> or O<SUB>3</SUB> and N<SUB>2</SUB>O requires a sensitivity of 5 parts per
    million (ppm) in the measurement, and with the fact that transit observations last a few hours, requires an ultrastable
    spectrometer to be achievable. <P />JWST mid-IR observations demonstrate the power, but also the limits, of what current
    capabilities for the characterization of exo-planet atmospheres can achieve: broad band spectra with more sensitivity
    and better characterization of the stellar emission features will be needed for better constraints on the composition
    of (and even presence) of planetary atmospheres. Phase curve observations are very time-consuming and are unrealistic
    to be obtained on a large scale with JWST, but they still require high instrument stabilities, even if only aimed at determining
    whether the planet has an atmosphere or is just a bare rock. And ultimately, phase curve observations of nearby, non-transiting
    exo-planets, in the HZ of M-stars, such as Proxima Centauri b, will significantly expand the number stellar systems in
    which planetary atmospheres can be characterized. <P />Here we present the Explorer concept MIRECLE, which will allow
    the extraction of mid-infrared spectral lines observed in the atmospheres of transiting planets around M-stars with better
    than 5 ppm accuracy.'
