  ads_bibcode: 2026AAS...24746204K
  title: 'ATLAS — A Trail to Life Around Stars: The Rotation Period Catalog of M Dwarfs within 25 Parsecs and Their Variability
    Effects on Orbiting Planets'
  authors:
  - Kar, Aman
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: M dwarfs account for three out of every four stars in the solar neighborhood. They lose angular momentum through
    stellar winds and magnetic braking over their lifetimes, so studying their rotation rates and changes in their fluxes
    provides key insights into the evolution of these stars and the planets orbiting them. I will discuss my two-part doctoral
    work during which I catalog the rotation period of nearby M dwarfs and investigate their varying light levels. First,
    I have characterized the nearest 32 planet-hosting M dwarfs with 69 planets within 25 parsecs over timescales of months
    to decades. I examined the optical flux environments of these planets over month-long timescales for 23 stars observed
    by TESS, and find that 17 vary by less than 1%. All 32 stars were observed at the SMARTS 0.9m, with a median duration
    of 19.1 years in the VRI photometric bands. I find over these extended timescales that six stars show optical flux variations
    less than 2% and 25 vary from 2─6%. The final star is Proxima Centauri, a standout that varies by 9%. Second, I have measured
    the rotation periods of M dwarfs with TESS and gathered follow-up observations at the RCT 1.3m at KPNO and the SMARTS
