  ads_bibcode: 2023eas..conf..378P
  title: Radio emission from star-planet interaction as a method for exoplanet detection
  authors:
  - Peña-Moñino, Luis
  - Pérez-Torres, Miguel
  - Gómez, José Francisco
  - Ortiz, José Luis
  - Anglada, Guillem
  - Amado, Pedro
  year: '2023'
  pubdate: '2023-07-00'
  doi: null
  abstract: The interaction between a planet and the stellar wind of its host star is expected to produce auroral-like radio
    emission on the star via the electron cyclotron maser (ECM) mechanism, very similar to the interaction between Jupiter
    and its satellite Io. For this phenomenon to occur, the planet must be located within the Alfvén region, where the magnetic
    energy is larger than the kinetic energy of the stellar wind, so that the Alfvén waves are able to carry energy and momentum
    back to the star and trigger the emission. This ECM emission is highly circularly polarised, beamed, and time variable.
    In addition, if this coherent radio emission is due to star-planet interaction, it should show periodic enhancements that
    correlate with the orbital period of the exoplanet. Therefore, the detection of electron cyclotron maser emission with
    a periodic enhancement that correlates with the orbital period of the planet would be the smoking gun of star- planet
    interaction. This would validate low-frequency radio observations as a new and completely independent method to discover
    and characterise exoplanets in the future. Here, we will present results from two radio observing campaigns conducted
    on 2017 and 2021 on the Proxima Cen system using the Australia Telescope Compact Array in the 1-3 GHz band. The data strongly
    suggest that the observed radio emission is due to sub-Alfvénic star-planet interaction between Proxima b and its host
    star, Proxima.
