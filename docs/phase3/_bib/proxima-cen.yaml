  ads_bibcode: 2023AGUFMSH23F2984A
  title: A Comparison between the Coronal Heating of Proxima Centauri and the Sun by Alfven Wave Turbulence
  authors:
  - Astrup-Gay, Simon
  - Asgari-Targhi, Mahboubeh
  year: '2023'
  pubdate: '2023-12-00'
  doi: null
  abstract: Various studies of the solar corona consider magnetic reconnection and wave turbulence as the likely mechanisms
    that heat the solar corona. In this presentation, we focus on the dissipation of Alfven waves to explain the heating of
    the solar and stellar corona. The waves are assumed to be generated by footpoint motions in the photosphere. As they travel
    upward, waves are gradually reflected, and interact with inward propagating waves. This causes turbulence in the chromosphere
    and corona which heats these regions. In order to study the turbulent dissipation mechanism, we use a three-dimensional
    magnetohydrodynamic (MHD) model . This reduced MHD model studies the variation of physical quantities, such as temperature
    and density, along a flux tube and assumes small variations of these parameters across the flux tube. Our study aims to
    adapt this model initially used for the Sun, and apply it to Proxima Centauri, the closest star to our solar system. Proxima
    Centauri has characteristics that differ from the Sun - namely, lower photospheric temperature, higher rotation period,
    smaller mass and radius. In this study, we first obtain the magnetic field of Proxima Centauri. Using the magnetic field
    measurements, we run simulations based on the 3D-MHD turbulence model. We predict coronal heating rates and temperature
    variation from the Alfven wave turbulence model. Finally, we compare the obtained results from Proxima Centauri with those
    of the Sun.
