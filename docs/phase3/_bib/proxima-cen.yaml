  doi: null
  abstract: The impacts of flares remain one of the biggest unknowns in the ability of a close-in rocky M dwarf planet to
    retain its atmosphere. Specifically, understanding the cumulative flare flux incident on a planet over its geologic lifetime
    relies on quantifying both the flare rate and flare spectral energy distribution (SED). However, we are often limited
    to using broadband optical flare studies to extrapolate flare rates to other wavelengths, and it is becoming increasing
    apparent that UV flare rates extrapolated from optical flares are greatly underestimated. Unfortunately, these studies
    rely on broadband flares observed across epochs and/or observatories. With HST's WFC3/G280 grism, however, we can for
    the first time observe NUV-to-optical flare spectra simultaneously. This reveals both the relative NUV and optical rates
    and the precise NUV SED, which greatly influences planetary atmospheric escape and photochemistry. We target Proxima Centauri,
    as it is an M-dwarf planet host known to flare frequently, and is also close enough (and therefore bright enough) to be
    observed in the NUV/optical. We will observe 23 nonconsecutive orbits to observe approximately five flares (95% confidence
    interval of 2-11 flares). In the case that no flares are detected, we will collect high S/N spectra of an M-dwarf. This
    is critical for improving M-dwarf models, which are increasingly used to correct for stellar contamination in transmission
    spectroscopy studies. This is the first study that targets multiwavelength flare observations from a single instrument,
    and promises to open the door to a new avenue by which to probe flare physics and their impacts on planetary atmospheres.
