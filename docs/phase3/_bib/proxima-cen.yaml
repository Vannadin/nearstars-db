  arxiv_id: '2306.03004'
  ads_bibcode: 2023MNRAS.526..263B
  title: Stratospheric dayside-to-nightside circulation drives the 3D ozone distribution on synchronously rotating rocky exoplanets
  authors:
  - Braam, Marrick
  - Palmer, Paul I.
  - Decin, Leen
  - Cohen, Maureen
  - Mayne, Nathan J.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1093/mnras/stad2704
  abstract: Determining the habitability and interpreting future atmospheric observations of exoplanets requires understanding
    the atmospheric dynamics and chemistry from a 3D perspective. Previous studies have shown significant spatial variability
    in the ozone layer of synchronously rotating M-dwarf planets, assuming an Earth-like initial atmospheric composition.
    We simulate Proxima Centauri b in an 11.2-d orbit around its M-type host star using a 3D coupled climate-chemistry model
    to understand the spatial variability of ozone and identify the mechanism responsible for it. We document a previously
    unreported connection between the ozone production regions on the photochemically active dayside hemisphere and the nightside
    devoid of stellar radiation and thus photochemistry. We find that stratospheric dayside-to-nightside overturning circulation
    can advect ozone-rich air to the nightside. On the nightside, ozone-rich air subsides at the locations of two quasi-stationary
    Rossby gyres, resulting in an exchange between the stratosphere and troposphere and the accumulation of ozone at the gyre
    locations. The mechanism drives the ozone distribution for both the present atmospheric level (PAL) and a 0.01 PAL O<SUB>2</SUB>
    atmosphere. We identify the hemispheric contrast in radiative heating and cooling as the main driver of the stratospheric
    dayside-to-nightside circulation. An age-of-air experiment shows that the mechanism also impacts other tracer species
    in the atmosphere (gaseous and non-gaseous phase) as long as chemical lifetimes exceed dynamical lifetimes. These findings,
    applicable to exoplanets in similar orbital configurations, illustrate the 3D nature of planetary atmospheres and the
    spatial and temporal variability that we can expect to impact spectroscopic observations of exoplanet atmospheres.
