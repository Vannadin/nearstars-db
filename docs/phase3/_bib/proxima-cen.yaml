  arxiv_id: '2409.07289'
  ads_bibcode: 2024PSJ.....5..228M
  title: Detectability Simulations of a Near-infrared Surface Biosignature on Proxima Centauri b with Future Space Observatories
  authors:
  - Metz, Connor O.
  - Kiang, Nancy Y.
  - Villanueva, Geronimo L.
  - Parenteau, M. N.
  - Kofman, Vincent
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.3847/PSJ/ad769d
  abstract: Telescope missions are currently being designed that will make direct imaging of habitable exoplanets possible
    in the near future, and studies are needed to quantify the detectability of biosignature features in the planet's reflectance
    spectrum. We simulated the detectability of a near-infrared-absorbing surface biosignature feature with simulated observations
    of the nearby exoplanet Proxima Centauri b. We modeled a biosignature spectral feature with a reflectance spectrum based
    on an anoxygenic photosynthetic bacterial species that has strong absorption at 1 μm, which could make it well suited
    for life on an M-dwarf-hosted planet. We modeled the distribution of this organism across the planet's surface based on
    climate states from a 3D general circulation model (GCM) that were Archean- and Proterozoic-like exo-Earth analogs. We
    included the GCM states' prognostically simulated water clouds and added organic haze into the Archean-like atmospheres.
    We simulated observations of these Proxima Centauri b scenarios with the LUVOIR-A and B telescope concepts, with LUVOIR-B
    serving as a proxy to the planned Habitable Worlds Observatory. We calculated the integration times necessary to detect
    the biosignature and found that it would be detectable on Proxima Centauri b if the organism is moderately abundant (greater
    than a 1%─4% global surface area coverage), as long as the atmosphere is transmitting in the wavelength range under consideration.
    Small amounts of methane, clouds, and haze do not greatly impede detectability. We found preliminary evidence that such
    a biosignature would be detectable on exoplanets within 15 pc, but further investigations are needed to corroborate this.
