  title: Connection between planetary He I λ10 830 Å absorption and extreme-ultraviolet emission of planet-host stars
  authors:
  - Sanz-Forcada, J.
  - López-Puertas, M.
  - Lampón, M.
  - Czesla, S.
  - Nortmann, L.
  - Caballero, J. A.
