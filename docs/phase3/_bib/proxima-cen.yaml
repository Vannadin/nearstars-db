  abstract: We discuss the current state of our analysis of the X-ray fluence experienced by 38 planets. Assuming hydrodynamic
    equilibrium we estimated the mass loss rates of these planets and found 85% of them exceed the mass escape rate of the
    Earth. At least 3 planets have an estimated mass escape rate of over 1 million times that of the Earth. We specifically
    examine Two systems, Proxima Cen, Wolf 359, and HD 189733 for which we have over 10 epochs of observations that determine
    the different environments these planets have experienced over the past 2 decades. We also examine the impact of individual
    flares and discuss the implications for like around M stars.
