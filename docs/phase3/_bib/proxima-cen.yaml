  ads_bibcode: 2024AAS...24345302K
  title: 'ATLAS - A Trail to Life Around Stars: The Variability of M Dwarfs from Hours to Months to Decades with the CTIO/SMARTS
    0.9m and TESS'
  authors:
  - Kar, Aman
  - Henry, Todd
  - Couperus, Andrew
  - Vrijmoet, Eliot
  - Jao, Wei-Chun
