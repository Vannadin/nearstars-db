  arxiv_id: null
  ads_bibcode: 2026Icar..44616885P
  title: Influence of albedo, radiation pressure, oblateness, and dust belt on the stability in the generalized elliptic restricted
    three-body problem
  authors:
  - Prasadu, Bangaru Rama
  - Mia, Rajib
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.1016/j.icarus.2025.116885
  abstract: 'In this paper, we investigate the motion of an infinitesimal body in the framework of the modified elliptic restricted
    three-body problem by taking into account additional forces due to albedo, radiation pressure, the oblateness of the primaries''
    and the dust belt. We obtain semi-analytical solutions of locations for non-collinear equilibrium points. The positions
    of non-collinear equilibrium points are shown graphically for different values of perturbation parameters. To investigate
    the motion of the infinitesimal body, we have chosen three real astronomical systems: the Sun─Mars, Proxima Centauri,
    and Sun─Saturn. The effects of different perturbation parameters on the position of non-collinear equilibrium points are
    analysed. The linear stability analysis of equilibrium points is performed by computing the critical mass ratio. Our findings
    indicate that the stability and instability of non-collinear equilibrium points are influenced by the mass ratio and specific
    perturbation parameters associated with each system.'
