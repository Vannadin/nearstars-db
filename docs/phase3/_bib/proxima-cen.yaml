  arxiv_id: '2506.19779'
  ads_bibcode: 2025ApJ...989...20M
  title: Role of Nonthermal Processes in the Quiescent and Active Millimeter Spectrum of a Young M Dwarf
  authors:
  - Mohan, Atul
  - Hauschildt, Peter H.
  - Fuhrmeister, Birgit
  - Mondal, Surajit
  - Airapetian, Vladimir
  - Wedemeyer, Sven
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/1538-4357/ade9bf
  abstract: Millimeter (mm) emission from F-M dwarfs (cool stars) primarily traces chromospheric activity, with thermal emission
    thought to dominate in quiescence. Despite the high chromospheric activity, the quiescent mm spectral fluence (mm-S(ν))
    of young (&lt;1 Gyr) M dwarfs (dMs) remains largely unexplored. We present the quiescent mm-S(ν) of a young dM, AD Leo,
    observed around 94 GHz using the Northern Extended Millimetre Array. The observed quiescent mm-S(ν) exceeds the thermal
    flux density from a 1D chromospheric model, constrained by optical-UV spectroscopic data, by up to a factor of 7. This
    indicates a quasi-steady nonthermal emission powered by suprathermal electrons, unlike in old (&gt;1 Gyr) cool stars,
    whose quiescent mm-S(ν) generally agree with 1D thermal models. The mm-brightness temperature spectral index (α<SUB>mm</SUB>;
    T<SUB>B</SUB>(ν)<inline-formula> <mml:math><mml:mspace></mml:mspace><mml:mo>∼</mml:mo><mml:mspace></mml:mspace><mml:msup><mml:mrow><mml:mi>ν</mml:mi></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:msub><mml:mrow><mml:mi>α</mml:mi></mml:mrow><mml:mrow><mml:mi>mm</mml:mi></mml:mrow></mml:msub></mml:mrow></mml:msup></mml:math>
    </inline-formula>) of AD Leo deviates by a factor of 3 from the α<SUB>mm</SUB>─T<SUB>eff</SUB> scaling law for old Sun-like
    stars (A. Mohan et al. 2022), while UV Ceti, an older M6V star, follows the trend. Also, we report a double-hump flare
    with second-scale variability in flux density and spectral index, and a frequency-rising nature with brightness increasing
    with frequency. The flare resembles certain solar events, but is unlike the second-scale events reported in dMs. The nonthermal
    flare humps suggest multiple injections of accelerated electrons. The mean flare luminosity (∼2─5 × 10<SUP>15</SUP> erg
    s<SUP>−1</SUP> Hz<SUP>−1</SUP>) and duration (18 ± 2 s) are comparable to flares reported in AU Mic and Proxima Cen, but
    100─1000 times weaker than the minutes-long dM flares observed by the South Pole Telescope.
