    has been done on quantum communication as a substitute to electromagnetic wave communication. There are also challenges
    with the signal loss and attenuation of frequencies at the receiver end. This paper presents the developments in nuclear
    space propulsion and future possibilities for interstellar travel, and future need for technological developments. The
    functionality of a thermal propulsion system is many conventions. There are many developments in the propulsion methods
    like electrical propulsion, Ion propulsion, Antimatter propulsion; however, the fission-based nuclear thermal propulsion
    advancements have an edge towards all the proposed methods.
