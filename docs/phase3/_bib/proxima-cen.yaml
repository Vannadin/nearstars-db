  title: The large-scale magnetic field of Proxima Centauri near activity maximum
  authors:
  - Baptiste Klein
  - Jean-François Donati
  - Élodie M. Hébrard
  - Bonnie Zaire
  - Colin P. Folsom
  - Julien Morin
  - Xavier Delfosse
