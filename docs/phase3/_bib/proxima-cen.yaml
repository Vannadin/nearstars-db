  ads_bibcode: 2025AJ....169..171H
  title: 'Bioverse: Giant Magellan Telescope and Extremely Large Telescope Direct Imaging and High-resolution Spectroscopy
    Assessment—Surveying Exo-Earth O<SUB>2</SUB> and Testing the Habitable Zone Oxygen Hypothesis'
  authors:
  - Hardegree-Ullman, Kevin K.
  - Apai, Dániel
  - Haffert, Sebastiaan Y.
  - Schlecker, Martin
  - Kasper, Markus
  - Kammerer, Jens
