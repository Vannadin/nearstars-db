  title: 'Spirals and Wobbles: A Complete Orbital Characterization of the Brown Dwarf LHS 1610 b using Astrometry and Precise
    Radial Velocities'
  authors:
  - Fitzmaurice, Evan
  - Stefansson, Gudmundur
  - Mahadevan, Suvrath
  - HPF Team
