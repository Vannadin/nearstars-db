- &id036
  arxiv_id: '2503.18538'
  ads_bibcode: 2025A&A...704A.141B
  title: 'The Phase Induced Amplitude Apodizer and Nuller: High transmission, high dispersion coronagraphy at 2λ/D'
  authors:
  - Blind, N.
  - Restori, N.
  - Chazelas, B.
  - Lovis, C.
  - Kühn, J.
  - Mordasini, C.
  year: '2025'
  pubdate: '2025-12-00'
  doi: 10.1051/0004-6361/202554541
  abstract: Context. Proxima Cen b is the prime target in a search for life around a nearby exoplanet based on characterization
    of its atmosphere in reflected light. Due to its very high star-companion contrast (≤10<SUP>−6</SUP>), High Dispersion
    Coronagraphy is the most promising technique to perform such a characterization. Aims. With a maximum separation of 37
    mas, Proxima b can be observed with one of the VLT's UT in the visible. This requires a coronagraph that provides high
    contrast (≤10<SUP>−4</SUP>) very close to the star (≤2 λ/D ) over a broad spectral range (∼30%)and with high transmission
    of the companion (≥50%). We searched for an optimal solution that benefits from the properties of single-mode fibers.
    Methods. We introduce the Phase Induced Amplitude Apodizer and Nuller (PIAAN), a coronagraphic integral field unit, designed
    to feed a diffraction-limited spectrograph. It uses pupil remapping optics with moderate apodization combined with a single-mode
    fiber integral field unit. It exploits the properties of single-mode fibers to null starlight without reducing the companion
    coupling. The study focuses on a proper tolerance analysis and proposes a wavefront optimization strategy. A prototype
    has been built to demonstrate its performance. Results. We show that the PIAAN can theoretically provide contrasts of
    7 · 10<SUP>−7</SUP> and a transmission of 72% at 2 λ/D over a bandwidth of 30%. We built and characterized a prototype
    and demonstrate the proposed wavefront control strategy. The prototype reached contrast levels of 3 · 10<SUP>−5</SUP>
    over the full bandwidth, as expected from the tolerance analysis. Conclusions. The new PIAAN coronagraph achieves performances
    that enable the study of exoplanets in reflected light. It is the main coronagraph candidate for the RISTRETTO instrument
    to observe Proxima Cen b on the VLT and its first technological milestone. It is also a solution of high interest for
    exploiting the spatial resolution and the large collecting area of future ELTs.
