  arxiv_id: null
  ads_bibcode: 2023Ge&Ae..63..937T
  title: Sub-Terahertz Radiation Features from the Flare of Proxima Cen
  authors:
  - Tsap, Yu. T.
  - Stepanov, A. V.
  - Kopylova, Yu. G.
  year: '2023'
  pubdate: '2023-12-00'
  doi: 10.1134/S001679322307023X
  abstract: A comparative analysis of stellar and solar flares at millimeter wavelength range has been carried out using the
    red dwarf Proxima Centauri as an example. The main attention is paid to the results of ALMA observations, which show that
    the flux of sub-THz radiation from stellar flares is an order of magnitude greater than that for solar flares, decreases
    with radiation frequency, and has a degree of linear polarization reaching tens of percent. We showed that the synchrotron
    mechanism is responsible for the sub-THz radiation, which assumes the acceleration of electrons to ultrarelativistic energies.
    The observed relationship between sub-THz, radio, and X-ray emission from stellar flares is discussed. The hypothesis
    about the important role of flare energy release in the dense layers of the stellar atmosphere is substantiated.
