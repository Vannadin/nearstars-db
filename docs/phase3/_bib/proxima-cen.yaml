  ads_bibcode: 2023AAS...24141608L
  title: Orbital Dynamics of the Proxima Centauri System
  authors:
  - Livesey, Joseph
  - Barnes, Rory
  - Deitrick, Russell
  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: The Proxima Centauri planetary system (Proxima hereafter), the nearest neighbor to our own Solar System at 1.3
    pc, consists of three confirmed exoplanets. The second, Proxima b, is a likely super-Earth residing within the circumstellar
    habitable zone. We analyze the stability of the two inner planets—Proxima d and b—using analytic calculations of Hill
    stability and N-body simulations with REBOUND. We find that for 100% of possible orbital configurations allowed by observational
    constraints, the ordering of the planets is preserved, but stability is not guaranteed. Using the MEGNO technique, we
    find that about 25% of 10,000 tested orbital configurations are unstable or chaotic. For stable configurations, we present
    simulations of the full (up to 7 Gyr) orbital history of all three worlds using the VPLanet software package that couple
    an equilibrium tidal model with a semi-analytic model of orbital evolution, thus accounting both for tidal forcing and
    planet-planet gravitational perturbations. The inner planets have been detected only via radial velocity spectroscopy,
    leaving their orbital elements and masses unconstrained. We therefore adopt a Monte Carlo approach, initializing each
    of 50 simulations with a unique orbital architecture. We present the range of changes in Proxima b's semi-major axis and
    eccentricity permitted by this model, as well as the distribution of possible tidal surface fluxes today. We find that
    the planet's final eccentricity after 7 Gyr of evolution can be non-zero, depending on the initial conditions. These results
    highlight the important role of orbital dynamics in the history of this potentially habitable world.
