  arxiv_id: '2312.05958'
  ads_bibcode: 2024MNRAS.527.9736Y
  title: ExoMol line lists - LIV. Empirical line lists for AlH and AlD and experimental emission spectroscopy of AlD in A<SUP>1</SUP>Π
    (v = 0, 1, 2)
  authors:
  - Yurchenko, Sergei N.
  - Szajna, Wojciech
  - Hakalla, Rafał
  - Semenov, Mikhail
  - Sokolov, Andrei
  - Tennyson, Jonathan
  - Gamache, Robert R.
  - Pavlenko, Yakiv
  - Schmidt, Mirek R.
  year: '2024'
  pubdate: '2024-02-00'
  doi: 10.1093/mnras/stad3802
  abstract: New ExoMol line lists AloHa for aluminium hydride (AlH and AlD) are presented improving the previous line lists
    WYLLoT. The revision is motivated by the recent experimental measurements and astrophysical findings involving the highly
    excited rotational states of AlH in its A <SUP>1</SUP>Π - X <SUP>1</SUP>Σ<SUP>+</SUP> system. A new high-resolution emission
    spectrum of 10 bands from the A <SUP>1</SUP>Π - X <SUP>1</SUP>Σ<SUP>+</SUP> system of AlD, in the region 17 300-32 000
    cm<SUP>-1</SUP> was recorded with a Fourier transform spectrometer, which probes the predissociative A <SUP>1</SUP>Π v
    = 2 state. The AlD new line positions are combined with all available experimental data on AlH and AlD to construct a
    comprehensive set of empirical rovibronic energies of AlH and AlD covering the X <SUP>1</SUP>Σ<SUP>+</SUP> and A <SUP>1</SUP>Π
    electronic states using the MARVEL approach. We then refine the spectroscopic model WYLLoT to our experimentally derived
    energies using the nuclear-motion code DUO and use this fit to produce improved line lists for <SUP>27</SUP>AlH, <SUP>27</SUP>AlD,
    and <SUP>26</SUP>AlH with a better coverage of the rotationally excited states of A <SUP>1</SUP>Π in the predissociative
    energy region. The lifetimes of the predissociative states are estimated and are included in the line list using the new
    ExoMol data structure, alongside the temperature-dependent continuum contribution to the photoabsorption spectra of AlH.
    The new line lists are shown to reproduce the experimental spectra of both AlH and AlD well, and to describe the AlH absorption
    in the recently reported Proxima Cen spectrum, including the strong predissociative line broadening. The line lists are
    included into the ExoMol data base www.exomol.com.
