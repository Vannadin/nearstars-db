  doi: null
  abstract: 'The motion of planetesimals from the feeding zone of planet Proxima Centauri c was studied in [1-3]. The gravitational
    influence of the star and planets c and b was taken into account. The size of the feeding zone is discussed in [1]. After
    hundreds of Myrs, some planetesimals could still move in elliptical resonant orbits (e.g. at the resonances 1:1, 5:4,
    3:4) inside the feeding zone of planet c that had been mainly cleared from planetesimals. The number of such left planetesimals
    was greater at small eccentricities. Based on the amount of planetesimals ejected into hyperbolic orbits, it was concluded
    [2] that the semi-major axis of the orbit of planet c could decrease by a factor not less than 1.5 during accumulation
    of this planet. The probability of a collision of a planetesimal initially located in the feeding zone of planet c with
    inner planet b was about 2·10<SUP>-4</SUP> and 10<SUP>-3</SUP> at initial eccentricity of planetesimals equal to 0.02
    or 0.15, respectively [2]. The above values of the probabilities were greater than the probability of a collision with
    the Earth of a planetesimal migrated from the zone of the giant planets in the Solar System. The latter probability (per
    one planetesimal) was typically less than 10<SUP>-5</SUP> [4-5]. A lot of icy material and volatiles could be delivered
    to planets b and d. About 90% of the planetesimals that first reached 500 AU from the star, for the first time reached
    1200 AU (the Hill radius) from the star in less than 1 Myr [3]. The studies were carried out under government-financed
