  doi: 10.5194/egusphere-egu23-5578
  abstract: Many stars of different spectral types with planets in the habitable zone are known to emit flares. Until now,
    studies that investigated the long-term impact of stellar flares and associated Coronal Mass Ejections (CMEs) assumed
    that the planet's interior remains unaffected by interplanetary CMEs, only considering the effect of energetic particles
    interactions on the atmosphere of planets. Here, we show that the magnetic flux carried by flare-associated CMEs results
    in planetary interior heating by ohmic dissipation and leads to a family of new interior-exterior interactions. We construct
    a physical model to study this effect and apply it to the TRAPPIST-1 and Proxima Centauri stars whose flaring activity
    has been constrained by Kepler and TESS observations. We pose our model in a stochastic manner to account for uncertainty
    and variability in major input parameters. Our results suggest that the heat dissipated in the silicate mantle is both
    of sufficient magnitude and longevity to drive geological processes and hence facilitate volcanism and outgassing particularly
    for the innermost planets. Furthermore, our model predicts that Joule heating can further be enhanced for planets with
    an intrinsic magnetic field compared to those without. The associated volcanism and outgassing may continuously replenish
    the atmosphere and thereby mitigate the erosion of the atmosphere caused by the direct impact of flares and CMEs.
