  doi: null
  abstract: In the near future, extremely large ground-based telescopes (ELTs) will revolutionize our search for habitable
    and potentially life-harboring terrestrial exoplanets. These telescopes, equipped with high-resolution spectrometers,
    will allow us to probe the atmospheres of nearby transiting and non-transiting terrestrial exoplanets. While previous
    studies have focused mainly on estimating the detectability of O<SUB>2</SUB> with these telescopes, other gases are needed
    to contextualize O<SUB>2</SUB> in its environment. We have previously shown that other gases such as CH<SUB>4</SUB>, CO<SUB>2</SUB>,
    and H<SUB>2</SUB>O may be accessible for transiting planets; however, the detectability of these gases has not been explored
    for non-transiting terrestrial planets. This study presents simulations on the detectability of various molecular features
    in non-transiting terrestrial exoplanet atmospheres observed with ELTs. We updated our ELT observation simulation pipeline
    to include functionality for estimating the detectability of gases for non-transiting planets. We found that H<SUB>2</SUB>O
    is the most accessible molecule, and that O<SUB>2</SUB>, CH<SUB>4</SUB>, and CO<SUB>2</SUB> may also be detectable for
    non-transiting targets. Our results highlight Proxima Centauri b as the most promising target within the observational
    scope of a single ELT. However, other nearby targets may become more accessible by combining data from multiple ELTs.
