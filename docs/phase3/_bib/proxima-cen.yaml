  doi: 10.1051/0004-6361/202142337
  abstract: 'Context. Proxima Centauri is the closest star to the Sun. This small, low-mass, mid M dwarf is known to host
    an Earth-mass exoplanet with an orbital period of 11.2 days within the habitable zone, as well as a long-period planet
    candidate with an orbital period of close to 5 yr. <BR /> Aims: We report on the analysis of a large set of observations
    taken with the ESPRESSO spectrograph at the VLT aimed at a thorough evaluation of the presence of a third low-mass planetary
    companion, which started emerging during a previous campaign. <BR /> Methods: Radial velocities (RVs) were calculated
    using both a cross-correlation function (CCF) and a template matching approach. The RV analysis includes a component to
    model Proxima''s activity using a Gaussian process (GP). We use the CCF''s full width at half maximum to help constrain
    the GP, and we study other simultaneous observables as activity indicators in order to assess the nature of any potential
    RV signals. <BR /> Results: We detect a signal at 5.12 ± 0.04 days with a semi-amplitude of 39 ± 7 cm s<SUP>‒1</SUP>.
    The analysis of subsets of the ESPRESSO data, the activity indicators, and chromatic RVs suggest that this signal is not
    caused by stellar variability but instead by a planetary companion with a minimum mass of 0.26 ± 0.05 M<SUB>⊕</SUB> (about
    twice the mass of Mars) orbiting at 0.029 au from the star. The orbital eccentricity is well constrained and compatible
    with a circular orbit. <P />Based on Guaranteed Time Observations collected at the European Southern Observatory (ESO)
    by the ESPRESSO Consortium under ESO programmes 1102.C-0744, 1102.C-0958, 1104.C-0350, and 106.21M2.'
