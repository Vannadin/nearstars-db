  ads_bibcode: 2023hw...prop...48H
  title: Modeling Land Planet Habitability and Spectra in M-Dwarf Stellar Systems
  authors:
  - Hartwick, Victoria
  year: '2023'
  pubdate: '2023-00-00'
  doi: null
  abstract: '"The goal of this proposal is to characterize the habitability of arid, dust dominated land planets orbiting
    late-stage M dwarfs and identify robust spectral features unique to this planetary type. The first in depth characterization
    of terrestrial exoplanets utilizing ground-based and space-based observational campaigns will likely focus on nearby M
    stars with terrestrial planets in the habitable zone (HZ). Previous studies have demonstrated that the prolonged contraction
    phase of M-stars and subsequent XUV and x-ray irradiation could rapidly desiccate planets in the HZ, making land planets
    a likely planetary type (Luger+2015, Tian+2015). At the same time, land planets with limited planetary water vapor may
    be resistant to the runaway greenhouse (Abe+2011) and atmospheric dust could provide shading on the permanent dayside
    (Boutle+2020). Both factors encourage a more in-depth study of land planet habitability. However, there has been limited
    research exploring the radiative impact of atmospheric dust, which should increase with planetary aridity, and the complex
    non-linear coupling between the dust and hydrological cycles. For planets in the HZ of G stars, dust is the most significant
    source of climate forcing and impacts the spectra (Hartwick+2022). <P />Objectives <P />The major objective of this work
    is to provide an in-depth study of the dust cycle of land planets orbiting M-stars, its connections to cloud microphysics,
    and the production of stable habitable climates with identifiable spectral features. The proposed work contains two major
    objectives: <P />1. Characterize the climate and habitability of dry land planets with a fully interactive radiatively
    active dust cycle, including radiative feedbacks on planetary climate and potential spectral variations and phase dependence
    due to an evolving atmospheric dust field <P />2. Characterize the climate and habitability of "wet" planets with the
    hydrological cycle coupled to the dust cycle, including the formation of water clouds and their impact on surface conditions
    including precipitation rates. <P />For each objective, research would focus on the stability of the atmosphere against
    collapse, the tendency for systems to sequester water in nightside ice sheets, the surface thermal environment and water
    availability, fractional habitability and most likely habitability scenario (e.g. eye or terminator habitability), and
    significant identifying spectral features (either specific absorption bands or photometric, color-color observations).
    <P />Methods <P />To achieve the stated objectives, we will use the NASA Ames Mars Global Climate Model. Simulations will
    quantify the relative importance of dust and water clouds on the climate and spectrum for terrestrial planets in the habitable
    zone of Trappist-1, Proxima Centauri, and TOI-700. We will use the PICASO software to generate 3D, time varying reflected
    light and transmission spectra. Our goal is to determine the net impact of dust and water on land planet climates and
    habitability, and identify characteristic spectral features or false positives, including optically thick cloud decks
    or flat spectra. <P />Relevance <P />This proposal to explore the potential habitability and spectra of land planets is
    relevant to the Habitable Worlds Research Program element. It would directly address statements in the program element
    including "identify[ing] the characteristics and the distribution of potential habitable environments in the Solar System
    and Beyond" and "determining processes and condition that create and maintain habitable environments". The proposal would
    generate 3D, time-varying reflected light and transmission spectra with a focus on the impact of dust and cloud cover
    on spectral climate signifiers and biosignature detection, which would aid in the "identification of biosignatures for
    in situ and remote sensing applications".'
