  title: 'Plasmasphere formation at terrestrial rocky exoplanets around M-Dwarf stars and its detectability: Possible evidence
    for the intrinsic magnetic field and thick atmosphere'
  authors:
  - Seki, Kanako
  - Nakayama, Akifumi
  - Sakata, Ryoya
  - Nishioka, Tomoaki
  - Imamura, Takeshi
  - Sakai, Shotaro
  - Terada, Naoki
  - Keika, Kunihiro
  - France, Kevin
  - Brain, David
  year: '2022'
  pubdate: '2022-12-00'
  doi: null
  abstract: When a planet has a strong dipole magnetic field and rapid rotation, superposition of the stellar wind induced
    and corotation electric fields results in the tear-drop-shaped region of the closed drift, where planetary ionized atmosphere
    can fill the magnetic flux tubes along the field lines. The region is characterized with cold dense planetary plasma and
    called as the plasmasphere. Since the plasmasphere formation requires the existence of both the thick atmosphere and global
    intrinsic magnetic field, the observation of plasmasphere can provide possible evidence and clues of the exoplanetary
    atmosphere and intrinsic magnetic field. In this study, we estimate the size and ion density of terrestrial exoplanetary
    plasmasphere and assess its detectability by transit observations based on the knowledge of the solar system planets.
    <P />M-Dwarf stars have the habitable zone (HZ) close to the host star, and because of the proximity, tidal locking is
    possible for most planets in HZ of K and M dwarf stars. Even if an exoplanet is tidally locked and its rotation is slow,
    rapid rotation of the atmosphere (superrotation) can provide an alternative source of upper atmospheric rotation, one
    of necessary condition for the plasmasphere formation. Here we consider the cases when the upper atmosphere also exhibit
    the supperroation and rocky exoplanets possess the Venus-like CO2-rich atmosphere. As stellar radiation inputs, we used
    X-ray and ultraviolet (XUV) radiation of the Proxima Centauri (PC). The same intrinsic dipole magnetic field strength
    as that of Earth is assumed and two cases of planetary mass of the imaginary exoplanets, i.e., Venusian mass or 2 times
    of Earth mass, are considered. <P />The results show that the main ion species in the ionosphere and plasmasphere is C+.
    The plasmasphere size estimation show that Earth/Venus-like magnetized exoplanet can have a plasmasphere with a size of
    4-6 times of the planetary radius. The size of the plasmasphere depends on the superrotation speed of the thermosphere,
    ionospheric conductance, stellar wind dynamic pressure, and IMF cone angle. Estimation also indicates that the FUV absorption
    by plasmaspheric C+ ions can cause a few to several percent of the transit depth depending on the planetary size and plasmaspheric
    C+ density, which might be observable by space telescopes.
