- &id081
  arxiv_id: '2407.15937'
  ads_bibcode: 2024PASP..136h4402D
  title: Toward Exoplanet Transit Spectroscopy Using JWST/MIRI's Medium Resolution Spectrometer
  authors:
  - Deming, Drake
  - Fu, Guangwei
  - Bouwman, Jeroen
  - Dicken, Daniel
  - Espinoza, Nestor
  - Glasse, Alistair
  - Greene, Thomas
  - Kendrew, Sarah
  - Law, David
  - Lustig-Yaeger, Jacob
  - Garcia Marin, Macarena
  - Schlawin, Everett
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.1088/1538-3873/ad6692
  abstract: The Mid-Infrared Instrument Medium Resolution Spectrometer (the MRS) on JWST has potentially important advantages
    for transit and eclipse spectroscopy of exoplanets, including lack of saturation for bright host stars, wavelength span
    to longward of 20 µm, and JWST's highest spectral resolving power. We here test the performance of the MRS for time series
    spectroscopy by observing the secondary eclipse of the bright stellar eclipsing binary R Canis Majoris. Our observations
    push the MRS into saturation at the shortest wavelength, more than for any currently known exoplanet system. We find strong
    charge migration between pixels that we mitigate using a custom data analysis pipeline. Our data analysis recovers much
    of the spatial charge migration by combining detector pixels at the group level, via weighting by the point-spread function.
    We achieve nearly photon-limited performance in time series data at wavelengths longward of 5.2 µm. In 2017, Snellen et
    al. suggested that the MRS could be used to detect carbon dioxide absorption from the atmosphere of the temperate planet
    orbiting Proxima Centauri. We infer that the relative spectral response of the MRS versus wavelength is sufficiently stable
    to make that detection feasible. As regards the secondary eclipse of this Algol-type binary, we measure the eclipse depth
    by summing our spectra over the wavelengths in four channels, and also measuring the eclipse depth as observed by TESS.
    Those eclipse depths require a temperature for the secondary star that is significantly hotter than previous observations
    in the optical to near-IR, probably due to irradiation by the primary star. At full spectral resolution of the MRS, we
    find atomic hydrogen recombination emission lines in the secondary star, from principal quantum levels n = 7, 8, 10, and
    14.
