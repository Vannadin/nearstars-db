- &id041
  arxiv_id: '2509.07118'
  ads_bibcode: 2025AJ....170..284B
  title: On the Detection of Exorings in Reflected Light with JWST NIRCam
  authors:
  - Bowens-Rubin, Rachel
  - Limbach, Mary Anne
  - Hopper, Sam
  - Stephenson, Klaus Subbotina
  - Garza, Matson
  - Fletcher, Leigh N.
  - Hedman, Matthew
  year: '2025'
  pubdate: '2025-11-00'
  doi: 10.3847/1538-3881/ae0a2b
  abstract: When directly imaging a cold-giant exoplanet hosting a ring system, the reflected light from the rings can outshine
    the planet's thermal emission and reflected light in the near-infrared. Consequently, an exoring may be detectable at
    a significantly lower contrasts than is required to image the exoplanet itself. Here we investigate the detectability
    of exorings in near-infrared reflected light using NIRCam coronagraphy PanCAKE simulations of two nearby mature stars,
    Proxima Centauri and Tau Ceti. Under the most favorable assumptions, we find JWST 2 μm NIRCam coronagraphy (F200W + MASK335R)
    is capable of detecting an exoring system with a radius of 2.8 times that of Saturn's A-ring for planets on an orbit with
    a = 1.3─1.9 au. Broader simulations indicate that NIRCam can probe large planetary ring systems around mature exoplanets
    comparable in size to circumplanetary disks, which can reach up to 1000 times the radius of Saturn's A-ring. These results
    suggest that NIRCam F200W coronagraphy could serendipitously detect large exorings in reflected light under the right
    conditions. A combined analysis of F200W coronagraphic observations of confirmed exoplanets could provide the first empirical
    constraints on the occurrence rate of large exorings. Confirming the existence and frequency of exorings spanning the
    scale between circumplanetary disks and the rings of the solar system giant planet could offer new insight into the formation,
    evolution, and architecture of planetary systems.
