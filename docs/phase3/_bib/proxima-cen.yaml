  ads_bibcode: 2023AAS...24143905J
  title: 'Bridging The UV Gap: Testing The UV Predictions of Flare Models For M Stars'
  authors:
  - Jackman, James
  - Shkolnik, Evgenya
  - Million, Chase
  - Loyd, Parke
  - Richey-Yowell, Tyler
  - Fleming, Scott
  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: Stellar flares are explosive phenomena that release radiation across the entire electromagnetic spectrum. Their
    far-UV emission can dissociate atmospheric species and exacerbate atmospheric erosion. Yet, the near-UV flux may be necessary
    for the emergence of life on rocky planets around low-mass stars such as Proxima Centauri, LHS 3384 and TRAPPIST-1. A
    detailed knowledge of the UV energies and rates of flares is therefore essential for our understanding of the habitability
    of M dwarf systems. However, measurements of UV flare rates can require expensive campaigns with space-based instruments,
    limiting such measurements to individual active stars. To get around this, habitability studies instead often use UV rates
    based on extrapolations from white-light studies with TESS. Despite their use in contemporary habitability studies, such
    extrapolations are untested and as such their accuracy remains unconstrained. To this end, we are combining TESS optical
    photometry with archival HST and GALEX spectroscopy and photometry of M dwarfs to test the UV predictions of habitability
    and exoplanet atmosphere studies. We will show how white-light flare studies underestimate the UV rates of flares, how
    current models neglect the energy contribution from UV emission lines, and the impact our results have on our current
    understanding of the UV environments and habitability of terrestrial exoplanets around low-mass stars.
