  arxiv_id: '2409.01401'
  ads_bibcode: 2024MNRAS.533L..76S
  title: The time evolution of the ultraviolet habitable zone
  authors:
  - Spinelli, R
  - Borsa, F
  - Ghirlanda, G
  - Ghisellini, G
  - Haardt, F
  - Rigamonti, F
  year: '2024'
  pubdate: '2024-09-00'
  doi: 10.1093/mnrasl/slae064
  abstract: For stars hosting Circumstellar Habitable Zone (CHZ) exoplanets, we investigate the time evolution of their ultraviolet
    habitable zone (UHZ), the annular region around a star where an exoplanet could experience a suitable ultraviolet environment
    for the presence and emergence of life, and the possible intersection of the UHZ with the CHZ. To estimate their ultraviolet
    (UV) luminosity evolution, and therefore the evolution of their UHZ, we analyse Swift-UV/Optical telescope observations
    and adopt the near-UV luminosity evolutionary tracks derived using GALEX observations of young moving groups. We find
    that an intersection between CHZ and UHZ could exist (or have existed) around all stars of our sample at different epochs,
    except for the coldest M-dwarfs (temperature $\lesssim 2800$ K, e.g. Trappist-1). For hotter M-dwarfs the formation of
    ribonucleic acid precursors through cyanosulfidic chemistry triggered by near-UV radiation could occur during the first
    $\simeq$1-2 Gyr. The radial extension and time duration of the CHZ-UHZ intersection increase with the stellar effective
    temperature and the exoplanet atmospheric transmissivity at near-UV wavelengths. Within our sample, Proxima Centauri represents
    a golden target for the quest of life outside the Solar system because it experienced a long-lasting and more extended,
    compared to similar M-dwarfs, CHZ-UHZ intersection.
