  arxiv_id: '2503.21890'
  ads_bibcode: 2025ApJ...982...43B
  title: The Proxima Centauri Campaign—First Constraints on Millimeter Flare Rates from ALMA
  authors:
  - Burton, Kiana
  - MacGregor, Meredith A.
  - Osten, Rachel A.
  - Howard, Ward S.
  - Weinberger, Alycia J.
  - Shkolnik, Evgenya
