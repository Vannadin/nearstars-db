  doi: null
  abstract: '*EMBARGOED* <P />We present the follow-up analysis (Crouse et al. in prep) of the discovery of the fourth closest
    known terrestrial exoplanet in the habitable zone by Kossakowski et al. (2022) using radial velocity measurements. We
    use two general circulation models (GCMs) to simulate various atmosphere and surface scenarios and to assess the potential
    habitability of this newly discovered non-transiting terrestrial world. ExoCAM was used to simulate land and aqua (with
    a slab ocean)-planet scenarios and ROCKE-3D for aqua-planet scenarios assuming both, slab and dynamic ocean models. Our
    results suggest that this newly discovered planet could maintain temperate surface conditions and surface liquid water
    for a large range of atmospheric compositions and surface types, similarly to Proxima Cen b, TRAPPIST-1 e and TOI 700
    d. Thermal phase curve simulations with the Planetary Spectrum Generator (PSG) show phase dependent variability of the
    order of 10 ppm only, far below the sensitivity of current infrared space observatories such as JWST. With the rapidly
    increasing number of terrestrial planets in the habitable zone that are not transiting, it therefore becomes crucial to
    develop instruments and techniques to characterize them.'
