  ads_bibcode: 2025AAS...24523708C
  title: The Long-Term Stellar Activity Cycles and Magnetic Predictability of Nearby M Dwarfs
  authors:
  - Couperus, Andrew
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: M dwarfs that host exoplanets — such as TRAPPIST-1 and Proxima Centauri - can demonstrate remarkably strong stellar
    activity, with a variety of potentially significant impacts on the orbiting planets and their atmospheres. Understanding
    the evolution of a planet's habitability therefore depends on reconstructing the evolution of its host star activity.
    However, the complex nature of M dwarfs has thus far prevented robust and precise determinations of this activity evolution.
    Here I present results from two projects examining this area. The first effort is an investigation into 36 M dwarf wide
    binaries with identical 'twin' components. Key subsets have been observed for rotation periods, long-term optical photometry,
    multi-epoch Hα equivalent widths, X-ray luminosities, time series radial velocities, and speckle imaging. Results show
    many twin stars behave identically with very congruent measurements, while other notable cases host intriguing fraternal
    behavior with large differences in activity and/or rotation. One such case, NLTT 44989 AB, has a ~6x mismatch in rotation
    rate and ~40x difference in X-ray luminosity between components despite them being twins in mass/age/composition/environment
    — this system constrains our understanding of spindown and activity evolution in fully convective M dwarfs. A plethora
    of possibilities may explain this unusual behavior, including star-planet interactions. The second effort considers long-term
    photometric stellar activity cycles observed over 25 years in a sample of several hundred nearby M dwarfs. I report approximately
    ~50 confident cycle signals and determine cycle periods for roughly half of these, significantly increasing the number
    of known cycles in such stars. Some periods are only a few years long while other cases show continuing brightness trends
    spanning a quarter-century. Most notable is the discovery of some fully convective stars hosting extremely long duration
    cycles with periods beyond two decades, informing our understanding of magnetic dynamos in these common objects. This
    effort has been supported by the NSF through grant AST-2108373, NASA through Chandra grant G01-22-13B, NOIRLab through
    proposal 2023A-549259, and via observations made possible by the SMARTS Consortium.
