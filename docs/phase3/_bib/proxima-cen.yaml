    investigation requires missions to capture images of the deep space and develop conclusive evidence for the deep space
    events. The nearest star Proxima Centauri is at a distance of 4.24 light-years from the earth, and mission to such a star
    with current propulsion systems takes many years. There limitations with the deep space communications with the ground
    station, and space weather. The alternative to such a futuristic mission can be Nuclear Space propulsion, which can reduce
