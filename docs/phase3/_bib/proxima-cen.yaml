  ads_bibcode: 2024xrp..prop...74M
  title: 'Faking Earth: The Role of Stellar Flares on Abiotic Oxygen Production'
  authors:
  - MacGregor, Meredith Ann
  year: '2024'
  pubdate: '2024-00-00'
  doi: null
  abstract: Astronomers evaluate the potential for an exoplanet to host life by determining whether it is in the 'habitable
    zone,' a range of <P />distances from the host star where an Earth-like planet's surface temperature would allow for liquid
    water to be present. We know <P />of roughly 60 planets that are in the habitable zone of their stars. These are our best
    chance to search for life in the Universe, and the <P />targets of upcoming missions to characterize exoplanet atmospheres.
    However, the majority (&gt;70%) of these potentially habitable <P />planets orbit M-type stars - stars much smaller and
    cooler than our Sun that are well-known for their frequent outbursts of radiation <P />or 'flares.' During these events,
    a star can brighten by a factor of &gt;10,000x leading to questions about whether any of these planets are <P />truly
    habitable to life as we know it on Earth. In addition, habitable zone planets around M dwarfs likely experience an extended
    early <P />steam atmosphere stage that leads to photolysis of water vapor and loss of hydrogen due to high XUV fluxes.
    This process could lead to <P />massive O2 atmospheres of up to 300 bars, but subsequent work has shown that reactions
    with existing magma oceans or subsequent <P />solid crustal layers can draw down O2 to levels of a few bars. Similar processes
    have been suggested for Venus, where the lack of excess <P />atmospheric O2 is plausibly explained by extensive reaction
    with crustal materials and continued loss to space. <P />While the effects of stellar flares on modern Earth-analog atmospheres
    around M dwarfs have been studied, they have not yet been <P />included in models of water loss and abiotic O2 production
    from early steam atmospheres and will affect both the abundance of O2 <P />and the production of O3 in an atmosphere.
    New data on M dwarf flare activity as well as new models for early planetary atmospheres <P />suggest that the question
    of habitability for M dwarf planets should be revisited. Here, we propose to leverage multi-wavelength <P />observations
    of M dwarf flares to constrain and inform development of models of O2 abundance for exoplanets. We will begin by <P />analyzing
    simultaneous flare observations spanning radio through X-ray wavelengths (including ALMA, TESS, HST, Swift, Chandra, <P
    />and ground-based optical) of the five closest (&lt;3.5 pc) mid-M dwarfs, including our nearest neighbor Proxima Centauri.
    Beyond these <P />five stars that have extensive multi-wavelength coverage, we will leverage archival data from ALMA,
    TESS, and HST for all other M <P />dwarfs that are known exoplanet host stars. The end result of this analysis will be
    a new database of flare frequencies and energies <P />across the electromagnetic spectrum to connect with our modeling
    efforts. An existing atmosphere-interior exchange model that <P />accounts for early XUV-driven escape will be modified
    to include the stochastic UV input due to stellar flares, which will contribute <P />to atmospheric water vapor photolysis
    and hydrogen escape. Models will produce evolution curves for atmospheric H2O, O2 and <P />photochemically-produced O3.
    Atmosphere models will then be used to produce model transit spectra for nearby M-dwarf terrestrial <P />planets. <P />This
    proposed project is relevant to the Exoplanets Research Program (XRP) by investigating "exoplanet interactions with their
    host <P />stars and/or of host star properties that directly impact our understanding of exoplanetary systems" and "the
    chemical and physical <P />processes of exoplanets (including the state and evolution of their surfaces, interiors, and/or
    atmospheres)." We critically need to <P />develop a deeper understanding of how stars influence exoplanet atmospheres
    in order to prepare for upcoming JWST observations <P />that will aim to detect chemical species in these same atmospheres.
