  doi: 10.1016/j.pss.2024.105866
  abstract: A climate model is developed for Earth climate history simulations or snapshots of possible conditions on Earthlike
    exoplanets. It includes estimates for shortwave and longwave optical thickness based on data from Venus, Earth, and Mars;
    expressions for atmospheric shortwave absorption and surface convective heat loss; climate feedbacks due to water vapor,
    ice-albedo, clouds, and lapse rate; and a new model for planetary and surface albedo which takes account of surface cover,
    Rayleigh scattering, and differing wavelength fractions due to primary spectral class. While somewhat complex, it is still
    orders of magnitude faster than full-spectrum methods or radiative-convective convergence. The model can be modified for
    use with tidally locked planets, and is here applied to Proxima Centauri b as an example.
