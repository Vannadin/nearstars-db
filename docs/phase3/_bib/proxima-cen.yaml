  title: The Toppieshoek Restoration Project
  authors:
  - Carruthers, Elizabeth Jane
  year: '2024'
  pubdate: '2024-09-00'
  doi: null
  abstract: This paper describes a project initiated by the Magaliesberg Association for Culture and Heritage in collaboration
    with the Tshwane University of Technology. The endeavour is unique in combining astronomical history and African archaeology.
    <P />The occurrence of two adjacent heritage sites on the university rural property, named "Toppieshoek", close to Hartbeespoort
    Dam, is both fortunate and fortuitous. One site is the former Leiden University Observatory Southern Station, the other
    an Early Iron Age archaeological site dating from AD 350. The former recalls 20th-century international scientific collaboration,
    the latter reveals the first arrival of Black immigrants into South Africa. Assisted by astronomers and archaeologists,
    the project's aim has been to gain recognition for these sites and initiate their restoration for educational use and
    as a public legacy. <P />Toppieshoek is currently used for student recreation and for many decades the heritage sites
    have been neglected. Once restored and appropriately conserved and used, they offer ideal opportunities for heritage appreciation
    and education at an institution focussed on applied technical education. <P />In 1923, collaboration between Robert Innes,
    Director of the Union Observatory in Johannesburg and Willem de Sitter, Director of the Leiden University Observatory,
    allowed astronomers from each institution to use the others' facilities. This arrangement resulted in 55 years of productive
    observations, particularly of binary and variable stars. Initially the Dutch visitors used the Franklin-Adams 10-inch
    telescope built in 1900 to photograph Franklin Adams's Sky Chart and on which Innes had famously discovered Proxima Centauri.
    However, in 1927 de Sitter's Deputy Director, Ejnar Hertzsprung, commissioned the 16-inch Rockefeller Twin Astrograph
    specifically for use in South Africa. Owing to its rigorous specifications and the outbreak of World War II it was not
    fully commissioned until 1947. In the 1950s both instruments were moved to Toppieshoek because of light pollution. Theodore
    Walraven's state-of-the-art Light Collector and 5-colour photometer were also erected on the site, and it was formally
    named the Leiden University Observatory Southern Station in 1957. When Leiden moved its operation to Chile 21 years later,
    the historically important Franklin-Adams and Twin Astrograph were donated to the Department of Education. However, they
    were never put to their intended educational purpose. <P />The archaeological site was discovered in the 1970s by Arnout
    van Genderen, resident astronomer. As a competent archaeologist himself, he recognised the significance of the many artefacts
    he found in the grounds of the Southern Station Observatory and drew them to the attention of professional archaeologists
    at the University of the Witwatersrand. For many years this extremely important site was excavated by a team directed
    by Revil Mason and later by Thomas Huffman. The site yielded evidence of numerous dwellings, iron smelting and forging,
    ochre grindstones, as well as seashells, ostrich-shell beads and a number of ceremonial human burials. The site is of
    incomparable value to South African heritage and the knowledge of early societies in the region. The incidental link between
    astronomy and archaeology has been of great value to South Africa in extending our knowledge of the southern skies and
    ancient societies.
