  ads_bibcode: 2023NatSR..1316114S
  title: Interstellar photovoltaics
  authors:
  - Schopp, Nora
  - Abdikamalov, Ernazar
  - Mostovyi, Andrii I.
  - Parkhomenko, Hryhorii P.
  - Solovan, Mykhailo M.
