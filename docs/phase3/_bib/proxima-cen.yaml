- &id079
  arxiv_id: null
  ads_bibcode: 2023eas..conf.1735O
  title: UV flare statistics of Proxima Centauri
  authors:
  - Odert, Petra
  - Abrevaya, Ximena C.
  - Leitzinger, Martin
  year: '2023'
  pubdate: '2023-07-00'
  doi: null
  abstract: Proxima Centauri is an active flare star of spectral type M5.5Ve which hosts an Earth-mass planet in its habitable
    zone. Stellar magnetic activity may have severe consequences for planets, as it induces atmospheric loss processes, alters
    the atmospheric chemistry, and may affect the possible origin and evolution of life. Ultraviolet (UV) radiation is of
    special importance, not just because it is the main driver of photochemistry in the atmosphere, but also because of its
    likely biological effects (for instance, on simple life forms such as microorganisms), as significant amounts of flux
    can reach the planetary surface even in the presence of an atmosphere. Thus, to assess the potential habitability of a
    planet, the host star's UV emission, including flares, needs to be well constrained. During stellar flares, UV emissions
    can be enhanced by several orders of magnitude. Here we present UV flare statistics of Proxima Centauri from about 60
    hours of observations by XMM-Newton's Optical Monitor (OM) instrument. The observations were conducted in the U-band and
    were taken in fast mode with a time resolution of ten seconds. We detect about 50 flares with peak flux enhancements larger
    than 50% in these data. As the U-band filter approximately covers the UVA (300-400 nm) range, we extrapolate the peak
    fluxes and flare energies to the UVC (200-280 nm) range using simple blackbody flare models, as UVC radiation is of biological
    relevance given that these wavelengths are particularly harmful to life. Finally, we compare our results with published
    flare statistics in other wavelength ranges.
