  title: 'Analysis of stability of non-collinear equilibrium points: Application to Sun-Mars and Proxima Centauri systems'
  authors:
  - Mia, Rajib
  - Prasadu, Bangaru Rama
  - Abouelmagd, Elbaz I.
  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.1016/j.actaastro.2022.12.031
  abstract: 'In the present work, we employ the modified elliptic restricted three-body problem by considering some additional
    perturbed forces such as: the radiation pressure, the primaries'' oblateness, and the effect of dust belt for studying
    the dynamical motion of the infinitesimal body. The semi-analytical solutions for the locations of non-collinear equilibrium
    points are obtained. The proposed model is applied to real astronomical systems. Thus, the Sun-Mars and the Proxima Centauri
    systems are used to estimate numerically and graphically the locations of these points in both systems at different values
    of perturbation parameters. In this context, the critical mass values are evaluated for both systems to analyze the stability
    motion of the infinitesimal body around the locations of equilibrium points and find the stability range of these locations.
    We demonstrate that the stability of non-collinear points in both systems depends on the parameter of mass ratio values
    of its own system. It is observed that the locations of these points and their stability will be affected significantly
    due to the changes in the values of perturbation parameters.'
