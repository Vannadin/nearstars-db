  abstract: We discuss the current state of our analysis of the X-ray fluence experienced by 38 planets. Assuming hydrodynamic
    equilibrium we estimated the mass loss rates of these planets and have found 85% of them exceed the mass escape rate of
    the Earth. At least 3 planets have an estimated mass escape rate of over 1 million times that of the Earth. We specifically
    examine three systems, Proxima Cen, Wolf 359, and HD 189733, for which we have over 10 epochs of observations that determine
    the different environments these planets have experienced over the past 2 decades. In addition, we focus on GJ 273 b and
    TRAPPIST d, e, f, and g, all of which have an Earth similarity index of &gt; 0.5. We also examine the impact of individual
    flares on their hosted planets and discuss the implications for life around M stars.
