- arxiv_id: null
  ads_bibcode: 2024eas..conf.2378P
  title: A short story of high-fidelity spectrographs in exoplanets research
  authors:
  - Pepe, Francesco
  year: '2024'
  pubdate: '2024-07-00'
  doi: null
  abstract: In observational astronomy, scientific discoveries are frequently linked to technological advancement. This is
    also, if not in particular, the case for exoplanet research, a field of astronomy born with the discovery of 51 Peg b
    only in 1995, that was in turn enabled by significant advancements in the Doppler technique. In order to move from the
    detection of 'hot Jupiters' and giant planets on relatively short orbits to the detection of much lighter exoplanets,
    a further precision step had to taken, and it was actually achieved by the development of HARPS-like spectrographs. In
    fact, HARPS - ESO's High-Accuracy Radial-velocity Planet Searcher - allowed us to detect and discover the large population
    of sub-Neptunes and super-Earths that do not exist in our own solar system and were completely unknown and unexplored
    beforehand. Extreme-Precision Radial-Velocity (EPRV) spectrometers like HARPS have been key, furthermore, to follow-up
    and measure precise masses and densities of a whole bunch of small exoplanets discovered by transit-search space missions,
    reaching in some cases the one-Earth-mass detection level. In recent years, the field of exoplanets developed further
    from exoplanet detection to characterisation of their orbits and dynamics, their internal structures and their atmospheres.
    Again, instrumental development has been fundamental by evolving towards high-fidelity spectroscopy. because the scientific
    requirements called for the development of more stable spectrographs calibrated to a level of accuracy never reached before
    and coupled to larg(er) telescopes. The ESPRESSO spectrograph, operating since 2018 on ESO's Very-Large Telescope, opened
    this new era of exploration by setting new precision standards. Since, ESPRESSO provided us with exceptional results,
    like the discovery of an 1/4 Earth-mass planet around our closest neighbour Proxima Centauri, she detection of iron rain
    on a super-hot exoplanet, the observation of planetary system with weird orbital configuration, and many more. In my talk
    I shall very briefly trace the history of development of these high-fidelity spectrographs that have reached now their
    fourth generation of evolution. I shall also provide the audience with some 'tricks', or better, some elements like the
    conceptual approach, a simplified project-management, and an objective-oriented research philosophy that, so I think,
    contributed to the success of these instruments.
