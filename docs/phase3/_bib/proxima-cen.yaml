  title: Simulating the climates and thermal emission of prime nearby temperate rocky exoplanet candidates
  authors:
  - Komacek, Thaddeus David
  - Hammond, Tobi
  - Kopparapu, Ravi
  - Mandell, Avi
  - Wolf, Eric T.
  - Kofman, Vincent
  - Fauchez, Thomas
  - Arney, Giada Nicole
  - Crouse, Jaime
  - Kane, Stephen
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: A panoply of habitable worlds orbiting M dwarf stars exist in our galaxy. A subset of those that are nearby are
    pristine targets for the NASA JWST and upcoming ground-based ELTs and future space mission concepts including MIRECLE,
    the Habitable Worlds Observatory, and eventually the Far-IR Surveyor and LIFE flagships. The upcoming observational characterization
    of these planets necessitates the development of detailed theoretical expectations for their atmospheric conditions, including
    composition, thermal structure, cloud cover, and resulting observable properties. We have simulated the atmospheric circulation
    and climate of a set of seven prime temperate rocky exoplanets, including LP 890-9c, TRAPPIST-1e, GJ 1002b, Proxima Centauri
    b, Wolf 1069b, GJ 1061d, and Teegarden c. Specifically, we conducted three ExoCAM General Circulation Model simulations
    for each planet assuming spin-synchronization for varying partial pressures of carbon dioxide (2 bars, 0.1 bars, and 10<SUP>-4</SUP>
    bars), assuming 1 bar of background N<SUB>2</SUB>. We find that the simulated climates of these exoplanets differ strongly
    depending on their instellation and CO<SUB>2</SUB> complement, with especially large changes in the spatial extent and
    optical thickness of water cloud coverage. We then post-processed these ExoCAM simulatons with the Planetary Spectrum
    Generator (PSG) to predict thermal emission phase curves and spectra for each object with a MIRECLE-like mid-infrared
    observatory. We predict strong CO<SUB>2</SUB> features for three targets, Proxima Cenaturi b, GJ 1061d, and GJ 1002b,
    that would be detectable with a MIRECLE-like observatory in 30 days of observation regardless of the partial pressure
    of carbon dioxide. We additionally find that CO<SUB>2</SUB> could be detectable on Teegarden c and Wolf 1069b if the partial
    pressure of CO<SUB>2</SUB> is sufficiently high, greater than approximately 0.1 bars. Our findings imply that characterization
    of nearby non-transiting temperate planets in mid-infrared thermal emission can reveal their atmospheric composition and
    climate state.
