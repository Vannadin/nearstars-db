  - Peña-Moñino, Luis
  year: '2023'
  pubdate: '2023-07-00'
  doi: null
  abstract: The habitability of exoplanets hosted by M-dwarf stars is strongly dependent on the space weather. If the exoplanet
    orbit is located in the inner part of the habitable zone, this often leads to the direct deposition of the stellar wind
    towards the exoplanet surface. <P />We present a set of magneto-hydrodynamic simulations aimed at characterizing the habitability
    conditions of exoplanets with an Earth-like magnetosphere inside the habitable zone of the M-dwarf star Proxima Centauri,
    for Proxima b, using the publicly available code PLUTO. Our main is to study how the stellar magnetism affects the exoplanet
    and, in turn, how the exoplanet magnetic field, and its orientation with respect to the stellar wind flow, counteracts
    the role of the stellar wind magnetic field. <P />Our simulations cover both the sub-alfvénic regime, i.e., when the magnetic
    pressure of the stellar wind dominates over the wind's ram pressure, so that the bow shock disperses completely, and the
    super-Alfvénic regime, when the ram pressure dominates over the magnetic pressure, and a bow shock is formed. In both
    scenarios, we use planetary magnetic fields in the range from 0.16 G (half the Earth surface magnetic field average value)
    up to 1.28 G (four times larger), and consider different wind speeds and stellar wind densities. We also run a set of
    simulations to explore in detail the effect of the inclination angle of the planetary magnetic field with respect to the
    stellar wind flow. <P />The main aim of this work is to gain insight into the space weather around Proxima b, focusing
    on the habitability conditions of an Earth-like magnetosphere for Proxima b. We will discuss the role of the stellar and
    planetary magnetic field, and their mutual orientation. We will also discuss the radio emission arising from the magnetosphere
    of Proxima b, which are relevant to guide radio observations aimed at unveiling planets due to star-planet interaction,
    or even by direct detection of the radio emission from the exoplanet.
