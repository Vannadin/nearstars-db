  doi: null
  abstract: The detection of exoplanets orbiting other stars has revolutionized our view of the cosmos. First results suggest
    that it is teeming with a fascinating diversity of rocky planets, including those in the habitable zone. Even our closest
    star, Proxima Centauri, harbors a small planet in its habitable zone, Proxima b. With JWST and the upcoming Extremely
    Large Telescopes, we will be able to peer into the atmospheres of rocky planets and get a glimpse into other worlds. Using
    our own planet and its wide range of biota as a Rosetta stone, we'll explore how we could detect habitability and signs
    of life on exoplanets over interstellar distances. The discussion on what makes a planet a habitat and how to detect signs
    of life is lively. This talk will show the latest results, the challenges of how to identify and characterize such habitable
    worlds, and how near-future telescopes will revolutionize the field. For the first time in human history, we have developed
    the technology to detect potential habitable worlds.
