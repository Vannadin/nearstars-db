  title: Effects of stellar XUV spectra on ion escape from a Mars-like planet orbiting inactive low-mass stars
  authors:
  - Sakai, Shotaro
  - Nakayama, Akifumi
  - Seki, Kanako
  - Terada, Naoki
  - Shinagawa, Hiroyuki
  - Sakata, Ryoya
  - Leblanc, Francois
  - Brain, Dave A.
  - Tanaka, Takashi
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: Many exoplanets have been discovered in recent years, and among them, M and K dwarfs are of particular interest
    because they might have habitable environments. Exoplanets in the habitable zones of these stars must be exposed to intense
    X-ray and extreme ultraviolet (XUV) radiation and stellar winds because the habitable zone is close to the star. A simulation
    study suggested that the ion escape rate from Proxima Centauri b, orbiting at 0.049 AU, is ~10<SUP>27</SUP> s<SUP>-1</SUP>,
    three orders of magnitude higher than that of Mars (Dong et al., 2017). The previous study assumed an XUV intensity several
    tens of times that of the Sun, but in fact, the shape of the XUV spectrum determines the thermospheric profile, controlling
    the ion escape. The current study focuses on the stellar XUV spectrum, and after investigating thermospheric profiles
    under various XUV spectra using a thermosphere model (Nakayama et al., 2022), the impact of the stellar XUV spectrum on
    ion escape is presented using a multispecies MHD model (REPPU-Planets). The target stellar systems are Sun, HD85512, and
    GJ581. Note that these stars are somewhat inactive XUV environments compared to Proxima Centauri. The planets are of Mars
    type and located at 1.52, 0.622, and 0.174 AU, respectively, in order to keep the same irradiance as that of the Martian
    orbit in the present solar system. Mars under 10 times XUV irradiance at 1.52 AU is also investigated to understand the
    effects of the shape of the XUV spectrum on ion escape. According to the thermosphere model, the thermosphere of the HD85512
    system is the most extended, followed by the GJ581 system. The temperature profiles show the same tendency as the density
    profiles. The ion escape rates are estimated by REPPU-Planets simulations using these thermospheric profiles as input.
    The stellar wind conditions are taken from the present Martian orbit for ease of comparison (Sakai et al., 2021). Ion
    escape is also the most intense for the HD85512 system, followed by the GJ581 system. The XUV irradiances between 40 and
    100 nm are one of the most important parameters to determine the atomic ion escape rate. The O<SUB>2</SUB><SUP>+</SUP>
    escape rate is smaller in the high XUV environments because of the larger dissociative recombination. The C<SUP>+</SUP>
    escape rate, meanwhile, is higher in high XUV environments due to greater photodissociation of CO<SUB>2</SUB> and CO,
    and the associated charge exchange.
