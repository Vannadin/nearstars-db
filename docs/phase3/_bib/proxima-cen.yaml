- arxiv_id: null
  ads_bibcode: 2023AAS...24142902K
  title: 'ATLAS — A Trail to Life Around Stars: The Variability of M Dwarfs with Planets within 25 Parsecs from Months to
    Decades'
  authors:
  - Kar, Aman
  - Henry, Todd
  - Couperus, Andrew
  - Vrijmoet, Eliot
  - Jao, Wei-Chun
  - Recons Team
  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: The goal of our ATLAS (A Trail to Life Around Stars) effort is to provide a key list of M dwarfs that exhibit
    negligible stellar activity, which is presumably good for creating stable planetary environments. We are motivated to
    study M dwarfs, which account for three of every four stars in the solar neighborhood, because they live far longer than
    solar-type stars, thereby offering durable environments. As part of ATLAS, we are evaluating the stellar variability of
    M dwarfs with confirmed exoplanets over timescales from months to decades. Here the short-term variability maps flaring
    and stellar rotation, while the long-term variability reveals spot cycles like those seen in the Sun. <P />The long-term
    results are based on the RECONS (REsearch Consortium On Nearby Stars, <A href="http://www.recons.org/">www.recons.org</A>)
    effort at the SMARTS 0.9m at CTIO, where nearby M dwarfs have been observed continuously for over 20 years. RECONS is
    monitoring a volume-complete sample of 461 M dwarfs in the southern sky within 16.7 parsecs (parallaxes of at least 60
    mas), and for ATLAS we have augmented the sample with additional M dwarfs out to 25 pc that have planets. There are already
    32 systems with 68 exoplanets having an average of 15 years of photometric data, and an additional 22 systems with 36
    exoplanets have been added to the program, bringing the total to 54 ATLAS systems with over 100 planets. The results indicate
    that over the long-term, the variability in the VRI bands is &lt; 10% for all M dwarfs with exoplanets, and &lt; 2% for
    the least variable systems. We have also crossmatched our ATLAS stars with TESS results to determine stellar variability
    over shorter timescales. We use the unpopular package to detrend the TESS light curves and to calculate variability in
    the TESS photometric band without removing any intrinsic stellar signal. These results are more astrophysically meaningful
    than variability determined via the Science Processing Operations Center (TESS-SPOC) flux curves, which in general remove
    stellar variability trends over the month-long visits of the spacecraft. We provide direct comparisons of our variability
    results from unpopular and SPOC. Overall, we find that Proxima Centauri is the most variable of all stars in the ATLAS
    sample. It is clear that some M dwarfs are much less variable than others, and may well be the stars on which to concentrate
    efforts as we look for habitable worlds. <P />This effort has been supported by the NSF through grant AST-2108373 and
    via observations made possible by the SMARTS Consortium.
