- &id065
  arxiv_id: '2307.12411'
  ads_bibcode: 2023AcAau.212..517L
  title: 'Chasing nomadic worlds: A new class of deep space missions'
  authors:
  - Lingam, Manasvi
  - Hein, Andreas M.
  - Eubanks, T. Marshall
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1016/j.actaastro.2023.07.030
  abstract: Nomadic worlds, i.e., objects not gravitationally bound to any star(s), are of great interest to planetary science
    and astrobiology. They have garnered attention recently due to constraints derived from microlensing surveys and the recent
    discovery of interstellar planetesimals. In this paper, we roughly estimate the prevalence of nomadic worlds with radii
    of 100 km ≲ R ≲ 10<SUP>4</SUP> km . The cumulative number density n<SUB>&gt;</SUB> (&gt; R) appears to follow a heuristic
    power law given by n<SUB>&gt;</SUB> ∝R<SUP>-3</SUP> . Therefore, smaller objects are probably much more numerous than
    larger rocky nomadic planets, and statistically more likely to have members relatively close to the inner Solar system.
    Our results suggest that tens to hundreds of planet-sized nomadic worlds might populate the spherical volume centered
    on Earth and circumscribed by Proxima Centauri, and may thus comprise closer interstellar targets than any planets bound
    to stars. For the first time, we systematically analyze the feasibility of exploring these unbounded objects via deep
    space missions. We investigate what near-future propulsion systems could allow us to reach nomadic worlds of radius &gt;
    R in a 50-year flight timescale. Objects with R ∼ 100 km are within the purview of multiple propulsion methods such as
    electric sails, laser electric propulsion, and solar sails. In contrast, nomadic worlds with R ≳ 1000 km are accessible
    by laser sails (and perhaps nuclear fusion), thereby underscoring their vast potential for deep space exploration.
