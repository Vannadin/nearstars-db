  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: 'With the longest lifetimes of all stars, M dwarfs provide enduring and presumably stable environments for planetary
    systems. In our project, ATLAS (A Trail to Life Around Stars), we are compiling a variability catalog of nearby M dwarfs
    to identify the least and most variable stars. Here we present our assessment of stellar variability at different timescales:
    short-term (minutes to hours due to flares), mid-term (days to months due to stellar rotation), and long-term (years to
    decades due to stellar cycles). The long-term results are based on the 24-year RECONS (REsearch Consortium On Nearby Stars,
    <A href="http://www.recons.org">www.recons.org</A>) effort at the SMARTS 0.9m at CTIO, where nearby M dwarfs have been
    observed continuously since 1999 in VRI photometric filters. We present variability results on ~400 M dwarfs in the southern
    sky within 16.7 parsecs (parallaxes of at least 60 mas) and highlight in detail 32 M dwarfs with confirmed exoplanets.
    Of these, six vary less than 2%, 25 vary between 2-6% and only 1, Proxima Centauri, varies by more than 6%. For reference,
    1% corresponds to ~10 mmag of change in median stellar flux. We augment these results with mid-term and short-term data
    from TESS. We use the unpopular package to detrend TESS light curves and calculate mid-term variability in the TESS photometric
    band (~600-1000 nm). Of the 32 exoplanet hosts, 23 have been observed by TESS, of which 17 vary by &lt; 1% over the month-long
    TESS observations. At short-term timescales, 5 of the 23 show flares in the TESS light curves. Overall, it is clear that
    some M dwarfs are more photometrically stable than others across all timescales, suggesting that specific stars warrant
    further attention in the search for habitable worlds. This effort has been supported by the NSF through grant AST-2108373
    and via observations made possible by the SMARTS Consortium.'
