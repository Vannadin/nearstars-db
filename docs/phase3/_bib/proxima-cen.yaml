- &id040
  arxiv_id: '2508.13368'
  ads_bibcode: 2026PSJ.....7...51P
  title: A Comprehensive Spectroscopic Reference of the Solar System and Its Application to Exoplanet Direct Imaging
  authors:
  - Payne, Allison
  - Villanueva, Geronimo L.
  - Kofman, Vincent
  - Fauchez, Thomas J.
  - Faggi, Sara
  - Mandell, Avi M.
  - Roberge, Aki
  - Alei, Eleonora
  year: '2026'
  pubdate: '2026-02-00'
  doi: 10.3847/PSJ/ae2feb
  abstract: We present a calibrated database of reflectance spectra for the solar system planets (i.e., Mercury, Venus, Earth,
    Mars, Jupiter, Saturn, Uranus, Neptune) and for Titan, spanning from the ultraviolet to the near infrared. We considered
    data collected over 60 yr of planetary observations, employing a broad range of geometries and facilities (spacecraft
    and ground-based observatories). To correct for differences in observational geometries and data quality, we adopted a
    two-step calibration process that standardized each spectrum to the planet's geometric albedo values and corrected for
    planetary heterogeneity and calibration effects. The calibrated datasets were then combined across wavelengths, leading
    to a reference composite reflectance spectrum for each planet. As an application of this spectral library for exoplanetary
    research, we simulated direct imaging observations of the Proxima Centauri and HD 219134 systems as solar system analogs,
    as well as the solar system at a distance of 10 pc. We also explored the detection limitations of direct imaging instruments
    imposed by the inner and outer working angles for Earth- and Jupiter-like exoplanets as a function of system distance.
    Additionally, we used the visible light portion of the results to produce realistic color reconstructions of each planet.
    Standardizing reflectance spectra in this work improves our baseline for interpreting new reflected light observations
    of exoplanets through comparative planetology. This spectral library (available on Zenodo at doi:10.5281/zenodo.17470004)
    can then serve as a calibrated and validated reference in the modeling and preparation for the characterization of exoplanet
    atmospheres with future direct imaging missions and for astronomical studies of the solar system.
