  doi: null
  abstract: Nitrous oxide (N<SUB>2</SUB>O) is a biological product of the nitrogen cycle on Earth and could be a strong indicator
    of life on an exoplanet. While the concentration of N<SUB>2</SUB>O on Earth today is relatively low (~330 ppbv), environmental
    conditions or evolutionary contingencies could allow for significantly greater than modern biogenic fluxes, and consequently
    atmospheric abundances, of N<SUB>2</SUB>O. For example, biological fluxes of N<SUB>2</SUB>O could be significantly higher
    than on Earth today due to a lack of enzymatic catalysts or if the last step of the denitrification metabolism never evolved.
    Euxinic ocean conditions like those experienced by Earth in the Proterozoic Eon (2.5-0.54 Ga) would also have facilitated
    greater N<SUB>2</SUB>O fluxes. We have previously calculated the flux-abundance relationships for N<SUB>2</SUB>O on Earthlike
    planets orbiting main sequence FGKM stars and estimated the range of plausible impacts on planetary spectra (ApJ, 937,
    109). Here we present an update to our detectability analysis of N<SUB>2</SUB>O features using mid-infrared transmission
    and emission spectra. In emission, we use an instrument simulator for The Large Interferometer for Exoplanets (LIFE) to
    gauge the potential detectability of N<SUB>2</SUB>O in nearby planetary systems via space-based mid-infrared direct-imaging
    spectroscopy. We find that the N<SUB>2</SUB>O + O<SUB>3</SUB> biosignature couple is potentially detectable with LIFE
    in nearby planetary systems including Proxima Centaur b for plausible biological production rates. The detection of N<SUB>2</SUB>O
    in conjunction with other biosignature gases including CH<SUB>4</SUB>, O<SUB>2</SUB>, or O<SUB>3</SUB> would be a strong
    indicator of atmospheric chemical disequilibrium and should be considered as a priority target biosignature for future
    space and ground-based observations of terrestrial exoplanets in the infrared.
