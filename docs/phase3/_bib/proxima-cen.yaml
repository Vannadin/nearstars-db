  abstract: Although the number of stars with known stellar cycles has grown to several hundred, only about 50 cycling stars
    have been well studied using CaII H&K chromospheric emission, and only ten in X-rays. X-ray emission is a particularly
    powerful diagnostic of stellar magnetic activity, with cycle amplitudes that are much larger than in other wavebands.
    We have found a cycle for GJ 358 in X-ray CCD data from Chandra and XMM but with a coarse cadence (vs the unexpectedly
    short cycle period), and would like to verify with a higher cadence. We also wish to study cycle behavior using the HRC,
    which has far more response at low energies, particularly below 100 eV, in order to investigate some puzzling HRC vs CCD
    measurements of the stellar cycle of another mid-M star, Proxima Cen.
