    wavelengths ranges) and spectral irradiance, with the first column corresponding to the time. The second extension contains
    the wavelength grid. <P />Each fits file contains time series of spectra of Proxima Centauri obtained from each XMM-Newton
    observation analyzed in this work. The name of the file corresponds to the observation id. <P />Each FITS file contains
    three HDUs: <P />HDU 0 : PRIMARY HDU 1 : TIME_SERIES HDU 2 : WAVELENGTHS <P />Times are expressed in seconds (TT) relative
