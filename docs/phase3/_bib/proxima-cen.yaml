  doi: 10.1051/0004-6361/201834258
  abstract: We study temporal variations of the emission lines of Halpha, Hepsilon, H and K Ca II, D1 and D2 Na I, 4026 and
    5876 A He I in the HARPS spectra of Proxima Centauri across an extended time of 13.2 years, from May 27, 2004, to September
    30, 2017. Aims. We analyse the common behaviour and differences in the intensities and profiles of different emission
    lines in flare and quiet modes of Proxima activity. Methods. We compare the pseudo-equivalent widths (pEW) and profiles
    of the emission lines in the HARPS high-resolution (R ~ 115,000) spectra observed at the same epochs. Results. All emission
    lines show variability with a timescale of at least 10 min. The strength of all lines except He I 4026 A correlate with
    \Halpha. During strong flares the `red asymmetry' appears in the Halpha emission line indicating the infall of hot condensed
    matter into the chromosphere with velocities greater than 100 km/s disturbing chromospheric layers. As a result, the strength
    of the Ca II lines anti-correlates with Halpha during strong flares. The He I lines at 4026 and 5876 A appear in the strong
    flares. The cores of D1 and D2 Na I lines are also seen in emission. During the minimum activity of Proxima Centauri,
    Ca II lines and Hepsilon almost disappear while the blue part of the Na I emission lines is affected by the absorption
    in the extending and condensing flows. Conclusions. We see different behaviour of emission lines formed in the flare regions
    and chromosphere. Chromosphere layers of Proxima Cen are likely heated by the flare events; these layers are cooled in
    the `non-flare' mode. The self-absorption structures in cores of our emission lines vary with time due to the presence
    of a complicated system of inward and outward matter flows in the absorbing layers.
