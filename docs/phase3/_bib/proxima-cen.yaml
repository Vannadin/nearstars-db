  ads_bibcode: null
  title: 'The Habitability of Proxima Centauri b: II: Environmental States and Observational Discriminants'
  authors:
  - Victoria S. Meadows
  - Giada N. Arney
  - Edward W. Schwieterman
  - Jacob Lustig-Yaeger
  - Andrew P. Lincowski
  - Tyler Robinson
  - Shawn D. Domagal-Goldman
  - Rory K. Barnes
  - David P. Fleming
