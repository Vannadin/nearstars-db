  abstract: A search was conducted for laser signals, both sub-second pulses and continuous emission, from the regions of
    the sky opposite Proxima and Alpha Centauri. These regions are located at the foci of the gravitational lensing caused
    by the Sun, ideal for amplifying transmissions between our Solar System and those two nearest stellar neighbors. During
    six months in 2020 and 2021, 88000 exposures for Proxima Cen and 47000 exposures for Alpha Cen were obtained. No evidence
