  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.1038/s41598-023-43224-5
  abstract: 'The term ''Solar Cell'' is commonly used for Photovoltaics that convert light into electrical energy. However,
    light can be harvested from various sources not limited to the Sun. This work considers the possibility of harvesting
    photons from different star types, including our closest neighbor star Proxima Centauri. The theoretical efficiency limits
    of single junction photovoltaic devices are calculated for different star types at a normalized light intensity corresponding
    to the AM0 spectrum intensity with AM0 = 1361 W/m<SUP>2</SUP>. An optimal bandgap of &gt; 12 eV for the hottest O5V star
    type leads to 47% Shockley-Queisser photoconversion efficiency (SQ PCE), whereas a narrower optimal bandgap of 0.7 eV
    leads to 23% SQ PCE for the coldest red dwarf M0, M5.5Ve, and M8V type stars. Organic Photovoltaics (OPVs) are the most
    lightweight solar technology and have the potential to be employed in weight-restricted space applications, including
    foreseeable interstellar missions. With that in mind, the Sun''s G2V spectrum and Proxima Centauri''s M5.5Ve spectrum
    are considered in further detail in combination with two extreme bandgap OPV systems: one narrow bandgap system (PM2:COTIC-4F,
    E<SUB>g</SUB> = 1.14 eV) and one wide bandgap system (PM6:o-IDTBR, E<SUB>g</SUB> = 1.62 eV). Semi-empirically modeled
    JV-curves reveal that the absorption characteristics of the PM2:COTIC-4F blend match well with both the G2V and the M5.5Ve
    spectrum, yielding theoretical PCEs of 22.6% and 12.6%, respectively. In contrast, the PM6:o-IDTBR device shows a theoretical
    PCE of 18.2% under G2V illumination that drops sharply to 0.9% under M5.5Ve illumination.'
