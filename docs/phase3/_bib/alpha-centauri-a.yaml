    we elucidate with the example of Pollux b, and the direct detection of planets orbiting our closest neighbor, Alpha Centauri,
    whose primary component is on the main-sequence but subtends an appreciable angle on the sky. It is recommended that similar
    trade studies be performed with other promising internal, external, and hybrid occulter designs for comparison, as there
    is relevance to a host of interesting topics in planetary science and related fields.'
