  abstract: Binary and multiple systems constitute more than half of the total stellar population in the Solar neighborhood
    (Kiseleva-Eggleton and Eggleton 2001). Their frequent occurrence as well as the fact that more than 70 (Schneider et al.
    2011) planets have already been discovered in such configurations - most noteably the telluric companion of alpha Centauri
    B (Dumusque et al. 2012) - make them interesting targets in the search for habitable worlds. Recent studies (Eggl et al.
    2012b, Forgan 2012) have shown, that despite the variations in gravitational and radiative environment, there are indeed
    circumstellar regions where planets can stay within habitable insolation limits on secular dynamical timescales. In this
    article we provide habitable zones for 19 near S-Type binary systems from the Hipparchos and WDS catalogues with semimajor
    axes between 1 and 100 AU. Hereby, we accounted for the combined dynamical and radiative influence of the second star
    on the Earth-like planet. Out of the 19 systems presented, 17 offer dynamically stable habitable zones around at least
    one component. The 17 potentially habitable systems contain 5 F, 3 G, 7 K and 16 M class stars. As their proximity to
    the Solar System (d < 31 pc) makes the selected binary stars exquisite targets for observational campaigns, we offer estimates
    on radial velocity, astrometric and transit signatures produced by habitable Earth-like planets in eccentric circumstellar
    orbits.
