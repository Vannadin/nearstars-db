  year: '2003'
  pubdate: '2003-12-02'
  doi: null
  abstract: We present a novel approach to model the nearby stars Alpha Cen A & B and Procyon A using asteroseismic and interferometric
    constraints. Using the VINCI instrument installed at the VLT Interferometer (VLTI), the angular diameters of the Alpha
    Centauri system were measured with a relative precision of 0.2% and 0.6%, respectively. From these values, we derive linear
    radii of R[A] = 1.224 +/- 0.003 R_sun and R[B] = 0.863 +/- 0.005 R_sun. These radii are in excellent agreement with the
    models of Thevenin et al. (2002), that use asteroseismic frequencies as constraints (Bouchy & Carrier 2001; Bouchy & Carrier
    2002). With the same instrument, we also measured the angular diameter of Procyon A. Using the Hipparcos parallax, we
    obtain a linear radius of 2.048 +/- 0.025 R_sun. We use this result together with spectroscopic and photometric constraints
    to model this star with the CESAM code. We also computed the adiabatic oscillation spectrum of our model of Procyon A,
    giving a mean large frequency separation of Delta nu_0 = 54.8 uHz, in agreement with the seismic observations by Martic
    et al. (2001). Our model favours a mass around 1.4 M_sun for Procyon A.
