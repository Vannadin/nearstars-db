- arxiv_id: null
  ads_bibcode: 2021nova.pres.8175K
  title: Getting to Know Our Nearest Neighbors with ALMA
  authors:
  - Kohler, Susanna
  year: '2021'
  pubdate: '2021-07-00'
  doi: null
  abstract: 'Dont plan to knock on a door at Alpha Centauri asking to borrow a cup of sugar just yet but with a new look at
    this star system using a powerful telescope, we now know a bit more about our neighbors.Secrets Among Nearby StarsThis
    artists interpretation shows the planet Proxima Centauri b around its host star. You can see the binary Cen AB in between
    the planet and star, as two faint white dots in the background. [ESO]When it comes to exploring Sun-like stars that might
    host planets, the Alpha Centauri ( Cen) star system is an ideal target. At just over 4 light-years away, this triple system
    the binary pair Cen AB and an additional companion, Proxima Centauri contains the closest stars to the Sun.Recent news
    has hyped the discovery of two exoplanets around the red dwarf Proxima Centauri but what other surprises might the larger
    stellar system harbor? Given that Cen A and B are both very similar to the Sun, it would be particularly valuable if we
    could find Earth-like, potentially habitable worlds around these near neighbors.Choosing a MethodBut how to detect them?
    Searching for transits works only for very specific orbit orientations. Direct imaging might be an option, since Cen is
    so close. But even these nearby stars are challenging: Cen As habitable zone lies at about 1.2 au, or just 0.9 in angular
    separation, from our point of view. Its hard to confidently detect a small, dim object at that separation!Calibrated images
    of Cen A and B taken with ALMA in October 2018 (left two panels) and in August 2019 (right two panels). [Adapted from
    Akeson et al. 2021]Another method may prove useful in this case, however: astrometry. In a new study, a team of scientists
    led by Rachel Akeson (NASA Exoplanet Science Institute, Caltech-IPAC) has used the high resolving power of the Atacama
    Large Millimeter/submillimeter Array (ALMA) to make some of the most precise astrometric measurements of Cen AB yet.Hints
    of InfluenceAstrometry relies on the idea that the slight gravitational tug of an orbiting planet causes a star to wobble
    in place. If this effect is large enough, we can detect it via meticulous imaging that very precisely tracks the location
    and motion of the star on the sky over time.Taking advantage of the high-resolution observations provided by ALMAs long
    baseline, Akeson and collaborators captured measurements of Cen A and B during 2018 and 2019. Their results provide the
    first high-accuracy absolute measurements of the stars positions on the sky since 1991, as well as the highest-accuracy
    differential astrometry yet, comparing their relative separation and searching for the tiny influence of planets around
    the two stars.Top left: astrometric measurements (red: Hipparcos and ALMA data, blue: archival data) and best-fit orbit
    of Cen B relative to Cen A. Top right: enlargement of the 2019 ALMA measurements (the total orbit takes ~80 years). Bottom:
    residuals of the fit as a function of time. [Akeson et al. 2021]The authors then combine these results with archival data
    to better constrain Cen ABs orbit and properties.A Promising FutureAkeson and collaborators show that ALMA can produce
    remarkably precise astrometric measurements for the Cen system, demonstrating the exciting potential of using ALMA for
    this technique. Though the observations dont reveal signs of a planet yet, continued monitoring should allow us to ultimately
    be able to detect planets of a few tens of Earth masses in stable orbits between 1 and 3 au around Cen A.But these results
    go beyond our search for planets they also refine our measurements of Cens motions. This allows us to make more accurate
    estimates of the physical properties of Cen A and B, filling in our understanding of our nearest neighbors.CitationPrecision
    Millimeter Astrometry of the Centauri AB System, Rachel Akeson et al 2021 AJ 162 14. doi:10.3847/1538-3881/abfaff'
