  ads_bibcode: 2024DPS....5610608G
  title: 'A Case Study of Interstellar Meteoroid Streams: Alpha Centauri'
  authors:
  - Gregg, Cole
  - Wiegert, Paul
  year: '2024'
  pubdate: '2024-10-00'
  doi: null
  abstract: The possibility of a coherent interstellar stream of material originating from a single point of origin and passing
    through the Solar System is an intriguing one. Such streams, if they exist, could allow the linking of interstellar material
    to particular source, and put that interstellar material into a specific galactic context. <P />In this presentation we
    model the ejection of material from Alpha Centauri within a simulated Milky Way, as a simple proof of concept. The overall
    goal of this case study is to better understand the characteristics of a stream of interstellar material that reaches
    our Solar System. The simulations are conducted within the three-component, time-independent, axisymmetric potential model
    of Miyamoto &amp; Nagai (1975). Ejection is modelled by ongoing ejections at random speeds up to 10 km/s, representing
    potential interactions within planetary systems and binary star systems (Bailer-Jones et al. 2018). <P />We find that
    material from Alpha Centauri can reach our Solar System and may currently be passing through it. The material that does
    reach us results from very low (~0.2 km/s) ejection velocities consistent with mechanisms that could be currently at work
    in in the system. The resulting shower from Alpha Centauri would have a peak intensity around the system's closest approach
    to the Solar System ~28,000 years from now and their radiant has an average heliocentric galactic radiant of (l, b)=(356.25°,
    -24.5°), consistent with Alpha Centauri's current velocity relative to the Solar System. If ejection mechanisms have been
    releasing material from the Alpha Centauri system into the Galaxy, we may see an influx of interstellar material entering
    the Solar System from this galactic radiant. These interstellar objects could be detected telescopically by large sky
    surveys or even as meteors if they happen to impact the Earth's atmosphere.
