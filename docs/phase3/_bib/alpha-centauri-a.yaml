  arxiv_id: '2401.15172'
  ads_bibcode: 2024A&A...687A.146M
  title: 'Entropy-calibrated stellar modeling: Testing and improving the use of prescriptions for the entropy of adiabatic
    convection'
  authors:
  - Manchon, L.
  - Deal, M.
  - Goupil, M.-J.
  - Serenelli, A.
  - Lebreton, Y.
  - Klevas, J.
  - Kučinskas, A.
  - Ludwig, H.-G.
  - Montalbán, J.
