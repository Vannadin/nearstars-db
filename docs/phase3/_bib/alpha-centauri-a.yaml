  doi: null
  abstract: 'SHERA (Searching for Habitable Exoplanets with Relative Astrometry) is a NASA Small Explorer (SMEX) mission concept
    designed to survey a sample of bright, nearby, Sun-like binary stars with sub-microarcsecond astrometry using diffractive
    pupil technology in order to detect small exoplanets. Constraints on the size of the primary mirror, field of view, survey
    pointing constraints, projected astrometric accuracy performance, projected sensitivity to planetary companions, and survey
    duration, led to a down selection to 14 target stars in 7 binary systems. The target stars include the primary and secondary
    components in the following d&lt;20pc binary systems: Alpha Cen, 61 Cyg, 70 Oph, 36 Oph, Xi Boo, p Eri, and HR 2667/2668.
    The systems are also prime targets for direct imaging surveys for exoEarths and other exoplanets with the Habitable Worlds
    Observatory (HWO). The projected performance of SHERA would enable the detection of temperate, rocky exoplanets orbiting
    Alpha Cen A (Rigil Kentaurus) and B (Toliman), and dynamically detect and measure the mass of the imaged exoplanet candidate
    Alpha Cen Ab. We summarize the state of knowledge of these bright, nearby, G/K-type binary stars, and the SHERA team''s
    efforts to improve our pre-mission knowledge of their stellar parameters and orbits. Accurate measurements of the orbital
    motion now will greatly improve the precision of the orbital parameters and masses of any planets discovered in each binary
    system.'
