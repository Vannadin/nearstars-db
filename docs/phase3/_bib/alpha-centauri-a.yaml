  year: '2021'
  pubdate: '2021-03-00'
  doi: null
  abstract: Alpha Centauri A is the closest solar-type star to the Sun and offers an unique opportunity to detect both a mature
    gas giant planet (consistent with existing radial velocity constraints) and a zodiacal dust cloud. A carefully planned
    observational sequence using the MIRI Coronagraph (F1550C) and innovative post-processing would be sensitive down to a
    radius limit of 0.5~0.7 R-Jupiter for planets within ~3 AU (~2.5") around alpha Cen A where models predict a region of
    stablity against disruption by alpha Cen B. These same observations would be sensitive to a level of zodiacal emission
    only a few times brighter than that of the Sun's, an unprecedented level not even achieved by ground based interferometers.
    The proposed observations would probe the limit of JWST high contrast imaging on a star that offers the best chance for
    the ultimate detection of Earth analogs by future ground and/or space based facilities. The experiment is admittedly high
    risk, but the prospect of directly imaging a planet around our closest stellar neighbor is an exciting one.
