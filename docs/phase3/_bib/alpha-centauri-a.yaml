  title: Reflight of the Full-Sun Ultraviolet Rocket SpecTrometer
  authors:
  - Kankelborg, Charles
  year: '2024'
  pubdate: '2024-00-00'
  doi: null
  abstract: 'We propose to refly FURST: the Full-Sun Ultraviolet Rocket SpecTrograph, to obtain the first high resolution,
    high quality VUV spectrum of the Sun-as-a-star. Our spectrometer covers the 116-184 nm wavelength range with a spectral
    resolution R &gt; 20,000, and will undergo absolute radiometric and wavelength calibration. The instrument was first flown
    on September 3, 2024. Unfortunately the data from that flight was scientifically unusuable due to a seriouls stray light
    issue. We now have a detailed understanding of the FURST stray light, and have formulated a plan to eliminate the problem.
    Verification will be performed prior to reflight. <P />A defining goal of Heliophysics is to understand the influence
    of solar radiation, plasma and magnetic field with interplanetary space, with the planets and smaller solar system bodies.
    Strikingly, no high resolution spectrum of solar irradiance exists, and construction of such a spectrum from existing
    data and models is fraught with difficulties. In contrast, Hubble Space Telescope (HST) data of objects including Sun-like
    stars such as alpha Cen A are of far higher quality than solar data. Thus we are facing the peculiar fact that we know
    the inputs of VUV radiation to the heliosphere of a planet surrounding alpha Cen A far more precisely than we can for
    our own heliosphere! Critically, a resolution of &gt; 10,000 (&lt; 30 km/s) is needed in the Heliosphere, as many objects
    (planetary satellites, comets, magnetospheres) have comparable orbital and plasma speeds. UV monitor experiments (including
    those on AE satellites, SME, SOLSTICE, EVE on SDO) have R &lt; 1200 or so, are quite inadequate for defining accurate
    irradiances needed for the inputs to many heliospheric problems of interest. <P />As well as advancing Heliospheric physics,
    our experiment will provide a critical missing link" between the Sun and the stars, which will enable unique insights
    into the heating of the chromosphere and corona. HST stellar spectra with R&gt;10,000 contain important signatures of
    magnetic reconnection, accretion, other magnetic processes, and interstellar absorption. But we cannot currently understand
    how these diagnostic features relate to the spatially resolved data with R &gt; 10,000 on the Sun. The unknown center-to-limb
    variations of brightness with wavelengths across line profiles presents a fundamental challenge for which data simply
    do not exist. Our aim will be to deliver a fully calibrated UV spectrum to the community at the earliest opportunity.
    This will foster cross-community collaborations across helio- and astro- physics, including some needs for aeronomy of
    planetary atmospheres including those outside of the solar system. <P />The analysis of FURST data will shed light on
    the fundamental processes of chromospheric and coronal heating, by focusing upon sometimes subtle, yet very significant
    differences in high quality UV spectra of the Sun and the stars. HST data exist for a dozen or so Sun-like stars of a
    quality already beyond our ability to construct a comparable sun-as-a-star UV spectrum. The new solar spectra will enable
    us to understand the nature of magnetic energy dissipation as a Sun-like star evolves, and the dependence of magnetic
    activity on stellar mass and metallicity. <P />This proposed research addresses three of the four main goals of Heliophysics,
    as articulated by the Decadal panel: <P />1. Determine the origins of the Sun''s activity and predict the variations in
    the space environment <P />3. Determine the interaction of the Sun with the solar system and the interstellar medium.
    <P />4. Discover and characterize fundamental processes that occur both within the heliosphere and throughout the universe.'
