  - Pepe, F.
  year: '2022'
  pubdate: '2022-03-00'
  doi: 10.1051/0004-6361/202142435
  abstract: 'Context. Stellar activity and instrumental signals are the main limitations to the detection of Earth-like planets
    using the radial-velocity (RV) technique. Recent studies show that the key to mitigating those perturbing effects might
    reside in analysing the spectra themselves, rather than the RV time series and a few activity proxies. <BR /> Aims: The
    goal of this paper is to demonstrate that we can reach further improvement in RV precision by performing a principal component
    analysis (PCA) decomposition of the shell time series, with the shell as the projection of a spectrum onto the space-normalised
    flux versus flux gradient. <BR /> Methods: By performing a PCA decomposition of shell time series, it is possible to obtain
    a basis of first-order spectral variations that are not related to Keplerian motion. The time coefficients associated
    with this basis can then be used to correct for non-Dopplerian signatures in RVs. <BR /> Results: We applied this new
    method on the YARARA post-processed spectra time series of HD 10700 (τ Ceti) and HD 128621 (α Cen B). On HD 10700, we
    demonstrate, thanks to planetary signal injections, that this new approach can successfully disentangle real Dopplerian
    signals from instrumental systematics. The application of this new methodology on HD 128621 shows that the strong stellar
    activity signal seen at the stellar rotational period and one-year aliases becomes insignificant in a periodogram analysis.
    The RV root mean square on the 5-yr data is reduced from 2.44 m s<SUP>‒1</SUP> down to 1.73 m s<SUP>‒1</SUP>. This new
    approach allows us to strongly mitigate stellar activity, however, noise injections tests indicate that rather high signal-to-noise
    ratio (S/N &gt; 250) is required to correct for the observed activity signal on HD 128621.'
