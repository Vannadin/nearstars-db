- &id096
  arxiv_id: '1707.03026'
  ads_bibcode: null
  title: Lidov-Kozai stability regions in the alpha Centauri system
  authors:
  - C. A. Giuppone
  - A. C. M. Correia
  year: '2017'
  pubdate: '2017-07-10'
  doi: 10.1051/0004-6361/201730491
  abstract: The stability of planets in the alpha-Centauri AB stellar system has been studied extensively. However, most studies
    either focus on the orbital plane of the binary or consider inclined circular orbits. Here, we numerically investigate
    the stability of a possible planet in the alpha-Centauri AB binary system for S-type orbits in an arbitrary spatial configuration.
    In particular, we focus on inclined orbits and explore the stability for different eccentricities and orientation angles.
    We show that large stable and regular regions are present for very eccentric and inclined orbits, corresponding to libration
    in the Lidov-Kozai resonance. We additionally show that these extreme orbits can survive over the age of the system, despite
    the effect of tides. Our results remain qualitatively the same for any compact binary system.
