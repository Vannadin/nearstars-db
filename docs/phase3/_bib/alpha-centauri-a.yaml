  abstract: tau Ceti is the closest single Sun-like star to Earth and, despite being expected to have a similar age as the
    Sun or alpha Centauri trio, is often described as being significantly less active. We propose a focused observational
    campaign targeting this inactive star's coronal, EUV, and chromospheric emissions, the first of which shows dramatic variability.
    This will yield unprecedented insight into the connection between active layers from the lower chromosphere, through the
    transition region, and into the corona and help elucidate why such different flux levels are seen between the ROSAT and
    Chandra/XMM-Newton epochs. This exhaustive observational effort will also have legacy value for future Habitable Worlds
    Observatory characterization of the tau Ceti planetary system.
