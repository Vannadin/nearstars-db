- arxiv_id: null
  ads_bibcode: 2024DDA....5510106G
  title: The Development of Interstellar Meteoroid Streams
  authors:
  - Gregg, Cole
  - Wiegert, Paul
  year: '2024'
  pubdate: '2024-08-00'
  doi: null
  abstract: Despite the immense distances that separate the stars, material from other star systems does sometimes appear
    in our own Solar System. Their origin(s) remain uncertain, and the specifics of how this interstellar material traverses
    the Galaxy remain unknown. This material has the potential to seed the formation of planets in newly forming planetary
    systems while also dispersing chemical elements, organic molecules, or even life between neighboring star systems. <P
    />The examination of interstellar transport is of rising interest, given that the two most significant interstellar objects
    to date, 1I/'Oumuamua and 2I/Borisov, were identified only a few years ago. While the former was a rocky body, the latter
    was icy, emphasizing the mystery of their independent origins. <P />This presentation discusses the outcomes from modeling
    hypothetical stellar systems ejecting material within a simulated Milky Way. We observe and analyze the trajectory of
    the ejecta as it evolves in time, utilizing a time-independent, axisymmetric potential model for our galaxy. In this way
    we can examine the development of the "galactic meteoroid streams" resulting from the burst ejection of material from
    protostars, AGB stars or other stellar systems. In addition to examining the general characteristics of these streams,
    we aim better understand the interstellar material that reaches our Solar System by examining the potential intersection
    with an interstellar meteoroid stream produced from our nearest stellar neighbor, α Centauri. For this initial work, we
    simply consider a hypothetical meteoroid stream produced from ongoing ejections and determine the characteristics of the
    close approaches. <P />The simulations employ the well-established three-component potential model developed by Miyamoto
    &amp; Nagai (1975). Ejections are modelled by both bursts and ongoing ejections at random speeds of 0-15 km/s, drawn from
    a uniform distribution. We use burst ejections for the analysis of developing streams for a star within each of the three
    galactic components, and ongoing ejections in our α Cen case study. <P />As might be anticipated, the ejecta traverse
    the Galaxy in a manner closely mirroring that of their source stars. Nevertheless, as the simulation unfolds, we observe
    intricate and intriguing effects within the ejecta swarm, providing insights into the complex evolution of interstellar
    meteoroid streams. In our case study we see close approaches from the α Cen stream and discuss the implications on the
    potential observation of interstellar meteoroid streams.
