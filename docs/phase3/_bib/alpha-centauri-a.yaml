  abstract: In order to explore extraterrestrial planets, it would be necessary for us to find the environment which resemble
    earth. However, it takes us about eighty thousand years to reach the closest planet system such as alpha-Centauri. Therefore,
    we make attention to the terraforming on Mars. Terraforming has some problems. Instead, it takes us about 100 years to
    terraform. The terraforming takes less years than to find them. Considering that terraforming Mars is more realistic than
    searching for a planet with an environment similar to the Earth. We have two viewpoints; (1)Soil improvement and (2)order
    to reduce the CO2 produced by respiration through photosynthesis, an experiment was conducted by creating a device that
    efficiently collects light. (1)When the perchloric acid HClO4 contained in the soil on Mars was examined to see how much
    it interfered with plant growth, no plants grew at all, but when diluted, soybeans and wheat grew. (2)In order to take
    advantage of the terrain of Mars, we assumed farming in the valleys and used a parabolic curve to collect the light. We
    will discuss the applying to the surface of Mars and would like to the possibility for the Mars' terraforming.
