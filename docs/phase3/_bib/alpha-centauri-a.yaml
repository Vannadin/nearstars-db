- arxiv_id: null
  ads_bibcode: 2026AAS...24713306T
  title: Searching for Signs of Life and Habitable Worlds
  authors:
  - Tusay, Nicholas
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: This dissertation weaves together three published projects in my efforts to both search for life in the universe,
    through technosignatures, i.e. the search for extraterrestrial intelligence (SETI), and characterize habitable worlds
    using state-of-the-art techniques and instruments. My efforts to improve our ability to characterize habitable worlds
    extend from using transmission spectroscopy on a disintegrating exoplanet, allowing us to measure the interior composition
    of planetary bodies around other stars. <P />The first project assumes an interstellar communication network could be
    set up using signal amplification from gravitational lensing of individual stars as nodes in the network. If our sun is
    being used in such a network, there may be one or more probes stationed along the solar gravitational focal line in alignment
    with another star in the network. We searched for signals from such a probe using the Green Bank Telescope. The data was
    collected and analyzed with the Breakthrough Listen hardware and software designed for narrowband radio SETI. Although
    we found no evidence of such a probe in alignment with the α Cen system during our investigation in the time and frequency
    ranges of our observations, this project established the methodology for future searches of this type. <P />The second
    project combines exoplanet science and SETI by looking for leaked emission from an equivalent alien Deep Space Network
    (DSN) transmitter broadcasting from the surface of a nearby system known to have rocky exoplanets, TRAPPIST-1. This study
    demonstrates the efficacy of utilizing planet-planet occultation (PPO) events as a more efficient observational strategy
    to search for leaked emission from edge-on multi-planet systems. The ATA is just barely sensitive enough to detect an
    Arecibo-like transmitter at this distance, which is likely overpowered for an alien DSN of similar interplanetary communication
    purposes to our own, given the compact nature of TRAPPIST-1. We found no conclusive evidence of leaked emission from TRAPPIST-1
    using the Allen Telescope Array (ATA). <P />The third project is the first results of using JWST to observe the disintegrating
    exoplanet K2-22b. This is a rare class of planet enshrouded in a cloud of gas and dust from what was likely once its interior
    constituents, providing a unique opportunity to directly measure the interior composition of a rocky planet around a main
    sequence star. The results from this experiment are both consistent with and challenge expected results, laying the groundwork
    for newly discovered disintegrating exoplanets, like BD+05 4868 Ab.
