  doi: null
  abstract: A majority of Sun-like stars have a stellar companion that adds unwanted noise into the field of view for any
    high-contrast imaging instrument. Enabling binary imaging can improve the efficiency of coronagraphic instruments by increasing
    the number of bright, nearby stars in the pool of available science targets. This includes both of the Alpha Centauri
    A and B stars, which would become the top science target for direct imaging if companion leakage can be suppressed. Multi-Star
    Wavefront Control (MSWC) is a technique that eliminates stellar leakage from both stellar components, thereby enabling
    the direct imaging of exoplanets in many binary star systems. <P />The coronagraph instrument onboard the Roman Space
    Telescope includes a contributed MSWC mask that consists of a shaped pupil mask identical to the mask used for the Wide-Field
    of View mode with the addition of a set of regularly spaced dots that serve as a mild diffraction grating. To enable the
    adoption of an enhanced wavefront control mode such as MSWC by the Roman coronagraph, we present a series of technology
    demonstration experiments designed to mature MSWC for the Roman coronagraph instrument. The occulting mask coronagraph
    (OMC) testbed in JPL's High Contrast Imaging Testbed (HCIT) has a layout similar to the Roman Space Telescope coronagraph
    instrument. OMC is configured with a binary imaging mode with a MSWC mask with the same design as the contributed mask
    for the Roman coronagraph. Our testbed results are the first demonstrations of this technique using the recently installed
    full binary source. We present the latest experimental results for MSWC obtained from two vacuum test campaigns at the
    OMC testbed. This includes showcasing star light suppression in the Super-Nyquist regime for the 3rd diffraction order,
    achieving contrast levels that align with potential observations of Alpha Centauri in Band 3d (center wavelength 754nm).
    To date, we have demonstrated suppression of better than 5e-9 contrast in the Super-Nyquist regime using multiple diffraction
    orders (enabling a range of star separations ranging from 80-140 L/D. Our current test campaign using MSWC in the testbed
    with a binary star source aims to reach contrast levels consistent with the recent TVAC demonstrations for the Roman coronagraph
    instrument.
