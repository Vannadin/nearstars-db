  title: A Search for Radio Technosignatures at the Solar Gravitational Lens Targeting Alpha Centauri
  authors:
  - Tusay, Nick
  - Huston, Macy J.
  - Dedrick, Cayla M.
  - Kerby, Stephen
  - Palumbo, Michael L., III
  - Croft, Steve
  - Wright, Jason T.
