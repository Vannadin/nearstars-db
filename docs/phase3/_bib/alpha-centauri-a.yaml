  abstract: The Suborbital Imaging Spectrograph for Transition-region Irradiance from Nearby Exoplanet host stars (SISTINE)
    is a rocket-borne imaging spectrograph designed to probe a broad region of the far-ultraviolet (FUV; 1000-1272, 1300-1565
    Å) emission of nearby stars. The third flight of SISTINE was successfully executed on July 6<SUP>th</SUP>, 2022, from
    Arnhem Space Center (ASC), Northern Territory, Australia. SISTINE-3 successfully obtained FUV spectra of Alpha Centauri
    A and B, fully resolving the binary pair with a 7" separation on sky and 2" resolution at the slit center. The spectra
    contain a suite of FUV emission lines crucial for reconstructing the high-energy stellar radiation incident onto planets
    orbiting solar-mass stars. SISTINE is the first instrument to simultaneously image the Alpha Centauri system over a broad
    bandpass including O VI (λλ1032,1037 Å) through C IV (λλ1548,1551 Å). These spectra can be combined with archival observations
    to create a panchromatic SED of both stars to study the radiation environment around solar type stars and binary systems.
    The instrument is composed of an f/14 Cassegrain telescope feeding a 2.1x magnifying spectrograph with a blazed, holographically
    ruled diffraction grating and a powered fold mirror. The telescope optics employ enhanced-LiF overcoated Al, with the
    secondary mirror providing the first flight test of enhanced-LiF coatings employing an ALD deposited capping layer (AlF<SUB>3</SUB>).
    Spectra are captured on a large-format microchannel plate (MCP) detector consisting of two 110 x 40 mm segments.
