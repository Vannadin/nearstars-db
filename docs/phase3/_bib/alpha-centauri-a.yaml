  title: Novel Ultraviolet Spectroscopic Investigations of Stars and Their Planets
  authors:
  - Behr, Patrick
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: Planets come in many shapes and sizes from small barren rocks, to Earth-sized planets hosting unique and exotic
    atmospheres, to massive gas giants many times the size of Jupiter. Despite the great diversity, all planets have at least
    one thing in common -- they are all shaped and influenced by the star which hosts them. The amount of radiation a planet
    receives in various wavelength regions can have dramatic effects on the composition and evolution of the atmosphere. Particularly
    important is the high-energy radiation from X-rays to the ultraviolet which penetrate the upper layers of planetary atmospheres,
    heating the atmosphere and driving photochemistry and atmospheric escape. As exoplanet science continues to grow, especially
    with the search for habitable worlds, it is crucial to understand the high-energy environment of planet-hosting stars
    and their influence on atmospheres. In this thesis I present the results of three exoplanet-related far-UV (FUV; 912 &lt;
    λ &lt; 1700 Å) spectroscopic investigations utilizing suborbital sounding rocket experiments and observations from several
    space-based observatories. First, I discuss astrophysical instrumentation and technology development in the UV with the
    assembly and testing of two telescopes for the Far- and Lyman-Ultraviolet Imaging Demonstrator (FLUID) sounding rocket
    and the third flight of the Suborbital Imaging Spectrograph for Transition-region Irradiance from Nearby Exoplanet host
    stars (SISTINE) sounding rocket, both designed and built at the University of Colorado, Boulder. FLUID is a rocket-borne
    UV imaging payload which will combine four telescopes with different UV bandpasses to characterize the distribution of
    O- and B-type stars in nearby galaxies. SISTINE is a rocket-borne far-UV imaging spectrograph designed to observe stellar
    emission from the transition region and chromosphere of exoplanet hosting stars and their analogs. I p resent the results
    from the third flight of SISTINE, which observed the binary solar-like stars α Centauri A and B. Next, I present my work
    characterizing 11 exoplanet-hosting FGKM stars which had never been observed in the UV. I use observations with the Hubble
    Space Telescope, XMM-Newton, and the Chandra X-ray Observatory in combination with empirical models to create spectral
    energy distributions of each star which have since been used to characterize the atmospheres of several exoplanets, including
    the first detection of atmospheric photochemistry on an exoplanet with the James Webb Space Telescope. Finally, I present
    the first far-UV transit spectroscopy of an ultra-hot Jupiter in which we investigate the atmosphere of a massive planet
    subjected to a particularly extreme far-UV environment.
