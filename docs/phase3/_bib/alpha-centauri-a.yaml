    be addressed compared to the baseline goals of proposed missions like the Terrestrial Planet Finder-Coronagraph, New World''s
    Observer, and others. Such targets however present a practical problem in that finite stellar size results in unwanted
    starlight reaching the detector, which degrades contrast. In this paper, we quantify the sensitivity, in terms of contrast,
    of an internally-occulting, space-based coronagraph as a function of stellar angular diameter, from unresolved dwarfs
    to the largest evolved stars. Our calculations show that an assortment of band-limited image masks can accommodate a diverse
