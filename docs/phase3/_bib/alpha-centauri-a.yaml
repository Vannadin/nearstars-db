  doi: 10.1117/1.JATIS.8.1.017004
  abstract: We present the concept of using an orbiting laser as a coherent optical reference to phase a several kilometer
    diameter array of ground-based lasers designed to accelerate interstellar nano-spacecraft to 20% light-speed using laser
    propulsion. We investigate the geometrical and temporal constraints for the initial case of the target star Proxima b
    in the Alpha Centauri system using a laser ground site in the southern hemisphere. Based on these constraints, we detail
    requirements for the mission architecture for an orbiting laser to be used as an optical reference. We then present two
    orbits that can meet all given requirements and represent a range of engagement times and days between engagements. We
    also present a range of orbits with periods from 3 to 4 days and engagement times from 660 to 800 s. If desired, the orbit
    can be matched to the sidereal day, so each orbit period, the beacon can align with the ground station and the same target
    star without maneuvers. A discussion of the tradeoff between the Earth-based site latitude, time on engagement, and days
    between engagements is presented.
