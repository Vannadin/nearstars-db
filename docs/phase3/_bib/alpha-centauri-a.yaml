  title: Prospects for detecting exoplanets around multi-star systems with direct imaging and astrometry
  authors:
  - Belikov, Ruslan
  - Sirbu, Dan
  - Bendek, Eduardo
  - Marx, David
  - Zhou, Hanying
  - Prada, Camilo
  - Mamajek, Eric
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: 'In this presentation, we overview the science value of discovering and characterizing planets around multi-star
    systems, as well as the prospects and synergies offered by two methods: direct imaging and astrometry (from space). Multi-star
    systems are important for exoplanet science in part because about half of all sun-like stars belong to multi-star systems,
    and in part because multi-star systems offer unique science. In particular, science value includes: (a) understanding
    planet and disk formation and dynamics around binaries, and how they compare to single-star systems; (b) planet occurrence
    rates around binaries, and how they compare to single-star systems; (c) a census of all the planetary systems in our galactic
    neighborhood, regardless of stellar multiplicity; (d) what types of planets exist around binaries, including habitability
    considerations. In addition, Alpha Centauri offers particularly attractive prospects because it is much closer (by a factor
    of 2.4) than any other Sun-like (FGK) star, single or multiple. Therefore, direct imaging and astrometry instruments will
    be able to achieve greater sensitivity around Alpha Centauri than around any other Sun-like star. To detect planets around
    multi-star systems, we have been developing two techniques: multi-star wavefront control, or MSWC (for direct imaging),
    and diffractive-pupil based astrometry. MSWC is a contributed mode for Roman Coronagraphic Instrument and is compatible
    with the Habitable Worlds Observatory mission (HWO). In particular, MSWC can enable Roman to detect large potentially
    habitable planets around Alpha Centauri (if Roman achieves the same contrast and inner working angle around Alpha Centauri
    as around single stars). In addition, a small mission called Toliman is being developed to perform diffractive-pupil based
    astrometry on binary stars, which leverages stellar binarity to achieve better astrometry precision than is possible around
    single stars. Toliman is also designed to be sensitive to potentially habitable planets, at least around Alpha Centauri.
    We also summarize the synergies between Toliman, Roman, and HWO. In particular, sensitivity and confidence in detecting
    planets is improved with independent direct imaging and astrometry detections. Toliman can also provide known planet targets
    for Roman and HWO, saving time that would be required to conduct a blind search. Finally, requirements for HWO can be
    better tuned if we have more information about planetary systems around binaries, which can be provided by Toliman and/or
    Roman.'
