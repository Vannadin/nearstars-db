  abstract: We report lucky imaging observations of 62 pairs at mid-southern declinations sourced from the WDS with separations
    larger than 4 arc seconds and magnitude less than 10. The measures comprise separations and PA calibrated against Alpha
    Centauri AB and drift scans, presented as weighted means of these two calibration methods, with formal internal uncertainties
