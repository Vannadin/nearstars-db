  year: '2026'
  pubdate: '2026-04-00'
  doi: 10.3847/1538-3881/ae328a
  abstract: Far-ultraviolet (FUV) radiation is a driving source of photochemistry in planetary atmospheres. Proper interpretation
    of atmospheric observations requires a full understanding of the radiation environment that a planet is exposed to. Using
    the Suborbital Imaging Spectrograph for Transition-region Irradiance from Nearby Exoplanet host stars (SISTINE) rocket-borne
    spectrograph, we observed the Sun-like binary system α Centauri AB and captured the FUV spectrum of both stars simultaneously.
    Our spectra cover 980─1570 Å providing the broadest FUV wavelength coverage taken in a single exposure and spanning several
    key stellar emission features that are important photochemical drivers. Combining the SISTINE spectra with archival observations,
    model spectra, and a novel stellar activity model, we have created spectral energy distributions (SEDs) spanning 5 Å─1
    mm for both α Centauri A and B. We use the SEDs to estimate the total high-energy flux (X-ray─UV) incident on a hypothetical
    exoplanet orbiting α Centauri A. Because the incident flux varies over time due to the orbit of the stellar companion
    and the activity level of each star, we use the VULCAN photochemical kinetics code to estimate atmospheric chemical abundances
    in the case of minimum and maximum flux exposure. Our results indicate that enhanced atmospheric mass loss due to stellar
    binarity will likely not be an issue for future exoplanet-hunting missions such as the Habitable Worlds Observatory when
    searching for Earth-like planets around Sun-like stars.
