  arxiv_id: '2410.02893'
  ads_bibcode: 2024JATIS..10c5003N
  title: The assembly, characterization, and performance of SISTINE
  authors:
  - Nell, Nicholas
  - France, Kevin
  - Kruczek, Nicholas
  - Fleming, Brian
  - Ulrich, Stefan
  - Behr, Patrick
  - Quijada, Manuel A.
  - Hoyo, Javier Del
  - Hennessy, John
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.1117/1.JATIS.10.3.035003
  abstract: The Suborbital Imaging Spectrograph for Transition region Irradiance from Nearby Exoplanet host stars (SISTINE)
    is a rocket-borne ultraviolet (UV) imaging spectrograph designed to probe the radiation environment of nearby stars. SISTINE
    operates over a bandpass of 98 to 127 and 130 to 158 nm, capturing a broad suite of emission lines tracing the full 10<SUP>4</SUP>‒10<SUP>5</SUP>
    K formation temperature range critical for reconstructing the full UV radiation field incident on planets orbiting solar-type
    stars. SISTINE serves as a platform for key technology developments for future ultraviolet observatories. SISTINE operates
    at moderate resolving power (R∼1500), while providing spectral imaging over an angular extent of ∼6<SUP>'</SUP>, with
    ∼2<SUP>″</SUP> resolution at the slit center. The instrument is composed of an f/14 Cassegrain telescope that feeds a
    2.1× magnifying spectrograph, utilizing a blazed holographically ruled diffraction grating and a powered fold mirror.
    Spectra are captured on a large format microchannel plate (MCP) detector consisting of two 113×42 mm segments each read
    out by a cross-delay line anode. Several novel technologies are employed in SISTINE to advance their technical maturity
    in support of future NASA UV/optical astronomy missions. These include enhanced aluminum lithium fluoride coatings (eLiF),
    atomic layer deposition (ALD) protective optical coatings, and ALD-processed large-format MCPs. SISTINE was launched a
    total of three times with two of the three launches successfully observing targets Procyon A and α Centauri A and B.
