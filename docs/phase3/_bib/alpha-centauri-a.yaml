  doi: null
  abstract: A majority of Sun-like stars have at least one stellar companion that can introduce additional noise into the
    field of view of any high-contrast imaging instrument, limiting the achievable contrast. These include high-quality target
    stars such as the A and B components of Alpha Centauri, our nearest stellar neighbor. Enabling direct imaging of binary
    stars has the potential to increase the scientific yield for coronagraphic instruments planned on NASA's future space
    missions and concepts, including the Roman Space Telescope and the Astro2020 IR/O/UV flagship. Multi-Star Wavefront Control
    (MSWC) is a wavefront-control technique that simultaneously removes the (mutually incoherent) stellar leakage from both
    stellar components, enabling direct imaging of planets in many binary star systems. MSWC is an algorithmic technique and
    can be used with existing wavefront control systems on coronagraphic instruments (as well as starshades if a deformable
    mirror is available in the optical path) including planned observations on the upcoming PICTURE-D balloon flight. We report
    on the latest experimental and numerical results obtained with MSWC as part of the technology development effort to demonstrate
    compatibility with existing high-contrast imaging platforms for this technique. We first report on functional tests carried
    out at Subaru's SCExAO instrument operating in-air and showing the sub-Nyquist mode at 4.1e-6 contrast in monochromatic
    light. The Super-Nyquist regime of MSWC was recently tested in vacuum at JPL's High Contrast Imaging Testbed (HCIT) on
    the Decadal Survey Testbed (DST) reaching 8.6e-9 contrast in a 10% band. We also report on results for the current stage
    of vacuum testing at HCIT's Occulting Mask Coronagraph (OMC) testbed using a mask similar to the contributed MSWC mask
    on the Roman Space Telescope's coronagraph instrument which has demonstrated suppression at the 9.8e-9 contrast at Super-Nyquist
    separations around the 3rd diffraction order and is planned to use a novel binary source simulator.
