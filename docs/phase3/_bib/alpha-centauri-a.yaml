  title: 'Stellar Library of Differential Emission Measures and Extreme Ultraviolet Spectra: Dwarf Stars Observed by the Extreme
    Ultraviolet Explorer'
  authors:
  - Duvvuri, Girish M.
  - Berta-Thompson, Zachory K.
  - Pineda, J. Sebastian
  - France, Kevin
  - Brown, Alexander
