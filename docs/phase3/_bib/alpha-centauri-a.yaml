  title: 'TOLIMAN End-to-End Simulator: Detecting Planets Around the Nearest Binaries with Astrometry'
  authors:
  - Roberson, William
  - Bendek, Eduardo
  - Nielsen, Eric
  - Vasisht, Gautam
  - Belikov, Ruslan
  - Mamajek, Eric
