  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.3847/1538-4357/adc564
  abstract: The precision of stellar models is higher than the precision at which we are able to measure the masses of most
    stars, with the notable exception of binaries where we can determine dynamical masses of the component stars. In addition
    to well-measured stellar properties, the ideal benchmark star is far enough from its companion that its properties are
    indistinguishable from an otherwise identical single star. Currently, there are a handful of stars with precise (±3%),
    model-independent mass measurements that are "effectively single" and for which we can obtain clean spectra (i.e., spectra
    that are not blended with a close companion). In this paper, we introduce GJ 105 AC as the newest members of this exclusive
    population. We present an updated orbital analysis for the long-period K3+M7 binary GJ 105 AC. We jointly analyze radial
    velocity (RV) and relative astrometry data, including new RVs from the Miniature Exoplanet Radial Velocity Array that
    capture the full periapsis passage and the RV minimum of the 76.0 ± 1.3 yr orbit for the first time. We derive precise
    dynamical masses of M<SUB>1</SUB> = 0.78 ± 0.02 M<SUB>⊙</SUB> and M<SUB>2</SUB> = 0.098 ± 0.002 M<SUB>⊙</SUB>. We find
    that of all stars with similarly precise masses (∼2%), GJ 105 AC stands out as having the widest on-sky separation after
    α Centauri AB, making it one of the most easily accessible to spectroscopy, as well as the the second-widest true separation,
    ensuring that its members are truly "effectively single" in terms of their evolution.
