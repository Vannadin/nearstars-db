  ads_bibcode: null
  title: Discovery of a New Nearby Star
  authors:
  - B. J. Teegarden
  - S. H. Pravdo
  - M. Hicks
  - S. B. Shaklan
  - K. Covey
  - O. Fraser
  - S. L. Hawley
