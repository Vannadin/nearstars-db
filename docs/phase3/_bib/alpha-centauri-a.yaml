  doi: 10.1051/0004-6361/202558384
  abstract: Context. Binary and multiple star systems are abundant, and they are important for determining the ages of exoplanet
    systems and Galactic populations. Given the wealth of data provided by Gaia and the upcoming PLATO mission, it is essential
    to improve stellar models to obtain accurate stellar ages. Multiple systems reduce the degeneracy in the stellar parameters
    that control evolution, and they allow better constraints on the physical processes at work in stellar interiors. Aims.
    Our objective is to apply a mapping technique to estimate the age of a system and the initial chemical composition. We
    also evaluate the influence of observational uncertainties in mass and heavy-element mixtures on results. Methods. We
    applied an inverse calibration method to the evolution of a multiple stellar system, assuming that the stars share the
    same age and initial chemical composition. This approach determines age, the initial mass fractions of helium (Y<SUB>ini</SUB>)
    and heavy elements (Z<SUB>ini</SUB>), as well as the convective mixing-length parameters (α<SUB>A</SUB> and α<SUB>B</SUB>).
    It uses the observed luminosities (L<SUB>A</SUB> and L<SUB>B</SUB>), radii (R<SUB>A</SUB> and R<SUB>B</SUB>), and surface
    chemical compositions (Z/X<SUB>A</SUB> and Z/X<SUB>B</SUB>). Results. We used the most recent observational data for M,
    R, L, and [Fe/H] of α Centauri A and B as input data for our method. We compared two assumptions for the Z/X ratio, following
    the results for the solar composition. For an assumed high solar Z/X<SUB>⊙</SUB> = 0.0245, we obtain an age of 7.8 ± 0.6
    Ga, Y<SUB>ini</SUB> = 0.284 ± 0.004, and Z<SUB>ini</SUB> = 0.0335 ± 0.0015. For a low solar Z/X<SUB>⊙</SUB> = 0.0181,
    the derived age is 8.7 ± 0.6 Ga, Y<SUB>ini</SUB> = 0.267 ± 0.008, and Z<SUB>ini</SUB> = 0.025 ± 0.002. Observational errors
    in the stellar masses of ±0.002 lead to an age error of 0.6 Ga. Overshooting of 0.05 − 0.20H<SUB>p</SUB> at the boundary
    of the convective core increases the age by 0.6 − 2.1 Ga. Models with higher Z/X and radiative cores, with ages of 7.2
    − 7.8 Ga, appear preferable and show better agreement with the observed asteroseismic frequencies.
