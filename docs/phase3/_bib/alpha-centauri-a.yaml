  ads_bibcode: 2024ApJ...961..235P
  title: Lyα Absorption in a "Croissant-like" Heliosphere
  authors:
  - Powell, Erick
  - Opher, Merav
  - Kornbleuth, Marc Z.
  - Baliukin, Igor
  - Michael, Adam T.
  - Wood, Brian E.
  - Izmodenov, Vladislav
