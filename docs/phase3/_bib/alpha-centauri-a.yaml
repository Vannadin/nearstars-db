  abstract: The Mid-Infrared Imager (MIRI) on JWST has several four quadrant phase masks and Lyot coronagraphs that are beginning
    to open up the field of space-based high-contrast imaging in the mid-IR. MIRISim is a program developed to simulate observations
    formatted as the same raw, level 1b ramp data as real MIRI observations. These simulated data enable pipeline development
    prior to real data release, and can also help inform JWST proposal preparation. We present MIRISim Coronagraphy, an addition
    to MIRISim that provides coronagraphic imaging simulation, which is a feature missing from the current standard release.
    This expands MIRISim simulating capabilities to all of MIRI's observing modes. We validate MIRISim Coronagraphy output
    against real PSF reference star observations, and process the simulated data through SpaceKLIP to ensure that it produces
    usable data that match on-sky observations. We present high-fidelity simulated MIRI images of companions using astrometric
    and photometric predictions based on previous literature measurements. Upcoming MIRI programs to directly image the brown
    dwarf companion GJ 758 B and nearby stellar systems like Alpha Centauri in search of exoplanets in the mid-IR provide
    further opportunities to validate MIRISim Coronagraphy's contrast performance and recovered photometry and astrometry
    by comparing simulation output to real science data. We also implement additional user-friendly tools including a function
    to calculate star and planet spectral flux densities in the mid-infrared by incorporating stellar and exoplanet atmospheric
    models. Finally, we document MIRISim Coronagraphy installation and simulation steps in a provided user guide, including
    debugging notes, and discuss streamlining MIRISim's usability by optimizing its SpaceKLIP compatibility. This preliminary
    software release enables the public use of MIRISim Coronagraphy as a tool for ongoing programs, preparation of future
    JWST cycle proposals, and robust pipeline testing and development.
