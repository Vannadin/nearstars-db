  arxiv_id: '1912.02593'
  ads_bibcode: null
  title: Non-Linear Convergence of Solar-like Stars Chromospheres using Millimeter, Sub-millimeter, and Infrared Observations
  authors:
  - F. Tapia-Vazquez
  - V. De la Luz
  year: '2019'
  pubdate: '2019-12-05'
  doi: 10.3847/1538-4365/ab5f0a
  abstract: In this work, we present a new methodology to fit the observed and synthetic spectrum of solar-like stars at millimeter,
    submillimeter and infrared wavelengths through semiempirical models of the solar chromosphere. We use the Levenberg-Marquardt
    algorithm as a Non-Linear method, PakalMPI as the semiempirical model of the solar chromosphere, and recent observations
    from the Atacama Large Millimeter/submillimeter Array (ALMA) of Alpha Centauri A as a test case. Our results show that
    we can use solar chromospheric semiempirical models as an input model to reproduce the observed spectrum of solar-like
    stars. The new profiles show similarities to the solar chromosphere as a minimum of temperature (without the restriction
    from CO emission) and a plateau in the high chromosphere. Our method provides a new fast numerical tool to estimate the
    physical conditions of solar-like stars.
