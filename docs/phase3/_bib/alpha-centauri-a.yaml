- &id035
  arxiv_id: astro-ph/0611733
  ads_bibcode: null
  title: 'Models of alpha Centauri A and B with and without seismic constraints: time dependence of the mixing-length parameter'
  authors:
  - M. Yildiz
  year: '2006'
  pubdate: '2006-11-23'
  doi: 10.1111/j.1365-2966.2006.11218.x
  abstract: The $α$ Cen binary system is a well-known stellar system with very accurate observational constraints to structure
    of its component stars. In addition to the classical non-seismic constraints, there are also seismic constraints for the
    interior models of $α$ Cen A and B. These two types of constraint give very different values for the age of the system.
    While we obtain 8.9 Gyr for the age of the system from the non-seismic constraints, the seismic constraints imply that
    the age is about 5.6-5.9 Gyr. There may be observational or theoretical reasons for this discrepancy, which can be found
    by careful consideration of similar stars. The $α$ Cen binary system, with its solar type components, is also suitable
    for testing the stellar mass dependence of the mixing-length parameter for convection derived from the binaries of Hyades.
    The values of the mixing-length parameter for $α$ Cen A and B are 2.10 and 1.90 for the non-seismic constraints. If we
    prioritize to the seismic constraints, we obtain 1.64 and 1.91 for $α$ Cen A and B, respectively. By taking into account
    of these two contrasting cases for stellar mass dependence of the mixing-length parameter, we derive two expressions for
    its time dependence, which are also compatible with the mass dependence of the mixing-length parameter derived from the
    Hyades stars. For assessment, these expressions should be tested in other stellar systems and clusters.
