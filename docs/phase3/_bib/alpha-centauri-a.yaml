  arxiv_id: '2105.00034'
  ads_bibcode: 2021AJ....162...58Q
  title: 'Exomoons in Systems with a Strong Perturber: Applications to α Cen AB'
  authors:
  - Quarles, Billy
  - Eggl, Siegfried
  - Rosario-Franco, Marialis
  - Li, Gongjie
  year: '2021'
  pubdate: '2021-08-00'
  doi: 10.3847/1538-3881/ac042a
  abstract: The presence of a stellar companion can place constraints on occurrence and orbital evolution of satellites orbiting
    exoplanets, i.e., exomoons. In this work we revise earlier orbital stability limits for retrograde orbits in the case
    of a three-body system consisting of a star, planet, and satellite. The revised limit reads ${a}_{\mathrm{sat}}^{\mathrm{crit}}\approx
    0.668(1-1.236{e}_{{\rm{p}}})$ for e<SUB>p</SUB> ≤ 0.8 in units of the Hill Radius and represents the lower critical orbit
    as a function of the planetary eccentricity e<SUB>p</SUB>. A similar formula is determined for exomoons hosted by planets
    in binary star systems, where e<SUB>p</SUB> is replaced with the components of free and forced eccentricity from secular
    orbit evolution theory. By exploring the dynamics of putative exomoons in α Centauri AB we find that the outer stability
    limit can be much less than half the Hill Radius due to oscillations in the planetary orbital eccentricity caused by the
    gravitational interaction with the binary star. We show, furthermore, how the resulting truncation of the outer stability
    limit can affect the outward tidal migration and potential observability of exomoons through transit-timing variations
    (TTVs). Typical TTV (rms) amplitudes induced by exomoons in binary systems are ≲10 minutes and appear more likely for
    planets orbiting the less massive stellar component.
