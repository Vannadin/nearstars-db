  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.1093/mnras/stae2299
  abstract: We employed advanced ionization equilibrium models that we developed in Dufresne et al. (2024), which include
    charge transfer and density effects, to model UV stellar irradiances for a sample of stars. Our sample includes <inline-formula><tex-math
    id="TM0001" notation="LaTeX">$\epsilon$</tex-math></inline-formula> Eridani (K2 V), <inline-formula><tex-math id="TM0002"
    notation="LaTeX">$\alpha$</tex-math></inline-formula> Centauri A (G2 V), Procyon (F5 V), and Proxima Centauri (M5.5 Ve).
    We measured line fluxes from STIS data sets and used O IV and O V as density diagnostics to find the formation pressure
    of ions in the transition region (TR) and adopted a simple differential emission measure (DEM) modelling. Our findings
    indicate significant improvements in modelling spectral lines from anomalous ions such as Si IV, C IV, and N V of the
    Li- and Na-like sequences, which produce the strongest lines in the UV. For example, the Si IV lines were under-predicted
    by a factor of 5 and now are within 40 per cent the observed fluxes. The improved models allow us to obtain for the first
    time reliable estimates of some stellar chemical abundances in the TR. We compared our results with available photospheric
    abundances in the literature and found no evidence for the first ionization potential (FIP) effect in the TR of our stellar
    sample. Finally, we compared our results with the solar TR that can also be described by photospheric abundances.
