  arxiv_id: '2505.08042'
  ads_bibcode: 2025ApJ...985..255D
  title: Three-dimensional Orbit and Dynamical Masses of GJ 105 AC
  authors:
  - Dedrick, Cayla M.
  - Wright, Jason T.
  - Eastman, Jason D.
  - Blake, Cullen H.
  - Johnson, Samson A.
  - Plavchan, Peter
  - Johnson, John Asher
  - Sliski, David H.
  - Wilson, Maurice L.
