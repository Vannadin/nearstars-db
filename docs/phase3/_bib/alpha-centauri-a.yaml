  title: Lyman α Absorption in a "Croissant-like" Heliosphere
  authors:
  - Powell, Erick
  - Opher, Merav
  - Kornbleuth, Marc Zachary
  - Wood, Brian E.
  - Izmodenov, Vladislav
  - Baliukin, Igor
  - Michael, Adam
