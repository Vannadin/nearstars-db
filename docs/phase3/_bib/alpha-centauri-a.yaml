  abstract: SHERA is a proposed space mission that will use microarcsecond astrometry of nearby binary systems to detect S-type
    Earth-analog planets (habitable zone planets with masses as low as 1 Earth mass). SHERA will measure the reflex motion
    of one binary component due to orbiting planets, but is only sensitive to this motion in the direction of the other star.
    The unique form and high precision (~1 microarcsecond) of SHERA data means special care is required in detecting planets
    and extracting their orbital parameters. We introduce a specialized SHERA orbit-fitting pipeline that is able to detect
    and characterize planets using these data and present a preliminary sensitivity analysis using simulated data from the
    α Centauri AB system. We demonstrate that this pipeline is able to accurately recover simulated planets, their orbital
    parameters, and masses for injected planets down to ~1 Earth mass orbiting in the habitable zone of both α Cen A and α
    Cen B.
