  title: 'TOLIMAN: An astrometry mission to detect Earth analogs orbiting the nearest sun-like stars'
  authors:
  - Mamajek, Eric
  - Bendek, Eduardo
  - Belikov, Ruslan
  - Meyer, Michael
  - Raouf, Nasrat
  - Nielsen, Eric
  - Sirbu, Dan
  - Vasisht, Gautam
