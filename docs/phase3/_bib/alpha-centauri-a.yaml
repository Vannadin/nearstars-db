  abstract: Keplerian-Stacker is a pioneering multi-epoch algorithm designed to combine numerous observations while taking
    into account the orbital motion of potential exoplanets to enhance the final detection threshold. K-Stacker has been used
    on several surveys (SHINE, NEAR-VISIR, SPHERE-ZIMPOL) containing multiple observations on single targets. Beyond the algorithm,
    we also suggest that K-Stacker should be seen as a novel observational strategy, leveraging multi-epoch observations to
    extract orbital parameters of the sought-after planets while minimising the total exposure time, thereby optimizing the
