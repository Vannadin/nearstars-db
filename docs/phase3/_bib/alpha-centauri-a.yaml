  abstract: Direct imaging of extra-solar planets is now a reality, especially with the deployment and commissioning of the
    first generation of specialized ground-based instruments such as the Gemini Planet Imager and SPHERE. These systems will
    allow detection of Jupiter-like planets $10^7$ times fainter than their host star. Obtaining this contrast level and beyond
    requires the combination of a coronagraph to suppress light coming from the host star and a wavefront control system including
    a deformable mirror (DM) to remove residual starlight (speckles) created by the imperfections of telescope. However, all
    these current and future systems focus on detecting faint planets around single host stars, while several targets or planet
    candidates are located around nearby binary stars such as our neighboring star Alpha Centauri. Here, we present a method
    to simultaneously correct aberrations and diffraction of light coming from the target star as well as its companion star
    in order to reveal planets orbiting the target star. This method works even if the companion star is outside the control
    region of the DM (beyond its half-Nyquist frequency), by taking advantage of aliasing effects.
