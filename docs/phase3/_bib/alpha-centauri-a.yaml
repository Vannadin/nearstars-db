  ads_bibcode: 2026AAS...24744317W
  title: Thermal Infrared Imaging of Nearby Habitable-Zone Exoplanets with LBTI
  authors:
  - Wagner, Kevin
  - Ertel, Steve
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: A dramatic step forward toward imaging nearby habitable-zone exoplanets was accomplished by Breakthrough Watch/NEAR.
    NEAR implemented the first mid-infrared (11 micron) exoplanet imaging system on the 8.2m Very Large Telescope (VLT), ultimately
    reaching sub-Neptune sensitivities in 70 hours of observations of the nearby Alpha Centauri binary. We now aim to take
    this science and sensitivity to the next level by utilizing the full capabilities of the world's largest infrared imaging
    telescope ─ the 23-m Large Binocular Telescope (LBT). By upgrading the LBT's interferometer (LBTI) with a state-of-the-art
    new mid-IR detector, we improve the resolving power by a factor of three (a factor of ten compared to JWST), and the sensitivity
    by a factor of six ─ enabling low-mass planets to be imaged in the habitable zones of the nearest single Sun-like stars,
    Epsilon Eridani and Tau Ceti in long stares. Here, we describe our recently started project to search for super-Earth-sized
    planets, and ice/gas giant planets that could host rocky moons, within the habitable zones of the closest single Sun-like
    stars.
