  title: 'Alpha Centauri Binary: a Test Bed for Stellar Core Properties'
  authors:
  - Nabachwa, Racheal
  - Nsamba, Benard
  - Dumba, Cosmos
  year: '2024'
  pubdate: '2024-08-00'
  doi: null
  abstract: The mass of main-sequence stars plays an essential role in the determination of their evolution and interior structure.
    Main-sequence stars in the mass transition zone between convective and radiative cores offer an opportunity for testing
    the sensitivity of stellar core properties to the variations of stellar core physics, such as core overshoot, metallicity,
    atomic diffusion and gravitational settling. In this poster, we employ the Alpha Century binary as our benchmark star
    in the mass transition zone to unveil the impact of stellar model physics and different combination of observable constraints
    on the nature of stellar cores.
