  ads_bibcode: 2021hst..prop16787A
  title: Cycles and the Seven Dwarfs
  authors:
  - Ayres, Thomas R.
  year: '2021'
  pubdate: '2021-06-00'
  doi: null
  abstract: 'Somewhat erratic, unpredictable long-term starspot cycles of late-type stars are relevant for understanding the
    Sun''s analogous high-energy modulations, in turn crucial to Earth-impacting "Space Weather" (SW). Similarly, stellar
    SW counterparts can have equivalent, or more severe, adverse effects on their exoplanets. The solar decadal oscillations
    are symptomatic of a deep-seated magnetic pump -- the Dynamo -- whose internal workings remain elusive. Key question:
    is Sun''s 11-year cycle normal, or instead a transition state? A 3-year addition to earlier long-term joint Chandra/HST
    programs (previously involving Alpha Cen [G2V+K1V] and Procyon [F5IV]), will be carried out for two new targets, the nearby
    binaries Xi Bootis (G8V+K4) and 70 Ophiuchi (K0V+K5V). <P />The HST part of the program will measure FUV subcoronal (T~100,000
    K) emission lines, like Si IV 140 nm, C IV 155 nm, and density-sensitive O IV 140 nm, as well as important chromospheric
    (T~10,000 K) features, like O I 130 nm, C II 133 nm, and C I 165 nm, in both pairs of stars, with one COS visit per system
    each year. Analyses of these emissions, including dynamical information encoded in Doppler shifts and distortions of the
    line shapes, can provide insight concerning the thermal/pressure structure of the anomalously hot outer layers of these
    stars; and how these structural properties change with the ebb and flow of a magnetic activity cycle.'
