  title: 'Orbiting laser configuration and sky coverage: coherent reference for Breakthrough Starshot ground-based laser array'
  authors:
  - Peretz, Eliad
  - Mather, John C.
  - Hamilton, Christine
  - Pabarcius, Lucas
  - Hall, Kevin
