  doi: 10.1051/0004-6361/201527859
  abstract: 'Context. Despite the thorough work of van Leeuwen, the parallax of α Centauri is still far from being carved
    in stone. Any derivation of the individual masses is therefore uncertain, if not questionable. And yet, that does not
    prevent this system from being used for calibration purpose in several studies. <BR /> Aims: We aim for more accurate
    model-free parallax and individual masses of this system. <BR /> Methods: With HARPS, the radial velocities are not only
    precise but also accurate. Ten years of HARPS data are enough to derive the complement of the visual orbit for a full
    3D orbit of α Cen. <BR /> Results: We locate α Cen (743 mas) right where Hipparcos had originally put it, I.e. slightly
    farther away than derived by Söderhjelm. The components are thus a bit more massive than previously thought (1.13 and
    0.97 M<SUB>☉</SUB> for A and B, respectively). These values are now in excellent agreement with the latest asteroseismologic
    results. <P />Based on data obtained from the ESO Science Archive Facility under request numbers HBOFFIN/190700, Pourbaix/192287,
    Pourbaix/192364, Pourbaix/192404, Pourbaix/192552, Pourbaix/ 192630, and Pourbaix/199124.'
