  abstract: We analyse our recently-published velocity measurements of alpha Cen A (Butler et al. 2004). After adjusting the
    weights on a night-by-night basis in order to optimize the window function to minimize sidelobes, we extract 42 oscillation
    frequencies with l=0 to 3 and measure the large and small frequency separations. We give fitted relations to these frequencies
    that can be compared with theoretical models and conclude that the observed scatter about these fits is due to the finite
    lifetimes of the oscillation modes. We estimate the mode lifetimes to be 1-2 d, substantially shorter than in the Sun.
