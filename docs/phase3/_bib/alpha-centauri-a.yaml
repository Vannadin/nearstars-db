  year: '2023'
  pubdate: '2023-12-00'
  doi: null
  abstract: Lyα absorption profiles have been used to detect astrospheres and heliospheric absorption from the hydrogen wall
    and heliotail. Using magnetohydrodynamic (MHD) models of the heliosphere, we can compare simulated to observed Lyα profiles
    to probe the neutral hydrogen within and near the heliosphere. There is an ongoing controversy whether the heliosphere
    has a long ``comet-like'' tail or a short ``croissant-like'' tail. Here we present the first Lyαabsorption investigation
    using a ``croissant-like'' heliosphere. With identical boundary conditions we compare the BU model, which presents a ``croissant-like''
    short tail, and the Moscow model, which presents a ``comet-like'' long tail. The BU and Moscow models present nearly identical
    Lyα profiles towards nose targets (α Cen and 36 Oph). Differences in Lyα profiles are shown towards the tail target (HD35296).
    Despite the shortened heliotail of the ``croissant'' model, significant downwind heliosheath absorption is seen, implying
    that an extended tail model is not required to reproduce the heliosheath Lyα absorption observations. The heliotail in
    the BU model provides a 5% shallower absorption in the range of 75 km/s to 150 km/s in the heliocentric velocity scale
    and shifted the absorption profile by 4 km/s. This is approximately the size of the observation resolution presented,
    but future observations with finer gratings may be able to resolve these differences. Additionally, when using higher
    ISM neutral and plasma densities and lower magnetic field (|BLISM| = 3.2 μG, in the direction determined from the study
    of Interstellar Boundary Explorer Ribbon) than in the Moscow model, we find better agreement with observed Lyα profiles.
    None of the models presented show agreement in all directions simultaneously. Furthermore, we show that for the ISM conditions
    with the least certainty (np,LISM, nH,LISM, TLISM, BLISM), the BLISM strength and direction have the most significant
    effect on the structure of hydrogen wall and therefore the simulated absorption profiles. We also present the first results
    from the BU model with FLEKS implemented as the kinetic neutral model. Using Lyα absorption observation of hydrogen wall
    targets, we constrain the strength of BLISM.
