  title: Observing the Alpha Cen Ab Planet Candidate Using the Roman Space Telescope Coronagraph
  authors:
  - Bendek, Eduardo
  - Belikov, Ruslan
  - Sirbu, Dan
  - Mawet, Dimitri
  - Beichman, Charles
  - Sanghi, Aniket
  - Hu, Renyu
