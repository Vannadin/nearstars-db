  abstract: The initial Galactic velocity vector for the recently discovered hyperbolic asteroid 1I/'Oumuamua (A/2017 U1)
    is calculated for before its encounter with our solar system. The latest orbit (JPL-13) shows that 'Oumuamua has eccentricity
