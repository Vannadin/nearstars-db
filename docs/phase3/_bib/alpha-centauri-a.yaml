  abstract: To date, over 4900 exoplanets have been confirmed, and exoplanet statistics suggest that nearly 100% of Sun-like
    stars (FGK) host planetary systems. Because of their close proximity to our solar system, α-Cen A and B continue to generate
    interest in the search for Earth-like planets. The years 2022-2035 will be an ideal observing period when the search for
    planets around A/B will benefit from less contamination from the other component. It is therefore timely to predict what
    kind of planets to expect in the α-Cen AB system and thus guide future observations. Based on the spectroscopically measured
    chemical compositions of α-Cen A and B and an empirical star-planet chemical model, we estimate the elemental composition
    of a hypothetical rocky planet in the habitable zone of the system (dubbed "α-Cen-Earth"). This estimate is critical to
    further understanding the detailed properties of the planet, such as internal structure, mineralogy, and atmosphere. Overall,
    we find that an α-Cen-Earth (if it exists) would be geochemically similar to our Earth, but would also differ in interesting
    ways with respect to its slightly larger iron core, lower geological activity, and possible lack of plate tectonics. The
    predictions could be observationally tested against a dry, CO2-dominated atmosphere.
