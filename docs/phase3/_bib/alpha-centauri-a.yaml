- &id084
  arxiv_id: '2411.00557'
  ads_bibcode: 2024MNRAS.535.2562C
  title: Stellar surface information from the Ca II H&amp;K lines - II. Defining better activity proxies
  authors:
  - Cretignier, M.
  - Hara, N. C.
  - Pietrow, A. G. M.
  - Zhao, Y.
  - Yu, H.
  - Dumusque, X.
  - Sozzetti, A.
