  ads_bibcode: 2026AAS...24744322B
  title: Pathways to Exo-World Discoveries with Fluidic Telescopes
  authors:
  - Biancalani, Enrico
  - Balaban, Edward
  - Bendek, Eduardo
  - Wagner, Kevin
  - Team, Flute
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: 'In-space assembly of mirrors via the scale-invariant technology of fluidic shaping can enable the paradigm shift
    from space-borne to space-assembled telescopes, which can be strategically scaled up at a lower cost in an iterative fashion.
    Starting from a notional ~1-m technology demonstrator and pathfinder, we explore some of the potential science cases for
    various fluidic telescope (alias FLUTE) versions. In particular, following the suggestion by Wagner et al. (2025), we
    propose a feasibility study on a dedicated FLUTE with an aperture of 3+ m: this could conduct a relative-astrometry monitoring
    campaign on the directly-imaged habitable-zone giant exoplanet candidate α Centauri Ab - with respect to its coronagraphed
    host star - in search for Earth-like exomoons. Then, we review the benefits of follow-up direct-imaging missions to the
    Habitable Worlds Observatory (HWO). E.g., the Large UV/Optical/IR Surveyor (LUVOIR) concept could be revived into a FLUTE
    with a ~12-m-aperture off-axis optical configuration that yields about 3 times the ~25 exo-Earth candidates recommended
    by the Decadal Survey on Astronomy and Astrophysics 2020 (alias Astro2020), over a 2-year blind-search survey. The number
    of confirmed candidates would scale proportionally, given an underlying binomial distribution. We also show that, at the
    limit where the cumulative time spent on overheads dominates the survey time, a FLUTE could be assembled that yields ~300
    exo-Earth candidates. In principle, FLUTEs can be scaled to much larger diameters - our current programmatic flagship
    FLUTE has a notional primary aperture of ~50 m - in order to aim at specific targets for a systematic search of biosignatures
    or technosignatures.'
