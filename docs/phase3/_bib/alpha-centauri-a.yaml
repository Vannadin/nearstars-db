  title: Searching Our Closest Stellar Neighbor for Planets and Zodiacal Emission
  authors:
  - Beichman, Charles A.
  - Mawet, Dimitri
  - Belikov, Ruslan
  - Boccaletti, Anthony
  - Choquet, Elodie
