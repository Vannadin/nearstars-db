    what an observer actually measures in Particle Physics are these orbitals. So the ``Group'' structure seen in particle
    physics comes from the type of orbitals the particles can make. Of course wilder conclusions can be made regarding the
    nature of time and it's relation to orbitals. This author will save the wilder conclusions until later, as this situation
    has not been proven, but would like to delve into the many types of orbitals seen in Classical Physics, Atomic Physics
