  abstract: '(Note: this is the HST part of a joint Chandra/HST project: the original Chandra proposal abstract follows.)
    <P />Chandra has been tracking coronal activity cycles of late-type stars via high-contrast soft X-rays, jointly with
    HST to capture UV tracers. Objective is to provide fundamental observational constraints for contemporary and future studies
    of the underlying magnetic Dynamo, whose inner workings remain elusive. The Sun''s high-energy modulations play an important
    "Space Weather" role in our heliosphere, as do stellar counterparts for their exoplanets. 3-year time-domain campaign
    (jointly with HST) is proposed for iconic Alpha Centauri, already followed by HRC-I since 2006. The Alpha Cen field also
    is rich in serendipitous sources, including flaring red dwarfs and several possibly cycling F-K stars.'
