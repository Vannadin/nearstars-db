- &id042
  arxiv_id: '2203.15161'
  ads_bibcode: 2022ApJ...930..121W
  title: Spectral Line Depth Variability in Radial Velocity Spectra
  authors:
  - Wise, Alexander
  - Plavchan, Peter
  - Dumusque, Xavier
  - Cegla, Heather
  - Wright, Duncan
  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/1538-4357/ac649b
  abstract: Stellar active regions, including spots and faculae, can create radial velocity (RV) signals that interfere with
    the detection and mass measurements of low-mass exoplanets. In doing so, these active regions affect each spectral line
    differently, but the origin of these differences is not fully understood. Here we explore how spectral line variability
    correlated with S-index (Ca H and K emission) is related to the atomic properties of each spectral line. Next, we develop
    a simple analytic stellar atmosphere model that can account for the largest sources of line variability with S-index.
    Then, we apply this model to HARPS spectra of α Cen B to explain Fe I line depth changes in terms of a disk-averaged temperature
    difference between active and quiet regions on the visible hemisphere of the star. This work helps establish a physical
    basis for understanding how stellar activity manifests differently in each spectral line and may help future work mitigating
    the impact of stellar activity on exoplanet RV surveys.
