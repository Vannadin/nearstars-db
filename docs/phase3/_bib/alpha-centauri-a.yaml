  abstract: In an era when the Alpha Centauri stars, including Proxima Centauri, with a planet known to be in the habitable
    zone, are being considered as mission targets, it's striking to consider how recently the study of starflight has emerged.
    Here early credit goes to pioneers like Les Shepherd, who studied antimatter propulsion for interstellar travel as early
    as 1952, and Robert Forward, whose sailcraft designs demonstrated that journeys long considered impossible could be achieved
    with sufficiently advanced engineering.
