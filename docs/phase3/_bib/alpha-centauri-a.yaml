- &id071
  arxiv_id: astro-ph/0505537
  ads_bibcode: null
  title: Constraining fundamental stellar parameters using seismology. Application to Alpha Centauri AB
  authors:
  - A. Miglio
  - J. Montalban
  year: '2005'
  pubdate: '2005-05-26'
  doi: 10.1051/0004-6361:20052988
  abstract: We apply the Levenberg-Marquardt minimization algorithm to seismic and classical observables of the Alpha Cen
    binary system in order to derive the fundamental parameters of Alpha Cen A+B and to analyze the dependence of these parameters
    on the chosen observables, on their uncertainty and on the physics used in stellar modelling. The seismological data are
    those by Bouchy & Carrier (2002) for Alpha Cen A, and those by Carrier & Bourban (2003) for Alpha Cen B. We show that
    while the fundamental stellar parameters do not depend on the treatment of convection adopted (Mixing Length Theory --
    MLT -- or ``Full Spectrum of Turbulence'' -- FST), the age of the system depends on the inclusion of gravitational settling,
    and is deeply biased by the small frequency separation of component B. We try to answer the question of the universality
    of the mixing length parameter, and we find a statistically reliable dependence of the alpha--parameter on the HR diagram
    location (with a trend similar to the one predicted by Ludwig et al.1999). We propose the frequency separation ratios
    introduced by Roxburgh & Voronstsov (2003) as better observables to determine the fundamental stellar parameters, and
    to use the large frequency separation and frequencies to extract information about the stellar structure. The effects
    of diffusion and equation of state on the oscillation frequencies are also studied, but present seismic data do not allow
    their detection.
