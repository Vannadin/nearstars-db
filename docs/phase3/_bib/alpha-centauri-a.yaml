  year: '2022'
  pubdate: '2022-03-00'
  doi: 10.5281/zenodo.6354494
  abstract: 'In the next decades, ground-based direct imaging capabilities at mid-infrared wavelengths will be needed alongside
    JWST in order to image planets close to their stars ─ including most nearby habitable-zone planets. The ESO/Breakthrough-sponsored
    New Earths in the Alpha Centauri Region (NEAR) program on the VLT recently completed the first ultra-deep imaging campaign
    in the mid-IR and demonstrated the first sensitivity to habitable-zone sub-Neptune- sized planets. In this talk, I will
    describe our on-going efforts to upgrade the mid-infrared capabilities of the LBT based on the lessons from NEAR, which
    will enable coordinated deep explorations for low-mass habitable-zone planets in both the Northern and Southern skies.
    I will also discuss our key observational program: LESSONS: The LBT Exploratory Survey for Super-Earths/Sub-Neptunes Orbiting
    Nearby Stars. Finally, I will discuss the potential scientific and societal benefits of imaging nearby habitable-zone
    exoplanets.'
