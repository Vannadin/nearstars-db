  title: 'The Quest to Uncover the Secrets of The Cosmos: A Study of the Journey to Interstellar Depths and Propulsion Systems
    Development'
  authors:
  - Mishra, Aditya
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.1109/ISEC61299.2024.10664759
  abstract: Interstellar travel is one of humanity's most captivating topics. Fantasized from movies to research laboratories,
    scientists and engineers alike have been pushing for its development since the conclusion of the Space race in the 1970s.
    Today, governments do not always see eye to eye with researchers, such as astrophysicists Carl Sagan or Avi Loeb. This
    paper endeavors to advance the prospect of Interstellar travel by examining the rationales that underscore its significance,
    the compulsory propulsion systems that necessitate development, the specific celestial objects or locations that warrant
    exploration, and the projected timeline for the inaugural probe to arrive at its target Interstellar destination. The
    study involved interviewing prominent experts who have devoted their careers to advancing Interstellar travel. The findings
    indicate that the most practical and cost-effective propulsion system for this mission is the Photon sail. The target
    destination for this mission is Alpha Centauri, and with a collaborative effort between private and government sectors,
    unmanned missions could potentially be launched toward Alpha Centauri by the end of the century.
