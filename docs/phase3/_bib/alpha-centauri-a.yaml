  year: '2018'
  pubdate: '2018-01-30'
  doi: 10.3847/1538-3881/aae09a
  abstract: We estimate the capture rate of interstellar objects by means of three-body gravitational interactions. We apply
    this model to the Sun-Jupiter system and the Alpha Centauri A\&B binary system, and find that the radius of the largest
    captured object is a few tens of km and Earth-sized respectively. We explore the implications of our model for the transfer
    of life by means of rocky material. The interstellar comets captured by the "fishing net" of the Solar system can be potentially
    distinguished by their differing orbital trajectories and ratios of oxygen isotopes through high-resolution spectroscopy
    of water vapor in their tails.
