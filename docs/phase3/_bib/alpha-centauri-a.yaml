  arxiv_id: astro-ph/0508609
  ads_bibcode: null
  title: Solar-like oscillations in alpha Centauri B
  authors:
  - Hans Kjeldsen
  - Timothy R. Bedding
  - R. Paul Butler
  - Joergen Christensen-Dalsgaard
  - Laszlo L. Kiss
  - Chris McCarthy
  - Geoffrey W. Marcy
