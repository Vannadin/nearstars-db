  abstract: When one Twin heads to say ``Alpha Centauri'' near the speed of light, and the other twin remains on Earth, the
    traveling Twin returns to the Earth younger than the Twin that remained. This situation can be remedied if the stationary
    Twin travels to Alpha Centauri at the same velocity using the same orbital and returns. Kepler discovered three types
    of Obitals, the Parabolic, the Elliptical and the Hyperbolic. If one takes the Earth and Alpha Centauri as a single system
    and the Twins as both using an Elliptical orbit about some point in the center, then one can clearly see that the entire
    orbital to restore the system to its original situation as having 720 degrees. It is a mobius. Minkowski surmised the
    Relativity is in Hyperbolic Space, due to its velocity, but it can be surmised that the three types of Orbitals are Subgroups
    of the Mobius, and that there may be higher dimensional orbitals that make this type of Mobius a subgroup. This author
