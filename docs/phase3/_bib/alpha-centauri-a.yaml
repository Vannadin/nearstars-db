  title: 'Searching for Habitable Exoplanets with Relative Astrometry (SHERA); SMEx Mission Concept: Target Star Selection
    and Characterization'
  authors:
  - Mamajek, Eric
  - Clark, Catherine
  - Christiansen, Jessie
  - Li, Yiting
