  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: The Roman Space Telescope Coronagraph offers a unique opportunity to observe our nearest solar twin, Alpha Centauri
    A, and characterize the habitable-zone gas giant candidate, Alpha Cen Ab. The candidate uniquely stands out among all
    imaged exoplanets to date as the one most similar in temperature, age and location to the planets in our own Solar System.
    Roman CGI offers the tantalizing opportunity to observe the candidate—determining its radius, temperature, and albedo—and
    to constrain its orbit. Observing Alpha Cen Ab with Roman would make it the first exoplanet to be imaged in both thermal
    emission and reflected light and would motivate an exciting search for habitable exomoons with the upcoming ELTs and HWO.
    <P />In addition, this candidate will inform the planet formation history and current dynamics of the Alpha Centauri AB
    system, including potentially habitable planets around both stars. In this talk, we describe our plan to observe this
    target using the Roman CGI, including the timing strategy to minimize contrast and avoid background objects. We also describe
    the key technical insights about coronagraph performance that we aim to gain, such as measuring companion leakage intensity,
    evaluating the impact of the large stellar diameter, and assessing CGI performance on very bright targets. <P />In subsequent
    observations, we aim to demonstrate Multi-Star Wavefront Control (MSWC) on-sky, observing Alpha Cen A using the Wide FoV
