  abstract: TOLIMAN is a proposed space mission that will use precise astrometry of nearby binary systems to detect orbiting
    Earth-analog exoplanets. We describe the end-to-end simulator that produces realistic TOLIMAN data and noise. The simulator
    contains four modules which (1) generate orbital data for the planets' signals including astrophysical noise, (2) create
    images as would be seen by the instrument detector with realistic instrument noise, (3) measure the astrometry of the
    binary with appropriate errors, and (4) fit the astrometric orbit using MCMC to generate posteriors on planet parameters.
    We show results from the end-to-end simulator for a data set containing a low-mass planet orbiting alpha Centauri A. We
    are able to successfully recover the orbital and physical parameters of the injected 1.4 Earth mass exoplanet.
