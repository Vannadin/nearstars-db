- &id037
  arxiv_id: astro-ph/0407468
  ads_bibcode: null
  title: 'The Chemical Composition of Alpha Centauri A: Strong Lines and the ABO Theory of Collisional Line Broadening'
  authors:
  - Marianne T. Doyle
  - B. J. O'Mara
  - J. E. Ross
  - M. S. Bessell
  year: '2004'
  pubdate: '2004-07-22'
  doi: 10.1071/AS03054
  abstract: The mean abundances of Mg, Si, Ca, Ti, Cr and Fe based on both strong and weak lines of Alpha Centauri A are determined
    by matching the observed line profiles with those synthesized from stellar atmospheric models and comparing these results
    with a similar analysis for the Sun. There is good agreement between the abundances from strong and weak lines. Strong
    lines should generally be an excellent indicator of abundance and far easier to measure than the weak lines normally used.
    Until the development of the Anstee, Barklem and O'Mara theory for collisional line broadening, the uncertainty in the
    value of the damping constant prevented strong lines being used for abundance determinations other than in close differential
    analyses. We found that Alpha Centauri A has a mean overabundance of 0.12+/-0.06 dex compared to solar mean abundances.
    This result agrees remarkably well with previous studies that did not use strong lines or the Anstee, Barklem and O'Mara
