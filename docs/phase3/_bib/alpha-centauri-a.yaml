  abstract: The very first measurement of a stellar parallax was made from the Cape by Thomas Henderson in 1832─1833, though
    he reported his measurement of alpha Centauri only in 1839, two months after Bessel had announced his success with 61
    Cygni. It is, therefore, fitting that the first confirmation of Baade's doubling of the cosmic distance scale (halving
    of the Hubble constant and doubling of the Hubble time) should have come from Andrew David Thackeray (1910─1978), also
    a Cape astronomer, speaking just after Baade at the 1952 IAU General Assembly in Rome. Baade had failed to find RR Lyrae
    stars in Andromeda with the newly commissioned 200-inch telescope at Palomar; Thackeray had found the RR Lyraes in the
    Magellanic Clouds, but much fainter than he expected. <P />The presentation focuses on that story, but with some sidelights
    also on the work of Michael Feast finding unexpectedly faint examples of other types of variables (and yes there are joint
    Feast and Thackeray papers ─ one at least with Wesselink of the Baade-Wesselink method for finding Cepheid distances),
    and on the work of Samuel E. Okoye in establishing astronomy, especially radio astronomy, elsewhere in sub-Saharan Africa.
