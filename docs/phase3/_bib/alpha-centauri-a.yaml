  arxiv_id: '2107.14378'
  ads_bibcode: 2021SPIE11823E..0GW
  title: Imaging low-mass planets within the habitable zones of nearby stars with ground-based mid-infrared imaging
  authors:
  - Wagner, Kevin
  - Ertel, Steve
  - Stone, Jordan
  - Leisenring, Jarron
  - Apai, Dániel
  - Kasper, Markus
  - Absil, Olivier
  - Close, Laird
