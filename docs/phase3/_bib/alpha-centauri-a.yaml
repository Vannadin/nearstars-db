  doi: 10.1103/wy1x-1lh7
  abstract: We investigate the production of axionlike particles (ALPs) in stellar cores, where they interact with electromagnetic
    fields and electrons, with typical masses between <inline-formula><mml:math><mml:mrow><mml:mi>O</mml:mi><mml:mo>(</mml:mo><mml:mn>0.1</mml:mn><mml:mo>)</mml:mo></mml:mrow></mml:math></inline-formula>
    and <inline-formula><mml:math><mml:mrow><mml:mi>O</mml:mi><mml:mo>(</mml:mo><mml:mn>10</mml:mn><mml:mo>)</mml:mo></mml:mrow><mml:mtext>
    </mml:mtext><mml:mtext> </mml:mtext><mml:mi>keV</mml:mi></mml:math></inline-formula>. These low-energy ALPs are gravitationally
    trapped in the orbits of stars and subsequently decay into two photons that we detect as monochromatic x-ray lines. We
    propose to search for these gravitationally trapped ALPs in the Alpha Centauri binary system, our closest stellar neighbor,
    using sensitive x-ray detectors like Chandra and eROSITA. Our search for ALP decay signals in the energy range of 0.2
    keV to 10 keV yielded null results, thus establishing the most stringent limits on ALP interactions to date. In the case
    of ALP-electron coupling <inline-formula><mml:math><mml:msub><mml:mi>g</mml:mi><mml:mrow><mml:mi>a</mml:mi><mml:mi>e</mml:mi><mml:mi>e</mml:mi></mml:mrow></mml:msub><mml:mo>≤</mml:mo><mml:msup><mml:mn>10</mml:mn><mml:mrow><mml:mo>-</mml:mo><mml:mn>15</mml:mn></mml:mrow></mml:msup></mml:math></inline-formula>,
    we have improved the limits on the ALP-photon coupling <inline-formula><mml:math><mml:msub><mml:mi>g</mml:mi><mml:mrow><mml:mi>a</mml:mi><mml:mi>γ</mml:mi><mml:mi>γ</mml:mi></mml:mrow></mml:msub></mml:math></inline-formula>
    in ALP mass range between 0.25 keV and 5 keV, compared to previous measurements, including those from GW170817, SN 2023ixf,
    and other sources, and specially the improvement reaches about 2 orders of magnitude at the mass of 2 keV. Even tighter
    constraints are set for larger <inline-formula><mml:math><mml:msub><mml:mi>g</mml:mi><mml:mrow><mml:mi>a</mml:mi><mml:mi>e</mml:mi><mml:mi>e</mml:mi></mml:mrow></mml:msub></mml:math></inline-formula>.
