- &id034
  arxiv_id: '2309.15911'
  ads_bibcode: 2024ApJ...961..127M
  title: 'Dynamical Stellar Mass-to-light Ratio Gradients: Evidence for Very Centrally Concentrated IMF Variations in ETGs?'
  authors:
  - Mehrgan, Kianusch
  - Thomas, Jens
  - Saglia, Roberto
  - Parikh, Taniya
  - Neureiter, Bianca
  - Erwin, Peter
  - Bender, Ralf
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-4357/acfe09
  abstract: Evidence from different probes of the stellar initial mass function (IMF) of massive early-type galaxies (ETGs)
    has repeatedly converged on IMFs more bottom heavy than in the Milky Way (MW). This consensus has come under scrutiny
    due to often contradictory results from different methods on the level of individual galaxies. In particular, a number
    of strong lensing probes are ostensibly incompatible with a non-MW IMF. Radial gradients of the IMF-related to gradients
    of the stellar mass-to-light ratio ϒ-can potentially resolve this issue. We construct Schwarzschild models allowing for
    ϒ-gradients in seven massive ETGs with MUSE and SINFONI observations. We find dynamical evidence that ϒ increases toward
    the center for all ETGs. The gradients are confined to subkiloparsec scales. Our results suggest that constant-ϒ models
    may overestimate the stellar mass of galaxies by up to a factor of 1.5. For all except one galaxy, we find a radius where
    the total dynamical mass has a minimum. This minimum places the strongest constraints on the IMF outside the center and
    appears at roughly 1 kpc. We consider the IMF at this radius characteristic for the main body of each ETG. In terms of
    the IMF mass-normalization α relative to a Kroupa IMF, we find on average an MW-like IMF &lt;α <SUB>main</SUB>&gt; = 1.03
    ± 0.19. In the centers, we find concentrated regions with increased mass normalizations that are less extreme than previous
    studies suggested, but still point to a Salpeter-like IMF, &lt;α <SUB>cen</SUB>&gt; = 1.54 ± 0.15.
