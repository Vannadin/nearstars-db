  year: '2011'
  pubdate: '2011-05-10'
  doi: 10.1103/PhysRevD.85.061701
  abstract: We propose a scheme to investigate whether non-uniform motion degrades entanglement of a relativistic quantum
    field that is localised both in space and in time. For a Dirichlet scalar field in a cavity in Minkowski space, in small
    but freely-adjustable acceleration of finite but arbitrarily long duration, degradation of observable magnitude occurs
    for massless transverse quanta of optical wavelength at Earth gravity acceleration and for kaon mass quanta already at
    microgravity acceleration. We outline a space-based experiment for observing the effect and its gravitational counterpart.
