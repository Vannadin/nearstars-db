  year: '2021'
  pubdate: '2021-03-00'
  doi: 10.1109/AERO50100.2021.9438402
  abstract: 'Over the past two years, JPL has used the ASTERIA (Arcsecond Space Telescope Enabling Research In Astrophysics)
    CubeSat as an in-flight test platform during extended missions. ASTERIA successfully completed its prime mission in early
    2018, and continued to operate in low Earth orbit (LEO) for an additional twenty months. This paper describes demonstrations
    that were performed on the spacecraft and on the ground-based testbed during the extended mission. These demonstrations
    fall into three categories: Autonomy technology maturation, hardware characterization, and science discovery. Autonomy
    technology maturation supported three development efforts. The first shifted the spacecraft commanding paradigm from time-based
    sequences to Task Networks (tasknets), which allow simpler commanding and more robust onboard execution. The second demonstrated
    onboard orbit determination in Low Earth Orbit (LEO) without GPS. This activity used a fully-independent means of spacecraft
    orbit determination for Earth orbiters using only passive imaging. The third technology provided in situ hardware health
    state estimation using a model-based reasoning technique. These three technologies were demonstrated either in flight
    or on the testbed individually, and then were combined to demonstrate the capability to perform autonomous navigation
    on board without ground intervention, even in the presence of anomalies. Hardware characterization involved both onboard
    and ground-based activities. On board, nonstandard attitude control modes were commanded to characterize the spacecraft
    pointing jitter as a function of target brightness, reaction wheel speed, controller gain, and the number of guide stars.
    The results provide insights into the contribution of jitter to the ASTERIA photometry and inform the feasibility of future
    astrophysics small satellite missions for which jitter control is an enabling technology. On the ground, the ASTERIA Operations
    Team coordinated with Amazon Web Services (AWS) to configure their new ground stations to communicate with ASTERIA to
    prove out their viability. ASTERIA used AWS ground stations for nominal operations for the last four months of the mission.
    Finally, ASTERIA continued to perform exoplanet science as the spacecraft was well-suited to execute long-term monitoring
    of stars such as alpha Centauri to search for small transiting planets. The science team also imaged a number of interesting
    objects including a comet, an asteroid, cities at night, and the moon, and coordinated with other projects on Targets
    of Opportunity for follow-up confirmations and co-observations. Throughout the prime and the extended missions, the ASTERIA
    spacecraft proved to be a mighty platform that "will go into history as an innovative milestone." [1]'
