- &id040
  arxiv_id: '2205.07047'
  ads_bibcode: 2022A&A...664A..34A
  title: Measuring precise radial velocities on individual spectral lines. III. Dependence of stellar activity signal on line
    formation temperature
  authors:
  - Al Moulla, K.
  - Dumusque, X.
  - Cretignier, M.
  - Zhao, Y.
  - Valenti, J. A.
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.1051/0004-6361/202243276
  abstract: 'Context. To enable radial velocity (RV) precision on the order of ~0.1 m s<SUP>‒1</SUP> required for the detection
    of Earth-like exoplanets orbiting solar-type stars, the main obstacle lies in mitigating the impact of stellar activity.
    <BR /> Aims: This study investigates the dependence of derived RVs with respect to the formation temperature of spectral
    line segments. <BR /> Methods: Using spectral synthesis, we computed the stellar temperature below which 50% of the emergent
    flux originates for each observed wavelength point of unblended spectral lines. We then constructed RV time series for
    different temperature ranges using template matching. <BR /> Results: With HARPS-N solar data and HARPS α Cen B measurements,
    we demonstrate on time intervals of prominent stellar activity that the activity-induced RV signal has different amplitude
    and periodicity depending on the temperature range considered. We compare the solar measurements with simulated contributions
    from active surface regions seen in simultaneous images, and find that the suppression of convective motion is the dominant
    effect. <BR /> Conclusions: From a carefully selected set of spectral lines, we are able to measure the RV impact of stellar
    activity at various stellar temperatures ranges. We are able to strongly correlate the effect of convective suppression
    with spectral line segments formed in hotter temperature ranges. At cooler temperatures, the derived RVs exhibit oppositely
    directed variations compared to the average RV time series and stronger anticorrelations with chromospheric emission.
    <P />A copy of the spectra is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/664/A34">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/664/A34</A>'
