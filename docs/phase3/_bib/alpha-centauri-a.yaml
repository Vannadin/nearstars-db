  - Tuthill, Peter
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: The TOLIMAN mission's primary objective is to discover potentially habitable worlds orbiting the nearest Sun-like
    stars, a key goal of the first theme of the Astro 2020 Decadal Survey "Worlds and Suns in Context". The mission baselines
    a space observatory that measures the relative astrometric separations between binary stars down to submicroarcseconds
    to discover exoplanets around more than a dozen targets, which are likely targets for the Habitable Worlds Observatory
    (HWO). This mission has the potential to detect the first nearby Earth analog, i.e., a temperate rocky exoplanet orbiting
    a Sun-like star. TOLIMAN will offer precursor observations of HWO exoplanet imaging target stars by searching for exoplanets
    below current detection limits that might be imageable with HWO. This mission also can help reduce the need for a blind
    search with HWO by identifying potentially habitable worlds ahead of time. To achieve sub-microarcsecond accuracy necessary
    to detect Earth-like exoplanets, we employ a diffractive pupil to calibrate the absolute telescope magnification throughout
    the mission duration. JPL is developing an astrometry laboratory to demonstrate this technology to high fidelity in a
    relevant environment. The laboratory has a stellar simulator that emulates the Alpha Centauri system using two waveguides
    embedded in a photonic chip. Those sources are collimated to illuminate the instrument, composed of a telescope with the
    diffractive pupil imprinted in the primary, a bandpass filter, and a detector. This talk will give an overview of the
    mission concept and present our JPL internal technology development maturation effort.
