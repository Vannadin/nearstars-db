  abstract: The Starshot Breakthrough Initiative aims to send gram-scale microchip probes to Alpha Centauri within 20 years,
    propelled by laser-driven lightsails at a fifth of light speed. This mission demands innovative lightsail materials with
    meter-scale dimensions, nanoscale thickness, and billions of nanoscale holes for enhanced reflectivity and reduced mass.
    Unlike the microchip payload, lightsail fabrication requires breakthroughs in optics, materials science, and structural
    engineering. Our study uses neural topology optimization, revealing a novel pentagonal lattice-based photonic crystal
    (PhC) reflector. The optimized designs significantly lower the acceleration times and, thereby, launch cost. Crucially,
    they also enabled orders-of-magnitude fabrication cost reduction. We fabricated a 60 × 60 mm<SUP>2</SUP>, 200 nm thick
    reflector with over a billion nanoscale features, achieving a 9000-fold cost reduction per m<SUP>2</SUP>. This represents
    the highest aspect ratio nanophotonic element to date. While stringent requirements remain for lightsails, scalable, cost-effective
    nanophotonics present promising solutions for next-generation space exploration.
