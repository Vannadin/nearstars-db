  arxiv_id: '2508.03812'
  ads_bibcode: 2025ApJ...989L..23S
  title: 'Worlds Next Door: A Candidate Giant Planet Imaged in the Habitable Zone of α Centauri A. II. Binary Star Modeling,
    Planet and Exozodi Search, and Sensitivity Analysis'
  authors:
  - Sanghi, Aniket
  - Beichman, Charles
  - Mawet, Dimitri
  - Balmer, William O.
  - Godoy, Nicolas
  - Pueyo, Laurent
  - Boccaletti, Anthony
