- &id110
  arxiv_id: '2101.04118'
  ads_bibcode: null
  title: The Copernican Principle Rules Out BLC1 as a Technological Radio Signal from the Alpha Centauri System
  authors:
  - Amir Siraj
  - Abraham Loeb
  year: '2021'
  pubdate: '2021-01-11'
  doi: null
  abstract: Without evidence for occupying a special time or location, we should not assume that we inhabit privileged circumstances
    in the Universe. As a result, within the context of all Earth-like planets orbiting Sun-like stars, the origin of a technological
    civilization on Earth should be considered a single outcome of a random process. We show that in such a Copernican framework,
    which is inherently optimistic about the prevalence of life in the Universe, the likelihood of the nearest star system,
    Alpha Centauri, hosting a radio-transmitting civilization is $\sim 10^{-8}$. This rules out, \textit{a priori}, Breakthrough
    Listen Candidate 1 (BLC1) as a technological radio signal from the Alpha Centauri system, as such a scenario would violate
    the Copernican principle by about eight orders of magnitude. We also show that the Copernican principle is consistent
    with the vast majority of Fast Radio Bursts being natural in origin.
