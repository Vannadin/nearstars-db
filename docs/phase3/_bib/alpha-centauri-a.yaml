  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: Exomoons orbiting around exoplanets comprise a large fraction of habitable worlds, although there has not been
    a conclusive detection to this day. One method to detect exomoons is via the precise astrometric measurements of subtle
    signatures from planet-moon systems. In this work, we present the simulation results of astrometric observations of a
    Saturn-mass planet, accompanied by an exomoon, orbiting α Centauri A. We compute recovery rates of the exomoons with various
    mass and orbital parameters with various combinations of campaign parameters, such as cadence and duration of observation,
    to demonstrate the impact of each parameter on the detection. Furthermore, we compute the mean recovery rate with given
    campaign parameters by assuming distributions of mass and orbital parameters of exomoons. Based on these results, we discuss
    the limiting cadence required to detect exomoons reliably and set guidelines for future surveys.
