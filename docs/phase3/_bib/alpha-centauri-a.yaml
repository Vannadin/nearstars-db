- &id052
  arxiv_id: null
  ads_bibcode: 2024PASP..136b4202K
  title: Time Variability of FUV Emission from Cool Stars on Multi-year Timescales
  authors:
  - Kamgar, Leo
  - France, Kevin
  - Youngblood, Allison
  year: '2024'
  pubdate: '2024-02-00'
  doi: 10.1088/1538-3873/ad119f
  abstract: The physical and chemical properties of planetary atmospheres are affected by temporal evolution of ultraviolet
    (UV) radiation inputs from their host stars at all time scales. While studies of X-ray/UV flare properties and long-term
    stellar evolution of exoplanet host stars have provided new constraints regarding stellar inputs to exoplanetary systems,
    the UV temporal variability of cool stars on the timescale of stellar cycles remains largely unexplored. To address this
    gap in our understanding of the UV temporal variability of cool stars, we analyze far-ultraviolet (FUV) emission lines
    of ions that trace the chromosphere and transition region of nearby stars (C II, Si III, Si IV, and N V; formation temperatures
    ∼ 20─150 kK) using data from the Hubble Space Telescope (HST) and International Ultraviolet Explorer (IUE) archives spanning
    temporal baselines of months to years. We select 33 unique stars of spectral types F-M with observing campaigns spanning
    over a year, and create ionic light curves to evaluate the characteristic variability of cool stars on such timescales.
    Screening for large flare events, we observe that the relative variability of FUV light curves decreases with increasing
    stellar effective temperature, from 30% to 70% variability for M-type stars to &lt;30% variability for F and G-type stars.
    We also observe a weak trend in the temporal variability with the Ca II ${R}_{\mathrm{HK}}^{{\prime} }$ stellar activity
    indicator, suggesting that stars with lower Ca II activity exhibit a smaller range of FUV flux variability. Screening
    for data sets with optimal temporal spread, and a sufficient number of individual observations, we select 5 data sets
    for further periodicity analysis (HST α Centauri A, HST α Centauri B, IUE α Centauri B, IUE ϵ Eri, IUE ξ Boo). Various
    periodic structures within the FUV flux were detected, with most significant being a 79 days frequency present within
    the IUE observations of ξ Boo, with a significance of 6σ, and a periodic signal in the FUV observations of α Centauri
    B, for both HST and IUE measurements, at ≈210 days frequency with significance of 3σ and 3.7σ, respectively. Our results
    suggest that extreme ultraviolet flux from cool stars varies by less than a factor of two on decade timescales, significantly
    smaller than variations on flare or stellar evolutionary timescales.
