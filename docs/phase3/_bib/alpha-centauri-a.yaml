  title: Testbed multi-star wavefront control experiment modeling analysis
  authors:
  - Zhou, Hanying
  - Marx, David
  - Prada, Camilo Mejia
  - Sirbu, Dan
  - Belikov, Ruslan
  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.1117/12.2676172
  abstract: The Astro2020 Decadal Survey calls for a mission yield goal of 25 or more habitable zone planets detection and
    characterization in its recommendation of next NASA flagship mission, the Habitable World Observatory (HWO). Multi-Star
    Wavefront Control (MSWC) is a technique that enables simultaneous star light suppression of a binary or more star system.
    It has the potential to help achieve the goal by substantially increasing viable target samples to beyond single star
    systems. Technology development for MSWC has been ongoing for a number of years. Recently a better than 1e-7 monochromatic
    contrast was demonstrated at JPL's High Contrast Imaging Testbed (HCIT) with a true binary source having similar Alpha
    Centauri star system separation for the first time. Here we present (High Order) Wavefront Sensing and Control (HOWFSC)
    modeling analysis of the testbed experiments for improving future performance. Our model is a modified extension of the
    HOWFSC engineering model that has proven to be a valuable tool for Roman Coronagraph Instrument (CGI) and was validated
    on the HCIT. It includes crucial engineering features and factors relevant to testbed (while omitting CGI specific elements)
    such as probing and sensing with detector noise and finite bandwidth used. The analysis provides important insight into
    and understanding of MSWC testbed experiments and identifies key performance-limiting factors that were not previously
    considered. Adjustments in both hardware and WFSC strategy and algorithm are discussed for next round testbed experiments
    to improve performance necessary for both Roman and HWO.
