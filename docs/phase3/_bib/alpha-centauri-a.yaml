  ads_bibcode: 2022eas..conf..903T
  title: Searching for exoplanets in the Alpha Centauri system using GRAVITY
  authors:
  - Thomson-paressant, Keegan
  year: '2022'
  pubdate: '2022-07-00'
  doi: null
  abstract: 'The 𝛼 Centauri system comprises the two solar-like stars A and B and the red dwarf Proxima, at a distance of
    only 1.3 parsec. The discovery of the planets Proxima b, c and very recently d, have triggered considerable interest.
    Although no planet has yet been confirmed around the main components 𝛼 Cen A and B, they are excellent candidates to host
    planets in their habitable zones. <P />My work is focused on a complementary approach to the direct imaging and radial
    velocity searches, namely very high precision differential astrometry with VLTI/GRAVITY through a two-phase approach:
    i) repeated measurements of the relative positions of 𝛼 Cen A and B with a precision of a few dozen µas to look for the
    telltale wobbles induced by a planet orbiting somewhere within the system, ii) followed by the subsequent observations
    of conjunction events between the two stars and background sources, where gravitational lensing will provide us with the
    exact location of an eventual planet detected in the previous step. <P />Through the exploitation of the data during phase
    1, we encountered a number of complications due to the nature of the α Cen system that require individual treatment in
    order to achieve the desired precision in our results. Many of these challenges result from the proximity of the target,
    such as saturation issues due to the brightness of both stars, as well as fringes appearing in the second and third lobes
    of their visibility functions due to their large angular diameter. <P />This presentation will focus on the work completed
    thus far during phase 1 of the project, presenting the methods implemented, results achieved and what steps we have taken
    to resolve the issues described previously.'
