  doi: null
  abstract: 'Three impressive claims about potential discoveries of extraterrestrial life have recently been made: The detection
    of phosphine on Venus as a potential biosignature, the interpretation of ''Oumuamua as an artificial lightsail and an
    apparently artificial communicative signal from Alpha Centauri. The three of them have been met with enormous attention
    in the media, but also with enormous skepticism or criticism in academia. For the sake of exploring the scientific, social
    and psychological complexities of the impact of these initial claims, I assume that the claims would have been real and
    assess their broad impact on humanity. I illustrate the scenarios with spider diagrams from a general 26-dimensional impact
    model that I proposed (Vidal 2015), and propose lessons to be learned in how each claim did unfold up to now, especially
    regarding the data quality, and the ambiguity and complexity of what counts as a "detection" or "proof". Similar claims
    are likely to be made in the coming years, so these three scenarios constitute case-studies for future candidate discoveries
    too. Reference: Vidal, C. 2015. "A Multidimensional Impact Model for the Discovery of Extraterrestrial Life." In The Impact
    of Discovering Life beyond Earth, 55─75. Cambridge: Cambridge University Press. https://zenodo.org/record/1286707.'
