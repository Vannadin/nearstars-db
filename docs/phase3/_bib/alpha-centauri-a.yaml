  ads_bibcode: 2022absc.conf24102W
  title: If A Terrestrial Planet Exists in the Habitable Zone of Alpha-Cen A/B, What Would the Planet Look Like? - A Modeling
    Effort in Guiding Future Observations
  authors:
  - Wang, Haiyang S.
  - Lineweaver, Charley H.
  - Quanz, Sascha P.
  - Mojzsis, Stephen J.
