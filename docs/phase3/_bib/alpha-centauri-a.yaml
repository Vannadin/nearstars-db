  - M. C. W. Fridlund
  - K. Justtanont
  - A. Krivov
  - J. P. Marshall
  - A. Mora
  - B. Montesinos
  - L. -A. Nyman
  - G. Olofsson
  - J. Sanz-Forcada
  - P. Thebault
