  ads_bibcode: 2022MNRAS.509.2736Q
  title: Milankovitch cycles for a circumstellar Earth-analogue within α Centauri-like binaries
  authors:
  - Quarles, B.
  - Li, G.
  - Lissauer, J. J.
  year: '2022'
  pubdate: '2022-01-00'
  doi: 10.1093/mnras/stab3179
  abstract: An Earth-analogue orbiting within the habitable zone of α Centauri B was shown to undergo large variations in
    its obliquity, or axial tilt, which affects the planetary climate by altering the radiative flux for a given latitude.
    We examine the potential implications of these obliquity variations for climate through Milankovitch cycles using an energy
    balance model with ice growth and retreat. Similar to previous studies, the largest amplitude obliquity variations from
    spin-orbit resonances induce snowball states within the habitable zone, while moderate variations can allow for persistent
    ice caps or an ice belt. Particular outcomes for the global ice distribution can depend on the planetary orbit, obliquity,
    spin precession, binary orbit, and which star the Earth-analogue orbits. An Earth-analogue with an inclined orbit relative
    to the binary orbital plane can periodically transition through several global ice distribution states and risk runaway
    glaciation when ice appears at both poles and the equator. When determining the potential habitability for planets in
    general stellar binaries, more care must be taken due to the orbital and spin dynamics. For Earth-analogues within the
    habitable zone of α Centauri B can experience a much greater range of climate states, which is in contrast to Earth-analogues
    in the habitable zone of α Centauri A.
