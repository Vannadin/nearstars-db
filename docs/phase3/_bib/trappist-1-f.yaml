  abstract: This report is the product of the NASA Technosignatures Workshop held at the Lunar and Planetary Institute in
    Houston, Texas, in September 2018. This workshop was convened by NASA for the organization to learn more about the current
    field and state of the art of searches for technosignatures, and what role NASA might play in these searches in the future.
    The report, written by the workshop participants, summarizes the material presented at the workshop and incorporates additional
    inputs from the participants. Section 1 explains the scope and purpose of the document, provides general background about
