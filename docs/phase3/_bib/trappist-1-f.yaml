  ads_bibcode: 2016SSRv..205..153M
  title: Formation and Evolution of Protoatmospheres
  authors:
  - Massol, H.
  - Hamano, K.
  - Tian, F.
  - Ikoma, M.
  - Abe, Y.
  - Chassefière, E.
  - Davaille, A.
  - Genda, H.
  - Güdel, M.
  - Hori, Y.
  - Leblanc, F.
  - Marcq, E.
  - Sarda, P.
  - Shematovich, V. I.
  - Stökl, A.
  - Lammer, H.
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.1007/s11214-016-0280-1
  abstract: The origin and evolution of planetary protoatmospheres in relation to the protoplanetary disk is discussed. The
    initial atmospheres of planets can mainly be related via two formation scenarios. If a protoplanetary core accretes mass
    and grows inside the gas disk, it can capture H<SUB>2</SUB>, He and other gases from the disk. When the gas of the disk
    evaporates, the core that is surrounded by the H<SUB>2</SUB>/He gas envelope is exposed to the high X-ray and extreme
    ultraviolet flux and stellar wind of the young host star. This period can be considered as the onset of atmospheric escape.
    It is shown that lower mass bodies accrete less gas and depending on the host stars radiation environment can therefore
    lose the gaseous envelope after tens or hundreds of million years. Massive cores may never get rid of their captured hydrogen
    envelopes and remain as sub-Neptunes, Neptunes or gas giants for their whole life time. Terrestrial planets which may
    have lost the captured gas envelope by thermal atmospheric escape, or which accreted after the protoplanetary nebula vanished
    will produce catastrophically outgassed steam atmospheres during the magma ocean solidification process. These steam atmospheres
    consist mainly of water and CO<SUB>2</SUB> that was incorporated into the protoplanet during its accretion. Planets, which
    are formed in the habitable zone, solidify within several million years. In such cases the outgassed steam atmospheres
    cool fast, which leads to the condensation of water and the formation of liquid oceans. On the other hand, magma oceans
    are sustained for longer if planets form inside a critical distance, even if they outgassed a larger initial amount of
    water. In such cases the steam atmosphere could remain 100 million years or for even longer. Hydrodynamic atmospheric
    escape will then desiccate these planets during the slow solidification process.
