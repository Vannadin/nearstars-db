- arxiv_id: '2212.02793'
  ads_bibcode: 2023Gbio...21..758H
  title: White and green rust chimneys accumulate RNA in a ferruginous chemical garden
  authors:
  - Helmbrecht, Vanessa
  - Weingart, Maximilian
  - Klein, Frieder
  - Braun, Dieter
  - Orsi, William D.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1111/gbi.12572
  abstract: Mechanisms of nucleic acid accumulation were likely critical to life's emergence in the ferruginous oceans of
    the early Earth. How exactly prebiotic geological settings accumulated nucleic acids from dilute aqueous solutions, is
    poorly understood. As a possible solution to this concentration problem, we simulated the conditions of prebiotic low-temperature
    alkaline hydrothermal vents in co-precipitation experiments to investigate the potential of ferruginous chemical gardens
    to accumulate nucleic acids via sorption. The injection of an alkaline solution into an artificial ferruginous solution
    under anoxic conditions (O<SUB>2</SUB> &lt; 0.01% of present atmospheric levels) and at ambient temperatures, caused the
    precipitation of amakinite ("white rust"), which quickly converted to chloride-containing fougerite ("green rust"). RNA
    was only extractable from the ferruginous solution in the presence of a phosphate buffer, suggesting RNA in solution was
    bound to Fe<SUP>2+</SUP> ions. During chimney formation, this iron-bound RNA rapidly accumulated in the white and green
    rust chimney structure from the surrounding ferruginous solution at the fastest rates in the initial white rust phase
    and correspondingly slower rates in the following green rust phase. This represents a new mechanism for nucleic acid accumulation
    in the ferruginous oceans of the early Earth, in addition to wet-dry cycles and may have helped to concentrate RNA in
    a dilute prebiotic ocean.
