  arxiv_id: '1708.09484'
  ads_bibcode: 2017AJ....154..121B
  title: Temporal Evolution of the High-energy Irradiation and Water Content of TRAPPIST-1 Exoplanets
  authors:
  - Bourrier, V.
  - de Wit, J.
  - Bolmont, E.
  - Stamenković, V.
  - Wheatley, P. J.
  - Burgasser, A. J.
  - Delrez, L.
  - Demory, B.-O.
