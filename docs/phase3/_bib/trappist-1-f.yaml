  arxiv_id: null
  ads_bibcode: 2024ESS.....510106L
  title: 'TRAPPIST-1 Atmospheric Reconnaissance with JWST: First Look at the Habitable-Zone Exoplanet TRAPPIST-1 f with NIRISS'
  authors:
  - Lim, Olivia
  - MacDonald, Ryan
  - Doyon, Rene
  - Lafreniere, David
  - Benneke, Björn
  - Piaulet-Ghorayeb, Caroline
  - Howard, Ward
  - Radica, Michael
  - Coulombe, Louis-Philippe
  - Artigau, Etienne
