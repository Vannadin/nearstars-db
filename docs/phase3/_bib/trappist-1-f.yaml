  title: History of chemically and radiatively important atmospheric gases from the Advanced Global Atmospheric Gases Experiment
    (AGAGE)
  authors:
  - Prinn, Ronald G.
  - Weiss, Ray F.
  - Arduini, Jgor
  - Arnold, Tim
  - Langley DeWitt, H.
  - Fraser, Paul J.
  - Ganesan, Anita L.
  - Gasore, Jimmy
  - Harth, Christina M.
  - Hermansen, Ove
  - Kim, Jooil
  - Krummel, Paul B.
  - Li, Shanlan
  - Loh, Zoë M.
  - Lunder, Chris R.
  - Maione, Michela
  - Manning, Alistair J.
  - Miller, Ben R.
  - Mitrevski, Blagoj
  - Mühle, Jens
  - O'Doherty, Simon
  - Park, Sunyoung
  - Reimann, Stefan
  - Rigby, Matt
  - Saito, Takuya
  - Salameh, Peter K.
  - Schmidt, Roland
  - Simmonds, Peter G.
  - Steele, L. Paul
  - Vollmer, Martin K.
  - Wang, Ray H.
  - Yao, Bo
  - Yokouchi, Yoko
  - Young, Dickon
  - Zhou, Lingxi
  year: '2018'
  pubdate: '2018-06-00'
  doi: 10.5194/essd-10-985-2018
  abstract: 'We present the organization, instrumentation, datasets, data interpretation, modeling, and accomplishments of
    the multinational global atmospheric measurement program AGAGE (Advanced Global Atmospheric Gases Experiment). AGAGE is
    distinguished by its capability to measure globally, at high frequency, and at multiple sites all the important species
    in the Montreal Protocol and all the important non-carbon-dioxide (non-CO<SUB>2</SUB>) gases assessed by the Intergovernmental
    Panel on Climate Change (CO<SUB>2</SUB> is also measured at several sites). The scientific objectives of AGAGE are important
    in furthering our understanding of global chemical and climatic phenomena. They are the following: (1) to accurately measure
    the temporal and spatial distributions of anthropogenic gases that contribute the majority of reactive halogen to the
    stratosphere and/or are strong infrared absorbers (chlorocarbons, chlorofluorocarbons - CFCs, bromocarbons, hydrochlorofluorocarbons
    - HCFCs, hydrofluorocarbons - HFCs and polyfluorinated compounds (perfluorocarbons - PFCs), nitrogen trifluoride - NF<SUB>3</SUB>,
    sulfuryl fluoride - SO<SUB>2</SUB>F<SUB>2</SUB>, and sulfur hexafluoride - SF<SUB>6</SUB>) and use these measurements
    to determine the global rates of their emission and/or destruction (i.e., lifetimes); (2) to accurately measure the global
    distributions and temporal behaviors and determine the sources and sinks of non-CO<SUB>2</SUB> biogenic-anthropogenic
    gases important to climate change and/or ozone depletion (methane - CH<SUB>4</SUB>, nitrous oxide - N<SUB>2</SUB>O, carbon
    monoxide - CO, molecular hydrogen - H<SUB>2</SUB>, methyl chloride - CH<SUB>3</SUB>Cl, and methyl bromide - CH<SUB>3</SUB>Br);
    (3) to identify new long-lived greenhouse and ozone-depleting gases (e.g., SO<SUB>2</SUB>F<SUB>2</SUB>, NF<SUB>3</SUB>,
    heavy PFCs (C<SUB>4</SUB>F<SUB>10</SUB>, C<SUB>5</SUB>F<SUB>12</SUB>, C<SUB>6</SUB>F<SUB>14</SUB>, C<SUB>7</SUB>F<SUB>16</SUB>,
    and C<SUB>8</SUB>F<SUB>18</SUB>) and hydrofluoroolefins (HFOs; e.g., CH<SUB>2</SUB> = CFCF<SUB>3</SUB>) have been identified
    in AGAGE), initiate the real-time monitoring of these new gases, and reconstruct their past histories from AGAGE, air
    archive, and firn air measurements; (4) to determine the average concentrations and trends of tropospheric hydroxyl radicals
    (OH) from the rates of destruction of atmospheric trichloroethane (CH<SUB>3</SUB>CCl<SUB>3</SUB>), HFCs, and HCFCs and
    estimates of their emissions; (5) to determine from atmospheric observations and estimates of their destruction rates
    the magnitudes and distributions by region of surface sources and sinks of all measured gases; (6) to provide accurate
    data on the global accumulation of many of these trace gases that are used to test the synoptic-, regional-, and global-scale
    circulations predicted by three-dimensional models; and (7) to provide global and regional measurements of methane, carbon
    monoxide, and molecular hydrogen and estimates of hydroxyl levels to test primary atmospheric oxidation pathways at midlatitudes
    and the tropics. Network Information and Data Repository: http://agage.mit.edu/data or http://cdiac.ess-dive.lbl.gov/ndps/alegage.html
    (https://doi.org/10.3334/CDIAC/atg.db1001).'
