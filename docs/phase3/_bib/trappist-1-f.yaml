- &id145
  arxiv_id: '2411.17358'
  ads_bibcode: 2025MNRAS.539..405W
  title: A link between rocky planet composition and stellar age
  authors:
  - Weeks, Angharad
  - Van Eylen, Vincent
  - Huber, Daniel
  - Kawata, Daisuke
  - Stokholm, Amalie
  - Aguirre Børsen-Koch, Victor
  - Pinilla, Paola
  - Rørsted, Jakob Lysgaard
  - Winther, Mark Lykke
  - Berger, Travis
  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.1093/mnras/staf474
  abstract: Interior compositions are key for our understanding of Earth-like exoplanets. The composition of the core can
    influence the presence of a magnetic dynamo and the strength of gravity on the planetary surface, both of which heavily
    impact thermal and possible biological processes and thus the habitability for life and its evolution on the planet. However,
    detailed measurements of the planetary interiors are extremely challenging for small exoplanets, and existing data suggest
    a wide diversity in planet compositions. Hitherto, only certain photospheric chemical abundances of the host stars have
    been considered as tracers to explain the diversity of exoplanet compositions. Here, we present a homogeneous analysis
    of stars hosting rocky exoplanets, with ages between 2 and 14 Gyr, revealing a correlation between rocky exoplanet compositions
    and the ages of the planetary systems. Denser rocky planets are found around younger stars. This suggests that the compositional
    diversity of rocky exoplanets can be linked to the ages of their host stars. We interpret this to be a result of chemical
    evolution of stars in the Milky Way, which modifies the material out of which stars and planets form. The results imply
    that rocky planets that form today, at similar Galactocentric radii, may have different formation conditions, and thus
    different properties than planets that formed several billion years ago, such as the Earth.
