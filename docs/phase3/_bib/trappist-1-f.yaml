  arxiv_id: null
  ads_bibcode: 2023ApJS..269....1Z
  title: Machine-learning Inferences of the Interior Structure of Rocky Exoplanets from Bulk Observational Constraints
  authors:
  - Zhao, Yong
  - Ni, Dongdong
  - Liu, Zibo
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.3847/1538-4365/acf31a
  abstract: Characterizing the interiors of rocky exoplanets is important to understand planetary populations and further
    investigate planetary habitability. New observable constraints and inference techniques have been explored for this purpose.
    In this work, we design and train mixture density networks (MDNs) to predict the interior properties of rocky exoplanets
    with large compositional diversity. In addition to measurements of mass and radius, bulk refractory elemental abundance
    ratios and the static Love number k <SUB>2</SUB> are used to constrain the interior of rocky exoplanets. It is found that
    the MDNs are able to infer the interior properties of rocky exoplanets from the available measurements of exoplanets.
    Compared with powerful inversion methods based on Bayesian inference, the trained MDNs provide a more rapid characterization
    of planetary interiors for each individual planet. The MDN model offers a convenient and practical tool for probabilistic
    inferences of planetary interiors.
