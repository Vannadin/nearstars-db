  arxiv_id: '1701.00012'
  ads_bibcode: 2017ApJ...836L...5B
  title: Challenges to Constraining Exoplanet Masses via Transmission Spectroscopy
  authors:
  - Batalha, Natasha E.
  - Kempton, Eliza M.-R.
  - Mbarek, Rostom
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/2041-8213/aa5c7d
  abstract: MassSpec, a method for determining the mass of a transiting exoplanet from its transmission spectrum alone, was
    proposed by de Wit &amp; Seager. The premise of this method relies on the planet’s surface gravity being extracted from
    the transmission spectrum via its effect on the atmospheric scale height, which in turn determines the strength of absorption
    features. Here, we further explore the applicability of MassSpec to low-mass exoplanets—specifically those in the super-Earth
    size range for which radial velocity determinations of the planetary mass can be extremely challenging and resource intensive.
    Determining the masses of these planets is of the utmost importance because their nature is otherwise highly unconstrained.
    Without knowledge of the mass, these planets could be rocky, icy, or gas-dominated. To investigate the effects of planetary
    mass on transmission spectra, we present simulated observations of super-Earths with atmospheres made up of mixtures of
    H<SUB>2</SUB>O and H<SUB>2</SUB>, both with and without clouds. We model their transmission spectra and run simulations
    of each planet as it would be observed with James Webb Space Telescope using the NIRISS, NIRSpec, and MIRI instruments.
    We find that significant degeneracies exist between transmission spectra of planets with different masses and compositions,
    making it impossible to unambiguously determine the planet’s mass in many cases.
