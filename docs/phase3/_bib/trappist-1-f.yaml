- &id226
  arxiv_id: null
  ads_bibcode: 2007Icar..192....1D
  title: Spin states and climates of eccentric exoplanets
  authors:
  - Dobrovolskis, Anthony R.
  year: '2007'
  pubdate: '2007-12-00'
  doi: 10.1016/j.icarus.2007.07.005
  abstract: The known extrasolar planets exhibit a wide range of orbital eccentricities e. This has a profound influence on
    their rotations and climates. Because of tides in their interiors, mostly solid exoplanets are expected eventually to
    despin to a state of spin-orbit resonance, where the orbital period is some integer or half-integer times the rotation
    period. The most important of these resonances is the synchronous state, where the planet's spin period exactly equals
    its orbital period (like Earth's Moon, and indeed most of the regular satellites in the Solar System). Such planets seem
    doomed to roast on one side and freeze on the other. However, synchronous planets rock back and forth by an angle of ∼2Arcsine
    with respect to the sub-stellar point. For e=0.055 (as for the Moon), this optical libration amounts to only ∼6°; but
    for a synchronous planet with e=0.50, for example, it would rise to ∼59°. This greatly expands the temperate "twilight
    zone" near the terminator and considerably improves the planet's prospects for habitability. For e≳0.72389, the optical
    libration exceeds 90°; for such planets, the sector of permanent night vanishes, while the sunniest region splits in two.
    Furthermore, the synchronous state is not the only possible spin resonance. For example, Mercury (with e≈0.206) has an
    orbital period exactly 1.5 times its rotation period. A terrestrial exoplanet with e=0.40, say, is liable to have an orbital
    period of 2.0, 2.5, or 3.0 times its spin period. The corresponding insolation patterns are generally complicated, and
    all different from the synchronous state. Yet these non-synchronous resonances also protect certain longitudes from the
    worst extremes of temperature and solar radiation, and improve the planet's habitability, compared to non-resonant rotation.
    These results also have implications for the direct detectability of extrasolar planets, and the interpretation of their
    thermal emissions.
