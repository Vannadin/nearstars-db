- &id220
  arxiv_id: '1207.5074'
  ads_bibcode: 2012ApJ...758...56S
  title: Identifying the Young Low-mass Stars within 25 pc. II. Distances, Kinematics, and Group Membership
  authors:
  - Shkolnik, Evgenya L.
  - Anglada-Escudé, Guillem
  - Liu, Michael C.
  - Bowler, Brendan P.
  - Weinberger, Alycia J.
  - Boss, Alan P.
  - Reid, I. Neill
  - Tamura, Motohide
  year: '2012'
  pubdate: '2012-10-00'
  doi: 10.1088/0004-637X/758/1/56
  abstract: We have conducted a kinematic study of 165 young M dwarfs with ages of lsim300 Myr. Our sample is composed of
    stars and brown dwarfs with spectral types ranging from K7 to L0, detected by ROSAT and with photometric distances of
    lsim25 pc assuming that the stars are single and on the main sequence. In order to find stars kinematically linked to
    known young moving groups (YMGs), we measured radial velocities for the complete sample with Keck and CFHT optical spectroscopy
    and trigonometric parallaxes for 75 of the M dwarfs with the CAPSCam instrument on the du Pont 2.5 m Telescope. Due to
    their youthful overluminosity and unresolved binarity, the original photometric distances for our sample underestimated
    the distances by 70% on average, excluding two extremely young (lsim3 Myr) objects found to have distances beyond a few
    hundred parsecs. We searched for kinematic matches to 14 reported YMGs and identified 10 new members of the AB Dor YMG
    and 2 of the Ursa Majoris group. Additional possible candidates include six Castor, four Ursa Majoris, two AB Dor members,
    and one member each of the Her-Lyr and β Pic groups. Our sample also contains 27 young low-mass stars and 4 brown dwarfs
    with ages lsim150 Myr that are not associated with any known YMG. We identified an additional 15 stars that are kinematic
    matches to one of the YMGs, but the ages from spectroscopic diagnostics and/or the positions on the sky do not match.
    These warn against grouping stars together based only on kinematics and that a confluence of evidence is required to claim
    that a group of stars originated from the same star-forming event. <P />Based on observations collected at the W. M. Keck
    Observatory, the Canada-France-Hawaii Telescope, the du Pont Telescope at Las Campanas Observatory, and the Subaru Telescope.
    The Keck Observatory is operated as a scientific partnership between the California Institute of Technology, the University
    of California, and NASA, and was made possible by the generous financial support of the W. M. Keck Foundation. The CFHT
    is operated by the National Research Council of Canada, the Centre National de la Recherche Scientifique of France, and
    the University of Hawaii.
