  abstract: Close-in rocky exoplanets around active M planet hosts are exposed to high ionizing radiation fluxes from stellar
    coronae, flares, magnetized winds and coronal mass ejections. This raises the question of how exoplanetary atmospheric
    plasma responds to these fluxes in terms of escape driven by the energy deposited via X-ray and Extreme UV driven (XUV)
    photoionization. The atmospheric escape is one of the central issues to exoplanetary habitability, because the presence
    of thick high molecular weight secondary atmosphere over sufficiently long timescales is a crucial factor associated with
    planetary surface pressure due to the exposure to stellar UV and particle irradiation. Here, we extend our previous results
    of Airapetian et al. (2017) and focus on ion escape rates from Earth-like atmospheres by applying 7-ion Polar Wind Outflow
    Model (7iPOWM) of thermodynamics and atmospheric dynamics of an Earth-like exoplanet controlled by the coronal XUV emission
    from TRAPPIST-1 f, g and h planets
