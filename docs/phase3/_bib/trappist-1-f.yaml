- &id097
  arxiv_id: '1702.02994'
  ads_bibcode: 2017ApJ...836...49A
  title: 'Pale Orange Dots: The Impact of Organic Haze on the Habitability and Detectability of Earthlike Exoplanets'
  authors:
  - Arney, Giada N.
  - Meadows, Victoria S.
  - Domagal-Goldman, Shawn D.
  - Deming, Drake
  - Robinson, Tyler D.
  - Tovar, Guadalupe
  - Wolf, Eric T.
  - Schwieterman, Edward
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/1538-4357/836/1/49
  abstract: 'Hazes are common in known planetary atmospheres, and geochemical evidence suggests that early Earth occasionally
    supported an organic haze with significant environmental and spectral consequences. The UV spectrum of the parent star
    drives organic haze formation through methane photochemistry. We use a 1D photochemical-climate model to examine production
    of fractal organic haze on Archean Earth-analogs in the habitable zones of several stellar types: the modern and early
    Sun, AD Leo (M3.5V), GJ 876 (M4V), ∊ Eridani (K2V), and σ Boötis (F2V). For Archean-like atmospheres, planets orbiting
    stars with the highest UV fluxes do not form haze because of the formation of photochemical oxygen radicals that destroy
    haze precursors. Organic hazes impact planetary habitability via UV shielding and surface cooling, but this cooling is
    minimized around M dwarfs, whose energy is emitted at wavelengths where organic hazes are relatively transparent. We generate
    spectra to test the detectability of haze. For 10 transits of a planet orbiting GJ 876 observed by the James Webb Space
    Telescope, haze makes gaseous absorption features at wavelengths &lt; 2.5 μm 2-10σ shallower than a haze-free planet,
    and methane and carbon dioxide are detectable at &gt;5σ. A haze absorption feature can be detected at 5σ near 6.3 μm,
    but a higher signal-to-noise ratio is needed to distinguish haze from adjacent absorbers. For direct imaging of a planet
    at 10 pc using a coronagraphic 10 m class ultraviolet-visible-near-infrared telescope, a UV-blue haze absorption feature
    would be strongly detectable at &gt;12σ in 200 hr.'
