  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1089/ast.2019.2154
  abstract: The search for spectroscopic biosignatures with the next generation of space telescopes could provide observational
    constraints on the abundance of exoplanets with signs of life. An extension of this spectroscopic characterization of
    exoplanets is the search for observational evidence of technology, known as technosignatures. Current mission concepts
    that would observe biosignatures from ultraviolet to near-infrared wavelengths could place upper limits on the fraction
    of planets in the Galaxy that host life, although such missions tend to have relatively limited capabilities of constraining
    the prevalence of technosignatures at mid-infrared wavelengths. Yet searching for technosignatures alongside biosignatures
    would provide important knowledge about the future of our civilization. If planets with technosignatures are abundant,
    then we can increase our confidence that the hardest step in planetary evolution - the Great Filter - is probably in our
    past. But if we find that life is commonplace while technosignatures are absent, then this would increase the likelihood
    that the Great Filter awaits to challenge us in the future.
