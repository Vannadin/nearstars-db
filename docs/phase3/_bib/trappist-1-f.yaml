  title: Rotation periods, variability properties and ages for Kepler exoplanet candidate host stars
  authors:
  - Walkowicz, Lucianne M.
  - Basri, Gibor S.
  year: '2013'
  pubdate: '2013-12-00'
  doi: 10.1093/mnras/stt1700
  abstract: We report rotation periods, variability characteristics, gyrochronological ages for ∼950 of the Kepler Object
    of Interest host stars. We find a wide dispersion in the amplitude of the photometric variability as a function of rotation,
    likely indicating differences in the spot distribution among stars. We use these rotation periods in combination with
    published spectroscopic measurements of v sin i and stellar parameters to derive the stellar inclination in the line of
    sight, and find a number of systems with possible spin-orbit misalignment. We additionally find several systems with close-in
    planet candidates whose stellar rotation periods are equal to or twice the planetary orbital period, indicative of possible
    tidal interactions between these planets and their parent stars. If these systems survive validation to become confirmed
    planets, they will provide important clues to the evolutionary history of these systems.
