- &id106
  arxiv_id: '2409.08361'
  ads_bibcode: 2024AJ....168..281B
  title: 'Revisiting the Relationship Between Rocky Exoplanet and Stellar Compositions: Reduced Evidence for a Super-Mercury
    Population'
  authors:
  - Brinkman, Casey L.
  - Polanski, Alex S.
  - Huber, Daniel
  - Weiss, Lauren M.
  - Valencia, Diana
  - Plotnykov, Mykhaylo
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/1538-3881/ad82eb
  abstract: Planets and the stars they orbit are born from the same cloud of gas and dust, and the primordial compositions
    of rocky exoplanets have been assumed to have iron and refractory abundance ratios consistent with their host star. To
    test this assumption, we modeled the interior iron-to-rock ratio of 20 super-Earth-sized (1─1.8 R <SUB>⊕</SUB>) exoplanets
    around stars with homogeneously measured stellar parameters. We computed the core mass fraction (CMF) for each planet
    and an equivalent "core mass fraction" for each host star based on its Fe and Mg abundances. We then fit a linear correlation
    using two methods (ordinary least squares and orthogonal distance regression) between planetary and stellar CMF, obtaining
    substantially different slopes between these two methods (m = 1.3 ± 1.0 and m = 5.6 ± 1.6, respectively). Additionally,
    we find that 75% of planets have a CMF consistent with their host star to within 1σ, and do not identify a distinct population
    of high-density super-Mercuries. Overall, we conclude that current uncertainties in observational data and differences
    in modeling methods prevent definitive conclusions about the relationship between planet and host-star chemical compositions.
