- &id104
  arxiv_id: '1404.5292'
  ads_bibcode: 2014ApJ...787L..29K
  title: 'Habitable Zones around Main-sequence Stars: Dependence on Planetary Mass'
  authors:
  - Kopparapu, Ravi Kumar
  - Ramirez, Ramses M.
  - SchottelKotte, James
  - Kasting, James F.
  - Domagal-Goldman, Shawn
  - Eymet, Vincent
  year: '2014'
  pubdate: '2014-06-00'
  doi: 10.1088/2041-8205/787/2/L29
  abstract: The ongoing discoveries of extra-solar planets are unveiling a wide range of terrestrial mass (size) planets around
    their host stars. In this Letter, we present estimates of habitable zones (HZs) around stars with stellar effective temperatures
    in the range 2600 K-7200 K, for planetary masses between 0.1 M <SUB>⊕</SUB> and 5 M <SUB>⊕</SUB>. Assuming H<SUB>2</SUB>O-(inner
    HZ) and CO<SUB>2</SUB>-(outer HZ) dominated atmospheres, and scaling the background N<SUB>2</SUB> atmospheric pressure
    with the radius of the planet, our results indicate that larger planets have wider HZs than do smaller ones. Specifically,
    with the assumption that smaller planets will have less dense atmospheres, the inner edge of the HZ (runaway greenhouse
    limit) moves outward (~10% lower than Earth flux) for low mass planets due to larger greenhouse effect arising from the
    increased H<SUB>2</SUB>O column depth. For larger planets, the H<SUB>2</SUB>O column depth is smaller, and higher temperatures
    are needed before water vapor completely dominates the outgoing longwave radiation. Hence the inner edge moves inward
    (~7% higher than Earth's flux). The outer HZ changes little due to the competing effects of the greenhouse effect and
    an increase in albedo. New, three-dimensional climate model results from other groups are also summarized, and we argue
    that further, independent studies are needed to verify their predictions. Combined with our previous work, the results
    presented here provide refined estimates of HZs around main-sequence stars and provide a step toward a more comprehensive
    analysis of HZs.
