- &id125
  arxiv_id: '1808.00476'
  ads_bibcode: 2018A&A...620A.128V
  title: Gaia DR2 study of Herbig Ae/Be stars
  authors:
  - Vioque, M.
  - Oudmaijer, R. D.
  - Baines, D.
  - Mendigutía, I.
  - Pérez-Martínez, R.
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.1051/0004-6361/201832870
  abstract: '<BR /> Aims: We use Gaia Data Release 2 (DR2) to place 252 Herbig Ae/Be stars in the Hertzsprung-Russell diagram
    and investigate their characteristics and properties. <BR /> Methods: For all known Herbig Ae/Be stars with parallaxes
    in Gaia DR2, we collected their atmospheric parameters and photometric and extinction values from the literature. To these
    data we added near-infrared and mid-infrared photometry, and collected Hα emission line properties such as equivalent
    widths and line profiles, and their binarity status. In addition, we developed a photometric variability indicator from
    Gaia''s DR2 information. <BR /> Results: We provide masses, ages, luminosities, distances, photometric variabilities and
    IR excesses homogeneously derived for the most complete sample of Herbig Ae/Be stars to date. We find that high-mass stars
    have a much smaller IR excess and have much lower optical variabilities compared to lower-mass stars, with the break at
    around 7 M<SUB>☉</SUB>. Hα emission is generally correlated with IR excess, with the correlation being stronger for IR
    emission at wavelengths tracing the hot dust closest to the star. The variability indicator as developed by us shows that
    ∼25% of all Herbig Ae/Be stars are strongly variable. We observe that the strongly variable objects display doubly peaked
    Hα line profiles, indicating an edge-on disk. <BR /> Conclusions: The fraction of strongly variable Herbig Ae stars is
    close to that found for A-type UX Ori stars. It had been suggested that this variability is in most cases due to asymmetric
    dusty disk structures seen edge-on. The observation here is in strong support of this hypothesis. Finally, the difference
    in dust properties occurs at 7 M<SUB>☉</SUB>, while various properties traced at UV/optical wavelengths differ at a lower
    mass, 3 M<SUB>☉</SUB>. The latter has been linked to different accretion mechanisms at work, whereas the differing IR
    properties and photometric variabilities are related to different or differently acting (dust-)disk-dispersal mechanisms.
    <P />Full Tables 1 and 2 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/620/A128">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/620/A128</A>'
