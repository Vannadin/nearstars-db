  arxiv_id: '1401.0722'
  ads_bibcode: 2014AJ....147...85R
  title: 'The Solar Neighborhood. XXXIII. Parallax Results from the CTIOPI 0.9 m Program: Trigonometric Parallaxes of Nearby
    Low-mass Active and Young Systems'
  authors:
  - Riedel, Adric R.
  - Finch, Charlie T.
  - Henry, Todd J.
  - Subasavage, John P.
  - Jao, Wei-Chun
  - Malo, Lison
