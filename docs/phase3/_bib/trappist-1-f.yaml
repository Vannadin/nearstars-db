- &id189
  arxiv_id: null
  ads_bibcode: 2018NatAs...2..634J
  title: Inventory of CO<SUB>2</SUB> available for terraforming Mars
  authors:
  - Jakosky, Bruce M.
  - Edwards, Christopher S.
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.1038/s41550-018-0529-6
  abstract: We revisit the idea of `terraforming' Mars — changing its environment to be more Earth-like in a way that would
    allow terrestrial life (possibly including humans) to survive without the need for life-support systems — in the context
    of what we know about Mars today. We want to answer the question of whether it is possible to mobilize gases present on
    Mars today in non-atmospheric reservoirs by emplacing them into the atmosphere, and increase the pressure and temperature
    so that plants or humans could survive at the surface. We ask whether this can be achieved considering realistic estimates
    of available volatiles, without the use of new technology that is well beyond today's capability. Recent observations
    have been made of the loss of Mars's atmosphere to space by the Mars Atmosphere and Volatile Evolution Mission probe and
    the Mars Express spacecraft, along with analyses of the abundance of carbon-bearing minerals and the occurrence of CO<SUB>2</SUB>
    in polar ice from the Mars Reconnaissance Orbiter and the Mars Odyssey spacecraft. These results suggest that there is
    not enough CO<SUB>2</SUB> remaining on Mars to provide significant greenhouse warming were the gas to be emplaced into
    the atmosphere; in addition, most of the CO<SUB>2</SUB> gas in these reservoirs is not accessible and thus cannot be readily
    mobilized. As a result, we conclude that terraforming Mars is not possible using present-day technology.
  source: citation_of=2024ApJ...969...20S
