  ads_bibcode: 2023NatSR..1313576S
  title: Fully fluorinated non-carbon compounds NF<SUB>3</SUB> and SF<SUB>6</SUB> as ideal technosignature gases
  authors:
  - Seager, Sara
  - Petkowski, Janusz J.
  - Huang, Jingcheng
