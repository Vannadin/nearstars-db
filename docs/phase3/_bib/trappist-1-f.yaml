  arxiv_id: '2401.05864'
  ads_bibcode: 2024ApJ...962L...8S
  title: Distinguishing Oceans of Water from Magma on Mini-Neptune K2-18b
  authors:
  - Shorttle, Oliver
  - Jordan, Sean
  - Nicholls, Harrison
  - Lichtenberg, Tim
  - Bower, Dan J.
  year: '2024'
  pubdate: '2024-02-00'
  doi: 10.3847/2041-8213/ad206e
  abstract: 'Mildly irradiated mini-Neptunes have densities potentially consistent with them hosting substantial liquid-water
    oceans ("Hycean" planets). The presence of CO<SUB>2</SUB> and simultaneous absence of ammonia (NH<SUB>3</SUB>) in their
    atmospheres has been proposed as a fingerprint of such worlds. JWST observations of K2-18b, the archetypal Hycean, have
    found the presence of CO<SUB>2</SUB> and the depletion of NH<SUB>3</SUB> to &lt;100 ppm; hence, it has been inferred that
    this planet may host liquid-water oceans. In contrast, climate modeling suggests that many of these mini-Neptunes, including
    K2-18b, may likely be too hot to host liquid water. We propose a solution to this discrepancy between observation and
    climate modeling by investigating the effect of a magma ocean on the atmospheric chemistry of mini-Neptunes. We demonstrate
    that atmospheric NH<SUB>3</SUB> depletion is a natural consequence of the high solubility of nitrogen species in magma
    at reducing conditions; precisely the conditions prevailing where a thick hydrogen envelope is in communication with a
    molten planetary surface. The magma ocean model reproduces the present JWST spectrum of K2-18b to ≲3σ, suggesting this
    is as credible an explanation for current observations as the planet hosting a liquid-water ocean. Spectral areas that
    could be used to rule out the magma ocean model include the &gt;4 μm region, where CO<SUB>2</SUB> and CO features dominate:
    magma ocean models suggest a systematically lower CO<SUB>2</SUB>/CO ratio than estimated from free-chemistry retrieval,
    indicating that deeper observations of this spectral region may be able to distinguish between oceans of liquid water
    and magma on mini-Neptunes.'
