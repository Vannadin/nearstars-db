  abstract: 'Context. Comparing the properties of planets orbiting the same host star, and thus formed from the same accretion
    disc, helps in constraining theories of exoplanet formation and evolution. As a result, the scientific interest in multi-planetary
    systems is growing with the increasing number of detections of planetary companions. <BR /> Aims: We report the characterisation
    of a multi-planetary system composed of five exoplanets orbiting the K-dwarf HD 23472 (TOI-174). <BR /> Methods: In addition
    to the two super-Earths that were previously confirmed, we confirm and characterise three Earth-size planets in the system
    using ESPRESSO radial velocity observations. The planets of this compact system have periods of P<SUB>d</SUB> ~ 3.98,
    P<SUB>e</SUB> ~ 7.90, P<SUB>f</SUB> ~ 12.16, P<SUB>b</SUB> ~ 17.67, and P<SUB>c</SUB> ~ 29.80 days and radii of R<SUB>d</SUB>
    ~ 0.75 , R<SUB>e</SUB> ~ 0.82,, R<SUB>f</SUB> ~ 1.13 , R<SUB>b</SUB> ~ 2.01, and, R<SUB>c</SUB> ~ 1.85 R<SUB>⊕</SUB> .Because
    of its small size, its proximity to planet d''s transit, and close resonance with planet d, planet e was only recently
    found. <BR /> Results: The planetary masses were estimated to be M<SUB>d</SUB> = 0.54 ± 0.22, M<SUB>e</SUB> = 0.76 ± 0.30,
    M<SUB>f</SUB> = 0.64<SUB>‒0.39</SUB><SUP>+0.46</SUP>, M<SUB>b</SUB> = 8.42<SUB>‒0.84</SUB><SUP>+0.83</SUP>, and M<SUB>c</SUB>
    = 3.37<SUB>‒0.87</SUB><SUP>+0.92</SUP> M<SUB>⊕</SUB>. These planets are among the lightest planets, with masses measured
    using the radial velocity method, demonstrating the very high precision of the ESPRESSO spectrograph. We estimated the
    composition of the system''s five planets and found that their gas and water mass fractions increase with stellar distance,
    suggesting that the system was shaped by irradiation. The high density of the two inner planets (ρ<SUB>d</SUB> = 7.5<SUB>‒3.1</SUB><SUP>+3.9</SUP>
    and ρ<SUB>e</SUB> = 7.5<SUB>‒3.0</SUB><SUP>+3.9</SUP> g cm<SUP>‒3</SUP>) indicates that they are likely to be super-Mercuries.
    This is supported by the modelling of the internal structures of the planets, which also suggests that the three outermost
    planets have significant water or gas content. <BR /> Conclusions: If the existence of two super-Mercuries in the system
    is confirmed, this system will be the only one known to feature two super-Mercuries, making it an excellent testing bed
    for theories of super-Mercuries formation. Furthermore, the system is close to a Laplace resonance, and further monitoring
    could shed light on how it was formed. Its uniqueness and location in the continuous viewing zone of the James Webb space
    telescope will make it a cornerstone of future in-depth characterisations. <P />Radial velocity observations are only
    available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5)
