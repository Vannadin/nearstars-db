  arxiv_id: '2201.03094'
  ads_bibcode: 2022MNRAS.513.5256H
  title: 'MAGRATHEA: an open-source spherical symmetric planet interior structure code'
  authors:
  - Huang, Chenliang
  - Rice, David R.
  - Steffen, Jason H.
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.1093/mnras/stac1133
  abstract: MAGRATHEA is an open-source planet structure code that considers the case of fully differentiated spherically
    symmetric interiors. Given the mass of each layer and the surface temperature, the code iterates the boundary conditions
    of the hydrostatic equations using the method of shooting to a fitting point in order to find the planet radius. The first
    version of MAGRATHEA supports a maximum of four layers of iron, silicates, water, and ideal gas. With a few exceptions,
    the temperature profile can be chosen between isothermal, isentropic, and user-defined functions. The user has many options
    for the phase diagram and equation of state in each layer and we document how to add additional equations of state. We
    present MAGRATHEA's capabilities and discuss its applications. We encourage the community to participate in the development
    of MAGRATHEA at https://github.com/Huang-CL/Magrathea.
