- &id042
  arxiv_id: '2306.09002'
  ads_bibcode: 2023A&A...676A.106B
  title: 'ExoMDN: Rapid characterization of exoplanet interior structures with mixture density networks★'
  authors:
  - Baumeister, Philipp
  - Tosi, Nicola
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1051/0004-6361/202346216
  abstract: '<BR /> Aims: Characterizing the interior structure of exoplanets is essential for understanding their diversity,
    formation, and evolution. As the interior of exoplanets is inaccessible to observations, an inverse problem must be solved,
    where numerical structure models need to conform to observable parameters such as mass and radius. This is a highly degenerate
    problem whose solution often relies on computationally expensive and time-consuming inference methods such as Markov chain
    Monte Carlo. <BR /> Methods: We present ExoMDN, a machine-learning model for the interior characterization of exoplanets
    based on mixture density networks (MDN). The model is trained on a large dataset of more than 5.6 million synthetic planets
    below 25 Earth masses consisting of an iron core, a silicate mantle, a water and high-pressure ice layer, and a H/He atmosphere.
    We employ log-ratio transformations to convert the interior structure data into a form that the MDN can easily handle.
    <BR /> Results: Given mass, radius, and equilibrium temperature, we show that ExoMDN can deliver a full posterior distribution
    of mass fractions and thicknesses of each planetary layer in under a second on a standard Intel i5 CPU. Observational
    uncertainties can be easily accounted for through repeated predictions from within the uncertainties. We used ExoMDN to
    characterize the interiors of 22 confirmed exoplanets with mass and radius uncertainties below 10 and 5%, respectively,
    including the well studied GJ 1214 b, GJ 486 b, and the TRAPPIST-1 planets. We discuss the inclusion of the fluid Love
    number k<SUB>2</SUB> as an additional (potential) observable, showing how it can significantly reduce the degeneracy of
    interior structures. Utilizing the fast predictions of ExoMDN, we show that measuring k<SUB>2</SUB> with an accuracy of
    10% can constrain the thickness of core and mantle of an Earth analog to ≈13% of the true values. <P />Full Table A.1
    is only available at the CDS via anonymous ftp to <A href="https://cdsarc.cds.unistra.fr/">cdsarc.cds.unistra.fr</A> (ftp://130.79.128.5)
    or via <A href="https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/676/A106">https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/676/A106</A>'
