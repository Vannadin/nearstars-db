  arxiv_id: '1605.01564'
  ads_bibcode: 2017MNRAS.465L..74W
  title: Strong XUV irradiation of the Earth-sized exoplanets orbiting the ultracool dwarf TRAPPIST-1
  authors:
  - Wheatley, Peter J.
  - Louden, Tom
  - Bourrier, Vincent
  - Ehrenreich, David
  - Gillon, Michaël
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.1093/mnrasl/slw192
  abstract: We present an XMM-Newton X-ray observation of TRAPPIST-1, which is an ultracool dwarf star recently discovered
    to host three transiting and temperate Earth-sized planets. We find the star is a relatively strong and variable coronal
    X-ray source with an X-ray luminosity similar to that of the quiet Sun, despite its much lower bolometric luminosity.
    We find L<SUB>X</SUB>/L<SUB>bol</SUB> = 2-4 × 10<SUP>-4</SUP>, with the total XUV emission in the range L<SUB>XUV</SUB>/L<SUB>bol</SUB>
    = 6-9 × 10<SUP>-4</SUP>, and XUV irradiation of the planets that is many times stronger than experienced by the present-day
    Earth. Using a simple energy-limited model, we show that the relatively close-in Earth-sized planets, which span the classical
    habitable zone of the star, are subjected to sufficient X-ray and EUV irradiation to significantly alter their primary
    and any secondary atmospheres. Understanding whether this high-energy irradiation makes the planets more or less habitable
    is a complex question, but our measured fluxes will be an important input to the necessary models of atmospheric evolution.
