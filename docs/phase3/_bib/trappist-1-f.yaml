- &id217
  arxiv_id: '1304.5561'
  ads_bibcode: 2013ApJ...775..137L
  title: A Systematic Retrieval Analysis of Secondary Eclipse Spectra. I. A Comparison of Atmospheric Retrieval Techniques
  authors:
  - Line, Michael R.
  - Wolf, Aaron S.
  - Zhang, Xi
  - Knutson, Heather
  - Kammer, Joshua A.
  - Ellison, Elias
  - Deroo, Pieter
  - Crisp, Dave
  - Yung, Yuk L.
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1088/0004-637X/775/2/137
  abstract: 'Exoplanet atmosphere spectroscopy enables us to improve our understanding of exoplanets just as remote sensing
    in our own solar system has increased our understanding of the solar system bodies. The challenge is to quantitatively
    determine the range of temperatures and molecular abundances allowed by the data, which is often difficult given the low
    information content of most exoplanet spectra that commonly leads to degeneracies in the interpretation. A variety of
    spectral retrieval approaches have been applied to exoplanet spectra, but no previous investigations have sought to compare
    these approaches. We compare three different retrieval methods: optimal estimation, differential evolution Markov chain
    Monte Carlo, and bootstrap Monte Carlo on a synthetic water-dominated hot Jupiter. We discuss expectations of uncertainties
    in abundances and temperatures given current and potential future observations. In general, we find that the three approaches
    agree for high spectral resolution, high signal-to-noise data expected to come from potential future spaceborne missions,
    but disagree for low-resolution, low signal-to-noise spectra representative of current observations. We also compare the
    results from a parameterized temperature profile versus a full classical Level-by-Level approach and discriminate in which
    situations each of these approaches is applicable. Furthermore, we discuss the implications of our models for the inferred
    C-to-O ratios of exoplanetary atmospheres. Specifically, we show that in the observational limit of a few photometric
    points, the retrieved C/O is biased toward values near solar and near one simply due to the assumption of uninformative
    priors.'
