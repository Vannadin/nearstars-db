- &id208
  arxiv_id: '1410.2255'
  ads_bibcode: 2014ApJ...793L..27K
  title: A Precise Water Abundance Measurement for the Hot Jupiter WASP-43b
  authors:
  - Kreidberg, Laura
  - Bean, Jacob L.
  - Désert, Jean-Michel
  - Line, Michael R.
  - Fortney, Jonathan J.
  - Madhusudhan, Nikku
  - Stevenson, Kevin B.
