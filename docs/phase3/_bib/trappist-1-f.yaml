- &id041
  arxiv_id: '2310.01527'
  ads_bibcode: 2023AJ....166..213O
  title: 'Reading Between the Lines: Investigating the Ability of JWST to Identify Discerning Features in exoEarth and exoVenus
    Transmission Spectra'
  authors:
  - Ostberg, Colby
  - Kane, Stephen R.
  - Lincowski, Andrew P.
  - Dalba, Paul A.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.3847/1538-3881/acfed2
  abstract: The success of the Transiting Exoplanet Survey Satellite mission has led to the discovery of an abundance of Venus
    Zone terrestrial planets that orbit relatively bright host stars. Atmospheric observations of these planets play a crucial
    role in understanding the evolutionary history of terrestrial planets, past habitable states, and the divergence of Venus
    and Earth climates. The transmission spectrum of a Venus-like exoplanet can be difficult to distinguish from that of an
    Earthlike exoplanet however, which could severely limit what can be learned from studying exoVenuses. In this work we
    further investigate differences in transmission between hypothetical exoEarths and exoVenuses, both with varying amounts
    of atmospheric carbon dioxide (CO<SUB>2</SUB>). The exoEarths and exoVenuses were modeled assuming they orbit TRAPPIST-1
    on the runaway greenhouse boundary. We simulated James Webb Space Telescope Near-Infrared Spectrograph PRISM transit observations
    of both sets of planets between 0.6 and 5.2 μm, and quantified the detectability of major absorption features in their
    transmission spectra. The exoEarth spectra include several large methane (CH<SUB>4</SUB>) features that can be detected
    in as few as six transits. The CH<SUB>4</SUB> feature at 3.4 μm is the optimal for feature for discerning an exoEarth
    from an exoVenus since it is easily detectable and does not overlap with CO<SUB>2</SUB> features. The sulfur dioxide (SO<SUB>2</SUB>)
    feature at 4.0 μm is the best indicator of an exoVenus, but it is detectable in atmospheres with reduced CO<SUB>2</SUB>
    abundance.
