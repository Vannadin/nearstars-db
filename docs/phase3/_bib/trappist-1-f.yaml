  year: '2014'
  pubdate: '2014-08-00'
  doi: 10.1088/2041-8205/790/2/L23
  abstract: A new sample of solar analogs and twin candidates has been constructed and studied, paying particular attention
    to their light curves from NASA's Kepler mission. This Letter aims to assess their evolutionary status, derive their rotation
    and ages, and identify those which are solar analogs or solar twin candidates. We separate out the subgiants that compose
    a large fraction of the asteroseismic sample, and which show an increase in the average rotation period as the stars ascend
    the subgiant branch. The rotation periods of the dwarfs, ranging from 6 to 30 days and averaging 19 days, allow us to
    assess their individual evolutionary states on the main sequence and to derive their ages using gyrochronology. These
    ages are found to be in agreement with a correlation coefficient of r = 0.79 with independent asteroseismic ages, where
    available. As a result of this investigation, we are able to identify 34 stars as solar analogs and 22 of them as solar
    twin candidates.
