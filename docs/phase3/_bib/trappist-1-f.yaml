  abstract: Spectroscopic analysis of hydrocarbons, halocarbons and related species is required in atmospheric applications
    such as climate-change research, tracking of pollution and biomass burning, and remote sensing. Critically evaluated line-by-line
    spectroscopic data are needed for such analyses. To address this need we report the large addition of spectra to the HITRAN2016
    database. This extension increases the number of molecules in the database by almost a factor of 6 from that in HITRAN2012.
    Spectra from the Pacific Northwest National Laboratory database (Appl. Spectrosc. 2004;58:1452-61) and the Hodnebrog et
    al. compilation (Rev Geophys 2013;51:300-78) have been integrated into HITRAN2016. Spectra from high-resolution laboratory
    observations, predominantly from Fourier transform spectrometers, are now provided for 328 compounds in the IR spectral
    range. Spectra for atmospherically-important compounds organized by chemical category are presented. The HITRAN infrastructure
    (www.hitran.org), HITRAN Application Programming Interface (HAPI), and best practices for searching and downloading data
    are discussed.
