  arxiv_id: null
  ads_bibcode: 2017JGRE..122.1458S
  title: The relative influence of H<SUB>2</SUB>O and CO<SUB>2</SUB> on the primitive surface conditions and evolution of
    rocky planets
  authors:
  - Salvador, A.
  - Massol, H.
  - Davaille, A.
  - Marcq, E.
  - Sarda, P.
  - Chassefière, E.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.1002/2017JE005286
  abstract: How the volatile content influences the primordial surface conditions of terrestrial planets and, thus, their
    future geodynamic evolution is an important question to answer. We simulate the secular convective cooling of a 1-D magma
    ocean (MO) in interaction with its outgassed atmosphere. The heat transfer in the atmosphere is computed either using
    the grey approximation or using a k-correlated method. We vary the initial CO<SUB>2</SUB> and H<SUB>2</SUB>O contents
    (respectively from 0.1 × 10<SUP>-2</SUP> to 14 × 10<SUP>-2</SUP> wt % and from 0.03 to 1.4 times the Earth Ocean current
    mass) and the solar distance—from 0.63 to 1.30 AU. A first rapid cooling stage, where efficient MO cooling and degassing
    take place, producing the atmosphere, is followed by a second quasi steady state where the heat flux balance is dominated
    by the solar flux. The end of the rapid cooling stage (ERCS) is reached when the mantle heat flux becomes negligible compared
    to the absorbed solar flux. The resulting surface conditions at ERCS, including water ocean's formation, strongly depend
    both on the initial volatile content and solar distance D. For D &gt; D<SUB>C</SUB>, the "critical distance," the volatile
    content controls water condensation and a new scaling law is derived for the water condensation limit. Although today's
    Venus is located beyond D<SUB>C</SUB> due to its high albedo, its high CO<SUB>2</SUB>/H<SUB>2</SUB>O ratio prevents any
    water ocean formation. Depending on the formation time of its cloud cover and resulting albedo, only 0.3 Earth ocean mass
    might be sufficient to form a water ocean on early Venus.
