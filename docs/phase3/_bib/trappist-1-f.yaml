  ads_bibcode: 2014Natur.505...66K
  title: A featureless transmission spectrum for the Neptune-mass exoplanet GJ436b
  authors:
  - Knutson, Heather A.
  - Benneke, Björn
  - Deming, Drake
  - Homeier, Derek
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1038/nature12887
  abstract: GJ436b is a warm--approximately 800 kelvin--exoplanet that periodically eclipses its low-mass (half the mass of
    the Sun) host star, and is one of the few Neptune-mass planets that is amenable to detailed characterization. Previous
    observations have indicated that its atmosphere has a ratio of methane to carbon monoxide that is 10<SUP>5</SUP> times
    smaller than predicted by models for hydrogen-dominated atmospheres at these temperatures. A recent study proposed that
    this unusual chemistry could be explained if the planet's atmosphere is significantly enhanced in elements heavier than
    hydrogen and helium. Here we report observations of GJ 436b's atmosphere obtained during transit. The data indicate that
    the planet's transmission spectrum is featureless, ruling out cloud-free, hydrogen-dominated atmosphere models with an
    extremely high significance of 48σ. The measured spectrum is consistent with either a layer of high cloud located at a
    pressure level of approximately one millibar or with a relatively hydrogen-poor (three per cent hydrogen and helium mass
    fraction) atmospheric composition.
