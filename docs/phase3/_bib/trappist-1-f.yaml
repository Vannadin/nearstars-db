  arxiv_id: '1905.02560'
  ads_bibcode: 2019A&A...624A..49W
  title: Detectability of atmospheric features of Earth-like planets in the habitable zone around M dwarfs
  authors:
  - Wunderlich, Fabian
  - Godolt, Mareike
  - Grenfell, John Lee
  - Städt, Steffen
  - Smith, Alexis M. S.
  - Gebauer, Stefanie
  - Schreier, Franz
  - Hedelt, Pascal
  - Rauer, Heike
  year: '2019'
  pubdate: '2019-04-00'
  doi: 10.1051/0004-6361/201834504
  abstract: 'Context. The characterisation of the atmosphere of exoplanets is one of the main goals of exoplanet science in
    the coming decades. <BR /> Aims: We investigate the detectability of atmospheric spectral features of Earth-like planets
    in the habitable zone (HZ) around M dwarfs with the future James Webb Space Telescope (JWST). <BR /> Methods: We used
    a coupled 1D climate-chemistry-model to simulate the influence of a range of observed and modelled M-dwarf spectra on
    Earth-like planets. The simulated atmospheres served as input for the calculation of the transmission spectra of the hypothetical
    planets, using a line-by-line spectral radiative transfer model. To investigate the spectroscopic detectability of absorption
    bands with JWST we further developed a signal-to-noise ratio (S/N) model and applied it to our transmission spectra. <BR
    /> Results: High abundances of methane (CH<SUB>4</SUB>) and water (H<SUB>2</SUB>O) in the atmosphere of Earth-like planets
    around mid to late M dwarfs increase the detectability of the corresponding spectral features compared to early M-dwarf
    planets. Increased temperatures in the middle atmosphere of mid- to late-type M-dwarf planets expand the atmosphere and
    further increase the detectability of absorption bands. To detect CH<SUB>4</SUB>, H<SUB>2</SUB>O, and carbon dioxide (CO<SUB>2</SUB>)
    in the atmosphere of an Earth-like planet around a mid to late M dwarf observing only one transit with JWST could be enough
    up to a distance of 4 pc and less than ten transits up to a distance of 10 pc. As a consequence of saturation limits of
    JWST and less pronounced absorption bands, the detection of spectral features of hypothetical Earth-like planets around
    most early M dwarfs would require more than ten transits. We identify 276 existing M dwarfs (including GJ 1132, TRAPPIST-1,
    GJ 1214, and LHS 1140) around which atmospheric absorption features of hypothetical Earth-like planets could be detected
    by co-adding just a few transits. <BR /> Conclusions: The TESS satellite will likely find new transiting terrestrial planets
    within 15 pc from the Earth. We show that using transmission spectroscopy, JWST could provide enough precision to be able
    to partly characterise the atmosphere of TESS findings with an Earth-like composition around mid to late M dwarfs. <P
    />The data from top Fig. 6 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/624/A49">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/624/A49</A>'
