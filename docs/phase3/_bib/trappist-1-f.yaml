  - Ravela, Sai
  - Bains, William
  year: '2023'
  pubdate: '2023-08-00'
  doi: 10.1038/s41598-023-39972-z
  abstract: 'Waste gas products from technological civilizations may accumulate in an exoplanet atmosphere to detectable levels.
    We propose nitrogen trifluoride (NF<SUB>3</SUB>) and sulfur hexafluoride (SF<SUB>6</SUB>) as ideal technosignature gases.
    Earth life avoids producing or using any N-F or S-F bond-containing molecules and makes no fully fluorinated molecules
    with any element. NF<SUB>3</SUB> and SF<SUB>6</SUB> may be universal technosignatures owing to their special industrial
    properties, which unlike biosignature gases, are not species-dependent. Other key relevant qualities of NF<SUB>3</SUB>
    and SF<SUB>6</SUB> are: their extremely low water solubility, unique spectral features, and long atmospheric lifetimes.
    NF<SUB>3</SUB> has no non-human sources and was absent from Earth''s pre-industrial atmosphere. SF<SUB>6</SUB> is released
    in only tiny amounts from fluorine-containing minerals, and is likely produced in only trivial amounts by volcanic eruptions.
    We propose a strategy to rule out SF<SUB>6</SUB>''s abiotic source by simultaneous observations of SiF<SUB>4</SUB>, which
    is released by volcanoes in an order of magnitude higher abundance than SF<SUB>6</SUB>. Other fully fluorinated human-made
    molecules are of interest, but their chemical and spectral properties are unavailable. We summarize why life on Earth—and
    perhaps life elsewhere—avoids using F. We caution, however, that we cannot definitively disentangle an alien biochemistry
    byproduct from a technosignature gas.'
