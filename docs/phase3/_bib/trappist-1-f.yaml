- &id168
  arxiv_id: '2111.06429'
  ads_bibcode: 2021ApJ...922L..27T
  title: Inferring Shallow Surfaces on Sub-Neptune Exoplanets with JWST
  authors:
  - Tsai, Shang-Min
  - Innes, Hamish
  - Lichtenberg, Tim
  - Taylor, Jake
  - Malik, Matej
  - Chubb, Katy
  - Pierrehumbert, Raymond
  year: '2021'
  pubdate: '2021-12-00'
  doi: 10.3847/2041-8213/ac399a
  abstract: Planets smaller than Neptune and larger than Earth make up the majority of the discovered exoplanets. Those with
    H<SUB>2</SUB>-rich atmospheres are prime targets for atmospheric characterization. The transition between the two main
    classes, super-Earths and sub-Neptunes, is not clearly understood as the rocky surface is likely not accessible to observations.
    Tracking several trace gases (specifically the loss of ammonia (NH<SUB>3</SUB>) and hydrogen cyanide (HCN)) has been proposed
    as a proxy for the presence of a shallow surface. In this work, we revisit the proposed mechanism of nitrogen conversion
    in detail and find its timescale on the order of a million years. NH<SUB>3</SUB> exhibits dual paths converting to N<SUB>2</SUB>
    or HCN, depending on the UV radiation of the star and the stage of the system. In addition, methanol (CH<SUB>3</SUB>OH)
    is identified as a robust and complementary proxy for a shallow surface. We follow the fiducial example of K2-18b with
    a 2D photochemical model on an equatorial plane. We find a fairly uniform composition distribution below 0.1 mbar controlled
    by the dayside, as a result of slow chemical evolution. NH<SUB>3</SUB> and CH<SUB>3</SUB>OH are concluded to be the most
    unambiguous proxies to infer surfaces on sub-Neptunes in the era of the James Webb Space Telescope.
