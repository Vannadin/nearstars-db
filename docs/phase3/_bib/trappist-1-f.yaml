- &id071
  arxiv_id: '1301.6674'
  ads_bibcode: 2013ApJ...765..131K
  title: 'Habitable Zones around Main-sequence Stars: New Estimates'
  authors:
  - Kopparapu, Ravi Kumar
  - Ramirez, Ramses
  - Kasting, James F.
  - Eymet, Vincent
  - Robinson, Tyler D.
  - Mahadevan, Suvrath
  - Terrien, Ryan C.
  - Domagal-Goldman, Shawn
  - Meadows, Victoria
  - Deshpande, Rohit
  year: '2013'
  pubdate: '2013-03-00'
  doi: 10.1088/0004-637X/765/2/131
  abstract: Identifying terrestrial planets in the habitable zones (HZs) of other stars is one of the primary goals of ongoing
    radial velocity (RV) and transit exoplanet surveys and proposed future space missions. Most current estimates of the boundaries
    of the HZ are based on one-dimensional (1D), cloud-free, climate model calculations by Kasting et al. However, this model
    used band models that were based on older HITRAN and HITEMP line-by-line databases. The inner edge of the HZ in the Kasting
    et al. model was determined by loss of water, and the outer edge was determined by the maximum greenhouse provided by
    a CO<SUB>2</SUB> atmosphere. A conservative estimate for the width of the HZ from this model in our solar system is 0.95-1.67
    AU. Here an updated 1D radiative-convective, cloud-free climate model is used to obtain new estimates for HZ widths around
    F, G, K, and M stars. New H<SUB>2</SUB>O and CO<SUB>2</SUB> absorption coefficients, derived from the HITRAN 2008 and
    HITEMP 2010 line-by-line databases, are important improvements to the climate model. According to the new model, the water-loss
    (inner HZ) and maximum greenhouse (outer HZ) limits for our solar system are at 0.99 and 1.70 AU, respectively, suggesting
    that the present Earth lies near the inner edge. Additional calculations are performed for stars with effective temperatures
    between 2600 and 7200 K, and the results are presented in parametric form, making them easy to apply to actual stars.
    The new model indicates that, near the inner edge of the HZ, there is no clear distinction between runaway greenhouse
    and water-loss limits for stars with T <SUB>eff</SUB> &lt;~ 5000 K, which has implications for ongoing planet searches
    around K and M stars. To assess the potential habitability of extrasolar terrestrial planets, we propose using stellar
    flux incident on a planet rather than equilibrium temperature. This removes the dependence on planetary (Bond) albedo,
    which varies depending on the host star's spectral type. We suggest that conservative estimates of the HZ (water-loss
    and maximum greenhouse limits) should be used for current RV surveys and Kepler mission to obtain a lower limit on η<SUB>⊕</SUB>,
    so that future flagship missions like TPF-C and Darwin are not undersized. Our model does not include the radiative effects
    of clouds; thus, the actual HZ boundaries may extend further in both directions than the estimates just given.
