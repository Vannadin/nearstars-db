- &id105
  arxiv_id: '1312.5651'
  ads_bibcode: 2014ApJ...781...53H
  title: The Effect of Carbon Monoxide on Planetary Haze Formation
  authors:
  - Hörst, S. M.
  - Tolbert, M. A.
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1088/0004-637X/781/1/53
  abstract: Organic haze plays a key role in many planetary processes ranging from influencing the radiation budget of an
    atmosphere to serving as a source of prebiotic molecules on the surface. Numerous experiments have investigated the aerosols
    produced by exposing mixtures of N<SUB>2</SUB>/CH<SUB>4</SUB> to a variety of energy sources. However, many N<SUB>2</SUB>/CH<SUB>4</SUB>
    atmospheres in both our solar system and extrasolar planetary systems also contain carbon monoxide (CO). We have conducted
    a series of atmosphere simulation experiments to investigate the effect of CO on the formation and particle size of planetary
    haze analogues for a range of CO mixing ratios using two different energy sources, spark discharge and UV. We find that
    CO strongly affects both number density and particle size of the aerosols produced in our experiments and indicates that
    CO may play an important, previously unexplored, role in aerosol chemistry in planetary atmospheres.
