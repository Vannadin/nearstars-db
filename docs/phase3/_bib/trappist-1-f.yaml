- &id017
  arxiv_id: '1710.08761'
  ads_bibcode: 2017NatAs...1..878K
  title: Magma oceans and enhanced volcanism on TRAPPIST-1 planets due to induction heating
  authors:
  - Kislyakova, K. G.
  - Noack, L.
  - Johnstone, C. P.
  - Zaitsev, V. V.
  - Fossati, L.
  - Lammer, H.
  - Khodachenko, M. L.
  - Odert, P.
  - Güdel, M.
  year: '2017'
  pubdate: '2017-10-00'
  doi: 10.1038/s41550-017-0284-0
  abstract: Low-mass M stars are plentiful in the Universe and often host small, rocky planets detectable with current instrumentation.
    These stars host magnetic fields, some of which have been observed to exceed a few hundred gauss. Recently, seven small
    planets have been discovered orbiting the ultra-cool M dwarf TRAPPIST-1, which has an observed magnetic field of 600 G.
    We suggest electromagnetic induction heating as an energy source inside these planets. If the stellar rotation and magnetic
    dipole axes are inclined with respect to each other, induction heating can melt the upper mantle and enormously increase
    volcanic activity, sometimes producing a magma ocean below the planetary surface. We show that induction heating leads
    the four innermost TRAPPIST-1 planets, one of which is in the habitable zone, either to evolve towards a molten mantle
    planet, or to experience increased outgassing and volcanic activity, while the three outermost planets remain mostly unaffected.
