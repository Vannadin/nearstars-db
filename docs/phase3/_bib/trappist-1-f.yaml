  arxiv_id: '2409.03683'
  ads_bibcode: 2024ApJ...975..101R
  title: Toward a Self-consistent Evaluation of Gas Dwarf Scenarios for Temperate Sub-Neptunes
  authors:
  - Rigby, Frances E.
  - Pica-Ciamarra, Lorenzo
  - Holmberg, Måns
  - Madhusudhan, Nikku
  - Constantinou, Savvas
  - Schaefer, Laura
