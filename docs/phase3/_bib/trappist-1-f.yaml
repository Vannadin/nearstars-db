  arxiv_id: null
  ads_bibcode: 2018hw...prop..113R
  title: 'Hot and Steamy, Cold and Icy, or Temperate and Habitable: Modeling the Early Evolution of Water World Exoplanets'
  authors:
  - Rogers, Leslie
  year: '2018'
  pubdate: '2018-00-00'
  doi: null
  abstract: We propose to model the post-accretion cooling of water-rich exoplanets (with at least 1% water by mass) to assess
    the conditions under which the planets will cool sufficiently to condense liquid water oceans. <P />Planets with global
    water oceans have been the subject of intrigue both in Hollywood and in the exoplanet scientific community. Kuchner (2003)
    and Leger et al. (2004) first proposed the possibility of water worlds - water-rich (&gt;1% water by mass) exoplanets
    that formed from a comet-like mixture rock and ice from the outer reaches of the protoplanetary disk (beyond the water
    snow line) but that never attained masses sufficient to accrete or retain large amounts of H/He nebular gas. This pathway
    for producing low-mass water-rich planets has since played out as a robust prediction of planet formation simulations.
    Habitable zone water worlds are especially timely given the discovery and characterization of the TRAPPIST-1 planetary
    system, hosting seven Earth-sized, temperate transiting exoplanets orbiting a nearby ultracool dwarf star. Transit timing
    variation mass measurements indicate that the TRAPPIST-1 planets may contain several percent to several tens of percent
    water by mass. <P />Studies of the habitability of water worlds have so far taken it for granted that the planets can
    cool sufficiently for a liquid ocean to condense. Models have not yet demonstrated the evolution of water worlds from
    an initial post-accretion hot state to habitable conditions (with surface or subsurface water oceans). Indeed, studies
    of the interior structure of water-world exoplanets have either assumed that the planets are relatively cold (with most
    of their water condensed in high-pressure ices, like scaled-up versions of Jupiter's moon Ganymede) or that the planets
    are relatively hot (with most of their water in extended envelopes of vapor and supercritical steam). The question of
    whether a water-world will be icy or steamy has important implications for both the habitability of the planet (whether
    or not it can host a liquid water ocean) and its observable characteristics (e.g., apparent transit radius, mean planet
    density, and atmospheric spectra). Detailed models of the thermal evolution of water worlds are needed to assess the scenarios
    that will lead to cold and icy, hot and steamy, or temperate and habitable water world outcomes. <P />We propose to combine
    models of planet interior structure, phase equilibria, atmospheric radiative transfer, and ab initio simulations of H2O-CO2
    mixtures to simulate the post-accretion evolution of water world exoplanets. We will apply these models to delineate the
    regions of planet parameter space (i.e., orbital separation, planet mass, and volatile mass fraction) within which planets
    are likely to remain hot and steamy or cool sufficiently to form high pressure ice mantles and/or liquid water oceans.
    This study is necessary to establish whether habitable zone water worlds (such as TRAPPIST-1 f and g) can develop liquid
    water oceans and conditions potentially favorable to life. <P />This proposal is directly relevant to the NASA Habitable
    Worlds Program because it addresses the habitability of water-rich exoplanets. This work involves modeling water body
    physics and chemistry as they pertain to habitability and habitability over time". By delineating the range of planet
    parameter space (masses, radii, and orbits) over which water world exoplanets may plausibly condense liquid oceans, this
    project will inform target and operational choices for current NASA missions" (i.e., HST, Spitzer, JWST, TESS) and will
    be essential for the planning of a future space-based exoplanet direct imaging mission (e.g., LUVOIR, HabEx).
