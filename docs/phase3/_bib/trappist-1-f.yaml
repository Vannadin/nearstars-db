  arxiv_id: '1803.05967'
  ads_bibcode: 2018haex.bookE.189O
  title: 'Earth: Atmospheric Evolution of a Habitable Planet'
  authors:
  - Olson, Stephanie L.
  - Schwieterman, Edward W.
  - Reinhard, Christopher T.
  - Lyons, Timothy W.
  year: '2018'
  pubdate: '2018-00-00'
  doi: 10.1007/978-3-319-55333-7_189
  abstract: Our present-day atmosphere is often used as analog for potentially habitable exoplanets, but Earth's atmosphere
    has changed dramatically throughout its 4.5-billion-year history. For example, molecular oxygen is abundant in the atmosphere
    today but was absent on the early Earth. Meanwhile, the physical and chemical evolution of Earth's atmosphere has also
    resulted in major swings in surface temperature, at times resulting in extreme glaciation or warm greenhouse climates.
    Despite this dynamic and occasionally dramatic history, the Earth has been persistently habitable - and, in fact, inhabited
    - for roughly four billion years. Understanding Earth's momentous changes and its enduring habitability is essential as
    a guide to the diversity of habitable planetary environments that may exist beyond our solar system and for ultimately
    recognizing spectroscopic fingerprints of life elsewhere in the universe.
