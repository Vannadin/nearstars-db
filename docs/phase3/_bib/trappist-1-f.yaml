  ads_bibcode: 2017Natur.542..456G
  title: Seven temperate terrestrial planets around the nearby ultracool dwarf star TRAPPIST-1
  authors:
  - Gillon, Michaël
  - Triaud, Amaury H. M. J.
  - Demory, Brice-Olivier
  - Jehin, Emmanuël
  - Agol, Eric
  - Deck, Katherine M.
  - Lederer, Susan M.
  - de Wit, Julien
  - Burdanov, Artem
  - Ingalls, James G.
  - Bolmont, Emeline
  - Leconte, Jeremy
  - Raymond, Sean N.
  - Selsis, Franck
  - Turbet, Martin
  - Barkaoui, Khalid
  - Burgasser, Adam
  - Burleigh, Matthew R.
  - Carey, Sean J.
  - Chaushev, Aleksander
  - Copperwheat, Chris M.
