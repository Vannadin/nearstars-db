- &id049
  arxiv_id: '2210.04948'
  ads_bibcode: 2022NatAs...6.1263S
  title: Early Mars habitability and global cooling by H<SUB>2</SUB>-based methanogens
  authors:
  - Sauterey, Boris
  - Charnay, Benjamin
  - Affholder, Antonin
  - Mazevet, Stéphane
  - Ferrière, Régis
  year: '2022'
  pubdate: '2022-11-00'
  doi: 10.1038/s41550-022-01786-w
  abstract: During the Noachian, Mars' crust may have provided a favourable environment for microbial life<SUP>1,2</SUP>.
    The porous brine-saturated regolith<SUP>3-5</SUP> would have created a physical space sheltered from ultraviolet and cosmic
    radiation and provided a solvent, whereas the below-ground temperature<SUP>2</SUP> and diffusion<SUP>6,7</SUP> of a dense,
    reduced atmosphere<SUP>8,9</SUP> may have supported simple microbial organisms that consumed H<SUB>2</SUB> and CO<SUB>2</SUB>
    as energy and carbon sources and produced methane as a waste. On Earth, hydrogenotrophic methanogenesis was among the
    earliest metabolisms<SUP>10,11</SUP>, but its viability on early Mars has never been quantitatively evaluated. Here we
    present a probabilistic assessment of Mars' Noachian habitability to H<SUB>2</SUB>-based methanogens and quantify their
    biological feedback on Mars' atmosphere and climate. We find that subsurface habitability was very likely, and limited
    mainly by the extent of surface ice coverage. Biomass productivity could have been as high as in the early Earth's ocean.
    However, the predicted atmospheric composition shift caused by methanogenesis would have triggered a global cooling event,
    ending potential early warm conditions, compromising surface habitability and forcing the biosphere deep into the Martian
    crust. Spatial projections of our predictions point to lowland sites at low-to-medium latitudes as good candidates to
    uncover traces of this early life at or near the surface.
