  arxiv_id: '1810.10064'
  ads_bibcode: 2018A&A...620A.178P
  title: Matrix-propagator approach to compute fluid Love numbers and applicability to extrasolar planets
  authors:
  - Padovan, S.
  - Spohn, T.
  - Baumeister, P.
  - Tosi, N.
  - Breuer, D.
  - Csizmadia, Sz.
  - Hellard, H.
  - Sohl, F.
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.1051/0004-6361/201834181
  abstract: 'Context. The mass and radius of a planet directly provide its bulk density, which can be interpreted in terms
    of its overall composition. Any measure of the radial mass distribution provides a first step in constraining the interior
    structure. The fluid Love number k<SUB>2</SUB> provides such a measure, and estimates of k<SUB>2</SUB> for extrasolar
    planets are expected to be available in the coming years thanks to improved observational facilities and the ever-extending
    temporal baseline of extrasolar planet observations. <BR /> Aims: We derive a method for calculating the Love numbers
    k<SUB>n</SUB> of any object given its density profile, which is routinely calculated from interior structure codes. <BR
    /> Methods: We used the matrix-propagator technique, a method frequently used in the geophysical community. <BR /> Results:
    We detail the calculation and apply it to the case of GJ 436b, a classical example of the degeneracy of mass-radius relationships,
    to illustrate how measurements of k<SUB>2</SUB> can improve our understanding of the interior structure of extrasolar
    planets. We implemented the method in a code that is fast, freely available, and easy to combine with preexisting interior
    structure codes. While the linear approach presented here for the calculation of the Love numbers cannot treat the presence
    of nonlinear effects that may arise under certain dynamical conditions, it is applicable to close-in gaseous extrasolar
    planets like hot Jupiters, likely the first targets for which k<SUB>2</SUB> will be measured. <P />A copy of the code
    is available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5)
    or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/620/A178">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/620/A178</A>
    and at <A href="https://bitbucket.org/sebastianopadovan/planetary-fluid-love-numbers/src/master/">https://bitbucket.org/sebastianopadovan/planetary-fluid-love-numbers/src/master/</A>'
