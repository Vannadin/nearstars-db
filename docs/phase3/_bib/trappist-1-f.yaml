  abstract: Surface magnetism is believed to be the main driver of coronal heating and stellar wind acceleration. Coronae
    are believed to be formed by plasma confined in closed magnetic coronal loops of the stars, with winds mainly originating
    in open magnetic field line regions. In this chapter, we review some basic properties of stellar coronae and winds and
