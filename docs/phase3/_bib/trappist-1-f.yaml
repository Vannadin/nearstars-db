  arxiv_id: null
  ads_bibcode: 2025Icar..42916450B
  title: Distinct types of C-H-O-N atmospheres and surface pressures depending on melt redox state and outgassing efficiency
  authors:
  - Brachmann, Caroline
  - Noack, Lena
  - Baumeister, Philipp Alexander
  - Sohl, Frank
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.1016/j.icarus.2024.116450
  abstract: After the magma ocean state, secondary atmospheres build up via early volcanic degassing of planetary interiors.
    The terrestrial planets Venus, Earth, and Mars are believed to have originated from similar source material but reveal
    distinct present-day atmospheric compositions, pressures, and temperatures. To investigate how such diverse atmospheres
    emerge, we have built a three-step model coupling mantle and atmospheric composition. The model incorporates mantle melting,
    melt ascent, and volcanic degassing. Additionally, it includes atmospheric equilibrium chemistry, taking into account
    processes such as water condensation and hydrogen escape. Key parameters such as mantle oxygen fugacity, melt production
    rates, surface temperature, and volatile abundance in the mantle, were varied to understand their impact on atmospheric
    composition and pressure. For reduced mantles with redox states below IW +1, atmospheric pressures remain strongly limited
    to a maximum of 2 bar due to the outgassing of predominantly light species that are prone to atmospheric escape or condensation.
    Above IW +1, atmospheric pressure can reach several tens of bars depending on the outgassing efficiency. For high-pressure
    atmospheres, CO<SUB>2</SUB> is the main atmospheric species observed in our models. For oxidized low-pressure atmospheres,
    depending on temperature, atmospheres can be either water-rich or also CO<SUB>2</SUB>-dominated. For reducing atmospheres,
    nitrogen species tend to dominate the atmospheres, with NH<SUB>3</SUB> for colder atmospheres and N<SUB>2</SUB> for warmer
    atmospheres. CH<SUB>4</SUB> becomes dominant only in a narrow parameter space at redox states around IW +0.5 to IW +2
    and is favored by lower atmospheric temperatures.
