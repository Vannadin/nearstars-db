  - Barnes, Rory
  - Luger, Rodrigo
  year: '2019'
  pubdate: '2019-03-00'
  doi: null
  abstract: Exoplanets orbiting in the habitable zone (HZ) of M dwarfs can lose significant amounts of water during the stellar
    pre-main sequence, a major obstacle to habitability (Luger &amp; Barnes, 2015). TRAPPIST-1, a late M dwarf located 12
    pc away, harbors 7 transiting terrestrial exoplanets that span the HZ, offering an unprecedented laboratory to examine
    how water loss impacts potentially-habitable exoplanets (Gillon et al., 2017). We perform a Markov Chain Monte Carlo (MCMC)
    analysis to constrain the XUV luminosity evolution of TRAPPIST-1, the key driver of water loss, while accounting for observational
    uncertainties. We use these constraints to derive plausible distributions for the amount of water the TRAPPIST-1 exoplanets
    could have lost and define a metric, the Exoplanet Habitability Index (EHI), to quantify which planet is most likely to
    retain water. We find that TRAPPIST-1e likely resided interior to the HZ for ~370 Myr, potentially losing 8-12 Earth oceans
    and releasing ~1000 bars of O2, a false biosignature. TRAPPIST-1 f and g likely entered the HZ 200-250 Myr earlier than
    e, losing 4-5 Earth oceans each. TRAPPIST-1 b, c, and d probably are still in a runaway phase and could have each lost
    over 100 Earth oceans.
