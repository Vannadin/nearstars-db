  doi: 10.1073/pnas.2401281121
  abstract: Ferromagnesian silicates are the dominant constituents of the Earth's mantle, which comprise &gt;80% of our planet
    by volume. The stability and properties of iron silicates under high-pressure and high-temperature conditions would provide
    crucial information for explaining the mantle structure. The discovery of fayalite Fe<SUB>2</SUB>SiO<SUB>4</SUB> olivine-spinel
    transition in 1958 marked the first known phase transition beyond the upper mantle, inspiring search for phase transformations
    at higher pressures. The disproportionation of fayalite spinel into mixed oxides marked the first phase transition under
    the lower mantle conditions. We found the disproportionation of fayalite into iron silicate perovskite above 60 GPa, or
    postperovskite above 95 GPa, plus metallic iron. Phase transformations of iron silicates are finally resolved over the
    entire mantle conditions.
