  arxiv_id: null
  ads_bibcode: 2024AJ....167..128A
  title: Large Interferometer For Exoplanets (LIFE). XII. The Detectability of Capstone Biosignatures in the Mid-infrared—Sniffing
    Exoplanetary Laughing Gas and Methylated Halogens
  authors:
  - Angerhausen, Daniel
  - Pidhorodetska, Daria
  - Leung, Michaela
  - Hansen, Janina
  - Alei, Eleonora
  - Dannert, Felix
  - Kammerer, Jens
  - Quanz, Sascha P.
  - Schwieterman, Edward W.
  - The LIFE initiative
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.3847/1538-3881/ad1f4b
  abstract: 'This study aims to identify exemplary science cases for observing N<SUB>2</SUB>O, CH<SUB>3</SUB>Cl, and CH<SUB>3</SUB>Br
    in exoplanet atmospheres at abundances consistent with biogenic production using a space-based mid-infrared nulling interferometric
    observatory, such as the Large Interferometer For Exoplanets (LIFE) mission concept. We use a set of scenarios derived
    from chemical kinetics models that simulate the atmospheric response of varied levels of biogenic production of N<SUB>2</SUB>O,
    CH<SUB>3</SUB>Cl, and CH<SUB>3</SUB>Br in O<SUB>2</SUB>-rich terrestrial planet atmospheres to produce forward models
    for our LIFESIM observation simulator software. In addition, we demonstrate the connection to retrievals for selected
    cases. We use the results to derive observation times needed for the detection of these scenarios and apply them to define
    science requirements for the mission. Our analysis shows that in order to detect relevant abundances with a mission like
    LIFE in its current baseline setup, we require: (i) only a few days of observation time for certain very nearby "golden
    target" scenarios, which also motivate future studies of "spectral-temporal" observations (ii) ∼10 days in certain standard
    scenarios such as temperate, terrestrial planets around M star hosts at 5 pc, (iii) ∼50─100 days in the most challenging
    but still feasible cases, such as an Earth twin at 5 pc. A few cases with very low fluxes around specific host stars are
    not detectable. In summary, the abundances of these capstone biosignatures are detectable at plausible biological production
    fluxes for most cases examined and for a significant number of potential targets.'
