- &id055
  arxiv_id: '1908.10873'
  ads_bibcode: 2019MNRAS.489..196M
  title: 'An empirical infrared transit spectrum of Earth: opacity windows and biosignatures'
  authors:
  - Macdonald, Evelyn J. R.
  - Cowan, Nicolas B.
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.1093/mnras/stz2047
  abstract: The Atmospheric Chemistry Experiment Fourier Transform Spectrometer on the SCISAT satellite has been measuring
    infrared (IR) transmission spectra of Earth during Solar occultations since 2004. We use these data to build an IR transit
    spectrum of Earth. Regions of low atmospheric opacity, known as windows, are of particular interest, as they permit observations
    of the planet's lower atmosphere. Even in the absence of clouds or refraction, imperfect transmittance leads to a minimum
    effective thickness of h<SUB>min</SUB> ≈ 4 km in the 10-12 μ m opacity window at a spectral resolution of R = 10<SUP>3</SUP>.
    None the less, at R = 10<SUP>5</SUP>, the maximum transmittance at the surface is around {70}{{{ per cent}}}. In principle,
    one can probe the troposphere of an Earth-like planet via high-dispersion transit spectroscopy in the mid-IR; in practice
    aerosols and/or refraction likely make this impossible. We simulate the transit spectrum of an Earth-like planet in the
    TRAPPIST-1 system. We find that a long-term near-IR (NIR) campaign with the James Webb Space Telescope(JWST) could readily
    detect CO<SUB>2</SUB>, establishing the presence of an atmosphere. A mid-IR campaign or longer NIR campaign would be more
    challenging, but in principle could detect H<SUB>2</SUB>O and the biosignatures O<SUB>3</SUB> and CH<SUB>4</SUB>.
  source: citation_of=2024ApJ...969...20S
