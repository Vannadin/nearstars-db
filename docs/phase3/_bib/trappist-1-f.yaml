- &id108
  arxiv_id: '2304.10683'
  ads_bibcode: 2023PSJ.....4...83C
  title: 'There''s More to Life than O<SUB>2</SUB>: Simulating the Detectability of a Range of Molecules for Ground-based,
    High-resolution Spectroscopy of Transiting Terrestrial Exoplanets'
  authors:
  - Currie, Miles H.
  - Meadows, Victoria S.
  - Rasmussen, Kaitlin C.
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.3847/PSJ/accf86
  abstract: 'Within the next decade, atmospheric O<SUB>2</SUB> on Earth-like M-dwarf planets may be accessible with visible-near-infrared
    (NIR), high-spectral-resolution, ground-based extremely large telescope (ELT) instruments. However, the prospects for
    using ELTs to detect environmental properties that provide context for O<SUB>2</SUB> have not been thoroughly explored.
    Additional molecules may help indicate planetary habitability, rule out abiotically generated O<SUB>2</SUB>, or reveal
    alternative biosignatures. To understand the accessibility of environmental context using ELT spectra, we simulate high-resolution
    transit transmission spectra of previously generated evolved terrestrial atmospheres. We consider inhabited preindustrial
    and Archean Earth-like atmospheres, and lifeless worlds with abiotic O<SUB>2</SUB> buildup from CO<SUB>2</SUB> and H<SUB>2</SUB>O
    photolysis. All atmospheres are self-consistent with M2V-M8V dwarf host stars. Our simulations include explicit treatment
    of systematic and telluric effects to model high-resolution spectra for Giant Magellan Telescope (GMT), Thirty Meter Telescope
    (TMT), and European ELT (E-ELT) configurations for systems 5 and 12 pc from Earth. Using the cross-correlation technique,
    we determine the detectability of major species in these atmospheres: O<SUB>2</SUB>, O<SUB>3</SUB>, CH<SUB>4</SUB>, CO<SUB>2</SUB>,
    CO, H<SUB>2</SUB>O, and C<SUB>2</SUB>H<SUB>6</SUB>. Our results suggest that CH<SUB>4</SUB> and CO<SUB>2</SUB> are the
    most accessible molecules for terrestrial planets transiting a range of M-dwarf hosts using an E-ELT-, TMT-, or GMT-sized
    telescope, and that the O<SUB>2</SUB> NIR and H<SUB>2</SUB>O 0.9 μm bands may also be accessible with more observation
    time. Although this technique still faces considerable challenges, the ELTs will provide access to the atmospheres of
    terrestrial planets transiting earlier-type M-dwarf hosts that may not be possible using JWST.'
  source: citation_of=2024ApJ...969...20S
