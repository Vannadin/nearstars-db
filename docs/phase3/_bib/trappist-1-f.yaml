  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-3881/ad0fe0
  abstract: 'The primary goal of the search for extraterrestrial intelligence is to gain an understanding of the prevalence
    of technologically advanced beings (organic or inorganic) in the Galaxy. One way to approach this is to look for technosignatures:
    remotely detectable indicators of technology, such as temporal or spectral electromagnetic emissions consistent with an
    artificial source. With the new Commensal Open-Source Multimode Interferometer Cluster (COSMIC) digital backend on the
    Karl G. Jansky Very Large Array (VLA), we aim to conduct a search for technosignatures that is significantly more comprehensive,
    sensitive, and efficient than previously attempted. The COSMIC system is currently operational on the VLA, recording data
    and designed with the flexibility to provide user-requested modes. This paper describes the hardware system design, the
    current software pipeline, and plans for future development.'
