  ads_bibcode: 2020A&A...643A..83W
  title: 'The Gaia-ESO Survey: Spectroscopic-asteroseismic analysis of K2 stars in Gaia-ESO. The K2 Galactic Caps Project'
  authors:
  - Worley, C. C.
  - Jofré, P.
  - Rendle, B.
