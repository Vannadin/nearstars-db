  doi: 10.3847/1538-4365/adc5e4
  abstract: We report the masses, sizes, and orbital properties of 86 planets orbiting 55 stars observed by NASA's K2 Mission
    with follow-up Doppler measurements by the HIRES spectrometer at the W. M. Keck Observatory and the Automated Planet Finder
    at Lick Observatory. Eighty-one of the planets were discovered from their transits in the K2 photometry, while five were
    found based on subsequent Doppler measurements of transiting planet-host stars. The sizes of the transiting planets range
    from Earth-size to larger than Jupiter (1─3 R<SUB>⊕</SUB> is typical), while the orbital periods range from less than
    a day to a few months. For 32 of the planets, the Doppler signal was detected with significance greater than 5σ (51 were
    detected with &gt;3σ significance). An important characteristic of this catalog is the use of uniform analysis procedures
    to determine stellar and planetary properties. This includes the transit search and fitting procedures applied to the
    K2 photometry, the Doppler fitting techniques applied to the radial velocities (RVs), and the spectral modeling to determine
    bulk stellar parameters. Such a uniform treatment will make the catalog useful for statistical studies of the masses,
    densities, and system architectures of exoplanetary systems. This work also serves as a data release for all previously
    unpublished RVs and associated stellar activity indicators obtained by our team for these systems, along with derived
    stellar and planet parameters.
