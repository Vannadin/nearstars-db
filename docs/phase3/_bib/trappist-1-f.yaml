- &id111
  arxiv_id: '2210.01669'
  ads_bibcode: 2022ApJ...937..109S
  title: 'Evaluating the Plausible Range of N<SUB>2</SUB>O Biosignatures on Exo-Earths: An Integrated Biogeochemical, Photochemical,
    and Spectral Modeling Approach'
  authors:
  - Schwieterman, Edward W.
  - Olson, Stephanie L.
  - Pidhorodetska, Daria
  - Reinhard, Christopher T.
  - Ganti, Ainsley
  - Fauchez, Thomas J.
  - Bastelberger, Sandra T.
  - Crouse, Jaime S.
  - Ridgwell, Andy
  - Lyons, Timothy W.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.3847/1538-4357/ac8cfb
  abstract: Nitrous oxide (N<SUB>2</SUB>O)-a product of microbial nitrogen metabolism-is a compelling exoplanet biosignature
    gas with distinctive spectral features in the near- and mid-infrared, and only minor abiotic sources on Earth. Previous
    investigations of N<SUB>2</SUB>O as a biosignature have examined scenarios using Earthlike N<SUB>2</SUB>O mixing ratios
    or surface fluxes, or those inferred from Earth's geologic record. However, biological fluxes of N<SUB>2</SUB>O could
    be substantially higher, due to a lack of metal catalysts or if the last step of the denitrification metabolism that yields
    N<SUB>2</SUB> from N<SUB>2</SUB>O had never evolved. Here, we use a global biogeochemical model coupled with photochemical
    and spectral models to systematically quantify the limits of plausible N<SUB>2</SUB>O abundances and spectral detectability
    for Earth analogs orbiting main-sequence (FGKM) stars. We examine N<SUB>2</SUB>O buildup over a range of oxygen conditions
    (1%-100% present atmospheric level) and N<SUB>2</SUB>O fluxes (0.01-100 teramole per year; Tmol = 10<SUP>12</SUP> mole)
    that are compatible with Earth's history. We find that N<SUB>2</SUB>O fluxes of 10 [100] Tmol yr<SUP>-1</SUP> would lead
    to maximum N<SUB>2</SUB>O abundances of ~5 [50] ppm for Earth-Sun analogs, 90 [1600] ppm for Earths around late K dwarfs,
    and 30 [300] ppm for an Earthlike TRAPPIST-1e. We simulate emission and transmission spectra for intermediate and maximum
    N<SUB>2</SUB>O concentrations that are relevant to current and future space-based telescopes. We calculate the detectability
    of N<SUB>2</SUB>O spectral features for high-flux scenarios for TRAPPIST-1e with JWST. We review potential false positives,
    including chemodenitrification and abiotic production via stellar activity, and identify key spectral and contextual discriminants
    to confirm or refute the biogenicity of the observed N<SUB>2</SUB>O.
