  title: A Mirage or an Oasis? Water Vapor in the Atmosphere of the Warm Neptune TOI-674 b
  authors:
  - Brande, Jonathan
  - Crossfield, Ian J. M.
  - Kreidberg, Laura
  - Oklopčić, Antonija
  - Polanski, Alex S.
  - Barman, Travis
