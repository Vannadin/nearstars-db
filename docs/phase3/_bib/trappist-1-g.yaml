  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.1051/0004-6361/202453163
  abstract: With a mass, radius, and mean density similar to Earth's, the rocky planet GJ 1132 b is the first truly small
    planet for which an atmosphere detection was proposed. If confirmed, ultra-reduced magma outgassing is the only mechanism
    capable of producing HCN and H<SUB>2</SUB>O in large enough quantities to match the Hubble Space Telescope observations.
    The proposed atmosphere detection, however, was challenged by reanalysis of the same HST data by different teams. Recent
    James Webb Space Telescope observations returned ambiguous results due to the unaccounted for variability seen between
    two different visits. Here we report the analysis of three CRIRES+ transit observations of GJ 1132 b in order to determine
    the presence or absence of He I, HCN, CH<SUB>4</SUB>, and H<SUB>2</SUB>O in its atmosphere. We are unable to detect the
    presence of any of these species in the atmosphere of GJ 1132 b assuming a clear, H<SUB>2</SUB>-dominated atmosphere,
    although we can place upper limits for the volume mixing ratios of CH<SUB>4</SUB>, HCN, and H<SUB>2</SUB>O using injection
    tests and atmospheric retrievals. These retrieved upper limits show the capability of CRIRES+ at detecting chemical species
    in rocky exoplanets, if the atmosphere is H<SUB>2</SUB> dominated. The detection of the atmospheres of small planets with
    high mean molecular weight, and the capability to distinguish between the variability introduced by stellar activity and/or
    the planetary atmosphere will require high-resolution spectrographs in the upcoming extremely large telescopes.
