  ads_bibcode: 2019CeMDA.131...30B
  title: Tidal evolution of the Keplerian elements
  authors:
  - Boué, Gwenaël
  - Efroimsky, Michael
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.1007/s10569-019-9908-2
  abstract: 'We address the expressions for the rates of the Keplerian orbital elements within a two-body problem perturbed
    by the tides in both partners. Formulae for these rates appeared in the literature in various forms, at times with errors.
    We reconsider, from scratch, the derivation of these rates and arrive at the Lagrange-type equations which, in some details,
    differ from the corresponding equations obtained previously by Kaula (Rev Geophys 2:661─684, 1964). We also write down
    detailed expressions for <inline-formula id="IEq1"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>a</mml:mi><mml:mo
    stretchy="false">/</mml:mo><mml:mi mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula>,
    <inline-formula id="IEq2"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>e</mml:mi><mml:mo stretchy="false">/</mml:mo><mml:mi
    mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula> and <inline-formula id="IEq3"><mml:math><mml:mrow><mml:mi
    mathvariant="normal">d</mml:mi><mml:mi>i</mml:mi><mml:mo stretchy="false">/</mml:mo><mml:mi mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula>,
    to order <inline-formula id="IEq4"><mml:math><mml:msup><mml:mi>e</mml:mi><mml:mn>4</mml:mn></mml:msup></mml:math></inline-formula>.
    They differ from Kaula''s expressions which contain a redundant factor of <inline-formula id="IEq5"><mml:math><mml:mrow><mml:mi>M</mml:mi><mml:mo
    stretchy="false">/</mml:mo><mml:mo stretchy="false">(</mml:mo><mml:mi>M</mml:mi><mml:mo>+</mml:mo><mml:msup><mml:mi>M</mml:mi><mml:mrow><mml:mspace
    width="0.166667em"></mml:mspace><mml:mo>''</mml:mo></mml:mrow></mml:msup><mml:mo stretchy="false">)</mml:mo></mml:mrow></mml:math></inline-formula>,
    with M and <inline-formula id="IEq6"><mml:math><mml:msup><mml:mi>M</mml:mi><mml:mrow><mml:mspace width="0.166667em"></mml:mspace><mml:mo>''</mml:mo></mml:mrow></mml:msup></mml:math></inline-formula>
    being the masses of the primary and the secondary. As Kaula was interested in the Earth─Moon system, this redundant factor
    was close to unity and was unimportant in his developments. This factor, however, must be removed when Kaula''s theory
    is applied to a binary composed of partners of comparable masses. We have found that while it is legitimate to simply
    sum the primary''s and secondary''s inputs in <inline-formula id="IEq7"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>a</mml:mi><mml:mo
    stretchy="false">/</mml:mo><mml:mi mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula>
    or <inline-formula id="IEq8"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>e</mml:mi><mml:mo stretchy="false">/</mml:mo><mml:mi
    mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula>, this is not the case for <inline-formula
    id="IEq9"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>i</mml:mi><mml:mo stretchy="false">/</mml:mo><mml:mi
    mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula>. So our expression for <inline-formula
    id="IEq10"><mml:math><mml:mrow><mml:mi mathvariant="normal">d</mml:mi><mml:mi>i</mml:mi><mml:mo stretchy="false">/</mml:mo><mml:mi
    mathvariant="normal">d</mml:mi><mml:mi>t</mml:mi></mml:mrow></mml:math></inline-formula> differs from that of Kaula in
    two regards. First, the contribution due to the dissipation in the secondary averages out when the apsidal precession
    is uniform. Second, we have obtained an additional term which emerges owing to the conservation of the angular momentum:
    a change in the inclination of the orbit causes a change of the primary''s plane of equator.'
