  doi: 10.1088/0004-637X/800/2/99
  abstract: We present an investigation of 12 candidate transiting planets from Kepler with orbital periods ranging from 34
    to 207 days, selected from initial indications that they are small and potentially in the habitable zone (HZ) of their
    parent stars. Few of these objects are known. The expected Doppler signals are too small to confirm them by demonstrating
    that their masses are in the planetary regime. Here we verify their planetary nature by validating them statistically
    using the BLENDER technique, which simulates large numbers of false positives and compares the resulting light curves
    with the Kepler photometry. This analysis was supplemented with new follow-up observations (high-resolution optical and
    near-infrared spectroscopy, adaptive optics imaging, and speckle interferometry), as well as an analysis of the flux centroids.
    For 11 of them (KOI-0571.05, 1422.04, 1422.05, 2529.02, 3255.01, 3284.01, 4005.01, 4087.01, 4622.01, 4742.01, and 4745.01)
    we show that the likelihood they are true planets is far greater than that of a false positive, to a confidence level
    of 99.73% (3σ) or higher. For KOI-4427.01 the confidence level is about 99.2% (2.6σ). With our accurate characterization
    of the GKM host stars, the derived planetary radii range from 1.1 to 2.7 R <SUB>⊕</SUB>. All 12 objects are confirmed
    to be in the HZ, and nine are small enough to be rocky. Excluding three of them that have been previously validated by
    others, our study doubles the number of known rocky planets in the HZ. KOI-3284.01 (Kepler-438b) and KOI-4742.01 (Kepler-442b)
    are the planets most similar to the Earth discovered to date when considering their size and incident flux jointly.
