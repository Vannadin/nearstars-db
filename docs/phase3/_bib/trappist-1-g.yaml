  arxiv_id: '1611.03495'
  ads_bibcode: 2017A&A...598L...7K
  title: Proxima's orbit around α Centauri
  authors:
  - Kervella, P.
  - Thévenin, F.
  - Lovis, C.
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.1051/0004-6361/201629930
  abstract: Proxima and α Centauri AB have almost identical distances and proper motions with respect to the Sun. Although
    the probability of such similar parameters is, in principle, very low, the question as to whether they actually form a
    single gravitationally bound triple system has been open since the discovery of Proxima one century ago. Owing to HARPS
    high-precision absolute radial velocity measurements and the recent revision of the parameters of the α Cen pair, we show
    that Proxima and α Cen are gravitationally bound with a high degree of confidence. The orbital period of Proxima is ≈
    550 000 yr. With an eccentricity of 0.50<SUP>+0.08</SUP><SUB>-0.09</SUB>, Proxima comes within 4.3<SUP>+1.1</SUP><SUB>-0.9</SUB>
    kau of α Cen at periastron, and is currently close to apastron (13.0<SUP>+0.3</SUP><SUB>-0.1</SUB> kau). This orbital
    motion may have influenced the formation or evolution of the recently discovered planet orbiting Proxima, as well as circumbinary
    planet formation around α Cen. <P />Based on observations collected at the European Organisation for Astronomical Research
    in the Southern Hemisphere under ESO programs 072.C-0488(E), 082.C-0718(B), 183.C-0437(A), 191.C-0505(A) and 096.C-0082(A).
