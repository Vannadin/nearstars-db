- &id072
  arxiv_id: '1908.04166'
  ads_bibcode: 2019A&A...631A...7C
  title: 'Pebbles versus planetesimals: the case of Trappist-1'
  authors:
  - Coleman, G. A. L.
  - Leleu, A.
  - Alibert, Y.
  - Benz, W.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1051/0004-6361/201935922
  abstract: We present a study into the formation of planetary systems around low mass stars similar to Trappist-1, through
    the accretion of either planetesimals or pebbles. The aim is to determine if the currently observed systems around low
    mass stars could favour one scenario over the other. To determine these differences, we ran numerous N-body simulations,
    coupled to a thermally evolving viscous 1D disc model, and including prescriptions for planet migration, photoevaporation,
    and pebble and planetesimal dynamics. We mainly examine the differences between the pebble and planetesimal accretion
    scenarios, but we also look at the influences of disc mass, size of planetesimals, and the percentage of solids locked
    up within pebbles. When comparing the resulting planetary systems to Trappist-1, we find that a wide range of initial
    conditions for both the pebble and planetesimal accretion scenarios can form planetary systems similar to Trappist-1,
    in terms of planet mass, periods, and resonant configurations. Typically these planets formed exterior to the water iceline
    and migrated in resonant convoys into the inner region close to the central star. When comparing the planetary systems
    formed through pebble accretion to those formed through planetesimal accretion, we find a large number of similarities,
    including average planet masses, eccentricities, inclinations, and period ratios. One major difference between the two
    scenarios was that of the water content of the planets. When including the effects of ablation and full recycling of the
    planets' envelope with the disc, the planets formed through pebble accretion were extremely dry, whilst those formed through
    planetesimal accretion were extremely wet. If the water content is not fully recycled and instead falls to the planets'
    core, or if ablation of the water is neglected, then the planets formed through pebble accretion are extremely wet, similar
    to those formed through planetesimal accretion. Should the water content of the Trappist-1 planets be determined accurately,
    this could point to a preferred formation pathway for planetary systems, or to specific physics that may be at play.
  source: citation_of=2025A&A...693A.303C
