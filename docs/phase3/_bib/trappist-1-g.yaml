  arxiv_id: '2002.07188'
  ads_bibcode: 2020ApJ...891..132C
  title: How Efficient Is the Streaming Instability in Viscous Protoplanetary Disks?
  authors:
  - Chen, Kan
  - Lin, Min-Kai
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.3847/1538-4357/ab76ca
  abstract: The streaming instability is a popular candidate for planetesimal formation by concentrating dust particles to
    trigger gravitational collapse. However, its robustness against the physical conditions expected in protoplanetary disks
    is unclear. In particular, particle stirring by turbulence may impede the instability. To quantify this effect, we develop
    the linear theory of the streaming instability with external turbulence modeled by gas viscosity and particle diffusion.
    We find the streaming instability is sensitive to turbulence, with growth rates becoming negligible for alpha viscosity
    parameters α ≳ St<SUP>1.5</SUP>, where St is the particle Stokes number. We explore the effect of nonlinear drag laws,
    which may be applicable to porous dust particles, and find growth rates are modestly reduced. We also find that gas compressibility
    increases growth rates by reducing the effect of diffusion. We then apply the linear theory to global models of viscous
    protoplanetary disks. For minimum-mass solar nebula disk models, we find the streaming instability only grows within disk
    lifetimes beyond tens of astronomical units, even for centimeter-sized particles and weak turbulence (α ∼ 10<SUP>-4</SUP>).
    Our results suggest it is rather difficult to trigger the streaming instability in nonlaminar protoplanetary disks, especially
    for small particles.
  source: citation_of=2021ApJ...907...81L
