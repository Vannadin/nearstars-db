  abstract: We present the discovery of two planets orbiting the nearby (D = 11.9 pc) K7 dwarf Gl 414A. Gl 414A b is a sub-Neptune
    mass planet with ${M}_{b}\sin {i}_{b}={7.60}_{-2.19}^{+2.44}$ M<SUB>⊕</SUB> and a semimajor axis of 0.23 ± 0.01 au. Gl
    414A c is a sub-Saturn mass planet with ${M}_{c}\sin {i}_{c}={53.83}_{-8.58}^{+9.18}$ M<SUB>⊕</SUB> and a semimajor axis
    of 1.43 ± 0.06 au. We jointly analyzed radial velocity data from Keck/HIRES and the Automated Planet Finder at Lick Observatory,
    as well as photometric data from KELT, to detect the two planets and two additional signals related to the rotationally
    modulated activity and the long-term magnetic activity cycle of the star. The outer planet in this system may be a potential
    candidate for future direct-imaging missions.
