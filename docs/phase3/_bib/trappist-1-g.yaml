- &id571
  arxiv_id: null
  ads_bibcode: 2014PNAS..11112628M
  title: Requirements and limits for life in the context of exoplanets
  authors:
  - McKay, Christopher P.
  year: '2014'
  pubdate: '2014-09-00'
  doi: 10.1073/pnas.1304212111
  abstract: The requirements for life on Earth, its elemental composition, and its environmental limits provide a way to assess
    the habitability of exoplanets. Temperature is key both because of its influence on liquid water and because it can be
    directly estimated from orbital and climate models of exoplanetary systems. Life can grow and reproduce at temperatures
    as low as -15 °C, and as high as 122 °C. Studies of life in extreme deserts show that on a dry world, even a small amount
    of rain, fog, snow, and even atmospheric humidity can be adequate for photosynthetic production producing a small but
    detectable microbial community. Life is able to use light at levels less than 10<SUP>-5</SUP> of the solar flux at Earth.
    UV or ionizing radiation can be tolerated by many microorganisms at very high levels and is unlikely to be life limiting
    on an exoplanet. Biologically available nitrogen may limit habitability. Levels of O<SUB>2</SUB> over a few percent on
    an exoplanet would be consistent with the presence of multicellular organisms and high levels of O<SUB>2</SUB> on Earth-like
    worlds indicate oxygenic photosynthesis. Other factors such as pH and salinity are likely to vary and not limit life over
    an entire planet or moon.
