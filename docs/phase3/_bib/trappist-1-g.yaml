  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.3847/1538-4365/aaa07a
  abstract: Despite being one of the weakest dimers in nature, low-spectral-resolution Voyager/IRIS observations revealed
    the presence of (H<SUB>2</SUB>)<SUB>2</SUB> dimers on Jupiter and Saturn in the 1980s. However, the collision-induced
    H<SUB>2</SUB>-H<SUB>2</SUB> opacity databases widely used in planetary science have thus far only included free-to-free
    transitions and have neglected the contributions of dimers. Dimer spectra have both fine-scale structure near the S(0)
    and S(1) quadrupole lines (354 and 587 cm<SUP>-1</SUP>, respectively), and broad continuum absorption contributions up
    to ±50 cm<SUP>-1</SUP> from the line centers. We develop a new ab initio model for the free-to-bound, bound-to-free, and
    bound-to-bound transitions of the hydrogen dimer for a range of temperatures (40-400 K) and para-hydrogen fractions (0.25-1.0).
    The model is validated against low-temperature laboratory experiments, and used to simulate the spectra of the giant planets.
    The new collision-induced opacity database permits high-resolution (0.5-1.0 cm<SUP>-1</SUP>) spectral modeling of dimer
    spectra near S(0) and S(1) in both Cassini Composite Infrared Spectrometer observations of Jupiter and Saturn, and in
    Spitzer Infrared Spectrometer (IRS) observations of Uranus and Neptune for the first time. Furthermore, the model reproduces
    the dimer signatures observed in Voyager/IRIS data near S(0) on Jupiter and Saturn, and generally lowers the amount of
    para-H<SUB>2</SUB> (and the extent of disequilibrium) required to reproduce IRIS observations.
