  abstract: We present results from the Weather on Other Worlds Spitzer Exploration Science program to investigate photometric
    variability in L and T dwarfs, usually attributed to patchy clouds. We surveyed 44 L3-T8 dwarfs, spanning a range of J
    - K<SUB>s</SUB> colors and surface gravities. We find that 14/23 (61%<SUB>-20%</SUB><SUP>+17%</SUP>, 95% confidence) of
    our single L3-L9.5 dwarfs are variable with peak-to-peak amplitudes between 0.2% and 1.5%, and 5/16 (31%<SUB>-17%</SUB><SUP>+25%</SUP>)
    of our single T0-T8 dwarfs are variable with amplitudes between 0.8% and 4.6%. After correcting for sensitivity, we find
    that 80%<SUB>-27%</SUB><SUP>+20%</SUP> of L dwarfs vary by &gt;=0.2%, and 36%<SUB>-17%</SUB><SUP>+26%</SUP> of T dwarfs
    vary by &gt;=0.4%. Given viewing geometry considerations, we conclude that photospheric heterogeneities causing &gt;0.2%
    3-5 μm flux variations are present on virtually all L dwarfs, and probably on most T dwarfs. A third of L dwarf variables
    show irregular light curves, indicating that L dwarfs may have multiple spots that evolve over a single rotation. Also,
    approximately a third of the periodicities are on timescales &gt;10 hr, suggesting that slowly rotating brown dwarfs may
    be common. We observe an increase in the maximum amplitudes over the entire spectral type range, revealing a potential
    for greater temperature contrasts in T dwarfs than in L dwarfs. We find a tentative association (92% confidence) between
    low surface gravity and high-amplitude variability among L3-L5.5 dwarfs. Although we can not confirm whether lower gravity
    is also correlated with a higher incidence of variables, the result is promising for the characterization of directly
    imaged young extrasolar planets through variability.
