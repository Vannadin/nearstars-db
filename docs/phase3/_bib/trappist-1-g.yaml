  abstract: We report the discovery of HN Lib b, a sub-Neptunian mass planet orbiting the nearby (d ≈ = 6.25 pc) M4.0 V star
    HN Lib detected by our CARMENES radial-velocity (RV) survey. We determined a planetary minimum mass of M<SUB>b</SUB> sin
    i = 5.46 ± 0.75 M<SUB>⊕</SUB> and an orbital period of P<SUB>b</SUB> = 36.116 ± 0.029 d, using ~5 yr of CARMENES data,
    as well as archival RVs from HARPS and HIRES spanning more than 13 yr. The flux received by the planet equals half the
    instellation on Earth, which places it in the middle of the conservative habitable zone (HZ) of its host star. The RV
    data show evidence for another planet candidate with M<SUB>[c]</SUB> sin i = 9.7 ± 1.9 M<SUB>⊕</SUB> and P<SUB>[c]</SUB>
    = 113.46 ± 0.20 d. The long-term stability of the signal and the fact that the best model for our data is a two-planet
    model with an independent activity component stand as strong arguments for establishing a planetary origin. However, we
    cannot rule out stellar activity due to its proximity to the rotation period of HN Lib, which we measured using CARMENES
