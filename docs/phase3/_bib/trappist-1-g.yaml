  title: UV habitable zones around M stars
  authors:
  - Buccino, Andrea P.
  - Lemarchand, Guillermo A.
  - Mauas, Pablo J. D.
  year: '2007'
  pubdate: '2007-12-00'
  doi: 10.1016/j.icarus.2007.08.012
  abstract: During the last decade there was a change in paradigm, which led to consider that terrestrial-type planets within
    liquid-water habitable zones (LW-HZ) around M stars can also be suitable places for the emergence and evolution of life.
    Since many dMe stars emit large amount of UV radiation during flares, in this work we analyze the UV constrains for living
    systems on Earth-like planets around dM stars. We apply our model of UV habitable zone (UV-HZ; Buccino, A.P., Lemarchand,
    G.A., Mauas, P.J.D., 2006. Icarus 183, 491-503) to the three planetary systems around dM stars (HIP 74995, HIP 109388
    and HIP 113020) observed by IUE and to two M-flare stars (AD Leo and EV Lac). In particular, HIP 74995 hosts a terrestrial
    planet in the LW-HZ, which is the exoplanet that most resembles our own Earth. We show, in general, that during the quiescent
    state there would not be enough UV radiation within the LW-HZ to trigger the biogenic processes and that this energy could
    be provided by flares of moderate intensity, while strong flares do not necessarily rule-out the possibility of life-bearing
    planets.
