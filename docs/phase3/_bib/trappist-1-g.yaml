  abstract: We measure the starspot radii and latitude distribution on the K4 dwarf HAT-P-11 from Kepler short-cadence photometry.
    We take advantage of starspot occultations by HAT-P-11’s highly misaligned planet to compare the spot size and latitude
    distributions to those of sunspots. We find that HAT-P-11’s spots are distributed in latitude much like sunspots near
    the solar activity maximum, with a mean spot latitude of ≈16° ± 1°. The majority of HAT-P-11’s starspots have physical
    sizes that closely resemble the sizes of sunspots at solar maximum. We estimate the mean spotted area coverage on HAT-P-11
