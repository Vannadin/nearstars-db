- arxiv_id: '2409.09666'
  ads_bibcode: 2024arXiv240909666P
  title: Classifications for Exoplanet and Exoplanetary Systems -- Could it be developed? I. Exoplanet classification
  authors:
  - Plávalová, E.
  - Rosaev, A.
  year: '2024'
  pubdate: '2024-09-00'
  doi: 10.48550/arXiv.2409.09666
  abstract: 'When a star is described as a spectral class G2V, we know its approximate mass, temperature, age, and size. At
    more than 5,700 exoplanets discovered, it is a natural developmental step to establish a classification for them, such
    as for example, the Harvard classification for stars. This exoplanet classification has to be easily interpreted and present
    the most relevant information about them and divides them into groups based on certain characteristics. We propose an
    exoplanet classification, which using an easily readable code, may inform you about a exoplanet''s main characteristics.
    The suggested classification code contains four parameters by which we can quickly determine the range of temperature,
    mass, density and their eccentricity. The first parameter concerns the mass of an exoplanet in the form of the units of
    the mass of other known planets, where e.g. M represents the mass of Mercury, E that of Earth, N Neptune, or J Jupiter.
    The second parameter is the mean Dyson temperature of the extoplanet''s orbit, for which we established four main classes:
    F represents the Frozen class, W the Water class, G the Gaseous class, and R the Roaster class. The third parameter is
    eccentricity and the fourth parameter is surface attribute which is defined as the bulk density of the exoplanet, where
    g represents a gaseous planet, w - water planet, t - terrestrial planet, i - iron planet and s - super dense planet. The
    classification code for Venus, could be EG0t (E - mass in the range of the mass of the Earth, G - Gaseous class, temperature
    in the range from 450 to 1000 K, 0 - circular or nearly circular orbit, t - terrestrial surface), for Earth it could be
    EW0t (W - Water class - a possible Habitable zone). This classification is very helpful in, for example, quickly delimiting
    if a planet can be found in the Habitable zone; if it is terrestrial or not.'
