  arxiv_id: '1407.7516'
  ads_bibcode: 2014A&A...570A..54L
  title: Asteroseismic inference on the spin-orbit misalignment and stellar parameters of HAT-P-7
  authors:
  - Lund, Mikkel N.
  - Lundkvist, Mia
  - Silva Aguirre, Victor
  - Houdek, Günter
  - Casagrande, Luca
  - Van Eylen, Vincent
  - Campante, Tiago L.
  - Karoff, Christoffer
  - Kjeldsen, Hans
  - Albrecht, Simon
  - Chaplin, William J.
  - Nielsen, Martin Bo
  - Degroote, Pieter
  - Davies, Guy R.
  - Handberg, Rasmus
  year: '2014'
  pubdate: '2014-10-00'
  doi: 10.1051/0004-6361/201424326
  abstract: 'Context. The measurement of obliquities - the angle between the orbital and stellar rotation - in star-planet
    systems is of great importance for understanding planet system formation and evolution. The bright and well-studied HAT-P-7
    (Kepler-2) system is intriguing because several Rossiter-McLaughlin (RM) measurements found a high projected obliquity
    in this system, but it was not possible so far to determine whether the orbit is polar and/or retrograde. <BR /> Aims:
    The goal of this study is to measure the stellar inclination and hereby the full 3D obliquity of the HAT-P-7 system instead
    of only the 2D projection as measured by the RM effect. In addition, we provide an updated set of stellar parameters for
    the star. <BR /> Methods: We used the full set of available observations from Kepler spanning Q0-Q17 to produce the power
    spectrum of HAT-P-7. We extracted oscillation-mode frequencies via an Markov chain Monte Carlo peak-bagging routine and
    used the results from this to estimate the stellar inclination angle. Combining this with the projected obliquity from
    RM and the inclination of the orbital plane allowed us to determine the stellar obliquity. Furthermore, we used asteroseismology
    to model the star from the extracted frequencies using two different approaches to the modelling, for which either the
    stellar evolution codes MESA or GARSTEC were adopted. <BR /> Results: Our updated asteroseismic modelling shows, i.a.,
    the following stellar parameters for HAT-P-7: M<SUB>⋆</SUB> = 1.51<SUP>+ 0.04</SUP><SUB>-0.05</SUB> M<SUB>☉</SUB>, R<SUB>⋆</SUB>
    = 2.00<SUP>+ 0.01</SUP><SUB>-0.02</SUB> R<SUB>☉</SUB>, and age = 2.07<SUP>+ 0.28</SUP><SUB>-0.23</SUB> Gyr. The modelling
    offers a high precision on the stellar parameters, the uncertainty on age, for instance, is of the order ∼ 11%. For the
    stellar inclination we estimate i<SUB>⋆</SUB>&lt; 36.5<SUP>°</SUP>, which translates into an obliquity of 83<SUP>°</SUP>&lt;ψ&lt;
    111<SUP>°</SUP>. The planet HAT-P-7b is likely retrograde in its orbit, and the orbit is close to being polar. The new
    parameters for the star give an updated planetary density of ρ<SUB>p</SUB> = 0.65 ± 0.03 g cm<SUP>-3</SUP>, which is lower
    than previous estimates. <P />Appendices are available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201424326/olm">http://www.aanda.org</A>'
  source: citation_of=2018AJ....156...91M
