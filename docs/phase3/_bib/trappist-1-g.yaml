  arxiv_id: '2008.02811'
  ads_bibcode: 2020AJ....160..149D
  title: Multiple Explanations for the Single Transit of KIC 5951458 Based on Radial Velocity Measurements Extracted with
    a Novel Matched-template Technique
  authors:
  - Dalba, Paul A.
  - Fulton, Benjamin
  - Isaacson, Howard
  - Kane, Stephen R.
  - Howard, Andrew W.
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.3847/1538-3881/abad27
  abstract: Planetary systems that show single-transit events are a critical pathway to increasing the yield of long-period
    exoplanets from transit surveys. From the primary Kepler mission, KIC 5951458 b (Kepler-456b) was thought to be a single-transit
    giant planet with an orbital period of 1310 days. However, radial velocity (RV) observations of KIC 5951458 from the HIRES
    instrument on the Keck telescope suggest that the system is far more complicated. To extract precise RVs for this $V\approx
    13$ star, we develop a novel matched-template technique that takes advantage of a broad library of template spectra acquired
    with HIRES. We validate this technique and measure its noise floor to be 4-8 m s<SUP>-1</SUP> (in addition to internal
    RV error) for most stars that would be targeted for precision RVs. For KIC 5951458, we detect a long-term RV trend that
    suggests the existence of a stellar companion with an orbital period greater than a few thousand days. We also detect
    an additional signal in the RVs that is possibly caused by a planetary or brown dwarf companion with mass in the range
    of 0.6-82 M<SUB>Jup</SUB> and orbital period below a few thousand days. Curiously, from just the data on hand, it is not
    possible to determine which object caused the single "transit" event. We demonstrate how a modest set of RVs allows us
    to update the properties of this unusual system and predict the optimal timing for future observations. <SUP>∗</SUP> Some
    of the data presented herein were obtained at the W. M. Keck Observatory, which is operated as a scientific partnership
    among the California Institute of Technology, the University of California, and the National Aeronautics and Space Administration.
    The Observatory was made possible by the generous financial support of the W. M. Keck Foundation.
