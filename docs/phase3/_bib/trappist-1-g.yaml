  ads_bibcode: 2015ApJ...809...57R
  title: Effect of UV Radiation on the Spectral Fingerprints of Earth-like Planets Orbiting M Stars
  authors:
  - Rugheimer, S.
  - Kaltenegger, L.
  - Segura, A.
  - Linsky, J.
  - Mohanty, S.
  year: '2015'
  pubdate: '2015-08-00'
  doi: 10.1088/0004-637X/809/1/57
  abstract: We model the atmospheres and spectra of Earth-like planets orbiting the entire grid of M dwarfs for active and
    inactive stellar models with T<SUB>eff</SUB> = 2300 K to T<SUB>eff</SUB> = 3800 K and for six observed MUSCLES M dwarfs
    with UV radiation data. We set the Earth-like planets at the 1 AU equivalent distance and show spectra from the visible
    to IR (0.4-20 μm) to compare detectability of features in different wavelength ranges with the James Webb Space Telescope
    and other future ground- and spaced-based missions to characterize exo-Earths. We focus on the effect of UV activity levels
    on detectable atmospheric features that indicate habitability on Earth, namely, H<SUB>2</SUB>O, O<SUB>3</SUB>, CH<SUB>4</SUB>,
    N<SUB>2</SUB>O, and CH<SUB>3</SUB>Cl. To observe signatures of life—O<SUB>2</SUB>/O<SUB>3</SUB> in combination with reducing
    species like CH<SUB>4</SUB>—we find that early and active M dwarfs are the best targets of the M star grid for future
    telescopes. The O<SUB>2</SUB> spectral feature at 0.76 μm is increasingly difficult to detect in reflected light of later
    M dwarfs owing to low stellar flux in that wavelength region. N<SUB>2</SUB>O, another biosignature detectable in the IR,
    builds up to observable concentrations in our planetary models around M dwarfs with low UV flux. CH<SUB>3</SUB>Cl could
    become detectable, depending on the depth of the overlapping N<SUB>2</SUB>O feature. We present a spectral database of
    Earth-like planets around cool stars for directly imaged planets as a framework for interpreting future light curves,
    direct imaging, and secondary eclipse measurements of the atmospheres of terrestrial planets in the habitable zone to
    design and assess future telescope capabilities.
