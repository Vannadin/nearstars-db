  doi: 10.1051/0004-6361/202243940
  abstract: 'Context. We present the third data release of the European Space Agency''s Gaia mission, Gaia DR3. This release
    includes a large variety of new data products, notably a much expanded radial velocity survey and a very extensive astrophysical
    characterisation of Gaia sources. <BR /> Aims: We outline the content and the properties of Gaia DR3, providing an overview
    of the main improvements in the data processing in comparison with previous data releases (where applicable) and a brief
    discussion of the limitations of the data in this release. <BR /> Methods: The Gaia DR3 catalogue is the outcome of the
    processing of raw data collected with the Gaia instruments during the first 34 months of the mission by the Gaia Data
    Processing and Analysis Consortium. <BR /> Results: The Gaia DR3 catalogue contains the same source list, celestial positions,
    proper motions, parallaxes, and broad band photometry in the G, G<SUB>BP</SUB>, and G<SUB>RP</SUB> pass-bands already
    present in the Early Third Data Release, Gaia EDR3. Gaia DR3 introduces an impressive wealth of new data products. More
    than 33 million objects in the ranges G<SUB>RVS</SUB> &lt; 14 and 3100 &lt; T<SUB>eff</SUB> &lt; 14 500, have new determinations
    of their mean radial velocities based on data collected by Gaia. We provide G<SUB>RVS</SUB> magnitudes for most sources
    with radial velocities, and a line broadening parameter is listed for a subset of these. Mean Gaia spectra are made available
    to the community. The Gaia DR3 catalogue includes about 1 million mean spectra from the radial velocity spectrometer,
    and about 220 million low-resolution blue and red prism photometer BP/RP mean spectra. The results of the analysis of
    epoch photometry are provided for some 10 million sources across 24 variability types. Gaia DR3 includes astrophysical
    parameters and source class probabilities for about 470 million and 1500 million sources, respectively, including stars,
    galaxies, and quasars. Orbital elements and trend parameters are provided for some 800 000 astrometric, spectroscopic
    and eclipsing binaries. More than 150 000 Solar System objects, including new discoveries, with preliminary orbital solutions
    and individual epoch observations are part of this release. Reflectance spectra derived from the epoch BP/RP spectral
    data are published for about 60 000 asteroids. Finally, an additional data set is provided, namely the Gaia Andromeda
    Photometric Survey, consisting of the photometric time series for all sources located in a 5.5 degree radius field centred
    on the Andromeda galaxy. <BR /> Conclusions: This data release represents a major advance with respect to Gaia DR2 and
    Gaia EDR3 because of the unprecedented quantity, quality, and variety of source astrophysical data. To date this is the
    largest collection of all-sky spectrophotometry, radial velocities, variables, and astrophysical parameters derived from
    both low- and high-resolution spectra and includes a spectrophotometric and dynamical survey of SSOs of the highest accuracy.
    The non-single star content surpasses the existing data by orders of magnitude. The quasar host and galaxy light profile
    collection is the first such survey that is all sky and space based. The astrophysical information provided in Gaia DR3
    will unleash the full potential of Gaia''s exquisite astrometric, photometric, and radial velocity surveys.'
