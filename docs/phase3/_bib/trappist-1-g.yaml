- &id328
  arxiv_id: '1805.02801'
  ads_bibcode: 2018ApJ...858...72R
  title: A Methane Extension to the Classical Habitable Zone
  authors:
  - Ramirez, Ramses M.
  - Kaltenegger, Lisa
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-4357/aab8fa
  abstract: The habitable zone (HZ) is the circumstellar region where standing bodies of liquid water could exist on the surface
    of a rocky planet. Conventional definitions assume that CO<SUB>2</SUB> and H<SUB>2</SUB>O are the only greenhouse gases.
    The outer edge of this classical N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O HZ extends out to nearly ∼1.7 au in our solar
    system, beyond which condensation and scattering by CO<SUB>2</SUB> outstrip its greenhouse capacity. We use a single-column
    radiative-convective climate model to assess the greenhouse effect of CH<SUB>4</SUB> (10-∼100,000 ppm) on the classical
    HZ (N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O) for main-sequence stars with stellar temperatures between 2600 and 10,000
    K (∼A3 to M8). Assuming N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O atmospheres, previous studies have shown that cooler
    stars heat terrestrial planets more effectively. However, we find that the addition of CH<SUB>4</SUB> produces net greenhouse
    warming (tens of degrees) in planets orbiting stars hotter than a mid-K (∼4500 K), whereas a prominent anti-greenhouse
    effect is noted for planets around cooler stars. We show that 10% CH<SUB>4</SUB> can increase the outer edge distance
    of the hottest stars (T <SUB>EFF</SUB> = 10,000 K) by over 20%. In contrast, the CH<SUB>4</SUB> anti-greenhouse can shrink
    the HZ for the coolest stars (T <SUB>EFF</SUB> = 2600 K) by a similar percentage. We find that dense CO<SUB>2</SUB>-CH<SUB>4</SUB>
    atmospheres near the outer edge of hotter stars may suggest inhabitance, highlighting the importance of including secondary
    greenhouse gases in alternative definitions of the HZ. We parameterize the limits of this N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O-CH<SUB>4</SUB>
    HZ and discuss implications in the search for extraterrestrial life.
