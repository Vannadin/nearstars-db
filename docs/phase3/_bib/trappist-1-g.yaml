- &id515
  arxiv_id: '1709.01219'
  ads_bibcode: 2017ApJ...847L...4D
  title: The Dehydration of Water Worlds via Atmospheric Losses
  authors:
  - Dong, Chuanfei
  - Huang, Zhenguang
  - Lingam, Manasvi
  - Tóth, Gábor
  - Gombosi, Tamas
  - Bhattacharjee, Amitava
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.3847/2041-8213/aa8a60
  abstract: 'We present a three-species multi-fluid magnetohydrodynamic model (H<SUP>+</SUP>, H<SUB>2</SUB>O<SUP>+</SUP>,
    and e <SUP>-</SUP>), endowed with the requisite atmospheric chemistry, that is capable of accurately quantifying the magnitude
    of water ion losses from exoplanets. We apply this model to a water world with Earth-like parameters orbiting a Sun-like
    star for three cases: (I) current normal solar wind conditions, (II) ancient normal solar wind conditions, and (III) one
    extreme “Carrington-type” space weather event. We demonstrate that the ion escape rate for (II), with a value of 6.0 ×
    10<SUP>26</SUP> s<SUP>-1</SUP>, is about an order of magnitude higher than the corresponding value of 6.7 × 10<SUP>25</SUP>
    s<SUP>-1</SUP> for (I). Studies of ion losses induced by space weather events, where the ion escape rates can reach ∼10<SUP>28</SUP>
    s<SUP>-1</SUP>, are crucial for understanding how an active, early solar-type star (e.g., with frequent coronal mass ejections)
    could have accelerated the depletion of the exoplanet’s atmosphere. We briefly explore the ramifications arising from
    the loss of water ions, especially for planets orbiting M-dwarfs where such effects are likely to be significant.'
