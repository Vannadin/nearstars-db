  arxiv_id: '2003.05354'
  ads_bibcode: 2020MNRAS.494.1490Z
  title: Atmospheric compositions and observability of nitrogen-dominated ultra-short-period super-Earths
  authors:
  - Zilinskas, Mantas
  - Miguel, Yamila
  - Mollière, Paul
  - Tsai, Shang-Min
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1093/mnras/staa724
  abstract: We explore the chemistry and observability of nitrogen-dominated atmospheres for ultra-short-period super-Earths.
    We base the assumption that super-Earths could have nitrogen-filled atmospheres on observations of 55 Cancri e that favour
    a scenario with a high-mean-molecular-weight atmosphere. We take Titan's elemental budget as our starting point and using
    chemical kinetics compute a large range of possible compositions for a hot super-Earth. We use analytical temperature
    profiles and explore a parameter space spanning orders of magnitude in C/O and N/O ratios, while always keeping nitrogen
    the dominant component. We generate synthetic transmission and emission spectra and assess their potential observability
    with the future James Webb Space Telescope (JWST) and ARIEL. Our results suggest that HCN is a strong indicator of a high
    C/O ratio, which is similar to what is found for H-dominated atmospheres. We find that these worlds are likely to possess
    C/O &gt; 1.0, and that HCN, CN, and CO should be the primary molecules to be searched for in thermal emission. For lower
    temperatures (T &lt; 1500 K), we additionally find NH<SUB>3</SUB> in high N/O ratio cases, and C<SUB>2</SUB>H<SUB>4</SUB>
    and CH<SUB>4</SUB> in low N/O ratio cases to be strong absorbers. Depletion of hydrogen in such atmospheres would make
    CN, CO, and NO exceptionally prominent molecules to look for in the 0.6-5.0 μm range. Our models show that the upcoming
    JWST and ARIEL missions will be able to distinguish atmospheric compositions of ultra-short-period super-Earths with unprecedented
    confidence.
