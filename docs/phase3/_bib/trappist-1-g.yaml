  title: Rayleigh Scattering in the Atmosphere of the Warm Exo-Neptune GJ 3470b
  authors:
  - Dragomir, Diana
  - Benneke, Björn
  - Pearson, Kyle A.
  - Crossfield, Ian J. M.
  - Eastman, Jason
  - Barman, Travis
  - Biddle, Lauren I.
  year: '2015'
  pubdate: '2015-12-00'
  doi: 10.1088/0004-637X/814/2/102
  abstract: GJ 3470b is a warm Neptune-size planet transiting an M dwarf star. Like the handful of other small exoplanets
    for which transmission spectroscopy has been obtained, GJ 3470b exhibits a flat spectrum in the near- and mid-infrared.
    Recently, a tentative detection of Rayleigh scattering in its atmosphere has been reported. This signal manifests itself
    as an observed increase of the planetary radius as a function of decreasing wavelength in the visible. We set out to verify
    this detection and observed several transits of this planet with the LCOGT network and the Kuiper telescope in four different
    bands (Sloan g, Sloan i, Harris B, and Harris V). Our analysis reveals a strong Rayleigh scattering slope, thus confirming
    previous results. This makes GJ 3470b the smallest known exoplanet with a detection of Rayleigh scattering. We find that
    the most plausible scenario is a hydrogen/helium-dominated atmosphere covered by clouds which obscure absorption features
    in the infrared and hazes which give rise to scattering in the visible. Our results demonstrate the feasibility of exoplanet
    atmospheric characterization from the ground, even with meter-class telescopes.
