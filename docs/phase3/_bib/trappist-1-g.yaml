  arxiv_id: '1804.07377'
  ads_bibcode: 2018AJ....155..265H
  title: 'The Solar Neighborhood XLIV: RECONS Discoveries within 10 parsecs'
  authors:
  - Henry, Todd J.
  - Jao, Wei-Chun
  - Winters, Jennifer G.
  - Dieterich, Sergio B.
  - Finch, Charlie T.
  - Ianna, Philip A.
  - Riedel, Adric R.
  - Silverstein, Michele L.
  - Subasavage, John P.
