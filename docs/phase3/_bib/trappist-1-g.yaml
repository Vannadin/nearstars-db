  year: '2018'
  pubdate: '2018-04-00'
  doi: 10.3847/1538-4357/aab205
  abstract: Future NASA concept missions that are currently under study, like the Habitable Exoplanet Imaging Mission (HabEx)
    and the Large Ultra-violet Optical Infra Red Surveyor, could discover a large diversity of exoplanets. We propose here
    a classification scheme that distinguishes exoplanets into different categories based on their size and incident stellar
    flux, for the purpose of providing the expected number of exoplanets observed (yield) with direct imaging missions. The
    boundaries of this classification can be computed using the known chemical behavior of gases and condensates at different
    pressures and temperatures in a planetary atmosphere. In this study, we initially focus on condensation curves for sphalerite
    ZnS, {{{H}}}<SUB>2</SUB>{{O}}, {CO}}<SUB>2</SUB>, and {CH}}<SUB>4</SUB>. The order in which these species condense in
    a planetary atmosphere define the boundaries between different classes of planets. Broadly, the planets are divided into
    rocky planets (0.5-1.0 R <SUB>⊕</SUB>), super-Earths (1.0-1.75 R <SUB>⊕</SUB>), sub-Neptunes (1.75-3.5 R <SUB>⊕</SUB>),
    sub-Jovians (3.5-6.0 R <SUB>⊕</SUB>), and Jovians (6-14.3 R <SUB>⊕</SUB>) based on their planet sizes, and “hot,” “warm,”
    and “cold” based on the incident stellar flux. We then calculate planet occurrence rates within these boundaries for different
    kinds of exoplanets, η <SUB>planet</SUB>, using the community coordinated results of NASA’s Exoplanet Program Analysis
    Group’s Science Analysis Group-13 (SAG-13). These occurrence rate estimates are in turn used to estimate the expected
    exoplanet yields for direct imaging missions of different telescope diameters.
