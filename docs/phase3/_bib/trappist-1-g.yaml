  arxiv_id: '2307.11442'
  ads_bibcode: 2023AJ....166...91S
  title: 'Age Distribution of Exoplanet Host Stars: Chemical and Kinematic Age Proxies from GAIA DR3'
  authors:
  - Swastik, C.
  - Banyal, Ravinder K.
  - Narang, Mayank
  - Unni, Athira
  - Banerjee, Bihan
  - Manoj, P.
  - Sivarani, T.
  year: '2023'
