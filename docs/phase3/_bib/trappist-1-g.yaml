  year: '2017'
  pubdate: '2017-10-00'
  doi: 10.3847/1538-4357/aa8b0f
  abstract: 'Almost every star in our Galaxy is likely to harbor a terrestrial planet, but accurate measurements of an exoplanet’s
    mass and radius demand accurate knowledge of the properties of its host star. The imminent TESS and CHEOPS missions are
    slated to discover thousands of new exoplanets. Along with WFIRST, which will directly image nearby planets, these surveys
    make urgent the need to better characterize stars in the nearby solar neighborhood (&lt;30 pc). We have compiled the CATalog
    of Stellar Unified Properties (CATSUP) for 951 stars, including such data as: Gaia astrometry; multiplicity within stellar
    systems; stellar elemental abundance measurements; standardized spectral types; Ca II H and K stellar activity indices;
    GALEX NUV and FUV photometry; and X-ray fluxes and luminosities from ROSAT, XMM, and Chandra. We use this data-rich catalog
    to find correlations, especially between stellar emission indices, colors, and galactic velocity. Additionally, we demonstrate
    that thick-disk stars in the sample are generally older, have lower activity, and have higher velocities normal to the
    galactic plane. We anticipate that CATSUP will be useful for discerning other trends among stars within the nearby solar
    neighborhood, for comparing thin-disk versus thick-disk stars, for comparing stars with and without planets, and for finding
    correlations between chemical and kinematic properties.'
