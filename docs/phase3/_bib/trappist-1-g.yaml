- &id439
  arxiv_id: '2104.09843'
  ads_bibcode: 2021ApJ...914...38Y
  title: How to Identify Exoplanet Surfaces Using Atmospheric Trace Species in Hydrogen-dominated Atmospheres
  authors:
  - Yu, Xinting
  - Moses, Julianne I.
  - Fortney, Jonathan J.
  - Zhang, Xi
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.3847/1538-4357/abfdc7
  abstract: 'Sub-Neptunes (R<SUB>p</SUB> ~ 1.25-4 R<SUB>Earth</SUB>) remain the most commonly detected exoplanets to date.
    However, it remains difficult for observations to tell whether these intermediate-sized exoplanets have surfaces and where
    their surfaces are located. Here we propose that the abundances of trace species in the visible atmospheres of these sub-Neptunes
    can be used as proxies for determining the existence of surfaces and approximate surface conditions. As an example, we
    used a state-of-the-art photochemical model to simulate the atmospheric evolution of K2-18b and investigate its final
    steady-state composition with surfaces located at different pressures levels (P<SUB>surf</SUB>). We find that the surface
    location has a significant impact on the atmospheric abundances of trace species, making them deviate significantly from
    their thermochemical equilibrium and "no-surface" conditions. This result arises primarily because the pressure-temperature
    conditions at the surface determine whether photochemically produced species can be recycled back to their favored thermochemical
    equilibrium forms and transported back to the upper atmosphere. For an assumed H<SUB>2</SUB>-rich atmosphere for K2-18b,
    we identify seven chemical species that are most sensitive to the existence of surfaces: ammonia (NH<SUB>3</SUB>), methane
    (CH<SUB>4</SUB>), hydrogen cyanide (HCN), acetylene (C<SUB>2</SUB>H<SUB>2</SUB>), ethane (C<SUB>2</SUB>H<SUB>6</SUB>),
    carbon monoxide (CO), and carbon dioxide (CO<SUB>2</SUB>). The ratio between the observed and the no-surface abundances
    of these species can help distinguish the existence of a shallow surface (P<SUB>surf</SUB> &lt; 10 bar), an intermediate
    surface (10 bar &lt; P<SUB>surf</SUB> &lt; 100 bar), and a deep surface (P<SUB>surf</SUB> &gt; 100 bar). This framework
    can be applied together with future observations to other sub-Neptunes of interest.'
