  doi: 10.1051/0004-6361/202244879
  abstract: 'Context. The CARMENES instrument, installed at the 3.5 m telescope of the Calar Alto Observatory in Almería,
    Spain, was conceived to deliver high-accuracy radial velocity (RV) measurements with long-term stability to search for
    temperate rocky planets around a sample of nearby cool stars. Moreover, the broad wavelength coverage was designed to
    provide a range of stellar activity indicators to assess the nature of potential RV signals and to provide valuable spectral
    information to help characterise the stellar targets. <BR /> Aims: We describe the CARMENES guaranteed time observations
    (GTO), spanning from 2016 to 2020, during which 19 633 spectra for a sample of 362 targets were collected. We present
    the CARMENES Data Release 1 (DR1), which makes public all observations obtained during the GTO of the CARMENES survey.
    <BR /> Methods: The CARMENES survey target selection was aimed at minimising biases, and about 70% of all known M dwarfs
    within 10 pc and accessible from Calar Alto were included. The data were pipeline-processed, and high-level data products,
    including 18 642 precise RVs for 345 targets, were derived. Time series data of spectroscopic activity indicators were
    also obtained. <BR /> Results: We discuss the characteristics of the CARMENES data, the statistical properties of the
    stellar sample, and the spectroscopic measurements. We show examples of the use of CARMENES data and provide a contextual
    view of the exoplanet population revealed by the survey, including 33 new planets, 17 re-analysed planets, and 26 confirmed
    planets from transiting candidate follow-up. A subsample of 238 targets was used to derive updated planet occurrence rates,
    yielding an overall average of 1.44 ± 0.20 planets with 1 M<SUB>⊕</SUB> &lt; M<SUB>pl</SUB> sin i &lt; 1000 M<SUB>⊕</SUB>
    and 1 day &lt; P<SUB>orb</SUB> &lt; 1000 days per star, and indicating that nearly every M dwarf hosts at least one planet.
    All the DR1 raw data, pipeline-processed data, and high-level data products are publicly available online. <BR /> Conclusions:
    CARMENES data have proven very useful for identifying and measuring planetary companions. They are also suitable for a
    variety of additional applications, such as the determination of stellar fundamental and atmospheric properties, the characterisation
    of stellar activity, and the study of exoplanet atmospheres. <P />Full Tables 1 and 2 are only available at the CDS via
    anonymous ftp to <A href="https://cdsarc.cds.unistra.fr">cdsarc.cds.unistra.fr</A> (ftp://130.79.128.5) or via <A href="https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/670/A139">https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/670/A139</A>'
