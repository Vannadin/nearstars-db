  arxiv_id: null
  ads_bibcode: 2016ApJ...825...86S
  title: Dynamical Accretion of Primordial Atmospheres around Planets with Masses between 0.1 and 5 M <SUB>⊕</SUB> in the
    Habitable Zone
  authors:
  - Stökl, Alexander
  - Dorfi, Ernst A.
  - Johnstone, Colin P.
  - Lammer, Helmut
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.3847/0004-637X/825/2/86
  abstract: In the early, disk-embedded phase of evolution of terrestrial planets, a protoplanetary core can accumulate gas
    from the circumstellar disk into a planetary envelope. In order to relate the accumulation and structure of this primordial
    atmosphere to the thermal evolution of the planetary core, we calculated atmosphere models characterized by the surface
    temperature of the core. We considered cores with masses between 0.1 and 5 M <SUB>⊕</SUB> situated in the habitable zone
    around a solar-like star. The time-dependent simulations in 1D-spherical symmetry include the hydrodynamics equations,
    gray radiative transport, and convective energy transport. Using an implicit time integration scheme, we can use large
    time steps and and thus efficiently cover evolutionary timescales. Our results show that planetary atmospheres, when considered
    with reference to a fixed core temperature, are not necessarily stable, and multiple solutions may exist for one core
    temperature. As the structure and properties of nebula-embedded planetary atmospheres are an inherently time-dependent
    problem, we calculated estimates for the amount of primordial atmosphere by simulating the accretion process of disk gas
    onto planetary cores and the subsequent evolution of the embedded atmospheres. The temperature of the planetary core is
    thereby determined from the computation of the internal energy budget of the core. For cores more massive than about one
    Earth mass, we obtain that a comparatively short duration of the disk-embedded phase (∼10<SUP>5</SUP> years) is sufficient
    for the accumulation of significant amounts of hydrogen atmosphere that are unlikely to be removed by later atmospheric
    escape processes.
