  arxiv_id: '2107.10405'
  ads_bibcode: 2022PSJ.....3..127S
  title: Chemical Equilibrium between Cores, Mantles, and Atmospheres of Super-Earths and Sub-Neptunes and Implications for
    Their Compositions, Interiors, and Evolution
  authors:
  - Schlichting, Hilke E.
  - Young, Edward D.
  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/PSJ/ac68e6
  abstract: We investigate the equilibrium chemistry between molten metal and silicate and a hydrogen-rich envelope using
    18 independent reactions among 25 phase components for sub-Neptune-like exoplanets. Both reactive and unreactive metal
    sequestered in an isolated core are modeled. The overarching effects of equilibration are oxidation of the envelope and
    reduction of the mantle and core. Hydrogen and oxygen typically comprise significant fractions of metal cores at chemical
    equilibrium, leading to density deficits that offer a possible alternative explanation for the low densities of the Trappist-1
    planets. Reactions with the magma ocean produce significant amounts of SiO and H<SUB>2</SUB>O in the envelopes directly
    above the magma ocean. Molar concentrations in the envelopes of planets with reactive metal are H<SUB>2</SUB> &gt; SiO
    &gt; CO ~ Na ~ Mg &gt; H<SUB>2</SUB>O ≫ CO<SUB>2</SUB> ~ CH<SUB>4</SUB> ≫ O<SUB>2</SUB>, while for the unreactive metal
    case, H<SUB>2</SUB>O becomes the second most abundant species, after H<SUB>2</SUB>, providing an arbiter for the two scenarios
    amenable to observation. The water abundances in the atmospheres exceed those in the mantles by at least an order of magnitude
    in both scenarios. The water concentrations in the silicate mantles are ~0.01 and ~0.1 wt% in the reactive and unreactive
    metal core cases, respectively, limiting the H<SUB>2</SUB>O that might be outgassed in a future super-Earth. Less dissolved
    water in the reactive core case is due to sequestration of H and O in the Fe-rich metal. The total hydrogen budget of
    most sub-Neptunes can, to first order, be estimated from their atmospheres alone, as the atmospheres typically contain
    more than 90% of all H.
