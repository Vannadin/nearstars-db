  abstract: The Planetary Spectrum Generator (PSG) is a radiative transfer model suite for synthesizing and retrieving planetary
    spectra (atmospheres and surfaces) for a broad range of wavelengths (50 nm to 100 mm, UV/Vis/near-IR/IR/far-IR/radio)
    from any observatory (e.g., JWST, ALMA, Keck, SOFIA), any orbiter (e.g., MRO, ExoMars), or any lander. PSG also permits
