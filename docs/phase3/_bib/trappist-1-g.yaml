- arxiv_id: '1705.07813'
  ads_bibcode: 2018IJAsB..17...77H
  title: Why do we find ourselves around a yellow star instead of a red star?
  authors:
  - Haqq-Misra, Jacob
  - Kopparapu, Ravi Kumar
  - Wolf, Eric T.
  year: '2018'
  pubdate: '2018-01-00'
  doi: 10.1017/S1473550417000118
  abstract: M-dwarf stars are more abundant than G-dwarf stars, so our position as observers on a planet orbiting a G-dwarf
    raises questions about the suitability of other stellar types for supporting life. If we consider ourselves as typical,
    in the anthropic sense that our environment is probably a typical one for conscious observers, then we are led to the
    conclusion that planets orbiting in the habitable zone of G-dwarf stars should be the best place for conscious life to
    develop. But such a conclusion neglects the possibility that K-dwarfs or M-dwarfs could provide more numerous sites for
    life to develop, both now and in the future. In this paper we analyse this problem through Bayesian inference to demonstrate
    that our occurrence around a G-dwarf might be a slight statistical anomaly, but only the sort of chance event that we
    expect to occur regularly. Even if M-dwarfs provide more numerous habitable planets today and in the future, we still
    expect mid G- to early K-dwarfs stars to be the most likely place for observers like ourselves. This suggests that observers
    with similar cognitive capabilities as us are most likely to be found at the present time and place, rather than in the
    future or around much smaller stars.
