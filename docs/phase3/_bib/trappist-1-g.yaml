- &id597
  arxiv_id: '1102.0342'
  ads_bibcode: 2011AJ....142..112B
  title: 'Kepler Input Catalog: Photometric Calibration and Stellar Classification'
  authors:
  - Brown, Timothy M.
  - Latham, David W.
  - Everett, Mark E.
  - Esquerdo, Gilbert A.
  year: '2011'
  pubdate: '2011-10-00'
  doi: 10.1088/0004-6256/142/4/112
  abstract: We describe the photometric calibration and stellar classification methods used by the Stellar Classification
    Project to produce the Kepler Input Catalog (KIC). The KIC is a catalog containing photometric and physical data for sources
    in the Kepler mission field of view; it is used by the mission to select optimal targets. Four of the visible-light (g,
    r, i, z) magnitudes used in the KIC are tied to Sloan Digital Sky Survey magnitudes; the fifth (D51) is an AB magnitude
    calibrated to be consistent with Castelli &amp; Kurucz (CK) model atmosphere fluxes. We derived atmospheric extinction
    corrections from hourly observations of secondary standard fields within the Kepler field of view. For these filters and
    extinction estimates, repeatability of absolute photometry for stars brighter than magnitude 15 is typically 2%. We estimated
    stellar parameters {T <SUB>eff</SUB>, log (g), log (Z), E <SUB> B - V </SUB>} using Bayesian posterior probability maximization
    to match observed colors to CK stellar atmosphere models. We applied Bayesian priors describing the distribution of solar-neighborhood
    stars in the color-magnitude diagram, in log (Z), and in height above the galactic plane. Several comparisons with samples
    of stars classified by other means indicate that for 4500 K &lt;=T <SUB>eff</SUB> &lt;= 6500 K, our classifications are
    reliable within about ±200 K and 0.4 dex in log (g) for dwarfs, with somewhat larger log (g) uncertainties for giants.
    It is difficult to assess the reliability of our log (Z) estimates, but there is reason to suspect that it is poor, particularly
    at extreme T <SUB>eff</SUB>. Comparisons between the CK models and observed colors are generally satisfactory with some
    exceptions, notably for stars cooler than 4500 K. Of great importance for the Kepler mission, for T <SUB>eff</SUB> &lt;=
    5400 K, comparison with asteroseismic results shows that the distinction between main-sequence stars and giants is reliable
    with about 98% confidence. Larger errors in log (g) occur for warmer stars, for which our filter set provides inadequate
    gravity diagnostics. The KIC is available through the MAST data archive.
