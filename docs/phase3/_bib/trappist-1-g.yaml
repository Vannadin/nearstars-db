  arxiv_id: '1911.09991'
  ads_bibcode: 2020A&A...635A.128A
  title: 'Planetary nebulae seen with TESS: Discovery of new binary central star candidates from Cycle 1'
  authors:
  - Aller, A.
  - Lillo-Box, J.
  - Jones, D.
