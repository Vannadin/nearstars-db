  doi: 10.1088/1538-3873/acada0
  abstract: The James Webb Space Telescope (JWST) is a large, infrared space telescope that has recently started its science
    program which will enable breakthroughs in astrophysics and planetary science. Notably, JWST will provide the very first
    observations of the earliest luminous objects in the universe and start a new era of exoplanet atmospheric characterization.
    This transformative science is enabled by a 6.6 m telescope that is passively cooled with a 5 layer sunshield. The primary
    mirror is comprised of 18 controllable, low areal density hexagonal segments, that were aligned and phased relative to
    each other in orbit using innovative image-based wave front sensing and control algorithms. This revolutionary telescope
    took more than two decades to develop with a widely distributed team across engineering disciplines. We present an overview
    of the telescope requirements, architecture, development, superb on-orbit performance, and lessons learned. JWST successfully
    demonstrates a segmented aperture space telescope and establishes a path to building even larger space telescopes.
