  year: '2023'
  pubdate: '2023-04-00'
  doi: 10.1051/0004-6361/202245092
  abstract: 'Context. Precision radial velocity (RV) measurements continue to be a key tool for detecting and characterising
    extrasolar planets. While instrumental precision keeps improving, stellar activity remains a barrier to obtaining reliable
    measurements below 1-2 m s<SUP>‒1</SUP> accuracy. <BR /> Aims: Using simulations and real data, we investigate the capabilities
    of a deep neural network approach to producing activity-free Doppler measurements of stars. <BR /> Methods: As case studies
    we used observations of two known stars, ϵ Eridani and AU Microscopii, both of which have clear signals of activity-induced
    Doppler variability. Synthetic observations using the starsim code were generated for the observables (inputs) and the
    resulting Doppler signal (labels), and then they were used to train a deep neural network algorithm to predict Doppler
    corrections. We identified a relatively simple architecture, consisting of convolutional layers followed by fully connected
    layers, that is adequate for the task. The indices investigated are mean line-profile parameters (width, bisector, and
    contrast) and multi-band photometry. <BR /> Results: We demonstrate that the RV-independent approach can drastically reduce
    spurious Doppler variability from known physical effects, such as spots, rotation, and convective blueshift. We identify
    the combinations of activity indices with the most predictive power. When applied to real observations, we observe a good
    match of the correction with the observed variability, but we also find that the noise reduction is not as good as in
    the simulations, probably due to a lack of detail in the simulated physics. <BR /> Conclusions: We demonstrate that a
    model-driven machine learning approach is sufficient to clean Doppler signals from activity-induced variability for well-known
    physical effects. There are dozens of known activity-related observables whose inversion power remains unexplored, indicating
    that the use of additional indicators, more complete models, and more observations with optimised sampling strategies
    can lead to significant improvements in our detrending capabilities for new and existing datasets.'
