  arxiv_id: '2409.07552'
  ads_bibcode: 2024AJ....168..276S
  title: 'JWST COMPASS: The 3─5 μm Transmission Spectrum of the Super-Earth L 98-59 c'
  authors:
  - Scarsdale, Nicholas
  - Wogan, Nicholas
  - Wakeford, Hannah R.
  - Wallack, Nicole L.
  - Batalha, Natasha E.
  - Alderson, Lili
  - Aguichine, Artyom
