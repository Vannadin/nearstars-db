  arxiv_id: '2207.02142'
  ads_bibcode: 2022ApJ...933...49P
  title: Observation of S4716-a Star with a 4 yr Orbit around Sgr A*
  authors:
  - Peißker, Florian
  - Eckart, Andreas
  - Zajaček, Michal
  - Britzen, Silke
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.3847/1538-4357/ac752f
  abstract: The ongoing monitoring of the Galactic center and Sgr A*, the central supermassive black hole, produces surprising
    and unexpected findings. This goes hand in hand with the technical evolution of ground- and space-based telescopes and
    instruments, but also with the progression of image filter techniques such as the Lucy-Richardson algorithm. As we continue
    to trace the members of the S cluster close to Sgr A* on their expected trajectory around the supermassive black hole,
    we present the finding of a new stellar source, which we call S4716. The newly found star orbits Sgr A* in about 4.0 yr
    and can be detected with NIRC2 (Keck), OSIRIS (Keck), SINFONI (VLT), NACO (VLT), and GRAVITY (VLTI). With a periapse distance
    of about 100 au, S4716 shows an equivalent distance toward Sgr A* as S4711. These fast-moving stars undergo a similar
    dynamical evolution, since S4711-S4716 share comparable orbital properties. We will furthermore draw a connection between
    the recent finding of a new faint star called S300 and the data presented here. Additionally, we observed a blend-star
    event with S4716 and another newly identified S star S148 in 2017.
  source: citation_of=2022ApJ...938....1L
