- &id962
  arxiv_id: '1804.02001'
  ads_bibcode: 2018ApJ...860L..30H
  title: The First Naked-eye Superflare Detected from Proxima Centauri
  authors:
  - Howard, Ward S.
  - Tilley, Matt A.
  - Corbett, Hank
  - Youngblood, Allison
  - Loyd, R. O. Parke
  - Ratzloff, Jeffrey K.
  - Law, Nicholas M.
  - Fors, Octavi
  - del Ser, Daniel
  - Shkolnik, Evgenya L.
  - Ziegler, Carl
  - Goeke, Erin E.
  - Pietraallo, Aaron D.
  - Haislip, Joshua
  year: '2018'
  pubdate: '2018-06-00'
  doi: 10.3847/2041-8213/aacaf3
  abstract: 'Proxima b is a terrestrial-mass planet in the habitable zone of Proxima Centauri. Proxima Centauri’s high stellar
    activity, however, casts doubt on the habitability of Proxima b: sufficiently bright and frequent flares and any associated
    proton events may destroy the planet’s ozone layer, allowing lethal levels of UV flux to reach its surface. In 2016 March,
    the Evryscope observed the first naked-eye-brightness superflare detected from Proxima Centauri. Proxima increased in
    optical flux by a factor of ∼68 during the superflare and released a bolometric energy of 10<SUP>33.5</SUP> erg, ∼10×
    larger than any previously detected flare from Proxima. Over the last two years the Evryscope has recorded 23 other large
    Proxima flares ranging in bolometric energy from 10<SUP>30.6</SUP> to 10<SUP>32.4</SUP> erg; coupling those rates with
    the single superflare detection, we predict that at least five superflares occur each year. Simultaneous high-resolution
    High Accuracy Radial velocity Planet Searcher (HARPS) spectroscopy during the Evryscope superflare constrains the superflare’s
    UV spectrum and any associated coronal mass ejections. We use these results and the Evryscope flare rates to model the
    photochemical effects of NO<SUB> x </SUB> atmospheric species generated by particle events from this extreme stellar activity,
    and show that the repeated flaring may be sufficient to reduce the ozone of an Earth-like atmosphere by 90% within five
    years; complete depletion may occur within several hundred kyr. The UV light produced by the Evryscope superflare would
    therefore have reached the surface with ∼100× the intensity required to kill simple UV-hardy microorganisms, suggesting
    that life would have to undergo extreme adaptations to survive in the surface areas of Proxima b exposed to these flares.'
