- &id358
  arxiv_id: '1409.1237'
  ads_bibcode: 2014A&A...570A..99S
  title: The effects of stellar winds on the magnetospheres and potential habitability of exoplanets
  authors:
  - See, V.
  - Jardine, M.
  - Vidotto, A. A.
  - Petit, P.
  - Marsden, S. C.
  - Jeffers, S. V.
  - do Nascimento, J. D.
  year: '2014'
  pubdate: '2014-10-00'
  doi: 10.1051/0004-6361/201424323
  abstract: 'Context. The principle definition of habitability for exoplanets is whether they can sustain liquid water on
    their surfaces, i.e. that they orbit within the habitable zone. However, the planet''s magnetosphere should also be considered,
    since without it, an exoplanet''s atmosphere may be eroded away by stellar winds. <BR /> Aims: The aim of this paper is
    to investigate magnetospheric protection of a planet from the effects of stellar winds from solar-mass stars. <BR /> Methods:
    We study hypothetical Earth-like exoplanets orbiting in the host star''s habitable zone for a sample of 124 solar-mass
    stars. These are targets that have been observed by the Bcool Collaboration. Using two wind models, we calculate the magnetospheric
    extent of each exoplanet. These wind models are computationally inexpensive and allow the community to quickly estimate
    the magnetospheric size of magnetised Earth-analogues orbiting cool stars. <BR /> Results: Most of the simulated planets
    in our sample can maintain a magnetosphere of ~5 Earth radii or larger. This suggests that magnetised Earth analogues
    in the habitable zones of solar analogues are able to protect their atmospheres and is in contrast to planets around young
    active M dwarfs. In general, we find that Earth-analogues around solar-type stars, of age 1.5 Gyr or older, can maintain
    at least a Paleoarchean Earth sized magnetosphere. Our results indicate that planets around 0.6-0.8 solar-mass stars on
    the low activity side of the Vaughan-Preston gap are the optimum observing targets for habitable Earth analogues. <P />Appendix
    A is available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201424323/olm">http://www.aanda.org</A>'
