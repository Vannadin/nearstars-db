- arxiv_id: null
  ads_bibcode: 2023AcAau.212..505H
  title: A Deep Dive into De-Doppler Algorithms for SETI
  authors:
  - Houston, Kenneth M.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1016/j.actaastro.2023.08.009
  abstract: Narrowband SETI algorithms have been in use for many decades. A key processing step in the usual SETI pipeline
    called "De-Doppler" involves non-coherent integration of linearly-drifting lines in a spectrogram. De- Doppler (DD) is
    needed because a transmitted constant-frequency tone will be received as a chirp, or a tone with a near-constant frequency
    rate, due to relative accelerations between the transmitter and receiver. The frequency drift may be an important discriminator
    against certain types of radio-frequency interference. This paper examines the standard Taylor DD algorithm and finds
    there are significant signal losses in the integration process. Part of the loss is caused by imperfect indexing in the
    algorithm. Additional loss is associated with the effect of an FFT filter bank on chirp signals; DD performance is intertwined
    with the filter bank. Filter bank improvements involving polyphase filter banks are examined. A new DD algorithm called
    "fastDD" is proposed, as well as extensions to the Taylor algorithm. They both offer significant performance gains and
    higher resolution in frequency and drift rate in the DD detection plane. The loss mechanisms are now understood. Computational
    cost trade-offs for various filter bank and DD parameters are presented based on C code functions. Several "best" options
    are given which offer significant SNR improvements ranging from 2 to 4 dB for modest levels of additional computation.
    These options have the potential to dramatically improve detection rates.
