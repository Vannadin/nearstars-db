- &id1193
  arxiv_id: '1005.4982'
  ads_bibcode: 2010ApJ...722.1437B
  title: 'Dynamics of Solids in the Midplane of Protoplanetary Disks: Implications for Planetesimal Formation'
  authors:
  - Bai, Xue-Ning
  - Stone, James M.
  year: '2010'
  pubdate: '2010-10-00'
  doi: 10.1088/0004-637X/722/2/1437
  abstract: We present local two-dimensional and three-dimensional hybrid numerical simulations of particles and gas in the
    midplane of protoplanetary disks (PPDs) using the Athena code. The particles are coupled to gas aerodynamically, with
    particle-to-gas feedback included. Magnetorotational turbulence is ignored as an approximation for the dead zone of PPDs,
    and we ignore particle self-gravity to study the precursor of planetesimal formation. Our simulations include a wide size
    distribution of particles, ranging from strongly coupled particles with dimensionless stopping time τ<SUB> s </SUB> ≡
    Ωt <SUB>stop</SUB> = 10<SUP>-4</SUP> (where Ω is the orbital frequency, t <SUB>stop</SUB> is the particle friction time)
    to marginally coupled ones with τ<SUB> s </SUB> = 1, and a wide range of solid abundances. Our main results are as follows.
    (1) Particles with τ<SUB> s </SUB> &gt;~ 10<SUP>-2</SUP> actively participate in the streaming instability (SI), generate
    turbulence, and maintain the height of the particle layer before Kelvin-Helmholtz instability is triggered. (2) Strong
    particle clumping as a consequence of the SI occurs when a substantial fraction of the solids are large (τ<SUB> s </SUB>
    &gt;~ 10<SUP>-2</SUP>) and when height-integrated solid-to-gas mass ratio Z is super-solar. We construct a toy model to
    offer an explanation. (3) The radial drift velocity is reduced relative to the conventional Nakagawa-Sekiya-Hayashi (NSH)
    model, especially at high Z. Small particles may drift outward. We derive a generalized NSH equilibrium solution for multiple
    particle species which fits our results very well. (4) Collision velocity between particles with τ<SUB> s </SUB> &gt;~
    10<SUP>-2</SUP> is dominated by differential radial drift, and is strongly reduced at larger Z. This is also captured
    by the multi-species NSH solution. Various implications for planetesimal formation are discussed. In particular, we show
    that there exist two positive feedback loops with respect to the enrichment of local disk solid abundance and grain growth.
    All these effects promote planetesimal formation.
  source: citation_of=2021ApJ...907...81L
