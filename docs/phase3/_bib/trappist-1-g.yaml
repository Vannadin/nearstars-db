- arxiv_id: null
  ads_bibcode: 2014AcAau.104..341F
  title: SETI in the light of cosmic convergent evolution
  authors:
  - Flores Martinez, Claudio L.
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1016/j.actaastro.2014.08.013
  abstract: 'Theodosius Dobzhansky, one of the founding fathers of the modern evolutionary synthesis, once famously stated
    that ;nothing makes sense in biology except in the light of evolution;. Here it will be argued that nothing in astrobiology
    makes sense except in the light of ;Cosmic Convergent Evolution; (CCE). This view of life contends that natural selection
    is a universal force of nature that leads to the emergence of similarly adapted life forms in analogous planetary biospheres.
    Although SETI historically preceded the rise of astrobiology that we have witnessed in the recent decade, one of its main
    tenets from the beginning was the convergence of life on a cosmic scale toward intelligent behavior and subsequent communication
    via technological means. The question of cultural convergence in terms of symbolic exchange, language and scientific capabilities
    between advanced interstellar civilizations has been the subject of ongoing debate. However, at the core of the search
    for extraterrestrial intelligence lies in essence a biological problem since even post-biological extraterrestrial intelligences
    must have had an origin based on self-replicating biopolymers. Thus, SETI assumes a propensity of the Universe towards
    biogenesis in accordance with CCE, a new evolutionary concept which posits the multiple emergence of life across the Cosmos.
    Consequently, we have to wonder about the biophilic properties the Universe apparently exhibits, as well as to try to
    find an encompassing theory that is able to explain this ;fine-tuning; in naturalistic terms. The aims of this paper are
    as follows: 1) to emphasize the importance of convergent evolution in astrobiology and ongoing SETI research; 2) to introduce
    novel and biology-centered cosmological ideas such as the ;Selfish Biocosm Hypothesis; and the ;Evo Devo Universe; as
    valuable arguments in theorizing about the origin and nature of extraterrestrial intelligence and 3) to synthesize these
    findings within an emerging post-biological paradigm on which future SETI efforts may be founded.'
