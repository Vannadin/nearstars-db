  title: Characteristics of Super-Earths and Mini-Neptunes
  authors:
  - Morozov, G. A.
  - Belenkaya, E. S.
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.1134/S1063772925701926
  abstract: 'More than half of currently known stars have nearby exoplanets with size between Earth and Neptune, called super-Earths
    and mini-Neptunes. The California─Kepler Survey (CKS) studied data from NASA''s Kepler mission and revealed a bimodal
    distribution of planets with <inline-formula><tex-math>$$R &lt; 3.5{\kern 1pt} {{R}_{{\text{E}}}}$$</tex-math></inline-formula>
    by radius (<inline-formula><tex-math>$${{R}_{{\text{E}}}}$$</tex-math></inline-formula> is the radius of the Earth). It
    occurred that there was a lack of planets with radii <inline-formula><tex-math>$$1.5{\kern 1pt} {{R}_{{\text{E}}}} &lt;
    R &lt; 2{{R}_{{\text{E}}}}$$</tex-math></inline-formula>. The CKS did not take into account data from other missions and
    exoplanets discovered by non-transit methods. All data from this mission were limited to 2022. This article examines the
    distribution of super-Earths and mini-Neptunes, taking into account all data on exoplanets known by 2024 from the NASA
    catalog. Mini-Neptunes and super-Earths with known radii were selected. There were 937 such planets, including 366 planets
    with known mass. Since the radius of a planet can only be determined by the transit method, the distribution by radii
    is built using the data of transit planets, but, unlike CKS, not only the data of the Kepler mission are taken. The data
    for the remaining distributions are selected regardless of the method of their detection and the telescope used. We show
    that the current data are best fitted by a double-peaked Gaussian distribution, which describes two populations of planets:
    rocky (hereinafter super-Earths) and exoplanets with gas envelopes (exoplanets surrounded by hydrogen─helium atmospheres,
    but consisting mainly of heavy elements—ice and rock, hereinafter mini-Neptunes). The magnitude of the gap between populations
    at present is analyzed. It is shown that the gap is filled evenly on both sides; in CKS, the first peak is significantly
    smaller than the second, that is, there were fewer super-Earths than mini-Neptunes. Perhaps more super-Earths have been
    discovered recently, which is why there was a shortage of them in the CKS. The composition of some exoplanets was determined
    using theoretical models of the dependence of mass on radius.'
