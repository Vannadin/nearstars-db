  arxiv_id: '1811.03202'
  ads_bibcode: 2019MNRAS.487...24G
  title: 'Sculpting the valley in the radius distribution of small exoplanets as a by-product of planet formation: the core-powered
    mass-loss mechanism'
  authors:
  - Gupta, Akash
  - Schlichting, Hilke E.
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.1093/mnras/stz1230
  abstract: Recent observations revealed a bimodal radius distribution of small, short-period exoplanets with a paucity in
    their occurrence, a radius `valley', around 1.5-2.0 R<SUB>⊕</SUB>. In this work, we investigate the effect of a planet's
    own cooling luminosity on its thermal evolution and atmospheric mass loss (core-powered mass-loss) and determine its observational
    consequences for the radius distribution of small, close-in exoplanets. Using simple analytical descriptions and numerical
    simulations, we demonstrate that planetary evolution based on the core-powered mass-loss mechanism alone (i.e. without
    any photoevaporation) can produce the observed valley in the radius distribution. Our results match the valley's location,
    shape and slope in planet radius-orbital period parameter space, and the relative magnitudes of the planet occurrence
    rate above and below the valley. We find that the slope of the valley is, to first order, dictated by the atmospheric
    mass-loss time-scale at the Bondi radius and given by d logR<SUB>p</SUB>/d logP ≃ 1/(3(1 - β)) that evaluates to -0.11
    for β ≃ 4, where M<SUB>c</SUB>/M<SUB>⊕</SUB> = (R<SUB>c</SUB>/R<SUB>⊕</SUB>)<SUP>β</SUP>(ρ<SUB>c∗</SUB>/ρ<SUB>⊕</SUB>)<SUP>β/3</SUP>
    is the mass-radius relation of the core. This choice for β yields good agreement with observations and attests to the
    significance of internal compression for massive planetary cores. We further find that the location of the valley scales
    as ρ _c*^{-4/9} and that the observed planet population must have predominantly rocky cores with typical water-ice fractions
    of less than {∼ } 20{{ per cent}}. Furthermore, we show that the relative magnitude of the planet occurrence rate above
    and below the valley is sensitive to the details of the planet-mass distribution but that the location of the valley is
    not.
