  arxiv_id: '2505.15968'
  ads_bibcode: 2025A&A...699A..86C
  title: 'The invisible threat: Assessing the collisional hazard posed by undiscovered Venus co-orbital asteroids'
  authors:
  - Carruba, V.
  - Sfair, R.
  - Araujo, R. A. N.
  - Winter, O. C.
  - Mourão, D. C.
  - Di Ruzza, S.
