- &id1003
  arxiv_id: '1705.10810'
  ads_bibcode: 2017ApJ...847...29O
  title: The Evaporation Valley in the Kepler Planets
  authors:
  - Owen, James E.
  - Wu, Yanqin
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.3847/1538-4357/aa890a
  abstract: 'A new piece of evidence supporting the photoevaporation-driven evolution model for low-mass, close-in exoplanets
    was recently presented by the California-Kepler Survey. The radius distribution of the Kepler planets is shown to be bimodal,
    with a “valley” separating two peaks at 1.3 and 2.6 R <SUB>⊕</SUB>. Such an “evaporation valley” had been predicted by
    numerical models previously. Here, we develop a minimal model to demonstrate that this valley results from the following
    fact: the timescale for envelope erosion is the longest for those planets with hydrogen/helium-rich envelopes that, while
    only a few percent in weight, double its radius. The timescale falls for envelopes lighter than this because the planet’s
    radius remains largely constant for tenuous envelopes. The timescale also drops for heavier envelopes because the planet
    swells up faster than the addition of envelope mass. Photoevaporation therefore herds planets into either bare cores (∼1.3
    R <SUB>⊕</SUB>), or those with double the core’s radius (∼2.6 R <SUB>⊕</SUB>). This process mostly occurs during the first
    100 Myr when the stars’ high-energy fluxes are high and nearly constant. The observed radius distribution further requires
    the Kepler planets to be clustered around 3 M <SUB>⊕</SUB> in mass, born with H/He envelopes more than a few percent in
    mass, and that their cores are similar to the Earth in composition. Such envelopes must have been accreted before the
    dispersal of the gas disks, while the core composition indicates formation inside the ice line. Lastly, the photoevaporation
    model fails to account for bare planets beyond ∼30-60 days; if these planets are abundant, they may point to a significant
    second channel for planet formation, resembling the solar system terrestrial planets.'
