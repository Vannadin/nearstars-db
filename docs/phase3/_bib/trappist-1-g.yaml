  abstract: Photochemistry is a fundamental process of planetary atmospheres that regulates the atmospheric composition and
    stability<SUP>1</SUP>. However, no unambiguous photochemical products have been detected in exoplanet atmospheres so far.
    Recent observations from the JWST Transiting Exoplanet Community Early Release Science Program<SUP>2,3</SUP> found a spectral
    absorption feature at 4.05 μm arising from sulfur dioxide (SO<SUB>2</SUB>) in the atmosphere of WASP-39b. WASP-39b is
    a 1.27-Jupiter-radii, Saturn-mass (0.28 M<SUB>J</SUB>) gas giant exoplanet orbiting a Sun-like star with an equilibrium
    temperature of around 1,100 K (ref. <SUP>4</SUP>). The most plausible way of generating SO<SUB>2</SUB> in such an atmosphere
    is through photochemical processes<SUP>5,6</SUP>. Here we show that the SO<SUB>2</SUB> distribution computed by a suite
    of photochemical models robustly explains the 4.05-μm spectral feature identified by JWST transmission observations<SUP>7</SUP>
    with NIRSpec PRISM (2.7σ)<SUP>8</SUP> and G395H (4.5σ)<SUP>9</SUP>. SO<SUB>2</SUB> is produced by successive oxidation
    of sulfur radicals freed when hydrogen sulfide (H<SUB>2</SUB>S) is destroyed. The sensitivity of the SO<SUB>2</SUB> feature
    to the enrichment of the atmosphere by heavy elements (metallicity) suggests that it can be used as a tracer of atmospheric
    properties, with WASP-39b exhibiting an inferred metallicity of about 10× solar. We further point out that SO<SUB>2</SUB>
    also shows observable features at ultraviolet and thermal infrared wavelengths not available from the existing observations.
