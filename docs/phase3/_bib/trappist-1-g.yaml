  arxiv_id: '2503.19772'
  ads_bibcode: 2025A&A...698A..68M
  title: 'Hot Rocks Survey: II. The thermal emission of TOI-1468 b reveals a bare hot rock'
  authors:
  - Meier Valdés, E. A.
  - Demory, B.-O.
  - Diamond-Lowe, H.
  - Mendonça, J. M.
  - August, P. C.
  - Fortune, M.
  - Allen, N. H.
  - Kitzmann, D.
  - Gressier, A.
