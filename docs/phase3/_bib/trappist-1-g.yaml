  ads_bibcode: 2024A&A...686A.131L
  title: 'A 3D picture of moist-convection inhibition in hydrogen-rich atmospheres: Implications for K2-18 b'
  authors:
  - Leconte, Jérémy
  - Spiga, Aymeric
  - Clément, Noé
  - Guerlet, Sandrine
  - Selsis, Franck
  - Milcareck, Gwenaël
