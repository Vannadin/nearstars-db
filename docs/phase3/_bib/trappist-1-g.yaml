- &id189
  arxiv_id: '1903.04623'
  ads_bibcode: 2019ApJ...875...31K
  title: Evolution and Spectral Response of a Steam Atmosphere for Early Earth with a Coupled Climate-Interior Model
  authors:
  - Katyal, N.
  - Nikolaou, A.
  - Godolt, M.
  - Grenfell, J. L.
  - Tosi, N.
  - Schreier, F.
  - Rauer, H.
  year: '2019'
  pubdate: '2019-04-00'
  doi: 10.3847/1538-4357/ab0d85
  abstract: The evolution of Earth’s early atmosphere and the emergence of habitable conditions on our planet are intricately
    coupled with the development and duration of the magma ocean (MO) phase during the early Hadean period (4-4.5 Ga). In
    this paper, we study the evolution of the steam atmosphere during the MO period. We obtain the outgoing longwave radiation
    (OLR) using the line-by-line radiative transfer code GARLIC. Our study suggests that an atmosphere consisting of pure
    H<SUB>2</SUB>O, built as a result of outgassing, extends the MO lifetime to several million years. The thermal emission
    as a function of the solidification timescale of an MO is shown. We study the effect of thermal dissociation of H<SUB>2</SUB>O
    at higher temperatures by applying atmospheric chemical equilibrium, which results in the formation of H<SUB>2</SUB> and
    O<SUB>2</SUB> during the early phase of the MO. A 1%-6% reduction in the OLR is seen. We also obtain the effective height
    of the atmosphere by calculating the transmission spectra for the whole duration of the MO. An atmosphere of depth 100
    km is seen for pure water atmospheres. The effect of thermal dissociation on the effective height of the atmosphere is
    also shown. Due to the difference in the absorption behavior at different altitudes, the spectral features of H<SUB>2</SUB>
    and O<SUB>2</SUB> are seen at different altitudes of the atmosphere. Therefore, these species, along with H<SUB>2</SUB>O,
    have a significant contribution to the transmission spectra and could be useful for placing observational constraints
    on MO exoplanets.
