- &id832
  arxiv_id: '2004.09513'
  ads_bibcode: 2020ApJ...899...27Z
  title: 'PLATON II: New Capabilities and a Comprehensive Retrieval on HD 189733b Transit and Eclipse Data'
  authors:
  - Zhang, Michael
  - Chachan, Yayaati
  - Kempton, Eliza M.-R.
  - Knutson, Heather A.
  - Chang, Wenjun (Happy)
  year: '2020'
  pubdate: '2020-08-00'
  doi: 10.3847/1538-4357/aba1e6
  abstract: Recently, we introduced PLanetary Atmospheric Tool for Observer Noobs (PLATON), a Python package that calculates
    model transmission spectra for exoplanets and retrieves atmospheric characteristics based on observed spectra. We now
    expand its capabilities to include the ability to compute secondary eclipse depths. We have also added the option to calculate
    models using the correlated-k method for radiative transfer, which improves accuracy without sacrificing speed. Additionally,
    we update the opacities in PLATON—many of which were generated using old or proprietary line lists—using the most recent
    and complete public line lists. These opacities are made available at R = 1000 and R = 10,000 over the 0.3-30 μm range,
    and at R = 375,000 in select near-IR bands, making it possible to utilize PLATON for ground-based high-resolution cross-correlation
    studies. To demonstrate PLATON's new capabilities, we perform a retrieval on published Hubble Space Telescope (HST) and
    Spitzer transmission and emission spectra of the archetypal hot Jupiter HD 189733b. This is the first joint transit and
    secondary eclipse retrieval for this planet in the literature, as well as the most comprehensive set of both transit and
    eclipse data assembled for a retrieval to date. We find that these high signal-to-noise data are well matched by atmosphere
    models with a C/O ratio of ${0.66}_{-0.09}^{+0.05}$ and a metallicity of ${12}_{-5}^{+8}$ times solar where the terminator
    is dominated by extended nanometer-sized haze particles at optical wavelengths. These are among the smallest uncertainties
    reported to date for an exoplanet, demonstrating both the power and the limitations of HST and Spitzer exoplanet observations.
