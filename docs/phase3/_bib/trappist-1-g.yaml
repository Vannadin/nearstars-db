  arxiv_id: '2305.18527'
  ads_bibcode: 2023AJ....165..255S
  title: A 4-8 GHz Galactic Center Search for Periodic Technosignatures
  authors:
  - Suresh, Akshay
  - Gajjar, Vishal
  - Nagarajan, Pranav
  - Sheikh, Sofia Z.
  - Siemion, Andrew P. V.
  - Lebofsky, Matt
  - MacMahon, David H. E.
  - Price, Danny C.
  - Croft, Steve
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.3847/1538-3881/acccf0
  abstract: Radio searches for extraterrestrial intelligence have mainly targeted the discovery of narrowband continuous-wave
    beacons and artificially dispersed broadband bursts. Periodic pulse trains, in comparison to the above technosignature
    morphologies, offer an energetically efficient means of interstellar transmission. A rotating beacon at the Galactic Center
    (GC), in particular, would be highly advantageous for galaxy-wide communications. Here, we present blipss, a CPU-based
    open-source software that uses a fast folding algorithm (FFA) to uncover channel-wide periodic signals in radio dynamic
    spectra. Running blipss on 4.5 hr of 4-8 GHz data gathered with the Robert C. Byrd Green Bank Telescope, we searched the
    central $6^{\prime} $ of our galaxy for kHz-wide signals with periods between 11 and 100 s and duty cycles (δ) between
    10% and 50%. Our searches, to our knowledge, constitute the first FFA exploration for periodic alien technosignatures.
    We report a nondetection of channel-wide periodic signals in our data. Thus, we constrain the abundance of 4-8 GHz extraterrestrial
    transmitters of kHz-wide periodic pulsed signals to fewer than one in about 600,000 stars at the GC above a 7σ equivalent
    isotropic radiated power of ≈2 × 10<SUP>18</SUP> W at δ ≃ 10%. From an astrophysics standpoint, blipss, with its utilization
    of a per-channel FFA, can enable the discovery of signals with exotic radio frequency sweeps departing from the standard
    cold plasma dispersion law.
