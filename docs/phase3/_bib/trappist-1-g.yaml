  arxiv_id: '2501.17948'
  ads_bibcode: 2025SciA...11P8105J
  title: Tracing the inner edge of the habitable zone with sulfur chemistry
  authors:
  - Jordan, Sean
  - Shorttle, Oliver
  - Rimmer, Paul B.
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.1126/sciadv.adp8105
  abstract: 'The circumstellar liquid-water habitable zone guides our search for potentially inhabited exoplanets but remains
    observationally untested. We show that the inner edge of the habitable zone can now be mapped among exoplanets using their
    lack of surface water, which, unlike the presence of water, can be unambiguously revealed by atmospheric sulfur species.
    Using coupled climate-chemistry modeling, we find that the observability of sulfur gases on exoplanets depends critically
    on the ultraviolet (UV) flux of their host star, a property with wide variation: Most M-dwarfs have a low UV flux and
    thereby allow the detection of sulfur gases as a tracer of dry planetary surfaces; however, the UV flux of Trappist-1
    may be too high for sulfur to disambiguate uninhabitable from habitable surfaces on any of its planets. We generalize
    this result to show how a population-level search for sulfur chemistry on M-dwarf planets can be used to empirically define
    the habitable zone in the near future. The inner edge of the habitable zone around M-dwarf stars with low UV flux can
    be traced using observations of sulfur chemistry.'
