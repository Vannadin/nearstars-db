  arxiv_id: '1611.06239'
  ads_bibcode: 2017ApJ...839...94B
  title: 'Kepler-11 is a Solar Twin: Revising the Masses and Radii of Benchmark Planets via Precise Stellar Characterization'
  authors:
  - Bedell, Megan
  - Bean, Jacob L.
  - Meléndez, Jorge
  - Mills, Sean M.
  - Fabrycky, Daniel C.
  - Freitas, Fabrício C.
  - Ramírez, Ivan
  - Asplund, Martin
  - Liu, Fan
  - Yong, David
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.3847/1538-4357/aa6a1d
  abstract: The six planets of the Kepler-11 system are the archetypal example of a population of surprisingly low-density
    transiting planets revealed by the Kepler mission. We have determined the fundamental parameters and chemical composition
    of the Kepler-11 host star to unprecedented precision using an extremely high-quality spectrum from Keck-HIRES (R ≃ 67,000,
    S/N per pixel ≃ 260 at 600 nm). Contrary to previously published results, our spectroscopic constraints indicate that
    Kepler-11 is a young main-sequence solar twin. The revised stellar parameters and new analysis raise the densities of
    the Kepler-11 planets by between 20% and 95% per planet, making them more typical of the emerging class of “puffy” close-in
    exoplanets. We obtain photospheric abundances of 22 elements and find that Kepler-11 has an abundance pattern similar
    to that of the Sun with a slightly higher overall metallicity. We additionally analyze the Kepler light curves using a
    photodynamical model and discuss the tension between spectroscopic and transit/TTV-based estimates of stellar density.
