  - Stansberry, J.
  - Tozzi, G. P.
  - Mottola, S.
  - Delsanti, A.
  - Crovisier, J.
  - Duffard, R.
  - Henry, F.
  - Lacerda, P.
  - Barucci, A.
  - Gicquel, A.
  year: '2013'
  pubdate: '2013-07-00'
  doi: 10.1051/0004-6361/201321329
  abstract: '<BR /> Aims: Trans-Neptunian objects (TNOs) are bodies populating the Kuiper belt and they are believed to retain
    the most pristine and least altered material of the solar system. The Herschel open time key programme entitled "TNOs
    are Cool: A survey of the trans-Neptunian region" has been awarded 373 h to investigate the albedo, size distribution
    and thermal properties of TNOs and Centaurs. Here we focus on the brightest targets observed by both the PACS and SPIRE
    multiband photometers: the dwarf planet Haumea, six TNOs (Huya, Orcus, Quaoar, Salacia, 2002 UX25, and 2002 TC302), and
    two Centaurs (Chiron and Chariklo). <BR /> Methods: Flux densities are derived from PACS and SPIRE instruments using optimised
    data reduction methods. The spectral energy distribution obtained with the Herschel PACS and SPIRE instruments over 6
    bands (centred at 70, 100, 160, 250, 350, and 500 μm), with Spitzer-MIPS at 23.7 and 71.4 μm, and with WISE at 11.6 and
    22.1 μm in the case of 10199 Chariklo, has been modelled with the NEATM thermal model in order to derive the albedo, diameter,
    and beaming factor. For the Centaurs Chiron and Chariklo and for the 1000 km sized Orcus and Quaoar, a thermophysical
    model was also run to better constrain their thermal properties. <BR /> Results: We derive the size, albedo, and thermal
    properties, including thermal inertia and surface emissivity, for the 9 TNOs and Centaurs. Several targets show a significant
    decrease in their spectral emissivity longwards of ~300 μm and especially at 500 μm. Using our size estimations and the
    mass values available in the literature, we also derive the bulk densities for the binaries Quaoar/Weywot (2.18<SUB>-0.36</SUB><SUP>+0.43</SUP>
    g/cm<SUP>3</SUP>), Orcus/Vanth (1.53<SUB>-0.13</SUB><SUP>+0.15</SUP> g/cm<SUP>3</SUP>), and Salacia/Actea (1.29<SUB>-0.23</SUB><SUP>+0.29</SUP>
    g/cm<SUP>3</SUP>). Quaoar''s density is similar to that of the other dwarf planets Pluto and Haumea, and its value implies
    high contents of refractory materials mixed with ices. <P />Herschel is an ESA space observatory with science instruments
    provided by European led Principal Investigator consortia and with important participation from NASA.'
