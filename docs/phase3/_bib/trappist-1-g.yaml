  arxiv_id: '2006.09403'
  ads_bibcode: 2020A&A...641A..23P
  title: 'GJ 273: on the formation, dynamical evolution, and habitability of a planetary system hosted by an M dwarf at 3.75
    parsec'
  authors:
  - Pozuelos, Francisco J.
  - Suárez, Juan C.
  - de Elía, Gonzalo C.
  - Berdiñas, Zaira M.
  - Bonfanti, Andrea
  - Dugaro, Agustín
  - Gillon, Michaël
  - Jehin, Emmanuël
