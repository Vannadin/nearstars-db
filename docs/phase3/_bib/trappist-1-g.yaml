- &id245
  arxiv_id: '2402.19277'
  ads_bibcode: 2024ApJ...970....7S
  title: The Impact of the Explicit Representation of Convection on the Climate of a Tidally Locked Planet in Global Stretched-mesh
    Simulations
  authors:
  - Sergeev, Denis E.
  - Boutle, Ian A.
  - Lambert, F. Hugo
  - Mayne, Nathan J.
  - Bendall, Thomas
  - Kohary, Krisztian
  - Olivier, Enrico
  - Shipway, Ben
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/1538-4357/ad4ecd
  abstract: Convective processes are crucial in shaping exoplanetary atmospheres but are computationally expensive to simulate
    directly. A novel technique of simulating moist convection on tidally locked exoplanets is to use a global 3D model with
    a stretched mesh. This allows us to locally refine the model resolution to 4.7 km and resolve fine-scale convective processes
    without relying on parameterizations. We explore the impact of mesh stretching on the climate of a slowly rotating TRAPPIST-1e-like
    planet, assuming it is 1:1 tidally locked. In the stretched-mesh simulation with explicit convection, the climate is 5
    K colder and 25% drier than that in the simulations with parameterized convection(with both stretched and quasi-uniform
    meshes). This is due to the increased cloud reflectivity—because of an increase in low-level cloudiness—and exacerbated
    by the diminished greenhouse effect due to less water vapor. At the same time, our stretched-mesh simulations reproduce
    the key characteristics of the global climate of tidally locked rocky exoplanets, without any noticeable numerical artifacts.
    Our methodology opens an exciting and computationally feasible avenue for improving our understanding of 3D mixing in
    exoplanetary atmospheres. Our study also demonstrates the feasibility of a global stretched-mesh configuration for LFRic-Atmosphere,
    the next-generation Met Office climate and weather model.
  source: citation_of=2025A&A...693A.303C
