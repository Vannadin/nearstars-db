  arxiv_id: '1302.0845'
  ads_bibcode: 2013ApJ...767...94S
  title: A 1.1-1.9 GHz SETI Survey of the Kepler Field. I. A Search for Narrow-band Emission from Select Targets
  authors:
  - Siemion, Andrew P. V.
  - Demorest, Paul
  - Korpela, Eric
  - Maddalena, Ron J.
  - Werthimer, Dan
  - Cobb, Jeff
  - Howard, Andrew W.
  - Langston, Glen
  - Lebofsky, Matt
  - Marcy, Geoffrey W.
