- &id640
  arxiv_id: '2504.12267'
  ads_bibcode: 2025ApJ...983L..40M
  title: New Constraints on DMS and DMDS in the Atmosphere of K2-18 b from JWST MIRI
  authors:
  - Madhusudhan, Nikku
  - Constantinou, Savvas
  - Holmberg, Måns
  - Sarkar, Subhajit
  - Piette, Anjali A. A.
  - Moses, Julianne I.
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.3847/2041-8213/adc1c8
  abstract: The sub-Neptune frontier has opened a new window into the rich diversity of planetary environments beyond the
    solar system. The possibility of hycean worlds, with planet-wide oceans and H<SUB>2</SUB>-rich atmospheres, significantly
    expands and accelerates the search for habitable environments elsewhere. Recent JWST transmission spectroscopy of the
    candidate hycean world K2-18 b in the near-infrared led to the first detections of the carbon-bearing molecules CH<SUB>4</SUB>
    and CO<SUB>2</SUB> in its atmosphere, with a composition consistent with predictions for hycean conditions. The observations
    also provided a tentative hint of dimethyl sulfide (DMS), a possible biosignature gas, but the inference was of low statistical
    significance. We report a mid-infrared transmission spectrum of K2-18 b obtained using the JWST MIRI LRS instrument in
    the ∼6─12 μm range. The spectrum shows distinct features and is inconsistent with a featureless spectrum at 3.4σ significance
    compared to our canonical model. We find that the spectrum cannot be explained by most molecules predicted for K2-18 b,
    with the exception of DMS and dimethyl disulfide (DMDS), also a potential biosignature gas. We report new independent
    evidence for DMS and/or DMDS in the atmosphere at 3σ significance, with high abundance (≳10 ppmv) of at least one of the
    two molecules. More observations are needed to increase the robustness of the findings and resolve the degeneracy between
    DMS and DMDS. The results also highlight the need for additional experimental and theoretical work to determine accurate
    cross sections of important biosignature gases and identify potential abiotic sources. We discuss the implications of
    the present findings for the possibility of biological activity on K2-18 b.
