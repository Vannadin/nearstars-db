- &id641
  arxiv_id: '2502.20419'
  ads_bibcode: 2025AJ....169..217L
  title: Multibeam SETI Observations Toward Nearby M Dwarfs with FAST
  authors:
  - Luan, Xiao-Hang
  - Huang, Bo-Lun
  - Tao, Zhen-Zhao
  - Cui, Yan
  - Zhang, Tong-Jie
  - Wang, Pei
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.3847/1538-3881/adbaef
  abstract: The search for extraterrestrial intelligence (SETI) targeted searches aim to observe specific areas and objects
    to find possible technosignatures. Many SETI researches have focused on nearby stars and their planets in recent years.
    In this paper, we report a targeted SETI observations using the most sensitive L-band Five-hundred-meter Aperture Spherical
    radio Telescope toward three nearby M dwarfs, all of which have been discovered exoplanet candidates. The minimum equivalent
    isotropic radiant power of the lower limit from the three sources we can detect is 6.19 × 10<SUP>8</SUP> W, which is well
    within the reach of current human technology. Applying the multibeam coincidence matching blind search mode, we search
