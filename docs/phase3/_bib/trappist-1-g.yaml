- &id391
  arxiv_id: '2401.16394'
  ads_bibcode: 2024NatAs...8.1399L
  title: The interior as the dominant water reservoir in super-Earths and sub-Neptunes
  authors:
  - Luo, Haiyang
  - Dorn, Caroline
  - Deng, Jie
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.1038/s41550-024-02347-z
  abstract: 'Water is an important component of exoplanets, with its distribution, that is, whether at the surface or deep
    inside, fundamentally influencing the planetary properties. The distribution of water in most exoplanets is determined
    by yet-unknown partition coefficients at extreme conditions. Here we first conduct ab initio molecular dynamics simulations
    to investigate the metal-silicate partition coefficients of water up to 1,000 GPa and then model planet interiors by considering
    the effects of water content on density, melting temperature and water partitioning. Our calculations reveal that water
    strongly partitions into iron over silicate at high pressures and, thus, would preferentially stay in a planet''s core.
    The results of our planet interior model challenge the notion of water worlds as imagined before: the majority of the
    bulk water budget (even more than 95%) can be stored deep within the core and the mantle, and not at the surface. For
    planets more massive than ~6 M<SUB>⨁</SUB> and Earth-size planets (of lower mass and small water budgets), the majority
    of water resides deep in the cores of planets. Whether water is assumed to be at the surface or at depth can affect the
    radius up to 15-25% for a given mass. The exoplanets previously believed to be water-poor on the basis of mass-radius
    data may actually be rich in water.'
