  arxiv_id: '1905.07347'
  ads_bibcode: 2019A&A...626A.111P
  title: Temporal changes of the flare activity of Proxima Centauri
  authors:
  - Pavlenko, Ya. V.
  - Suárez Mascareño, A.
  - Zapatero Osorio, M. R.
  - Rebolo, R.
  - Lodieu, N.
  - Béjar, V. J. S.
  - González Hernández, J. I.
  - Mohorian, M.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.1051/0004-6361/201834258
  abstract: 'Context. We study temporal variations of the emission lines of H<SUB>α</SUB>, H<SUB>∊</SUB>, H and K CaII, D<SUB>1</SUB>
    and D<SUB>2</SUB> NaI, He<SUB>4026</SUB>, and He<SUB>5876</SUB> in the HARPS spectra of Proxima Centauri across an extended
    time of 13.2 yr, from May 27, 2004 to September 30, 2017. <BR /> Aims: We analyse the common behaviour and differences
    in the intensities and profiles of different emission lines in flare and quiet modes of Proxima activity. <BR /> Methods:
    We compare the pseudo-equivalent widths (pEW) and profiles of the emission lines in the HARPS high-resolution (R 115 000)
    spectra observed at the same epochs. <BR /> Results: All emission lines show variability with a timescale of at least
    10 min. The strength of all lines except He<SUB>4026</SUB> correlate with H<SUB>α</SUB>. During strong flares the "red
    asymmetry" appears in the H<SUB>α</SUB> emission line indicating the infall of hot condensed matter into the chromosphere
    with velocities greater than 100 km s<SUP>-1</SUP> disturbing chromospheric layers. As a result, the strength of the CaII
    lines anti-correlates with H<SUB>α</SUB> during strong flares. The HeI lines at 4026 and 5876 Å appear in the strong flares.
    The cores of D<SUB>1</SUB> and D<SUB>2</SUB> NaI lines are also seen in emission. During the minimum activity of Proxima
    Centauri, CaII lines and H<SUB>∊</SUB> almost disappear while the blue part of the NaI emission lines is affected by the
    absorption in the extending and condensing flows. <BR /> Conclusions: We see different behaviour of emission lines formed
    in the flare regions and chromosphere. Chromosphere layers of Proxima Cen are likely heated by the flare events; these
    layers are cooled in the "non-flare" mode. The self-absorption structures in cores of our emission lines vary with time
    due to the presence of a complicated system of inward and outward matter flows in the absorbing layers. <P />Table A.1
    is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/626/A111">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/626/A111</A>'
