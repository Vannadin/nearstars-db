  abstract: We compile spectroscopic abundance data from 84 literature sources for 50 elements across 3058 stars in the solar
    neighborhood, within 150 pc of the Sun, to produce the Hypatia Catalog. We evaluate the variability of the spread in abundance
    measurements reported for the same star by different surveys. We also explore the likely association of the star within
    the Galactic disk, the corresponding observation and abundance determination methods for all catalogs in Hypatia, the
    influence of specific catalogs on the overall abundance trends, and the effect of normalizing all abundances to the same
    solar scale. The resulting stellar abundance determinations in the Hypatia Catalog are analyzed only for thin-disk stars
    with observations that are consistent between literature sources. As a result of our large data set, we find that the
    stars in the solar neighborhood may reveal an asymmetric abundance distribution, such that a [Fe/H]-rich group near the
    midplane is deficient in Mg, Si, S, Ca, Sc II, Cr II, and Ni as compared to stars farther from the plane. The Hypatia
    Catalog has a wide number of applications, including exoplanet hosts, thick- and thin-disk stars, and stars with different
    kinematic properties.
