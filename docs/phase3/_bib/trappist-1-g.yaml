  doi: 10.1051/0004-6361:20066514
  abstract: 'Context: The infrared wide-field camera (WFCAM) is now in operation on the 3.8 m UK Infrared Telescope on Mauna
    Kea. WFCAM currently has the fastest survey speed of any infrared camera in the world, and combined with generous allocations
    of telescope time, will produce deep maps of the sky from Z to K band. The data from a set of public surveys, known as
    UKIDSS, will be initially available to astronomers in ESO member states, and later to the world. <BR />Aims: In order
    to maximise survey speed, the WFCAM field of view was required to be as large as possible while incorporating conventional
    infrared-instrument design features such as a cold re-imaged pupil stop and cryogenic optics and mechanisms. <BR />Methods:
    The solution adopted was to build a cryogenic Schmidt-type camera, mounted forward of the primary mirror, which illuminates
    a very large 0.9° diameter focal plane, containing four 2k × 2k HgCdTe Rockwell detectors. <BR />Results: Following several
    commissioning periods during which the camera, focal plane and telescope optical axes were successfully co-aligned, WFCAM
    now operates close to specifications, regularly achieving 0.7́́ FWHM images over the full field. Projects which already
    report excellent results include the detection of variability in young stellar clusters, as well as preliminary deep IR
    imaging of the Subaru and XMM-Newton deep field.'
