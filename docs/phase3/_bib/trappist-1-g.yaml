  abstract: Using the cumulative catalog of planets detected by the NASA Kepler mission, we reconstruct the intrinsic occurrence
    of Earth- to Neptune-size (1-4 R <SUB>⊕</SUB>) planets and their distributions with radius and orbital period. We analyze
    76,711 solar-type (0.8 &lt; R <SUB>*</SUB>/R <SUB>☉</SUB> &lt; 1.2) stars with 430 planets on 20-200 day orbits, excluding
    close-in planets that may have been affected by the proximity to the host star. Our analysis considers errors in planet
    radii and includes an "iterative simulation" technique that does not bin the data. We find a radius distribution that
    peaks at 2-2.8 Earth radii, with lower numbers of smaller and larger planets. These planets are uniformly distributed
    with logarithmic period, and the mean number of such planets per star is 0.46 ± 0.03. The occurrence is ~0.66 if planets
    interior to 20 days are included. We estimate the occurrence of Earth-size planets in the "habitable zone" (defined as
    1-2 R <SUB>⊕</SUB>, 0.99-1.7 AU for solar-twin stars) as 6.4<SUP>+3.4</SUP><SUB>-1.1</SUB> %. Our results largely agree
    with those of Petigura et al., although we find a higher occurrence of 2.8-4 Earth-radii planets. The reasons for this
    excess are the inclusion of errors in planet radius, updated Huber et al. stellar parameters, and also the exclusion of
    planets that may have been affected by proximity to the host star.
