  arxiv_id: '2010.06928'
  ads_bibcode: 2020A&A...642A.121L
  title: Planetary system LHS 1140 revisited with ESPRESSO and TESS
  authors:
  - Lillo-Box, J.
  - Figueira, P.
  - Leleu, A.
  - Acuña, L.
  - Faria, J. P.
  - Hara, N.
  - Santos, N. C.
  - Correia, A. C. M.
