  arxiv_id: '1804.02775'
  ads_bibcode: 2018ApJ...858..119H
  title: 'Exploring the Atmosphere of Neoproterozoic Earth: The Effect of O<SUB>2</SUB> on Haze Formation and Composition'
  authors:
  - Hörst, Sarah M.
  - He, Chao
  - Ugelow, Melissa S.
  - Jellinek, A. Mark
  - Pierrehumbert, Raymond T.
  - Tolbert, Margaret A.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-4357/aabd7d
  abstract: Previous studies of haze formation in the atmosphere of the early Earth have focused on N<SUB>2</SUB>/CO<SUB>2</SUB>/CH<SUB>4</SUB>
    atmospheres. Here, we experimentally investigate the effect of O<SUB>2</SUB> on the formation and composition of aerosols
    to improve our understanding of haze formation on the Neoproterozoic Earth. We obtained in situ size, particle density,
    and composition measurements of aerosol particles produced from N<SUB>2</SUB>/CO<SUB>2</SUB>/CH<SUB>4</SUB>/O<SUB>2</SUB>
    gas mixtures subjected to FUV radiation (115-400 nm) for a range of initial CO<SUB>2</SUB>/CH<SUB>4</SUB>/O<SUB>2</SUB>
    mixing ratios (O<SUB>2</SUB> ranging from 2 ppm to 0.2%). At the lowest O<SUB>2</SUB> concentration (2 ppm), the addition
    increased particle production for all but one gas mixture. At higher oxygen concentrations (20 ppm and greater), particles
    are still produced, but the addition of O<SUB>2</SUB> decreases the production rate. Both the particle size and number
    density decrease with increasing O<SUB>2</SUB>, indicating that O<SUB>2</SUB> affects particle nucleation and growth.
    The particle density increases with increasing O<SUB>2</SUB>. The addition of CO<SUB>2</SUB> and O<SUB>2</SUB> not only
    increases the amount of oxygen in the aerosol, but it also increases the degree of nitrogen incorporation. In particular,
    the addition of O<SUB>2</SUB> results in the formation of nitrate-bearing molecules. The fact that the presence of oxygen-bearing
    molecules increases the efficiency of nitrogen fixation has implications for the role of haze as a source of molecules
    required for the origin and evolution of life. The composition changes also likely affect the absorption and scattering
    behavior of these particles but optical property measurements are required to fully understand the implications for the
    effect on the planetary radiative energy balance and climate.
