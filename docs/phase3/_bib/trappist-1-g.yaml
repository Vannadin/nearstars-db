- &id548
  arxiv_id: '1502.03605'
  ads_bibcode: 2015A&A...577A..83D
  title: Can we constrain the interior structure of rocky exoplanets from mass and radius measurements?
  authors:
  - Dorn, Caroline
  - Khan, Amir
  - Heng, Kevin
  - Connolly, James A. D.
  - Alibert, Yann
  - Benz, Willy
  - Tackley, Paul
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1051/0004-6361/201424915
  abstract: '<BR /> Aims: We present an inversion method based on Bayesian analysis to constrain the interior structure of
    terrestrial exoplanets, in the form of chemical composition of the mantle and core size. Specifically, we identify what
    parts of the interior structure of terrestrial exoplanets can be determined from observations of mass, radius, and stellar
    elemental abundances. <BR /> Methods: We perform a full probabilistic inverse analysis to formally account for observational
    and model uncertainties and obtain confidence regions of interior structure models. This enables us to characterize how
    model variability depends on data and associated uncertainties. <BR /> Results: We test our method on terrestrial solar
    system planets and find that our model predictions are consistent with independent estimates. Furthermore, we apply our
    method to synthetic exoplanets up to 10 Earth masses and up to 1.7 Earth radii, and to exoplanet Kepler-36b. Importantly,
    the inversion strategy proposed here provides a framework for understanding the level of precision required to characterize
    the interior of exoplanets. <BR /> Conclusions: Our main conclusions are (1) observations of mass and radius are sufficient
    to constrain core size; (2) stellar elemental abundances (Fe, Si, Mg) are principal constraints to reduce degeneracy in
    interior structure models and to constrain mantle composition; (3) the inherent degeneracy in determining interior structure
    from mass and radius observations does not only depend on measurement accuracies, but also on the actual size and density
    of the exoplanet. We argue that precise observations of stellar elemental abundances are central in order to place constraints
    on planetary bulk composition and to reduce model degeneracy. We provide a general methodology of analyzing interior structures
    of exoplanets that may help to understand how interior models are distributed among star systems. The methodology we propose
    is sufficiently general to allow its future extension to more complex internal structures including hydrogen- and water-rich
    exoplanets. <P />Appendices are available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201424915/olm">http://www.aanda.org</A>'
