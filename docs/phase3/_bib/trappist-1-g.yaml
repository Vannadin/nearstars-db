  arxiv_id: '1706.01224'
  ads_bibcode: 2017MNRAS.470.2270S
  title: Quantitative estimates of the surface habitability of Kepler-452b
  authors:
  - Silva, Laura
  - Vladilo, Giovanni
  - Murante, Giuseppe
  - Provenzale, Antonello
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.1093/mnras/stx1396
  abstract: Kepler-452b is currently the best example of an Earth-size planet in the habitable zone of a sun-like star, a
    type of planet whose number of detections is expected to increase in the future. Searching for biosignatures in the supposedly
    thin atmospheres of these planets is a challenging goal that requires a careful selection of the targets. Under the assumption
    of a rocky-dominated nature for Kepler-452b, we considered it as a test case to calculate a temperature-dependent habitability
    index, h<SUB>050</SUB>, designed to maximize the potential presence of biosignature-producing activity. The surface temperature
    has been computed for a broad range of climate factors using a climate model designed for terrestrial-type exoplanets.
    After fixing the planetary data according to the experimental results, we changed the surface gravity, CO<SUB>2</SUB>
    abundance, surface pressure, orbital eccentricity, rotation period, axis obliquity and ocean fraction within the range
    of validity of our model. For most choices of parameters, we find habitable solutions with h<SUB>050</SUB> &gt; 0.2 only
    for CO<SUB>2</SUB> partial pressure p_CO_2 ≲ 0.04 bar. At this limiting value of CO<SUB>2</SUB> abundance, the planet
    is still habitable if the total pressure is p ≲ 2 bar. In all cases, the habitability drops for eccentricity e ≳ 0.3.
    Changes of rotation period and obliquity affect the habitability through their impact on the equator-pole temperature
    difference rather than on the mean global temperature. We calculated the variation of h<SUB>050</SUB> resulting from the
    luminosity evolution of the host star for a wide range of input parameters. Only a small combination of parameters yields
    habitability-weighted lifetimes ≳2 Gyr, sufficiently long to develop atmospheric biosignatures still detectable at the
    present time.
