  ads_bibcode: 2017A&A...602A..88A
  title: The HARPS search for southern extra-solar planets. XLI. A dozen planets around the M dwarfs GJ 3138, GJ 3323, GJ
    273, GJ 628, and GJ 3293
  authors:
  - Astudillo-Defru, N.
  - Forveille, T.
  - Bonfils, X.
  - Ségransan, D.
  - Bouchy, F.
  - Delfosse, X.
  - Lovis, C.
  - Mayor, M.
  - Murgas, F.
  - Pepe, F.
  - Santos, N. C.
  - Udry, S.
  - Wünsche, A.
  year: '2017'
  pubdate: '2017-06-00'
  doi: 10.1051/0004-6361/201630153
  abstract: 'Context. Low-mass stars are currently the best targets when searching for rocky planets in the habitable zone
    of their host star. Over the last 13 yr, precise radial velocities measured with the HARPS spectrograph have identified
    over a dozen super-Earths and Earth-mass planets (msini ≤ 10M<SUB>⊕</SUB>) around M dwarfs, with a well-understood selection
    function. This well-defined sample provides information on their frequency of occurrence and on the distribution of their
    orbital parameters, and therefore already constrains our understanding of planetary formation. The subset of these low-mass
    planets that were found within the habitable zone of their host star also provide prized targets for future searches of
    atmospheric biomarkers. <BR /> Aims: We are working to extend this planetary sample to lower masses and longer periods
    through dense and long-term monitoring of the radial velocity of a small M dwarf sample. <BR /> Methods: We obtained large
    numbers of HARPS spectra for the M dwarfs GJ 3138, GJ 3323, GJ 273, GJ 628, and GJ 3293, from which we derived radial
    velocities (RVs) and spectroscopic activity indicators. We searched for variabilities, periodicities, Keplerian modulations,
    and correlations, and attribute the radial-velocity variations to combinations of planetary companions and stellar activity.
    <BR /> Results: We detect 12 planets, 9 of which are new with masses ranging from 1.17 to 10.5 M<SUB>⊕</SUB>. These planets
    have relatively short orbital periods (P&lt; 40 d), except for two that have periods of 217.6 and 257.8 days. Among these
    systems, GJ 273 harbor two planets with masses close to the Earth''s. With a distance of only 3.8 parsec, GJ 273 is the
    second nearest known planetary system - after Proxima Centauri - with a planet orbiting the circumstellar habitable zone.
    <P />Based on observations made with the HARPS instrument on the ESO 3.6 m telescope under the program IDs 180.C-0886(A),
    183.C-0437(A), and 191.C-0873(A) at Cerro La Silla (Chile).Radial velocity data (full Tables A.1-A.5) are only available
    at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A> (<A href="http://130.79.128.5">http://130.79.128.5</A>)
    or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/602/A88">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/602/A88</A>'
