  arxiv_id: '1608.04775'
  ads_bibcode: 2016AJ....152..141B
  title: 'The Solar Neighborhood. XXXVII: The Mass-Luminosity Relation for Main-sequence M Dwarfs'
  authors:
  - Benedict, G. F.
  - Henry, T. J.
  - Franz, O. G.
  - McArthur, B. E.
  - Wasserman, L. H.
  - Jao, Wei-Chun
  - Cargile, P. A.
  - Dieterich, S. B.
  - Bradley, A. J.
  - Nelan, E. P.
