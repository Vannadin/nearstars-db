- &id559
  arxiv_id: '1409.4779'
  ads_bibcode: 2015MNRAS.446.1424R
  title: 'IAS15: a fast, adaptive, high-order integrator for gravitational dynamics, accurate to machine precision over a
    billion orbits'
  authors:
  - Rein, Hanno
  - Spiegel, David S.
  year: '2015'
  pubdate: '2015-01-00'
  doi: 10.1093/mnras/stu2164
  abstract: We present IAS15, a 15th-order integrator to simulate gravitational dynamics. The integrator is based on a Gauß-Radau
    quadrature and can handle conservative as well as non-conservative forces. We develop a step-size control that can automatically
    choose an optimal timestep. The algorithm can handle close encounters and high-eccentricity orbits. The systematic errors
    are kept well below machine precision, and long-term orbit integrations over 10<SUP>9</SUP> orbits show that IAS15 is
    optimal in the sense that it follows Brouwer's law, i.e. the energy error behaves like a random walk. Our tests show that
    IAS15 is superior to a mixed-variable symplectic integrator and other popular integrators, including high-order ones,
    in both speed and accuracy. In fact, IAS15 preserves the symplecticity of Hamiltonian systems better than the commonly
    used nominally symplectic integrators to which we compared it. We provide an open-source implementation of IAS15. The
    package comes with several easy-to-extend examples involving resonant planetary systems, Kozai-Lidov cycles, close encounters,
    radiation pressure, quadrupole moment and generic damping functions that can, among other things, be used to simulate
    planet-disc interactions. Other non-conservative forces can be added easily.
  source: citation_of=2025arXiv251219226D
