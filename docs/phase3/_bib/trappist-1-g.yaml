- &id450
  arxiv_id: '2006.13962'
  ads_bibcode: 2020AJ....160...81K
  title: 'Dynamical Packing in the Habitable Zone: The Case of Beta CVn'
  authors:
  - Kane, Stephen R.
  - Turnbull, Margaret C.
  - Fulton, Benjamin J.
  - Rosenthal, Lee J.
  - Howard, Andrew W.
  - Isaacson, Howard
  - Marcy, Geoffrey W.
  - Weiss, Lauren M.
  year: '2020'
  pubdate: '2020-08-00'
  doi: 10.3847/1538-3881/ab9ffe
  abstract: Uncovering the occurrence rate of terrestrial planets within the habitable zone (HZ) of their host stars has been
    a particular focus of exoplanetary science in recent years. The statistics of these occurrence rates have largely been
    derived from transiting planet discoveries, and have uncovered numerous HZ planets in compact systems around M-dwarf host
    stars. Here we explore the width of the HZ as a function of spectral type, and the dynamical constraints on the number
    of stable orbits within the HZ for a given star. We show that, although the Hill radius for a given planetary mass increases
    with larger semimajor axis, the width of the HZ for earlier-type stars allows for more terrestrial planets in the HZ than
    late-type stars. In general, dynamical constraints allow ∼6 HZ Earth-mass planets for stellar masses ≳0.7M<SUB>☉</SUB>,
    depending on the presence of farther out giant planets. As an example, we consider the case of Beta CVn, a nearby bright
    solar-type star. We present 20 yr of radial velocities (RV) from the Keck/High Resolution Echelle Spectrometer (HIRES)
    and Automated Planet Finder (APF) instruments and conduct an injection-recovery analysis of planetary signatures in the
    data. Our analysis of these RV data rule out planets more massive than Saturn within 10 au of the star. These system properties
    are used to calculate the potential dynamical packing of terrestrial planets in the HZ and show that such nearby stellar
    targets could be particularly lucrative for HZ planet detection by direct imaging exoplanet missions.
