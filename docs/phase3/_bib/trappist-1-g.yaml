  arxiv_id: '2002.03248'
  ads_bibcode: 2020AJ....159..144L
  title: Implications of Abiotic Oxygen Buildup for Earth-like Complex Life
  authors:
  - Lingam, Manasvi
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-3881/ab737f
  abstract: One of the chief paradoxes of molecular oxygen (O<SUB>2</SUB>) is that it is an essential requirement for multicellular
    eukaryotes on Earth while simultaneously posing a threat to their survival via the formation of reactive oxygen species.
    In this paper, the constraints imposed by O<SUB>2</SUB> on Earth-like complex life are invoked to explore whether worlds
    with abiotic O<SUB>2</SUB> inventories can harbor such organisms. By taking the major O<SUB>2</SUB> sources and sinks
    of Earth-like planets into account using a simple model, it is suggested that worlds that receive time-averaged X-ray
    and extreme ultraviolet fluxes that are ≳10 times higher than Earth might not be capable of hosting complex lifeforms
    because the photolysis of molecules such as water may lead to significant O<SUB>2</SUB> buildup. Methods for testing this
    hypothesis by searching for anticorrelations between biosignatures and indicators of abiotic O<SUB>2</SUB> atmospheres
    are described. In the event, however, that life successfully adapts to high-oxygen environments, these worlds could permit
    the evolution of large and complex organisms.
