  abstract: We describe the contents and functionality of the NASA Exoplanet Archive, a database and toolset funded by NASA
    to support astronomers in the exoplanet community. The current content of the database includes interactive tables containing
    properties of all published exoplanets, Kepler planet candidates, threshold-crossing events, data validation reports and
    target stellar parameters, light curves from the Kepler and CoRoT missions and from several ground-based surveys, and
    spectra and radial velocity measurements from the literature. Tools provided to work with these data include a transit
    ephemeris predictor, both for single planets and for observing locations, light curve viewing and normalization utilities,
    and a periodogram and phased light curve service. The archive can be accessed at <A href="http://exoplanetarchive.ipac.caltech.edu">http://exoplanetarchive.ipac.caltech.edu</A>.
