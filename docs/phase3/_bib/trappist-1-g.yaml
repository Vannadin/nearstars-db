- &id842
  arxiv_id: '1906.05371'
  ads_bibcode: 2020ApJ...895....4U
  title: Streaming Instability in Turbulent Protoplanetary Disks
  authors:
  - Umurhan, Orkan M.
  - Estrada, Paul R.
  - Cuzzi, Jeffrey N.
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.3847/1538-4357/ab899d
  abstract: The streaming instability for solid particles in protoplanetary disks is reexamined assuming the familiar alpha
    (α) model for isotropic turbulence. Turbulence always reduces the growth rates of the streaming instability relative to
    values calculated for globally laminar disks. While for small values of the turbulence parameter, α &lt; 10<SUP>-5</SUP>,
    the wavelengths of the fastest growing disturbances are small fractions of the local gas vertical scale height H, we find
    that for moderate values of the turbulence parameter, I.e., α ∼ 10<SUP>-5</SUP>-10<SUP>-3</SUP>, the length scales of
    maximally growing disturbances shift toward larger scales, approaching H. At these moderate turbulent intensities and
    for local particle to gas mass density ratios ∊ &lt; 0.5, the vertical scales of the most unstable modes begin to exceed
    the corresponding radial scales so that the instability appears in the form of vertically oriented sheets extending well
    beyond the particle scale height. We find that for hydrodynamical turbulent disk models reported in the literature, with
    α = 4 × 10<SUP>-5</SUP>-5 × 10<SUP>-4</SUP>, together with state-of-the-art global evolution models of particle growth,
    the streaming instability is predicted to be viable within a narrow triangular patch of α-τ<SUB>s</SUB> parameter space
    centered on Stokes numbers, τ<SUB>s</SUB> ∼ 0.01 and α ∼ 4 × 10<SUP>-5</SUP>, and further, exhibits growth rates on the
    order of several hundreds to thousands of orbit times for disks with 1% (Z = 0.01) cosmic solids abundance or metallicity.
    Our results are consistent with, and place in context, published numerical studies of streaming instabilities.
