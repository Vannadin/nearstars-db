  arxiv_id: '1606.03134'
  ads_bibcode: 2016PASP..128k4401H
  title: Limits on Planetary Companions from Doppler Surveys of Nearby Stars
  authors:
  - Howard, Andrew W.
  - Fulton, Benjamin J.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.1088/1538-3873/128/969/114401
  abstract: Most of our knowledge of planets orbiting nearby stars comes from Doppler surveys. For spaced-based, high-contrast
    imaging missions, nearby stars with Doppler-discovered planets are attractive targets. The known orbits tell imaging missions
    where and when to observe, and the dynamically determined masses provide important constraints for the interpretation
    of planetary spectra. Quantifying the set of planet masses and orbits that could have been detected will enable more efficient
    planet discovery and characterization. We analyzed Doppler measurements from Lick and Keck Observatories by the California
    Planet Survey. We focused on stars that are likely targets for three space-based planet imaging mission concepts studied
    by NASA—WFIRST-AFTA, Exo-C, and Exo-S. The Doppler targets are primarily F8 and later main sequence stars, with observations
    spanning 1987-2014. We identified 76 stars with Doppler measurements from the prospective mission target lists. We developed
    an automated planet search and a methodology to estimate the pipeline completeness using injection and recovery tests.
    We applied this machinery to the Doppler data and computed planet detection limits for each star as a function of planet
    minimum mass and semimajor axis. For typical stars in the survey, we are sensitive to approximately Saturn-mass planets
    inside of 1 au, Jupiter-mass planets inside of ∼3 au, and our sensitivity declines out to ∼10 au. For the best Doppler
    targets, we are sensitive to Neptune-mass planets in 3 au orbits. Using an idealized model of Doppler survey completeness,
    we forecast the precision of future surveys of non-ideal Doppler targets that are likely targets of imaging missions.
    <P />Based on observations obtained at the W. M. Keck Observatory, which is operated jointly by the University of California
    and the California Institute of Technology. Keck time has been granted by NASA, the University of California, and the
    University of Hawaii.
