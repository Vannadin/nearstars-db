  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.1051/0004-6361/202039734
  abstract: 'Context. Gaia Early Data Release 3 (Gaia EDR3) provides accurate astrometry for about 1.6 million compact (QSO-like)
    extragalactic sources, 1.2 million of which have the best-quality five-parameter astrometric solutions. <BR /> Aims: The
    proper motions of QSO-like sources are used to reveal a systematic pattern due to the acceleration of the solar systembarycentre
    with respect to the rest frame of the Universe. Apart from being an important scientific result by itself, the acceleration
    measured in this way is a good quality indicator of the Gaia astrometric solution. <BR /> Methods: Theeffect of the acceleration
    was obtained as a part of the general expansion of the vector field of proper motions in vector spherical harmonics (VSH).
    Various versions of the VSH fit and various subsets of the sources were tried and compared to get the most consistent
    result and a realistic estimate of its uncertainty. Additional tests with the Gaia astrometric solution were used to get
    a better idea of the possible systematic errors in the estimate. <BR /> Results: Our best estimate of the acceleration
    based on Gaia EDR3 is (2.32 ± 0.16) × 10<SUP>‒10</SUP> m s<SUP>‒2</SUP> (or 7.33 ±0.51 km s<SUP>‒1</SUP> Myr‒1) towards
    α = 269.1° ± 5.4°, δ = ‒31.6° ± 4.1°, corresponding to a proper motion amplitude of 5.05 ±0.35 μas yr<SUP>‒1</SUP>. This
    is in good agreement with the acceleration expected from current models of the Galactic gravitational potential. We expect
    that future Gaia data releases will provide estimates of the acceleration with uncertainties substantially below 0.1 μas
    yr<SUP>‒1</SUP>. <P />Movie is only available at <A href="https://www.aanda.org/10.1051/0004-6361/202039734/olm">https://www.aanda.org</A>'
