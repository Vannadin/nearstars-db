  arxiv_id: '2005.11939'
  ads_bibcode: 2020NatAs...4..951G
  title: Aerosol composition of hot giant exoplanets dominated by silicates and hydrocarbon hazes
  authors:
  - Gao, Peter
  - Thorngren, Daniel P.
  - Lee, Elspeth K. H.
  - Fortney, Jonathan J.
  - Morley, Caroline V.
  - Wakeford, Hannah R.
  - Powell, Diana K.
  - Stevenson, Kevin B.
  - Zhang, Xi
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1038/s41550-020-1114-3
  abstract: Aerosols are common in the atmospheres of exoplanets across a wide swath of temperatures, masses and ages<SUP>1-3</SUP>.
    These aerosols strongly impact observations of transmitted, reflected and emitted light from exoplanets, obfuscating our
    understanding of exoplanet thermal structure and composition<SUP>4-6</SUP>. Knowing the dominant aerosol composition would
    facilitate interpretations of exoplanet observations and theoretical understanding of their atmospheres. A variety of
    compositions have been proposed, including metal oxides and sulfides, iron, chromium, sulfur and hydrocarbons<SUP>7-11</SUP>.
    However, the relative contributions of these species to exoplanet aerosol opacity is unknown. Here we show that the aerosol
    composition of giant exoplanets observed in transmission is dominated by silicates and hydrocarbons. By constraining an
    aerosol microphysics model with trends in giant exoplanet transmission spectra, we find that silicates dominate aerosol
    opacity above planetary equilibrium temperatures of 950 K due to low nucleation energy barriers and high elemental abundances,
    while hydrocarbon aerosols dominate below 950 K due to an increase in methane abundance. Our results are robust to variations
    in planet gravity and atmospheric metallicity within the range of most giant transiting exoplanets. We predict that spectral
    signatures of condensed silicates in the mid-infrared are most prominent for hot (&gt;1,600 K), low-gravity (&lt;10 m
    s<SUP>‒2</SUP>) objects.
