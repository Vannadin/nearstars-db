  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1088/0004-637X/767/1/94
  abstract: We present a targeted search for narrow-band (&lt;5 Hz) drifting sinusoidal radio emission from 86 stars in the
    Kepler field hosting confirmed or candidate exoplanets. Radio emission less than 5 Hz in spectral extent is currently
    known to only arise from artificial sources. The stars searched were chosen based on the properties of their putative
    exoplanets, including stars hosting candidates with 380 K &gt; T <SUB>eq</SUB> &gt; 230 K, stars with five or more detected
    candidates or stars with a super-Earth (R <SUB>p</SUB> &lt; 3 R <SUB>⊕</SUB>) in a &gt;50 day orbit. Baseband voltage
    data across the entire band between 1.1 and 1.9 GHz were recorded at the Robert C. Byrd Green Bank Telescope between 2011
    February and April and subsequently searched offline. No signals of extraterrestrial origin were found. We estimate that
    fewer than ~1% of transiting exoplanet systems host technological civilizations that are radio loud in narrow-band emission
    between 1 and 2 GHz at an equivalent isotropically radiated power (EIRP) of ~1.5 × 10<SUP>21</SUP> erg s<SUP>-1</SUP>,
    approximately eight times the peak EIRP of the Arecibo Planetary Radar, and we limit the number of 1-2 GHz narrow-band-radio-loud
    Kardashev type II civilizations in the Milky Way to be {&lt;}10^{-6}\ M^{-1}_\odot. Here we describe our observations,
    data reduction procedures and results.
