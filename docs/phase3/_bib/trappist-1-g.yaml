  arxiv_id: '2003.08812'
  ads_bibcode: 2020MNRAS.494.1297M
  title: Global trends in winds of M dwarf stars
  authors:
  - Mesquita, A. L.
  - Vidotto, A. A.
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1093/mnras/staa798
  abstract: M dwarf stars are currently the main targets in searches for potentially habitable planets. However, their winds
    have been suggested to be harmful to planetary atmospheres. Here, in order to better understand the winds of M dwarfs
    and also infer their physical properties, we perform a one-dimensional magnetohydrodynamic parametric study of winds of
    M dwarfs that are heated by current biases in planet dissipation of Alfvén waves. These waves are triggered by sub-surface
    convective motions and propagate along magnetic field lines. Here, we vary the magnetic field strength B<SUB>0</SUB> and
    density ρ<SUB>0</SUB> at the wind base (chromosphere), while keeping the same relative wave amplitude (0.1B<SUB>0</SUB>)
    and dissipation length-scale. Our simulations thus range from low plasma-β to high plasma-β (0.005-3.7). We find that
    our winds very quickly reach isothermal temperatures with mass-loss rates \dot{M} ∝ ρ<SUB>0</SUB><SUP>2</SUP>. We compare
    our results with Parker wind (PW) models and find that, in the high-β regime, both models agree. However, in the low-β
    regime, the PW underestimates the terminal velocity by around one order of magnitude and \dot{M} by several orders of
    magnitude. We also find that M dwarfs could have chromospheres extending to 18 to 180 per cent of the stellar radius.
    We apply our model to the planet-hosting star GJ 436 and find, from X-ray observational constraints, \dot{M}&lt; 7.6×
    10<SUP>-15</SUP> M<SUB>☉</SUB> yr<SUP>-1</SUP>. This is in agreement with values derived from the Lyman-α transit of GJ
    436b, indicating that spectroscopic planetary transits could be used as a way to study stellar wind properties.
