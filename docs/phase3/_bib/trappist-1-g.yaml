  ads_bibcode: 2020MNRAS.493..536D
  title: 'RedDots: a temperate 1.5 Earth-mass planet candidate in a compact multiterrestrial planet system around GJ 1061'
  authors:
  - Dreizler, S.
  - Jeffers, S. V.
  - Rodríguez, E.
  - Zechmeister, M.
  - Barnes, J. R.
  - Haswell, C. A.
