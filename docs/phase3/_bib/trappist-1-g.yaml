- &id782
  arxiv_id: '2105.09966'
  ads_bibcode: 2021MNRAS.505.2224S
  title: On planetary systems as ordered sequences
  authors:
  - Sandford, Emily
  - Kipping, David
  - Collins, Michael
  year: '2021'
  pubdate: '2021-08-00'
  doi: 10.1093/mnras/stab1480
  abstract: 'A planetary system consists of a host star and one or more planets, arranged into a particular configuration.
    Here, we consider what information belongs to the configuration, or ordering, of 4286 Kepler planets in their 3277 planetary
    systems. First, we train a neural network model to predict the radius and period of a planet based on the properties of
    its host star and the radii and period of its neighbours. The mean absolute error (MAE) of the predictions of the trained
    model is a factor of 2.1 better than the MAE of the predictions of a naive model that draws randomly from dynamically
    allowable periods and radii. Secondly, we adapt a model used for unsupervised part-of-speech tagging in computational
    linguistics to investigate whether planets or planetary systems fall into natural categories with physically interpretable
    ''grammatical rules.'' The model identifies two robust groups of planetary systems: (1) compact multiplanet systems and
    (2) systems around giant stars (log g ≲ 4.0), although the latter group is strongly sculpted by the selection bias of
    the transit method. These results reinforce the idea that planetary systems are not random sequences - instead, as a population,
    they contain predictable patterns that can provide insight into the formation and evolution of planetary systems.'
  source: citation_of=2024NatAs...8..810T
