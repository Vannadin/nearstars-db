- &id638
  arxiv_id: '2501.14016'
  ads_bibcode: 2025NatAs...9..512C
  title: Highly reflective white clouds on the western dayside of an exo-Neptune
  authors:
  - Coulombe, Louis-Philippe
  - Radica, Michael
  - Benneke, Björn
  - D'Aoust, Élyse
  - Dang, Lisa
  - Cowan, Nicolas B.
  - Parmentier, Vivien
  - Albert, Loïc
  - Lafrenière, David
  - Taylor, Jake
  - Roy, Pierre-Alexis
  - Pelletier, Stefan
  - Allart, Romain
  - Artigau, Étienne
  - Doyon, René
  - Jayawardhana, Ray
  - Johnstone, Doug
  - Kaltenegger, Lisa
  - Langeveld, Adam B.
  - MacDonald, Ryan J.
  - Rowe, Jason F.
  - Turner, Jake D.
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.1038/s41550-025-02488-9
  abstract: Highly irradiated gas giant exoplanets are predicted to show circulation patterns dominated by day-to-night heat
    transport and a spatial distribution of clouds that is driven by advection and local heating. Hot Jupiters have been extensively
    studied from broadband phase-curve observations at infrared and optical wavelengths, but spectroscopic observations in
    the reflected light are rare and the regime of smaller and higher-metallicity ultrahot planets, such as hot Neptunes,
    remains largely unexplored. Here we present the phase-resolved reflected light and thermal emission spectroscopy of the
    ultrahot Neptune LTT 9779 b, obtained through observing its full phase curve from 0.6 μm to 2.8 μm with the NIRISS/SOSS
    instrument onboard the JWST. We detect an asymmetric dayside in reflected light (3.1σ significance) with highly reflective
    white clouds on the western dayside (albedo A = 0.79 ± 0.15) and a much lower-albedo eastern dayside (A = 0.41 ± 0.10),
    resulting in an overall dayside albedo of A = 0.50 ± 0.07. The thermal phase curve is symmetric about the substellar point,
    with a dayside effective temperature of T<SUB>eff ,day</SUB>=2,260<SUB>‒50</SUB><SUP>+40</SUP>K and a cold nightside (T<SUB>eff,night</SUB>
    &lt; 1,330 K at 3σ confidence), indicative of short radiative timescales. We propose an atmospheric circulation and cloud
    distribution regime in which heat is transported eastwards from the dayside towards the cold nightside by an equatorial
    jet, leading to a colder western dayside where temperatures are sufficiently low for the condensation of silicate clouds.
