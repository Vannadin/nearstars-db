- &id1282
  arxiv_id: null
  ads_bibcode: 2015Icar..257..290K
  title: The molecular composition of impact-generated atmospheres on terrestrial planets during the post-accretion stage
  authors:
  - Kuwahara, Hideharu
  - Sugita, Seiji
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1016/j.icarus.2015.05.007
  abstract: 'Both geochemical measurements and theoretical calculations suggest that impact degassing from meteoritic materials
    after the completion of main phase of planetary accretion may have produced a large fraction of the early terrestrial
    atmospheres. However, the molecular compositions of such impact-generated atmospheres are not well constrained because
    the thermodynamic cooling path, which controls the chemical reactions in impact-induced vapor, has not been investigated
    extensively. In this study, we theoretically assess the chemical reactions within impact-induced vapor that cools adiabatically
    until the pressure equilibrates with the ambient atmosphere. <P />The calculation results indicate that there are two
    primary controlling factors for the cooling path: impact entropy gain and atmospheric pressure. The former is mainly determined
    by both impact velocity and the presence/absence of an ocean. The degree of atmospheric effect depends on vapor plume
    size. For large impacts, atmospheric containment of vapor expansion is inefficient. However, the expansion of small vapor
    plumes is contained by the pre-existing atmosphere and their terminal molecular composition is controlled by this process.
    This is because whether a chemical reaction quenches during adiabatic cooling or during subsequent radiative cooling would
    depend on the cooling transition temperature, at which adiabatic expansion stops and radiative cooling takes over. For
    high atmospheric pressures and/or the vapor generated by high-velocity impacts, adiabatic expansion will cease at higher
    temperatures than typical quenching temperatures. Thus, the molecular composition of the vapor will not greatly depend
    on the impact velocity. The calculation results suggest that the molecular composition of the impact-induced vapor would
    vary widely (i.e., CH<SUB>4</SUB>/CO ratios) even if the compositions of the impactors are the same. More specifically,
    the impact-induced vapor generated by lower velocity impacts may be rich in CH<SUB>4</SUB>. Given average impact conditions
    on terrestrial planets, these calculation results further suggest that impact-generated atmospheres may have been rich
    in CH<SUB>4</SUB> on Mars and an ocean-covered Earth and rich in H<SUB>2</SUB> and CO on land-covered Venus and super
    Earths.'
