- &id1345
  arxiv_id: null
  ads_bibcode: 2016ApJ...831...20B
  title: C/O and Mg/Si Ratios of Stars in the Solar Neighborhood
  authors:
  - Brewer, John M.
  - Fischer, Debra A.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.3847/0004-637X/831/1/20
  abstract: The carbon-to-oxygen ratio in a protoplanetary disk can have a dramatic influence on the compositions of any terrestrial
    planets formed. In regions of high C/O, planets form primarily from carbonates, and in regions of low C/O, the ratio of
    magnesium to silicon determines the types of silicates that dominate the compositions. We present C/O and Mg/Si ratios
    for 852 F, G, and K dwarfs in the solar neighborhood. We find that the frequency of carbon-rich dwarfs in the solar neighborhood
    is &lt; 0.13 % and that 156 known planet hosts in the sample follow a similar distribution as all of the stars as a whole.
    The cosmic distribution of Mg/Si for these same stars is broader than the C/O distribution and peaks near 1.0, with ∼
    60 % of systems having 1 ≤slant Mg/Si &lt; 2, leading to rocky planet compositions similar to the Earth. This leaves 40%
    of systems that can have planets that are silicate-rich and that may have very different compositions than our own.
