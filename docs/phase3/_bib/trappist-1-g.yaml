  doi: 10.1088/0034-4885/79/10/102601
  abstract: Life is so remarkable, and so unlike any other physical system, that it is tempting to attribute special factors
    to it. Physics is founded on the assumption that universal laws and principles underlie all natural phenomena, but is
    it far from clear that there are ‘laws of life’ with serious descriptive or predictive power analogous to the laws of
    physics. Nor is there (yet) a ‘theoretical biology’ in the same sense as theoretical physics. Part of the obstacle in
    developing a universal theory of biological organization concerns the daunting complexity of living organisms. However,
    many attempts have been made to glimpse simplicity lurking within this complexity, and to capture this simplicity mathematically.
    In this paper we review a promising new line of inquiry to bring coherence and order to the realm of biology by focusing
    on ‘information’ as a unifying concept.
