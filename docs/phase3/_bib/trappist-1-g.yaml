    the TRAPPIST-1 system between 2017 and 2022, covering three to five transits for each of its seven planets. We rule out
    transit depths ≳30%, prompting a revision of atmospheric escape rates, with upper limits <inline-formula> <mml:math><mml:mi>O</mml:mi><mml:mo>(</mml:mo><mml:mn>10</mml:mn><mml:mo>)</mml:mo><mml:mo>×</mml:mo></mml:math>
