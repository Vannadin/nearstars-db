- &id522
  arxiv_id: '1704.00400'
  ads_bibcode: 2017ApJ...839..111L
  title: 'H-atmospheres of Icy Super-Earths Formed In Situ in the Outer Solar System: An Application to a Possible Planet
    Nine'
  authors:
  - Levi, A.
  - Kenyon, S. J.
  - Podolak, M.
  - Prialnik, D.
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.3847/1538-4357/aa6ba6
  abstract: We examine the possibility that icy super-Earth mass planets, formed over long timescales (0.1-1 Gyr) at large
    distances (∼200-1000 au) from their host stars, will develop massive H-rich atmospheres. Within the interior of these
    planets, high pressure converts CH<SUB>4</SUB> into ethane, butane, or diamond and releases H<SUB>2</SUB>. Using simplified
    models that capture the basic physics of the internal structure, we show that the physical properties of the atmosphere
    depend on the outflux of H<SUB>2</SUB> from the mantle. When this outflux is ≲ {10}<SUP>10</SUP> molec cm<SUP>-2</SUP>
    s<SUP>-1</SUP>, the outgassed atmosphere has a base pressure of ≲1 bar. Larger outflows result in a substantial atmosphere
    where the base pressure may approach 10<SUP>3</SUP>-10<SUP>4</SUP> bar. For any pressure, the mean density of these planets,
    2.4-3 g cm<SUP>-3</SUP>, is much larger than the mean density of Uranus and Neptune, 1.3-1.6 g cm<SUP>-3</SUP>. Thus,
    observations can distinguish between a Planet Nine with a primordial H/He-rich atmosphere accreted from the protosolar
    nebula and one with an atmosphere outgassed from the core.
