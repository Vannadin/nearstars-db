- &id134
  arxiv_id: '2310.04302'
  ads_bibcode: 2024ApJ...960...62E
  title: 'Living with a Red Dwarf: X-Ray, UV, and Ca II Activity-Age Relationships of M Dwarfs'
  authors:
  - Engle, Scott G.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-4357/ad0840
  abstract: The vast majority of stars in the nearby stellar neighborhood are M dwarfs. Their low masses and luminosities
    result in slow rates of nuclear evolution and minimal changes to the stars' observable properties, even along astronomical
    timescales. However, they possess relatively powerful magnetic dynamos and resulting X-ray to UV (X-UV) activity, compared
    to their bolometric luminosities. This magnetic activity does undergo an observable decline over time, potentially making
    it a key age determinant for M dwarfs. Observing this activity is important for studying the outer atmospheres of these
    stars, but also for comparing the behaviors of different spectral type subsets of M dwarfs; e.g., those with partially
    versus fully convective interiors. Beyond stellar astrophysics, understanding the X-UV activity of M dwarfs over time
    is a key component when studying the atmospheres and habitability of any hosted exoplanets. Earth-sized exoplanets, in
    particular, are more commonly found orbiting M dwarfs than any other stellar type, and thermal escape (driven by the M
    dwarf X-UV activity) is believed to be the dominant atmospheric loss mechanism for these planets. Utilizing recently calibrated
    M dwarf age-rotation relationships, also constructed as part of the Living with a Red Dwarf program, we have analyzed
    the evolution of M dwarf activity over time, in terms of coronal (X-ray), chromospheric (Lyα, and Ca II), and overall
    X-UV (5-1700 Å) emissions. The activity-age relationships presented here will be useful for studying exoplanet habitability
    and atmospheric loss, and also for studying the different dynamo and outer atmospheric heating mechanisms at work in M
    dwarfs.
