  ads_bibcode: 2016Natur.535..258C
  title: Imaging the water snow-line during a protostellar outburst
  authors:
  - Cieza, Lucas A.
  - Casassus, Simon
  - Tobin, John
  - Bos, Steven P.
  - Williams, Jonathan P.
  - Perez, Sebastian
  - Zhu, Zhaohuan
