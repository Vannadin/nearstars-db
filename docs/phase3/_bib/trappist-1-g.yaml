  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.1093/mnras/stz2018
  abstract: The exoplanet WASP-12b is the prototype for the emerging class of ultrahot, Jupiter-mass exoplanets. Past models
    have predicted - and near-ultraviolet observations have shown - that this planet is losing mass. We present an analysis
    of two sets of 3.6 and 4.5 μ {m}Spitzer phase curve observations of the system which show clear evidence of infrared radiation
    from gas stripped from the planet, and the gas appears to be flowing directly toward or away from the host star. This
    accretion signature is only seen at 4.5 μ {m}, not at 3.6 μ {m}, which is indicative either of CO emission at the longer
    wavelength or blackbody emission from cool, ≲600 K gas. It is unclear why WASP-12b is the only ultrahot Jupiter to exhibit
    this mass-loss signature, but perhaps WASP-12b's orbit is decaying as some have claimed, while the orbits of other exoplanets
    may be more stable; alternatively, the high-energy irradiation from WASP-12A may be stronger than the other host stars.
    We also find evidence for phase offset variability at the level of 6.4σ (46.2°) at 3.6 μ {m}.
