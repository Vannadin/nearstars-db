  arxiv_id: '2205.12971'
  ads_bibcode: 2022A&A...664A.180S
  title: 'RV-detected planets around M dwarfs: Challenges for core accretion models'
  authors:
  - Schlecker, M.
  - Burn, R.
  - Sabotta, S.
  - Seifert, A.
  - Henning, Th.
  - Emsenhuber, A.
  - Mordasini, C.
