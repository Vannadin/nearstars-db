- &id095
  arxiv_id: '2006.07403'
  ads_bibcode: 2020ApJ...898L..17L
  title: A Geologically Robust Procedure for Observing Rocky Exoplanets to Ensure that Detection of Atmospheric Oxygen Is
    a Modern Earth-like Biosignature
  authors:
  - Lisse, Carey M.
  - Desch, Steven J.
  - Unterborn, Cayman T.
  - Kane, Stephen R.
  - Young, Patrick R.
  - Hartnett, Hilairy E.
  - Hinkel, Natalie R.
  - Shim, Sang-Heon
  - Mamajek, Eric E.
  - Izenberg, Noam R.
  year: '2020'
  pubdate: '2020-07-00'
  doi: 10.3847/2041-8213/ab9b91
  abstract: 'In the next decades, the astrobiological community will debate whether the first observations of oxygen in an
    exoplanet''s atmosphere signify life, so it is critical to establish procedures now for collection and interpretation
    of such data. We present a step-by-step observational strategy for using oxygen as a robust biosignature to prioritize
    exoplanet targets and design future observations. It is premised on avoiding planets lacking subaerial weathering of continents,
    which would imply geochemical cycles drastically different from modern Earth''s, precluding use of oxygen as a biosignature.
    The strategy starts with the most readily obtained data: orbital semimajor axis and stellar luminosity to ensure residence
    in the habitable zone and stellar X-ray/ultraviolet flux to ensure an exoplanet can retain a secondary (outgassed) atmosphere.
    Next, high-precision mass and radius information should be combined with high-precision stellar abundance data to constrain
    the exoplanet''s water content; those incompatible with &lt;0.1 wt% H<SUB>2</SUB>O can be deprioritized. Then, reflectance
    photometry or low-resolution transmission spectroscopy should confirm an optically thin atmosphere. Subsequent long-duration,
    high-resolution transmission spectroscopy should search for oxygen and ensure that water vapor and CO<SUB>2</SUB> are
    present only at low (∼10<SUP>2</SUP>-10<SUP>4</SUP> ppm levels). Assuming oxygen is found, attribution to life requires
    the most difficult step, acquisition of a detailed, multispectral light curve of the exoplanet, to ensure both surface
    land and water. Exoplanets failing some of these steps might be habitable, even have observable biogenic oxygen, but should
    be deprioritized because oxygen could not be attributed unambiguously to life, and life therefore would not be detectable
    on such planets. Finally, we show how to use this scheme for the solar system, the 55 Cnc system, and the TRAPPIST-1 system,
    in which only the Earth and TRAPPIST-1e successfully pass through our procedure.'
