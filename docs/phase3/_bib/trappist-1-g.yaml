  arxiv_id: '2306.05322'
  ads_bibcode: 2023AJ....166...35B
  title: 'The MUSCLES Extension for Atmospheric Transmission Spectroscopy: UV and X-Ray Host-star Observations for JWST ERS
    &amp; GTO Targets'
  authors:
  - Behr, Patrick R.
  - France, Kevin
  - Brown, Alexander
  - Duvvuri, Girish
  - Bean, Jacob L.
  - Berta-Thompson, Zachory
