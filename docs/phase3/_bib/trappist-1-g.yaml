  arxiv_id: '2105.00142'
  ads_bibcode: 2019ApJ...876...22M
  title: 'The Sub-Neptune Desert and Its Dependence on Stellar Type: Controlled by Lifetime X-Ray Irradiation'
  authors:
  - McDonald, George D.
  - Kreidberg, Laura
  - Lopez, Eric
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.3847/1538-4357/ab1095
  abstract: Short-period sub-Neptunes with substantial volatile envelopes are among the most common type of known exoplanets.
    However, recent studies of the Kepler population have suggested a dearth of sub-Neptunes on highly irradiated orbits,
    where they are vulnerable to atmospheric photoevaporation. Physically, we expect this “photoevaporation desert” to depend
    on the total lifetime X-ray and extreme ultraviolet flux, the main drivers of atmospheric escape. In this work, we study
    the demographics of sub-Neptunes as a function of lifetime exposure to high-energy radiation and host-star mass. We find
    that for a given present-day insolation, planets orbiting a 0.3 M <SUB>☉</SUB> star experience ∼100× more X-ray flux over
    their lifetimes versus a 1.2 M <SUB>☉</SUB> star. Defining the photoevaporation desert as a region consistent with zero
    occurrence at 2σ, the onset of the desert happens for integrated X-ray fluxes greater than 1.43 × 10<SUP>22</SUP> to 8.23
    × 10<SUP>20</SUP> as a function of planetary radii for 1.8-4 R <SUB>⊕</SUB>. We also compare the location of the photoevaporation
    desert for different stellar types. We find much greater variability in the desert onset in the bolometric flux space
    compared to the integrated X-ray flux space, suggestive of photoevaporation driven by steady-state stellar X-ray emissions
    as the dominant control on desert location. Finally, we report tentative evidence for the sub-Neptune valley, first seen
    around Sun-like stars, for M&amp;K dwarfs. The discovery of additional planets around low-mass stars from surveys such
    as the Transiting Exoplanet Survey Satellite mission will enable detailed exploration of these trends.
