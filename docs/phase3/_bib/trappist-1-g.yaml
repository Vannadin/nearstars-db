  arxiv_id: null
  ads_bibcode: 2015ApJS..216...15L
  title: Rovibrational Line Lists for Nine Isotopologues of the CO Molecule in the X <SUP>1</SUP>Σ<SUP>+</SUP> Ground Electronic
    State
  authors:
  - Li, Gang
  - Gordon, Iouli E.
  - Rothman, Laurence S.
  - Tan, Yan
  - Hu, Shui-Ming
  - Kassi, Samir
  - Campargue, Alain
