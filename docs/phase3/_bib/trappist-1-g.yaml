  arxiv_id: '1504.06326'
  ads_bibcode: 2015ApJ...806...41C
  title: The Interaction of Venus-like, M-dwarf Planets with the Stellar Wind of Their Host Star
  authors:
  - Cohen, O.
  - Ma, Y.
  - Drake, J. J.
  - Glocer, A.
  - Garraffo, C.
  - Bell, J. M.
  - Gombosi, T. I.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/0004-637X/806/1/41
  abstract: We study the interaction between the atmospheres of Venus-like, non-magnetized exoplanets orbiting an M-dwarf
    star, and the stellar wind using a multi-species MHD model. We focus our investigation on the effect of enhanced stellar
    wind and enhanced EUV flux as the planetary distance from the star decreases. Our simulations reveal different topologies
    of the planetary space environment for sub- and super-Alfvénic stellar wind conditions, which could lead to dynamic energy
    deposition into the atmosphere during the transition along the planetary orbit. We find that the stellar wind penetration
    for non-magnetized planets is very deep, up to a few hundreds of kilometers. We estimate a lower limit for the atmospheric
    mass-loss rate and find that it is insignificant over the lifetime of the planet. However, we predict that when accounting
    for atmospheric ion acceleration, a significant amount of the planetary atmosphere could be eroded over the course of
    a billion years.
