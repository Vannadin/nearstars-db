  title: Ground Validation Experiment and Spectral Detection Capability Evaluation of Mars Mineralogical Spectrometer (MMS)
    Aboard HX-1 Orbiter
  authors:
  - Liu, Bin
  - Ren, Xin
  - Liu, Dawei
  - Liu, Jianjun
  - Zhang, Qing
  - Huang, Hai
