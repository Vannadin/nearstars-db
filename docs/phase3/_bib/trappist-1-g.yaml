- &id298
  arxiv_id: '1910.05224'
  ads_bibcode: 2020AsBio..20..235S
  title: Phosphine as a Biosignature Gas in Exoplanet Atmospheres
  authors:
  - Sousa-Silva, Clara
  - Seager, Sara
  - Ranjan, Sukrit
  - Petkowski, Janusz Jurand
  - Zhan, Zhuchang
  - Hu, Renyu
  - Bains, William
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.1089/ast.2018.1954
  abstract: A long-term goal of exoplanet studies is the identification and detection of biosignature gases. Beyond the most
    discussed biosignature gas O<SUB>2</SUB>, only a handful of gases have been considered in detail. In this study, we evaluate
    phosphine (PH<SUB>3</SUB>). On Earth, PH<SUB>3</SUB> is associated with anaerobic ecosystems, and as such, it is a potential
    biosignature gas in anoxic exoplanets. We simulate the atmospheres of habitable terrestrial planets with CO<SUB>2</SUB>-
    and H<SUB>2</SUB>-dominated atmospheres and find that PH<SUB>3</SUB> can accumulate to detectable concentrations on planets
    with surface production fluxes of 10<SUP>10</SUP> to 10<SUP>14</SUP> cm<SUP>-2</SUP> s<SUP>-1</SUP> (corresponding to
    surface concentrations of 10s of ppb to 100s of ppm), depending on atmospheric composition and ultraviolet (UV) irradiation.
    While high, the surface flux values are comparable to the global terrestrial production rate of methane or CH<SUB>4</SUB>
    (10<SUP>11</SUP> cm<SUP>-2</SUP> s<SUP>-1</SUP>) and below the maximum local terrestrial PH<SUB>3</SUB> production rate
    (10<SUP>14</SUP> cm<SUP>-2</SUP> s<SUP>-1</SUP>). As with other gases, PH<SUB>3</SUB> can more readily accumulate on low-UV
    planets, for example, planets orbiting quiet M dwarfs or with a photochemically generated UV shield. PH<SUB>3</SUB> has
    three strong spectral features such that in any atmosphere scenario one of the three will be unique compared with other
    dominant spectroscopic molecules. Phosphine's weakness as a biosignature gas is its high reactivity, requiring high outgassing
    rates for detectability. We calculate that tens of hours of JWST (James Webb Space Telescope) time are required for a
    potential detection of PH<SUB>3</SUB>. Yet, because PH<SUB>3</SUB> is spectrally active in the same wavelength regions
    as other atmospherically important molecules (such as H<SUB>2</SUB>O and CH<SUB>4</SUB>), searches for PH<SUB>3</SUB>
    can be carried out at no additional observational cost to searches for other molecular species relevant to characterizing
    exoplanet habitability. Phosphine is a promising biosignature gas, as it has no known abiotic false positives on terrestrial
    planets from any source that could generate the high fluxes required for detection.
