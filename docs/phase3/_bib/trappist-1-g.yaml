  arxiv_id: '1603.06596'
  ads_bibcode: 2016ApJ...831..180C
  title: Evolutionary Analysis of Gaseous Sub-Neptune-mass Planets with MESA
  authors:
  - Chen, Howard
  - Rogers, Leslie A.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.3847/0004-637X/831/2/180
  abstract: Sub-Neptune-sized exoplanets represent the most common types of planets in the Milky Way, yet many of their properties
    are unknown. Here, we present a prescription to adapt the capabilities of the stellar evolution toolkit Modules for Experiments
    in Stellar Astrophysics to model sub-Neptune-mass planets with H/He envelopes. With the addition of routines treating
    the planet core luminosity, heavy-element enrichment, atmospheric boundary condition, and mass-loss due to hydrodynamic
    winds, the evolutionary pathways of planets with diverse starting conditions are more accurately constrained. Using these
    dynamical models, we construct mass-composition relationships of planets from 1-400 M <SUB>⊕</SUB> and investigate how
    mass-loss impacts their composition and evolution history. We demonstrate that planet radii are typically insensitive
    to the evolution pathway that brought the planet to its instantaneous mass, composition and age, with variations from
    hysteresis ≲ 2 % . We find that planet envelope mass-loss timescales, {τ }<SUB>{env</SUB>}, vary non-monotonically with
    H/He envelope mass fractions (at fixed planet mass). In our simulations of young (100 Myr) low-mass ({M}<SUB>{{p</SUB>}}≲
    10 {M}<SUB>\oplus </SUB>) planets with rocky cores, {τ }<SUB>{env</SUB>} is maximized at {M}<SUB>{env</SUB>}/{M}<SUB>{{p</SUB>}}=1
    % to 3%. The resulting convergent mass-loss evolution could potentially imprint itself on the close-in planet population
    as a preferred H/He mass fraction of ∼ 1 % . Looking ahead, we anticipate that this numerical code will see widespread
    applications complementing both 3D models and observational exoplanet surveys.
