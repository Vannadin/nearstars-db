  arxiv_id: '2007.14039'
  ads_bibcode: 2020A&A...642A..23M
  title: Ejection of close-in super-Earths around low-mass stars in the giant impact stage
  authors:
  - Matsumoto, Yuji
  - Gu, Pin-Gao
  - Kokubo, Eiichiro
  - Oshino, Shoichi
  - Omiya, Masashi
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.1051/0004-6361/202038332
  abstract: 'Context. Earth-sized planets were observed in close-in orbits around M dwarfs. While more and more planets are
    expected to be uncovered around M dwarfs, theories of their formation and dynamical evolution are still in their infancy.
    <BR /> Aims: We investigate the giant impact stage for the growth of protoplanets, which includes strong scattering around
    low-mass stars. The aim is to clarify whether strong scattering around low-mass stars affects the orbital and mass distributions
    of the planets. <BR /> Methods: We performed an N-body simulation of protoplanets by systematically surveying the parameter
    space of the stellar mass and surface density of protoplanets. <BR /> Results: We find that protoplanets are often ejected
    after twice or three times the close-scattering around late M dwarfs. The ejection sets the upper limit of the largest
    planet mass. By adopting the surface density that linearly scales with the stellar mass, we find that as the stellar mass
    decreases, less massive planets are formed in orbits with higher eccentricities and inclinations. Under this scaling,
    we also find that a few close-in protoplanets are generally ejected. <BR /> Conclusions: The ejection of protoplanets
    plays an important role in the mass distribution of super-Earths around late M dwarfs. The mass relation of observed close-in
    super-Earths and their central star mass is reproduced well by ejection.'
