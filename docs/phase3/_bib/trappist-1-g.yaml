  arxiv_id: '2201.01794'
  ads_bibcode: 2022AJ....163..253T
  title: The Perkins INfrared Exosatellite Survey (PINES) I. Survey Overview, Reduction Pipeline, and Early Results
  authors:
  - Tamburo, Patrick
  - Muirhead, Philip S.
  - McCarthy, Allison M.
  - Hart, Murdock
  - Gracia, David
  - Vos, Johanna M.
  - Bardalez Gagliuffi, Daniella C.
