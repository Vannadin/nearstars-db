  abstract: Multiplanetary systems spanning the radius valley are ideal testing grounds for exploring the different proposed
    explanations for the observed bimodality in the radius distribution of close-in exoplanets. One such system is HIP 29442
    (TOI-469), an evolved K0V star hosting two super-Earths and one sub-Neptune. We observed HIP 29442 with CHEOPS for a total
    of 9.6 days, which we modelled jointly with two sectors of TESS data to derive planetary radii of 3.410 ± 0.046, 1.551
    ± 0.045, and 1.538 ± 0.049 R<SUB>⊕</SUB> for planets b, c, and d, which orbit HIP 29442 with periods of 13.6, 3.5, and
    6.4 days, respectively. For planet d this value deviates by more than 3σ from the median value reported in the discovery
    paper, leading us to conclude that caution is required when using TESS photometry to determine the radii of small planets
    with low per-transit signal-to-noise ratios and large gaps between observations. Given the high precision of these new
    radii, combining them with published RVs from ESPRESSO and HIRES provides us with ideal conditions to investigate the
    internal structure and formation pathways of the planets in the system. We introduced the publicly available code plaNETic,
    a fast and robust neural network-based Bayesian internal structure modelling framework. We then applied hydrodynamic models
    to explore the upper atmospheric properties of these inferred structures. Finally, we identified planetary system analogues
    in a synthetic population generated with the Bern model for planet formation and evolution. Based on this analysis, we
    find that the planets likely formed on opposing sides of the water iceline from a protoplanetary disk with an intermediate
    solid mass. We finally report that the observed parameters of the HIP 29442 system are compatible with a scenario where
    the second peak in the bimodal radius distribution corresponds to sub-Neptunes with a pure H/He envelope and with a scenario
    with water-rich sub-Neptunes. <P />This article uses data from the CHEOPS Guaranteed Time Observation programme CH_PR100031.
    The raw and detrended photometric time-series data are available at the CDS via anonymous ftp to <A href="https://cdsarc.cds.unistra.fr">cdsarc.cds.unistra.fr</A>
    (ftp://130.79.128.5) or via <A href="https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/688/A223">https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/688/A223</A>
