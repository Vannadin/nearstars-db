- &id598
  arxiv_id: '1101.1082'
  ads_bibcode: 2011AJ....141...97W
  title: The Sloan Digital Sky Survey Data Release 7 Spectroscopic M Dwarf Catalog. I. Data
  authors:
  - West, Andrew A.
  - Morgan, Dylan P.
  - Bochanski, John J.
  - Andersen, Jan Marie
  - Bell, Keaton J.
  - Kowalski, Adam F.
  - Davenport, James R. A.
  - Hawley, Suzanne L.
  - Schmidt, Sarah J.
  - Bernat, David
  - Hilton, Eric J.
  - Muirhead, Philip
  - Covey, Kevin R.
  - Rojas-Ayala, Bárbara
  - Schlawin, Everett
  - Gooding, Mary
  - Schluns, Kyle
  - Dhital, Saurav
  - Pineda, J. Sebastian
  - Jones, David O.
  year: '2011'
  pubdate: '2011-03-00'
  doi: 10.1088/0004-6256/141/3/97
  abstract: We present a spectroscopic catalog of 70,841 visually inspected M dwarfs from the seventh data release of the
    Sloan Digital Sky Survey. For each spectrum, we provide measurements of the spectral type, a number of molecular band
    heads, and the Hα, Hβ, Hγ, Hδ, and Ca II K emission lines. In addition, we calculate the metallicity-sensitive parameter
    ζ and identify a relationship between ζ and the g - r and r - z colors of M dwarfs. We assess the precision of our spectral
    types (which were assigned by individual examination), review the bulk attributes of the sample, and examine the magnetic
    activity properties of M dwarfs, in particular those traced by the higher order Balmer transitions. Our catalog is cross-matched
    to Two Micron All Sky Survey infrared data, and contains photometric distances for each star. Finally, we identify eight
    new late-type M dwarfs that are possibly within 25 pc of the Sun. Future studies will use these data to thoroughly examine
    magnetic activity and kinematics in late-type M dwarfs and examine the chemical and dynamical history of the local Milky
    Way.
