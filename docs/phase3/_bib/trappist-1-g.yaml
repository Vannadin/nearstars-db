  arxiv_id: '1710.05398'
  ads_bibcode: 2018MNRAS.479.4786V
  title: 'An asteroseismic view of the radius valley: stripped cores, not born rocky'
  authors:
  - Van Eylen, V.
  - Agentoft, Camilla
  - Lundkvist, M. S.
  - Kjeldsen, H.
  - Owen, J. E.
  - Fulton, B. J.
