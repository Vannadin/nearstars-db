  arxiv_id: '1809.07322'
  ads_bibcode: 2018ApJ...867...71L
  title: The MUSCLES Treasury Survey. V. FUV Flares on Active and Inactive M Dwarfs
  authors:
  - Loyd, R. O. Parke
  - France, Kevin
  - Youngblood, Allison
  - Schneider, Christian
  - Brown, Alexander
  - Hu, Renyu
  - Segura, Antígona
  - Linsky, Jeffrey
  - Redfield, Seth
  - Tian, Feng
  - Rugheimer, Sarah
  - Miguel, Yamila
  - Froning, Cynthia S.
  year: '2018'
  pubdate: '2018-11-00'
  doi: 10.3847/1538-4357/aae2bd
  abstract: M dwarf stars are known for their vigorous flaring. This flaring could impact the climate of orbiting planets,
    making it important to characterize M dwarf flares at the short wavelengths that drive atmospheric chemistry and escape.
    We conducted a far-ultraviolet flare survey of six M dwarfs from the recent MUSCLES (Measurements of the Ultraviolet Spectral
    Characteristics of Low-mass Exoplanetary Systems) observations, as well as four highly active M dwarfs with archival data.
    When comparing absolute flare energies, we found the active-M-star flares to be about 10× more energetic than inactive-M-star
    flares. However, when flare energies were normalized by the star’s quiescent flux, the active and inactive samples exhibited
    identical flare distributions, with a power-law index of -{0.76}<SUB>-0.1</SUB><SUP>+0.09</SUP> (cumulative distribution).
    The rate and distribution of flares are such that they could dominate the FUV energy budget of M dwarfs, assuming the
    same distribution holds to flares as energetic as those cataloged by Kepler and ground-based surveys. We used the observed
    events to create an idealized model flare with realistic spectral and temporal energy budgets to be used in photochemical
    simulations of exoplanet atmospheres. Applied to our own simulation of direct photolysis by photons alone (no particles),
    we find that the most energetic observed flares have little effect on an Earth-like atmosphere, photolyzing ∼0.01% of
    the total O<SUB>3</SUB> column. The observations were too limited temporally (73 hr cumulative exposure) to catch rare,
    highly energetic flares. Those that the power-law fit predicts occur monthly would photolyze ∼1% of the O<SUB>3</SUB>
    column and those it predicts occur yearly would photolyze the full O<SUB>3</SUB> column. Whether such energetic flares
    occur at the rate predicted is an open question.
