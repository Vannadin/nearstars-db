  doi: 10.1007/978-3-319-60609-5_7
  abstract: Pebble accretion is the mechanism in which small particles ("pebbles") accrete onto big bodies&lt;IndexTerm ID="ITerm1"&gt;
    &lt;Secondary&gt;big&lt;/Secondary&gt; (planetesimals or planetary embryos) in gas-rich environments. In pebble accretion&lt;IndexTerm
    ID="ITerm2"&gt; &lt;Secondary&gt;accretion&lt;/Secondary&gt; , accretion occurs by settling and depends only on the mass
    of the gravitating body&lt;IndexTerm ID="ITerm3"&gt; &lt;Secondary&gt;gravitating&lt;/Secondary&gt; , not its radius.
    I give the conditions under which pebble accretion operates and show that the collisional cross section can become much
    larger than in the gas-free, ballistic, limit. In particular, pebble accretion requires the pre-existence of a massive
    planetesimal seed. When pebbles experience strong orbital decay by drift motions or are stirred by turbulence, the accretion
    efficiency is low and a great number of pebbles are needed to form Earth-mass cores. Pebble accretion is in many ways
    a more natural and versatile process than the classical, planetesimal-driven paradigm, opening up avenues to understand
    planet formation&lt;IndexTerm ID="ITerm4"&gt; in solar and exoplanetary systems.
