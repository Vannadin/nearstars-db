  - Lunine, J. I.
  - Mahaffy, P. R.
  - Mangold, N.
  - McCubbin, F. M.
  - Mustard, J. F.
  - Niles, P. B.
  - Quantin-Nataf, C.
  - Rice, M. S.
  - Stack, K. M.
  - Stevenson, D. J.
  - Stewart, S. T.
  - Toplis, M. J.
  - Usui, T.
  - Weiss, B. P.
  - Werner, S. C.
  - Wordsworth, R. D.
