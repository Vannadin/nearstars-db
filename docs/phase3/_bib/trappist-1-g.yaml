  ads_bibcode: 2025A&A...695A.171A
  title: 'Hot Rocks Survey I: A possible shallow eclipse for LHS 1478 b'
  authors:
  - August, P. C.
  - Buchhave, L. A.
  - Diamond-Lowe, H.
  - Mendonça, J. M.
  - Gressier, A.
  - Rathcke, A. D.
