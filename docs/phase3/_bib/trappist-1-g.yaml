  ads_bibcode: 2018A&A...618A.142B
  title: Radial velocity follow-up of GJ1132 with HARPS. A precise mass for planet b and the discovery of a second planet
  authors:
  - Bonfils, X.
  - Almenara, J.-M.
  - Cloutier, R.
  - Wünsche, A.
  - Astudillo-Defru, N.
  - Berta-Thompson, Z.
  - Bouchy, F.
