  arxiv_id: '1612.06409'
  ads_bibcode: 2017AJ....154..158B
  title: Evidence for Atmospheric Cold-trap Processes in the Noninverted Emission Spectrum of Kepler-13Ab Using HST/WFC3
  authors:
  - Beatty, Thomas G.
  - Madhusudhan, Nikku
  - Tsiaras, Angelos
  - Zhao, Ming
  - Gilliland, Ronald L.
  - Knutson, Heather A.
  - Shporer, Avi
