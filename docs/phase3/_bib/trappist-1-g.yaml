  arxiv_id: '2508.10579'
  ads_bibcode: 2025AJ....170..205B
  title: Additional JWST/NIRSpec Transits of the Rocky M Dwarf Exoplanet GJ 1132 b Reveal a Featureless Spectrum
  authors:
  - Bennett, Katherine A.
  - MacDonald, Ryan J.
  - Peacock, Sarah
  - Perez, Junellie
  - May, E. M.
  - Moran, Sarah E.
  - Alderson, Lili
  - Lustig-Yaeger, Jacob
  - Wakeford, Hannah R.
  - Sing, David K.
  - Stevenson, Kevin B.
  - Batalha, Natasha E.
  - López-Morales, Mercedes
  - Alam, Munazza K.
