  arxiv_id: '1310.3269'
  ads_bibcode: 2013Sci...342..218F
  title: Evidence for Water in the Rocky Debris of a Disrupted Extrasolar Minor Planet
  authors:
  - Farihi, J.
  - Gänsicke, B. T.
  - Koester, D.
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1126/science.1239447
  abstract: The existence of water in extrasolar planetary systems is of great interest because it constrains the potential
    for habitable planets and life. We have identified a circumstellar disk that resulted from the destruction of a water-rich
    and rocky extrasolar minor planet. The parent body formed and evolved around a star somewhat more massive than the Sun,
    and the debris now closely orbits the white dwarf remnant of the star. The stellar atmosphere is polluted with metals
    accreted from the disk, including oxygen in excess of that expected for oxide minerals, indicating that the parent body
    was originally composed of 26% water by mass. This finding demonstrates that water-bearing planetesimals exist around
    A- and F-type stars that end their lives as white dwarfs.
