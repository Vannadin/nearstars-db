  ads_bibcode: 2020AJ....159..187P
  title: 'An Extreme-precision Radial-velocity Pipeline: First Radial Velocities from EXPRES'
  authors:
  - Petersburg, Ryan R.
  - Ong, J. M. Joel
  - Zhao, Lily L.
  - Blackman, Ryan T.
  - Brewer, John M.
  - Buchhave, Lars A.
  - Cabot, Samuel H. C.
  - Davis, Allen B.
