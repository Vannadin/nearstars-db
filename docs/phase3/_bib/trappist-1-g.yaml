  arxiv_id: '0909.4647'
  ads_bibcode: 2009ApJ...705.1416R
  title: A Volume-Limited Sample of 63 M7-M9.5 Dwarfs. I. Space Motion, Kinematic Age, and Lithium
  authors:
  - Reiners, A.
  - Basri, G.
  year: '2009'
  pubdate: '2009-11-00'
  doi: 10.1088/0004-637X/705/2/1416
  abstract: In a volume-limited sample of 63 ultracool dwarfs of spectral type M7-M9.5, we have obtained high-resolution spectroscopy
    with UVES at the Very Large Telescope and HIRES at Keck Observatory. In this first paper we introduce our volume-complete
    sample from DENIS and 2MASS targets, and we derive radial velocities and space motion. Kinematics of our sample are consistent
    with the stars being predominantly members of the young disk. The kinematic age of the sample is 3.1 Gyr. We find that
    six of our targets show strong Li lines implying that they are brown dwarfs younger than several hundred million years.
    Five of the young brown dwarfs were unrecognized before. Comparing the fraction of Li detections to later spectral types,
    we see a hint of an unexpected local maximum of this fraction at spectral type M9. It is not yet clear whether this maximum
    is due to insufficient statistics, or to a combination of physical effects including spectral appearance of young brown
    dwarfs, Li line formation, and the star formation rate at low masses.
