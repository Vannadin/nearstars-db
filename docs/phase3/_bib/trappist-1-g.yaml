- &id916
  arxiv_id: '1901.07459'
  ads_bibcode: 2019AJ....157..124K
  title: Discovery and Vetting of Exoplanets. I. Benchmarking K2 Vetting Tools
  authors:
  - Kostov, Veselin B.
  - Mullally, Susan E.
  - Quintana, Elisa V.
  - Coughlin, Jeffrey L.
  - Mullally, Fergal
  - Barclay, Thomas
  - Colón, Knicole D.
  - Schlieder, Joshua E.
  - Barentsen, Geert
  - Burke, Christopher J.
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.3847/1538-3881/ab0110
  abstract: We have adapted the algorithmic tools developed during the Kepler mission to vet the quality of transit-like signals
    for use on the K2 mission data. Using the four sets of publicly available light curves at MAST, we produced a uniformly
    vetted catalog of 772 transiting planet candidates from K2 as listed at the NASA Exoplanet Archive in the K2 Table of
    Candidates. Our analysis marks 676 of these as planet candidates and 96 as false positives. All confirmed planets pass
    our vetting tests. Sixty of our false positives are new identifications, effectively doubling the overall number of astrophysical
    signals mimicking planetary transits in K2 data. Most of the targets listed as false positives in our catalog show either
    prominent secondary eclipses, transit depths suggesting a stellar companion instead of a planet, or significant photocenter
    shifts during transit. We packaged our tools into the open-source, automated vetting pipeline Discovery and Vetting of
    Exoplanets (DAVE), designed to streamline follow-up efforts by reducing the time and resources wasted observing targets
    that are likely false positives. DAVE will also be a valuable tool for analyzing planet candidates from NASA’s TESS mission,
    where several guest-investigator programs will provide independent light-curve sets—and likely many more from the community.
    We are currently testing DAVE on recently released TESS planet candidates and will present our results in a follow-up
    paper.
