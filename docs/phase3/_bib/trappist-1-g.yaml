  doi: 10.1016/j.scib.2018.07.023
  abstract: Atmospheric oxygen (O<SUB>2</SUB>) is the most crucial element on earth for the aerobic organisms that depend
    on it to release energy from carbon-based macromolecules. This is the first study to systematically analyze the global
    O<SUB>2</SUB> budget and its changes over the past 100 years. It is found that anthropogenic fossil fuel combustion is
    the largest contributor to the current O<SUB>2</SUB> deficit, which consumed 2.0 Gt/a in 1900 and has increased to 38.2
    Gt/a by 2015. Under the Representative Concentration Pathways (RCPs) RCP8.5 scenario, approximately 100Gt (gigatonnes)
    of O<SUB>2</SUB> would be removed from the atmosphere per year until 2100, and the O<SUB>2</SUB> concentration will decrease
    from its current level of 20.946% to 20.825%. Human activities have caused irreversible decline of atmospheric O<SUB>2</SUB>.
    It is time to take actions to promote O<SUB>2</SUB> production and reduce O<SUB>2</SUB> consumption.
