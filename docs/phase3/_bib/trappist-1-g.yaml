  arxiv_id: '2504.09752'
  ads_bibcode: 2025ApJ...985..187G
  title: 'Deciphering Sub-Neptune Atmospheres: New Insights from Geochemical Models of TOI-270 d'
  authors:
  - Glein, Christopher R.
  - Yu, Xinting
  - Luu, Cindy N.
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.3847/1538-4357/adced4
  abstract: The nature of sub-Neptunes is one of the hottest topics in exoplanetary science. Temperate sub-Neptunes are of
    special interest because some could be habitable. Here, we consider whether these planets might instead be rocky worlds
    with thick, hot atmospheres. Can recent James Webb Space Telescope observations of TOI-270 d be understood in terms of
    such a model? We perform thermochemical equilibrium calculations to infer conditions of quenching of C─H─O─N species.
    Our results indicate apparent CO<SUB>2</SUB>─CH<SUB>4</SUB> equilibrium between ∼900 and ∼1100 K. The CO abundance should
    be quenched higher in the atmosphere where the equilibrium CO/CO<SUB>2</SUB> ratio is lower, potentially explaining a
    lack of CO. N<SUB>2</SUB> is predicted to dominate the nitrogen budget. We confirm that the atmosphere of TOI-270 d is
    strongly enriched in both C and O<SUB>gas</SUB> relative to protosolar H, whereas N is likely to be less enriched or even
    depleted. We attempt to reproduce these enrichments by modeling the atmosphere as nebular gas that extracted heavy elements
    from accreted solids. This type of model can explain the C/H and O<SUB>gas</SUB>/H ratios, but despite supersolar C/N
    ratios provided by solids, the NH<SUB>3</SUB> abundance will probably be too high unless there is a nitrogen sink in addition
    to N<SUB>2</SUB>. A magma ocean may be implied, and indeed the oxygen fugacity of the deep atmosphere seems sufficiently
    low to support the sequestration of reduced N in silicate melt. The evaluation presented here demonstrates that exoplanetary
    geochemistry now approaches a level of sophistication comparable to that achieved within our own solar system.
