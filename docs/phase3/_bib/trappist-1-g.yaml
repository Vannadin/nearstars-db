  arxiv_id: '1905.13139'
  ads_bibcode: 2019ApJ...878L..30K
  title: Streaming Instability for Particle-size Distributions
  authors:
  - Krapp, Leonardo
  - Benítez-Llambay, Pablo
  - Gressel, Oliver
  - Pessah, Martin E.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.3847/2041-8213/ab2596
  abstract: The streaming instability is thought to play a central role in the early stages of planet formation by enabling
    the efficient bypass of a number of barriers hindering the formation of planetesimals. We present the first study exploring
    the efficiency of the linear streaming instability when a particle-size distribution is considered. We find that, for
    a given dust-to-gas mass ratio, the multi-species streaming instability grows on timescales much longer than those expected
    when only one dust species is involved. In particular, distributions that contain close-to-order-unity dust-to-gas mass
    ratios lead to unstable modes that can grow on timescales comparable to, or larger than, those of secular instabilities.
    We anticipate that processes leading to particle segregation and/or concentration can create favorable conditions for
    the instability to grow fast. Our findings may have important implications for a large number of processes in protoplanetary
    disks that rely on the streaming instability as usually envisioned for a unique dust species. Our results suggest that
    the growth rates of other resonant-drag instabilities may also decrease considerably when multiple species are considered.
