  arxiv_id: '2205.02331'
  ads_bibcode: 2022ApJ...935..104M
  title: 'Galactic Kinematics and Observed Flare Rates of a Volume-complete Sample of Mid-to-late M Dwarfs: Constraints on
    the History of the Stellar Radiation Environment of Planets Orbiting Low-mass Stars'
  authors:
  - Medina, Amber A.
  - Winters, Jennifer G.
  - Irwin, Jonathan M.
  - Charbonneau, David
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.3847/1538-4357/ac77f9
  abstract: 'We present a study of the relationship between Galactic kinematics, flare rates, chromospheric activity, and
    rotation periods for a volume-complete, nearly all-sky sample of 219 single stars within 15 pc and with masses between
    0.1 and 0.3 M <SUB>☉</SUB> observed during the primary mission of TESS. We find all stars consistent with a common value
    of α = 1.984 ± 0.019 for the exponent of the flare frequency distribution. Using our measured stellar radial velocities
    and Gaia astrometry, we determine Galactic UVW space motions. We find 78% of stars are members of the Galactic thin disk,
    7% belong to the thick disk, and for the remaining 15% we cannot confidently assign membership to either component. If
    we assume star formation has been constant in the thin disk for the past 8 Gyr, then based on the fraction that we observe
    to be active, we estimate the average age at which these stars transition from the saturated to the unsaturated flaring
    regime to be 2.4 ± 0.3 Gyr. This is consistent with the ages that we assign from Galactic kinematics: we find that stars
    with rotation period P <SUB>rot</SUB> &lt; 10 days have an age of 2.0 ± 1.2 Gyr, stars with 10 days &lt; P <SUB>rot</SUB>
    ≤ 90 days have an age of 5.6 ± 2.7 Gyr, and stars with P <SUB>rot</SUB> &gt; 90 days have an age of 12.9 ± 3.5 Gyr. We
    find that the average age of stars with P <SUB>rot</SUB> &lt; 10 days increases with decreasing stellar mass from 0.6
    ± 0.3 Gyr (0.2-0.3 M <SUB>☉</SUB>) to 2.3 ± 1.3 Gyr (0.1-0.2 M <SUB>☉</SUB>).'
