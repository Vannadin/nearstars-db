  doi: 10.1038/s41550-025-02723-3
  abstract: Recent transit observations of K2-18 b and TOI-270 d revealed strong molecular absorption signatures, lending
    credence to the idea that temperate sub-Neptunes (equilibrium temperature T<SUB>eq</SUB> = 250-400 K) have upper atmospheres
    mostly free of aerosols. These observations also indicated higher-than-expected CO<SUB>2</SUB> abundances on both planets,
    implying bulk compositions with high water mass fractions. However, it remains unclear whether these findings hold true
    for all temperate sub-Neptunes. Here we present the JWST NIRSpec/PRISM 0.7-5.4-μm transmission spectrum of a third temperate
    sub-Neptune, the 2.4 R<SUB>⊕</SUB> planet LP 791-18 c (T<SUB>eq</SUB> = 355 K), which is even more favourable for atmospheric
    characterization thanks to its small M6 host star. Intriguingly, despite the radius, mass and equilibrium temperature
    of LP 791-18 c being between those of K2-18 b and TOI-270 d, we find a drastically different transmission spectrum. Although
    we also detect methane on LP 791-18 c, its transit spectrum is dominated by strong haze scattering and there is no discernible
    CO<SUB>2</SUB> absorption. Overall, we infer a deep metal-enriched atmosphere (246-415 times solar) for LP 791-18 c, with
    a CO<SUB>2</SUB>-to-CH<SUB>4</SUB> ratio smaller than 0.07 (at 2σ), indicating less H<SUB>2</SUB>O in the deep envelope
    of LP 791-18 c and implying a relatively dry formation inside the water-ice line. These results show that sub-Neptunes
    that are near analogues in density and temperature can show drastically different aerosols and envelope chemistry and
    are intrinsically diverse beyond a simple temperature dependence.
