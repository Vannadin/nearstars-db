- arxiv_id: '2403.12617'
  ads_bibcode: 2024arXiv240312617D
  title: Do Temperate Rocky Planets Around M Dwarfs have an Atmosphere ?
  authors:
  - Doyon, Rene
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.48550/arXiv.2403.12617
  abstract: 'Detecting an atmosphere on nearby temperate planets is one of the most important scientific objectives of the
    Webb mission, an endeavour in practice limited to a handful of well-characterized planets: Trappist-1d, e, f, g, LHS1140b,
    and the mini-Neptune K2- 18b. The first 18 months of atmospheric characterization with JWST have confirmed both its power
    and versatility to probe exoplanet atmospheres, and have highlighted the challenge of stellar activity in studying those
    atmospheres through transmission spectroscopy. Assessing the prevalence of atmosphere in temperate planets with a minimal
    degree of confidence will require a multi-cycle program of order of a few 1000 hours involving both eclipse photometry
    and transmission spectroscopy, a program that would have to be executed over a significant fraction of JWST''s lifetime.
    Implementing specialized fast readout modes tailored for time-series observations of relatively bright stars would greatly
    enhance the efficiency and productivity of JWST''s exoplanet science programs. The forthcoming 500 hours of Cycle 3 Director
    Discretionary Time dedicated to exoplanet programs represent a unique opportunity to initiate a deep reconnaissance of
    habitability of the best keystone temperate planets.'
