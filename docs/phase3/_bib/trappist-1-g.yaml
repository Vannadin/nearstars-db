- &id519
  arxiv_id: '1702.02059'
  ads_bibcode: 2017A&A...601A..15L
  title: Dynamical rearrangement of super-Earths during disk dispersal. I. Outline of the magnetospheric rebound model
  authors:
  - Liu, Beibei
  - Ormel, Chris W.
  - Lin, Douglas N. C.
  year: '2017'
  pubdate: '2017-05-00'
  doi: 10.1051/0004-6361/201630017
  abstract: 'Context. The Kepler mission has discovered that close-in super-Earth planets are common around solar-type stars.
    They are often seen together in multiplanetary systems, but their period ratios do not show strong pile-ups near mean
    motion resonances (MMRs). One scenario is that super-Earths form early, in the presence of a gas-rich disk. These planets
    interact gravitationally with the disk gas, inducing their orbital migration. However, for this scenario disk migration
    theory predicts that planets will end up at resonant orbits due to their differential migration speed. <BR /> Aims: Motivated
    by the discrepancy between observation and theory, we seek a mechanism that moves planets out of resonances. We examine
    the orbital evolution of planet pairs near the magnetospheric cavity during the gas disk dispersal phase. Our study determines
    the conditions under which planets can escape resonances. <BR /> Methods: We extend Type I migration theory by calculating
    the torque a planet experiences at the interface of the empty magnetospheric cavity and the disk, namely the one-sided
    torque. We perform two-planet N-body simulations with the new Type I expressions, varying the planet masses, stellar magnetic
    field strengths, disk accretion rates, and gas disk depletion timescales. <BR /> Results: As planets migrate outwards
    with the expanding magnetospheric cavity, their dynamical configurations can be rearranged. Migration of planets is substantial
    (minor) in a massive (light) disk. When the outer planet is more massive than the inner planet, the period ratio of two
    planets increases through outward migration. On the other hand, when the inner planet is more massive, the final period
    ratio tends to remain similar to the initial one. Larger stellar magnetic field strengths result in planets stopping their
    migration at longer periods. We apply this model to two systems, Kepler-170 and Kepler-180. By fitting their present dynamical
    architectures, the disk and stellar B-field parameters at the time of disk dispersal can be retrieved. <BR /> Conclusions:
    We highlight "magnetospheric" rebound as an important ingredient able to reconcile disk migration theory with observations.
    Even when planets are trapped into MMRs during the early gas-rich stage, subsequent cavity expansion induces substantial
    changes to their orbits that move them out of resonance.'
  source: citation_of=2021ApJ...907...81L
