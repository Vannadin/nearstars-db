  arxiv_id: '2305.19357'
  ads_bibcode: 2023AJ....166...11P
  title: Mid-to-late M Dwarfs Lack Jupiter Analogs
  authors:
  - Pass, Emily K.
  - Winters, Jennifer G.
  - Charbonneau, David
  - Irwin, Jonathan M.
  - Latham, David W.
  - Berlind, Perry
  - Calkins, Michael L.
  - Esquerdo, Gilbert A.
  - Mink, Jessica
  year: '2023'
  pubdate: '2023-07-00'
  doi: 10.3847/1538-3881/acd349
  abstract: Cold Jovian planets play an important role in sculpting the dynamical environment in which inner terrestrial planets
    form. The core accretion model predicts that giant planets cannot form around low-mass M dwarfs, although this idea has
    been challenged by recent planet discoveries. Here, we investigate the occurrence rate of giant planets around low-mass
    (0.1-0.3 M <SUB>☉</SUB>) M dwarfs. We monitor a volume-complete, inactive sample of 200 such stars located within 15 pc,
    collecting four high-resolution spectra of each M dwarf over six years and performing intensive follow-up monitoring of
    two candidate radial velocity variables. We use TRES on the 1.5 m telescope at the Fred Lawrence Whipple Observatory and
    CHIRON on the Cerro Tololo Inter-American Observatory 1.5 m telescope for our primary campaign, and MAROON-X on Gemini-North
    for high-precision follow up. We place a 95% confidence upper limit of 1.5% (68% confidence limit of 0.57%) on the occurrence
    of M <SUB>P</SUB> sin i &gt; 1 M <SUB>J</SUB> giant planets out to the water snow line and provide additional constraints
    on the giant planet population as a function of M <SUB>P</SUB> sin i and period. Beyond the snow line (100 K &lt; T <SUB>eq</SUB>
    &lt; 150 K), we place 95% confidence upper limits of 1.5%, 1.7%, and 4.4% (68% confidence limits of 0.58%, 0.66%, and
    1.7%) for 3 M <SUB>J</SUB> &lt; M <SUB>P</SUB> sin i &lt; 10 M <SUB>J</SUB>, 0.8 M <SUB>J</SUB> &lt; M <SUB>P</SUB> sin
    i &lt; 3 M <SUB>J</SUB>, and 0.3 M <SUB>J</SUB> &lt; M <SUB>P</SUB> sin i &lt; 0.8 M <SUB>J</SUB> giant planets, respectively;
    i.e., Jupiter analogs are rare around low-mass M dwarfs. In contrast, surveys of Sun-like stars have found that their
    giant planets are most common at these Jupiter-like instellations.
