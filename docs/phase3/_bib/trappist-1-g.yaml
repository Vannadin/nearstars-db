- &id1355
  arxiv_id: null
  ads_bibcode: 2013PNAS..11011067A
  title: Experimental evidence for the thermophilicity of ancestral life
  authors:
  - Akanuma, Satoshi
  - Nakajima, Yoshiki
  - Yokobori, Shin-ichi
  - Kimura, Mitsuo
  - Nemoto, Naoki
  - Mase, Tomoko
  - Miyazono, Ken-ichi
  - Tanokura, Masaru
  - Yamagishi, Akihiko
  year: '2013'
  pubdate: '2013-07-00'
  doi: 10.1073/pnas.1308215110
  abstract: Theoretical studies have focused on the environmental temperature of the universal common ancestor of life with
    conflicting conclusions. Here we provide experimental support for the existence of a thermophilic universal common ancestor.
    We present the thermal stabilities and catalytic efficiencies of nucleoside diphosphate kinases (NDK), designed using
    the information contained in predictive phylogenetic trees, that seem to represent the last common ancestors of Archaea
    and of Bacteria. These enzymes display extreme thermal stabilities, suggesting thermophilic ancestries for Archaea and
    Bacteria. The results are robust to the uncertainties associated with the sequence predictions and to the tree topologies
    used to infer the ancestral sequences. Moreover, mutagenesis experiments suggest that the universal ancestor also possessed
    a very thermostable NDK. Because, as we show, the stability of an NDK is directly related to the environmental temperature
    of its host organism, our results indicate that the last common ancestor of extant life was a thermophile that flourished
