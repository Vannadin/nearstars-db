  arxiv_id: '1705.03999'
  ads_bibcode: 2018JGRE..123..180V
  title: Geophysical Investigations of Habitability in Ice-Covered Ocean Worlds
  authors:
  - Vance, Steven D.
  - Panning, Mark P.
  - Stähler, Simon
  - Cammarano, Fabio
  - Bills, Bruce G.
  - Tobie, Gabriel
  - Kamata, Shunichi
  - Kedar, Sharon
  - Sotin, Christophe
  - Pike, William T.
  - Lorenz, Ralph
  - Huang, Hsin-Hua
  - Jackson, Jennifer M.
  - Banerdt, Bruce
  year: '2018'
  pubdate: '2018-01-00'
  doi: 10.1002/2017JE005341
  abstract: Geophysical measurements can reveal the structures and thermal states of icy ocean worlds. The interior density,
    temperature, sound speed, and electrical conductivity thus characterize their habitability. We explore the variability
    and correlation of these parameters using 1-D internal structure models. We invoke thermodynamic consistency using available
    thermodynamics of aqueous MgSO<SUB>4</SUB>, NaCl (as seawater), and NH<SUB>3</SUB>; pure water ice phases I, II, III,
    V, and VI; silicates; and any metallic core that may be present. Model results suggest, for Europa, that combinations
    of geophysical parameters might be used to distinguish an oxidized ocean dominated by MgSO<SUB>4</SUB> from a more reduced
    ocean dominated by NaCl. In contrast with Jupiter's icy ocean moons, Titan and Enceladus have low-density rocky interiors,
    with minimal or no metallic core. The low-density rocky core of Enceladus may comprise hydrated minerals or anhydrous
    minerals with high porosity. &lt;fi&gt;Cassini&lt;/fi&gt; gravity data for Titan indicate a high tidal potential Love
    number (k<SUB>2</SUB>&gt;0.6), which requires a dense internal ocean (ρ<SUB>ocean</SUB>&gt;1,200 kg m<SUP>-3</SUP>) and
    icy lithosphere thinner than 100 km. In that case, Titan may have little or no high-pressure ice, or a surprisingly deep
    water-rock interface more than 500 km below the surface, covered only by ice VI. Ganymede's water-rock interface is the
    deepest among known ocean worlds, at around 800 km. Its ocean may contain multiple phases of high-pressure ice, which
    will become buoyant if the ocean is sufficiently salty. Callisto's interior structure may be intermediate to those of
    Titan and Europa, with a water-rock interface 250 km below the surface covered by ice V but not ice VI.
  source: citation_of=2022NatCo..13.7521O
