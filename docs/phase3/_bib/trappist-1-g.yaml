- &id718
  arxiv_id: '2209.11346'
  ads_bibcode: 2022ApJS..263...33C
  title: An Early Catalog of Planet-hosting Multiple-star Systems of Order Three and Higher
  authors:
  - Cuntz, M.
  - Luke, G. E.
  - Millard, M. J.
  - Boyle, L.
