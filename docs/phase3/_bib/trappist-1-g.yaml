  arxiv_id: '1803.11307'
  ads_bibcode: 2018AJ....155..210M
  title: 'Kepler’s Earth-like Planets Should Not Be Confirmed without Independent Detection: The Case of Kepler-452b'
  authors:
  - Mullally, Fergal
  - Thompson, Susan E.
  - Coughlin, Jeffrey L.
  - Burke, Christopher J.
  - Rowe, Jason F.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-3881/aabae3
  abstract: We show that the claimed confirmed planet Kepler-452b (a.k.a., K07016.01, KIC 8311864) cannot be confirmed using
    a purely statistical validation approach. Kepler detects many more periodic signals from instrumental effects than it
    does from transits, and it is likely impossible to confidently distinguish the two types of events at low signal-to-noise.
    As a result, the scenario that the observed signal is due to an instrumental artifact cannot be ruled out with 99% confidence,
    and the system must still be considered a candidate planet. We discuss the implications for other confirmed planets in
    or near the habitable zone.
