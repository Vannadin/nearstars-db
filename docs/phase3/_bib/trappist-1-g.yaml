  ads_bibcode: 2023MNRAS.525.5168M
  title: Impact of M-dwarf stellar wind and photoevaporation on the atmospheric evolution of small planets
  authors:
  - Modi, Ashini
  - Estrela, Raissa
  - Valio, Adriana
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1093/mnras/stad2557
  abstract: The evolution of a planet's atmosphere depends strongly on its host star's properties. When their host stars are
    younger, planets can experience stronger winds and extreme ultraviolet radiation (EUV) emissions. This is particularly
    true for planets orbiting M dwarfs due to their close proximity to the host star. To determine if these planets retain
    an atmosphere, we consider the impacts from stellar wind and EUV fluxes in driving atmospheric escape throughout the planet's
    lifetime. For this, we determined the atmospheric mass-loss due to stellar wind and photoevaporation on four planets in
    close orbit and 34 in their star's habitable zone (HZ). The M-dwarf host stars' wind velocity, density, and EUV flux were
    calculated through rotation period and X-ray flux scaling over time. The mass-loss rate due to stellar wind and photoevaporation
    was then computed as a function of time and accumulated throughout the planet's age to determine the total atmospheric
    mass-loss of the planet's initial H/He envelope. We find that for HZ planets at orbits &lt;0.1 au, stellar wind can only
    remove ${\le} 1~{{ \rm per\ cent}}$ of the H/He envelope, while photoevaporation is essential for completely removing
    the H/He envelope of most targets. Moreover, due to either mechanism, most planets orbiting at &gt;0.1 au do not have
    their primordial envelope stripped. Overall, out of the 38 planets studied, 13 were predicted to have lost the primordial
    envelope due to photoevaporation, while two planets lost the envelope due to both stellar wind and photoevaporation.
