- &id525
  arxiv_id: '1610.09007'
  ads_bibcode: 2017A&A...600A..13A
  title: Magnetic activity in the HARPS M dwarf sample. The rotation-activity relationship for very low-mass stars through
    R'<SUB>HK</SUB>
  authors:
  - Astudillo-Defru, N.
  - Delfosse, X.
  - Bonfils, X.
  - Forveille, T.
  - Lovis, C.
  - Rameau, J.
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.1051/0004-6361/201527078
  abstract: 'Context. Atmospheric magnetic fields in stars with convective envelopes heat stellar chromospheres, and thus
    increase the observed flux in the Ca II H and K doublet. Starting with the historical Mount Wilson monitoring program,
    these two spectral lines have been widely used to trace stellar magnetic activity, and as a proxy for rotation period
    (P<SUB>rot</SUB>) and consequently for stellar age. Monitoring stellar activity has also become essential in filtering
    out false-positives due to magnetic activity in extra-solar planet surveys. The Ca II emission is traditionally quantified
    through the R''<SUB>HK</SUB>-index, which compares the chromospheric flux in the doublet to the overall bolometric flux
    of the star. Much work has been done to characterize this index for FGK-dwarfs, but M dwarfs - the most numerous stars
    of the Galaxy - were left out of these analyses and no calibration of their Ca II H and K emission to an R''<SUB>HK</SUB>
    exists to date. <BR /> Aims: We set out to characterize the magnetic activity of the low- and very-low-mass stars by providing
    a calibration of the R''<SUB>HK</SUB>-index that extends to the realm of M dwarfs, and by evaluating the relationship
    between R''<SUB>HK</SUB> and the rotation period. <BR /> Methods: We calibrated the bolometric and photospheric factors
    for M dwarfs to properly transform the S-index (which compares the flux in the Ca II H and K lines to a close spectral
    continuum) into the R''<SUB>HK</SUB>. We monitored magnetic activity through the Ca II H and K emission lines in the HARPS
    M dwarf sample. <BR /> Results: The R''<SUB>HK</SUB> index, like the fractional X-ray luminosity L<SUB>X</SUB>/L<SUB>bol</SUB>,
    shows a saturated correlation with rotation, with saturation setting in around a ten days rotation period. Above that
    period, slower rotators show weaker Ca II activity, as expected. Under that period, the R''<SUB>HK</SUB> index saturates
    to approximately 10<SUP>-4</SUP>. Stellar mass modulates the Ca II activity, with R''<SUB>HK</SUB> showing a constant
    basal activity above 0.6 M<SUB>☉</SUB> and then decreasing with mass between 0.6 M<SUB>☉</SUB> and the fully-convective
    limit of 0.35 M<SUB>☉</SUB>. Short-term variability of the activity correlates with its mean level and stars with higher
    R''<SUB>HK</SUB> indexes show larger R''<SUB>HK</SUB> variability, as previously observed for earlier spectral types.
    <P />Full Table A.2 is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/600/A13">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/600/A13</A>'
