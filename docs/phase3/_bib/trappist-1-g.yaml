- &id510
  arxiv_id: '1708.08990'
  ads_bibcode: 2017AJ....154..164B
  title: Determining Exoplanetary Oblateness Using Transit Depth Variations
  authors:
  - Biersteker, John
  - Schlichting, Hilke
  year: '2017'
  pubdate: '2017-10-00'
  doi: 10.3847/1538-3881/aa88c2
  abstract: The measurement of an exoplanet’s oblateness and obliquity provides insights into the planet’s internal structure
    and formation history. Previous work using small differences in the shape of the transit light curve has been moderately
    successful, but was hampered by the small signal and extreme photometric precision required. The measurement of changes
    in transit depth, caused by the spin precession of an oblate planet, was proposed as an alternative method. Here, we present
    the first attempt to measure these changes. Using Kepler photometry, we examined the brown dwarf Kepler-39b and the warm
    Saturn Kepler-427b. We could not reliably constrain the oblateness of Kepler-39b. We find transit depth variations for
    Kepler-427b at 90.1 % significance (1.65σ ) consistent with a precession period of {P}<SUB>{prec</SUB>}={5.45}<SUB>-0.37</SUB><SUP>+0.46</SUP>
    {years} and an oblateness of f={0.19}<SUB>-0.16</SUB><SUP>+0.32</SUP>. This oblateness is comparable to solar system gas
    giants and would raise questions about the dynamics and tidal synchronization of Kepler-427b.
