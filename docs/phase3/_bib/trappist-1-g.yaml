  title: 'The stellar activity-rotation relationship revisited: Dependence of saturated and non-saturated X-ray emission regimes
    on stellar mass for late-type dwarfs'
  authors:
  - Pizzolato, N.
  - Maggio, A.
  - Micela, G.
