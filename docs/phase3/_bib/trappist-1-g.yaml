  arxiv_id: '1504.04546'
  ads_bibcode: 2015A&A...577L...3T
  title: 'The extreme ultraviolet and X-ray Sun in Time: High-energy evolutionary tracks of a solar-like star'
  authors:
  - Tu, Lin
  - Johnstone, Colin P.
  - Güdel, Manuel
  - Lammer, Helmut
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1051/0004-6361/201526146
  abstract: '<BR /> Aims: We aim to describe the pre-main-sequence and main-sequence evolution of X-ray and extreme-ultaviolet
    radiation of a solar-mass star based on its rotational evolution starting with a realistic range of initial rotation rates.
    <BR /> Methods: We derive evolutionary tracks of X-ray radiation based on a rotational evolution model for solar-mass
    stars and the rotation-activity relation. We compare these tracks to X-ray luminosity distributions of stars in clusters
    with different ages. <BR /> Results: We find agreement between the evolutionary tracks derived from rotation and the X-ray
    luminosity distributions from observations. Depending on the initial rotation rate, a star might remain at the X-ray saturation
    level for very different time periods, from ≈10 Myr to ≈300 Myr for slow and fast rotators, respectively. <BR /> Conclusions:
    Rotational evolution with a spread of initial conditions leads to a particularly wide distribution of possible X-ray luminosities
    in the age range of 20-500 Myr, before rotational convergence and therefore X-ray luminosity convergence sets in. This
    age range is crucial for the evolution of young planetary atmospheres and may thus lead to very different planetary evolution
    histories.'
