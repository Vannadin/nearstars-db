- &id375
  arxiv_id: '0906.2193'
  ads_bibcode: 2010ApJ...708.1162K
  title: 'Detecting Planetary Geochemical Cycles on Exoplanets: Atmospheric Signatures and the Case of SO<SUB>2</SUB>'
  authors:
  - Kaltenegger, L.
  - Sasselov, D.
  year: '2010'
  pubdate: '2010-01-00'
  doi: 10.1088/0004-637X/708/2/1162
  abstract: We study the spectrum of a planetary atmosphere to derive detectable features in low resolution of different global
    geochemical cycles on exoplanets—using the sulfur cycle as our example. We derive low-resolution detectable features for
    first generation space- and ground-based telescopes as a first step in comparative planetology. We assume that the surfaces
    and atmospheres of terrestrial exoplanets (Earth-like and super-Earths) will most often be dominated by a specific geochemical
    cycle. Here we concentrate on the sulfur cycle driven by outgassing of SO<SUB>2</SUB> and H<SUB>2</SUB>S followed by their
    transformation to other sulfur-bearing species, which is clearly distinguishable from the carbon cycle, which is driven
    by outgassing of CO<SUB>2</SUB>. Due to increased volcanism, the sulfur cycle is potentially the dominant global geochemical
    cycle on dry super-Earths with active tectonics. We calculate planetary emission, reflection, and transmission spectrum
    from 0.4 μm to 40 μm with high and low resolution to assess detectable features using current and Archean Earth models
    with varying SO<SUB>2</SUB> and H<SUB>2</SUB>S concentrations to explore reducing and oxidizing habitable environments
    on rocky planets. We find specific spectral signatures that are observable with low resolution in a planetary atmosphere
    with high SO<SUB>2</SUB> and H<SUB>2</SUB>S concentration. Therefore, first generation space- and ground-based telescopes
    can test our understanding of geochemical cycles on rocky planets and potentially distinguish planetary environments dominated
    by the carbon and sulfur cycles.
