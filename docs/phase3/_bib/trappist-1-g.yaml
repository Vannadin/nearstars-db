- &id512
  arxiv_id: '1708.04241'
  ads_bibcode: 2017ApJ...848...41L
  title: Risks for Life on Habitable Planets from Superflares of Their Host Stars
  authors:
  - Lingam, Manasvi
  - Loeb, Abraham
  year: '2017'
  pubdate: '2017-10-00'
  doi: 10.3847/1538-4357/aa8e96
  abstract: We explore some of the ramifications arising from superflares on the evolutionary history of Earth, other planets
    in the solar system, and exoplanets. We propose that the most powerful superflares can serve as plausible drivers of extinction
    events, and that their periodicity corresponds to certain patterns in the terrestrial fossil diversity record. On the
    other hand, weaker superflares may play a positive role in enabling the origin of life through the formation of key organic
    compounds. Superflares could also prove to be quite detrimental to the evolution of complex life on present-day Mars and
    exoplanets in the habitable zone of M- and K-dwarfs. We conclude that the risk posed by superflares has not been sufficiently
    appreciated, and that humanity might potentially witness a superflare event in the next ∼ {10}<SUP>3</SUP> years, leading
    to devastating economic and technological losses. In light of the many uncertainties and assumptions associated with our
    analysis, we recommend that these results should be viewed with due caution.
  source: citation_of=2019ApJ...884..160V
