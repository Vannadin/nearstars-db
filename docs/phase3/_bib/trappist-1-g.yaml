- &id1093
  arxiv_id: '1505.00643'
  ads_bibcode: 2015A&A...578A.129J
  title: The coronal temperatures of low-mass main-sequence stars
  authors:
  - Johnstone, C. P.
  - Güdel, M.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1051/0004-6361/201425283
  abstract: '<BR /> Aims: We study the X-ray emission of low-mass main-sequence stars to derive a reliable general scaling
    law between coronal temperature and the level of X-ray activity. <BR /> Methods: We collect ROSAT measurements of hardness
    ratios and X-ray luminosities for a large sample of stars to derive which stellar X-ray emission parameter is most closely
    correlated with coronal temperature. We calculate average coronal temperatures for a sample of 24 low-mass main-sequence
    stars with measured emission measure distributions (EMDs) collected from the literature. These EMDs are based on high-resolution
    X-ray spectra measured by XMM-Newton and Chandra. <BR /> Results: We confirm that there is one universal scaling relation
    between coronal average temperature and surface X-ray flux, F<SUB>X</SUB>, that applies to all low-mass main-sequence
