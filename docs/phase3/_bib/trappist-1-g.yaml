  doi: 10.1088/0067-0049/216/1/15
  abstract: Extensive rovibrational line lists were computed for nine isotopologues of the CO molecule, namely, <SUP>12</SUP>C<SUP>16</SUP>O,
    <SUP>12</SUP>C<SUP>17</SUP>O, <SUP>12</SUP>C<SUP>18</SUP>O, <SUP>13</SUP>C<SUP>16</SUP>O, <SUP>13</SUP>C<SUP>17</SUP>O,
    <SUP>13</SUP>C<SUP>18</SUP>O, <SUP>14</SUP>C<SUP>16</SUP>O, <SUP>14</SUP>C<SUP>17</SUP>O, and <SUP>14</SUP>C<SUP>18</SUP>O
    in the ground electronic state with v &lt;= 41, ∆v &lt;= 11, and J &lt;= 150. The line intensity and position calculations
    were carried out using a newly determined piece-wise dipole moment function (DMF) in conjunction with the wavefunctions
    calculated from an experimentally determined potential energy function from Coxon &amp; Hajigeorgiou. A direct-fit method
    that simultaneously fits all the reliable experimental rovibrational matrix elements has been used to construct the dipole
    moment function near equilibrium internuclear distance. In order to extend the amount and quality of input experimental
    parameters, new Cavity Ring Down Spectroscopy experiments were carried out to enable measurements of the lines in the
    4-0 band with low uncertainty as well as the first measurements of lines in the 6-0 band. A new high-level ab initio DMF,
    derived from a finite field approach has been calculated to cover internuclear distances far from equilibrium. Accurate
    partition sums have been derived for temperatures up to 9000 K. In addition to air- and self-induced broadening and shift
    parameters, those induced by CO<SUB>2</SUB> and H<SUB>2</SUB> are now provided for planetary applications. A complete
    set of broadening and shift parameters was calculated based on sophisticated extrapolation of high-quality measured data.
    The line lists, which follow HITRAN formalism, are provided as supplementary material.
