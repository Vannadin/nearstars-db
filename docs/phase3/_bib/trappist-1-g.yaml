  arxiv_id: '2404.01967'
  ads_bibcode: 2024A&A...686L...9V
  title: A fading radius valley towards M dwarfs, a persistent density valley across stellar types
  authors:
  - Venturini, J.
  - Ronco, M. P.
  - Guilera, O. M.
  - Haldemann, J.
  - Mordasini, C.
  - Miller Bertolami, M.
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1051/0004-6361/202349088
  abstract: The radius valley separating super-Earths from mini-Neptunes is a fundamental benchmark for theories of planet
    formation and evolution. Observations show that the location of the radius valley decreases with decreasing stellar mass
    and with increasing orbital period. Here, we build on our previous pebble-based formation model. Combined with photoevaporation
    after disc dispersal, it has allowed us to unveil the radius valley as a separator between rocky and water-worlds. In
    this study, we expand our model for a range of stellar masses spanning from 0.1 to 1.5 M<SUB>☉</SUB>. We find that the
    location of the radius valley is well described by a power-law in stellar mass as R<SUB>valley</SUB> = 1.8197 M<SUB>⋆</SUB><SUP>0.14(+0.02/‒0.01)</SUP>,
    which is in excellent agreement with observations. We also find very good agreement with the dependence of the radius
    valley on orbital period, both for FGK and M dwarfs. Additionally, we note that the radius valley gets filled towards
    low stellar masses, particularly at 0.1-0.4 M<SUB>☉</SUB>, yielding a rather flat slope in R<SUB>valley</SUB> ‒ P<SUB>orb</SUB>.
    This is the result of orbital migration occurring at lower planet mass for less massive stars, which allows for low-mass
    water-worlds to reach the inner regions of the system, blurring the separation in mass (and size) between rocky and water
    worlds. Furthermore, we find that for planetary equilibrium temperatures above 400 K, the water in the volatile layer
    exists fully in the form of steam, puffing the planet radius up (as compared to the radii of condensed-water worlds).
    This produces an increase in planet radii of ∼30% at 1 M<SUB>⊕</SUB> and of ∼15% at 5 M<SUB>⊕</SUB> compared to condensed-water
    worlds. As with Sun-like stars, we find that pebble accretion leaves its imprint on the overall exoplanet population as
    a depletion of planets with intermediate compositions (i.e. water mass fractions of ∼0 ‒ 20%), carving an planet-depleted
    diagonal band in the mass-radius (MR) diagrams. This band is better visualised when plotting the planet's mean density
    in terms of an Earth-like composition. This change in coordinates causes the valley to emerge for all the stellar mass
    cases. <P />The data to generate the figures is available on Zenodo, <A href="https://doi.org/10.5281/zenodo.10719523">https://doi.org/10.5281/zenodo.10719523</A>
  source: citation_of=2024ApJ...974L..10P
