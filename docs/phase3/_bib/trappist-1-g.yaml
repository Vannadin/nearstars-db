  - Korpela, Eric J.
  - Werthimer, Dan
  - Cobb, Jeff
  - Allen, Bruce
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/1538-3881/ade5ab
  abstract: 'SETI@home is a radio Search for Extraterrestrial Intelligence (SETI) project that looks for technosignatures
    in data recorded at the Arecibo Observatory. The data were collected over a period of 14 yr and cover almost the entire
    sky visible to the telescope. The first stage of data analysis found billions of detections: brief excesses of continuous
    or pulsed narrowband power. The second stage removed detections that were likely radio frequency interference (RFI), then
    identified and ranked signal candidates: groups of detections, possibly spread over the 14 yr, that plausibly originate
    from a single cosmic source. We manually examined the top-ranking signal candidates and selected a few hundred. In the
    third and final stage, we are reobserving the corresponding sky locations and frequency ranges using the Five-hundred-meter
    Aperture Spherical Telescope radio telescope. This paper covers SETI@home''s second stage of data analysis. We describe
    the algorithms used to remove RFI and to identify and rank signal candidates. To guide the development of these algorithms,
    we used artificial candidate birdies that model persistent ET signals with a range of power, bandwidth, and planetary
    motion parameters. This approach also allowed us to estimate the sensitivity of our detection system to these signals.'
