  ads_bibcode: 2015ApJ...809...77S
  title: 'The Transiting Exoplanet Survey Satellite: Simulations of Planet Detections and Astrophysical False Positives'
  authors:
  - Sullivan, Peter W.
  - Winn, Joshua N.
  - Berta-Thompson, Zachory K.
  - Charbonneau, David
  - Deming, Drake
  - Dressing, Courtney D.
  - Latham, David W.
