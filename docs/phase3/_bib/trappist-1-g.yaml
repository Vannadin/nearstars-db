    </inline-formula> M<SUB>Jup</SUB> and <inline-formula> <mml:math><mml:msubsup><mml:mrow><mml:mn>0.0090</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.0024</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.0036</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> and favors a ∼25 au semimajor axis. HIP 54515 b adds to a growing list of superjovian planets with moderate
    eccentricities (e ≍ 0.4). Now, the third planet discovered from surveys combining high-contrast extreme adaptive optics
