  doi: 10.2138/rmg.2024.90.08
  abstract: This review is focused on describing the logic by which we make predictions of exoplanetary compositions and mineralogies,
    and how these processes could lead to compositional diversity among rocky exoplanets. We use these predictions to determine
    the sensitivity of present-day and future observations to detecting compositional differences between rocky exoplanets
    and the four terrestrial planets. First, we review data on stellar abundances and infer how changes in composition may
    manifest themselves in the expected bulk compositions of rocky exoplanets (section 2). Converting this information in
    mass-radius relationships requires calculation of the stable mineral assemblages at a given temperature-pressure-composition
    (T-P-X), an exercise we describe in section 3. Should the planet be hot enough to engender partial melting of the mantle,
    then these liquids are likely to rise to the surface and erupt to form planetary crusts; the possible compositional and
    mineralogical variability of which we examine in section 4. Finally, the expected spectroscopic responses of such crusts
    are examined in section 5.
