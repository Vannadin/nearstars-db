  abstract: Prior to the arrival of the Mars Atmosphere and Volatile EvolutioN (MAVEN) spacecraft at Mars, the only available
    measurements of the composition of the planet's ionosphere were those acquired by the two Viking Landers during their
    atmospheric entries. Many numerical models of the composition of the ionosphere of Mars have been developed, but these
    have only been validated for species, altitudes, and conditions for which Viking data exist. Here we compare the ionospheric
    composition and structure predicted by 10 ionospheric models at solar zenith angles of 45-60° against ion density measurements
    acquired by the MAVEN Neutral Gas and Ion Mass Spectrometer (NGIMS). The most successful models included three-dimensional
    plasma transport driven by interactions with the surrounding space environment but had relatively simple ionospheric chemistry.
