  ads_bibcode: 2023Natur.620..746Z
  title: No thick carbon dioxide atmosphere on the rocky exoplanet TRAPPIST-1 c
  authors:
  - Zieba, Sebastian
  - Kreidberg, Laura
  - Ducrot, Elsa
  - Gillon, Michaël
  - Morley, Caroline
  - Schaefer, Laura
  - Tamburo, Patrick
