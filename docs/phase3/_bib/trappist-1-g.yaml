  arxiv_id: '1904.06875'
  ads_bibcode: 2019MNRAS.486L..31K
  title: Observation of a possible superflare on Proxima Centauri
  authors:
  - Kielkopf, John F.
  - Hart, Rhodes
  - Carter, Bradley D.
  - Marsden, Stephen C.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.1093/mnrasl/slz054
  abstract: We report the observation on UT 2017 July 1 of an unusually powerful flare detected in near-infrared continuum
    photometry of Proxima Centauri. During a campaign monitoring the star for possible exoplanet transits, we identified an
    increase in Sloan i' flux leading to an observed peak at BJD 2457935.996 that was at least 10 per cent over pre-flare
    flux in this band. It was followed by a two-component rapid decline in the first 100 s that became a slower exponential
    decay with time constant of 1350 s. A smaller flare event 1300 s after the first added an incremental peak flux increase
    of 1 per cent of pre-flare flux. Since the onset of the flare was not fully time resolved at a cadence of 62 s, its actual
    peak value is unknown but greater than the time average over a single exposure of 20 s. The i' band is representative
    of broad optical and near-IR continuum flux over which the integrated energy of the flare is 100 times the stellar luminosity.
    This meets the criteria that established the concept of superflares on similar stars. The resulting implied ultraviolet
    flux and space weather could have had an extreme effect on the atmospheres of planets within the star's otherwise habitable
    zone.
