  ads_bibcode: 2023ApJ...947L..19R
  title: Conclusive Evidence for a Population of Water Worlds around M Dwarfs Remains Elusive
  authors:
  - Rogers, James G.
  - Schlichting, Hilke E.
  - Owen, James E.
  year: '2023'
