  arxiv_id: '1301.4503'
  ads_bibcode: 2013ApJ...764L..22M
  title: Kepler's Optical Secondary Eclipse of HAT-P-7b and Probable Detection of Planet-induced Stellar Gravity Darkening
  authors:
  - Morris, Brett M.
  - Mandell, Avi M.
  - Deming, Drake
  year: '2013'
  pubdate: '2013-02-00'
  doi: 10.1088/2041-8205/764/2/L22
  abstract: We present observations spanning 355 orbital phases of HAT-P-7 observed by Kepler from 2009 May to 2011 March
    (Q1-9). We find a shallower secondary eclipse depth than initially announced, consistent with a low optical albedo and
    detection of nearly exclusively thermal emission, without a reflected light component. We find an approximately 10 ppm
    perturbation to the average transit light curve near phase -0.02 that we attribute to a temperature decrease on the surface
    of the star, phased to the orbit of the planet. This cooler spot is consistent with planet-induced gravity darkening,
    slightly lagging the sub-planet position due to the finite response time of the stellar atmosphere. The brightness temperature
    of HAT-P-7b in the Kepler bandpass is T<SUB>B</SUB> = 2733 ± 21 K and the amplitude of the deviation in stellar surface
    temperature due to gravity darkening is approximately -0.18 K. The detection of the spot is not statistically unequivocal
    due its small amplitude, though additional Kepler observations should be able to verify the astrophysical nature of the
    anomaly.
