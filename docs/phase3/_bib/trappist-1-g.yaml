- &id363
  arxiv_id: '1312.1585'
  ads_bibcode: 2014ApJ...781...54R
  title: Feasibility Studies for the Detection of O<SUB>2</SUB> in an Earth-like Exoplanet
  authors:
  - Rodler, Florian
  - López-Morales, Mercedes
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1088/0004-637X/781/1/54
  abstract: We present the results of simulations on the detectability of O<SUB>2</SUB> in the atmosphere of Earth twins around
    nearby low mass stars using high resolution transmission spectroscopy. We explore such detectability with each of the
    three upcoming Extremely Large Telescopes (ELTs), i.e., GMT, TMT, and E-ELT, and high resolution spectrographs, assuming
    such instruments will be available in all ELTs. With these simulations we extend previous studies by taking into account
    atmospheric refraction in the transmission spectrum of the exo-Earth and observational white and red noise contributions.
    Our studies reveal that the number of transits necessary to detect O<SUB>2</SUB> in the atmosphere of an Earth twin around
    an M dwarf is by far higher than the number of transits estimated by Snellen et al. In addition, our simulations show
    that, when accounting for typical noise levels associated with observations in the optical and near-infrared, the O<SUB>2</SUB>
    A band at 760 nm is more favorable for detecting the exoplanetary signal than the O<SUB>2</SUB> band at 1268 nm for all
    the spectral types, except M9V. We conclude that, unless unpredicted instrumental limitations arise, the implementation
    of pre-slit optics such as image slicers appears to be key to significantly improving the yield of this particular science
    case. However, even in the most optimistic cases, we conclude that the detection of O<SUB>2</SUB> in the atmosphere of
    an Earth twin will only be feasible with the ELTs if the planet is orbiting a bright close by (d &lt;= 8 pc) M dwarf with
    a spectral type later than M3.
