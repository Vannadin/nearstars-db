  doi: 10.1051/0004-6361/202244991
  abstract: We report the discovery and characterisation of two Earth-mass planets orbiting in the habitable zone of the nearby
    M-dwarf GJ 1002 based on the analysis of the radial-velocity (RV) time series from the ESPRESSO and CARMENES spectrographs.
    The host star is the quiet M5.5 V star GJ 1002 (relatively faint in the optical, V ~ 13.8 mag, but brighter in the infrared,
    J ~ 8.3 mag), located at 4.84 pc from the Sun. We analyse 139 spectroscopic observations taken between 2017 and 2021.
    We performed a joint analysis of the time series of the RV and full-width half maximum (FWHM) of the cross-correlation
    function (CCF) to model the planetary and stellar signals present in the data, applying Gaussian process regression to
    deal with the stellar activity. We detect the signal of two planets orbiting GJ 1002. GJ 1002 b is a planet with a minimum
    mass m<SUB>p</SUB> sin i of 1.08 ± 0.13 M<SUB>⊕</SUB> with an orbital period of 10.3465 ± 0.0027 days at a distance of
    0.0457 ± 0.0013 au from its parent star, receiving an estimated stellar flux of 0.67 F<SUB>⊕</SUB>. GJ 1002 c is a planet
    with a minimum mass m<SUB>p</SUB> sin i of 1.36 ± 0.17 M<SUB>⊕</SUB> with an orbital period of 20.202 ± 0.013 days at
    a distance of 0.0738 ± 0.0021 au from its parent star, receiving an estimated stellar flux of 0.257 F<SUB>⊕</SUB>. We
    also detect the rotation signature of the star, with a period of 126 ± 15 days. We find that there is a correlation between
    the temperature of certain optical elements in the spectrographs and changes in the instrumental profile that can affect
    the scientific data, showing a seasonal behaviour that creates spurious signals at periods longer than ~200 days. GJ 1002
    is one of the few known nearby systems with planets that could potentially host habitable environments. The closeness
    of the host star to the Sun makes the angular sizes of the orbits of both planets (~9.7 mas and ~15.7 mas, respectively)
    large enough for their atmosphere to be studied via high-contrast high-resolution spectroscopy with instruments such as
    the future spectrograph ANDES for the ELT or the LIFE mission.
