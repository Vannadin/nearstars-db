  - Matsuyama, Isamu
  year: '2019'
  pubdate: '2019-02-00'
  doi: 10.1016/j.icarus.2018.09.019
  abstract: Subsurface ocean tides act as a mechanism to dissipate tidal energy in icy satellite interiors. We numerically
    model the effect of an ice shell on ocean tides using non-linear bottom drag for the first time. We demonstrate that subsurface
    oceans experience tidal pressurization due to the confining nature of the ice shell, and find that Enceladus' eccentricity
    forcing can generate up to 2.2 kPa of pressure excess at the ocean surface. Existing free-surface oceanic energy dissipation
    scaling laws are extended to subsurface oceans, and are benchmarked against our numerical results to within 10 %. We show
    that for the large bodies Ganymede, Europa and Titan, an ice shell increases eccentricity tidal heating due to self-gravity,
    whereas the shell's suppressive mechanical forcing reduces eccentricity tide dissipation on Enceladus and Dione by several
    orders of magnitude due to their high effective rigidities. In contrast, the ice shell enhances obliquity-forced dissipation
    in all satellites investigated, except Triton, because the largely divergence-free ocean response is unaffected by the
    shell's rigidity but is still enhanced by self-gravity. We conclude that the fundamental difference in ocean response
    to obliquity and eccentricity forcing, combined with self-gravity, results in increased obliquity heating and suppressed
    eccentricity heating in small satellites. For large satellites with low effective rigidities, the type of ocean response
    is less important because the shell's mechanical forcing has little impact on the flow, whereas self-gravity will enhance
    the response, and consequently dissipation, regardless of the forcing. Overall, obliquity tides are likely to dominate
    the tidal heating budget of icy satellite oceans, remaining the most prominent source of fluid dissipation in subsurface
    barotropic ocean tides.
