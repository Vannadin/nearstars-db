  arxiv_id: '2311.12593'
  ads_bibcode: 2024A&A...686A.296M
  title: The mass-radius relation of exoplanets revisited
  authors:
  - Müller, Simon
  - Baron, Jana
  - Helled, Ravit
  - Bouchy, François
  - Parc, Léna
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1051/0004-6361/202348690
  abstract: Determining the mass-radius (M‒R) relation of exoplanets is important for exoplanet characterization. Here, we
    present a re-analysis of the M‒R relations and their transitions using exoplanetary data from the PlanetS catalog, which
    accounts only for planets with reliable mass and radius determination. We find that "small planets" correspond to planets
    with masses of up to ~4.4 M<SUB>⊕</SUB> (within 17%) where R ∝ M<SUP>0.27</SUP>. Planets with masses between ~4.4 and
    127 M<SUB>⊕</SUB> (within 5%) can be viewed as "intermediate-mass" planets, where R ∝ M<SUP>0.67</SUP>. Massive planets,
    or gas giant planets, are found to have masses beyond 127 M<SUB>⊕</SUB> and an M‒R relation of R ∝ M<SUP>‒0.06</SUP>.
    By analyzing the radius-density relation we also find that the transition from "small" to "intermediate" planets occurs
    at a planetary radius of ~1.6 R<SUB>⊕</SUB> (within 3%). Our results are consistent with previous studies' results and
    provide an ideal fit for the current measured planetary population.
