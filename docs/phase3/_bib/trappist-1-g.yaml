- &id544
  arxiv_id: '1509.01590'
  ads_bibcode: 2015ApJ...812....3W
  title: An Activity-Rotation Relationship and Kinematic Analysis of Nearby Mid-to-Late-Type M Dwarfs
  authors:
  - West, Andrew A.
  - Weisenburger, Kolby L.
  - Irwin, Jonathan
  - Berta-Thompson, Zachory K.
  - Charbonneau, David
  - Dittmann, Jason
  - Pineda, J. Sebastian
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1088/0004-637X/812/1/3
  abstract: Using spectroscopic observations and photometric light curves of 238 nearby M dwarfs from the MEarth exoplanet
    transit survey, we examine the relationships between magnetic activity (quantified by Hα emission), rotation period, and
    stellar age. Previous attempts to investigate the relationship between magnetic activity and rotation in these stars were
    hampered by the limited number of M dwarfs with measured rotation periods (and the fact that v sin i measurements probe
    only rapid rotation). However, the photometric data from MEarth allows us to probe a wide range of rotation periods for
    hundreds of M dwarf stars (from shorter than one to longer than 100 days). Over all M spectral types that we probe, we
    find that the presence of magnetic activity is tied to rotation, including for late-type, fully convective M dwarfs. We
    also find evidence that the fraction of late-type M dwarfs that are active may be higher at longer rotation periods compared
    to their early-type counterparts, with several active, late-type, slowly rotating stars present in our sample. Additionally,
    we find that all M dwarfs with rotation periods shorter than 26 days (early-type; M1-M4) and 86 days (late-type; M5-M8)
    are magnetically active. This potential mismatch suggests that the physical mechanisms that connect stellar rotation to
    chromospheric heating may be different in fully convective stars. A kinematic analysis suggests that the magnetically
    active, rapidly rotating stars are consistent with a kinematically young population, while slow-rotators are less active
    or inactive and appear to belong to an older, dynamically heated stellar population.
