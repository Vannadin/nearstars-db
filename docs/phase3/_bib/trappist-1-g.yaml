  ads_bibcode: 2020SSRv..216...74L
  title: Loss and Fractionation of Noble Gas Isotopes and Moderately Volatile Elements from Planetary Embryos and Early Venus,
    Earth and Mars
  authors:
  - Lammer, Helmut
  - Scherf, Manuel
  - Kurokawa, Hiroyuki
  - Ueno, Yuichiro
  - Burger, Christoph
  - Maindl, Thomas
  - Johnstone, Colin P.
  - Leizinger, Martin
  - Benedikt, Markus
