  abstract: We present the discovery of an Earth-mass planet (M<SUB>b</SUB> sin i = 1.26 ± 0.21 M<SUB>⊕</SUB>) on a 15.6 d
    orbit of a relatively nearby (d ~ 9.6 pc) and low-mass (0.167 ± 0.011 M<SUB>☉</SUB>) M5.0 V star, Wolf 1069. Sitting at
    a separation of 0.0672 ± 0.0014 au away from the host star puts Wolf 1069 b in the habitable zone (HZ), receiving an incident
    flux of S = 0.652 ± 0.029 S<SUB>⊕</SUB>. The planetary signal was detected using telluric-corrected radial-velocity (RV)
    data from the CARMENES spectrograph, amounting to a total of 262 spectroscopic observations covering almost four years.
    There are additional long-period signals in the RVs, one of which we attribute to the stellar rotation period. This is
    possible thanks to our photometric analysis including new, well-sampled monitoring campaigns undergone with the OSN and
    TJO facilities that supplement archival photometry (i.e., from MEarth and SuperWASP), and this yielded an updated rotational
    period range of P<SUB>rot</SUB> = 150-170 d, with a likely value at 169.3<SUB>‒3.6</SUB><SUP>+3.7</SUP>. The stellar activity
    indicators provided by the CARMENES spectra likewise demonstrate evidence for the slow rotation period, though not as
    accurately due to possible factors such as signal aliasing or spot evolution. Our detectability limits indicate that additional
    planets more massive than one Earth mass with orbital periods of less than 10 days can be ruled out, suggesting that perhaps
    Wolf 1069 b had a violent formation history. This planet is also the sixth closest Earth-mass planet situated in the conservative
    HZ, after Proxima Centauri b, GJ 1061 d, Teegarden's Star c, and GJ 1002 b and c. Despite not transiting, Wolf 1069 b
    is nonetheless a very promising target for future three-dimensional climate models to investigate various habitability
    cases as well as for sub-m s<SUP>‒1</SUP> RV campaigns to search for potential inner sub-Earth-mass planets in order to
    test planet formation theories. <P />Full Table D.2 and additional data (i.e., stellar activity indicators as shown in
    Fig. 4 and long-term photometry as in Fig. 2) are only available at the CDS via anonymous ftp to <A href="https://cdsarc.cds.unistra.fr/">cdsarc.cds.unistra.fr</A>
    (ftp://130.79.128.5) or via <A href="https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/670/A84">https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/670/A84</A>
