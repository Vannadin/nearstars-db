  arxiv_id: '2508.12516'
  ads_bibcode: 2025ApJ...995L..52X
  title: The JWST Rocky Worlds DDT Program Reveals GJ 3929b to Likely Be a Bare Rock
  authors:
  - Xue, Qiao
  - Zhang, Michael
  - Coy, Brandon Park
  - Brady, Madison
  - Ji, Xuan
  - Bean, Jacob L.
  - Radica, Michael
  - Seifahrt, Andreas
  - Stürmer, Julian
  - Luque, Rafael
  - Basant, Ritvik
  - Brown, Nina
  - Das, Tanya
  - Kasper, David
  - Piaulet-Ghorayeb, Caroline
  - Kempton, Eliza M.-R.
  - Kite, Edwin
  year: '2025'
  pubdate: '2025-12-00'
  doi: 10.3847/2041-8213/ae2098
  abstract: 'We report first results from the JWST Rocky Worlds Director''s Discretionary Time program. Two secondary eclipses
    of the terrestrial exoplanet GJ 3929b were recently observed using MIRI photometric imaging at 15 μm. We present a reduction
    of these data using the updated SPARTA pipeline. We also refine the planet mass, radius, and predicted time of secondary
    eclipse using a new sector of TESS data and new, high-precision radial velocities from the MAROON-X spectrograph. For
    the two JWST observations, we recover secondary eclipse depths of 177 <inline-formula> <mml:math><mml:msubsup><mml:mrow></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>45</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>47</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> ppm and 143 <inline-formula> <mml:math><mml:msubsup><mml:mrow></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>35</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>34</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> ppm at times consistent with a nearly circular orbit, as expected from the radial velocity data. A joint
    fit of the two visits yields a dayside brightness temperature T<SUB>p,dayside</SUB> = 782 ± 79 K for GJ 3929b, which is
    consistent with the maximum brightness temperature <inline-formula> <mml:math><mml:msub><mml:mrow><mml:mi>T</mml:mi></mml:mrow><mml:mrow><mml:mi>max</mml:mi></mml:mrow></mml:msub><mml:mo>=</mml:mo><mml:mn>737</mml:mn><mml:mo>±</mml:mo><mml:mn>14</mml:mn></mml:math>
    </inline-formula> K for a bare black rock (i.e., assuming zero Bond albedo and no heat redistribution). These results
    rule out CO<SUB>2</SUB>-rich atmospheres thicker than 100 mbar at &gt;3σ, suggesting that GJ 3929b has lost any significant
    secondary atmosphere. The radial velocity data also indicate two additional nontransiting planets in the system: a previously
    identified planet in a 15.0 days orbit and a newly identified planet candidate in a 6.1 days orbit.'
