  arxiv_id: '1901.07034'
  ads_bibcode: 2019AJ....157..226F
  title: A Multi-year Search for Transits of Proxima Centauri. II. No Evidence for Transit Events with Periods between 1 and
    30 days
  authors:
  - Feliz, Dax L.
  - Blank, David L.
  - Collins, Karen A.
  - White, Graeme L.
  - Stassun, Keivan G.
  - Curtis, Ivan A.
  - Hart, Rhodes
  - Kielkopf, John F.
  - Nelson, Peter
  - Relles, Howard
  - Stockdale, Christopher
  - Jayawardene, Bandupriya
  - Shankland, Paul
  - Reichart, Daniel E.
  - Haislip, Joshua B.
  - Kouprianov, Vladimir V.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.3847/1538-3881/ab184f
  abstract: Using a global network of small telescopes, we have obtained light curves of Proxima Centauri at 329 observation
    epochs from 2006 to 2017. The planet Proxima b discovered by Anglada-Escudé et al. with an orbital period of 11.186 days
    has an a priori transit probability of ∼1.5% if it transits, the predicted transit depth is about 5 mmag. In Blank et
    al., we analyzed 96 of our light curves that overlapped with predicted transit ephemerides from previously published tentative
    transit detections and found no evidence in our data that would corroborate claims of transits with a period of 11.186
    days. Here we broaden our analysis, using 262 high-quality light curves from our data set to search for any periodic transit-like
    events over a range of periods from 1 to 30 days. We also inject a series of simulated planet transits and find that our
    data are sufficiently sensitive to have detected transits of 5 mmag depth, with recoverability ranging from ∼100% for
    an orbital period of 1 day to ∼20% for an orbital period of 20 days for the parameter spaces tested. Specifically, at
    the 11.186-day period and 5 mmag transit depth, we rule out transits in our data with high confidence. We are able to
    rule out virtually all transits of other planets at periods shorter than 5 days and depths greater than 3 mmag; however,
    we cannot confidently rule out transits at the period of Proxima b due to incomplete orbital phase coverage and a lack
    of sensitivity to transits shallower than 4 mmag.
