  - Damasso, M.
  - Haywood, R. D.
  - Morbidelli, A.
  - Latham, D. W.
  - Molinari, E.
  - Pepe, F.
  - Poretti, E.
  - Udry, S.
  - Affer, L.
  - Boschin, W.
  - Charbonneau, D.
  - Cosentino, R.
  - Cretignier, M.
  - Ghedina, A.
  - Lega, E.
  - López-Morales, M.
  - Margini, M.
  - Martínez Fiorenzano, A. F.
  - Mayor, M.
  - Micela, G.
  - Pedani, M.
  - Pinamonti, M.
  - Rice, K.
  - Sasselov, D.
  - Tronsgaard, R.
  - Vanderburg, A.
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.1051/0004-6361/202346211
  abstract: 'The exoplanet population characterized by relatively short orbital periods (P &lt; 100 d) around solar-type stars
    is dominated by super-Earths and sub-Neptunes. However, these planets are missing in our Solar System and the reason behind
    this absence is still unknown. Two theoretical scenarios invoke the role of Jupiter as the possible culprit: Jupiter may
    have acted as a dynamical barrier to the inward migration of sub-Neptunes from beyond the water iceline; alternatively,
    Jupiter may have considerably reduced the inward flux of material (pebbles) required to form super-Earths inside that
    iceline. Both scenarios predict an anti-correlation between the presence of small planets and that of cold Jupiters in
    exoplanetary systems. To test that prediction, we homogeneously analyzed the radial-velocity measurements of 38 Kepler
    and K2 transiting small planet systems gathered over nearly ten years with the HARPS-N spectrograph, as well as publicly
    available radial velocities collected with other facilities. We used Bayesian differential evolution Markov chain Monte
    Carlo techniques, which in some cases were coupled with Gaussian process regression to model non-stationary variations
    due to stellar magnetic activity phenomena. We detected five cold Jupiters in three systems: two in Kepler-68, two in
    Kepler-454, and a very eccentric one in K2-312. We also found linear trends caused by bound companions in Kepler-93, Kepler-454,
    and K2-12, with slopes that are still compatible with a planetary mass for outer bodies in the Kepler-454 and K2-12 systems.
    By using binomial statistics and accounting for the survey completeness, we derived an occurrence rate of 9.3<SUB>‒2.9</SUB><SUP>+7.7</SUP>%
    for cold Jupiters with 0.3-13 M<SUB>Jup</SUB> and 1-10 AU, which is lower but still compatible at 1.3σ with the value
    measured from radial-velocity surveys for solar-type stars, regardless of the presence or absence of small planets. The
    sample is not large enough to draw a firm conclusion about the predicted anti-correlation between small planets and cold
    Jupiters; nevertheless, we found no evidence of previous claims of an excess of cold Jupiters in small planet systems.
