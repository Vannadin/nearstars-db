  abstract: We derive lower bounds on the orbital distance and inclination of a putative planet beyond the transiting seven
    planets of TRAPPIST-1, for a range of masses ranging from 0.08 M <SUB>Jup</SUB> to 3.5 M <SUB>Jup</SUB>. While the outer
    architecture of this system will ultimately be constrained by radial velocity measurements over time, we present dynamical
    constraints from the remarkably coplanar configuration of the seven transiting planets, which is sensitive to modestly
    inclined perturbers. We find that the observed configuration is unlikely if a Jovian-mass planet inclined by ≥3° to the
    transiting planet exists within 0.53 au, exceeding any constraints from transit timing variations (TTV) induced in the
