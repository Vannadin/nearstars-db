  arxiv_id: '1802.02923'
  ads_bibcode: 2018ApJ...861...38G
  title: Limitation of Atmospheric Composition by Combustion-Explosion in Exoplanetary Atmospheres
  authors:
  - Grenfell, J. L.
  - Gebauer, S.
  - Godolt, M.
  - Stracke, B.
  - Lehmann, R.
  - Rauer, H.
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.3847/1538-4357/aab2a9
  abstract: This work presents theoretical studies that combine aspects of combustion and explosion theory with exoplanetary
    atmospheric science. Super-Earths could possess a large amount of molecular hydrogen depending on disk, planetary, and
    stellar properties. Super-Earths orbiting pre-main-sequence M-dwarf stars have been suggested to possess large amounts
    of O<SUB>2</SUB>(g) produced abiotically via water photolysis followed by hydrogen escape. If these two constituents were
    present simultaneously, such large amounts of H<SUB>2</SUB>(g) and O<SUB>2</SUB>(g) can react via photochemistry to form
    up to ∼10 Earth oceans. In cases where photochemical removal is slow, hence O<SUB>2</SUB>(g) can indeed build up abiotically,
    the atmosphere could reach the combustion-explosion limit. Then, H<SUB>2</SUB>(g) and O<SUB>2</SUB>(g) react extremely
    quickly to release energy and form liquid water together with modest amounts of hydrogen peroxide. These processes set
    constraints for H<SUB>2</SUB>(g) and O<SUB>2</SUB>(g) atmospheric compositions in Super-Earth atmospheres. Our initial
    study of the gas-phase oxidation pathways for modest conditions (Earth’s insolation and ∼10th of a percent of H<SUB>2</SUB>(g))
    suggests that H<SUB>2</SUB>(g) is oxidized by O<SUB>2</SUB>(g) into H<SUB>2</SUB>O(g) mostly via HOx and mixed HOx-NOx
    catalyzed cycles. Regarding other pairs of atmospheric species, we find that CO-O<SUB>2</SUB> could attain explosive-combustive
    levels on mini gas planets for midrange C/O in the equilibrium chemistry regime (p &gt; ∼1 bar). Regarding (CH<SUB>4</SUB>-O<SUB>2</SUB>),
    a small number of modeled rocky planets assuming Earth-like atmospheres orbiting cooler stars could have compositions
    at or near the explosive-combustive level although more work is required to investigate this issue.
