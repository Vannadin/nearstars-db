  title: The CARMENES search for exoplanets around M dwarfs. Benchmarking the impact of activity in high-precision radial
    velocity measurements
  authors:
  - Jeffers, S. V.
  - Barnes, J. R.
  - Schöfer, P.
  - Quirrenbach, A.
  - Zechmeister, M.
  - Amado, P. J.
