  abstract: Correct parameterization of the Collision-induced Absorption (CIA) phenomena is essential for accurate modeling
    of planetary atmospheres. The HITRAN spectroscopic database provides these parameters in a dedicated section. Here, we
    significantly revise and extend the HITRAN CIA data with respect to the original effort described in Richard et al. [JQSRT
    113, 1276 (2012)]. The extension concerns new collisional pairs as well as wider spectral and temperature ranges for the
    existing pairs. The database now contains CIA for N<SUB>2</SUB>sbnd N<SUB>2</SUB>, N<SUB>2</SUB>sbnd H<SUB>2</SUB>, N<SUB>2</SUB>sbnd
    CH<SUB>4</SUB>, N<SUB>2</SUB>sbnd H<SUB>2</SUB>O, N<SUB>2</SUB>sbnd O<SUB>2</SUB>, O<SUB>2</SUB>sbnd O<SUB>2</SUB>, O<SUB>2</SUB>sbnd
    CO<SUB>2</SUB>, CO<SUB>2</SUB>sbnd CO<SUB>2</SUB>, H<SUB>2</SUB>sbnd H<SUB>2</SUB>, H<SUB>2</SUB>sbnd He, H<SUB>2</SUB>sbnd
    CH<SUB>4</SUB>, H<SUB>2</SUB>sbnd H, Hsbnd He, CH<SUB>4</SUB>sbnd CH<SUB>4</SUB>, CH<SUB>4</SUB>sbnd CO<SUB>2</SUB>, CH<SUB>4</SUB>sbnd
    He, and CH<SUB>4</SUB>sbnd Ar collision pairs. The sources of data as well as their validation and selection are discussed.
    A wish list to eliminate remaining deficiencies or lack of data from the astrophysics perspective is also presented.
