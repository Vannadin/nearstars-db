  abstract: The exchange of molecules between a planet's interior and exterior is a major component of planetary development
    and atmospheric formation. Recently, detailed observational studies of exoplanet atmospheres have become possible, enabling
    robust testing of planetary outgassing models. In this Note, we apply the Dorn et al. stagnant lid model for outgassing
