  arxiv_id: '1709.03491'
  ads_bibcode: 2017ApJ...849..104E
  title: 'The Breakthrough Listen Search for Intelligent Life: 1.1-1.9 GHz Observations of 692 Nearby Stars'
  authors:
  - Enriquez, J. Emilio
  - Siemion, Andrew
  - Foster, Griffin
  - Gajjar, Vishal
  - Hellbourg, Greg
  - Hickish, Jack
