- &id1036
  arxiv_id: '1611.03509'
  ads_bibcode: 2017ApJ...834...85N
  title: The Hα Emission of Nearby M Dwarfs and its Relation to Stellar Rotation
  authors:
  - Newton, Elisabeth R.
  - Irwin, Jonathan
  - Charbonneau, David
  - Berlind, Perry
  - Calkins, Michael L.
  - Mink, Jessica
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.3847/1538-4357/834/1/85
  abstract: 'The high-energy emission from low-mass stars is mediated by the magnetic dynamo. Although the mechanisms by which
    fully convective stars generate large-scale magnetic fields are not well understood, it is clear that, as for solar-type
    stars, stellar rotation plays a pivotal role. We present 270 new optical spectra of low-mass stars in the Solar Neighborhood.
    Combining our observations with those from the literature, our sample comprises 2202 measurements or non-detections of
    Hα emission in nearby M dwarfs. This includes 466 with photometric rotation periods. Stars with masses between 0.1 and
    0.6 M<SUB>☉</SUB> are well-represented in our sample, with fast and slow rotators of all masses. We observe a threshold
    in the mass-period plane that separates active and inactive M dwarfs. The threshold coincides with the fast-period edge
    of the slowly rotating population, at approximately the rotation period at which an era of rapid rotational evolution
    appears to cease. The well-defined active/inactive boundary indicates that Hα activity is a useful diagnostic for stellar
    rotation period, e.g., for target selection for exoplanet surveys, and we present a mass-period relation for inactive
    M dwarfs. We also find a significant, moderate correlation between L<SUB>Hα</SUB>/L<SUB>bol</SUB> and variability amplitude:
    more active stars display higher levels of photometric variability. Consistent with previous work, our data show that
    rapid rotators maintain a saturated value of L<SUB>Hα</SUB>/L<SUB>bol</SUB>. Our data also show a clear power-law decay
    in L<SUB>Hα</SUB>/L<SUB>bol</SUB> with Rossby number for slow rotators, with an index of -1.7 ± 0.1.'
  source: citation_of=2025ApJ...986L...3P
