- &id338
  arxiv_id: '1702.08611'
  ads_bibcode: 2017JGRE..122..432H
  title: Titan's atmosphere and climate
  authors:
  - Hörst, S. M.
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1002/2016JE005240
  abstract: Titan is the only moon with a substantial atmosphere, the only other thick N<SUB>2</SUB> atmosphere besides Earth's,
    the site of extraordinarily complex atmospheric chemistry that far surpasses any other solar system atmosphere, and the
    only other solar system body with stable liquid currently on its surface. The connection between Titan's surface and atmosphere
    is also unique in our solar system; atmospheric chemistry produces materials that are deposited on the surface and subsequently
    altered by surface-atmosphere interactions such as aeolian and fluvial processes resulting in the formation of extensive
    dune fields and expansive lakes and seas. Titan's atmosphere is favorable for organic haze formation, which combined with
    the presence of some oxygen-bearing molecules indicates that Titan's atmosphere may produce molecules of prebiotic interest.
    The combination of organics and liquid, in the form of water in a subsurface ocean and methane/ethane in the surface lakes
    and seas, means that Titan may be the ideal place in the solar system to test ideas about habitability, prebiotic chemistry,
    and the ubiquity and diversity of life in the universe. The Cassini-Huygens mission to the Saturn system has provided
    a wealth of new information allowing for study of Titan as a complex system. Here I review our current understanding of
    Titan's atmosphere and climate forged from the powerful combination of Earth-based observations, remote sensing and in
    situ spacecraft measurements, laboratory experiments, and models. I conclude with some of our remaining unanswered questions
    as the incredible era of exploration with Cassini-Huygens comes to an end.
