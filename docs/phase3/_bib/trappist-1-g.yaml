  ads_bibcode: 2015ApJ...799..154M
  title: 'Weather on Other Worlds. II. Survey Results: Spots are Ubiquitous on L and T Dwarfs'
  authors:
  - Metchev, Stanimir A.
  - Heinze, Aren
  - Apai, Dániel
  - Flateau, Davin
  - Radigan, Jacqueline
