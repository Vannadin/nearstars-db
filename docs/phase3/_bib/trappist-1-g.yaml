  ads_bibcode: 2012ApJ...761...53B
  title: Photometrically Derived Masses and Radii of the Planet and Star in the TrES-2 System
  authors:
  - Barclay, Thomas
  - Huber, Daniel
  - Rowe, Jason F.
  - Fortney, Jonathan J.
  - Morley, Caroline V.
  - Quintana, Elisa V.
  - Fabrycky, Daniel C.
  - Barentsen, Geert
  - Bloemen, Steven
  - Christiansen, Jessie L.
  - Demory, Brice-Olivier
  - Fulton, Benjamin J.
  - Jenkins, Jon M.
  - Mullally, Fergal
  - Ragozzine, Darin
  - Seader, Shaun E.
  - Shporer, Avi
  - Tenenbaum, Peter
  - Thompson, Susan E.
  year: '2012'
  pubdate: '2012-12-00'
  doi: 10.1088/0004-637X/761/1/53
  abstract: We measure the mass and radius of the star and planet in the TrES-2 system using 2.7 years of observations by
    the Kepler spacecraft. The light curve shows evidence for ellipsoidal variations and Doppler beaming on a period consistent
    with the orbital period of the planet with amplitudes of 2.79<SUP>+0.44</SUP> <SUB>-0.62</SUB> and 3.44<SUP>+0.32</SUP>
    <SUB>-0.37</SUB> parts per million (ppm), respectively, and a difference between the dayside and the nightside planetary
    flux of 3.41<SUP>+0.55</SUP> <SUB>-0.82</SUB> ppm. We present an asteroseismic analysis of solar-like oscillations on
    TrES-2A which we use to calculate the stellar mass of 0.94 ± 0.05 M <SUB>☉</SUB> and radius of 0.95 ± 0.02 R <SUB>☉</SUB>.
    Using these stellar parameters, a transit model fit and the phase-curve variations, we determine the planetary radius
    of 1.162<SUP>+0.020</SUP> <SUB>-0.024</SUB> R <SUB>Jup</SUB> and derive a mass for TrES-2b from the photometry of 1.44
    ± 0.21 M <SUB>Jup</SUB>. The ratio of the ellipsoidal variation to the Doppler beaming amplitudes agrees to better than
    2σ with theoretical predications, while our measured planet mass and radius agree within 2σ of previously published values
    based on spectroscopic radial velocity measurements. We measure a geometric albedo of 0.0136<SUP>+0.0022</SUP> <SUB>-0.0033</SUB>
    and an occultation (secondary eclipse) depth of 6.5<SUP>+1.7</SUP> <SUB>-1.8</SUB> ppm which we combined with the day/night
    planetary flux ratio to model the atmosphere of TrES-2b. We find that an atmosphere model that contains a temperature
    inversion is strongly preferred. We hypothesize that the Kepler bandpass probes a significantly greater atmospheric depth
    on the night side relative to the day side.
