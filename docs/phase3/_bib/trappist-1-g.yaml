  arxiv_id: '2306.03913'
  ads_bibcode: 2023SciA....9F8736Z
  title: Giant tidal tails of helium escaping the hot Jupiter HAT-P-32 b
  authors:
  - Zhang, Zhoujian
  - Morley, Caroline V.
  - Gully-Santiago, Michael
  - MacLeod, Morgan
  - Oklopčić, Antonija
  - Luna, Jessica
  - Tran, Quang H.
  - Ninan, Joe P.
  - Mahadevan, Suvrath
  - Krolikowski, Daniel M.
  - Cochran, William D.
  - Bowler, Brendan P.
  - Endl, Michael
  - Stefánsson, Gudmundur
  - Tofflemire, Benjamin M.
  - Vanderburg, Andrew
  - Zeimann, Gregory R.
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.1126/sciadv.adf8736
  abstract: Capturing planets in the act of losing their atmospheres provides rare opportunities to probe their evolution
    history. This analysis has been enabled by observations of the helium triplet at 10,833 angstrom, but past studies have
    focused on the narrow time window right around the planet's optical transit. We monitored the hot Jupiter HAT-P-32 b using
    high-resolution spectroscopy from the Hobby-Eberly Telescope covering the planet's full orbit. We detected helium escaping
    HAT-P-32 b at a 14σ significance,with extended leading and trailing tails spanning a projected length over 53 times the
    planet's radius. These tails are among the largest known structures associated with an exoplanet. We interpret our observations
    using three-dimensional hydrodynamic simulations, which predict Roche Lobe overflow with extended tails along the planet's
    orbital path. Long-baseline monitoring of the HAT-P-32Ab system reveals helium escaping through tidal tails 50 times the
    size of the planet.
