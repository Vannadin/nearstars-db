- &id374
  arxiv_id: '0912.3243'
  ads_bibcode: 2010ApJ...716.1208R
  title: Three Possible Origins for the Gas Layer on GJ 1214b
  authors:
  - Rogers, L. A.
  - Seager, S.
  year: '2010'
  pubdate: '2010-06-00'
  doi: 10.1088/0004-637X/716/2/1208
  abstract: 'We present an analysis of the bulk composition of the MEarth transiting super-Earth exoplanet GJ 1214b using
    planet interior structure models. We consider three possible origins for the gas layer on GJ 1214b: direct accretion of
    gas from the protoplanetary nebula, sublimation of ices, and outgassing from rocky material. Armed only with measurements
    of the planet mass (M<SUB>p</SUB> = 6.55 ± 0.98 M <SUB>⊕</SUB>), radius (R<SUB>p</SUB> = 2.678 ± 0.13 R <SUB>⊕</SUB>),
    and stellar irradiation level, our main conclusion is that we cannot infer a unique composition. A diverse range of planet
    interiors fits the measured planet properties. Nonetheless, GJ 1214b''s relatively low average density (ρ<SUB> p </SUB>
    = 1870 ± 400 kg m<SUP>-3</SUP>) means that it almost certainly has a significant gas component. Our second major conclusion
    is that under most conditions we consider GJ 1214b would not have liquid water. Even if the outer envelope is predominantly
    sublimated water ice, the envelope will likely consist of a super-fluid layer sandwiched between vapor above and plasma
    (electrically conductive fluid) below at greater depths. In our models, a low intrinsic planet luminosity (lsim2TW) is
    needed for a water envelope on GJ 1214b to pass through the liquid phase.'
