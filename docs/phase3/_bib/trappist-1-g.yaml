  arxiv_id: '2312.03943'
  ads_bibcode: 2024AJ....167...10C
  title: 'The Breakthrough Listen Search for Intelligent Life: Technosignature Search of 97 Nearby Galaxies'
  authors:
  - Choza, Carmen
  - Bautista, Daniel
  - Croft, Steve
  - Siemion, Andrew P. V.
  - Brzycki, Bryan
  - Bhattaram, Krishnakumar
  - Czech, Daniel
