  doi: 10.3847/1538-3881/abc6af
  abstract: We present TRICERATOPS, a new Bayesian tool that can be used to vet and validate TESS Objects of Interest (TOIs).
    We test the tool on 68 TOIs that have been previously confirmed as planets or rejected as astrophysical false positives.
    By looking in the false-positive probability (FPP)-nearby false-positive probability (NFPP) plane, we define criteria
    that TOIs must meet to be classified as validated planets (FPP &lt; 0.015 and NFPP &lt; 10<SUP>-3</SUP>), likely planets
    (FPP &lt; 0.5 and NFPP &lt; 10<SUP>-3</SUP>), and likely nearby false positives (NFPP &gt; 10<SUP>-1</SUP>). We apply
    this procedure on 384 unclassified TOIs and statistically validate 12, classify 125 as likely planets, and classify 52
    as likely nearby false positives. Of the 12 statistically validated planets, 9 are newly validated. TRICERATOPS is currently
    the only TESS vetting and validation tool that models transits from nearby contaminant stars in addition to the target
    star. We therefore encourage use of this tool to prioritize follow-up observations that confirm bona fide planets and
    identify false positives originating from nearby stars.
