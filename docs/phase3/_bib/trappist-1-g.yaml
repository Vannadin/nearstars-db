  ads_bibcode: 2015ApJ...805...16C
  title: 'Understanding the Effects of Stellar Multiplicity on the Derived Planet Radii from Transit Surveys: Implications
    for Kepler, K2, and TESS'
  authors:
  - Ciardi, David R.
  - Beichman, Charles A.
  - Horch, Elliott P.
  - Howell, Steve B.
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1088/0004-637X/805/1/16
  abstract: We present a study on the effect of undetected stellar companions on the derived planetary radii for Kepler Objects
    of Interest (KOIs). The current production of the KOI list assumes that each KOI is a single star. Not accounting for
    stellar multiplicity statistically biases the planets toward smaller radii. The bias toward smaller radii depends on the
    properties of the companion stars and whether the planets orbit the primary or the companion stars. Defining a planetary
    radius correction factor, X<SUB>R</SUB>, we find that if the KOIs are assumed to be single, then, on average, the planetary
    radii may be underestimated by a factor of &lt; {{X}<SUB>R</SUB>}&gt; ≈ 1.5. If typical radial velocity and high-resolution
    imaging observations are performed and no companions are detected, then this factor reduces to &lt; {{X}<SUB>R</SUB>}&gt;
    ≈ 1.2. The correction factor &lt; {{X}<SUB>R</SUB>}&gt; is dependent on the primary star properties and ranges from &lt;
    {{X}<SUB>R</SUB>}&gt; ≈ 1.6 for A and F stars to &lt; {{X}<SUB>R</SUB>}&gt; ≈ 1.2 for K and M stars. For missions like
    K2 and TESS where the stars may be closer than the stars in the Kepler target sample, observational vetting (primary imaging)
    reduces the radius correction factor to &lt; {{X}<SUB>R</SUB>}&gt; ≈ 1.1. Finally, we show that if the stellar multiplicity
    rates are not accounted for correctly, then occurrence rate calculations for Earth-sized planets may overestimate the
    frequency of small planets by as much as 15%-20%.
