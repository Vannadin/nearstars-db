  doi: 10.3847/PSJ/ade3c2
  abstract: The NASA Exoplanet Archive (NEA) and the Exoplanet Follow-up Observing Program service are two widely used resources
    for the exoplanet community. The NEA provides a complete and accurate accounting of exoplanetary systems published by
    NASA missions and by the community in the refereed literature. In anticipation of continued exponential growth in the
    number of exoplanetary systems and the increasing complexity in our characterization of these systems, the NEA has restructured
    its primary tables and interfaces, as well as extending and standardizing their modes of access. The Exoplanet Follow-up
    Observing Program service provides the exoplanet community with a venue for coordinating and sharing follow-up and precursor
    data for exoplanets, their host stars, and stars that might eventually be targets for future planet searches and recently
    reached 1 million files uploaded by the community. In this paper, we describe the updates to our data holdings, functionality,
    accessibility, and tools, as well as future priorities for these two services.
