  ads_bibcode: 2016ApJ...821L..19N
  title: The Impact of Stellar Rotation on the Detectability of Habitable Planets around M Dwarfs
  authors:
  - Newton, Elisabeth R.
  - Irwin, Jonathan
  - Charbonneau, David
  - Berta-Thompson, Zachory K.
  - Dittmann, Jason A.
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.3847/2041-8205/821/1/L19
  abstract: Stellar activity and rotation frustrate the detection of exoplanets through the radial velocity technique. This
    effect is particularly of concern for M dwarfs, which can remain magnetically active for billions of years. We compile
    rotation periods for late-type stars and for the M dwarf planet-host sample in order to investigate the rotation periods
    of older field stars across the main sequence. We show that for stars with masses between 0.25 and 0.5 {M}<SUB>☉ </SUB>
    (M4V-M1V), the stellar rotation period typical of field stars coincides with the orbital periods of planets in the habitable
    zone. This will pose a fundamental challenge to the discovery and characterization of potentially habitable planets around
    early M dwarfs. Due to the longer rotation periods reached by mid M dwarfs and the shorter orbital period at which the
    planetary habitable zone is found, stars with masses between 0.1 and 0.25 {M}<SUB>☉ </SUB> (M6V-M4V) offer better opportunities
    for the detection of habitable planets via radial velocities.
