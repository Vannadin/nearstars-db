  ads_bibcode: 2024A&A...685A.131B
  title: Star-spot activity, orbital obliquity, transmission spectrum, physical properties, and transit time variations of
    the HATS-2 planetary system
  authors:
  - Biagiotti, F.
  - Mancini, L.
  - Southworth, J.
  - Tregloan-Reed, J.
  - Naponiello, L.
  - Jørgensen, U. G.
  - Bach-Møller, N.
  - Basilicata, M.
  - Bonavita, M.
  - Bozza, V.
  - Burgdorf, M. J.
  - Dominik, M.
  - Figuera Jaimes, R.
  - Henning, Th.
  - Hinse, T. C.
  - Hundertmark, M.
  - Khalouei, E.
  - Longa-Peña, P.
  - Peixinho, N.
  - Rabus, M.
