  - Zhou, Zhi-Hua
  year: '2008'
  pubdate: '2008-12-00'
  doi: 10.1109/ICDM.2008.17
  abstract: Most existing model-based approaches to anomaly detection construct a profile of normal instances, then identify
    instances that do not conform to the normal profile as anomalies. This paper proposes a fundamentally different model-based
    method that explicitly isolates anomalies instead of profiles normal points. To our best knowledge, the concept of isolation
    has not been explored in current literature. The use of isolation enables the proposed method, iForest, to exploit sub-sampling
    to an extent that is not feasible in existing methods, creating an algorithm which has a linear time complexity with a
    low constant and a low memory requirement. Our empirical evaluation shows that iForest performs favourably to ORCA, a
    near-linear time complexity distance-based method, LOF and Random Forests in terms of AUC and processing time, and especially
    in large data sets. iForest also works well in high dimensional problems which have a large number of irrelevant attributes,
    and in situations where training set does not contain any anomalies.
