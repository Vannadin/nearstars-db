  arxiv_id: '1804.10170'
  ads_bibcode: 2018AJ....156..292T
  title: The Effects of Stellar Companions on the Observed Transiting Exoplanet Radius Distribution
  authors:
  - Teske, Johanna K.
  - Ciardi, David R.
  - Howell, Steve B.
  - Hirsch, Lea A.
  - Johnson, Rachel A.
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.3847/1538-3881/aaed2d
  abstract: Understanding the distribution and occurrence rate of small planets was a fundamental goal of the Kepler transiting
    exoplanet mission, and could be improved with K2 and Transiting Exoplanet Survey Satellite (TESS). Deriving accurate exoplanetary
    radii requires accurate measurements of the host star radii and the planetary transit depths, including accounting for
    any “third light” in the system due to nearby bound companions or background stars. High-resolution imaging of Kepler
    and K2 planet candidate hosts to detect very close (within ∼0.″5) background or bound stellar companions has been crucial
    for both confirming the planetary nature of candidates, and the determination of accurate planetary radii and mean densities.
    Here we present an investigation of the effect of close companions, both detected and undetected, on the observed (raw
    count) exoplanet radius distribution. We demonstrate that the recently detected “gap” in the observed radius distribution
    (also seen in the completeness-corrected distribution) is fairly robust to undetected stellar companions, given that all
    of the systems in the sample have undergone some kind of vetting with high-resolution imaging. However, while the gap
    in the observed sample is not erased or shifted, it is partially filled in after accounting for possible undetected stellar
    companions. These findings have implications for the most likely core composition, and thus formation location, of super-Earth
    and sub-Neptune planets. Furthermore, we show that without high-resolution imaging of planet candidate host stars, the
    shape of the observed exoplanet radius distribution will be incorrectly inferred, for both Kepler- and TESS-detected systems.
  source: citation_of=2018AJ....156...91M
