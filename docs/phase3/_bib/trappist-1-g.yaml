  doi: 10.3847/1538-3881/aaaf75
  abstract: We present here the analysis of 30 gaseous extrasolar planets, with temperatures between 600 and 2400 K and radii
    between 0.35 and 1.9 R <SUB>Jup</SUB>. The quality of the HST/WFC3 spatially scanned data combined with our specialized
    analysis tools allow us to study the largest and most self-consistent sample of exoplanetary transmission spectra to date
    and examine the collective behavior of warm and hot gaseous planets rather than isolated case studies. We define a new
    metric, the Atmospheric Detectability Index (ADI) to evaluate the statistical significance of an atmospheric detection
    and find statistically significant atmospheres in around 16 planets out of the 30 analyzed. For most of the Jupiters in
    our sample, we find the detectability of their atmospheres to be dependent on the planetary radius but not on the planetary
    mass. This indicates that planetary gravity plays a secondary role in the state of gaseous planetary atmospheres. We detect
    the presence of water vapour in all of the statistically detectable atmospheres, and we cannot rule out its presence in
    the atmospheres of the others. In addition, TiO and/or VO signatures are detected with 4σ confidence in WASP-76 b, and
    they are most likely present in WASP-121 b. We find no correlation between expected signal-to-noise and atmospheric detectability
    for most targets. This has important implications for future large-scale surveys.
