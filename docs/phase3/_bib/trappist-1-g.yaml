  pubdate: '2013-03-00'
  doi: 10.1016/j.energy.2012.12.002
  abstract: This paper reviews the recent development of available cold storage materials for subzero applications. According
    to the type of a storage medium and the way of the storage medium is used, phase change material (PCM) storage and sorption
    storage are introduced separately. Eutectic water─salt solutions and non-eutectic water─salt solution PCMs are discussed
    from thermal and physicochemical properties such as fusion heat, thermal conductivity, phase separation, supercooling,
    corrosion, flammability, etc. Related solutions for issues of such PCMs are offered. Microencapsulated PCMs are introduced
    as they have an excellent heat transfer performance to the surroundings because of the large surface per volume of the
    capsules and the excellent cycling stability due to the restricted phase separation in microscopic distances. PCMs with
    nanoparticle additives are also discussed as they have higher thermal conductivity for better storage process. Absorption
    and adsorption storages are mainly discussed for their working pairs, heat transfer enhancement and system performance
    improvement aspects. Relevant perspective technologies are discussed for further work.
