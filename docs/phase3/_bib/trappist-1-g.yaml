  arxiv_id: '2301.05034'
  ads_bibcode: 2023A&A...673A.117C
  title: How the origin of stars in the Galaxy impacts the composition of planetary building blocks
  authors:
  - Cabral, N.
  - Guilbert-Lepoutre, A.
  - Bitsch, B.
  - Lagarde, N.
  - Diakite, S.
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.1051/0004-6361/202243882
  abstract: 'Context. Our Galaxy is composed of different stellar populations with varying chemical abundances, which are
    thought to imprint the composition of planet building blocks (PBBs). As such, the properties of stars should affect the
    properties of planets and small bodies formed in their systems. In this context, high-resolution spectroscopic surveys
    open a window into the chemical links between and their host stars. <BR /> Aims: We aim to determine the PBB composition
    trends for various stellar populations across the Galaxy by comparing the two large spectroscopic surveys APOGEE and GALAH.
    We assess the reliability of the PBB composition as determined with these surveys with a propagation error study. <BR
    /> Methods: Stellar spectroscopic abundances from the large surveys GALAH-DR3 and APOGEE-DR17 were used as input with
    a stoichiometric condensation model. We classified stars into different Galactic components and we quantified the PBB
    composition trends as a function of [Fe/H]. We also analysed the distribution composition patterns in the [α/Fe]-[Fe/H]
    diagram. <BR /> Results: Our propagation error study suggests that the overall trends with [Fe/H] and [α/Fe] are robust,
    which is supported by the double study of both APOGEE and GALAH. We therefore confirm the existence of a bimodal PBB composition
    separating the thin disc stars from the thick disc stars. Furthermore, we confirm that the stoichiometric water PBB content
    is anti-correlated with [Fe/H]. <BR /> Conclusions: Our results imply that metal-poor stars both in the thin and thick
    disks are suitable hosts for water-rich PBBs and for ice-rich small bodies. However, for metal-poor stars ([Fe/H]&lt;0),
    the PBBs around thick disc stars should have a higher water content than that around thin disc stars because of the α-content
    dependence of the water mass fraction. Given the importance of the initial water abundance of the PBBs in recent planet
    formation simulations, we expect that the star origin influences the exoplanet population properties across the Galaxy.'
