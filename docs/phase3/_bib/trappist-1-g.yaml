  ads_bibcode: 2015JExpB.218.1856S
  title: 'The effects of temperature on aerobic metabolism: towards a mechanistic understanding of the responses of ectotherms
    to a changing environment'
  authors:
  - Schulte, Patricia M.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1242/jeb.118851
  abstract: Because of its profound effects on the rates of biological processes such as aerobic metabolism, environmental
    temperature plays an important role in shaping the distribution and abundance of species. As temperature increases, the
    rate of metabolism increases and then rapidly declines at higher temperatures ─ a response that can be described using
    a thermal performance curve (TPC). Although the shape of the TPC for aerobic metabolism is often attributed to the competing
    effects of thermodynamics, which can be described using the Arrhenius equation, and the effects of temperature on protein
    stability, this account represents an over-simplification of the factors acting even at the level of single proteins.
    In addition, it cannot adequately account for the effects of temperature on complex multistep processes, such as aerobic
    metabolism, that rely on mechanisms acting across multiple levels of biological organization. The purpose of this review
    is to explore our current understanding of the factors that shape the TPC for aerobic metabolism in response to acute
    changes in temperature, and to highlight areas where this understanding is weak or insufficient. Developing a more strongly
    grounded mechanistic model to account for the shape of the TPC for aerobic metabolism is crucial because these TPCs are
    the foundation of several recent attempts to predict the responses of species to climate change, including the metabolic
    theory of ecology and the hypothesis of oxygen and capacity-limited thermal tolerance.
