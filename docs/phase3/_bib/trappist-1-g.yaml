  doi: 10.1140/epjst/e2020-000098-9
  abstract: Quantification of habitability is a complex task. Previous attempts at measuring habitability are well documented.
    Classification of exoplanets, on the other hand, is a different approach and depends on quality of training data available
    in habitable exoplanet catalogs. Classification is the task of predicting labels of newly discovered planets based on
    available class labels in the catalog. We present analytical exploration of novel activation functions as consequence
    of integration of several ideas leading to implementation and subsequent use in habitability classification of exoplanets.
    Neural networks, although a powerful engine in supervised methods, often require expensive tuning efforts for optimized
    performance. Habitability classes are hard to discriminate, especially when attributes used as hard markers of separation
    are removed from the data set. The solution is approached from the point of investigating analytical properties of the
    proposed activation functions. The theory of ordinary differential equations and fixed point are exploited to justify
    the "lack of tuning efforts" to achieve optimal performance compared to traditional activation functions. Additionally,
    the relationship between the proposed activation functions and the more popular ones is established through extensive
    analytical and empirical evidence. Finally, the activation functions have been implemented in plain vanilla feed-forward
    neural network to classify exoplanets. The mathematical exercise supplements the grand idea of classifying exoplanets,
    computing habitability scores/indices and automatic grouping of the exoplanets converging at some level.
