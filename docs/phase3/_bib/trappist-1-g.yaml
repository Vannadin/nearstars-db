  ads_bibcode: 2012NatCo...3..751G
  title: Structure-guided evolution of cyan fluorescent proteins towards a quantum yield of 93%
  authors:
  - Goedhart, Joachim
  - von Stetten, David
  - Noirclerc-Savoye, Marjolaine
  - Lelimousin, Mickaël
  - Joosen, Linda
