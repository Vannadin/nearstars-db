- &id675
  arxiv_id: '2401.11082'
  ads_bibcode: 2024ApJ...963L...7W
  title: JWST Observations of K2-18b Can Be Explained by a Gas-rich Mini-Neptune with No Habitable Surface
  authors:
  - Wogan, Nicholas F.
  - Batalha, Natasha E.
  - Zahnle, Kevin J.
  - Krissansen-Totton, Joshua
  - Tsai, Shang-Min
  - Hu, Renyu
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.3847/2041-8213/ad2616
  abstract: The James Webb Space Telescope (JWST) recently measured the transmission spectrum of K2-18b, a habitable-zone
    sub-Neptune exoplanet, detecting CH<SUB>4</SUB> and CO<SUB>2</SUB> in its atmosphere. The discovery paper argued the data
    are best explained by a habitable "Hycean" world, consisting of a relatively thin H<SUB>2</SUB>-dominated atmosphere overlying
    a liquid water ocean. Here, we use photochemical and climate models to simulate K2-18b as both a Hycean planet and a gas-rich
    mini-Neptune with no defined surface. We find that a lifeless Hycean world is hard to reconcile with the JWST observations
    because photochemistry only supports &lt;1 part-per-million CH<SUB>4</SUB> in such an atmosphere while the data suggest
    about ∼1% of the gas is present. Sustaining percent-level CH<SUB>4</SUB> on a Hycean K2-18b may require the presence of
    a methane-producing biosphere, similar to microbial life on Earth ∼3 billion years ago. On the other hand, we predict
    that a gas-rich mini-Neptune with 100× solar metallicity should have 4% CH<SUB>4</SUB> and nearly 0.1% CO<SUB>2</SUB>,
    which are compatible with the JWST data. The CH<SUB>4</SUB> and CO<SUB>2</SUB> are produced thermochemically in the deep
    atmosphere and mixed upward to the low pressures sensitive to transmission spectroscopy. The model predicts H<SUB>2</SUB>O,
    NH<SUB>3</SUB>, and CO abundances broadly consistent with the nondetections. Given the additional obstacles to maintaining
    a stable temperate climate on Hycean worlds due to H<SUB>2</SUB> escape and potential supercriticality at depth, we favor
    the mini-Neptune interpretation because of its relative simplicity and because it does not need a biosphere or other unknown
    source of methane to explain the data.
