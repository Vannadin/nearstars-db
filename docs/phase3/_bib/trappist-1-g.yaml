  doi: 10.1088/1538-3873/ab63eb
  abstract: The Very Large Array Sky Survey (VLASS) is a synoptic, all-sky radio sky survey with a unique combination of high
    angular resolution (≈2"5), sensitivity (a 1σ goal of 70 μJy/beam in the coadded data), full linear Stokes polarimetry,
    time domain coverage, and wide bandwidth (2-4 GHz). The first observations began in 2017 September, and observing for
    the survey will finish in 2024. VLASS will use approximately 5500 hr of time on the Karl G. Jansky Very Large Array (VLA)
    to cover the whole sky visible to the VLA (decl. &gt; -40°), a total of 33 885 deg 2 . The data will be taken in three
    epochs to allow the discovery of variable and transient radio sources. The survey is designed to engage radio astronomy
    experts, multi-wavelength astronomers, and citizen scientists alike. By utilizing an "on the fly" interferometry mode,
    the observing overheads are much reduced compared to a conventional pointed survey. In this paper, we present the science
    case and observational strategy for the survey, and also results from early survey observations.
