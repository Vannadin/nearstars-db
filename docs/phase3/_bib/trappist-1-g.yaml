  arxiv_id: '2205.10958'
  ads_bibcode: 2022arXiv220510958P
  title: 'Venus as an Exoplanet: I. An Initial Exploration of the 3-D Energy Balance for a CO$_{2}$ Exoplanetary Atmosphere
    Around an M-Dwarf Star'
  authors:
  - Parkinson, Christopher D.
  - Bougher, Stephen W.
  - Mills, Franklin P.
  - Brecht, Amanda
  - Li, James
  - Yung, Yuk L.
  - Hu, Renyu
