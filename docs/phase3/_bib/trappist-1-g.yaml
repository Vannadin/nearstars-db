  doi: 10.3847/2515-5172/aaac2e
  abstract: HAT-P-11 is a planet-hosting K4V star in the Kepler field, with an activity cycle that bear similarities to the
    Sun's. The chromospheric activity of HAT-P-11 indicates that a new activity cycle is beginning. We report ground-based
    observations with holographic diffuser photometry to measure the starspots of HAT-P-11 in its second observed magnetic
    activity cycle (Cycle 1). We find the area coverage of starspots within the transit chord for UTC 2017-10-30 is 14% ---
    which makes this transit the most spotted HAT-P-11 transit observed to date. We suggest that we are likely observing occultations
    of large spot groups appearing at the beginning of Cycle 1.
