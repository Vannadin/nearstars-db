- &id630
  arxiv_id: '2505.03200'
  ads_bibcode: 2025ApJ...987..174I
  title: 'Monosilane Worlds: Sub-Neptunes with Atmospheres Shaped by Reduced Magma Oceans'
  authors:
  - Ito, Yuichi
  - Kimura, Tadahiro
  - Ohno, Kazumasa
  - Fujii, Yuka
  - Ikoma, Masahiro
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.3847/1538-4357/add3fe
  abstract: High-precision infrared spectroscopic measurements now enable detailed characterization of sub-Neptune atmospheres,
    potentially providing constraints on their interiors. Motivated by this, atmospheric models have been developed to explore
    chemical interactions between hydrogen-dominated atmospheres and possibly underlying magma oceans with various redox states.
    Recent models have predicted monosilane (SiH<SUB>4</SUB>) as a potential atmospheric species derived from magma oceans
    in sub-Neptunes, but suggested that it is highly depleted in the observable atmospheric layers. Here, we propose that
    SiH<SUB>4</SUB> can persist throughout the atmospheres of sub-Neptunes with FeO-free reduced magma oceans by considering
    the dissolution of H<SUB>2</SUB>O into the magma oceans, a factor not accounted for in previous models. We construct a
    one-dimensional atmospheric model to simulate the chemical equilibrium composition of hydrogen-dominated atmospheres overlying
    FeO-free magma oceans, incorporating H─O─Si chemistry. Our results show that the dissolution of H<SUB>2</SUB>O enhances
    the SiH<SUB>4</SUB> molar fraction to levels of 0.1%─10%, preventing it from reverting to silicates in the upper atmospheric
    layers. We find that SiH<SUB>4</SUB>-rich atmospheres can exist across a broad parameter space with ground temperatures
    of 2000─6000 K and hydrogen pressures of 10<SUP>2</SUP>─10<SUP>5</SUP> bar. We discuss that SiH<SUB>4</SUB>-rich atmospheres
    could contain the other silanes but lack C-/N-/O-bearing species. The detection of SiH<SUB>4</SUB> in future observations
    of sub-Neptunes would provide compelling evidence for the presence of a rocky core with a reduced magma ocean. However,
    the accuracy of our model is limited by the lack of data on the nonideal behavior and radiative properties of SiH<SUB>4</SUB>,
    highlighting the need for further numerical and laboratory investigations.
