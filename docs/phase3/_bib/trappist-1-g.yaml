  abstract: This is the first of a series of papers presenting the Modules for Experiments in Stellar Astrophysics (MESA)
    Isochrones and Stellar Tracks (MIST) project, a new comprehensive set of stellar evolutionary tracks and isochrones computed
    using MESA, a state-of-the-art open-source 1D stellar evolution package. In this work, we present models with solar-scaled
    abundance ratios covering a wide range of ages (5≤slant {log}({Age}) [{year}]≤slant 10.3), masses (0.1≤slant M/{M}<SUB>☉
    </SUB>≤slant 300), and metallicities (-2.0≤slant [{{Z}}/{{H}}]≤slant 0.5). The models are self-consistently and continuously
    evolved from the pre-main sequence (PMS) to the end of hydrogen burning, the white dwarf cooling sequence, or the end
    of carbon burning, depending on the initial mass. We also provide a grid of models evolved from the PMS to the end of
    core helium burning for -4.0≤slant [{{Z}}/{{H}}]\lt -2.0. We showcase extensive comparisons with observational constraints
    as well as with some of the most widely used existing models in the literature. The evolutionary tracks and isochrones
    can be downloaded from the project website at <A href="http://waps.cfa.harvard.edu/MIST/">http://waps.cfa.harvard.edu/MIST/</A>.
