  ads_bibcode: 2012Natur.485..478M
  title: Superflares on solar-type stars
  authors:
  - Maehara, Hiroyuki
  - Shibayama, Takuya
  - Notsu, Shota
  - Notsu, Yuta
  - Nagao, Takashi
  - Kusaba, Satoshi
