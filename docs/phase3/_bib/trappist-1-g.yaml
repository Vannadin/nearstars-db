- &id1169
  arxiv_id: null
  ads_bibcode: 2012ApJ...757...95C
  title: 'The Evolution of Solar Flux from 0.1 nm to 160 μm: Quantitative Estimates for Planetary Studies'
  authors:
  - Claire, Mark W.
  - Sheets, John
  - Cohen, Martin
  - Ribas, Ignasi
  - Meadows, Victoria S.
  - Catling, David C.
  year: '2012'
  pubdate: '2012-09-00'
  doi: 10.1088/0004-637X/757/1/95
  abstract: Understanding changes in the solar flux over geologic time is vital for understanding the evolution of planetary
    atmospheres because it affects atmospheric escape and chemistry, as well as climate. We describe a numerical parameterization
    for wavelength-dependent changes to the non-attenuated solar flux appropriate for most times and places in the solar system.
    We combine data from the Sun and solar analogs to estimate enhanced UV and X-ray fluxes for the young Sun and use standard
    solar models to estimate changing visible and infrared fluxes. The parameterization, a series of multipliers relative
    to the modern top of the atmosphere flux at Earth, is valid from 0.1 nm through the infrared, and from 0.6 Gyr through
    6.7 Gyr, and is extended from the solar zero-age main sequence to 8.0 Gyr subject to additional uncertainties. The parameterization
    is applied to a representative modern day flux, providing quantitative estimates of the wavelength dependence of solar
    flux for paleodates relevant to the evolution of atmospheres in the solar system (or around other G-type stars). We validate
    the code by Monte Carlo analysis of uncertainties in stellar age and flux, and with comparisons to the solar proxies κ<SUP>1</SUP>
    Cet and EK Dra. The model is applied to the computation of photolysis rates on the Archean Earth.
