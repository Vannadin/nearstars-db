- &id487
  arxiv_id: '1804.10135'
  ads_bibcode: 2018A&A...618A..20C
  title: 'A new method to compute limb-darkening coefficients for stellar atmosphere models with spherical symmetry: the space
    missions TESS, Kepler, CoRoT, and MOST'
  authors:
  - Claret, Antonio
  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.1051/0004-6361/201833060
  abstract: '<BR /> Aims: One of the biggest problems we can encounter while dealing with the limb-darkening coefficients
    for stellar atmospheric models with spherical symmetry is the difficulty of adjusting both the limb and the central parts
    simultaneously. In particular, the regions near the drop-offs are not well reproduced for most models, depending on Teff,
    log g, or wavelength. Even if the law with four terms is used, these disagreements still persist. Here we introduce a
    new method that considerably improves the description of both the limb and the central parts and that will allow users
    to test models of stellar atmospheres with spherical symmetry more accurately in environments such as exoplanetary transits,
    eclipsing binaries, etc. <BR /> Methods: The method introduced here is simple. Instead of considering all the μ points
    in the adjustment, as is traditional, we consider only the points until the drop-off (μ<SUB>cri</SUB>) of each model.
    From this point, we impose a condition I(μ)/I(1) = 0. All calculations were performed by adopting the least-squares method.
    <BR /> Results: The resulting coefficients using this new method reproduce the intensity distribution of the PHOENIX spherical
    models (COND and DRIFT) quite well for the photometric systems of the space missions TESS, Kepler, CoRoT, and MOST. The
    calculations cover the following ranges of local gravity and effective temperatures: 2.5 ≤ log g ≤ 6.0 and 1500 K ≤ T<SUB>eff</SUB>
    ≤ 12 000 K. The new spherical coefficients can easily be adapted to the most commonly used light curve synthesis codes.
    <P />Additional calculations for other photometric systems and/or other bi-parametric laws can be performed on request.Tables
    2-17 are only available in electronic form at the CDS via anonymous ftp to <A href="https://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/618/A20">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/618/A20</A>'
