  doi: 10.3847/1538-4357/ad3063
  abstract: Determination of fundamental parameters of stars impacts all fields of astrophysics, from galaxy evolution to
    constraining the internal structure of exoplanets. This paper presents a detailed spectroscopic analysis of Barnard's
    star (otherwise known as Gl 699) that compares an exceptionally high-quality (an average signal-to-noise ratio of ∼1000
    in the entire domain), high-resolution near-infrared (NIR) spectrum taken with Canada-France-Hawaii Telescope/SPIRou to
    PHOENIX-ACES stellar atmosphere models. The observed spectrum shows thousands of lines not identified in the models with
    a similarly large number of lines present in the model but not in the observed data. We also identify several other caveats,
    such as continuum mismatch, unresolved contamination, and spectral lines significantly shifted from their expected wavelengths;
    all of these can be a source of bias for the determination of abundance. Out of &gt;10<SUP>4</SUP> observed lines in the
    NIR that could be used for chemical spectroscopy, we identify a short list of a few hundred lines that are reliable. We
    present a novel method for determining the effective temperature (T <SUB>eff</SUB>) and overall metallicity of slowly
    rotating M dwarfs that uses several groups of lines as opposed to bulk spectral fitting methods. With this method, we
    infer T <SUB>eff</SUB> = 3231 ± 21 K for Barnard's star, consistent with the value of 3238 ± 11 K inferred from the interferometric
    method. We also provide measurements of the abundance of 15 different elements for Barnard's star, including the abundances
    of four elements (K, O, Y, Th) never reported before for this star. This work emphasizes the need to improve current atmosphere
    models to fully exploit the NIR domain for chemical spectroscopy analysis.
