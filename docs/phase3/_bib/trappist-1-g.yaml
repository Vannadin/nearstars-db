  doi: 10.1073/pnas.1612147114
  abstract: We document organic matter encapsulated in rock clasts from a oceanic serpentinite mud volcano above the Izu-Bonin-Mariana
    subduction zone (Pacific Ocean). Although we cannot pinpoint the exact origin of the organic matter, chemical analysis
    of the constituents resembles molecular signatures that could be produced by microbial life deep within or below the mud
    volcano. Considering the known temperature limit for life, 122 °C, and the subduction zone forearc geotherm where such
    mud volcanoes are located, we estimate that life could exist as deep as ∼10,000 m below the seafloor. This is considerably
    deeper than other active serpentinizing regions such as midocean ridges and could have provided sheltered ecosystems for
    life to survive the more violent phases of Earth's history.
