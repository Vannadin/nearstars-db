  arxiv_id: '2402.14072'
  ads_bibcode: 2024ApJ...970...47R
  title: 'Fleeting but Not Forgotten: The Imprint of Escaping Hydrogen Atmospheres on Super-Earth Interiors'
  authors:
  - Rogers, James G.
  - Schlichting, Hilke E.
  - Young, Edward D.
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/1538-4357/ad5287
  abstract: 'Small, close-in exoplanets are divided into two subpopulations: super-Earths and sub-Neptunes. Most super-Earths
    are thought to have lost their primordially accreted hydrogen-dominated atmospheres via thermally driven winds. We consider
    the global chemical equilibrium of super-Earths and the lasting impacts of their fleeting hydrogen atmospheres. We find
    that hydrogen is efficiently sequestered into the interior, oxidizing iron and endogenously producing ∼0.5%─1.0% water
    by mass. As the atmospheres of super-Earths are continuously sculpted by mass loss and chemical equilibration, they remain
    hydrogen-dominated by mole (number) fraction but become steam-dominated by mass, which may be observable with JWST for
    planets transitioning across the radius valley. One of the main effects of efficient sequestration of hydrogen into the
    interior is to produce an underdense bulk interior compared to that of Earth. We predict bulk densities of super-Earths
    to be ∼5.0 g cm<SUP>−3</SUP> for a 1M <SUB>⊕</SUB> planet, which is consistent with high-precision mass measurements and
    also population-level inference analyses from atmospheric escape models.'
