  ads_bibcode: 2024JATIS..10c4006S
  title: Paths to robust exoplanet science yield margin for the Habitable Worlds Observatory
  authors:
  - Stark, Christopher C.
  - Mennesson, Bertrand
  - Bryson, Steve
