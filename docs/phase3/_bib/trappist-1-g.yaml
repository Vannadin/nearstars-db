- &id1257
  arxiv_id: '1909.03001'
  ads_bibcode: 2019E&PSL.52615770P
  title: Hydrogen isotopic evidence for early oxidation of silicate Earth
  authors:
  - Pahlevan, Kaveh
  - Schaefer, Laura
  - Hirschmann, Marc M.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1016/j.epsl.2019.115770
  abstract: The Moon-forming giant impact extensively melts and partially vaporizes the silicate Earth and delivers a substantial
    mass of metal to Earth's core. The subsequent evolution of the magma ocean and overlying atmosphere has been described
    by theoretical models but observable constraints on this epoch have proved elusive. Here, we report thermodynamic and
    climate calculations of the primordial atmosphere during the magma ocean and water ocean epochs respectively and forge
    new links with observations to gain insight into the behavior of volatiles on the Hadean Earth. As accretion wanes, Earth's
    magma ocean crystallizes, outgassing the bulk of its volatiles into the primordial atmosphere. The redox state of the
    magma ocean controls both the chemical composition of the outgassed volatiles and the hydrogen isotopic composition of
    water oceans that remain after hydrogen escape from the primordial atmosphere. The climate modeling indicates that multi-bar
    H<SUB>2</SUB>-rich atmospheres generate sufficient greenhouse warming and rapid kinetics resulting in ocean-atmosphere
    H<SUB>2</SUB>O-H<SUB>2</SUB> isotopic equilibration. Whereas water condenses and is mostly retained, molecular hydrogen
    does not condense and can escape, allowing large quantities (∼10<SUP>2</SUP> bars) of hydrogen - if present - to be lost
    from the Earth in this epoch. Because the escaping inventory of H can be comparable to the hydrogen inventory in primordial
    water oceans, equilibrium deuterium enrichment can be large with a magnitude that depends on the initial atmospheric H<SUB>2</SUB>
    inventory. With rapid kinetics, the water molecule concentrates deuterium and, to the extent that hydrogen in other forms
    (e.g., H<SUB>2</SUB>) are significant species in the outgassed atmosphere, pronounced D/H enrichments (∼1.5-2x) in the
    oceans are expected from equilibrium partitioning in this epoch. By contrast, the common view that terrestrial water has
    a carbonaceous chondritic source requires the oceans to preserve the isotopic composition of that source, undergoing minimal
    D-enrichment via equilibration with H<SUB>2</SUB> followed by hydrodynamic escape. Such minimal enrichment places upper
    limits on the amount of primordial atmospheric H<SUB>2</SUB> in contact with Hadean water oceans and implies oxidizing
    conditions (logfO<SUB>2</SUB> &gt; IW + 1, H<SUB>2</SUB>/H<SUB>2</SUB>O &lt; 0.3) for outgassing from the magma ocean.
    Preservation of an approximate carbonaceous chondrite D/H signature in the oceans thus provides evidence that the observed
    oxidation of silicate Earth occurred before crystallization of the final magma ocean, yielding a new constraint on the
    timing of this critical event in Earth history. The seawater-carbonaceous chondrite "match" in D/H (to ∼10-20%) further
    constrains the prior existence of an atmospheric H<SUB>2</SUB> inventory - of any origin - on post-giant-impact Earth
    to &lt;20 bars, and suggests that the terrestrial mantle supplied the oxidant for the chemical resorption of metals during
    terrestrial late accretion.
