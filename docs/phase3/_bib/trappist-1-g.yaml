  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.1051/0004-6361/201731884
  abstract: The source GJ1132 is a nearby red dwarf known to host a transiting Earth-size planet. After its initial detection,
    we pursued an intense follow-up with the HARPS velocimeter. We now confirm the detection of GJ1132b with radial velocities
    alone. We refined its orbital parameters, and in particular, its mass (m<SUB>b</SUB> = 1.66 ± 0.23 M<SUB>⊕</SUB>), density
    (ρ<SUB>b</SUB> = 6.3 ± 1.3 g cm<SUP>-3</SUP>), and eccentricity (e<SUB>b</SUB> &lt; 0.22; 95%). We also detected at least
    one more planet in the system. GJ1132c is a super-Earth with period P<SUB>c</SUB> = 8.93 ± 0.01 days and minimum mass
    m<SUB>c</SUB> sini<SUB>c</SUB> = 2.64 ± 0.44 M<SUB>⊕</SUB>. Receiving about 1.9 times more flux than Earth in our solar
    system, its equilibrium temperature is that of a temperate planet (T<SUB>eq</SUB> = 230-300 K for albedos A = 0.75 - 0.00),
    which places GJ1132c near the inner edge of the so-called habitable zone. Despite an a priori favorable orientation for
    the system, Spitzer observations reject most transit configurations, leaving a posterior probability &lt;1% that GJ1132c
    transits. GJ1132(d) is a third signal with period P<SUB>d</SUB> = 177 ± 5 days attributed to either a planet candidate
    with minimum mass m<SUB>d</SUB> sin i<SUB>d</SUB> = 8.4<SUB>-2.5</SUB><SUP>+1.7</SUP> M<SUB>⊕</SUB> or stellar activity.
    Its Doppler signal is the most powerful in our HARPS time series but appears on a timescale where either the stellar rotation
    or a magnetic cycle are viable alternatives to the planet hypothesis. On the one hand, the period is different than that
    measured for the stellar rotation (~125 days), and a Bayesian statistical analysis we performed with a Markov chain Monte
    Carlo and Gaussian processes demonstrates that the signal is better described by a Keplerian function than by correlated
    noise. On the other hand, periodograms of spectral indices sensitive to stellar activity show power excess at similar
    periods to that of this third signal, and radial velocity shifts induced by stellar activity can also match a Keplerian
    function. We, therefore, prefer to leave the status of GJ1132(d) undecided. <P />Based on observations made with the HARPS
    instrument on the ESO 3.6 m telescope under the program IDs 191.C-0873(A), and 198.C-0838(A), at Cerro La Silla (Chile).
    <P />Radial velocity data are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/618/A142">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/618/A142</A>
