  abstract: I present a literature survey of the currently available Doppler images of cool stars. The 65 individual stars
    with Doppler images consist of 29 single stars and 36 components in close binaries. Out of the total, 31 were observed
    only once but 12 stars are (or were) being monitored for years. Each image for each star is identified with the time when
    it was observed, whether photometry was used in the imaging, the inclination of the stellar rotation axis, the vsin i,
    the stellar rotation period, and whether a polar spot and/or a high-latitude or low-latitude spot was seen. The type of
    variable star and its M-K spectral classification is also listed to identify the evolutionary status. The sample consists
    of 3 classical T Tauri stars, 8 weak-lined T Tauri's, 27 main-sequence stars, 9 subgiants, and 18 giants. The total number
    of Doppler images is 245 as of June 2002.
