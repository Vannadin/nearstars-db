  doi: 10.3847/1538-4357/abb36f
  abstract: Extreme-ultraviolet and X-ray emission from stellar coronae drives mass loss from exoplanet atmospheres, and ultraviolet
    emission from stellar chromospheres drives photochemistry in exoplanet atmospheres. Comparisons of the spectral energy
    distributions of host stars are, therefore, essential for understanding the evolution and habitability of exoplanets.
    The large number of stars observed with the MUSCLES, Mega-MUSCLES, and other recent Hubble Space Telescope observing programs
    has provided for the first time a large sample (79 stars) of reconstructed Lyα fluxes that we compare with X-ray fluxes
    to identify significant patterns in the relative emission from these two atmospheric regions as a function of stellar
    age and effective temperature. We find that as stars age on the main sequence, the emissions from their chromospheres
    and coronae follow a pattern in response to the amount of magnetic heating in these atmospheric layers. A single trend-line
    slope describes the pattern of X-ray versus Lyα emission for G and K dwarfs, but the different trend lines for M dwarf
    stars show that the Lyα fluxes of M stars are significantly smaller than those of warmer stars with the same X-ray flux.
    The X-ray and Lyα luminosities divided by the stellar bolometric luminosities show different patterns depending on stellar
    age. The L(Lyα)/L(bol) ratios increase smoothly to cooler stars of all ages, but the L(X)/L(bol) ratios show different
    trends. For older stars, the increase in coronal emission with decreasing ${T}_{\mathrm{eff}}$ is much steeper than that
    of chromospheric emission. We suggest a fundamental link between atmospheric properties and trend lines relating coronal
    and chromospheric heating, * Based on observations made with the NASA/ESA Hubble Space Telescope, obtained from the Mikulski
    Archive for Space Telescopes (MAST) at the Space Telescope Science Institute, which is operated by the Association of
    Universities for Research in Astronomy, Inc., under NASA contract NAS AR-09525.01A. These observations are associated
    with program Nos. 12475, 12596, 13650, 14640, and 15071.
