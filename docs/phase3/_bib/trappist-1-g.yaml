  arxiv_id: '1712.01010'
  ads_bibcode: 2018A&A...614A...1W
  title: Equilibrium chemistry down to 100 K. Impact of silicates and phyllosilicates on the carbon to oxygen ratio
  authors:
  - Woitke, P.
  - Helling, Ch.
  - Hunter, G. H.
  - Millard, J. D.
  - Turner, G. E.
