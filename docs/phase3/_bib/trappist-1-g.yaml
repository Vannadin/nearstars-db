  arxiv_id: '1511.02549'
  ads_bibcode: 2016PNAS..113.8127S
  title: Quantifying the origins of life on a planetary scale
  authors:
  - Scharf, Caleb
  - Cronin, Leroy
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.1073/pnas.1523233113
  abstract: A simple, heuristic formula with parallels to the Drake Equation is introduced to help focus discussion on open
    questions for the origins of life in a planetary context. This approach indicates a number of areas where quantitative
    progress can be made on parameter estimation for determining origins of life probabilities, based on constraints from
    Bayesian approaches. We discuss a variety of “microscale” factors and their role in determining “macroscale” abiogenesis
    probabilities on suitable planets. We also propose that impact ejecta exchange between planets with parallel chemistries
    and chemical evolution could in principle amplify the development of molecular complexity and abiogenesis probabilities.
    This amplification could be very significant, and both bias our conclusions about abiogenesis probabilities based on the
    Earth and provide a major source of variance in the probability of life arising in planetary systems. We use our heuristic
    formula to suggest a number of observational routes for improving constraints on origins of life probabilities.
