  ads_bibcode: 2016Natur.532..207D
  title: A map of the large day-night temperature gradient of a super-Earth exoplanet
  authors:
  - Demory, Brice-Olivier
  - Gillon, Michael
  - de Wit, Julien
  - Madhusudhan, Nikku
  - Bolmont, Emeline
  - Heng, Kevin
  - Kataria, Tiffany
  - Lewis, Nikole
  - Hu, Renyu
  - Krick, Jessica
  - Stamenković, Vlada
  - Benneke, Björn
