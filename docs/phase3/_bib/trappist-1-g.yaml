  title: Escaping Helium and a Highly Muted Spectrum Suggest a Metal-enriched Atmosphere on Sub-Neptune GJ 3090 b from JWST
    Transit Spectroscopy
  authors:
  - Ahrer, Eva-Maria
  - Radica, Michael
  - Piaulet-Ghorayeb, Caroline
  - Raul, Eshan
  - Wiser, Lindsey
  - Welbanks, Luis
  - Acuña, Lorena
  - Allart, Romain
  - Coulombe, Louis-Philippe
  - Louca, Amy
  - MacDonald, Ryan
  - Saidel, Morgan
  - Evans-Soma, Thomas M.
  - Benneke, Björn
  - Christie, Duncan
  - Beatty, Thomas G.
  - Cadieux, Charles
  - Cloutier, Ryan
  - Doyon, René
  - Fortney, Jonathan J.
  - Gagnebin, Anna
  - Gapp, Cyril
  - Innes, Hamish
  - Knutson, Heather A.
  - Komacek, Thaddeus
  - Krissansen-Totton, Joshua
  - Miguel, Yamila
  - Pierrehumbert, Raymond
  - Roy, Pierre-Alexis
  - Schlichting, Hilke E.
  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.3847/2041-8213/add010
  abstract: 'Sub-Neptunes, the most common planet type, remain poorly understood. Their atmospheres are expected to be diverse,
    but their compositions are challenging to determine, even with JWST. Here, we present the first JWST spectroscopic study
    of the warm sub-Neptune GJ 3090 b (2.13 R<SUB>⊕</SUB>, T<SUB>eq,A = 0.3</SUB> ∼ 700 K), which orbits an M2V star, making
    it a favorable target for atmosphere characterization. We observed four transits of GJ 3090 b: two each using JWST NIRISS/SOSS
    and NIRSpec/G395H, yielding wavelength coverage from 0.6 to 5.2 μm. We detect the signature of the 10833 Å metastable
    helium triplet at a statistical significance of 5.5σ with an amplitude of 434 ± 79 ppm, marking the first such detection
    in a sub-Neptune with JWST. This amplitude is significantly smaller than predicted by solar-metallicity forward models,
    suggesting a metal-enriched atmosphere that decreases the mass-loss rate and attenuates the helium feature amplitude.
    Moreover, we find that stellar contamination, in the form of the transit light source effect, dominates the NIRISS transmission
    spectra, with unocculted spot and faculae properties varying across the two visits separated in time by approximately
    6 months. Free retrieval analyses on the NIRSpec/G395H spectrum find tentative evidence for highly muted features and
    a lack of CH<SUB>4</SUB>. These findings are best explained by a high-metallicity atmosphere (&gt;100× solar at 3σ confidence
    for clouds at ∼μbar pressures) using chemically consistent retrievals and self-consistent model grids. Further observations
    of GJ 3090 b are needed for tighter constraints on the atmospheric abundances and to gain a deeper understanding of the
    processes that led to its potential metal enrichment.'
