- &id1092
  arxiv_id: '1503.07864'
  ads_bibcode: 2015MNRAS.450.2083R
  title: Likely detection of water-rich asteroid debris in a metal-polluted white dwarf
  authors:
  - Raddi, R.
  - Gänsicke, B. T.
  - Koester, D.
  - Farihi, J.
  - Hermes, J. J.
  - Scaringi, S.
  - Breedt, E.
  - Girven, J.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1093/mnras/stv701
  abstract: The cool white dwarf SDSS J124231.07+522626.6 exhibits photospheric absorption lines of eight distinct heavy elements
    in medium resolution optical spectra, notably including oxygen. The T<SUB>eff</SUB> = 13 000 K atmosphere is helium-dominated,
    but the convection zone contains significant amounts of hydrogen and oxygen. The four most common rock-forming elements
    (O, Mg, Si, and Fe) account for almost all the accreted mass, totalling at least 1.2 × 10<SUP>24</SUP> g, similar to the
    mass of Ceres. The time-averaged accretion rate is 2 × 10<SUP>10</SUP> g s<SUP>-1</SUP>, one of the highest rates inferred
    among all known metal-polluted white dwarfs. We note a large oxygen excess, with respect to the most common metal oxides,
    suggesting that the white dwarf accreted planetary debris with a water content of ≈38 per cent by mass. This star, together
    with GD 61, GD 16, and GD 362, form a small group of outliers from the known population of evolved planetary systems accreting
    predominantly dry, rocky debris. This result strengthens the hypothesis that, integrated over the cooling ages of white
    dwarfs, accretion of water-rich debris from disrupted planetesimals may significantly contribute to the build-up of trace
    hydrogen observed in a large fraction of helium-dominated white dwarf atmospheres.
