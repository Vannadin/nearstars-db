- &id235
  arxiv_id: '2412.07285'
  ads_bibcode: 2025ApJ...979..133F
  title: 'Tides on Lava Worlds: Application to Close-in Exoplanets and the Early Earth─Moon System'
  authors:
  - Farhat, Mohammad
  - Auclair-Desrotour, Pierre
  - Boué, Gwenaël
  - Lichtenberg, Tim
  - Laskar, Jacques
  year: '2025'
  pubdate: '2025-02-00'
  doi: 10.3847/1538-4357/ad9b93
  abstract: 'Understanding the physics of planetary magma oceans has been the subject of growing efforts, in light of the
    increasing abundance of solar system samples and extrasolar surveys. A rocky planet harboring such an ocean is likely
    to interact tidally with its host star, planetary companions, or satellites. To date, however, models of the tidal response
    and heat generation of magma oceans have been restricted to the framework of weakly viscous solids, ignoring the dynamical
    fluid behavior of the ocean beyond a critical melt fraction. Here we provide a handy analytical model that accommodates
    this phase transition, allowing for a physical estimation of the tidal response of lava worlds. We apply the model in
    two settings: the tidal history of the early Earth─Moon system in the aftermath of the giant impact, and the tidal interplay
    between short-period exoplanets and their host stars. For the former, we show that the fluid behavior of the Earth''s
    molten surface drives efficient early lunar recession to ~25 Earth radii within 10<SUP>4</SUP>─10<SUP>5</SUP> yr, in contrast
    with earlier predictions. For close-in exoplanets, we report on how their molten surfaces significantly change their spin─orbit
    dynamics, allowing them to evade spin─orbit resonances and accelerating their track toward tidal synchronization from
    a gigayear to megayear timescale. Moreover, we reevaluate the energy budgets of detected close-in exoplanets, highlighting
    how the surface thermodynamics of these planets are likely controlled by enhanced, fluid-driven tidal heating, rather
    than vigorous insolation, and how this regime change substantially alters predictions for their surface temperatures.'
