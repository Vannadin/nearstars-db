  arxiv_id: '1701.04817'
  ads_bibcode: 2017AJ....153...77C
  title: 'AstroImageJ: Image Processing and Photometric Extraction for Ultra-precise Astronomical Light Curves'
  authors:
  - Collins, Karen A.
  - Kielkopf, John F.
  - Stassun, Keivan G.
  - Hessman, Frederic V.
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/1538-3881/153/2/77
  abstract: ImageJ is a graphical user interface (GUI) driven, public domain, Java-based, software package for general image
    processing traditionally used mainly in life sciences fields. The image processing capabilities of ImageJ are useful and
    extendable to other scientific fields. Here we present AstroImageJ (AIJ), which provides an astronomy specific image display
    environment and tools for astronomy specific image calibration and data reduction. Although AIJ maintains the general
    purpose image processing capabilities of ImageJ, AIJ is streamlined for time-series differential photometry, light curve
    detrending and fitting, and light curve plotting, especially for applications requiring ultra-precise light curves (e.g.,
    exoplanet transits). AIJ reads and writes standard Flexible Image Transport System (FITS) files, as well as other common
    image formats, provides FITS header viewing and editing, and is World Coordinate System aware, including an automated
    interface to the astrometry.net web portal for plate solving images. AIJ provides research grade image calibration and
    analysis tools with a GUI driven approach, and easily installed cross-platform compatibility. It enables new users, even
    at the level of undergraduate student, high school student, or amateur astronomer, to quickly start processing, modeling,
    and plotting astronomical image data with one tightly integrated software package.
