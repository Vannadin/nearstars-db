  title: 'HAZMAT. VIII. A Spectroscopic Analysis of the Ultraviolet Evolution of K Stars: Additional Evidence for K Dwarf
    Rotational Stalling in the First Gigayear'
  authors:
  - Richey-Yowell, Tyler
  - Shkolnik, Evgenya L.
  - Loyd, R. O. Parke
