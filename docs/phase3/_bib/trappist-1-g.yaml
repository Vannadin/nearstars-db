  arxiv_id: '1911.02983'
  ads_bibcode: 2019PASP..131l4402C
  title: Habitable Zone Boundaries for Circumbinary Planets
  authors:
  - Cukier, Wolf
  - Kopparapu, Ravi kumar
  - Kane, Stephen R.
  - Welsh, William
  - Wolf, Eric
  - Kostov, Veselin
