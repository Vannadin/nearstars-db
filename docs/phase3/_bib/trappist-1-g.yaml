  arxiv_id: '1102.1108'
  ads_bibcode: 2011ApJ...735L..27A
  title: 'The Steppenwolf: A Proposal for a Habitable Planet in Interstellar Space'
  authors:
  - Abbot, D. S.
  - Switzer, E. R.
  year: '2011'
  pubdate: '2011-07-00'
  doi: 10.1088/2041-8205/735/2/L27
  abstract: Rogue planets have been ejected from their planetary system. We investigate the possibility that a rogue planet
    could maintain a liquid ocean under layers of thermally insulating water ice and frozen gas as a result of geothermal
    heat flux. We find that a rogue planet of Earth-like composition and age could maintain a subglacial liquid ocean if it
    were ≈3.5 times more massive than Earth, corresponding to ≈8 km of ice. Suppression of the melting point by contaminants,
    a layer of frozen gas, or a larger complement of water could significantly reduce the planetary mass that is required
    to maintain a liquid ocean. Such a planet could be detected from reflected solar radiation, and its thermal emission could
    be characterized in the far-IR if it were to pass within \cal {O}(1000) AU of Earth.
