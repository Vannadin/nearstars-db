  year: '2016'
  pubdate: '2016-10-00'
  doi: null
  abstract: The HITRAN2016 molecular spectroscopic database is scheduled to be released this year. It will replace the current
    edition, HITRAN2012 [1], which has been in use, along with some intermediate updates, since 2012.We have added, revised,
    and improved many transitions and bands of molecular species and their isotopologues. Also, the amount of parameters has
    also been significantly increased, now incorporating, for instance, broadening by He, H<SUB>2</SUB> and CO<SUB>2</SUB>
    which are dominant in different planetary atmospheres [2]; non-Voigt line profiles [3]; and other phenomena. This poster
    will provide a summary of the updates, emphasizing details of some of the most important or drastic improvements or additions.To
    allow flexible incorporation of the new parameters and improve the efficiency of the database usage, the whole database
    has been reorganized into a relational database structure and presented to the user by means of a very powerful, easy-to-use
    internet program called HITRANonline [4] accessible at &lt;www.hitran.org&gt;. This interface allows the user many queries
    in standard and user-defined formats. In addition, a powerful application called HAPI (HITRAN Application Programing Interface)
    [5] was developed. HAPI is a set of Python libraries that allows much more functionality for the user. Demonstration of
    the power of the new tools will also be offered.This work is supported by the NASA PATM (NNX13AI59G), PDART (NNX16AG51G)
    and AURA (NNX14AI55G) programs.References[1] L.S. Rothman et al, JQSRT 130, 4 (2013)[2] J. S. Wilzewski et al., JQSRT
    168, 193 (2016)[3] P. Wcislo et al., JQSRT 177, 75 (2016)[4] C. Hill et al, JQSRT 177, 4 (2016)[5] R.V. Kochanov et al,
    JQSRT 177, 15 (2016)
