  title: The CARMENES search for exoplanets around M dwarfs. Variability on long timescales as seen in chromospheric indicators
  authors:
  - Fuhrmeister, B.
  - Czesla, S.
  - Perdelwitz, V.
  - Nagel, E.
  - Schmitt, J. H. M. M.
  - Jeffers, S. V.
