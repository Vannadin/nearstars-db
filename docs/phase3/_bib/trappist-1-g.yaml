  ads_bibcode: 2022JOSS....7.4503B
  title: 'Eureka!: An End-to-End Pipeline for JWST Time-Series Observations'
  authors:
  - Bell, Taylor
  - Ahrer, Eva-Maria
  - Brande, Jonathan
  - Carter, Aarynn
  - Feinstein, Adina
