  arxiv_id: '1903.03123'
  ads_bibcode: 2019MNRAS.485.3999M
  title: Planetary magnetism as a parameter in exoplanet habitability
  authors:
  - McIntyre, Sarah R. N.
  - Lineweaver, Charles H.
  - Ireland, Michael J.
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.1093/mnras/stz667
  abstract: Evidence from the Solar system suggests that, unlike Venus and Mars, the presence of a strong magnetic dipole
    moment on Earth has helped maintain liquid water on its surface. Therefore, planetary magnetism could have a significant
    effect on the long-term maintenance of atmosphere and liquid water on rocky exoplanets. We use Olson &amp; Christensen's
    (2006) model to estimate magnetic dipole moments of rocky exoplanets with radii R<SUB>p</SUB> ≤ 1.23 R<SUB>⊕</SUB>. Even
    when modelling maximum magnetic dipole moments, only Kepler-186 f has a magnetic dipole moment larger than the Earth's,
    while approximately half of rocky exoplanets detected in the circumstellar habitable zone have a negligible magnetic dipole
    moment. This suggests that planetary magnetism is an important factor when prioritizing observations of potentially habitable
    planets.
