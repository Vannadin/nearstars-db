- &id448
  arxiv_id: '1904.13334'
  ads_bibcode: 2020MNRAS.496.3582C
  title: Equatorial retrograde flow in WASP-43b elicited by deep wind jets?
  authors:
  - Carone, Ludmila
  - Baeyens, Robin
  - Mollière, Paul
  - Barth, Patrick
  - Vazan, Allona
  - Decin, Leen
  - Sarkis, Paula
  - Venot, Olivia
  - Henning, Thomas
  year: '2020'
  pubdate: '2020-08-00'
  doi: 10.1093/mnras/staa1733
  abstract: 'We present WASP-43b climate simulations with deep wind jets (down to 700 bar) that are linked to retrograde (westward)
    flow at the equatorial day side for p &lt; 0.1 bar. Retrograde flow inhibits efficient eastward heat transport and naturally
    explains the small hotspot shift and large day-night-side gradient of WASP-43b (P<SUB>orb</SUB> = P<SUB>rot</SUB> = 0.8135
    d) observed with Spitzer. We find that deep wind jets are mainly associated with very fast rotations (P<SUB>rot</SUB>
    = P<SUB>orb</SUB> ≤ 1.5 d) which correspond to the Rhines length smaller than 2 planetary radii. We also diagnose wave
    activity that likely gives rise to deviations from superrotation. Further, we show that we can achieve full steady state
    in our climate simulations by imposing a deep forcing regime for p &gt; 10 bar: convergence time-scale τ<SUB>conv</SUB>
    = 10<SUP>6</SUP>-10<SUP>8</SUP> s to a common adiabat, as well as linear drag at depth (p ≥ 200 bar), which mimics to
    first-order magnetic drag. Lower boundary stability and the deep forcing assumptions were also tested with climate simulations
    for HD 209458b (P<SUB>orb</SUB> = P<SUB>rot</SUB> = 3.5 d). HD 209458b simulations always show shallow wind jets (never
    deeper than 100 bar) and unperturbed superrotation. If we impose a fast rotation (P<SUB>orb</SUB> = P<SUB>rot</SUB> =
    0.8135 d), also the HD 209458b-like simulation shows equatorial retrograde flow at the day side. We conclude that the
    placement of the lower boundary at p = 200 bar is justified for slow rotators like HD 209458b, but we suggest that it
    has to be placed deeper for fast-rotating, dense hot Jupiters (P<SUB>orb</SUB> ≤ 1.5 d) like WASP-43b. Our study highlights
    that the deep atmosphere may have a strong influence on the observable atmospheric flow in some hot Jupiters.'
