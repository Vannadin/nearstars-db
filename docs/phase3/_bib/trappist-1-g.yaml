  arxiv_id: '2405.04744'
  ads_bibcode: 2024Natur.630..609H
  title: A secondary atmosphere on the rocky exoplanet 55 Cancri e
  authors:
  - Hu, Renyu
  - Bello-Arufe, Aaron
  - Zhang, Michael
  - Paragas, Kimberly
  - Zilinskas, Mantas
  - van Buchem, Christiaan
  - Bess, Michael
  - Patel, Jayshil
  - Ito, Yuichi
  - Damiano, Mario
  - Scheucher, Markus
