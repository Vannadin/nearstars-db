  arxiv_id: '2302.04242'
  ads_bibcode: 2023AJ....165..265M
  title: The Occurrence Rate of Terrestrial Planets Orbiting Nearby Mid-to-late M Dwarfs from TESS Sectors 1-42
  authors:
  - Ment, Kristo
  - Charbonneau, David
  year: '2023'
  pubdate: '2023-06-00'
  doi: 10.3847/1538-3881/acd175
  abstract: We present an analysis of a volume-complete sample of 363 mid-to-late M dwarfs within 15 pc of the Sun with masses
    between 0.1 and 0.3 M <SUB>☉</SUB> observed by TESS within sectors 1-42. The median stellar mass of the sample is 0.17
    M <SUB>☉</SUB>. We search the TESS light curves for transiting planets with orbital periods below 7 days and recover all
    six known planets within the sample, as well as a likely planet candidate orbiting LHS 475. Each of these planets is consistent
    with a terrestrial composition, with planet radii between 0.91 and 1.31 R <SUB>⊕</SUB>. We characterize the transit detection
    sensitivity for each star as a function of planet radius, insolation, and orbital period. We obtain a cumulative occurrence
    rate of ${0.61}_{-0.19}^{+0.24}$ terrestrial planets per star with radii above 0.5 R <SUB>⊕</SUB> and orbital periods
    between 0.4 and 7 days. We find that for comparable insolations, planets larger than 1.5 R <SUB>⊕</SUB> (sub-Neptunes)
    are significantly less abundant around mid-to-late M dwarfs compared to earlier-type stars, while the occurrence rate
    of terrestrial planets is comparable to that of more massive M dwarfs. We estimate that overall, terrestrials outnumber
    sub-Neptunes around mid-to-late M dwarfs by 14 to 1, in contrast to GK dwarfs, where they are roughly equinumerous. We
    place a 1σ upper limit of 0.07 planets larger than 1.5 R <SUB>⊕</SUB> per star within the orbital period range of 0.5-7
    days. We find evidence for a downturn in occurrence rates for planet radii below 0.9 R <SUB>⊕</SUB>, suggesting that Earth-sized
    and larger terrestrials may be more common around mid-to-late M dwarfs.
