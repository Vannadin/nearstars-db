  doi: 10.3847/1538-3881/acdb70
  abstract: X-ray through infrared spectral energy distributions (SEDs) are essential for understanding a star's effect on
    exoplanet atmospheric composition and evolution. We present a catalog of panchromatic SEDs, hosted on the Barbara A. Mikulski
    Archive for Space Telescopes, for 11 exoplanet-hosting stars that have guaranteed JWST observation time as part of the
    ERS or GTO programs but have no previous UV characterization. The stars in this survey range from spectral type F4-M6
    (0.14-1.57 M <SUB>☉</SUB>), rotation periods of 4-132 days, and ages of approximately 0.5-11.4 Gyr. The SEDs are composite
    spectra using data from the Chandra X-ray Observatory and XMM-Newton, the Hubble Space Telescope, BT-Settl stellar atmosphere
    models, and scaled spectra of proxy stars of similar spectral type and activity. From our observations, we have measured
    a set of UV and X-ray fluxes as indicators of stellar activity level. We compare the chromospheric and coronal activity
    indicators of our exoplanet-hosting stars to the broader population of field stars and find that a majority of our targets
    have activity levels lower than the average population of cool stars in the solar neighborhood. This suggests that using
    SEDs of stars selected from exoplanet surveys to compute generic exoplanet atmosphere models may underestimate the typical
    host star's UV flux by an order of magnitude or more, and consequently, that the observed population of exoplanetary atmospheres
    receive lower high-energy flux levels than the typical planet in the solar neighborhood.
