  ads_bibcode: 2022NatAs...6.1256A
  title: Surface topographic impact of subglacial water beneath the south polar ice cap of Mars
  authors:
  - Arnold, N. S.
  - Butcher, F. E. G.
  - Conway, S. J.
  - Gallagher, C.
  - Balme, M. R.
  year: '2022'
  pubdate: '2022-11-00'
  doi: 10.1038/s41550-022-01782-0
  abstract: Bright radar reflections observed in the Ultimi Scopuli region of Mars' south polar layered deposits<SUP>1-3</SUP>
    by the Mars Advanced Radar for Subsurface and Ionosphere Sounding instrument have been interpreted as the signature of
    areas of subglacial water beneath it. However, other studies put forward alternative explanations, which do not imply
    the presence of liquid water<SUP>4-6</SUP>. Here we shed light on the issue by looking at the surface topography of the
    region. On Earth, reduced or absent basal friction, and consequent ice velocity changes, cause a distinct topographic
    signature over subglacial lakes<SUP>7</SUP>. Using Mars Orbiter Laser Altimeter data<SUP>8</SUP>, we identify and characterize
    an anomaly in the surface topography of the south polar layered deposits overlying the area of the putative lakes, similar
    to those found above terrestrial subglacial lakes of similar size. Ice flow model results suggest that comparable topographic
    anomalies form within 0.5-1.5 Myr with locally elevated geothermal heating<SUP>9</SUP> or 2-5 Myr without elevated geothermal
    heating<SUP>2</SUP>. These findings offer independent support for the presence of basal water beneath Ultimi Scopuli and
    suggest that surface topography could supplement radar returns to help identify other potential subglacial water bodies.
  source: citation_of=2022NatCo..13.7521O
