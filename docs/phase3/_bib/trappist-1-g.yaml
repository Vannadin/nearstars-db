- &id1035
  arxiv_id: '1611.06133'
  ads_bibcode: 2017ApJ...835L...1W
  title: Effects of Variable Eccentricity on the Climate of an Earth-like World
  authors:
  - Way, M. J.
  - Georgakarakos, Nikolaos
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.3847/2041-8213/835/1/L1
  abstract: The Kepler era of exoplanetary discovery has presented the astronomical community with a cornucopia of planetary
    systems that are very different from the one that we inhabit. It has long been known that Jupiter plays a major role in
    the orbital parameters of Mars and its climate, but there is also a long-standing belief that Jupiter would play a similar
    role for Earth if not for the Moon. Using a three-dimensional general circulation model (3D GCM) with a fully coupled
    ocean, we simulate what would happen to the climate of an Earth-like world if Mars did not exist, but a Jupiter-like planet
    was much closer to Earth’s orbit. We investigate two scenarios that involve the evolution of the Earth-like planet’s orbital
    eccentricity from 0 to 0.283 over 6500 years, and from 0 to 0.066 on a timescale of 4500 years. In both cases we discover
    that they would maintain relatively temperate climates over the timescales simulated. More Earth-like planets in multi-planet
    systems will be discovered as we continue to survey the skies and the results herein show that the proximity of large
    gas giant planets may play an important role in the habitability of these worlds. These are the first such 3D GCM simulations
    using a fully coupled ocean with a planetary orbit that evolves over time due to the presence of a giant planet.
  source: citation_of=2022LPICo2687.3046H
