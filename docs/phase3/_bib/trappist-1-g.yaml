  year: '2003'
  pubdate: '2003-01-00'
  doi: 10.1051/0004-6361:20021560
  abstract: 'We present the results of a new study on the relationship between coronal X-ray emission and stellar rotation
    in late-type main-sequence stars. We have selected a sample of 259 dwarfs in the B-V range 0.5-2.0, including 110 field
    stars and 149 members of the Pleiades, Hyades, alpha Persei, IC 2602 and IC 2391 open clusters. All the stars have been
    observed with ROSAT, and most of them have photometrically-measured rotation periods available. Our results confirm that
    two emission regimes exist, one in which the rotation period is a good predictor of the total X-ray luminosity, and the
    other in which a constant saturated X-ray to bolometric luminosity ratio is attained; we present a quantitative estimate
    of the critical rotation periods below which stars of different masses (or spectral types) enter the saturated regime.
    In this work we have also empirically derived a characteristic time scale, tau<SUB>e</SUB> , which we have used to investigate
    the relationship between the X-ray emission level and an X-ray-based Rossby number R<SUB>e</SUB> = P<SUB>rot</SUB>/tau<SUB>e</SUB>:
    we show that our empirical time scale tau<SUB>e</SUB> resembles the theoretical convective turnover time for 0.4 &lt;~
    M/M<SUB>sun</SUB> &lt;~ 1.2, but it also has the same functional dependence on B-V as L<SUB>bol</SUB><SUP>-1/2</SUP> in
    the color range 0.5 &lt;~ B-V &lt;~ 1.5. Our results imply that - for non-saturated coronae - the L<SUB>x</SUB> - P<SUB>rot</SUB>
    relation is equivalent to the L<SUB>x</SUB>/L<SUB>bol</SUB> vs. R<SUB>e</SUB> relation. Tables 1 and 2 are only available
    in electronic form at \ http://www.edpsciences.org'
