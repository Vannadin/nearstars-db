- &id468
  arxiv_id: '1902.08022'
  ads_bibcode: 2019Icar..329..124R
  title: Hydrogen cyanide in nitrogen-rich atmospheres of rocky exoplanets
  authors:
  - Rimmer, P. B.
  - Rugheimer, S.
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.1016/j.icarus.2019.02.020
  abstract: Hydrogen cyanide (HCN) is a key feedstock molecule for the production of life's building blocks. The formation
    of HCN in an N<SUB>2</SUB>-rich atmospheres requires first that the triple bond between N≡N be severed, and then that
    the atomic nitrogen find a carbon atom. These two tasks can be accomplished via photochemistry, lightning, impacts, or
    volcanism. The key requirements for producing appreciable amounts of HCN are the free availability of N<SUB>2</SUB> and
    a local carbon to oxygen ratio of C/O ≥ 1. We discuss the chemical mechanisms by which HCN can be formed and destroyed
    on rocky exoplanets with Earth-like N<SUB>2</SUB> content and surface water inventories, varying the oxidation state of
    the dominant carbon-containing atmospheric species. HCN is most readily produced in an atmosphere rich in methane (CH<SUB>4</SUB>)
    or acetylene (C<SUB>2</SUB>H<SUB>2</SUB>), but can also be produced in significant amounts (&gt;1 ppm) within CO-dominated
    atmospheres. Methane is not necessary for the production of HCN. We show how destruction of HCN in a CO<SUB>2</SUB>-rich
    atmosphere depends critically on the poorly-constrained energetic barrier for the reaction of HCN with atomic oxygen.
    We discuss the implications of our results for detecting photochemically produced HCN, for concentrating HCN on the planet's
    surface, and its importance for prebiotic chemistry.
