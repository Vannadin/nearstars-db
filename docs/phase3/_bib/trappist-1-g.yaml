  arxiv_id: '1701.06703'
  ads_bibcode: 2017ApJ...836..200G
  title: Placing the Spotted T Tauri Star LkCa 4 on an HR Diagram
  authors:
  - Gully-Santiago, Michael A.
  - Herczeg, Gregory J.
  - Czekala, Ian
  - Somers, Garrett
  - Grankin, Konstantin
  - Covey, Kevin R.
  - Donati, J. F.
  - Alencar, Silvia H. P.
  - Hussain, Gaitee A. J.
  - Shappee, Benjamin J.
  - Mace, Gregory N.
  - Lee, Jae-Joon
  - Holoien, T. W.-S.
  - Jose, Jessy
  - Liu, Chun-Fan
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/1538-4357/836/2/200
  abstract: Ages and masses of young stars are often estimated by comparing their luminosities and effective temperatures
    to pre-main-sequence stellar evolution tracks, but magnetic fields and starspots complicate both the observations and
    evolution. To understand their influence, we study the heavily spotted weak-lined T-Tauri star LkCa 4 by searching for
    spectral signatures of radiation originating from the starspot or starspot groups. We introduce a new methodology for
    constraining both the starspot filling factor and the spot temperature by fitting two-temperature stellar atmosphere models
    constructed from Phoenix synthetic spectra to a high-resolution near-IR IGRINS spectrum. Clearly discernable spectral
    features arise from both a hot photospheric component {T}<SUB>{hot</SUB>} ∼ 4100 K and a cool component {T}<SUB>{cool</SUB>}
    ∼ 2700-3000 K, which covers ∼80% of the visible surface. This mix of hot and cool emission is supported by analyses of
    the spectral energy distribution, rotational modulation of colors and of TiO band strengths, and features in low-resolution
    optical/near-IR spectroscopy. Although the revised effective temperature and luminosity make LkCa 4 appear to be much
    younger and of much lower mass than previous estimates from unspotted stellar evolution models, appropriate estimates
    will require the production and adoption of spotted evolutionary models. Biases from starspots likely afflict most fully
    convective young stars and contribute to uncertainties in ages and age spreads of open clusters. In some spectral regions,
    starspots act as a featureless “veiling” continuum owing to high rotational broadening and heavy line blanketing in cool
    star spectra. Some evidence is also found for an anticorrelation between the velocities of the warm and cool components.
