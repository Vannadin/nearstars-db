  ads_bibcode: 2007AJ....133.1393L
  title: Densities of Solar System Objects from Their Rotational Light Curves
  authors:
  - Lacerda, Pedro
  - Jewitt, David C.
  year: '2007'
  pubdate: '2007-04-00'
  doi: 10.1086/511772
  abstract: 'We present models of the shapes of four Kuiper Belt objects (KBOs) and the Jovian Trojan asteroid (624) Hektor
    as ellipsoidal figures of equilibrium and Roche binaries. Our simulations select those figures of equilibrium whose light
    curves best match the measured rotational data. The best-fit shapes, combined with the knowledge of the spin period of
    the objects, provide estimates of the bulk densities of these objects. We find that the light curves of KBOs (20000) Varuna
    and 2003 EL<SUB>61</SUB> are well matched by Jacobi triaxial ellipsoid models with bulk densities 992 and 2551 kg m<SUP>-3</SUP>,
    respectively. The light curves of (624) Hektor and KBO 2001 QG<SUB>298</SUB> are well described by Roche contact-binary
    models with densities 2480 and 590 kg m<SUP>-3</SUP>, respectively. The nature of 2000 GN<SUB>171</SUB> remains unclear:
    Roche binary and Jacobi ellipsoid fits to this KBO are equivalent but predict different densities, ~2000 and ~650 kg m<SUP>-3</SUP>,
    respectively. Our density estimates suggest a trend of increasing density with size.'
