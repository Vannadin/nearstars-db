  arxiv_id: '1012.0518'
  ads_bibcode: 2011ApJ...736...12B
  title: 'The GJ1214 Super-Earth System: Stellar Variability, New Transits, and a Search for Additional Planets'
  authors:
  - Berta, Zachory K.
  - Charbonneau, David
  - Bean, Jacob
  - Irwin, Jonathan
  - Burke, Christopher J.
  - Désert, Jean-Michel
  - Nutzman, Philip
  - Falco, Emilio E.
  year: '2011'
  pubdate: '2011-07-00'
  doi: 10.1088/0004-637X/736/1/12
  abstract: The super-Earth GJ1214b transits a nearby M dwarf that exhibits a 1% intrinsic variability in the near-infrared.
    Here, we analyze new observations to refine the physical properties of both the star and planet. We present three years
    of out-of-transit photometric monitoring of the stellar host GJ1214 from the MEarth Observatory and find the rotation
    period to be long, most likely an integer multiple of 53 days, suggesting low levels of magnetic activity and an old age
    for the system. We show that such variability will not pose significant problems to ongoing studies of the planet's atmosphere
    with transmission spectroscopy. We analyze two high-precision transit light curves from ESO's Very Large Telescope (VLT)
    along with seven others from the MEarth and Fred Lawrence Whipple Observatory 1.2 m telescopes, finding physical parameters
    for the planet that are consistent with previous work. The VLT light curves show tentative evidence for spot occultations
    during transit. Using two years of MEarth light curves, we place limits on additional transiting planets around GJ1214
    with periods out to the habitable zone of the system. We also improve upon the previous photographic V-band estimate for
    the star, finding V = 14.71 ± 0.03.
