  arxiv_id: null
  ads_bibcode: 2016ApJ...830..110C
  title: Comparison of Damped Oscillations in Solar and Stellar X-Ray flares
  authors:
  - Cho, I.-H.
  - Cho, K.-S.
  - Nakariakov, V. M.
  - Kim, S.
  - Kumar, P.
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.3847/0004-637X/830/2/110
  abstract: We explore the similarity and difference of the quasi-periodic pulsations (QPPs) observed in the decay phase of
    solar and stellar flares at X-rays. We identified 42 solar flares with pronounced QPPs, observed with RHESSI, and 36 stellar
    flares with QPPs, observed with XMM-Newton. The empirical mode decomposition (EMD) method and least-squares fit by a damped
    sine function were applied to obtain the periods (P) and damping times (τ) of the QPPs. We found that (1) the periods
    and damping times of the stellar QPPs are 16.21 ± 15.86 minutes and 27.21 ± 28.73 minutes, while those of the solar QPPs
    are 0.90 ± 0.56 and 1.53 ± 1.10 minutes, respectively; (2) the ratios of the damping times to the periods (τ /P) observed
    in the stellar QPPs (1.69 ± 0.56) are statistically identical to those of solar QPPs (1.74 ± 0.77) and (3) the scalings
    of the QPP damping time with the period are well described by the power law in both solar and stellar cases. The power
    indices of the solar and stellar QPPs are 0.96 ± 0.10 and 0.98+/- 0.05, respectively. This scaling is consistent with
    the scalings found for standing slow magnetoacoustic and kink modes in solar coronal loops. Thus, we propose that the
    underlying mechanism responsible for the stellar QPPs is the natural magnetohydrodynamic oscillation in the flaring or
    adjacent coronal loops, as in the case of solar flares.
