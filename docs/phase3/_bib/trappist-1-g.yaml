  doi: 10.1088/0004-637X/802/1/28
  abstract: We present detections of the near-infrared thermal emission of three hot Jupiters and one brown dwarf using the
    Wide-field Infrared Camera (WIRCam) on the Canada-France-Hawaii Telescope (CFHT). These include Ks-band secondary eclipse
    detections of the hot Jupiters WASP-3b and Qatar-1b and the brown dwarf KELT-1b. We also report Y-band, K <SUB>CONT</SUB>-band,
    and two new and one reanalyzed Ks-band detections of the thermal emission of the hot Jupiter WASP-12b. We present a new
    reduction pipeline for CFHT/WIRCam data, which is optimized for high precision photometry. We also describe novel techniques
    for constraining systematic errors in ground-based near-infrared photometry, so as to return reliable secondary eclipse
    depths and uncertainties. We discuss the noise properties of our ground-based photometry for wavelengths spanning the
    near-infrared (the YJHK bands), for faint and bright stars, and for the same object on several occasions. For the hot
    Jupiters WASP-3b and WASP-12b we demonstrate the repeatability of our eclipse depth measurements in the Ks band; we therefore
    place stringent limits on the systematics of ground-based, near-infrared photometry, and also rule out violent weather
    changes in the deep, high pressure atmospheres of these two hot Jupiters at the epochs of our observations. <P />Based
    on observations obtained with WIRCam, a joint project of Canada-France-Hawaii Telescope (CFHT), Taiwan, Korea, Canada,
    France, at the CFHT, which is operated by the National Research Council (NRC) of Canada, the Institute National des Sciences
    de l'Univers of the Centre National de la Recherche Scientifique of France, and the University of Hawaii.
