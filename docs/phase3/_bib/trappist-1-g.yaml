  arxiv_id: null
  ads_bibcode: 2013Icar..226..355J
  title: Influence of NaCl on ice VI and ice VII melting curves up to 6 GPa, implications for large icy moons
  authors:
  - Journaux, B.
  - Daniel, I.
  - Caracas, R.
  - Montagnac, G.
  - Cardon, H.
  year: '2013'
  pubdate: '2013-09-00'
  doi: 10.1016/j.icarus.2013.05.039
  abstract: 'The influence of sodium chloride salt on the liquidus of ice VI and ice VII has been measured for concentrations
    ranging between 0.01 and 4 mol kg<SUP>-1</SUP> NaCl. Dissolved NaCl significantly increases the melting pressure or decreases
    the melting temperature as a function of the salt concentration and induces a density crossover between ice VI and the
    brine. For NaCl concentrations higher than 2.5 mol kg<SUP>-1</SUP> ice VI is more buoyant than the brine. The liquidus
    points are fitted to a second order polynomial law and a model is provided to predict the melting pressures of ice VI
    and ice VII (P<SUB>m,VI</SUB> and P<SUB>m,VII</SUB>), respectively as a function of temperature T (K) and NaCl concentration
    X<SUB>NaCl</SUB> (mol kg<SUP>-1</SUP>): P<SUB>m,VI</SUB>(T,X<SUB>NaCl</SUB>)=9.27+0.996X<SUB>NaCl</SUB>-(6.99×10<SUP>-2</SUP>+7.6×10<SUP>-3</SUP>X<SUB>NaCl</SUB>)·T+(1.414×10<SUP>-4</SUP>+1.541×10<SUP>-5</SUP>X<SUB>NaCl</SUB>)·T<SUP>2</SUP>
    <P />P<SUB>m,VII</SUB>(T,X<SUB>NaCl</SUB>)=-0.133+0.122X<SUB>NaCl</SUB>-(1.28×10<SUP>-4</SUP>+4.17×10<SUP>-4</SUP>X<SUB>NaCl</SUB>)·T+(1.86×10<SUP>-5</SUP>+8.56×10<SUP>-7</SUP>X<SUB>NaCl</SUB>)·T<SUP>2</SUP>
    The temperature of the triple point between ice VI, ice VII and the brine shifts of -7 K/X<SUB>NaCl</SUB> along the 2.17
    GPa isobar. The consequences of potentially dissolved NaCl for the internal structure of water rich planetary bodies are
    discussed. The density crossover between ice VI and brines suggests that migration of brines through a deep ice VI layer
    is enhanced for high thermal profiles and is unlikely for colder thermal conditions. It also suggests that patches of
    brines may actually be gravitationally stable at the interface between the bedrock and a deep ice VI basal layer allowing
    for a potential new class of exobiological habitat.'
