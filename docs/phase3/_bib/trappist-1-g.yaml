  arxiv_id: '1508.06634'
  ads_bibcode: 2015A&A...582A..65B
  title: Radiative braking in the extended exosphere of GJ 436 b
  authors:
  - Bourrier, V.
  - Ehrenreich, D.
  - Lecavelier des Etangs, A.
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1051/0004-6361/201526894
  abstract: The recent detection of a giant exosphere surrounding the warm Neptune GJ 436 b has shed new light on the evaporation
    of close-in planets, revealing that moderately irradiated, low-mass exoplanets could make exceptional targets for studying
    this mechanism and its impact on the exoplanet population. Three HST/STIS observations were performed in the Lyman-α line
    of GJ 436 at different epochs, showing repeatable transits with large depths and extended durations. Here, we study the
    role played by stellar radiation pressure on the structure of the exosphere and its transmission spectrum. We found that
    the neutral hydrogen atoms in the exosphere of GJ 436 b are not swept away by radiation pressure as shown to be the case
    for evaporating hot Jupiters. Instead, the low radiation pressure from the M-dwarf host star only brakes the gravitational
    fall of the escaping hydrogen toward the star and allows its dispersion within a large volume around the planet, yielding
    radial velocities up to about -120 km s <SUP>-1</SUP> that match the observations. We performed numerical simulations
    with the EVaporating Exoplanets (EVE) code to study the influence of the escape rate, the planetary wind velocity, and
    the stellar photoionization. While these parameters are instrumental in shaping the exosphere and yield simulation results
    in general agreement with the observations, the spectra observed at the different epochs show specific, time-variable
    features that require additional physics.
