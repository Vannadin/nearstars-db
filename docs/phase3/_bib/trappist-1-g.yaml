- &id179
  arxiv_id: '1912.11377'
  ads_bibcode: 2020NatAs...4...58Y
  title: Transition from eyeball to snowball driven by sea-ice drift on tidally locked terrestrial planets
  authors:
  - Yang, Jun
  - Ji, Weiwen
  - Zeng, Yaoxuan
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.1038/s41550-019-0883-z
  abstract: 'Tidally locked terrestrial planets around low-mass stars are the prime targets for future atmospheric characterizations
    of potentially habitable systems<SUP>1</SUP>, especially the three nearby ones—Proxima b (ref. <SUP>2</SUP>), TRAPPIST-1e
    (ref. <SUP>3</SUP>) and LHS 1140b (ref. <SUP>4</SUP>). Previous studies suggest that if these planets had surface oceans
    they would be in an eyeball-like climate state<SUP>5-10</SUP>: ice free in the vicinity of the substellar point and ice
    covered in the remaining regions. However, an important component of the climate system—sea-ice dynamics—has not been
    fully considered in previous studies. A fundamental question is whether an open ocean is stable against a globally ice-covered
    snowball state. Here we show that sea-ice drift cools the ocean''s surface when the ice flows towards the warmer substellar
    region and melts through absorbing heat from the ocean and the overlying air. As a result, the open ocean shrinks and
    can even disappear when atmospheric greenhouse gases are not much more abundant than on Earth, turning the planet into
    a snowball state. This occurs for both synchronous rotation and spin-orbit resonances (such as 3:2). These results suggest
    that sea-ice drift strongly reduces the open-ocean area and can significantly impact the habitability of tidally locked
    planets.'
  source: citation_of=2021AJ....161...44E
