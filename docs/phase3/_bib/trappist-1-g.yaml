- &id210
  arxiv_id: '1702.07314'
  ads_bibcode: 2017ApJ...837L...1M
  title: The Equilibrium Temperature of Planets in Elliptical Orbits
  authors:
  - Méndez, Abel
  - Rivera-Valentín, Edgard G.
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.3847/2041-8213/aa5f13
  abstract: There exists a positive correlation between orbital eccentricity and the average stellar flux that planets receive
    from their parent star. Often, though, it is assumed that the average equilibrium temperature would correspondingly increase
    with eccentricity. Here, we test this assumption by calculating and comparing analytic solutions for both the spatial
    and temporal averages of orbital distance, stellar flux, and equilibrium temperature. Our solutions show that the average
    equilibrium temperature of a planet, with a constant albedo, slowly decreases with eccentricity until converging to a
    value 90% that of a circular orbit. This might be the case for many types of planets (e.g., hot Jupiters); however, the
    actual equilibrium and surface temperature of planets also depend on orbital variations of albedo and greenhouse. Our
    results also have implications in understanding the climate, habitability, and the occurrence of potential Earth-like
    planets. For instance, it helps explain why the limits of the habitable zone for planets in highly elliptical orbits are
    wider than expected from the mean flux approximation, as shown by climate models.
  source: citation_of=2023MNRAS.525.5168M
