  arxiv_id: '2006.11349'
  ads_bibcode: 2020ApJ...901..126W
  title: Distinguishing between Wet and Dry Atmospheres of TRAPPIST-1 e and f
  authors:
  - Wunderlich, Fabian
  - Scheucher, Markus
  - Godolt, M.
  - Grenfell, J. L.
  - Schreier, F.
  - Schneider, P. C.
  - Wilson, D. J.
  - Sánchez-López, A.
  - López-Puertas, M.
