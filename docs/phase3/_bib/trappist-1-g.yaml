  abstract: Since M4.5-M9 dwarfs exhibit equatorial rotation velocities of the order of 10 km s<SUP>-1</SUP> on average, radial
    velocity surveys targeting this stellar population will likely need to find methods to effectively remove starspot jitter.
    We present the first high resolution Doppler images of the M4.5 dwarf, GJ 791.2A, and the M9 dwarf, LP 944-20. The time
    series spectra of both objects reveal numerous line profile distortions over the rotation period of each star, which we
    interpret as starspots. The transient distortions are modeled with spot/photosphere contrast ratios that correspond to
    model atmosphere temperature differences of {T}<SUB>{phot</SUB>}-{T}<SUB>{spot</SUB>} = 300 and 200 K. GJ 791.2A is a
    fully convective star with v sin i = 35.1 km s<SUP>-1</SUP>. Although we find more starspot structure at high latitudes,
    we reconstruct spots at a range of phases and latitudes with a mean spot filling of ∼3%. LP 944-20 is one of the brightest
    known late-M dwarfs, with spectral type M9V and v sin i = 30.8 km s<SUP>-1</SUP>. Its spectral time series exhibits two
    dominant transient line distortions that are reconstructed as high latitude spots, while a mean spot filling factor of
    only 1.5% is found. The occurrence of low-contrast spots at predominantly high latitudes, which we see in both targets
    here, is, in general, likely to be responsible for the low amplitude photometric variability seen in late-M dwarfs. For
    GJ 791.2A, the radial velocities induced by the starspot features yield an rms velocity variability of 138 m s<SUP>-1</SUP>,
    which can be reduced by a factor of 1.9 using our reconstructed surface brightness distributions.
