- &id926
  arxiv_id: '1908.04089'
  ads_bibcode: 2018MNRAS.481.2487O
  title: 'Biofluorescent worlds: global biological fluorescence as a biosignature'
  authors:
  - O'Malley-James, Jack T.
  - Kaltenegger, L.
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.1093/mnras/sty2411
  abstract: 'In this paper, we analyse a new possible biological surface feature for habitable worlds orbiting other stars:
    biofluorescence. High ultraviolet (UV) and blue radiation fluxes drive the strongest biofluorescence in terrestrial fluorescent
    pigments and proteins. F stars emit more blue and UV radiation than the Sun, while planets and exomoons orbiting such
    stars remain in the habitable zone for 2-4 Gyr; a time span that could allow a complex biosphere to develop. Therefore,
    we propose biofluorescence as a new surface biosignature for F star planets. We investigate how the extra emission from
    surface fluorescence could cause observable signals at specific wavelengths in the visible spectrum. Using the absorption
    and emission characteristics of common coral fluorescent pigments and proteins, we simulate the increased emission at
    specific visible wavelengths caused by strong fluorescence, accounting for the effects of different (non-fluorescent)
    surface features, atmospheric absorption and cloud cover. Our model shows that exoplanets with a fluorescent biosphere
    could have characteristic surface colours that allow the presence of surface life to be inferred from observations with
    upcoming telescopes.'
