  doi: 10.1051/0004-6361/202347749
  abstract: 'Context. A magma ocean (MO) is thought to be a ubiquitous stage in the early evolution of rocky planets and exoplanets.
    During the lifetime of the MO, exchanges between the interior and exterior envelopes of the planet are very efficient.
    In particular, volatile elements that initially are contained in the solid part of the planet can be released and form
    a secondary outgassed atmosphere. <BR /> Aims: We determine trends in the H-C-N-O-S composition and thickness of these
    secondary atmospheres for varying planetary sizes and MO extents, and the oxygen fugacity of MOs, which provides the main
    control for the atmospheric chemistry. <BR /> Methods: We used a model with coupled chemical gas-gas and silicate melt-gas
    equilibria and mass conservation to predict the composition of an atmosphere at equilibrium with the MO depending on the
    planet size and the extent and redox state of the MO. We used a self-consistent mass-radius model for the rocky core to
    inform the structure of the planet, which we combined with an atmosphere model to predict the transit radius of lava worlds.
    <BR /> Results: The resulting MOs have potential temperatures ranging from 1415 to 4229 K, and their outgassed atmospheres
    have total pressures from 3.3 to 768 bar. We find that MOs (especially the shallow ones) on small planets are generally
    more reduced, and are thus dominated by H<SUB>2</SUB>-rich atmospheres (whose outgassing is strengthened at low planetary
    mass), while larger planets and deeper MOs vary from CO to CO<SUB>2</SUB>-N<SUB>2</SUB>-SO<SUB>2</SUB> atmospheres, with
    increasing \[f<SUB>O_2</SUB>\]. In the former case, the low molecular mass of the atmosphere combined with the low gravity
    of the planets yields a large vertical extension of the atmosphere, while in the latter cases, secondary outgassed atmospheres
    on super-Earths are likely significantly shrunk. Both N and C are largely outgassed regardless of the conditions, while
    the S and H outgassing is strongly dependent on the \[f<SUB>O_2</SUB>\], as well as on the planetary mass and MO extent
    for the latter. We further use these results to assess how much a secondary outgassed atmosphere may alter the mass-radius
    relations of rocky exoplanets. <P />The code and data used to produce the results presented in this study are available
    in the branch lava_worlds of the git repository of the code MOAI (<A href="https://bitbucket.org/MaximeMaurice/moai/src/Maurice_etal_2024/">https://bitbucket.org/MaximeMaurice/moai/src/Maurice_etal_2024/</A>).
    Other supplementary materials are available at <A href="https://zenodo.org/records/12804782">https://zenodo.org/records/12804782</A>'
