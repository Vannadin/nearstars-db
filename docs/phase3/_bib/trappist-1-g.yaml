  arxiv_id: '1804.10295'
  ads_bibcode: 2017A&A...600A..30C
  title: Limb and gravity-darkening coefficients for the TESS satellite at several metallicities, surface gravities, and microturbulent
    velocities
  authors:
  - Claret, A.
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.1051/0004-6361/201629705
  abstract: '<BR /> Aims: We present new gravity and limb-darkening coefficients for a wide range of effective temperatures,
    gravities, metallicities, and microturbulent velocities. These coefficients can be used in many different fields of stellar
    physics as synthetic light curves of eclipsing binaries and planetary transits, stellar diameters, line profiles in rotating
    stars, and others. <BR /> Methods: The limb-darkening coefficients were computed specifically for the photometric system
    of the space mission tess and were performed by adopting the least-square method. In addition, the linear and bi-parametric
    coefficients, by adopting the flux conservation method, are also available. On the other hand, to take into account the
    effects of tidal and rotational distortions, we computed the passband gravity-darkening coefficients y(λ) using a general
    differential equation in which we consider the effects of convection and of the partial derivative (∂lnI(λ) /∂lng)<SUB>T<SUB>eff</SUB></SUB>.
    <BR /> Results: To generate the limb-darkening coefficients we adopt two stellar atmosphere models: atlas (plane-parallel)
    and phoenix (spherical, quasi-spherical, and r-method). The specific intensity distribution was fitted using five approaches:
    linear, quadratic, square root, logarithmic, and a more general one with four terms. These grids cover together 19 metallicities
    ranging from 10<SUP>-5</SUP> up to 10<SUP>+1</SUP> solar abundances, 0 ≤ log g ≤ 6.0 and 1500 K ≤T<SUB>eff</SUB> ≤ 50
    000 K. The calculations of the gravity-darkening coefficients were performed for all plane-parallel ATLAS models. <P />Tables
    2-29 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/600/A30">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/600/A30</A>'
