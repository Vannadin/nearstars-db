  doi: 10.1093/mnras/stz2778
  abstract: A new hot line list for <SUP>14</SUP>NH<SUB>3</SUB> is presented. The line list CoYuTe was constructed using an
    accurate, empirically refined potential energy surface and a CCSD(T)/aug-cc-pVQZ ab initio dipole moment surface of ammonia,
    previously reported. The line list is an improvement of the ammonia line list BYTe. The CoYuTe line list covers wavenumbers
    up to 20 000 cm<SUP>-1</SUP>, i.e. wavelengths beyond 0.5 μm for temperatures up to 1500 K. Comparisons with the high
    temperature experimental data from the literature show excellent agreement for wavenumbers below 6000 cm<SUP>-1</SUP>.
    The CoYuTe line list contains 16.9 billion transitions and is available from the ExoMol website (www.exomol.com) and the
