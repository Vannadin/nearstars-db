  doi: 10.1029/2017JE005466
  abstract: The Imaging UltraViolet Spectrograph (IUVS) instrument of the Mars Atmosphere and Volatile EvolutioN (MAVEN) mission
    has acquired data on Mars for more than one Martian year. During this time, beginning with March 2015, hundreds of stellar
    occultations have been observed, in 12 dedicated occultation campaigns, executed on average every 2 to 3 months. The occultations
    cover the latitudes from 80°S to 75°N and the full range longitude and local times with relatively sparse sampling. From
    these measurements we retrieve CO<SUB>2</SUB>, O<SUB>2</SUB>, and O<SUB>3</SUB> number densities as well as temperature
    profiles in the altitude range from 20 to 160 km, covering 8 orders of magnitude in pressure from ∼2 × 10<SUP>1</SUP>
    to ∼4 × 10<SUP>-7</SUP> Pa. These data constrain the composition and thermal structure of the atmosphere. The O<SUB>2</SUB>
    mixing ratios retrieved during this study show a high variability from 1.5 × 10<SUP>-3</SUP> to 6 × 10<SUP>-3</SUP>; however,
    the mean value seems to be constant with solar longitude. We detect ozone between 20 and 60 km. In many profiles there
    is a well-defined peak between 30 and 40 km with a maximum density of 1-2 ×10<SUP>9</SUP> cm<SUP>-3</SUP>. Examination
    of the vertical temperature profiles reveals substantial disagreement with models, with observed temperatures both warmer
    and colder than predicted. Examination of the altitude profiles of density perturbations and their variation with longitude
    shows structured atmospheric perturbations at altitudes above 100 km that are likely nonmigrating tides. These perturbations
    are dominated by zonal wave numbers 2 and 3 with amplitudes greater than 45%.
