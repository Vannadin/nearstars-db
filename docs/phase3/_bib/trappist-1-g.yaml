  arxiv_id: '1712.04042'
  ads_bibcode: 2018AJ....155...89P
  title: The California-Kepler Survey. IV. Metal-rich Stars Host a Greater Diversity of Planets
  authors:
  - Petigura, Erik A.
  - Marcy, Geoffrey W.
  - Winn, Joshua N.
  - Weiss, Lauren M.
  - Fulton, Benjamin J.
  - Howard, Andrew W.
  - Sinukoff, Evan
  - Isaacson, Howard
  - Morton, Timothy D.
