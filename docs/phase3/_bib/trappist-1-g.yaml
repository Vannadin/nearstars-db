  doi: 10.1051/0004-6361/201527071
  abstract: We report a detection of thermal emission from the hot Jupiter WASP-48b in the K<SUB>s</SUB>-band. We used the
    Wide-field Infra-red Camera on the 3.6-m Canada-France Hawaii Telescope to observe an occultation of the planet by its
    host star. From the resulting occultation lightcurve we find a planet-to-star contrast ratio in the K<SUB>s</SUB>-band
    of 0.136 ± 0.014%, in agreement with the value of 0.109 ± 0.027% previously determined. We fit the two K<SUB>s</SUB>-band
    occultation lightcurves simultaneously with occultation lightcurves in the H-band and the Spitzer 3.6- and 4.5-μm bandpasses,
    radial velocity data, and transit lightcurves. From this, we revise the system parameters and construct the spectral energy
    distribution (SED) of the dayside atmosphere. By comparing the SED with atmospheric models, we find that both models with
    and without a thermal inversion are consistent with the data. We find the planet's orbit to be consistent with circular
    (e &lt; 0.072 at 3σ). <P />Tables of light curve data are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/615/A86">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/615/A86</A>
