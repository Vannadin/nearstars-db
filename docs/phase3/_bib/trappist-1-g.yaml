  title: 'Modeling Kepler Transit Light Curves as False Positives: Rejection of Blend Scenarios for Kepler-9, and Validation
    of Kepler-9 d, A Super-earth-size Planet in a Multiple System'
  authors:
  - Torres, Guillermo
  - Fressin, François
  - Batalha, Natalie M.
  - Borucki, William J.
  - Brown, Timothy M.
  - Bryson, Stephen T.
  - Buchhave, Lars A.
