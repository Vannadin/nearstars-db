- &id918
  arxiv_id: '1812.06184'
  ads_bibcode: 2019AJ....157...96R
  title: The Transit Light Source Effect. II. The Impact of Stellar Heterogeneity on Transmission Spectra of Planets Orbiting
    Broadly Sun-like Stars
  authors:
  - Rackham, Benjamin V.
  - Apai, Dániel
  - Giampapa, Mark S.
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.3847/1538-3881/aaf892
  abstract: Transmission spectra probe exoplanetary atmospheres, but they can also be strongly affected by heterogeneities
    in host star photospheres through the transit light source effect. Here we build upon our recent study of the effects
    of unocculted spots and faculae on M-dwarf transmission spectra, extending the analysis to FGK dwarfs. Using a suite of
    rotating model photospheres, we explore spot and facula covering fractions for varying activity levels and the associated
    stellar contamination spectra. Relative to M dwarfs, we find that the typical variabilities of FGK dwarfs imply lower
    spot covering fractions, though they generally increase with later spectral types, from ∼0.1% for F dwarfs to 2%-4% for
    late-K dwarfs. While the stellar contamination spectra are considerably weaker than those for typical M dwarfs, we find
    that typically active G and K dwarfs produce visual slopes that are detectable in high-precision transmission spectra.
    We examine line offsets at Hα and the Na and K doublets and find that unocculted faculae in K dwarfs can appreciably alter
    transit depths around the Na D doublet. We find that band-averaged transit depth offsets at molecular bands for CH<SUB>4</SUB>,
    CO, CO<SUB>2</SUB>, H<SUB>2</SUB>O, N<SUB>2</SUB>O, O<SUB>2</SUB>, and O<SUB>3</SUB> are not detectable for typically
    active FGK dwarfs, though stellar TiO/VO features are potentially detectable for typically active late-K dwarfs. Generally,
    this analysis shows that inactive FGK dwarfs do not produce detectable stellar contamination features in transmission
    spectra, though active FGK host stars can produce such features, and care is warranted in interpreting transmission spectra
    from these systems.
  source: citation_of=2024NatAs...8..810T
