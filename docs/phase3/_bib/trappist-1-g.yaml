- &id490
  arxiv_id: '1806.01695'
  ads_bibcode: 2018MNRAS.479..635K
  title: Suppression of atmospheric recycling of planets embedded in a protoplanetary disc by buoyancy barrierc
  authors:
  - Kurokawa, Hiroyuki
  - Tanigawa, Takayuki
  year: '2018'
  pubdate: '2018-09-00'
  doi: 10.1093/mnras/sty1498
  abstract: The ubiquity of super-Earths poses a problem for planet formation theory to explain how they avoided becoming
    gas giants. Rapid recycling of the envelope gas of planets embedded in a protoplanetary disc has been proposed to delay
    the cooling and following accretion of disc gas. We compare isothermal and non-isothermal 3D hydrodynamical simulations
    of the gas flow past a planet to investigate the influence on the feasibility of the recycling mechanism. Radiative cooling
    is implemented by using the β cooling model. We find that, in either case, gas enters the Bondi sphere at high latitudes
    and leaves through the mid-plane regions, or vice versa when disc gas rotates sub-Keplerian. However, in contrast to the
    isothermal case where the recycling flow reaches the deeper part of the envelope, the inflow is inhibited from reaching
    the deep envelope in the non-isothermal case. Once the atmosphere starts cooling, buoyant force prevents the high-entropy
    disc gas from intruding the low-entropy atmosphere. We suggest that the buoyancy barrier isolates the lower envelope from
    the recycling and allows further cooling, which may lead runaway gas accretion on to the core.
