- &id1164
  arxiv_id: '1206.1568'
  ads_bibcode: 2012ApJ...761....6M
  title: An Efficient Automated Validation Procedure for Exoplanet Transit Candidates
  authors:
  - Morton, Timothy D.
  year: '2012'
  pubdate: '2012-12-00'
  doi: 10.1088/0004-637X/761/1/6
  abstract: 'Surveys searching for transiting exoplanets have found many more candidates than they have been able to confirm
    as true planets. This situation is especially acute with the Kepler survey, which has found over 2300 candidates but has
    to date confirmed only a small fraction of them as planets. I present here a general procedure that can quickly be applied
    to any planet candidate to calculate its false positive probability. This procedure takes into account the period, depth,
    duration, and shape of the signal; the colors of the target star; arbitrary spectroscopic or imaging follow-up observations;
    and informed assumptions about the populations and distributions of field stars and multiple-star properties. Applying
    these methods to a sample of known Kepler planets, I demonstrate that many signals can be validated with very limited
    follow-up observations: in most cases with only a spectrum and an adaptive optics image. Additionally, I demonstrate that
    this procedure can reliably identify false positive signals. Because of the computational efficiency of this analysis,
    it is feasible to apply it to all Kepler planet candidates in the near future, and it will streamline the follow-up efforts
    for Kepler and other current and future transit surveys.'
