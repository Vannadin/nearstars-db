  - Rodón, Jose R.
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.1051/0004-6361/202038047
  abstract: 'Context. Planets orbiting low-mass stars such as M dwarfs are now considered a cornerstone in the search for
    planets with the potential to harbour life. GJ 273 is a planetary system orbiting an M dwarf only 3.75 pc away, which
    is composed of two confirmed planets, GJ 273b and GJ 273c, and two promising candidates, GJ 273d and GJ 273e. Planet GJ
    273b resides in the habitable zone. Currently, due to a lack of observed planetary transits, only the minimum masses of
    the planets are known: M<SUB>b</SUB> sin i<SUB>b</SUB> = 2.89 M<SUB>⊕</SUB>, M<SUB>c</SUB> sin i<SUB>c</SUB> = 1.18 M<SUB>⊕</SUB>,
    M<SUB>d</SUB> sin i<SUB>d</SUB> = 10.80 M<SUB>⊕</SUB>, and M<SUB>e</SUB> sin i<SUB>e</SUB> = 9.30 M<SUB>⊕</SUB>. Despite
    its interesting character, the GJ 273 planetary system has been poorly studied thus far. <BR /> Aims: We aim to precisely
    determine the physical parameters of the individual planets, in particular, to break the mass-inclination degeneracy to
    accurately determine the mass of the planets. Moreover, we present a thorough characterisation of planet GJ 273b in terms
    of its potential habitability. <BR /> Methods: First, we explored the planetary formation and hydration phases of GJ 273
    during the first 100 Myr. Secondly, we analysed the stability of the system by considering both the two- and four-planet
    configurations. We then performed a comparative analysis between GJ 273 and the Solar System and we searched for regions
    in GJ 273 which may harbour minor bodies in stable orbits, that is, the main asteroid belt and Kuiper belt analogues.
    <BR /> Results: From our set of dynamical studies, we find that the four-planet configuration of the system allows us
    to break the mass-inclination degeneracy. From our modelling results, the masses of the planets are unveiled as: 2.89
    ≤ M<SUB>b</SUB> ≤ 3.03 M<SUB>⊕</SUB>, 1.18 ≤ M<SUB>c</SUB> ≤ 1.24 M<SUB>⊕</SUB>, 10.80 ≤ M<SUB>d</SUB> ≤ 11.35 M<SUB>⊕</SUB>,
    and 9.30 ≤ M<SUB>e</SUB> ≤ 9.70 M<SUB>⊕</SUB>. These results point to a system that is likely to be composed of an Earth-mass
    planet, a super-Earth and two mini-Neptunes. Based on planetary formation models, we determine that GJ 273b is likely
    an efficient water captor while GJ 273c is probably a dry planet. We find that the system may have several stable regions
    where minor bodies might reside. Collectively, these results are used to offer a comprehensive discussion about the habitability
    of GJ 273b.'
