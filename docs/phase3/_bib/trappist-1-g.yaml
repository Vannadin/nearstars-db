  ads_bibcode: 2025NatAs...9..358D
  title: Combined analysis of the 12.8 and 15 μm JWST/MIRI eclipse observations of TRAPPIST-1 b
  authors:
  - Ducrot, Elsa
  - Lagage, Pierre-Olivier
  - Min, Michiel
