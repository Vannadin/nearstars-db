  year: '2013'
  pubdate: '2013-08-00'
  doi: 10.1088/0004-637X/773/2/144
  abstract: We present five new transit light curves of GJ 1214b taken in the BJHK <SUB>s</SUB> bands. Two transits were observed
    in the B band using the Subaru Prime Focus Camera (Suprime-Cam) and the Faint Object Camera and Spectrograph (FOCAS) instruments
    on board the Subaru 8.2 m telescope, and one transit was done in the JHK <SUB>s</SUB> bands simultaneously with the Simultaneous
    Infrared Imager for Unbiased Survey (SIRIUS) camera on the Infrared Survey Facility (IRSF) 1.4 m telescope. Markov Chain
    Monte Carlo analyses show that the planet-to-star radius ratios are R <SUB>p</SUB>/R <SUB>s</SUB> = 0.11651 ± 0.00065
    (B band, Subaru/Suprime-Cam), R <SUB>p</SUB>/R <SUB>s</SUB> = 0.11601 ± 0.00117 (B band, Subaru/FOCAS), R <SUB>p</SUB>/R
    <SUB>s</SUB> = 0.11654 ± 0.00080 (J band, IRSF/SIRIUS), R_p/R_s = 0.11550 ^{+0.00142}_{-0.00153} (H band, IRSF/SIRIUS),
    and R <SUB>p</SUB>/R <SUB>s</SUB> = 0.11547 ± 0.00127 (K <SUB>s</SUB> band, IRSF/SIRIUS). The Subaru Suprime-Cam transit
    photometry shows a possible spot-crossing feature. Comparisons of the new transit depths and those from previous studies
    with the theoretical models by Howe &amp; Burrows suggest that the high molecular weight atmosphere (e.g., 1% H<SUB>2</SUB>O
    + 99% N<SUB>2</SUB>) models are most likely, however, the low molecular weight (hydrogen-dominated) atmospheres with extensive
    clouds are still not excluded. We also report a long-term monitoring of the stellar brightness variability of GJ 1214
    observed with the MITSuME 50 cm telescope in the g', R <SUB>c</SUB>, and I <SUB>c</SUB> bands simultaneously. The monitoring
    was conducted for 32 nights spanning 78 nights in 2012, and we find a periodic brightness variation with a period of P
    <SUB>s</SUB> = 44.3 ± 1.2 days and semi-amplitudes of 2.1% ± 0.4% in the g' band, 0.56% ± 0.08% in the R <SUB>c</SUB>
    band, and 0.32% ± 0.04% in the I <SUB>c</SUB> band.
