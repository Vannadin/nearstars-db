  arxiv_id: '1511.08901'
  ads_bibcode: 2016ApJ...820...99T
  title: Detection of an Atmosphere Around the Super-Earth 55 Cancri e
  authors:
  - Tsiaras, A.
  - Rocchetto, M.
  - Waldmann, I. P.
  - Venot, O.
  - Varley, R.
  - Morello, G.
  - Damiano, M.
  - Tinetti, G.
  - Barton, E. J.
  - Yurchenko, S. N.
