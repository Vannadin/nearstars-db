  title: Distribution and dynamics of Greenland subglacial lakes
  authors:
  - Bowling, J. S.
  - Livingstone, S. J.
  - Sole, A. J.
  - Chu, W.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.1038/s41467-019-10821-w
  abstract: 'Few subglacial lakes have been identified beneath the Greenland Ice Sheet (GrIS) despite extensive documentation
    in Antarctica, where periodic release of water can impact ice flow. Here we present an ice-sheet-wide survey of Greenland
    subglacial lakes, identifying 54 candidates from airborne radio-echo sounding, and 2 lakes from ice-surface elevation
    changes. These range from 0.2-5.9 km in length, and are mostly distributed away from ice divides, beneath relatively slow-moving
    ice. Based on our results and previous observations, we suggest three zones of formation: stable lakes in northern and
    eastern regions above the Equilibrium Line Altitude (ELA) but away from the interior; hydrologically-active lakes near
    the ELA recharged by surface meltwater and; small, seasonally-active lakes below the ELA, which form over winter and drain
    during the melt season. These observations provide important constraints on the GrIS''s basal thermal regime and help
    refine our understanding of the subglacial hydrological system.'
