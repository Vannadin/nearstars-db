- &id1072
  arxiv_id: '1504.07170'
  ads_bibcode: 2016ApJ...816...34O
  title: 'UV Driven Evaporation of Close-in Planets: Energy-limited, Recombination-limited, and Photon-limited Flows'
  authors:
  - Owen, James E.
  - Alvarez, Marcelo A.
  year: '2016'
  pubdate: '2016-01-00'
  doi: 10.3847/0004-637X/816/1/34
  abstract: We have investigated the evaporation of close-in exoplanets irradiated by ionizing photons. We find that the properties
    of the flow are controlled by the ratio of the recombination time to the flow timescale. When the recombination timescale
    is short compared to the flow timescale, the flow is in approximate local ionization equilibrium with a thin ionization
    front where the photon mean free path is short compared to the flow scale. In this “recombination-limited” flow the mass-loss
    scales roughly with the square root of the incident flux. When the recombination time is long compared to the flow timescale
    the ionization front becomes thick and encompasses the entire flow with the mass-loss rate scaling linearly with flux.
    If the planet's potential is deep, then the flow is approximately “energy-limited” however, if the planet's potential
    is shallow, then we identify a new limiting mass-loss regime, which we term “photon-limited.” In this scenario, the mass-loss
    rate is purely limited by the incoming flux of ionizing photons. We have developed a new numerical approach that takes
    into account the frequency dependence of the incoming ionizing spectrum and performed a large suite of 1D simulations
    to characterize UV driven mass-loss around low-mass planets. We find that the flow is “recombination-limited” at high
    fluxes but becomes “energy-limited” at low fluxes; however, the transition is broad occurring over several orders of magnitude
    in flux. Finally, we point out that the transitions between the different flow types do not occur at a single flux value
    but depend on the planet's properties, with higher-mass planets becoming “energy-limited” at lower fluxes.
  source: citation_of=2018IJAsB..17..116L
