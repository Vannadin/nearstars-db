  arxiv_id: '2305.16356'
  ads_bibcode: 2023AJ....166..146W
  title: A Search for Extraterrestrial Technosignatures in Archival FAST Survey Data Using a New Procedure
  authors:
  - Wang, Yu-Chen
  - Tao, Zhen-Zhao
  - Zhang, Zhi-Song
  - Lyu, Cheqiu
  - Zhang, Tingting
  - Zhang, Tong-Jie
