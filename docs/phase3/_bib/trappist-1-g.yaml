  doi: 10.3847/1538-3881/ab94a3
  abstract: 'This paper presents the atmospheric characterization of three large, gaseous planets: WASP-127 b, WASP-79 b,
    and WASP-62 b. We analyzed spectroscopic data obtained with the G141 grism (1.088-1.68 μm) of the Wide Field Camera 3
    on board the Hubble Space Telescope using the Iraclis pipeline and the TauREx3 retrieval code, both of which are publicly
    available. For WASP-127 b, which is the least dense planet discovered so far and is located in the short-period Neptune
    desert, our retrieval results found strong water absorption corresponding to an abundance of log(H<SUB>2</SUB>O) = -2.71
    ${}_{-1.05}^{+0.78}$ and absorption compatible with an iron hydride abundance of log(FeH) = $-{5.25}_{-1.10}^{+0.88}$
    , with an extended cloudy atmosphere. We also detected water vapor in the atmospheres of WASP-79 b and WASP-62 b, with
    best-fit models indicating the presence of iron hydride, too. We used the Atmospheric Detectability Index as well as Bayesian
    log evidence to quantify the strength of the detection and compared our results to the hot Jupiter population study by
    Tsiaras et al. While all the planets studied here are suitable targets for characterization with upcoming facilities such
    as the James Webb Space Telescope and Ariel, WASP-127 b is of particular interest due to its low density, and a thorough
    atmospheric study would develop our understanding of planet formation and migration. <SUP>*</SUP> ARES: Ariel Retrieval
    of Exoplanets School.'
