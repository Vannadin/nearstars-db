  abstract: 'Context. Quaoar is a classical trans-Neptunian object (TNO) with an area-equivalent diameter of 1100 km and an
    orbital semi-major axis of 43.3 astronomical units. Based on stellar occultations observed between 2018 and 2021, an inhomogeneous
    ring (Q1R, i.e., Quaoar''s first ring) has been detected around this body. <BR /> Aims: A new stellar occultation by Quaoar
    was observed on August 9, 2022, with the aim of improving Quaoar''s shape models and the physical parameters of Q1R, while
    searching for additional material around the body. <BR /> Methods: The occultation provided nine effective chords across
    Quaoar, pinning down its size, shape, and astrometric position. Large facilities, such as Gemini North and the Canada-France-Hawaii
    Telescope (CFHT), were used to obtain high acquisition rates and signal-to-noise ratios. The light curves were also used
    to characterize the Q1R ring (radial profiles and orbital elements). <BR /> Results: Quaoar''s elliptical fit to the occultation
    chords yields the limb with an apparent semi-major axis of 579.5 ± 4.0 km, apparent oblateness of 0.12 ± 0.01, and area-equivalent
    radius of 543 ± 2 km. Quaoar''s limb orientation is consistent with Q1R and Weywot orbiting in Quaoar''s equatorial plane.
    The orbital radius of Q1R is refined to a value of 4057 ± 6 km. The radial opacity profile of the more opaque ring profile
    follows a Lorentzian shape that extends over 60 km, with a full width at half maximum (FWHM) of ∼5 km and a peak normal
    optical depth of 0.4. Besides the secondary events related to the already reported rings, new secondary events detected
    during the August 2022 occultation in three different data sets are consistent with another ring around Quaoar with a
    radius of 2520 ± 20 km, assuming the ring is circular and co-planar with Q1R. This new ring has a typical width of 10
    km and a normal optical depth of ∼0.004. Just as Q1R, it also lies outside Quaoar''s classical Roche limit.'
