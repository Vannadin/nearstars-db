  abstract: Magnetohydrodynamic (MHD) oscillatory processes in different plasma systems, such as the corona of the Sun and
    the Earth's magnetosphere, show interesting similarities and differences, which so far received little attention and remain
    under-exploited. The successful commissioning within the past ten years of THEMIS, Hinode, STEREO and SDO spacecraft,
    in combination with matured analysis of data from earlier spacecraft (Wind, SOHO, ACE, Cluster, TRACE and RHESSI) makes
    it very timely to survey the breadth of observations giving evidence for MHD oscillatory processes in solar and space
    plasmas, and state-of-the-art theoretical modelling. The paper reviews several important topics, such as Alfvénic resonances
    and mode conversion; MHD waveguides, such as the magnetotail, coronal loops, coronal streamers; mechanisms for periodicities
    produced in energy releases during substorms and solar flares, possibility of Alfvénic resonators along open field lines;
    possible drivers of MHD waves; diagnostics of plasmas with MHD waves; interaction of MHD waves with partly-ionised boundaries
    (ionosphere and chromosphere). The review is mainly oriented to specialists in magnetospheric physics and solar physics,
    but not familiar with specifics of the adjacent research fields.
