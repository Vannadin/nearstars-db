  doi: 10.1051/0004-6361/202038350
  abstract: Here we present a publicly available database of opacities for molecules of astrophysical interest named ExoMolOP
    that has been compiled for over 80 species, and is based on the latest line list data from the ExoMol, HITEMP, and MoLLIST
    databases. These data are generally suitable for characterising high-temperature exoplanet or cool stellar and substellar
    atmospheres, and have been computed at a variety of pressures and temperatures, with a few molecules included at room
    temperature only from the HITRAN database. The data are formatted in different ways for four different exoplanet atmosphere
    retrieval codes; ARCiS, TauREx, NEMESIS, and petitRADTRANS, and include both cross sections (at R = λ/∆λ = 15000) and
    k-tables (at R = λ/∆λ = 1000) for the 0.3-50 μm wavelength region. Opacity files can be downloaded and used directly for
    these codes. Atomic data for alkali metals Na and K are also included, using data from the NIST database and the latest
    line shapes for the resonance lines. Broadening parameters have been taken from the literature where available, or have
    been estimated from the parameters of a known molecule with similar molecular properties where no broadening data are
    available. <P />The data are available from <A href="http://www.exomol.com">http://www.exomol.com</A>.
