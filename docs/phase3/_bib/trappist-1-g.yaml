  title: The high-energy radiation environment of the habitable-zone super-Earth LHS 1140b
  authors:
  - Spinelli, R.
  - Borsa, F.
  - Ghirlanda, G.
  - Ghisellini, G.
  - Campana, S.
  - Haardt, F.
