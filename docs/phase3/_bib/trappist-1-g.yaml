- &id1084
  arxiv_id: '1506.05097'
  ads_bibcode: 2015ApJ...810L..25H
  title: A Definition for Giant Planets Based on the Mass-Density Relationship
  authors:
  - Hatzes, Artie P.
  - Rauer, Heike
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1088/2041-8205/810/2/L25
  abstract: We present the mass-density relationship (log M - log ρ) for objects with masses ranging from planets (M ≈ 0.01
    M<SUB>Jup</SUB>) to stars (M &gt; 0.08 M<SUB>☉</SUB>). This relationship shows three distinct regions separated by a change
    in slope in the log M - log ρ plane. In particular, objects with masses in the range 0.3 M<SUB>Jup</SUB>-60 M<SUB>Jup</SUB>
    follow a tight linear relationship with no distinguishing feature to separate the low-mass end (giant planets) from the
    high-mass end (brown dwarfs). We propose a new definition of giant planets simply based on changes in the slope of the
    log M versus log ρ relationship. By this criterion, objects with masses less than ≈0.3 M<SUB>Jup</SUB> are low-mass planets,
    either icy or rocky. Giant planets cover the mass range 0.3 M<SUB>Jup</SUB>-60 M<SUB>Jup</SUB>. Analogous to the stellar
    main sequence, objects on the upper end of the giant planet sequence (brown dwarfs) can simply be referred to as “high-mass
    giant planets,” while planets with masses near that of Jupiter can be called “low-mass giant planets.”
