  arxiv_id: '1706.06204'
  ads_bibcode: 2018AJ....155...48W
  title: 'The California-Kepler Survey. V. Peas in a Pod: Planets in a Kepler Multi-planet System Are Similar in Size and
    Regularly Spaced'
  authors:
  - Weiss, Lauren M.
  - Marcy, Geoffrey W.
  - Petigura, Erik A.
  - Fulton, Benjamin J.
  - Howard, Andrew W.
  - Winn, Joshua N.
  - Isaacson, Howard T.
