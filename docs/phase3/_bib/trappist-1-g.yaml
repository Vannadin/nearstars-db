  ads_bibcode: 2023A&A...677A..33B
  title: Cold Jupiters and improved masses in 38 Kepler and K2 small planet systems from 3661 HARPS-N radial velocities. No
    excess of cold Jupiters in small planet systems
  authors:
  - Bonomo, A. S.
  - Dumusque, X.
  - Massa, A.
  - Mortier, A.
  - Bongiolatti, R.
  - Malavolta, L.
  - Sozzetti, A.
