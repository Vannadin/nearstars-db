  arxiv_id: '2104.05713'
  ads_bibcode: 2021AJ....162..243B
  title: No Sub-Saturn-mass Planet Desert in the CORALIE/HARPS Radial-velocity Sample
  authors:
  - Bennett, David P.
  - Ranc, Clément
  - Fernandes, Rachel B.
  year: '2021'
  pubdate: '2021-12-00'
  doi: 10.3847/1538-3881/ac2a2b
  abstract: We analyze the CORALIE/HARPS sample of exoplanets found by the Doppler radial-velocity method for signs of the
    predicted gap or "desert" at 10-100 M <SUB>⊕</SUB> caused by runaway gas accretion at semimajor axes of &lt;3 au. We find
    that these data are not consistent with this prediction. This result is similar to the finding by the MOA gravitational
    microlensing survey that found no desert in the exoplanet distribution for exoplanets in slightly longer period orbits
    and somewhat lower host masses (Suzuki et al. 2018). Together, these results imply that the runaway gas accretion scenario
    of the core accretion theory does not have a large influence on the final mass and semimajor axis distribution of exoplanets.
