- &id594
  arxiv_id: '1107.2920'
  ads_bibcode: 2011ApJ...743...61S
  title: Starspots, Spin-Orbit Misalignment, and Active Latitudes in the HAT-P-11 Exoplanetary System
  authors:
  - Sanchis-Ojeda, Roberto
  - Winn, Joshua N.
  year: '2011'
  pubdate: '2011-12-00'
  doi: 10.1088/0004-637X/743/1/61
  abstract: 'We present the analysis of four months of Kepler photometry of the K4V star HAT-P-11, including 26 transits of
    its "super-Neptune" planet. The transit data exhibit numerous anomalies which we interpret as passages of the planet over
    dark starspots. These spot-crossing anomalies preferentially occur at two specific phases of the transit. These phases
    can be understood as the intersection points between the transit chord and the active latitudes of the host star, where
    starspots are most abundant. Based on the measured characteristics of spot-crossing anomalies and previous observations
    of the Rossiter-McLaughlin effect, we find two solutions for the stellar obliquity ψ and active latitude l: either ψ =
    106<SUP>+15</SUP> <SUB>-11</SUB> and l = 19.7<SUP>+1.5</SUP> <SUB>-2.2</SUB>, or ψ = 97<SUP>+8</SUP> <SUB>-4</SUB> and
    l = 67<SUP>+2</SUP> <SUB>-4</SUB> (all in degrees). If the active latitude changes with time analogous to the "butterfly
    diagram" of the Sun''s activity cycle, future observations should reveal changes in the preferred phases of spot-crossing
    anomalies.'
