  arxiv_id: null
  ads_bibcode: 2007P&SS...55..631K
  title: 'Mass loss of “Hot Jupiters”—Implications for CoRoT discoveries. Part I: The importance of magnetospheric protection
    of a planet against ion loss caused by coronal mass ejections'
  authors:
  - Khodachenko, M. L.
  - Lammer, H.
  - Lichtenegger, H. I. M.
  - Langmayr, D.
  - Erkaev, N. V.
  - Grießmeier, J.-M.
  - Leitner, M.
  - Penz, T.
  - Biernat, H. K.
  - Motschmann, U.
  - Rucker, H. O.
  year: '2007'
  pubdate: '2007-04-00'
  doi: 10.1016/j.pss.2006.07.010
  abstract: Atmospheric erosion due to CME-caused ion pick-up is investigated here for the first time for short periodic gas
    giants (so-called "Hot Jupiters") orbiting close to a star. To study the effect of encountering CMEs produced on the magnetospheres
    and atmospheres of "Hot Jupiters" we model possible interaction of dense CME plasma with the exoplanet HD209458b ( r<SUB>pl</SUB>=1.43r<SUB>Jup</SUB>,
    M<SUB>pl</SUB>=0.69M<SUB>Jup</SUB>), which orbits a 4.0-5.0 Gyr old Sun-like star at a distance of about 0.045 AU. A numerical
    hydrodynamic model is applied for calculation of the upper atmospheric density and the hydrogen wind of HD209458b as a
    function of planetocentric distance. Taking into account the similarity of HD209458b's host star to our Sun we use for
    the study of the ion production and loss rate of H<SUP>+</SUP> ions the solar CME plasma parameters and apply a numerical
    test particle model. Tidal-locking of short periodic exoplanets closely located to their host stars should result in weaker
    intrinsic planetary magnetic moments, as compared to those of the fast rotating Jupiter type planets at much larger orbits.
    It is shown that in this case the encountering CME plasma can compress the magnetospheric stand-off distance of short
    periodic "Hot Jupiters" down to the heights at which the ionization and pick-up of the planetary neutral atmosphere by
    the CME plasma flow take place. Assuming for the host star of HD209458b the same CME occurrence rate as on the Sun, we
    estimate possible total mass loss rates of HD209458b due to its collisions with CMEs over the planet lifetime. It has
    been found that under different estimations of the value of a planetary magnetic moment, HD209458b could have lost over
    its lifetime the mass from 0.2 up to several times of its present mass M<SUB>pl</SUB>.
