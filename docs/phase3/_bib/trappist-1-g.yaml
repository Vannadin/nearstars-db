  arxiv_id: '1710.10114'
  ads_bibcode: 2018A&A...609A..12Z
  title: Spectrum radial velocity analyser (SERVAL). High-precision radial velocities and two alternative spectral indicators
  authors:
  - Zechmeister, M.
  - Reiners, A.
  - Amado, P. J.
  - Azzaro, M.
  - Bauer, F. F.
  - Béjar, V. J. S.
  - Caballero, J. A.
  - Guenther, E. W.
  - Hagen, H.-J.
