  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.3847/2041-8213/ad73d0
  abstract: L 98-59 d is a Super-Earth planet orbiting an M-type star. We performed retrievals on the transmission spectrum
    of L 98-59 d obtained using NIRSpec G395H during a single transit, from JWST Cycle 1 GTO 1224. The wavelength range of
    this spectrum allows us to detect the presence of several atmospheric species. We found that the spectrum is consistent
    with a high mean molecular weight atmosphere. The atmospheric spectrum indicates the possible presence of the sulfur-bearing
    species H<SUB>2</SUB>S and SO<SUB>2</SUB>, which could hint at active volcanism on this planet if verified by future observations.
    We also tested for signs of stellar contamination in the spectrum and found signs of unocculted faculae on the star. The
    tentative signs of an atmosphere on L 98-59 d presented in this work from just one transit bodes well for possible molecular
    detections in the future, particularly as it is one of the best targets among small exoplanets for atmospheric characterization
    using JWST.
