- &id313
  arxiv_id: '1903.01386'
  ads_bibcode: 2019NatAs...3..424M
  title: Obliquity-driven sculpting of exoplanetary systems
  authors:
  - Millholland, Sarah
  - Laughlin, Gregory
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.1038/s41550-019-0701-7
  abstract: NASA's Kepler mission revealed that 30% of Solar-type stars harbour planets with sizes between that of Earth and
    Neptune on nearly circular and coplanar orbits with periods less than 100 days<SUP>1-4</SUP>. Such short-period compact
    systems are rarely found with planet pairs in mean-motion resonances (MMRs)—configurations in which the planetary orbital
    periods exhibit a simple integer ratio—but there is a significant overabundance of planet pairs lying just wide of the
    first-order resonances<SUP>5</SUP>. Previous work suggests that tides raised on the planets by the host star may be responsible
    for forcing systems into these configurations by draining orbital energy to heat<SUP>6-8</SUP>. Such tides, however, are
    insufficient unless there exists a substantial and as-yet-unidentified source of extra dissipation<SUP>9,10</SUP>. Here
    we show that this cryptic heat source may be linked to `obliquity tides' generated when a large axial tilt (obliquity)
    is maintained by secular resonance-driven spin-orbit coupling. We present evidence that typical compact, nearly coplanar
    systems frequently experience this mechanism, and we highlight additional features in the planetary orbital period and
    radius distributions that may be its signatures. Extrasolar planets that maintain large obliquities will exhibit infrared
    light curve features that are detectable with forthcoming space missions. The observed period ratio distribution can be
    explained if typical tidal quality factors for super-Earths and sub-Neptunes are similar to those of Uranus and Neptune.
