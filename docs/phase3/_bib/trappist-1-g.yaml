  arxiv_id: '2001.02840'
  ads_bibcode: 2020AJ....159...94S
  title: 'Kepler-1661 b: A Neptune-sized Kepler Transiting Circumbinary Planet around a Grazing Eclipsing Binary'
  authors:
  - Socia, Quentin J.
  - Welsh, William F.
  - Orosz, Jerome A.
  - Cochran, William D.
  - Endl, Michael
  - Quarles, Billy
  - Short, Donald R.
  - Torres, Guillermo
  - Windmiller, Gur
