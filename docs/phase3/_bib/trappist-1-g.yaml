  - Madhusudhan, Nikku
  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.3847/1538-3881/acab67
  abstract: Over the last decade exoplanetary transmission spectra have yielded an unprecedented understanding about the physical
    and chemical nature of planets outside our solar system. Physical and chemical knowledge is mainly extracted via fitting
    competing models to spectroscopic data, based on some goodness-of-fit metric. However, current employed metrics shed little
    light on how exactly a given model is failing at the individual data point level and where it could be improved. As the
    quality of our data and complexity of our models increases, there is a need to better understand which observations are
    driving our model interpretations. Here we present the application of Bayesian leave-one-out cross-validation to assess
    the performance of exoplanet atmospheric models and compute the expected log pointwise predictive density (elpd<SUB>LOO</SUB>).
    elpd<SUB>LOO</SUB> estimates the out-of-sample predictive accuracy of an atmospheric model at data-point resolution, providing
    interpretable model criticism. We introduce and demonstrate this method on synthetic Hubble Space Telescope transmission
    spectra of a hot Jupiter. We apply elpd<SUB>LOO</SUB> to interpret current observations of HAT-P-41 b and assess the reliability
    of recent inferences of H<SUP>-</SUP> in its atmosphere. We find that previous detections of H<SUP>-</SUP> are dependent
    solely on a single data point. This new metric for exoplanetary retrievals complements and expands our repertoire of tools
    to better understand the limits of our models and data. elpd<SUB>LOO</SUB> provides the means to interrogate models at
    the single-data-point level, which will help in robustly interpreting the imminent wealth of spectroscopic information
    coming from JWST.
