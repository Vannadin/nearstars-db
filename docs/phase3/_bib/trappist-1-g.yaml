- &id655
  arxiv_id: '2404.12775'
  ads_bibcode: 2024A&A...688A..43L
  title: 'The open-source sunbather code: Modeling escaping planetary atmospheres and their transit spectra'
  authors:
  - Linssen, Dion
  - Shih, Jim
  - MacLeod, Morgan
  - Oklopčić, Antonija
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.1051/0004-6361/202450240
  abstract: Atmospheric escape is thought to significantly influence the evolution of exoplanets, especially sub-Jupiter planets
    on short orbital periods. Theoretical models predict that hydrodynamic escape could erode the atmospheres of such gaseous
    planets, leaving only a rocky core. Deriving atmospheric mass-loss rates from observations is necessary to check these
    predictions. One of the ways to obtain mass-loss-rate estimates is to fit transit spectra of the 10 830 Å helium or UV
    metal lines with Parker wind models. We aim to provide the community with a tool that enables this type of analysis, and
    present sunbather, an open-source Python code that can be used to model escaping exoplanet atmospheres and their transit
    spectra. sunbather incorporates the Parker wind code p-winds and the photoionization code Cloudy, with the ability to
    calculate any currently known spectral tracer, using an arbitrary atmospheric composition. With sunbather, we investigate
    how the atmospheric structure of a generic hot-Neptune planet depends on metallicity. We find that the mass-loss rate
    drops by roughly one order of magnitude as we increase the metallicity from solar to 50 times solar. Line cooling by metal
    species is already important for a solar composition, and is even more so at higher metallicity. We then demonstrate how
    sunbather can be used to interpret observations of spectral lines that form in the upper atmosphere. We fit the observed
    helium spectrum of the mini-Neptune TOI-2134 b and show how, even for helium data, the inferred mass-loss rate can change
    by a factor of up to three, depending on the assumed metallicity.
