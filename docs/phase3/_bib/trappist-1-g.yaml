  year: '2004'
  pubdate: '2004-03-00'
  doi: 10.1016/j.icarus.2003.11.019
  abstract: We present results from 44 simulations of late stage planetary accretion, focusing on the delivery of volatiles
    (primarily water) to the terrestrial planets. Our simulations include both planetary "embryos" (defined as Moon to Mars
    sized protoplanets) and planetesimals, assuming that the embryos formed via oligarchic growth. We investigate volatile
    delivery as a function of Jupiter's mass, position and eccentricity, the position of the snow line, and the density (in
    solids) of the solar nebula. In all simulations, we form 1-4 terrestrial planets inside 2 AU, which vary in mass and volatile
    content. In 44 simulations we have formed 43 planets between 0.8 and 1.5 AU, including 11 "habitable" planets between
    0.9 and 1.1 AU. These planets range from dry worlds to "water worlds" with 100+oceans of water (1 ocean=1.5×10 <SUP>24</SUP>
    g), and vary in mass between 0.23 M<SUB>⊕</SUB> and 3.85 M<SUB>⊕</SUB>. There is a good deal of stochastic noise in these
    simulations, but the most important parameter is the planetesimal mass we choose, which reflects the surface density in
    solids past the snow line. A high density in this region results in the formation of a smaller number of terrestrial planets
    with larger masses and higher water content, as compared with planets which form in systems with lower densities. We find
    that an eccentric Jupiter produces drier terrestrial planets with higher eccentricities than a circular one. In cases
    with Jupiter at 7 AU, we form what we call "super embryos," 1-2 M<SUB>⊕</SUB> protoplanets which can serve as the accretion
    seeds for 2+ M<SUB>⊕</SUB> planets with large water contents.
