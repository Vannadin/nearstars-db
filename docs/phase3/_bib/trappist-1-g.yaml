  ads_bibcode: 2013A&A...555A..15F
  title: 'TNOs are Cool: A survey of the trans-Neptunian region. VIII. Combined Herschel PACS and SPIRE observations of nine
    bright targets at 70-500 μm'
  authors:
  - Fornasier, S.
  - Lellouch, E.
  - Müller, T.
  - Santos-Sanz, P.
  - Panuzzo, P.
  - Kiss, C.
  - Lim, T.
  - Mommert, M.
