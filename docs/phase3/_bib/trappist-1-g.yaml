  doi: 10.3847/1538-4357/ab2767
  abstract: 'We search for superflares from 4068 cool stars in 2+ yr of Evryscope photometry, focusing on those with high-cadence
    data from both Evryscope and the Transiting Exoplanet Survey Satellite (TESS). The Evryscope array of small telescopes
    observed 575 flares from 284 stars, with a median energy of 10<SUP>34.0</SUP> erg. Since 2016, Evryscope has enabled the
    detection of rare events from all stars observed by TESS through multi-year, high-cadence continuous observing. We report
    around twice the previous largest number of 10<SUP>34</SUP> erg high-cadence flares from nearby cool stars. We find eight
    flares with amplitudes of 3+ g′ magnitudes, with the largest reaching 5.6 mag and releasing 10<SUP>36.2</SUP> erg. We
    observe a 10<SUP>34</SUP> erg superflare from TOI-455 (LTT 1445), a mid-M with a rocky planet candidate. We measure the
    superflare rate per flare-star and quantify the average flaring of active stars as a function of spectral type, including
    superflare rates, flare frequency distributions, and typical flare amplitudes in g′. We confirm superflare morphology
    is broadly consistent with magnetic reconnection. We estimate starspot coverage necessary to produce superflares, and
    hypothesize maximum allowed superflare energies and waiting times between flares corresponding to 100% coverage of the
    stellar hemisphere. We observe decreased flaring at high Galactic latitudes. We explore the effects of superflares on
    ozone loss to planetary atmospheres: we observe one superflare with sufficient energy to photodissociate all ozone in
    an Earth-like atmosphere in one event. We find 17 stars that may deplete an Earth-like atmosphere via repeated flaring.
    Of the 1822 stars around which TESS may discover temperate rocky planets, we observe 14.6% ± 2% emit large flares.'
