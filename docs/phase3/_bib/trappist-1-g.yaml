- &id243
  arxiv_id: '2404.12310'
  ads_bibcode: 2024ApJ...971...24P
  title: 'A Multiwavelength Survey of Nearby M Dwarfs: Optical and Near-ultraviolet Flares and Activity with Contemporaneous
    TESS, Kepler/K2, Swift, and HST Observations'
  authors:
  - Paudel, Rishi R.
  - Barclay, Thomas
  - Youngblood, Allison
  - Quintana, Elisa V.
  - Schlieder, Joshua E.
  - Vega, Laura D.
  - Gilbert, Emily A.
  - Osten, Rachel A.
  - Peacock, Sarah
  - Tristan, Isaiah I.
  - Feliz, Dax L.
