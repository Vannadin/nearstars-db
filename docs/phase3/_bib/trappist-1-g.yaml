  arxiv_id: '1411.6875'
  ads_bibcode: 2014Sci...346..981K
  title: Magnetic moment and plasma environment of HD 209458b as determined from Lyα observations
  authors:
  - Kislyakova, Kristina G.
  - Holmström, Mats
  - Lammer, Helmut
  - Odert, Petra
  - Khodachenko, Maxim L.
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1126/science.1257829
  abstract: 'Transit observations of HD 209458b in the stellar Lyman-α(Lyα) line revealed strong absorption in both blue and
    red wings of the line interpreted as hydrogen atoms escaping from the planet’s exosphere at high velocities. The following
    sources for the absorption were suggested: acceleration by the stellar radiation pressure, natural spectral line broadening,
    or charge exchange with the stellar wind. We reproduced the observation by means of modeling that includes all aforementioned
    processes. Our results support a stellar wind with a velocity of ≈400 kilometers per second at the time of the observation
    and a planetary magnetic moment of ≈1.6 × 10<SUP>26</SUP> amperes per square meter.'
