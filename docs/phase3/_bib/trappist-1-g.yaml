  arxiv_id: '1702.08393'
  ads_bibcode: 2017A&A...599A.127F
  title: Radio emission and mass loss rate limits of four young solar-type stars
  authors:
  - Fichtinger, Bibiana
  - Güdel, Manuel
  - Mutel, Robert L.
  - Hallinan, Gregg
  - Gaidos, Eric
  - Skinner, Stephen L.
  - Lynch, Christene
  - Gayley, Kenneth G.
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1051/0004-6361/201629886
  abstract: '<BR /> Aims: Observations of free-free continuum radio emission of four young main-sequence solar-type stars
    (EK Dra, π<SUP>1</SUP> UMa, χ<SUP>1</SUP> Ori, and κ<SUP>1</SUP> Cet) are studied to detect stellar winds or at least
    to place upper limits on their thermal radio emission, which is dominated by the ionized wind. The stars in our sample
    are members of The Sun in Time programme and cover ages of 0.1-0.65 Gyr on the main-sequence. They are similar in magnetic
    activity to the Sun and thus are excellent proxies for representing the young Sun. Upper limits on mass loss rates for
    this sample of stars are calculated using their observational radio emission. Our aim is to re-examine the faint young
    Sun paradox by assuming that the young Sun was more massive in its past, and hence to find a possible solution for this
    famous problem. <BR /> Methods: The observations of our sample are performed with the Karl G. Jansky Very Large Array
    (VLA) with excellent sensitivity, using the C-band receiver from 4-8 GHz and the Ku-band from 12-18 GHz. Atacama Large
    Millimeter/Submillitmeter Array (ALMA) observations are performed at 100 GHz. The Common Astronomy Software Application
    (CASA) package is used for the data preparation, reduction, calibration, and imaging. For the estimation of the mass loss
    limits, spherically symmetric winds and stationary, anisotropic, ionized winds are assumed. We compare our results to
    1) mass loss rate estimates of theoretical rotational evolution models; and 2) to results of the indirect technique of
    determining mass loss rates: Lyman-α absorption. <BR /> Results: We are able to derive the most stringent direct upper
    limits on mass loss so far from radio observations. Two objects, EK Dra and χ<SUP>1</SUP> Ori, are detected at 6 and 14
    GHz down to an excellent noise level. These stars are very active and additional radio emission identified as non-thermal
    emission was detected, but limits for the mass loss rates of these objects are still derived. The emission of χ<SUP>1</SUP>
    Ori does not come from the main target itself, but from its M-dwarf companion. The stars π<SUP>1</SUP> UMa and κ<SUP>1</SUP>
    Cet were not detected in either C-band or in Ku-band. For these objects we give upper limits to their radio free-free
    emission and calculate upper limits to their mass loss rates. Finally, we reproduce the evolution of the Sun and derive
    an estimate for the solar mass of the Sun at a younger age.'
