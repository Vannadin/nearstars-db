  abstract: Sunspots are the most readily visible manifestations of solar magnetic field concentrations and of their interaction
    with the Sun's plasma. Although sunspots have been extensively studied for almost 400 years and their magnetic nature
    has been known since 1908, our understanding of a number of their basic properties is still evolving, with the last decades
    producing considerable advances. In the present review I outline our current empirical knowledge and physical understanding
    of these fascinating structures. I concentrate on the internal structure of sunspots, in particular their magnetic and
    thermal properties and on some of their dynamical aspects.
