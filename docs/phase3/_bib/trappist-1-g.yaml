- arxiv_id: '0706.3798'
  ads_bibcode: 2008SSRv..135..323A
  title: Earthshine Observation of Vegetation and Implication for Life Detection on Other Planets. A Review of 2001-2006 Works
  authors:
  - Arnold, Luc
  year: '2008'
  pubdate: '2008-03-00'
  doi: 10.1007/s11214-007-9281-4
  abstract: The detection of exolife is one of the goals of very ambitious future space missions that aim to take direct images
    of Earth-like planets. While associations of simple molecules present in the planet’s atmosphere (O<SUB>2</SUB>, O<SUB>3</SUB>,
    CO<SUB>2</SUB>, etc.) have been identified as possible global biomarkers, this paper reviews the detectability of a signature
    of life from the planet’s surface, i.e. the green vegetation. The vegetation reflectance has indeed a specific spectrum,
    with a sharp edge around 700 nm, known as the “Vegetation Red Edge” (VRE). Moreover, vegetation covers a large surface
    of emerged lands, from tropical evergreen forest to shrub tundra. Thus, considering vegetation as a potential global biomarker
    is relevant. Earthshine allows us to observe the Earth as a distant planet, i.e. without spatial resolution. Since 2001,
    Earthshine observations have been used by several authors to test and quantify the detectability of the VRE in the Earth
    spectrum. The vegetation spectral signature is detected as a small “positive shift” of a few percentage points above the
    continuum, starting at 700 nm. This signature appears in most spectra, and its strength is correlated with the Earth’s
    phase (visible land versus visible ocean). The observations show that detecting the VRE on Earth requires a photometric
    relative accuracy of 1% or better. Detecting something equivalent on an Earth-like planet will therefore remain challenging,
    especially considering the possibility of mineral artifacts and the question of “red edge” universality in the Universe.
