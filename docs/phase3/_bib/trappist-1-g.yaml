  arxiv_id: '2006.09941'
  ads_bibcode: 2020ApJ...897L..27H
  title: On the Diversity of M-star Astrospheres and the Role of Galactic Cosmic Rays Within
  authors:
  - Herbst, Konstantin
  - Scherer, Klaus
  - Ferreira, Stefan E. S.
  - Baalmann, Lennart R.
  - Engelbrecht, N. Eugene
  - Fichtner, Horst
  - Kleimann, Jens
  - Strauss, R. Du Toit
  - Moeketsi, Daniel M.
  - Mohamed, Shazrene
  year: '2020'
  pubdate: '2020-07-00'
  doi: 10.3847/2041-8213/ab9df3
  abstract: With upcoming missions such as the James Webb Space Telescope, the European Extremely Large Telescope, and the
    Atmospheric Remote-sensing Infrared Exoplanet Large-survey, we soon will be on the verge of detecting and characterizing
    Earth-like exoplanetary atmospheres for the first time. These planets are most likely to be found around smaller and cooler
    K- and M-type stars. However, recent observations showed that their radiation environment might be much harsher than that
    of the Sun. Thus, the exoplanets are most likely exposed to an enhanced stellar radiation environment, which could affect
    their habitability, for example, in the form of a hazardous flux of energetic particles. Knowing the stellar radiation
    field, and being able to model the radiation exposure on the surface of a planet, is crucial to assess its habitability.
    In this study, we present 3D magnetohydrodynamic-based model efforts investigating M-stars, focusing on V374 Peg, Proxima
    Centauri, and LHS 1140, chosen because of their diverse astrospheric quantities. We show that V374 Peg has a much larger
    astrosphere (ASP) than our Sun, while Proxima Centauri and LHS 1140 most likely have ASPs comparable to or even much smaller
    than the heliosphere, respectively. Based on a 1D transport model, for the first time, we provide numerical estimates
    of the modulation of Galactic cosmic rays (GCRs) within the three ASPs. We show that the impact of GCRs on the Earth-like
    exoplanets Proxima Centauri b and LHS 1140 b cannot be neglected in the context of exoplanetary habitability.
