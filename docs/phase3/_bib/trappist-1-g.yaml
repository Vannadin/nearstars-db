  arxiv_id: '1612.03939'
  ads_bibcode: 2016ApJ...833..145S
  title: 'The Exoplanet Mass-ratio Function from the MOA-II Survey: Discovery of a Break and Likely Peak at a Neptune Mass'
  authors:
  - Suzuki, D.
  - Bennett, D. P.
  - Sumi, T.
  - Bond, I. A.
  - Rogers, L. A.
  - Abe, F.
  - Asakura, Y.
  - Bhattacharya, A.
  - Donachie, M.
  - Freeman, M.
  - Fukui, A.
  - Hirao, Y.
  - Itow, Y.
  - Koshimoto, N.
  - Li, M. C. A.
  - Ling, C. H.
  - Masuda, K.
  - Matsubara, Y.
  - Muraki, Y.
  - Nagakane, M.
  - Onishi, K.
  - Oyokawa, H.
  - Rattenbury, N.
  - Saito, To.
  - Sharan, A.
  - Shibai, H.
  - Sullivan, D. J.
  - Tristram, P. J.
  - Yonehara, A.
  - MOA Collaboration
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.3847/1538-4357/833/2/145
  abstract: We report the results of the statistical analysis of planetary signals discovered in MOA-II microlensing survey
    alert system events from 2007 to 2012. We determine the survey sensitivity as a function of planet-star mass ratio, q,
    and projected planet-star separation, s, in Einstein radius units. We find that the mass-ratio function is not a single
    power law, but has a change in slope at q ∼ 10<SUP>-4</SUP>, corresponding to ∼20 M <SUB>⊕</SUB> for the median host-star
    mass of ∼0.6 {M}<SUB>☉ </SUB>. We find significant planetary signals in 23 of the 1474 alert events that are well-characterized
    by the MOA-II survey data alone. Data from other groups are used only to characterize planetary signals that have been
    identified in the MOA data alone. The distribution of mass ratios and separations of the planets found in our sample are
    well fit by a broken power-law model of the form {{dN}}<SUB>{pl</SUB>}/{(d{log}qd{log}s)=A(q/{q}<SUB>{br</SUB>})}<SUP>n</SUP>{s}<SUP>m</SUP>
    {{dex}}<SUP>-2</SUP> for q &gt; q <SUB>br</SUB> and {{dN}}<SUB>{pl</SUB>}/{(d{log}qd{log}s)=A(q/{q}<SUB>{br</SUB>})}<SUP>p</SUP>{s}<SUP>m</SUP>
    {{dex}}<SUP>-2</SUP> for q &lt; q <SUB>br</SUB>, where q <SUB>br</SUB> is the mass ratio of the break. We also combine
    this analysis with the previous analyses of Gould et al. and Cassan et al., bringing the total sample to 30 planets. This
    combined analysis yields A={0.61}<SUB>-0.16</SUB><SUP>+0.21</SUP>, n = -0.93 ± 0.13, m={0.49}<SUB>-0.49</SUB><SUP>+0.47</SUP>,
    and p={0.6}<SUB>-0.4</SUB><SUP>+0.5</SUP> for q <SUB>br</SUB> ≡ 1.7 × 10<SUP>-4</SUP>. The unbroken power-law model is
    disfavored with a p-value of 0.0022, which corresponds to a Bayes factor of 27 favoring the broken power-law model. These
    results imply that cold Neptunes are likely to be the most common type of planets beyond the snow line.
  source: citation_of=2019PNAS..116.9723Z
