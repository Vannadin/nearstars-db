  abstract: Prior geophysical surveys provided evidence for a hypersaline subglacial lake complex beneath the center of Devon
    Ice Cap, Canadian Arctic; however, the full extent and characteristics of the hydrological system remained unknown due
    to limited data coverage. Here, we present results from a new, targeted aerogeophysical survey that provides evidence
    (i) supporting the existence of a subglacial lake complex and (ii) for a network of shallow brine/saturated sediments
    covering <inline-formula><mml:math><mml:mrow><mml:mo>∼</mml:mo><mml:mn>170</mml:mn></mml:mrow></mml:math></inline-formula>
    <inline-formula><mml:math><mml:mrow><mml:msup><mml:mi>km</mml:mi><mml:mn>2</mml:mn></mml:msup></mml:mrow></mml:math></inline-formula>.
    Newly resolved lake shorelines indicate three closely spaced lakes covering a total area of 24.6 <inline-formula><mml:math><mml:mrow><mml:msup><mml:mi>km</mml:mi><mml:mn>2</mml:mn></mml:msup></mml:mrow></mml:math></inline-formula>.
    These results indicate the presence of a diverse hypersaline subglacial hydrological environment with the potential to
    support a range of microbial habitats, provide important constraints for future investigations of this compelling scientific
    target, and highlight its relevance as a terrestrial analog for aqueous systems on other icy worlds.
