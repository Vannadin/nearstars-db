  arxiv_id: '2309.15377'
  ads_bibcode: 2023AJ....166..190T
  title: The Most Sensitive SETI Observations Toward Barnard's Star with FAST
  authors:
  - Tao, Zhen-Zhao
  - Huang, Bo-Lun
  - Luan, Xiao-Hang
  - Li, Jian-Kang
