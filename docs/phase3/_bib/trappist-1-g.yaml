- &id547
  arxiv_id: '1503.07494'
  ads_bibcode: 2015A&A...577A..28J
  title: Stellar winds on the main-sequence. II. The evolution of rotation and winds
  authors:
  - Johnstone, C. P.
  - Güdel, M.
  - Brott, I.
  - Lüftinger, T.
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1051/0004-6361/201425301
  abstract: '<BR /> Aims: We study the evolution of stellar rotation and wind properties for low-mass main-sequence stars.
    Our aim is to use rotational evolution models to constrain the mass loss rates in stellar winds and to predict how their
    properties evolve with time on the main-sequence. <BR /> Methods: We construct a rotational evolution model that is driven
    by observed rotational distributions of young stellar clusters. Fitting the free parameters in our model allows us to
    predict how wind mass loss rate depends on stellar mass, radius, and rotation. We couple the results to the wind model
    developed in Paper I of this series to predict how wind properties evolve on the main-sequence. <BR /> Results: We estimate
    that wind mass loss rate scales with stellar parameters as Ṁ<SUB>⋆</SUB> ∝ R<SUB>⋆</SUB><SUP>2</SUP> Ω<SUB>⋆</SUB><SUP>1.33</SUP>
    M<SUB>⋆</SUB><SUP>-3.36</SUP>. We estimate that at young ages, the solar wind likely had a mass loss rate that is an order
    of magnitude higher than that of the current solar wind. This leads to the wind having a higher density at younger ages;
    however, the magnitude of this change depends strongly on how we scale wind temperature. Due to the spread in rotation
    rates, young stars show a large range of wind properties at a given age. This spread in wind properties disappears as
    the stars age. <BR /> Conclusions: There is a large uncertainty in our knowledge of the evolution of stellar winds on
    the main-sequence, due both to our lack of knowledge of stellar winds and the large spread in rotation rates at young
    ages. Given the sensitivity of planetary atmospheres to stellar wind and radiation conditions, these uncertainties can
    be significant for our understanding of the evolution of planetary environments.'
