  ads_bibcode: 2015ApJ...812...42B
  title: 'Starspot Distributions on Fully Convective M Dwarfs: Implications for Radial Velocity Planet Searches'
  authors:
  - Barnes, J. R.
  - Jeffers, S. V.
  - Jones, H. R. A.
