    formatted data will be needed for ease of use. What''s Changed Towards v3: by @DavoGrant in https://github.com/Exo-TiC/ExoTiC-LD/pull/30
    added in two new stellar model grids from Kostogryz (2022), add in the user ability to upload a custom stellar model implemented
    tri-linear interpolation, added in the computation for the sqrt law, computation of uncertainties on returned limb-darkening
    coefficients allow for custom mu value range expanded the testing of the code and new tutorials Re formatted all the model
    grids to match the same architecture for readability and ease of expansion Set default stellar models to mps1 by @DavoGrant
    in https://github.com/Exo-TiC/ExoTiC-LD/pull/32 Full testing completed by @hrwakeford and is fully back compatible with
    old V2.1.0 keywords Full Changelog: https://github.com/Exo-TiC/ExoTiC-LD/compare/v2.1.0...v3.0.0'
