  doi: 10.3847/0004-6256/152/1/24
  abstract: 'We report trigonometric parallaxes for 134 low-mass stars and brown dwarfs, of which 38 have no previously published
    measurement and 79 more have improved uncertainties. Our survey focused on nearby targets, so 119 are closer than 30 pc.
    Of the 38 stars with new parallaxes, 14 are within 20 pc and seven are likely brown dwarfs (spectral types later than
    L0). These parallaxes are useful for studies of kinematics, multiplicity, and spectrophotometric calibration. Two objects
    with new parallaxes are confirmed as young stars with membership in nearby young moving groups: LP 870-65 in AB Doradus
    and G 161-71 in Argus. We also report the first parallax for the planet-hosting star GJ 3470; this allows us to refine
    the density of its Neptune-mass planet. T-dwarf 2MASS J12590470-4336243, previously thought to lie within 4 pc, is found
    to be at 7.8 pc, and the M-type star 2MASS J01392170-3936088 joins the ranks of nearby stars as it is found to be within
    10 pc. Five stars that are overluminous and/or too red for their spectral types are identified and deserve further study
    as possible young stars.'
