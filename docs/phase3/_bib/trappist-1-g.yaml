  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1029/2019JE006175
  abstract: 'The Sample Analysis at Mars (SAM) instrument onboard the Mars Science Laboratory Curiosity rover measures the
    chemical composition of major atmospheric species (CO<SUB>2</SUB>, N<SUB>2</SUB>, <SUP>40</SUP>Ar, O<SUB>2</SUB>, and
    CO) through a dedicated atmospheric inlet. We report here measurements of volume mixing ratios in Gale Crater using the
    SAM quadrupole mass spectrometer, obtained over a period of nearly 5 years (3 Mars years) from landing. The observation
    period spans the northern summer of MY 31 and solar longitude (L<SUB>S</SUB>) of 175° through spring of MY 34, L<SUB>S</SUB>
    = 12°. This work expands upon prior reports of the mixing ratios measured by SAM QMS in the first 105 sols of the mission.
    The SAM QMS atmospheric measurements were taken periodically, with a cumulative coverage of four or five experiments per
    season on Mars. Major observations include the seasonal cycle of CO<SUB>2</SUB>, N<SUB>2</SUB>, and Ar, which lags approximately
    20-40° of L<SUB>S</SUB> behind the pressure cycle driven by CO<SUB>2</SUB> condensation and sublimation from the winter
    poles. This seasonal cycle indicates that transport occurs on faster timescales than mixing. The mixing ratio of O<SUB>2</SUB>
    shows significant seasonal and interannual variability, suggesting an unknown atmospheric or surface process at work.
    The O<SUB>2</SUB> measurements are compared to several parameters, including dust optical depth and trace CH<SUB>4</SUB>
    measurements by Curiosity. We derive annual mean volume mixing ratios for the atmosphere in Gale Crater: CO<SUB>2</SUB>
    = 0.951 (±0.003), N<SUB>2</SUB> = 0.0259 (±0.0006), <SUP>40</SUP>Ar = 0.0194 (±0.0004), O<SUB>2</SUB> = 1.61 (±0.09) x
    10<SUP>-3</SUP>, and CO = 5.8 (±0.8) x 10<SUP>-4</SUP>.'
