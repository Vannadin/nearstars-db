  doi: 10.1051/0004-6361:200810669
  abstract: We report on the detection of two new multiple planet systems orbiting solar-like stars HD 47 186 and HD 181 433.
    The first system contains a hot Neptune of 22.78 M<SUB>⊕</SUB> with a 4.08-day period and a Saturn of 0.35 M_JUP with
