  arxiv_id: '1503.04107'
  ads_bibcode: 2015A&A...577A..42B
  title: New evolutionary models for pre-main sequence and main sequence low-mass stars down to the hydrogen-burning limit
  authors:
  - Baraffe, Isabelle
  - Homeier, Derek
  - Allard, France
  - Chabrier, Gilles
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1051/0004-6361/201425481
  abstract: We present new models for low-mass stars down to the hydrogen-burning limit that consistently couple atmosphere
    and interior structures, thereby superseding the widely used BCAH98 models. The new models include updated molecular linelists
    and solar abundances, as well as atmospheric convection parameters calibrated on 2D/3D radiative hydrodynamics simulations.
    Comparison of these models with observations in various colour-magnitude diagrams for various ages shows significant improvement
    over previous generations of models. The new models can solve flaws that are present in the previous ones, such as the
    prediction of optical colours that are too blue compared to M dwarf observations. They can also reproduce the four components
    of the young quadruple system LkCa 3 in a colour-magnitude diagram with one single isochrone, in contrast to any presently
    existing model. In this paper we also highlight the need for consistency when comparing models and observations, with
    the necessity of using evolutionary models and colours based on the same atmospheric structures.
