  arxiv_id: '1906.04253'
  ads_bibcode: 2019PNAS..116.9723Z
  title: Growth model interpretation of planet size distribution
  authors:
  - Zeng, Li
  - Jacobsen, Stein B.
  - Sasselov, Dimitar D.
  - Petaev, Michail I.
  - Vanderburg, Andrew
  - Lopez-Morales, Mercedes
  - Perez-Mercader, Juan
