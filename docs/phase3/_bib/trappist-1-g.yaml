  ads_bibcode: 2020PASJ...72...93H
  title: Precision radial velocity measurements by the forward-modeling technique in the near-infrared
  authors:
  - Hirano, Teruyuki
  - Kuzuhara, Masayuki
  - Kotani, Takayuki
  - Omiya, Masashi
  - Kudo, Tomoyuki
  - Harakawa, Hiroki
  - Vievard, Sébastien
  - Kurokawa, Takashi
  - Nishikawa, Jun
  - Tamura, Motohide
  - Hodapp, Klaus
  - Ishizuka, Masato
  - Jacobson, Shane
