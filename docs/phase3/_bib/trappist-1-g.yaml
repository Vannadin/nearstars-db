- &id185
  arxiv_id: '1812.06606'
  ads_bibcode: 2019ApJ...884...75D
  title: Albedos, Equilibrium Temperatures, and Surface Temperatures of Habitable Planets
  authors:
  - Del Genio, Anthony D.
  - Kiang, Nancy Y.
  - Way, Michael J.
  - Amundsen, David S.
  - Sohl, Linda E.
  - Fujii, Yuka
  - Chandler, Mark
  - Aleinov, Igor
  - Colose, Christopher M.
  - Guzewich, Scott D.
  - Kelley, Maxwell
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.3847/1538-4357/ab3be8
  abstract: The potential habitability of known exoplanets is often categorized by a nominal equilibrium temperature assuming
    a Bond albedo of either ∼0.3, similar to Earth, or 0. As an indicator of habitability, this leaves much to be desired,
    because albedos of other planets can be very different, and because surface temperature exceeds equilibrium temperature
    due to the atmospheric greenhouse effect. We use an ensemble of general circulation model simulations to show that for
    a range of habitable planets, much of the variability of Bond albedo, equilibrium temperature and even surface temperature
    can be predicted with useful accuracy from incident stellar flux and stellar temperature, two known parameters for every
    confirmed exoplanet. Earth’s Bond albedo is near the minimum possible for habitable planets orbiting G stars, because
    of increasing contributions from clouds and sea ice/snow at higher and lower instellations, respectively. For habitable
    M star planets, Bond albedo is usually lower than Earth’s because of near-IR H<SUB>2</SUB>O absorption, except at high
    instellation where clouds are important. We apply relationships derived from this behavior to several known exoplanets
    to derive zeroth-order estimates of their potential habitability. More expansive multivariate statistical models that
    include currently non-observable parameters show that greenhouse gas variations produce significant variance in albedo
    and surface temperature, while increasing length of day and land fraction decrease surface temperature; insights for other
    parameters are limited by our sampling. We discuss how emerging information from global climate models might resolve some
    degeneracies and help focus scarce observing resources on the most promising planets.
