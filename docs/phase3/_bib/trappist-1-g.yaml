  arxiv_id: '1805.01453'
  ads_bibcode: 2018AJ....156..264F
  title: The California-Kepler Survey. VII. Precise Planet Radii Leveraging Gaia DR2 Reveal the Stellar Mass Dependence of
    the Planet Radius Gap
  authors:
