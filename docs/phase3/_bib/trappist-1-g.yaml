  arxiv_id: '2003.09353'
  ads_bibcode: 2020ApJ...893..125U
  title: 'Scattering-induced Intensity Reduction: Large Mass Content with Small Grains in the Inner Region of the TW Hya disk'
  authors:
  - Ueda, Takahiro
  - Kataoka, Akimasa
  - Tsukagoshi, Takashi
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-4357/ab8223
  abstract: Dust continuum observation is one of the best methods to constrain the properties of protoplanetary disks. Recent
    theoretical studies have suggested that dust scattering at the millimeter wavelength potentially reduces the observed
    intensity, which results in an underestimate in the dust mass. We investigate whether dust scattering indeed reduces the
    observed continuum intensity by comparing the ALMA archival data of the TW Hya disk at Bands 3, 4, 6, 7, and 9 to models
    obtained by radiative transfer simulations. We find that the model with scattering by 300 μm-sized grains well reproduces
    the observed spectral energy distribution of the central part of the TW Hya disk while the model without scattering is
    also consistent within the errors of the absolute fluxes. To explain the intensity at Band 3, the dust surface density
    needs to be ∼10 g cm<SUP>-2</SUP> at 10 au in the model with scattering, which is 26 times more massive than previously
    predicted. The model without scattering needs a 2.3 times higher dust mass than the model with scattering because it needs
    a lower temperature. At Band 7, scattering reduces the intensity by ∼35%, which makes the disk look optically thin even
    though it is optically thick. Our study suggests the TW Hya disk is still capable of forming cores of giant planets at
    locations analogous to where the current solar system planets exist.
