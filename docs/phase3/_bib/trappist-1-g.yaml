  ads_bibcode: 2014Anthr...5...32F
  title: 'Sustainability and the astrobiological perspective: Framing human futures in a planetary context'
  authors:
  - Frank, Adam
  - Sullivan, Woodruff
  year: '2014'
  pubdate: '2014-03-00'
  doi: 10.1016/j.ancene.2014.08.002
  abstract: 'We explore how questions related to developing a sustainable human civilization can be cast in terms of astrobiology.
    In particular we show how ongoing astrobiological studies of the coupled relationship between life, planets and their
    co-evolution can inform new perspectives and direct new studies in sustainability science. Using the Drake Equation as
    a vehicle to explore the gamut of astrobiology, we focus on its most import factor for sustainability: the mean lifetime
    Lbar of an ensemble of Species with Energy-Intensive Technology (SWEIT). We cast the problem into the language of dynamical
    system theory and introduce the concept of a trajectory bundle for SWEIT evolution. We then discuss how astrobiological
    results usefully inform the creation of dynamical equations, their constraints and initial conditions. Three specific
    examples of how astrobiological considerations can be folded into discussions of sustainability are discussed: (1) concepts
    of planetary habitability, (2) mass extinctions and their possible relation to the current, so-called Anthropocene epoch,
    and (3) today''s changes in atmospheric chemistry (and the climate change it entails) in the context of pervious epochs
    of biosphere-driven atmospheric and climate alteration (i.e. the Great Oxidation Event).'
