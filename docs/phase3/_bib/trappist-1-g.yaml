- &id1307
  arxiv_id: '2506.12956'
  ads_bibcode: 2024ESC.....8.2652G
  title: Heating, Excitation, Dissociation, and Ionization of Molecules by High-Energy Photons in Planetary Atmospheres
  authors:
  - García Muñoz, Antonio
  - Bataille, Ewan
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.1021/acsearthspacechem.4c00273
  abstract: Photoionization by high-energy photons creates nonthermal electrons with a broad range of energies that heat and
    chemically transform the atmospheres of planets. The specifics of the interactions are notably different when the gas
    is atomic or molecular. Motivated by the idea that molecules survive to high altitudes in some exoplanets, we built a
    model for the energy transfer from nonthermal electrons to the H2O, H2, and O2 molecules. Our calculations show that the
    primary electrons of energy above about a hundred eV, a likely outcome from X-ray photoionization at moderately high atmospheric
    densities, expend most of their energy in ionization, dissociation, and electronic excitation collisions. In contrast,
    the primary electrons of less than about ten eV, such as those produced by extreme-ultraviolet photons at low densities,
    expend most of their energy in momentum transfer (heating), rotational, and vibrational excitation collisions. The partitioning
    between channels with weak thresholds is particularly sensitive to local fractional ionization. The transition between
    these two situations introduces a parallel transition in the way that the stellar energy is deposited in the atmosphere.
    Our calculations show that the nonthermal electrons enhance the ionization rate by a factor of a few or more with respect
    to photoionization alone but may not greatly contribute to the direct dissociation of molecules unless the local flux
    of far-ultraviolet photons is relatively weak. These findings highlight the importance of tracking the energy from the
    incident photons to the nonthermal electrons and onto the gas for problems concerned with the remote sensing and energy
    balance of exoplanet atmospheres.
  source: citation_of=2025ApJ...992..198J
