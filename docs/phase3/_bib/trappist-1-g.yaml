  arxiv_id: '1401.4852'
  ads_bibcode: 2014MNRAS.440.1649Y
  title: ExoMol line lists - IV. The rotation-vibration spectrum of methane up to 1500 K
  authors:
  - Yurchenko, Sergei N.
  - Tennyson, Jonathan
  year: '2014'
  pubdate: '2014-05-00'
  doi: 10.1093/mnras/stu326
  abstract: A new hot line list is calculated for <SUP>12</SUP>CH<SUB>4</SUB> in its ground electronic state. This line list,
    called 10to10, contains 9.8 billion transitions and should be complete for temperatures up to 1500 K. It covers the wavelengths
    longer than 1 μm and includes all transitions to upper states with energies below hc · 18 000 cm<SUP>-1</SUP> and rotational
    excitation up to J = 39. The line list is computed using the eigenvalues and eigenfunctions of CH<SUB>4</SUB> obtained
    by variational solution of the Schrödinger equation for the rotation-vibration motion of nuclei employing program TROVE
    and a new `spectroscopic' potential energy surface (PES) obtained by refining an ab initio PES (CCSD(T)-F12c/aug-cc-pVQZ)
    through least-squares fitting to the experimentally derived energies with J = 0-4 and a previously reported ab initio
    dipole moment surface (CCSD(T)-F12c/aug-cc-pVTZ). Detailed comparisons with other available sources of methane transitions
    including HITRAN, experimental compilations and other theoretical line lists show that these sources lack transitions
    both higher temperatures and near-infrared wavelengths. The 10to10 line list is suitable for modelling atmospheres of
