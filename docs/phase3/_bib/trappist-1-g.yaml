  ads_bibcode: 2015SoPh..290.3625S
  title: Soft X-Ray Pulsations in Solar Flares
  authors:
  - Simões, P. J. A.
  - Hudson, H. S.
  - Fletcher, L.
  year: '2015'
  pubdate: '2015-12-00'
  doi: 10.1007/s11207-015-0691-2
  abstract: The soft X-ray emissions (hν&gt;1.5 keV) of solar flares mainly come from the bright coronal loops at the highest
    temperatures normally achieved in the flare process. Their ubiquity has led to their use as a standard measure of flare
    occurrence and energy, although the overwhelming bulk of the total flare energy goes elsewhere. Recently Dolla et al.
    (Astrophys. J. Lett.749, L16, 2012) noted quasi-periodic pulsations (QPP) in the soft X-ray signature of the X-class flare
    SOL2011-02-15, as observed by the standard photometric data from the GOES (Geostationary Operational Environmental Satellite)
    spacecraft. In this article we analyse the suitability of the GOES data for this type of analysis and find them to be
    generally valuable after September, 2010 (GOES-15). We then extend the result of Dolla et al. to a complete list of X-class
    flares from Cycle 24 and show that most of them (80 %) display QPPs in the impulsive phase. The pulsations show up cleanly
    in both channels of the GOES data, making use of time-series of irradiance differences (the digital time derivative on
    the 2-s sampling). We deploy different techniques to characterise the periodicity of GOES pulsations, considering the
    red-noise properties of the flare signals, finding a range of characteristic time scales of the QPPs for each event, but
    usually with no strong signature of a single period dominating in the power spectrum. The QPP may also appear on somewhat
    longer time scales during the later gradual phase, possibly with a greater tendency towards coherence, but the sampling
    noise in GOES difference data for high irradiance values (X-class flares) makes these more uncertain. We show that there
    is minimal phase difference between the differenced GOES energy channels, or between them and the hard X-ray variations
    on short time scales. During the impulsive phase, the footpoints of the newly forming flare loops may also contribute
    to the observed soft X-ray variations.
