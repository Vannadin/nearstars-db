  abstract: 'We report the detection of a transiting Earth-size planet around GJ 357, a nearby M2.5 V star, using data from
    the Transiting Exoplanet Survey Satellite (TESS). GJ 357 b (TOI-562.01) is a transiting, hot, Earth-sized planet (T<SUB>eq</SUB>
    = 525 ± 11 K) with a radius of R<SUB>b</SUB> = 1.217 ± 0.084 R<SUB>⊕</SUB> and an orbital period of P<SUB>b</SUB> = 3.93
    d. Precise stellar radial velocities from CARMENES and PFS, as well as archival data from HIRES, UVES, and HARPS also
    display a 3.93-day periodicity, confirming the planetary nature and leading to a planetary mass of M<SUB>b</SUB> = 1.84
    ± 0.31 M<SUB>⊕</SUB>. In addition to the radial velocity signal for GJ 357 b, more periodicities are present in the data
    indicating the presence of two further planets in the system: GJ 357 c, with a minimum mass of M<SUB>c</SUB> = 3.40 ±
