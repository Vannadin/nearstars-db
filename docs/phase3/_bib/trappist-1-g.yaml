- &id1156
  arxiv_id: '1302.1647'
  ads_bibcode: 2013ApJ...767...95D
  title: The Occurrence Rate of Small Planets around Small Stars
  authors:
  - Dressing, Courtney D.
  - Charbonneau, David
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1088/0004-637X/767/1/95
  abstract: We use the optical and near-infrared photometry from the Kepler Input Catalog to provide improved estimates of
    the stellar characteristics of the smallest stars in the Kepler target list. We find 3897 dwarfs with temperatures below
    4000 K, including 64 planet candidate host stars orbited by 95 transiting planet candidates. We refit the transit events
    in the Kepler light curves for these planet candidates and combine the revised planet/star radius ratios with our improved
    stellar radii to revise the radii of the planet candidates orbiting the cool target stars. We then compare the number
    of observed planet candidates to the number of stars around which such planets could have been detected in order to estimate
    the planet occurrence rate around cool stars. We find that the occurrence rate of 0.5-4 R <SUB>⊕</SUB> planets with orbital
    periods shorter than 50 days is 0.90^{+0.04}_{-0.03} planets per star. The occurrence rate of Earth-size (0.5-1.4 R <SUB>⊕</SUB>)
    planets is constant across the temperature range of our sample at 0.51_{-0.05}^{+0.06} Earth-size planets per star, but
    the occurrence of 1.4-4 R <SUB>⊕</SUB> planets decreases significantly at cooler temperatures. Our sample includes two
    Earth-size planet candidates in the habitable zone, allowing us to estimate that the mean number of Earth-size planets
    in the habitable zone is 0.15^{+0.13}_{-0.06} planets per cool star. Our 95% confidence lower limit on the occurrence
    rate of Earth-size planets in the habitable zones of cool stars is 0.04 planets per star. With 95% confidence, the nearest
    transiting Earth-size planet in the habitable zone of a cool star is within 21 pc. Moreover, the nearest non-transiting
    planet in the habitable zone is within 5 pc with 95% confidence.
