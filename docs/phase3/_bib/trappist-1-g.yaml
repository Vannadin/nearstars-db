  arxiv_id: '2310.10711'
  ads_bibcode: 2023ApJ...959L...9M
  title: 'Double Trouble: Two Transits of the Super-Earth GJ 1132 b Observed with JWST NIRSpec G395H'
  authors:
  - May, E. M.
  - MacDonald, Ryan J.
  - Bennett, Katherine A.
  - Moran, Sarah E.
  - Wakeford, Hannah R.
  - Peacock, Sarah
  - Lustig-Yaeger, Jacob
  - Highland, Alicia N.
  - Stevenson, Kevin B.
