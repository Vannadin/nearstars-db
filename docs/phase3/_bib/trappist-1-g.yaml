  arxiv_id: '1009.5671'
  ads_bibcode: 2010ApJ...723L.223W
  title: The Oblique Orbit of the Super-Neptune HAT-P-11b
  authors:
  - Winn, Joshua N.
  - Johnson, John Asher
  - Howard, Andrew W.
  - Marcy, Geoffrey W.
  - Isaacson, Howard
  - Shporer, Avi
  - Bakos, Gáspár Á.
  - Hartman, Joel D.
  - Albrecht, Simon
  year: '2010'
  pubdate: '2010-11-00'
  doi: 10.1088/2041-8205/723/2/L223
  abstract: 'We find the orbit of the Neptune-sized exoplanet HAT-P-11b to be highly inclined relative to the equatorial plane
    of its host star. This conclusion is based on spectroscopic observations of two transits, which allowed the Rossiter-McLaughlin
    effect to be detected with an amplitude of 1.5 m s<SUP>-1</SUP>. The sky-projected obliquity is 103<SUP>+26</SUP> <SUB>-10</SUB>
    deg. This is the smallest exoplanet for which spin-orbit alignment has been measured. The result favors a migration scenario
    involving few-body interactions followed by tidal dissipation. This finding also conforms with the pattern that the systems
    with the weakest tidal interactions have the widest spread in obliquities. We predict that the high obliquity of HAT-P-11
    will be manifest in transit light curves from the Kepler spacecraft: starspot-crossing anomalies will recur at most once
    per stellar rotation period, rather than once per orbital period as they would for a well-aligned system.'
