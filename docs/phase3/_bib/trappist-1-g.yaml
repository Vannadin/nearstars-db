  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.1038/s41550-018-0397-0
  abstract: Numerous Solar System atmospheres possess photochemically generated hazes, including the characteristic organic
    hazes of Titan and Pluto. Haze particles substantially impact atmospheric temperature structures and may provide organic
    material to the surface of a world, potentially affecting its habitability. Observations of exoplanet atmospheres suggest
    the presence of aerosols, especially in cooler (&lt;800 K), smaller (&lt;0.3× Jupiter's mass) exoplanets. It remains unclear
    whether the aerosols muting the spectroscopic features of exoplanet atmospheres are condensate clouds or photochemical
    hazes<SUP>1-3</SUP>, which is difficult to predict from theory alone<SUP>4</SUP>. Here, we present laboratory haze simulation
    experiments that probe a broad range of atmospheric parameters relevant to super-Earth- and mini-Neptune-type planets<SUP>5</SUP>,
    the most frequently occurring type of planet in our galaxy<SUP>6</SUP>. It is expected that photochemical haze will play
    a much greater role in the atmospheres of planets with average temperatures below 1,000 K (ref. <SUP>7</SUP>), especially
    those planets that may have enhanced atmospheric metallicity and/or enhanced C/O ratios, such as super-Earths and Neptune-mass
    planets<SUP>8-12</SUP>. We explored temperatures from 300 to 600 K and a range of atmospheric metallicities (100×, 1,000×
    and 10,000× solar). All simulated atmospheres produced particles, and the cooler (300 and 400 K) 1,000× solar metallicity
    (`H<SUB>2</SUB>O-dominated' and CH<SUB>4</SUB>-rich) experiments exhibited haze production rates higher than our standard
    Titan simulation ( 10 mg h<SUP>-1</SUP> versus 7.4 mg h<SUP>-1</SUP> for Titan<SUP>13</SUP>). However, the particle production
    rates varied greatly, with measured rates as low as 0.04 mg h<SUP>-1</SUP> (for the case with 100× solar metallicity at
    600 K). Here, we show that we should expect great diversity in haze production rates, as some—but not all—super-Earth
    and mini-Neptune atmospheres will possess photochemically generated haze.
