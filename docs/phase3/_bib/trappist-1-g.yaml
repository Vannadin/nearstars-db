  arxiv_id: '0909.2702'
  ads_bibcode: 2009A&A...507.1649L
  title: 'Tohoku-Hiroshima-Nagoya planetary spectra library: a method for characterizing planets in the visible to near infrared'
  authors:
  - Lundock, R.
