  - Basu, Sarbani
  - Handberg, Rasmus
  - Hekker, Saskia
  - Howard, Andrew W.
  - Isaacson, Howard
  - Karoff, Christoffer
  - Latham, David W.
  - Lund, Mikkel N.
  - Lundkvist, Mia
  - Marcy, Geoffrey W.
  - Miglio, Andrea
  - Silva Aguirre, Victor
  - Stello, Dennis
  - Arentoft, Torben
  - Barclay, Thomas
  - Bedding, Timothy R.
  - Burke, Christopher J.
  - Christiansen, Jessie L.
  - Elsworth, Yvonne P.
  - Haas, Michael R.
  - Kawaler, Steven D.
  - Metcalfe, Travis S.
  - Mullally, Fergal
