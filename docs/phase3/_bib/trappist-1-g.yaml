- &id767
  arxiv_id: '2108.04745'
  ads_bibcode: 2021ApJ...921L...8H
  title: Unveiling Shrouded Oceans on Temperate sub-Neptunes via Transit Signatures of Solubility Equilibria versus Gas Thermochemistry
  authors:
  - Hu, Renyu
  - Damiano, Mario
  - Scheucher, Markus
  - Kite, Edwin
  - Seager, Sara
  - Rauer, Heike
  year: '2021'
  pubdate: '2021-11-00'
  doi: 10.3847/2041-8213/ac1f92
  abstract: The recent discovery and initial characterization of sub-Neptune-sized exoplanets that receive stellar irradiance
    of approximately Earth's raised the prospect of finding habitable planets in the coming decade, because some of these
    temperate planets may support liquid-water oceans if they do not have massive H<SUB>2</SUB>/He envelopes and are thus
    not too hot at the bottom of the envelopes. For planets larger than Earth, and especially planets in the 1.7-3.5 R<SUB>⊕</SUB>
    population, the mass of the H<SUB>2</SUB>/He envelope is typically not sufficiently constrained to assess the potential
    habitability. Here we show that the solubility equilibria versus thermochemistry of carbon and nitrogen gases typically
    results in observable discriminators between small H<SUB>2</SUB> atmospheres versus massive ones, because the condition
    to form a liquid-water ocean and that to achieve the thermochemical equilibrium are mutually exclusive. The dominant carbon
    and nitrogen gases are typically CH<SUB>4</SUB> and NH<SUB>3</SUB> due to thermochemical recycling in a massive atmosphere
    of a temperate planet, and those in a small atmosphere overlying a liquid-water ocean are most likely CO<SUB>2</SUB> and
    N<SUB>2</SUB>, followed by CO and CH<SUB>4</SUB> produced photochemically. NH<SUB>3</SUB> is depleted in the small atmosphere
    by dissolution into the liquid-water ocean. These gases lead to distinctive features in the planet's transmission spectrum,
    and a moderate number of transit observations with the James Webb Space Telescope should tell apart a small atmosphere
    versus a massive one on planets like K2-18 b. This framework thus points to a way to use near-term facilities to constrain
    the atmospheric mass and habitability of temperate sub-Neptune exoplanets.
