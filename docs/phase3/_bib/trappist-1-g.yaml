  ads_bibcode: 2014JAnEc..83....7H
  title: Metabolic ecology
  authors:
  - Humphries, Murray M.
  - McCann, Kevin S.
  - Coulson, Tim
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1111/1365-2656.12124
  abstract: Summary Ecological theory that is grounded in metabolic currencies and constraints offers the potential to link
    ecological outcomes to biophysical processes across multiple scales of organization. The metabolic theory of ecology (MTE)
    has emphasized the potential for metabolism to serve as a unified theory of ecology, while focusing primarily on the size
    and temperature dependence of whole-organism metabolic rates. Generalizing metabolic ecology requires extending beyond
    prediction and application of standardized metabolic rates to theory focused on how energy moves through ecological systems.
    A bibliometric and network analysis of recent metabolic ecology literature reveals a research network characterized by
    major clusters focused on MTE, foraging theory, bioenergetics, trophic status, and generalized patterns and predictions.
    This generalized research network, which we refer to as metabolic ecology, can be considered to include the scaling, temperature
    and stoichiometric models forming the core of MTE, as well as bioenergetic equations, foraging theory, life-history allocation
    models, consumer─resource equations, food web theory and energy-based macroecology models that are frequently employed
    in ecological literature. We conclude with six points we believe to be important to the advancement and integration of
    metabolic ecology, including nomination of a second fundamental equation, complementary to the first fundamental equation
    offered by the MTE.
