  abstract: We present the discovery of a superjovian planet around the young A5 star HIP 54515, detected using precision
    astrometry from the Hipparcos Gaia Catalogue of Accelerations and high-contrast imaging with SCExAO/CHARIS from the recently
    commenced OASIS program. SCExAO/CHARIS detects HIP 54515 b in five epochs 0<inline-formula> <mml:math><mml:mover><mml:mrow><mml:mi>.</mml:mi></mml:mrow><mml:mrow><mml:mi>″</mml:mi></mml:mrow></mml:mover></mml:math>
