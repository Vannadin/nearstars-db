  ads_bibcode: 2009MNRAS.396.1012D
  title: Evidence for a lost population of close-in exoplanets
  authors:
  - Davis, Timothy A.
  - Wheatley, Peter J.
  year: '2009'
  pubdate: '2009-06-00'
  doi: 10.1111/j.1365-2966.2009.14763.x
  abstract: We investigate the evaporation history of known transiting exoplanets in order to consider the origin of observed
    correlations between mass, surface gravity and orbital period. We show that the survival of the known planets at their
    current separations is consistent with a simple model of evaporation, but that many of the same planets would not have
    survived closer to their host stars. These putative closer-in systems represent a lost population that could account for
    the observed correlations. We conclude that the relation underlying the correlations noted by Mazeh et al. and Southworth
    et al. is most likely a linear cut-off in the M<SUP>2</SUP>/R<SUP>3</SUP> versus a<SUP>-2</SUP> plane, and we show that
    the distribution of exoplanets in this plane is in close agreement with the evaporation model.
