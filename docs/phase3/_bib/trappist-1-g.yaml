  abstract: With sizable volatile envelopes but smaller radii than the solar system ice giants, sub-Neptunes have been revealed
    as one of the most common types of planet in the galaxy. While the spectroscopic characterization of larger sub-Neptunes
    (2.5─4 R <SUB>⊕</SUB>) has revealed hydrogen-dominated atmospheres, smaller sub-Neptunes (1.6─2.5 R <SUB>⊕</SUB>) could
    either host thin, rapidly evaporating, hydrogen-rich atmospheres or be stable, metal-rich "water worlds" with high mean
    molecular weight atmospheres and a fundamentally different formation and evolutionary history. Here, we present the 0.6─2.8
    μm JWST/NIRISS/SOSS transmission spectrum of GJ 9827 d, the smallest (1.98 R <SUB>⊕</SUB>) warm (T <SUB>eq,A=0.3</SUB>
    ∼ 620 K) sub-Neptune where atmospheric absorbers have been detected to date. Our two transit observations with NIRISS/SOSS,
    combined with the existing HST/WFC3 spectrum, enable us to break the clouds─metallicity degeneracy. We detect water in
    a highly metal-enriched "steam world" atmosphere (O/H of ∼4 by mass and H<SUB>2</SUB>O found to be the background gas
    with a volume mixing ratio of &gt;31%). We further show that these results are robust to stellar contamination through
    the transit light source effect. We do not detect escaping metastable He, which, combined with previous nondetections
    of escaping He and H, supports the steam atmosphere scenario. In water-rich atmospheres, hydrogen loss driven by water
    photolysis happens predominantly in the ionized form, which eludes observational constraints. We also detect several flares
    in the NIRISS/SOSS light curves with far-UV energies of the order of 10<SUP>30</SUP> erg, highlighting the active nature
    of the star. Further atmospheric characterization of GJ 9827 d probing carbon or sulfur species could reveal the origin
    of its high metal enrichment.
