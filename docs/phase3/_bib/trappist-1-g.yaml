  arxiv_id: '2304.13659'
  ads_bibcode: 2023ApJ...948L..20H
  title: Narrow Loophole for H<SUB>2</SUB>-Dominated Atmospheres on Habitable Rocky Planets around M Dwarfs
  authors:
  - Hu, Renyu
  - Gaillard, Fabrice
  - Kite, Edwin S.
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.3847/2041-8213/acd0b4
  abstract: Habitable rocky planets around M dwarfs that have H<SUB>2</SUB>-dominated atmospheres, if they exist, would permit
    characterizing habitable exoplanets with detailed spectroscopy using JWST, owing to their extended atmospheres and small
    stars. However, the H<SUB>2</SUB>-dominated atmospheres that are consistent with habitable conditions cannot be too massive,
    and a moderate-sized H<SUB>2</SUB>-dominated atmosphere will lose mass to irradiation-driven atmospheric escape on rocky
    planets around M dwarfs. We evaluate volcanic outgassing and serpentinization as two potential ways to supply H<SUB>2</SUB>
    and form a steady-state H<SUB>2</SUB>-dominated atmosphere. For rocky planets of 1-7 M <SUB>⊕</SUB> and early-, mid-,
    and late M-type dwarfs, the expected volcanic outgassing rates from a reduced mantle fall short of the escape rates by
    &gt; ~ 1 order of magnitude, and a generous upper limit of the serpentinization rate is still less than the escape rate
    by a factor of a few. Special mechanisms that may sustain the steady-state H<SUB>2</SUB>-dominated atmosphere include
    direct interaction between liquid water and mantle, heat-pipe volcanism from a reduced mantle, and hydrodynamic escape
    slowed down by efficient upper-atmospheric cooling. It is thus unlikely to find moderate-size, H<SUB>2</SUB>-dominated
    atmospheres on rocky planets of M dwarfs that would support habitable environments.
