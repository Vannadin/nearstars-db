  arxiv_id: '2512.07695'
  ads_bibcode: 2026AJ....171..105A
  title: 'JWST TRAPPIST-1 e/b Program: Motivation and First Observations'
  authors:
  - Allen, Natalie H.
  - Espinoza, Néstor
  - Boehm, V. A.
  - Cañas, Caleb I.
  - Stevenson, Kevin B.
