  doi: 10.3847/1538-3881/acf9f5
  abstract: The Search for Extraterrestrial Intelligence aims to find evidence of technosignatures, which can point toward
    the possible existence of technologically advanced extraterrestrial life. Radio signals similar to those engineered on
    Earth may be transmitted by other civilizations, motivating technosignature searches across the entire radio spectrum.
    In this endeavor, the low-frequency radio band has remained largely unexplored; with prior radio searches primarily above
    1 GHz. In this survey at 110-190 MHz, observations of 1,631,198 targets from TESS and Gaia are reported. Observations
    took place simultaneously with two international stations (noninterferometric) of the Low Frequency Array in Ireland and
    Sweden. We can reject the presence of any Doppler drifting narrowband transmissions in the barycentric frame of reference,
    with equivalent isotropic radiated power of 10<SUP>17</SUP> W, for 0.4 million (or 1.3 million) stellar systems at 110
    (or 190) MHz. This work demonstrates the effectiveness of using multisite simultaneous observations for rejecting anthropogenic
    signals in the search for technosignatures.
