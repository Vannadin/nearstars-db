  arxiv_id: '1702.07901'
  ads_bibcode: 2017A&A...599A..49K
  title: Revisiting the pre-main-sequence evolution of stars. I. Importance of accretion efficiency and deuterium abundance
  authors:
  - Kunitomo, Masanobu
  - Guillot, Tristan
  - Takeuchi, Taku
  - Ida, Shigeru
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1051/0004-6361/201628260
  abstract: 'Context. Protostars grow from the first formation of a small seed and subsequent accretion of material. Recent
    theoretical work has shown that the pre-main-sequence (PMS) evolution of stars is much more complex than previously envisioned.
    Instead of the traditional steady, one-dimensional solution, accretion may be episodic and not necessarily symmetrical,
    thereby affecting the energy deposited inside the star and its interior structure. <BR /> Aims: Given this new framework,
    we want to understand what controls the evolution of accreting stars. <BR /> Methods: We use the MESA stellar evolution
    code with various sets of conditions. In particular, we account for the (unknown) efficiency of accretion in burying gravitational
    energy into the protostar through a parameter, ξ, and we vary the amount of deuterium present. <BR /> Results: We confirm
    the findings of previous works that, in terms of evolutionary tracks on an Hertzprung-Russell (H-R) diagram, the evolution
    changes significantly with the amount of energy that is lost during accretion. We find that deuterium burning also regulates
    the PMS evolution. In the low-entropy accretion scenario, the evolutionary tracks in the H-R diagram are significantly
    different from the classical tracks and are sensitive to the deuterium content. A comparison of theoretical evolutionary
    tracks and observations allows us to exclude some cold accretion models (ξ 0) with low deuterium abundances. <BR /> Conclusions:
    We confirm that the luminosity spread seen in clusters can be explained by models with a somewhat inefficient injection
    of accretion heat. The resulting evolutionary tracks then become sensitive to the accretion heat efficiency, initial core
    entropy, and deuterium content. In this context, we predict that clusters with a higher D/H ratio should have less scatter
    in luminosity than clusters with a smaller D/H. Future work on this issue should include radiation-hydrodynamic simulations
    to determine the efficiency of accretion heating and further observations to investigate the deuterium content in star-forming
    regions. <P />The isochrones are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/599/A49">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/599/A49</A>'
