  arxiv_id: '1905.06736'
  ads_bibcode: 2019ApJ...879..100D
  title: K2 Rotation Periods for Low-mass Hyads and a Quantitative Comparison of the Distribution of Slow Rotators in the
    Hyades and Praesepe
  authors:
  - Douglas, S. T.
  - Curtis, J. L.
  - Agüeros, M. A.
  - Cargile, P. A.
  - Brewer, J. M.
