  doi: 10.1093/mnras/staf894
  abstract: 'We present a JWST Near Infrared Imager and Slitless Spectrograph/Single Object Slitless Spectroscopy transmission
    spectrum of the super-Earth GJ 357 b: the first atmospheric observation of this exoplanet. Despite missing the first <inline-formula><tex-math>$\sim$</tex-math></inline-formula>40
    per cent of the transit due to using an out-of-date ephemeris, we still recover a transmission spectrum that does not
    display any clear signs of atmospheric features. We perform a search for Gaussian-shaped absorption features within the
    data but find that this analysis yields comparable fits to the observations as a flat line. We compare the transmission
    spectrum to a grid of atmosphere models and reject, to 3<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>
    confidence, atmospheres with metallicities <inline-formula><tex-math>$\lesssim 100\times$</tex-math></inline-formula>
    solar (<inline-formula><tex-math>$\sim$</tex-math></inline-formula>4 g mol<SUP>−1</SUP>) with clouds at pressures down
    to 0.01 bar. We analyse how the retention of a secondary atmosphere on GJ 357 b may be possible due to its higher escape
    velocity compared to an Earth-sized planet and the exceptional inactivity of its host star relative to other M2.5V stars.
    The star''s XUV luminosity decays below the threshold for rapid atmospheric escape early enough that the volcanic revival
    of an atmosphere of several bars of CO<inline-formula><tex-math>$_2$</tex-math></inline-formula> is plausible, though
    subject to considerable uncertainty. Finally, we model the feasibility of detecting an atmosphere on GJ 357 b with MIRI/LRS,
    MIRI photometry, and NIRSpec/G395H. We find that, with two eclipses, it would be possible to detect features indicative
    of an atmosphere or surface. Further to this, with three to four transits, it would be possible to detect a 1 bar nitrogen-rich
    atmosphere with 1000 ppm of CO<inline-formula><tex-math>$_2$</tex-math></inline-formula>.'
