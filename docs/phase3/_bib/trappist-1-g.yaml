  abstract: This review surveys the statistics of solar X-ray flares, emphasising the new views that RHESSI has given us of
    the weaker events (the microflares). The new data reveal that these microflares strongly resemble more energetic events
    in most respects; they occur solely within active regions and exhibit high-temperature/nonthermal emissions in approximately
    the same proportion as major events. We discuss the distributions of flare parameters (e.g., peak flux) and how these
    parameters correlate, for instance via the Neupert effect. We also highlight the systematic biases involved in intercomparing
    data representing many decades of event magnitude. The intermittency of the flare/microflare occurrence, both in space
    and in time, argues that these discrete events do not explain general coronal heating, either in active regions or in
    the quiet Sun.
