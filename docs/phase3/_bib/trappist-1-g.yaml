- &id015
  arxiv_id: '2109.11460'
  ads_bibcode: 2022PSJ.....3..213F
  title: The TRAPPIST-1 Habitable Atmosphere Intercomparison (THAI). III. Simulated Observables-the Return of the Spectrum
  authors:
  - Fauchez, Thomas J.
  - Villanueva, Geronimo L.
  - Sergeev, Denis E.
  - Turbet, Martin
  - Boutle, Ian A.
  - Tsigaridis, Kostas
  - Way, Michael J.
  - Wolf, Eric T.
  - Domagal-Goldman, Shawn D.
  - Forget, François
  - Haqq-Misra, Jacob
