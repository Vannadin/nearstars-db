- &id1195
  arxiv_id: '1005.4371'
  ads_bibcode: 2010MNRAS.406L..60N
  title: The generalized spectral kurtosis estimator
  authors:
  - Nita, G. M.
  - Gary, D. E.
  year: '2010'
  pubdate: '2010-07-00'
  doi: 10.1111/j.1745-3933.2010.00882.x
  abstract: Due to its conceptual simplicity and its proven effectiveness in real-time detection and removal of radio frequency
    interference (RFI) from radio astronomy data, the spectral kurtosis (SK) estimator is likely to become a standard tool
    of a new generation of radio telescopes. However, the SK estimator in its original form must be developed from instantaneous
    power spectral density estimates, and hence cannot be employed as an RFI excision tool downstream of the data pipeline
    in existing instruments where any time averaging is performed. In this Letter, we develop a generalized estimator with
    wider applicability for both instantaneous and averaged spectral data, which extends its practical use to a much larger
    pool of radio instruments.
