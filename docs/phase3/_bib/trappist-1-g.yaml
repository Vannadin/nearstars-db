  arxiv_id: '1102.5411'
  ads_bibcode: 2011ApJ...730L...9L
  title: Discovery of a Candidate for the Coolest Known Brown Dwarf
  authors:
  - Luhman, K. L.
  - Burgasser, A. J.
  - Bochanski, J. J.
  year: '2011'
  pubdate: '2011-03-00'
  doi: 10.1088/2041-8205/730/1/L9
  abstract: We have used multi-epoch images from the Infrared Array Camera on board the Spitzer Space Telescope to search
    for substellar companions to stars in the solar neighborhood based on common proper motions. Through this work, we have
    discovered a faint companion to the white dwarf WD 0806-661. The comoving source has a projected separation of 130'',
    corresponding to 2500 AU at the distance of the primary (19.2 pc). If it is physically associated, then its absolute magnitude
    at 4.5 μm is ~1 mag fainter than the faintest known T dwarfs, making it a strong candidate for the coolest known brown
    dwarf. The combination of M <SUB>4.5</SUB> and the age of the primary (1.5 Gyr) implies an effective temperature of ~300
    K and a mass of ~7 M <SUB>Jup</SUB> according to theoretical evolutionary models. The white dwarf's progenitor likely
    had a mass of ~2 M <SUB>sun</SUB>, and thus could have been born with a circumstellar disk that was sufficiently massive
    to produce a companion with this mass. Therefore, the companion could be either a brown dwarf that formed like a binary
    star or a giant planet that was born within a disk and has been dynamically scattered to a larger orbit. <P />Based on
    observations made with the Spitzer Space Telescope, which is operated by the Jet Propulsion Laboratory, California Institute
    of Technology under a contract with NASA, and with the 6.5 m Magellan Telescopes located at Las Campanas Observatory,
    Chile.
