  abstract: 'Context. ESPRESSO is the new high-resolution spectrograph of ESO''s Very Large Telescope (VLT). It was designed
    for ultra-high radial-velocity (RV) precision and extreme spectral fidelity with the aim of performing exoplanet research
    and fundamental astrophysical experiments with unprecedented precision and accuracy. It is able to observe with any of
    the four Unit Telescopes (UTs) of the VLT at a spectral resolving power of 140 000 or 190 000 over the 378.2 to 788.7
    nm wavelength range; it can also observe with all four UTs together, turning the VLT into a 16 m diameter equivalent telescope
    in terms of collecting area while still providing a resolving power of 70 000. <BR /> Aims: We provide a general description
    of the ESPRESSO instrument, report on its on-sky performance, and present our Guaranteed Time Observation (GTO) program
    along with its first results. <BR /> Methods: ESPRESSO was installed on the Paranal Observatory in fall 2017. Commissioning
    (on-sky testing) was conducted between December 2017 and September 2018. The instrument saw its official start of operations
    on October 1, 2018, but improvements to the instrument and recommissioning runs were conducted until July 2019. <BR />
    Results: The measured overall optical throughput of ESPRESSO at 550 nm and a seeing of 0.65″ exceeds the 10% mark under
    nominal astroclimatic conditions. We demonstrate an RV precision of better than 25 cm s<SUP>-1</SUP> during a single night
    and 50 cm s<SUP>-1</SUP> over several months. These values being limited by photon noise and stellar jitter shows that
    the performance is compatible with an instrumental precision of 10 cm s<SUP>-1</SUP>. No difference has been measured
    across the UTs, neither in throughput nor RV precision. <BR /> Conclusions: The combination of the large collecting telescope
    area with the efficiency and the exquisite spectral fidelity of ESPRESSO opens a new parameter space in RV measurements,
    the study of planetary atmospheres, fundamental constants, stellar characterization, and many other fields. <P />Based
    on GTOs collected at the European Southern Observatory under ESO program(s) 1102.C-0744, 1102.C-0958 and 1104.C-0350 by
    the ESPRESSO Consortium.'
