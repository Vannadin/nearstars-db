- &id1220
  arxiv_id: astro-ph/0608359
  ads_bibcode: 2006AJ....132.2513S
  title: What Is a Planet?
  authors:
  - Soter, Steven
  year: '2006'
  pubdate: '2006-12-00'
  doi: 10.1086/508861
  abstract: A planet is an end product of disk accretion around a primary star or substar. I quantify this definition by the
    degree to which a body dominates the other masses that share its orbital zone. Theoretical and observational measures
    of dynamical dominance reveal gaps of 4-5 orders of magnitude separating the eight planets of our solar system from the
    populations of asteroids and comets. The proposed definition dispenses with upper and lower mass limits for a planet.
    It reflects the tendency of disk evolution in a mature system to produce a small number of relatively large bodies (planets)
    in nonintersecting or resonant orbits, which prevents collisions between them.
