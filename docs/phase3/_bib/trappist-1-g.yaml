- &id242
  arxiv_id: '2408.10851'
  ads_bibcode: 2024JGRE..12908491M
  title: Geodynamics of Super-Earth GJ 486b
  authors:
  - Meier, Tobias G.
  - Bower, Dan J.
  - Lichtenberg, Tim
  - Hammond, Mark
  - Tackley, Paul J.
  - Pierrehumbert, Raymond T.
  - Caballero, José A.
  - Tsai, Shang-Min
  - Weiner Mansfield, Megan
  - Tosi, Nicola
  - Baumeister, Philipp
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.1029/2024JE008491
  abstract: Many super-Earths are on very short orbits around their host star and, therefore, more likely to be tidally locked.
    Because this locking can lead to a strong contrast between the dayside and nightside surface temperatures, these super-Earths
    could exhibit mantle convection patterns and tectonics that could differ significantly from those observed in the present-day
    solar system. The presence of an atmosphere, however, would allow transport of heat from the dayside toward the nightside
    and thereby reduce the surface temperature contrast between the two hemispheres. On rocky planets, atmospheric and geodynamic
    regimes are closely linked, which directly connects the question of atmospheric thickness to the potential interior dynamics
    of the planet. Here, we study the interior dynamics of super-Earth GJ 486b (R=1.34 R<SUB>⊕</SUB>, M=3.0 M<SUB>⊕</SUB>,
    T<SUB>eq</SUB>≈700 K), which is one of the most suitable M-dwarf super-Earth candidates for retaining an atmosphere produced
    by degassing from the mantle and magma ocean. We investigate how the geodynamic regime of GJ 486b is influenced by different
    surface temperature contrasts by varying possible atmospheric circulation regimes. We also investigate how the strength
    of the lithosphere affects the convection pattern. We find that hemispheric tectonics, the surface expression of degree-1
    convection with downwellings forming on one hemisphere and upwelling material rising on the opposite hemisphere, is a
    consequence of the strong lithosphere rather than surface temperature contrast. Anchored hemispheric tectonics, where
    downwellings und upwellings have a preferred (day/night) hemisphere, is favored for strong temperature contrasts between
    the dayside and nightside and higher surface temperatures.
  source: citation_of=2025Sci...390S3660L
