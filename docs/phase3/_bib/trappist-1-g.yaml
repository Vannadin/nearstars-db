  doi: 10.1051/0004-6361/202141587
  abstract: We present the discovery of a transiting mini-Neptune around TOI-1201, a relatively bright and moderately young
    early M dwarf (J ≈ 9.5 mag, ~600-800 Myr) in an equal-mass ~8 arcsecond-wide binary system, using data from the Transiting
    Exoplanet Survey Satellite, along with follow-up transit observations. With an orbital period of 2.49 d, TOI-1201 b is
    a warm mini-Neptune with a radius of R<SUB>b</SUB> = 2.415 ± 0.090 R<SUB>⊕</SUB>. This signal is also present in the precise
    radial velocity measurements from CARMENES, confirming the existence of the planet and providing a planetary mass of M<SUB>b</SUB>
    = 6.28 ± 0.88 M<SUB>⊕</SUB> and, thus, an estimated bulk density of 2.45<SUB>‒0.42</SUB><SUP>+0.48</SUP> g cm<SUP>‒3</SUP>.
    The spectroscopic observations additionally show evidence of a signal with a period of 19 d and a long periodic variation
    of undetermined origin. In combination with ground-based photometric monitoring from WASP-South and ASAS-SN, we attribute
    the 19 d signal to the stellar rotation period (P<SUB>rot</SUB> = 19-23 d), although we cannot rule out that the variation
    seen in photometry belongs to the visually close binary companion. We calculate precise stellar parameters for both TOI-1201
    and its companion. The transiting planet is anexcellent target for atmosphere characterization (the transmission spectroscopy
    metric is 97<SUB>‒16</SUB><SUP>+21</SUP>) with the upcoming James Webb Space Telescope. It is also feasible to measure
    its spin-orbit alignment via the Rossiter-McLaughlin effect using current state-of-the-art spectrographs with submeter
    per second radial velocity precision. <P />Additional data (i.e., stellar activity indicators) are only available at the
    CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/656/A124">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/656/A124</A>
