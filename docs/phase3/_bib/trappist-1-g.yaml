  doi: 10.1051/0004-6361/202038820
  abstract: We announce the discovery of two planets orbiting the M dwarfs GJ 251 (0.360 ± 0.015M<SUB>☉</SUB>) and HD 238090
    (0.578 ± 0.021M<SUB>☉</SUB>) based on CARMENES radial velocity (RV) data. In addition, we independently confirm with CARMENES
    data the existence of Lalande 21185 b, a planet that has recently been discovered with the SOPHIE spectrograph. All three
    planets belong to the class of warm or temperate super-Earths and share similar properties. The orbital periods are 14.24
    d, 13.67 d, and 12.95 d and the minimum masses are 4.0 ± 0.4 M<SUB>⊕</SUB>, 6.9 ± 0.9 M<SUB>⊕</SUB>, and 2.7 ± 0.3 M<SUB>⊕</SUB>
    for GJ 251 b, HD 238090 b, and Lalande 21185 b, respectively. Based on the orbital and stellar properties, we estimate
    equilibrium temperatures of 351.0 ± 1.4 K for GJ 251 b, 469.6 ± 2.6 K for HD 238090 b, and 370.1 ± 6.8 K for Lalande 21185
    b. For the latter we resolve the daily aliases that were present in the SOPHIE data and that hindered an unambiguous determination
    of the orbital period. We find no significant signals in any of our spectral activity indicators at the planetary periods.
    The RV observations were accompanied by contemporaneous photometric observations. We derive stellar rotation periods of
    122.1 ± 2.2 d and 96.7 ± 3.7 d for GJ 251 and HD 238090, respectively. The RV data of all three stars exhibit significant
    signals at the rotational period or its first harmonic. For GJ 251 and Lalande 21185, we also find long-period signals
    around 600 d, and 2900 d, respectively, which we tentatively attribute to long-term magnetic cycles. We apply a Bayesian
    approach to carefully model the Keplerian signals simultaneously with the stellar activity using Gaussian process regression
    models and extensively search for additional significant planetary signals hidden behind the stellar activity. Current
    planet formation theories suggest that the three systems represent a common architecture, consistent with formation following
    the core accretion paradigm. <P />Tables D.1-D.3 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/643/A112">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/643/A112</A>
