  ads_bibcode: 2025arXiv250808253I
  title: Do Rocky Planets around M Stars Have Atmospheres? A Statistical Approach to the Cosmic Shoreline
  authors:
  - Ih, Jegug
  - Kempton, Eliza M.-R.
  - Diamond-Lowe, Hannah
  - Krissansen-Totton, Joshua
  - Weiner Mansfield, Megan
  - Xue, Qiao
