  arxiv_id: '1601.01877'
  ads_bibcode: 2016A&A...587A..19P
  title: Fundamental M-dwarf parameters from high-resolution spectra using PHOENIX ACES models. I. Parameter accuracy and
    benchmark stars
  authors:
  - Passegger, V. M.
  - Wende-von Berg, S.
  - Reiners, A.
  year: '2016'
  pubdate: '2016-03-00'
  doi: 10.1051/0004-6361/201322261
  abstract: M-dwarf stars are the most numerous stars in the Universe; they span a wide range in mass and are in the focus
    of ongoing and planned exoplanet surveys. To investigate and understand their physical nature, detailed spectral information
    and accurate stellar models are needed. We use a new synthetic atmosphere model generation and compare model spectra to
    observations. To test the model accuracy, we compared the models to four benchmark stars with atmospheric parameters for
    which independent information from interferometric radius measurements is available. We used χ<SUP>2</SUP>-based methods
    to determine parameters from high-resolution spectroscopic observations. Our synthetic spectra are based on the new PHOENIX
    grid that uses the ACES description for the equation of state. This is a model generation expected to be especially suitable
    for the low-temperature atmospheres. We identified suitable spectral tracers of atmospheric parameters and determined
    the uncertainties in T<SUB>eff</SUB>, log g, and [Fe/H] resulting from degeneracies between parameters and from shortcomings
    of the model atmospheres. The inherent uncertainties we find are σ<SUB>T<SUB>eff</SUB></SUB> = 35 K, σ<SUB>log g</SUB>
    = 0.14, and σ<SUB>[Fe/H]</SUB> = 0.11. The new model spectra achieve a reliable match to our observed data; our results
    for T<SUB>eff</SUB> and log g are consistent with literature values to within 1σ. However, metallicities reported from
    earlier photometric and spectroscopic calibrations in some cases disagree with our results by more than 3σ. A possible
    explanation are systematic errors in earlier metallicity determinations that were based on insufficient descriptions of
    the cool atmospheres. At this point, however, we cannot definitely identify the reason for this discrepancy, but our analysis
    indicates that there is a large uncertainty in the accuracy of M-dwarf parameter estimates. <P />Based on observations
    carried out with UVES at ESO VLT.
