  arxiv_id: '1901.00890'
  ads_bibcode: 2019ApJ...871..241D
  title: The Evolution of Flare Activity with Stellar Age
  authors:
  - Davenport, James R. A.
  - Covey, Kevin R.
  - Clarke, Riley W.
  - Boeck, Austin C.
  - Cornet, Jonathan
  - Hawley, Suzanne L.
  year: '2019'
  pubdate: '2019-02-00'
  doi: 10.3847/1538-4357/aafb76
  abstract: Using a recent census of flare stars from the Kepler survey, we have explored how flare activity evolves across
    stellar main-sequence lifetimes. We utilize a sample of 347 stars with robust flare activity detections and which have
    rotation periods measured via starspot modulations in their Kepler light curves. We consider three separate methods for
    quantifying flare activity from optical light curves and compare their utility for comparing flare activity between stars
    of differing ages and luminosities. These metrics include the fractional luminosity emitted in flares, the specific rate
    of flares emitted at a given energy, and a model for the entire flare frequency distribution (FFD). With all three approaches,
    we find that flare activity decreases for all low-mass stars as they spin down, and thus with age. Most striking is the
    evolution of the flare occurrence frequency distributions, which show no significant change in the power-law slope with
    age. Since our sample is preferentially constructed of younger, more active stars, our model overpredicts the superflare
    rate previously estimated for the Sun. Finally, we parameterize our best-fit model of the FFD for ease in predicting the
    rates of flares and their associated impacts on planet habitability and detection.
