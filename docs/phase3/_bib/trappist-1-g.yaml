  abstract: Robo-AO is an autonomous laser guide star adaptive optics (AO) system recently commissioned at the Kitt Peak 2.1
    m telescope. With the ability to observe every clear night, Robo-AO at the 2.1 m telescope is the first dedicated AO observatory.
    This paper presents the imaging performance of the AO system in its first 18 months of operations. For a median seeing
    value of 1.″44, the average Strehl ratio is 4% in the i<SUP>\prime</SUP> band. After post processing, the contrast ratio
    under sub-arcsecond seeing for a 2≤slant i<SUP>\prime</SUP> ≤slant 16 primary star is five and seven magnitudes at radial
    offsets of 0.″5 and 1.″0, respectively. The data processing and archiving pipelines run automatically at the end of each
    night. The first stage of the processing pipeline shifts and adds the rapid frame rate data using techniques optimized
    for different signal-to-noise ratios. The second “high-contrast” stage of the pipeline is eponymously well suited to finding
    faint stellar companions. Currently, a range of scientific programs, including the synthetic tracking of near-Earth asteroids,
    the binarity of stars in young clusters, and weather on solar system planets are being undertaken with Robo-AO.
