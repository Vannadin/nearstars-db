  arxiv_id: '2206.00053'
  ads_bibcode: 2022ApJ...933..162G
  title: 'Generalized Peas in a Pod: Extending Intra-system Mass Uniformity to Non-TTV Systems via the Gini Index'
  authors:
  - Goyal, Armaan V.
  - Wang, Songhu
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.3847/1538-4357/ac7562
  abstract: It has been demonstrated that planets belonging to the same close-in, compact multiple-planet system tend to exhibit
    a striking degree of uniformity in their sizes. A similar trend has also been found to hold for the masses of such planets,
    but considerations of such intra-system mass uniformity have generally been limited to statistical samples wherein a majority
    of systems have constituent planetary mass measurements obtained via analysis of transit timing variations (TTVs). Since
    systems with strong TTV signals typically lie in or near mean motion resonance, it remains to be seen whether intra-system
    mass uniformity is still readily emergent for nonresonant systems with non-TTV mass provenance. We thus present in this
    work a mass uniformity analysis of 17 non-TTV systems with masses measured via radial velocity measurements. Using the
    Gini index, a common statistic for economic inequality, as our primary metric for uniformity, we find that our sample
    of 17 non-TTV systems displays intra-system mass uniformity at a level of ~2.5σ confidence. We provide additional discussion
    of possible statistical and astrophysical underpinnings for this result. We also demonstrate the existence of a correlation
    (r = 0.25) between characteristic solid surface density (Σ<SUB>0</SUB>) of the minimum-mass extrasolar nebula and system
    mass Gini index, suggesting that more-massive disks may generally form systems with more-unequal planetary masses.
