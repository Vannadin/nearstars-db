  abstract: We integrate k-Nearest Neighbors (kNN) into Support Vector Machine (SVM) and create a new method called SVM-kNN.
    SVM-kNN strengthens the generalization ability of SVM and apply kNN to correct some forecast errors of SVM and improve
    the forecast accuracy. In addition, it can give the prediction probability of any quasar candidate through counting the
    nearest neighbors of that candidate which is produced by kNN. Applying photometric data of stars and quasars with spectral
    classification from SDSS DR7 and considering limiting magnitude error is less than 0.1, SVM-kNN and SVM reach much higher
    performance that all the classification metrics of quasar selection are above 97.0%. Apparently, the performance of SVM-kNN
    has slighter improvement than that of SVM. Therefore SVM-kNN is such a competitive and promising approach that can be
    used to construct the targeting catalogue of quasar candidates for large sky surveys.
