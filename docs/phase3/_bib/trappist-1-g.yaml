- &id390
  arxiv_id: '2408.11321'
  ads_bibcode: 2024PSJ.....5..268Y
  title: Phase Equilibria of Sub-Neptunes and Super-Earths
  authors:
  - Young, Edward D.
  - Stixrude, Lars
  - Rogers, James G.
  - Schlichting, Hilke E.
  - Marcum, Sarah P.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/PSJ/ad8c40
  abstract: We investigate the consequences of nonideal chemical interaction between silicate and overlying hydrogen-rich
    envelopes for rocky planets using basic tenets of phase equilibria. Based on our current understanding of the temperature
    and pressure conditions for complete miscibility of silicate and hydrogen, we find that the silicate-hydrogen binary solvus
    will dictate the nature of atmospheres and internal layering in rocky planets that garnered H<SUB>2</SUB>-rich primary
    atmospheres. The temperatures at the surfaces of supercritical magma oceans will correspond to the silicate-hydrogen solvus.
    As a result, the radial positions of supercritical magma ocean─atmosphere interfaces, rather than their temperatures and
    pressures, should reflect the thermal states of these planets. The conditions prescribed by the solvus influence the structure
    of the atmosphere, and thus the transit radii of sub-Neptunes. Separation of iron-rich metal to form metal cores in sub-Neptunes
    and super-Earths is not assured due to prospects for neutral buoyancy of metal in silicate melt induced by dissolution
    of H, Si, and O in the metal at high temperatures.
