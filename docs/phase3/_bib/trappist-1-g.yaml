  arxiv_id: '2110.11272'
  ads_bibcode: 2021NatAs...5.1224M
  title: A unique hot Jupiter spectral sequence with evidence for compositional diversity
  authors:
  - Mansfield, Megan
  - Line, Michael R.
  - Bean, Jacob L.
  - Fortney, Jonathan J.
  - Parmentier, Vivien
  - Wiser, Lindsey
  - Kempton, Eliza M.-R.
  - Gharib-Nezhad, Ehsan
  - Sing, David K.
  - López-Morales, Mercedes
  - Baxter, Claire
  - Désert, Jean-Michel
  - Swain, Mark R.
  - Roudier, Gael M.
  year: '2021'
  pubdate: '2021-12-00'
  doi: 10.1038/s41550-021-01455-4
  abstract: The emergent spectra of close-in, giant exoplanets (`hot Jupiters') are expected to be distinct from those of
    self-luminous objects with similar effective temperatures because hot Jupiters are primarily heated from above by their
    host stars rather than internally from the release of energy from their formation<SUP>1</SUP>. Theoretical models predict
    a continuum of dayside spectra for hot Jupiters as a function of irradiation level, with the coolest planets having absorption
    features in their spectra, intermediate-temperature planets having emission features due to thermal inversions and the
    hottest planets having blackbody-like spectra due to molecular dissociation and continuum opacity from the H<SUP>‒</SUP>
    ion<SUP>2-4</SUP>. Absorption and emission features have been detected in the spectra of a number of individual hot Jupiters<SUP>5,6</SUP>,
    and population-level trends have been observed in photometric measurements<SUP>7-15</SUP>. However, there has been no
    unified, population-level study of the thermal emission spectra of hot Jupiters as there has been for cooler brown dwarfs<SUP>16</SUP>
    and transmission spectra of hot Jupiters<SUP>17</SUP>. Here we show that hot Jupiter secondary eclipse spectra centred
    around a water absorption band at 1.4 μm follow a common trend in water feature strength with temperature. The observed
    trend is broadly consistent with model predictions for how the thermal structures of solar-composition planets vary with
    irradiation level, but is inconsistent with the predictions of self-consistent one-dimensional models for internally heated
    objects. This is particularly the case because models of internally heated objects show absorption features at temperatures
    above 2,000 K, whereas the observed hot Jupiters show emission features and featureless spectra. Nevertheless, the ensemble
    of planets exhibits some degree of scatter around the mean trend for solar-composition planets. The spread can be accounted
    for if the planets have modest variations in metallicity and/or elemental abundance ratios, which is expected from planet
    formation models<SUP>18-21</SUP>.
