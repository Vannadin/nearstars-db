  abstract: 'Context: A comprehensive framework for comparing spectral data from different planets has yet to be established.
    This framework is needed for the study of extrasolar planets and objects within the solar system.<BR /> Aims: We completed
    observations to compile a library of planet spectra for all planets, some moons, and some dwarf planets in the solar system
    to study their general spectroscopic and photometric natures.<BR /> Methods: During May and November of 2008, we acquired
    spectra for the planets using TRISPEC, which is capable of simultaneous three-band spectroscopy across a wide wavelength
    range of 0.45-2.5 μm with low resolving power (λ/∆λ ~ 140-360).<BR /> Results: Patterns emerge when comparing the spectra.
    By analyzing their general spectroscopic and photometric natures, we show that it is possible to distinguish between gas
    planets, soil planets, and ice planets. These methods can be applied to extrasolar observations acquired using low resolution
    spectrography or broad-band filters.<BR /> Conclusions: The present planet spectral library is the first library to contain
    observational spectra for all of the solar system planets, based on simultaneous observations at visible and near infrared
    wavelengths. This library will be a useful reference for analyzing extrasolar planet spectra and calibrating planetary
    data sets. <P />THN Planet spectra library is only available in electronic form at the CDS via anonymous ftp to cdsarc.u-strasbg.fr
