  doi: 10.1016/j.icarus.2017.04.020
  abstract: The Venus International Reference Atmosphere (VIRA) model contains tabulated values of temperature and number
    densities obtained by the experiments on the Venera entry probes, Pioneer Venus Orbiter and multi-probe missions in the
    1980s. The instruments on the recent Venus Express orbiter mission generated a significant amount of new observational
    data on the vertical and horizontal structure of the Venus atmosphere from 40 km to about 180 km altitude from April 2006
    to November 2014. Many ground based experiments have provided data on the upper atmosphere (90-130 km) temperature structure
    since the publication of VIRA in 1985. The "Thermal Structure of the Venus Atmosphere" Team was supported by the International
    Space Studies Institute (ISSI), Bern, Switzerland, from 2013 to 2015 in order to combine and compare the ground-based
    observations and the VEx observations of the thermal structure as a first step towards generating an updated VIRA model.
    Results of this comparison are presented in five latitude bins and three local time bins by assuming hemispheric symmetry.
    The intercomparison of the ground-based and VEx results provides for the first time a consistent picture of the temperature
    and density structure in the 40 km-180 km altitude range. The Venus Express observations have considerably increased our
    knowledge of the Venus atmospheric thermal structure above ∼40 km and provided new information above 100 km. There are,
    however, still observational gaps in latitude and local time above certain regions. Considerable variability in the temperatures
    and densities is seen above 100 km but certain features appear to be systematically present, such as a succession of warm
    and cool layers. Preliminary modeling studies support the existence of such layers in agreement with a global scale circulation.
    The intercomparison focuses on average profiles but some VEx experiments provide sufficient global coverage to identify
    solar thermal tidal components.
