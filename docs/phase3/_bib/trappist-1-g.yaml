- &id1305
  arxiv_id: '2603.29743'
  ads_bibcode: 2026arXiv260329743R
  title: New Constraints on the M Dwarf Cosmic Shoreline from a Galaxy Far, Far Away
  authors:
  - Radica, Michael
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.48550/arXiv.2603.29743
  abstract: Whether there is a cosmic shoreline that divides terrestrial planets which have atmospheres from those that don't
    is one of the biggest open questions in exoplanet science. Most atmosphere searches have focused on terrestrial planets
    around M dwarf stars, since their smaller radii compared to sun-like stars boost planet atmosphere signals. However, the
    higher activity levels of M dwarfs might also entirely preclude atmosphere retention for their planets. In this work we
    present a new hope for defining an M dwarf cosmic shoreline, leveraging not only data from exoplanets in our own galaxy,
    but a comprehensive survey conducted by a commission of the Galactic Republic a long, long time ago in a galaxy far, far
    away. In this survey, we find definitive proof that M dwarf planets can retain atmospheres, and define an M dwarf cosmic
    shoreline whose slope agrees well with empirical predictions for Sun-like stars. We then define atmosphere retention metrics
    for the planets on the JWST Rocky Worlds DDT Targets Under Consideration list. Our analysis highlights the benefits of
    looking beyond the Milky Way for answers to some of the field's most pressing questions.
