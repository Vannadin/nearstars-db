  arxiv_id: '1310.4796'
  ads_bibcode: 2013ApJ...778..183L
  title: A Near-infrared Transmission Spectrum for the Warm Saturn HAT-P-12b
  authors:
  - Line, Michael R.
  - Knutson, Heather
  - Deming, Drake
  - Wilkins, Ashlee
  - Desert, Jean-Michel
  year: '2013'
  pubdate: '2013-12-00'
  doi: 10.1088/0004-637X/778/2/183
  abstract: We present a Hubble Space Telescope Wide Field Camera-3 (WFC3) transmission spectrum for the transiting exoplanet
    HAT-P-12b. This warm (1000 K) sub-Saturn-mass planet has a smaller mass and a lower temperature than the hot Jupiters
    that have been studied so far. We find that the planet's measured transmission spectrum lacks the expected water absorption
    feature for a hydrogen-dominated atmosphere and is instead best described by a model with high-altitude clouds. Using
    a frequentist hypothesis testing procedure, we can rule out a hydrogen-dominated cloud-free atmosphere to 4.9σ. When combined
    with other recent WFC3 studies, our observations suggest that clouds may be common in exoplanetary atmospheres.
