  ads_bibcode: 2020A&A...633A.117N
  title: 'Ceres'' partial differentiation: undifferentiated crust mixing with a water-rich mantle'
  authors:
  - Neumann, Wladimir
  - Jaumann, Ralf
  - Castillo-Rogez, Julie
  - Raymond, Carol A.
  - Russell, Christopher T.
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.1051/0004-6361/201936607
  abstract: '<BR /> Aims: We model thermal evolution and water-rock differentiation of small ice-rock objects that accreted
    at different heliocentric distances, while also considering migration into the asteroid belt for Ceres. We investigate
    how water-rock separation and various cooling processes influence Ceres'' structure and its thermal conditions at present.
    We also draw conclusions about the presence of liquids and the possibility of cryovolcanism. <BR /> Methods: We calculated
    energy balance in bodies heated by radioactive decay and compaction-driven water-rock separation in a three-component
    dust-water/ice-empty pores mixture, while also taking into consideration second-order processes, such as accretional heating,
    hydrothermal circulation, and ocean or ice convection. Calculations were performed for varying accretion duration, final
    size, surface temperature, and dust/ice ratio to survey the range of possible internal states for precursors of Ceres.
    Subsequently, the evolution of Ceres was considered in five sets of simulated models, covering different accretion and
    evolution orbits and dust/ice ratios. <BR /> Results: We find that Ceres'' precursors in the inner solar system could
    have been both wet and dry, while in the Kuiper belt, they retain the bulk of their water content. For plausible accretion
    scenarios, a thick primordial crust may be retained over several Gyr, following a slow differentiation within a few hundreds
    of Myr, assuming an absence of destabilizing impacts. The resulting thermal conditions at present allow for various salt
    solutions at depths of ≲10 km. The warmest present subsurface is obtained for an accretion in the Kuiper belt and migration
    to the present orbit. <BR /> Conclusions: Our results indicate that Ceres'' material could have been aqueously altered
    on small precursors. The modeled structure of Ceres suggests that a liquid layer could still be present between the crust
    and the core, which is consistent with Dawn observations and, thus, suggests accretion in the Kuiper belt. While the crust
    stability calculations indicate crust retention, the convection analysis and interior evolution imply that the crust could
    still be evolving.'
