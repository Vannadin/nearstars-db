  doi: 10.3847/2041-8213/ad3642
  abstract: Recent discoveries of Earth-sized planets transiting nearby M dwarfs have made it possible to characterize the
    atmospheres of terrestrial planets via follow-up spectroscopic observations. However, the number of such planets receiving
    low insolation is still small, limiting our ability to understand the diversity of the atmospheric composition and climates
    of temperate terrestrial planets. We report the discovery of an Earth-sized planet transiting the nearby (12 pc) inactive
    M3.0 dwarf Gliese 12 (TOI-6251) with an orbital period (P <SUB>orb</SUB>) of 12.76 days. The planet, Gliese 12 b, was
    initially identified as a candidate with an ambiguous P <SUB>orb</SUB> from TESS data. We confirmed the transit signal
    and P <SUB>orb</SUB> using ground-based photometry with MuSCAT2 and MuSCAT3, and validated the planetary nature of the
    signal using high-resolution images from Gemini/NIRI and Keck/NIRC2 as well as radial velocity (RV) measurements from
    the InfraRed Doppler instrument on the Subaru 8.2 m telescope and from CARMENES on the CAHA 3.5 m telescope. X-ray observations
    with XMM-Newton showed the host star is inactive, with an X-ray-to-bolometric luminosity ratio of . Joint analysis of
    the light curves and RV measurements revealed that Gliese 12 b has a radius of 0.96 ± 0.05 R <SUB>⊕</SUB>, a 3σ mass upper
    limit of 3.9 M <SUB>⊕</SUB>, and an equilibrium temperature of 315 ± 6 K assuming zero albedo. The transmission spectroscopy
    metric (TSM) value of Gliese 12 b is close to the TSM values of the TRAPPIST-1 planets, adding Gliese 12 b to the small
    list of potentially terrestrial, temperate planets amenable to atmospheric characterization with JWST.
