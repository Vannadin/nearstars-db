  arxiv_id: '1306.0739'
  ads_bibcode: 2013A&A...556A..19O
  title: Effect of stellar spots on high-precision transit light-curve
  authors:
  - Oshagh, M.
  - Santos, N. C.
  - Boisse, I.
  - Boué, G.
  - Montalto, M.
  - Dumusque, X.
  - Haghighipour, N.
  year: '2013'
  pubdate: '2013-08-00'
  doi: 10.1051/0004-6361/201321309
  abstract: Stellar-activity features such as spots can complicate the determination of planetary parameters through spectroscopic
    and photometric observations. The overlap of a transiting planet and a stellar spot, for instance, can produce anomalies
    in the transit light-curves that may lead to an inaccurate estimation of the transit duration, depth, and timing. These
    inaccuracies can for instance affect the precise derivation of the planet radius. We present the results of a quantitative
    study on the effects of stellar spots on high-precision transit light-curves. We show that spot anomalies can lead to
    an estimate of a planet radius that is 4% smaller than the real value. Likewise, the transit duration may be estimated
    about 4%, longer or shorter. Depending on the size and distribution of spots, anomalies can also produce transit-timing
    variations (TTVs) with significant amplitudes. For instance, TTVs with signal amplitudes of 200 s can be produced when
    the spot is completely dark and has the size of the largest Sun spot. Our study also indicates that the smallest size
    of a stellar spot that still has detectable effects on a high-precision transit light-curve is around 0.03 time the stellar
    radius for typical Kepler Telescope precision. We also show that the strategy of including more free parameters (such
    as transit depth and duration) in the fitting procedure to measure the transit time of each individual transit will not
    produce accurate results for active stars.
