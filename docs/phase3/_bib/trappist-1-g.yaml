  ads_bibcode: 2017PASP..129e4501I
  title: 'The Breakthrough Listen Search for Intelligent Life: Target Selection of Nearby Stars and Galaxies'
  authors:
  - Isaacson, Howard
  - Siemion, Andrew P. V.
  - Marcy, Geoffrey W.
  - Lebofsky, Matt
  - Price, Danny C.
  - MacMahon, David
