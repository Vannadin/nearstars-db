  arxiv_id: '1301.6763'
  ads_bibcode: 2013ApJ...765..127F
  title: Spitzer Transits of the Super-Earth GJ1214b and Implications for its Atmosphere
  authors:
  - Fraine, Jonathan D.
  - Deming, Drake
  - Gillon, Michaël
  - Jehin, Emmanuël
  - Demory, Brice-Olivier
  - Benneke, Bjoern
  - Seager, Sara
  - Lewis, Nikole K.
  - Knutson, Heather
  - Désert, Jean-Michel
  year: '2013'
  pubdate: '2013-03-00'
  doi: 10.1088/0004-637X/765/2/127
  abstract: We observed the transiting super-Earth exoplanet GJ1214b using warm Spitzer at 4.5 μm wavelength during a 20 day
    quasi-continuous sequence in 2011 May. The goals of our long observation were to accurately define the infrared transit
    radius of this nearby super-Earth, to search for the secondary eclipse, and to search for other transiting planets in
    the habitable zone of GJ1214. We here report results from the transit monitoring of GJ1214b, including a reanalysis of
    previous transit observations by Désert et al. In total, we analyze 14 transits of GJ1214b at 4.5 μm, 3 transits at 3.6
    μm, and 7 new ground-based transits in the I+z band. Our new Spitzer data by themselves eliminate cloudless solar composition
    atmospheres for GJ1214b, and methane-rich models from Howe &amp; Burrows. Using our new Spitzer measurements to anchor
    the observed transit radii of GJ1214b at long wavelengths, and adding new measurements in I+z, we evaluate models from
    Benneke &amp; Seager and Howe &amp; Burrows using a χ<SUP>2</SUP> analysis. We find that the best-fit model exhibits an
    increase in transit radius at short wavelengths due to Rayleigh scattering. Pure water atmospheres are also possible.
    However, a flat line (no atmosphere detected) remains among the best of the statistically acceptable models, and better
    than pure water atmospheres. We explore the effect of systematic differences among results from different observational
    groups, and we find that the Howe &amp; Burrows tholin-haze model remains the best fit, even when systematic differences
    among observers are considered.
