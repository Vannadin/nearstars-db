  ads_bibcode: 2016Life....6...25B
  title: 'The Cosmic Zoo: The (Near) Inevitability of the Evolution of Complex, Macroscopic Life'
  authors:
  - Bains, William
  - Schulze-Makuch, Dirk
  year: '2016'
  pubdate: '2016-06-00'
  doi: 10.3390/life6030025
  abstract: Life on Earth provides a unique biological record from single-cell microbes to technologically intelligent life
    forms. Our evolution is marked by several major steps or innovations along a path of increasing complexity from microbes
    to space-faring humans. Here we identify various major key innovations, and use an analytical toolset consisting of a
    set of models to analyse how likely each key innovation is to occur. Our conclusion is that once the origin of life is
    accomplished, most of the key innovations can occur rather readily. The conclusion for other worlds is that if the origin
    of life can occur rather easily, we should live in a cosmic zoo, as the innovations necessary to lead to complex life
    will occur with high probability given sufficient time and habitat. On the other hand, if the origin of life is rare,
    then we might live in a rather empty universe.
