  - Vignes, J.-P.
  year: '2024'
  pubdate: '2024-05-00'
  doi: 10.1051/0004-6361/202347872
  abstract: '<BR /> Aims: Our aim in this paper is to refine the orbital and physical parameters of the HATS-2 planetary system
    and study transit timing variations and atmospheric composition thanks to transit observations that span more than 10
    yr and that were collected using different instruments and pass-band filters. We also investigate the orbital alignment
    of the system by studying the anomalies in the transit light curves induced by starspots on the photosphere of the parent
    star. <BR /> Methods: We analysed new transit events from both ground-based telescopes and NASA''s TESS mission. Anomalies
    were detected in most of the light curves and modelled as starspots occulted by the planet during transit events. We fitted
    the clean and symmetric light curves with the JKTEBOP code and those affected by anomalies with the PRISM+GEMC codes to
    simultaneously model the photometric parameters of the transits and the position, size, and contrast of each starspot.
    <BR /> Results: We found consistency between the values we found for the physical and orbital parameters and those from
    the discovery paper and ATLAS9 stellar atmospherical models. We identified different sets of consecutive starspot-crossing
    events that temporally occurred in less than five days. Under the hypothesis that we are dealing with the same starspots,
    occulted twice by the planet during two consecutive transits, we estimated the rotational period of the parent star and,
    in turn the projected and the true orbital obliquity of the planet. We find that the system is well aligned. We identified
    the possible presence of transit timing variations in the system, which can be caused by tidal orbital decay, and we derived
    a low-resolution transmission spectrum.'
