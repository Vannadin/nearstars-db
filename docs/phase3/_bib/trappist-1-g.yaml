  arxiv_id: '2505.11960'
  ads_bibcode: 2025MNRAS.540..650Z
  title: HST/WFC3 constraints on the abundances of OH and FeH in the atmosphere of the ultra-hot Neptune LTT-9779 b
  authors:
  - Zhou, Li
  - Ma, Xinyue
  - Ma, Bo
  - Wang, Wei
  - Jiang, Chengzi
  - Pallé, Enric
  - Wang, Yonghao
  - Wang, Jinpeng
  - Zhai, Meng
  - Jiang, Zewen
  - Zou, Qianyi
  - Peng, Yujie
  - Gu, Xuedong
  - Chen, Qian
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.1093/mnras/staf674
  abstract: Planets residing within the hot-Neptune Desert are rare and studying their atmospheres can provide valuable insights
    into their formation and evolutionary processes. We present the atmospheric characterization of the first known ultra-hot
    Neptune, LTT-9779 b, using transmission spectroscopic observations obtained with the Hubble Space Telescope's (HST) Wide
    Field Camera 3 G141 and G102 grisms. Using the IRACLIS pipeline and TAUREX3 retrieval code, we find that LTT-9779 b likely
    possesses a H/He-dominated primary atmosphere with an opaque aerosol layer and the pure cloudy, flat-line model is rejected
    with approximately 2.7<inline-formula><tex-math>$\sigma$</tex-math></inline-formula> confidence. Although we do not find
    conclusive evidence supporting the presence of any molecular species, we place 95 per cent confidence level upper limits
    on the volume mixing ratios of hydroxyl radical (OH) and iron hydride (FeH) at <inline-formula><tex-math>$7.18\times 10^{-2}$</tex-math></inline-formula>
    and <inline-formula><tex-math>$1.52\times 10^{-8}$</tex-math></inline-formula>, respectively. Notably, the retrieval results
    are inconsistent with predictions from equilibrium chemistry models, which favour higher <inline-formula><tex-math>$\rm
    H_2O$</tex-math></inline-formula> abundances over <inline-formula><tex-math>$\rm OH$</tex-math></inline-formula>. This
    discrepancy suggests that disequilibrium processes, such as photochemistry or vertical mixing, may have altered the atmospheric
    composition. Comparisons between HST, Spitzer, and JWST data reveal no evidence of temporal variations in the atmospheric
    composition of the terminator region. Our results highlight the need for higher resolution spectroscopy and secondary
    eclipse observations to resolve LTT-9779 b's temperature─pressure (T─P) profile and chemical inventory definitively.
