- &id492
  arxiv_id: '1805.12011'
  ads_bibcode: 2018ApJ...861...79B
  title: 'High-resolution Spectroscopy Using Fabry-Perot Interferometer Arrays: An Application to Searches for O2 in Exoplanetary
    Atmospheres'
  authors:
  - Ben-Ami, Sagi
  - López-Morales, Mercedes
  - Garcia-Mejia, Juliana
  - Gonzalez Abad, Gonzalo
  - Szentgyorgyi, Andrew
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.3847/1538-4357/aac835
  abstract: We present a novel implementation for extremely high-resolution spectroscopy using custom-designed Fabry-Perot
    Interferometer (FPI) arrays. For a given telescope aperture at the seeing-limited case, these arrays can achieve resolutions
    well in excess of R ∼ 10<SUP>5</SUP> using optical elements that are orders of magnitude smaller in size than standard
    echelle spectrographs of similar resolution. We apply this method specifically to the search for O<SUB>2</SUB> in exoplanetary
    atmospheres using the O<SUB>2</SUB> A band at 0.76 μm and show how an FPI array composed of ∼10 etalons with parameters
    optimized for this science case can record R = 3-5 × 10<SUP>5</SUP> spectra covering the full O<SUB>2</SUB> A band. Using
    simulated observations of the atmosphere of a transiting nearby Earth-like planet, we show how observations with an FPI
    array coupled to a long-slit spectrograph can reduce the number of transit observations needed to produce a 3σ detection
    of O<SUB>2</SUB> by ∼30% compared to observations with an R = 10<SUP>5</SUP> echelle spectrograph. This in turn leads
    to a decrease in an observing program duration of several years. The number of transits needed for a 3σ detection can
    be further reduced by increasing the efficiency of FPI arrays using dualons (an etalon with a buried reflective layer)
    and by coupling the FPI array to a dedicated spectrograph optimized for the O<SUB>2</SUB> A band.
