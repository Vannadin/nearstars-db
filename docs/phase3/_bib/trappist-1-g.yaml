  abstract: Hot gas giant exoplanets can lose part of their atmosphere due to strong stellar irradiation, and these losses
    can affect their physical and chemical evolution. Studies of atmospheric escape from exoplanets have mostly relied on
    space-based observations of the hydrogen Lyman-α line in the far ultraviolet region, which is strongly affected by interstellar
    absorption. Using ground-based high-resolution spectroscopy, we detected excess absorption in the helium triplet at 1083
