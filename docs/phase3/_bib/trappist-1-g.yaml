  arxiv_id: '1404.5817'
  ads_bibcode: 2014ApJ...788..161T
  title: Magnetohydrodynamic Simulations of Hot Jupiter Upper Atmospheres
  authors:
  - Trammell, George B.
  - Li, Zhi-Yun
  - Arras, Phil
  year: '2014'
  pubdate: '2014-06-00'
  doi: 10.1088/0004-637X/788/2/161
  abstract: Two-dimensional simulations of hot Jupiter upper atmospheres including the planet's magnetic field are presented.
    The goal is to explore magnetic effects on the layer of the atmosphere that is ionized and heated by stellar EUV radiation,
    and the imprint of these effects on the Lyα transmission spectrum. The simulations are axisymmetric, isothermal, and include
    both rotation and azimuth-averaged stellar tides. Mass density is converted to atomic hydrogen density through the assumption
    of ionization equilibrium. The three-zone structure—polar dead zone (DZ), mid-latitude wind zone (WZ), and equatorial
    DZ—found in previous analytic calculations is confirmed. For a magnetic field comparable to that of Jupiter, the equatorial
    DZ, which is confined by the magnetic field and corotates with the planet, contributes at least half of the transit signal.
    For even stronger fields, the gas escaping in the mid-latitude WZ is found to have a smaller contribution to the transit
    depth than the equatorial DZ. Transmission spectra computed from the simulations are compared to Hubble Space Telescope
    Space Telescope Imaging Spectrograph and Advanced Camera for Surveys data for HD 209458b and HD 189733b, and the range
    of model parameters consistent with the data is found. The central result of this paper is that the transit depth increases
    strongly with magnetic field strength when the hydrogen ionization layer is magnetically dominated, for dipole magnetic
    field B <SUB>0</SUB> &gt;~ 10 G. Hence transit depth is sensitive to magnetic field strength, in addition to standard
    quantities such as the ratio of thermal to gravitational binding energies. Another effect of the magnetic field is that
    the planet loses angular momentum orders of magnitude faster than in the non-magnetic case, because the magnetic field
    greatly increases the lever arm for wind braking of the planet's rotation. Spin-down timescales for magnetized models
    of HD 209458b that agree with the observed transit depth can be as short as ~= 30 Myr, which is much shorter than the
    age of the system.
