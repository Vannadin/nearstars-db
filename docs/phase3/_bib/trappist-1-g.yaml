  arxiv_id: '1410.4286'
  ads_bibcode: 2015ApJ...802...28C
  title: Near-infrared Thermal Emission Detections of a Number of Hot Jupiters and the Systematics of Ground-based Near-infrared
    Photometry
  authors:
  - Croll, Bryce
