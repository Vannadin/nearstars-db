  arxiv_id: null
  ads_bibcode: 2018Icar..299..133K
  title: Two-phase convection in Ganymede's high-pressure ice layer - Implications for its geological evolution
  authors:
  - Kalousová, Klára
  - Sotin, Christophe
  - Choblet, Gaël
  - Tobie, Gabriel
  - Grasset, Olivier
  year: '2018'
  pubdate: '2018-01-00'
  doi: 10.1016/j.icarus.2017.07.018
  abstract: Ganymede, the largest moon in the solar system, has a fully differentiated interior with a layer of high-pressure
    (HP) ice between its deep ocean and silicate mantle. In this paper, we study the dynamics of this layer using a numerical
    model of two-phase ice-water mixture in two-dimensional Cartesian geometry. While focusing on the generation of water
    at the silicate/HP ice interface and its upward migration towards the ocean, we investigate the effect of bottom heat
    flux, the layer thickness, and the HP ice viscosity and permeability. Our results suggest that melt can be generated at
    the silicate/HP ice interface for small layer thickness ( ≲ 200 km) and high values of heat flux ( ≳ 20 mW m-<SUP>2</SUP>)
    and viscosity ( ≳ 10<SUP>15</SUP> Pa s). Once generated, the water is transported through the layer by the upwelling plumes.
    Depending on the vigor of convection, it stays liquid or it may freeze before melting again as the plume reaches the temperate
    (partially molten) layer at the boundary with the ocean. The thickness of this layer as well as the amount of melt that
    is extracted from it is controlled by the permeability of the HP ice. This process constitutes a means of transporting
    volatiles and salts that might have dissolved into the melt present at the silicate/HP ice interface. As the moon cools
    down, the HP ice layer becomes less permeable because the heat flux from the silicates decreases and the HP ice layer
    thickens.
