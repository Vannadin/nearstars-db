  arxiv_id: '2011.02069'
  ads_bibcode: 2021A&A...645A.100S
  title: 'SPECULOOS: Ultracool dwarf transit survey. Target list and strategy'
  authors:
  - Sebastian, D.
  - Gillon, M.
  - Ducrot, E.
  - Pozuelos, F. J.
  - Garcia, L. J.
  - Günther, M. N.
  - Delrez, L.
  - Queloz, D.
  - Demory, B. O.
  - Triaud, A. H. M. J.
  - Burgasser, A.
  - de Wit, J.
  - Burdanov, A.
  - Dransfield, G.
  - Jehin, E.
  - McCormac, J.
  - Murray, C. A.
  - Niraula, P.
  - Pedersen, P. P.
  - Rackham, B. V.
  - Sohy, S.
  - Thompson, S.
  - Van Grootel, V.
  year: '2021'
  pubdate: '2021-01-00'
  doi: 10.1051/0004-6361/202038827
  abstract: 'Context. One of the most promising avenues for the detailed study of temperate Earth-sized exoplanets is the
    detection of such planets in transit in front of stars that are small and near enough to make it possible to carry out
    a thorough atmospheric characterisation with next-generation telescopes, such as the James Webb Space telescope (JWST)
    or Extremely Large Telescope (ELT). In this context, the TRAPPIST-1 planets form a unique benchmark system that has garnered
    the interest of a large scientific community. <BR /> Aims: The SPECULOOS survey is an exoplanet transit survey targeting
    a volume-limited (40 pc) sample of ultracool dwarf stars (of spectral type M7 and later) that is based on a network of
    robotic 1 m telescopes especially designed for this survey. The strategy for brighter and earlier targets leverages on
    the synergy with the ongoing TESS space-based exoplanet transit survey. <BR /> Methods: We define the SPECULOOS target
    list as the sum of three non-overlapping sub-programmes incorporating the latest type objects (T<SUB>eff</SUB> ≲ 3000
    K). Programme 1 features 365 dwarfs that are small and near enough to make it possible to detail atmospheric characterisation
    of an `Earth-like'' planet with the upcoming JWST. Programme 2 features 171 dwarfs of M5-type and later for which a significant
    detection of a planet similar to TRAPPIST-1b should be within reach of TESS. Programme 3 features 1121 dwarfs that are
    later than M6-type. These programmes form the basis of our statistical census of short-period planets around ultracool
    dwarf stars. <BR /> Results: Our compound target list includes 1657 photometrically classified late-type dwarfs, with
    260 of these targets classified, for the first time, as possible nearby ultracool dwarf stars. Our general observational
    strategy was to monitor each target between 100 and 200 h with our telescope network, making efficient use of the synergy
    with TESS for our Programme 2 targets and a proportion of targets in our Programme 1. <BR /> Conclusions: Based on Monte
    Carlo simulations, we expect to detect up to a few dozen temperate, rocky planets. We also expect a number of them to
    prove amenable for atmospheric characterisation with JWST and other future giant telescopes, which will substantially
    improve our understanding of the planetary population of the latest-type stars. <P />Catalogue of the sources is only
    available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A> (ftp://130.79.128.5)
    or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/645/A100">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/645/A100</A>'
