- &id331
  arxiv_id: '1710.08365'
  ads_bibcode: 2017A&A...608A..75C
  title: Effect of stellar flares on the upper atmospheres of HD 189733b and HD 209458b
  authors:
  - Chadney, J. M.
  - Koskinen, T. T.
  - Galand, M.
  - Unruh, Y. C.
  - Sanz-Forcada, J.
  year: '2017'
  pubdate: '2017-12-00'
  doi: 10.1051/0004-6361/201731129
  abstract: Stellar flares are a frequent occurrence on young low-mass stars around which many detected exoplanets orbit.
    Flares are energetic, impulsive events, and their impact on exoplanetary atmospheres needs to be taken into account when
    interpreting transit observations. We have developed a model to describe the upper atmosphere of extrasolar giant planets
    (EGPs) orbiting flaring stars. The model simulates thermal escape from the upper atmospheres of close-in EGPs. Ionisation
    by solar radiation and electron impact is included and photo-chemical and diffusive transport processes are simulated.
    This model is used to study the effect of stellar flares from the solar-like G star <ASTROBJ>HD 209458</ASTROBJ> and the
    young K star <ASTROBJ>HD 189733</ASTROBJ> on their respective planets, <ASTROBJ>HD 209458b</ASTROBJ> and <ASTROBJ>HD 189733b</ASTROBJ>.
    The <ASTROBJ>Sun</ASTROBJ> is used as a proxy for HD 209458, and <ASTROBJ>∊ Eridani</ASTROBJ>, as a proxy for HD 189733.
    A hypothetical HD 209458b-like planet orbiting the very active M star <ASTROBJ>AU Microscopii</ASTROBJ> is also simulated.
    We find that the neutral upper atmosphere of EGPs is not significantly affected by typical flares on HD 209458 and HD
    189733. Therefore, stellar flares alone would not cause large enough changes in planetary mass loss to explain the variations
    in HD 189733b transit depth seen in previous studies, although we show that it may be possible that an extreme stellar
    proton event could result in the required mass loss. Our simulations do however reveal an enhancement in electron number
    density in the ionosphere of these planets, the peak of which is located in the layer where stellar X-rays are absorbed.
    Electron densities are found to reach 2.2 to 3.5 times pre-flare levels and enhanced electron densities last from about
    3 to 10 h after the onset of the flare, depending on the composition of the ionospheric layer. The strength of the flare
    and the width of its spectral energy distribution affect the range of altitudes in the ionosphere that see enhancements
    in ionisation. A large broadband continuum component in the XUV portion of the flaring spectrum in very young flare stars,
    such as AU Mic, results in a broad range of altitudes affected in planets orbiting this star. Indeed, as well as the X-ray
    absorption layer, the layer in which EUV photons are absorbed is also strongly enhanced.
  source: citation_of=2019ApJ...884..160V
