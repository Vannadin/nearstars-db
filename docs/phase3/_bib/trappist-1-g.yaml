- &id610
  arxiv_id: null
  ads_bibcode: 2004A&A...425..753G
  title: The effect of tidal locking on the magnetospheric and atmospheric evolution of ``Hot Jupiters''
  authors:
  - Grießmeier, J.-M.
  - Stadelmann, A.
  - Penz, T.
  - Lammer, H.
  - Selsis, F.
  - Ribas, I.
  - Guinan, E. F.
  - Motschmann, U.
  - Biernat, H. K.
  - Weiss, W. W.
  year: '2004'
  pubdate: '2004-10-00'
  doi: 10.1051/0004-6361:20035684
  abstract: We study the interaction between the planetary magnetosphere and atmosphere of the close-in extrasolar planets
    HD 209458b and OGLE-TR-56b with the stellar wind during the evolution of their host stars. Recent astrophysical observations
    of solar-like stars indicate that the radiation and particle environments of young stars are orders of magnitudes larger
    than for stars with ages comparable to the sun (∼4.6 Gyr). We model the interaction for the present and for early evolutionary
    stages, showing that it is possible that ``Hot Jupiters'' have an ionosphere-stellar wind interaction like Venus. Our
    study suggests that the internal magnetic field of exoplanets orbiting close to their host stars may be very weak due
    to tidal locking. The magnetic moments can be less than one tenth of the value presently observed for the rapidly rotating
    planet Jupiter. We find that the stronger stellar wind of younger solar-type stars compresses the magnetosphere to a standoff
    distance at which the ionized part of the upper atmosphere, hydrodynamically expanded by the XUV-flux, builds an obstacle.
    Because of a much larger stellar wind particle flux during the first ∼0.5 Gyr after the host stars arrived on the Zero-Age-Main-Sequence,
    ``Hot Jupiters'' may have not been protected by their intrinsic magnetic fields, even if one neglects the effect of tidal
    locking. In such a case, the unshielded upper atmosphere will be affected by different ionization and non-thermal ion
    loss processes. This contributes to the estimated neutral hydrogen loss rates of about ≥ 10<SUP>10</SUP> g/s of the observed
    expanded exosphere of HD 209458b \citep{vidal-madjar03} and will be an ionized part of the estimated upper energy-limited
    neutral hydrogen loss rates of about 10<SUP>12</SUP> g/s \citep{Lammer2003a}.
