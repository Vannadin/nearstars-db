- &id837
  arxiv_id: '2002.06466'
  ads_bibcode: 2020ApJ...896...48M
  title: Coupled Thermal and Compositional Evolution of Photoevaporating Planet Envelopes
  authors:
  - Malsky, Isaac
  - Rogers, Leslie A.
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/1538-4357/ab873f
  abstract: Photoevaporative mass loss sculpts the atmospheric evolution of tightly orbiting sub-Neptune-mass exoplanets.
    To date, models of the mass loss from warm Neptunes have assumed that the atmospheric abundances remain constant throughout
    the planet's evolution. However, the cumulative effects of billions of years of escape modulated by diffusive separation
    and preferential loss of hydrogen can lead to planetary envelopes that are enhanced in helium and metals relative to hydrogen.
    We have performed the first self-consistent calculations of the coupled thermal, mass-loss, and compositional evolution
    of hydrogen-helium envelopes surrounding sub-Neptune-mass planets. We extended the Modules for Experiments in Stellar
    Astrophysics stellar evolution code to model the evolving envelope abundances of photoevaporating planets. We demonstrate
    that H-He fractionation can lead to planetary envelopes that are significantly enriched in helium and metals compared
    to their initial primordial compositions. A subset of our model planets—having R<SUB>p</SUB> ≲ 3.00 R<SUB>⊕</SUB>, initial
    f<SUB>env</SUB> &lt; 0.5%, and irradiation flux ∼10<SUP>1</SUP>-10<SUP>3</SUP> times that of Earth—obtain final helium
    mass fractions in excess of Y = 0.40 after several billion years of mass loss. GJ 436b, the planet that originally inspired
    Hu et al. to propose the formation of helium-enhanced planetary atmospheres, requires a primordial envelope that is too
    massive to become helium enhanced. Planets with envelope helium fractions of Y = 0.40 have radii that are between 0.5%
    and 10% smaller (depending on their mass, irradiation flux, and envelope mass fraction) than similar planets with solar
    composition (Y = 0.24) envelopes. The results of preferential loss of hydrogen may have observable consequences for the
    M<SUB>p</SUB> - R<SUB>p</SUB> relations and atmospheric spectra of sub-Neptune populations.
