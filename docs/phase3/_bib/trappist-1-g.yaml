  arxiv_id: '2110.00444'
  ads_bibcode: 2022A&A...657A..66T
  title: 'STEPARSYN: A Bayesian code to infer stellar atmospheric parameters using spectral synthesis'
  authors:
  - Tabernero, H. M.
  - Marfil, E.
  - Montes, D.
  - González Hernández, J. I.
  year: '2022'
  pubdate: '2022-01-00'
  doi: 10.1051/0004-6361/202141763
  abstract: 'Context. STEPARSYN is an automatic code written in Python 3.X designed to infer the stellar atmospheric parameters
    T<SUB>eff</SUB>, log g, and [Fe/H] of FGKM-type stars following the spectral synthesis method. <BR /> Aims: We present
    a description of the STEPARSYN code and test its performance against a sample of late-type stars that were observed with
    the HERMES spectrograph mounted at the 1.2-m Mercator Telescope. This sample contains 35 late-type targets with well-known
    stellar parameters determined independently from spectroscopy. The code is available to the astronomical community in
    a GitHub repository. <BR /> Methods: STEPARSYN uses a Markov chain Monte Carlo sampler to explore the parameter space
    by comparing synthetic model spectra generated on the fly to the observations. The synthetic spectra are generated with
    an spectral emulator. <BR /> Results: We computed T<SUB>eff</SUB>, log g, and [Fe/H] for our sample stars and discussed
    the performance of the code. We calculated an internal scatter for these targets of ‒12 ± 117 K in T<SUB>eff</SUB>, 0.04
    ± 0.14 dex in log g, and 0.05 ± 0.09 dex in [Fe/H]. In addition, we find that the log g values obtained with STEPARSYN
    are consistent with the trigonometric surface gravities to the 0.1 dex level. Finally, STEPARSYN can compute stellar parameters
    that are accurate down to 50 K, 0.1 dex, and 0.05 dex for T<SUB>eff</SUB>, log g, and [Fe/H] for stars with v sin i ≤
    30 km s<SUP>‒1</SUP>. <P />Full Table A.5 is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/657/A66">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/657/A66</A>
    <P />Based on observations made with the Mercator Telescope, operated on the island of La Palma by the Flemish Community,
    at the Spanish Observatorio del Roque de los Muchachos of the Instituto de Astrofísica de Canarias.'
