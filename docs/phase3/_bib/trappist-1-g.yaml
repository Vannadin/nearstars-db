- &id1302
  arxiv_id: null
  ads_bibcode: 2004Icar..170..167Y
  title: Aeronomy of extra-solar giant planets at small orbital distances
  authors:
  - Yelle, Roger V.
  year: '2004'
  pubdate: '2004-07-00'
  doi: 10.1016/j.icarus.2004.02.008
  abstract: One-dimensional aeronomical calculations of the atmospheric structure of extra-solar giant planets in orbits with
    semi-major axes from 0.01 to 0.1 AU show that the thermospheres are heated to over 10,000 K by the EUV flux from the central
    star. The high temperatures cause the atmosphere to escape rapidly, implying that the upper thermosphere is cooled primarily
    by adiabatic expansion. The lower thermosphere is cooled primarily by radiative emissions from H <SUP>+</SUP><SUB>3</SUB>,
    created by photoionization of H <SUB>2</SUB> and subsequent ion chemistry. Thermal decomposition of H <SUB>2</SUB> causes
    an abrupt change in the composition, from molecular to atomic, near the base of the thermosphere. The composition of the
    upper thermosphere is determined by the balance between photoionization, advection, and H <SUP>+</SUP> recombination.
    Molecular diffusion and thermal conduction are of minor importance, in part because of large atmospheric scale heights.
    The energy-limited atmospheric escape rate is approximately proportional to the stellar EUV flux. Although escape rates
    are large, the atmospheres are stable over time scales of billions of years.
