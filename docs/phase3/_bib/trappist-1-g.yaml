  year: '2021'
  pubdate: '2021-10-00'
  doi: 10.3847/1538-4357/ac2360
  abstract: 'We report the discovery of a highly polarized, highly variable, steep-spectrum radio source, ASKAP J173608.2-321635,
    located ~4° from the Galactic Center in the Galactic plane. The source was detected six times between 2020 January and
    2020 September as part of the Australian Square Kilometre Array Pathfinder Variables and Slow Transients (ASKAP VAST)
    survey at 888 MHz. It exhibited a high degree (~25%) of circular polarization when it was visible. We monitored the source
    with the MeerKAT telescope from 2020 November to 2021 February on a 2-4 week cadence. The source was not detected with
    MeerKAT before 2021 February 7 when it appeared and reached a peak flux density of 5.6 mJy. The source was still highly
    circularly polarized, but also showed up to 80% linear polarization, and then faded rapidly with a timescale of one day.
    The rotation measure of the source varied significantly, from -11.8 ± 0.8 rad m<SUP>-2</SUP> to -64.0 ± 1.5 rad m<SUP>-2</SUP>
    over three days. No X-ray counterpart was found in follow-up Swift or Chandra observations about a week after the first
    MeerKAT detection, with upper limits of ~5.0 × 10<SUP>31</SUP> erg s<SUP>-1</SUP> (0.3-8 keV, assuming a distance ~10
    kpc). No counterpart is seen in new or archival near-infrared observations down to J = 20.8 mag. We discuss possible identifications
    for ASKAP J173608.2-321635 including a low-mass star/substellar object with extremely low infrared luminosity, a pulsar
    with scatter-broadened pulses, a transient magnetar, or a Galactic Center radio transient: none of these fully explains
    the observations, which suggests that ASKAP J173608.2-321635 may represent part of a new class of objects being discovered
    through radio imaging surveys.'
