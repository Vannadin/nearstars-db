  abstract: 'Context. Hot subdwarfs experienced strong mass loss on the red giant branch (RGB) and are now hot and small He-burning
    objects. These stars constitute excellent opportunities for addressing the question of the evolution of exoplanetary systems
    directly after the RGB phase of evolution. <BR /> Aims: In this project we aim to perform a transit survey in all available
    light curves of hot subdwarfs from space-based telescopes (Kepler, K2, TESS, and CHEOPS) with our custom-made pipeline
    SHERLOCK in order to determine the occurrence rate of planets around these stars as a function of orbital period and planetary
    radius. We also aim to determine whether planets that were previously engulfed in the envelope of their red giant host
    star can survive, even partially, as a planetary remnant. <BR /> Methods: For this first paper, we performed injection-and-recovery
    tests of synthetic transits for a selection of representative Kepler, K2, and TESS light curves to determine which transiting
    bodies in terms of object radius and orbital period we will be able to detect with our tools. We also provide estimates
    for CHEOPS data, which we analyzed with the pycheops package. <BR /> Results: Transiting objects with a radius ≲1.0 R<SUB>⊕</SUB>
    can be detected in most of the Kepler, K2, and CHEOPS targets for the shortest orbital periods (1 d and shorter), reaching
    values as low as ~0.3 R<SUB>⊕</SUB> in the best cases. Sub-Earth-sized bodies are only reached for the brightest TESS
    targets and for those that were observed in a significant number of sectors. We also give a series of representative results
    for larger planets at greater distances, which strongly depend on the target magnitude and on the length and quality of
    the data. <BR /> Conclusions: The TESS sample will provide the most important statistics for the global aim of measuring
    the planet occurrence rate around hot subdwarfs. The Kepler, K2, and CHEOPS data will allow us to search for planetary
    remnants, that is, very close and small (possibly disintegrating) objects. <P />CHEOPS data presented in Fig. 5 and lists
    presented in Appendices C and D are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A>
