  arxiv_id: '2110.08029'
  ads_bibcode: 2022PSJ.....3...93B
  title: Retention of Water in Terrestrial Magma Oceans and Carbon-rich Early Atmospheres
  authors:
  - Bower, Dan J.
  - Hakim, Kaustubh
  - Sossi, Paolo A.
  - Sanan, Patrick
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.3847/PSJ/ac5fb1
  abstract: Massive steam and CO<SUB>2</SUB> atmospheres have been proposed for magma ocean outgassing of Earth and terrestrial
    planets. Yet formation of such atmospheres depends on volatile exchange with the molten interior, governed by volatile
    solubilities and redox reactions. We determine the evolution of magma ocean-atmosphere systems for a range of oxygen fugacities,
    C/H ratios, and hydrogen budgets that include redox reactions for hydrogen (H<SUB>2</SUB>-H<SUB>2</SUB>O), carbon (CO-CO<SUB>2</SUB>),
    methane (CH<SUB>4</SUB>), and solubility laws for H<SUB>2</SUB>O and CO<SUB>2</SUB>. We find that small initial budgets
    of hydrogen, high C/H ratios, and oxidizing conditions suppress outgassing of hydrogen until the late stage of magma ocean
    crystallization. Hence, early atmospheres in equilibrium with magma oceans are dominantly carbon-rich, and specifically
    CO-rich except at the most oxidizing conditions. The high solubility of H<SUB>2</SUB>O limits its outgassing to melt fractions
    below ~30%, the fraction at which the mantle transitions from vigorous to sluggish convection with melt percolation. Sluggish
    melt percolation could enable a surface lid to form, trapping water in the interior and thereby maintaining a carbon-rich
    atmosphere (equilibrium crystallization). Alternatively, efficient crystal settling could maintain a molten surface, promoting
    a transition to a water-rich atmosphere (fractional crystallization). However, additional processes, including melt trapping
    and H dissolution in crystallizing minerals, further conspire to limit the extent of H outgassing, even for fractional
    crystallization. Hence, much of the water delivered to planets during their accretion can be safely harbored in their
    interiors during the magma ocean stage, particularly at oxidizing conditions.
