  ads_bibcode: 2008ApJ...673..502K
  title: 'Planet Formation around Stars of Various Masses: The Snow Line and the Frequency of Giant Planets'
  authors:
  - Kennedy, Grant M.
  - Kenyon, Scott J.
  year: '2008'
  pubdate: '2008-01-00'
  doi: 10.1086/524130
  abstract: We use a semianalytic circumstellar disk model that considers movement of the snow line through evolution of accretion
    and the central star to investigate how gas giant frequency changes with stellar mass. The snow line distance changes
    weakly with stellar mass; thus, giant planets form over a wide range of spectral types. The probability that a given star
    has at least one gas giant increases linearly with stellar mass from 0.4 to 3 M<SUB>☉</SUB>. Stars more massive than 3
    M<SUB>☉</SUB> evolve quickly to the main sequence, which pushes the snow line to 10-15 AU before protoplanets form and
    limits the range of disk masses that form giant planet cores. If the frequency of gas giants around solar mass stars is
    6%, we predict occurrence rates of 1% for 0.4 M<SUB>☉</SUB> stars and 10% for 1.5 M<SUB>☉</SUB> stars. This result is
    largely insensitive to our assumed model parameters. Finally, the movement of the snow line as stars gtrsim2.5 M<SUB>☉</SUB>
    move to the main sequence may allow the ocean planets suggested by Léger et al. to form without migration.
