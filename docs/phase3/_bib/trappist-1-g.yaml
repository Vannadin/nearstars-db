- &id1187
  arxiv_id: '1106.2682'
  ads_bibcode: 2011ApJ...738..141O
  title: 'Evolution of Snow Line in Optically Thick Protoplanetary Disks: Effects of Water Ice Opacity and Dust Grain Size'
  authors:
  - Oka, Akinori
  - Nakamoto, Taishi
  - Ida, Shigeru
  year: '2011'
  pubdate: '2011-09-00'
  doi: 10.1088/0004-637X/738/2/141
  abstract: Evolution of a snow line in an optically thick protoplanetary disk is investigated with numerical simulations.
    The ice-condensing region in the disk is obtained by calculating the temperature and the density with the 1+1D approach.
    The snow line migrates as the mass accretion rate (\dot{M}) in the disk decreases with time. Calculations are carried
    out from an early phase with high disk accretion rates (\dot{M} \sim 10^{-7} \,M_{\odot } yr<SUP>-1</SUP>) to a later
    phase with low disk accretion rates (\dot{M} \sim 10^{-12} \,M_{\odot } yr<SUP>-1</SUP>) using the same numerical method.
    It is found that the snow line moves inward for \dot{M} \gtrsim 10^{-10} \,M_{\odot } yr<SUP>-1</SUP>, while it gradually
    moves outward in the later evolution phase with \dot{M} \lesssim 10^{-10} \,M_{\odot } yr<SUP>-1</SUP>. In addition to
    the silicate opacity, the ice opacity is taken into consideration. In the inward migration phase, the additional ice opacity
    increases the distance of the snow line from the central star by a factor of 1.3 for dust grains &lt;~ 10 μm in size and
    of 1.6 for &gt;~ 100 μm. It is inevitable that the snow line comes inside Earth's orbit in the course of the disk evolution
    if the viscosity parameter α is in the range 0.001-0.1, the dust-to-gas mass ratio is higher than a tenth of the solar
    abundance value, and the dust grains are smaller than 1 mm. The formation of water-devoid planetesimals in the terrestrial
    planet region seems to be difficult throughout the disk evolution, which imposes a new challenge to planet formation theory.
