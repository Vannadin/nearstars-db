- &id827
  arxiv_id: '2005.14671'
  ads_bibcode: 2020AJ....160..108B
  title: The Gaia-Kepler Stellar Properties Catalog. II. Planet Radius Demographics as a Function of Stellar Mass and Age
  authors:
  - Berger, Travis A.
  - Huber, Daniel
  - Gaidos, Eric
  - van Saders, Jennifer L.
  - Weiss, Lauren M.
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.3847/1538-3881/aba18a
  abstract: Studies of exoplanet demographics require large samples and precise constraints on exoplanet host stars. Using
    the homogeneous Kepler stellar properties derived using the Gaia Data Release 2 by Berger et al., we recompute Kepler
    planet radii and incident fluxes and investigate their distributions with stellar mass and age. We measure the stellar
    mass dependence of the planet radius valley to be $d\mathrm{log}{R}_{{\rm{p}}}$ / $d\mathrm{log}{M}_{\star }$ = ${0.26}_{-0.16}^{+0.21}$
    , consistent with the slope predicted by a planet mass dependence on stellar mass (0.24-0.35) and core-powered mass loss
    (0.33). We also find the first evidence of a stellar age dependence of the planet populations straddling the radius valley.
    Specifically, we determine that the fraction of super-Earths (1-1.8 ${R}_{\oplus }$ ) to sub-Neptunes (1.8-3.5 ${R}_{\oplus
    }$ ) increases from 0.61 ± 0.09 at young ages (&lt;1 Gyr) to 1.00 ± 0.10 at old ages (&gt;1 Gyr), consistent with the
    prediction by core-powered mass loss that the mechanism shaping the radius valley operates over Gyr timescales. Additionally,
    we find a tentative decrease in the radii of relatively cool (F<SUB>p</SUB> &lt; 150 ${F}_{\oplus }$ ) sub-Neptunes over
    Gyr timescales, which suggests that these planets may possess H/He envelopes instead of higher mean molecular weight atmospheres.
    We confirm the existence of planets within the hot sub-Neptunian "desert" (2.2 R<SUB>⊕</SUB> &lt; R<SUB>p</SUB> &lt; 3.8
    ${R}_{\oplus }$ , F<SUB>p</SUB> &gt; 650 ${F}_{\oplus }$ ) and show that these planets are preferentially orbiting more
    evolved stars compared to other planets at similar incident fluxes. In addition, we identify candidates for cool (F<SUB>p</SUB>
    &lt; 20 ${F}_{\oplus }$ ) inflated Jupiters, present a revised list of habitable zone candidates, and find that the ages
    of single and multiple transiting planet systems are statistically indistinguishable.
