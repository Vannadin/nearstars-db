  year: '2020'
  pubdate: '2020-08-00'
  doi: 10.1093/mnras/staa1874
  abstract: A new hot line list for the main isotopologue of CO<SUB>2</SUB>, <SUP>12</SUP>C<SUP>16</SUP>O<SUB>2</SUB> is presented.
    The line list consists of almost 2.5 billion transitions between 3.5 million rotation-vibration states of CO<SUB>2</SUB>
    in its ground electronic state, covering the wavenumber range 0-20 000 cm<SUP>-1</SUP> (λ &gt; 0.5 µm) with the upper
    and lower energy thresholds of 36 000 cm<SUP>-1</SUP> and 16 000 cm<SUP>-1</SUP>, respectively. The ro-vibrational energies
    and wavefunctions are computed variationally using the accurate empirical potential energy surface Ames-2. The ro-vibrational
    transition probabilities in the form of Einstein coefficients are computed using an accurate ab initio dipole moment surface
    with variational program TROVE. A new implementation of TROVE which uses an exact nuclear-motion kinetic energy operator
    is employed. Comparisons with the existing hot line lists are presented. The line list should be useful for atmospheric
    retrievals of exoplanets and cool stars. The UCL-4000 line list is available from the CDS and ExoMol data bases.
