- &id1202
  arxiv_id: '0909.0259'
  ads_bibcode: 2009ApJ...704L..75J
  title: Particle Clumping and Planetesimal Formation Depend Strongly on Metallicity
  authors:
  - Johansen, Anders
  - Youdin, Andrew
  - Mac Low, Mordecai-Mark
  year: '2009'
  pubdate: '2009-10-00'
  doi: 10.1088/0004-637X/704/2/L75
  abstract: We present three-dimensional numerical simulations of particle clumping and planetesimal formation in protoplanetary
    disks with varying amounts of solid material. As centimeter-size pebbles settle to the mid-plane, turbulence develops
    through vertical shearing and streaming instabilities. We find that when the pebble-to-gas column density ratio is 0.01,
    corresponding roughly to solar metallicity, clumping is weak, so the pebble density rarely exceeds the gas density. Doubling
    the column density ratio leads to a dramatic increase in clumping, with characteristic particle densities more than 10
    times the gas density and maximum densities reaching several thousand times the gas density. This is consistent with unstratified
    simulations of the streaming instability that show strong clumping in particle-dominated flows. The clumps readily contract
    gravitationally into interacting planetesimals on the order of 100 km in radius. Our results suggest that the correlation
    between host star metallicity and exoplanets may reflect the early stages of planet formation. We further speculate that
    initially low-metallicity disks can be particle enriched during the gas dispersal phase, leading to a late burst of planetesimal
    formation.
