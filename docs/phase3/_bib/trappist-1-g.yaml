  arxiv_id: '1803.07083'
  ads_bibcode: 2018ApJ...861...52K
  title: Consequences of Giant Impacts on Early Uranus for Rotation, Internal Structure, Debris, and Atmospheric Erosion
  authors:
  - Kegerreis, J. A.
  - Teodoro, L. F. A.
  - Eke, V. R.
  - Massey, R. J.
  - Catling, D. C.
  - Fryer, C. L.
  - Korycansky, D. G.
  - Warren, M. S.
  - Zahnle, K. J.
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.3847/1538-4357/aac725
  abstract: We perform a suite of smoothed particle hydrodynamics simulations to investigate in detail the results of a giant
    impact on the young Uranus. We study the internal structure, rotation rate, and atmospheric retention of the post-impact
    planet, as well as the composition of material ejected into orbit. Most of the material from the impactor’s rocky core
    falls in to the core of the target. However, for higher angular momentum impacts, significant amounts become embedded
    anisotropically as lumps in the ice layer. Furthermore, most of the impactor’s ice and energy is deposited in a hot, high-entropy
    shell at a radius of ∼3 R <SUB>⊕</SUB>. This could explain Uranus’ observed lack of heat flow from the interior and be
    relevant for understanding its asymmetric magnetic field. We verify the results from the single previous study of lower
    resolution simulations that an impactor with a mass of at least 2 M <SUB>⊕</SUB> can produce sufficiently rapid rotation
    in the post-impact Uranus for a range of angular momenta. At least 90% of the atmosphere remains bound to the final planet
    after the collision, but over half can be ejected beyond the Roche radius by a 2 or 3 M <SUB>⊕</SUB> impactor. This atmospheric
    erosion peaks for intermediate impactor angular momenta (∼3 × 10<SUP>36</SUP> kg m<SUP>2</SUP> s<SUP>-1</SUP>). Rock is
    more efficiently placed into orbit and made available for satellite formation by 2 M <SUB>⊕</SUB> impactors than 3 M <SUB>⊕</SUB>
    ones, because it requires tidal disruption that is suppressed by the more massive impactors.
