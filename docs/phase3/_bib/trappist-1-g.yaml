- &id1044
  arxiv_id: '1609.02579'
  ads_bibcode: 2016AJ....152..180S
  title: Eclipsing Binaries as Benchmarks for Trigonometric Parallaxes in the Gaia Era
  authors:
  - Stassun, Keivan G.
  - Torres, Guillermo
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.3847/0004-6256/152/6/180
  abstract: We present fits to the broadband photometric spectral energy distributions (SEDs) of 158 eclipsing binaries (EBs)
    in the Tycho-2 catalog. These EBs were selected because they have highly precise stellar radii, effective temperatures,
    and in many cases metallicities previously determined in the literature, and thus have bolometric luminosities that are
    typically good to ≲10%. In most cases the available broadband photometry spans a wavelength range 0.4-10 μm, and in many
    cases spans 0.15-22 μm. The resulting SED fits, which have only extinction as a free parameter, provide a virtually model-independent
    measure of the bolometric flux at Earth. The SED fits are satisfactory for 156 of the EBs, for which we achieve typical
    precisions in the bolometric flux of ≈3%. Combined with the accurately known bolometric luminosity, the result for each
    EB is a predicted parallax that is typically precise to ≲5%. These predicted parallaxes—with typical uncertainties of
    200 μas—are 4-5 times more precise than those determined by Hipparcos for 99 of the EBs in our sample, with which we find
    excellent agreement. There is no evidence among this sample for significant systematics in the Hipparcos parallaxes of
    the sort that notoriously afflicted the Pleiades measurement. The EBs are distributed over the entire sky, span more than
    10 mag in brightness, reach distances of more than 5 kpc, and in many cases our predicted parallaxes should also be more
    precise than those expected from the Gaia first data release. The EBs studied here can thus serve as empirical, independent
