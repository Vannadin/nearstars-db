- &id656
  arxiv_id: '2406.01955'
  ads_bibcode: 2024ApJ...971L..48Y
  title: 'Chemical Mapping of Temperate Sub-Neptune Atmospheres: Constraining the Deep Interior H<SUB>2</SUB>O/H<SUB>2</SUB>
    Ratio from the Atmospheric CO<SUB>2</SUB>/CH<SUB>4</SUB> Ratio'
  authors:
  - Yang, Jeehyun
  - Hu, Renyu
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.3847/2041-8213/ad6b25
  abstract: Understanding the planetary envelope composition of sub-Neptune-type exoplanets is challenging due to the inherent
    degeneracy in their interior composition scenarios. Particularly, the planetary envelope's H<SUB>2</SUB>O/H<SUB>2</SUB>
    ratio, which can also be expressed as the O/H ratio, provides crucial insights into its original location relative to
    the ice line during planetary formation. Using self-consistent radiative transfer modeling and a rate-based automatic
    chemical network generator combined with 1D photochemical kinetic-transport atmospheric modeling, we investigate various
    atmospheric scenarios of temperate sub-Neptunes, ranging from H<SUB>2</SUB>-dominated to H<SUB>2</SUB>O-dominated atmospheres
    with equilibrium temperatures (T <SUB>eq</SUB>) of 250—400 K. This study includes examples such as K2-18 b (T <SUB>eq</SUB>
    = 255 K), LP 791-18 c (T <SUB>eq</SUB> = 324 K), and TOI-270 d (T <SUB>eq</SUB> = 354 K). Our models indicate that the
    atmospheric CO<SUB>2</SUB>/CH<SUB>4</SUB> ratio can be used to infer the deep interior H<SUB>2</SUB>O/H<SUB>2</SUB> ratio.
    Applying this method to recent JWST observations, our findings suggest that K2-18 b likely has an interior that is 50%
    highly enriched in water, exceeding the water content in a 100 × Z <SUB>⊙</SUB> scenario and suggesting a planetary formation
    mechanism involving substantial accretion of ices. In contrast, our model suggests that approximately 25% of TOI-270 d's
    interior is composed of H<SUB>2</SUB>O, which aligns with the conventional metallicity framework with a metallicity higher
    than 100 × Z <SUB>⊙</SUB>. Furthermore, our models identify carbonyl sulfide (OCS) and sulfur dioxide (SO<SUB>2</SUB>)
    as strong indicators for temperate sub-Neptunes with at least 10% of their interior composed of water. These results provide
    a method to delineate the internal composition and formation mechanisms of temperate sub-Neptunes (T <SUB>eq</SUB> &lt;
    ∼ 500 K) via atmospheric characterization through transmission spectroscopy.
