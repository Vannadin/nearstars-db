- arxiv_id: '0906.3486'
  ads_bibcode: 2009PhDT.........2P
  title: Tools for discovering and characterizing extrasolar planets
  authors:
  - Pál, András
  year: '2009'
  pubdate: '2009-06-00'
  doi: 10.48550/arXiv.0906.3486
  abstract: 'Among the group of extrasolar planets, transiting planets provide a great opportunity to obtain direct measurements
    for the basic physical properties, such as mass and radius of these objects. These planets are therefore highly important
    in the understanding of the evolution and formation of planetary systems: from the observations of photometric transits,
    the interior structure of the planet and atmospheric properties can also be constrained. The most efficient way to search
    for transiting extrasolar planets is based on wide-field surveys by hunting for short and shallow periodic dips in light
    curves covering quite long time intervals. These surveys monitor fields with several degrees in diameter and tens or hundreds
    of thousands of objects simultaneously. In the practice of astronomical observations, surveys of large field-of-view are
    rather new and therefore require special methods for photometric data reduction that have not been used before. Since
    2004, I participate in the HATNet project, one of the leading initiatives in the competitive search for transiting planets.
    Due to the lack of software solution which is capable to handle and properly reduce the yield of such a wide-field survey,
    I have started to develop a new package designed to perform the related data processing and analysis. After several years
    of improvement, the software package became suffi ciently robust and played a key role in the discovery of several transiting
    planets. In addition, various new algorithms for data reduction had to be developed, implemented and tested which were
    relevant during the reduction and the interpretation of data. In this PhD thesis, I summarize my efforts related to the
    development of a complete software solution for high precision photometric reduction of astronomical images. I also demonstrate
    the role of this newly developed package and the related algorithms in the case of particular discoveries of the HATNet
    project.'
