  doi: 10.1051/0004-6361/202245440
  abstract: 'Context. Several planetary formation models have been proposed to explain the observed abundance and variety
    of compositions of super-Earths and mini-Neptunes. In this context, multitransiting systems orbiting low-mass stars whose
    planets are close to the radius valley are benchmark systems, which help to elucidate which formation model dominates.
    <BR /> Aims: We report the discovery, validation, and initial characterization of one such system, TOI-2096 (TIC 142748283),
    a two-planet system composed of a super-Earth and a mini-Neptune hosted by a mid-type M dwarf located 48 pc away. <BR
    /> Methods: We characterized the host star by combining optical spectra, analyzing its broadband spectral energy distribution,
    and using evolutionary models for low-mass stars. Then, we derived the planetary properties by modeling the photometric
    data from TESS and ground-based facilities. In addition, we used archival data, high-resolution imaging, and statistical
    validation to support our planetary interpretation. <BR /> Results: We found that the stellar properties of TOI-2096 correspond
    to a dwarf star of spectral type M4±0.5. It harbors a super-Earth (R = 1.24 ± 0.07 R<SUB>⊕</SUB>) and a mini-Neptune (R
    = 1.90 ± 0.09 R<SUB>⊕</SUB>) in likely slightly eccentric orbits with orbital periods of 3.12 d and 6.39 d, respectively.
    These orbital periods are close to the first-order 2:1 mean-motion resonance (MMR), a configuration that may lead to measurable
    transit timing variations (TTVs). We computed the expected TTVs amplitude for each planet and found that they might be
    measurable with high-precision photometry delivering mid-transit times with accuracies of ≲2 min. Moreover, we conclude
    that measuring the planetary masses via radial velocities (RVs) could also be possible. Lastly, we found that these planets
    are among the best in their class to conduct atmospheric studies using the NIRSpec/Prism onboard the James Webb Space
    Telescope (JWST). <BR /> Conclusions: The properties of this system make it a suitable candidate for further studies,
    particularly for mass determination using RVs and/or TTVs, decreasing the scarcity of systems that can be used to test
    planetary formation models around low-mass stars.'
