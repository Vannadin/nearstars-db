  ads_bibcode: 2021EPJST.230.2265K
  title: 'Expert habitat: a colonization conjecture for exoplanetary habitability via penalized multi-objective optimization-based
    candidate validation'
  authors:
  - Khaidem, Luckyson
  - Saha, Snehanshu
  - Kar, Saibal
  - Mathur, Archana
  - Saha, Sriparna
  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.1140/epjs/s11734-021-00208-8
  abstract: The rate at which interstellar habitable planets are being discovered would naturally warrant consideration and
    exploration of a number of related issues. While the physical conditions that can support persistent contact demand structural
    similarity of an extra-solar planet (exoplanet) to Earth, and the necessary bio-chemical conditions needed to sustain
    life, potential for interstellar trade and extraction remain valid nonetheless. Based on the aspects that are commonly
    referred to as Earth similarity and habitability, we propose a novel bi-objective optimization framework as a tool to
    measure Earth similarity score (CDHS). This is followed by conjectures on possible interactions between Earth similarity
    and habitability, via two variants of penalized multi-objective particle swarm optimization, namely speed constrained
    multi-objective PSO (SMPSO) and a novel variant of multi-objective quantum PSO (MOQPSO). The optimization framework dispenses
    of classical gradient descent/ascent approach (GD/GA) by replacing it with SMPSO and MOQPSO. The approach to the input-output
    relations commonly adopted in production economics can be a natural influence for modeling habitability in exoplanets.
    An insightful demonstration establishes this claim. The scores reveal potentially habitable planets for interstellar trade.
    An analytical model of colonization in an exoplanet is also presented where we derive conditions for interstellar resource
    extraction and the volume of trade as function of time.
