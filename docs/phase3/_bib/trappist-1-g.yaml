  title: Exoplanet Classification and Yield Estimates for Direct Imaging Missions
  authors:
  - Kopparapu, Ravi Kumar
  - Hébrard, Eric
  - Belikov, Rus
  - Batalha, Natalie M.
  - Mulders, Gijs D.
  - Stark, Chris
