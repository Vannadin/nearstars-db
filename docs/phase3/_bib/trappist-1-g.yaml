- arxiv_id: '1512.04341'
  ads_bibcode: 2016Natur.529...59S
  title: A continuum from clear to cloudy hot-Jupiter exoplanets without primordial water depletion
  authors:
  - Sing, David K.
  - Fortney, Jonathan J.
