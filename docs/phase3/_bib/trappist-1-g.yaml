  abstract: A new speckle and wide-field imaging instrument for the WIYN telescope called NN-EXPLORE Exoplanet Stellar Speckle
    Imager (NESSI) is described. NESSI offers simultaneous two-color diffraction-limited imaging and wide-field traditional
    imaging for validation and characterization of transit and precision RV exoplanet studies. Many exoplanet targets will
    come from the NASA K2 and Transiting Exoplanet Survey Satellite (TESS) missions. NESSI is capable of resolving close binaries
