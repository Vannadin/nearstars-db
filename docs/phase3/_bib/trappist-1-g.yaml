- &id1349
  arxiv_id: null
  ads_bibcode: 2015JGRE..120.1528K
  title: Tidal resonance in icy satellites with subsurface oceans
  authors:
  - Kamata, Shunichi
  - Matsuyama, Isamu
  - Nimmo, Francis
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1002/2015JE004821
  abstract: Tidal dissipation is a major heat source for the icy satellites of the giant planets. Several icy satellites likely
    possess a subsurface ocean underneath an ice shell. Previous studies of tidal dissipation on icy satellites, however,
    have either assumed a static ocean or ignored the effect of the ice lid on subsurface ocean dynamics. In this study, we
    examine inertial effects on tidal deformation of satellites with a dynamic ocean overlain by an ice lid based on viscoelasto-gravitational
    theory. Although ocean dynamics is treated in a simplified fashion, we find a resonant configuration when the phase velocity
    of ocean gravity waves is similar to that of the tidal bulge. This condition is achieved when a subsurface ocean is thin
    (&lt;1 km). The enhanced deformation (increased h<SUB>2</SUB> and k<SUB>2</SUB> Love numbers) near the resonant configuration
    would lead to enhanced tidal heating in the solid lid. A static ocean formulation gives an accurate result only if the
    ocean thickness is much larger than the resonant thickness. The resonant configuration strongly depends on the properties
    of the shell, demonstrating the importance of the presence of a shell on tidal dissipation.
