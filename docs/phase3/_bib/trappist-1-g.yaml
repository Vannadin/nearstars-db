  arxiv_id: '1511.09348'
  ads_bibcode: 2016A&A...585L...2S
  title: Energy-limited escape revised. The transition from strong planetary winds to stable thermospheres
  authors:
  - Salz, M.
  - Schneider, P. C.
  - Czesla, S.
  - Schmitt, J. H. M. M.
  year: '2016'
  pubdate: '2016-01-00'
  doi: 10.1051/0004-6361/201527042
  abstract: Gas planets in close proximity to their host stars experience photoevaporative mass loss. The energy-limited escape
    concept is generally used to derive estimates for the planetary mass-loss rates. Our photoionization hydrodynamics simulations
    of the thermospheres of hot gas planets show that the energy-limited escape concept is valid only for planets with a gravitational
    potential lower than log <SUB>10</SUB>(-Φ<SUB>G</SUB>)&lt; 13.11 erg g<SUP>-1</SUP> because in these planets the radiative
    energy input is efficiently used to drive the planetary wind. Massive and compact planets with log <SUB>10</SUB>(-Φ<SUB>G</SUB>)
    ≳ 13.6 erg g<SUP>-1</SUP> exhibit more tightly bound atmospheres in which the complete radiative energy input is re-emitted
    through hydrogen Lyα and free-free emission. These planets therefore host hydrodynamically stable thermospheres. Between
    these two extremes the strength of the planetary winds rapidly declines as a result of a decreasing heating efficiency.
    Small planets undergo enhanced evaporation because they host expanded atmospheres that expose a larger surface to the
    stellar irradiation. We present scaling laws for the heating efficiency and the expansion radius that depend on the gravitational
    potential and irradiation level of the planet. The resulting revised energy-limited escape concept can be used to derive
    estimates for the mass-loss rates of super-Earth-sized planets as well as massive hot Jupiters with hydrogen-dominated
    atmospheres.
