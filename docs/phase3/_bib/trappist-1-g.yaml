- &id1085
  arxiv_id: '1507.01343'
  ads_bibcode: 2015A&A...580A..30T
  title: Elemental ratios in stars vs planets
  authors:
  - Thiabaud, Amaury
  - Marboeuf, Ulysse
  - Alibert, Yann
  - Leya, Ingo
  - Mezger, Klaus
  year: '2015'
  pubdate: '2015-08-00'
  doi: 10.1051/0004-6361/201525963
  abstract: 'Context. The chemical composition of planets is an important constraint for planet formation and subsequent differentiation.
    While theoretical studies try to derive the compositions of planets from planet formation models in order to link the
    composition and formation process of planets, other studies assume that the elemental ratios in the formed planet and
    in the host star are the same. <BR /> Aims: Using a chemical model combined with a planet formation model, we aim to link
    the composition of stars with solar mass and luminosity with the composition of the hosted planets. For this purpose,
    we study the three most important elemental ratios that control the internal structure of a planet: Fe/Si, Mg/Si, and
    C/O. <BR /> Methods: A set of 18 different observed stellar compositions was used to cover a wide range of these elemental
    ratios. The Gibbs energy minimization assumption was used to derive the composition of planets, taking stellar abundances
    as proxies for nebular abundances, and to generate planets in a self-consistent planet formation model. We computed the
    elemental ratios Fe/Si, Mg/Si and C/O in three types of planets (rocky, icy, and giant planets) formed in different protoplanetary
    discs, and compared them to stellar abundances. <BR /> Results: We show that the elemental ratios Mg/Si and Fe/Si in planets
    are essentially identical to those in the star. Some deviations are shown for planets that formed in specific regions
    of the disc, but the relationship remains valid within the ranges encompassed in our study. The C/O ratio shows only a
    very weak dependence on the stellar value. <P />Appendix A is available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201525963/olm">http://www.aanda.org</A>'
