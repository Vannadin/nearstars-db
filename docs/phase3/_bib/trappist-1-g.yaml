- &id688
  arxiv_id: '2307.16015'
  ads_bibcode: 2023AJ....166...92S
  title: Measuring the Temperature of Starspots from Multi-filter Photometry
  authors:
  - Schutte, Maria C.
  - Hebb, Leslie
  - Wisniewski, John P.
  - Cañas, Caleb I.
  - Libby-Roberts, Jessica E.
  - Lin, Andrea S. J.
  - Robertson, Paul
  - Stefánsson, Gumundur
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.3847/1538-3881/ace59c
  abstract: Using simultaneous multi-filter observations during the transit of an exoplanet around a K dwarf star, we determine
    the temperature of a starspot through modeling the radius and position with wavelength-dependent spot contrasts. We model
    the spot using the starspot modeling program STarSPot (STSP), which uses the transiting companion as a knife-edge probe
    of the stellar surface. The contrast of the spot, i.e., the ratio of the integrated flux of a darker spot region to the
    star's photosphere, is calculated for a range of filters and spot temperatures. We demonstrate this technique using simulated
    data of HAT-P-11, a K dwarf (T <SUB>eff</SUB> = 4780 K) with well-modeled starspot properties for which we obtained simultaneous
    multi-filter transits using Las Cumbres Observatory's MuSCAT3 instrument on the 2m telescope at Haleakala Observatory,
    which allows for simultaneous, multi-filter, diffuser-assisted high-precision photometry. We determine the average (i.e.,
    a combination of penumbra and umbra) spot temperature for HAT-P-11's spot complexes is 4500 K ± 100 K using this technique.
    We also find for our set of filters that comparing the SDSS ${g}^{{\prime} }$ and ${i}^{{\prime} }$ filters maximizes
    the signal difference caused by a large spot in the transit. Thus, this technique allows for the determination of the
    average spot temperature using only one spot occultation in transit and can provide simultaneous information on the spot
    temperature and spot properties.
