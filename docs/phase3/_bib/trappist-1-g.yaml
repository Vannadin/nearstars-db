- &id360
  arxiv_id: '1311.0972'
  ads_bibcode: 2014ApJ...792...18T
  title: Atmospheric Escape by Magnetically Driven Wind from Gaseous Planets
  authors:
  - Tanaka, Yuki A.
  - Suzuki, Takeru K.
  - Inutsuka, Shu-ichiro
  year: '2014'
  pubdate: '2014-09-00'
  doi: 10.1088/0004-637X/792/1/18
  abstract: 'We calculate the mass loss driven by magnetohydrodynamic (MHD) waves from hot Jupiters by using MHD simulations
    in one-dimensional flux tubes. If a gaseous planet has a magnetic field, MHD waves are excited by turbulence at the surface,
    dissipate in the upper atmosphere, and drive gas outflows. Our calculation shows that mass-loss rates are comparable to
    the observed mass-loss rates of hot Jupiters; therefore, it is suggested that gas flow driven by MHD waves can play an
    important role in the mass loss from gaseous planets. The mass-loss rate varies dramatically with the radius and mass
    of a planet: a gaseous planet with a small mass but an inflated radius produces a very large mass-loss rate. We also derive
    an analytical expression for the dependence of mass-loss rate on planet radius and mass that is in good agreement with
    the numerical calculation. The mass-loss rate also depends on the amplitude of the velocity dispersion at the surface
    of a planet. Thus, we expect to infer the condition of the surface and the internal structure of a gaseous planet from
    future observations of mass-loss rate from various exoplanets.'
  source: citation_of=2023MNRAS.525.5168M
