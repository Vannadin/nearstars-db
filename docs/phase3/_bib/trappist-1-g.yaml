  ads_bibcode: 2015RSEnv.166..243W
  title: 'Global retrieval of marine and terrestrial chlorophyll fluorescence at its red peak using hyperspectral top of atmosphere
    radiance measurements: Feasibility study and first results'
  authors:
  - Wolanin, A.
  - Rozanov, V. V.
  - Dinter, T.
  - Noël, S.
  - Vountas, M.
  - Burrows, J. P.
