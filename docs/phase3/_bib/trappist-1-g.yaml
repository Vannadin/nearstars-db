  abstract: We present the evolution of the atmospheric variables that affect planetary climate by increasing the obliquity
    by using a general circulation model (PlaSim) coupled to a slab ocean with mixed layer flux correction. <P />We increase
    the obliquity between 30° and 90° in 16 aquaplanets with liquid sea surface and perform the simulation allowing the sea
    ice cover formation to be a consequence of its atmospheric dynamics. <P />Insolation is maintained constant in each experiment,
    but changing the obliquity affects the radiation budget and the large scale circulation. Earth-like atmospheric dynamics
    is observed for planets with obliquity under 54°. Above this value, the latitudinal temperature gradient is reversed giving
    place to a new regime of jet streams, affecting the shape of Hadley and Ferrel cells and changing the position of the
    InterTropical Convergence Zone. <P />As humidity and high temperatures determine Earth's habitability, we introduce the
    wet bulb temperature as an atmospheric index of habitability for Earth-like aquaplanets with above freezing temperatures.
    The aquaplanets are habitable all year round at all latitudes for values under 54°; above this value habitability decreases
    toward the poles due to high temperatures.
