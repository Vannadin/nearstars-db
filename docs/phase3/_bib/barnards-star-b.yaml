  title: 'Transforming Glycoscience: A Roadmap for the Future'
  authors:
  - National Research Council
  year: '2012'
  pubdate: '2012-08-00'
  doi: 10.17226/13446
  abstract: 'A new focus on glycoscience, a field that explores the structures and functions of sugars, promises great advances
    in areas as diverse as medicine, energy generation, and materials science, this report finds. Glycans—also known as carbohydrates,
    saccharides, or simply as sugars—play central roles in many biological processes and have properties useful in an array
    of applications. However, glycans have received little attention from the research community due to a lack of tools to
    probe their often complex structures and properties. Transforming Glycoscience: A Roadmap for the Future presents a roadmap
    for transforming glycoscience from a field dominated by specialists to a widely studied and integrated discipline, which
    could lead to a more complete understanding of glycans and help solve key challenges in diverse fields.'
