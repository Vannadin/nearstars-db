  ads_bibcode: 2012nap..book13516N
  title: Determining Core Capabilities in Chemical and Biological Defense Science and Technology
  authors:
  - National Research Council
  year: '2012'
  pubdate: '2012-09-00'
  doi: 10.17226/13516
  abstract: The goal of the U.S. Department of Defense's (DoD's) Chemical and Biological Defense Program (CBDP) is to provide
    support and world-class capabilities enabling he U.S. Armed Forces to fight and win decisively in chemical, biological,
    radiological, and nuclear (CBRN) environments. To accomplish this objective, the CBDP must maintain robust science and
    technology capabilities to support the research, development, testing, and evaluation required for the creation and validation
    of the products the program supplies. The threat from chemical and biological attack evolves due to the changing nature
    of conflict and rapid advances in science and technology (S&T), so the core S&T capabilities that must be maintained by
    the CBDP must also continue to evolve. In order to address the challenges facing the DoD, the Deputy Assistant Secretary
    of Defense (DASD) for Chemical and Biological Defense (CBD) asked the National Research Council (NRC) to conduct a study
    to identify the core capabilities in S&T that must be supported by the program. The NRC Committee on Determining Core
    Capabilities in Chemical and Biological Defense Research and Development examined the capabilities necessary for the chemical
    and biological defense S&T program in the context of the threat and of the program's stated mission and priorities. Determining
    Core Capabilities in Chemical and Biological Defense Science and Technology contains the committee's findings and recommendations.
    It is intended to assist the DASD CBD in determining the best strategy for acquiring, developing, and/or maintaining the
    needed capabilities.
