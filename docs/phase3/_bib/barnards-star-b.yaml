  title: One-dimensional gradient-index metrology based on ray slope measurements using a bootstrap algorithm
  authors:
  - Lin, Di
  - Leger, James R.
  - Kunkel, Mint
  - McCarthy, Peter
  year: '2013'
  pubdate: '2013-11-00'
  doi: 10.1117/1.OE.52.11.112108
  abstract: The refractive index profile of one-dimensional gradient-index (GRIN) samples can be measured using the incident
    and exit beam angles of multiple beams passing through the sample at different positions along the index gradient. Beginning
    from a region of known refractive index, the collective angular deflection measurement of multiple beams is bootstrapped
    to compute the index profile of the entire sample. An alternative method using an approximate beam displacement model
    and a corrective algorithm is also presented. The two techniques are used to measure the index profile of a thick GRIN
    sample, and experimental results show good agreement with a maximum discrepancy of 1.5×10<SUP>-3</SUP> in the calculated
    index. An index accuracy of 5×10<SUP>-4</SUP> is predicted for the bootstrap method employing typical micron-level spatial
    measurements.
