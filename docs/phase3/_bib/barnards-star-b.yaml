  abstract: Drug administration is an unavoidable part of treatment. When a drug is administered orally or intravenously,
    it gets absorbed into the blood stream. The rate and efficiency of absorption depend on the route of administration. When
    a drug is administered through the oral route, it penetrates the epithelial cells of the intestinal mucosa. The diffusion
    of the drug into the blood stream depends on various parameters, such as concentration, temperature, and the nature of
    the mucous membrane. The passive diffusion of drugs is found to obey Fick's law. Water soluble drugs penetrate the cell
    membrane through aqueous channel or pores. Hence, the study of diffusion of drugs into the water and finally into the
    blood stream is important. An attempt has been made to study the diffusion of the drug in water as 60% to 80% of human
    body is water. For the study of drug diffusion in water, a commonly used cough syrup of specific gravity 1.263 is used.
