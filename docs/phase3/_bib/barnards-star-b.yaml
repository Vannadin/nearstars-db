    mass limits increasing the (lightest) stop mass beyond 1.2 TeV, the gluino mass above 3 TeV, and electroweak charginos
    and neutralinos beyond 400 GeV for a combined tuning better than 5%. This implies that the natural region of parameter
    space for the scale-invariant NMSSM will be fully explored at the 14 TeV LHC.
