  abstract: The field of exoplanet research is changing. Detections in large numbers and amazing discoveries are gradually
    giving way to the detailed characterisation of these discovered planets. In particular, atmospheric characterisation is
    an area developing rapidly, but mostly limited up to now to giant planets. It is expected, though, that studying the atmospheres
    of rocky planets, similar to Earth, will become feasible in the near future. In this contribution we show the advantages
