  ads_bibcode: 2026arXiv260211085G
  title: Sterile neutrino dark matter in conformal Majoron models
  authors:
  - Gonçalves, João
  - Marfatia, Danny
  - Morais, António P.
  - Oliveira, Vinícius
  - Pasechnik, Roman
  year: '2026'
