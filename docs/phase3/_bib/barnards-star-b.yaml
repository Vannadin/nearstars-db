  ads_bibcode: 2011nap..book13130N
  title: 'Life Sciences and Related Fields: Trends Relevant to the Biological Weapons Convention'
  authors:
  - National Research Council
  year: '2011'
  pubdate: '2011-10-00'
  doi: 10.17226/13130
  abstract: 'During the last decade, national and international scientific organizations have become increasingly engaged
    in considering how to respond to the biosecurity implications of developments in the life sciences and in assessing trends
    in science and technology (S&T) relevant to biological and chemical weapons nonproliferation. The latest example is an
    international workshop, Trends in Science and Technology Relevant to the Biological Weapons Convention, held October 31
    - November 3, 2010 at the Institute of Biophysics of the Chinese Academy of Sciences in Beijing. Life Sciences and Related
    Fields summarizes the workshop, plenary, and breakout discussion sessions held during this convention. Given the immense
    diversity of current research and development, the report is only able to provide an overview of the areas of science
    and technology the committee believes are potentially relevant to the future of the Biological and Toxic Weapons Convention
    (BWC), although there is an effort to identify areas that seemed particularly ripe for further exploration and analysis.
    The report offers findings and conclusions organized around three fundamental and frequently cited trends in S&T that
    affect the scope and operation of the convention: The rapid pace of change in the life sciences and related fields; The
    increasing diffusion of life sciences research capacity and its applications, both internationally and beyond traditional
    research institutions; and The extent to which additional scientific and technical disciplines beyond biology are increasingly
