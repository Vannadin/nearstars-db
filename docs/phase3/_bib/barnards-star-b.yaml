  ads_bibcode: 2013nap..book18356N
  title: 'Developing Capacities for Teaching Responsible Science in the MENA Region: Refashioning Scientific Dialogue'
  authors:
  - National Research Council
  year: '2013'
  pubdate: '2013-06-00'
  doi: 10.17226/18356
  abstract: 'Spurred on by new discoveries and rapid technological advances, the capacity for life science research is expanding
    across the globe—and with it comes concerns about the unintended impacts of research on the physical and biological environment,
    human well-being, or the deliberate misuse of knowledge, tools, and techniques to cause harm. This report describes efforts
    to address dual use issues by developing institutes around the world that will help life sciences faculty learn to teach
    about the responsible conduct of science. Based on the successful National Academies Summer Institute for Undergraduate
    Biology Education and on previous NRC reports on effective methods for teaching about dual use issues, the report''s authoring
    committee designed a general framework for the faculty institutes and chose the Middle East-North Africa (MENA) region
    to test a prototype faculty institute. In September 2012, the first Institute was held in Aqaba, Jordan, bringing together
    28 participants from Algeria, Egypt, Jordan, Libya, and Yemen to engage with effective, evidence-based teaching methods,
    develop curricular materials for use in their own classrooms, and become community leaders on dual use and related topics.
    Developing Capacities for Teaching Responsible Science in the MENA Region: Refashioning Scientific Dialogue offers insights
    from the institute that will help in the design and implementation of future programs in the MENA region, and in other
    parts of the world.'
