  abstract: In the framework of the MSSM, we examine several simplified models where only a few superpartners are light. This
    allows us to study WIMP-nucleus scattering in terms of a handful of MSSM parameters and thereby scrutinize their impact
    on dark matter direct-detection experiments. Focusing on spin-independent WIMP-nucleon scattering, we derive simplified,
