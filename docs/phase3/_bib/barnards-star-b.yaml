- arxiv_id: '2304.11549'
  ads_bibcode: 2023arXiv230411549S
  title: Spectral Sensitivity Estimation Without a Camera
  authors:
  - Solomatov, Grigory
  - Akkaynak, Derya
  year: '2023'
  pubdate: '2023-04-00'
  doi: 10.48550/arXiv.2304.11549
  abstract: 'A number of problems in computer vision and related fields would be mitigated if camera spectral sensitivities
    were known. As consumer cameras are not designed for high-precision visual tasks, manufacturers do not disclose spectral
    sensitivities. Their estimation requires a costly optical setup, which triggered researchers to come up with numerous
    indirect methods that aim to lower cost and complexity by using color targets. However, the use of color targets gives
    rise to new complications that make the estimation more difficult, and consequently, there currently exists no simple,
    low-cost, robust go-to method for spectral sensitivity estimation. Furthermore, even if not limited by hardware or cost,
    researchers frequently work with imagery from multiple cameras that they do not have in their possession. To provide a
    practical solution to this problem, we propose a framework for spectral sensitivity estimation that not only does not
    require any hardware, but also does not require physical access to the camera itself. Similar to other work, we formulate
    an optimization problem that minimizes a two-term objective function: a camera-specific term from a system of equations,
