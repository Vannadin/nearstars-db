  ads_bibcode: 2014nap..book18616N
  title: 'Technological Challenges in Antibiotic Discovery and Development: A Workshop Summary'
  authors:
  - National Research Council
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.17226/18616
  abstract: Technological Challenges in Antibiotic Discovery and Development is the summary of a workshop convened by the
    Chemical Sciences Roundtable in September 2013 to explore the current state of antibiotic discovery and examine the technology
    available to facilitate development. Through formal presentations and panel discussions, participants from academia, industry,
    federal research agencies discussed the technical challenges present and the incentives and disincentives industry faces
    in antibiotic development, and identified novel approaches to antibiotic discovery. Antibiotic resistance is a serious
    and growing problem in modern medicine and it is emerging as a pre-eminent public health threat. Each year in the United
    States alone, at least two million acquire serious infections with bacteria that are resistant to one or more antibiotics,
    and at least 23,000 people die annually as a direct result of these antibiotic-resistant infections. In addition to the
    toll on human life, antibiotic-resistant infections add considerable and avoidable costs to the already overburdened U.S.
    health care system. This report explores the challenges in overcoming antibiotic resistance, screening for new antibiotics,
    and delivering them to the sites of infection in the body. The report also discusses a path forward to develop the next
    generation of potent antimicrobial compounds capable of once again tilting the battle against microbial pathogens in favor
    of humans. Technological Challenges in Antibiotic Discovery and Development gives a broad view of the landscape of antibiotic
    development and the technological challenges and barriers to be overcome.
