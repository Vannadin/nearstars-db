  abstract: Recently, various studies have been proposed for mass transfer coefficient, mainly motivated by a broad application
    such as oil transfer and liquid-liquid interdiffusion. On the other hand, increasing sensitivity and signal to noise ratio
    of conventional laser beam deflection measurement system is an interesting topic in structure material and instrumentation
    research. In this work, an enhanced laser beam deflection measurement system was constructed to determine the diffusion
    coefficient of liquid-liquid material, and it worked well based on the Wiener method. Sodium chloride aqueous solution
    and distilled water were poured in a glass cell abd then illuminated by the laser beam tilted 45° to the vertical, exhibiting
    a reflection of straight line light on the screen. The reflection pattern on screen was captured by camera and processed.
    Image processing and calculation have been completed to determine refractive index gradient and the diffusion coefficient.
    Furthermore, the diffusion coefficient of Sodium chloride is found to be in a good agreement with coefficient values specified
    in the literature.
