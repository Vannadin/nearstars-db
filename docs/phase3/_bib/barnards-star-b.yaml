  title: Effects of culture conditions on the sensitivity of a phoxocephalid amphipod, rhepoxynius abronius, to cadmium in
    sediment
  authors:
  - Robinson, Anja M.
  - Lamberson, Janet O.
  - Cole, Faith A.
