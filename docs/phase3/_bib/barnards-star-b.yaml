  abstract: A brief review is given of the implications of a 126 GeV Higgs boson for the discovery of supersymmetry. Thus
    a 126 GeV Higgs boson is problematic within the Standard Model because of vacuum instability pointing to new physics beyond
    the Standard Model. The problem of vacuum stability is overcome in the SUGRA GUT model but the 126 GeV Higgs mass implies
    that the average SUSY scale lies in the several TeV region. The largeness of the SUSY scale relieves the tension on SUGRA
    models since it helps suppress flavor changing neutral currents and CP violating effects and also helps in extending the
    proton life time arising from baryon and lepton number violating dimension five operators. The geometry of radiative breaking
    of the electroweak symmetry and fine tuning in view of the large SUSY scale are analyzed.Consistency with the Brookhaven
    $g_{\mu}-2$ result is discussed. It is also shown that a large SUSY scale implied by the 126 GeV Higgs boson mass allows
    for light gauginos (gluino, charginos, neutralinos) and sleptons. These along with the lighter third generation squarks
    are the prime candidates for discovery at RUN II of the LHC. Implication of the 126 GeV Higgs boson for the direct search
    for dark matter is discussed. Also discussed are the sparticles mass hierarchies and their relationship with the simplified
    models under the Higgs boson mass constraint.
