- arxiv_id: '2310.07482'
  ads_bibcode: 2023PhRvD.108j3519W
  title: Underdetermination of dark energy
  authors:
  - Wolf, William J.
  - Ferreira, Pedro G.
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.1103/PhysRevD.108.103519
  abstract: There is compelling evidence that the Universe is undergoing a late phase of accelerated expansion. One of the
    simplest explanations for this behavior is the presence of dark energy. A plethora of microphysical models for dark energy
    have been proposed. The hope is that, with the ever increasing precision of cosmological surveys, it will be possible
    to precisely pin down the model. We show that this is unlikely and that, at best, we will have a phenomenological description
    for the microphysics of dark energy. Furthermore, we argue that the current phenomenological prescriptions are ill-equipped
    for shedding light on the fundamental theory of dark energy.
