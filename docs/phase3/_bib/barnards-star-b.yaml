  ads_bibcode: 2015JEI....24e3005C
  title: Modeling a color-rendering operator for high dynamic range images using a cone-response function
  authors:
  - Choi, Ho-Hyoung
  - Kim, Gi-Seok
  - Yun, Byoung-Ju
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1117/1.JEI.24.5.053005
  abstract: Tone-mapping operators are the typical algorithms designed to produce visibility and the overall impression of
    brightness, contrast, and color of high dynamic range (HDR) images on low dynamic range (LDR) display devices. Although
    several new tone-mapping operators have been proposed in recent years, the results of these operators have not matched
    those of the psychophysical experiments based on the human visual system. A color-rendering model that is a combination
    of tone-mapping and cone-response functions using an XYZ tristimulus color space is presented. In the proposed method,
    the tone-mapping operator produces visibility and the overall impression of brightness, contrast, and color in HDR images
    when mapped onto relatively LDR devices. The tone-mapping resultant image is obtained using chromatic and achromatic colors
    to avoid well-known color distortions shown in the conventional methods. The resulting image is then processed with a
    cone-response function wherein emphasis is placed on human visual perception (HVP). The proposed method covers the mismatch
    between the actual scene and the rendered image based on HVP. The experimental results show that the proposed method yields
    an improved color-rendering performance compared to conventional methods.
