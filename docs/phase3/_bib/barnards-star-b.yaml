  title: A study of vignetting correction methods in camera colorimetric calibration
  authors:
  - Kordecki, Andrzej
  - Bal, Artur
  - Palus, Henryk
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1117/12.2268532
  abstract: The procedure of colorimetric calibration of the camera ensures accurate and repeatable acquisition of the scene
    colors. The most common approach defines the calibration only as the color transformation between the camera image colors
    and colorimetric colors. The only condition for image acquisition is an uniform illumination of the scene. Unfortunately,
    such assumption does not include many distortions caused by image acquisition. One of them is a vignetting, which can
    be described as a decrease of the light intensity from the image center to the image corners. This phenomenon causes the
    same effects as non-uniform illumination, which is the change of color values of the same object depending on image coordinates.
    This paper is an attempt to analyze the influence of vignetting correction on the results of the camera colorimetric calibration.
    The conducted experiment in uniform light conditions shows that the improvement of calibration quality depends on the
    chosen vignetting correction method.
