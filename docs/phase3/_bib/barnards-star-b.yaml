  arxiv_id: null
  ads_bibcode: 2019ESS.....431110G
  title: 'A Planet of Ice and Fire — Barnard Star b : Life beyond the Snowline?'
  authors:
  - Guinan, Edward
  - Engle, Scott G.
  - Ribas, Ignasi
  year: '2019'
  pubdate: '2019-08-00'
  doi: null
  abstract: Barnard's Star (M3.5V; 5.98 ly) was recently discovered to host a super-Earth with a minimum mass of 3.23M<SUB>E</SUB>,
    P<SUB>orb</SUB> = 233-d, and a = 0.40 AU (Ribas et al. 2018). Barnard b is at nearly the same distance as Mercury (0.39
    AU) from the Sun. However, the M-star is faint (L/L<SUB>sun</SUB> = 0.0033) so that the planet receives only 2% of the
    solar radiation received by Earth. This corresponds to the equivalent amount of radiation received at roughly 7 AU from
    the Sun. Barnard b is cold (Teq 105 ±5 K; -168°C) and orbits well beyond the M-star's liquid water habitable zone (HZ),
    near the snowline. <P />Barnard b is a probable terrestrial (rocky) planet, and if water is present, it would be ice-covered
    and inhospitable to most life. However, as pointed out by Guinan et al. 2018, all hope for life on Barnard b may not be
    lost. Ehrenreich et al. (2006) studied the possibility that geothermal energy from a cold super-Earth planet (similar
    to Barnard b) could be sufficient to permit liquid water under its icy surface at least while young. Although the cold
    icy moons Europa and Enceladus have subsurface water, they are heated primarily from tidal energy. A closer analog for
    Barnard b may be be here on Earth. The sub-glacial Antarctic lakes (e.g. Lake Vostok) contain large inventories of liquid
    water (and maybe life?) and are heated by geothermal energy from the Earth's interior. <P />We discuss possibilities of
    liquid water (and potential life) on Barnard b and on other cold rocky planets.The amount of geothermal energy depends
    on several factors (most of which are not well known). These include mass, radius, age and composition &amp; internal
    structure of the planet. Also very important are the concentrations of radiogenic elements such as 238-U, 235-U, 232-Th
    &amp; 40-K and the primordial heat from the planet's formation. Because of its old age ( 9 Gyr) and depletion of some
    radiogenic elements, the best chance for liquid water (and niches for life) on Barnard b would be in subsurface lakes.
    We report on the initial results and its applications to other cold super-Earth planets. <P />This research is supported
    by grants from NASA for HST, Chandra and XMM-Newton.
