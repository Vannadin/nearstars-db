- arxiv_id: '2503.09196'
  ads_bibcode: 2025arXiv250309196G
  title: Uncertainty in the era of machine learning for atomistic modeling
  authors:
  - Grasselli, Federico
  - Chong, Sanggyu
  - Kapil, Venkat
  - Bonfanti, Silvia
