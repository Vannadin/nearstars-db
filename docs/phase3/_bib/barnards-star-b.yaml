    we find that for a mass splitting $\Delta M \sim 5-15$ GeV between bino (LSP) and wino (NLSP), the 14 TeV LHC with luminosity
    of 500$fb^{-1}$ can probe the wino up to 150 GeV (the sensitivity can reach $5\sigma$ for $\Delta M = 5$ GeV and $2\sigma$
    for $\Delta M = 15$ GeV). We also investigate the dark matter detection sensitivities for this scenario and find that
    the planned XENON-1T(2017) cannot fully cover the parameter space with wino below 150 GeV allowed by relic density and
    the LUX limits.
