  doi: 10.1117/1.JBO.21.10.107001
  abstract: Anemia associated with intestinal parasites and malnutrition is the leading cause of morbidity and mortality in
    small ruminants worldwide. Qualitative scoring of conjunctival redness has been developed so that farmers can gauge anemia
    in sheep and goats to identify animals that require treatment. For clinically relevant anemia diagnosis, complete blood
    count-comparable quantitative methods often rely on complicated and expensive optical instruments, requiring detailed
    spectral information of hemoglobin. We report experimental and numerical results for simple, yet reliable, noninvasive
    hemoglobin detection that can be correlated with laboratory-based blood hemoglobin testing for anemia diagnosis. In our
    pilot animal study using calves, we exploit the third eyelid (i.e., palpebral conjunctiva) as an effective sensing site.
    To further test spectrometer-free (or spectrometerless) hemoglobin assessments, we implement full spectral reconstruction
    from RGB data and partial least square regression. The unique combination of RGB-based spectral reconstruction and partial
    least square regression could potentially offer uncomplicated instrumentation and avoid the use of a spectrometer, which
    is vital for realizing a compact and inexpensive hematology device for quantitative anemia detection in the farm field.
