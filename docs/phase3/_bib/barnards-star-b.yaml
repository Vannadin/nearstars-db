  ads_bibcode: 2016JAHH...19..305S
  title: William Herschel's 'Hole in the Sky' and the discovery of dark nebulae
  authors:
  - Steinicke, Wolfgang
  year: '2016'
  pubdate: '2016-12-00'
  doi: null
  abstract: In 1785 William Herschel published a paper in the Philosophical Transactions containing the remarkable section
    "An opening or hole". It describes an unusual vacant place in Scorpius. This matter falls into oblivion until Caroline
    Herschel initiated a correspondence with her nephew John in 1833. It contains Herschel's spectacular words "Hier ist wahrhaftig
    ein Loch im Himmel" ("Here truly is a hole in the sky"). About a hundred years later, Johann Georg Hagen, Director of
    the Vatican Observatory, presented a spectacular candidate for the 'hole', discovered in 1857 by Angelo Secchi in Sagittarius
    and later catalogued by Edward E. Barnard as the dark nebula B 86. Hagen's claim initiated a debate, mainly in the Journal
    of the British Astronomical Association, about the identity of Herschel's 'object'. Though things could be partly cleared
    up, unjustified claims still remain. This is mainly due to the fact that original sources were not consulted. A comprehensive
    study of the curious 'hole' is presented here. It covers major parts of the epochal astronomical work of William, Caroline
    and John Herschel. This includes a general study of 'vacant places', found by William Herschel and others, and the speculations
    about their nature, eventually leading to the finding that dark nebulae are due to absorbing interstellar matter. Some
    of the 'vacant places' could be identified in catalogues of dark nebulae and this leads to a 'Herschel Catalogue of Dark
    Nebulae' - the first historic catalogue of its kind.
