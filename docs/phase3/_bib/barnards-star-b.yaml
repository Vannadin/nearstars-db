  ads_bibcode: 2012ChPhB..21k4701L
  title: Influence of polymer additives on turbulent energy cascading in forced homogeneous isotropic turbulence studied by
    direct numerical simulations
  authors:
  - Li, Feng-Chen
  - Cai, Wei-Hua
  - Zhang, Hong-Na
  - Wang, Yue
  year: '2012'
  pubdate: '2012-11-00'
  doi: 10.1088/1674-1056/21/11/114701
  abstract: Direct numerical simulations (DNS) were performed for the forced homogeneous isotropic turbulence (FHIT) with/without
    polymer additives in order to elaborate the characteristics of the turbulent energy cascading influenced by drag-reducing
    effects. The finite elastic non-linear extensibility-Peterlin model (FENE-P) was used as the conformation tensor equation
    for the viscoelastic polymer solution. Detailed analyses of DNS data were carried out in this paper for the turbulence
    scaling law and the topological dynamics of FHIT as well as the important turbulent parameters, including turbulent kinetic
    energy spectra, enstrophy and strain, velocity structure function, small-scale intermittency, etc. A natural and straightforward
    definition for the drag reduction rate was also proposed for the drag-reducing FHIT based on the decrease degree of the
    turbulent kinetic energy. It was found that the turbulent energy cascading in the FHIT was greatly modified by the drag-reducing
    polymer additives. The enstrophy and the strain fields in the FHIT of the polymer solution were remarkably weakened as
    compared with their Newtonian counterparts. The small-scale vortices and the small-scale intermittency were all inhibited
    by the viscoelastic effects in the FHIT of the polymer solution. However, the scaling law in a fashion of extended self-similarity
    for the FHIT of the polymer solution, within the presently simulated range of Weissenberg numbers, had no distinct differences
    compared with that of the Newtonian fluid case.
