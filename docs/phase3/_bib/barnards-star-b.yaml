    that feature a phantom crossing; although alternatives lacking this feature are disfavored, they cannot yet be ruled out.
    Our analysis confirms that the evidence for dynamical dark energy, particularly at low redshift (<inline-formula><mml:math><mml:mi>z</mml:mi><mml:mo>≲</mml:mo><mml:mn>0.3</mml:mn></mml:math></inline-formula>),
    is robust and stable under different modeling choices.
