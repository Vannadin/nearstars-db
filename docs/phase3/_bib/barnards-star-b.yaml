    remain extremely consistent across all assumed potentials. By implementing information criteria to assess their ability
    to fit the data, we do not find any evidence against thawing models, which in fact are statistically equivalent to Λ CDM
    , and the freezing ones are moderately disfavored. Through our analysis we place upper bounds on the slope of quintessence
    potentials, consequently revealing a strong tension with the recently proposed swampland criterion, finding the 2 σ upper
