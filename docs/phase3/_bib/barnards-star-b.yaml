  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.48550/arXiv.2503.09196
  abstract: The widespread adoption of machine learning surrogate models has significantly improved the scale and complexity
    of systems and processes that can be explored accurately and efficiently using atomistic modeling. However, the inherently
    data-driven nature of machine learning models introduces uncertainties that must be quantified, understood, and effectively
    managed to ensure reliable predictions and conclusions. Building upon these premises, in this Perspective, we first overview
    state-of-the-art uncertainty estimation methods, from Bayesian frameworks to ensembling techniques, and discuss their
    application in atomistic modeling. We then examine the interplay between model accuracy, uncertainty, training dataset
    composition, data acquisition strategies, model transferability, and robustness. In doing so, we synthesize insights from
    the existing literature and highlight areas of ongoing debate.
