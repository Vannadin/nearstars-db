  abstract: The effect of compressive stress on the oxidation kinetics and the revolution of the surface morphology formed
    on Ni-20Cr alloy was investigated at 900 °C. The study was carried out mainly by comparisons of surface morphology of
    oxidized samples observed by scanning electronic microscopy. And the oxidation kinetics curves were assessed by two kinds
