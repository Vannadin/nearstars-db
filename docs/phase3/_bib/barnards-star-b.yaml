  abstract: In some supersymmetric models like split supersymmetry or models with non-universal gaugino mass, bino (LSP) and
    winos (NLSP) may have rather small mass splitting in order to provide the correct dark matter relic density through bino/wino
    co-annihilation. Such a scenario with the compressed bino/wino is difficult to explore at the LHC. In this work we propose
    to probe this scenario from $pp \to j \tilde{\chi}^0_2 \tilde{\chi}^\pm_1$ followed by $\tilde{\chi}^0_2 \to \gamma \tilde{\chi}^0_1$
    and $\tilde{\chi}^\pm_1 \to W^{*}\tilde{\chi}^0_1\to \ell^\pm \nu \tilde{\chi}^0_1$ (this method is also applicable to
