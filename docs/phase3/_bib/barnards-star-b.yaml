  ads_bibcode: 2018arXiv181005385K
  title: Contactless photo-induced carrier density control in nanocrystal MoS2 hybrids
  authors:
  - Kriegel, Ilka
  - Borys, Nicholas J.
  - Zhang, Kehao
  - Jansons, Adam W.
  - Crockett, Brandon M.
  - Koskela, Kristopher M.
  - Barnard, Edward S.
