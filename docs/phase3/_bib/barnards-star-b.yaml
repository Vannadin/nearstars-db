  abstract: The quest for understanding the late-time acceleration is haunted by an immense freedom in the analysis of dynamical
    models for dark energy in extended parameter spaces. Oftentimes having no prior knowledge at our disposal, arbitrary choices
    are implemented to reduce the degeneracies between parameters. We also encounter this issue in the case of quintessence
    fields, where a scalar degree of freedom drives the late-time acceleration. In this study, we implement a more physical
    prescription, the flow condition, to fine-tune the quintessence evolution for several field potentials. We find that this
    prescription agrees well with the most recent catalogue of data, namely supernovae type Ia, baryon acoustic oscillations,
    cosmic clocks, and distance to the last scattering surface, and it enables us to infer the initial conditions for the
    field, both potential and cosmological parameters. At 2 σ we find stricter bounds on the potential parameters f /m<SUB>p
