- arxiv_id: '2601.09064'
  ads_bibcode: 2026arXiv260109064J
  title: Boson peak as a phenomenon participated by the vast majority of particles
  authors:
  - Jiang, Cunyuan
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.48550/arXiv.2601.09064
  abstract: The origin of the excess vibrational density of states (DOS) beyond Debye's theory in amorphous solids (often
    referred to as the Boson peak) has been attributed to the presence of quasi-localized vibrational modes in recent years.
    However, by dispersing the total DOS onto each degree of freedom (DOF), the results of this report provide evidence that
    \(99.9\%\) of DOFs, and hence almost all particles, contribute to the Boson peak (BP). These results challenge the prevailing
    opinion that BP is contributed by a minority of particles and highlight its long-neglected global and collective origin.
