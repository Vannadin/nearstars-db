  doi: 10.1103/PhysRevD.92.095021
  abstract: Light stops consistent with the Higgs boson mass of ∼126 GeV are investigated within the framework of minimal
    supergravity. It is shown that models with light stops which are also consistent with the thermal relic density constraints
    require stop coannihilation with the neutralino LSP. The analysis shows that the residual set of parameter points with
    light stops satisfying both the Higgs mass and the relic density constraints lie within a series of thin strips in the
    m<SUB>0</SUB>-m<SUB>1 /2</SUB> plane for different values of A<SUB>0</SUB>/m<SUB>0</SUB>. Consequently, this region of
    minimal supergravity parameter space makes a number of very precise predictions. It is found that light stops of mass
    down to 400 GeV or lower can exist consistent with all constraints. A signal analysis for this class of models at LHC
    run II is carried out and the dominant signals for their detection identified. Also computed is the minimum integrated
    luminosity for 5 σ discovery of the models analyzed. If supersymmetry is realized in this manner, the stop masses can
    be as low as 400 GeV or lower, and the mass gap between the lightest neutralino and lightest stop will be approximately
    30-40 GeV. We have optimized the ATLAS signal regions specifically for stop searches in the parameter space and find that
    a stop with mass ∼375 GeV can be discovered with as little as ∼60 fb<SUP>-1</SUP> of integrated luminosity at run II of
    the LHC; the integrated luminosity needed for discovery could be further reduced with more efficient signature analyses.
    The direct detection of dark matter in this class of models is also discussed. It is found that dark matter cross sections
    lie close to, but above, coherent neutrino scattering and would require multiton detectors such as LZ to see a signal
    of dark matter for this class of models.
