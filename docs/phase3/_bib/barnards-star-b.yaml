  abstract: Stringent experimental constraints have raised the lower limit on the masses of squarks to TeV levels, while compatibility
    with the mass of the Higgs boson provides an upper limit. This two-sided bound has lead to the emergence of Mini-Split
    theories where gauginos are not far removed from the electroweak scale while scalars are somewhat heavier. This small
    hierarchy modifies the spectrum of standard anomaly and gauge mediation, leading to Mini-Split deflected anomaly and gauge
