- &id071
  arxiv_id: '1612.06570'
  ads_bibcode: 2016arXiv161206570R
  title: Coronal activity cycles in action - X-rays from alpha Centauri A/B
  authors:
  - Robrade, J.
  - Schmitt, J. H. M. M.
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.48550/arXiv.1612.06570
  abstract: We report on the coronal activity cycles of our stellar neighbors alpha Centauri A/B. The binary has been monitored
    with XMM-Newton since 2002 to study the long-term evolution of coronal activity evolution in X-rays. The solar analog
    alpha Cen A was clearly detected early in the program, but virtually faded away from XMM's detectors view around 2005.
    After remaining nearly a decade in a state of coronal weakness, we now detect a clear re-brightening of its corona. The
    secondary alpha Cen B dominates the X-ray emission at most times and more than a full cycle is covered for this star.
    A new X-ray maximum was observed around 2012 that is again followed by gentle dimming over the recent years. The temporal
    evolution of the X-ray emission can be well understood, in analogy to the 11 year solar-cycle, by coronal activity cycles
    with different amplitudes and periods operating in both stars.
