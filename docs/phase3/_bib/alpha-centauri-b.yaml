- &id035
  arxiv_id: '1801.06131'
  ads_bibcode: 2018AJ....155..130Q
  title: Long-term Stability of Tightly Packed Multi-planet Systems in Prograde, Coplanar, Circumstellar Orbits within the
    α Centauri AB System
  authors:
  - Quarles, B.
  - Lissauer, Jack J.
  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.3847/1538-3881/aaa966
  abstract: We perform long-term simulations, up to ten billion years, of closely spaced configurations of 2-6 planets, each
    as massive as the Earth, traveling on nested orbits about either stellar component in α Centauri AB. The innermost planet
    initially orbits at either the inner edge of its star’s empirical habitable zone (HZ) or the inner edge of its star’s
    conservative HZ. Although individual planets on low inclination, low eccentricity, orbits can survive throughout the HZs
    of both stars, perturbations from the companion star require that the minimum spacing of planets in multi-planet systems
    within the HZs of each star must be significantly larger than the spacing of similar multi-planet systems orbiting single
    stars in order to be long-lived. The binary companion induces a forced eccentricity upon the orbits of planets in orbit
    around either star. Planets on appropriately phased circumstellar orbits with initial eccentricities equal to their forced
    eccentricities can survive on more closely spaced orbits than those with initially circular orbits, although the required
    spacing remains higher than for planets orbiting single stars. A total of up to nine planets on nested prograde orbits
    can survive for the current age of the system within the empirical HZs of the two stars, with five of these orbiting α
    Centauri B and four orbiting α Centauri A.
