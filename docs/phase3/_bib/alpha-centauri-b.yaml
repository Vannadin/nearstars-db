- &id077
  arxiv_id: '1502.04259'
  ads_bibcode: 2015A&A...577A..93P
  title: Coronae of stars with supersolar elemental abundances
  authors:
  - Peretz, Uria
  - Behar, Ehud
  - Drake, Stephen A.
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1051/0004-6361/201424769
  abstract: 'Coronal elemental abundances are known to deviate from the photospheric values of their parent star, with the
    degree of deviation depending on the first ionization potential (FIP). This study focuses on the coronal composition of
    stars with supersolar photospheric abundances. We present the coronal abundances of six such stars: 11 LMi, ι Hor, HR
    7291, τ Boo, and α Cen A and B. These stars all have high-statistics X-ray spectra, three of which are presented for the
    first time. The abundances we measured were obtained using the line-resolved spectra of the Reflection Grating Spectrometer
    (RGS) in conjunction with the higher throughput EPIC-pn camera spectra onboard the XMM-Newton observatory. A collisionally
    ionized plasma model with two or three temperature components is found to represent the spectra well. All elements are
    found to be consistently depleted in the coronae compared to their respective photospheres. For 11 LMi and τ Boo no FIP
    effect is present, while ι Hor, HR 7291, and α Cen A and B show a clear FIP trend. These conclusions hold whether the
    comparison is made with solar abundances or the individual stellar abundances. Unlike the solar corona, where low-FIP
    elements are enriched, in these stars the FIP effect is consistently due to a depletion of high-FIP elements with respect
    to actual photospheric abundances. A comparison with solar (instead of stellar) abundances yields the same fractionation
    trend as on the Sun. In both cases, a similar FIP bias is inferred, but different fractionation mechanisms need to be
    invoked.'
