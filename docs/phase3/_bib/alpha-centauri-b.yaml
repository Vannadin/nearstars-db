  - Quarles, Billy
  - Howard, Andrew
  - Yung, Yuk L.
  - Mike, Ressler
  - Serabyn, Eugene
  - Leisenring, Jarron
  - Boccaletti, Anthony
  - Pueyo, Laurent
  - Choquet, Elodie
  - Kervella, Pierre
  year: '2019'
  pubdate: '2019-03-00'
  doi: null
  abstract: Alpha Centauri A is the closest solar-type star to the Sun and offers the best opportunity to find and ultimately
    to characterize an Earth-sized planet located in its Habitable Zone (HZ). The MIRI coronagraph on the James Webb Space
    Telescope (JWST) has the sensitivity needed to search the 1-3 AU (1"-2") region which is predicted to be stable inside
    the Alpha Cen AB system at a level sufficient to detect the thermal emission of a ~3-5 REarth planet orbiting Alpha Cen
    A. An exo-zodiacal cloud only a few times brighter than our own should also be detectable. While current precision radial
    velocity observations set a limit of 50-100 MEarth at 1-3 AU for planets in the plane of the Alpha Cen A-B system, there
    is a broad range of exoplanet radii up to 10 REarth consistent with these mass limits. A carefully planned observing sequence
    can reject the light from Alpha Cen A at the level of 10-6 at 1"-2" and minimize the influence of Alpha Cen B located
    ≥7" away. A diverse set of reference star measurements will enable state-of-the-art post-processing analysis to remove
    residual speckles.
