    similar path, and is thought to be in a loosely bound orbit about the binary. Dynamic simulations show that this configuration
    can form from a less extreme triple system. As our nearest neighbors, these stars command great interest as potential
    planet hosts, and the dynamics of the stars govern the formation of any planets within the system. Here we present a scenario
    for the evolution of Alpha Centauri A and B and Proxima Centauri as a triple system, to establish limits on the evolution
