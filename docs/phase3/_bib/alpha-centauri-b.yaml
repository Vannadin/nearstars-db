  doi: 10.48550/arXiv.1401.2211
  abstract: 'We make a preliminary assessment on the habitability of potential rocky exoplanets around Alpha Centauri B. We
    use several indexes: the Earth Similarity Index, a mathematical model for photosynthesis, and a biological productivity
    model. Considering the atmospheres of the exoplanets similar to current Earth''s atmosphere, we find consistent predictions
    of both the Earth Similarity Index and the biological productivity model. The mathematical model for photosynthesis clearly
    failed because does not consider the temperature explicitly. For the case of Alpha Centauri B, several simulation runs
    give 11 planets in the habitable zone. Applying to them above mentioned indexes, we select the five exoplanets more prone
    for photosynthetic life; showing that two of them in principle have better conditions than Earth for this kind of life.'
