- &id072
  arxiv_id: '1610.06079'
  ads_bibcode: 2016A&A...594A.107K
  title: Close stellar conjunctions of α Centauri A and B until 2050 . An m<SUB>K</SUB> = 7.8 star may enter the Einstein
    ring of α Cen A in 2028
  authors:
  - Kervella, P.
  - Mignard, F.
  - Mérand, A.
  - Thévenin, F.
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.1051/0004-6361/201629201
  abstract: The rapid proper motion of the α Cen pair (≈3.7 arcsec yr<SUP>-1</SUP>) and its location close to the galactic
    plane on a rich stellar background combine constructively to make them excellent candidates for close stellar conjunctions
    with more distant stars. Adding new differential astrometry to archival data, we have refined the orbital parameters,
    barycentric proper motion and parallax of α Cen and compute its apparent trajectory on sky over the coming decades. Based
    on NTT/SUSI2, NTT/SOFI, and VLT/NACO maps of the field stars around the trajectories of α Cen A and B, we present a catalog
    of the expected close conjunctions until 2050. An exceptional event will take place in early May 2028, when α Cen A will
    come within ρ<SUB>min</SUB> = 0.015 ± 0.135 arcsec of the m<SUB>K</SUB> = 7.8 star 2MASS 14392160-6049528 (hereafter S5).
    In terms of impact parameter and contrast, this is the most favorable stellar conjunction of α Cen within at least the
    next three decades. With an angular diameter of θ<SUB>LD</SUB> = 0.47 ± 0.05 mas, it is likely that S5 is a red giant
    or supergiant located at several kiloparsecs. The approached stars will act as moving light probes in transmission through
    the environment of α Cen. The observation of these close conjunctions holds great promises to search for planets and other
    low mass objects in the α Cen system using photometry and astrometry. The relativistic displacement of the approached
    star images will be observable, with significant deflection angles in the milliarcsecond range. The small impact parameter
    of the conjunction with S5 means that this star has a probability of 45% of entering the Einstein ring of α Cen A. The
    gravitational amplification of the flux of S5 could reach a factor five for the combination of the two lensed images.
    The proper motion, orbital parameters and parallax of α Cen will be measurable with an extreme accuracy from differential
    astrometry with the S stars. This will be valuable, for example to prepare the recently announced Breakthrough Starshot
    initiative to send interstellar nanocrafts to α Centauri. <P />Based on observations collected at the European Organisation
    for Astronomical Research in the Southern Hemisphere under ESO programs 272.C-5010, 077.C-0587, 080.C-0775(A), 081.C-0940(A),
    082.C-0615(A), and 296.D-5032.
