- &id069
  arxiv_id: '1702.01647'
  ads_bibcode: 2017MNRAS.468L..16T
  title: 'The changing face of α Centauri B: probing plage and stellar activity in K dwarfs'
  authors:
  - Thompson, A. P. G.
  - Watson, C. A.
  - de Mooij, E. J. W.
  - Jess, D. B.
  year: '2017'
  pubdate: '2017-06-00'
  doi: 10.1093/mnrasl/slx018
  abstract: Detailed knowledge of stellar activity is crucial for understanding stellar dynamos, as well as pushing exoplanet
    radial-velocity detection limits towards Earth analogue confirmation. We directly compare archival High Accuracy Radial
    velocity Planet Searcher spectra taken at the minimum in α Cen B's activity cycle to a high-activity state when clear
    rotational modulation of log {R^' }_{HK}} is visible. Relative to the inactive spectra, we find a large number of narrow
    pseudo-emission features in the active spectra with strengths that are rotationally modulated. These features most likely
    originate from plage, spots or a combination of both. They also display radial velocity variations of ∼300 m s<SUP>-1</SUP>
    - consistent with an active region rotating across the stellar surface. Furthermore, we see evidence that some of the
    lines originating from the 'active immaculate' photosphere appear broader relative to the 'inactive immaculate' case.
    This may be due to enhanced contributions of, for example, magnetic bright points to these lines, which then causes additional
    line broadening. More detailed analysis may enable measurements of plage and spot coverage using single spectra in the
    future.
