  title: Detecting Planets Orbiting Alpha Cen A with The James Webb Space Telescope
  authors:
  - Beichman, Charles
  - Llop Sayson, Jorge
  - Ygouf, Marie
  - Mawet, Dimitri
  - Belikov, Ruslan
