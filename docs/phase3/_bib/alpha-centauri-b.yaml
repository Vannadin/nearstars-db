  ads_bibcode: 2017AAS...22932606D
  title: Close encounters of Proxima and alpha Centauri as a consequence of the galactic environment
  authors:
  - Deitrick, Russell
  - Quinn, Thomas R.
  - Barnes, Rory
  - Kaib, Nathan A.
  year: '2017'
  pubdate: '2017-01-00'
  doi: null
  abstract: The recent discovery of a terrestrial mass planet orbiting Proxima Centauri has generated renewed interest in
    the stellar system alpha Centauri, to which Proxima may be gravitationally bound. Because of the observed high abundance
    of heavy elements of these stars, we argue that this triple system almost certainly formed within about 4.5 kpc of the
    galactic center, and hence has undergone significant radial migration. We have developed a secular model for the dynamics
    of the system, including the effects of galactic tides, stellar encounters, and three body interactions between Proxima
    and alpha Cen A and B. This secular model allows us to explore many possible initial parameters for the system including
    different galacto-centric formation distances and radial migration times. Galactic tides and stellar encounters make close
    approaches between Proxima and alpha Cen possible, particularly when the system spends much of its life in a denser environment
    than the present solar neighborhood. Precession of Proxima's orbit due to three body interactions mitigates this to some
    extent by widening the distances of closest approach. However, whether or not Proxima is indeed bound to alpha Cen at
    the present day, there remains a significant possibility that it has had close encounters with alpha Cen in the past.
    Such close encounters have implications for the type of planetary system that may orbit Proxima today. An extended planetary
    system with planets or small bodies at large semi-major axes is likely to be disrupted. Proxima b may be the remnant of
    a more extended planetary system that destabilized during a prior close passage.
