- &id086
  arxiv_id: null
  ads_bibcode: 2020A&A...644A..19W
  title: 'Europium as a lodestar: diagnosis of radiogenic heat production in terrestrial exoplanets. Spectroscopic determination
    of Eu abundances in α Centauri AB'
  authors:
  - Wang, H. S.
  - Morel, T.
  - Quanz, S. P.
  - Mojzsis, S. J.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.1051/0004-6361/202038386
  abstract: 'Context. Long-lived radioactive nuclides, such as <SUP>40</SUP>K, <SUP>232</SUP>Th, <SUP>235</SUP>U, and <SUP>238</SUP>U,
    contribute to persistent heat production in the mantle of terrestrial-type planets. As refractory elements, the concentrations
    of Th and U in a terrestrial exoplanet are implicitly reflected in the photospheric abundances of the stellar host. However,
    a robust determination of these stellar abundances is difficult in practice owing to the general paucity and weakness
    of the relevant spectral features. <BR /> Aims: We draw attention to the refractory, r-process element europium, which
    may be used as a convenient and practical proxy for the population analysis of radiogenic heating in exoplanetary systems.
    <BR /> Methods: As a case study, we present a determination of Eu abundances in the photospheres of α Cen A and B with
    high-resolution HARPS spectra and a strict line-by-line differential analysis. To first order, the measured Eu abundances
    can be converted into the abundances of <SUP>232</SUP>Th, <SUP>235</SUP>U, and <SUP>238</SUP>U with observational constraints,
    while the abundance of <SUP>40</SUP>K is approximated independently with a Galactic chemical evolution model. <BR /> Results:
    Our determination shows that europium is depleted with respect to iron by ~0.1 dex and to silicon by ~0.15 dex compared
    to solar in the two binary components. The loci of α Cen AB at the low-ends of both [Eu/Fe] and [Eu/Si] distributions
    of a large sample of FGK stars further suggest significantly lower potential of radiogenic heat production in any putative
    terrestrial-like planet (i.e. α-Cen-Earth) in this system compared to that in rocky planets (including our own Earth)
    that formed around the majority of these Sun-like stars. Based on our calculations of the radionuclide concentrations
    in the mantle and assuming the mantle mass to be the same as that of our Earth, we find that the radiogenic heat budget
    in an α-Cen-Earth is 73.4<SUB>-6.9</SUB><SUP>+8.3</SUP> TW upon its formation and 8.8<SUB>-1.3</SUB><SUP>+1.7</SUP> TW
    at the present day, which is 23 ± 5% and 54 ± 5% lower than that in the Hadean Earth (94.9 ± 5.5 TW) and in the modern
    Earth (19.0 ± 1.1 TW), respectively. <BR /> Conclusions: As a consequence, mantle convection in an α-Cen-Earth is expected
    to be overall weaker than that of Earth (assuming other conditions are the same), and thus such a planet would be less
    geologically active, suppressing its long-term potential to recycle its crust and volatiles. With Eu abundances being
    available for a large sample of Sun-like stars, the proposed approach can extend our ability to predict the nature of
    other rocky worlds that can be tested by future observations. <P />Based on observations collected at the La Silla Observatory,
    ESO (Chile) with the HARPS spectrograph.'
