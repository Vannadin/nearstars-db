- &id037
  arxiv_id: '1610.06185'
  ads_bibcode: 2017A&A...597A.137K
  title: The radii and limb darkenings of α Centauri A and B . Interferometric measurements with VLTI/PIONIER
  authors:
  - Kervella, P.
  - Bigot, L.
  - Gallenne, A.
  - Thévenin, F.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1051/0004-6361/201629505
  abstract: The photospheric radius is one of the fundamental parameters governing the radiative equilibrium of a star. We
    report new observations of the nearest solar-type stars α Centauri A (G2V) and B (K1V) with the VLTI/PIONIER optical interferometer.
    The combination of four configurations of the VLTI enable us to measure simultaneously the limb darkened angular diameter
    θ<SUB>LD</SUB> and the limb darkening parameters of the two solar-type stars in the near-infrared H band (λ = 1.65 μm).
    We obtain photospheric angular diameters of θ<SUB>LD</SUB>(A) = 8.502 ± 0.038 mas (0.43%) and θ<SUB>LD</SUB>(B) = 5.999
    ± 0.025 mas (0.42%), through the adjustment of a power law limb darkening model. We find H band power law exponents of
    α(A) = 0.1404 ± 0.0050 (3.6%) and α(B) = 0.1545 ± 0.0044 (2.8%), which closely bracket the observed solar value (α<SUB>☉</SUB>
    = 0.15027). Combined with the parallax π = 747.17 ± 0.61 mas previously determined, we derive linear radii of R<SUB>A</SUB>
    = 1.2234 ± 0.0053 R<SUB>☉</SUB> (0.43%) and R<SUB>B</SUB> = 0.8632 ± 0.0037 R<SUB>☉</SUB> (0.43%). The power law exponents
    that we derive for the two stars indicate a significantly weaker limb darkening than predicted by both 1D and 3D stellar
    atmosphere models. As this discrepancy is also observed on the near-infrared limb darkening profile of the Sun, an improvement
    of the calibration of stellar atmosphere models is clearly needed. The reported PIONIER visibility measurements of α Cen
    A and B provide a robust basis to validate the future evolutions of these models. <P />The calibrated visibility data
    are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/597/A137">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/597/A137</A>
