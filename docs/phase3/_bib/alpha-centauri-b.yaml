  arxiv_id: null
  ads_bibcode: 2020ApJS..250...16A
  title: In the Trenches of the Solar-Stellar Connection. I. Ultraviolet and X-Ray Flux-Flux Correlations across the Activity
    Cycles of the Sun and Alpha Centauri AB
  authors:
