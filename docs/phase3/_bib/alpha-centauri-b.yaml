- &id040
  arxiv_id: '1409.3593'
  ads_bibcode: 2014ApJ...796..133D
  title: Deriving Stellar Inclination of Slow Rotators Using Stellar Activity
  authors:
  - Dumusque, X.
  year: '2014'
  pubdate: '2014-12-00'
  doi: 10.1088/0004-637X/796/2/133
  abstract: Stellar inclination is an important parameter for many astrophysical studies. Although different techniques allow
    us to estimate stellar inclination for fast rotators, it becomes much more difficult when stars are rotating slower than
    ~2-2.5 km s<SUP>-1</SUP>. By using the new activity simulation SOAP 2.0 which can reproduce the photometric and spectroscopic
    variations induced by stellar activity, we are able to fit observations of solar-type stars and derive their inclination.
    For HD 189733, we estimate the stellar inclination to be i=84<SUP>+6</SUP><SUB>-20</SUB> deg, which implies a star-planet
    obliquity of \psi =4<SUP>+18</SUP><SUB>-4</SUB> considering previous measurements of the spin-orbit angle. For α Cen B,
    we derive an inclination of i=45<SUP>+9</SUP><SUB>-19</SUB>, which implies that the rotational spin of the star is not
    aligned with the orbital spin of the α Cen binary system. In addition, assuming that α Cen Bb is aligned with its host
    star, no transit would occur. The inclination of α Cen B can be measured using 40 radial-velocity measurements, which
    is remarkable given that the projected rotational velocity of the star is smaller than 1.15 km s<SUP>-1</SUP>. <P />Based
    on observations made with the MOST satellite, the HARPS instrument on the ESO 3.6 m telescope at La Silla Observatory
    (Chile), and the SOPHIE instrument at the Observatoire de Haute Provence (France).
