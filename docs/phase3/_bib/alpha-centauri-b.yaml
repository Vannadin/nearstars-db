- &id005
  arxiv_id: null
  ads_bibcode: 2014AcAau.104..458M
  title: Going to Alpha Centauri B and setting up a Radio Bridge
  authors:
  - Maccone, Claudio
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1016/j.actaastro.2014.03.008
  abstract: 'How to exploit the Sun as a gravitational lens has been studied extensively during the last 20 years, especially
    by this author (Refs. [1-7]). In essence, a spacecraft dubbed FOCAL (an acronym for "Fast Outgoing Cyclopean Astronomical
    Lens") should be launched in the direction of the sky opposite to the area of the sky we wish to see highly magnified
    both at radio and other frequencies. After FOCAL reached the minimal focal distance of 550 AU from the Sun, highly magnified
    radio images of celestial objects located on the opposite side of the Sun will automatically be produced. In this paper
    we apply the FOCAL mission concept to the goal of exploring the neighborhood of the Alpha Centauri B star, where the nearest
    exoplanet to the Solar system was recently discovered. We suggest that: <P />&lt;ce:list <P />A first FOCAL 1 spacecraft
    is launched away from the Sun up to about 1000 AU in the direction of the sky opposite to Alpha Centauri B. This spacecraft
    will then act as a relay satellite to insure robust telecommunications across the 4.37 light year interstellar distance
    between the Solar System and Alpha Centauri B.&lt;/ce:para&gt; <P />A second FOCAL 2 spacecraft is launched towards Alpha
    Centauri B as the truly interstellar spacecraft going to Alpha Centauri B. It may take quite a few years to get there
    of course (50 years?), depending on the propulsion system, but its robust telecommunications with the Earth are insured
    by the gravitational lens of the Sun and the FOCAL 1 relay spacecraft.&lt;/ce:para&gt; <P />After FOCAL 2 reached Alpha
    Centauri B, we suggest positioning it in the direction opposite to the Sun beyond the minimal focal distance of 452 AU
    for Alpha Centauri B, say at 800 AU beyond the star. Thus, the two stars (the Sun and Alpha Centauri B) and the two spacecrafts
    (FOCAL 1 and FOCAL 2) will make up a RADIO BRIDGE, insuring robust telecommunications for all future space missions to
    the Alpha Centauri system to come.&lt;/ce:para&gt; <P />In conclusion, this paper goes beyond traditional papers only
    concerned with propulsion for the first interstellar mission, in that it points out that a robust telecommunication system
    has to be created by exploiting both stars'' gravitational lenses plus two FOCAL spacecrafts on opposite sides.'
