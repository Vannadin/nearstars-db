  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1093/mnras/staa1010
  abstract: Stellar activity is the major roadblock on the path to finding true Earth-analogue planets with the Doppler technique.
    Thus, identifying new indicators that better trace magnetic activity (i.e. faculae and spots) is crucial to aid in disentangling
    these signals from that of a planet's Doppler wobble. In this work, we investigate activity related features as seen in
    disc-integrated spectra from the HARPS-N solar telescope. We divide high-activity spectral echelle orders by low-activity
    master templates (as defined using both log R'<SUB>HK</SUB> and images from the Solar Dynamics Observatory, SDO), creating
    'relative spectra'. With resolved images of the surface of the Sun (via SDO), the faculae and spot filling factors can
    be calculated, giving a measure of activity independent of, and in addition to, log R'<SUB>HK</SUB>. We find pseudo-emission
    (and pseudo-absorption) features in the relative spectra that are similar to those reported in our previous work on α
    Cen B. In α Cen B, the features are shown to correlate better to changes in faculae filling factor than spot filling factor.
    In this work, we more confidently identify changes in faculae coverage of the visible hemisphere of the Sun as the source
    of features produced in the relative spectra. Finally, we produce trailed spectra to observe the radial velocity component
    of the features, which show that the features move in a redward direction as one would expect when tracking active regions
    rotating on the surface of a star.
