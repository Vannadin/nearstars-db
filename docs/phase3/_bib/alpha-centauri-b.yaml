- &id068
  arxiv_id: '1704.03871'
  ads_bibcode: 2017AJ....154..115H
  title: Optimized Trajectories to the Nearest Stars Using Lightweight High-velocity Photon Sails
  authors:
  - Heller, René
  - Hippke, Michael
  - Kervella, Pierre
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.3847/1538-3881/aa813f
  abstract: 'New means of interstellar travel are now being considered by various research teams, assuming lightweight spaceships
    to be accelerated via either laser or solar radiation to a significant fraction of the speed of light (c). We recently
    showed that gravitational assists can be combined with the stellar photon pressure to decelerate an incoming lightsail
    from Earth and fling it around a star or bring it to rest. Here, we demonstrate that photogravitational assists are more
    effective when the star is used as a bumper (I.e., the sail passes “in front of” the star) rather than as a catapult (I.e.,
    the sail passes “behind” or “around” the star). This increases the maximum deceleration at α Cen A and B and reduces the
    travel time of a nominal graphene-class sail (mass-to-surface ratio 8.6× {10}<SUP>-4</SUP> {{g}} {{{m}}}<SUP>-2</SUP>)
    from 95 to 75 years. The maximum possible velocity reduction upon arrival depends on the required deflection angle from
    α Cen A to B and therefore on the binary’s orbital phase. Here, we calculate the variation of the minimum travel times
    from Earth into a bound orbit around Proxima for the next 300 years and then extend our calculations to roughly 22,000
    stars within about 300 lt-yr. Although α Cen is the most nearby star system, we find that Sirius A offers the shortest
    possible travel times into a bound orbit: 69 years assuming 12.5% c can be obtained at departure from the solar system.
    Sirius A thus offers the opportunity of flyby exploration plus deceleration into a bound orbit of the companion white
    dwarf after relatively short times of interstellar travel.'
