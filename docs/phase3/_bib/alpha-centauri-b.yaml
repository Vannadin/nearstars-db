  doi: null
  abstract: Several mission concepts are being studied to directly image planets around nearby stars. Direct imaging enables
    spectroscopic detection of biomarkers such as atmospheric oxygen and methane, which would be highly suggestive of extraterrestrial
    life. It is commonly thought that directly imaging a potentially habitable exoplanet requires telescopes with apertures
    of at least 1m, costing at least 1B, and launching no earlier than the 2020s.A notable exception to this is Alpha Centauri
    (A and B), which is an extreme outlier among FGKM stars in terms of apparent habitable zone size. Specifically, Alpha
    Centauri habitable zones span about 0.5-1' in stellocentric angle, ~3x wider than around any other FGKM star. This enables
    a ~30cm visible light space telescope equipped with a modern high performance coronagraph or starshade to resolve the
    habitable zone at high contrast and directly image any potentially habitable planet that may exist in the system. Due
    to the extreme apparent brightness of the stars, exposure times can be as short as minutes with ideal components, or days
    with realistic ones. This makes it possible to do color photometry on potentially habitable planets sufficient to differentiate
    Venus-like, Earth-like, and Mars-like planets from each other and establish the presence of Earth-pressure atmosphere
    through Rayleigh scattering.The raw contrast requirements for such an instrument can be relaxed to 1e-8 if the mission
    spends 2 years collecting tens of thousands of images on the same target, enabling a factor of 500-1000 speckle suppression
    in post processing. The light leak from both stars is controllable with a special wavefront control algorithm known as
    Multi-Star Wavefront Control (MSWC), which independently suppresses diffraction and aberrations from both stars using
    independent modes on the deformable mirror (see Thomas et al. at this conference).The presentation will describe the general
    studies and calculations in more detail and briefly present examples of small coronagraphic mission concepts currently
    being developed to take advantage of this opportunity. (For more detail about one such concept, see Bendek et al. at this
