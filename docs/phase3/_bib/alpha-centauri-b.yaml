- &id060
  arxiv_id: '1912.05192'
  ads_bibcode: 2020A&A...633A..76C
  title: Measuring precise radial velocities on individual spectral lines. II. Dependance of stellar activity signal on line
    depth
  authors:
  - Cretignier, M.
  - Dumusque, X.
  - Allart, R.
  - Pepe, F.
  - Lovis, C.
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.1051/0004-6361/201936548
  abstract: 'Context. Although the new generation of radial-velocity (RV) instruments such as ESPRESSO are expected to reach
    the long-term precision required to find other earths, the RV measurements are contaminated by some signal from stellar
    activity. This makes these detections hard. <BR /> Aims: Based on real observations, we here demonstrate for the first
    time the effect of stellar activity on the RV of individual spectral lines. Recent studies have shown that this is probably
    the key for mitigating this perturbing signal. By measuring the line-by-line RV of each individual spectral line in the
    2010 HARPS RV measurements of α Cen B, we study their sensitivity to telluric line contamination and line profile asymmetry.
    After selecting lines on which we are confident to measure a real Doppler-shift, we study the different effects of the
    RV signal that is induced by stellar activity on spectral lines based on their physical properties. <BR /> Results: We
    estimate that at least 89% of the lines that appear in the spectrum of α Cen B for which we measure a reliable RV are
    correlated with the stellar activity signal (Pearson correlation coefficient R &gt; 0.3 at 2σ). This can be interpreted
    as those lines being sensitive to the inhibition of the convective blueshift observed in active regions. Because the velocity
    of the convective blueshift increases with physical depth inside the stellar atmosphere, we find that the effect induced
    by stellar activity on the RV of individual spectral lines is inversely proportional to the line depth. The stellar activity
    signal can be mitigated down to ~0.8-0.9 m s<SUP>-1</SUP> either by selecting lines that are less sensitive to activity
    or by using the difference between the RV of the spectral lines that are formed at different depths in the stellar atmosphere
    as an activity proxy. <BR /> Conclusions: This paper shows for the first time that based on real observations of solar-type
    stars, it is possible to measure the RV effect of stellar activity on the RV of individual spectral lines. Our results
    are very promising and demonstrate that analysing the RV of individual spectral lines is probably one of the solutions
    to mitigate stellar activity signal in RV measurements down to a level enabling the detection of other earths.'
