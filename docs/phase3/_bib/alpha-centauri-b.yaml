- &id074
  arxiv_id: '1510.08755'
  ads_bibcode: 2016MNRAS.455.3405L
  title: Ultraviolet emission lines of Si II in cool star and solar spectra
  authors:
  - Laha, Sibasish
  - Keenan, Francis P.
  - Ferland, Gary J.
  - Ramsbottom, Catherine A.
  - Aggarwal, Kanti M.
  - Ayres, Thomas R.
  - Chatzikos, Marios
  - van Hoof, Peter A. M.
  - Williams, Robin J. R.
  year: '2016'
  pubdate: '2016-01-00'
  doi: 10.1093/mnras/stv2566
  abstract: Recent atomic physics calculations for Si II are employed within the CLOUDY modelling code to analyse Hubble Space
    Telescope (HST) STIS ultraviolet spectra of three cool stars, β Geminorum, α Centauri A and B, as well as previously published
    HST/GHRS observations of α Tau, plus solar quiet Sun data from the High Resolution Telescope and Spectrograph. Discrepancies
    found previously between theory and observation for line intensity ratios involving the 3s<SUP>2</SUP>3p <SUP>2</SUP>P<SUB>J</SUB>-3s3p<SUP>2</SUP>
    <SUP>4</SUP>P_{J^' }} intercombination multiplet of Si II at ∼ 2335 Å are significantly reduced, as are those for ratios
    containing the 3s<SUP>2</SUP>3p <SUP>2</SUP>P<SUB>J</SUB>-3s3p<SUP>2</SUP> <SUP>2</SUP>D_{J^' }} transitions at ∼1816
    Å. This is primarily due to the effect of the new Si II transition probabilities. However, these atomic data are not only
    very different from previous calculations, but also show large disagreements with measurements, specifically those of
    Calamai et al. for the intercombination lines. New measurements of transition probabilities for Si II are hence urgently
    required to confirm (or otherwise) the accuracy of the recently calculated values. If the new calculations are confirmed,
    then a long-standing discrepancy between theory and observation will have finally been resolved. However, if the older
    measurements are found to be correct, then the agreement between theory and observation is simply a coincidence and the
    existing discrepancies remain.
