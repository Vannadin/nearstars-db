  year: '2012'
  pubdate: '2012-10-00'
  doi: null
  abstract: 'The eagerly awaited detection of an Earth-mass planet using the radial-velocity technique has been announced
    last week {Dumusque et al. 2012}. This planet, Alpha Cen Bb orbits our close neighbor alpha Cen B and has the potential
    to become a true Rosetta stone in exoplanet science, if its transiting nature were revealed. HST/STIS is the only facility
    able to detect a transit from such a small planet at a high confidence level. We propose to quasi-continuously monitor
    the expected transit window of Alpha Cen B b during 26 hours {16 orbits} to encompass the orbital solutions allowed by
    the published radial-velocity dataset, that we reanalyzed for this purpose. If alpha Cen Bb is transiting, our proposed
    observations will not only confirm the existence of the planet but also yield for the first time the density of an Earth-mass
    exoplanet and constrain its interior composition. Our observations using the G750M grating will provide the first spectrum
    of a terrestrial exoplanet, with possibly detectable water features. In the case of an exosphere tail, detection of the
    sodium doublet would be achievable, depending on the tail extension. Finally, the transit light curve shape will constrain
    alpha Cen Bb''s orbital eccentricity. This would be an important constraint for planetary formation and evolution models
    in binary systems. If no transit is detected, our observations will still be important: detection of p-mode oscillations
    and granulation is expected for alpha Cen A and B, which will constrain convection and radiative transport modeling in
    the atmosphere of cool main-sequence stars.'
