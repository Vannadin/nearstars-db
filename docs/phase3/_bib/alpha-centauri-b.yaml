  arxiv_id: '2004.09830'
  ads_bibcode: 2020MNRAS.494.4279T
  title: 'The spectral impact of magnetic activity on disc-integrated HARPS-N solar observations: exploring new activity indicators'
  authors:
  - Thompson, A. P. G.
