- arxiv_id: null
  ads_bibcode: 2019absc.conf10506Q
  title: Obliquity Variations and Habitability in Alpha Centauri AB
  authors:
  - Quarles, Billy
  - Li, Gongjie
  - Lissauer, Jack
  year: '2019'
  pubdate: '2019-03-00'
  doi: null
  abstract: Thousands of exoplanets have been uncovered by observations made by the Kepler space telescope, where a subset
    of these worlds is shown to have additional, more distant stellar companions. Only recently has the habitable zone, region
    where liquid water could exist on a rocky planetary surface, been modified to include the impact an Earthlike planet would
    experience under the reign of two suns, like α Centauri AB. The first order concern for such planets lies within orbital
    stability, where planets can evolve onto trajectories that quickly lead to either destruction or isolation relative to
    astrobiological timescales. An Earthlike planet that can stably orbit within the habitable zone can face an additional
    challenge through the evolution of its spin axis or obliquity variation. We investigate the obliquity evolution of an
    Earthlike planet within the habitable zone of α Centauri B, where the spin axis can be perturbed by neighboring terrestrial
    analogs and α Centauri A on timescales relevant to climate stability.
