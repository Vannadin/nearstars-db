  ads_bibcode: 2013AGUFM.P44B..07H
  title: Analyzing Stellar Bio-Essential Element Abundances in the Solar Neighborhood
  authors:
  - Hinkel, N. R.
  - Kane, S.
  year: '2013'
  pubdate: '2013-12-00'
  doi: null
  abstract: 'We present results from a compilation of abundance data for stars found near to the Sun, within 150 pc, as part
    of the Hypatia Catalog (Hinkel et al. 2013, in review). Hypatia contains spectroscopic abundance data for 50 elements
    within 3069 stars from literature sources. Our focus has been on determining chemical trends specific to bio-essential
    elements -- namely: C, N, O, Mg, S, Ti, as well as many others. We have also carefully analyzed the abundances with respect
    to known exoplanets and their characteristics, in order to find possible Earthlike planets. The habitability of an exoplanet
    is strongly related to the physical properties of the host star. This is what determines the "habitable zone," or region
    surrounding a star at which a planet is able to reach and maintain a temperature conducive to life. The element abundances
    measured in the atmosphere of the host star also acts as a proxy for the abundances found within the planet. The composition
    of the planet is particularly important when determining if the planet is habitable because they provide the building
    blocks from which life may start. Therefore, we seek to find those patterns in our solar neighborhood that already possess
    bio-essential elements, such as C, N, O, Mg, S, Ti, in hopes of finding habitable, Earthlike exoplanets. By using Hypatia,
    we have confirmed the evidence that the [Fe/H] abundance ratio is related to the presence of planets. We have also examined
    the ratios of the bio-essential elements within the confirmed host-stars as compared to the non-host stars, for example,
    between Alpha Centauri A (non-host) and B (host) in Hinkel &amp; Kane (2013), see figure. This comparison has lead us
    to conclude the possible existence of a yet undiscovered planet around Alpha Cen A. We have also found, more generally,
    that enriched bio-essential abundances are present in lower mass planets and are also seen in planets with orbital periods
    greater than 300 days. It is through the analysis of these bio-essential abundance measurements that we may be able to
    discern patterns that may lead us to a habitable world. Elemental abundance ratios for Alpha Cen A and B. All elements
    are [X/Fe], with the exception of iron which is [Fe/H] (black box). The dotted line denotes the solar values at 0.0 dex.'
