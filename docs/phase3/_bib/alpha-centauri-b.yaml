  ads_bibcode: 2023SPIE12680E..0YS
  title: 'Multi-star wavefront control at the occulting mask coronagraph testbed: monochromatic laboratory demonstration for
    the Roman Coronagraph instrument'
  authors:
  - Sirbu, Dan
  - Belikov, Ruslan
