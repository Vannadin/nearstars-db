- &id078
  arxiv_id: '1409.3594'
  ads_bibcode: 2014ApJ...796..132D
  title: 'SOAP 2.0: A Tool to Estimate the Photometric and Radial Velocity Variations Induced by Stellar Spots and Plages'
  authors:
  - Dumusque, X.
  - Boisse, I.
  - Santos, N. C.
  year: '2014'
  pubdate: '2014-12-00'
  doi: 10.1088/0004-637X/796/2/132
  abstract: This paper presents SOAP 2.0, a new version of the Spot Oscillation And Planet (SOAP) code that estimates in a
    simple way the photometric and radial velocity (RV) variations induced by active regions. The inhibition of the convective
    blueshift (CB) inside active regions is considered, as well as the limb brightening effect of plages, a quadratic limb
    darkening law, and a realistic spot and plage contrast ratio. SOAP 2.0 shows that the activity-induced variation of plages
    is dominated by the inhibition of the CB effect. For spots, this effect becomes significant only for slow rotators. In
    addition, in the case of a major active region dominating the activity-induced signal, the ratio between the FWHM and
    the RV peak-to-peak amplitudes of the cross correlation function can be used to infer the type of active region responsible
    for the signal for stars with v sin i &lt;=8 km s<SUP>-1</SUP>. A ratio smaller than three implies a spot, while a larger
    ratio implies a plage. Using the observation of HD 189733, we show that SOAP 2.0 manages to reproduce the activity variation
    as well as previous simulations when a spot is dominating the activity-induced variation. In addition, SOAP 2.0 also reproduces
    the activity variation induced by a plage on the slowly rotating star α Cen B, which is not possible using previous simulations.
    Following these results, SOAP 2.0 can be used to estimate the signal induced by spots and plages, but also to correct
    for it when a major active region is dominating the RV variation. <P />. The work in this paper is based on observations
    made with the MOST satellite, the HARPS instrument on the ESO 3.6 m telescope at La Silla Observatory (Chile), and the
    SOPHIE instrument at the Observatoire de Haute Provence (France).
