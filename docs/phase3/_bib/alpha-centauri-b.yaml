- arxiv_id: null
  ads_bibcode: 2013SPD....44..152A
  title: The Ups and Downs of Alpha Centauri
  authors:
  - Ayres, Thomas R.
  year: '2013'
  pubdate: '2013-07-00'
  doi: null
  abstract: The nearby Alpha Centauri triple system has two solar-type stars in a relatively close orbit (20 au separation),
    and a dim red dwarf companion -- Proxima -- about 10,000 au away, on the Sun-ward side of the group. The heaviest star
    -- Alpha Cen A -- is a close twin of the Sun. Its slightly less massive companion -- Alpha Cen B -- is a K-type dwarf,
    and is the closest star thought to host an exoplanet (Earth-sized, but in a much tighter orbit). The close pair has been
    scrutinized for more than a decade in X-rays by XMM and Chandra, on a semiannual basis since 2003 and 2005, respectively.
    However, in recent years only Chandra has been able to cleanly separate the pair, which are approaching closest separation
    on the sky (only a few arcseconds) in their 80-year orbit. For the past 3 years, the HST STIS spectrograph has joined
    the crowd, also capturing FUV snapshots of the pair every six months. The Alpha Cen stars provide an important complement
    to long-term studies of the Sun at high energies. The K-star has displayed a clear 8-year cycle in recent years, while
    the G-star remains mired in a Maunder-like minimum.
