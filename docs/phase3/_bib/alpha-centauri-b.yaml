  ads_bibcode: 2023AAS...24146111N
  title: 'The third flight of SISTINE: far-ultraviolet spectroscopic observations of α Centauri A and B'
  authors:
  - Nell, Nicholas
  - France, Kevin
  - Kruczek, Nicholas
  - Behr, Patrick
  - Ulrich, Stefan
  - Fleming, Brian
  year: '2023'
  pubdate: '2023-01-00'
  doi: null
  abstract: SISTINE-III was successfully launched from Arnhem Space Center on July 6<SUP>th</SUP>, 2022 and acquired spectra
    of Alpha Centauri A and B. A bandpass of 97.6 - 127.2 and 130.0 - 156.5 nm was captured for both stars simultaneously
    with an exposure time of ~250s. These spectra capture a broad suite of emission lines tracing the full 10<SUP>4</SUP>
    - 10<SUP>5</SUP> K formation temperature range critical for reconstructing the full ultraviolet (UV) radiation field incident
    on planets orbiting solar-type stars. The Suborbital Imaging Spectrograph for Transition-region Irradiance from Nearby
    Exoplanet host stars (SISTINE) is a rocket-borne far-ultraviolet (FUV) imaging spectrograph designed to probe the FUV
    radiation environment of nearby stars. SISTINE operates at moderate resolving power (~1500) while providing spectral imaging
    over an angular extent of ~8', with ~ 3-arcsecond resolution at the slit center. The instrument is composed of an f/14
    Cassegrain telescope that feeds a 2.1x magnifying spectrograph, utilizing a blazed holographically ruled diffraction grating
    and a powered fold mirror. Spectra are captured on a large format microchannel plate (MCP) detector consisting of two
    110 x 40 mm segments each read out by a cross delay-line anode. Several novel technologies are employed in SISTINE to
    advance their technical maturity in support of future NASA UV/optical astronomy missions. These include enhanced aluminum
    lithium fluoride coatings (eLiF), atomic layer deposition (ALD) protective optical coatings, and ALD processed large format
    MCPs.
