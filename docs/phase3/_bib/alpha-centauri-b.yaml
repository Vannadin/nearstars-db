- &id036
  arxiv_id: '1709.03560'
  ads_bibcode: 2018MNRAS.473.3185F
  title: Was Proxima captured by Alpha Centauri A and B?
  authors:
  - Feng, F.
  - Jones, H. R. A.
  year: '2018'
  pubdate: '2018-01-00'
  doi: 10.1093/mnras/stx2576
  abstract: The nearest stellar system consists of the stars Proxima, Alpha Centauri A and B and at least one planet Proxima
    b. The habitability of Proxima b and any other planets are likely to be significantly influenced by the orbital evolution
    of the system. To study the dynamical evolution of the system, we simulate the motions of Proxima and Alpha Centauri A
    and B due to the perturbations from the Galactic tide and stellar encounters in a Monte Carlo fashion. From 100 clones,
    we find that 74 per cent orbits of Proxima Centauri are bound to Alpha Centauri A and B while 17 per cent and 9 per cent
    orbits become unbound in the simulations over the past and future 5 Gyr. If the system migrated outward in the Milky Way
    to its current location, more than 50 per cent of clones could become unstable in backward simulations. The ratio of unstable
    clones increases with the simulation time-scale and encounter rate. This provides some evidence for a capture scenario
    for the formation of the current triple system. Despite large uncertainties, the metallicity difference between Proxima
    and Alpha Centauri A and B is also suggestive of their different origin. None the less, further improvements in the available
    data and models will be necessary for a reliable assessment of the history of the Proxima-Alpha Centauri system and its
    impact on the habitability of Proxima b.
