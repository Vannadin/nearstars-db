- &id088
  arxiv_id: null
  ads_bibcode: 2013sptz.prop10146C
  title: Searching for the transit of Alpha Centauri B b
  authors:
  - Carey, Sean
  - Ingalls, Jim
  - Krick, Jessica
  - Lowrance, Patrick
  - Grillmair, Carl
  - Kane, Stephen
  - Surace, Jason
  year: '2013'
  pubdate: '2013-10-00'
  doi: null
  abstract: We propose a novel set of observations to measure the possible transit of the recently detected exoplanet, Alpha
    Cen Bb. This closest exoplanet is arguably one of the most exciting detections of the previous year due to the enormous
    potential for followup observations as well as far-reaching public interest outside the astronomical community. The radial
    velocity detected planet has a minimum mass of ~1.1 MEarth and a period of 3.236 days which suggests a transit probability
    of ~16% with a minimum depth of ~100 ppm. If a transit is detected it will provide the planet radius and constrain the
    orbit inclination which will further constrain the mass and permit a determination of the density of this planet, a critical
    parameter for further studies. In addition, if the planet does transit, it increases the probability that other potential
    planets in this system will transit which would be a result of considerable interest. As Alpha Cen B saturates the IRAC
    detectors for even the shortest frametime, we cannot employ the now standard high photometric precision techniques. Instead,
    we will rely on the stability of the PSF and use the high signal to noise wings to achieve ~30 ppm photometry for a potential
    transit. As described in the text, we have demonstrated the viability of this method with an engineering observation of
    Canopus. 53.4 hours are requested to make an initial transit observation and observe a detected transit a second time
    as confirmation.
