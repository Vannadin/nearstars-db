  year: '2016'
  pubdate: '2016-12-00'
  doi: null
  abstract: The next major breakthrough in the exoplanet field will be the discovery and characterization of an Earth-like
    planet in the solar neighborhood. While there are many promising ways to achieve such a detection, imaging at a wavelength
    of 10-micron offers a unique, fast and cost-effective approach to detect and characterize planets around nearby stars
    with physical properties similar to Earth (same size, incident stellar radiation, low clouds and average black body temperature
    of 288K). Instead of detecting reflected light from such planets (typical of shorter wavelength ground/space missions),
    the 10-micron band is sensitive to the thermal emission of planets, being very close to the peak emission wavelength of
    288K black bodies. In less than 200h worth of observing, a 10-micron imager could detect the thermal emission of an Earth-like
    planet around Alpha Centauri A and B on current 8-m telescopes. The same instrument on a 30-m telescope, like the TMT,
    will be quite competitive, allowing such discovery and characterization in an hour. We will present the design of such
    instrument for the 8m Gemini South telescope, as well as simulations of observations and the schedule of our project which
    aims at a first light in 2019.
