- &id011
  arxiv_id: '2211.11756'
  ads_bibcode: 2022MNRAS.516.2938M
  title: A search for optical laser emission from Alpha Centauri AB
  authors:
  - Marcy, G. W.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.1093/mnras/stac2231
  abstract: A search for laser light from the directions of Alpha Centauri A and B was performed by examining 15 362 optical,
    high-resolution spectra obtained between 2004 and 2018. None of the spectra exhibit laser emission lines. The threshold
    was 10 per cent of the continuum intensity of the spectra of both stars at all wavelengths between 3850 and 6900 Å. This
    search would have revealed optical laser light from the directions of Alpha Cen B if the laser had a power of at least
    1.4-5.4 MW (depending on wavelength) and was positioned within the 1 arcsec field of view (projecting to 1.3 au), for
    a benchmark 10-m laser launcher. For Alpha Cen A, the laser power must be three times greater for detection. Lasers of
    smaller aperture would also have been detected but would require more power. Considering all optical surveys, a growing
    desert is emerging in the search for extraterrestrial technology.
