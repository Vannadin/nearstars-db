  title: Fe II fluorescence in main-sequence K-dwarfs
  authors:
  - Eriksson, M.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.1093/mnras/stad3852
  abstract: Main-sequence K-dwarfs possess strong emission in the form of the H I Ly α line. There is a close coincidence
    between the energy corresponding to the transitions H I 1s-2p and Fe II (<SUP>5</SUP>D)5s <SUP>4</SUP>D<SUB>5/2</SUB>-(<SUP>5</SUP>D)5p
    <SUP>4</SUP>D<SUB>5/2</SUB>. Singly ionized iron has been confirmed being pumped by photo-excitation by accidental resonance
    (PAR) in planetary nebulae, symbiotic stars, K-giants, and active galactic nebulae. I investigate in this work whether
    PAR can occur in the atmospheres of main-sequence K-dwarfs, which do not possess the large extended atmospheres of the
    late-type K-giants. Specifically a search for possible Fe II fluorescence lines is conducted. For the case when I can
    confirm PAR, I estimate the total flux leaving the stars in the form of Fe II fluorescence. I search for emission lines
    from the Fe II (<SUP>5</SUP>D)5p <SUP>4</SUP>D<SUB>5/2</SUB> level. Since those of these lines with the largest branching
    fractions correspond to lines at wavelengths covered by the Far Ultraviolet Spectroscopic Explorer (FUSE) satellite, a
    search for archival FUSE spectra from K-dwarfs within 20 ly from the sun is conducted. I retrieve and analyse FUSE spectra
    for four of these K-dwarfs. In each case I can confirm PAR, I fit the H I Ly α line in Hubble Space Telescope spectra
    recorded with the Space Telescope Imaging Spectrograph, in order to estimate the efficiency of the PAR mechanism. I can
    now confirm Fe II fluorescence in the two closest K-dwarfs, Alpha Centauri B, and Epsilon Eridani. The total power leaving
    as Fe II fluorescence are 4.9 × 10<SUP>17</SUP> and 1.30 × 10<SUP>18</SUP> W respectively.
