  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.1117/12.2677778
  abstract: The Astro2020 decadal survey recommended the Habitable Worlds Observatory (HWO), NASA's direct imaging flagship
    mission, with a goal to achieve a statistically robust mission yield of 25 or more potentially habitable exoplanets. One
    way to achieve is to increase the instrument effectiveness by introducing additional bright, nearby targets. A majority
    of Sun-like stars have a stellar companion that can introduce additional noise into the field of view of any high-contrast
    imaging instrument and enabling exoplanet discovery around binary stars represents a path to increased coronagraphic instrument
    efficiency by increasing the available science target pool of bright nearby stars. This includes both of the Alpha Centauri
    A and B stars which would represent the top science target for direct imaging if companion leakage could be suppressed.
    Multi-Star Wavefront Control (MSWC) is a technique that removes stellar leakage from both stellar components, enabling
    direct imaging of exoplanets in many binary star systems which can potentially increase coronagraphic instrument effectiveness
    We present the latest testbed results obtained with MSWC as part of the technology development effort focusing on demonstrations
    conducted on the Occulting Mask Coronagraph (OMC) testbed at JPL during the vacuum test window last winter, with an additional
    vacuum test planned for this fall. The MSWC mask consists of a shaped pupil mask similar to the one used for the Wide-Field
    of View mode, but also includes a set of superimposed, regularly spaced dots that serve as a diffraction grating. OMC
    has a layout similar to the Roman Space Telescope coronagraph instrument and configured with a binary imaging mode with
    a MSWC mask using same design as the contributed mask for the Roman coronagraph. Our testbed results represent the first
    demonstrations of this technique using the recently installed full binary source. We present results demonstrating suppression
    in the Super-Nyquist regime for the third diffraction order reaching 8.7e-9 contrast with the Roman pupil. In addition,
    we present results obtained with a physical binary source and running MSWC in a binary star regime demonstrating 9.6e-8
    contrast for a geometry matching potential Alpha Centauri observations in a 515 nm monochromatic wavelength (similar but
    bluer than for Band one) using the fifth diffraction order. Planned demonstrations in the upcoming vacuum window this
    fall will focus on Band 3d and Band 4 using the full MSWC mode for an Alpha Centauri geometry.
