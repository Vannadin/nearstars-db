  ads_bibcode: 2015AAS...22530605D
  title: Deriving stellar inclination of slow rotators using stellar activity signal
  authors:
  - Dumusque, Xavier
  year: '2015'
  pubdate: '2015-01-00'
  doi: null
  abstract: Stellar inclination is an important parameter for many astrophysical studies. In the context of exoplanets, this
    allows us to derive the true obliquity of a system if the projected stellar spin-planetary orbit angle can measured via
    the Rossiter-Mclaughlin effect. Although different techniques allow us to estimate stellar inclination for fast rotators,
    it becomes much more difficult when stars are rotating slower than 2-2.5 km.s<SUP>-1</SUP>. By using the new activity
    simulation SOAP 2.0 that can reproduce the photometric and spectroscopic variations induced by stellar activity, we are
    able to fit the activity variation of solar-type stars and derive their inclination. The case of the equator-on star HD189733
    will be presented, as well as the case of Alpha Centauri B, which present an inclination of 45<SUP>+9</SUP><SUB>-19</SUB>
    degrees, implying that the earth-mass orbiting planet is not transiting if aligned with its host star. Other exemples
    will also demonstrate the power of the technique, that can infer a stellar inclination, even for slow rotators like Alpha
    Centauri B, that present a projected rotational velocity smaller than 1.15 km.s<SUP>-1</SUP>. In addition, the SOAP 2.0
    simulation can be used to correct for the effect of activity when one major active region is dominating the RV signal.
    This could enhance the detection of small mass exoplanets orbiting slightly active stars.This project is funded by ETAEARTH
    (European Union Seventh Framework Programme (FP7/2007-2013) under Grant Agreement n. 313014), a transnational collaboration
    between European countries and the US (the Swiss Space Office, the Harvard Origin of Life Initiative, the Scottish Universities
    Physics Alliance, the University of Geneva, the Smithsonian Astrophysical Observatory, the Italian National Astrophysical
    Institute, the University of St. Andrews, Queens University Belfast, and the University of Edinburgh) setup to optimize
    the synergy between space-and ground-based data whose scientific potential for the characterization of extrasolar planets
    can only be fully exploited when analyzed together.
