  title: The Interplanetary Medium and Astrosphere around α Cen A and α Cen B
  authors:
  - Mueller, Hans R.
  - Carlson, Mackenzie
  year: '2014'
  pubdate: '2014-06-00'
  doi: null
  abstract: 'The stellar winds of α Centauri A (HD 128620: G2 V) and B (HD 128621: K1 V) combine to carve a bubble, the astrosphere,
    into the surrounding interstellar medium. The winds and the ISM interact, giving rise to pronounced astrospheric boundaries
    including a termination shock and an astropause. Inside the termination shock, the two stellar winds interact strongly.
    These interactions have been characterized numerically with detailed, time-dependent models that also account for the
    non-equilibrium behavior of interstellar neutral hydrogen that traverses the astrosphere. The results of this modeling
    are presented, characterizing the interplanetary environment of extrasolar planets in the α Centauri A+B system, and modeled
    estimates of diffuse, time-dependent X-ray emission due to stellar wind charge exchange are given.'
