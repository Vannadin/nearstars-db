  abstract: After having found hundreds of extra-solar planets, the radial-velocity (RV) technique starts to be limited by
    intrinsic stellar signals. Indeed, at the level of the best spectrographs, one starts to see the effects induced by stellar
    pressure waves, convection, surface activity coupled with stellar rotation, and magnetic cycles. <P />The questions of
    how to extract and analyse the different stellar signals from RV data, and how to mitigate their contributions will be
