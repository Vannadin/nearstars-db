- &id061
  arxiv_id: '1909.00701'
  ads_bibcode: 2019MNRAS.489.4712S
  title: 'Testing the entropy calibration of the radii of cool stars: models of α Centauri A and B'
  authors:
  - Spada, Federico
  - Demarque, Pierre
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1093/mnras/stz2465
  abstract: We present models of α Centauri A and B implementing an entropy calibration of the mixing-length parameter α<SUB>MLT</SUB>,
    recently developed and successfully applied to the Sun (Spada et al. 2018, ApJ, 869, 135). In this technique the value
    of α<SUB>MLT</SUB> in the 1D stellar evolution code is calibrated to match the adiabatic specific entropy derived from
    3D radiation-hydrodynamics simulations of stellar convective envelopes, whose effective temperature, surface gravity,
    and metallicity are selected consistently along the evolutionary track. The customary treatment of convection in stellar
    evolution models relies on a constant, solar-calibrated α<SUB>MLT</SUB>. There is, however, mounting evidence that this
    procedure does not reproduce the observed radii of cool stars satisfactorily. For instance, modelling α Cen A and B requires
    an ad hoc tuning of α<SUB>MLT</SUB> to distinct, non-solar values. The entropy-calibrated models of α Cen A and B reproduce
    their observed radii within 1{{ per cent}} (or better) without externally adjusted parameters. The fit is of comparable
    quality to that of models with freely adjusted α<SUB>MLT</SUB> for α Cen B (within 1σ), while it is less satisfactory
    for α Cen A (within 2.5σ). This level of accuracy is consistent with the intrinsic uncertainties of the method. Our results
    demonstrate the capability of the entropy calibration method to produce stellar models with radii accurate within 1{{
    per cent}}. This is especially relevant in characterizing exoplanet-host stars and their planetary systems accurately.
