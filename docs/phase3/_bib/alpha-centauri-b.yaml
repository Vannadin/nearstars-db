  arxiv_id: null
  ads_bibcode: 2018AAS...23143925J
  title: Dynamics of the Triple-Star System Alpha Centauri and its Impact on Habitable Planets
  authors:
  - Jayla Jones, Ayanna
  - Fabrycky, Daniel
  year: '2018'
  pubdate: '2018-01-00'
  doi: null
  abstract: 'The Alpha Centauri system, our solar system''s closest neighbor, has become a target in the search for habitable
    planets. The system is composed of three stars: Alpha Centauri A and Alpha Centauri B, stars forming an inner binary,
    and Proxima Centauri, an outer star that orbits around the inner binary. We computed 3-body models to follow the dynamics
    for the main-sequence lifetimes of the stars that are based on 100 realizations of the observed orbits. In the majority
    of cases, Proxima only modestly torques the A-B binary orbit, and so previous studies of planet formation and dynamics,
    which find the habitable zones to be stable, are somewhat justified in ignoring this effect. On the other hand, in ~16%
    of the observationally allowed orbits, fluctuations in the orbital eccentricity of the A-B orbit destabilize the middle
    of the habitable zone of both stars. This result calls for further theoretical work to quantify the effect of galactic
    tides, passing stars, and massive planets in the triple-system dynamics.'
