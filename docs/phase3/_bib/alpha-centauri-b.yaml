  arxiv_id: '2512.18205'
  ads_bibcode: 2026AJ....171..124E
  title: Red Noise─based False Alarm Thresholds for Astrophysical Periodograms via Whittle's Approximation to the Likelihood
  authors:
  - Ejaz, Amna
  - Dodson-Robinson, Sarah
  - Haley, Charlotte
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.3847/1538-3881/ae2fe4
  abstract: Astronomers who search for periodic signals using Lomb─Scargle periodograms rely on false alarm level (FAL) estimates
    to identify statistically significant peaks. Although FALs are often calculated from white noise models, many astronomical
    time series suffer from red noise. Prewhitening is a statistical technique in which a continuum model is subtracted from
    the log power spectrum estimate, after which the observer can proceed with a white-noise treatment. Here we present a
    prewhitening-based method of calculating frequency-dependent FALs. We fit power laws and autoregressive models of order
    1 to each Lomb─Scargle periodogram by minimizing the Whittle approximation to the negative log-likelihood (NLL), then
    calculate FALs based on the best-fit model power spectrum. Our technique is a novel extension of the Whittle NLL to datasets
    with uneven time sampling. We demonstrate FAL calculations using observations of α Cen B, GJ 581, HD 192310, synthetic
    data from the radial velocity (RV) fitting challenge, and Kepler observations of a differential rotator. The Kepler data
    analysis shows that only true rotation signals are detected by red noise FALs, while white noise FALs suggest all spurious
    peaks in the low-frequency range are significant. A high-frequency sinusoid injected into α Cen B <inline-formula> <mml:math><mml:mi>log</mml:mi><mml:mi>R</mml:mi><mml:msub><mml:mo>'</mml:mo><mml:mi>HK</mml:mi></mml:msub></mml:math>
    </inline-formula> observations exceeds the 1% red noise FAL despite having only 8.9% of the power of the dominant rotation
    signal. In a periodogram of HD 192310 RVs, peaks associated with differential rotation and planets are detected against
    the 5% red noise FAL without iterative model fitting or subtraction. The software for calculating red noise─based FALs
    is available on GitHub.
