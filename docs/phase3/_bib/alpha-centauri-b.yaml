  ads_bibcode: 2016HEAD...1511703A
  title: The Dynamo Clinical Trial
  authors:
  - Ayres, Thomas R.
  year: '2016'
  pubdate: '2016-04-00'
  doi: null
  abstract: 'The Dynamo Clinical Trial evaluates long-term stellar magnetic health through periodic X-ray examinations (by
    the Chandra Observatory). So far, there are only three subjects enrolled in the DTC: Alpha Centauri A (a solar-like G
    dwarf), Alpha Cen B (an early K dwarf, more active than the Sun), and Alpha Canis Majoris A (Procyon, a mid-F subgiant
    similar in activity to the Sun). Of these, Procyon is a new candidate, so it is too early to judge how it will fare. Of
    the other two, Alpha Cen B has responded well, with a steady magnetic heartbeat of about 8 years duration. The sickest
    of the bunch, Alpha Cen A, was in magnetic cardiac arrest during 2005-2010, but has begun responding to treatment in recent
    years, and seems to be successfully cycling again, perhaps achieving a new peak of magnetic health in the 2016 time frame.
    If this is the case, it has been 20 years since A''s last healthful peak, significantly longer than the middle-aged Sun''s
    11-year magnetic heartbeat, but perhaps in line with Alpha Cen A''s more senescent state (in terms of "relative evolutionary
    age," apparently an important driver of activity). (By the way, don''t miss the exciting movie of the Alpha Cen stars''
    20-year X-ray dance.)'
