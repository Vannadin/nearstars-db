- &id085
  arxiv_id: null
  ads_bibcode: 2013AcASn..54...79X
  title: Planetary Formation and Dynamics in Binary Systems
  authors:
  - Xie, J. W.
  year: '2013'
  pubdate: '2013-01-00'
  doi: null
  abstract: As of today, over 500 exoplanets have been detected since the first exoplanet was discovered around a solar-like
    star in 1995. The planets in binaries could be common as stars are usually born in binary or multiple star systems. Although
    current observations show that the planet host rate in multiple star systems is around 17%, this fraction should be considered
    as a lower limit because of noticeable selection effects against binaries in planet searches. Most of the current known
    planet-bearing binary systems are S-types, meaning the companion star acts as a distant satellite, typically orbiting
    the inner star-planet system over 100 AU away. Nevertheless, there are four systems with a smaller separation of 20 AU,
    including the Gamma Cephei, GJ 86, HD 41004, and HD 196885. In addition to the planets in circumprimary (S-type) orbits
    discussed above, planets in circumbinary (P-type) orbits have been found in only two systems. In this thesis, we mainly
    study the planet formation in the S-type binary systems. <P />In chapter 1, we first summarize current observational facts
    of exoplanets both in single-star and binary systems, then review the theoretical models of planet formation, with special
    attention to the application in binary systems. Perturbative effects from stellar companions render the planet formation
    process in binary systems even more complex than that in single-star systems. The perturbations from a binary companion
    can excite planetesimal orbits, and increase their mutual impact velocities to the values that might exceed their escape
    velocity or even the critical velocity for the onset of eroding collisions. The intermediate stage of the formation process---from
    planetesimals to planetary embryos---is thus the most problematic. In the following chapters, we investigate whether and
    how the planet formation goes through such a problematic stage. <P />In chapter 2, we study the effects of gas dissipation
    on the planetesimals' mutual accretion. We find that in a dissipating gas disk, all the planetesimals eventually converge
    toward the same forced orbits regardless of their size, leading to the much lower impact velocities. This process progressively
    increases the net mass accretion and can even trigger the runaway growth for large planetesimals. <P />In chapter 3, for
    the first time, we adopt a 3-dimensional approach to investigate the planetesimals' mutual accretion in binary systems.
    We find that the inclusion of a small inclination between the binary orbital plane and the circumstellar disk plane leads
    to the realization of the differential orbital phasing in 3-dimensional space. In such a case, impacts mainly occur between
    similar-sized bodies with the impact velocities being significantly reduced, and thus the planetesimal accretion is more
    favored. <P />In chapter 4, we investigate the planet formation in a specific system, the habitable zone of Alpha Centauri
    B. For the first time, we develop a scaling method to estimate the planetesimal collisional timescale in binary systems.
    We find that the accretion-favorable conditions satisfied at 1∼2 AU from Alpha Centauri B after the first 10^5 years.
    However, the planetesimal accretion is significantly less efficient as compared to the single star case. Our results suggest
    that the formation of Earth-like planets through the accretion of km-sized planetesimals is possible in Alpha Centauri
    B, while the formation of gaseous giant planets is not favorable. <P />In chapter 5, we outline a new concept, which we
    call the ``snowball'' growth mode. In this snowball phase, the isolated planetesimals move in the Keplerian orbits, and
    grow solely via the direct accretion of subcentimeter-sized dust entrained with the gas in the protoplanetary disk. Using
    a simplified model in which the planetesimals are progressively produced from the dust, we find that the snowball growth
    phase can be the dominant mode to transfer mass from the dust to planetesimals. The snowball growth mode could provide
    an alternative explanation for the turnover point in the size distribution of the present-day asteroid belt. For the specific
    case of close binaries such as Alpha Centauri, the snowball growth mode provides a safe way for the bodies to grow through
    the problematic range with a size of 1∼50 km. <P />In chapter 6, we investigate the intermediate stages of the planet
    formation in highly inclined cases. We find that the gas drag plays a crucial role in the evolution of the planetesimals'
    semi-major axis, and the results can be generally divided into two categories, i.e., the Kozai-on regime and the Kozai-off
    regime. For both regimes, a robust outcome over a wide range of parameters is that, the planetesimals migrate/jump inwards
    and pile up, leading to a severely truncated and dense planetesimal disk around the primary. In this compact and dense
    disk, the collision rates are high but the relative velocities are low, providing conditions which are favorable for the
    planetesimal growth, and potentially allow for the subsequent formation of planets. <P />Finally, we summarize this thesis
    in chapter 7. Many open questions still remain in current research field of planet formation in binary systems, and the
    current Kepler project provides an unprecedented opportunity for such researches. A comprehensive understanding of planets
    in binaries requires placing them in a bigger context to include the formation and evolution of stars and/or clusters.
