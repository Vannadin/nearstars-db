  ads_bibcode: 2014AGUFM.P11C3767B
  title: How to Directly Image a Habitable Planet Around Alpha Centauri with a 30cm Space Telescope.
  authors:
  - Belikov, R.
  - Bendek, E.
  - Thomas, S.
  - Black, D.
  year: '2014'
  pubdate: '2014-12-00'
  doi: null
  abstract: 'More than 1,700 exoplanets have been discovered to date, including a handful of potentially habitable ones. There
    is on average more than one planet per star, and estimates of occurrence rates for potentially habitable planets (eta_Earth)
    from the Kepler mission range between 5 and 50%. Several mission concepts have been studied to directly image planets
    around nearby stars. Direct imaging enables spectroscopic detection of biomarkers such as atmospheric oxygen and methane,
    which would be highly suggestive of extraterrestrial life. It is commonly thought that directly imaging a potentially
    habitable exoplanet requires telescopes with apertures of at least 1m, costing at least $1B, and launching no earlier
    than the 2020s. A notable exception to this is Alpha Centauri. The system contains two Sun-like stars with a wide separation
    that allows dynamically stable habitable zones around either star. Habitable zones span about 0.5-1" in stellocentric
    angle, 3x wider than around any other FGKM star. A 30cm visible light space telescope is sufficient to resolve the habitable
    zone and detect a potentially habitable planet in minutes with ideal components, or days with realistic ones. We are developing
    a mission concept called ACEND (Alpha Centauri Direct Imager) consisting of a 30cm primary, a Phase-Induced Amplitude
    Apodization coronagraph, and a wavefront control system. It is designed to suppress the light leak from both stars and
    directly image their planetary systems in 3 color channels, including the capability to detect potentially habitable planets.
    Color imaging is sufficient to differentiate Venus-like, Earth-like, and Mars-like planets from each other and establish
    the presence of Earth-pressure atmosphere through Rayleigh scattering. Two factors make it possible to realize the requirements
    of ACEND (most notably 10^10 contrast) on a small budget and fast schedule: (a) ACEND will collect a long continuous sequence
    of images on Alpha Centauri A and B for 2 years, enabling much better speckle subtraction than missions that have many
    targets, thus greatly relaxing the requirements on the raw contrast of the coronagraph; (b) the small scale regime implies
    greater rigidity and stability, as well as smaller optics with better wavefronts.'
