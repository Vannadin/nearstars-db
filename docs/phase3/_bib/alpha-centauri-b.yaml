- &id094
  arxiv_id: null
  ads_bibcode: 2021cosp...43E1951W
  title: 'Reasoning the chemical composition and geological evolution of terrestrial planets to be found in the Alpha Centauri
    A and B System: A top-down approach'
  authors:
  - Wang, Haiyang
  - Quanz, Sascha
  - Lineweaver, A. Charles
  - Mojzsis, Stephen
  - Ireland, Trevor
  year: '2021'
  pubdate: '2021-01-00'
  doi: null
  abstract: Exoplanet statistics suggest that the fraction of Sun-like stars with planets may be as large as $100%$. The supposed
    detection of an Earth-mass exoplanet orbiting $\alpha$ Centauri B - though retracted later - has drawn great attention
    to finding Earth-like planets in the nearest and triple star system. The discovery of a potentially Earth-like planet
    orbiting in the habitable zone of Proxima Centauri raises hopes for finding terrestrial planets in the habitable zone
    of $\alpha$ Centauri A and B, i.e. $\alpha$-Cen-Earths. What do our current observations of the system suggest about these
    potential $\alpha$-Cen-Earths? The bulk chemical composition of the Earth and the other terrestrial planets of our Solar
    System is largely the devolatilized composition of the Sun. With devolatilization likely to be a universal feature of
    terrestrial planet formation, the bulk chemical composition of terrestrial planets orbiting other stars can be estimated
    by devolatilizing the observed chemical abundances of other stars. We apply this reasoning in the context of Galactic
    Chemical Evolution, to the $\alpha$ Centauri A and B system. Observed abundances in $\alpha$ Cen A and B are consistent
    with each other and therefore consistent with the idea that they have the same origin and thus approximately the same
    chemical abundances. To some extent, we can turn these abundances into predictions about the nature of these yet-to-be-found
    $\alpha$-Cen-Earths orbiting either A or B. Compared to the Earth, these $\alpha$-Cen-Earths would tend to be more massive
    than the terrestrial planets of our Solar System since $\alpha$ Cen AB is $\sim 70$$%$ more metal-rich than the Sun. The
    nearly identical Mg/Si as the Earth implies that the silicate mantle of $\alpha$-Cen-Earths would develop similar relative
    abundances of olivine and pyroxene and thus have the similar capability of acting as a source region (buffer) for water.
    However, the analysis of proxies for the long-lived, heat-producing radionuclides ($^{232}$Th, $^{235}$U, and $^{238}$U)
    suggests that $\alpha$-Cen-Earths would generate $24^{+21}_{-29}$ $%$ less radiogenic heat to drive mantle convection
    and planetary resurfacing, resulting in relatively weaker geological activity compared to early Earth. Furthermore, a
    higher (Mg+2Si)/Fe of $6\pm2$ $%$ indicates that $\alpha$-Cen-Earth would have a relatively smaller core, implying less
    strength of magnetic fields (even if they could be generated) compared to Earth's. The modeling has important implications
    for the emergence and persistence of biospheres of these $\alpha$-Cen-Earths and could be a springboard for the population
    analysis of systems with eta-Earths.
