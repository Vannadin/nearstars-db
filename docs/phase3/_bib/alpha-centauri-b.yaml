- &id070
  arxiv_id: '1701.08803'
  ads_bibcode: 2017ApJ...835L..32H
  title: Deceleration of High-velocity Interstellar Photon Sails into Bound Orbits at α Centauri
  authors:
  - Heller, René
  - Hippke, Michael
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/2041-8213/835/2/L32
  abstract: At a distance of about 4.22 ly, it would take about 100,000 years for humans to visit our closest stellar neighbor
    Proxima Centauri using modern chemical thrusters. New technologies are now being developed that involve high-power lasers
    firing at 1 gram solar sails in near-Earth orbits, accelerating them to 20% the speed of light (c) within minutes. Although
    such an interstellar probe could reach Proxima 20 years after launch, without propellant to slow it down it would traverse
    the system within hours. Here we demonstrate how the stellar photon pressures of the stellar triple α Cen A, B, and C
    (Proxima) can be used together with gravity assists to decelerate incoming solar sails from Earth. The maximum injection
    speed at α Cen A to park a sail with a mass-to-surface ratio (σ) similar to graphene (7.6 × 10<SUP>-4</SUP> gram m<SUP>-2</SUP>)
    in orbit around Proxima is about 13,800 km s<SUP>-1</SUP> (4.6% c), implying travel times from Earth to α Cen A and B
    of about 95 years and another 46 years (with a residual velocity of 1280 km s<SUP>-1</SUP>) to Proxima. The size of such
    a low-σ sail required to carry a payload of 10 grams is about 10<SUP>5</SUP> m<SUP>2</SUP> = (316 m)<SUP>2</SUP>. Such
    a sail could use solar photons instead of an expensive laser system to gain interstellar velocities at departure. Photogravitational
    assists allow visits of three stellar systems and an Earth-sized potentially habitable planet in one shot, promising extremely
    high scientific yields.
