  year: '2018'
  pubdate: '2018-01-00'
  doi: null
  abstract: Project Blue is a coronagraphic imaging space telescope mission designed to search for habitable worlds orbiting
    the nearest Sun-like stars in the Alpha Centauri system. With a 45-50 cm baseline primary mirror size, Project Blue will
    perform a reconnaissance of the habitable zones of Alpha Centauri A and B in blue light and one or two longer wavelength
    bands to determine the hue of any planets discovered. Light passing through the off-axis telescope feeds into a coronagraphic
    instrument that forms the heart of the mission. Various coronagraph designs are being considered, such as phase induced
    amplitude apodization (PIAA), vector vortex, etc. Differential orbital image processing techniques will be employed to
    analyze the data for faint planets embedded in the residual glare of the parent star. Project Blue will advance our knowledge
    about the presence or absence of terrestrial-class exoplanets in the habitable zones and measure the brightness of zodiacal
    dust around each star, which will aid future missions in planning their observational surveys of exoplanets. It also provides
    on-orbit demonstration of high-contrast coronagraphic imaging technologies and techniques that will be useful for planning
    and implementing future space missions by NASA and other space agencies. We present an overview of the science goals,
    mission concept and development schedule. As part of our cooperative agreement with NASA, the Project Blue team intends
    to make the data available in a publicly accessible archive.
