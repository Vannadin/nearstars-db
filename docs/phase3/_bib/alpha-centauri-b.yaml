- &id073
  arxiv_id: '1510.05598'
  ads_bibcode: 2016MNRAS.456L...6R
  title: 'Ghost in the time series: no planet for Alpha Cen B'
  authors:
  - Rajpaul, V.
  - Aigrain, S.
  - Roberts, S.
  year: '2016'
  pubdate: '2016-02-00'
  doi: 10.1093/mnrasl/slv164
  abstract: 'We re-analyse the publicly available radial velocity (RV) measurements for Alpha Cen B, a star hosting an Earth-mass
    planet candidate, Alpha Cen Bb, with 3.24 d orbital period. We demonstrate that the 3.24 d signal observed in the Alpha
    Cen B data almost certainly arises from the window function (time sampling) of the original data. We show that when stellar
    activity signals are removed from the RV variations, other significant peaks in the power spectrum of the window function
    are coincidentally suppressed, leaving behind a spurious yet apparently significant `ghost'' of a signal that was present
    in the window function''s power spectrum ab initio. Even when fitting synthetic data with time sampling identical to the
    original data, but devoid of any genuine periodicities close to that of the planet candidate, the original model used
    to infer the presence of Alpha Cen Bb leads to identical conclusions: viz., the 3σ detection of a half-a-metre-per-second
    signal with 3.236 d period. Our analysis underscores the difficulty of detecting weak planetary signals in RV data, and
    the importance of understanding in detail how every component of an RV data set, including its time sampling, influences
    final statistical inference.'
