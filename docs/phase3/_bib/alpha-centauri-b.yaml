  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.1017/S1743921318002831
  abstract: The bright nearby binary α Centauri constitutes an excellent laboratory for testing stellar evolution models.
    The mass, radius, and luminosity of α Cen A and B are known to better than 1% accuracy thanks to recent interferometric
    and adaptive optical observations, and p-mode oscillations have been observed in both stars. We present new stellar models
    which fit simultaneously the classical and seismic observations, with particular emphasis on the convective mixing length
    parameter MLT - the adaptivity of which is necessary to fit the models to observations. The oscillation data provide an
    important constraint on the models, as the small frequency separation is sensitive to the composition gradient in the
    core of the stars, while the large frequency separation constrains the mean density of the stars, providing an independent
    check on the mass and radius.
