  doi: 10.1029/2019MS001882
  abstract: The Community Earth System Model version 2 (CESM2) includes a detailed representation of chemistry throughout
    the atmosphere in the Community Atmosphere Model with chemistry and Whole Atmosphere Community Climate Model configurations.
    These model configurations use the Model for Ozone and Related chemical Tracers (MOZART) family of chemical mechanisms,
    covering the troposphere, stratosphere, mesosphere, and lower thermosphere. The new MOZART tropospheric chemistry scheme
    (T1) has a number of updates over the previous version (MOZART-4) in CESM, including improvements to the oxidation of
    isoprene and terpenes, organic nitrate speciation, and aromatic speciation and oxidation and thus improved representation
    of ozone and secondary organic aerosol precursors. An evaluation of the present-day simulations of CESM2 being provided
    for Climate Model Intercomparison Project round 6 (CMIP6) is presented. These simulations, using the anthropogenic and
    biomass burning emissions from the inventories specified for CMIP6, as well as online calculation of emissions of biogenic
    compounds, lightning NO, dust, and sea salt, indicate an underestimate of anthropogenic emissions of a variety of compounds,
    including carbon monoxide and hydrocarbons. The simulation of surface ozone in the southeast United States is improved
    over previous model versions, largely due to the improved representation of reactive nitrogen and organic nitrate compounds
    resulting in a lower ozone production rate than in CESM1 but still overestimates observations in summer. The simulation
    of tropospheric ozone agrees well with ozonesonde observations in many parts of the globe. The comparison of NO<SUB>x</SUB>
    and PAN to aircraft observations indicates the model simulates the nitrogen budget well.
