  arxiv_id: '2209.07566'
  ads_bibcode: 2023MNRAS.518..206C
  title: Variability due to climate and chemistry in observations of oxygenated Earth-analogue exoplanets
  authors:
  - Cooke, G. J.
  - Marsh, D. R.
  - Walsh, C.
  - Rugheimer, S.
  - Villanueva, G. L.
  year: '2023'
  pubdate: '2023-01-00'
  doi: 10.1093/mnras/stac2604
  abstract: The Great Oxidation Event was a period during which Earth's atmospheric oxygen (O<SUB>2</SUB>) concentrations
    increased from ~10<SUP>-5</SUP> times its present atmospheric level (PAL) to near modern levels, marking the start of
    the Proterozoic geological eon 2.4 billion years ago. Using WACCM6, an Earth System Model, we simulate the atmosphere
    of Earth-analogue exoplanets with O<SUB>2</SUB> mixing ratios between 0.1 and 150 per cent PAL. Using these simulations,
    we calculate the reflection spectra over multiple orbits using the Planetary Spectrum Generator. We highlight how observer
    angle, albedo, chemistry, and clouds affect the simulated observations. We show that inter-annual climate variations,
    as well short-term variations due to clouds, can be observed in our simulated atmospheres with a telescope concept such
    as LUVOIR or HabEx. Annual variability and seasonal variability can change the planet's reflected flux (including the
    reflected flux of key spectral features such as O<SUB>2</SUB> and H<SUB>2</SUB>O) by up to factors of 5 and 20, respectively,
    for the same orbital phase. This variability is best observed with a high-throughput coronagraph. For example, HabEx (4
    m) with a starshade performs up to a factor of two times better than a LUVOIR B (6 m) style telescope. The variability
    and signal-to-noise ratio of some spectral features depends non-linearly on atmospheric O<SUB>2</SUB> concentration. This
    is caused by temperature and chemical column depth variations, as well as generally increased liquid and ice cloud content
    for atmospheres with O<SUB>2</SUB> concentrations of &lt;1 per cent PAL.
