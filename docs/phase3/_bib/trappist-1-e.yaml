- &id163
  arxiv_id: '2208.09415'
  ads_bibcode: 2022A&A...665A.156K
  title: Is ozone a reliable proxy for molecular oxygen?. I. The O<SUB>2</SUB>-O<SUB>3</SUB> relationship for Earth-like atmospheres
  authors:
  - Kozakis, Thea
  - Mendonça, João M.
  - Buchhave, Lars A.
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.1051/0004-6361/202244164
  abstract: Molecular oxygen (O<SUB>2</SUB>) paired with a reducing gas is regarded as a promising biosignature pair for the
    atmospheric characterization of terrestrial exoplanets. In circumstances when O<SUB>2</SUB> may not be detectable in a
    planetary atmosphere (e.g., at mid-IR wavelengths) it has been suggested that ozone (O<SUB>3</SUB>), the photochemical
    product of O<SUB>2</SUB>, could be used as a proxy to infer the presence of O<SUB>2</SUB>. However, O<SUB>3</SUB> production
    has a nonlinear dependence on O<SUB>2</SUB> and is strongly influenced by the UV spectrum of the host star. To evaluate
    the reliability of O<SUB>3</SUB> as a proxy for O<SUB>2</SUB>, we used Atmos, a 1D coupled climate and photochemistry
    code, to study the O<SUB>2</SUB>-O<SUB>3</SUB> relationship for "Earth-like" habitable zone planets around a variety of
    stellar hosts (G0V-M5V) and O<SUB>2</SUB> abundances. Overall, we found that the O<SUB>2</SUB>-O<SUB>3</SUB> relationship
    differed significantly with stellar hosts and resulted in different trends for hotter stars (G0V-K2V) versus cooler stars
    (K5V-M5V). Planets orbiting hotter host stars counter-intuitively experience an increase in O<SUB>3</SUB> when O<SUB>2</SUB>
    levels are initially decreased from 100% Earth's present atmospheric level (PAL), with a maximum O<SUB>3</SUB> abundance
    occurring at 25-55% PAL O<SUB>2</SUB>. As O<SUB>2</SUB> abundance initially decreases, larger amounts of UV photons capable
    of O<SUB>2</SUB> photolysis reach the lower (denser) regions of the atmosphere where O<SUB>3</SUB> production is more
    efficient, thus resulting in these increased O<SUB>3</SUB> levels. This effect does not occur for cooler host stars (K5V-M5V),
    since the weaker incident UV flux does not allow O<SUB>3</SUB> formation to occur at dense enough regions of the atmosphere
    where the faster O<SUB>3</SUB> production can outweigh a smaller source of O<SUB>2</SUB> from which to create O<SUB>3</SUB>.
    Thus, planets experiencing higher amounts of incident UV possessed larger stratospheric temperature inversions, leading
    to shallower O<SUB>3</SUB> features in planetary emission spectra. Overall it will be extremely difficult (or impossible)
    to infer precise O<SUB>2</SUB> levels from an O<SUB>3</SUB> measurement, however, with information about the UV spectrum
    of the host star and context clues, O<SUB>3</SUB> will provide valuable information about potential surface habitability
    of an exoplanet.
  source: citation_of=2023ApJ...959...45C
