- &id073
  arxiv_id: '2010.04587'
  ads_bibcode: 2020A&A...644A.165B
  title: 'Solid tidal friction in multi-layer planets: Application to Earth, Venus, a Super Earth and the TRAPPIST-1 planets.
    Potential approximation of a multi-layer planet as a homogeneous body'
  authors:
  - Bolmont, E.
  - Breton, S. N.
  - Tobie, G.
  - Dumoulin, C.
  - Mathis, S.
  - Grasset, O.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.1051/0004-6361/202038204
  abstract: With the discovery of TRAPPIST-1 and its seven planets residing within 0.06 au, it is becoming increasingly necessary
    to carry out correct treatments of tidal interactions. The eccentricity, rotation, and obliquity of the planets of TRAPPIST-1
    do indeed result from the tidal evolution over the lifetime of the system. Tidal interactions can also lead to tidal heating
    in the interior of the planets (as for Io), which may then be responsible for volcanism or surface deformation. In the
    majority of studies aimed at estimating the rotation of close-in planets or their tidal heating, the planets are considered
    as homogeneous bodies and their rheology is often taken to be a Maxwell rheology. Here, we investigate the impact of taking
    into account a multi-layer structure and an Andrade rheology in the way planets dissipate tidal energy as a function of
    the excitation frequency. We use an internal structure model, which provides the radial profile of structural and rheological
    quantities (such as density, shear modulus, and viscosity) to compute the tidal response of multi-layered bodies. We then
    compare the outcome to the dissipation of a homogeneous planet (which only take a uniform value for shear modulus and
    viscosity). We find that for purely rocky bodies, it is possible to approximate the response of a multi-layer planet by
    that of a homogeneous planet. However, using average profiles of shear modulus and viscosity to compute the homogeneous
    planet response leads to an overestimation of the averaged dissipation. We provide fitted values of shear modulus and
    viscosity that are capable of reproducing the response of various types of rocky planets. However, we find that if the
    planet has an icy layer, its tidal response can no longer be approximated by a homogeneous body because of the very different
    properties of the icy layers (in particular, their viscosity), which leads to a second dissipation peak at higher frequencies.
    We also compute the tidal heating profiles for the outer TRAPPIST-1 planets (e to h).
