  arxiv_id: '1509.00735'
  ads_bibcode: 2015A&A...581A..44G
  title: Galactic cosmic rays on extrasolar Earth-like planets. I. Cosmic ray flux
  authors:
  - Grießmeier, J.-M.
  - Tabataba-Vakili, F.
  - Stadelmann, A.
  - Grenfell, J. L.
  - Atri, D.
  year: '2015'
  pubdate: '2015-09-00'
  doi: 10.1051/0004-6361/201425451
  abstract: 'Context. Theoretical arguments indicate that close-in terrestial exoplanets may have weak magnetic fields, especially
    in the case of planets more massive than Earth (super-Earths). Planetary magnetic fields, however, constitute one of the
    shielding layers that protect the planet against cosmic-ray particles. In particular, a weak magnetic field results in
    a high flux of Galactic cosmic rays that extends to the top of the planetary atmosphere. <BR /> Aims: We wish to quantify
    the flux of Galactic cosmic rays to an exoplanetary atmosphere as a function of the particle energy and of the planetary
    magnetic moment. <BR /> Methods: We numerically analyzed the propagation of Galactic cosmic-ray particles through planetary
    magnetospheres. We evaluated the efficiency of magnetospheric shielding as a function of the particle energy (in the range
    16 MeV ≤ E ≤ 524 GeV) and as a function of the planetary magnetic field strength (in the range 0 M<SUB>⊕</SUB> ≤ M ≤ 10
    M<SUB>⊕</SUB>). Combined with the flux outside the planetary magnetosphere, this gives the cosmic-ray energy spectrum
    at the top of the planetary atmosphere as a function of the planetary magnetic moment. <BR /> Results: We find that the
    particle flux to the planetary atmosphere can be increased by more than three orders of magnitude in the absence of a
    protecting magnetic field. For a weakly magnetized planet (ℳ = 0.05 ℳ<SUB>⊕</SUB>), only particles with energies below
    512 MeV are at least partially shielded. For a planet with a magnetic moment similar to that of Earth, this limit increases
    to to 32 GeV, whereas for a strongly magnetized planet (ℳ = 10.0 ℳ<SUB>⊕</SUB>), partial shielding extends up to 200 GeV.
    Over the parameter range we studied, strong shielding does not occur for weakly magnetized planets. For a planet with
    a magnetic moment similar to that of Earth, particles with energies below 512 MeV are strongly shielded, and for strongly
    magnetized planets, this limit increases to 10 GeV. <BR /> Conclusions: We find that magnetic shielding strongly controls
    the number of cosmic-ray particles reaching the planetary atmosphere. The implications of this increased particle flux
    are discussed in a companion article.'
