  arxiv_id: '1305.1717'
  ads_bibcode: 2013ApJ...769L..14G
  title: The Effect of Planet-Planet Scattering on the Survival of Exomoons
  authors:
  - Gong, Yan-Xiang
  - Zhou, Ji-Lin
  - Xie, Ji-Wei
  - Wu, Xiao-Mei
  year: '2013'
  pubdate: '2013-05-00'
  doi: 10.1088/2041-8205/769/1/L14
  abstract: Compared to the giant planets in the solar system, exoplanets have many remarkable properties, such as the prevalence
    of giant planets on eccentric orbits and the presence of hot Jupiters. Planet-planet scattering (PPS) between giant planets
    is a possible mechanism to interpret the above and other observed properties. If the observed giant planet architectures
    are indeed outcomes of PPS, such a drastic dynamical process must affect their primordial moon systems. In this Letter,
    we discuss the effect of PPS on the survival of exoplanets' regular moons. From an observational viewpoint, some preliminary
    conclusions are drawn from the simulations. (1) PPS is a destructive process to the moon systems; single planets on eccentric
    orbits are not ideal moon-search targets. (2) If hot Jupiters formed through PPS, their original moons have little chance
    of survival. (3) Planets in multiple systems with small eccentricities are more likely to hold their primordial moons.
    (4) Compared with lower-mass planets, massive planets in multiple systems may not be the preferred moon-search targets
    if the system underwent a PPS history.
