  - Sotin, Christophe
  year: '2018'
  pubdate: '2018-08-00'
  doi: 10.1029/2018GL078889
  abstract: A high-pressure ice layer controls the exchange of heat and material between the silicate core and the ocean of
    Ganymede and Titan. We have shown (Kalousová et al., 2018, <A href="http://doi.org/10.1016/j.icarus.2017.07.018">http://doi.org/10.1016/j.icarus.2017.07.018</A>)
    that a temperate (partially molten) layer is always present at the ocean interface. Another temperate layer with a few
    percent of water may be present at the silicates interface for low values of Rayleigh number. We derive scaling laws to
    predict the critical value under which this temperate layer exists and the amount of generated melt. The presence of liquid
    water in contact with silicates was probably limited to the early history, providing a pathway for the transfer of salts
    and volatiles like <SUP>40</SUP>Ar to the ocean. We also derive scaling laws for the water outflow velocity and for the
    top temperate layer thickness. These laws can be used to model the global thermal and compositional evolution of large
    ocean worlds.
