- &id076
  arxiv_id: '2002.10950'
  ads_bibcode: 2020GMD....13..707F
  title: 'TRAPPIST-1 Habitable Atmosphere Intercomparison (THAI): motivations and protocol version 1.0'
  authors:
  - Fauchez, Thomas J.
  - Turbet, Martin
  - Wolf, Eric T.
  - Boutle, Ian
  - Way, Michael J.
  - Del Genio, Anthony D.
  - Mayne, Nathan J.
  - Tsigaridis, Konstantinos
  - Kopparapu, Ravi K.
  - Yang, Jun
  - Forget, Francois
  - Mandell, Avi
  - Domagal Goldman, Shawn D.
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.5194/gmd-13-707-2020
  abstract: Upcoming telescopes such as the James Webb Space Telescope (JWST), the European Extremely Large Telescope (E-ELT),
    the Thirty Meter Telescope (TMT) or the Giant Magellan Telescope (GMT) may soon be able to characterize, through transmission,
    emission or reflection spectroscopy, the atmospheres of rocky exoplanets orbiting nearby M dwarfs. One of the most promising
    candidates is the late M-dwarf system TRAPPIST-1, which has seven known transiting planets for which transit timing variation
    (TTV) measurements suggest that they are terrestrial in nature, with a possible enrichment in volatiles. Among these seven
    planets, TRAPPIST-1e seems to be the most promising candidate to have habitable surface conditions, receiving ∼66 % of
    the Earth's incident radiation and thus needing only modest greenhouse gas inventories to raise surface temperatures to
    allow surface liquid water to exist. TRAPPIST-1e is, therefore, one of the prime targets for the JWST atmospheric characterization.
    In this context, the modeling of its potential atmosphere is an essential step prior to observation. Global climate models
    (GCMs) offer the most detailed way to simulate planetary atmospheres. However, intrinsic differences exist between GCMs
    which can lead to different climate prediction and thus observability of gas and/or cloud features in transmission and
    thermal emission spectra. Such differences should preferably be known prior to observations. In this paper we present
    a protocol to intercompare planetary GCMs. Four testing cases are considered for TRAPPIST-1e, but the methodology is applicable
    to other rocky exoplanets in the habitable zone. The four test cases included two land planets composed of modern-Earth
    and pure-CO<SUB>2</SUB> atmospheres and two aqua planets with the same atmospheric compositions. Currently, there are
    four participating models (LMDG, ROCKE-3D, ExoCAM, UM); however, this protocol is intended to let other teams participate
    as well.
