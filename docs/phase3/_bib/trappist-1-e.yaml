  abstract: 'We report new optical constants (refractive index, n, and extinction coefficient, k) for exoplanet haze analogs
    from 0.3 to 30 µm. The samples were produced in a simulated N<SUB>2</SUB>-dominated atmosphere with two different abundance
    ratios of CO<SUB>2</SUB> and CH<SUB>4</SUB>, using the PAMPRE plasma reactor at LATMOS. We find that our haze analogs
    present a significantly lower extinction coefficient in the optical and near-infrared (NIR) range compared to the seminal
    data obtained on Titan haze analogs. We confirm the stronger IR absorption expected for hazes produced in a gas mixture
    with higher CO<SUB>2</SUB> abundances. Given the strong impact of the atmospheric composition on the absorbing power of
    hazes, these new data should be used to characterize early-Earth and CO<SUB>2</SUB>-rich exoplanet atmospheres. The data
    presented in this paper can be found in the Optical Constants Database. Using ellipsometry or spectrophotometry, the retrieved
    optical constants are affected by the sensitivity of the measurement and the accuracy of the calculations. A comparative
    study of both techniques was performed to identify limitations and better understand the discrepancies present in the
    previous data. For the refractive index n, errors of 1-3% are observed with both optical techniques and the different
    models, caused by the correlation with the film thickness. We find that UV-visible reflection ellipsometry provides similar
    n values, regardless of the model used; whereas the Swanepoel method on transmission is more subjected to errors in the
    UV. In the UV and mid-infrared (MIR), the different calculations lead to rather small errors on k. Larger errors of k
    arise in the region of weak absorption, where calculations are more sensitive to errors on the refractive index n. <P
    />Data available in the Optical Constants Database: <A href="https://ocdb.smce.nasa.gov/">https://ocdb.smce.nasa.gov/</A>'
