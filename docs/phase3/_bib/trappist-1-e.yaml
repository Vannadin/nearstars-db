  abstract: We recently used near-infrared spectroscopy to improve the characterization of 76 low-mass stars around which
    K2 had detected 79 candidate transiting planets. 29 of these worlds were new discoveries that had not previously been
    published. We calculate the false positive probabilities that the transit-like signals are actually caused by non-planetary
    astrophysical phenomena and reject five new transit-like events and three previously reported events as false positives.
    We also statistically validate 17 planets (7 of which were previously unpublished), confirm the earlier validation of
    22 planets, and announce 17 newly discovered planet candidates. Revising the properties of the associated planet candidates
    based on the updated host star characteristics and refitting the transit photometry, we find that our sample contains
    21 planets or planet candidates with radii smaller than 1.25 R<SUB>⊕</SUB>, 18 super-Earths (1.25-2 R<SUB>⊕</SUB>), 21
    small Neptunes (2-4 R<SUB>⊕</SUB>), three large Neptunes (4-6 R<SUB>⊕</SUB>), and eight giant planets (&gt;6 R<SUB>⊕</SUB>).
    Most of these planets are highly irradiated, but EPIC 206209135.04 (K2-72e, 1.29<SUB>-0.13</SUB><SUP>+0.14</SUP> R<SUB>\oplusT</SUB>),
    EPIC 211988320.01 (R<SUB>p</SUB>=2.86<SUB>-0.15</SUB><SUP>+0.16</SUP> R<SUB>\oplus</SUB>). and EPIC 212690867.01 (2.20<SUB>-0.18</SUB><SUP>+0.19</SUP>
    R<SUB>\oplus</SUB>) orbit within optimistic habitable zone boundaries set by the "recent Venus" inner limit and the "early
    Mars" outer limit. In total, our planet sample includes eight moderately irradiated 1.5-3 R<SUB>⊕</SUB> planet candidates
    (F<SUB>p</SUB> ≲ 20 F<SUB>⊕</SUB>) orbiting brighter stars (Ks &lt; 11) that are well-suited for atmospheric investigations
    with the Hubble, Spitzer, and/or James Webb Space Telescopes. Five validated planets orbit relatively bright stars (Kp
    &lt; 12.5) and are expected to yield radial velocity semi-amplitudes of at least 2 m s<SUP>-1</SUP>. Accordingly, they
    are possible targets for radial velocity mass measurement with current facilities or the upcoming generation of red optical
    and near-infrared high-precision RV spectrographs.
