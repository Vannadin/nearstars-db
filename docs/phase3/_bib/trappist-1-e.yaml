  doi: 10.1088/2041-8205/726/1/L8
  abstract: We consider a range of possible climates for the habitable-zone planet candidate, Gliese 581g, contingent on a
    plausible set of hypothetical atmospheres and assuming the planet to be tide locked. The two most habitable states we
    find are (1) a nearly airless Super-Europa with thin ice at the substellar point and (2) an "Eyeball Earth" which is mostly
    frozen but supports a substantial stable pool of open water centered on the substellar point. We discuss the prospects
    for observational determination of what kind of climate 581g actually supports.
