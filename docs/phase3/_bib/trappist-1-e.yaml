  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.1002/2016JA023517
  abstract: 'We study the Mars Atmosphere and Volatile Evolution spacecraft observations of Martian planetary ion escape during
    two time periods: 11 November 2014 to 19 March 2015 and 4 June 2015 to 24 October 2015, with the focus on understanding
    the seasonal variability of Martian ion escape in response to the solar extreme ultraviolet (EUV) flux. We organize the
    &gt;6 eV O<SUP>+</SUP> ion data by the upstream electric field direction to estimate the escape rates through the plume
    and tail. To investigate the ion escape dependence on the solar EUV flux, we constrain the solar wind dynamic pressure
    and interplanetary magnetic filed strength and compare the ion escape rates through the plume and tail in different energy
    ranges under high and low EUV conditions. We found that the total &gt;6 eV O<SUP>+</SUP> escape rate increases from 2
    to 3 × 10<SUP>24</SUP> s<SUP>-1</SUP> as the EUV irradiance increases by almost the same factor, mostly on the &lt;1 keV
    tailward escape. The plume escape rate does not vary significantly with EUV. The relative contribution from the plume
    to the total escape varies between 30% and 20% from low to high EUV. Our results suggest that the Martian ion escape is
    sensitive to the seasonal EUV variation, and the contribution from plume escape becomes more important under low EUV conditions.'
