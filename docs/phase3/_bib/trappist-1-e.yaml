  title: Evidence from fluid inclusions for microbial methanogenesis in the early Archaean era
  authors:
  - Ueno, Yuichiro
  - Yamada, Keita
  - Yoshida, Naohiro
  - Maruyama, Shigenori
  - Isozaki, Yukio
  year: '2006'
  pubdate: '2006-03-00'
  doi: 10.1038/nature04584
  abstract: Methanogenic microbes may be one of the most primitive organisms, although it is uncertain when methanogens first
    appeared on Earth. During the Archaean era (before 2.5Gyr ago), methanogens may have been important in regulating climate,
    because they could have provided sufficient amounts of the greenhouse gas methane to mitigate a severely frozen condition
    that could have resulted from lower solar luminosity during these times. Nevertheless, no direct geological evidence has
    hitherto been available in support of the existence of methanogens in the Archaean period, although circumstantial evidence
    is available in the form of ~2.8-Gyr-old carbon-isotope-depleted kerogen. Here we report crushing extraction and carbon
    isotope analysis of methane-bearing fluid inclusions in ~3.5-Gyr-old hydrothermal precipitates from Pilbara craton, Australia.
    Our results indicate that the extracted fluids contain microbial methane with carbon isotopic compositions of less than
    -56‰ included within original precipitates. This provides the oldest evidence of methanogen (&gt; 3.46Gyr ago), pre-dating
    previous geochemical evidence by about 700 million years.
