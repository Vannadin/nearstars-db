- &id476
  arxiv_id: '1409.2312'
  ads_bibcode: 2015ApJ...802..107W
  title: 'Tau-REx I: A Next Generation Retrieval Code for Exoplanetary Atmospheres'
  authors:
  - Waldmann, I. P.
  - Tinetti, G.
  - Rocchetto, M.
  - Barton, E. J.
  - Yurchenko, S. N.
  - Tennyson, J.
  year: '2015'
  pubdate: '2015-04-00'
  doi: 10.1088/0004-637X/802/2/107
  abstract: 'Spectroscopy of exoplanetary atmospheres has become a well established method for the characterization of extrasolar
    planets. We here present a novel inverse retrieval code for exoplanetary atmospheres. T-REx(Tau Retrieval for Exoplanets)
    is a line-by-line radiative transfer fully Bayesian retrieval framework. T-REx includes the following features:(1) the
    optimized use of molecular line lists from the ExoMol project; (2) an unbiased atmospheric composition prior selection,
    through custom built pattern recognition software; (3) the use of two independent algorithms to fully sample the Bayesian
    likelihood space: nested sampling as well as a more classical Markov Chain Monte Carlo approach; (4) iterative Bayesian
    parameter and model selection using the full Bayesian Evidence as well as the Savage-Dickey Ratio for nested models; and
    (5) the ability to fully map very large parameter spaces through optimal code parallelization and scalability to cluster
    computing. In this publication we outline the T-REx framework and demonstrate, using a theoretical hot-Jupiter transmission
    spectrum, the parameter retrieval and model selection. We investigate the impact of signal-to-noise ratio and spectral
    resolution on the retrievability of individual model parameters, both in terms of error bars on the temperature and molecular
    mixing ratios as well as its effect on the model’s global Bayesian evidence.'
