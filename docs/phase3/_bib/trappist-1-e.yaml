- &id392
  arxiv_id: '2308.14804'
  ads_bibcode: 2023PSJ.....4..170L
  title: 'Earth as a Transiting Exoplanet: A Validation of Transmission Spectroscopy and Atmospheric Retrieval Methodologies
    for Terrestrial Exoplanets'
  authors:
  - Lustig-Yaeger, Jacob
  - Meadows, Victoria S.
  - Crisp, David
  - Line, Michael R.
  - Robinson, Tyler D.
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.3847/PSJ/acf3e5
  abstract: The James Webb Space Telescope (JWST) will enable the search for and characterization of terrestrial exoplanet
    atmospheres in the habitable zone via transmission spectroscopy. However, relatively little work has been done to use
    solar system data, where ground truth is known, to validate spectroscopic retrieval codes intended for exoplanet studies,
    particularly in the limit of high resolution and high signal-to-noise ratio (S/N). In this work, we perform such a validation
    by analyzing a high-S/N empirical transmission spectrum of Earth using a new terrestrial exoplanet atmospheric retrieval
    model with heritage in solar system remote sensing and gaseous exoplanet retrievals. We fit the Earth's 2-14 μm transmission
    spectrum in low resolution (R = 250 at 5 μm) and high resolution (R = 100,000 at 5 μm) under a variety of assumptions
    about the 1D vertical atmospheric structure. In the limit of noiseless transmission spectra, we find excellent agreement
    between model and data (deviations &lt;10%) that enable the robust detection of H<SUB>2</SUB>O, CO<SUB>2</SUB>, O<SUB>3</SUB>,
    CH<SUB>4</SUB>, N<SUB>2</SUB>, N<SUB>2</SUB>O, NO<SUB>2</SUB>, HNO<SUB>3</SUB>, CFC-11, and CFC-12 thereby providing compelling
    support for the detection of habitability, biosignature, and technosignature gases in the atmosphere of the planet using
    an exoplanet-analog transmission spectrum. Our retrievals at high spectral resolution show a marked sensitivity to the
    thermal structure of the atmosphere, trace gas abundances, density-dependent effects, such as collision-induced absorption
    and refraction, and even hint at 3D spatial effects. However, we used synthetic observations of TRAPPIST-1e to verify
    that the use of simple 1D vertically homogeneous atmospheric models will likely suffice for JWST observations of terrestrial
    exoplanets transiting M dwarfs.
