- arxiv_id: null
  ads_bibcode: 2020E3SWC.16704002L
  title: Comparison of the greenhouse effect between Earth and Venus using multiple atmospheric layer models
  authors:
  - Liu, William Song
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.1051/e3sconf/202016704002
  abstract: To better understand the mechanisms of global warming, we developed a one atmospheric layer model for Earth and
    a multiple atmospheric layer model (N = 111) for Venus. Earth's greenhouse gas atmosphere has an average of 78.9% absorption
    efficiency of terrestrial radiation (f = 0.789), while we assume Venus' atmosphere has a near 100% absorption efficiency
    (f = 1) due to its denser, CO2-rich atmosphere. Viewing the atmospheric layers as blackbodies, we modeled the surface
    temperature of Earth and Venus, both of which are able to predict the respective actual planetary temperatures. The consistency
    (δ &lt; 1%) between the modeled surface temperature and the observed surface temperature of these two planets suggest
    that the multiple layer greenhouse gas atmosphere mechanism could explain Venus' runaway global warming and scorching
    temperature. The results of these two models suggest that if Earth continues to experience uncontrolled greenhouse gas
    emissions, global warming and its negative outcomes may be further exacerbated.
  source: citation_of=2025AsBio..25..161M
