  title: Impact of clouds in the JWST and LUVOIR simulated transmission spectra of TRAPPIST-1 planets in the habitable zone
  authors:
  - Fauchez, Thomas
  - Turbet, Martin
  - Mandell, Avi
  - Kopparapu, Ravi Kumar
  - Arney, Giada
  - Domagal-Goldman, Shawn
  year: '2018'
  pubdate: '2018-06-00'
  doi: null
  abstract: 'M-dwarfs are the most common type of stars in our galaxy. Ultra-cool dwarfs (T &lt; 2700 K) are a sub-stellar
    class of late M-dwarfs and represent nearly ~ 15% of astronomical objects in the stellar neighborhood of the Sun. Their
    smaller size than regular M-dwarfs allows easier detection of rocky exoplanets in close orbits, and this potential was
    recently realized by the discovery of the TRAPPIST-1 system. Located about 12 pc away, TRAPPIST-1 has seven known planets,
    and it is one of the most promising rocky-planet systems for follow-up observations due to the depths of the transit signals.
    Transit-timing variation (TTVs) measurements of the TRAPPIST-1 planets suggest terrestrial or volatile-rich composition.
    Also, it has been found that three planets (TRAPPIST-1 e, f and g) are in the Habitable Zone (HZ) where surface temperatures
    would allow surface water to exist. These planets will be prime targets for atmospheric characterization with JWST owing
    to their relative proximity to Earth and frequent planetary transits.Atmospheric properties are major components of planet
    habitability. However, the detectability of gaseous features on rocky planets in the HZ may be severely impacted by the
    presence of clouds and/or hazes in their atmosphere. We have already seen this phenomenon in the “flat” transit transmission
    spectra of larger exoplanets such as GJ 1214b, WASP-31b, WASP-12b and HATP-12b.In this work, we use the LMDG global climate
    model to simulate several possibilities of atmospheres for TRAPPIST-1 e, f and 1g: 1) Archean Earth, 2) modern Earth and
    3) CO2-dominated atmospheres. We also calculate synthetic transit spectra using the GSFC Planetary Spectrum Generator
    (PSG), and determine the number of transits needed to observe key spectral features for both JWST and future telescopes
    (ARIEL, LUVOIR, HabEx). We will identify differences in the spectra of cloudy vs non-cloudy, and determine how much information
    on spatial variability in atmosphere characteristics can be extracted from time-resolved transit and eclipse mapping.
    A particular attention will be given to the impact of the atmospheric variability when adding transit spectra, and how
    this may affect atmospheric parameter retrievals.'
