  - Isobe, Hiroaki
  - Hillier, Andrew
  - Choudhuri, Arnab Rai
  - Maehara, Hiroyuki
  - Ishii, Takako T.
  - Shibayama, Takuya
  - Notsu, Shota
  - Notsu, Yuta
  - Nagao, Takashi
  - Honda, Satoshi
  - Nogami, Daisaku
  year: '2013'
  pubdate: '2013-06-00'
  doi: 10.1093/pasj/65.3.49
  abstract: Recent observations of Sun-like stars, similar to our Sun in their surface temperature (5600-6000 K) and slow
    rotation (rotational period <inline-formula><tex-math id="im1" notation="LaTeX">$ &gt;$</tex-math></inline-formula> 10
    d), using the Kepler satellite by Maehara et al. (2012, Nature, 485, 478) have revealed the existence of superflares (with
    energy of 10<inline-formula><tex-math id="im2" notation="LaTeX">$ ^{33}$</tex-math></inline-formula> -10<inline-formula><tex-math
    id="im3" notation="LaTeX">$ ^{35}$</tex-math></inline-formula> erg). From statistical analyses of these superflares, it
    was found that superflares with energy of 10<inline-formula><tex-math id="im4" notation="LaTeX">$ ^{34}$</tex-math></inline-formula>
    erg occur once in 800 yr, and superflares with 10<inline-formula><tex-math id="im5" notation="LaTeX">$ ^{35}$</tex-math></inline-formula>
    erg occur once in 5000 yr. In this paper, we examine whether superflares with energy of 10<inline-formula><tex-math id="im6"
    notation="LaTeX">$ ^{33}$</tex-math></inline-formula> -10<inline-formula><tex-math id="im7" notation="LaTeX">$ ^{35}$</tex-math></inline-formula>
    erg could occur on the present Sun through the use of simple order-of-magnitude estimates based on current ideas related
    to the mechanisms of the solar dynamo. If magnetic flux is generated by differential rotation at the base of the convection
    zone, as assumed in typical dynamo models, it is possible that the present Sun would generate a large sunspot with a total
    magnetic flux of <inline-formula><tex-math id="im8" notation="LaTeX">$ \sim$</tex-math></inline-formula> 2 <inline-formula><tex-math
    id="im9" notation="LaTeX">$ \times$</tex-math></inline-formula> 10<inline-formula><tex-math id="im10" notation="LaTeX">$
    ^{23}$</tex-math></inline-formula> Mx (<inline-formula><tex-math id="im11" notation="LaTeX">$ =$</tex-math></inline-formula>
    G cm<inline-formula><tex-math id="im12" notation="LaTeX">$ ^{2}$</tex-math></inline-formula> ) within one solar cycle
    period, and lead to superflares with an energy of 10<inline-formula><tex-math id="im13" notation="LaTeX">$ ^{34}$</tex-math></inline-formula>
    erg. To store a total magnetic flux of <inline-formula><tex-math id="im14" notation="LaTeX">$ \sim$</tex-math></inline-formula>
    10<inline-formula><tex-math id="im15" notation="LaTeX">$ ^{24}$</tex-math></inline-formula> Mx, necessary for generating
    10<inline-formula><tex-math id="im16" notation="LaTeX">$ ^{35}$</tex-math></inline-formula> erg superflares, it would
    take <inline-formula><tex-math id="im17" notation="LaTeX">$ \sim$</tex-math></inline-formula> 40 yr. Hot Jupiters have
    often been argued to be a necessary ingredient for the generation of superflares, but we found that they do not play any
    essential role in the generation of magnetic flux in the star itself, if we consider only the magnetic interaction between
    the star and the hot Jupiter. This seems to be consistent with Maehara et al.'s finding of 148 superflare-generating solar-type
    stars that do not have a hot Jupiter-like companion. Altogether, our simple calculations, combined with Maehara et al.'s
    analysis of superflares on Sun-like stars, show that there is a possibility that superflares of 10<inline-formula><tex-math
    id="im18" notation="LaTeX">$ ^{34}$</tex-math></inline-formula> erg would occur once in 800 yr on our present Sun.
