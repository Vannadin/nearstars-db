- &id469
  arxiv_id: '1604.01032'
  ads_bibcode: 2016ApJ...824..101Y
  title: The MUSCLES Treasury Survey. II. Intrinsic LYα and Extreme Ultraviolet Spectra of K and M Dwarfs with Exoplanets*
  authors:
  - Youngblood, Allison
  - France, Kevin
  - Loyd, R. O. Parke
  - Linsky, Jeffrey L.
  - Redfield, Seth
  - Schneider, P. Christian
  - Wood, Brian E.
  - Brown, Alexander
  - Froning, Cynthia
  - Miguel, Yamila
  - Rugheimer, Sarah
  - Walkowicz, Lucianne
  year: '2016'
  pubdate: '2016-06-00'
  doi: 10.3847/0004-637X/824/2/101
  abstract: The ultraviolet (UV) spectral energy distributions (SEDs) of low-mass (K- and M-type) stars play a critical role
    in the heating and chemistry of exoplanet atmospheres, but are not observationally well-constrained. Direct observations
    of the intrinsic flux of the Lyα line (the dominant source of UV photons from low-mass stars) are challenging, as interstellar
    H I absorbs the entire line core for even the closest stars. To address the existing gap in empirical constraints on the
    UV flux of K and M dwarfs, the MUSCLES Hubble Space Telescope Treasury Survey has obtained UV observations of 11 nearby
    M and K dwarfs hosting exoplanets. This paper presents the Lyα and extreme-UV spectral reconstructions for the MUSCLES
    targets. Most targets are optically inactive, but all exhibit significant UV activity. We use a Markov Chain Monte Carlo
    technique to correct the observed Lyα profiles for interstellar absorption, and we employ empirical relations to compute
    the extreme-UV SED from the intrinsic Lyα flux in ∼100 Å bins from 100-1170 Å. The reconstructed Lyα profiles have 300
    km s<SUP>-1</SUP> broad cores, while &gt;1% of the total intrinsic Lyα flux is measured in extended wings between 300
    and 1200 km s<SUP>-1</SUP>. The Lyα surface flux positively correlates with the Mg II surface flux and negatively correlates
    with the stellar rotation period. Stars with larger Lyα surface flux also tend to have larger surface flux in ions formed
    at higher temperatures, but these correlations remain statistically insignificant in our sample of 11 stars. We also present
    H I column density measurements for 10 new sightlines through the local interstellar medium. <P />Based on observations
    made with the NASA/ESA Hubble Space Telescope, obtained from the data archive at the Space Telescope Science Institute.
    STScI is operated by the Association of Universities for Research in Astronomy, Inc. under NASA contract NAS 5-26555.
