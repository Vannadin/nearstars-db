  doi: 10.3847/1538-3881/ac5034
  abstract: With the growing number of spectroscopic observations and observational platforms capable of exoplanet atmospheric
    characterization, there is a growing need for analysis techniques that can distill information about a large population
    of exoplanets into a coherent picture of atmospheric trends expressed within the statistical sample. In this work, we
    develop a Hierarchical Bayesian Atmospheric Retrieval (HBAR) model to infer population-level trends in exoplanet atmospheric
    characteristics. We demonstrate HBAR on the case of inferring a trend in atmospheric CO<SUB>2</SUB> with incident stellar
    flux, predicted by the presence of a functioning carbonate-silicate weathering negative feedback cycle, an assumption
    upon which all calculations of the habitable zone (HZ) rest. Using simulated transmission spectra and JWST-quality observations
    of rocky planets with H<SUB>2</SUB>O, CO<SUB>2</SUB>, and N<SUB>2</SUB> bearing atmospheres, we find that the predicted
    trend in CO<SUB>2</SUB> causes subtle differences in the spectra of order 10 ppm in the 1-5 μm range, underscoring the
    challenge inherent to testing this hypothesis. In the limit of highly precise data (100 stacked transits per planet),
    we show that our HBAR model is capable of inferring the population-level parameters that characterize the trend in CO<SUB>2</SUB>,
    and we demonstrate that the null hypothesis and other simpler trends can be rejected at high confidence. Although we find
    that this specific empirical test of the HZ may be prohibitively challenging in the JWST era, the HBAR framework developed
    in this work may find a more immediate usage for the analysis of gas giant spectra observed with JWST, Ariel, and other
    upcoming missions.
