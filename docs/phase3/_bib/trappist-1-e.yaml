- &id036
  arxiv_id: '2308.05899'
  ads_bibcode: 2023ApJ...955L...7L
  title: Potential Atmospheric Compositions of TRAPPIST-1 c Constrained by JWST/MIRI Observations at 15 μm
  authors:
  - Lincowski, Andrew P.
  - Meadows, Victoria S.
  - Zieba, Sebastian
  - Kreidberg, Laura
  - Morley, Caroline
  - Gillon, Michaël
  - Selsis, Franck
  - Agol, Eric
  - Bolmont, Emeline
  - Ducrot, Elsa
  - Hu, Renyu
  - Koll, Daniel D. B.
  - Lyu, Xintong
  - Mandell, Avi
  - Suissa, Gabrielle
  - Tamburo, Patrick
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.3847/2041-8213/acee02
  abstract: The first James Webb Space Telescope observations of TRAPPIST-1 c showed a secondary eclipse depth of 421 ± 94
    ppm at 15 μm, which is consistent with a bare rock surface or a thin, O<SUB>2</SUB>-dominated, low-CO<SUB>2</SUB> atmosphere.
    Here we further explore potential atmospheres for TRAPPIST-1 c by comparing the observed secondary eclipse depth to synthetic
    spectra of a broader range of plausible environments. To self-consistently incorporate the impact of photochemistry and
    atmospheric composition on atmospheric thermal structure and predicted eclipse depth, we use a two-column climate model
    coupled to a photochemical model and simulate O<SUB>2</SUB>-dominated, Venus-like, and steam atmospheres. We find that
    a broader suite of plausible atmospheric compositions are also consistent with the data. For lower-pressure atmospheres
    (0.1 bar), our O<SUB>2</SUB>-CO<SUB>2</SUB> atmospheres produce eclipse depths within 1σ of the data, consistent with
    the modeling results of Zieba et al. However, for higher-pressure atmospheres, our models produce different temperature-pressure
    profiles and are less pessimistic, with 1-10 bar O<SUB>2</SUB>, 100 ppm CO<SUB>2</SUB> models within 2.0σ-2.2σ of the
    measured secondary eclipse depth and up to 0.5% CO<SUB>2</SUB> within 2.9σ. Venus-like atmospheres are still unlikely.
    For thin O<SUB>2</SUB> atmospheres of 0.1 bar with a low abundance of CO<SUB>2</SUB> (~100 ppm), up to 10% water vapor
    can be present and still provide an eclipse depth within 1σ of the data. We compared the TRAPPIST-1 c data to modeled
    steam atmospheres of ≤3 bars, which are 1.7σ-1.8σ from the data and not conclusively ruled out. More data will be required
    to discriminate between possible atmospheres or more definitively support the bare rock hypothesis.
  source: citation_of=2025A&A...693A.303C
