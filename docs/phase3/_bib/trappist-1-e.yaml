  arxiv_id: '1612.02085'
  ads_bibcode: 2017AJ....153..151B
  title: Information Content Analysis for Selection of Optimal JWST Observing Modes for Transiting Exoplanet Atmospheres
  authors:
  - Batalha, Natasha E.
  - Line, M. R.
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.3847/1538-3881/aa5faa
  abstract: The James Webb Space Telescope (JWST) is nearing its launch date of 2018, and is expected to revolutionize our
    knowledge of exoplanet atmospheres. In order to specifically identify which observing modes will be most useful for characterizing
    a diverse range of exoplanetary atmospheres, we use an information content (IC) based approach commonly used in the studies
    of solar system atmospheres. We develop a system based upon these IC methods to trace the instrumental and atmospheric
    model phase space in order to identify which observing modes are best suited for particular classes of planets, focusing
    on transmission spectra. Specifically, the atmospheric parameter space we cover is T = 600-1800 K, C/O = 0.55-1, [M/H]
    = 1-100 × Solar for an R = 1.39 R<SUB>J</SUB>, M = 0.59 M<SUB>J</SUB> planet orbiting a WASP-62-like star. We also explore
    the influence of a simplified opaque gray cloud on the IC. We find that obtaining broader wavelength coverage over multiple
    modes is preferred over higher precision in a single mode given the same amount of observing time. Regardless of the planet
    temperature and composition, the best modes for constraining terminator temperatures, C/O ratios, and metallicity are
    NIRISS SOSS+NIRSpec G395. If the target’s host star is dim enough such that the NIRSpec prism is applicable, then it can
    be used instead of NIRISS SOSS+NIRSpec G395. Lastly, observations that use more than two modes should be carefully analyzed
    because sometimes the addition of a third mode results in no gain of information. In these cases, higher precision in
    the original two modes is favorable.
