  arxiv_id: '2003.02036'
  ads_bibcode: 2020ApJ...893...12S
  title: 'Proxima Centauri b: A Strong Case for Including Cosmic-Ray-induced Chemistry in Atmospheric Biosignature Studies'
  authors:
  - Scheucher, M.
  - Herbst, K.
  - Schmidt, V.
  - Grenfell, J. L.
  - Schreier, F.
  - Banjac, S.
  - Heber, B.
  - Rauer, H.
  - Sinnhuber, M.
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-4357/ab7b74
  abstract: 'Due to its Earth-like minimum mass of 1.27 M<SUB>E</SUB> and its close proximity to our solar system, Proxima
    Centauri b is one of the most interesting exoplanets for habitability studies. Its host star, Proxima Centauri, is however
    a strongly flaring star, which is expected to provide a very hostile environment for potentially habitable planets. We
    perform a habitability study of Proxima Centauri b assuming an Earth-like atmosphere under high stellar particle bombardment,
    with a focus on spectral transmission features. We employ our extensive model suite calculating energy spectra of stellar
    particles, their journey through the planetary magnetosphere, ionosphere, and atmosphere, ultimately providing planetary
    climate and spectral characteristics, as outlined in Herbst et al. Our results suggest that together with the incident
    stellar energy flux, high particle influxes can lead to efficient heating of the planet well into temperate climates,
    by limiting CH<SUB>4</SUB> amounts, which would otherwise run into antigreenhouse for such planets around M stars. We
    identify some key spectral features relevant for future spectral observations: First, NO<SUB>2</SUB> becomes the major
    absorber in the visible, which greatly impacts the Rayleigh slope. Second, H<SUB>2</SUB>O features can be masked by CH<SUB>4</SUB>
    (near-infrared) and CO<SUB>2</SUB> (mid- to far-infrared), making them nondetectable in transmission. Third, O<SUB>3</SUB>
    is destroyed and instead HNO<SUB>3</SUB> features become clearly visible in the mid- to far-infrared. Lastly, assuming
    a few percent of CO<SUB>2</SUB> in the atmosphere, CO<SUB>2</SUB> absorption at 5.3 μm becomes significant (for flare
    and nonflare cases), strongly overlapping with a flare related NO feature in Earth''s atmosphere.'
