  arxiv_id: '2311.07530'
  ads_bibcode: 2024PSJ.....5....7Y
  title: Retrievals Applied to a Decision Tree Framework Can Characterize Earthlike Exoplanet Analogs
  authors:
  - Young, Amber V.
  - Crouse, Jaime
  - Arney, Giada
  - Domagal-Goldman, Shawn
  - Robinson, Tyler D.
  - Bastelberger, Sandra T.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/PSJ/ad09b1
  abstract: Exoplanet characterization missions planned for the future will soon enable searches for life beyond our solar
    system. Critical to the search will be the development of life detection strategies that can search for biosignatures
    while maintaining observational efficiency. In this work, we adopted a newly developed biosignature decision tree strategy
    for remote characterization of Earthlike exoplanets. The decision tree offers a step-by-step roadmap for detecting exoplanet
    biosignatures and excluding false positives, based on Earth's biosphere and its evolution over time. We followed the pathways
    for characterizing a modern-Earth-like planet and an Archean-Earth-like planet and evaluated the observational trades
    associated with coronagraph bandpass combinations of designs consistent with the Habitable Worlds Observatory precursor
    studies. With retrieval analyses of each bandpass (or combination), we demonstrate the utility of the decision tree and
    evaluate the uncertainty on a suite of biosignature chemical species and habitability indicators (i.e., the gas abundances
    of H<SUB>2</SUB>O, O<SUB>2</SUB>, O<SUB>3</SUB>, CH<SUB>4</SUB>, and CO<SUB>2</SUB>). Notably for modern Earth, less than
    an order of magnitude spread in the 1σ uncertainties was achieved for the abundances of H<SUB>2</SUB>O and O<SUB>2</SUB>,
    planetary surface pressure, and atmospheric temperature, with three strategically placed bandpasses (two in the visible
    and one in the near-infrared). For the Archean, CH<SUB>4</SUB> and H<SUB>2</SUB>O were detectable in the visible with
    a single bandpass.
