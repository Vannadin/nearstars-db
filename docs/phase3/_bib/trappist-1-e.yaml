  arxiv_id: '1706.08639'
  ads_bibcode: 2017Icar..297...71R
  title: A warmer and wetter solution for early Mars and the challenges with transient warming
  authors:
  - Ramirez, Ramses M.
  year: '2017'
  pubdate: '2017-11-00'
  doi: 10.1016/j.icarus.2017.06.025
  abstract: The climate of early Mars has been hotly debated for decades. Although most investigators believe that the geology
    indicates the presence of surface water, disagreement has persisted regarding how warm and wet the surface must have been
    and how long such conditions may have existed. Although the geologic evidence is most easily explained by a persistently
    warm climate, the perceived difficulty that climate models have in generating warm surface conditions has seeded various
    models that assume a cold and glaciated early Mars punctuated by transient warming episodes. However, I use a single-column
    radiative convective climate model to show that it is relatively more straightforward to satisfy warm and relatively non-glaciated
    early Mars conditions, requiring only ∼1% H<SUB>2</SUB> and 3 bar CO<SUB>2</SUB> or ∼20% H<SUB>2</SUB> and 0.55 bar CO<SUB>2</SUB>.
    In contrast, the reflectivity of surface ice greatly increases the difficulty to transiently warm an initially frozen
    surface. Surface pressure thresholds required for warm conditions increase ∼10 - 60% for transient warming models, depending
    on ice cover fraction. No warm solution is possible for ice cover fractions exceeding 40%, 70%, and 85% for mixed snow/ice
    and 25%, 35%, and 49% for fresher snow/ice at H<SUB>2</SUB> concentrations of 3%, 10%, and 20%, respectively. If high
    temperatures (298-323 K) were required to produce the observed surface clay amounts on a transiently warm early Mars (Bishop
    et al), I show that such temperatures would have required surface pressures that exceed available paleopressure constraints
    for nearly all H<SUB>2</SUB> concentrations considered (1-20%). I then argue that a warm and semi-arid climate remains
    the simplest and most logical solution to Mars paleoclimate.
