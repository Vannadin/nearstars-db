  arxiv_id: '1607.03494'
  ads_bibcode: 2016ApJ...829...23D
  title: The Kepler Catalog of Stellar Flares
  authors:
  - Davenport, James R. A.
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.3847/0004-637X/829/1/23
  abstract: A homogeneous search for stellar flares has been performed using every available Kepler light curve. An iterative
    light curve de-trending approach was used to filter out both astrophysical and systematic variability to detect flares.
    The flare recovery completeness has also been computed throughout each light curve using artificial flare injection tests,
    and the tools for this work have been made publicly available. The final sample contains 851,168 candidate flare events
    recovered above the 68% completeness threshold, which were detected from 4041 stars, or 1.9% of the stars in the Kepler
    database. The average flare energy detected is ∼10<SUP>35</SUP> erg. The net fraction of flare stars increases with g
    - I color, or decreasing stellar mass. For stars in this sample with previously measured rotation periods, the total relative
    flare luminosity is compared to the Rossby number. A tentative detection of flare activity saturation for low-mass stars
    with rapid rotation below a Rossby number of ∼0.03 is found. A power-law decay in flare activity with Rossby number is
    found with a slope of -1, shallower than typical measurements for X-ray activity decay with Rossby number.
