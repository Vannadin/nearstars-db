  doi: 10.3847/1538-4357/ad47f3
  abstract: Methane (CH<SUB>4</SUB>) is a primarily biogenic greenhouse gas. As such, it represents an essential biosignature
    to search for life on exoplanets. Atmospheric CH<SUB>4</SUB> abundance on Earth-like inhabited exoplanets is likely controlled
    by marine biogenic production and atmospheric photochemical consumption. Such interactions have been previously examined
    for the case of the early Earth where primitive marine ecosystems supplied CH<SUB>4</SUB> to the atmosphere, showing that
    the atmospheric CH<SUB>4</SUB> response to biogenic CH<SUB>4</SUB> flux variations is nonlinear, a critical property when
    assessing CH<SUB>4</SUB> reliability as a biosignature. However, the contributions of atmospheric photochemistry, metabolic
    reactions, or solar irradiance to this nonlinear response are not well understood. Using an atmospheric photochemical
    model and a marine microbial ecosystem model, we show that the production of hydroxyl radicals from water vapor photodissociation
    is a critical factor controlling the atmospheric CH<SUB>4</SUB> abundance. Consequently, atmospheric CH<SUB>4</SUB> partial
    pressure (pCH<SUB>4</SUB>) on inhabited Earth-like exoplanets orbiting Sun-like stars (F-, G-, and K-type stars) would
    be controlled primarily by stellar irradiance. Specifically, irradiance at wavelengths of approximately 200─210 nm is
    a major controlling factor for atmospheric pCH<SUB>4</SUB> when the carbon dioxide partial pressure is sufficiently high
    to absorb most stellar irradiance at 170─200 nm. Finally, we also demonstrated that inhabited exoplanets orbiting near
    the outer edge of K-type stars' habitable zones are better suited for atmospheric pCH<SUB>4</SUB> buildup. Such properties
    will provide valuable support for future detection of life signatures.
