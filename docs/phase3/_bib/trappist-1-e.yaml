  arxiv_id: '1708.04239'
  ads_bibcode: 2017ApJ...850..121M
  title: Observing the Atmospheres of Known Temperate Earth-sized Planets with JWST
  authors:
  - Morley, Caroline V.
  - Kreidberg, Laura
  - Rustamkulov, Zafar
  - Robinson, Tyler
