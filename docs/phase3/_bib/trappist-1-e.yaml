- &id165
  arxiv_id: '2206.05151'
  ads_bibcode: 2022MNRAS.514.5105B
  title: 'EOS-ESTM: a flexible climate model for habitable exoplanets'
  authors:
  - Biasiotti, L.
  - Simonetti, P.
  - Vladilo, G.
  - Silva, L.
  - Murante, G.
  - Ivanovski, S.
  - Maris, M.
  - Monai, S.
  - Bisesi, E.
  - von Hardenberg, J.
  - Provenzale, A.
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.1093/mnras/stac1642
  abstract: 'Rocky planets with temperate conditions provide the best chance for discovering habitable worlds and life outside
    the Solar system. In the last decades, new instrumental facilities and large observational campaigns have been driven
    by the quest for habitable worlds. Climate models aimed at studying the habitability of rocky planets are essential tools
    to pay off these technological and observational endeavours. In this context, we present EOS-ESTM, a fast and flexible
    model aimed at exploring the impact on habitability of multiple climate factors, including those unconstrained by observations.
    EOS-ESTM is built on ESTM, a seasonal-latitudinal energy balance model featuring an advanced treatment of the meridional
    and vertical transport. The novel features of EOS-ESTM include: (1) parametrizations for simulating the climate impact
    of oceans, land, ice, and clouds as a function of temperature and stellar zenith distance and (2) a procedure (EOS) for
    calculating the radiative transfer in atmospheres with terrestrial and non-terrestrial compositions illuminated by solar-
    and non-solar-type stars. By feeding EOS-ESTM with Earth''s stellar, orbital, and planetary parameters, we derive a reference
    model that satisfies a large number of observational constraints of the Earth''s climate system. Validation tests of non-terrestrial
    conditions yield predictions that are in line with comparable results obtained with a hierarchy of climate models. The
    application of EOS-ESTM to planetary atmospheres in maximum greenhouse conditions demonstrates the possibility of tracking
    the snowball transition at the outer edge of the HZ for a variety of planetary parameters, paving the road for multiparametric
    studies of the HZ.'
