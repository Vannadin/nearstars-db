  - Hu, Renyu
  year: '2022'
  pubdate: '2022-06-00'
  doi: 10.3847/1538-3881/ac6b97
  abstract: A space telescope capable of high-contrast imaging has been recognized as the avenue toward finding terrestrial
    planets around nearby Sun-like stars and characterizing their potential habitability. It is thus essential to quantify
    the capability of reflected light spectroscopy obtained through direct imaging for terrestrial exoplanets, and existing
    work focused on planetary analogs of modern Earth. Here we go beyond Earth analogs and use a Bayesian retrieval algorithm,
    EXOREL ${}^{{\mathfrak{R}}}$ , to determine what we could learn about terrestrial exoplanets from their reflected light
    spectra. Recognizing the potential diversity of terrestrial exoplanets, our focus is to distinguish atmospheric scenarios
    without any a priori knowledge of the dominant gas. We find that, while a moderate-resolution spectrum in the optical
    band (0.4-1.0 μm) may sufficiently characterize a modern Earth analog, it would likely result in incorrect interpretation
    for planets similar to Archean Earth or having CO<SUB>2</SUB>-dominated atmospheres. Including observations in the near-infrared
    bands (1.0-1.8 μm) can prevent this error, determine the main component (N<SUB>2</SUB>, O<SUB>2</SUB>, or CO<SUB>2</SUB>),
    and quantify trace gases (H<SUB>2</SUB>O, O<SUB>3</SUB>, and CH<SUB>4</SUB>) of the atmosphere. These results are useful
    to define the science requirements and design the wavelength bandwidth and observation plans of exoplanet direct imaging
    missions in the future.
