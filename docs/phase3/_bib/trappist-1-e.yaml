  arxiv_id: '1904.00142'
  ads_bibcode: 2019ApJ...876...58N
  title: Do Kepler Superflare Stars Really Include Slowly Rotating Sun-like Stars?—Results Using APO 3.5 m Telescope Spectroscopic
    Observations and Gaia-DR2 Data
  authors:
  - Notsu, Yuta
  - Maehara, Hiroyuki
  - Honda, Satoshi
  - Hawley, Suzanne L.
  - Davenport, James R. A.
  - Namekata, Kosuke
  - Notsu, Shota
