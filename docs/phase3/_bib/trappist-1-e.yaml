  arxiv_id: '1301.1582'
  ads_bibcode: 2013ApJ...764...78R
  title: Oxygen Abundances in Nearby FGK Stars and the Galactic Chemical Evolution of the Local Disk and Halo
  authors:
  - Ramírez, I.
  - Allende Prieto, C.
  - Lambert, D. L.
  year: '2013'
  pubdate: '2013-02-00'
  doi: 10.1088/0004-637X/764/1/78
  abstract: Atmospheric parameters and oxygen abundances of 825 nearby FGK stars are derived using high-quality spectra and
    a non-local thermodynamic equilibrium analysis of the 777 nm O I triplet lines. We assign a kinematic probability for
    the stars to be thin-disk (P <SUB>1</SUB>), thick-disk (P <SUB>2</SUB>), and halo (P <SUB>3</SUB>) members. We confirm
    previous findings of enhanced [O/Fe] in thick-disk (P <SUB>2</SUB> &gt; 0.5) relative to thin-disk (P <SUB>1</SUB> &gt;
    0.5) stars with [Fe/H] &lt;~ -0.2, as well as a "knee" that connects the mean [O/Fe]-[Fe/H] trend of thick-disk stars
    with that of thin-disk members at [Fe/H] &gt;~ -0.2. Nevertheless, we find that the kinematic membership criterion fails
    at separating perfectly the stars in the [O/Fe]-[Fe/H] plane, even when a very restrictive kinematic separation is employed.
    Stars with "intermediate" kinematics (P <SUB>1</SUB> &lt; 0.7, P <SUB>2</SUB> &lt; 0.7) do not all populate the region
    of the [O/Fe]-[Fe/H] plane intermediate between the mean thin-disk and thick-disk trends, but their distribution is not
    necessarily bimodal. Halo stars (P <SUB>3</SUB> &gt; 0.5) show a large star-to-star scatter in [O/Fe]-[Fe/H], but most
    of it is due to stars with Galactocentric rotational velocity V &lt; -200 km s<SUP>-1</SUP> halo stars with V &gt; -200
    km s<SUP>-1</SUP> follow an [O/Fe]-[Fe/H] relation with almost no star-to-star scatter. Early mergers with satellite galaxies
    explain most of our observations, but the significant fraction of disk stars with "ambiguous" kinematics and abundances
    suggests that scattering by molecular clouds and radial migration have both played an important role in determining the
    kinematic and chemical properties of solar neighborhood stars.
