  abstract: Effect of acidification on advanced oxidation performance of ozone-electrolysis was explored by experimental and
    theoretical approaches. A series of experiments revealed that ozone-electrolysis had a synergistic effect on 1,4-dioxane
    removal. Two radical production pathways, namely ozone self-decomposition and one-electron reduction of ozone, are involved
    in ozone-electrolysis. A series of discussions based on the contribution of HO˙ produced through ozone self-decomposition,
    chemical equilibrium of HO<SUB>3</SUB>˙/O<SUB>3</SUB>˙<SUP>−</SUP>, and equilibrium electrode potentials elucidated that
    acidification inhibited the one-electron reduction of ozone at the cathode through the enhancement of competitive two-electrons
    reduction of ozone by a change in the corresponding equilibrium electrode potential.
