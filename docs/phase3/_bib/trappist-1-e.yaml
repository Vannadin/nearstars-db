- &id230
  arxiv_id: '1601.00789'
  ads_bibcode: 2016MNRAS.457.1233F
  title: Exomoon climate models with the carbonate-silicate cycle and viscoelastic tidal heating
  authors:
  - Forgan, Duncan
  - Dobos, Vera
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.1093/mnras/stw024
  abstract: The habitable zone for exomoons with Earth-like properties is a non-trivial manifold, compared to that of Earth-like
    exoplanets. The presence of tidal heating, eclipses and planetary illumination in the exomoon energy budget combine to
    produce both circumstellar and circumplanetary habitable regions. Analytical calculations suggest that the circumplanetary
    habitable region is defined only by an inner edge (with its outer limits determined by orbital stability). Subsequent
    calculations using 1D latitudinal climate models indicated that the combined effect of eclipses and ice-albedo feedback
    can produce an outer edge to the circumplanetary habitable zone. But is this outer edge real, or an artefact of the climate
    model's relative simplicity? We present an upgraded 1D climate model of Earth-like exomoon climates, containing the carbonate-silicate
    cycle and viscoelastic tidal heating. We conduct parameter surveys of both the circumstellar and circumplanetary habitable
    zones, and we find that the outer circumplanetary habitable edge remains provided the moon's orbit is not inclined relative
    to that of the planet. Adding the carbonate-silicate cycle pushes the circumplanetary habitable zone outwards, by allowing
    increases in atmospheric partial pressure of carbon dioxide to boost the greenhouse effect. Viscoelastic tidal heating
    widens the habitable zone compared to standard, fixed-Q models. Weakening the tidal heating effect due to melting allows
    moons to be habitable at higher eccentricity, and pushes the inner circumstellar and circumplanetary habitable zone boundary
    inwards.
