  ads_bibcode: 2022ApJ...930..152C
  title: Longitudinally Asymmetric Stratospheric Oscillation on a Tidally Locked Exoplanet
  authors:
  - Cohen, Maureen
  - Bollasina, Massimo A.
  - Palmer, Paul I.
  - Sergeev, Denis E.
  - Boutle, Ian A.
  - Mayne, Nathan J.
