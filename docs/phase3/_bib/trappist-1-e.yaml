- arxiv_id: null
  ads_bibcode: 2011Natur.478..229G
  title: Atmospheric oxygenation caused by a change in volcanic degassing pressure
  authors:
  - Gaillard, Fabrice
  - Scaillet, Bruno
  - Arndt, Nicholas T.
  year: '2011'
  pubdate: '2011-10-00'
  doi: 10.1038/nature10460
  abstract: 'The Precambrian history of our planet is marked by two major events: a pulse of continental crust formation at
    the end of the Archaean eon and a weak oxygenation of the atmosphere (the Great Oxidation Event) that followed, at 2.45billion
    years ago. This oxygenation has been linked to the emergence of oxygenic cyanobacteria and to changes in the compositions
    of volcanic gases, but not to the composition of erupting lavas--geochemical constraints indicate that the oxidation state
    of basalts and their mantle sources has remained constant since 3.5billion years ago. Here we propose that a decrease
    in the average pressure of volcanic degassing changed the oxidation state of sulphur in volcanic gases, initiating the
    modern biogeochemical sulphur cycle and triggering atmospheric oxygenation. Using thermodynamic calculations simulating
    gas-melt equilibria in erupting magmas, we suggest that mostly submarine Archaean volcanoes produced gases with SO<SUB>2</SUB>/H<SUB>2</SUB>S&lt;1
    and low sulphur content. Emergence of the continents due to a global decrease in sea level and growth of the continental
    crust in the late Archaean then led to widespread subaerial volcanism, which in turn yielded gases much richer in sulphur
    and dominated by SO<SUB>2</SUB>. Dissolution of sulphur in sea water and the onset of sulphate reduction processes could
    then oxidize the atmosphere.'
