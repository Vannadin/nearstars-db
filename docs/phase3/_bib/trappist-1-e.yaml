  ads_bibcode: 2022SPIE12180E..3LA
  title: 'Atmospheric retrievals for LIFE and other future space missions: the importance of mitigating systematic effects'
  authors:
  - Alei, Eleonora
  - Konrad, Björn S.
  - Mollière, Paul
  - Quanz, Sascha P.
  - Angerhausen, Daniel
