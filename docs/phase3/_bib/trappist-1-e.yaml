  arxiv_id: '1505.00280'
  ads_bibcode: 2015ApJ...806..139U
  title: 'Thorium Abundances in Solar Twins and Analogs: Implications for the Habitability of Extrasolar Planetary Systems'
  authors:
  - Unterborn, Cayman T.
  - Johnson, Jennifer A.
  - Panero, Wendy R.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/0004-637X/806/1/139
  abstract: We present the first investigation of Th abundances in solar twins and analogues to understand the possible range
    of this radioactive element and its effect on rocky planet interior dynamics and potential habitability. The abundances
    of the radioactive elements Th and U are key components of a planet’s energy budget, making up 30%-50% of the Earth’s.
    Radiogenic heat drives interior mantle convection and surface plate tectonics, which sustains a deep carbon and water
    cycle and thereby aides in creating Earth’s habitable surface. Unlike other heat sources that are dependent on the planet’s
    specific formation history, the radiogenic heat budget is directly related to the mantle concentration of these nuclides.
    As a refractory element, the stellar abundance of Th is faithfully reflected in the terrestrial planet’s concentration.
    We find that log {{∊ }<SUB>Th</SUB>} varies from 59% to 251% that of solar, suggesting extrasolar planetary systems may
    possess a greater energy budget with which to support surface to interior dynamics and thus increase their likelihood
    to be habitable compared to our solar system.
