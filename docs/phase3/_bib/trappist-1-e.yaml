- &id312
  arxiv_id: '1903.11180'
  ads_bibcode: 2019ApJ...886...39C
  title: 'Toward a More Complex Description of Chemical Profiles in Exoplanet Retrievals: A Two-layer Parameterization'
  authors:
  - Changeat, Q.
  - Edwards, B.
  - Waldmann, I. P.
  - Tinetti, G.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.3847/1538-4357/ab4a14
  abstract: State of the art spectral retrieval models of exoplanet atmospheres assume constant chemical profiles with altitude.
    This assumption is justified by the information content of current data sets which do not allow, in most cases, for the
    molecular abundances as a function of pressure to be constrained. In the context of the next generation of telescopes,
    a more accurate description of chemical profiles may become crucial to interpret observations and gain new insights into
    atmospheric physics. We explore here the possibility of retrieving pressure-dependent chemical profiles from transit spectra,
    without injecting any priors from theoretical chemical models in our retrievals. The “two-layer” parameterization presented
    here allows for the independent extraction of molecular abundances above and below a certain atmospheric pressure. By
    simulating various cases, we demonstrate that this evolution from constant chemical abundances is justified by the information
    content of spectra provided by future space instruments. Comparisons with traditional retrieval models show that assumptions
    made on chemical profiles may significantly impact retrieved parameters, such as the atmospheric temperature, and justify
    the attention we give here to this issue. We find that the two-layer retrieval accurately captures discontinuities in
    the vertical chemical profiles, which could be caused by disequilibrium processes—such as photochemistry—or the presence
    of clouds/hazes. The two-layer retrieval could also help to constrain the composition of clouds and hazes by exploring
    the correlation between the chemical changes in the gaseous phase and the pressure at which the condensed phase occurs.
    The two-layer retrieval presented here therefore represents an important step forward in our ability to constrain theoretical
    chemical models and cloud/haze composition from the analysis of future observations.
