  arxiv_id: '2410.08148'
  ads_bibcode: 2024AJ....168..123V
  title: 'JWST-TST DREAMS: Nonuniform Dayside Emission for WASP-17b from MIRI/LRS'
  authors:
  - Valentine, Daniel
  - Wakeford, Hannah R.
  - Challener, Ryan C.
  - Batalha, Natasha E.
  - Lewis, Nikole K.
  - Grant, David
  - Mullens, Elijah
