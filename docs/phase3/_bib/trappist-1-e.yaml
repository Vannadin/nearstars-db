- &id722
  arxiv_id: null
  ads_bibcode: 2025AAS...24530608S
  title: The Role of Magnetic Fields in Atmospheric Loss on Trappist-1 Exoplanets e, f, and g
  authors:
  - Sintayehu, Jerusalem
  - Barnes, Rory
  - Driscoll, Peter
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: We present an investigation of the role magnetic field plays in atmospheric retention, focusing on TRAPPIST-1
    e, f and g. We focus on two models, polar cap escape and ion pickup, that are likely important loss mechanisms on Venus,
    Earth and Mars (Gunell et al., 2018). Polar cap escape occurs where planetary magnetic field lines are open and allow
    the direct escape of ions. Ion pickup arises when particles at the magnetopause become ionized and are subsequently swept
    away through interactions with the solar wind. We calculate the two escape rates as a function of stellar wind parameters
    and the planetary magnetic field. We first identify the radius of each planet's exosphere, where neutral atoms could become
    ionized, as a function of the wind's density and velocity, as well as the planet's atmospheric structure. We then calculate
    escape rates as a function of the planets' magnetic moments. For both models and all planets, as the magnetic moment increases,
    escape rate decreases. However, the large uncertainties in TRAPPIST-1's stellar wind properties and the planets' geodynamos
    preclude a definitive assessment of the role of planetary magnetism in the escape rates of these planets. Nonetheless,
    this study provides a foundation to estimate escape rates that are mediated by planetary magnetic fields and can make
    testable predictions for current mass loss rates on these and other potentially habitable planets orbiting M dwarfs.
