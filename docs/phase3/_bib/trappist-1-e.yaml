  pubdate: '2018-10-00'
  doi: 10.3847/1538-4357/aadd9b
  abstract: Over the last few years, a number of authors have suggested that, under certain circumstances, molecular oxygen
    (O<SUB>2</SUB>) or ozone (O<SUB>3</SUB>) generated by abiotic processes may accumulate to detectable concentrations in
    a habitable terrestrial planet’s atmosphere, producing so-called “false positives” for life. But the models have occasionally
    disagreed with each other, with some predicting false positives, and some not, for the same apparent set of circumstances.
    We show here that photochemical false positives derive either from inconsistencies in the treatment of atmospheric and
    global redox balance or from the treatment (or lack thereof) of lightning. For habitable terrestrial planets with even
    trace amounts of atmospheric N<SUB>2</SUB>, NO produced by lightning catalyzes the recombination of CO and O derived from
    CO<SUB>2</SUB> photolysis and should be sufficient to eliminate all reported false positives. Molecular oxygen thus remains
    a useful biosignature gas for Earth-like extrasolar planets, provided that the planet resides within the conventional
    liquid water habitable zone and has not experienced distinctly non-Earth-like, irrecoverable water loss.
