  doi: 10.3847/1538-4365/aaa5a8
  abstract: We update the capabilities of the software instrument Modules for Experiments in Stellar Astrophysics (MESA) and
    enhance its ease of use and availability. Our new approach to locating convective boundaries is consistent with the physics
    of convection, and yields reliable values of the convective-core mass during both hydrogen- and helium-burning phases.
    Stars with M&lt; 8 M<SUB>☉</SUB> become white dwarfs and cool to the point where the electrons are degenerate and the
    ions are strongly coupled, a realm now available to study with MESA due to improved treatments of element diffusion, latent
    heat release, and blending of equations of state. Studies of the final fates of massive stars are extended in MESA by
    our addition of an approximate Riemann solver that captures shocks and conserves energy to high accuracy during dynamic
    epochs. We also introduce a 1D capability for modeling the effects of Rayleigh-Taylor instabilities that, in combination
    with the coupling to a public version of the STELLA radiation transfer instrument, creates new avenues for exploring Type
    II supernova properties. These capabilities are exhibited with exploratory models of pair-instability supernovae, pulsational
    pair-instability supernovae, and the formation of stellar-mass black holes. The applicability of MESA is now widened by
    the capability to import multidimensional hydrodynamic models into MESA. We close by introducing software modules for
    handling floating point exceptions and stellar model optimization, as well as four new software tools - MESA-Web, MESA-Docker,
    pyMESA, and mesastar.org - to enhance MESA's education and research impact.
