  pubdate: '2024-07-00'
  doi: null
  abstract: VPLANET MagmOc is a versatile magma ocean model with erosion of water vapour in the open source VPLANET framework.
    We present here a major improvement of this model that includes now a) thermal emission calculated with a full radiative
    transfer code and b) simultaneous outgasing of H2O and CO2 with full feedback on outgassing informed by planet formation
    models. <P />We derived evolution tracks of an outgassed mixed H2O/CO2 atmosphere on TRAPPIST-1e, f and g. We find that
    all planets, in particular TRAPPIST-1 g, run the risk to evolve into Exo-Venuses with thick CO2 atmospheres after the
    magma ocean stage for an intial water budget of more than 10 terrestrial ocean (TO) of water within tens of million years.
    <P />At the inner edge of the habitable zone, on TRAPPIST-1 e, we find that the combination of H2O atmosphere loss and
    CO2 outgassing reduces the thermal emission on the planet such that the magma ocean stage can be almost doubled from tens
    of million years to 80 million years for 10 TO intial water. We thus conclude that careful consideration has to be given
    to the various geophysical feedback effects as these can have a profound impact on the magma ocean evolution stage and
    thus on the overall water budget and the secondary atmosphere.
