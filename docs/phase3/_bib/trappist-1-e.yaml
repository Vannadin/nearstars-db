  arxiv_id: '2106.07656'
  ads_bibcode: 2021ApJ...918...40P
  title: The M-dwarf Ultraviolet Spectroscopic Sample. I. Determining Stellar Parameters for Field Stars
  authors:
  - Pineda, J. Sebastian
  - Youngblood, Allison
  - France, Kevin
  year: '2021'
  pubdate: '2021-09-00'
  doi: 10.3847/1538-4357/ac0aea
  abstract: Accurate stellar properties are essential for precise stellar astrophysics and exoplanetary science. In the M-dwarf
    regime, much effort has gone into defining empirical relations that can use readily accessible observables to assess physical
    stellar properties. Often, these relations for the quantity of interest are cast as a nonlinear function of available
    data; in Bayesian modeling, however, the reverse is needed. In this article, we introduce a new Bayesian framework to
    self-consistently and simultaneously apply multiple empirical calibrations to fully characterize the mass, luminosity,
    radius, and effective temperature of a field age M dwarf. This framework includes a new M-dwarf mass-radius relation with
    a scatter of 3.1% at fixed mass. We further introduce the M-dwarf Ultraviolet Spectroscopic Sample (MUSS), and apply our
    methodology to provide consistent stellar parameters for these nearby low-mass stars, selected as having available spectroscopic
    data in the ultraviolet. These targets are of interest largely as either exoplanet hosts or benchmarks in multiwavelength
    stellar activity. We use the field MUSS stars to define a low-mass main sequence in the solar neighborhood through Gaussian
    Process (GP) regression. These results enable us to empirically measure a feature in the GP derivative at ${{ \mathcal
    M }}_{b}=0.337{\pm }_{0.026}^{0.013}$ M<SUB>☉</SUB> that indicates where the MUSS transitions from fully to partly convective
    interiors.
