  ads_bibcode: 2025arXiv250714771K
  title: Wavelength Requirements for Life Detection via Reflected Light Spectroscopy of Rocky Exoplanets
  authors:
  - Krissansen-Totton, Joshua
  - Ulses, Anna Grace
  - Frissell, Maxwell
  - Gilbert-Janizek, Samantha
  - Young, Amber
