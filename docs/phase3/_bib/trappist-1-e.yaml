  arxiv_id: null
  ads_bibcode: 2021Icar..35814301P
  title: Climate diversity in the solar-like habitable zone due to varying background gas pressure
  authors:
  - Paradise, Adiv
  - Fan, Bo Lin
  - Menou, Kristen
  - Lee, Christopher
  year: '2021'
  pubdate: '2021-04-00'
  doi: 10.1016/j.icarus.2020.114301
  abstract: A large number of studies have responded to the growing body of confirmed terrestrial habitable zone exoplanets
    by presenting models of various possible climates. However, the impact of the partial pressure of background gases such
    as N<SUB>2</SUB> has not yet been well-explored, despite the abundance of N<SUB>2</SUB> in Earth's atmosphere and the
    lack of constraints on its typical abundance in terrestrial planet atmospheres. We use PlaSim, a fast 3D climate model,
    to simulate many hundreds of climates around Sun-like stars with varying N<SUB>2</SUB> partial pressures, instellations,
    and surface characteristics to identify the impact of the background gas partial pressure on the climate. We find that
    the climate's response is nonlinear and highly sensitive to the background gas partial pressure. We identify pressure
    broadening of greenhouse gas (such as CO<SUB>2</SUB> and H<SUB>2</SUB>O) absorption lines, amplification of warming or
    cooling by the water vapor greenhouse positive feedback, heat transport efficiency, and cooling through Rayleigh scattering
    as the dominant competing mechanisms that determine the equilibrium climate for a given N<SUB>2</SUB> partial pressure.
    Finally, we show that different amounts of N<SUB>2</SUB> should have a significant effect on broadband reflected light
    observations of terrestrial exoplanets around Sun-like stars.
