  doi: null
  abstract: 'The TRAPPIST-1 system is the most tantalizing system for the detection of terrestrial exoplanet atmospheres with
    JWST. However, early JWST observations have shown that stellar contamination from hot/cold starspots must be corrected
    if we want to characterize any small planet atmospheres via transmission spectroscopy, especially for the incredibly active
    M8 TRAPPIST-1. Unfortunately, our current understanding of the spectroscopic appearance of these surface features is lacking,
    and we cannot confidently remove the contamination to the level of precision needed to detect the small atmospheric features
    of a terrestrial planet using current models. Here, we present the motivation and first observations for our JWST program
    targeting the characterization of the atmosphere of TRAPPIST-1 e utilizing close transits of the airless TRAPPIST-1 b
    to model-independently correct for stellar contamination by taking the ratio of the two planet''s transmission spectra.
    However, in the case that the stellar contamination signal does not perfectly transfer between the two observations, we
    also present other methods to correct for stellar contamination: the first builds a map of the star itself using observations
    of transits at similar parts of the stellar rotational phase, while the second relies on Gaussian Processes. Using these
    methods, we expect to be able to detect an Earthlike atmosphere on TRAPPIST-1 e with our multicycle observations.'
