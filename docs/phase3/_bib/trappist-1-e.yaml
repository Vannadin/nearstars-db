- &id771
  arxiv_id: null
  ads_bibcode: 2025AAS...24517202C
  title: 'How to delay H2O loss in the habitable zone of TRAPPIST: Add CO2!'
  authors:
  - Carone, Ludmila
  - Barnes, Rory
  - Noack, Lena
  - Thamm, Alexander
  - Bitsch, Betram
  - Barth, Patrick
  - Garcia, Rodolfo
