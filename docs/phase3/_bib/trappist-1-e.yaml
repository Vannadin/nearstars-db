  abstract: The detection of deep reflected S waves on Mars inferred a core size of 1,830 ± 40 km (ref. <SUP>1</SUP>), requiring
    light-element contents that are incompatible with experimental petrological constraints. This estimate assumes a compositionally
    homogeneous Martian mantle, at odds with recent measurements of anomalously slow propagating P waves diffracted along
    the core-mantle boundary<SUP>2</SUP>. An alternative hypothesis is that Mars's mantle is heterogeneous as a consequence
    of an early magma ocean that solidified to form a basal layer enriched in iron and heat-producing elements. Such enrichment
    results in the formation of a molten silicate layer above the core, overlain by a partially molten layer<SUP>3</SUP>.
    Here we show that this structure is compatible with all geophysical data, notably (1) deep reflected and diffracted mantle
    seismic phases, (2) weak shear attenuation at seismic frequency and (3) Mars's dissipative nature at Phobos tides. The
    core size in this scenario is 1,650 ± 20 km, implying a density of 6.5 g cm<SUP>‒3</SUP>, 5-8% larger than previous seismic
    estimates, and can be explained by fewer, and less abundant, alloying light elements than previously required, in amounts
    compatible with experimental and cosmochemical constraints. Finally, the layered mantle structure requires external sources
    to generate the magnetic signatures recorded in Mars's crust.
