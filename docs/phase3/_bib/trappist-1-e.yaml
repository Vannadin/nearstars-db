  arxiv_id: '1403.2741'
  ads_bibcode: 2014ApJ...787..108G
  title: Age Gradients in the Stellar Populations of Massive Star Forming Regions Based on a New Stellar Chronometer
  authors:
  - Getman, Konstantin V.
  - Feigelson, Eric D.
  - Kuhn, Michael A.
  - Broos, Patrick S.
  - Townsley, Leisa K.
  - Naylor, Tim
  - Povich, Matthew S.
  - Luhman, Kevin L.
