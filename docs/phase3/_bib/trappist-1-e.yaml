- &id368
  arxiv_id: '0711.4856'
  ads_bibcode: 2008ApJ...681.1609S
  title: Habitable Climates
  authors:
  - Spiegel, David S.
  - Menou, Kristen
  - Scharf, Caleb A.
  year: '2008'
  pubdate: '2008-07-00'
  doi: 10.1086/588089
  abstract: According to the standard liquid-water definition, the Earth is only partially habitable. We reconsider planetary
    habitability in the framework of energy balance models, the simplest seasonal models in physical climatology, to assess
    the spatial and temporal habitability of Earth-like planets. We quantify the degree of climatic habitability of our models
    with several metrics of fractional habitability. Previous evaluations of habitable zones may have omitted important climatic
    conditions by focusing on close solar system analogies. For example, we find that model pseudo-Earths with different rotation
    rates or different land-ocean fractions have fractional habitabilities that differ significantly from that of the Earth
    itself. Furthermore, the stability of a planet's climate against albedo-feedback snowball events strongly impacts its
    habitability. Therefore, issues of climate dynamics may be central in assessing the habitability of discovered terrestrial
    exoplanets, especially if astronomical forcing conditions are different from the moderate solar system cases.
