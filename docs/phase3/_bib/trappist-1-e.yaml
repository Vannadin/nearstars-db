- &id442
  arxiv_id: '1803.09149'
  ads_bibcode: 2018ApJ...866....1Z
  title: Global-mean Vertical Tracer Mixing in Planetary Atmospheres. I. Theory and Fast-rotating Planets
  authors:
  - Zhang, Xi
  - Showman, Adam P.
  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.3847/1538-4357/aada85
  abstract: Most chemistry and cloud formation models for planetary atmospheres adopt a one-dimensional (1D) diffusion approach
    to approximate the global-mean vertical tracer transport. The physical underpinning of the key parameter in this framework,
    eddy diffusivity K <SUB> zz </SUB>, is usually obscure. Here we analytically and numerically investigate vertical tracer
    transport in a 3D stratified atmosphere and predict K <SUB> zz </SUB> as a function of the large-scale circulation strength,
    horizontal mixing due to eddies and waves and local tracer sources and sinks. We find that K <SUB> zz </SUB> increases
    with tracer chemical lifetime and circulation strength but decreases with horizontal eddy mixing efficiency. We demarcated
    three K <SUB> zz </SUB> regimes in planetary atmospheres. In the first regime where the tracer lifetime is short compared
    with the transport timescale and horizontal tracer distribution under chemical equilibrium ({χ }<SUB>0</SUB>) is uniformly
    distributed across the globe, global-mean vertical tracer mixing behaves diffusively. But the traditional assumption in
    current 1D models that all chemical species are transported via the same eddy diffusivity generally breaks down. We show
    that different chemical species in a single atmosphere should in principle have different eddy diffusion profiles. In
    the second regime where the tracer is short-lived but {χ }<SUB>0</SUB> is non-uniformly distributed, a significant non-diffusive
    component might lead to a negative K <SUB> zz </SUB> under the diffusive assumption. In the third regime where the tracer
    is long-lived, global-mean vertical tracer transport is also largely influenced by non-diffusive effects. Numerical simulations
    of 2D tracer transport on fast-rotating zonally symmetric planets validate our analytical K <SUB> zz </SUB> theory over
    a wide parameter space.
