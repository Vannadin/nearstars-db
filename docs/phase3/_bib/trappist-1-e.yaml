  title: Functions of fungal melanin beyond virulence
  authors:
  - Cordero, Radames J. B.
  - Casadevall, Arturo
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1016/j.fbr.2016.12.003
  abstract: Melanins are ancient biological pigments found in all kingdoms of life. In fungi, their role in microbial pathogenesis
    is well established; however, these complex biomolecules also confer upon fungal microorganisms the faculty to tolerate
    extreme environments such as the Earth's poles, the International Space Station and places contaminated by toxic metals
    and ionizing radiation. A remarkable property of melanin is its capacity to interact with a wide range of electromagnetic
    radiation frequencies, functioning as a protecting and energy harvesting pigment. Other roles of fungal melanin include
    scavenging of free radical, thermo-tolerance, metal ion sequestration, cell development, and mechanical-chemical cellular
    strength. In this review, we explore the various functions ascribed to this biological pigment in fungi and its remarkable
    physicochemical properties.
