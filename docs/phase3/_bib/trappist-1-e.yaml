  ads_bibcode: 2022CCCR....8...17N
  title: 'Precipitation Extremes and Water Vapor: Relationships in Current Climate and Implications for Climate Change'
  authors:
  - Neelin, J. David
  - Martinez-Villalobos, Cristian
  - Stechmann, Samuel N.
  - Ahmed, Fiaz
  - Chen, Gang
  - Norris, Jesse M.
