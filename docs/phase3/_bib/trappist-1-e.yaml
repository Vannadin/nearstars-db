  ads_bibcode: 2022NewPh.236..538Z
  title: 'Photosynthesis in sun and shade: the surprising importance of far-red photons'
  authors:
  - Zhen, Shuyang
  - Iersel, Marc W.
  - Bugbee, Bruce
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.1111/nph.18375
  abstract: Summary The current definition of photosynthetically active radiation includes only photons from 400 up to 700
    nm, despite evidence of the synergistic interaction between far-red photons and shorter-wavelength photons. The synergy
    between far-red and shorter-wavelength photons has not been studied in sunlight under natural conditions. We used a filter
    to remove photons above 700 nm to quantify the effects on photosynthesis in diverse species under full sun, medium light
    intensity and vegetation shade. Far-red photons (701 to 750 nm) in sunlight are used efficiently for photosynthesis. This
    is especially important for leaves in vegetation shade, where far-red photons can be &gt; 50% of the total incident photons
    between 400 and 750 nm. Far-red photons accounted for 24─25% of leaf gross photosynthesis (P<SUB>gross</SUB>) in a C<SUB>3</SUB>
    and a C<SUB>4</SUB> species when sunlight was filtered through a leaf, and 10─14% of leaf P<SUB>gross</SUB> in a tree
    and an understory species in deep shade. Accounting for the photosynthetic activity of far-red photons is critical for
    accurate measurement and modeling of photosynthesis at single leaf, canopy and ecosystem scales. This, in turn, is crucial
    in understanding crop productivity, the global carbon cycle and climate change impacts on agriculture and ecosystems.
