- &id584
  arxiv_id: '2003.11548'
  ads_bibcode: 2020ApJ...893L..43M
  title: Why Is it So Cold in Here? Explaining the Cold Temperatures Retrieved from Transmission Spectra of Exoplanet Atmospheres
  authors:
  - MacDonald, Ryan J.
  - Goyal, Jayesh M.
  - Lewis, Nikole K.
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/2041-8213/ab8238
  abstract: 'Transmission spectroscopy is a powerful technique widely used to probe exoplanet terminators. Atmospheric retrievals
    of transmission spectra are enabling comparative studies of exoplanet atmospheres. However, the atmospheric properties
    inferred by retrieval techniques display a significant anomaly: most retrieved temperatures are far colder than expected.
    In some cases, retrieved temperatures are $\sim 1000\,{\rm{K}}$ colder than ${T}_{\mathrm{eq}}$ . Here, we provide an
    explanation for this conundrum. We demonstrate that erroneously cold temperatures result when 1D atmospheric models are
    applied to spectra of planets with differing morning-evening terminator compositions. Despite providing an acceptable
    fit, 1D retrieval techniques artificially tune atmospheric parameters away from terminator-averaged properties. Retrieved
    temperature profiles are hundreds of degrees cooler and have weaker temperature gradients than reality. Retrieved abundances
    are mostly biased by $\gt 1\sigma $ and sometimes by $\gt 3\sigma $ , with the most extreme biases for ultra-hot Jupiters.
    When morning-evening compositional differences manifest for prominent opacity sources, H<SUB>2</SUB>O abundances retrieved
    by 1D models can be biased by over an order of magnitude. Finally, we demonstrate that these biases provide an explanation
    for the cold retrieved temperatures reported for WASP-17b and WASP-12b. To overcome biases associated with 1D atmospheric
    models, there is an urgent need to develop multidimensional retrieval techniques.'
