- &id119
  arxiv_id: null
  ads_bibcode: 2023PSJ.....4..171B
  title: Libration- and Precession-driven Dissipation in the Fluid Cores of the TRAPPIST-1 Planets
  authors:
  - Bansal, Dhananjhay
  - Christie, Hannah S.
  - Dumberry, Mathieu
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.3847/PSJ/acf3de
  abstract: The seven planets orbiting TRAPPIST-1 have sizes and masses similar to Earth and mean densities that suggest that
    their interior structures are comprised of a fluid iron core and rocky mantle. Here we use idealized analytical models
    to compute estimates of the viscous dissipation in the fluid cores of the TRAPPIST-1 planets induced by mantle libration
    and precession. The dissipation induced by the libration at orbital periods is largest for TRAPPIST-1b, of the order of
    600 MW, and decreases with orbital distance, to values of 5-500 W for TRAPPIST-1h, depending on its triaxial shape. Extrapolating
    these results to the larger libration amplitudes expected at longer periods, dissipation may perhaps be as high as 1 TW
    in TRAPPIST-1b. Orbital precession induces a misalignment between the spin axes of the fluid core and mantle of a planet,
    the amplitude of which depends on the resonant amplification of its free precession and free core nutation. Assuming Cassini
    states, we show that the dissipation from this misalignment can reach a few TW for planets e and f. Our dissipation estimates
    are lower bounds, as we neglect ohmic dissipation, which may dominate if the fluid cores of the TRAPPIST-1 planets sustain
    magnetic fields. Our results suggest that dissipation induced by precession can be of the same order as tidal dissipation
    for the outermost planets, may perhaps be sufficient to supply the power to a generate a magnetic field in their liquid
    cores, and likely played an important role in the evolution of the TRAPPIST-1 system.
