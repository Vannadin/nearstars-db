- &id297
  arxiv_id: '2010.01466'
  ads_bibcode: 2020ApJ...901L..36Z
  title: How Does Background Air Pressure Influence the Inner Edge of the Habitable Zone for Tidally Locked Planets in a 3D
    View?
  authors:
  - Zhang, Yixiao
  - Yang, Jun
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.3847/2041-8213/abb87f
  abstract: 'We examine the effect of varying background N<SUB>2</SUB> surface pressure (labeled as pN<SUB>2</SUB>) on the
    inner edge of the habitable zone for 1:1 tidally locked planets around M dwarfs, using the three-dimensional (3D) atmospheric
    general circulation model (AGCM) ExoCAM. In our experiments, the rotation period is fixed when varying the stellar flux,
    in order to more clearly isolate the role of pN<SUB>2</SUB>. We find that the stellar flux threshold for the runaway greenhouse
    is a non-monotonous function of pN<SUB>2</SUB>. This is due to the competing effects of five processes: pressure broadening,
    heat capacity, lapse rate, relative humidity, and clouds. These competing processes increase the complexity in predicting
    the location of the inner edge of the habitable zone. For a slow-rotation orbit of 60 Earth days, the critical stellar
    flux for the runaway greenhouse onset is 1700-1750, 1900-1950, and 1750-1800 W m<SUP>-2</SUP> under 0.25, 1.0, and 4.0
    bar of pN<SUB>2</SUB>, respectively, suggesting that the magnitude of the effect of pN<SUB>2</SUB> is within ≍13%. For
    a rapid rotation orbit, the effect of varying pN<SUB>2</SUB> on the inner edge is smaller, within a range of ≍7%. Moreover,
    we show that Rayleigh scattering effect as varying pN<SUB>2</SUB> is unimportant for the inner edge due to the masking
    effect of cloud scattering and to the strong shortwave absorption by water vapor under hot climates. Future work using
    AGCMs having different cloud and convection schemes and cloud-resolving models having explicit cloud and convection are
    Required to revise this problem.'
