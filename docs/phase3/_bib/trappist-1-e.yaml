  abstract: The TRAPPIST-1 system has been extensively observed with JWST in the near-infrared with the goal of detecting
    atmospheric transit transmission spectra of these temperate, Earth-sized exoplanets. A byproduct has been much more precise
    times of transit compared with prior available data from Spitzer, Hubble Space Telescope, or ground-based telescopes.
    In this note we use 23 new timing measurements of all seven planets in the near-infrared from five JWST observing programs
    to better forecast and constrain the future times of transit in this system. In particular, we note that the transit times
    of TRAPPIST-1h have drifted significantly from a prior published analysis by up to tens of minutes. Our newer forecast
    has a higher precision, with uncertainties ranging from 7 to 105 s during JWST Cycles 4 and 5. This forecast will help
    to improve planning of future observations of the TRAPPIST-1 planets, while we postpone a full dynamical analysis to future
    work.
