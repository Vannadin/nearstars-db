  abstract: The daytime-mean solar zenith angle (SZA) and the solar insolation-weighted-mean SZA are discussed from a global
    scale and from a latitude-dependent local-scale perspective. It is found that the choosing of daytime-mean SZA or insolation-weighted-mean
