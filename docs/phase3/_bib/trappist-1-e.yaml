  abstract: We determine constraints on the ice shell and ocean of Enceladus from the observed libration at orbital period
    by assessing the effects of uncertainties in the size, density, rigidity, and viscosity of the internal layers and of
    the non-hydrostatic structure on the libration. The observed libration amplitude implies that the average thickness of
