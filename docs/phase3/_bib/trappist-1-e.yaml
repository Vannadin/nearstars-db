- &id359
  arxiv_id: '1306.6325'
  ads_bibcode: 2013ApJ...778..153B
  title: How to Distinguish between Cloudy Mini-Neptunes and Water/Volatile-dominated Super-Earths
  authors:
  - Benneke, Björn
  - Seager, Sara
  year: '2013'
  pubdate: '2013-12-00'
  doi: 10.1088/0004-637X/778/2/153
  abstract: One of the most profound questions about the newly discovered class of low-density super-Earths is whether these
    exoplanets are predominately H<SUB>2</SUB>-dominated mini-Neptunes or volatile-rich worlds with gas envelopes dominated
    by H<SUB>2</SUB>O, CO<SUB>2</SUB>, CO, CH<SUB>4</SUB>, or N<SUB>2</SUB>. Transit observations of the super-Earth GJ 1214b
    rule out cloud-free H<SUB>2</SUB>-dominated scenarios, but are not able to determine whether the lack of deep spectral
    features is due to high-altitude clouds or the presence of a high mean molecular mass atmosphere. Here, we demonstrate
    that one can unambiguously distinguish between cloudy mini-Neptunes and volatile-dominated worlds based on wing steepness
    and relative depths of absorption features in moderate-resolution near-infrared transmission spectra (R ~ 100). In a numerical
    retrieval study, we show for GJ 1214b that an unambiguous distinction between a cloudy H<SUB>2</SUB>-dominated atmosphere
    and cloud-free H<SUB>2</SUB>O atmosphere will be possible if the uncertainties in the spectral transit depth measurements
    can be reduced by a factor of ~3 compared to the published Hubble Space Telescope Wide-Field Camera 3 and Very Large Telescope
    transit observations by Berta et al. and Bean et al. We argue that the required precision for the distinction may be achievable
    with currently available instrumentation by stacking 10-15 repeated transit observations. We provide a scaling law that
    scales our quantitative results to other transiting super-Earths and Neptunes such as HD 97658b, 55 Cnc e, GJ 3470b and
    GJ 436b. The analysis in this work is performed using an improved version of our Bayesian atmospheric retrieval framework.
    The new framework not only constrains the gas composition and cloud/haze parameters, but also determines our confidence
    in having detected molecules and cloud/haze species through Bayesian model comparison. Using the Bayesian tool, we demonstrate
    quantitatively that the subtle transit depth variation in the Berta et al. data is not sufficient to claim the detection
    of water absorption.
