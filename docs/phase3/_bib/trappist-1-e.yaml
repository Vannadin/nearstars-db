  ads_bibcode: 2013ApJS..209....5S
  title: Superflares on Solar-type Stars Observed with Kepler. I. Statistical Properties of Superflares
  authors:
  - Shibayama, Takuya
  - Maehara, Hiroyuki
  - Notsu, Shota
  - Notsu, Yuta
  - Nagao, Takashi
  - Honda, Satoshi
  - Ishii, Takako T.
  - Nogami, Daisaku
  - Shibata, Kazunari
  year: '2013'
