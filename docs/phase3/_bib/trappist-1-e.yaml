  doi: 10.1038/s41598-017-14192-4
  abstract: The current explosion in detection and characterization of thousands of extrasolar planets from the Kepler mission,
    the Hubble Space Telescope, and large ground-based telescopes opens a new era in searches for Earth-analog exoplanets
    with conditions suitable for sustaining life. As more Earth-sized exoplanets are detected in the near future, we will
    soon have an opportunity to identify habitale worlds. Which atmospheric biosignature gases from habitable planets can
    be detected with our current capabilities? The detection of the common biosignatures from nitrogen-oxygen rich terrestrial-type
    exoplanets including molecular oxygen (O<SUB>2</SUB>), ozone (O<SUB>3</SUB>), water vapor (H<SUB>2</SUB>O), carbon dioxide
    (CO<SUB>2</SUB>), nitrous oxide (N<SUB>2</SUB>O), and methane (CH<SUB>4</SUB>) requires days of integration time with
    largest space telescopes, and thus are very challenging for current instruments. In this paper we propose to use the powerful
    emission from rotational-vibrational bands of nitric oxide, hydroxyl and molecular oxygen as signatures of nitrogen, oxygen,
    and water rich atmospheres of terrestrial type exoplanets "highlighted" by the magnetic activity from young G and K main-sequence
    stars. The signals from these fundamental chemical prerequisites of life we call atmospheric "beacons of life" create
    a unique opportunity to perform direct imaging observations of Earth-sized exoplanets with high signal-to-noise and low
    spectral resolution with the upcoming NASA missions.
