  doi: 10.1093/pasj/psv001
  abstract: We conducted high-dispersion spectroscopic observations of 50 superflare stars with Subaru High Dispersion Spectrograph
    (HDS), and measured the stellar parameters of them. These 50 targets were selected from the solar-type (G-type main sequence)
    superflare stars that we had discovered from the Kepler photometric data. As a result of these spectroscopic observations,
    we found that more than half (34) of our 50 targets have no evidence of binary systems. We then estimated the effective
    temperature (T<SUB>eff</SUB>), surface gravity (log g), metallicity ([Fe/H]), and projected rotational velocity (vsin
    i) of these 34 superflare stars on the basis of our spectroscopic data. The accuracy of our estimations is higher than
    that of the Kepler Input Catalog (KIC) values, and the differences between our values and KIC values [(∆T<SUB>eff</SUB>)<SUB>rms</SUB>
    ∼ 219 K, (∆log g)<SUB>rms</SUB> ∼ 0.37 dex, and (∆[Fe/H])<SUB>rms</SUB> ∼ 0.46 dex] are comparable to the large uncertainties
    and systematic differences of KIC values reported by the previous researchers. We confirmed that the estimated T<SUB>eff</SUB>
    and log g values of the 34 superflare stars are roughly in the range of solar-type stars. In particular, these parameters
    and the brightness variation period (P<SUB>0</SUB>) of nine of the stars are in the range of "Sun-like" stars (5600 ≤
    T<SUB>eff</SUB> ≤ 6000 K, log g ≥ 4.0, and P<SUB>0</SUB> &gt; 10 d). Five of the 34 target stars are fast rotators (vsin
    i ≥ 10 km s<SUP>-1</SUP>), while 22 stars have relatively low vsin i values (vsin i &lt; 5 km s<SUP>-1</SUP>). These results
    suggest that stars that have spectroscopic properties similar to the Sun can have superflares, and this supports the hypothesis
    that the Sun might cause a superflare.
