- &id596
  arxiv_id: '1909.05218'
  ads_bibcode: 2019NatAs...3.1086T
  title: Water vapour in the atmosphere of the habitable-zone eight-Earth-mass planet K2-18 b
  authors:
  - Tsiaras, Angelos
  - Waldmann, Ingo P.
  - Tinetti, Giovanna
  - Tennyson, Jonathan
  - Yurchenko, Sergey N.
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.1038/s41550-019-0878-9
  abstract: In the past decade, observations from space and the ground have found water to be the most abundant molecular
    species, after hydrogen, in the atmospheres of hot, gaseous extrasolar planets<SUP>1-5</SUP>. Being the main molecular
    carrier of oxygen, water is a tracer of the origin and the evolution mechanisms of planets. For temperate, terrestrial
    planets, the presence of water is of great importance as an indicator of habitable conditions. Being small and relatively
    cold, these planets and their atmospheres are the most challenging to observe, and therefore no atmospheric spectral signatures
    have so far been detected<SUP>6</SUP>. Super-Earths—planets lighter than ten Earth masses—around later-type stars may
    provide our first opportunity to study spectroscopically the characteristics of such planets, as they are best suited
    for transit observations. Here, we report the detection of a spectroscopic signature of water in the atmosphere of K2-18
    b—a planet of eight Earth masses in the habitable zone of an M dwarf<SUP>7</SUP>—with high statistical confidence (Atmospheric
    Detectability Index<SUP>5</SUP> = 5.0, ~3.6σ (refs. <SUP>8,9</SUP>)). In addition, the derived mean molecular weight suggests
    an atmosphere still containing some hydrogen. The observations were recorded with the Hubble Space Telescope/Wide Field
    Camera 3 and analysed with our dedicated, publicly available, algorithms<SUP>5,9</SUP>. Although the suitability of M
    dwarfs to host habitable worlds is still under discussion<SUP>10-13</SUP>, K2-18 b offers an unprecedented opportunity
    to gain insight into the composition and climate of habitable-zone planets.
  source: citation_of=2020ApJ...901..126W
