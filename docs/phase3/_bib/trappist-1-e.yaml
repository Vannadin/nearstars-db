  arxiv_id: '2511.03625'
  ads_bibcode: 2026AJ....171...11P
  title: 'Tidally Torn: Why the Most Common Stars May Lack Large, Habitable-zone Moons'
  authors:
  - Patel, Shaan D.
  - Quarles, Billy
  - Weinberg, Nevin N.
  - Cuntz, Manfred
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.3847/1538-3881/ae1b8c
  abstract: Earth-like planets in the habitable zone (HZ) of M dwarfs have recently been targeted in the search for exomoons.
    We study the stability and lifetime of large (Luna-like) moons, accounting for the effects of three-body interactions
    and tidal forces using the N-body simulator rebound and its extension library reboundx. We find that those moons have
    a notably different likelihood of existence (and, by implication, observability). Large moons orbiting Earth-like planets
    in the HZs of M4 and M2 dwarfs become unstable well before 10<SUP>7</SUP> and 10<SUP>8</SUP> yr, respectively, and in
    most cases, those orbiting M0 dwarfs become unstable in much less than 10<SUP>9</SUP> yr. We conclude that HZ planets
    orbiting M dwarfs are unlikely to harbor large moons, thus affecting the total number of possible moons in our galaxy
    and the Universe at large. Since moons may help enhance the habitability of their host planet, besides being possibly
    habitable themselves, these results may have notable implications for exolife, and should also be considered when seeking
    solutions to the Drake equation and the Fermi paradox.
