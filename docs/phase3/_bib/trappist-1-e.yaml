  abstract: G EANT4 is a toolkit for simulating the passage of particles through matter. It includes a complete range of functionality
    including tracking, geometry, physics models and hits. The physics processes offered cover a comprehensive range, including
    electromagnetic, hadronic and optical processes, a large set of long-lived particles, materials and elements, over a wide
    energy range starting, in some cases, from 250 eV and extending in others to the TeV energy range. It has been designed
    and constructed to expose the physics models utilised, to handle complex geometries, and to enable its easy adaptation
    for optimal use in different sets of applications. The toolkit is the result of a worldwide collaboration of physicists
    and software engineers. It has been created exploiting software engineering and object-oriented technology and implemented
    in the C++ programming language. It has been used in applications in particle physics, nuclear physics, accelerator design,
    space engineering and medical physics.
