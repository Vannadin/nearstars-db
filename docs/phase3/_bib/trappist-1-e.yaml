  doi: 10.1117/12.2631692
  abstract: Atmospheric retrieval studies are essential to determine the science requirements for future generation missions,
    such as the Large Interferometer for Exoplanets (LIFE). The use of heterogeneous absorption cross-sections might be the
    cause of systematic effects in retrievals, which could bias a correct characterization of the atmosphere. In this contribution
    we quantified the impact of differences in line list provenance, broadening coefficients, and line wing cut-offs in the
    retrieval of an Earth twin exoplanet orbiting a Sun-like star at 10 pc from the observer, as it would be observed with
    LIFE. We ran four different retrievals on the same input spectrum, by varying the opacity tables that the Bayesian retrieval
    framework was allowed to use. We found that the systematics introduced by the opacity tables could bias the correct estimation
    of the atmospheric pressure at the surface level, as well as an accurate retrieval of the abundance of some species in
    the atmosphere (such as CO<SUB>2</SUB> and N<SUB>2</SUB>O). We argue that differences in the line wing cut-off might be
    the major source of errors. We highlight the need for more laboratory and modeling efforts, as well as inter-model comparisons
    of the main radiative transfer models and Bayesian retrieval frameworks. This is especially relevant in the context of
    LIFE and future generation missions, to identify issues and critical points for the community to jointly work together
    to prepare for the analysis of the upcoming observations.
