  ads_bibcode: 2021ApJ...911...18W
  title: The Mega-MUSCLES Spectral Energy Distribution of TRAPPIST-1
  authors:
  - Wilson, David J.
  - Froning, Cynthia S.
  - Duvvuri, Girish M.
  - France, Kevin
  - Youngblood, Allison
  - Schneider, P. Christian
  - Berta-Thompson, Zachory
