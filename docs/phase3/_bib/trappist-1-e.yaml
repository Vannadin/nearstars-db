  abstract: We present a photodynamical model for computing the light curves of transiting exoplanet systems, Photodynamics.jl.
    The model uses a modern symplectic integrator which enables an arbitrary system architecture, NbodyGradient.jl, making
    it applicable to eclipsing triple-star or transiting exomoon systems as well. The novel aspect of this model is that it
    is fully differentiable, that is, we propagate the derivatives with respect to the initial conditions for the time-integrated
    flux at each exposure, which is computed with the Limbdark.jl transit model which allows for polynomial limb-darkening
    of the star. The derivatives can enable rapid optimization and computation of the information matrix for fits to observational
    datasets, such as Kepler, K2, TESS, JWST, as well as ground-based data. The goal of this work is to provide an open-source
    tool which is both easy to use and fast, written in the Julia language, which can be applied to high-multiplicity planet
    systems which have a high-dimensional parameter spaces which are otherwise challenging to sample. With the derivatives,
    Markov-Chain Monte Carlo can be accelerated using HMC and NUTS, making the posterior sampling problem more tractable.
    The figure shows "river plots" of an N-body for the TRAPPIST-1 e and f planets, showing the derivatives of the model with
    respect to the radius of the host star. This work is supported by the NSF CDS&amp;E, NASA NExSS, and NASA XRP programs.
