- &id182
  arxiv_id: '2004.00229'
  ads_bibcode: 2020MNRAS.494..259R
  title: The effect of high nitrogen pressures on the habitable zone and an appraisal of greenhouse states
  authors:
  - Ramirez, Ramses M.
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1093/mnras/staa603
  abstract: 'The habitable zone (HZ) is the main tool that mission architectures utilize to select potentially habitable planets
    for follow-up spectroscopic observation. Given its importance, the precise size and location of the HZ remains a hot topic,
    as many studies, using a hierarchy of models, have assessed various factors including: atmospheric composition, time,
    and planetary mass. However, little work has assessed how the HZ changes with variations in background nitrogen pressure,
    which is directly connected to the habitability and life-bearing potential of planets. Here, I use an advanced energy
    balance model with clouds to show that our Solar system''s HZ is ∼0.9-1.7 au, assuming a 5-bar nitrogen background pressure
    and a maximum 100 per cent cloud cover at the inner edge. This width is ∼20 per cent wider than the conservative HZ estimate.
    Similar extensions are calculated for A-M stars. I also show that cooling clouds/hazes and high background pressures can
    decrease the runaway greenhouse threshold temperature to ∼300 K (or less) for planets orbiting any star type. This is
    because the associated increase in planetary albedo enables stable climates closer to the star, where rapid destabilization
    can be triggered from a lower mean surface temperature. Enhanced longwave emission for planets with very high stratospheric
    temperatures also permits stable climates at smaller orbital distances. The model predicts a runaway greenhouse above
    ∼330 K for planets orbiting the Sun, which is consistent with previous work. However, moist greenhouses only occur for
    planets orbiting A-stars.'
