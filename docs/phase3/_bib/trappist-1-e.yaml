  doi: 10.1126/science.1232226
  abstract: The search for exoplanets includes the promise to eventually find and identify habitable worlds. The thousands
    of known exoplanets and planet candidates are extremely diverse in terms of their masses or sizes, orbits, and host star
    type. The diversity extends to new kinds of planets, which are very common yet have no solar system counterparts. Even
    with the requirement that a planet’s surface temperature must be compatible with liquid water (because all life on Earth
    requires liquid water), a new emerging view is that planets very different from Earth may have the right conditions for
    life. The broadened possibilities will increase the future chances of discovering an inhabited world.
