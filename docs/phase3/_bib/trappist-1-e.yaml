  arxiv_id: '2202.00701'
  ads_bibcode: 2022AJ....163..140L
  title: 'Hierarchical Bayesian Atmospheric Retrieval Modeling for Population Studies of Exoplanet Atmospheres: A Case Study
    on the Habitable Zone'
  authors:
  - Lustig-Yaeger, Jacob
  - Sotzen, Kristin S.
  - Stevenson, Kevin B.
  - Luger, Rodrigo
  - May, Erin M.
  - Mayorga, L. C.
