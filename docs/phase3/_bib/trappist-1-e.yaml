  arxiv_id: '2103.13540'
  ads_bibcode: 2021A&A...650A.138S
  title: Activity of TRAPPIST-1 analog stars observed with TESS
  authors:
  - Seli, Bálint
  - Vida, Krisztián
  - Moór, Attila
  - Pál, András
  - Oláh, Katalin
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.1051/0004-6361/202040098
  abstract: As more exoplanets are being discovered around ultracool dwarfs, understanding their magnetic activity and the
    implications for habitability is of prime importance. To find stellar flares and photometric signatures related to starspots,
    continuous monitoring is necessary, which can be achieved with spaceborne observatories such as the Transiting Exoplanet
    Survey Satellite (TESS). We present an analysis of TRAPPIST-1 analog ultracool dwarfs with TESS full-frame image photometry
    from the first two years of the primary mission. A volume-limited sample up to 50 pc is constructed consisting of 339
    stars closer than 0.<SUP>m</SUP>5 to TRAPPIST-1 on the Gaia color-magnitude diagram. We analyzed the 30 min cadence TESS
    light curves of 248 stars, searching for flares and rotational modulation caused by starspots. The composite flare frequency
    distribution of the 94 identified flares shows a power-law index that is similar to TRAPPIST-1 and contains flares up
    to E<SUB>TESS</SUB> = 3 × 10<SUP>33</SUP> erg. Rotational periods shorter than 5<SUP>d</SUP> were determined for 42 stars,
    sampling the regime of fast rotators. The ages of 88 stars from the sample were estimated using kinematic information.
    A weak correlation between rotational period and age is observed, which is consistent with magnetic braking. <P />Full
    Table 2 and the individual TESS light curves are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/650/A138">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/650/A138</A>
