  arxiv_id: '1407.6349'
  ads_bibcode: 2015ApJ...804...60K
  title: Atmospheric Dynamics of Terrestrial Exoplanets over a Wide Range of Orbital and Atmospheric Parameters
  authors:
  - Kaspi, Yohai
  - Showman, Adam P.
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1088/0004-637X/804/1/60
  abstract: The recent discoveries of terrestrial exoplanets and super-Earths extending over a broad range of orbital and
    physical parameters suggest that these planets will span a wide range of climatic regimes. Characterization of the atmospheres
    of warm super-Earths has already begun and will be extended to smaller and more distant planets over the coming decade.
    The habitability of these worlds may be strongly affected by their three-dimensional atmospheric circulation regimes,
    since the global climate feedbacks that control the inner and outer edges of the habitable zone—including transitions
    to Snowball-like states and runaway-greenhouse feedbacks—depend on the equator-to-pole temperature differences, patterns
    of relative humidity, and other aspects of the dynamics. Here, using an idealized moist atmospheric general circulation
    model including a hydrological cycle, we study the dynamical principles governing the atmospheric dynamics on such planets.
    We show how the planetary rotation rate, stellar flux, atmospheric mass, surface gravity, optical thickness, and planetary
    radius affect the atmospheric circulation and temperature distribution on such planets. Our simulations demonstrate that
    equator-to-pole temperature differences, meridional heat transport rates, structure and strength of the winds, and the
    hydrological cycle vary strongly with these parameters, implying that the sensitivity of the planet to global climate
    feedbacks will depend significantly on the atmospheric circulation. We elucidate the possible climatic regimes and diagnose
    the mechanisms controlling the formation of atmospheric jet streams, Hadley and Ferrel cells, and latitudinal temperature
    differences. Finally, we discuss the implications for understanding how the atmospheric circulation influences the global
    climate.
