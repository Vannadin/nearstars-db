  arxiv_id: '2412.19357'
  ads_bibcode: 2025ApJ...981...98A
  title: 'Habitability in 4D: Predicting the Climates of Earth Analogs across Rotation and Orbital Configurations'
  authors:
  - Adams, Arthur D.
  - Colose, Christopher
  - Merrelli, Aronne
  - Turnbull, Margaret
  - Kane, Stephen R.
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.3847/1538-4357/ada3c8
  abstract: Earth-like planets in the circumstellar habitable zone (HZ) may have dramatically different climate outcomes depending
    on their spin─orbit parameters, altering their habitability for life as we know it. We present a suite of 93 ROCKE-3D
    general circulation models (GCMs) for planets with the same surface conditions and average annual insolation as Earth,
    but with a wide range of rotation periods, obliquities, orbital eccentricities, and longitudes of periastra. Our habitability
    metric f<SUB>HZ</SUB> is calculated based on the temperature and precipitation in each model across grid cells over land.
    Latin hypercube sampling aids in sampling all four of the spin─orbit parameters with a computationally feasible number
    of GCM runs. Statistical emulation then allows us to model f<SUB>HZ</SUB> as a smooth function with built-in estimates
    of statistical uncertainty. We fit our emulator to an initial set of 46 training runs, then test with an additional 46
    runs at different spin─orbit values. Our emulator predicts the directly GCM-modeled habitability values for the test runs
    at the appropriate level of accuracy and precision. For orbital eccentricities up to 0.225, rotation period remains the
    primary driver of the fraction of land that remains above freezing and with precipitation above a threshold value. For
    rotation periods greater than ~20 days, habitability drops significantly (from ~70% to ~20%), driven primarily by cooler
    land temperatures. Obliquity is a significant secondary factor for rotation periods less than ~20 Earth days, with a factor
    of 2 impact on habitability that is maximized at intermediate obliquity.
