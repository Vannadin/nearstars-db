  pubdate: '2026-02-00'
  doi: null
  abstract: TRAPPIST-1 e is one of the few habitable zone rocky exoplanets that is amenable for detailed atmospheric characterization
    with JWST. With 4 observations already obtained from a JWST GTO program and 15 new transits being obtained between Cycles
    3 and 4 by a large JWST program, the observatory will be able to put the strongest constraints yet on a rocky exoplanet
    in the habitable-zone of its host star. Here, we present atmospheric retrieval experiments to study what kind of constraints
    these programs would be able to put on its atmospheric properties, as well as the impact of different modeling assumptions
    on atmospheric retrievals. We showcase that at this level of precision, detailed temperature-pressure profiles give raise
    to very similar results, while assumptions on clouds and/or surface pressures might have impacts on the detectability
    of atmospheric features. We showcase what follow-up programs might find if evidence for an atmosphere is found on the
    19-transit experiment.
