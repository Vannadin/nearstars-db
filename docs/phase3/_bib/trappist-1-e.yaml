- &id355
  arxiv_id: '1407.2622'
  ads_bibcode: 2014ApJ...792...90D
  title: Abiotic Ozone and Oxygen in Atmospheres Similar to Prebiotic Earth
  authors:
  - Domagal-Goldman, Shawn D.
  - Segura, Antígona
  - Claire, Mark W.
  - Robinson, Tyler D.
  - Meadows, Victoria S.
  year: '2014'
  pubdate: '2014-09-00'
  doi: 10.1088/0004-637X/792/2/90
  abstract: The search for life on planets outside our solar system will use spectroscopic identification of atmospheric biosignatures.
    The most robust remotely detectable potential biosignature is considered to be the detection of oxygen (O<SUB>2</SUB>)
    or ozone (O<SUB>3</SUB>) simultaneous to methane (CH<SUB>4</SUB>) at levels indicating fluxes from the planetary surface
    in excess of those that could be produced abiotically. Here we use an altitude-dependent photochemical model with the
    enhanced lower boundary conditions necessary to carefully explore abiotic O<SUB>2</SUB> and O<SUB>3</SUB> production on
    lifeless planets with a wide variety of volcanic gas fluxes and stellar energy distributions. On some of these worlds,
    we predict limited O<SUB>2</SUB> and O<SUB>3</SUB> buildup, caused by fast chemical production of these gases. This results
    in detectable abiotic O<SUB>3</SUB> and CH<SUB>4</SUB> features in the UV-visible, but no detectable abiotic O<SUB>2</SUB>
    features. Thus, simultaneous detection of O<SUB>3</SUB> and CH<SUB>4</SUB> by a UV-visible mission is not a strong biosignature
    without proper contextual information. Discrimination between biological and abiotic sources of O<SUB>2</SUB> and O<SUB>3</SUB>
    is possible through analysis of the stellar and atmospheric context—particularly redox state and O atom inventory—of the
    planet in question. Specifically, understanding the spectral characteristics of the star and obtaining a broad wavelength
    range for planetary spectra should allow more robust identification of false positives for life. This highlights the importance
    of wide spectral coverage for future exoplanet characterization missions. Specifically, discrimination between true and
    false positives may require spectral observations that extend into infrared wavelengths and provide contextual information
    on the planet's atmospheric chemistry.
