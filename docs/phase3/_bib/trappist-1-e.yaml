  arxiv_id: '2209.10635'
  ads_bibcode: 2022E&PSL.59517772P
  title: A primordial atmospheric origin of hydrospheric deuterium enrichment on Mars
  authors:
  - Pahlevan, Kaveh
  - Schaefer, Laura
  - Elkins-Tanton, Linda T.
  - Desch, Steven J.
  - Buseck, Peter R.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.1016/j.epsl.2022.117772
  abstract: The deuterium-to-hydrogen (D/H or <SUP>2</SUP>H/<SUP>1</SUP>H) ratio of Martian atmospheric water (∼6× standard
    mean ocean water, SMOW) is higher than that of known sources, requiring planetary enrichment. A recent measurement by
    NASA's Mars Science Laboratory rover Curiosity of Hesperian-era (&gt;3 Ga) clays yields a D/H ratio ∼3×SMOW, demonstrating
    that most of the enrichment occurs early in Mars's history, reinforcing the conclusions of Martian meteorite studies.
    As on Venus, Mars's D/H enrichment is widely thought to reflect preferential loss to space of <SUP>1</SUP>H (protium)
    relative to <SUP>2</SUP>H (deuterium), but both the cause and the global environmental context of large and early hydrogen
    losses remain to be determined. Here, we apply a recent model of primordial atmosphere evolution to Mars, link the magma
    ocean of the accretion epoch with a subsequent water-ocean epoch, and calculate the behavior of deuterium for comparison
    with the observed record. In contrast to earlier works that consider Martian D/H fractionation in atmospheres in which
    hydrogen reservoirs are present exclusively as H<SUB>2</SUB>O or H<SUB>2</SUB>, here we consider 2-component (H<SUB>2</SUB>O-H<SUB>2</SUB>)
    outgassed atmospheres in which both condensing (H<SUB>2</SUB>O) and escaping (H<SUB>2</SUB>) components ─ and their interaction
    ─ are explicitly calculated. We find that a ≈2-3× hydrospheric deuterium-enrichment is produced rapidly if the Martian
    magma ocean is chemically reducing at last equilibration with the primordial atmosphere, making H<SUB>2</SUB> and CO the
    initially dominant species, with minor abundances of H<SUB>2</SUB>O and CO<SUB>2</SUB>. Reducing gases ─ in particular
    H<SUB>2</SUB> ─ can cause substantial greenhouse warming and prevent a water ocean from freezing immediately after the
    magma ocean epoch. We find that greenhouse warming due to plausible H<SUB>2</SUB> inventories (pH=21−102 bars) yields
    surface temperatures high enough (T=s290−560 K) to stabilize a water ocean and produce an early hydrological cycle through
    which surface water can be circulated. Moreover, the pressure-temperature conditions are high enough to produce ocean-atmosphere
    H<SUB>2</SUB>O-H<SUB>2</SUB> isotopic equilibrium through gas-phase deuterium exchange such that surface H<SUB>2</SUB>O
    strongly concentrates deuterium relative to H<SUB>2</SUB>, which preferentially takes up protium and escapes from the
    primordial atmosphere. The efficient physical separation of deuterium-rich (H<SUB>2</SUB>O) and deuterium-poor (H<SUB>2</SUB>)
    species via condensation permits equilibrium isotopic partitioning and early atmospheric escape to be recorded in modern
    crustal reservoirs. The proposed scenario of primordial H<SUB>2</SUB>-CO-rich outgassing and escape suggests significant
    durations (&gt;Myr) of chemical conditions on the Martian surface conducive to prebiotic chemistry immediately following
    magma ocean crystallization.
