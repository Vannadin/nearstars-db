  arxiv_id: '2503.21702'
  ads_bibcode: 2025ApJ...989..201R
  title: Enabling Robust Exoplanet Atmospheric Retrievals with Gaussian Processes
  authors:
  - Rotman, Yoav
  - Welbanks, Luis
  - Line, Michael R.
  - McGill, Peter
  - Radica, Michael
  - Nixon, Matthew C.
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/1538-4357/adef04
  abstract: 'Atmospheric retrievals are essential tools for interpreting exoplanet transmission and eclipse spectra, enabling
    quantitative constraints on the chemical composition, aerosol properties, and thermal structure of planetary atmospheres.
    The James Webb Space Telescope (JWST) offers unprecedented spectral precision, resolution, and wavelength coverage, unlocking
    transformative insights into the formation, evolution, climate, and potential habitability of planetary systems. However,
    this opportunity is accompanied by challenges: modeling assumptions and unaccounted-for noise or signal sources can bias
    retrieval outcomes and their interpretation. To address these limitations, we introduce a Gaussian process (GP)-aided
    atmospheric retrieval framework that flexibly accounts for unmodeled features and correlated noise in exoplanet spectra.
    We validate this method on synthetic JWST observations, and show that GP-aided retrievals reduce bias in inferred abundances
    and better capture model─data mismatches than traditional approaches. We also introduce the concept of mean squared error
    to quantify the trade-off between bias and variance, arguing that this metric more accurately reflects retrieval performance
    than bias alone. We then reanalyze the NIRISS/SOSS JWST transmission spectrum of WASP-96 b, finding that GP-aided retrievals
    yield broader constraints on CO<SUB>2</SUB> and H<SUB>2</SUB>O, possibly alleviating tension between previous retrieval
    results and equilibrium predictions. Our GP framework provides precise and accurate constraints while highlighting regions
    where models fail to explain the data. As JWST matures and future facilities come online, a deeper understanding of the
    limitations of both data and models will be essential, and GP-enabled retrievals like the one presented here offer a principled
    path forward.'
