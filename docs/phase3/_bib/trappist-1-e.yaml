  ads_bibcode: 2025arXiv251018098F
  title: The Atmospheric Composition of Sub-Neptune K2-18 b and Implications for its Formation
  authors:
  - Fernández-Rodríguez, Gareb
  - Morello, Giuseppe
  - Tan, Jonathan C.
  - Pallé, Enric
  - Swain, Mark R.
