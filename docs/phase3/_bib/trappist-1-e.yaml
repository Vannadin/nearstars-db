  pubdate: '2006-03-00'
  doi: 10.1126/science.1123013
  abstract: Cassini has identified a geologically active province at the south pole of Saturn's moon Enceladus. In images
    acquired by the Imaging Science Subsystem (ISS), this region is circumscribed by a chain of folded ridges and troughs
    at ~55°S latitude. The terrain southward of this boundary is distinguished by its albedo and color contrasts, elevated
    temperatures, extreme geologic youth, and narrow tectonic rifts that exhibit coarse-grained ice and coincide with the
    hottest temperatures measured in the region. Jets of fine icy particles that supply Saturn's E ring emanate from this
    province, carried aloft by water vapor probably venting from subsurface reservoirs of liquid water. The shape of Enceladus
    suggests a possible intense heating epoch in the past by capture into a 1:4 secondary spin/orbit resonance.
