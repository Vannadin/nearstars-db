- &id366
  arxiv_id: '0808.2770'
  ads_bibcode: 2008MNRAS.391..237J
  title: Tidal heating of terrestrial extrasolar planets and implications for their habitability
  authors:
  - Jackson, Brian
  - Barnes, Rory
  - Greenberg, Richard
  year: '2008'
  pubdate: '2008-11-00'
  doi: 10.1111/j.1365-2966.2008.13868.x
  abstract: The tidal heating of hypothetical rocky (or terrestrial) extrasolar planets spans a wide range of values depending
    on stellar masses and initial orbits. Tidal heating may be sufficiently large (in many cases, in excess of radiogenic
    heating) and long-lived to drive plate tectonics, similar to the Earth's, which may enhance the planet's habitability.
    In other cases, excessive tidal heating may result in Io-like planets with violent volcanism, probably rendering them
    unsuitable for life. On water-rich planets, tidal heating may generate subsurface oceans analogous to Europa's with similar
    prospects for habitability. Tidal heating may enhance the outgassing of volatiles, contributing to the formation and replenishment
    of a planet's atmosphere. To address these issues, we model the tidal heating and evolution of hypothetical extrasolar
    terrestrial planets. The results presented here constrain the orbital and physical properties required for planets to
    be habitable.
  source: citation_of=2024A&A...681A.109B
