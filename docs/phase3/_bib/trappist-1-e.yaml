  doi: 10.1089/153110702753621321
  abstract: Mass-independent fractionation (MIF) of sulfur isotopes has been reported in sediments of Archean and Early Proterozoic
    Age (&gt;2.3 Ga) but not in younger rocks. The only fractionation mechanism that is consistent with the data on all four
    sulfur isotopes involves atmospheric photochemical reactions such as SO<SUB>2</SUB> photolysis. We have used a one-dimensional
    photochemical model to investigate how the isotopic fractionation produced during SO<SUB>2</SUB> photolysis would have
    been transferred to other gaseous and particulate sulfur-bearing species in both low-O<SUB>2</SUB> and high-O<SUB>2</SUB>
    atmospheres. We show that in atmospheres with O<SUB>2</SUB> concentrations &lt;10<SUP>-5</SUP> times the present atmospheric
    level (PAL), sulfur would have been removed from the atmosphere in a variety of different oxidation states, each of which
    would have had its own distinct isotopic signature. By contrast, in atmospheres with O<SUB>2</SUB> concentrations &gt;=10<SUP>-5</SUP>
    PAL, all sulfur-bearing species would have passed through the oceanic sulfate reservoir before being incorporated into
    sediments, so any signature of MIF would have been lost. We conclude that the atmospheric O<SUB>2</SUB> concentration
    must have been &lt;10<SUP>-5</SUP> PAL prior to 2.3 Ga.
