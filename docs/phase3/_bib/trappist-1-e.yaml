- &id032
  arxiv_id: '2509.02120'
  ads_bibcode: 2025A&A...701A.193M
  title: 'Constraints on the possible atmospheres on TRAPPIST-1 b: insights from 3D climate modeling'
  authors:
  - Maurel, Alice
  - Turbet, Martin
  - Ducrot, Elsa
  - Leconte, Jérémy
  - Chaverot, Guillaume
  - Milcareck, Gwenael
  - Revol, Alexandre
  - Charnay, Benjamin
  - Fauchez, Thomas J.
  - Gillon, Michaël
  - Mechineau, Alexandre
  - Bolmont, Emeline
  - Millour, Ehouarn
  - Selsis, Franck
  - Beaulieu, Jean-Philippe
  - Drossart, Pierre
  year: '2025'
  pubdate: '2025-09-00'
  doi: 10.1051/0004-6361/202554243
  abstract: Context. JWST observations of the secondary eclipse of TRAPPIST-1 b at 12.8 and 15 µm revealed a very bright dayside.
    These measurements are consistent with an absence of atmosphere. Previous 1D atmospheric modeling also excludes ─ at first
    sight ─ CO<SUB>2</SUB>-rich atmospheres. However, only a subset of the possible atmosphere types has been explored, and
    ruled out, to date. Recently, a full thermal phase curve of the planet at 15 µm with JWST has also been observed, allowing
    for more information on the thermal structure of the planet. Aims. We first looked for atmospheres capable of producing
    a dayside emission compatible with secondary eclipse observations. We then tried to determine which of these are compatible
    with the observed thermal phase curve. Methods. We used a 1D radiative-convective model and a 3D global climate model
    (GCM) to simulate a wide range of atmospheric compositions and surface pressures. We then produced observables from these
    simulations and compared them to available emission observations. Results. We found several families of atmospheres compatible
    at 2σ with the eclipse observations. Among them, some feature a flat phase curve and can be ruled out with the observation,
    and some produce a phase curve still compatible with the data (i.e., thin N<SUB>2</SUB> ─CO<SUB>2</SUB> atmospheres, and
    CO<SUB>2</SUB> atmospheres rich in hazes). We also highlight different 3D effects that could not be predicted from 1D
    studies (redistribution efficiency, atmospheric collapse). Conclusions. The available observations of TRAPPIST-1 b are
    consistent with an airless planet, which is the most likely scenario. A second possibility is a thin CO<SUB>2</SUB>-poor
    residual atmosphere. However, our study shows that different atmospheric scenarios can result in a high eclipse depth
    at 15 µm. It may therefore be hazardous, in general, to conclude on the presence of an atmosphere from a single photometric
    point.
  source: citation_of=2026AJ....171..105A
