  arxiv_id: '2310.07714'
  ads_bibcode: 2024ApJ...961L..23B
  title: 'Clouds and Clarity: Revisiting Atmospheric Feature Trends in Neptune-size Exoplanets'
  authors:
  - Brande, Jonathan
  - Crossfield, Ian J. M.
  - Kreidberg, Laura
  - Morley, Caroline V.
  - Barman, Travis
  - Benneke, Björn
  - Christiansen, Jessie L.
  - Dragomir, Diana
  - Fortney, Jonathan J.
  - Greene, Thomas P.
  - Hardegree-Ullman, Kevin K.
  - Howard, Andrew W.
  - Knutson, Heather A.
  - Lothringer, Joshua D.
  - Mikal-Evans, Thomas
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/2041-8213/ad1b5c
  abstract: Over the last decade, precise exoplanet transmission spectroscopy has revealed the atmospheres of dozens of exoplanets,
    driven largely by observatories like the Hubble Space Telescope. One major discovery has been the ubiquity of atmospheric
    aerosols, often blocking access to exoplanet chemical inventories. Tentative trends have been identified, showing that
    the clarity of planetary atmospheres may depend on equilibrium temperature. Previous work has often grouped dissimilar
    planets together in order to increase the statistical power of any trends, but it remains unclear from observed transmission
    spectra whether these planets exhibit the same atmospheric physics and chemistry. We present a reanalysis of a smaller,
    more physically similar sample of 15 exo-Neptune transmission spectra across a wide range of temperatures (200-1000 K).
    Using condensation cloud and hydrocarbon haze models, we find that the exo-Neptune population is best described by low
    cloud sedimentation efficiency (f <SUB>sed</SUB> ~ 0.1) and high metallicity (100 × solar). There is an intrinsic scatter
    of ~0.5 scale height, perhaps evidence of stochasticity in these planets' formation processes. Observers should expect
    significant attenuation in transmission spectra of Neptune-size exoplanets, up to 6 scale heights for equilibrium temperatures
    between 500 and 800 K. With JWST's greater wavelength sensitivity, colder (&lt;500 K) planets should be high-priority
    targets given their clearer atmospheres, and the need to distinguish between the "super-puffs" and more typical gas-dominated
    planets.
