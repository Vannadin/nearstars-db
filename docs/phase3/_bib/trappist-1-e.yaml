  doi: 10.1029/2019RG000670
  abstract: Dry deposition of ozone is an important sink of ozone in near-surface air. When dry deposition occurs through
    plant stomata, ozone can injure the plant, altering water and carbon cycling and reducing crop yields. Quantifying both
    stomatal and nonstomatal uptake accurately is relevant for understanding ozone's impact on human health as an air pollutant
    and on climate as a potent short-lived greenhouse gas and primary control on the removal of several reactive greenhouse
    gases and air pollutants. Robust ozone dry deposition estimates require knowledge of the relative importance of individual
    deposition pathways, but spatiotemporal variability in nonstomatal deposition is poorly understood. Here we integrate
    understanding of ozone deposition processes by synthesizing research from fields such as atmospheric chemistry, ecology,
    and meteorology. We critically review methods for measurements and modeling, highlighting the empiricism that underpins
    modeling and thus the interpretation of observations. Our unprecedented synthesis of knowledge on deposition pathways,
    particularly soil and leaf cuticles, reveals process understanding not yet included in widely used models. If coordinated
    with short-term field intensives, laboratory studies, and mechanistic modeling, measurements from a few long-term sites
    would bridge the molecular to ecosystem scales necessary to establish the relative importance of individual deposition
    pathways and the extent to which they vary in space and time. Our recommended approaches seek to close knowledge gaps
    that currently limit quantifying the impact of ozone dry deposition on air quality, ecosystems, and climate.
