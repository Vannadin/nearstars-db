  arxiv_id: null
  ads_bibcode: 2026AAS...24725003G
  title: 'Exo-Earths from the Inside Out: Characterizing Earth-like Exoplanets with Future Space Telescopes'
  authors:
  - Gilbert-Janizek, Samantha
  - Barnes, Rory
  - Lustig-Yaeger, Jacob
  - Driscoll, Peter
  - Mandell, Avi
  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: Future space telescopes will seek extraterrestrial life on Earth-like planets via transmission and direct imaging
    spectroscopy. NASA has prioritized the Habitable Worlds Observatory (HWO), a flagship UV/optical/infrared telescope to
    study Earth-like planets around Sun-like stars, and recommended the development of a mid-infrared telescope for studying
    planets around M-dwarfs. To assess habitability and biosignatures, we require (1) coupled interior-atmosphere models to
    predict long-term habitability, and (2) robust retrieval tools to analyze spectra and infer atmospheric properties with
    uncertainties. <P />In the first part of this thesis work, we develop a novel "whole-planet'" model to simulate the abiotic
    Earth through time by enhancing a coupled stellar-core-mantle-lithosphere thermal evolution model to include the carbonate-silicate
    cycle, the deep water cycle, a global surface water cycle, and climate with radiative transfer calculations. We validate
    our model on pre-industrial Earth measurements, then extend it to Earth-like exoplanets around FGK stars identified as
    high-priority HWO targets. We find that planets receiving Earth-like instellation around K-dwarfs are more likely to remain
    habitable for up to 2 Gyr longer than G and F stars, complementing previous work that has identified multiple observational
    advantages of K-dwarf planets. By contrast, we predict that planets at Earth-like instellation around F-stars tend to
    enter the runaway greenhouse phase ~1 Gyr faster than the true Earth. <P />Finally, we use a retrieval tool to assess
    accuracy in characterizing for habitability and biosignatures via simulated transmission and direct imaging spectra based
    on the Origins Space Telescope (Origins) and LUVOIR mission concepts, respectively. For transmission, we assess discriminating
    false-positive O<SUB>3</SUB> on TRAPPIST-1 e; for reflected light, we assess retrieval robustness to un-modeled cloud
    extinction. We find Origins-like observations may detect CO<SUB>2</SUB>/CH<SUB>4</SUB> pairs on M-dwarf planets and differentiate
    biological from false-positive O<SUB>3</SUB> using abundant H<SUB>2</SUB>O and CO. Direct-imaging with HWO is better suited
    to constraining O<SUB>2</SUB> and O<SUB>3</SUB> and may be sensitive to wavelength-dependent cloud features, but struggles
    to detect modern-Earth-like CH<SUB>4</SUB> abundances. We weakly detect stratospheric ozone structure via the wings in
    the near-UV Hartley band. <P />This thesis work contributes to HWO mission development by quantifying the range of habitable
    worlds around HWO target stars, as well as the detection limits of key habitability indicators and biosignatures for modern
    Earth-like exoplanets.
