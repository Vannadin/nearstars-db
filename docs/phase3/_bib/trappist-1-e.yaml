- &id350
  arxiv_id: '1509.07863'
  ads_bibcode: 2015ApJ...812..137H
  title: 'Abiotic O<SUB>2</SUB> Levels on Planets around F, G, K, and M Stars: Possible False Positives for Life?'
  authors:
  - Harman, C. E.
  - Schwieterman, E. W.
  - Schottelkotte, J. C.
  - Kasting, J. F.
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1088/0004-637X/812/2/137
  abstract: In the search for life on Earth-like planets around other stars, the first (and likely only) information will
    come from the spectroscopic characterization of the planet's atmosphere. Of the countless number of chemical species terrestrial
    life produces, only a few have the distinct spectral features and the necessary atmospheric abundance to be detectable.
    The easiest of these species to observe in Earth's atmosphere is O<SUB>2</SUB> (and its photochemical byproduct, O<SUB>3</SUB>).
    However, O<SUB>2</SUB> can also be produced abiotically by photolysis of CO<SUB>2</SUB>, followed by recombination of
    O atoms with each other. CO is produced in stoichiometric proportions. Whether O<SUB>2</SUB> and CO can accumulate to
    appreciable concentrations depends on the ratio of far-ultraviolet (FUV) to near-ultraviolet (NUV) radiation coming from
    the planet's parent star and on what happens to these gases when they dissolve in a planet's oceans. Using a one-dimensional
    photochemical model, we demonstrate that O<SUB>2</SUB> derived from CO<SUB>2</SUB> photolysis should not accumulate to
    measurable concentrations on planets around F- and G-type stars. K-star, and especially M-star planets, however, may build
    up O<SUB>2</SUB> because of the low NUV flux from their parent stars, in agreement with some previous studies. On such
    planets, a “false positive” for life is possible if recombination of dissolved CO and O<SUB>2</SUB> in the oceans is slow
    and if other O<SUB>2</SUB> sinks (e.g., reduced volcanic gases or dissolved ferrous iron) are small. O<SUB>3</SUB>, on
    the other hand, could be detectable at UV wavelengths (λ &lt; 300 nm) for a much broader range of boundary conditions
    and stellar types.
