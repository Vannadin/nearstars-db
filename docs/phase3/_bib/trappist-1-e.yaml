  ads_bibcode: 2022MNRAS.513.2761M
  title: Climate uncertainties caused by unknown land distribution on habitable M-Earths
  authors:
  - Macdonald, Evelyn
  - Paradise, Adiv
  - Menou, Kristen
  - Lee, Christopher
  year: '2022'
  pubdate: '2022-06-00'
  doi: 10.1093/mnras/stac1040
  abstract: A planet's surface conditions can significantly impact its climate and habitability. In this study, we use the
    3D general circulation model EXOPLASIM to systematically vary dayside land cover on a synchronously rotating, temperate
    rocky planet under two extreme and opposite continent configurations, in which either all of the land or all of the ocean
    is centred at the substellar point. We identify water vapour and sea ice as competing drivers of climate, and we isolate
    land-dependent regimes under which one or the other dominates. We find that the amount and configuration of land can change
    the planet's globally averaged surface temperature by up to ~20 K, and its atmospheric water vapour content by several
    orders of magnitude. The most discrepant models have partial dayside land cover with opposite continent configurations.
    Since transit spectroscopy may permit observations of M-dwarf planets' atmospheres, but their surfaces will be difficult
    to observe, these land-related climate differences likely represent a limiting uncertainty in a given planet's climate,
    even if its atmospheric composition is known. Our results are robust to variations in atmospheric CO<SUB>2</SUB> concentration,
    stellar temperature, and instellation.
