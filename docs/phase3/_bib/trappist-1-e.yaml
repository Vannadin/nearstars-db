- &id172
  arxiv_id: '2012.07996'
  ads_bibcode: 2021ApJ...921...25C
  title: Effects of Spin-Orbit Resonances and Tidal Heating on the Inner Edge of the Habitable Zone
  authors:
  - Colose, Christopher M.
  - Haqq-Misra, Jacob
  - Wolf, Eric T.
  - Del Genio, Anthony D.
  - Barnes, Rory
  - Way, Michael J.
  - Ruedy, Reto
  year: '2021'
  pubdate: '2021-11-00'
  doi: 10.3847/1538-4357/ac135c
  abstract: Much attention has been given to the climate dynamics and habitable boundaries of synchronously rotating planets
    around low mass stars. However, other rotational states are possible, including spin-orbit resonant configurations, particularly
    when higher eccentricity orbits can be maintained in a system. Additionally, the oscillating strain as a planet moves
    from periastron to apoastron results in friction and tidal heating, which can be an important energy source. Here, we
    simulate the climate of ocean-covered planets near the inner edge of the habitable zone around M to solar stars with the
    NASA GISS ROCKE-3D general circulation model, and leverage the planetary evolution software package, VPLanet, to calculate
    tidal heating rates for Earth-sized planets orbiting 2600 and 3000 K stars. This study is the first to use a 3D general
    circulation model that implements tidal heating to investigate habitability for multiple resonant states. We find that
    for reference experiments without tidal heating, the resonant state has little impact on the radial position of the inner
    edge because for a given stellar flux, higher-order states tend to be warmer than synchronous rotators, but for a given
    temperature, have drier upper atmospheres. However, when strong tidal heating is present, the rotational component implies
    a strong dependence of habitable conditions on the system evolution and rotational state. Since tidal and stellar heating
    both decrease rapidly with orbital distance, this results in a compact orbital width separating temperate and uninhabitable
    climates. We summarize these results and also compare ROCKE-3D to previously published simulations of the inner edge.
  source: citation_of=2023ApJ...946L..32C
