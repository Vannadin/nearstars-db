- &id671
  arxiv_id: '1511.09443'
  ads_bibcode: 2016ApJ...820...78L
  title: The Influence of Nonuniform Cloud Cover on Transit Transmission Spectra
  authors:
  - Line, Michael R.
  - Parmentier, Vivien
  year: '2016'
  pubdate: '2016-03-00'
  doi: 10.3847/0004-637X/820/1/78
  abstract: We model the impact of nonuniform cloud cover on transit transmission spectra. Patchy clouds exist in nearly every
    solar system atmosphere, brown dwarfs, and transiting exoplanets. Our major findings suggest that fractional cloud coverage
    can exactly mimic high mean molecular weight atmospheres and vice versa over certain wavelength regions, in particular,
    over the Hubble Space Telescope (HST) Wide Field Camera 3 (WFC3) bandpass (1.1-1.7 μm). We also find that patchy cloud
    coverage exhibits a signature that is different from uniform global clouds. Furthermore, we explain analytically why the
    “patchy cloud-high mean molecular weight” degeneracy exists. We also explore the degeneracy of nonuniform cloud coverage
    in atmospheric retrievals on both synthetic and real planets. We find from retrievals on a synthetic solar composition
    hot Jupiter with patchy clouds and a cloud-free high mean molecular weight warm Neptune that both cloud-free high mean
    molecular weight atmospheres and partially cloudy atmospheres can explain the data equally well. Another key finding is
    that the HST WFC3 transit transmission spectra of two well-observed objects, the hot Jupiter HD 189733b and the warm Neptune
    HAT-P-11b, can be explained well by solar composition atmospheres with patchy clouds without the need to invoke high mean
    molecular weight or global clouds. The degeneracy between high molecular weight and solar composition partially cloudy
    atmospheres can be broken by observing the molecular Rayleigh scattering differences between the two. Furthermore, the
    signature of partially cloudy limbs also appears as a ∼100 ppm residual in the ingress and egress of the transit light
    curves, provided that the transit timing is known to seconds.
  source: citation_of=2025A&C....5300982F
