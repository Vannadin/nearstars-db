  year: '2001'
  pubdate: '2001-08-00'
  doi: 10.1126/science.1061976
  abstract: The low O<SUB>2</SUB> content of the Archean atmosphere implies that methane should have been present at levels
    ~10<SUP>2</SUP> to 10<SUP>3</SUP> parts per million volume (ppmv) (compared with 1.7 ppmv today) given a plausible biogenic
    source. CH<SUB>4</SUB> is favored as the greenhouse gas that countered the lower luminosity of the early Sun. But abundant
    CH<SUB>4</SUB> implies that hydrogen escapes to space (↑space) orders of magnitude faster than today. Such reductant loss
    oxidizes the Earth. Photosynthesis splits water into O<SUB>2</SUB> and H, and methanogenesis transfers the H into CH<SUB>4</SUB>.
    Hydrogen escape after CH<SUB>4</SUB> photolysis, therefore, causes a net gain of oxygen [CO<SUB>2</SUB> + 2H<SUB>2</SUB>O
    --&gt; CH<SUB>4</SUB> + 2O<SUB>2</SUB> --&gt; CO<SUB>2</SUB> + O<SUB>2</SUB> + 4H(↑space)]. Expected irreversible oxidation
    (~10<SUP>12</SUP> to 10<SUP>13</SUP> moles oxygen per year) may help explain how Earth's surface environment became irreversibly
    oxidized.
