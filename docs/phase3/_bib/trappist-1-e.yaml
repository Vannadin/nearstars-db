  arxiv_id: null
  ads_bibcode: 2024MNRAS.530.4300B
  title: 'Potential climates and habitability on Gl 514 b: a super-Earth exoplanet with high eccentricity'
  authors:
  - Biasiotti, L.
  - Simonetti, P.
  - Vladilo, G.
  - Ivanovski, S.
  - Damasso, M.
  - Sozzetti, A.
  - Monai, S.
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1093/mnras/stae1124
  abstract: The recently discovered super-Earth Gl 514 b, orbiting a nearby M0.5-1.0 star at 7.6 pc, is one of the best benchmark
    exoplanets for understanding the potential climate states of eccentric planets. The elongated (e = 0.45$^{+0.15}_{-0.14}$)
    orbit of Gl 514 b, which only partially lies in the Conservative Habitable Zone, suggests a dynamically young system,
    where the spin-orbit tidal synchronization may not have yet occurred up to the present time. In the present work, we use
    a seasonal-latitudinal energy balance model, EOS-ESTM, to explore the potential impact of both constrained and unconstrained
    planetary, orbital, and atmospheric parameters on the Gl 514 b habitability, mapped in terms of surface temperature. We
    test three distinct CO<SUB>2</SUB>-dominated atmospheres by varying the CH<SUB>4</SUB> concentration values (0 per cent,
    0.1 per cent, and 1 per cent) and the total surface pressure. As a general trend, we find that habitable conditions are
    favoured by high-CH<SUB>4</SUB> and high-pressure regimes. Habitability also increases for high-axis obliquities (at least
    until the appearance of an icebelt), long-rotation periods, and high-ocean fractional coverage. If the ocean fraction
    is low, then also the argument of periastron becomes relevant. Our results are robust against changes of the continental
    distribution. Thus, we conclude that Gl 514 b can potentially maintain temperate surface conditions with modest seasonal
    temperature variations under a wide variety of planetary, orbital, and atmospheric conditions. Despite no transit have
    been detected yet, the results found in this work should motivate the community to invest time in future observations.
