  arxiv_id: null
  ads_bibcode: 2024AGUFMP11E.3011L
  title: Coupled Atmospheric Chemistry, Radiation, and Dynamics of an Exoplanet Generate Self-sustained Oscillations
  authors:
  - Luo, Yangcheng
  - Hu, Yongyun
  - Yang, Jun
  - Zhang, Michael
  - Yung, Yuk L.
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: 'Nonlinearity in photochemical systems is known to allow self-sustained oscillations, yet this phenomenon has
    been underexplored in the context of exoplanetary atmospheres. In this study, from numerical simulations using a fully
    coupled, three-dimensional atmospheric chemistry-radiation-dynamics model, we present a novel self-oscillatory solution
    for the ozone chemistry on the exoplanet TRAPPIST-1 e. Under conditions of constant stellar insolation and a steady emission
    flux of nitric oxide (NO), our simulations show that the ozone abundance oscillates by a factor of 30 over multi-decadal
    timescales. This oscillation can lead to significant variability in the ozone absorption feature within the exoplanet''s
    transmission spectrum, which may be detectable with observational techniques in the near future. <P />A detailed analysis
    reveals that these self-sustained oscillations arise from a complex interplay of multiple processes: UV shielding by ozone,
    NO<SUB>x</SUB> accumulation due to its emission, ozone destruction by NO<SUB>x</SUB>, water vapor photolysis, and the
    subsequent oxidation of NO<SUB>x</SUB> to nitric acid (HNO<SUB>3</SUB>), which is then removed from the atmosphere via
    rainout. Our findings indicate that a moderate flux of NO<SUB>x</SUB> emission is necessary to drive these oscillations,
    suggesting that abiotic nitrogen-fixation processes such as lightning alone are insufficient. Therefore, we propose that
    these oscillations may represent a novel class of biosignature, indicative of biological nitrogen fixation contributing
    to NO<SUB>x</SUB> emission. <P />Our results highlight the importance of revisiting exoplanet spectra over extended periods
    to better understand atmospheric chemistry and identify potential biosignatures. This study also has significant implications
    for comparative planetology and the atmospheric evolution of terrestrial planets both within our solar system and beyond.
    The use of fully coupled, three-dimensional atmospheric chemistry-radiation-dynamics models may uncover phenomena that
    may not be produced in one-dimensional models, emphasizing their value in future research on exoplanetary atmospheres.'
