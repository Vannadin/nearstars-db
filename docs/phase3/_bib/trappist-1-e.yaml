  - Nakamura, Toshio
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1038/ncomms2783
  abstract: Previously, we have observed that the atmospheric <SUP>14</SUP>C content measured in tree rings showed a strong
    increase from AD 774 to 775. Although the cause of this event can be explained by a large solar proton event or a short
    gamma-ray burst, a more detailed discussion of the cause is difficult because the rate of occurrence of such rapid <SUP>14</SUP>C
    events remains unknown. Here we report new <SUP>14</SUP>C measurements from AD 822 to 1020, and the discovery of a second
    rapid increase of <SUP>14</SUP>C content from AD 992 to 993. The <SUP>10</SUP>Be flux in the Antarctic ice core shows
    peaks corresponding to these two <SUP>14</SUP>C events. The proportions of flux increase (<SUP>14</SUP>C/<SUP>10</SUP>Be)
    of the two events are consistent with each other. Therefore, it is highly possible that these events have the same origin.
    Considering the occurrence rate of <SUP>14</SUP>C increase events, solar activity is a plausible cause of the <SUP>14</SUP>C
    increase events.
