- &id176
  arxiv_id: '2101.04507'
  ads_bibcode: 2021NatAs...5..298C
  title: Persistence of flare-driven atmospheric chemistry on rocky habitable zone worlds
  authors:
  - Chen, Howard
  - Zhan, Zhuchang
  - Youngblood, Allison
  - Wolf, Eric T.
  - Feinstein, Adina D.
  - Horton, Daniel E.
  year: '2021'
  pubdate: '2021-01-00'
  doi: 10.1038/s41550-020-01264-1
  abstract: Low-mass stars show evidence of vigorous magnetic activity in the form of large flares and coronal mass ejections.
    Such space weather events may have important ramifications for the habitability and observational fingerprints of exoplanetary
    atmospheres. Here, using a suite of three-dimensional coupled chemistry-climate model simulations, we explore effects
    of time-dependent stellar activity on rocky planet atmospheres orbiting G, K and M dwarf stars. We employ observed data
    from the MUSCLES campaign and the Transiting Exoplanet Survey Satellite and test a range of rotation period, magnetic
    field strength and flare frequency assumptions. We find that recurring flares drive the atmospheres of planets around
    K and M dwarfs into chemical equilibria that substantially deviate from their pre-flare regimes, whereas the atmospheres
    of G dwarf planets quickly return to their baseline states. Interestingly, simulated O<SUB>2</SUB>-poor and O<SUB>2</SUB>-rich
    atmospheres experiencing flares produce similar mesospheric nitric oxide abundances, suggesting that stellar flares can
    highlight otherwise undetectable chemical species. Applying a radiative transfer model to our chemistry-climate model
    results, we find that flare-driven transmission features of bio-indicating chemical species, such as nitrogen dioxide,
    nitrous oxide and nitric acid, show particular promise for detection by future instruments.
