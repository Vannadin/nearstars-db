- arxiv_id: null
  ads_bibcode: 2020SSRv..216...31S
  title: 'Mission to Planet Earth: The First Two Billion Years'
  authors:
  - Stüeken, E. E.
  - Som, S. M.
  - Claire, M.
  - Rugheimer, S.
  - Scherf, M.
  - Sproß, L.
