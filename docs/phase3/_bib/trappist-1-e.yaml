  title: 'MARSBOx: Fungal and Bacterial Endurance From a Balloon-Flown Analog Mission in the Stratosphere'
  authors:
  - Cortesão, Marta
  - Siems, Katharina
  - Koch, Stella
  - Beblo-Vranesevic, Kristina
  - Rabbow, Elke
  - Berger, Thomas
  - Lane, Michael
  - James, Leandro
  - Johnson, Prital
  - Waters, Samantha M.
