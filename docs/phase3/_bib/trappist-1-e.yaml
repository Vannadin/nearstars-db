- &id345
  arxiv_id: '1602.00658'
  ads_bibcode: 2016ApJ...824..103F
  title: Solubility of Rock in Steam Atmospheres of Planets
  authors:
  - Fegley, Bruce, Jr.
  - Jacobson, Nathan S.
  - Williams, K. B.
  - Plane, J. M. C.
  - Schaefer, L.
  - Lodders, Katharina
  year: '2016'
  pubdate: '2016-06-00'
  doi: 10.3847/0004-637X/824/2/103
  abstract: Extensive experimental studies show that all major rock-forming elements (e.g., Si, Mg, Fe, Ca, Al, Na, K) dissolve
    in steam to a greater or lesser extent. We use these results to compute chemical equilibrium abundances of rocky-element-bearing
    gases in steam atmospheres equilibrated with silicate magma oceans. Rocky elements partition into steam atmospheres as
    volatile hydroxide gases (e.g., Si(OH)<SUB>4</SUB>, Mg(OH)<SUB>2</SUB>, Fe(OH)<SUB>2</SUB>, Ni(OH)<SUB>2</SUB>, Al(OH)<SUB>3</SUB>,
    Ca(OH)<SUB>2</SUB>, NaOH, KOH) and via reaction with HF and HCl as volatile halide gases (e.g., NaCl, KCl, CaFOH, CaClOH,
    FAl(OH)<SUB>2</SUB>) in much larger amounts than expected from their vapor pressures over volatile-free solid or molten
    rock at high temperatures expected for steam atmospheres on the early Earth and hot rocky exoplanets. We quantitatively
    compute the extent of fractional vaporization by defining gas/magma distribution coefficients and show that Earth's subsolar
    Si/Mg ratio may be due to loss of a primordial steam atmosphere. We conclude that hot rocky exoplanets that are undergoing
    or have undergone escape of steam-bearing atmospheres may experience fractional vaporization and loss of Si, Mg, Fe, Ni,
    Al, Ca, Na, and K. This loss can modify their bulk composition, density, heat balance, and interior structure.
