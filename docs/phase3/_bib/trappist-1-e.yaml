  arxiv_id: '2102.05305'
  ads_bibcode: 2021ApJ...910..158M
  title: Cloud Parameterizations and their Effect on Retrievals of Exoplanet Reflection Spectroscopy
  authors:
  - Mukherjee, Sagnick
  - Batalha, Natasha E.
  - Marley, Mark S.
  year: '2021'
  pubdate: '2021-04-00'
  doi: 10.3847/1538-4357/abe53b
  abstract: Future space-based direct imaging missions will perform low-resolution (R &lt; 100) optical (0.3-1 μm) spectroscopy
    of planets, thus enabling reflected spectroscopy of cool giants. Reflected light spectroscopy is encoded with rich information
    about the scattering and absorbing properties of planet atmospheres. Given the diversity of clouds and hazes expected
    in exoplanets, it is imperative that we solidify the methodology to accurately and precisely retrieve these scattering
    and absorbing properties that are agnostic to cloud species. In particular, we focus on determining how different cloud
    parameterizations affect resultant inferences of both cloud and atmospheric composition. We simulate mock observations
    of the reflected spectra from three top-priority direct imaging cool giant targets with different effective temperatures,
    ranging from 135 to 533 K. We perform retrievals of cloud structure and molecular abundances on these three planets using
    four different parameterizations, each with an increasing level of cloud complexity. We find that the retrieved atmospheric
    and scattering properties depend strongly on the choice of cloud parameterization. For example, parameterizations that
    are too simplistic tend to overestimate the abundances. Overall, we are unable to retrieve precise/accurate gravity beyond
    ±50%. Lastly, we find that even reflected light spectroscopy with a low signal-to-noise ratio of 5 and low R = 40 gives
    cursory zeroth-order insights into the position of the cloud deck relative to the molecular and Rayleigh optical depth
    level.
