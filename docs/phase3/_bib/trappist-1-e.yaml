- &id370
  arxiv_id: '0709.1192'
  ads_bibcode: 2007A&A...474L..21A
  title: K-H<SUB>2</SUB> quasi-molecular absorption detected in the T-dwarf \varepsilon Indi Ba
  authors:
  - Allard, F.
  - Allard, N. F.
  - Homeier, D.
  - Kielkopf, J.
  - McCaughrean, M. J.
  - Spiegelman, F.
  year: '2007'
  pubdate: '2007-11-00'
  doi: 10.1051/0004-6361:20078362
  abstract: 'Context: T-type dwarfs present a broad and shallow absorption feature centred around 6950 Å in the blue wing
    of the K doublet at 0.77 μm which resembles in depth and shape the satellite absorption predicted by detailed collisional
    broadening profiles. In our previous work, the position of the predicted line satellite was however somewhat too blue
    compared to the observed feature. <BR />Aims: In this paper, we investigate whether new calculations of the energy surfaces
    of the potentials in the K-H2 system, including spin-orbit coupling, result in a closer coincidence of the satellite with
    the observed position. We also investigate the extent to which CaH absorption bands contribute to the feature and at what
    T_eff these respective opacity sources predominate. <BR />Methods: We present model atmospheres and synthetic spectra,
    including gravitational settling for an improved description of depth-dependent abundances of refractory elements, and
    based on new K-H2 line profiles using improved interaction potentials. <BR />Results: By comparison with a high signal-to-noise
    optical spectrum of the T1 dwarf \varepsilon Indi Ba, we find that these new models do reproduce the observed feature,
    while CaH does not contribute for the atmospheric parameters considered. We also find that CaH is settled out so deep
    into the atmosphere that even turbulent vertical mixing would appear insufficient to bring significant amounts of CaH
    to the observable photosphere in dwarfs of later type than L5. <BR />Conclusions: We conclude that previous identification
    of the feature at this location in the spectra of T dwarfs as well as the latest L dwarfs with CaH was erroneous, as expected
    on physical grounds: calcium has already condensed onto grains in early L dwarfs and thus should have settled out of the
    photosphere in cooler brown dwarfs. This finding revokes one of the observational verifications for the cloud-clearing
    theory assumption: a gradual clearing of the cloud cover in early T dwarfs.'
