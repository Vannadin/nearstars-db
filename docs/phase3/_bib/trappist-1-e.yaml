  title: Hints of a Sulfur-rich Atmosphere around the 1.6 R <SUB>⊕</SUB> Super-Earth L98-59 d from JWST NIRspec G395H Transmission
    Spectroscopy
  authors:
  - Gressier, Amélie
  - Espinoza, Néstor
  - Allen, Natalie H.
  - Sing, David K.
  - Banerjee, Agnibha
  - Barstow, Joanna K.
