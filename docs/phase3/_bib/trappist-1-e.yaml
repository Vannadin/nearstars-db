- arxiv_id: null
  ads_bibcode: 2023E&PSL.60718071G
  title: Climate shapes the oxygenation of Earth's atmosphere across the Great Oxidation Event
  authors:
  - Garduno Ruiz, Daniel
  - Goldblatt, Colin
  - Ahm, Anne-Sofie
  year: '2023'
  pubdate: '2023-04-00'
  doi: 10.1016/j.epsl.2023.118071
  abstract: We use a one-dimensional atmospheric photochemical model to investigate the effect of temperature and humidity
    variations on the evolution of O<SUB>2</SUB> and O<SUB>3</SUB> across the Great Oxidation Event (GOE), and find that changes
    to the atmospheric temperature profile can change O<SUB>2</SUB> and O<SUB>3</SUB> levels by up to three orders of magnitude.
    Cold temperatures (&lt;280 K) result in stable low O<SUB>2</SUB> levels (mixing ratio of 10<SUP>-4</SUP>), whereas temperate
    (280 K - 310 K) and hot (&gt;310 K) temperatures result in stable high O<SUB>2</SUB> levels (mixing ratio of 10<SUP>-2</SUP>)
    after the GOE. Warm and wet climates lead to an increased atmospheric oxidation power through the increased production
    of hydrogen oxide (HO<SUB>x</SUB>) radicals, catalyzing the oxidation and depletion of the principal reduced species (CH<SUB>4</SUB>,
    CO and H<SUB>2</SUB>). Consequently, warmer temperatures lead to less O<SUB>2</SUB> lost through the oxidation of reduced
    species, resulting in higher O<SUB>2</SUB> and O<SUB>3</SUB> levels relative to colder temperatures. <P />The GOE occurred
    around the same period as the onset of the Snowball Earth Huronian glaciations. Cold climates during the glaciations were
    eventually terminated by the build-up of volcanic greenhouse gases in the atmosphere, leading to Hot-Moist Greenhouse
    climates. Temperature and humidity likely varied extensively from Snowball Earth climates during the glaciations to Hot-Moist
    Greenhouse climates. However, current photochemical models of the GOE do not consider the effect of this climate variability
    on the evolution of O<SUB>2</SUB> and O<SUB>3</SUB> across the GOE. Our results show that temperature and humidity exert
    a strong control on atmospheric chemistry through O<SUB>2</SUB>, O<SUB>3</SUB>, and HO<SUB>x</SUB> feedbacks, which has
    important implications for our understanding of the climate-redox evolution of the GOE.
