  doi: 10.5194/epsc2020-692
  abstract: 'The TRAPPIST-1 system is one of the most prominent targets for characterizing the atmospheres of terrestrial
    planets in the near future. We model potential atmospheres of planet e, which lies well in the habitable zone of the star
    and could hold liquid water. However, during the extended pre-main sequence phase of TRAPPIST-1, the planets may have
    experienced extreme water loss, leading to a desiccated mantle. We simulate dry and wet atmospheres of TRAPPIST-1 e using
    a newly developed photochemical model for planetary atmospheres, coupled to a radiative-convective model then calculate
    theoretical spectra to determine how distinguishable these scenarios could be. The resulting atmospheric composition is
    used to compute cloud-free transmission spectra. From this we calculate the detectability of molecular features using
    the Extremely Large Telescope (ELT) and the James Webb Space Telescope (JWST). 1. IntroductionThe nearby terrestrial planet
    TRAPPIST-1 e, orbiting the cool host star TRAPPIST-1, offers the opportunity for studying its atmosphere with next generation
    telescopes. The stellar luminosity evolution of such cools stars is quite different to that of e.g. the Sun. In particular
    the active pre-main sequence phase of the star can be extended and the stellar Ultra Violet (UV) radiation is high for
    about a billion years [1]. This could lead to a runaway greenhouse state on an ocean-bearing terrestrial planet and a
    loss of substantial amounts of planetary water vapour before the star enters the main sequence phase [2]. This study aims
    to determine whether it is feasible to distinguish between wet and dry surface conditions of TRAPPIST-1 e from atmospheric
    observations using low resolution spectroscopy with the JWST and high resolution cross-correlation spectroscopy with the
    ELT. 2. MethodsWe use the 1D climate-photochemistry model 1D-TERRA [3, 4] in order to simulate the climate and photochemical
    response from wet and dry surface conditions. The TRAPPIST-1 input spectrum is taken from [5].For wet conditions we assume
    a relative humidity of 80% and calculate dry as well as wet deposition for all species considered in the model. We consider
    in total three scenarios. The first two scenarios assume a liquid ocean at the surface. Scenario 1 is a dead case with
    only volcanic fluxes. Scenario 2 is an alive case with volcanic and Earth-like biogenic fluxes. Scenarios 3 is without
    a surface ocean using a relative humidity of 1%, no wet deposition and weaker dry deposition for CO and O2 compared to
    the wet scenarios 1 and 2. For all scenarios we then simulate N2 atmospheres with different amounts of CO2 ranging from
    0.001 bar to 1 bar.The simulated atmospheric composition and temperature profiles are used to predict potential transmission
    spectra of TRAPPIST-1~e. These spectra are then used to estimate the number of transits required to detect molecular features
    with JWST NIRSpec and ELT HIRES. 3. ResultsFor dry CO2-rich atmospheres a significant amount of O2 and O3 is produced
    abiotically [6, 7], due to thelow FUV/NUV ratio of TRAPPIST-1 [8]. However, the abundances of abiotic O2 and O3 are one
    order of magnitude lower than in thoseruns with biogenic emissions. A detection of O2 or O3 will be challenging with JWST
    NIRSpec or ELT HIRES (see Fig. 1).Figure 1: Number of transits required to reach a S/N of 5 for CO2 at 4.3 µm, O3 at 9.6
    µm, CO at 2.35 µm and H2O at 1.4 µm with JWST NIRSpec (upper and middle panel) and CH4 from 2.1 to 2.5 µm and O2 from
    1.24 to 1.3 µm with ELT HIRES (lower panel) in the atmosphere of TRAPPIST-1 e. Full filled bars: required number of transits
    is below or equal 30. Semi transparent bars: required number of transits is larger than 30. Figure from [4]. CO can be
    an indirect marker of an ocean, having concentrations enhanced by ~100 times on an ocean-less world with a CO2-rich atmosphere
    (see also [9, 10, 11]).The detection of CO in the K-band might be feasible with JWST NIRSpec and ELT HIRES for dry surface
    conditions and CO2 partial pressure above 0.01 bar by co-adding several tens of transits. Significant amounts of CH4 are
    only present in the simulated atmospheres with Earth-like biogenic flux. It has been shown that for planets around cool
    host stars, weaker destruction of CH4 leads to stronger spectral features of CH4 compared to the Earth around the Sun
    [12]. About 30 transit observation in the K-band are needed to detect CH4 with ELT HIRES for the wet &amp; alive case.
    In conclusion, the three scenarios considered for TRAPPIST-1 e might be distinguishable by combining ~30 transit observations
    with JWST NIRSpec and ELT HIRES in the K-band. The alive scenario, assuming Earth-like biogenic emissions, could be identified
    by the detection of CH4. The non-detection of CO would suggest the existence of a surface ocean. In turn, the detection
    of CO would suggest dry surface conditions (see more details in [4]). References[1] Baraffe, I., Homeier, D., Allard,
