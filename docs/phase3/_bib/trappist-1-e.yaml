  arxiv_id: '1901.00443'
  ads_bibcode: 2020AJ....159...60G
  title: 'Stellar Flares from the First TESS Data Release: Exploring a New Sample of M Dwarfs'
  authors:
  - Günther, Maximilian N.
  - Zhan, Zhuchang
  - Seager, Sara
  - Rimmer, Paul B.
  - Ranjan, Sukrit
  - Stassun, Keivan G.
  - Oelkers, Ryan J.
  - Daylan, Tansu
  - Newton, Elisabeth
  - Kristiansen, Martti H.
  - Olah, Katalin
  - Gillen, Edward
  - Rappaport, Saul
  - Ricker, George R.
  - Vanderspek, Roland K.
