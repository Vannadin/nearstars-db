- &id427
  arxiv_id: '2004.06725'
  ads_bibcode: 2020ApJ...893L..27V
  title: A Habitable-zone Earth-sized Planet Rescued from False Positive Status
  authors:
  - Vanderburg, Andrew
  - Rowden, Pamela
  - Bryson, Steve
  - Coughlin, Jeffrey
  - Batalha, Natalie
  - Collins, Karen A.
  - Latham, David W.
  - Mullally, Susan E.
  - Colón, Knicole D.
  - Henze, Chris
  - Huang, Chelsea X.
  - Quinn, Samuel N.
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/2041-8213/ab84e5
  abstract: We report the discovery of an Earth-sized planet in the habitable zone of a low-mass star called Kepler-1649.
    The planet, Kepler-1649 c, is 1.06 ${}_{-0.10}^{+0.15}$ times the size of Earth and transits its 0.1977 ± 0.0051 ${M}_{\odot
    }$ "mid" M-dwarf host star every 19.5 days. It receives 74% ± 3% the incident flux of Earth, giving it an equilibrium
    temperature of 234 ± 20 K and placing it firmly inside the circumstellar habitable zone. Kepler-1649 also hosts a previously
    known inner planet that orbits every 8.7 days and is roughly equivalent to Venus in size and incident flux. Kepler-1649
    c was originally classified as a false positive (FP) by the Kepler pipeline, but was rescued as part of a systematic visual
    inspection of all automatically dispositioned Kepler FPs. This discovery highlights the value of human inspection of planet
    candidates even as automated techniques improve, and hints that terrestrial planets around mid to late M-dwarfs may be
    more common than those around more massive stars.
