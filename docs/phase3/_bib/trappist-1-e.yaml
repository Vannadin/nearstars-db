  title: 'Mass loss of “Hot Jupiters”—Implications for CoRoT discoveries. Part I: The importance of magnetospheric protection
    of a planet against ion loss caused by coronal mass ejections'
  authors:
  - Khodachenko, M. L.
  - Lammer, H.
  - Lichtenegger, H. I. M.
  - Langmayr, D.
  - Erkaev, N. V.
