- &id188
  arxiv_id: '1908.02769'
  ads_bibcode: 2019ApJ...887..231L
  title: Sulfate Aerosol Hazes and SO<SUB>2</SUB> Gas as Constraints on Rocky Exoplanets’ Surface Liquid Water
  authors:
  - Loftus, Kaitlyn
  - Wordsworth, Robin D.
  - Morley, Caroline V.
  year: '2019'
  pubdate: '2019-12-00'
  doi: 10.3847/1538-4357/ab58cc
  abstract: Despite surface liquid water’s importance to habitability, observationally diagnosing its presence or absence
    on exoplanets is still an open problem. Inspired within the solar system by the differing sulfur cycles on Venus and Earth,
    we investigate thick sulfate (H<SUB>2</SUB>SO<SUB>4</SUB>-H<SUB>2</SUB>O) aerosol haze and high trace mixing ratios of
    SO<SUB>2</SUB> gas as observable atmospheric features whose sustained existence is linked to the near absence of surface
    liquid water. We examine the fundamentals of the sulfur cycle on a rocky planet with an ocean and an atmosphere in which
    the dominant forms of sulfur are SO<SUB>2</SUB> gas and H<SUB>2</SUB>SO<SUB>4</SUB>-H<SUB>2</SUB>O aerosols (as on Earth
    and Venus). We build a simple but robust model of the wet, oxidized sulfur cycle to determine the critical amounts of
    sulfur in the atmosphere-ocean system required for detectable levels of SO<SUB>2</SUB> and a detectable haze layer. We
    demonstrate that for physically realistic ocean pH values (pH ≳ 6) and conservative assumptions on volcanic outgassing,
    chemistry, and aerosol microphysics, surface liquid water reservoirs with greater than 10<SUP>-3</SUP> Earth oceans are
    incompatible with a sustained observable H<SUB>2</SUB>SO<SUB>4</SUB>-H<SUB>2</SUB>O haze layer and sustained observable
    levels of SO<SUB>2</SUB>. Thus, we propose the observational detection of an H<SUB>2</SUB>SO<SUB>4</SUB>-H<SUB>2</SUB>O
    haze layer and of SO<SUB>2</SUB> gas as two new remote indicators that a planet does not host significant surface liquid
    water.
