  abstract: As more missions attempt to directly image and characterize exoplanets orbiting nearby sun-like stars, advance
    characterization of possible contaminating background sources becomes more important and can impact target selection.
    This paper describes an exploration of the Hubble Source catalog, Gaia catalog and Besancon galaxy simulations in order
    to determine the likelihood of having a contaminating source in the background of a set of high proper motion stars in
    the expected timeframe of observations for the Nancy Grace Roman Space Telescope Coronagraphic Instrument. The analysis
    shows that for most of the targets, there is a very low possibility of a star falling within the CGI field of view, but
    that at low galactic latitudes where there is a greater density of sources, faint stellar background sources could be
    a concern.
