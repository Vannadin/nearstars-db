  arxiv_id: '1910.06285'
  ads_bibcode: 2019ApJ...884L..46C
  title: No Snowball on Habitable Tidally Locked Planets with a Dynamic Ocean
  authors:
  - Checlair, Jade H.
  - Olson, Stephanie L.
  - Jansen, Malte F.
  - Abbot, Dorian S.
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.3847/2041-8213/ab487d
  abstract: Terrestrial planets orbiting within the habitable zones of M-stars are likely to become tidally locked in a 1:1
    spin:orbit configuration and are prime targets for future characterization efforts. An issue of importance for the potential
    habitability of terrestrial planets is whether they could experience Snowball events (periods of global glaciation). Previous
    work using an intermediate-complexity atmospheric Global Climate Model (GCM) with no ocean heat transport suggested that
    tidally locked planets would smoothly transition to a Snowball, in contrast with Earth, which has bifurcations and hysteresis
    in climate state associated with global glaciation. In this Letter, we use a coupled ocean-atmosphere GCM (ROCKE-3D) to
    model tidally locked planets with no continents. We chose this configuration in order to consider a case that we expect
    to have high ocean heat transport. We show that including ocean heat transport does not reintroduce the Snowball bifurcation.
    An implication of this result is that a tidally locked planet in the habitable zone is unlikely to be found in a Snowball
    state for a geologically significant period of time.
  source: citation_of=2023ApJ...946L..32C
