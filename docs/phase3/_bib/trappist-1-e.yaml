  arxiv_id: '1207.5074'
  ads_bibcode: 2012ApJ...758...56S
  title: Identifying the Young Low-mass Stars within 25 pc. II. Distances, Kinematics, and Group Membership
  authors:
  - Shkolnik, Evgenya L.
  - Anglada-Escudé, Guillem
  - Liu, Michael C.
  - Bowler, Brendan P.
  - Weinberger, Alycia J.
  - Boss, Alan P.
  - Reid, I. Neill
