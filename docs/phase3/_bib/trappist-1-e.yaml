- &id040
  arxiv_id: '2208.06297'
  ads_bibcode: 2022ApJ...938..114H
  title: Greater Climate Sensitivity and Variability on TRAPPIST-1e than Earth
  authors:
  - Hochman, Assaf
  - De Luca, Paolo
  - Komacek, Thaddeus D.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.3847/1538-4357/ac866f
  abstract: The atmospheres of rocky exoplanets are close to being characterized by astronomical observations, in part due
    to the commissioning of the JWST. These observations compel us to understand exoplanetary atmospheres, in the voyage to
    find habitable planets. With this aim, we investigate the effect that CO<SUB>2</SUB> partial pressure (pCO<SUB>2</SUB>)
    has on exoplanets' climate variability, by analyzing results from ExoCAM model simulations of the tidally locked TRAPPIST-1e
    exoplanet, an Earth-like aqua-planet, and Earth itself. First, we relate the differences between the planets to their
    elementary parameters. Then, we compare the sensitivity of the Earth analog and TRAPPIST-1e's surface temperature and
    precipitation to pCO<SUB>2</SUB>. Our simulations suggest that the climatology and extremes of TRAPPIST-1e's temperature
    are ~1.5 times more sensitive to pCO<SUB>2</SUB> relative to Earth. The precipitation sensitivity strongly depends on
    the specific region analyzed. Indeed, the precipitation near mid-latitude and equatorial substellar regions of TRAPPIST-1e
    is more sensitive to pCO<SUB>2</SUB>, and the precipitation sensitivity is ~2 times larger in TRAPPIST-1e. A dynamical
    systems perspective, which provides information about how the atmosphere evolves in phase space, provides additional insights.
    Notably, an increase in pCO<SUB>2</SUB> results in an increase in atmospheric persistence on both planets, and the persistence
    of TRAPPIST-1e is more sensitive to pCO<SUB>2</SUB> than Earth. We conclude that the climate of TRAPPIST-1e may be more
    sensitive to pCO<SUB>2</SUB>, particularly on its dayside. This study documents a new pathway for understanding the effect
    that varying planetary parameters have on the climate variability of potentially habitable exoplanets and on Earth.
