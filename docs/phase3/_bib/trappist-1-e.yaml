  arxiv_id: '1808.01803'
  ads_bibcode: 2018ApJ...865...20D
  title: 'Interior Characterization in Multiplanetary Systems: TRAPPIST-1'
  authors:
  - Dorn, Caroline
  - Mosegaard, Klaus
  - Grimm, Simon L.
