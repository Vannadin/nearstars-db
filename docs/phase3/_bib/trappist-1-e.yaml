  year: '2026'
  pubdate: '2026-02-00'
  doi: 10.1038/s41550-025-02730-4
  abstract: Claims of detections of gases in exoplanet atmospheres often rely on comparisons between models including and
    excluding specific chemical species. However, the space of molecular combinations available for model construction is
    vast and highly degenerate. Only a limited subset of these combinations is typically explored for any given detection.
    As a result, apparent detections of trace gases risk being artefacts of incomplete modelling rather than robust identification
    of atmospheric constituents, especially in the low-signal-to-noise regime. Here, using the sub-Neptune K2-18 b as a case
    study, we show that recent biosignature claims vanish when the model space is expanded, with numerous alternatives providing
    equally good or better fits. We demonstrate that the significance of a claimed detection relies on the choice of models
    being compared, and that model preference does not in itself imply the presence of a specific gas. We recommend treating
    model comparisons instead as relative adequacy tests, which should be supported by theoretical predictions and complementary
    metrics of statistical significance to attribute a signal to a particular gas.
