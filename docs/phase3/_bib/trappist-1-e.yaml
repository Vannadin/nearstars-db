  doi: 10.1016/j.envres.2023.116816
  abstract: Tropospheric ozone (O<SUB>3</SUB>), the most important phytotoxic air pollutant, can deteriorate crop quality
    and productivity. Notably, satellite and ground-level observations-based multimodel simulations demonstrate that the present
    and future predicted O<SUB>3</SUB> exposures could threaten food security. Hence, the present study aims at reviewing
    the phytotoxicity caused by O<SUB>3</SUB> pollution, which threatens the food security. The present review encompasses
    three major aspects; wherein the past and prevailing O<SUB>3</SUB> concentrations in various regions were compiled at
    first, followed by discussing the physiological, biochemical and yield responses of economically important crop species,
    and considering the potential of O<SUB>3</SUB> protectants to alleviate O<SUB>3</SUB>-induced phytotoxicity. Finally,
    the empirical data reported in the literature were quantitatively analysed to show that O<SUB>3</SUB> causes detrimental
    effect on physiological traits, photosynthetic pigments, growth and yield attributes. The review on prevailing O<SUB>3</SUB>
    concentrations over various regions, where economically important crop are grown, and their negative impact would support
    policy makers to implement air pollution regulations and the scientific community to develop countermeasures against O<SUB>3</SUB>
    phytotoxicity for maintaining food security.
