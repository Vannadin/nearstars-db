  arxiv_id: '2102.11675'
  ads_bibcode: 2022RSOS....911165C
  title: A revised lower estimate of ozone columns during Earth's oxygenated history
  authors:
  - Cooke, G. J.
  - Marsh, D. R.
  - Walsh, C.
  - Black, B.
  - Lamarque, J.-F.
  year: '2022'
  pubdate: '2022-01-00'
  doi: 10.1098/rsos.211165
  abstract: 'The history of molecular oxygen (O<SUB>2</SUB>) in Earth''s atmosphere is still debated; however, geological
    evidence supports at least two major episodes where O<SUB>2</SUB> increased by an order of magnitude or more: the Great
    Oxidation Event (GOE) and the Neoproterozoic Oxidation Event. O<SUB>2</SUB> concentrations have likely fluctuated (between
    10<SUP>‒3</SUP> and 1.5 times the present atmospheric level) since the GOE ∼2.4 Gyr ago, resulting in a time-varying ozone
    (O<SUB>3</SUB>) layer. Using a three-dimensional chemistry-climate model, we simulate changes in O<SUB>3</SUB> in Earth''s
    atmosphere since the GOE and consider the implications for surface habitability, and glaciation during the Mesoproterozoic.
    We find lower O<SUB>3</SUB> columns (reduced by up to 4.68 times for a given O<SUB>2</SUB> level) compared to previous
    work; hence, higher fluxes of biologically harmful UV radiation would have reached the surface. Reduced O<SUB>3</SUB>
    leads to enhanced tropospheric production of the hydroxyl radical (OH) which then substantially reduces the lifetime of
    methane (CH<SUB>4</SUB>). We show that a CH<SUB>4</SUB> supported greenhouse effect during the Mesoproterozoic is highly
    unlikely. The reduced O<SUB>3</SUB> columns we simulate have important implications for astrobiological and terrestrial
    habitability, demonstrating the relevance of three-dimensional chemistry-climate simulations when assessing paleoclimates
    and the habitability of faraway worlds.'
