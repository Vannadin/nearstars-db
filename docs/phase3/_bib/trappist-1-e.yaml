  arxiv_id: '1611.06015'
  ads_bibcode: 2016ApJ...833L...8T
  title: Scaling Relations in Coronal Mass Ejections and Energetic Proton Events Associated with Solar Superflares
  authors:
  - Takahashi, Takuya
  - Mizuno, Yoshiyuki
  - Shibata, Kazunari
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.3847/2041-8205/833/1/L8
  abstract: In order to discuss the potential impact of solar “superflares” on space weather, we investigated statistical
    relations among energetic proton peak flux with energy higher than 10 MeV (F <SUB> p </SUB>), CME speed near the Sun (V
    <SUB>CME</SUB>) obtained by Solar and Heliospheric Observatory/LASCO coronagraph, and flare soft X-ray peak flux in the
    1-8 Å band (F <SUB>SXR</SUB>) during 110 major solar proton events recorded from 1996 to 2014. The linear regression fit
    results in the scaling relations {V}<SUB>{CME</SUB>}\propto {F}<SUB>{SXR</SUB>}<SUP>α </SUP>, {F}<SUB>p</SUB>\propto {F}<SUB>{SXR</SUB>}<SUP>β
    </SUP>, and {F}<SUB>p</SUB>\propto {V}<SUB>{CME</SUB>}<SUP>γ </SUP> with α = 0.30 ± 0.04, β = 1.19 ± 0.08, and γ = 4.35
    ± 0.50, respectively. On the basis of simple physical assumptions, on the other hand, we derive scaling relations expressing
    CME mass (M <SUB>CME</SUB>), CME speed, and energetic proton flux in terms of total flare energy (E <SUB>flare</SUB>)
    as {M}<SUB>{CME</SUB>}\propto {E}<SUB>{flare</SUB>}<SUP>2/3</SUP>, {V}<SUB>{CME</SUB>}\propto {E}<SUB>{flare</SUB>}<SUP>1/6</SUP>,
    and {F}<SUB>p</SUB>\propto {E}<SUB>{flare</SUB>}<SUP>5/6</SUP>\propto {V}<SUB>{CME</SUB>}<SUP>5</SUP>, respectively. We
    then combine the derived scaling relations with observation and estimated the upper limit of V <SUB>CME</SUB> and F <SUB>
    p </SUB> to be associated with possible solar superflares.
