  arxiv_id: '2009.07695'
  ads_bibcode: 2021A&A...649A..96J
  title: 'The active lives of stars: A complete description of the rotation and XUV evolution of F, G, K, and M dwarfs'
  authors:
  - Johnstone, C. P.
  - Bartel, M.
  - Güdel, M.
  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.1051/0004-6361/202038407
  abstract: '<BR /> Aims: We study the evolution of the rotation and the high energy X-ray, extreme ultraviolet (EUV), and
    Ly-α emission for F, G, K, and M dwarfs, with masses between 0.1 and 1.2 M<SUB>☉</SUB>, and provide a freely available
    set of evolutionary tracks for use in planetary atmosphere studies. <BR /> Methods: We develop a physical rotational evolution
    model constrained by observed rotation distributions in young stellar clusters. Using rotation, X-ray, EUV, and Ly-α measurements,
    we derive empirical relations for the dependences of high energy emission on stellar parameters. Our description of X-ray
    evolution is validated using measurements of X-ray distributions in young clusters. <BR /> Results: A star''s X-ray, EUV,
    and Ly-α evolution is determined by its mass and initial rotation rate, with initial rotation being less important for
    lower mass stars. At all ages, solar mass stars are significantly more X-ray luminous than lower mass stars and stars
    that are born as rapid rotators remain highly active longer than those born as slow rotators. At all evolutionary stages,
    habitable zone planets receive higher X-ray and EUV fluxes when orbiting lower mass stars due to their longer evolutionary
    timescales. The rates of flares follow similar evolutionary trends with higher mass stars flaring more often than lower
    mass stars at all ages, though habitable zone planets are likely influenced by flares more when orbiting lower mass stars.
    <BR /> Conclusions: Our results show that single decay laws are insufficient to describe stellar activity evolution and
    highlight the need for a more comprehensive description based on the evolution of rotation that also includes the effects
    of short-term variability. Planets at similar orbital distances from their host stars receive significantly more X-ray
    and EUV energy over their lifetimes when orbiting higher mass stars. The common belief that M dwarfs are more X-ray and
    EUV active than G dwarfs is justified only when considering the fluxes received by planets with similar effective temperatures,
    such as those in the habitable zone. <P />Our code for calculating stellar rotation and XUV evolution is available at
    <A href="https://github.com/ColinPhilipJohnstone/Mors">https://github.com/ColinPhilipJohnstone/Mors</A> and an extensive
    grid of evolutionary tracks is available at <A href="https://zenodo.org/record/4266670#.X6rMuq4o9H5">https://zenodo.org/record/4266670#.X6rMuq4o9H5</A>.'
