  doi: 10.3847/1538-3881/aa80eb
  abstract: 'The size of a planet is an observable property directly connected to the physics of its formation and evolution.
    We used precise radius measurements from the California-Kepler Survey to study the size distribution of 2025 Kepler planets
    in fine detail. We detect a factor of ≥2 deficit in the occurrence rate distribution at 1.5-2.0 {R}<SUB>\oplus </SUB>.
    This gap splits the population of close-in (P &lt; 100 days) small planets into two size regimes: {R}<SUB>{{P</SUB>}}&lt;
    1.5 {R}<SUB>\oplus </SUB> and {R}<SUB>{{P</SUB>}}=2.0{--}3.0 {R}<SUB>\oplus </SUB>, with few planets in between. Planets
    in these two regimes have nearly the same intrinsic frequency based on occurrence measurements that account for planet
    detection efficiencies. The paucity of planets between 1.5 and 2.0 {R}<SUB>\oplus </SUB> supports the emerging picture
    that close-in planets smaller than Neptune are composed of rocky cores measuring 1.5 {R}<SUB>\oplus </SUB> or smaller
    with varying amounts of low-density gas that determine their total sizes. <P />Based on observations obtained at the W.
    M. Keck Observatory, which is operated jointly by the University of California and the California Institute of Technology.
    Keck time was granted for this project by the University of California, and California Institute of Technology, the University
    of Hawaii, and NASA.'
