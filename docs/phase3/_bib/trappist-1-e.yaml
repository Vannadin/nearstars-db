  - Rugheimer, Sarah
  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.1016/j.epsl.2021.116818
  abstract: Various proxies and numerical models have been used to constrain O<SUB>2</SUB> levels over geological time, but
    considerable uncertainty remains. Previous investigations using 1-D photochemical models have predicted how O<SUB>3</SUB>
    concentrations vary with assumed ground-level O<SUB>2</SUB> concentrations, and indicate how the ozone layer might have
    developed over Earth history. These classic models have utilised the numerical simplification of fixed mixing ratio boundary
    conditions. Critically, this modelling assumption requires verification that predicted fluxes of biogenic and volcanic
    gases are realistic, but also that the resulting steady states are in fact stable equilibrium solutions against trivial
    changes in flux. <P />Here, we use a 1-D photochemical model with fixed flux boundary conditions to simulate the effects
    on O<SUB>3</SUB> and O<SUB>2</SUB> concentrations as O<SUB>2</SUB> (and CH<SUB>4</SUB>) fluxes are systematically varied.
    Our results suggest that stable equilibrium solutions exist for trace- and high-O<SUB>2</SUB>/O<SUB>3</SUB> cases, separated
    by a region of instability. In particular, the model produces few stable solutions with ground O<SUB>2</SUB> mixing ratios
    between 6 ×10<SUP>-7</SUP> and 2 ×10<SUP>-3</SUP> (3 ×10<SUP>-6</SUP> and 1% of present atmospheric levels). A fully UV-shielding
    ozone layer only exists in the high-O<SUB>2</SUB> states. Our atmospheric modelling supports prior work suggesting a rapid
    bimodal transition between reducing and oxidising conditions and proposes Proterozoic oxygen levels higher than some recent
    proxies suggest. We show that the boundary conditions of photochemical models matter, and should be chosen and explained
    with care.
