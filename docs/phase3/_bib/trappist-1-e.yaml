  doi: 10.3390/geosciences9010009
  abstract: We briefly present preliminary results of our study of the radioresistant bacteria in a low temperature and pressure
    and high-radiation environment and hypothesize the ability of microorganisms to survive extraterrestrial high-radiation
    environments, such as the icy surface of Jupiter's moon, Europa. In this study, samples containing a strain of Deinococcus
    radiodurans VKM B-1422<SUP>T</SUP> embedded into a simulated version of Europa's ice were put under extreme environmental
    (-130 °C, 0.01 mbar) and radiation conditions using a specially designed experimental vacuum chamber. The samples were
    irradiated with 5, 10, 50, and 100 kGy doses and subsequently studied for residual viable cells. We estimate the limit
    of the accumulated dose that viable cells in those conditions could withstand at 50 kGy. Combining our numerical modelling
    of the accumulated dose in ice with observations of water eruption events on Europa, we hypothesize that in the case of
    such events, it is possible that putative extraterrestrial organisms might retain viability in a dormant state for up
    to 10,000 years, and could be sampled and studied by future probe missions.
