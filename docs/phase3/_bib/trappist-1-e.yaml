- &id308
  arxiv_id: '1912.10939'
  ads_bibcode: 2020AJ....159..117T
  title: The Detectability and Constraints of Biosignature Gases in the Near- and Mid-infrared from Transit Transmission Spectroscopy
  authors:
  - Tremblay, L.
  - Line, M. R.
  - Stevenson, K.
  - Kataria, T.
  - Zellem, R. T.
  - Fortney, J. J.
  - Morley, C.
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.3847/1538-3881/ab64dd
  abstract: The James Webb Space Telescope is expected to revolutionize our understanding of Jovian worlds over the coming
    decade. However, as we push toward characterizing cooler, smaller, terrestrial-like planets, dedicated next-generation
    facilities will be required to tease out the small spectral signatures indicative of biological activity. Here, we evaluate
    the feasibility of determining atmospheric properties, from near-to-mid-infrared transmission spectra, of transiting temperate
    terrestrial M-dwarf companions. Specifically, we utilize atmospheric retrievals to explore the trade space between spectral
    resolution, wavelength coverage, and signal-to-noise on our ability to both detect molecular species and constrain their
    abundances. We find that increasing spectral resolution beyond R = 100 for near-infrared wavelengths, shorter than 5 μm,
    proves to reduce the degeneracy between spectral features of different molecules and thus greatly benefits the abundance
    constraints. However, this benefit is greatly diminished beyond 5 μm as any overlap between broad features in the mid-infrared
    does not deconvolve with higher resolutions. Additionally, our findings revealed that the inclusion of features beyond
    11 μm did not meaningfully improve the detection significance or the abundance constraints results. We conclude that an
    instrument with continuous wavelength coverage from ∼2 to 11 μm, spectral resolution of R ≃ 50-300, and a 25 m<SUP>2</SUP>
    collecting area, would be capable of detecting H<SUB>2</SUB>O, CO<SUB>2</SUB>, CH<SUB>4</SUB>, O<SUB>3</SUB>, and N<SUB>2</SUB>O
    in the atmosphere of an Earth-analog transiting a M dwarf (mag<SUB>K</SUB> = 8.0) within 50 transits, and obtain better
    than an order-of-magnitude constraint on each of their abundances.
