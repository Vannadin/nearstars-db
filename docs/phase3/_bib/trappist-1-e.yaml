  arxiv_id: '1804.02001'
  ads_bibcode: 2018ApJ...860L..30H
  title: The First Naked-eye Superflare Detected from Proxima Centauri
  authors:
  - Howard, Ward S.
  - Tilley, Matt A.
  - Corbett, Hank
  - Youngblood, Allison
  - Loyd, R. O. Parke
  - Ratzloff, Jeffrey K.
  - Law, Nicholas M.
  - Fors, Octavi
