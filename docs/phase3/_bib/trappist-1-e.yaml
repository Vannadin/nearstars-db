  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.1051/0004-6361/201935470
  abstract: We present the easy-to-use, publicly available, Python package petitRADTRANS, built for the spectral characterization
    of exoplanet atmospheres. The code is fast, accurate, and versatile; it can calculate both transmission and emission spectra
    within a few seconds at low resolution (λ/∆λ = 1000; correlated-k method) and high resolution (λ/∆λ = 10<SUP>6</SUP>;
    line-by-line method), using only a few lines of input instruction. The somewhat slower, correlated-k method is used at
    low resolution because it is more accurate than methods such as opacity sampling. Clouds can be included and treated using
    wavelength-dependent power law opacities, or by using optical constants of real condensates, specifying either the cloud
    particle size, or the atmospheric mixing and particle settling strength. Opacities of amorphous or crystalline, spherical
    or irregularly-shaped cloud particles are available. The line opacity database spans temperatures between 80 and 3000
    K, allowing to model fluxes of objects such as terrestrial planets, super-Earths, Neptunes, or hot Jupiters, if their
    atmospheres are hydrogen-dominated. Higher temperature points and species will be added in the future, allowing to also
    model the class of ultra hot-Jupiters, with equilibrium temperatures T<SUB>eq</SUB> ≳ 2000 K. Radiative transfer results
    were tested by cross-verifying the low- and high-resolution implementation of petitRADTRANS, and benchmarked with the
    petitCODE, which itself is also benchmarked to the ATMO and Exo-REM codes. We successfully carried out test retrievals
    of synthetic JWST emission and transmission spectra (for the hot Jupiter TrES-4b, which has a T<SUB>eq</SUB> of ∼1800
    K). <P />The code is publicly available at <A href="http://gitlab.com/mauricemolli/petitRADTRANS">http://gitlab.com/mauricemolli/petitRADTRANS</A>,
    and its documentation can be found at <A href="https://petitradtrans.readthedocs.io">https://petitradtrans.readthedocs.io</A>.
