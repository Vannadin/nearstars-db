  year: '2006'
  pubdate: '2006-01-00'
  doi: 10.1016/j.asr.2005.04.116
  abstract: A possible &gt;30 MeV solar proton intensity-time profile associated with the Carrington solar flare event of
    1 September 1859 is constructed. The derived profile is consistent with a &gt;30 MeV proton omni-directional fluence of
    1.9 × 10 <SUP>10</SUP> cm <SUP>-2</SUP> found by the analysis of solar proton generated NOy radicals that are deposited
    in polar ice. The intensity-time profile of the solar particle flux is constructed by assuming that the Carrington solar
    event is part of the class of interplanetary shock-dominated events where the maximum particle flux is observed as the
    shock passes the Earth. This assumption is based on the knowledge that the very large solar proton fluence events (those
    with &gt;30 MeV omni-directional fluence exceeding 1.0 × 10 <SUP>9</SUP> cm <SUP>-2</SUP>) associated with central meridian
    solar activity during the last 50 years belong to this class of event. The absence of a statistically significant increase
    in the observed concentration of the cosmogenic nuclide <SUP>10</SUP>Be for 1859 indicates that the solar cosmic radiation
    produced in the Carrington event had a soft spectrum, similar to other interplanetary shock-dominated events.
