  arxiv_id: '1308.4402'
  ads_bibcode: 2013ApJ...775L..44P
  title: Stability of Satellites in Closely Packed Planetary Systems
  authors:
  - Payne, Matthew J.
  - Deck, Katherine M.
  - Holman, Matthew J.
  - Perets, Hagai B.
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1088/2041-8205/775/2/L44
  abstract: We perform numerical integrations of four-body (star, planet, planet, satellite) systems to investigate the stability
    of satellites in planetary systems with tightly packed inner planets (STIPs). We find that the majority of closely spaced
    stable two-planet systems can stably support satellites across a range of parameter-space which is only slightly decreased
    compared to that seen for the single-planet case. In particular, circular prograde satellites remain stable out to ~0.4
    R<SUB>H</SUB> (where R<SUB>H</SUB> is the Hill radius) as opposed to 0.5 R<SUB>H</SUB> in the single-planet case. A similarly
    small restriction in the stable parameter-space for retrograde satellites is observed, where planetary close approaches
    in the range 2.5-4.5 mutual Hill radii destabilize most satellites orbits only if a ~ 0.65 R<SUB>H</SUB> . In very close
    planetary pairs (e.g., the 12:11 resonance) the addition of a satellite frequently destabilizes the entire system, causing
    extreme close approaches and the loss of satellites over a range of circumplanetary semi-major axes. The majority of systems
    investigated stably harbored satellites over a wide parameter-space, suggesting that STIPs can generally offer a dynamically
    stable home for satellites, albeit with a slightly smaller stable parameter-space than the single-planet case. As we demonstrate
    that multi-planet systems are not a priori poor candidates for hosting satellites, future measurements of satellite occurrence
    rates in multi-planet systems versus single-planet systems could be used to constrain either satellite formation or past
    periods of strong dynamical interaction between planets.
