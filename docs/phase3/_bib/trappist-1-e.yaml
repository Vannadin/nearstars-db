  title: A signature of cosmic-ray increase in AD 774-775 from tree rings in Japan
  authors:
  - Miyake, Fusa
  - Nagaya, Kentaro
  - Masuda, Kimiaki
  - Nakamura, Toshio
  year: '2012'
  pubdate: '2012-06-00'
  doi: 10.1038/nature11123
  abstract: Increases in <SUP>14</SUP>C concentrations in tree rings could be attributed to cosmic-ray events, as have increases
    in <SUP>10</SUP>Be and nitrate in ice cores. The record of the past 3,000 years in the IntCal09 data set, which is a time
    series at 5-year intervals describing the <SUP>14</SUP>C content of trees over a period of approximately 10,000 years,
    shows three periods during which <SUP>14</SUP>C increased at a rate greater than 3‰ over 10 years. Two of these periods
    have been measured at high time resolution, but neither showed increases on a timescale of about 1 year (refs 11 and 12).
    Here we report <SUP>14</SUP>C measurements in annual rings of Japanese cedar trees from AD 750 to AD 820 (the remaining
    period), with 1- and 2-year resolution. We find a rapid increase of about 12‰ in the <SUP>14</SUP>C content from AD 774
    to 775, which is about 20 times larger than the change attributed to ordinary solar modulation. When averaged over 10
    years, the data are consistent with the decadal IntCal <SUP>14</SUP>C data from North American and European trees. We
    argue that neither a solar flare nor a local supernova is likely to have been responsible.
