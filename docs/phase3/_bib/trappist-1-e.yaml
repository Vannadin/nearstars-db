  arxiv_id: '2408.15123'
  ads_bibcode: 2024ApJ...975L..22W
  title: No Thick Atmosphere on the Terrestrial Exoplanet Gl 486b
  authors:
  - Weiner Mansfield, Megan
  - Xue, Qiao
  - Zhang, Michael
  - Mahajan, Alexandra S.
  - Ih, Jegug
  - Koll, Daniel
  - Bean, Jacob L.
  - Coy, Brandon Park
  - Eastman, Jason D.
  - Kempton, Eliza M.-R.
