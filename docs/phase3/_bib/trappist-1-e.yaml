- &id367
  arxiv_id: '0808.1909'
  ads_bibcode: 2008ApJ...685.1237E
  title: Ranges of Atmospheric Mass and Composition of Super-Earth Exoplanets
  authors:
  - Elkins-Tanton, Linda T.
  - Seager, Sara
  year: '2008'
  pubdate: '2008-10-00'
  doi: 10.1086/591433
  abstract: 'Terrestrial-like exoplanets may obtain atmospheres from three primary sources: capture of nebular gases, degassing
    during accretion, and degassing from subsequent tectonic activity. Here we model degassing during accretion to estimate
    the range of atmospheric mass and composition on exoplanets ranging from 1 to 30 Earth masses. We use bulk compositions
    drawn from primitive and differentiated meteorite compositions. Degassing alone can create a wide range of masses of planetary
    atmospheres, ranging from less than 1% of the planet''s total mass up to ~6 percent by mass (mass%) of hydrogen, ~20 mass%
    of water, and/or ~5 mass% of carbon compounds. Hydrogen-rich atmospheres can be outgassed as a result of oxidizing metallic
    iron with water, and excess water and carbon can produce atmospheres through simple degassing. As a byproduct of our atmospheric
    outgassing models we find that modest initial water contents (10 mass% of the planet and above) create planets with deep
    surface liquid water oceans soon after accretion is complete.'
