- &id246
  arxiv_id: '0807.4180'
  ads_bibcode: 2009ApJ...691..596S
  title: 'Habitable Climates: The Influence of Obliquity'
  authors:
  - Spiegel, David S.
  - Menou, Kristen
  - Scharf, Caleb A.
  year: '2009'
  pubdate: '2009-01-00'
  doi: 10.1088/0004-637X/691/1/596
  abstract: Extrasolar terrestrial planets with the potential to host life might have large obliquities or be subject to strong
    obliquity variations. We revisit the habitability of oblique planets with an energy balance climate model (EBM) allowing
    for dynamical transitions to ice-covered snowball states as a result of ice-albedo feedback. Despite the great simplicity
    of our EBM, it captures reasonably well the seasonal cycle of global energetic fluxes at Earth's surface. It also performs
    satisfactorily against a full-physics climate model of a highly oblique Earth-like planet, in an unusual regime of circulation
    dominated by heat transport from the poles to the equator. Climates on oblique terrestrial planets can violate global
    radiative balance through much of their seasonal cycle, which limits the usefulness of simple radiative equilibrium arguments.
    High obliquity planets have severe climates, with large amplitude seasonal variations, but they are not necessarily more
    prone to global snowball transitions than low obliquity planets. We find that terrestrial planets with massive CO<SUB>2</SUB>
    atmospheres, typically expected in the outer regions of habitable zones, can also be subject to such dynamical snowball
    transitions. Some of the snowball climates investigated for CO<SUB>2</SUB>-rich atmospheres experience partial atmospheric
    collapse. Since long-term CO<SUB>2</SUB> atmospheric build-up acts as a climatic thermostat for habitable planets, partial
    CO<SUB>2</SUB> collapse could limit the habitability of such planets. A terrestrial planet's habitability may thus sensitively
    depend on its short-term climatic stability.
