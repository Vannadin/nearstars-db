  arxiv_id: '1110.6162'
  ads_bibcode: 2011ApJS..197...38D
  title: The WIRED Survey. II. Infrared Excesses in the SDSS DR7 White Dwarf Catalog
  authors:
  - Debes, John H.
  - Hoard, D. W.
  - Wachter, Stefanie
  - Leisawitz, David T.
  - Cohen, Martin
  year: '2011'
  pubdate: '2011-12-00'
  doi: 10.1088/0067-0049/197/2/38
  abstract: With the launch of the Wide-field Infrared Survey Explorer (WISE), a new era of detecting planetary debris and
    brown dwarfs (BDs) around white dwarfs (WDs) has begun with the WISE InfraRed Excesses around Degenerates (WIRED) Survey.
    The WIRED Survey is sensitive to substellar objects and dusty debris around WDs out to distances exceeding 100 pc, well
    beyond the completeness level of local WDs. In this paper, we present a cross-correlation of the preliminary Sloan Digital
    Sky Survey (SDSS) Data Release 7 (DR7) WD catalog between the WISE, Two-Micron All Sky Survey (2MASS), UKIRT Infrared
    Deep Sky Survey (UKIDSS), and SDSS DR7 photometric catalogs. From ~18,000 input targets, there are WISE detections comprising
    344 "naked" WDs (detection of the WD photosphere only), 1020 candidate WD+M dwarf binaries, 42 candidate WD+BD systems,
    52 candidate WD+dust disk systems, and 69 targets with indeterminate infrared excess. We classified all of the detected
    targets through spectral energy distribution model fitting of the merged optical, near-IR, and WISE photometry. Some of
    these detections could be the result of contaminating sources within the large (≈6'') WISE point-spread function; we make
    a preliminary estimate for the rates of contamination for our WD+BD and WD+disk candidates and provide notes for each
    target of interest. Each candidate presented here should be confirmed with higher angular resolution infrared imaging
    or infrared spectroscopy. We also present an overview of the observational characteristics of the detected WDs in the
    WISE photometric bands, including the relative frequencies of candidate WD+M, WD+BD, and WD+disk systems.
