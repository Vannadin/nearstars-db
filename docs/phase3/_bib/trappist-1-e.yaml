  title: Detecting Proxima b’s Atmosphere with JWST Targeting CO<SUB>2</SUB> at 15 μm Using a High-pass Spectral Filtering
    Technique
  authors:
  - Snellen, I. A. G.
  - Désert, J.-M.
  - Waters, L. B. F. M.
  - Robinson, T.
  - Meadows, V.
  - van Dishoeck, E. F.
  - Brandl, B. R.
  - Henning, T.
  - Bouwman, J.
  - Lahuis, F.
  - Min, M.
  - Lovis, C.
  - Dominik, C.
  - Van Eylen, V.
  - Sing, D.
  - Anglada-Escudé, G.
  - Birkby, J. L.
  - Brogi, M.
  year: '2017'
  pubdate: '2017-08-00'
  doi: 10.3847/1538-3881/aa7fbc
  abstract: Exoplanet Proxima b will be an important laboratory for the search for extraterrestrial life for the decades ahead.
    Here, we discuss the prospects of detecting carbon dioxide at 15 μm using a spectral filtering technique with the Medium
    Resolution Spectrograph (MRS) mode of the Mid-Infrared Instrument (MIRI) on the James Webb Space Telescope (JWST). At
    superior conjunction, the planet is expected to show a contrast of up to 100 ppm with respect to the star. At a spectral
    resolving power of R = 1790-2640, about 100 spectral CO<SUB>2</SUB> features are visible within the 13.2-15.8 μm (3B)
    band, which can be combined to boost the planet atmospheric signal by a factor of 3-4, depending on the atmospheric temperature
    structure and CO<SUB>2</SUB> abundance. If atmospheric conditions are favorable (assuming an Earth-like atmosphere), with
    this new application to the cross-correlation technique, carbon dioxide can be detected within a few days of JWST observations.
    However, this can only be achieved if both the instrumental spectral response and the stellar spectrum can be determined
    to a relative precision of ≤1 × 10<SUP>-4</SUP> between adjacent spectral channels. Absolute flux calibration is not required,
    and the method is insensitive to the strong broadband variability of the host star. Precise calibration of the spectral
    features of the host star may only be attainable by obtaining deep observations of the system during inferior conjunction
    that serve as a reference. The high-pass filter spectroscopic technique with the MIRI MRS can be tested on warm Jupiters,
    Neptunes, and super-Earths with significantly higher planet/star contrast ratios than the Proxima system.
