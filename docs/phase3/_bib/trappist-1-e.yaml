  arxiv_id: '1803.00226'
  ads_bibcode: 2018A&A...615A..97L
  title: Simulating the cloudy atmospheres of HD 209458 b and HD 189733 b with the 3D Met Office Unified Model
  authors:
  - Lines, S.
  - Mayne, N. J.
  - Boutle, I. A.
  - Manners, J.
  - Lee, E. K. H.
  - Helling, Ch.
  - Drummond, B.
  - Amundsen, D. S.
  - Goyal, J.
  - Acreman, D. M.
  - Tremblin, P.
  - Kerslake, M.
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.1051/0004-6361/201732278
  abstract: '<BR /> Aims: To understand and compare the 3D atmospheric structure of HD 209458 b and HD 189733 b, focusing
    on the formation and distribution of cloud particles, as well as their feedback on the dynamics and thermal profile. <BR
    /> Methods: We coupled the 3D Met Office Unified Model (UM), including detailed treatments of atmospheric radiative transfer
    and dynamics, to a kinetic cloud formation scheme. The resulting model self-consistently solves for the formation of condensation
    seeds, surface growth and evaporation, gravitational settling and advection, cloud radiative feedback via absorption,
    and crucially, scattering. We used fluxes directly obtained from the UM to produce synthetic spectral energy distributions
    and phase curves. <BR /> Results: Our simulations show extensive cloud formation in both HD 209458 b and HD 189733 b.
    However, cooler temperatures in the latter result in higher cloud particle number densities. Large particles, reaching
    1 μm in diameter, can form due to high particle growth velocities, and sub-μm particles are suspended by vertical flows
    leading to extensive upper-atmosphere cloud cover. A combination of meridional advection and efficient cloud formation
    in cooler high latitude regions, results in enhanced cloud coverage for latitudes above 30° and leads to a zonally banded
    structure for all our simulations. The cloud bands extend around the entire planet, for HD 209458 b and HD 189733 b, as
    the temperatures, even on the day side, remain below the condensation temperature of silicates and oxides. Therefore,
    the simulated optical phase curve for HD 209458 b shows no "offset", in contrast to observations. Efficient scattering
    of stellar irradiation by cloud particles results in a local maximum cooling of up to 250 K in the upper atmosphere, and
    an advection-driven fluctuating cloud opacity causes temporal variability in the thermal emission. The inclusion of this
    fundamental cloud-atmosphere radiative feedback leads to significant differences with approaches neglecting these physical
    elements, which have been employed to interpret observations and determine thermal profiles for these planets. This suggests
    that readers should be cautious of interpretations neglecting such cloud feedback and scattering, and that the subject
    merits further study.'
