- &id590
  arxiv_id: '1911.09725'
  ads_bibcode: 2020A&A...633A..10B
  title: Influence of sub- and super-solar metallicities on the composition of solid planetary building blocks
  authors:
  - Bitsch, Bertram
  - Battistini, Chiara
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.1051/0004-6361/201936463
  abstract: The composition of the protoplanetary disc is thought to be linked to the composition of the host star, where
    a higher overall metallicity provides the building blocks for planets. However, most of the planet formation simulations
    only link the stellar iron abundance [Fe/H] to planet formation and the iron abundance in itself is used as a proxy to
    scale all elements. On the other hand, large surveys of stellar abundances show that this is not true. Here we use stellar
    abundances from the GALAH surveys to determine the average detailed abundances of Fe, Si, Mg, O, and C for a broad range
    of host star metallicities with [Fe/H] spanning from -0.4 to +0.4. Using an equilibrium chemical model that features the
    most important rock-forming compounds as well as volatile contributions of H<SUB>2</SUB>O, CO<SUB>2</SUB>, CH<SUB>4</SUB>,
    and CO, we calculate the chemical composition of solid planetary building blocks around stars with different metallicities.
    Solid building blocks that are formed entirely interior to the water ice line (T &gt; 150 K) only show an increase in
    Mg<SUB>2</SUB>SiO<SUB>4</SUB> and a decrease in MgSiO<SUB>3</SUB> for increasing host star metallicity, which is related
    to the increase of [Mg/Si] for higher [Fe/H]. Solid planetary building blocks forming exterior to the water ice line (T
    &lt; 150 K), on the other hand, show dramatic changes in their composition. In particular, the water ice content decreases
    from around 50% at [Fe/H] = -0.4 to 6% at [Fe/H] = 0.4 in our chemical model. This is mainly caused by the increasing
    C/O ratio with increasing [Fe/H], which binds most of the oxygen in gaseous CO and CO<SUB>2</SUB>, resulting in a small
    water ice fraction. Planet formation simulations coupled with the chemical model confirm these results by showing that
    the water ice content of super-Earths decreases with increasing host star metallicity due to the increased C/O ratio.
    This decrease of the water ice fraction has important consequences for planet formation, planetary composition, and the
    eventual habitability of planetary systems formed around these high-metallicity stars.
