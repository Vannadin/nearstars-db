  doi: 10.3847/2041-8213/aa74cc
  abstract: CO is an important component in many {{{N}}}<SUB>2</SUB>/{{CH}}<SUB>4</SUB> atmospheres, including Titan, Triton,
    and Pluto, and has also been detected in the atmosphere of a number of exoplanets. Numerous experimental simulations have
    been carried out in the laboratory to understand the chemistry in {{{N}}}<SUB>2</SUB>/{{CH}}<SUB>4</SUB> atmospheres,
    but very few simulations have included CO in the initial gas mixtures. The effect of CO on the chemistry occurring in
    these atmospheres is still poorly understood. We have investigated the effect of CO on both gas and solid phase chemistry
    in a series of planetary atmosphere simulation experiments using gas mixtures of CO, {{CH}}<SUB>4</SUB>, and {{{N}}}<SUB>2</SUB>
    with a range of CO mixing ratios from 0.05% to 5% at low temperature (∼100 K). We find that CO affects the gas phase chemistry,
    the density, and the composition of the solids. Specifically, with the increase of CO in the initial gases, there is less
    {{{H}}}<SUB>2</SUB> but more {{{H}}}<SUB>2</SUB>{{O}}, HCN, {{{C}}}<SUB>2</SUB>{{{H}}}<SUB>5</SUB>{{N}}/{HCNO}, and {{CO}}<SUB>2</SUB>
    produced in the gas phase, while the density, oxygen content, and degree of unsaturation of the solids increase. The results
    indicate that CO has an important impact on the chemistry occurring in our experiments and accordingly in planetary atmospheres.
