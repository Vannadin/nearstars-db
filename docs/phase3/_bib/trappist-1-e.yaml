  abstract: The hot Neptune desert is one of the most sparsely populated regions of the exoplanet parameter space, and atmosphere
    observations of its few residents can provide insights into how such planets have managed to survive in such an inhospitable
    environment. Here, we present transmission observations of LTT 9779 b, the only known hot Neptune to have retained a significant
    H/He-dominated atmosphere, taken with JWST NIRISS/SOSS. The 0.6─2.85 μm transmission spectrum shows evidence for muted
    spectral features, rejecting a perfectly flat line at &gt;5σ. We explore water- and methane-dominated atmosphere scenarios
    for LTT 9779 b's terminator, and retrieval analyses reveal a continuum of potential combinations of metallicity and cloudiness.
    Through comparisons to previous population synthesis works and our own interior structure modeling, we are able to constrain
    LTT 9779 b's atmosphere metallicity to 20─850× solar. Within this range of metallicity, our retrieval analyses prefer
    solutions with clouds at millibar pressures, regardless of whether the atmosphere is water or methane dominated—though
    cloud-free atmospheres with metallicities &gt;500× solar cannot be entirely ruled out. By comparing self-consistent atmosphere
    temperature profiles with cloud condensation curves, we find that silicate clouds can readily condense in the terminator
    region of LTT 9779 b. Advection of these clouds onto the dayside could explain the high dayside albedo previously inferred
    for this planet and be part of a feedback loop aiding the survival of LTT 9779 b's atmosphere in the hot Neptune desert.
