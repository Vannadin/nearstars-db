- &id655
  arxiv_id: '1610.03447'
  ads_bibcode: 2017MNRAS.464.3281W
  title: Optical, UV, and X-ray evidence for a 7-yr stellar cycle in Proxima Centauri
  authors:
  - Wargelin, B. J.
  - Saar, S. H.
  - Pojmański, G.
  - Drake, J. J.
  - Kashyap, V. L.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1093/mnras/stw2570
  abstract: 'Stars of stellar type later than about M3.5 are believed to be fully convective and therefore unable to support
    magnetic dynamos like the one that produces the 11-yr solar cycle. Because of their intrinsic faintness, very few late
    M stars have undergone long-term monitoring to test this prediction, which is critical to our understanding of magnetic
    field generation in such stars. Magnetic activity is also of interest as the driver of UV and X-ray radiation, as well
    as energetic particles and stellar winds, that affects the atmospheres of close-in planets that lie within habitable zones,
    such as the recently discovered Proxima b. We report here on several years of optical, UV, and X-ray observations of Proxima
    Centauri (GJ 551; dM5.5e): 15 yr of All Sky Automated Survey photometry in the V band (1085 nights) and 3 yr in the I
    band (196 nights), 4 yr of Swift X-Ray Telescope and UV/Optical Telescope observations (more than 120 exposures), and
    nine sets of X-ray observations from other X-ray missions (ASCA, XMM-Newton, and three Chandra instruments) spanning 22
    yr. We confirm previous reports of an 83-d rotational period and find strong evidence for a 7-yr stellar cycle, along
    with indications of differential rotation at about the solar level. X-ray/UV intensity is anticorrelated with optical
    V-band brightness for both rotational and cyclical variations. From comparison with other stars observed to have X-ray
    cycles, we deduce a simple empirical relationship between X-ray cyclic modulation and Rossby number, and we also present
    Swift UV grism spectra covering 2300-6000 Å.'
  source: citation_of=2019ApJ...881..114Y
