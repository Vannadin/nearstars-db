  arxiv_id: '1711.05691'
  ads_bibcode: 2018ApJ...853..122R
  title: 'The Transit Light Source Effect: False Spectral Features and Incorrect Densities for M-dwarf Transiting Planets'
  authors:
  - Rackham, Benjamin V.
  - Apai, Dániel
  - Giampapa, Mark S.
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.3847/1538-4357/aaa08c
  abstract: Transmission spectra are differential measurements that utilize stellar illumination to probe transiting exoplanet
    atmospheres. Any spectral difference between the illuminating light source and the disk-integrated stellar spectrum due
    to starspots and faculae will be imprinted in the observed transmission spectrum. However, few constraints exist for the
    extent of photospheric heterogeneities in M dwarfs. Here we model spot and faculae covering fractions consistent with
    observed photometric variabilities for M dwarfs and the associated 0.3-5.5 μm stellar contamination spectra. We find that
    large ranges of spot and faculae covering fractions are consistent with observations and corrections assuming a linear
    relation between variability amplitude, and covering fractions generally underestimate the stellar contamination. Using
    realistic estimates for spot and faculae covering fractions, we find that stellar contamination can be more than 10× larger
    than the transit depth changes expected for atmospheric features in rocky exoplanets. We also find that stellar spectral
    contamination can lead to systematic errors in radius and therefore the derived density of small planets. In the case
    of the TRAPPIST-1 system, we show that TRAPPIST-1's rotational variability is consistent with spot covering fractions
    {f}<SUB>{spot</SUB>}={8}<SUB>-7</SUB><SUP>+18</SUP> % and faculae covering fractions {f}<SUB>{fac</SUB>}={54}<SUB>-46</SUB><SUP>+16</SUP>
    % . The associated stellar contamination signals alter the transit depths of the TRAPPIST-1 planets at wavelengths of
    interest for planetary atmospheric species by roughly 1-15× the strength of planetary features, significantly complicating
    JWST follow-up observations of this system. Similarly, we find that stellar contamination can lead to underestimates of
    the bulk densities of the TRAPPIST-1 planets of {{∆ }}(ρ )=-{8}<SUB>-20</SUB><SUP>+7</SUP> % , thus leading to overestimates
    of their volatile contents.
