  doi: 10.1002/2014GL060469
  abstract: Solar proton flux measurements onboard Geostationary Operational Environmental Satellites (GOES) are of great
    importance as they cover several solar cycles, increasingly contributing to the development of long-term solar proton
    models and to operational purposes such as now-casting and forecasting of space weather. A novel approach for the cross
    calibration of GOES solar proton detectors is developed using as reference energetic solar proton flux measurements of
    NASA IMP-8 Goddard Medium Energy Experiment (GME). The spurious behavior in a part of IMP-8/GME measurements is reduced
    through the derivation of a nonlinear intercalibration function. The effective energy values of GOES solar proton detectors
    lead to a significant reduction of the uncertainties in spectra and may be used to refine existing scientific results,
    available models, and data products based on measurements over the last three decades. The methods presented herein are
    generic and may be used for calibration processes of other data sets as well.
