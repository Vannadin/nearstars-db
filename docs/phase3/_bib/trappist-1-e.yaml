- &id244
  arxiv_id: '1002.4875'
  ads_bibcode: 2010ApJ...721.1295D
  title: 'Habitable Climates: The Influence of Eccentricity'
  authors:
  - Dressing, Courtney D.
  - Spiegel, David S.
  - Scharf, Caleb A.
  - Menou, Kristen
  - Raymond, Sean N.
  year: '2010'
  pubdate: '2010-10-00'
  doi: 10.1088/0004-637X/721/2/1295
  abstract: In the outer regions of the habitable zone, the risk of transitioning into a globally frozen "snowball" state
    poses a threat to the habitability of planets with the capacity to host water-based life. Here, we use a one-dimensional
    energy balance climate model (EBM) to examine how obliquity, spin rate, orbital eccentricity, and the fraction of the
    surface covered by ocean might influence the onset of such a snowball state. For an exoplanet, these parameters may be
    strikingly different from the values observed for Earth. Since, for a constant semimajor axis, the annual mean stellar
    irradiation scales with (1 - e <SUP>2</SUP>)<SUP>-1/2</SUP>, one might expect the greatest habitable semimajor axis (for
    fixed atmospheric composition) to scale as (1 - e <SUP>2</SUP>)<SUP>-1/4</SUP>. We find that this standard simple ansatz
    provides a reasonable lower bound on the outer boundary of the habitable zone, but the influence of both obliquity and
    ocean fraction can be profound in the context of planets on eccentric orbits. For planets with eccentricity 0.5, for instance,
    our EBM suggests that the greatest habitable semimajor axis can vary by more than 0.8 AU (78%!) depending on obliquity,
    with higher obliquity worlds generally more stable against snowball transitions. One might also expect that the long winter
    at an eccentric planet's apoastron would render it more susceptible to global freezing. Our models suggest that this is
    not a significant risk for Earth-like planets around Sun-like stars, as considered here, since such planets are buffered
    by the thermal inertia provided by oceans covering at least 10% of their surface. Since planets on eccentric orbits spend
    much of their year particularly far from the star, such worlds might turnout to be especially good targets for direct
    observations with missions such as TPF-Darwin. Nevertheless, the extreme temperature variations achieved on highly eccentric
    exo-Earths raise questions about the adaptability of life to marginally or transiently habitable conditions.
  source: citation_of=2024PSJ.....5....2R
