- &id761
  arxiv_id: null
  ads_bibcode: 2009A&ARv..17..181L
  title: What makes a planet habitable?
  authors:
  - Lammer, H.
  - Bredehöft, J. H.
  - Coustenis, A.
  - Khodachenko, M. L.
  - Kaltenegger, L.
  - Grasset, O.
  - Prieur, D.
  - Raulin, F.
  - Ehrenfreund, P.
  - Yamauchi, M.
  - Wahlund, J.-E.
  - Grießmeier, J.-M.
  - Stangl, G.
  - Cockell, C. S.
  - Kulikov, Yu. N.
  - Grenfell, J. L.
  - Rauer, H.
  year: '2009'
  pubdate: '2009-06-00'
  doi: 10.1007/s00159-009-0019-z
  abstract: This work reviews factors which are important for the evolution of habitable Earth-like planets such as the effects
    of the host star dependent radiation and particle fluxes on the evolution of atmospheres and initial water inventories.
    We discuss the geodynamical and geophysical environments which are necessary for planets where plate tectonics remain
    active over geological time scales and for planets which evolve to one-plate planets. The discoveries of methane-ethane
    surface lakes on Saturn’s large moon Titan, subsurface water oceans or reservoirs inside the moons of Solar System gas
    giants such as Europa, Ganymede, Titan and Enceladus and more than 335 exoplanets, indicate that the classical definition
    of the habitable zone concept neglects more exotic habitats and may fail to be adequate for stars which are different
    from our Sun. A classification of four habitat types is proposed. Class I habitats represent bodies on which stellar and
    geophysical conditions allow Earth-analog planets to evolve so that complex multi-cellular life forms may originate. Class
    II habitats includes bodies on which life may evolve but due to stellar and geophysical conditions that are different
    from the class I habitats, the planets rather evolve toward Venus- or Mars-type worlds where complex life-forms may not
    develop. Class III habitats are planetary bodies where subsurface water oceans exist which interact directly with a silicate-rich
    core, while class IV habitats have liquid water layers between two ice layers, or liquids above ice. Furthermore, we discuss
    from the present viewpoint how life may have originated on early Earth, the possibilities that life may evolve on such
    Earth-like bodies and how future space missions may discover manifestations of extraterrestrial life.
