  abstract: Climate modeling has shown that tidal locking, particularly of terrestrial exoplanets orbiting M-dwarfs, can lead
    unique atmospheric dynamics and surface conditions. However, chaotic libration and rotation induced by planetary interactions
    in compact planetary systems may destabilize attendant exoplanets away from synchronized states. Here, we use a three-dimensional
    N-body integrator and an intermediately-complex general circulation model to simulate the evolving climates of TRAPPIST-1
    e and f under the influence of different orbital and spin evolution pathways. Planet f perturbed by mean motion resonance
    effects are colder and dryer compared to their synchronized counterparts due to the zonal drift of the substellar point
    away from the eyeball open water belt. The differences between perturbed and synchronized planet e are minor due to higher
