- &id285
  arxiv_id: '2201.08359'
  ads_bibcode: 2022ApJ...930..131R
  title: 'Photochemical Runaway in Exoplanet Atmospheres: Implications for Biosignatures'
  authors:
  - Ranjan, Sukrit
  - Seager, Sara
  - Zhan, Zhuchang
  - Koll, Daniel D. B.
  - Bains, William
  - Petkowski, Janusz J.
  - Huang, Jingcheng
  - Lin, Zifan
  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/1538-4357/ac5749
  abstract: 'About 2.5 billion years ago, microbes learned to harness plentiful solar energy to reduce CO<SUB>2</SUB> with
    H<SUB>2</SUB>O, extracting energy and producing O<SUB>2</SUB> as waste. O<SUB>2</SUB> production from this metabolic process
    was so vigorous that it saturated its photochemical sinks, permitting it to reach "runaway" conditions and rapidly accumulate
    in the atmosphere despite its reactivity. Here we argue that O<SUB>2</SUB> may not be unique: diverse gases produced by
    life may experience a "runaway" effect similar to O<SUB>2</SUB>. This runaway occurs because the ability of an atmosphere
    to photochemically cleanse itself of trace gases is generally finite. If produced at rates exceeding this finite limit,
    even reactive gases can rapidly accumulate to high concentrations and become potentially detectable. Planets orbiting
    smaller, cooler stars, such as the M dwarfs that are the prime targets for the James Webb Space Telescope (JWST), are
    especially favorable for runaway, due to their lower UV emission compared to higher-mass stars. As an illustrative case
    study, we show that on a habitable exoplanet with an H<SUB>2</SUB>-N<SUB>2</SUB> atmosphere and net surface production
    of NH<SUB>3</SUB> orbiting an M dwarf (the "Cold Haber World" scenario), the reactive biogenic gas NH<SUB>3</SUB> can
    enter runaway, whereupon an increase in the surface production flux of one order of magnitude can increase NH<SUB>3</SUB>
    concentrations by three orders of magnitude and render it detectable by JWST in just two transits. Our work on this and
    other gases suggests that diverse signs of life on exoplanets may be readily detectable at biochemically plausible production
    rates.'
