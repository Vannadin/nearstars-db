  year: '2014'
  pubdate: '2014-06-00'
  doi: 10.1088/0004-637X/787/2/108
  abstract: A major impediment to understanding star formation in massive star-forming regions (MSFRs) is the absence of a
    reliable stellar chronometer to unravel their complex star formation histories. We present a new estimation of stellar
    ages using a new method that employs near-infrared (NIR) and X-ray photometry, Age <SUB>JX</SUB> . Stellar masses are
    derived from X-ray luminosities using the L<SUB>X</SUB> -M relation from the Taurus cloud. J-band luminosities are compared
    to mass-dependent pre-main-sequence (PMS) evolutionary models to estimate ages. Age <SUB>JX</SUB> is sensitive to a wide
    range of evolutionary stages, from disk-bearing stars embedded in a cloud to widely dispersed older PMS stars. The Massive
    Young Star-Forming Complex Study in Infrared and X-ray (MYStIX) project characterizes 20 OB-dominated MSFRs using X-ray,
    mid-infrared, and NIR catalogs. The Age <SUB>JX</SUB> method has been applied to 5525 out of 31,784 MYStIX Probable Complex
    Members. We provide a homogeneous set of median ages for over 100 subclusters in 15 MSFRs; median subcluster ages range
    between 0.5 Myr and 5 Myr. The important science result is the discovery of age gradients across MYStIX regions. The wide
    MSFR age distribution appears as spatially segregated structures with different ages. The Age <SUB>JX</SUB> ages are youngest
    in obscured locations in molecular clouds, intermediate in revealed stellar clusters, and oldest in distributed populations.
    The NIR color index J - H, a surrogate measure of extinction, can serve as an approximate age predictor for young embedded
    clusters.
