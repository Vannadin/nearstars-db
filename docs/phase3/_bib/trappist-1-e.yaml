  title: Forming Planets Around Stars With Non-Solar Elemental Composition
  authors:
  - Jorge, D. M.
  - Kamp, I. E. E.
  - Waters, L. B. F. M.
  - Woitke, P.
  - Spaargaren, R. J.
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.1051/0004-6361/202142738
  abstract: 'Context. Stars in the solar neighbourhood have refractory element ratios slightly different from that of the
    Sun. It is unclear how much the condensation of solids and thus the composition of planets forming around these stars
    is affected. <BR /> Aims: We aim to understand the impact of changing the ratios of the refractory elements Mg, Si, and
    Fe within the range observed in solar-type stars within 150 pc of the Sun on the composition of planets forming around
    them. <BR /> Methods: We use the GGchem code to simulate the condensation of solids in protoplanetary disks with a minimum
    mass solar nebula around main sequence G-type stars in the solar neighbourhood. We extract the stellar elemental composition
    from the Hypatia Database. <BR /> Results: We find that a lower Mg/Si ratio shifts the condensation sequence from forsterite
    (Mg<SUB>2</SUB>SiO<SUB>4</SUB>) and SiO to enstatite (MgSiO<SUB>3</SUB>) and quartz (SiO<SUB>2</SUB>); a lower Fe/S ratio
    leads to the formation of FeS and FeS<SUB>2</SUB> and few or no Fe-bearing silicates. Ratios of refractory elements translate
    directly from the gas phase to the condensed phase for T &lt; 1000 K. However, ratios with respect to volatile elements
    (e.g. oxygen and sulphur) in the condensates - the building blocks of planets - differ from the original stellar composition.
    <BR /> Conclusions: Our study shows that the composition of planets crucially depends on the abundances of the stellar
    system under investigation. Our results can have important implications for planet interiors, which depend strongly on
    the degree of oxidation and the sulphur abundance.'
