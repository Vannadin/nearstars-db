  - Anglada-Escudé, G.
  - Béjar, V. J. S.
  - Casasayas-Barris, N.
  - Galadí-Enríquez, D.
  - Guenther, E. W.
  - Henning, Th.
  - Kaminski, A.
  - Kürster, M.
  - Lampón, M.
  - Lara, L. M.
  - Montes, D.
  - Morales, J. C.
