  year: '2025'
  pubdate: '2025-10-00'
  doi: 10.48550/arXiv.2510.18098
  abstract: 'Unlocking the atmospheres of sub-Neptunes is among JWST''s major achievements, yet such observations demand complex
    analyses that strongly affect interpretations. We present an independent reanalysis of the original JWST transmission
    spectrum of K2-18 b, to assess the robustness of previously claimed detections, explore the parameter space, and implications
    for its formation. The observations were reduced using a combination of public and customized pipelines producing a total
    of 12 different versions of the transmission spectrum by varying: spectral binning, limb-darkening, and a novel correction
    for the occulted stellar spot. We then performed atmospheric retrievals using TauREx 3, comparing models of varying complexity,
    robustly detecting CH$_4$ (3-4$σ$) across all configurations. The evidence for CO$_2$ is weaker and highly model-dependent.
    The tentative detection of dimethyl sulphide (DMS) vanishes in our most comprehensive retrieval models. We find that correcting
    the stellar spot in the NIRISS transit is a critical step, introducing a uniform offset that primarily drives the inference
    of a lower mean molecular weight atmosphere. Furthermore, the assumed complexity of the retrieval model itself introduces
    significant biases; including more molecules systematically increases the retrieved CH$_4$ abundance and atmospheric mean
    molecular weight, even for species without spectral features. The data are consistent with a hydrogen-rich atmosphere
    with an elevated O and an even more elevated C abundance, leading to a super-solar C/O. We show that the physical properties
    of the system planets K2-18 c, and K2-18 b are consistent with those expected by the in situ formation theory of Inside-Out
    Planet Formation (IOPF), interior to the carbon "soot" line, where an elevated C/O ratio of a primordial atmosphere is
    expected to be inherited from the protoplanetary disk.'
