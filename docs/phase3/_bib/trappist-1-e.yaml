- &id025
  arxiv_id: '2403.06928'
  ads_bibcode: 2024MNRAS.529.3971M
  title: 3D simulations of TRAPPIST-1e with varying CO<SUB>2</SUB>, CH<SUB>4</SUB>, and haze profiles
  authors:
  - Mak, Mei Ting
  - Sergeev, Denis E.
  - Mayne, Nathan
  - Banks, Nahum
  - Eager-Nash, Jake
  - Manners, James
  - Arney, Giada
  - Hébrard, Éric
  - Kohary, Krisztian
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.1093/mnras/stae741
  abstract: Using a 3D General Circulation Model, the Unified Model, we present results from simulations of a tidally locked
    TRAPPIST-1e with varying carbon dioxide CO<SUB>2</SUB> and methane CH<SUB>4</SUB> gas concentrations, and their corresponding
    prescribed spherical haze profiles. Our results show that the presence of CO<SUB>2</SUB> leads to a warmer atmosphere
    globally due to its greenhouse effect, with the increase of surface temperature on the dayside surface reaching up to
    ~14.1 K, and on the nightside up to ~21.2 K. Increasing presence of CH<SUB>4</SUB> first elevates the surface temperature
    on the dayside, followed by a decrease due to the balance of tropospheric warming and stratospheric cooling. A thin layer
    of haze, formed when the partial pressures of CH<SUB>4</SUB> to CO<SUB>2</SUB> (pCH<SUB>4</SUB>/pCO<SUB>2</SUB>) = 0.1,
    leads to a dayside warming of ~4.9 K due to a change in the water vapour H<SUB>2</SUB>O distribution. The presence of
    a haze layer that formed beyond the ratio of 0.1 leads to dayside cooling. The haze reaches an optical threshold thickness
    when pCH<SUB>4</SUB>/pCO<SUB>2</SUB> ~ 0.4 beyond which the dayside mean surface temperature does not vary much. The planet
    is more favourable to maintaining liquid water on the surface (mean surface temperature above 273.15 K) when pCO<SUB>2</SUB>
    is high, pCH<SUB>4</SUB> is low, and the haze layer is thin. The effect of CO<SUB>2</SUB>, CH<SUB>4</SUB>, and haze on
    the dayside is similar to that for a rapidly rotating planet. On the contrary, their effect on the nightside depends on
    the wind structure and the wind speed in the simulation.
