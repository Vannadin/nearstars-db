  title: 'Ozone application in different industries: A review of recent developments'
  authors:
  - Epelle, Emmanuel I.
  - Macfarlane, Andrew
  - Cusack, Michael
  - Burns, Anthony
  - Okolie, Jude A.
  - Mackay, William
  - Rateb, Mostafa
  - Yaseen, Mohammed
  year: '2023'
  pubdate: '2023-02-00'
  doi: 10.1016/j.cej.2022.140188
  abstract: Ozone - a powerful antimicrobial agent, has been extensively applied for decontamination purposes in several industries
    (including food, water treatment, pharmaceuticals, textiles, healthcare, and the medical sectors). The advent of the COVID-19
    pandemic has led to recent developments in the deployment of different ozone-based technologies for the decontamination
    of surfaces, materials and indoor environments. The pandemic has also highlighted the therapeutic potential of ozone for
    the treatment of COVID-19 patients, with astonishing results observed. The key objective of this review is to summarize
    recent advances in the utilisation of ozone for decontamination applications in the above-listed industries while emphasising
    the impact of key parameters affecting microbial reduction efficiency and ozone stability for prolonged action. We realise
    that aqueous ozonation has received higher research attention, compared to the gaseous application of ozone. This can
    be attributed to the fact that water treatment represents one of its earliest applications. Furthermore, the application
    of gaseous ozone for personal protective equipment (PPE) and medical device disinfection has not received a significant
    number of contributions compared to other applications. This presents a challenge for which the correct application of
    ozonation can mitigate. In this review, a critical discussion of these challenges is presented, as well as key knowledge
    gaps and open research problems/opportunities.
