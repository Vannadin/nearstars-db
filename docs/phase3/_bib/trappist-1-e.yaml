  arxiv_id: '1506.03845'
  ads_bibcode: 2015ApJ...809...77S
  title: 'The Transiting Exoplanet Survey Satellite: Simulations of Planet Detections and Astrophysical False Positives'
  authors:
  - Sullivan, Peter W.
  - Winn, Joshua N.
  - Berta-Thompson, Zachory K.
  - Charbonneau, David
  - Deming, Drake
  - Dressing, Courtney D.
  - Latham, David W.
  - Levine, Alan M.
  - McCullough, Peter R.
  - Morton, Timothy
  - Ricker, George R.
  - Vanderspek, Roland
