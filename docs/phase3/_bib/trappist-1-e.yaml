  title: 'Real Time and Automatic Analysis Program for WASAVIES: Warning System for Aviation Exposure to Solar Energetic Particles'
  authors:
  - Sato, Tatsuhiko
  - Kataoka, Ryuho
  - Shiota, Daikou
  - Kubo, Yûki
  - Ishii, Mamoru
