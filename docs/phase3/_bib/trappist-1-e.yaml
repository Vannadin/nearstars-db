  abstract: Array programming provides a powerful, compact and expressive syntax for accessing, manipulating and operating
    on data in vectors, matrices and higher-dimensional arrays. NumPy is the primary array programming library for the Python
    language. It has an essential role in research analysis pipelines in fields as diverse as physics, chemistry, astronomy,
    geoscience, biology, psychology, materials science, engineering, finance and economics. For example, in astronomy, NumPy
    was an important part of the software stack used in the discovery of gravitational waves<SUP>1</SUP> and in the first
    imaging of a black hole<SUP>2</SUP>. Here we review how a few fundamental array concepts lead to a simple and powerful
    programming paradigm for organizing, exploring and analysing scientific data. NumPy is the foundation upon which the scientific
    Python ecosystem is constructed. It is so pervasive that several projects, targeting audiences with specialized needs,
    have developed their own NumPy-like interfaces and array objects. Owing to its central position in the ecosystem, NumPy
    increasingly acts as an interoperability layer between such array computation libraries and, together with its application
    programming interface (API), provides a flexible framework to support the next decade of scientific and industrial analysis.
