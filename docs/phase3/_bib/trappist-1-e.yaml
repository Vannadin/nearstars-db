- &id196
  arxiv_id: '1903.07298'
  ads_bibcode: 2019A&A...625A..12G
  title: The habitability of stagnant-lid Earths around dwarf stars
  authors:
  - Godolt, Mareike
  - Tosi, Nicola
  - Stracke, Barbara
  - Grenfell, John Lee
  - Ruedas, Thomas
  - Spohn, Tilman
  - Rauer, Heike
  year: '2019'
  pubdate: '2019-05-00'
  doi: 10.1051/0004-6361/201834658
  abstract: 'Context. The habitability of a planet depends on various factors, such as the delivery of water during its formation,
    the co-evolution of the interior and the atmosphere, and the stellar irradiation which changes in time. <BR /> Aims: Since
    an unknown number of rocky extrasolar planets may operate in a one-plate convective regime, i.e. without plate tectonics,
    our aim is to understand the conditions under which planets in such a stagnant-lid regime may support habitable surface
    conditions. Understanding the interaction of the planetary interior and outgassing of volatiles in combination with the
    evolution of the host star is crucial to determining the potential habitability. M-dwarf stars in particular possess a
    high-luminosity pre-main sequence phase that endangers the habitability of planets around them via water loss. We therefore
    explore the potential of secondary outgassing from the planetary interior to rebuild a water reservoir allowing for habitability
    at a later stage. <BR /> Methods: We compute the boundaries of the habitable zone around M-, K-, G-, and F-dwarf stars
    using a 1D cloud-free radiative-convective climate model accounting for the outgassing history of CO<SUB>2</SUB> and H<SUB>2</SUB>O
    from an interior evolution and outgassing model for different interior compositions and stellar luminosity evolutions.
    <BR /> Results: The outer edge of the habitable zone strongly depends on the amount of CO<SUB>2</SUB> outgassed from the
    interior, while the inner edge is mainly determined via the stellar irradiation, as soon as a sufficiently large water
    reservoir has been outgassed. A build-up of a secondary surface and atmospheric water reservoir for planets around M-dwarf
    stars is possible even after severe water loss during the high-luminosity pre-main sequence phase as long as some water
    has been retained within the mantle. For small mantle water reservoirs, between 62 and 125 ppm, a time delay in outgassing
    from the interior permits such a secondary water reservoir build-up especially for early and mid-M dwarfs because their
    pre-main sequence lifetimes are shorter than the outgassing timescale. <BR /> Conclusions: We show that Earth-like stagnant-lid
    planets allow for habitable surface conditions within a continuous habitable zone that is dependent on interior composition.
    Secondary outgassing from the interior may allow for habitability of planets around M-dwarf stars after severe water loss
    during the high-luminosity pre-main sequence phase by rebuilding a surface water reservoir.'
  source: citation_of=2021AsBio..21.1325B
