  title: petitRADTRANS. A Python radiative transfer package for exoplanet characterization and retrieval
  authors:
  - Mollière, P.
  - Wardenier, J. P.
  - van Boekel, R.
  - Henning, Th.
  - Molaverdikhani, K.
