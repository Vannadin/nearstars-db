  arxiv_id: '2404.02932'
  ads_bibcode: 2024arXiv240402932R
  title: Report of the Working Group on Strategic Exoplanet Initiatives with HST and JWST
  authors:
  - Redfield, Seth
  - Batalha, Natasha
  - Benneke, Björn
  - Biller, Beth
  - Espinoza, Nestor
  - France, Kevin
  - Konopacky, Quinn
