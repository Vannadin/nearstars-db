  abstract: 'The rapid increase of carbon dioxide concentration in Earth''s modern atmosphere is a matter of major concern.
    But for the atmosphere of roughly two-and-half billion years ago, interest centres on a different gas: free oxygen (O<SUB>2</SUB>)
    spawned by early biological production. The initial increase of O<SUB>2</SUB> in the atmosphere, its delayed build-up
