- arxiv_id: null
  ads_bibcode: 2004JRP....24A.123R
  title: 'Effects of ionising radiation exposure on plants, fish and mammals: relevant data for environmental radiation protection'
  authors:
  - Real, A.
  - Sundell-Bergman, S.
  - Knowles, J. F.
  - Woodhead, D. S.
  - Zinger, I.
  year: '2004'
  pubdate: '2004-12-00'
  doi: 10.1088/0952-4746/24/4A/008
  abstract: In order to develop a framework for the assessment of the environmental impact of radiation, it is necessary to
    establish the relationship between exposure (dose rate, accumulated dose) and the effects that may be induced in plants
    and animals. With this purpose in mind, the data available on effects induced by ionising radiation in various wildlife
    groups have been reviewed as part of the FASSET project. This paper has highlighted that the available information on
    the effects of low dose rate, continuous irradiation (&lt;10<SUP>3</SUP> µGy h<SUP>-1</SUP>) is reasonable for plants,
    fish and mammals, but is scarce or non-existent for other wildlife groups. Thus, the effects induced in plants, fish and
    mammals after chronic exposure to radiation are presented in this paper. The fragmentary nature of the available, relevant
    information has made it very difficult to characterise the desired dose rate-response relationships in any detail. However,
    it can be broadly concluded that, although minor effects may be seen at lower dose rates in the most sensitive species
    and systems, the threshold for statistically significant effects in most studies is about 10<SUP>2</SUP> µGy h<SUP>-1</SUP>.
    The responses then increase progressively with increasing dose rate and usually become very clear at dose rates&gt;10<SUP>3</SUP>
    µGy h<SUP>-1</SUP> sustained for a large fraction of the lifespan.
