- &id241
  arxiv_id: '1302.4566'
  ads_bibcode: 2013ApJ...767...65V
  title: The Habitable Zone of Earth-like Planets with Different Levels of Atmospheric Pressure
  authors:
  - Vladilo, Giovanni
  - Murante, Giuseppe
  - Silva, Laura
  - Provenzale, Antonello
  - Ferri, Gaia
  - Ragazzini, Gregorio
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1088/0004-637X/767/1/65
  abstract: As a contribution to the study of the habitability of extrasolar planets, we implemented a one-dimensional energy
    balance model (EBM), the simplest seasonal model of planetary climate, with new prescriptions for most physical quantities.
    Here we apply our EBM to investigate the surface habitability of planets with an Earth-like atmospheric composition but
    different levels of surface pressure. The habitability, defined as the mean fraction of the planet's surface on which
    liquid water could exist, is estimated from the pressure-dependent liquid water temperature range, taking into account
    seasonal and latitudinal variations of surface temperature. By running several thousands of EBM simulations we generated
    a map of the habitable zone (HZ) in the plane of the orbital semi-major axis, a, and surface pressure, p, for planets
    in circular orbits around a Sun-like star. As pressure increases, the HZ becomes broader, with an increase of 0.25 AU
    in its radial extent from p = 1/3 to 3 bar. At low pressure, the habitability is low and varies with a; at high pressure,
    the habitability is high and relatively constant inside the HZ. We interpret these results in terms of the pressure dependence
    of the greenhouse effect, the efficiency of horizontal heat transport, and the extent of the liquid water temperature
    range. Within the limits discussed in the paper, the results can be extended to planets in eccentric orbits around non-solar-type
    stars. The main characteristics of the pressure-dependent HZ are modestly affected by variations of planetary properties,
    particularly at high pressure.
