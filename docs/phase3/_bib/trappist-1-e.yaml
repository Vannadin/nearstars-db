- &id466
  arxiv_id: '1605.00989'
  ads_bibcode: 2016MNRAS.463L..64A
  title: Did high-energy astrophysical sources contribute to Martian atmospheric loss?
  authors:
  - Atri, Dimitra
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.1093/mnrasl/slw155
  abstract: Mars is believed to have had a substantial atmosphere in the past. Atmospheric loss led to depressurization and
    cooling, and is thought to be the primary driving force responsible for the loss of liquid water from its surface. Recently,
    Mars Atmosphere and Volatile Evolution observations have provided new insight into the physics of atmospheric loss induced
    by Interplanetary Coronal Mass Ejections and solar wind interacting with the Martian atmosphere. In addition to solar
    radiation, it is likely that its atmosphere has been exposed to radiation bursts from high-energy astrophysical sources
    which become highly probable on time-scales of ∼Gy and beyond. These sources are capable of significantly enhancing the
    rates of photoionization and charged particle-induced ionization in the upper atmosphere. We use Monte Carlo simulations
    to model the interaction of charged particles and photons from astrophysical sources in the upper Martian atmosphere and
    discuss its implications on atmospheric loss. Our calculations suggest that the passage of the Solar system though dense
    interstellar clouds is the most significant contributor to atmospheric loss among the sources considered here.
