  ads_bibcode: 2011MMBR...75..133S
  title: Oxidative Stress Resistance in Deinococcus radiodurans
  authors:
  - Slade, Dea
  - Radman, Miroslav
  year: '2011'
  pubdate: '2011-03-00'
  doi: 10.1128/MMBR.00015-10
  abstract: Deinococcus radiodurans is a robust bacterium best known for its capacity to repair massive DNA damage efficiently
    and accurately. It is extremely resistant to many DNA-damaging agents, including ionizing radiation and UV radiation (100
    to 295 nm), desiccation, and mitomycin C, which induce oxidative damage not only to DNA but also to all cellular macromolecules
    via the production of reactive oxygen species. The extreme resilience of D. radiodurans to oxidative stress is imparted
    synergistically by an efficient protection of proteins against oxidative stress and an efficient DNA repair mechanism,
    enhanced by functional redundancies in both systems. D. radiodurans assets for the prevention of and recovery from oxidative
    stress are extensively reviewed here. Radiation- and desiccation-resistant bacteria such as D. radiodurans have substantially
    lower protein oxidation levels than do sensitive bacteria but have similar yields of DNA double-strand breaks. These findings
    challenge the concept of DNA as the primary target of radiation toxicity while advancing protein damage, and the protection
    of proteins against oxidative damage, as a new paradigm of radiation toxicity and survival. The protection of DNA repair
    and other proteins against oxidative damage is imparted by enzymatic and nonenzymatic antioxidant defense systems dominated
    by divalent manganese complexes. Given that oxidative stress caused by the accumulation of reactive oxygen species is
    associated with aging and cancer, a comprehensive outlook on D. radiodurans strategies of combating oxidative stress may
    open new avenues for antiaging and anticancer treatments. The study of the antioxidation protection in D. radiodurans
    is therefore of considerable potential interest for medicine and public health.
