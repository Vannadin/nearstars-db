  ads_bibcode: 2024NatAs...8..101Y
  title: Inferring chemical disequilibrium biosignatures for Proterozoic Earth-like exoplanets
  authors:
  - Young, Amber V.
  - Robinson, Tyler D.
  - Krissansen-Totton, Joshua
  - Schwieterman, Edward W.
  - Wogan, Nicholas F.
