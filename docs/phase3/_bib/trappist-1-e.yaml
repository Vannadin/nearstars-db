  ads_bibcode: 2025PSJ.....6..256W
  title: 'The Open-source Photochem Code: A General Chemical and Climate Model for Interpreting (Exo)Planet Observations'
  authors:
  - Wogan, Nicholas F.
  - Batalha, Natasha E.
  - Zahnle, Kevin
  - Krissansen-Totton, Joshua
  - Catling, David C.
