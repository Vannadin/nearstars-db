- &id480
  arxiv_id: '1507.02823'
  ads_bibcode: 2014P&SS...98...66G
  title: Sensitivity of biosignatures on Earth-like planets orbiting in the habitable zone of cool M-dwarf Stars to varying
    stellar UV radiation and surface biomass emissions
  authors:
  - Grenfell, J. L.
  - Gebauer, S.
  - v. Paris, P.
  - Godolt, M.
  - Rauer, H.
  year: '2014'
  pubdate: '2014-08-00'
  doi: 10.1016/j.pss.2013.10.006
  abstract: We find that variations in the UV emissions of cool M-dwarf stars have a potentially large impact upon atmospheric
    biosignatures in simulations of Earth-like exoplanets i.e. planets with Earth's development, and biomass and a molecular
    nitrogen-oxygen dominated atmosphere. Starting with an assumed black-body stellar emission for an M7 class dwarf star,
    the stellar UV irradiation was increased stepwise and the resulting climate-photochemical response of the planetary atmosphere
    was calculated. Results suggest a "Goldilocks" effect with respect to the spectral detection of ozone. At weak UV levels,
    the ozone column was weak (due to weaker production from the Chapman mechanism) hence its spectral detection was challenging.
    At strong UV levels, ozone formation is stronger but its associated stratospheric heating leads to a weakening in temperature
    gradients between the stratosphere and troposphere, which results in weakened spectral bands. Also, increased UV levels
    can lead to enhanced abundances of hydrogen oxides which oppose the ozone formation effect. At intermediate UV (i.e. with
    ×10 the stellar UV radiative flux of black body Planck curves corresponding to spectral class M7) the conditions are "just
    right" for spectral detection. Results suggest that the planetary ozone profile is sensitive to the UV output of the star
    from ~200-350 nm.We also investigated the effect of increasing the top-of-atmosphere incoming Lyman-α radiation but this
    had only a minimal effect on the biosignatures since it was efficiently absorbed in the uppermost planetary atmospheric
    layer, mainly by abundant methane. Earlier studies have suggested that the planetary methane is an important stratospheric
    heater which critically affects the vertical temperature gradient, hence the strength of spectral emission bands. We therefore
    varied methane and nitrous oxide biomass emissions, finding e.g. that a lowering in methane emissions by ×100 compared
    with the Earth can influence temperature hence have a significant effect on biosignature spectral bands such as those
    of nitrous oxide. Our work emphasises the need for future missions to characterise the UV of cool M-dwarf stars in order
    to understand potential biosignature signals.
  source: citation_of=2023ApJ...959...45C
