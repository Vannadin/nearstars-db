  ads_bibcode: 2024AJ....167..216A
  title: 'JWST COMPASS: NIRSpec/G395H Transmission Observations of the Super-Earth TOI-836b'
  authors:
  - Alderson, Lili
  - Batalha, Natasha E.
  - Wakeford, Hannah R.
  - Wallack, Nicole L.
  - Aguichine, Artyom
  - Teske, Johanna
