  arxiv_id: '2307.10931'
  ads_bibcode: 2024AJ....167...97C
  title: 'Haze Optical Depth in Exoplanet Atmospheres Varies with Rotation Rate: Implications for Observations'
  authors:
  - Cohen, Maureen
  - Palmer, Paul I.
  - Paradise, Adiv
  - Bollasina, Massimo A.
  - Tiranti, Paola Ines
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.3847/1538-3881/ad1ab9
  abstract: Transmission spectroscopy supports the presence of uncharacterized, light-scattering and -absorbing hazes in the
    atmospheres of many exoplanets. The complexity of factors influencing the formation, 3D transport, radiative impact, and
    removal of hazes makes it challenging to match theoretical models to the existing data. Our study simplifies these factors
    to focus on the interaction between planetary general circulation and haze distribution at the planetary limb. We use
    an intermediate-complexity general circulation model, ExoPlaSim, to simulate idealized organic haze particles as radiatively
    active tracers in the atmospheres of tidally locked terrestrial planets for 32 rotation rates. We find three distinct
    3D spatial haze distributions, corresponding to three circulation regimes, each with a different haze profile at the limb.
    All regimes display significant terminator asymmetry. In our parameter space, super-Earth-sized planets with rotation
    periods greater than 13 days have the lowest haze optical depths at the terminator, supporting the choice of slower rotators
    as observing targets.
