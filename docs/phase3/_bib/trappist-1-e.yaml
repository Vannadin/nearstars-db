  abstract: As transmission spectroscopy of Earth-like planets grows feasible with next-generation telescopes, it is critical
    to prioritize targets by the potential to detect biosignatures in their atmospheres and to expand the search for life
    beyond the perspective of modern Earth. Building on earlier habitable zone catalogs, we identify 11 of the most potentially
    Earth-like rocky worlds, generating spectra for each planet based on atmospheric models of modern Earth and of Earth 0.8
    Gyr ago, 2.0 Gyr ago, and 3.9 Gyr ago. For 7 planets that transit, including TRAPPIST-1 e and TOI-715 b, we conduct atmospheric
    retrievals of simulated JWST data, determining the necessary number of observations to detect biosignatures across four
    evolutionary stages. The resulting forward models and atmospheric retrievals provide reference points in the search for
    life with JWST and future space- and ground-based telescopes.
