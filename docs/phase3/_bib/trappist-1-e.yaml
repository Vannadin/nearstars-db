  ads_bibcode: 2026ApJ...998L..31B
  title: Hubble's Multiyear Search for Exospheres in the TRAPPIST-1 System Reveals Frequent Microflares
  authors:
  - Berardo, David
  - de Wit, Julien
  - Gillon, Michael
  - Howard, Ward S.
  - Bourrier, Vincent
  - Bolmont, Emeline
  - Cotton, Matthew W.
  - Quatresooz, Florian
  - Hoerner, Léonie
  - Burdanov, Artem
  - Burgasser, Adam J.
