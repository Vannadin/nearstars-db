  arxiv_id: '2401.03809'
  ads_bibcode: 2024A&A...684A..25J
  title: ARES. VI. Viability of one-dimensional retrieval models for transmission spectroscopy characterization of exo-atmospheres
    in the era of JWST and Ariel
  authors:
  - Jaziri, Adam Yassin
  - Pluriel, William
  - Bocchieri, Andrea
  - Panek, Emilie
  - Teinturier, Lucas
  - Ivanova, Anastasiia
  - Rektsini, Natalia E.
  - Drossart, Pierre
  - Beaulieu, Jean-Philippe
  - Falco, Aurélien
  - Leconte, Jérémy
  - Mugnai, Lorenzo V.
  - Venot, Olivia
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.1051/0004-6361/202347379
  abstract: Observed exoplanet transit spectra are usually retrieved using 1D models to determine atmospheric composition.
    However, planetary atmospheres are 3D. With the new state-of-the-art James Webb Space Telescope (JWST) and future space
    telescopes such as Ariel (Atmospheric Remote-sensing Infrared Exoplanet Large-survey), we will be able to obtain increasingly
    accurate transit spectra. The 3D effects on the spectra will be visible, and we can expect biases in the 1D extractions.
    In order to elucidate these biases, we have built theoretical observations of transit spectra, from 3D atmospheric modeling
    through transit modeling to instrument modeling. For this purpose, we used a global climate model (GCM) to simulate the
    atmosphere, a 3D radiative transfer model to calculate theoretical transmission spectra, and adapted instrument software
    from JWST and Ariel to reproduce telescope noise. Next, we used a 1D radiative transfer inversion model to retrieve the
    known input atmosphere and disentangle any biases that might be observed. The study was done from warm planets to ultra-hot
    planets to assess biases as a function of average planet temperature. Three-dimensional effects are observed to be strongly
    nonlinear from the coldest to the hottest planets. These effects also depend on the planet's metallicity and gravity.
    Considering equilibrium chemistry, 3D effects are observed through very strong variations in certain features of the molecule
    or very small variations over the whole spectrum. We conclude that we cannot rely on the uncertainty of retrievals at
    all pressures, and that we must be cautious about the results of retrievals at the top of the atmosphere. However the
    results are still fairly close to the truth at mid-altitudes (those probed). We also need to be careful with the chemical
    models used for planetary atmosphere. If the chemistry of one molecule is not correctly described, this will bias all
    the others, and the retrieved temperature as well. Finally, although fitting a wider wavelength range and higher resolution
    has been shown to increase retrieval accuracy, we show that this could depend on the wavelength range chosen, due to the
    accuracy on modeling the different features. In any case, 1D retrievals are still correct for the detection of molecules,
    even in the event of an erroneous abundance retrieval.
