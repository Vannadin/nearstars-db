  arxiv_id: null
  ads_bibcode: 2012JGRE..11710007M
  title: The history of Mars' dynamo as revealed by modeling magnetic anomalies near Tyrrhenus Mons and Syrtis Major
  authors:
  - Milbury, C.
  - Schubert, G.
  - Raymond, C. A.
  - Smrekar, S. E.
  - Langlais, B.
  year: '2012'
  pubdate: '2012-10-00'
  doi: 10.1029/2012JE004099
  abstract: The lack of magnetic anomalies within the major impact basins (Hellas, Argyre, and Isidis) has led many investigators
    to the conclusion that Mars' dynamo shut down prior to the time when these basins formed (∼4.0 Ga). We test this hypothesis
    by analyzing gravity and magnetic anomalies in the regions surrounding Tyrrhenus Mons and Syrtis Major, two volcanoes
    that were active during the late Noachian and Hesperian. We model magnetic anomalies that are associated with gravity
    anomalies and generally find that sources located below Noachian surface units tend to favor paleopoles near the equator
    and sources located below Hesperian surface features favor paleopoles near the geographical poles, suggesting polar wander
    during the Noachian-Hesperian. Both paleopole clusters have positive and negative polarities, indicating reversals of
    the field during the Noachian and Hesperian. Magnetization of sources below Hesperian surfaces is evidence that the dynamo
    persisted beyond the formation of the major impact basins. The demagnetization associated with the volcanic construct
    of Syrtis Major implies dynamo cessation occurred while it was geologically active approximately 3.6 billion years ago.
    Timing of dynamo activity is fundamentally linked to Mars' climate via the stability of its atmosphere, and is coupled
    to the extent and duration of surface geologic activity. Thus, the dynamo history is key for understanding both when Mars
    was most geologically active and when it may have been most hospitable to life.
