- &id424
  arxiv_id: '2004.09076'
  ads_bibcode: 2020Icar..34513770H
  title: 'Warming early Mars with climate cycling: The effect of CO<SUB>2</SUB>-H<SUB>2</SUB> collision-induced absorption'
  authors:
  - Hayworth, Benjamin P. C.
  - Kopparapu, Ravi Kumar
  - Haqq-Misra, Jacob
  - Batalha, Natasha E.
  - Payne, Rebecca C.
  - Foley, Bradford J.
  - Ikwut-Ukwa, Mma
  - Kasting, James F.
  year: '2020'
  pubdate: '2020-07-00'
  doi: 10.1016/j.icarus.2020.113770
  abstract: Explaining the evidence for surface liquid water on early Mars has been a challenge for climate modelers, as the
    sun was ∼30% less luminous during the late-Noachian. We propose that the additional greenhouse forcing of CO<SUB>2</SUB>
    - H<SUB>2</SUB> collision-induced absorption is capable of bringing the surface temperature above freezing and can put
    early Mars into a limit-cycling regime. Limit cycles occur when insolation is low and CO<SUB>2</SUB> outgassing rates
    are unable to balance with the rapid drawdown of CO<SUB>2</SUB> during warm weathering periods. Planets in this regime
    will alternate between global glaciation and transient warm climate phases. This mechanism is capable of explaining the
    geomorphological evidence for transient warm periods in the martian record. Previous work has shown that collision-induced
    absorption of CO<SUB>2</SUB> - H<SUB>2</SUB> was capable of deglaciating early Mars, but only with high H<SUB>2</SUB>
    outgassing rates (greater than ∼600 Tmol/yr) and at high surface pressures (between 3 to 4 bars). We used new theoretically
    derived collision-induced absorption coefficients for CO<SUB>2</SUB> - H<SUB>2</SUB> to reevaluate the climate limit cycling
    hypothesis for early Mars. Using the new and stronger absorption coefficients in our 1-dimensional radiative convective
    model as well as our energy balance model, we find that limit cycling can occur with an H<SUB>2</SUB> outgassing rate
    as low as ∼300 Tmol/yr at surface pressures below 3 bars. Our results agree more closely with paleoparameters for early
    martian surface pressure and hydrogen abundance.
