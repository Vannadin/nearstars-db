  ads_bibcode: 2019Icar..317..470C
  title: 'Mars global simulant MGS-1: A Rocknest-based open standard for basaltic martian regolith simulants'
  authors:
  - Cannon, Kevin M.
  - Britt, Daniel T.
  - Smith, Trent M.
  - Fritsche, Ralph F.
