  abstract: We report the discovery of KMT-2020-BLG-0414Lb, with a planet-to-host mass ratio q <SUB>2</SUB> = 0.9─1.2 × 10<SUP>−5</SUP>
    = 3─4 ⊕ at 1σ, which is the lowest mass-ratio microlensing planet to date. Together with two other recent discoveries
    (4 ≲ q/q <SUB>⊕</SUB> ≲ 6), it fills out the previous empty sector at the bottom of the triangular (log s, log q) diagram,
    where s is the planet-host separation in units of the angular Einstein radius θE. Hence, these discoveries call into question
    the existence, or at least the strength, of the break in the mass-ratio function that was previously suggested to account
    for the paucity of very low-q planets. Due to the extreme magnification of the event, A <SUB>max</SUB> ∼ 1450 for the
    underlying single-lens event, its light curve revealed a second companion with q <SUB>3</SUB> ∼ 0.05 and |log s <SUB>3</SUB>|
    ∼ 1, i.e., a factor ∼ 10 closer to or farther from the host in projection. The measurements of the microlens parallax
    π <SUB>E</SUB> and the angular Einstein radius θE allow estimates of the host, planet and second companion masses, (M
    <SUB>1</SUB>, M <SUB>2</SUB>, M <SUB>3</SUB>) ∼ (0.3 M <SUB>⊙</SUB>, 1.0 M <SUB>⊕</SUB>, 17 M<SUB>J</SUB> ), the planet
    and second companion projected separations, (a <SUB>⊥,2</SUB>, a <SUB>⊥,3</SUB>) ∼ (1.5, 0.15 or 15) au, and system distance
    D <SUB>L</SUB> ∼ 1 kpc. The lens could account for most or all of the blended light (I ∼ 19.3) and so can be studied immediately
    with high-resolution photometric and spectroscopic observations that can further clarify the nature of the system. The
