  ads_bibcode: 2010SSRv..153..317H
  title: Implications of Rotation, Orbital States, Energy Sources, and Heat Transport for Internal Processes in Icy Satellites
  authors:
  - Hussmann, Hauke
  - Choblet, Gaël
  - Lainey, Valéry
