  abstract: Mass-independent isotopic signatures for δ<SUP>33</SUP>S, δ<SUP>34</SUP>S, and δ<SUP>36</SUP>S from sulfide and
    sulfate in Precambrian rocks indicate that a change occurred in the sulfur cycle between 2090 and 2450 million years ago
    (Ma). Before 2450 Ma, the cycle was influenced by gas-phase atmospheric reactions. These atmospheric reactions also played
    a role in determining the oxidation state of sulfur, implying that atmospheric oxygen partial pressures were low and that
    the roles of oxidative weathering and of microbial oxidation and reduction of sulfur were minimal. Atmospheric fractionation
    processes should be considered in the use of sulfur isotopes to study the onset and consequences of microbial fractionation
    processes in Earth's early history.
