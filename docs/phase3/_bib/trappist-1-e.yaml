  arxiv_id: '2102.05027'
  ads_bibcode: 2021ApJ...908..164K
  title: Nitrogen Dioxide Pollution as a Signature of Extraterrestrial Technology
  authors:
  - Kopparapu, Ravi
  - Arney, Giada
  - Haqq-Misra, Jacob
  - Lustig-Yaeger, Jacob
  - Villanueva, Geronimo
  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.3847/1538-4357/abd7f7
  abstract: Nitrogen dioxide (NO<SUB>2</SUB>) on Earth today has biogenic and anthropogenic sources. During the Covid-19 pandemic,
    observations of global NO<SUB>2</SUB> emissions have shown a significant decrease in urban areas. Drawing upon this example
    of NO<SUB>2</SUB> as an industrial byproduct, we use a one-dimensional photochemical model and synthetic spectral generator
    to assess the detectability of NO<SUB>2</SUB> as an atmospheric technosignature on exoplanets. We consider cases of an
    Earth-like planet around Sun-like, K-dwarf, and M-dwarf stars. We find that NO<SUB>2</SUB> concentrations increase on
    planets around cooler stars because there are fewer short-wavelength photons that can photolyze NO<SUB>2</SUB>. In cloud-free
    results, present Earth-level NO<SUB>2</SUB> on an Earth-like planet around a Sun-like star at 10 pc can be detected with
    signal-to-noise ratio ∼5 within ∼400 hr with a 15 m LUVOIR-like telescope when observed in the 0.2-0.7 μm range where
    NO<SUB>2</SUB> has a strong absorption. However, clouds and aerosols can reduce the detectability and could mimic the
    NO<SUB>2</SUB> feature. Historically, global NO<SUB>2</SUB> levels were 3× higher, indicating the capability of detecting
    a civilization at the stage where Earth's civilization was 40 yr ago. Transit and direct imaging observations to detect
    infrared spectral signatures of NO<SUB>2</SUB> on habitable planets around M-dwarfs would need several hundred hours of
    observation time, both due to weaker NO<SUB>2</SUB> absorption in this region and because of masking features by dominant
    H<SUB>2</SUB>O and CO<SUB>2</SUB> bands in the infrared part of the spectrum. Non-detection at these levels could be used
    to place upper limits on the prevalence of NO<SUB>2</SUB> as a technosignature.
