  arxiv_id: '2212.05052'
  ads_bibcode: 2023ApJ...942L...4R
  title: General Circulation Model Constraints on the Detectability of the CO<SUB>2</SUB>-CH<SUB>4</SUB> Biosignature Pair
    on TRAPPIST-1e with JWST
  authors:
  - Rotman, Yoav
  - Komacek, Thaddeus D.
  - Villanueva, Geronimo L.
  - Fauchez, Thomas J.
  - May, Erin M.
  year: '2023'
  pubdate: '2023-01-00'
  doi: 10.3847/2041-8213/acaa3f
  abstract: Terrestrial exoplanets such as TRAPPIST-1e will be observed in a new capacity with the JWST/Near Infrared Spectrograph
    (NIRSpec), which is expected to be able to detect CO<SUB>2</SUB>, CH<SUB>4</SUB>, and O<SUB>2</SUB> signals, if present,
    with multiple coadded transit observations. The CO<SUB>2</SUB>-CH<SUB>4</SUB> pair in particular is theorized to be a
    potential biosignature when inferred to be in chemical disequilibrium. Here, we simulate TRAPPIST-1e's atmosphere using
    the ExoCAM general circulation model, assuming an optimistic haze-free, tidally locked planet with an aquaplanet surface,
    with varying atmospheric compositions from 10<SUP>-4</SUP> bar to 1 bar of partial CO<SUB>2</SUB> pressure with 1 bar
    of background N<SUB>2</SUB>. We investigate cases both with and without a modern Earth-like CH<SUB>4</SUB> mixing ratio
    to examine the effect of CO<SUB>2</SUB> and CH<SUB>4</SUB> on the transmission spectrum and climate state of the planet.
    We demonstrate that in the optimistic haze-free cloudy case, H<SUB>2</SUB>O, CO<SUB>2</SUB>, and CH<SUB>4</SUB> could
    all be detectable in less than 50 transits within an atmosphere of 1 bar N<SUB>2</SUB> and 10 mbar CO<SUB>2</SUB> during
    JWST's lifespan with NIRSpec as long as the noise floor is ≲10 ppm. We find that in these optimistic cases, JWST may be
    able to detect potential biosignature pairs such as CO<SUB>2</SUB>-CH<SUB>4</SUB> in TRAPPIST-1e's atmosphere across a
    variety of atmospheric CO<SUB>2</SUB> content, and that temporal climate variability does not significantly affect spectral
    feature variability for NIRSpec PRISM.
