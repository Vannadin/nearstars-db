  abstract: Measurements of the atmospheric carbon (C) and oxygen (O) relative to hydrogen (H) in hot Jupiters (relative to
    their host stars) provide insight into their formation location and subsequent orbital migration<SUP>1,2</SUP>. Hot Jupiters
    that form beyond the major volatile (H<SUB>2</SUB>O/CO/CO<SUB>2</SUB>) ice lines and subsequently migrate post disk-dissipation
    are predicted have atmospheric carbon-to-oxygen ratios (C/O) near 1 and subsolar metallicities<SUP>2</SUP>, whereas planets
    that migrate through the disk before dissipation are predicted to be heavily polluted by infalling O-rich icy planetesimals,
    resulting in C/O &lt; 0.5 and super-solar metallicities<SUP>1,2</SUP>. Previous observations of hot Jupiters have been
    able to provide bounded constraints on either H<SUB>2</SUB>O (refs. <SUP>3-5</SUP>) or CO (refs. <SUP>6,7</SUP>), but
    not both for the same planet, leaving uncertain<SUP>4</SUP> the true elemental C and O inventory and subsequent C/O and
    metallicity determinations. Here we report spectroscopic observations of a typical transiting hot Jupiter, WASP-77Ab.
    From these, we determine the atmospheric gas volume mixing ratio constraints on both H<SUB>2</SUB>O and CO (9.5 × 10<SUP>‒5</SUP>-1.5
    × 10<SUP>‒4</SUP> and 1.2 × 10<SUP>‒4</SUP>-2.6 × 10<SUP>‒4</SUP>, respectively). From these bounded constraints, we are
    able to derive the atmospheric C/H (0.35<SUB>‒0.10</SUB><SUP>+0.17</SUP>? × solar) and O/H (0.32<SUB>‒0.08</SUB><SUP>+0.12</SUP>?
    × solar) abundances and the corresponding atmospheric carbon-to-oxygen ratio (C/O = 0.59 ± 0.08; the solar value is 0.55).
    The sub-solar (C+O)/H (0.33<SUB>‒0.09</SUB><SUP>+0.13</SUP>? × solar) is suggestive of a metal-depleted atmosphere relative
    to what is expected for Jovian-like planets<SUP>1</SUP> while the near solar value of C/O rules out the disk-free migration/C-rich<SUP>2</SUP>
    atmosphere scenario.
