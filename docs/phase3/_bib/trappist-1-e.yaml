  arxiv_id: '1710.11325'
  ads_bibcode: 2017ApJ...851...91N
  title: Statistical Studies of Solar White-light Flares and Comparisons with Superflares on Solar-type Stars
  authors:
  - Namekata, Kosuke
  - Sakaue, Takahito
  - Watanabe, Kyoko
  - Asai, Ayumi
  - Maehara, Hiroyuki
  - Notsu, Yuta
  - Notsu, Shota
  - Honda, Satoshi
  - Ishii, Takako T.
  - Ikuta, Kai
  - Nogami, Daisaku
  - Shibata, Kazunari
  year: '2017'
  pubdate: '2017-12-00'
  doi: 10.3847/1538-4357/aa9b34
  abstract: 'Recently, many superflares on solar-type stars have been discovered as white-light flares (WLFs). The statistical
    study found a correlation between their energies (E) and durations (τ): τ \propto {E}<SUP>0.39</SUP>, similar to those
    of solar hard/soft X-ray flares, τ \propto {E}<SUP>0.2{--</SUP>0.33}. This indicates a universal mechanism of energy release
    on solar and stellar flares, i.e., magnetic reconnection. We here carried out statistical research on 50 solar WLFs observed
    with Solar Dynamics Observatory/HMI and examined the correlation between the energies and durations. As a result, the
    E-τ relation on solar WLFs (τ \propto {E}<SUP>0.38</SUP>) is quite similar to that on stellar superflares (τ \propto {E}<SUP>0.39</SUP>).
    However, the durations of stellar superflares are one order of magnitude shorter than those expected from solar WLFs.
    We present the following two interpretations for the discrepancy: (1) in solar flares, the cooling timescale of WLFs may
    be longer than the reconnection one, and the decay time of solar WLFs can be elongated by the cooling effect; (2) the
    distribution can be understood by applying a scaling law (τ \propto {E}<SUP>1/3</SUP>{B}<SUP>-5/3</SUP>) derived from
    the magnetic reconnection theory. In the latter case, the observed superflares are expected to have 2-4 times stronger
    magnetic field strength than solar flares.'
