  doi: 10.1051/0004-6361:20020527
  abstract: 'Darwin (ESA) and Terrestrial Planet Finder-TPF (NASA) are two projects of space telescopes aiming at the detection
    of extra-solar terrestrial planets and some of their atmospheric components. In particular, they will be sensitive to
    the 9.6 mu m band of O<SUB>3</SUB> which may be the signature of an O<SUB>2</SUB> -rich atmosphere produced by photosynthetic
    life forms. In this paper, we point out that O<SUB>2</SUB> , and hence O<SUB>3</SUB> , can also be produced by photochemistry
    and we investigate the risk of ``false positive'''' detection of life incurred by these missions. For this purpose, we
    have developed new photochemical and radiative-convective models of terrestrial planet atmospheres. By modelling the photochemistry
    of some realistic atmospheres, (including present and past Earth and Mars) we show that O<SUB>2</SUB> -rich atmospheres
    (up to 5%) and IR absorbing O<SUB>3</SUB> layers can build up without life from H<SUB>2</SUB>O and CO<SUB>2</SUB> photolysis.
    However, Darwin can still provide a reliable way to detect, through their mid-infrared signatures, ecosystems which have
    developed oxygenic photosynthesis. Indeed, the two photochemical sources of O<SUB>2</SUB> are shown to interfere with
    each other; second, when the CO<SUB>2</SUB> pressure is high enough (&gt;50 mbar) to produce appreciable amounts of O<SUB>2</SUB>
    and O<SUB>3</SUB> , it also masks the O<SUB>3</SUB> feature; and third, the by-products of H<SUB>2</SUB>O photolysis destroy
    O<SUB>3</SUB> . As a result, whereas the unique detection of O<SUB>2</SUB> remains ambiguous, the simultaneous infrared
    detection of O<SUB>3</SUB> , CO<SUB>2</SUB> and H<SUB>2</SUB>O , provided by Darwin, is established to be a robust way
    to discriminate photochemical O<SUB>2</SUB> production from biological photosynthesis: none of the atmospheres modelled
    exhibits this ``triple signature'''', even in the most extreme ``high risk'''' cases.'
