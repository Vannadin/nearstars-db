- &id467
  arxiv_id: null
  ads_bibcode: 2016ApJ...825L..21K
  title: Evolutionary Tracks of the Climate of Earth-like Planets around Different Mass Stars
  authors:
  - Kadoya, S.
  - Tajika, E.
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.3847/2041-8205/825/2/L21
  abstract: The climatic evolution of the Earth depends strongly on the evolution of the insolation from the Sun and the amount
    of the greenhouse gasses, especially CO<SUB>2</SUB> in the atmosphere. Here, we investigate the evolution of the climate
    of hypothetical Earths around stars whose masses are different from the solar mass with a luminosity evolution model of
    the stars, a mantle degassing model coupled with a parameterized convection model of the planetary interiors, and an energy
    balance climate model of the planetary surface. In the habitable zone (HZ), the climate of the planets is initially warm
    or hot, depending on the orbital semimajor axes. We found that, in the inner HZ, the climate of the planets becomes hotter
    with time owing to the increase in the luminosity of the central stars, while, in the outer HZ, it becomes colder and
    eventually globally ice-covered owing to the decrease in the CO<SUB>2</SUB> degassing rate of the planets. The orbital
    condition for maintaining the warm climate similar to the present Earth becomes very limited, and more interestingly,
    the planet orbiting in the outer HZ becomes globally ice-covered after a certain critical age (∼3 Gyr for the hypothetical
    Earth with standard parameters), irrespective of the mass of the central star. This is because the critical age depends
    on the evolution of the planets and planetary factors, rather than on the stellar mass. The habitability of the Earth-like
    planet is shown to be limited with age even though it is orbiting within the HZ.
