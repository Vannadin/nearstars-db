  ads_bibcode: 2026NatAs..10..234W
  title: Challenges in the detection of gases in exoplanet atmospheres
  authors:
  - Welbanks, Luis
  - Nixon, Matthew C.
  - McGill, Peter
  - Tilke, Lana J.
  - Wiser, Lindsey S.
