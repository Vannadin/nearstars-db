  year: '2018'
  pubdate: '2018-10-00'
  doi: null
  abstract: Small exoplanets in the habitable zone of nearby red dwarf stars present a unique possibility to characterize
    habitable exoplanets within the next decade. TRAPPIST-1, an ultracool red dwarf star, was recently found to have seven
    Earth-sized exoplanets, and three are in its habitable zone. Constraints on the planetary masses from orbital dynamics
    and radii from transits indicate that most of these planets have a predominantly rocky composition. Climate models have
    shown that the planets e and f in the system can sustain a global liquid water ocean, for 0.2 bar CO<SUB>2</SUB> plus
    1 bar N<SUB>2</SUB>, and 2 bars CO<SUB>2</SUB>, respectively. Observation and reconstruction of the Lyman-alpha emission
    of TRAPPIST-1 indicate that it has a moderately active chromosphere. Using an atmospheric photochemistry model, we investigate
    how the stellar irradiation drives chemical reactions in the atmospheres of TRAPPIST-1 e and f, where we assume habitable
    compositions predicted from the climate models. Our models show that substantial amounts of CO and O<SUB>2</SUB> must
    coexist with the CO<SUB>2</SUB>, and in some cases, overtake CO<SUB>2</SUB> as the most abundant gases. The CO and O<SUB>2</SUB>
    are produced by photodissociation of CO<SUB>2</SUB>, and they cannot recombine efficiently unless an unlikely direct recombination
    reaction in the ocean is assumed. Also, our models find that SO<SUB>2</SUB>, one of the presumed gases from volcanic outgassing,
    cannot accumulate in the atmospheres. It is quickly oxidized in the atmosphere and then rained out as H<SUB>2</SUB>SO<SUB>4</SUB>.
    These findings indicate that CO and O<SUB>2</SUB> should be considered together with CO<SUB>2</SUB> as the primary targets
    in the search for atmospheric signatures from habitable-zone planets of TRAPPIST-1.
