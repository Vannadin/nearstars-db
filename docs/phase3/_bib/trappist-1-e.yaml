  arxiv_id: '2203.04173'
  ads_bibcode: 2022ApJ...928L...7R
  title: 'Analysis of a JWST NIRSpec Lab Time Series: Characterizing Systematics, Recovering Exoplanet Transit Spectroscopy,
    and Constraining a Noise Floor'
  authors:
  - Rustamkulov, Zafar
  - Sing, David K.
  - Liu, Rongrong
  - Wang, Ashley
  year: '2022'
  pubdate: '2022-03-00'
  doi: 10.3847/2041-8213/ac5b6f
  abstract: The James Webb Space Telescope's (JWST) NIRSpec instrument will unveil the nature of exoplanet atmospheres across
    the wealth of planet types, from temperate terrestrial worlds to ultrahot Jupiters. In particular, the 0.6-5.3 μm PRISM
    mode is especially well suited for efficient spectroscopic exoplanet observations spanning a number of important spectral
    features. We analyze a lab-measured NIRSpec PRISM mode Bright Object Time Series observation from the perspective of a
    JWST user to understand the instrument performance and detector properties. We create two realistic transiting exoplanet
    time-series observations by performing injection-recovery tests on the lab-measured data to quantify the effects of real
    instrument jitter, drift, intrapixel sensitivity variations, and 1/f noise on measured transmission spectra. By fitting
    the time-series systematics simultaneously with the injected transit, we can obtain more realistic transit-depth uncertainties
    that take into account noise sources that are currently not modeled by traditional exposure time calculators. We find
    that sources of systematic noise related to intrapixel sensitivity variations and point-spread function motions are apparent
    in the data at the level of a few hundred ppm but can be effectively detrended using a low-order polynomial with detector
    position. We recover the injected spectral features of GJ 436 b and TRAPPIST-1 d and place a 3σ upper limit on the detector
    noise floor of 14 ppm. We find that the noise floor is consistent with &lt;10 ppm at the 1.7σ level, which bodes well
    for future observations of challenging targets with faint atmospheric signatures.
