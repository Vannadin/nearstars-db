  title: Main-Sequence Effective Temperatures from a Revised Mass-Luminosity Relation Based on Accurate Properties
  authors:
  - Eker, Z.
  - Soydugan, F.
  - Soydugan, E.
  - Bilir, S.
  - Yaz Gökçe, E.
