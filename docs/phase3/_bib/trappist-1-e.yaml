  ads_bibcode: 2020Life...11...10C
  title: 'Super-Earths, M Dwarfs, and Photosynthetic Organisms: Habitability in the Lab'
  authors:
  - Claudi, Riccardo
  - Alei, Eleonora
  - Battistuzzi, Mariano
  - Cocola, Lorenzo
