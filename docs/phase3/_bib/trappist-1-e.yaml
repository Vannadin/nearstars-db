- &id228
  arxiv_id: '1605.07130'
  ads_bibcode: 2016ApJ...827..120H
  title: Limit Cycles Can Reduce the Width of the Habitable Zone
  authors:
  - Haqq-Misra, Jacob
  - Kopparapu, Ravi Kumar
  - Batalha, Natasha E.
  - Harman, Chester E.
  - Kasting, James F.
  year: '2016'
  pubdate: '2016-08-00'
  doi: 10.3847/0004-637X/827/2/120
  abstract: The liquid water habitable zone (HZ) describes the orbital distance at which a terrestrial planet can maintain
    above-freezing conditions through regulation by the carbonate-silicate cycle. Recent calculations have suggested that
    planets in the outer regions of the HZ cannot maintain stable, warm climates, but rather should oscillate between long,
    globally glaciated states and shorter periods of climatic warmth. Such conditions, similar to “Snowball Earth” episodes
    experienced on Earth, would be inimical to the development of complex land life, including intelligent life. Here, we
    build on previous studies with an updated energy balance climate model to calculate this “limit cycle” region of the HZ
    where such cycling would occur. We argue that an abiotic Earth would have a greater CO<SUB>2</SUB> partial pressure than
    today because plants and other biota help to enhance the storage of CO<SUB>2</SUB> in soil. When we tune our abiotic model
    accordingly, we find that limit cycles can occur but that previous calculations have overestimated their importance. For
    G stars like the Sun, limit cycles occur only for planets with CO<SUB>2</SUB> outgassing rates less than that on modern
    Earth. For K- and M-star planets, limit cycles should not occur; however, M-star planets may be inhospitable to life for
    other reasons. Planets orbiting late G-type and early K-type stars retain the greatest potential for maintaining warm,
    stable conditions. Our results suggest that host star type, planetary volcanic activity, and seafloor weathering are all
    important factors in determining whether planets will be prone to limit cycling.
