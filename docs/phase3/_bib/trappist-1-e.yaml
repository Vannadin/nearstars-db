  ads_bibcode: 2005Gbio....3...53K
  title: A coupled atmosphere–ecosystem model of the early Archean Earth
  authors:
  - Kharecha, P.
  - Kasting, J.
  - Siefert, J.
  year: '2005'
  pubdate: '2005-04-00'
  doi: 10.1111/j.1472-4669.2005.00049.x
  abstract: A coupled photochemical-ecosystem model has been developed to simulate the early Archean biosphere. The model
    incorporates kinetic and nutrient limitations on biological productivity, along with constraints imposed by metabolic
    thermodynamics. We have used this model to predict the biogenic CH<SUB>4</SUB> flux and net primary productivity (NPP)
    of the marine biosphere prior to the advent of oxygenic photosynthesis. Organisms considered include chemotrophic and
    organotrophic methanogens, H<SUB>2</SUB>-, H<SUB>2</SUB>S-, and Fe-using anoxygenic phototrophs, S-reducing bacteria,
    CO-using acetogens, and fermentative bacteria. CH<SUB>4</SUB> production and NPP in our model are limited by the downward
    flux of H<SUB>2</SUB>, CO, S<SUB>8</SUB>, and H<SUB>2</SUB>S through the atmosphere–ocean interface and by the upwelling
    rate of Fe<SUP>2+</SUP> from the deep oceans. For reasonable estimates of the supply rates of these compounds, we find
    that the biogenic CH<SUB>4</SUB> flux should have ranged from approximately <SUP>1</SUP>/<SUB>3</SUB> to 2.5 times the
    modern CH<SUB>4</SUB> flux. In the anoxic Archean atmosphere, this would have produced CH<SUB>4</SUB> concentrations of
    100 ppmv to as much as 35 000 ppmv (3.5%), depending on the rate at which hydrogen escaped to space. Recent calculations
    indicating that hydrogen escape was slow favour the higher CH<SUB>4</SUB> concentrations. Calculated NPP is lower than
    in the modern oceans by a factor of at least 40. In our model, H<SUB>2</SUB>-based metabolism is moderately more productive
    than Fe<SUP>2+</SUP>-based metabolism, with S-based metabolism being considerably less productive. Internal recycling
    of sulphur within the surface ocean could conceivably raise rates of sulphur metabolism by a factor of 10 higher than
    the values predicted by our model. Although explicit climate calculations have not been performed here, our results are
    consistent with the idea that the Archean climate was warm, and possibly very hot. Some or most of our ecosystem scenarios
    are consistent with the carbon isotope record, depending on how that record is interpreted. If the conventional view is
    correct and organic carbon burial accounted for approximately 20% of total carbon burial during the Archean, then only
    two of our phototroph-based model ecosystems are plausible. However, if a recent alternative analysis is correct and only
    approximately 0–10% of total buried carbon was organic, then essentially all of our anaerobic ecosystems are plausible.
    A better understanding of both the geochemical and the biological records is needed to better constrain our models.
