  ads_bibcode: 2020PreR..34305722S
  title: Evidence for elevated and variable atmospheric oxygen in the Precambrian
  authors:
  - Steadman, J. A.
  - Large, R. R.
  - Blamey, N. J.
  - Mukherjee, I.
  - Corkrey, R.
  - Danyushevsky, L. V.
