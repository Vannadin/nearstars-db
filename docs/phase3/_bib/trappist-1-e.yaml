- &id313
  arxiv_id: '1803.00511'
  ads_bibcode: 2019JGRE..124.2087P
  title: 'Habitable Snowballs: Temperate Land Conditions, Liquid Water, and Implications for CO<SUB>2</SUB> Weathering'
  authors:
  - Paradise, Adiv
  - Menou, Kristen
  - Valencia, Diana
  - Lee, Christopher
  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.1029/2019JE005917
  abstract: Habitable planets are commonly imagined to be temperate planets like Earth, with areas of open ocean and warm
    land. In contrast, planets in snowball states, where oceans are entirely ice covered, are believed to be inhospitable.
    However, we show using a general circulation model that terrestrial planets in the inner habitable zone are able to support
    large unfrozen areas of land while in a snowball state. Due to their lower albedo, these unfrozen regions reach summer
    temperatures in excess of 10 °C. Such conditions permit CO<SUB>2</SUB> weathering, suggesting that continental weathering
    can provide a mechanism for trapping planets in stable snowball states. The presence of land areas with warm temperatures
    and liquid surface water motivates a more-nuanced understanding of habitability during these snowball events.
