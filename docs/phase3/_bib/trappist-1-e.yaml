  arxiv_id: '2010.03576'
  ads_bibcode: 2021AJ....161..115S
  title: JWST Noise Floor. II. Systematic Error Sources in JWST NIRCam Time Series
  authors:
  - Schlawin, Everett
  - Leisenring, Jarron
  - McElwain, Michael W.
  - Misselt, Karl
  - Don, Kenneth
  - Greene, Thomas P.
  - Beatty, Thomas
  - Nikolov, Nikolay
  - Kelly, Douglas
  - Rieke, Marcia
  year: '2021'
  pubdate: '2021-03-00'
  doi: 10.3847/1538-3881/abd8d4
  abstract: The James Webb Space Telescope (JWST) holds great promise for characterizing atmospheres of transiting exoplanets,
    potentially providing insights into Earth-sized planets within the habitable zones of M-dwarf host stars if photon-limited
    performance can be achieved. Here, we discuss the systematic error sources that are expected to be present in grism time-series
    observations with the NIRCam instrument. We find that pointing jitter and high-gain antenna moves in addition to the detectors'
    subpixel crosshatch patterns will produce relatively small variations (less than 6 parts per million, ppm). The time-dependent
    aperture losses due to thermal instabilities in the optics can also be kept to below 2 ppm. To achieve these low noise
    values, it is important to employ a sufficiently large (more than 1"1) extraction aperture. Persistence due to charge-trapping
    will have a minor (less than 3 ppm) effect on the time series 20 minutes into an exposure and is expected to play a much
    smaller role than it does for the Hubble Space Telescope WFC3 detectors. We expect detector temperature fluctuations to
    contribute less than 3 ppm. In total, our estimated noise floor from known systematic error sources is only 9 ppm per
    visit. We urge caution, however, because unknown systematic error sources could be present in flight and will only be
    measurable on astrophysical sources such as quiescent stars. We find that reciprocity failure may introduce a perennial
    instrument offset at the 40 ppm level, so corrections may be needed when a multi-instrument multi-observatory spectrum
    is stitched together over wide wavelength ranges.
