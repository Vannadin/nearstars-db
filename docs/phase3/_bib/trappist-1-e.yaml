  abstract: We simulate the 3D ozone distribution of a tidally locked Earth-like exoplanet using the high-resolution, 3D chemistry-climate
    model CESM1(WACCM) and study how the ozone layer of a tidally locked Earth (TLE) (<inline-formula id="IEq1"><mml:math><mml:mrow><mml:msub><mml:mi
    mathvariant="normal">Ω</mml:mi><mml:mi mathvariant="normal">TLE</mml:mi></mml:msub><mml:mo>=</mml:mo><mml:mn>1</mml:mn><mml:mo
