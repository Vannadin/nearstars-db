  ads_bibcode: 2016ApJ...827...78S
  title: Eleven Multiplanet Systems from K2 Campaigns 1 and 2 and the Masses of Two Hot Super-Earths
  authors:
  - Sinukoff, Evan
  - Howard, Andrew W.
  - Petigura, Erik A.
  - Schlieder, Joshua E.
  - Crossfield, Ian J. M.
  - Ciardi, David R.
  - Fulton, Benjamin J.
  - Isaacson, Howard
  - Aller, Kimberly M.
  - Baranec, Christoph
  - Beichman, Charles A.
  - Hansen, Brad M. S.
  - Knutson, Heather A.
