- &id369
  arxiv_id: astro-ph/0605328
  ads_bibcode: 2007ApJS..173..673W
  title: The Detection of M Dwarf UV Flare Events in the GALEX Data Archives
  authors:
  - Welsh, Barry Y.
  - Wheatley, Jonathan M.
  - Seibert, Mark
  - Browne, Stanley E.
  - West, Andrew A.
  - Siegmund, Oswald H. W.
  - Barlow, Tom A.
  - Forster, Karl
  - Friedman, Peter G.
  - Martin, D. Christopher
  - Morrissey, Patrick
  - Small, Todd
  - Wyder, Ted
  - Schiminovich, David
  - Neff, Susan
  - Rich, R. Michael
  year: '2007'
  pubdate: '2007-12-00'
  doi: 10.1086/516640
  abstract: We present the preliminary results from implementing a new software tool that enables inspection of time-tagged
    photon data for the astronomical sources contained within individual GALEX ultraviolet (UV) images of the sky. We have
    inspected the photon data contained within 1802 GALEX images to reveal rapid, short-term (&lt;~500 s) UV source variability
    in the form of stellar ``flares.'' The mean associated change in near-UV (NUV) magnitude due to this flaring activity
    is 2.7+/-0.3 mag. A list of 49 new UV variable star candidates is presented, together with their associated Sloan Digital
    Sky Survey (SDSS) photometric magnitudes. From these data we can associate the main source of these UV flare events with
    magnetic activity on M dwarf stars. Photometric parallaxes have been determined for 32 of these sources, placing them
    at distances ranging from approximately 25 to 1000 pc. The average UV flare energy for these flare events is 2.5×10<SUP>30</SUP>
    ergs, which is of a similar energy to that of U-band, X-ray, and EUV flares observed on many local M dwarf stars. We have
    found that stars of classes M0 to M5 flare with energies spanning a far larger range and with an energy approximately
    5 times greater than those of later (M6 to M8) spectral type.
