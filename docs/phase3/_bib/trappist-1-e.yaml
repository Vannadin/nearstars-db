- &id756
  arxiv_id: '1405.6701'
  ads_bibcode: 2014NatGe...7...59R
  title: Warming early Mars with CO<SUB>2</SUB> and H<SUB>2</SUB>
  authors:
  - Ramirez, Ramses M.
  - Kopparapu, Ravi
  - Zugger, Michael E.
  - Robinson, Tyler D.
  - Freedman, Richard
  - Kasting, James F.
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1038/ngeo2000
  abstract: The presence of valleys on ancient terrains of Mars suggests that liquid water flowed on the martian surface 3.8Gyr
    ago or before. The above-freezing temperatures required to explain valley formation could have been transient, in response
    to the frequent large meteorite impacts on early Mars, or they could have been caused by long-lived greenhouse warming.
    Climate models that consider only the greenhouse gases carbon dioxide and water have been unable to recreate warm surface
    conditions, given the lower solar luminosity at that time. Here we use a one-dimensional climate model to demonstrate
    that an atmosphere containing 1.3-4bar of CO<SUB>2</SUB> and water, in addition to 5-20% H<SUB>2</SUB>, could have raised
    the mean surface temperature of early Mars above the freezing point of water. Vigorous volcanic outgassing from a highly
    reduced early martian mantle is expected to provide sufficient atmospheric H<SUB>2</SUB> and CO<SUB>2</SUB>--the latter
    from the photochemical oxidation of outgassed CH<SUB>4</SUB> and CO--to form a CO<SUB>2</SUB> and H<SUB>2</SUB> greenhouse.
    Such a dense early martian atmosphere is consistent with independent estimates of surface pressure based on cratering
    data.
