  arxiv_id: '2004.04185'
  ads_bibcode: 2020ApJ...896..148R
  title: 'Photochemistry of Anoxic Abiotic Habitable Planet Atmospheres: Impact of New H<SUB>2</SUB>O Cross Sections'
  authors:
  - Ranjan, Sukrit
  - Schwieterman, Edward W.
  - Harman, Chester
  - Fateev, Alexander
  - Sousa-Silva, Clara
  - Seager, Sara
  - Hu, Renyu
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/1538-4357/ab9363
  abstract: We present a study of the photochemistry of abiotic habitable planets with anoxic CO<SUB>2</SUB>-N<SUB>2</SUB>
    atmospheres. Such worlds are representative of early Earth, Mars, and Venus and analogous exoplanets. Photodissociation
    of H<SUB>2</SUB>O controls the atmospheric photochemistry of these worlds through production of reactive OH, which dominates
    the removal of atmospheric trace gases. The near-UV (NUV; &gt;200 nm) absorption cross sections of H<SUB>2</SUB>O play
    an outsized role in OH production; these cross sections were heretofore unmeasured at habitable temperatures (&lt;373
    K). We present the first measurements of NUV H<SUB>2</SUB>O absorption at 292 K and show it to absorb orders of magnitude
    more than previously assumed. To explore the implications of these new cross sections, we employ a photochemical model;
    we first intercompare it with two others and resolve past literature disagreement. The enhanced OH production due to these
    higher cross sections leads to efficient recombination of CO and O<SUB>2</SUB>, suppressing both by orders of magnitude
    relative to past predictions and eliminating the low-outgassing "false-positive" scenario for O<SUB>2</SUB> as a biosignature
    around solar-type stars. Enhanced [OH] increases rainout of reductants to the surface, relevant to prebiotic chemistry,
    and may also suppress CH<SUB>4</SUB> and H<SUB>2</SUB>; the latter depends on whether burial of reductants is inhibited
    on the underlying planet, as is argued for abiotic worlds. While we focus on CO<SUB>2</SUB>-rich worlds, our results are
    relevant to anoxic planets in general. Overall, our work advances the state of the art of photochemical models by providing
    crucial new H<SUB>2</SUB>O cross sections and resolving past disagreement in the literature and suggests that detection
    of spectrally active trace gases like CO in rocky exoplanet atmospheres may be more challenging than previously considered.
  source: citation_of=2025ApJ...990L..53G
