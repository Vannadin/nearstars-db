  doi: 10.1038/ngeo2719
  abstract: Nitrogen is a critical ingredient of complex biological molecules. Molecular nitrogen, however, which was outgassed
    into the Earth’s early atmosphere, is relatively chemically inert and nitrogen fixation into more chemically reactive
    compounds requires high temperatures. Possible mechanisms of nitrogen fixation include lightning, atmospheric shock heating
    by meteorites, and solar ultraviolet radiation. Here we show that nitrogen fixation in the early terrestrial atmosphere
    can be explained by frequent and powerful coronal mass ejection events from the young Sun--so-called superflares. Using
    magnetohydrodynamic simulations constrained by Kepler Space Telescope observations, we find that successive superflare
    ejections produce shocks that accelerate energetic particles, which would have compressed the early Earth’s magnetosphere.
    The resulting extended polar cap openings provide pathways for energetic particles to penetrate into the atmosphere and,
    according to our atmospheric chemistry simulations, initiate reactions converting molecular nitrogen, carbon dioxide and
    methane to the potent greenhouse gas nitrous oxide as well as hydrogen cyanide, an essential compound for life. Furthermore,
    the destruction of N<SUB>2</SUB>, CO<SUB>2</SUB> and CH<SUB>4</SUB> suggests that these greenhouse gases cannot explain
    the stability of liquid water on the early Earth. Instead, we propose that the efficient formation of nitrous oxide could
    explain a warm early Earth.
