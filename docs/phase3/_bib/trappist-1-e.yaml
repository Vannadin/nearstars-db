- &id013
  arxiv_id: '1809.07498'
  ads_bibcode: 2018ApJ...867...76L
  title: Evolved Climates and Observational Discriminants for the TRAPPIST-1 Planetary System
  authors:
  - Lincowski, Andrew P.
  - Meadows, Victoria S.
  - Crisp, David
  - Robinson, Tyler D.
  - Luger, Rodrigo
  - Lustig-Yaeger, Jacob
  - Arney, Giada N.
  year: '2018'
  pubdate: '2018-11-00'
  doi: 10.3847/1538-4357/aae36a
  abstract: The TRAPPIST-1 planetary system provides an unprecedented opportunity to study terrestrial exoplanet evolution
    with the James Webb Space Telescope (JWST) and ground-based observatories. Since M dwarf planets likely experience extreme
    volatile loss, the TRAPPIST-1 planets may have highly evolved, possibly uninhabitable atmospheres. We used a versatile,
    1D terrestrial planet climate model with line-by-line radiative transfer and mixing length convection (VPL Climate) coupled
    to a terrestrial photochemistry model to simulate environmental states for the TRAPPIST-1 planets. We present equilibrium
    climates with self-consistent atmospheric compositions and observational discriminants of postrunaway, desiccated, 10-100
    bar O<SUB>2</SUB>- and CO<SUB>2</SUB>-dominated atmospheres, including interior outgassing, as well as for water-rich
    compositions. Our simulations show a range of surface temperatures, most of which are not habitable, although an aqua
    planet TRAPPIST-1 e could maintain a temperate surface given Earth-like geological outgassing and CO<SUB>2</SUB>. We find
    that a desiccated TRAPPIST-1 h may produce habitable surface temperatures beyond the maximum greenhouse distance. Potential
    observational discriminants for these atmospheres in transmission and emission spectra are influenced by photochemical
    processes and aerosol formation and include collision-induced oxygen absorption (O<SUB>2</SUB>-O<SUB>2</SUB>), and O<SUB>3</SUB>,
    CO, SO<SUB>2</SUB>, H<SUB>2</SUB>O, and CH<SUB>4</SUB> absorption features, with transit signals of up to 200 ppm. Our
    simulated transmission spectra are consistent with K2, Hubble Space Telescope, and Spitzer observations of the TRAPPIST-1
    planets. For several terrestrial atmospheric compositions, we find that TRAPPIST-1 b is unlikely to produce aerosols.
    These results can inform JWST observation planning and data interpretation for the TRAPPIST-1 system and other M dwarf
    terrestrial planets.
