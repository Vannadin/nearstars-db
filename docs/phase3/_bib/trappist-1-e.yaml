  arxiv_id: '2005.02114'
  ads_bibcode: 2020ApJ...898...44S
  title: Consistently Simulating a Wide Range of Atmospheric Scenarios for K2-18b with a Flexible Radiative Transfer Module
  authors:
  - Scheucher, Markus
  - Wunderlich, F.
