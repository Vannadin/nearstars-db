- &id463
  arxiv_id: '1606.07027'
  ads_bibcode: 2017MNRAS.465L..34A
  title: Modelling stellar proton event-induced particle radiation dose on close-in exoplanets
  authors:
  - Atri, Dimitra
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.1093/mnrasl/slw199
  abstract: Kepler observations have uncovered the existence of a large number of close-in exoplanets and serendipitously
    of stellar superflares with emissions several orders of magnitude higher than those observed on the Sun. The interaction
    between the two and their implications on planetary habitability are of great interest to the community. Stellar proton
    events (SPEs) interact with planetary atmospheres, generate secondary particles and increase the radiation dose on the
    surface. This effect is amplified for close-in exoplanets and can be a serious threat to potential planetary life. Monte
    Carlo simulations are used to model the SPE-induced particle radiation dose on the surface of such exoplanets. The results
    show a wide range of surface radiation doses on planets in close-in configurations with varying atmospheric column depths,
    magnetic moments and orbital radii. It can be concluded that for close-in exoplanets with sizable atmospheres and magnetospheres,
    the radiation dose contributed by stellar superflares may not be high enough to sterilize a planet (for life as we know
    it) but can result in frequent extinction level events. In light of recent reports, the interaction of hard-spectrum SPEs
    with the atmosphere of Proxima Centauri b is modelled and their implications on its habitability are discussed.
  source: citation_of=2019ApJ...881..114Y
