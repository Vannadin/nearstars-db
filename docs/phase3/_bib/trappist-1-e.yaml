  arxiv_id: '2301.02745'
  ads_bibcode: 2024NatAs...8..182H
  title: Optical properties of organic haze analogues in water-rich exoplanet atmospheres observable with JWST
  authors:
  - He, Chao
  - Radke, Michael
  - Moran, Sarah E.
  - Hörst, Sarah M.
  - Lewis, Nikole K.
  - Moses, Julianne I.
  - Marley, Mark S.
