- &id492
  arxiv_id: '1105.3936'
  ads_bibcode: 2012ApJ...746..150E
  title: 'Tidal Dissipation Compared to Seismic Dissipation: In Small Bodies, Earths, and Super-Earths'
  authors:
  - Efroimsky, Michael
  year: '2012'
  pubdate: '2012-02-00'
  doi: 10.1088/0004-637X/746/2/150
  abstract: 'While the seismic quality factor and phase lag are defined solely by the bulk properties of the mantle, their
    tidal counterparts are determined by both the bulk properties and the size effect (self-gravitation of a body as a whole).
    For a qualitative estimate, we model the body with a homogeneous sphere, and express the tidal phase lag through the lag
    in a sample of material. Although simplistic, our model is sufficient to understand that the lags are not identical. The
    difference emerges because self-gravitation pulls the tidal bulge down. At low frequencies, this reduces strain and the
    damping rate, making tidal damping less efficient in larger objects. At higher frequencies, competition between self-gravitation
    and rheology becomes more complex, though for sufficiently large super-Earths the same rule applies: the larger the planet,
    the weaker the tidal dissipation in it. Being negligible for small terrestrial planets and moons, the difference between
    the seismic and tidal lagging (and likewise between the seismic and tidal damping) becomes very considerable for large
    exoplanets (super-Earths). In those, it is much lower than what one might expect from using a seismic quality factor.
    The tidal damping rate deviates from the seismic damping rate, especially in the zero-frequency limit, and this difference
    takes place for bodies of any size. So the equal in magnitude but opposite in sign tidal torques, exerted on one another
    by the primary and the secondary, have their orbital averages going smoothly through zero as the secondary crosses the
    synchronous orbit. We describe the mantle rheology with the Andrade model, allowing it to lean toward the Maxwell model
    at the lowest frequencies. To implement this additional flexibility, we reformulate the Andrade model by endowing it with
    a free parameter ζ which is the ratio of the anelastic timescale to the viscoelastic Maxwell time of the mantle. Some
    uncertainty in this parameter''s frequency dependence does not influence our principal conclusions.'
