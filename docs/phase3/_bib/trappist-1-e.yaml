  arxiv_id: '2402.00758'
  ads_bibcode: 2024ApJ...975...59M
  title: 'The Sonora Substellar Atmosphere Models. III. Diamondback: Atmospheric Properties, Spectra, and Evolution for Warm
    Cloudy Substellar Objects'
  authors:
  - Morley, Caroline V.
  - Mukherjee, Sagnick
  - Marley, Mark S.
  - Fortney, Jonathan J.
  - Visscher, Channon
  - Lupu, Roxana
