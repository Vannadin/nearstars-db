  arxiv_id: '2001.00050'
  ads_bibcode: 2020AJ....160..225K
  title: High-resolution Spectra of Earth-like Planets Orbiting Red Giant Host Stars
  authors:
  - Kozakis, Thea
  - Kaltenegger, Lisa
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.3847/1538-3881/abb9ac
  abstract: In the near future we will have ground- and space-based telescopes that are designed to observe and characterize
    Earth-like planets. While attention is focused on exoplanets orbiting main-sequence stars, more than 150 exoplanets have
    already been detected orbiting red giants, opening the intriguing question of what rocky worlds orbiting in the habitable
    zone (HZ) of red giants would be like and how to characterize them. We present a high-resolution spectral database of
    reflection and emission spectra for nominal Earth-like planets orbiting in the red giant HZ from the visible to infrared
    (0.4-20 μm) for planets orbiting at the Earth-equivalent distance. We also show the change of such planetary spectra through
    the evolution of their red giant hosts. While the luminosity of the host increases the contrast ratio between star and
    planet, the increased orbital distance of the HZ for red giant hosts relaxes the light suppression requirements close
    to the star, which could make such planets interesting targets to characterize and search for signs of life, if new coronagraph
    designs with higher suppression at larger orbital separations could be developed. We assess the feasibility of characterizing
    atmospheric features including biosignatures for such planets with the proposed mission concept Large UV/Optical/IR Surveyor
    (LUVOIR).
