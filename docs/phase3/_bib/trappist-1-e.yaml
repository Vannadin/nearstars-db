  arxiv_id: '2002.02549'
  ads_bibcode: 2020ApJ...893..140G
  title: The Impact of Planetary Rotation Rate on the Reflectance and Thermal Emission Spectrum of Terrestrial Exoplanets
    around Sunlike Stars
  authors:
  - Guzewich, Scott D.
  - Lustig-Yaeger, Jacob
  - Davis, Christopher Evan
  - Kopparapu, Ravi Kumar
  - Way, Michael J.
  - Meadows, Victoria S.
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-4357/ab83ec
  abstract: Robust atmospheric and radiative transfer modeling will be required to properly interpret reflected-light and
    thermal emission spectra of terrestrial exoplanets. This will help break observational degeneracies between the numerous
    atmospheric, planetary, and stellar factors that drive planetary climate. Here, we simulate the climates of earthlike
    worlds around the Sun with increasingly slow rotation periods, from earthlike to fully Sun-synchronous, using the ROCKE-3D
    general circulation model. We then provide these results as input to the Spectral Planet Model, which employs the Spectral
    Mapping Atmospheric Radiative Transfer model to simulate the spectra of a planet as it would be observed from a future
    space-based telescope. We find that the primary observable effects of slowing planetary rotation rate are the altered
    cloud distributions, altitudes, and opacities that subsequently drive many changes to the spectra by altering the absorption
    band depths of biologically relevant gas species (e.g., ${{\rm{H}}}_{2}{\rm{O}}$ , ${{\rm{O}}}_{2}$ , and ${{\rm{O}}}_{3}$
    ). We also identify a potentially diagnostic feature of synchronously rotating worlds in mid-infrared ${{\rm{H}}}_{2}{\rm{O}}$
    absorption/emission lines.
