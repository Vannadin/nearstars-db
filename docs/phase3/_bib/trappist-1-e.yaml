- &id185
  arxiv_id: '1912.07027'
  ads_bibcode: 2020ApJ...890...79J
  title: Hydrodynamic Escape of Water Vapor Atmospheres near Very Active Stars
  authors:
  - Johnstone, C. P.
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.3847/1538-4357/ab6224
  abstract: When exposed to the high-energy X-ray and ultraviolet radiation of a very active star, water vapor in the upper
    atmospheres of planets can be photodissociated and rapidly lost to space. In this paper, I study the chemical, thermal,
    and hydrodynamic processes in the upper atmospheres of terrestrial planets, concentrating on water-vapor-dominated atmospheres
    orbiting in the habitable zones of active stars. I consider different stellar activity levels and find very high levels
    of atmospheric escape in all cases, with the outflowing gas being dominated by atomic hydrogen and oxygen in both their
    neutral and ion forms. In the lower activity cases, I find that the accumulation of O<SUB>2</SUB> and increases in the
    D/H ratios in the atmospheres due to mass fractionation are possible, but in the higher activity cases, no mass fractionation
    takes place. Connecting these results to stellar activity evolution tracks for solar-mass stars, I show that huge amounts
    of water vapor can be lost, and both the losses and the amount of O<SUB>2</SUB> that can be accumulated in the atmosphere
    depend sensitively on the star's initial rotation rate. For an Earth-mass planet in the habitable zone of a low-mass M
    dwarf, my results suggest that the accumulation of atmospheric O<SUB>2</SUB> is unlikely unless water loss can take place
    after the star's most active phase.
  source: citation_of=2020ApJ...901..126W
