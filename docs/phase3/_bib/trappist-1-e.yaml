  arxiv_id: '2209.02294'
  ads_bibcode: 2022GeoRL..4999599X
  title: Smaller Sensitivity of Precipitation to Surface Temperature Under Massive Atmospheres
  authors:
  - Xiong, Junyan
  - Yang, Jun
  - Liu, Jiachen
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.1029/2022GL099599
  abstract: Precipitation and its response to forcing is an important aspect of planetary climate system. In this study, we
    examine the strength of precipitation in the experiments with different atmospheric masses and their response to surface
    warming, using three global atmospheric general circulation models and one regional cloud-resolving model. We find that
    precipitation is weaker when atmospheric mass is larger for a given surface temperature. Furthermore, the increasing rate
    of precipitation with increasing surface temperature under a larger atmospheric mass is smaller than that under a smaller
    atmospheric mass. These behaviors can be understood based on atmospheric or surface energy balance. Atmospheric mass influences
    Rayleigh scattering, multiple scattering in the atmosphere, pressure broadening, lapse rate, and thereby precipitation
    strength. These results have important implications on the climate and habitability of early Earth, early Mars, and exoplanets
    with oceans.
