- &id186
  arxiv_id: '1912.08743'
  ads_bibcode: 2020MNRAS.492.1691Y
  title: Ozone chemistry on tidally locked M dwarf planets
  authors:
  - Yates, Jack S.
  - Palmer, Paul I.
  - Manners, James
  - Boutle, Ian
  - Kohary, Krisztian
  - Mayne, Nathan
  - Abraham, Luke
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.1093/mnras/stz3520
  abstract: We use the Met Office Unified Model to explore the potential of a tidally locked M dwarf planet, nominally Proxima
    Centauri b irradiated by a quiescent version of its host star, to sustain an atmospheric ozone layer. We assume a slab
    ocean surface layer, and an Earth-like atmosphere of nitrogen and oxygen with trace amounts of ozone and water vapour.
    We describe ozone chemistry using the Chapman mechanism and the hydrogen oxide (HO<SUB>X</SUB>, describing the sum of
    OH and HO<SUB>2</SUB>) catalytic cycle. We find that Proxima Centauri radiates with sufficient UV energy to initialize
    the Chapman mechanism. The result is a thin but stable ozone layer that peaks at 0.75 parts per million at 25 km. The
    quasi-stationary distribution of atmospheric ozone is determined by photolysis driven by incoming stellar radiation and
    by atmospheric transport. Ozone mole fractions are smallest in the lowest 15 km of the atmosphere at the substellar point
    and largest in the nightside gyres. Above 15 km the ozone distribution is dominated by an equatorial jet stream that circumnavigates
    the planet. The nightside ozone distribution is dominated by two cyclonic Rossby gyres that result in localized ozone
    hotspots. On the dayside the atmospheric lifetime is determined by the HO<SUB>X</SUB> catalytic cycle and deposition to
    the surface, with nightside lifetimes due to chemistry much longer than time-scales associated with atmospheric transport.
    Surface UV values peak at the substellar point with values of 0.01 W m<SUP>-2</SUP>, shielded by the overlying atmospheric
    ozone layer but more importantly by water vapour clouds.
