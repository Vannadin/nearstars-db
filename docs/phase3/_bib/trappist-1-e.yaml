- &id021
  arxiv_id: '1902.03732'
  ads_bibcode: 2019ApJ...874...21F
  title: Stellar Energetic Particles in the Magnetically Turbulent Habitable Zones of TRAPPIST-1-like Planetary Systems
  authors:
  - Fraschetti, F.
  - Drake, J. J.
  - Alvarado-Gómez, J. D.
  - Moschou, S. P.
  - Garraffo, C.
  - Cohen, O.
  year: '2019'
  pubdate: '2019-03-00'
  doi: 10.3847/1538-4357/ab05e4
  abstract: 'Planets in close proximity to their parent star, such as those in the habitable zones around M dwarfs, could
    be subject to particularly high doses of particle radiation. We have carried out test-particle simulations of ∼GeV protons
    to investigate the propagation of energetic particles accelerated by flares or traveling shock waves within the stellar
    wind and magnetic field of a TRAPPIST-1-like system. Turbulence was simulated with small-scale magnetostatic perturbations
    with an isotropic power spectrum. We find that only a few percent of particles injected within half a stellar radius from
    the stellar surface escape, and that the escaping fraction increases strongly with increasing injection radius. Escaping
    particles are increasingly deflected and focused by the ambient spiraling magnetic field as the superimposed turbulence
    amplitude is increased. In our TRAPPIST-1-like simulations, regardless of the angular region of injection, particles are
    strongly focused onto two caps within the fast wind regions and centered on the equatorial planetary orbital plane. Based
    on a scaling relation between far-UV emission and energetic protons for solar flares applied to M dwarfs, the innermost
    putative habitable planet, TRAPPIST-1e, is bombarded by a proton flux up to 6 orders of magnitude larger than experienced
    by the present-day Earth. We note two mechanisms that could strongly limit EP fluxes from active stars: EPs from flares
    are contained by the stellar magnetic field; and potential CMEs that might generate EPs at larger distances also fail
    to escape.'
