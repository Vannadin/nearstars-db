  doi: 10.1111/j.1472-4669.2006.00084.x
  abstract: Understanding the evolution of atmospheric molecular oxygen levels is a fundamental unsolved problem in Earth's
    history. We develop a quantitative biogeochemical model that simulates the Palaeoproterozoic transition of the Earth's
    atmosphere from a weakly reducing state to an O<SUB>2</SUB>-rich state. The purpose is to gain an insight into factors
    that plausibly control the timing and rapidity of the oxic transition. The model uses a simplified atmospheric chemistry
    (parameterized from complex photochemical models) and evolving redox fluxes in the Earth system. We consider time-dependent
    fluxes that include organic carbon burial and associated oxygen production, reducing gases from metamorphic and volcanic
    sources, oxidative weathering, and the escape of hydrogen to space. We find that the oxic transition occurs in a geologically
    short time when the O<SUB>2</SUB>-consuming flux of reducing gases falls below the flux of organic carbon burial that
    produces O<SUB>2</SUB>. A short timescale for the oxic transition is enhanced by a positive feedback due to decreasing
    destruction of O<SUB>2</SUB> as stratospheric ozone forms, which is captured in our atmospheric chemistry parameterization.
    We show that one numerically self-consistent solution for the rise of O<SUB>2</SUB> involves a decline in flux of reducing
    gases driven by irreversible secular oxidation of the crust caused by time-integrated hydrogen escape to space in the
    preoxic atmosphere, and that this is compatible with constraints from the geological record. In this model, the timing
    of the oxic transition is strongly affected by buffers of reduced materials, particularly iron, in the continental crust.
    An alternative version of the model, where greater fluxes of reduced hydrothermal cations from the Archean seafloor consume
    O<SUB>2</SUB>, produces a similar history of O<SUB>2</SUB> and CH<SUB>4</SUB>. When climate and biosphere feedbacks are
    included in our model of the oxic transition, we find that multiple 'Snowball Earth' events are simulated under certain
    circumstances, as methane collapses and rises repeatedly before reaching a new steady-state.
