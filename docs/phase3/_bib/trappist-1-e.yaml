  abstract: We report the discovery of a Spitzer microlensing planet OGLE-2018-BLG-0596Lb, with preferred planet-host mass
    ratio q ∼ 2 × 10<SUP>-4</SUP>. The planetary signal, which is characterized by a short (∼1 day) “bump” on the rising side
    of the lensing light curve, was densely covered by ground-based surveys. We find that the signal can be explained by a
    bright source that fully envelops the planetary caustic, i.e., a “Hollywood” geometry. Combined with the source proper
    motion measured from Gaia, the Spitzer satellite parallax measurement makes it possible to precisely constrain the lens
    physical parameters. The preferred solution, in which the planet perturbs the minor image due to lensing by the host,
    yields a Uranus-mass planet with a mass of M <SUB>p</SUB> = 13.9 ± 1.6 M <SUB>⊕</SUB> orbiting a mid M-dwarf with a mass
    of M <SUB>h</SUB> = 0.23 ± 0.03 M <SUB>☉</SUB>. There is also a second possible solution that is substantially disfavored
    but cannot be ruled out, for which the planet perturbs the major image. The latter solution yields M <SUB>p</SUB> = 1.2
    ± 0.2 M <SUB>⊕</SUB> and M <SUB>h</SUB> = 0.15 ± 0.02 M <SUB>☉</SUB>. By combining the microlensing and Gaia data together
    with a Galactic model, we find in either case that the lens lies on the near side of the Galactic bulge at a distance
    D <SUB>L</SUB> ∼ 6 ± 1 kpc. Future adaptive optics observations may decisively resolve the major image/minor image degeneracy.
