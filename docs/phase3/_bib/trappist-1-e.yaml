  - Hobson, M. P.
  - Bridges, M.
  year: '2009'
  pubdate: '2009-10-00'
  doi: 10.1111/j.1365-2966.2009.14548.x
  abstract: We present further development and the first public release of our multimodal nested sampling algorithm, called
    MULTINEST. This Bayesian inference tool calculates the evidence, with an associated error estimate, and produces posterior
    samples from distributions that may contain multiple modes and pronounced (curving) degeneracies in high dimensions. The
    developments presented here lead to further substantial improvements in sampling efficiency and robustness, as compared
    to the original algorithm presented in Feroz &amp; Hobson, which itself significantly outperformed existing Markov chain
    Monte Carlo techniques in a wide range of astrophysical inference problems. The accuracy and economy of the MULTINEST
    algorithm are demonstrated by application to two toy problems and to a cosmological inference problem focusing on the
    extension of the vanilla Λ cold dark matter model to include spatial curvature and a varying equation of state for dark
    energy. The MULTINEST software, which is fully parallelized using MPI and includes an interface to COSMOMC, is available
    at http://www.mrao.cam.ac.uk/software/multinest/. It will also be released as part of the SUPERBAYES package, for the
    analysis of supersymmetric theories of particle physics, at http://www.superbayes.org.
