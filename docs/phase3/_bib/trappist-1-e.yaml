  arxiv_id: '1810.10413'
  ads_bibcode: 2019MNRAS.482.1690B
  title: 'Thorium in solar twins: implications for habitability in rocky planets'
  authors:
  - Botelho, R. B.
  - Milone, A. de C.
  - Meléndez, J.
  - Bedell, M.
  - Spina, L.
  - Asplund, M.
  - dos Santos, L.
  - Bean, J. L.
