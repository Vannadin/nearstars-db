- &id422
  arxiv_id: '2009.07274'
  ads_bibcode: 2020ApJ...901L...1K
  title: 'The White Dwarf Opportunity: Robust Detections of Molecules in Earth-like Exoplanet Atmospheres with the James Webb
    Space Telescope'
  authors:
  - Kaltenegger, Lisa
  - MacDonald, Ryan J.
  - Kozakis, Thea
  - Lewis, Nikole K.
  - Mamajek, Eric E.
  - McDowell, Jonathan C.
  - Vanderburg, Andrew
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.3847/2041-8213/aba9d3
  abstract: The near-term search for life beyond the solar system currently focuses on transiting planets orbiting small M
    dwarfs, and the challenges of detecting signs of life in their atmospheres. However, planets orbiting white dwarfs (WDs)
    would provide a unique opportunity to characterize rocky worlds. The discovery of the first transiting giant planet orbiting
    a WD, WD 1856+534, showed that planetary-mass objects can survive close-in orbits around WDs. The large radius ratio between
    WD planets and their host renders them exceptional targets for transmission spectroscopy. Here, we explore the molecular
    detectability and atmospheric characterization potential for a notional Earth-like planet, evolving in the habitable zone
    of WD 1856+534, with the James Webb Space Telescope (JWST). We establish that the atmospheric composition of such Earth-like
    planets orbiting WDs can be precisely retrieved with JWST. We demonstrate that robust &gt;5σ detections of H<SUB>2</SUB>O
    and CO<SUB>2</SUB> can be achieved in a five-transit reconnaissance program, while the biosignatures O<SUB>3</SUB> + CH<SUB>4</SUB>
    and CH<SUB>4</SUB> + N<SUB>2</SUB>O can be detected to &gt;4σ in as few as 25 transits. N<SUB>2</SUB> and O<SUB>2</SUB>
    can be detected to &gt;5σ within 100 transits. Given the short transit duration of WD habitable zone planets (∼2 minutes
    for WD 1856+534), conclusive molecular detections can be achieved in a small or medium JWST transmission spectroscopy
    program. Rocky planets in the WD habitable zone therefore represent a promising opportunity to characterize terrestrial
    planet atmospheres and explore the possibility of a second genesis on these worlds.
