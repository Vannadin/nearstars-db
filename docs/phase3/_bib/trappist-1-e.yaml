  arxiv_id: null
  ads_bibcode: 2019Icar..329..251A
  title: 'Dynamical investigation of a thickening ice-shell: Implications for the icy moon Europa'
  authors:
  - Allu Peddinti, Divya
  - McNamara, Allen K.
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.1016/j.icarus.2019.03.037
  abstract: Current astrobiological exploration of the outer solar system is largely driven by understanding planetary ice-ocean
    systems such as those of Europa and Enceladus. The ice-shell thickness that affects the dynamics of the ice-ocean system
    is determined by the balance between heat loss via convection and conduction, and the heat production via tidal dissipation
    and radiogenic decay. In this study, we investigate how ice-shells of such ocean moons grow, and how convection inside
    them evolves as the system cools. We perform geodynamical calculations to investigate the ice-shell thickness and growth
    rate as the system cools from a warm initial condition. We study both diffuse and localized end member modes of tidal
    dissipation within the ice-shell. We find that as the ice-shell cools and thickens, there is a reconfiguration of the
    convection patterns, increasing the size of convection cells that leads to a relatively significant increase in the ice-shell
    growth rate.
