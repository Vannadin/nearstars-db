  arxiv_id: '2103.05657'
  ads_bibcode: 2021AJ....161..213S
  title: Detection of an Atmosphere on a Rocky Exoplanet
  authors:
  - Swain, Mark R.
  - Estrela, Raissa
  - Roudier, Gael M.
  - Sotin, Christophe
  - Rimmer, Paul B.
  - Valio, Adriana
  - West, Robert
  - Pearson, Kyle
  - Huber-Feely, Noah
  - Zellem, Robert T.
  year: '2021'
  pubdate: '2021-05-00'
  doi: 10.3847/1538-3881/abe879
  abstract: We report the detection of an atmosphere on a rocky exoplanet, GJ 1132 b, which is similar to Earth in terms of
    size and density. The atmospheric transmission spectrum was detected using Hubble WFC3 measurements and shows spectral
    signatures of aerosol scattering, HCN, and CH<SUB>4</SUB> in a low mean molecular weight atmosphere. We model the atmospheric
    loss process and conclude that GJ 1132 b likely lost the original H/He envelope, suggesting that the atmosphere that we
    detect has been reestablished. We explore the possibility of H<SUB>2</SUB> mantle degassing, previously identified as
    a possibility for this planet by theoretical studies, and find that outgassing from ultra-reduced magma could produce
    the observed atmosphere. In this way we use the observed exoplanet transmission spectrum to gain insights into magma composition
    for a terrestrial planet. The detection of an atmosphere on this rocky planet raises the possibility that the numerous
    powerfully irradiated super-Earth planets, believed to be the evaporated cores of sub-Neptunes, may, under favorable circumstances,
    host detectable atmospheres.
