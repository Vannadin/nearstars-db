  abstract: NASA's proposed Terrestrial Planet Finder, a space-based interferometer, will eventually allow spectroscopic analyses
    of the atmospheres of extrasolar planets. Such analyses would provide information about the existence of life on these
    planets. One strategy in the search for life is to look for evidence of O <SUB>3</SUB> (and hence O <SUB>2</SUB>) in a
    planet's atmosphere; another is to look for gases that might be present in an atmosphere analogous to that of the inhabited
    early Earth. In order to investigate these possibilities, we have calculated synthetic spectra for several hypothetical
    terrestrial-type atmospheres. The model atmospheres represent four different scenarios. The first two, representing inhabited
    terrestrial planets, are an Earth-like atmosphere containing variable amounts of oxygen and an early Earth-type atmosphere
    containing methane. In addition, two cases representing Mars-like and early Venus-like atmospheres were evaluated, to
    provide possible "false positive" spectra. The calculated spectra suggest that ozone could be detected by an instrument
    like Terrestrial Planet Finder if the O <SUB>2</SUB> concentration in the planet's atmosphere is ≥200 ppm, or 10 <SUP>-3</SUP>
    times the present atmospheric level. Methane should be observable on an early-Earth type planet if it is present in concentrations
    of 100 ppm or more. Methane has both biogenic and abiogenic sources, but concentrations exceeding 1000 ppm, or 0.1% by
    volume, would be difficult to produce from abiogenic sources alone. High methane concentrations in a planet's atmosphere
    are therefore another potential indicator for extraterrestrial life.
