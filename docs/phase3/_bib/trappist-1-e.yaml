  arxiv_id: null
  ads_bibcode: 2019Sci...365..903A
  title: Deep magma ocean formation set the oxidation state of Earth’s mantle
  authors:
  - Armstrong, Katherine
  - Frost, Daniel J.
  - McCammon, Catherine A.
  - Rubie, David C.
  - Boffa Ballaran, Tiziana
  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.1126/science.aax8376
  abstract: The composition of Earth’s atmosphere depends on the redox state of the mantle, which became more oxidizing at
    some stage after Earth’s core started to form. Through high-pressure experiments, we found that Fe<SUP>2+</SUP> in a deep
    magma ocean would disproportionate to Fe<SUP>3+</SUP> plus metallic iron at high pressures. The separation of this metallic
    iron to the core raised the oxidation state of the upper mantle, changing the chemistry of degassing volatiles that formed
    the atmosphere to more oxidized species. Additionally, the resulting gradient in redox state of the magma ocean allowed
    dissolved CO<SUB>2</SUB> from the atmosphere to precipitate as diamond at depth. This explains Earth’s carbon-rich interior
    and suggests that redox evolution during accretion was an important variable in determining the composition of the terrestrial
    atmosphere.
