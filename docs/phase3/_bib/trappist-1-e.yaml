- arxiv_id: null
  ads_bibcode: 2020AAS...23523001H
  title: Stability of Habitable Environments on Terrestrial Exoplanets
  authors:
  - Hu, R.
  year: '2020'
  pubdate: '2020-01-00'
  doi: null
  abstract: The search for signatures of extrasolar habitable environments will commence soon with JWST observing temperate
    and rocky exoplanets of nearby M dwarf stars. With few exceptions, the standard models for these potentially habitable
    planets entail an atmosphere of N<SUB>2 </SUB>and CO<SUB>2</SUB>, with the abundance of CO<SUB>2 </SUB>adjustable according
    to the level of irradiation. I will discuss the stability of this type of habitable environments, by using an atmospheric
    photochemistry model coupled with a new aqueous-phase chemical kinetics model to calculate the lifetimes of N<SUB>2 </SUB>and
    CO<SUB>2 </SUB>in planetary atmospheres in contact with liquid-water oceans. I will show that reactions of HNO in the
    aqueous phase, the main mechanism thought to convert atmospheric nitrogen to nitrites and nitrates in the ocean, instead
    leads to the formation of N<SUB>2</SUB>O. This N<SUB>2</SUB>O is then released back into the atmosphere and quickly converted
    to N<SUB>2</SUB>. The lifetime of N<SUB>2 </SUB>in anoxic atmospheres is determined to be &gt;1 billion years on temperate
    planets of both Sun-like and M dwarf stars, upholding the validity of molecular nitrogen as a universal background gas
    on rocky planets. I will also show that on planets like TRAPPIST-1 e, photodissociation of CO<SUB>2 </SUB>and reservoir
    molecules like H<SUB>2</SUB>O<SUB>2 </SUB>and HO<SUB>2</SUB>NO<SUB>2 </SUB>cause an "O<SUB>2</SUB>-CO runaway," where
    O<SUB>2 </SUB>and CO take over CO<SUB>2 </SUB>and N<SUB>2 </SUB>as the dominant constituents of the atmosphere. This result
    indicates that O<SUB>2</SUB>, O<SUB>3</SUB>, and CO should be considered together with CO<SUB>2 </SUB>as the primary molecules
    in the search for atmospheric signatures from temperate and rocky planets of TRAPPIST-1 and other M dwarf stars.
