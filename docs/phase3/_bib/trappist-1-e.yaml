- &id666
  arxiv_id: '1607.03230'
  ads_bibcode: 2016ApJ...829...52F
  title: The Impact of Non-uniform Thermal Structure on the Interpretation of Exoplanet Emission Spectra
  authors:
  - Feng, Y. Katherina
  - Line, Michael R.
  - Fortney, Jonathan J.
  - Stevenson, Kevin B.
  - Bean, Jacob
  - Kreidberg, Laura
  - Parmentier, Vivien
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.3847/0004-637X/829/1/52
  abstract: 'The determination of atmospheric structure and molecular abundances of planetary atmospheres via spectroscopy
    involves direct comparisons between models and data. While varying in sophistication, most model spectra comparisons fundamentally
    assume one-dimensional (1D) model physics. However, knowledge from general circulation models and of solar system planets
    suggests that planetary atmospheres are inherently three-dimensional in their structure and composition. We explore the
    potential biases resulting from standard “1D” assumptions within a Bayesian atmospheric retrieval framework. Specifically,
    we show how the assumption of a single 1D thermal profile can bias our interpretation of the thermal emission spectrum
    of a hot Jupiter atmosphere that is composed of two thermal profiles. We retrieve spectra of unresolved model planets
    as observed with a combination of the Hubble Space Telescope Wide Field Camera 3 (WFC3)+Spitzer Infrared Array Camera
    (IRAC) as well as the James Webb Space Telescope (JWST) under varying differences in the two thermal profiles. For WFC3+IRAC,
    there is a significantly biased estimate of CH<SUB>4</SUB> abundance using a 1D model when the contrast is 80%. For JWST,
    two thermal profiles are required to adequately interpret the data and estimate the abundances when contrast is greater
    than 40%. We also apply this preliminary concept to the recent WFC3+IRAC phase curve data of the hot Jupiter WASP-43b.
    We see similar behavior as present in our simulated data: while the {{{H}}}<SUB>2</SUB>{{O}} abundance determination is
    robust, CH<SUB>4</SUB> is artificially well-constrained to incorrect values under the 1D assumption. Our work demonstrates
    the need to evaluate model assumptions in order to extract meaningful constraints from atmospheric spectra and motivates
    exploration of optimal observational setups.'
  source: citation_of=2025A&C....5300982F
