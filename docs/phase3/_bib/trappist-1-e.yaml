  arxiv_id: '1904.09598'
  ads_bibcode: 2019ApJ...877..105M
  title: 'The Stellar CME-Flare Relation: What Do Historic Observations Reveal?'
  authors:
  - Moschou, Sofia-Paraskevi
  - Drake, Jeremy J.
  - Cohen, Ofer
  - Alvarado-Gómez, Julián D.
  - Garraffo, Cecilia
