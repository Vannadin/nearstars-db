- &id464
  arxiv_id: '1607.00409'
  ads_bibcode: 2017ApJS..228...20T
  title: 'VULCAN: An Open-source, Validated Chemical Kinetics Python Code for Exoplanetary Atmospheres'
  authors:
  - Tsai, Shang-Min
  - Lyons, James R.
  - Grosheintz, Luc
  - Rimmer, Paul B.
  - Kitzmann, Daniel
  - Heng, Kevin
  year: '2017'
  pubdate: '2017-02-00'
  doi: 10.3847/1538-4365/228/2/20
  abstract: We present an open-source and validated chemical kinetics code for studying hot exoplanetary atmospheres, which
    we name VULCAN. It is constructed for gaseous chemistry from 500 to 2500 K, using a reduced C-H-O chemical network with
    about 300 reactions. It uses eddy diffusion to mimic atmospheric dynamics and excludes photochemistry. We have provided
    a full description of the rate coefficients and thermodynamic data used. We validate VULCAN by reproducing chemical equilibrium
    and by comparing its output versus the disequilibrium-chemistry calculations of Moses et al. and Rimmer &amp; Helling.
    It reproduces the models of HD 189733b and HD 209458b by Moses et al., which employ a network with nearly 1600 reactions.
    We also use VULCAN to examine the theoretical trends produced when the temperature-pressure profile and carbon-to-oxygen
    ratio are varied. Assisted by a sensitivity test designed to identify the key reactions responsible for producing a specific
    molecule, we revisit the quenching approximation and find that it is accurate for methane but breaks down for acetylene,
    because the disequilibrium abundance of acetylene is not directly determined by transport-induced quenching, but is rather
    indirectly controlled by the disequilibrium abundance of methane. Therefore we suggest that the quenching approximation
    should be used with caution and must always be checked against a chemical kinetics calculation. A one-dimensional model
    atmosphere with 100 layers, computed using VULCAN, typically takes several minutes to complete. VULCAN is part of the
    Exoclimes Simulation Platform (ESP; <A href="https://www.exoclime.net">exoclime.net</A>) and publicly available at <A
    href="https://github.com/exoclime/VULCAN">https://github.com/exoclime/VULCAN</A>.
