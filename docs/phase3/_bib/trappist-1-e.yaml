  arxiv_id: '1402.0004'
  ads_bibcode: 2014A&A...564A.125B
  title: 'X-ray spectral modelling of the AGN obscuring region in the CDFS: Bayesian model selection and catalogue'
  authors:
  - Buchner, J.
  - Georgakakis, A.
  - Nandra, K.
  - Hsu, L.
  - Rangel, C.
  - Brightman, M.
  - Merloni, A.
  - Salvato, M.
  - Donley, J.
  - Kocevski, D.
  year: '2014'
  pubdate: '2014-04-00'
  doi: 10.1051/0004-6361/201322971
  abstract: 'Context. <BR /> Aims: Active galactic nuclei are known to have complex X-ray spectra that depend on both the
    properties of the accreting super-massive black hole (e.g. mass, accretion rate) and the distribution of obscuring material
    in its vicinity (i.e. the "torus"). Often however, simple and even unphysical models are adopted to represent the X-ray
    spectra of AGN, which do not capture the complexity and diversity of the observations. In the case of blank field surveys
    in particular, this should have an impact on e.g. the determination of the AGN luminosity function, the inferred accretion
    history of the Universe and also on our understanding of the relation between AGN and their host galaxies. <BR /> Methods:
    We develop a Bayesian framework for model comparison and parameter estimation of X-ray spectra. We take into account uncertainties
    associated with both the Poisson nature of X-ray data and the determination of source redshift using photometric methods.
    We also demonstrate how Bayesian model comparison can be used to select among ten different physically motivated X-ray
    spectral models the one that provides a better representation of the observations. This methodology is applied to X-ray
    AGN in the 4 Ms Chandra Deep Field South. <BR /> Results: For the ~350 AGN in that field, our analysis identifies four
    components needed to represent the diversity of the observed X-ray spectra: (1) an intrinsic power law; (2) a cold obscurer
    which reprocesses the radiation due to photo-electric absorption, Compton scattering and Fe-K fluorescence; (3) an unabsorbed
    power law associated with Thomson scattering off ionised clouds; and (4) Compton reflection, most noticeable from a stronger-than-expected
    Fe-K line. Simpler models, such as a photo-electrically absorbed power law with a Thomson scattering component, are ruled
    out with decisive evidence (B &gt; 100). We also find that ignoring the Thomson scattering component results in underestimation
    of the inferred column density, N<SUB>H</SUB>, of the obscurer. Regarding the geometry of the obscurer, there is strong
    evidence against both a completely closed (e.g. sphere), or entirely open (e.g. blob of material along the line of sight),
    toroidal geometry in favour of an intermediate case. <BR /> Conclusions: Despite the use of low-count spectra, our methodology
    is able to draw strong inferences on the geometry of the torus. Simpler models are ruled out in favour of a geometrically
    extended structure with significant Compton scattering. We confirm the presence of a soft component, possibly associated
    with Thomson scattering off ionised clouds in the opening angle of the torus. The additional Compton reflection required
    by data over that predicted by toroidal geometry models, may be a sign of a density gradient in the torus or reflection
    off the accretion disk. Finally, we release a catalogue of AGN in the CDFS with estimated parameters such as the accretion
    luminosity in the 2-10 keV band and the column density, N<SUB>H</SUB>, of the obscurer. <P />Appendices and Figs. 6, 9-11
    are available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201322971/olm">http://www.aanda.org</A>Catalogue
    and software are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/564/A125">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/564/A125</A>'
