  ads_bibcode: 2021EPJST.230.2207S
  title: 'Quantifying the classification of exoplanets: in search for the right habitability metric'
  authors:
  - Safonova, Margarita
  - Mathur, Archana
  - Basak, Suryoday
  - Bora, Kakoli
