  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.1029/2023JD039343
  abstract: We present results from 3D simulations of the Archean Earth including a prescribed (non-interactive) spherical
    haze generated through a 1D photochemical model. Our simulations suggest that a thin haze layer, formed when CH<SUB>4</SUB>/CO<SUB>2</SUB>
    = 0.1, leads to global warming of ∼10.6 K due to the change of water vapor and cloud feedback, compared to the simulation
    without any haze. However, a thicker haze layer, formed when CH<SUB>4</SUB>/CO<SUB>2</SUB> &gt; 0.1, leads to global cooling
    of up to ∼65 K as the scattering and absorption of shortwave radiation from the haze reduces the radiation from reaching
    the planetary surface. A thermal inversion is formed with a lower tropopause as the CH<SUB>4</SUB>/CO<SUB>2</SUB> ratio
    increases. The haze reaches an optical threshold thickness when CH<SUB>4</SUB>/CO<SUB>2</SUB> ∼ 0.175 beyond which the
    atmospheric structure and the global surface temperature do not vary much.
