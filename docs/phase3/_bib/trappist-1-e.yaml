  doi: 10.3847/1538-4357/ab0c21
  abstract: The TRAPPIST-1 system is sufficiently closely packed that tides raised by one planet on another are significant.
    We investigate whether this source of tidal heating is comparable to eccentricity tides raised by the star. Assuming a
    homogeneous body with a Maxwell rheology, we find that energy dissipation from stellar tides always dominates over that
    from planet-planet tides across a range of viscosities. TRAPPIST-1 g may experience the greatest proportion of planet-planet
    tidal heating, where it can account for between 2% and 20% of the total amount of tidal heating, for high-viscosity (10<SUP>21</SUP>
    Pa s) and low-viscosity (10<SUP>14</SUP> Pa s) regimes, respectively. If planet-planet tidal heating is to exceed that
    from stellar eccentricity tides, orbital eccentricities must be no more than e = 10<SUP>-3</SUP>-10<SUP>-4</SUP> for most
    of the TRAPPIST-1 planets.
