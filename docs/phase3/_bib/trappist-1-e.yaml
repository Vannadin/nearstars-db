  abstract: The Cassini-Huygens probe gas chromatograph mass spectrometer (GCMS) determined the composition of the Titan atmosphere
    from ∼140 km altitude to the surface. After landing, it returned composition data of gases evaporated from the surface.
    Height profiles of molecular nitrogen (N<SUB>2</SUB>), methane (CH<SUB>4</SUB>), and molecular hydrogen (H<SUB>2</SUB>)
    were determined. Traces were detected on the surface of evaporating methane, ethane (C<SUB>2</SUB>H<SUB>6</SUB>), acetylene
    (C<SUB>2</SUB>H<SUB>2</SUB>), cyanogen (C<SUB>2</SUB>N<SUB>2</SUB>), and carbon dioxide (CO<SUB>2</SUB>). The methane
    data showed evidence that methane precipitation occurred recently. The methane mole fraction was (1.48 ± 0.09) × 10<SUP>-2</SUP>
