  arxiv_id: null
  ads_bibcode: 2019A&A...631A.103B
  title: Linking the evolution of terrestrial interiors and an early outgassed atmosphere to astrophysical observations
  authors:
  - Bower, Dan J.
  - Kitzmann, Daniel
  - Wolf, Aaron S.
  - Sanan, Patrick
  - Dorn, Caroline
  - Oza, Apurva V.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1051/0004-6361/201935710
  abstract: 'Context. A terrestrial planet is molten during formation and may remain molten due to intense insolation or tidal
    forces. Observations favour the detection and characterisation of hot planets, potentially with large outgassed atmospheres.
    <BR /> Aims: We aim to determine the radius of hot Earth-like planets with large outgassing atmospheres. Our goal is to
    explore the differences between molten and solid silicate planets on the mass-radius relationship and transmission and
    emission spectra. <BR /> Methods: An interior-atmosphere model was combined with static structure calculations to track
    the evolving radius of a hot rocky planet that outgasses CO<SUB>2</SUB> and H<SUB>2</SUB>O. We generated synthetic emission
    and transmission spectra for CO<SUB>2</SUB> and H<SUB>2</SUB>O dominated atmospheres. <BR /> Results: Atmospheres dominated
    by CO<SUB>2</SUB> suppress the outgassing of H<SUB>2</SUB>O to a greater extent than previously realised since previous
    studies applied an erroneous relationship between volatile mass and partial pressure. We therefore predict that more H<SUB>2</SUB>O
    can be retained by the interior during the later stages of magma ocean crystallisation. Formation of a surface lid can
    tie the outgassing of H<SUB>2</SUB>O to the efficiency of heat transport through the lid, rather than the radiative timescale
    of the atmosphere. Contraction of the mantle, as it cools from molten to solid, reduces the radius by around 5%, which
    can partly be offset by the addition of a relatively light species (e.g. H<SUB>2</SUB>O versus CO<SUB>2</SUB>) to the
    atmosphere. <BR /> Conclusions: A molten silicate mantle can increase the radius of a terrestrial planet by around 5%
    compared to its solid counterpart, or equivalently account for a 13% decrease in bulk density. An outgassing atmosphere
    can perturb the total radius, according to its composition, notably the abundance of light versus heavy volatile species.
    Atmospheres of terrestrial planets around M-stars that are dominated by CO<SUB>2</SUB> or H<SUB>2</SUB>O can be distinguished
    by observing facilities with extended wavelength coverage (e.g. JWST).'
