  arxiv_id: '1808.02347'
  ads_bibcode: 2018ApJ...863....6S
  title: New Insights into Cosmic-Ray-induced Biosignature Chemistry in Earth-like Atmospheres
  authors:
  - Scheucher, Markus
  - Grenfell, J. L.
  - Wunderlich, F.
  - Godolt, M.
  - Schreier, F.
  - Rauer, H.
  year: '2018'
  pubdate: '2018-08-00'
  doi: 10.3847/1538-4357/aacf03
  abstract: With the recent discoveries of terrestrial planets around active M-dwarfs, destruction processes masking the possible
    presence of life are receiving increased attention in the exoplanet community. We investigate potential biosignatures
    of planets having Earth-like (N<SUB>2</SUB>-O<SUB>2</SUB>) atmospheres orbiting in the habitable zone of the M-dwarf star
    AD LEO. These are bombarded by high energetic particles that can create showers of secondary particles at the surface.
    We apply our cloud-free 1D climate-chemistry model to study the influence of key particle shower parameters and chemical
    efficiencies of NOx and HOx production from cosmic rays. We determine the effect of stellar radiation and cosmic rays
    upon atmospheric composition, temperature, and spectral appearance. Despite strong stratospheric O<SUB>3</SUB> destruction
    by cosmic rays, smog O<SUB>3</SUB> can significantly build up in the lower atmosphere of our modeled planet around AD
    LEO related to low stellar UVB. The abundance of N<SUB>2</SUB>O decreases with increasing flaring energies but a sink
    reaction for N<SUB>2</SUB>O with excited oxygen becomes weaker, stabilizing its abundance. CH<SUB>4</SUB> is removed mainly
    by Cl in the upper atmosphere for the strong flaring cases and not via hydroxyl as is otherwise usually the case. Cosmic
    rays weaken the role of CH<SUB>4</SUB> in heating the middle atmosphere so that H<SUB>2</SUB>O absorption becomes more
    important. We additionally underline the importance of HNO<SUB>3</SUB> as a possible marker for strong stellar particle
    showers. In a nutshell, uncertainty in NOx and HOx production from cosmic rays significantly influences the abundance
    of biosignatures and spectral appearance.
