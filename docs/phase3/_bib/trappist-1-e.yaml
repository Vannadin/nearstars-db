  doi: 10.1126/science.aad0210
  abstract: Coupling between the lower and upper atmosphere, combined with loss of gas from the upper atmosphere to space,
    likely contributed to the thin, cold, dry atmosphere of modern Mars. To help understand ongoing ion loss to space, the
    Mars Atmosphere and Volatile Evolution (MAVEN) spacecraft made comprehensive measurements of the Mars upper atmosphere,
    ionosphere, and interactions with the Sun and solar wind during an interplanetary coronal mass ejection impact in March
    2015. Responses include changes in the bow shock and magnetosheath, formation of widespread diffuse aurora, and enhancement
    of pick-up ions. Observations and models both show an enhancement in escape rate of ions to space during the event. Ion
    loss during solar events early in Mars history may have been a major contributor to the long-term evolution of the Mars
    atmosphere.
