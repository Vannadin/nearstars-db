  ads_bibcode: 2004JMoSp.228..432B
  title: Infrared spectrum of the continuum and dimer absorption in the vicinity of the O <SUB>2</SUB> vibrational fundamental
    in O <SUB>2</SUB>/CO <SUB>2</SUB> mixtures
  authors:
  - Baranov, Yuri I.
  - Lafferty, W. J.
  - Fraser, G. T.
  year: '2004'
  pubdate: '2004-12-00'
  doi: 10.1016/j.jms.2004.04.010
  abstract: The intensities of the collision-induced absorption (CIA) bands associated with the electric-dipole forbidden
    O <SUB>2</SUB> fundamental and the CO <SUB>2</SUB>ν<SUB>1</SUB>/2 ν<SUB>2</SUB> Fermi dyad monomer vibrational bands have
    been studied over the temperature range 193-360 K and the frequency range 1100-2000 cm <SUP>-1</SUP>. As CO <SUB>2</SUB>
    is added to a pure O <SUB>2</SUB> sample, the intensity in the O <SUB>2</SUB> fundamental band region increases dramatically.
    At the lowest temperature studied, 193 K, the band-integrated CIA coefficient for enhancement of the Fermi dyad absorption
    from CO <SUB>2</SUB> to CO <SUB>2</SUB> collisions, S<SUB>CO <SUB>2</SUB>-CO <SUB>2</SUB></SUB>, is more than a factor
    of two larger than the band-integrated CIA coefficient for enhancement of the O <SUB>2</SUB> vibrational fundamental by
    CO <SUB>2</SUB> collisions, S<SUB>O <SUB>2</SUB>-CO <SUB>2</SUB></SUB>. Moreover, the S<SUB>CO <SUB>2</SUB>-CO <SUB>2</SUB></SUB>
    coefficient shows a significantly larger temperature dependence, increasing by more than a factor of two from 345.6 to
    193 K while S<SUB>O <SUB>2</SUB>-CO <SUB>2</SUB></SUB> increases by less than one third. The band shapes and their temperature
    dependence provide clear evidence for the formation of CO <SUB>2</SUB>-CO <SUB>2</SUB> and CO <SUB>2</SUB>-O <SUB>2</SUB>
    complexes. The CO <SUB>2</SUB>-CO <SUB>2</SUB> dimer feature is most striking, contributing significantly to the infrared
    absorption near the expected CO <SUB>2</SUB> monomer fundamentals. Evidence for the more weakly bound CO <SUB>2</SUB>-O
    <SUB>2</SUB> complex is seen on the O <SUB>2</SUB> CIA band, particularly at the lowest temperatures studied. The shapes
    for both dimer bands display sharp a-type Q branch central profiles and broad P and R branch like structure attributed
    to b-type Q branches for the CO <SUB>2</SUB>-CO <SUB>2</SUB> complex and a-type P and R branch structure for the CO <SUB>2</SUB>-O
    <SUB>2</SUB> complex. The present results stress the importance of including bound and metastable dimer absorption in
    any theoretical modeling of CIA, particularly when one of the collision partners has a large electrostatic moment, such
    as CO <SUB>2</SUB> with its large electric quadrupole moment.
