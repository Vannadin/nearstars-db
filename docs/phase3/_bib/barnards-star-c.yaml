  ads_bibcode: 2011YarPV...3c..28T
  title: To the problem of meteoroid stream research
  authors:
  - Tikhomirova, E. N.
  year: '2011'
  pubdate: '2011-09-00'
  doi: null
  abstract: 'In the context of the perturbed two-body problem a criterion for identification of a probable meteoroid parent
    body is suggested. Analytical solutions of equations of motion take into account radiation pressure, Poynting-Robertson
    effect and its corpuscular part. We found that parent comets for meteor showers beta Cancrids and lambda Cygnids are the
    comets 3D/Biela and 73P/Schwassmann-Wachmann correspondingly. For kappa Cygnids we found two associations: 177/P Barnard
    and C/1905 III F1 Giacobini.'
