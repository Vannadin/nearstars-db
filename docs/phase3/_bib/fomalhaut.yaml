note: 'Phase 2 anchor bibliography for Fomalhaut (alpha PsA, HD 216956, A3/A4 V; eccentric debris ring, wide triple) — Tier
  1 stellar inversion fix. Mass/radius/ Teff/luminosity/age all anchored on Mamajek 2012, the dedicated age paper that also
  re-derives the fundamental parameters: mass 1.92 (isochrone), R 1.842 (interferometry, theta_LD 2.223 mas from Absil 2009
  which removes the resolved hot-dust K-band excess), Teff 8590, L 16.63 (bolometric, Davis f_bol + revised parallax), age
  440 +/- 40 Myr (isochrone of A + gyro/Li/X-ray of the companion TW PsA). RADIUS/Teff DIVERGENCE: Davis 2005 gives R 1.744
  / Teff 8819 because it did NOT subtract the circumstellar excess -> Absil/Mamajek corrected values preferred. [Fe/H] near-solar
  (Mamajek assumes protosolar; Dunkin 1997 measured -0.03; A-star spectroscopic [Fe/H] is scattered/unreliable). Rotation:
  only v sin i ~93 km/s (Royer 2007), NO measured period for the A-star (the 10.3 d is the K-dwarf companion) -- not recorded.
  NO log R''HK (A star); no standalone X-ray detection of the A primary.'
