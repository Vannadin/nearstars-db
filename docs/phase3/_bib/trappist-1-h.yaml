- &id060
  arxiv_id: '2111.13351'
  ads_bibcode: 2022NatAs...6...80R
  title: An upper limit on late accretion and water delivery in the TRAPPIST-1 exoplanet system
  authors:
  - Raymond, Sean N.
  - Izidoro, Andre
  - Bolmont, Emeline
  - Dorn, Caroline
  - Selsis, Franck
  - Turbet, Martin
  - Agol, Eric
