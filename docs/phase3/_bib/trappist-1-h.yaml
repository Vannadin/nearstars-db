  ads_bibcode: 2020A&A...644L...2S
  title: Re-analysis of the 267 GHz ALMA observations of Venus. No statistically significant detection of phosphine
  authors:
  - Snellen, I. A. G.
  - Guzman-Ramirez, L.
  - Hogerheijde, M. R.
  - Hygate, A. P. S.
  - van der Tak, F. F. S.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.1051/0004-6361/202039717
  abstract: 'Context. ALMA observations of Venus at 267 GHz that show the apparent presence of phosphine (PH<SUB>3</SUB>)
    in its atmosphere have been presented in the literature. Phosphine currently has no evident production routes on the planet''s
    surface or in its atmosphere. <BR /> Aims: The aim of this work is to assess the statistical reliability of the line detection
    via independent re-analysis of the ALMA data. <BR /> Methods: The ALMA data were reduced the same way as in the published
    study, following the provided scripts. First, the spectral analysis presented in the study was reproduced and assessed.
    Subsequently, the spectrum, including its dependence on selected ALMA baselines, was statistically evaluated. <BR /> Results:
    We find that the 12th-order polynomial fit to the spectral passband utilised in the published study leads to spurious
    results. Following their recipe, five other &gt; 10σ lines can be produced in absorption or emission within 60 km s<SUP>-1</SUP>
    from the PH<SUB>3</SUB> 1-0 transition frequency by suppressing the surrounding noise. Our independent analysis shows
    a feature near the PH<SUB>3</SUB> frequency at a ∼2σ level, below the common threshold for statistical significance. Since
    the spectral data have a non-Gaussian distribution, we consider a feature at such level as statistically unreliable, which
    cannot be linked to a false positive probability. <BR /> Conclusions: We find that the published 267 GHz ALMA data provide
    no statistical evidence for phosphine in the atmosphere of Venus. <P />Since the publication of GRB20, the authors alerted
    us about an update in the ALMA data processing script and made the new script available. In parallel, the data available
    in the ALMA Science Archive are undergoing (so-called QA3) reprocessing to include the same correction. The resulting
    reprocessed data no longer contain the strong ripples that GRB20 report and that we also find, for example as manifested
    in the non-Gaussian noise distribution. In these reprocessed data, we do not find a clear absorption feature that can
    be attributed to PH<SUB>3</SUB>, although further exploration of these data is necessary to analyse this in more detail.'
