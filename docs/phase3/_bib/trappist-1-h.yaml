  arxiv_id: '1605.05729'
  ads_bibcode: 2016ApJ...828...99C
  title: Measuring Transit Signal Recovery in the Kepler Pipeline. III. Completeness of the Q1-Q17 DR24 Planet Candidate Catalogue
    with Important Caveats for Occurrence Rate Calculations
  authors:
  - Christiansen, Jessie L.
  - Clarke, Bruce D.
  - Burke, Christopher J.
  - Jenkins, Jon M.
  - Bryson, Stephen T.
  - Coughlin, Jeffrey L.
  - Mullally, Fergal
  - Thompson, Susan E.
  - Twicken, Joseph D.
  - Batalha, Natalie M.
  - Haas, Michael R.
  - Catanzarite, Joseph
  - Campbell, Jennifer R.
  - Kamal Uddin, AKM
  - Zamudio, Khadeejah
  - Smith, Jeffrey C.
  - Henze, Christopher E.
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.3847/0004-637X/828/2/99
  abstract: With each new version of the Kepler pipeline and resulting planet candidate catalog, an updated measurement of
    the underlying planet population can only be recovered with a corresponding measurement of the Kepler pipeline detection
    efficiency. Here we present measurements of the sensitivity of the pipeline (version 9.2) used to generate the Q1-Q17
    DR24 planet candidate catalog. We measure this by injecting simulated transiting planets into the pixel-level data of
    159,013 targets across the entire Kepler focal plane, and examining the recovery rate. Unlike previous versions of the
    Kepler pipeline, we find a strong period dependence in the measured detection efficiency, with longer (&gt;40 day) periods
    having a significantly lower detectability than shorter periods, introduced in part by an incorrectly implemented veto.
    Consequently, the sensitivity of the 9.2 pipeline cannot be cast as a simple one-dimensional function of the signal strength
    of the candidate planet signal, as was possible for previous versions of the pipeline. We report on the implications for
    occurrence rate calculations based on the Q1-Q17 DR24 planet candidate catalog, and offer important caveats and recommendations
    for performing such calculations. As before, we make available the entire table of injected planet parameters and whether
    they were recovered by the pipeline, enabling readers to derive the pipeline detection sensitivity in the planet and/or
    stellar parameter space of their choice.
