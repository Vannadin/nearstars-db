  arxiv_id: '1808.03243'
  ads_bibcode: 2018AJ....156..140I
  title: Four New Eclipsing Mid M-dwarf Systems from the New Luyten Two Tenths Catalog
  authors:
  - Irwin, Jonathan M.
  - Charbonneau, David
  - Esquerdo, Gilbert A.
  - Latham, David W.
  - Winters, Jennifer G.
  - Dittmann, Jason A.
  - Newton, Elisabeth R.
  - Berta-Thompson, Zachory K.
  - Berlind, Perry
  - Calkins, Michael L.
  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.3847/1538-3881/aad9a3
  abstract: 'Using data from the MEarth-North and MEarth-South transit surveys, we present the detection of eclipses in four
    mid M-dwarf systems: LP 107-25, LP 261-75, LP 796-24, and LP 991-15. Combining the MEarth photometry with spectroscopic
    follow-up observations, we show that LP 107-25 and LP 796-24 are short-period (1.388 and 0.523 day, respectively) eclipsing
    binaries in triple-lined systems with substantial third-light contamination from distant companions. LP 261-75 is a short-period
    (1.882 day) single-lined system consisting of a mid M-dwarf eclipsed by a probable brown dwarf secondary, with another
    distant visual brown dwarf companion. LP 991-15 is a long-period (29.3 day) double-lined eclipsing binary on an eccentric
    orbit with a geometry that produces only primary eclipses. A spectroscopic orbit is given for LP 991-15, and initial orbits
    for LP 107-25 and LP 261-75.'
