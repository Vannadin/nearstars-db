- &id552
  arxiv_id: '2305.05697'
  ads_bibcode: 2023ApJ...951...96G
  title: The Hazy and Metal-rich Atmosphere of GJ 1214 b Constrained by Near- and Mid-infrared Transmission Spectroscopy
  authors:
  - Gao, Peter
  - Piette, Anjali A. A.
  - Steinrueck, Maria E.
  - Nixon, Matthew C.
  - Zhang, Michael
  - Kempton, Eliza M.-R.
  - Bean, Jacob L.
  - Rauscher, Emily
  - Parmentier, Vivien
  - Batalha, Natasha E.
  - Savel, Arjun B.
  - Triantafillides, Anastasia
  - Roman, Michael T.
  - Malsky, Isaac
  - Taylor, Jake
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.3847/1538-4357/acd16f
  abstract: The near-infrared transmission spectrum of the warm sub-Neptune exoplanet GJ 1214 b has been observed to be flat
    and featureless, implying a high metallicity atmosphere with abundant aerosols. Recent JWST MIRI Low Resolution Spectrometer
    observations of a phase curve of GJ 1214 b showed that its transmission spectrum is flat out into the mid-infrared. In
    this paper, we use the combined near- and mid-infrared transmission spectrum of GJ 1214 b to constrain its atmospheric
    composition and aerosol properties. We generate a grid of photochemical haze models using an aerosol microphysics code
    for a number of background atmospheres spanning metallicities from 100 to 1000× solar, as well as a steam atmosphere scenario.
    The flatness of the combined data set largely rules out atmospheric metallicities ≤300× solar due to their large corresponding
    molecular feature amplitudes, preferring values ≥1000× solar and column haze production rates ≥10<SUP>−10</SUP> g cm<SUP>−2</SUP>
    s<SUP>−1</SUP>. The steam atmosphere scenario with similarly high haze production rates also exhibits sufficiently small
    molecular features to be consistent with the transmission spectrum. These compositions imply that atmospheric mean molecular
    weights ≥15 g mol<SUP>−1</SUP> are needed to fit the data. Our results suggest that haze production is highly efficient
    on GJ 1214 b and could involve non-hydrocarbon, non-nitrogen haze precursors. Further characterization of GJ 1214 b's
    atmosphere would likely require multiple transits and eclipses using JWST across the near- and mid-infrared, potentially
    complemented by ground-based high-resolution transmission spectroscopy.
  source: citation_of=2026haex.book..216E
