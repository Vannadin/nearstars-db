- &id794
  arxiv_id: '1912.12632'
  ads_bibcode: 2020A&A...635A...6B
  title: 'MCMCI: A code to fully characterise an exoplanetary system'
  authors:
  - Bonfanti, A.
  - Gillon, M.
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.1051/0004-6361/201936326
  abstract: 'Context. Useful information can be retrieved by analysing the transit light curve of a planet-hosting star or
    induced radial velocity oscillations. However, inferring the physical parameters of the planet, such as mass, size, and
    semi-major axis, requires preliminary knowledge of some parameters of the host star, especially its mass or radius, which
    are generally inferred through theoretical evolutionary models. <BR /> Aims: We seek to present and test a whole algorithm
    devoted to the complete characterisation of an exoplanetary system thanks to the global analysis of photometric or radial
    velocity time series combined with observational stellar parameters derived either from spectroscopy or photometry. <BR
    /> Methods: We developed an integrated tool called MCMCI. This tool combines the Markov chain Monte Carlo (MCMC) approach
    of analysing photometric or radial velocity time series with a proper interpolation within stellar evolutionary isochrones
    and tracks, known as isochrone placement, to be performed at each chain step, to retrieve stellar theoretical parameters
    such as age, mass, and radius. <BR /> Results: We tested the MCMCI on the HD 219134 multi-planetary system hosting two
    transiting rocky super Earths and on WASP-4, which hosts a bloated hot Jupiter. Even considering different input approaches,
    a final convergence was reached within the code, we found good agreement with the results already stated in the literature
    and we obtained more precise output parameters, especially concerning planetary masses. <BR /> Conclusions: The MCMCI
    tool offers the opportunity to perform an integrated analysis of an exoplanetary system without splitting it into the
    preliminary stellar characterisation through theoretical models. Rather this approach favours a close interaction between
    light curve analysis and isochrones, so that the parameters recovered at each step of the MCMC enter as inputs for purposes
    of isochrone placement. <P />Data and code are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/635/A6">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/635/A6</A>'
