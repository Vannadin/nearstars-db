- &id1112
  arxiv_id: '2012.00819'
  ads_bibcode: 2020NatCo..11.6153L
  title: Carbonate-silicate cycle predictions of Earth-like planetary climates and testing the habitable zone concept
  authors:
  - Lehmer, Owen R.
  - Catling, David C.
  - Krissansen-Totton, Joshua
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.1038/s41467-020-19896-2
  abstract: In the conventional habitable zone (HZ) concept, a CO<SUB>2</SUB>-H<SUB>2</SUB>O greenhouse maintains surface
    liquid water. Through the water-mediated carbonate-silicate weathering cycle, atmospheric CO<SUB>2</SUB> partial pressure
    (pCO<SUB>2</SUB>) responds to changes in surface temperature, stabilizing the climate over geologic timescales. We show
    that this weathering feedback ought to produce a log-linear relationship between pCO<SUB>2</SUB> and incident flux on
    Earth-like planets in the HZ. However, this trend has scatter because geophysical and physicochemical parameters can vary,
    such as land area for weathering and CO<SUB>2</SUB> outgassing fluxes. Using a coupled climate and carbonate-silicate
    weathering model, we quantify the likely scatter in pCO<SUB>2</SUB> with orbital distance throughout the HZ. From this
    dispersion, we predict a two-dimensional relationship between incident flux and pCO<SUB>2</SUB> in the HZ and show that
    it could be detected from at least 83 (2σ) Earth-like exoplanet observations. If fewer Earth-like exoplanets are observed,
    testing the HZ hypothesis from this relationship could be difficult.
  source: citation_of=2022ARA&A..60..159W
