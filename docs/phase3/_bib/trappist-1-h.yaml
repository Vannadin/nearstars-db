  ads_bibcode: 2023ApJ...948L..11M
  title: High Tide or Riptide on the Cosmic Shoreline? A Water-rich Atmosphere or Stellar Contamination for the Warm Super-Earth
    GJ 486b from JWST Observations
  authors:
  - Moran, Sarah E.
  - Stevenson, Kevin B.
  - Sing, David K.
  - MacDonald, Ryan J.
  - Kirk, James
  - Lustig-Yaeger, Jacob
  - Peacock, Sarah
  - Mayorga, L. C.
