  arxiv_id: '0909.2008'
  ads_bibcode: 2009PASP..121.1218B
  title: The Carnegie Astrometric Planet Search Program
  authors:
  - Boss, Alan P.
  - Weinberger, Alycia J.
  - Anglada-Escudé, Guillem
  - Thompson, Ian B.
  - Burley, Gregory
  - Birk, Christoph
  - Pravdo, Steven H.
  - Shaklan, Stuart B.
  - Gatewood, George D.
