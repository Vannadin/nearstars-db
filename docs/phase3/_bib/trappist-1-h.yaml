  title: 'Astrometry and Radial Velocities of the Planet Host M Dwarf GJ 317: New Trigonometric Distance, Metallicity, and
    Upper Limit to the Mass of GJ 317b'
  authors:
  - Anglada-Escudé, Guillem
  - Boss, Alan P.
  - Weinberger, Alycia J.
  - Thompson, Ian B.
  - Butler, R. Paul
  - Vogt, Steven S.
  - Rivera, Eugenio J.
