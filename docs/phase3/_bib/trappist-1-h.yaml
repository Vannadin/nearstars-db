- &id1105
  arxiv_id: '2211.06010'
  ads_bibcode: 2024Icar..41416033Z
  title: Cosmic hydrogen and ice loss lines
  authors:
  - Zeng, Li
  - Jacobsen, Stein B.
  year: '2024'
  pubdate: '2024-05-00'
  doi: 10.1016/j.icarus.2024.116033
  abstract: We explain the overall equilibrium-temperature-dependent trend in the exoplanet mass-radius diagram, using the
    escape mechanisms of hydrogen and relevant volatiles, and the chemical equilibrium calculation of molecular hydrogen (H<SUB>2</SUB>)
    break-up into atomic hydrogen (H). We identify two Cosmic Hydrogen and Ice Loss Lines (CHILLs) in the mass-radius diagram.
    Gas disks are well known to disperse in ten million years. However, gas-rich planets may lose some or almost all gas on
    a much longer timescale. We thus hypothesize that most planets that are born out of a hydrogen-gas-dominated nebular disk
    begin by possessing a primordial H<SUB>2</SUB>-envelope. This envelope is gradually lost due to escape processes caused
    by host-stellar radiation.
