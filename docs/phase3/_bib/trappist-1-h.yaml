- arxiv_id: '1605.06811'
  ads_bibcode: 2016A&C....17....1H
  title: 'VARTOOLS: A program for analyzing astronomical time-series data'
  authors:
  - Hartman, J. D.
  - Bakos, G. Á.
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.1016/j.ascom.2016.05.006
  abstract: This paper describes the VARTOOLS program, which is an open-source command-line utility, written in C, for analyzing
    astronomical time-series data, especially light curves. The program provides a general-purpose set of tools for processing
    light curves including signal identification, filtering, light curve manipulation, time conversions, and modeling and
    simulating light curves. Some of the routines implemented include the Generalized Lomb-Scargle periodogram, the Box-Least
    Squares transit search routine, the Analysis of Variance periodogram, the Discrete Fourier Transform including the CLEAN
    algorithm, the Weighted Wavelet Z-Transform, light curve arithmetic, linear and non-linear optimization of analytic functions
    including support for Markov Chain Monte Carlo analyses with non-trivial covariances, characterizing and/or simulating
    time-correlated noise, and the TFA and SYSREM filtering algorithms, among others. A mechanism is also provided for incorporating
    a user's own compiled processing routines into the program. VARTOOLS is designed especially for batch processing of light
