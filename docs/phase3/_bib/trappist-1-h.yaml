  ads_bibcode: 2023Icar..40615754J
  title: 'A race against the clock: Constraining the timing of cometary bombardment relative to Earth''s growth'
  authors:
  - Joiret, Sarah
  - Raymond, Sean N.
  - Avice, Guillaume
  - Clement, Matthew S.
  - Deienno, Rogerio
