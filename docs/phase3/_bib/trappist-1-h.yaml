- &id441
  arxiv_id: '1909.05264'
  ads_bibcode: 2019AJ....158..238H
  title: An Integrable Model for the Dynamics of Planetary Mean-motion Resonances
  authors:
  - Hadden, Sam
  year: '2019'
  pubdate: '2019-12-00'
  doi: 10.3847/1538-3881/ab5287
  abstract: I consider the dynamics of mean-motion resonances (MMRs) between pairs of coplanar planets and derive a new integrable
    Hamiltonian model for the planets’ resonant motion. The new model generalizes integrable Hamiltonians previously derived
    for first-order resonances to the case of higher-order resonances by exploiting a surprising near-symmetry of the full,
    non-integrable Hamiltonians of higher-order resonances. Whereas past works have frequently relied on truncated disturbing
    function expansions to derive integrable approximations to resonant motion, I show that no such truncated expansion is
    necessary to derive an integrable model. This enables the new model to accurately capture the dynamics of both first-
    and higher-order resonances for eccentricities up to orbit crossing. I demonstrate that predictions of the new integrable
    model agree well with numerical integrations of resonant planet pairs. Finally, I explore the secular evolution of resonant
    planets’ eccentricities. I show that the secular dynamics are governed by conservation of an angular-momentum-deficit-like
    quantity. I also demonstrate that secular frequencies depend on planets’ resonant libration amplitude and this generally
    gives rise to a secular resonance inside the MMR at large libration amplitudes. The integrable model derived in this work
    can serve as a framework for analyzing the dynamics of planetary MMRs in a wide variety of contexts.
