  year: '2014'
  pubdate: '2014-03-00'
  doi: 10.1088/0004-637X/784/1/44
  abstract: We extend the statistical analysis performed by Lissauer et al. in 2012, which demonstrates that the overwhelming
    majority of Kepler candidate multiple transiting systems (multis) represents true transiting planets, and we develop therefrom
    a procedure to validate large numbers of planet candidates in multis as bona fide exoplanets. We show that this statistical
    framework correctly estimates the abundance of false positives already identified around Kepler targets with multiple
    sets of transit-like signatures based on their abundance around targets with single sets of transit-like signatures. We
    estimate the number of multis that represent split systems of one or more planets orbiting each component of a binary
    star system. We use the high reliability rate for multis to validate more than one dozen particularly interesting multi-planet
    systems herein. Hundreds of additional multi-planet systems are validated in a companion paper by Rowe et al. We note
    that few very short period (P &lt; 1.6 days) planets orbit within multiple transiting planet systems and discuss possible
    reasons for their absence. There also appears to be a shortage of planets with periods exceeding a few months in multis.
