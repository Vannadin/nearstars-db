- &id566
  arxiv_id: '2504.06848'
  ads_bibcode: 2025MNRAS.540.1909S
  title: 'TOI-6478 b: a cold underdense Neptune transiting a fully convective M dwarf from the thick disc'
  authors:
  - Scott, Madison G.
  - Triaud, Amaury H. M. J.
  - Barkaoui, Khalid
  - Sebastian, Daniel
  - Burgasser, Adam J.
  - Collins, Karen A.
  - Dransfield, Georgina
  - Hellier, Coel
  - Howell, Steve B.
  - Piette, Anjali A. A.
  - Rackham, Benjamin V.
  - Stassun, Keivan G.
  - Stokholm, Amalie
  - Timmermans, Mathilde
  - Watkins, Cristilyn N.
  - Fausnaugh, Michael
  - Fukui, Akihiko
  - Jenkins, Jon M.
  - Narita, Norio
  - Ricker, George
  - Softich, Emma
  - Schwarz, Richard P.
  - Seager, Sara
  - Shporer, Avi
  - Theissen, Christopher
  - Twicken, Joseph D.
  - Winn, Joshua N.
  - Watanabe, David
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.1093/mnras/staf684
  abstract: Growing numbers of exoplanet detections continue to reveal the diverse nature of planetary systems. Planet formation
    around late-type M dwarfs is of particular interest. These systems provide practical laboratories to measure exoplanet
    occurrence rates for M dwarfs, thus testing how the outcomes of planet formation scale with host mass, and how they compare
    to Sun-like stars. Here, we report the discovery of TOI-6478 b, a cold (<inline-formula><tex-math>$T_{\text{eq}}=204\,$</tex-math></inline-formula>
    K) Neptune-like planet orbiting an M5 star (<inline-formula><tex-math>$R_\star =0.234\pm 0.012\, \text{R}_\odot$</tex-math></inline-formula>,
    <inline-formula><tex-math>$M_\star =0.230\pm 0.007\, \text{M}_\odot$</tex-math></inline-formula>, <inline-formula><tex-math>$T_{\text{eff}}=3230\pm
    75\,$</tex-math></inline-formula> K) that is a member of the Milky Way's thick disc. We measure a planet radius of <inline-formula><tex-math>$R_b=4.6\pm
    0.24\, \text{R}_{\oplus }$</tex-math></inline-formula> on a <inline-formula><tex-math>$P_b=34.005019\pm 0.000025\,$</tex-math></inline-formula>
    d orbit. Using radial velocities, we calculate an upper mass limit of <inline-formula><tex-math>$M_b\le 9.9\, \text{M}_{\oplus
    }$</tex-math></inline-formula> (<inline-formula><tex-math>$M_b\le 0.6\, \text{M}_{\text{Nep}})$</tex-math></inline-formula>,
    with <inline-formula><tex-math>$3\, \sigma$</tex-math></inline-formula> confidence. TOI-6478 b is a milestone planet in
    the study of cold Neptune-like worlds. Due to its large atmospheric scale height, it is amenable to atmospheric characterization
    with facilities such as JWST, and will provide an excellent probe of atmospheric chemistry in this cold regime. It is
    one of very few transiting exoplanets that orbit beyond their system's ice-line whose atmospheric chemical composition
    can be measured. Based on our current understanding of this planet, we estimate TOI-6478 b's spectroscopic features (in
    transmission) can be <inline-formula><tex-math>$\sim 2.5\times$</tex-math></inline-formula> as high as the widely studied
    planet K2-18 b.
