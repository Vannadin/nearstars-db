  abstract: We report on the masses, sizes, and orbits of the planets orbiting 22 Kepler stars. There are 49 planet candidates
    around these stars, including 42 detected through transits and 7 revealed by precise Doppler measurements of the host
    stars. Based on an analysis of the Kepler brightness measurements, along with high-resolution imaging and spectroscopy,
    Doppler spectroscopy, and (for 11 stars) asteroseismology, we establish low false-positive probabilities (FPPs) for all
    of the transiting planets (41 of 42 have an FPP under 1%), and we constrain their sizes and masses. Most of the transiting
    planets are smaller than three times the size of Earth. For 16 planets, the Doppler signal was securely detected, providing
    a direct measurement of the planet's mass. For the other 26 planets we provide either marginal mass measurements or upper
    limits to their masses and densities; in many cases we can rule out a rocky composition. We identify six planets with
    densities above 5 g cm<SUP>-3</SUP>, suggesting a mostly rocky interior for them. Indeed, the only planets that are compatible
    with a purely rocky composition are smaller than ~2 R <SUB>⊕</SUB>. Larger planets evidently contain a larger fraction
    of low-density material (H, He, and H<SUB>2</SUB>O). <P />Based in part on observations obtained at the W. M. Keck Observatory,
    which is operated by the University of California and the California Institute of Technology.
