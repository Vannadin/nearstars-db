  - Lafrèniere, David
  - Meyer, Michael
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.3847/1538-3881/ad6f0c
  abstract: The discovery and characterization of free-floating planetary-mass objects (FFPMOs) is fundamental to our understanding
    of star and planet formation. Here we report results from an extremely deep spectroscopic survey of the young star cluster
    NGC1333 using Near-InfraRed Imager and Slitless Spectrograph (NIRISS) wide field slitless spectroscopy on the James Webb
    Space Telescope. The survey is photometrically complete to K ∼ 21, and includes useful spectra for objects as faint as
    K ∼ 20.5. The observations cover 19 known brown dwarfs, for most of which we confirm spectral types using NIRISS spectra.
    We discover six new candidates with L-dwarf spectral types that are plausible planetary-mass members of NGC1333, with
    estimated masses between 5 and 15 M <SUB>Jup</SUB>. One, at ∼5 M <SUB>Jup</SUB>, shows clear infrared excess emission
    and is a good candidate to be the lowest-mass object known to have a disk. We do not find any objects later than mid-L
    spectral type (M ≲ 4 M <SUB>Jup</SUB>). The paucity of Jupiter-mass objects, despite the survey's unprecedented sensitivity,
    suggests that our observations reach the lowest-mass objects that formed like stars in NGC1333. Our findings put the fraction
    of FFPMOs in NGC1333 at ∼10% of the number of cluster members, significantly more than expected from the typical log-normal
    stellar mass function. We also search for wide binaries in our images and report a young brown dwarf with a planetary-mass
    companion.
