  arxiv_id: '1805.07089'
  ads_bibcode: 2018MNRAS.478.4225A
  title: 'Automatic vetting of planet candidates from ground-based surveys: machine learning with NGTS'
  authors:
  - Armstrong, David J.
  - Günther, Maximilian N.
  - McCormac, James
  - Smith, Alexis M. S.
  - Bayliss, Daniel
  - Bouchy, François
  - Burleigh, Matthew R.
