- &id927
  arxiv_id: '1609.09075'
  ads_bibcode: 2017ApJ...837...63L
  title: 'The Pale Green Dot: A Method to Characterize Proxima Centauri b Using Exo-Aurorae'
  authors:
  - Luger, Rodrigo
  - Lustig-Yaeger, Jacob
  - Fleming, David P.
  - Tilley, Matt A.
  - Agol, Eric
  - Meadows, Victoria S.
  - Deitrick, Russell
  - Barnes, Rory
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.3847/1538-4357/aa6040
  abstract: We examine the feasibility of detecting auroral emission from the potentially habitable exoplanet Proxima Centauri
    b. Detection of aurorae would yield an independent confirmation of the planet’s existence, constrain the presence and
    composition of its atmosphere, and determine the planet’s eccentricity and inclination, thereby breaking the mass-inclination
    degeneracy. If Proxima Centauri b is a terrestrial world with an Earth-like atmosphere and magnetic field, we estimate
    that the power at the 5577 Å O I auroral line is on the order of 0.1 TW under steady-state stellar wind, or ∼100× stronger
    than that on Earth. This corresponds to a planet-star contrast ratio of {10}<SUP>-6</SUP>{--}{10}<SUP>-7</SUP> in a narrow
    band about the 5577 Å line, though higher contrast ({10}<SUP>-4</SUP>{--}{10}<SUP>-5</SUP>) may be possible during periods
    of strong magnetospheric disturbance (auroral power 1-10 TW). We searched the Proxima Centauri b HARPS data for the 5577
    Å line and for other prominent oxygen and nitrogen lines, but find no signal, indicating that the O I auroral line contrast
    must be lower than 2× {10}<SUP>-2</SUP> (with power ≲3000 TW), consistent with our predictions. We find that observations
    of 0.1 TW auroral emission lines are likely infeasible with current and planned telescopes. However, future observations
    with a space-based coronagraphic telescope or a ground-based extremely large telescope (ELT) with a coronagraph could
    push sensitivity down to terawatt oxygen aurorae (contrast 7× {10}<SUP>-6</SUP>) with exposure times of ∼1 day. If a coronagraph
    design contrast of 10<SUP>-7</SUP> can be achieved with negligible instrumental noise, a future concept ELT could observe
    steady-state auroral emission in a few nights.
  source: citation_of=2018ApJ...867...76L
