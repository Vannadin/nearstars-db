  abstract: Of the approximately 25 directly imaged planets to date, all are younger than 500 Myr, and all but six are younger
    than 100 Myr (ref. <SUP>1</SUP>). Eps Ind A (HD209100, HIP108870) is a K5V star of roughly solar age (recently derived
    as 3.7─5.7 Gyr (ref. <SUP>2</SUP>) and <inline-formula id="IEq1"><mml:math><mml:msubsup><mml:mrow><mml:mn>3.5</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>1.3</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.8</mml:mn></mml:mrow></mml:msubsup></mml:math></inline-formula>
    Gyr (ref. <SUP>3</SUP>)). A long-term radial-velocity trend<SUP>4,5</SUP> and an astrometric acceleration<SUP>6,7</SUP>
    led to claims of a giant planet<SUP>2,8,9</SUP> orbiting the nearby star (3.6384 ± 0.0013 pc; ref. <SUP>10</SUP>). Here
    we report JWST coronagraphic images which reveal a giant exoplanet that is consistent with these radial and astrometric
    measurements but inconsistent with the previously claimed planet properties. The new planet has a temperature of approximately
    275 K and is remarkably bright at 10.65 and 15.50 µm. Non-detections between 3.5 and 5.0 µm indicate an unknown opacity
    source in the atmosphere, possibly suggesting a high-metallicity, high carbon-to-oxygen ratio planet. The best-fitting
    temperature of the planet is consistent with theoretical thermal evolution models, which were previously untested at this
    temperature range. The data indicate that this is probably the only giant planet in the system, and therefore we refer
    to it as b, despite it having significantly different orbital properties than the previously claimed planet b.
