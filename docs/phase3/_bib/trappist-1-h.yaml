  doi: 10.3847/1538-3881/ad81d7
  abstract: The characterization of young planets (&lt;300 Myr) is pivotal for understanding planet formation and evolution.
    We present the 3─5 μm transmission spectrum of the 17 Myr, Jupiter-size (R ∼10R <SUB>⊕</SUB>) planet, HIP 67522b, observed
    with JWST NIRSpec/G395H. To check for spot contamination, we obtain a simultaneous g-band transit with the Southern Astrophysical
    Research Telescope. The spectrum exhibits absorption features 30%─50% deeper than the overall depth, far larger than expected
    from an equivalent mature planet, and suggests that HIP 67522b's mass is &lt;20 M <SUB>⊕</SUB> irrespective of cloud cover
    and stellar contamination. A Bayesian retrieval analysis returns a mass constraint of 13.8 ± 1.0 M <SUB>⊕</SUB>. This
    challenges the previous classification of HIP 67522b as a hot Jupiter and instead, positions it as a precursor to the
    more common sub-Neptunes. With a density of &lt;0.10 g cm<SUP>−3</SUP>, HIP 67522 b is one of the lowest-density planets
    known. We find strong absorption from H<SUB>2</SUB>O and CO<SUB>2</SUB> (≥7σ), a modest detection of CO (3.5σ), and weak
    detections of H<SUB>2</SUB>S and SO<SUB>2</SUB> (≃2σ). Comparisons with radiative-convective equilibrium models suggest
    supersolar atmospheric metallicities and solar-to-subsolar C/O ratios, with photochemistry further constraining the inferred
    atmospheric metallicity to 3 × 10 solar due to the amplitude of the SO<SUB>2</SUB> feature. These results point to the
    formation of HIP 67522b beyond the water snowline, where its envelope was polluted by icy pebbles and planetesimals. The
    planet is likely experiencing substantial mass loss (0.01─0.03 M <SUB>⊕</SUB> Myr<SUP>−1</SUP>), sufficient for envelope
    destruction within a gigayear. This highlights the dramatic evolution occurring within the first 100 Myr of its existence.
