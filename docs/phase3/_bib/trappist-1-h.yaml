  arxiv_id: '1909.08363'
  ads_bibcode: 2020A&A...635A..24H
  title: 'Expected performances of the Characterising Exoplanet Satellite (CHEOPS). III. Data reduction pipeline: architecture
    and simulated performances'
  authors:
  - Hoyer, S.
  - Guterman, P.
  - Demangeon, O.
  - Sousa, S. G.
  - Deleuil, M.
  - Meunier, J. C.
  - Benz, W.
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.1051/0004-6361/201936325
  abstract: The CHaracterizing ExOPlanet Satellite (CHEOPS) is set to be launched in December 2019 and will detect and characterize
    small size exoplanets via ultra high precision photometry during transits. CHEOPS is designed as a follow-up telescope
    and therefore it will monitor a single target at a time. The scientific users will retrieve science-ready light curves
    of the target that will be automatically generated by the CHEOPS data reduction pipeline of the Science Operations Centre.
    This paper describes how the pipeline processes the series of raw images and, in particular, how it handles the specificities
    of CHEOPS data, such as the rotating field of view, the extended irregular point spread function, and the data temporal
    gaps in the context of the strict photometric requirements of the mission. The current status and performance of the main
    processing stages of the pipeline, that is the calibration, correction, and photometry, are presented to allow the users
    to understand how the science-ready data have been derived. Finally, the general performance of the pipeline is illustrated
    via the processing of representative scientific cases generated by the mission simulator.
