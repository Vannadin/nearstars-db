- &id299
  arxiv_id: '1808.02718'
  ads_bibcode: 2018SciA....4.3302R
  title: The origin of RNA precursors on exoplanets
  authors:
  - Rimmer, Paul B.
  - Xu, Jianfeng
  - Thompson, Samantha J.
  - Gillen, Ed
  - Sutherland, John D.
  - Queloz, Didier
  year: '2018'
  pubdate: '2018-08-00'
  doi: 10.1126/sciadv.aar3302
  abstract: Given that the macromolecular building blocks of life were likely produced photochemically in the presence of
    ultraviolet (UV) light, we identify some general constraints on which stars produce sufficient UV for this photochemistry.
    We estimate how much light is needed for the UV photochemistry by experimentally measuring the rate constant for the UV
    chemistry (`light chemistry', needed for prebiotic synthesis) versus the rate constants for the bimolecular reactions
    that happen in the absence of the UV light (`dark chemistry'). We make these measurements for representative photochemical
    reactions involving SO$_3^{2-}$ and HS$^-$. By balancing the rates for the light and dark chemistry, we delineate the
    "abiogenesis zones" around stars of different stellar types based on whether their UV fluxes are sufficient for building
    up this macromolecular prebiotic inventory. We find that the SO$_3^{2-}$ 'light chemistry' is rapid enough to build up
    the prebiotic inventory for stars hotter than K5 (4400 K). We show how the abiogenesis zone overlaps with the liquid water
    habitable zone. Stars cooler than K5 may also drive the formation of these building blocks if they are very active. The
    HS$^-$ 'light chemistry' is too slow to work even for the Early Earth.
  source: citation_of=2019MNRAS.488.4530O
