  arxiv_id: '1512.02643'
  ads_bibcode: 2016ApJS..224....2H
  title: The K2 Ecliptic Plane Input Catalog (EPIC) and Stellar Classifications of 138,600 Targets in Campaigns 1-8
  authors:
  - Huber, Daniel
  - Bryson, Stephen T.
  - Haas, Michael R.
  - Barclay, Thomas
  - Barentsen, Geert
  - Howell, Steve B.
  - Sharma, Sanjib
  - Stello, Dennis
