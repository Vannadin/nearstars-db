  abstract: Since 2009, the Kepler, K2, and TESS missions have produced a vast number of lightcurves for public use. To assist
    citizen scientists in processing those lightcurves, the LcTools software system was developed. The system provides a set
    of tools to efficiently search for signals of interest in large sets of lightcurves using automated and manual (visual)
    techniques. At the heart of the system is a multipurpose lightcurve viewer and signal processor with advanced navigation
    and display capabilities to facilitate the search for signals. Other applications in the system are available for building
