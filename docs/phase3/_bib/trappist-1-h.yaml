  arxiv_id: '2307.02970'
  ads_bibcode: 2023AJ....166..171P
  title: HST/WFC3 Light Curve Supports a Terrestrial Composition for the Closest Exoplanet to Transit an M Dwarf
  authors:
  - Pass, Emily K.
  - Winters, Jennifer G.
  - Charbonneau, David
  - Balkanski, Aurelia
  - Lewis, Nikole
  - Lally, Maura
  - Bean, Jacob L.
