  arxiv_id: '1603.08529'
  ads_bibcode: 2016ApJ...821L..15K
  title: The Nearest Isolated Member of the TW Hydrae Association is a Giant Planet Analog
  authors:
  - Kellogg, Kendra
  - Metchev, Stanimir
  - Gagné, Jonathan
  - Faherty, Jacqueline
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.3847/2041-8205/821/1/L15
  abstract: In a recent search for unusually red L and T dwarfs, we identified 2MASS J11193254-1137466 as a likely young L7
    dwarf and potential member of the TW Hydrae association. We present spectra that confirm the youth of this object. We
    also measure a radial velocity of 8.5 ± 3.3 km s<SUP>-1</SUP> that, together with the sky position, proper motion, and
    photometric distance, results in a 92% probability of membership in the TW Hydrae association, with a calibrated field
    contamination probability of 0.0005% using the BANYAN II tool. Using the age of TW Hydrae and the luminosity of 2MASS
    J11193254-1137466, we estimate its mass to be 4.3-7.6 {M}<SUB>{Jup</SUB>}. It is the lowest-mass and nearest isolated
    member of TW Hydrae at a kinematic distance of 28.9 ± 3.6 pc, and the second-brightest isolated &lt;10 {M}<SUB>{Jup</SUB>}
    object discovered to date.
