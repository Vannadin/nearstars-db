  ads_bibcode: 2014A&A...572A..85Z
  title: Performance of the VLT Planet Finder SPHERE. I. Photometry and astrometry precision with IRDIS and IFS in laboratory
  authors:
  - Zurlo, A.
  - Vigan, A.
  - Mesa, D.
  - Gratton, R.
  - Moutou, C.
  - Langlois, M.
  - Claudi, R. U.
  - Pueyo, L.
  - Boccaletti, A.
  - Baruffolo, A.
