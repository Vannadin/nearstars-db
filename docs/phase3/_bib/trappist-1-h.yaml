  arxiv_id: '2407.09009'
  ads_bibcode: 2024ApJ...975..146H
  title: 'Probing Cold-to-temperate Exoplanetary Atmospheres: The Role of Water Condensation on Surface Identification with
    JWST'
  authors:
  - Huang, Ziyu
  - Yu, Xinting
  - Tsai, Shang-Min
  - Moses, Julianne I.
  - Ohno, Kazumasa
  - Krissansen-Totton, Joshua
