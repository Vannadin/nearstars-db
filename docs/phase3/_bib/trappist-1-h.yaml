  doi: 10.1093/mnrasl/slx141
  abstract: The presence of an unseen 'Planet 9' on the outskirts of the Solar system has been invoked to explain the unexpected
    clustering of the orbits of several Edgeworth-Kuiper Belt Objects. We use N-body simulations to investigate the probability
    that Planet 9 was a free-floating planet (FFLOP) that was captured by the Sun in its birth star formation environment.
    We find that only 1-6 per cent of FFLOPs are ensnared by stars, even with the most optimal initial conditions for capture
    in star-forming regions (one FFLOP per star, and highly correlated stellar velocities to facilitate capture). Depending
