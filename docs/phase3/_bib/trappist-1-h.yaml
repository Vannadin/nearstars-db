- &id315
  arxiv_id: '1511.06471'
  ads_bibcode: 2016ApJ...817...50G
  title: 'The Enigmatic and Ephemeral M Dwarf System KOI 6705: Cheshire Cat or Wild Goose?'
  authors:
  - Gaidos, Eric
  - Mann, Andrew W.
  - Ansdell, Megan
  year: '2016'
  pubdate: '2016-01-00'
  doi: 10.3847/0004-637X/817/1/50
  abstract: 'We confirm a 0.995 day periodic planetary transit-like signal, KOI 6705.01, in the Kepler light curve of the
    star KIC 6423922. Optical and infrared spectra show that this star is a mid M-type dwarf with an effective temperature
    =\3327+/- 60 K, metallicity [Fe/H] = -0.08 ± 0.10, radius =\0.31+/- 0.03R<SUB>☉</SUB>, and mass = 0.28 ± 0.05M<SUB>☉</SUB>.
    The star is ≈ 70 pc away and its space motion, rotation period, and lack of Hα emission indicate it is an older member
    of the “thin disk” population. On the other hand, the star exhibits excess infrared emission suggesting a dust disk more
    typical of a very young star. If the KOI 6705.01 signal is produced by a planet, the transit depth of 60 ppm means its
    radius is only {0.26}<SUB>-0.029</SUB><SUP>+0.034</SUP>R<SUB>⊕</SUB>, or about the size of the Moon. However, the duration
    (≳ 3 hr) and time variation of KOI 6705.01 are anomalous: the signal was undetected in the first two years of the mission
    and increased through the latter two years. These characteristics require implausible orbits and material properties for
    any planet and rule out such an explanation, although a dust cloud is possible. We excluded several false positive scenarios
    including background stars, scattered light from stars that are nearby on the sky, and electronic cross-talk between detector
    readout channels. We find the most likely explanation to be that KOI 6705.01 is a false positive created by charge transfer
    inefficiency in a detector column on which KIC 6423922 and a 1.99 day eclipsing binary both happened to fall.'
