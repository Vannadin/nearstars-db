  doi: 10.3847/1538-3881/ac1940
  abstract: We confirm the planetary nature of TOI-532b, using a combination of precise near-infrared radial velocities with
    the Habitable-zone Planet Finder, Transiting Exoplanet Survey Satellite (TESS) light curves, ground-based photometric
    follow up, and high-contrast imaging. TOI-532 is a faint (J ~ 11.5) metal-rich M dwarf with T<SUB>eff</SUB> = 3957 ± 69
    K and [Fe/H] = 0.38 ± 0.04; it hosts a transiting gaseous planet with a period of ~2.3 days. Joint fitting of the radial
    velocities with the TESS and ground-based transits reveal a planet with radius of 5.82 ± 0.19 R<SUB>⊕</SUB>, and a mass
    of ${61.5}_{-9.3}^{+9.7}$ M<SUB>⊕</SUB>. TOI-532b is the largest and most massive super Neptune detected around an M dwarf
    with both mass and radius measurements, and it bridges the gap between the Neptune-sized planets and the heavier Jovian
    planets known to orbit M dwarfs. It also follows the previously noted trend between gas giants and host-star metallicity
    for M-dwarf planets. In addition, it is situated at the edge of the Neptune desert in the Radius-Insolation plane, helping
    place constraints on the mechanisms responsible for sculpting this region of planetary parameter space.
