- &id494
  arxiv_id: '1601.01209'
  ads_bibcode: 2016ApJ...817L..18K
  title: Revisiting the Scattering Greenhouse Effect of CO<SUB>2</SUB> Ice Clouds
  authors:
  - Kitzmann, D.
  year: '2016'
  pubdate: '2016-02-00'
  doi: 10.3847/2041-8205/817/2/L18
  abstract: Carbon dioxide ice clouds are thought to play an important role for cold terrestrial planets with thick CO<SUB>2</SUB>
    dominated atmospheres. Various previous studies showed that a scattering greenhouse effect by carbon dioxide ice clouds
    could result in a massive warming of the planetary surface. However, all of these studies only employed simplified two-stream
    radiative transfer schemes to describe the anisotropic scattering. Using accurate radiative transfer models with a general
    discrete ordinate method, this study revisits this important effect and shows that the positive climatic impact of carbon
    dioxide clouds was strongly overestimated in the past. The revised scattering greenhouse effect can have important implications
    for the early Mars, but also for planets like the early Earth or the position of the outer boundary of the habitable zone.
