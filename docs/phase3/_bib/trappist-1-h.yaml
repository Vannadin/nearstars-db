  - Piette, Anjali A. A.
  - Stefánsson, Guðmundur
  - Stevenson, Kevin B.
  - Teske, Johanna
  - Wallack, Nicole L.
  year: '2026'
  pubdate: '2026-04-00'
  doi: 10.3847/1538-3881/ae4976
  abstract: Recent discoveries of transiting giant exoplanets (R<SUB>p</SUB> ≳ 8 R<SUB>⊕</SUB>) around M dwarfs present an
    opportunity to investigate their atmospheric compositions and explore how such massive planets form around low-mass stars
    contrary to the prediction from formation models. We present the first transmission spectra of TOI-5205b, a short-period
    (P = 1.63 days) Jupiter-like planet (M<SUB>p</SUB> = 1.08 M<SUB>J</SUB> and R<SUB>p</SUB> = 0.94 R<SUB>J</SUB>) orbiting
    an M4 dwarf (M<SUB>⋆</SUB> = 0.392 M<SUB>⊙</SUB>, R<SUB>⋆</SUB> = 0.394 R<SUB>⊙</SUB>). We obtained three transits using
    the PRISM mode of the JWST Near Infrared Spectrograph spanning 0.6─5.3 μm. The data reveal significant stellar contamination
    that is evident in the light curves as spot-crossing events and in the transmission spectra as a larger transit depth
    at bluer wavelengths. Atmospheric retrievals demonstrate that stellar contamination from unocculted starspots and faculae
    is the dominant component of the transmission spectrum at wavelengths λ ≲ 3.0 μm, reducing the sensitivity to the presence
    of clouds or hazes in our models and preventing detection of H<SUB>2</SUB>O. The wavelength coverage enabled a robust
    detection of CH<SUB>4</SUB> and H<SUB>2</SUB>S, which have detectable molecular features between 3.0 and 5.0 μm. For both
    clear or cloudy atmospheres, Bayesian retrievals consistently favored an atmosphere with subsolar metallicity (3σ upper
    limit of <inline-formula> <mml:math><mml:mi>log</mml:mi><mml:mo>[</mml:mo><mml:mi>M</mml:mi><mml:mo>/</mml:mo><mml:mi>H</mml:mi><mml:mo>]</mml:mo><mml:mo>≲</mml:mo><mml:mo>−</mml:mo><mml:mn>1.24</mml:mn></mml:math>
    </inline-formula>) and supersolar C/O ratio (3σ lower limit of <inline-formula> <mml:math><mml:mi>log</mml:mi><mml:mo>[</mml:mo><mml:mi>C</mml:mi><mml:mo>/</mml:mo><mml:mi>O</mml:mi><mml:mo>]</mml:mo><mml:mo>≳</mml:mo><mml:mn>0.09</mml:mn></mml:math>
    </inline-formula>), although this may partly be driven by the nondetection of water due to stellar contamination. Planetary
    interior models predict a bulk metallicity of 10%─20%, which is larger than the atmospheric metallicity and suggests that
    the interior of TOI-5205b is decoupled from its atmosphere.
