- &id1030
  arxiv_id: '1408.4150'
  ads_bibcode: 2014ApJ...792..111K
  title: On the Inclination and Habitability of the HD 10180 System
  authors:
  - Kane, Stephen R.
  - Gelino, Dawn M.
  year: '2014'
  pubdate: '2014-09-00'
  doi: 10.1088/0004-637X/792/2/111
  abstract: There are numerous multi-planet systems that have now been detected via a variety of techniques. These systems
    exhibit a range of both planetary properties and orbital configurations. For those systems without detected planetary
    transits, a significant unknown factor is the orbital inclination. This produces an uncertainty in the mass of the planets
    and their related properties, such as atmospheric scale height. Here we investigate the HD 10180 system, which was discovered
    using the radial velocity technique. We provide a new orbital solution for the system which allows for eccentric orbits
    for all planets. We show how the inclination of the system affects the mass/radius properties of the planets and how the
    detection of phase signatures may resolve the inclination ambiguity. We finally evaluate the Habitable Zone properties
    of the system and show that the g planet spends 100% of an eccentric orbit within the Habitable Zone.
  source: citation_of=2018AJ....155...94S
