- &id1139
  arxiv_id: null
  ads_bibcode: 2016ApJ...825...78S
  title: 'Emerging Possibilities and Insuperable Limitations of Exogeophysics: The Example of Plate Tectonics'
  authors:
  - Stamenković, Vlada
  - Seager, Sara
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.3847/0004-637X/825/1/78
  abstract: To understand the evolution and the habitability of any rocky exoplanet demands detailed knowledge about its geophysical
    state and history—such as predicting the tectonic mode of a planet. Yet no astronomical observation can directly confirm
    or rule out the occurrence of plate tectonics on a given exoplanet. Moreover, the field of plate tectonics is still young—questioning
    whether we should study plate tectonics on exoplanets at this point in time. In this work, we determine the limitations
    and the emerging possibilities of exogeophysics, the science of connecting geophysics to exoplanets, on the example of
    plate tectonics. Assuming current uncertainties in model and planet parameters, we develop a qualitatively probabilistic
    and conservative framework to estimate on what kind of planets and where in the Galaxy plate tectonics might occur. This
    we achieve by modeling how plate yielding, the most critical condition needed for plate mobility and subduction, is affected
    by directly observable (planet mass, size) or indirectly, to some degree, assessable planet properties (structure and
    composition). Our framework not only highlights the importance of a planet’s chemistry for the existence of plate tectonics
    and the path toward practical exogeophysics but also demonstrates how exoplanet science can actually help to better understand
    geophysics and the fundamentals of plate tectonics on Earth itself.
  source: citation_of=2017AJ....154..121B
