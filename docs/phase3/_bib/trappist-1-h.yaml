- &id978
  arxiv_id: '1512.08659'
  ads_bibcode: 2016AJ....151...46A
  title: Characterization of the Very-low-mass Secondary in the GJ 660.1AB System
  authors:
  - Aganze, Christian
  - Burgasser, Adam J.
  - Faherty, Jacqueline K.
  - Choban, Caleb
  - Escala, Ivanna
  - Lopez, Mike A.
  - Jin, Yuhui
  - Tamiya, Tomoki
  - Tallis, Melisa
  - Rockward, Willie
  year: '2016'
  pubdate: '2016-02-00'
  doi: 10.3847/0004-6256/151/2/46
  abstract: We present a spectroscopic analysis of the low-mass binary star system GJ 660.1AB, a pair of nearby M dwarfs for
    which we have obtained separated near-infrared spectra (0.9-2.5 μm) with the SpeX spectrograph. The spectrum of GJ 660.1B
    is distinctly peculiar, with a triangular-shaped 1.7 μm peak that initially suggests that it is a low-surface-gravity,
    young brown dwarf. However, we rule out this hypothesis and determine instead that this companion is a mild subdwarf (d/sdM7)
    based on the subsolar metallicity of the primary, [Fe/H] = -0.63 ± 0.06. Comparison of the near-infrared spectrum of GJ
    660.1B to two sets of spectral models yields conflicting results, with a common effective temperature of T<SUB>eff</SUB>
    = 2550-2650 K, but alternately low surface gravity ({log}g = {4.4}<SUB>-0.5</SUB><SUP>+0.5</SUP>) and very low metallicity
    ([M/H] = -{0.96}<SUB>-0.24</SUB><SUP>+0.19</SUP>), or high surface gravity ({log}g = 5.0-5.5) and slightly subsolar metallicity
    ([M/H] = -{0.20}<SUB>-0.19</SUB><SUP>+0.13</SUP>). We conjecture that insufficient condensate opacity and excessive collision-induced
    H<SUB>2</SUB> absorption in the models bias them toward low surface gravities and a metallicity that is inconsistent with
    the primary and points toward improvements needed in the spectral modeling of metal-poor, very-low-mass dwarfs. The peculiar
    spectral characteristics of GJ 660.1B emphasize that care is needed when interpreting surface gravity features in the
    spectra of ultracool dwarfs.
