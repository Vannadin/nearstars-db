  ads_bibcode: 2004JGRB..109.6201J
  title: 'Shear wave attenuation and dispersion in melt-bearing olivine polycrystals: 1. Specimen fabrication and mechanical
    testing'
  authors:
  - Jackson, Ian
  - Faul, Ulrich H.
  - Fitz Gerald, John D.
  - Tan, Ben H.
  year: '2004'
  pubdate: '2004-06-00'
  doi: 10.1029/2003JB002406
  abstract: Five melt-bearing polycrystalline olivine aggregates have been newly prepared by hot isostatic pressing and tested
    at high temperature and pressure with torsional forced-oscillation and microcreep methods. Cylindrical specimens, varying
    in average grain size from 7 to 52 μm, were annealed and then tested during slow staged cooling under 200 MPa pressure
    from maximum temperatures of 1240-1300°C where they contained basaltic melt fractions ranging from ∼0.0001 to 0.037. For
    temperatures ≥1000°C, pronounced departures from elastic behavior are evident in strain energy dissipation Q<SUP>-1</SUP>
    and associated dispersion of the shear modulus G. In marked contrast with the high-temperature viscoelastic behavior of
    melt-free materials, a broad dissipation peak is observed for each of the melt-bearing specimens - superimposed upon a
    melt-enhanced level of monotonically frequency- and temperature-dependent "background" dissipation. The oscillation period
    at which the peak is centered decreases systematically with increasing temperature. A "global" model comprising an Andrade-pseudoperiod
    background plus Gaussian peak accounts adequately for the variation of Q<SUP>-1</SUP> with frequency, temperature, average
    grain size and melt fraction. In the following paper (Part II) a microstructural explanation for the observed viscoelastic
    behavior is sought and the global model is used to extrapolate the experimental data to the conditions of teleseismic
    wave propagation in the Earth's upper mantle.
