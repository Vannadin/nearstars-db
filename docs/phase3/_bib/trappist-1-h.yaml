  title: Linking the primordial composition of planet building disks to the present-day composition of rocky exoplanets
  authors:
  - Adibekyan, V.
  - Deal, M.
  - Dorn, C.
  - Dittrich, I.
  - Soares, B. M. T. B.
  - Sousa, S. G.
