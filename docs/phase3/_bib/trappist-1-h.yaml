- &id785
  arxiv_id: '2002.05243'
  ads_bibcode: 2020ApJ...896L..22M
  title: Irradiated Ocean Planets Bridge Super-Earth and Sub-Neptune Populations
  authors:
  - Mousis, Olivier
  - Deleuil, Magali
  - Aguichine, Artyom
  - Marcq, Emmanuel
  - Naar, Joseph
  - Aguirre, Lorena Acuña
