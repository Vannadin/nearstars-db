- &id1064
  arxiv_id: '1302.3655'
  ads_bibcode: 2013ApJ...766...82Z
  title: Evidence for a Snow Line beyond the Transitional Radius in the TW Hya Protoplanetary Disk
  authors:
  - Zhang, K.
  - Pontoppidan, K. M.
  - Salyk, C.
  - Blake, G. A.
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1088/0004-637X/766/2/82
  abstract: We present an observational reconstruction of the radial water vapor content near the surface of the TW Hya transitional
    protoplanetary disk, and report the first localization of the snow line during this phase of disk evolution. The observations
    are comprised of Spitzer-IRS, Herschel-PACS, and Herschel-HIFI archival spectra. The abundance structure is retrieved
    by fitting a two-dimensional disk model to the available star+disk photometry and all observed H<SUB>2</SUB>O lines, using
    a simple step-function parameterization of the water vapor content near the disk surface. We find that water vapor is
    abundant (~10<SUP>-4</SUP> per H<SUB>2</SUB>) in a narrow ring, located at the disk transition radius some 4 AU from the
    central star, but drops rapidly by several orders of magnitude beyond 4.2 AU over a scale length of no more than 0.5 AU.
    The inner disk (0.5-4 AU) is also dry, with an upper limit on the vertically averaged water abundance of 10<SUP>-6</SUP>
    per H<SUB>2</SUB>. The water vapor peak occurs at a radius significantly more distant than that expected for a passive
    continuous disk around a 0.6 M <SUB>☉</SUB> star, representing a volatile distribution in the TW Hya disk that bears strong
    similarities to that of the solar system. This is observational evidence for a snow line that moves outward with time
    in passive disks, with a dry inner disk that results either from gas giant formation or gas dissipation and a significant
    ice reservoir at large radii. The amount of water present near the snow line is sufficient to potentially catalyze the
    (further) formation of planetesimals and planets at distances beyond a few AU.
