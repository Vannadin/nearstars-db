  abstract: We present light curves from a magnitude limited set of stars and other stationary luminous objects from the TESS
    Full Frame Images, as reduced by the MIT Quick Look Pipeline (QLP). Our light curves cover the full two-year TESS Primary
    Mission and include ∼14,770,000 and ∼9,600,000 individual light curve segments in the Southern and Northern ecliptic hemispheres,
    respectively. We describe the detrending techniques we used to create the light curves, and compare the noise properties
    with theoretical expectations. All of the QLP light curves are available at MAST as a High Level Science Product (HLSP)
    via doi:10.17909/t9-r086-e880 (https://archive.stsci.edu/hlsp/qlp). This is the largest collection of TESS photometry
    available to the public to date.
