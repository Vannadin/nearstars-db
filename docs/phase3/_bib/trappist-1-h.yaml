  arxiv_id: '2502.19932'
  ads_bibcode: 2025A&A...697A..31P
  title: Exploring the atmosphere of GJ 1132 b with CRIRES+
  authors:
  - Palle, E.
  - Yan, F.
  - Morello, G.
  - Stangret, M.
  - Swain, M. R.
  - Orell-Miquel, J.
  - Miles-Paez, P.
  - Estrela, R.
