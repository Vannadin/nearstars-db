  arxiv_id: '2409.18171'
  ads_bibcode: 2024ApJ...977...61C
  title: 'Planet Mass Function around M Stars at 1─10 au: A Plethora of Sub-Earth Mass Objects'
  authors:
  - Chachan, Yayaati
  - Lee, Eve J.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/1538-4357/ad8c44
  abstract: Small planets (≲1 M <SUB>⊕</SUB>) at intermediate orbital distances (∼1 au) represent an uncharted territory in
    exoplanetary science. The upcoming microlensing survey by the Nancy Grace Roman Space Telescope will be sensitive to objects
    as light as Ganymede and unveil the small planet population at 1─10 au. Instrumental sensitivity to such planets is low,
    and the number of objects we will discover is strongly dependent on the underlying planet mass function. In this work,
    we provide a physically motivated planet mass function by combining the efficiency of planet formation by pebble accretion
    with the observed disk mass function. Because the disk mass function for M dwarfs (0.4─0.6 M <SUB>⊙</SUB>) is bottom heavy,
    the initial planet mass function is also expected to be bottom heavy, skewing toward Ganymede and Mars mass objects, more
    so for heavier initial planetary seeds. We follow the subsequent dynamical evolution of planetary systems over ∼100 Myr
    varying the initial eccentricity and orbital spacing. For initial planet separations of ≥3 local disk scale heights, we
    find that Ganymede and Mars mass planets do not grow significantly by mergers. However, Earth-like planets undergo vigorous
    merging and turn into super-Earths, potentially creating a gap in the planet mass function at ∼1 M <SUB>⊕</SUB>. Our results
    demonstrate that the slope of the mass function and the location of the potential gap in the mass function can probe the
    initial architecture of multiplanet systems. We close by discussing implications on the expected difference between bound
    and free-floating planet mass functions.
