- &id393
  arxiv_id: '2201.09898'
  ads_bibcode: 2022ApJ...941..186L
  title: Creating the Radius Gap without Mass Loss
  authors:
  - Lee, Eve J.
  - Karalis, Amalia
  - Thorngren, Daniel P.
  year: '2022'
  pubdate: '2022-12-00'
  doi: 10.3847/1538-4357/ac9c66
  abstract: The observed exoplanet population features a gap in the radius distribution that separates the smaller super-Earths
    (≲1.7 Earth radii) from the larger sub-Neptunes (~1.7-4 Earth radii). While mass-loss theories can explain many of the
    observed features of this radius valley, it is difficult to reconcile them with the potentially rising population of terrestrials
    beyond orbital periods of ~30 days. We investigate the ability of gas accretion during the gas-poor phase of disk evolution
    to reproduce both the location of the observed radius gap and the existence of long-period terrestrial planets. Updating
    the analytic scaling relations of gas accretion rate accounting for the shrinking of the bound radius by hydrodynamic
    effects and deriving a more realistic disk temperature profile, we find that the late-stage gas accretion alone is able
    to carve out the observed radius gap, with slopes R <SUB>gap</SUB> ∝ P <SUP>-0.096</SUP> and ${R}_{\mathrm{gap}}\propto
    {M}_{\star }^{0.15}$ for top-heavy; and R <SUB>gap</SUB> ∝ P <SUP>-0.089</SUP> and ${R}_{\mathrm{gap}}\propto {M}_{\star
    }^{0.22}$ for bottom-heavy core mass distributions, in good agreement with observations. The general morphology of the
    primordial radius gap is stable against a range of disk gas density and disk accretion rate with the latter affecting
    mostly the population of large planets (≳3-4 R <SUB>⊕</SUB>). The peaks and valleys in the radius distribution were likely
    set in place primordially while post-formation mass loss further tunes the exoplanetary population. We provide potential
    observational tests that may be possible with TESS, PLATO, and Roman Space Telescope.
