  doi: 10.3847/1538-3881/ad823c
  abstract: Planet─planet occultations (PPOs) occur when one exoplanet occults another exoplanet in the same system, as seen
    from the Earth's vantage point. PPOs may provide a unique opportunity to observe radio "spillover" from extraterrestrial
    intelligences' radio transmissions or radar being transmitted from the farther exoplanet toward the nearer one for the
    purposes of communication or scientific exploration. Planetary systems with many tightly packed, low-inclination planets,
    such as TRAPPIST-1, are predicted to have frequent PPOs. Here, the narrowband technosignature search code turboSETI was
    used in combination with the newly developed NbeamAnalysis filtering pipeline to analyze 28 hr of beamformed data taken
    with the Allen Telescope Array during 2022 late October and early November, from 0.9 to 9.3 GHz, targeting TRAPPIST-1.
    During this observing window, seven possible PPO events were predicted using the NbodyGradient code. The filtering pipeline
    reduced the original list of 25 million candidate signals down to 6 million by rejecting signals that were not sky-localized
    and, from these, identified a final list of 11,127 candidate signals above a power-law cutoff designed to segregate signals
    by their attenuation and morphological similarity between beams. All signals were plotted for visual inspection, 2264
    of which were found to occur during PPO windows. We report no detections of signals of nonhuman origin, with upper limits
    calculated for each PPO event exceeding equivalent isotropic radiated powers of 2.17─13.3 TW for minimally drifting signals
    and 40.8─421 TW in the maximally drifting case. This work constitutes the longest single-target radio search for extraterrestrial
    intelligence of TRAPPIST-1 to date.
