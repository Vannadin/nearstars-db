  arxiv_id: '1806.08799'
  ads_bibcode: 2019AJ....157...52B
  title: An Excess of Jupiter Analogs in Super-Earth Systems
  authors:
  - Bryan, Marta L.
  - Knutson, Heather A.
  - Lee, Eve J.
  - Fulton, B. J.
  - Batygin, Konstantin
  - Ngo, Henry
