  arxiv_id: '1907.02978'
  ads_bibcode: 2019MNRAS.488.2108E
  title: Planetary magnetic field control of ion escape from weakly magnetized planets
  authors:
  - Egan, Hilary
  - Jarvinen, Riku
  - Ma, Yingjuan
  - Brain, David
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.1093/mnras/stz1819
  abstract: Intrinsic magnetic fields have long been thought to shield planets from atmospheric erosion via stellar winds;
    however, the influence of the plasma environment on atmospheric escape is complex. Here we study the influence of a weak
    intrinsic dipolar planetary magnetic field on the plasma environment and subsequent ion escape from a Mars-sized planet
    in a global three-dimensional hybrid simulation. We find that increasing the strength of a planet's magnetic field enhances
    ion escape until the magnetic dipole's standoff distance reaches the induced magnetosphere boundary. After this point
    increasing the planetary magnetic field begins to inhibit ion escape. This reflects a balance between shielding of the
    Southern hemisphere from `misaligned' ion pickup forces and trapping of escaping ions by an equatorial plasmasphere. Thus,
    the planetary magnetic field associated with the peak ion escape rate is critically dependent on the stellar wind pressure.
    Where possible we have fit power laws for the variation of fundamental parameters (escape rate, escape power, polar cap
    opening angle, and effective interaction area) with magnetic field, and assessed upper and lower limits for the relationships.
  source: citation_of=2023MNRAS.519.6210M
