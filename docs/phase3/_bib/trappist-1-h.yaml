  abstract: 'Context. The NASA mission TESS is currently doing an all-sky survey from space to detect transiting planets around
    bright stars. As part of the validation process, the most promising planet candidates need to be confirmed and characterized
    using follow-up observations. <BR /> Aims: In this article, our aim is to confirm the planetary nature of the transiting
    planet candidate TOI-674b using spectroscopic and photometric observations. <BR /> Methods: We use TESS, Spitzer, ground-based
    light curves, and HARPS spectrograph radial velocity measurements to establish the physical properties of the transiting
    exoplanet candidate TOI-674b. We perform a joint fit of the light curves and radial velocity time series to measure the
    mass, radius, and orbital parameters of the candidate. <BR /> Results: We confirm and characterize TOI-674b, a low-density
    super-Neptune transiting a nearby M dwarf. The host star (TIC 158588995, V = 14.2 mag, J = 10.3 mag) is characterized
    by its M2V spectral type with M<SUB>⋆</SUB> = 0.420 ± 0.010 M<SUB>☉</SUB>, R<SUB>⋆</SUB> = 0.420 ± 0.013 R<SUB>☉</SUB>,
    and T<SUB>eff</SUB> = 3514 ± 57 K; it is located at a distance d = 46.16 ± 0.03 pc. Combining the available transit light
    curves plus radial velocity measurements and jointly fitting a circular orbit model, we find an orbital period of 1.977143
    ± 3 × 10<SUP>‒6</SUP> days, a planetary radius of 5.25 ± 0.17 R<SUB>⊕</SUB>, and a mass of 23.6 ± 3.3 M<SUB>⊕</SUB> implying
    a mean density of ρ<SUB>p</SUB> =0.91 ± 0.15 g cm<SUP>‒3</SUP>. A non-circular orbit model fit delivers similar planetary
    mass and radius values within the uncertainties. Given the measured planetary radius and mass, TOI-674b is one of the
    largest and most massive super-Neptune class planets discovered around an M-type star to date. It is found in the Neptunian
    desert, and is a promising candidate for atmospheric characterization using the James Webb Space Telescope. <P />Based
    on observations made with the HARPS instrument on the ESO 3.6 m telescope at La Silla Observatory under program ID 1102.C-0339.'
