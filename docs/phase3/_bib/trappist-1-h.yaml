- &id1033
  arxiv_id: '1405.5142'
  ads_bibcode: 2014ApJ...789...86A
  title: Distributions of Short-lived Radioactive Nuclei Produced by Young Embedded Star Clusters
  authors:
  - Adams, Fred C.
  - Fatuzzo, Marco
  - Holden, Lisa
  year: '2014'
  pubdate: '2014-07-00'
  doi: 10.1088/0004-637X/789/1/86
  abstract: 'Most star formation in the Galaxy takes place in clusters, where the most massive members can affect the properties
    of other constituent solar systems. This paper considers how clusters influence star formation and forming planetary systems
    through nuclear enrichment from supernova explosions, where massive stars deliver short-lived radioactive nuclei (SLRs)
    to their local environment. The decay of these nuclei leads to both heating and ionization, and thereby affects disk evolution,
    disk chemistry, and the accompanying process of planet formation. Nuclear enrichment can take place on two spatial scales:
    (1) within the cluster itself (l ~ 1 pc), the SLRs are delivered to the circumstellar disks associated with other cluster
    members. (2) On the next larger scale (l ~ 2-10 pc), SLRs are injected into the background molecular cloud; these nuclei
    provide heating and ionization to nearby star-forming regions and to the next generation of disks. For the first scenario,
    we construct the expected distributions of radioactive enrichment levels provided by embedded clusters. Clusters can account
    for the SLR mass fractions inferred for the early Solar Nebula, but typical SLR abundances are lower by a factor of ~10.
    For the second scenario, we find that distributed enrichment of SLRs in molecular clouds leads to comparable abundances.
    For both the direct and distributed enrichment processes, the masses of <SUP>26</SUP>Al and <SUP>60</SUP>Fe delivered
    to individual circumstellar disks typically fall in the range 10-100 pM <SUB>☉</SUB> (where 1 pM <SUB>☉</SUB> = 10<SUP>-12</SUP>
    M <SUB>☉</SUB>). The corresponding ionization rate due to SLRs typically falls in the range ζ<SUB>SLR</SUB> ~ 1-5 × 10<SUP>-19</SUP>
    s<SUP>-1</SUP>. This ionization rate is smaller than that due to cosmic rays, ζ<SUB>CR</SUB> ~ 10<SUP>-17</SUP> s<SUP>-1</SUP>,
    but will be important in regions where cosmic rays are attenuated (e.g., disk mid-planes).'
