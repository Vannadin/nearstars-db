  doi: 10.1093/mnras/stab3483
  abstract: 'We present ground- and space-based photometric observations of TOI-270 (L231-32), a system of three transiting
    planets consisting of one super-Earth and two sub-Neptunes discovered by TESS around a bright (K-mag = 8.25) M3V dwarf.
    The planets orbit near low-order mean-motion resonances (5:3 and 2:1) and are thus expected to exhibit large transit timing
    variations (TTVs). Following an extensive observing campaign using eight different observatories between 2018 and 2020,
    we now report a clear detection of TTVs for planets c and d, with amplitudes of ~10 min and a super-period of ~3 yr, as
    well as significantly refined estimates of the radii and mean orbital periods of all three planets. Dynamical modelling
    of the TTVs alone puts strong constraints on the mass ratio of planets c and d and on their eccentricities. When incorporating
    recently published constraints from radial velocity observations, we obtain masses of $M_{\mathrm{b}}=1.48\pm 0.18\, M_\oplus$,
    $M_{\mathrm{c}}=6.20\pm 0.31\, M_\oplus$, and $M_{\mathrm{d}}=4.20\pm 0.16\, M_\oplus$ for planets b, c, and d, respectively.
    We also detect small but significant eccentricities for all three planets : e<SUB>b</SUB> = 0.0167 ± 0.0084, e<SUB>c</SUB>
    = 0.0044 ± 0.0006, and e<SUB>d</SUB> = 0.0066 ± 0.0020. Our findings imply an Earth-like rocky composition for the inner
    planet, and Earth-like cores with an additional He/H<SUB>2</SUB>O atmosphere for the outer two. TOI-270 is now one of
    the best constrained systems of small transiting planets, and it remains an excellent target for atmospheric characterization.'
