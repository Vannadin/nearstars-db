  year: '2021'
  pubdate: '2021-10-00'
  doi: 10.1038/s41586-021-03873-w
  abstract: 'Earth has had oceans for nearly four billion years<SUP>1</SUP> and Mars had lakes and rivers 3.5-3.8 billion
    years ago<SUP>2</SUP>. However, it is still unknown whether water has ever condensed on the surface of Venus<SUP>3,4</SUP>
    because the planet—now completely dry<SUP>5</SUP>—has undergone global resurfacing events that obscure most of its history<SUP>6,7</SUP>.
    The conditions required for water to have initially condensed on the surface of Solar System terrestrial planets are highly
    uncertain, as they have so far only been studied with one-dimensional numerical climate models<SUP>3</SUP> that cannot
    account for the effects of atmospheric circulation and clouds, which are key climate stabilizers. Here we show using three-dimensional
    global climate model simulations of early Venus and Earth that water clouds—which preferentially form on the nightside,
    owing to the strong subsolar water vapour absorption—have a strong net warming effect that inhibits surface water condensation
    even at modest insolations (down to 325 watts per square metre, that is, 0.95 times the Earth solar constant). This shows
    that water never condensed and that, consequently, oceans never formed on the surface of Venus. Furthermore, this shows
    that the formation of Earth''s oceans required much lower insolation than today, which was made possible by the faint
    young Sun. This also implies the existence of another stability state for present-day Earth: the `steam Earth'', with
    all the water from the oceans evaporated into the atmosphere.'
