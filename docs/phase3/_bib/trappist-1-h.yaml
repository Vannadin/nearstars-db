  abstract: We present 5─1 × 10<SUP>7</SUP> Å spectral energy distributions (SEDs) for 12 M dwarf stars covering spectral
    types M0─M8. Our SEDs are provided for community use as a sequel to the Measurements of the Ultraviolet Spectral Characteristics
    of Low-mass Exoplanetary Systems (MUSCLES) survey. The 12 stars include eight known exoplanet hosts and four stars chosen
    to fill out key parameter space in spectral type and rotation period. The SEDs are constructed from Hubble Space Telescope
    ultraviolet spectroscopy and XMM Newton, Chandra, and/or Swift X-ray observations, and completed with various model data,
    including Lyα reconstructions, PHOENIX optical models, APEC coronal models, and differential emission measure models in
    the currently-unobservable extreme ultraviolet. We provide a complete overview of the Mega-MUSCLES program, including
    a description of the observations, models, and SED construction. The SEDs are available as MAST high-level science products
    and we describe the various data products here. We also present ensemble measurements from our sample that are of particular
    relevance to exoplanet science, including the high-energy fluxes in the habitable zone and the far-ultraviolet to near-ultraviolet
    ratio. Combined with MUSCLES, Mega-MUSCLES provides SEDs covering a wide range of M dwarf spectral types and ages such
    that suitable proxies for any M dwarf planet host of interest may be found in our sample. However, we find that ultraviolet
    and X-ray fluxes can vary even between stars with similar parameters, such that observations of each exoplanet host star
    will remain the gold standard for interpreting exoplanet atmosphere observations.
