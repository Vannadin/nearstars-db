  arxiv_id: '2112.10850'
  ads_bibcode: 2021PNAS..11810889B
  title: Production of ammonia makes Venusian clouds habitable and explains observed cloud-level chemical anomalies
  authors:
  - Bains, William
  - Petkowski, Janusz J.
  - Rimmer, Paul B.
  - Seager, Sara
  year: '2021'
  pubdate: '2021-12-00'
  doi: 10.1073/pnas.2110889118
  abstract: This research provides a transformative hypothesis for the chemistry of the atmospheric cloud layers of Venus
    while reconciling decades-long atmosphere anomalies. Our model predicts that the clouds are not entirely made of sulfuric
    acid, but are partially composed of ammonium salt slurries, which may be the result of biological production of ammonia
    in cloud droplets. As a result, the clouds are no more acidic than some extreme terrestrial environments that harbor life.
    Life could be making its own environment on Venus. The model's predictions for the abundance of gases in Venus' atmosphere
    match observation better than any previous model, and are readily testable.
