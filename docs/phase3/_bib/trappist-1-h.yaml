- &id928
  arxiv_id: '1609.03082'
  ads_bibcode: 2017A&A...599A..16L
  title: Atmospheric characterization of Proxima b by coupling the SPHERE high-contrast imager to the ESPRESSO spectrograph
  authors:
  - Lovis, C.
  - Snellen, I.
  - Mouillet, D.
  - Pepe, F.
  - Wildi, F.
  - Astudillo-Defru, N.
  - Beuzit, J.-L.
  - Bonfils, X.
  - Cheetham, A.
  - Conod, U.
  - Delfosse, X.
  - Ehrenreich, D.
  - Figueira, P.
  - Forveille, T.
  - Martins, J. H. C.
  - Quanz, S. P.
  - Santos, N. C.
  - Schmid, H.-M.
  - Ségransan, D.
  - Udry, S.
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.1051/0004-6361/201629682
  abstract: 'Context. The temperate Earth-mass planet Proxima b is the closest exoplanet to Earth and represents what may
    be our best ever opportunity to search for life outside the Solar System. <BR /> Aims: We aim at directly detecting Proxima
    b and characterizing its atmosphere by spatially resolving the planet and obtaining high-resolution reflected-light spectra.
    <BR /> Methods: We propose to develop a coupling interface between the SPHERE high-contrast imager and the new ESPRESSO
    spectrograph, both installed at ESO VLT. The angular separation of 37 mas between Proxima b and its host star requires
    the use of visible wavelengths to spatially resolve the planet on a 8.2-m telescope. At an estimated planet-to-star contrast
    of 10<SUP>-7</SUP> in reflected light, Proxima b is extremely challenging to detect with SPHERE alone. However, the combination
    of a 10<SUP>3</SUP>-10<SUP>4</SUP> contrast enhancement from SPHERE to the high spectral resolution of ESPRESSO can reveal
    the planetary spectral features and disentangle them from the stellar ones. <BR /> Results: We find that significant but
    realistic upgrades to SPHERE and ESPRESSO would enable a 5σ detection of the planet and yield a measurement of its true
    mass and albedo in 20-40 nights of telescope time, assuming an Earth-like atmospheric composition. Moreover, it will be
    possible to probe the O<SUB>2</SUB> bands at 627, 686 and 760 nm, the water vapour band at 717 nm, and the methane band
    at 715 nm. In particular, a 3.6σ detection of O<SUB>2</SUB> could be made in about 60 nights of telescope time. Those
    would need to be spread over three years considering optimal observability conditions for the planet. <BR /> Conclusions:
    The very existence of Proxima b and the SPHERE-ESPRESSO synergy represent a unique opportunity to detect biosignatures
    on an exoplanet in the near future. It is also a crucial pathfinder experiment for the development of extremely large
    telescopes and their instruments, in particular the E-ELT and its high-resolution visible and near-IR spectrograph.'
  source: citation_of=2018ApJ...867...76L
