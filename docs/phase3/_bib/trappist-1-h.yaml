- &id112
  arxiv_id: '2501.18680'
  ads_bibcode: 2025ApJ...980L..26B
  title: Evidence for a Volcanic Atmosphere on the Sub-Earth L 98-59 b
  authors:
  - Bello-Arufe, Aaron
  - Damiano, Mario
  - Bennett, Katherine A.
  - Hu, Renyu
  - Welbanks, Luis
  - MacDonald, Ryan J.
  - Seligman, Darryl Z.
  - Sing, David K.
  - Tokadjian, Armen
  - Oza, Apurva V.
  - Yang, Jeehyun
  year: '2025'
  pubdate: '2025-02-00'
  doi: 10.3847/2041-8213/adaf22
  abstract: Assessing the prevalence of atmospheres on rocky planets around M-dwarf stars is a top priority of exoplanet science.
    High-energy activity from M dwarfs can destroy the atmospheres of these planets, which could explain the lack of atmosphere
    detections to date. Volcanic outgassing has been proposed as a mechanism to replenish the atmospheres of tidally heated
    rocky planets. L 98-59 b, a sub-Earth transiting a nearby M dwarf, was recently identified as the most promising exoplanet
    to detect a volcanic atmosphere. We present the transmission spectrum of L 98-59 b from four transits observed with JWST
    NIRSpec G395H. Although the airless model provides an adequate fit to the data based on its χ<SUP>2</SUP>, an SO<SUB>2</SUB>
    atmosphere is preferred by 3.6σ over a flat line in terms of the Bayesian evidence. Such an atmosphere would likely be
    in a steady state where volcanism balances escape. If so, L 98-59 b must experience at least eight times as much volcanism
    and tidal heating per unit mass as Io. If volcanism is driven by runaway melting of the mantle, we predict the existence
    of a subsurface magma ocean in L 98-59 b extending up to R<SUB>p</SUB> ∼ 60%─90%. An SO<SUB>2</SUB>-rich volcanic atmosphere
    on L 98-59 b would be indicative of an oxidized mantle with an oxygen fugacity of fO<SUB>2</SUB> &gt; IW + 2.7, and it
    would imply that L 98-59 b must have retained some of its volatile endowment despite its proximity to its star. Our findings
    suggest that volcanism may revive secondary atmospheres on tidally heated rocky planets around M dwarfs.
