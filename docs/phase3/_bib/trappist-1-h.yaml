- &id303
  arxiv_id: '1709.09240'
  ads_bibcode: 2017AJ....154..204K
  title: Obliquity and Eccentricity Constraints for Terrestrial Exoplanets
  authors:
  - Kane, Stephen R.
  - Torres, Stephanie M.
  year: '2017'
  pubdate: '2017-11-00'
  doi: 10.3847/1538-3881/aa8fce
  abstract: Exoplanet discoveries over recent years have shown that terrestrial planets are exceptionally common. Many of
    these planets are in compact systems that result in complex orbital dynamics. A key step toward determining the surface
    conditions of these planets is understanding the latitudinally dependent flux incident at the top of the atmosphere as
    a function of orbital phase. The two main properties of a planet that influence the time-dependent nature of the flux
    are the obliquity and orbital eccentricity of the planet. We derive the criterion for which the flux variation due to
    obliquity is equivalent to the flux variation due to orbital eccentricity. This equivalence is computed for both the maximum
    and average flux scenarios, the latter of which includes the effects of the diurnal cycle. We apply these calculations
    to four known multi-planet systems (GJ 163, K2-3, Kepler-186, and Proxima Centauri), where we constrain the eccentricity
    of terrestrial planets using orbital dynamics considerations and model the effect of obliquity on incident flux. We discuss
    the implications of these simulations on climate models for terrestrial planets and outline detectable signatures of planetary
    obliquity.
