  ads_bibcode: 2025MNRAS.539..422F
  title: 'Transmission spectroscopy of WASP-52 b with JWST NIRISS: water and helium atmospheric absorption, alongside prominent
    star-spot crossings'
  authors:
  - Fournier-Tondreau, Marylou
  - Pan, Yanbo
  - Morel, Kim
  - Lafrenière, David
  - MacDonald, Ryan J.
  - Coulombe, Louis-Philippe
  - Allart, Romain
  - Albert, Loïc
  - Radica, Michael
  - Piaulet-Ghorayeb, Caroline
