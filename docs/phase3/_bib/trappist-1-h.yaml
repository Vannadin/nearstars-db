  abstract: 'We present observations of two bright M dwarfs (TOI-1634 and TOI-1685: J = 9.5-9.6) hosting ultra-short-period
    (USP) planets identified by the TESS mission. The two stars are similar in temperature, mass, and radius (T<SUB>eff</SUB>
    ≍ 3500 K, M<SUB>⋆</SUB> ≍ 0.45-0.46 M<SUB>☉</SUB>, and R<SUB>⋆</SUB> ≍ 0.45-0.46 R<SUB>☉</SUB>), and the planets are both
