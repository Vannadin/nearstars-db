- &id1110
  arxiv_id: '2110.12195'
  ads_bibcode: 2021NatSR..1120894S
  title: Numerous chondritic impactors and oxidized magma ocean set Earth's volatile depletion
  authors:
  - Sakuraba, Haruka
  - Kurokawa, Hiroyuki
  - Genda, Hidenori
  - Ohta, Kenji
  year: '2021'
  pubdate: '2021-10-00'
  doi: 10.1038/s41598-021-99240-w
  abstract: 'Earth''s surface environment is largely influenced by its budget of major volatile elements: carbon (C), nitrogen
    (N), and hydrogen (H). Although the volatiles on Earth are thought to have been delivered by chondritic materials, the
    elemental composition of the bulk silicate Earth (BSE) shows depletion in the order of N, C, and H. Previous studies have
    concluded that non-chondritic materials are needed for this depletion pattern. Here, we model the evolution of the volatile
    abundances in the atmosphere, oceans, crust, mantle, and core through the accretion history by considering elemental partitioning
    and impact erosion. We show that the BSE depletion pattern can be reproduced from continuous accretion of chondritic bodies
    by the partitioning of C into the core and H storage in the magma ocean in the main accretion stage and atmospheric erosion
    of N in the late accretion stage. This scenario requires a relatively oxidized magma ocean (log1<SUB>0</SUB>f<SUB>O<SUB>2</SUB></SUB>?≳?IW
    ?-2 ?, where f<SUB><SUB>O 2</SUB></SUB>? is the oxygen fugacity, IW ? is log1<SUB>0</SUB>f<SUB>O</SUB><SUP><SUB>2</SUB>
    IW</SUP> ?, and f<SUB>O</SUB><SUP><SUB>2</SUB> IW</SUP>? is f<SUB><SUB>O 2</SUB></SUB>? at the iron-wüstite buffer), the
    dominance of small impactors in the late accretion, and the storage of H and C in oceanic water and carbonate rocks in
    the late accretion stage, all of which are naturally expected from the formation of an Earth-sized planet in the habitable
    zone.'
  source: citation_of=2025ApJ...991L..11C
