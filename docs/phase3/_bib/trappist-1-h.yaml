  doi: 10.48550/arXiv.2411.11898
  abstract: In the monograph, the authors systematize and generalize the results of studying solar-type activity that is characteristic
    of a significant part of mid- and low-mass stars of the Galaxy, outline the characteristics of such stars in the quiescent
    state, during the sporadic flares and variations of magnetic activity over the course of stellar evolution. The observational
    data taken over the whole range of the electromagnetic spectrum from decametric radio waves to X-rays are described in
    detail. The current models of stellar flares and stellar dynamo models are considered in two theoretical chapters. The
    last part of the book describes the impact of stellar activity of mid- and low-mass stars on exoplanetary environments.
    The Catalog of Stars with Solar-Type Activity is provided in the supplementary section. The book is intended for researchers
    involved in studying the physics of stars and the Sun, graduate students, and students specialized in heliophysics, astrophysics,
    and in the field of space physics. The cover shows the distribution of 314618 stars with solar-type activity over the
    celestial sphere.
