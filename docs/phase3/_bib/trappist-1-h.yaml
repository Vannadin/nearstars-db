  arxiv_id: '2410.14218'
  ads_bibcode: 2024MNRAS.535...90V
  title: 'HD 28185 revisited: an outer planet, instead of a brown dwarf, on a Saturn-like orbit'
  authors:
  - Venner, Alexander
  - An, Qier
  - Huang, Chelsea X.
  - Brandt, Timothy D.
