- &id547
  arxiv_id: '0707.2409'
  ads_bibcode: 2007ApJ...670..833J
  title: 'A New Planet around an M Dwarf: Revealing a Correlation between Exoplanets and Stellar Mass'
  authors:
  - Johnson, John Asher
  - Butler, R. Paul
  - Marcy, Geoffrey W.
  - Fischer, Debra A.
  - Vogt, Steven S.
  - Wright, Jason T.
  - Peek, Kathryn M. G.
  year: '2007'
  pubdate: '2007-11-00'
  doi: 10.1086/521720
  abstract: We report precise Doppler measurements of GJ 317 (M3.5 V) that reveal the presence of a planet with a minimum
    mass M<SUB>P</SUB>sini=1.2 M<SUB>Jup</SUB> in an eccentric, 692.9 day orbit. GJ 317 is only the third M dwarf with a Doppler-detected
    Jovian planet. The residuals to a single-Keplerian fit show evidence of a possible second orbital companion. The inclusion
    of a second Jupiter-mass planet (P~2700 days, M<SUB>P</SUB>sini=0.83 M<SUB>Jup</SUB>) decreases sqrt(χ<SUP>2</SUP><SUB>ν</SUB>)
    from 2.02 to 1.23, and reduces the rms from 12.5 to 6.32 m s<SUP>-1</SUP>. A false-alarm test yields a 1.1% probability
    that the curvature in the residuals of the single-planet fit is due to random fluctuations, lending additional credibility
    to the two-planet model. However, our data only marginally constrain a two-planet fit, and further monitoring is necessary
    to fully characterize the properties of the second companion. To study the effect of stellar mass on giant planet occurrence,
    we measure the fraction of stars with planets in three mass bins comprised of our samples of M Dwarfs, solar-mass stars,
    and intermediate-mass subgiants. We find a positive correlation between stellar mass and the occurrence rate of Jovian
    planets within 2.5 AU. Low-mass K and M stars have a 1.8%+/-1.0% planet occurrence rate compared to 4.2%+/-0.7% for solar-mass
    stars and 8.9%+/-2.9% for the higher mass subgiants. This result indicates that the former F- and A-type stars with M<SUB>*</SUB>&gt;=1.3
    M<SUB>solar</SUB> in our sample are nearly 5 times more likely than the M dwarfs to harbor a giant planet. Our analysis
    shows that the correlation between Jovian planet occurrence and stellar mass exists even after correcting for the effects
    of stellar metallicity. <P />Based on observations obtained at the W. M. Keck Observatory, which is operated jointly by
    the University of California and the California Institute of Technology. Keck time has been granted by both NASA and the
    University of California.
