  ads_bibcode: 2025AJ....169..217L
  title: Multibeam SETI Observations Toward Nearby M Dwarfs with FAST
  authors:
  - Luan, Xiao-Hang
  - Huang, Bo-Lun
  - Tao, Zhen-Zhao
  - Cui, Yan
