- &id505
  arxiv_id: '1411.3255'
  ads_bibcode: 2015A&A...575A..28B
  title: The structure of protoplanetary discs around evolving young stars
  authors:
  - Bitsch, Bertram
  - Johansen, Anders
  - Lambrechts, Michiel
  - Morbidelli, Alessandro
  year: '2015'
  pubdate: '2015-03-00'
  doi: 10.1051/0004-6361/201424964
  abstract: The formation of planets with gaseous envelopes takes place in protoplanetary accretion discs on time scales of
    several million years. Small dust particles stick to each other to form pebbles, pebbles concentrate in the turbulent
    flow to form planetesimals and planetary embryos and grow to planets, which undergo substantial radial migration. All
    these processes are influenced by the underlying structure of the protoplanetary disc, specifically the profiles of temperature,
    gas scale height, and density. The commonly used disc structure of the minimum mass solar nebula (MMSN) is a simple power
    law in all these quantities. However, protoplanetary disc models with both viscous and stellar heating show several bumps
    and dips in temperature, scale height, and density caused by transitions in opacity, which are missing in the MMSN model.
    These play an important role in the formation of planets, since they can act as sweet spots for forming planetesimals
    via the streaming instability and affect the direction and magnitude of type-I migration. We present 2D simulations of
    accretion discs that feature radiative cooling and viscous and stellar heating, and they are linked to the observed evolutionary
    stages of protoplanetary discs and their host stars. These models allow us to identify preferred planetesimal and planet
    formation regions in the protoplanetary disc as a function of the disc's metallicity, accretion rate, and lifetime. We
    derive simple fitting formulae that feature all structural characteristics of protoplanetary discs during the evolution
    of several Myr. These fits are straightforward for applying to modelling any growth stage of planets where detailed knowledge
    of the underlying disc structure is required. <P />Appendix A is available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201424964/olm">http://www.aanda.org</A>
