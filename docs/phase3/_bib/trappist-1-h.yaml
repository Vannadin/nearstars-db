  arxiv_id: '2011.09409'
  ads_bibcode: 2021AJ....161...63W
  title: The Volume-complete Sample of M Dwarfs with Masses 0.1 ≤ M/M<SUB>☉</SUB> ≤ 0.3 within 15 Parsecs
  authors:
  - Winters, Jennifer G.
  - Charbonneau, David
  - Henry, Todd J.
  - Irwin, Jonathan M.
  - Jao, Wei-Chun
  - Riedel, Adric R.
