  arxiv_id: '1508.05955'
  ads_bibcode: 2015MNRAS.454..593B
  title: A self-consistent, absolute isochronal age scale for young moving groups in the solar neighbourhood
  authors:
  - Bell, Cameron P. M.
  - Mamajek, Eric E.
  - Naylor, Tim
  year: '2015'
  pubdate: '2015-11-00'
  doi: 10.1093/mnras/stv1981
  abstract: 'We present a self-consistent, absolute isochronal age scale for young ( ≲ 200 Myr), nearby ( ≲ 100 pc) moving
    groups in the solar neighbourhood based on homogeneous fitting of semi-empirical pre-main-sequence model isochrones using
    the τ<SUP>2</SUP> maximum-likelihood fitting statistic of Naylor &amp; Jeffries in the M<SUB>V</SUB>, V - J colour-magnitude
    diagram. The final adopted ages for the groups are as follows: 149^{+51}_{-19} {Myr} for the AB Dor moving group, 24 ±
    3 Myr for the β Pic moving group (BPMG), 45^{+11}_{-7} {Myr} for the Carina association, 42^{+6}_{-4} {Myr} for the Columba
    association, 11 ± 3 Myr for the η Cha cluster, 45 ± 4 Myr for the Tucana-Horologium moving group (Tuc-Hor), 10 ± 3 Myr
    for the TW Hya association and 22^{+4}_{-3} {Myr} for the 32 Ori group. At this stage we are uncomfortable assigning a
    final, unambiguous age to the Argus association as our membership list for the association appears to suffer from a high
    level of contamination, and therefore it remains unclear whether these stars represent a single population of coeval stars.
    Our isochronal ages for both the BPMG and Tuc-Hor are consistent with recent lithium depletion boundary (LDB) ages, which
    unlike isochronal ages, are relatively insensitive to the choice of low-mass evolutionary models. This consistency between
    the isochronal and LDB ages instils confidence that our self-consistent, absolute age scale for young, nearby moving groups
    is robust, and hence we suggest that these ages be adopted for future studies of these groups. Software implementing the
    methods described in this study is available from http://www.astro.ex.ac.uk/people/timn/tau-squared/.'
