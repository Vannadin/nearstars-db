- &id458
  arxiv_id: '1803.00575'
  ads_bibcode: 2018A&A...614A..62D
  title: Planetesimal formation during protoplanetary disk buildup
  authors:
  - Drążkowska, J.
  - Dullemond, C. P.
  year: '2018'
  pubdate: '2018-06-00'
  doi: 10.1051/0004-6361/201732221
  abstract: 'Context. Models of dust coagulation and subsequent planetesimal formation are usually computed on the backdrop
    of an already fully formed protoplanetary disk model. At the same time, observational studies suggest that planetesimal
    formation should start early, possibly even before the protoplanetary disk is fully formed. <BR /> Aims: In this paper
    we investigate under which conditions planetesimals already form during the disk buildup stage, in which gas and dust
    fall onto the disk from its parent molecular cloud. <BR /> Methods: We couple our earlier planetesimal formation model
    at the water snow line to a simple model of disk formation and evolution. <BR /> Results: We find that under most conditions
    planetesimals only form after the buildup stage, when the disk becomes less massive and less hot. However, there are parameters
    for which planetesimals already form during the disk buildup. This occurs when the viscosity driving the disk evolution
    is intermediate (α<SUB>v</SUB> 10<SUP>-3</SUP>-10<SUP>-2</SUP>) while the turbulent mixing of the dust is reduced compared
    to that (α<SUB>t</SUB> ≲ 10<SUP>-4</SUP>), and with the assumption that the water vapor is vertically well-mixed with
    the gas. Such a α<SUB>t</SUB> ≪ α<SUB>v</SUB> scenario could be expected for layered accretion, where the gas flow is
    mostly driven by the active surface layers, while the midplane layers, where most of the dust resides, are quiescent.
    <BR /> Conclusions: In the standard picture where protoplanetary disk accretion is driven by global turbulence, we find
    that no planetesimals form during the disk buildup stage. Planetesimal formation during the buildup stage is only possible
    in scenarios in which pebbles reside in a quiescent midplane while the gas and water vapor are diffused at a higher rate.'
