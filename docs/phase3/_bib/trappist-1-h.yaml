  title: Composition of terrestrial exoplanet atmospheres from meteorite outgassing experiments
  authors:
  - Thompson, Maggie A.
  - Telus, Myriam
  - Schaefer, Laura
  - Fortney, Jonathan J.
  - Joshi, Toyanath
  - Lederman, David
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.1038/s41550-021-01338-8
  abstract: Terrestrial exoplanets likely form initial atmospheres through outgassing during and after accretion, although
    there is currently no first-principles understanding of how to connect a planet's bulk composition to its early atmospheric
    properties. Important insights into this connection can be gained by assaying meteorites, which are representative samples
    of planetary building blocks. We perform laboratory outgassing experiments that use a mass spectrometer to measure the
    abundances of volatiles released when meteorite samples are heated to 1,200 °C. We find that outgassing from three carbonaceous
    chondrite samples consistently produce H<SUB>2</SUB>O-rich (average of ~66%) atmospheres but with substantial amounts
    of CO (~18%) and CO<SUB>2</SUB> (~15%) as well as smaller quantities of H<SUB>2</SUB> and H<SUB>2</SUB>S (up to 1%). These
    results provide experimental constraints on the initial chemical composition in theoretical models of terrestrial planet
    atmospheres, and supply abundances for principal gas species as a function of temperature.
