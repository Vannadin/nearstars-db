  arxiv_id: '2410.10987'
  ads_bibcode: 2025AJ....169..311W
  title: The Thermal Emission Spectrum of the Nearby Rocky Exoplanet LTT 1445A b from JWST MIRI/LRS
  authors:
  - Wachiraphan, Patcharapol
  - Berta-Thompson, Zachory K.
  - Diamond-Lowe, Hannah
  - Winters, Jennifer G.
  - Murray, Catriona
  - Zhang, Michael
  - Xue, Qiao
  - Morley, Caroline V.
  - Rosario-Franco, Marialis
  - Duvvuri, Girish M.
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.3847/1538-3881/adc990
  abstract: The nearby transiting rocky exoplanet LTT 1445A b presents an ideal target for studying atmospheric retention
    in terrestrial planets orbiting M dwarfs. It is cooler than many rocky exoplanets yet tested for atmospheres, receiving
    a bolometric instellation similar to Mercury's. Previous transmission spectroscopy ruled out a light H/He-dominated atmosphere
    but could not distinguish between a bare-rock, a high-MMW, nor a cloudy atmosphere. We present new secondary eclipse observations
    using JWST's MIRI/LRS, covering the 5─12 μm range. From these observations, we detect a broadband secondary eclipse depth
    of 41 ± 9 ppm and measure a mid-eclipse timing consistent with a circular orbit (at 1.7σ). From its emission spectrum,
    the planet's dayside brightness temperature is constrained to 525 ± 15 K, yielding a temperature ratio relative to the
    maximum average dayside temperature from instant thermal reradiation by a rocky surface R = <inline-formula> </inline-formula>
    = 0.952 ± 0.057, consistent with emission from a dark rocky surface. From an energy balance perspective, such a warm dayside
    temperature disfavors thick atmospheres, excluding ∼100 bar atmospheres with Bond albedo &gt;0.08 at the 3σ level. Furthermore,
    forward modeling of atmospheric emission spectra disfavor simple 100% CO<SUB>2</SUB> atmospheres with surface pressures
    of 1, 10, and 100 bar at 4.2σ, 6.6σ, and 6.8σ confidence, respectively. These results suggest that LTT 1445A b lacks a
    very thick CO<SUB>2</SUB> atmosphere, possibly due to atmospheric erosion driven by stellar activity. However, the presence
    of a moderately thin atmosphere (similar to those on Mars, Titan, or Earth) remains uncertain.
