  abstract: Transmission spectroscopy has been a workhorse technique used over the past two decades to constrain the physical
    and chemical properties of exoplanet atmospheres<SUP>1, 2, 3, 4─5</SUP>. One of its classical key assumptions is that
    the portion of the atmosphere it probes—the terminator region—is homogeneous. Several works from the past decade, however,
    have put this into question for highly irradiated, hot (T<SUB>eq</SUB> ≳ 1,000 K) gas giant exoplanets, both empirically<SUP>6,
    7, 8, 9─10</SUP> and through three-dimensional modelling<SUP>11, 12, 13, 14, 15, 16─17</SUP>. While models have predicted
    clear differences between the evening (day-to-night) and morning (night-to-day) terminators, direct morning and evening
    transmission spectra in a wide wavelength range have not been reported for an exoplanet so far. Under the assumption of
    precise and accurate orbital parameters for the exoplanet WASP-39 b, here we report the detection of inhomogeneous terminators
    on WASP-39 b, which has allowed us to retrieve its morning and evening transmission spectra in the near-infrared (2─5
    μm) using the James Webb Space Telescope. We have observed larger transit depths in the evening, which are, on average,
    405 ± 88 ppm larger than the morning ones, and also have qualitatively larger features than the morning spectrum. The
    spectra are best explained by models in which the evening terminator is hotter than the morning terminator by <inline-formula><mml:math><mml:mrow><mml:mn>17</mml:mn><mml:msubsup><mml:mrow><mml:mn>7</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>57</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>65</mml:mn></mml:mrow></mml:msubsup></mml:mrow></mml:math></inline-formula>
    K, with both terminators having C/O ratios consistent with solar. General circulation models predict temperature differences
    broadly consistent with the above value and point towards a cloudy morning terminator and a clearer evening terminator.
