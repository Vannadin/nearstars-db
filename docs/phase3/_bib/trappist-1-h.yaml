  arxiv_id: '1602.08277'
  ads_bibcode: 2016MNRAS.458.2657B
  title: 'Telling twins apart: exo-Earths and Venuses with transit spectroscopy'
  authors:
  - Barstow, J. K.
  - Aigrain, S.
  - Irwin, P. G. J.
  - Kendrew, S.
  - Fletcher, L. N.
  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.1093/mnras/stw489
  abstract: The planned launch of the James Webb Space Telescope (JWST) in 2018 will herald a new era of exoplanet spectroscopy.
    JWST will be the first telescope sensitive enough to potentially characterize terrestrial planets from their transmission
    spectra. In this work, we explore the possibility that terrestrial planets with Venus-type and Earth-type atmospheres
    could be distinguished from each other using spectra obtained by JWST. If we find a terrestrial planet close to the liquid
    water habitable zone of an M5 star within a distance of 10 parsec, it would be possible to detect atmospheric ozone if
    present in large enough quantities, which would enable an oxygen-rich atmosphere to be identified. However, the cloudiness
    of a Venus-type atmosphere would inhibit our ability to draw firm conclusions about the atmospheric composition, making
    any result ambiguous. Observing small, temperate planets with JWST requires significant investment of resources, with
    single targets requiring of the order of 100 transits to achieve sufficient signal to noise. The possibility of detecting
    a crucial feature such as the ozone signature would need to be carefully weighed against the likelihood of clouds obscuring
    gas absorption in the spectrum.
  source: citation_of=2019AJ....158...27L
