  abstract: The ExoMol project is dedicated to providing molecular line lists for exoplanet and other hot atmospheres. The
    ExoMol procedure uses a mixture of ab initio calculations and available laboratory data. The actual line lists are generated
    using variational nuclear motion calculations. These line lists form the input for opacity models for cool stars and brown
    dwarfs as well as for radiative transport models involving exoplanets. This paper is a collection of molecular opacities
    for 52 molecules (130 isotopologues) at two reference temperatures, 300 K and 2000 K, using line lists from the ExoMol
    database. So far, ExoMol line lists have been generated for about 30 key molecular species. Other line lists are taken
    from external sources or from our work predating the ExoMol project. An overview of the line lists generated by ExoMol
    thus far is presented and used to evaluate further molecular data needs. Other line lists are also considered. The requirement
    for completeness within a line list is emphasized and needs for further line lists discussed.
