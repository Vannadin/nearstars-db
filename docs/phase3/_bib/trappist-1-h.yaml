  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.3847/1538-3881/aa80de
  abstract: The California-Kepler Survey (CKS) is an observational program developed to improve our knowledge of the properties
    of stars found to host transiting planets by NASA’s Kepler Mission. The improvement stems from new high-resolution optical
    spectra obtained using HIRES at the W. M. Keck Observatory. The CKS stellar sample comprises 1305 stars classified as
    Kepler objects of interest, hosting a total of 2075 transiting planets. The primary sample is magnitude-limited ({Kp}&lt;
    14.2) and contains 960 stars with 1385 planets. The sample was extended to include some fainter stars that host multiple
    planets, ultra-short period planets, or habitable zone planets. The spectroscopic parameters were determined with two
    different codes, one based on template matching and the other on direct spectral synthesis using radiative transfer. We
    demonstrate a precision of 60 K in {T}<SUB>{eff</SUB>}, 0.10 dex in {log}g, 0.04 dex in [{Fe}/{{H}}], and 1.0 {km} {{{s}}}<SUP>-1</SUP>
    in V\sin I. In this paper, we describe the CKS project and present a uniform catalog of spectroscopic parameters. Subsequent
    papers in this series present catalogs of derived stellar properties such as mass, radius, and age; revised planet properties;
    and statistical explorations of the ensemble. CKS is the largest survey to determine the properties of Kepler stars using
    a uniform set of high-resolution, high signal-to-noise ratio spectra. The HIRES spectra are available to the community
    for independent analyses. <P />Based on observations obtained at the W. M. Keck Observatory, which is operated jointly
    by the University of California and the California Institute of Technology. Keck time was granted for this project by
    the University of California, and California Institute of Technology, the University of Hawaii, and NASA.
