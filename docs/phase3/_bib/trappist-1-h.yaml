  abstract: Small temperate planets are prime targets for exoplanet studies due to their possible similarities with the rocky
    planets in the Solar system. M dwarfs are promising hosts since the planetary signals are within our current detection
    capabilities. Gliese 12 b is a Venus-sized temperate planet orbiting a quiet M dwarf. We present here the first precise
    mass measurement of this small exoplanet. We performed a detailed analysis using HARPS-N (High Accuracy Radial velocity
    Planet Searcher for the Northern Hemisphere), ESPRESSO (Echelle Spectrograph for Rocky Exoplanets and Stable Spectroscopic
    Observations), and CARMENES (Calar Alto high-Resolution search for M dwarfs with Exoearths with Near-infrared and optical
    Echelle Spectrographs) radial velocities, along with new and archival TESS (Transiting Exoplanet Survey Satellite), CHEOPS
    (CHaracterising ExOPlanet Satellite), and MuSCAT2/3 (Multicolor Simultaneous Camera for studying Atmospheres of Transiting
    exoplanets) photometry data. From fitting the available data, we find that the planet has a radius of <inline-formula><tex-math>$R_\mathrm{p}
    = 0.93\pm 0.06 \, \mathrm{R_{\rm{\oplus }}}$</tex-math></inline-formula> and a mass of <inline-formula><tex-math>$M_\mathrm{p}
    = 0.95^{+0.29}_{-0.30} \, \mathrm{M_{\rm{\oplus }}}$</tex-math></inline-formula> (a <inline-formula><tex-math>$3.2\sigma$</tex-math></inline-formula>
    measurement of the semi-amplitude <inline-formula><tex-math>$K=0.67\pm 0.21\, \mathrm{m\, s^{-1}}$</tex-math></inline-formula>),
    and is on an orbit with a period of <inline-formula><tex-math>$12.761418^{+0.000060}_{-0.000055}\, \mathrm{d}$</tex-math></inline-formula>.
