  arxiv_id: '1409.2886'
  ads_bibcode: 2014ApJ...794L...5K
  title: On the Frequency of Potential Venus Analogs from Kepler Data
  authors:
  - Kane, Stephen R.
  - Kopparapu, Ravi Kumar
  - Domagal-Goldman, Shawn D.
  year: '2014'
  pubdate: '2014-10-00'
  doi: 10.1088/2041-8205/794/1/L5
  abstract: The field of exoplanetary science has seen a dramatic improvement in sensitivity to terrestrial planets over recent
    years. Such discoveries have been a key feature of results from the Kepler mission which utilizes the transit method to
    determine the size of the planet. These discoveries have resulted in a corresponding interest in the topic of the Habitable
    Zone and the search for potential Earth analogs. Within the solar system, there is a clear dichotomy between Venus and
    Earth in terms of atmospheric evolution, likely the result of the large difference (approximately a factor of two) in
    incident flux from the Sun. Since Venus is 95% of the Earth's radius in size, it is impossible to distinguish between
    these two planets based only on size. In this Letter we discuss planetary insolation in the context of atmospheric erosion
    and runaway greenhouse limits for planets similar to Venus. We define a "Venus Zone" in which the planet is more likely
    to be a Venus analog rather than an Earth analog. We identify 43 potential Venus analogs with an occurrence rate (η<SUB>♀</SUB>)
    of 0.32^{+0.05}_{-0.07} and 0.45^{+0.06}_{-0.09} for M dwarfs and GK dwarfs, respectively.
