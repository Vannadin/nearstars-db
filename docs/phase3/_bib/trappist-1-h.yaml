  doi: 10.3847/1538-4357/ab32e8
  abstract: Transit spectroscopy of terrestrial planets around nearby M dwarfs will be a primary goal of space missions in
    coming decades. Three-dimensional climate modeling has shown that slow-synchronous rotating terrestrial planets may develop
    thick clouds at the substellar point, increasing the albedo. For M dwarfs with T <SUB>eff</SUB> &gt; 3000 K, such planets
    at the inner habitable zone (IHZ) have been shown to retain moist greenhouse conditions, with enhanced stratospheric water
    vapor (fH <SUB>2</SUB>O &gt; 10<SUP>-3</SUP>) and low Earth-like surface temperatures. However, M dwarfs also possess
    strong UV activity, which may effectively photolyze stratospheric H<SUB>2</SUB>O. Prior modeling efforts have not included
    the impact of high stellar UV activity on the H<SUB>2</SUB>O. Here, we employ a 1D photochemical model with varied stellar
    UV, to assess whether H<SUB>2</SUB>O destruction driven by high stellar UV would affect its detectability in transmission
    spectroscopy. Temperature and water vapor profiles are taken from published 3D climate model simulations for an IHZ Earth-sized
    planet around a 3300 K M dwarf with an N<SUB>2</SUB>-H<SUB>2</SUB>O atmosphere; they serve as self-consistent input profiles
    for the 1D model. We explore additional chemical complexity within the 1D model by introducing other species into the
    atmosphere. We find that as long as the atmosphere is well-mixed up to 1 mbar, UV activity appears to not impact detectability
    of H<SUB>2</SUB>O in the transmission spectrum. The strongest H<SUB>2</SUB>O features occur in the James Webb Space Telescope
    MIRI instrument wavelength range and are comparable to the estimated systematic noise floor of ∼50 ppm.
