- &id240
  arxiv_id: '2403.13265'
  ads_bibcode: 2024ApJ...968L..22D
  title: LHS 1140 b Is a Potentially Habitable Water World
  authors:
  - Damiano, Mario
  - Bello-Arufe, Aaron
  - Yang, Jeehyun
  - Hu, Renyu
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.3847/2041-8213/ad5204
  abstract: LHS 1140 b is a small planet orbiting in the habitable zone of its M4.5V dwarf host. Recent mass and radius constraints
    have indicated that it has either a thick H<SUB>2</SUB>-rich atmosphere or substantial water by mass. Here we present
    a transmission spectrum of LHS 1140 b between 1.7 and 5.2 μm, obtained using the NIRSpec instrument on JWST. By combining
    spectral retrievals and self-consistent atmospheric models, we show that the transmission spectrum is inconsistent with
    H<SUB>2</SUB>-rich atmospheres with varied size and metallicity, leaving a water world as the remaining scenario to explain
    the planet's low density. Specifically, a H<SUB>2</SUB>-rich atmosphere would result in prominent spectral features of
    CH<SUB>4</SUB> or CO<SUB>2</SUB> on this planet, but they are not seen in the transmission spectrum. Instead, the data
    favor a high mean molecular weight atmosphere (possibly N<SUB>2</SUB> dominated with H<SUB>2</SUB>O and CO<SUB>2</SUB>)
    with a modest confidence. Forming the planet by accreting C- and N-bearing ices could naturally give rise to a CO<SUB>2</SUB>-
    or N<SUB>2</SUB>-dominated atmosphere, and if the planet evolves to or has the climate-stabilizing mechanism to maintain
    a moderate-size CO<SUB>2</SUB>/N<SUB>2</SUB>-dominated atmosphere, the planet could have liquid-water oceans. Our models
    suggest CO<SUB>2</SUB> absorption features with an expected signal of 20 ppm at 4.2 μm. As the existence of an atmosphere
    on TRAPPIST-1 planets is uncertain, LHS 1140 b may well present the best current opportunity to detect and characterize
    a habitable world.
