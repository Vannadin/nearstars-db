  doi: 10.3847/1538-3881/ab91c2
  abstract: We present the confirmation of two new planets transiting the nearby mid-M dwarf LTT 3780 (TIC 36724087, TOI-732,
    V = 13.07, K<SUB>s</SUB> = 8.204, R<SUB>s</SUB> = 0.374 R<SUB>☉</SUB>, M<SUB>s</SUB> = 0.401 M<SUB>☉</SUB>, d = 22 pc).
    The two planet candidates are identified in a single Transiting Exoplanet Survey Satellite sector and validated with reconnaissance
    spectroscopy, ground-based photometric follow-up, and high-resolution imaging. With measured orbital periods of P<SUB>b</SUB>
    = 0.77, P<SUB>c</SUB> = 12.25 days and sizes r<SUB>p,b</SUB> = 1.33 ± 0.07, r<SUB>p,c</SUB> = 2.30 ± 0.16 R<SUB>⊕</SUB>,
    the two planets span the radius valley in period-radius space around low-mass stars, thus making the system a laboratory
    to test competing theories of the emergence of the radius valley in that stellar mass regime. By combining 63 precise
    radial velocity measurements from the High Accuracy Radial velocity Planet Searcher (HARPS) and HARPS-N, we measure planet
    masses of ${m}_{p,b}={2.62}_{-0.46}^{+0.48}$ and ${m}_{p,c}={8.6}_{-1.3}^{+1.6}$ M<SUB>⊕</SUB>, which indicates that LTT
    3780b has a bulk composition consistent with being Earth-like, while LTT 3780c likely hosts an extended H/He envelope.
    We show that the recovered planetary masses are consistent with predictions from both photoevaporation and core-powered
    mass-loss models. The brightness and small size of LTT 3780, along with the measured planetary parameters, render LTT
    3780b and c as accessible targets for atmospheric characterization of planets within the same planetary system and spanning
    the radius valley.
