  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.1093/mnras/sty1877
  abstract: A new line list for H_2^{ 16}O is presented. This line list, which is called POKAZATEL, includes transitions between
    rotational-vibrational energy levels up to 41 000 cm<SUP>-1</SUP> and is the most complete to date. The potential energy
    surface (PES) used for producing the line list was obtained by fitting a high-quality ab initio PES to experimental energy
    levels with energies of 41 000 cm<SUP>-1</SUP> and for rotational excitations up to J = 5. The final line list comprises
    all energy levels up to 41 000 cm<SUP>-1</SUP> and rotational angular momentum J up to 72. An accurate ab initio dipole
    moment surface was used for the calculation of line intensities and reproduces high-precision experimental intensity data
    with an accuracy close to 1 per cent. The final line list uses empirical energy levels, whenever they are available, to
    ensure that line positions are reproduced as accurately as possible. The POKAZATEL line list contains over 5 billion transitions
    and is available from the ExoMol website (www.exomol.com) and the CDS data base.
