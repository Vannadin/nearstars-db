  ads_bibcode: 2020yCat.1350....0G
  title: 'VizieR Online Data Catalog: Gaia EDR3 (Gaia Collaboration, 2020)'
  authors:
  - Gaia Collaboration
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.26093/cds/vizier.1350
  abstract: 'Contents of Gaia EDR3: <P />The five-parameter astrometric solution - positions on the sky (alpha,delta), parallaxes,
    and proper motions - for around 1.5 billion (1.5x10<SUP>9</SUP>) sources, with a limiting magnitude of about G~=21 and
    a bright limit of about G~=3. The astrometric solution will be accompanied with some new quality indicators, like RUWE,
    and source image descriptors. <P />In addition, two-parameters solutions - positions on the sky (alpha,delta) - for around
    300 million additional sources. <P />G magnitudes for around 1.8 billion sources. <P />GBP and GRP magnitudes for around
    1.5 billion sources. <P />Please be aware that the photometric system for the G, GBP, and GRP bands in Gaia EDR3 is different
    from the photometric system as used in Gaia DR2 and Gaia DR1. <P />Full passband definitions for G, GBP, and GRP. More
    information will become available here. <P />About 1.5 million celestial reference frame (Gaia-CRF) sources. <P />Cross-matches
    between Gaia EDR3 sources on the one hand and Hipparcos-2, Tycho-2 + TDSC merged, 2MASS PSC (merged with 2MASX), SDSS
    DR13, Pan-STARRS1 DR1, SkyMapper DR1, GSC 2.3, APASS DR9, RAVE DR5, allWISE, and URAT-1 data on the other hand. <P />Additionally,
    a Gaia EDR3 to Gaia DR2 match will be provided. <P />Simulated data from Gaia Object Generator (GOG) and Gaia Universe
    Model Snapshot (GUMS) will be provided. <P />The commanded scan law covering the Gaia EDR3 data collection period will
    be provided. Also the major periods where data was not sent to the ground or could not be processed are identified. <P
    />Gaia DR3 data (both Gaia EDR3 and the full Gaia DR3) are based on data collected between 25 July 2014 (10:30 UTC) and
    28 May 2017 (08:44 UTC), spanning a period of 34 months. As a comparison, Gaia DR2 was based on 22 months of data and
    Gaia DR1 was based on observations collected during the first 14 months of Gaia''s routine operational phase. <P />The
    reference epoch for Gaia DR3 (both Gaia EDR3 and the full Gaia DR3) is 2016.0. Remember that the reference epoch is different
    for each Gaia data release (it was was J2015.5 for Gaia DR2 and J2015.0 for Gaia DR1). <P />Positions and proper motions
    are referred to the ICRS, to which the optical reference frame defined by Gaia EDR3 is aligned. The time coordinate for
    Gaia EDR3 is the barycentric coordinate time (TCB). <P />(5 data files).'
