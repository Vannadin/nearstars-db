  ads_bibcode: 2019MiEng.131..185W
  title: Kinetics and mechanism of mineral carbonation of olivine for CO<SUB>2</SUB> sequestration
  authors:
  - Wang, Fei
  - Dreisinger, David
  - Jarvis, Mark
  - Hitchins, Tony
  year: '2019'
  pubdate: '2019-00-00'
  doi: 10.1016/j.mineng.2018.11.024
  abstract: Mineral carbonation (MC) is one of the most important methods to sequester CO<SUB>2</SUB> due to the advantages
    of permanently storage and abundant mineral resources. This work was designed to investigate the MC chemistry and kinetics
    in order to further develop carbonation technology. The comprehensive effects of all factors on MC of olivine were investigated.
    The mechanism of the reaction has been elucidated and can vary under different conditions. With high addition of sodium
    salts and high CO<SUB>2</SUB> partial pressure (P<SUB>CO2</SUB>), the rate of MC was controlled by chemical reaction between
    H<SUP>+</SUP> and olivine no matter how the other variables were changed. The H<SUP>+</SUP> concentration in the void
    between the well-crystallized carbonates formed by carbonation and the non-reacted olivine was believed to be the same
    as that in the aqueous bulk solution. The decrease in particle size, increase in temperature, HCO<SUB>3</SUB><SUP>-</SUP>
    concentration and ionic strength in solution can dramatically enhance the carbonation. With little addition of sodium
    salts, the MC was controlled by diffusion through the Si-rich layer surrounding the olivine core. In contrast, with high
    addition of sodium salts but low P<SUB>CO2</SUB>, the MC was controlled by diffusion through the dense carbonate layer.
    The addition of sodium bicarbonate can dramatically increase the ionic strength and aid the dissolution of Si to temporarily
    aqueous H<SUB>4</SUB>SiO<SUB>4</SUB> followed by decomposition to amorphous silica and consequently the removal of Si-rich
    layer. Under low P<SUB>CO2</SUB>, there was a limited supply of CO<SUB>3</SUB><SUP>2-</SUP> ions, which resulted in the
    formation of a dense and poorly porous carbonate layer between a layer of well-crystallized carbonates and non-reacted
    olivine.
