  title: Early accretion of protoplanets inferred from a reduced inner solar system <SUP>26</SUP>Al inventory
  authors:
  - Schiller, Martin
  - Connelly, James N.
  - Glad, Aslaug C.
  - Mikouchi, Takashi
  - Bizzarro, Martin
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1016/j.epsl.2015.03.028
  abstract: The mechanisms and timescales of accretion of 10-1000 km sized planetesimals, the building blocks of planets,
    are not yet well understood. With planetesimal melting predominantly driven by the decay of the short-lived radionuclide
    <SUP>26</SUP>Al (<SUP>26</SUP>Al→<SUP>26</SUP>Mg; t<SUB>1/2</SUB> = 0.73 Ma), its initial abundance determines the permissible
    timeframe of planetesimal-scale melting and its subsequent cooling history. Currently, precise knowledge about the initial
    <SUP>26</SUP>Al abundance [(<SUP>26</SUP>Al/<SUP>27</SUP>Al)<SUB>0</SUB>] exists only for the oldest known solids, calcium
    aluminum-rich inclusions (CAIs) - the so-called canonical value. We have determined the <SUP>26</SUP>Al/<SUP>27</SUP>Al
    of three angrite meteorites, D'Orbigny, Sahara 99555 and NWA 1670, at their time of crystallization, which corresponds
    to (3.98 ± 0.15) ×10<SUP>-7</SUP>, (3.64 ± 0.18) ×10<SUP>-7</SUP>, and (5.92 ± 0.59) ×10<SUP>-7</SUP>, respectively. Combined
    with a newly determined absolute U-corrected Pb-Pb age for NWA 1670 of 4564.39 ± 0.24 Ma and published U-corrected Pb-Pb
    ages for the other two angrites, this allows us to calculate an initial (<SUP>26</SUP>Al/<SUP>27</SUP>Al)<SUB>0</SUB>
    of (1.33<SUB>-0.18</SUB><SUP>+0.21</SUP>) ×10<SUP>-5</SUP> for the angrite parent body (APB) precursor material at the
    time of CAI formation, a value four times lower than the accepted canonical value of 5.25 ×10<SUP>-5</SUP>. Based on their
    similar <SUP>54</SUP>Cr/<SUP>52</SUP>Cr ratios, most inner solar system materials likely accreted from material containing
    a similar <SUP>26</SUP>Al/<SUP>27</SUP>Al ratio as the APB precursor at the time of CAI formation. To satisfy the abundant
    evidence for widespread planetesimal differentiation, the subcanonical <SUP>26</SUP>Al budget requires that differentiated
    planetesimals, and hence protoplanets, accreted rapidly within 0.25 ± 0.15 Ma of the formation of canonical CAIs.
