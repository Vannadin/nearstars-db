- &id205
  arxiv_id: '1502.01952'
  ads_bibcode: 2015Sci...347..632L
  title: Asynchronous rotation of Earth-mass planets in the habitable zone of lower-mass stars
  authors:
  - Leconte, Jérémy
  - Wu, Hanbo
  - Menou, Kristen
  - Murray, Norman
  year: '2015'
  pubdate: '2015-02-00'
  doi: 10.1126/science.1258686
  abstract: Planets in the habitable zone of lower-mass stars are often assumed to be in a state of tidally synchronized rotation,
    which would considerably affect their putative habitability. Although thermal tides cause Venus to rotate retrogradely,
    simple scaling arguments tend to attribute this peculiarity to the massive Venusian atmosphere. Using a global climate
    model, we show that even a relatively thin atmosphere can drive terrestrial planets’ rotation away from synchronicity.
    We derive a more realistic atmospheric tide model that predicts four asynchronous equilibrium spin states, two being stable,
    when the amplitude of the thermal tide exceeds a threshold that is met for habitable Earth-like planets with a 1-bar atmosphere
    around stars more massive than ~0.5 to 0.7 solar mass. Thus, many recently discovered terrestrial planets could exhibit
    asynchronous spin-orbit rotation, even with a thin atmosphere.
