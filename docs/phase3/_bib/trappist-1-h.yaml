  arxiv_id: '1708.02631'
  ads_bibcode: 2017SciA....3E0407B
  title: Early formation of planetary building blocks inferred from Pb isotopic ages of chondrules
  authors:
  - Bollard, Jean
  - Connelly, James N.
  - Whitehouse, Martin J.
  - Pringle, Emily A.
  - Bonal, Lydie
  - Jørgensen, Jes K.
  - Nordlund, Åke
  - Moynier, Frédéric
