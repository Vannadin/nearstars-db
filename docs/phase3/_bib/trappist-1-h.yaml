  abstract: Water has proven to be ubiquitously detected in near-infrared (NIR) transmission spectroscopy observations of
    hot Jupiter atmospheres, including WASP-17b. However, previous analyses of WASP-17b's atmosphere based upon Hubble Space
    Telescope (HST) and Spitzer data could not constrain the water abundance, finding that subsolar, supersolar, and bimodal
    posterior distributions were all statistically valid. In this work, we observe one transit of the hot Jupiter WASP-17b
    using JWST's Near Infrared Imager and Slitless Spectrograph (NIRISS) Single Object Slitless Spectroscopy (SOSS) mode.
    We analyze our data using three independent data analysis pipelines, finding excellent agreement between results. Our
    transmission spectrum shows multiple H<SUB>2</SUB>O absorption features and a flatter slope towards the optical than seen
    in previous HST observations. We analyze our spectrum using both PICASO + Virga forward models and free retrievals. POSEIDON
    retrievals provide a well-constrained supersolar log(H<SUB>2</SUB>O) abundance (−2.96<inline-formula> </inline-formula>),
    breaking the degeneracy from the previous HST + Spitzer analysis. We verify our POSEIDON results with petitRADTRANS retrievals.
    Additionally, we constrain the abundance of log(H<SUP>−</SUP>), −10.19<inline-formula> </inline-formula>, finding that
    our model including H<SUP>−</SUP> is preferred over our model without H<SUP>−</SUP> to 5.1 σ. Furthermore, we constrain
    the log(K) abundance (−8.07<inline-formula> </inline-formula>) in WASP-17b's atmosphere for the first time using space-based
    observations. Our abundance constraints demonstrate the power of NIRISS SOSS's increased resolution, precision, and wavelength
    range to improve upon previous NIR space-based results. This work is part of a series of studies by our JWST Telescope
    Scientist Team (JWST-TST), in which we use Guaranteed Time Observations to perform Deep Reconnaissance of Exoplanet Atmospheres
    through Multi-instrument Spectroscopy (DREAMS).
