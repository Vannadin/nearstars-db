  title: Water Vapor and Clouds on the Habitable-zone Sub-Neptune Exoplanet K2-18b
  authors:
  - Benneke, Björn
  - Wong, Ian
  - Piaulet, Caroline
  - Knutson, Heather A.
  - Lothringer, Joshua
  - Morley, Caroline V.
  - Crossfield, Ian J. M.
  - Gao, Peter
