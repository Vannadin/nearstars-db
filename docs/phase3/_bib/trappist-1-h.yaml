- &id166
  arxiv_id: '2001.00095'
  ads_bibcode: 2020PSJ.....1...11Z
  title: Creation and Evolution of Impact-generated Reduced Atmospheres of Early Earth
  authors:
  - Zahnle, Kevin J.
  - Lupu, Roxana
  - Catling, David C.
  - Wogan, Nick
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/PSJ/ab7e2c
  abstract: The origin of life on Earth seems to demand a highly reduced early atmosphere, rich in CH<SUB>4</SUB>, H<SUB>2</SUB>,
    and NH<SUB>3</SUB>, but geological evidence suggests that Earth's mantle has always been relatively oxidized and its emissions
    dominated by CO<SUB>2</SUB>, H<SUB>2</SUB>O, and N<SUB>2</SUB>. The paradox can be resolved by exploiting the reducing
    power inherent in the "late veneer," i.e., material accreted by Earth after the Moon-forming impact. Isotopic evidence
    indicates that the late veneer consisted of extremely dry, highly reduced inner solar system materials, suggesting that
    Earth's oceans were already present when the late veneer came. The major primary product of reaction between the late
    veneer's iron and Earth's water was H<SUB>2</SUB>. Ocean-vaporizing impacts generate high pressures and long cooling times
    that favor CH<SUB>4</SUB> and NH<SUB>3</SUB>. Impacts too small to vaporize the oceans are much less productive of CH<SUB>4</SUB>
    and NH<SUB>3</SUB>, unless (i) catalysts were available to speed their formation, or (ii) additional reducing power was
    extracted from pre-existing crustal or mantle materials. The transient H<SUB>2</SUB>-CH<SUB>4</SUB> atmospheres evolve
    photochemically to generate nitrogenated hydrocarbons at rates determined by solar radiation and hydrogen escape, on timescales
    ranging up to tens of millions of years and with cumulative organic production ranging up to half a kilometer. Roughly
    one ocean of hydrogen escapes. After the methane is gone, the atmosphere is typically H<SUB>2</SUB>- and CO-rich, with
    eventual oxidation to CO<SUB>2</SUB> rate-limited by water photolysis and hydrogen escape.
