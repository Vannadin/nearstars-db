  abstract: We present 2241 exoplanet candidates identified with data from the Transiting Exoplanet Survey Satellite (TESS)
    during its 2 yr Prime Mission. We list these candidates in the TESS Objects of Interest (TOI) Catalog, which includes
    both new planet candidates found by TESS and previously known planets recovered by TESS observations. We describe the
    process used to identify TOIs, investigate the characteristics of the new planet candidates, and discuss some notable
    TESS planet discoveries. The TOI catalog includes an unprecedented number of small planet candidates around nearby bright
    stars, which are well suited for detailed follow-up observations. The TESS data products for the Prime Mission (sectors
    1-26), including the TOI catalog, light curves, full-frame images, and target pixel files, are publicly available at the
    Mikulski Archive for Space Telescopes.
