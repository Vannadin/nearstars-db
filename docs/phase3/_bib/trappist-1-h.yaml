  arxiv_id: '1609.00707'
  ads_bibcode: 2018P&SS..152...55Z
  title: Magnetic properties of Proxima Centauri b analogues
  authors:
  - Zuluaga, Jorge I.
  - Bustamante, Sebastian
  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.1016/j.pss.2018.01.006
  abstract: The discovery of a planet around the closest star to our Sun, Proxima Centauri, represents a quantum leap in the
    testability of exoplanetary models. Unlike any other discovered exoplanet, models of Proxima b could be contrasted against
    near future telescopic observations and far future in-situ measurements. In this paper we aim at predicting the planetary
    radius and the magnetic properties (dynamo lifetime and magnetic dipole moment) of Proxima b analogues (solid planets
    with masses of ∼ 1 - 3M<SUB>⊕</SUB> , rotation periods of several days and habitable conditions). For this purpose we
    build a grid of planetary models with a wide range of compositions and masses. For each point in the grid we run the planetary
    evolution model developed in Zuluaga et al. (2013). Our model assumes small orbital eccentricity, negligible tidal heating
    and earth-like radiogenic mantle elements abundances. We devise a statistical methodology to estimate the posterior distribution
    of the desired planetary properties assuming simple lprior distributions for the orbital inclination and bulk composition.
    Our model predicts that Proxima b would have a mass 1.3 ≤M<SUB>p</SUB> ≤ 2.3M<SUB>⊕</SUB> and a radius R<SUB>p</SUB> =1.4<SUB>-0.2</SUB><SUP>+0.3</SUP>R<SUB>⊕</SUB>
    . In our simulations, most Proxima b analogues develop intrinsic dynamos that last for ≥4 Gyr (the estimated age of the
    host star). If alive, the dynamo of Proxima b have a dipole moment ℳ<SUB>dip</SUB> &gt;0.32<SUB>÷2.9</SUB><SUP>×2.3</SUP>ℳ<SUB>dip
    , ⊕</SUB> . These results are not restricted to Proxima b but they also apply to earth-like planets having similar observed
    properties.
