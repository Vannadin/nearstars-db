- &id1008
  arxiv_id: '1505.00882'
  ads_bibcode: 2015ApJ...806L...7Z
  title: Evidence of Fast Pebble Growth Near Condensation Fronts in the HL Tau Protoplanetary Disk
  authors:
  - Zhang, Ke
  - Blake, Geoffrey A.
  - Bergin, Edwin A.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/2041-8205/806/1/L7
  abstract: Water and simple organic molecular ices dominate the mass of solid materials available for planetesimal and planet
    formation beyond the water snow line. Here we analyze ALMA long baseline 2.9, 1.3 and 0.87 mm continuum images of the
    young star HL Tau, and suggest that the emission dips observed are due to rapid pebble growth around the condensation
    fronts of abundant volatile species. Specifically, we show that the prominent innermost dip at 13 AU is spatially resolved
    in the 0.87 mm image, and its center radius is coincident with the expected mid-plane condensation front of water ice.
    In addition, two other prominent dips, at distances of 32 and 63 AU, cover the mid-plane condensation fronts of pure ammonia
    or ammonia hydrates and clathrate hydrates (especially with CO and N<SUB>2</SUB>) formed from amorphous water ice. The
    spectral index map of HL Tau between 1.3 and 0.87 mm shows that the flux ratios inside the dips are statistically larger
    than those of nearby regions in the disk. This variation can be explained by a model with two dust populations, where
    most of the solid mass resides in a component that has grown to decimeter size scales inside the dips. Such growth is
    in accord with recent numerical simulations of volatile condensation, dust coagulation, and settling.
