  abstract: We describe calibrated TESS images that serve as the input to the MIT Quick Look Pipeline, which we are releasing
    as a High Level Science Product (HLSP). We also outline the python package tica, which we use to fully calibrate the raw
    pixels and apply astrometric registration in the form of World Coordinate Solutions. This HLSP could serve as a means
    for delivering calibrated Full Frame Images to the public promptly after downlink from the spacecraft, which occurs every
    two weeks. This capability would potentially enable new science investigations with TESS data such as fast follow-up of
    transient sources and determination of new solar system object ephemerides.
