  - Domagal-Goldman, Shawn D.
  - Kasting, Patrick J.
  - Kasting, James F.
  year: '2008'
  pubdate: '2008-12-00'
  doi: 10.1089/ast.2007.0197
  abstract: Geological and biological evidence suggests that Earth was warm during most of its early history, despite the
    fainter young Sun. Upper bounds on the atmospheric CO<SUB>2</SUB> concentration in the Late Archean/Paleoproterozoic (2.8
    2.2 Ga) from paleosol data suggest that additional greenhouse gases must have been present. Methanogenic bacteria, which
    were arguably extant at that time, may have contributed to a high concentration of atmospheric CH<SUB>4</SUB>, and previous
    calculations had indicated that a CH<SUB>4</SUB>- CO<SUB>2</SUB>-H<SUB>2</SUB>O greenhouse could have produced warm Late
    Archean surface temperatures while still satisfying the paleosol constraints on pCO<SUB>2</SUB>. Here, we revisit this
    conclusion. Correction of an error in the CH<SUB>4</SUB> absorption coefficients, combined with the predicted early onset
    of climatically cooling organic haze, suggest that the amount of greenhouse warming by CH<SUB>4</SUB> was more limited
    and that pCO<SUB>2</SUB> must therefore have been ≥0.03 bar, at or above the upper bound of the value obtained from paleosols.
    Enough warming from CH<SUB>4</SUB> remained in the Archean, however, to explain why Earth's climate cooled and became
    glacial when atmospheric O<SUB>2</SUB> levels rose in the Paleoproterozoic. Our new model also shows that greenhouse warming
    by higher hydrocarbon gases, especially ethane (C<SUB>2</SUB>H<SUB>6</SUB>), may have helped to keep the Late Archean
    Earth warm.
