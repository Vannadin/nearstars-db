  arxiv_id: '1609.07062'
  ads_bibcode: 2016A&A...596A..33R
  title: 'Spectral energy distribution of M-subdwarfs: A study of their atmospheric properties'
  authors:
  - Rajpurohit, A. S.
  - Reylé, C.
  - Allard, F.
  - Homeier, D.
  - Bayo, A.
  - Mousis, O.
  - Rajpurohit, S.
  - Fernández-Trincado, J. G.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.1051/0004-6361/201526776
  abstract: 'Context. M-type subdwarfs are metal-poor low-mass stars and are probes for the old populations in our Galaxy.
    Accurate knowledge of their atmospheric parameters and especially their composition is essential for understanding the
    chemical history of our Galaxy. <BR /> Aims: The purpose of this work is to perform a detailed study of M-subdwarf spectra
    covering the full wavelength range from the optical to the near-infrared. It allows us to perform a more detailed analysis
    of the atmospheric composition in order to determine the stellar parameters, and to constrain the atmospheric models.
    The study will allow us to further understand physical and chemical processes such as increasing condensation of gas into
    dust, to point out the missing continuum opacities, and to see how the main band features are reproduced by the models.
    The spectral resolution and the large wavelength coverage used is a unique combination that can constrain the processes
    that occur in a cool atmosphere. <BR /> Methods: We obtained medium-resolution spectra (R = 5000-7000) over the wavelength
    range 0.3-2.5 μm of ten M-type subdwarfs with X-shooter at VLT. These data constitute a unique atlas of M-subdwarfs from
    optical to near-infrared. We performed a spectral synthesis analysis using a full grid of synthetic spectra computed from
    BT-Settl models and obtained consistent stellar parameters such as effective temperature, surface gravity, and metallicity.
    <BR /> Results: We show that state-of the-art atmospheric models correctly represent the overall shape of their spectral
    energy distribution, as well as atomic and molecular line profiles both in the optical and near-infrared. We find that
    the actual fitted gravities of almost all our sample are consistent with old objects, except for LHS 73 where it is found
    to be surprisingly low. <P />Based on observations made with the ESO Very Large Telescope at the Paranal Observatory under
    programme 092.D-0600(A).'
