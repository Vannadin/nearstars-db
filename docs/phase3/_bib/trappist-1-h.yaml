  arxiv_id: '1307.4080'
  ads_bibcode: 2013ApJ...773L..15R
  title: 'The Roche Limit for Close-orbiting Planets: Minimum Density, Composition Constraints, and Application to the 4.2
    hr Planet KOI 1843.03'
  authors:
  - Rappaport, Saul
  - Sanchis-Ojeda, Roberto
  - Rogers, Leslie A.
  - Levine, Alan
  - Winn, Joshua N.
  year: '2013'
  pubdate: '2013-08-00'
  doi: 10.1088/2041-8205/773/1/L15
  abstract: The requirement that a planet must orbit outside of its Roche limit gives a lower limit on the planet's mean density.
    The minimum density depends almost entirely on the orbital period and is immune to systematic errors in the stellar properties.
    We consider the implications of this density constraint for the newly identified class of small planets with periods shorter
    than half a day. When the planet's radius is accurately known, this lower limit to the density can be used to restrict
    the possible combinations of iron and rock within the planet. Applied to KOI 1843.03, a 0.6 R <SUB>⊕</SUB> planet with
    the shortest known orbital period of 4.245 hr, the planet's mean density must be &gt;~ 7 g cm<SUP>-3</SUP>. By modeling
    the planetary interior subject to this constraint, we find that the composition of the planet must be mostly iron, with
    at most a modest fraction of silicates (lsim 30% by mass).
