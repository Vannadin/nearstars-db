  arxiv_id: '2404.01264'
  ads_bibcode: 2024AJ....168...77W
  title: 'JWST COMPASS: A NIRSpec/G395H Transmission Spectrum of the Sub-Neptune TOI-836c'
  authors:
  - Wallack, Nicole L.
  - Batalha, Natasha E.
  - Alderson, Lili
  - Scarsdale, Nicholas
  - Adams Redai, Jea I.
  - Aguichine, Artyom
  - Alam, Munazza K.
