  year: '2014'
  pubdate: '2014-05-00'
  doi: 10.1051/0004-6361/201323208
  abstract: 'Context. Extrasolar-planet searches that target very low-mass stars and brown dwarfs are hampered by intrinsic
    or instrumental limitations. Time series of astrometric measurements with precisions better than one milli-arcsecond can
    yield new evidence on the planet occurrence around these objects. <BR /> Aims: We present first results of an astrometric
    search for planets around 20 nearby dwarf stars with spectral types M8-L2. <BR /> Methods: Over a time-span of two years,
    we obtained I-band images of the target fields with the FORS2 camera at the Very Large Telescope. Using background stars
    as references, we monitored the targets'' astrometric trajectories, which allowed us to measure parallax and proper motions,
    set limits on the presence of planets, and to discover the orbital motions of two binary systems. <BR /> Results: We determined
    trigonometric parallaxes with an average accuracy of 0.09 mas (≃0.2%), which resulted in a reference sample for the study
    of ultracool dwarfs at the M/L transition, whose members are located at distances of 9.5-40 pc. This sample contains two
    newly discovered tight binaries (DE0630-18 and DE0823-49) and one previously known wide binary (DE1520-44). Only one target
    shows I-band variability &gt;5 mmag rms. We derived planet exclusion limits that set an upper limit of 9% on the occurrence
    of giant planets with masses ≳5 M<SUB>J</SUB> in intermediate-separation (0.01-0.8 AU) orbits around M8-L2 dwarfs. <BR
    /> Conclusions: We demonstrate that astrometric observations with an accuracy of 120 μas over two years are feasible from
    the ground and can be used for a planet-search survey. The detection of two tight very low-mass binaries shows that our
    search strategy is efficient and may lead to the detection of planetary-mass companions through follow-up observations.
    <P />Based on observations made with ESO telescopes at the La Silla Paranal Observatory under programme IDs 086.C-0680,
    087.C-0567, 088.C-0679, and 089.C-0397.Figures 5-7 and Appendices are available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201323208/olm">http://www.aanda.org</A>'
