  doi: 10.3847/1538-4357/aa4f6c
  abstract: GJ 1214b is the most studied sub-Neptune exoplanet to date. Recent measurements have shown its near-infrared transmission
    spectrum to be flat, pointing to a high-altitude opacity source in the exoplanet's atmosphere, either equilibrium condensate
    clouds or photochemical hazes. Many photometric observations have been reported in the optical by different groups, though
    simultaneous measurements spanning the entire optical regime are lacking. We present an optical transmission spectrum
    (4500-9260 Å) of GJ 1214b in 14 bins, measured with Magellan/IMACS repeatedly over three transits. We measure a mean planet-to-star
    radius ratio of {R}<SUB>p</SUB>/{R}<SUB>s</SUB>=0.1146+/- 2× {10}<SUP>-4</SUP> and mean uncertainty of σ ({R}<SUB>p</SUB>/{R}<SUB>s</SUB>)=8.7×
    {10}<SUP>-4</SUP> in the spectral bins. The optical transit depths are shallower on average than observed in the near-infrared.
    We present a model for jointly incorporating the effects of a composite photosphere and atmospheric transmission through
    the exoplanet's limb (the CPAT model), and use it to examine the cases of absorber and temperature heterogeneities in
    the stellar photosphere. We find the optical and near-infrared measurements are best explained by the combination of (1)
    photochemical haze in the exoplanetary atmosphere with a mode particle size r = 0.1 μm and haze-forming efficiency {f}<SUB>{haze</SUB>}=10
    % and (2) faculae in the unocculted stellar disk with a temperature contrast {{∆ }}T={354}<SUB>-46</SUB><SUP>+46</SUP>
    K, assuming 3.2% surface coverage. The CPAT model can be used to assess potential contributions of heterogeneous stellar
    photospheres to observations of exoplanet transmission spectra, which will be important for searches for spectral features
    in the optical.
