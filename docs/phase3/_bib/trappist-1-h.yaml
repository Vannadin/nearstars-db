  doi: 10.1038/nature01448
  abstract: The planet in the system HD209458 is the first one for which repeated transits across the stellar disk have been
    observed. Together with radial velocity measurements, this has led to a determination of the planet's radius and mass,
    confirming it to be a gas giant. But despite numerous searches for an atmospheric signature, only the dense lower atmosphere
    of HD209458b has been observed, through the detection of neutral sodium absorption. Here we report the detection of atomic
    hydrogen absorption in the stellar Lyman α line during three transits of HD209458b. An absorption of 15 +/- 4% (1σ) is
    observed. Comparison with models shows that this absorption should take place beyond the Roche limit and therefore can
    be understood in terms of escaping hydrogen atoms.
