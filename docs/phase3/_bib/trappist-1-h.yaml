  title: Origin and Evolution of Volatile-rich Asteroids
  authors:
  - Castillo-Rogez, Julie
  - Young, Edward D.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1017/9781316339794.005
  abstract: Volatile-rich asteroids represent the largest population, about 42% (DeMeo and Carry, 2014), of objects found
    between 2 and 3.5 AU. They encompass asteroids from the C complex that are believed to host the parents of most carbonaceous
    chondrites based on spectroscopic analogies (Hiroi, 1996; Takir et al., 2015), as well as the large icy asteroids found
    in the outer main belt. The P- and D-type asteroids also found in that region are believed to contain a significant fraction
    of ices based on their presumed origin from the Kuiper belt (Levison et al., 2009), although no water signatures (ice,
    hydroxyl, or hydration features) have been detected for these objects. The lack of observational constraints on the physical
    and chemical properties of these objects makes it difficult to speculate on their internal evolution and they will not
    be considered further in this chapter.
