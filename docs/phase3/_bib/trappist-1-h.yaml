  doi: 10.1029/2018GC007630
  abstract: The concentration of carbon in primary mid-ocean ridge basalts (MORBs), and the associated fluxes of CO<SUB>2</SUB>
    outgassed at ocean ridges, is examined through new data obtained by secondary ion mass spectrometry (SIMS) on 753 globally
    distributed MORB glasses. MORB glasses are typically 80-90% degassed of CO<SUB>2</SUB>. We thus use the limited range
    in CO<SUB>2</SUB>/Ba (81.3 ± 23) and CO<SUB>2</SUB>/Rb (991 ± 129), derived from undegassed MORB and MORB melt inclusions,
    to estimate primary CO<SUB>2</SUB> concentrations for ridges that have Ba and/or Rb data. When combined with quality-controlled
    volatile-element data from the literature (n = 2,446), these data constrain a range of primary CO<SUB>2</SUB> abundances
    that vary from 104 ppm to 1.90 wt%. Segment-scale data reveal a range in MORB magma flux varying by a factor of 440 (from
    6.8 × 10<SUP>5</SUP> to 3.0 × 10<SUP>8</SUP> m<SUP>3</SUP>/year) and an integrated global MORB magma flux of 16.5 ± 1.6
    km<SUP>3</SUP>/year. When combined with CO<SUB>2</SUB>/Ba and CO<SUB>2</SUB>/Rb-derived primary magma CO<SUB>2</SUB> abundances,
    the calculated segment-scale CO<SUB>2</SUB> fluxes vary by more than 3 orders of magnitude (3.3 × 10<SUP>7</SUP> to 4.0
    × 10<SUP>10</SUP> mol/year) and sum to an integrated global MORB CO<SUB>2</SUB> flux of 1.320.85+0.77 × 10<SUP>12</SUP>
    mol/year. Variations in ridge CO<SUB>2</SUB> fluxes have a muted effect on global climate; however, because the vast majority
    of CO<SUB>2</SUB> degassed at ridges is dissolved into seawater and enters the marine bicarbonate cycle. MORB degassing
    would thus only contribute to long-term variations in climate via degassing directly into the atmosphere in shallow-water
    areas or where the ridge system is exposed above sea level.
