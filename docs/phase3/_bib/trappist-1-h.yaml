  arxiv_id: '1401.1240'
  ads_bibcode: 2014AJ....147..119C
  title: Contamination in the Kepler Field. Identification of 685 KOIs as False Positives via Ephemeris Matching Based on
    Q1-Q12 Data
  authors:
  - Coughlin, Jeffrey L.
  - Thompson, Susan E.
  - Bryson, Stephen T.
  - Burke, Christopher J.
  - Caldwell, Douglas A.
  - Christiansen, Jessie L.
  - Haas, Michael R.
  - Howell, Steve B.
  - Jenkins, Jon M.
  - Kolodziejczak, Jeffery J.
  - Mullally, Fergal R.
  - Rowe, Jason F.
  year: '2014'
  pubdate: '2014-05-00'
  doi: 10.1088/0004-6256/147/5/119
  abstract: The Kepler mission has to date found almost 6000 planetary transit-like signals, utilizing three years of data
    for over 170,000 stars at extremely high photometric precision. Due to its design, contamination from eclipsing binaries,
    variable stars, and other transiting planets results in a significant number of these signals being false positives (FPs).
    This directly affects the determination of the occurrence rate of Earth-like planets in our Galaxy, as well as other planet
    population statistics. In order to detect as many of these FPs as possible, we perform ephemeris matching among all transiting
    planet, eclipsing binary, and variable star sources. We find that 685 Kepler Objects of Interest (KOIs)—12% of all those
    analyzed—are FPs as a result of contamination, due to 409 unique parent sources. Of these, 118 have not previously been
    identified by other methods. We estimate that ~35% of KOIs are FPs due to contamination, when performing a first-order
    correction for observational bias. Comparing single-planet candidate KOIs to multi-planet candidate KOIs, we find an observed
    FP fraction due to contamination of 16% and 2.4% respectively, bolstering the existing evidence that multi-planet KOIs
    are significantly less likely to be FPs. We also analyze the parameter distributions of the ephemeris matches and derive
    a simple model for the most common type of contamination in the Kepler field. We find that the ephemeris matching technique
    is able to identify low signal-to-noise FPs that are difficult to identify with other vetting techniques. We expect FP
    KOIs to become more frequent when analyzing more quarters of Kepler data, and note that many of them will not be able
    to be identified based on Kepler data alone.
