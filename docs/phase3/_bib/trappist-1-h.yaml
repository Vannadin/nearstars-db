  arxiv_id: '2105.01102'
  ads_bibcode: 2021ApJ...914...84A
  title: Mass-Radius Relationships for Irradiated Ocean Planets
  authors:
  - Aguichine, Artyom
  - Mousis, Olivier
  - Deleuil, Magali
  - Marcq, Emmanuel
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.3847/1538-4357/abfa99
  abstract: Massive and water-rich planets should be ubiquitous in the universe. Many of these worlds are expected to be subject
    to important irradiation from their host star, and display supercritical water layers surrounded by extended steam atmospheres.
    Irradiated ocean planets with such inflated hydrospheres have been recently shown to be good candidates for matching the
    mass-radius distribution of sub-Neptunes. Here we describe a model that computes a realistic structure for water-rich
    planets by combining an interior model with an updated equation of state (EOS) for water, and an atmospheric model that
    takes into account radiative transfer. We find that the use of inappropriate EOSs can lead to the overestimation of the
    planetary radius by up to ~10%, depending on the planet size and composition. Our model has been applied to the GJ 9827
    system as a test case and indicates Earth- or Venus-like interiors for planets b and c, respectively. Planet d could be
    an irradiated ocean planet with a water mass fraction (WMF) of ~20% ± 10%. We also provide fits for the mass-radius relationships,
    allowing one to directly retrieve a wide range of planetary compositions, without the requirement to run the model. Our
    calculations finally suggest that highly irradiated planets lost their H/He content through atmospheric loss processes,
    and that the leftover material led to either super-Earths or sub-Neptunes, depending on the WMF.
