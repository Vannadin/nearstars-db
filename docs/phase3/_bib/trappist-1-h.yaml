- &id1104
  arxiv_id: '2404.02604'
  ads_bibcode: 2024Icar..41516080G
  title: NLTE modelling of water-rich exoplanet atmospheres. Cooling and heating rates
  authors:
  - García Muñoz, A.
  - Asensio Ramos, A.
  - Faure, A.
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1016/j.icarus.2024.116080
  abstract: 'The hydrogen and water molecules respond very differently to the collisional-radiative processes taking place
    in planetary atmospheres. Naturally, the question arises whether H<mml:math altimg="si193.svg" display="inline" id="d1e4766"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O-rich
    atmospheres are more (or less) resilient to long-term mass loss than H<mml:math altimg="si193.svg" display="inline" id="d1e4774"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>-dominated
    ones if they radiate away the incident stellar energy more (or less) efficiently. If confirmed, the finding would have
    implications on our understanding of the evolution of sub-Neptune exoplanets. As a key step towards answering this question,
    we present a non-local thermodynamic equilibrium (NLTE) model of H<mml:math altimg="si193.svg" display="inline" id="d1e4782"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O
    for the atmospheric region where the gas accelerates to escape the planet and conditions relevant to close-in sub-Neptunes.
    Our exploratory calculations for isothermal gas composed of H<mml:math altimg="si193.svg" display="inline" id="d1e4791"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>,
    H<mml:math altimg="si193.svg" display="inline" id="d1e4799"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O
    and e<mml:math altimg="si280.svg" display="inline" id="d1e4807"><mml:msup><mml:mrow></mml:mrow><mml:mrow><mml:mo>−</mml:mo></mml:mrow></mml:msup></mml:math>
    reveal that: (<mml:math altimg="si7.svg" display="inline" id="d1e4816"><mml:mn>1</mml:mn></mml:math>) In the pressure
    region <mml:math altimg="si8.svg" display="inline" id="d1e4822"><mml:mo>∼</mml:mo></mml:math>10<SUP>−2</SUP>─10<SUP>−4</SUP>
    dyn cm<SUP>−2</SUP> where the stellar extreme-ultraviolet (XUV) photons are typically deposited in the atmosphere, H<mml:math
    altimg="si193.svg" display="inline" id="d1e4836"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O
    is in rotational LTE but vibrational NLTE. Vibrational LTE is facilitated by high H<mml:math altimg="si193.svg" display="inline"
    id="d1e4845"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O abundances
    and fractional ionizations, and we report critical densities for the LTE-NLTE transition; (<mml:math altimg="si11.svg"
    display="inline" id="d1e4854"><mml:mn>2</mml:mn></mml:math>) Vibrational cooling may locally dominate over rotational
    cooling, partly because of the comparatively small opacities of ro-vibrational lines; (<mml:math altimg="si12.svg" display="inline"
    id="d1e4860"><mml:mn>3</mml:mn></mml:math>) Even low H<mml:math altimg="si193.svg" display="inline" id="d1e4866"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O
    abundances notably enhance the cooling, foreseeably offsetting some of the stellar heating; (<mml:math altimg="si14.svg"
    display="inline" id="d1e4875"><mml:mn>4</mml:mn></mml:math>) Heating due to the deposition of stellar infrared (IR) photons
    is significant at pressures <mml:math altimg="si15.svg" display="inline" id="d1e4880"><mml:mo>≳</mml:mo></mml:math>0.1
    dyn cm<SUP>−2</SUP>. We estimate the contribution of H<mml:math altimg="si193.svg" display="inline" id="d1e4889"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O
    excitation to the internal energy of the gas and speculate on the photodissociation from the excited vibrational states.
    Ultimately, our findings motivate the consideration of NLTE in the mass loss rate calculations of H<mml:math altimg="si193.svg"
    display="inline" id="d1e4897"><mml:msub><mml:mrow></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msub></mml:math>O-rich
    atmospheres.'
