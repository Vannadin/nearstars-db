- &id564
  arxiv_id: '2505.03927'
  ads_bibcode: 2025AJ....170...12P
  title: Using Anomaly Detection to Search for Technosignatures in Breakthrough Listen Observations
  authors:
  - Pardo, Snir
  - Poznanski, Dovi
  - Croft, Steve
  - Siemion, Andrew P. V.
  - Lebofsky, Matthew
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.3847/1538-3881/add52b
  abstract: We implement a machine learning algorithm to search for extraterrestrial technosignatures in radio observations
    of several hundred nearby stars, obtained with the Parkes and Green Bank Telescopes by the Breakthrough Listen collaboration.
    Advances in detection technology have led to an exponential growth in data, necessitating innovative and efficient analysis
    methods. This problem is exacerbated by the large variety of possible forms an extraterrestrial signal might take, and
    the size of the multidimensional parameter space that must be searched. It is then made markedly worse by the fact that
    our best guess at the properties of such a signal is that it might resemble the signals emitted by human technology and
    communications, the main (yet diverse) contaminant in radio observations. We address this challenge by using a combination
    of simulations and machine learning methods for anomaly detection. We rank candidates by how unusual they are in frequency,
    and how persistent they are in time, by measuring the similarity between consecutive spectrograms of the same star. We
    validate that our filters significantly improve the quality of the candidates that are selected for human vetting when
    compared to a random selection. Of the ∼10<SUP>11</SUP> spectrograms that we analyzed, we visually inspected thousands
    of the most promising spectrograms, and thousands more for validation, about 20,000 in total, and report that no candidate
    survived basic scrutiny.
