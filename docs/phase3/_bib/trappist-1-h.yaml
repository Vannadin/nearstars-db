  arxiv_id: '1109.4682'
  ads_bibcode: 2012ApJ...745...20T
  title: Terrestrial, Habitable-zone Exoplanet Frequency from Kepler
  authors:
  - Traub, Wesley A.
  year: '2012'
  pubdate: '2012-01-00'
  doi: 10.1088/0004-637X/745/1/20
  abstract: 'Data from Kepler''s first 136 days of operation are analyzed to determine the distribution of exoplanets with
    respect to radius, period, and host-star spectral type. The analysis is extrapolated to estimate the percentage of terrestrial,
    habitable-zone (HZ) exoplanets. The Kepler census is assumed to be complete for bright stars (magnitude &lt;14.0) having
    transiting planets &gt;0.5 Earth radius and periods &lt;42 days. It is also assumed that the size distribution of planets
    is independent of orbital period and that there are no hidden biases in the data. Six significant statistical results
    are found: there is a paucity of small planet detections around faint target stars, probably an instrumental effect; the
    frequency of mid-size planet detections is independent of whether the host star is bright or faint; there are significantly
    fewer planets detected with periods &lt;3 days, compared to longer periods, almost certainly an astrophysical effect;
    the frequency of all planets in the population with periods &lt;42 days is 29%, broken down as terrestrials 9%, ice giants
    18%, and gas giants 3%; the population has a planet frequency with respect to period which follows a power-law relation
    dN/dP ~ P <SUP>β - 1</SUP>, with β ~= 0.71 ± 0.08; and an extrapolation to longer periods gives the frequency of terrestrial
    planets in the HZs of FGK stars as η<SUB>⊕</SUB> ~= (34 ± 14)%. Thus about one-third of FGK stars are predicted to have
    at least one terrestrial, HZ planet.'
