  arxiv_id: '1210.5136'
  ads_bibcode: 2013ApJ...765..132C
  title: The Quasiperiodic Automated Transit Search Algorithm
  authors:
  - Carter, Joshua A.
  - Agol, Eric
  year: '2013'
  pubdate: '2013-03-00'
  doi: 10.1088/0004-637X/765/2/132
  abstract: We present a new algorithm for detecting transiting extrasolar planets in time-series photometry. The Quasiperiodic
    Automated Transit Search (QATS) algorithm relaxes the usual assumption of strictly periodic transits by permitting a variable,
    but bounded, interval between successive transits. We show that this method is capable of detecting transiting planets
    with significant transit timing variations without any loss of significance—"smearing"—as would be incurred with traditional
    algorithms; however, this is at the cost of a slightly increased stochastic background. The approximate times of transit
    are standard products of the QATS search. Despite the increased flexibility, we show that QATS has a run-time complexity
    that is comparable to traditional search codes and is comparably easy to implement. QATS is applicable to data having
    a nearly uninterrupted, uniform cadence and is therefore well suited to the modern class of space-based transit searches
    (e.g., Kepler, CoRoT). Applications of QATS include transiting planets in dynamically active multi-planet systems and
    transiting planets in stellar binary systems.
  source: citation_of=2019A&A...623A..39H
