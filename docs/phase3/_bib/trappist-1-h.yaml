- &id1196
  arxiv_id: null
  ads_bibcode: 2015A&A...582A..26G
  title: The abundance of <SUP>26</SUP>Al-rich planetary systems in the Galaxy
  authors:
  - Gounelle, Matthieu
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1051/0004-6361/201526174
  abstract: One of the most puzzling properties of the solar system is the high abundance at its birth of <SUP>26</SUP>Al,
    a short-lived radionuclide with a mean life of 1 Myr. Now decayed, it has left its imprint in primitive meteoritic solids.
    The origin of <SUP>26</SUP>Al in the early solar system has been debated for decades and strongly constrains the astrophysical
    context of the Sun and planets formation. We show that, according to the present understanding of star-formation mechanisms,
    it is very unlikely that a nearby supernova has delivered <SUP>26</SUP>Al into the nascent solar system. A more promising
    model is the one whereby the Sun formed in a wind-enriched, <SUP>26</SUP>Al-rich dense shell surrounding a massive star
    (M &gt; 32 M<SUB>☉</SUB>). We calculate that the probability of any given star in the Galaxy being born in such a setting,
    corresponding to a well-known mode of star formation, is of the order of 1%. It means that our solar system, though not
    the rule, is relatively common and that many exo-planetary systems in the Galaxy might exhibit comparable enrichments
    in <SUP>26</SUP>Al. Such enrichments played an important role in the early evolution of planets because <SUP>26</SUP>Al
    is the main heat source for planetary embryos.
  source: citation_of=2019NatAs...3..307L
