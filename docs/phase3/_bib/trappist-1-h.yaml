  doi: 10.1088/1538-3873/ac6e06
  abstract: This article presents the history of the Visual Survey Group (VSG)-a Professional-Amateur (Pro-Am) collaboration
    within the field of astronomy working on data from several space missions (Kepler, K2 and Transiting Exoplanet Survey
    Satellite). This paper covers the formation of the VSG, its survey-methods including the most common tools used and its
    discoveries made over the past decade. So far, the group has visually surveyed nearly 10 million light curves and authored
    69 peer-reviewed papers which mainly focus on exoplanets and discoveries involving multistellar systems. The preferred
    manual search-method carried out by the VSG has revealed its strength by detecting numerous objects which were overlooked
    or discarded by automated search programs, uncovering some of the most rare stars in our galaxy, and leading to several
    serendipitous discoveries of unprecedented astrophysical phenomena. The main purpose of the VSG is to assist in the exploration
    of our local universe, and we therefore advocate continued crowd-sourced examination of time-domain data sets, and invite
    other research teams to reach out in order to establish collaborating projects.
