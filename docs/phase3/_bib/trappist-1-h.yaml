  pubdate: '2025-10-00'
  doi: 10.3847/1538-3881/adfc51
  abstract: It is an open question whether small planets around M dwarfs are able to maintain atmospheres. The Hot Rocks Survey
    aims to address this question by observing nine rocky exoplanets orbiting M dwarfs with MIRI emission photometry to constrain
    the onset of atmospheres. In this paper, we present two MIRI F1500W (15 μm) eclipses of LTT 3780 b, an ultrashort-period
    super-Earth (P = 0.768 days, R = 1.325 R<SUB>⊕</SUB>, M = 2.46 M<SUB>⊕</SUB>) that receives 111× Earth's instellation,
    the highest in the survey. We find a combined eclipse depth of 312 ± 38 ppm, which is consistent between different data
    reduction and analysis assumptions, bolstering our confidence in the eclipse detection. This eclipse depth is consistent
    with the thermal emission from a bare rock surface, with a dayside temperature of <inline-formula> <mml:math><mml:msub><mml:mi>T</mml:mi><mml:mi>day</mml:mi></mml:msub><mml:mo>=</mml:mo><mml:mn>114</mml:mn><mml:msubsup><mml:mn>3</mml:mn><mml:mrow><mml:mo>−</mml:mo><mml:mn>99</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>104</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> K, 98% ± 9% of the maximum temperature predicted for a zero-albedo, zero heat redistribution blackbody.
    We are able to confidently rule out CO<SUB>2</SUB>-based atmospheres down to a 0.01 bar surface pressure to greater than
    3σ (ruling out an approximately Mars-like atmosphere). We are unable to rule out a pure H<SUB>2</SUB>O 1 bar atmosphere,
    though we argue that this composition is unlikely on such a highly irradiated planet, nor O<SUB>2</SUB> atmospheres due
    to the lack of features in the bandpass, though we can put constraints on CO<SUB>2</SUB>-mixture atmospheres. As a potential
    bare rock, we consider a variety of surface composition models, but are unable to distinguish between them. However, LTT
    3780 b is an excellent target for follow-up JWST observations to determine its surface composition and rule out additional
    atmospheric compositions.
