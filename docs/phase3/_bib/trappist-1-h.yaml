  - Smith, A. M. S.
  - Triaud, A. H. M. J.
  - Turner, O. D.
  - Udry, S.
  - West, R. G.
  year: '2017'
  pubdate: '2017-08-00'
  doi: 10.1051/0004-6361/201730439
  abstract: 'We report the discoveries of three transiting exoplanets. WASP-91b is a warm Jupiter (1.34 M<SUB>Jup</SUB>, 1.03
    R<SUB>Jup</SUB>) in a 2.8-day orbit around a metal-rich K3 star. WASP-105b is a warm Jupiter (1.8 M<SUB>Jup</SUB>, 0.96
    R<SUB>Jup</SUB>) in a 7.9-day orbit around a metal-rich K2 star. WASP-107b is a warm super-Neptune/sub-Saturn (0.12 M<SUB>Jup</SUB>,
    0.94 R<SUB>Jup</SUB>) in a 5.7-day orbit around a solar-metallicity K6 star. Considering that giant planets seem to be
    more common around stars of higher metallicity and stars of higher mass, it is notable that the hosts are all metal-rich,
    late-type stars. With orbital separations that place both WASP-105b and WASP-107b in the weak-tide regime, measurements
    of the alignment between the planets'' orbital axes and their stars'' spin axes may help us to understand the inward migration
    of short-period, giant planets. The mass of WASP-107b (2.2 M<SUB>Nep</SUB>, 0.40 M<SUB>Sat</SUB>) places it in the transition
    region between the ice giants and gas giants of the Solar System. Its radius of 0.94 R<SUB>Jup</SUB> suggests that it
    is a low-mass gas giant with a H/He-dominated composition. The planet thus sets a lower limit of 2.2 M<SUB>Nep</SUB> on
    the planetary mass above which large gaseous envelopes can be accreted and retained by proto-planets on their way to becoming
    gas giants. We may discover whether WASP-107b more closely resembles an ice giant or a gas giant by measuring its atmospheric
    metallicity via transmission spectroscopy, for which WASP-107b is a very good target. <P />Based on observations made
    with: the WASP-South photometric survey instrument, the 0.6-m TRAPPIST robotic imager, and the EulerCam camera and the
    CORALIE spectrograph mounted on the 1.2-m Euler-Swiss telescope.The photometric time-series and radial-velocity data used
    in this work are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/604/A110">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/604/A110</A>'
