- &id164
  arxiv_id: '2004.13731'
  ads_bibcode: 2020AJ....160...11L
  title: High-resolution Spectral Discriminants of Ocean Loss for M-dwarf Terrestrial Exoplanets
  authors:
  - Leung, Michaela
  - Meadows, Victoria S.
  - Lustig-Yaeger, Jacob
  year: '2020'
  pubdate: '2020-07-00'
  doi: 10.3847/1538-3881/ab9012
  abstract: In the near future, extremely large ground-based telescopes may conduct some of the first searches for life beyond
    the solar system. High spectral resolution observations of reflected light from nearby exoplanetary atmospheres could
    be used to search for the biosignature oxygen. However, while Earth's abundant O<SUB>2</SUB> is photosynthetic, early
    ocean loss may also produce high atmospheric O<SUB>2</SUB> via water vapor photolysis and subsequent hydrogen escape.
    To explore how to use spectra to discriminate between these two oxygen sources, we generate high-resolution line-by-line
    synthetic spectra of both a habitable Earth-like and post-ocean-loss Proxima Centauri b. We examine the strength and profile
    of four bands of O<SUB>2</SUB> from 0.63 to 1.27 μm, and quantify their relative detectability. We find that 10 bar O<SUB>2</SUB>
    post-ocean-loss atmospheres have strong suppression of oxygen bands, and especially the 1.27 μum band. This suppression
    is due to additional strong, broad O<SUB>2</SUB>-O<SUB>2</SUB> collisionally induced absorption (CIA) generated in these
    more massive O<SUB>2</SUB> atmospheres, which is not present for the smaller amounts of oxygen generated by photosynthesis.
    Consequently, any detection of the 1.27 μm band in reflected light indicates lower Earth-like O<SUB>2</SUB> levels, which
    suggests a likely photosynthetic origin. However, the 0.69 μm O<SUB>2</SUB> band is relatively unaffected by O<SUB>2</SUB>-O<SUB>2</SUB>
    CIA, and the presence of an ocean-loss high-O<SUB>2</SUB> atmosphere could be inferred via detection of a strong 0.69
    μm O<SUB>2</SUB> band, and a weaker or undetected 1.27 μm band. These results provide a strategy for observing and interpreting
    O<SUB>2</SUB> in exoplanet atmospheres, that could be considered by future ground-based telescopes.
