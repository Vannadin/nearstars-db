  doi: 10.1093/mnras/stae1602
  abstract: 'We report results from 8 h of JWST/MIRI low resolution spectroscopic (LRS) monitoring directly followed by 7
    h of JWST/NIRSpec prism spectroscopic monitoring of the benchmark binary brown dwarf WISE 1049AB, the closest, brightest
    brown dwarfs known. We find water, methane, and CO absorption features in both components, including the 3.3 μm methane
    absorption feature and a tentative detection of small grain ($\lt $ 1μm) silicate absorption at $\gt $8.5 μm in WISE 1049A.
    Both components vary significantly ($\gt 1~{{\rm per\ cent}}$), with WISE 1049B displaying larger variations than WISE
    1049A. Using K-means clustering, we find three main transition points in wavelength for both components of the binary:
    (1) change in behaviour at $\sim$2.3 μm coincident with a CO absorption bandhead, (2) change in behaviour at 4.2 μm, close
    to the CO fundamental band at $\lambda \gt $ 4.4 µm, and (3) change in behaviour at 8.3-8.5 µm, potentially corresponding
    to silicate absorption. We interpret the light curves observed with both NIRSpec and MIRI as likely stemming from (1)
    a deep pressure level driving the double-peaked variability seen in WISE 1049B at wavelengths $\lt $2.3 and $\gt $8.5
    µm, (2) an intermediate pressure level shaping the light-curve morphology between 2.3 and 4.2 µm, and (3) a higher altitude
    pressure level producing single-peaked and plateaued light-curve behaviour between 4.2 and 8.5 µm.'
