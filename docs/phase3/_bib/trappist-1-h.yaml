  abstract: We present stellar and planetary properties for 1305 Kepler Objects of Interest hosting 2025 planet candidates
    observed as part of the California-Kepler Survey. We combine spectroscopic constraints, presented in Paper I, with stellar
    interior modeling to estimate stellar masses, radii, and ages. Stellar radii are typically constrained to 11%, compared
    to 40% when only photometric constraints are used. Stellar masses are constrained to 4%, and ages are constrained to 30%.
    We verify the integrity of the stellar parameters through comparisons with asteroseismic studies and Gaia parallaxes.
    We also recompute planetary radii for 2025 planet candidates. Because knowledge of planetary radii is often limited by
    uncertainties in stellar size, we improve the uncertainties in planet radii from typically 42% to 12%. We also leverage
    improved knowledge of stellar effective temperature to recompute incident stellar fluxes for the planets, now precise
    to 21%, compared to a factor of two when derived from photometry. <P />Based on observations obtained at the W. M. Keck
    Observatory, which is operated jointly by the University of California and the California Institute of Technology. Keck
    time has been granted by the University of California, and California Institute of Technology, the University of Hawaii,
