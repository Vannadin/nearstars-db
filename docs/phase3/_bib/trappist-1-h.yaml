  arxiv_id: '1512.02998'
  ads_bibcode: 2016ApJ...817...81L
  title: Transiting the Sun. II. The Impact of Stellar Activity on Lyα Transits
  authors:
  - Llama, J.
  - Shkolnik, E. L.
  year: '2016'
  pubdate: '2016-01-00'
  doi: 10.3847/0004-637X/817/1/81
  abstract: High-energy observations of the Sun provide an opportunity to test the limits of our ability to accurately measure
    the properties of transiting exoplanets in the presence of stellar activity. Here we insert the transit of a hot Jupiter
    into continuous disk integrated data of the Sun in Lyα from NASA’s Solar Dynamics Observatory/EVE instrument to assess
    the impact of stellar activity on the measured planet-to-star radius ratio (R<SUB>p</SUB>/R<SUB>⋆</SUB>). In 75% of our
    simulated light curves, we measure the correct radius ratio; however, incorrect values can be measured if there is significant
    short-term variability in the light curve. The maximum measured value of R<SUB>p</SUB>/R<SUB>⋆</SUB> is 50% larger than
    the input value, which is much smaller than the large Lyα transit depths that have been reported in the literature, suggesting
    that for stars with activity levels comparable to the Sun, stellar activity alone cannot account for these deep transits.
    We ran simulations without a transit and found that stellar activity cannot mimic the Lyα transit of 55 Cancari b, strengthening
    the conclusion that this planet has a partially transiting exopshere. We were able to compare our simulations to more
    active stars by artificially increasing the variability in the Solar Lyα light curve. In the higher variability data,
    the largest value of R<SUB>p</SUB>/R<SUB>⋆</SUB> we measured is &lt;3× the input value, which again is not large enough
    to reproduce the Lyα transit depth reported for the more active stars HD 189733 and GJ 436, supporting the interpretation
    that these planets have extended atmospheres and possible cometary tails.
