  ads_bibcode: 2025ApJ...987L...6T
  title: 'A Disintegrating Rocky World Shrouded in Dust and Gas: Mid-infrared Observations of K2-22 b Using JWST'
  authors:
  - Tusay, Nick
  - Wright, Jason T.
  - Beatty, Thomas G.
  - Desch, Steve
  - Colón, Knicole
  - Mittal, Tushar
  - Osborn, Hugh P.
  - Campos Estrada, Beatriz
  - Owen, James E.
