- &id508
  arxiv_id: '1406.6435'
  ads_bibcode: 2015Icar..247...81S
  title: 'Atmospheric mass loss during planet formation: The importance of planetesimal impacts'
  authors:
  - Schlichting, Hilke E.
  - Sari, Re'em
  - Yalinewich, Almog
  year: '2015'
  pubdate: '2015-02-00'
  doi: 10.1016/j.icarus.2014.09.053
  abstract: 'Quantifying the atmospheric mass loss during planet formation is crucial for understanding the origin and evolution
    of planetary atmospheres. We examine the contributions to atmospheric loss from both giant impacts and planetesimal accretion.
    Giant impacts cause global motion of the ground. Using analytic self-similar solutions and full numerical integrations
    we find (for isothermal atmospheres with adiabatic index γ = 5 / 3) that the local atmospheric mass loss fraction for
    ground velocities v<SUB>g</SUB> ≲ 0.25v<SUB>esc</SUB> is given by χ<SUB>loss</SUB> =<SUP>(1.71v<SUB>g</SUB> /v<SUB>esc</SUB>)
    4.9</SUP> , where v<SUB>esc</SUB> is the escape velocity from the target. Yet, the global atmospheric mass loss is a weaker
    function of the impactor velocity v<SUB>Imp</SUB> and mass m<SUB>Imp</SUB> and given by X<SUB>loss</SUB> ≃ 0.4 x + 1.4x<SUP>2</SUP>
    - 0.8x<SUP>3</SUP> (isothermal atmosphere) and X<SUB>loss</SUB> ≃ 0.4 x + 1.8x<SUP>2</SUP> - 1.2x<SUP>3</SUP> (adiabatic
    atmosphere), where x = (v<SUB>Imp</SUB> m /v<SUB>esc</SUB> M) . Atmospheric mass loss due to planetesimal impacts proceeds
    in two different regimes: (1) large enough impactors m≳√{ 2 }ρ<SUB>0</SUB><SUP>(πhR) 3 / 2</SUP> (25 km for the current
    Earth), are able to eject all the atmosphere above the tangent plane of the impact site, which is h / 2 R of the whole
    atmosphere, where h, R and ρ<SUB>0</SUB> are the atmospheric scale height, radius of the target, and its atmospheric density
    at the ground. (2) Smaller impactors, but above m &gt; 4 πρ<SUB>0</SUB>h<SUP>3</SUP> (1 km for the current Earth) are
    only able to eject a fraction of the atmospheric mass above the tangent plane. We find that the most efficient impactors
    (per unit impactor mass) for atmospheric loss are planetesimals just above that lower limit (2 km for the current Earth).
    For impactor flux size distributions parametrized by a single power law, N (&gt; r) ∝<SUP>r - q + 1</SUP> , with differential
    power law index q, we find that for 1 &lt; q &lt; 3 the atmospheric mass loss proceeds in regime (1) whereas for q &gt;
    3 the mass loss is dominated by regime (2). Impactors with m≲ 4 πρ<SUB>0</SUB>h<SUP>3</SUP> are not able to eject any
    atmosphere. Despite being bombarded by the same planetesimal population, we find that the current differences in Earth''s
    and Venus'' atmospheric masses can be explained by modest differences in their initial atmospheric masses and that the
    current atmosphere of the Earth could have resulted from an equilibrium between atmospheric erosion and volatile delivery
    to the atmosphere from planetesimal impacts. We conclude that planetesimal impacts are likely to have played a major role
    in atmospheric mass loss over the formation history of the terrestrial planets.'
