  arxiv_id: '1705.04697'
  ads_bibcode: 2017ApJ...844..102H
  title: 'Asteroseismology and Gaia: Testing Scaling Relations Using 2200 Kepler  Stars with TGAS Parallaxes'
  authors:
  - Huber, Daniel
  - Zinn, Joel
  - Bojsen-Hansen, Mathias
  - Pinsonneault, Marc
  - Sahlholdt, Christian
  - Serenelli, Aldo
  - Silva Aguirre, Victor
  - Stassun, Keivan
  - Stello, Dennis
  - Tayar, Jamie
  - Bastien, Fabienne
  - Bedding, Timothy R.
