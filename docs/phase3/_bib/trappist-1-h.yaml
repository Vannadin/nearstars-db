  - Piaulet-Ghorayeb, Caroline
  - Benneke, Björn
  - Cloutier, Ryan
  - Charnay, Benjamin
  - Cook, Neil J.
  - Fournier-Tondreau, Marylou
  - Plotnykov, Mykhaylo
  - Valencia, Diana
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.3847/2041-8213/ad5afa
  abstract: LHS 1140 b is the second-closest temperate transiting planet to Earth with an equilibrium temperature low enough
    to support surface liquid water. At 1.730 ± 0.025 R <SUB>⊕</SUB>, LHS 1140 b falls within the radius valley separating
    H<SUB>2</SUB>-rich mini-Neptunes from rocky super-Earths. Recent mass and radius revisions indicate a bulk density significantly
    lower than expected for an Earth-like rocky interior, suggesting that LHS 1140 b could be either a mini-Neptune with a
    small envelope of hydrogen (∼0.1% by mass) or a water world (9%─19% water by mass). Atmospheric characterization through
    transmission spectroscopy can readily discern between these two scenarios. Here we present two JWST/NIRISS transit observations
    of LHS 1140 b, one of which captures a serendipitous transit of LHS 1140 c. The combined transmission spectrum of LHS
    1140 b shows a telltale spectral signature of unocculted faculae (5.8σ), covering ∼20% of the visible stellar surface.
    Besides faculae, our spectral retrieval analysis reveals tentative evidence of residual spectral features, best fit by
    Rayleigh scattering from a N<SUB>2</SUB>-dominated atmosphere (2.3σ), irrespective of the consideration of atmospheric
    hazes. We also show through Global Climate Models (GCMs) that H<SUB>2</SUB>-rich atmospheres of various compositions (100×,
    300×, 1000× solar metallicity) are ruled out to &gt;10σ. The GCM calculations predict that water clouds form below the
    transit photosphere, limiting their impact on transmission data. Our observations suggest that LHS 1140 b is either airless
    or, more likely, surrounded by an atmosphere with a high mean molecular weight. Our tentative evidence of a N<SUB>2</SUB>-rich
    atmosphere provides strong motivation for future transmission spectroscopy observations of LHS 1140 b.
