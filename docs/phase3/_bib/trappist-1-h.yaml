  arxiv_id: '1807.00549'
  ads_bibcode: 2019AJ....157...61V
  title: The Orbital Eccentricity of Small Planet Systems
  authors:
  - Van Eylen, Vincent
  - Albrecht, Simon
  - Huang, Xu
  - MacDonald, Mariah G.
  - Dawson, Rebekah I.
  - Cai, Maxwell X.
  - Foreman-Mackey, Daniel
  - Lundkvist, Mia S.
  - Silva Aguirre, Victor
  - Snellen, Ignas
