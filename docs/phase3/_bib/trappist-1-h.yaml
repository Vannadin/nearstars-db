  pubdate: '2006-11-00'
  doi: 10.2277/0521849691
  abstract: 'Fluid dynamics is fundamental to our understanding of the atmosphere and oceans. Although many of the same principles
    of fluid dynamics apply to both the atmosphere and oceans, textbooks tend to concentrate on the atmosphere, the ocean,
    or the theory of geophysical fluid dynamics (GFD). This textbook provides a comprehensive unified treatment of atmospheric
    and oceanic fluid dynamics. The book introduces the fundamentals of geophysical fluid dynamics, including rotation and
    stratification, vorticity and potential vorticity, and scaling and approximations. It discusses baroclinic and barotropic
    instabilities, wave-mean flow interactions and turbulence, and the general circulation of the atmosphere and ocean. Student
    problems and exercises are included at the end of each chapter. Atmospheric and Oceanic Fluid Dynamics: Fundamentals and
    Large-Scale Circulation will be an invaluable graduate textbook on advanced courses in GFD, meteorology, atmospheric science
    and oceanography, and an excellent review volume for researchers. Additional resources are available at www.cambridge.org/9780521849692.
    Includes end of chapter review questions to aid understanding Unified and comprehensive treatment of both atmospheric
    and oceanic fluid dynamics Covers many modern topics and provides up to date knowledge'
