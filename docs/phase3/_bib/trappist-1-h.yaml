- &id657
  arxiv_id: '2301.04062'
  ads_bibcode: 2023MNRAS.519.4056H
  title: A deep radius valley revealed by Kepler short cadence observations
  authors:
  - Ho, Cynthia S. K.
  - Van Eylen, Vincent
  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.1093/mnras/stac3802
  abstract: The characteristics of the radius valley, i.e. an observed lack of planets between 1.5 and 2 Earth radii at periods
    shorter than about 100 d, provide insights into the formation and evolution of close-in planets. We present a novel view
    of the radius valley by refitting the transits of 431 planets using Kepler 1-min short cadence observations, the vast
    majority of which have not been previously analysed in this way. In some cases, the updated planetary parameters differ
    significantly from previous studies, resulting in a deeper radius valley than previously observed. This suggests that
    planets are likely to have a more homogeneous core composition at formation. Furthermore, using support vector machines,
    we find that the radius valley location strongly depends on orbital period and stellar mass and weakly depends on stellar
    age, with $\partial \log {\left(R_{\rm p, \text{valley}} \right)}/ \partial \log {P} = -0.096_{-0.027}^{+0.023}$, $\partial
    \log {\left(R_{\rm p, \text{valley}} \right)}/ \partial \log {M_{\star }} = 0.231_{-0.064}^{+0.053}$, and $\partial \log
    {\left(R_{\rm p, \text{valley}} \right)}/ \partial \log {\left(\text{age} \right)} = 0.033_{-0.025}^{+0.017}$. These findings
    favour thermally driven mass-loss models such as photoevaporation and core-powered mass-loss, with a slight preference
    for the latter scenario. Finally, this work highlights the value of transit observations with a short photometric cadence
    to precisely determine planet radii, and we provide an updated list of precisely and homogeneously determined parameters
    for the planets in our sample.
