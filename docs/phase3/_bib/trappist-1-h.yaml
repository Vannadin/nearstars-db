- &id285
  arxiv_id: '1904.10458'
  ads_bibcode: 2020ApJ...890..107M
  title: Internal Structure and CO<SUB>2</SUB> Reservoirs of Habitable Water Worlds
  authors:
  - Marounina, Nadejda
  - Rogers, Leslie A.
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.3847/1538-4357/ab68e4
  abstract: 'Water worlds are water-rich (&gt;1 wt% H<SUB>2</SUB>O) exoplanets. The classical models of water worlds considered
    layered structures determined by the phase boundaries of pure water. However, water worlds are likely to possess comet-like
    compositions, with between ∼3 and 30 mol% CO<SUB>2</SUB> relative to water. In this study, we build an interior structure
    model of habitable (I.e., surface liquid ocean-bearing) water worlds using the latest results from experimental data on
    the CO<SUB>2</SUB>-H<SUB>2</SUB>O system to explore the CO<SUB>2</SUB> budget and localize the main CO<SUB>2</SUB> reservoirs
    inside of these planets. We show that CO<SUB>2</SUB> dissolved in the ocean and trapped inside of a clathrate layer cannot
    accommodate a cometary amount of CO<SUB>2</SUB> if the planet accretes more than 11 wt% of volatiles (CO<SUB>2</SUB> +
    H<SUB>2</SUB>O) during its formation. If the atmosphere holds more than a negligible amount of the CO<SUB>2</SUB> (&gt;0.01%
    of the planet mass), the planet will not have a habitable surface temperature. We propose a new, potentially dominant,
    CO<SUB>2</SUB> reservoir for water worlds: CO<SUB>2</SUB> buried inside of the high-pressure water ice mantle as CO<SUB>2</SUB>
    ices or (H<SUB>2</SUB>CO<SUB>3</SUB> × H<SUB>2</SUB>O), the monohydrate of carbonic acid. If insufficient amounts of CO<SUB>2</SUB>
    are sequestered in either this reservoir or the planet''s iron core, habitable-zone water worlds could generically be
    stalled in their cooling before liquid oceans have a chance to condense.'
