  title: JWST NIRISS transmission spectroscopy of the super-Earth GJ 357b, a favourable target for atmospheric retention
  authors:
  - Taylor, Jake
  - Radica, Michael
  - Chatterjee, Richard D.
  - Hammond, Mark
  - Meier, Tobias
  - Aigrain, Suzanne
  - MacDonald, Ryan J.
  - Albert, Loic
  - Benneke, Björn
  - Coulombe, Louis-Philippe
  - Cowan, Nicolas B.
  - Dang, Lisa
