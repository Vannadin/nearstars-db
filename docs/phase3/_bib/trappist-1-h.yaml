- &id993
  arxiv_id: '1508.02411'
  ads_bibcode: 2015ApJ...812L..18B
  title: 'WASP-47: A Hot Jupiter System with Two Additional Planets Discovered by K2'
  authors:
  - Becker, Juliette C.
  - Vanderburg, Andrew
  - Adams, Fred C.
  - Rappaport, Saul A.
  - Schwengeler, Hans Martin
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1088/2041-8205/812/2/L18
  abstract: 'Using new data from the K2 mission, we show that WASP-47, a previously known hot Jupiter host, also hosts two
    additional transiting planets: a Neptune-sized outer planet and a super-Earth inner companion. We measure planetary properties
    from the K2 light curve and detect transit timing variations (TTVs), confirming the planetary nature of the outer planet.
    We performed a large number of numerical simulations to study the dynamical stability of the system and to find the theoretically
    expected TTVs. The theoretically predicted TTVs are in good agreement with those observed, and we use the TTVs to determine
    the masses of two planets, and place a limit on the third. The WASP-47 planetary system is important because companion
    planets can both be inferred by TTVs and are also detected directly through transit observations. The depth of the hot
    Jupiter''s transits make ground-based TTV measurements possible, and the brightness of the host star makes it amenable
    for precise radial velocity measurements. The system serves as a Rosetta Stone for understanding TTVs as a planet detection
    technique.'
