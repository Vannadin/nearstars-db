  arxiv_id: '2407.12079'
  ads_bibcode: 2024ApJ...970L..28N
  title: New Insights into the Internal Structure of GJ 1214 b Informed by JWST
  authors:
  - Nixon, Matthew C.
  - Piette, Anjali A. A.
  - Kempton, Eliza M.-R.
  - Gao, Peter
  - Bean, Jacob L.
  - Steinrueck, Maria E.
  - Mahajan, Alexandra S.
  - Eastman, Jason D.
