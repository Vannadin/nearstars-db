  abstract: K2-2 b/HIP 116454 b, the first exoplanet discovery by K2 during its Two-Wheeled Concept Engineering Test, is a
    sub-Neptune (2.5 ± 0.1 R <SUB>⊕</SUB>, 9.7 ± 1.2 M <SUB>⊕</SUB>) orbiting a relatively bright (K <SUB> S </SUB> = 8.03)
    K-dwarf star on a 9.1 day period. Unfortunately, due to a spurious follow-up transit detection and ephemeris degradation,
    the transit ephemeris for this planet was lost. In this work, we recover and refine the transit ephemeris for K2-2 b,
    showing a ∼40σ discrepancy from the discovery results. To accurately measure the transit ephemeris and update the parameters
    of the system, we jointly fit space-based photometric observations from NASA's K2, Transiting Exoplanet Survey Satellite,
    and Spitzer missions with new photometric observations from the ground, as well as radial velocities from HARPS-N that
    are corrected for stellar activity using a new modeling technique. Ephemerides becoming lost or significantly degraded,
    as is the case for most transiting planets, highlights the importance of systematically updating transit ephemerides with
    upcoming large efforts expected to characterize hundreds of exoplanet atmospheres. K2-2 b sits at the high-mass peak of
    the known radius valley for sub-Neptunes, and is now well-suited for transmission spectroscopy with current and future
    facilities. Our updated transit ephemeris will ensure no more than a 13 minute uncertainty through 2030.
