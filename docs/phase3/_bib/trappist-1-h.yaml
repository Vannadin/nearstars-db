  arxiv_id: '1703.03634'
  ads_bibcode: 2017MNRAS.470.1750I
  title: 'Breaking the chains: hot super-Earth systems from migration and disruption of compact resonant chains'
  authors:
  - Izidoro, Andre
  - Ogihara, Masahiro
  - Raymond, Sean N.
  - Morbidelli, Alessandro
  - Pierens, Arnaud
  - Bitsch, Bertram
  - Cossou, Christophe
  - Hersant, Franck
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.1093/mnras/stx1232
  abstract: '''Hot super-Earths'' (or ''mini-Neptunes'') between one and four times Earth''s size with period shorter than
    100 d orbit 30-50 per cent of Sun-like stars. Their orbital configuration - measured as the period ratio distribution
    of adjacent planets in multiplanet systems - is a strong constraint for formation models. Here, we use N-body simulations
    with synthetic forces from an underlying evolving gaseous disc to model the formation and long-term dynamical evolution
    of super-Earth systems. While the gas disc is present, planetary embryos grow and migrate inward to form a resonant chain
    anchored at the inner edge of the disc. These resonant chains are far more compact than the observed super-Earth systems.
    Once the gas dissipates, resonant chains may become dynamically unstable. They undergo a phase of giant impacts that spreads
    the systems out. Disc turbulence has no measurable effect on the outcome. Our simulations match observations if a small
    fraction of resonant chains remain stable, while most super-Earths undergo a late dynamical instability. Our statistical
    analysis restricts the contribution of stable systems to less than 25 per cent. Our results also suggest that the large
    fraction of observed single-planet systems does not necessarily imply any dichotomy in the architecture of planetary systems.
    Finally, we use the low abundance of resonances in Kepler data to argue that, in reality, the survival of resonant chains
    happens likely only in ∼5 per cent of the cases. This leads to a mystery: in our simulations only 50-60 per cent of resonant
    chains became unstable, whereas at least 75 per cent (and probably 90-95 per cent) must be unstable to match observations.'
