- &id310
  arxiv_id: '1610.04515'
  ads_bibcode: 2016AsBio..16..873A
  title: 'The Pale Orange Dot: The Spectrum and Habitability of Hazy Archean Earth'
  authors:
  - Arney, Giada
  - Domagal-Goldman, Shawn D.
  - Meadows, Victoria S.
  - Wolf, Eric T.
  - Schwieterman, Edward
  - Charnay, Benjamin
  - Claire, Mark
  - Hébrard, Eric
  - Trainer, Melissa G.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.1089/ast.2015.1422
  abstract: Recognizing whether a planet can support life is a primary goal of future exoplanet spectral characterization
    missions, but past research on habitability assessment has largely ignored the vastly different conditions that have existed
    in our planet's long habitable history. This study presents simulations of a habitable yet dramatically different phase
    of Earth's history, when the atmosphere contained a Titan-like, organic-rich haze. Prior work has claimed a haze-rich
    Archean Earth (3.8-2.5 billion years ago) would be frozen due to the haze's cooling effects. However, no previous studies
    have self-consistently taken into account climate, photochemistry, and fractal hazes. Here, we demonstrate using coupled
    climate-photochemical-microphysical simulations that hazes can cool the planet's surface by about 20 K, but habitable
    conditions with liquid surface water could be maintained with a relatively thick haze layer (τ ∼ 5 at 200 nm) even with
    the fainter young Sun. We find that optically thicker hazes are self-limiting due to their self-shielding properties,
    preventing catastrophic cooling of the planet. Hazes may even enhance planetary habitability through UV shielding, reducing
    surface UV flux by about 97% compared to a haze-free planet and potentially allowing survival of land-based organisms
    2.7-2.6 billion years ago. The broad UV absorption signature produced by this haze may be visible across interstellar
    distances, allowing characterization of similar hazy exoplanets. The haze in Archean Earth's atmosphere was strongly dependent
    on biologically produced methane, and we propose that hydrocarbon haze may be a novel type of spectral biosignature on
    planets with substantial levels of CO<SUB>2</SUB>. Hazy Archean Earth is the most alien world for which we have geochemical
    constraints on environmental conditions, providing a useful analogue for similar habitable, anoxic exoplanets.
  source: citation_of=2018ApJ...867...76L
