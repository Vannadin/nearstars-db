  abstract: 'We report the discovery of two planetary systems around comoving stars: TOI-2076 (TIC 27491137) and TOI-1807
    (TIC 180695581). TOI-2076 is a nearby (41.9 pc) multiplanetary system orbiting a young (204 ± 50 Myr), bright (K = 7.115
    in TIC v8.1) start. TOI-1807 hosts a single transiting planet and is similarly nearby (42.58 pc), similarly young (180
    ± 40 Myr ), and bright. Both targets exhibit significant, periodic variability due to starspots, characteristic of their
    young ages. Using photometric data collected by TESS we identify three transiting planets around TOI-2076 with radii of
    R<SUB>b</SUB> = 3.3 ± 0.04 R<SUB>⊕</SUB>, R<SUB>c</SUB> = 4.4 ± 0.05 R<SUB>⊕</SUB>, and R<SUB>d</SUB> = 4.1 ± 0.07 R<SUB>⊕</SUB>.
    Planet TOI-2076b has a period of P<SUB>b</SUB> = 10.356 days. For both TOI-2076c and d, TESS observed only two transits,
    separated by a 2 yr interval in which no data were collected, preventing a unique period determination. A range of long
    periods (&lt;17 days) are consistent with the data. We identify a short-period planet around TOI-1807 with a radius of
    R<SUB>b</SUB> = 1.8 ± 0.04 R<SUB>⊕</SUB> and a period of P<SUB>b</SUB> = 0.549 days. Their close proximity, and bright,
    cool host stars, and young ages make these planets excellent candidates for follow up. TOI-1807b is one of the best-known
    small (R &lt; 2 ${R}_{\oplus }$ ) planets for characterization via eclipse spectroscopy and phase curves with JWST. TOI-1807b
    is the youngest ultra-short-period planet discovered to date, providing valuable constraints on formation timescales of
    short-period planets. Given the rarity of young planets, particularly in multiple-planet systems, these planets present
    an unprecedented opportunity to study and compare exoplanet formation, and young planet atmospheres, at a crucial transition
    age for formation theory.'
