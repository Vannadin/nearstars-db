  abstract: AU Microscopii (AU Mic) is the second closest pre-main-sequence star, at a distance of 9.79 parsecs and with an
    age of 22 million years<SUP>1</SUP>. AU Mic possesses a relatively rare<SUP>2</SUP> and spatially resolved<SUP>3</SUP>
    edge-on debris disk extending from about 35 to 210 astronomical units from the star<SUP>4</SUP>, and with clumps exhibiting
    non-Keplerian motion<SUP>5-7</SUP>. Detection of newly formed planets around such a star is challenged by the presence
    of spots, plage, flares and other manifestations of magnetic `activity' on the star<SUP>8,9</SUP>. Here we report observations
    of a planet transiting AU Mic. The transiting planet, AU Mic b, has an orbital period of 8.46 days, an orbital distance
    of 0.07 astronomical units, a radius of 0.4 Jupiter radii, and a mass of less than 0.18 Jupiter masses at 3σ confidence.
    Our observations of a planet co-existing with a debris disk offer the opportunity to test the predictions of current models
    of planet formation and evolution.
