  pubdate: '2025-05-00'
  doi: 10.1093/mnras/staf489
  abstract: In the era of exoplanet studies with JWST, the transiting, hot gas giant WASP-52 b is an excellent target for
    atmospheric characterization through transit spectroscopy. WASP-52 b orbits an active K-type dwarf recognized for its
    surface heterogeneities, such as star-spots and faculae, which pose challenges to atmospheric characterization via transmission
    spectroscopy. Previous transit observations have detected active regions on WASP-52 through crossing events in transit
    light curves and via the spectral imprint of unocculted magnetic regions on transmission spectra. Here, we present the
    first JWST observations of WASP-52 b. Our Near Infrared Imager and Slitless Spectrometer/Single Object Slitless Spectroscopy
    (NIRISS/SOSS) transit observation, obtained through the GTO 1201 programme, detects two clear spot-crossing events that
    distort the 0.6─2.8 <inline-formula><tex-math>$\mu$</tex-math></inline-formula>m transit light curves of WASP-52 b. We
    find that these two occulted spots cover together about 2.4 per cent of the stellar surface and have temperatures about
    400─500 K cooler than the stellar photosphere. Our NIRISS/SOSS transmission spectrum is best-fit by an atmosphere with
    H<inline-formula><tex-math>$_2$</tex-math></inline-formula>O (10.8<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>),
    He (7.3<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>, with evidence of an escaping tail at <inline-formula><tex-math>$\sim$</tex-math></inline-formula>2.9<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>),
    hints of K (2.5<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>), and unocculted star-spots and faculae
    (3.6<inline-formula><tex-math>$\sigma$</tex-math></inline-formula>). The retrieved H<inline-formula><tex-math>$_2$</tex-math></inline-formula>O
    abundance (<inline-formula><tex-math>$\log$</tex-math></inline-formula> H<inline-formula><tex-math>$_2$</tex-math></inline-formula>O
    <inline-formula><tex-math>$\approx -4 \pm 1$</tex-math></inline-formula>) is consistent with a subsolar or solar atmospheric
    metallicity for two independent data reductions. Our results underscore the importance of simultaneously modelling planetary
    atmospheres and unocculted stellar heterogeneities when interpreting transmission spectra of planets orbiting active stars
    and demonstrate the necessity of considering stellar contamination models that account for both cold and hot active regions.
