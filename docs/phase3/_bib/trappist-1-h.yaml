- &id647
  arxiv_id: '2305.18516'
  ads_bibcode: 2023MNRAS.523..474I
  title: 'Kepler''s last planet discoveries: two new planets and one single-transit candidate from K2 campaign 19'
  authors:
  - Incha, Elyse
  - Vanderburg, Andrew
  - Jacobs, Tom
  - LaCourse, Daryll
  - Bieryla, Allyson
  - Pass, Emily
  - Howell, Steve B.
  - Berlind, Perry
  - Calkins, Michael
  - Esquerdo, Gilbert
  - Latham, David W.
  - Mann, Andrew W.
  year: '2023'
  pubdate: '2023-07-00'
  doi: 10.1093/mnras/stad1049
  abstract: The Kepler space telescope was responsible for the discovery of over 2700 confirmed exoplanets, more than half
    of the total number of exoplanets known today. These discoveries took place during both Kepler's primary mission, when
    it spent 4 yr staring at the same part of the sky, and its extended K2 mission, when a mechanical failure forced it to
    observe different parts of the sky along the ecliptic. At the very end of the mission, when Kepler was exhausting the
    last of its fuel reserves, it collected a short set of observations known as K2 Campaign 19. So far, no planets have been
    discovered in this data set because it only yielded about a week of high-quality data. Here, we report some of the last
    planet discoveries made by Kepler in the Campaign 19 dataset. We conducted a visual search of the week of high-quality
    Campaign 19 data and identified three possible planet transits. Each planet candidate was originally identified with only
    one recorded transit, from which we were able to estimate the planets' radii and estimate the semimajor axes and orbital
    periods. Analysis of lower-quality data collected after low fuel pressure caused the telescope's pointing precision to
    suffer revealed additional transits for two of these candidates, allowing us to statistically validate them as genuine
    exoplanets. We also tentatively confirm the transits of one planet with TESS. These discoveries demonstrate Kepler's exoplanet
    detection power, even when it was literally running on fumes.
