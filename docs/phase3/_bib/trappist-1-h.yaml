  arxiv_id: '2311.01187'
  ads_bibcode: 2024ApJ...961...22S
  title: Potential Melting of Extrasolar Planets by Tidal Dissipation
  authors:
  - Seligman, Darryl Z.
  - Feinstein, Adina D.
  - Lai, Dong
  - Welbanks, Luis
  - Taylor, Aster G.
  - Becker, Juliette
  - Adams, Fred C.
  - Morgan, Marvin
  - Bergner, Jennifer B.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-4357/ad0b82
  abstract: Tidal heating on Io due to its finite eccentricity was predicted to drive surface volcanic activity, which was
    subsequently confirmed by the Voyager spacecraft. Although the volcanic activity in Io is more complex, in theory volcanism
    can be driven by runaway melting in which the tidal heating increases as the mantle thickness decreases. We show that
    this runaway melting mechanism is generic for a composite planetary body with liquid core and solid mantle, provided that
    (i) the mantle rigidity, μ, is comparable to the central pressure, i.e., μ/(ρ gR <SUB>P</SUB>) ≳ 0.1 for a body with density
    ρ, surface gravitational acceleration g, and radius R <SUB>P</SUB>; (ii) the surface is not molten; (iii) tides deposit
    sufficient energy; and (iv) the planet has nonzero eccentricity. We calculate the approximate liquid core radius as a
    function of μ/(ρ gR <SUB>P</SUB>), and find that more than 90% of the core will melt due to this runaway for μ/(ρ gR <SUB>P</SUB>)
    ≳ 1. From all currently confirmed exoplanets, we find that the terrestrial planets in the L 98-59 system are the most
    promising candidates for sustaining active volcanism. However, uncertainties regarding the quality factors and the details
    of tidal heating and cooling mechanisms prohibit definitive claims of volcanism on any of these planets. We generate synthetic
    transmission spectra of these planets assuming Venus-like atmospheric compositions with an additional 5%, 50%, and 98%
    SO<SUB>2</SUB> component, which is a tracer of volcanic activity. We find a ≳3σ preference for a model with SO<SUB>2</SUB>
    with 5-10 transits with JWST for L 98-59bcd.
