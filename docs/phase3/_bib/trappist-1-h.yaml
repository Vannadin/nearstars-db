  doi: 10.1117/12.857678
  abstract: We present an overview of the pixel-level calibration of flight data from the Kepler Mission performed within
    the Kepler Science Operations Center Science Processing Pipeline. This article describes the calibration (CAL) module,
    which operates on original spacecraft data to remove instrument effects and other artifacts that pollute the data. Traditional
    CCD data reduction is performed (removal of instrument/detector effects such as bias and dark current), in addition to
    pixel-level calibration (correcting for cosmic rays and variations in pixel sensitivity), Kepler-specific corrections
    (removing smear signals which result from the lack of a shutter on the photometer and correcting for distortions induced
    by the readout electronics), and additional operations that are needed due to the complexity and large volume of flight
    data. CAL operates on long (~30 min) and short (~1 min) sampled data, as well as full-frame images, and produces calibrated
    pixel flux time series, uncertainties, and other metrics that are used in subsequent Pipeline modules. The raw and calibrated
    data are also archived in the Multi-mission Archive at Space Telescope at the Space Telescope Science Institute for use
    by the astronomical community.
