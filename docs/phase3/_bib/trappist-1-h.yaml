- &id188
  arxiv_id: '1809.04545'
  ads_bibcode: 2018ApJ...867...17J
  title: Photochemical Oxygen in Non-1-bar CO<SUB>2</SUB> Atmospheres of Terrestrial Exoplanets
  authors:
  - James, Tre'Shunda
  - Hu, Renyu
  year: '2018'
  pubdate: '2018-11-00'
  doi: 10.3847/1538-4357/aae2bb
  abstract: Atmospheric chemistry models have shown that molecular oxygen can build up in CO<SUB>2</SUB>-dominated atmospheres
    on potentially habitable exoplanets without input of life. Existing models typically assume a surface pressure of 1 bar.
    Here we present model scenarios of CO<SUB>2</SUB>-dominated atmospheres with the surface pressure ranging from 0.1 to
    10 bars, while keeping the surface temperature at 288 K. We use a one-dimensional photochemistry model to calculate the
    abundance of O<SUB>2</SUB> and other key species, for outgassing rates ranging from a Venus-like volcanic activity up
    to 20 times Earth-like activity. The model maintains the redox balance of the atmosphere and the ocean, and includes the
    pressure dependency of outgassing on the surface pressure. Our calculations show that the surface pressure is a controlling
    parameter in the photochemical stability and oxygen buildup of CO<SUB>2</SUB>-dominated atmospheres. The mixing ratio
    of O<SUB>2</SUB> monotonically decreases as the surface pressure increases at very high outgassing rates, whereas it increases
    as the surface pressure increases at lower-than-Earth outgassing rates. Abiotic O<SUB>2</SUB> can only build up to the
    detectable level, defined as 10<SUP>-3</SUP> in volume mixing ratio, in 10-bar atmospheres with the Venus-like volcanic
    activity rate and the reduced outgassing rate of H<SUB>2</SUB> due to the high surface pressure. Our results support the
    search for biological activities and habitability via atmospheric O<SUB>2</SUB> on terrestrial planets in the habitable
    zone of Sun-like stars.
  source: citation_of=2024NatAs...8...17T
