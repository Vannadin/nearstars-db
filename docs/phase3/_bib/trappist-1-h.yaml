  pubdate: '2013-04-00'
  doi: 10.1051/0004-6361/201220942
  abstract: '<BR /> Aims: We present an extension of our investigations on limb-darkening coefficients computed with spherical
    symmetrical Phoenix models. The models investigated in this paper cover the range 5000 K ≤ T<SUB>eff</SUB> ≤ 10 000 K
    and complete our previous studies of low effective temperatures computed with the same code. <BR /> Methods: The limb-darkening
    coefficients are computed for the transmission curves of the Kepler, CoRoT, and Spitzer space missions and the Strömgren,
    Johnson-Cousins, Sloan, and 2MASS passbands. These computations were performed by adopting the least-squares method. <BR
    /> Results: We have used six laws to describe the specific intensity distribution: linear, quadratic, square root, logarithmic,
    exponential, and a general law with four terms. The computations are presented for the solar chemical composition and
    cover the range 3.0 ≤ log g ≤ 5.5. The adopted microturbulent velocity and the mixing-length parameter are 2.0 km s<SUP>-1</SUP>
    and 2.0. <P />Tables 2-25 are available in electronic form at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">cdsarc.u-strasbg.fr</A>
    (<A href="http://130.79.128.5">130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/552/A16">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/552/A16</A>'
