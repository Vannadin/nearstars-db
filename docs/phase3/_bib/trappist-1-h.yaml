  - van Dishoeck, E. F.
  - van Terwisga, S. E.
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.3847/0004-637X/828/1/46
  abstract: We present the first high-resolution sub-millimeter survey of both dust and gas for a large population of protoplanetary
    disks. Characterizing fundamental properties of protoplanetary disks on a statistical level is critical to understanding
    how disks evolve into the diverse exoplanet population. We use the Atacama Large Millimeter/Submillimeter Array (ALMA)
    to survey 89 protoplanetary disks around stars with {M}<SUB>* </SUB>\gt 0.1 {M}<SUB>☉ </SUB> in the young (1-3 Myr), nearby
    (150-200 pc) Lupus complex. Our observations cover the 890 μm continuum and the <SUP>13</SUP>CO and C<SUP>18</SUP>O 3-2
    lines. We use the sub-millimeter continuum to constrain {M}<SUB>{{dust</SUB>}} to a few Martian masses (0.2-0.4 M <SUB>⊕</SUB>)
    and the CO isotopologue lines to constrain {M}<SUB>{{gas</SUB>}} to roughly a Jupiter mass (assuming an interstellar medium
    (ISM)-like [{CO}]/[{{{H}}}<SUB>2</SUB>] abundance). Of 89 sources, we detect 62 in continuum, 36 in <SUP>13</SUP>CO, and
    11 in C<SUP>18</SUP>O at \gt 3σ significance. Stacking individually undetected sources limits their average dust mass
    to ≲ 6 Lunar masses (0.03 M <SUB>⊕</SUB>), indicating rapid evolution once disk clearing begins. We find a positive correlation
    between {M}<SUB>{{dust</SUB>}} and M <SUB>*</SUB>, and present the first evidence for a positive correlation between {M}<SUB>{{gas</SUB>}}
    and M <SUB>*</SUB>, which may explain the dependence of giant planet frequency on host star mass. The mean dust mass in
    Lupus is 3× higher than in Upper Sco, while the dust mass distributions in Lupus and Taurus are statistically indistinguishable.
    Most detected disks have {M}<SUB>{{gas</SUB>}}≲ 1 {M}<SUB>{{Jup</SUB>}} and gas-to-dust ratios \lt 100, assuming an ISM-like
    [{CO}]/[{{{H}}}<SUB>2</SUB>] abundance; unless CO is very depleted, the inferred gas depletion indicates that planet formation
    is well underway by a few Myr and may explain the unexpected prevalence of super-Earths in the exoplanet population.
