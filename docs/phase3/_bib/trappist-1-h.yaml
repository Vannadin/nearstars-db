- &id924
  arxiv_id: '1702.08252'
  ads_bibcode: 2017AJ....153..193A
  title: 'Toward Detection of Exoplanetary Rings via Transit Photometry: Methodology and a Possible Candidate'
  authors:
  - Aizawa, Masataka
  - Uehara, Sho
  - Masuda, Kento
  - Kawahara, Hajime
  - Suto, Yasushi
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.3847/1538-3881/aa6336
  abstract: The detection of a planetary ring of exoplanets remains one of the most attractive, but challenging, goals in
    the field of exoplanetary science. We present a methodology that implements a systematic search for exoplanetary rings
    via transit photometry of long-period planets. This methodology relies on a precise integration scheme that we develop
    to compute a transit light curve of a ringed planet. We apply the methodology to 89 long-period planet candidates from
    the Kepler data so as to estimate, and/or set upper limits on, the parameters of possible rings. While the majority of
    our samples do not have sufficient signal-to-noise ratios (S/Ns) to place meaningful constraints on ring parameters, we
    find that six systems with higher S/Ns are inconsistent with the presence of a ring larger than 1.5 times the planetary
    radius, assuming a grazing orbit and a tilted ring. Furthermore, we identify five preliminary candidate systems whose
    light curves exhibit ring-like features. After removing four false positives due to the contamination from nearby stars,
    we identify KIC 10403228 as a reasonable candidate for a ringed planet. A systematic parameter fit of its light curve
    with a ringed planet model indicates two possible solutions corresponding to a Saturn-like planet with a tilted ring.
    There also remain two other possible scenarios accounting for the data; a circumstellar disk and a hierarchical triple.
    Due to large uncertain factors, we cannot choose one specific model among the three.
  source: citation_of=2019A&A...623A..39H
