  title: A Guide to Realistic Uncertainties on the Fundamental Properties of Solar-type Exoplanet Host Stars
  authors:
  - Tayar, Jamie
  - Claytor, Zachary R.
  - Huber, Daniel
  - van Saders, Jennifer
  year: '2022'
  pubdate: '2022-03-00'
  doi: 10.3847/1538-4357/ac4bbc
  abstract: Our understanding of the properties and demographics of exoplanets critically relies on our ability to determine
    the fundamental properties of their host stars. The advent of Gaia and large spectroscopic surveys has now made it possible,
    in principle, to infer the properties of individual stars, including most exoplanet hosts, to very high precision. However,
    we show that, in practice, such analyses are limited by uncertainties in both the fundamental scale and our models of
    stellar evolution, even for stars similar to the Sun. For example, we show that current uncertainties on measured interferometric
    angular diameters and bolometric fluxes set a systematic uncertainty floor of ≍2.4% in temperature, ≍2.0% in luminosity,
    and ≍4.2% in radius. Comparisons between widely available model grids suggest uncertainties of order ≍5% in mass and ≍20%
    in age for main-sequence and subgiant stars. While the radius uncertainties are roughly constant over this range of stars,
    the model-dependent uncertainties are a complex function of luminosity, temperature, and metallicity. We provide open-source
    software for approximating these uncertainties for individual targets and discuss strategies for reducing these uncertainties
    in the future.
