  arxiv_id: '1412.4440'
  ads_bibcode: 2015MNRAS.448.1751I
  title: The formation of super-Earths and mini-Neptunes with giant impacts
  authors:
  - Inamdar, Niraj K.
  - Schlichting, Hilke E.
  year: '2015'
  pubdate: '2015-04-00'
  doi: 10.1093/mnras/stv030
  abstract: The majority of discovered exoplanetary systems harbour a new class of planets, bodies that are typically several
    times more massive than the Earth but that orbit their host stars well inside the orbit of Mercury. The origin of these
    close-in super-Earths and mini-Neptunes is one of the major unanswered questions in planet formation. Unlike the Earth,
    whose atmosphere contains less than 10<SUP>-6</SUP> of its total mass, a large fraction of close-in planets have significant
    gaseous envelopes, containing 1-10 per cent or more of their total mass. It has been proposed that close-in super-Earths
    and mini-Neptunes formed in situ either by delivery of 50-100 M<SUB>⊕</SUB> of rocky material to the inner regions of
    the protoplanetary disc or in a disc enhanced relative to the minimum mass solar nebula. In both cases, the final assembly
    of the planets occurs via giant impacts. Here we test the viability of these scenarios. We show that atmospheres that
    can be accreted by isolation masses are small (typically 10<SUP>-3</SUP>-10<SUP>-2</SUP> of the core mass) and that the
    atmospheric mass-loss during giant impacts is significant, resulting in typical post-giant impact atmospheres that are
    8 × 10<SUP>- 4</SUP> of the core mass. Such values are consistent with terrestrial planet atmospheres but more than an
    order of magnitude below atmospheric masses of 1-10 per cent inferred for many close-in exoplanets. In the most optimistic
    scenario in which there is no core luminosity from giant impacts and/or planetesimal accretion, we find that post-giant
    impact envelope accretion from a depleted gas disc can yield atmospheric masses that are several per cent the core mass.
    If the gravitational potential energy resulting from the last mass doubling of the planet by giant impacts is released
    over the disc dissipation time-scale as core luminosity, then the accreted envelope masses are reduced by about an order
    of magnitude. Finally we show that, even in the absence of type I migration, radial drift time-scales due to gas drag
    for many isolation masses are shorter than typical disc lifetimes for standard gas-to-dust ratios. Given these challenges,
    we conclude that most of the observed close-in planets with envelopes larger than several per cent of their total mass
    likely formed at larger separations from their host stars.
