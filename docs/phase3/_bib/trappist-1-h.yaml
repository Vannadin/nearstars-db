    the exoplanetary system configurations. Despite its importance, its quantification from observations still remains difficult
    for most objects of our own Solar System. In this work, we overview the method that has been used to determine, directly
    from observations, the tidal parameters, with emphasis on the Love number <inline-formula id="IEq1"><mml:math><mml:msub><mml:mi>k</mml:mi><mml:mn>2</mml:mn></mml:msub></mml:math></inline-formula>
