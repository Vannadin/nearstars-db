- &id204
  arxiv_id: '1602.05176'
  ads_bibcode: 2016ApJ...819...84K
  title: The Inner Edge of the Habitable Zone for Synchronously Rotating Planets around Low-mass Stars Using General Circulation
    Models
  authors:
  - Kopparapu, Ravi kumar
  - Wolf, Eric T.
  - Haqq-Misra, Jacob
  - Yang, Jun
  - Kasting, James F.
  - Meadows, Victoria
  - Terrien, Ryan
  - Mahadevan, Suvrath
  year: '2016'
  pubdate: '2016-03-00'
  doi: 10.3847/0004-637X/819/1/84
  abstract: Terrestrial planets at the inner edge of the habitable zone (HZ) of late-K and M-dwarf stars are expected to be
    in synchronous rotation, as a consequence of strong tidal interactions with their host stars. Previous global climate
    model (GCM) studies have shown that, for slowly rotating planets, strong convection at the substellar point can create
    optically thick water clouds, increasing the planetary albedo, and thus stabilizing the climate against a thermal runaway.
    However these studies did not use self-consistent orbital/rotational periods for synchronously rotating planets placed
    at different distances from the host star. Here we provide new estimates of the inner edge of the HZ for synchronously
    rotating terrestrial planets around late-K and M-dwarf stars using a 3D Earth-analog GCM with self-consistent relationships
    between stellar metallicity, stellar effective temperature, and the planetary orbital/rotational period. We find that
    both atmospheric dynamics and the efficacy of the substellar cloud deck are sensitive to the precise rotation rate of
    the planet. Around mid-to-late M-dwarf stars with low metallicity, planetary rotation rates at the inner edge of the HZ
    become faster, and the inner edge of the HZ is farther away from the host stars than in previous GCM studies. For an Earth-sized
    planet, the dynamical regime of the substellar clouds begins to transition as the rotation rate approaches ∼10 days. These
    faster rotation rates produce stronger zonal winds that encircle the planet and smear the substellar clouds around it,
    lowering the planetary albedo, and causing the onset of the water-vapor greenhouse climatic instability to occur at up
    to ∼25% lower incident stellar fluxes than found in previous GCM studies. For mid-to-late M-dwarf stars with high metallicity
    and for mid-K to early-M stars, we agree with previous studies.
