  - Francis, Logan
  - Greenbaum, Alexandra Z.
  - Lafrenière, David
  - Lloyd, James P.
  - Meyer, Michael R.
  - Pueyo, Laurent
  - Ray, Shrishmoy
  - Sánchez-Bermúdez, Joel
  - Soulain, Anthony
  - Thatte, Deepashri
  - Thompson, William
  - Vandal, Thomas
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.3847/1538-3881/ad9b94
  abstract: We observed the planet-hosting system PDS 70 with the James Webb Interferometer, JWST's aperture masking interferometric
    mode within NIRISS. Observing with the F480M filter centered at 4.8 μm, we simultaneously fit geometrical models to the
    outer disk and the two known planetary companions. We redetect the protoplanets PDS 70 b and c at a signal-to-noise ratio
    (SNR) of 14.7 and 7.0, respectively. Our photometry of both PDS 70 b and c provides tentative evidence of mid-IR circumplanetary
    disk emission through fitting spectral energy distribution models to these new measurements and those found in the literature.
    We also newly detect emission within the disk gap at an SNR of ~4, a position angle of <inline-formula> <mml:math><mml:mn>22</mml:mn><mml:msubsup><mml:mrow><mml:mn>0</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>15</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>10</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula>°, and an unconstrained separation within ~200 mas. Follow-up observations will be needed to determine
    the nature of this emission. We place a 5σ upper limit of 208 ± 10 μJy on the flux of the candidate PDS 70 d at 4.8 μm,
    which indicates that if the previously observed emission at shorter wavelengths is due to a planet, this putative planet
    has a different atmospheric composition than PDS 70 b or c. Finally, we place upper limits on emission from any additional
    planets in the disk gap. We find an azimuthally averaged 5σ contrast upper limit &gt;7 mag at separations greater than
    110 mas. These are the deepest limits to date within ~250 mas at 4.8 μm and the first space-based interferometric observations
    of this system.
