- &id311
  arxiv_id: '1607.08147'
  ads_bibcode: 2016ApJ...830...77V
  title: Influence of Stellar Flares on the Chemical Composition of Exoplanets and Spectra
  authors:
  - Venot, Olivia
  - Rocchetto, Marco
  - Carl, Shaun
  - Roshni Hashim, Aysha
  - Decin, Leen
  year: '2016'
  pubdate: '2016-10-00'
  doi: 10.3847/0004-637X/830/2/77
  abstract: More than three thousand exoplanets have been detected so far, and more and more spectroscopic observations of
    exoplanets are performed. Future instruments (James Webb Space Telescope (JWST), E-ELT, PLATO, Ariel, etc.,) are eagerly
    awaited, as they will be able to provide spectroscopic data with greater accuracy and sensitivity than what is currently
    available. This will allow more accurate conclusions to be drawn regarding the chemistry and dynamics of exoplanetary
    atmospheres, provided that the observational data are carefully processed. One important aspect to consider is temporal
    stellar atmospheric disturbances that can influence the planetary composition, and hence spectra, and potentially can
    lead to incorrect assumptions about the steady-state atmospheric composition of the planet. In this paper, we focus on
    perturbations coming from the host star in the form of flare events that significantly increase photon flux impingement
    on the exoplanets atmosphere. In some cases, particularly for M stars, this sudden increase may last for several hours.
    We aim to discover to what extent a stellar flare is able to modify the chemical composition of the planetary atmosphere
    and, therefore, influence the resulting spectra. We use a one-dimensional thermo-photochemical model to study the neutral
    atmospheric composition of two hypothetical planets located around the star AD Leo. We place the two planets at different
    distances from the star, which results in effective atmospheric temperatures of 412 and 1303 K. AD Leo is an active star
    that has already been observed during a flare. Therefore, we use the spectroscopic data from this flare event to simulate
    the evolution of the chemical composition of the atmospheres of the two hypothetical planets. We compute synthetic spectra
    to evaluate the implications for observations. The increase in the incoming photon flux affects the chemical abundances
    of some important species (such as H and NH<SUB>3</SUB>), down to altitudes associated with an atmospheric pressure of
    1 bar, which can lead to variations in planetary spectra (up to 150 ppm) if performed during transit. We find that each
    exoplanet has a post-flare steady-state composition that is significantly different from the pre-flare steady-state. We
    predict that these variations could be detectable with both current and future spectroscopic instruments, if sufficiently
    high signal-to-noise spectra are obtained.
  source: citation_of=2018MNRAS.473.4672C
