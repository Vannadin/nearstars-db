  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.3847/2041-8213/ad615b
  abstract: Recent JWST observations of the sub-Neptune GJ 1214 b suggest that it hosts a high-metallicity (≳100× solar),
    hazy atmosphere. Emission spectra of the planet show molecular absorption features, most likely due to atmospheric H<SUB>2</SUB>O.
    In light of this new information, we conduct a thorough reevaluation of the planet's internal structure. We consider interior
    models with mixed H/He/H<SUB>2</SUB>O envelopes of varying composition, informed by atmospheric constraints from the JWST
    phase curve, in order to determine possible bulk compositions and internal structures. Self-consistent atmospheric models
    consistent with the JWST observations are used to set boundary conditions for the interior. We find that a total envelope
    mass fraction of at least 8.1% is required to explain the planet's mass and radius. Regardless of H<SUB>2</SUB>O content,
    the maximum H/He mass fraction of the planet is 5.8%. We find that a 1:1 ice-to-rock ratio along with 3.4%─4.8% H/He is
    also a permissible solution. In addition, we consider a pure H<SUB>2</SUB>O (steam) envelope and find that such a scenario
    is possible, albeit with a high ice-to-rock ratio of at least 3.76:1, which may be unrealistic from a planet formation
    standpoint. We discuss possible formation pathways for the different internal structures that are consistent with observations.
    Since our results depend strongly on the atmospheric composition and haze properties, more precise observations of the
    planet's atmosphere would allow for further constraints on its internal structure. This type of analysis can be applied
    to any sub-Neptune with atmospheric constraints to better understand its interior.
