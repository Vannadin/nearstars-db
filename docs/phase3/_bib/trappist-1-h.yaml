  arxiv_id: '1605.09545'
  ads_bibcode: 2016MNRAS.461.1981C
  title: Connecting the dots - III. Nightside cooling and surface friction affect climates of tidally locked terrestrial planets
  authors:
  - Carone, L.
  - Keppens, R.
  - Decin, L.
  year: '2016'
  pubdate: '2016-09-00'
  doi: 10.1093/mnras/stw1265
  abstract: We investigate how nightside cooling and surface friction affect surface temperatures and large-scale circulation
    for tidally locked Earth-like planets. For each scenario, we vary the orbital period between P<SUB>rot</SUB> = 1 and 100
    d and capture changes in climate states. We find drastic changes in climate states for different surface friction scenarios.
    For very efficient surface friction (t<SUB>s,fric</SUB> = 0.1 d), the simulations for short rotation periods (P<SUB>rot</SUB>
    ≤ 10 d) show predominantly standing extratropical Rossby waves. These waves lead to climate states with two high-latitude
    westerly jets and unperturbed meridional direct circulation. In most other scenarios, simulations with short rotation
    periods exhibit instead dominance by standing tropical Rossby waves. Such climate states have a single equatorial westerly
    jet, which disrupts direct circulation. Experiments with weak surface friction (t<SUB>s,fric</SUB> = 10-100 d) show decoupling
    between surface temperatures and circulation, which leads to strong cooling of the nightside. The experiment with t<SUB>s,fric</SUB>
    = 100 d assumes climate states with easterly flow (retrograde rotation) for medium and slow planetary rotations P<SUB>rot</SUB>
    = 12-100 d. We show that an increase of nightside cooling efficiency by one order of magnitude compared to the nominal
    model leads to a cooling of the nightside surface temperatures by 80-100 K. The dayside surface temperatures only drop
    by 25 K at the same time. The increase in thermal forcing suppresses the formation of extratropical Rossby waves on small
    planets (R<SUB>P</SUB> = 1R<SUB>Earth</SUB>) in the short rotation period regime (P<SUB>rot</SUB> ≤ 10 d).
