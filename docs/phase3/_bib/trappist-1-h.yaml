  arxiv_id: '1612.04379'
  ads_bibcode: 2017AJ....154...25B
  title: Determining Empirical Stellar Masses and Radii from Transits and Gaia Parallaxes as Illustrated by Spitzer Observations
    of KELT-11b
  authors:
  - Beatty, Thomas G.
  - Stevens, Daniel J.
  - Collins, Karen A.
  - Colón, Knicole D.
  - James, David J.
  - Kreidberg, Laura
  - Pepper, Joshua
  - Rodriguez, Joseph E.
  - Siverd, Robert J.
  - Stassun, Keivan G.
  - Kielkopf, John F.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-3881/aa7511
  abstract: Using the Spitzer Space Telescope, we observed a transit at 3.6 μm of KELT-11b. We also observed three partial
    planetary transits from the ground. We simultaneously fit these observations, ground-based photometry from Pepper et al.,
    radial velocity data from Pepper et al., and a spectral energy distribution (SED) model using catalog magnitudes and the
    Hipparcos parallax to the system. The only significant difference between our results and those of Pepper et al. is that
    we find the orbital period to be shorter by 37 s, 4.73610 ± 0.00003 versus 4.73653 ± 0.00006 days, and we measure a transit
    center time of {{BJD}}<SUB>{TDB</SUB>} 2457483.4310 ± 0.0007, which is 42 minutes earlier than predicted. Using our new
    photometry, we precisely measure the density of the star KELT-11 to 4%. By combining the parallax and catalog magnitudes
    of the system, we are able to measure the radius of KELT-11b essentially empirically. Coupled with the stellar density,
    this gives a parallactic mass and radius of 1.8 {M}<SUB>☉ </SUB> and 2.9 {R}<SUB>☉ </SUB>, which are each approximately
    1σ higher than the adopted model-estimated mass and radius. If we conduct the same fit using the expected parallax uncertainty
    from the final Gaia data release, this difference increases to 4σ. The differences between the model and parallactic masses
    and radii for KELT-11 demonstrate the role that precise Gaia parallaxes, coupled with simultaneous photometric, radial
    velocity, and SED fitting, can play in determining stellar and planetary parameters. With high-precision photometry of
    transiting planets and high-precision Gaia parallaxes, the parallactic mass and radius uncertainties of stars become 1%
    and 3%, respectively. TESS is expected to discover 60-80 systems where these measurements will be possible. These parallactic
    mass and radius measurements have uncertainties small enough that they may provide observational input into the stellar
    models themselves.
