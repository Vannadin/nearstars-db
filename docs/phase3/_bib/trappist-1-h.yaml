  arxiv_id: '2204.05360'
  ads_bibcode: 2022ApJ...929L..28H
  title: Disruption of a Planetary Nitrogen Cycle as Evidence of Extraterrestrial Agriculture
  authors:
  - Haqq-Misra, Jacob
  - Fauchez, Thomas J.
  - Schwieterman, Edward W.
  - Kopparapu, Ravi
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.3847/2041-8213/ac65ff
  abstract: Agriculture is one of the oldest forms of technology on Earth. The cultivation of plants requires a terrestrial
    planet with active hydrological and carbon cycles and depends on the availability of nitrogen in soil. The technological
    innovation of agriculture is the active management of this nitrogen cycle by applying fertilizer to soil, at first through
    the production of manure excesses but later by the Haber-Bosch industrial process. The use of such fertilizers has increased
    the atmospheric abundance of nitrogen-containing species such as NH<SUB>3</SUB> and N<SUB>2</SUB>O as agricultural productivity
    intensifies in many parts of the world. Both NH<SUB>3</SUB> and N<SUB>2</SUB>O are effective greenhouse gases, and the
    combined presence of these gases in the atmosphere of a habitable planet could serve as a remotely detectable spectral
    signature of technology. Here we use a synthetic spectral generator to assess the detectability of NH<SUB>3</SUB> and
    N<SUB>2</SUB>O that would arise from present-day and future global-scale agriculture. We show that present-day Earth abundances
    of NH<SUB>3</SUB> and N<SUB>2</SUB>O would be difficult to detect, but hypothetical scenarios involving a planet with
    30-100 billion people could show a change in transmittance of about 50%-70% compared to preagricultural Earth. These calculations
    suggest the possibility of considering the simultaneous detection of NH<SUB>3</SUB> and N<SUB>2</SUB>O in an atmosphere
    that also contains H<SUB>2</SUB>O, O<SUB>2</SUB>, and CO<SUB>2</SUB> as a technosignature for extraterrestrial agriculture.
    The technology of agriculture is one that could be sustainable across geologic timescales, so the spectral signature of
    such an "ExoFarm" is worth considering in the search for technosignatures.
  source: citation_of=2024NatAs...8...17T
