  arxiv_id: '1804.04233'
  ads_bibcode: 2018Icar..311..340C
  title: Mars' growth stunted by an early giant planet instability
  authors:
  - Clement, Matthew S.
  - Kaib, Nathan A.
  - Raymond, Sean N.
