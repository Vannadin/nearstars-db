- &id092
  arxiv_id: '1905.12821'
  ads_bibcode: 2019AJ....158...26L
  title: 'Observing Isotopologue Bands in Terrestrial Exoplanet Atmospheres with the James Webb Space Telescope: Implications
    for Identifying Past Atmospheric and Ocean Loss'
  authors:
  - Lincowski, Andrew P.
  - Lustig-Yaeger, Jacob
  - Meadows, Victoria S.
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.3847/1538-3881/ab2385
  abstract: Terrestrial planets orbiting M dwarfs may soon be observed with the James Webb Space Telescope (JWST) to characterize
    their atmospheric composition and search for signs of habitability or life. These planets may undergo significant atmospheric
    and ocean loss due to the superluminous pre-main-sequence phase of their host stars, which may leave behind abiotically
    generated oxygen, a false positive for the detection of life. Determining if ocean loss has occurred will help assess
    potential habitability and whether or not any O<SUB>2</SUB> detected is biogenic. In the solar system, differences in
    isotopic abundances have been used to infer the history of ocean loss and atmospheric escape (e.g., Venus, Mars). We find
    that isotopologue measurements using transit transmission spectra of terrestrial planets around late-type M dwarfs like
    TRAPPIST-1 may be possible with JWST, if the escape mechanisms and resulting isotopic fractionation were similar to Venus.
    We present analyses of post-ocean-loss O<SUB>2</SUB>- and CO<SUB>2</SUB>-dominated atmospheres containing a range of trace
    gas abundances. Isotopologue bands are likely detectable throughout the near-infrared (1-8 μm), especially 3-4 μm, although
    not in CO<SUB>2</SUB>-dominated atmospheres. For Venus-like D/H ratios 100 times that of Earth, TRAPPIST-1b transit signals
    of up to 79 ppm are possible by observing HDO. Similarly, <SUP>18</SUP>O/<SUP>16</SUP>O ratios 100 times that of Earth
    produce signals at up to 94 ppm. Detection at signal-to-noise ratio = 5 may be attained on these bands with as few as
    four to 11 transits, with optimal use of JWST’s NIRSpec Prism. Consequently, H<SUB>2</SUB>O and CO<SUB>2</SUB> isotopologues
    could be considered as indicators of past ocean loss and atmospheric escape for JWST observations of terrestrial planets
    around M dwarfs.
  source: citation_of=2019AJ....158...27L
