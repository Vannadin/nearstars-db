  year: '2014'
  pubdate: '2014-08-00'
  doi: 10.1088/0004-6256/148/2/28
  abstract: We report the discovery of 14 new transiting planet candidates in the Kepler field from the Planet Hunters citizen
    science program. None of these candidates overlapped with Kepler Objects of Interest (KOIs) at the time of submission.
    We report the discovery of one more addition to the six planet candidate system around KOI-351, making it the only seven
    planet candidate system from Kepler. Additionally, KOI-351 bears some resemblance to our own solar system, with the inner
    five planets ranging from Earth to mini-Neptune radii and the outer planets being gas giants; however, this system is
    very compact, with all seven planet candidates orbiting &lt;~ 1 AU from their host star. A Hill stability test and an
    orbital integration of the system shows that the system is stable. Furthermore, we significantly add to the population
    of long period transiting planets; periods range from 124 to 904 days, eight of them more than one Earth year long. Seven
    of these 14 candidates reside in their host star's habitable zone. <P />.
