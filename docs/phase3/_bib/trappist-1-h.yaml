  arxiv_id: '2301.01306'
  ads_bibcode: 2023AJ....165..155T
  title: The K2 and TESS Synergy. II. Revisiting 26 Systems in the TESS Primary Mission
  authors:
  - Thygesen, Erica
  - Ranshaw, Jessica A.
  - Rodriguez, Joseph E.
  - Vanderburg, Andrew
  - Quinn, Samuel N.
  - Eastman, Jason D.
  - Bieryla, Allyson
