  doi: 10.3847/1538-3881/aaa54c
  abstract: 'Probing the connection between a star’s metallicity and the presence and properties of any associated planets
    offers an observational link between conditions during the epoch of planet formation and mature planetary systems. We
    explore this connection by analyzing the metallicities of Kepler target stars and the subset of stars found to host transiting
    planets. After correcting for survey incompleteness, we measure planet occurrence: the number of planets per 100 stars
    with a given metallicity M. Planet occurrence correlates with metallicity for some, but not all, planet sizes and orbital
    periods. For warm super-Earths having P = 10-100 days and {R}<SUB>P</SUB> = 1.0-1.7 {R}<SUB>\oplus </SUB>, planet occurrence
    is nearly constant over metallicities spanning -0.4 to +0.4 dex. We find 20 warm super-Earths per 100 stars, regardless
    of metallicity. In contrast, the occurrence of warm sub-Neptunes ({R}<SUB>P</SUB> = 1.7-4.0 {R}<SUB>\oplus </SUB>) doubles
    over that same metallicity interval, from 20 to 40 planets per 100 stars. We model the distribution of planets as {df}\propto
    {10}<SUP>β M</SUP>{dM}, where β characterizes the strength of any metallicity correlation. This correlation steepens with
    decreasing orbital period and increasing planet size. For warm super-Earths β = -{0.3}<SUB>-0.2</SUB><SUP>+0.2</SUP>,
    while for hot Jupiters β = +{3.4}<SUB>-0.8</SUB><SUP>+0.9</SUP>. High metallicities in protoplanetary disks may increase
    the mass of the largest rocky cores or the speed at which they are assembled, enhancing the production of planets larger
    than 1.7 {R}<SUB>\oplus </SUB>. The association between high metallicity and short-period planets may reflect disk density
    profiles that facilitate the inward migration of solids or higher rates of planet-planet scattering.'
