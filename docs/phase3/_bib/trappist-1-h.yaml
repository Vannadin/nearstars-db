  arxiv_id: '2005.10868'
  ads_bibcode: 2020A&A...642A.140G
  title: Giant planet formation at the pressure maxima of protoplanetary disks. II. A hybrid accretion scenario
  authors:
  - Guilera, Octavio Miguel
  - Sándor, Zsolt
  - Ronco, María Paula
  - Venturini, Julia
  - Miller Bertolami, Marcelo Miguel
  year: '2020'
  pubdate: '2020-10-00'
  doi: 10.1051/0004-6361/202038458
  abstract: 'Context. Recent high-resolution observations of protoplanetary disks have revealed ring-like structures that
    can be associated to pressure maxima. Pressure maxima are known to be dust collectors and planet migration traps. The
    great majority of planet formation studies are based either on the pebble accretion model or on the planetesimal accretion
    model. However, recent studies proposed hybrid accretion of pebbles and planetesimals as a possible formation mechanism
    for Jupiter. <BR /> Aims: We aim to study the full process of planet formation consisting of dust evolution, planetesimal
    formation, and planet growth at a pressure maximum in a protoplanetary disk. <BR /> Methods: We compute, through numerical
    simulations, the gas and dust evolution in a protoplanetary disk, including dust growth, fragmentation, radial drift,
    and particle accumulation at a pressure maximum. The pressure maximum appears due to an assumed viscosity transition at
    the water ice line. We also consider the formation of planetesimals by streaming instability and the formation of a moon-size
    embryo that grows into a giant planet by the hybrid accretion of pebbles and planetesimals, all within the pressure maximum.
    <BR /> Results: We find that the pressure maximum is an efficient collector of dust drifting inwards. The condition of
    planetesimal formation by streaming instability is fulfilled due to the large amount of dust accumulated at the pressure
    bump. Subsequently, a massive core is quickly formed (in ~10<SUP>4</SUP> yr) by the accretion of pebbles. After the pebble
    isolation mass is reached, the growth of the core slowly continues by the accretion of planetesimals. The energy released
    by planetesimal accretion delays the onset of runaway gas accretion, allowing a gas giant to form after ~1 Myr of disk
    evolution. The pressure maximum also acts as a migration trap. <BR /> Conclusions: Pressure maxima generated by a viscosity
    transition at the water ice line are preferential locations for dust traps, planetesimal formation by streaming instability,
    and planet migration traps. All these conditions allow the fast formation of a giant planet by the hybrid accretion of
    pebbles and planetesimals.'
