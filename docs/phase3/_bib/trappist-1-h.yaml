  doi: 10.3847/1538-4357/ad7461
  abstract: Most exoplanets with a few Earth radii are more inflated than bare-rock planets with the same mass, indicating
    a substantial volatile amount. Neither the origin of the volatiles nor the planet's bulk composition can be constrained
    from the mass─radius relation alone, and the spectral characterization of their atmospheres is needed to solve this degeneracy.
    Previous studies showed that chemical interaction between accreted volatile and possible molten rocky surface (i.e., magma
    ocean) can greatly affect the atmospheric composition. However, a variety in the atmospheric compositions of such planets
    with different properties remains elusive. In this work, we examine the dependence of atmospheric H, O, and C on planetary
    parameters (atmospheric thickness, planetary mass, equilibrium temperature, and magma properties such as redox state)
    assuming nebula gas accretion on an Earth-like core, using an atmosphere-magma chemical equilibrium model. Consistent
    with previous work, we show that atmospheric H<SUB>2</SUB>O fraction on a fully molten rocky interior with an Earth-like
    redox state is on the order of 10<SUP>−2</SUP>─10<SUP>−1</SUP> regardless of other planetary parameters. Despite the solubility
    difference between H- and C-bearing species, C/H increases only a few times above the nebula value except for atmospheric
    pressure ≲1000 bar and H<SUB>2</SUB>O fraction ≳10%. This results in a negative O/H─C/O trend and depleted C/O below one-tenth
    of the nebula gas value under an oxidized atmosphere, which could provide a piece of evidence of rocky interior and endogenic
    water. We also highlight the importance of constraints on the high-pressure material properties for interpreting the magma─atmospheric
    interaction of inflated planets.
