- &id517
  arxiv_id: '1403.2713'
  ads_bibcode: 2014ApJ...785L..20W
  title: Abiotic Oxygen-dominated Atmospheres on Terrestrial Habitable Zone Planets
  authors:
  - Wordsworth, Robin
  - Pierrehumbert, Raymond
  year: '2014'
  pubdate: '2014-04-00'
  doi: 10.1088/2041-8205/785/2/L20
  abstract: Detection of life on other planets requires identification of biosignatures, i.e., observable planetary properties
    that robustly indicate the presence of a biosphere. One of the most widely accepted biosignatures for an Earth-like planet
    is an atmosphere where oxygen is a major constituent. Here we show that lifeless habitable zone terrestrial planets around
    any star type may develop oxygen-dominated atmospheres as a result of water photolysis, because the cold trap mechanism
    that protects H<SUB>2</SUB>O on Earth is ineffective when the atmospheric inventory of non-condensing gases (e.g., N<SUB>2</SUB>,
    Ar) is low. Hence the spectral features of O<SUB>2</SUB> and O<SUB>3</SUB> alone cannot be regarded as robust signs of
    extraterrestrial life.
