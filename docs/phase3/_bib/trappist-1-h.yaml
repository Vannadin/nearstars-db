  arxiv_id: '1705.01625'
  ads_bibcode: 2017ApJ...841L...1G
  title: SIMP J013656.5+093347 Is Likely a Planetary-mass Object in the Carina-Near Moving Group
  authors:
  - Gagné, Jonathan
  - Faherty, Jacqueline K.
  - Burgasser, Adam J.
  - Artigau, Étienne
  - Bouchard, Sandie
  - Albert, Loïc
  - Lafrenière, David
  - Doyon, René
  - Bardalez Gagliuffi, Daniella C.
  year: '2017'
  pubdate: '2017-05-00'
  doi: 10.3847/2041-8213/aa70e2
  abstract: We report on the discovery that the nearby (∼6 pc) photometrically variable T2.5 dwarf SIMP J013656.5+093347 is
    a likely member of the ∼200 Myr old Carina-Near moving group with a probability of &gt;99.9% based on its full kinematics.
    Our v\sin I measurement of 50.9 ± 0.8 km s<SUP>-1</SUP> combined with the known rotation period inferred from variability
    measurements provide a lower limit of 1.01 ± 0.02 {R}<SUB>{Jup</SUB>} on the radius of SIMP 0136+0933, an independent
    verification that it must be younger than ∼950 Myr, according to evolution models. We estimate a field interloper probability
    of 0.2% based on the density of field T0-T5 dwarfs. At the age of Carina-Near, SIMP 0136+0933 has an estimated mass of
    12.7 ± 1.0 {M}<SUB>{Jup</SUB>} and is predicted to have burned roughly half of its original deuterium. SIMP 0136+0933
    is the closest known young moving group member to the Sun and is one of only a few known young T dwarfs, making it an
    important benchmark for understanding the atmospheres of young planetary-mass objects.
