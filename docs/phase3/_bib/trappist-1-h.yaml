  title: GJ 367b Is a Dark, Hot, Airless Sub-Earth
  authors:
  - Zhang, Michael
  - Hu, Renyu
  - Inglis, Julie
  - Dai, Fei
  - Bean, Jacob L.
  - Knutson, Heather A.
