  arxiv_id: '2502.06966'
  ads_bibcode: 2026AJ....171..260C
  title: 'GEMS JWST: Transmission Spectroscopy of TOI-5205b Reveals Significant Stellar Contamination and a Metal-poor Atmosphere'
  authors:
  - Cañas, Caleb I.
  - Lustig-Yaeger, Jacob
  - Tsai, Shang-Min
  - Müller, Simon
  - Helled, Ravit
  - Kanodia, Shubham
  - Louie, Dana R.
  - Guzmán Caloca, Giannina
  - Gao, Peter
  - Libby-Roberts, Jessica
  - Hardegree-Ullman, Kevin K.
  - Colón, Knicole D.
  - Czekala, Ian
  - Delamer, Megan
  - Han, Te
  - Lin, Andrea S. J.
  - Mahadevan, Suvrath
  - May, Erin M.
