  doi: 10.1051/0004-6361/202143007
  abstract: We present radial velocity follow-up obtained with ESPRESSO of the M-type star LTT 1445A (TOI-455), for which
    a transiting planet b with an orbital period of 5.4 days was detected by TESS. We report the discovery of a second transiting
    planet (LTT 1445A c) and a third non-transiting candidate planet (LTT 1445A d) with orbital periods of 3.12 and 24.30
    days, respectively. The host star is the main component of a triple M-dwarf system at a distance of 6.9 pc. We used 84
    ESPRESSO high-resolution spectra to determine accurate masses of 2.3 ± 0.3 M<SUB>⊕</SUB> and 1.0 ± 0.2 M<SUB>⊕</SUB> for
