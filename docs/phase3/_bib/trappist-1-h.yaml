  abstract: 'We analyze K2 light curves for 132 low-mass (1 M <SUB>☉</SUB> ≳ M <SUB>*</SUB> ≳ 0.1 M <SUB>☉</SUB>) members
    of the 600-800 Myr old Hyades cluster and measure rotation periods ({P}<SUB>rot</SUB>}) for 116 of these stars. These
    include 93 stars with no prior {P}<SUB>rot</SUB>} measurements; the total number of Hyads with a known {P}<SUB>rot</SUB>}
    is now 232. We then combine literature binary data with Gaia DR2 photometry and astrometry to select single-star sequences
    in the Hyades and its roughly coeval Praesepe open cluster and derive a new reddening value of A <SUB> V </SUB> = 0.035
    ± 0.011 for Praesepe. Comparing the effective temperature-{P}<SUB>rot</SUB>} distributions for the Hyades and Praesepe,
    we find that solar-type Hyads rotate, on average, 0.4 day slower than their Praesepe counterparts. This {P}<SUB>rot</SUB>}
    difference indicates that the Hyades is slightly older than Praesepe: we apply a new gyrochronology model tuned with Praesepe
    and the Sun and find an age difference between the two clusters of 57 Myr. However, this {P}<SUB>rot</SUB>} difference
    decreases and eventually disappears for lower-mass stars. This provides further evidence for stalling in the rotational
    evolution of these stars and highlights the need for more detailed analysis of angular momentum evolution for stars of
    different masses and ages.'
