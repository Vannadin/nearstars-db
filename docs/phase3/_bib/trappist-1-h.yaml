  title: 'Numerical models of the thermomechanical evolution of planetesimals: Application to the acapulcoite-lodranite parent
    body'
  authors:
  - Golabek, Gregor J.
  - Bourdon, Bernard
  - Gerya, Taras V.
  year: '2014'
  pubdate: '2014-06-00'
  doi: 10.1111/maps.12302
  abstract: The acapulcoite-lodranite meteorites are members of the primitive achondrite class. The observation of partial
    melting and resulting partial removal of Fe-FeS indicates that this meteorite group could be an important link between
    achondrite and iron meteorites, on the one hand, and chondrite meteorites, on the other. Thus, a better understanding
    of the thermomechanical evolution of the parent body of this meteorite group can help improve our understanding of the
    evolution of early planetesimals. Here, we use 2-D and 3-D finite-difference numerical models to determine the formation
    time, initial radius of the parent body of the acapulcoite-lodranite meteorites, and their formation depth inside the
    body by applying available geochronological, thermal, and textural constraints to our numerical data. Our results indicate
    that the best fit to the data can be obtained for a parent body with 25-65 km radius, which formed around 1.3 Ma after
    calcium-aluminum-rich inclusions. The 2-D and 3-D results considering various initial temperatures and the effect of porosity
    indicate possible formation depths of the acapulcoite-lodranite meteorites of 9-19 and 14-25 km, respectively. Our data
    also suggest that other meteorite classes could form at different depths inside the same parent body, supporting recently
    proposed models (Elkins-Tanton et al.; Weiss and Elkins-Tanton).
