  year: '2018'
  pubdate: '2018-08-00'
  doi: 10.3847/1538-3881/aaccde
  abstract: We present 44 validated planets from the 10th observing campaign of the NASA K2 mission, as well as high-resolution
    spectroscopy and speckle imaging follow-up observations. These 44 planets come from an initial set of 72 vetted candidates,
    which we subjected to a validation process incorporating pixel-level analyses, light curve analyses, observational constraints,
    and statistical false positive probabilities. Our validated planet sample has median values of {R}<SUB>p</SUB> = 2.2 {R}<SUB>\oplus
    </SUB>, P <SUB>orb</SUB> = 6.9 days, {T}<SUB>eq</SUB>} = 890 K, and J = 11.2 mag. Of particular interest are four ultra-short
    period planets ({P}<SUB>orb</SUB>}≲ 1 day), 16 planets smaller than 2 {R}<SUB>\oplus </SUB>, and two planets with large
    predicted amplitude atmospheric transmission features orbiting infrared-bright stars. We also present 27 planet candidates,
    most of which are likely to be real and worthy of further observations. Our validated planet sample includes 24 new discoveries
    and has enhanced the number of currently known super-Earths ({R}<SUB>p</SUB> ≈ 1-2{R}<SUB>\oplus </SUB>), sub-Neptunes
    ({R}<SUB>p</SUB> ≈ 2-4{R}<SUB>\oplus </SUB>), and sub-Saturns ({R}<SUB>p</SUB> ≈ 4-8{R}<SUB>\oplus </SUB>) orbiting bright
    stars (J = 8-10 mag) by ∼4%, ∼17%, and ∼11%, respectively.
