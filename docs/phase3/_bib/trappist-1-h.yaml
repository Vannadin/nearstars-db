- &id790
  arxiv_id: '1908.03222'
  ads_bibcode: 2020AJ....159..123A
  title: Analytic Planetary Transit Light Curves and Derivatives for Stars with Polynomial Limb Darkening
  authors:
  - Agol, Eric
  - Luger, Rodrigo
  - Foreman-Mackey, Daniel
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.3847/1538-3881/ab4fee
  abstract: We derive analytic, closed-form solutions for the light curve of a planet transiting a star with a limb-darkening
    profile that is a polynomial function of the stellar elevation, up to an arbitrary integer order. We provide improved
    analytic expressions for the uniform, linear, and quadratic limb-darkened cases, as well as novel expressions for higher-order
    integer powers of limb darkening. The formulae are crafted to be numerically stable over the expected range of usage.
    We additionally present analytic formulae for the partial derivatives of instantaneous flux with respect to the radius
    ratio, impact parameter, and limb-darkening coefficients. These expressions are rapid to evaluate and compare quite favorably
    in speed and accuracy to existing transit light-curve codes. We also use these expressions to numerically compute the
    first partial derivatives of exposure-time-averaged transit light curves with respect to all model parameters. An additional
    application is modeling eclipsing binary or eclipsing multiple star systems in cases where the stars may be treated as
    spherically symmetric. We provide code which implements these formulae in C++, Python, IDL, and Julia, with tests and
    examples of usage (https://github.com/rodluger/Limbdark.jl).
  source: citation_of=2022AJ....163..151S
