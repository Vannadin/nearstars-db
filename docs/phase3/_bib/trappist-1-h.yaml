  ads_bibcode: 2025ApJ...986....2R
  title: 'Uncertainties in the Inference of Internal Structure: The Case of TRAPPIST-1 f'
  authors:
  - Rice, David R.
  - Huang, Chenliang
  - Steffen, Jason H.
  - Vazan, Allona
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.3847/1538-4357/add34b
  abstract: We use the TRAPPIST-1 system as a model observation of Earth-like planets. The densities of these planets being
    1%─10% less than the Earth suggest that the outer planets may host significant hydrospheres. We explore the uncertainty
    in water mass fraction (wmf) from observed mass and radius. We investigate the interior structure of TRAPPIST-1 f (T1-f)
    using the open-source solver MAGRATHEA and varying assumptions in the interior model. We find that T1-f likely has a wmf
    of 16.2% ± 9.9% when considering all possible core mass fractions, and requires 6.9% ± 2.0% water at an Earth-like mantle-to-core
    ratio. We quantify uncertainties from observational precision, model assumptions, and experimental and theoretical data
    on the bulk modulus of planet-building materials. We show that observational uncertainties are smaller than model assumptions
    of mantle mineralogy and core composition but larger than hydrosphere, temperature, and equation-of-state assumptions/uncertainties.
    Our findings show that while precise mass and radius measurements are crucial, uncertainties in planetary models can often
    outweigh those from observations, emphasizing the importance of refining both theoretical models and experimental data
    to better understand exoplanet interiors.
