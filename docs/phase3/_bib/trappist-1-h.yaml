    zero, and a density consistent with that of Earth and Venus (<inline-formula><tex-math>$\rho _\mathrm{p}=6.4\pm 2.4\,
    \mathrm{g\, cm^{-3}}$</tex-math></inline-formula>). We find that Gliese 12 b has a predominantly rocky interior and simulations
    indicate that it is unlikely to have retained any of its primordial gaseous envelope. The bulk properties of Gliese 12
