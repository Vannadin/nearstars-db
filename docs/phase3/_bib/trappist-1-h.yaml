  arxiv_id: '1701.02360'
  ads_bibcode: 2017ApJS..231...12W
  title: 'Resolving Orbital and Climate Keys of Earth and Extraterrestrial Environments with Dynamics (ROCKE-3D) 1.0: A General
    Circulation Model for Simulating the Climates of Rocky Planets'
  authors:
  - Way, M. J.
  - Aleinov, I.
  - Amundsen, David S.
  - Chandler, M. A.
  - Clune, T. L.
  - Del Genio, A. D.
  - Fujii, Y.
  - Kelley, M.
  - Kiang, N. Y.
  - Sohl, L.
  - Tsigaridis, K.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-4365/aa7a06
  abstract: Resolving Orbital and Climate Keys of Earth and Extraterrestrial Environments with Dynamics (ROCKE-3D) is a three-dimensional
    General Circulation Model (GCM) developed at the NASA Goddard Institute for Space Studies for the modeling of atmospheres
    of solar system and exoplanetary terrestrial planets. Its parent model, known as ModelE2, is used to simulate modern Earth
    and near-term paleo-Earth climates. ROCKE-3D is an ongoing effort to expand the capabilities of ModelE2 to handle a broader
    range of atmospheric conditions, including higher and lower atmospheric pressures, more diverse chemistries and compositions,
    larger and smaller planet radii and gravity, different rotation rates (from slower to more rapid than modern Earth’s,
    including synchronous rotation), diverse ocean and land distributions and topographies, and potential basic biosphere
    functions. The first aim of ROCKE-3D is to model planetary atmospheres on terrestrial worlds within the solar system such
    as paleo-Earth, modern and paleo-Mars, paleo-Venus, and Saturn’s moon Titan. By validating the model for a broad range
    of temperatures, pressures, and atmospheric constituents, we can then further expand its capabilities to those exoplanetary
    rocky worlds that have been discovered in the past, as well as those to be discovered in the future. We also discuss the
    current and near-future capabilities of ROCKE-3D as a community model for studying planetary and exoplanetary atmospheres.
