  title: JWST reveals the rapid and strong day-side variability of 55 Cancri e
  authors:
  - Patel, J. A.
  - Brandeker, A.
  - Kitzmann, D.
  - Petit dit de la Roche, D. J. M.
  - Bello-Arufe, A.
  - Heng, K.
  - Meier Valdés, E.
  - Persson, C. M.
  - Zhang, M.
  - Demory, B.-O.
  - Bourrier, V.
  - Deline, A.
  - Ehrenreich, D.
  - Fridlund, M.
  - Hu, R.
  - Lendl, M.
  - Oza, A. V.
  - Alibert, Y.
  - Hooton, M. J.
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.1051/0004-6361/202450748
  abstract: Context. The nature of the close-in rocky planet 55 Cnce is puzzling, despite it having been observed extensively.
    Its optical and infrared occultation depths show temporal variability, in addition to a phase curve variability observed
    in the optical. Aims. We wish to explore the possibility that the variability originates from the planet being in a 3:2
    spin─orbit resonance, and thus showing different sides during occultations. We proposed and were awarded Cycle 1 time
    at the James Webb Space Telescope (JWST) to test this hypothesis. Methods. JWST/NIRCam (Near Infrared Camera) observed
    five occultations (secondary eclipses) of the planet ─ of which four were observed within a week ─ simultaneously at 2.1
    and 4.5 µm. While the former gives band-integrated photometry, the latter provides a spectrum between 3.9─5.0 µm. Results.
    We find that the occultation depths in both bandpasses are highly variable and change between a non-detection (−5 ± 6
    ppm and 7 ± 9 ppm) to 96 ± 8 ppm and 119<SUB>−19</SUB><SUP>+34</SUP> ppm at 2.1 µm and 4.5 µm, respectively. Interestingly,
    the variations in both bandpasses are not correlated and do not support the 3:2 spin-orbit resonance explanation. The
    measured brightness temperature at 4.5 µm varies between 873─2256 K and is lower than the expected day-side temperature
    of bare rock with no heat redistribution (2500 K), which is indicative of an atmosphere. Our atmospheric retrieval analysis
    of occultation depth spectra at 4.5 µm finds that different visits statistically favour various atmospheric scenarios
    including a thin outgassed CO/CO<SUB>2</SUB> atmosphere and a silicate rock vapour atmosphere. Some visits even support
    a flat line model. Conclusions. The observed variability could be explained by stochastic outgassing of CO/CO<SUB>2</SUB>,
    which is also hinted at by retrievals. Alternatively, the variability observed at both 2.1 and 4.5 µm could be the result
    of a circumstellar patchy dust torus generated by volcanism on the planet.
