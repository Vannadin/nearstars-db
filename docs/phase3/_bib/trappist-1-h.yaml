- &id597
  arxiv_id: '2408.17056'
  ads_bibcode: 2024ApJ...975...14S
  title: Role of Magma Oceans in Controlling Carbon and Oxygen of Sub-Neptune Atmospheres
  authors:
  - Seo, Chanoul
  - Ito, Yuichi
