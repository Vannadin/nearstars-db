  ads_bibcode: 2013Sci...339...64W
  title: Hydrogen-Nitrogen Greenhouse Warming in Earth's Early Atmosphere
  authors:
  - Wordsworth, Robin
  - Pierrehumbert, Raymond
  year: '2013'
  pubdate: '2013-01-00'
  doi: 10.1126/science.1225759
  abstract: Understanding how Earth has sustained surface liquid water throughout its history remains a key challenge, given
    that the Sun’s luminosity was much lower in the past. Here we show that with an atmospheric composition consistent with
    the most recent constraints, the early Earth would have been significantly warmed by H<SUB>2</SUB>-N<SUB>2</SUB> collision-induced
    absorption. With two to three times the present-day atmospheric mass of N<SUB>2</SUB> and a H<SUB>2</SUB> mixing ratio
    of 0.1, H<SUB>2</SUB>-N<SUB>2</SUB> warming would be sufficient to raise global mean surface temperatures above 0°C under
    75% of present-day solar flux, with CO<SUB>2</SUB> levels only 2 to 25 times the present-day values. Depending on their
    time of emergence and diversification, early methanogens may have caused global cooling via the conversion of H<SUB>2</SUB>
    and CO<SUB>2</SUB> to CH<SUB>4</SUB>, with potentially observable consequences in the geological record.
