  title: Evidence for the volatile-rich composition of a 1.5-Earth-radius planet
  authors:
  - Piaulet, Caroline
  - Benneke, Björn
  - Almenara, Jose M.
  - Dragomir, Diana
  - Knutson, Heather A.
  - Thorngren, Daniel
  - Peterson, Merrin S.
  - Crossfield, Ian J. M.
  - Kempton, Eliza M.-R.
  - Kubyshkina, Daria
  - Howard, Andrew W.
