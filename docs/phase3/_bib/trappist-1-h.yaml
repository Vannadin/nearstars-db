  arxiv_id: '2506.14718'
  ads_bibcode: 2025AJ....170..112K
  title: 'SETI@home: Data Acquisition and Front-end Processing'
  authors:
  - Korpela, E. J.
  - Anderson, D. P.
  - Cobb, J.
  - Lebofsky, M.
  - Liu, W.
  - Werthimer, D.
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/1538-3881/ade5a7
  abstract: 'SETI@home is a radio Search for Extraterrestrial Intelligence (SETI) project, looking for technosignatures in
    data recorded at multiple observatories from 1998─2020. Most radio SETI projects analyze data using dedicated processing
    hardware. SETI@home uses a different approach: time-domain data is distributed over the internet to &gt;10<SUP>5</SUP>
    volunteered home computers, which analyze it. The large amount of computing power this affords (∼10<SUP>15</SUP> floating-point
    operations per second (FPOP s<SUP>─1</SUP>)) allows us to increase the sensitivity and generality of our search in three
    ways. We use coherent integration, a technique in which data is transformed so that the power of drifting signals is confined
    to a single discrete Fourier transform (DFT) bin. We perform this coherent search over 123,000 Doppler drift rates in
    the range (±100 Hz s<SUP>−1</SUP>). Second, we search for a variety of signal types, such as pulsed signals and arbitrary
    repeated waveforms. The analysis uses a range of DFT sizes, with frequency resolutions ranging from 0.075─1221 Hz. The
    front end of SETI@home produces a set of detections that exceed thresholds in power and goodness of fit. We accumulated
    ∼1.2 × 10<SUP>10</SUP> such detections. The back end of SETI@home takes these detections, identifies and removes radio
    frequency interference, and looks for groups of detections that are consistent with extraterrestrial origin and that persist
    over long timescales. This paper describes the front end of SETI@home and provides parameters for the primary data source,
    the Arecibo Observatory; the back end and its results are described in a companion paper. * https://setiathome.berkeley.edu/'
