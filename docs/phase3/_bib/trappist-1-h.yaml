  arxiv_id: '1301.5711'
  ads_bibcode: 2013ApJ...766...69L
  title: Computing Intrinsic LYα Fluxes of F5 V to M5 V Stars
  authors:
  - Linsky, Jeffrey L.
  - France, Kevin
  - Ayres, Tom
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1088/0004-637X/766/2/69
  abstract: The Lyα emission line dominates the far-ultraviolet spectra of late-type stars and is a major source for photodissociation
    of important molecules including H<SUB>2</SUB>O, CH<SUB>4</SUB>, and CO<SUB>2</SUB> in exoplanet atmospheres. The incident
    flux in this line illuminating an exoplanet's atmosphere cannot be measured directly as neutral hydrogen in the interstellar
    medium (ISM) attenuates most of the flux reaching the Earth. Reconstruction of the intrinsic Lyα line has been accomplished
    for a limited number of nearby stars, but is not feasible for distant or faint host stars. We identify correlations connecting
    the intrinsic Lyα flux with the flux in other emission lines formed in the stellar chromosphere, and find that these correlations
    depend only gradually on the flux in the other lines. These correlations, which are based on Hubble Space Telescope spectra,
    reconstructed Lyα line fluxes, and irradiance spectra of the quiet and active Sun, are required for photochemical models
    of exoplanet atmospheres when intrinsic Lyα fluxes are not available. We find a tight correlation of the intrinsic Lyα
    flux with stellar X-ray flux for F5 V to K5 V stars, but much larger dispersion for M stars. We also show that knowledge
    of the stellar effective temperature and rotation rate can provide reasonably accurate estimates of the Lyα flux for G
    and K stars, and less accurate estimates for cooler stars.
