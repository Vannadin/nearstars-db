  title: BANYAN. VII. A New Population of Young Substellar Candidate Members of Nearby Moving Groups from the BASS Survey
  authors:
  - Gagné, Jonathan
  - Faherty, Jacqueline K.
  - Cruz, Kelle L.
  - Lafreniére, David
  - Doyon, René
  - Malo, Lison
  - Burgasser, Adam J.
  - Naud, Marie-Eve
  - Artigau, Étienne
