  doi: 10.3847/2041-8213/ad5958
  abstract: We present two-dimensional near-infrared temperature maps of the canonical hot Jupiter WASP-43b using a phase-curve
    observation with JWST NIRSpec/G395H. From the white-light planetary transit, we improve constraints on the planet's orbital
    parameters and measure a planet-to-star radius ratio of <inline-formula> <mml:math overflow="scroll"><mml:msubsup><mml:mrow><mml:mn>0.15883</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.00053</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.00056</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula>. Using the white-light phase curve, we measure a longitude of maximum brightness of <inline-formula>
    <mml:math overflow="scroll"><mml:msubsup><mml:mrow><mml:mn>6.9</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>5</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>5</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> east of the substellar point and a phase-curve offset of <inline-formula> <mml:math overflow="scroll"><mml:msubsup><mml:mrow><mml:mn>10.0</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>8</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>8</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula>. We also find a ≍4σ detection of a latitudinal hotspot offset of <inline-formula> <mml:math overflow="scroll"><mml:mo>−</mml:mo><mml:msubsup><mml:mrow><mml:mn>13.4</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>1</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>7</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>3</mml:mn><mml:mrow><mml:mo>.°</mml:mo></mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula>, the first significant detection of a nonequatorial hotspot in an exoplanet atmosphere. We show that
    this detection is robust to variations within planetary parameter uncertainties, but only if the transit is used to improve
    constraints, showing the importance of transit observations to eclipse mapping. Maps retrieved from the NRS1 and NRS2
    detectors are similar, with hotspot locations consistent between the two detectors at the 1σ level. Our JWST data show
    brighter (hotter) nightsides and a dimmer (colder) dayside at the shorter wavelengths relative to fits to Spitzer 3.6
    and 4.5 μm phase curves. Through comparison between our phase curves and a set of general circulation models, we find
    evidence for clouds on the nightside and atmospheric drag or high metallicity reducing the eastward hotspot offset.
