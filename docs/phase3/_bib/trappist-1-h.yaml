- &id1106
  arxiv_id: null
  ads_bibcode: 2024ApJ...963L..20C
  title: Role of Planetary Radius on Atmospheric Escape of Rocky Exoplanets
  authors:
  - Chin, Laura
  - Dong, Chuanfei
  - Lingam, Manasvi
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.3847/2041-8213/ad27d8
  abstract: Large-scale characterization of exoplanetary atmospheres is on the horizon, thereby making it possible in the
    future to extract their statistical properties. In this context, by using a well-validated model in the solar system,
    we carry out 3D magnetohydrodynamic simulations to compute nonthermal atmospheric ion escape rates of unmagnetized rocky
    exoplanets as a function of their radius based on fixed stellar radiation and wind conditions. We find that the atmospheric
    escape rate is, unexpectedly and strikingly, a nonmonotonic function of the planetary radius R and that it evinces a maximum
    at R ∼ 0.7 R <SUB>⊕</SUB>. This novel nonmonotonic behavior may arise from an intricate trade-off between the cross-sectional
    area of a planet (which increases with size, boosting escape rates) and its associated escape velocity (which also increases
    with size but diminishes escape rates). Our results could guide forthcoming observations because worlds with certain values
    of R (such as R ∼ 0.7 R <SUB>⊕</SUB>) might exhibit comparatively higher escape rates when all other factors are constant.
  source: citation_of=2025ApJ...992..198J
