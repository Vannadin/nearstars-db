  abstract: Observations of the Mars upper atmosphere made from the Mars Atmosphere and Volatile Evolution (MAVEN) spacecraft
    have been used to determine the loss rates of gas from the upper atmosphere to space for a complete Mars year (16 Nov
    2014 - 3 Oct 2016). Loss rates for H and O are sufficient to remove ∼2-3 kg/s to space. By itself, this loss would be
    significant over the history of the planet. In addition, loss rates would have been greater early in history due to the
    enhanced solar EUV and more-active Sun. Integrated loss, based on current processes whose escape rates in the past are
    adjusted according to expected solar evolution, would have been as much as 0.8 bar CO<SUB>2</SUB> or 23 m global equivalent
    layer of H<SUB>2</SUB>O; these losses are likely to be lower limits due to the nature of the extrapolation of loss rates
    to the earliest times. Combined with the lack of surface or subsurface reservoirs for CO<SUB>2</SUB> that could hold remnants
    of an early, thick atmosphere, these results suggest that loss of gas to space has been the dominant process responsible
    for changing the climate of Mars from an early, warmer environment to the cold, dry one that we see today.
