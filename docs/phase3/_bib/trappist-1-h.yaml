  arxiv_id: '1401.5350'
  ads_bibcode: 2014MNRAS.439.3094B
  title: Precision radial velocities of 15 M5-M9 dwarfs
  authors:
  - Barnes, J. R.
  - Jenkins, J. S.
  - Jones, H. R. A.
  - Jeffers, S. V.
  - Rojo, P.
  - Arriagada, P.
  - Jordán, A.
  - Minniti, D.
  - Tuomi, M.
  - Pinfield, D.
  - Anglada-Escudé, G.
  year: '2014'
  pubdate: '2014-04-00'
  doi: 10.1093/mnras/stu172
  abstract: We present radial velocity measurements of a sample of M5V-M9V stars from our Red-Optical Planet Survey, operating
    at 0.652-1.025 μm. Radial velocities for 15 stars, with rms precision down to 2.5 m s<SUP>-1</SUP> over a week-long time-scale,
    are achieved using thorium-argon reference spectra. We are sensitive to planets with m<SUB>p</SUB>sin i ≥ 1.5 M<SUB>⊕</SUB>
    (3 M<SUB>⊕</SUB> at 2σ) in the classical habitable zone, and our observations currently rule out planets with m<SUB>p</SUB>sin
    i &gt; 0.5 M<SUB>J</SUB> at 0.03 au for all our targets. A total of 9 of the 15 targets exhibit rms &lt; 16 m s<SUP>-1</SUP>,
    which enables us to rule out the presence of planets with m<SUB>p</SUB>sin i &gt; 10 M<SUB>⊕</SUB> in 0.03 au orbits.
    Since the mean rotation velocity is of the order of 8 km s<SUP>-1</SUP> for an M6V star and 15 km s<SUP>-1</SUP> for M9V,
    we avoid observing only slow rotators that would introduce a bias towards low axial inclination (i ≪ 90°) systems, which
    are unfavourable for planet detection. Our targets with the highest v sin i values exhibit radial velocities significantly
    above the photon-noise-limited precision, even after accounting for v sin i. We have therefore monitored stellar activity
    via chromospheric emission from the Hα and Ca II infrared triplet lines. A clear trend of log<SUB>10</SUB>(L<SUB>Hα</SUB>/L<SUB>bol</SUB>)
    with radial velocity rms is seen, implying that significant starspot activity is responsible for the observed radial velocity
    precision floor. The implication that most late M dwarfs are significantly spotted, and hence exhibit time varying line
    distortions, indicates that observations to detect orbiting planets need strategies to reliably mitigate against the effects
    of activity-induced radial velocity variations.
