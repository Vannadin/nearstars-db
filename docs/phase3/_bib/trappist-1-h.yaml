  doi: 10.1093/mnras/stad1762
  abstract: 'The future is now - after its long-awaited launch in 2021 December, JWST began science operations in 2022 July
    and is already revolutionizing exoplanet astronomy. The Early Release Observations (ERO) programme was designed to provide
    the first images and spectra from JWST, covering a multitude of science cases and using multiple modes of each on-board
    instrument. Here, we present transmission spectroscopy observations of the hot-Saturn WASP-96 b with the Single Object
    Slitless Spectroscopy (SOSS) mode of the Near Infrared Imager and Slitless Spectrograph, observed as part of the ERO programme.
    As the SOSS mode presents some unique data reduction challenges, we provide an in-depth walk-through of the major steps
    necessary for the reduction of SOSS data: including background subtraction, correction of 1/f noise, and treatment of
    the trace order overlap. We furthermore offer potential routes to correct for field star contamination, which can occur
    due to the SOSS mode''s slitless nature. By comparing our extracted transmission spectrum with grids of atmosphere models,
    we find an atmosphere metallicity between 1× and 5× solar, and a solar carbon-to-oxygen ratio. Moreover, our models indicate
    that no grey cloud deck is required to fit WASP-96 b''s transmission spectrum, but find evidence for a slope shortward
    of 0.9 μm, which could either be caused by enhanced Rayleigh scattering or the red wing of a pressure-broadened Na feature.
    Our work demonstrates the unique capabilities of the SOSS mode for exoplanet transmission spectroscopy and presents a
    step-by-step reduction guide for this new and exciting instrument.'
