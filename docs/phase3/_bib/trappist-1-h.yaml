  ads_bibcode: 2018NatGe..11..322L
  title: Efficient cooling of rocky planets by intrusive magmatism
  authors:
  - Lourenço, Diogo L.
  - Rozel, Antoine B.
  - Gerya, Taras
  - Tackley, Paul J.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.1038/s41561-018-0094-8
  abstract: 'The Earth is in a plate tectonics regime with high surface heat flow concentrated at constructive plate boundaries.
    Other terrestrial bodies that lack plate tectonics are thought to lose their internal heat by conduction through their
    lids and volcanism: hotter planets (Io and Venus) show widespread volcanism whereas colder ones (modern Mars and Mercury)
    are less volcanically active. However, studies of terrestrial magmatic processes show that less than 20% of melt volcanically
    erupts, with most melt intruding into the crust. Signatures of large magmatic intrusions are also found on other planets.
    Yet, the influence of intrusive magmatism on planetary cooling remains unclear. Here we use numerical magmatic-thermo-mechanical
    models to simulate global mantle convection in a planetary interior. In our simulations, warm intrusive magmatism acts
    to thin the lithosphere, leading to sustained recycling of overlying crustal material and cooling of the mantle. In contrast,
    volcanic eruptions lead to a thick lithosphere that insulates the upper mantle and prevents efficient cooling. We find
    that heat loss due to intrusive magmatism can be particularly efficient compared to volcanic eruptions if the partitioning
    of heat-producing radioactive elements into the melt phase is weak. We conclude that the mode of magmatism experienced
    by rocky bodies determines the thermal and compositional evolution of their interior.'
