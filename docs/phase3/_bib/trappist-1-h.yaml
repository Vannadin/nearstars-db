  arxiv_id: '2308.05899'
  ads_bibcode: 2023ApJ...955L...7L
  title: Potential Atmospheric Compositions of TRAPPIST-1 c Constrained by JWST/MIRI Observations at 15 μm
  authors:
  - Lincowski, Andrew P.
  - Meadows, Victoria S.
  - Zieba, Sebastian
  - Kreidberg, Laura
  - Morley, Caroline
  - Gillon, Michaël
  - Selsis, Franck
  - Agol, Eric
  - Bolmont, Emeline
