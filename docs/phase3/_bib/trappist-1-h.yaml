  arxiv_id: '1502.04715'
  ads_bibcode: 2015ApJ...806..215F
  title: A Systematic Search for Transiting Planets in the K2 Data
  authors:
  - Foreman-Mackey, Daniel
  - Montet, Benjamin T.
  - Hogg, David W.
  - Morton, Timothy D.
  - Wang, Dun
  - Schölkopf, Bernhard
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1088/0004-637X/806/2/215
  abstract: Photometry of stars from the K2 extension of NASA’s Kepler mission is afflicted by systematic effects caused by
    small (few-pixel) drifts in the telescope pointing and other spacecraft issues. We present a method for searching K2 light
    curves for evidence of exoplanets by simultaneously fitting for these systematics and the transit signals of interest.
    This method is more computationally expensive than standard search algorithms but we demonstrate that it can be efficiently
    implemented and used to discover transit signals. We apply this method to the full Campaign 1 data set and report a list
    of 36 planet candidates transiting 31 stars, along with an analysis of the pipeline performance and detection efficiency
    based on artificial signal injections and recoveries. For all planet candidates, we present posterior distributions on
    the properties of each system based strictly on the transit observables.
