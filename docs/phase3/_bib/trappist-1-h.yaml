  arxiv_id: '0804.1802'
  ads_bibcode: 2008ApJ...673..283R
  title: The Structure of the Local Interstellar Medium. IV. Dynamics, Morphology, Physical Properties, and Implications of
    Cloud-Cloud Interactions
  authors:
  - Redfield, Seth
  - Linsky, Jeffrey L.
  year: '2008'
  pubdate: '2008-01-00'
  doi: 10.1086/524002
  abstract: We present an empirical dynamical model of the LISM based on 270 radial velocity measurements for 157 sight lines
    toward nearby stars. Physical parameter measurements (i.e., temperature, turbulent velocity, depletions) are available
    for 90 components, or one-third of the sample, enabling initial characterizations of the physical properties of LISM clouds.
    The model includes 15 warm clouds located within 15 pc of the Sun, each with a different velocity vector. We derive projected
    morphologies of all clouds and estimate the volume filling factor of warm partially ionized material in the LISM to be
    between ~5.5% and 19%. Relative velocities of potentially interacting clouds are often supersonic, consistent with heating,
    turbulent, and metal depletion properties. Cloud-cloud collisions may be responsible for the filamentary morphologies
    found in ~\frac{1}{3} of LISM clouds, the distribution of clouds along the boundaries of the two nearest clouds (LIC and
    G), the detailed shape and heating of the Mic Cloud, the location of nearby radio scintillation screens, and the location
    of an LISM cold cloud. Contrary to previous claims, the Sun appears to be located in the transition zone between the LIC
    and G Cloud. <P />Based on observations made with the NASA/ESA Hubble Space Telescope, obtained from the Data Archive
    at the Space Telescope Science Institute, which is operated by the Association of Universities for Research in Astronomy,
    Inc., under NASA contract NAS 5-26555. These observations are associated with programs 9525 and 10236.
