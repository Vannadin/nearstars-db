  arxiv_id: '2405.19177'
  ads_bibcode: 2024AJ....168...65L
  title: 'Exoplanet Aeronomy: A Case Study of WASP-69 b''s Variable Thermosphere'
  authors:
  - Levine, W. Garrett
  - Vissapragada, Shreyas
