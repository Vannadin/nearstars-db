  ads_bibcode: 2022ApJ...937L..17C
  title: 'GJ 1252b: A Hot Terrestrial Super-Earth with No Atmosphere'
  authors:
  - Crossfield, Ian J. M.
  - Malik, Matej
  - Hill, Michelle L.
  - Kane, Stephen R.
  - Foley, Bradford
  - Polanski, Alex S.
  - Coria, David
  - Brande, Jonathan
  - Zhang, Yanzhe
  - Wienke, Katherine
  - Kreidberg, Laura
  - Cowan, Nicolas B.
  - Dragomir, Diana
  - Gorjian, Varoujan
  - Mikal-Evans, Thomas
  - Benneke, Björn
  - Christiansen, Jessie L.
