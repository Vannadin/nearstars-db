  arxiv_id: '2012.06455'
  ads_bibcode: 2021A&A...646A.162S
  title: Internal water storage capacity of terrestrial planets and the effect of hydration on the M-R relation
  authors:
  - Shah, O.
  - Alibert, Y.
  - Helled, R.
  - Mezger, K.
  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.1051/0004-6361/202038839
  abstract: 'Context. The discovery of low density exoplanets in the super-Earth mass regime suggests that ocean planets could
    be abundant in the galaxy. Understanding the chemical interactions between water and Mg-silicates or iron is essential
    for constraining the interiors of water-rich planets. Hydration effects have, however, been mostly neglected by the astrophysics
    community so far. As such effects are unlikely to have major impacts on theoretical mass-radius relations, this is justified
    as long as the measurement uncertainties are large. However, upcoming missions, such as the PLATO mission (scheduled launch
    2026), are envisaged to reach a precision of up to ≈3 and ≈10% for radii and masses, respectively. As a result, we may
    soon enter an area in exoplanetary research where various physical and chemical effects such as hydration can no longer
    be ignored. <BR /> Aims: Our goal is to construct interior models for planets that include reliable prescriptions for
    hydration of the cores and mantles. These models can be used to refine previous results for which hydration has been neglected
    and to guide future characterization of observed exoplanets. <BR /> Methods: We have developed numerical tools to solve
    for the structure of multi-layered planets with variable boundary conditions and compositions. Here we consider three
    types of planets: dry interiors, hydrated interiors, and dry interiors plus surface ocean, where the ocean mass fraction
    corresponds to the mass fraction of the H<SUB>2</SUB>O equivalent in the hydrated case. <BR /> Results: We find H and
    OH storage capacities in the hydrated planets equivalent to 0-6 wt% H<SUB>2</SUB>O corresponding to up to ≈800 km deep
    ocean layers. In the mass range 0.1 ≤ M∕M<SUB>⊕</SUB>≤ 3, the effect of hydration on the total radius is found to be ≤2.5%,
    whereas the effect of separation into an isolated surface ocean is ≤5%. Furthermore, we find that our results are very
    sensitive to the bulk composition.'
