  ads_bibcode: 2025A&A...695A.171A
  title: 'Hot Rocks Survey I: A possible shallow eclipse for LHS 1478 b'
  authors:
  - August, P. C.
  - Buchhave, L. A.
  - Diamond-Lowe, H.
  - Mendonça, J. M.
  - Gressier, A.
  - Rathcke, A. D.
  - Allen, N. H.
  - Fortune, M.
  - Jones, K. D.
  - Meier Valdés, E. A.
  - Demory, B.-O.
  - Espinoza, N.
  - Fisher, C. E.
  - Gibson, N. P.
  - Heng, K.
