  abstract: 'We present a radial velocity (RV) analysis of TOI-1136, a bright Transiting Exoplanet Survey Satellite (TESS)
    system with six confirmed transiting planets, and a seventh single-transiting planet candidate. All planets in the system
    are amenable to transmission spectroscopy, making TOI-1136 one of the best targets for intra-system comparison of exoplanet
    atmospheres. TOI-1136 is young (∼700 Myr), and the system exhibits transit timing variations (TTVs). The youth of the
    system contributes to high stellar variability on the order of 50 m s<SUP>−1</SUP>, much larger than the likely RV amplitude
    of any of the transiting exoplanets. Utilizing 359 High Resolution Echelle Spectrometer and Automated Planet Finder RVs
    collected as part of the TESS-Keck Survey, and 51 High-Accuracy Radial velocity Planetary Searcher North RVs, we experiment
    with a joint TTV-RV fit. With seven possible transiting planets, TTVs, more than 400 RVs, and a stellar activity model,
    we posit that we may be presenting the most complex mass recovery of an exoplanet system in the literature to date. By
    combining TTVs and RVs, we minimized Gaussian process overfitting and retrieved new masses for this system: (m <SUB> b−g
    </SUB> = ${3.50}_{-0.7}^{+0.8}$ , ${6.32}_{-1.3}^{+1.1}$ , ${8.35}_{-1.6}^{+1.8}$ , ${6.07}_{-1.01}^{+1.09}$ , ${9.7}_{-3.7}^{+3.9}$
    , ${5.6}_{-3.2}^{+4.1}$ M <SUB>⊕</SUB>). We are unable to significantly detect the mass of the seventh planet candidate
    in the RVs, but we are able to loosely constrain a possible orbital period near 80 days. Future TESS observations might
    confirm the existence of a seventh planet in the system, better constrain the masses and orbital properties of the known
    exoplanets, and generally shine light on this scientifically interesting system.'
