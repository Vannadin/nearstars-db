  doi: 10.1051/0004-6361/202038160
  abstract: We report the confirmation of a transiting planet around the bright weakly active M0.5 V star TOI-1235 (TYC 4384-1735-1,
    V ≈ 11.5 mag), whose transit signal was detected in the photometric time series of sectors 14, 20, and 21 of the TESS
    space mission. We confirm the planetary nature of the transit signal, which has a period of 3.44 d, by using precise RV
    measurements with the CARMENES, HARPS-N, and iSHELL spectrographs, supplemented by high-resolution imaging and ground-based
    photometry. A comparison of the properties derived for TOI-1235 b with theoretical models reveals that the planet has
    a rocky composition, with a bulk density slightly higher than that of Earth. In particular, we measure a mass of M<SUB>p</SUB>
    = 5.9 ± 0.6 M<SUB>⊕</SUB> and a radius of R<SUB>p</SUB> = 1.69 ± 0.08 R<SUB>⊕</SUB>, which together result in a density
    of ρ<SUB>p</SUB> = 6.7<SUB>- 1.1</SUB><SUP>+ 1.3</SUP> g cm<SUP>-3</SUP>. When compared with other well-characterized
    exoplanetary systems, the particular combination of planetary radius and mass places our discovery in the radius gap,
    which is a transition region between rocky planets and planets with significant atmospheric envelopes. A few examples
    of planets occupying the radius gap are known to date. While the exact location of the radius gap for M dwarfs is still
    a matter of debate, our results constrain it to be located at around 1.7 R<SUB>⊕</SUB> or larger at the insolation levels
    received by TOI-1235 b (~60 S<SUB>⊕</SUB>). This makes it an extremely interesting object for further studies of planet
    formation and atmospheric evolution.
