- &id915
  arxiv_id: '1702.07414'
  ads_bibcode: 2017AJ....154...19B
  title: The Density of Mid-sized Kuiper Belt Objects from ALMA Thermal Observations
  authors:
  - Brown, Michael E.
  - Butler, Bryan J.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-3881/aa6346
  abstract: The densities of mid-sized Kuiper Belt objects (KBOs) are a key constraint in understanding the assembly of objects
    in the outer solar system. These objects are critical for understanding the currently unexplained transition from the
    smallest KBOs with densities lower than that of water, to the largest objects with significant rock content. Mapping this
    transition is made difficult by the uncertainties in the diameters of these objects, which maps into an even larger uncertainty
    in volume and thus density. The substantial collecting area of the Atacama Large Millimeter Array allows significantly
    more precise measurements of thermal emission from outer solar system objects and could potentially greatly improve the
    density measurements. Here we use new thermal observations of four objects with satellites to explore the improvements
    possible with millimeter data. We find that effects due to effective emissivity at millimeter wavelengths make it difficult
    to use the millimeter data directly to find diameters and thus volumes for these bodies. In addition, we find that when
    including the effects of model uncertainty, the true uncertainties on the sizes of outer solar system objects measured
    with radiometry are likely larger than those previously published. Substantial improvement in object sizes will likely
    require precise occultation measurements.
