  year: '2026'
  pubdate: '2026-02-00'
  doi: 10.3847/2041-8213/adf06f
  abstract: The transit method is currently one of our best means for the detection of potentially habitable "Earth-like"
    exoplanets. In principle, given sufficiently high photometric precision, cool Earth-sized exoplanets orbiting Sun-like
    stars could be discovered via single transit detections; however, this has not previously been achieved. In this work,
    we report a 10 hr long single transit event which occurred on the V = 10.1 K-dwarf HD 137010 during K2 Campaign 15 in
    2017. This transit is comparatively shallow (225 ± 10 ppm) but is detected at high signal-to-noise thanks to the exceptionally
    high photometric precision achieved for the target. Our analysis of the K2 photometry, historical and new imaging observations,
    and archival radial velocities and astrometry strongly indicate that the event was astrophysical, occurred on-target,
    and can be best explained by a transiting planet candidate, which we designate HD 137010 b. The single observed transit
    implies a radius of <inline-formula> <mml:math><mml:mn>1.0</mml:mn><mml:msubsup><mml:mrow><mml:mn>6</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.05</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.06</mml:mn></mml:mrow></mml:msubsup><mml:mspace></mml:mspace><mml:msub><mml:mrow><mml:mi>R</mml:mi></mml:mrow><mml:mrow><mml:mo>⊕</mml:mo></mml:mrow></mml:msub></mml:math>
    </inline-formula>, and assuming negligible orbital eccentricity we estimate an orbital period of <inline-formula> <mml:math><mml:mn>35</mml:mn><mml:msubsup><mml:mrow><mml:mn>5</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>59</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>200</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> days (<inline-formula> <mml:math><mml:mi>a</mml:mi><mml:mo>=</mml:mo><mml:mn>0.8</mml:mn><mml:msubsup><mml:mrow><mml:mn>8</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.10</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.32</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> au), properties comparable to Earth. We project an incident flux of <inline-formula> <mml:math><mml:mn>0.2</mml:mn><mml:msubsup><mml:mrow><mml:mn>9</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.13</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.11</mml:mn></mml:mrow></mml:msubsup><mml:mspace></mml:mspace><mml:msub><mml:mrow><mml:mi>I</mml:mi></mml:mrow><mml:mrow><mml:mo>⊕</mml:mo></mml:mrow></mml:msub></mml:math>
    </inline-formula>, which would place HD 137010 b near the outer edge of the habitable zone. This is the first planet candidate
    with Earth-like radius and orbital properties transiting a Sun-like star bright enough for substantial follow-up observations.
