  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.3847/1538-4357/ab822d
  abstract: The search for life on exoplanets is one of the grand scientific challenges of our time. The strategy to date
    has been to find (e.g., through transit surveys like Kepler) earthlike exoplanets in their stars' habitable zone, then
    use transmission spectroscopy to measure biosignature gases, especially oxygen, in the planets' atmospheres (e.g., using
    James Webb Space Telescope (JWST)). Already there are more such planets than can be observed by JWST, and missions like
    the Transiting Exoplanet Survey Satellite and others will find more. A better understanding of the geochemical cycles
    relevant to biosignature gases is needed, to prioritize targets for costly follow-up observations and to help design future
    missions. We define a Detectability Index to quantify the likelihood that a biosignature gas could be assigned a biological
    versus nonbiological origin. We apply this index to the case of oxygen gas, O<SUB>2</SUB>, on earthlike planets with varying
    water contents. We demonstrate that on earthlike exoplanets with 0.2 weight percent (wt%) water (I.e., no exposed continents)
    a reduced flux of bioessential phosphorus limits the export of photosynthetically produced atmospheric O<SUB>2</SUB> to
    levels indistinguishable from geophysical production by photolysis of water plus hydrogen escape. Higher water contents
    &gt;1 wt% that lead to high-pressure ice mantles further slow phosphorus cycling. Paradoxically, the maximum water content
    allowing use of O<SUB>2</SUB> as a biosignature, 0.2 wt%, is consistent with no water based on mass and radius. Thus,
    the utility of an O<SUB>2</SUB> biosignature likely requires the direct detection of both water and land on a planet.
