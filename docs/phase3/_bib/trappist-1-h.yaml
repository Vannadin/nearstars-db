  arxiv_id: '2410.22398'
  ads_bibcode: 2025AJ....169...38Z
  title: Retrievals on NIRCam Transmission and Emission Spectra of HD 189733b with PLATON 6, a GPU Code for the JWST Era
  authors:
  - Zhang, Michael
  - Paragas, Kimberly
  - Bean, Jacob L.
