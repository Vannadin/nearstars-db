  arxiv_id: '2205.06284'
  ads_bibcode: 2022ApJ...930...62G
  title: Can Carbon Fractionation Provide Evidence for Aerial Biospheres in the Atmospheres of Temperate Sub-Neptunes?
  authors:
  - Glidden, Ana
  - Seager, Sara
  - Huang, Jingcheng
  - Petkowski, Janusz J.
