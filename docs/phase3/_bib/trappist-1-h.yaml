  abstract: The future of exoplanet science is bright, as Transiting Exoplanet Survey Satellite (TESS) once again demonstrates
    with the discovery of its longest-period confirmed planet to date. We hereby present HD 21749b (TOI 186.01), a sub-Neptune
    in a 36 day orbit around a bright (V = 8.1) nearby (16 pc) K4.5 dwarf. TESS measures HD 21749b to be {2.61}<SUB>-0.16</SUB><SUP>+0.17</SUP>
