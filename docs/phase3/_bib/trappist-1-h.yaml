  doi: 10.3847/1538-4365/ac9302
  abstract: We present a catalog (status 2022 July 1) of triple and higher-order systems identified containing exoplanets
    based on data from the literature, including various analyses. We explore statistical properties of the systems with a
    focus on both the stars and the planets. So far, about 30 triple systems and one to three quadruple systems, including
    (mildly) controversial cases, have been found. The total number of planets is close to 40. All planet-hosting triple-star
    systems are highly hierarchic, consisting of a quasi-binary complemented by a distant stellar component, which is in orbit
    about the common center of mass. Furthermore, the quadruple systems are in fact pairs of close binaries ("double-doubles"),
    with one binary harboring a planet. For the different types of star-planet systems, we introduce a template for the classifications
    of planetary orbital configurations in correspondence to the hierarchy of the system and the planetary host. The data
    show that almost all stars are main-sequence stars, as expected. However, the stellar primaries tend to be more massive
    (i.e., corresponding to spectral types A, F, and G) than expected from single-star statistics, a finding also valid for
    stellar secondaries but less pronounced. Tertiary stellar components are almost exclusively low-mass stars of spectral
    type M. Almost all planets have been discovered based on either the Radial Velocity method or the Transit method. Both
    gas giants (the dominant type) and terrestrial planets (including super-Earths) have been identified. We anticipate the
    expansion of this database in the light of future planetary search missions.
