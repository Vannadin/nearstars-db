  doi: 10.3847/1538-4357/ab5521
  abstract: As the remnants of stars with initial masses ≲8 M <SUB>☉</SUB>, white dwarfs contain valuable information on the
    formation histories of stellar populations. In this paper, we use deep, high-quality, u-band photometry from the Canada-France
    Imaging Survey, griz photometry from Pan-STARRS1, as well as proper motions from Gaia DR2, to select 25,156 white dwarf
    candidates over ∼4500 deg<SUP>2</SUP> using a reduced proper motion diagram. We develop a new white dwarf population synthesis
    code that returns mock observations of the Galactic field white dwarf population for a given star formation history, while
    simultaneously taking into account the geometry of the Milky Way (MW), survey parameters, and selection effects. We use
    this model to derive the star formation histories of the thin disk, thick disk, and stellar halo. Our results show that
    the MW disk began forming stars (11.3 ± 0.5) Gyr ago, with a peak rate of (8.8 ± 1.4) M <SUB>☉</SUB> yr <SUP>-1</SUP>
    at (9.8 ± 0.4) Gyr, before a slow decline to a constant rate until the present day—consistent with recent results suggesting
    a merging event with a satellite galaxy. Studying the residuals between the data and best-fit model shows evidence for
    a slight increase in star formation over the past 3 Gyr. We fit the local fraction of helium-atmosphere white dwarfs to
    be (21 ± 3)%. Incorporating this methodology with data from future wide-field surveys such as the Large Synoptic Survey
    Telescope, Euclid, The Cosmological Advanced Survey Telescope for Optical and ultraviolet Research, and the Wide Field
    Infrared Survey Telescope should provide an unprecedented view into the formation of the MW at its earliest epoch through
    its white dwarfs.
