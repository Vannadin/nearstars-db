  arxiv_id: '1608.01435'
  ads_bibcode: 2016MNRAS.462.3979L
  title: Isotopic enrichment of forming planetary systems from supernova pollution
  authors:
  - Lichtenberg, Tim
  - Parker, Richard J.
  - Meyer, Michael R.
  year: '2016'
  pubdate: '2016-11-00'
  doi: 10.1093/mnras/stw1929
  abstract: Heating by short-lived radioisotopes (SLRs) such as <SUP>26</SUP>Al and <SUP>60</SUP>Fe fundamentally shaped the
    thermal history and interior structure of Solar system planetesimals during the early stages of planetary formation. The
    subsequent thermo-mechanical evolution, such as internal differentiation or rapid volatile degassing, yields important
    implications for the final structure, composition and evolution of terrestrial planets. SLR-driven heating in the Solar
    system is sensitive to the absolute abundance and homogeneity of SLRs within the protoplanetary disc present during the
    condensation of the first solids. In order to explain the diverse compositions found for extrasolar planets, it is important
    to understand the distribution of SLRs in active planet formation regions (star clusters) during their first few Myr of
    evolution. By constraining the range of possible effects, we show how the imprint of SLRs can be extrapolated to exoplanetary
    systems and derive statistical predictions for the distribution of <SUP>26</SUP>Al and <SUP>60</SUP>Fe based on N-body
    simulations of typical to large clusters (10<SUP>3</SUP>-10<SUP>4</SUP> stars) with a range of initial conditions. We
    quantify the pollution of protoplanetary discs by supernova ejecta and show that the likelihood of enrichment levels similar
    to or higher than the Solar system can vary considerably, depending on the cluster morphology. Furthermore, many enriched
    systems show an excess in radiogenic heating compared to Solar system levels, which implies that the formation and evolution
    of planetesimals could vary significantly depending on the birth environment of their host stars.
