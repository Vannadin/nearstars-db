  doi: 10.1111/maps.12141
  abstract: High-precision bulk aluminum-magnesium isotope measurements of calcium-aluminum-rich inclusions (&lt;fc&gt;CAI&lt;/fc&gt;s)
    from &lt;fc&gt;CV&lt;/fc&gt; carbonaceous chondrites in several laboratories define a bulk <SUP>26</SUP>Al-<SUP>26</SUP>Mg
    isochron with an inferred initial <SUP>26</SUP>Al/<SUP>27</SUP>Al ratio of approximately 5.25 × 10<SUP>-5</SUP>, named
    the canonical ratio. Nonigneous &lt;fc&gt;CV CAI&lt;/fc&gt;s yield well-defined internal <SUP>26</SUP>Al-<SUP>26</SUP>Mg
    isochrons consistent with the canonical value. These observations indicate that the canonical <SUP>26</SUP>Al/<SUP>27</SUP>Al
    ratio records initial Al/Mg fractionation by evaporation and condensation in the &lt;fc&gt;CV CAI&lt;/fc&gt;-forming region.
    The internal isochrons of igneous &lt;fc&gt;CV CAI&lt;/fc&gt;s show a range of inferred initial <SUP>26</SUP>Al/<SUP>27</SUP>Al
