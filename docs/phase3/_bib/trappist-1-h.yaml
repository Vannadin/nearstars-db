  abstract: As the closest transiting hot Jupiter to Earth, HD 189733b has been the benchmark planet for atmospheric characterization<SUP>1─3</SUP>.
    It has also been the anchor point for much of our theoretical understanding of exoplanet atmospheres from composition<SUP>4</SUP>,
    chemistry<SUP>5,6</SUP>, aerosols<SUP>7</SUP> to atmospheric dynamics<SUP>8</SUP>, escape<SUP>9</SUP> and modelling techniques<SUP>10,11</SUP>.
    Previous studies of HD 189733b have detected carbon and oxygen-bearing molecules H<SUB>2</SUB>O and CO (refs. <SUP>12,13</SUP>)
    in the atmosphere. The presence of CO<SUB>2</SUB> and CH<SUB>4</SUB> has been claimed<SUP>14,15</SUP> but later disputed<SUP>12,16,17</SUP>.
    The inferred metallicity based on these measurements, a key parameter in tracing planet formation locations<SUP>18</SUP>,
    varies from depletion<SUP>19,20</SUP> to enhancement<SUP>21,22</SUP>, hindered by limited wavelength coverage and precision
    of the observations. Here we report detections of H<SUB>2</SUB>O (13.4σ), CO<SUB>2</SUB> (11.2σ), CO (5σ) and H<SUB>2</SUB>S
    (4.5σ) in the transmission spectrum (2.4─5.0 μm) of HD 189733b. With an equilibrium temperature of about 1,200 K, H<SUB>2</SUB>O,
    CO and H<SUB>2</SUB>S are the main reservoirs for oxygen, carbon and sulfur. Based on the measured abundances of these
    three main volatile elements, we infer an atmospheric metallicity of three to five times stellar. The upper limit on the
    methane abundance at 5σ is 0.1 ppm, which indicates a low carbon-to-oxygen ratio (&lt;0.2), suggesting formation through
    the accretion of water-rich icy planetesimals. The low oxygen-to-sulfur and carbon-to-sulfur ratios also support the planetesimal
    accretion formation pathway<SUP>23</SUP>.
