  arxiv_id: '1409.2879'
  ads_bibcode: 2014ApJ...795...65J
  title: 'Planetary Population Synthesis Coupled with Atmospheric Escape: A Statistical View of Evaporation'
  authors:
  - Jin, Sheng
  - Mordasini, Christoph
  - Parmentier, Vivien
  - van Boekel, Roy
  - Henning, Thomas
  - Ji, Jianghui
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1088/0004-637X/795/1/65
  abstract: We apply hydrodynamic evaporation models to different synthetic planet populations that were obtained from a planet
    formation code based on the core-accretion paradigm. We investigated the evolution of the planet populations using several
    evaporation models, which are distinguished by the driving force of the escape flow (X-ray or EUV), the heating efficiency
    in energy-limited evaporation regimes, or both. Although the mass distribution of the planet populations is barely affected
    by evaporation, the radius distribution clearly shows a break at approximately 2 R <SUB>⊕</SUB>. We find that evaporation
    can lead to a bimodal distribution of planetary sizes and to an "evaporation valley" running diagonally downward in the
    orbital distance—planetary radius plane, separating bare cores from low-mass planets that have kept some primordial H/He.
    Furthermore, this bimodal distribution is related to the initial characteristics of the planetary populations because
    low-mass planetary cores can only accrete small primordial H/He envelopes and their envelope masses are proportional to
    their core masses. We also find that the population-wide effect of evaporation is not sensitive to the heating efficiency
    of energy-limited description. However, in two extreme cases, namely without evaporation or with a 100% heating efficiency
    in an evaporation model, the final size distributions show significant differences; these two scenarios can be ruled out
    from the size distribution of Kepler candidates.
