  ads_bibcode: 2024ApJ...970L...2C
  title: Transmission Spectroscopy of the Habitable Zone Exoplanet LHS 1140 b with JWST/NIRISS
  authors:
  - Cadieux, Charles
  - Doyon, René
  - MacDonald, Ryan J.
  - Turbet, Martin
  - Artigau, Étienne
