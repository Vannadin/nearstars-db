- &id964
  arxiv_id: '1605.05008'
  ads_bibcode: 2016ApJ...826...22K
  title: Tracking the Distribution of 26Al and 60Fe during the Early Phases of Star and Disk Evolution
  authors:
  - Kuffmeier, Michael
  - Frostholm Mogensen, Troels
  - Haugbølle, Troels
  - Bizzarro, Martin
  - Nordlund, Åke
  year: '2016'
  pubdate: '2016-07-00'
  doi: 10.3847/0004-637X/826/1/22
  abstract: The short-lived <SUP>26</SUP>Al and <SUP>60</SUP>Fe radionuclides are synthesized and expelled into the interstellar
    medium by core-collapse supernova events. The solar system’s first solids, calcium-aluminum refractory inclusions (CAIs),
    contain evidence for the former presence of the <SUP>26</SUP> Al nuclide defining the canonical <SUP>26</SUP>Al/<SUP>27</SUP>
    Al ratio of ∼ 5× {10}<SUP>-5</SUP>. A different class of objects temporally related to canonical CAIs are CAIs with fractionation
    and unidentified nuclear effects (FUN CAIs), which record a low initial <SUP>26</SUP>Al/<SUP>27</SUP>Al of 10<SUP>-6</SUP>.
    The contrasting level of <SUP>26</SUP>Al between these objects is often interpreted as reflecting the admixing of the
    <SUP>26</SUP>Al nuclides during the early formative phase of the Sun. We use giant molecular cloud scale adaptive mesh-refinement
    numerical simulations to trace the abundance of <SUP>26</SUP>Al and <SUP>60</SUP>Fe in star-forming gas during the early
    stages of accretion of individual low-mass protostars. We find that the <SUP>26</SUP>Al/<SUP>27</SUP>Al and <SUP>60</SUP>Fe/<SUP>56</SUP>Fe
    ratios of accreting gas within a vicinity of 1000 au of the stars follow the predicted decay curves of the initial abundances
    at the time of star formation without evidence of spatial or temporal heterogeneities for the first 100 kyr of star formation.
    Therefore, the observed differences in <SUP>26</SUP>Al/<SUP>27</SUP>Al ratios between FUN and canonical CAIs are likely
    not caused by admixing of supernova material during the early evolution of the proto-Sun. Selective thermal processing
    of dust grains is a more viable scenario to account for the heterogeneity in <SUP>26</SUP>Al/<SUP>27</SUP>Al ratios at
    the time of solar system formation.
