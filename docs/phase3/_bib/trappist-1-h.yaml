  arxiv_id: '2009.10438'
  ads_bibcode: 2021AJ....161....4Y
  title: 'On the Compatibility of Ground-based and Space-based Data: WASP-96 b, an Example'
  authors:
  - Yip, Kai Hou
  - Changeat, Quentin
  - Edwards, Billy
  - Morvan, Mario
  - Chubb, Katy L.
  - Tsiaras, Angelos
  - Waldmann, Ingo P.
