  doi: 10.1093/mnras/stae2336
  abstract: As exoplanet surveys reach ever-higher sensitivities and durations, planets analogous to the Solar system giant
    planets are increasingly within reach. HD 28185 is a Sun-like star known to host a <inline-formula><tex-math id="TM0001"
    notation="LaTeX">$m\sin i=6~M_\mathrm{ J}$</tex-math></inline-formula> planet on an Earth-like orbit; more recently, a
    brown dwarf with a more distant orbit has been claimed. In this work, we present a comprehensive re-analysis of the HD
    28185 system, based on 22 yr of radial velocity (RV) observations and precision Hipparcos-Gaia astrometry. We confirm
    the previous characterization of HD 28185 b as a temperate giant planet, with its <inline-formula><tex-math id="TM0002"
    notation="LaTeX">$385.92^{+0.06}_{-0.07}$</tex-math></inline-formula> d orbital period giving it an Earth-like incident
    flux. In contrast, we substantially revise the parameters of HD 28185 c; with a new mass of <inline-formula><tex-math
    id="TM0003" notation="LaTeX">$m=6.0\pm 0.6~M_\mathrm{ J}$</tex-math></inline-formula>, we reclassify this companion as
    a super-Jovian planet. HD 28185 c has an orbital period of <inline-formula><tex-math id="TM0004" notation="LaTeX">$24.9^{+1.3}_{-1.1}$</tex-math></inline-formula>
    yr, a semimajor axis of <inline-formula><tex-math id="TM0005" notation="LaTeX">$8.50^{+0.29}_{-0.26}$</tex-math></inline-formula>
    au, and a modest eccentricity of <inline-formula><tex-math id="TM0006" notation="LaTeX">$0.15\pm 0.04$</tex-math></inline-formula>,
    resulting in one of the most Saturn-like orbits of any known exoplanet. HD 28185 c lies at the current intersection of
    detection limits for RVs and direct imaging, and highlights how the discovery of giant planets at <inline-formula><tex-math
    id="TM0007" notation="LaTeX">$\approx$</tex-math></inline-formula>10 au separations is becoming increasingly routine.
