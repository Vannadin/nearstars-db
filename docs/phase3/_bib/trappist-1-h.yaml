- &id359
  arxiv_id: '2501.03844'
  ads_bibcode: 2024AJ....168..231S
  title: An Absolute Mass, Precise Age, and Hints of Planetary Winds for WASP-121A and b from a JWST NIRSpec Phase Curve
  authors:
  - Sing, David K.
  - Evans-Soma, Thomas M.
  - Rustamkulov, Zafar
  - Lothringer, Joshua D.
  - Mayne, Nathan J.
  - Schlaufman, Kevin C.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/1538-3881/ad7fe7
  abstract: We have conducted a planetary radial velocity measurement of the ultrahot Jupiter WASP-121b using JWST NIRSpec
    phase curve data. Our analysis reveals the Doppler shift of the planetary spectral lines across the full orbit, which
    shifts considerably across the detector (∼10 pixels). Using cross-correlation techniques, we have determined an overall
    planetary velocity amplitude of K <SUB>p</SUB> = 215.7 ± 1.1 km s<SUP>−1</SUP>, which is in good agreement with the expected
    value. We have also calculated the dynamical mass for both components of the system by treating it as an eclipsing double-line
    spectroscopic binary, with WASP-121A having a mass of M <SUB>⋆</SUB> = 1.330 ± 0.019 M <SUB>⊙</SUB>, while WASP-121b has
    a mass of M <SUB>p</SUB> = 1.170 ± 0.043 M <SUB>Jup</SUB>. These dynamical measurements are ∼3× more precise than previous
    estimates and do not rely on any stellar modeling assumptions that have a ∼5% systematic floor mass uncertainty. Additionally,
    we used stellar evolution modeling constrained with a stellar density and parallax measurement to determine a precise
    age for the system, found to be 1.11 ± 0.14 Gyr. Finally, we observed potential velocity differences between the two NIRSpec
    detectors, with NRS1 lower by 5.5 ± 2.2 km s<SUP>−1</SUP>. We suggest that differences can arise from day/night asymmetries
    in the thermal emission, which can lead to a sensitivity bias favoring the illuminated side of the planet, with planetary
    rotation and winds both acting to lower a measured K <SUB>P</SUB>. The planet's rotation can account for 1 km s<SUP>−1</SUP>
    of the observed velocity difference, with 4.5 ± 2.2 km s<SUP>−1</SUP> potentially attributable to vertical differences
    in wind speeds.
