  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.3847/2041-8213/addfd0
  abstract: The disintegrating ultrashort period rocky exoplanet K2-22 b periodically emits dusty clouds in a dynamically
    chaotic process resulting in a variable transit depth from 0% to 1.3%. The effluents that sublimate off the surface and
    condense out in space are probably representative of the formerly interior layers convectively transported to the molten
    surface. Transmission spectroscopy of these transiting clouds reveals spectral fingerprints of the interior composition
    of this rocky world. We used JWST's Mid-Infrared Instrument as a low-resolution slitless spectrograph to observe four
    predicted transit windows for K2-22 b. For each observation, we extracted a transmission spectrum over the spectral range
    of 4.4─11.8 μm. Over the spectral range of 4.4─8 μm, where the spectral precision is highest, we detect one transit at
    high significance and two at low significance. While the signal-to-noise ratio of the spectrum limits our ability to draw
    firm conclusions, we find that the data (1) disfavor featureless, iron-dominated core material, (2) are consistent with
    some form of magnesium silicate minerals, likely from mantle material, and (3) show a distinct and unexpected feature
    at ∼5 μm. The unexpected feature, also seen weakly in the low-significance transits, is consistent with an unknown gaseous
    absorber, possibly NO and/or CO<SUB>2</SUB>. These findings warrant further study to improve the constraints on the composition
    of this disintegrating rocky world.
