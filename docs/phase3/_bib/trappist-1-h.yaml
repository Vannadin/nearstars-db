- &id198
  arxiv_id: '1702.08618'
  ads_bibcode: 2017ApJ...837L...4R
  title: A Volcanic Hydrogen Habitable Zone
  authors:
  - Ramirez, Ramses M.
  - Kaltenegger, Lisa
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.3847/2041-8213/aa60c8
  abstract: The classical habitable zone (HZ) is the circular region around a star in which liquid water could exist on the
    surface of a rocky planet. The outer edge of the traditional N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O HZ extends out
    to nearly ∼1.7 au in our solar system, beyond which condensation and scattering by CO<SUB>2</SUB> outstrips its greenhouse
    capacity. Here, we show that volcanic outgassing of atmospheric H<SUB>2</SUB> can extend the outer edge of the HZ to ∼2.4
    au in our solar system. This wider volcanic-hydrogen HZ (N<SUB>2</SUB>-CO<SUB>2</SUB>-H<SUB>2</SUB>O-H<SUB>2</SUB>) can
    be sustained as long as volcanic H<SUB>2</SUB> output offsets its escape from the top of the atmosphere. We use a single-column
    radiative-convective climate model to compute the HZ limits of this volcanic hydrogen HZ for hydrogen concentrations between
    1% and 50%, assuming diffusion-limited atmospheric escape. At a hydrogen concentration of 50%, the effective stellar flux
    required to support the outer edge decreases by ∼35%-60% for M-A stars. The corresponding orbital distances increase by
    ∼30%-60%. The inner edge of this HZ only moves out ∼0.1%-4% relative to the classical HZ because H<SUB>2</SUB> warming
    is reduced in dense H<SUB>2</SUB>O atmospheres. The atmospheric scale heights of such volcanic H<SUB>2</SUB> atmospheres
    near the outer edge of the HZ also increase, facilitating remote detection of atmospheric signatures.
