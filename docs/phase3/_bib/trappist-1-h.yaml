  arxiv_id: '2104.14972'
  ads_bibcode: 2021A&A...650A.201R
  title: The 10 parsec sample in the Gaia era
  authors:
  - Reylé, C.
  - Jardine, K.
  - Fouqué, P.
  - Caballero, J. A.
  - Smart, R. L.
  - Sozzetti, A.
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.1051/0004-6361/202140985
  abstract: 'Context. The nearest stars provide a fundamental constraint for our understanding of stellar physics and the
    Galaxy. The nearby sample serves as an anchor where all objects can be seen and understood with precise data. This work
    is triggered by the most recent data release of the astrometric space mission Gaia and uses its unprecedented high precision
    parallax measurements to review the census of objects within 10 pc. <BR /> Aims: The first aim of this work was to compile
    all stars and brown dwarfs within 10 pc observable by Gaia and compare it with the Gaia Catalogue of Nearby Stars as a
    quality assurance test. We complement the list to get a full 10 pc census, including bright stars, brown dwarfs, and exoplanets.
    <BR /> Methods: We started our compilation from a query on all objects with a parallax larger than 100 mas using the Set
    of Identifications, Measurements, and Bibliography for Astronomical Data database (SIMBAD). We completed the census by
    adding companions, brown dwarfs with recent parallax measurements not in SIMBAD yet, and vetted exoplanets. The compilation
    combines astrometry and photometry from the recent Gaia Early Data Release 3 with literature magnitudes, spectral types,
    and line-of-sight velocities. <BR /> Results: We give a description of the astrophysical content of the 10 pc sample.
    We find a multiplicity frequency of around 27%. Among the stars and brown dwarfs, we estimate that around 61% are M stars
    and more than half of the M stars are within the range from M3.0 V to M5.0 V. We give an overview of the brown dwarfs
    and exoplanets that should be detected in the next Gaia data releases along with future developments. <BR /> Conclusions:
    We provide a catalogue of 540 stars, brown dwarfs, and exoplanets in 339 systems, within 10 pc from the Sun. This list
    is as volume-complete as possible from current knowledge and it provides benchmark stars that can be used, for instance,
    to define calibration samples and to test the quality of the forthcoming Gaia releases. It also has a strong outreach
    potential. <P />The animation and a zoomable version of Fig. B.1 are available at <A href="https://www.aanda.org/10.1051/0004-6361/202140985/olm">https://www.aanda.org</A>
    <P />Table A.1 is only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/650/A201">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/650/A201</A>,
    at <A href="https://gruze.org/10pc/">https://gruze.org/10pc/</A>, and at <A href="https://gucds.inaf.it/">https://gucds.inaf.it/</A>'
