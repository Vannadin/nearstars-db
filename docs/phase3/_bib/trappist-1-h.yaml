  arxiv_id: '1410.2112'
  ads_bibcode: 2015MNRAS.446..345M
  title: 'The effect of Lyman α radiation on mini-Neptune atmospheres around M stars: application to GJ 436b'
  authors:
  - Miguel, Yamila
  - Kaltenegger, Lisa
  - Linsky, Jeffrey L.
  - Rugheimer, Sarah
  year: '2015'
  pubdate: '2015-01-00'
  doi: 10.1093/mnras/stu2107
  abstract: Mini-Neptunes orbiting M stars are a growing population of known exoplanets. Some of them are located very close
    to their host star, receiving large amounts of UV radiation. Many M stars emit strong chromospheric emission in the H
    I Lyman α line (Lyα) at 1215.67 Å, the brightest far-UV emission line. We show that the effect of incoming Lyα flux can
    significantly change the photochemistry of mini-Neptunes' atmospheres. We use GJ 436b as an example, considering different
    metallicities for its atmospheric composition. For solar composition, H<SUB>2</SUB>O-mixing ratios show the largest change
    because of Lyα radiation. H<SUB>2</SUB>O absorbs most of this radiation, thereby shielding CH<SUB>4</SUB>, whose dissociation
    is driven mainly by radiation at other far-UV wavelengths (∼1300 Å). H<SUB>2</SUB>O photolysis also affects other species
    in the atmosphere, including H, H<SUB>2</SUB>, CO<SUB>2</SUB>, CO, OH and O. For an atmosphere with high metallicity,
    H<SUB>2</SUB>O- and CO<SUB>2</SUB>-mixing ratios show the biggest change, thereby shielding CH<SUB>4</SUB>. Direct measurements
    of the UV flux of the host stars are important for understanding the photochemistry in exoplanets' atmospheres. This is
    crucial, especially in the region between 1 and 10<SUP>-6</SUP> bars, which is the part of the atmosphere that generates
    most of the observable spectral features.
