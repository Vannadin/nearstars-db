  ads_bibcode: 2013M&PS...48.1383K
  title: <SUP>26</SUP>Al-<SUP>26</SUP>Mg isotope systematics of the first solids in the early solar system
  authors:
  - Kita, Noriko T.
  - Yin, Qing-Zhu
  - MacPherson, Glenn J.
  - Ushikubo, Takayuki
  - Jacobsen, Benjamin
  - Nagashima, Kazuhide
  - Kurahashi, Erika
