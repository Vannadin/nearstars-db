  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.3847/0067-0049/224/1/2
  abstract: 'The K2 Mission uses the Kepler spacecraft to obtain high-precision photometry over ≈80 day campaigns in the ecliptic
    plane. The Ecliptic Plane Input Catalog (EPIC) provides coordinates, photometry, and kinematics based on a federation
    of all-sky catalogs to support target selection and target management for the K2 mission. We describe the construction
    of the EPIC, as well as modifications and shortcomings of the catalog. Kepler magnitudes (Kp) are shown to be accurate
    to ≈0.1 mag for the Kepler field, and the EPIC is typically complete to Kp ≈ 17 (Kp ≈ 19 for campaigns covered by Sloan
    Digital Sky Survey). We furthermore classify 138,600 targets in Campaigns 1-8 (≈88% of the full target sample) using colors,
    proper motions, spectroscopy, parallaxes, and galactic population synthesis models, with typical uncertainties for G-type
    stars of ≈3% in {T}<SUB>{{eff</SUB>}}, ≈0.3 dex in {log} g, ≈40% in radius, ≈10% in mass, and ≈40% in distance. Our results
    show that stars targeted by K2 are dominated by K-M dwarfs (≈41% of all selected targets), F-G dwarfs (≈36%), and K giants
    (≈21%), consistent with key K2 science programs to search for transiting exoplanets and galactic archeology studies using
    oscillating red giants. However, we find significant variation of the fraction of cool dwarfs with galactic latitude,
    indicating a target selection bias due to interstellar reddening and increased contamination by giant stars near the galactic
    plane. We discuss possible systematic errors in the derived stellar properties, and differences with published classifications
    for K2 exoplanet host stars. The EPIC is hosted at the Mikulski Archive for Space Telescopes (MAST): <A href="http://archive.stsci.edu/k2/epic/search.php">http://archive.stsci.edu/k2/epic/search.php</A>.'
