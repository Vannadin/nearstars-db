- &id553
  arxiv_id: '2509.17231'
  ads_bibcode: 2025ApJ...995L..39T
  title: A Thick Volatile Atmosphere on the Ultrahot Super-Earth TOI-561 b
  authors:
  - Teske, Johanna K.
  - Wallack, Nicole L.
  - Piette, Anjali A. A.
  - Dang, Lisa
  - Lichtenberg, Tim
  - Plotnykov, Mykhaylo
  - Pierrehumbert, Raymond
  - Postolec, Emma
  - Boucher, Samuel
  - McGinty, Alex
  - Peng, Bo
  - Valencia, Diana
  - Hammond, Mark
  year: '2025'
  pubdate: '2025-12-00'
  doi: 10.3847/2041-8213/ae0a4c
  abstract: Ultrashort-period (USP) exoplanets—with R<SUB>p</SUB> ≤ 2R<SUB>⊕</SUB> and periods ≤1 day—are expected to be stripped
    of volatile atmospheres by intense host star irradiation, which is corroborated by their nominal bulk densities and previous
    eclipse observations, consistent with bare-rock surfaces. However, a few USP planets appear anomalously underdense relative
    to an Earth-like composition, suggesting an exotic interior structure (e.g., coreless) or a volatile-rich secondary atmosphere
    increasing their apparent radius. Here, we present the first dayside emission spectrum of the low-density (4.3 ± 0.4 g
    cm<SUP>−3</SUP>) USP planet TOI-561 b, which orbits an iron-poor, alpha-rich, ∼10 Gyr old thick-disk star. Our 3─5 μm
    JWST/NIRSpec observations demonstrate the dayside of TOI-561 b is inconsistent with a bare-rock surface at high statistical
    significance, suggesting instead a thick volatile envelope that is cooling the dayside to well below the ∼3000 K expected
    in the bare-rock or thin-atmosphere case. These results reject the popular hypothesis of complete atmospheric desiccation
    for highly irradiated exoplanets and support predictions that planetary-scale magma oceans can retain substantial reservoirs
    of volatiles, opening up the geophysical study of ultrahot super-Earths through the lenses of their atmospheres.
