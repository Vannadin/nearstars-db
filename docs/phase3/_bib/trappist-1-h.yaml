  ads_bibcode: 2017NatSR...744095C
  title: A decade of global volcanic SO<SUB>2</SUB> emissions measured from space
  authors:
  - Carn, S. A.
  - Fioletov, V. E.
  - McLinden, C. A.
  - Li, C.
