  year: '2025'
  pubdate: '2025-02-00'
  doi: 10.1051/0004-6361/202452405
  abstract: Transit spectroscopy usually relies on the integration of one or several transits to achieve the signal-to-noise
    ratio (S/N) necessary to resolve spectral features. Consequently, high-S/N observations of exoplanet atmospheres, where
    we can forgo integration, are essential for disentangling the complex chemistry and dynamics beyond global trends. In
    this study, we combined two partial 4-UT transits of the ultrahot Jupiter WASP-121 b, observed with the ESPRESSO at the
    European Southern Observatory's Very Large Telescope in order to revisit its titanium chemistry. Through cross-correlation
    analysis, we achieved detections of H I, Li I, Na I, K I, Mg I, Ca I, Ti I, V I, Cr I, Mn I, Fe I, Fe II, Co I, Ni I,
    Ba II, Sr I, and Sr II. Additionally, narrow-band spectroscopy allowed us to resolve strong single lines, resulting in
    significant detections of Hα, Hβ, Hγ, Li I, Na I, K I, Mg I, Ca II, Sr I, Sr II, and Mn I. Our most notable finding is
    the high-significance detection of Ti I (∼5σ per spectrum, and ∼19σ stacked in the planetary rest frame). Comparison with
    atmospheric models reveals that Ti I is indeed depleted compared to V I. We also resolve the planetary velocity traces
    of both Ti I and V I, with Ti I exhibiting a significant blueshift toward the end of the transit. This suggests that Ti
    I primarily originates from low-latitude regions within the super-rotating jet observed in WASP-121 b. Our observations
    suggest limited mixing between the equatorial jet and the mid-latitudes, in contrast with model predictions from General
    Circulation Models. We also report the non-detection of TiO, which we attribute to inaccuracies in the line list that
    could hinder its detection, even if present. Thus, the final determination of the presence of TiO must await space-based
    observations. We conclude that the 4-UT mode of ESPRESSO is an excellent testbed for achieving high S/N on relatively
    faint targets, paving the way for future observations with the Extremely Large Telescope.
