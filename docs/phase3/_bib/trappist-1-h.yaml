- &id1059
  arxiv_id: '1304.0460'
  ads_bibcode: 2013ApJ...770...69P
  title: A Plateau in the Planet Population below Twice the Size of Earth
  authors:
  - Petigura, Erik A.
  - Marcy, Geoffrey W.
  - Howard, Andrew W.
  year: '2013'
  pubdate: '2013-06-00'
  doi: 10.1088/0004-637X/770/1/69
  abstract: We carry out an independent search of Kepler photometry for small transiting planets with sizes 0.5-8.0 times
    that of Earth and orbital periods between 5 and 50 days, with the goal of measuring the fraction of stars harboring such
    planets. We use a new transit search algorithm, TERRA, optimized to detect small planets around photometrically quiet
    stars. We restrict our stellar sample to include the 12,000 stars having the lowest photometric noise in the Kepler survey,
    thereby maximizing the detectability of Earth-size planets. We report 129 planet candidates having radii less than 6 R<SUB>E</SUB>
    found in three years of Kepler photometry (quarters 1-12). Forty-seven of these candidates are not in Batalha et al.,
    which only analyzed photometry from quarters 1-6. We gather Keck HIRES spectra for the majority of these targets leading
    to precise stellar radii and hence precise planet radii. We make a detailed measurement of the completeness of our planet
    search. We inject synthetic dimmings from mock transiting planets into the actual Kepler photometry. We then analyze that
    injected photometry with our TERRA pipeline to assess our detection completeness for planets of different sizes and orbital
    periods. We compute the occurrence of planets as a function of planet radius and period, correcting for the detection
    completeness as well as the geometric probability of transit, R <SUB>sstarf</SUB>/a. The resulting distribution of planet
    sizes exhibits a power law rise in occurrence from 5.7 R<SUB>E</SUB> down to 2 R<SUB>E</SUB> , as found in Howard et al.
    That rise clearly ends at 2 R<SUB>E</SUB> . The occurrence of planets is consistent with constant from 2 R<SUB>E</SUB>
    toward 1 R<SUB>E</SUB> . This unexpected plateau in planet occurrence at 2 R<SUB>E</SUB> suggests distinct planet formation
    processes for planets above and below 2 R<SUB>E</SUB> . We find that 15.1^{+1.8}_{-2.7}% of solar type stars—roughly one
    in six—has a 1-2 R<SUB>E</SUB> planet with P = 5-50 days.
