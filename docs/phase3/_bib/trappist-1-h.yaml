  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.3847/0067-0049/224/1/12
  abstract: We present the seventh Kepler planet candidate (PC) catalog, which is the first catalog to be based on the entire,
    uniformly processed 48-month Kepler data set. This is the first fully automated catalog, employing robotic vetting procedures
    to uniformly evaluate every periodic signal detected by the Q1-Q17 Data Release 24 (DR24) Kepler pipeline. While we prioritize
    uniform vetting over the absolute correctness of individual objects, we find that our robotic vetting is overall comparable
    to, and in most cases superior to, the human vetting procedures employed by past catalogs. This catalog is the first to
    utilize artificial transit injection to evaluate the performance of our vetting procedures and to quantify potential biases,
    which are essential for accurate computation of planetary occurrence rates. With respect to the cumulative Kepler Object
    of Interest (KOI) catalog, we designate 1478 new KOIs, of which 402 are dispositioned as PCs. Also, 237 KOIs dispositioned
    as false positives (FPs) in previous Kepler catalogs have their disposition changed to PC and 118 PCs have their disposition
    changed to FPs. This brings the total number of known KOIs to 8826 and PCs to 4696. We compare the Q1-Q17 DR24 KOI catalog
    to previous KOI catalogs, as well as ancillary Kepler catalogs, finding good agreement between them. We highlight new
    PCs that are both potentially rocky and potentially in the habitable zone of their host stars, many of which orbit solar-type
    stars. This work represents significant progress in accurately determining the fraction of Earth-size planets in the habitable
    zone of Sun-like stars. The full catalog is publicly available at the NASA Exoplanet Archive.
