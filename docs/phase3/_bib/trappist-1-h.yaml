  abstract: We confirm the planetary nature of two transiting hot Jupiters discovered by the Kepler spacecraft’s K2 extended
    mission in its Campaign 4, using precise radial velocity measurements from FIES@NOT, HARPS-N@TNG, and the coudé spectrograph
    on the McDonald Observatory 2.7 m telescope. K2-29 b (EPIC 211089792b) transits a K1V star with a period of 3.2589263
    ± 0.0000015 days; its orbit is slightly eccentric (e={0.084}<SUB>-0.023</SUB><SUP>+0.032</SUP>). It has a radius of {R}<SUB>P</SUB>={1.000}<SUB>-0.067</SUB><SUP>+0.071</SUP>
    R<SUB>J</SUB> and a mass of {M}<SUB>P</SUB>={0.613}<SUB>-0.026</SUB><SUP>+0.027</SUP> M<SUB>J</SUB>. Its host star exhibits
    significant rotational variability, and we measure a rotation period of {P}<SUB>{rot</SUB>}=10.777+/- 0.031 days. K2-30
    b (EPIC 210957318 b) transits a G6V star with a period of 4.098503 ± 0.000011 days. It has a radius of {R}<SUB>P</SUB>={1.039}<SUB>-0.051</SUB><SUP>+0.050</SUP>
    R<SUB>J</SUB> and a mass of {M}<SUB>P</SUB>={0.579}<SUB>-0.027</SUB><SUP>+0.028</SUP> M<SUB>J</SUB>. The star has a low
    metallicity for a hot Jupiter host, [{Fe}/{{H}}]=-0.15+/- 0.05.
