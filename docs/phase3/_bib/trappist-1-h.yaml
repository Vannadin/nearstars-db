  doi: 10.3847/1538-3881/ad3068
  abstract: JWST has ushered in an era of unprecedented ability to characterize exoplanetary atmospheres. While there are
    over 5000 confirmed planets, more than 4000 Transiting Exoplanet Survey Satellite (TESS) planet candidates are still unconfirmed
    and many of the best planets for atmospheric characterization may remain to be identified. We present a sample of TESS
    planets and planet candidates that we identify as "best-in-class" for transmission and emission spectroscopy with JWST.
    These targets are sorted into bins across equilibrium temperature T <SUB>eq</SUB> and planetary radius R <SUB>p</SUB>
    and are ranked by a transmission and an emission spectroscopy metric (TSM and ESM, respectively) within each bin. We perform
    cuts for expected signal size and stellar brightness to remove suboptimal targets for JWST. Of the 194 targets in the
    resulting sample, 103 are unconfirmed TESS planet candidates, also known as TESS Objects of Interest (TOIs). We perform
    vetting and statistical validation analyses on these 103 targets to determine which are likely planets and which are likely
    false positives, incorporating ground-based follow-up from the TESS Follow-up Observation Program to aid the vetting and
    validation process. We statistically validate 18 TOIs, marginally validate 31 TOIs to varying levels of confidence, deem
    29 TOIs likely false positives, and leave the dispositions for four TOIs as inconclusive. Twenty-one of the 103 TOIs were
    confirmed independently over the course of our analysis. We intend for this work to serve as a community resource and
    motivate formal confirmation and mass measurements of each validated planet. We encourage more detailed analysis of individual
    targets by the community.
