  ads_bibcode: 2016GeoRL..43.5926C
  title: 'The electric wind of Venus: A global and persistent "polar wind"-like ambipolar electric field sufficient for the
    direct escape of heavy ionospheric ions'
  authors:
  - Collinson, Glyn A.
  - Frahm, Rudy A.
  - Glocer, Alex
  - Coates, Andrew J.
  - Grebowsky, Joseph M.
  - Barabash, Stas
  - Domagal-Goldman, Shawn D.
  - Fedorov, Andrei
  - Futaana, Yoshifumi
  - Gilbert, Lin K.
  - Khazanov, George
  - Nordheim, Tom A.
  - Mitchell, David
  - Moore, Thomas E.
  - Peterson, William K.
  - Winningham, John D.
  - Zhang, Tielong L.
  year: '2016'
  pubdate: '2016-06-00'
  doi: 10.1002/2016GL068327
  abstract: Understanding what processes govern atmospheric escape and the loss of planetary water is of paramount importance
    for understanding how life in the universe can exist. One mechanism thought to be important at all planets is an "ambipolar"
    electric field that helps ions overcome gravity. We report the discovery and first quantitative extraterrestrial measurements
    of such a field at the planet Venus. Unexpectedly, despite comparable gravity, we show the field to be five times stronger
    than in Earth's similar ionosphere. Contrary to our understanding, Venus would still lose heavy ions (including oxygen
    and all water-group species) to space, even if there were no stripping by the solar wind. We therefore find that it is
    possible for planets to lose heavy ions to space entirely through electric forces in their ionospheres and such an "electric
    wind" must be considered when studying the evolution and potential habitability of any planet in any star system.
