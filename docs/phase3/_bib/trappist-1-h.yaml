  ads_bibcode: 2018AsBio..18..663S
  title: 'Exoplanet Biosignatures: A Review of Remotely Detectable Signs of Life'
  authors:
  - Schwieterman, Edward W.
  - Kiang, Nancy Y.
  - Parenteau, Mary N.
  - Harman, Chester E.
  - DasSarma, Shiladitya
