  arxiv_id: '2006.09068'
  ads_bibcode: 2020MNRAS.496.3755K
  title: 'Formation of aqua planets with water of nebular origin: effects of water enrichment on the structure and mass of
    captured atmospheres of terrestrial planets'
  authors:
  - Kimura, Tadahiro
  - Ikoma, Masahiro
  year: '2020'
  pubdate: '2020-08-00'
  doi: 10.1093/mnras/staa1778
  abstract: Recent detection of exoplanets with Earth-like insolation attracts growing interest in how common Earth-like aqua
    planets are beyond the Solar system. While terrestrial planets are often assumed to capture icy or water-rich planetesimals,
    a primordial atmosphere of nebular origin itself can produce water through oxidation of the atmospheric hydrogen with
    oxidizing minerals from incoming planetesimals or the magma ocean. Thermodynamically, normal oxygen buffers produce water
    comparable in mole number equal to or more than hydrogen. Thus, the primordial atmosphere would likely be highly enriched
    with water vapour; however, the primordial atmospheres have been always assumed to have the solar abundances. Here we
    integrate the 1D structure of such an enriched atmosphere of sub-Earths embedded in a protoplanetary disc around an M
    dwarf of 0.3 $\, \mathrm{M}_\odot$ and investigate the effects of water enrichment on the atmospheric properties with
    focus on water amount. We find that the well-mixed highly enriched atmosphere is more massive by a few orders of magnitude
    than the solar-abundance atmosphere, and that even a Mars-mass planet can obtain water comparable to the present Earth's
    oceans. Although close-in Mars-mass planets likely lose the captured water via disc dispersal and photoevaporation, these
    results suggest that there are more sub-Earths with Earth-like water contents than previously predicted. How much water
    terrestrial planets really obtain and retain against subsequent loss, however, depends on efficiencies of water production,
    mixing in the atmosphere and magma ocean, and photoevaporation, detailed investigation for which should be made in the
    future.
  source: citation_of=2022A&A...658A.133G
