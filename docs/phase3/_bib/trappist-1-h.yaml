  arxiv_id: '1210.0531'
  ads_bibcode: 2012A&A...547A..18E
  title: Hint of a transiting extended atmosphere on 55 Cancri b
  authors:
  - Ehrenreich, D.
  - Bourrier, V.
  - Bonfils, X.
  - Lecavelier des Etangs, A.
  - Hébrard, G.
  - Sing, D. K.
  - Wheatley, P. J.
  - Vidal-Madjar, A.
