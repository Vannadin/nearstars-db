  arxiv_id: '2408.12639'
  ads_bibcode: 2024AJ....168..179L
  title: The JWST/NIRISS Deep Spectroscopic Survey for Young Brown Dwarfs and Free-floating Planets
  authors:
  - Langeveld, Adam B.
  - Scholz, Aleks
  - Mužić, Koraljka
  - Jayawardhana, Ray
  - Capela, Daniel
  - Albert, Loïc
