  title: 'Refining the Transit-timing and Photometric Analysis of TRAPPIST-1: Masses, Radii, Densities, Dynamics, and Ephemerides'
  authors:
  - Agol, Eric
  - Dorn, Caroline
  - Grimm, Simon L.
  - Turbet, Martin
  - Ducrot, Elsa
  - Delrez, Laetitia
  - Gillon, Michaël
  - Demory, Brice-Olivier
  - Burdanov, Artem
