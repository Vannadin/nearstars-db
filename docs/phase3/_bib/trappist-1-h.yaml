- arxiv_id: '2404.15433'
  ads_bibcode: 2024RvMG...90..559F
  title: 'Exoplanet Geology: What Can We Learn from Current and Future Observations?'
  authors:
  - Foley, Bradford J.
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.2138/rmg.2024.90.15
  abstract: OVERVIEW Nearly 30 years after the discovery of the first exoplanet around a main sequence star, thousands of
    planets have now been confirmed. These discoveries have completely revolutionized our understanding of planetary systems,
    revealing types of planets that do not exist in our solar system but are common in extrasolar systems, and a wide range
    of system architectures. Our solar system is clearly not the default for planetary systems. The community is now moving
    beyond basic characterization of exoplanets (mass, radius, and orbits) towards a deeper characterization of their atmospheres
    and even surfaces. With improved observational capabilities there is potential to now probe the geology of rocky exoplanets;
    this raises the possibility of an analogous revolution in our understanding of rocky planet evolution. However, characterizing
    the geology or geological processes occurring on rocky exoplanets is a major challenge, even with next generation telescopes.
    This chapter reviews what we may be able to accomplish with these efforts in the near-term and long-term. In the near-term,
    the James Webb Space Telescope (JWST) is revealing which rocky planets lose versus retain their atmospheres. This chapter
    discusses the implications of such discoveries, including how even planets with no or minimal atmospheres can still provide
    constraints on surface geology and long-term geological evolution. Longer-term possibilities are then reviewed, including
    whether the hypothesis of climate stabilization by the carbonate-silicate cycle can be tested by next generation telescopes.
    New modeling strategies sweeping through ranges of possibly evolutionary scenarios will be needed to use the current and
    future observations to constrain rocky exoplanet geology and evolution.
