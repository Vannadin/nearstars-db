  title: 'JWST TRAPPIST-1 e/b Program: Motivation and First Observations'
  authors:
  - Allen, Natalie H.
  - Espinoza, Néstor
  - Boehm, V. A.
  - Cañas, Caleb I.
  - Stevenson, Kevin B.
  - Lewis, Nikole K.
