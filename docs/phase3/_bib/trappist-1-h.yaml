- &id929
  arxiv_id: '1703.03811'
  ads_bibcode: 2017ApJ...838...73M
  title: Surface Gravities for 228 M, L, and T Dwarfs in the NIRSPEC Brown Dwarf Spectroscopic Survey
  authors:
  - Martin, Emily C.
  - Mace, Gregory N.
  - McLean, Ian S.
  - Logsdon, Sarah E.
  - Rice, Emily L.
  - Kirkpatrick, J. Davy
  - Burgasser, Adam J.
  - McGovern, Mark R.
  - Prato, Lisa
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.3847/1538-4357/aa6338
  abstract: We combine 131 new medium-resolution (R ∼ 2000) J-band spectra of M, L, and T dwarfs from the Keck NIRSPEC Brown
    Dwarf Spectroscopic Survey (BDSS) with 97 previously published BDSS spectra to study surface-gravity-sensitive indices
    for 228 low-mass stars and brown dwarfs spanning spectral types M5-T9. Specifically, we use an established set of spectral
    indices to determine surface gravity classifications for all of the M6-L7 objects in our sample by measuring the equivalent
    widths (EW) of the K I lines at 1.1692, 1.1778, and 1.2529 μm, and the 1.2 μm FeH<SUB> J </SUB> absorption index. Our
    results are consistent with previous surface gravity measurements, showing a distinct double peak—at ∼L5 and T5—in K I
