  arxiv_id: '2407.12456'
  ads_bibcode: 2025AJ....170..105S
  title: Seasonal Changes in the Atmosphere of HD 80606 b Observed with JWST's NIRSpec/G395H
  authors:
  - Sikora, James T.
  - Rowe, Jason F.
  - Splinter, Jared
  - Barat, Saugata
  - Dang, Lisa
  - Cowan, Nicolas B.
  - Barclay, Thomas
  - Colón, Knicole D.
  - Désert, Jean-Michel
  - Kane, Stephen R.
  - Llama, Joe
  - Shivkumar, Hinna
  - Stassun, Keivan G.
  - Quintana, Elisa V.
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.3847/1538-3881/addfda
  abstract: High-eccentricity gas giant planets serve as unique laboratories for studying the thermal and chemical properties
    of H/He-dominated atmospheres. One of the most extreme cases is HD 80606 b—a hot Jupiter orbiting a Sun-like star with
    an eccentricity of 0.93—which experiences an increase in incident flux of nearly 3 orders of magnitude as the star─planet
    separation decreases from 0.88 au at apoastron to 0.03 au at periastron. We observed the planet's periastron passage using
    JWST's NIRSpec/G395H instrument (2.8─5.2 μm) during a 21 hr window centered on the eclipse. We find that, as the planet
    passes through periastron, its emission spectrum transitions from a featureless blackbody to one in which CO, CH<SUB>4</SUB>,
    and H<SUB>2</SUB>O absorption features are visible. We detect CH<SUB>4</SUB> during postperiapse phases at 4.1─10.7σ depending
    on the phase and on whether a flux offset is included to account for NRS1 detector systematics. Following periapse, H<SUB>2</SUB>O
    and CO are also detected at 4.2─5.5σ and 3.7─4.4σ, respectively. Furthermore, we rule out the presence of a strong temperature
    inversion near the IR photosphere based on the lack of obvious emission features throughout the observing window. General
    circulation models had predicted an inversion during periapse passage. Our study demonstrates the feasibility of studying
    hot Jupiter atmospheres using partial phase curves obtained with NIRSpec/G395H.
