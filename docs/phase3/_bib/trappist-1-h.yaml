- &id614
  arxiv_id: '2401.12378'
  ads_bibcode: 2024MNRAS.531.3698H
  title: 'Shallower radius valley around low-mass hosts: evidence for icy planets, collisions, or high-energy radiation scatter'
  authors:
  - Ho, Cynthia S. K.
  - Rogers, James G.
  - Van Eylen, Vincent
  - Owen, James E.
  - Schlichting, Hilke E.
  year: '2024'
  pubdate: '2024-07-00'
  doi: 10.1093/mnras/stae1376
  abstract: 'The radius valley, i.e. a dearth of planets with radii between 1.5 and 2 Earth radii, provides insights into
    planetary formation and evolution. Using homogenously revised planetary parameters from Kepler 1-min short cadence light
    curves, we remodel transits of 72 small planets mostly orbiting low-mass stars, improving the precision and accuracy of
    planet parameters. By combining this sample with a similar sample of planets around higher mass stars, we determine the
    depth of the radius valley as a function of stellar mass. We find that the radius valley is shallower for low-mass stars
    compared to their higher mass counterparts. Upon comparison, we find that theoretical models of photoevaporation underpredict
    the number of planets observed inside the radius valley for low-mass stars: with decreasing stellar mass, the predicted
    fraction of planets inside the valley remains approximately constant whereas the observed fraction increases. We argue
    that this provides evidence for the presence of icy planets around low-mass stars. Alternatively, planets orbiting low-mass
    stars undergo more frequent collisions and scatter in the stars'' high-energy output may also cause planets to fill the
    valley. We predict that more precise mass measurements for planets orbiting low-mass stars would be able to distinguish
    between these scenarios.'
  source: citation_of=2024A&A...688A..59P
