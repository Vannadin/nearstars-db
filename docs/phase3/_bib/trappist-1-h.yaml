  arxiv_id: '1509.00041'
  ads_bibcode: 2015ApJ...812...46T
  title: A Machine Learning Technique to Identify Transit Shaped Signals
  authors:
  - Thompson, Susan E.
  - Mullally, Fergal
  - Coughlin, Jeff
  - Christiansen, Jessie L.
  - Henze, Christopher E.
  - Haas, Michael R.
  - Burke, Christopher J.
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1088/0004-637X/812/1/46
  abstract: We describe a new metric that uses machine learning to determine if a periodic signal found in a photometric time
    series appears to be shaped like the signature of a transiting exoplanet. This metric uses dimensionality reduction and
    k-nearest neighbors to determine whether a given signal is sufficiently similar to known transits in the same data set.
    This metric is being used by the Kepler Robovetter to determine which signals should be part of the Q1-Q17 DR24 catalog
    of planetary candidates. The Kepler Mission reports roughly 20,000 potential transiting signals with each run of its pipeline,
    yet only a few thousand appear to be sufficiently transit shaped to be part of the catalog. The other signals tend to
    be variable stars and instrumental noise. With this metric, we are able to remove more than 90% of the non-transiting
    signals while retaining more than 99% of the known planet candidates. When tested with injected transits, less than 1%
    are lost. This metric will enable the Kepler mission and future missions looking for transiting planets to rapidly and
    consistently find the best planetary candidates for follow-up and cataloging.
  source: citation_of=2018AJ....155...94S
