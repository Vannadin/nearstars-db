  abstract: PLAnetary Transits and Oscillations of stars is an ESA M-class satellite planned for launch by the end of 2026
    and dedicated to the wide-field search of transiting planets around bright and nearby stars, with a strong focus on discovering
    habitable rocky planets hosted by solar-like stars. The choice of the fields to be pointed at is a crucial task since
    it has a direct impact on the scientific return of the mission. In this paper, we describe and discuss the formal requirements
    and the key scientific prioritization criteria that have to be taken into account in the Long-duration Observation Phase
    (LOP) field selection, and apply a quantitative metric to guide us in this complex optimization process. We identify two
    provisional LOP fields, one for each hemisphere (LOPS1 and LOPN1), and we discuss their properties and stellar content.
    While additional fine-tuning shall be applied to LOP selection before the definitive choice, which is set to be made two
    years before launch, we expect that their position will not move by more than a few degrees with respect to what is proposed
    in this paper.
