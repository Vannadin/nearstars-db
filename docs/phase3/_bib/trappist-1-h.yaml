  arxiv_id: '2004.11225'
  ads_bibcode: 2020AJ....159..290W
  title: Spectroscopic Orbits of 11 Nearby, Mid-to-late M-dwarf Binaries
  authors:
  - Winters, Jennifer G.
  - Irwin, Jonathan M.
  - Charbonneau, David
  - Latham, David W.
  - Medina, Amber M.
  - Mink, Jessica
  - Esquerdo, Gilbert A.
  - Berlind, Perry
  - Calkins, Michael L.
  - Berta-Thompson, Zachory K.
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.3847/1538-3881/ab8d31
  abstract: 'We present the spectroscopic orbits of 11 nearby, mid-to-late M dwarf binary systems in a variety of configurations:
    2 single-lined binaries (SB1s), 7 double-lined binaries (SB2s), 1 double-lined triple (ST2), and 1 triple-lined triple
    (ST3). Eight of these orbits are the first published for these systems, while five are newly identified multiples. We
    obtained multi-epoch, high-resolution spectra with the TRES instrument on the 1.5 m Tillinghast Reflector at the Fred
    Lawrence Whipple Observatory located on Mt. Hopkins in AZ. Using the TiO molecular bands at 7065-7165 Å, we calculated
    radial velocities for these systems, from which we derived their orbits. We find LHS 1817 to have in a 7 hr period a companion
    that is likely a white dwarf, due to the ellipsoidal modulation we see in our MEarth-North light-curve data. We find G
    123-45 and LTT 11586 to host companions with minimum masses of 41 M<SUB>Jup</SUB> and 44 M<SUB>Jup</SUB> with orbital
    periods of 35 and 15 days, respectively. We find 2MA 0930+0227 to have a rapidly rotating stellar companion in a 917 day
    orbital period. GJ 268, GJ 1029, LP 734-34, GJ 1182, G 258-17, and LTT 7077are SB2s with stellar companions with orbital
