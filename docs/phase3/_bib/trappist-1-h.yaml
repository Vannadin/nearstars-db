  arxiv_id: '1703.10400'
  ads_bibcode: 2017AJ....154..107P
  title: The California-Kepler Survey. I. High-resolution Spectroscopy of 1305 Stars Hosting Kepler Transiting Planets
  authors:
  - Petigura, Erik A.
  - Howard, Andrew W.
  - Marcy, Geoffrey W.
  - Johnson, John Asher
  - Isaacson, Howard
  - Cargile, Phillip A.
  - Hebb, Leslie
  - Fulton, Benjamin J.
  - Weiss, Lauren M.
