  ads_bibcode: 2021Natur.595..370Z
  title: The <SUP>13</SUP>CO-rich atmosphere of a young accreting super-Jupiter
  authors:
  - Zhang, Yapeng
  - Snellen, Ignas A. G.
  - Bohn, Alexander J.
  - Mollière, Paul
  - Ginski, Christian
