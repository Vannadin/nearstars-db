  arxiv_id: '2407.15922'
  ads_bibcode: 2024AJ....168..155A
  title: 'Analyzing JWST/NIRSpec Hydrogen Line Detections at TWA 27B: Constraining Accretion Properties and Geometry'
  authors:
  - Aoyama, Yuhiko
  - Marleau, Gabriel-Dominique
  - Hashimoto, Jun
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.3847/1538-3881/ad67df
  abstract: Hydrogen lines from forming planets are crucial for understanding planet formation. However, the number of planetary
    hydrogen line detections is still limited. Recent JWST/NIRSpec observations have detected Paschen and Brackett hydrogen
    lines at TWA 27 B (2M1207b). Although classified as a planetary- mass companison (PMC) rather than a planet due to its
    large mass ratio to the central star, TWA 27 B's hydrogen line emissions are expected to be same as the planetary one,
    given its small mass (≍5M <SUB>J</SUB>). We aim to constrain the accretion properties and accretion geometry of TWA 27
    B, contributing to our understanding of hydrogen-line emission mechanisms common to both PMCs and planets. We conduct
    spectral fitting of four bright hydrogen lines (Pa-α, Pa-β, Pa-γ, Pa-δ) with an accretion-shock emission model tailored
    for forming planets. We estimate the mass accretion rate at <inline-formula> <mml:math overflow="scroll"><mml:mover accent="true"><mml:mrow><mml:mi>M</mml:mi></mml:mrow><mml:mrow><mml:mo>̇</mml:mo></mml:mrow></mml:mover><mml:mo>≍</mml:mo><mml:mn>3</mml:mn><mml:mo>×</mml:mo><mml:msup><mml:mrow><mml:mn>10</mml:mn></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>9</mml:mn></mml:mrow></mml:msup><mml:mspace
    width="0.25em"></mml:mspace><mml:msub><mml:mrow><mml:mi>M</mml:mi></mml:mrow><mml:mrow><mml:mi mathvariant="normal">J</mml:mi></mml:mrow></mml:msub><mml:mspace
    width="0.25em"></mml:mspace><mml:msup><mml:mrow><mml:mi>yr</mml:mi></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>1</mml:mn></mml:mrow></mml:msup></mml:math>
    </inline-formula> with our fiducial parameters, though this is subject to an uncertainty of up to factor of ten. Our analysis
    also indicates a dense accretion flow, n ≳ 10<SUP>13</SUP> cm<SUP>−3</SUP> just before the shock, implying a small accretion-shock
    filling factor f <SUB>f</SUB> on the planetary surface (f <SUB>f</SUB> ≲ 5 × 10<SUP>−4</SUP>). This finding suggests that
    magnetospheric accretion is occurring at TWA 27 B. Additionally, we carry out a comparative analysis of hydrogen-line
    emission color to identify the emission mechanism, but the associated uncertainties proved too large for definitive conclusions.
    This underscores the need for further high-precision observational studies to elucidate these emission mechanisms fully.
