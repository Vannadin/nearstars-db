- &id995
  arxiv_id: '1508.05054'
  ads_bibcode: 2015AJ....150..133G
  title: Kepler Mission Stellar and Instrument Noise Properties Revisited
  authors:
  - Gilliland, Ronald L.
  - Chaplin, William J.
  - Jenkins, Jon M.
  - Ramsey, Lawrence W.
  - Smith, Jeffrey C.
  year: '2015'
  pubdate: '2015-10-00'
  doi: 10.1088/0004-6256/150/4/133
  abstract: An earlier study of the Kepler Mission noise properties on timescales of primary relevance to detection of exoplanet
    transits found that higher than expected noise followed, to a large extent, from the stars rather than instrument or data
    analysis performance. The earlier study over the first six quarters of Kepler data is extended to the full four years
    ultimately comprising the mission. Efforts to improve the pipeline data analysis have been successful in reducing noise
    levels modestly as evidenced by smaller values derived from the current data products. The new analyses of noise properties
    on transit timescales show significant changes in the component attributed to instrument and data analysis, with essentially
    no change in the inferred stellar noise. We also extend the analyses to timescales of several days, instead of several
    hours to better sample stellar noise that follows from magnetic activity. On the longer timescale there is a shift in
    stellar noise for solar-type stars to smaller values in comparison to solar values.
