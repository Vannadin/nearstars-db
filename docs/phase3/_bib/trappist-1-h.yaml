  arxiv_id: '2104.13941'
  ads_bibcode: 2021AJ....162...12V
  title: True Masses of the Long-period Companions to HD 92987 and HD 221420 from Hipparcos-Gaia Astrometry
  authors:
  - Venner, Alexander
  - Vanderburg, Andrew
  - Pearce, Logan A.
  year: '2021'
  pubdate: '2021-07-00'
  doi: 10.3847/1538-3881/abf932
  abstract: The extensive time span of modern radial velocity surveys has made the discovery of long-period substellar companions
    more common in recent years; however, measuring the true masses of these objects remains challenging. Astrometry from
    the Gaia mission is expected to provide mass measurements for many of these long-period companions, but these data are
    not yet available. However, combining proper-motion data from Gaia DR2 and the earlier Hipparcos mission makes it possible
    to measure true masses of substellar companions in favorable cases. In this work, we combine radial velocities with Hipparcos-Gaia
    astrometry to measure the true masses of two recently discovered long-period substellar companion candidates, HD 92987
    B and HD 221420 b. In both cases, we find that the true masses are significantly higher than implied by radial velocities
    alone. A 2087 ± 19 m s<SUP>-1</SUP> astrometric signal reveals that HD 92987 B is not close to its 17 M<SUB>J</SUB> minimum
    mass but is instead a 0.2562 ± 0.0045 M<SUB>☉</SUB> star viewed at a near-polar orbital inclination, whereas the 22.9
    ± 2.2 M<SUB>J</SUB> HD 221420 b can be plausibly interpreted as a high-mass "superplanet" or a low-mass brown dwarf. With
    semimajor axes of ∼10 au, both companions are interesting targets for direct imaging, and HD 221420 b in particular would
    be a benchmark metal-rich substellar object if it proves possible to directly detect. Our results demonstrate the power
    of Hipparcos-Gaia astrometry for studying long-period planet and brown dwarf candidates discovered from radial velocity
    surveys.
