  abstract: 'Ultra-cool dwarf variability studies have matured into a multi-wavelength, multi-method probe of ultra-cool atmospheres.
    They have the unique potential to address the question of heterogeneity on the ultra-cool dwarf surface. The constraints
    on the models that we can gain though time-sensitive observations are however hampered by the weak signal detected so
    far, and the limitations of current atmospheric models, otherwise quite successful, to predict dynamical, or even static
    2-D atmosphere characteristics. Here I review the situation of the ultra-cool dwarf variability studies: possible sources
    of variability; methods, their limitations and their results; tentative interpretation and prospects.'
