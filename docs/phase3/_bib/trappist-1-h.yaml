  year: '2002'
  pubdate: '2002-12-00'
  doi: 10.1086/345520
  abstract: We present exact analytic formulae for the eclipse of a star described by quadratic or nonlinear limb darkening.
    In the limit that the planet radius is less than a tenth of the stellar radius, we show that the exact light curve can
    be well approximated by assuming the region of the star blocked by the planet has constant surface brightness. We apply
    these results to the Hubble Space Telescope observations of HD 209458, showing that the ratio of the planetary to stellar
    radii is 0.1207+/-0.0003. These formulae give a fast and accurate means of computing light curves using limb-darkening
    coefficients from model atmospheres that should aid in the detection, simulation, and parameter fitting of planetary transits.
