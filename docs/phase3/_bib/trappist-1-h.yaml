  arxiv_id: '2011.01064'
  ads_bibcode: 2020SSRv..216...74L
  title: Loss and Fractionation of Noble Gas Isotopes and Moderately Volatile Elements from Planetary Embryos and Early Venus,
    Earth and Mars
  authors:
  - Lammer, Helmut
  - Scherf, Manuel
  - Kurokawa, Hiroyuki
  - Ueno, Yuichiro
  - Burger, Christoph
  - Maindl, Thomas
  - Johnstone, Colin P.
  - Leizinger, Martin
  - Benedikt, Markus
  - Fossati, Luca
  - Kislyakova, Kristina G.
  - Marty, Bernard
  - Avice, Guillaume
  - Fegley, Bruce
  - Odert, Petra
  year: '2020'
  pubdate: '2020-06-00'
  doi: 10.1007/s11214-020-00701-x
  abstract: Here we discuss the current state of knowledge on how atmospheric escape processes can fractionate noble gas isotopes
    and moderately volatile rock-forming elements that populate primordial atmospheres, magma ocean related environments,
    and catastrophically outgassed steam atmospheres. Variations of isotopes and volatile elements in different planetary
    reservoirs keep information about atmospheric escape, composition and even the source of accreting material. We summarize
    our knowledge on atmospheric isotope ratios and discuss the latest evidence that proto-Venus and Earth captured small
    H<SUB>2</SUB>-dominated primordial atmospheres that were lost by hydrodynamic escape during and after the disk dispersed.
    All relevant thermal and non-thermal atmospheric escape processes that can fractionate various isotopes and volatile elements
    are discussed. Erosion of early atmospheres, crust and mantle by large planetary impactors are also addressed. Further,
    we discuss how moderately volatile elements such as the radioactive heat producing element <SUP>40</SUP>K and other rock-forming
    elements such as Na can also be outgassed and lost from magma oceans that originate on large planetary embryos and accreting
    planets. Outgassed elements escape from planetary embryos with masses that are ≤M<SUB>Moon</SUB> directly, or due to hydrodynamic
    drag of escaping H atoms originating from primordial- or steam atmospheres at more massive embryos. We discuss how these
    processes affect the final elemental composition and ratios such as K/U, Fe/Mg of early planets and their building blocks.
    Finally, we review modeling efforts that constrain the early evolution of Venus, Earth and Mars by reproducing their measured
    present day atmospheric <SUP>36</SUP>Ar/<SUP>38</SUP>Ar, <SUP>20</SUP>Ne/<SUP>22</SUP>Ne, noble gas isotope ratios and
    the role of isotopes on the loss of water and its connection to the redox state on early Mars.
