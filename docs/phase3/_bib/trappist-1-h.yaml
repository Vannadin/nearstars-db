  abstract: We present the Kepler Object of Interest (KOI) catalog of transiting exoplanets based on searching 4 yr of Kepler
    time series photometry (Data Release 25, Q1-Q17). The catalog contains 8054 KOIs, of which 4034 are planet candidates
    with periods between 0.25 and 632 days. Of these candidates, 219 are new, including two in multiplanet systems (KOI-82.06
    and KOI-2926.05) and 10 high-reliability, terrestrial-size, habitable zone candidates. This catalog was created using
    a tool called the Robovetter, which automatically vets the DR25 threshold crossing events (TCEs). The Robovetter also
    vetted simulated data sets and measured how well it was able to separate TCEs caused by noise from those caused by low
    signal-to-noise transits. We discuss the Robovetter and the metrics it uses to sort TCEs. For orbital periods less than
    100 days the Robovetter completeness (the fraction of simulated transits that are determined to be planet candidates)
    across all observed stars is greater than 85%. For the same period range, the catalog reliability (the fraction of candidates
    that are not due to instrumental or stellar noise) is greater than 98%. However, for low signal-to-noise candidates between
    200 and 500 days around FGK-dwarf stars, the Robovetter is 76.7% complete and the catalog is 50.5% reliable. The KOI catalog,
    the transit fits, and all of the simulated data used to characterize this catalog are available at the NASA Exoplanet
    Archive.
