  - Burgasser, Adam J.
  - Kraus, Adam
  year: '2012'
  pubdate: '2012-11-00'
  doi: 10.1088/0067-0049/203/1/10
  abstract: We present the results of an infrared spectroscopic survey of 23 late-M dwarfs with the NIRSPEC echelle spectrometer
    on the Keck II telescope. Using telluric lines for wavelength calibration, we are able to achieve measurement precisions
    of down to 45 m s<SUP>-1</SUP> for our late-M dwarfs over a one- to four-year long baseline. Our sample contains two stars
    with radial velocity (RV) variations of &gt;1000 m s<SUP>-1</SUP>. While we require more measurements to determine whether
    these RV variations are due to unseen planetary or stellar companions or are the result of starspots known to plague the
    surface of M dwarfs, we can place upper limits of &lt;40 M<SUB>J</SUB> sin i on the masses of any companions around those
    two M dwarfs with RV variations of &lt;160 m s<SUP>-1</SUP> at orbital periods of 10-100 days. We have also measured the
    rotational velocities for all the stars in our late-M dwarf sample and offer our multi-order, high-resolution spectra
    over 2.0-2.4 μm to the atmospheric modeling community to better understand the atmospheres of late-M dwarfs.
