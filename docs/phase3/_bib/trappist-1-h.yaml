  title: 'The Canada-France Imaging Survey: Reconstructing the Milky Way Star Formation History from Its White Dwarf Population'
  authors:
  - Fantin, Nicholas J.
  - Côté, Patrick
  - McConnachie, Alan W.
  - Bergeron, Pierre
