  arxiv_id: '1403.1275'
  ads_bibcode: 2014A&A...565A..20S
  title: Astrometric planet search around southern ultracool dwarfs. I. First results, including parallaxes of 20 M8-L2 dwarfs
  authors:
  - Sahlmann, J.
  - Lazorenko, P. F.
  - Ségransan, D.
  - Martín, E. L.
