- &id445
  arxiv_id: '1811.07285'
  ads_bibcode: 2019AJ....158..140B
  title: Precise Dynamical Masses of Directly Imaged Companions from Relative Astrometry, Radial Velocities, and Hipparcos-Gaia
    DR2 Accelerations
  authors:
  - Brandt, Timothy D.
  - Dupuy, Trent J.
  - Bowler, Brendan P.
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.3847/1538-3881/ab04a8
  abstract: We measure dynamical masses for five objects—three ultracool dwarfs, one low-mass star, and one white dwarf—by
    fitting orbits to a combination of the Hipparcos-Gaia Catalog of Accelerations, literature radial velocities, and relative
    astrometry. Our approach provides precise masses without any assumptions about the primary star, even though the observations
    typically cover only a small fraction of an orbit. We also perform a uniform re-analysis of the host stars’ ages. Two
    of our objects, HD 4747B and HR 7672B, already have precise dynamical masses near the stellar/substellar boundary and
    are used to validate our approach. For Gl 758B, we obtain a mass of m={37.9}<SUB>-1.5</SUB><SUP>+1.4</SUP> {M}<SUB>{{Jup</SUB>}},
    the most precise mass measurement of this companion to date. Gl 758B is the coldest brown dwarf with a dynamical mass,
    and the combination of our low mass and slightly older host-star age resolves its previously noted discrepancy with substellar
    evolutionary models. HD 68017B, a late M-dwarf, has a mass of m = 0.149 ± 0.002 M <SUB>☉</SUB>, consistent with stellar
    theory and previous empirical estimates based on its absolute magnitude. The progenitor of the white dwarf Gl 86B has
    been debated in the literature, and our dynamical measurement of m = 0.597 ± 0.010 M <SUB>☉</SUB> is consistent with a
    higher progenitor mass and younger age for this planet-hosting binary system. Overall, these case studies represent only
    five of the thousands of accelerating systems identified by combining Hipparcos and Gaia. Our analysis could be repeated
    for many of them to build a large sample of companions with dynamical masses.
