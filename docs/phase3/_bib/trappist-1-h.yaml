  title: New limb-darkening coefficients for Phoenix/1d model atmospheres. II. Calculations for 5000 K ≤ T<SUB>eff</SUB> ≤
    10 000 K Kepler, CoRot, Spitzer, uvby, UBVRIJHK, Sloan, and 2MASS photometric systems
  authors:
