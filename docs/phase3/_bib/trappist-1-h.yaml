  - Sozzetti, A.
  - Udry, S.
  - Zapatero Osorio, M. R.
  year: '2024'
  pubdate: '2024-04-00'
  doi: 10.1051/0004-6361/202348592
  abstract: GJ 9827 is a bright, nearby K7V star orbited by two super-Earths and one mini-Neptune on close-in orbits. The
    system was first discovered using K2 data and then further characterized by other spectroscopic and photometric instruments.
    Previous literature studies provide several mass measurements for the three planets, however, with large variations and
    uncertainties. To better constrain the planetary masses, we added high-precision radial velocity measurements from ESPRESSO
    to published datasets from HARPS, HARPS-N, and HIRES and we performed a Gaussian process analysis combining radial velocity
    and photometric datasets from K2 and TESS. This method allowed us to model the stellar activity signal and derive precise
    planetary parameters. We determined planetary masses of M<SUB>b</SUB> = 4.28<SUB>‒0.33</SUB><SUP>+0.35</SUP> M<SUB>⊕</SUB>,
    M<SUB>c</SUB> = 1.86<SUB>‒0.39</SUB><SUP>+0.37</SUP> M<SUB>⊕</SUB>, and M<SUB>d</SUB> = 3.02<SUB>‒0.57</SUB><SUP>+0.58</SUP>
    M<SUB>⊕</SUB>, and orbital periods of 1.208974 ± 0.000001 days for planet b, 3.648103<SUB>‒0.000010</SUB><SUP>+0.000013</SUP>
    days for planet c, and 6.201812 ± 0.000009 days for planet d. We compared our results to literature values and found that
    our derived uncertainties for the planetary mass, period, and radial velocity amplitude are smaller than the previously
    determined uncertainties. We modeled the interior composition of the three planets using the machine-learning-based tool
    ExoMDN and conclude that GJ 9827 b and c have an Earth-like composition, whereas GJ 9827 d has an hydrogen envelope, which,
    together with its density, places it in the mini-Neptune regime. <P />Extracted radial velocities from ESPRESSO and HARPS
    used in this work are available at the CDS via anonymous ftp to <A href="https://cdsarc.cds.unistra.fr/">cdsarc.cds.unistra.fr</A>
    (ftp://130.79.128.5), or via <A href="https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/684/A22">https://cdsarc.cds.unistra.fr/viz-bin/cat/J/A+A/684/A22</A>
    <P />Échelle SPectrograph for Rocky Exoplanets and Stable Spectroscopic Observations. Based on guaranteed time observations
    collected at the European Southern Observatory under ESO programme(s) 1102.C-0744, 1104.C-0350 by the ESPRESSO Consortium.
  source: citation_of=2026ApJ...997L..38V
