  arxiv_id: '1803.10787'
  ads_bibcode: 2018AJ....155..205H
  title: Improving the Accuracy of Planet Occurrence Rates from Kepler Using Approximate Bayesian Computation
  authors:
  - Hsu, Danley C.
  - Ford, Eric B.
  - Ragozzine, Darin
  - Morehead, Robert C.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-3881/aab9a8
  abstract: We present a new framework to characterize the occurrence rates of planet candidates identified by Kepler based
    on hierarchical Bayesian modeling, approximate Bayesian computing (ABC), and sequential importance sampling. For this
    study, we adopt a simple 2D grid in planet radius and orbital period as our model and apply our algorithm to estimate
    occurrence rates for Q1-Q16 planet candidates orbiting solar-type stars. We arrive at significantly increased planet occurrence
    rates for small planet candidates (R <SUB> p </SUB> &lt; 1.25 R <SUB>⊕</SUB>) at larger orbital periods (P &gt; 80 day)
    compared to the rates estimated by the more common inverse detection efficiency method (IDEM). Our improved methodology
    estimates that the occurrence rate density of small planet candidates in the habitable zone of solar-type stars is {1.6}<SUB>-0.5</SUB><SUP>+1.2</SUP>
    per factor of 2 in planet radius and orbital period. Additionally, we observe a local minimum in the occurrence rate for
    strong planet candidates marginalized over orbital period between 1.5 and 2 R <SUB>⊕</SUB> that is consistent with previous
    studies. For future improvements, the forward modeling approach of ABC is ideally suited to incorporating multiple populations,
    such as planets, astrophysical false positives, and pipeline false alarms, to provide accurate planet occurrence rates
    and uncertainties. Furthermore, ABC provides a practical statistical framework for answering complex questions (e.g.,
    frequency of different planetary architectures) and providing sound uncertainties, even in the face of complex selection
    effects, observational biases, and follow-up strategies. In summary, ABC offers a powerful tool for accurately characterizing
    a wide variety of astrophysical populations.
