- &id424
  arxiv_id: '2007.13731'
  ads_bibcode: 2021MNRAS.501L..28K
  title: EUV irradiation of exoplanet atmospheres occurs on Gyr time-scales
  authors:
  - King, George W.
  - Wheatley, Peter J.
  year: '2021'
  pubdate: '2021-01-00'
  doi: 10.1093/mnrasl/slaa186
  abstract: Exoplanet atmospheres are known to be vulnerable to mass-loss through irradiation by stellar X-ray and extreme-ultraviolet
    (EUV) emission. We investigate how this high-energy irradiation varies with time by combining an empirical relation describing
    stellar X-ray emission with a second relation describing the ratio of solar X-ray to EUV emission. In contrast to assumptions
    commonly made when modelling atmospheric escape, we find that the decline in stellar EUV emission is much slower than
    in X-rays, and that the total EUV irradiation of planetary atmospheres is dominated by emission after the saturated phase
    of high-energy emission (which lasts around 100 Myr after the formation of the star). The EUV spectrum also becomes much
    softer during this slow decline. Furthermore, we find that the total combined X-ray and EUV emission of stars occurs mostly
    after the saturated phase. Our results suggest that models of atmospheric escape that focus on the saturated phase of
    high-energy emission are oversimplified, and when considering the evolution of planetary atmospheres it is necessary to
    follow EUV-driven escape on Gyr time-scales. This may make it more difficult to use stellar age to separate the effects
    of photoevaporation and core-powered mass-loss when considering the origin of the planet radius valley.
