  arxiv_id: '1605.02825'
  ads_bibcode: 2016ApJ...822...86M
  title: 'False Positive Probabilities for all Kepler Objects of Interest: 1284 Newly Validated Planets and 428 Likely False
    Positives'
  authors:
  - Morton, Timothy D.
  - Bryson, Stephen T.
  - Coughlin, Jeffrey L.
  - Rowe, Jason F.
  - Ravichandran, Ganesh
  - Petigura, Erik A.
  - Haas, Michael R.
  - Batalha, Natalie M.
  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.3847/0004-637X/822/2/86
  abstract: We present astrophysical false positive probability calculations for every Kepler Object of Interest (KOI)—the
    first large-scale demonstration of a fully automated transiting planet validation procedure. Out of 7056 KOIs, we determine
    that 1935 have probabilities &lt;1% of being astrophysical false positives, and thus may be considered validated planets.
    Of these, 1284 have not yet been validated or confirmed by other methods. In addition, we identify 428 KOIs that are likely
    to be false positives, but have not yet been identified as such, though some of these may be a result of unidentified
    transit timing variations. A side product of these calculations is full stellar property posterior samplings for every
    host star, modeled as single, binary, and triple systems. These calculations use vespa, a publicly available Python package
    that is able to be easily applied to any transiting exoplanet candidate.
