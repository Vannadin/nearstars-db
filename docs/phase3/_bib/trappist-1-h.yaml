  abstract: We measure planet occurrence rates using the planet candidates discovered by the Q1-Q16 Kepler pipeline search.
    This study examines planet occurrence rates for the Kepler GK dwarf target sample for planet radii, 0.75 ≤slant {R}<SUB>{{p</SUB>}}
    ≤slant 2.5 {R}<SUB>\oplus </SUB>, and orbital periods, 50 ≤slant {P}<SUB>{orb</SUB>} ≤slant 300 days, with an emphasis
    on a thorough exploration and identification of the most important sources of systematic uncertainties. Integrating over
    this parameter space, we measure an occurrence rate of F<SUB>0</SUB> = 0.77 planets per star, with an allowed range of
    0.3≤slant {F}<SUB>0</SUB> ≤slant 1.9. The allowed range takes into account both statistical and systematic uncertainties,
    and values of F<SUB>0</SUB> beyond the allowed range are significantly in disagreement with our analysis. We generally
    find higher planet occurrence rates and a steeper increase in planet occurrence rates toward small planets than previous
    studies of the Kepler GK dwarf sample. Through extrapolation, we find that the one year orbital period terrestrial planet
    occurrence rate {\zeta }<SUB>1.0</SUB> = 0.1, with an allowed range of 0.01≤slant {\zeta }<SUB>1.0</SUB> ≤slant 2, where
    {\zeta }<SUB>1.0</SUB> is defined as the number of planets per star within 20% of the {R}<SUB>{{p</SUB>}} and {P}<SUB>{orb</SUB>}
    of Earth. For G dwarf hosts, the {\zeta }<SUB>1.0</SUB> parameter space is a subset of the larger {η }<SUB>\oplus </SUB>
    parameter space, thus {\zeta }<SUB>1.0</SUB> places a lower limit on {η }<SUB>\oplus </SUB> for G dwarf hosts. From our
    analysis, we identify the leading sources of systematics impacting Kepler occurrence rate determinations as reliability
    of the planet candidate sample, planet radii, pipeline completeness, and stellar parameters.
