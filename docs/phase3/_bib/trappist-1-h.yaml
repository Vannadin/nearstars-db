  doi: 10.1016/j.icarus.2018.11.021
  abstract: We present an experimental study of the absorption, between 40 and 640 cm<SUP>-1</SUP>, by CO<SUB>2</SUB>, CH<SUB>4</SUB>
    and H<SUB>2</SUB> gases as well as by H<SUB>2</SUB> + CO<SUB>2</SUB> and CH<SUB>4</SUB> + CO<SUB>2</SUB> mixtures at room
    temperature. A Fourier transform spectrometer associated to a multi-pass cell, whose optics were adjusted to obtain a
    152 m path length, were used to record transmission spectra at total pressures up to about 0.98 bar. These measurements
    provide information concerning the collision-induced absorption (CIA) bands as well as about the wing of the CO<SUB>2</SUB>
    15 μm band. Our results for the CIAs of pure gases are, within uncertainties, in agreement with previous determinations,
    validating our experimental and data analysis procedures. We then consider the CIAs by H<SUB>2</SUB> + CO<SUB>2</SUB>
    and CH<SUB>4</SUB> + CO<SUB>2</SUB> and the low frequency wing of the pure CO<SUB>2</SUB> 15 μm band, for which there
    are, to our knowledge, no previous measurements. We confirm experimentally the theoretical prediction of Wordsworth et
    al. (2017) that the H<SUB>2</SUB> + CO<SUB>2</SUB> and CH<SUB>4</SUB> + CO<SUB>2</SUB> CIAs are significantly stronger
    in the 50-550 cm<SUP>-1</SUP> region than those of H<SUB>2</SUB> + N<SUB>2</SUB> and CH<SUB>4</SUB> + N<SUB>2</SUB>, respectively.
    However, we find that the shape and the strength of these recorded CIAs differ from the aforementioned predictions. For
    the pure CO<SUB>2</SUB> line-wings, we show that both the χ-factor deduced from measurements near 4 μm and a line-mixing
    model very well describe the observed strongly sub-Lorentzian behavior in the 500-600 cm<SUP>-1</SUP> region. These experimental
    results open renewed perspectives for studies of the past climate of Mars and extrasolar analogues.
