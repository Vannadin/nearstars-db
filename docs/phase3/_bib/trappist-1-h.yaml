  doi: 10.3847/1538-4357/abcc03
  abstract: The Gaia M-dwarf gap is a significant underdensity of stars observed near M<SUB>G</SUB> = 10.2 in a color-magnitude
    diagram for stars within 200 pc of the Sun. It has been proposed that the gap is the manifestation of structural instabilities
    within stellar interiors due to nonequilibrium <SUP>3</SUP>He fusion prior to some stars becoming fully convective. To
    test this hypothesis, we use Dartmouth stellar evolution models, MARCS model atmospheres, and simple stellar population
    synthesis to create synthetic M<SUB>G</SUB>-(G<SUB>BP</SUB> - G<SUB>RP</SUB>) color-magnitude diagrams. We confirm that
    the proposed <SUP>3</SUP>He instability is responsible for the appearance of the M-dwarf gap. Our synthetic gap shows
    qualitatively similar features to the observed gap, including its vertical extent in M<SUB>G</SUB>, its slope in the color-magnitude
    diagram, and its relative prominence at bluer colors as compared to redder colors. Furthermore, corresponding overdensities
    of stars above the gap are reproduced by the models. While qualitatively similar, the synthetic gap is approximately 0.2
    magnitudes bluer, and when this color offset is accounted for, it is 0.16 magnitudes brighter than the observed gap. Our
    results reveal that the Gaia M-dwarf gap is sensitive to conditions within cores of M-dwarf stars, making the gap a powerful
    tool for testing the physics of M-dwarf stars and potentially using M dwarfs to understand the local star formation history.
