  doi: 10.1093/mnras/staa2848
  abstract: We present the discovery of two new hot Jupiters identified from the Wide-Angle Search for Planets (WASP) survey,
    WASP-186b and WASP-187b (TOI-1494.01 and TOI-1493.01). Their planetary nature was established from SOPHIE spectroscopic
    observations, and additional photometry was obtained from Transiting Exoplanet Survey Satellite. Stellar parameters for
    the host stars are derived from spectral line, infrared flux method, and isochrone placement analyses. These parameters
    are combined with the photometric and radial velocity data in a Markov chain Monte Carlo method to determine the planetary
    properties. WASP-186b is a massive Jupiter (4.22 ± 0.18 M<SUB>J</SUB>, 1.11 ± 0.03 R<SUB>J</SUB>) orbiting a mid-F star
    on a 5.03-d eccentric (e = 0.327 ± 0.008) orbit. WASP-187b is a low-density (0.80 ± 0.09 M<SUB>J</SUB>, 1.64 ± 0.05 R<SUB>J</SUB>)
    planet in a 5.15-d circular orbit around a slightly evolved early F-type star.
