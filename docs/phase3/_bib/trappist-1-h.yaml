  doi: 10.1038/s41586-021-03616-x
  abstract: Isotope abundance ratios have an important role in astronomy and planetary sciences, providing insights into the
    origin and evolution of the Solar System, interstellar chemistry and stellar nucleosynthesis<SUP>1,2</SUP>. In contrast
    to deuterium/hydrogen ratios, carbon isotope ratios are found to be roughly constant (around 89) in the Solar System<SUP>1,3</SUP>,
    but do vary on galactic scales with a <SUP>12</SUP>C/<SUP>13</SUP>C isotopologue ratio of around 68 in the current local
    interstellar medium<SUP>4-6</SUP>. In molecular clouds and protoplanetary disks, <SUP>12</SUP>CO/<SUP>13</SUP>CO ratios
    can be altered by ice and gas partitioning<SUP>7</SUP>, low-temperature isotopic ion-exchange reactions<SUP>8</SUP> and
    isotope-selective photodissociation<SUP>9</SUP>. Here we report observations of <SUP>13</SUP>CO in the atmosphere of the
    young, accreting super-Jupiter TYC 8998-760-1 b, at a statistical significance of more than six sigma. Marginalizing over
    the planet's atmospheric temperature structure, chemical composition and spectral calibration uncertainties suggests a
    <SUP>12</SUP>CO/<SUP>13</SUP>CO ratio of 31<SUB>‒10</SUB><SUP>+17</SUP>?(90% confidence), a substantial enrichment in
    <SUP>13</SUP>C with respect to the terrestrial standard and the local interstellar value. As the current location of TYC
    8998-760-1 b at greater than or equal to 160 astronomical units is far beyond the CO snowline, we postulate that it accreted
    a substantial fraction of its carbon from ices enriched in <SUP>13</SUP>C through fractionation.
