- &id1049
  arxiv_id: '1310.6248'
  ads_bibcode: 2014ApJ...781...18C
  title: 'The Planetary System to KIC 11442793: A Compact Analogue to the Solar System'
  authors:
  - Cabrera, J.
  - Csizmadia, Sz.
  - Lehmann, H.
  - Dvorak, R.
  - Gandolfi, D.
  - Rauer, H.
  - Erikson, A.
  - Dreyer, C.
  - Eigmüller, Ph.
  - Hatzes, A.
  year: '2014'
  pubdate: '2014-01-00'
  doi: 10.1088/0004-637X/781/1/18
  abstract: 'We announce the discovery of a planetary system with seven transiting planets around a Kepler target, a current
    record for transiting systems. Planets b, c, e, and f are reported for the first time in this work. Planets d, g, and
    h were previously reported in the literature, although here we revise their orbital parameters and validate their planetary
    nature. Planets h and g are gas giants and show strong dynamical interactions. The orbit of planet g is perturbed in such
    a way that its orbital period changes by 25.7 hr between two consecutive transits during the length of the observations,
    which is the largest such perturbation found so far. The rest of the planets also show mutual interactions: planets d,
    e, and f are super-Earths close to a mean motion resonance chain (2:3:4), and planets b and c, with sizes below 2 Earth
    radii, are within 0.5% of the 4:5 mean motion resonance. This complex system presents some similarities to our solar system,
    with small planets in inner orbits and gas giants in outer orbits. It is, however, more compact. The outer planet has
    an orbital distance around 1 AU, and the relative position of the gas giants is opposite to that of Jupiter and Saturn,
    which is closer to the expected result of planet formation theories. The dynamical interactions between planets are also
    much richer.'
