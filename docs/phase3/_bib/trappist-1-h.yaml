  arxiv_id: '1803.06403'
  ads_bibcode: 2018AJ....155..200F
  title: 'Characterizing Earth Analogs in Reflected Light: Atmospheric Retrieval Studies for Future Space Telescopes'
  authors:
  - Feng, Y. Katherina
  - Robinson, Tyler D.
  - Fortney, Jonathan J.
  - Lupu, Roxana E.
  - Marley, Mark S.
  - Lewis, Nikole K.
  - Macintosh, Bruce
  - Line, Michael R.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-3881/aab95c
  abstract: Space-based high-contrast imaging mission concepts for studying rocky exoplanets in reflected light are currently
    under community study. We develop an inverse modeling framework to estimate the science return of such missions given
    different instrument design considerations. By combining an exoplanet albedo model, instrument noise model, and ensemble
    Markov chain Monte Carlo sampler, we explore retrievals of atmospheric and planetary properties for Earth twins as a function
    of signal-to-noise ratio (S/N) and resolution (R). Our forward model includes Rayleigh-scattering, single-layer water
    clouds with patchy coverage, and pressure-dependent absorption due to water vapor, oxygen, and ozone. We simulate data
    at R = 70 and 140 from 0.4 to 1.0 μm with S/N = 5, 10, 15, and 20 at 550 nm (i.e., for HabEx/LUVOIR-type instruments).
    At these same S/Ns, we simulate data for WFIRST paired with a starshade, which includes two photometric points between
    0.48 and 0.6 μm and R = 50 spectroscopy from 0.6 to 0.97 μm. Given our noise model for WFIRST-type detectors, we find
    that weak detections of water vapor, ozone, and oxygen can be achieved with observations with at least R = 70/S/N = 15
    or R = 140/S/N = 10 for improved detections. Meaningful constraints are only achieved with R = 140/S/N = 20 data. The
    WFIRST data offer limited diagnostic information, needing at least S/N = 20 to weakly detect gases. Most scenarios place
    limits on planetary radius but cannot constrain surface gravity and, thus, planetary mass.
