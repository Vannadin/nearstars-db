  abstract: 'In contrast to the water-poor planets of the inner Solar System, stochasticity during planetary formation<SUP>1,2</SUP>
    and order-of-magnitude deviations in exoplanet volatile contents<SUP>3</SUP> suggest that rocky worlds engulfed in thick
    volatile ice layers<SUP>4,5</SUP> are the dominant family of terrestrial analogues<SUP>6,7</SUP> among the extrasolar
    planet population. However, the distribution of compositionally Earth-like planets remains insufficiently constrained<SUP>3</SUP>,
    and it is not clear whether the Solar System is a statistical outlier or can be explained by more general planetary formation
    processes. Here we use numerical models of planet formation, evolution and interior structure to show that a planet''s
    bulk water fraction and radius are anti-correlated with initial <SUP>26</SUP>Al levels in the planetesimal-based accretion
    framework. The heat generated by this short-lived radionuclide rapidly dehydrates planetesimals<SUP>8</SUP> before their
    accretion onto larger protoplanets and yields a system-wide correlation<SUP>9,10</SUP> of planetary bulk water abundances,
    which, for instance, can explain the lack of a clear orbital trend in the water budgets of the TRAPPIST-1 planets<SUP>11</SUP>.
    Qualitatively, our models suggest two main scenarios for the formation of planetary systems: high-<SUP>26</SUP>Al systems,
    like our Solar System, form small, water-depleted planets, whereas those devoid of <SUP>26</SUP>Al predominantly form
    ocean worlds. For planets of similar mass, the mean planetary transit radii of the ocean planet population can be up to
    about 10% larger than for planets from the <SUP>26</SUP>Al-rich formation scenario.'
