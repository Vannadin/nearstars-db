  abstract: Mass, radius, and age measurements of young (≲100 Myr) planets have the power to shape our understanding of planet
    formation. However, young stars tend to be extremely variable in both photometry and radial velocity (RV) measurements,
    which makes constraining these properties challenging. The V1298 Tau system of four ~0.5 R <SUB>J</SUB> planets transiting
    a pre-main-sequence star presents an important, if stress-inducing, opportunity to observe and measure directly the properties
    of infant planets. Suárez Mascareño et al. published radial-velocity-derived masses for two of the V1298 Tau planets using
    a state-of-the-art Gaussian process regression framework. The planetary densities computed from these masses were surprisingly
    high, implying extremely rapid contraction after formation in tension with most existing planet-formation theories. In
    an effort to constrain further the masses of the V1298 Tau planets, we obtained 36 RVs using Keck/HIRES, and analyzed
    them in concert with published RVs and photometry. Through performing a suite of cross-validation tests, we found evidence
    that the preferred model of Suárez Mascareño et al. suffers from overfitting, defined as the inability to predict unseen
    data, rendering the masses unreliable. We detail several potential causes of this overfitting, many of which may be important
    for other RV analyses of other active stars, and recommend that additional time and resources be allocated to understanding
    and mitigating activity in active young stars such as V1298 Tau.
