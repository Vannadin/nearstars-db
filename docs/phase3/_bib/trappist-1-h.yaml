  abstract: Twenty-six years ago a small committee report, building on earlier studies, expounded a compelling and poetic
    vision for the future of astronomy, calling for an infrared-optimized space telescope with an aperture of at least 4 m.
    With the support of their governments in the US, Europe, and Canada, 20,000 people realized that vision as the 6.5 m James
    Webb Space Telescope. A generation of astronomers will celebrate their accomplishments for the life of the mission, potentially
    as long as 20 yr, and beyond. This report and the scientific discoveries that follow are extended thank-you notes to the
    20,000 team members. The telescope is working perfectly, with much better image quality than expected. In this and accompanying
    papers, we give a brief history, describe the observatory, outline its objectives and current observing program, and discuss
    the inventions and people who made it possible. We cite detailed reports on the design and the measured performance on
    orbit.
