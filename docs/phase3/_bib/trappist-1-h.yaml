  year: '2017'
  pubdate: '2017-12-00'
  doi: 10.3847/1538-4357/aa992e
  abstract: A critical constraint on solar system formation is the high {}<SUP>26</SUP>{Al}/<SUP>27</SUP>Al abundance ratio
    of 5× {10}<SUP>-5</SUP> at the time of formation, which was about 17 times higher than the average Galactic ratio, while
    the <SUP>60</SUP>Fe/<SUP>56</SUP>Fe value was about 2× {10}<SUP>-8</SUP>, lower than the Galactic value. This challenges
    the assumption that a nearby supernova (SN) was responsible for the injection of these short-lived radionuclides into
    the early solar system. We show that this conundrum can be resolved if the solar system was formed by a triggered star
    formation at the edge of a Wolf-Rayet (W-R) bubble. <SUP>26</SUP>Al is produced during the evolution of the massive star,
    released in the wind during the W-R phase, and condenses into dust grains that are seen around W-R stars. The dust grains
    survive passage through the reverse shock and the low-density shocked wind, reach the dense shell swept-up by the bubble,
    detach from the decelerated wind, and are injected into the shell. Some portions of this shell subsequently collapse to
    form the dense cores that give rise to solar-type systems. The subsequent aspherical SN does not inject appreciable amounts
    of {}<SUP>60</SUP>{Fe} into the proto-solar system, thus accounting for the observed low abundance of {}<SUP>60</SUP>{Fe}.
    We discuss the details of various processes within the model and conclude that it is a viable model that can explain the
    initial abundances of {}<SUP>26</SUP>{Al} and {}<SUP>60</SUP>{Fe}. We estimate that 1%-16% of all Sun-like stars could
    have formed in such a setting of triggered star formation in the shell of a W-R bubble.
