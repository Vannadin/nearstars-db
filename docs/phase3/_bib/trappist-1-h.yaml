- &id340
  arxiv_id: astro-ph/0609744
  ads_bibcode: 2007A&A...461.1185L
  title: A diagram to determine the evaporation status of extrasolar planets
  authors:
  - Lecavelier Des Etangs, A.
  year: '2007'
  pubdate: '2007-01-00'
  doi: 10.1051/0004-6361:20065014
  abstract: 'Aims:To describe the evaporation status of extrasolar planets, we consider an energy diagram in which the potential
    energy of the planets is plotted versus the energy received by the upper atmosphere. <BR />Methods: Here we present a
    basic method to estimate these quantities. For the potential energy, we include the modification of the gravity field
    by the tidal forces from the parent stars. <BR />Results: This description allows a rapid estimate of both the escape
    rate of the atmospheric gas and the lifetime of a planet against the evaporation process. In the energy diagram, we find
    an evaporation-forbidden region in which a gaseous planet would evaporate in less than 5 billion years. With their observed
    characteristics, all extrasolar planets are found outside this evaporation-forbidden region. The escape rates are estimated
    to be in the range 10<SUP>5</SUP> g s<SUP>-1</SUP> to 10<SUP>12</SUP> g s<SUP>-1</SUP>, with a few cases above 10<SUP>11</SUP>
    g s<SUP>-1</SUP>. The estimated escape rate for HD 209458 b is consistent with the lower limit of 10<SUP>10</SUP> g s<SUP>-1</SUP>
    obtained from interpretation of the H i Lyman-α observations. This diagram suggests possibilities for the nature of the
    recently discovered Neptune-mass planets. We find that GJ 436 b, 55 Cnc e and HD 69830 b cannot be low mass gaseous planets.
    With a density that must be above 0.5 g cm<SUP>-3</SUP> to survive evaporation, these planets must contain a large fraction
    of solid/liquid material. We find that GJ 876 d must have a density greater than ~3 g cm<SUP>-3</SUP> to survive the strong
    EUV energy flux from its nearby parent star. GJ 876 d must contain a large fraction of massive elements.'
