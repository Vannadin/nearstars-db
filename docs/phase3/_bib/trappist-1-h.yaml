  arxiv_id: '1702.01820'
  ads_bibcode: 2017PASP..129f4501B
  title: 'PandExo: A Community Tool for Transiting Exoplanet Science with JWST &amp; HST'
  authors:
  - Batalha, Natasha E.
  - Mandell, Avi
  - Pontoppidan, Klaus
  - Stevenson, Kevin B.
  - Lewis, Nikole K.
  - Kalirai, Jason
  - Earl, Nick
