  arxiv_id: '2209.03871'
  ads_bibcode: 2022Sci...377.1211L
  title: Density, not radius, separates rocky and water-rich small planets orbiting M dwarf stars
  authors:
  - Luque, Rafael
  - Pallé, Enric
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.1126/science.abl7164
  abstract: 'Exoplanets smaller than Neptune are common around red dwarf stars (M dwarfs), with those that transit their host
    star constituting the bulk of known temperate worlds amenable for atmospheric characterization. We analyze the masses
    and radii of all known small transiting planets around M dwarfs, identifying three populations: rocky, water-rich, and
    gas-rich. Our results are inconsistent with the previously known bimodal radius distribution arising from atmospheric
    loss of a hydrogen/helium envelope. Instead, we propose that a density gap separates rocky from water-rich exoplanets.
    Formation models that include orbital migration can explain the observations: Rocky planets form within the snow line,
    whereas water-rich worlds form outside it and later migrate inward.'
