  arxiv_id: '1702.03386'
  ads_bibcode: 2017ApJ...843..122Z
  title: 'The Cosmic Shoreline: The Evidence that Escape Determines which Planets Have Atmospheres, and what this May Mean
    for Proxima Centauri B'
  authors:
  - Zahnle, Kevin J.
  - Catling, David C.
  year: '2017'
  pubdate: '2017-07-00'
  doi: 10.3847/1538-4357/aa7846
  abstract: The planets of the solar system are neatly divided between those with atmospheres and those without when arranged
    by insolation (I) and escape velocity ({v}<SUB>{esc</SUB>}). The dividing line goes at I\propto {v}<SUB>{esc</SUB>}<SUP>4</SUP>.
    Exoplanets with reported masses and radii are shown to crowd against the extrapolation of the solar system trend, making
    a metaphorical cosmic shoreline that unites all the planets. The I\propto {v}<SUB>{esc</SUB>}<SUP>4</SUP> relation may
    implicate thermal escape. We therefore address the general behavior of hydrodynamic thermal escape models ranging from
    Pluto to highly irradiated extrasolar giant planets (EGPs). Energy-limited escape is harder to test because copious XUV
    radiation is mostly a feature of young stars, and hence requires extrapolating to historic XUV fluences ({I}<SUB>{xuv</SUB>})
    using proxies and power laws. An energy-limited shoreline should scale as {I}<SUB>{xuv</SUB>}\propto {v}<SUB>{esc</SUB>}<SUP>3</SUP>\sqrt{ρ
    }, which differs distinctly from the apparent {I}<SUB>{xuv</SUB>}\propto {v}<SUB>{esc</SUB>}<SUP>4</SUP> relation. Energy-limited
    escape does provide good quantitative agreement to the highly irradiated EGPs. Diffusion-limited escape implies that no
    planet can lose more than 1% of its mass as H<SUB>2</SUB>. Impact erosion, to the extent that impact velocities {v}<SUB>{imp</SUB>}
    can be estimated for exoplanets, fits a {v}<SUB>{imp</SUB>}≈ 4{--}5 {v}<SUB>{esc</SUB>} shoreline. The proportionality
    constant is consistent with what the collision of comet Shoemaker-Levy 9 showed us we should expect of modest impacts
    in deep atmospheres. With respect to the shoreline, Proxima Centauri b is on the metaphorical beach. Known hazards include
    its rapid energetic accretion, high impact velocities, its early life on the wrong side of the runaway greenhouse, and
    Proxima Centauri’s XUV radiation. In its favor is a vast phase space of unknown unknowns.
