  year: '2014'
  pubdate: '2014-03-00'
  doi: 10.1088/2041-8205/783/1/L6
  abstract: We study the masses and radii of 65 exoplanets smaller than 4 R <SUB>⊕</SUB> with orbital periods shorter than
    100 days. We calculate the weighted mean densities of planets in bins of 0.5 R <SUB>⊕</SUB> and identify a density maximum
    of 7.6 g cm<SUP>-3</SUP> at 1.4 R <SUB>⊕</SUB>. On average, planets with radii up to R <SUB>P</SUB> = 1.5 R <SUB>⊕</SUB>
    increase in density with increasing radius. Above 1.5 R <SUB>⊕</SUB>, the average planet density rapidly decreases with
    increasing radius, indicating that these planets have a large fraction of volatiles by volume overlying a rocky core.
    Including the solar system terrestrial planets with the exoplanets below 1.5 R <SUB>⊕</SUB>, we find ρ<SUB>P</SUB> = 2.43
    + 3.39(R <SUB>P</SUB>/R <SUB>⊕</SUB>) g cm<SUP>-3</SUP> for R <SUB>P</SUB> &lt; 1.5 R <SUB>⊕</SUB>, which is consistent
    with rocky compositions. For 1.5 &lt;= R <SUB>P</SUB>/R <SUB>⊕</SUB> &lt; 4, we find M <SUB>P</SUB>/M <SUB>⊕</SUB> = 2.69(R
    <SUB>P</SUB>/R <SUB>⊕</SUB>)<SUP>0.93</SUP>. The rms of planet masses to the fit between 1.5 and 4 R <SUB>⊕</SUB> is 4.3
    M <SUB>⊕</SUB> with reduced χ<SUP>2</SUP> = 6.2. The large scatter indicates a diversity in planet composition at a given
    radius. The compositional diversity can be due to planets of a given volume (as determined by their large H/He envelopes)
    containing rocky cores of different masses or compositions.
