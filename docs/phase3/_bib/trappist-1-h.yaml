  ads_bibcode: 2021RNAAS...5...13C
  title: Limb and Gravity-darkening Coefficients for the Space Mission CHEOPS
  authors:
  - Claret, A.
  year: '2021'
  pubdate: '2021-01-00'
  doi: 10.3847/2515-5172/abdcb3
  abstract: 'The goal of this Research Note is to provide the theoretical calculations of the limb-darkening coefficients
    and gravity-darkening coefficients (GDC) for the space mission CHEOPS. We use two stellar atmosphere models: ATLAS (plane-parallel)
    and PHOENIX with spherical symmetry covering a wide range of effective temperatures, local gravities, and hydrogen/metal.
    These grids cover 19 metallicities ranging from 10<SUP>-5</SUP> up to 10<SUP>+1</SUP> solar abundances, 0 ≤ log g ≤ 6.0
    and 2300 K ≤ T<SUB>eff</SUB> ≤ 50,000 K. The specific intensity distribution was fitted using six approaches: linear,
    quadratic, square root, logarithmic, power-2, and a series with four terms. The calculations of the GDC were performed
    for both stellar atmosphere models adopting an improved formulation.'
