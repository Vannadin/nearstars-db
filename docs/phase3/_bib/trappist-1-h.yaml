  arxiv_id: '1307.4864'
  ads_bibcode: 2013A&A...558A.109A
  title: 'Theoretical models of planetary system formation: mass vs. semi-major axis'
  authors:
  - Alibert, Y.
  - Carron, F.
  - Fortier, A.
  - Pfyffer, S.
  - Benz, W.
  - Mordasini, C.
  - Swoboda, D.
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1051/0004-6361/201321690
  abstract: 'Context. Planet formation models have been developed during the past years to try to reproduce what has been
    observed of both the solar system and the extrasolar planets. Some of these models have partially succeeded, but they
    focus on massive planets and, for the sake of simplicity, exclude planets belonging to planetary systems. However, more
    and more planets are now found in planetary systems. This tendency, which is a result of radial velocity, transit, and
    direct imaging surveys, seems to be even more pronounced for low-mass planets. These new observations require improving
    planet formation models, including new physics, and considering the formation of systems. <BR /> Aims: In a recent series
    of papers, we have presented some improvements in the physics of our models, focussing in particular on the internal structure
    of forming planets, and on the computation of the excitation state of planetesimals and their resulting accretion rate.
    In this paper, we focus on the concurrent effect of the formation of more than one planet in the same protoplanetary disc
    and show the effect, in terms of architecture and composition of this multiplicity. <BR /> Methods: We used an N-body
    calculation including collision detection to compute the orbital evolution of a planetary system. Moreover, we describe
    the effect of competition for accretion of gas and solids, as well as the effect of gravitational interactions between
    planets. <BR /> Results: We show that the masses and semi-major axes of planets are modified by both the effect of competition
    and gravitational interactions. We also present the effect of the assumed number of forming planets in the same system
    (a free parameter of the model), as well as the effect of the inclination and eccentricity damping. We find that the fraction
    of ejected planets increases from nearly 0 to 8% as we change the number of embryos we seed the system with from 2 to
    20 planetary embryos. Moreover, our calculations show that, when considering planets more massive than ~5 M<SUB>⊕</SUB>,
    simulations with 10 or 20 planetary embryos statistically give the same results in terms of mass function and period distribution.'
