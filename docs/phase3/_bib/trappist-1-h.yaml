  title: Fast spin of the young extrasolar planet β Pictoris b
  authors:
  - Snellen, Ignas A. G.
  - Brandl, Bernhard R.
  - de Kok, Remco J.
  - Brogi, Matteo
  - Birkby, Jayne
  - Schwarz, Henriette
