  abstract: The extreme environments of transiting close-in exoplanets in highly eccentric orbits are ideal for testing exoclimate
    physics. Spectroscopically resolved phase curves not only allow for the characterization of their thermal response to
    irradiation changes but also unveil phase-dependent atmospheric chemistry and dynamics. We observed a partial phase curve
    of the highly eccentric close-in giant planet HAT-P-2b (e = 0.51, M = 9M<SUB>Jup</SUB>) with the Wide Field Camera 3 aboard
    the Hubble Space Telescope. Using these data, we updated the planet's orbital parameters and radius and retrieved high-frequency
    pulsations consistent with the planet-induced pulsations reported in Spitzer data. We found that the peak in planetary
    flux occurred at 6.7 ± 0.6 hr after periastron, with heating and cooling timescales of <inline-formula> </inline-formula>
    hr and <inline-formula> </inline-formula> hr, respectively. We compare the light curve to various 1D and 3D forward models,
    varying the planet's chemical composition. The strong contrast in flux increase and decrease timescales before and after
    periapse indicates an opacity term that emerges during the planet's heating phase, potentially due to more H<SUP>−</SUP>
    than expected from chemical equilibrium models. The phase-resolved spectra are largely featureless, which we interpret
    as indicative of an inhomogeneous dayside. However, we identified an anomalously high flux in the spectroscopic bin coinciding
    with the hydrogen Paβ line, and that is likely connected to the planet's orbit. We interpret this as due to shock heating
    of the upper atmosphere given the short timescale involved, or evidence for other star−planet interactions.
