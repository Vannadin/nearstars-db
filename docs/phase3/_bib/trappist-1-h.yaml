  - de Wit, Julien
  - Fabrycky, Daniel
  - Foreman-Mackey, Daniel
  - Haldemann, Jonas
  - Hernandez, David M.
  - Ingalls, James
  - Jehin, Emmanuel
  - Langford, Zachary
  - Leconte, Jérémy
  - Lederer, Susan M.
  - Luger, Rodrigo
  - Malhotra, Renu
  - Meadows, Victoria S.
  - Morris, Brett M.
  - Pozuelos, Francisco J.
  - Queloz, Didier
  - Raymond, Sean N.
  - Selsis, Franck
  - Sestovic, Marko
  - Triaud, Amaury H. M. J.
