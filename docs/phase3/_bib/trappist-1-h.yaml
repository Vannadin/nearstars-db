  - Thao, Pa Chia
  - Mann, Andrew W.
  year: '2025'
  pubdate: '2025-06-00'
  doi: 10.3847/1538-4357/ad7bb8
  abstract: 'Our brains are hardwired for pattern recognition as correlations are useful for predicting and understanding
    nature. As more exoplanet atmospheres are being characterized with JWST, we are starting to unveil their properties on
    a population level. Here we present a framework for comparing exoplanet transmission spectroscopy from 3 to 5 μm with
    four bands: L (2.9─3.7 μm), SO<SUB>2</SUB> (3.95─4.1 μm), CO<SUB>2</SUB> (4.25─4.4 μm), and CO (4.5─4.9 μm). Together,
    the four bands cover the major carbon-, oxygen-, nitrogen-, and sulfur-bearing molecules including H<SUB>2</SUB>O, CH<SUB>4</SUB>,
    NH<SUB>3</SUB>, H<SUB>2</SUB>S, SO<SUB>2</SUB>, CO<SUB>2</SUB>, and CO. Among the eight high-precision gas giant exoplanet
    planet spectra we collect, we find strong correlations between the SO<SUB>2</SUB> ─ L index and planet mass (r = −0.41
    ± 0.09) and temperature (r = −0.64 ± 0.08), indicating SO<SUB>2</SUB> preferably exists (SO<SUB>2</SUB> ─ L &gt; −0.5)
    among low-mass (∼ &lt;0.3 M <SUB>J</SUB>) and cooler (∼ &lt;1200 K) targets. We also observe strong temperature dependency
    for both CO<SUB>2</SUB> ─ L and CO ─ L indices. Under equilibrium chemistry and isothermal thermal structure assumptions,
    we find that the planet sample favors supersolar metallicity and a low C/O ratio (&lt;0.7). In addition, the presence
    of a mass─metallicity correlation is favored over uniform metallicity with the eight planets. We further introduce the
    SO<SUB>2</SUB> ─ L versus CO<SUB>2</SUB> ─ L diagram, similar to the color─magnitude diagram for stars and brown dwarfs.
    All reported trends here will be testable and will be further quantified with existing and future JWST observations within
    the next few years.'
