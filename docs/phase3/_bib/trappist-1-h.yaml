  ads_bibcode: 2016ApJ...820..112K
  title: A Transiting Jupiter Analog
  authors:
  - Kipping, D. M.
  - Torres, G.
  - Henze, C.
  - Teachey, A.
  - Isaacson, H.
  - Petigura, E.
  - Marcy, G. W.
  - Buchhave, L. A.
  - Chen, J.
  - Bryson, S. T.
  - Sandford, E.
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.3847/0004-637X/820/2/112
  abstract: Decadal-long radial velocity surveys have recently started to discover analogs to the most influential planet
    of our solar system, Jupiter. Detecting and characterizing these worlds is expected to shape our understanding of our
    uniqueness in the cosmos. Despite the great successes of recent transit surveys, Jupiter analogs represent a terra incognita,
    owing to the strong intrinsic bias of this method against long orbital periods. We here report on the first validated
    transiting Jupiter analog, Kepler-167e (KOI-490.02), discovered using Kepler archival photometry orbiting the K4-dwarf
    KIC-3239945. With a radius of (0.91+/- 0.02) {R}<SUB>{{J</SUB>}}, a low orbital eccentricity ({0.06}<SUB>-0.04</SUB><SUP>+0.10</SUP>),
    and an equilibrium temperature of (131+/- 3) K, Kepler-167e bears many of the basic hallmarks of Jupiter. Kepler-167e
    is accompanied by three Super-Earths on compact orbits, which we also validate, leaving a large cavity of transiting worlds
    around the habitable-zone. With two transits and continuous photometric coverage, we are able to uniquely and precisely
    measure the orbital period of this post snow-line planet (1071.2323 ± 0.0006d), paving the way for follow-up of this K
    = 11.8 mag target.
