  abstract: We re-examine the XUV luminosity evolution of TRAPPIST-1 utilizing new observational constraints (XUV and bolometric
    luminosity) from multi-epoch X-ray/UV photometry. Following the formalism presented in Fleming et al., we infer that TRAPPIST-1
    maintained a saturated XUV luminosity, relative to the bolometric luminosity, of log<SUB>10</SUB>(L<SUB>XUV</SUB>/L<SUB>bol</SUB>)
    $=-{3.03}_{-0.23}^{+0.25}$ at early times for a period of t<SUB>sat</SUB> $={3.14}_{-1.46}^{+2.22}$ Gyr. After the saturation
    phase, we find L<SUB>XUV</SUB> decayed over time by an exponential rate of β<SUB>XUV</SUB> $=-{1.17}_{-0.28}^{+0.27}$
    . Compared to our inferred age of the system, $\mathrm{age}={7.96}_{-1.87}^{+1.78}$ Gyr, our result for t<SUB>sat</SUB>
    suggests that there is only a ∼4% chance that TRAPPIST-1 still remains in the saturated phase today, which is significantly
    lower than the previous estimate of 40%. Despite this reduction in t<SUB>sat</SUB>, our results remain consistent in the
    conclusion that the TRAPPIST-1 planets likely received an extreme amount XUV energy—an estimated integrated XUV energy
    of ∼10<SUP>30</SUP>-10<SUP>32</SUP> erg over the star's lifetime.
