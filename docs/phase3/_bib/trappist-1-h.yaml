  title: 'Twin High-resolution, High-speed Imagers for the Gemini Telescopes: Instrument description and science verification
    results'
  authors:
  - Scott, Nicholas J.
  - Howell, Steve B.
  - Gnilka, Crystal L.
  - Stephens, Andrew W.
  - Salinas, Ricardo
  - Matson, Rachel A.
  - Furlan, Elise
  - Horch, Elliott P.
  - Everett, Mark E.
  - Ciardi, David R.
