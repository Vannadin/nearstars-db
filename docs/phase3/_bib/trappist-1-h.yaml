  doi: 10.3847/2041-8213/aced51
  abstract: We announce the detection of escaping helium from TOI 2134b, a mini-Neptune a few gigayears old. The average in-transit
    absorption spectrum shows a peak of 0.37% ± 0.05% and an equivalent width of W <SUB>avg</SUB> = 3.3 ± 0.3 mÅ. Among all
    planets with helium detections, TOI 2134b is the only mature mini-Neptune, has the smallest helium signal, and experiences
    the lowest X-ray and ultraviolet (XUV) flux. Putting TOI 2134b in the context of all other helium detections, we report
    the detection of a strong (p = 3.0 × 10<SUP>-5</SUP>) and theoretically expected correlation between F <SUB>XUV</SUB>/ρ
    <SUB>XUV</SUB> (proportional to the energy-limited mass-loss rate) and R <SUB>*</SUB> W <SUB>avg</SUB> (roughly proportional
    to the observationally inferred mass-loss rate). Here W <SUB>avg</SUB> is the equivalent width of the helium absorption,
    and ρ <SUB>XUV</SUB> is the density of the planet within the XUV photosphere, but the correlation is similarly strong
    if we use the optical photosphere. Having the lowest value on both axes, TOI 2134b anchors the relation. We encourage
    further observations to fill in the missing regions of this parameter space and improve estimates of F <SUB>XUV</SUB>.
  source: citation_of=2025ApJ...992..198J
