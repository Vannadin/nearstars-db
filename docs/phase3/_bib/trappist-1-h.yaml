  arxiv_id: '0904.4543'
  ads_bibcode: 2009ApJ...699..824O
  title: N-Body Simulations of Planetary Accretion Around M Dwarf Stars
  authors:
  - Ogihara, Masahiro
  - Ida, Shigeru
  year: '2009'
  pubdate: '2009-07-00'
  doi: 10.1088/0004-637X/699/1/824
  abstract: We have investigated planetary accretion from planetesimals in terrestrial planet regions inside the ice line
    around M dwarf stars through N-body simulations including tidal interactions with disk gas. Because of low luminosity
    of M dwarfs, habitable zones (HZs) are located in inner regions (~0.1 AU). In the close-in HZ, type-I migration and the
    orbital decay induced by eccentricity damping are efficient according to the high disk gas density in the small orbital
    radii. Since the orbital decay is terminated around the disk inner edge and the disk edge is close to the HZ, the protoplanets
    accumulated near the disk edge affect formation of planets in the HZ. Ice lines are also in relatively inner regions at
    ~0.3 AU. Due to the small orbital radii, icy protoplanets accrete rapidly and undergo type-I migration before disk depletion.
    The rapid orbital decay, the proximity of the disk inner edge, and large amount of inflow of icy protoplanets are characteristic
    in planetary accretion in terrestrial planet regions around M dwarfs. In the case of full efficiency of type-I migration
    predicted by the linear theory, we found that protoplanets that migrate to the vicinity of the host star undergo close
    scatterings and collisions, and four to six planets eventually remain in mutual mean-motion resonances and their orbits
    have small eccentricities (lsim0.01) and they are stable both before and after disk gas decays. In the case of slow migration,
    the resonant capture is so efficient that densely packed ~40 small protoplanets remain in mutual mean-motion resonances.
    In this case, they start orbit crossing, after the disk gas decays and eccentricity damping due to tidal interaction with
    gas is no more effective. Through merging of the protoplanets, several planets in widely separated non-resonant orbits
    with relatively large eccentricities (~0.05) are formed. Thus, the final orbital configurations (separations, resonant
    or non-resonant, eccentricity, and distribution) of the terrestrial planets around M dwarfs sensitively depend on strength
    of type-I migration. We also found that large amount of water-ice is delivered by type-I migration from outer regions
    and final planets near the inner disk edge around M dwarfs are generally abundant in water-ice except for the innermost
    one that is shielded by the outer planets, unless type-I migration speed is reduced by a factor of more than 100 from
    that predicted by the linear theory.
  source: citation_of=2017NatAs...1E.129L
