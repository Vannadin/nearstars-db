- &id363
  arxiv_id: '2404.11022'
  ads_bibcode: 2024MNRAS.534.3277G
  title: The radius distribution of M dwarf-hosted planets and its evolution
  authors:
  - Gaidos, Eric
  - Ali, Aleezah
  - Kraus, Adam L.
  - Rowe, Jason F.
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.1093/mnras/stae2207
  abstract: M dwarf stars are the most promising hosts for detection and characterization of small and potentially habitable
    planets, and provide leverage relative to solar-type stars to test models of planet formation and evolution. Using Gaia
    astrometry, adaptive optics imaging, and calibrated gyrochronologic relations to estimate stellar properties and filter
    binaries, we refined the radii of 117 Kepler objects of interest (confirmed or candidate planets) transiting 74 single
    late K-type and early M-type stars, and assigned stellar rotation-based ages to 113 of these. We constructed the radius
    distribution of 115 small (<inline-formula><tex-math id="TM0001" notation="LaTeX">${\lt} 4\, {\rm R}_{\rm{\oplus}}$</tex-math></inline-formula>)
    planets and assessed their evolution. As for solar-type stars, the inferred distribution contains distinct populations
    of 'super-Earths' (at <inline-formula><tex-math id="TM0002" notation="LaTeX">${\sim} 1.3 \, {\rm R}_{\rm{\oplus}}$</tex-math></inline-formula>)
    and 'sub-Neptunes' (at <inline-formula><tex-math id="TM0003" notation="LaTeX">${\sim} 2.2 \, {\rm R}_{\rm{\oplus}}$</tex-math></inline-formula>)
    separated by a gap or 'valley' at <inline-formula><tex-math id="TM0004" notation="LaTeX">${\approx} 1.7 \, {\rm R}_{\rm{\oplus}}$</tex-math></inline-formula>
    that has a period dependence that is significantly weaker (power-law index of -0.03<inline-formula><tex-math id="TM0005"
    notation="LaTeX">$^{+0.01}_{-0.03}$</tex-math></inline-formula>) than for solar-type stars. Sub-Neptunes are largely absent
    at short periods (<inline-formula><tex-math id="TM0006" notation="LaTeX">${\lt} 2 \, {\rm d}$</tex-math></inline-formula>)
    and high irradiance, a feature analogous to the 'Neptune desert' observed around solar-type stars. The relative number
    of sub-Neptunes to super-Earths declines between the younger and older halves of the sample (median age 3.86 Gyr), although
    the formal significance is low (<inline-formula><tex-math id="TM0007" notation="LaTeX">$p = 0.08$</tex-math></inline-formula>)
    because of the small sample size. The decline in sub-Neptunes appears to be more pronounced on wider orbits and low stellar
    irradiance. This is not due to detection bias and suggests a role for H<SUB>2</SUB>O as steam in inflating the radii of
    sub-Neptunes and/or regulating the escape of H/He from them.
