  arxiv_id: astro-ph/0210589
  ads_bibcode: 2002Sci...298..593P
  title: A Primordial Origin of the Laplace Relation Among the Galilean Satellites
  authors:
  - Peale, S. J.
  - Lee, Man Hoi
  year: '2002'
  pubdate: '2002-10-00'
  doi: 10.1126/science.1076557
  abstract: Understanding the origin of the orbital resonances of the Galilean satellites of Jupiter will constrain the longevity
    of the extensive volcanism on Io, may explain a liquid ocean on Europa, and may guide studies of the dissipative properties
    of stars and Jupiter-like planets. The differential migration of the newly formed Galilean satellites due to interactions
    with a circumjovian disk can lead to the primordial formation of the Laplace relation n<SUB>1</SUB> - 3n<SUB>2</SUB> +
    2n<SUB>3</SUB> = 0, where the n<SUB>i</SUB> are the mean orbital angular velocities of Io, Europa, and Ganymede, respectively.
    This contrasts with the formation of the resonances by differential expansion of the orbits from tidal torques from Jupiter.
