  - Coulson, Iain
  - Lee, E'lisa
  - Hoge, Jim
  year: '2021'
  pubdate: '2021-00-00'
  doi: 10.1038/s41550-020-1174-4
  abstract: Measurements of trace gases in planetary atmospheres help us explore chemical conditions different to those on
    Earth. Our nearest neighbour, Venus, has cloud decks that are temperate but hyperacidic. Here we report the apparent presence
    of phosphine (PH<SUB>3</SUB>) gas in Venus's atmosphere, where any phosphorus should be in oxidized forms. Single-line
    millimetre-waveband spectral detections (quality up to ~15σ) from the JCMT and ALMA telescopes have no other plausible
    identification. Atmospheric PH<SUB>3</SUB> at ~20 ppb abundance is inferred. The presence of PH<SUB>3</SUB> is unexplained
    after exhaustive study of steady-state chemistry and photochemical pathways, with no currently known abiotic production
    routes in Venus's atmosphere, clouds, surface and subsurface, or from lightning, volcanic or meteoritic delivery. PH<SUB>3</SUB>
    could originate from unknown photochemistry or geochemistry, or, by analogy with biological production of PH<SUB>3</SUB>
    on Earth, from the presence of life. Other PH<SUB>3</SUB> spectral features should be sought, while in situ cloud and
    surface sampling could examine sources of this gas.
