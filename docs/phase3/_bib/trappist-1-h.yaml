- &id1165
  arxiv_id: '2411.15456'
  ads_bibcode: 2024PEPS...11...59Y
  title: Suppression of hydrodynamic escape of an H<SUB>2</SUB>-rich early Earth atmosphere by radiative cooling of carbon
    oxides
  authors:
  - Yoshida, Tatsuya
  - Terada, Naoki
  - Kuramoto, Kiyoshi
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.1186/s40645-024-00666-3
  abstract: Radiative cooling by molecules is a crucial process for hydrodynamic escape, as it can efficiently remove the
    thermal energy driving the outflow, acquired through X-ray and extreme UV absorption. Carbon oxides, such as CO and CO<SUB>2</SUB>,
    and their photochemical products are anticipated to serve as vital radiative cooling sources not only in atmospheres dominated
    by carbon oxides but also in H<SUB>2</SUB>-rich atmospheres. However, their specific effects on the hydrodynamic escape,
    especially in H<SUB>2</SUB>-rich atmospheres, have been inadequately investigated. In this study, we conduct 1-D hydrodynamic
    escape simulations for H<SUB>2</SUB>-rich atmospheres incorporating CO, CO<SUB>2</SUB>, and their chemical products on
    an Earth-mass planet. We consider detailed radiative cooling processes and chemical networks related to carbon oxides
    to elucidate their impacts on the hydrodynamic escape. In the escape outflow, CO<SUB>2</SUB> undergoes rapid photolysis,
    producing CO and atomic oxygen, while CO exhibits photochemical stability compared to CO<SUB>2</SUB>. The H<SUB>2</SUB>
    oxidation by atomic oxygen results in the production of OH and H<SUB>2</SUB>O. Consequently, the hydrodynamic escape is
    significantly suppressed by the radiative cooling effects of CO, H<SUB>2</SUB>O, OH, and H<SUB>3</SUB><SUP>+</SUP> even
    when the basal mixing fraction of CO and CO<SUB>2</SUB> is lower than ~ 0.01. These mechanisms extend the lifetime of
    H<SUB>2</SUB>-rich atmospheres by about one order of magnitude compared to the case of pure hydrogen atmospheres on early
    Earth, which also results in negligible escape of heavier carbon- and nitrogen-bearing molecules and noble gases.
