  arxiv_id: '2008.11299'
  ads_bibcode: 2020AJ....160..198H
  title: Prospects for Characterizing the Haziest Sub-Neptune Exoplanets with High-resolution Spectroscopy
  authors:
  - Hood, Callie E.
  - Fortney, Jonathan J.
  - Line, Michael R.
  - Martin, Emily C.
  - Morley, Caroline V.
  - Birkby, Jayne L.
  - Rustamkulov, Zafar
  - Lupu, Roxana E.
  - Freedman, Richard S.
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.3847/1538-3881/abb46b
  abstract: Observations to characterize planets larger than Earth but smaller than Neptune have led to largely inconclusive
    interpretations at low spectral resolution due to hazes or clouds that obscure molecular features in their spectra. However,
    here we show that high-resolution spectroscopy (R ∼ 25,000-100,000) enables one to probe the regions in these atmospheres
    above the clouds where the cores of the strongest spectral lines are formed. We present models of transmission spectra
    for a suite of GJ 1214b-like planets with thick photochemical hazes covering 1-5 μm at a range of resolutions relevant
    to current and future ground-based spectrographs. Furthermore, we compare the utility of the cross-correlation function
    that is typically used with a more formal likelihood-based approach, finding that only the likelihood-based method is
    sensitive to the presence of haze opacity. We calculate the signal-to-noise ratio (S/N) of these spectra, including telluric
    contamination, Required to robustly detect a host of molecules such as CO, CO<SUB>2</SUB>, H<SUB>2</SUB>O, and CH<SUB>4</SUB>
    and photochemical products like HCN as a function of wavelength range and spectral resolution. Spectra in the M band require
    the lowest S/N<SUB>res</SUB> to detect multiple molecules simultaneously. CH<SUB>4</SUB> is only observable for the coolest
    models (T<SUB>eff</SUB> = 412 K) and only in the L band. We quantitatively assess how these requirements compare to what
    is achievable with current and future instruments, demonstrating that characterization of small cool worlds with ground-based
    high-resolution spectroscopy is well within reach.
