  ads_bibcode: 2017NatGe..10..704A
  title: Abundant carbon in the mantle beneath Hawai'i
  authors:
  - Anderson, Kyle R.
  - Poland, Michael P.
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.1038/ngeo3007
  abstract: Estimates of carbon concentrations in Earth's mantle vary over more than an order of magnitude, hindering our
    ability to understand mantle structure and mineralogy, partial melting, and the carbon cycle. CO<SUB>2</SUB> concentrations
    in mantle-derived magmas supplying hotspot ocean island volcanoes yield our most direct constraints on mantle carbon,
    but are extensively modified by degassing during ascent. Here we show that undegassed magmatic and mantle carbon concentrations
    may be estimated in a Bayesian framework using diverse geologic information at an ocean island volcano. Our CO<SUB>2</SUB>
    concentration estimates do not rely upon complex degassing models, geochemical tracer elements, assumed magma supply rates,
    or rare undegassed rock samples. Rather, we couple volcanic CO<SUB>2</SUB> emission rates with probabilistic magma supply
    rates, which are obtained indirectly from magma storage and eruption rates. We estimate that the CO<SUB>2</SUB> content
    of mantle-derived magma supplying Hawai'i's active volcanoes is 0.97<SUB>-0.19</SUB><SUP>+0.25</SUP> wt%—roughly 40% higher
    than previously believed—and is supplied from a mantle source region with a carbon concentration of 263<SUB>-62</SUB><SUP>+81</SUP>
    ppm. Our results suggest that mantle plumes and ocean island basalts are carbon-rich. Our data also shed light on helium
    isotope abundances, CO<SUB>2</SUB>/Nb ratios, and may imply higher CO<SUB>2</SUB> emission rates from ocean island volcanoes.
