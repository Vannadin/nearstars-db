  abstract: In the monograph, the authors systematize and generalize the results of studying solar-type activity that is characteristic
    of a significant part of mid- and low-mass stars of the Galaxy, outline the characteristics of such stars in the quiescent
    state, during the sporadic flares and variations of magnetic activity over the course of stellar evolution. The observational
    data taken over the whole range of the electromagnetic spectrum from decametric radio waves to X-rays are described in
