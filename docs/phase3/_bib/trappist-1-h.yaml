  title: 'JWST COMPASS: NIRSpec/G395H Transmission Observations of TOI-776 c, a 2 R<SUB>⊕</SUB> M Dwarf Planet'
  authors:
  - Teske, Johanna
  - Batalha, Natasha E.
  - Wallack, Nicole L.
  - Kirk, James
  - Wogan, Nicholas F.
  - Gordon, Tyler A.
  - Alam, Munazza K.
