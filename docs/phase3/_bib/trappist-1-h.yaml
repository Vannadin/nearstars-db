  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.3847/1538-3881/acea77
  abstract: We present an atmospheric analysis of LTT 9779 b, a rare planet situated in the hot-Neptune desert, that has been
    observed with Hubble Space Telescope (HST)/WFC3 with G102 and G141. The combined transmission spectrum, which covers 0.8-1.6
    μm, shows a gradual increase in transit depth with wavelength. Our preferred atmospheric model shows evidence for H<SUB>2</SUB>O,
    CO<SUB>2</SUB>, and FeH with a significance of 3.1σ, 2.4σ, and 2.1σ, respectively. In an attempt to constrain the rate
    of atmospheric escape for this planet, we search for the 1.083 μm helium line in the G102 data but find no evidence of
    excess absorption that would indicate an escaping atmosphere using this tracer. We refine the orbital ephemerides of LTT
    9779 b using our HST data and observations from TESS, searching for evidence of orbital decay or apsidal precession, which
    are not found. The phase-curve observation of LTT 9779 b with JWST NIRISS should provide deeper insights into the atmosphere
    of this planet and the expected atmospheric escape might be detected with further observations concentrated on other tracers
    such as Lyα.
