  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.1051/0004-6361/201937254
  abstract: '<BR /> Aims: Since 2011, the SOPHIE spectrograph has been used to search for Neptunes and super-Earths in the
    northern hemisphere. As part of this observational program, 290 radial velocity measurements of the 6.4 V magnitude star
    HD 158259 were obtained. Additionally, TESS photometric measurements of this target are available. We present an analysis
    of the SOPHIE data and compare our results with the output of the TESS pipeline. <BR /> Methods: The radial velocity data,
    ancillary spectroscopic indices, and ground-based photometric measurements were analyzed with classical and ℓ<SUB>1</SUB>
    periodograms. The stellar activity was modeled as a correlated Gaussian noise and its impact on the planet detection was
    measured with a new technique. <BR /> Results: The SOPHIE data support the detection of five planets, each with m sin
    i ≈ 6 M<SUB>⊕</SUB>, orbiting HD 158259 in 3.4, 5.2, 7.9, 12, and 17.4 days. Though a planetary origin is strongly favored,
    the 17.4 d signal is classified as a planet candidate due to a slightly lower statistical significance and to its proximity
    to the expected stellar rotation period. The data also present low frequency variations, most likely originating from
    a magnetic cycle and instrument systematics. Furthermore, the TESS pipeline reports a significant signal at 2.17 days
    corresponding to a planet of radius ≈1.2 R<SUB>⊕</SUB>. A compatible signal is seen in the radial velocities, which confirms
    the detection of an additional planet and yields a ≈2 M<SUB>⊕</SUB> mass estimate. <BR /> Conclusions: We find a system
    of five planets and a strong candidate near a 3:2 mean motion resonance chain orbiting HD 158259. The planets are found
    to be outside of the two and three body resonances.'
