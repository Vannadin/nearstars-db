  doi: 10.1029/2021JE006853
  abstract: Saturn's Moon Titan receives volatiles into the top of its atmosphere—including atomic oxygen—sourced from cryovolcanoes
    on Enceladus. Similar types of atmosphere exchange from one body to another, such as O<SUB>2</SUB> and O<SUB>3</SUB> sourced
    from TRAPPIST-1 d, could be introduced into the upper atmosphere of TRAPPIST-1 e and might be interpreted as biosignatures.
    We simulate this potential false-positive for life on TRAPPIST-1 e, by applying an external influx of water and oxygen
    into the top of the atmosphere using a coupled 1-D photochemical-climate model (Atmos), to predict atmospheric composition.
    In addition, synthetic spectral observations are produced using the Planetary Spectrum Generator for the James Webb Space
    Telescope, Origins Space Telescope, Habitable Exoplanet Observatory and Large Ultra-violet/Optical/Infrared Surveyor to
    test the detectability of abiotic-generated O<SUB>2</SUB> and O<SUB>3</SUB> in the presence of abiotic and biotic surface
    fluxes of CH<SUB>4</SUB>. We determine that the incoming flux of material needed to trigger detection of abiotic O<SUB>2</SUB>/O<SUB>3</SUB>
    by any of these observatories is more than two orders of magnitude (1 × 10<SUP>12</SUP> molecules/cm<SUP>2</SUP>/s) above
    what is physically plausible.
