- &id474
  arxiv_id: '1703.05775'
  ads_bibcode: 2017ApJS..231...15D
  title: Individual Dynamical Masses of Ultracool Dwarfs
  authors:
  - Dupuy, Trent J.
  - Liu, Michael C.
  year: '2017'
  pubdate: '2017-08-00'
  doi: 10.3847/1538-4365/aa5e4c
  abstract: We present the full results of our decade-long astrometric monitoring programs targeting 31 ultracool binaries
    with component spectral types M7-T5. Joint analysis of resolved imaging from Keck Observatory and Hubble Space Telescope
    and unresolved astrometry from CFHT/WIRCam yields parallactic distances for all systems, robust orbit determinations for
    23 systems, and photocenter orbits for 19 systems. As a result, we measure 38 precise individual masses spanning 30-115
    {M}<SUB>Jup</SUB>}. We determine a model-independent substellar boundary that is ≈70 {M}<SUB>Jup</SUB>} in mass (≈L4 in
    spectral type), and we validate Baraffe et al. evolutionary model predictions for the lithium-depletion boundary (60 {M}<SUB>Jup</SUB>}
    at field ages). Assuming each binary is coeval, we test models of the substellar mass-luminosity relation and find that
    in the L/T transition, only the Saumon &amp; Marley “hybrid” models accounting for cloud clearing match our data. We derive
    a precise, mass-calibrated spectral type-effective temperature relation covering 1100-2800 K. Our masses enable a novel
    direct determination of the age distribution of field brown dwarfs spanning L4-T5 and 30-70 {M}<SUB>Jup</SUB>}. We determine
    a median age of 1.3 Gyr, and our population synthesis modeling indicates our sample is consistent with a constant star
    formation history modulated by dynamical heating in the Galactic disk. We discover two triple-brown-dwarf systems, the
    first with directly measured masses and eccentricities. We examine the eccentricity distribution, carefully considering
    biases and completeness, and find that low-eccentricity orbits are significantly more common among ultracool binaries
    than solar-type binaries, possibly indicating the early influence of long-lived dissipative gas disks. Overall, this work
    represents a major advance in the empirical view of very low-mass stars and brown dwarfs. <P />Based on observations made
    with the NASA/ESA Hubble Space Telescope, obtained at the Space Telescope Science Institute, which is operated by the
    Association of Universities for Research in Astronomy, Inc., under NASA contract NAS 5-26555. These observations are associated
    with programs GO-11593, GO-12317, and GO-12661.
