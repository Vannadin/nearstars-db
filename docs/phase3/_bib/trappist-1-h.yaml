  abstract: The Wide-field Infrared Survey Explorer (WISE; see Wright et al. 2010AJ....140.1868W) is a NASA Medium Class Explorer
    mission that conducted a digital imaging survey of the entire sky in the 3.4, 4.6, 12 and 22um mid-infrared bandpasses
    (hereafter W1, W2, W3 and W4). WISE will produce and release to the world astronomical and educational communities and
    general public a digital Image Atlas covering the sky in the four survey bands, and a reliable Source Catalog containing
    accurate photometry and astrometry for over 300 million objects. The WISE Catalog and Atlas will enable a broad variety
    of research efforts ranging from the search for the closest stars and brown dwarfs to the most luminous galaxies in the
    Universe. WISE science data products will serve as an important reference data set for planning observations and interpreting
    data obtained with future ground and space-borne observatories, such as JWST. WISE was launched on 2009-12-14 from Vandenberg
    SLC2W. <P />(1 data file).
