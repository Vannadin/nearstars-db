- &id549
  arxiv_id: astro-ph/0601222
  ads_bibcode: 2006ApJ...642..478M
  title: Disk Surface Density Transitions as Protoplanet Traps
  authors:
  - Masset, F. S.
  - Morbidelli, A.
  - Crida, A.
  - Ferreira, J.
  year: '2006'
  pubdate: '2006-05-00'
  doi: 10.1086/500967
  abstract: 'The tidal torque exerted by a protoplanetary disk with power-law surface density and temperature profiles onto
    an embedded protoplanetary embryo is generally a negative quantity that leads to the embryo inward migration. Here we
    investigate how the tidal torque balance is affected at a disk surface density radial jump. The jump has two consequences:
    (1) It affects the differential Lindblad torque. In particular, if the disk is merely empty on the inner side, the differential
    Lindblad torque almost amounts to the large negative outer Lindblad torque. (2) It affects the corotation torque, which
    is a quantity very sensitive to the local gradient of the disk surface density. In particular, if the disk is depleted
    on the inside and the jump occurs radially over a few pressure scale heights, the corotation torque is a positive quantity
    that is much larger than in a power-law disk. We show by means of customized numerical simulations of low-mass planets
    embedded in protoplanetary nebulae with a surface density jump that the second effect is dominant; that is, that the corotation
    torque largely dominates the differential Lindblad torque on the edge of a central depletion, even a shallow one. Namely,
    a disk surface density jump of about 50% over 3-5 disk thicknesses suffices to cancel out the total torque. As a consequence,
    the type I migration of low-mass objects reaching the jump should be halted, and all these objects should be trapped there
    provided some amount of dissipation is present in the disk to prevent the corotation torque saturation. As dissipation
    is provided by turbulence, which induces a jitter of the planet semimajor axis, we investigate under which conditions
    the trapping process overcomes the trend of turbulence to induce stochastic migration across the disk. We show that a
    cavity with a large outer to inner surface density ratio efficiently traps embryos from 1 to 15 M<SUB>⊕</SUB>, at any
    radius up to 5 AU from the central object, in a disk that has same surface density profile as the minimum mass solar nebula
    (MMSN). Shallow surface density transitions require light disks to efficiently trap embryos. In the case of the MMSN,
    this could happen in the very central parts (r&lt;0.03 AU). We discuss where in a protoplanetary disk one can expect a
    surface density jump. This effect could constitute a solution to the well-known problem that the buildup of the first
    protogiant solid core in a disk takes much longer than its type I migration toward the central object.'
  source: citation_of=2017NatAs...1E.129L
