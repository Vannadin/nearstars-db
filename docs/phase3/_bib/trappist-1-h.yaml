- &id574
  arxiv_id: '2503.05055'
  ads_bibcode: 2025ApJ...983...97C
  title: An Oxidation Gradient Straddling the Small Planet Radius Valley
  authors:
  - Cherubim, Collin
  - Wordsworth, Robin
  - Bower, Dan J.
  - Sossi, Paolo A.
  - Adams, Danica
  - Hu, Renyu
  year: '2025'
  pubdate: '2025-04-00'
  doi: 10.3847/1538-4357/adbca9
  abstract: We present a population-level view of volatile gas species (H<SUB>2</SUB>, He, H<SUB>2</SUB>O, O<SUB>2</SUB>,
    CO, CO<SUB>2</SUB>, CH<SUB>4</SUB>) distribution during the sub-Neptune to rocky planet transition, revealing in detail
    the dynamic nature of small planet atmospheric compositions. Our novel model couples the atmospheric escape model IsoFATE
    with the magma ocean-atmosphere equilibrium chemistry model Atmodeller to simulate interior-atmosphere evolution over
    time for sub-Neptunes around G, K, and M stars. Chiefly, our simulations reveal that atmospheric mass fractionation driven
    by escape and interior-atmosphere exchange conspire to create a distinct oxidation gradient straddling the small-planet
    radius valley. We discover a key mechanism in shaping the oxidation landscape is the dissolution of water into the molten
    mantle, which shields oxygen from early escape, buffers the escape rate, and leads to oxidized secondary atmospheres following
    mantle outgassing. Our simulations reproduce a prominent population of He-rich worlds along the upper edge of the radius
    valley, revealing that they are stable on shorter timescales than previously predicted. Our simulations also robustly
    predict a broad population of O<SUB>2</SUB>-dominated atmospheres on close-in planets around low-mass stars, posing a
    potential source of false positive biosignature detection and marking a high-priority opportunity for the first-ever atmospheric
    O<SUB>2</SUB> detection. We motivate future atmospheric characterization surveys by providing a target list of planet
    candidates predicted to have O<SUB>2</SUB>-, He-, and deuterium-rich atmospheres.
