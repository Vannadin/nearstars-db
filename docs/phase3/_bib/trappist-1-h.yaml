  arxiv_id: '1612.04856'
  ads_bibcode: 2017AJ....153..265W
  title: New Insights on Planet Formation in WASP-47 from a Simultaneous Analysis of Radial Velocities and Transit Timing
    Variations
  authors:
  - Weiss, Lauren M.
  - Deck, Katherine M.
  - Sinukoff, Evan
  - Petigura, Erik A.
  - Agol, Eric
  - Lee, Eve J.
  - Becker, Juliette C.
  - Howard, Andrew W.
  - Isaacson, Howard
  - Crossfield, Ian J. M.
  - Fulton, Benjamin J.
  - Hirsch, Lea
  - Benneke, Björn
  year: '2017'
  pubdate: '2017-06-00'
  doi: 10.3847/1538-3881/aa6c29
  abstract: 'Measuring precise planet masses, densities, and orbital dynamics in individual planetary systems is an important
    pathway toward understanding planet formation. The WASP-47 system has an unusual architecture that motivates a complex
    formation theory. The system includes a hot Jupiter (“b”) neighbored by interior (“e”) and exterior (“d”) sub-Neptunes,
    and a long-period eccentric giant planet (“c”). We simultaneously modeled transit times from the Kepler K2 mission and
    118 radial velocities to determine the precise masses, densities, and Keplerian orbital elements of the WASP-47 planets.
    Combining RVs and TTVs provides a better estimate of the mass of planet d (13.6+/- 2.0 {M}<SUB>\oplus </SUB>) than that
    obtained with only RVs (12.75+/- 2.70 {M}<SUB>\oplus </SUB>) or TTVs (16.1+/- 3.8 {M}<SUB>\oplus </SUB>). Planets e and
    d have high densities for their size, consistent with a history of photoevaporation and/or formation in a volatile-poor
    environment. Through our RV and TTV analysis, we find that the planetary orbits have eccentricities similar to the solar
    system planets. The WASP-47 system has three similarities to our own solar system: (1) the planetary orbits are nearly
    circular and coplanar, (2) the planets are not trapped in mean motion resonances, and (3) the planets have diverse compositions.
    None of the current single-process exoplanet formation theories adequately reproduce these three characteristics of the
    WASP-47 system (or our solar system). We propose that WASP-47, like the solar system, formed in two stages: first, the
    giant planets formed in a gas-rich disk and migrated to their present locations, and second, the high-density sub-Neptunes
    formed in situ in a gas-poor environment.'
