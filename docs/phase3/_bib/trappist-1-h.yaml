- &id1027
  arxiv_id: '1409.0978'
  ads_bibcode: 2014ApJ...793L..34P
  title: 'Short Dissipation Times of Proto-planetary Disks: An Artifact of Selection Effects?'
  authors:
  - Pfalzner, Susanne
  - Steinhausen, Manuel
  - Menten, Karl
  year: '2014'
  pubdate: '2014-10-00'
  doi: 10.1088/2041-8205/793/2/L34
  abstract: The frequency of disks around young stars, a key parameter for understanding planet formation, is most readily
    determined in young stellar clusters where many relatively coeval stars are located in close proximity. Observational
    studies seem to show that the disk frequency decreases rapidly with cluster age with &lt;10% of cluster stars retaining
    their disks for longer than 2-6 Myr. Given that at least half of all stars in the field seem to harbor one or more planets,
    this would imply extremely fast disk dispersal and rapid planet growth. Here we question the validity of this constraint
    by demonstrating that the short disk dissipation times inferred to date might have been heavily underestimated by selection
    effects. Critically, for ages &gt;3 Myr only stars that originally populated the densest areas of very populous clusters,
    which are prone to disk erosion, are actually considered. This tiny sample may not be representative of the majority of
    stars. In fact, the higher disk fractions in co-moving groups indicate that it is likely that over 30% of all field stars
    retain their disks well beyond 10 Myr, leaving ample time for planet growth. Equally, our solar system, with a likely
    formation time &gt;10 Myr, need no longer be an exception but in fact typical of planetary systems.
  source: citation_of=2017AJ....154..121B
