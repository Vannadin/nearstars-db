- arxiv_id: null
  ads_bibcode: 2024jwst.prop.6193P
  title: A Search for Exoplanet Satellites that are the Same Size as the Earth's Moon
  authors:
  - Pass, Emily
  - Bean, Jacob L.
  - Charbonneau, David
  - Cherubim, Collin
  - Garcia-Mejia, Juliana
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: 'With its proven ability to achieve an RMS precision of 5 ppm in white-light transit curves, JWST with NIRISS/SOSS
    provides a novel opportunity to find Moon-analog (0.27REarth) exomoons around the terrestrial planets of M dwarfs. While
    no conclusive detections of exomoons have been reported to date, planet formation theories predict that such satellites
    should be a common outcome of the collisional dynamics in early exosolar systems. Exomoons have the potential to open
    the door to a multitude of new avenues to learn about exoplanet systems, speaking to topics of habitability, tidal heating,
    planet formation, late-stage growth, planetary compositions, and more. The standout best system to conduct a first search
    for rocky moons is TOI-700, which contains two habitable-zone terrestrial planets that present a large dynamically allowed
    region in which moons could exist. The next best system is TRAPPIST-1, which has already been observed: We present an
    analysis of the TRAPPIST-1 h data that shows we can rule out moons down to 40% the size of the Earth''s Moon. Although
    there exist several other known exoplanet systems where JWST could search for such moons, we emphasize that the TOI-700
    planets alone account for nearly half of all dynamically allowed phase space when summing over all systems, owing to their
    long orbital periods. The discovery of a habitable-zone Earth-Moon analog would be a transformative discovery; likewise,
    a non-detection would allow us to rule out an occurrence rate in excess of 12%.'
