  doi: 10.1006/icar.2000.6573
  abstract: The lunar gravity field is determined from the tracking data of previous missions to the Moon with the 1998-1999
    Lunar Prospector (LP) mission being the major contributor. LP provided the first measurement of the gravity field in a
    low polar circular orbit giving complete coverage at high resolution for the entire lunar nearside. However, since there
    is no direct measurement of the lunar farside from LP or any other mission, gravity details for the farside gravity are
    greatly limited. Even so, it has become apparent that there are mascons on the farside of the Moon together with the newly
    identified mascons in the LP data for the lunar nearside. The extended mission low-altitude data (at times less than 10
    km above the surface) has gravity information for the nearside to nearly degree and order 180. The 100th-degree lunar
    gravity models (LP100J and LP100K) extract most of the information from the nominal 100-km altitude. A 165th degree model
    LP165P attempts to model the extended mission data with some but limited success. This model provides a smooth solution
    without aliasing when evaluated up to degree 110 allowing for resolution of numerous craters. In addition, a preliminary
    solution for the lunar Love number is k<SUB>2</SUB>=0.026±0.003.
