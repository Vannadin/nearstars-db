  pubdate: '2018-01-00'
  doi: null
  abstract: Before an exoplanet transit, atmospheric refraction bends light into the line of sight of an observer. The refracted
    light forms a stellar mirage---a distorted secondary image of the host star---that causes flux increases before transit
    ingress and after transit egress. The extent of this flux increase provides clues as to the composition and structure
    of the exoplanetary atmosphere. Here, I model the stellar mirages produced by a comprehensive set of stellar, orbital,
    planetary, and atmospheric parameters. Refracted light offers unprecedented atmospheric characterization opportunities
    for cold, long-period gas giant exoplanets. At visible wavelengths, opacity from Rayleigh scattering presents a substantial
    challenge to detecting stellar mirages for most exoplanets with orbital distances less than 6 AU. Based on physical parameters,
    I derive a criterion that determines if refracted light will significantly influence observations of a specific exoplanetary
    system with application to the high-precision Kepler data set. I also investigate the potential for refracted light to
    identify non-transiting exoplanets and serve as a novel means of out-of-transit atmospheric characterization. The atmospheric
    lensing events produced by non-transiting exoplanets are more detectable than the corresponding flux increases for transiting
    exoplanets. Compared to visible light observations, those at red to near-infrared wavelengths are more likely to detect
    refracted light in an exoplanet atmosphere. With upcoming exoplanet discovery and characterization missions in mind, I
    consider science cases that are uniquely enabled by photometric and spectroscopic observations of refracted light in exoplanetary
    systems.
