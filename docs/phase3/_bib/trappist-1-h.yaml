- &id086
  arxiv_id: '2311.17699'
  ads_bibcode: 2024ApJ...960...44T
  title: The Carbon-deficient Evolution of TRAPPIST-1c
  authors:
  - Teixeira, Katie E.
  - Morley, Caroline V.
  - Foley, Bradford J.
  - Unterborn, Cayman T.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-4357/ad0cec
  abstract: Transiting planets orbiting M dwarfs provide the best opportunity to study the atmospheres of rocky planets with
    current facilities. As JWST enters its second year of science operations, an important initial endeavor is to determine
    whether these rocky planets have atmospheres at all. M dwarfs are thought to pose a major threat to planetary atmospheres
    due to their high magnetic activity over timescales of several billion years, and might completely strip atmospheres.
    Several Cycle 1 and 2 General Observers and Guaranteed Time Observations programs are testing this hypothesis, observing
    a series of rocky planets to determine whether they retained their atmospheres. A key case study is TRAPPIST-1c, which
    receives almost the same bolometric flux as Venus. We might therefore expect TRAPPIST-1c to possess a thick, CO<SUB>2</SUB>-dominated
    atmosphere. Instead, Zieba et al. show that it has little to no CO<SUB>2</SUB> in its atmosphere. To interpret these results,
    we run coupled time-dependent simulations of planetary outgassing and atmospheric escape to model the evolution of TRAPPIST-1c's
    atmosphere. We find that the stellar wind stripping that is expected to occur on TRAPPIST-1c over its lifetime can only
    remove up to ~16 bar of CO<SUB>2</SUB>, less than the modern CO<SUB>2</SUB> inventory of either Earth or Venus. Therefore,
    we infer that TRAPPIST-1c either formed volatile-poor, as compared to Earth and Venus, or lost a substantial amount of
    CO<SUB>2</SUB> during an early phase of hydrodynamic hydrogen escape. Finally, we scale our results for the other TRAPPIST-1
    planets, finding that the more distant TRAPPIST-1 planets may readily retain atmospheres.
