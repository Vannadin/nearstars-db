  arxiv_id: '1712.01911'
  ads_bibcode: 2018ApJ...853...30V
  title: Stellar Parameters for Trappist-1
  authors:
  - Van Grootel, Valérie
  - Fernandes, Catarina S.
  - Gillon, Michael
  - Jehin, Emmanuel
  - Manfroid, Jean
  - Scuflaire, Richard
  - Burgasser, Adam J.
  - Barkaoui, Khalid
  - Benkhaldoun, Zouhair
  - Burdanov, Artem
