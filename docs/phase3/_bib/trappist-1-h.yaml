- &id246
  arxiv_id: '2306.10100'
  ads_bibcode: 2023ApJ...954...29P
  title: Rocky Planet or Water World? Observability of Low-density Lava World Atmospheres
  authors:
  - Piette, Anjali A. A.
  - Gao, Peter
  - Brugman, Kara
  - Shahar, Anat
  - Lichtenberg, Tim
  - Miozzi, Francesca
  - Driscoll, Peter
  year: '2023'
  pubdate: '2023-09-00'
  doi: 10.3847/1538-4357/acdef2
  abstract: 'Super-Earths span a wide range of bulk densities, indicating a diversity in interior conditions beyond that seen
    in the solar system. In particular, an emerging population of low-density super-Earths may be explained by volatile-rich
    interiors. Among these, low-density lava worlds have dayside temperatures that are high enough to evaporate their surfaces,
    providing a unique opportunity to probe their interior compositions and test for the presence of volatiles. In this work,
    we investigate the atmospheric observability of low-density lava worlds. We use a radiative-convective model to explore
    the atmospheric structures and emission spectra of these planets, focusing on three case studies with high observability
    metrics and substellar temperatures spanning ~1900-2800 K: HD 86226 c, HD 3167 b, and 55 Cnc e. Given the possibility
    of mixed volatile and silicate interior compositions for these planets, we consider a range of mixed volatile and rock-vapor
    atmospheric compositions. This includes a range of volatile fractions and three volatile compositions: water-rich (100%
    H<SUB>2</SUB>O), water with CO<SUB>2</SUB> (80% H<SUB>2</SUB>O+20% CO<SUB>2</SUB>), and a desiccated O-rich scenario (67%
    O<SUB>2</SUB>+33% CO<SUB>2</SUB>). We find that spectral features due to H<SUB>2</SUB>O, CO<SUB>2</SUB>, SiO, and SiO<SUB>2</SUB>
    are present in the infrared emission spectra as either emission or absorption features, depending on dayside temperature,
    volatile fraction, and volatile composition. We further simulate JWST secondary-eclipse observations for each of the three
    case studies, finding that H<SUB>2</SUB>O and/or CO<SUB>2</SUB> could be detected with as few as ~five eclipses. Detecting
    volatiles in these atmospheres would provide crucial independent evidence that volatile-rich interiors exist among the
    super-Earth population.'
