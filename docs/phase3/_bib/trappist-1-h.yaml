- &id1061
  arxiv_id: '1302.5830'
  ads_bibcode: 2013A&A...553A..30T
  title: 'CoRoT 101186644: A transiting low-mass dense M-dwarf on an eccentric 20.7-day period orbit around a late F-star.
    Discovered in the CoRoT lightcurves'
  authors:
  - Tal-Or, L.
  - Mazeh, T.
  - Alonso, R.
  - Bouchy, F.
  - Cabrera, J.
  - Deeg, H. J.
  - Deleuil, M.
  - Faigler, S.
  - Fridlund, M.
  - Hébrard, G.
  - Moutou, C.
  - Santerne, A.
  - Tingley, B.
  year: '2013'
  pubdate: '2013-05-00'
  doi: 10.1051/0004-6361/201220862
  abstract: We present the study of the CoRoT transiting planet candidate 101186644, also named LRc01_E1_4780. Analysis of
    the CoRoT lightcurve and the HARPS spectroscopic follow-up observations of this faint (m<SUB>V</SUB> = 16) candidate revealed
    an eclipsing binary composed of a late F-type primary (T<SUB>eff</SUB> = 6090 ± 200 K) and a low-mass, dense late M-dwarf
    secondary on an eccentric (e = 0.4) orbit with a period of ~20.7 days. The M-dwarf has a mass of 0.096 ± 0.011 M<SUB>☉</SUB>,
    and a radius of 0.104<SUB>-0.006</SUB><SUP>+0.026</SUP> R<SUB>☉</SUB>, which possibly makes it the smallest and densest
    late M-dwarf reported so far. Unlike the claim that theoretical models predict radii that are 5-15% smaller than measured
    for low-mass stars, this one seems to have a radius that is consistent and might even be below the radius predicted by
    theoretical models. <P />Based on observations made with the 1-m telescope at the Wise Observatory, Israel, the Swiss
    1.2-m Leonhard Euler telescope at La Silla Observatory, Chile, the IAC-80 telescope at the Observatory del Teide, Canarias,
    Spain, and the 3.6-m telescope at La Silla Observatory (ESO), Chile (program 184.C-0639).
