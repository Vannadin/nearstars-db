- &id083
  arxiv_id: '2412.16541'
  ads_bibcode: 2025ApJ...979L..19R
  title: Stellar Contamination Correction Using Back-to-back Transits of TRAPPIST-1 b and c
  authors:
  - Rathcke, Alexander D.
  - Buchhave, Lars A.
  - de Wit, Julien
  - Rackham, Benjamin V.
  - August, Prune C.
  - Diamond-Lowe, Hannah
