  ads_bibcode: 2016ApJ...821...81G
  title: 'Living with a Red Dwarf: Rotation and X-Ray and Ultraviolet Properties of the Halo Population Kapteyn''s Star'
  authors:
  - Guinan, Edward F.
  - Engle, Scott G.
  - Durbin, Allyn
  year: '2016'
  pubdate: '2016-04-00'
  doi: 10.3847/0004-637X/821/2/81
  abstract: 'As part of Villanova''s Living with a Red Dwarf program, we have obtained UV, X-ray, and optical data of the
    Population II red dwarf -- Kapteyn''s Star. Kapteyn''s Star is noteworthy for its large proper motions and high radial
    velocity of ∼+245 km s<SUP>-1</SUP>. As the nearest Pop II red dwarf, it serves as an old age anchor for calibrating activity/irradiance-rotation-age
    relations, and an important test bed for stellar dynamos and the resulting X-ray-UV emissions of slowly rotating, near-fully
    convective red dwarf stars. Adding to the notoriety, Kapteyn''s Star has recently been reported to host two super-Earth
    candidates, one of which (Kapteyn b) is orbiting within the habitable zone. However, Robertson et al. questioned the planet''s
    existence since its orbital period may be an artifact of activity, related to the star''s rotation period. Because of
    its large Doppler-shift, measures of the important, chromospheric H I Lyα 1215.67 Å emission line can be reliably made,
    because it is mostly displaced from ISM and geo-coronal sources. Lyα emission dominates the FUV region of cool stars.
    Our measures can help determine the X-ray-UV effects on planets hosted by Kapteyn''s Star, and planets hosted by other
    old red dwarfs. Stellar X-ray and Lyα emissions have strong influences on the heating and ionization of upper planetary
    atmospheres and can (with stellar winds and flares) erode or even eliminate planetary atmospheres. Using our program stars,
    we have reconstructed the past exposures of Kapteyn''s Star''s planets to coronal - chromospheric XUV emissions over time.
    <P />Based on observations made with the NASA/ESA Hubble Space Telescope, obtained at the Space Telescope Science Institute,
    which is operated by the Association of Universities for Research in Astronomy, Inc., under NASA contract NAS 5-26555.
    These observations are associated with program #13020. This work is also based on observations obtained with the Chandra
    X-ray Observatory, a NASA science mission, program #13200633.'
