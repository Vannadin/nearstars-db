  arxiv_id: '1710.03775'
  ads_bibcode: 2018haex.bookE.130B
  title: SPECULOOS Exoplanet Search and Its Prototype on TRAPPIST
  authors:
  - Burdanov, Artem
  - Delrez, Laetitia
  - Gillon, Michaël
  - Jehin, Emmanuël
  year: '2018'
  pubdate: '2018-00-00'
  doi: 10.1007/978-3-319-55333-7_130
  abstract: One of the most significant goals of modern science is establishing whether life exists around other suns. The
    most direct path towards its achievement is the detection and atmospheric characterization of terrestrial exoplanets with
    potentially habitable surface conditions. The nearest ultracool dwarfs (UCDs), i.e., very-low-mass stars and brown dwarfs
    with effective temperatures lower than 2700 K, represent a unique opportunity to reach this goal within the next decade.
    The potential of the transit method for detecting potentially habitable Earth-sized planets around these objects is drastically
    increased compared to Earth-Sun analogs. A terrestrial planet transiting a nearby UCD could be an exquisite target for
    a thorough atmospheric characterization, including the search for possible biosignatures, with near-future facilities
    such as the James Webb Space Telescope. In this chapter, we first describe the physical properties of UCDs as well as
    the unique potential they offer for the detection of potentially habitable Earth-sized planets suitable for atmospheric
    characterization. Then, we present the SPECULOOS ground-based transit survey, that will search for Earth-sized planets
    transiting the nearest UCDs, as well as its prototype survey on the TRAPPIST telescopes. We conclude by discussing the
    prospects offered by the recent detection by this prototype survey of a system of seven temperate Earth-sized planets
    transiting a nearby UCD, TRAPPIST-1.
