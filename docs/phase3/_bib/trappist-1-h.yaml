  pubdate: '2000-05-00'
  doi: 10.1126/science.288.5469.1208
  abstract: Spectroscopy of Io's Pele plume against Jupiter by the Hubble Space Telescope in October 1999 revealed absorption
    due to S<SUB>2</SUB> gas, with a column density of 1.0 +/- 0.2 × 10<SUP>16</SUP> per square centimeter, and probably also
    SO<SUB>2</SUB> gas with a column density of 7 +/- 3 × 10<SUP>16</SUP> per square centimeter. This SO<SUB>2</SUB>/S<SUB>2</SUB>
    ratio (3 to 12) is expected from equilibration with silicate magmas near the quartz-fayalite-magnetite or wüstite-magnetite
    buffers. Condensed S<SUB>3</SUB> and S<SUB>4</SUB>, probable coloring agents in Pele's red plume deposits, may form by
    polymerization of the S<SUB>2</SUB>, which is unstable to ultraviolet photolysis. Diffuse red deposits near other Io volcanoes
    suggest that venting and polymerization of S<SUB>2</SUB> gas is a widespread feature of Io volcanism.
