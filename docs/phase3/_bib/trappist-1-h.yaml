  arxiv_id: '1806.11234'
  ads_bibcode: 2018MNRAS.479.5567Z
  title: Survival function analysis of planet size distribution with Gaia Data Release 2 updates
  authors:
  - Zeng, Li
  - Jacobsen, Stein B.
  - Sasselov, Dimitar D.
  - Vanderburg, Andrew
  year: '2018'
  pubdate: '2018-10-00'
  doi: 10.1093/mnras/sty1749
  abstract: 'Applying the survival function analysis to the planet radius distribution of the Kepler confirmed/candidate planets,
    we have identified two natural divisions of planet radius at 4 Earth radii (R<SUB>⊕</SUB>) and 10 R<SUB>⊕</SUB>. These
    divisions place constraints on planet formation and interior structure model. The division at 4 R<SUB>⊕</SUB> separates
    small exoplanets from large exoplanets above. When combined with the recently discovered radius gap at 2 R<SUB>⊕</SUB>,
    it supports the treatment of planets in between 2 and 4 R<SUB>⊕</SUB> as a separate group, likely water worlds. For planets
    around solar-type FGK main-sequence stars, we argue that 2 R<SUB>⊕</SUB> is the separation between water-poor and water-rich
    planets, and 4 R<SUB>⊕</SUB> is the separation between gas-poor and gas-rich planets. We confirm the slope of the survival
    function in between 4 and 10 R<SUB>⊕</SUB> to be shallower compared to either ends, indicating a relative paucity of planets
    in between 4 and 10 R<SUB>⊕</SUB>, namely the sub-Saturnian desert there. We name them transitional planets, as they form
    a bridge between the gas-poor small planets and gas giants. Accordingly, we propose the following classification scheme:
    (&lt;2 R<SUB>⊕</SUB>) rocky planets, (2-4 R<SUB>⊕</SUB>) water worlds, (4-10 R<SUB>⊕</SUB>) transitional planets, and
    (&gt;10 R<SUB>⊕</SUB>) gas giants.'
