- arxiv_id: '2508.12865'
  ads_bibcode: 2025arXiv250812865M
  title: An empirical determination of the Cosmic Shoreline
  authors:
  - Meni-Gallardo, Pedro
  - Pallé, Enric
  year: '2025'
  pubdate: '2025-08-00'
  doi: 10.48550/arXiv.2508.12865
  abstract: 'The Cosmic Shoreline concept was introduced as a way to separate planets with and without atmosphere, based on
    the relationship between the cumulative instellation and the escape velocity observed in the Solar System. The exoplanet
    community has tried to refine the way we understand the cosmic shoreline in order to provide a consistent tool for establishing
    the hierarchy for exoplanet observations. This is particularly relevant when trying to unveil small exoplanet atmospheres
    with the JWST or the upcoming ELTs. Here, our goal is to use an empirical approach to refine the Cosmic Shoreline concept.
    In particular, we used the data provided by the ExoAtmospheres database, using the largest available sample of exoplanets
    with confirmed atmospheric detections. We reconcile limitations in the classical shoreline definition by anchoring our
    Empirical Cosmic Shoreline (ECS) to both Mars and the irradiated super-Earth 55 Cnc e. The resulting relation exhibits
    a significantly steeper slope than previously theorized. Applied to planets orbiting M dwarfs, prime targets for habitable-zone
    studies, the ECS suggests that a larger fraction retain atmospheres than predicted by classical models when using standard
    Ixuv estimates. However, incorporating revised XUV fluence histories for low-mass M dwarfs (M&lt; 0.35 Ms) reveals severe
    atmospheric vulnerability: only seven small planets (R&lt;1.7 Re) orbit securely within the retention zone of these stars.
    We finally identify high-priority targets for the JWST Rocky Worlds survey and future ELT observations based on their
    ECS positioning and Transmission Spectroscopy Metrics. Future efforts must focus on expanding the empirical validations
    of the ECS, particularly through high-precision observations of borderline candidates and systems with well-constrained
    XUV histories. [Abridged]'
