- arxiv_id: null
  ads_bibcode: 2025NatGe..18..260G
  title: Rapid rise of early ocean pH under elevated weathering rates
  authors:
  - Guo, Meng
  - Korenaga, Jun
  year: '2025'
  pubdate: '2025-03-00'
  doi: 10.1038/s41561-025-01649-9
  abstract: Ocean pH is a fundamental property regulating various aspects of Earth system evolution. However, early ocean
    pH remains controversial, with estimates ranging from strongly acidic to alkaline. Here we develop a model integrating
    global carbon cycling with ocean geochemistry, and incorporating continental growth and mantle thermal evolution. By coupling
    global carbon cycle with ocean charge balance, and by using solid Earth processes of mantle degassing and crustal evolution
    to specify the history of volatile distribution and ocean chemistry, we show that a rapid increase in ocean pH is likely
    during the Hadean to the early Archaean eons, with pH evolving from 5 to neutral by approximately 4.0 Gyr ago. This rapid
    pH evolution is attributed primarily to elevated rates of both seafloor and continental weathering during the Hadean.
    This acceleration in weathering rates originates in the unique aspects of Hadean geodynamics, including rapid crust formation,
    different crustal lithology and fast plate motion. Earth probably transformed from a hostile state to a habitable one
    by the end of the Hadean, approximately 4.0 Gyr ago, with important implications for planetary habitability and the origin
    of life.
