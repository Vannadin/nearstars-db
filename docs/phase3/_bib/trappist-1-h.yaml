  ads_bibcode: 2023NatAs...7.1317L
  title: A JWST transmission spectrum of the nearby Earth-sized exoplanet LHS 475 b
  authors:
  - Lustig-Yaeger, Jacob
  - Fu, Guangwei
  - May, E. M.
  - Ceballos, Kevin N. Ortiz
  - Moran, Sarah E.
  - Peacock, Sarah
  - Stevenson, Kevin B.
  - Kirk, James
  - López-Morales, Mercedes
  - MacDonald, Ryan J.
  - Mayorga, L. C.
  - Sing, David K.
  - Sotzen, Kristin S.
  - Valenti, Jeff A.
  - Redai, Jéa I. Adams
  - Alam, Munazza K.
  - Batalha, Natasha E.
