  arxiv_id: '1705.07098'
  ads_bibcode: 2018AsBio..18..739F
  title: 'Exoplanet Biosignatures: Observational Prospects'
  authors:
  - Fujii, Yuka
  - Angerhausen, Daniel
  - Deitrick, Russell
  - Domagal-Goldman, Shawn
  - Grenfell, John Lee
  - Hori, Yasunori
  - Kane, Stephen R.
  - Pallé, Enric
