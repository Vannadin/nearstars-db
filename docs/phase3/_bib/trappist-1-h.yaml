  arxiv_id: '2210.00149'
  ads_bibcode: 2022JGRE..12707456G
  title: CO<SUB>2</SUB> Ocean Bistability on Terrestrial Exoplanets
  authors:
  - Graham, R. J.
  - Lichtenberg, Tim
  - Pierrehumbert, Raymond T.
  year: '2022'
  pubdate: '2022-10-00'
  doi: 10.1029/2022JE007456
  abstract: Cycling of carbon dioxide between the atmosphere and interior of rocky planets can stabilize global climate and
    enable planetary surface temperatures above freezing over geologic time. However, variations in global carbon budget and
    unstable feedback cycles between planetary sub-systems may destabilize the climate of rocky exoplanets toward regimes
    unknown in the Solar System. Here, we perform clear-sky atmospheric radiative transfer and surface weathering simulations
    to probe the stability of climate equilibria for rocky, ocean-bearing exoplanets at instellations relevant for planetary
    systems in the outer regions of the circumstellar habitable zone. Our simulations suggest that planets orbiting G- and
    F-type stars (but not M-type stars) may display bistability between an Earth-like climate state with efficient carbon
    sequestration and an alternative stable climate equilibrium where CO<SUB>2</SUB> condenses at the surface and forms a
    blanket of either clathrate hydrate or liquid CO<SUB>2</SUB>. At increasing instellation and with ineffective weathering,
    the latter state oscillates between cool, surface CO<SUB>2</SUB>-condensing and hot, non-condensing climates. CO<SUB>2</SUB>
    bistable climates may emerge early in planetary history and remain stable for billions of years. The carbon dioxide-condensing
    climates follow an opposite trend in pCO<SUB>2</SUB> versus instellation compared to the weathering-stabilized planet
    population, suggesting the possibility of observational discrimination between these distinct climate categories.
