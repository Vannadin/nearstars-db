  - Madhusudhan, N.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.3847/1538-4357/ad8cda
  abstract: JWST is revolutionising the study of temperate sub-Neptunes, starting with the first detection of carbon-bearing
    molecules in the habitable-zone sub-Neptune K2-18 b. The retrieved abundances of CH<SUB>4</SUB> and CO<SUB>2</SUB> and
    nondetection of NH<SUB>3</SUB> and CO in K2-18 b are consistent with prior predictions of photochemical models for a Hycean
    world with a habitable ocean. However, recent photochemical modeling raised the prospect that the observed abundances
    may be explained by a mini-Neptune scenario instead. In this study, we explore these scenarios using independent photochemical
    modeling with K2-18 b as a case study. We find the previous results to be sensitive to a range of model assumptions, such
    as the photochemical cross sections, incident stellar spectrum, surface pressure, UV albedo, and metallicity, significantly
    affecting the resulting abundances. We explore a wide model space to investigate scenarios that are compatible with the
    retrieved molecular abundances for K2-18 b. Our analysis shows that the previously favored mini-Neptune scenario is not
    compatible with most of the retrieved abundances, while the Hycean scenarios, both inhabited and uninhabited, provide
    better agreement. An uninhabited Hycean scenario explains most of the abundance constraints, except CH<SUB>4</SUB>, which
    is generally underabundant but dependent on the model assumptions. The inhabited Hycean scenario is compatible with all
    the abundances if the observed CH<SUB>4</SUB> is assumed to be predominantly biogenic. Our results underscore the importance
    of systematic photochemical modeling and accurate interpretation of chemical abundance constraints for candidate Hycean
    worlds.
