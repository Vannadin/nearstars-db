- &id937
  arxiv_id: '1609.04416'
  ads_bibcode: 2017A&A...597A..26B
  title: No hydrogen exosphere detected around the super-Earth HD 97658 b
  authors:
  - Bourrier, V.
  - Ehrenreich, D.
  - King, G.
  - Lecavelier des Etangs, A.
  - Wheatley, P. J.
  - Vidal-Madjar, A.
  - Pepe, F.
  - Udry, S.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1051/0004-6361/201629253
  abstract: 'The exoplanet HD 97658 b provides a rare opportunity to probe the atmospheric composition and evolution of moderately
    irradiated super-Earths. It transits a bright K star at a moderate orbital distance of 0.08 au. Its low density is compatible
    with a massive steam envelope that could photodissociate at high altitudes and become observable as escaping neutral hydrogen.
    Our analysis of three transits with HST/STIS at Lyman-α reveals no such signature, suggesting that the thermosphere of
    HD 97658 b is not hydrodynamically expanding and is subjected to a low escape of neutral hydrogen (&lt;10<SUP>8</SUP>
    g s<SUP>-1</SUP> at 3σ). Using HST/STIS Lyman-α observations and Chandra/ACIS-S and XMM-Newton/EPIC X-ray observations
    at different epochs, we find that HD 97658 is in fact a weak and soft X-ray source with signs of chromospheric variability
    in the Lyman-α line core. We determine an average reference for the intrinsic Lyman-α line and X-EUV (XUV) spectrum of
    the star, and show that HD 97658 b is in mild conditions of irradiation compared to other known evaporating exoplanets
    with an XUV irradiation about three times lower than the evaporating warm Neptune GJ436 b. This could be the reason why
    the thermosphere of HD 97658 b is not expanding: the low XUV irradiation prevents an efficient photodissociation of any
    putative steam envelope. Alternatively, it could be linked to a low hydrogen content or inefficient conversion of the
    stellar energy input. The HD 97658 system provides clues for understanding the stability of low-mass planet atmospheres
    in terms of composition, planetary density, and irradiation. Our study of HD 97658 b can be seen as a control experiment
    of our methodology, confirming that it does not bias detections of atmospheric escape and underlining its strength and
    reliability. Our results show that stellar activity can be efficiently discriminated from absorption signatures by a transiting
    exospheric cloud. They also highlight the potential of observing the upper atmosphere of small transiting planets to probe
    their physical and chemical properties.'
