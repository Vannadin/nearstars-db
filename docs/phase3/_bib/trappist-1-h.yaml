- &id332
  arxiv_id: '1206.6274'
  ads_bibcode: 2012A&A...543L...4L
  title: Temporal variations in the evaporating atmosphere of the exoplanet HD 189733b
  authors:
  - Lecavelier des Etangs, A.
  - Bourrier, V.
  - Wheatley, P. J.
  - Dupuy, H.
  - Ehrenreich, D.
  - Vidal-Madjar, A.
  - Hébrard, G.
  - Ballester, G. E.
  - Désert, J.-M.
  - Ferlet, R.
  - Sing, D. K.
  year: '2012'
  pubdate: '2012-07-00'
  doi: 10.1051/0004-6361/201219363
  abstract: Atmospheric escape has been detected from the exoplanet <ASTROBJ>HD 209458b</ASTROBJ> through transit observations
    of the hydrogen Lyman-α line. Here we present spectrally resolved Lyman-α transit observations of the exoplanet <ASTROBJ>HD
    189733b</ASTROBJ> at two different epochs. These HST/STIS observations show for the first time that there are significant
    temporal variations in the physical conditions of an evaporating planetary atmosphere. While atmospheric hydrogen is not
    detected in the first epoch observations, it is observed at the second epoch, producing a transit absorption depth of
    14.4 ± 3.6% between velocities of -230 to -140 km s<SUP>-1</SUP>. Contrary to HD 209458b, these high velocities cannot
    arise from radiation pressure alone and require an additional acceleration mechanism, such as interactions with stellar
    wind protons. The observed absorption can be explained by an atmospheric escape rate of neutral hydrogen atoms of about
    10<SUP>9</SUP> g s<SUP>-1</SUP>, a stellar wind with a velocity of 190 km s<SUP>-1</SUP> and a temperature of ~10<SUP>5</SUP>
    K. An X-ray flare from the active star seen with Swift/XRT 8 h before the second-epoch observation supports the idea that
    the observed changes within the upper atmosphere of the planet can be caused by variations in the stellar wind properties,
    or by variations in the stellar energy input to the planetary escaping gas (or a mix of the two effects). These observations
    provide the first indication of interaction between the exoplanet's atmosphere and stellar variations.
