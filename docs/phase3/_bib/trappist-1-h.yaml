  abstract: We present an estimate of the performance that will be achieved during on orbit operations of the JWST Mid Infrared
    Instrument, MIRI. The efficiency of the main imager and spectrometer systems in detecting photons from an astronomical
    target are presented, based on measurements at sub-system and instrument level testing, with the end-to-end transmission
    budget discussed in some detail. The brightest target fluxes that can be measured without saturating the detectors are
    provided. The sensitivity for long duration observations of faint sources is presented in terms of the target flux required
    to achieve a signal to noise ratio of 10 after a 10,000 second observation. The algorithms used in the sensitivity model
    are presented, including the understanding gained during testing of the MIRI Flight Model and flight-like detectors.
