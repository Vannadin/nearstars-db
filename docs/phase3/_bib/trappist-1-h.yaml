  doi: 10.3847/2515-5172/aac32f
  abstract: The TRAPPIST-1 system provides an exquisite laboratory for understanding exoplanetary atmospheres and interiors.
    Their mutual gravitational interactions leads to transit timing variations, from which Grimm et al. (2018) recently measured
    the planetary masses with precisions ranging from 5% to 12%. Using these masses and the &lt;5% radius measurements on
    each planet, we apply the method described in Suissa et al. (2018) to infer the minimum and maximum CRF (core radius fraction)
    of each planet. Further, we modify the maximum limit to account for the fact that a light volatile envelope is excluded
    for planets b through f. Only planet e is found to have a significant probability of having a non-zero minimum CRF, with
    a 0.7% false-alarm probability it has no core. Our method further allows us to measure the CRF of planet e to be greater
    than (49 +/- 7)% but less than (72 +/- 2)%, which is compatible with that of the Earth. TRAPPIST-1e therefore possess
    a large iron core similar to the Earth, in addition to being Earth-sized and located in the temperature zone.
