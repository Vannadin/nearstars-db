  abstract: In this introductory review, I summarize the path from the initial 1995 radial-velocity discovery of hot Jupiters
    to the current rich panoply of investigations that are afforded when such objects are observed to transit their parent
    stars. Forty transiting exoplanets are now known, and the time for that population to double has dropped below one year.
