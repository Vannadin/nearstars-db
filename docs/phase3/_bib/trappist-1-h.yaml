- &id352
  arxiv_id: null
  ads_bibcode: 2025A&A...693A.244W
  title: Sources of hydrogen in the primordial atmosphere of Venus
  authors:
  - Wang, Ziqi
  - Zhou, You
  - Liu, Yun
  - Odert, Petra
  - Liu, Yixuan
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.1051/0004-6361/202449942
  abstract: 'Context. Understanding the hydrogen content in Venus'' primordial atmosphere is crucial for comprehending the
    hydrodynamic escape process that shaped its atmospheric evolution. The hydrogen originated from two main sources: molecular
    hydrogen (H<SUB>2</SUB>) from the solar nebula and water vapor (H<SUB>2</SUB>O) from geological degassing. The precise
    proportions of these sources remain uncertain, leading to different hypotheses about Venus'' atmospheric history. However,
    a systematic exploration of the parameter space regarding the proportions of these sources has not yet been conducted.
    Aims. This study aims to constrain the hydrogen content and its sources in Venus'' primordial atmosphere by conducting
    extensive numerical simulations of early atmospheric escape scenarios. Methods. We developed an improved energy-limited
    hydrodynamic escape model, integrated with a 1D radiative-convective equilibrium atmospheric model, to simulate the early
    atmospheric escape on Venus. Using isotopic data of Ne and Ar from the current Venusian atmosphere, we constrained the
    contributions of nebula-derived and degassing-derived hydrogen. Our simulations have explored over 500 000 scenarios,
    varying the initial H<SUB>2</SUB> and H<SUB>2</SUB>O compositions and considering different solar extreme ultraviolet
    (EUV) irradiation conditions. Results. Our results, based on the isotopic ratios of <SUP>20</SUP>Ne/<SUP>22</SUP>Ne, <SUP>36</SUP>Ar/<SUP>38</SUP>Ar,
    and <SUP>20</SUP>Ne/<SUP>36</SUP>Ar observed in Venus'' atmosphere, indicate that the primordial atmospheric water content
    was limited to less than 0.01 ocean equivalents of H<SUB>2</SUB> (0.0004 wt%) and less than 1.4 ocean equivalents of H<SUB>2</SUB>O.
    This suggests that if Venus ever had a primary hydrogen-rich atmosphere, it was mostly lost before forming its secondary,
    H<SUB>2</SUB>O-rich atmosphere. Furthermore, our method can be applied to constrain the primordial atmospheric compositions
    of other terrestrial planets, providing insights into their evolutionary histories.'
