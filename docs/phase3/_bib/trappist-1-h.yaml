    <P />Based on observations carried out at the Centro Astronómico Hispano Alemán (CAHA) at Calar Alto, operated jointly
    by the Junta de Andalucía and the Instituto de Astrofísica de Andalucía (CSIC), on observations carried out at the European
    Southern Observatory under ESO programme 0103.C-0152(A), and data collected with the 6.5 m Magellan Telescopes located
    at Las Campanas Observatory, Chile.
