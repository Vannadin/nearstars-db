  title: Titanium chemistry of WASP-121 b with ESPRESSO in 4-UT mode
  authors:
  - Prinoth, B.
  - Seidel, J. V.
  - Hoeijmakers, H. J.
  - Morris, B. M.
  - Baratella, M.
  - Borsato, N. W.
