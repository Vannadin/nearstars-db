  arxiv_id: '2207.12755'
  ads_bibcode: 2022AJ....164..172D
  title: 'The K2-3 System Revisited: Testing Photoevaporation and Core-powered Mass Loss with Three Small Planets Spanning
    the Radius Valley'
  authors:
  - Diamond-Lowe, Hannah
  - Kreidberg, Laura
  - Harman, C. E.
  - Kempton, Eliza M.-R.
  - Rogers, Leslie A.
  - Joyce, Simon R. G.
  - Eastman, Jason D.
  - King, George W.
  - Kopparapu, Ravi
