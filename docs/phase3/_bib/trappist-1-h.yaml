  doi: 10.3847/2515-5172/addec4
  abstract: We report the delivery to the Mikulski Archive for Space Telescopes (MAST) of tables containing rms Combined Differential
    Photometric Precision (CDPP) values for all TESS 2 minutes cadence targets with Science Processing Operations Center (SPOC)
    light curves in Sectors 1─90. Each comma-separated values file contains CDPP values for all 2 minutes light curves in
    the given sector. The tables include robust rms CDPP values for the 15 trial transit pulse durations searched in the SPOC
