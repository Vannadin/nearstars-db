    chondrites, including &lt;fc&gt;CV&lt;/fc&gt;s, are significantly depleted in <SUP>26</SUP>Al. At least some of these
    refractory objects may have formed prior to injection of <SUP>26</SUP>Al into the protosolar molecular cloud and its subsequent
