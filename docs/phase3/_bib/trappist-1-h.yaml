  year: '2023'
  pubdate: '2023-03-00'
  doi: 10.3847/1538-3881/acad83
  abstract: TOI-561 is a galactic thick-disk star hosting an ultra-short-period (0.45-day-orbit) planet with a radius of 1.37
    R <SUB>⊕</SUB>, making it one of the most metal-poor ([Fe/H] = -0.41) and oldest (≈10 Gyr) sites where an Earth-sized
    planet has been found. We present new simultaneous radial velocity (RV) measurements from Gemini-N/MAROON-X and Keck/HIRES,
    which we combined with literature RVs to derive a mass of M <SUB> b </SUB> = 2.24 ± 0.20 M <SUB>⊕</SUB>. We also used
    two new sectors of TESS photometry to improve the radius determination, finding R <SUB> b </SUB> = 1.37 ± 0.04 R <SUB>⊕</SUB>
    and confirming that TOI-561 b is one of the lowest-density super-Earths measured to date (ρ <SUB> b </SUB> = 4.8 ± 0.5
    g cm<SUP>-3</SUP>). This density is consistent with an iron-poor rocky composition reflective of the host star's iron
    and rock-building element abundances; however, it is also consistent with a low-density planet with a volatile envelope.
    The equilibrium temperature of the planet (~2300 K) suggests that this envelope would likely be composed of high mean
    molecular weight species, such as water vapor, carbon dioxide, or silicate vapor, and is likely not primordial. We also
    demonstrate that the composition determination is sensitive to the choice of stellar parameters and that further measurements
    are needed to determine whether TOI-561 b is a bare rocky planet, a rocky planet with an optically thin atmosphere, or
