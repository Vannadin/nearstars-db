  arxiv_id: '1712.07461'
  ads_bibcode: 2018A&A...611A..63G
  title: 'Light-curve analysis of KOI 2700b: the second extrasolar planet with a comet-like tail'
  authors:
  - Garai, Z.
  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.1051/0004-6361/201629676
  abstract: 'Context. The Kepler object KOI 2700b (KIC 8639908b) was discovered recently as the second exoplanet with a comet-like
    tail. It exhibits a distinctly asymmetric transit profile, likely indicative of the emission of dusty effluents and reminiscent
    of KIC 12557548b, the first exoplanet with a comet-like tail. Aim. The scientific goal of this work is to verify the disintegrating-planet
    scenario of KOI 2700b by modeling its light curve and to put constraints on various tail and planet properties, as was
    done in the case of KIC 12557548b. <BR /> Methods: We obtained the phase-folded and binned transit light curve of KOI
    2700b, which we subsequently iteratively modeled using the radiative-transfer code SHELLSPEC. We modeled the comet-like
    tail as part of a ring around the parent star and we also included the solid body of the planet in the model. During the
    modeling we applied selected species and dust particle sizes. <BR /> Results: We confirmed the disintegrating-planet scenario
    of KOI 2700b. Furthermore, via modeling, we derived some interesting features of KOI 2700b and its comet-like tail. It
    turns out that the orbital plane of the planet and its tail are not edge-on, but the orbital inclination angle is from
    the interval [85.1, 88.6] deg. In comparison with KIC 12557548b, KOI 2700b exhibits a relatively low dust density decreasing
    in its tail. We also derived the dust density at the beginning of the ring and the highest optical depth through the tail
    in front of the star, based on a tail-model with a cross-section of 0.05 × 0.05 R<SUB>☉</SUB> at the beginning and 0.09
    × 0.09 R<SUB>☉</SUB> at its end. Our results show that the dimension of the planet is R<SUB>p</SUB>/R<SUB>s</SUB> ≤ 0.014
    (R<SUB>p</SUB> ≤ 0.871 R<SUB>⊕</SUB>, or ≤5551 km). We also estimated the mass-loss rate from KOI 2700b, and we obtained
    Ṁ values from the interval [5.05 × 10<SUP>7</SUP>, 4.41 × 10<SUP>15</SUP>] g s<SUP>-1</SUP>. On the other hand, we could
    not draw any satisfactory conclusions about the typical grain size in the dust tail.'
