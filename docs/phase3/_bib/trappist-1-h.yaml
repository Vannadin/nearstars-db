  ads_bibcode: 2023AJ....165..170R
  title: High-resolution Transmission Spectroscopy of the Terrestrial Exoplanet GJ 486b
  authors:
  - Ridden-Harper, Andrew
  - Nugroho, Stevanus K.
  - Flagg, Laura
  - Jayawardhana, Ray
  - Turner, Jake D.
