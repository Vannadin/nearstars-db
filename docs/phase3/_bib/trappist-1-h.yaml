  arxiv_id: '1301.1853'
  ads_bibcode: 2013ApJ...770..101K
  title: The Hunt for Exomoons with Kepler (HEK). II. Analysis of Seven Viable Satellite-hosting Planet Candidates
  authors:
  - Kipping, D. M.
  - Hartman, J.
  - Buchhave, L. A.
  - Schmitt, A. R.
  - Bakos, G. Á.
  - Nesvorný, D.
  year: '2013'
  pubdate: '2013-06-00'
  doi: 10.1088/0004-637X/770/2/101
  abstract: From the list of 2321 transiting planet candidates announced by the Kepler Mission, we select seven targets with
    favorable properties for the capacity to dynamically maintain an exomoon and present a detectable signal. These seven
    candidates were identified through our automatic target selection (TSA) algorithm and target selection prioritization
    (TSP) filtering, whereby we excluded systems exhibiting significant time-correlated noise and focused on those with a
    single transiting planet candidate of radius less than 6 R <SUB>⊕</SUB>. We find no compelling evidence for an exomoon
    around any of the seven Kepler Objects of Interest (KOIs) but constrain the satellite-to-planet mass ratios for each.
    For four of the seven KOIs, we estimate a 95% upper quantile of M<SUB>S</SUB> /M<SUB>P</SUB> &lt; 0.04, which given the
    radii of the candidates, likely probes down to sub-Earth masses. We also derive precise transit times and durations for
    each candidate and find no evidence for dynamical variations in any of the KOIs. With just a few systems analyzed thus
    far in the ongoing "Hunt for Exomoons with Kepler" (HEK) project, projections on \eta _{\leftmoon} would be premature,
    but a high frequency of large moons around Super-Earths/Mini-Neptunes would appear to be incommensurable with our results
    so far. <P />Based on archival data of the Kepler telescope.
