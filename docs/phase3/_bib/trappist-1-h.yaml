  abstract: We simulate the 3D ozone distribution of a tidally locked Earth-like exoplanet using the high-resolution, 3D chemistry-climate
    model CESM1(WACCM) and study how the ozone layer of a tidally locked Earth (TLE) (<inline-formula id="IEq1"><mml:math><mml:mrow><mml:msub><mml:mi
    mathvariant="normal">Ω</mml:mi><mml:mi mathvariant="normal">TLE</mml:mi></mml:msub><mml:mo>=</mml:mo><mml:mn>1</mml:mn><mml:mo
    stretchy="false">/</mml:mo><mml:mn>365</mml:mn></mml:mrow></mml:math></inline-formula> days) differs from that of our
    present-day Earth (PDE) (<inline-formula id="IEq2"><mml:math><mml:mrow><mml:msub><mml:mi mathvariant="normal">Ω</mml:mi><mml:mi
    mathvariant="normal">PDE</mml:mi></mml:msub><mml:mo>=</mml:mo><mml:mn>1</mml:mn><mml:mo stretchy="false">/</mml:mo><mml:mn>1</mml:mn></mml:mrow></mml:math></inline-formula>
    day). The middle atmosphere reaches a steady state asymptotically within the first 80 days of the simulation. An upwelling,
    centred on the subsolar point, is present on the day side while a downwelling, centred on the antisolar point, is present
    on the night side. In the mesosphere, we find similar global ozone distributions for the TLE and the PDE, with decreased
    ozone on the day side and enhanced ozone on the night side. In the lower mesosphere, a jet stream transitions into a large-scale
    vortex around a low-pressure system, located at low latitudes of the TLE night side. In the middle stratosphere, the concentration
    of odd oxygen is approximately equal to that of the ozone [(<inline-formula id="IEq3"><mml:math><mml:msub><mml:mi mathvariant="normal">O</mml:mi><mml:mi>x</mml:mi></mml:msub></mml:math></inline-formula>)
    <inline-formula id="IEq4"><mml:math><mml:mo>≍</mml:mo></mml:math></inline-formula> (<inline-formula id="IEq5"><mml:math><mml:msub><mml:mi
    mathvariant="normal">O</mml:mi><mml:mn>3</mml:mn></mml:msub></mml:math></inline-formula>)]. At these altitudes, the lifetime
    of odd oxygen is <inline-formula id="IEq6"><mml:math><mml:mo>∼</mml:mo></mml:math></inline-formula>16 h and the transport
    processes significantly contribute to the global distribution of stratospheric ozone. Compared to the PDE, where the strong
    Coriolis force acts as a mixing barrier between low and high latitudes, the transport processes of the TLE are governed
    by jet streams variable in the zonal and meridional directions. In the middle stratosphere of the TLE, we find high ozone
    values on the day side, due to the increased production of atomic oxygen on the day side, where it immediately recombines
    with molecular oxygen to form ozone. In contrast, the ozone is depleted on the night side, due to changes in the solar
    radiation distribution and the presence of a downwelling. As a result of the reduced Coriolis force, the tropical and
    extratropical air masses are well mixed and the global temperature distribution of the TLE stratosphere has smaller horizontal
    gradients than the PDE. Compared to the PDE, the total ozone column global mean is reduced by <inline-formula id="IEq7"><mml:math><mml:mo>∼</mml:mo></mml:math></inline-formula>19.3
    %. The day side and the night side total ozone column means are reduced by 23.21 and 15.52 %, respectively. Finally, we
