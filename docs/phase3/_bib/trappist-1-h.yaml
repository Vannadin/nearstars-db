  abstract: 'Dynamical histories of planetary systems, as well as the atmospheric evolution of highly irradiated planets,
    can be studied by characterizing the ultra-short-period planet population, which the TESS mission is particularly well
    suited to discover. Here, we report on the follow-up of a transit signal detected in the TESS sector 19 photometric time
    series of the M3.0 V star TOI-1685 (2MASS J04342248+4302148). We confirm the planetary nature of the transit signal, which
    has a period of P<SUB>b</SUB> = 0.6691403<SUB>‒0.0000021</SUB><SUP>+0.0000023</SUP> d, using precise radial velocity measurements
    taken with the CARMENES spectrograph. From the joint photometry and radial velocity analysis, we estimate the following
    parameters for TOI-1685 b: a mass of M<SUB>b</SUB> = 3.78<SUB>‒0.63</SUB><SUP>+0.63</SUP> M<SUB>⊕</SUB>, a radius of R<SUB>b</SUB>
    = 1.70<SUB>‒0.07</SUB><SUP>+0.07</SUP> R<SUB>⊕</SUB>, which together result in a bulk density of ρ<SUB>b</SUB> = 4.21<SUB>‒0.82</SUB><SUP>+0.95</SUP>
    g cm<SUP>‒3</SUP>, and an equilibrium temperature of T<SUB>eq</SUB> = 1069<SUB>‒16</SUB><SUP>+16</SUP> K. TOI-1685 b is
    the least dense ultra-short-period planet around an M dwarf known to date. TOI-1685 b is also one of the hottest transiting
    super-Earth planets with accurate dynamical mass measurements, which makes it a particularly attractive target for thermal
    emission spectroscopy. Additionally, we report with moderate evidence an additional non-transiting planet candidate in
    the system, TOI-1685 [c], which has an orbital period of P<SUB>c</SUB> = 9.02<SUB>‒0.12</SUB><SUP>+0.10</SUP> d.'
