  arxiv_id: '1604.05719'
  ads_bibcode: 2016ApJ...828...46A
  title: ALMA Survey of Lupus Protoplanetary Disks. I. Dust and Gas Masses
  authors:
  - Ansdell, M.
  - Williams, J. P.
  - van der Marel, N.
  - Carpenter, J. M.
  - Guidi, G.
  - Hogerheijde, M.
  - Mathews, G. S.
  - Manara, C. F.
  - Miotello, A.
  - Natta, A.
  - Oliveira, I.
