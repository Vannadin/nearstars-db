- &id1079
  arxiv_id: null
  ads_bibcode: 2011AsBio..11..443A
  title: Habitable Zone Limits for Dry Planets
  authors:
  - Abe, Yutaka
  - Abe-Ouchi, Ayako
  - Sleep, Norman H.
  - Zahnle, Kevin J.
  year: '2011'
  pubdate: '2011-06-00'
  doi: 10.1089/ast.2010.0545
  abstract: 'Most discussion of habitable planets has focused on Earth-like planets with globally abundant liquid water. For
    an "aqua planet" like Earth, the surface freezes if far from its sun, and the water vapor greenhouse effect runs away
    if too close. Here we show that "land planets" (desert worlds with limited surface water) have wider habitable zones than
    aqua planets. For planets at the inner edge of the habitable zone, a land planet has two advantages over an aqua planet:
    (i) the tropics can emit longwave radiation at rates above the traditional runaway limit because the air is unsaturated
    and (ii) the dry air creates a dry stratosphere that limits hydrogen escape. At the outer limits of the habitable zone,
    the land planet better resists global freezing because there is less water for clouds, snow, and ice. Here we describe
    a series of numerical experiments using a simple three-dimensional global climate model for Earth-sized planets. Other
    things (CO<SUB>2</SUB>, rotation rate, surface pressure) unchanged, we found that liquid water remains stable at the poles
    of a low-obliquity land planet until net insolation exceeds 415 W/m<SUP>2</SUP> (170% that of modern Earth), compared
    to 330 W/m<SUP>2</SUP> (135%) for the aqua planet. At the outer limits, we found that a low-obliquity land planet freezes
    at 77%, while the aqua planet freezes at 90%. High-obliquity land and aqua planets freeze at 58% and 72%, respectively,
    with the poles offering the last refuge. We show that it is possible that, as the Sun brightens, an aqua planet like Earth
    can lose most of its hydrogen and become a land planet without first passing through a sterilizing runaway greenhouse.
    It is possible that Venus was a habitable land planet as recently as 1 billion years ago.'
