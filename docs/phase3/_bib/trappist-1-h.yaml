  ads_bibcode: 2021PSJ.....2...93C
  title: The Effect of Inefficient Accretion on Planetary Differentiation
  authors:
  - Cambioni, Saverio
  - Jacobson, Seth A.
  - Emsenhuber, Alexandre
  - Asphaug, Erik
  - Rubie, David C.
  - Gabriel, Travis S. J.
