  abstract: We report the discovery and validation of TOI 122b and TOI 237b, two warm planets transiting inactive M dwarfs
    observed by the Transiting Exoplanet Survey Satellite (TESS). Our analysis shows that TOI 122b has a radius of 2.72 ±
    0.18 R<SUB>⊕</SUB> and receives 8.8 ± 1.0 times Earth's bolometric insolation, and TOI 237b has a radius of 1.44±0.12
    R<SUB>⊕</SUB> and receives 3.7 ± 0.5 times Earth's insolation, straddling the 6.7 × Earth insolation that Mercury receives
    from the Sun. This makes these two of the cooler planets yet discovered by TESS, even on their 5.08 and 5.43 day orbits.
    Together, they span the small-planet radius valley, providing useful laboratories for exploring volatile evolution around
    M dwarfs. Their relatively nearby distances (62.23 ± 0.21 pc and 38.11 ± 0.23 pc, respectively) make them potentially
    feasible targets for future radial velocity follow-up and atmospheric characterization, although such observations may
    require substantial investments of time on large telescopes.
