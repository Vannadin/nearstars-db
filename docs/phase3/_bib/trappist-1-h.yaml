  arxiv_id: '2501.00104'
  ads_bibcode: 2025A&A...693A.315M
  title: First unambiguous detection of ammonia in the atmosphere of a planetary mass companion with JWST/MIRI coronagraphs
  authors:
  - Mâlin, Mathilde
  - Boccaletti, Anthony
  - Perrot, Clément
  - Baudoz, Pierre
  - Rouan, Daniel
  - Lagage, Pierre-Olivier
  - Waters, Rens
