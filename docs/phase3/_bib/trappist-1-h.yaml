- &id176
  arxiv_id: '1907.10048'
  ads_bibcode: 2019ApJ...886...16C
  title: Habitability and Spectroscopic Observability of Warm M-dwarf Exoplanets Evaluated with a 3D Chemistry-Climate Model
  authors:
  - Chen, Howard
  - Wolf, Eric T.
  - Zhan, Zhuchang
  - Horton, Daniel E.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.3847/1538-4357/ab4f7e
  abstract: Planets residing in circumstellar habitable zones offer us the best opportunities to test hypotheses of life’s
    potential pervasiveness and complexity. Constraining the precise boundaries of habitability and its observational discriminants
    is critical to maximizing our chances at remote life detection with future instruments. Conventionally, calculations of
    the inner edge of the habitable zone (IHZ) have been performed using both 1D radiative-convective and 3D general circulation
    models. However, these models lack interactive 3D chemistry and do not resolve the mesosphere and lower thermosphere region
    of the upper atmosphere. Here, we employ a 3D high-top chemistry-climate model (CCM) to simulate the atmospheres of synchronously
    rotating planets orbiting at the inner edge of habitable zones of K- and M-dwarf stars (between T <SUB>eff</SUB> = 2600
    and 4000 K). While our IHZ climate predictions are in good agreement with general circulation model studies, we find noteworthy
    departures in simulated ozone and HO<SUB>x</SUB> photochemistry. For instance, climates around inactive stars do not typically
    enter the classical moist greenhouse regime even with high (≳10<SUP>-3</SUP> mol mol<SUP>-1</SUP>) stratospheric water
    vapor mixing ratios, which suggests that planets around inactive M-stars may only experience minor water-loss over geologically
    significant timescales. In addition, we find much thinner ozone layers on potentially habitable moist greenhouse atmospheres,
    as ozone experiences rapid destruction via reaction with hydrogen oxide radicals. Using our CCM results as inputs, our
    simulated transmission spectra show that both water vapor and ozone features could be detectable by instruments NIRSpec
    and MIRI LRS on board the James Webb Space Telescope.
  source: citation_of=2022ARA&A..60..159W
