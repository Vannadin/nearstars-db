- &id114
  arxiv_id: '2409.17394'
  ads_bibcode: 2025ApJ...979...79R
  title: Most Super-Earths Have Less Than 3% Water
  authors:
  - Rogers, James G.
  - Dorn, Caroline
  - Aditya Raj, Vivasvaan
  - Schlichting, Hilke E.
  - Young, Edward D.
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.3847/1538-4357/ad9f61
  abstract: Super-Earths are highly irradiated, small planets with bulk densities approximately consistent with Earth. We
    construct combined interior atmosphere models of super-Earths that trace the partitioning of water throughout a planet,
    including an iron-rich core, silicate-rich mantle, and steam atmosphere. We compare these models with exoplanet observations
    to infer a 1σ upper limit on the total water mass fraction of ≲3% at the population level. We consider end-member scenarios
    that may change this value, including the efficiency of mantle outgassing, escape of high mean molecular weight atmospheres,
    and increased iron core mass fractions. Although our constraints are agnostic as to the origin of water, we show that
    our upper limits are consistent with its production via chemical reactions of primordial hydrogen-dominated atmospheres
    with magma oceans. This mechanism has also been hypothesised to explain Earth's water content, possibly pointing to a
    unified channel for the origins of water on small terrestrial planets.
