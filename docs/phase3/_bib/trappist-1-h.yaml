- &id646
  arxiv_id: '2305.00803'
  ads_bibcode: 2023ApJ...952L..20C
  title: 'Small Planets around Cool Dwarfs: Enhanced Formation Efficiency of Super-Earths around M Dwarfs'
  authors:
  - Chachan, Yayaati
  - Lee, Eve J.
  year: '2023'
  pubdate: '2023-07-00'
  doi: 10.3847/2041-8213/ace257
  abstract: 'Current measurements of planet population as a function of stellar mass show three seemingly contradictory signatures:
    close-in super-Earths are more prevalent around M dwarfs than FGK dwarfs; inner super-Earths are correlated with outer
    giants; and outer giants are less common around M dwarfs than FGK dwarfs. Here, we build a simple framework that combines
    the theory of pebble accretion with the measurements of dust masses in protoplanetary disks to reconcile all three observations.
    First, we show that cooler stars are more efficient at converting pebbles into planetary cores at short orbital periods.
    Second, when disks are massive enough to nucleate a heavy core at 5 au, more than enough dust can drift in to assemble
    inner planets, establishing the correlation between inner planets and outer giants. Finally, while stars of varying masses
    are similarly capable of converting pebbles into cores at long orbital periods, hotter stars are much more likely to harbor
    more massive dust disks so that the giant planet occurrence rate rises around hotter stars. Our results are valid over
    a wide range of parameter space for a disk accretion rate that follows ${\dot{M}}_{\star }\sim {10}^{-8}\,{M}_{\odot }\,{\mathrm{yr}}^{-1}{({M}_{\star
    }/{M}_{\odot })}^{2}$ . We predict a decline in mini-Neptune population (but not necessarily terrestrial planets) around
    stars lighter than ~0.3-0.5M <SUB>☉</SUB>. Cold giants (≳5 au), if they exist, should remain correlated with inner planets
    even around lower-mass stars.'
