- &id652
  arxiv_id: '2303.00659'
  ads_bibcode: 2023MNRAS.521.3663B
  title: The occurrence rate of giant planets orbiting low-mass stars with TESS
  authors:
  - Bryant, Edward M.
  - Bayliss, Daniel
  - Van Eylen, Vincent
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.1093/mnras/stad626
  abstract: We present a systematic search for transiting giant planets ($0.6 \mbox{$R_{\rm J}$}\le \mbox{$R_{\rm P}$}\le
    2.0 \mbox{$R_{\rm J}$}$) orbiting nearby low-mass stars ($\mbox{$M_{*}$}\le 0.71 \mbox{${\rm M}_{\odot }$}$). The formation
    of giant planets around low-mass stars is predicted to be rare by the core-accretion planet formation theory. We search
    91 306 low-mass stars in the TESS 30 min cadence photometry detecting fifteen giant planet candidates, including seven
    new planet candidates which were not known planets or identified as TOIs prior to our search. Our candidates present an
    exciting opportunity to improve our knowledge of the giant planet population around the lowest mass stars. We perform
    planet injection-recovery simulations and find that our pipeline has a high detection efficiency across the majority of
    our targeted parameter space. We measure the occurrence rates of giant planets with host stars in different stellar mass
    ranges spanning our full sample. We find occurrence rates of 0.137 ± 0.097 per cent (0.088-0.26 M<SUB>☉</SUB>), 0.108
    ± 0.083 per cent (0.26-0.42 M<SUB>☉</SUB>), and 0.29 ± 0.15 per cent (0.42-0.71 M<SUB>☉</SUB>). For our full sample (0.088-0.71
    M<SUB>☉</SUB>), we find a giant planet occurrence rate of 0.194 ± 0.072 per cent. We have measured for the first time
    the occurrence rate for giant planets orbiting stars with $\mbox{$M_{*}$}\le 0.4\, \mbox{${\rm M}_{\odot }$}$ and we demonstrate
    this occurrence rate to be non-zero. This result contradicts currently accepted planet formation models and we discuss
    some possibilities for how these planets could have formed.
