  ads_bibcode: 2025AJ....170...40C
  title: Effects of Transient Stellar Emissions on Planetary Climates of Tidally Locked Exo-Earths
  authors:
  - Chen, Howard
  - De Luca, Paolo
  - Hochman, Assaf
  - Komacek, Thaddeus D.
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.3847/1538-3881/add33e
  abstract: Space weather events in exoplanetary environments sourced from transient host star emissions, including stellar
    flares, coronal mass ejections, and stellar proton events, can substantially influence a planet's habitability and atmospheric
    evolution history. These time-dependent events may also affect our ability to measure and interpret its properties by
    modulating reservoirs of key chemical compounds and changing the atmosphere's brightness temperature. The majority of
    previous work focusing on photochemical effects, ground-level UV dosages, and consequences on observed spectra. Here,
    using three-dimensional general circulation models with interactive photochemistry, we simulate the climate and chemical
    impacts of stellar energetic particle events and periodic enhancements of UV photons. We use statistical methods to examine
    their effects on synchronously rotating TRAPPIST-1e-like planets on a range of spatiotemporal scales. We find that abrupt
    thermospheric cooling is associated with radiative cooling of NO and CO<SUB>2</SUB>, and middle-to-lower atmospheric warming
    is associated with elevated infrared absorbers such as N<SUB>2</SUB>O and H<SUB>2</SUB>O. In certain regimes, in particular
    for climates around moderately active stars, atmospheric temperature changes are strongly affected by O<SUB>3</SUB> variability.
    Cumulative effects are largely determined by the flare frequency and the instantaneous effects are dependent on the flare's
    spectral shape and energy. In addition to effects on planetary climate and atmospheric chemistry, we find that intense
    flares can energize the middle atmosphere, causing enhancements in wind velocities up to 40 m s<SUP>−1</SUP> in substellar
    nightsides between 30 and 50 km in altitude. Our results suggest that successive, more energetic eruptive events from
    younger stars may be a pivotal factor in determining the atmosphere dynamics of their planets.
