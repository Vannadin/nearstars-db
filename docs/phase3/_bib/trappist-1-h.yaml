- &id150
  arxiv_id: '2108.04419'
  ads_bibcode: 2021ApJ...921...27H
  title: Photochemistry and Spectral Characterization of Temperate and Gas-rich Exoplanets
  authors:
  - Hu, Renyu
  year: '2021'
  pubdate: '2021-11-00'
  doi: 10.3847/1538-4357/ac1789
  abstract: Exoplanets that receive stellar irradiance approximately equal to Earth's or less have been discovered and many
    are suitable for spectral characterization. Here, we focus on the temperate planets that have massive H<SUB>2</SUB>-dominated
    atmospheres, and trace the chemical reactions and transport following the photodissociation of H<SUB>2</SUB>O, CH<SUB>4</SUB>,
    NH<SUB>3</SUB>, and H<SUB>2</SUB>S, with K2-18 b, PH2 b, and Kepler-167 e representing temperate/cold planets around M
    and G/K stars. We find that NH<SUB>3</SUB> is likely depleted by photodissociation to the cloud deck on planets around
    G/K stars but remains intact in the middle atmosphere of planets around M stars. A common phenomenon on temperate planets
    is that the photodissociation of NH<SUB>3</SUB> in the presence of CH<SUB>4</SUB> results in HCN as the main photochemical
    product. The photodissociation of CH<SUB>4</SUB> together with H<SUB>2</SUB>O leads to CO and CO<SUB>2</SUB>, and the
    synthesis of hydrocarbon is suppressed. Temperate planets with a supersolar atmospheric metallicity and appreciable internal
    heat may have additional CO and CO<SUB>2</SUB> from the interior and less NH<SUB>3</SUB>, and thus less HCN. Our models
    of K2-18 b can explain the transmission spectrum measured by the Hubble Space Telescope, and indicate that future observations
    in 0.5-5.0 μm wavelength range would provide the sensitivity to detect the equilibrium gases CH<SUB>4</SUB>, H<SUB>2</SUB>O,
    and NH<SUB>3</SUB>, the photochemical gas HCN, as well as CO<SUB>2</SUB> in some cases. Temperate and H<SUB>2</SUB>-rich
    exoplanets are thus laboratories of atmospheric chemistry that operate in regimes not found in the solar system, and spectral
    characterization of these planets in transit or reflected starlight promises to greatly expand the types of molecules
    detected in exoplanet atmospheres.
