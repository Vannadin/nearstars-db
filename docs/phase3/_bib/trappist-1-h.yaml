  arxiv_id: '2501.02081'
  ads_bibcode: 2025ApJ...986....1F
  title: Statistical Trends in JWST Transiting Exoplanet Atmospheres
  authors:
  - Fu, Guangwei
  - Stevenson, Kevin B.
  - Sing, David K.
  - Mukherjee, Sagnick
  - Welbanks, Luis
  - Thorngren, Daniel
  - Tsai, Shang-Min
