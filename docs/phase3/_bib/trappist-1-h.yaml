  arxiv_id: '1610.09697'
  ads_bibcode: 2017GeoRL..44..665W
  title: Transient reducing greenhouse warming on early Mars
  authors:
  - Wordsworth, R.
  - Kalugina, Y.
  - Lokshtanov, S.
  - Vigasin, A.
  - Ehlmann, B.
  - Head, J.
  - Sanders, C.
  - Wang, H.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1002/2016GL071766
  abstract: The evidence for abundant liquid water on early Mars despite the faint young Sun is a long-standing problem in
    planetary research. Here we present new ab initio spectroscopic and line-by-line climate calculations of the warming potential
    of reduced atmospheres on early Mars. We show that the strength of both CO<SUB>2</SUB>-H<SUB>2</SUB> and CO<SUB>2</SUB>-CH<SUB>4</SUB>
    collision-induced absorption (CIA) has previously been significantly underestimated. Contrary to previous expectations,
    methane could have acted as a powerful greenhouse gas on early Mars due to CO<SUB>2</SUB>-CH<SUB>4</SUB> CIA in the critical
    250-500 cm<SUP>-1</SUP> spectral window region. In atmospheres of 0.5 bar CO<SUB>2</SUB> or more, percent levels of H<SUB>2</SUB>
    or CH<SUB>4</SUB> raise annual mean surface temperatures by tens of degrees, with temperatures reaching 273 K for pressures
    of 1.25-2 bars and 2-10% of H<SUB>2</SUB> and CH<SUB>4</SUB>. Methane and hydrogen produced following aqueous alteration
    of Mars' crust could have combined with volcanically outgassed CO<SUB>2</SUB> to form transient atmospheres of this composition
    4.5-3.5 Ga. Our results also suggest that inhabited exoplanets could retain surface liquid water at significant distances
    from their host stars.
