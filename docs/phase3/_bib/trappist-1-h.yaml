  abstract: The search for extraterrestrial intelligence (SETI) is to search for technosignatures associated with extraterrestrial
    life, such as engineered radio signals. In this paper, we apply the multibeam coincidence matching (MBCM) strategy, and
    propose a new search mode based on the MBCM which we call the MBCM blind search mode. In our recent targeted SETI research,
    33 exoplanet systems are observed by the Five-hundred-meter Aperture Spherical radio Telescope (FAST). With this blind
    search mode, we search for narrowband drifting signals across 1.05-1.45 GHz in two orthogonal linear polarization directions
    separately. There are two special signals, one of which can only be detected by the blind search mode while the other
    can be found by both blind and targeted search modes. This result reveals huge advantages of the new blind search mode.
    However, we eliminate the possibility of the special signals being ETI signals based on much evidence, such as the polarization,
    drift, frequency, and beam coverage characteristics. Our observations achieve an unprecedented sensitivity and our work
    provides a deeper understanding to the polarization analysis of extraterrestrial signals.
