  - Zúñiga-Fernández, Sebastián
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.1093/mnras/stag070
  abstract: 'As the diversity of exoplanets continues to grow, it is important to revisit assumptions about habitability and
    classical habitable zone definitions. In this work, we introduce an expanded ''temperate'' zone, defined by instellation
    fluxes in the range <inline-formula><tex-math>$0.1&lt; S/\mathrm{S}_{\oplus }&lt; 5$</tex-math></inline-formula>, thus
    encompassing a broader range of potentially habitable worlds. We also introduce the TEMPOS survey, which aims to produce
    a catalogue of precise radii for temperate planets orbiting M dwarfs with <inline-formula><tex-math>$T_\mathrm{eff}\le
    3400\,$</tex-math></inline-formula> K. This work reports the discovery and characterization of two planets in this temperate
    regime orbiting mid-type M dwarfs: TOI-6716 b, a <inline-formula><tex-math>$R_\mathrm{b}=0.98\pm 0.07\, \mathrm{R}_{\oplus
    }$</tex-math></inline-formula> planet orbiting its M4 host star (<inline-formula><tex-math>$R_\star =0.231\, \pm 0.015\mathrm{R}\,
    _\odot$</tex-math></inline-formula>, <inline-formula><tex-math>$M_\star =0.223\pm 0.011\, \mathrm{M}\, _\odot$</tex-math></inline-formula>,
    <inline-formula><tex-math>$T_\mathrm{eff}=3110\pm 80\, \mathrm{K}$</tex-math></inline-formula>) with a period <inline-formula><tex-math>$P=4.7185898^{+0.0000054}_{-0.0000041}\,
    \mathrm{d}$</tex-math></inline-formula>, and TOI-7384 b, a <inline-formula><tex-math>$R_\mathrm{b}=3.56\pm 0.21\, \mathrm{R}_{\oplus
    }$</tex-math></inline-formula> planet orbiting an M4 (<inline-formula><tex-math>$R_\star =0.319\, \pm 0.018\mathrm{R}\,
    _\odot$</tex-math></inline-formula>, <inline-formula><tex-math>$M_\star =0.318\pm 0.016\, \mathrm{M}\, _\odot$</tex-math></inline-formula>,
    <inline-formula><tex-math>$T_\mathrm{eff}=3185\pm 75\, \mathrm{K}$</tex-math></inline-formula>) star every <inline-formula><tex-math>$P=6.2340258^{+0.0000034}_{-0.0000036}\,
    \mathrm{d}$</tex-math></inline-formula>. The radii of TOI-6716 b and TOI-7384 b have precisions of 6.8 per cent and 5.9
    per cent, respectively. We validate these planets with multiband ground-based photometric observations, high-resolution
    imaging, and statistical analyses. We find these planets to have instellation fluxes close to the inner (hotter) edge
    of the temperate zone, with <inline-formula><tex-math>$S_\mathrm{b}=4.4\pm 1.1\, \mathrm{S}_{\oplus }$</tex-math></inline-formula>
    and <inline-formula><tex-math>$S_\mathrm{b}=4.9\pm 1.1\, \mathrm{S}_{\oplus }$</tex-math></inline-formula> for TOI-6716
    b and TOI-7384 b, respectively. Also, with a predicted transmission spectroscopy metric similar to the TRAPPIST-1 planets,
    TOI-6716 b is likely to be a good rocky-world James Webb Space Telescope target, should it have retained its atmosphere.'
