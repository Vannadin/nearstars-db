  title: Gaia search for stellar companions of TESS Objects of Interest II
  authors:
  - Mugrauer, Markus
  - Michel, Kai-Uwe
  year: '2021'
  pubdate: '2021-07-00'
  doi: 10.1002/asna.202113972
  abstract: We present the latest results of our ongoing multiplicity study of (Community) TESS Objects of Interest, using
    astro- and photometric data from the ESA-Gaia mission, to detect stellar companions of these stars and to characterize
    their properties. In total, 107 binary, 5 hierarchical triple star systems, as well as one quadruple system were detected
    among 585 targets surveyed, which are all located at distances closer than about 500 pc around the Sun. As proven with
    their accurate Gaia EDR3 astrometry, the companions and the targets are located at the same distance and share a common
    proper motion, as it is expected for components of gravitationally bound stellar systems. The companions exhibit masses
    in the range between about 0.09 M<SUB>☉</SUB> and 4.5 M<SUB>☉</SUB> and are most frequently found in the mass range between
    0.15 and 0.6 M<SUB>☉</SUB>. The companions are separated from the targets by about 120 up to 9,500 au and their frequency
    is the highest and constant within about 500 au while it continually decreases for larger separations. Beside mainly early
    to mid M dwarfs, also five white dwarf companions were identified in this survey, whose true nature was revealed by their
    photometric properties.
