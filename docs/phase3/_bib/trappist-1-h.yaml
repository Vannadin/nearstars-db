  arxiv_id: '1805.02595'
  ads_bibcode: 2019Icar..321..189T
  title: Far infrared measurements of absorptions by CH<SUB>4</SUB> + CO<SUB>2</SUB> and H<SUB>2</SUB> + CO<SUB>2</SUB> mixtures
    and implications for greenhouse warming on early Mars
  authors:
