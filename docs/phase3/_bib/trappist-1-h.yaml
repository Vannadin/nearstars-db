  title: The Five-Hundred Aperture Spherical Radio Telescope (fast) Project
  authors:
  - Nan, Rendong
  - Li, Di
  - Jin, Chengjin
  - Wang, Qiming
  - Zhu, Lichun
  - Zhu, Wenbai
