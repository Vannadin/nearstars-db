- arxiv_id: '1712.07539'
  ads_bibcode: 2018SSRv..214...39M
  title: Water and the Interior Structure of Terrestrial Planets and Icy Bodies
  authors:
  - Monteux, J.
  - Golabek, G. J.
  - Rubie, D. C.
  - Tobie, G.
  - Young, E. D.
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.1007/s11214-018-0473-x
  abstract: Water content and the internal evolution of terrestrial planets and icy bodies are closely linked. The distribution
    of water in planetary systems is controlled by the temperature structure in the protoplanetary disk and dynamics and migration
    of planetesimals and planetary embryos. This results in the formation of planetesimals and planetary embryos with a great
    variety of compositions, water contents and degrees of oxidation. The internal evolution and especially the formation
    time of planetesimals relative to the timescale of radiogenic heating by short-lived <SUP>26</SUP>Al decay may govern
    the amount of hydrous silicates and leftover rock-ice mixtures available in the late stages of their evolution. In turn,
    water content may affect the early internal evolution of the planetesimals and in particular metal-silicate separation
    processes. Moreover, water content may contribute to an increase of oxygen fugacity and thus affect the concentrations
    of siderophile elements within the silicate reservoirs of Solar System objects. Finally, the water content strongly influences
    the differentiation rate of the icy moons, controls their internal evolution and governs the alteration processes occurring
