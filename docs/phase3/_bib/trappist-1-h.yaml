    Young Gas-giant Planets'
  authors:
  - Liu, Michael C.
  - Magnier, Eugene A.
  - Deacon, Niall R.
  - Allers, Katelyn N.
  - Dupuy, Trent J.
  - Kotson, Michael C.
  - Aller, Kimberly M.
  - Burgett, W. S.
