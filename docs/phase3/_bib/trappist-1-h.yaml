  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/1538-4357/ac625f
  abstract: The search for signs of life on other worlds has largely focused on terrestrial planets. Recent work, however,
    argues that life could exist in the atmospheres of temperate sub-Neptunes. Here we evaluate the usefulness of carbon dioxide
    isotopologues as evidence of aerial life. Carbon isotopes are of particular interest, as metabolic processes preferentially
    use the lighter <SUP>12</SUP>C over <SUP>13</SUP>C. In principle, the upcoming James Webb Space Telescope (JWST) will
    be able to spectrally resolve the <SUP>12</SUP>C and <SUP>13</SUP>C isotopologues of CO<SUB>2</SUB>, but not CO and CH<SUB>4</SUB>.
    We simulated observations of CO<SUB>2</SUB> isotopologues in the H<SUB>2</SUB>-dominated atmospheres of our nearest (&lt;40
    pc), temperate (equilibrium temperature of 250-350 K) sub-Neptunes with M-dwarf host stars. We find <SUP>13</SUP>CO<SUB>2</SUB>
    and <SUP>12</SUP>CO<SUB>2</SUB> distinguishable if the atmosphere is H<SUB>2</SUB> dominated with a few percentage points
    of CO<SUB>2</SUB> for the most idealized target with an Earth-like composition of the two most abundant isotopologues,
    <SUP>12</SUP>CO<SUB>2</SUB> and <SUP>13</SUP>CO<SUB>2</SUB>. With a Neptune-like metallicity of 100× solar and a C/O of
    0.55, we are unable to distinguish between <SUP>13</SUP>CO<SUB>2</SUB> and <SUP>12</SUP>CO<SUB>2</SUB> in the atmospheres
    of temperate sub-Neptunes. If atmospheric composition largely follows metallicity scaling, the concentration of CO<SUB>2</SUB>
    in a H<SUB>2</SUB>-dominated atmosphere will be too low to distinguish CO<SUB>2</SUB> isotopologues with JWST. In contrast,
    at higher metallicities, there will be more CO<SUB>2</SUB>, but the smaller atmospheric scale height makes the measurement
    impossible. Carbon dioxide isotopologues are unlikely to be useful biosignature gases for the JWST era. Instead, isotopologue
    measurements should be used to evaluate formation mechanisms of planets and exosystems.
