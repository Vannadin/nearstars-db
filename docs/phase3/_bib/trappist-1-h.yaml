  ads_bibcode: 2017AJ....154..264T
  title: Validation of Small Kepler Transiting Planet Candidates in or near the Habitable Zone
  authors:
  - Torres, Guillermo
  - Kane, Stephen R.
  - Rowe, Jason F.
  - Batalha, Natalie M.
  - Henze, Christopher E.
  - Ciardi, David R.
  - Barclay, Thomas
  - Borucki, William J.
  - Buchhave, Lars A.
