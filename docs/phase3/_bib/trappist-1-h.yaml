  arxiv_id: '1912.02313'
  ads_bibcode: 2020ApJ...888..122H
  title: O<SUB>2</SUB>- and CO-rich Atmospheres for Potentially Habitable Environments on TRAPPIST-1 Planets
  authors:
  - Hu, Renyu
  - Peterson, Luke
  - Wolf, Eric T.
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.3847/1538-4357/ab5f07
  abstract: Small exoplanets of nearby M-dwarf stars present the possibility of finding and characterizing habitable worlds
    within the next decade. TRAPPIST-1, an ultracool M-dwarf star, was recently found to have seven Earth-sized planets of
    predominantly rocky composition. The planets e, f, and g could have a liquid water ocean on their surface given appropriate
    atmospheres of N<SUB>2</SUB> and CO<SUB>2</SUB>. In particular, climate models have shown that the planets e and f can
    sustain a global liquid water ocean, for ≥0.2 bar CO<SUB>2</SUB> plus 1 bar N<SUB>2</SUB>, or ≥2 bar CO<SUB>2</SUB>, respectively.
    These atmospheres are irradiated by ultraviolet emission from the star's moderately active chromosphere, and the consequence
    of this irradiation is unknown. Here we show that chemical reactions driven by the irradiation produce and maintain more
    than 0.2 bar O<SUB>2</SUB> and 0.05 bar CO if the CO<SUB>2</SUB> is ≥0.1 bar. The abundance of O<SUB>2</SUB> and CO can
    rise to more than 1 bar under certain boundary conditions. Because of this O<SUB>2</SUB>-CO runaway, habitable environments
    on the TRAPPIST-1 planets entail an O<SUB>2</SUB>- and CO-rich atmosphere with coexisting O<SUB>3</SUB>. The only process
    that would prevent runaway is direct recombination of O<SUB>2</SUB> and CO in the ocean, a reaction that is facilitated
    biologically. Our results indicate that O<SUB>2</SUB>, O<SUB>3</SUB>, and CO should be considered together with CO<SUB>2</SUB>
    as the primary molecules in the search for atmospheric signatures from temperate and rocky planets of TRAPPIST-1 and other
    M-dwarf stars.
