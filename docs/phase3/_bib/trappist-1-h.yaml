  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.1051/0004-6361/201937179
  abstract: We report the detection of a transiting super-Earth-sized planet (R = 1.39 ± 0.09 R<SUB>⊕</SUB>) in a 1.4-day
    orbit around L 168-9 (TOI-134), a bright M1V dwarf (V = 11, K = 7.1) located at 25.15 ± 0.02 pc. The host star was observed
    in the first sector of the Transiting Exoplanet Survey Satellite (TESS) mission. For confirmation and planet mass measurement
    purposes, this was followed up with ground-based photometry, seeing-limited and high-resolution imaging, and precise radial
    velocity (PRV) observations using the HARPS and Magellan/PFS spectrographs. By combining the TESS data and PRV observations,
    we find the mass of L 168-9 b to be 4.60 ± 0.56 M<SUB>⊕</SUB> and thus the bulk density to be 1.74<SUB>-0.33</SUB><SUP>+0.44</SUP>
    times higher than that of the Earth. The orbital eccentricity is smaller than 0.21 (95% confidence). This planet is a
    level one candidate for the TESS mission's scientific objective of measuring the masses of 50 small planets, and it is
    one of the most observationally accessible terrestrial planets for future atmospheric characterization. <P />Full Tables
    B.1 and B.2 are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/636/A58">http://cdsarc.u-strasbg.fr/viz-bin/cat/J/A+A/636/A58</A>.
    <P />Partially based on observations made with the HARPS instrument on the ESO 3.6 m telescope under the program IDs 198.C-0838(A),
