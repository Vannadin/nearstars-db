  arxiv_id: '2505.23230'
  ads_bibcode: 2025ApJ...988..116H
  title: Detecting Atmospheric CO<SUB>2</SUB> Trends as Population-level Signatures for Long-term Stable Water Oceans and
    Biotic Activity on Temperate Terrestrial Exoplanets
  authors:
  - Hansen, Janina
  - Angerhausen, Daniel
  - Quanz, Sascha P.
  - Vance, Derek
  - Konrad, Björn S.
  - Garvin, Emily O.
  - Alei, Eleonora
  - Kammerer, Jens
  - Dannert, Felix A.
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.3847/1538-4357/addc6e
  abstract: Identifying key observables is essential for enhancing our knowledge of exoplanet habitability and biospheres,
    as well as improving future mission capabilities. While currently challenging, future observatories such as the Large
    Interferometer for Exoplanets (LIFE) will enable atmospheric observations of a diverse sample of temperate terrestrial
    worlds. Using thermal emission spectra that represent conventional predictions of atmospheric CO<SUB>2</SUB> variability
    across the habitable zone (HZ), we assess the ability of the LIFE mission—as a specific concept for a future space-based
    interferometer—to detect CO<SUB>2</SUB> trends indicative of the carbonate─silicate (Cb─Si) weathering feedback, a well-known
    habitability marker and potential biological tracer. Therefore, we explore the feasibility of differentiating between
    CO<SUB>2</SUB> trends in biotic and abiotic planet populations. We create synthetic exoplanet populations based on geochemistry-climate
    predictions and perform retrievals on simulated thermal emission observations. The results demonstrate the robust detection
    of population-level CO<SUB>2</SUB> trends in both biotic and abiotic scenarios for population sizes as small as 30 exo-Earth
    candidates (EECs) and the lowest assessed spectrum quality in terms of signal-to-noise ratio, S/N = 10, and spectral resolution,
    R = 50. However, biased CO<SUB>2</SUB> partial pressure constraints hinder accurate differentiation between biotic and
    abiotic trends. If these biases were corrected, accurate differentiation could be achieved for populations with ≥100 EECs.
    We conclude that LIFE can effectively enable population-level characterization of temperate terrestrial atmospheres and
    detect CO<SUB>2</SUB> trends driven by the Cb─Si cycle as habitability indicators. Nevertheless, the identified biases
    underscore the importance of testing atmospheric characterization performance against the broad diversity expected for
    planetary populations.
