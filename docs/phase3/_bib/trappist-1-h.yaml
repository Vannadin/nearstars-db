- &id054
  arxiv_id: '2506.20561'
  ads_bibcode: 2025AJ....170..335B
  title: An Earthlike Density for the Temperate Earth-sized Planet GJ 12 b
  authors:
  - Brady, Madison
  - Bean, Jacob L.
  - Basant, Ritvik
  - Brown, Nina
  - Das, Tanya
  - Nixon, Matthew C.
  - Luque, Rafael
  - Piaulet-Ghorayeb, Caroline
  - Radica, Michael
  - Seifahrt, Andreas
