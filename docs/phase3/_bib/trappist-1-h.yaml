- &id554
  arxiv_id: '2501.18477'
  ads_bibcode: 2025AJ....170..298S
  title: A Comprehensive Reanalysis of K2-18 b's JWST NIRISS+NIRSpec Transmission Spectrum
  authors:
  - Schmidt, Stephen P.
  - MacDonald, Ryan J.
  - Tsai, Shang-Min
  - Radica, Michael
  - Wang, Le-Chris
  - Ahrer, Eva-Maria
  - Bell, Taylor J.
  - Fisher, Chloe
  - Thorngren, Daniel P.
  - Wogan, Nicholas
  - May, Erin M.
  - Ferrari, Piero
  - Bennett, Katherine A.
  - Rustamkulov, Zafar
  - López-Morales, Mercedes
  - Sing, David K.
  year: '2025'
  pubdate: '2025-12-00'
  doi: 10.3847/1538-3881/ae019a
  abstract: Sub-Neptunes are the most common type of planet in our galaxy. Interior structure models suggest that the coldest
    sub-Neptunes could host liquid water oceans underneath their hydrogen envelopes—sometimes called "hycean" planets. JWST
    transmission spectra of the ∼250 K sub-Neptune K2-18 b were recently used to report detections of CH<SUB>4</SUB> and CO<SUB>2</SUB>,
    alongside weaker evidence of (CH<SUB>3</SUB>)<SUB>2</SUB>S (dimethyl sulfide, or DMS). Atmospheric CO<SUB>2</SUB> was
    interpreted as evidence for a liquid water ocean, while DMS was highlighted as a potential biomarker. However, these notable
    claims were derived using a single data reduction and retrieval modeling framework, which did not allow for standard robustness
    tests. Here, we present a comprehensive reanalysis of K2-18 b's JWST NIRISS SOSS and NIRSpec G395H transmission spectra,
    including the first analysis of the second-order NIRISS SOSS data. We incorporate multiple well-tested data reduction
    pipelines and retrieval codes, spanning 60 different data treatments and over 250 atmospheric retrievals. We confirm the
    detection of CH<SUB>4</SUB> (≍4σ), with a volume mixing ratio range <inline-formula> <mml:math><mml:mo>−</mml:mo><mml:mn>2.14</mml:mn><mml:mo>≤</mml:mo><mml:msub><mml:mrow><mml:mi>log</mml:mi></mml:mrow><mml:mrow><mml:mn>10</mml:mn></mml:mrow></mml:msub><mml:msub><mml:mrow><mml:mi>CH</mml:mi></mml:mrow><mml:mrow><mml:mn>4</mml:mn></mml:mrow></mml:msub><mml:mo>≤</mml:mo><mml:mo>−</mml:mo><mml:mn>0.53</mml:mn></mml:math>
    </inline-formula>, but we find no statistically significant or reliable evidence for CO<SUB>2</SUB> or DMS. Finally, we
    assess the retrieved atmospheric composition using photochemical-climate and interior models, demonstrating that our revised
    composition of K2-18 b can be explained by an oxygen-poor mini-Neptune without requiring a liquid water surface or life.
  source: citation_of=2025arXiv250812865M
