- &id1182
  arxiv_id: '1907.05506'
  ads_bibcode: 2019AmMin.104..817P
  title: 'The composition and mineralogy of rocky exoplanets: A survey of &gt;4000 stars from the Hypatia Catalog'
  authors:
  - Putirka, Keith D.
  - Rarick, John C.
  year: '2019'
  pubdate: '2019-06-00'
  doi: 10.2138/am-2019-6787
  abstract: Combining occurrence rates of rocky exoplanets about sun-like stars, with the number of such stars that occupy
    possibly hospitable regions of the Milky Way, we estimate that at least 1.4 × 10<SUP>8</SUP> near-Earth-sized planets
    occupy habitable orbits about habitable stars. This number is highly imprecise to be sure, and it is likely much higher,
    but it illustrates that such planets are common, not rare. To test whether such rocky exoplanets might be geologically
    similar to Earth, we survey &gt;4000 star compositions from the Hypatia Catalog—the most compositionally broad of such
    collections. We find that rocky exoplanets will have silicate mantles dominated by olivine and/or orthopyroxene, depending
    upon Fe partitioning during core formation. Some exoplanets may be magnesiowüstite- or quartz-saturated, and we present
    a new classification scheme based on the weight percent ratio (FeO+MgO)/SiO<SUB>2</SUB>, to differentiate rock types.
    But wholly exotic mantle mineralogies should be rare to absent; many exo-planets will have a peridotite mantle like Earth,
    but pyroxenite planets should also be quite common. In addition, we find that half or more of the range of exoplanet mantle
    mineralogy is possibly controlled by core formation, which we model using α<SUB>Fe</SUB> = Fe<SUP>BSP</SUP>/Fe<SUP>BP</SUP>,
    where Fe<SUP>BSP</SUP> is Fe in a Bulk Silicate Planet (bulk planet, minus core), on a cation weight percent basis (elemental
    weight proportions, absent anions) and Fe<SUP>BP</SUP> is the cation weight percent of Fe for a Bulk Planet. This ratio
    expresses, in this case for Fe, the fraction of an element that is partitioned into the silicate mantle relative to the
    total amount available upon accretion. In our solar system, α<SUB>Fe</SUB> varies from close to 0 (Mercury) to about 0.54
    (Mars). Remaining variations in theoretical exoplanet mantle mineralogy result from non-trivial variations in star compositions.
    But we also find that Earth is decidedly non-solar (non-chondritic); this is not a new result, but appears worth re-emphasizing,
    given that current discussions often still use carbonaceous or enstatite chondrites as models of Bulk Earth. While some
    studies emphasize the close overlap of some isotope ratios between certain meteoritic and terrestrial (Earth-derived)
    samples, we find that major oxides of chondritic meteorites do not precisely explain bulk Earth. To allow Earth to be
    chondritic (or solar), there is the possibility that Earth contains a hidden component that, added to known reservoirs,
    would yield a solar/chondritic bulk Earth. We test that idea using a mass balance of major oxides using known reservoirs,
    so that the sum of upper mantle, metallic core, and crust, plus a hidden component, yields a solar bulk composition. In
    this approach, the fractions of crust and core are fixed and the hidden mantle component, F<SUB>h</SUB>, is some unknown
    fraction of the entire mantle (so if F<SUB>DM</SUB> is the fraction of depleted mantle, then F<SUB>h</SUB> + F<SUB>DM</SUB>
    = 1). Such mass balance shows that if a hidden mantle component were to exist, it must comprise &gt;28% of Earth's mantle,
    otherwise it would have negative abundances of TiO<SUB>2</SUB> and Al<SUB>2</SUB>O<SUB>3</SUB>. There is no clear upper
    limit for such a component, so it could comprise the entire mantle. But all estimates from F<SUB>h</SUB> = 0.28 to F<SUB>h</SUB>
    = 1.0 yield a hidden fraction that does not match the inferred sources of ocean island or mid-ocean ridge basalts, and
    would be geologically unusual, having higher Na<SUB>2</SUB>O, Cr<SUB>2</SUB>O<SUB>3</SUB>, and FeO and lower CaO, MgO,
    and Al<SUB>2</SUB>O<SUB>3</SUB> compared to familiar mantle components. We conclude that such a hidden component does
    not exist.
