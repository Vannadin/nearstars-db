- &id563
  arxiv_id: null
  ads_bibcode: 2025NatAs...9.1022L
  title: Earth-mass planets with He atmospheres in the habitable zone of Sun-like stars
  authors:
  - Lammer, Helmut
  - Scherf, Manuel
  - Erkaev, Nikolai V.
  - Kubyshkina, Daria
  - Gorbunova, Kseniia D.
  - Fossati, Luca
  - Woitke, Peter
  year: '2025'
  pubdate: '2025-07-00'
  doi: 10.1038/s41550-025-02550-6
  abstract: The discovery of many low-mass exoplanets, including several planets within the habitable zone of their host stars,
    has led to the question of which kind of atmosphere surrounds them. Recent exoplanet detections have revealed the existence
    of a large population of low-mass planets (&lt;3 M<SUB>⊕</SUB>) with H<SUB>2</SUB>-dominated atmospheres that must have
    been accreted from the protoplanetary disk. As the gas disk usually has an ~10% fraction of helium, we model the possible
    enrichment of the primordial He fraction in the atmosphere of planets with mass between 0.75 M<SUB>⊕</SUB> and 3.0 M<SUB>⊕</SUB>
    that orbit in the classical habitable zone of Sun-like stars. Depending on the mass accreted by the planet during the
    gas disk phase and the stellar high-energy flux between ~10 and 120 nm, we find that Earth-like planets with masses between
    ~0.95 M<SUB>⊕</SUB> and 1.25 M<SUB>⊕</SUB> inside the habitable zone of Sun-like stars can end up with He-dominated primordial
    atmospheres. This finding has important implications for the evolution of Earth-like habitats, as these thick helium-enriched
    primordial atmospheres can inhibit the habitability of these planets. The upcoming generation of giant telescopes, such
    as the Extremely Large Telescope, may enable us to observe and explore these atmospheres.
