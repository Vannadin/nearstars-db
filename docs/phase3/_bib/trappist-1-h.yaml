  arxiv_id: '1608.03621'
  ads_bibcode: 2016ApJ...831..125P
  title: A Steeper than Linear Disk Mass-Stellar Mass Scaling Relation
  authors:
  - Pascucci, I.
  - Testi, L.
  - Herczeg, G. J.
  - Long, F.
  - Manara, C. F.
  - Hendler, N.
  - Mulders, G. D.
