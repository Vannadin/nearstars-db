  title: One year of AU Mic with HARPS - I. Measuring the masses of the two transiting planets
  authors:
  - Zicher, Norbert
  - Barragán, Oscar
  - Klein, Baptiste
  - Aigrain, Suzanne
  - Owen, James E.
  - Gandolfi, Davide
