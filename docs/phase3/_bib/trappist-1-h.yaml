  arxiv_id: null
  ads_bibcode: 2012ApJ...748...41S
  title: The Influence of Pressure-dependent Viscosity on the Thermal Evolution of Super-Earths
  authors:
  - Stamenković, Vlada
  - Noack, Lena
  - Breuer, Doris
  - Spohn, Tilman
  year: '2012'
  pubdate: '2012-03-00'
  doi: 10.1088/0004-637X/748/1/41
  abstract: We study the thermal evolution of super-Earths with a one-dimensional (1D) parameterized convection model that
    has been adopted to account for a strong pressure dependence of the viscosity. A comparison with a 2D spherical convection
    model shows that the derived parameterization satisfactorily represents the main characteristics of the thermal evolution
    of massive rocky planets. We find that the pressure dependence of the viscosity strongly influences the thermal evolution
    of super-Earths—resulting in a highly sluggish convection regime in the lower mantles of those planets. Depending on the
    effective activation volume and for cooler initial conditions, we observe with growing planetary mass even the formation
    of a conductive lid above the core-mantle boundary (CMB), a so-called CMB-lid. For initially molten planets our results
    suggest no CMB-lids but instead a hot lower mantle and core as well as sluggish lower mantle convection. This implies
    that the initial interior temperatures, especially in the lower mantle, become crucial for the thermal evolution—the thermostat
    effect suggested to regulate the interior temperatures in terrestrial planets does not work for massive planets if the
    viscosity is strongly pressure dependent. The sluggish convection and the potential formation of the CMB-lid reduce the
    convective vigor throughout the mantle, thereby affecting convective stresses, lithospheric thicknesses, and heat fluxes.
    The pressure dependence of the viscosity may therefore also strongly affect the propensity of plate tectonics, volcanic
    activity, and the generation of a magnetic field of super-Earths.
