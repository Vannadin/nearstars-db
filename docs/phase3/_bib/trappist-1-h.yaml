  - Feiden, Gregory A.
  year: '2020'
  pubdate: '2020-09-00'
  doi: 10.3847/1538-3881/aba192
  abstract: The Hertzsprung-Russell diagram (HRD) is fully examined using the Fourier analysis. This work shows more stars
    are above the gap in the lower main sequence than below it, and this implies that stars spend more time above the gap
    while they undergo variability associated with the <SUP>3</SUP>He instability. The enhanced HRD also shows the width of
    the gap is not linear and depends on the ${G}_{\mathrm{BP}}-{G}_{\mathrm{RP}}$ color up until ${G}_{\mathrm{BP}}-{G}_{\mathrm{RP}}=2.7$
    . Beyond this color limit, the gap is hardly seen. Besides, a new low density region is revealed for the first time centered
    at M<SUB>G</SUB> ≍ 10.7 and G<SUB>BP</SUB> - G<SUB>RP</SUB> ≍ 2.8, which is below the lower right corner of the gap. This
    work also shows that the main sequence appears to have fine stripes where stellar densities are relatively low or high
    compared to their adjacent regions on the main sequence. These stripes can be seen throughout the main sequence of stars
    redder than G<SUB>BP</SUB> - G<SUB>RP</SUB> = 0.8 and are not limited to any specific color or spectral type. Slopes of
    these features are different from the main sequence, but are pretty consistent throughout the main sequence, with a few
    exceptions. We are perplexed by these new features, but the complexities of stellar atmospheric features and opacities
    of dwarfs may have caused these patterns.
