  arxiv_id: '1110.4525'
  ads_bibcode: 2012AsBio..12....3J
  title: Suppression of the Water Ice and Snow Albedo Feedback on Planets Orbiting Red Dwarf Stars and the Subsequent Widening
    of the Habitable Zone
  authors:
  - Joshi, Manoj M.
  - Haberle, Robert M.
  year: '2012'
  pubdate: '2012-01-00'
  doi: 10.1089/ast.2011.0668
  abstract: 'M-stars comprise 80% of main-sequence stars, and so their planetary systems provide the best chance for finding
    habitable planets, i.e.: those with surface liquid water. We have modelled the broadband albedo or reflectivity of water
    ice and snow for simulated planetary surfaces orbiting two observed red dwarf stars (or M-stars) using spectrally resolved
    data of the Earth''s cryosphere. The gradual reduction of the albedos of snow and ice at wavelengths greater than 1 ?m,
    combined with M-stars emitting a significant fraction of their radiation at these same longer wavelengths, mean that the
    albedos of ice and snow on planets orbiting M-stars are much lower than their values on Earth. Our results imply that
    the ice/snow albedo climate feedback is significantly weaker for planets orbiting M-stars than for planets orbiting G-type
    stars such as the Sun. In addition, planets with significant ice and snow cover will have significantly higher surface
    temperatures for a given stellar flux if the spectral variation of cryospheric albedo is considered, which in turn implies
    that the outer edge of the habitable zone around M-stars may be 10-30% further away from the parent star than previously
    thought.'
