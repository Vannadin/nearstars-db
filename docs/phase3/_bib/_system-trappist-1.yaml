- arxiv_id: null
  ads_bibcode: 2025AAS...24544602T
  title: 'Cuentos de las Estrellas: Understanding the Properties and Impacts of Flares Across Time and Wavelength'
  authors:
  - Tovar Mendoza, Guadalupe
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: The era of new space and ground based telescopes is providing us with more detailed exoplanet observations and
    advancing the search for life beyond our own solar system. However, stellar magnetic activity remains a limiting factor
    for both planet detection and characterization, particularly around active M-type stars. To address these challenges,
    I have focused my thesis work on developing tools and leading studies that help us gain a better understanding of the
    morphology, energies, temperatures, and frequency of stellar flare events across various time and wavelength regimes.
    By leveraging existing datasets such as Spitzer, Kepler, and TESS I have studied how stellar activity impacts our search
    for life on exoplanets. In part one of my thesis, I use Kepler data to study the morphology or shape of stellar flares.
    I derive a continuous and analytical model to describe the shape of flare events in photometric observations. I test the
    flare template on datasets of various cadences and wavelengths and find the model is versatile enough to fit flare events
    in all of the tested cases. In the second part of my thesis, I study the energetics of flare events at infrared wavelengths.
    I use archival Spitzer observations of the active, planet hosting star, TRAPPIST-1, to study how flare temperatures vary
    at infrared observations and in turn affect the exoplanets in orbit around the star. I compare our results to the latest
    JWST observations of TRAPPIST-1. The final part of my thesis looks to the future to understand what the upcoming flagship
    mission, Nancy Grace Roman Space Telescope will provide for flare science. Specifically, we simulate 10,000 Roman light
    curves with realistic noise properties and use a flare frequency distribution model to inject flares into the light curves
    and perform recovery tests. We find that Roman will need to consider cadence, filters, and read-out strategies in order
    to maximize and expand our knowledge of stellar magnetic activity.
