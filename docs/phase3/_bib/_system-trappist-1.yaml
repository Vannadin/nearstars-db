  doi: 10.3847/1538-4357/adf207
  abstract: The nearby TRAPPIST-1 system, with its seven small rocky planets orbiting a late-type M8 star, offers an unprecedented
    opportunity to search for secondary atmospheres on temperate terrestrial worlds. In particular, the 0.8 R<SUB>⊕</SUB>TRAPPIST-1
    d lies at the edge of the habitable zone (T<SUB>eq,A=0.3</SUB> = 262 K). Here we present the first 0.6─5.2 μm NIRSpec/PRISM
    transmission spectrum of TRAPPIST-1 d from two transits with JWST. We find that stellar contamination from unocculted
    bright heterogeneities introduces 500─1000 ppm visit-dependent slopes, consistent with constraints from the out-of-transit
    stellar spectrum. Once corrected, the transmission spectrum is flat within ±100─150 ppm, showing no evidence for a haze-like
    slope or molecular absorption despite NIRSpec/PRISM's sensitivity to CH<SUB>4</SUB>, H<SUB>2</SUB>O, CO, SO<SUB>2</SUB>,
    and CO<SUB>2</SUB>. Our observations exclude clear, hydrogen-dominated atmospheres with high confidence (&gt;3σ). We leverage
    our constraints on even trace amounts of CH<SUB>4</SUB>, H<SUB>2</SUB>O, and CO<SUB>2</SUB> to further reject high mean
    molecular weight compositions analogous to a haze-free Titan, a cloud-free Venus, early Mars, and both Archean Earth and
    a cloud-free modern Earth scenario (&gt;95% confidence). If TRAPPIST-1 d retains an atmosphere, it is likely extremely
    thin or contains high-altitude aerosols, with water cloud formation at the terminator predicted by 3D global climate models.
    Alternatively, if TRAPPIST-1 d is airless, our evolutionary models indicate that TRAPPIST-1 b, c, and d must have formed
    with ≲4 Earth oceans of water, though this would not preclude atmospheres on the cooler habitable-zone planets TRAPPIST-1
    e, f, and g.
