- &id032
  arxiv_id: '2601.05799'
  ads_bibcode: 2026MNRAS.547ag070S
  title: Two temperate Earth- and Neptune-sized planets orbiting fully convective M dwarfs
  authors:
  - Scott, Madison G.
  - Dransfield, Georgina
  - Timmermans, Mathilde
  - Triaud, Amaury H. M. J.
  - Rackham, Benjamin V.
  - Barkaoui, Khalid
  - Burgasser, Adam J.
  - Collins, Karen A.
  - Gillon, Michaël
  - Howell, Steve B.
  - Levine, Alan M.
  - Pozuelos, Francisco J.
  - Stassun, Keivan G.
  - Ziegler, Carl
  - Chew, Yilen Gomez Maqueo
  - Clark, Catherine A.
  - Davis, Yasmin
  - Davoudi, Fatemeh
  - Daylan, Tansu
  - Demory, Brice-Olivier
  - Feliz, Dax
  - Fukui, Akihiko
  - Günther, Maximilian N.
  - Jehin, Emmanuël
  - Lienhard, Florian
  - Mann, Andrew W.
  - Muñoz, Clàudia Janó
  - Narita, Norio
  - Pedersen, Peter P.
  - Schwarz, Richard P.
  - Shporer, Avi
  - Soubkiou, Abderahmane
  - Zúñiga-Fernández, Sebastián
  year: '2026'
  pubdate: '2026-03-00'
  doi: 10.1093/mnras/stag070
  abstract: 'As the diversity of exoplanets continues to grow, it is important to revisit assumptions about habitability and
    classical habitable zone definitions. In this work, we introduce an expanded ''temperate'' zone, defined by instellation
    fluxes in the range <inline-formula><tex-math>$0.1&lt; S/\mathrm{S}_{\oplus }&lt; 5$</tex-math></inline-formula>, thus
    encompassing a broader range of potentially habitable worlds. We also introduce the TEMPOS survey, which aims to produce
    a catalogue of precise radii for temperate planets orbiting M dwarfs with <inline-formula><tex-math>$T_\mathrm{eff}\le
    3400\,$</tex-math></inline-formula> K. This work reports the discovery and characterization of two planets in this temperate
    regime orbiting mid-type M dwarfs: TOI-6716 b, a <inline-formula><tex-math>$R_\mathrm{b}=0.98\pm 0.07\, \mathrm{R}_{\oplus
    }$</tex-math></inline-formula> planet orbiting its M4 host star (<inline-formula><tex-math>$R_\star =0.231\, \pm 0.015\mathrm{R}\,
    _\odot$</tex-math></inline-formula>, <inline-formula><tex-math>$M_\star =0.223\pm 0.011\, \mathrm{M}\, _\odot$</tex-math></inline-formula>,
