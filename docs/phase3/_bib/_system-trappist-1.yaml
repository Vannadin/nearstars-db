- arxiv_id: null
  ads_bibcode: 2025AAS...24533706H
  title: 'M Dwarf Cold Planets: Solar System Analogs or Truly Alien Worlds?'''
  authors:
  - Harris, Mallory
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: The question of whether other planetary systems resemble ours is long-standing in exoplanet science and has strong
    implications for planet formation theories. Current evidence suggests our solar system is uncommon, but detection biases
    complicate this conclusion. The transit method, which dominates exoplanet demographics, favors short-period planets, while
    the radial velocity (RV) method can detect some outer planets, but is limited by planet masses and the high cost of determining
    orbital periods. Consequently, the exoplanet community has focused on M dwarf stars for solar system and Earth analogues,
    as their habitable zones are closer to the host star. Discoveries of compact multiplanet systems like TRAPPIST-1 have
    led to the assumption that M dwarfs planetary systems form the same way as around Sun-like stars, just scaled down. Thus
    colder planets and gas giants around low-mass stars have been largely overlooked and assumed absent or unable to form.
    However, both RV and microlensing surveys have found gas giants orbiting M dwarfs, and TESS and Kepler have discovered
    systems like Kepler-186 and TOI-904 with cold planets beyond the ice-line. To further explore outer planets around M dwarfs,
    I am using the Transiting Exoplanet Survey Satellite (TESS), with a very complete stellar sample of over 3 million low-mass
    stars. From periodic transit searches, most TESS-confirmed planets (78.8%) to date orbit within 0.15 AU (less than half
    of Mercury's orbit), with 89.2% of TESS's M dwarf planets in this range. To find more distant planets, I developed a pipeline
    for detecting both single-transit events and compact multiplanet systems. The yield from this pipeline will be applied
    to calculate new occurrence rates for M dwarf planets and constrain outer planet frequencies. Even a null detection of
    cold planets would be statistically significant, especially for Jovian planets, and place constraints on planet formation
    theories. To reach planets at even greater distances from their host star than accessible with the transit method, I also
    use TESS photometry to search for microlensing events with exoplanets. Microlensing planets generally exist near the ice-line
    of their hosts stars, which or often M dwarfs due to their abundance in our galaxy. By searching TESS for known events
    detected by ground-based observatories or GAIA, I have found several single-lens events and a planetary system with a
    super-Jupiter, the first bound microlensing TESS planet. My methods and findings will help determine if M dwarfs are the
    right place to search for solar system analogs, or if they favor their own formation pathways.
