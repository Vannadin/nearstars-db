  arxiv_id: '2505.03672'
  ads_bibcode: 2025PSJ.....6..126T
  title: Statistical Geochemical Constraints on Present-day Water Outgassing as a Source of Secondary Atmospheres on the TRAPPIST-1
    Exoplanets
  authors:
