  arxiv_id: '2409.08313'
  ads_bibcode: 2024AJ....168..283T
  title: A Radio Technosignature Search of TRAPPIST-1 with the Allen Telescope Array
  authors:
  - Tusay, Nick
  - Sheikh, Sofia Z.
  - Sneed, Evan L.
  - Farah, Wael
  - Pollak, Alexander W.
  - Cruz, Luigi F.
