  arxiv_id: '2506.19928'
  ads_bibcode: 2025AJ....170..213D
  title: 'Gravity-sensitive Spectral Indices in Ultracool Dwarfs: Investigating Correlations with Metallicity and Planet Occurrence
    Using SpeX and Fire Observations'
  authors:
  - Davoudi, Fatemeh
  - Rackham, Benjamin V.
  - de Wit, Julien
  - Toomlaid, Jan
  - Gillon, Michaël
  - Triaud, Amaury H. M. J.
  - Burgasser, Adam J.
  - Theissen, Christopher A.
  year: '2025'
  pubdate: '2025-10-00'
  doi: 10.3847/1538-3881/adf83f
  abstract: 'We present a near-infrared spectroscopic analysis (0.9─2.4 μm) of gravity indices for 56 ultracool dwarfs (M5.5─L0),
    including exoplanet hosts SPECULOOS-2, SPECULOOS-3, and LHS 3154. Our dataset includes 59 spectra from the SpeX and FIRE
    spectrographs. We also discuss literature results for TRAPPIST-1. Using gravity-sensitive spectral indices, including
    FeH absorption (0.99, 1.20, and 1.55 μm), the VO band at 1.06 μm, the H-band continuum, and alkali lines such as K I (1.17
    and 1.25 μm), we investigate correlations between gravity classification, stellar metallicity, and the presence of close-in
    transiting planets. All four planet-hosting stars exhibit intermediate-gravity spectral signatures, despite indicators
    of field age. However, a volume-corrected logistic regression reveals no significant association between gravity class
    and planet occurrence. Among individual indices, we find FeH<SUB>z</SUB> to be the most promising tracer of planet-hosting
    status. We tentatively identify a correlation between FeH<SUB>z</SUB> (0.99 μm) and planet presence at the 2σ level, though
    the result may reflect observational biases, including transit probability, small-number statistics, and detection sensitivity.
    More robustly, we find a significant anticorrelation between FeH<SUB>z</SUB> and [Fe/H] (3.3σ). A Kruskal─Wallis test
    shows no significant [Fe/H] difference across gravity classes, suggesting the observed FeH<SUB>z</SUB>─[Fe/H] trend is
    not driven by bulk metallicity differences. We propose this anticorrelation may reflect the interplay between age, gravity,
    and composition: higher-metallicity objects may be systematically younger and have lower gravities, suppressing FeH absorption.
    While our results only hint at a link between gravity-related characteristics and planet occurrence among late-M dwarfs,
    they underscore the need for caution when using spectral diagnostics to infer the properties of planet-hosting ultracool
    dwarfs.'
