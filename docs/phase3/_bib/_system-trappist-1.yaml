  abstract: Surface temperature is one of the most important parameters in determining the potential habitability of an exoplanet.
    However, current global thermal models of planets have some limitations, and most use computationally expensive simulations
    (e.g., General Circulation Models). For instance, how the surface temperature of a planet is affected by the obliquity,
    latitude, orbital dynamics, albedo, and greenhouse effect is still an open problem. In this study, we first modeled the
    mean global surface temperature of Earth-like planets using the paleotemperatures of Earth in the last 750 million years.
    The model depends on the distribution of surface fractions (e.g., vegetation, ice, desert, ocean, and clouds), Bond albedo,
    and the greenhouse effect. Our results showed that changes in albedo due to variations in land-ocean ratios only led to
    a ± 2°C change from the current mean global temperature of 15°C. An Earth-like planet, with a similar stellar flux and
    atmospheric composition as Earth, should have a normalized greenhouse of 0.3 to 0.5 to support temperate conditions. We
    have also found evidence of the dependency of orbital dynamics in the evolution of surface temperatures. We are currently
    modeling the surface temperatures as a function of latitude, obliquity, and orbital dynamics by coupling known equations
    with the theoretical framework of planets' temperatures in elliptical orbits. We are also exploring fittings to latitudinal
    surface temperatures of Earth, Mars, and the Moon. We will apply the model to study the thermal habitability of TRAPPIST-1
    planets.
