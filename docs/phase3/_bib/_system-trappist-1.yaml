- &id027
  arxiv_id: '2409.19333'
  ads_bibcode: 2025ApJ...979L...5R
  title: 'Promise and Peril: Stellar Contamination and Strict Limits on the Atmosphere Composition of TRAPPIST-1 c from JWST
    NIRISS Transmission Spectra'
  authors:
  - Radica, Michael
  - Piaulet-Ghorayeb, Caroline
  - Taylor, Jake
  - Coulombe, Louis-Philippe
  - Benneke, Björn
  - Albert, Loic
  - Artigau, Étienne
  - Cowan, Nicolas B.
  - Doyon, René
  - Lafrenière, David
  - L'Heureux, Alexandrine
  - Lim, Olivia
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.3847/2041-8213/ada381
  abstract: Attempts to probe the atmospheres of rocky planets around M dwarfs present both promise and peril. While their
    favorable planet-to-star radius ratios enable searches for even thin secondary atmospheres, their high activity levels
    and high-energy outputs threaten atmosphere survival. Here we present the 0.6─2.85 μm transmission spectrum of the 1.1
    R<SUB>⊕</SUB>, ∼ 340 K rocky planet TRAPPIST-1 c obtained over two JWST NIRISS/SOSS transit observations. Each of the
    two spectra displays 100─500 ppm signatures of stellar contamination. Despite being separated by 367 days, the retrieved
    spot and facula properties are consistent between the two visits, resulting in nearly identical transmission spectra.
    Jointly retrieving for stellar contamination and a planetary atmosphere reveals that our spectrum can rule out hydrogen-dominated,
    ≲300× solar metallicity atmospheres with effective surface pressures down to 10 mbar at the 3σ level. For high mean molecular
    weight atmospheres, where O<SUB>2</SUB> or N<SUB>2</SUB> is the background gas, our spectrum disfavors partial pressures
    of more than ∼10 mbar for H<SUB>2</SUB>O, CO, NH<SUB>3</SUB>, and CH<SUB>4</SUB> at the 2σ level. Similarly, under the
    assumption of a 100% H<SUB>2</SUB>O, NH<SUB>3</SUB>, CO, or CH<SUB>4</SUB> atmosphere, our spectrum disfavors thick, &gt;1-bar
    atmospheres at the 2σ level. These nondetections of spectral features are in line with predictions that even heavier,
    CO<SUB>2</SUB>-rich atmospheres would be efficiently lost on TRAPPIST-1 c given the cumulative high-energy irradiation
    experienced by the planet. Our results further stress the importance of robustly accounting for stellar contamination
    when analyzing JWST observations of exo-Earths around M dwarfs, as well as the need for high-fidelity stellar models to
    search for the potential signals of thin secondary atmospheres.
