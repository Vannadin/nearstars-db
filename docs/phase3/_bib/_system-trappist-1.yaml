- arxiv_id: null
  ads_bibcode: 2025AAS...24544104K
  title: The Prevalence of Higher Order Resonances in Exoplanetary Systems
  authors:
  - Keller, Finnegan
  - Dai, Fei
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: There is mounting evidence that the majority of Kepler-like planets formed initially in chains of mean motion
    resonance (MMR) before dynamically disrupting on timescales of hundreds of millions of years. Traditional disk migration
    simulations have focused exclusively on the formation of first-order mean motion resonances. Higher-order resonances are
    thought to be much weaker and thus unable to lock a pair of migrating planets together. However, there is now a growing
    sample of observed second or higher-order resonances (e.g. TOI-1136, TOI-178, TRAPPIST-1). We carried out an ambitious
    set of 25000 N-body disk migration simulations with REBOUNDx spanning a wide range of disk properties and initial planetary
    architectures. We found that second-order MMR can account for ~10% of all initial resonant pairs of planets, while third-order
    resonance accounts for ~1%. The distribution of different first and second order MMRs in our simulations agrees with observed
    MMRs. Planet pairs in higher order MMRs require smaller mass ratios and migrate more slowly than those in first order
    MMRs, in line with previous analytical results. These higher-order resonances naturally serve as the weakest link of their
    resonant chain and contribute directly to the disruption of resonant chains in mature (~5 billion year old) planetary
    systems.
