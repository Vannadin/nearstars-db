- &id030
  arxiv_id: '2404.01423'
  ads_bibcode: 2024PSJ.....5..148G
  title: Retrieved Atmospheres and Inferred Surface Properties for Terrestrial Exoplanets Using Transmission and Reflected-light
    Spectroscopy
  authors:
  - Gilbert-Janizek, Samantha
  - Meadows, Victoria S.
  - Lustig-Yaeger, Jacob
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.3847/PSJ/ad381e
  abstract: Future astrophysics missions will seek extraterrestrial life via transmission and direct-imaging observations.
    To assess habitability and biosignatures, we need robust retrieval tools to analyze observed spectra, and infer surface
    and atmospheric properties with their uncertainties. We use a novel retrieval tool to assess accuracy in characterizing
    near-surface habitability and biosignatures via simulated transmission and direct-imaging spectra, based on the Origins
    Space Telescope (Origins) and LUVOIR mission concepts. We assess our ability to discriminate between an Earth-like and
    a false-positive O<SUB>3</SUB> TRAPPIST-1 e with transmission spectroscopy. In reflected light, we assess the robustness
    of retrieval results to unmodeled cloud extinction. We find that assessing habitability using transmission spectra may
    be challenging due to relative insensitivity to surface temperature and near-surface H<SUB>2</SUB>O abundances. Nonetheless,
    our order-of-magnitude H<SUB>2</SUB>O constraints can discriminate extremely desiccated worlds. Direct imaging is insensitive
    to surface temperature and subject to the radius/albedo degeneracy, but this method proves highly sensitive to surface
    water abundance, achieving retrieval precision within 0.1% even with partial clouds. Concerning biosignatures, Origins-like
    transmission observations (t = 40 hr) may detect the CO<SUB>2</SUB>/CH<SUB>4</SUB> pair on M-dwarf planets and differentiate
    between biological and false-positive O<SUB>3</SUB> using H<SUB>2</SUB>O and abundant CO. In contrast, direct-imaging
    observations with LUVOIR-A (t = 10 hr) are better suited to constraining O<SUB>2</SUB> and O<SUB>3</SUB>, and may be sensitive
    to wavelength-dependent water cloud features, but will struggle to detect modern-Earth-like abundances of methane. For
    direct imaging, we weakly detect a stratospheric ozone bulge by fitting the near-UV wings of the Hartley band.
