  arxiv_id: '2605.04423'
  ads_bibcode: 2026arXiv260504423S
  title: 'Modeling Volcanic Plume Heights Across Exoplanet Atmospheres: Insights from TRAPPIST-1'
  authors:
  - Saxena, Prabal
  - Fauchez, Thomas
  year: '2026'
  pubdate: '2026-05-00'
  doi: 10.48550/arXiv.2605.04423
  abstract: Explosive volcanic eruptions play a fundamental role in the evolution and observability of rocky exoplanets, serving
    as a key mechanism for injecting volatiles into planetary atmospheres and potentially modifying their climate and composition.
    This process may be particularly important for close-in exoplanets where tidal forcing can drive substantial internal
    heating, analogous to (but often exceeding) Io's volcanism. In this work, we adapt and extend a classic 1D volcanic plume
    model originally developed in IDL by Glaze and Baloga for Venus and Mars applications, and port it into a flexible, open
    Python framework suitable for exoplanet studies. The model explicitly couples vent thermodynamics, buoyant entrainment,
    and vertically varying static stability to predict plume rise, neutral-buoyancy height, and overshoot for a wide range
    of planetary and atmospheric conditions. We first benchmark the Python implementation against the original IDL code and
    analytic scaling laws to ensure adequate momentum budgets and strict mass conservation. We then apply the model to a suite
    of exoplanet-relevant background states, including CO2-rich atmospheres under strong irradiation and diverse surface conditions.
    A systematic sensitivity analysis explores how plume height depends on surface gravity, bulk atmospheric composition (and
    mean molecular weight), background temperature and stratification, vent overpressure, and volatile loading. We identify
    regions of parameter space where plumes routinely penetrate to low-pressure levels, maximizing their potential detectability
    in transmission or emission. These results provide a physically grounded framework for predicting whether and how volcanic
    emissions might be detected on rocky exoplanets, including-but not limited to-those experiencing strong tidal heating.
