  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: The discovery of seven ~Earth-mass planets, three of which are potentially habitable, orbiting the ultra-cool
    Dwarf star TRAPPIST-1 captivated the public and sparked a proliferation of investigations into the system's origins and
    potential qualities. Among other properties, the resonant architecture of the planets has been interpreted to imply that
    inward orbital migration played a dominant role in the system's early formation. If correct, this hypothesis could imply
    that all of the seven worlds formed well beyond the system's snowline, and might harbor enhanced inventories of volatile
    elements essential for the emergence of life. However, multiple factors also contradict this interpretation. In particular,
    the apparent rocky inferred compositions of the planets and their non-hierarchical mass distribution might evidence them
    having formed much closer to their current orbital locations. In this paper, we investigate the latter possibility with
    a new suite of 631 N-body accretion simulations that model the effects of collisional fragmentation. In addition to producing
    multiple TRAPPIST-like mass and orbital configurations, we experiment with a number of different models for tracking the
    evolution of the planets' volatile contents and bulk iron-to-silicate ratios to investigate whether the observed radial
    trend of decreasing uncompressed density with increasing semi-major axis in the real system is more likely indicative
    of an underlying trend of planetary iron core or water mass fraction. We conclude that the a trend in bulk iron contents
    is more likely. Given the degree of radial mixing that occurs in our simulations, in most cases we find that all seven
    planets finish with similar volatile contents. Another confounding quality of the TRAPPIST-1 system is the fact that the
    innermost planets are not in first-order resonances with one-another. By applying a tidal migration model to our most
    promising accretion model results, we demonstrate cases where higher-order resonances are populated.
