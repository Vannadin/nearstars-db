  abstract: The planetary infrared excess (PIE) technique has the potential to efficiently detect and characterize the thermal
    spectra of both transiting and non-transiting exoplanets. However, the technique has not been evaluated on multiplanet
    systems. We use the TRAPPIST-1 system as our test bed to evaluate PIE's ability to resolve multiple planets. We follow
    the unfolding discoveries in the TRAPPIST-1 system and examine the results from the PIE technique at every stage. We test
    the information gained from observations with JWST and next-generation infrared observatories like the proposed MIRECLE
    mission concept. We present how insights from PIE analyses would have been able to further constrain orbital periods and
    equilibrium temperatures. We discuss the potential of the PIE technique to discover non-transiting exoplanets orbiting
