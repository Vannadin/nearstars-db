- &id022
  arxiv_id: '2504.16662'
  ads_bibcode: 2025A&A...701A.264W
  title: Magnetohydrodynamic simulations preliminarily predict the habitability and radio emission of TRAPPIST-1e
  authors:
  - Wang, BoRui
  - Ye, ShengYi
  - Varela, Jacobo
  - Luo, XinYi
  year: '2025'
  pubdate: '2025-09-00'
  doi: 10.1051/0004-6361/202555471
  abstract: Context. TRAPPIST-1e, an Earth-sized exoplanet in the habitable zone of the nearby M dwarf TRAPPIST-1, may experience
    magnetospheric responses that vary with stellar space weather, which could potentially influence both its habitability
    and radio emissions. Aims. Our objective is to investigate how different Earth-like magnetospheric configurations of TRAPPIST-1e
    ─ specifically variations in dipolar magnetic field strength and axial tilt ─ respond to diverse stellar space weather
    conditions, including events analogous to coronal mass ejections (CMEs), and to assess their implications for potential
    habitability and expected radio emissions. Methods. We conducted 3D magnetohydrodynamic simulations of the TRAPPIST-1e
    system using the PLUTO code in spherical coordinates. The planetary magnetic field was modelled as dipolar, with equatorial
    strengths from Earth-like to several times stronger. The dipole axis spans a representative range of axial tilts. We investigate
    four stellar wind environments, from sub-Alfvénic flow to CME-like disturbances. Planetary shielding was quantified based
    on the magnetopause standoff distance, and radio powers were estimated via empirical scaling laws. Results. Our simulations
    show that both shielding and radio power depend strongly on the magnetic configuration. Stronger fields increase protection,
    while larger tilts reduce it. Radio power increases with both field strength and tilt across all wind regimes. An Earth-like
    magnetic field can provide effective shielding even under intense CMEs, whereas high tilts require stronger fields. Predicted
    radio powers reach ~10<SUP>20</SUP> erg s<SUP>−1</SUP> during CMEs, making bursts from close-in, magnetised planets more
    detectable. However, for TRAPPIST-1e, the maximum cyclotron frequency lies below the Earth's ionospheric cutoff (~10 MHz),
    making ground-based detection currently infeasible.
