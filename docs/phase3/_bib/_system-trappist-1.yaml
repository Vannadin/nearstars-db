  ads_bibcode: 2024AGUFMP11B.2977A
  title: 'Habitability of TRAPPIST-1 exoplanetary system: Ion Escape from Outer Rocky Exoplanets'
  authors:
  - Airapetian, Vladimir
  - Lin, Mei-Yun
  - Bell, Jared
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: Recent observations suggest that most of rocky exoplanets around active G-M planet hosts should be exposed to
    high ionizing radiation fluxes from stellar coronae, flares, magnetized winds and coronal mass ejections. This raises
    the question of the rate of atmospheric erosion of rocky exoplanets around cool magnetically active stars driven by the
    energy deposited via X-ray and Extreme UV driven (XUV) photoionization. The atmospheric escape is one of the central issues
    to exoplanetary habitability, because the presence of a thick high molecular weight secondary atmosphere over sufficiently
    long timescales is a crucial factor associated with planetary surface pressure due to the exposure to stellar UV and particle
    irradiation. Here, we extend our previous results of Airapetian et al. (2017) by applying the Exo-Global Ionosphere-Thermosphere
    (exo-GITM) model of thermodynamics and atmospheric dynamics of an Earth-like exoplanet and Polar Wind Outflow Model (PWOM)
    to study the rates of ion escape from TRAPPIST-1f, g and h outer rocky exoplanets. Here, we use the plasma background
    of the exobase of three outer planets from exo-GITM as input for PWOM to calculate the rates of H<SUP>+</SUP>, O<SUP>+
    </SUP>and N<SUP>+ </SUP>ion escape and evaluate the contribution of these processes in the total loss of volatiles from
    outer TRAPPIST-1 planets over the last 7 billion years.
