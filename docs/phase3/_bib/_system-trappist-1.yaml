  ads_bibcode: 2024jwst.prop.4711H
  title: Efficient and Detailed Characterization of a Temperate Water World Candidate
  authors:
  - Hu, Renyu
  - Bello-Arufe, Aaron
  - Bouchy, Francois
  - Damiano, Mario
  - Grieves, Nolan
  - Lendl, Monika
  - Scheucher, Markus
  - Yang, Jeehyun
  year: '2024'
  pubdate: '2024-02-00'
  doi: null
  abstract: Temperate water worlds, if they exist, provide a new avenue to expand and accelerate the search for potentially
    habitable exoplanets in the next decade. This is because many more temperate planets in the 1.5 ─ 2.2 Earth's radius range
    are suitable for atmospheric studies than the sole TRAPPIST-1 system that hosts temperate and small rocky planets. Among
    the sub-Neptunes, however, only temperate water worlds, rather than mini Neptunes, can host liquid-water oceans. It is
    thus crucial to determine whether temperate sub-Neptunes are water worlds. We identify TOI-4336.01, a newly discovered
    2.1 Earth's radius temperate planet, as a likely water world and the most favorable target for transmission spectroscopy
    among the planets with similar sizes, equilibrium temperatures &lt;320 K, and measured masses. The planet can have a liquid-water
    ocean with reasonable planetary albedo. With only one transit using NIRISS/SOSS and another one using NIRSpec/G395H, the
    resulting spectra will be sensitive and precise enough to measure the abundances of H2O, CH4, NH3, CO2, and CO, and constrain
    the cloud pressure. The combination of these gases will determine whether the planet is a water world. This observation
    will also determine whether the planet has a liquid-water ocean if it is a temperate water world. This highly efficient
    and yet detailed characterization of the temperate sub-Neptune will constrain the suggested population of water worlds
    around M dwarfs and have the potential to expand the search space of habitable worlds from Earth-sized planets to larger
    planets.
