  title: 'Exo-Earths from the Inside Out: Characterizing Earth-like Exoplanets with Future Space Telescopes'
  authors:
  - Gilbert-Janizek, Samantha
  - Barnes, Rory
  - Lustig-Yaeger, Jacob
