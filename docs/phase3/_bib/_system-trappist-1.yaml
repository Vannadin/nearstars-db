  abstract: Lyα observations provide a powerful probe of stellar activity and atmospheric escape in exoplanetary systems.
    We present here an analysis of 109 Hubble Space Telescope (HST)/Space Telescope Imaging Spectrograph (STIS) orbits monitoring
    the TRAPPIST-1 system between 2017 and 2022, covering three to five transits for each of its seven planets. We rule out
    transit depths ≳30%, prompting a revision of atmospheric escape rates, with upper limits <inline-formula> <mml:math><mml:mi>O</mml:mi><mml:mo>(</mml:mo><mml:mn>10</mml:mn><mml:mo>)</mml:mo><mml:mo>×</mml:mo></mml:math>
    </inline-formula> larger than previously reported (e.g., <inline-formula> <mml:math><mml:mi>O</mml:mi><mml:mo>(</mml:mo><mml:mn>70</mml:mn><mml:mo>)</mml:mo></mml:math>
    </inline-formula> Earth-ocean-equivalent hydrogen content per Gyr for planet b, consistent with claims that it is airless).
    The transit depth upper limits are ∼3 times larger than expected from the photon noise owing to a large baseline scatter,
    which we link to TRAPPIST-1's intrinsic Lyα variability from frequent "microflares." While JWST's near-infrared observations
    have shown that ∼10<SUP>30 </SUP>erg flares occur every ∼6 hr, we identify ∼10<SUP>29 </SUP>erg flares on subhour timescales
    in both HST/STIS and Very Large Telescope <inline-formula> <mml:math><mml:msup><mml:mrow><mml:mi>g</mml:mi></mml:mrow><mml:mrow><mml:mo>'</mml:mo></mml:mrow></mml:msup></mml:math>
    </inline-formula>observations. The far-UV and optical amplitudes (∼400% vs. ∼3%, respectively) for flares with similar
    waiting times indicate flare temperatures of 9700<inline-formula> <mml:math><mml:msubsup><mml:mrow></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>2400</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>1500</mml:mn></mml:mrow></mml:msubsup></mml:math>
    </inline-formula> K over 0.017<inline-formula> <mml:math><mml:msubsup><mml:mrow></mml:mrow><mml:mrow><mml:mo>−</mml:mo><mml:mn>0.007</mml:mn></mml:mrow><mml:mrow><mml:mo>+</mml:mo><mml:mn>0.03</mml:mn></mml:mrow></mml:msubsup></mml:math>
