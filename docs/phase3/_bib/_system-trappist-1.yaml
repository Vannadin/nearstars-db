  doi: 10.3847/1538-3881/ae28cb
  abstract: One of the forefront goals in the field of exoplanets is the detection of an atmosphere on a temperate terrestrial
    exoplanet, and among the best suited systems to do so is TRAPPIST-1. However, JWST transit observations of the TRAPPIST-1
    planets show significant contamination from stellar surface features that we are unable to confidently model. Here, we
    present the motivation and first observations of our JWST multicycle program of TRAPPIST-1 e, which utilize close transits
    of the airless TRAPPIST-1 b to model-independently correct for stellar contamination, with the goal of determining whether
    TRAPPIST-1 e has an Earth-like mean molecular weight atmosphere containing CO<SUB>2</SUB>. We present our simulations,
    which show that with 15 close transit observations, we will be able to detect this atmosphere on TRAPPIST-1 e at <inline-formula>
    <mml:math><mml:mi>∆</mml:mi><mml:mi>ln</mml:mi><mml:mspace></mml:mspace><mml:mi>Z</mml:mi><mml:mo>=</mml:mo><mml:mn>5</mml:mn></mml:math>
    </inline-formula> or greater confidence assuming we are able to correct for stellar contamination using the close transit
    observations. We also show the first three observations of our program. We find that our ability to correct for stellar
    contamination can be inhibited when strong stellar flares are present, as flares can break the assumption that the star
    does not change meaningfully between planetary transits. The cleanest observation demonstrates the removal of stellar
    contamination contribution through an increased preference for a flat line over the original TRAPPIST-1 e spectrum, but
    highlights how minor data analysis assumptions can propagate significantly when searching for small atmospheric signals.
    This is amplified when using the signals from multiple planets, which is important to consider as we continue our atmospheric
    search.
