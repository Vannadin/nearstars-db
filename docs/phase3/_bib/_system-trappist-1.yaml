  abstract: TRAPPIST-1 e is one of the very few rocky exoplanets that is both amenable to atmospheric characterization and
    resides in the habitable zone of its star—located at a distance from its star such that it might, with the right atmosphere,
    sustain liquid water on its surface. Here, we present a set of four JWST/NIRSpec PRISM transmission spectra of TRAPPIST-1
    e obtained in mid-to-late 2023. Our transmission spectra exhibit similar levels of stellar contamination as observed in
    prior works for other planets in the TRAPPIST-1 system but over a wider wavelength range, showcasing the challenge of
    characterizing the TRAPPIST-1 planets even at relatively long wavelengths (3─5 μm). While we show that current stellar
    modeling frameworks are unable to explain the stellar contamination features in our spectra, we demonstrate that we can
    marginalize over those features instead using Gaussian processes, which enables us to perform novel exoplanet atmospheric
    inferences with our transmission spectra. In particular, we are able to rule out cloudy, primary H<SUB>2</SUB>-dominated
    (≳80% by volume) atmospheres at better than a 3σ level. Constraints on possible secondary atmospheres on TRAPPIST-1 e
    are presented in a companion paper. Our work showcases how JWST is breaking ground in the precision needed to constrain
    the atmospheric composition of habitable-zone rocky exoplanets.
