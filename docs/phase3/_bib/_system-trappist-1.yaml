  abstract: The seven Venus-sized planets orbiting the ultracool dwarf TRAPPIST-1 are among the most remarkable exoplanetary
    discoveries to date, and are the target of intensive JWST observations to characterize their atmospheres. However, correctly
    interpreting the atmospheric spectra of the planets requires accurate measurements of the ultraviolet flux they receive
    from their host star. Here we present multi-band, time series HST ultraviolet photometry of the TRAPPIST-1 star obtained
    in three epochs during the summer 2023 JWST observing window. We make the first unambiguous detection of near-ultraviolet
    flux outside of the bright Mg II lines, and present evidence for ultraviolet variation on days-long timescales. We use
