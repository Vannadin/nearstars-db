  doi: null
  abstract: Partial condensation of dust in the cooling solar nebula is one of the major contributors to the chemical composition
    of the chondrites and planetesimals that would ultimately form the solar system's rocky planets. We use a leading partial
    condensation model, validated against solar system material, to predict the chemical composition of dust that will form
    around stars with different elemental abundances than the Sun. The carbon-to-oxygen ratio (C/O) is often cited as one
    of the most important elemental ratios in determining the chemistry of rocky planets. We show that the silicate chemistry
    we observe in the solar system's bodies is the result of the solar nebula's initial C/O ratio falling below a threshold
    value. We present an improved version of our condensation model that includes isotopic fractionation of elements, where
    certain isotopes preferentially condense over others. Our model's reproduction of the rocky solar system bodies - first
    in elements, now in their isotopes - will enable more informed models for both solar and extrasolar material. Additionally,
    I present my work on the sporadic rotation possible in systems like TRAPPIST-1 and K2-3 that arise from the interaction
    between tidal locking and orbital perturbations due to mean motion resonance. I show the impact of these complex spin
    states on planet climate by modifying the 1-D energy balance model, HEXTOR.
