  ads_bibcode: 2024absc.conf99360G
  title: Using JWST Observations and Atmospheric Escape Modeling to place Constraints on Water Evolution and Habitability
    in the TRAPPIST-1 System
  authors:
  - Gialluca, Megan
  - Meadows, Victoria Suzanne
  - Thomas, Trent
  - Barnes, Rory
  - Garcia, Rodolfo
  - Birky, Jessica
  - Agol, Eric
  year: '2024'
  pubdate: '2024-05-00'
  doi: null
  abstract: JWST observations of the TRAPPIST-1 system allow us one of the first opportunities to study habitability on Earth-sized
    terrestrial exoplanets. However, stars like TRAPPIST-1 undergo an intense period of increased radiation directly after
    the system is formed; this can cause oceans to evaporate and be destroyed, even on planets that will be in the habitable
    zone latter in their lifetimes. In addition to permanent water loss, the destruction of water molecules (H2O) can leave
    behind stark amounts of oxygen. In this work, we model the maximum amount of water loss and oxygen build-up for the TRAPPIST-1
    planets in a statistically robust way, finding that the habitable zone planets are unlikely to ever lose &gt;10 Earth
    oceans worth of water. Using constraints from recent JWST observations, and modeling oxygen removal processes similar
    to those for Venus and Earth, we predict that if the planet TRAPPIST-1b is confirmed airless, and if any oxygen is detected
    on TRAPPIST-1 c, then the initial water content of planets in the system can be constrained to around 10 Earth oceans.
    Consequently, the habitable zone planets may still possess water (&gt;2 Earth oceans) at present-day, a scenario that
    remains possible even if TRAPPIST-1c is also found airless.
