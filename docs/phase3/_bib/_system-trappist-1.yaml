  title: Mining JWST data for hidden asteroid gems
  authors:
  - Burdanov, Artem
  - de Wit, Julien
  - Broz, Miroslav
  - Cambioni, Saverio
  - Hasler, Samantha Nicole
  - Hoffmann, Tobias
  - Jehin, Emmanuel
