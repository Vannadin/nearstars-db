  abstract: JWST observations demonstrate that rocky planets around M dwarfs, such as those of TRAPPIST-1 system, have little
    or no atmosphere. The reason for this could be that they either have experienced significant atmospheric loss or that
    their initial volatile inventory was smaller. We propose to break this degeneracy by studying the volatile budget in the
    birthplaces of TRAPPIST-1-like systems. While many GO and GTO programs target the ice budget of solar-type protostars,
    the inventories of icy volatiles around very low luminosity protostellar systems, potential TRAPPIST-1 precursors, are
    vastly unexplored. Through the study of ices in 9 very low-luminosity protostellar systems across different star forming
