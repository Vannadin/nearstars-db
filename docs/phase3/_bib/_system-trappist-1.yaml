  abstract: The lowest-mass stars as exoplanet hosts, like TRAPPIST-1, present unique opportunities for studying temperate
    terrestrial planets, with potentially habitable atmospheres. Planets around the smallest stars are currently the prime
    targets for transmission spectroscopy observations with JWST, and the current best targets for detecting atmospheres on
    Earth-sized exoplanets. Understanding these atmospheric observations and the potential prospect of such exoplanets to
    develop and sustain life critically depends on the high-energy stellar radiation environment from X-ray to ultraviolet
    wavelengths. These emissions drive atmospheric mass-loss, and have a strong influence on planetary photochemistry, including
    controlling the accumulation of trace gases invoked as potential probes of surface processes like volcanism and biology.
    However, little is known about the X-ray to UV radiation field of the population of stars at the end of the main sequence,
    and how it may evolve over time. We present a new analysis of the high-energy emissions of a small sample of M7-M9 dwarfs,
    with varying levels of magnetic activity, including new Lyman-α measurements. Our data provide the activity context for
    current and as yet to be detected exoplanets orbiting the lowest-mass stars. We find high-energy emissions in some dwarfs
    to be exceptionally weak despite their known H-α activity. 1D photochemical models of example exoplanets orbiting these
    hosts demonstrate that the planetary atmospheres could be very thick, and present enhanced potential for both biosignature
    gas detection as well as biosignature gas abiotic false positives.
