  doi: null
  abstract: TRAPPIST-1 h is of particular interest as it may be an ocean world with an icy surface based on its observed mass,
    radius, and instellation. Previous research has created interior models that mathematically derive equations of state
    (EOS) for ice phases II through VI using ad-hoc parametrizations from various sources, which may not be applicable over
    such a large span of conditions. Notably these previous models predicted no liquid oceans nor ice VII within the hydrosphere.
    The surface pressure, mass of water, core radius, and metal-silicate core density of planet h also remain unknown, leaving
    open the question of how the hydrosphere changes when altering these parameters to reflect past and present ocean worlds
    (i.e. Earth, Mars, Titan). We present new predictions on the structure of TRAPPIST-1 h's hydrosphere using, for the first
    time, accurate and self-consistent temperature- and pressure-dependent thermodynamic properties of water and ice polymorphs
    from the SeaFreeze framework to model the hydrosphere. Specifically, we compute different hydrosphere structures by iterating
    over surface temperatures from the latest transit timing variations analysis on observational Spitzer data of planet h,
    as well as a range of iron-silicate core densities (5200 - 5600 kg/m3), surface pressures (0-0.2 MPa), masses of water
    (1e+21 - 3e+23 kg), and core radii (2500-4815 km). Results include a series of plausible hydrosphere structures that are
    consistent with the latest total mass and radius observations. These outcomes can help interpret future spectroscopic
    and photometric observations of planet h.
