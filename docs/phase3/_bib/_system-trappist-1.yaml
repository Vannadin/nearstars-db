  year: '2024'
  pubdate: '2024-05-00'
  doi: null
  abstract: The radio emissions from red dwarf stars, such as Proxima Centauri and TRAPPIST-1, are particularly interesting
    due to their potential to host habitable planets. These stars produce intense stellar flares and coronal mass ejections
    with high UV and X-ray fluxes visible in the radio spectrum. In this study, we investigated the activity of the red dwarf
    star Luyten's Star and its implications for the potential stability of exoplanetary biospheres. By analyzing data obtained
    from the 305m telescope and the 12m telescope at the Arecibo Observatory, we show that Luyten's Star exhibits low activity
    levels, indicating a more favorable environment for habitable planets.
