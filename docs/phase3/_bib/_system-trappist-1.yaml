  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: Recent JWST NIRSpec PRISM observations of TRAPPIST-1 h provide new insights into the atmospheric and stellar characteristics
    of this intriguing M dwarf system. As part of a larger program aimed at empirically testing the validity of the "cosmic
    shoreline" in M dwarf planetary systems, we conducted two visits of TRAPPIST-1 h. During the second visit, a stellar flare
    occurred just prior to the planet's transit, and the innermost planet, TRAPPIST-1 b, also transited during the middle
    of the planet h's transit. We will present our in-depth analysis of the atmospheres of TRAPPIST-1 h and b, as well as
    the stellar properties of TRAPPIST-1 itself. Our study includes characterizing the stellar flare and its potential impact
    on atmospheric retrievals, modeling stellar limb darkening, and constraining surface heterogeneity at the time of observation.
    These results offer a detailed look into the complex interplay between stellar activity and planetary atmospheres, with
    implications for understanding the habitability and atmospheric retention of planets in M dwarf systems.
