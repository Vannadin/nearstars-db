  abstract: The newly refurbished Allen Telescope Array, designed and built for SETI applications, is capable of observing
    in a mode that utilizes beam-forming to record high frequency resolution data, spatially separated within the primary
    field of view in an effort to discriminate between anthropogenic radio frequency interference (RFI) and radio signals
    localized to a distant target source. A new pipeline, NbeamAnalysis, was created and implemented to handle RFI filtering
    of narrowband signals identified by turboSETI's deDoppler algorithm in these simultaneous multi-beam observations. Over
    8 separate days in late October and early November of 2022, this mode was used on the ATA to observe the TRAPPIST-1 system
    for 28 total hours, from 0.9 to 9.3 GHz, constituting the longest single-target radio SETI search of TRAPPIST-1 to date.
