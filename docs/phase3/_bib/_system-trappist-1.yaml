- &id082
  arxiv_id: '2601.02548'
  ads_bibcode: 2026arXiv260102548S
  title: Dearth of Photosynthetically Active Radiation Suggests No Complex Life on Late M-Star Exoplanets
  authors:
  - Soliz, Joseph J.
  - Welsh, William F.
  year: '2026'
  pubdate: '2026-01-00'
  doi: 10.48550/arXiv.2601.02548
  abstract: 'The rise of oxygen in the Earth''s atmosphere during the Great Oxidation Event (GOE) occurred about 2.3 billion
    years ago. There is considerably greater uncertainty for the origin of oxygenic photosynthesis, but it likely occurred
    significantly earlier, perhaps by 700 million years. Assuming this time lag is proportional to the rate of oxygen generation,
    we can estimate how long it would take for a GOE-like event to occur on a hypothetical Earth-analog planet orbiting the
    star TRAPPIST-1 (a late M star with Teff 2560 K). Although in the habitable zone, an Earth-analog planet located in TRAPPIST-1e''s
    orbit would receive only 0.9% of the Photosynthetically Active Radiation (PAR) that the Earth gets from the Sun. This
    is because most of the star''s light is emitted at wavelengths longer than the 400-700 nm PAR range. Thus it would take
    63 Gyrs for a GOE to occur. But the linear assumption is problematic; as light levels increase, photosynthesis saturates
    then declines, an effect known as photoinhibition. Photoinhibition varies from species to species and depends on a host
    of environmental factors. There is also sensitivity to the upper wavelength limit of the PAR: extending just 50 nm increases
    the number of photons by a factor of 2.5. Including these and other factors greatly reduces the timescale to roughly 1-5
    Gyrs for a GOE. However, non-oxygenic photosynthetic bacteria can thrive in low-light environments and can use near-IR
    light out to 1100 nm, providing 22 times as many photons. With this huge light advantage, and because they evolved earlier,
    anoxygenic photosynthesizers would likely dominate the ecosystem. On a late M-star Earth-analog planet, oxygen may never
    reach significant levels in the atmosphere and a GOE may never occur, let alone a Cambrian Explosion. Thus complex animal
    life is unlikely.'
