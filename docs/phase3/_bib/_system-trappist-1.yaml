- arxiv_id: null
  ads_bibcode: 2024AGUFM.P01...12K
  title: Exospheric Atmosphere Simulation for Ultraviolet Transit Observation of Earth-like Exoplanets in the Runaway Greenhouse
    State
  authors:
  - Kato, Ryuga
  - Nakayama, Akifumi
  - Kameda, Shingo
  year: '2024'
  pubdate: '2024-12-00'
  doi: null
  abstract: Many exoplanets have been discovered, including terrestrial planets around the habitable zone (HZ). The James
    Webb Space Telescope (JWST) and future missions will advance our observational understanding of these planets. However,
    as demonstrated by JWST, terrestrial atmospheres around the HZ are difficult to detect and constrain. <P />Terrestrial
    planets around low-mass stars are promising observational targets. Low-mass stars generally have higher activity, emitting
    strong X-ray and extreme ultraviolet (XUV) radiation. As a result, surrounding planets receive much more radiation than
    present-day Earth, leading to hydrodynamic escape. Previous studies showed that highly irradiated gas giants with hydrogen
    atmospheres show a large transit depth at the hydrogen Ly-α wing due to strong hydrodynamic escape and acceleration by
    radiation pressure. On the other hand, no atmosphere has been found at FUV wavelengths in terrestrial planets such as
    TRAPPIST-1 system. TRAPPIST-1d is located closer to the star than the inner edge of the HZ. According to climate simulations,
    it would be in a runaway greenhouse state with a water vapor atmosphere, leading to a hydrogen- and oxygen- dominated
    upper atmosphere cause by photodissociation. Thus, TRAPPIST-1d would exhibit a large transit depth when the water-vapor
    atmospheres are undergoing strong atmospheric escape. <P />In this study, we develop an exospheric model for the ultraviolet
    transit spectroscopy. To estimate the number density and velocity distribution of hydrogen atoms, we calculate the motion
    and ionization of hydrogen atoms, considering the radiation pressure from the Ly-α line, the stellar and planetary gravity,
    the inertial forces due to orbital motion. In this presentation, we will show the results of the tail structure of the
    hydrogen exospheric cloud and the transit light curve of the Ly-α line of the TRAPPIST-1d.
