- &id084
  arxiv_id: '2507.09048'
  ads_bibcode: 2025A&C....5300982F
  title: From global climate models (GCMs) to exoplanet spectra with the Global Emission Spectra (GlobES)
  authors:
  - Fauchez, Thomas J.
  - Villanueva, Geronimo L.
  - Kofman, Vincent
  - Suissa, Gabriella
  - Kopparapu, Ravi K.
  year: '2025'
  pubdate: '2025-10-00'
  doi: 10.1016/j.ascom.2025.100982
  abstract: In the quest to understand the climates and atmospheres of exoplanets, 3D global climate models (GCMs) have become
    indispensable. The ability of GCMs to predict atmospheric conditions complements exoplanet observations, creating a feedback
    loop that enhances our understanding of exoplanetary atmospheres and their environments. This paper discusses the capabilities
    of the Global Exoplanet Spectra (GlobES) module of the Planetary Spectrum Generator (PSG), which incorporates 3D atmospheric
    and surface information into spectral simulations, offering a free, accessible tool for the scientific community to study
    realistic planetary atmospheres. Through detailed case studies, including simulations of TRAPPIST-1 b , TRAPPIST-1 e,
    and Earth around Sun, this paper demonstrates the use of GlobES and its effectiveness in simulating transit, emission
    and reflected spectra, thus supporting the ongoing development and refinement of observational strategies using the James
    Webb Space Telescope (JWST) and future mission concept studies (e.g., Habitable Worlds Observatory [HWO]) in exoplanet
    research.
