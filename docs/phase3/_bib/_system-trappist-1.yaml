- arxiv_id: null
  ads_bibcode: 2025AAS...24517202C
  title: 'How to delay H2O loss in the habitable zone of TRAPPIST: Add CO2!'
  authors:
  - Carone, Ludmila
  - Barnes, Rory
  - Noack, Lena
  - Thamm, Alexander
  - Bitsch, Betram
  - Barth, Patrick
  - Garcia, Rodolfo
  - Helling, Christiane
  - Chubb, Katy
  - Balduin, Alexander
  year: '2025'
  pubdate: '2025-01-00'
  doi: null
  abstract: All rocky planets start their evolution embedded in a protoplanetaty disk. After disk dispersal, the primordial
    H2-He envelope dissipates and outgassing from the interior builds up a secondary atmosphere on a magma ocean world. If
    oxidized outgassing is assumed, then mostly H2O is outgassed that is subject to significant erosion if the rocky planet
    orbits an M dwarf star. Here, we show simulations of the magma ocean evolution on the potentially habitable exoplanets
    TRAPPIST-1 e,f and g for different mixtures of H2O and CO2, depending on formation scenarios with VPLANET/MagmOc2.0. We
    find that we can significantly delay desiccation on TRAPPIST-1 e for 1-10 TO initial water content (equivalent to the
    Earth's water budget) when H2O outgassing occurs in a CO2 dominated atmosphere because efficient water loss is suppressed.
    Feedback between H2O and CO2 outgassing also changes the volatile distribution compared to 100% H2O outgassing on all
    investigated planets. Abiotic O2 build-up and H2O partitioning in the mantle are increased by 10% to 50% with added CO2,
    leading to 3% to 6 % of the initial water to be retained in the solidified crust. Our compositional model adjusted for
    the measured metallicity of TRAPPIST-1 yields for the current composition of the dry inner planets (b,c,d) an iron fraction
    of 25 wt%. For TRAPPIST-e, this iron fraction would place the planet as an end member of evolution scenarios that were
    significantly impacted by additional CO2 in the system. Its current state would be compatible with either a desiccated
    evolution scenario and a CO2 atmosphere with surface pressures of hundreds of O2 or an Earth-like inventory of 1-10 TO
    water with habitable conditions if water condensation and an efficient carbonate-silicate-cycle occured at the end of
    the magma ocean stage.At the end of the MO stage, the mass and radius of T-1 e are consistent with current observations
    if we assume Earth-like abundances of refractory material and an outgassed CO2 atmosphere. In any case, atmosphere constraints
    on TRAPPIST-1e may yield the most insights about formation and evolution scenarios in the TRAPPIST-1 system.
