  year: '2026'
  pubdate: '2026-02-00'
  doi: null
  abstract: JWST observations suggest that the TRAPPIST-1 planets and many other terrestrial worlds orbiting field-age M stars
    may lack atmospheres, often attributed to intense stellar flaring. While high-energy stellar activity is known to drive
    some atmospheric loss, its precise role in the survival of rocky-planet atmospheres remains unclear, in part due to the
    lack of empirical flare frequency distributions (FFDs). Here we quantify how primordial atmospheres of terrestrial planets
    evolve under realistic flare conditions from early- and late-type M stars. We developed an age-dependent FFD model, based
    on TESS light curves and scaled to XUV (X-ray + extreme-UV) wavelengths, to track atmospheric loss over time. Our results
    show that extra XUV flux from flares accelerates atmospheric depletion for planets in the habitable zones of early and
    late-type M-stars, by about 2 Gyrs as compared to if only quiescent emission is considered. Rocky planets located at the
    outer edge of the habitable zone will only fully lose their atmospheres if stellar flares are present in addition to the
    quiescent emission. However, for close-in rocky planets orbiting these stars, the quiescent stellar emission alone can
    remove atmospheres within a few hundred Myr. These findings suggest that searches for planet atmospheres around M stars
    should prioritize (1) young systems where primordial atmospheres may still persist, and (2) planets at or beyond the habitable
    zone's outer edge.
