  ads_bibcode: 2026A&A...707A.101B
  title: 'Estimation of the tidal heating in the TRAPPIST-1 planets: Influence of the internal structure'
  authors:
  - Bolmont, Emeline
  - Sastre, Mariana
  - Revol, Alexandre
  - Kervazo, Mathilde
