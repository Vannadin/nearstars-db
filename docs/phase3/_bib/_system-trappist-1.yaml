  ads_bibcode: 2026arXiv260505468V
  title: A single power law for the TRAPPIST-1 flare distribution across four orders of magnitude in energy
  authors:
  - Vasilyev, Valeriy
  - Shapiro, Alexander I.
  - Kostogryz, Nadiia
  - Lin, Chia-Lung
  - Kopp, Greg
  - Rackham, Benjamin V.
  - Veronig, Astrid M.
  - Lim, Olivia
  - de Wit, Julien
  - Apai, Daniel
