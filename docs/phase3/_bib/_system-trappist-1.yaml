  abstract: Numerous previous studies have evaluated the climate state of temperate rocky exoplanets, but few have explored
    the implications of varying obliquity. Planets in multi-planet systems are expected to migrate as resonant chains, thus
    allowing them to undergo planet-planet interactions and possibly maintain a non-zero obliquity. The TRAPPIST-1 system
    is in such a near-resonant configuration, making it plausible that TRAPPIST-1e has a non-zero obliquity. In this work,
    we use ExoCAM to study the possible climates of TRAPPIST-1e at varying obliquities and atmospheric compositions. We vary
    obliquity from 0 to 90 degrees and the partial pressure of carbon dioxide from 0.0004 bars (modern Earth) to 1 bar. We
    find that models with a higher obliquity are hotter overall and have a smaller day-night temperature contrast than the
    lower obliquity models, which is consistent with previous studies. As the amount of carbon dioxide increases, the climate
    of TRAPPIST-1e becomes hotter, cloudier, and less variable. The effects due to varying the atmospheric composition are
    dominant on the overall climate state over the effects to to obliquity. Most significantly, the super-rotating high-altitude
    jet becomes sub-rotating between 45 and 67.5 degrees obliquity, and causes regions of high cloud cover and surface temperature
    to move west of the substellar point. From modeled thermal phase curves, we find that the impact of obliquity could potentially
    have observable consequences due to the impact of cloud coverage on the outgoing longwave radiation.
