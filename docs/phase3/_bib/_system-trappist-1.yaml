  ads_bibcode: 2025epsc.conf..769K
  title: 'DRAMATIC Planets: Simulation of water cycle on Mars with cloud microphysics, and extensions to the climate evolution
    of Venus and beyond'
  authors:
  - Kuroda, Takeshi
