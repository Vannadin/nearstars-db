  - Lincowski, Andrew
  - Lustig-Yaeger, Jacob
  year: '2024'
  pubdate: '2024-05-00'
  doi: null
  abstract: JWST observations of the TRAPPIST-1 M dwarf system provide the best near-term opportunity to search for signs
    of life on exoplanets. To explore what might be detectable, we modeled inhabited environments for habitable zone planets
    TRAPPIST-1 d and e, with gas fluxes produced by organisms likely present throughout Earth's history. Our models determined
    the buildup of biologically produced gases in relevant environments, and we then simulated spectra of the planets to assess
    how detectable these gases might be with JWST. For TRAPPIST-1 d, our early Earth environments were too hot, and signs
    of life could not be seen on modern Earth environments due to the formation of water clouds. For TRAPPIST-1 e, we found
    that signs of photosynthesis, such as abundant O<SUB>2</SUB>, and O<SUB>3</SUB> and methyl chloride, would be very difficult
    to detect, given JWST's wavelength range and sensitivity. JWST was not sensitive to gases produced by sulfur bacteria,
    but may detect the resultant organic haze. We confirmed that the most detectable sign of life was the combination of methane
    and carbon dioxide, which revealed an ecosystem producing methane. These gases were potentially detectable over Earth's
    history, even while a more dominant metabolism (e.g photosynthesis) remained undetectable.
