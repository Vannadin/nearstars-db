  ads_bibcode: 2025AAS...24631301S
  title: Atmospheric Biosignatures of an Archean-Analog TRAPPIST-1 e
  authors:
  - Sneed, Evan
  - Schwieterman, Edward
  - Lyons, Timothy
  year: '2025'
  pubdate: '2025-06-00'
  doi: null
  abstract: Methane is considered a key biosignature gas for terrestrial exoplanets, particularly when observed in redox disequilibrium
    with species such as carbon dioxide. On early Earth, biogenic methane likely accumulated under low-oxygen conditions,
    influencing both the climate and the spectral fingerprint of the Archean Earth. Similar environmental conditions may arise
    on habitable-zone exoplanets orbiting M-dwarves, but interpreting methane as a sign of life requires an understanding
    of how stellar properties shape planetary atmospheric composition and photochemical stability. <P />TRAPPIST-1, an ultracool
    M-dwarf hosting seven terrestrial planets, four of which lie within the habitable zone, is a high-priority target for
    biosignature detection with JWST. However, the star's ultraviolet (UV) spectrum, which governs key photolysis reactions,
    remains poorly constrained. Published spectral energy distributions for TRAPPIST-1 differ substantially, particularly
    in the far-UV (FUV) and near-UV (NUV) ranges that control the lifetimes of several important atmospheric gases. <P />We
    use the one-dimensional photochemical model Atmos to simulate Archean-like atmospheres on TRAPPIST-1 e under a suite of
    published stellar spectra. Our results show that, under certain spectral conditions, atmospheres can sustain elevated
    concentrations of methane and carbon dioxide, sometimes alongside oxygen and ozone, without requiring biological sources.
    These combinations are photochemically stable in low-UV environments and can mimic gas pairings traditionally associated
    with life. This work demonstrates that uncertainties in late M-dwarf UV spectra introduce significant degeneracies in
    the interpretation of potential biosignatures.
