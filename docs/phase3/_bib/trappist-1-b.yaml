  arxiv_id: '2105.09319'
  ads_bibcode: 2021MNRAS.505.3562L
  title: 'Differentiating modern and prebiotic Earth scenarios for TRAPPIST-1e: high-resolution transmission spectra and predictions
    for JWST'
  authors:
  - Lin, Zifan
  - MacDonald, Ryan J.
  - Kaltenegger, Lisa
  - Wilson, David J.
  year: '2021'
  pubdate: '2021-08-00'
  doi: 10.1093/mnras/stab1486
  abstract: The TRAPPIST-1 system is a priority target for terrestrial exoplanet characterization. TRAPPIST-1e, residing in
    the habitable zone, will be observed during the James Webb Space Telescope (JWST) GTO Program. Here, we assess the prospects
    of differentiating between prebiotic and modern Earth scenarios for TRAPPIST-1e via transmission spectroscopy. Using updated
    TRAPPIST-1 stellar models from the Mega-MUSCLES survey, we compute self-consistent model atmospheres for a 1 bar prebiotic
    Earth scenario and two modern Earth scenarios (1 and 0.5 bar eroded atmosphere). Our modern and prebiotic high-resolution
    transmission spectra ($0.4\!-\! 20\, \rm{\mu m}$ at R ~100 000) are made available online. We conduct a Bayesian atmospheric
    retrieval analysis to ascertain the molecular detectability, abundance measurements, and temperature constraints achievable
    for both scenarios with JWST. We demonstrate that JWST can differentiate between our prebiotic and modern Earth scenarios
    within 20 NIRSpec Prism transits via CH<SUB>4</SUB> abundance measurements. However, JWST will struggle to detect O<SUB>3</SUB>
    for our modern Earth scenario to $\gt 2\, \sigma$ confidence within the nominal mission lifetime (~ 80 transits over 5
    yr). The agnostic combination of N<SUB>2</SUB>O and/or O<SUB>3</SUB> offers better prospects, with a predicted detection
    significance of $2.7\, \sigma$ with 100 Prism transits. We show that combining MIRI LRS transits with Prism data provides
    little improvement to atmospheric constraints compared to observing additional Prism transits. Though biosignatures will
    be challenging to detect for TRAPPIST-1e with JWST, the abundances for several important molecules - CO<SUB>2</SUB>, CH<SUB>4</SUB>,
    and H<SUB>2</SUB>O - can be measured to a precision of ≲ 0.7 dex (a factor of 5) within a 20 Prism transit JWST program.
