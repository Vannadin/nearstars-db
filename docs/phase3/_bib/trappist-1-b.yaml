- &id560
  arxiv_id: '1908.05909'
  ads_bibcode: 2019JGRE..124.2306K
  title: Inner Edge of Habitable Zones for Earth-Sized Planets With Various Surface Water Distributions
  authors:
  - Kodama, T.
  - Genda, H.
  - O'ishi, R.
  - Abe-Ouchi, A.
  - Abe, Y.
  year: '2019'
  pubdate: '2019-08-00'
  doi: 10.1029/2019JE006037
  abstract: When planets receive insolation above a certain critical value called the runaway threshold, liquid surface water
    vaporizes completely, which forms the inner edge of the habitable zone. Because land planets can emit a large amount of
    radiation from the dry tropics, they have a higher runaway threshold than aqua planets do. Here we systematically investigated
    the runaway threshold for various surface water distributions using a three-dimensional dynamic atmosphere model. The
    runaway threshold for the meridionally uniform surface water distribution increases from the typical value for the aqua
    planet regime ( 130% S<SUB>0</SUB>) to one for the land planet regime ( 155% S<SUB>0</SUB>) as the dry surface area increases,
    where S<SUB>0</SUB> is the present Earth's insolation. Although this result is similar to the previous work considering
    zonally uniform surface water distributions, the runaway threshold for the land planet regime is quite low compared to
    that of the previous work. This is because a part of the tropical atmosphere is always wet for the meridionally uniform
    case. We also considered the surface water distributions determined by the Earth's, Mars's, and Venus's topographies.
    We found that their runaway thresholds are close to that for the meridionally uniform cases, and the amount of water at
    the boundary between an aqua planet regime and land planet regime is around 10% of the Earth's ocean. This clearly shows
    that the runaway threshold is not determined uniquely by the luminosity of the central star, but it has a wide range caused
    by the surface water distribution of the terrestrial water planet itself.
