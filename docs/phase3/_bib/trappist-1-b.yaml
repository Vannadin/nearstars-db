  arxiv_id: null
  ads_bibcode: 2019Icar..333..113L
  title: A model intercomparison of Titan's climate and low-latitude environment
  authors:
  - Lora, Juan M.
  - Tokano, Tetsuya
  - Vatant d'Ollone, Jan
  - Lebonnois, Sébastien
  - Lorenz, Ralph D.
  year: '2019'
  pubdate: '2019-11-00'
  doi: 10.1016/j.icarus.2019.05.031
  abstract: Cassini-Huygens provided a wealth of data with which to constrain numerical models of Titan. Such models have
    been employed over the last decade to investigate various aspects of Titan's atmosphere and climate, and several three-dimensional
    general circulation models (GCMs) now exist that simulate Titan with a high degree of fidelity. However, substantial uncertainties
    persist, and at the same time no dedicated intercomparisons have assessed the degree to which these models agree with
    each other or the observations. To address this gap, and motivated by the proposed Dragonfly Titan lander mission, we
    directly compare three Titan GCMs to each other and to in situ observations, and also provide multi-model expectations
    for the low-latitude environment during the early northern winter season. Globally, the models qualitatively agree in
    their representation of the atmospheric structure and circulation, though one model severely underestimates meridional
    temperature gradients and zonal winds. We find that, at low latitudes, simulated and observed atmospheric temperatures
    closely agree in all cases, while the measured winds above the boundary layer are only quantitatively matched by one model.
    Nevertheless, the models simulate similar near-surface winds, and all indicate these are weak. Likewise, temperatures
    and methane content at low latitudes are similar between models, with some differences that are largely attributable to
    modeling assumptions. All models predict environments that closely resemble that encountered by the Huygens probe, including
    little or no precipitation at low latitudes during northern winter. The most significant differences concern the methane
    cycle, though the models are least comparable in this area and substantial uncertainties remain. We suggest that, while
    the overall low-latitude environment on Titan at this season is now fairly well constrained, future in situ measurements
    and monitoring will transform our understanding of regional and temporal variability, atmosphere-surface coupling, Titan's
    methane cycle, and modeling thereof.
