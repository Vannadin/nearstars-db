  arxiv_id: '1807.11442'
  ads_bibcode: 2018AsBio..18.1559M
  title: A Catalog of Spectra, Albedos, and Colors of Solar System Bodies for Exoplanet Comparison
  authors:
  - Madden, J. H.
  - Kaltenegger, Lisa
  year: '2018'
  pubdate: '2018-12-00'
  doi: 10.1089/ast.2017.1763
  abstract: We present a catalog of spectra and geometric albedos, representative of the different types of solar system bodies,
    from 0.45 to 2.5 μm. We analyzed published calibrated, uncalibrated spectra, and albedos for solar system objects and
    derived a set of reference spectra and reference albedos for 19 objects that are representative of the diversity of bodies
    in our solar system. We also identified previously published data that appear contaminated. Our catalog provides a baseline
    for comparison of exoplanet observations to 19 bodies in our own solar system, which can assist in the prioritization
    of exoplanets for time intensive follow-up with next-generation extremely large telescopes and space-based direct observation
    missions. Using high- and low-resolution spectra of these solar system objects, we also derive colors for these bodies
    and explore how a color-color diagram could be used to initially distinguish between rocky, icy, and gaseous exoplanets.
    We explore how the colors of solar system analog bodies would change when orbiting different host stars. This catalog
    of solar system reference spectra and albedos is available for download through the Carl Sagan Institute.
