  abstract: 'The data presented in this study were obtained in two HST Wide Field Camera 3 (WFC3) programs (GO-14500 and GO-14873,
    PI: de Wit) targeting the TRAPPIST-1 system. In the following, we refer to the two programs as Program 1 and Program 2,
    respectively. Program 1 consists of one visit, executed on 2016 May 4, and covers the overlapping transits of planets
    TRAPPIST-1 b and c. The results were initially published in de Wit et al. (2016Natur.537...69D). Program 2 consists of
    four visits, executed between 2016 December and 2017 January, and covers the transits of planets TRAPPIST-1 d, e, f, and
    g (de Wit et al. 2018NatAs...2..214D). In the two programs, the six inner planets (TRAPPIST-1 b-g) have been observed
    at least once during transit. In addition, the observations include two overlapping transits of the planet pairs b and
    c and e and g. For convenience, we label the seven transits in chronological order as Transit 1, 2, 3, 4, 5, 6, and 7.
    <P />(4 data files).'
