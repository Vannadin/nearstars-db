- &id167
  arxiv_id: '2207.06570'
  ads_bibcode: 2022ApJ...934..137Y
  title: Less Effective Hydrodynamic Escape of H<SUB>2</SUB>-H<SUB>2</SUB>O Atmospheres on Terrestrial Planets Orbiting Pre-main-sequence
    M Dwarfs
  authors:
  - Yoshida, Tatsuya
  - Terada, Naoki
  - Ikoma, Masahiro
  - Kuramoto, Kiyoshi
  year: '2022'
  pubdate: '2022-08-00'
  doi: 10.3847/1538-4357/ac7be7
  abstract: 'Terrestrial planets currently in the habitable zones around M dwarfs likely experienced a long-term runaway-greenhouse
    condition because of a slow decline in host-star luminosity in its pre-main-sequence phase. Accordingly, they might have
    lost significant portions of their atmospheres including water vapor at high concentration by hydrodynamic escape induced
    by the strong stellar X-ray and extreme ultraviolet (XUV) irradiation. However, the atmospheric escape rates remain highly
    uncertain due partly to a lack of understanding of the effect of radiative cooling in the escape outflows. Here we carry
    out 1D hydrodynamic escape simulations for an H<SUB>2</SUB>-H<SUB>2</SUB>O atmosphere on a planet with mass of 1M <SUB>⊕</SUB>
    considering radiative and chemical processes to estimate the atmospheric escape rate and follow the atmospheric evolution
    during the early runaway-greenhouse phase. We find that the atmospheric escape rate decreases with the basal H<SUB>2</SUB>O/H<SUB>2</SUB>
    ratio due to the energy loss by the radiative cooling of H<SUB>2</SUB>O and chemical products such as OH and OH<SUP>+</SUP>:
    the escape rate of H<SUB>2</SUB> becomes one order of magnitude smaller when the basal H<SUB>2</SUB>O/H<SUB>2</SUB> =
    0.1 than that of the pure hydrogen atmosphere. The timescale for H<SUB>2</SUB> escape exceeds the duration of the early
    runaway-greenhouse phase, depending on the initial atmospheric amount and composition, indicating that H<SUB>2</SUB> and
    H<SUB>2</SUB>O could be left behind after the end of the runaway-greenhouse phase. Our results suggest that temperate
    and reducing environments with oceans could be formed on some terrestrial planets around M dwarfs.'
  source: citation_of=2023A&A...672A..77G
