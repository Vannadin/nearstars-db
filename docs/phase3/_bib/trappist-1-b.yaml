  doi: 10.3847/1538-3881/acfe12
  abstract: The James Webb Space Telescope (JWST) has provided the first opportunity of studying the atmospheres of terrestrial
    exoplanets and estimating their surface conditions. Earth-sized planets around Sun-like stars are currently inaccessible
    with JWST, however, and will have to be observed using the next generation of telescopes with direct-imaging capabilities.
    Detecting active volcanism on an Earth-like planet would be particularly valuable as it would provide insight into its
    interior and provide context for the commonality of the interior states of Earth and Venus. In this work, we used a climate
    model to simulate four exoEarths over eight years with ongoing large igneous province eruptions with outputs ranging from
    1.8 to 60 Gt of sulfur dioxide. The atmospheric data from the simulations were used to model direct-imaging observations
    between 0.2 and 2.0 μm, producing reflectance spectra for every month of each exoEarth simulation. We calculated the amount
    of observation time required to detect each of the major absorption features in the spectra, and we identified the most
    prominent effects that volcanism had on the reflectance spectra. These effects include changes in the size of the O<SUB>3</SUB>,
    O<SUB>2</SUB>, and H<SUB>2</SUB>O absorption features and changes in the slope of the spectrum. Of these changes, we conclude
    that the most detectable and least ambiguous evidence of volcanism are changes in both O<SUB>3</SUB> absorption and the
    slope of the spectrum.
