  arxiv_id: '2406.09275'
  ads_bibcode: 2024PSJ.....5..175S
  title: The CUISINES Framework for Conducting Exoplanet Model Intercomparison Projects, Version 1.0
  authors:
  - Sohl, Linda E.
  - Fauchez, Thomas J.
  - Domagal-Goldman, Shawn
  - Christie, Duncan A.
