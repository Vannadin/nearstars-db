- &id219
  arxiv_id: '1602.05584'
  ads_bibcode: 2016ApJ...819L..13S
  title: 'Identifying Planetary Biosignature Impostors: Spectral Features of CO and O<SUB>4</SUB> Resulting from Abiotic O<SUB>2</SUB>/O<SUB>3</SUB>
    Production'
  authors:
  - Schwieterman, Edward W.
  - Meadows, Victoria S.
  - Domagal-Goldman, Shawn D.
  - Deming, Drake
  - Arney, Giada N.
  - Luger, Rodrigo
  - Harman, Chester E.
  - Misra, Amit
  - Barnes, Rory
  year: '2016'
  pubdate: '2016-03-00'
  doi: 10.3847/2041-8205/819/1/L13
  abstract: 'O<SUB>2</SUB> and O<SUB>3</SUB> have been long considered the most robust individual biosignature gases in a
    planetary atmosphere, yet multiple mechanisms that may produce them in the absence of life have been described. However,
    these abiotic planetary mechanisms modify the environment in potentially identifiable ways. Here we briefly discuss two
    of the most detectable spectral discriminants for abiotic O<SUB>2</SUB>/O<SUB>3</SUB>: CO and O<SUB>4</SUB>. We produce
    the first explicit self-consistent simulations of these spectral discriminants as they may be seen by James Webb Space
    Telescope (JWST). If JWST-NIRISS and/or NIRSpec observe CO (2.35, 4.6 μm) in conjunction with CO<SUB>2</SUB> (1.6, 2.0,
    4.3 μm) in the transmission spectrum of a terrestrial planet it could indicate robust CO<SUB>2</SUB> photolysis and suggest
    that a future detection of O<SUB>2</SUB> or O<SUB>3</SUB> might not be biogenic. Strong O<SUB>4</SUB> bands seen in transmission
    at 1.06 and 1.27 μm could be diagnostic of a post-runaway O<SUB>2</SUB>-dominated atmosphere from massive H-escape. We
    find that for these false positive scenarios, CO at 2.35 μm, CO<SUB>2</SUB> at 2.0 and 4.3 μm, and O<SUB>4</SUB> at 1.27
    μm are all stronger features in transmission than O<SUB>2</SUB>/O<SUB>3</SUB> and could be detected with S/Ns ≳ 3 for
    an Earth-size planet orbiting a nearby M dwarf star with as few as 10 transits, assuming photon-limited noise. O<SUB>4</SUB>
    bands could also be sought in UV/VIS/NIR reflected light (at 0.345, 0.36, 0.38, 0.445, 0.475, 0.53, 0.57, 0.63, 1.06,
    and 1.27 μm) by a next generation direct-imaging telescope such as LUVOIR/HDST or HabEx and would indicate an oxygen atmosphere
    too massive to be biologically produced.'
