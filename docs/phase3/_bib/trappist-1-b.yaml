  arxiv_id: '1112.0572'
  ads_bibcode: 2012A&A...537L...2E
  title: Transmission spectrum of Venus as a transiting exoplanet
  authors:
  - Ehrenreich, D.
  - Vidal-Madjar, A.
  - Widemann, T.
  - Gronoff, G.
  - Tanga, P.
  - Barthélemy, M.
  - Lilensten, J.
  - Lecavelier Des Etangs, A.
  - Arnold, L.
  year: '2012'
  pubdate: '2012-01-00'
  doi: 10.1051/0004-6361/201118400
  abstract: On 5-6 June 2012, Venus will be transiting the Sun for the last time before 2117. This event is an unique opportunity
    to assess the feasibility of the atmospheric characterisation of Earth-size exoplanets near the habitable zone with the
    transmission spectroscopy technique and provide an invaluable proxy for the atmosphere of such a planet. In this letter,
    we provide a theoretical transmission spectrum of the atmosphere of Venus that could be tested with spectroscopic observations
    during the 2012 transit. This is done using radiative transfer across Venus' atmosphere, with inputs from in-situ missions
    such as Venus Express and theoretical models. The transmission spectrum covers a range of 0.1-5 μm and probes the limb
    between 70 and 150 km in altitude. It is dominated in UV by carbon dioxide absorption producing a broad transit signal
    of ~20 ppm as seen from Earth, and from 0.2 to 2.7 μm by Mie extinction (~5 ppm at 0.8 μm) caused by droplets of sulfuric
    acid composing an upper haze layer above the main deck of clouds. These features are not expected for a terrestrial exoplanet
    and could help discriminating an Earth-like habitable world from a cytherean planet. <P />Appendix A is available in electronic
    form at <A href="http://www.aanda.org">http://www.aanda.org</A>Full Table A.1 is only available at the CDS via anonymous
    ftp to cdsarc.u-strasbg.fr (130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/537/L2">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/537/L2</A>
