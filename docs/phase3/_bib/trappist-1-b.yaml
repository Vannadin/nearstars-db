  title: Measurements and modeling of absorption by CO<SUB>2 </SUB>+ H<SUB>2</SUB>O mixtures in the spectral region beyond
    the CO<SUB>2</SUB> ν<SUB>3</SUB>-band head
  authors:
  - Tran, H.
  - Turbet, M.
