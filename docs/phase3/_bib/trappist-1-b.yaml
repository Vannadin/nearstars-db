- &id429
  arxiv_id: '1503.05711'
  ads_bibcode: 2015MNRAS.449.4117V
  title: On the environment surrounding close-in exoplanets
  authors:
  - Vidotto, A. A.
  - Fares, R.
  - Jardine, M.
  - Moutou, C.
  - Donati, J.-F.
  year: '2015'
  pubdate: '2015-06-00'
  doi: 10.1093/mnras/stv618
  abstract: Exoplanets in extremely close-in orbits are immersed in a local interplanetary medium (i.e. the stellar wind)
    much denser than the local conditions encountered around the Solar system planets. The environment surrounding these exoplanets
    also differs in terms of dynamics (slower stellar winds, but higher Keplerian velocities) and ambient magnetic fields
    (likely higher for host stars more active than the Sun). Here, we quantitatively investigate the nature of the interplanetary
    media surrounding the hot Jupiters HD 46375b, HD 73256b, HD 102195b, HD 130322b and HD 179949b. We simulate the three-dimensional
    winds of their host stars, in which we directly incorporate their observed surface magnetic fields. With that, we derive
    mass-loss rates (1.9-8.0 × 10<SUP>-13</SUP> M<SUB>☉</SUB> yr<SUP>-1</SUP>) and the wind properties at the position of
    the hot Jupiters' orbits (temperature, velocity, magnetic field intensity and pressure). We show that these exoplanets'
    orbits are supermagnetosonic, indicating that bow shocks are formed surrounding these planets. Assuming planetary magnetic
    fields similar to Jupiter's, we estimate planetary magnetospheric sizes of 4.1-5.6 planetary radii. We also derive the
    exoplanetary radio emission released in the dissipation of the stellar wind energy. We find radio fluxes ranging from
    0.02 to 0.13 mJy, which are challenging to be observed with present-day technology, but could be detectable with future
    higher sensitivity arrays (e.g. Square Kilometre Array). Radio emission from systems having closer hot Jupiters, such
    as from τ Boo b or HD 189733b, or from nearby planetary systems orbiting young stars, are likely to have higher radio
    fluxes, presenting better prospects for detecting exoplanetary radio emission.
