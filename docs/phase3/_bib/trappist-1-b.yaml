  ads_bibcode: 2025MNRAS.541.2566N
  title: Self-limited tidal heating and prolonged magma oceans in the L 98-59 system
  authors:
  - Nicholls, Harrison
  - Guimond, Claire Marie
  - Hay, Hamish C. F. C.
  - Chatterjee, Richard D.
