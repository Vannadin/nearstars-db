  title: The Effect of Temperature Evolution on the Interior Structure of H<SUB>2</SUB>O-rich Planets
  authors:
  - Zeng, Li
  - Sasselov, Dimitar
  year: '2014'
  pubdate: '2014-04-00'
  doi: 10.1088/0004-637X/784/2/96
  abstract: For most planets in the range of radii from 1 to 4 R <SUB>⊕</SUB>, water is a major component of the interior
    composition. At high pressure H<SUB>2</SUB>O can be solid, but for larger planets, like Neptune, the temperature can be
    too high for this. Mass and age play a role in determining the transition between solid and fluid (and mixed) water-rich
    super-Earth. We use the latest high-pressure and ultra-high-pressure phase diagrams of H<SUB>2</SUB>O, and by comparing
    them with the interior adiabats of various planet models, the temperature evolution of the planet interior is shown, especially
    for the state of H<SUB>2</SUB>O. It turns out that the bulk of H<SUB>2</SUB>O in a planet's interior may exist in various
    states such as plasma, superionic, ionic, Ice VII, Ice X, etc., depending on the size, age, and cooling rate of the planet.
    Different regions of the mass-radius phase space are also identified to correspond to different planet structures. In
    general, super-Earth-size planets (isolated or without significant parent star irradiation effects) older than about 3
    Gyr would be mostly solid.
