  abstract: Measuring the abundances of carbon and oxygen in exoplanet atmospheres is considered a crucial avenue for unlocking
    the formation and evolution of exoplanetary systems<SUP>1,2</SUP>. Access to the chemical inventory of an exoplanet requires
    high-precision observations, often inferred from individual molecular detections with low-resolution space-based<SUP>3-5</SUP>
    and high-resolution ground-based<SUP>6-8</SUP> facilities. Here we report the medium-resolution (R ≈ 600) transmission
    spectrum of an exoplanet atmosphere between 3 and 5 μm covering several absorption features for the Saturn-mass exoplanet
    WASP-39b (ref. <SUP>9</SUP>), obtained with the Near Infrared Spectrograph (NIRSpec) G395H grating of JWST. Our observations
    achieve 1.46 times photon precision, providing an average transit depth uncertainty of 221 ppm per spectroscopic bin,
    and present minimal impacts from systematic effects. We detect significant absorption from CO<SUB>2</SUB> (28.5σ) and
    H<SUB>2</SUB>O (21.5σ), and identify SO<SUB>2</SUB> as the source of absorption at 4.1 μm (4.8σ). Best-fit atmospheric
    models range between 3 and 10 times solar metallicity, with sub-solar to solar C/O ratios. These results, including the
    detection of SO<SUB>2</SUB>, underscore the importance of characterizing the chemistry in exoplanet atmospheres and showcase
    NIRSpec G395H as an excellent mode for time-series observations over this critical wavelength range<SUP>10</SUP>.
