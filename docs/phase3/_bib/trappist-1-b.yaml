  ads_bibcode: 2021GeoRL..4890077B
  title: Tidally Induced Magmatic Pulses on the Oceanic Floor of Jupiter's Moon Europa
  authors:
  - Běhounková, Marie
  - Tobie, Gabriel
  - Choblet, Gaël.
  - Kervazo, Mathilde
  - Melwani Daswani, Mohit
  - Dumoulin, Caroline
  - Vance, Steven D.
  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.1029/2020GL090077
  abstract: The habitability of Europa's subsurface ocean is conditioned by heat released from the deep interior and by intensity
    of magmatic activity. Here, we investigate the melting of the silicate mantle through time and its consequences for seafloor
    magmatism by modeling Europa's internal heat production and transfer using a three dimensional numerical model. We show
    that melt can be produced during most of Europa's history due to the limited efficiency of internal cooling by thermal
    convection and the presence of radiogenic heating. The melting rate is amplified by tidal friction, possibly leading to
    magmatic pulses during enhanced eccentricity periods and focusing melting to high latitudes. The volume of generated melts
    during magmatic episodes is comparable to those involved in Large Igneous Provinces, commonly observed on Earth, and may
    impact ocean chemistry. We predict that gravity measurements, detection of anomalous H<SUB>2</SUB>/CH<SUB>4</SUB>, and
    astrometric data by future missions could confirm ongoing large scale seafloor activity.
