  ads_bibcode: 2015ApJ...813...15C
  title: '3D Modeling of GJ1214b''s Atmosphere: Vertical Mixing Driven by an Anti-Hadley Circulation'
  authors:
  - Charnay, B.
  - Meadows, V.
  - Leconte, J.
  year: '2015'
  pubdate: '2015-11-00'
  doi: 10.1088/0004-637X/813/1/15
  abstract: GJ1214b is a warm sub-Neptune transiting in front of a nearby M dwarf star. Recent observations indicate the presence
    of high and thick clouds or haze whose presence requires strong atmospheric mixing. In order to understand the transport
    and distribution of such clouds/haze, we study the atmospheric circulation and the vertical mixing of GJ1214b with a 3D
    General Circulation Model for cloud-free hydrogen-dominated atmospheres (metallicity of 1, 10, and 100 times the solar
    value) and for a water-dominated atmosphere. We analyze the effect of the atmospheric metallicity on the thermal structure
    and zonal winds. We also analyze the zonal mean meridional circulation and show that it corresponds to an anti-Hadley
    circulation in most of the atmosphere with upwelling at mid-latitude and downwelling at the equator on average. This circulation
    must be present on a large range of synchronously rotating exoplanets with a strong impact on cloud formation and distribution.
    Using simple tracers, we show that vertical winds on GJ1214b can be strong enough to loft micrometric particles and that
    the anti-Hadley circulation leads to a minimum of tracers at the equator. We find that the strength of the vertical mixing
    increases with metallicity. We derive 1D equivalent eddy diffusion coefficients and find simple parametrizations from
    {K}<SUB>{zz</SUB>}=7× {10}<SUP>2</SUP>× {P}<SUB>{bar</SUB>}<SUP>-0.4</SUP> {{{m}}}<SUP>2</SUP> {{{s}}}<SUP>-1</SUP> for
    solar metallicity to {K}<SUB>{zz</SUB>}=3× {10}<SUP>3</SUP>× {P}<SUB>{bar</SUB>}<SUP>-0.4</SUP> {{{m}}}<SUP>2</SUP> {{{s}}}<SUP>-1</SUP>
    for the 100× solar metallicity. These values should favor an efficient formation of photochemical haze in the upper atmosphere
    of GJ1214b.
