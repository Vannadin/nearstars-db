- &id119
  arxiv_id: '2204.04243'
  ads_bibcode: 2022ApJ...930L...6U
  title: Mantle Degassing Lifetimes through Galactic Time and the Maximum Age Stagnant-lid Rocky Exoplanets Can Support Temperate
    Climates
  authors:
  - Unterborn, Cayman T.
  - Foley, Bradford J.
  - Desch, Steven J.
  - Young, Patrick A.
  - Vance, Gregory
  - Chiffelle, Lee
  - Kane, Stephen R.
  year: '2022'
  pubdate: '2022-05-00'
  doi: 10.3847/2041-8213/ac6596
  abstract: The ideal exoplanets to search for life are those within a star's habitable zone. However, even within the habitable
    zone, planets can still develop uninhabitable climate states. Sustaining a temperate climate over geologic (~gigayear)
    timescales requires a planet to contain sufficient internal energy to power a planetary-scale carbon cycle. A major component
    of a rocky planet's energy budget is the heat produced by the decay of radioactive elements, especially <SUP>40</SUP>K,
    <SUP>232</SUP>Th, <SUP>235</SUP>U, and <SUP>238</SUP>U. As the planet ages and these elements decay, this radiogenic energy
    source dwindles. Here we estimate the probability distribution of the amount of these heat-producing elements that enter
    into rocky exoplanets through Galactic history by combining the system-to-system variation seen in stellar abundance data
    with the results from Galactic chemical evolution models. From this, we perform Monte Carlo thermal evolution models that
    maximize the mantle cooling rate, thus allowing us to create a pessimistic estimate of lifetime a rocky, stagnant-lid
    exoplanet can support a global carbon cycle through Galactic history. We apply this framework to a sample of 17 likely
    rocky exoplanets with measured ages, seven of which we predict are likely to be actively degassing today, despite our
    pessimistic assumptions. For the remaining planets, including those orbiting TRAPPIST-1, we cannot confidently assume
    that they currently contain sufficient internal heat to support mantle degassing at a rate sufficient to sustain a global
    carbon cycle or temperate climate without additional tidal heating or undergoing plate tectonics.
