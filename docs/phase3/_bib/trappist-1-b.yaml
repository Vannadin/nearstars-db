  arxiv_id: '2212.09752'
  ads_bibcode: 2022ApJ...941L..31V
  title: The Possible Tidal Demise of Kepler's First Planetary System
  authors:
  - Vissapragada, Shreyas
  - Chontos, Ashley
  - Greklek-McKeon, Michael
  - Knutson, Heather A.
