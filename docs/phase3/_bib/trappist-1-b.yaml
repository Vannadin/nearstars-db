  arxiv_id: '1604.02310'
  ads_bibcode: 2016ApJ...822L...4E
  title: Detection of H<SUB>2</SUB>O and Evidence for TiO/VO in an Ultra-hot Exoplanet Atmosphere
  authors:
  - Evans, Thomas M.
  - Sing, David K.
  - Wakeford, Hannah R.
  - Nikolov, Nikolay
  - Ballester, Gilda E.
  - Drummond, Benjamin
  - Kataria, Tiffany
  - Gibson, Neale P.
