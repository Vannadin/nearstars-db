  arxiv_id: '1907.00449'
  ads_bibcode: 2019NatAs...3..813B
  title: A sub-Neptune exoplanet with a low-metallicity methane-depleted atmosphere and Mie-scattering clouds
  authors:
  - Benneke, Björn
  - Knutson, Heather A.
  - Lothringer, Joshua
  - Crossfield, Ian J. M.
  - Moses, Julianne I.
  - Morley, Caroline
  - Kreidberg, Laura
  - Fulton, Benjamin J.
