  abstract: The Near Infrared Imager and Slitless Spectrograph instrument (NIRISS) is the Canadian Space Agency contribution
    to the suite of four science instruments of the James Webb Space Telescope. As one of the three NIRISS observing modes,
    the Single Object Slitless Spectroscopy (SOSS) mode is tailor-made to undertake time-series observations of exoplanets
    to perform transit spectroscopy. The SOSS permits observing point sources between 0.6 and 2.8 μm at a resolving power
    of 650 at 1.25 μm using a slitless cross-dispersing grism while its defocussing cylindrical lens enables observing targets
    as bright as J = 6.7 by spreading light across 23 pixels along the cross-dispersion axis. This paper officially presents
    the design of the SOSS mode, its operation, characterization, and its performance, from ground-based testing and flight-based
    commissioning. On-sky measurements demonstrate a peak photon conversion efficiency of 55% at 1.2 μm. The first time series
    on the A-type star BD+60°1753 achieves a flux stability close to the photon-noise limit, so far tested to a level of 20
    parts per million on a 40 minute timescale after simply subtracting a long-term trend. Uncorrected 1/f noise residuals
    underneath the spectral traces add an extra source of noise equivalent to doubling the readout noise. Preliminary analysis
    of an HAT-P-14b transit time series indicates that it is difficult to remove all of the noise in pixels with partially
    saturated ramps. Overall, the SOSS delivers performance at the level required to tackle key exoplanetary science programs
    such as detecting secondary atmospheres on terrestrial planets and measuring abundances of several chemical species in
    gas giants.
