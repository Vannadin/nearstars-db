  ads_bibcode: 2019AnRFM..51..275P
  title: Atmospheric Circulation of Tide-Locked Exoplanets
  authors:
  - Pierrehumbert, Raymond T.
  - Hammond, Mark
  year: '2019'
  pubdate: '2019-01-00'
  doi: 10.1146/annurev-fluid-010518-040516
  abstract: Tide-locked planets are planets in which tidal stresses from the host star have spun down the planet's rotation
    to the point where its length of sidereal day equals its length of year. In a nearly circular orbit, such planets have
    a permanent dayside and a permanent nightside, leading to extreme heating contrasts. In this article, the atmospheric
    circulations forced by this heating contrast are explored, with a focus on terrestrial planets; here, “terrestrial” refers
    to planets with a condensed solid or liquid surface at which most of the incident stellar radiation is absorbed and does
    not imply habitability in the Earthlike sense. The census of exoplanets contains many terrestrial planets that are very
    likely to be tide locked, including extremely hot close-orbit planets around Sunlike stars and habitable zone (and hotter)
    planets around lower-mass stars. The circulations are discussed in terms of fluid dynamical concepts arising from study
    of the Earth's tropics, supplemented by general circulation model simulations. Even in the relatively simple context of
    dry (noncondensing) dynamics, there are a number of important unresolved issues that require further study.
