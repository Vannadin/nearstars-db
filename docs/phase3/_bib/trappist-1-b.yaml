  - Noack, Lena
  year: '2022'
  pubdate: '2022-12-00'
  doi: 10.1029/2021GC010230
  abstract: Magmatic volatile release was crucial for the build-up and composition of the early atmosphere and thus for the
    origin and evolution of life. Even though the rate of intrusive to extrusive magma production on Earth is high, intrusive
    volatile release is commonly neglected in studies modeling the composition of the early atmosphere. This can mainly be
    attributed to the solubility of volatiles like H<SUB>2</SUB>O and CO<SUB>2</SUB>. The solubility is increasing with depth
    and thus is thought to prevent the release of these volatiles. However, due to the accumulation of H<SUB>2</SUB>O and
    CO<SUB>2</SUB> within the melt during fractional crystallization, the solubility can be exceeded even at greater depths.
    In our study, we developed a novel numeric model to quantify the amount of H<SUB>2</SUB>O and CO<SUB>2</SUB> that can
    be released from an intrusive system if we consider the process of fractional crystallization. Additionally, we take the
    possibility of melt ascent and the formation of hydrous minerals into account. According to our simulations, the release
    of H<SUB>2</SUB>O and CO<SUB>2</SUB> from an intrusive magma body is possible within the whole lithosphere. However, the
    release strongly depends on the initial volatile budget, the formation of hydrous phases, the depth of the intrusion and
    the buoyancy of the melt. Considering all these factors, our study suggests that about 0%-85% H<SUB>2</SUB>O and 100%
    CO<SUB>2</SUB> can be released from mafic intrusions. This renders the incorporation of the intrusive volatile release
    mandatory in order to determine the volatile fluxes and the composition of early Earth's atmosphere.
