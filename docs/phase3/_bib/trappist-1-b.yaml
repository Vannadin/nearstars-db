  arxiv_id: '1501.01623'
  ads_bibcode: 2015ApJ...807...45D
  title: The Occurrence of Potentially Habitable Planets Orbiting M Dwarfs Estimated from the Full Kepler Dataset and an Empirical
    Measurement of the Detection Sensitivity
  authors:
  - Dressing, Courtney D.
  - Charbonneau, David
  year: '2015'
  pubdate: '2015-07-00'
  doi: 10.1088/0004-637X/807/1/45
  abstract: We present an improved estimate of the occurrence rate of small planets orbiting small stars by searching the
    full four-year Kepler data set for transiting planets using our own planet detection pipeline and conducting transit injection
    and recovery simulations to empirically measure the search completeness of our pipeline. We identified 156 planet candidates,
    including one object that was not previously identified as a Kepler Object of Interest. We inspected all publicly available
    follow-up images, observing notes, and centroid analyses, and corrected for the likelihood of false positives. We evaluated
    the sensitivity of our detection pipeline on a star-by-star basis by injecting 2000 transit signals into the light curve
    of each target star. For periods shorter than 50 days, we find {0.56}<SUB>-0.05</SUB><SUP>+0.06</SUP> Earth-size planets
    (1-1.5 R<SUB>⊕</SUB>) and {0.46}<SUB>-0.05</SUB><SUP>+0.07</SUP> super-Earths (1.5-2 R<SUB>⊕</SUB>) per M dwarf. In total,
    we estimate a cumulative planet occurrence rate of 2.5 ± 0.2 planets per M dwarf with radii 1-4 R<SUB>⊕</SUB> and periods
    shorter than 200 days. Within a conservatively defined habitable zone (HZ) based on the moist greenhouse inner limit and
    maximum greenhouse outer limit, we estimate an occurrence rate of {0.16}<SUB>-0.07</SUB><SUP>+0.17</SUP> Earth-size planets
    and {0.12}<SUB>-0.05</SUB><SUP>+0.10</SUP> super-Earths per M dwarf HZ. Adopting the broader insolation boundaries of
    the recent Venus and early Mars limits yields a higher estimate of {0.24}<SUB>-0.08</SUB><SUP>+0.18</SUP> Earth-size planets
    and {0.21}<SUB>-0.06</SUB><SUP>+0.11</SUP> super-Earths per M dwarf HZ. This suggests that the nearest potentially habitable
    non-transiting and transiting Earth-size planets are 2.6 ± 0.4 pc and {10.6}<SUB>-1.8</SUB><SUP>+1.6</SUP> pc away, respectively.
    If we include super-Earths, these distances diminish to 2.1 ± 0.2 pc and {8.6}<SUB>-0.8</SUB><SUP>+0.7</SUP> pc.
