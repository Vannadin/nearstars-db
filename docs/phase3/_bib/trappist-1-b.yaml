  arxiv_id: '2102.00203'
  ads_bibcode: 2021ApJ...907L..36G
  title: A Heavy Molecular Weight Atmosphere for the Super-Earth π Men c
  authors:
  - García Muñoz, A.
  - Fossati, L.
  - Youngblood, A.
  - Nettelmann, N.
  - Gandolfi, D.
  - Cabrera, J.
