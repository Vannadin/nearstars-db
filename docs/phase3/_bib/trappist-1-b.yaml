  doi: 10.3847/1538-4365/ac9da4
  abstract: The ExoClock project has been created to increase the efficiency of the Ariel mission. It will achieve this by
    continuously monitoring and updating the ephemerides of Ariel candidates, in order to produce a consistent catalog of
    reliable and precise ephemerides. This work presents a homogenous catalog of updated ephemerides for 450 planets, generated
    by the integration of ~18,000 data points from multiple sources. These sources include observations from ground-based
    telescopes (the ExoClock network and the Exoplanet Transit Database), midtime values from the literature, and light curves
    from space telescopes (Kepler, K2, and TESS). With all the above, we manage to collect observations for half of the postdiscovery
    years (median), with data that have a median uncertainty less than 1 minute. In comparison with the literature, the ephemerides
    generated by the project are more precise and less biased. More than 40% of the initial literature ephemerides had to
    be updated to reach the goals of the project, as they were either of low precision or drifting. Moreover, the integrated
    approach of the project enables both the monitoring of the majority of the Ariel candidates (95%), and also the identification
    of missing data. These results highlight the need for continuous monitoring to increase the observing coverage of the
    candidate planets. Finally, the extended observing coverage of planets allows us to detect trends (transit-timing variations)
    for a sample of 19 planets. All the products, data, and codes used in this work are open and accessible to the wider scientific
    community.
