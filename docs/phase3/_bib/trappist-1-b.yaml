  arxiv_id: '1612.02425'
  ads_bibcode: 2017AJ....153..191S
  title: Detection of the Atmosphere of the 1.6 M <SUB>⊕</SUB> Exoplanet GJ 1132 b
  authors:
  - Southworth, John
  - Mancini, Luigi
  - Madhusudhan, Nikku
  - Mollière, Paul
  - Ciceri, Simona
  - Henning, Thomas
  year: '2017'
  pubdate: '2017-04-00'
  doi: 10.3847/1538-3881/aa6477
  abstract: Detecting the atmospheres of low-mass, low-temperature exoplanets is a high-priority goal on the path to ultimately
    detecting biosignatures in the atmospheres of habitable exoplanets. High-precision HST observations of several super-Earths
    with equilibrium temperatures below 1000 K have to date all resulted in featureless transmission spectra, which have been
    suggested to be due to high-altitude clouds. We report the detection of an atmospheric feature in the atmosphere of a
    1.6 {M}<SUB>\oplus </SUB> transiting exoplanet, GJ 1132 b, with an equilibrium temperature of ∼600 K and orbiting a nearby
    M dwarf. We present observations of nine transits of the planet obtained simultaneously in the griz and JHK passbands.
    We find an average radius of 1.43 ± 0.16 {R}<SUB>\oplus </SUB> for the planet, averaged over all the passbands, and a
    radius of 0.255 ± 0.023 {R}<SUB>☉ </SUB> for the star, both of which are significantly greater than previously found.
    The planet radius can be decomposed into a “surface radius” at ∼1.375 {R}<SUB>\oplus </SUB> overlaid by atmospheric features
    that increase the observed radius in the z and K bands. The z-band radius is 4σ higher than the continuum, suggesting
    a strong detection of an atmosphere. We deploy a suite of tests to verify the reliability of the transmission spectrum,
    which are greatly helped by the existence of repeat observations. The large z-band transit depth indicates strong opacity
    from H<SUB>2</SUB>O and/or CH<SUB>4</SUB> or a hitherto-unconsidered opacity. A surface radius of 1.375 ± 0.16 {R}<SUB>\oplus
    </SUB> allows for a wide range of interior compositions ranging from a nearly Earth-like rocky interior, with ∼70% silicate
