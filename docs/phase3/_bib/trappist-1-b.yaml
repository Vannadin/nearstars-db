  doi: 10.1038/nature08108
  abstract: Io is the volcanically most active body in the Solar System and has a large surface heat flux. The geological
    activity is thought to be the result of tides raised by Jupiter, but it is not known whether the current tidal heat production
    is sufficiently high to generate the observed surface heat flow. Io's tidal heat comes from the orbital energy of the
    Io-Jupiter system (resulting in orbital acceleration), whereas dissipation of energy in Jupiter causes Io's orbital motion
    to decelerate. Here we report a determination of the tidal dissipation in Io and Jupiter through its effect on the orbital
    motions of the Galilean moons. Our results show that the rate of internal energy dissipation in Io (k<SUB>2</SUB>/Q =
    0.015+/-0.003, where k<SUB>2</SUB> is the Love number and Q is the quality factor) is in good agreement with the observed
    surface heat flow, and suggest that Io is close to thermal equilibrium. Dissipation in Jupiter (k<SUB>2</SUB>/Q = (1.102+/-0.203)×10<SUP>-5</SUP>)
    is close to the upper bound of its average value expected from the long-term evolution of the system, and dissipation
    in extrasolar planets may be higher than presently assumed. The measured secular accelerations indicate that Io is evolving
    inwards, towards Jupiter, and that the three innermost Galilean moons (Io, Europa and Ganymede) are evolving out of the
    exact Laplace resonance.
