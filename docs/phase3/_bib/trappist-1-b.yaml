  arxiv_id: '2501.04350'
  ads_bibcode: 2025ApJ...985..105S
  title: 'Influence of Planetary Rotation on Supersonic Flow of Lava Planets: A Two-dimensional Horizontal Model Analysis'
  authors:
  - Song, Zhuo-Yang
  - Ding, Feng
  - Kang, Wanying
  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.3847/1538-4357/adc80a
  abstract: The study of lava planets has attracted significant attention recently because of their close proximity to their
    host stars, which enhances their detectability for atmospheric characterization. Previous studies showed that the atmospheric
    flow becomes supersonic if the atmosphere is dominated by rocky vapor evaporated from the magma ocean around the substellar
    point. These studies often assumed an axisymmetric flow about the axis from the substellar point to the antistellar point
    but ignored the effect of planetary rotation. However, since the spin rate of lava planets can be rather fast due to their
    close-in orbits, the aforementioned symmetry may be broken, and significant asymmetric flow is expected. Here, we introduce
    a two-dimensional framework to explore the influence of planetary rotation on the atmospheric dynamics of these lava planets
    for the first time, and assess the sensitivity and range of application of our model. Starting from the established one-dimensional
    axisymmetric atmospheric solution, we obtain the governing equation for the asymmetric flow by expanding with respect
    to 1/Ro (Ro denotes Rossby number and exceeds unity for typical lava planets). The asymmetric component of supersonic
    flow is pivotal for future research on the observation of these atmospheres, flow patterns of the magma ocean currents
    driven by atmospheric winds, and deformation of the planetary shape over long timescales.
