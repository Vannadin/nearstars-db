  abstract: The James Webb Space Telescope (JWST) has started a revolution in exoplanetary science. From studying in exquisite
    detail the chemical inventories and physical processes in gas giant exoplanets, the structure and chemical diversity of
    the enigmatic sub-Neptune population to even providing constraints on the atmospheric make-up of rocky exoplanets, the
    observatory is enabling cutting-edge science that is touching virtually every sub-area in the field. In this review Chapter,
    we showcase key highlights from exoplanet science being conducted with this state-of-the-art space observatory, which
    we believe is representative of the transformational science it is producing. One of the key takeaways from these pioneering
    JWST observations is how they are starting to reshape not only how we think, study and interpret exoplanet observations
    -- but how they are also reshaping our intuition about our very own Solar System planets.
