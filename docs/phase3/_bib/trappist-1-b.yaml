  title: A combined transmission spectrum of the Earth-sized exoplanets TRAPPIST-1 b and c
  authors:
  - de Wit, Julien
  - Wakeford, Hannah R.
  - Gillon, Michaël
  - Lewis, Nikole K.
  - Valenti, Jeff A.
  - Demory, Brice-Olivier
  - Burgasser, Adam J.
  - Burdanov, Artem
