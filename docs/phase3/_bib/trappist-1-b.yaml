  arxiv_id: '1212.3553'
  ads_bibcode: 2013A&A...552A...2L
  title: A photometric study of the hot exoplanet WASP-19b
  authors:
  - Lendl, M.
  - Gillon, M.
  - Queloz, D.
  - Alonso, R.
  - Fumel, A.
  - Jehin, E.
  - Naef, D.
  year: '2013'
  pubdate: '2013-04-00'
  doi: 10.1051/0004-6361/201220924
  abstract: 'Context. The sample of hot Jupiters that have been studied in great detail is still growing. In particular, when
    the planet transits its host star, it is possible to measure the planetary radius and the planet mass (with radial velocity
    data). For the study of planetary atmospheres, it is essential to obtain transit and occultation measurements at multiple
    wavelengths. <BR /> Aims: We aim to characterize the transiting hot Jupiter WASP-19b by deriving accurate and precise
    planetary parameters from a dedicated observing campaign of transits and occultations. <BR /> Methods: We have obtained
    a total of 14 transit lightcurves in the r''-Gunn, I-Cousins, z''-Gunn, and I + z'' filters and 10 occultation lightcurves
    in z''-Gunn using EulerCam on the Euler-Swiss telescope and TRAPPIST. We also obtained one lightcurve through the narrow-band
    NB1190 filter of HAWK-I on the VLT measuring an occultation at 1.19 μm. We performed a global MCMC analysis of all new
    data, together with some archive data in order to refine the planetary parameters and to measure the occultation depths
    in z''-band and at 1.19 μm. <BR /> Results: We measure a planetary radius of R<SUB>p</SUB> = 1.376 ± 0.046 R<SUB>J</SUB>,
    a planetary mass of M<SUB>p</SUB> = 1.165 ± 0.068 M<SUB>J</SUB>, and find a very low eccentricity of e = 0.0077<SUB>-0.0032</SUB><SUP>+0.0068</SUP>,
    compatible with a circular orbit. We have detected the z''-band occultation at 3σ significance and measure it to be δF<SUB>occ,z''</SUB>
    = 352 ± 116 ppm, more than a factor of 2 smaller than previously published. The occultation at 1.19 μm is only marginally
    constrained at δF<SUB>occ,NB1190</SUB> = 1711<SUB>-726</SUB><SUP>+745</SUP> ppm. <BR /> Conclusions: We show that the
    detection of occultations in the visible range is within reach, even for 1 m class telescopes if a considerable number
    of individual events are observed. Our results suggest an oxygen-dominated atmosphere of WASP-19b, making the planet an
    interesting test case for oxygen-rich planets without temperature inversion. <P />Based on photometric observations made
    with HAWK-I on the ESO VLT/UT4 (Prog. ID 084.C-0532), EulerCam on the Euler-Swiss telescope and the Belgian TRAPPIST telescope,
