- &id116
  arxiv_id: '2303.14546'
  ads_bibcode: 2023MNRAS.524.5708S
  title: 'Day and night: habitability of tidally locked planets with sporadic rotation'
  authors:
  - Shakespeare, Cody J.
  - Steffen, Jason H.
  year: '2023'
  pubdate: '2023-10-00'
  doi: 10.1093/mnras/stad2162
  abstract: 'Tidally locked worlds provide a unique opportunity for constraining the probable climates of certain exoplanets.
    They are unique in that few exoplanet spin and obliquity states are known or will be determined in the near future: both
    of which are critical in modelling climate. A recent study shows the dynamical conditions present in the TRAPPIST-1 system
    make rotation and large librations of the substellar point possible for these planets, which are usually assumed to be
    tidally locked. We independently confirm the tendency for planets in TRAPPIST-1-like systems to sporadically transition
    from tidally locked libration to slow rotation using N-body simulations. We examine the nature and frequency of these
    spin states to best inform energy balance models which predict the temperature profile of the planet''s surface. Our findings
    show that tidally locked planets with sporadic rotation are able to be in both long-term persistent states and states
    with prolonged transient behaviour: where frequent transitions between behaviours occur. Quasi-stable spin regimes, where
    the planet exhibits one spin behaviour for up to hundreds of millennia, are likely able to form stable climate systems
    while the spin behaviour is constant. 1D energy balance models show that tidally locked planets with sporadic rotation
    around M-dwarfs will experience a relatively small change in substellar temperature due to the lower albedo of ice in
    an infrared dominant stellar spectrum. The exact effects of large changes in temperature profiles on these planets as
    they rotate require more robust climate models, like 3D global circulation models, to better examine.'
