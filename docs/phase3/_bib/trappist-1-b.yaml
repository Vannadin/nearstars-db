- &id229
  arxiv_id: '1002.4447'
  ads_bibcode: 2010A&A...523A..26N
  title: Interior structure models of GJ 436b
  authors:
  - Nettelmann, N.
  - Kramm, U.
  - Redmer, R.
  - Neuhäuser, R.
  year: '2010'
  pubdate: '2010-11-00'
  doi: 10.1051/0004-6361/200911985
  abstract: 'Context. GJ 436b is the first extrasolar planet discovered that resembles Neptune in mass and radius. Two more
    are known (HAT-P-11b and Kepler-4b), and many more are expected to be found in the upcoming years. The particularly interesting
    property of Neptune-sized planets is that their mass M<SUB>p</SUB> and radius R<SUB>p</SUB> are close to theoretical M-R
    relations of water planets. Given M<SUB>p</SUB>, R<SUB>p</SUB>, and equilibrium temperature, however, various internal
    compositions are possible. <BR /> Aims: A broad set of interior structure models is presented here that illustrates the
    dependence of internal composition and possible phases of water occurring in presumably water-rich planets, such as GJ
    436b on the uncertainty in atmospheric temperature profile and mean density. We show how the set of solutions can be narrowed
    down if theoretical constraints from formation and model atmospheres are applied or potentially observational constraints
    for the atmospheric metallicity Z<SUB>1</SUB> and the tidal Love number k<SUB>2</SUB>. <BR /> Methods: We model the interior
    by assuming either three layers (hydrogen-helium envelope, water layer, rock core) or two layers (H/He/H<SUB>2</SUB>O
    envelope, rocky core). For water, we use the equation of state H<SUB>2</SUB>O-REOS based on finite temperature - density
    functional theory - molecular dynamics (FT-DFT-MD) simulations. <BR /> Results: Some admixture of H/He appears mandatory
    for explaining the measured radius. For the warmest considered models, the H/He mass fraction can reduce to 10<SUP>-3</SUP>,
    still extending over ~0.7 R<SUB>⊕</SUB>. If water occurs, it will be essentially in the plasma phase or in the superionic
    phase, but not in an ice phase. Metal-free envelope models have 0.02 &lt; k<SUB>2</SUB> &lt; 0.2, and the core mass cannot
    be determined from a measurement of k<SUB>2</SUB>. In contrast, models with 0.3 &lt; k<SUB>2</SUB> &lt; 0.82 require high
    metallicities Z<SUB>1</SUB> &lt; 0.89 in the outer envelope. The uncertainty in core mass decreases to 0.4M<SUB>p</SUB>,
    if k<SUB>2</SUB> ≥ 0.3, and further to 0.2M<SUB>p</SUB>, if k<SUB>2</SUB> ≥ 0.5, and core mass and Z<SUB>1</SUB> become
    sensitive functions of k<SUB>2</SUB>. <BR /> Conclusions: To further narrow the set of solutions, a proper treatment of
    the atmosphere and the evolution is necessary. We encourage efforts to observationally determine the atmospheric metallicity
    and the Love number k<SUB>2</SUB>.'
  source: citation_of=2023A&A...672A..77G
