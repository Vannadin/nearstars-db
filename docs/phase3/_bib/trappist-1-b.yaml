  year: '2022'
  pubdate: '2022-11-00'
  doi: 10.3847/PSJ/ac9dfe
  abstract: 'With an increased focus on the observing and modeling of mini-Neptunes, there comes a need to better understand
    the tools we use to model their atmospheres. In this Paper, we present the protocol for the Comparing Atmospheric Models
    of Extrasolar Mini-Neptunes Building and Envisioning Retrievals and Transits, CAMEMBERT, project, an intercomparison of
    general circulation models (GCMs) used by the exoplanetary science community to simulate the atmospheres of mini-Neptunes.
    We focus on two targets well studied both observationally and theoretically with planned JWST cycle 1 observations: the
    warm GJ 1214b and the cooler K2-18b. For each target, we consider a temperature-forced case, a clear sky dual-gray radiative
    transfer case, and a clear sky multiband radiative transfer case, covering a range of complexities and configurations
    where we know differences exist between GCMs in the literature. This Paper presents all the details necessary to participate
    in the intercomparison, with the intention of presenting the results in future papers. Currently, there are eight GCMs
    participating (EXOCAM, EXO-FMS, FMS PCM, GENERIC PCM, MITGCM, RM-GCM, THOR, and the Unified Model), and membership in
    the project remains open. Those interested in participating are invited to contact the authors.'
