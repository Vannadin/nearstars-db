  ads_bibcode: 2023ApJ...954L..52R
  title: Water Absorption in the Transmission Spectrum of the Water World Candidate GJ 9827 d
  authors:
  - Roy, Pierre-Alexis
  - Benneke, Björn
  - Piaulet, Caroline
  - Gully-Santiago, Michael A.
  - Crossfield, Ian J. M.
  - Morley, Caroline V.
  - Kreidberg, Laura
  - Mikal-Evans, Thomas
  - Brande, Jonathan
  - Delisle, Simon
  - Greene, Thomas P.
  - Hardegree-Ullman, Kevin K.
  - Barman, Travis
