  arxiv_id: '2307.08752'
  ads_bibcode: 2023ApJ...958L..15R
  title: The Importance of the Upper Atmosphere to CO/O<SUB>2</SUB> Runaway on Habitable Planets Orbiting Low-mass Stars
  authors:
  - Ranjan, Sukrit
  - Schwieterman, Edward W.
  - Leung, Michaela
  - Harman, Chester E.
  - Hu, Renyu
  year: '2023'
  pubdate: '2023-11-00'
  doi: 10.3847/2041-8213/ad037c
  abstract: Efforts to spectrally characterize the atmospheric compositions of temperate terrestrial exoplanets orbiting M
    dwarf stars with JWST are now underway. Key molecular targets of such searches include O<SUB>2</SUB> and CO, which are
    potential indicators of life. Recently, it was proposed that CO<SUB>2</SUB> photolysis generates abundant (≳0.1 bar) abiotic
    O<SUB>2</SUB> and CO in the atmospheres of habitable M dwarf planets with CO<SUB>2</SUB>-rich atmospheres, constituting
    a strong false positive for O<SUB>2</SUB> as a biosignature and further complicating efforts to use CO as a diagnostic
    of surface biology. Importantly, this implied that TRAPPIST-1e and TRAPPIST-1f, now under observation with JWST, would
    abiotically accumulate abundant O<SUB>2</SUB> and CO, if habitable. Here, we use a multi-model approach to reexamine photochemical
    O<SUB>2</SUB> and CO accumulation on planets orbiting M dwarf stars. We show that photochemical O<SUB>2</SUB> remains
    a trace gas on habitable CO<SUB>2</SUB>-rich M dwarf planets, with earlier predictions of abundant O<SUB>2</SUB> and CO
    due to an atmospheric model top that was too low to accurately resolve the unusually high CO<SUB>2</SUB> photolysis peak
    on such worlds. Our work strengthens the case for O<SUB>2</SUB> as a biosignature gas, and affirms the importance of CO
    as a diagnostic of photochemical O<SUB>2</SUB> production. However, observationally relevant false-positive potential
    remains, especially for O<SUB>2</SUB>'s photochemical product O<SUB>3</SUB>, and further work is required to confidently
    understand O<SUB>2</SUB> and O<SUB>3</SUB> as biosignature gases on M dwarf planets.
