- &id727
  arxiv_id: null
  ads_bibcode: 2022GeCoA.328..221H
  title: Magma oceans, iron and chromium redox, and the origin of comparatively oxidized planetary mantles
  authors:
  - Hirschmann, M. M.
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.1016/j.gca.2022.04.005
  abstract: The mantles of both Earth and Mars are more oxidized than would be expected based on low pressure equilibration
    of molten silicate and alloy during their magma ocean stages. High pressure silicate-alloy equilibration in a magma ocean
    can produce appreciable ferric iron in the silicate, leading to comparatively oxidized near surface conditions and overlying
    atmospheres. Upon crystallization, this may feasibly be sufficient to account for oxygen fugacities prevailing in basalt
    source regions of Earth and Mars. Experiments and first principles studies affirm that Fe<SUP>3+</SUP> is stabilized at
    high pressure, but to date there has been no model that accounts accurately for the combined effects of melt composition,
    temperature, pressure, and oxygen fugacity on magma ocean Fe<SUP>3+</SUP>/Fe<SUP>T</SUP>. We calibrate a new model for
    Fe<SUP>3+</SUP>/Fe<SUP>T</SUP> as a function of temperature, pressure, melt composition, and f<SUB>O2</SUB> which reproduces
    Fe<SUP>3+</SUP>/Fe<SUP>T</SUP> for experimental peridotite liquids and which incorporates differences in FeO and Fe<SUB>2</SUB>O<SUB>3</SUB>
    liquid heat capacities into a potentially realistic temperature function. For the effects of pressure, two versions of
    the model are implemented based on recent equations of state (EOS), though only the EOS of Deng et al. (2020) is applicable
    to pressures relevant to metal-silicate equilibration in a deep terrestrial magma ocean. For Earth, metal-silicate equilibration
    at 28-53 GPa, 2300-4100 K, and f<SUB>O2</SUB> set by plausible mantle and core compositions produces Fe<SUP>3+</SUP>/Fe<SUP>T</SUP>
    between 0.034 and 0.10, with variation mostly owing to differences in assumed temperatures. For Mars, different proposed
    mantle compositions produce Fe<SUP>3+</SUP>/Fe<SUP>T</SUP> ratios that range from 0.026 for FeO* of 13.5 wt.% up to 0.038
    for FeO* of 18.1 wt.%. <P />Although significant Fe<SUP>3+</SUP> may be present in magma oceans owing to high pressure
    equilibration with alloy, the budget of Fe<SUB>2</SUB>O<SUB>3</SUB> in crystallized mantles is expected to be modified
    from that in the molten state. An important additional factor is the influence of Cr, which is Cr<SUP>2+</SUP> in molten
    silicate equilibrated with alloy and Cr<SUP>3+</SUP> in terrestrial upper mantles. Production of Cr<SUP>3+</SUP> and Fe<SUP>2+</SUP>
    by reaction with Cr<SUP>2+</SUP> and Fe<SUP>3+</SUP> during crystallization can destroy much of the Fe<SUB>2</SUB>O<SUB>3</SUB>
    present during the magma ocean stage. Considering the stability of Cr<SUP>2+</SUP> in olivine and the temperature-dependent
    partitioning of Cr<SUP>3+</SUP> between mantle silicates, we construct an empirical model for the fraction of Cr that
    is Cr<SUB>2</SUB>O<SUB>3</SUB> in solid spinel peridotite as a function of temperature and f<SUB>O2</SUB>. For Earth,
    at least 0.35 wt.% Fe<SUB>2</SUB>O<SUB>3</SUB> is destroyed by oxidation of magma ocean CrO and for Mars, more than 0.55
    wt.% Fe<SUB>2</SUB>O<SUB>3</SUB> should be destroyed. Consequently, either the terrestrial and martian magma oceans were
    significantly more enriched in Fe<SUB>2</SUB>O<SUB>3</SUB> than their present-day upper mantles or other processes contributed
    to oxidation of the latter. Over-enrichment of Fe<SUB>2</SUB>O<SUB>3</SUB> in the magma oceans is plausible only if terrestrial
    metal-silicate equilibration occurred above 3300 K and if the martian mantle contains &gt;17 wt.% FeO*. Subsolidus disproportionation
    of ferrous iron may have contributed to the present-day redox state of the Earth's mantle, and late accretion of chondrite-like
    material and hydrogen degassing also likely affected the solidified mantles of both Earth and Mars.
