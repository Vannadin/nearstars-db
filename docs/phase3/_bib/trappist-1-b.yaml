  arxiv_id: '1612.01739'
  ads_bibcode: 2017MNRAS.466..738S
  title: 'SALT observations of the chromospheric activity of transiting planet hosts: mass-loss and star-planet interactions<SUP>★</SUP>'
  authors:
  - Staab, D.
  - Haswell, C. A.
  - Smith, Gareth D.
