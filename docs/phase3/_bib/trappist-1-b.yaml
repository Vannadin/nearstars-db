- arxiv_id: '2405.05453'
  ads_bibcode: 2024JOSS....9.6202D
  title: 'Spelunker: A quick-look Python pipeline for JWST NIRISS FGS Guide Star Data'
  authors:
  - Deal, Derod
  - Espinoza, Néstor
  year: '2024'
  pubdate: '2024-05-00'
  doi: 10.21105/joss.06202
  abstract: The James Webb Space Telescope produces some of the highest sensitivity imaging of the cosmos across all instruments.
    One of them, the NIRISS Fine Guidance Sensor, provides guide star imaging with a passband of 0.6 to 5 microns through
    two separate channels, each with a 2.3' x 2.3' field of view (FOV) and a sampling rate of 64 ms$-$data that is taken in
    parallel and is thus available for every JWST observing program. While the onboard system uses guide stars to provide
    information to the attitude control system (ACS), which stabilizes the observatory, the astronomical community can also
    use the data products associated with these 64 ms cadence images as science products. Usages range from studying guide
    star photometry in search of transient phenomena to using these data to identify and investigate technical anomalies that
    might occur during scientific observations with the rest of the JWST instruments. Despite this wide range of possible
    usages, these data products are not straightforward to manipulate and analyze, and there is no publicly available package
    to download, investigate, and research guide star data. Spelunker is a Python library that was developed to enable access
    to these guide star data products and their analysis.
