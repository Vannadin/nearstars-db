- &id673
  arxiv_id: '1209.4362'
  ads_bibcode: 2012ApJ...759L..36H
  title: 'Planet-Planet Eclipse and the Rossiter-McLaughlin Effect of a Multiple Transiting System: Joint Analysis of the
    Subaru Spectroscopy and the Kepler Photometry'
  authors:
  - Hirano, Teruyuki
  - Narita, Norio
  - Sato, Bun'ei
  - Takahashi, Yasuhiro H.
  - Masuda, Kento
  - Takeda, Yoichi
  - Aoki, Wako
  - Tamura, Motohide
  - Suto, Yasushi
  year: '2012'
  pubdate: '2012-11-00'
  doi: 10.1088/2041-8205/759/2/L36
  abstract: We report a joint analysis of the Rossiter-McLaughlin (RM) effect with Subaru and the Kepler photometry for the
    Kepler Object of Interest (KOI) 94 system. The system is comprised of four transiting planet candidates with orbital periods
    of 22.3 (KOI-94.01), 10.4 (KOI-94.02), 54.3 (KOI-94.03), and 3.7 (KOI-94.04) days from the Kepler photometry. We performed
    the radial velocity (RV) measurement of the system with the Subaru 8.2 m telescope on UT 2012 August 10, covering a complete
    transit of KOI-94.01 for ~6.7 hr. The resulting RV variation due to the RM effect spectroscopically confirms that KOI-94.01
    is indeed the transiting planet and implies that its orbital axis is well aligned with the stellar spin axis; the projected
    spin-orbit angle λ is estimated as -6<SUP>+13</SUP> <SUB>- 11</SUB> deg. This is the first measurement of the RM effect
    for a multiple transiting system. Remarkably, the archived Kepler light curve around BJD = 2455211.5 (date in UT 2010
    January 14/15) indicates a "double-transit" event of KOI-94.01 and KOI-94.03, in which the two planets transit the stellar
    disk simultaneously. Moreover, the two planets partially overlap with each other, and exhibit a "planet-planet eclipse"
    around the transit center. This provides a rare opportunity to put tight constraints on the configuration of the two transiting
    planets by joint analysis with our Subaru RM measurement. Indeed, we find that the projected mutual inclination of KOI-94.01
    and KOI-94.03 is estimated to be δ = -1fdg15 ± 0fdg55. Implications for the migration model of multiple planet systems
    are also discussed.
