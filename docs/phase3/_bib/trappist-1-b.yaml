- &id380
  arxiv_id: '2105.05858'
  ads_bibcode: 2021A&A...650A..94K
  title: A critical assessment of the applicability of the energy-limited approximation for estimating exoplanetary mass-loss
    rates
  authors:
  - Krenn, A. F.
  - Fossati, L.
  - Kubyshkina, D.
  - Lammer, H.
  year: '2021'
  pubdate: '2021-06-00'
  doi: 10.1051/0004-6361/202140437
  abstract: 'Context. The energy-limited atmospheric escape approach is widely used to estimate mass-loss rates for a broad
    range of planets that host hydrogen-dominated atmospheres as well as for performing atmospheric evolution calculations.
    <BR /> Aims: We aim to study the applicability range of the energy-limited atmospheric escape approximation. <BR /> Methods:
    We revise the energy-limited atmospheric escape formalism and the involved assumptions. We also compare the results of
    the energy-limited formalism with those of hydrodynamic simulations, employing a grid covering planets with masses, radii,
    and equilibrium temperatures ranging between 1 M<SUB>⊕</SUB> and 39 M<SUB>⊕</SUB>, 1 R<SUB>⊕</SUB> and 10 R<SUB>⊕</SUB>,
    and 300 and 2000 K, respectively. <BR /> Results: Within the grid boundaries, we find that the energy-limited approximation
    gives a correct order of magnitude estimate for mass-loss rates for about 76% of the planets, but there can be departures
    from hydrodynamic simulations by up to two to three orders of magnitude in individual cases. Furthermore, we find that
    planets for which the mass-loss rates are correctly estimated by the energy-limited approximation to within one order
    of magnitude have intermediate gravitational potentials (≈2.5-5.5 ×10<SUP>8</SUP> J kg<SUP>‒1</SUP>) as well as low-to-intermediate
    equilibrium temperatures and irradiation fluxes of extreme ultraviolet and X-ray radiation. However, for planets with
    low or high gravitational potentials, or high equilibrium temperatures and irradiation fluxes, the approximation fails
    in most cases. <BR /> Conclusions: The energy-limited approximation should not be used for planetary evolution calculations
    that require computing mass-loss rates for planets that cover a broad parameter space. In this case, it is very likely
    that the energy-limited approximation would at times return mass-loss rates of up to several orders of magnitude above
    or below those predicted by hydrodynamic simulations. For planetary atmospheric evolution calculations, interpolation
    routines or approximations based on grids of hydrodynamic models should be used instead.'
