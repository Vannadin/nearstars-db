  title: 'An evaluation of the C/N ratio of the mantle from natural CO<SUB>2</SUB>-rich gas analysis: Geochemical and cosmochemical
    implications'
  authors:
  - Marty, Bernard
  - Almayrac, Matthieu
  - Barry, Peter H.
