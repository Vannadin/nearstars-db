- &id552
  arxiv_id: '1912.06913'
  ads_bibcode: 2020ApJ...888L..21G
  title: Is π Men c’s Atmosphere Hydrogen-dominated? Insights from a Non-detection of H I Lyα Absorption
  authors:
  - García Muñoz, A.
  - Youngblood, A.
  - Fossati, L.
  - Gandolfi, D.
  - Cabrera, J.
  - Rauer, H.
  year: '2020'
  pubdate: '2020-01-00'
  doi: 10.3847/2041-8213/ab61ff
  abstract: 'Constraining the composition of super-Earth-to-sub-Neptune-sized planets is a priority in order to understand
    the processes of planetary formation and evolution. π Men c represents a unique target for the atmospheric and compositional
    characterization of such planets because it is strongly irradiated and its bulk density is consistent with abundant H<SUB>2</SUB>O.
    We searched for hydrogen from photodissociating H<SUB>2</SUB>/H<SUB>2</SUB>O in π Men c''s upper atmosphere through H
    I Lyα transmission spectroscopy with the Hubble Space Telescope’s Space Telescope Imaging Spectrograph, but did not detect
    it. We set 1σ (3σ) upper limits for the effective planet-to-star size ratio R <SUB>Lyα </SUB>/R <SUB>⋆</SUB> = 0.13 (0.24)
    and 0.12 (0.20) at velocities [-215, -91] km s<SUP>-1</SUP> and [+57, +180] km s<SUP>-1</SUP>, respectively. We reconstructed
    the stellar spectrum, and estimate that π Men c receives about 1350 erg cm<SUP>-2</SUP> s<SUP>-1</SUP> of 5-912 Å energy,
    enough to cause rapid atmospheric escape. An interesting scenario to explain the non-detection is that π Men c''s atmosphere
    is dominated by H<SUB>2</SUB>O or other heavy molecules rather than H<SUB>2</SUB>/He. According to our models, abundant
    oxygen results in less extended atmospheres, which transition from neutral to ionized hydrogen closer to the planet. We
    compare our non-detection to other detection attempts, and tentatively identify two behaviors: planets with densities
    ≲2 g cm<SUP>-3</SUP> (and likely hydrogen-dominated atmospheres) result in H I Lyα absorption, whereas planets with densities
    ≳3 g cm<SUP>-3</SUP> (and plausibly non-hydrogen-dominated atmospheres) do not result in measurable absorption. Investigating
    a sample of strongly irradiated sub-Neptunes may provide some statistical confirmation if it is shown that they do not
    generally develop extended atmospheres.'
