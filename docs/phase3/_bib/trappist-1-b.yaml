  title: 'An HST optical-to-near-IR transmission spectrum of the hot Jupiter WASP-19b: detection of atmospheric water and
    likely absence of TiO'
  authors:
  - Huitson, C. M.
  - Sing, D. K.
  - Pont, F.
  - Fortney, J. J.
  - Burrows, A. S.
  - Wilson, P. A.
  - Ballester, G. E.
  - Nikolov, N.
  - Gibson, N. P.
  - Deming, D.
  - Aigrain, S.
  - Evans, T. M.
  - Henry, G. W.
  - Lecavelier des Etangs, A.
  - Showman, A. P.
  - Vidal-Madjar, A.
  - Zahnle, K.
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1093/mnras/stt1243
  abstract: We measure the transmission spectrum of WASP-19b from three transits using low-resolution optical spectroscopy
    from the Hubble Space Telescope (HST) Space Telescope Imaging Spectrograph (STIS). The STIS spectra cover a wavelength
    range of 0.29-1.03 μm, with resolving power R = 500. The optical data are combined with archival near-infrared data from
    the HST Wide Field Camera 3 (WFC3) G141 grism, covering the wavelength range from 1.087 to 1.687 μm, with resolving power
    R = 130. We reach signal-to-noise levels between 3000 and 11 000 in 0.1 μm bins when measuring the transmission spectra
    from 0.53-1.687 μm. WASP-19 is known to be a very active star, with the optical stellar flux varying by a few per cent
    over time. We correct the transit light curves for the effects of stellar activity using ground-based activity monitoring
    with the Cerro Tololo Inter-American Observatory. While we were not able to construct a transmission spectrum using the
    blue optical data because of the presence of large occulted starspots, we were able to use the spot crossings to help
    constrain the mean stellar spot temperature. To search for predicted features in the hot-Jupiter atmosphere, in addition
    to the transmission spectrum we also define spectral indices for differential radius (∆R<SUB>P</SUB>/R<SUB>⋆</SUB>) measurements
    to specifically search for the presence of TiO and alkali line features. Our measurements rule out TiO features predicted
    for a planet of WASP-19b's equilibrium temperature (2050 K) in the transmission spectrum at the 2.7-2.9σ confidence level,
    depending on atmospheric model formalism. The WFC3 transmission spectrum shows strong absorption features due to the presence
    of H<SUB>2</SUB>O, which is detected at the 4σ confidence level between 1.1 and 1.4 μm. The transmission spectra results
    indicate that WASP-19b is a planet with no or low levels of TiO and without a high C/O ratio. The lack of observable TiO
    features are possibly due to rainout, breakdown from stellar activity or the presence of other absorbers in the optical.
