- &id032
  arxiv_id: '2211.06140'
  ads_bibcode: 2022ApJ...941L...7G
  title: Interior Heating of Rocky Exoplanets from Stellar Flares with Application to TRAPPIST-1
  authors:
  - Grayver, Alexander
  - Bower, Dan J.
  - Saur, Joachim
  - Dorn, Caroline
  - Morris, Brett M.
  year: '2022'
  pubdate: '2022-12-00'
  doi: 10.3847/2041-8213/aca287
  abstract: Many stars of different spectral types with planets in the habitable zone are known to emit flares. Until now,
    studies that address the long-term impact of stellar flares and associated coronal mass ejections (CMEs) assumed that
    the planet's interior remains unaffected by interplanetary CMEs, only considering the effect of plasma/UV interactions
    on the atmosphere of planets. Here, we show that the magnetic flux carried by flare-associated CMEs results in planetary
    interior heating by ohmic dissipation and leads to a variety of interior-exterior interactions. We construct a physical
    model to study this effect and apply it to the TRAPPIST-1 star whose flaring activity has been constrained by Kepler observations.
    Our model is posed in a stochastic manner to account for uncertainty and variability in input parameters. Particularly
    for the innermost planets, our results suggest that the heat dissipated in the silicate mantle is both of sufficient magnitude
    and longevity to drive geological processes and hence facilitate volcanism and outgassing of the TRAPPIST-1 planets. Furthermore,
    our model predicts that Joule heating can further be enhanced for planets with an intrinsic magnetic field compared to
    those without. The associated volcanism and outgassing may continuously replenish the atmosphere and thereby mitigate
    the erosion of the atmosphere caused by the direct impact of flares and CMEs. To maintain consistency of atmospheric and
    geophysical models, the impact of stellar flares and CMEs on atmospheres of close-in exoplanetary systems needs to be
    studied in conjunction with the effect on planetary interiors.
  source: citation_of=2023Natur.618...39G
