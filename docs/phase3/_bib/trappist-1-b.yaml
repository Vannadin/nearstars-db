- &id790
  arxiv_id: '2003.03231'
  ads_bibcode: 2020JGRA..12527639G
  title: Atmospheric Escape Processes and Planetary Atmospheric Evolution
  authors:
  - Gronoff, G.
  - Arras, P.
  - Baraka, S.
  - Bell, J. M.
  - Cessateur, G.
  - Cohen, O.
  - Curry, S. M.
  - Drake, J. J.
  - Elrod, M.
