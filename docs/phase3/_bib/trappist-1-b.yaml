  arxiv_id: '1607.00524'
  ads_bibcode: 2016AJ....152..100L
  title: 'EVEREST: Pixel Level Decorrelation of K2 Light Curves'
  authors:
  - Luger, Rodrigo
  - Agol, Eric
  - Kruse, Ethan
  - Barnes, Rory
