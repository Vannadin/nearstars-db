  arxiv_id: '1505.04046'
  ads_bibcode: 2015A&A...579A..66M
  title: 'X-Shooter study of accretion in ρ-Ophiucus: very low-mass stars and brown dwarfs'
  authors:
  - Manara, C. F.
  - Testi, L.
  - Natta, A.
  - Alcalá, J. M.
  year: '2015'
  pubdate: '2015-07-00'
  doi: 10.1051/0004-6361/201526169
  abstract: We present new VLT/X-Shooter optical and near-infrared spectra of a sample of 17 candidate young low-mass stars
    and brown dwarfs located in the ρ-Ophiucus cluster. We derived the spectral type and extinction for all the targets, and
    then we determined their physical parameters. All the objects but one have M<SUB>⋆</SUB>≲0.6 M<SUB>☉</SUB>, and eight
    have mass below or close to the hydrogen-burning limit. Using the intensity of various permitted emission lines present
    in their spectra, we determined the accretion luminosity and mass accretion rates (Ṁ<SUB>acc</SUB>) for all the objects.
    When compared with previous works targeting the same sample, we find that, in general, these objects are not as strongly
    accreting as previously reported, and we suggest that the reason is our more accurate estimate of the photospheric parameters.
    We also compare our findings with recent works in other slightly older star-forming regions, such as Lupus, to investigate
    possible differences in the accretion properties, but we find that the accretion properties for our targets have the same
    dependence on the stellar and substellar parameters as in the other regions. This leads us to conclude that we do not
    find evidence for a different dependence of Ṁ<SUB>acc</SUB> with M<SUB>⋆</SUB> when comparing low-mass stars and brown
    dwarfs. Moreover, we find a similar small (≲1 dex) scatter in the Ṁ<SUB>acc</SUB>-M<SUB>⋆</SUB> relation as in some of
    our recent works in other star-forming regions, and no significant differences in Ṁ<SUB>acc</SUB> due to different ages
    or properties of the regions. The latter result suffers, however, from low statistics and sample selection biases in the
    current studies. The small scatter in the Ṁ<SUB>acc</SUB>-M<SUB>⋆</SUB> correlation confirms that mass accretion rate
    measurements in the literature based on uncertain photospheric parameters and single accretion indicators, such as the
    Hα width, can lead to a scatter that is unphysically large. Our studies show that only broadband spectroscopic surveys
    coupled with a detailed analysis of the photospheric and accretion properties allows us to properly study the evolution
    of disk accretion rates in star-forming regions. <P />This work is based on observations made with ESO Telescopes at the
    Paranal Observatory under programme ID 085.C-0876.Appendices are available in electronic form at <A href="http://www.aanda.org/10.1051/0004-6361/201526169/olm">http://www.aanda.org</A>
