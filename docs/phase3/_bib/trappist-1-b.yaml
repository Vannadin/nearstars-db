  arxiv_id: null
  ads_bibcode: 2004A&A...417.1173Z
  title: Dielectronic recombination data for dynamic finite-density plasmas. IV. The carbon isoelectronic sequence
  authors:
  - Zatsarinny, O.
  - Gorczyca, T. W.
  - Korista, K. T.
  - Badnell, N. R.
  - Savin, D. W.
  year: '2004'
  pubdate: '2004-04-00'
  doi: 10.1051/0004-6361:20034174
  abstract: Dielectronic recombination (DR) and radiative recombination (RR) data for carbon-like ions forming nitrogen-like
    ions have been calculated as part of the assembly of a level-resolved DR and RR database necessary for modelling of dynamic
    finite-density plasmas (Badnell et al. \cite{Badnell03}). Total DR and RR rate coefficients are presented and the results
    discussed for N<SUP>+</SUP> to Zn<SUP>24+</SUP>, as well as Kr<SUP>30+</SUP>, Mo<SUP>36+</SUP>, Cd<SUP>42+</SUP>, and
    Xe<SUP>48+</SUP>. We find that the 2-&gt; 2 (no change in the principal quantum number of the core electron) low-temperature
    DR does not scale smoothly with nuclear charge Z due to resonances straddling the ionization limit, thereby making explicit
    calculations for each ion necessary. The RR and DR data are suitable for modelling of solar and cosmic plasmas under conditions
    of collisional ionization equilibrium, photoionization equilibrium, and non-equilibrium ionization.
