  arxiv_id: null
  ads_bibcode: 2020JGRE..12506276W
  title: 'Venusian Habitable Climate Scenarios: Modeling Venus Through Time and Applications to Slowly Rotating Venus-Like
    Exoplanets'
  authors:
  - Way, M. J.
  - Del Genio, Anthony D.
  year: '2020'
  pubdate: '2020-05-00'
  doi: 10.1029/2019JE006276
  abstract: One popular view of Venus' climate history describes a world that has spent much of its life with surface liquid
    water, plate tectonics, and a stable temperate climate. Part of the basis for this optimistic scenario is the high deuterium
    to hydrogen ratio from the Pioneer Venus mission that was interpreted to imply Venus had a shallow ocean's worth of water
    throughout much of its history. Another view is that Venus had a long-lived (∼100 million years) primordial magma ocean
    with a CO<SUB>2</SUB> and steam atmosphere. Venus' long-lived steam atmosphere would sufficient time to dissociate most
    of the water vapor, allow significant hydrogen escape, and oxidize the magma ocean. A third scenario is that Venus had
    surface water and habitable conditions early in its history for a short period of time (&lt;1 Gyr), but that a moist/runaway
    greenhouse took effect because of a gradually warming Sun, leaving the planet desiccated ever since. Using a general circulation
    model, we demonstrate the viability of the first scenario using the few observational constraints available. We further
    speculate that large igneous provinces and the global resurfacing hundreds of millions of years ago played key roles in
    ending the clement period in its history and presenting the Venus we see today. The results have implications for what
    astronomers term "the habitable zone," and if Venus-like exoplanets exist with clement conditions akin to modern Earth,
    we propose to place them in what we term the "optimistic Venus zone."
