    geometry, accounting for turbulent heat transfer, and integrating recent and strong experimental constraints from mineral
    physics. We have explored different initial magma ocean viscosities, compositions, thermal boundary layer thicknesses
    and initial core temperatures. <P />We show that the cooling of a thick terrestrial magma ocean is a fast process, with
    the entire mantle becoming significantly more viscous within 20 kyr. Due to the slope difference between the adiabats
    and the melting curves, the solidification of the molten mantle occurs from the bottom up. In the meantime, a crust forms
    due to the high surface radiative heat flow, the last drop of fully molten silicate is restricted to the upper mantle.
    Among the studied parameters, the magma ocean lifetime is primarily governed by its viscosity. Depending on the thermal
    boundary layer thickness at the core-mantle boundary, the thermal coupling between the core and magma ocean can either
    insulate the core during the magma ocean solidification and favor a hot core or drain the heat out of the core simultaneously
    with the cooling of the magma ocean. Reasonable thickness for the thermal boundary layer, however, suggests rapid core
    cooling until the core-mantle boundary temperature results in a sluggish lowermost mantle. Once the crystallization of
    the lowermost mantle becomes significant, the efficiency of the core heat loss decreases. Since a hotter liquidus favors
    crystallization at hotter temperatures, a hotter deep mantle liquidus favors heat retention within the core. In the context
    of an initially fully molten mantle, it is difficult to envision the formation of a basal magma ocean or to prevent a
    major heat depletion of the core. As a consequence, an Earth's geodynamo sustained only by core cooling during 4 Gyr seems
    unlikely and other sources of motion need to be invoked.
