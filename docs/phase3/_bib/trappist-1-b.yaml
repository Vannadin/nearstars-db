  ads_bibcode: 2023MNRAS.523L..86Q
  title: '3D Global climate model of an exo-Venus: a modern Venus-like atmosphere for the nearby super-Earth LP 890-9 c'
  authors:
  - Quirino, Diogo
  - Gilli, Gabriella
  - Kaltenegger, Lisa
  - Navarro, Thomas
  - Fauchez, Thomas J.
