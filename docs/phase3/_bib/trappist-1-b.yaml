  arxiv_id: null
  ads_bibcode: 2006MNRAS.373.1227D
  title: Stable satellites around extrasolar giant planets
  authors:
  - Domingos, R. C.
  - Winter, O. C.
  - Yokoyama, T.
  year: '2006'
  pubdate: '2006-12-00'
  doi: 10.1111/j.1365-2966.2006.11104.x
  abstract: In this work, we study the stability of hypothetical satellites of extrasolar planets. Through numerical simulations
    of the restricted elliptic three-body problem we found the borders of the stable regions around the secondary body. From
    the empirical results, we derived analytical expressions of the critical semimajor axis beyond which the satellites would
    not remain stable. The expressions are given as a function of the eccentricities of the planet, e<SUB>P</SUB>, and of
    the satellite, e<SUB>sat</SUB>. In the case of prograde satellites, the critical semimajor axis, in the units of Hill's
    radius, is given by a<SUB>E</SUB> ~ 0.4895 (1.0000 - 1.0305e<SUB>P</SUB> - 0.2738e<SUB>sat</SUB>). In the case of retrograde
    satellites, it is given by a<SUB>E</SUB> ~ 0.9309 (1.0000 - 1.0764e<SUB>P</SUB> - 0.9812e<SUB>sat</SUB>). We also computed
    the satellite stability region (a<SUB>E</SUB>) for a set of extrasolar planets. The results indicate that extrasolar planets
    in the habitable zone could harbour the Earth-like satellites.
