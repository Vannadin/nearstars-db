  arxiv_id: '1712.01166'
  ads_bibcode: 2018A&A...610A..57B
  title: Excitation and charge transfer in low-energy hydrogen atom collisions with neutral oxygen
  authors:
  - Barklem, P. S.
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.1051/0004-6361/201731968
  abstract: Excitation and charge transfer in low-energy O+H collisions is studied; it is a problem of importance for modelling
    stellar spectra and obtaining accurate oxygen abundances in late-type stars including the Sun. The collisions have been
    studied theoretically using a previously presented method based on an asymptotic two-electron linear combination of atomic
    orbitals (LCAO) model of ionic-covalent interactions in the neutral atom-hydrogen-atom system, together with the multichannel
    Landau-Zener model. The method has been extended to include configurations involving excited states of hydrogen using
    an estimate for the two-electron transition coupling, but this extension was found to not lead to any remarkably high
    rates. Rate coefficients are calculated for temperatures in the range 1000-20 000 K, and charge transfer and (de)excitation
    processes involving the first excited S-states, 4s.<SUP>5</SUP>S<SUP>o</SUP> and 4s.<SUP>3</SUP>S<SUP>o</SUP>, are found
    to have the highest rates. <P />Data are available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr">http://cdsarc.u-strasbg.fr</A>
    (<A href="http://cdsarc.u-strasbg.fr">http://130.79.128.5</A>) or via <A href="http://cdsarc.u-strasbg.fr/vizbin/qcat?J/A+A/610/A57">http://cdsarc.u-strasbg.fr/vizbin/qcat?J/A+A/610/A57</A>.
    The data are also available at <A href="https://github.com/barklem/public-data">https://github.com/barklem/public-data</A>
