  arxiv_id: '2002.11115'
  ads_bibcode: 2020ApJ...891L...7M
  title: The Interior and Atmosphere of the Habitable-zone Exoplanet K2-18b
  authors:
  - Madhusudhan, Nikku
  - Nixon, Matthew C.
  - Welbanks, Luis
  - Piette, Anjali A. A.
  - Booth, Richard A.
  year: '2020'
  pubdate: '2020-03-00'
  doi: 10.3847/2041-8213/ab7229
  abstract: Exoplanets orbiting M-dwarfs present a valuable opportunity for their detection and atmospheric characterization.
    This is evident from recent inferences of H<SUB>2</SUB>O in such atmospheres, including that of the habitable-zone exoplanet
    K2-18b. With a bulk density between Earth and Neptune, K2-18b may be expected to possess a H/He envelope. However, the
    extent of such an envelope and the thermodynamic conditions of the interior remain unexplored. In the present work, we
    investigate the atmospheric and interior properties of K2-18b based on its bulk properties and its atmospheric transmission
    spectrum. We constrain the atmosphere to be H<SUB>2</SUB>-rich with a H<SUB>2</SUB>O volume mixing ratio of 0.02%-14.8%,
    consistent with previous studies, and find a depletion of CH<SUB>4</SUB> and NH<SUB>3</SUB>, indicating chemical disequilibrium.
    We do not conclusively detect clouds/hazes in the observable atmosphere. We use the bulk parameters and retrieved atmospheric
    properties to constrain the internal structure and thermodynamic conditions in the planet. The constraints on the interior
    allow multiple scenarios between rocky worlds with massive H/He envelopes and water worlds with thin envelopes. We constrain
    the mass fraction of the H/He envelope to be ≲6%; spanning ≲10<SUP>-5</SUP> for a predominantly water world to ∼6% for
    a pure iron interior. The thermodynamic conditions at the surface of the H<SUB>2</SUB>O layer range from the supercritical
    to liquid phases, with a range of solutions allowing for habitable conditions on K2-18b. Our results demonstrate that
    the potential for habitable conditions is not necessarily restricted to Earth-like rocky exoplanets.
