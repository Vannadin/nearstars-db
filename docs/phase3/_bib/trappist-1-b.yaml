  arxiv_id: '1302.6538'
  ads_bibcode: 2013ApJ...768L...4J
  title: 'Molecular-kinetic Simulations of Escape from the Ex-planet and Exoplanets: Criterion for Transonic Flow'
  authors:
  - Johnson, Robert E.
  - Volkov, Alexey N.
  - Erwin, Justin T.
  year: '2013'
  pubdate: '2013-05-00'
  doi: 10.1088/2041-8205/768/1/L4
  abstract: The equations of gas dynamics are extensively used to describe atmospheric loss from solar system bodies and exoplanets
    even though the boundary conditions at infinity are not uniquely defined. Using molecular-kinetic simulations that correctly
    treat the transition from the continuum to the rarefied region, we confirm that the energy-limited escape approximation
    is valid when adiabatic expansion is the dominant cooling process. However, this does not imply that the outflow goes
    sonic. Rather large escape rates and concomitant adiabatic cooling can produce atmospheres with subsonic flow that are
    highly extended. Since this affects the heating rate of the upper atmosphere and the interaction with external fields
    and plasmas, we give a criterion for estimating when the outflow goes transonic in the continuum region. This is applied
    to early terrestrial atmospheres, exoplanet atmospheres, and the atmosphere of the ex-planet, Pluto, all of which have
    large escape rates.
