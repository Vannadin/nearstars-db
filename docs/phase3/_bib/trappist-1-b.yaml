  year: '2013'
  pubdate: '2013-03-00'
  doi: 10.1086/670067
  abstract: We introduce a stable, well tested Python implementation of the affine-invariant ensemble sampler for Markov chain
    Monte Carlo (MCMC) proposed by Goodman &amp; Weare (2010). The code is open source and has already been used in several
    published projects in the astrophysics literature. The algorithm behind emcee has several advantages over traditional
    MCMC sampling methods and it has excellent performance as measured by the autocorrelation time (or function calls per
    independent sample). One major advantage of the algorithm is that it requires hand-tuning of only 1 or 2 parameters compared
    to ∼N<SUP>2</SUP> for a traditional algorithm in an N-dimensional parameter space. In this document, we describe the algorithm
    and the details of our implementation. Exploiting the parallelism of the ensemble method, emcee permits any user to take
    advantage of multiple CPU cores without extra effort. The code is available online at <A href="http://dan.iel.fm/emcee">http://dan.iel.fm/emcee</A>
    under the GNU General Public License v2.
