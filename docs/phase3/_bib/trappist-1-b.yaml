  pubdate: '2025-05-00'
  doi: 10.1051/0004-6361/202554062
  abstract: Recent JWST observations with NIRCam and MIRI of the ultra-short-period super-Earth 55 Cancri e indicate a possible
    volatile atmosphere surrounding the planet. Previous analysis of the NIRCam spectra suggested potential absorption features
    from CO<SUB>2</SUB> or CO and significant sub-weekly variability. The MIRI low-resolution spectrum does not contain substantial
    features but was found to be consistent with effective heat redistribution models. For this study, we computed a grid
    of over 25 000 self-consistent 1D forward models incorporating H─N─O─C─S─P─Si─Ti equilibrium chemistry and assessed plausible
    atmospheric compositions based on the current JWST data. Despite exhaustive analysis, the composition and properties of
    the atmosphere remain elusive. While our results statistically favour a global, hydrogen-free, nitrogen-dominated atmosphere
    enriched in PO and CO<SUB>2</SUB>, various alternative compositions, including H<SUB>2</SUB>O─, CO─, PH<SUB>3</SUB>─,
    or Si-bearing, remain viable explanations. Unconstrained heat redistribution efficiency and absolute NIRCam flux are among
    the largest sources of uncertainty in our analysis. We also find that the heat redistribution factor and surface pressure
    are highly degenerate with atmospheric composition, and that these parameters cannot be independently constrained using
    current JWST observations. Furthermore, we show that the observed variability may arise from dynamic interactions between
    the atmosphere and an underlying magma ocean, driving rapid shifts in atmospheric chemistry and thermal emission. Our
    results highlight the importance of using self-consistent forward models when analysing novel JWST spectra with limited
    signal-to-noise ratios ─ such as those of 55 Cancri e ─ as it allows for a more comprehensive evaluation of potential
    atmospheric scenarios while also being less sensitive to subtle spectral differences than retrievals. Future JWST observations,
    particularly at longer wavelengths with MIRI imaging mode to obtain broadband photometry, could help mitigate compositional
    degeneracies and provide further insight into variability. Constraining the heat redistribution value through phase curve
    measurements would also significantly reduce degeneracies. For a more complete characterisation of this iconic super-Earth,
    high-precision spectra are essential.
