  ads_bibcode: 2018AsBio..18..630M
  title: 'Exoplanet Biosignatures: Understanding Oxygen as a Biosignature in the Context of Its Environment'
  authors:
  - Meadows, Victoria S.
  - Reinhard, Christopher T.
  - Arney, Giada N.
  - Parenteau, Mary N.
  - Schwieterman, Edward W.
  - Domagal-Goldman, Shawn D.
  - Lincowski, Andrew P.
  - Stapelfeldt, Karl R.
  - Rauer, Heike
  - DasSarma, Shiladitya
  - Hegde, Siddharth
  - Narita, Norio
  - Deitrick, Russell
  - Lustig-Yaeger, Jacob
  - Lyons, Timothy W.
  - Siegler, Nicholas
