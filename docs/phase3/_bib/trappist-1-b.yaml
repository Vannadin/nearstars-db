    transform our understanding of the universe and humanity's place in it. Every decade the U.S. agencies that provide primary
    federal funding for astronomy and astrophysics request a survey to assess the status of, and opportunities for the Nation's
    efforts to forward our understanding of the cosmos. Pathways to Discovery in Astronomy and Astrophysics for the 2020s
    identifies the most compelling science goals and presents an ambitious program of ground- and space-based activities for
    future investment in the next decade and beyond. The decadal survey identifies three important science themes for the
    next decade aimed at investigating Earth-like extrasolar planets, the most energetic processes in the universe, and the
    evolution of galaxies. The Astro2020 report also recommends critical near-term actions to support the foundations of the
    profession as well as the technologies and tools needed to carry out the science.
