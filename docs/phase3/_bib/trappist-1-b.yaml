  ads_bibcode: 2022PNAS..11917933T
  title: The case and context for atmospheric methane as an exoplanet biosignature
  authors:
  - Thompson, Maggie A.
  - Krissansen-Totton, Joshua
  - Wogan, Nicholas
  - Telus, Myriam
  - Fortney, Jonathan J.
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.1073/pnas.2117933119
  abstract: Astronomers will soon begin searching for biosignatures, atmospheric gases or surface features produced by life,
    on potentially habitable planets. Since methane is the only biosignature that the James Webb Space Telescope could readily
    detect in terrestrial atmospheres, it is imperative to understand methane biosignatures to contextualize these upcoming
    observations. We explore the necessary planetary context for methane to be a persuasive biosignature and assess whether,
    and in what planetary environments, abiotic sources of methane could result in false-positive scenarios. With these results,
    we provide a tentative framework for assessing methane biosignatures. If life is abundant in the universe, then with the
