  abstract: A thermodynamic database on all iron phases (BCC, FCC, HCP and melt) has been created using thermochemical and
    equations of state data from experiments and theory. The database permits the calculation of the phase diagram of iron
    to physical conditions of the Earth's core (pressure of 365 GPa and temperature of 6453 K). If the inner core were all
