- &id166
  arxiv_id: '2307.08770'
  ads_bibcode: 2022A&A...665A.130V
  title: Tidal excitation of the obliquity of Earth-like planets in the habitable zone of M-dwarf stars
  authors:
  - Valente, Ema F. S.
  - Correia, Alexandre C. M.
  year: '2022'
  pubdate: '2022-09-00'
  doi: 10.1051/0004-6361/202244010
  abstract: Close-in planets undergo strong tidal interactions with the parent star that modify their spins and orbits. In
    the two-body problem, the final stage for tidal evolution is the synchronisation of the rotation and orbital periods,
    and the alignment of the planet spin axis with the normal to the orbit (zero planet obliquity). The orbital eccentricity
    is also damped to zero, but over a much longer timescale, that may exceed the lifetime of the system. For non-zero eccentricities,
    the rotation rate can be trapped in spin-orbit resonances that delay the evolution towards the synchronous state. Here
    we show that capture in some spin-orbit resonances may also excite the obliquity to high values rather than damp it to
    zero. Depending on the system parameters, obliquities of 60º-80º can be maintained throughout the entire lifetime of the
    planet. This unexpected behaviour is particularly important for Earth-like planets in the habitable zone of M-dwarf stars,
    as it may help to sustain temperate environments and thus more favourable conditions for life.
  source: citation_of=2025ApJ...980L...7W
