  abstract: Jupiter's upper atmosphere is considerably hotter than expected from the amount of sunlight that it receives<SUP>1-3</SUP>.
    Processes that couple the magnetosphere to the atmosphere give rise to intense auroral emissions and enormous deposition
    of energy in the magnetic polar regions, so it has been presumed that redistribution of this energy could heat the rest
    of the planet<SUP>4-6</SUP>. Instead, most thermospheric global circulation models demonstrate that auroral energy is
    trapped at high latitudes by the strong winds on this rapidly rotating planet<SUP>3,5,7-10</SUP>. Consequently, other
    possible heat sources have continued to be studied, such as heating by gravity waves and acoustic waves emanating from
    the lower atmosphere<SUP>2,11-13</SUP>. Each mechanism would imprint a unique signature on the global Jovian temperature
    gradients, thus revealing the dominant heat source, but a lack of planet-wide, high-resolution data has meant that these
    gradients have not been determined. Here we report infrared spectroscopy of Jupiter with a spatial resolution of 2 degrees
    in longitude and latitude, extending from pole to equator. We find that temperatures decrease steadily from the auroral
    polar regions to the equator. Furthermore, during a period of enhanced activity possibly driven by a solar wind compression,
    a high-temperature planetary-scale structure was observed that may be propagating from the aurora. These observations
    indicate that Jupiter's upper atmosphere is predominantly heated by the redistribution of auroral energy.
