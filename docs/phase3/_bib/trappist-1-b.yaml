  arxiv_id: '1211.1673'
  ads_bibcode: 2013MNRAS.431.3444C
  title: 'The minimum-mass extrasolar nebula: in situ formation of close-in super-Earths'
  authors:
  - Chiang, Eugene
  - Laughlin, Gregory
  year: '2013'
  pubdate: '2013-06-00'
  doi: 10.1093/mnras/stt424
  abstract: Close-in super-Earths, with radii R ≈ 2-5R<SUB>⊕</SUB> and orbital periods P &lt; 100 d, orbit more than half,
    and perhaps nearly all, Sun-like stars in the Universe. We use this omnipresent population to construct the minimum-mass
    extrasolar nebula (MMEN), the circumstellar disc of solar-composition solids and gas from which such planets formed, if
    they formed near their current locations and did not migrate. In a series of back-of-the-envelope calculations, we demonstrate
    how in situ formation in the MMEN is fast, efficient, and can reproduce many of the observed properties of close-in super-Earths,
    including their gas-to-rock fractions. Testable predictions are discussed.
