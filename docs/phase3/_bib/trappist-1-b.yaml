  arxiv_id: '1907.13135'
  ads_bibcode: 2019ApJ...886..142M
  title: Analyzing Atmospheric Temperature Profiles and Spectra of M Dwarf Rocky Planets
  authors:
  - Malik, Matej
  - Kempton, Eliza M.-R.
  - Koll, Daniel D. B.
  - Mansfield, Megan
  - Bean, Jacob L.
  - Kite, Edwin
  year: '2019'
