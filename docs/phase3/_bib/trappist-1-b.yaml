- &id486
  arxiv_id: null
  ads_bibcode: 2024MNRAS.535.2404H
  title: Thermal evolution of lava planets
  authors:
  - Herath, Mahesh
  - Boukaré, Charles-Édouard
  - Cowan, Nicolas B.
  year: '2024'
  pubdate: '2024-12-00'
  doi: 10.1093/mnras/stae2431
  abstract: 'Rocky planets typically form with a transient magma ocean. Lava planets, however, maintain a permanent day-side
    magma ocean. The extent of this magma ocean depends on the planet''s thermal history. We present numerical simulations
    of the thermal history of tidally locked lava planets over 10 billion years, starting from a completely molten mantle.
    The day-side surface temperature is fixed at 3000 K, while the night-side surface temperature cools by thermal radiation.
    We consider planets with radii of 1.0 and 1.5<inline-formula><tex-math id="TM0001" notation="LaTeX">${\rm R}_{\oplus}$</tex-math></inline-formula>;
    super-Earths have shallower steady-state magma oceans due to their greater gravity. The night-side begins crystallizing
    within a few thousand years, fully solidifying in 800 Myr, in the absence of tidal heating or day-night heat transport.
    We find that a mushy night-side can persist if at least 20 per cent of absorbed stellar power is transferred from the
    day to night hemisphere through magma currents, which would be feasible at a viscosity of <inline-formula><tex-math id="TM0002"
    notation="LaTeX">$10^{-3}$</tex-math></inline-formula> Pa s. Maintaining a fully molten night-side by magma ocean circulation
    would require unrealistically low viscosities and therefore appears unlikely. Alternatively, the night-side may remain
    molten if the mush layer dissipates tidal energy at a rate of <inline-formula><tex-math id="TM0003" notation="LaTeX">$8
    \times 10^{-4}$</tex-math></inline-formula> W kg<SUP>-1</SUP>, which is plausible for orbital eccentricities greater than
    <inline-formula><tex-math id="TM0004" notation="LaTeX">$7 \times 10^{-3}$</tex-math></inline-formula>. Night-side cooling,
    however, is a runaway process: increasing viscosity and mush solidification hinder both heat transport and tidal heating.
    Our results highlight the importance of measuring the night-side temperatures of lava planets, which would provide crucial
    insights into their thermal histories.'
