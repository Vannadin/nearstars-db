  abstract: On our way toward the characterization of smaller and more temperate planets, missions dedicated to the spectroscopic
    observation of exoplanets will teach us about the wide diversity of classes of planetary atmospheres, many of them probably
    having no equivalent in the Solar System. But what kind of atmospheres can we expect? To start answering this question,
    many theoretical studies have tried to understand and model the various processes controlling the formation and evolution
    of planetary atmospheres, with some success in the Solar System. Here, we shortly review these processes and we try to
    give an idea of the various type of atmospheres that these processes can create. As will be made clear, current atmosphere
    evolution models have many shortcomings yet, and need heavy calibrations. With that in mind, we will thus discuss how
    observations with a mission similar to EChO would help us unravel the link between a planet's environment and its atmosphere.
