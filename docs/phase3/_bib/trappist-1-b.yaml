  title: Monitoring the radio emission of Proxima Centauri
  authors:
  - Pérez-Torres, M.
  - Gómez, J. F.
  - Ortiz, J. L.
  - Leto, P.
  - Anglada, G.
  - Gómez, J. L.
  - Rodríguez, E.
  - Trigilio, C.
  - Amado, P. J.
  - Alberdi, A.
  - Anglada-Escudé, G.
  - Osorio, M.
  - Umana, G.
