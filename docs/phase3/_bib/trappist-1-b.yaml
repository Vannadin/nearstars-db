  arxiv_id: '2302.11561'
  ads_bibcode: 2023ApJ...946L..32C
  title: Sporadic Spin-orbit Variations in Compact Multiplanet Systems and Their Influence on Exoplanet Climate
  authors:
  - Chen, Howard
  - Li, Gongjie
  - Paradise, Adiv
  - Kopparapu, Ravi K.
  year: '2023'
  pubdate: '2023-04-00'
  doi: 10.3847/2041-8213/acbd33
  abstract: Climate modeling has shown that tidally influenced terrestrial exoplanets, particularly those orbiting M-dwarfs,
    have unique atmospheric dynamics and surface conditions that may enhance their likelihood to host viable habitats. However,
    sporadic libration and rotation induced by planetary interactions, such as those due to mean motion resonances (MMR) in
    compact planetary systems, may destabilize attendant exoplanets away from synchronized states (1:1 spin-orbit ratios).
    Here, we use a three-dimensional N-rigid-body integrator and an intermediately complex general circulation model to simulate
    the evolving climates of TRAPPIST-1 e and f with different orbital- and spin-evolution pathways. Planet f scenarios perturbed
    by MMR effects with chaotic spin variations are colder and dryer compared to their synchronized counterparts due to the
    zonal drift of the substellar point away from open ocean basins of their initial eyeball states. On the other hand, the
    differences between perturbed and synchronized planet e are minor due to higher instellation, warmer surfaces, and reduced
    climate hysteresis. This is the first study to incorporate the time-dependent outcomes of direct gravitational N-rigid-body
    simulations into 3D climate modeling of extrasolar planets, and our results show that planets at the outer edge of the
    habitable zones in compact multiplanet systems are vulnerable to rapid global glaciations. In the absence of external
    mechanisms such as orbital forcing or tidal heating, these planets could be trapped in permanent snowball states.
