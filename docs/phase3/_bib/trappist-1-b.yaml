  title: Probing Terrestrial Exoplanet Atmospheric Escape By Observing H2O and CO2 Isotopologue Bands with the James Webb
    Space Telescope
  authors:
  - Lincowski, Andrew
  - Lustig-Yaeger, Jacob
  - Meadows, Victoria
  year: '2019'
  pubdate: '2019-01-00'
  doi: null
  abstract: Terrestrial planets orbiting M dwarfs may soon be observed with the James Webb Space Telescope (JWST) to characterize
    their atmospheric composition and search for signs of habitability or even life. However, due to the super-luminous pre-main-sequence
    phase of the M dwarf host stars, their terrestrial planets may undergo significant atmospheric and ocean loss. Past atmospheric
    escape from terrestrial planets, especially around M dwarfs, may compromise the planet's habitability and leave behind
    abiotically generated oxygen, which could be a false positive for the detection of life. Consequently, determining if
    ocean loss has occurred will help assess a planet's habitability and whether or not any O2 detected is biogenic. In the
    Solar System, differences in isotopic abundances have been used to infer the history of ocean loss and atmospheric escape
    (e.g. Venus, Mars). We find that similar measurements using transit transmission spectra of terrestrial planets around
    late-type M dwarfs like TRAPPIST-1 are within the observation capabilities of JWST, if the escape mechanisms and resulting
    isotopic fractionation are as severe as experienced by Venus (~D/H=100 times Earth's). Isotopologue bands are present
    throughout the near-infrared (1-8 μm), including unique bands between 3-4 μm. We present analyses of O2- and CO2-dominated
    atmospheres, containing a range of trace gas abundances. Transit signals of up to 100 ppm are possible for both HDO and
    16O12C18O isotopologues with fractionation of 100 times Earth's D/H or 18O/16O, respectively, when CO2 is not the bulk
    gas. For TRAPPIST-1 b, the most likely in that system to have experienced ocean loss, these signals can be detected in
    10 transits to attain S/N=5, with optimal use of JWST NIRSpec Prism. Consequently, H2O and CO2 isotopologues could be
    used as indicators of ocean loss and atmospheric escape when planning observations with JWST of terrestrial planets around
    M dwarfs.
