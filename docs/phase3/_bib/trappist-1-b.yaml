  arxiv_id: '2412.14072'
  ads_bibcode: null
  title: Ohmic heating in the upper atmosphere of hot exoplanets The influence of a time-varying magnetic field
  authors:
  - A. Strugarek
  - A. García Muñoz
  - A. S. Brun
  - A. Paul
  year: '2024'
  pubdate: '2024-12-18'
  doi: 10.1051/0004-6361/202452641
  abstract: Exoplanets on close-in orbit are subject to intense X-ray and ultraviolet (XUV) irradiation from their star. Their
    atmosphere therefore heats up, sometimes to the point where it thermally escapes from the gravitational potential of the
    planet. Nonetheless, XUV is not the only source of heating in such atmospheres. Indeed, close-in exoplanets are embedded
    in a medium (the stellar wind) with strong magnetic fields that can significantly vary along the orbit. The variations
    of this magnetic field can induce currents in the upper atmosphere, which dissipate and locally heat it up through Ohmic
    heating. The aim of this work is to quantify Ohmic heating in the upper atmosphere of hot exoplanets due to an external
    time-varying magnetic field, and to compare it to the XUV heating. Ohmic heating depends strongly on the conductivity
    properties of the upper atmosphere. A 1D formalism is developed to assess the level and the localization of Ohmic heating
    depending on the conductivity profile, and applied to the specific cases of Trappist-1 b and $π$ Men c. Ohmic heating
    can reach values up to 10$^{-3}$ erg s$^{-1}$ cm$^{-3}$ in the upper atmospheres of hot exoplanets. It is expected to
    be stronger the closer the planet is and the lower the central star mass is, as these conditions maximize the strength
    of the ambient magnetic field around the planet. We confirm that Ohmic heating can play an important role in setting the
    thermal budget of the upper atmosphere of hot exoplanets, and can even surpass the XUV heating in the most favorable cases.
    When it is strong, a corollary is that the upper atmosphere screens efficiently time-varying external magnetic fields,
    preventing them to penetrate deeper in the atmosphere or inside the planet itself. We find that both Trappist-1b and $π$
    Men c are likely subject to intense Ohmic heating.
