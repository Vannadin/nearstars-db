  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.3847/2041-8205/822/1/L4
  abstract: We present a primary transit observation for the ultra-hot (T <SUB>eq</SUB> ∼ 2400 K) gas giant expolanet WASP-121b,
    made using the Hubble Space Telescope Wide Field Camera 3 in spectroscopic mode across the 1.12-1.64 μm wavelength range.
    The 1.4 μm water absorption band is detected at high confidence (5.4σ) in the planetary atmosphere. We also reanalyze
    ground-based photometric light curves taken in the B, r′, and z′ filters. Significantly deeper transits are measured in
    these optical bandpasses relative to the near-infrared wavelengths. We conclude that scattering by high-altitude haze
    alone is unlikely to account for this difference and instead interpret it as evidence for titanium oxide and vanadium
    oxide absorption. Enhanced opacity is also inferred across the 1.12-1.3 μm wavelength range, possibly due to iron hydride
    absorption. If confirmed, WASP-121b will be the first exoplanet with titanium oxide, vanadium oxide, and iron hydride
    detected in transmission. The latter are important species in M/L dwarfs and their presence is likely to have a significant
    effect on the overall physics and chemistry of the atmosphere, including the production of a strong thermal inversion.
