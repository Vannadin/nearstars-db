- &id652
  arxiv_id: '1409.0730'
  ads_bibcode: 2014A&A...571A..94S
  title: Heating efficiency in hydrogen-dominated upper atmospheres
  authors:
  - Shematovich, V. I.
  - Ionov, D. E.
  - Lammer, H.
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1051/0004-6361/201423573
  abstract: 'Context. The heating efficiency η<SUB>hν</SUB> is defined as the ratio of the net local gas-heating rate to the
    rate of stellar radiative energy absorption. It plays an important role in thermal-escape processes from the upper atmospheres
    of planets that are exposed to stellar soft X-rays and extreme ultraviolet radiation (XUV). <BR /> Aims: We model the
    thermal-escape-related heating efficiency η<SUB>hν</SUB> of the stellar XUV radiation in the hydrogen-dominated upper
    atmosphere of the extrasolar gas giant HD 209458b. The model result is then compared with previous thermal-hydrogen-escape
    studies, which assumed η<SUB>hν</SUB> values between 10-100%. <BR /> Methods: The photolytic and electron impact processes
    in the thermosphere were studied by solving the kinetic Boltzmann equation and applying a Direct Simulation Monte Carlo
    model. We calculated the energy deposition rates of the stellar XUV flux and that of the accompanying primary photoelectrons
    that are caused by electron impact processes in the H<SUB>2</SUB>→ H transition region in the upper atmosphere. <BR />
    Results: The heating by XUV radiation of hydrogen-dominated upper atmospheres does not reach higher values than 20% above
    the main thermosphere altitude, if the participation of photoelectron impact processes is included. <BR /> Conclusions:
    Hydrogen-escape studies from exoplanets that assume η<SUB>hν</SUB> values that are ≥20% probably overestimate the thermal
    escape or mass-loss rates, while those who assumed values that are &lt;20% produce more realistic atmospheric-escape rates.'
