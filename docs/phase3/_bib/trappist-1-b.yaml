- arxiv_id: null
  ads_bibcode: 2019AAS...23320402M
  title: Photometric and Spectroscopic Perspectives Stellar Magnetic Activity and Its Effect on Exoplanet Characterization
  authors:
  - Morris, Brett M.
  year: '2019'
  pubdate: '2019-01-00'
  doi: null
  abstract: Exoplanets have been discovered principally via the transit method, which reveals planetary radii and orbital
    periods. Transits reveal the composition of exoplanet atmospheres via transmission spectroscopy. When the planet passes
    in front of the host star, the planet will appear largest at wavelengths where the planet's atmosphere is opaque, and
    smallest at wavelengths where the atmosphere is transparent. Thus by measuring the apparent radius of the planet as a
    function of wavelength, we attain a spectrum of an exoplanet's atmosphere. In transiting multi-planet systems, we can
    also measure the masses of exoplanets by using transit timing variations. The orbit of a single transiting planet around
    a single star would be perfectly periodic, but if there's more than one planet in the system the gravitational influence
    of each planet on each other pulls the planets slightly ahead or behind in their orbits. The apparent early or late arrival
    of an exoplanet transit transmits information about the mass of the perturbing planet. However, stellar magnetic activity
    injects confounding time- and wavelength-dependent signals into the spectrophotometry of exoplanet host stars which complicate
    all of these measurements. I used the transiting planet HAT-P-11 b to measure the sizes and latitude distribution of starspots
    on its active K4 dwarf host star, and find that its magnetic activity mirrors the Sun's. I measured the chromospheric
    activity of HAT-P-11 and compared it to similar stars, and find that it's the most active of its peers, perhaps suggestive
    of star-planet interaction. I measured starspot coverage on a sample of bright stars via TiO molecular band modeling.
    With ground-based photometry, I measured the transit times of TRAPPIST-1 b and c, and several Kepler host stars. I devised
