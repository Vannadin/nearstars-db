- &id745
  arxiv_id: null
  ads_bibcode: 2017Icar..282..237H
  title: 'Structure and density of Callisto''s atmosphere from a fluid-kinetic model of its ionosphere: Comparison with Hubble
    Space Telescope and Galileo observations'
  authors:
  - Hartkorn, Oliver
  - Saur, Joachim
  - Strobel, Darrell F.
  year: '2017'
  pubdate: '2017-01-00'
  doi: 10.1016/j.icarus.2016.09.020
  abstract: We develop a model of the ionospheric electron population of Jupiter's moon Callisto using a prescribed neutral
    atmosphere composed of O<SUB>2</SUB>, CO<SUB>2</SUB> and H<SUB>2</SUB>O. A kinetic description of ionospheric suprathermal
    electrons coupled with a fluid description of ionospheric thermal electrons is well suited to jointly analyze and interpret
    observations of electron density and atmospheric UV emission. Accordingly, we calculate the electron energy distribution
    function at each point in the ionosphere by solving a coupled set of equations consisting of the Boltzmann equation for
    suprathermal electrons and the continuity and energy equation for thermal electrons. We assume a stationary balance between
    local sources and sinks of electrons and electron energy. Electron transport within the ionosphere is neglected, since
    collision time scales are shorter than transport time scales in the region of Callisto's ionosphere where the major concentrations
    of electrons is located and the major part of the atmospheric UV emission is generated. We consider photoionization, which
    is the dominant ionospheric electron source, and secondary ionization from collisions of photoelectrons with neutrals.
    Our calculations yield electron densities and electron impact generated UV emissions from Callisto's atmosphere. Comparing
    our modeled UV emission intensities with the Hubble Space Telescope observation of Cunningham et al. (2015) , we find
    that Callisto's atmosphere has a mean O<SUB>2</SUB> column density of 2.1<SUB>-1.1</SUB><SUP>+1.1</SUP> ×10<SUP>19</SUP>
    m-<SUP>2</SUP>. A joint comparison with this HST observation and radio occultation observations of Kliore et al. (2002)
    shows that Callisto's atmosphere possesses a day night asymmetry. We derive terminator O<SUB>2</SUB> column densities
    of ∼ 0.4 × 10<SUP>19</SUP> m-<SUP>2</SUP> , for which we find subsolar O<SUB>2</SUB> column densities in the range of
    2.4 - 9.8 ×10<SUP>19</SUP> m-<SUP>2</SUP>. Our calculations also show that the electron density is very sensitive to the
    relative abundance of H<SUB>2</SUB>O due to the thermal electron cooling by rotational state excitation of H<SUB>2</SUB>O.
    For the efficiency of Callisto's atmospheric UV emission we find that on average one photon is emitted at OI λ135.6 nm
    per every 170 electron ion pairs generated and per every 60 electron ion pairs produced by secondary electron impact ionization.
  source: citation_of=2022A&A...668A..10F
