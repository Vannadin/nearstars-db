  arxiv_id: '1802.02250'
  ads_bibcode: 2018NatAs...2..214D
  title: Atmospheric reconnaissance of the habitable-zone Earth-sized planets orbiting TRAPPIST-1
  authors:
  - de Wit, Julien
  - Wakeford, Hannah R.
  - Lewis, Nikole K.
  - Delrez, Laetitia
  - Gillon, Michaël
  - Selsis, Frank
  - Leconte, Jérémy
  - Demory, Brice-Olivier
  - Bolmont, Emeline
  - Bourrier, Vincent
  - Burgasser, Adam J.
  - Grimm, Simon
  - Jehin, Emmanuël
  - Lederer, Susan M.
  - Owen, James E.
  - Stamenković, Vlada
  - Triaud, Amaury H. M. J.
  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.1038/s41550-017-0374-z
  abstract: Seven temperate Earth-sized exoplanets readily amenable for atmospheric studies transit the nearby ultracool dwarf
    star TRAPPIST-1 (refs <SUP>1,2</SUP>). Their atmospheric regime is unknown and could range from extended primordial hydrogen-dominated
    to depleted atmospheres<SUP>3-6</SUP>. Hydrogen in particular is a powerful greenhouse gas that may prevent the habitability
    of inner planets while enabling the habitability of outer ones<SUP>6-8</SUP>. An atmosphere largely dominated by hydrogen,
    if cloud-free, should yield prominent spectroscopic signatures in the near-infrared detectable during transits. Observations
    of the innermost planets have ruled out such signatures<SUP>9</SUP>. However, the outermost planets are more likely to
    have sustained such a Neptune-like atmosphere<SUP>10, 11</SUP>. Here, we report observations for the four planets within
    or near the system's habitable zone, the circumstellar region where liquid water could exist on a planetary surface<SUP>12-14</SUP>.
    These planets do not exhibit prominent spectroscopic signatures at near-infrared wavelengths either, which rules out cloud-free
    hydrogen-dominated atmospheres for TRAPPIST-1 d, e and f, with significance of 8σ, 6σ and 4σ, respectively. Such an atmosphere
    is instead not excluded for planet g. As high-altitude clouds and hazes are not expected in hydrogen-dominated atmospheres
    around planets with such insolation<SUP>15, 16</SUP>, these observations further support their terrestrial and potentially
    habitable nature.
