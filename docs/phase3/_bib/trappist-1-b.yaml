  title: Infrared Transmission Spectroscopy of the Exoplanets HD 209458b and XO-1b Using the Wide Field Camera-3 on the Hubble
    Space Telescope
  authors:
  - Deming, Drake
  - Wilkins, Ashlee
  - McCullough, Peter
  - Burrows, Adam
  - Fortney, Jonathan J.
  - Agol, Eric
  - Dobbs-Dixon, Ian
  - Madhusudhan, Nikku
