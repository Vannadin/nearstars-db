  arxiv_id: '2002.08727'
  ads_bibcode: 2020NatAs...4..577V
  title: Coherent radio emission from a quiescent red dwarf indicative of star-planet interaction
  authors:
  - Vedantham, H. K.
  - Callingham, J. R.
  - Shimwell, T. W.
  - Tasse, C.
  - Pope, B. J. S.
  - Bedell, M.
  - Snellen, I.
  - Best, P.
  - Hardcastle, M. J.
  - Haverkorn, M.
  - Mechev, A.
  - O'Sullivan, S. P.
  - Röttgering, H. J. A.
  - White, G. J.
  year: '2020'
  pubdate: '2020-02-00'
  doi: 10.1038/s41550-020-1011-9
  abstract: Low-frequency (ν ≲ 150 MHz) stellar radio emission is expected to originate in the outer corona at heights comparable
    to and larger than the stellar radius. Such emission from the Sun has been used to study coronal structure, mass ejections
    and space-weather conditions around the planets<SUP>1</SUP>. Searches for low-frequency emission from other stars have
    detected only a single active flare star<SUP>2</SUP> that is not representative of the wider stellar population. Here
    we report the detection of low-frequency radio emission from a quiescent star, GJ 1151—a member of the most common stellar
    type (red dwarf or spectral class M) in the Galaxy. The characteristics of the emission are similar to those of planetary
    auroral emissions<SUP>3</SUP> (for example, Jupiter's decametric emission), suggesting a coronal structure dominated by
    a global magnetosphere with low plasma density. Our results show that large-scale currents that power radio aurorae operate
    over a vast range of mass and atmospheric composition, ranging from terrestrial planets to main-sequence stars. The Poynting
    flux required to produce the observed radio emission cannot be generated by GJ 1151's slow rotation, but can originate
    in a sub-Alfvénic interaction of its magnetospheric plasma with a short-period exoplanet. The emission properties are
    consistent with theoretical expectations<SUP>4-7</SUP> for interaction with an Earth-size planet in an approximately one-
    to five-day-long orbit.
