  ads_bibcode: 2024Natur.632.1021C
  title: Earth's ambipolar electrostatic field and its role in ion escape to space
  authors:
  - Collinson, Glyn A.
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.1038/s41586-024-07480-3
  abstract: Cold plasma of ionospheric origin has recently been found to be a much larger contributor to the magnetosphere
    of Earth than expected<SUP>1, 2-3</SUP>. Numerous competing mechanisms have been postulated to drive ion escape to space,
    including heating and acceleration by wave-particle interactions<SUP>4</SUP> and a global electrostatic field between
    the ionosphere and space (called the ambipolar or polarization field)<SUP>5,6</SUP>. Observations of heated O<SUP>+</SUP>
    ions in the magnetosphere are consistent with resonant wave-particle interactions<SUP>7</SUP>. By contrast, observations
    of cold supersonic H<SUP>+</SUP> flowing out of the polar ionosphere<SUP>8,9</SUP> (called the polar wind) suggest the
    presence of an electrostatic field. Here we report the existence of a +0.55 ± 0.09 V electric potential drop between 250
    km and 768 km from a planetary electrostatic field (E<SUB>∥</SUB>⊕ = 1.09 ± 0.17 μV m<SUP>‒1</SUP>) generated exclusively
    by the outward pressure of ionospheric electrons. We experimentally demonstrate that the ambipolar field of Earth controls
    the structure of the polar ionosphere, boosting the scale height by 271%. We infer that this increases the supply of cold
    O<SUP>+</SUP> ions to the magnetosphere by more than 3,800%, in which other mechanisms such as wave-particle interactions
    can heat and further accelerate them to escape velocity. The electrostatic field of Earth is strong enough by itself to
    drive the polar wind<SUP>9,10</SUP> and is probably the origin of the cold H<SUP>+</SUP> ion population<SUP>1</SUP> that
    dominates much of the magnetosphere<SUP>2,3</SUP>.
