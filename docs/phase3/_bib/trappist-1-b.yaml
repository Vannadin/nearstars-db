- &id171
  arxiv_id: '2202.05909'
  ads_bibcode: 2022ApJ...928...91C
  title: 'Habitable Planet Formation around Low-mass Stars: Rapid Accretion, Rapid Debris Removal, and the Essential Contribution
    of External Giants'
  authors:
  - Clement, Matthew S.
  - Quintana, Elisa V.
  - Quarles, Billy L.
  year: '2022'
  pubdate: '2022-03-00'
  doi: 10.3847/1538-4357/ac549e
  abstract: In recent years, a paradigm shift has occurred in exoplanet science, wherein low-mass stars are increasingly viewed
    as a foundational pillar of the search for potentially habitable worlds in the solar neighborhood. However, the formation
    processes of this rapidly accumulating sample of planet systems are still poorly understood. Moreover, it is unclear whether
    tenuous primordial atmospheres around these Earth analogs could have survived the intense epoch of heightened stellar
    activity that is typical for low-mass stars. We present new simulations of in situ planet formation across the M-dwarf
    mass spectrum, and derive leftover debris populations of small bodies that might source delayed volatile delivery. We
    then follow the evolution of this debris with high-resolution models of real systems of habitable zone planets around
    low-mass stars such as TRAPPIST-1, Proxima Centauri, and TOI-700. While debris in the radial vicinity of the habitable
    zone planets is removed rapidly, thus making delayed volatile delivery highly unlikely, we find that material ubiquitously
    scattered into an exo-asteroid belt region during the planet-formation process represents a potentially lucrative reservoir
    of icy small bodies. Thus, the presence of external approximately Neptune-Saturn mass planets capable of dynamically perturbing
    these asteroids would be a sign that habitable zone worlds around low-mass stars might have avoided complete desiccation.
    However, we also find that such giant planets significantly limit the efficiency of asteroidal implantation during the
    planet-formation process. In the coming decade, long-baseline radial velocity studies and Roman Space Telescope microlensing
    observations will undoubtedly further constrain this process.
