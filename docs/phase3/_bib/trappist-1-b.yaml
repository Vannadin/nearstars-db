- &id197
  arxiv_id: '1907.07459'
  ads_bibcode: 2019ApJ...882L..16D
  title: 'Role of Planetary Obliquity in Regulating Atmospheric Escape: G-dwarf versus M-dwarf Earth-like Exoplanets'
  authors:
  - Dong, Chuanfei
  - Huang, Zhenguang
  - Lingam, Manasvi
  year: '2019'
  pubdate: '2019-09-00'
  doi: 10.3847/2041-8213/ab372c
  abstract: We present a three-species (H<SUP>+</SUP>, O<SUP>+</SUP> and e<SUP>-</SUP>) multi-fluid magnetohydrodynamic model,
    endowed with the requisite upper-atmospheric chemistry, that is capable of accurately quantifying the magnitude of oxygen
    ion losses from “Earth-like” exoplanets in habitable zones, whose magnetic and rotational axes are roughly coincidental
    with one another. We apply this model to investigate the role of planetary obliquity in regulating atmospheric losses
    from a magnetic perspective. For Earth-like exoplanets orbiting solar-type stars, we demonstrate that the dependence of
    the total atmospheric ion loss rate on the planetary (magnetic) obliquity is relatively weak; the escape rates are found
    to vary between 2.19 × 10<SUP>26</SUP> s<SUP>-1</SUP> to 2.37 × 10<SUP>26</SUP> s<SUP>-1</SUP>. In contrast, the obliquity
    can influence the atmospheric escape rate (∼10<SUP>28</SUP> s<SUP>-1</SUP>) by more than a factor of 2 (or 200%) in the
    case of Earth-like exoplanets orbiting late-type M-dwarfs. Thus, our simulations indicate that planetary obliquity may
    play a weak-to-moderate role insofar as the retention of an atmosphere (necessary for surface habitability) is concerned.
  source: citation_of=2025ApJ...980L...7W
