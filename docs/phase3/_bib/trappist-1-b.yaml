  arxiv_id: '2004.02728'
  ads_bibcode: 2020NatAs...4..986H
  title: Sulfur-driven haze formation in warm CO<SUB>2</SUB>-rich exoplanet atmospheres
  authors:
  - He, Chao
  - Hörst, Sarah M.
  - Lewis, Nikole K.
  - Yu, Xinting
  - Moses, Julianne I.
  - McGuiggan, Patricia
  - Marley, Mark S.
  - Kempton, Eliza M.-R.
  - Moran, Sarah E.
  - Morley, Caroline V.
  - Vuitton, Véronique
  year: '2020'
  pubdate: '2020-04-00'
  doi: 10.1038/s41550-020-1072-9
  abstract: Sulfur gases substantially affect the photochemistry of planetary atmospheres in our Solar System, and are expected
    to be important components in exoplanet atmospheres. However, sulfur photochemistry in the context of exoplanets is poorly
    understood due to a lack of chemical kinetics information for sulfur species under relevant conditions. Here, we study
    the photochemical role of hydrogen sulfide (H<SUB>2</SUB>S) in warm CO<SUB>2</SUB>-rich exoplanet atmospheres (800 K)
    by carrying out laboratory simulations. We find that H<SUB>2</SUB>S plays a prominent role in photochemistry, even when
    present in the atmosphere at relatively low concentrations (1.6%). It participates in both gas and solid phase chemistry,
    leading to the formation of other sulfur gas products (CH<SUB>3</SUB>SH/SO, C<SUB>2</SUB>H<SUB>4</SUB>S/OCS, SO<SUB>2</SUB>/S<SUB>2</SUB>
    and CS<SUB>2</SUB>) and to an increase in solid haze particle production and compositional complexity. Our study shows
    that we may expect thicker haze with small particle sizes (20-140 nm) for warm CO<SUB>2</SUB>-rich exoplanet atmospheres
    that possess H<SUB>2</SUB>S.
