  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.3847/1538-3881/adbe75
  abstract: The full range of conditions under which rocky planets can host atmospheres remains poorly understood, especially
    in the regime of close-in orbits around late-type stars. One way to assess the presence of atmospheres on rocky exoplanets
    is to measure their dayside emission as they are eclipsed by their host stars. Here, we present Spitzer observations of
    the 4.5 μm secondary eclipses of the rocky super-Earth TOI-431 b, whose mass and radius indicate an Earth-like bulk composition
    (3.07 ± 0.35 M<SUB>⊕</SUB>, 1.28 ± 0.04 R<SUB>⊕</SUB>). Exposed to more than 2000 times the irradiation of Earth, dayside
    temperatures of up to 2400 K are expected if the planet is a dark bare rock without a significant atmosphere. Intriguingly,
    despite the strong stellar insolation, we measure a secondary-eclipse depth of only 33 ± 22 ppm, which corresponds to
    a dayside brightness temperature of <inline-formula> </inline-formula> K. This notably low eclipse depth disagrees with
    the dark bare-rock scenario at the 2.5σ level, and suggests either that the planet is surrounded by an atmosphere or that
    it is a bare rock with a highly reflective surface. In the atmosphere scenario, the low dayside emission implies the efficient
    redistribution of heat to the nightside, or by molecular absorption in the 4─5 μm bandpass. In the bare-rock scenario,
    a surface composition made of a high-albedo mineral species such as ultramafic rock can lead to reduced thermal emission
    consistent with low eclipse depth measurement. Follow-up spectroscopic observations with the James Webb Space Telescope
    hold the key to constraining the nature of the planet.
