  arxiv_id: null
  ads_bibcode: 2011JGRE..116.9008C
  title: 'The tidal history of Iapetus: Spin dynamics in the light of a refined dissipation model'
  authors:
  - Castillo-Rogez, Julie C.
  - Efroimsky, Michael
  - Lainey, Valéry
  year: '2011'
  pubdate: '2011-09-00'
  doi: 10.1029/2010JE003664
  abstract: We study the tidal history of an icy moon, basing our approach on a dissipation model, which combines viscoelasticity
    with anelasticity and takes into account the microphysics of attenuation. We apply this approach to Iapetus, the most
    remote large icy moon in the Saturnian system. Different authors provide very different estimates for Iapetus's despinning
    timescale, by several orders of magnitude. One reason for these differences is the choice of the dissipation model used
    for computing the spin evolution. As laboratory data on viscoelastic properties of planetary ices are sparse, many studies
    relied on dissipation models that turned out to be inconsistent with experiment. A pure water ice composition, generally
    assumed in the previous studies of the kind, yields despinning times of the order of 3.7 Gyr for most initial conditions.
    We demonstrate that through accounting for the complexity of the material (like second-phase impurities) one arrives at
    despinning times as short as 0.9 Gyr. A more exact estimate will remain unavailable until we learn more about the influence
    of impurities on ice dissipation. By including the triaxial-shape-caused torque, we encounter a chaotic behavior at the
    final stage of despinning, with the possibility of entrapments in the intermediate resonances. The duration of these entrapments
    turns out to be sensitive to the dissipation model. No long entrapments have been found for Iapetus described with our
    laboratory-based dissipation model.
