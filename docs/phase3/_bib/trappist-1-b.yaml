  arxiv_id: '2012.05922'
  ads_bibcode: 2021ApJ...913..130H
  title: Stellar Winds Drive Strong Variations in Exoplanet Evaporative Outflow Patterns and Transit Absorption Signatures
  authors:
  - Harbach, Laura M.
  - Moschou, Sofia P.
  - Garraffo, Cecilia
