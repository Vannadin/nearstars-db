- &id582
  arxiv_id: '1808.08377'
  ads_bibcode: 2018AJ....156..114K
  title: 'Detectability of Biosignatures in Anoxic Atmospheres with the James Webb Space Telescope: A TRAPPIST-1e Case Study'
  authors:
  - Krissansen-Totton, Joshua
  - Garland, Ryan
  - Irwin, Patrick
  - Catling, David C.
  year: '2018'
  pubdate: '2018-09-00'
  doi: 10.3847/1538-3881/aad564
  abstract: The James Webb Space Telescope (JWST) may be capable of finding biogenic gases in the atmospheres of habitable
    exoplanets around low-mass stars. Considerable attention has been given to the detectability of biogenic oxygen, which
    could be found using an ozone proxy, but ozone detection with JWST will be extremely challenging, even for the most favorable
    targets. Here, we investigate the detectability of biosignatures in anoxic atmospheres analogous to those that likely
    existed on the early Earth. Arguably, such anoxic biosignatures could be more prevalent than oxygen biosignatures if life
    exists elsewhere. Specifically, we simulate JWST retrievals of TRAPPIST-1e to determine whether the methane plus carbon
    dioxide disequilibrium biosignature pair is detectable in transit transmission. We find that ∼10 transits using the Near
    InfraRed Spectrograph prism instrument may be sufficient to detect carbon dioxide and constrain methane abundances sufficiently
    well to rule out known, nonbiological CH<SUB>4</SUB> production scenarios to ∼90% confidence. Furthermore, it might be
    possible to put an upper limit on carbon monoxide abundances that would help rule out nonbiological methane-production
    scenarios, assuming the surface biosphere would efficiently draw down atmospheric CO. Our results are relatively insensitive
    to high-altitude clouds and instrument noise floor assumptions, although stellar heterogeneity and variability may present
    challenges.
  source: citation_of=2025ApJ...990L..53G
