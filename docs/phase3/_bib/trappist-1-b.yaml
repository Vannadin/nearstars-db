- &id304
  arxiv_id: '1805.07328'
  ads_bibcode: 2018AJ....156...42D
  title: Ground-based Optical Transmission Spectroscopy of the Small, Rocky Exoplanet GJ 1132b
  authors:
  - Diamond-Lowe, Hannah
  - Berta-Thompson, Zachory
  - Charbonneau, David
  - Kempton, Eliza M.-R.
  year: '2018'
  pubdate: '2018-08-00'
  doi: 10.3847/1538-3881/aac6dd
  abstract: Terrestrial solar system planets either have high mean molecular weight atmospheres, as with Venus, Mars, and
    Earth, or no atmosphere at all, as with Mercury. We do not have sufficient observational information to know if this is
    typical of terrestrial planets or a phenomenon unique to the solar system. The bulk of atmospheric exoplanet studies have
    focused on hot Jupiters and Neptunes, but recent discoveries of small, rocky exoplanets transiting small, nearby stars
    provide targets that are amenable to atmospheric study. GJ 1132b has a radius of 1.2 R <SUB>⊕</SUB> and a mass of 1.6
    M <SUB>⊕</SUB>, and orbits an M dwarf 12 parsecs away from the solar system. We present results from five transits of
    GJ 1132b taken with the Magellan Clay Telescope and the LDSS3C multi-object spectrograph. We jointly fit our five data
    sets when determining the best-fit transit parameters both for the white light curve and wavelength-binned light curves.
    We bin the light curves into 20 nm wavelength bands to construct the transmission spectrum. Our results disfavor a clear,
    10× solar metallicity atmosphere at 3.7σ confidence and a 10% H<SUB>2</SUB>O, 90% H<SUB>2</SUB> atmosphere at 3.5σ confidence.
    Our data are consistent with a featureless spectrum, implying that GJ 1132b has a high mean molecular weight atmosphere
    or no atmosphere at all, though we do not account for the possible presence of aerosols. This result is in agreement with
    theoretical work suggesting that a planet of GJ 1132b’s mass and insolation should not be able to retain a H<SUB>2</SUB>
    envelope.
