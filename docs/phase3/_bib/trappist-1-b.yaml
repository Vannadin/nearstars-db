  doi: 10.1051/0004-6361/201219849
  abstract: '<BR /> Aims: The knowledge of how the specific intensity is distributed over the stellar disk is crucial for
    interpreting the light curves of extrasolar transiting planets, double-lined eclipsing binaries, and other astrophysical
    phenomena. To provide theoretical inputs for light curve modelling codes, we present new calculations of limb-darkening
    coefficients for the spherically symmetric phoenix models. <BR /> Methods: The limb-darkening coefficients were computed
    by covering the transmission curves of Kepler, CoRoT, and Spitzer space missions, as well as the passbands of the Strömgren,
    Johnson-Cousins, Sloan, and 2MASS. These computations adopted the least-square method. In addition, we also calculated
    the linear and bi-parametric approximations by adopting the flux conservation method as an additional tool for estimating
    the theoretical error bars in the limb-darkening coefficients. <BR /> Results: Six laws were used to describe the specific
    intensity distribution: linear, quadratic, square root, logarithmic, exponential, and a more general one with 4 terms.
    The computations are presented for the solar chemical composition, with log g varying between 2.5 and 5.5 and effective
    temperatures between 1500-4800 K. The adopted microturbulent velocity and the mixing-length parameters are 2.0 km s<SUP>-1</SUP>
    and 2.0, respectively. <P />Tables 2-25 are only available at the CDS via anonymous ftp to cdsarc.u-strasbg.fr (130.79.128.5)
    or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/546/A14">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/546/A14</A>'
