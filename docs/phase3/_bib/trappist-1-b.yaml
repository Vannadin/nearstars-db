  ads_bibcode: 2025Natur.638...69P
  title: Io's tidal response precludes a shallow magma ocean
  authors:
  - Park, R. S.
  - Jacobson, R. A.
  - Gomez Casajus, L.
  - Nimmo, F.
  - Ermakov, A. I.
  - Keane, J. T.
  - McKinnon, W. B.
  - Stevenson, D. J.
  - Akiba, R.
  - Idini, B.
  - Buccino, D. R.
  - Magnanini, A.
  - Parisi, M.
  - Tortora, P.
  - Zannoni, M.
  - Mura, A.
  - Durante, D.
  - Iess, L.
  - Connerney, J. E. P.
  - Levin, S. M.
  - Bolton, S. J.
  year: '2025'
  pubdate: '2025-02-00'
  doi: 10.1038/s41586-024-08442-5
  abstract: Io experiences tidal deformation as a result of its eccentric orbit around Jupiter, which provides a primary energy
    source for Io's continuing volcanic activity and infrared emission<SUP>1</SUP>. The amount of tidal energy dissipated
    within Io is enormous and has been suggested to support the large-scale melting of its interior and the formation of a
    global subsurface magma ocean. If Io has a shallow global magma ocean, its tidal deformation would be much larger than
    in the case of a more rigid, mostly solid interior<SUP>2</SUP>. Here we report the measurement of Io's tidal deformation,
    quantified by the gravitational tidal Love number k<SUB>2</SUB>, enabled by two recent flybys of the Juno spacecraft.
    By combining Juno<SUP>3,4</SUP> and Galileo<SUP>5, 6─7</SUP> Doppler data from the NASA Deep Space Network and astrometric
    observations, we recover Re(k<SUB>2</SUB>) of 0.125 ± 0.047 (1σ) and the tidal dissipation parameter Q of 11.4 ± 3.6 (1σ).
    These measurements confirm that a shallow global magma ocean in Io does not exist and are consistent with Io having a
    mostly solid mantle<SUP>2</SUP>. Our results indicate that tidal forces do not universally create global magma oceans,
    which may be prevented from forming owing to rapid melt ascent, intrusion and eruption<SUP>8,9</SUP>, so even strong tidal
    heating—such as that expected on several known exoplanets and super-Earths<SUP>10</SUP>—may not guarantee the formation
    of magma oceans on moons or planetary bodies.
