  doi: 10.1002/2015JA021149
  abstract: The Jovian moon, Europa, hosts a thin neutral gas atmosphere, which is tightly coupled to Jupiter's magnetosphere.
    Magnetospheric ions impacting the surface sputter off neutral atoms, which, upon ionization, carry currents that modify
    the magnetic field around the moon. The magnetic field in the plasma is also affected by Europa's induced magnetic field.
    In this paper we investigate the environment of Europa using our multifluid MHD model and focus on the effects introduced
    by both the magnetospheric and the pickup ion populations. The model self-consistently derives the electron temperature
    that governs the electron impact ionization process, which is the major source of ionization in this environment. The
    resulting magnetic field is compared to measurements performed by the Galileo magnetometer, the bulk properties of the
    modeled thermal plasma population is compared to the Galileo Plasma Subsystem observations, and the modeled surface precipitation
    fluxes are compared to Galileo Ultraviolet Spectrometer observations. The model shows good agreement with the measured
    magnetic field and reproduces the basic features of the plasma interaction observed at the moon for both the E4 and the
    E26 flybys of the Galileo spacecraft. The simulation also produces perturbations asymmetric about the flow direction that
    account for observed asymmetries.
