  year: '2025'
  pubdate: '2025-05-00'
  doi: 10.3847/PSJ/adcd5f
  abstract: We use a one-dimensional line-by-line radiative─convective model to simulate hot, dense terrestrial-planet atmospheres.
    We find that strong shortwave absorption by H<SUB>2</SUB>O and CO<SUB>2</SUB> inhibits near-surface convection, reducing
    surface temperatures by up to ∼2000 K compared to fully convective predictions. Pure-CO<SUB>2</SUB> atmospheres are typically
    1000 K cooler than pure H<SUB>2</SUB>O, with only a few percent of H<SUB>2</SUB>O required to elevate surface temperatures
    by hundreds of kelvins for a fixed incident stellar radiation. We also show that minor greenhouse gases such as SO<SUB>2</SUB>
    and NH<SUB>3</SUB> have a limited warming effect when H<SUB>2</SUB>O is abundant. We find that even for insolation values
    as high as 12,500 W m<SUP>−2</SUP> (37 × Earth's) planets with mixed CO<SUB>2</SUB>─H<SUB>2</SUB>O envelopes have surface
    temperatures in the 1200─2000 K range, limiting surface melting. Our results highlight the critical role of shortwave
    heating on magma ocean planets and the need for improved high-temperature spectroscopy beyond 20,000 cm<SUP>−1</SUP>.
