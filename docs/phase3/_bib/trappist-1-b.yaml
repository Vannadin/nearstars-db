  arxiv_id: '2204.13727'
  ads_bibcode: 2022MNRAS.513.6125N
  title: The impact of ultraviolet heating and cooling on the dynamics and observability of lava planet atmospheres
  authors:
  - Nguyen, T. Giang
  - Cowan, Nicolas B.
  - Pierrehumbert, Raymond T.
  - Lupu, Roxana E.
  - Moores, John E.
  year: '2022'
  pubdate: '2022-07-00'
  doi: 10.1093/mnras/stac1331
  abstract: Lava planets have non-global, condensible atmospheres similar to icy bodies within the Solar system. Because they
    depend on interior dynamics, studying the atmospheres of lava planets can lead to understanding unique geological processes
    driven by their extreme environment. Models of lava planet atmospheres have thus far focused on either radiative transfer
    or hydrodynamics. In this study, we couple the two processes by introducing ultraviolet (UV) and infrared (IR) radiation
    to a turbulent boundary layer model. We also test the effect of different vertical temperature profiles on atmospheric
    dynamics. Results from the model show that UV radiation affects the atmosphere much more than IR. UV heating and cooling
    work together to produce a horizontally isothermal atmosphere away from the substellar point regardless of the vertical
    temperature profile. We also find that stronger temperature inversions induce stronger winds and hence cool the atmosphere.
    Our simulated transmission spectra of the bound atmosphere show a strong SiO feature in the UV that would be challenging
    to observe in the planet's transit spectrum due to the precision required. Our simulated emission spectra are more promising,
    with significant SiO spectral features at 4.5 and 9 $\mu$m that can be observed with the James Webb Space Telescope. Different
    vertical temperature profiles produce discernible dayside emission spectra, but not in the way one would expect.
