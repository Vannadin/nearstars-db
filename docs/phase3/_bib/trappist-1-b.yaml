  ads_bibcode: 2016GMD.....9.1937E
  title: Overview of the Coupled Model Intercomparison Project Phase 6 (CMIP6) experimental design and organization
  authors:
  - Eyring, Veronika
  - Bony, Sandrine
  - Meehl, Gerald A.
  - Senior, Catherine A.
  - Stevens, Bjorn
  - Stouffer, Ronald J.
  - Taylor, Karl E.
  year: '2016'
  pubdate: '2016-05-00'
  doi: 10.5194/gmd-9-1937-2016
  abstract: 'By coordinating the design and distribution of global climate model simulations of the past, current, and future
    climate, the Coupled Model Intercomparison Project (CMIP) has become one of the foundational elements of climate science.
    However, the need to address an ever-expanding range of scientific questions arising from more and more research communities
    has made it necessary to revise the organization of CMIP. After a long and wide community consultation, a new and more
    federated structure has been put in place. It consists of three major elements: (1) a handful of common experiments, the
    DECK (Diagnostic, Evaluation and Characterization of Klima) and CMIP historical simulations (1850-near present) that will
    maintain continuity and help document basic characteristics of models across different phases of CMIP; (2) common standards,
    coordination, infrastructure, and documentation that will facilitate the distribution of model outputs and the characterization
    of the model ensemble; and (3) an ensemble of CMIP-Endorsed Model Intercomparison Projects (MIPs) that will be specific
    to a particular phase of CMIP (now CMIP6) and that will build on the DECK and CMIP historical simulations to address a
    large range of specific questions and fill the scientific gaps of the previous CMIP phases. The DECK and CMIP historical
    simulations, together with the use of CMIP data standards, will be the entry cards for models participating in CMIP. Participation
    in CMIP6-Endorsed MIPs by individual modelling groups will be at their own discretion and will depend on their scientific
    interests and priorities. With the Grand Science Challenges of the World Climate Research Programme (WCRP) as its scientific
    backdrop, CMIP6 will address three broad questions: <BR /><BR /> - How does the Earth system respond to forcing?<BR /><BR
    /> - What are the origins and consequences of systematic model biases? <BR /><BR /> - How can we assess future climate
    changes given internal climate variability, predictability, and uncertainties in scenarios?<BR /><BR /> This CMIP6 overview
    paper presents the background and rationale for the new structure of CMIP, provides a detailed description of the DECK
    and CMIP6 historical simulations, and includes a brief introduction to the 21 CMIP6-Endorsed MIPs.'
