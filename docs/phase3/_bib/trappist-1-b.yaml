  arxiv_id: '2410.18183'
  ads_bibcode: 2025AJ....169...10P
  title: CRIRES<SUP>+</SUP> and ESPRESSO Reveal an Atmosphere Enriched in Volatiles Relative to Refractories on the Ultrahot
    Jupiter WASP-121b
  authors:
  - Pelletier, Stefan
  - Benneke, Björn
  - Chachan, Yayaati
  - Bazinet, Luc
  - Allart, Romain
  - Hoeijmakers, H. Jens
  - Lavail, Alexis
  - Prinoth, Bibiana
  - Coulombe, Louis-Philippe
  - Lothringer, Joshua D.
  - Parmentier, Vivien
  - Smith, Peter
  - Borsato, Nicholas
  - Thorsbro, Brian
  year: '2025'
  pubdate: '2025-01-00'
  doi: 10.3847/1538-3881/ad8b28
  abstract: One of the outstanding goals of the planetary science community is to measure the present-day atmospheric composition
    of planets and link this back to formation. As giant planets are formed by accreting gas, ices, and rocks, constraining
    the relative amounts of these components is critical to understand their formation and evolution. For most known planets,
    including the solar system giants, this is difficult as they reside in a temperature regime where only volatile elements
    (e.g., C, O) can be measured, while refractories (e.g., Fe, Ni) are condensed to deep layers of the atmosphere where they
    cannot be remotely probed. With temperatures allowing for even rock-forming elements to be in the gas phase, ultrahot
    Jupiter atmospheres provide a unique opportunity to simultaneously probe the volatile and refractory content of giant
    planets. Here, we directly measure and obtain bounded constraints on the abundances of volatile C and O as well as refractory
    Fe and Ni on the ultrahot giant exoplanet WASP-121b. We find that ice-forming elements are comparatively enriched relative
    to rock-forming elements, potentially indicating that WASP-121b formed in a volatile-rich environment much farther away
    from the star than where it is currently located. The simultaneous constraint of ice and rock elements in the atmosphere
    of WASP-121b provides insights into the composition of giant planets otherwise unattainable from solar system observations.
