  arxiv_id: null
  ads_bibcode: 2024JGRE..12908262S
  title: Ferric Iron Evolution During Crystallization of the Earth and Mars
  authors:
  - Schaefer, Laura
  - Pahlevan, Kaveh
  - Elkins-Tanton, Linda T.
  year: '2024'
  pubdate: '2024-09-00'
  doi: 10.1029/2023JE008262
  abstract: Magma ocean crystallization models that track fO<SUB>2</SUB> evolution can reproduce the D/H ratios of both the
    Earth and Mars without the need for exogenous processes. Fractional crystallization leads to compositional evolution of
    the bulk oxide components. Recent work suggests that metal-saturated magma oceans may contain near-present-day Fe<SUP>3+</SUP>
    concentrations. We model the fractional crystallization of Earth and Mars, including Fe<SUP>2+</SUP> and Fe<SUP>3+</SUP>
    as separate components. We calculate Fe<SUP>3+</SUP> partition coefficients for lower mantle minerals and compare the
    results of fractional crystallization for both Earth and Mars. We calculate oxygen fugacity (fO<SUB>2</SUB>) at the surface
    as the systems evolve and compare them to constraints on the fO<SUB>2</SUB> of the last magma ocean atmosphere from D/H
    ratios, both with and without metal saturation. For Earth, we find that Fe<SUP>3+</SUP> likely behaves incompatibly in
    the lower mantle in order to match the D/H constraint for whole mantle models, but shallow magma ocean models also provide
    reasonable matches. Disproportionation in whole mantle magma oceans likely overpredicts the amount of Fe<SUP>3+</SUP>
    and metal that form or require subsequent reduction to return to present-day values. For Mars, we cannot match the D/H
    constraints on last fO<SUB>2</SUB> unless the magma ocean begins with &lt;50% of the predicted Fe<SUP>3+</SUP>, but better
    match the present day mantle redox. We show that Fe<SUP>3+</SUP> partitioning has a measurable effect on magma ocean redox,
    and that it evolves throughout the magma ocean's lifetime. We highlight the need for additional experimental constraints
    on ferric iron mineral/melt partitioning and more thermodynamic data for the Fe-disproportionation reaction.
