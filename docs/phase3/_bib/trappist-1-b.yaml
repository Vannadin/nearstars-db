  abstract: In this letter we have made a comparative study of degradation of solar EUV radiation and EUV-generated photoelectrons
    in the inner comae of comets having different gas production rates, Q, with values 1 × 10<SUP>28</SUP>, 7 × 10<SUP>29</SUP>,
    1 × 10<SUP>31</SUP>, and 1 × 10<SUP>32</SUP> s<SUP>-1</SUP>. We found that in higher-Q comets the radial profile of H<SUB>2</SUB>O<SUP>+</SUP>
    photo-production rate depicts a double-peak structure and that the differences in sunward and anti-sunward photoionization
    rates are pronounced. We show that photoelectron impact ionization is an order of magnitude larger than photoionization
    rate near the lower photoionization peak in comets with Q &gt; ~1 × 10<SUP>31</SUP> s<SUP>-1</SUP>. The present study
    reveals the importance of photoelectrons relative to solar EUV as the ionization source in the inner coma of high-Q comets.
