  ads_bibcode: 2025ApJ...985L..10A
  title: Escaping Helium and a Highly Muted Spectrum Suggest a Metal-enriched Atmosphere on Sub-Neptune GJ 3090 b from JWST
    Transit Spectroscopy
  authors:
  - Ahrer, Eva-Maria
  - Radica, Michael
  - Piaulet-Ghorayeb, Caroline
  - Raul, Eshan
  - Wiser, Lindsey
