  ads_bibcode: 2009A&A...496..863C
  title: The relative role of EUV radiation and X-rays in the heating of hydrogen-rich exoplanet atmospheres
  authors:
  - Cecchi-Pestellini, C.
  - Ciaravella, A.
  - Micela, G.
  - Penz, T.
  year: '2009'
  pubdate: '2009-03-00'
  doi: 10.1051/0004-6361/200809955
  abstract: 'Aims: We study the relative role of EUV and X-ray radiation in the heating of hydrogen-rich planet atmospheres
    with different composition and electron content. <BR />Methods: An accurate photo-ionization model has been used to follow
    the primary photo-electron energy deposition throughout the atmosphere. <BR />Results: Heating rates and efficiencies
    have been computed, together with column density cut-offs at which photons of given energies stop their heating production
    inside the atmosphere. Assuming 100 eV as the energy borderline between the extreme ultraviolet spectral range and X-rays
    we find that when the absorbing hydrogen column density is higher than 10<SUP>20</SUP> cm<SUP>-2</SUP> only X-rays can
    heat the gas. Extreme ultraviolet photons heat the upper atmospheric layers. <BR />Conclusions: Using emission spectra
    from a sample of solar-type stars of different ages representative of the Sun''s main sequence lifetime, we have derived
    the corresponding heating rates. We find that the existence of an energetic cross-over in atmospheric heating is present
    for all stars in the sample.'
