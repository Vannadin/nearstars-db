  arxiv_id: '2412.03411'
  ads_bibcode: 2025AJ....170...49L
  title: A Dark, Bare Rock for TOI-1685 b from a JWST NIRSpec G395H Phase Curve
  authors:
  - Luque, Rafael
  - Coy, Brandon Park
  - Xue, Qiao
  - Feinstein, Adina D.
  - Ahrer, Eva-Maria
  - Changeat, Quentin
  - Zhang, Michael
  - Moran, Sarah E.
  - Bean, Jacob L.
  - Kite, Edwin
  - Weiner Mansfield, Megan
