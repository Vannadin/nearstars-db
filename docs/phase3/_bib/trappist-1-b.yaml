  arxiv_id: '2403.00676'
  ads_bibcode: 2024A&A...683A.212D
  title: 'Transiting exoplanets with the Mid-InfraRed Instrument on board JWST: From simulations to observations'
  authors:
  - Dyrek, A.
  - Ducrot, E.
  - Lagage, P.-O.
  - Tremblin, P.
  - Kendrew, S.
  - Bouwman, J.
  - Bouffet, R.
  year: '2024'
  pubdate: '2024-03-00'
  doi: 10.1051/0004-6361/202347127
  abstract: 'Context. The James Webb Space Telescope (JWST) has now started its exploration of exoplanetary worlds. In particular,
    the Mid-InfraRed Instrument (MIRI) with its Low-Resolution Spectrometer (LRS) carries out transit, eclipse, and phase-curve
    spectroscopy of exoplanetary atmospheres with an unprecedented precision in a so far almost uncharted wavelength range.
    <BR /> Aims: The precision and significance in the detection of molecules in exoplanetary atmospheres relies on a thorough
    understanding of the instrument itself and on accurate data reduction methods. This paper aims to provide a clear description
    of the instrumental systematics that affect observations of transiting exoplanets through the use of simulations. <BR
    /> Methods: We carried out realistic simulations of transiting-exoplanet observations with the MIRI LRS instrument that
    included the model of the exoplanet system, the optical path of the telescope, the MIRI detector performances, and instrumental
    systematics and drifts that could alter the atmospheric features we are meant to detect in the data. After we introduce
    our pipeline, we show its performance on the transit of L 168-9b, a super-Earth-sized exoplanet observed during the commissioning
    of the MIRI instrument. <BR /> Results: This paper provides a better understanding of the data themselves and of the best
    practices in terms of reduction and analysis through comparisons between simulations and real data. We show that simulations
    validate the current data-analysis methods. Simulations also highlight instrumental effects that impact the accuracy of
    our current spectral extraction techniques. These simulations are proven to be essential in the preparation of JWST observation
    programs and help us to assess the detectability of various atmospheric and surface scenarios.'
  source: citation_of=2025ApJ...989L..11C
