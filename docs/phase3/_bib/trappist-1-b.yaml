  abstract: 'We present photometry of 13 transits of XO-3b, a massive transiting planet on an eccentric orbit. Previous data
    led to two inconsistent estimates of the planetary radius. Our data strongly favor the smaller radius, with increased
    precision: R<SUB>p</SUB> = 1.217 +/- 0.073 R<SUB>Jup</SUB>. A conflict remains between the mean stellar density determined
    from the light curve, and the stellar surface gravity determined from the shapes of spectral lines. We argue the light
    curve should take precedence, and revise the system parameters accordingly. The planetary radius is about 1 σ larger than
    the theoretical radius for a hydrogen-helium planet of the given mass and insolation. To help in planning future observations,
    we provide refined transit and occultation ephemerides.'
