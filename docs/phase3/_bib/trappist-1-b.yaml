  arxiv_id: '1804.01913'
  ads_bibcode: 2018A&A...615A..86C
  title: Thermal emission of WASP-48b in the K<SUB>s</SUB>-band
  authors:
  - Clark, B. J. M.
  - Anderson, D. R.
  - Madhusudhan, N.
  - Hellier, C.
  - Smith, A. M. S.
  - Collier Cameron, A.
