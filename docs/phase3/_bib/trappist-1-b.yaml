  ads_bibcode: 2019ApJ...871...63M
  title: How to Constrain Your M Dwarf. II. The Mass-Luminosity-Metallicity Relation from 0.075 to 0.70 Solar Masses
  authors:
  - Mann, Andrew W.
  - Dupuy, Trent
  - Kraus, Adam L.
  - Gaidos, Eric
  - Ansdell, Megan
  - Ireland, Michael
  - Rizzuto, Aaron C.
