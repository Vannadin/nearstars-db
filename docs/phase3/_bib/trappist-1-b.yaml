  title: 'SPIRou Legacy Survey: RV Detection of TRAPPIST-1 b'
  authors:
  - L'Heureux, Alexandrine
  - Doyon, René
  - Lim, Olivia
  - Artigau, Étienne
  - Cadieux, Charles
  - Cook, Neil James
  - Bonfils, Xavier
