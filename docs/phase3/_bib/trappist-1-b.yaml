  - Schlichting, Hilke E.
  - Welbanks, Luis
  - Cadieux, Charles
  - Dorn, Caroline
  - Evans-Soma, Thomas M.
  - Fortney, Jonathan J.
  - Pierrehumbert, Raymond
  - Lafrenière, David
  - Acuña, Lorena
  - Komacek, Thaddeus
  - Innes, Hamish
