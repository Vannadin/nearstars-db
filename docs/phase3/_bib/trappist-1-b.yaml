  - Nichols, Jonathan D.
  - Wynn, Graham A.
  - Burleigh, Matthew R.
  year: '2018'
  pubdate: '2018-02-00'
  doi: 10.3847/1538-4357/aaa59c
  abstract: We consider the magnetic interaction of exoplanets orbiting M dwarfs, calculating the expected Poynting flux carried
    upstream along Alfvén wings to the central star. A region of emission analogous to the Io footprint observed in Jupiter’s
    aurora is produced, and we calculate the radio flux density generated near the surface of the star via the electron-cyclotron
    maser instability. We apply the model to produce individual case studies for the TRAPPIST-1, Proxima Centauri, and dwarf
    NGTS-1 systems. We predict steady-state flux densities of up to ∼10 μJy and sporadic bursts of emission of up to ∼1 mJy
    from each case study, suggesting these systems may be detectable with the Very Large Array and the Giant Metrewave Radio
    Telescope, and perhaps the Square Kilometre Array in the future. Finally, we present a survey of 85 exoplanets orbiting
    M dwarfs, identifying 11 such objects capable of generating radio emission above 10 μJy.
