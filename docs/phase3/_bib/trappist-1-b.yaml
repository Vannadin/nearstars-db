  - Albert, Loïc
  - Lim, Olivia
  - Doyon, René
  - Benneke, Björn
  - Rowe, Jason F.
  - Darveau-Bernier, Antoine
  - Cowan, Nicolas B.
  - Lewis, Nikole K.
  - Cook, Neil J.
  - Flagg, Laura
  - Genest, Frédéric
  - Pelletier, Stefan
  - Johnstone, Doug
  - Dang, Lisa
  - Kaltenegger, Lisa
