  arxiv_id: '2310.03792'
  ads_bibcode: 2023ApJ...959...64H
  title: Characterizing the Near-infrared Spectra of Flares from TRAPPIST-1 during JWST Transit Spectroscopy Observations
  authors:
  - Howard, Ward S.
  - Kowalski, Adam F.
  - Flagg, Laura
  - MacGregor, Meredith A.
  - Lim, Olivia
  - Radica, Michael
  - Piaulet, Caroline
