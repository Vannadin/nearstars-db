  ads_bibcode: 2024PSJ.....5...64V
  title: 'Modeling Atmospheric Lines by the Exoplanet Community (MALBEC) Version 1.0: A CUISINES Radiative Transfer Intercomparison
    Project'
  authors:
  - Villanueva, Geronimo L.
  - Fauchez, Thomas J.
  - Kofman, Vincent
  - Alei, Eleonora
  - Lee, Elspeth K. H.
  - Janin, Estelle
