  doi: null
  abstract: TRAPPIST-1 is a nearby exoplanetary system consisting of seven rocky, Earth-sized exoplanets transiting a nearby
    Jupiter-sized M8 dwarf host star. Each TRAPPIST-1 planet was previously observed and cloud-free hydrogen-rich atmospheres
    were confidently rejected on all seven of them. However, to date, published observations could not inform on the presence
    of secondary atmospheres dominated by gases such as CO<SUB>2</SUB>, H<SUB>2</SUB>O, or N<SUB>2</SUB>. In this talk, we
    present the first high-precision transit spectra of the warm Earth-sized planet TRAPPIST-1 b based on two transit observations
    using NIRISS in SOSS mode on the James Webb Space Telescope. TRAPPIST-1 b is the most favorable Earth-sized planet for
    characterization via transmission spectroscopy among all exoplanets. As such, our observations have the sensitivity to
    detect a wide range of atmospheres, providing unprecedented insight into the potentially secondary atmosphere on a rocky
    Earth-sized planet outside the solar system.
