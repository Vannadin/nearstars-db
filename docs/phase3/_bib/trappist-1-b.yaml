- &id072
  arxiv_id: '1905.11419'
  ads_bibcode: 2019MNRAS.488.5739V
  title: The chaotic nature of TRAPPIST-1 planetary spin states
  authors:
  - Vinson, Alec M.
  - Tamayo, Daniel
  - Hansen, Brad M. S.
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.1093/mnras/stz2113
  abstract: 'The TRAPPIST-1 system has seven known terrestrial planets arranged compactly in a mean motion resonant chain
    around an ultracool central star, some within the estimated habitable zone. Given their short orbital periods of just
    a few days, it is often presumed that the planets are tidally locked such that the spin rate is equal to that of the orbital
    mean motion. However, the compact, and resonant, nature of the system implies that there can be significant variations
    in the mean motion of these planets due to their mutual interactions. We show that such fluctuations can then have significant
    effects on the spin states of these planets. In this paper, we analyse, using detailed numerical simulations, the mean
    motion histories of the three planets that are thought to lie within or close to the habitable zone of the system: planets
    d, e, and f. We demonstrate that, depending on the strength of the mutual interactions within the system, these planets
    can be pushed into spin states which are effectively non-synchronous. We find that it can produce significant libration
    of the spin state, if not complete circulation in the frame co-rotating with the orbit. We also show that these spin states
    are likely to be unable to sustain long-term stability, with many of our simulations suggesting that the spin evolves,
    under the influence of tidal synchronization forces, into quasi-stable attractor states, which last on time-scales of
    thousands of years.'
  source: citation_of=2024A&A...691L...3R
