  abstract: 'We have detected three temperate Earth-sized planets transiting an ultra-cool dwarf star only 12 pc away, TRAPPIST-1.
    This discovery sparks the era of detailed characterization and habitability assessment of Earth-sized exoplanets. It also
    opens a new chapter for exoplanetology: comparative planetology in the realm of temperate terrestrial planets. <P />TRAPPIST-1''s
    system is currently the subject of an intense, worldwide follow-up effort that spans the electromagnetic spectrum from
    the UV to radio. Being uniquely suited for NIR and UV high-precision observations, HST has a key role to play in this
    follow-up effort. <P />Updated ephemerids resulting from two Spitzer DDTs show that TRAPPIST-1 b and c will transit simultaneously
    on May 4th, 2016 at 9h10 UT providing a unique and rare opportunity to study for the first time, and simultaneously, the
