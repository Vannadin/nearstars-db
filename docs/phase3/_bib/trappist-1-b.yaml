  arxiv_id: '1202.6328'
  ads_bibcode: 2014ApJ...790..146F
  title: Architecture of Kepler's Multi-transiting Systems. II. New Investigations with Twice as Many Candidates
  authors:
  - Fabrycky, Daniel C.
  - Lissauer, Jack J.
  - Ragozzine, Darin
  - Rowe, Jason F.
  - Steffen, Jason H.
  - Agol, Eric
  - Barclay, Thomas
  - Batalha, Natalie
  - Borucki, William
  - Ciardi, David R.
  - Ford, Eric B.
  - Gautier, Thomas N.
  - Geary, John C.
  - Holman, Matthew J.
  - Jenkins, Jon M.
