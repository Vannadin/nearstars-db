  abstract: This paper presents an overview of SPIRou, the new-generation near-infrared spectropolarimeter/precision velocimeter
    recently installed on the 3.6-m Canada-France-Hawaii Telescope (CFHT). Starting from the two main science goals, i.e.,
    the quest for planetary systems around nearby M dwarfs and the study of magnetized star/planet formation, we outline the
    instrument concept that was designed to efficiently address these forefront topics, and detail the in-lab and on-sky instrument
    performances measured throughout the intensive testing phase that SPIRou was submitted to before passing the final acceptance
    review in early 2019 and initiating science observations. With a central position among the newly started programmes,
    the SPIRou Legacy Survey (SLS) Large Programme was allocated 300 CFHT nights until at least mid 2022. We also briefly
    describe a few of the first results obtained in the various science topics that SPIRou started investigating, focusing
    in particular on planetary systems of nearby M dwarfs, transiting exoplanets and their atmospheres, magnetic fields of
    young stars, but also on alternate science goals like the atmospheres of M dwarfs and the Earth's atmosphere. We finally
    conclude on the key role that SPIRou and the CFHT can play in coordination with forthcoming major facilities like the
    JWST, the ELTs, PLATO, and ARIEL over the decade.
