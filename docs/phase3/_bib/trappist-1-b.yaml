  abstract: We investigate the tidal dissipation in Io's hypothetical fluid magma ocean using a new approach based on the
    solution of the 3D Navier-Stokes equations. Our results indicate that the presence of a shallow magma ocean on top of
    a solid, partially molten layer leads to an order of magnitude increase in dissipation at low latitudes. Tidal heating
