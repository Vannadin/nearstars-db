  arxiv_id: '2401.14459'
  ads_bibcode: 2024ApJ...962..157C
  title: Heating of the Atmospheres of Short-orbit Exoplanets by Their Rapid Orbital Motion through an Extreme Space Environment
  authors:
  - Cohen, Ofer
  - Glocer, Alex
  - Garraffo, Cecilia
  - Alvarado-Gómez, Julián D.
  - Drake, Jeremy J.
  - Monsch, Kristina
  - Fauth Puigdomenech, Farah
  year: '2024'
  pubdate: '2024-02-00'
  doi: 10.3847/1538-4357/ad206a
  abstract: Exoplanets with short orbit periods reside very close to their host stars. They transition very rapidly between
    different sectors of the circumstellar space environment along their orbit, leading to large variations of the magnetic
    field in the vicinity of the planet on short timescales. This rapid change of the magnetic flux through the conducting
    and resistive layer of the planetary upper atmosphere may drive currents that dissipate in the form of Joule heating (JH).
    Here, we estimate the amount of JH dissipation in the upper atmosphere of Trappist-1e, and two hypothetical planets orbiting
    the Sun in close-in orbits. We find that the rapid orbital motion could drive a significant amount of atmospheric heating
    and could significantly affect the planetary atmosphere escape rate. Thus, the process should be accounted for when studying
    the long-term evolution of exoplanetary atmospheres.
