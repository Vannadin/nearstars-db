  ads_bibcode: 2024ApJ...967...95K
  title: Reduced Water Loss due to Photochemistry on Terrestrial Planets in the Runaway Greenhouse Phase around Pre-main-sequence
    M Dwarfs
  authors:
  - Kawamura, Yo
  - Yoshida, Tatsuya
  - Terada, Naoki
  - Nakamura, Yuki
  - Koyama, Shungo
  - Karyu, Hiroki
  - Terada, Kaori
