- &id213
  arxiv_id: '1702.03315'
  ads_bibcode: 2017ApJ...837..107W
  title: Constraints on Climate and Habitability for Earth-like Exoplanets Determined from a General Circulation Model
  authors:
  - Wolf, Eric T.
  - Shields, Aomawa L.
  - Kopparapu, Ravi K.
  - Haqq-Misra, Jacob
  - Toon, Owen B.
  year: '2017'
  pubdate: '2017-03-00'
  doi: 10.3847/1538-4357/aa5ffc
  abstract: Conventional definitions of habitability require abundant liquid surface water to exist continuously over geologic
    timescales. Water in each of its thermodynamic phases interacts with solar and thermal radiation and is the cause for
    strong climatic feedbacks. Thus, assessments of the habitable zone require models to include a complete treatment of the
    hydrological cycle over geologic time. Here, we use the Community Atmosphere Model from the National Center for Atmospheric
    Research to study the evolution of climate for an Earth-like planet at constant CO<SUB>2</SUB>, under a wide range of
    stellar fluxes from F-, G-, and K-dwarf main sequence stars. Around each star we find four stable climate states defined
    by mutually exclusive global mean surface temperatures (T <SUB>s</SUB>); snowball (T <SUB>s</SUB> ≤ 235 K), waterbelt
    (235 K ≤ T <SUB>s</SUB> ≤ 250 K), temperate (275 K ≤ T <SUB>s</SUB> ≤ 315 K), and moist greenhouse (T <SUB>s</SUB> ≥ 330
    K). Each is separated by abrupt climatic transitions. Waterbelt, temperate, and cooler moist greenhouse climates can maintain
    open-ocean against both sea ice albedo and hydrogen escape processes respectively, and thus constitute habitable worlds.
    We consider the warmest possible habitable planet as having T <SUB>s</SUB> ∼ 355 K, at which point diffusion limited water-loss
    could remove an Earth ocean in ∼1 Gyr. Without long timescale regulation of non-condensable greenhouse species at Earth-like
    temperatures and pressures, such as CO<SUB>2</SUB>, habitability can be maintained for an upper limit of ∼2.2, ∼2.4, and
    ∼4.7 Gyr around F-, G-, and K-dwarf stars respectively, due to main sequence brightening.
