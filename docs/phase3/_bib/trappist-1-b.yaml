  arxiv_id: '1704.03265'
  ads_bibcode: 2017MNRAS.470L...1G
  title: A minimum mass nebula for M dwarfs
  authors:
  - Gaidos, E.
  year: '2017'
  pubdate: '2017-09-00'
  doi: 10.1093/mnrasl/slx063
  abstract: Recently revealed differences in planets around M dwarf versus solar-type stars could arise from differences in
    their primordial discs and surveys of T Tauri stars find a correlation between stellar mass and disc mass. 'Minimum' discs
    have been reconstructed for the Solar system and solar-type stars and here this exercise is performed for M dwarfs using
    Kepler-detected planets. Distribution of planet mass between current orbits produces a disc with total mass of ≈0.009
    M<SUB>☉</SUB> and a power-law profile with index α = 2.2. Disc reconstruction from the output of a forward model of planet
    formation indicates that the effect of detection bias on disc profile is slight and that the observed scatter in planet
    masses and semimajor axes are consistent with a universal disc profile. This nominal M dwarf disc is more centrally concentrated
    than those inferred around the solar-type stars observed by Kepler, and the mass surface density beyond 0.02 au is sufficient
    for in situ accretion of planets as single embryos. The mass of refractory solids within 0.5 au is 5.6 M<SUB>⊕</SUB> compared
    to 4 M<SUB>⊕</SUB> for solar-type stars in contrast with the trend with total disc mass. The total solid beyond 0.5 au
    is sufficient for the core of at least one giant planet.
