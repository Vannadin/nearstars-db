  arxiv_id: '2409.07542'
  ads_bibcode: 2024ApJ...974L...4P
  title: Nightside Clouds on Tidally Locked Terrestrial Planets Mimic Atmosphere-free Scenarios
  authors:
  - Powell, Diana
  - Wordsworth, Robin
  - Öberg, Karin
  year: '2024'
  pubdate: '2024-10-00'
  doi: 10.3847/2041-8213/ad78de
  abstract: We investigate the impact of nightside cloud formation on the observable day/night contrast of tidally locked
    terrestrial planet atmospheres. We demonstrate that, in the case where the planetary dayside is only 10 s of Kelvin hotter
    than the planetary nightside, the presence of optically thick nightside clouds can lead to observations that mimic a planet
    without an atmosphere, despite the planet actually hosting a significant (10 bar) atmosphere. The scenario presented in
    this work requires a level of intrinsic atmospheric day/night temperature contrast such that the nightside can form clouds
    while the dayside is too hot for cloud formation to occur. This scenario is most likely for hotter terrestrials and terrestrials
    with low volatile inventories. We thus note that a substantial dayside/nightside temperature difference alone does not
    robustly indicate that a planet does not host an atmosphere, and additional observations and modeling are essential for
    characterization. We further discuss several avenues for future study to improve our understanding of the terrestrial
    planets and how best to characterize them with JWST.
