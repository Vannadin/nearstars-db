  abstract: Theory and observations point to the occurrence of magma ponds or oceans in the early evolution of terrestrial
    planets and in many early-accreting planetesimals. The apparent ubiquity of melting during giant accretionary impacts
    suggests that silicate and metallic material may be processed through multiple magma oceans before reaching solidity in
    a planet. The processes of magma ocean formation and solidification, therefore, strongly influence the earliest compositional
    differentiation and volatile content of the terrestrial planets, and they form the starting point for cooling to clement,
    habitable conditions and for the onset of thermally driven mantle convection and plate tectonics. This review focuses
