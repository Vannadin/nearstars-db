  arxiv_id: astro-ph/0604144
  ads_bibcode: 2006ApJS..167..334B
  title: Radiative Recombination Data for Modeling Dynamic Finite-Density Plasmas
  authors:
  - Badnell, N. R.
  year: '2006'
  pubdate: '2006-12-00'
  doi: 10.1086/508465
  abstract: We have calculated partial final-state resolved radiative recombination (RR) rate coefficients from the initial
    ground and metastable levels of all elements up to and including Zn, plus Kr, Mo, and Xe, for all isoelectronic sequences
    up to Na-like forming Mg-like. The data are archived according to the Atomic Data and Analysis Structure (ADAS) data class
    adf48, which spans a temperature range of z<SUP>2</SUP>(10<SUP>1</SUP>-10<SUP>7</SUP>) K, where z is the initial ion charge.
    Fits to total rate coefficients have been determined, for both the ground and metastable levels, and those for the ground
    are presented here. Comparison is made both with previous RR rate coefficients and with (background) R-matrix photoionization
    cross sections. This RR database complements a dielectronic recombination (DR) database already produced, and both are
    being used to produce updated ionization balances for both (electron) collisionally ionized and photoionized plasmas.
