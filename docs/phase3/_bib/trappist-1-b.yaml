  arxiv_id: null
  ads_bibcode: 2009JGRE..114.0B42W
  title: Preliminary characterization of the upper haze by SPICAV/SOIR solar occultation in UV to mid-IR onboard Venus Express
  authors:
  - Wilquet, V.
  - Fedorova, A.
  - Montmessin, F.
  - Drummond, R.
  - Mahieux, A.
  - Vandaele, A. C.
  - Villard, E.
