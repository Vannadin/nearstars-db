  title: Thermal infrared emissivity of felsic-rich to mafic-rich analogues of hot planetary regoliths
  authors:
  - Ferrari, Sabrina
  - Maturilli, Alessandro
  - Carli, Cristian
  - D'Amore, Mario
  - Helbert, Jörn
  - Nestola, Fabrizio
  - Hiesinger, Harald
