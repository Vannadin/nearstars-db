  arxiv_id: '1504.03334'
  ads_bibcode: 2015ApJ...804L..17T
  title: Fingering Convection and Cloudless Models for Cool Brown Dwarf Atmospheres
  authors:
  - Tremblin, P.
  - Amundsen, D. S.
  - Mourier, P.
  - Baraffe, I.
  - Chabrier, G.
  - Drummond, B.
  - Homeier, D.
  - Venot, O.
  year: '2015'
  pubdate: '2015-05-00'
  doi: 10.1088/2041-8205/804/1/L17
  abstract: This work aims to improve the current understanding of the atmospheres of brown dwarfs, especially cold ones with
    spectral types T and Y, whose modeling is a current challenge. Silicate and iron clouds are believed to disappear at the
    photosphere at the L/T transition, but cloudless models fail to reproduce correctly the spectra of T dwarfs, advocating
    for the addition of more physics, e.g., other types of clouds or internal energy transport mechanisms. We use a one-dimensional
    radiative/convective equilibrium code ATMO to investigate this issue. This code includes both equilibrium and out-of-equilibrium
    chemistry and solves consistently the PT structure. Included opacity sources are H<SUB>2</SUB>-H<SUB>2</SUB>, H<SUB>2</SUB>-He,
    H<SUB>2</SUB>O, CO, CO<SUB>2</SUB>, CH<SUB>4</SUB>, NH<SUB>3</SUB>, K, Na, and TiO, VO if they are present in the atmosphere.
    We show that the spectra of Y dwarfs can be accurately reproduced with a cloudless model if vertical mixing and NH<SUB>3</SUB>
    quenching are taken into account. T dwarf spectra still have some reddening in, e.g., J-H, compared to cloudless models.
    This reddening can be reproduced by slightly reducing the temperature gradient in the atmosphere. We propose that this
    reduction of the stabilizing temperature gradient in these layers, leading to cooler structures, is due to the onset of
    fingering convection, triggered by the destabilizing impact of condensation of very thin dust.
