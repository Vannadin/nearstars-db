- arxiv_id: '1608.06919'
  ads_bibcode: 2016arXiv160806919B
  title: 'The Habitability of Proxima Centauri b I: Evolutionary Scenarios'
  authors:
  - Barnes, Rory
  - Deitrick, Russell
  - Luger, Rodrigo
  - Driscoll, Peter E.
  - Quinn, Thomas R.
  - Fleming, David P.
  - Guyer, Benjamin
