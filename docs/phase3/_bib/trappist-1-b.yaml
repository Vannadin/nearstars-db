- &id439
  arxiv_id: '1409.5268'
  ads_bibcode: 2014ApJ...795...86S
  title: On the Diversity of Magnetic Interactions in Close-in Star-Planet Systems
  authors:
  - Strugarek, A.
  - Brun, A. S.
  - Matt, S. P.
  - Réville, V.
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1088/0004-637X/795/1/86
  abstract: Magnetic interactions between close-in planets and their host star can play an important role in the secular orbital
    evolution of the planets, as well as the rotational evolution of their host. As long as the planet orbits inside the Alfvén
    surface of the stellar wind, the magnetic interaction between the star and the planet can modify the wind properties and
    also lead to direct angular momentum transfers between the two. We model these star-planet interactions using compressible
    magnetohydrodynamic (MHD) simulations, and quantify the angular momentum transfers between the star, the planet, and the
    stellar wind. We study the cases of magnetized and non-magnetized planets and vary the orbital radius inside the Alfvén
    surface of the stellar wind. Based on a grid of numerical simulations, we propose general scaling laws for the modification
    of the stellar wind torque, for the torque between the star and the planet, and for the planet migration associated with
    the star-planet magnetic interactions. We show that when the coronal magnetic field is large enough and the star is rotating
    sufficiently slowly, the effect of the magnetic star-planet interaction is comparable to tidal effects and can lead to
    a rapid orbital decay.
