  arxiv_id: '2010.14101'
  ads_bibcode: 2020MNRAS.499.4605N
  title: 'Modelling the atmosphere of lava planet K2-141b: implications for low- and high-resolution spectroscopy'
  authors:
  - Nguyen, T. Giang
  - Cowan, Nicolas B.
  - Banerjee, Agnibha
  - Moores, John E.
  year: '2020'
  pubdate: '2020-12-00'
  doi: 10.1093/mnras/staa2487
  abstract: Transit searches have uncovered Earth-size planets orbiting so close to their host star that their surface should
    be molten, so-called lava planets. We present idealized simulations of the atmosphere of lava planet K2-141b and calculate
    the return flow of material via circulation in the magma ocean. We then compare how pure Na, SiO, or SiO<SUB>2</SUB> atmospheres
    would impact future observations. The more volatile Na atmosphere is thickest followed by SiO and SiO<SUB>2</SUB>, as
    expected. Despite its low vapour pressure, we find that a SiO<SUB>2</SUB> atmosphere is easier to observe via transit
    spectroscopy due to its greater scale height near the day-night terminator and the planetary radial velocity and acceleration
    are very high, facilitating high dispersion spectroscopy. The special geometry that arises from very small orbits allows
    for a wide range of limb observations for K2-141b. After determining the magma ocean depth, we infer that the ocean circulation
    required for SiO steady-state flow is only 10<SUP>-4</SUP> m s<SUP>-1</SUP>, while the equivalent return flow for Na is
    several orders of magnitude greater. This suggests that a steady-state Na atmosphere cannot be sustained and that the
    surface will evolve over time.
