  doi: 10.48550/arXiv.2511.16142
  abstract: Spectroscopic characterization of rocky exoplanets with the James Webb Space Telescope has brought the origin
    and evolution of their atmospheres into the focus of exoplanet science. Time-evolved models of the feedback between interior
    and atmosphere are critical to predict and interpret these observations and link them to the Solar System terrestrial
    planets. However, models differ in methodologies and input data, which can lead to significant differences in interpretation.
    In this paper, we present the experimental protocol of the Coupled atmospHere Interior modeL Intercomparison (CHILI) project.
    CHILI is an (exo-)planet model intercomparison project within the Climates Using Interactive Suites of Intercomparisons
    Nested for Exoplanet Studies (CUISINES) framework, which aims to support a diverse set of multi-model intercomparison
    projects in the exoplanet community. The present protocol includes the initial set of participating magma ocean models,
    divided into evolutionary and static models, and two types of test categories, one focused on Solar System planets (Earth
    &amp; Venus) and the other on exoplanets orbiting low-mass M-dwarfs. Both test categories aim to quantify the evolution
    of key markers of the links between planetary atmospheres and interiors over geological timescales. The proposed tests
    would allow us to quantify and compare the differences between coupled atmosphere-interior models used by the exoplanet
    and planetary science communities. Results from the proposed tests will be published in dedicated follow-up papers. To
    encourage the community to join this comparison effort and as an example, we present initial test results for the early
    Earth and TRAPPIST-1 b, conducted with models differing in the treatment of energy transport in the planetary interior
    and atmosphere, surface boundary layer, geochemistry, and the in- and outgassing of volatile compounds.
