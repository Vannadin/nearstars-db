  - Fortney, Jonathan
  - Gilliland, Ronald
  - Deming, Drake
  - Kammer, Joshua
  year: '2019'
  pubdate: '2019-07-00'
  doi: 10.1038/s41550-019-0800-5
  abstract: With no analogues in the Solar System, the discovery of thousands of exoplanets with masses and radii intermediate
    between Earth and Neptune was one of the big surprises of exoplanet science. These super-Earths and sub-Neptunes probably
    represent the most common outcome of planet formation<SUP>1,2</SUP>. Mass and radius measurements indicate a diversity
    in bulk composition much wider than for gas giants<SUP>3</SUP>; however, direct spectroscopic detections of molecular
    absorption and constraints on the gas mixing ratios have largely remained limited to planets more massive than Neptune<SUP>4-6</SUP>.
    Here we analyse a combined Hubble/Spitzer Space Telescope dataset of 12 transits and 20 eclipses of the sub-Neptune exoplanet
    GJ 3470 b, whose mass of 12.6 M<SUB>⊕</SUB> places it near the halfway point between previously studied Neptune-like exoplanets
    (22-23 M<SUB>⊕</SUB>)<SUP>5-7</SUP> and exoplanets known to have rocky densities (7 M<SUB>⊕</SUB>)<SUP>8</SUP>. Obtained
    over many years, our dataset provides a robust detection of water absorption (&gt;5σ) and a thermal emission detection
    from the lowest irradiated planet to date. We reveal a low-metallicity, hydrogen-dominated atmosphere similar to that
    of a gas giant, but strongly depleted in methane gas. The low metallicity (O/H = 0.2-18.0) sets important constraints
    on the potential planet formation processes at low masses as well as the subsequent accretion of solids. The low methane
    abundance indicates that methane is destroyed much more efficiently than previously predicted, suggesting that the CH<SUB>4</SUB>/CO
    transition curve has to be revisited for close-in planets. Finally, we also find a sharp drop in the cloud opacity at
    2-3 µm, characteristic of Mie scattering, which enables narrow constraints on the cloud particle size and makes GJ 3470
    b a key target for mid-infrared characterization with the James Webb Space Telescope.
