  doi: 10.1051/0004-6361/201834289
  abstract: We report on the confirmation and mass determination of π Men c, the first transiting planet discovered by NASA's
    TESS space mission. π Men is a naked-eye (V = 5.65 mag), quiet G0 V star that was previously known to host a sub-stellar
    companion (π Men b) on a longperiod (P<SUB>orb</SUB> = 2091 days), eccentric (e = 0.64) orbit. Using TESS time-series
    photometry, combined with Gaia data, published UCLES at AAT Doppler measurements, and archival HARPS at ESO-3.6m radial
    velocities, we found that π Men c is a close-in planet with an orbital period of P<SUB>orb</SUB> = 6.27 days, a mass of
    M<SUB>c</SUB> = 4.52 ± 0.81 M<SUB>⊕</SUB>, and a radius of R<SUB>c</SUB> = 2.06 ± 0.03 R<SUB>⊕</SUB>. Based on the planet's
    orbital period and size, π Men c is a super-Earth located at, or close to, the radius gap, while its mass and bulk density
    suggest it may have held on to a significant atmosphere. Because of the brightness of the host star, this system is highly
    suitable for a wide range of further studies to characterize the planetary atmosphere and dynamical properties. We also
    performed an asteroseismic analysis of the TESS data and detected a hint of power excess consistent with the seismic values
    expected for this star, although this result depends on the photometric aperture used to extract the light curve. This
    marginal detection is expected from pre-launch simulations hinting at the asteroseismic potential of the TESS mission
    for longer, multi-sector observations and/or for more evolved bright stars. <P />The entire RV data (Tables A.1, A.3 and
    full Table A.2) are only available at the CDS via anonymous ftp to <A href="http://cdsarc.u-strasbg.fr/">http://cdsarc.u-strasbg.fr</A>
    (ftp://130.79.128.5) or via <A href="http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/619/L10">http://cdsarc.u-strasbg.fr/viz-bin/qcat?J/A+A/619/L10</A>
