  arxiv_id: null
  ads_bibcode: 2011Icar..216..572S
  title: 'Thermal and transport properties of mantle rock at high pressure: Applications to super-Earths'
  authors:
  - Stamenković, Vlada
  - Breuer, Doris
  - Spohn, Tilman
  year: '2011'
  pubdate: '2011-12-00'
  doi: 10.1016/j.icarus.2011.09.030
  abstract: In the present study, the temperature- and pressure-dependent transport and thermal properties, i.e., viscosity,
    phonon thermal conductivity, thermal expansivity and heat capacities, as well as electronic and radiative thermal conductivities,
    have been derived for the mantles of super-Earths. These properties are necessary to understand the interior dynamics
    and the thermal evolution of those planets. We assume that the mantles consist of MgSiO<SUB>3</SUB> perovskite (pv), but
    we discuss the effects of the post-perovskite transition, and we elaborate on an addition of periclase MgO and incorporated
    Fe. However, MgO is found to only significantly influence the phonon thermal conductivity - the viscosities, heat capacities
    and thermal expansivities of pv and MgO remain comparable. We use the Keane theory of solids, which takes into account
    the behavior of solid matter at the infinite pressure limit, adopt the Keane equations of state, and adjust for pv and
    MgO by comparison with experimental high-pressure and high-temperature data. We find the theory of the infinite pressure
    limit of Keane to be in excellent agreement with recent ab initio studies and experiments. To calculate the melting curve,
    we further use the Lindemann-Stacey scaling law and fit it to available experimental data. The best data fitting melting
    temperature for pv reaches 5700 K at 135 GPa and increases to 20,000 K at 1.1 TPa, corresponding to the core-mantle boundary
    of a 10 Earth mass super-Earth (10M<SUB>Earth</SUB>). We find the pv adiabatic temperature (with a potential temperature
    of 1700 K) to reach 2570 K at 135 GPa and 5000 K at 1.1 TPa. To calculate the pressure-and temperature-dependent viscosity,
    we use the semi-empirical homologous temperature scaling to relate enthalpy change, and hence viscosity, to the melting
    temperature. We find that the resulting activation volume of pv decreases from 2.8 cm<SUP>3</SUP>/mol at 25 GPa to 1.4
    cm<SUP>3</SUP>/mol at 1.1 TPa-resulting in a viscosity increase by ∼15 orders of magnitude through the adiabatic mantle
    of a 10M<SUB>Earth</SUB> planet. Furthermore, the thermal expansivity (of pv and MgO) decreases by a factor of eight,
    and the total thermal conductivity (phonon, radiative and electronic) of an Earth-like pv/MgO composite increases by a
    factor of seven through an adiabatic mantle of a 10M<SUB>Earth</SUB> super-Earth. At higher temperatures, i.e., for super-adiabatic
    temperature profiles, the electronic and radiative thermal conductivities strongly increase and dominate the conductive
    heat transport. All findings indicate an increase of heat transfer solely by conduction in the lower mantles of super-Earths.
    Thus our results disagree with Earth-biased full-mantle convection assumptions made by previous models for super-Earths,
    and additionally raise questions about the differentiation of massive rocky exoplanets and their ability to generate magnetic
    fields or sustain plate tectonics.
  source: citation_of=2026A&A...707A.101B
