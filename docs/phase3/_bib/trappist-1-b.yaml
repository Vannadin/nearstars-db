- &id406
  arxiv_id: '1712.03614'
  ads_bibcode: 2018AsBio..18..873F
  title: Carbon Cycling and Habitability of Earth-Sized Stagnant Lid Planets
  authors:
  - Foley, Bradford J.
  - Smye, Andrew J.
  year: '2018'
  pubdate: '2018-07-00'
  doi: 10.1089/ast.2017.1695
  abstract: Models of thermal evolution, crustal production, and CO$_2$ cycling are used to constrain the prospects for habitability
    of rocky planets, with Earth-like size and composition, in the stagnant lid regime. Specifically, we determine the conditions
    under which such planets can maintain rates of CO$_2$ degassing large enough to prevent global surface glaciation, but
    small enough so as not to exceed the upper limit on weathering rates provided by the supply of fresh rock, a situation
    which would lead to runaway atmospheric CO$_2$ accumulation and an inhospitably hot climate. The models show that stagnant
    lid planets with initial radiogenic heating rates of 100-250 TW, and with total CO$_2$ budgets ranging from $\sim 10^{-2}
    -1$ times Earth's estimated CO$_2$ budget, can maintain volcanic outgassing rates suitable for habitability for $\approx
    1-5$ Gyrs; larger CO$_2$ budgets result in uninhabitably hot climates, while smaller budgets result in global glaciation.
    High radiogenic heat production rates favor habitability by sustaining volcanism and CO$_2$ outgassing longer. Thus, the
    results suggest that plate tectonics may not be required for establishing a long-term carbon cycle and maintaining a stable,
    habitable climate. The model is necessarily highly simplified, as the uncertainties with exoplanet thermal evolution and
    outgassing are large. Nevertheless, the results provide some first order guidance for future exoplanet missions, by predicting
    the age at which habitability becomes unlikely for a stagnant lid planet as a function of initial radiogenic heat budget.
    This prediction is powerful because both planet heat budget and age can potentially be constrained from stellar observations.
