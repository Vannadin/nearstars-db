  arxiv_id: '1510.05706'
  ads_bibcode: 2015ApJ...814..133G
  title: Herschel Galactic Plane Survey of [NII] Fine Structure Emission
  authors:
  - Goldsmith, Paul F.
  - Yıldız, Umut A.
  - Langer, William D.
  - Pineda, Jorge L.
  year: '2015'
  pubdate: '2015-12-00'
  doi: 10.1088/0004-637X/814/2/133
  abstract: We present the first large-scale high angular resolution survey of ionized nitrogen in the Galactic Plane through
    emission of its two fine structure transitions ([N ii]) at 122 and 205 μm. The observations were largely obtained with
    the PACS instrument onboard the Herschel Space Observatory. The lines of sight were in the Galactic plane, following those
    of the Herschel OTKP project GOT C+. Both lines are reliably detected at the 10<SUP>-8</SUP>-10<SUP>-7</SUP> Wm<SUP>-2</SUP>
    sr<SUP>-1</SUP> level over the range -60° ≤ l ≤ 60°. The rms of the intensity among the 25 PACS spaxels of a given pointing
    is typically less than one third of the mean intensity, showing that the emission is extended. [N ii] is produced in gas
    in which hydrogen is ionized, and collisional excitation is by electrons. The ratio of the two fine structure transitions
    provides a direct measurement of the electron density, yielding n(e) largely in the range 10-50 cm<SUP>-3</SUP> with an
    average value of 29 cm<SUP>-3</SUP> and N<SUP>+</SUP> column densities 10<SUP>16</SUP>-10<SUP>17</SUP> cm<SUP>-2</SUP>.
    [N ii] emission is highly correlated with that of [C ii], and we calculate that between 1/3 and 1/2 of the [C ii] emission
    is associated with the ionized gas. The relatively high electron densities indicate that the source of the [N ii] emission
    is not the warm ionized medium (WIM), which has electron densities more than 100 times smaller. Possible origins of the
    observed [N ii] include the ionized surfaces of dense atomic and molecular clouds, the extended low-density envelopes
    of H ii regions, and low-filling factor high-density fluctuations of the WIM.
