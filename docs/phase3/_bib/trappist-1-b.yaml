  ads_bibcode: 2023MNRAS.521.3333L
  title: The impact of time-dependent stellar activity on exoplanet atmospheres
  authors:
  - Louca, Amy J.
  - Miguel, Yamila
  - Tsai, Shang-Min
  - Froning, Cynthia S.
  - Loyd, R. O. Parke
  - France, Kevin
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.1093/mnras/stac1220
  abstract: M-dwarfs are thought to be hostile environments for exoplanets. Stellar events are very common on such stars.
    These events might cause the atmospheres of exoplanets to change significantly over time. It is not only the major stellar
    flare events that contribute to this disequilibrium, but the smaller flares might also affect the atmospheres in an accumulating
    manner. In this study, we aim to investigate the effects of time-dependent stellar activity on the atmospheres of known
    exoplanets. We simulate the chemistry of GJ 876c, GJ 581c, and GJ 832c that go from H<SUB>2</SUB>-dominated to N<SUB>2</SUB>-dominated
    atmospheres using observed stellar spectra from the MUSCLES collaboration. We make use of the chemical kinetics code VULCAN
    and implement a flaring routine that stochastically generates synthetic flares based on observed flare statistics. Using
    the radiative transfer code PETITRADTRANS, we also simulate the evolution of emission and transmission spectra. We investigate
    the effect of recurring flares for a total of 11 d covering 515 flares. Results show a significant change in abundance
    for some relevant species such as H, OH, and CH<SUB>4</SUB>, with factors going up to three orders of magnitude difference
    with respect to the pre-flare abundances. We find a maximum change of ~12 ppm for CH<SUB>4</SUB> in transmission spectra
    on GJ 876c. These changes in the spectra remain too small to observe. We also find that the change in abundance and spectra
    of the planets accumulates throughout time, causing permanent changes in the chemistry. We conclude that this small but
    gradual change in chemistry arises due to the recurring flares.
