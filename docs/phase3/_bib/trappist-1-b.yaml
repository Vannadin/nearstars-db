  arxiv_id: '1609.03082'
  ads_bibcode: 2017A&A...599A..16L
  title: Atmospheric characterization of Proxima b by coupling the SPHERE high-contrast imager to the ESPRESSO spectrograph
  authors:
  - Lovis, C.
  - Snellen, I.
  - Mouillet, D.
  - Pepe, F.
  - Wildi, F.
  - Astudillo-Defru, N.
  - Beuzit, J.-L.
  - Bonfils, X.
