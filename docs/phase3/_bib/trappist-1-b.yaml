  title: 'Eureka!: An End-to-End Pipeline for JWST Time-Series Observations'
  authors:
  - Bell, Taylor
  - Ahrer, Eva-Maria
  - Brande, Jonathan
  - Carter, Aarynn
  - Feinstein, Adina
  - Caloca, Giannina
  - Mansfield, Megan
  - Zieba, Sebastian
