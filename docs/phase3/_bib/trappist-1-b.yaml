- &id428
  arxiv_id: '1511.03647'
  ads_bibcode: 2015ApJ...815L..12J
  title: The Evolution of Stellar Rotation and the Hydrogen Atmospheres of Habitable-zone Terrestrial Planets
  authors:
  - Johnstone, C. P.
  - Güdel, M.
  - Stökl, A.
  - Lammer, H.
  - Tu, L.
  - Kislyakova, K. G.
  - Lüftinger, T.
  - Odert, P.
  - Erkaev, N. V.
  - Dorfi, E. A.
  year: '2015'
  pubdate: '2015-12-00'
  doi: 10.1088/2041-8205/815/1/L12
  abstract: Terrestrial planets formed within gaseous protoplanetary disks can accumulate significant hydrogen envelopes.
    The evolution of such an atmosphere due to XUV driven evaporation depends on the activity evolution of the host star,
    which itself depends sensitively on its rotational evolution, and therefore on its initial rotation rate. In this Letter,
    we derive an easily applicable method for calculating planetary atmosphere evaporation that combines models for a hydrostatic
    lower atmosphere and a hydrodynamic upper atmosphere. We show that the initial rotation rate of the central star is of
    critical importance for the evolution of planetary atmospheres and can determine if a planet keeps or loses its primordial
    hydrogen envelope. Our results highlight the need for a detailed treatment of stellar activity evolution when studying
    the evolution of planetary atmospheres.
