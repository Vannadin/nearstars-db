  arxiv_id: '2401.01400'
  ads_bibcode: 2024ApJ...961L..44Z
  title: GJ 367b Is a Dark, Hot, Airless Sub-Earth
  authors:
  - Zhang, Michael
  - Hu, Renyu
  - Inglis, Julie
  - Dai, Fei
  - Bean, Jacob L.
  - Knutson, Heather A.
  - Lam, Kristine
  - Goffo, Elisa
