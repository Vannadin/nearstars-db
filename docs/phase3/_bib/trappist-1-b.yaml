- &id041
  arxiv_id: '1901.02747'
  ads_bibcode: 2019ApJ...872..113F
  title: 'Time-variable Electromagnetic Star-Planet Interaction: The TRAPPIST-1 System as an Exemplary Case'
  authors:
  - Fischer, Christian
  - Saur, Joachim
  year: '2019'
  pubdate: '2019-02-00'
  doi: 10.3847/1538-4357/aafaf2
  abstract: Exoplanets sufficiently close to their host star can in principle couple electrodynamically to the star. This
    process is known as electrodynamic star-planet interaction (SPI). The expected emission associated with this coupling,
    however, is difficult to observe due to the bright intrinsic stellar emission. Identification of time variability in the
    stellar light curve is one of the most promising approaches to identify SPI. In this work we therefore systematically
    investigate various mechanisms and their associated periods, which generate time variability to aid the search for SPI.
    We find that the synodic rotation period of the stars and half of this period, as measured in the rest frames of the orbiting
    exoplanets, are basic periods occurring in SPI. We apply our findings to the example of TRAPPIST-1 with its seven close-in
    planets, for which we investigate the possibility of SPI and the associated time variabilities. We show that TRAPPIST-1b
    and c, in particular, are very likely subject to sub-Alfvénic interaction, a necessary condition for SPI. Both planets
    are therefore expected to generate Alfvén wings, which can couple to the star. The associated Poynting fluxes are of the
    order of 10<SUP>11</SUP> to 10<SUP>15</SUP> W and thus can hardly be the direct source of currently observable time variability
    from TRAPPIST-1. However, these Poynting fluxes might trigger flares on the star. We find correlations between the observed
    flares and the expected planet-induced signals, which could be due to SPI, but our findings are not conclusive and warrant
    further observations and modeling.
  source: citation_of=2022A&A...668A..10F
