- &id211
  arxiv_id: '1803.01706'
  ads_bibcode: 2018ApJ...856L...3H
  title: 'Laboratory Simulations of Haze Formation in the Atmospheres of Super-Earths and Mini-Neptunes: Particle Color and
    Size Distribution'
  authors:
  - He, Chao
  - Hörst, Sarah M.
  - Lewis, Nikole K.
  - Yu, Xinting
  - Moses, Julianne I.
  - Kempton, Eliza M.-R.
  - McGuiggan, Patricia
  - Morley, Caroline V.
  - Valenti, Jeff A.
  - Vuitton, Véronique
  year: '2018'
  pubdate: '2018-03-00'
  doi: 10.3847/2041-8213/aab42b
  abstract: Super-Earths and mini-Neptunes are the most abundant types of planets among the ∼3500 confirmed exoplanets, and
    are expected to exhibit a wide variety of atmospheric compositions. Recent transmission spectra of super-Earths and mini-Neptunes
    have demonstrated the possibility that exoplanets have haze/cloud layers at high altitudes in their atmospheres. However,
    the compositions, size distributions, and optical properties of these particles in exoplanet atmospheres are poorly understood.
    Here, we present the results of experimental laboratory investigations of photochemical haze formation within a range
    of planetary atmospheric conditions, as well as observations of the color and size of produced haze particles. We find
    that atmospheric temperature and metallicity strongly affect particle color and size, thus altering the particles’ optical
    properties (e.g., absorptivity, scattering, etc.); on a larger scale, this affects the atmospheric and surface temperature
    of the exoplanets, and their potential habitability. Our results provide constraints on haze formation and particle properties
    that can serve as critical inputs for exoplanet atmosphere modeling, and guide future observations of super-Earths and
    mini-Neptunes with the Transiting Exoplanet Survey Satellite, the James Webb Space Telescope, and the Wide-Field Infrared
    Survey Telescope.
