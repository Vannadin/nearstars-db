- &id686
  arxiv_id: '1003.5802'
  ads_bibcode: 2010A&A...515A..98P
  title: Coronal properties of planet-bearing stars
  authors:
  - Poppenhaeger, K.
  - Robrade, J.
  - Schmitt, J. H. M. M.
  year: '2010'
  pubdate: '2010-06-00'
  doi: 10.1051/0004-6361/201014245
  abstract: 'Context. Do extrasolar planets affect the activity of their host stars? Indications for chromospheric activity
    enhancement have been found for a handful of targets, but in the X-ray regime, conclusive observational evidence is still
    missing. <BR /> Aims: We want to establish a sound observational basis to confirm or reject major effects of Star-Planet
    Interactions (SPI) in stellar X-ray emissions. <BR /> Methods: We therefore conduct a statistical analysis of stellar
    X-ray activity of all known planet-bearing stars within 30 pc distance for dependencies on planetary parameters such as
    mass and semimajor axis. <BR /> Results: In our sample, there are no significant correlations of X-ray luminosity or the
    activity indicator L_X/L_bol with planetary parameters which cannot be explained by selection effects. <BR /> Conclusions:
    Coronal SPI seems to be a phenomenon which might only manifest itself as a strong effect for a few individual targets,
    but not to have a major effect on planet-bearing stars in general.'
