  title: 'ATOCA: an Algorithm to Treat Order Contamination. Application to the NIRISS SOSS Mode'
  authors:
  - Darveau-Bernier, Antoine
  - Albert, Loïc
  - Talens, Geert Jan
  - Lafrenière, David
  - Radica, Michael
  - Doyon, René
  - Cook, Neil J.
  - Rowe, Jason F.
  - Allart, Romain
  - Artigau, Étienne
  - Benneke, Björn
