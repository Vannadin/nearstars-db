  title: JWST/NIRISS Reveals the Water-rich "Steam World" Atmosphere of GJ 9827 d
  authors:
  - Piaulet-Ghorayeb, Caroline
  - Benneke, Björn
  - Radica, Michael
  - Raul, Eshan
  - Coulombe, Louis-Philippe
