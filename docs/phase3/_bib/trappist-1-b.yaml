- &id348
  arxiv_id: '2409.03812'
  ads_bibcode: 2024AJ....168..227C
  title: Biases in Exoplanet Transmission Spectra Introduced by Limb-darkening Parametrization
  authors:
  - Coulombe, Louis-Philippe
  - Roy, Pierre-Alexis
  - Benneke, Björn
  year: '2024'
  pubdate: '2024-11-00'
  doi: 10.3847/1538-3881/ad7aef
  abstract: One of the main endeavors of the field of exoplanetary sciences is the characterization of exoplanet atmospheres
    on a population level. The current method of choice to accomplish this task is transmission spectroscopy, where the apparent
    radius of a transiting exoplanet is measured at multiple wavelengths in search of atomic and molecular absorption features
    produced by the upper atmosphere constituents. To extract the planetary radius from a transit light curve, it is necessary
    to account for the decrease in luminosity away from the center of the projected stellar disk, known as limb darkening.
    Physically motivated parametrizations of limb darkening, in particular of the quadratic form, are commonly used in exoplanet
    transit light-curve fitting. Here, we show that such parametrizations can introduce significant wavelength-dependent biases
    in the transmission spectra currently obtained with all instrument modes of the JWST, and thus have the potential to affect
    atmospheric inferences. To avoid such biases, we recommend the use of standard limb-darkening parametrizations with wide
    uninformative priors that allow for nonphysical stellar intensity profiles in the transit fits, and thus for a complete
    and symmetrical exploration of the parameter space. We further find that fitting the light curves at the native resolution
    results in errors on the measured transit depths that are significantly smaller compared to light curves that are binned
    in wavelength before fitting, thus potentially maximizing the amount of information that can be extracted from the data.
  source: citation_of=2025ApJ...989..181P
