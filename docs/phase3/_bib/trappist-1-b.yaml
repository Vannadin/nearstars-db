  abstract: TRAPPIST-1 hosts seven Earth-sized planets transiting an M8 star. We observed mid-transit times of each of the
    inner two planets with the Astrophysical Research Consortium (ARC) 3.5 m Telescope at Apache Point Observatory (APO) to
    help constrain the planet masses with transit timing variations, and we outline a procedure for analyzing transit observations
