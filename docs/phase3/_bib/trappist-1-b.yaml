  abstract: The current state and surface conditions of the Earth and its twin planet Venus are drastically different. Whether
    these differences are directly inherited from the earliest stages of planetary evolution, when the interior was molten,
    or arose later during the long-term evolution is still unclear. Yet, it is clear that water, its abundance, state, and
    distribution between the different planetary reservoirs, which are intimately related to the solidification and outgassing
    of the early magma ocean, are key components regarding past and present-day habitability, planetary evolution, and the
    different pathways leading to various surface conditions.
