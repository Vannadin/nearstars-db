  arxiv_id: '1710.02604'
  ads_bibcode: 2018MNRAS.476.2199L
  title: 'Optically thin core accretion: how planets get their gas in nearly gas-free discs'
  authors:
  - Lee, Eve J.
  - Chiang, Eugene
  - Ferguson, Jason W.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.1093/mnras/sty389
  abstract: 'Models of core accretion assume that in the radiative zones of accreting gas envelopes, radiation diffuses. But
    super-Earths/sub-Neptunes (1-4 R<SUB>⊕</SUB>, 2-20 M<SUB>⊕</SUB>) point to formation conditions that are optically thin:
    their modest gas masses are accreted from short-lived and gas-poor nebulae reminiscent of the transparent cavities of
    transitional discs. Planetary atmospheres born in such environments can be optically thin to both incident starlight and
    internally generated thermal radiation. We construct time-dependent models of such atmospheres, showing that super-Earths/sub-Neptunes
    can accrete their ∼1 per cent-by-mass gas envelopes, and super-puffs/sub-Saturns their ∼20 per cent-by-mass envelopes,
    over a wide range of nebular depletion histories requiring no fine tuning. Although nascent atmospheres can exhibit stratospheric
    temperature inversions affected by atomic Fe and various oxides that absorb strongly at visible wavelengths, the rate
    of gas accretion remains controlled by the radiative-convective boundary (rcb) at much greater pressures. For dusty envelopes,
    the temperature at the rcb T<SUB>rcb</SUB> ≃ 2500 K is still set by H<SUB>2</SUB> dissociation; for dust-depleted envelopes,
    T<SUB>rcb</SUB> tracks the temperature of the visible or thermal photosphere, whichever is deeper, out to at least ∼5
    au. The rate of envelope growth remains largely unchanged between the old radiative diffusion models and the new optically
    thin models, reinforcing how robustly super-Earths form as part of the endgame chapter in disc evolution.'
