  arxiv_id: '2309.15972'
  ads_bibcode: 2023AJ....166..199O
  title: The Prospect of Detecting Volcanic Signatures on an ExoEarth Using Direct Imaging
  authors:
  - Ostberg, Colby M.
  - Guzewich, Scott D.
  - Kane, Stephen R.
  - Kohler, Erika
