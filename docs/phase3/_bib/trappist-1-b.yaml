  abstract: An electron transport/energy deposition model is expanded to include atomic nitrogen and is coupled with a 1-D
    hydrodynamic thermosphere model. The coupled model is used to investigate the response of the Earth's thermosphere under
    extreme solar EUV conditions and is compared with previous studies. It is found that (1) the parameterization of Swartz
