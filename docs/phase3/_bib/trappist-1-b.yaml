  ads_bibcode: 2019AmMin.104.1369S
  title: 'Carbonation and decarbonation reactions: Implications for planetary habitability'
  authors:
  - Stewart, E. M.
  - Ague, Jay J.
  - Ferry, John M.
  - Schiffries, Craig M.
  - Tao, Ren-Biao
  - Isson, Terry T.
