  doi: 10.1007/s11214-014-0039-5
  abstract: Mercury's regolith, derived from the crustal bedrock, has been altered by a set of space weathering processes.
    Before we can interpret crustal composition, it is necessary to understand the nature of these surface alterations. The
    processes that space weather the surface are the same as those that form Mercury's exosphere (micrometeoroid flux and
    solar wind interactions) and are moderated by the local space environment and the presence of a global magnetic field.
    To comprehend how space weathering acts on Mercury's regolith, an understanding is needed of how contributing processes
    act as an interactive system. As no direct information (e.g., from returned samples) is available about how the system
    of space weathering affects Mercury's regolith, we use as a basis for comparison the current understanding of these same
    processes on lunar and asteroidal regoliths as well as laboratory simulations. These comparisons suggest that Mercury's
    regolith is overturned more frequently (though the characteristic surface time for a grain is unknown even relative to
    the lunar case), more than an order of magnitude more melt and vapor per unit time and unit area is produced by impact
    processes than on the Moon (creating a higher glass content via grain coatings and agglutinates), the degree of surface
    irradiation is comparable to or greater than that on the Moon, and photon irradiation is up to an order of magnitude greater
    (creating amorphous grain rims, chemically reducing the upper layers of grains to produce nanometer scale particles of
    metallic iron, and depleting surface grains in volatile elements and alkali metals). The processes that chemically reduce
    the surface and produce nanometer-scale particles on Mercury are suggested to be more effective than similar processes
    on the Moon. Estimated abundances of nanometer-scale particles can account for Mercury's dark surface relative to that
    of the Moon without requiring macroscopic grains of opaque minerals. The presence of nanometer-scale particles may also
    account for Mercury's relatively featureless visible-near-infrared reflectance spectra. Characteristics of material returned
    from asteroid 25143 Itokawa demonstrate that this nanometer-scale material need not be pure iron, raising the possibility
    that the nanometer-scale material on Mercury may have a composition different from iron metal [such as (Fe,Mg)S]. The
    expected depletion of volatiles and particularly alkali metals from solar-wind interaction processes are inconsistent
    with the detection of sodium, potassium, and sulfur within the regolith. One plausible explanation invokes a larger fine
    fraction (grain size &lt;45 μm) and more radiation-damaged grains than in the lunar surface material to create a regolith
    that is a more efficient reservoir for these volatiles. By this view the volatile elements detected are present not only
    within the grain structures, but also as adsorbates within the regolith and deposits on the surfaces of the regolith grains.
    The comparisons with findings from the Moon and asteroids provide a basis for predicting how compositional modifications
    induced by space weathering have affected Mercury's surface composition.
