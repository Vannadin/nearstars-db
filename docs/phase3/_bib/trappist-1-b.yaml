- &id183
  arxiv_id: '2009.14599'
  ads_bibcode: 2020A&A...643A..81K
  title: Effect of mantle oxidation state and escape upon the evolution of Earth's magma ocean atmosphere
  authors:
  - Katyal, Nisha
  - Ortenzi, Gianluigi
  - Lee Grenfell, John
  - Noack, Lena
  - Sohl, Frank
  - Godolt, Mareike
  - García Muñoz, Antonio
  - Schreier, Franz
  - Wunderlich, Fabian
  - Rauer, Heike
  year: '2020'
  pubdate: '2020-11-00'
  doi: 10.1051/0004-6361/202038779
  abstract: 'Context. The magma ocean period was a critical phase determining how Earth''s atmosphere developed into habitability.
    However, there are major uncertainties in the role of key processes such as outgassing from the planetary interior and
    escape of species to space that play a major role in determining the atmosphere of early Earth. <BR /> Aims: We investigate
    the effect of outgassing of various species and escape of H<SUB>2</SUB> for different mantle redox states upon the composition
    and evolution of the atmosphere for the magma ocean period. <BR /> Methods: We included an important new atmosphere-interior
    coupling mechanism: the redox evolution of the mantle, which strongly affects the outgassing of species. We simulated
    the volatile outgassing and chemical speciation at the surface for various redox states of the mantle by employing a C-H-O
    based chemical speciation model combined with an interior outgassing model. We then applied a line-by-line radiative transfer
    model to study the remote appearance of the planet in terms of the infrared emission and transmission. Finally, we used
    a parameterized diffusion-limited and XUV energy-driven atmospheric escape model to calculate the loss of H<SUB>2</SUB>
    to space. <BR /> Results: We have simulated the thermal emission and transmission spectra for reduced and oxidized atmospheres
    present during the magma ocean period of Earth. Reduced/thin atmospheres consisting of H<SUB>2</SUB> in abundance emit
    more radiation to space and have a larger effective height than oxidized/thick atmospheres, which are abundant in H<SUB>2</SUB>O
    and CO<SUB>2</SUB>. We obtain that the outgassing rates of H<SUB>2</SUB> from the mantle into the atmosphere are a factor
    of ten times higher than the rates of diffusion-limited escape to space. We estimate the timescale of total mass loss
    of outgassed H<SUB>2</SUB> via escape to be few tens of million years, which is comparable to other studies. <BR /> Conclusions:
    Our work presents useful insight into the development of the terrestrial atmosphere during the magma ocean period and
    provides input to guide future studies that discuss exoplanetary interior compositions and their possible links with atmospheric
    compositions that might be estimated from observed infrared spectra by future missions.'
  source: citation_of=2026ApJ...999..153W
