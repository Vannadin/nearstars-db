  doi: 10.3847/2515-5172/acabc7
  abstract: 'We present the Space Telescope Science Institute Wide Field Camera 3 (WFC3) project webpage, Transiting Exoplanets
    List of Space Telescope Spectroscopy, TrExoLiSTS. It tabulates existing observations of transiting exoplanet atmospheres,
    available in the MAST archive made with Hubble Space Telescope (HST) WFC3 using the stare or spatial scan mode. A parallel
    page is available for all instruments aboard James Webb Space Telescope (JWST) using the spectral Time Series Observation
    mode. The webpages include observations obtained during primary transits, secondary eclipses and phase curves. TREXOLISTS
    facilitates proposal preparation for programs that are highly complementary to existing programs in terms of targets,
    wavelength coverage, as well as reduces duplication and redundant effort. Reference for the quality of the HST WFC3 visits
    taken more than 1.5 yr ago are made available via including diagrams of the direct image, white light curve and drift
    of the spectral time series across the detector. Future improvements to the webpage will include: Expanding program query
    to other HST instruments and reference for the quality of JWST visits.'
