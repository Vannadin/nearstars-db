  arxiv_id: '1205.6514'
  ads_bibcode: 2013Icar..226.1673H
  title: Temperature-dependent molecular absorption cross sections for exoplanets and other atmospheres
  authors:
  - Hill, Christian
  - Yurchenko, Sergei N.
  - Tennyson, Jonathan
  year: '2013'
  pubdate: '2013-11-00'
  doi: 10.1016/j.icarus.2012.07.028
  abstract: Exoplanets, and in particular hot ones such as hot Jupiters, require very significant quantities of molecular
    spectroscopic data to model radiative transport in their atmospheres or to interpret their spectra. This data is commonly
    provided in the form of very extensive transition line lists. The size of these line lists is such that constructing a
    single model may require the consideration of several billion lines. We present a procedure to simplify this process based
    on the use of cross sections. Line lists for water, H3+, HCN/HNC and ammonia have been turned into cross sections on a
    fine enough grid to preserve their spectroscopic features. Cross sections are provided at a fixed range of temperatures
    and an interpolation procedure which can be used to generate cross sections at arbitrary temperatures is described. A
    web-based interface (www.exomol.com/xsecs) has been developed to allow astronomers to download cross sections at specified
    temperatures and spectral resolution. Specific examples are presented for water and ammonia.
