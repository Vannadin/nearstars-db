- &id446
  arxiv_id: '1307.2341'
  ads_bibcode: 2013A&A...557A..31L
  title: Star-planet magnetic interaction and evaporation of planetary atmospheres
  authors:
  - Lanza, A. F.
  year: '2013'
  pubdate: '2013-09-00'
  doi: 10.1051/0004-6361/201321790
  abstract: 'Context. Stars interact with their close-in planets through radiation, gravitation and magnetic fields. <BR />
    Aims: We investigate the energy input to a planetary atmosphere by reconnection between stellar and planetary magnetic
    fields and compare it to the energy input of the extreme ultraviolet (EUV) radiation field of the star. <BR /> Methods:
    We quantify the power released by magnetic reconnection at the boundary of the planetary magnetosphere that is conveyed
    to the atmosphere by accelerated electrons. We introduce simple models to evaluate the energy spectrum of the accelerated
    electrons and the energy dissipated in the atmospheric layers in the polar region of the planet upon which they impinge.
    A simple transonic isothermal wind flow along field lines is considered to estimate the increase in mass loss rate in
    comparison with a planet irradiated only by the EUV flux of its host star. <BR /> Results: We find that energetic electrons
    can reach levels down to column densities of 10<SUP>23</SUP>-10<SUP>25</SUP> m<SUP>-2</SUP>, comparable with or deeper
    than EUV photons, and increase the mass loss rate up to a factor of 30-50 in close-in (&lt; 0.10 AU), massive (≥1.5 Jupiter
    masses) planets. Mass loss rates up to (0.5-1.0) × 10<SUP>9</SUP> kg s<SUP>-1</SUP> are found for atmospheres heated by
    electrons accelerated by magnetic reconnection at the boundary of planetary magnetospheres. On the other hand, average
    mass loss rates up to (0.3-1.0) × 10<SUP>10</SUP> kg s<SUP>-1</SUP> are found in the case of magnetic loops interconnecting
    the planet with the star. <BR /> Conclusions: The star-planet magnetic interaction provides a remarkable source of energy
    for planetary atmospheres, generally comparable with or exceeding that of stellar EUV radiation for close-in planets.
    Therefore, it must be included in models of chemical evolution or evaporation of planetary atmospheres as well as in modelling
    of light curves of transiting planets at UV wavelengths.'
