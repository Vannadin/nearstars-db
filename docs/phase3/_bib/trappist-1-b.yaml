  arxiv_id: '2309.02337'
  ads_bibcode: 2024MNRAS.527.7263K
  title: 'FASTCHEM COND: equilibrium chemistry with condensation and rainout for cool planetary and stellar environments'
  authors:
  - Kitzmann, Daniel
  - Stock, Joachim W.
  - Patzer, A. Beate C.
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.1093/mnras/stad3515
  abstract: Cool astrophysical objects, such as (exo)planets, brown dwarfs, or asymptotic giant branch stars, can be strongly
    affected by condensation. Condensation not only directly affects the chemical composition of the gas phase by removing
    elements but the condensed material also influences other chemical and physical processes in these objects. This includes,
    for example, the formation of clouds in planetary atmospheres and brown dwarfs or the dust-driven winds of evolved stars.
    In this study, we introduce FASTCHEM COND, a new version of the FASTCHEM equilibrium chemistry code that adds a treatment
    of equilibrium condensation. Determining the equilibrium composition under the impact of condensation is complicated by
    the fact that the number of condensates that can exist in equilibrium with the gas phase is limited by a phase rule. However,
    this phase rule does not directly provide information as to which condensates are stable. A major advantage of FASTCHEM
    COND is its ability to automatically select the set stable condensates satisfying the phase rule. Besides the normal equilibrium
    condensation, FASTCHEM COND can also be used with the rainout approximation that is commonly employed in atmospheres of
    brown dwarfs or (exo)planets. FASTCHEM COND is available as open-source code, released under the GNU General Public Licence
    3 (GPLv3). In addition to the C++ code, FASTCHEM COND also offers a PYTHON interface. Together with the code update, we
    also add about 290 liquid and solid condensate species to FASTCHEM.
