  ads_bibcode: 2024ApJ...975L..11B
  title: Atmospheric Retrievals Suggest the Presence of a Secondary Atmosphere and Possible Sulfur Species on L98-59 d from
    JWST Nirspec G395H Transmission Spectroscopy
  authors:
  - Banerjee, Agnibha
  - Barstow, Joanna K.
  - Gressier, Amélie
  - Espinoza, Néstor
  - Sing, David K.
