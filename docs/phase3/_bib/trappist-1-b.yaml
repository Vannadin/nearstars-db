  doi: 10.1051/0004-6361/202554529
  abstract: With the arrival of JWST observations of the TRAPPIST-1 planets ─ particularly secondary transit depths and phase
    curves ─ it is timely to reassess the contribution of tidal heating to their heat budget. JWST thermal phase curves could
    reveal endogenic heating through an anomalously high nightside temperature, providing an opportunity to estimate tidal
    heating. In this study, we revisit the tidal heating of these planets and propose a simple method to compute the tidal
    heating profile across a broad range of parameters. Our approach leverages a known formulation for synchronously rotating
    planets on low-eccentricity orbits and the fact that the profile shape depends solely on internal structure. We recalculate
    the tidal heating contributions for all TRAPPIST-1 planets, with a particular focus on the impact of internal structure
    (core size and viscosity profile) and eccentricity uncertainties on their total heat budget. Although the masses and radii
    of these planets are well constrained, degeneracies remain in their internal structure and composition. We investigate
    the role of core iron content for volatile-poor planets of silicate-rock compositions by exploring a range of core sizes.
    For each structure, we compute the degree-two gravitational Love number, k<SUB>2</SUB>, and the corresponding tidal heating
    profiles. We assume sub-solidus temperature profiles that are decoupled from interior heat production, which means our
    estimates are conservative and likely represent minimum values. We find that the tidal heat flux for TRAPPIST-1 b and
    c can exceed Io's heat flux, with uncertainties primarily driven by eccentricity. These high fluxes may be detectable
    with JWST. For planets f to g, the tidal flux remains below Earth's geothermal flux, suggesting that tidal heating is
    unlikely to be the dominant energy source. For planets d and e, however, tidal heating likely dominates their heat budget,
    potentially driving intense volcanic and tectonic activity, which could enhance their habitability prospects.
