- &id210
  arxiv_id: '1804.06346'
  ads_bibcode: 2018ApJ...858..105K
  title: Effective Induction Heating around Strongly Magnetized Stars
  authors:
  - Kislyakova, K. G.
  - Fossati, L.
  - Johnstone, C. P.
  - Noack, L.
  - Lüftinger, T.
  - Zaitsev, V. V.
  - Lammer, H.
  year: '2018'
  pubdate: '2018-05-00'
  doi: 10.3847/1538-4357/aabae4
  abstract: Planets that are embedded in the changing magnetic fields of their host stars can experience significant induction
    heating in their interiors caused by the planet’s orbital motion. For induction heating to be substantial, the planetary
    orbit has to be inclined with respect to the stellar rotation and dipole axes. Using WX UMa, for which the rotation and
    magnetic axes are aligned, as an example, we show that for close-in planets on inclined orbits, induction heating can
    be stronger than the tidal heating occurring inside Jupiter’s satellite Io; namely, it can generate a surface heat flux
    exceeding 2 W m<SUP>-2</SUP>. An internal heating source of such magnitude can lead to extreme volcanic activity on the
    planet’s surface, possibly also to internal local magma oceans, and to the formation of a plasma torus around the star
    aligned with the planetary orbit. A strongly volcanically active planet would eject into space mostly SO<SUB>2</SUB>,
    which would then dissociate into oxygen and sulphur atoms. Young planets would also eject CO<SUB>2</SUB>. Oxygen would
    therefore be the major component of the torus. If the O I column density of the torus exceeds ≈10<SUP>12</SUP> cm<SUP>-2</SUP>,
    the torus could be revealed by detecting absorption signatures at the position of the strong far-ultraviolet O I triplet
    at about 1304 Å. We estimate that this condition is satisfied if the O I atoms in the torus escape the system at a velocity
    smaller than 1-10 km s<SUP>-1</SUP>. These estimates are valid also for a tidally heated planet.
  source: citation_of=2025ApJ...989L..11C
