  title: New views of the solar wind with the Lambert W function
  authors:
  - Cranmer, Steven R.
  year: '2004'
  pubdate: '2004-11-00'
  doi: 10.1119/1.1775242
  abstract: This paper presents closed-form analytic solutions to two illustrative problems in solar physics that have been
    considered not solvable in this way previously. Both the outflow speed and the mass loss rate of the solar wind of plasma
    particles ejected by the Sun are derived analytically for certain illustrative approximations. The calculated radial dependence
    of the flow speed applies to both Parker's isothermal solar wind equation and Bondi's equation of spherical accretion.
    These problems involve the solution of transcendental equations containing products of variables and their logarithms.
    Such equations appear in many fields of physics and are solvable by use of the Lambert W function, which is briefly described.
    This paper is an example of how new functions can be applied to existing problems.
