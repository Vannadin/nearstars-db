  ads_bibcode: 2023A&A...680A..96A
  title: The brighter-fatter effect in the JWST MIRI Si:As IBC detectors. I. Observations, impact on science, and modeling
  authors:
  - Argyriou, Ioannis
  - Lage, Craig
  - Rieke, George H.
  - Gasman, Danny
  - Bouwman, Jeroen
  - Morrison, Jane
  - Libralato, Mattia
  - Dicken, Daniel
  - Brandl, Bernhard R.
  - Álvarez-Márquez, Javier
  - Labiano, Alvaro
  - Regan, Michael
  - Ressler, Michael E.
  year: '2023'
  pubdate: '2023-12-00'
  doi: 10.1051/0004-6361/202346490
  abstract: 'Context. The Mid-Infrared Instrument (MIRI) on board the James Webb Space Telescope (JWST) uses three Si:As impurity
    band conduction (IBC) detector arrays. The output voltage level of each MIRI detector pixel is digitally recorded by sampling
    up the ramp. For uniform or low-contrast illumination, the pixel ramps become nonlinear in a predictable way, but in areas
    of high contrast, the nonlinearity curve becomes much more complex. The origin of the effect is poorly understood and
    currently not calibrated out of the data. <BR /> Aims: We provide observational evidence of the brighter-fatter effect
    (BFE) in MIRI conventional and high-contrast coronagraphic imaging, low-resolution spectroscopy, and medium-resolution
    spectroscopy data, and we investigate the physical mechanism that gives rise to the effect on the MIRI detector pixel
    raw voltage integration ramps. <BR /> Methods: We used public data from the JWST/MIRI commissioning and Cycle 1 phase.
    We also developed a numerical electrostatic model of the MIRI detectors using a modified version of the public Poisson_CCD
    code. <BR /> Results: We find that the physical mechanism behind the BFE manifesting in MIRI data is fundamentally different
    to that of charge-coupled devices and photodiode arrays such as the Hawaii-XRG near-infrared detectors used by the NIRISS,
    NIRCam, and NIRSpec instruments on board JWST. Observationally, the BFE makes the JWST MIRI data yield 10-25% larger point
    sources and spectral line profiles as a function of the relative level of de-biasing of neighboring detector pixels. This
    broadening impacts the MIRI absolute flux calibration, time-series observations of faint companions, and point spread
    function modeling and subtraction. We also find that the intra-pixel 2D profile of the shrinking Si:As IBC detector depletion
    region directly impacts the accuracy of the pixel ramp nonlinearity calibration model.'
