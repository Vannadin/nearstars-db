  arxiv_id: null
  ads_bibcode: 2016MNRAS.463.2480B
  title: Fragmentation of protoplanetary discs around M-dwarfs
  authors:
  - Backus, Isaac
  - Quinn, Thomas
  year: '2016'
  pubdate: '2016-12-00'
  doi: 10.1093/mnras/stw1825
  abstract: We investigate the conditions required for planet formation via gravitational instability (GI) and protoplanetary
    disc (PPD) fragmentation around M-dwarfs. Using a suite of 64 SPH simulations with 10<SUP>6</SUP> particles, the parameter
    space of disc mass, temperature, and radius is explored, bracketing reasonable values based on theory and observation.
    Our model consists of an equilibrium, gaseous, and locally isothermal disc orbiting a central star of mass M<SUB>*</SUB>
    = M<SUB>☉</SUB>/3. Discs with a minimum Toomre Q of Q<SUB>min</SUB> ≲ 0.9 will fragment and form gravitationally bound
    clumps. Some previous literature has found Q<SUB>min</SUB> &lt; 1.3-1.5 to be sufficient for fragmentation. Increasing
    disc height tends to stabilize discs, and when incorporated into Q as Q<SUB>eff</SUB> ∝ Q(H/R)<SUP>α</SUP> for α = 0.18
    is sufficient to predict fragmentation. Some discrepancies in the literature regarding Q<SUB>crit</SUB> may be due to
    different methods of generating initial conditions (ICs). A series of 15 simulations demonstrates that perturbing ICs
    slightly out of equilibrium can cause discs to fragment for higher Q. Our method for generating ICs is presented in detail.
    We argue that GI likely plays a role in PPDs around M-dwarfs and that disc fragmentation at large radii is a plausible
    outcome for these discs.
