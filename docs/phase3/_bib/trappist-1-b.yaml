  ads_bibcode: 2017AJ....153...56M
  title: 'HELIOS: An Open-source, GPU-accelerated Radiative Transfer Code for Self-consistent Exoplanetary Atmospheres'
  authors:
  - Malik, Matej
  - Grosheintz, Luc
  - Mendonça, João M.
  - Grimm, Simon L.
  - Lavie, Baptiste
  - Kitzmann, Daniel
