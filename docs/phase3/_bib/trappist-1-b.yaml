  arxiv_id: '2107.06293'
  ads_bibcode: 2021ApJ...920...42H
  title: EvryFlare. IV. Detection of Periodicity in Flare Occurrence from Cool Stars with TESS
  authors:
  - Howard, Ward S.
  - Law, Nicholas M.
  year: '2021'
  pubdate: '2021-10-00'
  doi: 10.3847/1538-4357/ac142a
  abstract: Phased flaring, or the periodic occurrence of stellar flares, may probe electromagnetic star-planet interaction
    (SPI), binary interaction, or magnetic conditions in spots. For the first time, we explore flare periodograms for a large
    sample of flare stars to identify periodicity due to magnetic interactions with orbiting companions, magnetic reservoirs,
    or rotational phase. Previous large surveys have explored periodicity at the stellar rotation period, but we do not assume
    periods must correspond with rotation in this work. Two-minute TESS light curves of 284 cool stars are searched for periods
    of 1-10 days using two newly developed periodograms. Because flares are discrete events in noisy and incomplete data,
    typical periodograms are not well suited to detect phased flaring. We construct and test a new Bayesian likelihood periodogram
    and a modified Lomb-Scargle periodogram. We find six candidates with a false-alarm probability below 1%. Three targets
    are ≥3σ detections of flare periodicity; the others are plausible candidates that cannot be individually confirmed. Periods
    range from 1.35 to 6.7 days and some, but not all, correlate with the stellar rotation period or its 1/2 alias. Periodicity
    from two targets may persist from TESS Cycle 1 into Cycle 3. The periodicity does not appear to persist for the others.
    Long-term changes in periodicity may result from the spot evolution observed from each candidate, which suggests magnetic
    conditions play an important role in sustaining periodicity.
