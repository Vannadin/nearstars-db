- &id553
  arxiv_id: '1909.04642'
  ads_bibcode: 2019ApJ...887L..14B
  title: Water Vapor and Clouds on the Habitable-zone Sub-Neptune Exoplanet K2-18b
  authors:
  - Benneke, Björn
  - Wong, Ian
  - Piaulet, Caroline
  - Knutson, Heather A.
  - Lothringer, Joshua
  - Morley, Caroline V.
  - Crossfield, Ian J. M.
  - Gao, Peter
  - Greene, Thomas P.
  - Dressing, Courtney
  - Dragomir, Diana
  - Howard, Andrew W.
  - McCullough, Peter R.
  - Kempton, Eliza M.-R.
  - Fortney, Jonathan J.
