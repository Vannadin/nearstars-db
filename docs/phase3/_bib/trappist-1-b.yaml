  abstract: Observations suggest that Mars was wet and warm during the late Noachian, which probably requires a dense CO<SUB>2</SUB>
    atmosphere. But would a dense CO<SUB>2</SUB> early Martian atmosphere have been stable under the strong EUV flux from
    the young Sun? Here we show that thermal escape of carbon was so efficient during the early Noachian, 4.1 billion years
    ago (Ga), that a CO<SUB>2</SUB>-dominated Martian atmosphere could not have been maintained, and Mars should have begun
    its life cold. By the mid to late Noachian, however, the solar EUV flux would have become weak enough to allow a dense
    CO<SUB>2</SUB> atmosphere to accumulate. Hence, a sustainable warm and wet period only appeared several hundred million
    years (Myrs) after Mars formed.
