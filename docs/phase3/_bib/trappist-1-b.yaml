  doi: 10.1051/0004-6361/201014144
  abstract: We used Spitzer and its IRAC camera to search for the transit of the super-Earth HD 40307b. The hypothesis that
    the planet transits could not be firmly discarded from our first photometric monitoring of a transit window because of
    the uncertainty coming from the modeling of the photometric baseline. To obtain a firm result, two more transit windows
    were observed and a global Bayesian analysis of the three IRAC time series and the HARPS radial velocities was performed.
    Unfortunately, the hypothesis that the planet transited during the observed phase window is firmly rejected, while the
    probability that the planet does transit but that the eclipse was missed by our observations is nearly negligible (0.26%).
    <P />The photometric time series used in this work are only available in electronic form at the CDS via anonymous ftp
    to cdsarc.u-strasbg.fr (130.79.128.5) or via <A href="http://cdsweb.u-strasbg.fr/cgi-bin/qcat?J/A+A/518/A25">http://cdsweb.u-strasbg.fr/cgi-bin/qcat?J/A+A/518/A25</A>
