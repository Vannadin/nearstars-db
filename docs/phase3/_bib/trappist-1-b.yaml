- arxiv_id: null
  ads_bibcode: 2017jwst.prop.1177G
  title: MIRI observations of transiting exoplanets
  authors:
  - Greene, Thomas P.
  - Lagage, Pierre-Olivier
  - Rieke, Marcia J.
  - Schlawin, Everett
  - Bell, Taylor James
  year: '2017'
  pubdate: '2017-06-00'
  doi: null
  abstract: 'We will observe the 5 - 15 micron spectra or photometry of a set of transiting planets that are less massive
    and cooler than ones spectrally characterized so far with HST and Spitzer. These planets fall mostly in the temperature
    range 400 - 1000 K with 1 - 200 Earth mass. We seek to obtain transmission and emission spectra (both for at least one
    planet) to probe a wide range of atmospheric pressures (altitudes) and surface regions. Simulations of these spectra and
    information retrievals show that we can measure mixing ratios of dominant molecular species, measure metallicities, determine
    pressure-temperature profiles, and perhaps detect new species not seen before in exoplanet atmospheres. We plan to observe
    four ice or gas giant planet spectra with the MIRI LRS and make 5 secondary eclipse observations of TRAPPIST-1 b using
    the MIRI imager in the F1500W filter. These 11 MIRI observations are conducted under T. Greene''s GTO program and correspond
    to Observation IDs GREENE_0001-11 in the summary observation specification spreadsheet submitted in March 2017 with one
    change: HAT-P-19 b has been replaced with WASP-69 b. The TRAPPIST-1 observations and spectroscopic observations of WASP-107b
    are being done in collaboration with the European MIRI GTO team (Wright PI). The other observations are being done in
    collaboration with NIRCam GTO team (M. Rieke PI). We will use state-of-the-art modeling and retrieval framework to derive
    physical and chemical properties from the combined NIRCam and MIRI exoplanet spectra.'
