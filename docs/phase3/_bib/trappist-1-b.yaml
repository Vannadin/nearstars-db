  doi: 10.3847/PSJ/ae1012
  abstract: We investigate the consequences of nonideal mixing between silicate, iron metal, and hydrogen for the structures
    of the cores of sub-Neptunes with implications for super-Earths and perhaps other planets formed by mixtures of silicate
    melt, iron metal, and significant mass fractions of hydrogen. A method of extrapolating what we know about the miscibility
    in the three bounding binary systems MgSiO<SUB>3</SUB>─H<SUB>2</SUB>, MgSiO<SUB>3</SUB>─Fe, and Fe─H<SUB>2</SUB> to the
    ternary composition space is used to deduce the phase equilibria of this system at relevant temperature and pressure conditions.
    We find that while separate silicate and metal phases can exist at shallow depths, the phases become entirely miscible
    deeper in the cores, thus altering the density structure of the cores. The assumption that the interiors of large rocky
    planets, either with extant magma oceans beneath H<SUB>2</SUB>-rich envelopes or evolved from such bodies, are composed
    of a differentiated metal core overlaid by a silicate mantle is inconsistent with our understanding of the phase equilibria
    of these bodies.
