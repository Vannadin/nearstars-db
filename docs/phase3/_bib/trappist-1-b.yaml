- &id489
  arxiv_id: null
  ads_bibcode: 2024ApJ...970..155S
  title: Why Observations at Mid-infrared Wavelengths Partially Mitigate M Dwarf Star Host Stellar Activity Contamination
    in Exoplanet Transmission Spectroscopy
  authors:
  - Seager, Sara
  - Shapiro, Alexander I.
  year: '2024'
  pubdate: '2024-08-00'
  doi: 10.3847/1538-4357/ad509a
  abstract: Exoplanet atmosphere transmission spectroscopy for planets orbiting M dwarf stars faces significant challenges
    due to contamination from stellar magnetic features, i.e., spots and faculae. These features make the stellar surface
    inhomogeneous and introduce wavelength-dependent signals in the transmission spectrum that complicate its analysis. We
    identify and explain why using observations at infrared wavelengths greater than a few microns partially mitigates stellar
    contamination. At these wavelengths the intensity sensitivity to temperature weakens, with two significant consequences.
    First, the contribution of spots and faculae has a diminished effect because their flux contrast to the quiet-star regions
    lessens. Second, the star's spectral features compress in magnitude, an outcome of spectral features being shaped by the
    star's photospheric vertical temperature gradient. Both factors are due to the Planck function moving from exponential
    to linear in temperature toward mid-infrared (mid-IR) wavelengths (the "Rayleigh─Jeans tail"). In contrast to stellar
    spectra, the depth of the transmission spectroscopy features does not fundamentally vary with wavelength as it is primarily
    determined by the planet's atmospheric scale height. The magnitude of reduction in stellar contamination is a factor of
    a few to several at mid-IR versus near-IR wavelengths, but whether or not this is enough to bypass stellar contamination
    ultimately depends on the spot coverage area. Nonetheless, the flattening of thermal emission spectral features at IR
    wavelengths is universal.
