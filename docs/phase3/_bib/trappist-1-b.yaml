- &id330
  arxiv_id: '1209.1615'
  ads_bibcode: 2013ApJ...764...26E
  title: Tidal Friction and Tidal Lagging. Applicability Limitations of a Popular Formula for the Tidal Torque
  authors:
  - Efroimsky, Michael
  - Makarov, Valeri V.
  year: '2013'
  pubdate: '2013-02-00'
  doi: 10.1088/0004-637X/764/1/26
  abstract: Tidal torques play a key role in rotational dynamics of celestial bodies. They govern these bodies' tidal despinning
    and also participate in the subtle process of entrapment of these bodies into spin-orbit resonances. This makes tidal
    torques directly relevant to the studies of habitability of planets and their moons. Our work begins with an explanation
    of how friction and lagging should be built into the theory of bodily tides. Although much of this material can be found
    in various publications, a short but self-consistent summary on the topic has been lacking in the hitherto literature,
    and we are filling the gap. After these preparations, we address a popular concise formula for the tidal torque, which
    is often used in the literature, for planets or stars. We explain why the derivation of this expression, offered in the
    paper by Goldreich and in the books by Kaula (Equation (4.5.29)) and Murray &amp; Dermott (Equation (4.159)), implicitly
    sets the time lag to be frequency independent. Accordingly, the ensuing expression for the torque can be applied only
    to bodies having a very special (and very hypothetical) rheology which makes the time lag frequency independent, i.e.,
    the same for all Fourier modes in the spectrum of tide. This expression for the torque should not be used for bodies of
    other rheologies. Specifically, the expression cannot be combined with an extra assertion of the geometric lag being constant,
    because at finite eccentricities the said assumption is incompatible with the constant-time-lag condition.
