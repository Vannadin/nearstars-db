- &id061
  arxiv_id: '2308.15110'
  ads_bibcode: 2023A&A...679A.126T
  title: Water condensation zones around main sequence stars
  authors:
  - Turbet, Martin
  - Fauchez, Thomas J.
  - Leconte, Jeremy
  - Bolmont, Emeline
  - Chaverot, Guillaume
  - Forget, Francois
  - Millour, Ehouarn
