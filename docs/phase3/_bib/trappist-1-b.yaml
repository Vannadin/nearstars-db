    sections have been calculated for transitions between the 2 s<SUP>2</SUP>2 p<SUP>4</SUP> and 2 s<SUP>2</SUP>2 p<SUP>3</SUP>3
    l states of oxygen in the energy range from threshold to 200 eV. The present work differs from numerous previous studies
    due to the inclusion of a large number of pseudostates in the calculation. We included a total of 1116 spectroscopic bound,
    core-excited autoionizing, and target continuum states in the close-coupling expansion. The atomic oxygen structure model
    has been described by combining the multiconfiguration Hartree-Fock and the B -spline box-based multichannel methods.
    The inclusion of a large number of pseudostates representing the target continuum has a major impact, especially on the
    theoretical prediction of the excitation cross sections for many transitions at intermediate energies. A large reduction
    in excitation and emission cross sections has been noted due to the inclusion of coupling to the ionization continuum.
