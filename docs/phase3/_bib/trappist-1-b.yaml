  arxiv_id: '2310.07714'
  ads_bibcode: 2024ApJ...961L..23B
  title: 'Clouds and Clarity: Revisiting Atmospheric Feature Trends in Neptune-size Exoplanets'
  authors:
  - Brande, Jonathan
  - Crossfield, Ian J. M.
  - Kreidberg, Laura
  - Morley, Caroline V.
  - Barman, Travis
  - Benneke, Björn
  - Christiansen, Jessie L.
  - Dragomir, Diana
  - Fortney, Jonathan J.
  - Greene, Thomas P.
  - Hardegree-Ullman, Kevin K.
