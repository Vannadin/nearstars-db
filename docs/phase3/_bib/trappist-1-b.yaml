  abstract: The atmosphere and ocean are two of the most important components of the climate system, and fluid dynamics is
    central to our understanding of both. This book provides a unified and comprehensive treatment of the field that blends
    classical results with modern interpretations. It takes the reader seamlessly from the basics to the frontiers of knowledge,
    from the equations of motion to modern theories of the general circulation of the atmosphere and ocean. These concepts
    are illustrated throughout the book with observations and numerical examples. As well as updating existing chapters, this
    full-color second edition includes new chapters on tropical dynamics, El Niño, the stratosphere and gravity waves. Supplementary
    resources are provided online, including figures from the book and problem sets, making this new edition an ideal resource
