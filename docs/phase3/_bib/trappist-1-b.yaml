  title: The 0.8-4.5 μm Broadband Transmission Spectra of TRAPPIST-1 Planets
  authors:
  - Ducrot, E.
  - Sestovic, M.
  - Morris, B. M.
  - Gillon, M.
  - Triaud, A. H. M. J.
