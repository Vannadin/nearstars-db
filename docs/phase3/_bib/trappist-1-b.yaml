  abstract: IRIS2 is a near-infrared imager and spectrograph based on a HAWAII1 HgCdTe detector. It provides wide-field (7.7"×7.7")
    imaging capabilities at 0.4486"/pixel sampling, long-slit spectroscopy at R~2400 in each of the J, H and K passbands,
