  arxiv_id: '2001.00955'
  ads_bibcode: 2020AJ....160..118S
  title: The First Habitable-zone Earth-sized Planet from TESS. III. Climate States and Characterization Prospects for TOI-700
    d
  authors:
  - Suissa, Gabrielle
  - Wolf, Eric T.
  - Kopparapu, Ravi kumar
  - Villanueva, Geronimo L.
  - Fauchez, Thomas
  - Mandell, Avi M.
  - Arney, Giada
