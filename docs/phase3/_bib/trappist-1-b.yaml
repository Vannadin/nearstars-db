- &id269
  arxiv_id: '2111.05862'
  ads_bibcode: 2022ApJ...929...20M
  title: 'TRIDENT: A Rapid 3D Radiative-transfer Model for Exoplanet Transmission Spectra'
  authors:
  - MacDonald, Ryan J.
  - Lewis, Nikole K.
  year: '2022'
  pubdate: '2022-04-00'
  doi: 10.3847/1538-4357/ac47fe
  abstract: 'Transmission spectroscopy is one of the premier methods used to probe the temperature, composition, and cloud
    properties of exoplanet atmospheres. Recent studies have demonstrated that the multidimensional nature of exoplanet atmospheres-due
    to nonuniformities across the day-night transition and between the morning and evening terminators-can strongly influence
    transmission spectra. However, the computational demands of 3D radiative-transfer techniques have precluded their usage
    within atmospheric retrievals. Here we introduce TRIDENT, a new 3D radiative-transfer model which rapidly computes transmission
    spectra of exoplanet atmospheres with day-night, morning-evening, and vertical variations in temperature, chemical abundances,
    and cloud properties. We also derive a general equation for transmission spectra, accounting for 3D atmospheres, refraction,
    multiple scattering, ingress/egress, grazing transits, stellar heterogeneities, and nightside thermal emission. After
    introducing TRIDENT''s linear-algebra-based approach to 3D radiative transfer, we propose new parametric prescriptions
    for 3D temperature and abundance profiles and 3D clouds. We show that multidimensional transmission spectra exhibit two
    significant observational signatures: (i) day-night composition gradients alter the relative amplitudes of absorption
    features; and (ii) morning-evening composition gradients distort the peak-to-wing contrast of absorption features. Finally,
    we demonstrate that these signatures of multidimensional atmospheres incur residuals &gt;100 ppm compared to 1D models,
    rendering them potentially detectable with the James Webb Space Telescope. TRIDENT''s rapid radiative transfer, coupled
    with parametric multidimensional atmospheres, unlocks the final barrier to 3D atmospheric retrievals.'
  source: citation_of=2025ApJ...990L..53G
