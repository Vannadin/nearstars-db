- &id395
  arxiv_id: '2112.14335'
  ads_bibcode: 2019A&A...630A.102C
  title: Spin-orbit coupling for close-in planets
  authors:
  - Correia, Alexandre C. M.
  - Delisle, Jean-Baptiste
  year: '2019'
  pubdate: '2019-10-00'
  doi: 10.1051/0004-6361/201936336
  abstract: We study the spin evolution of close-in planets in multi-body systems and present a very general formulation of
    the spin-orbit problem. This includes a simple way to probe the spin dynamics from the orbital perturbations, a new method
    for computing forced librations and tidal deformation, and general expressions for the tidal torque and capture probabilities
    in resonance. We show that planet-planet perturbations can drive the spin of Earth-size planets into asynchronous or chaotic
    states, even for nearly circular orbits. We apply our results to Mercury and to the KOI-1599 system of two super-Earths
    in a 3/2 mean motion resonance.
