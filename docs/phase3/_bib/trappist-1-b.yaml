  - Okuzumi, Satoshi
  year: '2019'
  pubdate: '2019-04-00'
  doi: 10.1051/0004-6361/201834556
  abstract: 'Context. The ocean mass of the Earth is only 2.3 × 10<SUP>-4</SUP> of the whole planet mass. Even including water
    in the interior, the water fraction would be at most 10<SUP>-3</SUP>-10<SUP>-2</SUP>. Ancient Mars may have had a similar
    or slightly smaller water fraction. What controlled the amount of water in these planets has not been clear, although
    several models have been proposed. It is important to clarify the control mechanism to discuss water delivery to rocky
    planets in habitable zones in exoplanetary systems, as well as that to Earth and Mars in our solar system. <BR /> Aims:
    We consider water delivery to planets by icy pebbles after the snowline inwardly passes planetary orbits. We derive the
    water mass fraction (f<SUB>water</SUB>) of the final planet as a function of disk parameters and discuss the parameters
    that reproduce a small value of f<SUB>water</SUB> comparable to that inferred for the Earth and ancient Mars. <BR /> Methods:
    We calculated the growth of icy dust grains to pebbles and the pebble radial drift with a 1D model, by simultaneously
    solving the snowline migration and dissipation of a gas disk. With the obtained pebble mass flux, we calculated accretion
    of icy pebbles onto planets after the snowline passage to evaluate f<SUB>water</SUB> of the planets. <BR /> Results: We
    find that f<SUB>water</SUB> is regulated by the total mass (M<SUB>res</SUB>) of icy dust materials preserved in the outer
    disk regions at the timing (t = t<SUB>snow</SUB>) of the snowline passage of the planetary orbit. Because M<SUB>res</SUB>
    decays rapidly after the pebble formation front reaches the disk outer edge (at t = t<SUB>pff</SUB>), f<SUB>water</SUB>
    is sensitive to the ratio t<SUB>snow</SUB>/t<SUB>pff</SUB>, which is determined by the disk parameters. We find t<SUB>snow</SUB>/t<SUB>pff</SUB>
    &lt; 10 or &gt; 10 is important. By evaluating M<SUB>res</SUB> analytically, we derive an analytical formula of f<SUB>water</SUB>
    that reproduces the numerical results. <BR /> Conclusions: Using the analytical formula, we find that f<SUB>water</SUB>
    of a rocky planet near 1 au is similar to the Earth, i.e., 10<SUP>-4</SUP>-10<SUP>-2</SUP>, in disks with an initial disk
    size of 30-50 au and an initial disk mass accretion rate of (10<SUP>-8</SUP>-10<SUP>-7</SUP>) M<SUB>☉</SUB> yr<SUP>-1</SUP>
    for disk depletion timescale of approximately a few M yr. Because these disks may be median or slightly compact/massive
    disks, our results suggest that the water fraction of rocky planets in habitable zones may often be similar to that of
    the Earth if icy pebble accretion is responsible for water delivery.'
