  arxiv_id: '2101.10991'
  ads_bibcode: 2021JGRE..12606711L
  title: 'Vertically Resolved Magma Ocean-Protoatmosphere Evolution: H<SUB>2</SUB>, H<SUB>2</SUB>O, CO<SUB>2</SUB>, CH<SUB>4</SUB>,
    CO, O<SUB>2</SUB>, and N<SUB>2</SUB> as Primary Absorbers'
  authors:
  - Lichtenberg, Tim
  - Bower, Dan J.
  - Hammond, Mark
  - Boukrouche, Ryan
  - Sanan, Patrick
  - Tsai, Shang-Min
  - Pierrehumbert, Raymond T.
  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.1029/2020JE006711
  abstract: 'The earliest atmospheres of rocky planets originate from extensive volatile release during magma ocean epochs
    that occur during assembly of the planet. These establish the initial distribution of the major volatile elements between
    different chemical reservoirs that subsequently evolve via geological cycles. Current theoretical techniques are limited
    in exploring the anticipated range of compositional and thermal scenarios of early planetary evolution, even though these
    are of prime importance to aid astronomical inferences on the environmental context and geological history of extrasolar
    planets. Here, we present a coupled numerical framework that links an evolutionary, vertically resolved model of the planetary
    silicate mantle with a radiative convective model of the atmosphere. Using this method, we investigate the early evolution
    of idealized Earth sized rocky planets with end member, clear sky atmospheres dominated by either H<SUB>2</SUB>, H<SUB>2</SUB>O,
    CO<SUB>2</SUB>, CH<SUB>4</SUB>, CO, O<SUB>2</SUB>, or N<SUB>2</SUB>. We find central metrics of early planetary evolution,
    such as energy gradient, sequence of mantle solidification, surface pressure, or vertical stratification of the atmosphere,
    to be intimately controlled by the dominant volatile and outgassing history of the planet. Thermal sequences fall into
    three general classes with increasing cooling timescale: CO, N<SUB>2</SUB>, and O<SUB>2</SUB> with minimal effect, H<SUB>2</SUB>O,
    CO<SUB>2</SUB>, and CH<SUB>4</SUB> with intermediate influence, and H<SUB>2</SUB> with several orders of magnitude increase
    in solidification time and atmosphere vertical stratification. Our numerical experiments exemplify the capabilities of
    the presented modeling framework and link the interior and atmospheric evolution of rocky exoplanets with multiwavelength
    astronomical observations.'
