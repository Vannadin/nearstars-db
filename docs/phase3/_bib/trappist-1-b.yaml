  abstract: Transmission spectroscopy<SUP>1-3</SUP> of exoplanets has revealed signatures of water vapour, aerosols and alkali
    metals in a few dozen exoplanet atmospheres<SUP>4,5</SUP>. However, these previous inferences with the Hubble and Spitzer
    Space Telescopes were hindered by the observations' relatively narrow wavelength range and spectral resolving power, which
    precluded the unambiguous identification of other chemical species—in particular the primary carbon-bearing molecules<SUP>6,7</SUP>.
    Here we report a broad-wavelength 0.5-5.5 µm atmospheric transmission spectrum of WASP-39b<SUP>8</SUP>, a 1,200 K, roughly
    Saturn-mass, Jupiter-radius exoplanet, measured with the JWST NIRSpec's PRISM mode<SUP>9</SUP> as part of the JWST Transiting
    Exoplanet Community Early Release Science Team Program<SUP>10-12</SUP>. We robustly detect several chemical species at
    high significance, including Na (19σ), H<SUB>2</SUB>O (33σ), CO<SUB>2</SUB> (28σ) and CO (7σ). The non-detection of CH<SUB>4</SUB>,
    combined with a strong CO<SUB>2</SUB> feature, favours atmospheric models with a super-solar atmospheric metallicity.
    An unanticipated absorption feature at 4 µm is best explained by SO<SUB>2</SUB> (2.7σ), which could be a tracer of atmospheric
    photochemistry. These observations demonstrate JWST's sensitivity to a rich diversity of exoplanet compositions and chemical
    processes.
