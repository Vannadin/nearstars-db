  ads_bibcode: 2024Natur.630..609H
  title: A secondary atmosphere on the rocky exoplanet 55 Cancri e
  authors:
  - Hu, Renyu
  - Bello-Arufe, Aaron
  - Zhang, Michael
  - Paragas, Kimberly
  - Zilinskas, Mantas
  - van Buchem, Christiaan
  - Bess, Michael
  - Patel, Jayshil
  - Ito, Yuichi
  - Damiano, Mario
  - Scheucher, Markus
  - Oza, Apurva V.
  - Knutson, Heather A.
  - Miguel, Yamila
  - Dragomir, Diana
  - Brandeker, Alexis
  - Demory, Brice-Olivier
  year: '2024'
  pubdate: '2024-06-00'
  doi: 10.1038/s41586-024-07432-x
  abstract: Characterizing rocky exoplanets is a central aim of astronomy, and yet the search for atmospheres on rocky exoplanets
    has so far resulted in either tight upper limits on the atmospheric mass<SUP>1-3</SUP> or inconclusive results<SUP>4-6</SUP>.
    The 1.95R<SUB>Earth</SUB> and 8.8M<SUB>Earth</SUB> planet 55 Cancri e (abbreviated 55 Cnc e), with a predominantly rocky
    composition and an equilibrium temperature of around 2,000 K, may have a volatile envelope (containing molecules made
    from a combination of C, H, O, N, S and P elements) that accounts for up to a few percent of its radius<SUP>7-13</SUP>.
    The planet has been observed extensively with transmission spectroscopy<SUP>14-22</SUP> and its thermal emission has been
    measured in broad photometric bands<SUP>23-26</SUP>. These observations disfavour a primordial H<SUB>2</SUB>/He-dominated
    atmosphere but cannot conclusively determine whether the planet has a secondary atmosphere<SUP>27,28</SUP>. Here we report
    a thermal emission spectrum of the planet obtained by the NIRCam and MIRI instruments aboard the James Webb Space Telescope
    (JWST) from 4 to 12 μm. The measurements rule out the scenario in which the planet is a lava world shrouded by a tenuous
    atmosphere made of vaporized rock<SUP>29-32</SUP> and indicate a bona fide volatile atmosphere that is probably rich in
    CO<SUB>2</SUB> or CO. This atmosphere can be outgassed from and sustained by a magma ocean.
