  arxiv_id: '1303.3899'
  ads_bibcode: 2013ApJ...775..105O
  title: 'Kepler Planets: A Tale of Evaporation'
  authors:
  - Owen, James E.
  - Wu, Yanqin
  year: '2013'
  pubdate: '2013-10-00'
  doi: 10.1088/0004-637X/775/2/105
  abstract: 'Inspired by the Kepler mission''s planet discoveries, we consider the thermal contraction of planets close to
    their parent star, under the influence of evaporation. The mass-loss rates are based on hydrodynamic models of evaporation
    that include both X-ray and EUV irradiation. We find that only low mass planets with hydrogen envelopes are significantly
    affected by evaporation, with evaporation being able to remove massive hydrogen envelopes inward of ~0.1 AU for Neptune-mass
    objects, while evaporation is negligible for Jupiter-mass objects. Moreover, most of the evaporation occurs in the first
    100 Myr of stars'' lives when they are more chromospherically active. We construct a theoretical population of planets
    with varying core masses, envelope masses, orbital separations, and stellar spectral types, and compare this population
    with the sizes and densities measured for low-mass planets, both in the Kepler mission and from radial velocity surveys.
    This exercise leads us to conclude that evaporation is the driving force of evolution for close-in Kepler planets. In
    fact, some 50% of the Kepler planet candidates may have been significantly eroded. Evaporation explains two striking correlations
    observed in these objects: a lack of large radius/low density planets close to the stars and a possible bimodal distribution
    in planet sizes with a deficit of planets around 2 R <SUB>⊕</SUB>. Planets that have experienced high X-ray exposures
    are generally smaller than this size, and those with lower X-ray exposures are typically larger. A bimodal planet size
    distribution is naturally predicted by the evaporation model, where, depending on their X-ray exposure, close-in planets
    can either hold on to hydrogen envelopes ~0.5%-1% in mass or be stripped entirely. To quantitatively reproduce the observed
    features, we argue that not only do low-mass Kepler planets need to be made of rocky cores surrounded with hydrogen envelopes,
    but few of them should have initial masses above 20 M <SUB>⊕</SUB> and the majority of them should have core masses of
    a few Earth masses.'
