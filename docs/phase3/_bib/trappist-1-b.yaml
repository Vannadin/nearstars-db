  title: Far-ultraviolet Activity Levels of F, G, K, and M Dwarf Exoplanet Host Stars
  authors:
  - France, Kevin
  - Arulanantham, Nicole
  - Fossati, Luca
  - Lanza, Antonino F.
  - Loyd, R. O. Parke
  - Redfield, Seth
