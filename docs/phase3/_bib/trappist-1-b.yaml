  arxiv_id: '1508.02294'
  ads_bibcode: 2015PASP..127..584R
  title: 'The Mid-Infrared Instrument for the James Webb Space Telescope, I: Introduction'
  authors:
  - Rieke, G. H.
  - Wright, G. S.
  - Böker, T.
  - Bouwman, J.
  - Colina, L.
  - Glasse, Alistair
  - Gordon, K. D.
