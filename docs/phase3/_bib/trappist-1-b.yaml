  year: '2021'
  pubdate: '2021-02-00'
  doi: 10.3847/2041-8213/abd9b8
  abstract: Strongly irradiated exoplanets develop extended atmospheres that can be utilized to probe the deeper planet layers.
    This connection is particularly useful in the study of small exoplanets, whose bulk atmospheres are challenging to characterize
    directly. Here, we report the 3.4σ detection of C II ions during a single transit of the super-Earth π Men c in front
    of its Sun-like host star. The transit depth and Doppler velocities are consistent with the ions filling the planet's
    Roche lobe and moving preferentially away from the star, an indication that they are escaping the planet. We argue that
    π Men c possesses a thick atmosphere with abundant heavy volatiles (≳ 50% by mass of atmosphere) but that needs not be
    carbon rich. Our reasoning relies upon cumulative evidence from the reported C II detection, the nondetection of H atoms
    in a past transit, modeling of the planet's interior, and the assumption that the atmosphere, having survived the most
    active phases of its Sun-like host star, will survive another 0.2-2 Gyr. Depending on the current mass of atmosphere,
    π Men c may still transition into a bare rocky core. Our findings confirm the hypothesized compositional diversity of
    small exoplanets, and represent a milestone toward understanding the planets' formation and evolution paths through the
    investigation of their extended atmospheres.
  source: citation_of=2023A&A...672A..77G
