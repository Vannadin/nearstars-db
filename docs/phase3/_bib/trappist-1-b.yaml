  arxiv_id: '2409.04386'
  ads_bibcode: 2025ApJ...978L..40H
  title: Reliable Detections of Atmospheres on Rocky Exoplanets with Photometric JWST Phase Curves
  authors:
  - Hammond, Mark
  - Guimond, Claire Marie
  - Lichtenberg, Tim
  - Nicholls, Harrison
  - Fisher, Chloe
  - Luque, Rafael
  - Meier, Tobias G.
  - Taylor, Jake
  - Changeat, Quentin
  - Dang, Lisa
  - Hay, Hamish C. F. C.
