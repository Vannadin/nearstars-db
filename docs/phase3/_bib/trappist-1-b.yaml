  abstract: Thousands of transiting exoplanets have been discovered, but spectral analysis of their atmospheres has so far
    been dominated by a small number of exoplanets and data spanning relatively narrow wavelength ranges (such as 1.1-1.7
    micrometres). Recent studies show that some hot-Jupiter exoplanets have much weaker water absorption features in their
    near-infrared spectra than predicted. The low amplitude of water signatures could be explained by very low water abundances,
    which may be a sign that water was depleted in the protoplanetary disk at the planet’s formation location, but it is unclear
    whether this level of depletion can actually occur. Alternatively, these weak signals could be the result of obscuration
    by clouds or hazes, as found in some optical spectra. Here we report results from a comparative study of ten hot Jupiters
    covering the wavelength range 0.3-5 micrometres, which allows us to resolve both the optical scattering and infrared molecular
    absorption spectroscopically. Our results reveal a diverse group of hot Jupiters that exhibit a continuum from clear to
    cloudy atmospheres. We find that the difference between the planetary radius measured at optical and infrared wavelengths
    is an effective metric for distinguishing different atmosphere types. The difference correlates with the spectral strength
    of water, so that strong water absorption lines are seen in clear-atmosphere planets and the weakest features are associated
    with clouds and hazes. This result strongly suggests that primordial water depletion during formation is unlikely and
    that clouds and hazes are the cause of weaker spectral signatures.
