  arxiv_id: '1406.2376'
  ads_bibcode: 2014ApJ...795....6E
  title: Tidal Dissipation in a Homogeneous Spherical Body. I. Methods
  authors:
  - Efroimsky, Michael
  - Makarov, Valeri V.
  year: '2014'
  pubdate: '2014-11-00'
  doi: 10.1088/0004-637X/795/1/6
  abstract: A formula for the tidal dissipation rate in a spherical body is derived from first principles to correct some
    mathematical inaccuracies found in the literature. The development is combined with the Darwin-Kaula formalism for tides.
    Our intermediate results are compared with those by Zschau and Platzman. When restricted to the special case of an incompressible
    spherical planet spinning synchronously without libration, our final formula can be compared with the commonly used expression
    from Peale &amp; Cassen. However, the two turn out to differ, as in our expression the contributions from all Fourier
    modes are positive-definite, which is not the case with the formula from Peale &amp; Cassen. Examples of the application
    of our expression for the tidal damping rate are provided in the work by Makarov &amp; Efroimsky (Paper II) published
    back to back with the current paper.
