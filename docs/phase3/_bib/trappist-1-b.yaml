  abstract: 'We propose to elucidate the origin of several puzzling observations relative to the thermal fluxes of TRAPPIST-1
    b and c in the mid-infrared. Recent observations of five secondary eclipses of TRAPPIST-1 b and a partial eclipse of c
    in the F1280W band have revealed two puzzling findings: - During one visit, JWST recorded a partial eclipse of TRAPPIST-1
