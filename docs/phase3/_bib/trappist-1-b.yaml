  arxiv_id: '2305.00868'
  ads_bibcode: 2023ApJ...948L..11M
  title: High Tide or Riptide on the Cosmic Shoreline? A Water-rich Atmosphere or Stellar Contamination for the Warm Super-Earth
    GJ 486b from JWST Observations
  authors:
  - Moran, Sarah E.
  - Stevenson, Kevin B.
  - Sing, David K.
  - MacDonald, Ryan J.
  - Kirk, James
  - Lustig-Yaeger, Jacob
  - Peacock, Sarah
  - Mayorga, L. C.
  - Bennett, Katherine A.
  - López-Morales, Mercedes
  - May, E. M.
  - Rustamkulov, Zafar
  - Valenti, Jeff A.
  - Adams Redai, Jéa I.
  - Alam, Munazza K.
  - Batalha, Natasha E.
  - Fu, Guangwei
  - Gonzalez-Quiles, Junellie
  - Highland, Alicia N.
  - Kruse, Ethan
  - Lothringer, Joshua D.
  - Ortiz Ceballos, Kevin N.
  - Sotzen, Kristin S.
  - Wakeford, Hannah R.
  year: '2023'
  pubdate: '2023-05-00'
  doi: 10.3847/2041-8213/accb9c
  abstract: Planets orbiting M-dwarf stars are prime targets in the search for rocky exoplanet atmospheres. The small size
    of M dwarfs renders their planets exceptional targets for transmission spectroscopy, facilitating atmospheric characterization.
    However, it remains unknown whether their host stars' highly variable extreme-UV radiation environments allow atmospheres
    to persist. With JWST, we have begun to determine whether or not the most favorable rocky worlds orbiting M dwarfs have
    detectable atmospheres. Here, we present a 2.8─5.2 μm JWST NIRSpec/G395H transmission spectrum of the warm (700 K, 40.3×
    Earth's insolation) super-Earth GJ 486b (1.3 R <SUB>⊕</SUB> and 3.0 M <SUB>⊕</SUB>). The measured spectrum from our two
    transits of GJ 486b deviates from a flat line at 2.2σ − 3.3σ, based on three independent reductions. Through a combination
    of forward and retrieval models, we determine that GJ 486b either has a water-rich atmosphere (with the most stringent
    constraint on the retrieved water abundance of H<SUB>2</SUB>O &gt; 10% to 2σ) or the transmission spectrum is contaminated
    by water present in cool unocculted starspots. We also find that the measured stellar spectrum is best fit by a stellar
    model with cool starspots and hot faculae. While both retrieval scenarios provide equal quality fits (<inline-formula>
    <mml:math><mml:msubsup><mml:mrow><mml:mi>χ</mml:mi></mml:mrow><mml:mrow><mml:mi>ν</mml:mi></mml:mrow><mml:mrow><mml:mn>2</mml:mn></mml:mrow></mml:msubsup><mml:mo>=</mml:mo><mml:mn>1.0</mml:mn></mml:math>
    </inline-formula>) to our NIRSpec/G395H observations, shorter wavelength observations can break this degeneracy and reveal
    if GJ 486b sustains a water-rich atmosphere.
