- &id426
  arxiv_id: '1512.06470'
  ads_bibcode: 2016ApJ...818..107G
  title: The Influence of the Extreme Ultraviolet Spectral Energy Distribution on the Structure and Composition of the Upper
    Atmosphere of Exoplanets
  authors:
  - Guo, J. H.
  - Ben-Jaffel, Lotfi
  year: '2016'
  pubdate: '2016-02-00'
  doi: 10.3847/0004-637X/818/2/107
  abstract: 'By varying the profiles of stellar extreme ultraviolet (EUV) spectral energy distributions (SEDs), we tested
    the influences of stellar EUV SEDs on the physical and chemical properties of an escaping atmosphere. We apply our model
    to study four exoplanets: HD 189733b, HD 209458b, GJ 436b, and Kepler-11b. We find that the total mass loss rates of an
    exoplanet, which are determined mainly by the integrated fluxes, are moderately affected by the profiles of the EUV SED,
    but the composition and species distributions in the atmosphere can be dramatically modified by the different profiles
    of the EUV SED. For exoplanets with a high hydrodynamic escape parameter (λ), the amount of atomic hydrogen produced by
    photoionization at different altitudes can vary by one to two orders of magnitude with the variation of stellar EUV SEDs.
    The effect of photoionization of H is prominent when the EUV SED is dominated by the low-energy spectral region (400-900
    Å), which pushes the transition of H/H<SUP>+</SUP> to low altitudes. In contrast, the transition of H/H<SUP>+</SUP> moves
    to higher altitudes when most photons are concentrated in the high-energy spectral region (50-400 Å). For exoplanets with
    a low λ, the lower temperatures of the atmosphere make many chemical reactions so important that photoionization alone
    can no longer determine the composition of the escaping atmosphere. For HD 189733b, it is possible to explain the time
    variability of Lyα between 2010 and 2011 by a change in the EUV SED of the host K-type star, yet invoking only thermal
    H I in the atmosphere.'
