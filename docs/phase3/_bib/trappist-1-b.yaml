- &id676
  arxiv_id: '1206.5893'
  ads_bibcode: 2012A&A...544A..23L
  title: Star-planet magnetic interaction and activity in late-type stars with close-in planets
  authors:
  - Lanza, A. F.
  year: '2012'
  pubdate: '2012-08-00'
  doi: 10.1051/0004-6361/201219002
  abstract: 'Context. Late-type stars interact with their close-in planets through their coronal magnetic fields. <BR /> Aims:
    We introduce a theory for the interaction between the stellar and planetary fields focussing on the processes that release
    magnetic energy in the stellar coronae. <BR /> Methods: We consider the energy dissipated by the reconnection between
    the stellar and planetary magnetic fields as well as that made available by the modulation of the magnetic helicity of
    the coronal field produced by the orbital motion of the planet. We estimate the powers released by both processes in the
    case of axisymmetric and non-axisymmetric, linear and non-linear force-free coronal fields finding that they scale as
    B<SUB>0</SUB><SUP>4/3</SUP> B<SUB>p0</SUB><SUP>2/3</SUP> R<SUB>p</SUB><SUP>2</SUP> v<SUB>rel</SUB>, where B<SUB>0</SUB>
    is the mean stellar surface field, B<SUB>p0</SUB> the planetary field at the poles, R<SUB>p</SUB> the radius of the planet,
    and v<SUB>rel</SUB> the relative velocity between the stellar and the planetary fields. <BR /> Results: A chromospheric
    hot spot or a flaring activity phased to the orbital motion of the planet are found only when the stellar field is axisymmetric.
    In the case of a non-axisymmetric field, the time modulation of the energy release is multiperiodic and can be easily
    confused with the intrinsic stellar variability. We apply our theory to the systems with some reported evidence of star-planet
    magnetic interaction finding a dissipated power at least one order of magnitude smaller than that emitted by the chromospheric
    hot spots. The phase lags between the planets and the hot spots are reproduced by our models in all the cases except for
    υ And. <BR /> Conclusions: The chromospheric hot spots rotating in phase with the planets cannot be explained by the energy
    dissipation produced by the interaction between stellar and planetary fields as considered by our models and require a
    different mechanism.'
