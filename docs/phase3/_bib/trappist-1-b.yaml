- &id743
  arxiv_id: '1703.04624'
  ads_bibcode: 2017E&PSL.476...11T
  title: CO<SUB>2</SUB> condensation is a serious limit to the deglaciation of Earth-like planets
  authors:
  - Turbet, Martin
  - Forget, Francois
  - Leconte, Jeremy
  - Charnay, Benjamin
  - Tobie, Gabriel
  year: '2017'
  pubdate: '2017-10-00'
  doi: 10.1016/j.epsl.2017.07.050
  abstract: It is widely believed that the carbonate-silicate cycle is the main agent, through volcanism, to trigger deglaciations
    by CO<SUB>2</SUB> greenhouse warming on Earth and on Earth-like planets when they get in a frozen state. Here we use a
    3D Global Climate Model to simulate the ability of planets initially completely frozen to escape from glaciation episodes
    by accumulating enough gaseous CO<SUB>2</SUB>. The model includes CO<SUB>2</SUB> condensation and sublimation processes
    and the water cycle. We find that planets with Earth-like characteristics (size, mass, obliquity, rotation rate, etc.)
    orbiting a Sun-like star may never be able to escape from a glaciation era, if their orbital distance is greater than
    ∼1.27 Astronomical Units (Flux &lt; 847 Wm<SUP>-2</SUP> or 62% of the Solar constant), because CO<SUB>2</SUB> would condense
    at the poles - here the cold traps - forming permanent CO<SUB>2</SUB> ice caps. This limits the amount of CO<SUB>2</SUB>
    in the atmosphere and thus its greenhouse effect. Furthermore, our results indicate that for (1) high rotation rates (P<SUB>rot</SUB>
    &lt; 24 h), (2) low obliquity (obliquity &lt;23.5°), (3) low background gas partial pressures (&lt;1 bar), and (4) high
    water ice albedo (H<SUB>2</SUB>O albedo &gt; 0.6), this critical limit could occur at a significantly lower equivalent
    distance (or higher insolation). For each possible configuration, we show that the amount of CO<SUB>2</SUB> that can be
    trapped in the polar caps depends on the efficiency of CO<SUB>2</SUB> ice to flow laterally as well as its gravitational
    stability relative to subsurface water ice. We find that a frozen Earth-like planet located at 1.30 AU of a Sun-like star
    could store as much as 1.5, 4.5 and 15 bars of dry ice at the poles, for internal heat fluxes of 100, 30 and 10 mW m<SUP>-2</SUP>,
    respectively. But these amounts are in fact lower limits. For planets with a significant water ice cover, we show that
    CO<SUB>2</SUB> ice deposits should be gravitationally unstable. They get buried beneath the water ice cover in geologically
    short timescales of ∼10<SUP>4</SUP> yrs, mainly controlled by the viscosity of water ice. CO<SUB>2</SUB> would be permanently
    sequestered underneath the water ice cover, in the form of CO<SUB>2</SUB> liquids, CO<SUB>2</SUB> clathrate hydrates and/or
    dissolved in subglacial water reservoirs (if any). This would considerably increase the amount of CO<SUB>2</SUB> trapped
    and further reduce the probability of deglaciation.
  source: citation_of=2025A&A...701A.193M
