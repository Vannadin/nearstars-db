  arxiv_id: '2309.13538'
  ads_bibcode: 2024ApJ...961....1W
  title: Relative Abundances of CO<SUB>2</SUB>, CO, and CH<SUB>4</SUB> in Atmospheres of Earth-like Lifeless Planets
  authors:
