  year: '2016'
  pubdate: '2016-06-00'
  doi: 10.1002/2016GL068327
  abstract: Understanding what processes govern atmospheric escape and the loss of planetary water is of paramount importance
    for understanding how life in the universe can exist. One mechanism thought to be important at all planets is an "ambipolar"
    electric field that helps ions overcome gravity. We report the discovery and first quantitative extraterrestrial measurements
    of such a field at the planet Venus. Unexpectedly, despite comparable gravity, we show the field to be five times stronger
