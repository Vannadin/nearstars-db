  - Ozaki, Kazumi
  year: '2024'
  pubdate: '2024-01-00'
  doi: 10.3847/1538-4357/ad10a2
  abstract: Carbon is an essential element for life on Earth, and the relative abundances of major carbon species (CO<SUB>2</SUB>,
    CO, and CH<SUB>4</SUB>) in the atmosphere exert fundamental controls on planetary climate and biogeochemistry. Here we
    employed a theoretical model of atmospheric chemistry to investigate diversity in the atmospheric abundances of CO<SUB>2</SUB>,
    CO, and CH<SUB>4</SUB> on Earth-like lifeless planets orbiting Sun-like (F-, G-, and K-type) stars. We focused on the
    conditions for the formation of a CO-rich atmosphere, which would be favorable for the origin of life. Results demonstrated
    that elevated atmospheric CO<SUB>2</SUB> levels trigger photochemical instability of the CO budget in the atmosphere (i.e.,
    CO runaway) owing to enhanced CO<SUB>2</SUB> photolysis relative to H<SUB>2</SUB>O photolysis. Higher volcanic outgassing
    fluxes of reduced C (CO and CH<SUB>4</SUB>) also tend to initiate CO runaway. Our systematic examinations revealed that
    anoxic atmospheres of Earth-like lifeless planets could be classified in the phase space of CH<SUB>4</SUB>/CO<SUB>2</SUB>
    versus CO/CO<SUB>2</SUB>, where a distinct gap in atmospheric carbon chemistry is expected to be observed. Our findings
    indicate that the gap structure is a general feature of Earth-like lifeless planets with reducing atmospheres orbiting
    Sun-like (F-, G-, and K-type) stars.
