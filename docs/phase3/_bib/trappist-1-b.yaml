- &id688
  arxiv_id: '0912.2274'
  ads_bibcode: 2010A&A...510A..21S
  title: Stellar limb-darkening coefficients for CoRot and Kepler
  authors:
  - Sing, D. K.
  year: '2010'
  pubdate: '2010-02-00'
  doi: 10.1051/0004-6361/200913675
  abstract: Transiting exoplanets provide unparalleled access to the fundamental parameters of both extrasolar planets and
    their host stars. We present limb-darkening coefficients (LDCs) for the exoplanet hunting CoRot and Kepler missions. The
    LDCs are calculated with ATLAS stellar atmospheric model grids and span a wide range of T<SUB>eff</SUB>, log g, and metallically
    [M/H]. Both CoRot and Kepler use wide nonstandard photometric filters, and are producing a large inventory of high-quality
    transiting lightcurves, sensitive to stellar limb darkening. Comparing the stellar model limb darkening to results from
    the first seven CoRot planets, we find better fits are found when two model intensities at the limb are excluded in the
    coefficient calculations. This calculation method can help to avoid a major deficiency present at the limbs of the 1D
    stellar models. <P />Full Tables 1 and 2 are only available in electronic form at the CDS via anonymous ftp to cdsarc.u-strasbg.fr
    (130.79.128.5) or via <A href="http://cdsweb.u-strasbg.fr/cgi-bin/qcat?J/A+A/510/A21">http://cdsweb.u-strasbg.fr/cgi-bin/qcat?J/A+A/510/A21</A>
