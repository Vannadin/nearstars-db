  "p_153":"TRAPPIST-1 h is the system&#x27;s smallest planet (0.326 M⊕, sub-Mars mass) and lies at 0.16 S⊕ insolation. The combination — small mass, low gravity (0.572 g), and low insolation — makes h a difficult case for atmospheric retention. The cosmic shoreline literature (Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) places h close to or below the empirical retention threshold for hydrogen-bearing and even nitrogen-bearing atmospheres. Some volatile retention is plausible (CO₂ has high enough molecular weight to survive Jeans escape at h&#x27;s temperatures) but the atmospheric mass is likely small.",

  "p_155":"The Lincowski 2018 (1809.07498) &quot;desiccated h&quot; scenario — habitable surface temperatures from a thick (10–100 bar) CO₂/O₂ post-runaway atmosphere — is preserved as a cfg variant but is not the canonical choice. The post-runaway atmospheric retention timescale at h&#x27;s escape velocity is short (≲ 1 Gyr); over 7.6 Gyr of system age, most of any initial thick atmosphere has been lost.",
  "p_156":"For the surface morphology, we adopt a Mars-Pluto hybrid analog:",
  "li_157":"<b>Substellar region</b> (~0–60° from substellar): bedrock-dominated, weathered iron-rich surface analogous to Mars&#x27;s southern highlands. Some patchy CO₂ frost in shadowed craters.",
  "li_158":"<b>Mid-zone</b> (60–120°): increasing frost cover with distance from substellar.",
  "li_159":"<b>Terminator</b> (~90°): high frost-vs-bedrock contrast; long topographic shadows under grazing 2566 K light.",
  "li_160":"<b>Nightside</b> (&gt;120°): predominantly CO₂ + N₂ frost cover at ~60 K, with occasional dark bedrock patches at ridge tops.",
  "p_161":"<b>Color choice.</b> Weathered iron-rich bedrock under M-dwarf illumination: dark red-brown primary <code>#3a2c20</code> (Mars rust + lower albedo from M-dwarf shift). Frost accents are cream-white <code>#c8b8a0</code>.",
  "p_162":"<b>Bedrock / iron oxide.</b> Prominent on h compared to g/f — the exposed substellar bedrock has had 7.6 Gyr of photolytic oxidation under direct stellar UV. The primary tint already incorporates this; specific bright iron-oxide patches near impact crater rims would be a fine-grained PQS detail.",
  "p_163":"<b>Morphology under tidal lock.</b> Almost no resurfacing — h&#x27;s tidal heating is negligible (Bolmont 2020), induction heating minimal (Grayver 2022 distance scaling), and radiogenic heat too low (small mass) to drive volcanism. The surface preserves a maximal impact record across the system&#x27;s 7.6 Gyr age, biased toward the leading hemisphere in the locked frame.",
  "h2_164":"Atmosphere synthesis",
  "p_165":"Gressier 2022 (2112.05510) presented the first HST WFC3/G141 transmission spectrum of h, the planet&#x27;s only published atmospheric observation. The data are consistent with either no atmosphere or a flat-spectrum secondary atmosphere; cloud-free hydrogen-rich atmospheres are excluded.",
  "p_166":"Theoretical modeling:",
  "li_167":"<b>Lincowski 2018:</b> considers desiccated post-runaway 10–100 bar CO₂/O₂ atmospheres for h, finding some give habitable surface temperatures. However, the retention probability of such thick atmospheres over 7.6 Gyr at h&#x27;s escape velocity is low.",
  "li_168":"<b>Bourgeois 2024:</b> magma ocean evolution gives an initial outgassed atmosphere of ~1 bar (CO₂ + H₂O); most lost over time.",
  "li_169":"<b>Castan-Lopez 2025:</b> cosmic shoreline analysis suggests h is near or below the retention threshold for typical secondary atmospheres.",
  "p_170":"For NearStars we adopt <b>0.005 bar (Mars-thin) CO₂/N₂ atmosphere</b>:",
  "li_171":"<b>Pressure</b> 0.005 bar (500 Pa) — comparable to Mars (~600 Pa, variable). Above zero because some outgassing should accumulate on a 0.3 M⊕ planet; below 0.01 bar because cosmic-shoreline / Jeans-escape constraints suggest h cannot retain much more.",
  "li_172":"<b>Composition</b> CO₂-dominated (70%), N₂ (25%), trace H₂O and Ar. H₂O is trace because of severe cold-trap; N₂ fraction is higher than g because at h&#x27;s temperatures CO₂ frosts out onto the surface, depleting the gas-phase atmosphere of CO₂ relative to N₂.",
  "li_173":"<b>Clouds.</b> Minimal (~2% global): rare CO₂ ice cirrus only, similar to Mars&#x27;s mesospheric clouds.",
  "p_174":"<b>Sky appearance.</b> The 0.005 bar atmosphere is essentially invisible from orbit. From the surface, the sky is black except for the host star (1.03° angular diameter, red-orange disk). Surface illumination of 0.16 S⊕ is similar to outer Mars at perihelion.",
  "h2_175":"Rotation &amp; spin synthesis",
  "p_176":"Tidal damping at 18.77 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00567 — in the 1:1 dominance regime.",
  "p_177":"<b>KSP implementation note.</b> Rotation period = orbital period = 18.7729 days (1 621 977 s).",
  "p_178":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.5%.",
  "p_179":"<b>Resonant chain dynamics.</b> Luger 2017 (1703.04166) established h&#x27;s place in the 7-planet Laplace-resonance chain (8:5 mean-motion resonance with g). The chain provides ongoing small-amplitude perturbations of the orbital elements, but for visual / cfg purposes the configuration is stable.",
  "h2_180":"Visual styling",
  "li_181":"<b>Global appearance.</b> Dark red-brown rocky world (<code>#3a2c20</code>) with patchy cream-white frost (<code>#c8b8a0</code>) increasing toward the terminator and nightside. Visual character somewhere between Mars (red-brown rocky) and a smaller Pluto (frost-dominated).",
  "li_182":"<b>Substellar region.</b> Mostly bedrock; weathered iron-oxide brown. Impact craters visible at the cfg PQS resolution. Some frost in shadowed crater interiors.",
  "li_183":"<b>Mid-zone.</b> Mixed bedrock and frost — fractal pattern of exposed dark brown over cream frost. Photogenic for KSP flyovers.",
  "li_184":"<b>Terminator.</b> High contrast under grazing 2566 K light; topographic shadows reveal cratering and possible tectonic features. The frost-bedrock boundary is sharpest here.",
  "li_185":"<b>Nightside.</b> Cream-white frost cover (<code>#c8b8a0</code>) with dark bedrock patches at ridge tops. KSP nightside ambient ≈ 1% dayside.",
  "li_186":"<b>Atmosphere haze.</b> Imperceptible — the 0.005 bar atmosphere does not produce visible Rayleigh scattering. Limb is sharp.",
  "li_187":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.03° in h&#x27;s sky (2× the Sun from Earth). Surface illumination 0.16 S⊕ — comparable to early-morning twilight on Earth. The red-orange star against the ochre-and-cream surface gives h a particularly atmospheric look despite the lack of actual atmosphere.",
  "li_188":"<b>Sister planets in sky.</b> g (next inward) at angular size ~0.3° in inner conjunction. Conjunctions less frequent than for inner planets due to h&#x27;s long period.",
  "h2_189":"Bibliography",
  "h3_190":"Read (visual-informative, drove decisions above)",
  "li_191":"<b>1703.04166</b> Luger 2017 — Discovery / confirmation of h&#x27;s orbital period via K2. Establishes h as the seventh planet in the resonant chain. Source for orbital parameters.",
  "li_192":"<b>2112.05510</b> Gressier 2022 — HST WFC3/G141 transmission spectrum of h. Rejects cloud-free H₂-rich atmospheres. Only direct atmospheric observation of h to date.",
  "li_193":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. h discussed as both snowball and as the &quot;desiccated habitable&quot; outlier. Drives the canonical-vs-variant scenario split. Already read for d/e/f/g.",
  "li_194":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. Considers h&#x27;s water budget under impact + escape evolution.",
  "li_195":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. Places h close to the retention threshold; supports thin-atmo cfg choice.",
  "h3_196":"Read (context / methodology, not decision-driving)",
  "li_197":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g (not h directly, but provides framework). Already read.",
  "li_198":"<b>2508.12865</b> Empirical cosmic shoreline. Context.",

  "li_200":"<b>2603.29743</b> New M Dwarf Cosmic Shoreline Constraints. Context.",
  "li_201":"<b>1810.05210</b> Moran 2018 — HST haze limits, includes h. Already read.",
  "h3_202":"Read (instrument-only, not visual-informative)",
  "p_203":"(None specific to h.)",

  "p_205":"The h bibliography is moderately sized (53 papers, 43 with arXiv). Most non-arXiv papers are catalog summaries or works that mention h only in passing.",
  "li_206":"<b>&quot;Simulating Hydrospheres of TRAPPIST-1 h in Search of Liquid Water Layer&quot;</b> (no arXiv) — <i>potentially important for the sub-glacial ocean question</i>. <b>Flagged for paste if accessible.</b>",
  "li_207":"<b>&quot;VizieR Online Data Catalog: TRAPPIST-1 h NIR spectrum (Gressier+, 2022)&quot;</b> — data catalog, content already in 2112.05510. Skip.",
  "li_208":"<b>&quot;Characterizing Stellar Activity and Planetary Atmospheres in the TRAPPIST-1 System&quot;</b> (no arXiv) — possibly relevant but skip unless atmosphere decision needs review.",
  "li_209":"Various SETI / technosignature / catalog papers — irrelevant.",
  "p_210":"---",
  "h2_211":"Open items for follow-up",
  "li_212":"The Lincowski 2018 &quot;desiccated habitable h&quot; scenario could be implemented as an alternative cfg variant — a thick CO₂/O₂ atmosphere with a warm (~280 K) bare-rock surface. Visually distinctive: drier, dustier, with hazy yellow-cream skies.",
  "li_213":"The &quot;Simulating Hydrospheres of TRAPPIST-1 h&quot; paper (no arXiv) could refine the sub-glacial ocean cfg if accessible.",
  "li_214":"No JWST follow-up has been published for h as of 2026-05-21; any future emission or transmission spectrum should trigger a Phase 3 revisit.",

  "p_153":"TRAPPIST-1 h 는 시스템의 가장 작은 행성(0.326 M⊕, sub-Mars 질량)이며 0.16 S⊕ insolation 에 위치. 조합 — 작은 질량, 낮은 중력(0.572 g), 낮은 insolation — 은 h 를 대기 유지에 어려운 케이스로 만듦. cosmic shoreline 문헌(Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) 은 h 를 수소 함유 및 심지어 질소 함유 대기의 경험적 유지 임계값 근처 또는 아래에 둠. 일부 휘발성 물질 유지는 그럴듯함 (CO₂ 는 h 의 온도에서 Jeans 탈출을 견딜 만큼 분자량이 충분히 큼) 이지만 대기 질량은 작을 가능성이 큼.",
  "p_154":"저질량에도 불구하고, h 의 bulk 밀도(Agol 2021 의 4.20 g/cc) 는 비자명한 물 질량 분율(~5–15%) 을 함의할 만큼 낮음, f 및 g 와 유사하지만 작업할 질량이 훨씬 적음. 이 물의 대부분은 표면에 얼어붙어 있거나 (CO₂ 와 H₂O 얼음) 작은 암석 코어 위의 얇은 sub-glacial 층으로 격리되어 있을 가능성.",
  "p_155":"Lincowski 2018 (1809.07498) &quot;건조된 h&quot; 시나리오 — 두꺼운(10–100 bar) CO₂/O₂ post-runaway 대기로부터의 거주 가능한 표면 온도 — 는 cfg 변형으로 보존되지만 정규 선택은 아님. h 의 탈출 속도에서 post-runaway 대기 유지 시간 척도는 짧음(≲ 1 Gyr); 시스템 나이 7.6 Gyr 동안 초기 두꺼운 대기 대부분은 손실됨.",
  "p_156":"표면 형태에 대해서는 Mars-Pluto 하이브리드 analog 를 채택.",
  "li_157":"<b>Substellar 영역</b> (substellar 에서 ~0–60°). 기반암 지배, Mars 의 남쪽 고원과 유사한 풍화된 철-풍부 표면. 그늘진 분화구에 일부 patchy CO₂ 서리.",
  "li_158":"<b>Mid-zone</b> (60–120°). substellar 로부터의 거리에 따라 서리 덮개 증가.",
  "li_159":"<b>Terminator</b> (~90°). 높은 서리-기반암 대비; 비스듬한 2566 K 빛 아래의 긴 지형 그림자.",
  "li_160":"<b>Nightside</b> (&gt;120°). 주로 ~60 K 의 CO₂ + N₂ 서리 덮개, 능선 꼭대기에 가끔 어두운 기반암 patch.",
  "p_161":"<b>색 선택.</b> M-dwarf 조명 아래 풍화된 철-풍부 기반암. 어두운 적갈색 primary <code>#3a2c20</code> (Mars 녹슴 + M-dwarf 이동에서 더 낮은 albedo). 서리 accent 는 크림-화이트 <code>#c8b8a0</code>.",
  "p_162":"<b>기반암 / 산화철.</b> g/f 와 비교해 h 에서 두드러짐 — 노출된 substellar 기반암은 7.6 Gyr 동안 직접 stellar UV 아래 광분해 산화를 겪음. primary tint 는 이미 이를 포함; 충돌 분화구 가장자리 근처의 특정 밝은 산화철 patch 는 fine-grained PQS 디테일로 좋은 선택.",
  "p_163":"<b>조석 lock 아래의 모양.</b> 거의 resurfacing 없음 — h 의 조석 가열은 무시할 만하고(Bolmont 2020), induction heating 은 최소(Grayver 2022 거리 스케일링), 방사성 열은 화산활동을 일으키기에 너무 낮음(작은 질량). 표면은 시스템의 7.6 Gyr 나이에 걸친 최대 충돌 기록을 보존, locked frame 의 leading 반구 쪽으로 편향.",
  "h2_164":"대기 합성",
  "p_165":"Gressier 2022 (2112.05510) 가 h 의 첫 HST WFC3/G141 transmission 스펙트럼을 제시, 행성의 유일한 출판된 대기 관측. 데이터는 대기 없음 또는 flat-spectrum 이차 대기와 일관; cloud-free 수소 풍부 대기는 배제됨.",
  "p_166":"이론 모델링.",
  "li_167":"<b>Lincowski 2018.</b> h 에 대해 건조된 post-runaway 10–100 bar CO₂/O₂ 대기를 고려, 일부가 거주 가능한 표면 온도를 제공함을 발견. 하지만 h 의 탈출 속도에서 7.6 Gyr 동안 그러한 두꺼운 대기의 유지 확률은 낮음.",
  "li_168":"<b>Bourgeois 2024.</b> magma ocean 진화는 ~1 bar (CO₂ + H₂O) 의 초기 outgassed 대기를 줌; 대부분 시간이 지나며 손실.",
  "li_169":"<b>Castan-Lopez 2025.</b> cosmic shoreline 분석은 h 가 전형적 이차 대기의 유지 임계값 근처 또는 아래에 있음을 시사.",
  "p_170":"NearStars 는 <b>0.005 bar (Mars-thin) CO₂/N₂ 대기</b> 채택.",
  "li_171":"<b>압력</b> 0.005 bar (500 Pa) — Mars 와 비교 가능(~600 Pa, 가변). 0.3 M⊕ 행성에 일부 outgassing 이 축적되어야 하므로 0 보다 위; cosmic-shoreline / Jeans-탈출 제약이 h 가 훨씬 더 많이 유지할 수 없음을 시사하므로 0.01 bar 보다 아래.",
  "li_172":"<b>조성</b> CO₂ 지배(70%), N₂ (25%), 미량 H₂O 와 Ar. 심각한 cold-trap 때문에 H₂O 는 미량; h 의 온도에서 CO₂ 가 표면에 서리화되어 N₂ 에 대해 가스 상 CO₂ 가 고갈되므로 N₂ 분율은 g 보다 높음.",
  "li_173":"<b>구름.</b> 최소(~2% 전역). 드문 CO₂ 얼음 권운만, Mars 의 중간권 구름과 유사.",
  "p_174":"<b>하늘 외관.</b> 0.005 bar 대기는 궤도에서 사실상 안 보임. 표면에서는 호스트 별(1.03° 각 크기, 적-오렌지 디스크) 을 제외하면 하늘이 검음. 0.16 S⊕ 의 표면 조명은 근일점의 외측 Mars 와 유사.",
  "h2_175":"자전 &amp; spin 합성",
  "p_176":"18.77 일에서 7.6 Gyr 에 걸친 조석 damping → 동기(1:1) 구성. 황도 경사각 0 으로 damping. 이심률은 0.00567 — 1:1 우세 영역.",
  "p_177":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 18.7729 일 (1 621 977 s).",
  "p_178":"<b>계절 없음.</b> 황도 경사각 = 0; libration 유발 insolation 변동 &lt; 0.5%.",
  "p_179":"<b>공명 체인 동역학.</b> Luger 2017 (1703.04166) 이 7 행성 Laplace-공명 체인에서 h 의 위치를 확립 (g 와 8:5 평균-운동 공명). 체인은 궤도 요소에 지속적인 small-amplitude 섭동을 제공하지만, 시각적 / cfg 목적으로는 구성이 안정적.",
  "h2_180":"비주얼 스타일",
  "li_181":"<b>전역 외관.</b> patchy 크림-화이트 서리(<code>#c8b8a0</code>) 가 terminator 와 nightside 쪽으로 증가하는 어두운 적갈색 암석 세계(<code>#3a2c20</code>). Mars(적갈색 암석) 와 더 작은 Pluto(서리 지배) 사이 어딘가의 시각적 특성.",
  "li_182":"<b>Substellar 영역.</b> 대부분 기반암; 풍화된 산화철 갈색. cfg PQS 해상도에서 충돌 분화구 보임. 그늘진 분화구 내부에 일부 서리.",
  "li_183":"<b>Mid-zone.</b> 혼합 기반암과 서리 — 크림 서리 위 노출된 어두운 갈색의 fractal 패턴. KSP 저공 비행에 사진발 좋음.",
  "li_184":"<b>Terminator.</b> 비스듬한 2566 K 빛 아래 높은 대비; 지형 그림자가 cratering 과 가능한 tectonic feature 를 드러냄. 서리-기반암 경계는 여기서 가장 선명.",
  "li_185":"<b>Nightside.</b> 크림-화이트 서리 덮개(<code>#c8b8a0</code>) 와 능선 꼭대기의 어두운 기반암 patch. KSP nightside ambient ≈ dayside 의 1%.",
  "li_186":"<b>Atmosphere haze.</b> 인지 불가 — 0.005 bar 대기는 보이는 Rayleigh 산란을 일으키지 않음. limb 가 선명.",
  "li_187":"<b>하늘의 별.</b> TRAPPIST-1 이 h 의 하늘에서 1.03° 차지 (지구에서 본 태양의 2배). 표면 조명 0.16 S⊕ — 지구의 이른 아침 황혼과 비슷. ochre-and-cream 표면에 대비되는 적-오렌지 별이 실제 대기 없음에도 불구하고 h 에 특히 분위기 있는 외관을 줌.",
  "li_188":"<b>하늘의 자매 행성.</b> g (다음 안쪽) 은 inner conjunction 에서 각 크기 ~0.3°. h 의 긴 주기 때문에 conjunction 이 내행성보다 덜 빈번.",
  "h2_189":"참고 문헌",
  "h3_190":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_191":"<b>1703.04166</b> Luger 2017 — K2 를 통한 h 의 궤도 주기 발견 / 확인. 공명 체인의 일곱 번째 행성으로 h 를 확립. 궤도 파라미터의 출처.",
  "li_192":"<b>2112.05510</b> Gressier 2022 — h 의 HST WFC3/G141 transmission 스펙트럼. cloud-free H₂-rich 대기 거부. 현재까지 h 의 유일한 직접 대기 관측.",
  "li_193":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계의 진화된 기후. h 는 snowball 과 &quot;건조된 거주 가능&quot; 이상치 양쪽으로 논의됨. 정규-대-변형 시나리오 분할을 견인. d/e/f/g 에 대해 이미 읽음.",
  "li_194":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. 충돌 + 탈출 진화 아래 h 의 물 예산 고려.",
  "li_195":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. h 를 유지 임계값 근처에 둠; 얇은 대기 cfg 선택을 지지.",
  "h3_196":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_197":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 magma ocean 진화 (h 에 직접은 아니지만 프레임워크 제공). 이미 읽음.",
  "li_198":"<b>2508.12865</b> 경험적 cosmic shoreline. 맥락.",
  "li_199":"<b>2507.02136</b> Nurturing Atmospheres 를 위한 3D Cosmic Shoreline. 맥락.",
  "li_200":"<b>2603.29743</b> 새 M Dwarf Cosmic Shoreline 제약. 맥락.",
  "li_201":"<b>1810.05210</b> Moran 2018 — HST haze 한계, h 포함. 이미 읽음.",
  "h3_202":"읽음 (instrument-only, 시각 정보 아님)",
  "p_203":"(h 에 특화된 것 없음.)",
  "h3_204":"읽지 않음 — arXiv preprint 없음 또는 저우선순위 (~10 편)",
  "p_205":"h 의 참고 문헌은 중간 크기(53 편, arXiv 43 편). 대부분의 비-arXiv 논문은 카탈로그 요약이거나 h 를 지나가듯 언급하는 작업.",
  "li_206":"<b>&quot;Simulating Hydrospheres of TRAPPIST-1 h in Search of Liquid Water Layer&quot;</b> (no arXiv) — <i>sub-glacial 해양 질문에 잠재적으로 중요</i>. <b>접근 가능 시 paste 요청 flag.</b>",
  "li_207":"<b>&quot;VizieR Online Data Catalog: TRAPPIST-1 h NIR spectrum (Gressier+, 2022)&quot;</b> — 데이터 카탈로그, 콘텐츠는 이미 2112.05510 에 있음. Skip.",
  "li_208":"<b>&quot;Characterizing Stellar Activity and Planetary Atmospheres in the TRAPPIST-1 System&quot;</b> (no arXiv) — 관련 가능성 있지만 대기 결정 재검토 필요할 때만 확인.",
  "li_209":"다양한 SETI / technosignature / 카탈로그 논문 — 무관.",

  "li_212":"Lincowski 2018 &quot;건조된 거주 가능 h&quot; 시나리오는 대체 cfg 변형으로 구현 가능 — 따뜻한(~280 K) 맨 암석 표면을 가진 두꺼운 CO₂/O₂ 대기. 시각적으로 구분됨. 더 건조하고 먼지 많으며 흐릿한 노란-크림 하늘.",
  "li_213":"&quot;Simulating Hydrospheres of TRAPPIST-1 h&quot; 논문(no arXiv) 은 접근 가능하면 sub-glacial 해양 cfg 를 정교화할 수 있음.",
  "li_214":"2026-05-21 기준 h 에 대해 출판된 JWST 후속 없음; 향후 어떤 emission 또는 transmission 스펙트럼도 Phase 3 재방문을 trigger 해야 함.",
  "li_215":"&quot;Pluto-like full frost&quot; cfg 변형 — 최소한의 기반암 노출, 지배적으로 크림-화이트 표면. 더 깨끗한 외행성계 analog 원할 때 사용.",
  "li_216":"물 질량 분율(0.05–0.15) 은 잘 제약되지 않음; 0 (암석-건조 analog) 또는 최대 0.25 (Europa analog) 일 수 있음. Phase 2 는 더 많은 내부 구조 측정치를 추가해야 함.",
  "title":"TRAPPIST-1 h — Phase 3 Synthesis",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
