  "h2_152":"Surface synthesis",
  "p_153":"TRAPPIST-1 h is the system&#x27;s smallest planet (0.326 M⊕, sub-Mars mass) and lies at 0.16 S⊕ insolation. The combination — small mass, low gravity (0.572 g), and low insolation — makes h a difficult case for atmospheric retention. The cosmic shoreline literature (Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) places h close to or below the empirical retention threshold for hydrogen-bearing and even nitrogen-bearing atmospheres. Some volatile retention is plausible (CO₂ has high enough molecular weight to survive Jeans escape at h&#x27;s temperatures) but the atmospheric mass is likely small.",
  "p_154":"Despite the low mass, h&#x27;s bulk density (4.20 g/cc from Agol 2021) is low enough to imply a non-trivial water mass fraction (~5–15%), similar to f and g but with much less mass to work with. Most of this water is likely frozen at the surface (CO₂ and H₂O ice) or sequestered as a thin sub-glacial layer over a small rocky core.",
  "p_155":"The Lincowski 2018 (1809.07498) &quot;desiccated h&quot; scenario — habitable surface temperatures from a thick (10–100 bar) CO₂/O₂ post-runaway atmosphere — is preserved as a cfg variant but is not the canonical choice. The post-runaway atmospheric retention timescale at h&#x27;s escape velocity is short (≲ 1 Gyr); over 7.6 Gyr of system age, most of any initial thick atmosphere has been lost.",
  "p_156":"For the surface morphology, we adopt a Mars-Pluto hybrid analog:",
  "li_157":"<b>Substellar region</b> (~0–60° from substellar): bedrock-dominated, weathered iron-rich surface analogous to Mars&#x27;s southern highlands. Some patchy CO₂ frost in shadowed craters.",
  "li_158":"<b>Mid-zone</b> (60–120°): increasing frost cover with distance from substellar.",
  "li_159":"<b>Terminator</b> (~90°): high frost-vs-bedrock contrast; long topographic shadows under grazing 2566 K light.",
  "li_160":"<b>Nightside</b> (&gt;120°): predominantly CO₂ + N₂ frost cover at ~60 K, with occasional dark bedrock patches at ridge tops.",
  "p_161":"<b>Color choice — H₂O ice dominant.</b> Turbet 2017 shows that even though h&#x27;s atmosphere is dominated by trace CO₂ at low pressures, the surface frost composition is <b>predominantly H₂O ice</b> (not CO₂/N₂ frost as in earlier framings). CO₂ ice deposits form transiently but are gravitationally unstable — they get buried beneath the H₂O ice shell over geological timescales. The visible surface is therefore cream-white (<code>#d8d0c4</code>) from clean H₂O ice under M-dwarf illumination, with minor weathered iron-rich bedrock patches (<code>#3a2c20</code>) exposed only in localized substellar regions where ice has sublimated. The Mars-Pluto hybrid framing inverts: cream-white dominant globally, with dark bedrock as the minor accent rather than the primary surface tone.",
  "p_162":"<b>Interior structure.</b> Barr 2018 (1712.05641) finds h has a 1030 km rock core (mean-density case), with a maximum-density configuration allowing only ~100 km H₂O shell over the rock. The current cfg WMF 0.03–0.10 sits between these extremes. h&#x27;s CMF is at the lower end of the system (~0.23), consistent with a relatively iron-poor rocky body.",
  "p_163":"<b>Bedrock / iron oxide.</b> Prominent on h compared to g/f — the exposed substellar bedrock has had 7.6 Gyr of photolytic oxidation under direct stellar UV. The primary tint already incorporates this; specific bright iron-oxide patches near impact crater rims would be a fine-grained PQS detail.",
  "p_164":"<b>Morphology under tidal lock.</b> Almost no resurfacing — h&#x27;s tidal heating is negligible (Bolmont 2020), induction heating minimal (Grayver 2022 distance scaling), and radiogenic heat too low (small mass) to drive volcanism. The surface preserves a maximal impact record across the system&#x27;s 7.6 Gyr age, biased toward the leading hemisphere in the locked frame.",
  "h2_165":"Atmosphere synthesis",
  "p_166":"Gressier 2022 (2112.05510) presented the first HST WFC3/G141 transmission spectrum of h, the planet&#x27;s only published atmospheric observation. The data are consistent with either no atmosphere or a flat-spectrum secondary atmosphere; cloud-free hydrogen-rich atmospheres are excluded.",
  "p_167":"Theoretical modeling:",
  "li_168":"<b>Lincowski 2018:</b> considers desiccated post-runaway 10–100 bar CO₂/O₂ atmospheres for h, finding some give habitable surface temperatures. However, the retention probability of such thick atmospheres over 7.6 Gyr at h&#x27;s escape velocity is low.",
  "li_169":"<b>Bourgeois 2024:</b> magma ocean evolution gives an initial outgassed atmosphere of ~1 bar (CO₂ + H₂O); most lost over time.",
  "li_170":"<b>Castan-Lopez 2025:</b> cosmic shoreline analysis suggests h is near or below the retention threshold for typical secondary atmospheres.",
  "p_171":"For NearStars we adopt <b>0.005 bar (Mars-thin) N₂-dominated atmosphere with trace CO₂</b>:",
  "li_172":"<b>Pressure</b> 0.005 bar (500 Pa) — comparable to Mars. Above zero because some outgassing should accumulate on a 0.3 M⊕ planet; below 0.01 bar because cosmic-shoreline / Jeans-escape constraints suggest h cannot retain much more.",
  "li_173":"<b>Composition</b> N₂-dominated (~90%), trace CO₂ (10–100 ppm, NOT 1000). The driver is Bolmont 2018 review&#x27;s cold-trap argument plus Turbet 2017 specific calculation showing pure-CO₂ equilibrium is just 4 mbar at 145 K for h, and N₂-background scenarios give only &quot;a few tens of ppm&quot; CO₂ in the gas phase. The remaining ~10% is split among Ar, frost-cycle H₂O vapor, and fossil O₂.",
  "li_174":"<b>Clouds.</b> Minimal (~2% global): rare CO₂ ice cirrus only.",
  "p_175":"<b>Atmospheric retention favored by ion-escape arguments.</b> Despite the cosmic-shoreline-threshold framing, Dong 2018 (1705.05535) finds h has the LOWEST ion escape rate in the system (1.29×10²⁶ s⁻¹) and the highest atmospheric retention timescale (~10¹⁰ yr) — &quot;h ought to be the most stable planet from the perspective of atmospheric ion loss.&quot; Stellar wind dynamic pressure at h is &quot;only&quot; 100–300× Earth&#x27;s vs. 10³–10⁴× at b. Krissansen-Totton 2022 (2207.04164) similarly concludes that outer planets &quot;retain significant surface volatiles in virtually all model simulations&quot; with &quot;CO₂-dominated or CO₂-O₂ atmospheres for all planets that retain substantial atmospheres.&quot; The cfg&#x27;s thin N₂+trace-CO₂ choice is conservative compared to this; a thicker (~0.1 bar) atmosphere is also defensible.",
  "p_176":"<b>Sky appearance.</b> The 0.005 bar atmosphere is essentially invisible from orbit. From the surface, the sky is black except for the host star (1.03° angular diameter, red-orange disk). Surface illumination of 0.16 S⊕ is similar to outer Mars at perihelion.",
  "h2_177":"Rotation &amp; spin synthesis",
  "p_178":"Tidal damping at 18.77 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00567 — in the 1:1 dominance regime.",
  "p_179":"<b>KSP implementation note.</b> Rotation period = orbital period = 18.7729 days (1 621 977 s).",
  "p_180":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.5%.",
  "p_181":"<b>Resonant chain dynamics.</b> Luger 2017 (1703.04166) established h&#x27;s place in the 7-planet Laplace-resonance chain (8:5 mean-motion resonance with g). The chain provides ongoing small-amplitude perturbations of the orbital elements, but for visual / cfg purposes the configuration is stable.",
  "p_182":"<b>Spin-orbit capture probability.</b> Makarov 2018 (1803.07453) computes the capture probability for h into 3:2 spin-orbit resonance: 0.017 (effectively zero). h should &quot;almost certainly be synchronized&quot; into the 1:1 resonance. This confirms the cfg&#x27;s <code>tidally_locked = true</code> decision. h&#x27;s tidal dissipation peak is at Maxwell time ~0.20 d (close to its orbital period), giving 5.3×10¹³ W total — about 7×10⁻³ W/m² normalized, a few orders of magnitude higher than the previous Bolmont 2020 estimate. The cfg&#x27;s <code>tidal_heating_w_m2: 0.00001–0.0001</code> may understate the actual value by 1–2 orders of magnitude.",
  "h2_183":"Visual styling",
  "li_184":"<b>Global appearance.</b> Dark red-brown rocky world (<code>#3a2c20</code>) with patchy cream-white frost (<code>#c8b8a0</code>) increasing toward the terminator and nightside. Visual character somewhere between Mars (red-brown rocky) and a smaller Pluto (frost-dominated).",
  "li_185":"<b>Substellar region.</b> Mostly bedrock; weathered iron-oxide brown. Impact craters visible at the cfg PQS resolution. Some frost in shadowed crater interiors.",
  "li_186":"<b>Mid-zone.</b> Mixed bedrock and frost — fractal pattern of exposed dark brown over cream frost. Photogenic for KSP flyovers.",
  "li_187":"<b>Terminator.</b> High contrast under grazing 2566 K light; topographic shadows reveal cratering and possible tectonic features. The frost-bedrock boundary is sharpest here.",
  "li_188":"<b>Nightside.</b> Cream-white frost cover (<code>#c8b8a0</code>) with dark bedrock patches at ridge tops. KSP nightside ambient ≈ 1% dayside.",
  "li_189":"<b>Atmosphere haze.</b> Imperceptible — the 0.005 bar atmosphere does not produce visible Rayleigh scattering. Limb is sharp.",
  "li_190":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.03° in h&#x27;s sky (2× the Sun from Earth). Surface illumination 0.144 S⊕ — comparable to early-morning twilight on Earth. The red-orange star against the ochre-and-cream surface gives h a particularly atmospheric look despite the lack of actual atmosphere.",
  "li_191":"<b>Sister planets in sky.</b> g (next inward) at angular size ~0.3° in inner conjunction. Conjunctions less frequent than for inner planets due to h&#x27;s long period.",
  "h2_192":"Bibliography",
  "h3_193":"Read (visual-informative, drove decisions above)",
  "li_194":"<b>1703.04166</b> Luger 2017 — Discovery / confirmation of h&#x27;s orbital period via K2. Establishes h as the seventh planet in the resonant chain. Source for orbital parameters.",
  "li_195":"<b>2112.05510</b> Gressier 2022 — HST WFC3/G141 transmission spectrum of h. Rejects cloud-free H₂-rich atmospheres. Only direct atmospheric observation of h to date.",
  "li_196":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. h discussed as both snowball and as the &quot;desiccated habitable&quot; outlier. Drives the canonical-vs-variant scenario split. Already read for d/e/f/g.",
  "li_197":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. Considers h&#x27;s water budget under impact + escape evolution.",
  "li_198":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. Places h close to the retention threshold; supports thin-atmo cfg choice.",
  "li_199":"<b>1707.06927</b> Turbet 2017 — Climate diversity, tidal dynamics, volatile fate for TRAPPIST-1 planets. Specifies CO₂ equilibrium pressure (4 mbar at 145 K for h pure-CO₂) and demonstrates surface CO₂ ice burial under H₂O ice. <b>Drives the major surface composition revision (H₂O ice dominant, not CO₂ frost).</b>",
  "li_200":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating. h rock core 1030 km, maximum 100 km H₂O shell. Lowest density / CMF in the system after the inner trio.",
  "li_201":"<b>1705.05535</b> Dong 2018 — Atmospheric escape from TRAPPIST-1 planets. h has lowest ion escape rate, atmospheric retention ~10¹⁰ yr. <b>Argues against the cosmic-shoreline-threshold framing</b>: ion-escape physics favors h retaining an atmosphere.",
  "li_202":"<b>2207.04164</b> Krissansen-Totton 2022 — Coupled atmosphere-interior model. Predicts CO₂-dominated or CO₂-O₂ atmospheres for outer planets in virtually all simulations. Supports keeping a non-trivial atmosphere on h.",
  "li_203":"<b>1803.07453</b> Makarov 2018 — Spin-orbital tidal dynamics. h capture probability into 3:2 = 0.017 → 1:1 lock confirmed.",
  "h3_204":"Read (context / methodology, not decision-driving)",
  "li_205":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g (not h directly, but provides framework). Already read.",
  "li_206":"<b>2508.12865</b> Empirical cosmic shoreline. Context.",
  "li_207":"<b>2507.02136</b> 3D Cosmic Shoreline for Nurturing Atmospheres. Context.",
  "li_208":"<b>2603.29743</b> New M Dwarf Cosmic Shoreline Constraints. Context.",
  "li_209":"<b>1810.05210</b> Moran 2018 — HST haze limits, includes h. Already read.",
  "li_210":"<b>1810.11255</b> Bolmont 2018 review — Constraining the environment and habitability of TRAPPIST-1. Direct quote: &quot;TRAPPIST-1 h is unable to maintain surface liquid water. It cannot build up more than 10²–10³ ppm of CO₂, whatever the amount of background gas.&quot; Drives the revised N₂-dominated atmosphere composition with trace CO₂.",
  "li_211":"<b>1708.09484</b> Bourrier 2017 — Temporal evolution of XUV and water content. h has the <b>smallest mass-loss</b> in the system: only 0.37–0.43 EO_H over 8 Gyr with realistic photolysis-limited escape (ε_α = 0.2). The brief HZ-runaway phase (33–67 Myr) preserves most accreted water — but the 26Al desiccation argument (Lichtenberg 2019) puts the initial accretion budget low.",
  "li_212":"<b>1902.04026</b> Lichtenberg 2019 — ²⁶Al desiccation of TRAPPIST-1 precursor planetesimals. Argues the whole system formed with f_H₂O ≪ 15 wt%, possibly ≲ 1 wt%. Tightens h&#x27;s water mass fraction toward the low end.",
  "li_213":"<b>1909.13859</b> Gonzales 2019 — Reanalysis of TRAPPIST-1 fundamental parameters. Confirms field age (0.5–10 Gyr), consistent with Burgasser &amp; Mamajek 2017&#x27;s 7.6 ± 2.2 Gyr. No cfg change required.",
  "li_214":"<b>2401.11815</b> Gillon 2024 — Comprehensive TRAPPIST-1 system review. Confirms h parameters; <b>corrects insolation from 0.16 to 0.144 ± 0.006 S⊕</b>. Cites Childs 2023 formation modeling: outer five planets &quot;required significant volatile content&quot; while inner two are &quot;nearly totally desiccated&quot; — supports keeping non-trivial water content for h.",
  "li_215":"<b>1702.07004</b> Bourrier 2017a — Lyman-α reconnaissance of TRAPPIST-1. XUV fluxes at h: F_X ≈ 34 erg/s/cm², F_EUV ≈ 12 erg/s/cm², F_Lyα ≈ 13 erg/s/cm². Photoionization lifetime of neutral H at h&#x27;s orbit: ~25 days (longer than h&#x27;s orbital period — relevant to exosphere modeling, not visual).",
  "h3_216":"Read (instrument-only, not visual-informative)",
  "p_217":"(None specific to h.)",
  "h3_218":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_219":"The h bibliography is moderately sized (53 papers, 43 with arXiv). Most non-arXiv papers are catalog summaries or works that mention h only in passing.",
  "li_220":"<b>&quot;Simulating Hydrospheres of TRAPPIST-1 h in Search of Liquid Water Layer&quot;</b> (no arXiv) — <i>potentially important for the sub-glacial ocean question</i>. <b>Flagged for paste if accessible.</b>",
  "li_221":"<b>&quot;VizieR Online Data Catalog: TRAPPIST-1 h NIR spectrum (Gressier+, 2022)&quot;</b> — data catalog, content already in 2112.05510. Skip.",
  "li_222":"<b>&quot;Characterizing Stellar Activity and Planetary Atmospheres in the TRAPPIST-1 System&quot;</b> (no arXiv) — possibly relevant but skip unless atmosphere decision needs review.",
  "li_223":"Various SETI / technosignature / catalog papers — irrelevant.",
  "p_224":"---",
  "h2_225":"Open items for follow-up",
  "li_226":"The Lincowski 2018 &quot;desiccated habitable h&quot; scenario could be implemented as an alternative cfg variant — a thick CO₂/O₂ atmosphere with a warm (~280 K) bare-rock surface. Visually distinctive: drier, dustier, with hazy yellow-cream skies.",
  "li_227":"The &quot;Simulating Hydrospheres of TRAPPIST-1 h&quot; paper (no arXiv) could refine the sub-glacial ocean cfg if accessible.",
  "li_228":"No JWST follow-up has been published for h as of 2026-05-21; any future emission or transmission spectrum should trigger a Phase 3 revisit.",
  "li_229":"Cfg variant for &quot;Pluto-like full frost&quot; — minimal bedrock exposure, dominantly cream-white surface. Use if a cleaner outer-solar-system analog is desired.",
  "li_230":"The water mass fraction (0.05–0.15) is poorly constrained; could be 0 (rocky-dry analogue) or up to 0.25 (Europa analog). Phase 2 should add more interior-structure measurements.",
  "li_231":"The &quot;desiccated habitable h&quot; alternative scenario (Lincowski 2018) still stands as a cfg variant; the Dong 2018 / Krissansen-Totton 2022 retention-favoring arguments raise its prior somewhat. A 0.1 bar variant might be more realistic than the canonical 0.005 bar.",
  "li_232":"Tidal heating <code>tidal_heating_w_m2</code> may be underestimated by 1–2 orders of magnitude per Makarov 2018 (~7×10⁻³ W/m² peak vs cfg&#x27;s 0.00001–0.0001). Re-check against more recent Bolmont successors.",

  ko: {
  "p_1":"TRAPPIST-1 h 는 M8V ultra-cool dwarf 를 18.77 일 주기로 도는 0.76 R⊕, 0.33 M⊕ 의 sub-Mars 질량 암석 행성입니다. 7 행성 중 가장 바깥에 있고 지구 insolation 의 0.16 배만 받습니다. K2 mission 데이터를 쓴 Luger 2017 (1703.04166) 이 궤도 주기와 공명 체인 내 위치를 확정했고, Gressier 2022 (2112.05510) 가 최초의 HST WFC3/G141 근적외 transmission 스펙트럼을 얻어 cloud-free 한 수소 풍부 대기를 배제했습니다. JWST 후속 관측은 2026-05-22 기준 아직 출판되지 않았습니다. h 의 흥미로운 반전은 따로 있습니다. Lincowski 2018 (1809.07498) 은 <b>건조된 (desiccated)</b> h 가 10–100 bar 의 O₂ + CO₂ post-runaway 시나리오에서는 maximum-greenhouse 거리 바깥에서도 거주 가능한 표면 온도를 유지할 수 있다고 지적했고, 이 때문에 h 는 시스템에서 가장 반직관적인 거주 가능성 후보가 됩니다.",
  "p_2":"<b>NearStars 시나리오 선택. 풍화된 기반암 위에 patchy 한 CO₂ + N₂ 얼음 서리가 깔린 얼어붙은 sub-Mars 암석 세계, 그리고 후기 outgassing 으로 남은 매우 얇은 (~0.005 bar) 잔여 대기.</b> 저질량 행성이 낮은 insolation 환경에 놓였을 때 휘발성 물질이 대부분 손실되거나 표면에 얼어붙는다고 보는 cosmic-shoreline 문헌(Castan-Lopez 2025, Zahnle 2017) 의 보수적 해석을 따른 것입니다. 대안인 Lincowski 2018 의 &quot;건조된 거주 가능&quot; 시나리오는 cfg 변형으로만 남겨두는데, 따뜻하고 건조한 암석 표면 위 두꺼운 CO₂/O₂ 대기는 시각적으로 덜 구분되기 때문입니다.",

  "h2_152":"표면 합성",
  "p_153":"TRAPPIST-1 h 는 시스템에서 가장 작은 행성(0.326 M⊕, sub-Mars 질량) 이며 insolation 은 0.16 S⊕ 입니다. 작은 질량, 낮은 중력(0.572 g), 낮은 insolation 의 조합 때문에 h 는 대기 유지에 까다로운 케이스 입니다. cosmic shoreline 문헌(Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) 은 h 를 수소 함유는 물론 질소 함유 대기에 대해서도 경험적 유지 임계값 근처 또는 그 아래에 놓고 있습니다. 일부 휘발성 유지는 그럴듯한데, CO₂ 정도면 h 의 온도에서 Jeans 탈출을 견딜 만큼 분자량이 충분히 크지만, 대기 질량 자체는 작을 가능성이 높습니다.",
  "p_154":"저질량임에도 h 의 bulk 밀도(Agol 2021 의 4.20 g/cc) 는 비자명한 물 질량 분율(~5–15%) 을 함의할 만큼 낮습니다. f, g 와 비슷한 양상이지만 이쪽은 활용 가능한 전체 질량이 훨씬 적습니다. 이 물의 대부분은 표면 얼음 형태(CO₂ + H₂O 얼음) 이거나 작은 암석 코어 위 얇은 sub-glacial 층으로 격리되어 있을 가능성이 큽니다.",
  "p_155":"Lincowski 2018 (1809.07498) 의 &quot;건조된 h&quot; 시나리오 — 두꺼운(10–100 bar) CO₂/O₂ post-runaway 대기가 거주 가능한 표면 온도를 만드는 경우 — 는 cfg 변형으로 남겨두지만 정규 선택은 아닙니다. h 의 탈출 속도에 서 post-runaway 대기 유지 시간 척도가 짧고(≲ 1 Gyr), 7.6 Gyr 의 시스템 나이 동안 초기 두꺼운 대기는 대부분 손실되었을 것이기 때문 입니다.",
  "p_156":"표면 형태는 Mars-Pluto 하이브리드 analog 를 채택합니다.",
  "li_157":"<b>Substellar 영역</b> (substellar 에서 ~0–60°). 기반암이 지배하며, Mars 의 남부 고원과 유사한 풍화된 철-풍부 표면. 그늘진 분화구 내부에는 일부 patchy 한 CO₂ 서리.",
  "li_158":"<b>Mid-zone</b> (60–120°). substellar 로부터 멀어질수록 서리 덮개가 증가.",
  "li_159":"<b>Terminator</b> (~90°). 서리-기반암 대비가 크고, 비스듬히 들어오는 2566 K 빛 아래로 긴 지형 그림자가 깔림.",
  "li_160":"<b>Nightside</b> (&gt;120°). 주로 ~60 K 의 CO₂ + N₂ 서리 덮개, 능선 꼭대기에 가끔 어두운 기반암 patch.",
  "p_161":"<b>색 선택 — H₂O 얼음 지배.</b> Turbet 2017 은 h 의 대기가 저압에서 미량 CO₂ 에 의해 지배된다 해도 표면 서리 조성은 <b>주로 H₂O 얼음</b> 이라는 점을 보입니다(이전에 가정한 CO₂/N₂ 서리가 아닙니다). CO₂ 얼음 퇴적은 일시적으로 형성되지만 중력적으로 불안정해서 지질학적 시간 척도에서 H₂O 얼음 껍질 아래로 매장됩니다. 가시 표면은 따라서 M-dwarf 조명 아래의 깨끗한 H₂O 얼음에서 오는 크림-화이트(<code>#d8d0c4</code>) 가 되고, 풍화된 철-풍부 기반암 패치(<code>#3a2c20</code>) 는 얼음이 승화된 국소 substellar 영역에서만 노출됩니다. Mars-Pluto 하이브리드 프레임 은 반전됩니다. 전역적으로는 크림-화이트가 지배적이고, 어두운 기반암 이 표면의 주된 색조가 아니라 보조 accent 가 됩니다.",
  "p_162":"<b>내부 구조.</b> Barr 2018 (1712.05641) 은 h 가 1030 km 의 암석 코어 (평균 밀도 케이스) 를 갖는다고 봅니다. 최대 밀도 구성이면 암석 위로 H₂O 껍질이 ~100 km 만 허용됩니다. 현재 cfg 의 WMF 0.03–0.10 은 이 두 극단 사이에 위치합니다. h 의 CMF 는 시스템에서 낮은 쪽(~0.23) 으로, 상대적으로 철이 적은 암석체와 일관됩니다.",
  "p_163":"<b>기반암 / 산화철.</b> g, f 와 비교해 h 에서 더 두드러집니다. 노출된 substellar 기반암이 7.6 Gyr 동안 직접 stellar UV 아래에서 광분해 산화를 받아온 결과입니다. primary tint 가 이미 이를 반영하고 있으며, 충돌 분화구 가장자리 부근의 밝은 산화철 패치는 fine-grained PQS 디테일로 좋습니다.",
  "p_164":"<b>조석 lock 아래의 모폴로지.</b> resurfacing 이 거의 없습니다. h 의 조석 가열은 무시할 만하고(Bolmont 2020), induction heating 도 최소이며(Grayver 2022 거리 스케일링), 방사성 열은 화산 활동을 일으키기에 너무 낮습니다(작은 질량). 표면은 시스템 나이 7.6 Gyr 의 충돌 기록을 거의 그대로 보존하며, locked frame 의 leading 반구 쪽 으로 편향됩니다.",
  "h2_165":"대기 합성",
  "p_166":"Gressier 2022 (2112.05510) 가 h 의 첫 HST WFC3/G141 transmission 스펙트럼을 제시했고, 이는 현재까지 h 의 유일한 출판된 대기 관측 입니다. 데이터는 대기 없음 또는 flat-spectrum 이차 대기와 일관 하며, cloud-free 한 수소 풍부 대기는 배제됩니다.",
  "p_167":"이론 모델링은 다음과 같습니다.",
  "li_168":"<b>Lincowski 2018.</b> h 에 대해 건조된 post-runaway 10–100 bar CO₂/O₂ 대기를 검토하고 일부 케이스에서 거주 가능한 표면 온도가 나오는 것을 확인했습니다. 다만 h 의 탈출 속도에서 7.6 Gyr 동안 그렇게 두꺼운 대기를 유지할 확률은 낮습니다.",
  "li_169":"<b>Bourgeois 2024.</b> magma ocean 진화가 초기에 ~1 bar (CO₂ + H₂O) 의 outgassed 대기를 만들지만, 대부분 시간이 지나면서 손실됩니다.",
  "li_170":"<b>Castan-Lopez 2025.</b> cosmic shoreline 분석은 h 가 전형적 이차 대기 유지 임계값 근처 또는 그 아래에 있다고 시사합니다.",
  "p_171":"NearStars 는 <b>0.005 bar (Mars-thin) 의 N₂ 지배 + 미량 CO₂ 대기</b> 를 채택합니다.",
  "li_172":"<b>압력</b> 0.005 bar (500 Pa). Mars 와 비슷한 수준입니다. 0.3 M⊕ 행성에도 일부 outgassing 은 축적되므로 0 보다는 위에 있어야 하고, cosmic-shoreline / Jeans 탈출 제약상 h 가 이보다 많이는 유지하지 못한다는 점에서 0.01 bar 아래여야 합니다.",
  "li_173":"<b>조성</b> N₂ 지배(~90%) + 미량 CO₂ (10–100 ppm 으로, 1000 이 아닙 니다). 근거는 Bolmont 2018 review 의 cold-trap 논거에 더해 Turbet 2017 의 구체적인 계산입니다. h 의 pure-CO₂ 평형은 145 K 에서 4 mbar 에 불과하고, N₂ 배경 시나리오에서는 기체상에 &quot;수십 ppm 수준&quot; 의 CO₂ 만 남습니다. 나머지 ~10% 는 Ar, 서리 순환의 H₂O 증기, 화석 O₂ 사이에서 분배됩니다.",
  "li_174":"<b>구름.</b> 최소 (~2% 전역). 드문 CO₂ 얼음 권운 정도.",
  "p_175":"<b>ion escape 논거에 의해 대기 유지가 오히려 유리.</b> cosmic-shoreline 임계값 프레이밍에도 불구하고 Dong 2018 (1705.05535) 은 h 가 시스템 에서 가장 낮은 ion escape rate (1.29×10²⁶ s⁻¹) 와 가장 높은 대기 유지 시간 척도(~10¹⁰ yr) 를 갖는다고 봅니다. &quot;h 는 대기 ion 손실의 관점에서 가장 안정적인 행성이어야 한다&quot; 는 결론입니다. h 위치에서의 stellar wind dynamic pressure 는 지구의 &quot;단지&quot; 100–300 배인데, b 에 서는 10³–10⁴ 배입니다. Krissansen-Totton 2022 (2207.04164) 도 마찬 가지로 외행성들은 &quot;사실상 모든 모델 시뮬레이션에서 상당한 표면 휘발 성 물질을 유지&quot; 하며 &quot;상당한 대기를 유지하는 모든 행성에서 CO₂ 지배 또는 CO₂-O₂ 대기&quot; 가 된다고 결론짓습니다. cfg 의 얇은 N₂ + 미량 CO₂ 선택은 이에 비해 보수적이며, 더 두꺼운(~0.1 bar) 대기도 충분히 방어 가능합니다.",
  "p_176":"<b>하늘 외관.</b> 0.005 bar 대기는 궤도에서는 사실상 보이지 않습니다. 표면에서는 호스트 별(1.03° 각 크기의 적-오렌지 디스크) 을 빼면 하늘 이 검습니다. 0.16 S⊕ 의 표면 조명은 근일점 외곽의 Mars 와 비슷한 수준입니다.",
  "h2_177":"자전 &amp; spin 합성",
  "p_178":"18.77 일 주기에서 7.6 Gyr 동안 조석 damping 이 진행되면 동기(1:1) 구성에 도달하고, 황도 경사각은 0 으로 damping 됩니다. 이심률 0.00567 은 1:1 우세 영역입니다.",
  "p_179":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 18.7729 일 (1 621 977 s).",
  "p_180":"<b>계절 없음.</b> 황도 경사각 = 0 이고, libration 으로 인한 insolation 변동도 &lt; 0.5% 입니다.",
  "p_181":"<b>공명 체인 동역학.</b> Luger 2017 (1703.04166) 이 7 행성 Laplace 공명 체인 안에서 h 의 위치를 확립했습니다(g 와 8:5 평균 운동 공명). 체인 은 궤도 요소에 지속적인 small-amplitude 섭동을 주지만, 시각적/cfg 목적상 구성은 안정적입니다.",
  "p_182":"<b>spin-orbit 포획 확률.</b> Makarov 2018 (1803.07453) 이 h 의 3:2 spin-orbit 공명 포획 확률을 계산했습니다. 0.017 로 사실상 0 입니다. h 는 &quot;거의 확실히 1:1 공명으로 동기화&quot; 되어야 합니다. 이는 cfg 의 <code>tidally_locked = true</code> 결정을 확인해줍니다. h 의 조석 소산 peak 은 Maxwell time ~0.20 d (궤도 주기에 가까움) 에 있어 총 5.3×10¹³ W, 정규화하면 ~7×10⁻³ W/m² 입니다. 이는 이전 Bolmont 2020 추정보다 몇 자릿수 더 큽니다. cfg 의 <code>tidal_heating_w_m2: 0.00001–0.0001</code> 은 실제 값을 1–2 자릿수 정도 과소평가하고 있을 수 있습니다.",
  "h2_183":"비주얼 스타일",
  "li_184":"<b>전역 외관.</b> 어두운 적갈색의 암석 세계(<code>#3a2c20</code>) 에 patchy 한 크림-화이트 서리(<code>#c8b8a0</code>) 가 깔리고, terminator 와 nightside 쪽으로 갈수록 서리 비중이 커집니다. 시각적으로는 Mars(적갈색 암석) 와 좀 더 작은 Pluto(서리 지배) 사이 어딘가입니다.",
  "li_185":"<b>Substellar 영역.</b> 대부분 기반암이고 풍화된 산화철 갈색입니다. cfg PQS 해상도에서 충돌 분화구가 보이며, 그늘진 분화구 내부에는 일부 서리가 남아 있습니다.",
  "li_186":"<b>Mid-zone.</b> 기반암과 서리가 섞입니다. 크림 서리 위에 어두운 갈색이 노출되는 fractal 패턴으로, KSP 저공 비행에 사진발이 좋은 영역입니다.",
  "li_187":"<b>Terminator.</b> 비스듬한 2566 K 빛 아래로 대비가 크고, 지형 그림자 가 cratering 과 가능한 tectonic feature 를 드러냅니다. 서리-기반암 경계가 가장 선명한 곳입니다.",
  "li_188":"<b>Nightside.</b> 크림-화이트 서리 덮개(<code>#c8b8a0</code>) 위로 능선 꼭대기에 어두운 기반암 patch 가 노출됩니다. KSP nightside ambient ≈ dayside 의 1%.",
  "li_189":"<b>Atmosphere haze.</b> 인지 불가. 0.005 bar 대기는 보일 만한 Rayleigh scattering 을 만들지 않고 limb 가 선명합니다.",
  "li_190":"<b>하늘의 별.</b> TRAPPIST-1 이 h 의 하늘에서 1.03° 를 차지하므로 지구에서 본 태양의 2 배 크기입니다. 표면 조명은 0.144 S⊕ 로 지구 의 이른 아침 황혼 수준입니다. 적-오렌지 별이 ochre-and-cream 표면 과 대비를 이루어, 실제로는 대기가 거의 없음에도 h 는 특히 분위기 있는 외관을 갖습니다.",
  "li_191":"<b>하늘의 자매 행성.</b> 안쪽으로 한 단계 가까운 g 가 inner conjunction 에서 각 크기 ~0.3°. h 의 긴 주기 때문에 conjunction 자체는 내행성보다 드물게 일어납니다.",
  "h2_192":"참고 문헌",

  "li_194":"<b>1703.04166</b> Luger 2017 — K2 를 통한 h 의 궤도 주기 발견 / 확인. 공명 체인의 일곱 번째 행성으로 h 를 확립. 궤도 파라미터의 출처.",
  "li_195":"<b>2112.05510</b> Gressier 2022 — h 의 HST WFC3/G141 transmission 스펙트럼. cloud-free H₂-rich 대기를 배제. 현재까지 h 에 대한 유일한 직접 대기 관측.",
  "li_196":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계들의 진화된 기후. h 는 snowball 과 &quot;건조된 거주 가능&quot; 이상치 양쪽으로 논의됩니다. 정규-대-변형 시나리오 분기를 견인했고, d/e/f/g 단계에서 이미 읽음.",
  "li_197":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. 충돌 + 탈출 진화 아래에서 h 의 물 예산을 다룹니다.",
  "li_198":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. h 를 유지 임계값 근처에 놓아 얇은 대기 cfg 선택을 지지.",
  "li_199":"<b>1707.06927</b> Turbet 2017 — TRAPPIST-1 행성들의 기후 다양성, 조석 동역학, 휘발성 운명. h 의 pure-CO₂ 평형압(145 K 에서 4 mbar) 을 특정하고, 표면 CO₂ 얼음이 H₂O 얼음 아래로 매장되는 과정을 보임. <b>주요한 표면 조성 수정(CO₂ 서리가 아닌 H₂O 얼음 지배) 의 견인.</b>",
  "li_200":"<b>1712.05641</b> Barr 2018 — 내부 구조와 조석 가열. h 의 암석 코어 1030 km, 최대 H₂O 껍질 100 km. 내행성 3 개 다음으로 시스템 내 가장 낮은 밀도 / CMF.",
  "li_201":"<b>1705.05535</b> Dong 2018 — TRAPPIST-1 행성들의 대기 탈출. h 가 가장 낮은 ion escape rate 와 ~10¹⁰ yr 의 대기 유지 시간을 가짐. <b>cosmic-shoreline-threshold 프레이밍에 반대 논거.</b> ion-escape 물리는 h 가 대기를 유지하는 쪽을 지지합니다.",
  "li_202":"<b>2207.04164</b> Krissansen-Totton 2022 — 결합된 대기-내부 모델. 사실상 모든 시뮬레이션에서 외행성들이 CO₂ 지배 또는 CO₂-O₂ 대기 를 가짐을 예측. h 에 비자명한 대기를 유지하는 선택을 지지.",
  "li_203":"<b>1803.07453</b> Makarov 2018 — spin-orbit 조석 동역학. h 의 3:2 포획 확률 0.017 → 1:1 lock 확인.",

  "li_210":"<b>1810.11255</b> Bolmont 2018 review — Constraining the environment and habitability of TRAPPIST-1. 직접 인용. &quot;TRAPPIST-1 h 는 표면 액체 물을 유지할 수 없다. 배경 가스의 양과 무관하게 10²–10³ ppm 이상의 CO₂ 를 축적하지 못한다.&quot; 이 결과가 N₂ 지배 + 미량 CO₂ 로의 대기 조성 수정을 견인.",
  "li_211":"<b>1708.09484</b> Bourrier 2017 — XUV 와 물 함량의 시간 진화. h 는 시스템에서 <b>질량 손실이 가장 작음</b>. 현실적인 photolysis-limited 탈출(ε_α = 0.2) 기준으로 8 Gyr 에 걸쳐 0.37–0.43 EO_H 만 손실 합니다. 짧은 HZ-runaway 단계(33–67 Myr) 가 축적된 물 대부분을 보존하지만, ²⁶Al 건조화 논거(Lichtenberg 2019) 가 초기 축적량 자체를 낮춥니다.",
  "li_212":"<b>1902.04026</b> Lichtenberg 2019 — TRAPPIST-1 전구 planetesimal 의 ²⁶Al 건조화. 시스템 전체가 f_H₂O ≪ 15 wt%, 어쩌면 ≲ 1 wt% 로 형성되었다고 주장. h 의 물 질량 분율을 하한 쪽으로 좁히는 역할.",
  "li_213":"<b>1909.13859</b> Gonzales 2019 — TRAPPIST-1 fundamental parameter 재분석. field age (0.5–10 Gyr) 가 Burgasser &amp; Mamajek 2017 의 7.6 ± 2.2 Gyr 와 일관함을 확인. cfg 변경은 필요 없음.",
  "li_214":"<b>2401.11815</b> Gillon 2024 — TRAPPIST-1 시스템 종합 review. h 의 파라미터를 확인하면서 <b>insolation 을 0.16 에서 0.144 ± 0.006 S⊕ 로 보정</b>. Childs 2023 의 형성 모델링을 인용해 바깥쪽 다섯 행성은 &quot;유의미한 휘발성 함량을 필요로 했다&quot;, 안쪽 두 행성은 &quot;거의 완전히 건조&quot;라고 정리. h 에 비자명한 물 함량을 유지하는 선택을 지지.",
  "li_215":"<b>1702.07004</b> Bourrier 2017a — TRAPPIST-1 의 Lyman-α 정찰. h 위치에서의 XUV flux. F_X ≈ 34 erg/s/cm², F_EUV ≈ 12 erg/s/cm², F_Lyα ≈ 13 erg/s/cm². h 궤도에서 중성 H 의 광이온화 수명은 약 25 일로 h 의 궤도 주기보다 길어 exosphere 모델링과 관련은 있지만 시각에는 영향 없음.",

  "li_228":"2026-05-22 기준 h 에 대한 JWST 후속 관측은 출판되지 않았습니다. 향후 emission 이나 transmission 스펙트럼이 나오면 Phase 3 를 다시 봐야 합니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
