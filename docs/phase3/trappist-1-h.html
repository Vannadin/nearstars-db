  "h2_204":"Surface synthesis",
  "p_205":"TRAPPIST-1 h is the system&#x27;s smallest planet (0.326 M⊕, sub-Mars mass) and lies at 0.16 S⊕ insolation. The combination — small mass, low gravity (0.572 g), and low insolation — makes h a difficult case for atmospheric retention. The cosmic shoreline literature (Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) places h close to or below the empirical retention threshold for hydrogen-bearing and even nitrogen-bearing atmospheres. Some volatile retention is plausible (CO₂ has high enough molecular weight to survive Jeans escape at h&#x27;s temperatures) but the atmospheric mass is likely small.",
  "p_206":"Despite the low mass, h&#x27;s bulk density (4.20 g/cc from Agol 2021) is low enough to imply a non-trivial water mass fraction (~5–15%), similar to f and g but with much less mass to work with. Most of this water is likely frozen at the surface (CO₂ and H₂O ice) or sequestered as a thin sub-glacial layer over a small rocky core.",
  "p_207":"The Lincowski 2018 (1809.07498) &quot;desiccated h&quot; scenario — habitable surface temperatures from a thick (10–100 bar) CO₂/O₂ post-runaway atmosphere — is preserved as a cfg variant but is not the canonical choice. The post-runaway atmospheric retention timescale at h&#x27;s escape velocity is short (≲ 1 Gyr); over 7.6 Gyr of system age, most of any initial thick atmosphere has been lost.",
  "p_208":"For the surface morphology, we adopt a Mars-Pluto hybrid analog:",
  "li_209":"<b>Substellar region</b> (~0–60° from substellar): bedrock-dominated, weathered iron-rich surface analogous to Mars&#x27;s southern highlands. Some patchy CO₂ frost in shadowed craters.",
  "li_210":"<b>Mid-zone</b> (60–120°): increasing frost cover with distance from substellar.",
  "li_211":"<b>Terminator</b> (~90°): high frost-vs-bedrock contrast; long topographic shadows under grazing 2566 K light.",
  "li_212":"<b>Nightside</b> (&gt;120°): predominantly CO₂ + N₂ frost cover at ~60 K, with occasional dark bedrock patches at ridge tops.",
  "p_213":"<b>Color choice — H₂O ice dominant.</b> Turbet 2017 shows that even though h&#x27;s atmosphere is dominated by trace CO₂ at low pressures, the surface frost composition is <b>predominantly H₂O ice</b> (not CO₂/N₂ frost as in earlier framings). CO₂ ice deposits form transiently but are gravitationally unstable — they get buried beneath the H₂O ice shell over geological timescales. The visible surface is therefore cream-white (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) from clean H₂O ice under M-dwarf illumination, with minor weathered iron-rich bedrock patches (<span class=\"hex-chip\" style=\"background:#3a2c20\"></span><code>#3a2c20</code>) exposed only in localized substellar regions where ice has sublimated. The Mars-Pluto hybrid framing inverts: cream-white dominant globally, with dark bedrock as the minor accent rather than the primary surface tone.",
  "p_214":"<b>Interior structure.</b> Barr 2018 (1712.05641) finds h has a 1030 km rock core (mean-density case), with a maximum-density configuration allowing only ~100 km H₂O shell over the rock. The current cfg WMF 0.03–0.10 sits between these extremes. h&#x27;s CMF is at the lower end of the system (~0.23), consistent with a relatively iron-poor rocky body.",
  "p_215":"<b>Mars-analog patchy aurora geometry.</b> With no organized global dynamo (sub-Mars mass, frozen core after 7.6 Gyr), h&#x27;s magnetic field is dominated by <b>crustal remnants</b> in localized patches — directly analogous to Mars (Acuña 1999 MAG/ER discovery). Combined with the thin N₂ atmosphere, this produces a <i>patchy</i> aurora geometry rather than the regular auroral oval seen on Earth or g. Each crustal magnetic anomaly funnels stellar-wind particles into a localized aurora spot above its location, producing scattered green N₂ Vegard-Kaplan + N₂⁺ violet emissions. The aurora geometry is essentially random — wherever crustal magnetization survived — and the result is dramatically different from the inner planets&#x27; organized auroral bands. Cfg renders this as scattered <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> green patches with <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet accent, distributed at low-to-mid magnetic latitudes rather than concentrated at the poles. Interesting-first tie-break chose this Mars-analog rendering over the alternative &quot;uniform faint global glow&quot; approach.",
  "p_216":"<b>Bedrock / iron oxide.</b> Prominent on h compared to g/f — the exposed substellar bedrock has had 7.6 Gyr of photolytic oxidation under direct stellar UV. The primary tint already incorporates this; specific bright iron-oxide patches near impact crater rims would be a fine-grained PQS detail.",
  "p_217":"<b>Morphology under tidal lock.</b> Almost no resurfacing — h&#x27;s tidal heating is negligible (Bolmont 2020), induction heating minimal (Grayver 2022 distance scaling), and radiogenic heat too low (small mass) to drive volcanism. The surface preserves a maximal impact record across the system&#x27;s 7.6 Gyr age, biased toward the leading hemisphere in the locked frame.",
  "h2_218":"Atmosphere synthesis",
  "p_219":"Gressier 2022 (2112.05510) presented the first HST WFC3/G141 transmission spectrum of h, the planet&#x27;s only published atmospheric observation. The data are consistent with either no atmosphere or a flat-spectrum secondary atmosphere; cloud-free hydrogen-rich atmospheres are excluded.",
  "p_220":"Theoretical modeling:",
  "li_221":"<b>Lincowski 2018:</b> considers desiccated post-runaway 10–100 bar CO₂/O₂ atmospheres for h, finding some give habitable surface temperatures. However, the retention probability of such thick atmospheres over 7.6 Gyr at h&#x27;s escape velocity is low.",
  "li_222":"<b>Bourgeois 2024:</b> magma ocean evolution gives an initial outgassed atmosphere of ~1 bar (CO₂ + H₂O); most lost over time.",
  "li_223":"<b>Castan-Lopez 2025:</b> cosmic shoreline analysis suggests h is near or below the retention threshold for typical secondary atmospheres.",
  "p_224":"For NearStars we adopt <b>0.005 bar (Mars-thin) N₂-dominated atmosphere with trace CO₂</b>:",
  "li_225":"<b>Pressure</b> 0.005 bar (500 Pa) — comparable to Mars. Above zero because some outgassing should accumulate on a 0.3 M⊕ planet; below 0.01 bar because cosmic-shoreline / Jeans-escape constraints suggest h cannot retain much more.",
  "li_226":"<b>Composition</b> N₂-dominated (~90%), trace CO₂ (10–100 ppm, NOT 1000). The driver is Bolmont 2018 review&#x27;s cold-trap argument plus Turbet 2017 specific calculation showing pure-CO₂ equilibrium is just 4 mbar at 145 K for h, and N₂-background scenarios give only &quot;a few tens of ppm&quot; CO₂ in the gas phase. The remaining ~10% is split among Ar, frost-cycle H₂O vapor, and fossil O₂.",
  "li_227":"<b>Clouds.</b> Minimal (~2% global): rare CO₂ ice cirrus only.",
  "p_228":"<b>Atmospheric retention favored by ion-escape arguments.</b> Despite the cosmic-shoreline-threshold framing, Dong 2018 (1705.05535) finds h has the LOWEST ion escape rate in the system (1.29×10²⁶ s⁻¹) and the highest atmospheric retention timescale (~10¹⁰ yr) — &quot;h ought to be the most stable planet from the perspective of atmospheric ion loss.&quot; Stellar wind dynamic pressure at h is &quot;only&quot; 100–300× Earth&#x27;s vs. 10³–10⁴× at b. Krissansen-Totton 2022 (2207.04164) similarly concludes that outer planets &quot;retain significant surface volatiles in virtually all model simulations&quot; with &quot;CO₂-dominated or CO₂-O₂ atmospheres for all planets that retain substantial atmospheres.&quot; The cfg&#x27;s thin N₂+trace-CO₂ choice is conservative compared to this; a thicker (~0.1 bar) atmosphere is also defensible.",
  "p_229":"<b>Auroral chemistry.</b> The thin N₂-dominated atmosphere (≲100 ppm CO₂) produces a clean nitrogen-aurora chemistry: N₂ Vegard-Kaplan bands at 200–300 nm (UV, with some scattered to visible cyan-violet), N₂⁺ 391.4 nm First Negative blue, and Lyman-Birge-Hopfield bands. Trace O₂ (if present from photolysis) contributes [OI] 557.7 nm green. Per the crustal-anomaly geometry above, these emissions are concentrated in small spots rather than continuous bands. Intensity ~30 kR is the lowest in the system due to the very thin atmosphere — but each individual aurora spot is bright per unit area because precipitating particles deposit deeply into the thin air. For cfg rendering: faint green/violet patches with no organized polar geometry.",
  "p_230":"<b>Sky appearance.</b> The 0.005 bar atmosphere is essentially invisible from orbit. From the surface, the sky is black except for the host star (1.03° angular diameter, red-orange disk). Surface illumination of 0.16 S⊕ is similar to outer Mars at perihelion.",
  "h2_231":"Rotation &amp; spin synthesis",
  "p_232":"Tidal damping at 18.77 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00567 — in the 1:1 dominance regime.",
  "p_233":"<b>KSP implementation note.</b> Rotation period = orbital period = 18.7729 days (1 621 977 s).",
  "p_234":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.5%.",
  "p_235":"<b>Resonant chain dynamics.</b> Luger 2017 (1703.04166) established h&#x27;s place in the 7-planet Laplace-resonance chain (8:5 mean-motion resonance with g). The chain provides ongoing small-amplitude perturbations of the orbital elements, but for visual / cfg purposes the configuration is stable.",
  "p_236":"<b>Magnetic dynamo expectation.</b> h&#x27;s small mass (0.33 M⊕, sub-Mars), advanced age (7.6 Gyr), and very slow tidally-locked rotation (18.8 d) make a sustained global dynamo essentially impossible. 2208.06523 (Thermal Evolution and Magnetic History of Rocky Planets) finds that bodies below ~0.5 M⊕ typically shut down their dynamos within 1–2 Gyr; h is well past that timescale. The remaining magnetic structure is crustal — fossilized magnetization from when h had a younger dynamo, now patchy after billions of years of impact gardening and thermal alteration. This is exactly the Mars situation today: ~1 μT crustal patches with no global dipole. Auroras therefore form not in organized polar ovals but in localized spots above magnetized terrain. RM22 (2203.01065) scaling returns a dipole moment of ~0.005 × Earth, effectively a residual signature rather than an active dynamo.",
  "p_237":"<b>Tidal heating note.</b> Makarov 2018 finds h capture probability into 3:2 spin-orbit = 0.017 (effectively zero); 1:1 lock is confirmed. The tidal dissipation peak is at Maxwell time ~0.20 d (close to the orbital period), giving 5.3×10¹³ W total — about 7×10⁻³ W/m² normalized. This is 1–2 orders of magnitude higher than the cfg&#x27;s current 0.00001–0.0001 W/m², which may understate the actual flux.",
  "h2_238":"Visual styling",
  "li_239":"<b>Global appearance.</b> Dark red-brown rocky world (<span class=\"hex-chip\" style=\"background:#3a2c20\"></span><code>#3a2c20</code>) with patchy cream-white frost (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) increasing toward the terminator and nightside. Visual character somewhere between Mars (red-brown rocky) and a smaller Pluto (frost-dominated).",
  "li_240":"<b>Substellar region.</b> Mostly bedrock; weathered iron-oxide brown. Impact craters visible at the cfg PQS resolution. Some frost in shadowed crater interiors.",
  "li_241":"<b>Mid-zone.</b> Mixed bedrock and frost — fractal pattern of exposed dark brown over cream frost. Photogenic for KSP flyovers.",
  "li_242":"<b>Terminator.</b> High contrast under grazing 2566 K light; topographic shadows reveal cratering and possible tectonic features. The frost-bedrock boundary is sharpest here.",
  "li_243":"<b>Nightside.</b> Cream-white frost cover (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) with dark bedrock patches at ridge tops. KSP nightside ambient ≈ 1% dayside.",
  "li_244":"<b>Atmosphere haze.</b> Imperceptible — the 0.005 bar atmosphere does not produce visible Rayleigh scattering. Limb is sharp.",
  "li_245":"<b>Patchy Mars-style aurora.</b> Scattered <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> green and <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet spots at low-to-mid magnetic latitudes — concentrated above magnetized crustal terrain rather than at the poles. Intensity ~30 kR, visible only against the dark nightside. The spotty pattern is the visual signature of h&#x27;s frozen-core, crustal-anomaly-only magnetic environment.",
  "li_246":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.03° in h&#x27;s sky (2× the Sun from Earth). Surface illumination 0.144 S⊕ — comparable to early-morning twilight on Earth. The red-orange star against the ochre-and-cream surface gives h a particularly atmospheric look despite the lack of actual atmosphere.",
  "li_247":"<b>Sister planets in sky.</b> g (next inward) at angular size ~0.3° in inner conjunction. Conjunctions less frequent than for inner planets due to h&#x27;s long period.",
  "h2_248":"Bibliography",
  "h3_249":"Read (visual-informative, drove decisions above)",
  "li_250":"<b>1703.04166</b> Luger 2017 — Discovery / confirmation of h&#x27;s orbital period via K2. Establishes h as the seventh planet in the resonant chain. Source for orbital parameters.",
  "li_251":"<b>2112.05510</b> Gressier 2022 — HST WFC3/G141 transmission spectrum of h. Rejects cloud-free H₂-rich atmospheres. Only direct atmospheric observation of h to date.",
  "li_252":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. h discussed as both snowball and as the &quot;desiccated habitable&quot; outlier. Drives the canonical-vs-variant scenario split. Already read for d/e/f/g.",
  "li_253":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. Considers h&#x27;s water budget under impact + escape evolution.",
  "li_254":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. Places h close to the retention threshold; supports thin-atmo cfg choice.",
  "li_255":"<b>1707.06927</b> Turbet 2017 — Climate diversity, tidal dynamics, volatile fate for TRAPPIST-1 planets. Specifies CO₂ equilibrium pressure (4 mbar at 145 K for h pure-CO₂) and demonstrates surface CO₂ ice burial under H₂O ice. <b>Drives the major surface composition revision (H₂O ice dominant, not CO₂ frost).</b>",
  "li_256":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating. h rock core 1030 km, maximum 100 km H₂O shell. Lowest density / CMF in the system after the inner trio.",
  "li_257":"<b>1705.05535</b> Dong 2018 — Atmospheric escape from TRAPPIST-1 planets. h has lowest ion escape rate, atmospheric retention ~10¹⁰ yr. <b>Argues against the cosmic-shoreline-threshold framing</b>: ion-escape physics favors h retaining an atmosphere.",
  "li_258":"<b>2207.04164</b> Krissansen-Totton 2022 — Coupled atmosphere-interior model. Predicts CO₂-dominated or CO₂-O₂ atmospheres for outer planets in virtually all simulations. Supports keeping a non-trivial atmosphere on h.",
  "li_259":"<b>1803.07453</b> Makarov 2018 — Spin-orbital tidal dynamics. h capture probability into 3:2 = 0.017 → 1:1 lock confirmed.",
  "li_260":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. Outer-planet magnetosphere context.",
  "li_261":"<b>2203.01065</b> RM22 — Rocky-planet dynamo scaling; supports h&#x27;s near-zero dipole moment.",
  "li_262":"<b>2208.06523</b> Thermal Evolution and Magnetic History of Rocky Planets — confirms sub-Mars-mass planets shut down their dynamos within 1–2 Gyr.",
  "li_263":"<b>1910.09871</b> Atri 2019 — Surface-dose tables for h.",
  "h3_264":"Read (context / methodology, not decision-driving)",
  "li_265":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g (not h directly, but provides framework). Already read.",
  "li_266":"<b>2508.12865</b> Empirical cosmic shoreline. Context.",
  "li_267":"<b>2507.02136</b> 3D Cosmic Shoreline for Nurturing Atmospheres. Context.",
  "li_268":"<b>2603.29743</b> New M Dwarf Cosmic Shoreline Constraints. Context.",
  "li_269":"<b>1810.05210</b> Moran 2018 — HST haze limits, includes h. Already read.",
  "li_270":"<b>1810.11255</b> Bolmont 2018 review — Constraining the environment and habitability of TRAPPIST-1. Direct quote: &quot;TRAPPIST-1 h is unable to maintain surface liquid water. It cannot build up more than 10²–10³ ppm of CO₂, whatever the amount of background gas.&quot; Drives the revised N₂-dominated atmosphere composition with trace CO₂.",
  "li_271":"<b>1708.09484</b> Bourrier 2017 — Temporal evolution of XUV and water content. h has the <b>smallest mass-loss</b> in the system: only 0.37–0.43 EO_H over 8 Gyr with realistic photolysis-limited escape (ε_α = 0.2). The brief HZ-runaway phase (33–67 Myr) preserves most accreted water — but the 26Al desiccation argument (Lichtenberg 2019) puts the initial accretion budget low.",
  "li_272":"<b>1902.04026</b> Lichtenberg 2019 — ²⁶Al desiccation of TRAPPIST-1 precursor planetesimals. Argues the whole system formed with f_H₂O ≪ 15 wt%, possibly ≲ 1 wt%. Tightens h&#x27;s water mass fraction toward the low end.",
  "li_273":"<b>1909.13859</b> Gonzales 2019 — Reanalysis of TRAPPIST-1 fundamental parameters. Confirms field age (0.5–10 Gyr), consistent with Burgasser &amp; Mamajek 2017&#x27;s 7.6 ± 2.2 Gyr. No cfg change required.",
  "li_274":"<b>2401.11815</b> Gillon 2024 — Comprehensive TRAPPIST-1 system review. Confirms h parameters; <b>corrects insolation from 0.16 to 0.144 ± 0.006 S⊕</b>. Cites Childs 2023 formation modeling: outer five planets &quot;required significant volatile content&quot; while inner two are &quot;nearly totally desiccated&quot; — supports keeping non-trivial water content for h.",
  "li_275":"<b>1702.07004</b> Bourrier 2017a — Lyman-α reconnaissance of TRAPPIST-1. XUV fluxes at h: F_X ≈ 34 erg/s/cm², F_EUV ≈ 12 erg/s/cm², F_Lyα ≈ 13 erg/s/cm². Photoionization lifetime of neutral H at h&#x27;s orbit: ~25 days (longer than h&#x27;s orbital period — relevant to exosphere modeling, not visual).",
  "h3_276":"Read (instrument-only, not visual-informative)",
  "p_277":"(None specific to h.)",

  "p_279":"The h bibliography is moderately sized (53 papers, 43 with arXiv). Most non-arXiv papers are catalog summaries or works that mention h only in passing.",
  "li_280":"<b>&quot;Simulating Hydrospheres of TRAPPIST-1 h in Search of Liquid Water Layer&quot;</b> (no arXiv) — <i>potentially important for the sub-glacial ocean question</i>. <b>Flagged for paste if accessible.</b>",
  "li_281":"<b>&quot;VizieR Online Data Catalog: TRAPPIST-1 h NIR spectrum (Gressier+, 2022)&quot;</b> — data catalog, content already in 2112.05510. Skip.",
  "li_282":"<b>&quot;Characterizing Stellar Activity and Planetary Atmospheres in the TRAPPIST-1 System&quot;</b> (no arXiv) — possibly relevant but skip unless atmosphere decision needs review.",

  "h2_285":"Open items for follow-up",
  "li_286":"The Lincowski 2018 &quot;desiccated habitable h&quot; scenario could be implemented as an alternative cfg variant — a thick CO₂/O₂ atmosphere with a warm (~280 K) bare-rock surface. Visually distinctive: drier, dustier, with hazy yellow-cream skies.",
  "li_287":"The &quot;Simulating Hydrospheres of TRAPPIST-1 h&quot; paper (no arXiv) could refine the sub-glacial ocean cfg if accessible.",
  "li_288":"No JWST follow-up has been published for h as of 2026-05-21; any future emission or transmission spectrum should trigger a Phase 3 revisit.",
  "li_289":"Cfg variant for &quot;Pluto-like full frost&quot; — minimal bedrock exposure, dominantly cream-white surface. Use if a cleaner outer-solar-system analog is desired.",
  "li_290":"The water mass fraction (0.05–0.15) is poorly constrained; could be 0 (rocky-dry analogue) or up to 0.25 (Europa analog). Phase 2 should add more interior-structure measurements.",
  "li_291":"The &quot;desiccated habitable h&quot; alternative scenario (Lincowski 2018) still stands as a cfg variant; the Dong 2018 / Krissansen-Totton 2022 retention-favoring arguments raise its prior somewhat. A 0.1 bar variant might be more realistic than the canonical 0.005 bar.",
  "li_292":"Tidal heating <span class=\"field-tt\" data-ko-tip=\"조석 가열 표면 flux (W/m²). Io ≈ 2.\"><code>tidal_heating_w_m2</code></span> may be underestimated by 1–2 orders of magnitude per Makarov 2018 (~7×10⁻³ W/m² peak vs cfg&#x27;s 0.00001–0.0001). Re-check against more recent Bolmont successors.",
  "li_293":"The Mars-style patchy aurora geometry is a deliberate interesting-first choice. The alternative &quot;uniform faint global glow&quot; is preserved as cfg variant.",
  "li_294":"Surface radiation dose ~4 Sv/yr places h in Kerbalism&#x27;s &quot;moderate&quot; radiation bracket — better than e or f despite the thinner atmosphere, because h&#x27;s distance reduces the stellar particle flux.",

  ko: {
  "p_1":"TRAPPIST-1 h 는 M8V ultra-cool dwarf 를 18.77 일 주기로 도는 0.76 R⊕, 0.33 M⊕ 의 sub-Mars 질량 암석 행성입니다. 7 행성 중 가장 바깥에 있고 지구 insolation 의 0.16 배만 받습니다. K2 mission 데이터를 쓴 Luger 2017 (1703.04166) 이 궤도 주기와 공명 체인 내 위치를 확정했고, Gressier 2022 (2112.05510) 가 최초의 HST WFC3/G141 근적외 transmission 스펙트럼을 얻어 cloud-free 한 수소 풍부 대기를 배제했습니다. JWST 후속 관측은 2026-05-22 기준 아직 출판되지 않았습니다. h 의 흥미로운 반전은 따로 있습니다. Lincowski 2018 (1809.07498) 은 <b>건조된 (desiccated)</b> h 가 10–100 bar 의 O₂ + CO₂ post-runaway 시나리오에서는 maximum-greenhouse 거리 바깥에서도 거주 가능한 표면 온도를 유지할 수 있다고 지적했고, 이 때문에 h 는 시스템에서 가장 반직관적인 거주 가능성 후보가 됩니다.",
  "p_2":"<b>NearStars 시나리오 선택. 풍화된 기반암 위에 patchy 한 CO₂ + N₂ 얼음 서리가 깔린 얼어붙은 sub-Mars 암석 세계, 그리고 후기 outgassing 으로 남은 매우 얇은 (~0.005 bar) 잔여 대기.</b> 저질량 행성이 낮은 insolation 환경에 놓였을 때 휘발성 물질이 대부분 손실되거나 표면에 얼어붙는다고 보는 cosmic-shoreline 문헌(Castan-Lopez 2025, Zahnle 2017) 의 보수적 해석을 따른 것입니다. 대안인 Lincowski 2018 의 &quot;건조된 거주 가능&quot; 시나리오는 cfg 변형으로만 남겨두는데, 따뜻하고 건조한 암석 표면 위 두꺼운 CO₂/O₂ 대기는 시각적으로 덜 구분되기 때문입니다.",

  "td_201":"2566",

  "td_203":"Agol 2021 SED fit",
  "h2_204":"표면 합성",
  "p_205":"TRAPPIST-1 h 는 시스템에서 가장 작은 행성(0.326 M⊕, sub-Mars 질량) 이며 insolation 은 0.16 S⊕ 입니다. 작은 질량, 낮은 중력(0.572 g), 낮은 insolation 의 조합 때문에 h 는 대기 유지에 까다로운 케이스 입니다. cosmic shoreline 문헌(Castan-Lopez 2025 — 2504.19872 — , Zahnle 2017) 은 h 를 수소 함유는 물론 질소 함유 대기에 대해서도 경험적 유지 임계값 근처 또는 그 아래에 놓고 있습니다. 일부 휘발성 유지는 그럴듯한데, CO₂ 정도면 h 의 온도에서 Jeans 탈출을 견딜 만큼 분자량이 충분히 크지만, 대기 질량 자체는 작을 가능성이 높습니다.",
  "p_206":"저질량임에도 h 의 bulk 밀도(Agol 2021 의 4.20 g/cc) 는 비자명한 물 질량 분율(~5–15%) 을 함의할 만큼 낮습니다. f, g 와 비슷한 양상이지만 이쪽은 활용 가능한 전체 질량이 훨씬 적습니다. 이 물의 대부분은 표면 얼음 형태(CO₂ + H₂O 얼음) 이거나 작은 암석 코어 위 얇은 sub-glacial 층으로 격리되어 있을 가능성이 큽니다.",
  "p_207":"Lincowski 2018 (1809.07498) 의 &quot;건조된 h&quot; 시나리오 — 두꺼운(10–100 bar) CO₂/O₂ post-runaway 대기가 거주 가능한 표면 온도를 만드는 경우 — 는 cfg 변형으로 남겨두지만 정규 선택은 아닙니다. h 의 탈출 속도에 서 post-runaway 대기 유지 시간 척도가 짧고(≲ 1 Gyr), 7.6 Gyr 의 시스템 나이 동안 초기 두꺼운 대기는 대부분 손실되었을 것이기 때문 입니다.",
  "p_208":"표면 형태는 Mars-Pluto 하이브리드 analog 를 채택합니다.",
  "li_209":"<b>Substellar 영역</b> (substellar 에서 ~0–60°). 기반암이 지배하며, Mars 의 남부 고원과 유사한 풍화된 철-풍부 표면. 그늘진 분화구 내부에는 일부 patchy 한 CO₂ 서리.",
  "li_210":"<b>Mid-zone</b> (60–120°). substellar 로부터 멀어질수록 서리 덮개가 증가.",
  "li_211":"<b>Terminator</b> (~90°). 서리-기반암 대비가 크고, 비스듬히 들어오는 2566 K 빛 아래로 긴 지형 그림자가 깔림.",
  "li_212":"<b>Nightside</b> (&gt;120°). 주로 ~60 K 의 CO₂ + N₂ 서리 덮개, 능선 꼭대기에 가끔 어두운 기반암 patch.",
  "p_213":"<b>색 선택 — H₂O 얼음 지배.</b> Turbet 2017 은 h 의 대기가 저압에서 미량 CO₂ 에 의해 지배된다 해도 표면 서리 조성은 <b>주로 H₂O 얼음</b> 이라는 점을 보입니다(이전에 가정한 CO₂/N₂ 서리가 아닙니다). CO₂ 얼음 퇴적은 일시적으로 형성되지만 중력적으로 불안정해서 지질학적 시간 척도에서 H₂O 얼음 껍질 아래로 매장됩니다. 가시 표면은 따라서 M-dwarf 조명 아래의 깨끗한 H₂O 얼음에서 오는 크림-화이트(<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) 가 되고, 풍화된 철-풍부 기반암 패치(<span class=\"hex-chip\" style=\"background:#3a2c20\"></span><code>#3a2c20</code>) 는 얼음이 승화된 국소 substellar 영역에서만 노출됩니다. Mars-Pluto 하이브리드 프레임 은 반전됩니다. 전역적으로는 크림-화이트가 지배적이고, 어두운 기반암 이 표면의 주된 색조가 아니라 보조 accent 가 됩니다.",
  "p_214":"<b>내부 구조.</b> Barr 2018 (1712.05641) 은 h 가 1030 km 의 암석 코어 (평균 밀도 케이스) 를 갖는다고 봅니다. 최대 밀도 구성이면 암석 위로 H₂O 껍질이 ~100 km 만 허용됩니다. 현재 cfg 의 WMF 0.03–0.10 은 이 두 극단 사이에 위치합니다. h 의 CMF 는 시스템에서 낮은 쪽(~0.23) 으로, 상대적으로 철이 적은 암석체와 일관됩니다.",
  "p_215":"<b>Mars 형 patchy 오로라 지오메트리.</b> 조직된 전역 다이나모가 없는 상태(7.6 Gyr 동안 얼어붙은 sub-Mars 코어) 에서 h 의 자기장은 국소적 패치 형태의 <b>지각 잔류 자기장</b> 이 지배합니다. Mars 의 상황과 그대로 대응됩니다(Acuña 1999 의 MAG/ER 발견). 얇은 N₂ 대기와 합쳐지면 지구 나 g 에서 보이는 규칙적인 auroral oval 대신 <i>patchy</i> 한 오로라 지오메트리가 만들어집니다. 각각의 지각 자기 이상이 stellar-wind 입자 를 자기장이 강한 지역 위로 깔때기처럼 끌어들여 그 위에 국소 오로라 스폿을 만들고, 결과적으로 N₂ Vegard-Kaplan green + N₂⁺ violet 가 산발적으로 흩어져 빛납니다. 어디서 어떻게 켜질지는 사실상 무작위로, 지각 자화가 살아남은 자리마다 한 점씩 떠오릅니다. 내행성들의 조직된 auroral band 와는 시각적 인상이 완전히 다릅니다. cfg 에서는 이걸 <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> green 과 <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet 가 저-중위도 자기 위도대에 흩어진 점들로 렌더링합니다. 극지방에 몰린 균일한 띠가 아닙니다. interesting-first tie-break 에서 대안인 &quot;균일하고 흐릿한 전역 glow&quot; 대신 이 Mars 형 렌더링을 선택했습니다.",
  "p_216":"<b>기반암 / 산화철.</b> g, f 와 비교해 h 에서 더 두드러집니다. 노출된 substellar 기반암이 7.6 Gyr 동안 직접 stellar UV 아래에서 광분해 산화를 받아온 결과입니다. primary tint 가 이미 이를 반영하고 있으며, 충돌 분화구 가장자리 부근의 밝은 산화철 패치는 fine-grained PQS 디테일로 좋습니다.",
  "p_217":"<b>조석 lock 아래의 모폴로지.</b> resurfacing 이 거의 없습니다. h 의 조석 가열은 무시할 만하고(Bolmont 2020), induction heating 도 최소이며(Grayver 2022 거리 스케일링), 방사성 열은 화산 활동을 일으키기에 너무 낮습니다(작은 질량). 표면은 시스템 나이 7.6 Gyr 의 충돌 기록을 거의 그대로 보존하며, locked frame 의 leading 반구 쪽 으로 편향됩니다.",
  "h2_218":"대기 합성",
  "p_219":"Gressier 2022 (2112.05510) 가 h 의 첫 HST WFC3/G141 transmission 스펙트럼을 제시했고, 이는 현재까지 h 의 유일한 출판된 대기 관측 입니다. 데이터는 대기 없음 또는 flat-spectrum 이차 대기와 일관 하며, cloud-free 한 수소 풍부 대기는 배제됩니다.",
  "p_220":"이론 모델링은 다음과 같습니다.",
  "li_221":"<b>Lincowski 2018.</b> h 에 대해 건조된 post-runaway 10–100 bar CO₂/O₂ 대기를 검토하고 일부 케이스에서 거주 가능한 표면 온도가 나오는 것을 확인했습니다. 다만 h 의 탈출 속도에서 7.6 Gyr 동안 그렇게 두꺼운 대기를 유지할 확률은 낮습니다.",
  "li_222":"<b>Bourgeois 2024.</b> magma ocean 진화가 초기에 ~1 bar (CO₂ + H₂O) 의 outgassed 대기를 만들지만, 대부분 시간이 지나면서 손실됩니다.",
  "li_223":"<b>Castan-Lopez 2025.</b> cosmic shoreline 분석은 h 가 전형적 이차 대기 유지 임계값 근처 또는 그 아래에 있다고 시사합니다.",
  "p_224":"NearStars 는 <b>0.005 bar (Mars-thin) 의 N₂ 지배 + 미량 CO₂ 대기</b> 를 채택합니다.",
  "li_225":"<b>압력</b> 0.005 bar (500 Pa). Mars 와 비슷한 수준입니다. 0.3 M⊕ 행성에도 일부 outgassing 은 축적되므로 0 보다는 위에 있어야 하고, cosmic-shoreline / Jeans 탈출 제약상 h 가 이보다 많이는 유지하지 못한다는 점에서 0.01 bar 아래여야 합니다.",
  "li_226":"<b>조성</b> N₂ 지배(~90%) + 미량 CO₂ (10–100 ppm 으로, 1000 이 아닙 니다). 근거는 Bolmont 2018 review 의 cold-trap 논거에 더해 Turbet 2017 의 구체적인 계산입니다. h 의 pure-CO₂ 평형은 145 K 에서 4 mbar 에 불과하고, N₂ 배경 시나리오에서는 기체상에 &quot;수십 ppm 수준&quot; 의 CO₂ 만 남습니다. 나머지 ~10% 는 Ar, 서리 순환의 H₂O 증기, 화석 O₂ 사이에서 분배됩니다.",
  "li_227":"<b>구름.</b> 최소 (~2% 전역). 드문 CO₂ 얼음 권운 정도.",
  "p_228":"<b>ion escape 논거에 의해 대기 유지가 오히려 유리.</b> cosmic-shoreline 임계값 프레이밍에도 불구하고 Dong 2018 (1705.05535) 은 h 가 시스템 에서 가장 낮은 ion escape rate (1.29×10²⁶ s⁻¹) 와 가장 높은 대기 유지 시간 척도(~10¹⁰ yr) 를 갖는다고 봅니다. &quot;h 는 대기 ion 손실의 관점에서 가장 안정적인 행성이어야 한다&quot; 는 결론입니다. h 위치에서의 stellar wind dynamic pressure 는 지구의 &quot;단지&quot; 100–300 배인데, b 에 서는 10³–10⁴ 배입니다. Krissansen-Totton 2022 (2207.04164) 도 마찬 가지로 외행성들은 &quot;사실상 모든 모델 시뮬레이션에서 상당한 표면 휘발 성 물질을 유지&quot; 하며 &quot;상당한 대기를 유지하는 모든 행성에서 CO₂ 지배 또는 CO₂-O₂ 대기&quot; 가 된다고 결론짓습니다. cfg 의 얇은 N₂ + 미량 CO₂ 선택은 이에 비해 보수적이며, 더 두꺼운(~0.1 bar) 대기도 충분히 방어 가능합니다.",
  "p_229":"<b>오로라 화학.</b> N₂ 가 지배하는 얇은 대기(CO₂ ≲ 100 ppm) 는 깨끗한 질소 오로라 화학을 만듭니다. N₂ Vegard-Kaplan bands 가 200–300 nm UV 에서 빛나고 일부는 가시광 cyan-violet 쪽으로 산란되며, N₂⁺ 의 391.4 nm First Negative 가 blue, 그리고 Lyman-Birge-Hopfield bands 가 따라옵니다. photolysis 로 미량 O₂ 가 있다면 [OI] 557.7 nm green 도 더해집니다. 위에서 본 지각 이상 지오메트리 때문에 이 방출들은 연속된 띠가 아니라 작은 스폿에 집중됩니다. 강도 ~30 kR 은 매우 얇은 대기 탓에 시스템에서 가장 낮지만, 침투 입자가 얇은 대기 깊숙이까지 들어가기 때문에 개별 스폿의 단위 면적당 밝기는 오히려 높습니다. cfg 렌더링용으로 정리하면, 조직된 극지 지오메트리 없이 흐릿한 green/violet 패치가 흩뿌려진 모습입니다.",
  "p_230":"<b>하늘 외관.</b> 0.005 bar 대기는 궤도에서는 사실상 보이지 않습니다. 표면에서는 호스트 별(1.03° 각 크기의 적-오렌지 디스크) 을 빼면 하늘 이 검습니다. 0.16 S⊕ 의 표면 조명은 근일점 외곽의 Mars 와 비슷한 수준입니다.",
  "h2_231":"자전 &amp; spin 합성",
  "p_232":"18.77 일 주기에서 7.6 Gyr 동안 조석 damping 이 진행되면 동기(1:1) 구성에 도달하고, 황도 경사각은 0 으로 damping 됩니다. 이심률 0.00567 은 1:1 우세 영역입니다.",
  "p_233":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 18.7729 일 (1 621 977 s).",
  "p_234":"<b>계절 없음.</b> 황도 경사각 = 0 이고, libration 으로 인한 insolation 변동도 &lt; 0.5% 입니다.",
  "p_235":"<b>공명 체인 동역학.</b> Luger 2017 (1703.04166) 이 7 행성 Laplace 공명 체인 안에서 h 의 위치를 확립했습니다(g 와 8:5 평균 운동 공명). 체인 은 궤도 요소에 지속적인 small-amplitude 섭동을 주지만, 시각적/cfg 목적상 구성은 안정적입니다.",
  "p_236":"<b>자기 다이나모 예상.</b> h 의 작은 질량(0.33 M⊕, sub-Mars), 진전된 나이(7.6 Gyr), 그리고 매우 느린 조석 고정 자전(18.8 d) 이 합쳐지면 지속 가능한 전역 다이나모는 사실상 불가능합니다. 2208.06523 (Thermal Evolution and Magnetic History of Rocky Planets) 은 ~0.5 M⊕ 이하의 천체가 보통 1–2 Gyr 안에 다이나모를 꺼버린다고 보는데, h 는 이 시간 척도를 한참 지나 있습니다. 남은 자기 구조는 지각 잔류 — h 가 더 젊고 다이나모가 있었을 때 화석화된 자화 — 이며, 수십억 년의 충돌 가드닝과 열적 변형 끝에 패치들로 흩어진 상태 입니다. 이는 오늘의 Mars 그대로입니다. ~1 μT 의 지각 패치만 있고 전역 dipole 은 없는 상황. 따라서 오로라는 조직된 극지 oval 이 아닌 자화된 지형 위의 국소 스폿에서 발생합니다. RM22 (2203.01065) 의 스케일링이 돌려주는 dipole moment 는 지구의 ~0.005 배로, 활동성 다이나모라기보다 잔류 시그니처에 가깝습니다.",
  "p_237":"<b>조석 가열 노트.</b> Makarov 2018 은 h 의 3:2 spin-orbit 포획 확률을 0.017(사실상 0) 로 계산했고 1:1 lock 이 확인되었습니다. 조석 소산 peak 는 Maxwell time ~0.20 d (궤도 주기에 가까움) 에 있어 총 5.3×10¹³ W, 정규화하면 ~7×10⁻³ W/m² 입니다. 이는 현재 cfg 값 0.00001–0.0001 W/m² 보다 1–2 자릿수 더 크므로 실제 flux 를 과소평가하고 있을 수 있습니다.",
  "h2_238":"비주얼 스타일",
  "li_239":"<b>전역 외관.</b> 어두운 적갈색의 암석 세계(<span class=\"hex-chip\" style=\"background:#3a2c20\"></span><code>#3a2c20</code>) 에 patchy 한 크림-화이트 서리(<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) 가 깔리고, terminator 와 nightside 쪽으로 갈수록 서리 비중이 커집니다. 시각적으로는 Mars(적갈색 암석) 와 좀 더 작은 Pluto(서리 지배) 사이 어딘가입니다.",
  "li_240":"<b>Substellar 영역.</b> 대부분 기반암이고 풍화된 산화철 갈색입니다. cfg PQS 해상도에서 충돌 분화구가 보이며, 그늘진 분화구 내부에는 일부 서리가 남아 있습니다.",
  "li_241":"<b>Mid-zone.</b> 기반암과 서리가 섞입니다. 크림 서리 위에 어두운 갈색이 노출되는 fractal 패턴으로, KSP 저공 비행에 사진발이 좋은 영역입니다.",
  "li_242":"<b>Terminator.</b> 비스듬한 2566 K 빛 아래로 대비가 크고, 지형 그림자 가 cratering 과 가능한 tectonic feature 를 드러냅니다. 서리-기반암 경계가 가장 선명한 곳입니다.",
  "li_243":"<b>Nightside.</b> 크림-화이트 서리 덮개(<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) 위로 능선 꼭대기에 어두운 기반암 patch 가 노출됩니다. KSP nightside ambient ≈ dayside 의 1%.",
  "li_244":"<b>Atmosphere haze.</b> 인지 불가. 0.005 bar 대기는 보일 만한 Rayleigh scattering 을 만들지 않고 limb 가 선명합니다.",
  "li_245":"<b>Mars 형 patchy 오로라.</b> <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> green 과 <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet 의 스폿들이 저-중위도 자기 위도대에 흩어집니다. 극지방이 아니라 자화 된 지각 위에 집중됩니다. 강도 ~30 kR 로 어두운 nightside 에서만 보이고, 이 점박이 패턴이 h 의 얼어붙은 코어 + 지각-이상-전용 자기 환경을 그대로 비춰주는 시각 시그니처입니다.",
  "li_246":"<b>하늘의 별.</b> TRAPPIST-1 이 h 의 하늘에서 1.03° 를 차지하므로 지구에서 본 태양의 2 배 크기입니다. 표면 조명은 0.144 S⊕ 로 지구 의 이른 아침 황혼 수준입니다. 적-오렌지 별이 ochre-and-cream 표면 과 대비를 이루어, 실제로는 대기가 거의 없음에도 h 는 특히 분위기 있는 외관을 갖습니다.",
  "li_247":"<b>하늘의 자매 행성.</b> 안쪽으로 한 단계 가까운 g 가 inner conjunction 에서 각 크기 ~0.3°. h 의 긴 주기 때문에 conjunction 자체는 내행성보다 드물게 일어납니다.",
  "h2_248":"참고 문헌",
  "h3_249":"읽음 (시각 정보 제공, 위 결정 견인)",
  "li_250":"<b>1703.04166</b> Luger 2017 — K2 를 통한 h 의 궤도 주기 발견 / 확인. 공명 체인의 일곱 번째 행성으로 h 를 확립. 궤도 파라미터의 출처.",
  "li_251":"<b>2112.05510</b> Gressier 2022 — h 의 HST WFC3/G141 transmission 스펙트럼. cloud-free H₂-rich 대기를 배제. 현재까지 h 에 대한 유일한 직접 대기 관측.",
  "li_252":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계들의 진화된 기후. h 는 snowball 과 &quot;건조된 거주 가능&quot; 이상치 양쪽으로 논의됩니다. 정규-대-변형 시나리오 분기를 견인했고, d/e/f/g 단계에서 이미 읽음.",
  "li_253":"<b>2510.12794</b> Pearce 2025 — Born Dry or Born Wet? Compact multiplanet volatile accretion. 충돌 + 탈출 진화 아래에서 h 의 물 예산을 다룹니다.",
  "li_254":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. h 를 유지 임계값 근처에 놓아 얇은 대기 cfg 선택을 지지.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
