  "h2_121":"Surface synthesis",
  "p_122":"The photosphere of HD 69830 sits at the G–K boundary — Houk &amp; Smith-Moore 1988 catalogue it as G8V, while modern Teff scales (Casagrande 2010 IRFM, Tanner 2019 high-resolution spectroscopy) place it on the cool edge of the G8V locus or the warm edge of K0V depending on the calibration; the DB records it as K0 V (Gray et al. 2006). Effective temperature 5394 ± 62 K is roughly 380 K cooler than Sol, with a 0.906 R☉ envelope giving 0.622 L☉ bolometric luminosity. The mild metal deficit ([Fe/H] = −0.04) is a marginal departure from solar — within the disk-population kinematic distribution and inconsequential for opacity at this Teff.",
  "p_123":"The star DOES have a direct interferometric angular diameter: Tanner 2015 resolved it with the CHARA Array (θ_LD = 0.674 ± 0.014 mas), yielding R = 0.9058 ± 0.019 R☉, Teff = 5394 ± 62 K, and L = 0.622 ± 0.014 L☉ — the anchor for the whole stellar layer (Boyajian 2012&#x27;s sample did not include HD 69830, but Tanner&#x27;s dedicated CHARA campaign did). The cfg <code>limb_darkening_alpha_h</code> is a 1D-atmosphere power-law estimate at α(H) ≈ 0.16 (Tanner separately fit a linear LD μ = 0.352 for the visibilities), slightly stronger than Sol&#x27;s 0.14 at the cooler photosphere, consistent with the Claret–Bloemen 2011 grid for log g ≈ 4.5, [Fe/H] = 0, Teff ≈ 5400 K. Granulation patterns are expected to be Sun-like but ~5–10% smaller in linear scale per the STAGGER grid scaling (Magic 2013): cells ~1000 km wide instead of Sol&#x27;s ~1300 km, with slightly longer lifetimes from the cooler convective overturn.",
  "p_124":"Spot coverage is modest. log R&#x27;HK = −5.0 places HD 69830 a tick quieter than the modern Sun and squarely in the inactive G-dwarf locus; Lovis 2006 §4 explicitly notes that the RV stability across the 4-year HARPS baseline used to detect the three Neptune-mass planets is consistent with a star at activity minimum throughout the campaign. Any cycle, if present, is below the Lovis 2006 detection sensitivity (~5 m/s amplitude). The cfg adopts a quiet-Sun spot envelope (~0.1% of disk at notional cycle maximum, ~10× lower than Sol&#x27;s solar-maximum coverage) and renders no active-region structure.",
  "p_125":"The slightly metal-poor SED reddens the bolometric continuum toward the blue by ~5 K equivalent versus a +0.0 dex reference, imperceptible in the rendered hex; the dominant visible color shift from Sol comes purely from the 390 K Teff deficit. The visual cream tint <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code> interpolates between Sol&#x27;s <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> and α Cen B&#x27;s <span class=\"hex-chip\" style=\"background:#ffcfa0\"></span><code>#ffcfa0</code> — about 2/3 of the way from Sol to B in both the red-green and red-blue color differences.",
  "h2_126":"Atmosphere synthesis",
  "p_127":"HD 69830 hosts a quiet K0 V chromosphere–transition-region–corona structure typical of an old quiet late-G/early-K dwarf. The Ca II H&amp;K chromospheric index log R&#x27;HK = −4.999 (Gomes da Silva 2021 AMBRE-HARPS, 711 spectra) places it in the lower decile of nearby G-dwarf activity. No long-baseline activity cycle has been published — neither the Mt Wilson survey nor the HARPS RV campaign saw a cycle period at &gt;5 m/s amplitude — but for an old quiet G8V a Sun-like 10–15 year cycle is the prior expectation, just below detection. The cfg does not animate a cycle.",
  "p_128":"No published X-ray detection. Schmitt 2004&#x27;s ROSAT all-sky survey catalogue does not list HD 69830 above the 5 × 10²⁶ erg/s sensitivity floor at 12.6 pc, implying log L_X &lt; 27.0 cgs. Chandra and XMM-Newton did not target it; the most recent eROSITA catalogue (Merloni 2024) places HD 69830 at log L_X ≈ 26.7 (0.2–2 keV; tentative low-S/N detection). The cfg adopts a log L_X range 26.5–27.0 spanning Sun-quiet to Sun-cycle-max analog levels — a tie-break in the absence of a measured cycle amplitude.",
  "p_129":"Transition-region UV lines are not directly monitored; an old G8V with log R&#x27;HK = −5.0 produces a Lyman-α continuum + Lyα line roughly 50% of Sol&#x27;s at the same heliocentric distance scaling. Integrated XUV luminosity stays below 10⁻⁴ L_bol, far too feeble to materially erode an Earth-equivalent atmosphere over Gyr timescales at the star&#x27;s habitable zone (~0.7 AU for HD 69830). For the three Neptune-mass planets b/c/d the picture is different — but those follow in their respective Phase 3 syntheses.",
  "p_130":"The corona/chromosphere visual extent is rendered at the quiet-Sun reference — a thin chromospheric layer at ~1.005 R★ and a faint corona extending to ~3 R★ visible only during the in-game &quot;corona-on&quot; rendering mode.",
  "h2_131":"Rotation &amp; spin synthesis",
  "p_132":"HD 69830 has NO measured photometric rotation period — the star is too quiet for spot modulation at HARPS or MOST precision. The only direct rotation constraint in the frozen Phase 2 layer is the projected rotational velocity v sin i = 0.8 ± 0.5 km/s (Tanner 2015 SME); the CHES compilation (Bao 2024) lists an empirical-relation estimate of ~41.7 d, but no period is recorded as a measurement. A slow rotation (tens of days) is expected for an old, inactive late-G/early-K dwarf, consistent with the ~6–10 Gyr age, but the cfg does not assert a specific period.",
  "p_133":"No asteroseismic detection — HD 69830 is below the asteroseismic detection threshold of CHEOPS and TESS short-cadence observations, and the predicted ν_max ≈ 3000 μHz with Δν ≈ 130 μHz peaks too high in frequency for the survey cadences deployed to date. The cfg adopts no oscillation-driven brightness modulation.",
  "p_134":"Differential rotation is expected Sun-like with the equator rotating ~20% faster than the poles, but unmeasured. The rotation axis inclination is unconstrained — a randomly oriented axis is adopted for visual rendering, tilted ~30° to the inferred mean orbital plane of the b/c/d planet system.",
  "p_135":"In KSP units, with no measured period the cfg leaves the stellar <code>rotationPeriod</code> to a slow default (a notional ~30+ d) — informational only (Kopernicus does not animate stellar rotation directly, but the cfg <code>rotationPeriod</code> field is read by Principia for spin-axis precession bookkeeping).",
  "h2_136":"Visual styling",
  "li_137":"<b>Orbit view (system-overview render).</b> A warm yellow-cream point against the warm-amber dust glow at ~1 AU, with three blue-green Neptune-mass planets visible at b ≈ 0.08 AU (innermost, lost in the stellar glare), c ≈ 0.19 AU (well inside the dust ring&#x27;s inner edge), and d ≈ 0.63 AU (just interior to the dust ring&#x27;s inner shoulder at ~0.9 AU, with d&#x27;s 2:1 and 5:2 outer MMRs landing inside the belt).",
  "li_138":"<b>Stellar disk (close-up).</b> Quiet G8V with the textbook H-band power-law limb darkening; granulation cells slightly smaller than Sol&#x27;s, slightly longer-lived; no active regions visible except as a faint cycle-averaged spot brightness modulation (~0.1% peak-to-peak) at the cfg&#x27;s notional cycle maximum.",
  "li_139":"<b>Stellar color.</b> Cream-yellow <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>, distinguishable from both the strict-solar <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> and α Cen B&#x27;s stronger <span class=\"hex-chip\" style=\"background:#ffcfa0\"></span><code>#ffcfa0</code> orange — HD 69830 is the &quot;Sol&#x27;s slightly redder cousin&quot; entry in the NS catalog.",
  "li_140":"<b>Warm dust ring.</b> This is the <i>defining</i> visual feature. The cfg renders a narrow <span class=\"hex-chip\" style=\"background:#d4a060\"></span><code>#d4a060</code> warm amber belt from 0.8 to 1.5 AU with alpha 0.25 — substantially exaggerated above the true L_IR/L_★ = 2 × 10⁻⁴ (which would be invisible) to give the player something to look at. The ring is sub-micron olivine, predominantly scattering G8V starlight with a mild forward-scattering anisotropy (g ≈ 0.7) that brightens the morning/evening crescent as viewed from a hypothetical b/c/d planet. Document the dust amplification as a tie-break.",
  "li_141":"<b>Catastrophic-event hypothesis cfg variant.</b> Per Lisse 2007, if the olivine grain population is post-collisional debris from a dwarf-planet disruption ~ 1 Myr ago, a bright transient asymmetric feature (&quot;fresh debris cloud&quot;) could be modeled at a fixed orbital longitude with a brighter alpha (~0.5) and a ~10⁵ year decay timescale. The cfg ships the steady-state symmetric belt as the default and the catastrophic-debris asymmetric variant as a cfg alternative — both within the observation window.",
  "li_142":"<b>Three Neptune-mass planets in sky.</b> Planet b at 0.08 AU shows a 0.04° apparent diameter from c (0.19 AU); planet d at 0.63 AU shows a similar 0.01° from c. From a hypothetical observer at b/c/d, the dust ring fills the orbital plane as a faint amber band — comparable to a moderately bright zodiacal light viewed from Earth, but at the dust belt&#x27;s actual geometry. Planet-specific renders deferred to the b/c/d Phase 3 syntheses.",
  "li_143":"<b>Star in sky from Earth.</b> V = 5.95 places HD 69830 at the naked-eye threshold; in dark-sky conditions it is just visible in Puppis. From the in-game observer perspective at the KSC reference frame it appears as one of many 5-6th magnitude field stars, indistinguishable from the catalog ~background except through the in-game telescope view that resolves the amber dust ring.",
  "h2_144":"Canonical alternatives",
  "p_145":"<b>Stellar age — isochrone vs activity.</b> The cfg adopts the Tanner 2015 SME-isochrone age of 7.5 ± 3 Gyr. The documented alternatives are Tanner&#x27;s own HRD-isochrone value 10.6 ± 4 Gyr and the Mamajek &amp; Hillenbrand 2008 activity/gyrochronology age 5.7–6.1 Gyr. All three overlap at ~6–10 Gyr and unanimously rule out the young (~0.6–2 Gyr, Song 2000) ages — which matters because an old age means the warm asteroid belt cannot be primordial and must be replenished (Beichman 2005). The 7.5 Gyr SME value is preferred as the tightest of Tanner&#x27;s two determinations.",
  "p_146":"The disk origin scenario also has two literature-supported readings. Both are observation-consistent; the cfg picks the more visually distinctive one as default.",
  "h3_147":"Diverged cfg picks",
  "th_148":"Field",
  "th_149":"Gameplay (in cfg)",

  "th_151":"Why diverged",
  "td_152":"<code>disk_opacity</code>",
  "td_153":"0.25 (renderer-amplified for visibility)",
  "td_154":"≈ 10⁻³ (true L_IR/L_★ = 2 × 10⁻⁴ → invisible)",
  "td_155":"Beichman 2005&#x27;s measured fractional luminosity would render an invisible belt. cfg amplifies opacity ~250× so the dust ring is the defining visual feature it deserves to be — preserving the science narrative (&quot;warm dust at 1 AU&quot;) at the cost of photometric accuracy. Open items lists the photometrically-accurate variant.",
  "td_156":"<code>disk_morphology</code> (default vs variant)",
  "td_157":"Steady-state symmetric narrow belt (default cfg) + catastrophic-debris asymmetric variant (alternate cfg)",
  "td_158":"Steady-state is implausible per Wyatt 2007&#x27;s collisional-cascade limit; Lisse 2007 favors catastrophic-event origin",
  "td_159":"Both are within the observation window. The cfg ships the steady-state belt as default because it&#x27;s the simpler and the more visually stable rendering; the Lisse 2007 catastrophic variant ships as an alternate cfg with a brighter asymmetric transient because the post-collisional interpretation is more interesting for KSP players who notice the asymmetry. The Phase 2 disk_measurements ingest will revisit this when JWST/MIRI or SPHERE imaging publishes a resolved geometry.",
  "h2_160":"Bibliography",
  "h3_161":"Read (visual-informative, drove decisions above)",
  "li_162":"<b>Tanner A. et al. 2015</b> — <i>Stellar Parameters for HD 69830, a Nearby Star with Three Neptune-Mass Planets and an Asteroid Belt</i>, ApJ 800, 115 (<code>2015ApJ...800..115T</code>, arXiv:1412.5251). Dedicated stellar-parameters paper: CHARA interferometry θ_LD 0.674 ± 0.014 mas → R 0.9058 ± 0.019 R☉; Teff 5394 ± 62 K (θ_LD + F_bol; SME 5385 ± 44); L 0.622 ± 0.014 L☉; Y² mass 0.863 ± 0.043 M☉; [Fe/H] −0.04 ± 0.03; v sin i 0.8 ± 0.5 km/s; SME-isochrone age 7.5 ± 3 (HRD 10.6 ± 4). <b>Phase 2 anchor for the entire stellar layer.</b>",
  "li_163":"<b>Gomes da Silva J. et al. 2021</b> — <i>Stellar chromospheric activity of the AMBRE-HARPS sample</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, arXiv:2012.10199). log R&#x27;HK = −4.999 from 711 spectra. Phase 2 recommended activity index.",
  "li_164":"<b>Beichman C. A. et al. 2005</b> — <i>An Excess Due to Small Grains around the Nearby K0 V Star HD 69830: Asteroid or Cometary Debris?</i>, ApJ 626, 1061 (<code>2005ApJ...626.1061B</code>, arXiv:astro-ph/0504491). Spitzer/IRS 8–35 μm spectrum + MIPS 24/70 μm photometry of HD 69830; identifies the warm dust at ~1 AU with strong 9.7 / 11.3 / 23 μm silicate features; fractional luminosity L_IR/L_★ = 2 × 10⁻⁴; no cold (70 μm) excess. <b>The anchor paper for every disk Decisions row.</b>",
  "li_165":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). HARPS RV detection of HD 69830 b (8.67 d / 10.2 M⊕ sin i), c (31.56 d / 11.8 M⊕ sin i), d (197 d / 18.1 M⊕ sin i); §4 confirms stellar activity is below the RV jitter floor across the 4-year campaign baseline.",
  "li_166":"<b>Lisse C. M. et al. 2007</b> — <i>On the Nature of the Dust in the Debris Disk around HD 69830</i>, ApJ 658, 584 (<code>2007ApJ...658..584L</code>, arXiv:astro-ph/0611452). SED-fit grain composition model — sub-μm crystalline olivine dominant, consistent with thermally processed silicates from a parent body interior to the snow line. Interprets the population as fresh debris from a recent (≲ 1 Myr) catastrophic disruption of a dwarf-planet-class body. Identifies d&#x27;s 2:1 and 5:2 outer mean-motion resonances at 1.00 / 1.16 AU as the dynamical sculptor of the belt&#x27;s inner edge.",
  "li_167":"<b>Smith R., Wyatt M. C. &amp; Haniff C. A. 2009</b> — <i>The nature of mid-infrared excesses from hot dust around Sun-like stars</i>, A&amp;A 503, 265 (<code>2009A&amp;A...503..265S</code>, doi:10.1051/0004-6361/200912330). MIDI/VLTI mid-IR interferometry + refined SED fit places the warm belt at 0.92–1.16 AU with a 2.4 AU interferometric upper limit on disc size. Refines Beichman 2005&#x27;s BB-radius range; confirms d (a = 0.63 AU) is interior to the belt&#x27;s inner shoulder.",
  "li_168":"<b>Wyatt M. C. et al. 2007</b> — <i>Steady State Evolution of Debris Disks around A Stars</i>, ApJ 663, 365 (<code>2007ApJ...663..365W</code>, arXiv:astro-ph/0703608). Defines the steady-state collisional cascade L_IR/L_★ limit at a given age and parent-body mass; applied to HD 69830 in Wyatt 2007b shows the observed dust luminosity exceeds the steady-state limit by ~10×, requiring either a recent stochastic event (Lisse 2007) or an exceptionally massive parent reservoir.",
  "li_169":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Activity/gyrochronology age 5.7–6.1 Gyr — the documented-divergence alternative to the Tanner 2015 isochrone age (Canonical alternatives). (Its 34 d period was a gyrochronological inference, not a measured period, and is no longer carried.)",
  "li_170":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey. I. A Catalog of 178 Planets from Precision Radial Velocity Monitoring of 719 Nearby Stars over Three Decades</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>, arXiv:2105.11583). Source of the formerly-adopted isochrone radius 0.887 R☉ — superseded by the Tanner 2015 CHARA interferometric R 0.9058.",
  "h3_171":"Read (context / methodology, not directly decision-driving)",
  "li_172":"<b>Tanner A. et al. 2019</b> — <i>Stellar Parameters and the Habitable Zone of HD 69830</i>, ApJ 873, 91 (<code>2019ApJ...873...91T</code>, arXiv:1812.08964). Independent high- resolution spectroscopic determination of Teff, log g, [Fe/H], L; agrees within errors with Beichman 2005 and Lovis 2006; provides the HZ geometry for downstream Phase 3 work on the Neptune-mass planets.",
  "li_173":"<b>Henry T. J. et al. 1996</b> — <i>The Solar Neighborhood. IV. A Mt. Wilson Ca II H&amp;K Survey</i> (<code>1996AJ....111..439H</code>). Establishes log R&#x27;HK = −5.0 quiescent baseline for HD 69830.",
  "li_174":"<b>Casagrande L. et al. 2010</b> — <i>Stellar Effective Temperatures from the IRFM</i> (<code>2010A&amp;A...512A..54C</code>). Provides the IRFM-based Teff scale consistent with Beichman 2005 spectroscopy.",
  "li_175":"<b>Schneider G. et al. 2014</b> — <i>HST/NICMOS Imaging Search for Cold Debris Disks around Nearby Stars</i> (<code>2014AJ....148...59S</code>). HD 69830 included in non-detection sample; confirms absence of resolved cold (Kuiper-analog) belt.",
  "h3_176":"Read (instrument / non-cfg-decisive)",
  "li_177":"<b>Smith P. S. et al. 2009</b> — Spitzer/IRS rotational mid-IR spectrum of HD 69830 (<code>2009ApJ...704..150S</code>). Independent re-analysis of the IRS spectrum supports Beichman 2005&#x27;s olivine-rich composition.",
  "li_178":"<b>Merloni A. et al. 2024</b> — <i>The first SRG/eROSITA All-Sky Survey: Main Catalogue</i> (<code>2024A&amp;A...682A..34M</code>, arXiv:2401.17274). Tentative low-S/N X-ray detection at log L_X ≈ 26.7; consistent with the cfg&#x27;s range minimum.",
  "li_179":"<b>Schmitt J. H. M. M. et al. 2004</b> — ROSAT all-sky bright source catalog upper limit at log L_X &lt; 27.0 for HD 69830.",
  "h3_180":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "li_181":"Conference proceedings on HD 69830 b/c/d dynamical stability (Ji 2007, Payne 2009, etc.) — relevant to the deferred planet-level Phase 3 follow-up, not to the stellar synthesis.",
  "li_182":"General K-dwarf calibration papers (e.g. Mann 2015) — broader context, not HD 69830-specific.",
  "li_183":"The full filtered bib is preserved in <code>docs/phase3/_bib/hd-69830.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_184":"Open items for follow-up",
  "li_185":"<b>Phase 2 <code>disk_measurements</code> ingest.</b> The DB <code>db/systems/hd_69830.json</code> does not yet have a <code>disk_measurements</code> block; Beichman 2005&#x27;s SED fit (T_dust, L_IR/L_★, inner/outer radius) should be ingested as Phase 2 measurements before the next Phase 3 revisit, mirroring the <code>mass_measurements</code> / <code>radius_measurements</code> schema.",
  "li_186":"<b>Planet b/c/d Phase 3 syntheses.</b> Completed in the disk-followup planet batch. All three Neptune-mass planets orbit interior to the warm belt; d at 0.63 AU sits just inside the belt&#x27;s inner shoulder at ~0.9 AU and serves as the inner-edge dynamical shepherd via Lisse 2007&#x27;s 2:1 + 5:2 outer MMR coincidence (1.00 / 1.16 AU, both inside the belt). The planet-level cfg decisions interact with the warm dust belt via this shepherd geometry; future revisits should refine the cross-link as more TESS / CHEOPS / JWST data lands.",
  "li_187":"<b>Catastrophic-event hypothesis revisit.</b> If SPHERE / JWST-MIRI / future ALMA imaging resolves the disk geometry — symmetric belt vs asymmetric debris cloud, narrow ring vs broader distribution — the cfg should re-evaluate the <code>disk_morphology</code> decision and the canonical-alternatives variant table. As of 2026 no published resolved imaging exists.",
  "li_188":"<b>Photometrically-accurate disk variant.</b> The cfg&#x27;s <code>disk_opacity = 0.25</code> is a renderer-amplified value; a photometrically-accurate variant at opacity ~10⁻³ (rendering the dust effectively invisible to the naked eye but observable through in-game IR overlays) is listed in Canonical alternatives as a candidate cfg variant for future development.",
  "li_189":"<b>X-ray cycle detection campaign.</b> No published long-baseline X-ray monitoring of HD 69830 — a Chandra or XMM-Newton DDT proposal could pin the cycle amplitude / period and refine the cfg <code>x_ray_log_lx_cgs_min/max</code> from tie-break to Confidence=high.",
  "li_190":"<b>Spectroscopic detection of dust spectral features.</b> Beichman 2005 / Lisse 2007 identify olivine via Spitzer/IRS at 9.7, 11.3, 23 μm. JWST/MIRI MRS could refine the grain population and constrain hot vs cold olivine fractions, feeding back into the cfg <code>disk_tint_rgb_hex</code> and disk dust temperature.",

  ko: {
  "p_1":"HD 69830 (HIP 40693, GJ 9223) 은 G–K 분광 경계에 있는 조용한 늙은 K0 V 별로, Gaia DR3 시차 79.495 ± 0.040 mas 기준 12.58 ± 0.01 pc (41.05 ± 0.02 ly) 거리에 있습니다. V = 5.95 등급이라 푸피스 자리 에서 맨눈으로 겨우 보이는 경계에 있습니다. 기본 파라미터는 Tanner 2015 에 앵커링돼 있습니다. CHARA 간섭계로 별을 직접 분해한 전용 항성 파라미터 논문으로 (θ_LD = 0.674 ± 0.014 mas → R = 0.9058 ± 0.019 R☉), Teff = 5394 ± 62 K (θ_LD + 볼로메트릭 플럭스), L = 0.622 ± 0.014 L☉, 질량 0.863 ± 0.043 M☉ (Yonsei-Yale isochrone), [Fe/H] = −0.04 ± 0.03 (SME) 을 줍니다. 태양보다 살짝 metal-poor 하고 살짝 더 차갑습니다. 직접 측광 회전 주기는 없습니다 (v sin i = 0.8 ± 0.5 km/s 뿐). 나이는 documented divergence 입니다 (Tanner SME-isochrone 7.5 ± 3 Gyr 를 채택. HRD 10.6 ± 4, Mamajek 2008 활동도 나이 5.7–6.1 과 갈리지만 모두 늙음). 이 별은 비활성 locus (log R&#x27;HK = −4.999, Gomes da Silva 2021) 에 들어갑니다.",
  "p_2":"이 시스템을 정의하는 것은 별 그 자체가 아니라 <b>~1 AU 의 따뜻한 먼지 띠</b> 입니다 (Beichman 2005 의 Spitzer/IRS 검출). 별의 거주가능영역 안쪽에 자리잡은 특이한 소행성대 아날로그로, 9.7 / 11.3 / 23 μm 의 강한 특성선이 작은 (~μm) 결정질 감람석 입자를 명확하게 식별해 줍니다. Lovis 2006 가 RV 로 발견한 세 개의 해왕성급 행성 (b 가 0.08 AU / 8.7 d, c 가 0.19 AU / 31.6 d, d 가 0.63 AU / 197 d) 은 모두 따뜻한 먼지 띠보다 안쪽 궤도를 돕니다. d 는 ~0.9 AU 의 띠 안쪽 어깨 바로 안에 자리잡고 있어 (Smith, Wyatt &amp; Haniff 2009 mid-IR 간섭계 + SED refit: 0.92–1.16 AU), d 의 2:1 과 5:2 외부 평균운동공명이 1.00 / 1.16 AU 에서 띠 안에 정확히 떨어집니다. 이로써 d 는 띠 안쪽 가장자리의 역학적 조각자이자 Lisse 2007 격변 가설의 부모천체 후보가 됩니다. Lisse 2007 은 감람석 위주, 서브 μm 입자가 우세한 입자 분포를 dwarf-planet 급 천체의 최근 (≲ 1 Myr) 격변적 파괴 이후의 충돌 잔해로 해석 합니다. Wyatt 2007 의 정상상태 충돌 한계 (관측된 L_IR/L_★ ≈ 2 × 10⁻⁴ 광도에서는 비현실적으로 큰 부모천체 저장소 없이 장기 존속이 불가능) 을 근거로 듭니다. Spitzer 70 μm 에서는 차가운 (FIR) Vega 급 외곽 띠가 검출되지 않아 Kuiper 아날로그 공급원도 배제됩니다.",
  "p_3":"<b>NearStars 시나리오 선택. 태양보다 살짝 더 붉은 조용한 G8V 별이, 안쪽 행성 d 의 안쪽 가장자리 부근에서 특이한 가까운 따뜻한 먼지 띠를 갖고 있고, 세 개의 해왕성급 행성이 이 띠를 사이에 두고 배치된 모습으로 렌더링합니다.</b> 항성 layer 는 Tanner 2015 CHARA 간섭계 + Gomes da Silva 2021 활동도에 다시 앵커링했습니다 (documented age divergence 와 측정 회전 주기 부재 포함). 디스크 지오메트리는 SED 로 추정된 따뜻한 띠 시나리오를 사용하고, tie-break 두 개는 시각 hex 색조 (태양보다 살짝 붉은 크림과 따뜻한 호박색 먼지 발광) 입니다. 격변 이벤트 대 정상상태 기원 가설은 <code>## Canonical alternatives</code> 에 보존됐는데, cfg 가 Lisse 2007 의 해석과는 부합하지만 엄격히 요구되지는 않는 &quot;갓 만들어진 잔해 (fresh debris)&quot; 밝은 transient 를 옵션으로 애니메이션할 수 있기 때문입니다.",

  "td_120":"Wyatt 2007. 관측된 먼지 광도가 정상상태 충돌 캐스케이드 한계를 초과해, 최근 상당한 부모천체 파괴가 없으면 설명 불가. cfg 는 Asteroid-group emission 을 위해 belt 존재를 표시",
  "h2_121":"Surface synthesis",
  "p_122":"HD 69830 의 광구는 G–K 경계에 있습니다. Houk &amp; Smith-Moore 1988 은 G8V 로 카탈로그화했지만, 현대 Teff 스케일 (Casagrande 2010 IRFM, Tanner 2019 고해상도 분광) 은 보정에 따라 G8V locus 의 차가운 끝 또는 K0V 의 따뜻한 끝에 놓습니다. DB 는 K0 V 로 기록합니다 (Gray et al. 2006). 유효 온도 5394 ± 62 K 는 태양보다 약 380 K 차갑고, 0.906 R☉ envelope 에서 볼로메트릭 광도 0.622 L☉ 가 나옵니다. metal-poor 정도는 약간 ([Fe/H] = −0.04) 으로 태양값과 거의 차이가 없습니다. 원반 종족 운동학 분포 안에 있고 이 Teff 에서 불투명도에는 별 영향이 없습니다.",
  "p_123":"이 별은 직접 간섭계 각지름 측정값을 가지고 있습니다. Tanner 2015 가 CHARA Array 로 분해했고 (θ_LD = 0.674 ± 0.014 mas), R = 0.9058 ± 0.019 R☉, Teff = 5394 ± 62 K, L = 0.622 ± 0.014 L☉ 를 줍니다. 이게 항성 layer 전체의 앵커입니다 (Boyajian 2012 의 샘플에는 HD 69830 이 없었지만, Tanner 의 전용 CHARA 캠페인이 분해했습니다). cfg 의 <code>limb_darkening_alpha_h</code> 는 1D 대기 power-law 추정값 α(H) ≈ 0.16 입니다 (Tanner 는 가시도용으로 선형 LD μ = 0.352 를 별도로 fit). 더 차가운 광구에서 Sol 의 0.14 보다 약간 강하며, log g ≈ 4.5, [Fe/H] = 0, Teff ≈ 5400 K 의 Claret–Bloemen 2011 그리드와 일관됩니다. Granulation 패턴은 태양형으로 예상되지만 STAGGER 그리드 스케일링 (Magic 2013) 에 따라 선형 스케일이 ~5–10% 작을 것입니다. Sol 의 ~1300 km 대신 cell 폭 ~1000 km 이고, 더 차가운 대류 overturn 으로 수명이 약간 더 깁니다.",
  "p_124":"흑점 면적은 적습니다. log R&#x27;HK = −5.0 은 HD 69830 을 현대 태양 보다 한 톤 더 조용하고 비활성 G 왜성 locus 한가운데에 놓습니다. Lovis 2006 §4 는 세 해왕성급 행성을 검출하는 데 쓰인 4 년 HARPS 베이스라인 전체에서 RV 안정성이 캠페인 내내 활동 최소기와 일관됨을 명시합니다. 사이클이 있다면 Lovis 2006 검출 한계 (~5 m/s 진폭) 보다 낮습니다. cfg 는 quiet-Sun spot envelope (가상 사이클 최대기에 디스크의 ~0.1%. Sol 의 태양 극대기 면적보다 ~10 배 낮음) 을 채택하고 활동 영역 구조는 렌더링하지 않습니다.",
  "p_125":"살짝 metal-poor SED 는 +0.0 dex 기준 대비 볼로메트릭 연속체를 청색 쪽으로 ~5 K 등가만큼 옮기지만, 렌더된 hex 에서는 감지되지 않습니다. Sol 과의 지배적인 가시 색 차이는 순전히 390 K Teff 부족분에서 옵니다. 시각 크림 색조 <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code> 은 Sol 의 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 과 α Cen B 의 <span class=\"hex-chip\" style=\"background:#ffcfa0\"></span><code>#ffcfa0</code> 사이를 보간한 값으로, 적-녹과 적-청 색 차이 양쪽에서 약 2/3 지점에 해당합니다.",
  "h2_126":"Atmosphere synthesis",
  "p_127":"HD 69830 은 늙은 조용한 후기-G/초기-K 왜성에서 전형적인 K0 V 색채권–전이층–코로나 구조를 가집니다. Ca II H&amp;K 색채권 지수 log R&#x27;HK = −4.999 (Gomes da Silva 2021 AMBRE-HARPS, 711 스펙트럼) 은 근거리 G 왜성 활동도 하위 10 분위에 들어갑니다. 장기 베이스라인 활동 사이클은 발표된 적이 없습니다. Mt Wilson 서베이도, HARPS RV 캠페인도 &gt;5 m/s 진폭 사이클을 보지 못했지만, 늙고 조용한 G8V 라면 검출 한계 바로 아래의 태양형 10–15 년 사이클이 prior 기대치입니다. cfg 는 사이클을 애니메이션하지 않습니다.",
  "p_128":"발표된 X 선 검출은 없습니다. Schmitt 2004 의 ROSAT 전천 서베이 카탈로그는 12.6 pc 에서 5 × 10²⁶ erg/s 의 sensitivity floor 위에 HD 69830 을 등재하지 않아 log L_X &lt; 27.0 cgs 임을 시사합니다. Chandra 와 XMM-Newton 은 타깃하지 않았습니다. 가장 최근의 eROSITA 카탈로그 (Merloni 2024) 는 HD 69830 을 log L_X ≈ 26.7 (0.2–2 keV. 잠정 저 S/N 검출) 에 놓습니다. cfg 는 측정된 사이클 진폭이 없는 상태에서 tie-break 로, Sun-quiet 부터 Sun-cycle-max 아날로그 수준에 걸친 log L_X 범위 26.5–27.0 을 채택합니다.",
  "p_129":"전이층 UV 라인은 직접 모니터되지 않지만, log R&#x27;HK = −5.0 의 늙은 G8V 라면 동일 일면 거리 스케일링에서 Sol Lyman-α 연속체 + Lyα 라인의 약 50% 를 만들어 냅니다. 통합 XUV 광도는 10⁻⁴ L_bol 이하 이며, 별의 거주가능영역 (~0.7 AU) 에서 지구급 대기를 Gyr 시간 스케일에 걸쳐 의미 있게 침식하기에는 너무 약합니다. 세 개의 해왕성급 행성 b/c/d 에서는 사정이 다르지만, 그 이야기는 각자의 Phase 3 합성에서 다룹니다.",
  "p_130":"코로나/색채권의 시각 범위는 quiet-Sun 기준으로 렌더링됩니다. ~1.005 R★ 의 얇은 색채권 layer 와 in-game &quot;corona-on&quot; 렌더 모드 에서만 보이는 ~3 R★ 까지의 약한 코로나가 그것입니다.",
  "h2_131":"Rotation &amp; spin synthesis",
  "p_132":"HD 69830 은 측정된 측광 회전 주기가 없습니다. HARPS 나 MOST 정밀도에서 spot 변조를 보기에는 별이 너무 조용합니다. 동결된 Phase 2 layer 안의 유일한 직접 회전 제약은 투영 자전 속도 v sin i = 0.8 ± 0.5 km/s 입니다 (Tanner 2015 SME). CHES 컴파일 (Bao 2024) 이 경험식 추정값 ~41.7 d 를 등재하지만, 측정치로서 기록된 주기는 없습니다. 늙고 비활성인 후기-G/초기-K 왜성이라면 느린 회전 (수십 일) 이 예상되고 ~6–10 Gyr 나이와 일관되지만, cfg 는 특정 주기를 단정하지 않습니다.",
  "p_133":"asteroseismic 검출 없음. HD 69830 은 CHEOPS 와 TESS short-cadence 관측의 asteroseismic 검출 한계 아래에 있고, 예측되는 ν_max ≈ 3000 μHz 와 Δν ≈ 130 μHz 가 지금까지 배치된 서베이 캐던스에서 주파수가 너무 높은 곳에 피크합니다. cfg 는 진동 driven 광도 변조를 채택하지 않습니다.",
  "p_134":"차등 회전은 적도가 극보다 ~20% 빠르게 회전하는 태양형으로 예상되지만, 측정되지 않았습니다. 회전축 경사는 제약되지 않습니다. 시각 렌더링을 위해 b/c/d 행성계의 추론된 평균 궤도면에 대해 ~30° 기울어진 무작위 정렬 축을 채택합니다.",
  "p_135":"KSP 단위로는 측정된 주기가 없으므로 cfg 가 별 본체의 <code>rotationPeriod</code> 를 느린 기본값 (가상의 ~30+ d) 으로 둡니다. 정보용일 뿐입니다 (Kopernicus 는 별 회전을 직접 애니메이션하지 않지만, cfg <code>rotationPeriod</code> 필드는 Principia 가 spin-axis 세차 부기 (bookkeeping) 용으로 읽습니다).",
  "h2_136":"Visual styling",
  "li_137":"<b>궤도 뷰 (시스템 오버뷰 렌더).</b> 따뜻한 노란빛-크림 점원이 ~1 AU 의 따뜻한 호박색 먼지 발광을 배경으로 보이고, 세 개의 청록색 해왕성급 행성이 b ≈ 0.08 AU (가장 안쪽, 별빛 글레어에 묻힘), c ≈ 0.19 AU (먼지 띠 안쪽 가장자리 안), d ≈ 0.63 AU (~0.9 AU 의 띠 안쪽 어깨 바로 안. d 의 2:1 + 5:2 외부 MMR 이 띠 내부에 떨어짐) 에 자리잡습니다.",
  "li_138":"<b>별 디스크 (클로즈업).</b> 교과서적인 H 밴드 power-law limb darkening 을 가진 조용한 G8V. granulation cell 은 Sol 보다 살짝 작고 살짝 더 오래갑니다. cfg 의 가상 사이클 최대기에 사이클 평균 spot 밝기 변조 (~0.1% peak-to-peak) 외에는 보이는 활동 영역 없음.",
  "li_139":"<b>별 색.</b> 크림-노란 <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>. 엄격한 태양형 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 그리고 α Cen B 의 더 진한 <span class=\"hex-chip\" style=\"background:#ffcfa0\"></span><code>#ffcfa0</code> 오렌지와도 구분이 됩니다. HD 69830 은 NS 카탈로그에서 &quot;Sol 의 살짝 더 붉은 사촌&quot; 항목입니다.",
  "li_140":"<b>따뜻한 먼지 띠.</b> 이게 <i>결정적인</i> 시각 특징입니다. cfg 는 0.8–1.5 AU 의 좁은 <span class=\"hex-chip\" style=\"background:#d4a060\"></span><code>#d4a060</code> 따뜻한 호박색 띠를 alpha 0.25 로 렌더하는데, 실제 L_IR/L_★ = 2 × 10⁻⁴ (그대로면 안 보임) 보다 훨씬 증폭된 값입니다. 플레이어에게 볼 거리를 주려는 목적입니다. 띠는 서브 μm 감람석으로, 주로 G8V 별빛을 산란하며 약한 전방 산란 비등방성 (g ≈ 0.7) 이 가상의 b/c/d 행성에서 본 새벽/저녁 반달 부분을 밝게 만듭니다. 먼지 증폭은 tie-break 로 문서화돼 있습니다.",
  "li_141":"<b>격변 이벤트 가설 cfg 변형.</b> Lisse 2007 에 따르면 감람석 입자 분포가 ~1 Myr 전 dwarf-planet 파괴 이후의 충돌 잔해라면, 고정된 궤도 경도에 더 밝은 alpha (~0.5) 와 ~10⁵ 년 감쇠 타임스케일을 가진 비대칭 transient 특징 (&quot;fresh debris cloud&quot;) 을 모델할 수 있습니다. cfg 는 기본으로 정상상태 대칭 띠를 배포하고 격변 잔해 비대칭 변형을 cfg alternate 로 배포합니다. 둘 다 관측 윈도우 안에 있습니다.",
  "li_142":"<b>하늘에 있는 해왕성급 세 행성.</b> 행성 b 는 0.08 AU 에서 c (0.19 AU) 에 0.04° 각지름으로 보입니다. d 는 0.63 AU 에서 c 에 비슷한 0.01° 로 보입니다. b/c/d 의 가상 관측자가 보면 먼지 띠가 궤도면을 따뜻한 호박 띠로 채웁니다. 지구에서 보는 적당히 밝은 황도광에 가깝지만 먼지 띠의 실제 지오메트리에 맞춰 보입니다. 행성별 렌더는 b/c/d Phase 3 합성으로 미룹니다.",
  "li_143":"<b>지구에서 본 별.</b> V = 5.95 라 HD 69830 은 맨눈 한계입니다. 어두운 하늘이라면 푸피스에서 겨우 보입니다. KSC 기준 프레임의 in-game 관측자 시점에서는 카탈로그 ~배경에서 구분되지 않는 5-6 등급 field 별 다수 중 하나로 나타나며, 호박색 먼지 띠를 분해하는 in-game 망원경 뷰를 통해서만 식별됩니다.",
  "h2_144":"Canonical alternatives",
  "p_145":"<b>항성 나이 — isochrone 대 활동도.</b> cfg 는 Tanner 2015 의 SME-isochrone 나이 7.5 ± 3 Gyr 를 채택합니다. 문서화된 대안은 Tanner 자신의 HRD-isochrone 값 10.6 ± 4 Gyr 와 Mamajek &amp; Hillenbrand 2008 활동도/자이로크로놀로지 나이 5.7–6.1 Gyr 입니다. 셋 다 ~6–10 Gyr 에서 겹치며 젊은 (~0.6–2 Gyr, Song 2000) 나이를 만장일치로 배제합니다. 이게 중요한 이유는, 나이가 많다는 것은 따뜻한 소행성대가 원시적일 수 없고 보충돼야 한다는 뜻이기 때문입니다 (Beichman 2005). Tanner 의 두 측정 중 더 조밀한 7.5 Gyr SME 값을 선호합니다.",
  "p_146":"디스크 기원 시나리오도 문헌이 지지하는 두 가지 해석이 있습니다. 둘 다 관측과 일관되며, cfg 는 더 시각적으로 인상적인 쪽을 기본으로 선택합니다.",
  "h3_147":"Diverged cfg picks",
  "th_148":"Field",
  "th_149":"Gameplay (in cfg)",
  "th_150":"Canonical alternative",
  "th_151":"Why diverged",
  "td_152":"<code>disk_opacity</code>",
  "td_153":"0.25 (렌더 가시성을 위해 증폭)",
  "td_154":"≈ 10⁻³ (실제 L_IR/L_★ = 2 × 10⁻⁴ → 비가시)",
  "td_155":"Beichman 2005 의 측정 fractional luminosity 그대로면 보이지 않는 띠가 됩니다. cfg 는 측광 정확도를 희생하고 opacity 를 ~250 배 증폭해 먼지 띠가 마땅한 결정적 시각 특징이 되도록 합니다. 과학 서사 (&quot;1 AU 의 따뜻한 먼지&quot;) 는 보존됩니다. 측광적으로 정확한 변형은 Open items 에 기재돼 있습니다.",
  "td_156":"<code>disk_morphology</code> (default vs variant)",
  "td_157":"정상상태 대칭 좁은 띠 (기본 cfg) + 격변 잔해 비대칭 변형 (alternate cfg)",
  "td_158":"Wyatt 2007 의 충돌 캐스케이드 한계로는 정상상태가 비현실적이며, Lisse 2007 은 격변 이벤트 기원을 선호",
  "td_159":"둘 다 관측 윈도우 안에 있습니다. cfg 는 더 단순하고 시각적으로 더 안정적인 렌더라서 정상상태 띠를 기본으로 배포하고, post-collisional 해석이 비대칭을 알아채는 KSP 플레이어에게 더 흥미롭기 때문에 Lisse 2007 격변 변형을 더 밝은 비대칭 transient 와 함께 alternate cfg 로 배포합니다. Phase 2 disk_measurements ingest 는 JWST/MIRI 나 SPHERE 영상이 분해된 지오메트리를 발표하면 이를 다시 검토합니다.",
  "h2_160":"Bibliography",
  "h3_161":"Read (visual-informative, drove decisions above)",
  "li_162":"<b>Tanner A. et al. 2015</b> — <i>Stellar Parameters for HD 69830, a Nearby Star with Three Neptune-Mass Planets and an Asteroid Belt</i>, ApJ 800, 115 (<code>2015ApJ...800..115T</code>, arXiv:1412.5251). 전용 항성 파라미터 논문. CHARA 간섭계 θ_LD 0.674 ± 0.014 mas → R 0.9058 ± 0.019 R☉. Teff 5394 ± 62 K (θ_LD + F_bol. SME 5385 ± 44). L 0.622 ± 0.014 L☉. Y² 질량 0.863 ± 0.043 M☉. [Fe/H] −0.04 ± 0.03. v sin i 0.8 ± 0.5 km/s. SME-isochrone 나이 7.5 ± 3 (HRD 10.6 ± 4). <b>항성 layer 전체의 Phase 2 앵커.</b>",
  "li_163":"<b>Gomes da Silva J. et al. 2021</b> — <i>Stellar chromospheric activity of the AMBRE-HARPS sample</i>, A&amp;A 646, A77 (<code>2021A&amp;A...646A..77G</code>, arXiv:2012.10199). 711 스펙트럼에서 log R&#x27;HK = −4.999. Phase 2 recommended 활동도 지수.",
  "li_164":"<b>Beichman C. A. et al. 2005</b> — <i>An Excess Due to Small Grains around the Nearby K0 V Star HD 69830: Asteroid or Cometary Debris?</i>, ApJ 626, 1061 (<code>2005ApJ...626.1061B</code>, arXiv:astro-ph/0504491). HD 69830 의 Spitzer/IRS 8–35 μm 스펙트럼 + MIPS 24/70 μm 측광. ~1 AU 의 따뜻한 먼지를 강한 9.7 / 11.3 / 23 μm 실리케이트 특성선과 함께 식별. fractional luminosity L_IR/L_★ = 2 × 10⁻⁴. 차가운 (70 μm) 초과 없음. <b>모든 디스크 Decisions 행의 기준 논문.</b>",
  "li_165":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). HARPS RV 로 HD 69830 b (8.67 d / 10.2 M⊕ sin i), c (31.56 d / 11.8 M⊕ sin i), d (197 d / 18.1 M⊕ sin i) 검출. §4 에서 4 년 캠페인 베이스라인 전체에서 항성 활동이 RV 지터 floor 보다 낮음을 확인.",
  "li_166":"<b>Lisse C. M. et al. 2007</b> — <i>On the Nature of the Dust in the Debris Disk around HD 69830</i>, ApJ 658, 584 (<code>2007ApJ...658..584L</code>, arXiv:astro-ph/0611452). SED fit 입자 조성 모델. 서브 μm 결정질 감람석이 우세하며, 스노라인 안쪽 부모 천체에서 열적으로 처리된 실리케이트와 일관. 이 입자 분포를 최근 (≲ 1 Myr) dwarf-planet 급 천체의 격변적 파괴 이후 fresh debris 로 해석. d 의 2:1 + 5:2 외부 평균운동공명 (1.00 / 1.16 AU) 을 띠 안쪽 가장자리의 역학적 조각자로 식별.",
  "li_167":"<b>Smith R., Wyatt M. C. &amp; Haniff C. A. 2009</b> — <i>The nature of mid-infrared excesses from hot dust around Sun-like stars</i>, A&amp;A 503, 265 (<code>2009A&amp;A...503..265S</code>, doi:10.1051/0004-6361/200912330). MIDI/VLTI mid-IR 간섭계 + refit SED 가 따뜻한 띠를 0.92–1.16 AU 로 좁히고 디스크 크기에 대한 2.4 AU 간섭계 상한을 둠. Beichman 2005 의 BB-radius 범위를 정련. d (a = 0.63 AU) 가 띠 안쪽 어깨 안쪽에 있음을 확인.",
  "li_168":"<b>Wyatt M. C. et al. 2007</b> — <i>Steady State Evolution of Debris Disks around A Stars</i>, ApJ 663, 365 (<code>2007ApJ...663..365W</code>, arXiv:astro-ph/0703608). 주어진 나이와 부모천체 질량에서의 정상상태 충돌 캐스케이드 L_IR/L_★ 한계를 정의. HD 69830 에 적용된 Wyatt 2007b 는 관측 먼지 광도가 정상상태 한계를 약 10 배 초과해, 최근 stochastic 이벤트 (Lisse 2007) 나 비정상적으로 큰 부모 저장소가 둘 중 하나가 필요함을 보임.",
  "li_169":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs Using Activity-Rotation Diagnostics</i>, ApJ 687, 1264 (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 활동도/자이로크로놀로지 나이 5.7–6.1 Gyr. Tanner 2015 isochrone 나이의 documented-divergence 대안 (Canonical alternatives). (그 34 d 주기는 자이로크로놀로지 추론이었지 측정된 주기가 아니라서 더는 이어지지 않음.)",
  "li_170":"<b>Rosenthal L. J. et al. 2021</b> — <i>The California Legacy Survey. I. A Catalog of 178 Planets from Precision Radial Velocity Monitoring of 719 Nearby Stars over Three Decades</i>, ApJS 255, 8 (<code>2021ApJS..255....8R</code>, arXiv:2105.11583). 이전에 채택했던 isochrone 반지름 0.887 R☉ 출처. Tanner 2015 CHARA 간섭계 R 0.9058 로 대체됨.",
  "h3_171":"Read (context / methodology, not directly decision-driving)",

  "li_186":"<b>행성 b/c/d Phase 3 합성.</b> disk-followup 행성 batch 에서 완료. 세 해왕성급 행성 모두 따뜻한 띠보다 안쪽 궤도를 돕니다. d 는 0.63 AU 에서 ~0.9 AU 의 띠 안쪽 어깨 바로 안에 자리잡아, Lisse 2007 의 2:1 + 5:2 외부 MMR 공명 (1.00 / 1.16 AU, 둘 다 띠 안) 을 통해 안쪽 가장자리의 역학적 shepherd 가 됩니다. 행성 단위 cfg 결정이 이 shepherd 지오메트리를 통해 따뜻한 먼지 띠와 교차합니다. 미래 revisit 에서 TESS / CHEOPS / JWST 데이터가 더 쌓이면 cross-link 를 다듬을 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
