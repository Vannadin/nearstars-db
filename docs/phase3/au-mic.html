  "p_1":"AU Microscopii (HD 197481, GJ 803, HIP 102409) is a nearby M1Ve pre-main-sequence dwarf at 9.714 pc (Gaia DR3 parallax 102.94 ± 0.02 mas, this DB) — one of the youngest stars in the entire NearStars catalog at ~22 Myr (Mamajek &amp; Bell 2014 isochronal age of the β Pictoris Moving Group, of which AU Mic is a canonical member). The fundamental parameters come from the frozen Phase 2 layer: R = 0.862 ± 0.052 R☉ (Gallenne 2022 VLTI/PIONIER, the only refereed interferometric radius — the widely-cited 0.75 R☉ traces to an unrefereed White 2019 AAS abstract; see Canonical alternatives), M = 0.50 ± 0.03 M☉ (Plavchan 2020 PMS isochrone), and Teff = 3665 ± 31 K (Cristofari 2023 SPIRou atmospheric fit). The luminosity is L = 0.102 L☉ (Donati 2023, log L/L☉ = −0.99 ± 0.01) — elevated for an M1V because AU Mic is still contracting onto the main sequence and remains slightly inflated.",
  "p_2":"What sets AU Mic apart from every other M dwarf in the catalog is <b>the resolved edge-on debris disk</b> (HST/STIS — Krist 2005; deeper HST/STIS revisit — Schneider 2014; VLT/SPHERE polarimetric imaging — Boccaletti 2015, 2018) extending from an inner edge near ~35 AU to an outer halo at ~210 AU, viewed within ≈ 1° of edge-on. Multi-epoch SPHERE imaging resolved <b>moving substructures</b> in the disk&#x27;s south-east ansa (Boccaletti 2015 first detection, 2018 follow-up), traveling outward at 4–10 km/s — faster than Keplerian and currently best-explained as dust ridges launched by stellar-wind / radiation- pressure interactions with planetesimal collisions (Chiang &amp; Fung 2017). Add to that the magnetic activity: kG-class surface fields (Donati 2023 Zeeman-Doppler imaging), super-flares up to 10³⁴–10³⁵ erg (Cully 1993; Smith 1981; eRosita; Tristan 2023 TESS census), photometric rotation period 4.86 d with multi-spot complexity (Plavchan 2020 TESS), and X-ray luminosity orders of magnitude above the quiet-Sun average. AU Mic is, by any reasonable measure, the most dramatic single-star light source in the NearStars catalog.",

  "td_112":"medium",
  "td_113":"CORRECTED: the disk is NOT achromatic — it is MEASURED BLUE (Krist 2005, B/I ~ 1.6; Fitzgerald 2007 blue in NIR; tiny porous blowout grains a ~0.1 µm, Graham 2007). Mie reflectance synthesis reproduces it (B/I 1.74 ≈ the measured 1.6); the cfg tint is the intrinsic blue dust color (the renderer applies the M1V star light). Vivid pack: <span class=\"hex-chip\" style=\"background:#acd6ff\"></span><code>#acd6ff</code>",

  "h2_142":"Surface synthesis",
  "p_143":"AU Mic&#x27;s photosphere is one of the deepest red continua in the catalog — but warmer than Proxima or the TRAPPIST-1 host. At Teff = 3665 K (Cristofari 2023) and R = 0.862 R☉ (Gallenne 2022), the luminosity is 0.102 L☉ (Donati 2023; about 1/10 of the Sun), with most flux emerging between 0.7 and 2.0 μm. TiO bands suppress the visible continuum below 6500 Å sharply; VO and water bands shape the near-infrared. Because AU Mic is pre-main-sequence (~22 Myr), the radius is inflated relative to a settled M1V — the Gallenne 2022 interferometric radius 0.862 R☉ is consistent with PARSEC and Baraffe pre-MS evolutionary tracks at 22 Myr / 0.50 M☉.",
  "p_144":"The defining surface feature is the <b>spot complex</b>. Plavchan 2020 TESS photometry shows multi-modal rotational modulation that requires at least three persistent active longitudes; Donati 2023 ZDI inversion resolves these as latitudinal bands at ±30° to ±60° with &gt; 10% total disk coverage. In cfg rendering this is represented as <code>spot_coverage_max_fraction = 0.12</code>, with the animated activity layer cycling spot positions on the 4.86-day rotation period. The visible spots are darker than the photosphere by ~500 K (Δ(B-V)_spot ≈ +0.3) and produce ~3% V-band photometric amplitude even outside flare events.",
  "p_145":"Granulation, faculae, and plage are present but contribute less than the spot signal to the integrated luminosity. The pre-MS contraction means the convective envelope is more turbulent than a settled M-dwarf&#x27;s — granulation cells scale as the pressure scale height, which is larger for the inflated radius; expect ~50 km granules under sub-arcsecond rendering. The 3D-RHD models of Beeck et al. (2013, cited via Donati 2023 §3) give the granulation contrast and timescale grid used for the in-game animated photosphere texture.",
  "p_146":"Mineralogically the photosphere is supersolar [Fe/H] ≈ +0.12 (β Pic MG mean — Shkolnik 2017; no direct AU Mic measurement is on file in the DB), slightly reddening the SED toward the long-wavelength end relative to a solar-metallicity M1V. This is invisible at the spectral resolution of the in-game illumination color but justifies the deeper-red <span class=\"hex-chip\" style=\"background:#e0743a\"></span><code>#e0743a</code> over a pure 3665 K Planckian.",
  "h2_147":"Atmosphere synthesis",
  "p_148":"AU Mic is one of the most chromospherically and coronally active stars in the solar neighborhood — its outer atmosphere drives most of the spaceweather-relevant physics for planet b/c/d/e and for the debris disk. The quiescent X-ray luminosity is log L_X ≈ 29.35 cgs (Tsikoudi &amp; Kellett 2000 ROSAT, Lx = 2.24e29 erg/s), placing AU Mic in the <b>saturated regime</b>: log(L_X/L_bol) ≈ −3.24, near the empirical upper limit for rapid M-dwarf rotators. The corona reaches temperatures up to ~10⁷ K during flares.",
  "p_149":"<b>Super-flares dominate the energy budget.</b> The Cully 1993 EUVE 1992-September event released ~10³⁴–10³⁵ erg in the EUV alone — at the time, the largest single stellar flare ever recorded. Tristan 2023 (arXiv:2306.00077) ran a TESS Sectors 1+27 flare census and counted ≥ 150 events per sector above ~10³¹ erg; integrated, the mean flare rate is 5.6 events/day above this energy threshold, with the cumulative flare-frequency distribution extending to ≥10³⁴ erg several times per year. Davenport et al. 2020 (TESS first-year M-dwarf flare survey) confirms the same flare-rate distribution shape, with AU Mic in the high-energy tail of the active M1V locus.",
  "p_150":"The chromosphere is filled with Hα emission (EW ≈ 1 Å in quiescence, several Å during flares), He I 10830 Å absorption-to- emission cycling, and broad Mg II h&amp;k. UV flux at Lyman-α is elevated by factors of 10²–10³ over Sol&#x27;s. The transition region is extremely bright: Loyd et al. 2018 measure FUV fluxes consistent with the saturated activity locus. Without an activity cycle to modulate it — AU Mic is too young and too saturated to show one — the high-energy output is approximately constant over decades, with quasi-stochastic super-flare punctuation.",
  "p_151":"The stellar wind is correspondingly strong. The mass-loss rate is estimated at ~10× solar (Plavchan 2020 §4 background context; Boccaletti 2015 + Chiang &amp; Fung 2017 disk-substructure inversion). This wind is the engine that launches the moving disk substructures: the wind ram pressure on disk dust at 35 AU is sufficient to accelerate small grains outward at 4–10 km/s, comparable to the Boccaletti-measured feature velocities, and orders of magnitude larger than Keplerian motion at the same radius. For NearStars cfg rendering this fact attaches the disk animation to the stellar activity layer — substructures move faster after super-flare events and slow between them. The frequency of the events is sufficient that the disk effectively never appears &quot;static&quot; on observation timescales.",
  "p_152":"For in-game planet atmospheres, the implication is severe: at AU Mic b&#x27;s distance (0.07 AU) the XUV flux is ~10⁴ × Earth&#x27;s, and the super-flare peak fluxes exceed by another order of magnitude. Atmosphere retention for any close-in planet requires either a strong magnetic shield or a continuous outgassing source; this constrains the Phase 3 follow-up choices for b/c/d/e.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"The 4.86-day rotation period (Plavchan 2020 — TESS photometric modulation) is fast by main-sequence M-dwarf standards but characteristic of a pre-MS M1V. Skumanich-like braking has barely begun to act on AU Mic at 22 Myr; the rotation is rapid because it has not had time to spin down via magnetic braking. The spin axis is consistent with edge-on (v sin i ≈ 9 km/s implies sin i ≈ 1 given R = 0.862 R☉ and P = 4.86 d), aligning the rotation axis with the disk&#x27;s edge-on inclination of ~89°. This is the expected outcome for a star born from a coherent angular-momentum field.",
  "p_155":"Multiple active longitudes produce a complex rotational lightcurve that cannot be modeled as a single sinusoid; Plavchan 2020 found at least three spot regions at distinct longitudes, and Donati 2023 ZDI resolved them as latitudinal bands. The cfg&#x27;s animated activity layer cycles spot positions on the 4.86-d rotation; the multi-longitude pattern means the in-game lightcurve has roughly 3× the apparent rotation harmonic content of a single-spot star.",
  "p_156":"No asteroseismic constraint is possible — AU Mic is too cool, too small, and too magnetically active for p-mode oscillations to be detectable. Differential rotation is constrained at α ≈ 0.04 (Donati 2023, comparable to the solar rate) but is too subtle to render in the cfg.",
  "p_157":"The rotation axis inclination is fixed by the disk and v sin i to within ~1° of 90°; the NearStars cfg adopts an axis aligned with the disk plane for visual coherence — when the player views AU Mic edge-on (the only way the disk is visible), the rotation axis is also nearly in the plane of the sky. This means rotational shortening of spot features (foreshortening at high latitudes) is substantial and must be rendered.",
  "h2_158":"Canonical alternatives",
  "p_159":"<b>Radius — refereed interferometry vs the community-standard value.</b> The cfg adopts R = 0.862 ± 0.052 R☉ from Gallenne 2022 (VLTI/PIONIER, θ_LD 0.825 mas), the only <i>refereed</i> interferometric radius. The widely-quoted 0.75 R☉ traces to White et al. 2019, which exists only as an unrefereed AAS conference abstract (no journal paper, no arXiv); Donati 2023 infers 0.78–0.82 R☉ from L + Teff, sitting between the two and supporting the larger value. A future cfg could expose the 0.75 community value as an alternate scenario, but the refereed interferometric radius is the principled default.",
  "p_160":"<b>Mass — Plavchan vs Donati.</b> The cfg uses M = 0.50 ± 0.03 M☉ (Plavchan 2020 PMS isochrone, the community standard propagated to all the planet papers); Donati 2023 derives a higher 0.60 ± 0.04 M☉ from Dartmouth tracks.",
  "p_161":"<b>Luminosity — Donati vs Plavchan.</b> The cfg uses L = 0.102 L☉ (Donati 2023, log L = −0.99); Plavchan 2009&#x27;s SED gives 0.09 L☉. The two agree to ~10%.",
  "p_162":"<b>Activity index.</b> AU Mic is an M dwarf with a convective dynamo, so log R&#x27;HK is physically definable in principle, but there is NO chromospheric log R&#x27;HK in the frozen Phase 2 layer — the cfg activity proxy is the X-ray log(Lx/Lbol) ≈ −3.24 (Tsikoudi &amp; Kellett 2000), near the saturation ceiling. (The earlier −3.9 log R&#x27;HK figure was an unsourced placeholder.)",
  "h2_163":"Visual styling",
  "p_164":"The visual presentation of AU Mic is the most distinctive in the NearStars catalog and combines four elements:",
  "li_165":"<b>Stellar disk</b> — a deeply red M1V tinted <span class=\"hex-chip\" style=\"background:#e0743a\"></span><code>#e0743a</code>, fills 1.5° angular diameter as seen from AU Mic b (0.07 AU), 0.8° from c (0.119 AU). The color is similar to a sunset Sun on Earth, but the spectrum is much redder; rendering uses both the photometric hex tint and the SED-illumination color temperature (3665 K) to drive scene lighting for any nearby body.",
  "li_166":"<b>Spots and faculae</b> — multi-spot complex covering &gt; 10% of the visible disk during peak activity; rendered as dark patches with faculae bridging them. Spot positions rotate on the 4.86-d period; rotational lightcurve amplitude is ~3% in V-band even quiescent.",
  "li_167":"<b>Flares</b> — render as transient brightening events with <code>visual_flare_color_hex = #ff9050</code> (white-light flare continuum, ~9000 K blackbody temperature shifted into the visible). The flare rate of 5.6/day above 10³¹ erg means the player sees multiple flares per in-game day; super-flares of 10³⁴ erg occur several times per year and produce dramatic 1–3 magnitude brightening events lasting 10–60 minutes. The QPO modulation characteristic of Cully 1993 EUVE events is rendered as a slow pulsation in the flare decay tail.",
  "li_168":"<b>The edge-on debris disk</b> — by far the most photogenic feature in the system. The disk extends from an inner edge at ~35 AU (~3.6° angular separation from AU Mic&#x27;s center, as seen from a hypothetical planet at 0.1 AU) to an outer halo at ~210 AU. Viewed edge-on (i = 89.5°), it appears as a thin bright streak bisecting the sky on either side of AU Mic, with surface brightness fading smoothly into the background. The cfg disk tint <span class=\"hex-chip\" style=\"background:#e3f0ff\"></span><code>#e3f0ff</code> is BLUE — AU Mic&#x27;s disk is measured blue in scattered light (Krist 2005, B/I ~ 1.6; tiny porous grains), reproduced by the Mie reflectance synthesis (B/I 1.74). The dust temperature of ~50 K is too cold for the disk&#x27;s own thermal emission to be visible in the optical band, so this is pure blue-sloped scattering. The vivid cfg pack saturates it to <span class=\"hex-chip\" style=\"background:#acd6ff\"></span><code>#acd6ff</code>; the renderer applies the red M1V star light on top.",
  "li_169":"<b>Disk moving substructures (animated)</b> — the cfg&#x27;s most ambitious visual feature. Multi-epoch SPHERE imaging (Boccaletti 2015, 2018) tracked five identifiable density features along the south-east ansa, moving radially outward at 4–10 km/s — too fast for Keplerian rotation, attributed to stellar-wind/radiation- pressure acceleration (Chiang &amp; Fung 2017). The cfg picks the animated rendering over a static texture: the moving features are the distinguishing characteristic of AU Mic in the literature, and a static disk would lose this. Animation period scaled so that a feature crosses the visible disk (35 to 210 AU) in roughly the in-game equivalent of several months. Tie-break: observation allows either animation or static rendering, cfg picks animated.",
  "p_170":"The four close-in planets — AU Mic b at 0.07 AU, c at 0.119 AU, d at ~0.105 AU (TTV-derived), e at ~0.19 AU (Donati 2025 RV candidate) — all transit interior to the disk&#x27;s inner edge. From a hypothetical observer at, say, a far point in the AU Mic system, the planets transit the bright stellar disk in the foreground while the bright disk extends 1–6° on either side in the background — a visually unprecedented scene compared to any other system in the catalog. Planet-specific syntheses for b/c/d/e are deferred to a separate follow-up workspace.",
  "p_171":"AU Mic&#x27;s wide companion AT Mic, ~46 400 AU away (1.22° on the sky) and itself an M-dwarf binary, would appear as a moderate-brightness red point of light in the AU Mic sky, not resolved as a binary at naked-eye distance from any AU Mic planet. It is not currently in the NS DB as a separate entry; see Open items.",
  "h2_172":"Bibliography",
  "h3_173":"Read (visual-informative, drove decisions above)",
  "li_174":"<b>Gallenne A. et al. 2022</b> — <i>The radius and effective temperature of the pre-main-sequence M dwarf AU Mic via VLTI/PIONIER</i>, A&amp;A 665, A41 (<code>2022A&amp;A...665A..41G</code>, arXiv:2207.04116). The only <i>refereed</i> interferometric radius: θ_LD = 0.825 ± 0.033 ± 0.038 mas → R = 0.862 ± 0.052 R☉. Phase 2 recommended radius.",
  "li_175":"<b>Cristofari P. I. et al. 2023</b> — <i>Atmospheric parameters and magnetic fields of M dwarfs from SPIRou</i>, MNRAS 522, 1342 (<code>2023MNRAS.522.1342C</code>, arXiv:2303.11241). SPIRou atmospheric fit (with magnetic fields): Teff = 3665 ± 31 K, [M/H] = +0.12 ± 0.10, log g = 4.52. Phase 2 recommended Teff + metallicity.",
  "li_176":"<b>Tsikoudi V. &amp; Kellett B. J. 2000</b> — <i>ROSAT all-sky survey X-ray emission from late-type stars</i>, MNRAS 319, 1147 (<code>2000MNRAS.319.1147T</code>). AU Mic quiescent Lx = 2.24 × 10²⁹ erg/s (log Lx 29.35, log Lx/Lbol ≈ −3.24). Phase 2 recommended X-ray activity proxy. (Supersedes the earlier Stelzer 2013 citation; the NEXXUS 2.51e29 value cited online is WRONG for AU Mic — NEXXUS is a G/K sample.)",
  "li_177":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS discovery of AU Mic b transiting hot Neptune; 4.86-d rotation period; PMS-isochrone mass 0.50 ± 0.03 M☉ (Phase 2 recommended mass); multi-spot complexity.",
  "li_178":"<b>Krist J. E. et al. 2005</b> — <i>Hubble Space Telescope Advanced Camera for Surveys Coronagraphic Imaging of the AU Microscopii Debris Disk</i>, AJ 129, 1008 (<code>2005AJ....129.1008K</code>). First HST resolved coronagraphic imaging; inner edge ~17–43 AU, outer extension &gt; 200 AU; provides the geometric framework all later imaging refined.",
  "li_179":"<b>Schneider G. et al. 2014</b> — <i>Probing for Exoplanets Hiding in Dusty Debris Disks: Disk Imaging, Characterization, and Exploration with HST/STIS Multi-Roll Coronagraphy</i>, AJ 148, 59 (<code>2014AJ....148...59S</code>, arXiv:1406.7303). Deep HST/STIS revisit; surface-brightness profile refined; outer halo traced to ~210 AU; inner edge confirmed at ~35 AU.",
  "li_180":"<b>Boccaletti A. et al. 2015</b> — <i>Fast-moving features in the debris disk around AU Microscopii</i>, Nature 526, 230 (<code>2015Natur.526..230B</code>, arXiv:1510.06434). First detection of five fast-moving south-east-ansa features in VLT/SPHERE polarimetric imaging; outward radial velocities 4–10 km/s.",
  "li_181":"<b>Boccaletti A. et al. 2018</b> — <i>Two years of monitoring the AU Microscopii debris disk with SPHERE: New properties for the fast-moving features</i>, A&amp;A 614, A52 (<code>2018A&amp;A...614A..52B</code>, arXiv:1804.04574). Multi-epoch follow-up confirming feature motion; sets velocity precision and the cfg-relevant constraint that motion is wind-launched, not Keplerian.",
  "li_182":"<b>Chiang E. &amp; Fung J. 2017</b> — <i>Stellar-wind-driven Dust Ridges in the AU Mic Debris Disk</i>, ApJ 848, 4 (<code>2017ApJ...848....4C</code>, arXiv:1707.08970). Physical model for the moving substructures: stellar-wind / radiation pressure acceleration of small grains, with planetesimal-belt birth ring at ~35 AU. Drives the cfg <code>disk_morphology</code> and animation choice.",
  "li_183":"<b>Strubbe L. E. &amp; Chiang E. 2006</b> — <i>Dust Dynamics, Surface Brightness Profiles, and Thermal Spectra of Debris Disks: The Case of AU Microscopii</i>, ApJ 648, 652 (<code>2006ApJ...648..652S</code>, arXiv:astro-ph/0606435). Birth-ring model placing the planetesimal belt at ~35 AU; SED fit constraining the dust temperature ~50 K.",
  "li_184":"<b>Chen C. H. et al. 2005</b> — <i>Spitzer IRS Spectroscopy of IRAS-Discovered Debris Disks</i>, ApJ 634, 1372 (<code>2005ApJ...634.1372C</code>). Spitzer cold-component SED-fit anchoring the dust temperature.",
  "li_185":"<b>Mamajek E. E. &amp; Bell C. P. M. 2014</b> — <i>On the age of the beta Pictoris moving group</i>, MNRAS 445, 2169 (<code>2014MNRAS.445.2169M</code>, arXiv:1409.2737). Isochronal age 22 ± 3 Myr for the β Pic MG (and thus for AU Mic); LDB confirmation.",
  "li_186":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>, arXiv:2304.09642). SPIRou ZDI: small-scale mean field ⟨B⟩ = 2.61 ± 0.05 kG, large-scale field 550 ± 30 G (Phase 2 recommended magnetic values); log L/L☉ = −0.99 ± 0.01 → L 0.102 (Phase 2 recommended luminosity); V−I Teff 3700 ± 70 and Dartmouth mass 0.60 (divergence alternatives).",
  "li_187":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). N-body + TTV dynamical mass 0.51 ± 0.028 M☉ — consistent with, but superseded as the cfg value by, the Plavchan 2020 0.50 ± 0.03; introduces planet d as a TTV-only candidate.",
  "li_188":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS Sectors 1+27 flare census; rate 5.6 events/day above 10³¹ erg; cumulative flare frequency distribution.",
  "li_189":"<b>Davenport J. R. A. et al. 2020</b> — <i>The Evryscope Fast Transient Engine: real-time detection for rapidly evolving transients</i>, ApJ 905, 107 (<code>2020ApJ...905..107D</code>, arXiv:2010.02392). TESS first-year M-dwarf flare survey context; AU Mic in the high-energy tail of M1V flare activity.",
  "li_190":"<b>Cully S. L. et al. 1993</b> — <i>The EUVE observation of the 1992 September X-ray flare on AU Mic</i>, ApJ 414, L49 (<code>1993ApJ...414L..49C</code>). The original mega-flare detection: ~10³⁴–10³⁵ erg in the EUV.",
  "li_191":"<b>Stelzer B. et al. 2013</b> — <i>The UV and X-ray activity of the M dwarfs within 10 pc of the Sun</i>, MNRAS 431, 2063 (<code>2013MNRAS.431.2063S</code>, arXiv:1302.1061). AU Mic quiescent X-ray; context only — NOT in the frozen Phase 2 bib (the cfg X-ray proxy is Tsikoudi &amp; Kellett 2000, log Lx 29.35).",
  "h3_192":"Read (context / methodology, not decision-driving)",
  "li_193":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i> (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). TESS + ground-based confirmation of AU Mic c; not stellar-decisive but defines the planet roster.",
  "li_194":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterization with ESPRESSO</i> (<code>2024A&amp;A...689A.132M</code>). Refined b/c orbital and mass parameters; not stellar-decisive.",
  "li_195":"<b>Donati J.-F. et al. 2025</b> — <i>AU Mic system characterized with ESPRESSO</i> (<code>2025A&amp;A...700A.227D</code>). Adds AU Mic e candidate; context only for stellar synthesis.",
  "li_196":"<b>Shkolnik E. L. et al. 2017</b> — <i>HAZMAT II: Ultraviolet Variability of Low-Mass Stars in the GALEX Archive</i>, ApJ 838, 87 (<code>2017ApJ...838...87S</code>, arXiv:1611.02835). β Pic MG and young M-dwarf activity calibration; context for AU Mic&#x27;s saturated state.",
  "li_197":"<b>Smith B. A. &amp; Terrile R. J. 1981</b> — <i>A Circumstellar Disk Around AU Microscopii?</i> (early IR-excess detection, pre-resolved).",
  "h3_198":"Read (instrument / non-cfg-decisive)",
  "li_199":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i>, ApJ 757, 112 (<code>2012ApJ...757..112B</code>, arXiv:1208.2431). CHARA M-dwarf interferometric calibration; context for the Donati 2023 radius but no direct AU Mic measurement.",
  "li_200":"<b>Loyd R. O. P. et al. 2018</b> — <i>MUSCLES Treasury Survey V: FUV Flares On Active and Inactive M Dwarfs</i>, ApJ 867, 71 (<code>2018ApJ...867...71L</code>, arXiv:1809.07322). FUV flare statistics on young M-dwarf comparison set including AU Mic.",
  "li_201":"<b>Beeck B. et al. 2013</b> — <i>3D radiative-hydrodynamic simulations of cool main-sequence stars</i> (cited via Donati 2023 §3). Granulation model grid.",
  "li_202":"<b>Kowalski A. F. et al. 2013</b> — <i>Time-resolved Properties and Global Trends in dM Flares from Simultaneous Photometry and Spectra</i>, ApJS 207, 15 (<code>2013ApJS..207...15K</code>, arXiv:1307.2099). Defines the white-light flare continuum decomposition adopted for the cfg flare color.",
  "h3_203":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_204":"Conference abstracts (DPS / EPSC / IAU), early IRAS-era characterization (pre-Krist 2005), SETI / laser-emission monitoring of nearby M-dwarfs, and interstellar-precursor mission proposals contribute no cfg-decisive content for the stellar synthesis. Planet-specific JWST and ground-based atmosphere papers (Allart 2024 He I; Hirano 2020 Rossiter-McLaughlin) are deferred to the planet Phase 3 follow-up workspace. The full filtered bibliography is preserved in <code>docs/phase3/_bib/au-mic.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_205":"Open items for follow-up",
  "li_206":"<b>AT Microscopii DB entry</b>: AT Mic is a wide common-proper-motion companion to AU Mic at ~46 400 AU (~1.22°), itself a short-period M-dwarf binary and a β Pic MG member. No separate NS DB entry as of this writing. A follow-up Phase 2 should ingest AT Mic A and B and link the system in <code>db/systems/</code>; AU Mic and AT Mic should share a common <code>system_name</code> or <code>cpm_group</code> field.",
  "li_207":"<b>Phase 2 <code>disk_measurements</code> ingest</b>: <code>db/systems/au_mic.json</code> has no <code>disk_measurements</code> block; the geometry adopted here (35–210 AU, 50 K, i = 89.5°, edge-on) was sourced directly from Krist 2005, Schneider 2014, Boccaletti 2015/2018, and Chen 2005. These should be added as a <code>disk_measurements</code> array in the DB for consistency with the standard Phase 2 schema and so that the Kopernicus circumstellar-disk cfg writer can read from a canonical location.",
  "li_208":"<b>Planet b/c/d/e Phase 3 follow-up workspace</b>: the four known planets are out of scope for this stellar synthesis. A dedicated follow-up workspace should produce Phase 3 syntheses for at minimum b (hot Neptune — atmosphere retention under super-flare bombardment) and d (~Earth-mass TTV candidate, the most visually-relevant rocky body). c is a sub-Neptune; e is currently controversial (pl_controv_flag = 1).",
  "li_209":"<b>Cycle phase / activity modulation</b>: AU Mic is in the saturated pre-MS regime and has no observed activity cycle. If a future observing campaign detects one (typical timescale would be ~1–3 years if it exists), a <code>activity_cycle_years</code> entry can be filled.",
  "li_210":"<b>Birth-ring planetesimal mass</b>: Strubbe &amp; Chiang 2006 estimate the parent planetesimal belt mass at roughly 0.01–0.1 M⊕; a future cfg field <code>disk_planetesimal_mass_mearth</code> could parameterize this for in-game lore consistency. Not currently in the standard Decisions schema.",
  "li_211":"<b>Disk-substructure animation period calibration</b>: the cfg animates substructures at the SPHERE-measured 4–10 km/s outflow velocity, but the exact in-game time-mapping requires a gameplay-vs-realism tradeoff decision once the Kopernicus circumstellar cfg writer is exercised. Preserve as a tie-break for the cfg variant.",
  "li_212":"<b>Conservative cfg variant</b>: a static-disk variant preserving the same <code>disk_inner_radius_au</code> / <code>disk_outer_radius_au</code> / <code>disk_dust_temperature_k</code> but with <code>visual_companion_event_disk_substructures_animated = false</code> should be shippable as a fallback for low-end hardware.",

  ko: {
  "p_1":"AU Microscopii (HD 197481, GJ 803, HIP 102409) 는 9.714 pc 거리의 가까운 M1Ve 전주계열 왜성으로 (Gaia DR3 시차 102.94 ± 0.02 mas, 이 DB), NearStars 카탈로그 전체에서 가장 어린 별 중 하나입니다. 나이는 ~22 Myr (Mamajek &amp; Bell 2014 의 β Pictoris 운동성단 isochrone 나이) 이고, AU Mic 은 그 운동성단의 대표 멤버입니다. 기본 파라미터는 frozen Phase 2 레이어에서 가져옵니다. R = 0.862 ± 0.052 R☉ (Gallenne 2022 VLTI/PIONIER, 유일한 refereed 간섭계 반지름 — 널리 인용되는 0.75 R☉ 는 refereed 가 아닌 White 2019 AAS 초록으로 거슬러 올라갑니다. Canonical alternatives 참조), M = 0.50 ± 0.03 M☉ (Plavchan 2020 PMS isochrone), Teff = 3665 ± 31 K (Cristofari 2023 SPIRou 대기 fit) 입니다. 광도는 L = 0.102 L☉ (Donati 2023, log L/L☉ = −0.99 ± 0.01) 로, M1V 치고는 높은데 AU Mic 이 아직 주계열로 수축 중이라 약간 부풀어 있기 때문입니다.",
  "p_2":"카탈로그의 다른 M 왜성과 AU Mic 을 가르는 결정적 특징은 <b>분해된 가장자리 정면 잔해 원반</b> (HST/STIS — Krist 2005, 더 깊은 HST/STIS 재방문 — Schneider 2014, VLT/SPHERE 편광 영상 — Boccaletti 2015, 2018) 입니다. 안쪽 가장자리 ~35 AU 부터 바깥쪽 후광 ~210 AU 까지 뻗어 있으며, edge-on 에서 ≈ 1° 안쪽 각도로 관측됩니다. Multi-epoch SPHERE 영상은 원반 남동쪽 ansa 의 <b>움직이는 substructure</b> 를 분해했고 (Boccaletti 2015 최초 검출, 2018 후속), 바깥 방향으로 4–10 km/s 로 움직입니다 — 케플러 운동보다 빠르며, 현재로서는 항성풍 / 복사압이 planetesimal 충돌과 상호작용해 발생시킨 먼지 ridge 로 가장 잘 설명됩니다 (Chiang &amp; Fung 2017). 거기에 자기 활동도 얹힙니다. kG 급 표면 자기장 (Donati 2023 Zeeman-Doppler imaging), 10³⁴–10³⁵ erg 까지 가는 super-flare (Cully 1993, Smith 1981, eRosita, Tristan 2023 TESS 센서스), 광도 측정 자전 주기 4.86 d 와 다-흑점 복잡도 (Plavchan 2020 TESS), 조용한 태양 평균보다 수십 배 이상인 X 선 광도까지. AU Mic 은 어느 기준으로 보든 NearStars 카탈로그에서 가장 극적인 단독 광원입니다.",
  "p_3":"알려진 네 행성 (AU Mic b — Plavchan 2020 의 통과 hot Neptune, AU Mic c — Martioli 2021 의 통과 sub-Neptune, AU Mic d — Wittrock 2023 의 TTV 전용 지구질량 후보, AU Mic e — Donati 2025 ESPRESSO RV 후보, 논란 있음) 은 모두 ~0.2 AU 안쪽을 돌며 원반 안쪽 가장자리 훨씬 안쪽에 있습니다. 이 항성 합성에서는 행성은 다루지 않고 follow-up 워크스페이스용으로 표시만 해 둡니다. AU Mic 은 넓은 공통 고유운동 동반자 <b>AT Microscopii</b> (그 자체로 단주기 M-왜성 이중성) 도 거느리는데, ~46 400 AU (~1.22°) 떨어져 있고 AT Mic 역시 β Pic MG 멤버이며 AU Mic 과 ~22 Myr 나이를 공유합니다. 이 글 작성 시점에 별도의 NS DB 엔트리는 없습니다.",
  "p_4":"<b>NearStars 시나리오 선택. 매우 어리고 깊은 붉은빛의 M1Ve flare star 로, 살짝 부풀고 전주계열에 있으며, kG 급 자기장과 잦은 super-flare, &gt; 10% 흑점 면적, 그리고 35–210 AU 까지 뻗는 분해된 가장자리 정면 잔해 원반에 애니메이션된 방사형 움직임 substructure 가 얹힌 모습으로 렌더링합니다.</b> 항성 레이어는 frozen Phase 2 출처 (Gallenne 2022 간섭계, Plavchan 2020, Cristofari 2023, Donati 2023, Mamajek &amp; Bell 2014) 위에 다시 정박했고, 반지름 / 질량 / 광도의 divergence 는 문서화했습니다. tie-break 픽은 시각 hex 색조, 원반 substructure 애니메이션 선택, flare 색, 흑점 면적 사이클 위상에 관한 것입니다.",

  "td_136":"high",
  "td_137":"풍압이 바깥으로 가속할 먼지를 공급할 부모 벨트가 필요. Strubbe &amp; Chiang 2006 의 표준 birth-ring 모델",
  "td_138":"<code>visual_companion_event_disk_substructures_animated</code>",
  "td_139":"true",
  "td_140":"low",
  "td_141":"Tie-break. 문헌이 substructure 를 4–10 km/s 로 움직인다고 기술. cfg 는 (정적 텍스처가 아닌) 애니메이션을 채택 — 애니메이션이 AU Mic 원반의 시각적 정체성이므로 interesting-first 적용",
  "h2_142":"Surface synthesis",
  "p_143":"AU Mic 의 광구는 카탈로그에서 가장 깊은 붉은 연속체 중 하나입니다 — 다만 Proxima 나 TRAPPIST-1 host 보다는 따뜻합니다. Teff = 3665 K (Cristofari 2023) 와 R = 0.862 R☉ (Gallenne 2022) 에서 광도는 0.102 L☉ (Donati 2023. 태양의 약 1/10) 로, 대부분의 플럭스가 0.7–2.0 μm 사이로 나옵니다. TiO 밴드가 6500 Å 아래 가시 연속체를 가파르게 억제하고, VO 와 물 밴드가 근적외선을 빚어냅니다. AU Mic 이 전주계열 (~22 Myr) 이라 반지름은 정착된 M1V 보다 부풀어 있는데, Gallenne 2022 간섭계 반지름 0.862 R☉ 는 22 Myr / 0.50 M☉ 의 PARSEC 및 Baraffe 전주계열 진화 트랙과 일관됩니다.",
  "p_144":"표면의 결정적 특징은 <b>흑점 복합체</b> 입니다. Plavchan 2020 TESS 광도는 적어도 세 개의 지속적인 활동 경도를 요구하는 다중 모드 자전 변조를 보이며, Donati 2023 ZDI inversion 은 이를 ±30° 부터 ±60° 사이 위도 띠로 분해합니다 (전체 디스크의 &gt; 10% 면적). cfg 렌더링에서는 <code>spot_coverage_max_fraction = 0.12</code> 로 표현되며, 활동 애니메이션 레이어가 4.86 일 자전 주기에 맞춰 흑점 위치를 순환시킵니다. 가시 흑점은 광구보다 ~500 K 어둡고 (Δ(B-V)_spot ≈ +0.3), flare 없는 구간에서도 V 밴드 광도 진폭 ~3% 를 만듭니다.",
  "p_145":"Granulation, faculae, plage 도 있지만 통합 광도에 대한 기여는 흑점 신호보다 작습니다. 전주계열 수축 덕에 대류 envelope 가 정착한 M-왜성보다 더 격렬합니다 — granulation 셀은 압력 스케일 높이로 스케일하는데, 부푼 반지름 덕에 그 값이 더 큽니다. 서브-각초 렌더링 기준으로 ~50 km granule 을 예상합니다. Beeck et al. (2013, Donati 2023 §3 경유 인용) 의 3D-RHD 모델이 게임 내 애니메이션 광구 텍스처에 쓸 granulation 대비와 시간 스케일 격자를 제공합니다.",
  "p_146":"광물학적으로 광구는 super-solar [Fe/H] ≈ +0.12 (β Pic MG 평균 — Shkolnik 2017. DB 에 AU Mic 직접 측정은 없음) 로, 태양형 metallicity M1V 보다 SED 를 장파장 쪽으로 살짝 reddening 시킵니다. 게임 내 조명 색온도의 분광 분해능에서는 보이지 않지만, 순수한 3665 K Planckian 보다 더 깊은 붉은빛의 <span class=\"hex-chip\" style=\"background:#e0743a\"></span><code>#e0743a</code> 를 정당화하는 근거가 됩니다.",
  "h2_147":"Atmosphere synthesis",
  "p_148":"AU Mic 은 태양 근방에서 색채권과 코로나가 가장 활동적인 별 중 하나입니다 — 외곽 대기가 행성 b/c/d/e 와 잔해 원반의 우주환경 물리 대부분을 구동합니다. 정적 X 선 광도는 log L_X ≈ 29.35 cgs (Tsikoudi &amp; Kellett 2000 ROSAT, Lx = 2.24e29 erg/s) 로, AU Mic 을 <b>포화 영역</b> 에 놓습니다. log(L_X/L_bol) ≈ −3.24 은 빠르게 자전 하는 M-왜성에 대한 경험적 상한 근처입니다. 코로나는 flare 동안 ~10⁷ K 까지 도달합니다.",
  "p_149":"<b>Super-flare 가 에너지 예산을 지배합니다.</b> Cully 1993 EUVE 의 1992 년 9 월 이벤트는 EUV 만 ~10³⁴–10³⁵ erg 를 방출했고 — 당시 까지 기록된 항성 단일 flare 로는 가장 컸습니다. Tristan 2023 (arXiv:2306.00077) 은 TESS Sectors 1+27 flare 센서스에서 sector 당 ~10³¹ erg 위 ≥ 150 이벤트를 셌습니다. 적분하면 이 에너지 임계값 위 평균 flare 율은 5.6 이벤트/일이며, 누적 flare 빈도 분포는 연간 ≥10³⁴ erg 이벤트가 여러 번 발생하는 수준까지 뻗습니다. Davenport et al. 2020 (TESS 첫해 M-왜성 flare 서베이) 도 같은 flare 율 분포 형태를 확인하며, AU Mic 은 활동적 M1V locus 의 고에너지 꼬리에 위치합니다.",
  "p_150":"색채권은 Hα 방출 (정적에서 EW ≈ 1 Å, flare 동안 수 Å), He I 10830 Å 흡수-방출 순환, 폭이 넓은 Mg II h&amp;k 로 채워집니다. Lyman-α 의 UV 플럭스는 태양의 10²–10³ 배 높습니다. 전이 영역은 매우 밝습니다 — Loyd et al. 2018 이 포화 활동 locus 와 일관된 FUV 플럭스를 측정했습니다. 활동 사이클이 이를 변조하지 않는데 — AU Mic 은 사이클을 보이기에는 너무 어리고 너무 포화돼 있어 — 고에너지 출력은 수십 년 단위에서 거의 일정하며, 준-확률적인 super-flare 가 박자를 찍습니다.",
  "p_151":"항성풍도 그에 맞춰 강합니다. 질량 손실률은 ~10× 태양으로 추정됩니다 (Plavchan 2020 §4 배경 맥락. Boccaletti 2015 + Chiang &amp; Fung 2017 의 원반 substructure inversion). 이 바람이 움직이는 원반 substructure 를 발사하는 엔진입니다 — 35 AU 에서 원반 먼지에 가해지는 바람의 ram 압이 작은 입자를 4–10 km/s 로 바깥쪽으로 가속하기에 충분하며, 이는 Boccaletti 가 측정한 피처 속도와 견줄 만하고 같은 반지름 케플러 운동보다 수십 배 큽니다. NearStars cfg 렌더링에서는 이 사실이 원반 애니메이션을 항성 활동 레이어에 묶습니다 — super-flare 이벤트 후 substructure 가 더 빨라지고 사이에는 느려집니다. 이벤트 빈도가 충분히 높아 관측 시간 척도 에서 원반이 사실상 &quot;정적&quot; 으로 보이지 않습니다.",
  "p_152":"게임 내 행성 대기에 대한 함의는 가혹합니다 — AU Mic b 거리 (0.07 AU) 에서 XUV 플럭스는 지구의 ~10⁴ 배이며, super-flare 피크는 거기서 또 한 자릿수 더 큽니다. 가까운 어떤 행성이든 대기 보전을 위해서는 강한 자기 차폐 또는 지속적인 outgassing 원천이 필요하며, 이것이 b/c/d/e 의 Phase 3 follow-up 선택지를 제약합니다.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"4.86 일 자전 주기 (Plavchan 2020 — TESS 광도 변조) 는 주계열 M-왜성 기준으로 빠르지만 전주계열 M1V 의 특징입니다. 22 Myr 의 AU Mic 에서 Skumanich 식 braking 은 막 작동하기 시작했을 뿐이라, 자기 braking 으로 spin down 할 시간이 없어 자전이 빠릅니다. 자전축은 edge-on 과 일관됩니다 (v sin i ≈ 9 km/s 는 R = 0.862 R☉ 과 P = 4.86 d 에서 sin i ≈ 1 을 함의), 자전축을 원반의 edge-on 경사 ~89° 와 정렬시킵니다. 이는 일관된 각운동량 장에서 태어난 별에 기대되는 결과입니다.",
  "p_155":"여러 활동 경도가 단일 사인파로는 모델링할 수 없는 복잡한 자전 광도곡선을 만듭니다. Plavchan 2020 은 적어도 세 개의 서로 다른 경도에서 흑점 영역을 찾았고, Donati 2023 ZDI 가 이를 위도 띠로 분해했습니다. cfg 의 활동 애니메이션 레이어는 4.86 d 자전에 맞춰 흑점 위치를 순환시키며, 다-경도 패턴은 게임 내 광도곡선이 단일-흑점 별의 자전 고조파 함량의 약 3 배를 갖게 만듭니다.",
  "p_156":"Asteroseismic 제약은 불가능합니다 — AU Mic 은 너무 차갑고, 너무 작고, 자기 활동이 너무 강해 p-mode 진동이 검출 가능하지 않습니다. 차등 회전은 α ≈ 0.04 (Donati 2023, 태양 값과 견줄 만함) 로 제약되지만 cfg 에 렌더링하기에는 너무 미묘합니다.",
  "p_157":"자전축 경사는 원반과 v sin i 로 90° 의 ~1° 안쪽에 고정됩니다. NearStars cfg 는 시각적 일관성을 위해 원반면과 정렬한 자전축을 채택합니다 — 플레이어가 AU Mic 을 edge-on (원반이 보이는 유일한 방향) 으로 볼 때, 자전축도 거의 천구면 안에 놓입니다. 이는 흑점 피처의 자전 단축 (고위도에서의 foreshortening) 이 상당하며 반드시 렌더링되어야 함을 의미합니다.",
  "h2_158":"Canonical alternatives",
  "p_159":"<b>반지름 — refereed 간섭계 vs 커뮤니티 표준값.</b> cfg 는 Gallenne 2022 (VLTI/PIONIER, θ_LD 0.825 mas) 의 R = 0.862 ± 0.052 R☉ 를 채택합니다. 유일한 <i>refereed</i> 간섭계 반지름이기 때문입니다. 널리 인용되는 0.75 R☉ 는 White et al. 2019 로 거슬러 올라가는데, 이는 refereed 가 아닌 AAS 학회 초록으로만 존재합니다 (저널 논문도 arXiv 도 없음). Donati 2023 은 L + Teff 로부터 0.78–0.82 R☉ 를 추정해 둘 사이에 놓이면서 더 큰 값을 지지합니다. 미래 cfg 가 0.75 커뮤니티 값을 대체 시나리오로 노출할 수는 있지만, 원칙적 기본값은 refereed 간섭계 반지름입니다.",
  "p_160":"<b>질량 — Plavchan vs Donati.</b> cfg 는 M = 0.50 ± 0.03 M☉ (Plavchan 2020 PMS isochrone, 모든 행성 논문에 전파된 커뮤니티 표준) 를 씁니다. Donati 2023 은 Dartmouth 트랙에서 더 높은 0.60 ± 0.04 M☉ 를 유도합니다.",
  "p_161":"<b>광도 — Donati vs Plavchan.</b> cfg 는 L = 0.102 L☉ (Donati 2023, log L = −0.99) 를 씁니다. Plavchan 2009 의 SED 는 0.09 L☉ 를 줍니다. 둘은 ~10% 안에서 일치합니다.",
  "p_162":"<b>활동 지수.</b> AU Mic 은 대류 dynamo 를 가진 M 왜성이라 log R&#x27;HK 가 원리상 물리적으로 정의 가능하지만, frozen Phase 2 레이어에는 색채권 log R&#x27;HK 가 없습니다 — cfg 활동 proxy 는 X 선 log(Lx/Lbol) ≈ −3.24 (Tsikoudi &amp; Kellett 2000) 로, 포화 천장 근처입니다. (앞서의 −3.9 log R&#x27;HK 수치는 출처 없는 placeholder 였습니다.)",
  "h2_163":"Visual styling",
  "p_164":"AU Mic 의 시각적 표현은 NearStars 카탈로그에서 가장 독특하며 네 요소를 결합합니다.",
  "li_165":"<b>항성 디스크</b> — <span class=\"hex-chip\" style=\"background:#e0743a\"></span><code>#e0743a</code> 로 색조 입힌 깊은 붉은빛의 M1V 로, AU Mic b (0.07 AU) 에서 본 각지름 1.5° 를 채우며 c (0.119 AU) 에서는 0.8° 입니다. 지구에서 본 일몰의 태양과 비슷한 색이지만 스펙트럼은 훨씬 더 붉으며, 렌더링은 광도 hex 색조와 SED 조명 색온도 (3665 K) 를 모두 사용해 가까운 천체의 장면 조명을 구동합니다.",
  "li_166":"<b>흑점과 faculae</b> — 활동 피크 동안 가시 디스크의 &gt; 10% 를 덮는 다-흑점 복합체. 흑점 사이를 잇는 faculae 와 함께 어두운 패치로 렌더링됩니다. 흑점 위치는 4.86 d 주기에서 자전하며, 자전 광도곡선 진폭은 정적 상태에서도 V 밴드 ~3% 입니다.",
  "li_167":"<b>Flare</b> — 일시적 밝아짐 이벤트로 렌더링되며 <code>visual_flare_color_hex = #ff9050</code> (백색광 flare 연속체, ~9000 K 흑체 온도가 가시광 으로 이동) 입니다. 10³¹ erg 위 5.6/일 flare 율은 플레이어가 게임 내 하루에 여러 차례 flare 를 본다는 뜻이며, 10³⁴ erg super-flare 는 연간 여러 번 발생해 10–60 분간 1–3 등급의 극적인 밝아짐을 만듭니다. Cully 1993 EUVE 이벤트가 특징적으로 보였던 QPO 변조는 flare 감쇠 꼬리의 느린 맥동으로 렌더링됩니다.",
  "li_168":"<b>가장자리 정면 잔해 원반</b> — 시스템에서 단연 가장 그림이 되는 요소입니다. 원반은 ~35 AU 안쪽 가장자리 (0.1 AU 의 가상 행성 에서 본 AU Mic 중심과의 각거리 ~3.6°) 부터 ~210 AU 바깥쪽 후광까지 뻗습니다. edge-on (i = 89.5°) 으로 보면 AU Mic 양쪽 하늘을 이등분하는 가늘고 밝은 줄로 보이며, 표면 밝기는 배경으로 부드럽게 사라집니다. cfg 원반 색조 <span class=\"hex-chip\" style=\"background:#e3f0ff\"></span><code>#e3f0ff</code> 는 파랑입니다 — AU Mic 원반은 산란광에서 파란색으로 측정됐고 (Krist 2005, B/I ~ 1.6. 작고 다공성인 입자), Mie 반사율 합성이 이를 재현합니다 (B/I 1.74). 먼지 온도 ~50 K 는 광학 대역에서 원반 자체의 열복사가 보이기에는 너무 차가우므로, 이건 순수한 청색-기울기 산란입니다. vivid cfg 팩은 이를 <span class=\"hex-chip\" style=\"background:#acd6ff\"></span><code>#acd6ff</code> 로 채도를 올리며, 렌더러가 그 위에 붉은 M1V 별빛을 입힙니다.",
  "li_169":"<b>원반의 움직이는 substructure (애니메이션)</b> — cfg 의 가장 야심찬 시각 피처입니다. Multi-epoch SPHERE 영상 (Boccaletti 2015, 2018) 은 남동쪽 ansa 를 따라 식별 가능한 다섯 개의 밀도 피처를 추적했고, 이들이 바깥 방향으로 4–10 km/s 로 — 케플러 자전으로는 너무 빠른 속도로 — 움직였습니다. 항성풍 / 복사압 가속에 기인한다고 봅니다 (Chiang &amp; Fung 2017). cfg 는 정적 텍스처가 아니라 애니메이션 렌더링을 선택합니다 — 움직이는 피처가 문헌에서 AU Mic 을 구별짓는 특성이며, 정적 원반은 이를 잃습니다. 한 피처가 가시 원반 (35 부터 210 AU) 을 가로지르는 시간이 게임 내 환산 수개월 정도가 되도록 애니메이션 주기를 스케일했습니다. Tie-break. 관측은 애니메이션이나 정적 렌더 둘 다 허용하지만 cfg 는 애니메이션을 택합니다.",
  "p_170":"가까이 있는 네 행성 — AU Mic b 가 0.07 AU, c 가 0.119 AU, d 가 ~0.105 AU (TTV 유도), e 가 ~0.19 AU (Donati 2025 RV 후보) — 모두 원반 안쪽 가장자리 안쪽에서 통과합니다. AU Mic 시스템의 먼 지점 같은 가상의 관측 지점에서 본다면, 전경에서는 행성이 밝은 항성 디스크를 가로지르고 배경에서는 밝은 원반이 양옆으로 1–6° 펼쳐지는 — 카탈로그의 어떤 시스템과도 비교할 수 없는 시각적 장면이 펼쳐집니다. b/c/d/e 의 행성별 합성은 별도의 follow-up 워크스페이스 로 미룹니다.",
  "p_171":"AU Mic 의 넓은 동반자 AT Mic 은 ~46 400 AU (천구상 1.22°) 떨어진 M-왜성 이중성으로, AU Mic 하늘에서는 적당한 밝기의 붉은 점광원으로 보이며 AU Mic 의 어떤 행성에서 봐도 맨눈 거리에서 이중성으로 분해되지 않습니다. 현재 NS DB 에 별도 엔트리가 없습니다. Open items 참조.",
  "h2_172":"Bibliography",
  "h3_173":"Read (visual-informative, drove decisions above)",
  "li_174":"<b>Gallenne A. et al. 2022</b> — <i>The radius and effective temperature of the pre-main-sequence M dwarf AU Mic via VLTI/PIONIER</i>, A&amp;A 665, A41 (<code>2022A&amp;A...665A..41G</code>, arXiv:2207.04116). 유일한 <i>refereed</i> 간섭계 반지름. θ_LD = 0.825 ± 0.033 ± 0.038 mas → R = 0.862 ± 0.052 R☉. Phase 2 recommended 반지름.",
  "li_175":"<b>Cristofari P. I. et al. 2023</b> — <i>Atmospheric parameters and magnetic fields of M dwarfs from SPIRou</i>, MNRAS 522, 1342 (<code>2023MNRAS.522.1342C</code>, arXiv:2303.11241). 자기장 포함 SPIRou 대기 fit. Teff = 3665 ± 31 K, [M/H] = +0.12 ± 0.10, log g = 4.52. Phase 2 recommended Teff + 금속도.",
  "li_176":"<b>Tsikoudi V. &amp; Kellett B. J. 2000</b> — <i>ROSAT all-sky survey X-ray emission from late-type stars</i>, MNRAS 319, 1147 (<code>2000MNRAS.319.1147T</code>). AU Mic 정적 Lx = 2.24 × 10²⁹ erg/s (log Lx 29.35, log Lx/Lbol ≈ −3.24). Phase 2 recommended X 선 활동 proxy. (앞서의 Stelzer 2013 인용을 대체. 온라인에서 인용되는 NEXXUS 2.51e29 값은 AU Mic 에 대해 틀림 — NEXXUS 는 G/K 표본임.)",
  "li_177":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS 가 발견한 AU Mic b 의 통과 hot Neptune. 4.86 d 자전 주기. PMS-isochrone 질량 0.50 ± 0.03 M☉ (Phase 2 recommended 질량). 다-흑점 복잡도.",
  "li_178":"<b>Krist J. E. et al. 2005</b> — <i>Hubble Space Telescope Advanced Camera for Surveys Coronagraphic Imaging of the AU Microscopii Debris Disk</i>, AJ 129, 1008 (<code>2005AJ....129.1008K</code>). HST 분해 coronagraphic 영상의 첫 사례. 안쪽 가장자리 ~17–43 AU, 바깥 확장 &gt; 200 AU. 이후 모든 영상이 다듬어 간 기하학적 골격을 제공.",
  "li_179":"<b>Schneider G. et al. 2014</b> — <i>Probing for Exoplanets Hiding in Dusty Debris Disks: Disk Imaging, Characterization, and Exploration with HST/STIS Multi-Roll Coronagraphy</i>, AJ 148, 59 (<code>2014AJ....148...59S</code>, arXiv:1406.7303). HST/STIS 깊은 재방문. 표면 밝기 프로파일 정밀화. 바깥 후광을 ~210 AU 까지 추적. 안쪽 가장자리 ~35 AU 확인.",
  "li_180":"<b>Boccaletti A. et al. 2015</b> — <i>Fast-moving features in the debris disk around AU Microscopii</i>, Nature 526, 230 (<code>2015Natur.526..230B</code>, arXiv:1510.06434). VLT/SPHERE 편광 영상 에서 남동쪽 ansa 의 빠르게 움직이는 다섯 피처 최초 검출. 바깥 방향 4–10 km/s.",
  "li_181":"<b>Boccaletti A. et al. 2018</b> — <i>Two years of monitoring the AU Microscopii debris disk with SPHERE: New properties for the fast-moving features</i>, A&amp;A 614, A52 (<code>2018A&amp;A...614A..52B</code>, arXiv:1804.04574). Multi-epoch 추적으로 피처 운동 확인. 속도 정밀도 확보. 운동이 케플러가 아니라 항성풍 발사라는 cfg 관련 제약 확정.",
  "li_182":"<b>Chiang E. &amp; Fung J. 2017</b> — <i>Stellar-wind-driven Dust Ridges in the AU Mic Debris Disk</i>, ApJ 848, 4 (<code>2017ApJ...848....4C</code>, arXiv:1707.08970). 움직이는 substructure 의 물리 모델. 항성풍 / 복사압이 작은 입자를 가속하며, ~35 AU 에 planetesimal 벨트 birth ring 이 자리잡음. cfg <code>disk_morphology</code> 와 애니메이션 선택을 구동.",
  "li_183":"<b>Strubbe L. E. &amp; Chiang E. 2006</b> — <i>Dust Dynamics, Surface Brightness Profiles, and Thermal Spectra of Debris Disks: The Case of AU Microscopii</i>, ApJ 648, 652 (<code>2006ApJ...648..652S</code>, arXiv:astro-ph/0606435). planetesimal 벨트를 ~35 AU 에 놓는 birth-ring 모델. SED fit 이 먼지 온도를 ~50 K 로 제약.",
  "li_184":"<b>Chen C. H. et al. 2005</b> — <i>Spitzer IRS Spectroscopy of IRAS-Discovered Debris Disks</i>, ApJ 634, 1372 (<code>2005ApJ...634.1372C</code>). Spitzer 차가운 성분 SED-fit 이 먼지 온도를 정박.",
  "li_185":"<b>Mamajek E. E. &amp; Bell C. P. M. 2014</b> — <i>On the age of the beta Pictoris moving group</i>, MNRAS 445, 2169 (<code>2014MNRAS.445.2169M</code>, arXiv:1409.2737). β Pic MG (와 따라서 AU Mic) 의 isochrone 나이 22 ± 3 Myr. LDB 로 확인.",
  "li_186":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>, arXiv:2304.09642). SPIRou ZDI. 소규모 평균 자기장 ⟨B⟩ = 2.61 ± 0.05 kG, 대규모 자기장 550 ± 30 G (Phase 2 recommended 자기 값). log L/L☉ = −0.99 ± 0.01 → L 0.102 (Phase 2 recommended 광도). V−I Teff 3700 ± 70 과 Dartmouth 질량 0.60 (divergence 대안).",
  "li_187":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). host 별 N-body + TTV 동역학 질량 0.51 ± 0.028 M☉. 행성 d 를 TTV 전용 후보로 도입.",
  "li_188":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS Sectors 1+27 flare 센서스. 10³¹ erg 위 비율 5.6 이벤트/일. 누적 flare 빈도 분포.",
  "li_189":"<b>Davenport J. R. A. et al. 2020</b> — <i>The Evryscope Fast Transient Engine: real-time detection for rapidly evolving transients</i>, ApJ 905, 107 (<code>2020ApJ...905..107D</code>, arXiv:2010.02392). TESS 첫해 M-왜성 flare 서베이 맥락. AU Mic 은 M1V flare 활동의 고에너지 꼬리에 위치.",
  "li_190":"<b>Cully S. L. et al. 1993</b> — <i>The EUVE observation of the 1992 September X-ray flare on AU Mic</i>, ApJ 414, L49 (<code>1993ApJ...414L..49C</code>). 최초의 mega-flare 검출. EUV 에서 ~10³⁴–10³⁵ erg.",
  "li_191":"<b>Stelzer B. et al. 2013</b> — <i>The UV and X-ray activity of the M dwarfs within 10 pc of the Sun</i>, MNRAS 431, 2063 (<code>2013MNRAS.431.2063S</code>, arXiv:1302.1061). AU Mic 정적 X 선. 맥락 정보뿐 — frozen Phase 2 bib 에는 없음 (cfg X 선 proxy 는 Tsikoudi &amp; Kellett 2000, log Lx 29.35).",
  "h3_192":"Read (context / methodology, not decision-driving)",
  "li_193":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i> (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). TESS + 지상 후속으로 AU Mic c 확인. 항성 결정적이지 않지만 행성 명단을 정의.",
  "li_194":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterization with ESPRESSO</i> (<code>2024A&amp;A...689A.132M</code>). b/c 의 궤도와 질량 파라미터 정밀화. 항성 결정적이지 않음.",
  "li_195":"<b>Donati J.-F. et al. 2025</b> — <i>AU Mic system characterized with ESPRESSO</i> (<code>2025A&amp;A...700A.227D</code>). AU Mic e 후보 추가. 항성 합성에는 맥락 정보뿐.",
  "li_196":"<b>Shkolnik E. L. et al. 2017</b> — <i>HAZMAT II: Ultraviolet Variability of Low-Mass Stars in the GALEX Archive</i>, ApJ 838, 87 (<code>2017ApJ...838...87S</code>, arXiv:1611.02835). β Pic MG 와 어린 M-왜성 활동 보정. AU Mic 포화 상태에 대한 맥락.",
  "li_197":"<b>Smith B. A. &amp; Terrile R. J. 1981</b> — <i>A Circumstellar Disk Around AU Microscopii?</i> (분해 이전, 초기 IR 초과 검출).",
  "h3_198":"Read (instrument / non-cfg-decisive)",
  "li_199":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i>, ApJ 757, 112 (<code>2012ApJ...757..112B</code>, arXiv:1208.2431). CHARA M-왜성 간섭계 보정. Donati 2023 반지름 의 맥락이지만 AU Mic 직접 측정은 없음.",
  "li_200":"<b>Loyd R. O. P. et al. 2018</b> — <i>MUSCLES Treasury Survey V: FUV Flares On Active and Inactive M Dwarfs</i>, ApJ 867, 71 (<code>2018ApJ...867...71L</code>, arXiv:1809.07322). AU Mic 을 포함한 어린 M-왜성 비교 집합의 FUV flare 통계.",
  "li_201":"<b>Beeck B. et al. 2013</b> — <i>3D radiative-hydrodynamic simulations of cool main-sequence stars</i> (Donati 2023 §3 경유 인용). Granulation 모델 격자.",
  "li_202":"<b>Kowalski A. F. et al. 2013</b> — <i>Time-resolved Properties and Global Trends in dM Flares from Simultaneous Photometry and Spectra</i>, ApJS 207, 15 (<code>2013ApJS..207...15K</code>, arXiv:1307.2099). cfg flare 색에 채택된 백색광 flare 연속체 분해를 정의.",
  "h3_203":"Not read — no arXiv preprint or low-priority (~40 papers)",
  "p_204":"학회 초록 (DPS / EPSC / IAU), 초기 IRAS 시기 특성화 (Krist 2005 이전), 가까운 M-왜성에 대한 SETI / 레이저 방출 모니터링, 성간 전구 미션 제안은 항성 합성에 cfg-결정적인 내용을 더하지 않습니다. 행성별 JWST 와 지상 대기 논문 (Allart 2024 He I, Hirano 2020 Rossiter-McLaughlin) 은 행성 Phase 3 follow-up 워크스페이스로 미룹니다. 전체 필터링된 bib 는 <code>docs/phase3/_bib/au-mic.yaml</code> 에 <code>status: skipped</code> annotation 으로 보존됩니다.",
  "h2_205":"Open items for follow-up",
  "li_206":"<b>AT Microscopii DB 엔트리</b>. AT Mic 은 AU Mic 의 넓은 공통 고유운동 동반자로 ~46 400 AU (~1.22°) 떨어져 있으며, 그 자체로 단주기 M-왜성 이중성이자 β Pic MG 멤버입니다. 이 글 작성 시점 까지 별도의 NS DB 엔트리가 없습니다. follow-up Phase 2 가 AT Mic A 와 B 를 ingest 하고 <code>db/systems/</code> 에서 시스템을 연결해야 하며, AU Mic 과 AT Mic 은 공통 <code>system_name</code> 또는 <code>cpm_group</code> 필드를 공유해야 합니다.",
  "li_207":"<b>Phase 2 <code>disk_measurements</code> ingest</b>. <code>db/systems/au_mic.json</code> 에는 <code>disk_measurements</code> 블록이 없습니다. 여기서 채택한 기하 (35–210 AU, 50 K, i = 89.5°, edge-on) 는 Krist 2005, Schneider 2014, Boccaletti 2015/2018, Chen 2005 에서 직접 가져왔습니다. 표준 Phase 2 스키마와의 일관성을 위해, 그리고 Kopernicus 주변원반 cfg 작성기가 canonical 위치에서 읽을 수 있도록 <code>disk_measurements</code> 배열로 DB 에 추가해야 합니다.",
  "li_208":"<b>행성 b/c/d/e Phase 3 follow-up 워크스페이스</b>. 알려진 네 행성은 이 항성 합성의 범위 밖입니다. 전용 follow-up 워크스페이스가 최소한 b (hot Neptune — super-flare 폭격 하의 대기 보전) 와 d (~지구질량 TTV 후보, 시각적으로 가장 관련 있는 암석 천체) 의 Phase 3 합성을 만들어야 합니다. c 는 sub-Neptune. e 는 현재 논란 상태입니다 (pl_controv_flag = 1).",
  "li_209":"<b>사이클 위상 / 활동 변조</b>. AU Mic 은 포화된 전주계열 영역에 있어 관측된 활동 사이클이 없습니다. 미래의 관측 캠페인이 사이클을 검출하면 (존재한다면 전형적 시간 스케일은 ~1–3 년) <code>activity_cycle_years</code> 엔트리를 채울 수 있습니다.",
  "li_210":"<b>Birth-ring planetesimal 질량</b>. Strubbe &amp; Chiang 2006 은 부모 planetesimal 벨트 질량을 대략 0.01–0.1 M⊕ 로 추정합니다. 미래의 cfg 필드 <code>disk_planetesimal_mass_mearth</code> 가 게임 내 lore 일관성을 위해 이를 파라미터화할 수 있습니다. 현재는 표준 Decisions 스키마에 없습니다.",
  "li_211":"<b>원반 substructure 애니메이션 주기 보정</b>. cfg 는 SPHERE 가 측정한 4–10 km/s 유출 속도로 substructure 를 애니메이션 하지만, 정확한 게임 내 시간 매핑은 Kopernicus 주변원반 cfg 작성기를 실제로 돌릴 때 게임플레이-vs-사실성 trade-off 결정이 필요합니다. cfg variant 의 tie-break 로 보존합니다.",
  "li_212":"<b>보수적 cfg variant</b>. 같은 <code>disk_inner_radius_au</code> / <code>disk_outer_radius_au</code> / <code>disk_dust_temperature_k</code> 를 유지하면서 <code>visual_companion_event_disk_substructures_animated = false</code> 로 바꾼 정적-원반 variant 가 저사양 하드웨어용 fallback 으로 배포 가능해야 합니다.",
  "h2_213":"Related",
  "li_214":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 테이블의 스키마 출처",
  "li_215":"<a href=\"alpha-centauri-a.md\">alpha-centauri-a</a> — canonical 항성 합성 구조 템플릿 (이 파일은 그 8-섹션 레이아웃을 따름)",
  "li_216":"<a href=\"proxima-cen.md\">proxima-cen</a> — 비교 M 왜성 (M5.5Ve, ~4.85 Gyr) — AU Mic 의 어린 전주계열 M1Ve 상태와 대비",
  "title":"AU Microscopii — Phase 3 Synthesis",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
