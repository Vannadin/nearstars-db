  en: {
  "p_1":"Teegarden&#x27;s Star b is a 1.16 M⊕ minimum-mass rocky planet (probably ~1.34 M⊕ true mass at typical i = 60° geometric inclination; Fujii 2026) on a 4.91-day orbit around the M7.0 V host. The semi-major axis of 0.0259 AU and the host bolometric luminosity of 7.32 × 10⁻⁴ L☉ combine to yield an insolation of 1.08 ± 0.08 S⊕ — slightly higher than Earth&#x27;s, placing b at the inner edge of the conservative habitable zone. Equilibrium temperature with Bond albedo 0.3 is 277 ± 5 K (Dreizler 2024); with zero albedo it is ~280 K (Fujii 2026 benchmark). Both numbers straddle the freezing-point of water, making b one of the most genuinely Earth-analog candidates in the NearStars catalog by mass and insolation alone.",
  "p_2":"The planet is non-transiting; mass and radius are both derived rather than measured. Mass comes from a multi-instrument RV fit (CARMENES + ESPRESSO + MAROON-X + HPF, 355 nightly-binned measurements, Dreizler 2024). The cfg radius of 1.05 R⊕ follows the Zeng 2016 / 2019 Earth- like-bulk mass-radius relation, as used uniformly by all the recent GCM modelling papers (Boukrouche 2025, Fujii 2026, Hammond 2025 for sister planets). The mass is a minimum mass (m sin i), so the true mass-radius could be substantially higher at lower orbital inclinations, but the radius prediction at 1.16-1.34 M⊕ is robust to ~5% across the various mass-radius scalings.",
  "p_3":"The defining cfg-relevant question for b is <b>runaway vs habitable</b>. Boukrouche 2025 (arXiv:2510.11940) uses the Isca GCM at the Phase 2- recommended stellar luminosity (instellation = 1481 W/m²) and finds b remains comfortably below the runaway greenhouse threshold for <b>both</b> α = 0.07 (ocean) and α = 0.30 (land) surface albedos — meaning a 1-bar Earth-like atmosphere with present-day composition is sustainable. With the Dreizler 2024 alternative stellar parameters (Teff = 3034 K, R = 0.120 R☉) the instellation rises to 1565 W/m² and the same GCM puts b past the runaway threshold. Phase 2 picked Schweitzer 2019&#x27;s R = 0.107 R☉ as recommended; this synthesis adopts the corresponding <b>habitable</b> cfg scenario. The runaway-variant cfg is preserved in Open items.",
  "p_4":"<b>Scenario choice for NearStars: temperate aquaplanet with 1-bar Earth-like N₂/O₂/CO₂ atmosphere, ocean-bearing, tidally-locked &quot;eyeball&quot; geometry with open water near the substellar point, a high-altitude (1-10 mbar) stratospheric cloud deck, and sea-ice elsewhere.</b> This is the showcase habitable cfg in the Teegarden system. The alternative runaway-Venus cfg (consistent with the Dreizler 2024 stellar-parameter side of the uncertainty) is preserved as a backup variant in Open items.",
  "h2_5":"Decisions",
  "p_6":"Kopernicus / atmosphere cfg-ready values. <code>Confidence</code>: high = directly measured or tightly constrained, medium = theoretical with strong support, low = aesthetic choice within the allowed window.",

  "h2_191":"Surface synthesis",
  "p_192":"Teegarden b is the system&#x27;s most habitable candidate by every standard metric. Three converging lines of evidence:",
  "p_193":"1. <b>Insolation</b> S = 1.08 ± 0.08 S⊕ (Dreizler 2024) — slightly above Earth&#x27;s. With the recommended Phase 2 stellar parameters this corresponds to 1481 W/m² incident flux. Boukrouche 2025 (Isca GCM with present-day Earth atmospheric composition) explicitly finds that at 1481 W/m² b remains below the runaway greenhouse threshold for both ocean (α_s = 0.07) and land (α_s = 0.30) surface albedos. The alternative 1565 W/m² scenario (using Dreizler 2024 alternative stellar parameters) tips into runaway, but Phase 2 prefers the lower-luminosity Schweitzer / Cifuentes solution.",
  "p_194":"2. <b>Mass and bulk density.</b> With m sin i = 1.16 M⊕ and an assumed Zeng 2016 Earth-like radius of 1.05 R⊕, the inferred bulk density is ~5.5 g/cc — Earth-like, consistent with a silicate-iron rocky interior with a non-trivial water reservoir. The true mass at typical i = 60° geometric inclination is ~1.34 M⊕ (Fujii 2026); this doesn&#x27;t change the radius prediction by more than ~5%.",
  "p_195":"3. <b>Theoretical habitability.</b> Wandel 2019 (arXiv:1906.07704) applies a 1D climate-habitability model and finds the habitable atmospheric heating range for b at S = 1.15 S⊕ extends across H_atm = 0.32 to 3.7 for f = 0.5 (moderate atmospheric circulation) — i.e., from sub-Mars greenhouse all the way to substantial CO₂ enhancement. The Earth-analog atmosphere (H_atm ≈ 1) is comfortably inside this range.",
  "p_196":"For the surface morphology, the tidally-locked aquaplanet template (Pierrehumbert 2011, Hu &amp; Yang 2014, applied here via Boukrouche 2025 Isca GCM) gives a distinctive &quot;eyeball Earth&quot; pattern shifted slightly warmer than the TRAPPIST-1 e analog:",
  "li_197":"<b>Substellar warm zone</b> (≤ 45° from substellar point): open ocean for the α_s = 0.07 case; surface temperature ~295 K at substellar, dropping to ~265 K at the ice line. The warm-zone radius is ~10° larger than TRAPPIST-1 e&#x27;s 35° because Teegarden b receives 1.6× more insolation.",
  "li_198":"<b>Mid-latitudes / mid-longitudes</b> (45-90° from substellar): sea ice with thickness from a few meters at the ice line to tens of meters at the terminator.",
  "li_199":"<b>Terminator and nightside</b> (&gt;90° from substellar): thick glacial ice over a frozen ocean substrate; surface temperature ~240 K (Boukrouche 2025 GCM nightside).",
  "p_200":"<b>Colour choice.</b> Same as TRAPPIST-1 e — water-ice albedo is intrinsically 0.6-0.8 and bluish-white, but the 2904 K M7 V illumination shifts perceived hue heavily toward red-orange. The combination produces a warm cream-white for ice cover (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) and a dark navy-violet for deep ocean (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>). The substellar zone is the most visually striking feature — a dark &quot;pupil&quot; of open water surrounded by a fractal sea-ice transition band and uniform glacial ice farther out.",
  "p_201":"<b>Exposed bedrock.</b> Limited (~5-10% of surface area). Bedrock exposure is concentrated at the terminator where glacial flow has thinned ice over pressure ridges and where minor tectonic uplift could expose dark mafic crust under the perpetually red-tinted illumination. Accent tint <span class=\"hex-chip\" style=\"background:#8a6a48\"></span><code>#8a6a48</code> reads as muted weathered basalt under M7 V light.",
  "h2_202":"Atmosphere synthesis",
  "p_203":"The cfg adopts the <b>1-bar N₂-rich aquaplanet atmosphere</b> following Boukrouche 2025 (Isca GCM) and Boukrouche 2026 (LIFE hemispheres paper). The explicit composition used in those simulations is essentially present-day Earth&#x27;s:",
  "li_204":"<b>Pressure</b> 1 bar (100 kPa) — Earth-analog, sustainable below runaway threshold at 1481 W/m² per Boukrouche 2025.",
  "li_205":"<b>Composition</b> N₂ 78%, O₂ 21% (abiotic photolytic — the cfg assumes no biosphere; Lincowski 2018-style M-dwarf abiotic O₂ buildup), CO₂ 400 ppm (Earth modern), CH₄ 1 ppm trace, H₂O 0.1-1% saturated, Ar 0.5%.",
  "li_206":"<b>Clouds.</b> The Boukrouche 2026 Isca GCM Fig. 1-2 shows a high cloud deck around 1-10 mbar on the dayside (stratospheric for Earth) plus mid-altitude water clouds (~500 mbar) near terminators. Total cloud cover ~55% globally. The dayside high-cloud deck is optically thin enough not to dominate albedo — the outgoing longwave radiation pattern is driven primarily by atmospheric temperature structure, not cloud opacity. This is a key cfg distinction: unlike TRAPPIST-1 e (where mid-altitude stratocumulus dominate), b&#x27;s dayside cloud signature is in the stratosphere.",
  "p_207":"<b>Sky appearance.</b> The 1-bar N₂ atmosphere has Earth-like Rayleigh scattering at short wavelengths, but the 2904 K stellar SED has almost no flux below 0.5 μm — so the scattered sky color is dim and shifted strongly toward red-orange. The zenith sky is a dim red-blue mix (~<span class=\"hex-chip\" style=\"background:#3a3040\"></span><code>#3a3040</code>), transitioning to a warm orange near the horizon (~<span class=\"hex-chip\" style=\"background:#a06040\"></span><code>#a06040</code>). Water cloud features appear as warm cream patches (<span class=\"hex-chip\" style=\"background:#c0a890\"></span><code>#c0a890</code>) catching the red stellar light.",
  "p_208":"The host star dominates the daytime sky at angular size 2.20° (about 4× the Sun&#x27;s angular size from Earth, comparable to TRAPPIST-1 e&#x27;s view of TRAPPIST-1). Surface illumination at the substellar point is about 1.08 × Earth&#x27;s bolometric flux — but with the spectral peak in the near-infrared, the visible-light illumination is more like a heavily overcast Earth afternoon.",
  "p_209":"<b>Nightside.</b> No direct stellar illumination; the only light sources are (a) scattered light from the dayside transported via atmospheric circulation (small but non-negligible — Boukrouche 2025 GCM shows nightside temperatures ~240 K maintained by ~50 W/m² advected heat), (b) reflected light from sister planets c and d at conjunction (~0.3° angular diameter, m_v ≈ −8 to −10), and (c) starlight from background stars. Nightside sky is dim but not completely dark — KSP nightside ambient should be ~3-5% of dayside.",
  "p_210":"<b>Atmospheric escape.</b> Old age (8 Gyr) + low current XUV flux + quiet star give Teegarden b far better atmospheric retention prospects than either Proxima b or TRAPPIST-1 d. Wandel 2019 §3.1 reviews Lammer-style erosion models and notes that the present-day stellar wind is too weak to strip an Earth-mass atmosphere; the early pre-main- sequence phase (which lasted ~1 Gyr for ultra-cool dwarfs of Teegarden&#x27;s mass) was hotter and more active and may have stripped any primordial H/He envelope, but a heavy-element secondary atmosphere acquired by late accretion / outgassing should survive. The L_X / L_bol = −4.9 today is high in relative terms but the absolute L_X ≈ 3.7 × 10²⁵ erg/s gives only 1/10⁵ of the Sun&#x27;s X-ray flux at Earth — Boukrouche 2025 GCM does not include atmospheric escape but assumes Earth-like composition holds.",
  "p_211":"<b>Auroras</b> are a present but muted visual feature. With a 1-bar atmosphere and an Earth-analog magnetic field (tie-break assumption), b should support polar auroral ovals at the canonical ~60° magnetic latitude. Because Teegarden produces only ~0.4 large (≥10³⁵ erg) flares per year and ~2.6 modest (~10³² erg) flares per 100 days (Fuhrmeister 2024 + Dreizler 2024), the auroral intensity is far below TRAPPIST-1 e&#x27;s 150 kR — the cfg adopts 30 kR (3× Earth&#x27;s typical 10 kR) for a recognizable but understated auroral palette. Dominant emission is [OI] 557.7 nm green (Earth-analog colour <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code>), with weaker N₂⁺ 391.4 nm violet contribution.",
  "h2_212":"Rotation &amp; spin synthesis",
  "p_213":"Tidal damping for b at 4.91-day period over 8 Gyr establishes synchronous (1:1) rotation unambiguously (Griessmeier 2009 timescale ≪ 8 Gyr at this orbital distance and mass). Obliquity damped to zero. Eccentricity is 0.03 (Dreizler 2024), too low for 3:2 spin-orbit resonance (Vinson 2017).",
  "p_214":"<b>KSP implementation note.</b> Rotation period = orbital period = 4.90634 days (423 668 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_215":"<b>Atmospheric circulation regime.</b> Boukrouche 2025/26 Isca GCM and Hammond 2025 ExoCAM GCM (the latter for c, but the dynamical regime extrapolates) both find equatorial superrotation — a single broad prograde zonal jet driven by the stationary thermal forcing of the substellar dayside. The Boukrouche 2026 explicit cloud-fraction Fig. 2 shows the dayside cloud disk centred on the substellar point with a tail extending eastward, consistent with the Matsuno-Gill pattern of tidally-locked atmospheric circulation. There is no obvious mid-latitude jet bifurcation seen at TRAPPIST-1 e — b is fully on the &quot;superrotation&quot; side of the dynamical phase diagram (Haqq-Misra 2018), because b is hotter (1.08 vs 0.66 S⊕).",
  "p_216":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.3%. The substellar point and its open-water disk are fixed in the surface frame.",
  "p_217":"<b>Magnetic dynamo.</b> b&#x27;s mass (1.16-1.34 M⊕) and likely active interior (Earth-analog assumed) should support a sustained dynamo despite the synchronous 4.91-day rotation — the dynamo is driven by core convection, not surface rotation, and Earth&#x27;s 27-day Moon-induced synchronous-rotation thought experiment retains a dynamo on theoretical grounds. The cfg therefore picks a modest Earth-analog field (25 μT equatorial surface) as an interesting-first tie-break, giving a visible auroral structure for player navigation.",
  "h2_218":"Visual styling",
  "p_219":"Combining surface and atmosphere decisions, b renders as a slightly warmer cousin of TRAPPIST-1 e:",
  "li_220":"<b>Global appearance from orbit.</b> A snowball with a warm-cream open- water &quot;pupil&quot; ~45° from substellar, ringed by a fractal sea-ice transition band, and entirely white-cream glacial ice beyond. The stratospheric cloud deck (1-10 mbar) creates a high, thin, even haze that softens the substellar contrast — the cloud features appear more diffuse than TRAPPIST-1 e&#x27;s mid-altitude stratocumulus.",
  "li_221":"<b>Substellar disk (open water).</b> Dark navy ocean (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>) under intense red-orange illumination, dotted with warm cream cirrus-equivalent clouds (<span class=\"hex-chip\" style=\"background:#c0a890\"></span><code>#c0a890</code>). The substellar warm zone is the most visually striking feature.",
  "li_222":"<b>Ice transition band.</b> Fractal pattern of warm cream (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) ice and dark ocean (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>) — broken sea ice with open leads. The transition radius is ~45° from substellar.",
  "li_223":"<b>Glacial ice zone.</b> Smooth warm cream (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) with subtle topographic relief where glacial flow encounters bedrock. The terminator is the brightest zone in oblique illumination — long shadows reveal pressure ridges and crevasses; here the accent <span class=\"hex-chip\" style=\"background:#8a6a48\"></span><code>#8a6a48</code> exposed bedrock peeks through.",
  "li_224":"<b>Nightside.</b> Dimly visible (~3-5% of dayside) due to advected atmospheric heat-redistribution warmth. Visible features: pressure ridges, fractures, refrozen leads, faint auroral ovals at ~60° magnetic latitude.",
  "li_225":"<b>Atmosphere haze.</b> Pale gray-blue-violet limb glow (<span class=\"hex-chip\" style=\"background:#5a3a40\"></span><code>#5a3a40</code>) about 12-20 km thick — Rayleigh-scattered M7 V light. Significantly fainter than Earth&#x27;s blue limb because the M-dwarf SED has minimal short-wavelength flux to scatter.",
  "li_226":"<b>Star in sky.</b> Teegarden&#x27;s Star subtends 2.20° in b&#x27;s sky (4× the Sun from Earth) — appears as a deep red-orange disk (<span class=\"hex-chip\" style=\"background:#b03020\"></span><code>#b03020</code>) comparable in apparent size to TRAPPIST-1 e&#x27;s view of TRAPPIST-1. Illumination is &quot;perpetual sunset&quot; at substellar, fading to dusk and full night moving toward the terminator.",
  "li_227":"<b>Sister planets in sky.</b> c at conjunction (~0.3° angular diameter, m_v ≈ −8); d at conjunction (~0.2°, m_v ≈ −5). Conjunctions every 6-10 days for c and ~26 days for d, near-coplanar by RV evidence (Dreizler 2024 dynamical stability analysis).",
  "h2_228":"Bibliography",
  "h3_229":"Read (visual-informative, drove decisions above)",
  "li_230":"<b>Zechmeister M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two temperate Earth-mass planet candidates around Teegarden&#x27;s Star</i>, A&amp;A 627, A49 (<code>2019A&amp;A...627A..49Z</code>, arXiv:1906.07196). Discovery of b and c. Initial mass and orbit.",
  "li_231":"<b>Dreizler S. et al. 2024</b> — <i>Teegarden&#x27;s Star revisited</i>, A&amp;A 684, A117 (<code>2024A&amp;A...684A.117D</code>, arXiv:2402.00923). Refined b orbit (P = 4.90634 d, e = 0.03, msini = 1.16 M⊕, T_eq = 277 K, S = 1.08 S⊕).",
  "li_232":"<b>Wandel A. &amp; Tal-Or L. 2019</b> — <i>On the Habitability of Teegarden&#x27;s Star planets</i>, ApJ 880, L21 (<code>2019ApJ...880L..21W</code>, arXiv:1906.07704). Analytic 1D habitability model — b habitable range H_atm = 0.32-3.7.",
  "li_233":"<b>Boukrouche R., Caballero R., Lewis N. T. 2025</b> — <i>Near the Runaway: The Climate and Habitability of Teegarden&#x27;s Star b</i>, ApJ 993, L19 (<code>2025ApJ...993L..19B</code>, arXiv:2510.11940). Isca GCM at 1481 W/m² — b habitable for α_s = 0.07 AND 0.30; 1565 W/m² beyond runaway. Critical paper for the cfg&#x27;s habitable-scenario choice.",
  "li_234":"<b>Boukrouche R. et al. 2024</b> — <i>The Impact of Water Clouds on the Prospective Emission Spectrum of Teegarden&#x27;s Star b as Observed by LIFE</i>, ApJ 977, 88 (<code>2024ApJ...977...88B</code>, arXiv:2411.07922). Water cloud cover detectability with LIFE — confirms cloud cover as habitability tracer.",
  "li_235":"<b>Boukrouche R. &amp; Janson M. 2026</b> — <i>Disentangling the Hemispheres of Teegarden&#x27;s Star b with LIFE</i>, ApJ 996, L43 (<code>2026ApJ...996L..43B</code>, arXiv:2512.19231). Isca GCM hemisphere maps; high cloud deck at 1-10 mbar; LIFE 3-day broadband 1σ hemisphere distinction.",
  "li_236":"<b>Fujii Y. et al. 2026</b> — <i>Probing Thermal Gradient of Habitable- zone Rocky Planets as an Anti-indicator of a Global Surface Ocean Using Mid-infrared Direct Imaging</i>, AJ 171, 155 (<code>2026AJ....171..155F</code>, arXiv:2512.16575). ROCKE-3D ocean-vs-no-ocean scenarios for b at 1 and 10 bar; LIFE can distinguish in 1 day at two phases. Gives T_eq(A=0) = 280 K benchmark.",
  "h3_237":"Read (context / methodology, not decision-driving)",
  "li_238":"<b>Hammond T. et al. 2025</b> — Climate of nearby temperate rocky targets (arXiv:2504.00978). Used directly for Teegarden c; relevant for b as context (b not in their snowball list — habitable in their ExoCAM grid).",
  "li_239":"<b>Schweitzer A. et al. 2019</b> — Stellar parameters (arXiv:1904.03231), used via host star.",
  "li_240":"<b>Fuhrmeister B. et al. 2024</b> — Stellar activity context for atmospheric retention (arXiv:2504.02338).",
  "h3_241":"Read (instrument / non-cfg-decisive)",
  "li_242":"<b>Mandell A. et al. 2022</b> — MIRECLE mission concept; cited as PIE context.",
  "li_243":"<b>Hill M. L. et al. 2023</b> — Catalog of Habitable Zone Exoplanets (<code>2023AJ....165...34H</code>, arXiv:2304.13417). Catalog-only entry; b ranks high but adds no measurement.",
  "h3_244":"Not read — no arXiv preprint or low-priority",
  "p_245":"The b bibliography is small (14 papers, 9 with arXiv). Five non-arXiv papers are catalog entries or short conference proceedings; all are preserved in <code>docs/phase3/_bib/teegarden-s-star-b.yaml</code> with <code>status: skipped</code> where appropriate.",
  "h2_246":"Open items for follow-up",
  "li_247":"<b>Stellar-parameter ambiguity for runaway threshold</b> (CRITICAL): Boukrouche 2025 explicitly notes that at 1565 W/m² (the Dreizler 2024 alternative stellar params) b is <b>beyond</b> the runaway greenhouse threshold. Phase 2 picked the lower-luminosity Schweitzer params (1481 W/m²) keeping b habitable. If future stellar parameter refinement (interferometry, JWST occultation, asteroseismic-impossible- for-M7) favors the Dreizler higher-R, the cfg should switch to a <b>runaway Venus-analog variant</b>: 1-100 bar CO₂ atmosphere, no surface water, hot dayside (~700 K), thick sulfuric acid clouds, no ice anywhere. Preserved as backup variant.",
  "li_248":"<b>True mass at low inclination</b>: If the orbital inclination is much less than 60°, the true mass could be 1.5-3 M⊕ and the planet could be a mini-Neptune rather than rocky. Fujii 2026 explicitly takes i = 60° geometric for the 1.34 M⊕ estimate. Astrometric detection by Gaia DR4 or Theia could constrain inclination.",
  "li_249":"<b>Cloud morphology dependence on GCM</b>: Boukrouche 2026&#x27;s Isca GCM gives a high stratospheric cloud deck dominating the dayside emission pattern. Hammond 2025&#x27;s ExoCAM gives mid-altitude clouds for sister planets. The cfg&#x27;s stratospheric-cloud pick may shift if a future GCM intercomparison (THAI-style) for b changes the consensus.",
  "li_250":"<b>No transit confirmation</b>: All planetary parameters are RV-derived. A transit detection from CHEOPS or a focused TESS revisit (low probability for non-transiting geometry) would directly measure radius and tighten the atmospheric column.",
  "li_251":"<b>Auroral intensity / shielding</b>: The cfg&#x27;s 30 kR and 100 mSv/yr numbers are scaled from TRAPPIST-1 e by activity ratio. A Teegarden- specific SEP+atmosphere model (Atri-style) does not exist yet.",
  "li_252":"<b>Magnetic field strength</b>: No measurement. The cfg picks Earth- analog 25 μT as interesting-first. A weaker scaling (RM22-style for tidally-locked low-mass planets) would give ~3 μT and weaker auroras.",

  ko: {
  "p_1":"티가든의 별 b 는 최소질량 1.16 M⊕ (전형적 i = 60° 기하학적 경사에서 실제 질량은 ~1.34 M⊕; Fujii 2026) 의 암석 행성으로, M7.0 V 모성 둘레를 4.91 일 주기로 공전합니다. 궤도 장반경 0.0259 AU 와 모성 볼로메트릭 광도 7.32 × 10⁻⁴ L☉ 가 결합되어 입사 플럭스 1.08 ± 0.08 S⊕ 가 나옵니다. 지구보다 약간 강한 셈으로, b 를 보수적 거주가능 영역의 안쪽 가장자리에 위치시킵니다. Bond 알베도 0.3 의 평형 온도는 277 ± 5 K (Dreizler 2024), 알베도 0 이면 ~280 K (Fujii 2026 기준값) 입니다. 두 값 모두 물의 어는 점을 끼고 있어, b 는 질량과 입사 플럭스 기준만으로도 NearStars 카탈로그에서 가장 진짜 지구-아날로그에 가까운 후보 중 하나입니다.",
  "p_2":"이 행성은 통과 관측되지 않으므로 질량과 반지름 모두 측정이 아니라 유도값 입니다. 질량은 다중 기기 RV 적합 (CARMENES + ESPRESSO + MAROON-X + HPF, 야간 평균 355 회 측정, Dreizler 2024) 에서 나옵니다. cfg 의 반지름 1.05 R⊕ 는 Zeng 2016 / 2019 의 지구형 벌크 질량-반지름 관계를 따르며, 최근 GCM 논문들 (자매 행성에 대한 Boukrouche 2025, Fujii 2026, Hammond 2025) 도 일관되게 같은 관계를 사용합니다. 질량은 최소 질량 (m sin i) 이므로 낮은 궤도 경사에서는 실제 질량-반지름이 상당히 더 클 수 있지만, 1.16-1.34 M⊕ 범위에서 반지름 예측은 여러 질량-반지름 척도에 걸쳐 ~5 % 안에서 안정적입니다.",
  "p_3":"b 에 관한 cfg 결정적 질문은 <b>runaway vs habitable</b> 입니다. Boukrouche 2025 (arXiv:2510.11940) 는 Phase 2 권장 별 광도 (입사 플럭스 = 1481 W/m²) 에서 Isca GCM 을 돌려, 표면 알베도 α = 0.07 (해양) 과 α = 0.30 (육지) 모두에서 b 가 runaway 온실 임계값 아래에 편안히 머문다고 결론 지었습니다. 즉 현재 지구형 조성의 1 bar 대기는 지속 가능합니다. Dreizler 2024 의 대안 별 매개변수 (Teff = 3034 K, R = 0.120 R☉) 를 쓰면 입사 플럭스가 1565 W/m² 로 올라가고 같은 GCM 이 b 를 runaway 임계값 너머로 보냅니다. Phase 2 는 Schweitzer 2019 의 R = 0.107 R☉ 를 권장으로 선택했고, 이 합성은 그에 대응하는 <b>habitable</b> cfg 시나리오를 채택합니다. Runaway 변형 cfg 는 Open items 에 보존됩니다.",
  "p_4":"<b>NearStars 시나리오 선택: 1 bar 지구형 N₂/O₂/CO₂ 대기를 가지고, 바다를 보유하며, 조석 고정된 &quot;안구&quot; 기하학에서 substellar 점 근처에 열린 물, 1-10 mbar 의 성층권 상부 구름층, 그리고 그 외 지역의 해빙을 특징으로 하는 온화한 aquaplanet.</b> 티가든 시스템의 대표 habitable cfg 입니다. (Dreizler 2024 별 매개변수 측면과 일치하는) 대안 runaway-Venus cfg 는 Open items 에 백업 변형으로 보존됩니다.",

  "p_192":"티가든 b 는 표준적인 모든 지표에서 시스템의 가장 거주가능 후보입니다. 세 가지 수렴하는 근거가 있습니다.",
  "p_193":"1. <b>입사 플럭스</b> S = 1.08 ± 0.08 S⊕ (Dreizler 2024) — 지구보다 약간 높음. Phase 2 권장 별 매개변수에서는 1481 W/m² 의 입사 플럭스에 해당합니다. Boukrouche 2025 (현재 지구의 대기 조성을 가진 Isca GCM) 는 1481 W/m² 에서 b 가 해양 (α_s = 0.07) 과 육지 (α_s = 0.30) 표면 알베도 모두에 대해 runaway 온실 임계값 아래에 머문다고 명시적으로 결론짓습니다. 대안 1565 W/m² 시나리오 (Dreizler 2024 대안 별 매개변수 사용) 는 runaway 에 빠지지만, Phase 2 는 더 낮은 광도의 Schweitzer / Cifuentes 해를 선호합니다.",
  "p_194":"2. <b>질량과 벌크 밀도.</b> m sin i = 1.16 M⊕ 와 Zeng 2016 지구형 반지름 1.05 R⊕ 가정에서 추정된 벌크 밀도는 ~5.5 g/cc 입니다. 지구형 이며, 미세하지 않은 물 저장소를 가진 규산염-철 암석 내부와 일치합니다. 전형적 i = 60° 기하학적 경사에서 실제 질량은 ~1.34 M⊕ (Fujii 2026); 반지름 예측은 ~5 % 이상 바뀌지 않습니다.",
  "p_195":"3. <b>이론적 거주가능성.</b> Wandel 2019 (arXiv:1906.07704) 는 1D 기후- 거주가능성 모델을 적용해 S = 1.15 S⊕ 의 b 에 대해 f = 0.5 (적당한 대기 순환) 에서 habitable 대기 가열 범위가 H_atm = 0.32 ~ 3.7 임을 찾습니다. 즉 sub-Mars 온실에서 상당한 CO₂ 증강까지 폭넓습니다. 지구형 대기 (H_atm ≈ 1) 는 이 범위 안에 편안히 들어옵니다.",
  "p_196":"표면 형태론에서는 조석 고정 aquaplanet 템플릿 (Pierrehumbert 2011, Hu &amp; Yang 2014, Boukrouche 2025 Isca GCM 으로 여기에 적용) 이 TRAPPIST-1 e 아날로그보다 약간 더 따뜻한 &quot;안구 지구&quot; 패턴을 줍니다.",
  "li_197":"<b>substellar 온대</b> (substellar 점에서 ≤ 45°): α_s = 0.07 사례에서 열린 바다. substellar 표면 온도는 ~295 K 이고 빙선에서 ~265 K 로 떨어집니다. TRAPPIST-1 e 의 35° 보다 ~10° 큰 온대 반경은 티가든 b 가 1.6 배 더 많은 입사 플럭스를 받기 때문입니다.",
  "li_198":"<b>중위도 / 중경도</b> (substellar 에서 45-90°): 빙선의 수 미터에서 종단경계의 수십 미터에 이르는 해빙.",
  "li_199":"<b>종단경계와 야간측</b> (substellar 에서 &gt;90°): 얼어붙은 바다 기질 위 의 두꺼운 빙하 얼음; 표면 온도 ~240 K (Boukrouche 2025 GCM 야간측).",
  "p_200":"<b>색조 선택.</b> TRAPPIST-1 e 와 동일합니다. 물 얼음 알베도는 본질적으로 0.6-0.8 이고 푸르스름한 흰색이지만, 2904 K M7 V 조명이 인지되는 색조를 빨강-주황 쪽으로 크게 옮깁니다. 결합되면 얼음 피복은 따뜻한 크림화이트 (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>), 깊은 바다는 짙은 남보라 (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>) 가 됩니다. substellar 영역은 가장 시각적으로 두드러진 특징입니다 — 어두운 &quot;동공&quot; 같은 열린 물이 프랙탈 해빙 전이 띠로 둘러싸이고, 그 바깥은 균일한 빙하 얼음입니다.",
  "p_201":"<b>노출된 암반.</b> 제한적 (~5-10% 표면적). 암반 노출은 빙하 흐름이 압력 능선 위의 얼음을 얇게 만든 종단경계와, 작은 지각 융기로 영원히 빨강 색조 의 조명 아래 어두운 마픽 지각이 드러난 곳에 집중됩니다. 액센트 색조 <span class=\"hex-chip\" style=\"background:#8a6a48\"></span><code>#8a6a48</code> 는 M7 V 빛 아래 풍화 현무암으로 읽힙니다.",
  "h2_202":"Atmosphere synthesis",
  "p_203":"cfg 는 Boukrouche 2025 (Isca GCM) 와 Boukrouche 2026 (LIFE 반구 논문) 을 따라 <b>1 bar N₂ 지배 aquaplanet 대기</b> 를 채택합니다. 그 시뮬레이션 들에서 사용된 명시적 조성은 본질적으로 현재 지구입니다.",
  "li_204":"<b>압력</b> 1 bar (100 kPa) — 지구형, Boukrouche 2025 에 따라 1481 W/m² 에서 runaway 임계값 아래에서 지속 가능.",
  "li_205":"<b>조성</b> N₂ 78%, O₂ 21% (비생물적 광분해 — cfg 는 생물권 없음 가정; Lincowski 2018 류의 M-왜성 비생물적 O₂ 축적), CO₂ 400 ppm (지구 현대), CH₄ 1 ppm 미량, H₂O 0.1-1% 포화, Ar 0.5%.",
  "li_206":"<b>구름.</b> Boukrouche 2026 Isca GCM Fig. 1-2 는 주간측의 1-10 mbar 높이 (지구에서는 성층권에 해당) 의 상부 구름층과, 종단경계 근처의 중고도 (~500 mbar) 물 구름을 보여줍니다. 전 지구 구름 피복 ~55%. 주간측 상부 구름층은 알베도를 지배할 정도로 광학적으로 두껍지 않습니다 — 외부 장파 복사 패턴은 구름 불투명도가 아니라 대기 온도 구조에서 주로 결정됩니다. 이는 cfg 의 핵심 구분점입니다. TRAPPIST-1 e (중고도 층적운이 지배) 와 달리 b 의 주간측 구름 시그너처는 성층권에 있습니다.",
  "p_207":"<b>하늘 모습.</b> 1 bar N₂ 대기는 단파장에서 지구형 Rayleigh 산란을 가지지만, 2904 K 모성 SED 는 0.5 μm 이하에서 플럭스가 거의 없습니다. 따라서 산란된 하늘 색은 어둡고 강하게 빨강-주황으로 치우칩니다. 천정 하늘은 어둑한 빨강-파랑 혼합 (~<span class=\"hex-chip\" style=\"background:#3a3040\"></span><code>#3a3040</code>), 지평선 근처에서 따뜻한 주황 (~<span class=\"hex-chip\" style=\"background:#a06040\"></span><code>#a06040</code>) 으로 전이됩니다. 물 구름 특징은 빨강 별빛을 받는 따뜻한 크림 패치 (<span class=\"hex-chip\" style=\"background:#c0a890\"></span><code>#c0a890</code>) 로 보입니다.",
  "p_208":"모성은 시지름 2.20° 로 주간 하늘을 지배합니다 (지구에서 본 태양의 약 4 배, TRAPPIST-1 e 에서 본 TRAPPIST-1 과 비슷). substellar 점의 표면 조명은 약 1.08 × 지구의 볼로메트릭 플럭스 — 하지만 스펙트럼 피크가 근적외선에 있으므로 가시광 조명은 흐린 지구 오후에 더 가깝습니다.",
  "p_209":"<b>야간측.</b> 직접 별 조명 없음; 광원은 (a) 대기 순환으로 주간측에서 이송 된 산란광 (작지만 무시 불가 — Boukrouche 2025 GCM 은 야간측 온도가 ~50 W/m² 의 이송된 열로 ~240 K 유지됨을 보임), (b) 결합 시 자매 행성 c 와 d 의 반사광 (~0.3° 시지름, m_v ≈ −8 ~ −10), 그리고 (c) 배경별 별빛. 야간측 하늘은 어둡지만 완전히 어둡지는 않습니다 — KSP 야간측 환경광은 주간측의 ~3-5% 가 적절합니다.",
  "p_210":"<b>대기 손실.</b> 오래된 나이 (8 Gyr) + 낮은 현재 XUV 플럭스 + 조용한 별이 티가든 b 의 대기 보존 전망을 프록시마 b 나 TRAPPIST-1 d 보다 훨씬 좋게 만듭니다. Wandel 2019 §3.1 은 Lammer 류의 침식 모델을 리뷰하고, 현재의 항성풍은 지구 질량 대기를 벗기기에 너무 약하다고 언급합니다. 초기 전- 주계열 단계 (티가든 질량 같은 극저온 왜성에서 ~1 Gyr 지속) 는 더 뜨겁고 더 활동적이었고 모든 원시 H/He 외피를 벗겨냈을 수 있지만, 후기 accretion / 외기 방출로 획득된 무거운 원소 2차 대기는 살아남아야 합니다. 오늘날의 L_X / L_bol = −4.9 는 상대적으로 높지만 절대 L_X ≈ 3.7 × 10²⁵ erg/s 는 지구 위치에서 태양 X선 플럭스의 1/10⁵ 만 줍니다. Boukrouche 2025 GCM 은 대기 탈출을 포함하지 않으며 지구형 조성이 유지된다고 가정합니다.",
  "p_211":"<b>오로라</b> 는 존재하지만 차분한 시각 특징입니다. 1 bar 대기와 지구형 자기장 (tie-break 가정) 으로 b 는 정전적인 ~60° 자기 위도의 극지 오로라 타원을 지지해야 합니다. 티가든이 연간 ~0.4 회의 큰 (≥10³⁵ erg) 플레어와 100 일당 ~2.6 회의 적당한 (~10³² erg) 플레어 (Fuhrmeister 2024 + Dreizler 2024) 만 만들기 때문에, 오로라 강도는 TRAPPIST-1 e 의 150 kR 보다 훨씬 낮습니다. cfg 는 30 kR (지구 전형 10 kR 의 3 배) 를 채택해, 인지 가능 하지만 절제된 오로라 팔레트를 줍니다. 지배적 방출은 [OI] 557.7 nm 녹색 (지구형 색 <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code>), 약한 N₂⁺ 391.4 nm 보라 성분이 보조합니다.",
  "h2_212":"Rotation &amp; spin synthesis",
  "p_213":"8 Gyr 에 걸친 4.91 일 주기의 조석 감쇠는 명백하게 동기 (1:1) 자전을 확립합니다 (Griessmeier 2009 시간척도가 이 궤도 거리와 질량에서 8 Gyr 보다 훨씬 짧음). 자전축 기울기는 0 으로 감쇠. 이심률 0.03 (Dreizler 2024) 은 3:2 스핀-궤도 공명에는 너무 낮습니다 (Vinson 2017).",
  "p_214":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 4.90634 일 (423 668 s). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> (초) 와 일치해야 합니다.",
  "p_215":"<b>대기 순환 체제.</b> Boukrouche 2025/26 Isca GCM 과 Hammond 2025 ExoCAM GCM (후자는 c 용이지만 동역학 체제는 외삽 가능) 모두 적도 초회전 을 찾습니다. substellar 주간측의 정적 열 강제력으로 구동되는 단일 광폭 순방향 동서 제트입니다. Boukrouche 2026 의 명시적 구름 분율 Fig. 2 는 substellar 점에 중심을 두고 동쪽으로 꼬리가 뻗는 주간측 구름 원반을 보여주는데, 조석 고정 대기 순환의 Matsuno-Gill 패턴과 일치합니다. TRAPPIST-1 e 에서 보이는 명백한 중위도 제트 분기는 없습니다. b 는 동역학 위상도 (Haqq-Misra 2018) 의 &quot;초회전&quot; 측에 완전히 있는데, b 가 더 뜨겁기 때문입니다 (1.08 대 0.66 S⊕).",
  "p_216":"<b>계절 없음.</b> 자전축 기울기 = 0; libration 유발 입사 플럭스 변동 &lt; 0.3%. substellar 점과 그 열린 물 원반은 표면 좌표계에서 고정.",
  "p_217":"<b>자기 다이나모.</b> b 의 질량 (1.16-1.34 M⊕) 과 가능한 활성 내부 (지구형 가정) 는 동기 4.91 일 자전에도 불구하고 지속적인 다이나모를 지지해야 합니다. 다이나모는 표면 자전이 아니라 핵 대류로 구동되며, 지구의 27 일 달-유도 동기 자전 사고 실험은 이론적으로 다이나모를 유지합니다. cfg 는 따라서 적당한 지구형 장 (25 μT 적도 표면) 을 interesting-first tie-break 으로 선택해, 플레이어 항법용 가시 오로라 구조를 줍니다.",
  "h2_218":"Visual styling",
  "p_219":"표면과 대기 결정을 결합하면, b 는 TRAPPIST-1 e 의 약간 더 따뜻한 사촌 으로 렌더링됩니다.",
  "li_220":"<b>궤도에서 본 전체 모습.</b> substellar 에서 ~45° 의 따뜻한 크림 색 열린 물 &quot;동공&quot; 을 가진 눈덩이가 프랙탈 해빙 전이 띠로 둘러싸이고, 그 바깥은 전체적으로 흰-크림 빙하 얼음. 성층권 상부 구름층 (1-10 mbar) 이 substellar 대비를 부드럽게 하는 높고 얇은 균일한 안개를 만듭니다 — 구름 특징이 TRAPPIST-1 e 의 중고도 층적운보다 더 흩어져 보입니다.",
  "li_221":"<b>substellar 원반 (열린 물).</b> 강렬한 빨강-주황 조명 아래의 짙은 남색 바다 (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>) 에 따뜻한 크림 권운 등가물 구름 (<span class=\"hex-chip\" style=\"background:#c0a890\"></span><code>#c0a890</code>) 이 점점이. substellar 온대가 행성의 가장 시각적으로 두드러진 특징입니다.",
  "li_222":"<b>얼음 전이 띠.</b> 따뜻한 크림 (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) 얼음과 짙은 바다 (<span class=\"hex-chip\" style=\"background:#1a2540\"></span><code>#1a2540</code>) 의 프랙탈 패턴 — 열린 leads 가 있는 깨진 해빙. 전이 반경은 substellar 로부터 ~45°.",
  "li_223":"<b>빙하 얼음 영역.</b> 매끄러운 따뜻한 크림 (<span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code>) 에 빙하 흐름이 암반과 만나는 곳의 미묘한 지형적 기복. 종단경계는 비스듬한 조명에서 가장 밝은 영역 — 긴 그림자가 압력 능선과 크레바스를 드러내고, 여기에 액센트 <span class=\"hex-chip\" style=\"background:#8a6a48\"></span><code>#8a6a48</code> 노출 암반이 사이로 보입니다.",
  "li_224":"<b>야간측.</b> 이송된 대기 열 재분배 온기 덕분에 어렴풋이 보임 (주간측의 ~3-5%). 가시 특징: 압력 능선, 균열, 다시 얼어붙은 leads, ~60° 자기 위도의 희미한 오로라 타원.",
  "li_225":"<b>대기 안개.</b> 약 12-20 km 두께의 옅은 회청보라 림 빛 (<span class=\"hex-chip\" style=\"background:#5a3a40\"></span><code>#5a3a40</code>) — Rayleigh 산란된 M7 V 빛. M-왜성 SED 가 산란할 단파장 플럭스가 적어서 지구의 파란 림보다 훨씬 흐립니다.",
  "li_226":"<b>하늘의 별.</b> 티가든의 별은 b 의 하늘에서 2.20° 시지름 (지구에서 본 태양의 4 배) — 짙은 빨강-주황 원반 (<span class=\"hex-chip\" style=\"background:#b03020\"></span><code>#b03020</code>) 으로 보이며 TRAPPIST-1 e 에서 본 TRAPPIST-1 의 시지름과 비슷합니다. 조명은 substellar 에서 &quot;영원한 일몰&quot; 이며, 종단경계로 가면서 황혼과 완전한 밤으로 사라집니다.",
  "li_227":"<b>하늘의 자매 행성.</b> c 가 결합에서 (~0.3° 시지름, m_v ≈ −8); d 가 결합에서 (~0.2°, m_v ≈ −5). c 와는 6-10 일마다, d 와는 ~26 일마다 결합. RV 증거 (Dreizler 2024 동역학 안정성 분석) 로 거의 공면.",
  "h2_228":"Bibliography",
  "h3_229":"Read (visual-informative, drove decisions above)",

  "h2_246":"Open items for follow-up",
  "li_247":"<b>runaway 임계값에 대한 별 매개변수 모호함</b> (핵심): Boukrouche 2025 는 1565 W/m² (Dreizler 2024 대안 별 매개변수) 에서 b 가 runaway 온실 임계값 <b>너머</b> 라고 명시적으로 언급합니다. Phase 2 는 더 낮은 광도의 Schweitzer 매개변수 (1481 W/m²) 를 선택해 b 를 habitable 로 유지합니다. 미래의 별 매개변수 정밀화 (간섭계, JWST 차폐, M7 에서는 불가능한 별진동) 가 Dreizler 의 더 큰 R 을 지지하면, cfg 는 <b>runaway Venus 아날로그 변형</b> 으로 전환해야 합니다. 1-100 bar CO₂ 대기, 표면 물 없음, 뜨거운 주간측 (~700 K), 두꺼운 황산 구름, 얼음 없음. 백업 변형으로 보존.",
  "li_248":"<b>낮은 경사에서의 실제 질량</b>: 궤도 경사가 60° 보다 훨씬 낮으면 실제 질량은 1.5-3 M⊕ 가 될 수 있고 행성은 암석이 아니라 미니-Neptune 일 수도 있습니다. Fujii 2026 은 1.34 M⊕ 추정을 위해 명시적으로 i = 60° 기하학적을 채택합니다. Gaia DR4 나 Theia 의 측성학적 검출이 경사를 제약할 수 있습니다.",
  "li_249":"<b>GCM 에 따른 구름 형태론</b>: Boukrouche 2026 의 Isca GCM 은 주간측 방출 패턴을 지배하는 높은 성층권 구름층을 줍니다. Hammond 2025 의 ExoCAM 은 자매 행성에 대해 중고도 구름을 줍니다. b 에 대한 미래 GCM intercomparison (THAI-style) 이 합의를 바꾸면 cfg 의 성층권 구름 선택 도 이동할 수 있습니다.",
  "li_250":"<b>통과 확인 없음</b>: 모든 행성 매개변수가 RV 유도. CHEOPS 의 통과 검출이나 집중 TESS 재방문 (비-통과 기하학에서는 낮은 확률) 이 반지름 을 직접 측정하고 대기 컬럼을 조여줄 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
