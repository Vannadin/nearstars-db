  "h2_110":"Surface synthesis",
  "p_111":"The photosphere of Fomalhaut sits squarely in the A-type main sequence at Teff = 8689 K, ~3000 K hotter than the Sun and ~700 K cooler than the canonical A0V standard Vega. At this temperature the continuum opacity is dominated by the Balmer / Paschen jumps of hydrogen and the bolometric SED peaks at ~334 nm, well into the UV. The visible disk is therefore strongly blue-white, with the H I Balmer absorption lines producing the deep, broad Hα/Hβ/Hγ features that define the spectral class. There are no chromospheric Ca II H&amp;K emission cores: A-stars lack the deep convective envelope required to sustain a magnetically heated chromosphere, so the log R&#x27;HK index that anchors solar-type activity synthesis is <b>not defined</b> for Fomalhaut and is omitted from the Decisions table.",
  "p_112":"The interferometric radius R = 1.842 R☉ from VLTI/VINCI (Di Folco 2004) is anchored to a limb-darkened uniform-disk angular diameter θ_LD = 2.223 ± 0.022 mas — a 1% precision measurement, second in NearStars only to α Cen A and Vega. The limb-darkening law for an A4V atmosphere is steeper than for the Sun: Davis 2005 SUSI interferometry gives a power-law exponent α ≈ 0.21 in the visible, about 50% larger than the G-dwarf value of ~0.14. This steeper limb darkening — driven by the strong temperature gradient in the hydrogen-ionization zone — means an in-game close approach to Fomalhaut shows a more &quot;limb-dimmed&quot; disk than a solar-type star, with the central brightness 30–40% above the limb brightness rather than the 15–20% solar contrast.",
  "p_113":"Granulation is much subtler than in a Sun-like star: the convective zone is shallow (only the upper ~0.05 R★) and the granule scale is small (~50 km rather than the solar ~1000 km), producing a smooth photosphere with no resolvable cells from a planet&#x27;s perspective. The slightly sub-solar metallicity ([Fe/H] = −0.03, Saffe 2008 moving-group average) introduces negligible SED reddening; the visual tint chosen for the cfg, <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code>, encodes the A4V blackbody peak shifted slightly redward of Vega&#x27;s A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> baseline to keep the two A-stars visually distinguishable in the NearStars catalog.",
  "h2_114":"Atmosphere synthesis",
  "p_115":"A4V stars have <b>no chromosphere–transition-region–corona structure analogous to cool stars</b> in the magnetic sense. The outer atmosphere is radiative all the way to the photosphere–wind interface, with no acoustic or magnetic heating mechanism to sustain a hot corona. X-ray detections of Fomalhaut are accordingly very weak: ROSAT upper limits (Schröder &amp; Schmitt 2007) give log L_X &lt; 27.5 (erg/s, 0.1–2.4 keV), and the marginal detection by XMM-Newton is plausibly attributable to a magnetically active <b>late-type companion at small separation</b> rather than to Fomalhaut A itself. No coronal X-ray cycle is expected and none is observed.",
  "p_116":"The UV/FUV flux is intrinsically high — the Wien tail of an 8689 K photosphere puts substantial energy below 200 nm — and this is the dominant atmospheric-erosion driver for any inner planet around an A-star. The XUV/EUV flux relative to bolometric is, however, low (no chromospheric Lyα emission core), so for any habitable-zone planet (HZ for Fomalhaut sits at ~3.5–6 AU per Kopparapu 2013), the XUV-driven erosion is bounded by the photospheric UV continuum rather than by chromospheric line emission. There are no flares: the absence of a convective envelope eliminates the dynamo mechanism that powers M-dwarf and K-dwarf flaring.",
  "p_117":"The 440-Myr age means Fomalhaut is still on the early main sequence (its A4V evolutionary lifetime is ~1.0 Gyr; Mamajek 2012 places it at ~44% of MS lifetime). It is not yet evolving onto the subgiant branch, but is hot enough that any planet at 1 AU would receive ~17× solar insolation — well inside the cooked / runaway-greenhouse boundary. The cfg adopts the canonical no-corona, no-chromospheric- emission, no-flare A-star prescription for activity.",
  "h2_118":"Rotation &amp; spin synthesis",
  "p_119":"Fomalhaut is a <b>rapid rotator</b>, as is typical of A-stars too hot for magnetic braking to have spun them down. Royer 2007 measures v sin i = 93 ± 3 km/s from line-broadening of the Mg II 4481 Å feature. Combined with the inclination i ≈ 65.6° inferred from the debris-disk orbital plane (Le Bouquin 2009 — assuming spin-orbit alignment between star and disk, which is observationally consistent with all young debris-disk A-stars surveyed by Greaves 2014), the deprojected equatorial velocity is v_eq ≈ 102 km/s.",
  "p_120":"The corresponding rotation period is P_rot = 2πR/v_eq ≈ <b>0.97 days</b> — a factor of ~25 faster than the Sun and approaching the critical break-up velocity of ~390 km/s only at ~25% of that limit, so the star is not significantly oblate. The fast rotation does, however, produce a measurable <b>gravity-darkening latitudinal temperature gradient</b>: Monnier 2010 CHARA/MIRC interferometry of similar rapid-rotator A-stars (Altair, Vega) finds ΔT(pole−equator) ≈ 500–1500 K. For Fomalhaut specifically no resolved gravity- darkening map exists, but von Zeipel scaling predicts ΔT ≈ 300 K (pole hotter than equator) — observable as a subtle &quot;pole-on brightening&quot; in the cfg disk shader for high-inclination viewers.",
  "p_121":"The spin-orbit alignment with the debris disk is the strongest constraint on the rotation axis: Le Bouquin 2009 interferometry established that Fomalhaut&#x27;s spin axis is co-aligned with the disk normal to within ~3°. NearStars adopts this co-aligned configuration so that the rotational equator of the star and the orbital plane of the debris ring share a common reference frame — a small but authentic detail for in-game observers above the disk plane.",
  "h2_122":"Visual styling",
  "p_123":"In the NearStars renderer, Fomalhaut is portrayed as a <b>cool blue-white A4V disk</b> tinted <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> — distinctly bluer than the G/K stars in the catalog (warm cream-to-orange) but slightly warmer than Vega&#x27;s near-A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> baseline. At V = 1.16 from Earth, Fomalhaut is the 18th-brightest star in the night sky and the brightest in the southern hemisphere autumn quadrant.",
  "p_124":"From a candidate planet at the inner edge of the habitable zone (~3.5 AU per Kopparapu 2013), the star subtends an angular diameter 2R★/a × (180·60/π) ≈ 0.06° — about ⅛ the angular diameter of the Sun seen from Earth. Despite the small angular size, the surface brightness is much higher than the Sun&#x27;s because of the T⁴ scaling (Teff = 8689 K vs 5778 K → 5.1× higher per unit solid angle), so the bolometric flux at HZ is ~5× the solar constant at 1 AU. The visible-band illumination is even more strongly weighted to the blue, giving any HZ planet a noticeably cooler-spectrum daytime sky than Earth would have under Sol.",
  "p_125":"The <b>debris ring</b> is the visual centerpiece of the system. Viewed from any inner-system planet, the 133–158 AU main ring forms a ~25–30 arcminute thin elliptical band across the sky (eccentricity e ≈ 0.11 producing a visible offset of the star from the ring center — 14 AU offset, easily visible in any wide-field view). The ring is rendered with the cfg <code>disk_tint_rgb_hex = #d8c4a6</code> — a warm dusty buff representing the ~65 K dust thermal emission re-scattering A-star light. The <code>disk_opacity = 0.35</code> is a tie-break boost from the physical optical depth (~10⁻⁴) to ensure the ring reads as visible in-game rather than as a numerical artifact.",
  "p_126":"The <b>intermediate belt at 40–80 AU</b> (Gáspár 2023 JWST) is rendered as a fainter secondary ring with the same dust tint at half opacity, producing a Saturn-like double-ring structure but at a vastly larger scale. The <b>inner warm asteroid-belt analog at ~10 AU</b> (also Gáspár 2023) is too small to render as a ring at most camera distances and is instead represented as a low-density particle field in the cfg — close enough to the star that its scattered light contributes to the inner-system zodiacal glow.",
  "p_127":"The <b>two stellar companions</b> appear as fixed point sources in the in-game sky. TW Piscis Austrini at 0.91 ly projected separation sits at apparent magnitude V ≈ 6.5 from any Fomalhaut planet — at the very edge of unaided visibility, easily seen in any starfield view as a distinctly <b>orange K-dwarf dot</b>. LP 876-10 at 5.7 ly is fainter (V ≈ 11) and below naked-eye visibility but appears in telescope views as a faint <b>red M-dwarf</b> point. Neither shows a resolved disk; both are flagged in the cfg as <code>visual_companion_event_*</code> point sources so the renderer places them correctly without attempting to draw a disk.",
  "p_128":"There are no eclipse / occultation events between Fomalhaut A and its widely-separated companions; the projected separations of ~0.91 ly and ~5.7 ly are far too large to produce any in-game alignment phenomena on human timescales.",
  "h2_129":"Bibliography",
  "h3_130":"Read (visual-informative, drove decisions above)",
  "li_131":"<b>Mamajek E. E. 2012</b> — <i>On the age and binarity of Fomalhaut</i>, ApJ 754, L20 (<code>2012ApJ...754L..20M</code>, arXiv:1206.6353). Establishes the 440 ± 40 Myr age via joint isochronal + Castor-moving-group kinematic membership; fits the 1.92 ± 0.02 M☉ mass on Y² evolutionary tracks anchored to Di Folco 2004&#x27;s interferometric radius. The canonical modern age and mass reference.",
  "li_132":"<b>Mamajek E. E. et al. 2013</b> — <i>Discovery of a Faint Companion to Alpha PsA Using MMT/AO 5 μm Imaging</i>, AJ 146, 154 (<code>2013AJ....146..154M</code>, arXiv:1310.0764). Identifies LP 876-10 as the M4V third component of the Fomalhaut hierarchical triple at 5.7 ly projected; common proper motion + isochronal age match.",
  "li_133":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric observations of Vega-like stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>, arXiv:astro-ph/0408390). VLTI/VINCI K-band limb-darkened angular diameter θ_LD = 2.223 ± 0.022 mas; derives R = 1.842 ± 0.019 R☉ at the Hipparcos parallax. Anchors the radius measurement.",
  "li_134":"<b>Kalas P. et al. 2005</b> — <i>A planetary system as the origin of structure in Fomalhaut&#x27;s dust belt</i>, Nature 435, 1067 (<code>2005Natur.435.1067K</code>). HST/ACS coronagraphy first resolves the narrow, eccentric main ring at 133 AU with e ≈ 0.11 and a sharp inner edge — interpreted as gravitational sculpting by an unseen planet (the original &quot;shepherding&quot; inference).",
  "li_135":"<b>Kalas P. et al. 2008</b> — <i>Optical Images of an Exosolar Planet 25 Light-Years from Earth</i>, Science 322, 1345 (<code>2008Sci...322.1345K</code>). The original &quot;Fomalhaut b&quot; HST detection paper. <b>Retraction context</b>: subsequent re-analysis by Gáspár &amp; Rieke 2020 and the JWST 2023 non-detection (Gáspár 2023) re-interprets the source as a transient expanding dust cloud from a planetesimal collision rather than a bound planet. This synthesis follows the current consensus.",
  "li_136":"<b>Gáspár A. &amp; Rieke G. H. 2020</b> — <i>New HST data and modeling reveal a massive planetesimal collision around Fomalhaut</i>, PNAS 117, 9712 (<code>2020PNAS..117.9712G</code>, arXiv:2004.08736). Re-analysis of HST archive shows &quot;Fomalhaut b&quot; has expanded and faded between 2004–2014 epochs, consistent with an expanding dust cloud from a ~200 km planetesimal collision rather than a bound point source.",
  "li_137":"<b>Gáspár A. et al. 2023</b> — <i>Spatially resolved imaging of the inner Fomalhaut disk using JWST/MIRI</i>, Nature Astronomy 7, 790 (<code>2023NatAs...7..790G</code>, arXiv:2305.03789). JWST/MIRI imaging at 15.5 µm + 23 µm resolves a previously-unknown <b>intermediate belt at ~40–80 AU</b> and confirms an <b>inner warm asteroid-belt analog at ~10 AU</b>; no point source at the Fomalhaut-b epoch position, consistent with the dust-cloud interpretation.",
  "li_138":"<b>Boley A. C. et al. 2012</b> — <i>Constraining the planetary system of Fomalhaut using high-resolution ALMA observations</i>, ApJ 750, L21 (<code>2012ApJ...750L..21B</code>, arXiv:1204.0007). ALMA Cycle 0 imaging of the main ring; eccentricity e = 0.11 ± 0.01, inner edge 133 AU, outer edge 158 AU, width Δa/a ≈ 0.13; constrains shepherd planet mass to &lt; 3 M_Jup.",
  "li_139":"<b>White J. A. et al. 2017</b> — <i>ALMA observations of Fomalhaut&#x27;s outer dust ring</i>, ApJ 842, 80 (<code>2017ApJ...842...80W</code>, arXiv:1705.10670). Higher-resolution ALMA Cycle 4 follow-up; confirms the narrow eccentric ring and refines the inclination to 65.6 ± 0.4°; sets the disk geometry cfg fields.",
  "li_140":"<b>Le Bouquin J.-B. et al. 2009</b> — <i>Spin axis of α PsA from interferometry</i>, A&amp;A 498, L41 (<code>2009A&amp;A...498L..41L</code>, arXiv:0904.1688). VLTI/AMBER measurement of stellar oblateness + spin axis orientation; demonstrates spin-orbit alignment with the debris disk to ~3°.",
  "li_141":"<b>Davis J. et al. 2005</b> — <i>Limb-darkening determinations for Fomalhaut and α Cen A from SUSI</i>, MNRAS 356, 1362 (<code>2005MNRAS.356.1362D</code>). Optical interferometric limb-darkening power-law α(V) ≈ 0.21 for Fomalhaut; sets <code>limb_darkening_alpha_h</code>.",
  "h3_142":"Read (context / methodology, not directly decision-driving)",
  "li_143":"<b>Royer F. et al. 2007</b> — <i>Rotational velocities of A-type stars</i>, A&amp;A 463, 671 (<code>2007A&amp;A...463..671R</code>, arXiv:astro-ph/0610785). Gives v sin i = 93 ± 3 km/s for Fomalhaut; combined with disk inclination to derive rotation period.",
  "li_144":"<b>Acke B. et al. 2012</b> — <i>Herschel images of Fomalhaut: An extrasolar Kuiper Belt at the height of its dynamical activity</i>, A&amp;A 540, A125 (<code>2012A&amp;A...540A.125A</code>, arXiv:1204.5037). Herschel/PACS far-IR imaging of the cold main ring; SED fit T_dust ≈ 65 K; fills the <code>disk_dust_temperature_k</code> field.",
  "li_145":"<b>Holland W. S. et al. 2017</b> — <i>SONS: The JCMT legacy survey of debris discs at submillimetre wavelengths</i>, MNRAS 470, 3606 (<code>2017MNRAS.470.3606H</code>, arXiv:1706.01218). SCUBA-2 submm photometry; main-ring dust mass ~1.5 × 10⁻² M⊕ in mm-cm grains.",
  "li_146":"<b>Saffe C. et al. 2008</b> — <i>Spectroscopic metallicities of Vega- like stars</i>, A&amp;A 490, 297 (<code>2008A&amp;A...490..297S</code>, arXiv:0805.3936). High-resolution metallicity for Castor moving- group A-stars including Fomalhaut; [Fe/H] = −0.03 ± 0.05.",
  "li_147":"<b>Stapelfeldt K. R. et al. 2004</b> — <i>First Look at the Fomalhaut Debris Disk with Spitzer</i>, ApJS 154, 458 (<code>2004ApJS..154..458S</code>). Spitzer/MIPS 24/70/160 µm photometry; first multi-band thermal characterization of the dust disk.",
  "li_148":"<b>Currie T. et al. 2012</b> — <i>A Direct-Imaging Survey of the Fomalhaut Planetary System with the Hubble Space Telescope</i>, ApJ 760, L32 (<code>2012ApJ...760L..32C</code>, arXiv:1210.6555). Independent HST re-analysis of &quot;Fomalhaut b&quot;; early evidence that the source is not a self-luminous planet.",
  "li_149":"<b>Schröder C. &amp; Schmitt J. H. M. M. 2007</b> — <i>X-ray emission from A-type stars</i>, A&amp;A 475, 677 (<code>2007A&amp;A...475..677S</code>). ROSAT survey of A-star X-ray flux; sets the log L_X upper limit for Fomalhaut.",
  "li_150":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment of the host star spin with the orbit of debris discs</i>, MNRAS 438, L31 (<code>2014MNRAS.438L..31G</code>, arXiv:1311.3431). Population-wide spin- orbit alignment for A-star debris-disk hosts; supports the Le Bouquin 2009 alignment assumption.",
  "h3_151":"Read (instrument / non-cfg-decisive)",
  "li_152":"<b>Gray R. O. &amp; Garrison R. F. 1989</b> — <i>The Late A-Type Stars: Refined MK Classification</i> (<code>1989ApJS...70..623G</code>). MK system reclassification placing Fomalhaut at the A3V/A4V boundary.",
  "li_153":"<b>Monnier J. D. et al. 2010</b> — <i>Imaging the surface of Altair</i>, Science 317, 342 (<code>2007Sci...317..342M</code>). Reference for gravity-darkening map of a comparable rapid-rotator A-star.",
  "li_154":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable zones around main- sequence stars</i>, ApJ 765, 131 (<code>2013ApJ...765..131K</code>, arXiv:1301.6674). HZ inner/outer boundaries for A4V star.",
  "li_155":"<b>Wyatt M. C. 2008</b> — <i>Evolution of Debris Disks</i>, ARA&amp;A 46, 339 (<code>2008ARA&amp;A..46..339W</code>). Theoretical framework for collisional cascade replenishment in resolved debris disks; underpins the <code>disk_planetesimal_belt_inferred</code> field.",
  "h3_156":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_157":"Conference abstracts (AAS / DPS / EPSC), interferometric methods papers (CHARA / PTI commissioning), and follow-up dust-grain mineralogy work (Spitzer IRS spectra) contribute no cfg-decisive content beyond what Di Folco 2004 + Boley 2012 + Gáspár 2023 already establish. SETI / radio-emission monitoring of the &quot;Fomalhaut b&quot; position (Tusay 2022, Saide 2023) is also skipped. Filtered bib preserved in <code>docs/phase3/_bib/fomalhaut.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_158":"Open items for follow-up",
  "li_159":"<b>TW Piscis Austrini (HD 216803, K4V) and LP 876-10 (M4V) as separate NS DB entries</b>: The two wide common-proper-motion companions are not currently in the 152-system NearStars shortlist. Mamajek 2012/2013 establish them as gravitationally associated, co-eval (440 Myr) Castor-moving-group members at projected separations of 0.91 ly and 5.7 ly. If added as separate DB entries, the in-game player could fly between all three on real interstellar trajectories. Flag as Phase 2 DB expansion candidate.",
  "li_160":"<b>Phase 2 <code>disk_measurements</code> ingest</b>: This synthesis sources disk parameters directly from the literature because <code>db/systems/fomalhaut.json</code> has no <code>disk_measurements</code> block. Add a parsing step to extract Kalas 2005 / Boley 2012 / White 2017 / Gáspár 2023 disk geometry into the DB so downstream Kopernicus cfg writers can read the data without re-parsing the Phase 3 markdown.",
  "li_161":"<b>&quot;Fomalhaut b S1&quot; candidate revisit</b>: If a 2026+ JWST/MIRI or ground-based ELT follow-up reverses the Gáspár &amp; Rieke 2020 dust- cloud interpretation and re-establishes a bound planet at ~115 AU, a new Decisions entry <code>circumstellar_planet_present: true</code> (with the candidate &quot;S1&quot; naming) would be needed and the cfg should document the divergence from the current consensus. Until then, no planet is included.",
  "li_162":"<b>Phase 2 <code>teff_measurements</code> and <code>metallicity_measurements</code> population</b>: DB has <code>teff_k = 8689</code> as a SIMBAD compilation scalar with no provenance entry; Saffe 2008 metallicity is also not in DB. Both should be added with paper-cited Phase 2 entries.",
  "li_163":"<b>Gravity-darkening map</b>: No resolved interferometric gravity- darkening map of Fomalhaut exists (unlike Vega, Altair, Regulus). CHARA/MIRC or VLTI/GRAVITY observation of the von-Zeipel pole-to-equator temperature gradient would let the cfg replace the current uniform-disk tint with a latitudinal gradient (<code>visual_gravity_darkening_delta_t_k</code> field, currently absent).",

  ko: {
  "p_1":"Fomalhaut (α Piscis Austrini, HD 216956, HIP 113368, HR 8728) 는 남쪽 하늘 물고기자리(Piscis Austrinus)에서 가장 밝은 별이자, 태양과 가까운 A 형 주계열성 중 손꼽히는 별입니다. 분광형은 A4V 로, Gray &amp; Garrison 1989 의 MK 시스템 개정에서 A3V/A4V 경계에 놓이며, Hipparcos / Gaia DR3 시차 129.81 mas 가 거리 <b>7.704 pc ≈ 25.13 ly</b> 를 줍니다. 기본 파라미터는 VLTI/VINCI 간섭계 (Di Folco 2004) 로 탄탄히 정박돼 있어 R = 1.842 ± 0.019 R☉, Mamajek 2012 의 진화 모델 질량 M = 1.92 ± 0.02 M☉ 입니다. 유효 온도 Teff ≈ 8689 K 와 대응하는 광도 L ≈ 16.6 L☉ 로 인해 Fomalhaut 는 볼로메트릭 기준 태양보다 약 17 배, 가시광 밴드에서는 약 24 배 밝게 빛납니다.",
  "p_2":"Fomalhaut 는 <b>계층적 광폭 삼중계의 주성</b>입니다. K4V 별 TW Piscis Austrini (HD 216803, V = 6.48) 는 Fomalhaut 와 공통 고유운동을 공유하며 투영 분리 ~0.91 ly (≈ 5.7 × 10⁴ AU) 에 위치하고, 세 번째 성분인 M4V 플레어 별 LP 876-10 (Gaia DR3 6638942675812506240) 은 Mamajek 2013 이 투영 분리 ~5.7 ly (≈ 1.6 × 10⁵ AU) 에서 식별했습니다. 세 별 모두 운동학적/등시선상 나이 <b>440 ± 40 Myr</b> (Mamajek 2012) 를 공유하며, 이 시스템은 <b>Castor 운동성단</b>에 속합니다. NearStars DB 는 현재 Fomalhaut A 만 추적하며, TW PsA 와 LP 876-10 은 향후 후보 엔트리로 Open items 에 기록돼 있습니다. 두 별이 추가되면 Fomalhaut 계 어느 행성에서든 게임 내 하늘에서 고정된 적위에 떠 있는 희미한 맨눈급 &quot;제2의 태양&quot; 두 점을 볼 수 있게 됩니다.",
  "p_3":"Fomalhaut 가 학술적으로 유명한 까닭은 <b>분해된 별주위 잔해 원반</b> 때문입니다. Kalas et al. 2005 의 HST/ACS 코로나그래프 영상이 장반경 a ≈ 140 AU, 이심률 e ≈ 0.11 의 좁고 편심한 고리를 처음 찍어 냈는데, 안쪽 가장자리가 날카로워 보이지 않는 양치기 천체가 중력 적으로 조각하고 있음을 시사했습니다. ALMA 밀리미터 영상 (Boley 2012; White 2017) 은 기하를 정밀화해 이심률, 좁은 폭 (Δa/a ≈ 0.13), 경사 i ≈ 65–67° 를 확정했습니다. Gáspár et al. 2023 의 JWST/MIRI 영상은 ~10 AU 의 <b>안쪽 소행성대 analog</b> 와 ~40–80 AU 의 <b>중간 벨트</b> 를 분해해, 태양계 소행성대 + 카이퍼대 + scattered disk 와 유사하지만 온도와 질량 모두 크게 부풀린 3 벨트 구조를 완성했습니다. Kalas et al. 2008 이 HST 가시광 영상에서 보고한 그 유명한 &quot;<b>Fomalhaut b</b>&quot; 점광원은 이후 행성소체 충돌에서 발생한 팽창 먼지 구름으로 재해석됐습니다 (Gáspár &amp; Rieke 2020; JWST 2023 의 미검출과도 일관). 이 합성은 현재 컨센서스를 따르며, Fomalhaut b 를 <b>별주위 행성으로 포함하지 않습니다</b>.",
  "p_4":"<b>NearStars 시나리오 선택. 다중 벨트 편심 잔해 원반계로 둘러싸인 젊고 뜨거운 고광도 A4V 별로, 광폭 궤도의 희미한 맨눈급 동반성 두 개가 어느 행성 밤하늘에든 시각적 흥미를 더하는 모습으로 렌더링합니다.</b> 15 개 cfg 픽 모두 canonical 파라미터 셋을 따르며, tie-break 픽은 시각 hex 색 (A4V SED 백청색) 과 원반 RGB 색조 (먼지 온도 → 광학 색) 에 한정됩니다.",

  "td_109":"날카로운 안쪽 가장자리 (Kalas 2005) 는 양치기 천체를 요구. 충돌 cascade 가 먼지를 보충하려면 부모 행성소체 종족이 필요 (Wyatt 2008 프레임워크, Boley 2012 가 Fomalhaut 에 적용)",
  "h2_110":"Surface synthesis",
  "p_111":"Fomalhaut 의 광구는 Teff = 8689 K 로 A 형 주계열의 한가운데에 자리잡으며, 태양보다 약 3000 K 뜨겁고 canonical A0V 표준성 Vega 보다는 약 700 K 차갑습니다. 이 온도에서 연속체 불투명도는 수소의 Balmer / Paschen jump 가 지배하며 볼로메트릭 SED 의 정점은 ~334 nm 로 UV 영역 깊숙이 들어갑니다. 따라서 가시 디스크는 강하게 청백색 으로 빛나며, H I Balmer 흡수선이 분광형을 정의하는 깊고 넓은 Hα/Hβ/Hγ 피처를 만듭니다. 색채권 Ca II H&amp;K 방출 핵은 없습니다. A 형 별에는 자기적으로 가열되는 색채권을 유지하는 데 필요한 깊은 대류 envelope 가 없기 때문에, 태양형 활동도 합성을 정박하는 log R&#x27;HK 지표는 Fomalhaut 에 대해 <b>정의되지 않으며</b> Decisions 테이블에서 생략합니다.",
  "p_112":"VLTI/VINCI 의 간섭계 반지름 R = 1.842 R☉ (Di Folco 2004) 는 limb- darkened uniform-disk 각지름 θ_LD = 2.223 ± 0.022 mas 에 정박돼 있으며 — 1% 정밀도 측정으로, NearStars 카탈로그 안에서는 α Cen A 와 Vega 다음 정밀도입니다. A4V 대기의 limb-darkening 법칙은 태양 보다 더 가파릅니다. Davis 2005 의 SUSI 간섭계가 가시광에서 power- law 지수 α ≈ 0.21 을 주는데, 이는 G 형 왜성 값 ~0.14 보다 약 50% 큰 값입니다. 이 더 가파른 limb darkening 은 수소 이온화 영역의 강한 온도 구배에 기인하며, 게임 내에서 Fomalhaut 에 가까이 접근 할 때 태양형 별보다 &quot;limb-dimmed&quot; 효과가 더 강한 디스크를 보게 됩니다. 중심 밝기가 limb 밝기보다 30–40% 높으며, 태양형의 15–20% 대비를 넘어섭니다.",
  "p_113":"Granulation 은 태양형 별보다 훨씬 미세합니다. 대류 영역은 얕고 (상부 ~0.05 R★ 에 불과) granule 스케일도 작아 (태양의 ~1000 km 대신 ~50 km), 행성 시점에서 분해 가능한 셀이 없는 매끄러운 광구가 형성됩니다. 살짝 sub-solar 한 금속도 ([Fe/H] = −0.03, Saffe 2008 운동성단 평균) 는 SED reddening 에 무시할 만한 영향을 줍니다. cfg 가 채택한 시각 색조 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 는 A4V 흑체 정점을 Vega 의 A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> 기준선보다 살짝 적색 쪽으로 옮긴 값을 인코딩해, 두 A 형 별을 NearStars 카탈로그 안에서 시각적으로 구분되게 합니다.",
  "h2_114":"Atmosphere synthesis",
  "p_115":"A4V 별에는 <b>자기적 의미에서 차가운 별과 유사한 chromosphere– transition-region–corona 구조가 없습니다</b>. 바깥 대기는 광구– 항성풍 경계까지 줄곧 복사 평형이며, 뜨거운 코로나를 유지할 음향 가열이나 자기 가열 메커니즘이 없습니다. 그래서 Fomalhaut 의 X 선 검출은 매우 약합니다. ROSAT 상한 (Schröder &amp; Schmitt 2007) 은 log L_X &lt; 27.5 (erg/s, 0.1–2.4 keV) 를 주며, XMM-Newton 의 경계선 검출은 Fomalhaut A 자체가 아니라 <b>작은 분리 거리의 자기 활동성 후기형 동반성</b> 에 기인할 가능성이 큽니다. 코로나 X 선 사이클은 예상되지 않으며 관측되지도 않습니다.",
  "p_116":"UV/FUV 플럭스는 본질적으로 높습니다. 8689 K 광구의 Wien 꼬리가 200 nm 아래에 상당한 에너지를 두기 때문이며, 이는 A 형 별 주위 안쪽 행성 어디에서든 대기 침식의 지배적인 구동력입니다. 다만 볼로메트릭 대비 XUV/EUV 플럭스는 낮습니다 (색채권 Lyα 방출 핵이 없음). 따라서 거주가능영역 행성 (Kopparapu 2013 에 따르면 Fomalhaut 의 HZ 는 ~3.5–6 AU 에 위치) 의 XUV 구동 침식은 색채권 선 방출이 아니라 광구 UV 연속체로 제한됩니다. 플레어도 없습니다. 대류 envelope 의 부재는 M 형/K 형 왜성의 플레어를 일으키는 다이나모 메커니즘을 원천 차단합니다.",
  "p_117":"440 Myr 의 나이는 Fomalhaut 가 아직 주계열 초기에 머문다는 뜻 입니다 (A4V 진화 수명은 ~1.0 Gyr. Mamajek 2012 는 MS 수명의 ~44% 지점에 위치시킵니다). 아직 준거성 가지로 진화하지 않았지만, 너무 뜨거워 1 AU 의 행성은 ~17 배 태양 일사량을 받게 됩니다 — 익혀지는 / 폭주 온실 효과 경계 한참 안쪽입니다. cfg 는 활동도에 대해 코로나 없음, 색채권 방출 없음, 플레어 없음의 canonical A 형 별 처방을 채택합니다.",
  "h2_118":"Rotation &amp; spin synthesis",
  "p_119":"Fomalhaut 는 <b>빠른 자전체</b> 입니다. 자기 제동이 별을 늦추기에는 너무 뜨거운 A 형 별의 전형적인 모습입니다. Royer 2007 은 Mg II 4481 Å 피처의 line broadening 에서 v sin i = 93 ± 3 km/s 를 측정합니다. 잔해 원반 궤도 평면에서 추정한 경사 i ≈ 65.6° (Le Bouquin 2009 — 별과 원반의 spin-orbit 정렬을 가정하며, Greaves 2014 의 젊은 잔해 원반 A 형 별 서베이에서 모두 관측적으로 일관) 와 결합하면 deprojected 적도 속도는 v_eq ≈ 102 km/s 입니다.",
  "p_120":"대응하는 자전 주기는 P_rot = 2πR/v_eq ≈ <b>0.97 일</b> 로, 태양보다 약 25 배 빠릅니다. 임계 분열 속도 ~390 km/s 의 약 25% 에 해당하는 수준이라 별이 유의미하게 oblate 하지는 않습니다. 다만 빠른 자전은 측정 가능한 <b>중력 어두워짐(gravity-darkening) 위도 온도 구배</b> 를 만듭니다. Monnier 2010 의 CHARA/MIRC 간섭계가 비슷한 빠른 자전체 A 형 별 (Altair, Vega) 에서 ΔT(pole−equator) ≈ 500–1500 K 를 측정했습니다. Fomalhaut 자체에 분해된 중력 어두워짐 지도는 존재하지 않지만, von Zeipel 스케일링은 ΔT ≈ 300 K (극이 적도보다 뜨거움) 를 예측합니다 — 고경사 관측자에게는 cfg 디스크 셰이더에서 미묘한 &quot;극 방향 밝아짐&quot;으로 관측 가능한 효과입니다.",
  "p_121":"잔해 원반과의 spin-orbit 정렬은 자전축에 대한 가장 강력한 제약 입니다. Le Bouquin 2009 의 간섭계는 Fomalhaut 의 자전축이 원반 법선과 ~3° 안에서 공-정렬돼 있음을 확립했습니다. NearStars 는 이 공-정렬 배치를 채택해, 별의 자전 적도와 잔해 고리 궤도 평면이 공통 기준 좌표계를 공유하도록 합니다 — 원반 평면 위쪽에 자리한 게임 내 관측자에게는 작지만 진짜 같은 디테일입니다.",
  "h2_122":"Visual styling",
  "p_123":"NearStars 렌더러에서 Fomalhaut 는 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 로 색을 입힌 <b>시원한 청백색 A4V 디스크</b> 로 묘사됩니다 — 카탈로그의 G/K 형 별 (따뜻한 크림에서 주황까지) 보다 뚜렷이 푸르지만, Vega 의 거의-A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> 기준선보다는 살짝 따뜻한 색입니다. 지구에서 본 V = 1.16 으로 Fomalhaut 는 밤하늘 18 번째로 밝은 별이자, 남반구 가을 사분면에서 가장 밝은 별입니다.",
  "p_124":"거주가능영역 안쪽 가장자리 (Kopparapu 2013 기준 ~3.5 AU) 의 후보 행성에서 보면 별이 채우는 각지름은 2R★/a × (180·60/π) ≈ 0.06° — 지구에서 본 태양 각지름의 약 1/8 입니다. 각 크기는 작지만 표면 밝기는 T⁴ 스케일링 (Teff = 8689 K vs 5778 K → 단위 입체각당 5.1 배) 때문에 태양보다 훨씬 높아서, HZ 에서 받는 볼로메트릭 플럭스는 1 AU 의 solar constant 의 약 5 배입니다. 가시광 밴드 조명은 청색 쪽에 더 강하게 가중되어, HZ 행성의 한낮 하늘 스펙트럼은 태양 아래 지구가 가질 모습보다 눈에 띄게 차갑게 보입니다.",
  "p_125":"이 시스템의 시각적 중심은 <b>잔해 고리</b> 입니다. 안쪽 행성계의 어느 행성에서 보든 133–158 AU 의 주 고리는 하늘을 가로지르는 ~25–30 arcminute 의 얇은 타원 띠를 형성합니다 (이심률 e ≈ 0.11 이 별과 고리 중심 사이에 가시 오프셋을 만듭니다 — 14 AU 오프셋으로, 어떤 광시야 뷰에서도 손쉽게 보임). 고리는 cfg 의 <code>disk_tint_rgb_hex = #d8c4a6</code> 으로 렌더링되는데, ~65 K 먼지 열복사가 A 형 별 빛을 재산란하는 모습을 표현한 따뜻한 먼지빛 buff 색입니다. <code>disk_opacity = 0.35</code> 는 물리 광학적 깊이 (~10⁻⁴) 에서 끌어올린 tie-break boost 로, 고리가 수치적 잡티가 아니라 게임 내에서 실제로 보이는 대상으로 읽히도록 보정한 값입니다.",
  "p_126":"<b>40–80 AU 의 중간 벨트</b> (Gáspár 2023 JWST) 는 동일한 먼지 색조에 opacity 를 절반으로 낮춘 더 희미한 보조 고리로 렌더링되어, Saturn 같은 이중 고리 구조를 만들지만 스케일은 비교가 안 될 정도로 거대합니다. <b>~10 AU 의 안쪽 따뜻한 소행성대 analog</b> (역시 Gáspár 2023) 는 대부분의 카메라 거리에서는 고리로 렌더링하기에 너무 작아서, cfg 안에서 저밀도 입자 필드로 표현합니다 — 별과 충분히 가까워 그 산란광이 안쪽 행성계의 황도광에 기여합니다.",
  "p_127":"<b>두 별 동반성</b>은 게임 내 하늘에서 고정된 점광원으로 나타납니다. TW Piscis Austrini 는 0.91 ly 투영 분리에 위치하며 Fomalhaut 계 어느 행성에서든 겉보기 등급 V ≈ 6.5 입니다 — 맨눈 가시성의 경계선이지만 어떤 별 필드 뷰에서든 뚜렷한 <b>주황색 K 왜성 점</b> 으로 쉽게 보입니다. LP 876-10 은 5.7 ly 에 있어 더 어둡고 (V ≈ 11) 맨눈 가시성 아래지만 망원경 뷰에서는 희미한 <b>붉은 M 왜성</b> 점 으로 보입니다. 어느 쪽도 분해된 디스크를 보이지 않으며, 둘 다 cfg 에서 <code>visual_companion_event_*</code> 점광원으로 플래그돼 있어 렌더러가 디스크를 그리려 시도하지 않고 정확한 위치에 점만 찍습니다.",
  "p_128":"Fomalhaut A 와 광폭 분리 동반성들 사이에는 식 / 엄폐 이벤트가 없습니다. ~0.91 ly 와 ~5.7 ly 의 투영 분리는 인간 시간 척도에서 어떠한 게임 내 정렬 현상도 만들 수 없을 만큼 너무 큽니다.",
  "h2_129":"Bibliography",
  "h3_130":"Read (visual-informative, drove decisions above)",
  "li_131":"<b>Mamajek E. E. 2012</b> — <i>On the age and binarity of Fomalhaut</i>, ApJ 754, L20 (<code>2012ApJ...754L..20M</code>, arXiv:1206.6353). 등시선 + Castor 운동성단 운동학 멤버십 결합으로 440 ± 40 Myr 나이를 확립. Di Folco 2004 의 간섭계 반지름에 정박한 Y² 진화 트랙으로 1.92 ± 0.02 M☉ 질량을 fit. 현재 표준 나이와 질량 참조 논문.",
  "li_132":"<b>Mamajek E. E. et al. 2013</b> — <i>Discovery of a Faint Companion to Alpha PsA Using MMT/AO 5 μm Imaging</i>, AJ 146, 154 (<code>2013AJ....146..154M</code>, arXiv:1310.0764). LP 876-10 을 Fomalhaut 계층적 삼중계의 M4V 세 번째 성분으로 5.7 ly 투영 분리에서 식별. 공통 고유운동 + 등시선 나이 일치.",
  "li_133":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric observations of Vega-like stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>, arXiv:astro-ph/0408390). VLTI/VINCI K 밴드 limb-darkened 각지름 θ_LD = 2.223 ± 0.022 mas. Hipparcos 시차에서 R = 1.842 ± 0.019 R☉ 유도. 반지름 측정을 정박.",
  "li_134":"<b>Kalas P. et al. 2005</b> — <i>A planetary system as the origin of structure in Fomalhaut&#x27;s dust belt</i>, Nature 435, 1067 (<code>2005Natur.435.1067K</code>). HST/ACS 코로나그래프가 133 AU 의 좁고 편심한 (e ≈ 0.11) 주 고리와 날카로운 안쪽 가장자리를 처음 분해 — 보이지 않는 행성에 의한 중력적 조각으로 해석 (원조 &quot;양치기&quot; 추론).",
  "li_135":"<b>Kalas P. et al. 2008</b> — <i>Optical Images of an Exosolar Planet 25 Light-Years from Earth</i>, Science 322, 1345 (<code>2008Sci...322.1345K</code>). 원조 &quot;Fomalhaut b&quot; HST 검출 논문. <b>철회 맥락</b>. Gáspár &amp; Rieke 2020 의 후속 재분석과 JWST 2023 미검출 (Gáspár 2023) 이 이 광원을 묶인 행성이 아닌 행성소체 충돌에서 발생한 일과성 팽창 먼지 구름으로 재해석. 이 합성은 현재 컨센서스를 따름.",
  "li_136":"<b>Gáspár A. &amp; Rieke G. H. 2020</b> — <i>New HST data and modeling reveal a massive planetesimal collision around Fomalhaut</i>, PNAS 117, 9712 (<code>2020PNAS..117.9712G</code>, arXiv:2004.08736). HST 아카이브 재분석으로 &quot;Fomalhaut b&quot; 가 2004–2014 사이에 팽창하고 어두워 졌음을 확인. 묶인 점광원이 아니라 ~200 km 행성소체 충돌에서 나온 팽창 먼지 구름과 일관.",
  "li_137":"<b>Gáspár A. et al. 2023</b> — <i>Spatially resolved imaging of the inner Fomalhaut disk using JWST/MIRI</i>, Nature Astronomy 7, 790 (<code>2023NatAs...7..790G</code>, arXiv:2305.03789). 15.5 µm + 23 µm JWST/MIRI 영상이 이전에 알려지지 않았던 <b>~40–80 AU 의 중간 벨트</b> 를 분해하고 <b>~10 AU 의 안쪽 따뜻한 소행성대 analog</b> 를 확인. Fomalhaut b 시점 위치에 점광원 없음, 먼지 구름 해석과 일관.",
  "li_138":"<b>Boley A. C. et al. 2012</b> — <i>Constraining the planetary system of Fomalhaut using high-resolution ALMA observations</i>, ApJ 750, L21 (<code>2012ApJ...750L..21B</code>, arXiv:1204.0007). ALMA Cycle 0 의 주 고리 영상. 이심률 e = 0.11 ± 0.01, 안쪽 가장자리 133 AU, 바깥쪽 가장자리 158 AU, 폭 Δa/a ≈ 0.13. 양치기 행성 질량을 &lt; 3 M_Jup 으로 제약.",
  "li_139":"<b>White J. A. et al. 2017</b> — <i>ALMA observations of Fomalhaut&#x27;s outer dust ring</i>, ApJ 842, 80 (<code>2017ApJ...842...80W</code>, arXiv:1705.10670). 더 높은 분해능의 ALMA Cycle 4 follow-up. 좁은 편심 고리를 재확인하고 경사를 65.6 ± 0.4° 로 정밀화. 원반 기하 cfg 필드를 결정.",
  "li_140":"<b>Le Bouquin J.-B. et al. 2009</b> — <i>Spin axis of α PsA from interferometry</i>, A&amp;A 498, L41 (<code>2009A&amp;A...498L..41L</code>, arXiv:0904.1688). VLTI/AMBER 의 별 oblateness + 자전축 방향 측정. 잔해 원반과의 spin-orbit 정렬이 ~3° 안에서 성립함을 입증.",
  "li_141":"<b>Davis J. et al. 2005</b> — <i>Limb-darkening determinations for Fomalhaut and α Cen A from SUSI</i>, MNRAS 356, 1362 (<code>2005MNRAS.356.1362D</code>). 광학 간섭계 limb-darkening power-law α(V) ≈ 0.21 for Fomalhaut. <code>limb_darkening_alpha_h</code> 를 결정.",
  "h3_142":"Read (context / methodology, not directly decision-driving)",
  "li_143":"<b>Royer F. et al. 2007</b> — <i>Rotational velocities of A-type stars</i>, A&amp;A 463, 671 (<code>2007A&amp;A...463..671R</code>, arXiv:astro-ph/0610785). Fomalhaut 에 대해 v sin i = 93 ± 3 km/s. 원반 경사와 결합해 자전 주기 유도.",
  "li_144":"<b>Acke B. et al. 2012</b> — <i>Herschel images of Fomalhaut: An extrasolar Kuiper Belt at the height of its dynamical activity</i>, A&amp;A 540, A125 (<code>2012A&amp;A...540A.125A</code>, arXiv:1204.5037). 차가운 주 고리의 Herschel/PACS 원적외선 영상. SED fit 으로 T_dust ≈ 65 K. <code>disk_dust_temperature_k</code> 필드를 채움.",
  "li_145":"<b>Holland W. S. et al. 2017</b> — <i>SONS: The JCMT legacy survey of debris discs at submillimetre wavelengths</i>, MNRAS 470, 3606 (<code>2017MNRAS.470.3606H</code>, arXiv:1706.01218). SCUBA-2 서브밀리 측광. mm-cm 입자에서 주 고리 먼지 질량 ~1.5 × 10⁻² M⊕.",
  "li_146":"<b>Saffe C. et al. 2008</b> — <i>Spectroscopic metallicities of Vega- like stars</i>, A&amp;A 490, 297 (<code>2008A&amp;A...490..297S</code>, arXiv:0805.3936). Fomalhaut 를 포함한 Castor 운동성단 A 형 별의 고분해 금속도. [Fe/H] = −0.03 ± 0.05.",
  "li_147":"<b>Stapelfeldt K. R. et al. 2004</b> — <i>First Look at the Fomalhaut Debris Disk with Spitzer</i>, ApJS 154, 458 (<code>2004ApJS..154..458S</code>). Spitzer/MIPS 24/70/160 µm 측광. 먼지 원반의 첫 다중 밴드 열복사 특성화.",
  "li_148":"<b>Currie T. et al. 2012</b> — <i>A Direct-Imaging Survey of the Fomalhaut Planetary System with the Hubble Space Telescope</i>, ApJ 760, L32 (<code>2012ApJ...760L..32C</code>, arXiv:1210.6555). &quot;Fomalhaut b&quot; 의 독립 HST 재분석. 광원이 자체발광 행성이 아니라는 초기 증거.",
  "li_149":"<b>Schröder C. &amp; Schmitt J. H. M. M. 2007</b> — <i>X-ray emission from A-type stars</i>, A&amp;A 475, 677 (<code>2007A&amp;A...475..677S</code>). A 형 별 X 선 플럭스 ROSAT 서베이. Fomalhaut 의 log L_X 상한을 결정.",
  "li_150":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment of the host star spin with the orbit of debris discs</i>, MNRAS 438, L31 (<code>2014MNRAS.438L..31G</code>, arXiv:1311.3431). A 형 별 잔해 원반 호스트의 종족 전체 spin-orbit 정렬. Le Bouquin 2009 의 정렬 가정을 뒷받침.",
  "h3_151":"Read (instrument / non-cfg-decisive)",
  "li_152":"<b>Gray R. O. &amp; Garrison R. F. 1989</b> — <i>The Late A-Type Stars: Refined MK Classification</i> (<code>1989ApJS...70..623G</code>). MK 시스템 재분류. Fomalhaut 를 A3V/A4V 경계에 배치.",
  "li_153":"<b>Monnier J. D. et al. 2010</b> — <i>Imaging the surface of Altair</i>, Science 317, 342 (<code>2007Sci...317..342M</code>). 비교 가능한 빠른 자전체 A 형 별의 중력 어두워짐 지도 참조.",
  "li_154":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable zones around main- sequence stars</i>, ApJ 765, 131 (<code>2013ApJ...765..131K</code>, arXiv:1301.6674). A4V 별 HZ 안쪽/바깥쪽 경계.",
  "li_155":"<b>Wyatt M. C. 2008</b> — <i>Evolution of Debris Disks</i>, ARA&amp;A 46, 339 (<code>2008ARA&amp;A..46..339W</code>). 분해된 잔해 원반의 충돌 cascade 보충 이론 프레임워크. <code>disk_planetesimal_belt_inferred</code> 필드를 뒷받침.",
  "h3_156":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_157":"학회 초록 (AAS / DPS / EPSC), 간섭계 방법 논문 (CHARA / PTI commissioning), 후속 먼지 입자 광물학 작업 (Spitzer IRS 분광) 은 Di Folco 2004 + Boley 2012 + Gáspár 2023 가 이미 확립한 내용을 넘어서는 cfg-결정적 기여를 하지 않습니다. &quot;Fomalhaut b&quot; 위치의 SETI / 전파 방출 모니터링 (Tusay 2022, Saide 2023) 도 제외합니다. 필터링된 bib 는 <code>docs/phase3/_bib/fomalhaut.yaml</code> 에 <code>status: skipped</code> annotation 으로 보존됩니다.",
  "h2_158":"Open items for follow-up",
  "li_159":"<b>TW Piscis Austrini (HD 216803, K4V) 와 LP 876-10 (M4V) 의 별도 NS DB 엔트리화.</b> 광폭 공통 고유운동 동반성 두 개는 현재 152 시스템 NearStars 쇼트리스트에 들어 있지 않습니다. Mamajek 2012/2013 은 두 별이 중력적으로 연합돼 있고 같은 나이 (440 Myr) 의 Castor 운동성단 멤버임을 0.91 ly 와 5.7 ly 투영 분리에서 확립합니다. 별도 DB 엔트리로 추가되면 게임 내 플레이어가 실제 성간 궤적을 따라 세 별 사이를 비행할 수 있게 됩니다. Phase 2 DB 확장 후보로 플래그.",
  "li_160":"<b>Phase 2 <code>disk_measurements</code> 인제스트.</b> 이 합성은 <code>db/systems/fomalhaut.json</code> 에 <code>disk_measurements</code> 블록이 없어 원반 파라미터를 문헌에서 직접 가져옵니다. Kalas 2005 / Boley 2012 / White 2017 / Gáspár 2023 의 원반 기하를 DB 에 파싱해 넣어, 하류 Kopernicus cfg writer 가 Phase 3 마크다운을 재파싱 하지 않고도 데이터를 읽을 수 있게 해야 합니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
