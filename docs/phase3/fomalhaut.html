  "p_1":"Fomalhaut (α Piscis Austrini, HD 216956, HIP 113368, HR 8728) is the brightest star in the southern constellation Piscis Austrinus and one of the closest A-type main-sequence stars to the Sun. Spectral type A4V — placed at the A3V/A4V boundary in the Gray &amp; Garrison 1989 revision of the MK system — and a Hipparcos / Gaia DR3 parallax of 129.81 mas put it at <b>7.704 pc ≈ 25.13 ly</b>. The fundamental parameters are anchored on Mamajek 2012, which combined the Absil 2009 excess-corrected VLTI/VINCI angular diameter (θ_LD = 2.223 mas) with the Davis 2005 bolometric flux: R = 1.842 ± 0.019 R☉, Teff = 8590 K, L = 16.63 ± 0.48 L☉, and a Y² evolutionary mass M = 1.92 ± 0.02 M☉. This makes Fomalhaut a factor of ~17 more luminous than the Sun in the bolometric and ~24× brighter in the visible band. The ~440 Myr age comes from the same paper (isochrone of Fomalhaut A + gyro/Li/X-ray of the companion TW PsA).",
  "p_2":"Fomalhaut is the primary of a <b>hierarchical wide triple system</b>. The K4V star TW Piscis Austrini (HD 216803, V = 6.48) shares a common proper motion with Fomalhaut and lies at a projected separation of ~0.91 ly (≈ 5.7 × 10⁴ AU); a third component, the M4V flare star LP 876-10 (Gaia DR3 6638942675812506240), was identified by Mamajek 2013 at a projected separation of ~5.7 ly (≈ 1.6 × 10⁵ AU). All three share a kinematic and isochronal age of <b>440 ± 40 Myr</b> (Mamajek 2012), placing the system in the <b>Castor moving group</b>. The NearStars DB currently tracks only Fomalhaut A; TW PsA and LP 876-10 are noted in the Open items as candidate future entries — their inclusion would let the player witness, from any Fomalhaut-system planet, two faint naked-eye &quot;second suns&quot; at fixed declinations across the in-game sky.",

  "h2_154":"Surface synthesis",
  "p_155":"The photosphere of Fomalhaut sits squarely in the A-type main sequence at Teff = 8590 K, ~2800 K hotter than the Sun and ~700 K cooler than the canonical A0V standard Vega. At this temperature the continuum opacity is dominated by the Balmer / Paschen jumps of hydrogen and the bolometric SED peaks at ~334 nm, well into the UV. The visible disk is therefore strongly blue-white, with the H I Balmer absorption lines producing the deep, broad Hα/Hβ/Hγ features that define the spectral class. There are no chromospheric Ca II H&amp;K emission cores: A-stars lack the deep convective envelope required to sustain a magnetically heated chromosphere, so the log R&#x27;HK index that anchors solar-type activity synthesis is <b>not defined</b> for Fomalhaut and is omitted from the Decisions table.",
  "p_156":"The interferometric radius R = 1.842 R☉ from VLTI/VINCI (Di Folco 2004) is anchored to a limb-darkened uniform-disk angular diameter θ_LD = 2.223 ± 0.022 mas — a 1% precision measurement, second in NearStars only to α Cen A and Vega. The limb-darkening law for an A4V atmosphere is steeper than for the Sun: Davis 2005 SUSI interferometry gives a power-law exponent α ≈ 0.21 in the visible, about 50% larger than the G-dwarf value of ~0.14. This steeper limb darkening — driven by the strong temperature gradient in the hydrogen-ionization zone — means an in-game close approach to Fomalhaut shows a more &quot;limb-dimmed&quot; disk than a solar-type star, with the central brightness 30–40% above the limb brightness rather than the 15–20% solar contrast.",
  "p_157":"Granulation is much subtler than in a Sun-like star: the convective zone is shallow (only the upper ~0.05 R★) and the granule scale is small (~50 km rather than the solar ~1000 km), producing a smooth photosphere with no resolvable cells from a planet&#x27;s perspective. The slightly sub-solar metallicity ([Fe/H] = −0.03, Dunkin 1997; A-star spectroscopic [Fe/H] is scattered, so Mamajek 2012 assumes protosolar Z = 0.017) introduces negligible SED reddening; the visual tint chosen for the cfg, <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code>, encodes the A4V blackbody peak shifted slightly redward of Vega&#x27;s A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> baseline to keep the two A-stars visually distinguishable in the NearStars catalog.",
  "h2_158":"Atmosphere synthesis",
  "p_159":"A4V stars have <b>no chromosphere–transition-region–corona structure analogous to cool stars</b> in the magnetic sense. The outer atmosphere is radiative all the way to the photosphere–wind interface, with no acoustic or magnetic heating mechanism to sustain a hot corona. X-ray detections of Fomalhaut are accordingly very weak: ROSAT upper limits (Schröder &amp; Schmitt 2007) give log L_X &lt; 27.5 (erg/s, 0.1–2.4 keV), and the marginal detection by XMM-Newton is plausibly attributable to a magnetically active <b>late-type companion at small separation</b> rather than to Fomalhaut A itself. No coronal X-ray cycle is expected and none is observed.",
  "p_160":"The UV/FUV flux is intrinsically high — the Wien tail of an 8590 K photosphere puts substantial energy below 200 nm — and this is the dominant atmospheric-erosion driver for any inner planet around an A-star. The XUV/EUV flux relative to bolometric is, however, low (no chromospheric Lyα emission core), so for any habitable-zone planet (HZ for Fomalhaut sits at ~3.5–6 AU per Kopparapu 2013), the XUV-driven erosion is bounded by the photospheric UV continuum rather than by chromospheric line emission. There are no flares: the absence of a convective envelope eliminates the dynamo mechanism that powers M-dwarf and K-dwarf flaring.",
  "p_161":"The 440-Myr age means Fomalhaut is still on the early main sequence (its A4V evolutionary lifetime is ~1.0 Gyr; Mamajek 2012 places it at ~44% of MS lifetime). It is not yet evolving onto the subgiant branch, but is hot enough that any planet at 1 AU would receive ~17× solar insolation — well inside the cooked / runaway-greenhouse boundary. The cfg adopts the canonical no-corona, no-chromospheric- emission, no-flare A-star prescription for activity.",
  "h2_162":"Rotation &amp; spin synthesis",
  "p_163":"Fomalhaut is a <b>rapid rotator</b>, as is typical of A-stars too hot for magnetic braking to have spun them down. Royer 2007 measures v sin i = 93 ± 3 km/s from line-broadening of the Mg II 4481 Å feature. Combined with the inclination i ≈ 65.6° inferred from the debris-disk orbital plane (Le Bouquin 2009 — assuming spin-orbit alignment between star and disk, which is observationally consistent with all young debris-disk A-stars surveyed by Greaves 2014), the deprojected equatorial velocity is v_eq ≈ 102 km/s.",
  "p_164":"The corresponding rotation period is P_rot = 2πR/v_eq ≈ <b>0.97 days</b> (DERIVED ONLY — no measured period exists; from v sin i ≈ 93 km/s + R + assumed i ≈ 65°, the v sin i being the sole direct rotation constraint) — a factor of ~25 faster than the Sun and approaching the critical break-up velocity of ~390 km/s only at ~25% of that limit, so the star is not significantly oblate. The fast rotation does, however, produce a measurable <b>gravity-darkening latitudinal temperature gradient</b>: Monnier 2010 CHARA/MIRC interferometry of similar rapid-rotator A-stars (Altair, Vega) finds ΔT(pole−equator) ≈ 500–1500 K. For Fomalhaut specifically no resolved gravity- darkening map exists, but von Zeipel scaling predicts ΔT ≈ 300 K (pole hotter than equator) — observable as a subtle &quot;pole-on brightening&quot; in the cfg disk shader for high-inclination viewers.",
  "p_165":"The spin-orbit alignment with the debris disk is the strongest constraint on the rotation axis: Le Bouquin 2009 interferometry established that Fomalhaut&#x27;s spin axis is co-aligned with the disk normal to within ~3°. NearStars adopts this co-aligned configuration so that the rotational equator of the star and the orbital plane of the debris ring share a common reference frame — a small but authentic detail for in-game observers above the disk plane.",
  "h2_166":"Canonical alternatives",
  "p_167":"<b>Radius / Teff — excess-corrected vs uncorrected interferometry.</b> The cfg adopts the Mamajek 2012 values (R 1.842 R☉, Teff 8590 K), derived from the Absil et al. 2009 angular diameter that subtracts the resolved circumstellar K-band excess (θ_LD = 2.223 mas). The documented alternative is Davis et al. 2005, whose SUSI fit did NOT remove the excess and gives a smaller R (1.744 R☉) and hotter Teff (8819 K). Both are self-consistent; the excess-corrected Absil/Mamajek solution is the principled default, and the two agree on L (~16.5–16.6 L☉) since that comes from the same bolometric flux.",
  "p_168":"<b>Metallicity.</b> A-star spectroscopic [Fe/H] is unreliable: the cfg records the near-solar Dunkin 1997 −0.03, but determinations scatter widely (Erspamer 2003 +0.43), so Mamajek 2012 simply assumes protosolar Z = 0.017 for the isochrone. Treat [Fe/H] as ≈ solar.",
  "h2_169":"Visual styling",
  "p_170":"In the NearStars renderer, Fomalhaut is portrayed as a <b>cool blue-white A4V disk</b> tinted <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> — distinctly bluer than the G/K stars in the catalog (warm cream-to-orange) but slightly warmer than Vega&#x27;s near-A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> baseline. At V = 1.16 from Earth, Fomalhaut is the 18th-brightest star in the night sky and the brightest in the southern hemisphere autumn quadrant.",
  "p_171":"From a candidate planet at the inner edge of the habitable zone (~3.5 AU per Kopparapu 2013), the star subtends an angular diameter 2R★/a × (180·60/π) ≈ 0.06° — about ⅛ the angular diameter of the Sun seen from Earth. Despite the small angular size, the surface brightness is much higher than the Sun&#x27;s because of the T⁴ scaling (Teff = 8590 K vs 5772 K → 5.0× higher per unit solid angle), so the bolometric flux at HZ is ~5× the solar constant at 1 AU. The visible-band illumination is even more strongly weighted to the blue, giving any HZ planet a noticeably cooler-spectrum daytime sky than Earth would have under Sol.",
  "p_172":"The <b>debris ring</b> is the visual centerpiece of the system. Viewed from any inner-system planet, the 133–158 AU main ring forms a ~25–30 arcminute thin elliptical band across the sky (eccentricity e ≈ 0.11 producing a visible offset of the star from the ring center — 14 AU offset, easily visible in any wide-field view). The cold main ring is rendered as its own Kopernicus <code>Ring</code> with <code>disk_cold_tint_rgb_hex = #d6d8da</code> — a near-neutral grey-white (measured: Kalas 2005 low-albedo large-grain scattering) from ~65 K dust re-scattering A-star light; the inner warm (<span class=\"hex-chip\" style=\"background:#dedede\"></span><code>#dedede</code>) and intermediate (<span class=\"hex-chip\" style=\"background:#d8d8da\"></span><code>#d8d8da</code>) belts render as separate Rings inside the same <code>Rings {}</code> block. The <code>disk_cold_opacity = 0.35</code> is a tie-break boost from the physical optical depth (~10⁻⁴) to ensure the ring reads as visible in-game rather than as a numerical artifact.",
  "p_173":"The <b>intermediate belt at 83–104 AU</b> (Gáspár 2023 JWST) is rendered as a fainter secondary ring with the same dust tint at half opacity, producing a Saturn-like double-ring structure but at a vastly larger scale. The <b>broad inner disk (~10–78 AU, inclined ~47.8°)</b> (Gáspár 2023) is rendered as a wide, faint low-density ring — visibly tilted relative to the outer belts, which is the headline JWST misalignment result — with its inner edge close enough to the star that its scattered light contributes to the inner-system zodiacal glow.",
  "p_174":"The <b>two stellar companions</b> appear as fixed point sources in the in-game sky. TW Piscis Austrini at 0.91 ly projected separation sits at apparent magnitude V ≈ 6.5 from any Fomalhaut planet — at the very edge of unaided visibility, easily seen in any starfield view as a distinctly <b>orange K-dwarf dot</b>. LP 876-10 at 5.7 ly is fainter (V ≈ 11) and below naked-eye visibility but appears in telescope views as a faint <b>red M-dwarf</b> point. Neither shows a resolved disk; both are flagged in the cfg as <code>visual_companion_event_*</code> point sources so the renderer places them correctly without attempting to draw a disk.",
  "p_175":"There are no eclipse / occultation events between Fomalhaut A and its widely-separated companions; the projected separations of ~0.91 ly and ~5.7 ly are far too large to produce any in-game alignment phenomena on human timescales.",
  "h2_176":"Bibliography",
  "h3_177":"Read (visual-informative, drove decisions above)",
  "li_178":"<b>Mamajek E. E. 2012</b> — <i>On the age and binarity of Fomalhaut</i>, ApJ 754, L20 (<code>2012ApJ...754L..20M</code>, <a href=\"https://arxiv.org/abs/1206.6353\">arXiv:1206.6353</a>). <b>Phase 2 anchor for the whole stellar layer.</b> Re-derives R 1.842 ± 0.019 R☉, Teff 8590 ± 73 K, L 16.63 ± 0.48 L☉ from the Absil 2009 excess- corrected θ_LD + Davis 2005 f_bol; mass 1.92 ± 0.02 M☉ (Y² tracks); age 440 ± 40 Myr (isochrone of A + gyro/Li/X-ray of companion TW PsA).",
  "li_179":"<b>Absil O. et al. 2009</b> — <i>A near-infrared interferometric survey of debris-disc stars II: Fomalhaut</i>, ApJ 704, 150 (<code>2009ApJ...704..150A</code>, <a href=\"https://arxiv.org/abs/0908.3133\">arXiv:0908.3133</a>). Excess-corrected VLTI/VINCI θ_LD = 2.223 ± 0.022 mas (subtracting the resolved 0.88% K-band circumstellar emission) — the angular diameter Mamajek 2012 uses for R/Teff. Apparent oblateness 1.021.",
  "li_180":"<b>Mamajek E. E. et al. 2013</b> — <i>Discovery of a Faint Companion to Alpha PsA Using MMT/AO 5 μm Imaging</i>, AJ 146, 154 (<code>2013AJ....146..154M</code>, <a href=\"https://arxiv.org/abs/1310.0764\">arXiv:1310.0764</a>). Identifies LP 876-10 as the M4V third component of the Fomalhaut hierarchical triple at 5.7 ly projected; common proper motion + isochronal age match.",
  "li_181":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric observations of Vega-like stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>, arXiv:astro-ph/0408390). The original VLTI/VINCI K-band angular diameter; refined by the Absil 2009 excess correction that Mamajek 2012 adopts.",
  "li_182":"<b>Dunkin S. K. et al. 1997</b> — <i>High-resolution spectroscopy of Vega-like stars</i>, MNRAS 286, 604 (<code>1997MNRAS.286..604D</code>). [Fe/H] = −0.03 for Fomalhaut — the Phase 2 recommended (near-solar) metallicity; A-star [Fe/H] determinations scatter widely.",
  "li_183":"<b>Kalas P. et al. 2005</b> — <i>A planetary system as the origin of structure in Fomalhaut&#x27;s dust belt</i>, Nature 435, 1067 (<code>2005Natur.435.1067K</code>). HST/ACS coronagraphy first resolves the narrow, eccentric main ring at 133 AU with e ≈ 0.11 and a sharp inner edge — interpreted as gravitational sculpting by an unseen planet (the original &quot;shepherding&quot; inference).",
  "li_184":"<b>Kalas P. et al. 2008</b> — <i>Optical Images of an Exosolar Planet 25 Light-Years from Earth</i>, Science 322, 1345 (<code>2008Sci...322.1345K</code>). The original &quot;Fomalhaut b&quot; HST detection paper. <b>Retraction context</b>: subsequent re-analysis by Gáspár &amp; Rieke 2020 and the JWST 2023 non-detection (Gáspár 2023) re-interprets the source as a transient expanding dust cloud from a planetesimal collision rather than a bound planet. This synthesis follows the current consensus.",
  "li_185":"<b>Gáspár A. &amp; Rieke G. H. 2020</b> — <i>New HST data and modeling reveal a massive planetesimal collision around Fomalhaut</i>, PNAS 117, 9712 (<code>2020PNAS..117.9712G</code>, <a href=\"https://arxiv.org/abs/2004.08736\">arXiv:2004.08736</a>). Re-analysis of HST archive shows &quot;Fomalhaut b&quot; has expanded and faded between 2004–2014 epochs, consistent with an expanding dust cloud from a ~200 km planetesimal collision rather than a bound point source.",
  "li_186":"<b>Gáspár A. et al. 2023</b> — <i>Spatially resolved imaging of the inner Fomalhaut disk using JWST/MIRI</i>, Nature Astronomy 7, 790 (<code>2023NatAs...7..790G</code>, <a href=\"https://arxiv.org/abs/2305.03789\">arXiv:2305.03789</a>). JWST/MIRI imaging at 15.5 µm + 23 µm resolves a previously-unknown <b>intermediate belt at ~83–104 AU</b> (separated from the inner disk by a ~78 AU gap; inner disk inclined ~47.8° vs the 64.4° outer ring) and revises the pre-JWST warm &quot;asteroid-belt analog&quot; into a <b>broad inner disk (~10–78 AU)</b>; no point source at the Fomalhaut-b epoch position, consistent with the dust-cloud interpretation.",
  "li_187":"<b>Boley A. C. et al. 2012</b> — <i>Constraining the planetary system of Fomalhaut using high-resolution ALMA observations</i>, ApJ 750, L21 (<code>2012ApJ...750L..21B</code>, <a href=\"https://arxiv.org/abs/1204.0007\">arXiv:1204.0007</a>). ALMA Cycle 0 imaging of the main ring; eccentricity e = 0.11 ± 0.01, inner edge 133 AU, outer edge 158 AU, width Δa/a ≈ 0.13; constrains shepherd planet mass to &lt; 3 M_Jup.",
  "li_188":"<b>White J. A. et al. 2017</b> — <i>ALMA observations of Fomalhaut&#x27;s outer dust ring</i>, ApJ 842, 80 (<code>2017ApJ...842...80W</code>, <a href=\"https://arxiv.org/abs/1705.10670\">arXiv:1705.10670</a>). Higher-resolution ALMA Cycle 4 follow-up; confirms the narrow eccentric ring and refines the inclination to 65.6 ± 0.4°; sets the disk geometry cfg fields.",
  "li_189":"<b>Le Bouquin J.-B. et al. 2009</b> — <i>Spin axis of α PsA from interferometry</i>, A&amp;A 498, L41 (<code>2009A&amp;A...498L..41L</code>, <a href=\"https://arxiv.org/abs/0904.1688\">arXiv:0904.1688</a>). VLTI/AMBER measurement of stellar oblateness + spin axis orientation; demonstrates spin-orbit alignment with the debris disk to ~3°.",
  "li_190":"<b>Davis J. et al. 2005</b> — <i>Limb-darkening determinations for Fomalhaut and α Cen A from SUSI</i>, MNRAS 356, 1362 (<code>2005MNRAS.356.1362D</code>). Optical interferometric limb-darkening power-law α(V) ≈ 0.21 for Fomalhaut; sets <code>limb_darkening_alpha_h</code>.",
  "h3_191":"Read (context / methodology, not directly decision-driving)",
  "li_192":"<b>Royer F. et al. 2007</b> — <i>Rotational velocities of A-type stars</i>, A&amp;A 463, 671 (<code>2007A&amp;A...463..671R</code>, arXiv:astro-ph/0610785). Gives v sin i = 93 ± 3 km/s for Fomalhaut; combined with disk inclination to derive rotation period.",
  "li_193":"<b>Acke B. et al. 2012</b> — <i>Herschel images of Fomalhaut: An extrasolar Kuiper Belt at the height of its dynamical activity</i>, A&amp;A 540, A125 (<code>2012A&amp;A...540A.125A</code>, <a href=\"https://arxiv.org/abs/1204.5037\">arXiv:1204.5037</a>). Herschel/PACS far-IR imaging of the cold main ring; SED fit T_dust ≈ 65 K; fills the <code>disk_dust_temperature_k</code> field.",
  "li_194":"<b>Holland W. S. et al. 2017</b> — <i>SONS: The JCMT legacy survey of debris discs at submillimetre wavelengths</i>, MNRAS 470, 3606 (<code>2017MNRAS.470.3606H</code>, <a href=\"https://arxiv.org/abs/1706.01218\">arXiv:1706.01218</a>). SCUBA-2 submm photometry; main-ring dust mass ~1.5 × 10⁻² M⊕ in mm-cm grains.",
  "li_195":"<b>Saffe C. et al. 2008</b> — <i>Spectroscopic metallicities of Vega- like stars</i>, A&amp;A 490, 297 (<code>2008A&amp;A...490..297S</code>, <a href=\"https://arxiv.org/abs/0805.3936\">arXiv:0805.3936</a>). Castor-moving-group [Fe/H] = −0.03 ± 0.05 — a corroborating metallicity (the cfg cites Dunkin 1997 as the Phase 2 recommended value; both are near-solar).",
  "li_196":"<b>Stapelfeldt K. R. et al. 2004</b> — <i>First Look at the Fomalhaut Debris Disk with Spitzer</i>, ApJS 154, 458 (<code>2004ApJS..154..458S</code>). Spitzer/MIPS 24/70/160 µm photometry; first multi-band thermal characterization of the dust disk.",
  "li_197":"<b>Currie T. et al. 2012</b> — <i>A Direct-Imaging Survey of the Fomalhaut Planetary System with the Hubble Space Telescope</i>, ApJ 760, L32 (<code>2012ApJ...760L..32C</code>, <a href=\"https://arxiv.org/abs/1210.6555\">arXiv:1210.6555</a>). Independent HST re-analysis of &quot;Fomalhaut b&quot;; early evidence that the source is not a self-luminous planet.",
  "li_198":"<b>Schröder C. &amp; Schmitt J. H. M. M. 2007</b> — <i>X-ray emission from A-type stars</i>, A&amp;A 475, 677 (<code>2007A&amp;A...475..677S</code>). ROSAT survey of A-star X-ray flux; sets the log L_X upper limit for Fomalhaut.",
  "li_199":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment of the host star spin with the orbit of debris discs</i>, MNRAS 438, L31 (<code>2014MNRAS.438L..31G</code>, <a href=\"https://arxiv.org/abs/1311.3431\">arXiv:1311.3431</a>). Population-wide spin- orbit alignment for A-star debris-disk hosts; supports the Le Bouquin 2009 alignment assumption.",
  "h3_200":"Read (instrument / non-cfg-decisive)",
  "li_201":"<b>Gray R. O. &amp; Garrison R. F. 1989</b> — <i>The Late A-Type Stars: Refined MK Classification</i> (<code>1989ApJS...70..623G</code>). MK system reclassification placing Fomalhaut at the A3V/A4V boundary.",
  "li_202":"<b>Monnier J. D. et al. 2010</b> — <i>Imaging the surface of Altair</i>, Science 317, 342 (<code>2007Sci...317..342M</code>). Reference for gravity-darkening map of a comparable rapid-rotator A-star.",
  "li_203":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable zones around main- sequence stars</i>, ApJ 765, 131 (<code>2013ApJ...765..131K</code>, <a href=\"https://arxiv.org/abs/1301.6674\">arXiv:1301.6674</a>). HZ inner/outer boundaries for A4V star.",
  "li_204":"<b>Wyatt M. C. 2008</b> — <i>Evolution of Debris Disks</i>, ARA&amp;A 46, 339 (<code>2008ARA&amp;A..46..339W</code>). Theoretical framework for collisional cascade replenishment in resolved debris disks; underpins the <code>disk_planetesimal_belt_inferred</code> field.",
  "h3_205":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_206":"Conference abstracts (AAS / DPS / EPSC), interferometric methods papers (CHARA / PTI commissioning), and follow-up dust-grain mineralogy work (Spitzer IRS spectra) contribute no cfg-decisive content beyond what Di Folco 2004 + Boley 2012 + Gáspár 2023 already establish. SETI / radio-emission monitoring of the &quot;Fomalhaut b&quot; position (Tusay 2022, Saide 2023) is also skipped. Filtered bib preserved in <code>docs/phase3/_bib/fomalhaut.yaml</code> with <code>status: skipped</code> annotations.",
  "h2_207":"Open items for follow-up",
  "li_208":"<b>TW Piscis Austrini (HD 216803, K4V) and LP 876-10 (M4V) as separate NS DB entries</b>: The two wide common-proper-motion companions are not currently in the 152-system NearStars shortlist. Mamajek 2012/2013 establish them as gravitationally associated, co-eval (440 Myr) Castor-moving-group members at projected separations of 0.91 ly and 5.7 ly. If added as separate DB entries, the in-game player could fly between all three on real interstellar trajectories. Flag as Phase 2 DB expansion candidate.",
  "li_209":"<b>Disk geometry is multi-belt in <code>disks_curated.json</code></b> (audited 2026-05-29): Fomalhaut&#x27;s warm + intermediate + cold belts are separate <code>belt</code> entries, and the Decisions table renders them as per-belt <code>disk_&lt;belt&gt;_*</code> fields → one Kopernicus Ring each. The per-belt Mie color synthesis is now done: all three belts share the same icy (ice + silicate, ~50–80% water ice) composition — the warm + intermediate dust are PR-drag fragments of the outer belt (Sommer et al. 2025 <code>2503.18127</code>), so all three synthesize to the same <span class=\"hex-chip\" style=\"background:#fff4e5\"></span><code>#fff4e5</code> pale-cream reflectance.",
  "li_210":"<b>2025 ALMA cold-ring refinements (documentation only — not emitted)</b>: the cold ring&#x27;s single eccentricity (e ≈ 0.11) is now resolved into a <i>negative eccentricity gradient</i> e_f ∝ a^(−1.75±0.16) (Lovell et al. 2025 <code>2509.02884</code>) plus an apsidal asymmetry — the SE ansa is 4 AU wider and the NW ansa 21 % brighter (Chittidi et al. 2025 <code>2509.02825</code>). The Kopernicus Ring is circular/flat, so no cfg value changes; recorded for future eccentric/volumetric rendering.",
  "li_211":"<b>&quot;Great Dust Cloud&quot; is a background galaxy</b> (Kennedy 2023; confirmed by a 230.25 GHz spectral line in Chittidi et al. 2025 <code>2509.02825</code>) — it is correctly NOT rendered as a Fomalhaut disk feature.",
  "li_212":"<b>&quot;Fomalhaut b S1&quot; candidate revisit</b>: If a 2026+ JWST/MIRI or ground-based ELT follow-up reverses the Gáspár &amp; Rieke 2020 dust- cloud interpretation and re-establishes a bound planet at ~115 AU, a new Decisions entry <code>circumstellar_planet_present: true</code> (with the candidate &quot;S1&quot; naming) would be needed and the cfg should document the divergence from the current consensus. Until then, no planet is included.",
  "li_213":"<b>Phase 2 <code>teff_measurements</code> and <code>metallicity_measurements</code> population</b>: DB has <code>teff_k = 8689</code> as a SIMBAD compilation scalar with no provenance entry; Saffe 2008 metallicity is also not in DB. Both should be added with paper-cited Phase 2 entries.",
  "li_214":"<b>Gravity-darkening map</b>: No resolved interferometric gravity- darkening map of Fomalhaut exists (unlike Vega, Altair, Regulus). CHARA/MIRC or VLTI/GRAVITY observation of the von-Zeipel pole-to-equator temperature gradient would let the cfg replace the current uniform-disk tint with a latitudinal gradient (<code>visual_gravity_darkening_delta_t_k</code> field, currently absent).",

  ko: {
  "p_1":"Fomalhaut (α Piscis Austrini, HD 216956, HIP 113368, HR 8728) 는 남쪽 하늘 물고기자리(Piscis Austrinus)에서 가장 밝은 별이자, 태양과 가까운 A 형 주계열성 중 손꼽히는 별입니다. 분광형은 A4V 로, Gray &amp; Garrison 1989 의 MK 시스템 개정에서 A3V/A4V 경계에 놓이며, Hipparcos / Gaia DR3 시차 129.81 mas 가 거리 <b>7.704 pc ≈ 25.13 ly</b> 를 줍니다. 기본 파라미터는 Mamajek 2012 에 정박돼 있는데, 이 논문은 Absil 2009 의 excess 보정 VLTI/VINCI 각지름 (θ_LD = 2.223 mas) 과 Davis 2005 의 볼로메트릭 플럭스를 결합해 R = 1.842 ± 0.019 R☉, Teff = 8590 K, L = 16.63 ± 0.48 L☉, 그리고 Y² 진화 모델 질량 M = 1.92 ± 0.02 M☉ 를 유도합니다. 이 값들 덕분에 Fomalhaut 는 볼로메트릭 기준 태양보다 약 17 배, 가시광 밴드에서는 약 24 배 밝게 빛납니다. ~440 Myr 의 나이도 같은 논문에서 나옵니다 (Fomalhaut A 의 등시선 + 동반성 TW PsA 의 자이로/Li/X 선 나이).",
  "p_2":"Fomalhaut 는 <b>계층적 광폭 삼중계의 주성</b>입니다. K4V 별 TW Piscis Austrini (HD 216803, V = 6.48) 는 Fomalhaut 와 공통 고유운동을 공유하며 투영 분리 ~0.91 ly (≈ 5.7 × 10⁴ AU) 에 위치하고, 세 번째 성분인 M4V 플레어 별 LP 876-10 (Gaia DR3 6638942675812506240) 은 Mamajek 2013 이 투영 분리 ~5.7 ly (≈ 1.6 × 10⁵ AU) 에서 식별했습니다. 세 별 모두 운동학적/등시선상 나이 <b>440 ± 40 Myr</b> (Mamajek 2012) 를 공유하며, 이 시스템은 <b>Castor 운동성단</b>에 속합니다. NearStars DB 는 현재 Fomalhaut A 만 추적하며, TW PsA 와 LP 876-10 은 향후 후보 엔트리로 Open items 에 기록돼 있습니다. 두 별이 추가되면 Fomalhaut 계 어느 행성에서든 게임 내 하늘에서 고정된 적위에 떠 있는 희미한 맨눈급 &quot;제2의 태양&quot; 두 점을 볼 수 있게 됩니다.",
  "p_3":"Fomalhaut 가 학술적으로 유명한 까닭은 <b>분해된 별주위 잔해 원반</b> 때문입니다. Kalas et al. 2005 의 HST/ACS 코로나그래프 영상이 장반경 a ≈ 140 AU, 이심률 e ≈ 0.11 의 좁고 편심한 고리를 처음 찍어 냈는데, 안쪽 가장자리가 날카로워 보이지 않는 양치기 천체가 중력 적으로 조각하고 있음을 시사했습니다. ALMA 밀리미터 영상 (Boley 2012; White 2017) 은 기하를 정밀화해 이심률, 좁은 폭 (Δa/a ≈ 0.13), 경사 i ≈ 65–67° 를 확정했습니다. Gáspár et al. 2023 의 JWST/MIRI 영상은 <b>넓은 안쪽 디스크</b> (~10–78 AU, 경사 ~47.8° 로 외곽 고리와 어긋남) 와 ~83–104 AU 의 (~78 AU gap 으로 분리되는) <b>중간 벨트</b> 를 분해해, 태양계 소행성대 + 카이퍼대 + scattered disk 와 유사하지만 온도와 질량 모두 크게 부풀린 3 벨트 구조를 완성했습니다. Kalas et al. 2008 이 HST 가시광 영상에서 보고한 그 유명한 &quot;<b>Fomalhaut b</b>&quot; 점광원은 이후 행성소체 충돌에서 발생한 팽창 먼지 구름으로 재해석됐습니다 (Gáspár &amp; Rieke 2020; JWST 2023 의 미검출과도 일관). 이 합성은 현재 컨센서스를 따르며, Fomalhaut b 를 <b>별주위 행성으로 포함하지 않습니다</b>.",
  "p_4":"<b>NearStars 시나리오 선택. 다중 벨트 편심 잔해 원반계로 둘러싸인 젊고 뜨거운 고광도 A4V 별로, 광폭 궤도의 희미한 맨눈급 동반성 두 개가 어느 행성 밤하늘에든 시각적 흥미를 더하는 모습으로 렌더링합니다.</b> 항성 레이어는 Mamajek 2012 (Absil 2009 의 excess 보정 간섭계) 에 다시 정박했으며, 보정 안 한 Davis 2005 대비 반지름/Teff divergence 를 문서화했습니다. cfg 픽은 canonical 파라미터 셋을 따르며, tie-break 픽은 시각 hex 색 (A4V SED 백청색) 과 원반 RGB 색조 (먼지 온도 → 광학 색) 에 한정됩니다.",

  "td_129":"Boley 2012 ALMA — cold 주 고리의 수직 구조. midplane 에서 1.0° ± 0.25 opening angle (지수 분포) 이므로 h = H/r = tan θ ≈ 0.0175. 이 디스크의 유일한 수직 구조 측정입니다 (MacGregor 2017 은 2D 모델로 이것을 인용만 함). 평면 Kopernicus Ring 은 소비하지 않으며, 완전성과 향후 볼류메트릭/Parallax 렌더링용으로 기록합니다",

  "td_145":"cold 고리는 Le Bouquin 2009 / Boley 2012 ALMA. 내부 디스크는 Gáspár 2023 (i ≈ 47.8° vs 외곽 고리 64.4° — JWST 핵심 misalignment 결과)",

  "td_148":"medium",
  "td_149":"Holland 2017 SCUBA-2 + ALMA. 하한은 영상 입자, 상한은 충돌 cascade 모델링",
  "td_150":"<code>disk_planetesimal_belt_inferred</code>",
  "td_151":"true",
  "td_152":"high",
  "td_153":"cold 고리의 날카로운 안쪽 가장자리 (Kalas 2005) 는 양치기 천체를 요구. 충돌 cascade 보충에 부모 행성소체 종족 필요 (Wyatt 2008, Boley 2012 적용)",
  "h2_154":"Surface synthesis",
  "p_155":"Fomalhaut 의 광구는 Teff = 8590 K 로 A 형 주계열의 한가운데에 자리잡으며, 태양보다 약 2800 K 뜨겁고 canonical A0V 표준성 Vega 보다는 약 700 K 차갑습니다. 이 온도에서 연속체 불투명도는 수소의 Balmer / Paschen jump 가 지배하며 볼로메트릭 SED 의 정점은 ~334 nm 로 UV 영역 깊숙이 들어갑니다. 따라서 가시 디스크는 강하게 청백색 으로 빛나며, H I Balmer 흡수선이 분광형을 정의하는 깊고 넓은 Hα/Hβ/Hγ 피처를 만듭니다. 색채권 Ca II H&amp;K 방출 핵은 없습니다. A 형 별에는 자기적으로 가열되는 색채권을 유지하는 데 필요한 깊은 대류 envelope 가 없기 때문에, 태양형 활동도 합성을 정박하는 log R&#x27;HK 지표는 Fomalhaut 에 대해 <b>정의되지 않으며</b> Decisions 테이블에서 생략합니다.",
  "p_156":"VLTI/VINCI 의 간섭계 반지름 R = 1.842 R☉ (Di Folco 2004) 는 limb- darkened uniform-disk 각지름 θ_LD = 2.223 ± 0.022 mas 에 정박돼 있으며 — 1% 정밀도 측정으로, NearStars 카탈로그 안에서는 α Cen A 와 Vega 다음 정밀도입니다. A4V 대기의 limb-darkening 법칙은 태양 보다 더 가파릅니다. Davis 2005 의 SUSI 간섭계가 가시광에서 power- law 지수 α ≈ 0.21 을 주는데, 이는 G 형 왜성 값 ~0.14 보다 약 50% 큰 값입니다. 이 더 가파른 limb darkening 은 수소 이온화 영역의 강한 온도 구배에 기인하며, 게임 내에서 Fomalhaut 에 가까이 접근 할 때 태양형 별보다 &quot;limb-dimmed&quot; 효과가 더 강한 디스크를 보게 됩니다. 중심 밝기가 limb 밝기보다 30–40% 높으며, 태양형의 15–20% 대비를 넘어섭니다.",
  "p_157":"Granulation 은 태양형 별보다 훨씬 미세합니다. 대류 영역은 얕고 (상부 ~0.05 R★ 에 불과) granule 스케일도 작아 (태양의 ~1000 km 대신 ~50 km), 행성 시점에서 분해 가능한 셀이 없는 매끄러운 광구가 형성됩니다. 살짝 sub-solar 한 금속도 ([Fe/H] = −0.03, Dunkin 1997. A 형 별 분광 [Fe/H] 는 산포가 커서 Mamajek 2012 는 protosolar Z = 0.017 을 가정) 는 SED reddening 에 무시할 만한 영향을 줍니다. cfg 가 채택한 시각 색조 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 는 A4V 흑체 정점을 Vega 의 A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> 기준선보다 살짝 적색 쪽으로 옮긴 값을 인코딩해, 두 A 형 별을 NearStars 카탈로그 안에서 시각적으로 구분되게 합니다.",
  "h2_158":"Atmosphere synthesis",
  "p_159":"A4V 별에는 <b>자기적 의미에서 차가운 별과 유사한 chromosphere– transition-region–corona 구조가 없습니다</b>. 바깥 대기는 광구– 항성풍 경계까지 줄곧 복사 평형이며, 뜨거운 코로나를 유지할 음향 가열이나 자기 가열 메커니즘이 없습니다. 그래서 Fomalhaut 의 X 선 검출은 매우 약합니다. ROSAT 상한 (Schröder &amp; Schmitt 2007) 은 log L_X &lt; 27.5 (erg/s, 0.1–2.4 keV) 를 주며, XMM-Newton 의 경계선 검출은 Fomalhaut A 자체가 아니라 <b>작은 분리 거리의 자기 활동성 후기형 동반성</b> 에 기인할 가능성이 큽니다. 코로나 X 선 사이클은 예상되지 않으며 관측되지도 않습니다.",
  "p_160":"UV/FUV 플럭스는 본질적으로 높습니다. 8590 K 광구의 Wien 꼬리가 200 nm 아래에 상당한 에너지를 두기 때문이며, 이는 A 형 별 주위 안쪽 행성 어디에서든 대기 침식의 지배적인 구동력입니다. 다만 볼로메트릭 대비 XUV/EUV 플럭스는 낮습니다 (색채권 Lyα 방출 핵이 없음). 따라서 거주가능영역 행성 (Kopparapu 2013 에 따르면 Fomalhaut 의 HZ 는 ~3.5–6 AU 에 위치) 의 XUV 구동 침식은 색채권 선 방출이 아니라 광구 UV 연속체로 제한됩니다. 플레어도 없습니다. 대류 envelope 의 부재는 M 형/K 형 왜성의 플레어를 일으키는 다이나모 메커니즘을 원천 차단합니다.",
  "p_161":"440 Myr 의 나이는 Fomalhaut 가 아직 주계열 초기에 머문다는 뜻 입니다 (A4V 진화 수명은 ~1.0 Gyr. Mamajek 2012 는 MS 수명의 ~44% 지점에 위치시킵니다). 아직 준거성 가지로 진화하지 않았지만, 너무 뜨거워 1 AU 의 행성은 ~17 배 태양 일사량을 받게 됩니다 — 익혀지는 / 폭주 온실 효과 경계 한참 안쪽입니다. cfg 는 활동도에 대해 코로나 없음, 색채권 방출 없음, 플레어 없음의 canonical A 형 별 처방을 채택합니다.",
  "h2_162":"Rotation &amp; spin synthesis",
  "p_163":"Fomalhaut 는 <b>빠른 자전체</b> 입니다. 자기 제동이 별을 늦추기에는 너무 뜨거운 A 형 별의 전형적인 모습입니다. Royer 2007 은 Mg II 4481 Å 피처의 line broadening 에서 v sin i = 93 ± 3 km/s 를 측정합니다. 잔해 원반 궤도 평면에서 추정한 경사 i ≈ 65.6° (Le Bouquin 2009 — 별과 원반의 spin-orbit 정렬을 가정하며, Greaves 2014 의 젊은 잔해 원반 A 형 별 서베이에서 모두 관측적으로 일관) 와 결합하면 deprojected 적도 속도는 v_eq ≈ 102 km/s 입니다.",
  "p_164":"대응하는 자전 주기는 P_rot = 2πR/v_eq ≈ <b>0.97 일</b> 입니다 (DERIVED ONLY — 측정된 주기는 없음. v sin i ≈ 93 km/s + R + 가정 i ≈ 65° 에서 유도하며, v sin i 가 유일한 직접 자전 제약). 태양보다 약 25 배 빠릅니다. 임계 분열 속도 ~390 km/s 의 약 25% 에 해당하는 수준이라 별이 유의미하게 oblate 하지는 않습니다. 다만 빠른 자전은 측정 가능한 <b>중력 어두워짐(gravity-darkening) 위도 온도 구배</b> 를 만듭니다. Monnier 2010 의 CHARA/MIRC 간섭계가 비슷한 빠른 자전체 A 형 별 (Altair, Vega) 에서 ΔT(pole−equator) ≈ 500–1500 K 를 측정했습니다. Fomalhaut 자체에 분해된 중력 어두워짐 지도는 존재하지 않지만, von Zeipel 스케일링은 ΔT ≈ 300 K (극이 적도보다 뜨거움) 를 예측합니다 — 고경사 관측자에게는 cfg 디스크 셰이더에서 미묘한 &quot;극 방향 밝아짐&quot;으로 관측 가능한 효과입니다.",
  "p_165":"잔해 원반과의 spin-orbit 정렬은 자전축에 대한 가장 강력한 제약 입니다. Le Bouquin 2009 의 간섭계는 Fomalhaut 의 자전축이 원반 법선과 ~3° 안에서 공-정렬돼 있음을 확립했습니다. NearStars 는 이 공-정렬 배치를 채택해, 별의 자전 적도와 잔해 고리 궤도 평면이 공통 기준 좌표계를 공유하도록 합니다 — 원반 평면 위쪽에 자리한 게임 내 관측자에게는 작지만 진짜 같은 디테일입니다.",
  "h2_166":"Canonical alternatives",
  "p_167":"<b>반지름 / Teff — excess 보정 간섭계 vs 보정 안 한 간섭계.</b> cfg 는 Mamajek 2012 값 (R 1.842 R☉, Teff 8590 K) 을 채택하는데, 이는 분해된 별주위 K 밴드 excess 를 빼낸 Absil et al. 2009 의 각지름 (θ_LD = 2.223 mas) 에서 유도한 값입니다. 문서화된 대안은 Davis et al. 2005 로, 그쪽 SUSI fit 은 excess 를 제거하지 않아 더 작은 R (1.744 R☉) 과 더 뜨거운 Teff (8819 K) 를 줍니다. 둘 다 자기일관적이지만 excess 보정한 Absil/Mamajek 해가 원칙에 맞는 기본값이며, L (~16.5–16.6 L☉) 은 같은 볼로메트릭 플럭스에서 나오므로 양쪽이 일치합니다.",
  "p_168":"<b>금속도.</b> A 형 별 분광 [Fe/H] 는 신뢰도가 낮습니다. cfg 는 거의 태양값인 Dunkin 1997 의 −0.03 을 기록하지만, 측정값은 넓게 산포 하므로 (Erspamer 2003 +0.43) Mamajek 2012 는 등시선용으로 그냥 protosolar Z = 0.017 을 가정합니다. [Fe/H] 는 ≈ 태양값으로 보면 됩니다.",
  "h2_169":"Visual styling",
  "p_170":"NearStars 렌더러에서 Fomalhaut 는 <span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code> 로 색을 입힌 <b>시원한 청백색 A4V 디스크</b> 로 묘사됩니다 — 카탈로그의 G/K 형 별 (따뜻한 크림에서 주황까지) 보다 뚜렷이 푸르지만, Vega 의 거의-A0V <span class=\"hex-chip\" style=\"background:#bdd5ff\"></span><code>#bdd5ff</code> 기준선보다는 살짝 따뜻한 색입니다. 지구에서 본 V = 1.16 으로 Fomalhaut 는 밤하늘 18 번째로 밝은 별이자, 남반구 가을 사분면에서 가장 밝은 별입니다.",
  "p_171":"거주가능영역 안쪽 가장자리 (Kopparapu 2013 기준 ~3.5 AU) 의 후보 행성에서 보면 별이 채우는 각지름은 2R★/a × (180·60/π) ≈ 0.06° — 지구에서 본 태양 각지름의 약 1/8 입니다. 각 크기는 작지만 표면 밝기는 T⁴ 스케일링 (Teff = 8590 K vs 5772 K → 단위 입체각당 5.0 배) 때문에 태양보다 훨씬 높아서, HZ 에서 받는 볼로메트릭 플럭스는 1 AU 의 solar constant 의 약 5 배입니다. 가시광 밴드 조명은 청색 쪽에 더 강하게 가중되어, HZ 행성의 한낮 하늘 스펙트럼은 태양 아래 지구가 가질 모습보다 눈에 띄게 차갑게 보입니다.",
  "p_172":"이 시스템의 시각적 중심은 <b>잔해 고리</b> 입니다. 안쪽 행성계의 어느 행성에서 보든 133–158 AU 의 주 고리는 하늘을 가로지르는 ~25–30 arcminute 의 얇은 타원 띠를 형성합니다 (이심률 e ≈ 0.11 이 별과 고리 중심 사이에 가시 오프셋을 만듭니다 — 14 AU 오프셋으로, 어떤 광시야 뷰에서도 손쉽게 보임). cold 주 고리는 자체 Kopernicus <code>Ring</code> 으로 <code>disk_cold_tint_rgb_hex = #d6d8da</code> — ~65 K 먼지가 A 형 별 빛을 재산란하는, 거의 중성 회백색 (실측: Kalas 2005 저알베도 큰입자 산란) 으로 렌더링되며, 안쪽 warm (<span class=\"hex-chip\" style=\"background:#dedede\"></span><code>#dedede</code>) 과 intermediate (<span class=\"hex-chip\" style=\"background:#d8d8da\"></span><code>#d8d8da</code>) 벨트는 같은 <code>Rings {}</code> 블록 안의 별도 Ring 으로 렌더됩니다. <code>disk_cold_opacity = 0.35</code> 는 물리 광학적 깊이 (~10⁻⁴) 에서 끌어올린 tie-break boost 로, 고리가 수치적 잡티가 아니라 게임 내에서 실제로 보이는 대상으로 읽히도록 보정한 값입니다.",
  "p_173":"<b>83–104 AU 의 중간 벨트</b> (Gáspár 2023 JWST) 는 동일한 먼지 색조에 opacity 를 절반으로 낮춘 더 희미한 보조 고리로 렌더링되어, Saturn 같은 이중 고리 구조를 만들지만 스케일은 비교가 안 될 정도로 거대합니다. <b>넓은 안쪽 디스크 (~10–78 AU, 경사 ~47.8°)</b> (Gáspár 2023) 는 넓고 희미한 저밀도 고리로 렌더링되며, 외곽 벨트들과 눈에 띄게 기울어져 보입니다 — JWST 의 대표적 미정렬 결과입니다. 안쪽 가장자리가 별과 가까워 그 산란광이 안쪽 행성계의 황도광에 기여합니다.",
  "p_174":"<b>두 별 동반성</b>은 게임 내 하늘에서 고정된 점광원으로 나타납니다. TW Piscis Austrini 는 0.91 ly 투영 분리에 위치하며 Fomalhaut 계 어느 행성에서든 겉보기 등급 V ≈ 6.5 입니다 — 맨눈 가시성의 경계선이지만 어떤 별 필드 뷰에서든 뚜렷한 <b>주황색 K 왜성 점</b> 으로 쉽게 보입니다. LP 876-10 은 5.7 ly 에 있어 더 어둡고 (V ≈ 11) 맨눈 가시성 아래지만 망원경 뷰에서는 희미한 <b>붉은 M 왜성</b> 점 으로 보입니다. 어느 쪽도 분해된 디스크를 보이지 않으며, 둘 다 cfg 에서 <code>visual_companion_event_*</code> 점광원으로 플래그돼 있어 렌더러가 디스크를 그리려 시도하지 않고 정확한 위치에 점만 찍습니다.",
  "p_175":"Fomalhaut A 와 광폭 분리 동반성들 사이에는 식 / 엄폐 이벤트가 없습니다. ~0.91 ly 와 ~5.7 ly 의 투영 분리는 인간 시간 척도에서 어떠한 게임 내 정렬 현상도 만들 수 없을 만큼 너무 큽니다.",
  "h2_176":"Bibliography",
  "h3_177":"Read (visual-informative, drove decisions above)",
  "li_178":"<b>Mamajek E. E. 2012</b> — <i>On the age and binarity of Fomalhaut</i>, ApJ 754, L20 (<code>2012ApJ...754L..20M</code>, <a href=\"https://arxiv.org/abs/1206.6353\">arXiv:1206.6353</a>). <b>항성 레이어 전체의 Phase 2 anchor.</b> Absil 2009 의 excess 보정 θ_LD + Davis 2005 f_bol 에서 R 1.842 ± 0.019 R☉, Teff 8590 ± 73 K, L 16.63 ± 0.48 L☉ 를 재유도. 질량 1.92 ± 0.02 M☉ (Y² 트랙). 나이 440 ± 40 Myr (A 의 등시선 + 동반성 TW PsA 의 자이로/Li/X 선).",
  "li_179":"<b>Absil O. et al. 2009</b> — <i>A near-infrared interferometric survey of debris-disc stars II: Fomalhaut</i>, ApJ 704, 150 (<code>2009ApJ...704..150A</code>, <a href=\"https://arxiv.org/abs/0908.3133\">arXiv:0908.3133</a>). excess 보정 VLTI/VINCI θ_LD = 2.223 ± 0.022 mas (분해된 0.88% K 밴드 별주위 방출을 빼냄) — Mamajek 2012 가 R/Teff 에 쓰는 각지름. 겉보기 oblateness 1.021.",
  "li_180":"<b>Mamajek E. E. et al. 2013</b> — <i>Discovery of a Faint Companion to Alpha PsA Using MMT/AO 5 μm Imaging</i>, AJ 146, 154 (<code>2013AJ....146..154M</code>, <a href=\"https://arxiv.org/abs/1310.0764\">arXiv:1310.0764</a>). LP 876-10 을 Fomalhaut 계층적 삼중계의 M4V 세 번째 성분으로 5.7 ly 투영 분리에서 식별. 공통 고유운동 + 등시선 나이 일치.",
  "li_181":"<b>Di Folco E. et al. 2004</b> — <i>VLTI near-IR interferometric observations of Vega-like stars</i>, A&amp;A 426, 601 (<code>2004A&amp;A...426..601D</code>, arXiv:astro-ph/0408390). 원래의 VLTI/VINCI K 밴드 각지름. Mamajek 2012 가 채택하는 Absil 2009 의 excess 보정으로 정밀화됨.",
  "li_182":"<b>Dunkin S. K. et al. 1997</b> — <i>High-resolution spectroscopy of Vega-like stars</i>, MNRAS 286, 604 (<code>1997MNRAS.286..604D</code>). Fomalhaut 의 [Fe/H] = −0.03 — Phase 2 recommended (거의 태양값) 금속도. A 형 별 [Fe/H] 측정은 산포가 큼.",
  "li_183":"<b>Kalas P. et al. 2005</b> — <i>A planetary system as the origin of structure in Fomalhaut&#x27;s dust belt</i>, Nature 435, 1067 (<code>2005Natur.435.1067K</code>). HST/ACS 코로나그래프가 133 AU 의 좁고 편심한 (e ≈ 0.11) 주 고리와 날카로운 안쪽 가장자리를 처음 분해 — 보이지 않는 행성에 의한 중력적 조각으로 해석 (원조 &quot;양치기&quot; 추론).",
  "li_184":"<b>Kalas P. et al. 2008</b> — <i>Optical Images of an Exosolar Planet 25 Light-Years from Earth</i>, Science 322, 1345 (<code>2008Sci...322.1345K</code>). 원조 &quot;Fomalhaut b&quot; HST 검출 논문. <b>철회 맥락</b>. Gáspár &amp; Rieke 2020 의 후속 재분석과 JWST 2023 미검출 (Gáspár 2023) 이 이 광원을 묶인 행성이 아닌 행성소체 충돌에서 발생한 일과성 팽창 먼지 구름으로 재해석. 이 합성은 현재 컨센서스를 따름.",
  "li_185":"<b>Gáspár A. &amp; Rieke G. H. 2020</b> — <i>New HST data and modeling reveal a massive planetesimal collision around Fomalhaut</i>, PNAS 117, 9712 (<code>2020PNAS..117.9712G</code>, <a href=\"https://arxiv.org/abs/2004.08736\">arXiv:2004.08736</a>). HST 아카이브 재분석으로 &quot;Fomalhaut b&quot; 가 2004–2014 사이에 팽창하고 어두워 졌음을 확인. 묶인 점광원이 아니라 ~200 km 행성소체 충돌에서 나온 팽창 먼지 구름과 일관.",
  "li_186":"<b>Gáspár A. et al. 2023</b> — <i>Spatially resolved imaging of the inner Fomalhaut disk using JWST/MIRI</i>, Nature Astronomy 7, 790 (<code>2023NatAs...7..790G</code>, <a href=\"https://arxiv.org/abs/2305.03789\">arXiv:2305.03789</a>). 15.5 µm + 23 µm JWST/MIRI 영상이 이전에 알려지지 않았던 <b>~83–104 AU 의 중간 벨트</b> 를 (~78 AU gap 으로 안쪽 디스크와 분리. 안쪽 디스크 경사 ~47.8° vs 외곽 고리 64.4°) 분해하고, JWST 이전의 따뜻한 &quot;소행성대 analog&quot; 를 <b>넓은 안쪽 디스크 (~10–78 AU)</b> 로 재해석. Fomalhaut b 시점 위치에 점광원 없음, 먼지 구름 해석과 일관.",
  "li_187":"<b>Boley A. C. et al. 2012</b> — <i>Constraining the planetary system of Fomalhaut using high-resolution ALMA observations</i>, ApJ 750, L21 (<code>2012ApJ...750L..21B</code>, <a href=\"https://arxiv.org/abs/1204.0007\">arXiv:1204.0007</a>). ALMA Cycle 0 의 주 고리 영상. 이심률 e = 0.11 ± 0.01, 안쪽 가장자리 133 AU, 바깥쪽 가장자리 158 AU, 폭 Δa/a ≈ 0.13. 양치기 행성 질량을 &lt; 3 M_Jup 으로 제약.",
  "li_188":"<b>White J. A. et al. 2017</b> — <i>ALMA observations of Fomalhaut&#x27;s outer dust ring</i>, ApJ 842, 80 (<code>2017ApJ...842...80W</code>, <a href=\"https://arxiv.org/abs/1705.10670\">arXiv:1705.10670</a>). 더 높은 분해능의 ALMA Cycle 4 follow-up. 좁은 편심 고리를 재확인하고 경사를 65.6 ± 0.4° 로 정밀화. 원반 기하 cfg 필드를 결정.",
  "li_189":"<b>Le Bouquin J.-B. et al. 2009</b> — <i>Spin axis of α PsA from interferometry</i>, A&amp;A 498, L41 (<code>2009A&amp;A...498L..41L</code>, <a href=\"https://arxiv.org/abs/0904.1688\">arXiv:0904.1688</a>). VLTI/AMBER 의 별 oblateness + 자전축 방향 측정. 잔해 원반과의 spin-orbit 정렬이 ~3° 안에서 성립함을 입증.",
  "li_190":"<b>Davis J. et al. 2005</b> — <i>Limb-darkening determinations for Fomalhaut and α Cen A from SUSI</i>, MNRAS 356, 1362 (<code>2005MNRAS.356.1362D</code>). 광학 간섭계 limb-darkening power-law α(V) ≈ 0.21 for Fomalhaut. <code>limb_darkening_alpha_h</code> 를 결정.",
  "h3_191":"Read (context / methodology, not directly decision-driving)",
  "li_192":"<b>Royer F. et al. 2007</b> — <i>Rotational velocities of A-type stars</i>, A&amp;A 463, 671 (<code>2007A&amp;A...463..671R</code>, arXiv:astro-ph/0610785). Fomalhaut 에 대해 v sin i = 93 ± 3 km/s. 원반 경사와 결합해 자전 주기 유도.",
  "li_193":"<b>Acke B. et al. 2012</b> — <i>Herschel images of Fomalhaut: An extrasolar Kuiper Belt at the height of its dynamical activity</i>, A&amp;A 540, A125 (<code>2012A&amp;A...540A.125A</code>, <a href=\"https://arxiv.org/abs/1204.5037\">arXiv:1204.5037</a>). 차가운 주 고리의 Herschel/PACS 원적외선 영상. SED fit 으로 T_dust ≈ 65 K. <code>disk_dust_temperature_k</code> 필드를 채움.",
  "li_194":"<b>Holland W. S. et al. 2017</b> — <i>SONS: The JCMT legacy survey of debris discs at submillimetre wavelengths</i>, MNRAS 470, 3606 (<code>2017MNRAS.470.3606H</code>, <a href=\"https://arxiv.org/abs/1706.01218\">arXiv:1706.01218</a>). SCUBA-2 서브밀리 측광. mm-cm 입자에서 주 고리 먼지 질량 ~1.5 × 10⁻² M⊕.",
  "li_195":"<b>Saffe C. et al. 2008</b> — <i>Spectroscopic metallicities of Vega- like stars</i>, A&amp;A 490, 297 (<code>2008A&amp;A...490..297S</code>, <a href=\"https://arxiv.org/abs/0805.3936\">arXiv:0805.3936</a>). Castor 운동성단 [Fe/H] = −0.03 ± 0.05 — 보강용 금속도 (cfg 는 Phase 2 recommended 값으로 Dunkin 1997 을 인용. 둘 다 거의 태양값).",
  "li_196":"<b>Stapelfeldt K. R. et al. 2004</b> — <i>First Look at the Fomalhaut Debris Disk with Spitzer</i>, ApJS 154, 458 (<code>2004ApJS..154..458S</code>). Spitzer/MIPS 24/70/160 µm 측광. 먼지 원반의 첫 다중 밴드 열복사 특성화.",
  "li_197":"<b>Currie T. et al. 2012</b> — <i>A Direct-Imaging Survey of the Fomalhaut Planetary System with the Hubble Space Telescope</i>, ApJ 760, L32 (<code>2012ApJ...760L..32C</code>, <a href=\"https://arxiv.org/abs/1210.6555\">arXiv:1210.6555</a>). &quot;Fomalhaut b&quot; 의 독립 HST 재분석. 광원이 자체발광 행성이 아니라는 초기 증거.",
  "li_198":"<b>Schröder C. &amp; Schmitt J. H. M. M. 2007</b> — <i>X-ray emission from A-type stars</i>, A&amp;A 475, 677 (<code>2007A&amp;A...475..677S</code>). A 형 별 X 선 플럭스 ROSAT 서베이. Fomalhaut 의 log L_X 상한을 결정.",
  "li_199":"<b>Greaves J. S. et al. 2014</b> — <i>Alignment of the host star spin with the orbit of debris discs</i>, MNRAS 438, L31 (<code>2014MNRAS.438L..31G</code>, <a href=\"https://arxiv.org/abs/1311.3431\">arXiv:1311.3431</a>). A 형 별 잔해 원반 호스트의 종족 전체 spin-orbit 정렬. Le Bouquin 2009 의 정렬 가정을 뒷받침.",
  "h3_200":"Read (instrument / non-cfg-decisive)",
  "li_201":"<b>Gray R. O. &amp; Garrison R. F. 1989</b> — <i>The Late A-Type Stars: Refined MK Classification</i> (<code>1989ApJS...70..623G</code>). MK 시스템 재분류. Fomalhaut 를 A3V/A4V 경계에 배치.",
  "li_202":"<b>Monnier J. D. et al. 2010</b> — <i>Imaging the surface of Altair</i>, Science 317, 342 (<code>2007Sci...317..342M</code>). 비교 가능한 빠른 자전체 A 형 별의 중력 어두워짐 지도 참조.",
  "li_203":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable zones around main- sequence stars</i>, ApJ 765, 131 (<code>2013ApJ...765..131K</code>, <a href=\"https://arxiv.org/abs/1301.6674\">arXiv:1301.6674</a>). A4V 별 HZ 안쪽/바깥쪽 경계.",
  "li_204":"<b>Wyatt M. C. 2008</b> — <i>Evolution of Debris Disks</i>, ARA&amp;A 46, 339 (<code>2008ARA&amp;A..46..339W</code>). 분해된 잔해 원반의 충돌 cascade 보충 이론 프레임워크. <code>disk_planetesimal_belt_inferred</code> 필드를 뒷받침.",
  "h3_205":"Not read — no arXiv preprint or low-priority (~30 papers)",
  "p_206":"학회 초록 (AAS / DPS / EPSC), 간섭계 방법 논문 (CHARA / PTI commissioning), 후속 먼지 입자 광물학 작업 (Spitzer IRS 분광) 은 Di Folco 2004 + Boley 2012 + Gáspár 2023 가 이미 확립한 내용을 넘어서는 cfg-결정적 기여를 하지 않습니다. &quot;Fomalhaut b&quot; 위치의 SETI / 전파 방출 모니터링 (Tusay 2022, Saide 2023) 도 제외합니다. 필터링된 bib 는 <code>docs/phase3/_bib/fomalhaut.yaml</code> 에 <code>status: skipped</code> annotation 으로 보존됩니다.",
  "h2_207":"Open items for follow-up",
  "li_208":"<b>TW Piscis Austrini (HD 216803, K4V) 와 LP 876-10 (M4V) 의 별도 NS DB 엔트리화.</b> 광폭 공통 고유운동 동반성 두 개는 현재 152 시스템 NearStars 쇼트리스트에 들어 있지 않습니다. Mamajek 2012/2013 은 두 별이 중력적으로 연합돼 있고 같은 나이 (440 Myr) 의 Castor 운동성단 멤버임을 0.91 ly 와 5.7 ly 투영 분리에서 확립합니다. 별도 DB 엔트리로 추가되면 게임 내 플레이어가 실제 성간 궤적을 따라 세 별 사이를 비행할 수 있게 됩니다. Phase 2 DB 확장 후보로 플래그.",
  "li_209":"<b>disk 지오메트리가 <code>disks_curated.json</code> 에 multi-belt 로 기록됨</b> (2026-05-29 감사). Fomalhaut 의 warm + intermediate + cold 벨트가 별도 <code>belt</code> 항목이며, Decisions 표가 belt별 <code>disk_&lt;belt&gt;_*</code> 필드로 렌더 → belt당 Kopernicus Ring 하나씩. belt별 Mie 색 합성은 이제 완료됐습니다. 세 벨트 모두 동일한 얼음 (얼음 + 규산염, 물 얼음 ~50–80%) 조성을 공유합니다 — warm + intermediate 먼지가 외곽 벨트에서 PR-drag 로 떨어져 나온 파편이므로 (Sommer 외 2025 <code>2503.18127</code>) 셋 다 동일한 <span class=\"hex-chip\" style=\"background:#fff4e5\"></span><code>#fff4e5</code> 옅은 크림색 반사율로 합성됩니다.",
  "li_210":"<b>2025 ALMA cold 고리 정밀화 (문서화만 — emit 안 함).</b> cold 고리의 단일 이심률 (e ≈ 0.11) 이 이제 <i>음의 이심률 구배</i> e_f ∝ a^(−1.75±0.16) (Lovell 외 2025 <code>2509.02884</code>) 로 분해되고, 여기에 apsidal 비대칭이 더해집니다 — SE ansa 가 4 AU 더 넓고 NW ansa 가 21 % 더 밝습니다 (Chittidi 외 2025 <code>2509.02825</code>). Kopernicus Ring 은 원형/평면이라 cfg 값은 바뀌지 않으며, 향후 편심/볼류메트릭 렌더링을 위해 기록만 해 둡니다.",
  "li_211":"<b>&quot;Great Dust Cloud&quot; 는 배경 은하.</b> (Kennedy 2023. Chittidi 외 2025 <code>2509.02825</code> 의 230.25 GHz 스펙트럼 선으로 확인) — Fomalhaut 디스크 feature 로 렌더링되지 않는 것이 맞습니다.",
  "li_212":"<b>&quot;Fomalhaut b S1&quot; 후보 재방문.</b> 2026+ 의 JWST/MIRI 또는 지상 ELT follow-up 이 Gáspár &amp; Rieke 2020 의 먼지 구름 해석을 뒤집고 ~115 AU 의 묶인 행성을 다시 확립한다면, 새 Decisions 엔트리 <code>circumstellar_planet_present: true</code> (후보명 &quot;S1&quot;) 가 필요해지며 cfg 는 현재 컨센서스로부터의 divergence 를 문서화해야 합니다. 그 전에는 어떤 행성도 포함하지 않습니다.",
  "li_213":"<b>Phase 2 <code>teff_measurements</code> 와 <code>metallicity_measurements</code> 채움.</b> DB 는 <code>teff_k = 8689</code> 를 출처 엔트리 없이 SIMBAD 컴파일레이션 스칼라로 갖고 있고 Saffe 2008 금속도도 DB 에 없습 니다. 둘 다 논문 인용된 Phase 2 엔트리로 추가해야 합니다.",
  "li_214":"<b>중력 어두워짐 지도.</b> Fomalhaut 의 분해된 간섭계 중력 어두워짐 지도는 존재하지 않습니다 (Vega, Altair, Regulus 와 달리). CHARA/MIRC 또는 VLTI/GRAVITY 가 von-Zeipel 극-적도 온도 구배를 관측하면 cfg 가 현재의 uniform-disk 색조를 위도 구배로 바꿀 수 있게 됩니다 (<code>visual_gravity_darkening_delta_t_k</code> 필드, 현재 부재).",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
