  "h2_113":"Surface synthesis",
  "p_114":"HD 219134 f straddles the super-Earth / sub-Neptune boundary. At Msini ≈ 8.9 M⊕ with no measured radius, its bulk nature is ambiguous — it could be a large rocky super-Earth with a thin atmosphere or a small sub-Neptune with a modest volatile envelope. The cfg adopts the transitional, atmosphere-bearing reading: a &quot;surface&quot; referenced to a cloud deck near the 1 bar level, with the understanding that a rocky surface may lie beneath if the envelope is thin.",
  "p_115":"The defining caveat is twofold. First, <b>f does not transit</b>: its radius is unmeasured, so radius, gravity, density, and scale height are estimates flagged at low confidence. The cfg adopts a mass-radius estimate at the transition — Zeng 2016&#x27;s rocky scaling gives ~1.9 R⊕ for 9 M⊕, while a thin envelope (Lopez &amp; Fortney 2014) pushes to ~2.0–2.5 R⊕; the cfg picks 2.0 R⊕ as the mid-range, giving ~2.2 g⊕ surface gravity and ~6.1 g/cc bulk density (consistent with a rocky core under a thin envelope).",
  "p_116":"Second, <b>f is observationally contested</b>. Its 22.8-day RV period nearly coincides with the 22.83-day Ca II S_HK rotation signal that Johnson 2016 measured for the host star — meaning part or all of the RV amplitude attributed to f could instead be a stellar-activity modulation at the rotation period. Vogt 2015 flagged this with <code>pl_controv_flag = 1</code>. NearStars keeps f for gameplay variety (documented here and in Open items) rather than dropping it, but the contested status is carried explicitly in the Decisions table.",
  "p_117":"<b>Color under K3 V illumination.</b> Under the 4858 K orange host SED, f&#x27;s cloud deck and haze are perceived warmer than under Sol. The cfg renders a warm tan cloud deck (<span class=\"hex-chip\" style=\"background:#e0c098\"></span><code>#e0c098</code>) with a tan-orange haze limb (<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>) — tie-break choices, no spectrum exists.",
  "h2_118":"Atmosphere synthesis",
  "p_119":"The atmospheric inference for f is theoretical (no transit, no spectrum) and complicated by the controversy over the planet&#x27;s reality. Assuming f is a genuine planet, the mass and temperature place it on the super-Earth / sub-Neptune transition.",
  "p_120":"<b>Atmosphere present.</b> At Msini ≈ 9 M⊕ and T_eq ≈ 523 K, f is near the photoevaporation-valley boundary (Owen &amp; Wu 2017): a planet of this mass at 0.146 AU around a K dwarf can plausibly retain a thin-to- moderate volatile envelope. The cfg adopts a metal-enriched H₂/He envelope with H₂O and CO₂ and a photochemical haze — the canonical warm transition-object composition. This is a tie-break (no measured spectrum).",
  "p_121":"<b>Sky appearance.</b> With a modest hazy atmosphere, the sky from the reference 1 bar level is a warm-tan haze brightening toward the substellar point. The host star HD 219134 subtends ~2.66° (about 5× the Sun&#x27;s apparent size from Earth) and reads warm-orange through the haze. If the envelope is thin and a rocky surface lies beneath, the appearance would shade toward a hazy hot super-Earth rather than a banded sub-Neptune — the cfg leaves this ambiguity to the radius follow-up.",
  "h2_122":"Rotation &amp; spin synthesis",
  "p_123":"At 0.146 AU and 22.805 d, f is far enough out that tidal locking is not assured. For a ~9 M⊕ volatile planet at this separation around a 0.696 M☉ K dwarf, the tidal-despinning timescale is comparable to the system age, so the cfg adopts a non-locked, slowly rotating state.",
  "p_124":"<b>KSP implementation note.</b> With no rotation measurement, the cfg assigns a generic slow rotation period (low confidence, not a measured value). Obliquity is a small tie-break value.",
  "p_125":"<b>No strong seasons.</b> The curated eccentricity is 0.0 (circularized), so insolation is steady around the orbit; any banding is driven by the internal heat flux and the steady 12.4 S⊕ insolation rather than by seasons.",
  "p_126":"<b>Rotation/planet coincidence note.</b> The very period that makes f a candidate — 22.8 d — is also the contested stellar rotation period (Johnson 2016). This is the crux of f&#x27;s controversy: if the 22.83 d S_HK signal is the true stellar rotation, an activity-induced RV modulation at that period mimics a planet. The cfg carries f as a planet but flags this explicitly.",
  "h2_127":"Visual styling",
  "p_128":"Combining the atmosphere decisions for a warm, contested RV-only transition object:",
  "li_129":"<b>Global appearance (orbit view).</b> A warm tan, hazy disk — intermediate between a rocky super-Earth and a banded sub-Neptune, with muted zonal contrast under the orange host light.",
  "li_130":"<b>Cloud deck.</b> Warm tan cloud cover (<span class=\"hex-chip\" style=\"background:#e0c098\"></span><code>#e0c098</code>) with an overlying photochemical haze; banding muted (tie-break, no GCM).",
  "li_131":"<b>Limb haze.</b> A tan-orange haze layer (<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>) scattering the orange starlight, giving a soft terminator.",
  "li_132":"<b>Star in sky.</b> HD 219134 subtends ~2.66° at f — about 5× the Sun&#x27;s angular size from Earth, warm-orange through the haze, illuminating the cloud deck at ~12.4× Earth-noon brightness.",
  "li_133":"<b>Sister planets in sky.</b> The hot transiting pair (b, c) appear interior; d, the temperate g, and the cold giant h are exterior. All near-coplanar, appearing as bright points.",
  "li_134":"<b>Contested-status rendering note.</b> f is kept for gameplay variety but flagged contested; the rendered planet should be treated as provisional, and both its radius (unmeasured) and its very existence (activity-mimic risk) are pending observational confirmation.",
  "h2_135":"Bibliography",
  "h3_136":"Read (visual-informative, drove decisions above)",
  "li_137":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT solution adding f (and g); the source for f&#x27;s orbit (P = 22.805 d, a = 0.146 AU) and minimum mass (Msini = 8.9 M⊕, recommended), and the <code>pl_controv_flag = 1</code> controversy flag. <b>The anchor for f&#x27;s orbit, mass, and contested status.</b>",
  "li_138":"<b>Johnson M. C. et al. 2016</b> — <i>A 12 Year Activity Cycle for the Nearby Planet Host Star HD 219134</i>, ApJ 821, 74 (<code>2016ApJ...821...74J</code>). The 22.83 d Ca II S_HK rotation signal that coincides with f&#x27;s 22.8 d period — the basis for f being contested.",
  "li_139":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation physics; places f near the retention boundary. Supports the thin-to-moderate <code>atmosphere_present = true</code>.",
  "li_140":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Envelope mass-radius scaling for the (low-confidence) radius estimate.",
  "h3_141":"Read (context / methodology, not decision-driving)",
  "li_142":"<b>Zeng L. et al. 2016</b> — <i>Mass-radius relation for rocky planets</i>, ApJ 819, 127 (<code>2016ApJ...819..127Z</code>, arXiv:1512.08827). Rocky scaling gives ~1.9 R⊕ for 9 M⊕ — the lower bound of f&#x27;s radius estimate if the envelope is negligible.",
  "li_143":"<b>Motalebi F. et al. 2015</b> — A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). HARPS-N study of the system; f was not in the Motalebi solution (added by Vogt 2015), context for the contested status.",
  "li_144":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited host parameters (L for the insolation/T_eq derivation).",
  "h3_145":"Read (instrument-only, not visual-informative)",
  "li_146":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). The transiting b/c study; f is non- transiting and not characterized here beyond the system context.",
  "h3_147":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_148":"The f-specific arXiv record is small and dominated by the discovery and rotation-period debate. The not-read set is RV-reanalysis and activity-modeling follow-ups that bear on whether f is real but do not change the warm transition-object rendering adopted while the planet is kept.",
  "h2_149":"Open items for follow-up",
  "li_150":"<b>Confirmation or retraction.</b> f&#x27;s 22.8 d period coincides with the contested stellar rotation period; a future RV + activity-indicator analysis (or a transit detection) would confirm or retract it. If retracted, f should be removed; if confirmed, the contested flag is cleared. Currently kept for gameplay variety.",
  "li_151":"<b>True mass and radius.</b> f&#x27;s mass is Msini-only and the radius is a transition-object scaling estimate at low confidence. An inclination (astrometry) or transit detection would pin both.",
  "li_152":"<b>Atmospheric spectrum.</b> No spectrum exists; a future measurement would replace the tie-break composition and tints and resolve the rocky-vs-sub-Neptune ambiguity.",

  "td_112":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_113":"표면 합성",
  "p_114":"HD 219134 f 는 super-Earth / sub-Neptune 경계에 걸쳐 있습니다. Msini ≈ 8.9 M⊕ 에 측정 반지름이 없어 bulk 성격이 모호합니다 — 얇은 대기를 가진 큰 암석 super-Earth 일 수도, 적당한 volatile envelope 을 가진 작은 sub-Neptune 일 수도 있습니다. cfg 는 전이적, 대기 보유 해석을 채택합니다 — 1 bar 레벨 근처 구름 deck 으로 기준한 &quot;표면&quot;이되, envelope 이 얇다면 그 아래 암석 표면이 있을 수 있다는 이해를 동반합니다.",
  "p_115":"결정적 단서는 두 가지입니다. 첫째, <b>f 는 transit 하지 않습니다.</b> 반지름이 측정되지 않아 반지름, 중력, 밀도, scale height 는 낮은 신뢰도로 표시된 추정입니다. cfg 는 전이에서의 mass-radius 추정을 채택합니다 — Zeng 2016 암석 스케일링은 9 M⊕ 에 대해 ~1.9 R⊕ 를 주고, 얇은 envelope (Lopez &amp; Fortney 2014) 은 ~2.0–2.5 R⊕ 로 밀어 올립니다. cfg 는 mid-range 2.0 R⊕ 를 선택해 표면 중력 ~2.2 g⊕ 와 bulk 밀도 ~6.1 g/cc (얇은 envelope 아래 암석 core 와 일관) 를 줍니다.",
  "p_116":"둘째, <b>f 는 관측적으로 contested 입니다.</b> 그 22.8 일 RV 주기가 Johnson 2016 이 호스트 별에 대해 측정한 22.83 일 Ca II S_HK 자전 신호와 거의 일치하는데 — 즉 f 에 귀속된 RV 진폭의 일부 또는 전부가 대신 자전 주기에서의 항성-활동 변조일 수 있다는 뜻입니다. Vogt 2015 가 이를 <code>pl_controv_flag = 1</code> 로 표시했습니다. NearStars 는 게임플레이 다양성을 위해 f 를 (여기와 후속 항목에 기록한 채) 버리지 않고 유지하지만, contested 상태는 Decisions 표에 명시적으로 담습니다.",
  "p_117":"<b>K3 V 조명 아래의 색.</b> 4858 K 오렌지 호스트 SED 아래에서 f 의 구름 deck 과 haze 는 Sol 아래보다 따뜻하게 인지됩니다. cfg 는 따뜻한 tan 구름 deck (<span class=\"hex-chip\" style=\"background:#e0c098\"></span><code>#e0c098</code>) 과 tan-오렌지 haze limb (<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>) 을 렌더링합니다 — tie-break 선택이며, 스펙트럼은 없습니다.",
  "h2_118":"대기 합성",
  "p_119":"f 의 대기 추론은 이론적이고 (transit 없음, 스펙트럼 없음) 행성의 실재 여부에 대한 논쟁으로 복잡합니다. f 가 진짜 행성이라고 가정하면, 질량과 온도가 f 를 super-Earth / sub-Neptune 전이에 둡니다.",
  "p_120":"<b>대기 존재.</b> Msini ≈ 9 M⊕ 와 T_eq ≈ 523 K 에서 f 는 광증발-valley 경계 (Owen &amp; Wu 2017) 근처입니다 — K 왜성 주위 0.146 AU 의 이 질량 행성은 얇은-에서-적당한 volatile envelope 을 그럴듯하게 유지할 수 있습니다. cfg 는 H₂O 와 CO₂, 광화학 haze 를 가진 금속 증강 H₂/He envelope 을 채택합니다 — 전형적인 따뜻한 전이-천체 조성입니다. 이는 tie-break 입니다 (측정 스펙트럼 없음).",
  "p_121":"<b>하늘 외관.</b> 적당한 hazy 대기에서 기준 1 bar 레벨의 하늘은 substellar 점 쪽으로 밝아지는 따뜻한 tan haze 입니다. 호스트 별 HD 219134 가 ~2.66° (지구에서 본 태양 각 크기의 약 5 배) 를 차지하고 haze 를 통해 따뜻한 오렌지로 읽힙니다. envelope 이 얇고 그 아래 암석 표면이 있다면, 외관은 띠 sub-Neptune 보다 hazy 한 뜨거운 super-Earth 쪽으로 기울 것입니다 — cfg 는 이 모호성을 반지름 후속에 맡깁니다.",
  "h2_122":"자전 &amp; spin 합성",
  "p_123":"0.146 AU, 22.805 d 에서 f 는 충분히 멀어 조석 고정이 보장되지 않습니다. 0.696 M☉ K 왜성 주위 이 거리의 ~9 M⊕ volatile 행성에 대해 조석 despinning timescale 은 시스템 나이와 비슷해, cfg 는 비고정, 느린 자전 상태를 채택합니다.",
  "p_124":"<b>KSP 구현 노트.</b> 자전 측정이 없어 cfg 는 일반적인 느린 자전 주기를 할당합니다 (낮은 신뢰도, 측정값이 아님). obliquity 는 작은 tie-break 값입니다.",
  "p_125":"<b>강한 계절 없음.</b> curated 이심률은 0.0 (원형화됨) 이라 궤도에 걸쳐 일사가 일정합니다. 어떤 띠도 계절이 아니라 내부 열 flux 와 일정한 12.4 S⊕ 일사로 구동됩니다.",
  "p_126":"<b>자전/행성 일치 노트.</b> f 를 후보로 만드는 바로 그 주기 — 22.8 d — 가 또한 논쟁 중인 항성 자전 주기 (Johnson 2016) 입니다. 이것이 f 논쟁의 핵심입니다. 22.83 d S_HK 신호가 진짜 항성 자전이라면, 그 주기에서의 활동 유발 RV 변조가 행성을 모방합니다. cfg 는 f 를 행성으로 담되 이를 명시적으로 표시합니다.",
  "h2_127":"비주얼 스타일",
  "p_128":"따뜻한, contested RV-only 전이 천체의 대기 결정을 종합하면 다음과 같습니다.",
  "li_129":"<b>전역 외관 (궤도 뷰).</b> 따뜻한 tan, hazy disk — 암석 super-Earth 와 띠 sub-Neptune 사이의 중간으로, 오렌지 호스트 빛 아래 약한 띠 대비를 가집니다.",
  "li_130":"<b>구름 deck.</b> 그 위 광화학 haze 를 가진 따뜻한 tan 구름 덮임 (<span class=\"hex-chip\" style=\"background:#e0c098\"></span><code>#e0c098</code>). 띠 약함 (tie-break, GCM 없음).",
  "li_131":"<b>Limb haze.</b> 오렌지 별빛을 산란하는 tan-오렌지 haze 층 (<span class=\"hex-chip\" style=\"background:#d8a878\"></span><code>#d8a878</code>) 으로, 부드러운 terminator 를 줌.",
  "li_132":"<b>하늘의 별.</b> HD 219134 가 f 에서 ~2.66° 를 차지 — 지구에서 본 태양 각 크기의 약 5 배, haze 를 통해 따뜻한 오렌지, 구름 deck 을 ~12.4× 지구 정오 밝기로 조명.",
  "li_133":"<b>하늘의 자매 행성.</b> 뜨거운 transit 쌍 (b, c) 이 안쪽에, d, 온대 g, 차가운 거인 h 가 바깥쪽에 나타남. 모두 거의 동일 평면, 밝은 점으로 보임.",
  "li_134":"<b>Contested-상태 렌더링 노트.</b> f 는 게임플레이 다양성을 위해 유지되나 contested 로 표시됩니다. 렌더링된 행성은 잠정적으로 다뤄야 하고, 반지름 (미측정) 과 그 실재 (활동 모방 위험) 둘 다 관측 확정 대기 중입니다.",
  "h2_135":"참고 문헌",
  "h3_136":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_137":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). f (와 g) 를 추가한 Keck/HIRES + APT 해. f 의 궤도 (P = 22.805 d, a = 0.146 AU) 와 최소 질량 (Msini = 8.9 M⊕, recommended), 그리고 <code>pl_controv_flag = 1</code> controversy flag 의 출처. <b>f 의 궤도, 질량, contested 상태의 앵커.</b>",
  "li_138":"<b>Johnson M. C. et al. 2016</b> — <i>A 12 Year Activity Cycle for the Nearby Planet Host Star HD 219134</i>, ApJ 821, 74 (<code>2016ApJ...821...74J</code>). f 의 22.8 d 주기와 일치하는 22.83 d Ca II S_HK 자전 신호 — f 가 contested 인 근거.",
  "li_139":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발 physics. f 를 유지 경계 근처에 둠. 얇은-에서-적당한 <code>atmosphere_present = true</code> 를 뒷받침.",
  "li_140":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). (낮은 신뢰도) 반지름 추정을 위한 envelope mass-radius 스케일링.",
  "h3_141":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_142":"<b>Zeng L. et al. 2016</b> — <i>Mass-radius relation for rocky planets</i>, ApJ 819, 127 (<code>2016ApJ...819..127Z</code>, arXiv:1512.08827). 암석 스케일링이 9 M⊕ 에 대해 ~1.9 R⊕ 를 줌 — envelope 이 무시할 만하다면 f 반지름 추정의 하한.",
  "li_143":"<b>Motalebi F. et al. 2015</b> — A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). 시스템의 HARPS-N 연구. f 는 Motalebi 해에 없었음 (Vogt 2015 가 추가). contested 상태에 대한 맥락.",
  "li_144":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 상속된 호스트 파라미터 (일사/T_eq 유도를 위한 L).",
  "h3_145":"읽음 (instrument-only, 시각 정보 아님)",
  "li_146":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). transit 하는 b/c 연구. f 는 비-transit 이라 시스템 맥락을 넘어 여기서 특성화되지 않음.",
  "h3_147":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_148":"f 별 arXiv 기록은 적고 발견과 자전-주기 논쟁이 지배합니다. 읽지 않은 세트는 f 의 실재 여부에 관계되는 RV-재분석과 활동-모델링 후속이지만, 행성을 유지하는 동안 채택한 따뜻한 전이-천체 렌더링을 바꾸지 않습니다.",
  "h2_149":"후속 항목",
  "li_150":"<b>확정 또는 철회.</b> f 의 22.8 d 주기는 논쟁 중인 항성 자전 주기와 일치합니다. 향후 RV + 활동-지표 분석 (또는 transit 검출) 이 이를 확정하거나 철회합니다. 철회되면 f 는 제거되어야 하고, 확정되면 contested flag 가 해제됩니다. 현재 게임플레이 다양성을 위해 유지.",
  "li_151":"<b>진질량과 반지름.</b> f 의 질량은 Msini 전용이고 반지름은 낮은 신뢰도의 전이-천체 스케일링 추정입니다. 경사 (천체측정) 나 transit 검출이 둘 다 핀할 것입니다.",
  "li_152":"<b>대기 스펙트럼.</b> 스펙트럼 없음. 향후 측정이 tie-break 조성과 tint 를 대체하고 암석-vs-sub-Neptune 모호성을 해소합니다.",
  "h2_153":"Related",

function applyLang() {

  document.querySelectorAll('[data-i18n]').forEach(el => {

    if (v !== undefined) el.innerHTML = v;

    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
