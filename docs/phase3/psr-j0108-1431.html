  "p_1":"PSR J0108−1431 is the nearest known radio pulsar to the Sun — a solitary neutron star in the constellation Cetus, discovered in the 1994 Parkes Southern Pulsar Survey (Tauris et al. 1994, who titled the discovery paper &quot;the closest known neutron star?&quot;). It sits <b>far beyond the 50 ly Kopernicus cap</b> at roughly 210–240 pc (~685 ly), so it is curated as a beyond-implementation-range data / Phase-3 entry, not a placeable NearStars body. It is included because it is the single most extreme stellar remnant in our neighbourhood and a clean test of how the pipeline handles a compact object.",

  "p_1":"PSR J0108−1431 은 태양에서 가장 가까운 것으로 알려진 전파 펄서이며, 고래자리(Cetus)에 있는 단독 중성자별입니다. 1994년 Parkes Southern Pulsar Survey 에서 발견되었고(Tauris et al. 1994, 발견 논문 제목을 &quot;the closest known neutron star?&quot; 로 달았습니다), 거리는 대략 210–240 pc(~685 ly)로 <b>50 ly Kopernicus 캡을 한참 벗어납니다</b>. 따라서 배치 가능한 NearStars 바디가 아니라 구현-범위-밖 데이터 / Phase-3 엔트리로 큐레이션합니다. 우리 이웃에서 단일로는 가장 극단적인 항성 잔해이고, 파이프라인이 compact object 를 어떻게 다루는지 깔끔하게 검증하는 사례이기 때문에 포함했습니다.",
  "p_2":"거리는 실제로 논쟁의 대상입니다. 전파 펄서 가운데 가장 작은 분산 측정값 (DM ≈ 2.38 pc cm⁻³)이 처음에는 이 천체를 가까운 것(~85–130 pc)으로 지목했지만, Deller et al. 2009 의 VLBI 시차(π = 4.17 ± 1.42 mas)는 이를 거의 두 배 더 먼 곳, 즉 raw 값 240 +124/−61 pc 에 두었고, Verbiest et al. 2012 의 Lutz–Kelker 편향 보정을 거친 뒤 ~210 pc 로 수정되었습니다. DB 는 직접 VLBI 시차(→ 240 pc)를 저장하지만, LK-보정된 210 pc 가 더 나은 모집단 추정값입니다. 어느 쪽이든 아직도 떠도는 레거시 ~130 pc 수치는 폐기되었습니다.",
  "p_3":"이 천체는 전파 &quot;death line&quot; 에 바짝 붙어 있는 <b>평범한(비-recycled), 늙고 어두운 펄서</b>입니다. 자전 주기 0.8076 s, 특성연령 ~168 Myr, 표면 쌍극자 자기장 ~2.5×10¹¹ G 입니다. 같은 VLBI 관측은 큰 고유운동 (~170 mas/yr → 횡단 속도 ~194 km/s)을 측정했는데, 이는 탄생 당시의 초신성 킥 흔적입니다. 검출된 펄서 중 X-ray 광도가 가장 낮은 축에 들며, Chandra 와 XMM-Newton 양쪽 모두에서 희미하게 보입니다. 전용 근적외선 동반체 탐색(Posselt et al. 2008/09)은 ~5000 AU 까지 아무것도 찾지 못했습니다. <b>이것은 행성이 없는 단독 중성자별입니다.</b>",
  "p_4":"<b>NearStars 를 위한 시나리오 선택. 행성이 없는 항성 시체입니다 — 0.8 s 마다 한 바퀴 도는 ~12 km, ~1.4 M☉ 의 구체이고, 광학적으로 보이지 않으며 (V ≳ 26), 오직 전파/X-ray 점광원과 휩쓰는 자기권 빔으로만 검출됩니다.</b> 표준 항성 Phase 3 필드(Teff 기반 표면 색조, 채층 활동)는 적용되지 않으며, 합성은 그 대신 compact-object 물리에서 구성합니다. 질량이나 반지름에 의존하는 모든 &quot;측정&quot; 행은 low confidence 로 표시했는데, 이 천체에 대해서는 중성자별의 질량도 반지름도 실제로 측정된 적이 없기 때문입니다. canonical 한 1.4 M☉ / 12 km 는 데이터가 아니라 가정입니다.",

  "h2_74":"Surface",
  "p_75":"중성자별은 항성적 의미의 광구를 갖지 않습니다. 그 ~12 km 의 고체/이온화 crust 는 soft X-ray 대역에서 열적으로 복사하는데, blackbody fit 은 전체 표면보다 훨씬 작은 방출 면적 — 수십 제곱미터, 즉 <b>극관</b> (R_bb ≈ 40 m, Posselt 2012)에 걸쳐 100만~300만 K 수준 (kT ≈ 0.11–0.28 keV)의 온도를 시사합니다. 이 극관은 표면 전체가 아니라 자기권에서 돌아오는 return current 에 의해 가열됩니다. 광학광에서 이 천체는 죽어 있습니다. ~210 pc 에서 12 km 열원은 V ≈ 26 보다 어두워 어떤 서베이로도 한참 미치지 못합니다. 그러므로 정직한 &quot;표면 색조&quot; 는 <i>보이는 표면이 전혀 없음</i>입니다. 렌더러가 점을 반드시 배치해야 한다면, 뜨거운 blue-white(<span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code>)가 X-ray/UV 에 피크를 둔 스펙트럼과 맞습니다.",
  "h2_76":"Magnetosphere &amp; emission",
  "p_77":"흥미로운 모든 것이 사는 곳이 바로 여기이며, 평범한 별로 치면 &quot;대기&quot; 섹션에 해당합니다. ~2.5×10¹¹ G 의 쌍극자와 0.8 s 의 자전이 자기권을 구동하여 open field line 을 따라 입자를 가속하고, 그 결과 우리가 이 천체를 볼 수 있게 해 주는 전파 빔을 만들어 냅니다. spin-down 광도 (~5.8×10³⁰ erg/s)가 에너지 예산이며, 그중 아주 작은 일부만 희미한 X-ray 로 빠져나옵니다. death line 근처에 자리한 만큼 그 전파 방출은 본질적으로 약하며, 발견 당시 알려진 가장 어두운 전파 펄서였습니다. 시각화한다면(예정된 flux-tube/자기권 렌더러 참조), 특징적인 요소는 0.8 s 마다 시선을 가로질러 휩쓰는 쌍둥이 방출 cone 과 희미하고 뜨거운 극관이지 빛나는 구체가 아닙니다.",

  "p_89":"느린 주기와 늙은 특성연령은 이 천체를 전파 활동 수명의 끝자락에 있는 펄서로 — millisecond 펄서가 아니라(accretion 에 의한 recycling 이 없고, 이는 단독이라는 점과 일관됩니다) — 규정짓습니다. 큰 공간 속도 (~194 km/s)는 ~10⁸ yr 전 비대칭 초신성 킥의 화석입니다.",
  "h2_90":"Visual styling",
  "p_91":"광학적으로 보이지 않음이 올바른 기본값입니다. 데이터 시각화나 미래 렌더러에서라면, 이 천체는 0.8 s 자전에 맞춘 선택적 쌍둥이 빔을 휩쓰는 sub-pixel blue-white 점광원(<span class=\"hex-chip\" style=\"background:#cfe0ff\"></span><code>#cfe0ff</code>)으로, 그리고 — X-ray 파장에서만 — 희미하고 뜨거운 극관으로 표현하는 것이 가장 좋습니다. 스타일링할 디스크도, 동반체도, 행성도, 확장 대기도 없습니다. 큰 고유운동 때문에 긴 인게임 시간척도에 걸쳐 배경에 대해 눈에 띄게 표류할 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
