  "p_162":"The redeeming geological feature is g&#x27;s very high water mass fraction. Bourgeois 2024 (2008.09599) finds wmf 0.11–0.24 for g — the highest in the TRAPPIST-1 system, corresponding to 20–50 Earth oceans of water. Most of this resides as a sub-glacial liquid-water ocean (basal-melted by Earth-analog radiogenic heat at the ice-rock interface, ~0.04 W/m²) overlain by a thick (~50–100 km) global ice cover. Cryovolcanism (Europa / Ganymede analog) is plausible but unconstrained.",
  "p_163":"For the surface morphology, the snowball template gives:",
  "li_164":"<b>Substellar to ~30° from substellar:</b> thinnest ice (~30 km) due to slightly elevated insolation; possible tectonic activity from ice-flow toward the colder terminator and nightside.",
  "li_165":"<b>Mid-zone (30–120° from substellar):</b> thick ice (~60 km), smooth at large scale.",
  "li_166":"<b>Terminator (~90°):</b> highest pressure-ridge density, longest topographic shadows.",
  "li_167":"<b>Nightside (&gt;120°):</b> thickest ice (~100 km), with possible CO₂ frost deposits in the coldest regions.",
  "p_168":"<b>Color choice.</b> Clean snow / glacial ice albedo under M-dwarf illumination: warm cream-white <code>#e8e0d4</code> primary, with tan-shaded patches <code>#a09080</code> near the terminator from accumulated dust and CO₂ frost cycling.",
  "p_169":"<b>Bedrock / iron oxide.</b> Essentially none visible — the global ice cover is too thick for any bedrock exposure. Possible exception at extreme terminator ridge tops where pressure-driven thinning could expose dark patches; very low probability and not visible from orbit.",
  "p_170":"<b>Morphology under tidal lock.</b> Ice circulation is gentle due to the minimal insolation gradient (substellar-to-antistellar difference of only ~70 K). Tectonic activity is dominated by basal-melt-driven convection in the ice shell (cf. Europa) rather than by surface sublimation/deposition. The result is a geologically active ice surface with cryovolcanic features at warm spots — visually subtle but distinguishing g from a &quot;dead snowball.&quot;",
  "h2_171":"Atmosphere synthesis",
  "p_172":"No published JWST observations of g exist. The HST haze limit analysis (Moran 2018, 1810.05210) excludes cloud-free hydrogen-rich atmospheres; secondary atmospheres are not constrained by HST.",
  "p_173":"Theoretical models converge:",
  "li_174":"<b>Wolf 2017:</b> full snowball at g&#x27;s insolation; even ~10 bar CO₂ insufficient for liquid water.",
  "li_175":"<b>Lincowski 2018:</b> g classed as &quot;snowball&quot; or &quot;post-runaway O₂-rich&quot; depending on initial water inventory.",
  "li_176":"<b>Bourgeois 2024:</b> magma-ocean phase produces ~10 bar O₂ + CO₂ atmosphere initially; most is lost over the system&#x27;s age via hydrodynamic escape and surface oxidation.",
  "p_177":"For NearStars we adopt <b>0.05 bar CO₂-rich thin atmosphere</b>:",
  "li_178":"<b>Pressure</b> 0.05 bar (5 kPa). Below the threshold needed for cloud formation at g&#x27;s temperatures; thin enough that the surface communicates radiatively with space at most wavelengths. Above 0 because volcanic outgassing without a CO₂ sink (frozen surface → no carbonate-silicate weathering) should accumulate modest CO₂.",
  "li_179":"<b>Composition</b> CO₂-dominated (90%), N₂ (8%), trace H₂O / Ar. CO₂ richness reflects outgassing accumulation; H₂O is trace because of the cold-trap.",
  "li_180":"<b>Clouds.</b> Minimal (~10% global): only CO₂ ice cirrus at the terminator + nightside cold-trap.",
  "p_181":"<b>Sky appearance.</b> The 0.05 bar atmosphere is barely visible from orbit. From the surface, the sky is near-black with the host star appearing as a deep red-orange disk against the void. CO₂ ice clouds catch grazing light at the terminator as faint cream wisps.",
  "h2_182":"Rotation &amp; spin synthesis",
  "p_183":"Tidal damping at 12.35 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00208 — the lowest in the system, deep inside the 3:2 stability boundary (only 1:1 plausible).",
  "p_184":"<b>KSP implementation note.</b> Rotation period = orbital period = 12.3524 days (1 067 251 s).",
  "p_185":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.2% (lowest in system). Substellar point is fixed.",
  "h2_186":"Visual styling",
  "li_187":"<b>Global appearance.</b> Near-uniform warm cream-white snowball (<code>#e8e0d4</code>) with subtle tan tinting near the terminator (<code>#a09080</code>). No obvious &quot;eyeball&quot; feature — no open-water disk. The most visually subdued planet in the system.",
  "li_188":"<b>Substellar region.</b> Slightly more textured / fractured ice due to tectonic ice-flow toward colder zones. Possible cryovolcanic features as bright fresh-ice patches.",
  "li_189":"<b>Mid-zone and terminator.</b> Pressure ridges, crevasses, and long topographic shadows under grazing 2566 K illumination. Terminator is the most photogenic zone.",
  "li_190":"<b>Nightside.</b> Slightly darker cream-tan from CO₂ frost. KSP nightside ambient ≈ 1–3% dayside.",
  "li_191":"<b>Atmosphere haze.</b> Imperceptible from orbit; barely a hairline warm-gray glow (<code>#403028</code>) at the limb.",
  "li_192":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.36° in g&#x27;s sky (2.7× the Sun from Earth). Surface illumination is 0.26 S⊕ — comparable to outer Mars&#x27;s solar flux. The red-orange star against the cream snowscape gives a permanent dim-dawn quality.",
  "li_193":"<b>Sister planets in sky.</b> f (next inward) at angular size ~0.3° in conjunction; h (next outward) at ~0.2° at outer conjunction. Resonant chain ensures frequent multi-planet alignments.",
  "h2_194":"Bibliography",
  "h3_195":"Read (visual-informative, drove decisions above)",
  "li_196":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Establishes g as the most water-rich planet in the system (wmf 0.11–0.24). Drives the sub-glacial ocean cfg.",
  "li_197":"<b>2412.10192</b> Cherubim 2024 — From CO₂- to H₂O-dominated atmospheres in magma ocean phase. Provides composition framework for g&#x27;s evolved atmosphere.",
  "li_198":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. g classified as snowball in all considered scenarios. Already read for d/e/f phase 3.",
  "li_199":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. g&#x27;s position relative to the empirical M-dwarf atmospheric retention line: likely retains a thin atmosphere but not a thick one.",
  "li_200":"<b>1810.05210</b> Moran 2018 — HST haze limits. Rejects cloud-free H₂-rich for inner 5 planets (including g indirectly). Already read for d Phase 3.",
  "h3_201":"Read (context / methodology, not decision-driving)",
  "li_202":"<b>2508.12865</b> Empirical determination of the Cosmic Shoreline. Context for g&#x27;s retention status.",
  "li_203":"<b>2504.01182</b> Receding Cosmic Shoreline for mid-to-late M dwarfs. TRAPPIST-1 system-level context.",
  "li_204":"<b>2210.02484</b> HZ catalog. Lists g as one of the wider-HZ candidates. Already read for d.",
  "li_205":"<b>2006.11349</b> Wunderlich 2020 — Wet/dry e and f. g context only. Already read for f.",
  "li_206":"<b>2506.16063</b> Mass-radius plane classification. Catalog context only.",
  "h3_207":"Read (instrument-only, not visual-informative)",

  "p_210":"The g bibliography is large (66 papers, 52 with arXiv) but most papers are SETI / technosignature surveys, mass-radius catalogs, or works that mention g only in passing.",
  "li_211":"<b>2509.06310</b> Deep SETI search with FAST. Not visual.",
  "li_212":"<b>2208.02511</b> SETI drift rate context. Not visual.",
  "li_213":"<b>Multiple cosmic-shoreline papers</b> — collectively read for the retention question; individual entries not visual-informative.",
  "li_214":"<b>TESS / non-TRAPPIST-1 catalog papers</b> — irrelevant.",
  "p_215":"---",
  "h2_216":"Open items for follow-up",
  "li_217":"No direct JWST observation of g exists yet; if a future transmission or emission spectrum is published, the atmosphere pressure / composition table should be revisited. Particularly if g shows any CO₂ feature in transmission, the 0.05 bar choice could be refined.",
  "li_218":"Cryovolcanism is plausible but unconstrained for g. If a future cfg variant wants to emphasize the Europa-analog aspect (visible resurfaced ice patches, possible plume features at warm spots), it could be implemented as Phase 3.5.",
  "li_219":"The 0.05 bar CO₂ choice is at the lower edge of &quot;atmosphere present&quot; — could be reduced to ~0.01 bar or set to zero for a fully airless cold-snowball variant.",

  "p_161":"TRAPPIST-1 g 는 0.26 S⊕ 에서 보수적 거주 가능 영역 한참 바깥에 위치. Wolf 2017 §5 는 현실적 대기 탈출 제약 아래에서 10 bar CO₂ 도 g 의 일사량에서 지속적 개방 수역을 만들지 못함을 발견 — cold trap 이 너무 효율적. Lincowski 2018 도 모든 고려된 대기 조성에서 g 를 snowball 로 분류.",
  "p_162":"g 의 구원하는 지질학적 특징은 매우 높은 water mass fraction. Bourgeois 2024 (2008.09599) 가 g 에 대해 wmf 0.11–0.24 산출 — TRAPPIST-1 시스템에서 최고, 지구 바다 20–50 배에 해당. 대부분은 빙하 아래 액체 물 바다로 존재(얼음-암석 경계에서 지구-analog radiogenic heat ~0.04 W/m² 에 의해 basal-melted) 하며 두꺼운(~50–100 km) 전역 얼음 피복으로 덮임. Cryovolcanism (Europa / Ganymede analog) 은 플로지블하나 제약되지 않음.",
  "p_163":"표면 모양에 대해 snowball template 이 다음을 제공.",
  "li_164":"<b>Substellar 부터 substellar 에서 ~30° 까지.</b> 약간 상승한 일사량으로 가장 얇은 얼음(~30 km); 더 차가운 terminator 와 nightside 쪽 ice-flow 에서 tectonic 활동 가능.",
  "li_165":"<b>중간 구역 (substellar 에서 30–120°).</b> 두꺼운 얼음(~60 km), 큰 스케일에서 평활.",
  "li_166":"<b>Terminator (~90°).</b> 가장 높은 pressure-ridge 밀도, 가장 긴 지형 그림자.",
  "li_167":"<b>Nightside (&gt;120°).</b> 가장 두꺼운 얼음(~100 km), 가장 차가운 영역에 CO₂ 서리 퇴적 가능.",
  "p_168":"<b>색 선택.</b> M-dwarf 조명 아래 깨끗한 눈 / 빙하 얼음 알베도. 따뜻한 cream-white <code>#e8e0d4</code> primary, terminator 근처 누적된 먼지와 CO₂ 서리 사이클로부터 tan-shaded patch <code>#a09080</code>.",
  "p_169":"<b>Bedrock / 산화철.</b> 본질적으로 보이지 않음 — 전역 얼음 피복이 어떤 bedrock 노출에도 너무 두꺼움. pressure 로 인한 얇아짐이 어두운 patch 를 노출할 수 있는 극단적 terminator ridge 꼭대기에서 예외 가능. 매우 낮은 확률이며 궤도에서 보이지 않음.",
  "p_170":"<b>조석 lock 아래 모양.</b> 최소한의 일사량 기울기(substellar-에서- antistellar 차이 ~70 K) 때문에 얼음 순환이 부드러움. tectonic 활동은 표면 승화/퇴적이 아닌 얼음 껍데기의 basal-melt-driven convection(cf. Europa) 에 의해 지배. 결과는 따뜻한 spot 에서 cryovolcanic feature 를 갖는 지질학적으로 활성인 얼음 표면 — 시각적으로 미묘하지만 g 를 &quot;죽은 snowball&quot; 과 구분.",
  "h2_171":"대기 합성",
  "p_172":"g 에 대해 출판된 JWST 관측은 없음. HST haze 한계 분석(Moran 2018, 1810.05210) 이 cloud-free 수소-rich 대기를 배제. secondary 대기는 HST 로 제약되지 않음.",
  "p_173":"이론 모델이 수렴.",
  "li_174":"<b>Wolf 2017.</b> g 의 일사량에서 완전 snowball; ~10 bar CO₂ 도 액체 물 에 불충분.",
  "li_175":"<b>Lincowski 2018.</b> g 는 초기 water inventory 에 따라 &quot;snowball&quot; 또는 &quot;post-runaway O₂-rich&quot; 로 분류.",
  "li_176":"<b>Bourgeois 2024.</b> magma-ocean 페이즈가 초기에 ~10 bar O₂ + CO₂ 대기 생성; 대부분은 hydrodynamic escape 와 표면 산화로 시스템 수명에 걸쳐 손실.",
  "p_177":"NearStars 는 <b>0.05 bar CO₂-rich 얇은 대기</b>를 채택.",
  "li_178":"<b>압력</b> 0.05 bar (5 kPa). g 의 온도에서 구름 형성에 필요한 임계값 아래; 표면이 대부분의 파장에서 우주와 복사적으로 소통할 정도로 얇음. CO₂ sink 없는 화산 outgassing(얼어붙은 표면 → carbonate-silicate weathering 없음) 이 적당한 CO₂ 를 누적해야 하므로 0 보다 큼.",
  "li_179":"<b>조성</b> CO₂ 지배 (90%), N₂ (8%), 미량 H₂O / Ar. CO₂ 풍부는 outgassing 누적 반영; H₂O 는 cold-trap 때문에 미량.",
  "li_180":"<b>구름.</b> 최소 (~10% 전역). terminator + nightside cold-trap 의 CO₂ 얼음 cirrus 만.",
  "p_181":"<b>하늘 외관.</b> 0.05 bar 대기는 궤도에서 거의 보이지 않음. 표면에서 하늘은 거의 검고 호스트 별이 공허에 대비되는 깊은 적-오렌지 디스크로 나타남. CO₂ 얼음 구름이 terminator 에서 비스듬한 빛을 받아 옅은 cream wisp 로 나타남.",
  "h2_182":"자전 &amp; spin 합성",
  "p_183":"12.35 일에서 7.6 Gyr 동안의 조석 damping → 동기(1:1) 구성. 황도 경사각 0 으로 damping. 이심률은 0.00208 — 시스템 최저, 3:2 안정성 경계 한참 안쪽(1:1 만 플로지블).",
  "p_184":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 12.3524 일 (1 067 251 s).",
  "p_185":"<b>계절 없음.</b> 황도 경사각 = 0; libration 으로 인한 일사량 변동 &lt; 0.2%(시스템 최저). Substellar 점이 고정.",
  "h2_186":"비주얼 스타일",
  "li_187":"<b>전역 외관.</b> terminator 근처 미묘한 tan tinting(<code>#a09080</code>) 을 가진 거의 균일한 따뜻한 cream-white snowball (<code>#e8e0d4</code>). 명백한 &quot;eyeball&quot; feature 없음 — 개방 수역 디스크 없음. 시스템에서 시각적으로 가장 차분한 행성.",
  "li_188":"<b>Substellar 영역.</b> 더 차가운 영역 쪽 tectonic ice-flow 로 약간 더 텍스처화 / 균열된 얼음. 밝은 신선-얼음 patch 로 cryovolcanic feature 가능.",
  "li_189":"<b>중간 구역과 terminator.</b> 비스듬한 2566 K 조명 아래의 pressure ridge, crevasse, 긴 지형 그림자. Terminator 가 가장 사진발 좋은 영역.",
  "li_190":"<b>Nightside.</b> CO₂ 서리로부터 약간 더 어두운 cream-tan. KSP nightside ambient ≈ dayside 의 1–3%.",
  "li_191":"<b>Atmosphere haze.</b> 궤도에서 인지 불가; limb 에 hairline 따뜻-회색 glow (<code>#403028</code>) 정도.",
  "li_192":"<b>하늘의 별.</b> TRAPPIST-1 이 g 의 하늘에서 1.36° 차지(지구에서 본 태양의 2.7배). 표면 조명은 0.26 S⊕ — 외곽 화성의 태양 flux 와 유사. cream 설경에 대비되는 적-오렌지 별이 영구적 어슴푸레-여명 분위기 제공.",
  "li_193":"<b>하늘의 자매 행성.</b> f (안쪽 다음) 가 conjunction 시 각 크기 ~0.3°; h (바깥쪽 다음) 가 outer conjunction 시 ~0.2°. 공명 체인이 빈번한 다중 행성 정렬 보장.",
  "h2_194":"참고 문헌",
  "h3_195":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_196":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 Magma ocean 진화. g 를 시스템에서 가장 물이 풍부한 행성으로 확립(wmf 0.11–0.24). 빙하 아래 바다 cfg 견인.",
  "li_197":"<b>2412.10192</b> Cherubim 2024 — magma ocean 페이즈에서 CO₂- 에서 H₂O- 지배 대기로. g 의 진화된 대기에 대한 조성 프레임워크 제공.",
  "li_198":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계의 진화된 기후. g 는 모든 고려된 시나리오에서 snowball 로 분류. d/e/f phase 3 에 이미 읽음.",
  "li_199":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. 경험적 M-dwarf 대기 retention 선에 대한 g 의 위치. 얇은 대기는 유지하나 두꺼운 대기는 아닐 가능성.",
  "li_200":"<b>1810.05210</b> Moran 2018 — HST haze 한계. 안쪽 5 행성(간접적으로 g 포함) 에 대해 cloud-free H₂-rich 배제. d Phase 3 에 이미 읽음.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
