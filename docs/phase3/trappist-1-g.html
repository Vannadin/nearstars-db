  "h2_168":"Surface synthesis",
  "p_169":"TRAPPIST-1 g sits well outside the conservative habitable zone at 0.26 S⊕. Wolf 2017 §5 finds that even 10 bar CO₂ does not produce a sustained open ocean at g&#x27;s insolation under realistic atmospheric escape constraints — the cold trap is too efficient. Lincowski 2018 similarly classifies g as a snowball in all considered atmospheric compositions.",
  "p_170":"The redeeming geological feature is g&#x27;s very high water mass fraction. Bourgeois 2024 (2008.09599) finds wmf 0.11–0.24 for g — the highest in the TRAPPIST-1 system, corresponding to 20–50 Earth oceans of water. Most of this resides as a sub-glacial liquid-water ocean (basal-melted by Earth-analog radiogenic heat at the ice-rock interface, ~0.04 W/m²) overlain by a thick (~50–100 km) global ice cover. Cryovolcanism (Europa / Ganymede analog) is plausible but unconstrained.",
  "p_171":"For the surface morphology, the snowball template gives:",
  "li_172":"<b>Substellar to ~30° from substellar:</b> thinnest ice (~30 km) due to slightly elevated insolation; possible tectonic activity from ice-flow toward the colder terminator and nightside.",
  "li_173":"<b>Mid-zone (30–120° from substellar):</b> thick ice (~60 km), smooth at large scale.",
  "li_174":"<b>Terminator (~90°):</b> highest pressure-ridge density, longest topographic shadows.",
  "li_175":"<b>Nightside (&gt;120°):</b> thickest ice (~100 km), with possible CO₂ frost deposits in the coldest regions.",
  "p_176":"<b>Color choice.</b> Clean snow / glacial ice albedo under M-dwarf illumination: warm cream-white <code>#e8e0d4</code> primary, with tan-shaded patches <code>#a09080</code> near the terminator from accumulated dust and CO₂ frost cycling.",
  "p_177":"<b>Bedrock / iron oxide.</b> Essentially none visible — the global ice cover is too thick for any bedrock exposure. Possible exception at extreme terminator ridge tops where pressure-driven thinning could expose dark patches; very low probability and not visible from orbit.",
  "p_178":"<b>Morphology under tidal lock.</b> Ice circulation is gentle due to the minimal insolation gradient (substellar-to-antistellar difference of only ~70 K). Tectonic activity is dominated by basal-melt-driven convection in the ice shell (cf. Europa) rather than by surface sublimation/deposition. The result is a geologically active ice surface with cryovolcanic features at warm spots — visually subtle but distinguishing g from a &quot;dead snowball.&quot;",
  "h2_179":"Atmosphere synthesis",
  "p_180":"No published JWST observations of g exist. The HST haze limit analysis (Moran 2018, 1810.05210) excludes cloud-free hydrogen-rich atmospheres; secondary atmospheres are not constrained by HST.",
  "p_181":"Theoretical models converge:",
  "li_182":"<b>Wolf 2017:</b> full snowball at g&#x27;s insolation; even ~10 bar CO₂ insufficient for liquid water.",
  "li_183":"<b>Lincowski 2018:</b> g classed as &quot;snowball&quot; or &quot;post-runaway O₂-rich&quot; depending on initial water inventory.",
  "li_184":"<b>Bourgeois 2024:</b> magma-ocean phase produces ~10 bar O₂ + CO₂ atmosphere initially; most is lost over the system&#x27;s age via hydrodynamic escape and surface oxidation.",
  "p_185":"For NearStars we adopt <b>0.05 bar CO₂-rich thin atmosphere</b>:",
  "li_186":"<b>Pressure</b> 0.05 bar (5 kPa). Below the threshold needed for cloud formation at g&#x27;s temperatures; thin enough that the surface communicates radiatively with space at most wavelengths. Above 0 because volcanic outgassing without a CO₂ sink (frozen surface → no carbonate-silicate weathering) should accumulate modest CO₂.",
  "li_187":"<b>Composition</b> CO₂-dominated (90%), N₂ (8%), trace H₂O / Ar. CO₂ richness reflects outgassing accumulation; H₂O is trace because of the cold-trap.",
  "li_188":"<b>Clouds.</b> Minimal (~10% global): only CO₂ ice cirrus at the terminator + nightside cold-trap.",
  "p_189":"<b>Caveat — atmosphere retention.</b> Van Looveren 2024 (2401.16490) finds that at g&#x27;s ~120 F_EUV,⊕ (revised upward from earlier estimates by Berardo 2025 / 2506.12140, who measured L_XUV = 1.83×10²⁸ erg/s, 30× higher than 2017 values), CO₂ atmospheres are lost at roughly <b>1 bar per 5 Myr</b> under Jeans escape alone. Even a 100 × Earth atmosphere would be lost in tens of Myr. The 0.05 bar choice is therefore <b>optimistic</b> and assumes ongoing volcanic replenishment. A 0.01 bar / fully airless variant is preserved as a cfg backup. The stellar microflare cadence (~10²⁹ erg every 45 min, per Berardo 2025 HST Ly-α multi-year monitoring) further stresses retention but does not directly drive the cfg pressure.",
  "p_190":"<b>Sky appearance.</b> The 0.05 bar atmosphere is barely visible from orbit. From the surface, the sky is near-black with the host star appearing as a deep red-orange disk against the void. CO₂ ice clouds catch grazing light at the terminator as faint cream wisps.",
  "h2_191":"Rotation &amp; spin synthesis",
  "p_192":"Tidal damping at 12.35 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00208 — the lowest in the system, deep inside the 3:2 stability boundary (only 1:1 plausible).",
  "p_193":"<b>KSP implementation note.</b> Rotation period = orbital period = 12.3524 days (1 067 251 s).",
  "p_194":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.2% (lowest in system). Substellar point is fixed.",
  "p_195":"<b>Planet-planet tides.</b> Hay &amp; Matsuyama 2019 (1903.04501) identifies g as the planet that experiences the most significant <b>planet-planet tidal heating relative to its eccentricity-forced tides</b> (2–20% of total, mostly from neighbor f). For all other planets in the system the planet-planet contribution is &lt;1%. The absolute magnitude is still small (~2×10⁻⁷ W/m² surface flux for a Maxwell-body rheology), but the relative dominance of f&#x27;s gravitational influence is unique to g — a faithful annotation for the Principia cfg.",
  "h2_196":"Visual styling",
  "li_197":"<b>Global appearance.</b> Near-uniform warm cream-white snowball (<code>#e8e0d4</code>) with subtle tan tinting near the terminator (<code>#a09080</code>). No obvious &quot;eyeball&quot; feature — no open-water disk. The most visually subdued planet in the system.",
  "li_198":"<b>Substellar region.</b> Slightly more textured / fractured ice due to tectonic ice-flow toward colder zones. Possible cryovolcanic features as bright fresh-ice patches.",
  "li_199":"<b>Mid-zone and terminator.</b> Pressure ridges, crevasses, and long topographic shadows under grazing 2566 K illumination. Terminator is the most photogenic zone.",
  "li_200":"<b>Nightside.</b> Slightly darker cream-tan from CO₂ frost. KSP nightside ambient ≈ 1–3% dayside.",
  "li_201":"<b>Atmosphere haze.</b> Imperceptible from orbit; barely a hairline warm-gray glow (<code>#403028</code>) at the limb.",
  "li_202":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.36° in g&#x27;s sky (2.7× the Sun from Earth). Surface illumination is 0.26 S⊕ — comparable to outer Mars&#x27;s solar flux. The red-orange star against the cream snowscape gives a permanent dim-dawn quality.",
  "li_203":"<b>Sister planets in sky.</b> f (next inward) at angular size ~0.3° in conjunction; h (next outward) at ~0.2° at outer conjunction. Resonant chain ensures frequent multi-planet alignments.",
  "h2_204":"Bibliography",
  "h3_205":"Read (visual-informative, drove decisions above)",
  "li_206":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Establishes g as the most water-rich planet in the system (wmf 0.11–0.24). Drives the sub-glacial ocean cfg.",
  "li_207":"<b>2412.10192</b> Cherubim 2024 — From CO₂- to H₂O-dominated atmospheres in magma ocean phase. Provides composition framework for g&#x27;s evolved atmosphere.",
  "li_208":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. g classified as snowball in all considered scenarios. Already read for d/e/f phase 3.",
  "li_209":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. g&#x27;s position relative to the empirical M-dwarf atmospheric retention line: likely retains a thin atmosphere but not a thick one.",
  "li_210":"<b>1810.05210</b> Moran 2018 — HST haze limits. Rejects cloud-free H₂-rich for inner 5 planets (including g indirectly). Already read for d Phase 3.",
  "li_211":"<b>1706.02689</b> Unterborn 2018 — Inward-migration interpretation of TRAPPIST-1 densities. Argues g and f have ≥50 wt% water/ice — a much higher water-content upper bound than Bourgeois 2024&#x27;s 0.24. Drives the upward revision of <code>water_mass_fraction</code> to 0.11–0.50.",
  "li_212":"<b>1903.04501</b> Hay &amp; Matsuyama 2019 — Tides between TRAPPIST-1 planets. g uniquely receives 2–20% of its tidal heating from planet-planet interactions (mostly f); all other planets &lt;1%. Drives the new Rotation section paragraph.",
  "li_213":"<b>2401.16490</b> Van Looveren 2024 — Airy worlds or barren rocks? Quantitative atmospheric escape under Jeans escape. At g&#x27;s ~120 F_EUV,⊕, CO₂ atmospheres are lost at ~1 bar per 5 Myr. Drives the new &quot;atmosphere retention caveat&quot; paragraph and the alternative cfg variants.",
  "li_214":"<b>2506.12140</b> Berardo 2025 — HST multi-year Ly-α monitoring of TRAPPIST-1. Revised L_XUV = 1.83×10²⁸ erg/s (30× higher than 2017 estimates). Microflare cadence ~10²⁹ erg every 45 min. Drives the new XUV and microflare entries in the decisions table.",
  "li_215":"<b>1912.05749</b> Hori &amp; Ogihara 2020 — Hydrogen-rich atmosphere origin. g&#x27;s maximum primordial H atmosphere ≤ 2 wt%, lost within several 100 Myr. Confirms the present-day atmosphere is secondary.",
  "h3_216":"Read (context / methodology, not decision-driving)",
  "li_217":"<b>2508.12865</b> Empirical determination of the Cosmic Shoreline. Context for g&#x27;s retention status.",
  "li_218":"<b>2504.01182</b> Receding Cosmic Shoreline for mid-to-late M dwarfs. TRAPPIST-1 system-level context.",
  "li_219":"<b>2210.02484</b> HZ catalog. Lists g as one of the wider-HZ candidates. Already read for d.",
  "li_220":"<b>2006.11349</b> Wunderlich 2020 — Wet/dry e and f. g context only. Already read for f.",
  "li_221":"<b>2506.16063</b> Mass-radius plane classification. Catalog context only.",
  "h3_222":"Read (instrument-only, not visual-informative)",
  "p_223":"(None specific to g.)",
  "h3_224":"Not read — no arXiv preprint or low-priority (~14 papers)",
  "p_225":"The g bibliography is large (66 papers, 52 with arXiv) but most papers are SETI / technosignature surveys, mass-radius catalogs, or works that mention g only in passing.",
  "li_226":"<b>2509.06310</b> Deep SETI search with FAST. Not visual.",
  "li_227":"<b>2208.02511</b> SETI drift rate context. Not visual.",
  "li_228":"<b>Multiple cosmic-shoreline papers</b> — collectively read for the retention question; individual entries not visual-informative.",
  "li_229":"<b>TESS / non-TRAPPIST-1 catalog papers</b> — irrelevant.",
  "p_230":"---",
  "h2_231":"Open items for follow-up",
  "li_232":"No direct JWST observation of g exists yet; if a future transmission or emission spectrum is published, the atmosphere pressure / composition table should be revisited. Particularly if g shows any CO₂ feature in transmission, the 0.05 bar choice could be refined.",
  "li_233":"Cryovolcanism is plausible but unconstrained for g. If a future cfg variant wants to emphasize the Europa-analog aspect (visible resurfaced ice patches, possible plume features at warm spots), it could be implemented as Phase 3.5.",
  "li_234":"The 0.05 bar CO₂ choice is at the lower edge of &quot;atmosphere present&quot; — could be reduced to ~0.01 bar or set to zero for a fully airless cold-snowball variant.",
  "li_235":"The wmf range (0.11–0.24) is high enough that g could plausibly host an habitable sub-glacial layer with hydrothermal activity at the seafloor (Europa-Enceladus astrobiology analog). Worth a Principia note even if not visually relevant.",

  "td_155":"Berardo 2025. 10²⁹ erg microflare 가 ~45 분마다, 10³⁰ erg flare 가 6 시간마다 (JWST)",
  "td_156":"<code>radiogenic_heat_w_m2</code>",
  "td_157":"0.04",
  "td_158":"medium",
  "td_159":"지구-analog mantle radiogenics",
  "td_160":"<code>star_apparent_angular_diameter_deg</code>",
  "td_161":"1.36",
  "td_162":"high",
  "td_163":"derived. 2 × R★ / a × (180/π)",
  "td_164":"<code>stellar_illumination_color_temp_k</code>",
  "td_165":"2566",
  "td_166":"high",
  "td_167":"Agol 2021 SED fit",
  "h2_168":"표면 합성",
  "p_169":"TRAPPIST-1 g 는 0.26 S⊕ 에서 보수적 거주 가능 영역을 한참 벗어난 자리에 있습니다. Wolf 2017 §5 는 현실적인 대기 탈출 제약 아래에서는 10 bar CO₂ 조차도 g 의 일사량에서 지속적인 개방 수역을 만들지 못한다고 봅니다. cold trap 이 너무 효율적이기 때문입니다. Lincowski 2018 도 고려한 모든 대기 조성에서 g 를 snowball 로 분류합니다.",
  "p_170":"g 를 구해 주는 지질학적 특징은 매우 높은 water mass fraction 입니다. Bourgeois 2024 (2008.09599) 가 g 에 대해 wmf 0.11–0.24 를 산출했고, 이는 TRAPPIST-1 시스템에서 최고치로 지구 바다의 20–50 배에 해당합니다. 이 물의 대부분은 빙하 아래 액체 물 바다로 존재하는데, 얼음-암석 경계에서 지구와 유사한 radiogenic heat (~0.04 W/m²) 가 basal-melt 를 일으키고 그 위를 두꺼운 (~50–100 km) 전역 얼음 피복이 덮고 있습니다. Cryovolcanism (Europa 와 Ganymede analog) 도 그럴듯하지만 아직 제약은 없습니다.",
  "p_171":"표면 모양에 대해 snowball template 이 다음을 줍니다.",
  "li_172":"<b>Substellar 에서 substellar 기준 ~30° 까지.</b> 일사량이 약간 더 높아 얼음이 가장 얇고 (~30 km), 더 차가운 terminator 와 nightside 쪽으로 흐르는 얼음 흐름에서 tectonic 활동이 가능합니다.",
  "li_173":"<b>중간 구역 (substellar 에서 30–120°).</b> 두꺼운 얼음 (~60 km), 큰 스케일에서는 평활합니다.",
  "li_174":"<b>Terminator (~90°).</b> pressure-ridge 밀도가 가장 높고, 지형 그림자도 가장 깁니다.",
  "li_175":"<b>Nightside (&gt;120°).</b> 얼음이 가장 두껍고 (~100 km), 가장 차가운 영역에는 CO₂ 서리 퇴적이 있을 수 있습니다.",
  "p_176":"<b>색 선택.</b> M-dwarf 조명 아래에서 깨끗한 눈과 빙하 얼음의 알베도를 반영합니다. primary 는 따뜻한 cream-white <code>#e8e0d4</code>, terminator 근처에는 누적된 먼지와 CO₂ 서리 사이클로 tan-shaded patch <code>#a09080</code> 가 들어갑니다.",
  "p_177":"<b>Bedrock 과 산화철.</b> 사실상 보이지 않습니다. 전역 얼음 피복이 너무 두꺼워 bedrock 노출이 일어날 수 없습니다. 압력으로 얇아져 어두운 patch 가 드러날 수 있는 극단적 terminator ridge 꼭대기 정도가 예외일 수 있는데, 확률이 매우 낮고 궤도에서는 보이지 않습니다.",
  "p_178":"<b>조석 lock 아래의 모양.</b> 일사량 기울기가 최소 (substellar 와 antistellar 의 차이 ~70 K) 이라 얼음 순환이 부드럽습니다. tectonic 활동은 표면 승화 / 퇴적이 아니라 얼음 껍데기의 basal-melt-driven convection (cf. Europa) 이 주도합니다. 결과적으로 따뜻한 spot 에서 cryovolcanic feature 가 생기는 지질학적으로 활성인 얼음 표면이 됩니다. 시각적으로는 미묘하지만, &quot;죽은 snowball&quot; 과는 구분되는 인상을 줍니다.",
  "h2_179":"대기 합성",
  "p_180":"g 에 대해 출판된 JWST 관측은 없습니다. HST haze 한계 분석 (Moran 2018, 1810.05210) 이 cloud-free 수소-rich 대기를 배제하지만, secondary 대기는 HST 로 제약되지 않습니다.",
  "p_181":"이론 모델들은 다음으로 수렴합니다.",
  "li_182":"<b>Wolf 2017.</b> g 의 일사량에서 완전 snowball. ~10 bar CO₂ 도 액체 물에 불충분합니다.",
  "li_183":"<b>Lincowski 2018.</b> g 는 초기 water inventory 에 따라 &quot;snowball&quot; 혹은 &quot;post-runaway O₂-rich&quot; 로 분류됩니다.",
  "li_184":"<b>Bourgeois 2024.</b> magma-ocean 페이즈에서 초기 ~10 bar O₂ + CO₂ 대기를 생성하지만, 대부분은 시스템 수명 동안 hydrodynamic escape 와 표면 산화로 손실됩니다.",
  "p_185":"NearStars 는 <b>0.05 bar CO₂-rich 얇은 대기</b>를 채택합니다.",
  "li_186":"<b>압력</b> 0.05 bar (5 kPa). g 의 온도에서 구름 형성에 필요한 임계값 아래이며, 표면이 대부분 파장에서 우주와 복사적으로 직접 소통할 정도로 얇습니다. 그래도 0 보다 큰 이유는, 얼어붙은 표면 탓에 carbonate-silicate weathering 이 작동하지 않아 화산 outgassing 으로 CO₂ 가 어느 정도 누적되어야 하기 때문입니다.",
  "li_187":"<b>조성</b> CO₂ 지배 (90%), N₂ (8%), 미량 H₂O 와 Ar. CO₂ 가 풍부한 것은 outgassing 누적을 반영하고, H₂O 는 cold-trap 때문에 미량입니다.",
  "li_188":"<b>구름.</b> 최소 (~10% 전역). terminator 와 nightside cold-trap 의 CO₂ 얼음 cirrus 정도입니다.",
  "p_189":"<b>Caveat — 대기 retention.</b> Van Looveren 2024 (2401.16490) 에 따르면 g 의 ~120 F_EUV,⊕ (Berardo 2025 / 2506.12140 이 L_XUV = 1.83×10²⁸ erg/s 로 2017 값보다 30배 높게 개정) 아래에서는 Jeans escape 만으로도 CO₂ 대기가 <b>1 bar 당 5 Myr</b> 수준으로 손실됩니다. 100 × 지구 대기조차도 수십 Myr 안에 잃게 됩니다. 따라서 0.05 bar 선택은 <b>낙관적인</b> 값이며, 화산 보충이 계속된다는 가정을 깔고 있습니다. 0.01 bar 또는 완전 무대기 변형은 cfg 백업으로 보존해 둡니다. 별의 microflare cadence (~10²⁹ erg 가 45 분마다, Berardo 2025 의 HST Ly-α 다년 모니터링) 도 retention 을 더 압박하지만, cfg 압력을 직접 결정하지는 않습니다.",
  "p_190":"<b>하늘 외관.</b> 0.05 bar 대기는 궤도에서 거의 보이지 않습니다. 표면에서 하늘은 거의 검고, 호스트 별이 공허를 배경으로 깊은 적-오렌지 디스크로 떠 있습니다. CO₂ 얼음 구름은 terminator 에서 비스듬한 빛을 받아 옅은 cream wisp 로 보입니다.",
  "h2_191":"자전과 spin 합성",
  "p_192":"12.35 일 주기에서 7.6 Gyr 의 조석 damping 을 거쳐 동기 (1:1) 구성에 도달했습니다. 황도 경사각은 0 으로 damping 되었습니다. 이심률은 0.00208 으로 시스템 최저이며, 3:2 안정 경계의 한참 안쪽이라 1:1 만 그럴듯합니다.",
  "p_193":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 12.3524 일 (1 067 251 s).",
  "p_194":"<b>계절 없음.</b> 황도 경사각 = 0. libration 으로 인한 일사량 변동은 0.2% 미만으로 시스템 최저이며, substellar 점은 고정됩니다.",
  "p_195":"<b>Planet-planet tides.</b> Hay &amp; Matsuyama 2019 (1903.04501) 는 g 가 이심률 강제 조석 대비 <b>planet-planet 조석 가열의 비중이 가장 큰</b> 행성이라고 지적합니다 (전체의 2–20%, 대부분이 이웃 f 의 기여). 시스템의 다른 행성은 모두 planet-planet 기여가 1% 미만입니다. 절대값 자체는 여전히 작지만 (Maxwell rheology 기준 표면 flux ~2×10⁻⁷ W/m²), f 중력 영향의 상대적 지배는 g 만의 특징이며, Principia cfg 에 충실히 표기해 둘 만한 사실입니다.",
  "h2_196":"비주얼 스타일",
  "li_197":"<b>전역 외관.</b> terminator 근처에 미묘한 tan tinting (<code>#a09080</code>) 이 도는, 거의 균일한 따뜻한 cream-white snowball (<code>#e8e0d4</code>). 뚜렷한 &quot;eyeball&quot; feature 는 없습니다. 개방 수역 디스크도 없고, 시스템에서 시각적으로 가장 차분한 행성입니다.",
  "li_198":"<b>Substellar 영역.</b> 더 차가운 영역으로 흐르는 tectonic ice-flow 때문에 얼음이 약간 더 텍스처화되고 균열이 보입니다. 밝은 신선-얼음 patch 로 나타나는 cryovolcanic feature 도 가능합니다.",
  "li_199":"<b>중간 구역과 terminator.</b> 비스듬한 2566 K 조명 아래의 pressure ridge, crevasse, 긴 지형 그림자. terminator 가 가장 사진발이 좋은 구역입니다.",
  "li_200":"<b>Nightside.</b> CO₂ 서리 때문에 약간 더 어두운 cream-tan. KSP nightside ambient 는 dayside 의 1–3% 수준입니다.",
  "li_201":"<b>Atmosphere haze.</b> 궤도에서는 거의 인지 불가. limb 에 hairline 굵기의 따뜻한-회색 glow (<code>#403028</code>) 정도만 보입니다.",
  "li_202":"<b>하늘의 별.</b> TRAPPIST-1 이 g 의 하늘에서 1.36° 를 차지합니다 (지구에서 본 태양의 2.7 배). 표면 조명은 0.26 S⊕ 로 외곽 화성의 태양 flux 와 비슷합니다. cream 빛 설경 위로 떠 있는 적-오렌지 별이 영구적인 어슴푸레-여명 분위기를 만듭니다.",
  "li_203":"<b>하늘의 자매 행성.</b> f (안쪽 다음) 가 conjunction 시 각 크기 ~0.3°, h (바깥쪽 다음) 가 outer conjunction 시 ~0.2°. 공명 체인 덕에 다중 행성 정렬이 자주 일어납니다.",
  "h2_204":"참고 문헌",
  "h3_205":"읽음 (시각 정보 제공, 위 결정 견인)",
  "li_206":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. g 를 시스템에서 가장 물이 풍부한 행성으로 확립 (wmf 0.11–0.24). 빙하 아래 바다 cfg 의 근거입니다.",
  "li_207":"<b>2412.10192</b> Cherubim 2024 — From CO₂- to H₂O-dominated atmospheres in magma ocean phase. g 의 진화된 대기에 대한 조성 프레임워크를 제공합니다.",
  "li_208":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. 고려된 모든 시나리오에서 g 를 snowball 로 분류합니다. d/e/f phase 3 에서 이미 읽었습니다.",
  "li_209":"<b>2504.19872</b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. 경험적 M-dwarf 대기 retention 선에 대한 g 의 위치를 다룹니다. 얇은 대기는 유지하지만 두꺼운 대기는 어렵다는 결론입니다.",
  "li_210":"<b>1810.05210</b> Moran 2018 — HST haze limits. 안쪽 5 개 행성 (간접적으로 g 포함) 에 대해 cloud-free H₂-rich 를 배제합니다. d Phase 3 에서 이미 읽었습니다.",
  "li_211":"<b>1706.02689</b> Unterborn 2018 — Inward-migration interpretation of TRAPPIST-1 densities. g 와 f 가 ≥50 wt% 물 / 얼음을 가진다고 주장하며, Bourgeois 2024 의 0.24 보다 훨씬 높은 상한을 제시합니다. <code>water_mass_fraction</code> 상한을 0.11–0.50 으로 끌어올린 근거입니다.",
  "li_212":"<b>1903.04501</b> Hay &amp; Matsuyama 2019 — Tides between TRAPPIST-1 planets. g 만 유일하게 조석 가열의 2–20% 를 행성 간 상호작용 (대부분 f) 에서 받고, 다른 행성은 모두 1% 미만입니다. 자전 섹션의 새 문단을 견인합니다.",
  "li_213":"<b>2401.16490</b> Van Looveren 2024 — Airy worlds or barren rocks? Jeans escape 기반의 정량적 대기 탈출. g 의 ~120 F_EUV,⊕ 에서 CO₂ 대기가 1 bar 당 5 Myr 로 손실됩니다. 새로 추가된 &quot;대기 retention caveat&quot; 문단과 대안 cfg 변형의 근거입니다.",
  "li_214":"<b>2506.12140</b> Berardo 2025 — HST multi-year Ly-α monitoring of TRAPPIST-1. L_XUV = 1.83×10²⁸ erg/s 로 개정 (2017 추정치보다 30배 높음). microflare cadence 가 ~10²⁹ erg 당 45 분. 결정 표의 새 XUV / microflare 항목을 견인합니다.",
  "li_215":"<b>1912.05749</b> Hori &amp; Ogihara 2020 — Hydrogen-rich atmosphere origin. g 의 최대 원시 H 대기는 2 wt% 이하이며 수백 Myr 내에 손실됩니다. 현재 대기가 secondary 임을 뒷받침합니다.",
  "h3_216":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_217":"<b>2508.12865</b> Empirical determination of the Cosmic Shoreline. g 의 retention 상태에 대한 맥락입니다.",
  "li_218":"<b>2504.01182</b> Receding Cosmic Shoreline for mid-to-late M dwarfs. TRAPPIST-1 시스템 수준 맥락입니다.",
  "li_219":"<b>2210.02484</b> HZ catalog. g 를 더 넓은 HZ 후보 중 하나로 등재합니다. d 에서 이미 읽었습니다.",
  "li_220":"<b>2006.11349</b> Wunderlich 2020 — Wet/dry e and f. g 는 맥락만. f 에서 이미 읽었습니다.",
  "li_221":"<b>2506.16063</b> Mass-radius plane classification. 카탈로그 맥락만 제공합니다.",
  "h3_222":"읽음 (instrument-only, 시각 정보 아님)",
  "p_223":"(g 에 특화된 것 없음.)",
  "h3_224":"읽지 않음 — arXiv preprint 없음 또는 낮은 우선순위 (~14 편)",
  "p_225":"g 의 참고 문헌은 큰 편입니다 (66 편, 그중 52 편이 arXiv). 다만 대부분이 SETI / technosignature 서베이, mass-radius 카탈로그, 또는 g 를 지나가듯 언급하는 논문입니다.",
  "li_226":"<b>2509.06310</b> Deep SETI search with FAST. 시각 정보 아님.",
  "li_227":"<b>2208.02511</b> SETI drift rate context. 시각 정보 아님.",
  "li_228":"<b>여러 cosmic-shoreline 논문</b> — retention 질문에 대해 집합적으로 읽었으며, 개별 항목은 시각 정보 제공이 아닙니다.",
  "li_229":"<b>TESS / non-TRAPPIST-1 카탈로그 논문</b> — 무관합니다.",
  "p_230":"---",
  "h2_231":"후속 follow-up 항목",
  "li_232":"g 에 대한 직접 JWST 관측은 아직 없습니다. 향후 transmission 또는 emission 스펙트럼이 출판되면 대기 압력 / 조성 표를 재검토할 필요가 있습니다. 특히 g 가 transmission 에서 CO₂ feature 를 보이면 0.05 bar 선택을 더 정교화할 수 있습니다.",
  "li_233":"Cryovolcanism 은 g 에 대해 그럴듯하지만 제약되지 않습니다. 향후 cfg 변형이 Europa-analog 측면 (resurfaced 얼음 patch 가 보이거나, 따뜻한 spot 에서 plume feature 가능) 을 강조하고 싶다면 Phase 3.5 로 구현할 수 있습니다.",
  "li_234":"0.05 bar CO₂ 선택은 &quot;대기 존재&quot; 의 하한 경계입니다. ~0.01 bar 로 내리거나, 완전 무대기 cold-snowball 변형을 위해 0 으로 둘 수도 있습니다.",
  "li_235":"wmf 범위 (0.11–0.24) 는 g 가 해저 hydrothermal 활동을 갖춘 거주 가능 빙하 아래 층을 호스트할 수 있을 만큼 충분히 높습니다 (Europa-Enceladus astrobiology analog). 시각적으로는 관련이 없더라도 Principia 노트에 남길 가치가 있습니다.",
  "title":"TRAPPIST-1 g — Phase 3 Synthesis",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
