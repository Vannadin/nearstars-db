  "h2_220":"Surface synthesis",
  "p_221":"TRAPPIST-1 g sits well outside the conservative habitable zone at 0.26 S⊕. Wolf 2017 §5 finds that even 10 bar CO₂ does not produce a sustained open ocean at g&#x27;s insolation under realistic atmospheric escape constraints — the cold trap is too efficient. Lincowski 2018 similarly classifies g as a snowball in all considered atmospheric compositions.",
  "p_222":"The redeeming geological feature is g&#x27;s very high water mass fraction. Bourgeois 2024 (<a href=\"https://arxiv.org/abs/2008.09599\">2008.09599</a>) finds wmf 0.11–0.24 for g — the highest in the TRAPPIST-1 system, corresponding to 20–50 Earth oceans of water. Most of this resides as a sub-glacial liquid-water ocean (basal-melted by Earth-analog radiogenic heat at the ice-rock interface, ~0.04 W/m²) overlain by a thick (~50–100 km) global ice cover. Cryovolcanism (Europa / Ganymede analog) is plausible but unconstrained.",
  "p_223":"For the surface morphology, the snowball template gives:",
  "li_224":"<b>Substellar to ~30° from substellar:</b> thinnest ice (~30 km) due to slightly elevated insolation; possible tectonic activity from ice-flow toward the colder terminator and nightside.",
  "li_225":"<b>Mid-zone (30–120° from substellar):</b> thick ice (~60 km), smooth at large scale.",
  "li_226":"<b>Terminator (~90°):</b> highest pressure-ridge density, longest topographic shadows.",
  "li_227":"<b>Nightside (&gt;120°):</b> thickest ice (~100 km), with possible CO₂ frost deposits in the coldest regions.",
  "p_228":"<b>Color choice.</b> Clean snow / glacial ice albedo under M-dwarf illumination: warm cream-white <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> primary, with tan-shaded patches <span class=\"hex-chip\" style=\"background:#a09080\"></span><code>#a09080</code> near the terminator from accumulated dust and CO₂ frost cycling.",
  "p_229":"<b>Habitability caveat at upper water mass fraction.</b> Acuña 2021 (<a href=\"https://arxiv.org/abs/2101.08172\">2101.08172</a>) finds that at WMF ≥ 0.14, high-pressure ice phases (HPPs) seal off the rock-water interface in the hydrosphere, preventing nutrient exchange that&#x27;s typically considered necessary for subsurface ocean habitability. At WMF ≥ 0.10, less than 50% of interior configurations enable a habitable sub-surface ocean. g&#x27;s wmf range (0.11–0.50) straddles this threshold — the sub-glacial ocean exists but its habitability potential degrades at the upper bound. For visual cfg this is not a rendering concern, but it&#x27;s worth noting in the Open items as a Principia / astrobiology-relevant flag.",
  "p_230":"<b>Cryovolcanic warm spots as a canonical visual feature.</b> g&#x27;s high water mass fraction (0.11–0.50) combined with radiogenic + tidal heating gives a substantial sub-glacial ocean (basal melt at ~0.04 W/m²) under a thick (50–100 km) ice shell. Europa-Ganymede analog reasoning supports the possibility of cryovolcanism at locations where the ice shell is thinnest — typically over warm-mantle anomalies that allow basal water to reach the surface. Per the interesting-first rule, the cfg promotes cryovolcanic plumes from &quot;possible&quot; to <b>canonical</b>: visible plumes near 2–4 substellar warm spots, each ~50–100 km across, producing fresh-water-ice halos around their venting sites. This is observation-consistent (no direct evidence either way) and dramatically more interesting than a uniform ice surface. The cfg-variant alternative is preserved: a featureless smooth snowball.",
  "p_231":"<b>Bedrock / iron oxide.</b> Essentially none visible — the global ice cover is too thick for any bedrock exposure. Possible exception at extreme terminator ridge tops where pressure-driven thinning could expose dark patches; very low probability and not visible from orbit.",
  "p_232":"<b>Morphology under tidal lock.</b> Ice circulation is gentle due to the minimal insolation gradient (substellar-to-antistellar difference of only ~70 K). Tectonic activity is dominated by basal-melt-driven convection in the ice shell (cf. Europa) rather than by surface sublimation/deposition. The result is a geologically active ice surface with cryovolcanic features at warm spots — visually subtle but distinguishing g from a &quot;dead snowball.&quot;",
  "h2_233":"Atmosphere synthesis",
  "p_234":"No published JWST observations of g exist. The HST haze limit analysis (Moran 2018, <a href=\"https://arxiv.org/abs/1810.05210\">1810.05210</a>) excludes cloud-free hydrogen-rich atmospheres; secondary atmospheres are not constrained by HST.",
  "p_235":"Theoretical models converge:",
  "li_236":"<b>Wolf 2017:</b> full snowball at g&#x27;s insolation; even ~10 bar CO₂ insufficient for liquid water.",
  "li_237":"<b>Lincowski 2018:</b> g classed as &quot;snowball&quot; or &quot;post-runaway O₂-rich&quot; depending on initial water inventory.",
  "li_238":"<b>Bourgeois 2024:</b> magma-ocean phase produces ~10 bar O₂ + CO₂ atmosphere initially; most is lost over the system&#x27;s age via hydrodynamic escape and surface oxidation.",
  "p_239":"For NearStars we adopt <b>0.05 bar CO₂-rich thin atmosphere</b>:",
  "li_240":"<b>Pressure</b> 0.05 bar (5 kPa). Below the threshold needed for cloud formation at g&#x27;s temperatures; thin enough that the surface communicates radiatively with space at most wavelengths. Above 0 because volcanic outgassing without a CO₂ sink (frozen surface → no carbonate-silicate weathering) should accumulate modest CO₂.",
  "li_241":"<b>Composition</b> CO₂-dominated (90%), N₂ (8%), trace H₂O / Ar. CO₂ richness reflects outgassing accumulation; H₂O is trace because of the cold-trap.",
  "li_242":"<b>Clouds.</b> Minimal (~10% global): only CO₂ ice cirrus at the terminator + nightside cold-trap.",
  "p_243":"<b>Caveat — atmosphere retention.</b> Van Looveren 2024 (<a href=\"https://arxiv.org/abs/2401.16490\">2401.16490</a>) finds that at g&#x27;s ~120 F_EUV,⊕ (revised upward from earlier estimates by Berardo 2025 / <a href=\"https://arxiv.org/abs/2506.12140\">2506.12140</a>, who measured L_XUV = 1.83×10²⁸ erg/s, 30× higher than 2017 values), CO₂ atmospheres are lost at roughly <b>1 bar per 5 Myr</b> under Jeans escape alone. Even a 100 × Earth atmosphere would be lost in tens of Myr. The 0.05 bar choice is therefore <b>optimistic</b> and assumes ongoing volcanic replenishment. A 0.01 bar / fully airless variant is preserved as a cfg backup. The stellar microflare cadence (~10²⁹ erg every 45 min, per Berardo 2025 HST Ly-α multi-year monitoring) further stresses retention but does not directly drive the cfg pressure.",
  "p_244":"<b>Turbet equilibrium reference.</b> Turbet 2018 (<a href=\"https://arxiv.org/abs/1707.06927\">1707.06927</a>) explicitly solves the CO₂ atmosphere equilibrium for g: at 150 ± 1 mbar surface pressure and 174 ± 0.1 K, the atmosphere is in stable sublimation-condensation balance. Below this, CO₂ ice covers the surface &quot;potentially as much as the entire surface&quot; and the atmosphere is unstable to collapse. The cfg&#x27;s 0.05 bar choice is below this equilibrium and assumes a non-equilibrium state maintained by continuous volcanic outgassing — physically reasonable but not the natural attractor. An alternative cfg variant could adopt the Turbet equilibrium pressure (0.15 bar) for a more thermodynamically self-consistent atmosphere.",
  "p_245":"<b>Sky appearance.</b> The 0.05 bar atmosphere is barely visible from orbit. From the surface, the sky is near-black with the host star appearing as a deep red-orange disk against the void. CO₂ ice clouds catch grazing light at the terminator as faint cream wisps.",
  "p_246":"<b>GCM cross-check.</b> Fauchez 2019 (<a href=\"https://arxiv.org/abs/1911.08596\">1911.08596</a>) confirms the snowball state for g at all plausible CO₂ pressures ≤10 bar: even at 10 bar CO₂, the planet is &quot;almost fully ice-covered except at a few spots near the substellar region where some water can evaporate from the ocean and form relatively thin clouds (~0.1 kg/m²).&quot; The cfg&#x27;s full-snowball default is well-supported.",
  "p_247":"<b>Aurora geometry over the ice.</b> With a moderate B-field (~0.35 × Earth) and a thin CO₂-rich atmosphere, g hosts Mars-analog auroras at magnetic latitude ~58°. The dominant emission is CO₂⁺ red bands (Fox–Duffendack at ~600 nm), giving a distinctive red auroral band crossing the high-latitude ice. Intensity ~60 kR (~6× Earth) is moderate but visible against the dark snowball surface; cfg renders this as a <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> primary band with optional <span class=\"hex-chip\" style=\"background:#87ceeb\"></span><code>#87CEEB</code> secondary tint where trace nitrogen contributes. The auroral oval is wider than Earth&#x27;s, expanding equatorward toward ~50° during sub-Alfvénic transits; players in equatorial regions can see the aurora as a glow on the northern/southern horizon.",
  "h2_248":"Rotation &amp; spin synthesis",
  "p_249":"Tidal damping at 12.35 days over 7.6 Gyr → synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.00208 — the lowest in the system, deep inside the 3:2 stability boundary (only 1:1 plausible).",
  "p_250":"<b>KSP implementation note.</b> Rotation period = orbital period = 12.3524 days (1 067 251 s).",
  "p_251":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.2% (lowest in system). Substellar point is fixed.",
  "p_252":"<b>Planet-planet tides.</b> Hay &amp; Matsuyama 2019 (<a href=\"https://arxiv.org/abs/1903.04501\">1903.04501</a>) identifies g as the planet that experiences the most significant <b>planet-planet tidal heating relative to its eccentricity-forced tides</b> (2–20% of total, mostly from neighbor f). For all other planets in the system the planet-planet contribution is &lt;1%. The absolute magnitude is still small (~2×10⁻⁷ W/m² surface flux for a Maxwell-body rheology), but the relative dominance of f&#x27;s gravitational influence is unique to g — a faithful annotation for the Principia cfg.",
  "p_253":"<b>Magnetic dynamo expectation.</b> g is the most massive TRAPPIST-1 planet (1.32 M⊕) and has the highest water mass fraction (Bourgeois 2024 + Unterborn 2018), supporting both a metallic core dynamo and possibly a separate hydrosphere convection contribution. RM22 (<a href=\"https://arxiv.org/abs/2203.01065\">2203.01065</a>) scaling places g at ~0.35 × Earth dipole moment despite the 12.4-day slow rotation. Garraffo 2017 finds outer planets less compressed by stellar wind, giving g a relatively well-organized magnetosphere with standoff at ~4 R_p. The Kerbalism cfg assumes closed-magnetosphere radiation belts at 1.5–4 R_p.",
  "h2_254":"Visual styling",
  "li_255":"<b>Global appearance.</b> Near-uniform warm cream-white snowball (<span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code>) with subtle tan tinting near the terminator (<span class=\"hex-chip\" style=\"background:#a09080\"></span><code>#a09080</code>). No obvious &quot;eyeball&quot; feature — no open-water disk. The most visually subdued planet in the system.",
  "li_256":"<b>Substellar region.</b> Slightly more textured / fractured ice due to tectonic ice-flow toward colder zones. Possible cryovolcanic features as bright fresh-ice patches.",
  "li_257":"<b>Mid-zone and terminator.</b> Pressure ridges, crevasses, and long topographic shadows under grazing 2566 K illumination. Terminator is the most photogenic zone.",
  "li_258":"<b>Nightside.</b> Slightly darker cream-tan from CO₂ frost. KSP nightside ambient ≈ 1–3% dayside.",
  "li_259":"<b>Atmosphere haze.</b> Imperceptible from orbit; barely a hairline warm-gray glow (<span class=\"hex-chip\" style=\"background:#403028\"></span><code>#403028</code>) at the limb.",
  "li_260":"<b>Cryovolcanic plumes.</b> 2–4 substellar warm spots produce ~50–100 km-wide plumes of fresh water ice ejected into the thin atmosphere. Each plume forms a bright halo around its vent, visible from orbit as small bright patches against the snowball. Plumes are intermittent (timescales hours-days) so KSP rendering should treat them as static features for fidelity.",
  "li_261":"<b>High-latitude aurora band.</b> A <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> red CO₂⁺ aurora at ~58° magnetic latitude, visible against the dark nightside ice. The aurora intensity peaks during stellar-wind sub-Alfvénic transits (50–80% of each orbit per Garraffo 2017).",
  "li_262":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.36° in g&#x27;s sky (2.7× the Sun from Earth). Surface illumination is 0.26 S⊕ — comparable to outer Mars&#x27;s solar flux. The red-orange star against the cream snowscape gives a permanent dim-dawn quality. Stellar surface heterogeneity matters for the realistic sky tint. Wakeford 2019 (<a href=\"https://arxiv.org/abs/1811.04877\">1811.04877</a>) finds a 3-temperature spot model best fits TRAPPIST-1: 64% photosphere at 2400 K, 35% spot coverage at 3000 K, 1% facula at 5825 K. The dominant disk color is set by the 2400 K cool photosphere (already cfg&#x27;s <span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span> value of 2566 K from Agol 2021); the 35% 3000 K coverage adds a subtle yellow-orange overtone to the disk at high resolution.",
  "li_263":"<b>Sister planets in sky.</b> f (next inward) at angular size ~0.3° in conjunction; h (next outward) at ~0.2° at outer conjunction. Resonant chain ensures frequent multi-planet alignments.",
  "h2_264":"Bibliography",
  "h3_265":"Read (visual-informative, drove decisions above)",
  "li_266":"<b><a href=\"https://arxiv.org/abs/2008.09599\">2008.09599</a></b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Establishes g as the most water-rich planet in the system (wmf 0.11–0.24). Drives the sub-glacial ocean cfg.",
  "li_267":"<b><a href=\"https://arxiv.org/abs/2412.10192\">2412.10192</a></b> Cherubim 2024 — From CO₂- to H₂O-dominated atmospheres in magma ocean phase. Provides composition framework for g&#x27;s evolved atmosphere.",
  "li_268":"<b><a href=\"https://arxiv.org/abs/1809.07498\">1809.07498</a></b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. g classified as snowball in all considered scenarios. Already read for d/e/f phase 3.",
  "li_269":"<b><a href=\"https://arxiv.org/abs/2504.19872\">2504.19872</a></b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. g&#x27;s position relative to the empirical M-dwarf atmospheric retention line: likely retains a thin atmosphere but not a thick one.",
  "li_270":"<b><a href=\"https://arxiv.org/abs/1810.05210\">1810.05210</a></b> Moran 2018 — HST haze limits. Rejects cloud-free H₂-rich for inner 5 planets (including g indirectly). Already read for d Phase 3.",
  "li_271":"<b><a href=\"https://arxiv.org/abs/1706.02689\">1706.02689</a></b> Unterborn 2018 — Inward-migration interpretation of TRAPPIST-1 densities. Argues g and f have ≥50 wt% water/ice — a much higher water-content upper bound than Bourgeois 2024&#x27;s 0.24. Drives the upward revision of <span class=\"field-tt\" data-ko-tip=\"물 질량 분율. 지구 ≈ 0.0002.\" data-en-tip=\"Water mass fraction of the planet. Earth ≈ 0.0002.\"><code>water_mass_fraction</code></span> to 0.11–0.50.",
  "li_272":"<b><a href=\"https://arxiv.org/abs/1903.04501\">1903.04501</a></b> Hay &amp; Matsuyama 2019 — Tides between TRAPPIST-1 planets. g uniquely receives 2–20% of its tidal heating from planet-planet interactions (mostly f); all other planets &lt;1%. Drives the new Rotation section paragraph.",
  "li_273":"<b><a href=\"https://arxiv.org/abs/2401.16490\">2401.16490</a></b> Van Looveren 2024 — Airy worlds or barren rocks? Quantitative atmospheric escape under Jeans escape. At g&#x27;s ~120 F_EUV,⊕, CO₂ atmospheres are lost at ~1 bar per 5 Myr. Drives the new &quot;atmosphere retention caveat&quot; paragraph and the alternative cfg variants.",
  "li_274":"<b><a href=\"https://arxiv.org/abs/2506.12140\">2506.12140</a></b> Berardo 2025 — HST multi-year Ly-α monitoring of TRAPPIST-1. Revised L_XUV = 1.83×10²⁸ erg/s (30× higher than 2017 estimates). Microflare cadence ~10²⁹ erg every 45 min. Drives the new XUV and microflare entries in the decisions table.",
  "li_275":"<b><a href=\"https://arxiv.org/abs/1912.05749\">1912.05749</a></b> Hori &amp; Ogihara 2020 — Hydrogen-rich atmosphere origin. g&#x27;s maximum primordial H atmosphere ≤ 2 wt%, lost within several 100 Myr. Confirms the present-day atmosphere is secondary.",
  "li_276":"<b><a href=\"https://arxiv.org/abs/1707.06927\">1707.06927</a></b> Turbet 2018 — Climate diversity modeling for TRAPPIST-1 planets. Drives the atmosphere equilibrium reference (150 mbar at 174 K for pure CO₂ on g) and confirms the snowball state at all plausible pressures.",
  "li_277":"<b><a href=\"https://arxiv.org/abs/2101.08172\">2101.08172</a></b> Acuña 2021 — Hydrosphere characterization. Validates g&#x27;s sub-glacial ocean architecture (ice Ih over high-pressure ices over rocky mantle). Identifies the WMF ≥ 0.14 habitability threshold (HPPs seal off rock-water interface).",
  "li_278":"<b><a href=\"https://arxiv.org/abs/1911.08596\">1911.08596</a></b> Fauchez 2019 — Clouds and hazes modeling. Confirms g&#x27;s snowball state even at 10 bar CO₂; only minimal substellar cloud formation.",
  "li_279":"<b><a href=\"https://arxiv.org/abs/1811.04877\">1811.04877</a></b> Wakeford 2019 — HST transmission of g + 3-temperature stellar model. Provides the canonical spot-coverage values (64:35:1 at 2400/3000/5825 K). Refines stellar sky color predictions.",
  "li_280":"<b><a href=\"https://arxiv.org/abs/1706.04617\">1706.04617</a></b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. Outer-planet magnetopause geometry.",
  "li_281":"<b><a href=\"https://arxiv.org/abs/2203.01065\">2203.01065</a></b> RM22 — Rocky-planet dynamo scaling for tidally-locked.",
  "li_282":"<b><a href=\"https://arxiv.org/abs/1910.09871\">1910.09871</a></b> Atri 2019 — Surface-dose tables for g.",
  "h3_283":"Read (context / methodology, not decision-driving)",
  "li_284":"<b><a href=\"https://arxiv.org/abs/2508.12865\">2508.12865</a></b> Empirical determination of the Cosmic Shoreline. Context for g&#x27;s retention status.",
  "li_285":"<b><a href=\"https://arxiv.org/abs/2504.01182\">2504.01182</a></b> Receding Cosmic Shoreline for mid-to-late M dwarfs. TRAPPIST-1 system-level context.",
  "li_286":"<b><a href=\"https://arxiv.org/abs/2210.02484\">2210.02484</a></b> HZ catalog. Lists g as one of the wider-HZ candidates. Already read for d.",
  "li_287":"<b><a href=\"https://arxiv.org/abs/2006.11349\">2006.11349</a></b> Wunderlich 2020 — Wet/dry e and f. g context only. Already read for f.",
  "li_288":"<b><a href=\"https://arxiv.org/abs/2506.16063\">2506.16063</a></b> Mass-radius plane classification. Catalog context only.",
  "h3_289":"Read (instrument-only, not visual-informative)",
  "p_290":"(None specific to g.)",
  "h3_291":"Not read — no arXiv preprint or low-priority (~14 papers)",
  "p_292":"The g bibliography is large (66 papers, 52 with arXiv) but most papers are SETI / technosignature surveys, mass-radius catalogs, or works that mention g only in passing.",
  "li_293":"<b><a href=\"https://arxiv.org/abs/2509.06310\">2509.06310</a></b> Deep SETI search with FAST. Not visual.",
  "li_294":"<b><a href=\"https://arxiv.org/abs/2208.02511\">2208.02511</a></b> SETI drift rate context. Not visual.",
  "li_295":"<b>Multiple cosmic-shoreline papers</b> — collectively read for the retention question; individual entries not visual-informative.",
  "li_296":"<b>TESS / non-TRAPPIST-1 catalog papers</b> — irrelevant.",
  "p_297":"---",
  "h2_298":"Open items for follow-up",
  "li_299":"No direct JWST observation of g exists yet; if a future transmission or emission spectrum is published, the atmosphere pressure / composition table should be revisited. Particularly if g shows any CO₂ feature in transmission, the 0.05 bar choice could be refined.",
  "li_300":"Cryovolcanism is plausible but unconstrained for g. If a future cfg variant wants to emphasize the Europa-analog aspect (visible resurfaced ice patches, possible plume features at warm spots), it could be implemented as Phase 3.5.",
  "li_301":"The 0.05 bar CO₂ choice is at the lower edge of &quot;atmosphere present&quot; — could be reduced to ~0.01 bar or set to zero for a fully airless cold-snowball variant.",
  "li_302":"The wmf range (0.11–0.24) is high enough that g could plausibly host an habitable sub-glacial layer with hydrothermal activity at the seafloor (Europa-Enceladus astrobiology analog). Worth a Principia note even if not visually relevant.",
  "li_303":"The 0.05 bar atmosphere is below the Turbet equilibrium 150 mbar. A cfg variant at 0.15 bar would be more thermodynamically natural. Choice depends on whether NearStars prefers &quot;active outgassing equilibrium&quot; (Turbet) or &quot;atmosphere just hanging on against escape&quot; (current).",
  "li_304":"WMF upper-bound habitability constraint: at 0.14+, HPPs seal off mantle-ocean exchange. If the Principia-side astrobiology pass cares about habitability, flag g as marginal at the upper bound.",
  "li_305":"JWST GO 2589 observed g for flare characterization (per Burdanov 2025 / <a href=\"https://arxiv.org/abs/2512.04265\">2512.04265</a>) but no atmosphere retrieval has been published. Worth re-checking arXiv periodically for follow-up papers.",
  "li_306":"<b>Cfg variant: uniform smooth snowball.</b> Preserved as alternative — for users who prefer the no-active-features reading. The cryovolcanic-plumes canonical version was chosen per interesting-first rule.",
  "li_307":"Surface radiation dose ~5 Sv/yr places g in Kerbalism&#x27;s &quot;moderate-to-high&quot; radiation bracket. With substantial ice shielding (50 g/cm² atmospheric + ~30 m of ice), interior habitats (under the ice) would actually be among the safest in the system.",
  "h2_308":"Related",

  ko: {
  "p_1":"TRAPPIST-1 g 는 M8V ultra-cool dwarf 를 12.35 일 주기로 도는 1.13 R⊕, 1.32 M⊕ 의 암석 행성입니다. 안쪽에서 여섯 번째 행성으로 지구 일사량의 0.26 배를 받으며, 보수적 거주 가능 영역에서는 한참 바깥쪽에 놓여 있습니다. TRAPPIST-1 행성 중 크기가 가장 크고, 물 함량도 가장 높은 축에 듭니다. Bourgeois 2024 (<a href=\"https://arxiv.org/abs/2008.09599\">2008.09599</a>) 의 magma-ocean 진화 결과는 water mass fraction 을 0.11–0.24 로 산출했는데, 이는 시스템 내 최고치입니다. 2026-05-22 기준 g 에 대한 JWST 관측은 아직 출판된 바 없으며, 관측적 그림은 HST haze 한계 (Moran 2018) 와 이론적 기후 모델링 (Lincowski 2018, Wolf 2017) 이 주도하고 있습니다.",
  "p_2":"<b>NearStars 시나리오 선택은 매우 얇은 CO₂ 대기 (~0.05 bar) 를 가진 전역 빙결 ocean world 입니다. substellar 개방 수역은 없고, 빙하 아래에 액체 물 바다가 존재합니다.</b> 차가운 outer-HZ 행성에 대한 정석적인 snowball 혹은 &quot;ocean world&quot; 시나리오에 해당합니다. CO₂ 온실효과를 강하게 올려도 g 의 일사량으로는 표면 액체 물을 유지할 수 없으며, Wolf 2017 §5 가 ~0.3 S⊕ 이하에서 완전 snowball 이 된다는 것을 보였습니다. 두꺼운 전역 얼음 피복 아래에는 radiogenic heat 에 의한 basal melting 으로 유지되는 상당한 규모의 빙하 아래 액체 물 층이 숨어 있습니다.",

  "td_217":"2566",

  "td_219":"Agol 2021 SED fit",
  "h2_220":"표면 합성",
  "p_221":"TRAPPIST-1 g 는 0.26 S⊕ 에서 보수적 거주 가능 영역을 한참 벗어난 자리에 있습니다. Wolf 2017 §5 는 현실적인 대기 탈출 제약 아래에서는 10 bar CO₂ 조차도 g 의 일사량에서 지속적인 개방 수역을 만들지 못한다고 봅니다. cold trap 이 너무 효율적이기 때문입니다. Lincowski 2018 도 고려한 모든 대기 조성에서 g 를 snowball 로 분류합니다.",
  "p_222":"g 를 구해 주는 지질학적 특징은 매우 높은 water mass fraction 입니다. Bourgeois 2024 (<a href=\"https://arxiv.org/abs/2008.09599\">2008.09599</a>) 가 g 에 대해 wmf 0.11–0.24 를 산출했고, 이는 TRAPPIST-1 시스템에서 최고치로 지구 바다의 20–50 배에 해당합니다. 이 물의 대부분은 빙하 아래 액체 물 바다로 존재하는데, 얼음-암석 경계에서 지구와 유사한 radiogenic heat (~0.04 W/m²) 가 basal-melt 를 일으키고 그 위를 두꺼운 (~50–100 km) 전역 얼음 피복이 덮고 있습니다. Cryovolcanism (Europa 와 Ganymede analog) 도 그럴듯하지만 아직 제약은 없습니다.",
  "p_223":"표면 모양에 대해 snowball template 이 다음을 줍니다.",
  "li_224":"<b>Substellar 에서 substellar 기준 ~30° 까지.</b> 일사량이 약간 더 높아 얼음이 가장 얇고 (~30 km), 더 차가운 terminator 와 nightside 쪽으로 흐르는 얼음 흐름에서 tectonic 활동이 가능합니다.",
  "li_225":"<b>중간 구역 (substellar 에서 30–120°).</b> 두꺼운 얼음 (~60 km), 큰 스케일에서는 평활합니다.",
  "li_226":"<b>Terminator (~90°).</b> pressure-ridge 밀도가 가장 높고, 지형 그림자도 가장 깁니다.",
  "li_227":"<b>Nightside (&gt;120°).</b> 얼음이 가장 두껍고 (~100 km), 가장 차가운 영역에는 CO₂ 서리 퇴적이 있을 수 있습니다.",
  "p_228":"<b>색 선택.</b> M-dwarf 조명 아래에서 깨끗한 눈과 빙하 얼음의 알베도를 반영합니다. primary 는 따뜻한 cream-white <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code>, terminator 근처에는 누적된 먼지와 CO₂ 서리 사이클로 tan-shaded patch <span class=\"hex-chip\" style=\"background:#a09080\"></span><code>#a09080</code> 가 들어갑니다.",
  "p_229":"<b>상한 water mass fraction 에서의 거주 가능성 caveat.</b> Acuña 2021 (<a href=\"https://arxiv.org/abs/2101.08172\">2101.08172</a>) 는 WMF ≥ 0.14 에서 high-pressure ice phase (HPP) 가 hydrosphere 의 암석-물 경계를 봉인해 버려, 빙하 아래 바다의 거주 가능성에 일반적으로 필수로 여겨지는 영양분 교환이 차단된다는 사실을 보였습니다. WMF ≥ 0.10 에서는 내부 구성의 50% 미만만이 거주 가능한 sub-surface ocean 을 허용합니다. g 의 wmf 범위 (0.11–0.50) 가 정확히 이 임계를 가로지르고 있어, 빙하 아래 바다는 존재하지만 상한에서는 거주 가능 잠재력이 떨어집니다. 시각 cfg 입장에서는 렌더링상의 문제가 아니지만, Principia / astrobiology 관점의 플래그로서 Open items 에 적어 둘 가치가 있습니다.",
  "p_230":"<b>Cryovolcanism 따뜻한 spot 을 캐노니컬 시각 feature 로.</b> g 의 높은 water mass fraction (0.11–0.50) 과 radiogenic + 조석 가열이 결합되어, 두꺼운 (50–100 km) 얼음 껍데기 아래에 상당한 빙하 아래 바다가 존재합니다 (~0.04 W/m² 의 basal melt). Europa-Ganymede analog 추론은 얼음 껍데기가 가장 얇은 위치 — 일반적으로 warm-mantle anomaly 위 — 에서 cryovolcanism 가능성을 뒷받침합니다. 그런 자리에서는 basal water 가 표면까지 도달할 수 있습니다. interesting-first 룰 원칙에 따라, cfg 는 cryovolcanic 분출을 &quot;가능&quot;에서 <b>canonical</b> 로 격상시킵니다. 2–4 개의 substellar 따뜻한 spot 근처에 가시 분출이 자리하고, 각각 폭 ~50–100 km 규모로 분출구 주변에 신선한 물-얼음 halo 를 만듭니다. 관측에 모순되지 않고 (어느 쪽도 직접 증거는 없음), 균일한 얼음 표면보다 극적으로 더 흥미롭습니다. cfg-variant 대안은 보존됩니다. 특징 없는 매끈한 snowball 입니다.",
  "p_231":"<b>Bedrock 과 산화철.</b> 사실상 보이지 않습니다. 전역 얼음 피복이 너무 두꺼워 bedrock 노출이 일어날 수 없습니다. 압력으로 얇아져 어두운 patch 가 드러날 수 있는 극단적 terminator ridge 꼭대기 정도가 예외일 수 있는데, 확률이 매우 낮고 궤도에서는 보이지 않습니다.",
  "p_232":"<b>조석 lock 아래의 모양.</b> 일사량 기울기가 최소 (substellar 와 antistellar 의 차이 ~70 K) 이라 얼음 순환이 부드럽습니다. tectonic 활동은 표면 승화 / 퇴적이 아니라 얼음 껍데기의 basal-melt-driven convection (cf. Europa) 이 주도합니다. 결과적으로 따뜻한 spot 에서 cryovolcanic feature 가 생기는 지질학적으로 활성인 얼음 표면이 됩니다. 시각적으로는 미묘하지만, &quot;죽은 snowball&quot; 과는 구분되는 인상을 줍니다.",
  "h2_233":"대기 합성",
  "p_234":"g 에 대해 출판된 JWST 관측은 없습니다. HST haze 한계 분석 (Moran 2018, <a href=\"https://arxiv.org/abs/1810.05210\">1810.05210</a>) 이 cloud-free 수소-rich 대기를 배제하지만, secondary 대기는 HST 로 제약되지 않습니다.",
  "p_235":"이론 모델들은 다음으로 수렴합니다.",
  "li_236":"<b>Wolf 2017.</b> g 의 일사량에서 완전 snowball. ~10 bar CO₂ 도 액체 물에 불충분합니다.",
  "li_237":"<b>Lincowski 2018.</b> g 는 초기 water inventory 에 따라 &quot;snowball&quot; 혹은 &quot;post-runaway O₂-rich&quot; 로 분류됩니다.",
  "li_238":"<b>Bourgeois 2024.</b> magma-ocean 페이즈에서 초기 ~10 bar O₂ + CO₂ 대기를 생성하지만, 대부분은 시스템 수명 동안 hydrodynamic escape 와 표면 산화로 손실됩니다.",
  "p_239":"NearStars 는 <b>0.05 bar CO₂-rich 얇은 대기</b>를 채택합니다.",
  "li_240":"<b>압력</b> 0.05 bar (5 kPa). g 의 온도에서 구름 형성에 필요한 임계값 아래이며, 표면이 대부분 파장에서 우주와 복사적으로 직접 소통할 정도로 얇습니다. 그래도 0 보다 큰 이유는, 얼어붙은 표면 탓에 carbonate-silicate weathering 이 작동하지 않아 화산 outgassing 으로 CO₂ 가 어느 정도 누적되어야 하기 때문입니다.",
  "li_241":"<b>조성</b> CO₂ 지배 (90%), N₂ (8%), 미량 H₂O 와 Ar. CO₂ 가 풍부한 것은 outgassing 누적을 반영하고, H₂O 는 cold-trap 때문에 미량입니다.",
  "li_242":"<b>구름.</b> 최소 (~10% 전역). terminator 와 nightside cold-trap 의 CO₂ 얼음 cirrus 정도입니다.",
  "p_243":"<b>Caveat — 대기 retention.</b> Van Looveren 2024 (<a href=\"https://arxiv.org/abs/2401.16490\">2401.16490</a>) 에 따르면 g 의 ~120 F_EUV,⊕ (Berardo 2025 / <a href=\"https://arxiv.org/abs/2506.12140\">2506.12140</a> 이 L_XUV = 1.83×10²⁸ erg/s 로 2017 값보다 30배 높게 개정) 아래에서는 Jeans escape 만으로도 CO₂ 대기가 <b>1 bar 당 5 Myr</b> 수준으로 손실됩니다. 100 × 지구 대기조차도 수십 Myr 안에 잃게 됩니다. 따라서 0.05 bar 선택은 <b>낙관적인</b> 값이며, 화산 보충이 계속된다는 가정을 깔고 있습니다. 0.01 bar 또는 완전 무대기 변형은 cfg 백업으로 보존해 둡니다. 별의 microflare cadence (~10²⁹ erg 가 45 분마다, Berardo 2025 의 HST Ly-α 다년 모니터링) 도 retention 을 더 압박하지만, cfg 압력을 직접 결정하지는 않습니다.",
  "p_244":"<b>Turbet 평형 기준.</b> Turbet 2018 (<a href=\"https://arxiv.org/abs/1707.06927\">1707.06927</a>) 은 g 에 대해 CO₂ 대기 equilibrium 을 명시적으로 풀어, 150 ± 1 mbar 표면 압력 및 174 ± 0.1 K 에서 대기가 안정한 승화-응결 평형 상태에 있음을 보였습니다. 이보다 낮으면 CO₂ 얼음이 표면을 &quot;전체 표면 수준까지 덮을 수 있고&quot;, 대기는 붕괴를 향해 불안정해집니다. cfg 의 0.05 bar 선택은 이 평형 아래에 있으며, 지속적인 화산 outgassing 으로 유지되는 비평형 상태를 가정합니다. 물리적으로는 타당하지만 자연스러운 끌개는 아닙니다. 다른 cfg 변형으로 Turbet 평형 압력 (0.15 bar) 을 채택하면, 열역학적으로 더 자기일관적인 대기가 됩니다.",
  "p_245":"<b>하늘 외관.</b> 0.05 bar 대기는 궤도에서 거의 보이지 않습니다. 표면에서 하늘은 거의 검고, 호스트 별이 공허를 배경으로 깊은 적-오렌지 디스크로 떠 있습니다. CO₂ 얼음 구름은 terminator 에서 비스듬한 빛을 받아 옅은 cream wisp 로 보입니다.",
  "p_246":"<b>GCM 교차 검증.</b> Fauchez 2019 (<a href=\"https://arxiv.org/abs/1911.08596\">1911.08596</a>) 는 g 에 대해 ≤10 bar 의 모든 그럴듯한 CO₂ 압력에서 snowball 상태를 확인했습니다. 10 bar CO₂ 에서도 행성은 &quot;substellar 영역 근처 몇몇 spot 을 빼면 거의 완전히 얼음 으로 덮여 있고, 그 spot 에서만 약간의 물이 바다에서 증발해 비교적 얇은 구름 (~0.1 kg/m²) 을 만든다&quot; 고 합니다. cfg 의 완전 snowball 기본값은 잘 뒷받침됩니다.",
  "p_247":"<b>얼음 위 오로라 기하.</b> 적당한 자기장 (~지구의 0.35 배) 과 얇은 CO₂-rich 대기 조합으로, g 는 자기 위도 ~58° 에 Mars-analog 오로라를 띄웁니다. 지배 발광은 CO₂⁺ 적색 밴드 (Fox–Duffendack ~600 nm) 로, 고위도 얼음을 가로지르는 독특한 적색 오로라 띠를 만듭니다. 강도는 ~60 kR (지구의 약 6배) 로 적당한 수준이지만, 어두운 snowball 표면 위에서는 충분히 보입니다. cfg 는 이를 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> primary 띠로 렌더링하고, 미량의 질소가 기여하는 자리에는 <span class=\"hex-chip\" style=\"background:#87ceeb\"></span><code>#87CEEB</code> secondary tint 를 선택적으로 얹습니다. 오로라 oval 은 지구보다 넓고, sub-Alfvénic 통과 동안 적도 쪽으로 ~50° 까지 확장됩니다. 적도 부근 플레이어는 북쪽/남쪽 지평선 위로 글로우처럼 번지는 오로라를 볼 수 있습니다.",
  "h2_248":"자전과 spin 합성",
  "p_249":"12.35 일 주기에서 7.6 Gyr 의 조석 damping 을 거쳐 동기 (1:1) 구성에 도달했습니다. 황도 경사각은 0 으로 damping 되었습니다. 이심률은 0.00208 으로 시스템 최저이며, 3:2 안정 경계의 한참 안쪽이라 1:1 만 그럴듯합니다.",
  "p_250":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 12.3524 일 (1 067 251 s).",
  "p_251":"<b>계절 없음.</b> 황도 경사각 = 0. libration 으로 인한 일사량 변동은 0.2% 미만으로 시스템 최저이며, substellar 점은 고정됩니다.",
  "p_252":"<b>Planet-planet tides.</b> Hay &amp; Matsuyama 2019 (<a href=\"https://arxiv.org/abs/1903.04501\">1903.04501</a>) 는 g 가 이심률 강제 조석 대비 <b>planet-planet 조석 가열의 비중이 가장 큰</b> 행성이라고 지적합니다 (전체의 2–20%, 대부분이 이웃 f 의 기여). 시스템의 다른 행성은 모두 planet-planet 기여가 1% 미만입니다. 절대값 자체는 여전히 작지만 (Maxwell rheology 기준 표면 flux ~2×10⁻⁷ W/m²), f 중력 영향의 상대적 지배는 g 만의 특징이며, Principia cfg 에 충실히 표기해 둘 만한 사실입니다.",
  "p_253":"<b>자기 dynamo 기대값.</b> g 는 TRAPPIST-1 행성 중 질량이 가장 크고 (1.32 M⊕), water mass fraction 도 가장 높아서 (Bourgeois 2024 + Unterborn 2018), 금속 core dynamo 와 별도의 hydrosphere convection 기여 둘 다 뒷받침합니다. RM22 (<a href=\"https://arxiv.org/abs/2203.01065\">2203.01065</a>) 스케일링은 g 를 ~지구의 0.35 배 dipole moment 에 놓는데, 12.4 일의 느린 자전에도 불구하고 그렇습니다. Garraffo 2017 은 외곽 행성이 항성풍에 덜 압축됨을 보였고, 이에 따라 g 는 standoff 가 ~4 R_p 인 비교적 잘 정돈된 magnetosphere 를 갖습니다. Kerbalism cfg 는 1.5–4 R_p 의 닫힌 magnetosphere radiation belt 를 가정합니다.",
  "h2_254":"비주얼 스타일",
  "li_255":"<b>전역 외관.</b> terminator 근처에 미묘한 tan tinting (<span class=\"hex-chip\" style=\"background:#a09080\"></span><code>#a09080</code>) 이 도는, 거의 균일한 따뜻한 cream-white snowball (<span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code>). 뚜렷한 &quot;eyeball&quot; feature 는 없습니다. 개방 수역 디스크도 없고, 시스템에서 시각적으로 가장 차분한 행성입니다.",
  "li_256":"<b>Substellar 영역.</b> 더 차가운 영역으로 흐르는 tectonic ice-flow 때문에 얼음이 약간 더 텍스처화되고 균열이 보입니다. 밝은 신선-얼음 patch 로 나타나는 cryovolcanic feature 도 가능합니다.",
  "li_257":"<b>중간 구역과 terminator.</b> 비스듬한 2566 K 조명 아래의 pressure ridge, crevasse, 긴 지형 그림자. terminator 가 가장 사진발이 좋은 구역입니다.",
  "li_258":"<b>Nightside.</b> CO₂ 서리 때문에 약간 더 어두운 cream-tan. KSP nightside ambient 는 dayside 의 1–3% 수준입니다.",
  "li_259":"<b>Atmosphere haze.</b> 궤도에서는 거의 인지 불가. limb 에 hairline 굵기의 따뜻한-회색 glow (<span class=\"hex-chip\" style=\"background:#403028\"></span><code>#403028</code>) 정도만 보입니다.",
  "li_260":"<b>Cryovolcanic 분출.</b> 2–4 개의 substellar 따뜻한 spot 이 얇은 대기로 폭 ~50–100 km 규모의 신선한 물-얼음 분출을 쏘아 올립니다. 각 분출은 vent 주위로 밝은 halo 를 만들며, 궤도에서는 snowball 을 배경으로 작은 밝은 patch 처럼 보입니다. 분출은 간헐적이지만 (시간-일 단위 변동) KSP 렌더링은 충실성을 위해 정적 feature 로 다루는 편이 낫습니다.",
  "li_261":"<b>고위도 오로라 띠.</b> 자기 위도 ~58° 의 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> 적색 CO₂⁺ 오로라가 어두운 nightside 얼음 위에 떠 있습니다. 오로라 강도는 항성풍 sub-Alfvénic 통과 동안 정점에 달합니다 (Garraffo 2017 기준, 매 궤도의 50–80%).",
  "li_262":"<b>하늘의 별.</b> TRAPPIST-1 이 g 의 하늘에서 1.36° 를 차지합니다 (지구에서 본 태양의 2.7 배). 표면 조명은 0.26 S⊕ 로 외곽 화성의 태양 flux 와 비슷합니다. cream 빛 설경 위로 떠 있는 적-오렌지 별이 영구적인 어슴푸레-여명 분위기를 만듭니다. 사실적인 하늘 색조를 위해서는 항성 표면의 비균질성도 중요합니다. Wakeford 2019 (<a href=\"https://arxiv.org/abs/1811.04877\">1811.04877</a>) 는 TRAPPIST-1 에 가장 잘 맞는 모델로 3-온도 spot 모델을 제시했는데, photosphere 64% 가 2400 K, spot coverage 35% 가 3000 K, facula 1% 가 5825 K 입니다. 지배적인 디스크 색은 2400 K 의 차가운 photosphere 가 결정하며 (cfg 의 <span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span> 값 2566 K 가 Agol 2021 기반으로 이미 반영), 35% 의 3000 K 영역이 고해상도에서 디스크에 옅은 노랑-오렌지 overtone 을 더합니다.",
  "li_263":"<b>하늘의 자매 행성.</b> f (안쪽 다음) 가 conjunction 시 각 크기 ~0.3°, h (바깥쪽 다음) 가 outer conjunction 시 ~0.2°. 공명 체인 덕에 다중 행성 정렬이 자주 일어납니다.",
  "h2_264":"참고 문헌",
  "h3_265":"읽음 (시각 정보 제공, 위 결정 견인)",
  "li_266":"<b><a href=\"https://arxiv.org/abs/2008.09599\">2008.09599</a></b> Bourgeois 2024 — Magma ocean evolution for e/f/g. g 를 시스템에서 가장 물이 풍부한 행성으로 확립 (wmf 0.11–0.24). 빙하 아래 바다 cfg 의 근거입니다.",
  "li_267":"<b><a href=\"https://arxiv.org/abs/2412.10192\">2412.10192</a></b> Cherubim 2024 — From CO₂- to H₂O-dominated atmospheres in magma ocean phase. g 의 진화된 대기에 대한 조성 프레임워크를 제공합니다.",
  "li_268":"<b><a href=\"https://arxiv.org/abs/1809.07498\">1809.07498</a></b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. 고려된 모든 시나리오에서 g 를 snowball 로 분류합니다. d/e/f phase 3 에서 이미 읽었습니다.",
  "li_269":"<b><a href=\"https://arxiv.org/abs/2504.19872\">2504.19872</a></b> Castan-Lopez 2025 — Cosmic Shoreline Revisited. 경험적 M-dwarf 대기 retention 선에 대한 g 의 위치를 다룹니다. 얇은 대기는 유지하지만 두꺼운 대기는 어렵다는 결론입니다.",
  "li_270":"<b><a href=\"https://arxiv.org/abs/1810.05210\">1810.05210</a></b> Moran 2018 — HST haze limits. 안쪽 5 개 행성 (간접적으로 g 포함) 에 대해 cloud-free H₂-rich 를 배제합니다. d Phase 3 에서 이미 읽었습니다.",
  "li_271":"<b><a href=\"https://arxiv.org/abs/1706.02689\">1706.02689</a></b> Unterborn 2018 — Inward-migration interpretation of TRAPPIST-1 densities. g 와 f 가 ≥50 wt% 물 / 얼음을 가진다고 주장하며, Bourgeois 2024 의 0.24 보다 훨씬 높은 상한을 제시합니다. <span class=\"field-tt\" data-ko-tip=\"물 질량 분율. 지구 ≈ 0.0002.\" data-en-tip=\"Water mass fraction of the planet. Earth ≈ 0.0002.\"><code>water_mass_fraction</code></span> 상한을 0.11–0.50 으로 끌어올린 근거입니다.",
  "li_272":"<b><a href=\"https://arxiv.org/abs/1903.04501\">1903.04501</a></b> Hay &amp; Matsuyama 2019 — Tides between TRAPPIST-1 planets. g 만 유일하게 조석 가열의 2–20% 를 행성 간 상호작용 (대부분 f) 에서 받고, 다른 행성은 모두 1% 미만입니다. 자전 섹션의 새 문단을 견인합니다.",
  "li_273":"<b><a href=\"https://arxiv.org/abs/2401.16490\">2401.16490</a></b> Van Looveren 2024 — Airy worlds or barren rocks? Jeans escape 기반의 정량적 대기 탈출. g 의 ~120 F_EUV,⊕ 에서 CO₂ 대기가 1 bar 당 5 Myr 로 손실됩니다. 새로 추가된 &quot;대기 retention caveat&quot; 문단과 대안 cfg 변형의 근거입니다.",
  "li_274":"<b><a href=\"https://arxiv.org/abs/2506.12140\">2506.12140</a></b> Berardo 2025 — HST multi-year Ly-α monitoring of TRAPPIST-1. L_XUV = 1.83×10²⁸ erg/s 로 개정 (2017 추정치보다 30배 높음). microflare cadence 가 ~10²⁹ erg 당 45 분. 결정 표의 새 XUV / microflare 항목을 견인합니다.",
  "li_275":"<b><a href=\"https://arxiv.org/abs/1912.05749\">1912.05749</a></b> Hori &amp; Ogihara 2020 — Hydrogen-rich atmosphere origin. g 의 최대 원시 H 대기는 2 wt% 이하이며 수백 Myr 내에 손실됩니다. 현재 대기가 secondary 임을 뒷받침합니다.",
  "li_276":"<b><a href=\"https://arxiv.org/abs/1707.06927\">1707.06927</a></b> Turbet 2018 — TRAPPIST-1 행성에 대한 climate diversity 모델링. g 의 대기 평형 기준 (순수 CO₂ 에 대해 174 K 에서 150 mbar) 을 견인하며, 그럴듯한 모든 압력에서 snowball 상태임을 확인합니다.",
  "li_277":"<b><a href=\"https://arxiv.org/abs/2101.08172\">2101.08172</a></b> Acuña 2021 — Hydrosphere 특성화. g 의 빙하 아래 바다 구조 (ice Ih 위에 high-pressure ice, 그 아래 암석 mantle) 를 검증합니다. WMF ≥ 0.14 의 거주 가능성 임계 (HPP 가 암석-물 경계를 봉인) 를 식별합니다.",
  "li_278":"<b><a href=\"https://arxiv.org/abs/1911.08596\">1911.08596</a></b> Fauchez 2019 — Clouds and hazes 모델링. g 가 10 bar CO₂ 에서조차 snowball 상태임을 확인하고, substellar 부근에만 최소한의 구름이 형성된다고 밝힙니다.",
  "li_279":"<b><a href=\"https://arxiv.org/abs/1811.04877\">1811.04877</a></b> Wakeford 2019 — g 의 HST transmission 과 3-온도 항성 모델. 정석적인 spot-coverage 값 (2400/3000/5825 K 에서 64:35:1) 을 제공합니다. 별 하늘 색 예측을 정교화합니다.",
  "li_280":"<b><a href=\"https://arxiv.org/abs/1706.04617\">1706.04617</a></b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. 외곽 행성의 magnetopause 기하를 제공합니다.",
  "li_281":"<b><a href=\"https://arxiv.org/abs/2203.01065\">2203.01065</a></b> RM22 — 조석 고정된 암석 행성의 dynamo 스케일링.",
  "li_282":"<b><a href=\"https://arxiv.org/abs/1910.09871\">1910.09871</a></b> Atri 2019 — g 의 표면 방사선 dose 표.",
  "h3_283":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_284":"<b><a href=\"https://arxiv.org/abs/2508.12865\">2508.12865</a></b> Empirical determination of the Cosmic Shoreline. g 의 retention 상태에 대한 맥락입니다.",
  "li_285":"<b><a href=\"https://arxiv.org/abs/2504.01182\">2504.01182</a></b> Receding Cosmic Shoreline for mid-to-late M dwarfs. TRAPPIST-1 시스템 수준 맥락입니다.",
  "li_286":"<b><a href=\"https://arxiv.org/abs/2210.02484\">2210.02484</a></b> HZ catalog. g 를 더 넓은 HZ 후보 중 하나로 등재합니다. d 에서 이미 읽었습니다.",
  "li_287":"<b><a href=\"https://arxiv.org/abs/2006.11349\">2006.11349</a></b> Wunderlich 2020 — Wet/dry e and f. g 는 맥락만. f 에서 이미 읽었습니다.",
  "li_288":"<b><a href=\"https://arxiv.org/abs/2506.16063\">2506.16063</a></b> Mass-radius plane classification. 카탈로그 맥락만 제공합니다.",
  "h3_289":"읽음 (instrument-only, 시각 정보 아님)",
  "p_290":"(g 에 특화된 것 없음.)",
  "h3_291":"읽지 않음 — arXiv preprint 없음 또는 낮은 우선순위 (~14 편)",
  "p_292":"g 의 참고 문헌은 큰 편입니다 (66 편, 그중 52 편이 arXiv). 다만 대부분이 SETI / technosignature 서베이, mass-radius 카탈로그, 또는 g 를 지나가듯 언급하는 논문입니다.",
  "li_293":"<b><a href=\"https://arxiv.org/abs/2509.06310\">2509.06310</a></b> Deep SETI search with FAST. 시각 정보 아님.",
  "li_294":"<b><a href=\"https://arxiv.org/abs/2208.02511\">2208.02511</a></b> SETI drift rate context. 시각 정보 아님.",
  "li_295":"<b>여러 cosmic-shoreline 논문</b> — retention 질문에 대해 집합적으로 읽었으며, 개별 항목은 시각 정보 제공이 아닙니다.",
  "li_296":"<b>TESS / non-TRAPPIST-1 카탈로그 논문</b> — 무관합니다.",
  "p_297":"---",
  "h2_298":"후속 follow-up 항목",
  "li_299":"g 에 대한 직접 JWST 관측은 아직 없습니다. 향후 transmission 또는 emission 스펙트럼이 출판되면 대기 압력 / 조성 표를 재검토할 필요가 있습니다. 특히 g 가 transmission 에서 CO₂ feature 를 보이면 0.05 bar 선택을 더 정교화할 수 있습니다.",
  "li_300":"Cryovolcanism 은 g 에 대해 그럴듯하지만 제약되지 않습니다. 향후 cfg 변형이 Europa-analog 측면 (resurfaced 얼음 patch 가 보이거나, 따뜻한 spot 에서 plume feature 가능) 을 강조하고 싶다면 Phase 3.5 로 구현할 수 있습니다.",
  "li_301":"0.05 bar CO₂ 선택은 &quot;대기 존재&quot; 의 하한 경계입니다. ~0.01 bar 로 내리거나, 완전 무대기 cold-snowball 변형을 위해 0 으로 둘 수도 있습니다.",
  "li_302":"wmf 범위 (0.11–0.24) 는 g 가 해저 hydrothermal 활동을 갖춘 거주 가능 빙하 아래 층을 호스트할 수 있을 만큼 충분히 높습니다 (Europa-Enceladus astrobiology analog). 시각적으로는 관련이 없더라도 Principia 노트에 남길 가치가 있습니다.",
  "li_303":"0.05 bar 대기는 Turbet 평형 150 mbar 아래에 있습니다. 0.15 bar 의 cfg 변형이 열역학적으로 더 자연스럽습니다. NearStars 가 &quot;활성 outgassing 평형&quot; (Turbet) 을 선호할지, &quot;탈출에 간신히 버티는 대기&quot; (현재) 를 선호할지에 따라 선택이 달라집니다.",
  "li_304":"WMF 상한에서의 거주 가능성 제약. 0.14 이상에서는 HPP 가 mantle-바다 교환을 봉인합니다. Principia 쪽 astrobiology 패스가 거주 가능성을 중시한다면, g 를 상한에서 marginal 로 플래그해 두기 바랍니다.",
  "li_305":"JWST GO 2589 가 flare 특성화 목적으로 g 를 관측했지만 (Burdanov 2025 / <a href=\"https://arxiv.org/abs/2512.04265\">2512.04265</a> 기준), 아직 출판된 대기 retrieval 은 없습니다. arXiv 를 주기적으로 다시 확인할 가치가 있습니다.",
  "li_306":"<b>cfg variant. 균일한 매끈한 snowball.</b> 대안으로 보존합니다. 활성 feature 없는 해석을 선호하는 사용자를 위해서입니다. Cryovolcanism-plumes canonical 버전은 interesting-first 원칙에 따라 선택되었습니다.",
  "li_307":"표면 방사선 dose ~5 Sv/yr 는 g 를 Kerbalism 의 &quot;moderate-to-high&quot; 방사선 구간에 놓습니다. 50 g/cm² 의 대기 + ~30 m 의 얼음 차폐가 있으므로, 얼음 아래 내부 거주지는 시스템에서 가장 안전한 축에 들어갑니다.",
  "h2_308":"Related",
  "li_309":"<a href=\"trappist-1-f.html\">trappist-1-f</a> — 내측 형제. snowball/eyeball tipping point 에 위치. g 는 명백한 snowball.",
  "li_310":"<a href=\"trappist-1-h.html\">trappist-1-h</a> — 가장 바깥 형제. 둘 다 얼음 지배이지만 질량/가열 예산이 다름.",
  "li_311":"<a href=\"trappist-1-e.html\">trappist-1-e</a> — 거주가능역 기준점 대조.",

    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
