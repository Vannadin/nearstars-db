  "p_1":"Proxima Centauri c is a <b>contested radial-velocity candidate</b> — a long-period, low-mass companion to the nearest star, reported by Damasso et al. 2020 (Sci. Adv. 6, eaax7467) as a ~1900-day signal with a minimum mass of 5.8 ± 1.9 M⊕ at a = 1.48 ± 0.08 AU. If real, it would be a strikingly cold world: at 1.48 AU around the 0.001567 L☉ flare star Proxima, the equilibrium temperature is only <b>T_eq ≈ 39 (+16/−18) K</b> (Damasso 2020) — colder than Neptune — and the insolation is just S ≈ 7.2 × 10⁻⁴ that of Earth. The signal has <b>never been independently confirmed</b>: an Artigau et al. 2022 re-extraction of the HARPS data found no evidence of it, and the 2025 NIRPS campaign (Suárez Mascareño et al.) recovered only &quot;inconclusive&quot; hints of a lower-amplitude long-period signal. Proxima c is included in NearStars as a <b>documented candidate</b>, the same way tau Cet e and 40 Eri A b are — a real entry in the public record, flagged as unconfirmed.",

  "h2_134":"Surface synthesis",
  "p_135":"Proxima c has no solid surface to render under the adopted ice-giant reading — it is a ~14 M⊕ H₂/He envelope over an icy/rocky core, a Neptune-class world. The &quot;surface&quot; for rendering purposes is the cloud deck, and at ~39 K that deck is dominated by methane.",
  "p_136":"The temperature is the controlling fact. At 1.48 AU around a 0.001567 L☉ star the equilibrium temperature is only ~39–45 K (Damasso 2020; recompute), colder than Neptune&#x27;s ~47 K. At this temperature methane largely condenses out of the upper atmosphere into ice clouds and haze, while residual gas-phase CH₄ below the condensation level still absorbs red light and produces the characteristic ice-giant blue. The cfg renders Proxima c as a <b>deep methane-blue world</b> (<span class=\"hex-chip\" style=\"background:#2f5fb0\"></span><code>#2f5fb0</code>) — slightly muted and hazier than Neptune&#x27;s vivid blue because the extra cold drives more methane condensation. Bright methane-ice cloud streaks (<span class=\"hex-chip\" style=\"background:#cfe0ec\"></span><code>#cfe0ec</code>) sit over the deep-blue gas, in faint zonal bands, with the band contrast suppressed by the weak insolation: at 7 × 10⁻⁴ Earth&#x27;s sunlight there is almost no stellar drive for storms, so the deck is calmer and more uniform than Neptune&#x27;s.",
  "p_137":"This is deliberately the <b>cold, envelope-bearing counterpart</b> to Proxima&#x27;s inner planets. Proxima b is a temperate, possibly-ocean-bearing rocky world at 0.0485 AU and Proxima d is a hot Mercury-analog at 0.029 AU; Proxima c, far out at 1.48 AU, is the system&#x27;s ice giant — a single dim blue disk a tenth the size of the inner pair&#x27;s rocky bodies in mass terms but visually the largest body in the system after the star.",
  "h2_138":"Atmosphere synthesis",
  "p_139":"<b>Pressure reference.</b> An ice giant has no solid surface; the cfg reference pressure is 1 bar (100 000 Pa), used only to anchor the cloud-deck rendering. The physically meaningful level is the methane condensation layer in the upper troposphere.",
  "p_140":"<b>Composition.</b> No atmosphere of Proxima c has been measured — it is an RV candidate with no transit, no spectrum, and no confirmed existence. The composition is inferred entirely from the adopted ~14 M⊕ ice-giant mass: an H₂/He bulk envelope with methane as the dominant minor species, exactly as for Neptune and Uranus. At ~40 K the methane is near or below its condensation point, so the upper atmosphere is depleted in gas-phase CH₄ (forming ice haze) while deeper layers retain enough to colour the planet blue. The cfg encodes this at low confidence — it is the Neptune-analog default, not a measurement.",
  "p_141":"<b>Sky appearance from a cloud-top / moon observer.</b> From the cloud tops the sky is a deep methane blue overcast, lit by a small, dim, deep-red star. Proxima subtends only ~0.051° at 1.48 AU — about a tenth the Sun&#x27;s angular size from Earth — a faint red pinpoint delivering ~7 × 10⁻⁴ Earth&#x27;s insolation, so the dayside is extremely dim, more a deep twilight than a day. Across the sky, far brighter than Proxima would be the distant pair α Centauri A and B (Proxima orbits the AB pair at ~13 000 AU), appearing as a brilliant close double &quot;evening star.&quot;",
  "p_142":"<b>Nightside and flares.</b> With negligible insolation the planet is cold and dark, but Proxima is a superflare star: its giant flares (Howard 2018; the 2019 ASAS-SN/Evryscope superflare, Vida 2019) flood the system with energetic particles. An ice-giant magnetosphere at 1.48 AU — modeled on Neptune&#x27;s strongly tilted, offset dipole — would channel that plasma into <b>faint, off-axis aurorae</b> glowing pink-red in hydrogen Balmer and H₂ emission (<span class=\"hex-chip\" style=\"background:#e0507a\"></span><code>#e0507a</code>), distinct from Earth&#x27;s green oxygen aurora. The flux is diluted by the 1.48 AU distance and the weak field, so the cfg flags the aurora as faint and low-confidence — a tie-break, not a measurement, but a physically motivated one given the flare host.",
  "h2_143":"Rotation &amp; spin synthesis",
  "p_144":"No rotation measurement of Proxima c exists — it is an unconfirmed RV candidate with no resolved disk.",
  "p_145":"<b>Tidal damping argument.</b> At 1.48 AU around a 0.122 M☉ star, the tidal timescale for a Neptune-class planet vastly exceeds the 4.85 Gyr age, so Proxima c is <b>not</b> tidally locked (<code>tidally_locked = false</code>) — unlike its tidally-locked inner siblings b and d.",
  "p_146":"<b>Rotation period choice.</b> Ice giants inherit large angular-momentum budgets from disk accretion and rotate quickly; the cfg picks a Neptune-analog <code>rotation_period_hours = 16</code> as a within-window tie-break. Rapid rotation drives the faint zonal banding, though the band contrast is muted by the very weak insolation.",
  "p_147":"<b>Obliquity.</b> Tie-break aesthetic: 28° (Neptune-analog 28.3°) for a visually distinct tilt. At 7 × 10⁻⁴ Earth&#x27;s insolation the obliquity drives no observable seasonal effect — the planet is uniformly cold.",
  "p_148":"<b>KSP implementation note.</b> Rotation period = 16 h = 57 600 s (<code>rotationPeriod = 57600</code>); obliquity ≈ 28° from the orbital normal.",
  "h2_149":"Visual styling",
  "p_150":"Combining the surface (cloud-deck) and atmosphere decisions, Proxima c renders as a cold, deep-blue ice giant — the system&#x27;s outermost and largest body after the star:",
  "li_151":"<b>Global appearance.</b> From orbit, a deep methane-blue disk (<span class=\"hex-chip\" style=\"background:#2f5fb0\"></span><code>#2f5fb0</code>) about 3.8 R⊕ (~48 000 km) across — a Neptune-class world, muted and slightly hazier than Neptune itself because the extra cold (~40 K vs Neptune&#x27;s ~47 K) drives more methane condensation.",
  "li_152":"<b>Cloud-deck detail.</b> Faint zonal bands with patchy bright methane-ice cloud streaks (<span class=\"hex-chip\" style=\"background:#cfe0ec\"></span><code>#cfe0ec</code>) over the deep-blue gas. Storm activity is minimal at 7 × 10⁻⁴ Earth&#x27;s insolation — calmer and more uniform than Neptune&#x27;s banded disk.",
  "li_153":"<b>Limb haze.</b> A pale, cold-blue methane-ice haze at the limb, a thin bright halo over the deep-blue body.",
  "li_154":"<b>Nightside and aurora.</b> Dark and cold on the nightside, with faint pink-red (<span class=\"hex-chip\" style=\"background:#e0507a\"></span><code>#e0507a</code>) hydrogen aurorae in off-axis ovals where Proxima&#x27;s flare plasma reaches the strongly tilted ice-giant field. Faint and intermittent, tied to flare events.",
  "li_155":"<b>Star in sky.</b> Proxima subtends only ~0.051° — about 1/10 the Sun&#x27;s angular size from Earth — a dim, pale warm-orange (M5.5Ve, <span class=\"hex-chip\" style=\"background:#ffcc75\"></span><code>#ffcc75</code>) pinpoint delivering ~7 × 10⁻⁴ Earth&#x27;s insolation. The dayside is a dim ruddy twilight (the redness is the feeble illumination level, not the star&#x27;s hue), not a true day.",
  "li_156":"<b>α Cen AB in sky.</b> The bright G2V + K1V pair α Centauri A and B, at ~13 000 AU, appears as a brilliant close double — the most prominent &quot;star&quot; in Proxima c&#x27;s sky after Proxima itself.",
  "li_157":"<b>No ring.</b> <code>ring_present = false</code> — there is no planet-specific ring evidence (see Canonical alternatives / Open items for the disputed imaging story).",
  "h2_158":"Canonical alternatives",
  "p_159":"The cfg renders the <b>ice-giant (true-mass) reading</b>; a co-existing literature reading is the rocky/icy super-Earth at the RV minimum mass.",
  "th_160":"cfg pick",
  "th_161":"Canonical alternative",
  "th_162":"Why cfg diverges",
  "td_163":"<code>mass_mearth ≈ 14</code> (Neptune-class ice giant, H₂/He envelope)",
  "td_164":"<b><code>mass_mearth = 5.8 ± 1.9</code> (RV minimum mass, Damasso 2020)</b> — a rocky/icy super-Earth with at most a thin volatile envelope; <code>radius ≈ 1.8–2.2 R⊕</code>, no significant gas envelope, an airless or thin-atmosphere frozen body at ~40 K",
  "td_165":"The 5.8 M⊕ value is a <b>minimum</b> (m sin i); the Gaia–Hipparcos PMa true mass is ~10–20 M⊕ (Kervella 2020), which lands in the ice-giant regime. The cfg adopts the true-mass reading because it is (a) the physically expected outcome of a 10–20 M⊕ core in the cold outer disk and (b) far more visually distinctive than a small frozen rock. Users wanting the minimum-mass reading should render a ~2 R⊕ frozen super-Earth instead",
  "p_166":"A second alternative noted by Damasso 2020: if Proxima c is <b>coplanar with the candidate ALMA cold dust belt</b> (i ≈ 45°), its true mass is ~8.2 M⊕ — still a super-Earth/sub-Neptune, between the two readings above. The cfg&#x27;s ~14 M⊕ sits within the PMa range; 8.2 M⊕ is the lower-inclination edge.",
  "h2_167":"Bibliography",
  "h3_168":"Read (drove decisions above)",
  "li_169":"<b>Damasso M. et al. 2020</b> — <i>A low-mass planet candidate orbiting Proxima Centauri at a distance of 1.5 AU</i>, Sci. Adv. 6, eaax7467 (<code>2020SciA....6.7467D</code>, doi:10.1126/sciadv.aax7467). <b>The only primary source.</b> RV candidate: P = 1900 (+96/−82) d, a = 1.48 ± 0.08 AU, m sin i = 5.8 ± 1.9 M⊕, T_eq ≈ 39 (+16/−18) K, e fixed 0 (free run e = 0.41, not significant). Gaia–Hipparcos PMa compatible with a true mass ~10–20 M⊕ (citing Kervella 2020). Forms beyond the snow line → type-II migration. Explicitly a candidate requiring follow-up. <b>Has no arXiv preprint</b>; full text cached from open-access PMC6962037. Drives every orbit/mass/temperature row.",
  "h3_170":"Read (context — dispute / non-recovery)",
  "li_171":"<b>Suárez Mascareño A. et al. 2025</b> — NIRPS Proxima campaign (<code>2507.21751</code>). Reports <b>inconclusive evidence</b> for the 1900-d signal: a low-amplitude (58 ± 28 cm/s, &lt; 1.4 m/s at 99.7%) long-period hint at ~1800 d, &quot;not fully compatible&quot; with Damasso&#x27;s amplitude. &quot;No conclusive evidence was found for Proxima c.&quot; The most recent test; lowers the confidence floor.",
  "li_172":"<b>Faria J. P. et al. 2022</b> — ESPRESSO Proxima d discovery (<code>2202.05188</code>). Notes Proxima c &quot;has so far eluded a clear detection with direct imaging or astrometry (Gratton 2020; Kervella 2020; Benedict &amp; McArthur 2020)&quot;; ESPRESSO&#x27;s ~815-d baseline is too short (~2.3× shorter than P_c) to test the 1900-d signal — a non-test, not a refutation.",
  "li_173":"<b>Suárez Mascareño A. et al. 2020</b> — &quot;Revisiting Proxima with ESPRESSO&quot; (<code>2005.12114</code>). States re-testing Proxima c is beyond the paper&#x27;s (short-baseline) scope. Non-test.",
  "li_174":"<b>Artigau É. et al. 2022</b> (not in cache; via NIRPS 2025) — a HARPS re-extraction with a different RV method <b>could not find evidence</b> of Proxima c. The principal dispute.",
  "h3_175":"Not read — cited only, no full text in cache",
  "li_176":"<b>Kervella P. et al. 2020</b> (Gaia–Hipparcos PMa true masses) — the source of the ~10–20 M⊕ true-mass range, quoted via Damasso 2020; full text not cached.",
  "li_177":"<b>Gratton R. et al. 2020</b> (SPHERE direct-imaging counterpart) and <b>Benedict &amp; McArthur 2020</b> (HST astrometry) — both cited as having Proxima c &quot;elude a clear detection&quot;; the disputed Gratton SPHERE candidate is the origin of the popular &quot;rings&quot; story but is not cache-verifiable and is characterised as a non-detection.",
  "li_178":"<b>Anglada G. et al. 2017</b> / <b>MacGregor M. et al. 2018</b> — the candidate ALMA inner dust ring at 1–4 AU and its rebuttal (attributing the ALMA point source to a stellar flare); a circumstellar feature, debated, not a planetary ring.",
  "h2_179":"Open items for follow-up",
  "li_180":"<b>Existence.</b> Proxima c is the catalog&#x27;s most contested planet entry. Confirmation requires the longer RV baseline now accumulating (ESPRESSO + NIRPS) or a Gaia DR4 astrometric detection. If it is refuted outright, it should be reclassified (like a hardened tau Cet e); if confirmed and its true mass pinned, the mass/radius/nature rows should be re-derived.",
  "li_181":"<b>Mass and nature.</b> The ice-giant vs rocky-super-Earth fork (<code>## Canonical alternatives</code>) turns entirely on the true mass. Gaia DR4 astrometry should resolve it; the cfg should switch to the rocky reading if the true mass comes in near the 5.8 M⊕ minimum.",
  "li_182":"<b>Eccentricity.</b> Adopted circular (Damasso fixed e = 0), but the free-eccentricity run gave e = 0.41 (+0.34/−0.26) — genuinely unconstrained. A future cfg could adopt a moderate eccentricity if follow-up favors it; the synthetic-eccentricity layer (project policy) is <b>not</b> applied here because e is a (loosely) measured quantity.",
  "li_183":"<b>Inclination.</b> Unconstrained; the coplanar-with-disk i ≈ 45° / m = 8.2 M⊕ option is one literature anchor. A measured astrometric inclination would fix both the orbit and the true mass.",

  ko: {
  "p_1":"Proxima Centauri c 는 <b>논쟁 중인 시선속도 후보</b> 입니다 — 가장 가까운 별에 딸린 장주기·저질량 동반체로, Damasso et al. 2020 (Sci. Adv. 6, eaax7467) 이 a = 1.48 ± 0.08 AU 에서 최소 질량 5.8 ± 1.9 M⊕ 의 ~1900일 신호로 보고했습니다. 실재한다면 놀랍도록 차가운 세계일 것입니다. 0.001567 L☉ 의 플레어별 Proxima 주위 1.48 AU 에서 평형 온도는 <b>T_eq ≈ 39 (+16/−18) K</b> 에 불과하고 (Damasso 2020) — 해왕성보다도 차갑습니다 — 일사량은 지구의 S ≈ 7.2 × 10⁻⁴ 수준입니다. 이 신호는 <b>독립적으로 확인된 적이 단 한 번도 없습니다</b>. Artigau et al. 2022 의 HARPS 데이터 재추출은 그 증거를 찾지 못했고, 2025년 NIRPS 캠페인 (Suárez Mascareño et al.) 은 더 낮은 진폭의 장주기 신호에 대한 &quot;결론을 내릴 수 없는&quot; 힌트만 회수했습니다. Proxima c 는 tau Cet e 나 40 Eri A b 와 동일하게 <b>문서화된 후보</b>로 NearStars 에 포함됩니다 — 공개 기록에 실재하는 항목이되, 미확인으로 표기됩니다.",
  "p_2":"Damasso 2020 의 과학적 헤드라인은 이 행성의 위치입니다. 1.48 AU 는 원시행성 눈선 (snow line) 보다 한참 바깥인데, 이렇게 어두운 별 주위에서 눈선은 ~0.15 AU 안쪽에 있었습니다. 이렇게 멀리 떨어진 슈퍼지구 (또는 그 이상) 는 in-situ 형성으로는 설명하기 어렵고, 현재 거리의 몇 배 지점에서 일어난 type-II 이주를 가리킵니다. 질량이 두 번째 갈림길입니다. RV 최소 질량은 5.8 M⊕ 이지만, Damasso 2020 은 Gaia–Hipparcos 고유운동 이상 (Kervella et al. 2020) 이 1–2 AU 에서 <b>~10–20 M⊕ 의 진질량</b>과 양립한다고 지적합니다 — 정확히 해왕성급입니다. 차가운 외곽 원반에서 형성되는 10–20 M⊕ 핵은 교과서적 얼음 거인 경로이므로 (천왕성과 해왕성이 각각 ~14.5, ~17 M⊕), 이 합성은 진질량 독법을 채택하고 Proxima c 를 <b>차가운 얼음 거인</b>으로 렌더링합니다.",
  "p_3":"<b>NearStars 시나리오 선택. Proxima 주위 넓은 1.48 AU 원궤도 위의 짙은-청색 ~40 K 해왕성급 얼음 거인으로 — 암석질 내행성 b·d 와 대비되는, 포피 (envelope) 를 두른 차가운 짝으로, 흐릿한 붉은 점광원 별이 비추고 그 거대 플레어에 노출된 모습으로 — 렌더링합니다.</b> 궤도와 ~39 K 온도만이 측정/유도된 유일한 앵커이며 canonical-aligned 입니다. 시각 요소 전부 — 얼음 거인이라는 본성 자체, 메탄-블루 색조, 자전, 오프셋 자기장, 그리고 플레어가 구동하는 오로라 — 는 해왕성 유사체 interesting-first 독법으로 기본값을 잡은 within-window tie-break 입니다. 암석질 슈퍼지구 대안 (5.8 M⊕ 최소-질량 독법) 은 <code>## Canonical alternatives</code> 에 보존됩니다. <b>고리 없음</b>. 널리 퍼진 &quot;Proxima c 에 고리가 있을 수 있다&quot;는 이야기는 Gratton et al. 2020 의 논쟁적 SPHERE 짝과 논란 중인 항성주위 먼지 고리 (Anglada 2017 / MacGregor 2018) 에서 비롯한 것으로, 어느 쪽도 행성 고유의 고리 증거가 아닙니다 — 고리 가드레일에 따라 <code>ring_present = false</code> 입니다.",

  "td_106":"<span class=\"field-tt\" data-ko-tip=\"오로라 발생 여부 (대기 + 자기장 동시 필요).\" data-en-tip=\"Auroral activity present — requires both atmosphere and magnetic field.\"><code>aurora_present</code></span>",
  "td_107":"true",
  "td_108":"low",
  "td_109":"Tie-break (물리적 게이팅). Proxima 는 슈퍼플레어별임 (Howard 2018; Vida 2019). 1.48 AU 의 얼음-거인 자기권은 플레어가 구동하는 플라스마를 오로라로 유도. 흐릿함 (행성이 멀고 자기장이 약함), 낮은-신뢰도 표기",
  "td_110":"<span class=\"field-tt\" data-ko-tip=\"주 오로라 색 hex. 발광 종(species) 에 의해 결정.\" data-en-tip=\"Primary auroral color hex — determined by the dominant emission species.\"><code>aurora_color_primary_hex</code></span>",
  "td_111":"<span class=\"hex-chip\" style=\"background:#e0507a\"></span><code>#e0507a</code> (H Balmer / H₂ pink-red)",
  "td_112":"low",
  "td_113":"Tie-break. H₂/CH₄ 대기 오로라는 수소 Balmer + H₂ 밴드 (분홍-적색) 로 방출되며, 지구의 녹색 [O I] 와 구별됨 — 목성/얼음-거인 H₂ 오로라 유사체",
  "td_114":"<span class=\"field-tt\" data-ko-tip=\"주 발광 종 (e.g. [OI] 557 nm, CO₂⁺ FDB).\" data-en-tip=\"Primary auroral emission species (e.g. [OI] 557 nm, CO₂⁺ FDB).\"><code>aurora_emission_species_primary</code></span>",
  "td_115":"H Balmer (Hα 656 nm) + H₂ Lyman/Werner bands",
  "td_116":"low",
  "td_117":"Tie-break. 수소 우세 대기. 측정 없음",
  "td_118":"<code>ring_present</code>",
  "td_119":"false",
  "td_120":"high",
  "td_121":"행성 고유의 고리 증거 없음. &quot;Proxima c 고리&quot; 이야기는 Gratton et al. 2020 의 논쟁적 SPHERE 직접촬영 짝과 논란 중인 항성주위 내부 먼지 고리 (Anglada et al. 2017; MacGregor et al. 2018 이 반박) 에서 비롯 — 어느 쪽도 행성주위 고리가 아님. 고리 가드레일. 생략",
  "td_122":"<code>ring_observed</code>",
  "td_123":"false",
  "td_124":"high",
  "td_125":"Damasso 2020 은 RV 검출. 어떤 영상도 고리를 분해하지 못했고, 후보 자체가 미확인",
  "td_126":"<span class=\"field-tt\" data-ko-tip=\"하늘에서 모항성의 시직경 (도). 지구에서 본 태양 ≈ 0.53°.\" data-en-tip=\"Host star angular diameter as seen from the planet (degrees). Sun-from-Earth ≈ 0.53°.\"><code>star_apparent_angular_diameter_deg</code></span>",
  "td_127":"0.051",
  "td_128":"high",
  "td_129":"유도. 2 R_star / a = 2 × 0.141 R☉ / 1.48 AU ≈ 0.051° — 지구에서 본 태양 각크기의 약 1/10. Proxima 는 작고 흐릿한 붉은 점광원",
  "td_130":"<span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span>",
  "td_131":"2904",
  "td_132":"high",
  "td_133":"호스트 Phase 3 에서 상속 (<code>docs/phase3/proxima-cen.md</code>) — Teff 2904 K, 짙은-적색 M5.5Ve",
  "h2_134":"Surface synthesis",
  "p_135":"채택한 얼음-거인 독법에서 Proxima c 는 렌더링할 고체 표면이 없습니다 — 얼음/암석 핵 위에 H₂/He 포피를 두른 ~14 M⊕ 의 해왕성급 세계입니다. 렌더링 목적의 &quot;표면&quot;은 구름층이며, ~39 K 에서 그 층은 메탄이 지배합니다.",
  "p_136":"온도가 결정적 사실입니다. 0.001567 L☉ 별 주위 1.48 AU 에서 평형 온도는 ~39–45 K 에 불과하며 (Damasso 2020; 재계산), 해왕성의 ~47 K 보다도 차갑습니다. 이 온도에서 메탄은 상층 대기에서 대부분 얼음 구름과 연무로 응결되는 한편, 응결 고도 아래의 잔류 기상 CH₄ 는 여전히 적색광을 흡수해 얼음 거인 특유의 청색을 만들어냅니다. cfg 는 Proxima c 를 <b>짙은 메탄-블루 세계</b> (<span class=\"hex-chip\" style=\"background:#2f5fb0\"></span><code>#2f5fb0</code>) 로 렌더링합니다 — 추가적인 추위가 더 많은 메탄 응결을 일으키기 때문에 해왕성의 선명한 청색보다 다소 옅고 연무가 짙습니다. 밝은 메탄-얼음 구름 줄무늬 (<span class=\"hex-chip\" style=\"background:#cfe0ec\"></span><code>#cfe0ec</code>) 가 짙은-청색 가스 위에 흐릿한 띠상 밴드로 놓이는데, 약한 일사량이 밴드 대비를 억누릅니다. 지구 햇빛의 7 × 10⁻⁴ 에서는 폭풍을 구동할 항성 동력이 거의 없으므로, 구름층은 해왕성보다 더 잔잔하고 균일합니다.",
  "p_137":"이는 의도적으로 Proxima 내행성들에 대비되는 <b>포피를 두른 차가운 짝</b> 입니다. Proxima b 는 0.0485 AU 에 있는 온화하고 바다를 품었을 수 있는 암석 세계, Proxima d 는 0.029 AU 의 뜨거운 수성 유사체입니다. 멀리 1.48 AU 에 있는 Proxima c 는 이 계의 얼음 거인입니다 — 질량으로는 안쪽 한 쌍의 암석 천체의 1/10 크기에 불과한 단일 흐릿한 청색 원반이지만, 별을 제외하면 시각적으로 이 계에서 가장 큰 천체입니다.",
  "h2_138":"Atmosphere synthesis",
  "p_139":"<b>압력 기준.</b> 얼음 거인은 고체 표면이 없습니다. cfg 기준 압력은 1 bar (100 000 Pa) 로, 구름층 렌더링을 고정하는 데에만 쓰입니다. 물리적으로 의미 있는 고도는 상부 대류권의 메탄 응결층입니다.",
  "p_140":"<b>조성.</b> Proxima c 의 대기는 측정된 적이 없습니다 — transit 도 스펙트럼도 없고 확인된 존재조차 없는 RV 후보입니다. 조성은 전적으로 채택한 ~14 M⊕ 얼음-거인 질량으로부터 추론됩니다. 해왕성·천왕성과 똑같이, 메탄을 지배적 미량종으로 하는 H₂/He bulk 포피입니다. ~40 K 에서 메탄은 응결점 부근이거나 그 아래에 있으므로, 상층 대기는 기상 CH₄ 가 고갈되고 (얼음 연무 형성) 더 깊은 층은 행성을 청색으로 물들이기에 충분한 양을 유지합니다. cfg 는 이것을 낮은 신뢰도로 인코딩합니다 — 측정이 아니라 해왕성 유사체 기본값 입니다.",
  "p_141":"<b>구름-꼭대기 / 위성 관측자에서 본 하늘.</b> 구름 꼭대기에서 하늘은 작고 흐릿한 짙은-적색 별이 비추는 짙은 메탄-블루 잔뜩 흐린 모습입니다. Proxima 는 1.48 AU 에서 ~0.051° 밖에 차지하지 않습니다 — 지구에서 본 태양 각크기의 약 1/10 — 지구 일사량의 ~7 × 10⁻⁴ 을 보내는 흐릿한 붉은 점광원이라, 낮쪽은 낮이라기보다 깊은 황혼에 가까울 만큼 극도로 어둡습니다. 하늘 건너편, Proxima 보다 훨씬 밝게 보이는 것은 멀리 떨어진 한 쌍 α Centauri A 와 B 입니다 (Proxima 는 AB 쌍을 ~13 000 AU 에서 공전). 이들은 눈부신 가까운 이중성 &quot;저녁별&quot;로 나타납니다.",
  "p_142":"<b>밤쪽과 플레어.</b> 일사량이 무시할 만하므로 행성은 차갑고 어둡지만, Proxima 는 슈퍼플레어별입니다. 그 거대 플레어 (Howard 2018; 2019년 ASAS-SN/Evryscope 슈퍼플레어, Vida 2019) 가 고에너지 입자로 계를 적십니다. 1.48 AU 의 얼음-거인 자기권 — 해왕성의 강하게 기울어진 오프셋 쌍극자를 모델로 함 — 은 그 플라스마를 수소 Balmer 와 H₂ 방출로 분홍-적색 (<span class=\"hex-chip\" style=\"background:#e0507a\"></span><code>#e0507a</code>) 으로 빛나는 <b>흐릿한 축-바깥 오로라</b>로 유도할 것이며, 이는 지구의 녹색 산소 오로라와 구별됩니다. 플럭스는 1.48 AU 거리와 약한 자기장에 의해 희석되므로, cfg 는 오로라를 흐릿하고 낮은-신뢰도로 표기합니다 — 측정이 아니라 tie-break 이되, 플레어 호스트를 고려하면 물리적으로 동기가 있는 선택입니다.",
  "h2_143":"Rotation &amp; spin synthesis",
  "p_144":"Proxima c 의 자전 측정은 존재하지 않습니다 — 분해된 원반이 없는 미확인 RV 후보입니다.",
  "p_145":"<b>조석 감쇠 논거.</b> 0.122 M☉ 별 주위 1.48 AU 에서 해왕성급 행성의 조석 시간척도는 4.85 Gyr 나이를 한참 초과하므로, Proxima c 는 조석 고정이 <b>아닙니다</b> (<code>tidally_locked = false</code>) — 조석 고정된 내행성 형제 b·d 와 다릅니다.",
  "p_146":"<b>자전 주기 선택.</b> 얼음 거인은 원반 강착에서 큰 각운동량 예산을 물려받아 빠르게 자전합니다. cfg 는 within-window tie-break 로 해왕성 유사체 <code>rotation_period_hours = 16</code> 을 선택합니다. 빠른 자전이 흐릿한 띠상 줄무늬를 구동하지만, 매우 약한 일사량이 밴드 대비를 억누릅니다.",
  "p_147":"<b>경사.</b> Tie-break 미적 선택. 시각적으로 뚜렷한 기울기를 위해 28° (해왕성 유사체 28.3°). 지구 일사량의 7 × 10⁻⁴ 에서 경사는 관측 가능한 계절 효과를 일으키지 않습니다 — 행성은 균일하게 차갑습니다.",
  "p_148":"<b>KSP 구현 노트.</b> 자전 주기 = 16 h = 57 600 s (<code>rotationPeriod = 57600</code>). 경사 ≈ 궤도 법선 기준 28°.",
  "h2_149":"Visual styling",
  "p_150":"표면 (구름층) 과 대기 결정을 결합하면, Proxima c 는 차갑고 짙은-청색 얼음 거인으로 렌더링됩니다 — 별을 제외하면 이 계의 가장 바깥쪽이자 가장 큰 천체입니다.",
  "li_151":"<b>전역 외관.</b> 궤도에서 보면 폭 약 3.8 R⊕ (~48 000 km) 의 짙은 메탄-블루 원반 (<span class=\"hex-chip\" style=\"background:#2f5fb0\"></span><code>#2f5fb0</code>) — 해왕성급 세계로, 추가적인 추위 (~40 K vs 해왕성의 ~47 K) 가 더 많은 메탄 응결을 일으키기 때문에 해왕성 본체보다 옅고 다소 연무가 짙습니다.",
  "li_152":"<b>구름층 디테일.</b> 짙은-청색 가스 위에 군데군데 흩어진 밝은 메탄-얼음 구름 줄무늬 (<span class=\"hex-chip\" style=\"background:#cfe0ec\"></span><code>#cfe0ec</code>) 를 가진 흐릿한 띠상 밴드. 7 × 10⁻⁴ 지구 일사량에서 폭풍 활동은 최소입니다 — 해왕성의 띠상 원반보다 더 잔잔하고 균일합니다.",
  "li_153":"<b>림 연무.</b> 가장자리의 옅고 차가운-청색 메탄-얼음 연무로, 짙은-청색 본체 위 얇고 밝은 후광.",
  "li_154":"<b>밤쪽과 오로라.</b> 밤쪽은 어둡고 차가우며, Proxima 의 플레어 플라스마가 강하게 기울어진 얼음-거인 자기장에 도달하는 축-바깥 타원에서 흐릿한 분홍-적색 (<span class=\"hex-chip\" style=\"background:#e0507a\"></span><code>#e0507a</code>) 수소 오로라가 나타납니다. 흐릿하고 간헐적이며, 플레어 사건에 연동됩니다.",
  "li_155":"<b>하늘의 별.</b> Proxima 는 ~0.051° 밖에 차지하지 않습니다 — 지구에서 본 태양 각크기의 약 1/10 — 지구 일사량의 ~7 × 10⁻⁴ 을 보내는 흐릿한 옅은 따뜻한 주황빛의 (M5.5Ve, <span class=\"hex-chip\" style=\"background:#ffcc75\"></span><code>#ffcc75</code>) 점광원입니다. 낮쪽은 흐릿한 불그스레한 황혼으로 (붉은 기는 별의 색조가 아니라 미약한 조명 수준 탓입니다), 진짜 낮이 아닙니다.",
  "li_156":"<b>하늘의 α Cen AB.</b> ~13 000 AU 에 있는 밝은 G2V + K1V 쌍 α Centauri A 와 B 가 눈부신 가까운 이중성으로 나타납니다 — Proxima 자신 다음으로 Proxima c 하늘에서 가장 두드러진 &quot;별&quot;입니다.",
  "li_157":"<b>고리 없음.</b> <code>ring_present = false</code> — 행성 고유의 고리 증거가 없습니다 (논쟁적 영상 이야기는 Canonical alternatives / Open items 참조).",
  "h2_158":"Canonical alternatives",
  "p_159":"cfg 는 <b>얼음-거인 (진질량) 독법</b>을 렌더링합니다. 공존하는 문헌 독법은 RV 최소 질량에서의 암석/얼음 슈퍼지구입니다.",
  "th_160":"cfg pick",
  "th_161":"Canonical alternative",
  "th_162":"Why cfg diverges",
  "td_163":"<code>mass_mearth ≈ 14</code> (Neptune-class ice giant, H₂/He envelope)",
  "td_164":"<b><code>mass_mearth = 5.8 ± 1.9</code> (RV minimum mass, Damasso 2020)</b> — 기껏해야 얇은 휘발성 포피를 가진 암석/얼음 슈퍼지구. <code>radius ≈ 1.8–2.2 R⊕</code>, 유의한 가스 포피 없음, ~40 K 의 대기 없는 또는 얇은-대기 동결 천체",
  "td_165":"5.8 M⊕ 값은 <b>최소값</b> (m sin i) 입니다. Gaia–Hipparcos PMa 진질량은 ~10–20 M⊕ (Kervella 2020) 로, 얼음-거인 영역에 들어갑니다. cfg 가 진질량 독법을 채택하는 이유는 (a) 차가운 외곽 원반의 10–20 M⊕ 핵에서 물리적으로 기대되는 결과이고 (b) 작은 동결 암석보다 시각적으로 훨씬 뚜렷하기 때문입니다. 최소-질량 독법을 원하는 사용자는 대신 ~2 R⊕ 동결 슈퍼지구를 렌더링해야 합니다",
  "p_166":"Damasso 2020 이 언급한 두 번째 대안. Proxima c 가 <b>후보 ALMA 차가운 먼지 띠와 공면</b> (i ≈ 45°) 이라면 진질량은 ~8.2 M⊕ 로 — 여전히 슈퍼지구/서브-해왕성이며, 위 두 독법 사이에 있습니다. cfg 의 ~14 M⊕ 는 PMa 범위 안에 있고, 8.2 M⊕ 는 더 낮은-경사 가장자리입니다.",
  "h2_167":"Bibliography",
  "h3_168":"Read (drove decisions above)",
  "li_169":"<b>Damasso M. et al. 2020</b> — <i>A low-mass planet candidate orbiting Proxima Centauri at a distance of 1.5 AU</i>, Sci. Adv. 6, eaax7467 (<code>2020SciA....6.7467D</code>, doi:10.1126/sciadv.aax7467). <b>유일한 1차 출처.</b> RV 후보. P = 1900 (+96/−82) d, a = 1.48 ± 0.08 AU, m sin i = 5.8 ± 1.9 M⊕, T_eq ≈ 39 (+16/−18) K, e 0 고정 (자유 런 e = 0.41, 유의하지 않음). Gaia–Hipparcos PMa 가 진질량 ~10–20 M⊕ 와 양립 (Kervella 2020 인용). 눈선 바깥 형성 → type-II 이주. 후속 관측이 필요한 후보라고 명시. <b>arXiv 프리프린트 없음</b>. 전문은 오픈액세스 PMC6962037 에서 캐시. 모든 궤도/질량/온도 행을 구동합니다.",
  "h3_170":"Read (context — dispute / non-recovery)",
  "li_171":"<b>Suárez Mascareño A. et al. 2025</b> — NIRPS Proxima 캠페인 (<code>2507.21751</code>). 1900-d 신호에 대해 <b>결론을 내릴 수 없는 증거</b>를 보고. ~1800 d 의 저진폭 (58 ± 28 cm/s, 99.7% 에서 &lt; 1.4 m/s) 장주기 힌트로, Damasso 의 진폭과 &quot;완전히 양립하지는 않음&quot;. &quot;Proxima c 에 대한 결정적 증거는 발견되지 않았다.&quot; 가장 최근 시험. 신뢰도 바닥을 낮춥니다.",
  "li_172":"<b>Faria J. P. et al. 2022</b> — ESPRESSO Proxima d 발견 (<code>2202.05188</code>). Proxima c 가 &quot;지금까지 직접촬영이나 측성으로 명확한 검출을 회피해왔다 (Gratton 2020; Kervella 2020; Benedict &amp; McArthur 2020)&quot; 고 언급. ESPRESSO 의 ~815-d 베이스라인은 1900-d 신호를 시험하기엔 너무 짧음 (P_c 의 ~2.3배 짧음) — 반박이 아니라 비시험.",
  "li_173":"<b>Suárez Mascareño A. et al. 2020</b> — &quot;Revisiting Proxima with ESPRESSO&quot; (<code>2005.12114</code>). Proxima c 재시험은 (짧은-베이스라인) 논문의 범위를 벗어난다고 명시. 비시험.",
  "li_174":"<b>Artigau É. et al. 2022</b> (캐시에 없음; NIRPS 2025 경유) — 다른 RV 방법을 쓴 HARPS 재추출이 Proxima c 의 <b>증거를 찾지 못함</b>. 핵심 논쟁입니다.",
  "h3_175":"Not read — cited only, no full text in cache",
  "li_176":"<b>Kervella P. et al. 2020</b> (Gaia–Hipparcos PMa 진질량) — ~10–20 M⊕ 진질량 범위의 출처로, Damasso 2020 을 통해 인용. 전문 미캐시.",
  "li_177":"<b>Gratton R. et al. 2020</b> (SPHERE 직접촬영 짝) 과 <b>Benedict &amp; McArthur 2020</b> (HST 측성) — 둘 다 Proxima c 가 &quot;명확한 검출을 회피&quot;한 사례로 인용. 논쟁적 Gratton SPHERE 후보는 널리 퍼진 &quot;고리&quot; 이야기의 기원이지만 캐시-검증이 불가능하고 비검출로 규정됩니다.",
  "li_178":"<b>Anglada G. et al. 2017</b> / <b>MacGregor M. et al. 2018</b> — 1–4 AU 의 후보 ALMA 내부 먼지 고리와 그 반박 (ALMA 점광원을 항성 플레어로 귀속). 항성주위 특징이며 논쟁적이고 행성 고리가 아닙니다.",
  "h2_179":"Open items for follow-up",
  "li_180":"<b>존재 여부.</b> Proxima c 는 카탈로그에서 가장 논쟁적인 행성 항목입니다. 확인하려면 지금 축적 중인 더 긴 RV 베이스라인 (ESPRESSO + NIRPS) 이나 Gaia DR4 측성 검출이 필요합니다. 완전히 반박된다면 재분류해야 하고 (강화된 tau Cet e 처럼), 확인되고 진질량이 고정되면 질량/반지름/본성 행을 재유도해야 합니다.",
  "li_181":"<b>질량과 본성.</b> 얼음-거인 vs 암석-슈퍼지구 갈림길 (<code>## Canonical alternatives</code>) 은 전적으로 진질량에 달려 있습니다. Gaia DR4 측성이 이를 해결할 것입니다. 진질량이 5.8 M⊕ 최소값 부근으로 나오면 cfg 는 암석 독법으로 전환해야 합니다.",
  "li_182":"<b>이심률.</b> 원궤도 채택 (Damasso 가 e = 0 고정) 했으나, 자유-이심률 런은 e = 0.41 (+0.34/−0.26) 을 줬습니다 — 진정으로 미제약. 후속 관측이 지지하면 향후 cfg 가 적당한 이심률을 채택할 수 있습니다. 합성-이심률 레이어 (프로젝트 정책) 는 여기 적용하지 <b>않습니다</b>. e 가 (느슨하게나마) 측정된 양이기 때문입니다.",
  "li_183":"<b>경사.</b> 미제약. 원반-공면 i ≈ 45° / m = 8.2 M⊕ 옵션이 하나의 문헌 앵커입니다. 측정된 측성 경사가 궤도와 진질량을 모두 고정할 것입니다.",
  "li_184":"<b>대기.</b> 전적으로 추론 (transit 도 스펙트럼도 없음). 메탄-블루 얼음-거인 조성은 해왕성 유사체 기본값입니다. 현재 장비로는 1.48 AU 의 비-통과 RV 후보에 대해 측정할 수 없습니다.",
  "h2_185":"Related",
  "li_186":"<a href=\"proxima-cen.html\">proxima-cen</a> — 호스트별 Phase 3 합성. M5.5Ve Teff / L / 질량 / 반지름, 슈퍼플레어 맥락, 조명-색온도 기준을 제공",
  "li_187":"<a href=\"proxima-cen-b.html\">proxima-cen-b</a> — 온화한 안쪽 암석 행성. b 의 바다-가능 안구 세계를 c 의 차가운 얼음 거인과 대비",
  "li_188":"<a href=\"proxima-cen-d.html\">proxima-cen-d</a> — 뜨거운 안쪽 수성 유사체. Proxima 계의 세 번째 일원",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
