  "p_79":"The star has a direct interferometric angular diameter, which is the anchor for the whole stellar layer: VEGA/CHARA visible-wavelength interferometry resolved θ_LD = 1.035 ± 0.021 mas (Ligi 2019). This is smaller than the earlier CHARA-Classic value (Boyajian 2012b θ = 1.106 ± 0.007 mas) because VEGA reaches higher spatial frequencies, and it supersedes the prior DB unverified 0.778 R☉. The direct mass M = 0.696 ± 0.078 M☉ is itself a measurement — Ligi combine the interferometric radius with the transit-derived stellar density ρ = 1.82 ± 0.19 ρ☉ (from the b/c transit fits, Gillon 2017) rather than relying on an evolutionary model; it is recommended over the Motalebi 2015 SYCLIST evolutionary value 0.78 ± 0.02 M☉, with the two agreeing at ~1.5σ.",
  "p_80":"Spot coverage is modest. The mean chromospheric index log R&#x27;HK = −4.89 (Johnson 2016) places HD 219134 just below the active/inactive boundary (~−4.75) — a quiet but not dead K dwarf, livelier than the very inactive solar twins (61 Vir at −5.01, τ Ceti) but far calmer than a young active dwarf. The defining activity feature is a clean, Sun-like <b>11.7-year magnetic cycle</b> (4230 ± 100 d; Johnson 2016) seen in the Ca II S-index — an unusually well-resolved analog of the Sun&#x27;s ~11-yr cycle, rare for a K dwarf. The cfg renders a modest cool-spot filling factor (~2% at cycle maximum) that waxes and wanes on the 11.7-yr cycle, plus the underlying rotational modulation (the contested 22.8 d / 42.3 d period; see Rotation &amp; spin).",
  "p_81":"No metallicity is curated in the Phase 2 layer and none is synthesized here; at fixed Teff the metallicity effect on the rendered K-dwarf color is sub-perceptible, and project policy skips it for new hosts. There is no debris disk: no infrared-excess detection or resolved imaging of a disk around HD 219134 has been reported, so the star is rendered diskless. The visual orange tint <span class=\"hex-chip\" style=\"background:#f0a868\"></span><code>#f0a868</code> sits between Sol&#x27;s near-white <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> and the deeper orange-red of an M dwarf, encoding the 4858 K photosphere as the warm-orange K3 V anchor of the NearStars catalog.",
  "h2_82":"Atmosphere synthesis",
  "p_83":"A main-sequence star has no &quot;atmosphere&quot; in the planetary cfg sense; for a stellar synthesis this section covers the chromosphere, corona, and magnetic activity cycle.",
  "p_84":"HD 219134&#x27;s chromosphere and corona are those of a quiet, mature K dwarf. The mean Ca II H&amp;K chromospheric index log R&#x27;HK = −4.89 (Johnson 2016) places it just inside the inactive locus. The headline feature is the <b>magnetic activity cycle</b>: Johnson 2016 measure a clean 11.7-year (4230 ± 100 d) periodicity in the Ca II S-index with a well-defined amplitude (S_HK amplitude 0.0077 ± 0.0003), a remarkably Sun-like cycle for a K dwarf. This cycle, not a single static activity level, is what the cfg should animate — a slow waxing and waning of the chromospheric brightness and spot coverage over the 11.7-yr period, superimposed on the faster rotational modulation.",
  "p_85":"No long-baseline X-ray cycle has been published, and the DB carries no X-ray luminosity measurement, so the cfg does not synthesize an explicit log L_X range. For a quiet K3 V at log R&#x27;HK = −4.89 the expected coronal output is modestly above the very quiet G/K dwarfs but well below an active dwarf — a benign space-weather environment for the close-in transiting planets b and c, whose airless / thin- atmosphere states are set by insolation and escape rather than by an aggressive stellar wind.",
  "p_86":"The corona/chromosphere visual extent is rendered at the quiet-Sun reference — a thin chromospheric layer at ~1.005 R★ and a faint corona extending to ~3 R★ visible only during the in-game &quot;corona-on&quot; rendering mode. The integrated XUV luminosity stays well below 10⁻⁴ L_bol; it matters for the close-in planets&#x27; atmospheric retention but is treated in their respective Phase 3 syntheses.",
  "h2_87":"Rotation &amp; spin synthesis",
  "p_88":"The rotation period of HD 219134 is genuinely contested, and the cfg carries the contest explicitly. The Phase 2 recommended value is <b>P_rot = 22.83 ± 0.03 d</b> (Johnson 2016), from a sinusoid fit to the post-2007 Ca II S_HK time series. But this is not a photometric period — Vogt 2015&#x27;s APT photometry is flat to ~0.0002 mag, so no clean brightness-modulation period exists, and the value carries <code>method = unverified</code> (the escape hatch for a real technique outside the rotation enum). Two alternatives are documented in the DB: Motalebi 2015 found <b>42.3 d</b> from GLS periodograms of log R&#x27;HK, the CCF FWHM, and the bisector span (HARPS-N); Vogt 2015 estimated <b>~20 d</b> from v sin i = 1.8 km/s. Johnson explicitly note that the 22.83 d signal may be the first harmonic of a ~45 d period under solar-like differential rotation — i.e. the 22.83 d and 42.3 d values may be the same physical rotation seen at the fundamental and its first harmonic.",
  "p_89":"The 22.83 d period has a specific downstream consequence: it nearly coincides with planet f&#x27;s 22.8 d orbital period (Vogt 2015), which is exactly why f is flagged <code>pl_controv_flag = 1</code> — part of f&#x27;s RV amplitude could be a stellar-activity signal at the rotation period rather than a genuine planet. NearStars keeps f for gameplay variety (flagged contested in the f synthesis), but the rotation/planet coincidence is the reason for the flag.",
  "p_90":"<b>KSP implementation note.</b> Stellar rotation period = 22.83 d = 1 972 512 s. In Kopernicus the star body&#x27;s <code>rotationPeriod</code> is set in seconds. Kopernicus does not animate stellar rotation directly, but the <code>rotationPeriod</code> field is read by Principia for spin-axis bookkeeping; the contested value is carried at medium confidence with the 42.3 d alternative documented in Open items.",
  "p_91":"The rotation-axis inclination is unconstrained. The v sin i = 1.8 km/s (Vogt 2015) is consistent with both the 22.8 d and 42.3 d periods depending on the inclination, so it does not break the degeneracy. For NearStars visual rendering a generic axis orientation is adopted; the slow-to-moderate rotation makes the precise spin axis visually unimportant for the photosphere, mattering only for the timing of the spot-modulation animation.",
  "h2_92":"Visual styling",
  "p_93":"In the NearStars renderer, HD 219134 is portrayed as a bright, warm orange K3 V dwarf with a clean Sun-like activity cycle:",
  "li_94":"<b>Global appearance.</b> A warm orange disk encoded as <span class=\"hex-chip\" style=\"background:#f0a868\"></span><code>#f0a868</code>, the 4858 K blackbody continuum with the first onset of TiO band suppression of the blue — clearly warmer/redder than a G dwarf, but well short of the deep orange-red of an M dwarf. The illumination color temperature for scene lighting of the six planets is driven directly by the 4858 K SED.",
  "li_95":"<b>Spotted surface with an 11.7-yr cycle.</b> A modest cool-spot filling factor (<code>visual_spot_coverage_max ≈ 0.02</code>) that waxes and wanes over the well-measured 11.7-year magnetic cycle (Johnson 2016), superimposed on the faster rotational modulation (22.8 d / 42.3 d contested). The cfg should animate the slow cycle as the primary activity signature — distinctive because the cycle is so cleanly Sun-like for a K dwarf.",
  "li_96":"<b>Quiet corona.</b> A thin chromospheric layer and a faint corona to ~3 R★ in the &quot;corona-on&quot; rendering mode. No prominent flares or CMEs — HD 219134 is a calm host.",
  "li_97":"<b>Star in the planets&#x27; skies.</b> The star is dominant in the inner planets&#x27; skies: from b (a = 0.0382 AU) it subtends ~10.1° (about 20× the Sun&#x27;s angular size from Earth); from c (~6.0°), f (~2.7°), d (~1.6°), g (~1.0°), and from the cold giant h (~0.12°, just larger than the Sun from Earth). The disk is warm orange and floods the close-in rocky worlds with red-rich light.",
  "li_98":"<b>From Earth.</b> HD 219134 is a V = 5.53 naked-eye star in Cassiopeia — one of the very few K-dwarf exoplanet hosts visible without a telescope, thanks to its 21.3-light-year proximity. In NearStars&#x27; real-stars-only mode it appears at its Gaia DR3 J2016.0 sky position propagated linearly to the game epoch.",
  "h2_99":"Bibliography",
  "h3_100":"Read (visual-informative, drove decisions above)",
  "li_101":"<b>Ligi R. et al. 2019</b> — <i>Investigating the magnetically quiet, nearby K dwarf HD 219134 with VEGA/CHARA interferometry</i>, A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>, doi:10.1051/0004-6361/201936259). VEGA/CHARA visible-wavelength interferometry: θ_LD = 1.035 ± 0.021 mas → R = 0.726 ± 0.014 R☉; Teff = 4858 ± 50 K (θ_LD + F_bol); L = 0.264 ± 0.004 L☉; direct mass 0.696 ± 0.078 M☉ from R + transit density. <b>Phase 2 anchor for the entire stellar layer.</b>",
  "li_102":"<b>Johnson M. C. et al. 2016</b> — <i>A 12 Year Activity Cycle for the Nearby Planet Host Star HD 219134</i>, ApJ 821, 74 (<code>2016ApJ...821...74J</code>, doi:10.3847/0004-637X/821/2/74). Ca II S-index monitoring: an 11.7-year (4230 ± 100 d) magnetic activity cycle, mean log R&#x27;HK = −4.89, and the 22.83 ± 0.03 d S_HK rotation signal (with the caveat that it may be the first harmonic of a ~45 d period). <b>Phase 2 anchor for activity and rotation.</b>",
  "h3_103":"Read (context / methodology, not directly decision-driving)",
  "li_104":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I. HD 219134 b: A transiting rocky planet in a multi-planet system</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>, doi:10.1051/0004-6361/201526822). HARPS-N discovery of b/c/d/h; alternative stellar parameters (Teff 4941 K, evolutionary mass 0.78 M☉) and the 42.3 d rotation period from log R&#x27;HK + CCF FWHM/bisector periodograms — the documented rotation alternative.",
  "li_105":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT solution adding f and g; the source for the d/f/g/h orbits and minimum masses, the v sin i = 1.8 km/s, and the ~20 d rotation estimate. Notes the V~9.4 M dwarf at ~700 AU (effectively single).",
  "h3_106":"Read (instrument-only, not visual-informative)",
  "li_107":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). Spitzer photometry establishing the b and c transits and the transit-derived stellar density used in the Ligi 2019 direct mass; the anchor for the b/c planet-level masses and radii (used in their syntheses, not the stellar layer beyond ρ★).",
  "h3_108":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_109":"The HD 219134 stellar literature is dominated by the four primary papers above. Generic K-dwarf calibration surveys and the Boyajian 2012b CHARA-Classic angular diameter (superseded by the higher- resolution VEGA value) are noted in the Phase 2 DB audit trail but contribute no further cfg-decisive number. No debris-disk papers exist to read (none reported for HD 219134).",
  "h2_110":"Open items for follow-up",
  "li_111":"<b>Rotation period resolution.</b> The 22.83 d (Johnson 2016) vs 42.3 d (Motalebi 2015) contest is unresolved; the cfg carries 22.83 d (Phase 2 recommended) at medium confidence with 42.3 d documented as the alternative. A future photometric rotation detection (TESS, or long-baseline ground photometry beating the ~0.0002 mag APT floor) would break the harmonic ambiguity and could shift the <code>rotation_period_days</code> value and the f-controversy assessment.",
  "li_112":"<b>Age constraint.</b> No Phase 2 age array (models span 0.2–13.8 Gyr). If a future curation adds a gyrochronology or asteroseismic age, the null <code>age_gyr</code> should be populated; the clean 11.7 yr cycle and log R&#x27;HK = −4.89 point to an intermediate-to-old quiet K dwarf.",
  "li_113":"<b>X-ray / XUV monitoring.</b> No frozen X-ray luminosity in the DB; a Chandra/XMM or eROSITA detection would let the cfg attach a quantitative coronal output and refine the close-in planets&#x27; atmospheric-escape narratives.",
  "li_114":"<b>Planet f / g confirmation.</b> Both carry <code>pl_controv_flag = 1</code>; f&#x27;s period coincides with the 22.83 d rotation signal. If future RV + activity-indicator analysis confirms or retracts either, the planet set should be revisited (currently both kept for gameplay variety).",
  "li_115":"<b>Disk non-detection confirmation.</b> No IR-excess search result is curated; a Herschel/Spitzer/WISE non-detection (or detection) would formalize the <code>disk_present = false</code> decision now adopted on the search-and-verify &quot;none reported&quot; basis.",
  "h2_116":"Related",

  ko: {
  "p_1":"HD 219134 (HR 8832, GJ 892, HIP 114622) 는 카시오페이아자리에 있는 밝고 조용한 K3 V 왜성으로, 6.542 ± 0.002 pc (Gaia DR3 시차 152.864 ± 0.049 mas, 즉 21.33 광년) 거리에 있습니다. V = 5.53 으로, 맨눈으로 볼 수 있는 몇 안 되는 외계행성 호스트 K 왜성 중 하나입니다. 기본 파라미터는 Ligi et al. 2019 에 고정되어 있는데, 이 논문은 VEGA/CHARA 가시광 간섭계로 별을 직접 분해한 전용 항성-파라미터 논문입니다. θ_LD = 1.035 ± 0.021 mas → R = 0.726 ± 0.014 R☉ 로 Teff = 4858 ± 50 K (θ_LD + bolometric flux), L = 0.264 ± 0.004 L☉, 그리고 직접 측정 질량 M = 0.696 ± 0.078 M☉ (간섭계 반지름과 transit 으로 구한 항성 밀도를 결합) 를 얻습니다. 이로써 HD 219134 는 태양 반지름의 약 73%, 광도의 1/4 정도인 오렌지색 왜성이 됩니다. 별은 채층 활동이 조용하고 (평균 log R&#x27;HK = −4.89, Johnson 2016), 잘 측정된 11.7 년 (4230 ± 100 d) S-index 자기 활동 주기를 가지고 있는데 (Johnson 2016), 이는 K 왜성치고는 보기 드물게 깔끔한 태양형 주기입니다.",
  "p_2":"이 시스템은 인근의 가장 풍부한 super-Earth 계열 중 하나입니다. <b>transit 하는</b> 두 개의 암석 super-Earth (b 는 3.09 d, c 는 6.77 d. 둘 다 Gillon et al. 2017 의 Spitzer 측광으로 특성화), RV 로만 검출된 더 따뜻한 행성 서너 개 (d, f, g), 그리고 ~3.1 AU 에 있는 <b>cold Saturn-class 가스 거인 h</b> (Vogt et al. 2015) 가 있습니다. transit 하는 한 쌍은 질량 <i>과</i> 반지름을 모두 측정할 수 있는 드문 행운을 줍니다 — b 는 4.74 M⊕ / 1.602 R⊕, c 는 4.36 M⊕ / 1.511 R⊕ 로, 둘 다 지구보다 밀도가 높아 (6.4 및 7.0 g/cc) 알려진 transit super-Earth 중 밀도가 가장 높은 축에 듭니다. 행성 f 와 g 는 controversy flag 를 달고 있습니다 (<code>pl_controv_flag = 1</code>). f 의 22.8 일 주기는 후보 항성 자전 주기 중 하나 (Johnson 2016 의 22.83 d S_HK 신호) 와 겹치므로, RV 진폭의 일부가 행성이 아니라 활동일 수 있습니다. NearStars 는 게임플레이 다양성을 위해 f 와 g 를 모두 contested 로 표시한 채 유지합니다.",
  "p_3":"<b>NearStars 시나리오 선택은 깔끔한 태양형 11.7 년 활동 주기를 가진 밝고 조용한 오렌지색 K3 V 왜성으로, 뜨겁고 밀도 높은 암석 super-Earth, 따뜻한 RV-only super-Earth / mini-Neptune, 그리고 차가운 Saturn-class 외곽 거인까지 여섯 행성을 거느린 모습입니다.</b> 항성층은 Ligi 2019 VEGA/CHARA 간섭계 (R, Teff, L, 직접 질량) 와 Johnson 2016 활동/자전에 고정됩니다. 자전 주기는 진짜로 논쟁 중이고 (22.83 d Johnson 2016 vs 42.3 d Motalebi 2015), DB 는 이미 22.83 d 를 recommended 로 채택했으며 아래 자전 합성에 그 내용을 기록합니다. tie-break 하나가 4858 K K3 V SED 의 시각 표면 tint 를 정하고, spot-coverage 와 corona-extent 행은 낮은 신뢰도에 둡니다. 알려진 circumstellar disk 는 없습니다 — 적외선 초과 검출이나 분해 영상이 보고된 바 없어, 별은 disk 없이 렌더링합니다 (search-and-verify 정책. 지어내지 않음).",

  "td_60":"Tie-break. 조용한 K 왜성 (log R&#x27;HK = −4.89). 주기 최대에서 낮은 spot filling factor 가 S_HK 변조를 구동. 측정된 filling factor 가 아님. 깔끔한 11.7 yr 주기를 가진 별의 적당한 주기-최대값으로 ~2% disk coverage 선택",
  "td_61":"<code>visual_corona_extent_radii</code>",
  "td_62":"3.0",
  "td_63":"low",
  "td_64":"합성. log R&#x27;HK = −4.89 인 조용한 K 왜성에 맞춘 quiet-Sun 수준 corona",
  "td_65":"<code>apparent_magnitude_v_from_earth</code>",

  "td_68":"Gaia DR3 V (변환). 카시오페이아자리에서 맨눈으로 보임. K 왜성 외계행성 호스트로는 드뭄",
  "td_69":"<code>distance_pc</code>",
  "td_70":"6.542",
  "td_71":"high",
  "td_72":"Gaia DR3 시차 152.864 mas. ≈ 21.33 ly",

  "td_74":"false",
  "td_75":"high",
  "td_76":"HD 219134 에 대해 문헌상 보고된 debris disk 없음. 지어내지 않음 (search-and-verify 정책)",
  "h2_77":"표면 합성",
  "p_78":"HD 219134 는 초중기 K 왜성 특유의 따뜻한 오렌지색 광구를 가지고 있습니다. Teff = 4858 ± 50 K (Ligi 2019, 간섭계 F_bol + θ_LD) 에서 SED 는 적-오렌지 영역인 ~0.60 μm 근처에서 정점을 찍고, 광학 스펙트럼은 더 차가운 M 왜성에서야 지배적이 되는 분자 밴드 구조 (TiO, CaH, 강해지는 Ca I 4226 Å 선) 가 막 나타나기 시작합니다 — K3 에서 연속체는 아직 대부분 강한 금속선을 가진 오렌지색 blackbody 이지, M 왜성처럼 밴드에 심하게 짓눌린 스펙트럼은 아닙니다. 간섭계 반지름 R = 0.726 ± 0.014 R☉ 과 광도 L = 0.264 ± 0.004 L☉ 는 별을 태양 크기의 약 73%, 광도의 1/4 로 만들고, 근접성 (6.5 pc) 덕분에 V = 5.53 으로 넉넉히 맨눈에 보입니다.",
  "p_79":"이 별은 직접 측정한 간섭계 각지름을 가지고 있으며, 이것이 항성층 전체의 앵커입니다. VEGA/CHARA 가시광 간섭계가 θ_LD = 1.035 ± 0.021 mas 를 분해했습니다 (Ligi 2019). 이는 이전 CHARA-Classic 값 (Boyajian 2012b θ = 1.106 ± 0.007 mas) 보다 작은데, VEGA 가 더 높은 공간 주파수에 도달하기 때문이며, 기존 DB 의 unverified 0.778 R☉ 를 대체합니다. 직접 질량 M = 0.696 ± 0.078 M☉ 자체도 측정값입니다 — Ligi 는 진화 모델에 의존하는 대신 간섭계 반지름을 transit 으로 구한 항성 밀도 ρ = 1.82 ± 0.19 ρ☉ (b/c transit fit 에서, Gillon 2017) 와 결합합니다. 이는 Motalebi 2015 SYCLIST 진화 모델값 0.78 ± 0.02 M☉ 보다 recommended 이며, 두 값은 ~1.5σ 에서 일치합니다.",
  "p_80":"spot coverage 는 적당합니다. 평균 채층 지수 log R&#x27;HK = −4.89 (Johnson 2016) 는 HD 219134 를 active/inactive 경계 (~−4.75) 바로 아래에 둡니다 — 조용하지만 죽지는 않은 K 왜성으로, 매우 비활동적인 solar twin (61 Vir −5.01, τ Ceti) 보다는 활기차고, 젊은 활동성 왜성보다는 훨씬 잔잔합니다. 활동의 결정적 특징은 Ca II S-index 에서 보이는 깔끔한 태양형 <b>11.7 년 자기 주기</b> (4230 ± 100 d, Johnson 2016) 입니다 — 태양의 ~11 yr 주기를 유달리 잘 분해한 유사체로, K 왜성에는 드뭅니다. cfg 는 11.7 yr 주기에 맞춰 커지고 작아지는 적당한 cool-spot filling factor (주기 최대에서 ~2%) 와 그 기저의 자전 변조 (논쟁 중인 22.8 d / 42.3 d 주기. 자전 &amp; spin 절 참조) 를 함께 렌더링합니다.",
  "p_81":"Phase 2 층에는 금속도가 큐레이션되어 있지 않고 여기서도 합성하지 않습니다. 고정 Teff 에서 금속도가 렌더링된 K 왜성 색에 미치는 효과는 인지 한계 이하이고, 프로젝트 정책상 신규 호스트에 대해서는 스킵합니다. debris disk 도 없습니다 — HD 219134 주위 disk 의 적외선 초과 검출이나 분해 영상이 보고된 바 없어 별은 disk 없이 렌더링합니다. 시각 오렌지 tint <span class=\"hex-chip\" style=\"background:#f0a868\"></span><code>#f0a868</code> 은 Sol 의 거의 흰색 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 과 M 왜성의 더 깊은 오렌지-레드 사이에 자리하며, 4858 K 광구를 NearStars 카탈로그의 따뜻한 오렌지 K3 V 앵커로 인코딩합니다.",
  "h2_82":"대기 합성",
  "p_83":"주계열성은 행성 cfg 의미에서의 &quot;대기&quot;를 가지지 않습니다. 항성 합성에서 이 절은 채층, corona, 그리고 자기 활동 주기를 다룹니다.",
  "p_84":"HD 219134 의 채층과 corona 는 조용하고 성숙한 K 왜성의 것입니다. 평균 Ca II H&amp;K 채층 지수 log R&#x27;HK = −4.89 (Johnson 2016) 는 별을 비활동 locus 안쪽 가장자리에 둡니다. 결정적 특징은 <b>자기 활동 주기</b>입니다. Johnson 2016 은 Ca II S-index 에서 깔끔한 11.7 년 (4230 ± 100 d) 주기성과 잘 정의된 진폭 (S_HK 진폭 0.0077 ± 0.0003) 을 측정했는데, K 왜성치고는 놀랄 만큼 태양형인 주기입니다. cfg 가 애니메이션해야 할 것은 단일 정적 활동 수준이 아니라 이 주기입니다 — 더 빠른 자전 변조 위에 겹쳐, 채층 밝기와 spot coverage 가 11.7 yr 주기에 걸쳐 천천히 커지고 작아지는 모습입니다.",
  "p_85":"장기 X-ray 주기는 발표된 바 없고 DB 에도 X-ray 광도 측정이 없어, cfg 는 명시적인 log L_X 범위를 합성하지 않습니다. log R&#x27;HK = −4.89 인 조용한 K3 V 의 예상 coronal 출력은 매우 조용한 G/K 왜성보다는 약간 높지만 활동성 왜성보다는 한참 낮습니다 — 가까운 transit 행성 b, c 에게 온화한 우주 환경으로, 이들의 무대기 / 얇은 대기 상태는 공격적인 항성풍이 아니라 일사와 escape 로 결정됩니다.",
  "p_86":"corona/채층 시각 범위는 quiet-Sun 기준으로 렌더링합니다 — ~1.005 R★ 의 얇은 채층과 인게임 &quot;corona-on&quot; 모드에서만 보이는 ~3 R★ 까지의 희미한 corona 입니다. 적분 XUV 광도는 10⁻⁴ L_bol 보다 한참 아래에 머뭅니다. 이는 가까운 행성들의 대기 보유에 중요하지만 각 행성의 Phase 3 합성에서 다룹니다.",
  "h2_87":"자전 &amp; spin 합성",
  "p_88":"HD 219134 의 자전 주기는 진짜로 논쟁 중이며, cfg 는 그 논쟁을 명시적으로 담습니다. Phase 2 recommended 값은 <b>P_rot = 22.83 ± 0.03 d</b> (Johnson 2016) 로, 2007 이후 Ca II S_HK 시계열에 대한 sinusoid fit 에서 나옵니다. 그러나 이것은 측광 주기가 아닙니다 — Vogt 2015 의 APT 측광이 ~0.0002 mag 까지 평탄해서 깔끔한 밝기-변조 주기가 존재하지 않고, 값은 <code>method = unverified</code> (자전 enum 밖의 실제 기법을 담는 탈출구) 를 달고 있습니다. DB 에는 두 가지 대안이 기록되어 있습니다. Motalebi 2015 는 log R&#x27;HK, CCF FWHM, bisector span 의 GLS periodogram 에서 <b>42.3 d</b> 를 발견했고 (HARPS-N), Vogt 2015 는 v sin i = 1.8 km/s 에서 <b>~20 d</b> 로 추정했습니다. Johnson 은 22.83 d 신호가 태양형 차등 자전 하 ~45 d 주기의 1차 harmonic 일 수 있다고 명시적으로 지적합니다 — 즉 22.83 d 와 42.3 d 값이 기본 주파수와 그 1차 harmonic 으로 본 동일한 물리적 자전일 수 있다는 뜻입니다.",
  "p_89":"22.83 d 주기는 특정한 하류 결과를 낳습니다. 이는 행성 f 의 22.8 d 궤도 주기 (Vogt 2015) 와 거의 일치하는데, 바로 이것이 f 가 <code>pl_controv_flag = 1</code> 로 표시된 이유입니다 — f 의 RV 진폭 일부가 진짜 행성이 아니라 자전 주기에서의 항성-활동 신호일 수 있습니다. NearStars 는 게임플레이 다양성을 위해 f 를 유지하지만 (f 합성에서 contested 로 표시), 이 자전/행성 일치가 그 flag 의 이유입니다.",
  "p_90":"<b>KSP 구현 노트.</b> 항성 자전 주기 = 22.83 d = 1 972 512 s 입니다. Kopernicus 에서 별 body 의 <code>rotationPeriod</code> 는 초 단위로 설정합니다. Kopernicus 는 항성 자전을 직접 애니메이션하지 않지만, <code>rotationPeriod</code> 필드는 spin-axis 부기를 위해 Principia 가 읽습니다. 논쟁 중인 값은 medium 신뢰도로 담고, 42.3 d 대안은 후속 항목에 기록합니다.",
  "p_91":"자전축 경사는 제약되지 않습니다. v sin i = 1.8 km/s (Vogt 2015) 는 경사에 따라 22.8 d 와 42.3 d 주기 양쪽 모두와 일관되어 축퇴를 깨지 못합니다. NearStars 시각 렌더링에는 일반적인 축 방향을 채택합니다. 느린-에서-적당한 자전이라 정확한 spin 축은 광구에 대해 시각적으로 거의 무의미하고, spot-변조 애니메이션의 타이밍에만 영향을 줍니다.",
  "h2_92":"비주얼 스타일",
  "p_93":"NearStars 렌더러에서 HD 219134 는 깔끔한 태양형 활동 주기를 가진 밝고 따뜻한 오렌지색 K3 V 왜성으로 표현됩니다.",
  "li_94":"<b>전역 외관.</b> <span class=\"hex-chip\" style=\"background:#f0a868\"></span><code>#f0a868</code> 로 인코딩된 따뜻한 오렌지 disk 로, 파랑을 억누르는 TiO 밴드가 막 시작된 4858 K blackbody 연속체입니다 — G 왜성보다 분명히 따뜻하고 붉지만 M 왜성의 깊은 오렌지-레드에는 한참 못 미칩니다. 여섯 행성의 장면 조명 색온도는 4858 K SED 가 직접 구동합니다.",
  "li_95":"<b>11.7 yr 주기를 가진 spotted 표면.</b> 잘 측정된 11.7 년 자기 주기 (Johnson 2016) 에 걸쳐 커지고 작아지는 적당한 cool-spot filling factor (<code>visual_spot_coverage_max ≈ 0.02</code>) 로, 더 빠른 자전 변조 (22.8 d / 42.3 d 논쟁 중) 위에 겹쳐집니다. cfg 는 느린 주기를 주된 활동 신호로 애니메이션해야 합니다 — K 왜성에 이렇게 깔끔하게 태양형 주기가 나타나는 것이 독특하기 때문입니다.",
  "li_96":"<b>조용한 corona.</b> &quot;corona-on&quot; 모드에서 ~3 R★ 까지의 얇은 채층과 희미한 corona. 두드러진 플레어나 CME 는 없습니다 — HD 219134 는 잔잔한 호스트입니다.",
  "li_97":"<b>행성들의 하늘에 뜬 별.</b> 별은 안쪽 행성들의 하늘을 지배합니다. b (a = 0.0382 AU) 에서는 ~10.1° 를 차지하고 (지구에서 본 태양 각 크기의 약 20 배), c (~6.0°), f (~2.7°), d (~1.6°), g (~1.0°), 그리고 차가운 거인 h (~0.12°, 지구에서 본 태양보다 약간 큼) 순으로 작아집니다. disk 는 따뜻한 오렌지색이고 가까운 암석 세계들을 붉은빛이 풍부한 빛으로 적십니다.",
  "li_98":"<b>지구에서 본 별.</b> HD 219134 는 카시오페이아자리의 V = 5.53 맨눈 별입니다 — 21.3 광년의 근접성 덕분에 망원경 없이 보이는 몇 안 되는 K 왜성 외계행성 호스트 중 하나입니다. NearStars 의 실제-별-전용 모드에서는 Gaia DR3 J2016.0 천구 위치를 게임 epoch 로 선형 전파한 자리에 나타납니다.",
  "h2_99":"참고 문헌",
  "h3_100":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_101":"<b>Ligi R. et al. 2019</b> — <i>Investigating the magnetically quiet, nearby K dwarf HD 219134 with VEGA/CHARA interferometry</i>, A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>, doi:10.1051/0004-6361/201936259). VEGA/CHARA 가시광 간섭계. θ_LD = 1.035 ± 0.021 mas → R = 0.726 ± 0.014 R☉. Teff = 4858 ± 50 K (θ_LD + F_bol). L = 0.264 ± 0.004 L☉. R + transit 밀도에서 직접 구한 질량 0.696 ± 0.078 M☉. <b>항성층 전체의 Phase 2 앵커.</b>",
  "li_102":"<b>Johnson M. C. et al. 2016</b> — <i>A 12 Year Activity Cycle for the Nearby Planet Host Star HD 219134</i>, ApJ 821, 74 (<code>2016ApJ...821...74J</code>, doi:10.3847/0004-637X/821/2/74). Ca II S-index 모니터링. 11.7 년 (4230 ± 100 d) 자기 활동 주기, 평균 log R&#x27;HK = −4.89, 그리고 22.83 ± 0.03 d S_HK 자전 신호 (~45 d 주기의 1차 harmonic 일 수 있다는 단서 포함). <b>활동과 자전의 Phase 2 앵커.</b>",
  "h3_103":"읽음 (맥락 / 방법론, 직접 결정을 견인하지 않음)",
  "li_104":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I. HD 219134 b: A transiting rocky planet in a multi-planet system</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>, doi:10.1051/0004-6361/201526822). b/c/d/h 의 HARPS-N 발견. 대안 항성 파라미터 (Teff 4941 K, 진화 모델 질량 0.78 M☉) 와 log R&#x27;HK + CCF FWHM/bisector periodogram 에서 나온 42.3 d 자전 주기 — 기록된 자전 대안.",
  "li_105":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). f 와 g 를 추가한 Keck/HIRES + APT 해. d/f/g/h 의 궤도와 최소 질량, v sin i = 1.8 km/s, ~20 d 자전 추정의 출처. ~700 AU 의 V~9.4 M 왜성을 언급 (사실상 단일성).",
  "h3_106":"읽음 (instrument-only, 시각 정보 아님)",
  "li_107":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). b 와 c 의 transit 과 Ligi 2019 직접 질량에 쓰인 transit 밀도를 확립한 Spitzer 측광. b/c 행성별 질량과 반지름의 앵커 (ρ★ 를 넘어서는 부분은 각 행성 합성에서 쓰임, 항성층에서는 아님).",
  "h3_108":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_109":"HD 219134 항성 문헌은 위 네 편의 주요 논문이 지배합니다. 일반적인 K 왜성 캘리브레이션 서베이와 Boyajian 2012b CHARA-Classic 각지름 (더 높은 해상도의 VEGA 값으로 대체됨) 은 Phase 2 DB 감사 추적에 적혀 있지만 더 이상의 cfg 결정값을 주지 않습니다. 읽을 debris-disk 논문은 없습니다 (HD 219134 에 보고된 바 없음).",
  "h2_110":"후속 항목",
  "li_111":"<b>자전 주기 해소.</b> 22.83 d (Johnson 2016) vs 42.3 d (Motalebi 2015) 논쟁은 미해결입니다. cfg 는 22.83 d (Phase 2 recommended) 를 medium 신뢰도로 담고 42.3 d 를 대안으로 기록합니다. 향후 측광 자전 검출 (TESS, 또는 ~0.0002 mag APT 바닥을 이기는 장기 지상 측광) 이 harmonic 모호성을 깨고 <code>rotation_period_days</code> 값과 f-논쟁 평가를 바꿀 수 있습니다.",
  "li_112":"<b>나이 제약.</b> Phase 2 나이 배열 없음 (모델은 0.2–13.8 Gyr 범위). 향후 큐레이션이 gyrochronology 나 asteroseismic 나이를 추가하면 null <code>age_gyr</code> 를 채워야 합니다. 깔끔한 11.7 yr 주기와 log R&#x27;HK = −4.89 는 중년~노년의 조용한 K 왜성을 가리킵니다.",
  "li_113":"<b>X-ray / XUV 모니터링.</b> DB 에 고정된 X-ray 광도 없음. Chandra/XMM 이나 eROSITA 검출이 있으면 cfg 가 정량적 coronal 출력을 붙이고 가까운 행성들의 대기-escape 서술을 정밀화할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
