  "h2_113":"Surface synthesis",
  "p_114":"δ Pavonis sits in the brief but visually consequential subgiant phase: core hydrogen has been exhausted, a thin hydrogen-burning shell is beginning to inflate the envelope, and the star is climbing the subgiant branch toward the base of the red-giant branch. The result is a photosphere ~20% larger and ~200 K cooler than a G8V dwarf would be at the same mass. The Stefan–Boltzmann luminosity of 1.20 L☉ — slightly higher than its G8V analogs because the radius gain outpaces the temperature drop — gives the star a paradoxical character: redder than the Sun in color, but still slightly brighter.",
  "p_115":"The integrated disk color shifts noticeably toward amber-cream compared to a G2V Sun. At Teff = 5604 K the blackbody peak sits near 518 nm — yellow-green still, but the slope across visible wavelengths is shallower than a G2V, with more red and less blue than Sol. Compounded by the +0.33 dex super-solar metallicity (which reddens the visible continuum by ~30 K equivalent via line blanketing), the cfg tint <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code> captures the warmer cream of an evolved G8 star. The contrast with α Cen A&#x27;s <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> (a G2V at 5847 K) is real and visible in side-by-side renders.",
  "p_116":"Limb darkening is stronger than for a G2V because the cooler, more extended atmosphere has a longer photon mean-free-path near the limb. The H-band α exponent of ≈0.16 (Claret 2011 LD tables interpolated to G8IV) is ~15% higher than α Cen A&#x27;s measured 0.14 — a subtle but real visual effect in fly-by renders, with the limb appearing distinctly more shadowed than for a G2V dwarf.",
  "p_117":"Spot coverage is modest. Without a measured rotation period or cycle, photometric variability constraints are loose (Hipparcos H_p amplitude &lt; 0.005 mag), but log R&#x27;HK = -5.10 (Henry 1996) places δ Pav firmly in the inactive G subgiant locus — quieter than α Cen A, comparable to the most magnetically dead stars in the Mt. Wilson sample. For the cfg renderer, spot density is set to half the solar-maximum value and randomly distributed, with no strong cycle modulation.",
  "h2_118":"Atmosphere synthesis",
  "p_119":"δ Pav&#x27;s chromosphere and corona are correspondingly weak. The chromospheric Ca II H&amp;K core flux of log R&#x27;HK = -5.10 (Henry 1996; Gray 2006 NStars) lies near the chromospheric &quot;basal flux floor&quot; where no further activity decline is observed — δ Pav is essentially at the magnetic-quiescence asymptote for its evolutionary stage. The ROSAT non-detection (Hünsch 1998) places log L_X &lt; 26.6 (cgs, 0.5–2 keV) — an order of magnitude weaker than Sol at activity minimum, and consistent with the gravitational and convective weakening expected as a star expands off the main sequence.",
  "p_120":"The transition region UV emission is correspondingly faint, but δ Pav has been observed by IUE and HST/STIS, with Mg II h&amp;k and Si IV emission lines detected at weak but non-zero intensity. No measured flares — δ Pav is among the most flare-quiet stars in the local sample, with no events reported in any monitoring campaign. Integrated XUV luminosity is ≲ 10⁻⁵ L_bol, well below thresholds that would erode atmospheres on candidate inner planets even over the full 7 Gyr age of the system.",
  "p_121":"The benign space-weather state has interesting implications for any hypothetical (currently unconfirmed) planet: at δ Pav&#x27;s habitable zone — roughly 1.0–1.7 AU based on Kopparapu 2013 conservative limits scaled to 1.20 L☉ — XUV-driven atmospheric escape would be negligible across the system&#x27;s full lifetime. The cfg encodes a benign stellar-wind environment with no significant CME flux for in-game atmospheric retention modeling.",
  "p_122":"The stellar atmosphere itself, at the photosphere, shows the canonical G8IV temperature inversion at the chromospheric onset: T drops from 5604 K at τ=1 to a temperature minimum near 4200 K around τ ≈ 10⁻⁴, then rises through the chromosphere to ~10⁴ K and the transition region to ~10⁵ K. The cool temperature minimum is deeper and broader than in G2V Sol, characteristic of the lower acoustic flux from the larger, slower-convecting envelope.",
  "h2_123":"Rotation &amp; spin synthesis",
  "p_124":"δ Pavonis rotates slowly — exactly how slowly is poorly determined. The projected rotational velocity v sin i ≈ 1.7 km/s (Bensby 2014; Valenti &amp; Fischer 2005 give similar values from HARPS / Keck spectra) combined with R = 1.22 R☉ gives an <i>upper limit</i> on rotational velocity of 2π·R/P_rot ≥ 1.7 km/s, implying P_rot · sin i ≤ 36 d. Without an inclination constraint the period is bounded only from above; for i = 90° (equator-on) P_rot ≤ 36 d, and for typical random inclinations the most probable period is ~30 d.",
  "p_125":"Skumanich braking applied from a G8V zero-age main-sequence rotation of ~5 d, scaled to 7 Gyr by P ∝ √t, predicts ~50 d — but the subgiant expansion further slows the surface rotation by angular momentum conservation as the envelope inflates. The Spada &amp; Lanzafame 2020 subgiant rotation models predict 30–45 d at this evolutionary stage for an initial main-sequence rotation period of 25–35 d. The cfg adopts 30 d as a within-window estimate, flagged Confidence=low, and notes the open item for future photometric monitoring.",
  "p_126":"No direct asteroseismic detection of rotation splitting exists; the Bruntt 2010 ground-based campaign detected p-mode oscillations (ν_max ≈ 2300 µHz, Δν ≈ 110 µHz, consistent with M ≈ 1.05 M☉ and R ≈ 1.22 R☉) but the data quality was insufficient to resolve rotational splittings of the modes. A future TESS or PLATO campaign would tighten this; the cfg open items log the dependency.",
  "p_127":"Obliquity is unconstrained observationally. For an isolated single star with no companion to torque the spin axis, default to obliquity = 0° relative to the spin angular momentum reference frame; the cfg encodes 0° as a within-window default with no special tilt for visual flair.",
  "h2_128":"Visual styling",
  "p_129":"In the NearStars renderer, δ Pavonis is portrayed as an old, quiet G8 subgiant viewed against a faint cold debris ring. Key visual choices:",
  "li_130":"<b>Global appearance</b> — a warm amber-cream stellar disk (<span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>), distinctly redder than the cream-white of α Cen A but warmer in tint than a K-dwarf orange. Side-by-side with G2V Sol the contrast is subtle but real; alone in a planet sky δ Pav reads as &quot;a tired Sun, slightly redder, slightly larger.&quot;",
  "li_131":"<b>Disk detail</b> — at a hypothetical close-fly-by render, the photospheric granulation is rendered with ~5% lower contrast than G2V because the larger, slower-convecting envelope produces shallower temperature differentials between hot rising plumes and cool intergranular lanes. Granulation cells are ~30% larger in angular size (scaled by R*).",
  "li_132":"<b>Limb appearance</b> — visibly more darkened toward the limb than α Cen A, due to the cooler photosphere and stronger H⁻ opacity at oblique viewing angles. The limb appears noticeably shadowed in fly-by renders.",
  "li_133":"<b>Corona / chromosphere</b> — rendered as a thin, faint ring at 1.6 R★ (<code>visual_corona_extent_radii</code>), reflecting the very weak chromospheric and coronal emission. No active prominence rendering; no flare visual.",
  "li_134":"<b>Spots / faculae</b> — set to half the solar-minimum amplitude, randomly distributed at low latitudes, with no cycle modulation in the current cfg.",
  "li_135":"<b>Cold debris ring</b> — at 30–80 AU from the star, the cfg attaches a Kopernicus ring with very low opacity (0.02) and a faint warm-grey tint (<span class=\"hex-chip\" style=\"background:#3a2a18\"></span><code>#3a2a18</code>). The ring is just barely visible in long-exposure renders from the inner system; from a candidate planet at 1.3 AU the ring would appear as a thin band of dust reflected sunlight, far fainter than the Zodiacal light at Earth. The morphology is rendered as a single uniform belt because Herschel did not resolve the belt and the SED supports a single cold component; if future ALMA / JWST imaging reveals asymmetries or multiple components, this picks would be revisited (see Open items).",
  "li_136":"<b>Apparent diameter from candidate HZ</b> — a hypothetical 1 M⊕ planet at 1.3 AU would see δ Pav fill ~0.50° angular diameter, comparable to Sol from Earth (0.53°).",
  "li_137":"<b>Sky from disk</b> — a hypothetical observer at the inner edge of the debris belt (~30 AU) would see δ Pav as a brilliant amber-cream point of 1.2/(30)² = 1.3×10⁻³ L☉/AU² illumination, i.e. about 1/770 of Sol-at-Earth — clearly star-like, casting long shadows but not solar-bright. The inner zodiacal-dust scattering plus the outer belt would create a faint band of light along the ecliptic.",
  "li_138":"<b>Isolation cue</b> — unlike the α Cen system&#x27;s binary-pair rendering, δ Pav stands alone. No second sun, no orbital conjunction events. The visual styling leans on the disk and the subgiant color to give the star personality.",
  "h2_139":"Bibliography",
  "h3_140":"Read (visual-informative, drove decisions above)",
  "li_141":"<b>Eiroa C. et al. 2013</b> — <i>DUNES: Disc Around NEarby Stars with Herschel</i>, A&amp;A 555, A11 (<code>2013A&amp;A...555A..11E</code>, arXiv:1305.0155). Herschel/PACS survey of 133 nearby FGK stars; δ Pavonis detected at 70/100/160 µm; SED fit gives single cold belt at T_d ≈ 55 K with L_d/L_★ ≈ 2×10⁻⁵.",
  "li_142":"<b>Lawler S. M. &amp; Tanner A. M. 2014</b> — <i>Tracing planet formation with detailed analysis of debris disk SEDs</i> (<code>2014ApJ...780...28L</code>, arXiv:1310.3559). Modified-blackbody analysis of Eiroa 2013 data including δ Pav; refined belt geometry r ≈ 30–80 AU, dust mass ~0.012 M⊕, planetesimal-replenishment requirement from age argument.",
  "li_143":"<b>Beichman C. A. et al. 2006</b> — <i>New Debris Disks around Nearby Main-Sequence Stars: Impact on the Direct Detection of Planets</i> (<code>2006ApJ...652.1674B</code>). Spitzer/MIPS 70 µm detection of δ Pav excess; first announcement of the disk.",
  "li_144":"<b>Bensby T. et al. 2014</b> — <i>Exploring the Milky Way stellar disk: A detailed elemental abundance study of 714 F and G dwarf stars</i> (<code>2014A&amp;A...562A..71B</code>, arXiv:1309.2631). FEROS high-resolution spectroscopy gives Teff = 5587 ± 50 K, log g = 4.05, [Fe/H] = +0.33, v sin i = 1.7 km/s — anchors the metallicity and rotation upper-limit picks.",
  "li_145":"<b>Holmberg J., Nordström B., Andersen J. 2009</b> — <i>The Geneva-Copenhagen survey of the solar neighbourhood. III. Improved distances, ages, and kinematics</i> (<code>2009A&amp;A...501..941H</code>, arXiv:0811.3982). Isochrone age 6.6 Gyr; consistent with the subgiant evolutionary phase.",
  "li_146":"<b>Spada F. et al. 2011</b> — <i>Stellar evolutionary models with rotation-induced mixing applied to nearby subgiants</i> (<code>2011MNRAS.418..759S</code>, arXiv:1107.1979). δ Pav modeled as a ~1.05 M☉ subgiant near base of subgiant branch; age 7.5 Gyr; combined with Holmberg gives adopted 7.0 ± 0.5 Gyr.",
  "h3_147":"Read (context / methodology, not directly decision-driving)",
  "li_148":"<b>Mawet D. et al. 2017</b> — <i>Characterization of Exoplanets from Their Formation. I.</i> (<code>2017AJ....153...44M</code>, arXiv:1609.06163). NIRC2 vortex coronagraph deep imaging of δ Pav and other nearby FGK stars; companion mass limits ~3 M_Jup at &gt;1 AU; confirms no giant planets in the cold disk inner region.",
  "li_149":"<b>Lannier J. et al. 2017</b> — <i>Combining direct imaging and radial velocity data toward a full exploration of the giant planet population</i> (<code>2017A&amp;A...603A..54L</code>, arXiv:1705.03477). δ Pav included in SPHERE direct-imaging survey; no companions detected.",
  "li_150":"<b>Tinney C. G. et al. 2005</b> — <i>The Anglo-Australian Planet Search. XI. Five Planets and a Brown Dwarf</i> (<code>2005ApJ...623L.121T</code>). HARPS / AAPS RV monitoring of δ Pav; no planet detection above m sin i ~ 10 M⊕ at &lt;2 AU; sets the RV non-detection baseline.",
  "li_151":"<b>Bruntt H. et al. 2010</b> — <i>Accurate fundamental parameters for 23 bright solar-type stars</i> (<code>2010MNRAS.405.1907B</code>, arXiv:1002.4268). Interferometric R = 1.22 R☉ + asteroseismic modeling for δ Pav; ν_max ≈ 2300 µHz, Δν ≈ 110 µHz consistent with adopted mass.",
  "li_152":"<b>Henry T. J. et al. 1996</b> — <i>Chromospheric Activity Survey</i> in the southern hemisphere (<code>1996AJ....111..439H</code>). Log R&#x27;HK = -5.10 for δ Pav, one of the most chromospherically quiet G subgiants in the local sample.",
  "li_153":"<b>Hünsch M. et al. 1998</b> — <i>ROSAT All-Sky Survey of nearby stars</i> (<code>1998A&amp;AS..132..155H</code>). δ Pav X-ray non-detection with upper limit log L_X &lt; 26.6 cgs.",
  "li_154":"<b>Gray R. O. et al. 2006</b> — <i>NStars: Spectral Classifications of Nearby Stars</i> (<code>2006AJ....132..161G</code>, arXiv:astro-ph/0603770). Confirms G8IV classification and log R&#x27;HK = -5.10.",
  "li_155":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>Spectroscopic Properties of Cool Stars (SPOCS)</i> (<code>2005ApJS..159..141V</code>). v sin i and chromospheric measurements; supports Bensby 2014.",
  "h3_156":"Read (instrument / non-cfg-decisive)",
  "li_157":"<b>Trilling D. E. et al. 2008</b> — <i>Debris Disks around Sun-like Stars</i> (<code>2008ApJ...674.1086T</code>). Spitzer 24/70 µm survey including δ Pav; context for the disk detection census.",
  "li_158":"<b>Spada F. &amp; Lanzafame A. C. 2020</b> — <i>Asteroseismic rotation for subgiants</i> (<code>2020A&amp;A...636A..76S</code>, arXiv:2003.06224). Sets the rotation-period model floor for δ Pav-class subgiants used in the Rotation &amp; spin synthesis.",
  "li_159":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable Zones around Main-Sequence Stars: New Estimates</i> (<code>2013ApJ...765..131K</code>). HZ limits scaled to 1.20 L☉ give 1.0–1.7 AU conservative range — used in the Atmosphere synthesis prose.",
  "h3_160":"Not read — no arXiv preprint or low-priority (~25 papers)",
  "p_161":"Conference abstracts (DPS, EPSC, AAS), follow-up notes on the disk SED with no new data (~12 follow-up references), and one-line catalog mentions in survey papers contribute no cfg-decisive content. Mt. Wilson HK survey notes (Wright 2004) confirm the log R&#x27;HK floor but add no new constraint beyond Henry 1996. The full filtered bib will be preserved in <code>docs/phase3/_bib/delta-pavonis.yaml</code> with <code>status: skipped</code> annotations once the bib retrieval pipeline runs for this star (currently pending — see Open items).",
  "h2_162":"Open items for follow-up",
  "li_163":"<b>Phase 2 <code>disk_measurements</code> ingest</b>. The DB <code>delta_pavonis.json</code> currently has no <code>disk_measurements</code> block; the Herschel/PACS fluxes (Eiroa 2013), Lawler &amp; Tanner 2014 SED-fit geometry, and Spitzer 70 µm excess (Beichman 2006) should be ingested as paper-cited Phase 2 measurements before this synthesis is promoted from Confidence=medium on the disk geometry rows.",
  "li_164":"<b>Resolved imaging (ALMA / JWST-MIRI)</b>. The 30–80 AU belt at 6.1 pc spans ~5–13″ on the sky — well within ALMA&#x27;s 1″ angular resolution at Band 6, and just inside MIRI&#x27;s coronagraph inner working angle. A resolved-imaging campaign would tighten inner/outer radius, detect any belt asymmetries or warps (which would imply unseen planetary perturbers), and constrain inclination. Confidence on disk geometry would rise to high.",
  "li_165":"<b>Subgiant age refinement</b>. The 7.0 ± 0.5 Gyr age rests on isochrones (Holmberg 2009) and one-parameter subgiant models (Spada 2011). PLATO-class asteroseismology, when it observes δ Pav, would resolve the p-mode rotation splitting and tighten the age to ~5%. The cfg <code>age_gyr</code> Confidence would rise from medium to high.",
  "li_166":"<b>Photometric rotation period</b>. TESS Cycle 4+ should observe δ Pav (declination favorable for the southern continuous viewing zone); a clean rotation-period detection would replace the current Confidence=low estimate.",
  "li_167":"<b><code>docs/phase3/_bib/delta-pavonis.yaml</code> bib retrieval</b>. The bibliography YAML has not been generated by the ADS+arXiv pipeline yet — run after the DB Phase 2 disk ingest is complete so the disk papers are included in the score-ranked output.",

  ko: {
  "p_1":"δ Pavonis (HD 190248, HIP 99240, GJ 780) 는 태양에 가장 가까운 G 형 subgiant 별 중 하나로, 거리는 6.10 ± 0.005 pc 입니다 (Gaia DR3 시차 163.95 ± 0.12 mas). 분광형 G8IV (Gray 2006 NStars, Houk &amp; Cowley 1975) 는 주계열을 막 벗어난 단계를 의미합니다. 중심 수소가 소진되고 수소 껍질 연소가 시작되며 외피가 부풀어 오르는 시점입니다. 유효 온도 5571 K (Rains 2020 VLTI/PIONIER 간섭계) 와 V = 3.56 으로, 남반구에서 가장 밝은 G subgiant 이자 인근 subgiant 연구의 교과서적 표적입니다. 확정된 행성은 없습니다. 초고정밀 RV (HARPS, Tinney 2005, Mawet 2017) 와 직접 촬영 (Lannier 2017) 캠페인 이 1 AU 에서 ~3 M_Jup 이상, 거주가능영역에서 해왕성 질량 이상을 모두 배제했으며, ESPRESSO 시대에는 이 한계가 더 깊이 내려갑니다.",
  "p_2":"대신 δ Pav 가 가진 것은 차가운 잔해 원반입니다. Spitzer/MIPS 70 µm 초과 (Beichman 2006) 로 처음 검출됐고, Herschel/PACS 가 70, 100, 160 µm 측광으로 확인했습니다 (Eiroa 2013 DUNES, Lawler &amp; Tanner 2014). SED 에 대한 modified blackbody fit 은 약 30–80 AU 의 단일 차가운 belt 를 주며, 먼지 온도 T_d ≈ 55 K, 먼지 질량 M_d ~ 0.01 M⊕ 입니다. 작지만 명확하며, 무엇보다 오래된 시스템 (나이 ~9 Gyr, Holmberg 2009) 에 존재한다는 점이 핵심입니다. 이는 충돌로 보충되는 microplanetesimal 저 장소가 얇은 카이퍼 belt 와 유사한 형태로 존재한다는 것을 의미합니다.",
  "p_3":"<b>NearStars 시나리오 선택. 약간 부풀어 오른, G8V 왜성보다 살짝 더 붉은 늙고 조용한 G8 subgiant 별을, ~30–80 AU 의 희미한 단일 차가운 잔해 ring 을 배경으로 보여 줍니다.</b> 항성 파라미터는 canonical 정렬 입니다. 원반 지오메트리는 SED 역해석에만 의존하며 (Herschel 는 belt 를 분해하지 못함), 원반 색조와 불투명도는 medium/low 신뢰도로 표기됩니다. cfg 는 ALMA 나 JWST 가 분해할 때까지 belt 를 시각적으로 은은하게 운영합니다.",

  "td_98":"false",

  "td_100":"Eiroa 2013 / Lawler 2014 모두 Herschel PSF (70 µm 에서 ~5″) 가 6.1 pc 거리의 belt 를 분해하지 못한다고 언급 (예상 각 크기 ~5–13″). 2026 년 시점에 ALMA / JWST resolved imaging 없음",

  "td_106":"0.012",
  "td_107":"medium",
  "td_108":"Lawler &amp; Tanner 2014 먼지 질량 (mm-cm grain). planetesimal 모체 질량은 직접 제약되지 않으나 먼지 질량보다 훨씬 크다고 추정",
  "td_109":"<code>disk_planetesimal_belt_inferred</code>",
  "td_110":"true",
  "td_111":"high",
  "td_112":"나이 ~7 Gyr ≫ 50 AU 에서 µm-cm 먼지의 충돌 cascade 수명. 보충이 planetesimal 저장소를 요구 (Wyatt 2008 프레임워크, Lawler &amp; Tanner 2014 가 적용)",
  "h2_113":"Surface synthesis",
  "p_114":"δ Pavonis 는 짧지만 시각적으로 의미 있는 subgiant 단계에 있습니다. 중심 수소가 소진됐고, 얇은 수소 껍질 연소가 envelope 를 부풀리기 시작 했으며, 별은 subgiant branch 를 따라 red-giant branch 의 시작점을 향해 올라가고 있습니다. 그 결과는 같은 질량의 G8V 왜성보다 ~20% 더 크고 ~200 K 더 차가운 광구입니다. Stefan–Boltzmann 광도 1.20 L☉ 는 G8V analog 보다 약간 더 높습니다. 반지름 증가가 온도 감소를 앞지르기 때문입니다. 이로 인해 별은 역설적인 성격을 갖습니다. 태양보다 색은 붉지만 광도는 여전히 살짝 더 높습니다.",
  "p_115":"통합 disk 색은 G2V 태양에 비해 amber-cream 방향으로 눈에 띄게 이동 합니다. Teff = 5604 K 에서 흑체 피크는 518 nm 부근 (여전히 황록색) 에 있지만, 가시광 전체 기울기는 G2V 보다 완만하며 Sol 보다 적색이 더 많고 청색이 더 적습니다. +0.33 dex super-solar 금속도가 line blanketing 으로 가시광 연속체를 ~30 K 등가로 reddening 시키는 효과가 더해져, cfg 색조 <span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code> 가 진화된 G8 별의 따뜻한 cream 을 잡아 냅니다. α Cen A 의 <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> (5847 K G2V) 와의 대비는 실재하며, 나란히 렌더하면 눈에 보입니다.",
  "p_116":"Limb darkening 은 G2V 보다 강합니다. 더 차갑고 확장된 대기가 limb 근처에서 광자 평균자유경로를 길게 만들기 때문입니다. Claret 2011 LD 표를 G8IV 로 보간한 H 밴드 α 지수 ≈ 0.16 은 α Cen A 의 측정값 0.14 보다 ~15% 높으며, fly-by 렌더에서 미묘하지만 실재하는 시각 효과로 나타납니다. limb 가 G2V 왜성보다 뚜렷이 더 그늘져 보입니다.",
  "p_117":"흑점 면적은 적당합니다. 측정된 회전 주기나 사이클이 없어 광도 변동 제약은 느슨하지만 (Hipparcos H_p 진폭 &lt; 0.005 mag), log R&#x27;HK = -5.10 (Henry 1996) 은 δ Pav 를 비활성 G subgiant locus 한가운데에 단단히 놓습니다. α Cen A 보다 조용하고, Mt. Wilson 표본에서 가장 자기적으로 죽은 별들과 비슷한 수준입니다. cfg 렌더러에서는 흑점 밀도를 태양 극대 값의 절반으로 설정하고 무작위로 분포시키며, 강한 사이클 변조는 적용하지 않습니다.",
  "h2_118":"Atmosphere synthesis",
  "p_119":"δ Pav 의 색채권과 코로나도 그에 상응해 약합니다. log R&#x27;HK = -5.10 (Henry 1996, Gray 2006 NStars) 의 색채권 Ca II H&amp;K 핵 플럭스는 색채권 &quot;basal flux floor&quot; 근처에 위치합니다. 더 이상의 활동 감소가 관측되지 않는 영역으로, δ Pav 는 사실상 이 진화 단계의 자기 정적 점근선에 도달해 있습니다. ROSAT 미검출 (Hünsch 1998) 은 log L_X &lt; 26.6 (cgs, 0.5–2 keV) 를 줍니다. 활동 최저기의 태양보다 한 자릿수 약하며, 별이 주계열을 벗어나 부풀어 오를 때 예상되는 중력과 대류 약화와 일관됩니다.",
  "p_120":"전이 영역의 UV 방출은 그에 상응해 희미하지만, δ Pav 는 IUE 와 HST/STIS 로 관측됐고 Mg II h&amp;k 와 Si IV 방출선이 약하나 0 이 아닌 강도로 검출됐습니다. flare 측정은 없습니다. δ Pav 는 인근 표본에서 가장 flare 가 조용한 별 중 하나이며, 어떤 모니터링 캠페인에서도 이벤트가 보고되지 않았습니다. 통합 XUV 광도는 ≲ 10⁻⁵ L_bol 로, 시스템의 전체 7 Gyr 수명 동안 안쪽 행성 후보의 대기를 침식시킬 수 있는 임계값보다 훨씬 낮습니다.",
  "p_121":"이 우호적 우주환경은 (현재 미확인인) 가상의 행성에 흥미로운 함의를 가집니다. δ Pav 의 거주가능영역 (Kopparapu 2013 보수 한계를 1.20 L☉ 로 스케일하면 약 1.0–1.7 AU) 에서 XUV 구동 대기 탈출은 시스템 전체 수명에 걸쳐 무시할 만한 수준입니다. cfg 는 게임 내 대기 보존 모델링을 위해 의미 있는 CME 플럭스가 없는 우호적 항성풍 환경을 기록합니다.",
  "p_122":"광구 자체의 항성 대기는 색채권 시작부에서 canonical G8IV 온도 반전을 보입니다. T 는 τ=1 의 5604 K 에서 τ ≈ 10⁻⁴ 근처의 ~4200 K 온도 최저 점까지 떨어진 다음, 색채권을 통과해 ~10⁴ K 로, 전이 영역에서 ~10⁵ K 까지 상승합니다. 차가운 온도 최저점은 G2V Sol 보다 더 깊고 더 넓습니다. 더 크고 천천히 대류하는 envelope 가 내놓는 음향 플럭스가 더 낮은 특징입니다.",
  "h2_123":"Rotation &amp; spin synthesis",
  "p_124":"δ Pavonis 는 천천히 회전합니다. 얼마나 천천히인지는 잘 측정되지 않았습니다. 사영 회전 속도 v sin i ≈ 1.7 km/s (Bensby 2014, Valenti &amp; Fischer 2005 가 HARPS / Keck 분광으로 비슷한 값을 줌) 와 R = 1.22 R☉ 를 결합하면 회전 속도 <i>상한</i> 이 2π·R/P_rot ≥ 1.7 km/s, 즉 P_rot · sin i ≤ 36 d 입니다. 경사각 제약 없이는 주기가 위로만 제한됩니다. i = 90° (equator-on) 에서 P_rot ≤ 36 d, 무작위 경사각에서 가장 가능성 높은 주기는 ~30 d 입니다.",
  "p_125":"G8V zero-age main-sequence 회전 ~5 d 에서 시작해 Skumanich braking 을 P ∝ √t 로 7 Gyr 까지 스케일하면 ~50 d 가 나오지만, subgiant expansion 이 angular momentum 보존으로 envelope 가 부풀어 오를 때 표면 회전을 더 늦춥니다. Spada &amp; Lanzafame 2020 의 subgiant 회전 모델은 초기 main-sequence 회전 주기 25–35 d 인 별이 이 진화 단계에서 30–45 d 를 가진다고 예측합니다. cfg 는 window 내 추정값으로 30 d 를 채택하고 Confidence=low 로 표기하며, 향후 광도 모니터링을 위한 open item 으로 남깁니다.",
  "p_126":"회전 splitting 의 직접 asteroseismic 검출은 존재하지 않습니다. Bruntt 2010 의 지상 캠페인이 p-mode 진동을 검출했지만 (ν_max ≈ 2300 µHz, Δν ≈ 110 µHz, M ≈ 1.05 M☉ 과 R ≈ 1.22 R☉ 와 일관), 데이터 품질이 mode 의 회전 splitting 을 분해하기에 부족했습니다. 추후 TESS 또는 PLATO 캠페인이 이를 좁힐 것이며, cfg open items 가 이 의존성을 기록 합니다.",
  "p_127":"Obliquity 는 관측적으로 제약되지 않습니다. 자전축에 토크를 줄 동반자가 없는 고립된 단일 별의 경우, spin angular momentum 기준 프레임에 대한 obliquity = 0° 를 기본값으로 합니다. cfg 는 시각적 강조를 위한 특별한 기울임 없이 within-window 기본값으로 0° 를 코드화합니다.",
  "h2_128":"Visual styling",
  "p_129":"NearStars 렌더러에서 δ Pavonis 는 희미한 차가운 잔해 ring 을 배경으로 한 늙고 조용한 G8 subgiant 별로 묘사됩니다. 주요 시각 선택은 다음과 같습니다.",
  "li_130":"<b>전반적 외형.</b> 따뜻한 amber-cream 항성 디스크 (<span class=\"hex-chip\" style=\"background:#ffe8c8\"></span><code>#ffe8c8</code>). α Cen A 의 cream-white 보다 뚜렷이 더 붉지만 K 왜성 오렌지보다는 따뜻한 색조입니다. G2V Sol 과 나란히 두면 대비가 미묘하지만 실재하며, 행성 하늘에서 단독으로 보면 δ Pav 는 &quot;지친 태양, 살짝 더 붉고 살짝 더 큰&quot; 인상을 줍니다.",
  "li_131":"<b>디스크 세부.</b> 가상의 근접 fly-by 렌더에서 광구 granulation 은 G2V 보다 ~5% 낮은 대비로 렌더됩니다. 더 크고 천천히 대류하는 envelope 가 상승하는 뜨거운 plume 과 차가운 intergranular lane 사이 온도 차를 더 얕게 만들기 때문입니다. Granulation cell 은 R* 로 스케일하면 각 크기가 ~30% 더 큽니다.",
  "li_132":"<b>Limb 외형.</b> α Cen A 보다 뚜렷이 더 limb 가 어둡습니다. 더 차가운 광구와 비스듬한 시야각에서의 강한 H⁻ 불투명도 때문입니다. fly-by 렌더에서 limb 가 눈에 띄게 그늘져 보입니다.",
  "li_133":"<b>Corona / 색채권.</b> 1.6 R★ (<code>visual_corona_extent_radii</code>) 의 얇고 희미한 ring 으로 렌더됩니다. 매우 약한 색채권과 코로나 방출을 반영합니다. 활성 prominence 렌더 없음, flare 시각화도 없습니다.",
  "li_134":"<b>흑점 / faculae.</b> 태양 극소기 진폭의 절반으로 설정, 저위도에 무작위 분포, 현재 cfg 에서는 사이클 변조 없음.",
  "li_135":"<b>차가운 잔해 ring.</b> 별로부터 30–80 AU 에 Kopernicus ring 을 매우 낮은 불투명도 (0.02) 와 희미한 따뜻한 회색 색조 (<span class=\"hex-chip\" style=\"background:#3a2a18\"></span><code>#3a2a18</code>) 로 부착합니다. ring 은 안쪽 시스템에서 긴 노출 렌더로 겨우 보이는 수준이며, 1.3 AU 거리의 후보 행성에서 보면 ring 은 반사된 햇빛 먼지의 얇은 띠로 보입니다. 지구의 황도광보다 훨씬 희미합니다. Herschel 가 belt 를 분해하지 못했고 SED 가 단일 차가운 component 를 지지하므로 형태는 단일 균일 belt 로 렌더됩니다. 추후 ALMA / JWST 촬영이 비대칭이나 다중 component 를 드러내면 이 픽을 재검토합니다 (Open items 참고).",
  "li_136":"<b>후보 HZ 에서의 겉보기 각지름.</b> 1.3 AU 의 가상 1 M⊕ 행성에서 δ Pav 는 ~0.50° 각지름을 채웁니다. 지구에서 본 Sol (0.53°) 과 비슷합니다.",
  "li_137":"<b>잔해 디스크에서의 하늘.</b> 잔해 belt 의 안쪽 가장자리 (~30 AU) 에 있는 가상의 관측자는 δ Pav 를 빛나는 amber-cream 점광원으로 보게 됩니다. 조명 강도는 1.2/(30)² = 1.3×10⁻³ L☉/AU², 즉 지구에서 본 Sol 의 약 1/770 입니다. 명확히 별빛이며 긴 그림자를 드리우지만 태양-밝기는 아닙니다. 안쪽 zodiacal-dust 산란과 바깥쪽 belt 가 황도를 따라 희미한 빛의 띠를 만듭니다.",
  "li_138":"<b>고립 cue.</b> α Cen 시스템의 이중성 페어 렌더와 달리 δ Pav 는 홀로 서 있습니다. 두 번째 태양도, 궤도 conjunction 이벤트도 없습니다. 시각 styling 은 disk 와 subgiant 색조에 기대어 별에 personality 를 부여합니다.",
  "h2_139":"Bibliography",
  "h3_140":"Read (visual-informative, drove decisions above)",
  "li_141":"<b>Eiroa C. et al. 2013</b> — <i>DUNES: Disc Around NEarby Stars with Herschel</i>, A&amp;A 555, A11 (<code>2013A&amp;A...555A..11E</code>, arXiv:1305.0155). 인근 FGK 별 133 개에 대한 Herschel/PACS 서베이. δ Pavonis 가 70/100/160 µm 에서 검출되며, SED fit 으로 T_d ≈ 55 K, L_d/L_★ ≈ 2×10⁻⁵ 의 단일 차가운 belt 를 줍니다.",
  "li_142":"<b>Lawler S. M. &amp; Tanner A. M. 2014</b> — <i>Tracing planet formation with detailed analysis of debris disk SEDs</i> (<code>2014ApJ...780...28L</code>, arXiv:1310.3559). δ Pav 를 포함한 Eiroa 2013 데이터의 modified blackbody 분석. belt 지오메트리 r ≈ 30–80 AU, 먼지 질량 ~0.012 M⊕, 나이 논거로부터 planetesimal 보충 요구 정련.",
  "li_143":"<b>Beichman C. A. et al. 2006</b> — <i>New Debris Disks around Nearby Main-Sequence Stars: Impact on the Direct Detection of Planets</i> (<code>2006ApJ...652.1674B</code>). δ Pav 의 Spitzer/MIPS 70 µm 초과 검출. disk 최초 발표.",
  "li_144":"<b>Bensby T. et al. 2014</b> — <i>Exploring the Milky Way stellar disk: A detailed elemental abundance study of 714 F and G dwarf stars</i> (<code>2014A&amp;A...562A..71B</code>, arXiv:1309.2631). FEROS 고분해 분광이 Teff = 5587 ± 50 K, log g = 4.05, [Fe/H] = +0.33, v sin i = 1.7 km/s 를 줌. 금속도와 회전 상한 픽의 기준.",
  "li_145":"<b>Holmberg J., Nordström B., Andersen J. 2009</b> — <i>The Geneva-Copenhagen survey of the solar neighbourhood. III. Improved distances, ages, and kinematics</i> (<code>2009A&amp;A...501..941H</code>, arXiv:0811.3982). Isochrone 나이 6.6 Gyr. subgiant 진화 단계와 일관.",
  "li_146":"<b>Spada F. et al. 2011</b> — <i>Stellar evolutionary models with rotation-induced mixing applied to nearby subgiants</i> (<code>2011MNRAS.418..759S</code>, arXiv:1107.1979). δ Pav 를 subgiant branch 시작점 근처의 ~1.05 M☉ subgiant 로 모델링. 나이 7.5 Gyr. Holmberg 와 결합해 채택값 7.0 ± 0.5 Gyr.",
  "h3_147":"Read (context / methodology, not directly decision-driving)",
  "li_148":"<b>Mawet D. et al. 2017</b> — <i>Characterization of Exoplanets from Their Formation. I.</i> (<code>2017AJ....153...44M</code>, arXiv:1609.06163). δ Pav 와 다른 인근 FGK 별에 대한 NIRC2 vortex coronagraph 깊은 촬영. 동반자 질량 한계 &gt;1 AU 에서 ~3 M_Jup. 차가운 disk 안쪽 영역에 거대 행성이 없음을 확인.",
  "li_149":"<b>Lannier J. et al. 2017</b> — <i>Combining direct imaging and radial velocity data toward a full exploration of the giant planet population</i> (<code>2017A&amp;A...603A..54L</code>, arXiv:1705.03477). δ Pav 가 SPHERE 직접 촬영 서베이에 포함됨. 동반자 검출 없음.",
  "li_150":"<b>Tinney C. G. et al. 2005</b> — <i>The Anglo-Australian Planet Search. XI. Five Planets and a Brown Dwarf</i> (<code>2005ApJ...623L.121T</code>). δ Pav 의 HARPS / AAPS RV 모니터링. &lt;2 AU 에서 m sin i ~ 10 M⊕ 이상의 행성 검출 없음. RV 미검출 기준선 설정.",
  "li_151":"<b>Bruntt H. et al. 2010</b> — <i>Accurate fundamental parameters for 23 bright solar-type stars</i> (<code>2010MNRAS.405.1907B</code>, arXiv:1002.4268). δ Pav 의 간섭계 R = 1.22 R☉ + asteroseismic 모델링. ν_max ≈ 2300 µHz, Δν ≈ 110 µHz 이 채택 질량과 일관.",
  "li_152":"<b>Henry T. J. et al. 1996</b> — <i>Chromospheric Activity Survey</i> in the southern hemisphere (<code>1996AJ....111..439H</code>). δ Pav 의 log R&#x27;HK = -5.10. 인근 G subgiant 표본에서 가장 색채권 활동이 약한 별 중 하나.",
  "li_153":"<b>Hünsch M. et al. 1998</b> — <i>ROSAT All-Sky Survey of nearby stars</i> (<code>1998A&amp;AS..132..155H</code>). δ Pav X 선 미검출, 상한 log L_X &lt; 26.6 cgs.",
  "li_154":"<b>Gray R. O. et al. 2006</b> — <i>NStars: Spectral Classifications of Nearby Stars</i> (<code>2006AJ....132..161G</code>, arXiv:astro-ph/0603770). G8IV 분류와 log R&#x27;HK = -5.10 확인.",
  "li_155":"<b>Valenti J. A. &amp; Fischer D. A. 2005</b> — <i>Spectroscopic Properties of Cool Stars (SPOCS)</i> (<code>2005ApJS..159..141V</code>). v sin i 와 색채권 측정값. Bensby 2014 를 지지.",
  "h3_156":"Read (instrument / non-cfg-decisive)",
  "li_157":"<b>Trilling D. E. et al. 2008</b> — <i>Debris Disks around Sun-like Stars</i> (<code>2008ApJ...674.1086T</code>). δ Pav 를 포함한 Spitzer 24/70 µm 서베이. disk 검출 census 의 맥락.",
  "li_158":"<b>Spada F. &amp; Lanzafame A. C. 2020</b> — <i>Asteroseismic rotation for subgiants</i> (<code>2020A&amp;A...636A..76S</code>, arXiv:2003.06224). Rotation &amp; spin synthesis 에서 사용한 δ Pav-class subgiant 의 회전 주기 모델 floor 를 설정.",
  "li_159":"<b>Kopparapu R. K. et al. 2013</b> — <i>Habitable Zones around Main-Sequence Stars: New Estimates</i> (<code>2013ApJ...765..131K</code>). 1.20 L☉ 로 스케일한 HZ 한계가 보수적으로 1.0–1.7 AU 범위를 줌. Atmosphere synthesis 산문에서 사용.",
  "h3_160":"Not read — no arXiv preprint or low-priority (~25 papers)",
  "p_161":"학회 abstract (DPS, EPSC, AAS), 새 데이터가 없는 disk SED follow-up 노트 (~12 개 follow-up 참고), 서베이 논문 내 한 줄 카탈로그 언급은 cfg 결정에 영향이 없습니다. Mt. Wilson HK 서베이 노트 (Wright 2004) 는 log R&#x27;HK floor 를 확인하지만 Henry 1996 외에 새 제약을 추가하지 않습니다. 필터된 전체 bib 는 이 별에 대한 bib 검색 파이프라인이 실행되면 <code>docs/phase3/_bib/delta-pavonis.yaml</code> 에 <code>status: skipped</code> 주석과 함께 보존됩니다 (현재 보류 — Open items 참고).",
  "h2_162":"Open items for follow-up",
  "li_163":"<b>Phase 2 <code>disk_measurements</code> ingest.</b> DB <code>delta_pavonis.json</code> 에 현재 <code>disk_measurements</code> 블록이 없습니다. Herschel/PACS 플럭스 (Eiroa 2013), Lawler &amp; Tanner 2014 SED-fit 지오메트리, Spitzer 70 µm 초과 (Beichman 2006) 를 paper 인용 Phase 2 측정치로 ingest 해야 disk 지오메트리 행의 Confidence=medium 에서 이 합성을 격상할 수 있습니다.",
  "li_164":"<b>Resolved imaging (ALMA / JWST-MIRI).</b> 6.1 pc 거리의 30–80 AU belt 는 하늘에서 ~5–13″ 에 걸쳐 있습니다. ALMA Band 6 의 1″ 각 분해능 안에 충분히 들어가며, MIRI coronagraph inner working angle 의 안쪽에 막 들어옵니다. resolved imaging 캠페인이 안/바깥 반지름을 좁히고, belt 비대칭이나 warp (보이지 않는 행성 perturber 를 의미) 를 검출하며, 경사각을 제약할 수 있습니다. disk 지오메트리 Confidence 가 high 로 올라갑니다.",
  "li_165":"<b>Subgiant 나이 정련.</b> 7.0 ± 0.5 Gyr 나이는 isochrone (Holmberg 2009) 과 단일 파라미터 subgiant 모델 (Spada 2011) 에 기반합니다. δ Pav 를 관측할 때 PLATO 급 asteroseismology 가 p-mode 회전 splitting 을 분해해 나이를 ~5% 로 좁힐 것입니다. cfg <code>age_gyr</code> Confidence 가 medium 에서 high 로 올라갑니다.",
  "li_166":"<b>광도 회전 주기.</b> TESS Cycle 4+ 가 δ Pav 를 관측할 예정입니다 (남쪽 연속 관측 영역에 유리한 적위). 깨끗한 회전 주기 검출이 현재 Confidence=low 추정치를 대체할 것입니다.",
  "li_167":"<b><code>docs/phase3/_bib/delta-pavonis.yaml</code> bib 검색.</b> ADS+arXiv 파이프라인이 아직 이 별에 대한 bibliography YAML 을 생성하지 않았습니다. DB Phase 2 disk ingest 가 완료된 후에 실행해 disk 논문들이 점수 순 출력에 포함되도록 합니다.",
  "h2_168":"Related",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
