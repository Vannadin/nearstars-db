  "h2_94":"Surface synthesis",
  "p_95":"Proxima Centauri&#x27;s photosphere is one of the dimmest and reddest in the NearStars catalog. At 2904 K Teff and 0.141 R☉, its total luminosity is just 0.00157 L☉ — about 1/640 of the Sun. The visible continuum below 6500 Å is heavily depressed by TiO, VO, and water bands, with most of the radiated flux emerging in the near- and mid-infrared. The H-band photospheric structure is poorly modeled by 1D atmospheres (M-dwarf model atmospheres extrapolate the deep red molecular bands beyond their validated range), so the cfg adopts a tentative limb-darkening exponent α ≈ 0.4 interpolated from the Claret 2018 M-dwarf grid as a tie-break against a phenomenological dim-edge model.",
  "p_96":"The photosphere is granulation-resolved at the sub-arcsecond level in extreme close-up rendering: typical M-dwarf granulation cells ~30 km across (scaled with pressure scale height). Sunspot coverage during cycle maximum reaches estimates of 5–10% based on TiO band-depth modeling (Berdyugina 2017 review). Faculae and bright plage are visible but contribute less to the integrated luminosity than in earlier-type stars.",
  "h2_97":"Atmosphere synthesis",
  "p_98":"Proxima&#x27;s chromosphere and corona dominate its observable energy output. Reiners &amp; Basri 2008 and Reiners 2022 (CARMENES) measured a moderate mean surface field Bf ≈ 0.6 kG, and Klein 2021 (SPIRou ZDI) recovered a ~0.2 kG mostly-poloidal large-scale field with a ~0.135 kG dipole component, providing the magnetic forcing that drives the elevated UV / X-ray emission. The quiescent X-ray luminosity is log L_X ≈ 27.0 cgs (Damonte 2026), rising by an order of magnitude during flares (Fuhrmeister 2022).",
  "p_99":"Flares are the defining feature. Vida 2019 (arXiv:1907.12580) used TESS photometry to characterize the flare distribution — the typical flare amplitude in the white-light band ranges across 10²⁹–10³² erg energies over 1.49 flares/day, with super-flares (≥ 10³³ erg) at ~3 per year and events ≥ 10³⁴ erg once every two years. The most dramatic event recorded shows quasi- periodic oscillations during the decay phase, attributed to plasma oscillations in the flare loop. Burton et al. 2025 (arXiv:2503.21890) extended the flare census into millimeter wavelengths using ALMA, finding the rate of mm-bright flares is comparable to that in the optical.",
  "p_100":"The activity cycle — first detected by Wargelin et al. 2017 in ~15 years of X-ray and optical photometry, and refined by Wargelin 2024 to ~7 years — modulates both the mean flare rate and the spot-induced rotational modulation amplitude. Anglada-Escudé 2016 documents the same modulation in Hα equivalent width across the HARPS + UVES timeseries used for the Proxima b discovery.",
  "p_101":"The atmospheric loss to the Proxima planetary system is enormous: Garraffo et al. 2022 (arXiv:2211.15697) finds the stellar wind ram pressure at b&#x27;s distance ranges from 10⁴ to 10⁶ times solar values during sub-Alfvénic and super-Alfvénic transits. Coronal mass ejections carry total kinetic energies up to 10³⁴ erg per event in the Vida 2019 superflare sample.",
  "h2_102":"Rotation &amp; spin synthesis",
  "p_103":"The ~83.5-day rotation period (Benedict et al. 1998 HST photometry) is corroborated by modern optical photometry and chromospheric activity tracers — SM2020 adopts 83.2 d and the SM2025 GP fit gives 83.2 ± 1.6 d. It is long for an M5.5V — implying old age (≥ 4 Gyr based on the Newton 2018 M-dwarf gyrochronology), consistent with the ~4.85 Gyr DB Phase 2 attribution. Differential rotation has not been resolved.",
  "p_104":"Asteroseismic detection of p-modes is impossible for an M dwarf — the surface gravity is too high and the pulsation amplitudes too low — so the rotation comes entirely from spot modulation and chromospheric tracers. Suárez Mascareño 2020 §4 estimates the inclination of the rotation axis at i ≈ 35° from the spot-modulation amplitude vs. mean activity pattern, consistent with Proxima b&#x27;s orbital inclination being lower than 90°.",
  "h2_105":"Visual styling",
  "p_106":"Proxima renders as a deep red M5.5V in NearStars — the photospheric tint <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> shifts the in-game illumination color toward the visible red end, with most of the integrated SED below the V-band peak. Viewed from Proxima b at 0.0485 AU, Proxima fills 1.5° angular diameter (about 3× the apparent diameter of the Sun seen from Earth); from Proxima d at 0.029 AU it fills 2.5°. The dim red color and large angular size combine to produce a visually striking &quot;great red star&quot; appearance from close-in habitable-zone planets.",
  "p_107":"Flares are rendered as transient brightening events: the in-game flare cfg key <code>visual_flare_color_hex = #ff5e2a</code> shifts the color slightly toward orange during peak emission, mimicking the Hα-dominated optical flare spectrum (Vida 2019 + Anglada-Escudé 2016 spectra). Superflares (~3 per year of 10³³ erg, ~0.5 per year of 10³⁴ erg) produce 1–2 magnitude brightening events lasting tens of minutes, with the QPO modulation visible in the photometric decay tail.",
  "p_108":"The corona is rendered as a faint blueish halo during quiescent phases, but it brightens dramatically during X-ray-active phases of the 7-year cycle. Stellar wind streamers are not directly visible but propagate as in-game space-weather effects for any nearby planetary atmosphere.",
  "h2_109":"Bibliography",
  "h3_110":"Read (visual-informative, drove decisions above)",
  "li_111":"<b>Demory B.-O. et al. 2009</b> — <i>Mass-radius relation of low and very low-mass stars revisited with the VLTI</i>, A&amp;A 505, 205 (<code>2009A&amp;A...505..205D</code>, arXiv:0906.0602). VLTI/VINCI interferometric R = 0.141 ± 0.011 R☉ — the recommended Proxima radius.",
  "li_112":"<b>Passegger V. M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution spectroscopy</i> (<code>2019A&amp;A...627A.161P</code>, arXiv:1907.00807). High-res spectroscopic Teff = 2904 ± 51 K and H-band metallicity.",
  "li_113":"<b>Suárez Mascareño A. et al. 2016</b> — <i>Characterization of the radial velocity signal induced by rotation in late-type dwarfs</i> (<code>2016A&amp;A...595A..12S</code>, arXiv:1506.08039). Ca II H&amp;K activity index log R&#x27;HK = −5.65 ± 0.17 for GJ 551 (recalibrated to −4.98 in SM2020).",
  "li_114":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (<code>2020A&amp;A...639A..77S</code>, arXiv:2005.12114). ESPRESSO RV monitoring; adopts rotation period ~83.2 d (87 ± 12 d measured); recalibrated activity index timeseries.",
  "li_115":"<b>Suárez Mascareño A. et al. 2025</b> — <i>Diving into the planetary system of Proxima with NIRPS: Breaking the m/s barrier</i> (<code>2025A&amp;A...700A..11S</code>, arXiv:2507.21751). The current best orbital fit for Proxima b (e ≈ 0, P = 11.18465 d, Msini = 1.055 M⊕) and confirmation of Proxima d; GP rotation period 83.2 ± 1.6 d.",
  "li_116":"<b>Benedict G. F. et al. 1998</b> — <i>Photometry of Proxima Centauri and Barnard&#x27;s Star Using Hubble Space Telescope Fine Guidance Sensor 3</i>, AJ 116, 429 (<code>1998AJ....116..429B</code>). HST/FGS3 photometric rotation period 83.5 ± 0.5 d — the recommended Proxima rotation period.",
  "li_117":"<b>Anglada-Escudé G. et al. 2016</b> — <i>A terrestrial planet candidate in a temperate orbit around Proxima Centauri</i>, Nature 536, 437 (<code>2016Natur.536..437A</code>, arXiv:1609.03449). Original discovery of Proxima b; supplementary Hα flare-frequency measurements.",
  "li_118":"<b>Faria J. P. et al. 2022</b> — <i>A candidate short-period sub-Earth orbiting Proxima Centauri</i>, A&amp;A 658, A115 (<code>2022A&amp;A...658A.115F</code>, arXiv:2202.05188). Proxima d candidate at P = 5.122 d, Msini = 0.26 M⊕.",
  "li_119":"<b>Reiners &amp; Basri 2008 / Reiners et al. 2022 / Klein et al. 2021</b> — Proxima magnetic field. Reiners &amp; Basri 2008 (<code>2008A&amp;A...489L..45R</code>, arXiv:0808.2986) and Reiners 2022 (<code>2022A&amp;A...662A..41R</code>, arXiv:2204.00342, CARMENES) give a moderate mean surface field Bf ≈ 0.6 kG; Klein 2021 (<code>2021MNRAS.500.1844K</code>, arXiv:2010.14311, SPIRou ZDI) recovers a ~0.2 kG mostly-poloidal large-scale field with a ~0.135 kG dipole. (Supersedes the earlier mis-citation to the Reiners 2018 CARMENES spectral atlas <code>1711.06576</code>, which carries no Proxima field measurement.)",
  "li_120":"<b>Vida K. et al. 2019</b> — <i>Flaring Activity of Proxima Centauri from TESS Observations</i>, ApJ 884, 160 (<code>2019ApJ...884..160V</code>, arXiv:1907.12580). Flare statistics, QPO super-flare, 5 super-flares per year.",
  "li_121":"<b>Fuhrmeister B. et al. 2022</b> — <i>The high energy spectrum of Proxima Centauri simultaneously observed at X-ray and FUV wavelengths</i>, A&amp;A 663, A119 (arXiv:2204.09270). Coronal + chromospheric flare response.",
  "li_122":"<b>Wargelin B. J. et al. 2024</b> — <i>X-Ray, UV, and Optical Observations of Proxima Centauri&#x27;s Stellar Cycle</i>, A&amp;A in press (arXiv:2411.04252). Refined 7-yr activity cycle.",
  "li_123":"<b>Damonte A. et al. 2026</b> — <i>Time-resolved X-ray spectra of Proxima Centauri as seen by XMM-Newton</i> (arXiv:2512.18011). Quiescent X-ray spectroscopy and cycle modulation.",
  "li_124":"<b>Burton K. et al. 2025</b> — <i>The Proxima Centauri Campaign: First Constraints on Millimeter Flare Rates from ALMA</i> (arXiv:2503.21890). mm-band flare rate.",
  "h3_125":"Read (context / methodology, not decision-driving)",
  "li_126":"<b>Feng F. &amp; Jones H. R. A. 2018</b> — <i>Was Proxima captured by α Centauri A and B?</i> (arXiv:1709.03560). Orbit history dynamics.",
  "li_127":"<b>Kervella P. et al. 2017</b> — <i>Proxima&#x27;s orbit around α Centauri</i>, A&amp;A 598, L7 (arXiv:1611.03495). Astrometric tracking that confirms the bound triple.",
  "h3_128":"Read (instrument / non-cfg-decisive)",

  "h2_134":"Stellar wind / astrosphere",
  "p_135":"Proxima has a <b>compact astrosphere</b> — its weak wind (Ṁ ≤ 0.2 Ṁ⊙ upper limit, Wood 2001) stands off the local ISM at only <b>≲55 AU</b>. The crucial point for a radiation layer: although Proxima looks quiescent by the chromospheric measure (log R&#x27;HK underrepresents M-dwarf activity), it is a violent <b>flare star</b>, so its crew-relevant particle radiation is far HARSHER than the Sun&#x27;s — flare-dominated, not wind-dominated. Its activity cycles on ~7 yr (Wargelin 2017). It shares the same local interstellar flow as α Cen (V_ISM ≈ 25 km/s).",

  "h2_164":"Open items for follow-up",
  "li_165":"<b>Proxima c (sub-Neptune at 5.2 AU candidate)</b>: Damasso 2020 + Benedict 2020 reported astrometric + RV evidence for a third planet, but the 3σ confidence threshold has not been reached as of 2026 follow-up. If confirmed, a new <code>has_planet_c</code> Decisions row is needed; current cfg leaves the planet out.",
  "li_166":"<b>Active region latitude distribution</b>: Suárez Mascareño 2020 §4 inclination i ≈ 35° but does not resolve spot latitudes. A future Doppler-imaging campaign could constrain whether Proxima&#x27;s active regions are predominantly equatorial (like the Sun) or polar (like some young rapid rotators).",
  "li_167":"<b>Capture vs. coeval origin</b>: Feng &amp; Jones 2018 cannot distinguish; the implication for age (4.85 Gyr coeval vs. potentially much younger if captured from a star-forming region encounter) propagates into the cfg <code>age_gyr</code> confidence. A future Gaia DR4 astrometric solution might tighten the encounter dynamics.",
  "h2_168":"Related",

  ko: {
  "p_1":"Proxima Centauri (α Cen C, GJ 551) 는 태양에 가장 가까운 별로 1.301 ± 0.001 pc 에 있습니다. α Cen AB 쌍에 투영 분리 ~13 000 AU 로 중력적으로 묶여 있으며, 추정 궤도 주기는 약 547 000 년입니다 (Kervella 2017 astrometry). 분광형 M5.5Ve flare star 로 질량은 단 0.122 M☉, 반지름은 0.141 ± 0.011 R☉ (Demory et al. 2009 VLTI/VINCI 간섭계), 유효 온도 2904 ± 51 K 이며, 주계열의 깊은 빨강 끝에 자리합니다. 확인된 행성을 2개 (Proxima b — Anglada-Escudé 2016, Proxima d — Faria 2022, Suárez Mascareño et al. 2025 확정) 와 5.2 AU 의 sub-Neptune 후보 Proxima c (3σ 수준에서 아직 미확정) 를 거느립니다.",
  "p_2":"0.27 pc 떨어진 조용한 α Cen AB 쌍과 비교하면, Proxima 는 극적으로 더 에너지가 크고 변동이 심한 별입니다. 83.5 ± 0.5 일의 회전 주기 (Benedict et al. 1998 HST 광도. 최근 Suárez Mascareño 연구도 ~83 일을 뒷받침하며, SM2020 은 83.2 일을 채택하고 SM2025 GP fit 은 83.2 ± 1.6 일을 줍니다) 는 M 왜성으로서는 느린 편이며, 오래된 나이와 일관됩니다. 오래되고 느리게 도는 별이라 정상상태 색채권 지표로 보면 활동도는 중간에서 약한 수준에 그칩니다. log R&#x27;HK ≈ −5.65 ± 0.17 (Suárez Mascareño 외 2016 Ca II H&amp;K) 입니다. 그럼에도 flare 는 여전히 빈번하며, Hα 가 자주 방출 상태에 있고, moderate ~0.6 kG 평균 표면장 (Reiners &amp; Basri 2008; Reiners 2022 CARMENES) 과 ~0.2 kG 의 주로 poloidal 대규모장 (Klein 2021 SPIRou ZDI) 이 측정됐습니다. X 선, FUV, UV 출력은 약 7 년 주기로 변동하며 (Wargelin 2024) flare 가 빈번합니다. Vida 2019 의 TESS 관측이 광도 잡음 위에서 여러 flare/일 을 분해했고, 그 가운데 quasi-periodic oscillation 을 decay 단계에서 보이는 거대 superflare 도 포함됩니다. Fuhrmeister 2022 (arXiv:2204.09270) 의 X 선 + FUV 동시 flare 분광은 이 사건들의 코로나 – 색채권 동시 반응을 기록합니다.",
  "p_3":"Proxima 가 α Cen AB 와 어떤 관계를 갖는가는 중력 결합이 시사하는 만큼 확실하지는 않습니다. Feng &amp; Jones 2018 (arXiv:1709.03560) 가 조우 역학을 모델링한 결과, Proxima 가 α Cen AB 시스템과 공동 형성된 것이 아니라 포획됐을 수 있음을 결론지었습니다. 시스템 무게중심 운동학 일치는 양쪽 형성 시나리오를 모두 살려둡니다. 나이는 ~4.85 Gyr (DB Phase 2 attribution) 로 추정되어 α Cen AB 와 비슷하지만 불확실성이 상당합니다.",
  "p_4":"<b>NearStars 시나리오 선택. ~83 일 회전, moderate ~0.6 kG 평균 표면장 (sub-kG 대규모 쌍극자), 7 년 활동 사이클, 빈번한 superflare 를 가진 저질량의 깊은 빨강 M5.5Ve flare star 로, 시각적으로는 강한 빨강 연속체와 Hα flare 의 잦은 brightening, 근접 행성에서 본 가시 광채를 강조합니다.</b> 18 cfg 픽 가운데 16 은 canonical-aligned, 2 는 tie-break 입니다 (limb darkening 보간 + 특정 flare hex 색상).",

  "td_89":"Tie-break. Vida 2019 + Anglada-Escudé 2016 보충 flare 스펙트라. 게임 내 어두운 빨강 quiescent 연속체 대비 가시성을 위해 특정 hex 선택",

  "td_93":"유도",
  "h2_94":"Surface synthesis",
  "p_95":"Proxima Centauri 의 광구는 NearStars 카탈로그에서 가장 어둡고 빨간 편입니다. Teff 2904 K, 0.141 R☉ 이며 총 광도는 단 0.00157 L☉ — 태양의 약 1/640 입니다. 6500 Å 이하의 가시 연속체는 TiO, VO, 물 밴드로 크게 가라앉아 있으며, 복사 출력 대부분이 근적외선 ~ 중적외선으로 나옵니다. H 밴드 광구 구조는 1D 대기로 잘 모델링되지 않으며 (M 왜성 모델 대기가 깊은 빨강 분자 밴드를 검증 범위 밖으로 외삽함), cfg 는 phenomenological 어두운-에지 모델에 대한 tie-break 으로 Claret 2018 M 왜성 grid 에서 보간한 limb-darkening exponent α ≈ 0.4 를 잠정적으로 채택합니다.",
  "p_96":"extreme close-up 렌더링에서 광구는 sub-arcsecond 수준으로 granulation 이 분해됩니다. 전형적인 M 왜성 granulation 셀은 ~30 km 너비 (압력 스케일 높이와 스케일). 활동 극대기 동안 흑점 면적은 TiO 밴드 깊이 모델링 (Berdyugina 2017 리뷰) 기반으로 5–10% 로 추정됩니다. faculae 와 밝은 plage 도 보이지만 더 이른 분광형 별보다 통합 광도에 적게 기여합니다.",
  "h2_97":"Atmosphere synthesis",
  "p_98":"Proxima 의 색채권과 코로나가 관측 가능한 에너지 출력의 대부분을 지배합니다. Reiners &amp; Basri 2008 과 Reiners 2022 (CARMENES) 가 moderate 평균 표면장 Bf ≈ 0.6 kG 를, Klein 2021 (SPIRou ZDI) 이 ~0.2 kG 주로 poloidal 대규모장과 ~0.135 kG 쌍극자 성분을 측정했습니다. 이 자기 forcing 이 높은 UV / X 선 방출을 구동합니다. 정상상태 X 선 광도는 log L_X ≈ 27.0 cgs (Damonte 2026) 이며, flare 동안 한 자리 수 증가합니다 (Fuhrmeister 2022).",
  "p_99":"Flare 가 정의적 특징입니다. Vida 2019 (arXiv:1907.12580) 가 TESS 광도로 flare 분포를 특성화했습니다. 백색광 밴드의 전형적인 flare 진폭은 정상상태 위 0.01–0.1 등급으로, 10²⁹–10³² erg 에너지 범위에서 1.49 회/일 빈도를 보이며 (Vida 의 ≈ 50 d 동안 72 events), super-flare (≥ 10³³ erg) 는 연 ~3 회, ≥ 10³⁴ erg 사건은 2 년에 한 번 일어납니다. 기록된 가장 극적인 사건은 decay 단계에서 quasi-periodic oscillation 을 보이는데, flare loop 의 플라즈마 진동에 기인합니다. Burton et al. 2025 (arXiv:2503.21890) 가 ALMA 로 flare 검사를 밀리미터 파장까지 확장했고, 밀리미터-bright flare 의 발생률이 광학과 비슷함을 발견했습니다.",
  "p_100":"활동 사이클 — Wargelin 2017 가 ~15 년의 X 선과 광학 광도에서 처음 검출하고 Wargelin 2024 가 ~7 년으로 정련 — 은 평균 flare 비율과 흑점 유도 회전 변조 진폭을 함께 변조합니다. Anglada-Escudé 2016 도 Proxima b 발견에 사용된 HARPS + UVES timeseries 에 걸쳐 Hα 등가 폭에서 같은 변조를 기록합니다.",
  "p_101":"Proxima 행성계로의 대기 손실은 막대합니다. Garraffo et al. 2022 (arXiv:2211.15697) 는 b 거리에서의 항성풍 ram pressure 가 sub-Alfvénic 및 super-Alfvénic transit 동안 태양값의 10⁴ – 10⁶ 배 범위에 있다고 보입니다. 코로나 질량 방출은 Vida 2019 의 superflare 샘플에서 사건당 최대 10³⁴ erg 의 총 운동 에너지를 운반합니다.",
  "h2_102":"Rotation &amp; spin synthesis",
  "p_103":"~83.5 일 회전 주기 (Benedict et al. 1998 HST 광도) 는 최근 광학 광도와 색채권 활동 tracer 로 뒷받침됩니다 — SM2020 은 83.2 일을 채택하고 SM2025 GP fit 은 83.2 ± 1.6 일을 줍니다. M5.5V 로서는 길어서 오래된 나이를 시사하고 (Newton 2018 M 왜성 gyrochronology 로부터 ≥ 4 Gyr), DB Phase 2 attribution 의 ~4.85 Gyr 와 일관됩니다. 차등 회전은 분해되지 않았습니다.",
  "p_104":"p-mode 의 asteroseismic 검출은 M 왜성에서는 불가능합니다. 표면 중력이 너무 높고 진동 진폭이 너무 낮기 때문입니다. 따라서 회전은 전적으로 흑점 변조와 색채권 tracer 에서만 옵니다. Suárez Mascareño 2020 §4 는 흑점 변조 진폭 대 평균 활동 패턴으로 회전축 경사를 i ≈ 35° 로 추정합니다. Proxima b 의 궤도 경사가 90° 미만이라는 점과 일관됩니다.",
  "h2_105":"Visual styling",
  "p_106":"Proxima 는 NearStars 에서 깊은 빨강 M5.5V 로 렌더링됩니다. <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> 광구 색조가 게임 내 조명 색을 가시 빨강 쪽으로 옮기며, SED 통합값 대부분이 V 밴드 피크 아래에 있습니다. Proxima b 의 0.0485 AU 에서 보면 Proxima 가 각지름 1.5° 를 채웁니다 (지구에서 본 태양 겉보기 지름의 약 3 배). Proxima d 의 0.029 AU 에서 보면 2.5° 입니다. 어두운 빨강 색과 큰 각도 크기가 결합해 근접 거주가능영역 행성에서 본 시각적으로 인상적인 &quot;거대한 빨강 별&quot; 외관을 만듭니다.",
  "p_107":"Flare 는 일시적인 brightening 이벤트로 렌더링됩니다. 게임 내 flare cfg 키 <code>visual_flare_color_hex = #ff5e2a</code> 가 피크 방출 동안 색을 살짝 오렌지 쪽으로 옮겨, Hα 우세 광학 flare 스펙트럼 (Vida 2019 + Anglada- Escudé 2016 스펙트라) 을 모방합니다. Superflare (~3 회/년 의 10³³ erg, ~0.5 회/년 의 10³⁴ erg) 는 수십 분간 1–2 등급 brightening 이벤트를 만들며, QPO 변조가 광도 decay tail 에서 보입니다.",
  "p_108":"코로나는 정상상태 동안 희미한 푸른빛 halo 로 렌더링되며, 7 년 사이클의 X 선 활성 단계에서 극적으로 밝아집니다. 항성풍 streamer 는 직접 보이지 않지만, 인근 행성 대기에 대한 게임 내 우주환경 효과로 전파됩니다.",
  "h2_109":"Bibliography",
  "h3_110":"Read (visual-informative, drove decisions above)",
  "li_111":"<b>Demory B.-O. et al. 2009</b> — <i>Mass-radius relation of low and very low-mass stars revisited with the VLTI</i>, A&amp;A 505, 205 (<code>2009A&amp;A...505..205D</code>, arXiv:0906.0602). VLTI/VINCI 간섭계 R = 0.141 ± 0.011 R☉ — 추천 Proxima 반지름.",
  "li_112":"<b>Passegger V. M. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Photospheric parameters of target stars from high-resolution spectroscopy</i> (<code>2019A&amp;A...627A.161P</code>, arXiv:1907.00807). 고분해능 분광 Teff = 2904 ± 51 K 와 H 밴드 금속함량.",
  "li_113":"<b>Suárez Mascareño A. et al. 2016</b> — <i>Characterization of the radial velocity signal induced by rotation in late-type dwarfs</i> (<code>2016A&amp;A...595A..12S</code>, arXiv:1506.08039). GJ 551 의 Ca II H&amp;K 활동 지표 log R&#x27;HK = −5.65 ± 0.17 (SM2020 에서 −4.98 로 재보정).",
  "li_114":"<b>Suárez Mascareño A. et al. 2020</b> — <i>Revisiting Proxima with ESPRESSO</i> (<code>2020A&amp;A...639A..77S</code>, arXiv:2005.12114). ESPRESSO RV 모니터링. 회전 주기 ~83.2 d 채택 (측정값 87 ± 12 d). 재보정된 활동 인덱스 timeseries.",
  "li_115":"<b>Suárez Mascareño A. et al. 2025</b> — <i>Diving into the planetary system of Proxima with NIRPS: Breaking the m/s barrier</i> (<code>2025A&amp;A...700A..11S</code>, arXiv:2507.21751). Proxima b 의 현재 best 궤도 fit (e ≈ 0, P = 11.18465 d, Msini = 1.055 M⊕) 과 Proxima d 확정. GP 회전 주기 83.2 ± 1.6 d.",
  "li_116":"<b>Benedict G. F. et al. 1998</b> — <i>Photometry of Proxima Centauri and Barnard&#x27;s Star Using Hubble Space Telescope Fine Guidance Sensor 3</i>, AJ 116, 429 (<code>1998AJ....116..429B</code>). HST/FGS3 광도 회전 주기 83.5 ± 0.5 d — 추천 Proxima 회전 주기.",
  "li_117":"<b>Anglada-Escudé G. et al. 2016</b> — <i>A terrestrial planet candidate in a temperate orbit around Proxima Centauri</i>, Nature 536, 437 (<code>2016Natur.536..437A</code>, arXiv:1609.03449). Proxima b 의 원래 발견. supplementary Hα flare 빈도 측정.",
  "li_118":"<b>Faria J. P. et al. 2022</b> — <i>A candidate short-period sub-Earth orbiting Proxima Centauri</i>, A&amp;A 658, A115 (<code>2022A&amp;A...658A.115F</code>, arXiv:2202.05188). P = 5.122 d, Msini = 0.26 M⊕ 의 Proxima d 후보.",
  "li_119":"<b>Reiners &amp; Basri 2008 / Reiners et al. 2022 / Klein et al. 2021</b> — Proxima 자기장. Reiners &amp; Basri 2008 (<code>2008A&amp;A...489L..45R</code>, arXiv:0808.2986) 과 Reiners 2022 (<code>2022A&amp;A...662A..41R</code>, arXiv:2204.00342, CARMENES) 는 moderate 평균 표면장 Bf ≈ 0.6 kG 를, Klein 2021 (<code>2021MNRAS.500.1844K</code>, arXiv:2010.14311, SPIRou ZDI) 은 ~0.2 kG 주로 poloidal 대규모장과 ~0.135 kG 쌍극자를 측정. (자기장 측정이 없는 Reiners 2018 CARMENES 스펙트럼 atlas <code>1711.06576</code> 로의 기존 오인용을 대체.)",
  "li_120":"<b>Vida K. et al. 2019</b> — <i>Flaring Activity of Proxima Centauri from TESS Observations</i>, ApJ 884, 160 (<code>2019ApJ...884..160V</code>, arXiv:1907.12580). Flare 통계, QPO super-flare, 연 3 회의 superflare.",
  "li_121":"<b>Fuhrmeister B. et al. 2022</b> — <i>The high energy spectrum of Proxima Centauri simultaneously observed at X-ray and FUV wavelengths</i>, A&amp;A 663, A119 (arXiv:2204.09270). 코로나 + 색채권 flare 응답.",
  "li_122":"<b>Wargelin B. J. et al. 2024</b> — <i>X-Ray, UV, and Optical Observations of Proxima Centauri&#x27;s Stellar Cycle</i>, A&amp;A in press (arXiv:2411.04252). 정련된 7 년 활동 사이클.",
  "li_123":"<b>Damonte A. et al. 2026</b> — <i>Time-resolved X-ray spectra of Proxima Centauri as seen by XMM-Newton</i> (arXiv:2512.18011). 정상상태 X 선 분광과 사이클 변조.",
  "li_124":"<b>Burton K. et al. 2025</b> — <i>The Proxima Centauri Campaign: First Constraints on Millimeter Flare Rates from ALMA</i> (arXiv:2503.21890). mm 밴드 flare 발생률.",

  "li_127":"<b>Kervella P. et al. 2017</b> — <i>Proxima&#x27;s orbit around α Centauri</i>, A&amp;A 598, L7 (arXiv:1611.03495). 결합 삼중성을 확인하는 astrometric 추적.",

  "li_132":"<b>Proxima 회전/사이클의 DeWarf-equivalent.</b> 불필요 (Suárez Mascareño 2020 + Wargelin 2024 가 현재 정밀도로 같은 관측 base 를 커버).",
  "li_133":"학회 abstract, SETI / 레이저 통신 타겟팅, 항성 간 미션 제안 등은 <code>docs/phase3/_bib/proxima-cen.yaml</code> 에 <code>status: skipped</code> 주석으로 보존됩니다.",
  "h2_134":"Stellar wind / astrosphere",
  "p_135":"Proxima 는 <b>조밀한 astrosphere</b> 를 가집니다 — 약한 항성풍 (Ṁ ≤ 0.2 Ṁ⊙ 상한, Wood 2001) 이 국소 ISM 을 겨우 <b>≲55 AU</b> 에서 막아냅니다. 방사선 레이어에서 결정적인 점은 이것입니다. Proxima 는 색채권 지표로 보면 정적으로 보이지만 (log R&#x27;HK 가 M 왜성 활동도를 과소 대변함), 사실 격렬한 <b>flare star</b> 라서 승무원에게 영향을 주는 입자 방사선은 태양보다 훨씬 더 가혹합니다 — 항성풍이 아니라 flare 가 지배합니다. 활동도는 ~7 yr 주기로 순환하고 (Wargelin 2017), α Cen 과 같은 국소 성간 흐름을 공유합니다 (V_ISM ≈ 25 km/s).",

  "h2_164":"Open items for follow-up",
  "li_165":"<b>Proxima c (5.2 AU 의 sub-Neptune 후보).</b> Damasso 2020 + Benedict 2020 이 세 번째 행성에 대한 astrometric + RV 증거를 보고했지만, 3σ 신뢰도 임계치를 아직 넘지 못했습니다. 확정되면 새 <code>has_planet_c</code> Decisions 행이 필요하며, 현재 cfg 는 행성을 빼놓고 갑니다.",
  "li_166":"<b>활동 영역 위도 분포.</b> Suárez Mascareño 2020 §4 의 경사 i ≈ 35° 는 흑점 위도를 분해하지 않습니다. 향후 Doppler-imaging 캠페인이 Proxima 의 활동 영역이 주로 적도형 (태양처럼) 인지 극형 (일부 빠른 자전성처럼) 인지를 제약할 수 있습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
