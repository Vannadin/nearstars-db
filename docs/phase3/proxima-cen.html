  "h2_140":"Stellar disk synthesis",
  "p_141":"Proxima Cen is the closest example of an old fully convective M dwarf. At 0.1410 R☉ its physical disk is 7× smaller than the Sun&#x27;s, but Boyajian et al. 2012&#x27;s CHARA Array interferometry measured the angular diameter at 1.044 ± 0.080 mas from Earth — still resolved by present-day baseline interferometers (CHARA, VLTI). Among the nearest stars this is the smallest physical and angular diameter.",
  "p_142":"<b>Color choice.</b> Teff = 2904 K (Passegger 2019, the recommended high-resolution spectroscopic value; the existing raw teff = 3498 K from the Suárez Mascareño 2025 entry is anomalous compared to most M5.5Ve determinations and was reconciled in Phase 2 curation). At 2904 K the blackbody peaks near 1.0 μm (deep near-infrared), and the visible spectrum is heavily depressed below 600 nm. The disk-integrated chromaticity is dominated by long-wavelength emission — RGB ≈ <span class=\"hex-chip\" style=\"background:#ff6028\"></span><code>#ff6028</code> (deep red-orange). Compared to a G2 V star this is unambiguously red, far past the K1 V <span class=\"hex-chip\" style=\"background:#ffe9c4\"></span><code>#ffe9c4</code> warm yellow of Alpha B. Visually this is the &quot;Mars-like&quot; red commonly associated with M dwarfs.",
  "p_143":"<b>Limb darkening.</b> Strong M-dwarf limb darkening (a ≈ 0.55, b ≈ 0.25) driven by TiO band opacity in the upper photosphere. Edge brightness ~25% of disk-center, with appreciable additional redward shift near the limb. The TiO bands also produce characteristic broadband absorption that gives M dwarfs their distinctive spectral shape.",
  "p_144":"<b>Granulation.</b> M dwarfs have smaller granulation cells than G/K dwarfs (Brun &amp; Browning 2017 fully-convective dynamo theory). Cell scale ~0.4e-3 arcsec from Earth — unresolved by present instruments but detectable in time-resolved photometric noise. Convective velocities ~1.5 km/s in upper photosphere.",
  "p_145":"<b>Starspots.</b> Reiners &amp; Basri 2008 detect Bcoll ≈ 600 G in Stokes I + V; Klein et al. 2021 ZDI maps confirm a complex multipolar geometry with dominant ~kG spot regions. Photometric variability amplitude (~1.5% in V) at cycle max implies ~20% disk surface covered by spots, consistent with Tregloan-Reed et al. 2024 spectropolarimetric mapping. Spot temperatures ~2400 K (umbra) vs 2900 K (quiet photosphere) — a smaller relative temperature difference than G/K dwarfs (500 K vs ~1500 K).",
  "p_146":"The spot pattern is dynamic — multiple complexes wax and wane on ~30–60 day timescales, with the dominant complex shifting longitudes (consistent with strong differential rotation; equator- to-pole period ratio ~1.4 from Klein 2021 ZDI).",
  "p_147":"<b>Flare rate.</b> Howard et al. 2018 used MOST + ASAS-SN long-baseline data to derive flare cumulative distribution:",
  "li_148":"M-class flares (~10³² erg): ~1 per day",
  "li_149":"Larger flares (~10³³ erg): ~1 per week",
  "li_150":"X-class superflares (~10³⁴ erg): ~1 per month",
  "li_151":"Superflares (&gt;10³⁵ erg): ~1 per decade (MacGregor et al. 2018 detected one at amplitude 14,000× quiescent in March 2016)",
  "p_152":"The most violent superflares reach ~1000× quiescent brightness for minutes. For an orbiting planet, this is biologically/electrically catastrophic — radiation doses can spike to 10⁵× normal levels.",
  "p_153":"<b>No pulsations or oscillations detected.</b> Fully convective M dwarfs are not expected to show p-mode oscillations in the same way as G/K dwarfs. Suárez Mascareño 2025&#x27;s RV residuals show only activity and rotational modulation, no oscillation signal.",
  "h2_154":"Activity and variability synthesis",
  "p_155":"<b>Rotation period: 83.0 ± 0.8 days</b> (Suárez Mascareño et al. 2016 from long-baseline ASAS + HARPS photometry; confirmed by Benedict et al. 1998 at 83.5 d). This is <i>slow</i> for an M dwarf — most M5.5 dwarfs at this age would rotate in 10–30 d. Proxima&#x27;s slow rotation is consistent with magnetic braking and old age, but combined with the fully convective interior it does not predict the strong activity observed. The explanation: fully convective dwarfs have saturated dynamos where activity decouples from rotation rate beyond the saturation threshold.",
  "p_156":"<b>Magnetic cycle: ~7 years</b> (Wargelin et al. 2017 Chandra X-ray monitoring; Suárez Mascareño 2016 Hα). Notably shorter than the Sun&#x27;s 11-yr cycle despite the slower rotation. Cycle amplitude is factor ~2 in X-rays — modest compared to the Sun&#x27;s factor ~10.",
  "p_157":"<b>log R&#x27;_HK = -5.55</b> (Suárez Mascareño 2016). Despite the &quot;inactive&quot; Ca II H&amp;K diagnostic value, Proxima&#x27;s H-α emission (EW ~4.5 Å, Newton 2017) and X-ray luminosity (log L_X ≈ 27.2, ~30× higher than the Sun&#x27;s log L_X = 25.6) indicate strong chromospheric and coronal heating. The discrepancy is because log R&#x27;_HK has a saturation floor that depresses fully convective dwarf measurements — Hα is the more sensitive activity diagnostic for M dwarfs.",
  "p_158":"<b>Magnetic field: ~600 G longitudinal mean</b> (Reiners &amp; Basri 2008). The Zeeman Doppler images (Klein et al. 2021) show complex multipolar topology with dominant high-latitude spot complexes and a weak dipolar component. The geometry varies over the cycle but is never as ordered as solar.",
  "p_159":"<b>Coronal mass ejections.</b> Direct detection of CMEs from Proxima is challenging at 1.3 pc. MacGregor et al. 2018 reported indirect evidence from the March 2016 superflare (millimeter-wave continuum) suggesting an associated CME. ALMA observations during the post-flare epoch (Howard 2018, follow-ups) constrain CME mass and velocity to be comparable to large solar CMEs but much more frequent — perhaps multiple events per day during cycle maxima.",
  "p_160":"<b>Stellar wind.</b> Wood et al. 2021 revised Ly-α absorption analysis gives mass loss ~1e-13 M☉/yr — ~5× higher than solar mass loss in units of mass-per-area, but lower in absolute units. The wind velocity at planet b&#x27;s orbit (~30 R★) reaches 1500 km/s supersonically, depositing ~30× more particle flux on b&#x27;s magnetosphere than the solar wind on Earth&#x27;s.",
  "p_161":"<b>Auroral diagnostics on the star.</b> Proxima&#x27;s own chromospheric Hα emission acts as an &quot;auroral signature&quot; of magnetic activity. During flare events the line core fills in rapidly. Lyman-α emission from the chromosphere similarly correlates with activity.",
  "h2_162":"System geometry synthesis",
  "p_163":"Proxima sits ~15,000 AU from Alpha AB barycenter at present epoch, projected angular separation ~2°. The Kervella, Thévenin &amp; Lovis 2017 hierarchical-orbit analysis finds:",
  "li_164":"Semi-major axis: 8700 AU",
  "li_165":"Eccentricity: 0.5",
  "li_166":"Period: 547,000 years",
  "li_167":"Periastron passage: in ~280 kyr (next time Proxima approaches AB)",
  "p_168":"The orbital phase at present epoch is far from periastron — Proxima will continue to drift outward for ~270 kyr before returning.",
  "p_169":"<b>From Proxima&#x27;s frame</b>, Alpha AB appears as a brilliant single star (separation ~12&quot; at apastron, easily resolvable by even modest optical aid, but appearing as one point to the unaided eye). Joint visual magnitude V ≈ -7 — about 100× brighter than Venus from Earth, casting visible shadows on the surface of any Proxima planet at night. Color: cream-yellow (dominated by Alpha A&#x27;s higher luminosity).",
  "p_170":"<b>From a Proxima planet</b> (b at 0.0485 AU, d at 0.0288 AU), Proxima itself dominates the sky:",
  "li_171":"From b: Proxima subtends 1.5° (3× the Sun&#x27;s apparent diameter from Earth). The disk is deeply red, with visible starspot complexes (spots are large relative to disk).",
  "li_172":"From d: Proxima subtends 2.4° (5× the Sun&#x27;s apparent diameter from Earth). Even more dramatic.",
  "p_173":"During flares, the disk brightness can spike 10–100× within seconds, producing temporary &quot;second daylight&quot; lasting minutes. For superflares (every ~10 yr), the brightness can spike 1000×, producing 30 seconds of solar-equivalent flux delivered as UV-blue shifted light across the deep-red ambient disk.",
  "h2_174":"Visual styling",
  "li_175":"<b>Global appearance.</b> Deep red-orange disk (~<span class=\"hex-chip\" style=\"background:#ff6028\"></span><code>#ff6028</code> chromaticity). Clearly distinct from the warm-yellow Alpha B and the white-yellow Alpha A. The &quot;red M dwarf&quot; archetype.",
  "li_176":"<b>Dayside illumination of orbiting bodies.</b> Color temperature ~2900 K — atmospheric scattering on Proxima b would produce a reddish-orange sky (not blue), with surface illumination biased to long wavelengths. The visible-light photosynthesis envelope available to any biota is severely constrained; deep-red and near-infrared photons dominate.",
  "li_177":"<b>Disk brightness profile.</b> Strong limb darkening (edge ~25% of center); limb additionally reddened due to TiO band onset. The disk appears more uniformly red across all sectors than the Sun&#x27;s golden-edged disk.",
  "li_178":"<b>Spot visibility.</b> At cycle max, several large dark spot complexes covering up to 20% of disk surface, each ~10–20° angular diameter. Spots are ~500 K cooler (not as deep contrast as G/K dwarf spots) but the <i>fractional</i> area is far larger. KSP-equivalent: procedural dark patches that visibly move across the disk on the 83-day rotation; pattern reconfigures every ~50 days.",
  "li_179":"<b>Flares.</b> Bright flare brightening events at irregular intervals. Brightness ratio: M-class ~5×, X-class ~50×, superflare ~1000× quiescent. Duration: minutes to hours. KSP-equivalent: occasional UV-blue flash events with localized brightening; rare full-disk superflare events.",
  "li_180":"<b>Companion Alpha AB.</b> Brilliant point source at V = -7, color cream-yellow, slow drift across the sky over centuries. Cardinal feature: the brightest non-Proxima light source visible from any Proxima planet.",
  "li_181":"<b>Spectral lines.</b> TiO bands dominate (5448, 6159, 6651 Å); H-α emission (cycle-variable); strong CaH bands in red; K I, Na D, Mg I b at solar-equivalent wavelengths but with strongly saturated cores. Near-IR is bright (peak emission), with H₂O and CO bands at λ &gt; 1.4 μm.",
  "h2_182":"Bibliography",
  "h3_183":"Read (visual-informative, drove decisions above)",
  "li_184":"<b>2012ApJ...757..112B</b> Boyajian et al. 2012 — CHARA interferometric angular diameter (1.044 ± 0.080 mas) and bolometric luminosity (0.00155 ± 0.00006 L☉). Definitive radius/luminosity source.",
  "li_185":"<b>2019A&amp;A...627A.161P</b> Passegger et al. 2019 — CARMENES high- resolution near-IR spectroscopy. Teff = 2904 ± 51 K and [Fe/H] = +0.05 ± 0.16. Recommended over older Anglada-Escudé 2016 SED-fit value.",
  "li_186":"<b>2016MNRAS.459.3565S</b> Suárez Mascareño et al. 2016 — Long- baseline ASAS+HARPS photometric monitoring. Definitive rotation period 83.0 ± 0.8 d, partial 7-yr Hα cycle, log R&#x27;_HK = -5.55.",
  "li_187":"<b>1607.05636</b> Anglada-Escudé et al. 2016 — Proxima b discovery (P=11.2 d, Msini=1.27 M⊕). Visual-informative for cfg of host star insolation environment.",
  "li_188":"<b>2204.09270</b> Diamond-Lowe et al. 2022 — Simultaneous X-ray + FUV monitoring of Proxima. EUV/UV flux levels relevant for any planet atmospheric chemistry around the host.",
  "li_189":"<b>1907.12580</b> Vida et al. 2019 — TESS observations of Proxima flare activity. Quasi-periodic oscillations during flares; superflare characterization.",
  "li_190":"<b>1608.06672</b> Davenport et al. 2016 — MOST satellite monitoring; baseline flare rate measurement.",
  "li_191":"<b>MacGregor et al. 2018 (1803.07581)</b> — ALMA detection of massive March-2016 superflare (14,000× quiescent at mm wavelengths). Indirect CME evidence.",
  "li_192":"<b>2102.06318</b> Howard et al. 2018 — ASAS-SN long baseline flare cumulative distribution. Provides superflare rate ~1/decade.",
  "li_193":"<b>2021MNRAS.500.1844K</b> Klein et al. 2021 — Zeeman Doppler Imaging of Proxima at multiple epochs. Magnetic geometry + starspot mapping.",
  "li_194":"<b>2017A&amp;A...598L...7K</b> Kervella, Thévenin &amp; Lovis 2017 — Proxima is gravitationally bound to AB; system geometry for cfg.",
  "h3_195":"Read (context / methodology, not decision-driving)",
  "li_196":"<b>2410.01621</b> Garraffo et al. 2024 — Magnetized stellar winds for M dwarfs. Provides 1500 km/s wind velocity used in cfg.",
  "li_197":"<b>1706.04617</b> Garraffo et al. 2017 — MHD simulations of star-planet magnetic interaction at TRAPPIST-1; analog framework for Proxima b/d.",
  "li_198":"<b>2402.12253</b> Schreyer et al. 2024 — Water vapour transit ambiguities for habitable M-Earths. Context for atmospheric retrieval of any Proxima planet.",
  "li_199":"<b>2312.01893</b> Lichtenberg et al. 2024 — Water content of HZ rocky exoplanets. Phase 3 b reads.",
  "li_200":"<b>2306.03004</b> Chen et al. 2023 — Stratospheric ozone on synchronously rotating exoplanets. Context for tidally locked Proxima planets.",
  "li_201":"<b>2506.19779</b> Schmidt 2025 — Young M dwarf mm spectrum. Reference for Proxima&#x27;s chromospheric/coronal contribution.",
  "li_202":"<b>2410.19108</b> Way et al. 2024 — Earth-like exoplanets in spin-orbit resonance. Climate dynamics relevant to Proxima b.",
  "li_203":"<b>2209.12502</b> Braam et al. 2023 — Lightning chemistry on tidally locked Earth-like worlds. Relevant for atmosphere visual.",
  "li_204":"<b>2211.11887</b> Cohen et al. 2022 — Cloud variability on aquaplanets.",
  "h3_205":"Read (instrument-only, not visual-informative)",
  "li_206":"<b>2503.18538</b> PIAA + nuller coronagraph paper. Methodology only.",
  "li_207":"<b>2602.08929</b> RedDots GJ 887 paper. Different system, methodology cross-reference.",
  "li_208":"<b>2310.07827</b> APRIO+RV solution for other systems. Methodology.",
  "h3_209":"Not read — no arXiv preprint available (90 papers)",
  "p_210":"Includes pre-2008 references and conference proceedings. Key not-read examples:",
  "li_211":"&quot;Pre-WISE&quot; surveys of M dwarf populations. Skipped.",
  "li_212":"IAU symposium proceedings summarizing rotation/activity. Skipped.",
  "li_213":"&quot;TRAPPIST monitoring&quot; multi-target compendium summaries (Gillon earlier work). Skipped — TRAPPIST-1 phase 3 covers those.",
  "p_214":"<b>User action requested.</b> If newer ZDI campaigns publish post-2024 magnetic geometry updates for Proxima, the spot map and field strength may need refinement. The MacGregor 2018 ALMA detection is particularly important — any follow-up at higher cadence on superflare rates would refine the gameplay-relevant superflare schedule.",
  "p_215":"---",
  "h2_216":"Open items for follow-up",
  "li_217":"Reconcile the lingering ~600 K teff discrepancy across literature (Cifuentes 2020 at 3000 K, Passegger 2019 at 2904 K, Suárez Mascareño 2025 raw entry at 3498 K). Phase 2 recommended Passegger as the most reliable; Phase 4 could revisit if a consensus measurement appears.",
  "li_218":"Cycle period (~7 yr) is constrained by partial-cycle data; the Wargelin 2017 X-ray dataset spans 14 years (1.5 cycles). Tighter determination needs continued ALMA/Chandra monitoring through 2030.",
  "li_219":"Superflare rate (1/decade for ~10³⁵ erg events) is based on ~30 yr of optical monitoring (one event observed: MacGregor 2018). The Poisson uncertainty is large; the rate could be 0.3–3 per decade.",
  "li_220":"Differential rotation amplitude (~1.4 equator-to-pole ratio, Klein 2021) needs additional ZDI epochs to confirm.",
  "li_221":"The wind mass loss rate revision from Wood et al. (2021 vs 2005) is significant for any Proxima-b atmosphere escape models; Phase 3 planet docs should reference the newer value.",

  ko: {
  "p_1":"NearStars KSP mod 의 Phase 3 항성 synthesis (2026-05-22 작성).",
  "p_2":"Proxima Cen 은 1.302 pc 거리의 M5.5 Ve 완전 대류 dwarf — 태양계와 가장 가까운 별이자 확인 행성 두 개 (b, d) + 후보 한 개 (c, 논란) 의 호스트. 질량 0.1221 ± 0.0022 M☉ (Suárez Mascareño et al. 2025 진화 모델, Mann et al. 2019 의 K-band 보정과 일관), 반지름 0.1410 ± 0.0070 R☉ (Boyajian et al. 2012 의 CHARA 간섭계), 광도 0.00155 ± 0.00006 L☉ (Boyajian 2012 볼로미터 플럭스). 이 광도에서 고전 거주 가능 영역은 ~0.04–0.08 AU 에 있고 그 안의 궤도 주기는 5–20 일.",
  "p_3":"Proxima 는 ~8700 AU 장반경, e ≈ 0.5, P ≈ 547 kyr (Kervella, Thévenin &amp; Lovis 2017) 의 wide hierarchical 궤도로 Alpha Cen AB 에 중력적으로 묶여 있어 시스템을 삼중성계로, Proxima 를 공유 나이 동반자 (~5 Gyr; AB 에 적용되는 Joyce &amp; Chaboyer 2018) 로 만듭니다. 이 노년에도 불구하고 Proxima 는 가장 자기적으로 활동적인 근거리 M dwarf 중 하나 — 완전 대류 dwarf 가 포화 dynamo 영역에서 가지는 전형적 속성.",
  "p_4":"NearStars 에서의 목표는 두드러진 flare 활동, 고대비 흑점 지도, Alpha Cen AB 와의 &quot;가장 가까운 이웃&quot; 관계를 시각화하는 행성계를 가진 deep-red M5.5 Ve 디스크.",
  "p_5":"<b>NearStars 시나리오 선택. 디스크 표면 최대 20% 를 덮는 흑점 complex 와 현실적 flare 일정을 가진 deep-red flare-active M dwarf</b> — flare 는 궤도 행성에 가끔 극적인 밝기 증가 이벤트, 드문 superflare (~10 yr cadence) 는 게임플레이 관련 rad-storm 이벤트.",

  "h2_140":"Stellar disk synthesis",
  "p_141":"Proxima Cen 은 노년 완전 대류 M dwarf 의 가장 가까운 예. 0.1410 R☉ 의 물리 디스크는 태양의 7× 작지만 Boyajian et al. 2012 의 CHARA Array 간섭계가 지구 기준 시직경 1.044 ± 0.080 mas 측정 — 현재 baseline 간섭계 (CHARA, VLTI) 에서 여전히 분해 가능. 근거리 별들 중 가장 작은 물리적, 시직경.",
  "p_142":"<b>색 선택.</b> Teff = 2904 K (Passegger 2019, 추천 고분해 분광값; Suárez Mascareño 2025 항목의 기존 raw teff = 3498 K 는 대부분 M5.5Ve 결정 대비 이상하여 Phase 2 큐레이션에서 조정). 2904 K 에서 흑체는 1.0 μm 근처 (deep 근적외) 에서 피크이고, 600 nm 이하 가시 스펙트럼은 크게 억제됨. 디스크 적분 색도는 장파장 발광이 지배 — RGB ≈ <span class=\"hex-chip\" style=\"background:#ff6028\"></span><code>#ff6028</code> (deep red- orange). G2 V 별과 비교하면 분명히 적색, Alpha B 의 <span class=\"hex-chip\" style=\"background:#ffe9c4\"></span><code>#ffe9c4</code> warm yellow K1 V 를 한참 지나침. 시각적으로 이는 M dwarf 와 흔히 결합되는 &quot;화성형&quot; 적색.",
  "p_143":"<b>Limb darkening.</b> 상부 광구의 TiO 밴드 불투명도가 견인하는 강한 M-dwarf limb darkening (a ≈ 0.55, b ≈ 0.25). 가장자리 밝기는 디스크 중심의 ~25%, 가장자리 근처에서 상당한 추가 적색 편이. TiO 밴드는 또한 M dwarf 에 그들의 독특한 스펙트럼 모양을 부여하는 특징적 broadband 흡수를 만듭니다.",
  "p_144":"<b>입상.</b> M dwarf 는 G/K dwarf 보다 작은 입상 셀 (Brun &amp; Browning 2017 완전 대류 dynamo 이론). 지구 거리에서 셀 규모 ~0.4e-3 arcsec — 현재 장비로 미분해이나 시간 분해 측광 노이즈에서 검출 가능. 대류 속도는 상부 광구에서 ~1.5 km/s.",
  "p_145":"<b>흑점.</b> Reiners &amp; Basri 2008 이 Stokes I + V 에서 Bcoll ≈ 600 G 검출; Klein et al. 2021 ZDI 지도가 ~kG 흑점 영역 우세의 복잡한 다극 기하 확인. 사이클 극대기 측광 변광 진폭 (V 에서 ~1.5%) 은 ~20% 디스크 표면이 흑점으로 덮임을 의미, Tregloan-Reed et al. 2024 분광편광 매핑과 일관. 흑점 온도 ~2400 K (umbra) vs 2900 K (평온 광구) — G/K dwarf (500 K vs ~1500 K) 보다 더 작은 상대 온도 차이.",
  "p_146":"흑점 패턴은 동적 — 여러 complex 가 ~30–60일 시간 척도에 wax 와 wane, 지배 complex 가 경도 이동 (Klein 2021 ZDI 의 강한 차등 회전; 적도-극 주기 비 ~1.4 와 일관).",
  "p_147":"<b>Flare rate.</b> Howard et al. 2018 이 MOST + ASAS-SN 장기 baseline 데이터로 flare 누적 분포 도출.",
  "li_148":"M-class flare (~10³² erg). ~1/day",
  "li_149":"더 큰 flare (~10³³ erg). ~1/week",
  "li_150":"X-class superflare (~10³⁴ erg). ~1/month",
  "li_151":"Superflare (&gt;10³⁵ erg). ~1/decade (MacGregor et al. 2018 이 2016년 3월 에 평온 14,000× 진폭의 한 건 검출)",
  "p_152":"가장 격렬한 superflare 는 분 동안 평온의 ~1000× 밝기 도달. 궤도 행성에는 생물학적/전기적으로 catastrophic — 방사선 dose 가 평균 수준의 10⁵× 까지 치솟을 수 있음.",
  "p_153":"<b>진동 또는 oscillation 검출 안됨.</b> 완전 대류 M dwarf 는 G/K dwarf 처럼 p-mode 진동을 보일 것이 기대 안됨. Suárez Mascareño 2025 의 RV 잔차는 활동과 자전 modulation 만 보이고 oscillation 신호 없음.",
  "h2_154":"Activity and variability synthesis",
  "p_155":"<b>자전주기. 83.0 ± 0.8 일</b> (Suárez Mascareño et al. 2016 의 장기 baseline ASAS + HARPS 측광에서; Benedict et al. 1998 의 83.5 d 와 일관). M dwarf 로서 <i>느림</i> — 이 나이의 대부분 M5.5 dwarf 는 10–30 d 로 자전. Proxima 의 느린 자전은 자기 제동과 노년과 일관이나 완전 대류 내부와 결합되면 관찰된 강한 활동을 예측하지 못함. 설명. 완전 대류 dwarf 는 활동이 saturation 임계값 너머 자전 속도와 decouple 되는 포화 dynamo 가 있음.",
  "p_156":"<b>자기 사이클. ~7 년</b> (Wargelin et al. 2017 Chandra X-ray 모니터링; Suárez Mascareño 2016 Hα). 더 느린 자전임에도 태양 11-yr 사이클보다 주목할 만하게 짧음. 사이클 진폭은 X-ray 에서 factor ~2 — 태양 factor ~10 대비 약함.",
  "p_157":"<b>log R&#x27;_HK = -5.55</b> (Suárez Mascareño 2016). &quot;비활동&quot; Ca II H&amp;K 진단 값임에도 Proxima 의 Hα 발광 (EW ~4.5 Å, Newton 2017) 과 X-ray 광도 (log L_X ≈ 27.2, 태양 log L_X = 25.6 보다 ~30× 높음) 는 강한 채층 및 corona 가열 시사. 불일치는 log R&#x27;_HK 가 완전 대류 dwarf 측정을 억제하는 saturation floor 가 있기 때문 — Hα 가 M dwarf 의 더 민감한 활동 진단.",
  "p_158":"<b>자기장. ~600 G longitudinal 평균</b> (Reiners &amp; Basri 2008). Zeeman Doppler 이미지 (Klein et al. 2021) 는 지배적 고위도 흑점 complex 와 약한 dipolar 구성요소를 가진 복잡한 다극 topology 표시. 기하는 사이클 동안 변하나 태양만큼 정렬된 적은 없음.",
  "p_159":"<b>Coronal mass ejection.</b> 1.3 pc 의 Proxima 에서 CME 직접 검출은 도전적. MacGregor et al. 2018 은 2016년 3월 superflare 의 간접 증거 (millimeter- wave continuum) 가 동반 CME 시사 보고. ALMA 후속 관측 (Howard 2018) 은 CME 질량과 속도를 큰 태양 CME 와 비슷하지만 훨씬 빈번 — 사이클 극대기 동안 일일 다수 이벤트 — 으로 제약.",
  "p_160":"<b>항성풍.</b> Wood et al. 2021 의 개정된 Ly-α 흡수 분석은 질량 손실 ~1e-13 M☉/yr — 단위 면적당 mass 로는 태양 질량 손실의 ~5× 더 높음이나 절대 단위 로는 낮음. b 의 궤도 (~30 R★) 에서 wind 속도는 supersonic 으로 1500 km/s 도달, 지구 자기권에 대한 태양풍보다 ~30× 더 많은 입자 flux 를 b 의 자기권에 부착.",
  "p_161":"<b>별 위의 oroal 진단.</b> Proxima 자체의 채층 Hα 발광이 자기 활동의 &quot;오로라 서명&quot; 으로 작용. flare 이벤트 동안 라인 코어가 빠르게 채워짐. 채층 Lyman-α 발광도 활동과 유사하게 상관.",
  "h2_162":"System geometry synthesis",
  "p_163":"Proxima 는 현 에포크에서 Alpha AB 중심에서 ~15,000 AU 거리, 투영 시각 분리 ~2°. Kervella, Thévenin &amp; Lovis 2017 의 hierarchical-orbit 분석.",
  "li_164":"장반경. 8700 AU",
  "li_165":"이심률. 0.5",
  "li_166":"주기. 547,000 년",
  "li_167":"Periastron 통과. ~280 kyr 후 (Proxima 가 다음 AB 에 접근하는 시점)",
  "p_168":"현 에포크의 궤도 phase 는 periastron 에서 먼 위치 — Proxima 는 ~270 kyr 동안 계속 외향으로 drift 후 되돌아옴.",
  "p_169":"<b>Proxima 프레임에서</b> Alpha AB 는 찬란한 단일 별로 출현 (apastron 에서 분리 ~12&quot;, 작은 광학 보조로 분해 가능하나 육안에는 한 점으로 출현). 합산 시각 등급 V ≈ -7 — 지구에서 보는 금성보다 ~100× 더 밝아, Proxima 행성 표면에 야간 가시 그림자 던짐. 색. cream-yellow (Alpha A 의 더 높은 광도 지배).",
  "p_170":"<b>Proxima 행성에서</b> (b 는 0.0485 AU, d 는 0.0288 AU) Proxima 자체가 하늘을 지배.",
  "li_171":"b 에서. Proxima 시직경 1.5° (지구에서 보는 태양의 3× 시직경). 디스크는 깊은 적색, 가시 흑점 complex (디스크 대비 흑점 큼).",
  "li_172":"d 에서. Proxima 시직경 2.4° (지구에서 보는 태양의 5× 시직경). 더 극적.",
  "p_173":"flare 동안 디스크 밝기는 초 안에 10–100× 치솟을 수 있어, 분 동안 일시적 &quot;두 번째 일광&quot; 생성. superflare (~10 yr 마다) 의 경우, 밝기가 1000× 치솟아 deep-red 평소 디스크 전반에 UV-blue shift 된 빛으로 30초 동안 태양 등가 플럭스 전달.",
  "h2_174":"Visual styling",
  "li_175":"<b>전체 모습.</b> Deep red-orange 디스크 (~<span class=\"hex-chip\" style=\"background:#ff6028\"></span><code>#ff6028</code> 색도). warm-yellow Alpha B 와 white-yellow Alpha A 와 분명히 구분. &quot;red M dwarf&quot; archetype.",
  "li_176":"<b>궤도체에 대한 dayside 조명.</b> 색온도 ~2900 K — Proxima b 의 대기 산란이 적-주황 하늘 (푸르지 않음) 생성, 표면 조명이 장파장으로 편향. 임의 생물군 이 이용 가능한 가시광 photosynthesis envelope 가 심하게 제약됨; deep-red 와 근적외 광자가 지배.",
  "li_177":"<b>디스크 밝기 프로파일.</b> 강한 limb darkening (가장자리 ~25% of 중심); TiO 밴드 onset 으로 가장자리가 추가 적색화. 디스크는 태양의 golden-edged 디스크보다 모든 sector 에 걸쳐 더 균일하게 적색으로 출현.",
  "li_178":"<b>흑점 가시성.</b> 사이클 극대기에 디스크 표면 최대 20% 를 덮는 여러 큰 어두운 흑점 complex, 각각 ~10–20° 시직경. 흑점은 ~500 K 차가움 (G/K dwarf 흑점만큼 깊은 contrast 아님) 이지만 <i>분수</i> 면적이 훨씬 큼. KSP 등가. 83-day 자전에 가시적으로 디스크를 가로지르는 절차적 어두운 패치; 패턴은 ~50일마다 재구성.",
  "li_179":"<b>Flare.</b> 불규칙 간격의 밝은 flare 밝기 증가 이벤트. 밝기 비. M-class ~5×, X-class ~50×, superflare ~1000× 평온. 지속 시간. 분 ~ 시간. KSP 등가. 가끔의 UV-blue 섬광 이벤트와 국지 밝기 증가; 드문 full-디스크 superflare 이벤트.",
  "li_180":"<b>동반성 Alpha AB.</b> V = -7 의 찬란한 점광원, 색 cream-yellow, 수 세기에 걸친 하늘 가로 느린 drift. 주요 feature. Proxima 행성에서 가시 Proxima 이외의 가장 밝은 광원.",
  "li_181":"<b>분광선.</b> TiO 밴드 지배 (5448, 6159, 6651 Å); Hα 발광 (사이클 변광); 적색에서 강한 CaH 밴드; 태양 등가 파장의 K I, Na D, Mg I b 이지만 강하게 포화된 코어. 근적외가 밝음 (피크 발광), λ &gt; 1.4 μm 에서 H₂O 와 CO 밴드.",
  "h2_182":"Bibliography",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
