  "h2_104":"Surface synthesis",
  "p_105":"55 Cnc c is a Saturn-mass gas giant with no surface; this section covers the cloud-top &quot;surface&quot;. At T_eq ≈ 489 K it is a <b>warm Saturn-class</b> world — cooler than the inner hot Jupiter b (708 K) but still far too warm for ammonia/water-ice clouds. The visible condensates at this temperature are alkali-metal salts (Na₂S, KCl) and sulfides, sitting deeper and at higher temperatures than the ammonia clouds of the Solar System giants.",
  "p_106":"The cloud-top palette is a warm muted tan (<span class=\"hex-chip\" style=\"background:#d4b890\"></span><code>#d4b890</code>) — softer and paler than the hotter silicate-tan of 55 Cnc b, reflecting the cooler condensate chemistry. The super-solar host metallicity ([Fe/H] ≈ +0.32) again argues for an enriched atmosphere with stronger alkali absorption and deeper cloud colors. Under the 5196 K yellow-orange host light, the planet reads as a warm, gently banded tan giant.",
  "p_107":"Morphology: zonal banding with somewhat lower contrast than the hotter b (cooler atmospheres tend toward subtler banding). The cfg renders Saturn-analog banding warmed and muted to the planet&#x27;s palette.",
  "h2_108":"Atmosphere synthesis",
  "p_109":"55 Cnc c has a deep H₂/He envelope. At ~490 K the visible-altitude condensates are alkali-metal salts and sulfides; gaseous Na/K produce optical absorption. The super-metal-rich host suggests an enriched metallicity, deepening the cloud colors.",
  "li_110":"<b>Pressure / structure.</b> A continuous H₂/He atmosphere with a condensate cloud deck at the alkali/sulfide level; no discrete surface.",
  "li_111":"<b>Composition.</b> H₂/He primary with Na/K and sulfide/silicate condensates; likely enhanced heavy-element abundance from the super-solar host.",
  "li_112":"<b>Sky appearance.</b> From the upper atmosphere the sky would be a pale warm tan, hazed by alkali/sulfide clouds, with the host star (2.0° angular diameter) prominent but no longer overwhelmingly dominant as it is for the inner planets.",
  "h2_113":"Rotation &amp; spin synthesis",
  "p_114":"At 0.247 AU on a 44.4-day orbit, 55 Cnc c is not tidally locked — the gas-giant tidal-locking timescale at this distance far exceeds the ~10 Gyr system age. The orbit is mildly eccentric (e = 0.088, though with a large uncertainty; Moutou 2025). No rotation period has been measured.",
  "p_115":"<b>KSP implementation note.</b> The cfg adopts a fast Jovian rotation (~10–11 h order, Saturn-analog) for visual banding. This is a tie-break; flag as unconstrained.",
  "p_116":"<b>Mild seasons.</b> The e ≈ 0.088 eccentricity gives a modest periastron-to-apastron insolation swing (T_eq from ~470 K at apastron to ~510 K at periastron), but with negligible obliquity there are no axial seasons.",
  "h2_117":"Visual styling",
  "li_118":"<b>Global appearance.</b> A warm muted-tan Saturn-class banded giant at 0.247 AU — the second of the system&#x27;s four giants, between the hotter inner b and the temperate f.",
  "li_119":"<b>Cloud decks.</b> Zonal banding in warm tans (<span class=\"hex-chip\" style=\"background:#d4b890\"></span><code>#d4b890</code>), softer and paler than b, with gentle light-zone / dark-belt alternation.",
  "li_120":"<b>Limb / haze.</b> A pale warm limb haze (<span class=\"hex-chip\" style=\"background:#e0c8a0\"></span><code>#e0c8a0</code>).",
  "li_121":"<b>Star in sky.</b> 55 Cnc A subtends 2.04° — about 4× the Sun&#x27;s angular size from Earth — a prominent warm-orange disk.",
  "li_122":"<b>Sister planets in sky.</b> Planet b (inward at 0.118 AU) and planet f (outward at 0.80 AU) appear as warm points; the lava super-Earth e is lost near the star.",
  "li_123":"<b>No rings (default).</b> At ~490 K, c is too warm for a stable ice ring; no ring is rendered (the cold giant d is the system&#x27;s ring-candidate body).",
  "h2_124":"Bibliography",
  "h3_125":"Read (visual-informative, drove decisions above)",
  "li_126":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, arXiv:2510.11523). Latest RV refit: planet c P = 44.3936 d, a = 0.247 AU, e = 0.088, M sin i = 56.6 ± 2.2 M⊕. <b>Phase 2 recommended orbit + mass.</b> Postdates the model cutoff — value-checked against the cached text.",
  "li_127":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, arXiv:1107.1936. Host L = 0.582 L☉ → the T_eq derivation.",
  "h3_128":"Read (context / methodology, not decision-driving)",
  "li_129":"<b>Bourrier V. et al. 2018</b> — <code>2018A&amp;A...619A...1B</code>, arXiv:1807.04301. Refit: c at a = 0.2373 AU, e = 0.03, M sin i = 51.2 M⊕ — documented-alternative orbit/mass (superseded by Moutou 2025).",
  "li_130":"<b>McArthur B. E. et al. 2004</b> — <code>2004ApJ...614L..81M</code>. Discovery paper; historical context.",
  "h3_131":"Read (instrument-only, not visual-informative)",
  "li_132":"(none specific to c beyond the system-level papers above.)",

  "p_134":"Early RV-refinement papers (Fischer 2008) and dynamical-stability proceedings. Full filtered bib in <code>docs/phase3/_bib/55-cnc.yaml</code>.",
  "h2_135":"Open items for follow-up",
  "li_136":"<b>Radius.</b> No measured radius (non-transiting); ~0.8 R_Jup is estimate-only. An inclination/true-mass constraint would allow a radius refinement.",
  "li_137":"<b>Eccentricity.</b> e = 0.088 carries a large uncertainty (±0.23 in the curated entry); a tighter RV solution would firm up the mild-seasons treatment.",
  "li_138":"<b>Atmospheric metallicity.</b> Enriched composition expected from the super-metal-rich host; a future emission/transmission constraint would refine the cloud color.",

  "p_107":"형태: 더 뜨거운 b 보다 다소 낮은 대비의 띠 모양(차가운 대기는 더 미묘한 띠로 향함). cfg 는 행성 팔레트로 따뜻하게·차분하게 한 토성-유사체 띠 모양을 렌더링합니다.",
  "h2_108":"Atmosphere synthesis",
  "p_109":"55 Cnc c 는 심층 H₂/He 외피를 가집니다. ~490 K 에서 가시-고도 응결물은 알칼리-금속염과 황화물이며, 기체상 Na/K 가 광학 흡수를 만듭니다. 초금속 풍부 모성은 풍부한 금속도를 시사하여 구름 색을 짙게 합니다.",
  "li_110":"<b>압력 / 구조.</b> 알칼리/황화물 준위의 응결 구름 덱을 가진 연속 H₂/He 대기. 별개 표면 없음.",
  "li_111":"<b>조성.</b> H₂/He 주체에 Na/K 와 황화물/규산염 응결물. 초태양 모성에서 향상된 중원소 풍부도 가능성.",
  "li_112":"<b>하늘 외관.</b> 상층 대기에서 하늘은 옅은 따뜻 황갈로, 알칼리/황화물 구름으로 흐려지며, 모성(각지름 2.0°)이 두드러지나 안쪽 행성들에서처럼 압도적으로 지배하지는 않습니다.",
  "h2_113":"Rotation &amp; spin synthesis",
  "p_114":"0.247 AU 에서 44.4일 궤도로, 55 Cnc c 는 조석 고정되지 않습니다—이 거리의 거대 가스 행성 조석 고정 시간 척도가 ~10 Gyr 계 나이를 한참 초과합니다. 궤도는 약하게 이심(e = 0.088, 큰 불확실성 동반. Moutou 2025)입니다. 자전 주기는 측정되지 않았습니다.",
  "p_115":"<b>KSP 구현 노트.</b> cfg 는 시각적 띠 모양을 위해 빠른 목성형 자전(~10–11시간 자릿수, 토성 유사체)을 채택합니다. 이는 tie-break 이며 미제약으로 플래그합니다.",
  "p_116":"<b>약한 계절.</b> e ≈ 0.088 이심은 적당한 근점-원점 일사 변동(원점 ~470 K 에서 근점 ~510 K 의 T_eq)을 주지만, 무시할 만한 자전축 경사라 축 계절은 없습니다.",
  "h2_117":"Visual styling",
  "li_118":"<b>전체 외관.</b> 0.247 AU 의 따뜻하고 차분한-황갈 토성급 띠 거대 행성—이 계 네 거대 행성 중 둘째로, 더 뜨거운 안쪽 b 와 온대 f 사이입니다.",
  "li_119":"<b>구름 덱.</b> 따뜻한 황갈(<span class=\"hex-chip\" style=\"background:#d4b890\"></span><code>#d4b890</code>)의 띠 모양으로, b 보다 부드럽고 옅으며, 밝은-존 / 어두운-벨트가 부드럽게 번갈음.",
  "li_120":"<b>림 / 헤이즈.</b> 옅고 따뜻한 림 헤이즈(<span class=\"hex-chip\" style=\"background:#e0c8a0\"></span><code>#e0c8a0</code>).",
  "li_121":"<b>하늘의 별.</b> 55 Cnc A 는 2.04° 를 차지—지구에서 본 태양 각지름의 약 4 배—두드러진 따뜻-주황 디스크.",
  "li_122":"<b>하늘의 자매 행성.</b> 행성 b(0.118 AU 안쪽)와 행성 f(0.80 AU 바깥)가 따뜻한 점으로 나타나며, 용암 초지구 e 는 별 근처에 묻힘.",
  "li_123":"<b>고리 없음(기본).</b> ~490 K 에서 c 는 안정한 얼음 고리에는 너무 따뜻함. 고리는 렌더링 안 함(차가운 거대 행성 d 가 계의 고리-후보 천체).",
  "h2_124":"Bibliography",
  "h3_125":"Read (visual-informative, drove decisions above)",
  "li_126":"<b>Moutou C. et al. 2025/2026</b> — <i>Characterizing planetary systems with SPIRou…</i>, A&amp;A 705, A190 (<code>2026A&amp;A...705A.190M</code>, arXiv:2510.11523). 최신 RV 재피팅: 행성 c P = 44.3936 d, a = 0.247 AU, e = 0.088, M sin i = 56.6 ± 2.2 M⊕. <b>Phase 2 추천 궤도 + 질량.</b> 모델 컷오프 이후 출판 — 캐시 텍스트에 대조 확인.",
  "li_127":"<b>von Braun K. et al. 2011</b> — <code>2011ApJ...740...49V</code>, arXiv:1107.1936. 모성 L = 0.582 L☉ → T_eq 유도.",
  "h3_128":"Read (context / methodology, not decision-driving)",

  "li_130":"<b>McArthur B. E. et al. 2004</b> — <code>2004ApJ...614L..81M</code>. 발견 논문. 역사적 맥락.",

  "h2_135":"Open items for follow-up",
  "li_136":"<b>반지름.</b> 측정 반지름 없음(비통과). ~0.8 R_Jup 은 추정-전용입니다. 경사/진질량 제약이 반지름 정제를 가능케 할 것입니다.",
  "li_137":"<b>이심.</b> e = 0.088 은 큰 불확실성을 동반합니다(큐레이션 항목에서 ±0.23). 더 정밀한 RV 해가 약한-계절 처리를 굳힐 것입니다.",
  "li_138":"<b>대기 금속도.</b> 초금속 풍부 모성에서 풍부한 조성이 예상됩니다. 미래 방출/투과 제약이 구름 색을 다듬을 것입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
