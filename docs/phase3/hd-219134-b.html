  "h2_141":"Surface synthesis",
  "p_142":"HD 219134 b is the densest and hottest of the system&#x27;s planets, and the strongest observational anchor in the family because it both transits and has a precise RV mass. Three anchors pin the synthesis:",
  "p_143":"1. <b>Measured mass and radius.</b> Gillon 2017&#x27;s Spitzer transit gives R = 1.602 ± 0.055 R⊕, and the combined transit + RV solution gives M = 4.74 ± 0.19 M⊕. The bulk density ρ ≈ 6.4 g/cc (derived) is higher than Earth&#x27;s 5.51 g/cc — Gillon 2017 emphasize b and c as among the densest known transiting super-Earths, consistent with an Earth-like-to-iron-rich rocky composition and no significant gaseous envelope. This is the decisive constraint: b is rock, not a mini-Neptune.",
  "p_144":"2. <b>Insolation 181 S⊕, T_eq ≈ 1015 K.</b> This is the hot-rocky / lava- world regime, at the cooler end of the family that Léger 2009 introduced with CoRoT-7b (T_eq ≈ 1810 K) and that 55 Cnc e (~2000 K) extended. At 1015 K equilibrium, the substellar hemisphere reaches an airless peak of ~1250 K (derived), enough for partial melt in a volatile-bearing basaltic crust but well short of a fully molten dayside.",
  "p_145":"3. <b>Atmospheric loss.</b> Any primordial H/He envelope of a 4.7 M⊕ core at 0.038 AU around a K dwarf is photoevaporated on a timescale far shorter than the system age (Owen &amp; Wu 2017 valley physics); the high measured density independently confirms there is no thick envelope. A secondary atmosphere is marginal at best at this insolation.",
  "p_146":"<b>Color choice.</b> Under the host&#x27;s 4858 K K3 V illumination (warm orange SED, peaking near 0.60 μm), surface tints are perceived warmer than under Sol but with far less of the deep-red M-dwarf shift. The primary surface tint <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code> is a dark basaltic / partial-melt crust tone, slightly warmer than the fresh ultramafic black used for the hottest M-dwarf rocky planets. The accent <span class=\"hex-chip\" style=\"background:#b84a1e\"></span><code>#b84a1e</code> encodes the substellar cooling-lava glow — a tie-break (interesting-first) that gives b a visually distinctive feature rather than a uniformly dark disk; the ~1250 K substellar partial-melt zone radiates with a visible red-orange tail.",
  "p_147":"<b>Morphology under tidal lock.</b> The substellar partial-melt cap is a permanent feature, fixed in the surface frame, surrounded by cooled basaltic plains. The antistellar hemisphere is dark, volatile-stripped regolith with no cold-trap (no atmosphere to transport volatiles from the dayside). Sparse impact cratering accumulates over the system age, partially resurfaced near the substellar point by past melt episodes.",
  "h2_148":"Atmosphere synthesis",
  "p_149":"The atmospheric inference for b is theoretical but strongly constrained by the measured density. There is no JWST transit or eclipse spectrum yet, so the cfg adopts the <b>airless</b> interpretation with a vestigial silicate-vapor exosphere near the substellar point.",
  "p_150":"<b>Pressure choice.</b> Surface pressure 0 Pa (airless). The decisive argument is the bulk density: at 6.4 g/cc, b is rock-and-iron with no room for a thick volatile envelope, and Owen &amp; Wu 2017&#x27;s photoevaporation-valley physics places a 4.7 M⊕ core at 0.038 AU firmly in the core-only regime — any initial H/He envelope is lost on ≲ 10²–10³ Myr around a K dwarf. A secondary outgassed atmosphere would need continuous replenishment exceeding the XUV-driven loss; at 1015 K equilibrium the balance is marginal, so the cfg picks airless.",
  "p_151":"<b>Composition.</b> No hydrostatic atmosphere. A tenuous silicate-vapor exosphere is expected over the substellar partial-melt zone (Schaefer &amp; Fegley 2009 hot-rocky outgassing chemistry: Na, K, SiO dominant by vapor pressure), but the column density is far below any Rayleigh-scattering threshold and contributes no visible limb haze.",
  "p_152":"<b>Sky appearance.</b> No atmosphere means no Rayleigh scattering — the sky is black at every elevation. HD 219134 dominates b&#x27;s dayside sky at angular diameter ~10.1° (about 20× the Sun&#x27;s apparent size from Earth — by far the largest object in the sky), a warm-orange disk (4858 K → orange) flooding the surface with ~181× Earth-noon brightness. The other planets appear as bright points; c (next out) is the most prominent at conjunction. The limb is a clean edge from disk to space, with no scattering or refraction.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"The 3.0937-day orbital period at 0.0382 AU around a 0.696 M☉ host gives a tidal-locking timescale of ~10⁵–10⁶ years (standard equilibrium-tide estimate, Hut 1981), orders of magnitude shorter than the system age. The 1:1 spin-orbit resonance is fully established, and obliquity has damped to zero over the same timescale.",
  "p_155":"<b>Spin-orbit state.</b> The curated eccentricity is 0.0, so there is no ambiguity between 1:1 and 3:2 — at essentially zero eccentricity the 1:1 lock is overwhelmingly favored (3:2 traps require e ≳ 0.01; Vinson 2017, Makarov 2018). The substellar point is fixed in the surface frame.",
  "p_156":"<b>KSP implementation note.</b> Rotation period = orbital period = 3.0937 days (267 296 s). In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds.",
  "p_157":"<b>No seasons.</b> Obliquity = 0 and eccentricity = 0 give a static insolation pattern — the substellar partial-melt cap does not migrate or pulse, unlike the eccentric planets in the system. Tidal heating at the circular orbit is small (Bolmont 2020 scaling); the surface energy budget is insolation-dominated, so the partial-melt cap is insolation-driven rather than tidally driven (unlike Io).",
  "h2_158":"Visual styling",
  "p_159":"Combining the surface and atmosphere decisions:",
  "li_160":"<b>Global appearance (orbit view).</b> A dark-bodied rocky super-Earth with a glowing red-orange cap at the substellar point and dark near-uniform basaltic plains fading to a black nightside. The substellar cooling-lava glow is b&#x27;s most distinctive visual feature.",
  "li_161":"<b>Substellar partial-melt cap.</b> A modest disk centred on the substellar point, surface tint <span class=\"hex-chip\" style=\"background:#b84a1e\"></span><code>#b84a1e</code> (cooling-lava red-orange), with additional thermal-emission brightness at λ ≳ 1 μm in the IR cfg. Permanent and fixed (insolation-driven, circular orbit).",
  "li_162":"<b>Mid-latitude basaltic crust.</b> Tint <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code> (dark basalt / partial-melt). Sparse impact craters; smooth cooled lava plains predominate.",
  "li_163":"<b>Nightside.</b> Cold (~150 K) and dark; same tint as mid-latitudes but unlit. Visible only by sister-planet reflected light. Volatile- stripped regolith.",
  "li_164":"<b>Terminator band.</b> Sharp, due to the absence of atmospheric scattering. Topography casts long shadows in the grazing orange light.",
  "li_165":"<b>Atmosphere haze.</b> None visible; the silicate-vapor exosphere is far below any Rayleigh threshold. The limb is a clean edge.",
  "li_166":"<b>Star in sky.</b> HD 219134 subtends ~10.1° at b — about 20× the Sun&#x27;s angular size from Earth, the dominant object in the sky. Warm-orange (4858 K), illuminating the surface at ~181× Earth-noon brightness.",
  "li_167":"<b>Sister planets in sky.</b> c (next out at 0.064 AU) is the most prominent neighbor at inferior conjunction; the warm RV-only planets and distant giant h appear as bright points. Near-coplanar geometry for the transiting pair.",
  "h2_168":"Bibliography",
  "h3_169":"Read (visual-informative, drove decisions above)",
  "li_170":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). Spitzer photometry establishing b&#x27;s transit: R = 1.602 ± 0.055 R⊕, true mass 4.74 ± 0.19 M⊕, T_eq ≈ 1015 K; b and c identified as among the densest known transiting super-Earths. <b>The anchor for b&#x27;s mass, radius, density, and T_eq.</b>",
  "li_171":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I. HD 219134 b: A transiting rocky planet in a multi-planet system</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). RV discovery of b and the 3.0937 d / 0.0382 AU orbit; first transit detection. Source for the orbital elements.",
  "li_172":"<b>Léger A. et al. 2009</b> — <i>Transiting exoplanets from the CoRoT space mission VIII. CoRoT-7b: the first super-Earth with measured radius</i>, A&amp;A 506, 287 (<code>2009A&amp;A...506..287L</code>, <a href=\"https://arxiv.org/abs/0908.0241\">arXiv:0908.0241</a>). The lava-world template; b sits at the cooler end of the family. Drives the substellar partial-melt morphology.",
  "li_173":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). Photoevaporation-valley physics placing a 4.7 M⊕ core at 0.038 AU in the core-only regime. Supports <code>atmosphere_present = false</code>.",
  "li_174":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, <a href=\"https://arxiv.org/abs/0905.4045\">arXiv:0905.4045</a>). Hot-rocky outgassing chemistry; sets the tenuous Na/K/SiO exosphere composition.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>Ligi R. et al. 2019</b> — <i>Investigating the magnetically quiet, nearby K dwarf HD 219134 with VEGA/CHARA interferometry</i>, A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited from the host-star synthesis (R★, Teff, L, ρ★ for the direct stellar mass); gives an alternative b radius 1.5 R⊕ (recommended:false).",
  "li_177":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). Equilibrium-tide model; the tidal- locking timescale estimate. Anchors <code>tidally_locked = true</code>.",
  "li_178":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution of TRAPPIST-1 planets</i> (<code>2020A&amp;A...644A.165B</code>). Tidal- heating scaling; at b&#x27;s circular orbit gives a small contribution.",
  "h3_179":"Read (instrument-only, not visual-informative)",
  "li_180":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>). The full six-planet RV solution; context for b&#x27;s place in the system, no new b-specific visual constraint beyond the orbit already from Motalebi 2015.",
  "h3_181":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_182":"The b-specific arXiv record is small. The not-read set is predominantly dynamical-stability follow-ups (b is stable in the Vogt 2015 + Gillon 2017 solutions) and generic mass-radius / interior- modeling papers that do not change the rocky/airless reading already fixed by the measured 6.4 g/cc density.",
  "h2_183":"Open items for follow-up",
  "li_184":"<b>JWST thermal emission / eclipse.</b> b is a prime bright-host bare-rock target; a MIRI secondary eclipse would directly measure the dayside brightness temperature and Bond albedo, confirming or refuting the airless reading and refining the surface-tint hex codes from inferred mineralogy.",
  "li_185":"<b>Cfg variant: thin retained atmosphere.</b> A small fraction of high-mean-molecular-weight secondary atmospheres (CO₂ / silicate- vapor, ≲ 0.1–1 bar) remains formally possible despite the high density. A cfg variant with a thin hazy atmosphere is preserved for users who prefer the &quot;retained atmosphere&quot; reading.",
  "li_186":"<b>Surface mineralogy.</b> Hex codes are tie-break choices; future thermal-emission spectroscopy (basalt vs ultramafic vs silica-rich) would refine them.",
  "li_187":"<b>Tidal heating refinement.</b> The 0.05–0.5 W/m² range is a Bolmont 2020 scaling at e ≈ 0; a dedicated interior-structure model would tighten it, though insolation dominates regardless.",

  ko: {
  "p_1":"HD 219134 b 는 밝고 조용한 K3 V 왜성 HD 219134 의 여섯 행성 중 가장 안쪽에 있고, <b>transit</b> 하는 두 행성 중 하나입니다. Motalebi et al. 2015 가 RV 로 발견하고 Gillon et al. 2017 이 Spitzer 측광으로 transit 을 확인했으며, 측정된 진질량과 측정된 반지름을 모두 가지고 있습니다. M = 4.74 ± 0.19 M⊕, R = 1.602 ± 0.055 R⊕, a = 0.0382 AU 의 3.0937 일 궤도입니다. bulk 밀도는 곧장 따라 나옵니다 — ρ ≈ 6.4 g/cc 로, 지구보다 밀도가 높아 b 를 알려진 transit super-Earth 중 가장 밀도 높은 축에 놓으며, 의미 있는 volatile envelope 없이 암석/철 조성을 시사합니다. 평형 온도는 높습니다 — TEPCat 은 T_eq ≈ 1015 K 를 제시하고, 프로젝트 공식 T_eq = 278.3 · L^0.25 / √a (L = 0.264) 는 zero albedo 에서 1021 K 를 줍니다.",
  "p_2":"<b>NearStars 시나리오 선택은 어두운 basalt-에서-부분용융 표면, substellar 점 부근의 식어가는 용암 accent, 그리고 보이는 대기가 없는, 뜨겁고 밀도 높은 무대기 암석 super-Earth 입니다.</b> 1015 K 와 지구의 ~181 배 일사에서 b 는 hot-rocky 영역에 자리하는데, 여기서는 어떤 원시 H/He envelope 도 오래전에 광증발했고 가까운 거리의 XUV flux 아래서 2차 대기를 유지하기 어렵습니다. 높은 측정 밀도가 두꺼운 volatile envelope 을 독립적으로 배제합니다. 대안 — 유지된 얇은 고분자량 (CO₂ / silicate-vapor) 대기 — 은 후속 항목에 cfg 변형으로 보존하지만, 밀도와 일사는 무대기 해석을 선호합니다.",

  "td_132":"지구형 BSE(bulk-silicate-Earth) 방사성 열류속(현재값 ~0.04 W/m²)을 ~4.7 M⊕ 암석 조성으로 질량 스케일. 방법은 Wang et al. 2020 (<code>2020A&amp;A...644A..19W</code>)의 외계행성 방사성 열 프레임워크를 따름. 다만 Eu→Th/U 호스트 원소비 보정은 호스트별 원소비를 큐레이션하지 않아 적용하지 않았고, 대신 지구형 원소비를 가정함",

  "td_140":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_141":"표면 합성",
  "p_142":"HD 219134 b 는 시스템 행성 중 가장 밀도 높고 가장 뜨거우며, transit 하면서 정밀한 RV 질량까지 가져 계열에서 가장 강한 관측 앵커입니다. 세 가지 앵커가 합성을 고정합니다.",
  "p_143":"1. <b>측정된 질량과 반지름.</b> Gillon 2017 의 Spitzer transit 이 R = 1.602 ± 0.055 R⊕ 를 주고, transit + RV 결합 해가 M = 4.74 ± 0.19 M⊕ 를 줍니다. bulk 밀도 ρ ≈ 6.4 g/cc (유도) 는 지구의 5.51 g/cc 보다 높습니다 — Gillon 2017 은 b 와 c 를 알려진 transit super-Earth 중 가장 밀도 높은 축으로 강조하며, 이는 Earth-like-에서-철 풍부한 암석 조성에 의미 있는 기체 envelope 이 없는 것과 일관됩니다. 이것이 결정적 제약입니다 — b 는 mini-Neptune 이 아니라 암석입니다.",
  "p_144":"2. <b>일사 181 S⊕, T_eq ≈ 1015 K.</b> 이는 hot-rocky / lava-world 영역으로, Léger 2009 가 CoRoT-7b (T_eq ≈ 1810 K) 로 도입하고 55 Cnc e (~2000 K) 가 확장한 계열의 더 차가운 끝단입니다. 1015 K 평형에서 substellar 반구는 무대기 정점 ~1250 K (유도) 에 도달하는데, volatile 함유 basalt 지각에서 부분용융을 일으키기엔 충분하지만 완전 용융 dayside 에는 한참 못 미칩니다.",
  "p_145":"3. <b>대기 손실.</b> K 왜성 주위 0.038 AU 의 4.7 M⊕ core 의 어떤 원시 H/He envelope 도 시스템 나이보다 훨씬 짧은 timescale 에 광증발하고 (Owen &amp; Wu 2017 valley physics), 높은 측정 밀도가 두꺼운 envelope 이 없음을 독립적으로 확인합니다. 2차 대기는 이 일사에서 기껏해야 미미합니다.",
  "p_146":"<b>색 선택.</b> 호스트의 4858 K K3 V 조명 (0.60 μm 근처에서 정점인 따뜻한 오렌지 SED) 아래에서 표면 tint 는 Sol 아래보다 따뜻하게 인지되지만 깊은 적색의 M 왜성 shift 는 훨씬 덜합니다. primary 표면 tint <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code> 는 어두운 basalt / 부분용융 지각 톤으로, 가장 뜨거운 M 왜성 암석 행성에 쓰는 신선한 ultramafic 검정보다 약간 따뜻합니다. accent <span class=\"hex-chip\" style=\"background:#b84a1e\"></span><code>#b84a1e</code> 는 substellar 식어가는 용암 glow 를 인코딩합니다 — 균일하게 어두운 disk 대신 b 에 시각적으로 독특한 feature 를 주는 tie-break (흥미로움 우선) 이고, ~1250 K substellar 부분용융 영역이 가시 적-오렌지 꼬리로 복사합니다.",
  "p_147":"<b>조석 고정 하의 지형.</b> substellar 부분용융 cap 은 표면 frame 에 고정된 영구 feature 로, 식은 basalt 평원에 둘러싸여 있습니다. antistellar 반구는 어둡고 volatile 이 제거된 regolith 로 cold-trap 이 없습니다 (dayside 에서 volatile 을 수송할 대기가 없음). 드문 충돌 cratering 이 시스템 나이에 걸쳐 누적되고, substellar 점 부근은 과거 용융 episode 로 부분적으로 재포장됩니다.",
  "h2_148":"대기 합성",
  "p_149":"b 의 대기 추론은 이론적이지만 측정된 밀도로 강하게 제약됩니다. 아직 JWST transit 이나 eclipse 스펙트럼이 없으므로, cfg 는 substellar 점 부근의 잔존 silicate-vapor exosphere 를 동반한 <b>무대기</b> 해석을 채택합니다.",
  "p_150":"<b>압력 선택.</b> 표면 압력 0 Pa (무대기). 결정적 논거는 측정된 밀도입니다 — 6.4 g/cc 에서 b 는 두꺼운 volatile envelope 이 들어갈 자리가 없는 암석과 철이고, Owen &amp; Wu 2017 의 광증발-valley physics 는 0.038 AU 의 4.7 M⊕ core 를 core-only 영역에 확고히 둡니다 — K 왜성 주위에서는 초기 H/He envelope 이 ≲ 10²–10³ Myr 에 손실됩니다. 2차 outgassed 대기는 XUV 구동 손실을 넘는 지속적 보충이 필요한데, 1015 K 평형에서 균형은 미미해 cfg 는 무대기를 선택합니다.",
  "p_151":"<b>조성.</b> 정수압 대기 없음. substellar 부분용융 영역 위로 희박한 silicate-vapor exosphere 가 예상되지만 (Schaefer &amp; Fegley 2009 hot-rocky outgassing 화학. Na, K, SiO 가 증기압으로 지배), 그 column 밀도는 Rayleigh-scattering 임계 한참 아래라 보이는 limb haze 에 기여하지 않습니다.",
  "p_152":"<b>하늘 외관.</b> 대기가 없으니 Rayleigh scattering 도 없어 하늘은 모든 고도에서 검습니다. HD 219134 가 b 의 dayside 하늘을 각지름 ~10.1° 로 지배하고 (지구에서 본 태양 각 크기의 약 20 배 — 하늘에서 단연 가장 큰 천체), 따뜻한 오렌지 disk (4858 K → 오렌지) 가 표면을 ~181× 지구 정오 밝기로 적십니다. 다른 행성들은 밝은 점으로 보이고, c (다음 외측) 가 합 시 가장 두드러집니다. limb 는 disk 에서 우주로의 깔끔한 가장자리로, scattering 이나 굴절은 없습니다.",
  "h2_153":"자전 &amp; spin 합성",
  "p_154":"0.696 M☉ 호스트 주위 0.0382 AU 의 3.0937 일 궤도 주기는 조석 고정 timescale ~10⁵–10⁶ 년 (표준 평형 조석 추정, Hut 1981) 을 주는데, 이는 시스템 나이보다 여러 자릿수 짧습니다. 1:1 회전-궤도 공명이 완전히 확립되었고, 황도경사각도 같은 timescale 에 0 까지 damping 되었습니다.",
  "p_155":"<b>회전-궤도 상태.</b> curated 이심률이 0.0 이므로 1:1 과 3:2 사이의 모호성이 없습니다 — 사실상 0 인 이심률에서 1:1 고정이 압도적으로 선호됩니다 (3:2 trap 은 e ≳ 0.01 필요. Vinson 2017, Makarov 2018). substellar 점은 표면 frame 에 고정됩니다.",
  "p_156":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 3.0937 일 (267 296 s) 입니다. Kopernicus 에서 body 의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 동일하게 설정합니다.",
  "p_157":"<b>계절 없음.</b> obliquity = 0 이고 이심률 = 0 이라 정적인 일사 패턴을 줍니다 — substellar 부분용융 cap 은 시스템의 이심률 행성들과 달리 이동하거나 맥동하지 않습니다. 원궤도에서 조석 가열은 작고 (Bolmont 2020 스케일링), 표면 에너지 예산은 일사 지배라 부분용융 cap 은 (Io 와 달리) 조석이 아니라 일사로 구동됩니다.",
  "h2_158":"비주얼 스타일",
  "p_159":"표면과 대기 결정을 종합하면 다음과 같습니다.",
  "li_160":"<b>전역 외관 (궤도 뷰).</b> substellar 점에 벌겋게 빛나는 적-오렌지 cap 과 어둡고 거의 균일한 basalt 평원을 가진, nightside 로 갈수록 검어지는 어두운 암석 super-Earth. substellar 식어가는 용암 glow 가 b 의 가장 독특한 시각 feature 입니다.",
  "li_161":"<b>substellar 부분용융 cap.</b> substellar 점에 중심을 둔 적당한 disk 로, 표면 tint <span class=\"hex-chip\" style=\"background:#b84a1e\"></span><code>#b84a1e</code> (식어가는 용암 적-오렌지), IR cfg 에서는 λ ≳ 1 μm 의 추가 열복사 밝기를 동반. 영구적이고 고정됨 (일사 구동, 원궤도).",
  "li_162":"<b>중위도 basalt 지각.</b> tint <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code> (어두운 basalt / 부분용융). 드문 충돌 크레이터. 식은 매끄러운 용암 평원이 우세.",
  "li_163":"<b>Nightside.</b> 차갑고 (~150 K) 어두움. 중위도와 같은 tint 이지만 조명 없음. 자매 행성 반사광으로만 보임. volatile 제거된 regolith.",
  "li_164":"<b>Terminator band.</b> 대기 scattering 이 없어 또렷함. 지형이 스치는 오렌지 빛에 긴 그림자를 드리움.",
  "li_165":"<b>대기 haze.</b> 보이지 않음. silicate-vapor exosphere 는 Rayleigh 임계 한참 아래. limb 는 깔끔한 가장자리.",
  "li_166":"<b>하늘의 별.</b> HD 219134 가 b 에서 ~10.1° 를 차지 — 지구에서 본 태양 각 크기의 약 20 배로 하늘의 지배적 천체. 따뜻한 오렌지 (4858 K), 표면을 ~181× 지구 정오 밝기로 조명.",
  "li_167":"<b>하늘의 자매 행성.</b> c (다음 외측, 0.064 AU) 가 내합 시 가장 두드러진 이웃. 따뜻한 RV-only 행성들과 먼 거인 h 는 밝은 점으로 보임. transit 하는 한 쌍은 거의 동일 평면 기하.",
  "h2_168":"참고 문헌",
  "h3_169":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_170":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). b 의 transit 을 확립한 Spitzer 측광. R = 1.602 ± 0.055 R⊕, 진질량 4.74 ± 0.19 M⊕, T_eq ≈ 1015 K. b 와 c 가 알려진 transit super-Earth 중 가장 밀도 높은 축으로 식별됨. <b>b 의 질량, 반지름, 밀도, T_eq 의 앵커.</b>",
  "li_171":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I. HD 219134 b: A transiting rocky planet in a multi-planet system</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). b 의 RV 발견과 3.0937 d / 0.0382 AU 궤도. 첫 transit 검출. 궤도 요소의 출처.",
  "li_172":"<b>Léger A. et al. 2009</b> — <i>Transiting exoplanets from the CoRoT space mission VIII. CoRoT-7b: the first super-Earth with measured radius</i>, A&amp;A 506, 287 (<code>2009A&amp;A...506..287L</code>, <a href=\"https://arxiv.org/abs/0908.0241\">arXiv:0908.0241</a>). lava-world 템플릿. b 는 계열의 더 차가운 끝단. substellar 부분용융 지형을 견인.",
  "li_173":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). 0.038 AU 의 4.7 M⊕ core 를 core-only 영역에 두는 광증발-valley physics. <code>atmosphere_present = false</code> 를 뒷받침.",
  "li_174":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, <a href=\"https://arxiv.org/abs/0905.4045\">arXiv:0905.4045</a>). hot-rocky outgassing 화학. 희박한 Na/K/SiO exosphere 조성을 정함.",
  "h3_175":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_176":"<b>Ligi R. et al. 2019</b> — <i>Investigating the magnetically quiet, nearby K dwarf HD 219134 with VEGA/CHARA interferometry</i>, A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 호스트 합성에서 상속 (R★, Teff, L, 직접 항성 질량을 위한 ρ★). 대안 b 반지름 1.5 R⊕ 제시 (recommended:false).",
  "li_177":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). 평형 조석 모델. 조석 고정 timescale 추정. <code>tidally_locked = true</code> 의 앵커.",
  "li_178":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution of TRAPPIST-1 planets</i> (<code>2020A&amp;A...644A.165B</code>). 조석 가열 스케일링. b 의 원궤도에서는 작은 기여.",
  "h3_179":"읽음 (instrument-only, 시각 정보 아님)",
  "li_180":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>). 여섯 행성 RV 해 전체. 시스템 내 b 의 위치에 대한 맥락. Motalebi 2015 의 궤도를 넘어서는 b 별 시각 제약은 없음.",
  "h3_181":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_182":"b 별 arXiv 기록은 적습니다. 읽지 않은 세트는 주로 동역학적 안정성 후속 (b 는 Vogt 2015 + Gillon 2017 해에서 안정) 과, 측정된 6.4 g/cc 밀도로 이미 고정된 암석/무대기 해석을 바꾸지 않는 일반 mass-radius / 내부-모델링 논문입니다.",
  "h2_183":"후속 항목",
  "li_184":"<b>JWST 열복사 / eclipse.</b> b 는 밝은 호스트의 유력한 맨 암석 타깃입니다. MIRI secondary eclipse 가 dayside brightness temperature 와 Bond albedo 를 직접 측정해 무대기 해석을 확정하거나 반박하고, 추론된 광물학에서 표면 tint hex 를 정밀화할 수 있습니다.",
  "li_185":"<b>cfg 변형: 유지된 얇은 대기.</b> 높은 밀도에도 불구하고 일부 고분자량 2차 대기 (CO₂ / silicate-vapor, ≲ 0.1–1 bar) 는 형식적으로 여전히 가능합니다. 얇은 hazy 대기를 가진 cfg 변형을 &quot;유지된 대기&quot; 해석을 선호하는 사용자를 위해 보존합니다.",
  "li_186":"<b>표면 광물학.</b> hex 코드는 tie-break 선택입니다. 향후 열복사 분광 (basalt vs ultramafic vs silica-rich) 이 이들을 정밀화합니다.",
  "li_187":"<b>조석 가열 정밀화.</b> 0.05–0.5 W/m² 범위는 e ≈ 0 에서의 Bolmont 2020 스케일링입니다. 전용 내부-구조 모델이 이를 좁히겠지만, 어느 쪽이든 일사가 지배합니다.",
  "h2_188":"Related",
  "li_189":"<a href=\"hd-219134.md\">hd-219134</a> — 호스트 별 Phase 3 합성",
  "li_190":"<a href=\"hd-219134-c.md\">hd-219134-c</a> — 두 번째 transit 하는 암석 super-Earth (더 차가움, 789 K)",
  "li_191":"<a href=\"61-vir-b.md\">61-vir-b</a> — solar-twin 호스트 주위 비교 대상 뜨거운 암석 super-Earth",
  "li_192":"<a href=\"trappist-1-b.md\">trappist-1-b</a> — 비교 대상 무대기 hot-rocky 행성 (M 왜성 호스트 조명)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
