  "h2_160":"Surface synthesis",
  "p_161":"TRAPPIST-1 f sits at the outer edge of the conservative habitable zone (Kopparapu 2014) and receives 38% of Earth&#x27;s insolation. Without significant greenhouse warming, the surface freezes globally (Wolf 2017 §5). With 0.1 bar CO₂, Wolf 2017 finds a tightly-confined substellar open-water disk can be sustained — but the geometry is fragile and depends on initial state (Pierrehumbert 2011 bifurcation between aquaplanet and snowball states).",
  "p_162":"Acuña 2025 (2504.16201) provides the best current interior fit: water mass fraction is 16.2% ± 9.9% if all interior parameters are allowed to vary, or 6.9% ± 2.0% if the mantle-to-core ratio is fixed at Earth-like. Either way, f is significantly more hydrated than Earth — likely a true &quot;ocean world&quot; with a global liquid-water layer underneath the global ice cover.",
  "p_163":"The Bourgeois 2024 (2008.09599) magma-ocean evolution work suggests f experienced an extended (&gt;100 Myr) magma ocean phase that produced substantial atmospheric water and oxygen. Most water has since either re-equilibrated into the mantle, been lost to space via photolytic escape, or condensed onto the surface as the planet cooled. The remaining ocean (now sub-glacial) and the thin CO₂ atmosphere are the long-lived endpoint.",
  "p_164":"For the surface morphology, the tidally-locked snowball template gives:",
  "li_165":"<b>Substellar disk</b> (≲8° from substellar point): possible open water lens; otherwise thin ice with localized fractures. Surface T ≈ 260 K is the marginal case for ice/water equilibrium.",
  "li_166":"<b>Glacial ice zone</b> (8–180° from substellar): thick (&gt;1 km) glacial ice over a sub-glacial liquid-water ocean. Surface T drops monotonically from ~250 K at the ice line to ~170 K at the antistellar point.",
  "li_167":"<b>Terminator</b> (~90° from substellar): cold (~190 K) and dark; the most photogenic zone, where pressure ridges throw long shadows under grazing 2566 K light. Possible bedrock exposure where glacial flow has thinned ice over crustal highs.",
  "p_168":"<b>Color choice.</b> Snow / glacial ice albedo is 0.6–0.8 (clean, fresh) or 0.4–0.6 (dust-stained, aged). Under M-dwarf illumination the perceived hue is warm cream (<code>#e0d8d0</code>) rather than blue-white. CO₂ frost on the nightside contributes a slightly tan tint to dark patches (<code>#888070</code>).",
  "p_169":"<b>Snowball default, lens variant.</b> Critically, Turbet 2018 explicitly shows that f at 0.1 bar CO₂ (the current cfg pressure) is a <b>complete snowball</b> — no open water at all. The substellar open-water lens emerges only at ≥1 bar CO₂. The cfg&#x27;s default is therefore revised to a global snowball; the &quot;8° substellar lens&quot; is preserved only as the 1 bar CO₂ variant for a more habitable scenario. Visually this means: f looks like a clean white sphere from orbit, with no dark &quot;pupil&quot; — the eyeball-Earth appearance is reserved for e and (in the warm variant) for f at higher CO₂.",
  "p_170":"<b>Sub-glacial ocean architecture.</b> Acuña 2021 (2101.08172) details the hydrosphere layering: surface ice Ih, then high-pressure ice phases (II/III/V/VI) at increasing depth, transitioning to ice VII at the base (~100 GPa). A thin liquid-water lens can exist between ice Ih and the high-pressure ices, depending on geothermal flux — this is the sub-glacial ocean that the cfg already adopts. Europa-like layered hydrosphere is the closest Solar System analog.",
  "p_171":"<b>Photochemical haze / tholin layer.</b> Turbet 2018 §6 finds that f sustains photochemical haze formation at its altitude. Over geological timescales these settle as a faint tan/brown surface overlay biased toward UV-exposed regions. The cfg&#x27;s iron-oxide accent already captures something similar, but the mechanism (UV photochemistry → tholin deposition) is distinct from oxide formation — both can contribute to the surface color.",
  "p_172":"<b>Iron oxide / bedrock.</b> Limited exposure — only at ridge tops near the terminator where glacial flow has thinned ice. Iron oxide tint is faint compared to the inner planets (b, c) due to limited stellar UV at f&#x27;s distance and the persistent ice cover protecting most of the bedrock from photolytic oxidation.",
  "p_173":"<b>Morphology under tidal lock.</b> Ice circulation: surface heating at the substellar point sublimates ice (low rate due to thin atmo); CO₂ + trace H₂O are transported via atmospheric circulation to colder zones (terminator, nightside) where they condense. Glacial flow then returns ice toward the substellar disk. The result is a stable ice circulation with a persistent thin open-water lens at the substellar point.",
  "h2_174":"Atmosphere synthesis",
  "p_175":"The Lim 2024 NIRISS reconnaissance of f (no arXiv preprint, conference abstract ADS bibcode 2024ESS.....510106L) reports the first JWST transmission observation of f. The result: H₂-rich atmospheres are rejected, consistent with Moran 2018 (1810.05210) HST limits, but secondary atmospheres (CO₂, N₂, H₂O-rich) cannot be constrained from the available transit baseline. This means the observational picture for f is more open than for b, c, d, or e.",
  "p_176":"Theoretical modeling (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) agrees that for f to be at all habitable / temperate, it needs significant CO₂ greenhouse — Wolf 2017 finds 1 bar CO₂ is needed for a fully open ocean, 0.1 bar gives a tight substellar disk, less gives a complete snowball.",
  "p_177":"For NearStars we adopt <b>0.1 bar CO₂-rich snowball with substellar open-water lens</b>:",
  "li_178":"<b>Pressure</b> 0.1 bar (10 kPa). Wolf 2017 §5 finds this is the minimum for partial substellar open water under f&#x27;s insolation.",
  "li_179":"<b>Composition</b> CO₂-dominated (95%), trace N₂ (4%), trace H₂O (saturated at terminator cold-trap), trace Ar. The CO₂-richness reflects volcanic outgassing accumulating over time in a planet with no carbonate-silicate cycle running (because the surface is frozen and no liquid-water weathering occurs to scrub CO₂).",
  "li_180":"<b>Clouds.</b> Limited (~25% global): water-ice cirrus near the substellar disk and faint CO₂ ice clouds at the terminator.",
  "p_181":"<b>CO₂ cold-trap geometry.</b> Turbet 2018 finds that f&#x27;s CO₂ ice deposits form preferentially in two symmetric cold traps at longitude -120°, latitude ±80°, at 30–50 km altitude. This is a visual annotation for the cfg: nightside CO₂ ice clouds (the small fraction predicted at 0.1 bar pressure) are concentrated in these polar cold-trap regions, not uniformly distributed.",
  "p_182":"<b>Sky appearance.</b> The 0.1 bar CO₂ atmosphere has Rayleigh scattering ~5% of Earth&#x27;s, with the M-dwarf SED further depressing short-wavelength contribution. The sky near substellar is faintly dark-rust (<code>#604040</code>) with the star dominant; near terminator the sky is dark with faint cyan-white at the limb from CO₂ ice cloud forward-scattering.",
  "h2_183":"Rotation &amp; spin synthesis",
  "p_184":"Tidal damping for f at 9.21-day period over 7.6 Gyr establishes the synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.01007 — at the upper edge where 3:2 spin-orbit becomes marginally stable (Vinson 2017), but 1:1 remains the overwhelming-probability state.",
  "p_185":"<b>KSP implementation note.</b> Rotation period = orbital period = 9.2075 days (795 528 s).",
  "p_186":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation ~ 1% (slightly higher than inner planets due to higher e). The substellar point is essentially fixed.",
  "h2_187":"Visual styling",
  "li_188":"<b>Global appearance.</b> From orbit, f is a near-uniform warm cream snowball (<code>#e0d8d0</code>) with a small dark spot at the substellar point (open-water lens, <code>#1a1c30</code>). Limited cloud cover with occasional cirrus over the substellar disk. The antistellar hemisphere shows slightly tan-stained ice from CO₂ frost.",
  "li_189":"<b>Substellar disk (open water).</b> Small dark patch ~16° wide (8° radius). Contrast against the surrounding warm-cream ice is dramatic.",
  "li_190":"<b>Glacial ice.</b> Vast majority of visible surface. Smooth at large scale, with pressure ridges and crevasses visible at the terminator under grazing light. Subtle color variations between fresh snow (<code>#e0d8d0</code>) and dust-stained / refrozen ice (<code>#c8c0b0</code>).",
  "li_191":"<b>Terminator band.</b> High topographic contrast in oblique light. Possible bedrock exposure at ridge tops (<code>#888070</code> accent).",
  "li_192":"<b>Nightside.</b> Dark cream-tan from CO₂ frost. KSP nightside ambient ≈ 2–5% dayside.",
  "li_193":"<b>Atmosphere haze.</b> Very thin warm gray-red limb glow (<code>#604040</code>), 5–10 km thick, only visible against space at the planet&#x27;s limb.",
  "li_194":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.65° in f&#x27;s sky (3× the Sun from Earth) — appears as a deep red-orange disk. Surface illumination is 0.38 S⊕, similar to deep-Earth twilight; the star&#x27;s dim red light gives the snowscape a permanent dawn-tint.",
  "li_195":"<b>Sister planets in sky.</b> e (next inward) at angular size ~0.3° in inferior conjunction; g (next outward) at ~0.3° during outer conjunctions. Conjunctions every ~25 days (f-g synodic period).",
  "h2_196":"Bibliography",
  "h3_197":"Read (visual-informative, drove decisions above)",
  "li_198":"<b>2504.16201</b> Acuña 2025 — Internal structure of f via MAGRATHEA. wmf 16.2% ± 9.9% (free CMF) or 6.9% ± 2.0% (Earth-like mantle-to-core). Establishes f as an ocean world. Drives the sub-glacial ocean cfg.",
  "li_199":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Predicts f has retained substantial water through evolution.",
  "li_200":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry e and f atmospheres. Constrains f&#x27;s atmosphere to CO₂-rich (snowball branch) or to a dry desiccated post-runaway state.",
  "li_201":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. f is one of the planets where Lincowski&#x27;s modeling shows cold, CO₂-rich atmospheres are the equilibrium. Already read for d Phase 3 / e Phase 3.",
  "li_202":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating in TRAPPIST-1 planets. Drives the upward revision of f&#x27;s tidal heat flux to 0.14 W/m² (30× higher than previous estimate). Maxwell viscoelastic; mantle T_eq 1621 K.",
  "li_203":"<b>2101.08172</b> Acuña 2021 — Hydrosphere characterization. Details f&#x27;s sub-glacial ocean architecture (ice Ih / high-pressure ices / ice VII). WMF 3.7 ± 2.6% scenario 2, broadening the lower bound on water content.",
  "li_204":"<b>1707.06927</b> Turbet 2018 — Modeling climate diversity for TRAPPIST-1. <b>Drives the snowball default</b>: at 0.1 bar CO₂, f is fully ice-covered (no substellar lens). Open ocean emerges only at ≥1 bar CO₂. Also identifies the polar CO₂ cold-trap geometry.",
  "li_205":"<b>1710.08761</b> Kislyakova 2017 — Induction heating estimates. f total ~1.1×10¹⁸ W; revises the cfg&#x27;s induction heating downward.",
  "li_206":"<b>1911.08596</b> Fauchez 2019 — Cloud and haze modeling for HZ TRAPPIST-1 planets. Confirms f&#x27;s snowball state at all plausible CO₂ pressures ≤10 bar.",
  "h3_207":"Read (context / methodology, not decision-driving)",
  "li_208":"<b>2605.06964</b> Energy balance model for TRAPPIST-1 climates. Methodology paper; supports the snowball state for f.",
  "li_209":"<b>2506.21351</b> SEPHI 2.0 habitability index. Catalog context only.",
  "li_210":"<b>2502.00132</b> Way 2025 — d-focused but useful methodology reference for tidally-locked GCMs that apply to f.",
  "li_211":"<b>1810.05210</b> Moran 2018 — HST haze limits. Already read for d Phase 3.",
  "h3_212":"Read (instrument-only, not visual-informative)",
  "p_213":"(None specific to f at this depth.)",
  "h3_214":"Not read — no arXiv preprint or low-priority (~9 papers)",
  "p_215":"The f bibliography is very small (15 papers, 6 with arXiv).",
  "li_216":"<b>2024ESS.....510106L</b> Lim 2024 — TRAPPIST-1 f NIRISS atmospheric reconnaissance. <b>Key observational paper for f, but no arXiv preprint available.</b> ADS abstract only. The atmosphere inference (H₂-rich rejected, secondary atmospheres unconstrained) is sourced from the abstract. <b>Flagged for fetch when arXiv preprint appears.</b>",
  "li_217":"<b>2025arXiv...</b> various conference summaries on biosignature feasibility and ELT characterization. Skip.",
  "p_218":"---",
  "h2_219":"Open items for follow-up",
  "li_220":"Re-fetch the Lim 2024 NIRISS f paper when an arXiv preprint becomes available; the formal published version may tighten the secondary-atmosphere constraints.",
  "li_221":"The 0.1 bar CO₂ choice is bracketed by Wolf 2017&#x27;s modeling but is not directly constrained by f-specific observations. If future JWST emission spectroscopy of f reveals a colder dayside than current models predict, the CO₂ pressure should be reduced (or set to zero — full snowball).",
  "li_222":"Cfg variant for the &quot;complete snowball&quot; (no substellar open water) interpretation — visually simpler, fully white-cream world. Use if the substellar lens is found to be too marginal to render meaningfully in KSP.",
  "li_223":"Cfg variant for the &quot;1 bar CO₂ + full ocean&quot; interpretation (Wolf 2017 §5 best-case): visually similar to e but cooler and more ice-banded. Use if a deeper habitable-zone alternative is desired.",
  "li_224":"The water mass fraction (7–16%) is high enough that f could plausibly host a sub-glacial liquid-water layer comparable to Europa&#x27;s — possibly with hydrothermal activity if any tidal / radiogenic heating reaches the seafloor. Not directly visual but worth a Principia annotation.",
  "li_225":"The choice between snowball default (0.1 bar CO₂) and 1 bar CO₂ + substellar open-water lens variant is a cfg gameplay-vs-fidelity trade. Default snowball matches Turbet 2018 most directly; the warmer variant preserves the more visually distinctive &quot;eyeball&quot; rendering.",

  "td_146":"medium",

  "td_148":"<code>radiogenic_heat_w_m2</code>",
  "td_149":"0.04",
  "td_150":"medium",
  "td_151":"지구 analog mantle radiogenics × 1",
  "td_152":"<code>star_apparent_angular_diameter_deg</code>",
  "td_153":"1.65",
  "td_154":"high",
  "td_155":"derived. 2 × R★ / a × (180/π)",
  "td_156":"<code>stellar_illumination_color_temp_k</code>",
  "td_157":"2566",
  "td_158":"high",
  "td_159":"Agol 2021 SED fit",
  "h2_160":"표면 합성",
  "p_161":"TRAPPIST-1 f 는 보수적 거주 가능 영역 (Kopparapu 2014) 의 바깥 가장자리에 자리하며 지구 일조량의 38% 를 받습니다. 유의미한 온실 가열이 없으면 표면이 전역적으로 얼어붙습니다 (Wolf 2017 §5). 0.1 bar CO₂ 가 있을 때 Wolf 2017 은 좁게 갇힌 substellar open-water disk 가 유지될 수 있음을 보였지만, 그 기하 구조는 취약하고 초기 상태에 의존합니다 (Pierrehumbert 2011 의 aquaplanet 와 snowball 사이 bifurcation).",
  "p_162":"Acuña 2025 (2504.16201) 가 현재 최선의 내부 fit 을 제공합니다. 모든 내부 파라미터의 변화를 허용하면 water mass fraction 이 16.2% ± 9.9%, 또는 mantle-to-core 비율을 지구형으로 고정하면 6.9% ± 2.0% 입니다. 어느 쪽이든 f 는 지구보다 상당히 더 hydrated 된 행성이며, 전역 얼음 cover 아래에 전역 액체 물 층을 가진 진정한 &quot;ocean world&quot; 일 가능성이 큽니다.",
  "p_163":"Bourgeois 2024 (2008.09599) 의 magma-ocean 진화 작업은 f 가 100 Myr 이상 지속된 magma ocean 단계를 거치며 상당량의 대기 물과 산소를 만들어냈음을 시사합니다. 그 후 대부분의 물은 mantle 로 재평형되거나, 광분해 탈출로 우주로 손실되거나, 행성이 식으면서 표면에 응결되었습니다. 지금 남아 있는 sub-glacial ocean 과 얇은 CO₂ 대기가 장기적 endpoint 에 해당합니다.",
  "p_164":"표면 morphology 의 경우 tidally-locked snowball 템플릿은 다음의 구조를 줍니다.",
  "li_165":"<b>Substellar disk</b> (substellar 점에서 ≲8°). open-water lens 가능; 그렇지 않다면 국지적 균열을 동반한 얇은 얼음. 표면 T ≈ 260 K 는 얼음과 물 평형의 marginal 케이스에 해당.",
  "li_166":"<b>빙하 얼음 영역</b> (substellar 에서 8–180°). sub-glacial 액체 물 ocean 위의 두꺼운 (&gt;1 km) 빙하 얼음. 표면 T 는 ice line 의 ~250 K 에서 antistellar 점의 ~170 K 까지 단조 감소.",
  "li_167":"<b>Terminator</b> (substellar 에서 ~90°). 차갑고 (~190 K) 어두움. 가장 사진발이 좋은 영역으로, 2566 K 빛이 비스듬히 비추는 가운데 pressure ridge 가 긴 그림자를 드리움. 빙하 흐름이 지각 highs 위에서 얼음을 얇게 만든 곳에서는 기반암 노출도 가능.",
  "p_168":"<b>색 선택.</b> 눈과 빙하 얼음의 albedo 는 깨끗하고 신선한 경우 0.6–0.8, 먼지로 얼룩져 노화된 경우 0.4–0.6 입니다. M-dwarf 조명 아래에서는 청-백색이 아닌 따뜻한 크림색 (<code>#e0d8d0</code>) 으로 보입니다. nightside 의 CO₂ frost 가 어두운 패치에 약간의 황갈색 tint 를 더합니다 (<code>#888070</code>).",
  "p_169":"<b>기본은 snowball, lens 는 variant.</b> 결정적으로, Turbet 2018 은 0.1 bar CO₂ (현재 cfg 압력) 에서 f 가 <b>완전한 snowball</b> 이라는 점을 분명히 보여줍니다. open water 가 전혀 없는 상태입니다. substellar open-water lens 는 ≥1 bar CO₂ 에서만 나타납니다. 따라서 cfg 기본값은 전역 snowball 로 수정하고, &quot;8° substellar lens&quot; 는 더 거주 가능한 시나리오를 위한 1 bar CO₂ variant 로만 보존합니다. 시각적으로는 다음과 같은 의미입니다. f 는 궤도에서 깨끗한 백색 구체로 보이며 어두운 &quot;동공&quot; 이 없습니다. eyeball-Earth 외관은 e 와 (warm variant 의 경우) 더 높은 CO₂ 의 f 에만 남깁니다.",
  "p_170":"<b>Sub-glacial ocean 구조.</b> Acuña 2021 (2101.08172) 은 hydrosphere 층 구조를 상세히 다룹니다. 표면의 ice Ih, 깊이가 늘면서 등장하는 high-pressure ice phase (II/III/V/VI), 바닥 (~100 GPa) 의 ice VII 로의 전이입니다. 지열 flux 에 따라 ice Ih 와 high-pressure ice 사이에 얇은 액체 물 lens 가 존재할 수 있는데, 이것이 cfg 가 이미 채택한 sub-glacial ocean 입니다. 태양계에서 가장 가까운 analog 는 Europa 형 층상 hydrosphere 입니다.",
  "p_171":"<b>광화학 haze / tholin 층.</b> Turbet 2018 §6 은 f 가 자신의 고도에서 광화학 haze 형성을 유지한다고 봅니다. 지질학적 시간 척도에서 이 haze 들은 UV 노출 지역으로 편향된 희미한 황갈색 표면 overlay 로 침적됩니다. cfg 의 산화철 accent 가 이미 비슷한 효과를 일부 잡아내지만, 메커니즘 (UV 광화학 → tholin 침적) 은 산화 형성과는 별개입니다. 두 메커니즘이 모두 표면 색에 기여할 수 있습니다.",
  "p_172":"<b>산화철 / 기반암.</b> 노출은 제한적입니다. terminator 근처 능선 정상에서 빙하 흐름이 얼음을 얇게 만든 곳에서만 드러납니다. f 의 거리에서는 별의 UV 가 약하고 지속적인 얼음 cover 가 대부분의 기반암을 광분해 산화로부터 보호하기 때문에, 산화철 tint 는 안쪽 행성 (b, c) 에 비해 훨씬 희미합니다.",
  "p_173":"<b>조석 고정 하의 morphology.</b> 얼음 순환이 핵심입니다. substellar 점의 표면 가열이 얼음을 sublimate 시키며 (얇은 대기 탓에 속도는 낮음), CO₂ 와 미량 H₂O 는 대기 순환을 통해 더 차가운 terminator 와 nightside 로 운반되어 응결합니다. 그 후 빙하 흐름이 얼음을 다시 substellar disk 쪽으로 되돌리며, 결과적으로 substellar 점에 지속적인 얇은 open-water lens 를 유지하는 안정한 얼음 순환이 성립합니다.",
  "h2_174":"대기 합성",
  "p_175":"f 에 대한 Lim 2024 NIRISS 정찰 (arXiv preprint 없음, conference abstract ADS bibcode 2024ESS.....510106L) 은 f 의 첫 JWST transmission 관측을 보고합니다. 결과는 다음과 같습니다. H₂-rich 대기는 배제되며 Moran 2018 (1810.05210) 의 HST 한계와 일관되지만, 2차 대기 (CO₂, N₂, H₂O-rich) 는 현재 가용한 transit baseline 으로는 제약되지 않습니다. 즉 f 의 관측적 그림은 b, c, d, e 보다 훨씬 더 열려 있습니다.",
  "p_176":"이론적 모델링 (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) 은 f 가 조금이라도 거주 가능하거나 온화하려면 유의미한 CO₂ 온실효과가 필요하다는 점에 일치합니다. Wolf 2017 은 완전한 open ocean 에는 1 bar CO₂, 0.1 bar 에서는 좁은 substellar disk, 그보다 낮으면 완전한 snowball 이 된다고 봅니다.",
  "p_177":"NearStars 는 <b>substellar open-water lens 를 가진 0.1 bar CO₂-rich snowball</b> 을 채택합니다.",
  "li_178":"<b>압력</b> 0.1 bar (10 kPa). Wolf 2017 §5 는 이 값이 f 의 일조량 아래에서 부분 substellar open water 를 유지할 수 있는 최소값임을 보였습니다.",
  "li_179":"<b>조성</b> CO₂ 지배 (95%), 미량 N₂ (4%), 미량 H₂O (terminator cold-trap 에서 포화), 미량 Ar. CO₂ 가 풍부한 이유는 표면이 얼어붙어 액체 물 풍화로 CO₂ 를 제거할 carbonate-silicate cycle 이 작동하지 않는 행성에 화산 outgassing 이 시간에 걸쳐 누적되기 때문입니다.",
  "li_180":"<b>구름.</b> 제한적 (~25% 전역). substellar disk 근처의 물 얼음 cirrus 와 terminator 의 희미한 CO₂ 얼음 구름.",
  "p_181":"<b>CO₂ cold-trap 기하.</b> Turbet 2018 은 f 의 CO₂ 얼음 침적이 경도 -120°, 위도 ±80°, 고도 30–50 km 의 두 개의 대칭적 cold trap 에 우선적으로 형성된다고 봅니다. 이는 cfg 의 시각적 annotation 으로 의미가 있습니다. nightside CO₂ 얼음 구름 (0.1 bar 압력에서 예측되는 적은 양) 은 균일하게 분포하지 않고 이 극지 cold-trap 영역에 집중됩니다.",
  "p_182":"<b>하늘 외관.</b> 0.1 bar CO₂ 대기는 Rayleigh scattering 이 지구의 ~5% 정도이고, M-dwarf SED 가 단파장 기여를 추가로 깎아 내립니다. substellar 근처 하늘은 별이 압도적으로 지배하는 가운데 희미한 dark-rust (<code>#604040</code>) 톤을 띠며, terminator 근처에서는 CO₂ 얼음 구름의 forward-scattering 으로 limb 에 희미한 cyan-white 가 비치는 것을 제외하면 하늘이 어둡습니다.",
  "h2_183":"자전 &amp; spin 합성",
  "p_184":"7.6 Gyr 에 걸친 9.21 일 주기의 조석 damping 이 f 의 동기 (1:1) 구성을 확립합니다. 황도 경사각은 0 으로 damping 됩니다. 이심률은 0.01007 로, 3:2 spin-orbit 가 marginally 안정해지는 상단 가장자리에 해당하지만 (Vinson 2017), 1:1 이 여전히 압도적 확률의 상태로 남습니다.",
  "p_185":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 9.2075 일 (795 528 s).",
  "p_186":"<b>계절 없음.</b> 황도 경사각 = 0; libration 유도 일조량 변동은 ~ 1% 입니다 (e 보다 이심률이 높아 안쪽 행성보다 약간 큼). substellar 점은 본질적으로 고정되어 있습니다.",
  "h2_187":"비주얼 스타일",
  "li_188":"<b>전역 외관.</b> 궤도에서 본 f 는 substellar 점에 작은 어두운 spot (open-water lens, <code>#1a1c30</code>) 이 박힌, 거의 균일한 따뜻한 크림색 snowball (<code>#e0d8d0</code>) 입니다. 구름 cover 는 제한적이며 substellar disk 위로 가끔 cirrus 가 지나갑니다. antistellar 반구는 CO₂ frost 로 약간 황갈색이 얼룩진 얼음을 보입니다.",
  "li_189":"<b>Substellar disk (open water).</b> ~16° 너비 (반경 8°) 의 작은 어두운 패치. 주변의 따뜻한 크림색 얼음과 대비가 극적입니다.",
  "li_190":"<b>빙하 얼음.</b> 보이는 표면의 대부분을 차지합니다. 큰 스케일에서는 매끄럽지만 terminator 의 비스듬한 빛 아래에서는 pressure ridge 와 crevasse 가 드러납니다. 신선한 눈 (<code>#e0d8d0</code>) 과 먼지로 얼룩지거나 다시 얼어붙은 얼음 (<code>#c8c0b0</code>) 사이에 미묘한 색 변화가 있습니다.",
  "li_191":"<b>Terminator band.</b> 비스듬한 빛 아래 지형 대비가 큽니다. 능선 정상에 기반암 노출이 있을 수 있습니다 (<code>#888070</code> accent).",
  "li_192":"<b>Nightside.</b> CO₂ frost 가 만든 어둑한 크림-황갈색 톤. KSP nightside ambient 는 dayside 의 2–5% 수준.",
  "li_193":"<b>Atmosphere haze.</b> 매우 얇은 따뜻한 회-적색 limb glow (<code>#604040</code>), 두께는 5–10 km, 행성 limb 의 공간 배경에 대해서만 보입니다.",
  "li_194":"<b>하늘의 별.</b> TRAPPIST-1 은 f 의 하늘에서 1.65° 를 차지합니다 (지구에서 본 태양의 3배). 깊은 적-오렌지 disk 로 나타납니다. 표면 조명은 0.38 S⊕ 로 지구의 깊은 황혼과 비슷하며, 별의 어둑한 적색 빛이 설경에 영구적인 새벽빛 tint 를 부여합니다.",
  "li_195":"<b>하늘의 자매 행성.</b> e (다음 안쪽) 가 inferior conjunction 시 각 크기 ~0.3°; g (다음 바깥쪽) 가 outer conjunction 시 ~0.3°. 합은 약 25 일 마다 일어납니다 (f-g synodic 주기).",
  "h2_196":"참고 문헌",
  "h3_197":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_198":"<b>2504.16201</b> Acuña 2025 — MAGRATHEA 를 이용한 f 의 내부 구조 분석. wmf 16.2% ± 9.9% (free CMF) 또는 6.9% ± 2.0% (지구형 mantle-to-core). f 를 ocean world 로 확립하며, sub-glacial ocean cfg 를 견인.",
  "li_199":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 magma ocean 진화. f 가 진화를 거치며 상당량의 물을 보유했다고 예측.",
  "li_200":"<b>2006.11349</b> Wunderlich 2020 — e 와 f 의 wet vs. dry 대기. f 의 대기를 CO₂-rich (snowball branch) 또는 dry desiccated post-runaway 상태로 제약.",
  "li_201":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계들의 진화한 기후. f 는 Lincowski 의 모델링이 차갑고 CO₂-rich 한 대기를 평형으로 보여주는 행성 중 하나. d Phase 3 / e Phase 3 에서 이미 읽음.",
  "li_202":"<b>1712.05641</b> Barr 2018 — TRAPPIST-1 행성들의 내부 구조와 조석 가열. f 의 조석 heat flux 를 0.14 W/m² (이전 추정 대비 30배) 로 상향 수정하는 근거. Maxwell viscoelastic; mantle T_eq 1621 K.",
  "li_203":"<b>2101.08172</b> Acuña 2021 — Hydrosphere 특성화. f 의 sub-glacial ocean 구조 (ice Ih / high-pressure ice / ice VII) 를 상세히 다룸. WMF 3.7 ± 2.6% scenario 2 로 water 함량의 하한을 넓힘.",
  "li_204":"<b>1707.06927</b> Turbet 2018 — TRAPPIST-1 의 기후 다양성 모델링. <b>snowball 기본값을 견인.</b> 0.1 bar CO₂ 에서 f 는 완전히 얼음으로 덮임 (substellar lens 없음). open ocean 은 ≥1 bar CO₂ 에서만 나타남. 극지 CO₂ cold-trap 기하도 식별.",
  "li_205":"<b>1710.08761</b> Kislyakova 2017 — Induction heating 추정. f 의 총량 ~1.1×10¹⁸ W. cfg 의 induction heating 을 하향 수정.",
  "li_206":"<b>1911.08596</b> Fauchez 2019 — HZ TRAPPIST-1 행성들의 구름 및 haze 모델링. CO₂ 압력 ≤10 bar 의 모든 그럴듯한 범위에서 f 의 snowball 상태를 확인.",
  "h3_207":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_208":"<b>2605.06964</b> TRAPPIST-1 기후의 에너지 균형 모델. 방법론 논문이며 f 의 snowball 상태를 지지.",
  "li_209":"<b>2506.21351</b> SEPHI 2.0 거주 가능성 지수. 카탈로그 맥락만.",
  "li_210":"<b>2502.00132</b> Way 2025 — d 중심 논문이지만 f 에도 적용되는 tidally-locked GCM 의 유용한 방법론 reference.",
  "li_211":"<b>1810.05210</b> Moran 2018 — HST haze 한계. d Phase 3 에서 이미 읽음.",
  "h3_212":"읽음 (instrument-only, 시각 정보 아님)",
  "p_213":"(이 깊이에서 f 에 특화된 항목 없음.)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
