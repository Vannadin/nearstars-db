  "h2_212":"Surface synthesis",
  "p_213":"TRAPPIST-1 f sits at the outer edge of the conservative habitable zone (Kopparapu 2014) and receives 38% of Earth&#x27;s insolation. It lies beyond the maximum-CO₂-greenhouse outer edge, so the surface freezes globally regardless of CO₂ loading (Wolf 2017 §5 snowballs f even at 30 bar CO₂; Turbet 2018 and Fauchez 2019 agree at all CO₂ ≤10 bar). The surface open-water eyeball that GCMs do produce at this insolation belongs to e, the next planet inward — not f.",
  "p_214":"Acuña 2025 (2504.16201) provides the best current interior fit: water mass fraction is 16.2% ± 9.9% if all interior parameters are allowed to vary, or 6.9% ± 2.0% if the mantle-to-core ratio is fixed at Earth-like. Either way, f is significantly more hydrated than Earth — likely a true &quot;ocean world&quot; with a global liquid-water layer underneath the global ice cover.",
  "p_215":"The Bourgeois 2024 (2008.09599) magma-ocean evolution work suggests f experienced an extended (&gt;100 Myr) magma ocean phase that produced substantial atmospheric water and oxygen. Most water has since either re-equilibrated into the mantle, been lost to space via photolytic escape, or condensed onto the surface as the planet cooled. The remaining ocean (now sub-glacial) and the thin CO₂ atmosphere are the long-lived endpoint.",
  "p_216":"For the surface morphology, the tidally-locked snowball template gives:",
  "li_217":"<b>Substellar disk</b> (≲8° from substellar point): thin ice at ~260 K, no open water. The substellar peak stays below the 273 K freezing point, so the surface is ice with localized fractures rather than a melt lens.",
  "li_218":"<b>Glacial ice zone</b> (8–180° from substellar): thick (&gt;1 km) glacial ice over a sub-glacial liquid-water ocean. Surface T drops monotonically from ~250 K at the ice line to ~170 K at the antistellar point.",
  "li_219":"<b>Terminator</b> (~90° from substellar): cold (~190 K) and dark; the most photogenic zone, where pressure ridges throw long shadows under grazing 2566 K light. Possible bedrock exposure where glacial flow has thinned ice over crustal highs.",
  "p_220":"<b>Color choice.</b> Snow / glacial ice albedo is 0.6–0.8 (clean, fresh) or 0.4–0.6 (dust-stained, aged). Under M-dwarf illumination the perceived hue is warm cream (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) rather than blue-white. CO₂ frost on the nightside contributes a slightly tan tint to dark patches (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code>).",
  "p_221":"<b>Sub-glacial ocean by interesting-first.</b> Wolf 2017, Turbet 2018, and Fauchez 2019 all converge: f is a complete snowball at every modeled CO₂ pressure (snowball even at 30 bar CO₂ in Wolf 2017, since f lies beyond the maximum-CO₂-greenhouse outer edge of the HZ). There is no surface open-water disk — the substellar &quot;eyeball&quot; geometry belongs to e, not f. The interesting-first reading therefore takes the sub-glacial ocean-world framing: f&#x27;s high water content (Acuña 2025 wmf 16%) plus basal/geothermal melt make a liquid layer beneath the global ice the defining &quot;ocean world&quot; feature, even though it is hidden from orbit. This keeps f genuinely an ocean world — a striking Europa-analog — without inventing surface water the GCMs do not support. The conservative fully-frozen reading (no liquid layer at all) is preserved in Open items as the documented canonical alternative.",
  "p_222":"<b>Sub-glacial ocean architecture.</b> Acuña 2021 (2101.08172) details the hydrosphere layering: surface ice Ih, then high-pressure ice phases (II/III/V/VI) at increasing depth, transitioning to ice VII at the base (~100 GPa). A thin liquid-water lens can exist between ice Ih and the high-pressure ices, depending on geothermal flux — this is the sub-glacial ocean that the cfg already adopts. Europa-like layered hydrosphere is the closest Solar System analog.",
  "p_223":"<b>Photochemical haze / tholin layer.</b> Turbet 2018 §6 finds that f sustains photochemical haze formation at its altitude. Over geological timescales these settle as a faint tan/brown surface overlay biased toward UV-exposed regions. The cfg&#x27;s iron-oxide accent already captures something similar, but the mechanism (UV photochemistry → tholin deposition) is distinct from oxide formation — both can contribute to the surface color.",
  "p_224":"<b>Iron oxide / bedrock.</b> Limited exposure — only at ridge tops near the terminator where glacial flow has thinned ice. Iron oxide tint is faint compared to the inner planets (b, c) due to limited stellar UV at f&#x27;s distance and the persistent ice cover protecting most of the bedrock from photolytic oxidation.",
  "p_225":"<b>Morphology under tidal lock.</b> Ice circulation: surface heating at the substellar point sublimates ice (low rate due to thin atmo); CO₂ + trace H₂O are transported via atmospheric circulation to colder zones (terminator, nightside) where they condense. Glacial flow then returns ice toward the substellar disk. The result is a stable ice circulation over a globally ice-covered surface — no open water ever forms at the substellar point.",
  "h2_226":"Atmosphere synthesis",
  "p_227":"The Lim 2024 NIRISS reconnaissance of f (no arXiv preprint, conference abstract ADS bibcode 2024ESS.....510106L) reports the first JWST transmission observation of f. The result: H₂-rich atmospheres are rejected, consistent with Moran 2018 (1810.05210) HST limits, but secondary atmospheres (CO₂, N₂, H₂O-rich) cannot be constrained from the available transit baseline. This means the observational picture for f is more open than for b, c, d, or e.",
  "p_228":"Theoretical modeling (Wolf 2017 §5, Turbet 2018, Fauchez 2019) converges on f being a complete snowball: f sits beyond the maximum-CO₂-greenhouse outer edge of the HZ, so even tens of bars of CO₂ cannot open surface water (Wolf 2017 snowballs f at 30 bar CO₂; Turbet 2018 and Fauchez 2019 agree at all CO₂ ≤10 bar). CO₂ still accumulates on the surface because, on a globally ice-covered world, the carbonate-silicate weathering sink is largely shut off.",
  "p_229":"For NearStars we adopt a <b>1 bar CO₂-rich atmosphere over a snowball surface</b>:",
  "li_230":"<b>Pressure</b> 1 bar (100 kPa). CO₂ accumulates without active silicate weathering on the ice-covered surface; this is a thickness estimate, not a warm/cold switch — f snowballs at every modeled CO₂ pressure, so pressure is not a divergence axis here.",
  "li_231":"<b>Composition</b> CO₂-dominated (95%), N₂ (4%), trace H₂O (cold-trapped as ice). Outgassing-driven, with limited carbonate-silicate weathering due to the globally ice-covered surface.",
  "li_232":"<b>Clouds.</b> Moderate (~30% global): thin water-ice and CO₂-ice cloud, occasional cirrus at the terminator and high latitudes.",
  "p_233":"<b>Mars-analog aurora.</b> With both a 1 bar CO₂ atmosphere and a non-trivial magnetic field (~0.3 × Earth, Garraffo 2017 test case), f hosts Mars-analog auroras driven by stellar-wind precipitation. The dominant emission is CO₂⁺ Fox–Duffendack–Barker bands at 580–620 nm (red-orange — the same chemistry that gives Mars&#x27;s discrete UV+visible aurora as seen by MAVEN), with secondary CO₂⁺ UV doublet and CO Cameron bands scattered into perceived violet. The auroral oval centers at ~55° magnetic latitude under typical stellar wind conditions; intensity ~80 kR (~8× Earth&#x27;s typical). For cfg rendering: primary <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> red along the auroral oval, <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet accent. Interesting-first tie-break: chose red+violet visible palette over UV-dominant rendering (which would not show in player view).",
  "p_234":"<b>CO₂ cold-trap geometry.</b> Turbet 2018 finds that f&#x27;s CO₂ ice deposits form preferentially in two symmetric cold traps at longitude -120°, latitude ±80°, at 30–50 km altitude. This is a visual annotation for the cfg: nightside CO₂ ice clouds are concentrated in these polar cold-trap regions, not uniformly distributed.",
  "p_235":"<b>Sky appearance.</b> The 1 bar CO₂ atmosphere gives modest Rayleigh scattering, with the M-dwarf SED further depressing the short-wavelength contribution. The sky near substellar is faintly dark-rust (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>) with the star dominant; near terminator the sky is dark with faint cyan-white at the limb from CO₂ ice cloud forward-scattering.",
  "h2_236":"Rotation &amp; spin synthesis",
  "p_237":"Tidal damping for f at 9.21-day period over 7.6 Gyr establishes the synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.01007 — at the upper edge where 3:2 spin-orbit becomes marginally stable (Vinson 2017), but 1:1 remains the overwhelming-probability state.",
  "p_238":"<b>KSP implementation note.</b> Rotation period = orbital period = 9.2075 days (795 528 s).",
  "p_239":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation ~ 1% (slightly higher than inner planets due to higher e). The substellar point is essentially fixed.",
  "p_240":"<b>Magnetic dynamo expectation.</b> f&#x27;s Earth-mass core supports an active dynamo (Driscoll &amp; Olson scaling in 2208.06523 finds Earth-mass dynamos extend lifetime via core solidification timing). The 9.2-day tidally-locked rotation reduces dipole strength via slow-rotation Reiners scaling (~0.3 × Earth dipole), but a coherent dipole remains supportable. Garraffo 2017 explicitly adopts f as the representative habitable-zone case with 0.3 G surface field; the cfg matches this assumption.",
  "h2_241":"Visual styling",
  "li_242":"<b>Global appearance.</b> From orbit, f is a uniform glacial-ice snowball world (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) — ice covers the whole surface, with no open-water pupil. The sub-glacial ocean is hidden under the crust and not visible from orbit. The auroral oval <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> red band crosses the nightside near magnetic latitude ~55°, visible in shadow against the dark ice.",
  "li_243":"<b>Substellar region.</b> No open water; faint thin-ice texturing and localized fractures mark the warmest (~260 K) part of the surface, but it reads as the same warm-cream ice as the rest of the globe.",
  "li_244":"<b>Glacial ice.</b> Vast majority of visible surface. Smooth at large scale, with pressure ridges and crevasses visible at the terminator under grazing light. Subtle color variations between fresh snow (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) and dust-stained / refrozen ice (<span class=\"hex-chip\" style=\"background:#c8c0b0\"></span><code>#c8c0b0</code>).",
  "li_245":"<b>Terminator band.</b> High topographic contrast in oblique light. Possible bedrock exposure at ridge tops (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code> accent).",
  "li_246":"<b>Nightside.</b> Dark cream-tan from CO₂ frost. KSP nightside ambient ≈ 2–5% dayside.",
  "li_247":"<b>Atmosphere haze.</b> Very thin warm gray-red limb glow (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>), 5–10 km thick, only visible against space at the planet&#x27;s limb.",
  "li_248":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.65° in f&#x27;s sky (3× the Sun from Earth) — appears as a deep red-orange disk. Surface illumination is 0.38 S⊕, similar to deep-Earth twilight; the star&#x27;s dim red light gives the snowscape a permanent dawn-tint.",
  "li_249":"<b>Sister planets in sky.</b> e (next inward) at angular size ~0.3° in inferior conjunction; g (next outward) at ~0.3° during outer conjunctions. Conjunctions every ~25 days (f-g synodic period).",

  "h2_260":"Bibliography",
  "h3_261":"Read (visual-informative, drove decisions above)",
  "li_262":"<b>2504.16201</b> Acuña 2025 — Internal structure of f via MAGRATHEA. wmf 16.2% ± 9.9% (free CMF) or 6.9% ± 2.0% (Earth-like mantle-to-core). Establishes f as an ocean world. Drives the sub-glacial ocean cfg.",
  "li_263":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Predicts f has retained substantial water through evolution.",
  "li_264":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry e and f atmospheres. Constrains f&#x27;s atmosphere to CO₂-rich (snowball branch) or to a dry desiccated post-runaway state.",
  "li_265":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. f is one of the planets where Lincowski&#x27;s modeling shows cold, CO₂-rich atmospheres are the equilibrium. Already read for d Phase 3 / e Phase 3.",
  "li_266":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating in TRAPPIST-1 planets. Drives the upward revision of f&#x27;s tidal heat flux to 0.14 W/m² (30× higher than previous estimate). Maxwell viscoelastic; mantle T_eq 1621 K.",
  "li_267":"<b>2101.08172</b> Acuña 2021 — Hydrosphere characterization. Details f&#x27;s sub-glacial ocean architecture (ice Ih / high-pressure ices / ice VII). WMF 3.7 ± 2.6% scenario 2, broadening the lower bound on water content.",
  "li_268":"<b>1707.06927</b> Turbet 2018 — Modeling climate diversity for TRAPPIST-1. <b>Drives the snowball default</b>: at 0.1 bar CO₂, f is fully ice-covered (no substellar lens). Open ocean emerges only at ≥1 bar CO₂. Also identifies the polar CO₂ cold-trap geometry.",
  "li_269":"<b>1710.08761</b> Kislyakova 2017 — Induction heating estimates. f total ~1.1×10¹⁸ W; revises the cfg&#x27;s induction heating downward.",
  "li_270":"<b>1911.08596</b> Fauchez 2019 — Cloud and haze modeling for HZ TRAPPIST-1 planets. Confirms f&#x27;s snowball state at all plausible CO₂ pressures ≤10 bar.",
  "li_271":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. Adopts f as habitable-zone representative; 0.3 G test case drives the cfg&#x27;s dipole moment.",
  "li_272":"<b>2203.01065</b> RM22 — Rocky planet magnetic moment scaling.",
  "li_273":"<b>1910.09871</b> Atri 2019 — Surface-dose tables for f.",
  "h3_274":"Read (context / methodology, not decision-driving)",

  "li_276":"<b>2506.21351</b> SEPHI 2.0 habitability index. Catalog context only.",
  "li_277":"<b>2502.00132</b> Way 2025 — d-focused but useful methodology reference for tidally-locked GCMs that apply to f.",
  "li_278":"<b>1810.05210</b> Moran 2018 — HST haze limits. Already read for d Phase 3.",

  "p_282":"The f bibliography is very small (15 papers, 6 with arXiv).",
  "li_283":"<b>2024ESS.....510106L</b> Lim 2024 — TRAPPIST-1 f NIRISS atmospheric reconnaissance. <b>Key observational paper for f, but no arXiv preprint available.</b> ADS abstract only. The atmosphere inference (H₂-rich rejected, secondary atmospheres unconstrained) is sourced from the abstract. <b>Flagged for fetch when arXiv preprint appears.</b>",
  "li_284":"<b>2025arXiv...</b> various conference summaries on biosignature feasibility and ELT characterization. Skip.",

  "h2_286":"Open items for follow-up",
  "li_287":"Re-fetch the Lim 2024 NIRISS f paper when an arXiv preprint becomes available; the formal published version may tighten the secondary-atmosphere constraints.",
  "li_288":"The 1 bar CO₂ thickness is an outgassing estimate (CO₂ accumulates on an ice-covered surface), not constrained by f-specific observations. f snowballs at every modeled CO₂ pressure, so pressure is a thickness/haze parameter, not a warm/cold switch — refine the value if future JWST emission spectroscopy of f tightens the column.",
  "li_289":"The snowball surface is now the <b>default</b> (Wolf 2017 / Turbet 2018 / Fauchez 2019 converge), not a variant. The uniform glacial-ice globe is the canonical render; there is no surface open water to toggle off.",
  "li_290":"<b>Rejected/aggressive variant: 1 bar CO₂ + substellar open-water &quot;eyeball&quot;.</b> This is NOT supported by Wolf 2017 for f — f snowballs even at 30 bar CO₂ (the open-water eyeball belongs to e). Recorded here only so the mis-attributed reading is explicitly flagged as rejected; do not render it for f.",
  "li_291":"The water mass fraction (7–16%) is high enough that f could plausibly host a sub-glacial liquid-water layer comparable to Europa&#x27;s — possibly with hydrothermal activity if any tidal / radiogenic heating reaches the seafloor. Not directly visual but worth a Principia annotation.",
  "li_292":"The remaining gameplay-vs-fidelity trade for f is whether the sub-glacial ocean exists, not the surface state (which is snowball either way). The interesting-first pick keeps the Europa-analog sub-glacial ocean; the conservative reading drops it.",
  "li_293":"<b>Documented canonical alternative: fully frozen f, no liquid layer.</b> If the geothermal + tidal + radiogenic flux is insufficient for basal melt, f is solid ice all the way down with no sub-glacial ocean. Render-identical from orbit (uniform glacial ice); the only change is <span class=\"field-tt\" data-ko-tip=\"표면 액체수 해양 존재 여부.\" data-en-tip=\"Whether liquid-water surface ocean is present.\"><code>ocean_present</code></span> → false. Preserved as the conservative cfg variant.",
  "li_294":"Magnetic field strength is scaling-based; could be refined if a TRAPPIST-1-specific dynamo model becomes available.",

  ko: {
  "p_1":"TRAPPIST-1 f 는 M8V ultra-cool dwarf 를 9.21 일 주기로 도는 1.04 R⊕, 1.04 M⊕ 의 암석 행성입니다. 안쪽에서 다섯 번째 행성이며 지구 일조량의 0.38배를 받습니다. 보수적 거주 가능 영역의 바깥, maximum-greenhouse 한계 근처에 자리합니다 (Kopparapu 2013). 질량과 반경이 시스템 전체에서 지구와 가장 비슷하지만, Agol 2021 의 bulk density 가 4.92 g/cc 로 충분히 낮아 f 는 상당량의 물을 품은 워터 월드일 가능성이 높습니다. Acuña 2025 (2504.16201) 는 water mass fraction 을 16.2% ± 9.9% 로 추정합니다. f 에 대한 첫 NIRISS 대기 정찰 (Lim 2024, ADS bibcode 2024ESS.....510106L; arXiv preprint 없음) 은 구름 없는 수소 풍부 대기를 배제했지만 2차 대기에는 강한 제약을 걸지 못했습니다.",
  "p_2":"<b>NearStars 시나리오 선택. 표면 전체가 얼음으로 덮인 전역 snowball 이지만, 그 얼음 아래에는 Europa 형 sub-glacial ocean — basal/지열 용융과 행성의 높은 물 함량으로 유지되는 전역 얼음 아래의 액체 층 — 이 있습니다.</b> interesting-first 룰 원칙에 따라, 관측과 모순되지 않는 시나리오들 중에서 더 인상적인 해석을 cfg 의 canonical 로 채택합니다. f 는 여전히 진정한 ocean world 이며, 다만 얼음으로 덮여 해양이 지각 아래에 숨어 있을 뿐입니다. Wolf 2017, Turbet 2018, Fauchez 2019 는 모두 f 가 모델링된 모든 CO₂ 압력에서 완전한 snowball 이라는 데로 수렴합니다. f 는 HZ 의 maximum-CO₂-greenhouse 바깥 가장자리 너머에 있어, 30 bar CO₂ 에서도 표면의 물이 열리지 않습니다 (표면 open-water &quot;eyeball&quot; 은 f 가 아니라 e 의 것입니다). 보수적인 canonical 대안은 액체 층이 전혀 없는 완전히 얼어붙은 f 이며, 고증 cfg variant 로 보존합니다.",

  "h2_212":"표면 합성",
  "p_213":"TRAPPIST-1 f 는 보수적 거주 가능 영역 (Kopparapu 2014) 의 바깥 가장자리에 자리하며 지구 일조량의 38% 를 받습니다. f 는 maximum-CO₂-greenhouse 바깥 가장자리 너머에 있어, CO₂ 적재량과 무관하게 표면이 전역적으로 얼어붙습니다 (Wolf 2017 §5 는 30 bar CO₂ 에서도 f 를 snowball 로 만들고, Turbet 2018 과 Fauchez 2019 도 CO₂ ≤10 bar 의 모든 범위에서 일치). GCM 이 이 일조량에서 실제로 만들어내는 표면 open-water eyeball 은 f 가 아니라 한 칸 안쪽 행성인 e 의 것입니다.",
  "p_214":"Acuña 2025 (2504.16201) 가 현재 최선의 내부 fit 을 제공합니다. 모든 내부 파라미터의 변화를 허용하면 water mass fraction 이 16.2% ± 9.9%, 또는 mantle-to-core 비율을 지구형으로 고정하면 6.9% ± 2.0% 입니다. 어느 쪽이든 f 는 지구보다 상당히 더 hydrated 된 행성이며, 전역 얼음 cover 아래에 전역 액체 물 층을 가진 진정한 &quot;ocean world&quot; 일 가능성이 큽니다.",
  "p_215":"Bourgeois 2024 (2008.09599) 의 magma-ocean 진화 작업은 f 가 100 Myr 이상 지속된 magma ocean 단계를 거치며 상당량의 대기 물과 산소를 만들어냈음을 시사합니다. 그 후 대부분의 물은 mantle 로 재평형되거나, 광분해 탈출로 우주로 손실되거나, 행성이 식으면서 표면에 응결되었습니다. 지금 남아 있는 sub-glacial ocean 과 얇은 CO₂ 대기가 장기적 endpoint 에 해당합니다.",
  "p_216":"표면 morphology 의 경우 tidally-locked snowball 템플릿은 다음의 구조를 줍니다.",
  "li_217":"<b>Substellar disk</b> (substellar 점에서 ≲8°). ~260 K 의 얇은 얼음, open water 없음. substellar 최고점이 273 K 빙점 아래에 머물기 때문에, 표면은 용융 lens 가 아니라 국지적 균열을 동반한 얼음입니다.",
  "li_218":"<b>빙하 얼음 영역</b> (substellar 에서 8–180°). sub-glacial 액체 물 ocean 위의 두꺼운 (&gt;1 km) 빙하 얼음. 표면 T 는 ice line 의 ~250 K 에서 antistellar 점의 ~170 K 까지 단조 감소.",
  "li_219":"<b>Terminator</b> (substellar 에서 ~90°). 차갑고 (~190 K) 어두움. 가장 사진발이 좋은 영역으로, 2566 K 빛이 비스듬히 비추는 가운데 pressure ridge 가 긴 그림자를 드리움. 빙하 흐름이 지각 highs 위에서 얼음을 얇게 만든 곳에서는 기반암 노출도 가능.",
  "p_220":"<b>색 선택.</b> 눈과 빙하 얼음의 albedo 는 깨끗하고 신선한 경우 0.6–0.8, 먼지로 얼룩져 노화된 경우 0.4–0.6 입니다. M-dwarf 조명 아래에서는 청-백색이 아닌 따뜻한 크림색 (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 으로 보입니다. nightside 의 CO₂ frost 가 어두운 패치에 약간의 황갈색 tint 를 더합니다 (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code>).",
  "p_221":"<b>interesting-first 에 따른 sub-glacial ocean.</b> Wolf 2017, Turbet 2018, Fauchez 2019 가 모두 수렴합니다. f 는 모델링된 모든 CO₂ 압력에서 완전한 snowball 입니다 (Wolf 2017 에서는 30 bar CO₂ 에서도 snowball 인데, f 가 HZ 의 maximum-CO₂-greenhouse 바깥 가장자리 너머에 있기 때문입니다). 표면 open-water disk 는 없습니다 — substellar &quot;eyeball&quot; 기하는 f 가 아니라 e 의 것입니다. 따라서 interesting-first 해석은 sub-glacial ocean-world 프레이밍을 택합니다. f 의 높은 물 함량 (Acuña 2025 wmf 16%) 과 basal/지열 용융이 전역 얼음 아래의 액체 층을 만들며, 궤도에서는 보이지 않더라도 이것이 f 를 정의하는 &quot;ocean world&quot; 특징입니다. 이렇게 하면 GCM 이 뒷받침하지 않는 표면 물을 지어내지 않고도 f 를 진정한 ocean world — 인상적인 Europa-analog — 로 유지할 수 있습니다. 액체 층이 전혀 없는 보수적인 완전 동결 해석은 고증 canonical 대안으로 Open items 에 보존합니다.",
  "p_222":"<b>Sub-glacial ocean 구조.</b> Acuña 2021 (2101.08172) 은 hydrosphere 층 구조를 상세히 다룹니다. 표면의 ice Ih, 깊이가 늘면서 등장하는 high-pressure ice phase (II/III/V/VI), 바닥 (~100 GPa) 의 ice VII 로의 전이입니다. 지열 flux 에 따라 ice Ih 와 high-pressure ice 사이에 얇은 액체 물 lens 가 존재할 수 있는데, 이것이 cfg 가 이미 채택한 sub-glacial ocean 입니다. 태양계에서 가장 가까운 analog 는 Europa 형 층상 hydrosphere 입니다.",
  "p_223":"<b>광화학 haze / tholin 층.</b> Turbet 2018 §6 은 f 가 자신의 고도에서 광화학 haze 형성을 유지한다고 봅니다. 지질학적 시간 척도에서 이 haze 들은 UV 노출 지역으로 편향된 희미한 황갈색 표면 overlay 로 침적됩니다. cfg 의 산화철 accent 가 이미 비슷한 효과를 일부 잡아내지만, 메커니즘 (UV 광화학 → tholin 침적) 은 산화 형성과는 별개입니다. 두 메커니즘이 모두 표면 색에 기여할 수 있습니다.",
  "p_224":"<b>산화철 / 기반암.</b> 노출은 제한적입니다. terminator 근처 능선 정상에서 빙하 흐름이 얼음을 얇게 만든 곳에서만 드러납니다. f 의 거리에서는 별의 UV 가 약하고 지속적인 얼음 cover 가 대부분의 기반암을 광분해 산화로부터 보호하기 때문에, 산화철 tint 는 안쪽 행성 (b, c) 에 비해 훨씬 희미합니다.",
  "p_225":"<b>조석 고정 하의 morphology.</b> 얼음 순환이 핵심입니다. substellar 점의 표면 가열이 얼음을 sublimate 시키며 (얇은 대기 탓에 속도는 낮음), CO₂ 와 미량 H₂O 는 대기 순환을 통해 더 차가운 terminator 와 nightside 로 운반되어 응결합니다. 그 후 빙하 흐름이 얼음을 다시 substellar disk 쪽으로 되돌리며, 결과적으로 표면 전체가 얼음으로 덮인 위에서 안정한 얼음 순환이 성립합니다 — substellar 점에 open water 는 결코 형성되지 않습니다.",
  "h2_226":"대기 합성",
  "p_227":"f 에 대한 Lim 2024 NIRISS 정찰 (arXiv preprint 없음, conference abstract ADS bibcode 2024ESS.....510106L) 은 f 의 첫 JWST transmission 관측을 보고합니다. 결과는 다음과 같습니다. H₂-rich 대기는 배제되며 Moran 2018 (1810.05210) 의 HST 한계와 일관되지만, 2차 대기 (CO₂, N₂, H₂O-rich) 는 현재 가용한 transit baseline 으로는 제약되지 않습니다. 즉 f 의 관측적 그림은 b, c, d, e 보다 훨씬 더 열려 있습니다.",
  "p_228":"이론적 모델링 (Wolf 2017 §5, Turbet 2018, Fauchez 2019) 은 f 가 완전한 snowball 이라는 데로 수렴합니다. f 는 HZ 의 maximum-CO₂-greenhouse 바깥 가장자리 너머에 있어, 수십 bar 의 CO₂ 로도 표면의 물이 열리지 않습니다 (Wolf 2017 은 30 bar CO₂ 에서도 f 를 snowball 로 만들고, Turbet 2018 과 Fauchez 2019 도 CO₂ ≤10 bar 의 모든 범위에서 일치). 그럼에도 CO₂ 가 표면에 축적되는 것은, 전역적으로 얼음에 덮인 세계에서는 carbonate-silicate 풍화 sink 가 대부분 막혀 있기 때문입니다.",
  "p_229":"NearStars 는 <b>snowball 표면 위의 1 bar CO₂-rich 대기</b> 를 채택합니다.",
  "li_230":"<b>압력</b> 1 bar (100 kPa). 얼음으로 덮인 표면에서는 활성 규산염 풍화가 없어 CO₂ 가 축적됩니다. 이것은 두께 추정치일 뿐 온/냉 스위치가 아닙니다 — f 는 모델링된 모든 CO₂ 압력에서 snowball 이므로, 여기서 압력은 divergence 축이 아닙니다.",
  "li_231":"<b>조성</b> CO₂ 지배 (95%), N₂ (4%), 미량 H₂O (얼음으로 cold-trap 됨). outgassing 주도이며, 표면이 전역적으로 얼음으로 덮여 있어 carbonate-silicate 풍화는 제한적입니다.",
  "li_232":"<b>구름.</b> 중간 정도 (~30% 전역). 얇은 물-얼음 및 CO₂-얼음 구름과 terminator, 고위도의 간헐적 cirrus.",
  "p_233":"<b>Mars-analog 오로라.</b> 1 bar CO₂ 대기와 무시할 수 없는 자기장 (~0.3 × 지구, Garraffo 2017 테스트 케이스) 을 모두 갖춘 f 는 stellar-wind 강하 입자로 인한 Mars-analog 오로라를 보유합니다. 지배적인 방출은 CO₂⁺ Fox–Duffendack–Barker 밴드의 580–620 nm 적-오렌지로, MAVEN 이 Mars 의 이산 UV+가시 오로라에서 본 것과 동일한 화학입니다. 부차적으로 CO₂⁺ UV doublet 과 CO Cameron 밴드가 가시 보라색으로 산란합니다. 평균 stellar wind 조건에서 오로라 oval 은 자기 위도 ~55° 에 자리하며, 강도는 ~80 kR (지구 평균의 ~8배) 입니다. cfg 렌더링용으로는 오로라 oval 을 따라 주색 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> 적색과 <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> 보라 accent 를 둡니다. interesting-first 동률 처리: UV 일변도 렌더링 (플레이어 시점에서 보이지 않음) 대신 적+보라의 가시 팔레트를 선택했습니다.",
  "p_234":"<b>CO₂ cold-trap 기하.</b> Turbet 2018 은 f 의 CO₂ 얼음 침적이 경도 -120°, 위도 ±80°, 고도 30–50 km 의 두 개의 대칭적 cold trap 에 우선적으로 형성된다고 봅니다. 이는 cfg 의 시각적 annotation 으로 의미가 있습니다. nightside CO₂ 얼음 구름은 균일하게 분포하지 않고 이 극지 cold-trap 영역에 집중됩니다.",
  "p_235":"<b>하늘 외관.</b> 1 bar CO₂ 대기는 적당한 Rayleigh scattering 을 주고, M-dwarf SED 가 단파장 기여를 추가로 깎아 내립니다. substellar 근처 하늘은 별이 압도적으로 지배하는 가운데 희미한 dark-rust (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>) 톤을 띠며, terminator 근처에서는 CO₂ 얼음 구름의 forward-scattering 으로 limb 에 희미한 cyan-white 가 비치는 것을 제외하면 하늘이 어둡습니다.",
  "h2_236":"자전 &amp; spin 합성",
  "p_237":"7.6 Gyr 에 걸친 9.21 일 주기의 조석 damping 이 f 의 동기 (1:1) 구성을 확립합니다. 황도 경사각은 0 으로 damping 됩니다. 이심률은 0.01007 로, 3:2 spin-orbit 가 marginally 안정해지는 상단 가장자리에 해당하지만 (Vinson 2017), 1:1 이 여전히 압도적 확률의 상태로 남습니다.",
  "p_238":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 9.2075 일 (795 528 s).",
  "p_239":"<b>계절 없음.</b> 황도 경사각 = 0. libration 유도 일조량 변동은 ~ 1% 입니다 (e 보다 이심률이 높아 안쪽 행성보다 약간 큼). substellar 점은 본질적으로 고정되어 있습니다.",
  "p_240":"<b>자기 dynamo 기대.</b> f 의 지구 질량급 핵은 활성 dynamo 를 지지합니다 (Driscoll &amp; Olson 의 2208.06523 스케일링은 지구 질량 dynamo 가 핵 고화 타이밍을 통해 수명이 연장됨을 보임). 9.2 일의 조석 고정 자전은 slow-rotation Reiners 스케일링으로 dipole 강도를 낮추지만 (~0.3 × 지구 dipole), 일관된 dipole 자체는 유지 가능합니다. Garraffo 2017 은 f 를 거주 가능 영역의 대표 케이스로 명시하며 표면 자장 0.3 G 를 채택했고, cfg 도 이 가정에 맞춥니다.",
  "h2_241":"비주얼 스타일",
  "li_242":"<b>전역 외관.</b> 궤도에서 본 f 는 균일한 빙하 얼음 snowball 세계 (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 입니다 — 얼음이 표면 전체를 덮으며 open-water 동공은 없습니다. sub-glacial ocean 은 지각 아래에 숨어 궤도에서 보이지 않습니다. 오로라 oval 의 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> 적색 띠가 자기 위도 ~55° 근처의 nightside 를 가로지르며, 어두운 얼음을 배경으로 그림자 속에서 보입니다.",
  "li_243":"<b>Substellar 영역.</b> open water 는 없습니다. 희미한 얇은 얼음 텍스처와 국지적 균열이 표면에서 가장 따뜻한 (~260 K) 부분을 표시하지만, 나머지 전구와 같은 따뜻한 크림색 얼음으로 보입니다.",
  "li_244":"<b>빙하 얼음.</b> 보이는 표면의 대부분을 차지합니다. 큰 스케일에서는 매끄럽지만 terminator 의 비스듬한 빛 아래에서는 pressure ridge 와 crevasse 가 드러납니다. 신선한 눈 (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 과 먼지로 얼룩지거나 다시 얼어붙은 얼음 (<span class=\"hex-chip\" style=\"background:#c8c0b0\"></span><code>#c8c0b0</code>) 사이에 미묘한 색 변화가 있습니다.",
  "li_245":"<b>Terminator band.</b> 비스듬한 빛 아래 지형 대비가 큽니다. 능선 정상에 기반암 노출이 있을 수 있습니다 (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code> accent).",
  "li_246":"<b>Nightside.</b> CO₂ frost 가 만든 어둑한 크림-황갈색 톤. KSP nightside ambient 는 dayside 의 2–5% 수준.",
  "li_247":"<b>Atmosphere haze.</b> 매우 얇은 따뜻한 회-적색 limb glow (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>), 두께는 5–10 km, 행성 limb 의 공간 배경에 대해서만 보입니다.",
  "li_248":"<b>하늘의 별.</b> TRAPPIST-1 은 f 의 하늘에서 1.65° 를 차지합니다 (지구에서 본 태양의 3배). 깊은 적-오렌지 disk 로 나타납니다. 표면 조명은 0.38 S⊕ 로 지구의 깊은 황혼과 비슷하며, 별의 어둑한 적색 빛이 설경에 영구적인 새벽빛 tint 를 부여합니다.",
  "li_249":"<b>하늘의 자매 행성.</b> e (다음 안쪽) 가 inferior conjunction 시 각 크기 ~0.3°; g (다음 바깥쪽) 가 outer conjunction 시 ~0.3°. 합은 약 25 일 마다 일어납니다 (f-g synodic 주기).",
  "h2_250":"고증 대안",
  "h3_251":"고증과 어긋난 cfg 픽",
  "th_252":"항목",
  "th_253":"게임 (cfg)",
  "th_254":"고증 대안",
  "th_255":"어긋난 이유",
  "td_256":"<span class=\"field-tt\" data-ko-tip=\"표면 액체수 해양 존재 여부.\" data-en-tip=\"Whether liquid-water surface ocean is present.\"><code>ocean_present</code></span>",
  "td_257":"true — sub-glacial Europa-analog ocean",
  "td_258":"완전 동결, 액체 층 없음 (지열+조석+radiogenic flux 가 basal melt 에 부족할 경우)",
  "td_259":"높은 물 함량 (Acuña 2025 wmf 16%) 과 basal melt 가 sub-glacial ocean 을 그럴듯하게 만들며, 이것이 f 를 정의하는 &quot;ocean world&quot; 특징입니다. 보수적인 완전 동결 해석은 cfg variant 로 보존합니다. snowball 표면 자체는 이제 canonical 과 일치하며 (Wolf 2017 / Turbet 2018 / Fauchez 2019) divergence 가 아닙니다.",
  "h2_260":"참고 문헌",
  "h3_261":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_262":"<b>2504.16201</b> Acuña 2025 — MAGRATHEA 를 이용한 f 의 내부 구조 분석. wmf 16.2% ± 9.9% (free CMF) 또는 6.9% ± 2.0% (지구형 mantle-to-core). f 를 ocean world 로 확립하며, sub-glacial ocean cfg 를 견인.",
  "li_263":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 magma ocean 진화. f 가 진화를 거치며 상당량의 물을 보유했다고 예측.",
  "li_264":"<b>2006.11349</b> Wunderlich 2020 — e 와 f 의 wet vs. dry 대기. f 의 대기를 CO₂-rich (snowball branch) 또는 dry desiccated post-runaway 상태로 제약.",

  "li_266":"<b>1712.05641</b> Barr 2018 — TRAPPIST-1 행성들의 내부 구조와 조석 가열. f 의 조석 heat flux 를 0.14 W/m² (이전 추정 대비 30배) 로 상향 수정하는 근거. Maxwell viscoelastic. mantle T_eq 1621 K.",
  "li_267":"<b>2101.08172</b> Acuña 2021 — Hydrosphere 특성화. f 의 sub-glacial ocean 구조 (ice Ih / high-pressure ice / ice VII) 를 상세히 다룸. WMF 3.7 ± 2.6% scenario 2 로 water 함량의 하한을 넓힘.",
  "li_268":"<b>1707.06927</b> Turbet 2018 — TRAPPIST-1 의 기후 다양성 모델링. <b>snowball 기본값을 견인.</b> 0.1 bar CO₂ 에서 f 는 완전히 얼음으로 덮임 (substellar lens 없음). open ocean 은 ≥1 bar CO₂ 에서만 나타남. 극지 CO₂ cold-trap 기하도 식별.",
  "li_269":"<b>1710.08761</b> Kislyakova 2017 — Induction heating 추정. f 의 총량 ~1.1×10¹⁸ W. cfg 의 induction heating 을 하향 수정.",
  "li_270":"<b>1911.08596</b> Fauchez 2019 — HZ TRAPPIST-1 행성들의 구름 및 haze 모델링. CO₂ 압력 ≤10 bar 의 모든 그럴듯한 범위에서 f 의 snowball 상태를 확인.",
  "li_271":"<b>1706.04617</b> Garraffo 2017 — TRAPPIST-1 의 위협적인 자기 및 플라즈마 환경. f 를 거주 가능 영역의 대표 케이스로 채택. 0.3 G 테스트 케이스가 cfg dipole moment 를 견인.",

  "li_283":"<b>2024ESS.....510106L</b> Lim 2024 — TRAPPIST-1 f NIRISS 대기 정찰. <b>f 의 핵심 관측 논문이지만 arXiv preprint 가 없음.</b> ADS 초록만 가용. 대기 추론 (H₂-rich 배제, 2차 대기 미제약) 은 초록에서 가져왔음. <b>arXiv preprint 가 등장하면 fetch 하도록 flag.</b>",

  "h2_286":"후속 follow-up 항목",
  "li_287":"arXiv preprint 가 가용해지면 Lim 2024 NIRISS f 논문을 재fetch. 공식 출판 버전이 2차 대기 제약을 강화할 가능성이 있음.",
  "li_288":"1 bar CO₂ 두께는 outgassing 추정치이며 (얼음으로 덮인 표면에 CO₂ 가 축적), f 특화 관측으로 제약되는 값은 아님. f 는 모델링된 모든 CO₂ 압력에서 snowball 이므로 압력은 온/냉 스위치가 아니라 두께/haze 파라미터임. 미래의 JWST emission 분광이 f 의 기둥값을 좁히면 그에 맞춰 정밀화.",
  "li_289":"snowball 표면은 이제 변형이 아니라 <b>기본값</b> 임 (Wolf 2017 / Turbet 2018 / Fauchez 2019 수렴). 균일한 빙하 얼음 구체가 canonical 렌더이며, 꺼 둘 표면 open water 자체가 없음.",
  "li_290":"<b>거부/공격적 변형: 1 bar CO₂ + substellar open-water &quot;eyeball&quot;.</b> 이것은 f 에 대해 Wolf 2017 이 뒷받침하지 않음 — f 는 30 bar CO₂ 에서도 snowball 임 (open-water eyeball 은 e 의 것). 잘못 귀속된 해석을 명시적으로 거부로 표시하기 위해서만 여기 기록함. f 에는 렌더하지 말 것.",
  "li_291":"water mass fraction (7–16%) 이 충분히 높아서 f 는 Europa 와 비교 가능한 sub-glacial 액체 물 층을 가질 가능성이 있음. 조석이나 radiogenic 가열이 해저까지 닿는다면 hydrothermal 활동까지 동반할 수도 있음. 직접적인 시각 요소는 아니지만 Principia annotation 으로 남길 만한 가치가 있음.",
  "li_292":"f 에 남은 gameplay 대 fidelity 트레이드오프는 표면 상태가 아니라 (어느 쪽이든 snowball 임) sub-glacial ocean 의 존재 여부임. interesting-first 픽은 Europa-analog sub-glacial ocean 을 유지하고, 보수적 해석은 그것을 제거함.",
  "li_293":"<b>고증 canonical 대안: 완전히 얼어붙은 f, 액체 층 없음.</b> 지열 + 조석 + radiogenic flux 가 basal melt 에 부족하면, f 는 sub-glacial ocean 없이 바닥까지 고체 얼음임. 궤도에서의 렌더는 동일하고 (균일한 빙하 얼음), 바뀌는 것은 <span class=\"field-tt\" data-ko-tip=\"표면 액체수 해양 존재 여부.\" data-en-tip=\"Whether liquid-water surface ocean is present.\"><code>ocean_present</code></span> → false 뿐임. 보수적 cfg variant 로 보존함.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
