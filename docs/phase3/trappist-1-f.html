  "p_162":"Acuña 2025 (2504.16201) provides the best current interior fit: water mass fraction is 16.2% ± 9.9% if all interior parameters are allowed to vary, or 6.9% ± 2.0% if the mantle-to-core ratio is fixed at Earth-like. Either way, f is significantly more hydrated than Earth — likely a true &quot;ocean world&quot; with a global liquid-water layer underneath the global ice cover.",
  "p_163":"The Bourgeois 2024 (2008.09599) magma-ocean evolution work suggests f experienced an extended (&gt;100 Myr) magma ocean phase that produced substantial atmospheric water and oxygen. Most water has since either re-equilibrated into the mantle, been lost to space via photolytic escape, or condensed onto the surface as the planet cooled. The remaining ocean (now sub-glacial) and the thin CO₂ atmosphere are the long-lived endpoint.",
  "p_164":"For the surface morphology, the tidally-locked snowball template gives:",
  "li_165":"<b>Substellar disk</b> (≲8° from substellar point): possible open water lens; otherwise thin ice with localized fractures. Surface T ≈ 260 K is the marginal case for ice/water equilibrium.",
  "li_166":"<b>Glacial ice zone</b> (8–180° from substellar): thick (&gt;1 km) glacial ice over a sub-glacial liquid-water ocean. Surface T drops monotonically from ~250 K at the ice line to ~170 K at the antistellar point.",
  "li_167":"<b>Terminator</b> (~90° from substellar): cold (~190 K) and dark; the most photogenic zone, where pressure ridges throw long shadows under grazing 2566 K light. Possible bedrock exposure where glacial flow has thinned ice over crustal highs.",
  "p_168":"<b>Color choice.</b> Snow / glacial ice albedo is 0.6–0.8 (clean, fresh) or 0.4–0.6 (dust-stained, aged). Under M-dwarf illumination the perceived hue is warm cream (<code>#e0d8d0</code>) rather than blue-white. CO₂ frost on the nightside contributes a slightly tan tint to dark patches (<code>#888070</code>).",
  "p_169":"<b>Iron oxide / bedrock.</b> Limited exposure — only at ridge tops near the terminator where glacial flow has thinned ice. Iron oxide tint is faint compared to the inner planets (b, c) due to limited stellar UV at f&#x27;s distance and the persistent ice cover protecting most of the bedrock from photolytic oxidation.",
  "p_170":"<b>Morphology under tidal lock.</b> Ice circulation: surface heating at the substellar point sublimates ice (low rate due to thin atmo); CO₂ + trace H₂O are transported via atmospheric circulation to colder zones (terminator, nightside) where they condense. Glacial flow then returns ice toward the substellar disk. The result is a stable ice circulation with a persistent thin open-water lens at the substellar point.",
  "h2_171":"Atmosphere synthesis",
  "p_172":"The Lim 2024 NIRISS reconnaissance of f (no arXiv preprint, conference abstract ADS bibcode 2024ESS.....510106L) reports the first JWST transmission observation of f. The result: H₂-rich atmospheres are rejected, consistent with Moran 2018 (1810.05210) HST limits, but secondary atmospheres (CO₂, N₂, H₂O-rich) cannot be constrained from the available transit baseline. This means the observational picture for f is more open than for b, c, d, or e.",
  "p_173":"Theoretical modeling (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) agrees that for f to be at all habitable / temperate, it needs significant CO₂ greenhouse — Wolf 2017 finds 1 bar CO₂ is needed for a fully open ocean, 0.1 bar gives a tight substellar disk, less gives a complete snowball.",
  "p_174":"For NearStars we adopt <b>0.1 bar CO₂-rich snowball with substellar open-water lens</b>:",
  "li_175":"<b>Pressure</b> 0.1 bar (10 kPa). Wolf 2017 §5 finds this is the minimum for partial substellar open water under f&#x27;s insolation.",
  "li_176":"<b>Composition</b> CO₂-dominated (95%), trace N₂ (4%), trace H₂O (saturated at terminator cold-trap), trace Ar. The CO₂-richness reflects volcanic outgassing accumulating over time in a planet with no carbonate-silicate cycle running (because the surface is frozen and no liquid-water weathering occurs to scrub CO₂).",
  "li_177":"<b>Clouds.</b> Limited (~25% global): water-ice cirrus near the substellar disk and faint CO₂ ice clouds at the terminator.",
  "p_178":"<b>Sky appearance.</b> The 0.1 bar CO₂ atmosphere has Rayleigh scattering ~5% of Earth&#x27;s, with the M-dwarf SED further depressing short-wavelength contribution. The sky near substellar is faintly dark-rust (<code>#604040</code>) with the star dominant; near terminator the sky is dark with faint cyan-white at the limb from CO₂ ice cloud forward-scattering.",
  "h2_179":"Rotation &amp; spin synthesis",
  "p_180":"Tidal damping for f at 9.21-day period over 7.6 Gyr establishes the synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.01007 — at the upper edge where 3:2 spin-orbit becomes marginally stable (Vinson 2017), but 1:1 remains the overwhelming-probability state.",
  "p_181":"<b>KSP implementation note.</b> Rotation period = orbital period = 9.2075 days (795 528 s).",
  "p_182":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation ~ 1% (slightly higher than inner planets due to higher e). The substellar point is essentially fixed.",
  "h2_183":"Visual styling",
  "li_184":"<b>Global appearance.</b> From orbit, f is a near-uniform warm cream snowball (<code>#e0d8d0</code>) with a small dark spot at the substellar point (open-water lens, <code>#1a1c30</code>). Limited cloud cover with occasional cirrus over the substellar disk. The antistellar hemisphere shows slightly tan-stained ice from CO₂ frost.",
  "li_185":"<b>Substellar disk (open water).</b> Small dark patch ~16° wide (8° radius). Contrast against the surrounding warm-cream ice is dramatic.",
  "li_186":"<b>Glacial ice.</b> Vast majority of visible surface. Smooth at large scale, with pressure ridges and crevasses visible at the terminator under grazing light. Subtle color variations between fresh snow (<code>#e0d8d0</code>) and dust-stained / refrozen ice (<code>#c8c0b0</code>).",
  "li_187":"<b>Terminator band.</b> High topographic contrast in oblique light. Possible bedrock exposure at ridge tops (<code>#888070</code> accent).",
  "li_188":"<b>Nightside.</b> Dark cream-tan from CO₂ frost. KSP nightside ambient ≈ 2–5% dayside.",
  "li_189":"<b>Atmosphere haze.</b> Very thin warm gray-red limb glow (<code>#604040</code>), 5–10 km thick, only visible against space at the planet&#x27;s limb.",
  "li_190":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.65° in f&#x27;s sky (3× the Sun from Earth) — appears as a deep red-orange disk. Surface illumination is 0.38 S⊕, similar to deep-Earth twilight; the star&#x27;s dim red light gives the snowscape a permanent dawn-tint.",
  "li_191":"<b>Sister planets in sky.</b> e (next inward) at angular size ~0.3° in inferior conjunction; g (next outward) at ~0.3° during outer conjunctions. Conjunctions every ~25 days (f-g synodic period).",
  "h2_192":"Bibliography",

  "li_197":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. f is one of the planets where Lincowski&#x27;s modeling shows cold, CO₂-rich atmospheres are the equilibrium. Already read for d Phase 3 / e Phase 3.",
  "h3_198":"Read (context / methodology, not decision-driving)",

  "h2_210":"Open items for follow-up",

  "li_212":"The 0.1 bar CO₂ choice is bracketed by Wolf 2017&#x27;s modeling but is not directly constrained by f-specific observations. If future JWST emission spectroscopy of f reveals a colder dayside than current models predict, the CO₂ pressure should be reduced (or set to zero — full snowball).",
  "li_213":"Cfg variant for the &quot;complete snowball&quot; (no substellar open water) interpretation — visually simpler, fully white-cream world. Use if the substellar lens is found to be too marginal to render meaningfully in KSP.",

  "p_161":"TRAPPIST-1 f 는 보수적 생명체 거주 가능 영역(Kopparapu 2014) 의 바깥 가장자리에 위치하고 지구 insolation 의 38% 를 받음. 유의미한 greenhouse 가온이 없으면 표면이 전역적으로 얼어붙음 (Wolf 2017 §5). 0.1 bar CO₂ 가 있으면 Wolf 2017 는 빡빡하게 갇힌 substellar open-water disk 가 유지될 수 있다고 봄 — 다만 기하 구조가 취약하고 초기 상태에 의존(Pierrehumbert 2011 의 aquaplanet 와 snowball 상태 사이 bifurcation).",
  "p_162":"Acuña 2025 (2504.16201) 가 현재 최선의 내부 fit 제공. 모든 내부 파라미터를 변화 허용하면 water mass fraction 이 16.2% ± 9.9%, 또는 mantle-to-core 비율을 Earth-like 로 고정하면 6.9% ± 2.0%. 어느 쪽이든 f 는 지구보다 상당히 더 hydrated 됨 — 전역 얼음 cover 아래 전역 액체 물 층을 가진 진정한 &quot;ocean world&quot; 일 가능성이 높음.",
  "p_163":"Bourgeois 2024 (2008.09599) 의 magma-ocean 진화 작업은 f 가 상당량의 대기 물과 산소를 생성한 확장된(&gt;100 Myr) magma ocean phase 를 경험했음을 시사. 대부분의 물은 그 이후 mantle 로 재평형, 광분해 탈출을 통해 우주로 손실, 또는 행성이 식으면서 표면에 응결됨. 남은 ocean (지금은 sub-glacial) 과 얇은 CO₂ 대기가 장기 endpoint.",
  "p_164":"표면 morphology 의 경우 tidally-locked snowball 템플릿이 다음을 부여.",
  "li_165":"<b>Substellar disk</b> (≲8° from substellar point). open water lens 가능; 그렇지 않으면 국지적 균열이 있는 얇은 얼음. 표면 T ≈ 260 K 가 얼음/물 평형의 marginal 케이스.",
  "li_166":"<b>빙하 얼음 영역</b> (8–180° from substellar). sub-glacial 액체 물 ocean 위 두꺼운(&gt;1 km) 빙하 얼음. 표면 T 는 ice line 의 ~250 K 에서 antistellar 점의 ~170 K 까지 monotonically 감소.",
  "li_167":"<b>Terminator</b> (~90° from substellar). 차갑고(~190 K) 어두움; 가장 사진발 좋은 영역. 2566 K 빛 grazing 아래 pressure ridges 가 긴 그림자를 던짐. 빙하 흐름이 지각 highs 위에서 얼음을 얇게 만든 곳에서 bedrock 노출 가능.",
  "p_168":"<b>색 선택.</b> 눈 / 빙하 얼음 albedo 는 0.6–0.8 (깨끗하고 신선) 또는 0.4–0.6 (먼지 얼룩짐, 노화됨). M-dwarf 조명 아래 인지되는 hue 는 청-백색이 아닌 따뜻한 크림색 (<code>#e0d8d0</code>). nightside 의 CO₂ frost 가 어두운 패치에 약간의 황갈색 tint 기여 (<code>#888070</code>).",
  "p_169":"<b>산화철 / bedrock.</b> 제한된 노출 — terminator 근처 능선 정상에서 빙하 흐름이 얼음을 얇게 만든 곳에서만. f 의 거리에서 제한된 stellar UV 와 대부분의 bedrock 을 광분해 산화로부터 보호하는 지속적 얼음 cover 때문에 산화철 tint 는 안쪽 행성(b, c) 에 비해 희미함.",
  "p_170":"<b>조석 lock 아래 morphology.</b> 얼음 순환. substellar 점의 표면 가열이 얼음을 sublimate (얇은 대기 때문에 낮은 속도); CO₂ + 미량 H₂O 는 대기 순환을 통해 더 차가운 영역(terminator, nightside) 으로 운반되어 응결. 빙하 흐름이 그 후 얼음을 substellar disk 쪽으로 되돌림. 결과는 substellar 점에 지속적인 얇은 open-water lens 가 있는 안정한 얼음 순환.",
  "h2_171":"대기 합성",
  "p_172":"f 의 Lim 2024 NIRISS 정찰 (arXiv preprint 없음, conference abstract ADS bibcode 2024ESS.....510106L) 은 f 의 첫 JWST transmission 관측 보고. 결과. H₂-rich 대기 배제됨, Moran 2018 (1810.05210) HST 한계와 일관, 하지만 2차 대기 (CO₂, N₂, H₂O-rich) 는 가용한 transit baseline 으로 제약 불가. 이는 f 의 관측적 그림이 b, c, d, e 보다 더 열려 있다는 의미.",
  "p_173":"이론적 모델링 (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) 은 f 가 조금이라도 거주 가능 / 온화하려면 유의미한 CO₂ greenhouse 가 필요하다는 데 동의 — Wolf 2017 는 완전한 open ocean 에는 1 bar CO₂ 필요, 0.1 bar 는 tight substellar disk 부여, 그보다 적으면 완전한 snowball.",
  "p_174":"NearStars 는 <b>substellar open-water lens 가 있는 0.1 bar CO₂-rich snowball</b> 채택.",
  "li_175":"<b>압력</b> 0.1 bar (10 kPa). Wolf 2017 §5 는 이것이 f 의 insolation 아래 부분 substellar open water 의 최소값임을 발견.",
  "li_176":"<b>조성</b> CO₂ 지배 (95%), 미량 N₂ (4%), 미량 H₂O (terminator cold-trap 에서 포화), 미량 Ar. CO₂-richness 는 carbonate-silicate cycle 이 돌지 않는 (표면이 얼어붙고 CO₂ 를 제거할 액체 물 풍화가 일어나지 않기 때문에) 행성에서 시간에 걸쳐 누적된 화산 outgassing 을 반영.",
  "li_177":"<b>구름.</b> 제한적 (~25% 전역). substellar disk 근처의 물 얼음 cirrus 와 terminator 의 희미한 CO₂ 얼음 구름.",
  "p_178":"<b>하늘 외관.</b> 0.1 bar CO₂ 대기는 지구의 ~5% Rayleigh scattering 가지며 M-dwarf SED 가 단파장 기여를 추가로 감소시킴. substellar 근처 하늘은 별이 지배적인 가운데 희미한 dark-rust (<code>#604040</code>); terminator 근처에는 CO₂ 얼음 구름의 forward-scattering 으로 limb 의 희미한 cyan-white 와 함께 하늘이 어두움.",
  "h2_179":"자전 &amp; spin 합성",
  "p_180":"7.6 Gyr 에 걸친 9.21 일 주기의 f 에 대한 조석 damping 이 동기(1:1) 구성 확립. 황도 경사각은 0 으로 damping. 이심률은 0.01007 — 3:2 spin-orbit 가 marginally 안정해지는 상단 가장자리(Vinson 2017), 하지만 1:1 이 압도적 확률의 상태로 남음.",
  "p_181":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 9.2075 일 (795 528 s).",
  "p_182":"<b>계절 없음.</b> 황도 경사각 = 0; libration-induced insolation 변동 ~ 1% (더 높은 e 때문에 안쪽 행성보다 약간 높음). substellar 점은 본질적으로 고정.",
  "h2_183":"비주얼 스타일",
  "li_184":"<b>전역 외관.</b> 궤도에서 f 는 substellar 점에 작은 어두운 spot (open-water lens, <code>#1a1c30</code>) 이 있는 거의 균일한 따뜻한 크림색 snowball (<code>#e0d8d0</code>). substellar disk 위 가끔 cirrus 가 있는 제한된 구름 cover. antistellar 반구는 CO₂ frost 로 약간 황갈색 얼룩진 얼음을 보임.",
  "li_185":"<b>Substellar disk (open water).</b> 작은 어두운 패치 ~16° 너비 (반경 8°). 주변 따뜻한 크림색 얼음과의 대비가 극적.",
  "li_186":"<b>빙하 얼음.</b> visible 표면의 대부분. 큰 스케일에서 매끄럽고, terminator 에서 grazing 빛 아래 pressure ridges 와 crevasses visible. 신선한 눈 (<code>#e0d8d0</code>) 과 먼지 얼룩진 / refrozen 얼음 (<code>#c8c0b0</code>) 사이의 미묘한 색 변화.",
  "li_187":"<b>Terminator band.</b> 비스듬한 빛 아래 높은 지형 대비. 능선 정상의 bedrock 노출 가능 (<code>#888070</code> accent).",
  "li_188":"<b>Nightside.</b> CO₂ frost 의 어두운 크림-황갈색. KSP nightside ambient ≈ dayside 의 2–5%.",
  "li_189":"<b>Atmosphere haze.</b> 매우 얇은 따뜻한 회-적색 limb glow (<code>#604040</code>), 5–10 km 두께, 행성 limb 의 공간 배경에서만 visible.",
  "li_190":"<b>하늘의 별.</b> TRAPPIST-1 이 f 의 하늘에서 1.65° 차지 (지구에서 본 태양의 3배) — 깊은 적-오렌지 disk 로 나타남. 표면 조명은 0.38 S⊕, deep-Earth twilight 와 유사; 별의 어둑한 적색 빛이 설경에 영구적인 새벽 tint 부여.",
  "li_191":"<b>하늘의 자매 행성.</b> e (다음 안쪽) 가 inferior conjunction 시 각 크기 ~0.3°; g (다음 바깥쪽) 가 outer conjunction 시 ~0.3°. Conjunction 은 매 ~25 일 (f-g synodic 주기).",
  "h2_192":"참고 문헌",
  "h3_193":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_194":"<b>2504.16201</b> Acuña 2025 — MAGRATHEA 를 통한 f 의 내부 구조. wmf 16.2% ± 9.9% (free CMF) 또는 6.9% ± 2.0% (Earth-like mantle-to-core). f 를 ocean world 로 확립. sub-glacial ocean cfg 견인.",
  "li_195":"<b>2008.09599</b> Bourgeois 2024 — e/f/g 의 magma ocean 진화. f 가 진화를 통해 상당량의 물을 보유했다고 예측.",
  "li_196":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry e 와 f 대기. f 의 대기를 CO₂-rich (snowball branch) 또는 dry desiccated post-runaway 상태로 제약.",
  "li_197":"<b>1809.07498</b> Lincowski 2018 — TRAPPIST-1 세계의 진화한 기후. f 는 Lincowski 의 모델링이 차갑고 CO₂-rich 한 대기가 평형이라고 보여주는 행성 중 하나. d Phase 3 / e Phase 3 위해 이미 읽음.",
  "h3_198":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_199":"<b>2605.06964</b> TRAPPIST-1 기후의 에너지 균형 모델. 방법론 논문; f 의 snowball 상태 지지.",
  "li_200":"<b>2506.21351</b> SEPHI 2.0 거주 가능성 지수. 카탈로그 맥락만.",
  "li_201":"<b>2502.00132</b> Way 2025 — d 초점이지만 f 에 적용되는 tidally-locked GCM 의 유용한 방법론 reference.",
  "li_202":"<b>1810.05210</b> Moran 2018 — HST haze 한계. d Phase 3 위해 이미 읽음.",
  "h3_203":"읽음 (instrument-only, 시각 정보 아님)",
  "p_204":"(이 깊이에서 f 에 특화된 것 없음.)",
  "h3_205":"읽지 않음 — arXiv preprint 없음 또는 낮은 우선순위 (~9 편)",
  "p_206":"f 참고 문헌은 매우 작음 (15 편, arXiv 6 편).",
  "li_207":"<b>2024ESS.....510106L</b> Lim 2024 — TRAPPIST-1 f NIRISS 대기 정찰. <b>f 의 핵심 관측 논문이지만 arXiv preprint 없음.</b> ADS 초록만 가용. 대기 추론 (H₂-rich 배제, 2차 대기 미제약) 은 초록에서 소스됨. <b>arXiv preprint 등장 시 fetch 위해 flag.</b>",
  "li_208":"<b>2025arXiv...</b> biosignature feasibility 와 ELT 특성화에 관한 다양한 conference 요약. Skip.",

  "h2_210":"후속 follow-up 항목",
  "li_211":"arXiv preprint 가 가용해질 때 Lim 2024 NIRISS f 논문 재fetch; 공식 출판 버전이 2차 대기 제약을 강화할 수 있음.",
  "li_212":"0.1 bar CO₂ 선택은 Wolf 2017 의 모델링에 의해 bracketed 되지만 f-특화 관측으로 직접 제약되지 않음. 미래 JWST emission 분광이 f 의 dayside 가 현재 모델 예측보다 더 차갑다는 것을 드러내면 CO₂ 압력을 낮춰야 함 (또는 0 으로 설정 — 완전한 snowball).",
  "li_213":"&quot;완전한 snowball&quot; (substellar open water 없음) 해석을 위한 cfg 변형 — 시각적으로 더 단순, 완전히 백색 크림색 세계. substellar lens 가 KSP 에서 의미 있게 렌더되기에 너무 marginal 한 것으로 드러나면 사용.",
  "li_214":"&quot;1 bar CO₂ + 완전한 ocean&quot; 해석을 위한 cfg 변형 (Wolf 2017 §5 best-case). 시각적으로 e 와 유사하지만 더 차갑고 얼음 띠가 더 많음. 더 깊은 거주 가능 영역 대안이 원해질 때 사용.",
  "li_215":"water mass fraction (7–16%) 이 충분히 높아서 f 가 그럴듯하게 Europa 와 비교 가능한 sub-glacial 액체 물 층을 host 할 수 있음 — 어떤 조석 / radiogenic 가열이 해저에 도달하면 hydrothermal 활동을 가질 수도. 직접 시각적이지 않지만 Principia annotation 가치 있음.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
