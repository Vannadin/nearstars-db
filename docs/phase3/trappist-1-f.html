  "p_1":"TRAPPIST-1 f is a 1.04 R⊕, 1.04 M⊕ rocky planet on a 9.21-day orbit around an M8V ultra-cool dwarf. Fifth planet out, receiving 0.38× Earth&#x27;s insolation — outside the conservative habitable zone, near the maximum-greenhouse limit (Kopparapu 2013). Mass and radius are the closest to Earth&#x27;s in the entire system, but its bulk density (4.92 g/cc from Agol 2021) is low enough that f is most likely a significant water world: Acuña 2025 (2504.16201) infers a water mass fraction of 16.2% ± 9.9%. The first NIRISS atmospheric reconnaissance of f (Lim 2024, ADS bibcode 2024ESS.....510106L; no arXiv preprint available) rejected cloud-free hydrogen-rich atmospheres but did not strongly constrain secondary atmospheres.",
  "p_2":"<b>Scenario choice for NearStars: eye-ball aquaplanet with a 1 bar CO₂-rich atmosphere and a substellar open-water lens extending to ~40° from the substellar point, surrounded by extensive glacial ice elsewhere.</b> Per [[feedback-phase3-interesting-first]] the cfg canonicalizes the more visually distinctive scenario among the observation-consistent options. Wolf 2017 and Turbet 2018 both show that f at 1 bar CO₂ sustains a substellar open-water disk — a striking &quot;eye-ball Earth&quot; geometry — while at 0.1 bar CO₂ f collapses to a complete snowball. The full-snowball reading remains observation-consistent (Lim 2024 NIRISS only rejects H₂-rich atmospheres) and is preserved as the conservative cfg variant.",

  "h2_212":"Surface synthesis",
  "p_213":"TRAPPIST-1 f sits at the outer edge of the conservative habitable zone (Kopparapu 2014) and receives 38% of Earth&#x27;s insolation. Without significant greenhouse warming, the surface freezes globally (Wolf 2017 §5). With 0.1 bar CO₂, Wolf 2017 finds a tightly-confined substellar open-water disk can be sustained — but the geometry is fragile and depends on initial state (Pierrehumbert 2011 bifurcation between aquaplanet and snowball states).",
  "p_214":"Acuña 2025 (2504.16201) provides the best current interior fit: water mass fraction is 16.2% ± 9.9% if all interior parameters are allowed to vary, or 6.9% ± 2.0% if the mantle-to-core ratio is fixed at Earth-like. Either way, f is significantly more hydrated than Earth — likely a true &quot;ocean world&quot; with a global liquid-water layer underneath the global ice cover.",
  "p_215":"The Bourgeois 2024 (2008.09599) magma-ocean evolution work suggests f experienced an extended (&gt;100 Myr) magma ocean phase that produced substantial atmospheric water and oxygen. Most water has since either re-equilibrated into the mantle, been lost to space via photolytic escape, or condensed onto the surface as the planet cooled. The remaining ocean (now sub-glacial) and the thin CO₂ atmosphere are the long-lived endpoint.",
  "p_216":"For the surface morphology, the tidally-locked snowball template gives:",
  "li_217":"<b>Substellar disk</b> (≲8° from substellar point): possible open water lens; otherwise thin ice with localized fractures. Surface T ≈ 260 K is the marginal case for ice/water equilibrium.",
  "li_218":"<b>Glacial ice zone</b> (8–180° from substellar): thick (&gt;1 km) glacial ice over a sub-glacial liquid-water ocean. Surface T drops monotonically from ~250 K at the ice line to ~170 K at the antistellar point.",
  "li_219":"<b>Terminator</b> (~90° from substellar): cold (~190 K) and dark; the most photogenic zone, where pressure ridges throw long shadows under grazing 2566 K light. Possible bedrock exposure where glacial flow has thinned ice over crustal highs.",
  "p_220":"<b>Color choice.</b> Snow / glacial ice albedo is 0.6–0.8 (clean, fresh) or 0.4–0.6 (dust-stained, aged). Under M-dwarf illumination the perceived hue is warm cream (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) rather than blue-white. CO₂ frost on the nightside contributes a slightly tan tint to dark patches (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code>).",
  "p_221":"<b>Eye-ball aquaplanet by interesting-first.</b> Wolf 2017 explicitly shows that f at 1 bar CO₂ supports a substellar open-water disk extending to ~40° from the substellar point — a striking &quot;eye-ball Earth&quot; morphology with a dark open-ocean pupil ringed by sea-ice transition and glacial ice elsewhere. Turbet 2018 confirms f cannot sustain open water below ~1 bar CO₂; the 0.1 bar reading gives a complete snowball. Both are observation-consistent (Lim 2024 NIRISS only rejects H₂-rich atmospheres). Per [[feedback-phase3-interesting-first]], the cfg adopts the 1 bar lens variant as canonical — the eye-ball morphology is dramatically more interesting visually than a uniform ice ball, and is genuinely supported by Wolf 2017 and Turbet 2018 GCMs. The full-snowball variant is preserved in Open items for users who want the conservative reading.",
  "p_222":"<b>Sub-glacial ocean architecture.</b> Acuña 2021 (2101.08172) details the hydrosphere layering: surface ice Ih, then high-pressure ice phases (II/III/V/VI) at increasing depth, transitioning to ice VII at the base (~100 GPa). A thin liquid-water lens can exist between ice Ih and the high-pressure ices, depending on geothermal flux — this is the sub-glacial ocean that the cfg already adopts. Europa-like layered hydrosphere is the closest Solar System analog.",
  "p_223":"<b>Photochemical haze / tholin layer.</b> Turbet 2018 §6 finds that f sustains photochemical haze formation at its altitude. Over geological timescales these settle as a faint tan/brown surface overlay biased toward UV-exposed regions. The cfg&#x27;s iron-oxide accent already captures something similar, but the mechanism (UV photochemistry → tholin deposition) is distinct from oxide formation — both can contribute to the surface color.",
  "p_224":"<b>Iron oxide / bedrock.</b> Limited exposure — only at ridge tops near the terminator where glacial flow has thinned ice. Iron oxide tint is faint compared to the inner planets (b, c) due to limited stellar UV at f&#x27;s distance and the persistent ice cover protecting most of the bedrock from photolytic oxidation.",
  "p_225":"<b>Morphology under tidal lock.</b> Ice circulation: surface heating at the substellar point sublimates ice (low rate due to thin atmo); CO₂ + trace H₂O are transported via atmospheric circulation to colder zones (terminator, nightside) where they condense. Glacial flow then returns ice toward the substellar disk. The result is a stable ice circulation with a persistent thin open-water lens at the substellar point.",
  "h2_226":"Atmosphere synthesis",
  "p_227":"The Lim 2024 NIRISS reconnaissance of f (no arXiv preprint, conference abstract ADS bibcode 2024ESS.....510106L) reports the first JWST transmission observation of f. The result: H₂-rich atmospheres are rejected, consistent with Moran 2018 (1810.05210) HST limits, but secondary atmospheres (CO₂, N₂, H₂O-rich) cannot be constrained from the available transit baseline. This means the observational picture for f is more open than for b, c, d, or e.",
  "p_228":"Theoretical modeling (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) agrees that for f to be at all habitable / temperate, it needs significant CO₂ greenhouse — Wolf 2017 finds 1 bar CO₂ is needed for a fully open ocean, 0.1 bar gives a tight substellar disk, less gives a complete snowball.",
  "p_229":"For NearStars we adopt <b>1 bar CO₂-rich atmosphere with substellar open-water lens</b>:",
  "li_230":"<b>Pressure</b> 1 bar (100 kPa). Wolf 2017 finds this is the threshold for sustained substellar open water; the conservative 0.1 bar choice produces full snowball.",
  "li_231":"<b>Composition</b> CO₂-dominated (95%), N₂ (4%), trace H₂O (saturated near substellar surface). Outgassing-driven, with limited carbonate-silicate weathering due to mostly ice-covered surface.",
  "li_232":"<b>Clouds.</b> Moderate (~30% global): water clouds over the substellar disk, occasional cirrus + CO₂ ice at terminator and high latitudes.",
  "p_233":"<b>Mars-analog aurora.</b> With both a 1 bar CO₂ atmosphere and a non-trivial magnetic field (~0.3 × Earth, Garraffo 2017 test case), f hosts Mars-analog auroras driven by stellar-wind precipitation. The dominant emission is CO₂⁺ Fox–Duffendack–Barker bands at 580–620 nm (red-orange — the same chemistry that gives Mars&#x27;s discrete UV+visible aurora as seen by MAVEN), with secondary CO₂⁺ UV doublet and CO Cameron bands scattered into perceived violet. The auroral oval centers at ~55° magnetic latitude under typical stellar wind conditions; intensity ~80 kR (~8× Earth&#x27;s typical). For cfg rendering: primary <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> red along the auroral oval, <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> violet accent. Interesting-first tie-break: chose red+violet visible palette over UV-dominant rendering (which would not show in player view).",
  "p_234":"<b>CO₂ cold-trap geometry.</b> Turbet 2018 finds that f&#x27;s CO₂ ice deposits form preferentially in two symmetric cold traps at longitude -120°, latitude ±80°, at 30–50 km altitude. This is a visual annotation for the cfg: nightside CO₂ ice clouds (the small fraction predicted at 0.1 bar pressure) are concentrated in these polar cold-trap regions, not uniformly distributed.",
  "p_235":"<b>Sky appearance.</b> The 0.1 bar CO₂ atmosphere has Rayleigh scattering ~5% of Earth&#x27;s, with the M-dwarf SED further depressing short-wavelength contribution. The sky near substellar is faintly dark-rust (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>) with the star dominant; near terminator the sky is dark with faint cyan-white at the limb from CO₂ ice cloud forward-scattering.",
  "h2_236":"Rotation &amp; spin synthesis",
  "p_237":"Tidal damping for f at 9.21-day period over 7.6 Gyr establishes the synchronous (1:1) configuration. Obliquity damped to zero. Eccentricity is 0.01007 — at the upper edge where 3:2 spin-orbit becomes marginally stable (Vinson 2017), but 1:1 remains the overwhelming-probability state.",
  "p_238":"<b>KSP implementation note.</b> Rotation period = orbital period = 9.2075 days (795 528 s).",
  "p_239":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation ~ 1% (slightly higher than inner planets due to higher e). The substellar point is essentially fixed.",
  "p_240":"<b>Magnetic dynamo expectation.</b> f&#x27;s Earth-mass core supports an active dynamo (Driscoll &amp; Olson scaling in 2208.06523 finds Earth-mass dynamos extend lifetime via core solidification timing). The 9.2-day tidally-locked rotation reduces dipole strength via slow-rotation Reiners scaling (~0.3 × Earth dipole), but a coherent dipole remains supportable. Garraffo 2017 explicitly adopts f as the representative habitable-zone case with 0.3 G surface field; the cfg matches this assumption.",
  "h2_241":"Visual styling",
  "li_242":"<b>Global appearance.</b> From orbit, f looks like a dark navy &quot;pupil&quot; (substellar open ocean, <span class=\"hex-chip\" style=\"background:#1a1c30\"></span><code>#1a1c30</code>) within a fractal sea-ice transition zone, ringed by extensive glacial ice cover (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) over the rest of the planet. Persistent water clouds over the substellar disk give a warm cream &quot;cataract&quot; around the pupil. The auroral oval <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> red band crosses the nightside near magnetic latitude ~55°, visible in shadow against the dark ice.",
  "li_243":"<b>Substellar disk (open water).</b> Small dark patch ~16° wide (8° radius). Contrast against the surrounding warm-cream ice is dramatic.",
  "li_244":"<b>Glacial ice.</b> Vast majority of visible surface. Smooth at large scale, with pressure ridges and crevasses visible at the terminator under grazing light. Subtle color variations between fresh snow (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) and dust-stained / refrozen ice (<span class=\"hex-chip\" style=\"background:#c8c0b0\"></span><code>#c8c0b0</code>).",
  "li_245":"<b>Terminator band.</b> High topographic contrast in oblique light. Possible bedrock exposure at ridge tops (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code> accent).",
  "li_246":"<b>Nightside.</b> Dark cream-tan from CO₂ frost. KSP nightside ambient ≈ 2–5% dayside.",
  "li_247":"<b>Atmosphere haze.</b> Very thin warm gray-red limb glow (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>), 5–10 km thick, only visible against space at the planet&#x27;s limb.",
  "li_248":"<b>Star in sky.</b> TRAPPIST-1 subtends 1.65° in f&#x27;s sky (3× the Sun from Earth) — appears as a deep red-orange disk. Surface illumination is 0.38 S⊕, similar to deep-Earth twilight; the star&#x27;s dim red light gives the snowscape a permanent dawn-tint.",
  "li_249":"<b>Sister planets in sky.</b> e (next inward) at angular size ~0.3° in inferior conjunction; g (next outward) at ~0.3° during outer conjunctions. Conjunctions every ~25 days (f-g synodic period).",

  "td_259":"Both are observation-consistent within current JWST limits (Lim 2024 only rules out H₂-rich). Turbet 2018&#x27;s GCM ensemble converges on 0.1 bar snowball as the more theoretically supported steady state; Wolf 2017 demonstrates that 1 bar gives a substellar open-water lens of ~40° radius. The cfg picks 1 bar because the open-ocean disk is the visually defining feature for a habitable-zone planet — a uniform snowball f would be indistinguishable from g and h in orbit-view. Conservative 0.1 bar snowball reading preserved as cfg variant in Open items.",
  "td_260":"<code>ocean_extent_substellar_radius_deg</code>",
  "td_261":"40° (downstream of 1 bar atm choice)",
  "td_262":"0° (full snowball, downstream of 0.1 bar)",
  "td_263":"Follows from the atmosphere-pressure choice. 1 bar branch produces the substellar open-water lens; 0.1 bar branch gives full snowball with no surface ocean visible.",
  "h2_264":"Bibliography",
  "h3_265":"Read (visual-informative, drove decisions above)",
  "li_266":"<b>2504.16201</b> Acuña 2025 — Internal structure of f via MAGRATHEA. wmf 16.2% ± 9.9% (free CMF) or 6.9% ± 2.0% (Earth-like mantle-to-core). Establishes f as an ocean world. Drives the sub-glacial ocean cfg.",
  "li_267":"<b>2008.09599</b> Bourgeois 2024 — Magma ocean evolution for e/f/g. Predicts f has retained substantial water through evolution.",
  "li_268":"<b>2006.11349</b> Wunderlich 2020 — Wet vs. dry e and f atmospheres. Constrains f&#x27;s atmosphere to CO₂-rich (snowball branch) or to a dry desiccated post-runaway state.",
  "li_269":"<b>1809.07498</b> Lincowski 2018 — Evolved climates of TRAPPIST-1 worlds. f is one of the planets where Lincowski&#x27;s modeling shows cold, CO₂-rich atmospheres are the equilibrium. Already read for d Phase 3 / e Phase 3.",
  "li_270":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating in TRAPPIST-1 planets. Drives the upward revision of f&#x27;s tidal heat flux to 0.14 W/m² (30× higher than previous estimate). Maxwell viscoelastic; mantle T_eq 1621 K.",
  "li_271":"<b>2101.08172</b> Acuña 2021 — Hydrosphere characterization. Details f&#x27;s sub-glacial ocean architecture (ice Ih / high-pressure ices / ice VII). WMF 3.7 ± 2.6% scenario 2, broadening the lower bound on water content.",
  "li_272":"<b>1707.06927</b> Turbet 2018 — Modeling climate diversity for TRAPPIST-1. <b>Drives the snowball default</b>: at 0.1 bar CO₂, f is fully ice-covered (no substellar lens). Open ocean emerges only at ≥1 bar CO₂. Also identifies the polar CO₂ cold-trap geometry.",
  "li_273":"<b>1710.08761</b> Kislyakova 2017 — Induction heating estimates. f total ~1.1×10¹⁸ W; revises the cfg&#x27;s induction heating downward.",
  "li_274":"<b>1911.08596</b> Fauchez 2019 — Cloud and haze modeling for HZ TRAPPIST-1 planets. Confirms f&#x27;s snowball state at all plausible CO₂ pressures ≤10 bar.",
  "li_275":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. Adopts f as habitable-zone representative; 0.3 G test case drives the cfg&#x27;s dipole moment.",
  "li_276":"<b>2203.01065</b> RM22 — Rocky planet magnetic moment scaling.",
  "li_277":"<b>1910.09871</b> Atri 2019 — Surface-dose tables for f.",
  "h3_278":"Read (context / methodology, not decision-driving)",
  "li_279":"<b>2605.06964</b> Energy balance model for TRAPPIST-1 climates. Methodology paper; supports the snowball state for f.",
  "li_280":"<b>2506.21351</b> SEPHI 2.0 habitability index. Catalog context only.",
  "li_281":"<b>2502.00132</b> Way 2025 — d-focused but useful methodology reference for tidally-locked GCMs that apply to f.",
  "li_282":"<b>1810.05210</b> Moran 2018 — HST haze limits. Already read for d Phase 3.",
  "h3_283":"Read (instrument-only, not visual-informative)",
  "p_284":"(None specific to f at this depth.)",
  "h3_285":"Not read — no arXiv preprint or low-priority (~9 papers)",
  "p_286":"The f bibliography is very small (15 papers, 6 with arXiv).",
  "li_287":"<b>2024ESS.....510106L</b> Lim 2024 — TRAPPIST-1 f NIRISS atmospheric reconnaissance. <b>Key observational paper for f, but no arXiv preprint available.</b> ADS abstract only. The atmosphere inference (H₂-rich rejected, secondary atmospheres unconstrained) is sourced from the abstract. <b>Flagged for fetch when arXiv preprint appears.</b>",
  "li_288":"<b>2025arXiv...</b> various conference summaries on biosignature feasibility and ELT characterization. Skip.",
  "p_289":"---",
  "h2_290":"Open items for follow-up",
  "li_291":"Re-fetch the Lim 2024 NIRISS f paper when an arXiv preprint becomes available; the formal published version may tighten the secondary-atmosphere constraints.",
  "li_292":"The 0.1 bar CO₂ choice is bracketed by Wolf 2017&#x27;s modeling but is not directly constrained by f-specific observations. If future JWST emission spectroscopy of f reveals a colder dayside than current models predict, the CO₂ pressure should be reduced (or set to zero — full snowball).",
  "li_293":"Cfg variant for the &quot;complete snowball&quot; (no substellar open water) interpretation — visually simpler, fully white-cream world. Use if the substellar lens is found to be too marginal to render meaningfully in KSP.",
  "li_294":"Cfg variant for the &quot;1 bar CO₂ + full ocean&quot; interpretation (Wolf 2017 §5 best-case): visually similar to e but cooler and more ice-banded. Use if a deeper habitable-zone alternative is desired.",
  "li_295":"The water mass fraction (7–16%) is high enough that f could plausibly host a sub-glacial liquid-water layer comparable to Europa&#x27;s — possibly with hydrothermal activity if any tidal / radiogenic heating reaches the seafloor. Not directly visual but worth a Principia annotation.",
  "li_296":"The choice between snowball default (0.1 bar CO₂) and 1 bar CO₂ + substellar open-water lens variant is a cfg gameplay-vs-fidelity trade. Default snowball matches Turbet 2018 most directly; the warmer variant preserves the more visually distinctive &quot;eyeball&quot; rendering.",
  "li_297":"<b>Cfg variant: full snowball at 0.1 bar CO₂.</b> Preserved per the interesting-first tie-break rule. Users who want the conservative observational reading (no substellar open water) can render this variant. All Decisions-table values change appropriately (pressure → 10 kPa, surface temperature → 220 K global mean, ocean → sub-glacial only).",
  "li_298":"Magnetic field strength is scaling-based; could be refined if a TRAPPIST-1-specific dynamo model becomes available.",

  ko: {
  "p_1":"TRAPPIST-1 f 는 M8V ultra-cool dwarf 를 9.21 일 주기로 도는 1.04 R⊕, 1.04 M⊕ 의 암석 행성입니다. 안쪽에서 다섯 번째 행성이며 지구 일조량의 0.38배를 받습니다. 보수적 거주 가능 영역의 바깥, maximum-greenhouse 한계 근처에 자리합니다 (Kopparapu 2013). 질량과 반경이 시스템 전체에서 지구와 가장 비슷하지만, Agol 2021 의 bulk density 가 4.92 g/cc 로 충분히 낮아 f 는 상당량의 물을 품은 워터 월드일 가능성이 높습니다. Acuña 2025 (2504.16201) 는 water mass fraction 을 16.2% ± 9.9% 로 추정합니다. f 에 대한 첫 NIRISS 대기 정찰 (Lim 2024, ADS bibcode 2024ESS.....510106L; arXiv preprint 없음) 은 구름 없는 수소 풍부 대기를 배제했지만 2차 대기에는 강한 제약을 걸지 못했습니다.",
  "p_2":"<b>NearStars 시나리오 선택. 1 bar CO₂-rich 대기와 substellar 점에서 ~40° 까지 펼쳐진 open-water lens 를 가진 eye-ball aquaplanet 으로, 나머지 표면은 광범위한 빙하 얼음으로 덮입니다.</b> [[feedback-phase3-interesting-first]] 원칙에 따라, 관측과 모순되지 않는 시나리오들 중에서 시각적으로 가장 두드러진 쪽을 cfg 의 canonical 으로 채택합니다. Wolf 2017 과 Turbet 2018 모두 f 가 1 bar CO₂ 에서 substellar open-water disk 를 유지함을 보입니다. 이는 &quot;eye-ball Earth&quot; 라 부르는 인상적인 기하 구조입니다. 반면 0.1 bar CO₂ 에서는 f 가 완전한 snowball 로 붕괴합니다. 완전 snowball 해석도 관측과 일관되며 (Lim 2024 NIRISS 는 H₂-rich 대기만 배제) 보수적 cfg variant 로 보존합니다.",

  "h2_212":"표면 합성",
  "p_213":"TRAPPIST-1 f 는 보수적 거주 가능 영역 (Kopparapu 2014) 의 바깥 가장자리에 자리하며 지구 일조량의 38% 를 받습니다. 유의미한 온실 가열이 없으면 표면이 전역적으로 얼어붙습니다 (Wolf 2017 §5). 0.1 bar CO₂ 가 있을 때 Wolf 2017 은 좁게 갇힌 substellar open-water disk 가 유지될 수 있음을 보였지만, 그 기하 구조는 취약하고 초기 상태에 의존합니다 (Pierrehumbert 2011 의 aquaplanet 와 snowball 사이 bifurcation).",
  "p_214":"Acuña 2025 (2504.16201) 가 현재 최선의 내부 fit 을 제공합니다. 모든 내부 파라미터의 변화를 허용하면 water mass fraction 이 16.2% ± 9.9%, 또는 mantle-to-core 비율을 지구형으로 고정하면 6.9% ± 2.0% 입니다. 어느 쪽이든 f 는 지구보다 상당히 더 hydrated 된 행성이며, 전역 얼음 cover 아래에 전역 액체 물 층을 가진 진정한 &quot;ocean world&quot; 일 가능성이 큽니다.",
  "p_215":"Bourgeois 2024 (2008.09599) 의 magma-ocean 진화 작업은 f 가 100 Myr 이상 지속된 magma ocean 단계를 거치며 상당량의 대기 물과 산소를 만들어냈음을 시사합니다. 그 후 대부분의 물은 mantle 로 재평형되거나, 광분해 탈출로 우주로 손실되거나, 행성이 식으면서 표면에 응결되었습니다. 지금 남아 있는 sub-glacial ocean 과 얇은 CO₂ 대기가 장기적 endpoint 에 해당합니다.",
  "p_216":"표면 morphology 의 경우 tidally-locked snowball 템플릿은 다음의 구조를 줍니다.",
  "li_217":"<b>Substellar disk</b> (substellar 점에서 ≲8°). open-water lens 가능. 그렇지 않다면 국지적 균열을 동반한 얇은 얼음. 표면 T ≈ 260 K 는 얼음과 물 평형의 marginal 케이스.",
  "li_218":"<b>빙하 얼음 영역</b> (substellar 에서 8–180°). sub-glacial 액체 물 ocean 위의 두꺼운 (&gt;1 km) 빙하 얼음. 표면 T 는 ice line 의 ~250 K 에서 antistellar 점의 ~170 K 까지 단조 감소.",
  "li_219":"<b>Terminator</b> (substellar 에서 ~90°). 차갑고 (~190 K) 어두움. 가장 사진발이 좋은 영역으로, 2566 K 빛이 비스듬히 비추는 가운데 pressure ridge 가 긴 그림자를 드리움. 빙하 흐름이 지각 highs 위에서 얼음을 얇게 만든 곳에서는 기반암 노출도 가능.",
  "p_220":"<b>색 선택.</b> 눈과 빙하 얼음의 albedo 는 깨끗하고 신선한 경우 0.6–0.8, 먼지로 얼룩져 노화된 경우 0.4–0.6 입니다. M-dwarf 조명 아래에서는 청-백색이 아닌 따뜻한 크림색 (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 으로 보입니다. nightside 의 CO₂ frost 가 어두운 패치에 약간의 황갈색 tint 를 더합니다 (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code>).",
  "p_221":"<b>interesting-first 에 따른 eye-ball aquaplanet.</b> Wolf 2017 은 f 가 1 bar CO₂ 에서 substellar 점으로부터 ~40° 까지 펼쳐지는 substellar open-water disk 를 유지함을 분명히 보여줍니다. 어두운 open-ocean &quot;동공&quot; 이 sea-ice 전이대로 둘러싸이고 나머지는 빙하 얼음으로 덮이는, 인상적인 &quot;eye-ball Earth&quot; 형태입니다. Turbet 2018 은 f 가 ~1 bar CO₂ 미만에서는 open water 를 유지할 수 없다는 점, 그래서 0.1 bar 해석이 완전한 snowball 이 된다는 점을 확인합니다. 두 시나리오 모두 관측과 일관됩니다 (Lim 2024 NIRISS 는 H₂-rich 대기만 배제). [[feedback-phase3-interesting-first]] 원칙에 따라 cfg 는 1 bar lens variant 를 canonical 로 채택합니다. eye-ball 형태는 균일한 얼음 공보다 시각적으로 훨씬 더 흥미롭고, Wolf 2017 과 Turbet 2018 GCM 으로 진정성 있게 뒷받침됩니다. 완전 snowball variant 는 보수적 해석을 원하는 사용자를 위해 Open items 에 보존됩니다.",
  "p_222":"<b>Sub-glacial ocean 구조.</b> Acuña 2021 (2101.08172) 은 hydrosphere 층 구조를 상세히 다룹니다. 표면의 ice Ih, 깊이가 늘면서 등장하는 high-pressure ice phase (II/III/V/VI), 바닥 (~100 GPa) 의 ice VII 로의 전이입니다. 지열 flux 에 따라 ice Ih 와 high-pressure ice 사이에 얇은 액체 물 lens 가 존재할 수 있는데, 이것이 cfg 가 이미 채택한 sub-glacial ocean 입니다. 태양계에서 가장 가까운 analog 는 Europa 형 층상 hydrosphere 입니다.",
  "p_223":"<b>광화학 haze / tholin 층.</b> Turbet 2018 §6 은 f 가 자신의 고도에서 광화학 haze 형성을 유지한다고 봅니다. 지질학적 시간 척도에서 이 haze 들은 UV 노출 지역으로 편향된 희미한 황갈색 표면 overlay 로 침적됩니다. cfg 의 산화철 accent 가 이미 비슷한 효과를 일부 잡아내지만, 메커니즘 (UV 광화학 → tholin 침적) 은 산화 형성과는 별개입니다. 두 메커니즘이 모두 표면 색에 기여할 수 있습니다.",
  "p_224":"<b>산화철 / 기반암.</b> 노출은 제한적입니다. terminator 근처 능선 정상에서 빙하 흐름이 얼음을 얇게 만든 곳에서만 드러납니다. f 의 거리에서는 별의 UV 가 약하고 지속적인 얼음 cover 가 대부분의 기반암을 광분해 산화로부터 보호하기 때문에, 산화철 tint 는 안쪽 행성 (b, c) 에 비해 훨씬 희미합니다.",
  "p_225":"<b>조석 고정 하의 morphology.</b> 얼음 순환이 핵심입니다. substellar 점의 표면 가열이 얼음을 sublimate 시키며 (얇은 대기 탓에 속도는 낮음), CO₂ 와 미량 H₂O 는 대기 순환을 통해 더 차가운 terminator 와 nightside 로 운반되어 응결합니다. 그 후 빙하 흐름이 얼음을 다시 substellar disk 쪽으로 되돌리며, 결과적으로 substellar 점에 지속적인 얇은 open-water lens 를 유지하는 안정한 얼음 순환이 성립합니다.",
  "h2_226":"대기 합성",
  "p_227":"f 에 대한 Lim 2024 NIRISS 정찰 (arXiv preprint 없음, conference abstract ADS bibcode 2024ESS.....510106L) 은 f 의 첫 JWST transmission 관측을 보고합니다. 결과는 다음과 같습니다. H₂-rich 대기는 배제되며 Moran 2018 (1810.05210) 의 HST 한계와 일관되지만, 2차 대기 (CO₂, N₂, H₂O-rich) 는 현재 가용한 transit baseline 으로는 제약되지 않습니다. 즉 f 의 관측적 그림은 b, c, d, e 보다 훨씬 더 열려 있습니다.",
  "p_228":"이론적 모델링 (Wolf 2017 §5, Lincowski 2018, Wunderlich 2020) 은 f 가 조금이라도 거주 가능하거나 온화하려면 유의미한 CO₂ 온실효과가 필요하다는 점에 일치합니다. Wolf 2017 은 완전한 open ocean 에는 1 bar CO₂, 0.1 bar 에서는 좁은 substellar disk, 그보다 낮으면 완전한 snowball 이 된다고 봅니다.",
  "p_229":"NearStars 는 <b>substellar open-water lens 를 가진 1 bar CO₂-rich 대기</b> 를 채택합니다.",
  "li_230":"<b>압력</b> 1 bar (100 kPa). Wolf 2017 은 이 값이 지속적인 substellar open water 의 임계점이며, 보수적인 0.1 bar 선택은 완전한 snowball 을 만든다고 봅니다.",
  "li_231":"<b>조성</b> CO₂ 지배 (95%), N₂ (4%), 미량 H₂O (substellar 표면 근처에서 포화). outgassing 주도이며, 표면이 대부분 얼음으로 덮여 있어 carbonate-silicate 풍화는 제한적입니다.",
  "li_232":"<b>구름.</b> 중간 정도 (~30% 전역). substellar disk 위의 물 구름과 terminator, 고위도의 간헐적 cirrus + CO₂ 얼음.",
  "p_233":"<b>Mars-analog 오로라.</b> 1 bar CO₂ 대기와 무시할 수 없는 자기장 (~0.3 × 지구, Garraffo 2017 테스트 케이스) 을 모두 갖춘 f 는 stellar-wind 강하 입자로 인한 Mars-analog 오로라를 보유합니다. 지배적인 방출은 CO₂⁺ Fox–Duffendack–Barker 밴드의 580–620 nm 적-오렌지로, MAVEN 이 Mars 의 이산 UV+가시 오로라에서 본 것과 동일한 화학입니다. 부차적으로 CO₂⁺ UV doublet 과 CO Cameron 밴드가 가시 보라색으로 산란합니다. 평균 stellar wind 조건에서 오로라 oval 은 자기 위도 ~55° 에 자리하며, 강도는 ~80 kR (지구 평균의 ~8배) 입니다. cfg 렌더링용으로는 오로라 oval 을 따라 주색 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> 적색과 <span class=\"hex-chip\" style=\"background:#b19cd9\"></span><code>#B19CD9</code> 보라 accent 를 둡니다. interesting-first 동률 처리: UV 일변도 렌더링 (플레이어 시점에서 보이지 않음) 대신 적+보라의 가시 팔레트를 선택했습니다.",
  "p_234":"<b>CO₂ cold-trap 기하.</b> Turbet 2018 은 f 의 CO₂ 얼음 침적이 경도 -120°, 위도 ±80°, 고도 30–50 km 의 두 개의 대칭적 cold trap 에 우선적으로 형성된다고 봅니다. 이는 cfg 의 시각적 annotation 으로 의미가 있습니다. nightside CO₂ 얼음 구름 (0.1 bar 압력에서 예측되는 적은 양) 은 균일하게 분포하지 않고 이 극지 cold-trap 영역에 집중됩니다.",
  "p_235":"<b>하늘 외관.</b> 0.1 bar CO₂ 대기는 Rayleigh scattering 이 지구의 ~5% 정도이고, M-dwarf SED 가 단파장 기여를 추가로 깎아 내립니다. substellar 근처 하늘은 별이 압도적으로 지배하는 가운데 희미한 dark-rust (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>) 톤을 띠며, terminator 근처에서는 CO₂ 얼음 구름의 forward-scattering 으로 limb 에 희미한 cyan-white 가 비치는 것을 제외하면 하늘이 어둡습니다.",
  "h2_236":"자전 &amp; spin 합성",
  "p_237":"7.6 Gyr 에 걸친 9.21 일 주기의 조석 damping 이 f 의 동기 (1:1) 구성을 확립합니다. 황도 경사각은 0 으로 damping 됩니다. 이심률은 0.01007 로, 3:2 spin-orbit 가 marginally 안정해지는 상단 가장자리에 해당하지만 (Vinson 2017), 1:1 이 여전히 압도적 확률의 상태로 남습니다.",
  "p_238":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 9.2075 일 (795 528 s).",
  "p_239":"<b>계절 없음.</b> 황도 경사각 = 0. libration 유도 일조량 변동은 ~ 1% 입니다 (e 보다 이심률이 높아 안쪽 행성보다 약간 큼). substellar 점은 본질적으로 고정되어 있습니다.",
  "p_240":"<b>자기 dynamo 기대.</b> f 의 지구 질량급 핵은 활성 dynamo 를 지지합니다 (Driscoll &amp; Olson 의 2208.06523 스케일링은 지구 질량 dynamo 가 핵 고화 타이밍을 통해 수명이 연장됨을 보임). 9.2 일의 조석 고정 자전은 slow-rotation Reiners 스케일링으로 dipole 강도를 낮추지만 (~0.3 × 지구 dipole), 일관된 dipole 자체는 유지 가능합니다. Garraffo 2017 은 f 를 거주 가능 영역의 대표 케이스로 명시하며 표면 자장 0.3 G 를 채택했고, cfg 도 이 가정에 맞춥니다.",
  "h2_241":"비주얼 스타일",
  "li_242":"<b>전역 외관.</b> 궤도에서 본 f 는 어두운 navy &quot;동공&quot; (substellar open ocean, <span class=\"hex-chip\" style=\"background:#1a1c30\"></span><code>#1a1c30</code>) 이 fractal sea-ice 전이대 안에 자리하고, 나머지 표면은 광범위한 빙하 얼음 cover (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 로 둘러싸인 모습입니다. substellar disk 위의 지속적인 물 구름은 동공 주변으로 따뜻한 크림색 &quot;백내장&quot; 을 형성합니다. 오로라 oval 의 <span class=\"hex-chip\" style=\"background:#ff6b6b\"></span><code>#FF6B6B</code> 적색 띠가 자기 위도 ~55° 근처의 nightside 를 가로지르며, 어두운 얼음을 배경으로 그림자 속에서 보입니다.",
  "li_243":"<b>Substellar disk (open water).</b> ~16° 너비 (반경 8°) 의 작은 어두운 패치. 주변의 따뜻한 크림색 얼음과 대비가 극적입니다.",
  "li_244":"<b>빙하 얼음.</b> 보이는 표면의 대부분을 차지합니다. 큰 스케일에서는 매끄럽지만 terminator 의 비스듬한 빛 아래에서는 pressure ridge 와 crevasse 가 드러납니다. 신선한 눈 (<span class=\"hex-chip\" style=\"background:#e0d8d0\"></span><code>#e0d8d0</code>) 과 먼지로 얼룩지거나 다시 얼어붙은 얼음 (<span class=\"hex-chip\" style=\"background:#c8c0b0\"></span><code>#c8c0b0</code>) 사이에 미묘한 색 변화가 있습니다.",
  "li_245":"<b>Terminator band.</b> 비스듬한 빛 아래 지형 대비가 큽니다. 능선 정상에 기반암 노출이 있을 수 있습니다 (<span class=\"hex-chip\" style=\"background:#888070\"></span><code>#888070</code> accent).",
  "li_246":"<b>Nightside.</b> CO₂ frost 가 만든 어둑한 크림-황갈색 톤. KSP nightside ambient 는 dayside 의 2–5% 수준.",
  "li_247":"<b>Atmosphere haze.</b> 매우 얇은 따뜻한 회-적색 limb glow (<span class=\"hex-chip\" style=\"background:#604040\"></span><code>#604040</code>), 두께는 5–10 km, 행성 limb 의 공간 배경에 대해서만 보입니다.",
  "li_248":"<b>하늘의 별.</b> TRAPPIST-1 은 f 의 하늘에서 1.65° 를 차지합니다 (지구에서 본 태양의 3배). 깊은 적-오렌지 disk 로 나타납니다. 표면 조명은 0.38 S⊕ 로 지구의 깊은 황혼과 비슷하며, 별의 어둑한 적색 빛이 설경에 영구적인 새벽빛 tint 를 부여합니다.",
  "li_249":"<b>하늘의 자매 행성.</b> e (다음 안쪽) 가 inferior conjunction 시 각 크기 ~0.3°; g (다음 바깥쪽) 가 outer conjunction 시 ~0.3°. 합은 약 25 일 마다 일어납니다 (f-g synodic 주기).",
  "h2_250":"고증 대안",
  "h3_251":"고증과 어긋난 cfg 픽",
  "th_252":"항목",
  "th_253":"게임 (cfg)",
  "th_254":"고증 대안",
  "th_255":"어긋난 이유",
  "td_256":"<code>atmosphere_surface_pressure_pa</code>",
  "td_257":"100 000 (1 bar CO₂, Wolf 2017 의 eyeball 수권 행성)",
  "td_258":"10 000 (0.1 bar CO₂ snowball, Turbet 2018 GCM 수렴값)",
  "td_259":"두 시나리오 다 현재 JWST 관측 한계 안에 들어옵니다 — Lim 2024 가 배제하는 것은 H₂ 풍부 시나리오뿐입니다. Turbet 2018 의 GCM 앙상블은 0.1 bar snowball 을 이론적으로 더 안정된 정상 상태로 수렴시키고, Wolf 2017 은 1 bar 에서 substellar 부근에 반경 약 40° 의 열대 호수가 형성됨을 보입니다. cfg 는 1 bar 를 채택했습니다 — 거주 가능 영역 행성이라는 f 의 정체성을 시각적으로 결정짓는 것이 바로 그 열대 호수이기 때문입니다. 균일한 snowball f 는 궤도 시점에서 g 나 h 와 거의 구분되지 않습니다. 보수적인 0.1 bar snowball 시나리오는 Open items 에 cfg variant 로 보존합니다.",
  "td_260":"<code>ocean_extent_substellar_radius_deg</code>",
  "td_261":"40° (1 bar 대기 선택에서 파생)",
  "td_262":"0° (전구 snowball, 0.1 bar 에서 파생)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
