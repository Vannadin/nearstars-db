  "h2_141":"Surface synthesis",
  "p_142":"AU Mic e&#x27;s &quot;surface&quot; is the most speculative element in this Phase 3 synthesis because no observation constrains its bulk properties. Donati 2025&#x27;s RV signal gives a minimum mass of 21.1 ± 5.4 M⊕ under the coplanar-system assumption (which the cfg adopts because the debris disk and b/c/d are all consistently near-edge-on), but no transit has been observed and no radius is measured. The cfg&#x27;s placeholder radius of 2.9 R⊕ comes from the Chen &amp; Kipping 2017 probabilistic mass-radius relation applied at 21 M⊕; this places e in the sub-Neptune regime, broadly parallel to AU Mic c (2.79 R⊕, 14.46 M⊕) but at higher mass and density.",
  "p_143":"For NearStars purposes, e is therefore modeled as a sub-Neptune analog of c, scaled up in mass and out in distance. The &quot;visible surface&quot; the player would see — if and when e is confirmed and shipped in cfg — is the top of a thin H/He cloud deck at ~10⁶ Pa, rendered as a banded gaseous body. Whether a rocky/iron core exists below or whether e is instead a water-rich mantle with minimal envelope is unresolved; the cfg adopts the thin-envelope interpretation as the headline reading by parallel construction with c.",
  "p_144":"<b>Why the radius is so uncertain.</b> The mass-radius diagram at 21 M⊕ admits at least three distinct compositional families. A super-Earth with a substantial water mantle could have radius ~2.3 R⊕ at density ~9 g/cc — denser than Earth, the densest member of the sub-Neptune valley. A sub-Neptune with ~3% H/He envelope over a rocky core matches the Chen &amp; Kipping 2017 placeholder at ~2.9 R⊕, density ~4.7 g/cc — the cfg&#x27;s headline reading. A more inflated sub-Neptune with ~10% H/He could reach ~3.5 R⊕ at density ~2.7 g/cc, similar to a small Neptune. Without a transit, the cfg cannot distinguish these, and the placeholder value is a midrange guess.",
  "p_145":"<b>If e is rocky rather than envelope-bearing.</b> A 21 M⊕ super-Earth at 0.16 AU around AU Mic would be subject to severe XUV-driven atmosphere erosion over 22 Myr but not enough to strip a thick envelope (Owen &amp; Wu 2017 photoevaporation valley places the envelope-stripping threshold at higher insolation than e experiences). The rocky-without-envelope variant is therefore plausible but not strongly favored by the photoevaporation framework. Listed as a cfg variant in Open items.",
  "p_146":"<b>Surface morphology under tidal lock.</b> If e is a rocky variant rather than a sub-Neptune, the surface morphology at 380 K dayside, 320 K nightside under tidal lock would produce a regime intermediate between AU Mic d&#x27;s (substellar lava province + nightside frost cap) and Earth&#x27;s (mild day-night contrast). The cfg does not commit to specific surface features for e because the rocky-variant scenario is itself secondary.",
  "h2_147":"Atmosphere synthesis",
  "p_148":"The atmosphere of e is, by construction, undetectable from current observations. The candidate has no transit and no direct imaging; the only constraint is the RV-derived mass, which says nothing directly about atmospheric composition or pressure.",
  "p_149":"<b>Pressure.</b> The cfg adopts ~10⁶ Pa cloud-deck pressure as the analog to AU Mic c&#x27;s thin H/He envelope reading. This is a midrange estimate; the true value could plausibly span 10⁵ Pa (very thin envelope, near-airless rocky variant) to 10⁷ Pa (thicker H/He envelope, mini-Neptune variant). The cfg picks the midrange c-analog as the default.",
  "p_150":"<b>Composition.</b> By parallel construction with AU Mic c (H₂ ~80%, He ~15%, trace H₂O/CH₄/NH₃/CO with photochemical hazes), the cfg adopts the same composition for e. This is unprincipled but internally consistent. The actual composition at 21 M⊕, 0.16 AU around a flare-saturated M1V is not measurable from current data.",
  "p_151":"<b>Sky appearance.</b> Under the assumed thin H/He envelope, the daytime sky on e (if descending toward the cloud deck) would appear as a deeper-cream-toned banded surface lit by AU Mic at 2.7° angular diameter. Surface insolation 3.6× Earth&#x27;s — substantial, but lower than at b (18.8×) or c (6.5×). The visual presentation would be a smaller, cooler cousin to c.",
  "p_152":"<b>Atmospheric escape.</b> The XUV-driven escape rate at 0.16 AU under AU Mic&#x27;s saturated regime is roughly an order of magnitude lower than at c&#x27;s 0.119 AU, giving ~10⁷ g/s under energy-limited assumptions. This is small enough that the envelope, if present, is largely retained over the system&#x27;s 22-Myr age.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"Tidal damping of a 33.1-d sub-Neptune at 0.161 AU around 0.51 M☉ proceeds on a timescale of ~10⁷ years (Goldreich &amp; Soter 1966 with Neptune-like Q ≈ 10⁴), comparable to or marginally less than the 22-Myr system age. Whether e is fully locked at 1:1 spin-orbit depends sensitively on the planet&#x27;s tidal Q and on the eccentricity (not measured); the cfg adopts 1:1 lock as the default scenario consistent with the sub-Neptune analog interpretation.",
  "p_155":"<b>KSP implementation note (conditional on confirmation).</b> Rotation period = orbital period = 33.11 days (2 860 704 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code>. If the cfg ships e as an optional fourth planet, this rotation period applies; if e is omitted, the cfg writer should not synthesize a rotation cfg for an unshipped body.",
  "p_156":"<b>No seasons.</b> Obliquity damped to zero (under the locked assumption). Eccentricity is not measured — circular assumption is adopted.",
  "p_157":"<b>Day-night redistribution.</b> With a thin H/He envelope, e&#x27;s atmosphere transports heat from day to night moderately well, but less than b&#x27;s thicker envelope. Expected day-night contrast: ~90 K (dayside 410 K, nightside 320 K). The contrast is smaller than at b/c because e&#x27;s lower insolation reduces the thermal forcing.",
  "p_158":"<b>Slow rotation effects.</b> With a 33-day rotation period, Coriolis effects are an order of magnitude weaker than at b/c. Atmospheric circulation is dominated by direct day-to-night thermal forcing (Sergeev 2020 substellar convection framework) rather than zonal jets. Banded structure may be less developed than at c.",
  "h2_159":"Visual styling",
  "p_160":"The visual presentation of AU Mic e (conditional on confirmation) is a smaller, cooler, more weakly-banded cousin to AU Mic c:",
  "li_161":"<b>Global appearance.</b> A warm sub-Neptune disk with faint zonal banding, lit by AU Mic at 2.7° angular diameter (5× the Sun from Earth — still dominant but reduced compared to the inner three planets). The disk shows muted red-brown bands (<span class=\"hex-chip\" style=\"background:#8a6a4c\"></span><code>#8a6a4c</code> for primary haze, <span class=\"hex-chip\" style=\"background:#a08868\"></span><code>#a08868</code> for zone clouds) — slightly cooler-toned than c because of the lower temperature reducing high-cloud brightness.",
  "li_162":"<b>Banded structure.</b> Equatorial superrotation jet produces a faint equatorial zone with darker mid-latitude belts, but less pronounced than at c because of the slower rotation period and cooler temperature. Bands appear as fine stripes rather than broad zones. Tie-break: chose banded over uniform haze for visual continuity with the other AU Mic sub-Neptunes.",
  "li_163":"<b>Cloud-top texture.</b> Even less turbulent than c — e&#x27;s smaller scale height + much slower rotation means eddies and Rossby waves are minimal. The cloud top reads as a relatively smooth banded surface with subtle perturbations.",
  "li_164":"<b>No prominent escape tail.</b> Unlike b, e&#x27;s atmospheric escape is estimated at ~10⁷ g/s — invisible at any practical observation geometry. Cfg renders no extended halo or escape tail for e.",
  "li_165":"<b>Star in sky.</b> AU Mic subtends 2.7° in e&#x27;s sky (5× the Sun from Earth) — a moderate red disk dominating the daytime sky. Surface insolation 3.6× Earth&#x27;s at substellar cloud top. Super-flares brighten illumination by 1–3 magnitudes for tens of minutes — least dramatic among the four planets because of greatest distance, but still substantial because of AU Mic&#x27;s intrinsic flare luminosity.",
  "li_166":"<b>Sister planets.</b> b (innermost, puffy Neptune) at conjunction appears as a small dot ~0.2° in diameter; c (next inward, sub-Neptune) similar; d (innermost rocky) faint at ~0.05°. The edge-on debris disk at 35–210 AU is visible as a thin bright streak on either side of AU Mic, with the inner edge at ~3° from the star as seen from e.",
  "p_167":"The debris disk&#x27;s inner edge at 35 AU is angularly closer from e (~2.6° away on the sky) than from the inner planets, but the visual difference is subtle — the disk&#x27;s brightness and geometry dominate the appearance from any AU Mic vantage point.",
  "h2_168":"Bibliography",
  "h3_169":"Read (visual-informative, drove decisions above)",
  "li_170":"<b>Donati J.-F. et al. 2025</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 700, A227 (<code>2025A&amp;A...700A.227D</code>, doi:10.1051/0004-6361/202555371). Discovery paper for the AU Mic e candidate; SPIRou + ESPRESSO RV at 33.11-d period with minimum mass 21.1 ± 5.4 M⊕. <b>Cornerstone (and currently only) detection.</b> Signal flagged as <code>pl_controv_flag = 1</code> in NEA because of AU Mic&#x27;s super-saturated activity making RV-only detections difficult to confirm.",
  "li_171":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO + TESS joint analysis that refined b/c parameters but did not detect e — sets the context for the activity-modeling sensitivity at AU Mic. The non-detection in Mallorquin 2024 is one source of the controversy: Donati 2025&#x27;s later analysis with extended SPIRou data recovers a signal that Mallorquin 2024&#x27;s pipeline did not pick up.",
  "li_172":"<b>Mallorquin M. et al. 2024b (non-confirmation)</b> — <i>Revisiting the dynamical masses of the transiting planets in the young AU Mic system</i>, A&amp;A accepted (arXiv:2407.16461). Explicit non-confirmation: &quot;we do not confirm the recently proposed existence of the planet candidate AU Mic &#x27;e&#x27; with an orbital period of 33.4 days.&quot; Sets 3σ upper limit K_e &lt; 10 m/s in optical RV using the earlier Donati 2023 period. Donati 2025 responds: the revised lower amplitude (5.9 m/s, 4.9σ) sits below Mallorquin&#x27;s optical sensitivity floor and is detectable mainly in SPIRou near-IR — wavelength-dependent SNR, not refutation.",
  "li_173":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). TTV-based dynamical mass for the inner planets; introduces d. Wittrock&#x27;s N-body fit does not require an additional perturber at 33 d (any d-c TTV residuals can be explained by their dynamical model without e), which is part of the e-controversy chain.",
  "li_174":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation framework; e at 3.6 S⊕ + AU Mic XUV is well above the envelope-retention threshold at 22 Myr, supporting the thin-H/He-envelope cfg pick over the rocky-without-envelope variant.",
  "li_175":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic Forecasting of the Masses and Radii of Other Worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). Mass-radius relation used to estimate the placeholder radius of 2.9 R⊕ from the RV-derived mass.",
  "h3_176":"Read (context / methodology, not decision-driving)",
  "li_177":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13428). TESS discovery of b; defines the system&#x27;s stellar-activity context relevant to the e-controversy.",
  "li_178":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). Discovery of c; the sub-Neptune analog from which most of e&#x27;s cfg parameters are inherited.",
  "li_179":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare census; rate 5.6/day above 10³¹ erg. Drives the activity-contamination concern for the e RV signal.",
  "li_180":"<b>Klein B. et al. 2021</b> — <i>Investigating the young AU Mic system with SPIRou: stellar magnetic field and close-in planet mass</i>, MNRAS 502, 188 (<code>2021MNRAS.502..188K</code>, arXiv:2012.04970). SPIRou near-IR ZDI + RV of AU Mic; methodology that fed into the Donati 2025 SPIRou + ESPRESSO joint analysis.",
  "li_181":"<b>Boldog Z. et al. 2025</b> — <i>Transit-timing variations in the AU Mic system observed with CHEOPS</i>, A&amp;A 694, A137 (<code>2025A&amp;A...694A.137B</code>, arXiv:2501.13575). CHEOPS TTV refinement of b/c orbits with d as inner perturber. Does NOT address e at the 33 d period — Boldog&#x27;s TTV fit does not require an outer 33-d perturber. Neither confirms nor refutes e; most recent TTV study with no signature at e&#x27;s period.",
  "li_182":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 2015 (<code>2023MNRAS.525.2015D</code>). ZDI of host star; provides stellar magnetic-field context for any close-in candidate.",
  "li_183":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). Tidal damping timescale framework used for the conditional 1:1 spin-orbit conclusion.",
  "li_184":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets: Insights from High-Resolution Simulations</i>, ApJ 894, 84 (<code>2020ApJ...894...84S</code>, arXiv:2004.03007). Substellar-convection framework applied to the day-night redistribution discussion.",
  "h3_185":"Read (instrument / non-decisive)",
  "li_186":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). GP-detrending methodology applied (indirectly) to the Donati 2025 e detection; not e-decisive.",
  "h3_187":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_188":"The AU Mic e literature is sparse because the candidate is very recent (Donati 2025) and has not yet been the subject of independent follow-up observations. Several upcoming papers (extended SPIRou monitoring, possible TESS extended-mission detection attempts, JWST atmospheric characterization proposals) are in progress but were not deep-read because they don&#x27;t contribute cfg-decisive content at this time. The full filtered bibliography is preserved in the planet&#x27;s <code>_bib/au-mic-e.yaml</code> (to be created) with <code>status: skipped</code> annotations.",
  "h2_189":"Open items for follow-up",
  "li_190":"<b>Independent confirmation (highest priority).</b> The cfg&#x27;s inclusion of AU Mic e is gated on independent confirmation. A second-instrument RV detection (e.g., from extended HARPS-N or MAROON-X monitoring), a TTV signal in extended b/c transit monitoring with TESS or PLATO, or a successful transit search would each promote e from candidate to confirmed. If e is retracted instead (the activity-contamination explanation winning out over a planetary one), the cfg should ship AU Mic with only b/c/d and the e Phase 3 should be archived as <code>docs/phase3/_archived/au-mic-e.md</code> rather than promoted to the cfg writer.",
  "li_191":"<b>Transit search.</b> If e&#x27;s inclination is favorable (probably near-edge-on if coplanar with the rest of the system), a transit could be detectable in extended TESS sectors or future PLATO observations. A transit detection would collapse the radius uncertainty (currently ±~10% from the Chen &amp; Kipping placeholder) and the density uncertainty from low to high confidence, and would also independently confirm the planet&#x27;s existence.",
  "li_192":"<b>Atmospheric detection.</b> Conditional on confirmation, any JWST transmission spectrum of e would constrain the assumed thin-H/He composition. A non-detection at high SNR would favor the rocky-without-envelope variant; a detection of H₂O, CH₄, or CO would support the cfg&#x27;s sub-Neptune-analog reading.",
  "li_193":"<b>Cfg variant: e omitted.</b> If e is retracted, the cfg ships AU Mic with only b/c/d. This is the default conservative variant: ship only confirmed planets, preserve the e Phase 3 in archive, and revisit if independent confirmation appears. This variant is the <b>conservative default</b> until confirmation arrives.",
  "li_194":"<b>Cfg variant: e confirmed as sub-Neptune.</b> If e is confirmed and transits are detected, ship as the cfg synthesizes here — a c-analog sub-Neptune at 0.16 AU, 33-d period, 21 M⊕ with thin H/He envelope and banded zonal cloud structure.",
  "li_195":"<b>Cfg variant: e confirmed as rocky super-Earth.</b> If e is confirmed but no transits are detected and the mass-radius inference points to a rocky composition (density &gt; 6 g/cc), ship as a heavy super-Earth analog of AU Mic d rather than as a sub-Neptune. Surface morphology would shift toward d&#x27;s tidally-locked-rocky pattern (substellar lava province attenuated by lower insolation; nightside cold trap; thin or absent atmosphere). The visual styling would diverge meaningfully from the headline reading.",
  "li_196":"<b>Cfg variant: e at higher mass.</b> If extended RV monitoring finds the true mass is higher (e.g., if the system is not perfectly coplanar and the RV gives only M sin i), e could approach Neptune mass (~30–40 M⊕). This would push the cfg toward a b-analog puffy Neptune reading. Listed as a possible variant pending higher-quality data.",

  ko: {
  "p_1":"AU Microscopii e 는 22 Myr 의 M1Ve flare star AU Mic 주위를 도는 시선속도 후보 행성으로 논란 상태이며, Donati et al. 2025 (A&amp;A 700, A227. <code>2025A&amp;A...700A.227D</code>. doi:10.1051/0004-6361/202555371) 가 다년간의 SPIRou + ESPRESSO RV 캠페인에서 보고했습니다. 보고된 궤도 주기는 33.11 ± 0.06 d, 최소 질량은 21.1 ± 5.4 M⊕ 입니다. 행성은 통과하지 않으며 다른 독립 관측 제약 (TTV, 직접 촬영, 천체측정) 은 존재하지 않습니다. 이 후보는 NASA Exoplanet Archive 에서 <code>pl_controv_flag = 1</code> 을 달고 있는데, RV 신호가 자리잡은 주기 영역 에서 AU Mic 의 항성 활동 자전 고조파 (4.86 d 자전 주기의 배수) 가 계통적 power 를 그럴듯하게 기여할 수 있기 때문입니다. 33.11 d 주기는 4.86 d 의 깔끔한 고조파가 아니지만 (자전의 ≈ 6.81 배), Donati 2025 가 행성 해석을 주장하는 근거이기도 하고, 그래도 super-saturated 활동 host 별 위에서는 RV 전용 후보가 본질적으로 확인이 어렵습니다.",
  "p_2":"e 의 모든 cfg 파라미터가 미확인 검출에 의존하기 때문에, 이 합성은 <b>시종일관 cfg-conservative</b> 입니다 — 모든 confidence 값은 <code>low</code> 이고, cfg-ready 섹션은 독립적인 확인을 명시적으로 조건으로 합니다. e 가 미래 분석에서 철회되면 AU Mic 시스템은 NearStars cfg 에서 b/c/d 만으로 배포되어야 하고, 이 Phase 3 합성은 cfg 작성기로 승격되기보다는 아카이브에 들어가야 합니다.",
  "p_3":"<b>NearStars 시나리오 선택. AU Mic 주위 ~0.16 AU 의 33.1 d 궤도에 있는 ~21 M⊕ 따뜻한 sub-Neptune 후보로, AU Mic c (시스템에서 유일하게 잘 특성화된 sub-Neptune) 의 유사로 모델링합니다. 조석으로 묶인 따뜻한 sub-Neptune, 암석/철 내부 위에 얇은 H/He envelope. cfg 배포는 독립적인 확인을 조건으로 합니다 — 통과 탐색이 성공하거나, 확장된 모니터링 에서 TTV 신호가 검출되거나, 다른 기기에서의 RV 회수가 나타나기 전까지 cfg 작성기는 AU Mic e 를 기본 멤버가 아니라 선택적인 네 번째 행성 variant 로 다루어야 합니다.</b> 27 개 cfg 픽. 모두 low confidence. documented divergence 없음 (여기서의 모든 선택은 제약 없는 윈도우 안의 tie-break 이거나, AU Mic c 의 더 잘 제약된 파라미터에서 직접 상속).",

  "td_138":"3518",
  "td_139":"high",
  "td_140":"host 별 광도 색-등가 흑체 (Gaia DR3 BP/RP). Phase 2 분광 Teff = 3700 ± 100 K (Plavchan 2020) 와 의도적으로 구분되며, SED 조명은 분광 값을 사용 — au-mic.md <code>stellar_color_temp_k</code> 참조 (e 의 확인 여부에 의존하지 않는 유일한 파라미터)",
  "h2_141":"Surface synthesis",
  "p_142":"AU Mic e 의 &quot;표면&quot; 은 이 Phase 3 합성에서 가장 사변적인 요소입니다. 어떤 관측도 bulk 속성을 제약하지 않기 때문입니다. Donati 2025 의 RV 신호는 coplanar 시스템 가정 하에서 (잔해 원반과 b/c/d 가 모두 일관되게 거의 edge-on 이라 cfg 가 채택) 최소 질량 21.1 ± 5.4 M⊕ 를 주지만, 통과 관측이 없고 반지름도 측정되지 않았습니다. cfg 의 placeholder 반지름 2.9 R⊕ 는 21 M⊕ 에 적용한 Chen &amp; Kipping 2017 확률적 질량-반지름 관계에서 옵니다. 이는 e 를 sub-Neptune 영역에 놓는데, AU Mic c (2.79 R⊕, 14.46 M⊕) 와 대체로 평행하지만 질량과 밀도가 더 높습니다.",
  "p_143":"NearStars 의 목적에서 e 는 따라서 c 의 sub-Neptune analog 로 모델링되며, 질량은 키우고 거리는 더 늘어난 형태입니다. e 가 확인되고 cfg 에 실린다면 플레이어가 보는 &quot;가시 표면&quot; 은 ~10⁶ Pa 의 얇은 H/He 구름 데크 꼭대기로, 띠상 가스 천체로 렌더링됩니다. 그 아래 암석/철 코어가 존재하는지, 혹은 e 가 사실은 envelope 가 거의 없는 물 풍부 mantle 인지는 미해결입니다. cfg 는 c 와의 평행 구성으로 얇은-envelope 해석을 헤드라인으로 채택합니다.",
  "p_144":"<b>반지름이 그렇게 불확실한 이유.</b> 21 M⊕ 의 질량-반지름 다이어그램 은 적어도 세 가지 서로 다른 조성 가족을 허용합니다. 상당한 물 mantle 을 가진 super-Earth 는 반지름 ~2.3 R⊕, 밀도 ~9 g/cc 일 수 있습니다 — 지구보다 밀도가 높고, sub-Neptune 골짜기에서 가장 밀도가 높은 멤버입니다. 암석 코어 위에 ~3% H/He envelope 를 가진 sub-Neptune 은 Chen &amp; Kipping 2017 placeholder 의 ~2.9 R⊕, 밀도 ~4.7 g/cc 와 맞습니다 — cfg 의 헤드라인 해석. ~10% H/He 의 더 부푼 sub-Neptune 은 ~3.5 R⊕, 밀도 ~2.7 g/cc 까지 갈 수 있어 작은 Neptune 과 비슷합니다. 통과 없이는 cfg 가 이들을 구분할 수 없고, placeholder 값은 중간 추측입니다.",
  "p_145":"<b>e 가 envelope 가 없는 암석이라면.</b> AU Mic 주위 0.16 AU 의 21 M⊕ super-Earth 는 22 Myr 동안 심한 XUV 구동 대기 침식을 겪지만 두꺼운 envelope 를 스트립하기에는 부족합니다 (Owen &amp; Wu 2017 광증발 골짜기가 envelope 스트립 임계점을 e 가 겪는 것보다 더 높은 일사량에 둠). envelope 없는 암석 variant 는 따라서 그럴듯하지만 광증발 프레임워크에서 강하게 선호되지는 않습니다. Open items 에 cfg variant 로 등재.",
  "p_146":"<b>조석 lock 하의 표면 형태.</b> e 가 sub-Neptune 이 아니라 암석 variant 라면, 조석 lock 하 380 K 주간, 320 K 야간의 표면 형태는 AU Mic d 의 양상 (substellar lava province + 야간 frost cap) 과 지구의 양상 (온건한 주야 대비) 사이의 중간 영역을 만들 것입니다. cfg 는 e 에 대해 구체 표면 피처를 약속하지 않습니다. 암석 variant 시나리오 자체가 부차적이기 때문입니다.",
  "h2_147":"Atmosphere synthesis",
  "p_148":"e 의 대기는 구성상 현재 관측에서 검출 불가능합니다. 후보는 통과도 없고 직접 촬영도 없습니다. 유일한 제약은 RV 유도 질량이며, 이는 대기 조성이나 압력에 대해 직접적으로는 아무것도 말해주지 않습니다.",
  "p_149":"<b>압력.</b> cfg 는 AU Mic c 의 얇은 H/He envelope 해석에 대한 analog 로 ~10⁶ Pa 구름 데크 압력을 채택합니다. 이는 중간 추정값입니다. 실제 값은 10⁵ Pa (매우 얇은 envelope, 거의 airless 한 암석 variant) 에서 10⁷ Pa (더 두꺼운 H/He envelope, mini-Neptune variant) 까지 그럴듯하게 펼쳐질 수 있습니다. cfg 는 중간 범위의 c-analog 를 기본값으로 택합니다.",
  "p_150":"<b>조성.</b> AU Mic c (H₂ ~80%, He ~15%, 미량 H₂O/CH₄/NH₃/CO 와 광화학 haze) 와의 평행 구성으로 cfg 는 e 에도 같은 조성을 채택합니다. 이는 무원칙하지만 내부적으로 일관됩니다. flare 포화된 M1V 주위 0.16 AU 의 21 M⊕ 에서의 실제 조성은 현재 데이터에서 측정 불가능합니다.",
  "p_151":"<b>하늘 외관.</b> 가정된 얇은 H/He envelope 아래에서 (구름 데크로 내려가는) e 의 주간 하늘은 AU Mic 의 각지름 2.7° 가 비추는 더 깊은 크림 색조의 띠 표면으로 보일 것입니다. 표면 일사량은 지구의 3.6 배 — 상당하지만 b (18.8×) 나 c (6.5×) 보다는 낮습니다. 시각적 표현은 c 의 작고 차가운 사촌일 것입니다.",
  "p_152":"<b>대기 탈출.</b> AU Mic 의 포화 영역 하 0.16 AU 의 XUV 구동 탈출률은 c 의 0.119 AU 보다 대략 한 자릿수 작아, 에너지 한정 가정 하에서 ~10⁷ g/s 입니다. envelope 가 존재한다면 시스템의 22 Myr 나이에 걸쳐 대부분 보존되기에 충분히 작습니다.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"0.51 M☉ 주위 0.161 AU 의 33.1-d sub-Neptune 에 대한 조석 감쇠는 ~10⁷ 년 시간 척도로 진행됩니다 (Goldreich &amp; Soter 1966, Neptune-like Q ≈ 10⁴), 22-Myr 시스템 나이와 비슷하거나 약간 작은 정도입니다. e 가 1:1 spin-orbit 으로 완전히 잠겨 있는지는 행성의 조석 Q 와 이심률 (측정되지 않음) 에 민감하게 의존합니다. cfg 는 sub-Neptune analog 해석과 일관된 기본 시나리오로 1:1 lock 을 채택합니다.",
  "p_155":"<b>KSP 구현 노트 (확인 조건부).</b> 자전 주기 = 궤도 주기 = 33.11 일 (2 860 704 초). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 일치해야 합니다. cfg 가 e 를 선택적 네 번째 행성으로 배포한다면 이 자전 주기가 적용됩니다. e 가 생략된다면 cfg 작성기는 배포되지 않은 천체에 대한 자전 cfg 를 합성해서는 안 됩니다.",
  "p_156":"<b>계절 없음.</b> Obliquity 는 0 으로 감쇠 (lock 가정 하). 이심률은 측정되지 않음 — 원형 가정을 채택합니다.",
  "p_157":"<b>주야 재분배.</b> 얇은 H/He envelope 로 e 의 대기는 주간에서 야간 으로 적당히 잘 열을 운반하지만 b 의 더 두꺼운 envelope 보다는 못합니다. 예상 주야 대비. ~90 K (주간 410 K, 야간 320 K). e 의 낮은 일사량이 열 forcing 을 줄여 대비가 b/c 보다 작습니다.",
  "p_158":"<b>느린 자전 효과.</b> 33 일 자전 주기에서 Coriolis 효과는 b/c 보다 한 자릿수 약합니다. 대기 순환은 zonal jet 보다는 직접적인 주야 열 forcing 에 지배됩니다 (Sergeev 2020 substellar 대류 프레임워크). 띠상 구조는 c 보다 덜 발달할 수 있습니다.",
  "h2_159":"Visual styling",
  "p_160":"AU Mic e 의 시각적 표현은 (확인 조건부) AU Mic c 의 작고 차갑고 띠가 더 약한 사촌입니다.",
  "li_161":"<b>전반 외관.</b> 옅은 zonal 띠를 가진 따뜻한 sub-Neptune 디스크. AU Mic 의 각지름 2.7° (지구에서 본 태양의 5 배 — 여전히 지배적 이지만 안쪽 세 행성 대비 줄어듦) 가 비춥니다. 디스크는 muted red-brown 띠 (<span class=\"hex-chip\" style=\"background:#8a6a4c\"></span><code>#8a6a4c</code> 주 haze, <span class=\"hex-chip\" style=\"background:#a08868\"></span><code>#a08868</code> zone 구름) 를 보입니다 — 낮은 온도가 고고도 구름 밝기를 줄여 c 보다 살짝 더 차가운 색조.",
  "li_162":"<b>띠 구조.</b> 적도 superrotation jet 이 옅은 적도 zone 과 더 어두운 중위도 belt 를 만들지만, 자전 주기가 더 느리고 온도가 낮아 c 보다 덜 두드러집니다. 띠는 넓은 zone 이 아니라 가는 줄로 보입니다. Tie-break. 다른 AU Mic sub-Neptune 들과의 시각적 연속성을 위해 균일 haze 가 아닌 띠를 선택.",
  "li_163":"<b>구름 꼭대기 텍스처.</b> c 보다도 덜 격렬함 — e 의 작은 스케일 높이 + 훨씬 느린 자전이 eddy 와 Rossby wave 를 최소화합니다. 구름 꼭대기는 미묘한 섭동을 가진 비교적 매끈한 띠 표면으로 읽힙니다.",
  "li_164":"<b>두드러진 탈출 꼬리 없음.</b> b 와 달리 e 의 대기 탈출은 ~10⁷ g/s 로 추정 — 실용적인 관측 기하에서는 보이지 않습니다. cfg 는 e 에 확장된 halo 나 탈출 꼬리를 렌더링하지 않습니다.",
  "li_165":"<b>하늘의 별.</b> AU Mic 이 e 의 하늘에서 2.7° 를 차지 (지구에서 본 태양의 5 배) — 주간 하늘을 지배하는 적당한 크기의 붉은 디스크. substellar 구름 꼭대기에서의 표면 일사량은 지구의 3.6 배. Super-flare 는 10–60 분간 조명을 1–3 등급 밝게 만듭니다 — 거리가 가장 멀어 네 행성 중 가장 덜 극적이지만, AU Mic 의 본질적 flare 광도 때문에 여전히 상당합니다.",
  "li_166":"<b>자매 행성.</b> b (가장 안쪽, puffy Neptune) 가 conjunction 에서 지름 ~0.2° 의 작은 점으로 보임. c (그 다음 안쪽, sub-Neptune) 비슷. d (가장 안쪽 암석) 는 ~0.05° 로 옅음. 35–210 AU 의 가장자리 정면 잔해 원반은 AU Mic 양옆으로 가늘고 밝은 줄로 보이며, e 에서 봤을 때 안쪽 가장자리는 별에서 ~3° 떨어져 있음.",
  "p_167":"35 AU 의 원반 안쪽 가장자리는 e 에서 본 각도 (~2.6°) 가 안쪽 행성들에서 본 것보다 좁지만, 시각적 차이는 미묘합니다 — 원반의 밝기와 기하는 AU Mic 어느 시점에서도 외관을 지배합니다.",
  "h2_168":"Bibliography",
  "h3_169":"Read (visual-informative, drove decisions above)",
  "li_170":"<b>Donati J.-F. et al. 2025</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 700, A227 (<code>2025A&amp;A...700A.227D</code>, doi:10.1051/0004-6361/202555371). AU Mic e 후보의 발견 논문. SPIRou + ESPRESSO RV 의 33.11-d 주기에서 최소 질량 21.1 ± 5.4 M⊕. <b>현재 유일한 검출이자 cornerstone.</b> AU Mic 의 super-saturated 활동이 RV 전용 검출을 확인하기 어렵게 만들어 NEA 에서 신호가 <code>pl_controv_flag = 1</code> 로 표시됨.",
  "li_171":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). b/c 파라미터를 정밀화했지만 e 는 검출하지 못한 ESPRESSO + TESS 결합 분석 — AU Mic 에서 활동 모델링 민감도에 대한 맥락을 설정. Mallorquin 2024 의 미검출이 논란의 원천 중 하나. Donati 2025 의 더 후속 SPIRou 데이터 확장 분석이 Mallorquin 2024 의 파이프라인이 포착하지 못한 신호를 회수함.",
  "li_172":"<b>Mallorquin M. et al. 2024b (비확인)</b> — <i>Revisiting the dynamical masses of the transiting planets in the young AU Mic system</i>, A&amp;A 수락 (arXiv:2407.16461). 명시적 비확인. &quot;33.4 일 궤도 주기를 가진 행성 후보 AU Mic &#x27;e&#x27; 의 최근 제안된 존재를 확인하지 못함&quot;. 이전 Donati 2023 주기를 사용해 광학 RV 에서 K_e &lt; 10 m/s 의 3σ 상한 설정. Donati 2025 의 응답. 수정된 더 낮은 진폭 (5.9 m/s, 4.9σ) 이 Mallorquin 의 광학 민감도 floor 아래에 있어 SPIRou 근적외선에서 주로 검출 가능 — 파장 의존 SNR 이지 반박이 아님.",
  "li_173":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). 안쪽 행성에 대한 TTV 동역학 질량. d 도입. Wittrock 의 N-body fit 은 33 d 의 추가 perturber 를 요구하지 않으며 (d-c TTV 잔차는 동역학 모델만으로 e 없이 설명 가능), 이는 e 논란 체인의 일부.",
  "li_174":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발 프레임워크. 3.6 S⊕ + AU Mic XUV 의 e 는 22 Myr 에서 envelope 보전 임계점보다 훨씬 위에 있어, envelope 없는 암석 variant 보다 얇은-H/He-envelope cfg 픽을 뒷받침.",
  "li_175":"<b>Chen J. &amp; Kipping D. 2017</b> — <i>Probabilistic Forecasting of the Masses and Radii of Other Worlds</i>, ApJ 834, 17 (<code>2017ApJ...834...17C</code>, arXiv:1603.08614). RV 유도 질량에서 placeholder 반지름 2.9 R⊕ 를 추정하는 데 사용한 질량-반지름 관계.",
  "h3_176":"Read (context / methodology, not decision-driving)",
  "li_177":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13428). TESS 의 b 발견. e 논란과 관련된 시스템의 항성 활동 맥락 정의.",
  "li_178":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). c 의 발견. e 의 cfg 파라미터 대부분이 상속되는 sub-Neptune analog.",
  "li_179":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare 센서스. 10³¹ erg 위 5.6/일 비율. e RV 신호에 대한 활동 오염 우려를 구동.",
  "li_180":"<b>Klein B. et al. 2021</b> — <i>Investigating the young AU Mic system with SPIRou: stellar magnetic field and close-in planet mass</i>, MNRAS 502, 188 (<code>2021MNRAS.502..188K</code>, arXiv:2012.04970). AU Mic 의 SPIRou 근적외선 ZDI + RV. Donati 2025 의 SPIRou + ESPRESSO 결합 분석에 투입된 방법론.",
  "li_181":"<b>Boldog Z. et al. 2025</b> — <i>Transit-timing variations in the AU Mic system observed with CHEOPS</i>, A&amp;A 694, A137 (<code>2025A&amp;A...694A.137B</code>, arXiv:2501.13575). CHEOPS TTV 가 b/c 궤도 정밀화 + d 가 내부 섭동자. 33 d 주기의 e 는 직접 다루지 않음 — Boldog 의 TTV fit 은 33 d 외부 섭동자를 요구하지 않음. e 를 확인하지도 반박하지도 않음. e 주기에서 시그너처가 없는 가장 최근 TTV 연구.",
  "li_182":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 2015 (<code>2023MNRAS.525.2015D</code>). host 별 ZDI. 가까운 모든 후보에 대한 항성 자기장 맥락 제공.",
  "li_183":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). 조건부 1:1 spin-orbit 결론에 사용한 조석 감쇠 시간 척도 프레임워크.",
  "li_184":"<b>Sergeev D. E. et al. 2020</b> — <i>Atmospheric Convection Plays a Key Role in the Climate of Tidally Locked Terrestrial Exoplanets: Insights from High-Resolution Simulations</i>, ApJ 894, 84 (<code>2020ApJ...894...84S</code>, arXiv:2004.03007). 주야 재분배 논의에 적용된 substellar 대류 프레임워크.",
  "h3_185":"Read (instrument / non-decisive)",
  "li_186":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). Donati 2025 e 검출에 (간접적으로) 적용된 GP-detrending 방법론. e-결정적이지 않음.",
  "h3_187":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_188":"AU Mic e 관련 문헌은 후보가 매우 최근 (Donati 2025) 이고 독립적인 후속 관측의 대상이 아직 되지 않았기 때문에 희소합니다. 진행 중인 여러 논문 (확장 SPIRou 모니터링, 가능한 TESS extended-mission 검출 시도, JWST 대기 특성화 제안) 이 있지만 현재로서는 cfg-결정적인 내용을 제공하지 않아 깊이 읽지 않았습니다. 전체 필터링된 bib 는 행성의 <code>_bib/au-mic-e.yaml</code> (생성 예정) 에 <code>status: skipped</code> annotation 으로 보존됩니다.",
  "h2_189":"Open items for follow-up",
  "li_190":"<b>독립 확인 (최우선).</b> cfg 의 AU Mic e 포함은 독립 확인을 조건 으로 합니다. 다른 기기에서의 RV 검출 (예. 확장된 HARPS-N 이나 MAROON-X 모니터링), 확장된 b/c 통과 모니터링 (TESS, PLATO) 의 TTV 신호, 혹은 성공적인 통과 탐색이 각각 e 를 후보에서 확인으로 승격 시킬 수 있습니다. 대신 e 가 철회되면 (활동 오염 설명이 행성 설명을 이기면) cfg 는 AU Mic 을 b/c/d 만으로 배포해야 하고, e Phase 3 는 cfg 작성기로 승격되지 않고 <code>docs/phase3/_archived/au-mic-e.md</code> 에 아카이브되어야 합니다.",
  "li_191":"<b>통과 탐색.</b> e 의 경사각이 호의적이라면 (시스템 나머지와 coplanar 라면 거의 edge-on 일 가능성 큼), 확장된 TESS sector 나 미래 PLATO 관측에서 통과가 검출될 수 있습니다. 통과 검출은 반지름 불확실도 (현재 Chen &amp; Kipping placeholder 에서 ±~10%) 와 밀도 불확실도를 low 에서 high confidence 로 collapse 시키고, 행성의 존재도 독립적으로 확인할 것입니다.",
  "li_192":"<b>대기 검출.</b> 확인 조건부로 e 의 어떤 JWST 투과 스펙트럼이라도 가정된 얇은-H/He 조성을 제약할 것입니다. 높은 SNR 의 비검출은 envelope 없는 암석 variant 를 선호하고, H₂O, CH₄, CO 검출은 cfg 의 sub-Neptune-analog 해석을 뒷받침할 것입니다.",
  "li_193":"<b>cfg variant. e 생략.</b> e 가 철회되면 cfg 는 AU Mic 을 b/c/d 만 으로 배포합니다. 이것이 기본 보수 variant 입니다 — 확인된 행성만 배포, e Phase 3 는 archive 에 보존, 독립 확인이 나타나면 재방문. 이 variant 는 확인이 도착할 때까지의 <b>보수적 기본값</b> 입니다.",
  "li_194":"<b>cfg variant. e 가 sub-Neptune 으로 확인.</b> e 가 확인되고 통과가 검출되면 cfg 는 여기서 합성하는 그대로 — 0.16 AU, 33-d 주기, 21 M⊕ 의 c-analog sub-Neptune, 얇은 H/He envelope, 띠상 zonal 구름 구조 로 배포합니다.",
  "li_195":"<b>cfg variant. e 가 암석 super-Earth 로 확인.</b> e 가 확인되었지만 통과가 검출되지 않고 질량-반지름 추론이 암석 조성 (밀도 &gt; 6 g/cc) 을 가리키면 sub-Neptune 이 아니라 AU Mic d 의 무거운 super-Earth analog 로 배포합니다. 표면 형태는 d 의 조석 lock 암석 패턴 쪽으로 이동 (낮은 일사량으로 약화된 substellar lava province, 야간 cold trap, 얇거나 부재한 대기). 시각 스타일은 헤드라인 해석과 의미 있게 달라질 것입니다.",
  "li_196":"<b>cfg variant. 더 높은 질량의 e.</b> 확장 RV 모니터링이 실제 질량이 더 높음을 발견하면 (예. 시스템이 완전히 coplanar 가 아니어서 RV 가 M sin i 만 주는 경우) e 는 Neptune 질량 (~30–40 M⊕) 에 접근할 수 있습니다. 이는 cfg 를 b-analog puffy Neptune 해석 쪽으로 밀어붙일 것입니다. 더 높은 품질 데이터 대기 중의 가능한 variant 로 등재.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
