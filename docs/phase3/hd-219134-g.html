  "h2_113":"Surface synthesis",
  "p_114":"HD 219134 g has no solid surface in the conventional sense — at Msini ≈ 10.8 M⊕ with no measured radius, it is most plausibly a temperate mini-Neptune with a thick volatile envelope over a rocky-icy core. The &quot;surface&quot; relevant for visual rendering is the cloud deck, referenced to the 1 bar pressure level.",
  "p_115":"The defining caveats are the same as the other RV-only planets, plus the controversy. First, <b>g does not transit</b>: its radius is unmeasured, so radius, gravity, density, and scale height are estimates flagged at low confidence. The cfg adopts a sub-Neptune mass-radius scaling (Lopez &amp; Fortney 2014; Wolfgang 2016): for ~11 M⊕ with a volatile envelope, R ≈ 2.0–3.0 R⊕, and the cfg picks 2.4 R⊕ as the mid-range, giving ~1.9 g⊕ surface gravity and ~4.3 g/cc bulk density (consistent with a volatile-rich mini-Neptune, less dense than the warmer inner planets because of more condensed volatiles).",
  "p_116":"Second, <b>g is observationally contested</b> (<code>pl_controv_flag = 1</code>): it is one of the two planets added by Vogt 2015 that subsequent work has questioned. NearStars keeps g for gameplay variety (documented here and in Open items), with the contested status carried explicitly.",
  "p_117":"<b>Color under K3 V illumination.</b> Because g is the coolest inner planet (326 K), its condensation clouds are paler and whiter than the warm tan decks of the hotter d and f. The cfg renders a pale warm-white cloud deck (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>) with a muted warm-grey haze limb (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) — tie-break choices, no spectrum exists, defaulting to the temperate mini-Neptune analog under the 4858 K orange SED.",
  "h2_118":"Atmosphere synthesis",
  "p_119":"The atmospheric inference for g is entirely theoretical (no transit, no spectrum), but the mass and temperature place it confidently in the temperate mini-Neptune regime.",
  "p_120":"<b>Atmosphere present.</b> At Msini ≈ 11 M⊕ and T_eq ≈ 326 K, g is too massive to be a bare rock and cool enough that volatiles condense; the photoevaporation valley (Owen &amp; Wu 2017) leaves a planet of this mass at 0.38 AU around a K dwarf with its envelope intact. The cfg adopts a thick H₂/He-dominated atmosphere with enhanced metallicity and a water/ammonia condensation cloud deck — the canonical temperate mini-Neptune composition. This is a tie-break (no measured spectrum).",
  "p_121":"<b>Sky appearance.</b> With a thick atmosphere, the sky from the reference 1 bar cloud deck is a pale warm-white overcast, only modestly brightened toward the substellar side because the insolation is low (1.87 S⊕, near Earth&#x27;s). The host star HD 219134 subtends ~1.03° (about 2× the Sun&#x27;s apparent size from Earth) and reads warm-orange through the haze. The atmosphere is cooler and less hazy than the warm inner planets, so the cloud deck is whiter and the banding crisper.",
  "h2_122":"Rotation &amp; spin synthesis",
  "p_123":"At 0.375 AU and 94.2 d, g is far enough out that tidal locking is firmly excluded — the despinning timescale for a ~11 M⊕ volatile planet at this separation far exceeds the system age. The cfg adopts a <b>freely rotating, non-locked</b> state.",
  "p_124":"<b>KSP implementation note.</b> With no rotation measurement, the cfg assigns a generic mini-Neptune rotation period (a moderate ~0.5–1 day analog is a reasonable placeholder, low confidence). Obliquity is set to a modest 10° as an interesting-first tie-break — enough to give the temperate mini-Neptune mild seasonal banding rather than a static striped disk.",
  "p_125":"<b>Mild seasons.</b> The curated eccentricity is 0.0 (circularized), so there is no eccentricity-driven seasonal modulation; the 10° obliquity tie-break provides a gentle latitudinal seasonal cycle over the 94.2 d orbit, expressed as slow drift in the cloud-band pattern rather than dramatic weather.",
  "h2_126":"Visual styling",
  "p_127":"Combining the atmosphere decisions for a temperate, contested RV-only mini-Neptune:",
  "li_128":"<b>Global appearance (orbit view).</b> A pale warm-white banded mini-Neptune disk — cooler, whiter, and crisper-banded than the warm tan d and f, with subtle latitudinal seasonal structure from the 10° obliquity.",
  "li_129":"<b>Cloud bands.</b> Pale warm-white zonal bands (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>) with a water/ammonia condensation cloud deck; banding more distinct than the hazier warm inner planets (tie-break — no GCM).",
  "li_130":"<b>Limb haze.</b> A muted warm-grey haze layer (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>), thinner and less saturated than the hot planets&#x27; tan haze, giving a soft terminator.",
  "li_131":"<b>Star in sky.</b> HD 219134 subtends ~1.03° at g — about 2× the Sun&#x27;s angular size from Earth, warm-orange through the haze, illuminating the cloud deck at ~1.87× Earth-noon brightness (near Earth-like).",
  "li_132":"<b>Sister planets in sky.</b> The hot transiting pair (b, c), d, and the contested f appear interior; the cold giant h is exterior at ~3 AU. All near-coplanar, appearing as bright points.",
  "li_133":"<b>Contested-status rendering note.</b> g is kept for gameplay variety but flagged contested; the rendered planet should be treated as provisional, with both its radius (unmeasured) and its existence pending observational confirmation.",
  "h2_134":"Bibliography",
  "h3_135":"Read (visual-informative, drove decisions above)",
  "li_136":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT solution adding g (and f); the source for g&#x27;s orbit (P = 94.2 d, a = 0.3753 AU) and minimum mass (Msini = 10.8 M⊕, recommended), and the <code>pl_controv_flag = 1</code> controversy flag. <b>The anchor for g&#x27;s orbit, mass, and contested status.</b>",
  "li_137":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, <a href=\"https://arxiv.org/abs/1311.0329\">arXiv:1311.0329</a>). Sub-Neptune envelope mass-radius scaling; gives the R ≈ 2.0–3.0 R⊕ estimate for ~11 M⊕. Drives the (low-confidence) <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> estimate.",
  "li_138":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). Photoevaporation physics; at ~11 M⊕ and 0.38 AU around a K dwarf, g retains its volatile envelope. Supports <code>atmosphere_present = true</code>.",
  "h3_139":"Read (context / methodology, not decision-driving)",
  "li_140":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic Mass-Radius Relationship for Sub-Neptunes</i>, ApJ 825, 19 (<code>2016ApJ...825...19W</code>, <a href=\"https://arxiv.org/abs/1504.07557\">arXiv:1504.07557</a>). Probabilistic M-R relation; corroborates the temperate mini-Neptune radius estimate range.",
  "li_141":"<b>Johnson M. C. et al. 2016</b> — A&amp;A — ApJ 821, 74 (<code>2016ApJ...821...74J</code>). Host activity/rotation context; relevant to the broader question of which Vogt 2015 signals are activity-induced (the basis for the contested flags in the system).",
  "li_142":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited host parameters (L for the insolation/T_eq derivation).",
  "h3_143":"Read (instrument-only, not visual-informative)",
  "li_144":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). The transiting b/c study; g is non- transiting and not characterized here beyond the system context.",
  "h3_145":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_146":"The g-specific arXiv record is small (RV-only, contested, no transit or atmospheric characterization). The not-read set is RV-reanalysis and dynamical-stability follow-ups that bear on whether g is real but do not change the temperate mini-Neptune rendering adopted while the planet is kept.",
  "h2_147":"Open items for follow-up",
  "li_148":"<b>Confirmation or retraction.</b> g carries <code>pl_controv_flag = 1</code>; a future RV reanalysis or transit detection would confirm or retract it. If retracted, g should be removed; if confirmed, the flag clears. Currently kept for gameplay variety.",
  "li_149":"<b>True mass and radius.</b> g&#x27;s mass is Msini-only and the radius is a sub-Neptune scaling estimate at low confidence. An inclination (astrometry) or transit detection would pin both.",
  "li_150":"<b>Atmospheric spectrum.</b> No spectrum exists; a future measurement would replace the tie-break composition and cloud tints.",

  "td_112":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_113":"표면 합성",
  "p_114":"HD 219134 g 는 통상적 의미의 고체 표면이 없습니다 — Msini ≈ 10.8 M⊕ 에 측정 반지름이 없어, 암석-얼음 core 위에 두꺼운 volatile envelope 을 가진 온대 mini-Neptune 일 가능성이 가장 높습니다. 시각 렌더링에 관련된 &quot;표면&quot;은 1 bar 압력 레벨로 기준된 구름 deck 입니다.",
  "p_115":"결정적 단서는 다른 RV-only 행성들과 같고, 거기에 논쟁이 더해집니다. 첫째, <b>g 는 transit 하지 않습니다.</b> 반지름이 측정되지 않아 반지름, 중력, 밀도, scale height 는 낮은 신뢰도로 표시된 추정입니다. cfg 는 sub-Neptune mass-radius 스케일링 (Lopez &amp; Fortney 2014. Wolfgang 2016) 을 채택합니다 — ~11 M⊕ 에 volatile envelope 이면 R ≈ 2.0–3.0 R⊕ 이고, cfg 는 mid-range 2.4 R⊕ 를 선택합니다. 이는 표면 중력 ~1.9 g⊕ 와 bulk 밀도 ~4.3 g/cc (volatile 풍부한 mini-Neptune 과 일관. 더 응결된 volatile 때문에 따뜻한 안쪽 행성보다 밀도가 낮음) 를 줍니다.",
  "p_116":"둘째, <b>g 는 관측적으로 contested 입니다</b> (<code>pl_controv_flag = 1</code>). 후속 연구가 의문을 제기한, Vogt 2015 가 추가한 두 행성 중 하나입니다. NearStars 는 게임플레이 다양성을 위해 g 를 (여기와 후속 항목에 기록한 채) 유지하며, contested 상태를 명시적으로 담습니다.",
  "p_117":"<b>K3 V 조명 아래의 색.</b> g 는 안쪽 행성 중 가장 차가워 (326 K), 그 응결 구름은 더 뜨거운 d 와 f 의 따뜻한 tan deck 보다 옅고 흽니다. cfg 는 옅은 warm-white 구름 deck (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>) 과 절제된 warm-grey haze limb (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) 을 렌더링합니다 — tie-break 선택이며, 스펙트럼은 없고, 4858 K 오렌지 SED 아래의 온대 mini-Neptune 유사체를 기본값으로 합니다.",
  "h2_118":"대기 합성",
  "p_119":"g 의 대기 추론은 완전히 이론적이지만 (transit 없음, 스펙트럼 없음), 질량과 온도가 g 를 확실히 온대 mini-Neptune 영역에 둡니다.",
  "p_120":"<b>대기 존재.</b> Msini ≈ 11 M⊕ 와 T_eq ≈ 326 K 에서 g 는 맨 암석이기엔 너무 무겁고 volatile 이 응결할 만큼 차갑습니다. 광증발 valley (Owen &amp; Wu 2017) 는 K 왜성 주위 0.38 AU 의 이 질량 행성에게 envelope 을 온전히 남깁니다. cfg 는 금속도가 증강된 두꺼운 H₂/He 지배 대기와 물/암모니아 응결 구름 deck 을 채택합니다 — 전형적인 온대 mini-Neptune 조성입니다. 이는 tie-break 입니다 (측정 스펙트럼 없음).",
  "p_121":"<b>하늘 외관.</b> 두꺼운 대기에서 기준 1 bar 구름 deck 의 하늘은 옅은 warm-white 흐림으로, 일사가 낮아 (1.87 S⊕, 지구 근처) substellar 쪽으로만 약간 밝아집니다. 호스트 별 HD 219134 가 ~1.03° (지구에서 본 태양 각 크기의 약 2 배) 를 차지하고 haze 를 통해 따뜻한 오렌지로 읽힙니다. 대기는 따뜻한 안쪽 행성보다 차갑고 덜 hazy 해서, 구름 deck 이 더 희고 띠가 더 또렷합니다.",
  "h2_122":"자전 &amp; spin 합성",
  "p_123":"0.375 AU, 94.2 d 에서 g 는 충분히 멀어 조석 고정이 확고히 배제됩니다 — 이 거리의 ~11 M⊕ volatile 행성에 대한 despinning timescale 이 시스템 나이를 한참 초과합니다. cfg 는 <b>자유 자전, 비고정</b> 상태를 채택합니다.",
  "p_124":"<b>KSP 구현 노트.</b> 자전 측정이 없어 cfg 는 일반적인 mini-Neptune 자전 주기를 할당합니다 (적당한 ~0.5–1 일 유사체가 합리적인 placeholder, 낮은 신뢰도). obliquity 는 흥미로움 우선 tie-break 로 적당한 10° 로 설정합니다 — 정적인 줄무늬 disk 가 아니라 온대 mini-Neptune 에 부드러운 계절 띠를 주기에 충분합니다.",
  "p_125":"<b>부드러운 계절.</b> curated 이심률은 0.0 (원형화됨) 이라 이심률 구동 계절 변조는 없습니다. 10° obliquity tie-break 가 94.2 d 궤도에 걸쳐 부드러운 위도 계절 주기를 제공하며, 이는 극적인 날씨가 아니라 구름-띠 패턴의 느린 표류로 나타납니다.",
  "h2_126":"비주얼 스타일",
  "p_127":"온대, contested RV-only mini-Neptune 의 대기 결정을 종합하면 다음과 같습니다.",
  "li_128":"<b>전역 외관 (궤도 뷰).</b> 옅은 warm-white 띠 mini-Neptune disk 로, 따뜻한 tan 의 d 와 f 보다 차갑고 희며 띠가 또렷하고, 10° obliquity 에서 비롯된 미묘한 위도 계절 구조를 가집니다.",
  "li_129":"<b>구름 띠.</b> 물/암모니아 응결 구름 deck 을 가진 옅은 warm-white 띠 (<span class=\"hex-chip\" style=\"background:#e8e0d0\"></span><code>#e8e0d0</code>). hazy 한 따뜻한 안쪽 행성보다 띠가 더 뚜렷함 (tie-break — GCM 없음).",
  "li_130":"<b>Limb haze.</b> 뜨거운 행성의 tan haze 보다 얇고 덜 채도 높은 절제된 warm-grey haze 층 (<span class=\"hex-chip\" style=\"background:#c8b8a0\"></span><code>#c8b8a0</code>) 으로, 부드러운 terminator 를 줌.",
  "li_131":"<b>하늘의 별.</b> HD 219134 가 g 에서 ~1.03° 를 차지 — 지구에서 본 태양 각 크기의 약 2 배, haze 를 통해 따뜻한 오렌지, 구름 deck 을 ~1.87× 지구 정오 밝기로 (지구 수준에 가깝게) 조명.",
  "li_132":"<b>하늘의 자매 행성.</b> 뜨거운 transit 쌍 (b, c), d, contested f 가 안쪽에, 차가운 거인 h 가 ~3 AU 바깥에 나타남. 모두 거의 동일 평면, 밝은 점으로 보임.",
  "li_133":"<b>Contested-상태 렌더링 노트.</b> g 는 게임플레이 다양성을 위해 유지되나 contested 로 표시됩니다. 렌더링된 행성은 잠정적으로 다뤄야 하고, 반지름 (미측정) 과 그 실재 둘 다 관측 확정 대기 중입니다.",
  "h2_134":"참고 문헌",
  "h3_135":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_136":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). g (와 f) 를 추가한 Keck/HIRES + APT 해. g 의 궤도 (P = 94.2 d, a = 0.3753 AU) 와 최소 질량 (Msini = 10.8 M⊕, recommended), 그리고 <code>pl_controv_flag = 1</code> controversy flag 의 출처. <b>g 의 궤도, 질량, contested 상태의 앵커.</b>",
  "li_137":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, <a href=\"https://arxiv.org/abs/1311.0329\">arXiv:1311.0329</a>). sub-Neptune envelope mass-radius 스케일링. ~11 M⊕ 에 대해 R ≈ 2.0–3.0 R⊕ 추정을 줌. (낮은 신뢰도) <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> 추정을 견인.",
  "li_138":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). 광증발 physics. ~11 M⊕, K 왜성 주위 0.38 AU 에서 g 는 volatile envelope 을 유지. <code>atmosphere_present = true</code> 를 뒷받침.",
  "h3_139":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_140":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic Mass-Radius Relationship for Sub-Neptunes</i>, ApJ 825, 19 (<code>2016ApJ...825...19W</code>, <a href=\"https://arxiv.org/abs/1504.07557\">arXiv:1504.07557</a>). 확률적 M-R 관계. 온대 mini-Neptune 반지름 추정 범위를 보강.",
  "li_141":"<b>Johnson M. C. et al. 2016</b> — ApJ 821, 74 (<code>2016ApJ...821...74J</code>). 호스트 활동/자전 맥락. Vogt 2015 신호 중 어느 것이 활동 유발인가라는 더 넓은 질문 (시스템 contested flag 의 근거) 과 관계됨.",
  "li_142":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 상속된 호스트 파라미터 (일사/T_eq 유도를 위한 L).",
  "h3_143":"읽음 (instrument-only, 시각 정보 아님)",
  "li_144":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). transit 하는 b/c 연구. g 는 비-transit 이라 시스템 맥락을 넘어 여기서 특성화되지 않음.",
  "h3_145":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_146":"g 별 arXiv 기록은 적습니다 (RV-only, contested, transit 이나 대기 특성화 없음). 읽지 않은 세트는 g 의 실재 여부에 관계되는 RV-재분석과 동역학적 안정성 후속이지만, 행성을 유지하는 동안 채택한 온대 mini-Neptune 렌더링을 바꾸지 않습니다.",
  "h2_147":"후속 항목",
  "li_148":"<b>확정 또는 철회.</b> g 는 <code>pl_controv_flag = 1</code> 을 달고 있습니다. 향후 RV 재분석이나 transit 검출이 이를 확정하거나 철회합니다. 철회되면 g 는 제거되어야 하고, 확정되면 flag 가 해제됩니다. 현재 게임플레이 다양성을 위해 유지.",
  "li_149":"<b>진질량과 반지름.</b> g 의 질량은 Msini 전용이고 반지름은 낮은 신뢰도의 sub-Neptune 스케일링 추정입니다. 경사 (천체측정) 나 transit 검출이 둘 다 핀할 것입니다.",

}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
