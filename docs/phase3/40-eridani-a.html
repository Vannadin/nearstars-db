  "h2_76":"Surface synthesis",
  "p_77":"The photosphere of 40 Eridani A is a quintessential K0.5 V dwarf — slightly cooler than the Sun&#x27;s G2 V, with the cream-orange illumination characteristic of mid-K dwarfs. At Teff = 5143 K the SED peaks in the green-yellow ~563 nm, shifted from the Sun&#x27;s ~501 nm peak by the ~600 K cooler photosphere; in chromaticity this corresponds to a warm-orange tint with the visible disk appearing as a slightly amber &quot;sun&quot; to a hypothetical observer at the 0.65 AU habitable-zone inner edge (where insolation matches Earth&#x27;s).",
  "p_78":"The CHARA Classic interferometric measurement (Boyajian 2012) gives the angular diameter to 0.4% precision — among the best-determined K-dwarf diameters in the literature. The independent VLTI/PIONIER result (Rains 2020) agrees within 1σ on both θ_LD and the derived Teff. The two interferometric arrays use different beam combiners, different bandpasses (CHARA H band; PIONIER H band as well but four-telescope), and different limb-darkening prescriptions, so the agreement is a strong validation of the fundamental parameter set.",
  "p_79":"Spot coverage is moderate; log R&#x27;HK = −4.99 (Jenkins 2011) places 40 Eri A as quiet by the standards of intermediate-activity K dwarfs, but slightly more active than the Sun&#x27;s quiet-cycle mean of log R&#x27;HK ≈ −4.95. The 42-day rotation period (Burrows 2024) implies Rossby number Ro ≈ 1.0 (using Noyes 1984 convective turnover ≈ 40 d at this Teff), placing A in the unsaturated rotation–activity regime. Active regions distribute across the visible hemisphere during rotation phases producing the few-m/s RV jitter that masqueraded as the 42-day Vulcan signal.",
  "p_80":"The slightly sub-solar metallicity ([Fe/H] = −0.29) does not produce a visible color shift at typical in-game illumination resolution but does affect the SED at the few-percent level in the optical blue — slightly bluer continuum than a solar-metallicity K0.5 V. The granulation pattern is K-dwarf-typical with smaller convection cells than the Sun, consistent with the shallower convective envelope of the cooler photosphere.",
  "h2_81":"Atmosphere synthesis",
  "p_82":"40 Eri A hosts a moderately quiet K-dwarf atmosphere with the standard chromosphere–transition-region–corona structure. The chromospheric Ca II H&amp;K emission corresponds to log R&#x27;HK = −4.99 (Jenkins 2011) — a value consistent with the K-dwarf mean for the unsaturated rotation–activity regime. There is no published long-term log R&#x27;HK time series for 40 Eri A comparable to the Mt. Wilson coverage of α Cen A or HK Cet B, so the chromospheric cycle (if any) is unconstrained; the 42-day rotation period in Burrows 2024 is observed in a 16-year multi-instrument RV baseline but no decadal cycle was characterized.",
  "p_83":"The X-ray luminosity from ROSAT all-sky survey points is roughly log L_X = 27.5 cgs (0.5–2 keV); there is no XMM-Newton or Chandra long-term monitoring campaign published for 40 Eri A. The integrated XUV flux at the habitable zone is therefore set by typical K0.5 V quiet-state scaling — slightly higher in fractional Lbol than a solar-twin G dwarf because K dwarfs maintain stronger chromospheric heating per unit photospheric flux. Hydrodynamic atmospheric escape for any hypothetical inner planet (if one existed; HD 26965 b does not) would have been moderate-to-strong because the K-dwarf XUV plateau is longer than the G-dwarf equivalent during the early saturated phase.",
  "p_84":"The activity-induced RV signature that produced the spurious Vulcan detection is itself an atmospheric phenomenon: Burrows 2024 traces it to a combination of starspot modulation and convective-blueshift suppression cycling at the 42-day rotation period. The depth- dependent line-by-line correlations indicate that the dominant contribution comes from suppression of granular convective blueshift in active regions, not from pure photometric spot modulation. This is the same mechanism that produces the well-known &quot;granulation-driven RV jitter&quot; in solar-type stars, scaled to K-dwarf sub-photosphere convection depth.",
  "h2_85":"Rotation &amp; spin synthesis",
  "p_86":"The Burrows et al. 2024 rotation period of ∼42 days is the canonical modern value, derived from NEID line-by-line activity correlations across a 16-year multi-instrument RV baseline (HIRES, PFS, CHIRON, HARPS, NEID). The paper explicitly does not quote a formal uncertainty on P_rot — the wording is &quot;rotationally modulated activity signal at a period of ∼42 days&quot; — so the cfg adopts 42 d as a point value with confidence=medium.",
  "p_87":"<b>Pre-Burrows rotation literature is non-uniform.</b> Saar &amp; Osten 1997 ROSAT-correlated coronal activity estimate gives 37.10 d. Diaz et al. 2018 HARPS S-index periodogram peaks at &quot;an emerging peak at 38 days, very close to the [42-d RV] signal we detect.&quot; Mount Wilson Ca II HK monitoring (Baliunas et al. 1995 era) reports power near 42.3 d after subtracting longer magnetic-cycle terms. The factor-of-1.1 spread between 37 d and 42 d may reflect differential rotation (latitude-dependent rotation rate, with the NEID activity signal sampling a different active-latitude band than the older datasets), but no published differential-rotation measurement settles this for 40 Eri A.",
  "p_88":"For cfg purposes, 42 d is the recent multi-instrument anchor and the same period that drove the Vulcan-refutation result. Confidence is medium because of the absent formal σ and the 37–42 d pre-Burrows spread.",
  "p_89":"<b>Differential rotation and inclination.</b> Neither is directly measured for 40 Eri A. Differential rotation is expected to be weaker than the Sun&#x27;s (K-dwarf trend: shallower convective envelope → less differential shear), but the literature lacks a Doppler-imaging campaign comparable to those for active K dwarfs like ε Eri. Rotation-axis inclination is unconstrained — for visual rendering NearStars adopts an axis tilted ~30° to the line of sight from the ecliptic, consistent with random orientation.",
  "p_90":"<b>Spin–down history under K-dwarf braking.</b> At P_rot = 42 d the gyrochronological age estimate (Barnes 2007 + Mamajek &amp; Hillenbrand 2008 calibration) is roughly 4–6 Gyr for B−V ≈ 0.82 — broadly consistent with the Ma 2018 K-dwarf isochrone reading of 6.9 ± 4.7 Gyr but inconsistent with the Bond 2017 IFMR ~1.8 Gyr. This is a secondary face of the same age divergence flagged in the Decisions table. The gyrochronology calibration is itself uncertain at these old ages because K-dwarf spin-down stalls partially at long P_rot (van Saders et al. 2016 weakened-braking hypothesis), so the gyrochronological age has its own systematic floor.",
  "h2_91":"Visual styling",
  "p_92":"In the NearStars renderer, 40 Eridani A is portrayed as a warm-cream K0.5 V star — visually distinguishable from a solar-type analog by the slightly cooler orange-cream tint encoded as <span class=\"hex-chip\" style=\"background:#ffd5a8\"></span><code>#ffd5a8</code> (in contrast to the Sun&#x27;s <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> or the warm-cream α Cen A <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code>). The choice is a tie-break against a strict K-dwarf blackbody color: at 5143 K the blackbody chromaticity is closer to <span class=\"hex-chip\" style=\"background:#ffe2b6\"></span><code>#ffe2b6</code>, but the cfg pick pushes slightly toward orange for visual distinction in the in-game star palette, where K dwarfs are the dominant local-volume population and a single shared &quot;K-dwarf warm-cream&quot; risks visual homogeneity.",
  "p_93":"At 5.01 pc viewed from Earth, the apparent magnitude V = 4.43 places 40 Eridani A as a naked-eye star in Eridanus (traditional name Keid, from Arabic <i>al-qaid</i> &quot;the broken shell&quot;). It is located on the constellation&#x27;s southern outline, about 16° southwest of Rigel.",
  "p_94":"The companion B-C pair, viewed from any hypothetical close-in planet around A, would appear as an unresolved double point of light at angular separation ~83″ — easily a single naked-eye object at A&#x27;s habitable zone (the angular separation is roughly 30 arc-minutes at the 0.65 AU HZ inner edge, comparable to the full Moon seen from Earth). The B-C pair itself is a 230-yr mutually orbiting K-dwarf-mass WD + M-dwarf binary; at periastron the B-C separation drops to ~26 AU and B&#x27;s reflected brightness from C&#x27;s emission becomes detectable, but at the ~8000 yr A-BC orbit timescale the separation is geometrically fixed for the cfg in-game epoch.",
  "p_95":"<b>HD 26965 b is included as a documented divergence.</b> Although the Vulcan candidate was refuted (Burrows 2024, below), the project elects to retain it at its pre-retraction Ma 2018 parameters (M sin i ≈ 8.5 M⊕, P ≈ 42.2 d, a ≈ 0.224 AU) for its cultural weight (Star Trek&#x27;s Vulcan; Erid in <i>Project Hail Mary</i>). The canonical reading is no planet — the 42-day signal is stellar rotation — so the Refutation section below documents the detection and its refutation, and the body carries a refuted disposition. The cfg renders the stellar triple plus this culturally-anchored, refutation-flagged body.",
  "h2_96":"Canonical alternatives",
  "p_97":"The age is the single documented divergence in this synthesis. The cfg adopts Bond 2017 ~1.8 Gyr from the WD-progenitor IFMR; the canonical reading of the K-dwarf-only literature would adopt the Ma 2018 K-dwarf isochrone instead.",
  "th_98":"Field",
  "th_99":"cfg value (Bond 2017 IFMR)",
  "th_100":"Canonical alternative (Ma 2018 K-dwarf isochrone)",
  "th_101":"Why cfg picks differently",
  "td_102":"<code>age_gyr</code>",
  "td_103":"~1.8 (system-coeval from 40 Eri B WD progenitor analysis)",
  "td_104":"6.9 ± 4.7 (K-dwarf SED + PARSEC isochrone)",
  "td_105":"The IFMR-derived system-coeval value anchors the age to a physical end-point (WD progenitor lifetime + cooling track), independent of K-dwarf isochrone systematics. The Ma 2018 alternative has 60+% relative uncertainty along a K-dwarf isochrone branch where age is poorly constrained on Gyr timescales. Bond 2017 §6.2 explicitly notes &quot;earlier concerns about an excessive age...appear to be resolved&quot; with the revised WD mass. Gyrochronological cross-check (P_rot 42 d → 4–6 Gyr via Barnes 2007) sits closer to Ma 2018 but is subject to van Saders 2016 weakened-braking systematics at old ages, so does not settle the tension. cfg follows the more physically anchored Bond reading.",
  "p_106":"The Ma 2018 isochrone age is retained in the Phase 2 DB as <code>recommended:true</code> within <code>age_measurements</code> because it is the only direct stellar-age measurement of A itself; Bond 2017 is recorded as <code>recommended:false</code> with method <code>isochrone</code> (treating the IFMR progenitor lifetime as an isochrone-equivalent constraint). The divergence between the Phase 2 recommended pick and the Phase 3 cfg pick is the rationale for this <code>## Canonical alternatives</code> section.",
  "h2_107":"Refuted planet — HD 26965 b (&quot;Vulcan&quot;)",
  "p_108":"40 Eridani A is famous in popular culture as the host star of Mr. Spock&#x27;s homeworld Vulcan in the Star Trek universe — an identification confirmed by a 1991 letter from Gene Roddenberry and Sallie Baliunas. The Ma et al. 2018 announcement of an RV-detected super-Earth candidate at P = 42.4 d, M sin i ≈ 8.5 M⊕, a ≈ 0.224 AU was therefore one of the most culturally celebrated exoplanet detections of the 2010s.",
  "p_109":"<b>HD 26965 b is now classified as Refuted (Burrows et al. 2024, AJ 167, 243).</b> The Burrows 2024 NEID precision-Doppler campaign, combined with re-analysis of 16 years of HIRES + PFS + CHIRON + HARPS data, demonstrated that the 42-day RV signal is the same signal as the star&#x27;s rotation period (∼42 d). The three lines of evidence are: (1) cross-correlation of bulk RV with classical activity indicators shows a multi-day lag consistent with rotational modulation, not Keplerian orbit; (2) line-by-line RV analysis shows depth-dependent correlations indicative of convective-blueshift suppression varying with active-region visibility; (3) linear detrending against the activity-indicator time series removes most of the RV variance. The combined evidence is consistent with &quot;an RV signature dominated by a rotationally modulated activity signal at a period of ∼42 days. We hypothesize that this activity signature is due to a combination of spots and convective blueshift suppression&quot; (Burrows 2024 abstract).",
  "p_110":"<b>Disposition: not in <code>db/planets_curated.json</code>.</b> No KSP planet is built from the Ma 2018 candidate; the NASA Exoplanet Archive <code>ps</code> table also returns zero rows for HD 26965 since the Burrows-driven removal. No 2025 or 2026 follow-up paper has proposed a replacement candidate; lit-search &quot;HD 26965 planet 2024-2026&quot; surfaces only the Burrows refutation and downstream news summaries.",
  "p_111":"This refutation note is preserved in the Phase 3 markdown rather than as a separate <code>docs/phase3/40-eridani-a-b.md</code> file because (a) no curated planet exists for A and (b) the cultural cross-reference fits naturally in the host-star synthesis. The closest precedent is the tau Cet e refuted Phase 3 markdown (<code>tau-cet-e.md</code>), which preserves the original-detection record alongside the refutation; 40 Eri A b is held to a similar standard but at section-level rather than file-level since there is no historical Phase 3 for the Ma 2018 picture to preserve.",
  "h2_112":"Bibliography",
  "h3_113":"Read (drove Decisions above)",
  "li_114":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II. Main-Sequence K- and M-Stars</i>, ApJ 757, 112 (<code>2012ApJ...757..112B</code>, doi:10.1088/0004-637X/757/2/112). CHARA Classic H-band interferometric angular diameters for a sample including 40 Eri A as GJ 166 A: θ_LD = 1.504 ± 0.006 mas (Table 3); R = 0.8061 ± 0.0036 R☉, Teff = 5143 ± 14 K, L = 0.4078 ± 0.0032 L☉ (Table 6). Recommended Phase 2 primary for R/Teff/L because of the tighter fractional uncertainty among the two interferometric measurements.",
  "li_115":"<b>Rains A. D. et al. 2020</b> — <i>Precision angular diameters for 16 southern stars with VLTI/PIONIER</i>, MNRAS 493, 2377 (<code>2020MNRAS.493.2377R</code>, doi:10.1093/mnras/staa282, arXiv:2004.02343). VLTI/PIONIER four-telescope H-band interferometry; 40 Eri A is star #7 of 16 in Table 1. Independent cross-check: θ_LD = 1.486 ± 0.012 mas, R = 0.804 ± 0.006 R☉, Teff = 5126 ± 30 K, L = 0.40 ± 0.01 L☉ (Table 4). Agrees with Boyajian 2012 within 1σ on all four quantities.",
  "li_116":"<b>Ma B. et al. 2018</b> — <i>Very low-mass stellar and substellar companions to solar-like stars from MARVELS VI. A giant planet and a brown dwarf candidate in a close binary system HD 87646</i> is the same authors&#x27; related work; the relevant paper for 40 Eri A is <b>Ma et al. 2018 MNRAS 480, 2411</b> (<code>2018MNRAS.480.2411M</code>, doi:10.1093/mnras/sty1933) reporting the Dharma Planet Survey RV detection of HD 26965 b. Mass 0.78 ± 0.08 M☉, age 6.9 ± 4.7 Gyr from PARSEC isochrone + multi-band SED, Teff 5072 ± 53 K, [Fe/H] −0.42 ± 0.04 (Table 2). Phase 2 anchor for mass and (alternative) age and metallicity; also the source of the now-refuted planet candidate.",
  "li_117":"<b>Bond H. E. et al. 2017</b> — <i>Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, doi:10.3847/1538-4357/aa8a63, arXiv:1709.00478). HST FGS astrometric mass of 40 Eri B 0.573 ± 0.018 M☉; §6.2 derives system-coeval total age ~1.8 Gyr from IFMR (initial mass ~1.8 M☉ → MS lifetime 1.7 Gyr + cooling age 122 Myr). Phase 3 cfg adopts this age over Ma 2018 — see <code>## Canonical alternatives</code>.",
  "li_118":"<b>Burrows A. et al. 2024</b> — <i>The Death of Vulcan: NEID Reveals That the Planet Candidate Orbiting HD 26965 Is Stellar Activity</i>, AJ 167, 243 (<code>2024AJ....167..243B</code>, doi:10.3847/1538-3881/ad34d5, arXiv:2404.17494). NEID line-by-line RV + activity-indicator correlations refute the Ma 2018 Vulcan candidate. Stellar rotation period reported as &quot;∼42 days&quot; with no formal σ. Sources the Decisions row for <code>rotation_period_days</code> and the Refuted-planet section.",
  "li_119":"<b>Diaz M. R. et al. 2018</b> — <i>The Test Case of HD 26965: Difficulties Disentangling Weak Doppler Signals from Stellar Activity</i>, AJ 155, 126 (<code>2018AJ....155..126D</code>, doi:10.3847/1538-3881/aaa896, arXiv:1801.03970). Pre-Burrows examination of the Vulcan signal with HARPS data; foreshadows the activity-vs-planet ambiguity. Phase 2 alternative for mass (0.76 ± 0.03 M☉), Teff (5151 ± 55 K), [Fe/H] (−0.29 ± 0.12), age (9.23 ± 4.84 Gyr) from SPECIES atmospheric pipeline (Table 1). Notes ~37 d Saar &amp; Osten 1997 P_rot and a ~38 d HARPS S-index peak.",
  "li_120":"<b>Jenkins J. S. et al. 2011</b> — <i>Chromospheric activities and kinematics for solar type dwarfs and subgiants: analysis of the activity distribution and the AVR</i>, A&amp;A 531, A8 (<code>2011A&amp;A...531A...8J</code>, doi:10.1051/0004-6361/201016333). HARPS Ca II H&amp;K survey of 890 southern FGK stars. Source for the Phase 2 log R&#x27;HK = −4.99 recommended value (caveat: the row-level CDS table entry was not directly fetched in this session, see Open items).",
  "h3_121":"Read (context for the K-dwarf parameter set + binary architecture)",
  "li_122":"<b>Pourbaix D. &amp; Boffin H. M. J. 2016</b> — α Centauri AB visual-spectroscopic binary mass; cited because the same technique was used historically for 40 Eri AB but with much longer-period unfittable mutual orbit (40 Eri A-BC is ~8000 yr, unresolved in Keplerian terms).",
  "li_123":"<b>Mason B. D., Hartkopf W. I. &amp; Miles K. N. 2017</b> — <i>Binary Star Orbits. V. The Nearby White Dwarf-Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, doi:10.3847/1538-3881/aa803e). Definitive grade-1 orbit for the inner B-C pair: P = 230.30 ± 0.68 yr, e = 0.4294 ± 0.0027. Phase 2 anchor for the B-C orbit in <code>db/binary_orbits.json</code>.",
  "li_124":"<b>Henry T. J. et al. 1996</b> — <i>A Survey of Ca II H and K Chromospheric Emission in Southern Solar-Type Stars</i>, AJ 111, 439 (<code>1996AJ....111..439H</code>, doi:10.1086/117796). Earlier chromospheric activity survey including 40 Eri A. Phase 2 alternative log R&#x27;HK = −4.94. Direct CDS row not table-verified in this session; bibcode/title confirmed.",
  "li_125":"<b>Bensby T., Feltzing S. et al. 2014</b> — <i>Exploring the Milky Way stellar disk</i>, A&amp;A 562, A71 (<code>2014A&amp;A...562A..71B</code>, doi:10.1051/0004-6361/201322631). Thin/thick-disk chemical abundance survey of 714 F/G dwarfs. Phase 2 alternative [Fe/H] = −0.31 ± 0.10 for 40 Eri A. The K0.5 V spectral type is at the sample boundary; bibcode/title confirmed but row-level Table A1 not directly fetched.",
  "li_126":"<b>Tokovinin A. 2018</b> — <i>MSC — Catalogue of physical multiple stars</i> (updated 2018 release). 40 Eri A-BC outer orbit listed with no Keplerian solution (semi-major axis ~ 400 AU projected, period ~ 8000 yr). Anchors the cfg decision to treat A as an independent stellar body rather than as a resolved binary partner.",
  "li_127":"<b>Saar S. H. &amp; Osten R. A. 1997</b> — <i>Lithium, X-ray activity, and rotation in an HR diagram of solar-type field stars</i>, MNRAS 284, 803. Reports 40 Eri A P_rot ≈ 37.10 d from ROSAT-correlated coronal activity. Cited as pre-Burrows rotation alternative; see Open items.",
  "h3_128":"Read (instrument-only / methodological references)",
  "li_129":"<b>Torres G., Andersen J. &amp; Giménez A. 2010</b> — Mass-radius empirical relations underlying the Ma 2018 mass calculation.",
  "li_130":"<b>Bressan A. et al. 2012</b> + <b>PARSEC tracks</b> — Stellar evolutionary tracks underlying the Ma 2018 isochrone age calculation.",
  "li_131":"<b>Soto M. G. &amp; Jenkins J. S. 2018</b> — SPECIES atmospheric pipeline used by Diaz 2018 for parameter derivation.",
  "h3_132":"Not read — superseded or low-priority",
  "p_133":"Pre-2010 K-dwarf isochrone surveys (Valenti &amp; Fischer 2005 SPOCS, Holmberg et al. 2009 Geneva-Copenhagen); generic nearest-50-pc K-dwarf rotation surveys without 40 Eri A entries; Mt. Wilson HK plate-archive papers superseded by the Burrows 2024 NEID baseline. SETI / exoplanet-search proposal papers targeting 40 Eri A pre-Burrows (Ma 2018 follow-up proposals). These are filtered to <code>status: skipped</code> in the bib YAML when that is built.",
  "h2_134":"Open items for follow-up",
  "li_135":"<b>Jenkins 2011 + Henry 1996 row-level log R&#x27;HK verification.</b> The chromospheric activity values −4.99 (Jenkins) and −4.94 (Henry) were carried over from the 2026-05-27 prep notes; in this session the CDS table row for HD 26965 was not directly fetched. Re-verify against the CDS Table 4 of Jenkins 2011 (full table) and the equivalent in Henry 1996 in a future curation pass — both are widely quoted in downstream papers and the values are likely correct but should be paper-Table confirmed.",
  "li_136":"<b>Bensby 2014 row-level [Fe/H] verification.</b> Same caveat as above: the value −0.31 ± 0.10 is from the prep notes; the Table A1 row for HD 26965 was not directly fetched in this session.",
  "li_137":"<b>Burrows 2024 rotation-period uncertainty.</b> Paper reports &quot;∼42 days&quot; without a formal σ. The pre-Burrows 37-d Saar &amp; Osten reading and 38-d Diaz 2018 HARPS S-index reading are inconsistent with 42 d at face value. A Gaussian-process RV + light-curve joint analysis (per the Aigrain 2015 framework, or comparable to the methodology of Damasso 2020 for Proxima) would settle whether the 42-d signal is genuinely the surface rotation period or a longer-lived active-band signature with an underlying differential-rotation rate.",
  "li_138":"<b>Age divergence resolution by asteroseismology.</b> A fundamental cross-check of the Ma 2018 ~7 Gyr vs Bond 2017 ~1.8 Gyr ages would require asteroseismic detection of p-mode oscillations on 40 Eri A. The K0.5 V spectral type puts ν_max near 4000 µHz which is at the edge of feasibility for current precision-RV time-series capabilities, but a dedicated NEID or ESPRESSO multi-night campaign comparable to Bouchy &amp; Carrier 2001 / de Meulenaer 2010 (α Cen A) would be decisive.",
  "li_139":"<b>40 Eri A x-ray cycle characterization.</b> No long-baseline XMM-Newton or Chandra monitoring campaign published for A; the activity log R&#x27;HK = −4.99 and P_rot 42 d imply a Sun-like cycle is plausible but unconstrained. A dedicated cycle search (the same template as Robrade 2016 for α Cen A) would be cfg-decisive for activity-cycle visual rendering.",
  "li_140":"<b>A-BC outer orbit fitting.</b> The ~8000 yr orbit is currently unfitted (Tokovinin MSC 2018). Decades-long Gaia astrometric monitoring should eventually tighten the A-BC parameters; if fitted, this would change <code>db/binary_orbits.json</code> to include an A-BC entry and the Phase 3 visual styling section&#x27;s &quot;B-C pair as single point ~83″ away&quot; claim becomes time-variable.",
  "h2_141":"Related",
  "li_142":"<a href=\"40-eridani-b.md\">40-eridani-b</a> — DA2.9 white-dwarf companion; Bond 2017 IFMR is the anchor for the system age divergence documented above",
  "li_143":"<a href=\"40-eridani-c.md\">40-eridani-c</a> — M4.5 Ve flare star (DY Eri); paired with B on a 230-yr orbit",

  ko: {
  "p_1":"40 에리다니 A (HD 26965, HR 1325, GJ 166 A, 케이드)는 5.01 pc 거리에 위치한 K0.5 V 왜성입니다. 40 에리다니 삼중성계의 가장 밝은 성분으로, Ma 2018 이 발견했다고 발표했던 가상의 행성 &quot;벌컨&quot;이 Burrows 등 2024 에 의해 활성도 잡음으로 반박된 별이기도 합니다. 같은 계에는 DA 백색 왜성 40 에리다니 B (<code>docs/phase3/40-eridani-b.md</code>)와 M4.5 Ve 플레어 스타 40 에리다니 C / DY Eri (<code>docs/phase3/40-eridani-c.md</code>)가 포함되며, B-C 쌍은 A 로부터 약 83″ (투영 거리 약 400 AU) 떨어진 위치에서 중력적으로 묶여 있고 외측 궤도는 Tokovinin MSC 2018 기준 약 8000 년으로 추정되어 케플러 궤도 적합이 불가능한 상태입니다.",
  "p_2":"별의 기본 항성 파라미터는 두 개의 독립적인 간섭계 측정 결과가 1σ 수준에서 일치할 만큼 매우 잘 정해져 있습니다. Boyajian 등 2012 의 CHARA Classic H 밴드 관측은 θ_LD = 1.504 ± 0.006 mas, R = 0.8061 ± 0.0036 R☉, Teff = 5143 ± 14 K, L = 0.4078 ± 0.0032 L☉ 값을 제시합니다 (Table 6, 샘플에서 GJ 166 A 로 식별). Rains 등 2020 은 VLTI/PIONIER 4 망원경 결합으로 θ_LD = 1.486 ± 0.012 mas → R = 0.804 ± 0.006 R☉, Teff = 5126 ± 30 K, L = 0.40 ± 0.01 L☉ 을 독립적으로 측정합니다 (Table 4. 40 Eri A 는 표 1 의 16 개 중 7 번째). 두 측정값 모두 Phase 2 DB 에 들어가 있으며, Boyajian 2012 가 fractional uncertainty 가 더 작아서 (두 측정 모두 interferometry 인 동률 상황에서의 tiebreak) 권장 primary 가 됩니다.",
  "p_3":"질량의 anchor 는 Ma 등 2018 의 M = 0.78 ± 0.08 M☉ 입니다 (Table 2, Torres 등 2010 의 M-R 관계 + 분광 Teff/[Fe/H] 조합). 동일 논문이 지금은 반박된 &quot;벌컨&quot; 후보를 발표했던 paper 입니다. Diaz 등 2018 의 SPECIES isochrone 은 독립적으로 0.76 ± 0.03 M☉ 을 산출해 1σ 안에서 일치합니다. A-BC 외측 궤도가 너무 길어 케플러 적합이 안 되기 때문에 (Tokovinin MSC 2018 이 &quot;Keplerian solution 없음&quot; 으로 분류) 동역학적 질량은 존재하지 않습니다.",
  "p_4":"<b>Age 는 이번 합성의 documented divergence 입니다.</b> Ma 등 2018 의 PARSEC isochrone fitting 은 6.9 ± 4.7 Gyr 을 제시합니다. K 왜성 isochrone 의 전형적인 결과이며 Gyr 스케일에서의 K 왜성 나이 부정확성이 그대로 드러나는 값입니다 (SPECIES Diaz 2018 은 같은 평탄한 χ² 바닥 위에서 9.23 ± 4.84 Gyr 을 보고합니다). Bond 등 2017 §6.2 는 백색왜성의 initial-final mass relation 을 이용해 시스템 공통 나이를 <b>~1.8 Gyr</b> 로 유도합니다. 40 Eri B 의 M_final = 0.573 M☉ 이 ~1.8 M☉ 의 progenitor 를 시사하고, 주계열 수명 ~1.7 Gyr + 냉각 나이 122 Myr 이 그 합산값입니다. Bond 는 &quot;새 질량 이후 excessive age 우려는 해소된 것으로 보인다&quot; 고 명시합니다. 즉 K 왜성 isochrone 의 옛 노년 나이는 역사적으로 유효했지만 WD progenitor 분석은 그 값을 지지하지 않습니다. 이번 Phase 3 합성은 cfg age 로 ~1.8 Gyr 을 채택합니다. IFMR 기반 시스템 공통 나이가 60+% 상대 불확실도를 가진 K 왜성 isochrone 단일값보다 물리적으로 더 강하게 제약되기 때문입니다. K 왜성 isochrone alternative 는 <code>## Canonical alternatives</code> 에 보존합니다.",
  "p_5":"금속도는 다소 sub-solar 이며 [Fe/H] = −0.29 ± 0.12 입니다 (Diaz 2018 SPECIES; Bensby 2014 thin/thick-disk 서베이의 −0.31 ± 0.10 이 1σ 안; Ma 2018 의 −0.42 ± 0.04 가 marginally 더 낮음). Burrows 등 2024 가 NEID line-by-line 활성도 분석에서 도출한 자전 주기는 ~42 일 입니다 (paper 는 formal uncertainty 없이 &quot;∼42 days&quot; 라고만 명시) — 이 자전 변조가 바로 가짜 &quot;벌컨&quot; 42 일 RV 신호를 만들어낸 원흉입니다. Burrows 이전 문헌은 더 짧은 자전 주기를 제시합니다 (Saar &amp; Osten 1997 의 Mt. Wilson HK 기반 ~37–38 일; Diaz 2018 의 HARPS S-index ~38 일). 그 차이는 현재 문헌상 미해결입니다. 색층권 활성도 log R&#x27;HK = −4.99 (Jenkins 2011) 는 40 Eri A 를 태양 평균보다 약간 더 활동적인 조용한 K 왜성으로 분류합니다. X-ray 모니터링은 빈약합니다. ROSAT 전천 서베이의 baseline 은 0.5–2 keV 대역에서 log L_X ≈ 27.5 cgs 입니다.",
  "p_6":"<b>NearStars 의 시나리오 선택: 큐레이션된 행성이 없는 조용하고 약간 나이 든 K0.5 V 별로, ~83″ 떨어진 B-C 쌍이 한 점으로 보이는 원격 binary 시점에서 렌더링합니다.</b> 14 개의 canonical-aligned cfg 픽은 모두 paper-verified 파라미터 셋을 그대로 따릅니다. Age 는 documented divergence 입니다 (Bond 2017 IFMR 가 Ma 2018 K 왜성 isochrone 보다 우선). 한 개의 tie-break 은 K0.5 V SED 의 시각 표면 색조를 정합니다.",

  "h2_76":"Surface synthesis",
  "p_77":"40 Eridani A 의 광구는 전형적인 K0.5 V 왜성의 모습을 보여줍니다. 태양의 G2 V 보다 약간 더 차갑고, 중간형 K 왜성 특유의 크림-오렌지 조명이 두드러집니다. Teff = 5143 K 에서 SED 피크는 녹황색 ~563 nm 이며, 태양의 ~501 nm 피크에서 ~600 K 더 차가운 광구 때문에 이동한 값입니다. 색도 좌표상 따뜻한 오렌지 색조에 해당해서, 0.65 AU 의 거주 가능 영역 내측 가장자리 (지구와 같은 조도) 에 가상의 관측자가 있다면 약간 호박색 &quot;태양&quot; 으로 보일 것입니다.",
  "p_78":"CHARA Classic 간섭계 측정값 (Boyajian 2012) 은 각지름을 0.4% 정밀도로 정합니다. 문헌 안에서 가장 잘 정해진 K 왜성 직경 중 하나입니다. 독립적인 VLTI/PIONIER 결과 (Rains 2020) 도 θ_LD 와 유도 Teff 모두 1σ 안에서 일치합니다. 두 간섭계 어레이는 beam combiner 도, 통과대역도 다르고 (CHARA H 밴드. PIONIER 도 H 밴드 지만 4 망원경), limb-darkening prescription 도 다릅니다. 그래서 이 일치는 fundamental 파라미터 셋에 대한 강력한 validation 입니다.",
  "p_79":"흑점 커버리지는 중간 수준입니다. log R&#x27;HK = −4.99 (Jenkins 2011) 는 40 Eri A 를 중간 활성도 K 왜성 기준으로는 조용한 별로 분류 하지만, 태양 quiet-cycle 평균값인 log R&#x27;HK ≈ −4.95 보다는 약간 더 활성도가 높습니다. 42 일 자전 주기 (Burrows 2024) 는 이 Teff 에서의 Noyes 1984 대류 turnover ~40 d 을 적용하면 Rossby 수 Ro ≈ 1.0 입니다. 즉 40 Eri A 는 unsaturated rotation-activity 영역에 속합니다. 활성 영역은 자전 위상에 따라 가시 반구에 분포 하며, 그 결과 수 m/s 의 RV jitter 가 발생해 42 일 벌컨 신호로 오해되었습니다.",
  "p_80":"약간 sub-solar 한 금속도 ([Fe/H] = −0.29) 는 게임 내 일반 조명 해상도에서 가시 색상 변화로 잡히지 않지만, optical blue 영역에서 몇 percent 수준의 SED 차이를 만듭니다. 즉 solar-metallicity K0.5 V 보다 미세하게 더 푸른 continuum 입니다. 그래뉼레이션 패턴은 K 왜성 특유의 작은 대류 셀 구조를 가집니다. 더 차가운 광구의 얕은 대류층과 일관적입니다.",
  "h2_81":"Atmosphere synthesis",
  "p_82":"40 Eri A 의 대기는 chromosphere–transition-region–corona 구조를 갖춘 적당히 조용한 K 왜성 대기입니다. 색층권 Ca II H&amp;K 방출은 log R&#x27;HK = −4.99 (Jenkins 2011) 에 해당하며, unsaturated rotation-activity 영역에서의 K 왜성 평균값과 일관적입니다. α Cen A 나 HK Cet B 의 Mt. Wilson 커버리지에 비할 만한 장기 log R&#x27;HK 시계열이 40 Eri A 에는 출간되어 있지 않습니다. 그래서 색층권 사이클이 (있다면) 미구속 상태입니다. Burrows 2024 의 42 일 자전 주기는 16 년 다기기 RV baseline 안에서 관측되었지만 십년 단위 사이클은 특성화되지 않았습니다.",
  "p_83":"ROSAT 전천 서베이 포인트에서 도출한 X-ray 광도는 대략 log L_X = 27.5 cgs (0.5–2 keV) 입니다. 40 Eri A 를 대상으로 한 XMM-Newton 이나 Chandra 장기 모니터링 캠페인 출간본은 없습니다. 거주 가능 영역에서의 통합 XUV 플럭스는 따라서 전형적인 K0.5 V quiet-state 스케일링으로 결정됩니다. solar-twin G 왜성보다 fractional Lbol 이 약간 더 높습니다. K 왜성이 광구 flux 단위당 더 강한 색층권 가열을 유지하기 때문입니다. 가상의 내측 행성에 대한 hydrodynamic 대기 손실은 (그런 행성이 존재했다면. HD 26965 b 는 존재 안 함) 중강도일 가능성이 큽니다. K 왜성 XUV 플라토가 G 왜성 대응 시기 보다 더 길게 saturated 상태에 머무르기 때문입니다.",
  "p_84":"벌컨 가짜 검출을 만들어낸 활성도 기반 RV 신호 자체가 대기 현상 입니다. Burrows 2024 는 그 기원을 starspot 변조와 대류 blueshift 억제가 42 일 자전 주기로 함께 사이클링하는 조합으로 규명합니다. depth-dependent line-by-line 상관관계는 지배적인 기여가 순수한 측광 spot 변조가 아니라 활성 영역의 granular convective blueshift 억제에서 온다는 것을 시사합니다. 이는 G/K 태양형 별에서 잘 알려진 &quot;granulation-driven RV jitter&quot; 와 동일한 메커니즘이며, K 왜성 sub-photosphere 대류 깊이로 스케일된 버전입니다.",
  "h2_85":"Rotation &amp; spin synthesis",
  "p_86":"Burrows 등 2024 의 자전 주기 ~42 일은 현대의 canonical 값입니다. NEID line-by-line 활성도 상관관계를 16 년 다기기 RV baseline (HIRES, PFS, CHIRON, HARPS, NEID) 에서 분석해 도출되었습니다. Paper 는 P_rot 에 대한 formal uncertainty 를 명시적으로 quote 하지 않습니다. 표현은 &quot;rotationally modulated activity signal at a period of ∼42 days&quot; 이며, 따라서 cfg 는 confidence=medium 으로 42 일 point value 를 채택합니다.",
  "p_87":"<b>Burrows 이전 자전 문헌은 일관되지 않습니다.</b> Saar &amp; Osten 1997 의 ROSAT 상관 코로나 활성도 추정은 37.10 일을 제시합니다. Diaz 등 2018 의 HARPS S-index 페리어도그램은 &quot;[42 일 RV 신호와 매우 가까운] 38 일에서 emerging peak&quot; 를 봅니다. Mt. Wilson Ca II HK 모니터링 (Baliunas 등 1995 시대) 은 더 긴 자기 사이클 항을 빼고 난 후 42.3 일 부근에서 power 를 보고합니다. 37 일과 42 일 사이의 factor-of-1.1 spread 는 차등 자전을 반영할 수 있습니다 (위도별 자전 속도. NEID 활성도 신호가 옛 데이터셋과 다른 활성 위도대를 샘플링한다는 시나리오). 그러나 40 Eri A 에 대한 출간된 차등 자전 측정값은 그 긴장을 매듭짓지 못합니다.",
  "p_88":"cfg 목적에서는 42 일이 최근 다기기 anchor 이자 벌컨 반박 결과를 이끌어낸 동일한 주기입니다. Confidence 는 formal σ 부재와 37–42 일 pre-Burrows spread 때문에 medium 입니다.",
  "p_89":"<b>차등 자전과 inclination.</b> 어느 쪽도 40 Eri A 에 대해 직접 측정되지 않았습니다. 차등 자전은 태양보다 약하게 예상됩니다 (K 왜성 경향. 얕은 대류층 → 약한 차등 shear). 그러나 문헌은 ε Eri 같은 활성 K 왜성에 대한 Doppler-imaging 캠페인에 견줄 만한 40 Eri A 캠페인이 부재합니다. 자전축 inclination 도 미구속이라, 시각적 렌더링에서 NearStars 는 황도면 기준 약 30° 기울어진 축을 채택합니다. 무작위 방향 가정과 일관적입니다.",
  "p_90":"<b>K 왜성 braking 하에서의 spin-down 역사.</b> P_rot = 42 일에서 gyrochronological 나이 추정 (Barnes 2007 + Mamajek &amp; Hillenbrand 2008 보정) 은 B−V ≈ 0.82 에 대해 대략 4–6 Gyr 입니다. Ma 2018 K 왜성 isochrone 의 6.9 ± 4.7 Gyr 과는 대체로 일관되지만 Bond 2017 IFMR 의 ~1.8 Gyr 과는 일치하지 않습니다. 이는 Decisions 테이블에서 flag 한 동일한 age divergence 의 부산물입니다. gyrochronology 보정 자체가 이 노년 영역에서 불확실합니다. K 왜성 spin-down 이 긴 P_rot 에서 부분적으로 stall 하기 때문입니다 (van Saders 등 2016 의 약화된 braking 가설). 따라서 gyrochronological 나이는 자체 systematic floor 를 가지고 긴장을 해결하지 못합니다.",
  "h2_91":"Visual styling",
  "p_92":"NearStars 렌더러는 40 Eridani A 를 따뜻한 크림빛 K0.5 V 별로 그립니다. 태양형 analog 와 시각적으로 구분이 되도록 약간 더 차분한 톤의 오렌지-크림으로 인코딩합니다 (<span class=\"hex-chip\" style=\"background:#ffd5a8\"></span><code>#ffd5a8</code>. 태양의 <span class=\"hex-chip\" style=\"background:#fff8f0\"></span><code>#fff8f0</code> 이나 따뜻한 크림 α Cen A 의 <span class=\"hex-chip\" style=\"background:#fff4e8\"></span><code>#fff4e8</code> 와 대비). 이 선택은 엄밀한 K 왜성 흑체 색에 대한 tie-break 입니다. 5143 K 의 흑체 chromaticity 는 <span class=\"hex-chip\" style=\"background:#ffe2b6\"></span><code>#ffe2b6</code> 에 더 가깝지만, cfg 픽은 게임 내 별 팔레트의 시각 변별력을 위해 살짝 더 오렌지 쪽으로 밀어 넣습니다. K 왜성은 local-volume 인구의 dominant 부류이고, 단일 &quot;K 왜성 따뜻한 크림&quot; 톤으로 통일하면 시각적 단조로움이 생길 위험이 있어서입니다.",
  "p_93":"5.01 pc 거리에서 본 겉보기 등급 V = 4.43 은 40 Eridani A 를 에리다누스 자리의 육안 별로 만듭니다 (전통 이름 케이드. 아랍어 <i>al-qaid</i> &quot;깨진 껍데기&quot; 에서 유래). 별자리 남쪽 윤곽에 있으며, 리겔에서 남서쪽으로 약 16° 떨어진 위치에 자리합니다.",
  "p_94":"A 주위의 가상의 가까운 행성에서 보면, 동반성 B-C 쌍은 각분리 ~83″ 의 unresolved 이중 점광원으로 나타납니다. A 의 거주 가능 영역에서는 쉽게 하나의 육안 천체로 보이는 정도입니다 (각분리는 0.65 AU HZ 내측 가장자리에서 약 30 arc-minutes 로, 지구에서 보는 보름달과 비슷합니다). B-C 쌍 자체는 230 년 주기로 상호 공전하는 K 왜성 질량 WD + M 왜성 binary 입니다. periastron 에서 B-C 분리는 ~26 AU 까지 줄어들고 C 의 방출에 대한 B 의 반사 밝기가 검출 가능해지지만, ~8000 년의 A-BC 궤도 시간 척도에서는 cfg 게임 내 epoch 동안 분리각이 기하학적으로 고정된 것으로 다룹니다.",
  "p_95":"<b>HD 26965 b 는 documented divergence 로 포함합니다.</b> 벌컨 후보는 Burrows 2024 로 반박됐지만(아래), 프로젝트는 문화적 무게(Star Trek 의 Vulcan, <i>Project Hail Mary</i> 의 Erid)를 고려해 철회 이전 Ma 2018 값 (M sin i ≈ 8.5 M⊕, P ≈ 42.2 d, a ≈ 0.224 AU)으로 이 행성을 유지하기로 했습니다. canonical 판독은 &quot;행성 없음&quot;이고 42 일 신호는 별의 자전입니다. 그래서 아래 Refutation 섹션이 검출과 반박을 문서화하며, 이 천체는 refuted disposition 을 답니다. cfg 는 항성 삼중성계에 이 문화적·반박표기 천체를 더해 렌더링합니다.",
  "h2_96":"Canonical alternatives",
  "p_97":"Age 는 이번 합성에서 유일한 documented divergence 입니다. cfg 는 WD-progenitor IFMR 의 Bond 2017 ~1.8 Gyr 을 채택합니다. K 왜성 단독 문헌만 보는 canonical reading 이라면 대신 Ma 2018 K 왜성 isochrone 을 채택했을 것입니다.",
  "th_98":"Field",
  "th_99":"cfg value (Bond 2017 IFMR)",
  "th_100":"Canonical alternative (Ma 2018 K 왜성 isochrone)",
  "th_101":"cfg 가 다르게 픽한 이유",
  "td_102":"<code>age_gyr</code>",
  "td_103":"~1.8 (40 Eri B WD progenitor 분석에서 도출한 시스템 공통 나이)",
  "td_104":"6.9 ± 4.7 (K 왜성 SED + PARSEC isochrone)",
  "td_105":"IFMR 기반 시스템 공통값은 K 왜성 isochrone systematic 과 무관한 물리적 종점 (WD progenitor 수명 + 냉각 트랙) 으로 나이를 anchor 합니다. Ma 2018 대안은 Gyr 스케일에서 나이가 잘 제약되지 않는 K 왜성 isochrone 분지에서 60+% 상대 불확실도를 가집니다. Bond 2017 §6.2 는 &quot;수정된 WD 질량으로 excessive age 우려가 해소된 것으로 보인다&quot; 고 명시적으로 적습니다. Gyrochronological cross-check (P_rot 42 d → Barnes 2007 기반 4–6 Gyr) 는 Ma 2018 에 더 가깝지만 노년에서 van Saders 2016 의 weakened-braking systematic 에 노출되어 긴장을 해결하지 못합니다. cfg 는 물리적으로 더 강하게 anchor 된 Bond reading 을 따릅니다.",
  "p_106":"Ma 2018 isochrone 나이는 Phase 2 DB 의 <code>age_measurements</code> 안에서 <code>recommended:true</code> 로 남아 있습니다. A 자체의 유일한 직접 항성- 나이 측정값이기 때문입니다. Bond 2017 은 method <code>isochrone</code> 로 <code>recommended:false</code> 기록입니다 (IFMR progenitor 수명을 isochrone- equivalent 제약으로 취급). Phase 2 권장값과 Phase 3 cfg 픽의 이 divergence 가 이 <code>## Canonical alternatives</code> 섹션의 존재 이유 입니다.",
  "h2_107":"Refuted planet — HD 26965 b (&quot;Vulcan&quot;)",
  "p_108":"40 Eridani A 는 대중문화에서 스타 트렉의 스폭 모행성 벌컨의 호스트 별로 유명합니다. Gene Roddenberry 와 Sallie Baliunas 의 1991 년 편지가 이 식별을 공식 확인했습니다. Ma 등 2018 이 발표한 RV 검출 슈퍼지구 후보 — P = 42.4 d, M sin i ≈ 8.5 M⊕, a ≈ 0.224 AU — 는 따라서 2010 년대 가장 문화적으로 주목받은 외계행성 검출 중 하나가 되었습니다.",
  "p_109":"<b>HD 26965 b 는 현재 Refuted 로 분류됩니다 (Burrows 등 2024, AJ 167, 243).</b> Burrows 2024 의 NEID 정밀 도플러 캠페인이 16 년 간의 HIRES + PFS + CHIRON + HARPS 데이터 재분석과 결합되어, 42 일 RV 신호가 별의 자전 주기 (∼42 d) 와 동일한 신호임을 입증했습니다. 세 가닥의 증거는 다음과 같습니다. (1) bulk RV 와 classical 활성도 지표의 cross-correlation 이 multi-day lag 를 보이는데, 이는 케플러 궤도가 아닌 자전 변조와 일관적입니다. (2) line-by-line RV 분석에서 활성 영역 가시도에 따라 변하는 convective-blueshift suppression 을 시사하는 depth-dependent 상관이 나타납니다. (3) 활성도 지표 시계열에 대한 선형 detrending 이 RV 분산의 대부분을 제거합니다. 종합 증거는 &quot;spot 과 convective blueshift 억제의 조합으로 가설을 세우는 ~42 일 자전 변조 활성도 신호가 RV 신호의 지배 요인&quot; 이라는 결론과 일관적입니다 (Burrows 2024 abstract).",
  "p_110":"<b>Disposition: <code>db/planets_curated.json</code> 에 등재하지 않음.</b> Ma 2018 후보로부터 KSP 행성을 만들지 않습니다. NASA Exoplanet Archive <code>ps</code> 테이블도 Burrows 기반 삭제 이후 HD 26965 에 대해 0 row 를 반환합니다. 2025 년이나 2026 년의 follow-up 논문이 대체 후보를 제시한 사례는 없습니다. &quot;HD 26965 planet 2024-2026&quot; 문헌 검색은 Burrows 반박과 그 후속 뉴스 요약만 surfacing 합니다.",
  "p_111":"이 refutation 노트는 별도의 <code>docs/phase3/40-eridani-a-b.md</code> 파일 대신 Phase 3 markdown 안에 보존됩니다. (a) A 에 큐레이션된 행성이 없고 (b) 문화적 cross-reference 가 호스트-별 합성에 자연스럽게 들어가기 때문입니다. 가장 가까운 선례는 tau Cet e refuted Phase 3 markdown (<code>tau-cet-e.md</code>) 으로, 발견 기록을 반박과 함께 보존하는 패턴입니다. 40 Eri A b 는 비슷한 기준을 따르되, Ma 2018 picture 의 역사적 Phase 3 가 존재하지 않으므로 파일 단위가 아닌 섹션 단위로 처리합니다.",
  "h2_112":"Bibliography",
  "h3_113":"Read (Decisions 를 이끈 문헌)",
  "li_114":"<b>Boyajian T. S. 등 2012</b> — <i>Stellar Diameters and Temperatures II. Main-Sequence K- and M-Stars</i>, ApJ 757, 112 (<code>2012ApJ...757..112B</code>, doi:10.1088/0004-637X/757/2/112). 40 Eri A 가 GJ 166 A 로 포함된 CHARA Classic H 밴드 간섭계 각지름 샘플. θ_LD = 1.504 ± 0.006 mas (Table 3); R = 0.8061 ± 0.0036 R☉, Teff = 5143 ± 14 K, L = 0.4078 ± 0.0032 L☉ (Table 6). 두 간섭계 측정 중 fractional uncertainty 가 더 작아 권장 Phase 2 primary 로 R/Teff/L 을 anchor 합니다.",
  "li_115":"<b>Rains A. D. 등 2020</b> — <i>Precision angular diameters for 16 southern stars with VLTI/PIONIER</i>, MNRAS 493, 2377 (<code>2020MNRAS.493.2377R</code>, doi:10.1093/mnras/staa282, arXiv:2004.02343). VLTI/PIONIER 4 망원경 H 밴드 간섭계. 40 Eri A 는 Table 1 샘플의 16 개 중 7 번째. 독립적 cross-check: θ_LD = 1.486 ± 0.012 mas, R = 0.804 ± 0.006 R☉, Teff = 5126 ± 30 K, L = 0.40 ± 0.01 L☉ (Table 4). 네 가지 값 모두에 대해 Boyajian 2012 와 1σ 안에서 일치합니다.",
  "li_116":"<b>Ma B. 등 2018</b> — <i>Very low-mass stellar and substellar companions to solar-like stars from MARVELS VI. A giant planet and a brown dwarf candidate in a close binary system HD 87646</i> 는 같은 저자들의 관련 연구입니다. 40 Eri A 에 대한 본 논문은 <b>Ma 등 2018 MNRAS 480, 2411</b> (<code>2018MNRAS.480.2411M</code>, doi:10.1093/mnras/sty1933) 으로 Dharma Planet Survey 의 HD 26965 b RV 검출을 보고합니다. Mass 0.78 ± 0.08 M☉, age 6.9 ± 4.7 Gyr (PARSEC isochrone + 다중 밴드 SED), Teff 5072 ± 53 K, [Fe/H] −0.42 ± 0.04 (Table 2). 질량과 (대안) 나이/금속도의 Phase 2 anchor 인 동시에 지금은 반박된 행성 후보의 source paper 이기도 합니다.",
  "li_117":"<b>Bond H. E. 등 2017</b> — <i>Astrophysical Implications of a New Dynamical Mass for the Nearby White Dwarf 40 Eridani B</i>, ApJ 848, 16 (<code>2017ApJ...848...16B</code>, doi:10.3847/1538-4357/aa8a63, arXiv:1709.00478). 40 Eri B 의 HST FGS 동역학 질량 0.573 ± 0.018 M☉; §6.2 가 IFMR (initial mass ~1.8 M☉ → MS 수명 1.7 Gyr + 냉각 122 Myr) 로 시스템 공통 나이 ~1.8 Gyr 을 유도합니다. Phase 3 cfg 가 Ma 2018 보다 이 값을 채택합니다 — <code>## Canonical alternatives</code> 참조.",
  "li_118":"<b>Burrows A. 등 2024</b> — <i>The Death of Vulcan: NEID Reveals That the Planet Candidate Orbiting HD 26965 Is Stellar Activity</i>, AJ 167, 243 (<code>2024AJ....167..243B</code>, doi:10.3847/1538-3881/ad34d5, arXiv:2404.17494). NEID line-by-line RV + 활성도 지표 상관이 Ma 2018 벌컨 후보를 반박합니다. 자전 주기는 formal σ 없이 &quot;∼42 days&quot; 로 보고됩니다. <code>rotation_period_days</code> Decisions row 와 Refuted-planet 섹션의 source.",
  "li_119":"<b>Diaz M. R. 등 2018</b> — <i>The Test Case of HD 26965: Difficulties Disentangling Weak Doppler Signals from Stellar Activity</i>, AJ 155, 126 (<code>2018AJ....155..126D</code>, doi:10.3847/1538-3881/aaa896, arXiv:1801.03970). HARPS 데이터로 본 벌컨 신호의 pre-Burrows 검토. 활성도 대 행성 모호성을 미리 짚어둔 paper. SPECIES atmospheric pipeline 으로부터의 Phase 2 대안 mass (0.76 ± 0.03 M☉), Teff (5151 ± 55 K), [Fe/H] (−0.29 ± 0.12), age (9.23 ± 4.84 Gyr) (Table 1). Saar &amp; Osten 1997 의 ~37 일 P_rot 과 HARPS S-index 의 ~38 일 peak 를 언급합니다.",
  "li_120":"<b>Jenkins J. S. 등 2011</b> — <i>Chromospheric activities and kinematics for solar type dwarfs and subgiants: analysis of the activity distribution and the AVR</i>, A&amp;A 531, A8 (<code>2011A&amp;A...531A...8J</code>, doi:10.1051/0004-6361/201016333). HARPS 로 본 890 개 남쪽 FGK 별의 Ca II H&amp;K 서베이. Phase 2 권장 log R&#x27;HK = −4.99 의 source (이번 세션에서 CDS 표 row 단위 직접 fetch 는 못함, Open items 참조).",
  "h3_121":"Read (K 왜성 파라미터 셋 + binary architecture 의 context)",
  "li_122":"<b>Pourbaix D. &amp; Boffin H. M. J. 2016</b> — α Centauri AB 의 visual-spectroscopic binary 질량. 동일 기법이 역사적으로 40 Eri AB 에도 적용되었지만 mutual 궤도가 너무 길어 케플러 적합이 불가능하다는 점에서 인용합니다 (40 Eri A-BC ~8000 년).",
  "li_123":"<b>Mason B. D., Hartkopf W. I. &amp; Miles K. N. 2017</b> — <i>Binary Star Orbits. V. The Nearby White Dwarf-Red Dwarf Pair 40 Eri BC</i>, AJ 154, 200 (<code>2017AJ....154..200M</code>, doi:10.3847/1538-3881/aa803e). 내측 B-C 쌍의 grade-1 결정 궤도: P = 230.30 ± 0.68 yr, e = 0.4294 ± 0.0027. <code>db/binary_orbits.json</code> 의 B-C 궤도 Phase 2 anchor.",
  "li_124":"<b>Henry T. J. 등 1996</b> — <i>A Survey of Ca II H and K Chromospheric Emission in Southern Solar-Type Stars</i>, AJ 111, 439 (<code>1996AJ....111..439H</code>, doi:10.1086/117796). 40 Eri A 를 포함한 더 이른 색층권 활성도 서베이. Phase 2 대안 log R&#x27;HK = −4.94. 직접 CDS row 는 이번 세션에서 table-verify 못함; bibcode/title 은 확인됨.",
  "li_125":"<b>Bensby T., Feltzing S. 등 2014</b> — <i>Exploring the Milky Way stellar disk</i>, A&amp;A 562, A71 (<code>2014A&amp;A...562A..71B</code>, doi:10.1051/0004-6361/201322631). thin/thick-disk 화학 abundance 서베이의 714 F/G 왜성. 40 Eri A 에 대한 Phase 2 대안 [Fe/H] = −0.31 ± 0.10. K0.5 V 분류는 sample boundary 에 있음; bibcode/title 은 확인되었으나 row-level Table A1 은 이번 세션에서 직접 fetch 안 함.",
  "li_126":"<b>Tokovinin A. 2018</b> — <i>MSC — Catalogue of physical multiple stars</i> (2018 업데이트). 40 Eri A-BC 외측 궤도가 케플러 해 없음으로 등재 (투영 a ~ 400 AU, P ~ 8000 yr). A 를 resolved binary 파트너가 아닌 독립 항성으로 다루는 cfg 결정의 anchor 입니다.",
  "li_127":"<b>Saar S. H. &amp; Osten R. A. 1997</b> — <i>Lithium, X-ray activity, and rotation in an HR diagram of solar-type field stars</i>, MNRAS 284, 803. ROSAT 상관 코로나 활성도로부터 40 Eri A P_rot ≈ 37.10 일 보고. pre-Burrows 자전 alternative 로 인용 — Open items 참조.",
  "h3_128":"Read (instrument-only / methodological 참고)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
