  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 b has no surface in the geological sense. Under the adopted stripped-sub-Neptune scenario, the visible &quot;surface&quot; — at the optical depth where photons escape the planet — is a photochemical haze deck high in the residual H/He + H₂O envelope, roughly 100 bar above any rocky / icy interior. The deeper core-envelope boundary lies at supercritical conditions: T &gt; 1500 K at the rock surface for a partially-retained envelope, well above the silicate melt line for a substellar dome. The geological &quot;surface&quot; is therefore largely irrelevant to the player view; what matters is the haze layer chemistry and the column distribution.",
  "p_178":"The stripped-sub-Neptune scenario follows Owen &amp; Wu 2017&#x27;s photoevaporation-survivor framework. For a 10.2 M⊕ planet at 0.078 AU around an old G8V, the XUV-driven envelope mass-loss timescale at ~1 Gyr is short enough to strip most of a Saturn-mass primordial envelope, leaving a heavy-element-rich core with at most a few percent residual envelope by mass — exactly the &quot;photoevaporation desert survivor&quot; locus identified by Fulton 2017 (Kepler radius gap) and modelled in detail by Rogers 2021. This is a tie-break against the alternative &quot;envelope-retaining warm Neptune&quot; reading; the cfg defaults to stripped because (a) the host star age 5.7 Gyr gives the photoevaporation engine plenty of time to act, (b) 10.2 M⊕ is below the &quot;photoevaporation valley floor&quot; mass of ~15 M⊕ where envelopes survive comfortably, and (c) the stripped scenario produces a more visually distinctive contrast against c and d (which retain their envelopes).",
  "p_179":"The conceptual rocky / icy interior is encoded for the cfg-variant renderer that strips the haze: a warm dark-brown silicate / water-rock crust (<span class=\"hex-chip\" style=\"background:#7a4a30\"></span><code>#7a4a30</code>) with a substellar partial-melt accent (<span class=\"hex-chip\" style=\"background:#a85a30\"></span><code>#a85a30</code>) where dayside heat from above and tidal/radiogenic heat from below combine to push the upper mantle above the silicate solidus. This is purely a tie-break interesting-first visual — no observation constrains the interior geometry. Below the crust, the interior is expected to be a &quot;wet Earth&quot; composition with a few percent water by mass in the silicate matrix, rather than a fully ice-dominated Uranus-analog mantle. The host star&#x27;s slightly metal-poor [Fe/H] = −0.05 has minimal effect on core composition at this metallicity.",
  "p_180":"Under the alternative envelope-retaining scenario (cfg variant), b would appear as a small uniform warm-tan disk much like the photochemical haze of the stripped reading but with no visible surface at any depth — the envelope continuously transitions from H₂-rich gas to supercritical fluid without a phase boundary the renderer can resolve. The two cfg variants are visually almost indistinguishable from orbit; the difference matters only for the interior cutaway view.",
  "h2_181":"Atmosphere synthesis",
  "p_182":"The atmospheric residue is the defining observable of b under the stripped-sub-Neptune cfg. Following Owen 2019 §4 and Rogers 2021, the residual envelope after photoevaporation is dominated by H₂ (80%) and He (15%), with H₂O (3%) and trace heavy elements (CH₄, NH₃, Na, K) supplied by the underlying core through long-timescale upward mixing. At 800 K equilibrium and 100 bar column, the upper atmosphere photochemistry follows Morley 2015 / Kawashima 2019 hot sub-Neptune models: methane photolysis produces hydrocarbon soot particles (a Titan-analog photochemical haze) at altitudes of 0.1–1 mbar, with optical depth ~5 in the visible band. This haze deck is the photometric surface of b.",
  "p_183":"The cfg adopts a thick global photochemical haze (<code>cloud_cover_fraction = 0.90</code>) covering essentially the entire disk, with weak day-night contrast. Tidal locking means the atmospheric circulation should develop a substellar-to-antistellar overturn — Showman &amp; Polvani 2011 jets at the relevant 8.67 d rotation period yield a Kelvin / Rossby wave pattern that piles haze on the eastward terminator and slightly thins it at the substellar point. The cfg encodes this as a uniform tan deck with subtle eastward-skewed brightening, rather than as a sharply differentiated dayside / nightside contrast.",
  "p_184":"The atmospheric tint is <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> warm amber — Titan-haze tan modulated by G8V (rather than Sol) illumination. The host star is slightly cooler (5385 K vs Sol&#x27;s 5772 K) so the perceived hue is shifted ~5 K toward red, marginally warming the tan reference. The cloud / haze tint <span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> is a slightly lighter version of the same palette, used for the upper haze deck visible from orbit.",
  "p_185":"<b>Sky from the substellar region (if a hypothetical lander descended through the haze).</b> Above the haze deck, the star fills a 5.4° disk in the sky — about 10× the apparent Sun-from-Earth diameter — and its slightly redder-than-Sol cream-yellow tint floods the entire upper atmosphere. Below the haze (at deeper pressure), photons no longer reach from outside; the planet is its own thermal source, and a hypothetical instrument at 100 bar would see a dim red-orange thermal background corresponding to the ~1100 K substellar temperature. No nightside sky distinction in the conventional sense — the haze deck and the dense lower atmosphere completely thermalise.",
  "h2_186":"Rotation &amp; spin synthesis",
  "p_187":"Tidal damping for b at 8.67-day orbital period over 5.7 ± 1 Gyr establishes the synchronous (1:1) configuration: the synchronisation timescale for a Neptune-class planet at 0.08 AU around an old G-dwarf is ~10⁶ years (Heller 2011 scaling from Mercury-rocky to Neptune-class moment of inertia), comfortably below the system age. Obliquity damped to zero by the same dissipation mechanism over the same timescale.",
  "p_188":"The orbital eccentricity 0.10 is non-negligible — large enough that a 3:2 spin-orbit resonance is dynamically plausible (Vinson 2017&#x27;s e &gt; 0.1 threshold is approached but not exceeded). The cfg adopts the 1:1 synchronous state as the canonical Neptune-class reading (consistent with all observed close-in Neptune-mass planets without direct rotation measurements), but the 3:2 alternative is preserved as a cfg variant in Open items — under 3:2, the substellar point would migrate around the planet every ~4.3 days in the inertial frame, producing a slow but resolvable substellar-spot drift in the haze morphology.",
  "p_189":"<b>KSP implementation note.</b> Rotation period = orbital period = 8.667 days (749 088 s) for the canonical synchronous cfg. Under the 3:2 cfg variant, rotation period = (2/3) × orbital period = 5.78 days (499 392 s).",
  "p_190":"<b>Eccentric-orbit insolation cycling.</b> At e = 0.10, the star-planet distance varies between 0.071 AU (perihelion) and 0.086 AU (aphelion) over each 8.67-day orbit, with insolation cycling between 118 S⊕ (perihelion) and 81 S⊕ (aphelion). The ~45% insolation amplitude drives a thermal-tide forcing on the upper atmosphere; combined with the modest internal tidal heating (~0.01 W/m², Bolmont 2013 scaling for Neptune-class Q at e = 0.10), the perihelion-aphelion temperature swing is expected to be ~50 K peak-to-peak at the substellar haze deck. The cfg does not animate this; it is informational for the deeper cfg interior model.",
  "h2_191":"Visual styling",
  "li_192":"<b>Global appearance.</b> A small warm-tan haze disk (<span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> to <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> gradient with limb darkening) about 0.04° apparent diameter from a viewpoint at HD 69830 c — much smaller than the host star&#x27;s 5.4° angular diameter at b&#x27;s own distance from the star. Player view from outside b shows a uniform Titan-coloured disk with no resolved structure at orbit-view scale.",
  "li_193":"<b>Dayside detail.</b> Faint substellar dome brightening (~10% over the global tan) from haze chemistry compression at the warmest point. The dayside ranges from <span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> near the substellar point to <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> at the terminator.",
  "li_194":"<b>Terminator band.</b> Soft transition from amber to dim brown (<span class=\"hex-chip\" style=\"background:#704830\"></span><code>#704830</code>) with no sharp edge — a Neptune-analog haze scattering profile rather than the sharp terminator of an airless body.",
  "li_195":"<b>Nightside.</b> Dim red-brown glow from residual thermal emission of the 600 K nightside haze deck. Visible only in cfg variants with night-side IR rendering enabled.",
  "li_196":"<b>Atmosphere haze.</b> The haze IS the surface. No discrete cloud features beyond the global deck; no banding visible at the cfg&#x27;s resolution. Limb glow on the dayside crescent gives a ~5° angular feathered edge.",
  "li_197":"<b>Star in sky.</b> HD 69830 fills 5.39° in b&#x27;s sky — about 10× the Sun&#x27;s apparent diameter from Earth, an enormous dim red-orange disk dominating the daytime hemisphere. The illumination is cream-amber, slightly redder than Sol.",
  "li_198":"<b>Sister planets in sky.</b> From b, planet c appears at angular diameter 0.025° during close conjunctions (a/c separation 0.11 AU at conjunction; c&#x27;s radius ~22 000 km), and d at 0.005° at its closest. Far more visible features in b&#x27;s sky are the warm dust ring at 0.8–1.5 AU, seen in projection as a faint amber band across the sky during alignment events.",
  "li_199":"<b>Warm dust ring from b&#x27;s perspective.</b> The dust belt at ~1 AU is exterior to b&#x27;s 0.08 AU orbit by a factor of 13. From b, the belt is seen as a faint band across the orbital plane — comparable to viewing the Sun&#x27;s zodiacal light from inside Mercury&#x27;s orbit. Brightness peaks during perihelion-of-belt alignment events but stays well below the host star&#x27;s overwhelming glow.",
  "h2_200":"Bibliography",
  "h3_201":"Read (visual-informative, drove decisions above)",
  "li_202":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). Discovery paper. P = 8.667 d, Msini = 10.2 M⊕, a = 0.0785 AU, e = 0.10. §5 raises the bare-core possibility explicitly.",
  "li_203":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). Excludes grazing transit geometry for b; confirms only Msini constraint.",
  "li_204":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation-survivor framework. Drives the stripped-sub-Neptune cfg pick for b. Predicts that 10 M⊕ planets at 0.08 AU around old G-dwarfs sit at the &quot;evaporation valley&quot; boundary — survival depends on initial envelope mass, expected residual ≲ 1–3% by mass.",
  "li_205":"<b>Owen J. E. 2019</b> — <i>Atmospheric Escape and the Evolution of Close-in Exoplanets</i>, AnnRev Earth Planet Sci 47, 67 (<code>2019AREPS..47...67O</code>). Review of photoevaporation residue composition; supports the H₂-He-H₂O composition adopted in the Decisions table.",
  "li_206":"<b>Rogers J. G. et al. 2021</b> — <i>Conclusive evidence for a population of water worlds around M dwarfs that abounds with super-Earths</i>, ApJ 915, L12 (<code>2021ApJ...915L..12R</code>, arXiv:2105.03446). Population statistics of close-in sub-Neptunes; constrains the density 3.2 g/cc tie-break for b&#x27;s mass-radius.",
  "li_207":"<b>Morley C. V. et al. 2015</b> — <i>Thermal Emission and Reflected Light Spectra of Super Earths with Flat Transmission Spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). Photochemical haze chemistry in warm sub-Neptunes at 800 K. Drives the hydrocarbon-soot haze tint and the optical depth ~5 visible-band estimate.",
  "li_208":"<b>Kawashima Y. et al. 2019</b> — <i>Theoretical reflected light spectra of GJ 1214 b–analog hazy sub-Neptunes</i>, ApJ 877, 109 (arXiv:1905.02963). Methane photolysis → hydrocarbon haze deck altitudes at 0.1–1 mbar; confirms the 0.90 cloud-cover fraction adopted by the cfg.",
  "h3_209":"Read (context / methodology, not decision-driving)",
  "li_210":"<b>Heller R. et al. 2011</b> — <i>Tidal obliquity evolution of potentially habitable planets</i>, A&amp;A 528, A27 (arXiv:1101.2156). Tidal-synchronisation timescale scaling used for the 1:1 lock argument.",
  "li_211":"<b>Showman A. P. &amp; Polvani L. M. 2011</b> — <i>Equatorial superrotation on tidally locked exoplanets</i>, ApJ 738, 71 (arXiv:1103.3101). Jet morphology used to justify the weak day-night haze contrast.",
  "li_212":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>On the spin states of habitable zone exoplanets around M dwarfs</i>, MNRAS 472, 3217. Bound on 3:2 resonance threshold; supports 1:1 default at e = 0.10.",
  "li_213":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution</i>, AJ 154, 109. Defines the photoevaporation valley around 1.5–2 R⊕; supports stripped-core reading for b.",
  "li_214":"<b>Atri D. 2019</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i>, MNRAS 500, L1 (arXiv:1910.09871). Models SPE-induced surface dose for terrestrial exoplanets with thin atmospheres; not directly applicable to b&#x27;s Neptune-class thick envelope. The 200 mSv/yr value is an independent order-of-magnitude synthesis estimate.",
  "h3_215":"Read (instrument / non-cfg-decisive)",
  "li_216":"<b>Beichman C. A. et al. 2005</b> — <i>An excess due to small grains around HD 69830</i>, ApJ 626, 1061. Dust belt context; relevant only insofar as it constrains potential dust delivery to b&#x27;s atmosphere (negligible for the cfg&#x27;s visual layer).",
  "h3_217":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_218":"HD 69830 b/c/d dynamical stability papers (Ji 2007, Payne 2009) — relevant for the orbital architecture but not visual.",
  "li_219":"Generic hot-Neptune characterisation papers (e.g. GJ 436 b, HAT-P-11 b analogues) — context only; not HD 69830 b-specific.",
  "li_220":"Lisse 2007 catastrophic-event discussion — already covered in the host star synthesis; not directly informative for b&#x27;s visuals.",
  "h2_221":"Open items for follow-up",
  "li_222":"<b>Transit search refresh.</b> No published transit detection as of 2026; CHEOPS / TESS short-cadence monitoring could rule in or out a grazing geometry and pin a true radius. If a transit is detected, the stripped-core vs envelope-retaining ambiguity resolves immediately, and the cfg <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> should be updated from the tie-break 2.6 R⊕.",
  "li_223":"<b>Envelope-retaining cfg variant.</b> The &quot;warm Neptune with retained primordial envelope&quot; reading (radius 3.17 R⊕, density ~1.7 g/cc, Neptune-analog atmospheric composition) is preserved as a cfg variant. Visual difference from the stripped reading is small at orbit-view scale; the interior cutaway view differs significantly.",
  "li_224":"<b>3:2 spin-orbit cfg variant.</b> At e = 0.10, the 3:2 alternative is dynamically plausible (Makarov 2018). A 5.78-day rotation period would produce a slow substellar drift visible as a migrating haze brightening — different gameplay feel than the static synchronous lock.",
  "li_225":"<b>Direct atmospheric characterisation.</b> No JWST programme has targeted HD 69830 b through 2026 cycles (HD 69830 is too quiet / not transiting for the standard JWST sub-Neptune programmes). A future direct-imaging facility (HabEx, LUVOIR, ELT/HARMONI) could resolve b at angular separation 6 milliarcsec — within ELT capability for a planet/star contrast ~10⁻⁹. The cfg&#x27;s haze chemistry would be testable.",
  "li_226":"<b>Tidal heating cross-check.</b> The adopted 0.01 W/m² internal heat flux from e = 0.10 + Neptune-class Q is order-of-magnitude; more rigorous tidal-evolution modelling (Bolmont 2013-style for the specific HD 69830 b parameters) would refine this and could feed back into the cfg&#x27;s interior cutaway view.",
  "h2_227":"Related",

  "p_2":"<b>NearStars 시나리오 선택. 광증발-생존자 시나리오의 뜨거운 조석 고정 stripped sub-Neptune 으로, Owen &amp; Wu 2017 가 제시한 일차적 H/He 외피의 대부분이 침식되어 무거운 원소 (물 + 암석) 풍부 코어와 질량 기준 최대 ~1–3% 의 얇은 잔존 외피만 남은 상태입니다.</b> 28 cfg 픽 중 12 는 canonical-aligned (궤도 + 질량 파라미터, 유도량), 16 은 tie-break (stripped-core vs 외피-유지 윈도우에서의 반지름 / 밀도, 표면 시각, 광증발 하 대기 화학) 입니다. documented divergence 는 없습니다. Lovis 2006 §5 이 bare-core 가능성을 명시적으로 다루며, cfg 는 관측이 허용하는 윈도우 안에서 stripped-core 해석을 선택합니다.",

  "h2_176":"Surface synthesis",
  "p_177":"HD 69830 b 는 지질학적 의미의 표면이 없습니다. 채택한 stripped- sub-Neptune 시나리오에서 가시 &quot;표면&quot; — 광자가 행성에서 탈출하는 광학 깊이 — 은 잔존 H/He + H₂O 외피의 깊은 곳에 있는 광화학 haze 데크로, 암석 / 얼음 내부 위로 대략 100 bar 정도에 위치합니다. 더 깊은 코어-외피 경계는 초임계 상태입니다. 부분 잔존 외피의 암석 표면에서 T &gt; 1500 K 로 substellar 돔의 silicate 용융 선보다 한참 높습니다. 따라서 지질학적 &quot;표면&quot; 은 플레이어 시야와 거의 무관합니다. 중요한 것은 haze 층 화학과 컬럼 분포입니다.",
  "p_178":"stripped-sub-Neptune 시나리오는 Owen &amp; Wu 2017 의 광증발-생존자 프레임워크를 따릅니다. 0.078 AU 의 10.2 M⊕ 행성이 오래된 G8V 주위 에 있을 때, ~1 Gyr 시점의 XUV 구동 외피 질량손실 시간 스케일이 충분히 짧아 토성 질량 일차 외피의 대부분을 박탈하고, 무거운 원소 풍부 코어와 질량 기준 최대 몇 % 의 잔존 외피만 남깁니다 — 정확히 Fulton 2017 (Kepler radius gap) 이 식별하고 Rogers 2021 이 상세히 모델링한 &quot;광증발 사막 생존자&quot; 위치입니다. 이는 대안 &quot;외피-유지 warm Neptune&quot; 해석에 대한 tie-break 으로, cfg 는 stripped 를 기본값으로 채택합니다. (a) 모성 나이 5.7 Gyr 가 광증발 엔진이 작용할 시간을 충분히 줌, (b) 10.2 M⊕ 는 외피가 편안하게 살아남는 &quot;광증발 valley 바닥&quot; 질량 ~15 M⊕ 보다 낮음, (c) stripped 시나리오 가 (외피를 유지하는) c, d 와 더 시각적으로 구분되는 대비를 만듦.",
  "p_179":"개념적 암석 / 얼음 내부는 haze 를 벗기는 cfg 변형 렌더러용으로 인코딩됩니다. 따뜻한 다크 브라운 silicate / water-rock 지각 (<span class=\"hex-chip\" style=\"background:#7a4a30\"></span><code>#7a4a30</code>) 과 위에서 오는 dayside 열과 아래에서 오는 조석/방사성 열이 합쳐 상부 mantle 을 silicate 고상선 위로 끌어올리는 substellar 부분-용융 액센트 (<span class=\"hex-chip\" style=\"background:#a85a30\"></span><code>#a85a30</code>). 이는 순수한 tie-break interesting-first 시각이며 관측이 내부 지오메트리를 제약하지 않습니다. 지각 아래 내부는 &quot;wet Earth&quot; 조성 — silicate 매트릭스에 질량 기준 몇 % 의 물 — 으로, 완전히 얼음 우세인 Uranus-analog mantle 보다는 그쪽으로 예상됩니다. 모성의 약간 metal-poor [Fe/H] = −0.05 는 이 금속도에서 코어 조성에 최소한의 영향만 줍니다.",
  "p_180":"대안 외피-유지 시나리오 (cfg 변형) 에서 b 는 stripped 해석의 광화학 haze 와 거의 같은 작은 균일한 따뜻한 탄색 디스크로 보이지만, 어떤 깊이에서도 가시 표면이 없습니다 — 외피가 H₂ 풍부 가스에서 초임계 유체로 연속적으로 전환되며, 렌더러가 해상할 수 있는 상경계가 없습니다. 두 cfg 변형은 궤도에서 시각적으로 거의 구분되지 않습니다. 차이는 내부 컷어웨이 뷰에서만 나타납니다.",
  "h2_181":"Atmosphere synthesis",
  "p_182":"대기 잔류물은 stripped-sub-Neptune cfg 하에서 b 의 결정적인 관측 가능 요소입니다. Owen 2019 §4 와 Rogers 2021 을 따르면, 광증발 후 잔존 외피는 H₂ (80%) 와 He (15%) 가 지배하고, H₂O (3%) 와 미량 무거운 원소 (CH₄, NH₃, Na, K) 가 기저 코어에서 장기 시간 스케일 상향 혼합 으로 공급됩니다. 800 K 평형과 100 bar 컬럼에서 상부 대기 광화학은 Morley 2015 / Kawashima 2019 의 뜨거운 sub-Neptune 모델을 따릅니다. 메탄 광분해가 0.1–1 mbar 고도에서 탄화수소 soot 입자 (Titan-analog 광화학 haze) 를 생성하며, 가시 밴드 광학 깊이가 ~5 입니다. 이 haze 데크가 b 의 광도 측정 표면입니다.",
  "p_183":"cfg 는 본질적으로 디스크 전체를 덮는 두꺼운 글로벌 광화학 haze (<code>cloud_cover_fraction = 0.90</code>) 를 채택하며, 약한 주야 대비를 둡니다. 조석 고정은 대기 순환에 substellar-to-antistellar overturn 을 발달 시켜야 함을 의미합니다 — 관련 8.67 일 회전 주기에서 Showman &amp; Polvani 2011 제트가 만드는 Kelvin / Rossby 파동 패턴이 동쪽 terminator 에 haze 를 쌓고 substellar 점에서 살짝 얇게 만듭니다. cfg 는 이를 sharp 한 주간 / 야간 대비가 아니라, 미묘하게 동쪽으로 편향된 brightening 이 있는 균일한 탄색 데크로 인코딩합니다.",
  "p_184":"대기 색조는 <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> 따뜻한 호박색입니다 — G8V (태양이 아님) 조명 에 의해 변조된 Titan-haze 탄색입니다. 모성이 살짝 더 차갑기 (5385 K vs 태양 5772 K) 때문에 인지된 색조가 빨강 쪽으로 ~5 K 이동해 탄색 기준을 약간 따뜻하게 만듭니다. 구름 / haze 색조 <span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> 은 같은 팔레트의 살짝 더 밝은 버전으로, 궤도에서 보이는 상부 haze 데크에 사용됩니다.",
  "p_185":"<b>substellar 영역에서 본 하늘 (가상의 착륙선이 haze 를 뚫고 내려갔 다고 가정).</b> haze 데크 위에서 별이 5.4° 디스크로 하늘을 채우며 — 지구에서 본 태양 겉보기 지름의 약 10 배 — 태양보다 살짝 더 붉은 크림-노랑 색조가 상부 대기 전체를 적십니다. haze 아래에서는 (더 깊은 압력에서) 외부에서 광자가 더 이상 도달하지 못합니다. 행성이 스스로 열원이 되며, 100 bar 의 가상의 계측기는 ~1100 K substellar 온도에 해당하는 어두운 빨강-오렌지 열 배경을 봅니다. 통상적인 의미 의 야측 하늘 구분은 없습니다 — haze 데크와 밀도 높은 하부 대기가 완전히 thermalise 합니다.",
  "h2_186":"Rotation &amp; spin synthesis",
  "p_187":"5.7 ± 1 Gyr 에 걸친 b 의 8.67 일 궤도 주기 조석 damping 은 동기 (1:1) 구성을 확립합니다. 오래된 G 왜성 주위 0.08 AU 의 Neptune 급 행성에 대한 동기화 시간 스케일은 ~10⁶ 년 (Heller 2011 이 Mercury 암석에서 Neptune 급 관성 모멘트로 스케일링) 으로 시스템 나이보다 편안하게 짧습니다. 황도 경사도 같은 소산 메커니즘으로 같은 시간 스케일에서 0 으로 damping 됩니다.",
  "p_188":"궤도 이심률 0.10 은 무시할 수 없습니다 — Vinson 2017 의 e &gt; 0.1 임계값에 접근하지만 넘어서지는 않는 정도로, 3:2 spin-orbit resonance 가 동역학적으로 가능한 영역입니다. cfg 는 canonical Neptune 급 해석 (직접 자전 측정이 없는 모든 관측된 가까운 Neptune 질량 행성과 일관) 으로 1:1 동기 상태를 채택하지만, 3:2 대안은 Open items 에 cfg 변형으로 보존합니다 — 3:2 하에서는 substellar 점 이 관성 좌표계에서 ~4.3 일마다 행성을 한 바퀴 돌며, haze 형태 에서 느리지만 분해 가능한 substellar-spot drift 를 생성합니다.",
  "p_189":"<b>KSP 구현 노트.</b> canonical 동기 cfg 에 대해 자전 주기 = 궤도 주기 = 8.667 일 (749 088 s). 3:2 cfg 변형 하에서 자전 주기 = (2/3) × 궤도 주기 = 5.78 일 (499 392 s).",
  "p_190":"<b>이심 궤도 일조량 사이클링.</b> e = 0.10 에서 별-행성 거리가 각 8.67 일 궤도 동안 0.071 AU (근일점) 와 0.086 AU (원일점) 사이에서 변하며, 일조량이 118 S⊕ (근일점) 와 81 S⊕ (원일점) 사이를 사이클 링합니다. ~45% 일조량 진폭이 상부 대기에 thermal-tide 강제력을 구동합니다. modest 한 내부 조석 가열 (~0.01 W/m², e = 0.10 의 Neptune 급 Q 에 대한 Bolmont 2013 스케일링) 과 결합되어, substellar haze 데크에서 근일점-원일점 온도 스윙이 peak-to-peak ~50 K 로 예상됩니다. cfg 는 이것을 애니메이션하지 않습니다. 더 깊은 cfg 내부 모델용 정보입니다.",
  "h2_191":"Visual styling",
  "li_192":"<b>글로벌 외관.</b> 따뜻한 탄색 haze 디스크 (limb darkening 이 있는 <span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> 에서 <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> gradient), HD 69830 c 시점에서 약 0.04° 겉보기 지름 — b 자신의 별 거리에서 본 모성의 5.4° 각지름 보다 훨씬 작습니다. b 외부 플레이어 시점에서는 궤도 뷰 스케일에서 분해된 구조 없이 균일한 Titan 색조 디스크가 보입니다.",
  "li_193":"<b>Dayside 디테일.</b> 가장 따뜻한 점에서의 haze 화학 압축으로 생기는 희미한 substellar dome brightening (글로벌 탄색 대비 ~10%). dayside 는 substellar 점 근처의 <span class=\"hex-chip\" style=\"background:#c89070\"></span><code>#c89070</code> 에서 terminator 의 <span class=\"hex-chip\" style=\"background:#a07050\"></span><code>#a07050</code> 까지 범위.",
  "li_194":"<b>Terminator 밴드.</b> 호박색에서 어두운 갈색 (<span class=\"hex-chip\" style=\"background:#704830\"></span><code>#704830</code>) 으로의 부드러운 전환. sharp edge 없음 — airless 천체의 sharp terminator 대신 Neptune-analog haze 산란 프로필.",
  "li_195":"<b>Nightside.</b> 600 K 야측 haze 데크의 잔존 열 방출에서 오는 어둑한 빨강-갈색 글로우. 야측 IR 렌더링이 활성화된 cfg 변형에서만 보임.",
  "li_196":"<b>대기 haze.</b> haze 가 곧 표면. 글로벌 데크 너머의 개별 구름 피처 없음. cfg 해상도에서 banding 보이지 않음. dayside crescent 에서 limb glow 가 ~5° 각도의 깃털 가장자리.",
  "li_197":"<b>하늘의 별.</b> HD 69830 이 b 의 하늘에서 5.39° — 지구에서 본 태양 겉보기 지름의 약 10 배, 주간 반구를 지배하는 거대한 어둑한 빨강-오렌지 디스크. 조명은 크림-호박색, 태양보다 살짝 더 붉음.",
  "li_198":"<b>하늘의 자매 행성.</b> b 에서 c 는 가까운 합 (a/c 분리 0.11 AU, c 반지름 ~22 000 km) 동안 각지름 0.025°, d 는 가장 가까울 때 0.005°. b 의 하늘에서 훨씬 더 가시적인 피처는 0.8–1.5 AU 의 따뜻한 먼지 고리로, 정렬 사건 동안 하늘을 가로지르는 희미한 호박색 띠로 투영되어 보입니다.",
  "li_199":"<b>b 시점에서 본 따뜻한 먼지 고리.</b> ~1 AU 의 먼지 벨트가 b 의 0.08 AU 궤도 외부로 13 배 떨어져 있습니다. b 에서는 궤도 평면을 가로지르는 희미한 띠로 보입니다 — 수성 궤도 내부에서 태양 황도광 을 보는 것과 비슷합니다. perihelion-of-belt 정렬 사건 동안 밝기가 피크에 도달하지만 모성의 압도적 글로우 한참 아래 머무릅니다.",
  "h2_200":"Bibliography",
  "h3_201":"Read (visual-informative, drove decisions above)",
  "li_202":"<b>Lovis C. et al. 2006</b> — <i>An extrasolar planetary system with three Neptune-mass planets</i>, Nature 441, 305 (<code>2006Natur.441..305L</code>). 발견 논문. P = 8.667 d, Msini = 10.2 M⊕, a = 0.0785 AU, e = 0.10. §5 가 bare-core 가능성을 명시적으로 제기.",
  "li_203":"<b>Bonfils X. et al. 2007</b> — <i>No transit detection at the predicted ephemeris</i> (HARPS / EulerCAM follow-up). b 의 grazing transit 지오메트리를 배제. Msini 제약만 확인.",
  "li_204":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발-생존자 프레임워크. b 의 stripped-sub-Neptune cfg 픽을 구동. 오래된 G 왜성 주위 0.08 AU 의 10 M⊕ 행성이 &quot;광증발 valley&quot; 경계에 있어 생존이 초기 외피 질량에 의존하고, 예상 잔류물이 질량 기준 ≲ 1–3% 라고 예측.",
  "li_205":"<b>Owen J. E. 2019</b> — <i>Atmospheric Escape and the Evolution of Close-in Exoplanets</i>, AnnRev Earth Planet Sci 47, 67 (<code>2019AREPS..47...67O</code>). 광증발 잔류물 조성 리뷰. Decisions 테이블이 채택한 H₂-He-H₂O 조성을 지지.",
  "li_206":"<b>Rogers J. G. et al. 2021</b> — <i>Conclusive evidence for a population of water worlds around M dwarfs that abounds with super-Earths</i>, ApJ 915, L12 (<code>2021ApJ...915L..12R</code>, arXiv:2105.03446). 가까운 sub-Neptune 의 모집단 통계. b 의 질량-반지름에 대한 밀도 3.2 g/cc tie-break 을 제약.",
  "li_207":"<b>Morley C. V. et al. 2015</b> — <i>Thermal Emission and Reflected Light Spectra of Super Earths with Flat Transmission Spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). 800 K 의 따뜻한 sub-Neptune 에서 광화학 haze 화학. 탄화수소-soot haze 색조와 가시 밴드 광학 깊이 ~5 추정을 구동.",
  "li_208":"<b>Kawashima Y. et al. 2019</b> — <i>Theoretical reflected light spectra of GJ 1214 b–analog hazy sub-Neptunes</i>, ApJ 877, 109 (arXiv:1905.02963). 메탄 광분해 → 0.1–1 mbar 의 탄화수소 haze 데크 고도. cfg 가 채택한 0.90 구름 커버 분율을 확인.",
  "h3_209":"Read (context / methodology, not decision-driving)",
  "li_210":"<b>Heller R. et al. 2011</b> — <i>Tidal obliquity evolution of potentially habitable planets</i>, A&amp;A 528, A27 (arXiv:1101.2156). 1:1 lock 논거에 사용한 조석 동기화 시간 스케일 스케일링.",
  "li_211":"<b>Showman A. P. &amp; Polvani L. M. 2011</b> — <i>Equatorial superrotation on tidally locked exoplanets</i>, ApJ 738, 71 (arXiv:1103.3101). 약한 주야 haze 대비 정당화에 사용한 제트 형태.",
  "li_212":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>On the spin states of habitable zone exoplanets around M dwarfs</i>, MNRAS 472, 3217. 3:2 resonance 임계 경계. e = 0.10 에서 1:1 기본값을 지지.",
  "li_213":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution</i>, AJ 154, 109. 1.5–2 R⊕ 주변의 광증발 valley 정의. b 의 stripped-core 해석을 지지.",
  "li_214":"<b>Atri D. 2019</b> — <i>Stellar Proton Event-induced surface radiation dose as a constraint on the habitability of terrestrial exoplanets</i>, MNRAS 500, L1 (arXiv:1910.09871). 얇은 대기를 가진 지구형 외계행성의 SPE 유발 표면 도즈를 모델링. b 의 Neptune 급 두꺼운 외피에는 직접 적용되지 않음. 200 mSv/yr 값은 독립적인 자릿수 합성 추정.",
  "h3_215":"Read (instrument / non-cfg-decisive)",
  "li_216":"<b>Beichman C. A. et al. 2005</b> — <i>An excess due to small grains around HD 69830</i>, ApJ 626, 1061. 먼지 벨트 컨텍스트. b 의 대기 로의 잠재적 먼지 전달 (cfg 의 가시층에 대해 무시할 만한) 을 제약하는 한에서만 관련.",
  "h3_217":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_218":"HD 69830 b/c/d 동역학적 안정성 논문 (Ji 2007, Payne 2009) — 궤도 구조에는 관련하지만 시각에는 무관.",
  "li_219":"일반 hot-Neptune 특성화 논문 (예: GJ 436 b, HAT-P-11 b analog) — 컨텍스트만. HD 69830 b 특이성 없음.",
  "li_220":"Lisse 2007 catastrophic-event 논의 — 모성 합성에서 이미 다뤘으며, b 의 시각에 직접적인 정보가 되지 않음.",
  "h2_221":"Open items for follow-up",
  "li_222":"<b>통과 탐색 갱신.</b> 2026 년 현재 발표된 통과 검출 없음. CHEOPS / TESS short-cadence 모니터링이 grazing 지오메트리를 ruling in/out 하고 진짜 반지름을 핀할 수 있습니다. 통과가 검출되면 stripped- core vs envelope-retaining 모호성이 즉시 해소되며, cfg <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> 가 tie-break 2.6 R⊕ 에서 업데이트되어야 합니다.",
  "li_223":"<b>외피-유지 cfg 변형.</b> &quot;일차적 외피를 유지한 따뜻한 Neptune&quot; 해석 (반지름 3.17 R⊕, 밀도 ~1.7 g/cc, Neptune-analog 대기 조성) 이 cfg 변형으로 보존됩니다. stripped 해석과의 시각 차이는 궤도 뷰 스케일에서는 작으며, 내부 컷어웨이 뷰가 의미 있게 달라집니다.",
  "li_224":"<b>3:2 spin-orbit cfg 변형.</b> e = 0.10 에서 3:2 대안이 동역학적 으로 가능 (Makarov 2018). 5.78 일 자전 주기가 이주하는 haze brightening 으로 보이는 느린 substellar drift 를 생성 — 정적 동기 lock 과 다른 게임플레이 느낌.",
  "li_225":"<b>직접 대기 특성화.</b> 2026 사이클까지 JWST 프로그램이 HD 69830 b 를 타깃한 적 없음 (HD 69830 이 표준 JWST sub-Neptune 프로그램 에 비해 너무 조용 / 비통과). 미래 직접 촬영 시설 (HabEx, LUVOIR, ELT/HARMONI) 이 6 milliarcsec 각도 분리에서 b 를 해상할 수 있음 — 행성/별 명암비 ~10⁻⁹ 의 ELT 범위 안. cfg 의 haze 화학이 검증 가능해질 것.",
  "li_226":"<b>조석 가열 교차 확인.</b> e = 0.10 + Neptune 급 Q 에서 채택한 0.01 W/m² 내부 열 플럭스는 자릿수 추정. 더 엄밀한 조석-진화 모델링 (구체적 HD 69830 b 파라미터에 대한 Bolmont 2013 스타일) 이 이를 정련하고 cfg 의 내부 컷어웨이 뷰에 피드백할 수 있음.",
  "h2_227":"Related",
  "li_228":"<a href=\"hd-69830.md\">hd-69830</a> — 모성과 따뜻한 먼지 벨트 컨텍스트",

  "li_230":"<a href=\"hd-69830-d.md\">hd-69830-d</a> — 0.63 AU 먼지 벨트 외부 / 내부 자매 Neptune",
  "li_231":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 스키마",

};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
