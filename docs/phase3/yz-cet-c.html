  "h2_117":"Surface synthesis",
  "p_118":"YZ Cet c has no transit, eclipse, or transmission measurement, so its surface is inferred entirely from its minimum mass, orbit, and host illumination. The radius (1.05 R⊕) is a semi-empirical mass-radius estimate, not an observation — the same value Pineda &amp; Villadsen 2023 cite (R_c = 1.05 R⊕) from the Stock 2020 relation. The minimum mass M sin i = 1.14 M⊕ (Stock 2020) is a genuine lower bound and makes c the most massive of the three planets; the true mass is higher by 1/sin i. For cfg purposes c is treated as an Earth-mass-class rocky planet.",
  "p_119":"c is <b>warm, not molten</b>. The equilibrium temperature at zero albedo is T_eq ≈ 410 K (computed here from L = 0.0022 L☉ and a = 0.02156 AU), about 60 K cooler than the inner planet b, at ~4.7× Earth&#x27;s insolation. This is hotter than Earth but cooler than Venus&#x27;s equilibrium temperature — a genuinely warm, but not lava, world. The substellar bare-rock peak is ~450 K.",
  "p_120":"<b>Color choice.</b> Under the host&#x27;s 3100 K red-orange illumination, c is rendered as a warm iron-bearing basaltic surface (<span class=\"hex-chip\" style=\"background:#5e4a3c\"></span><code>#5e4a3c</code> primary) with oxidized iron-patch accents (<span class=\"hex-chip\" style=\"background:#74402a\"></span><code>#74402a</code>) — slightly lighter than the inner, warmer planet b, to give the compact system a perceptible inside-out temperature gradient in orbit view. The tint is low-confidence: with no eclipse or reflectance data the mineralogy is unconstrained, and the warm-rock reading is the interesting-first tie-break over a featureless grey sphere.",
  "p_121":"<b>Morphology.</b> Tidally locked (the 3.06-day orbit damps spin to synchronous within the system age), so the substellar point is fixed. Default texture is cratered rocky plains with a warm dayside and a cold nightside; no resurfacing mechanism is confirmed, so there are no forced volcanic features.",
  "h2_122":"Atmosphere synthesis",
  "p_123":"No transmission spectrum exists for YZ Cet c, so its atmosphere is a synthesis choice within the allowed window, bracketed by the same two considerations as the other planets: a thin secondary atmosphere is thermally plausible at T_eq ≈ 410 K and ~4.7× Earth insolation, but the moderately active flaring M-dwarf host with its kG field, strong wind, and the planets orbiting deep inside the stellar magnetosphere (sub-Alfvénic; Trigilio 2023) makes retention marginal.",
  "p_124":"Unlike planet b, c carries <b>no SPI signal of its own</b> — the radio bursts do not fold cleanly to c&#x27;s orbit (Pineda &amp; Villadsen 2023; Trigilio 2023 find worse agreement for c and d) — so there is no inferred magnetic field to argue for extra atmospheric shielding. c is therefore the more conservative case: a thin atmosphere is possible but less defended than on b.",
  "p_125":"For NearStars the cfg adopts a <b>thin secondary atmosphere (~0.1 bar, CO₂/N₂)</b> as the interesting-first tie-break, with the airless variant preserved in Open items. This is a low-confidence aesthetic choice giving c a faint warm limb haze (<span class=\"hex-chip\" style=\"background:#c2a07c\"></span><code>#c2a07c</code>) and some day-night heat redistribution.",
  "p_126":"<b>Sky appearance.</b> With the thin atmosphere, the daytime sky under the 3100 K star is a dim red-orange with weak Rayleigh blue near the zenith; airless, it is black with a sharp-edged stellar disk. The host star dominates the sky at ~3.9° angular diameter (about 8× the Sun from Earth), deep red-orange; the inner sibling b and outer sibling d appear as bright moving points.",
  "h2_127":"Rotation &amp; spin synthesis",
  "p_128":"YZ Cet c is tidally locked. At a = 0.0216 AU around a 0.137 M☉ star the tidal-locking timescale is far shorter than the system age, so the planet rotates synchronously with its 3.05989-day orbit. The eccentricity is adopted as circular (e = 0; Stock 2020), which makes the 1:1 spin-orbit resonance unambiguous (3:2 requires e ≳ 0.01 with triaxiality; Vinson 2017 / Makarov 2018). Obliquity is damped to zero.",
  "p_129":"<b>KSP implementation note.</b> Rotation period = orbital period = 3.05989 days = 264 374 s. In Kopernicus the body&#x27;s <code>rotationPeriod</code> equals the orbital <code>period</code> in seconds.",
  "p_130":"<b>No seasons.</b> With obliquity = 0 and a circular orbit, the substellar point is fixed in the surface frame.",
  "p_131":"The compact, near-coplanar architecture means c sits between b and d in a tightly packed resonant-adjacent chain; for the cfg the only spin consequence is the fixed substellar point and the absence of seasons.",
  "h2_132":"Visual styling",
  "p_133":"Combining the surface and atmosphere decisions:",
  "li_134":"<b>Global color palette.</b> A warm iron-toned rocky world (<span class=\"hex-chip\" style=\"background:#5e4a3c\"></span><code>#5e4a3c</code> primary, <span class=\"hex-chip\" style=\"background:#74402a\"></span><code>#74402a</code> oxidized accent) under deep red-orange 3100 K light — slightly lighter than the inner planet b, reinforcing the inside-out temperature gradient of the compact system.",
  "li_135":"<b>Dayside.</b> Warm substellar hemisphere (~450 K peak) with textured rocky plains; a faint warm limb haze if the thin atmosphere is present.",
  "li_136":"<b>Terminator band.</b> Sharp and high-contrast if airless; softened by thin-atmosphere scattering in the adopted scenario.",
  "li_137":"<b>Nightside.</b> Cold; partially warmed by atmospheric redistribution in the thin-atmosphere reading, near-black if airless. Reflected light from siblings b and d at conjunction is the main nightside source.",
  "li_138":"<b>No SPI aurora.</b> Unlike b, c is not the flux-tube driver, so it carries no inferred magnetosphere and no star-planet aurora; rendered as a plain warm rocky world.",
  "li_139":"<b>Star in sky.</b> YZ Cet subtends ~3.9° in c&#x27;s sky (≈ 8× the Sun from Earth), a pale warm orange (3100 K → <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>), flooding the surface with ~4.7× Earth&#x27;s insolation. Frequent flares from the eruptive-variable host punctuate the illumination.",
  "li_140":"<b>Sister planets in sky.</b> b (inner) and d (outer) appear as bright moving points; near-coplanar compact system with frequent conjunctions.",
  "h2_141":"Bibliography",
  "h3_142":"Read (visual-informative, drove decisions above)",
  "li_143":"<b>2020A&amp;A...636A.119S</b> Stock et al. 2020 — Phase 2 recommended source for c&#x27;s orbit (P = 3.05989 d, a = 0.02156 AU, e = 0) and minimum mass (1.14 M⊕), plus the semi-empirical radius estimate (1.05 R⊕).",
  "li_144":"<b>2304.00031</b> Pineda &amp; Villadsen 2023 — VLA SPI study; establishes that the radio bursts fold to b&#x27;s orbit, <b>not</b> c&#x27;s (worse phase agreement for c), so c is not the SPI driver. Cites R_c = 1.05 R⊕.",
  "li_145":"<b>2305.00809</b> Trigilio et al. 2023 — uGMRT SPI confirmation; same conclusion (c and d show randomly mixed detections, no orbital folding → no SPI attribution to c). Source for the c-is-not-driver decision.",
  "h3_146":"Read (context / methodology, not decision-driving)",
  "li_147":"<b>2017A&amp;A...605L..11A</b> Astudillo-Defru et al. 2017 — discovery paper; earlier c orbit/mass solution (P = 3.06008 d, M sin i = 0.98 M⊕) retained as <code>recommended:false</code>.",
  "li_148":"Host stellar synthesis (<code>yz-cet.md</code>) — the Teff/L/R/M values that set c&#x27;s illumination.",
  "h3_149":"Read (instrument-only, not visual-informative)",
  "li_150":"The radio-interferometry methodology of the two SPI papers is read for the c-not-driver conclusion but yields no additional c-specific visual field.",
  "h3_151":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_152":"No JWST, transit, or transmission-spectroscopy paper exists for c (it does not transit), so there is no eclipse/atmosphere literature to read. The generic SPI-theory references inside the two radio papers are read for context but contribute no c-specific cfg number.",
  "h2_153":"Open items for follow-up",
  "li_154":"<b>Cfg variant: airless c.</b> The adopted thin-atmosphere reading is an interesting-first tie-break; the conservative airless variant is preserved here as an alternative cfg.",
  "li_155":"<b>Radius is an estimate, not a measurement.</b> c does not transit; the 1.05 R⊕ figure is semi-empirical. A future mass/radius measurement would update the surface gravity and density.",
  "li_156":"<b>Atmosphere detection.</b> Only a future emission/phase-curve campaign could confirm or exclude the thin atmosphere; until then the pressure stays low-confidence.",
  "h2_157":"Related",

  "h2_117":"Surface synthesis",
  "p_118":"YZ Cet c 는 통과나 식, 투과 측정이 없어, 표면이 전적으로 최소질량과 궤도, 호스트 조명에서 추론됩니다. 반지름 (1.05 R⊕) 은 관측이 아니라 준경험적 질량-반지름 추정 — Pineda &amp; Villadsen 2023 이 Stock 2020 관계에서 인용한 것과 같은 값 (R_c = 1.05 R⊕) 입니다. 최소질량 M sin i = 1.14 M⊕ (Stock 2020) 은 진짜 하한이고 c 를 세 행성 중 가장 무겁게 만듭니다. 실제 질량은 1/sin i 만큼 더 큽니다. cfg 목적상 c 는 지구질량급 암석 행성으로 다룹니다.",
  "p_119":"c 는 <b>녹은 게 아니라 따뜻합니다</b>. 알베도 0 평형온도는 T_eq ≈ 410 K (여기서 L = 0.0022 L☉, a = 0.02156 AU 로 계산) 로, 안쪽 행성 b 보다 약 60 K 차갑고 지구 일사량의 ~4.7 배입니다. 지구보다 뜨겁지만 금성의 평형온도보다는 차가워 — 진짜 따뜻하지만 용암은 아닌 세계입니다. substellar 맨 암석 정점은 ~450 K 입니다.",
  "p_120":"<b>색 선택.</b> 호스트의 3100 K 적등색 조명 아래 c 는 따뜻한 철 함유 basalt 표면 (<span class=\"hex-chip\" style=\"background:#5e4a3c\"></span><code>#5e4a3c</code> primary) 에 산화철 patch accent (<span class=\"hex-chip\" style=\"background:#74402a\"></span><code>#74402a</code>) 으로 렌더링합니다 — 안쪽의 더 따뜻한 행성 b 보다 약간 밝게 해, 조밀계 가 궤도 view 에서 안→밖 온도 구배를 띠게 합니다. 색조는 low-confidence 입니다. 식이나 반사율 데이터가 없어 광물학이 제약되지 않고, 따뜻한-암석 해석은 밋밋한 회색 구체보다 나은 interesting-first tie-break 입니다.",
  "p_121":"<b>형태.</b> 조석 고정 (3.06 일 궤도가 시스템 나이 안에서 spin 을 동기 자전으로 damping) 이라 substellar 점이 고정됩니다. 기본 텍스처는 따뜻한 dayside 와 차가운 nightside 를 가진 cratered 암석 평원입니다. 확인된 재포장 메커니즘이 없으므로 강제된 화산 지형은 없습니다.",
  "h2_122":"Atmosphere synthesis",
  "p_123":"YZ Cet c 의 투과 스펙트럼이 없어, 대기는 허용 범위 안의 합성 선택이며 다른 행성들과 같은 두 고려로 bracket 됩니다. T_eq ≈ 410 K 와 ~4.7 배 지구 일사량에서 얇은 이차 대기는 열적으로 그럴듯하나, kG 자기장과 강한 풍을 가진 적당히 활동적인 flaring M-왜성 호스트와 항성 자기권 깊숙이 공전하는 행성들 (sub-Alfvénic. Trigilio 2023) 때문에 유지가 marginal 합니다.",
  "p_124":"행성 b 와 달리 c 는 <b>자신의 SPI 신호가 없습니다</b> — 전파 버스트가 c 의 궤도로 깔끔히 folding 되지 않습니다 (Pineda &amp; Villadsen 2023. Trigilio 2023 은 c 와 d 에 더 나쁜 일치를 발견) — 따라서 추가 대기 차폐를 주장할 추론된 자기장이 없습니다. 그러므로 c 는 더 보수적인 경우입니다. 얇은 대기는 가능하나 b 보다 덜 방어됩니다.",
  "p_125":"NearStars 에는 interesting-first tie-break 로 <b>얇은 이차 대기 (~0.1 bar, CO₂/N₂)</b> 를 채택하고, airless 변형은 Open items 에 보존합니다. 이는 c 에 희미한 따뜻한 사지 haze (<span class=\"hex-chip\" style=\"background:#c2a07c\"></span><code>#c2a07c</code>) 와 약간의 주야 열 재분배를 주는 low-confidence 미적 선택입니다.",
  "p_126":"<b>하늘 외형.</b> 얇은 대기가 있으면 3100 K 별 아래 낮 하늘은 천정 부근에 약한 Rayleigh 파랑을 띤 흐린 적등색입니다. airless 면 검고 별 원반은 sharp-edged 입니다. 호스트 별이 ~3.9° 각지름 (지구에서 본 태양의 약 8 배) 으로 하늘을 지배하는 깊은 적등색이고, 안쪽 형제 b 와 바깥 형제 d 는 밝게 움직이는 점으로 보입니다.",
  "h2_127":"Rotation &amp; spin synthesis",
  "p_128":"YZ Cet c 는 조석 고정입니다. 0.137 M☉ 별 주위 a = 0.0216 AU 에서 조석 고정 시간척도는 시스템 나이보다 훨씬 짧아, 행성은 3.05989 일 궤도와 동기 자전합니다. 이심률은 원궤도로 채택 (e = 0. Stock 2020) 되어 1:1 spin-orbit 공명이 명확합니다 (3:2 는 삼축성과 함께 e ≳ 0.01 필요. Vinson 2017 / Makarov 2018). 자전축 기울기는 0 으로 damping 됩니다.",
  "p_129":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 3.05989 일 = 264 374 s. Kopernicus 에서 바디의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 같습니다.",
  "p_130":"<b>계절 없음.</b> 자전축 기울기 = 0 과 원궤도에서 substellar 점은 표면 좌표계에 고정됩니다.",
  "p_131":"조밀하고 거의 동일평면인 구조에서 c 는 b 와 d 사이, 공명-인접한 빽빽한 사슬에 놓입니다. cfg 에 대한 유일한 spin 결과는 고정된 substellar 점과 계절의 부재입니다.",
  "h2_132":"Visual styling",
  "p_133":"표면과 대기 결정을 결합하면.",
  "li_134":"<b>전체 색 팔레트.</b> 깊은 적등색 3100 K 빛 아래 따뜻한 철-색조 암석 세계 (<span class=\"hex-chip\" style=\"background:#5e4a3c\"></span><code>#5e4a3c</code> primary, <span class=\"hex-chip\" style=\"background:#74402a\"></span><code>#74402a</code> 산화 accent) — 안쪽 행성 b 보다 약간 밝게 해 조밀계의 안→밖 온도 구배를 강화합니다.",
  "li_135":"<b>Dayside.</b> 따뜻한 substellar 반구 (~450 K 정점) 에 텍스처 있는 암석 평원. 얇은 대기가 있으면 희미한 따뜻한 사지 haze.",
  "li_136":"<b>Terminator 띠.</b> airless 면 sharp 하고 고대비. 채택 시나리오에서는 얇은-대기 산란으로 부드러워집니다.",
  "li_137":"<b>Nightside.</b> 차가움. 얇은-대기 해석에서는 대기 재분배로 부분 가열되고, airless 면 near-black. 충시 형제 b, d 의 반사광이 주된 nightside 광원.",
  "li_138":"<b>SPI 오로라 없음.</b> b 와 달리 c 는 flux-tube 구동체가 아니므로 추론된 자기권도 항성-행성 오로라도 없이, 평범한 따뜻한 암석 세계로 렌더링합니다.",
  "li_139":"<b>하늘의 별.</b> YZ Cet 은 c 의 하늘에서 ~3.9° (지구에서 본 태양의 약 8 배) 를 차지하는 옅은 따뜻한 주황 (3100 K → <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>) 으로, 표면을 ~4.7 배 지구 일사량으로 적십니다. 폭발 변광성 호스트의 잦은 flare 가 조명을 점점이 끊습니다.",
  "li_140":"<b>하늘의 형제 행성.</b> b (안쪽) 와 d (바깥) 가 밝게 움직이는 점으로 보입니다. 거의 동일평면 조밀계라 충이 잦습니다.",
  "h2_141":"Bibliography",
  "h3_142":"Read (visual-informative, drove decisions above)",
  "li_143":"<b>2020A&amp;A...636A.119S</b> Stock et al. 2020 — c 의 궤도 (P = 3.05989 d, a = 0.02156 AU, e = 0) 와 최소질량 (1.14 M⊕), 준경험적 반지름 추정 (1.05 R⊕) 의 Phase 2 recommended 출처.",
  "li_144":"<b>2304.00031</b> Pineda &amp; Villadsen 2023 — VLA SPI 연구. 전파 버스트가 c 가 <b>아니라</b> b 의 궤도로 folding 됨을 확립 (c 는 위상 일치가 더 나쁨). 따라서 c 는 SPI 구동체가 아닙니다. R_c = 1.05 R⊕ 인용.",
  "li_145":"<b>2305.00809</b> Trigilio et al. 2023 — uGMRT SPI 확인. 같은 결론 (c 와 d 는 검출이 궤도에 무작위로 섞여 folding 없음 → c 에 SPI 귀속 없음). c-is-not-driver 결정의 출처.",
  "h3_146":"Read (context / methodology, not decision-driving)",
  "li_147":"<b>2017A&amp;A...605L..11A</b> Astudillo-Defru et al. 2017 — 발견 논문. 이전 c 궤도/질량 해 (P = 3.06008 d, M sin i = 0.98 M⊕) 는 <code>recommended:false</code> 로 보존.",
  "li_148":"항성 합성 (<code>yz-cet.md</code>) — c 의 조명을 정하는 Teff/L/R/M 값.",
  "h3_149":"Read (instrument-only, not visual-informative)",
  "li_150":"두 SPI 논문의 전파-간섭계 방법론은 c-not-driver 결론을 위해 읽었지만 추가 c-고유 시각 필드는 주지 않습니다.",
  "h3_151":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_152":"c 의 JWST, 통과, 투과-분광 논문은 없습니다 (c 는 통과하지 않음). 따라서 읽을 식/대기 문헌이 없습니다. 두 전파 논문 안의 일반적인 SPI-이론 참고문헌은 맥락용으로 읽었지만 c-고유 cfg 수치는 주지 않습니다.",
  "h2_153":"Open items for follow-up",
  "li_154":"<b>cfg 변형: airless c.</b> 채택된 얇은-대기 해석은 interesting-first tie-break 입니다. 보수적 airless 변형은 대안 cfg 로 여기 보존합니다.",
  "li_155":"<b>반지름은 측정이 아니라 추정.</b> c 는 통과하지 않습니다. 1.05 R⊕ 수치는 준경험적입니다. 미래 질량/반지름 측정이 표면 중력과 밀도를 갱신할 것입니다.",
  "li_156":"<b>대기 검출.</b> 미래 방출/위상-곡선 캠페인만이 얇은 대기를 확인하거나 배제할 수 있습니다. 그때까지 압력은 low-confidence 입니다.",
  "h2_157":"Related",
  "li_158":"<a href=\"yz-cet.md\">yz-cet</a> — 호스트 별. 확인된 SPI 전파 오로라를 가진 M4.5 V flare star",
  "li_159":"<a href=\"yz-cet-b.md\">yz-cet-b</a> — 안쪽 형제이자 SPI 구동체 (≥ 0.4 G 자기장)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
