  "p_1":"Barnard&#x27;s Star d is the innermost of the four sub-Earth planets around Barnard&#x27;s Star, identified as a candidate by González Hernández et al. 2024 (ESPRESSO) and confirmed by Basant et al. 2025 (MAROON-X joint analysis). On a 2.3402-day orbit at 0.0188 AU it receives ~10× Earth&#x27;s insolation from the 0.003558 L☉ M4 V host — the hottest of the four, with an equilibrium temperature of 483 K (Basant 2025 Table 3, zero albedo, full heat redistribution). The minimum mass is 0.263 ± 0.024 M⊕ from the MAROON-X + ESPRESSO joint RV fit; the planet does not transit (Stefanov 2024 finds no TESS transit, i &lt; 87.9°), so radius, density, and composition are inferred from the mass-radius relation (DB radius 0.694 R⊕) and the broader hot-rocky / Mercury analog.",

  "td_145":"Barnard Teff (González Hernández 2024)",
  "h2_146":"Surface synthesis",
  "p_147":"Barnard d&#x27;s surface is the hottest in the four-planet system. Its substellar dayside peaks near 700 K — the airless no-redistribution limit for 10× Earth&#x27;s insolation at zero albedo (T_eq,full · √2) — while the planet-wide equilibrium temperature is 483 K under full heat redistribution (Basant 2025 Table 3). Critically, 700 K is far below the silicate solidus (~1300 K): d is hot <i>solid</i> rock, not a lava world. The substellar hemisphere is therefore rendered as a warmer, oranger regolith zone (accent tint <span class=\"hex-chip\" style=\"background:#9c5532\"></span><code>#9c5532</code>) rather than a magma pond. This is a deliberate physical gate — the cfg does not place a molten surface on a 483 K body, and no cited interior-heating mechanism (tidal, induction) reaches melt temperatures for a 0.26 M⊕ planet on a near-circular orbit.",
  "p_148":"The antistellar hemisphere is a deeply cold (~100 K) volatile cold-trap, analogous to Mercury&#x27;s permanently shadowed polar craters but spanning the full nightside hemisphere. Any volatiles delivered by cometary or interstellar dust influx over ~9 Gyr could be sequestered here — water ice, sulfur compounds, sodium — though no direct detection is possible for a sub-Earth USP planet at 1.8 pc. Bedrock at the terminator is iron-oxidized basalt (<span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code> cfg tint), consistent with a broad Mercury / hot-rocky regolith template; the M-dwarf illumination shifts the perceived color further into warm red-brown.",
  "p_149":"Surface morphology is inferred entirely from the Mercury analog: ~9 Gyr of accumulated impact cratering across both hemispheres. The cfg encodes this in the <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> field; specific in-game terrain generation should bias the warm substellar patch toward smoother, oranger-toned regolith and the cold antistellar hemisphere toward heavily cratered terrain.",
  "h2_150":"Atmosphere synthesis",
  "p_151":"d has no atmosphere in the conventional sense. At 0.55 g surface gravity and ~700 K substellar temperature, the Jeans escape parameter for any plausible secondary atmosphere is favorable to loss over Gyr timescales: H₂ escapes thermally, H₂O dissociates and the H escapes, and CO₂ is XUV-photolyzed with the lighter products lost. González Hernández 2024, citing France 2020, reports a still-detectable high-energy environment for this old M dwarf (log(L_X/L_bol) ≈ −5.8 from Chandra); at d&#x27;s 0.0188 AU orbit — five times closer than the habitable zone — the inner-system XUV makes cumulative atmospheric retention over the system lifetime implausible.",
  "p_152":"What survives is a vestigial sputter-driven exosphere analogous to Mercury&#x27;s. Stellar-wind ions striking the basaltic surface dislodge Na (and to lesser extents K, Ca, Mg) atoms from feldspar / pyroxene lattices; the resulting cloud is gravitationally unbound at d&#x27;s temperature but maintained by continuous sputtering. Column densities are of order 10¹⁰ atoms cm⁻², equivalent to a surface pressure of ~10⁻⁹ Pa — well below any visible Rayleigh-scattering signature, so the cfg sets <code>atmosphere_tint_rgb_hex = n/a</code>.",
  "p_153":"Episodic enhancement during Barnard&#x27;s modest flares is expected but is much weaker than the Proxima analog (Barnard is a very quiet, old M dwarf, log R&#x27;HK = −5.82; Toledo-Padrón 2019). The EUV environment of Barnard&#x27;s Star has been reconstructed by Duvvuri 2021 (DEM technique on HST + Chandra data), which underpins the radiation-environment context; transient sputtering spikes during flares do not produce visible exospheric plumes at the cfg&#x27;s scalar tint resolution.",
  "h2_154":"Rotation &amp; spin synthesis",
  "p_155":"d is tidally locked at 1:1 (synchronous) with the substellar point fixed at the planetary-frame 0° meridian. Tidal-despinning timescales for a 0.26 M⊕ rocky planet at 0.0188 AU around a 0.162 M☉ M dwarf are far shorter than the 8.5–10 Gyr system age (Walterová 2020 despinning physics), so obliquity is damped to 0° and the spin is synchronized.",
  "p_156":"The Basant 2025 best-fit eccentricity (e = 0.04 from a β-prior) is nominally non-zero but stability constraints favor e &lt; 0.02. At this low eccentricity the synchronous 1:1 resonance dominates over higher-order (e.g. 3:2 Mercury-style) configurations; if the true eccentricity sits at the high end of the posterior, a small pseudo-synchronous libration (amplitude &lt; 1°) would be expected, but the substellar point remains effectively fixed in the planetary frame.",
  "p_157":"The ~10-year stellar activity cycle (Toledo-Padrón 2019: 3800 ± 600 d) modulates substellar XUV exposure by factors of a few; this affects exospheric column density but not surface tint at the cfg&#x27;s resolution.",
  "h2_158":"Visual styling",
  "p_159":"Barnard d is the visual &quot;hot scorched rock&quot; of the system.",
  "li_160":"<b>Global appearance:</b> a warm red-brown disk (<span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code>) under deep red M4 V illumination (<code>stellar_color_temp_k = 3195</code>), with a brighter, oranger substellar accent (<span class=\"hex-chip\" style=\"background:#9c5532\"></span><code>#9c5532</code>) where the hottest bare rock and slightly elevated thermal emission combine.",
  "li_161":"<b>Dayside detail:</b> the classic hot-Mercury phase curve — a fully illuminated, near-uniformly cratered dayside with near-zero limb darkening and no atmospheric haze.",
  "li_162":"<b>Terminator band:</b> a sharp terminator with no haze ring; bare-rock bedrock tones throughout.",
  "li_163":"<b>Nightside:</b> fades rapidly into a near-black, ~100 K cold-trap hemisphere.",
  "li_164":"<b>Atmosphere haze:</b> none — the Na exosphere is far below any visible scattering signature.",
  "li_165":"<b>Star in sky:</b> Barnard subtends 5.3° in d&#x27;s sky — about 10× the apparent diameter of the Sun from Earth — and dominates the scene as a constant dim red disk.",
  "li_166":"<b>Sister planets in sky:</b> b, c, and e (all on similarly compact orbits) appear as bright moving points; at conjunction the nearest sibling subtends a small but resolvable disk.",
  "li_167":"<b>Flare modulation:</b> Barnard&#x27;s flares are weak compared to an active M dwarf; in-game rendering can encode brief, infrequent ambient brightening events, but they are subtle.",
  "p_168":"The aurora cfg fields are all <code>false</code> / <code>n/a</code> since there is no atmosphere to excite. The cumulative surface dose (cfg <code>surface_radiation_dose_msv_yr = 10000</code>, order-of-magnitude only) reaches lethal levels under normal play, making in-game habitability impossible; d is purely a hot-rocky visual destination for player exploration.",
  "h2_169":"Bibliography",
  "h3_170":"Read (visual-informative, drove decisions above)",
  "li_171":"<b>2503.08095</b> — Basant R. et al. 2025, <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>). The MAROON-X confirmation paper and the source of every load-bearing orbital/bulk value: P = 2.3402 ± 0.0003 d, M sin i = 0.263 ± 0.024 M⊕, a = 0.0188 ± 0.0003 AU, e = 0.04 (−0.03/+0.05), ω = −51.8°, T_eq = 483 K (A=0, full redistribution); SPOCK stability over 10⁹ orbits with e &lt; 0.02 favored, HZ at P = 10–42 d.",
  "li_172":"<b><a href=\"https://arxiv.org/abs/2410.00569\">2410.00569</a></b> — González Hernández J. I. et al. 2024, <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>). The ESPRESSO discovery paper; first identification of the d candidate. Activity cycle 3200 d, rotation 140 d; reports log(L_X/L_bol) ≈ −5.8 (Chandra, citing France 2020).",
  "li_173":"<b>2102.08493</b> — Duvvuri G. et al. 2021, <i>Reconstructing the EUV Emission of Cool Dwarfs</i>. DEM reconstruction of Barnard&#x27;s Star EUV from HST + Chandra; informs the radiation-environment context.",
  "li_174":"<b><a href=\"https://arxiv.org/abs/2007.12459\">2007.12459</a></b> — Walterová M. &amp; Běhounková M. 2020, <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i>. Tidal despinning into synchronous / pseudo-synchronous rotation for close-in rocky planets; basis for the tidal-lock decision.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>2410.00577</b> — Stefanov A. K. et al. 2024, <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i>. Rules out transits (&quot;no evidence of transiting Barnard b, or any other body&quot;); 3σ upper bound i &lt; 87.9°.",
  "li_177":"<b><a href=\"https://arxiv.org/abs/1812.06712\">1812.06712</a></b> — Toledo-Padrón B. et al. 2019, <i>Stellar activity analysis of Barnard&#x27;s Star</i>. P_rot = 145 ± 15 d, long-term activity cycle 3800 ± 600 d (~10 yr), log R&#x27;HK ≈ −5.86; underlies the quiet-host and activity-cycle reasoning.",
  "h3_178":"Read (instrument-only, not visual-informative)",
  "li_179":"(Limited; the d-specific deep_read set is small.)",
  "h3_180":"Not read — context-cites NOT in the paper cache (flagged for audit)",
  "p_181":"These were cited in the prior draft for physical context but are <b>not in <code>docs/phase3/_papers/</code></b> and could not be verified directly. Their specific numbers are not used as Decisions headline values:",
  "li_182":"<b>France K. et al. 2020</b> (<a href=\"https://arxiv.org/abs/2009.01259\">arXiv:2009.01259</a>) — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf</i>. NOT in cache. The prior draft&#x27;s specific figures (25% flare duty cycle, 87 Earth-atm Gyr⁻¹ loss at 0.1 AU, ×25–28 scaling, 10²⁹·²–10²⁹·⁵ erg flare energies) could not be verified and were removed from the prose; only the existence + X-ray context corroborated by González Hernández 2024 is retained.",
  "li_183":"<b>Atri D. 2020</b> — surface-radiation-dose scaling. NOT in cache; the <span class=\"field-tt\" data-ko-tip=\"표면 연간 방사선량 (mSv/yr). 지구 ≈ 2.4.\" data-en-tip=\"Annual surface radiation dose (mSv/yr). Earth natural ≈ 2.4.\"><code>surface_radiation_dose_msv_yr</code></span> row is order-of-magnitude only, Confidence low.",
  "li_184":"<b>Killen 2007 / Stamenković &amp; Spohn / Makarov 2012 / Kopparapu 2014</b> — analog/context cites (Mercury exosphere, lava-world thermal models, spin-orbit framework, HZ inner edge). Not standalone in the cache; used only as qualitative analogs, not as headline values.",
  "h3_185":"Not read — no arXiv preprint or low-priority",
  "p_186":"The bib for d is dominated by name-collision noise (Barnard the comet observer + comet &quot;d&quot; coincidences) and shared multi-planet papers cited above. Notable skipped items:",
  "li_187":"Multi-author M-dwarf planet-occurrence-rate papers that mention Barnard but do not constrain individual planet parameters.",
  "li_188":"TESS standard-candle photometric papers using Barnard as an RV standard.",
  "h2_189":"Open items for follow-up",
  "li_190":"<b>Direct mass / radius measurement</b>: d does not transit (Stefanov 2024). A future astrometric or direct-imaging campaign (Gaia DR4, JWST-MIRI) could yield a true mass and radius. The cfg <code>radius_rearth = 0.694</code> is the DB mass-radius value, not a measurement.",
  "li_191":"<b>Composition by mass-radius relation</b>: with only M sin i, the composition (rocky vs. iron-enriched) is unconstrained. The DB radius implies ρ ≈ 4.34 g/cc; a Mercury-like iron-enriched (denser, smaller) interior is also viable as a cfg variant.",
  "li_192":"<b>France 2020 (<a href=\"https://arxiv.org/abs/2009.01259\">2009.01259</a>) re-fetch</b>: re-cache the high-energy-environment paper to restore the duty-cycle and atmospheric-loss figures with direct verification. Until then, the atmosphere-loss prose is qualitative.",
  "li_193":"<b>Surface-dose paper (Atri-class)</b>: cache a primary radiation-dose scaling reference to firm up <span class=\"field-tt\" data-ko-tip=\"표면 연간 방사선량 (mSv/yr). 지구 ≈ 2.4.\" data-en-tip=\"Annual surface radiation dose (mSv/yr). Earth natural ≈ 2.4.\"><code>surface_radiation_dose_msv_yr</code></span> beyond an order-of-magnitude estimate.",
  "li_194":"<b>Volatile cold-trap signature</b>: the antistellar cold-trap could retain ices delivered over Gyr timescales. A future cfg variant could add a <code>subsurface_ice</code> patch.",
  "li_195":"<b>Eccentricity vs. stability</b>: Basant 2025 reports e = 0.04 but stability favors e &lt; 0.02. A future joint-fit with tighter priors could refine the orbital eccentricity (and the pseudo-sync libration note).",

  ko: {
  "p_1":"Barnard&#x27;s Star d 는 Barnard&#x27;s Star 를 도는 네 sub-Earth 행성 중 가장 안쪽에 있는 행성입니다. González Hernández 외 2024 (ESPRESSO) 가 후보로 식별했고 Basant 외 2025 (MAROON-X 공동 분석) 가 확정했습니다. 2.3402-일 궤도·0.0188 AU 에서 0.003558 L☉ 의 M4 V 호스트로부터 지구의 약 10× 일사를 받으며, 네 행성 중 가장 뜨겁습니다. 평형 온도는 483 K 입니다 (Basant 2025 Table 3, 알베도 0·완전 열재분배 가정). 최소 질량은 MAROON-X + ESPRESSO 공동 RV 피팅에서 0.263 ± 0.024 M⊕ 이며, 행성은 transit 을 보이지 않으므로 (Stefanov 2024 의 TESS 비검출, i &lt; 87.9°) 반지름·밀도·조성은 질량-반지름 관계 (DB 반지름 0.694 R⊕) 와 더 폭넓은 hot-rocky / Mercury analog 에서 추론합니다.",
  "p_2":"궤도의 최적합 이심률은 낮습니다 (e = 0.04, −0.03/+0.05, Basant 2025 의 β 분포 prior). 원에 가깝지만 정확한 원은 아닙니다. Basant 논문의 SPOCK 동역학적 안정성 테스트는, 이심률 0 과 경사 20°–90° 에서 가장 짧은 주기 행성인 d 의 10⁹ 궤도에 걸쳐 4-행성 구성이 안정적으로 유지됨을 보입니다. 장기 유지를 위해서는 e &lt; 0.02 가 선호됩니다. 2.34-일 주기는 조석 잠금 시간 척도를 8.5–10 Gyr 시스템 나이보다 훨씬 짧게 만들므로 (Walterová 2020 의 despinning 물리), d 는 1:1 동기 회전으로 잠겨 있습니다.",
  "p_3":"약 10× 일사에서 d 는 Mercury 와 비교됩니다. 모든 거주 가능 영역 정의의 한참 안쪽입니다 (Basant 은 이 호스트의 HZ 가 P = 10–42 d 임을 확인하며, d 의 2.34-일 궤도는 네 행성 중 가장 안쪽입니다). 이 노쇠한 M 왜성이지만 검출 가능한 고에너지 환경 (González Hernández 2024 가 France 2020 을 인용해 Chandra 로부터 log(L_X/L_bol) ≈ −5.8 을 보고) 과 결합하면, d 의 0.0188 AU 궤도 — 거주 가능 영역보다 다섯 배 더 가까운 — 에서의 내부 시스템 XUV 노출은 Gyr 시간 척도의 대기 유지를 비현실적으로 만듭니다. cfg 는 Mercury analog 해석을 채택합니다. 노출된 basalt 표면, 별바람 sputtering 으로 생성되는 잔여 sodium-vapor exosphere, 그리고 의미 있는 대기 차폐 없음.",
  "p_4":"<b>NearStars 시나리오 선택. 산화철 basalt regolith, 더 따뜻한 substellar 영역 (마그마가 아닌 뜨거운 암석 — T_eq 483 K 는 silicate solidus 를 한참 밑돕니다), 그리고 sputtering 으로 구동되는 얇은 Na exosphere 를 가진, 뜨거운 조석잠금 sub-Earth 노출 암석 행성입니다. 네 Barnard 행성 중 가장 뜨거운 d 는 이 시스템에서 &quot;그을린 암석&quot; 렌더링의 시각 벤치마크입니다.</b> 이는 canonical-aligned 합성입니다. 궤도·bulk 매개변수는 Basant 2025 로 직접 추적되고, 표면·exosphere 시각은 윈도우 내 tie-break 입니다. 문서화된 divergence 는 없습니다 — d 는 너무 새로 발견되어 canonical climate 모델이 아직 없으며, tie-break 선택들에는 발산할 만한 weight-advantaged canonical reading 자체가 없습니다.",

  "h2_146":"Surface synthesis",
  "p_147":"Barnard d 의 표면은 4-행성 시스템에서 가장 뜨겁습니다. substellar dayside 는 약 700 K 까지 오릅니다 — 10× 일사·알베도 0 에서의 무대기 재분배-없음 한계 (T_eq,full · √2) — 한편 완전 열재분배 하의 행성-전체 평형 온도는 483 K 입니다 (Basant 2025 Table 3). 결정적으로 700 K 는 silicate solidus (~1300 K) 를 한참 밑돕니다. d 는 용암 세계가 아니라 뜨거운 <i>고체</i> 암석입니다. 따라서 substellar 반구는 마그마 풀이 아니라 더 따뜻하고 오렌지빛의 regolith 영역 (액센트 톤 <span class=\"hex-chip\" style=\"background:#9c5532\"></span><code>#9c5532</code>) 으로 렌더링됩니다. 이는 의도적인 물리 게이트입니다 — cfg 는 483 K 바디에 용융 표면을 두지 않으며, 인용된 어떤 내부 가열 메커니즘 (조석, 유도) 도 근-원형 궤도의 0.26 M⊕ 행성에 대해 용융 온도에 도달하지 않습니다.",
  "p_148":"antistellar 반구는 깊이 차가운 (~100 K) 휘발성 cold-trap 이며, Mercury 의 영구 그림자 극지 크레이터의 analog 이지만 nightside 반구 전체를 포괄합니다. ~9 Gyr 에 걸쳐 혜성이나 성간 먼지 유입으로 전달된 휘발성은 여기 sequester 될 수 있습니다 — 물 얼음, 황 화합물, sodium — 비록 1.8 pc 의 sub-Earth USP 행성에 대해 직접 검출은 불가능합니다. terminator 의 bedrock 은 산화철 basalt (<span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code> cfg 톤) 이며, 폭넓은 Mercury / hot-rocky regolith 템플릿과 일관됩니다. M 왜성 조명이 인지된 색을 더욱 따뜻한 빨강-갈색 쪽으로 기울입니다.",
  "p_149":"표면 형태는 전적으로 Mercury analog 에서 추론됩니다. ~9 Gyr 의 누적 충돌 cratering 이 양 반구에 걸쳐 있습니다. cfg 는 이를 <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> 필드에 인코딩합니다. 특정 게임 내 지형 생성은 따뜻한 substellar 패치를 더 매끄럽고 오렌지빛의 regolith 로, 차가운 antistellar 반구를 크게 cratered 된 지형으로 편향해야 합니다.",
  "h2_150":"Atmosphere synthesis",
  "p_151":"d 는 통상적인 의미의 대기가 없습니다. 0.55 g 표면 중력과 ~700 K substellar 온도에서, 어떤 plausible 2차 대기에 대해서도 Jeans escape 매개변수는 Gyr 시간 척도에 걸쳐 손실에 유리합니다. H₂ 는 열적으로 escape 하고, H₂O 는 해리되어 H 가 escape 하며, CO₂ 는 XUV 광분해되어 더 가벼운 산물이 손실됩니다. González Hernández 2024 는 France 2020 을 인용해 이 노쇠한 M 왜성에 여전히 검출 가능한 고에너지 환경이 있음을 보고합니다 (Chandra 로부터 log(L_X/L_bol) ≈ −5.8). d 의 0.0188 AU 궤도 — 거주 가능 영역보다 다섯 배 더 가까운 — 에서의 내부 시스템 XUV 는 시스템 수명에 걸친 누적 대기 유지를 비현실적으로 만듭니다.",
  "p_152":"살아남는 것은 Mercury 의 sputter-구동 exosphere analog 입니다. 별바람 이온이 basalt 표면을 두드려 feldspar / pyroxene 격자에서 Na (그리고 정도가 덜한 K, Ca, Mg) 원자를 분리시키며, 그 결과 d 의 온도에서 중력적으로 unbound 이지만 지속 sputtering 으로 유지되는 구름이 됩니다. 칼럼 밀도는 ~10¹⁰ atoms cm⁻², 표면 압력은 ~10⁻⁹ Pa 등가 — 가시 Rayleigh 산란 서명을 한참 밑돌아, cfg 는 <code>atmosphere_tint_rgb_hex = n/a</code> 를 설정합니다.",
  "p_153":"Barnard 의 모데스트한 flare 동안의 에피소드 강화는 예상되지만 Proxima analog 보다 훨씬 약합니다 (Barnard 은 매우 조용한 노쇠 M 왜성, log R&#x27;HK = −5.82. Toledo-Padrón 2019). Barnard&#x27;s Star 의 EUV 환경은 Duvvuri 2021 이 재구성했으며 (HST + Chandra 데이터에 대한 DEM 기법), 이것이 복사 환경 컨텍스트를 뒷받침합니다. flare 동안의 일시적 sputtering 증가는 cfg 의 스칼라 톤 해상도에서 가시 exospheric plume 을 만들지 않습니다.",
  "h2_154":"Rotation &amp; spin synthesis",
  "p_155":"d 는 1:1 (동기) 로 조석 잠겨 있으며 substellar 점이 행성 프레임 0° 경도에 고정되어 있습니다. 0.162 M☉ M 왜성 주위 0.0188 AU 의 0.26 M⊕ 암석 행성에 대한 조석 despinning 시간 척도는 8.5–10 Gyr 시스템 나이보다 훨씬 짧으므로 (Walterová 2020 despinning 물리), 경사는 0° 로 감쇠되고 스핀은 동기화됩니다.",
  "p_156":"Basant 2025 의 최적합 이심률 (β-prior 에서 e = 0.04) 은 명목상 0 이 아니지만, 안정성 제약은 e &lt; 0.02 를 선호합니다. 이 낮은 이심률에서는 동기 1:1 공명이 고차 (예. 3:2 Mercury 스타일) 구성보다 지배적입니다. 실제 이심률이 posterior 의 높은 쪽에 있다면 작은 pseudo-synchronous libration (진폭 &lt; 1°) 이 예상되지만, substellar 점은 행성 프레임에서 사실상 고정되어 있습니다.",
  "p_157":"~10 년 항성 활동 사이클 (Toledo-Padrón 2019. 3800 ± 600 d) 은 substellar XUV 노출을 수배 변조합니다. 이는 exosphere 칼럼 밀도에 영향을 미치지만 cfg 의 해상도에서 표면 톤에는 영향을 주지 않습니다.",
  "h2_158":"Visual styling",
  "p_159":"Barnard d 는 시스템의 시각적 &quot;뜨거운 그을린 암석&quot; 입니다.",
  "li_160":"<b>글로벌 외관.</b> 딥 레드 M4 V 조명 (<code>stellar_color_temp_k = 3195</code>) 아래 따뜻한 빨강-갈색 원반 (<span class=\"hex-chip\" style=\"background:#6a3a26\"></span><code>#6a3a26</code>). 가장 뜨거운 노출 암석과 약간 상승한 열복사가 결합한 더 밝고 오렌지빛의 substellar 액센트 (<span class=\"hex-chip\" style=\"background:#9c5532\"></span><code>#9c5532</code>) 가 있습니다.",
  "li_161":"<b>Dayside 디테일.</b> 고전적인 hot-Mercury 위상 곡선 — 거의 0 인 limb darkening 과 대기 헤이즈 없는, 완전히 조명되고 거의 균일하게 cratered 된 dayside.",
  "li_162":"<b>Terminator 밴드.</b> 헤이즈 링 없는 날카로운 terminator. 전체에 걸쳐 노출 암석 bedrock 톤.",
  "li_163":"<b>Nightside.</b> 거의 검은색의 ~100 K cold-trap 반구로 빠르게 페이드 아웃합니다.",
  "li_164":"<b>대기 헤이즈.</b> 없음 — Na exosphere 는 가시 산란 서명을 한참 밑돕니다.",
  "li_165":"<b>하늘의 별.</b> Barnard 는 d 의 하늘에서 5.3° 를 차지 — 지구에서 본 태양의 약 10× — 하며, 일정한 어둑한 빨강 원반으로 장면을 지배합니다.",
  "li_166":"<b>하늘의 형제 행성들.</b> b, c, e (모두 비슷하게 컴팩트한 궤도) 는 밝게 움직이는 점으로 나타나며, 합 시점에 가장 가까운 형제는 작지만 분해 가능한 원반을 차지합니다.",
  "li_167":"<b>Flare 변조.</b> Barnard 의 flare 는 활동적인 M 왜성에 비해 약합니다. 게임 내 렌더링은 짧고 드문 주변광 brightening 사건을 인코딩할 수 있지만, 미묘합니다.",
  "p_168":"aurora cfg 필드는 모두 <code>false</code> / <code>n/a</code> 인데, 여기시킬 대기가 없기 때문입니다. 누적 표면 dose (cfg <code>surface_radiation_dose_msv_yr = 10000</code>, 자릿수 추정만) 는 정상 플레이 하에서 치명적 수준에 도달하며, 게임 내 거주 가능성을 불가능하게 만듭니다. d 는 순수하게 플레이어 탐험을 위한 hot-rocky 시각 목적지입니다.",
  "h2_169":"Bibliography",
  "h3_170":"Read (visual-informative, drove decisions above)",
  "li_171":"<b>2503.08095</b> — Basant R. 외 2025, <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>). MAROON-X 확인 논문이며 모든 load-bearing 궤도/bulk 값의 출처. P = 2.3402 ± 0.0003 d, M sin i = 0.263 ± 0.024 M⊕, a = 0.0188 ± 0.0003 AU, e = 0.04 (−0.03/+0.05), ω = −51.8°, T_eq = 483 K (A=0, full redistribution). e &lt; 0.02 선호로 10⁹ 궤도 SPOCK 안정성, HZ 는 P = 10–42 d.",
  "li_172":"<b><a href=\"https://arxiv.org/abs/2410.00569\">2410.00569</a></b> — González Hernández J. I. 외 2024, <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>). ESPRESSO 발견 논문. d 후보의 첫 식별. 활동 사이클 3200 d, 회전 140 d. France 2020 을 인용해 log(L_X/L_bol) ≈ −5.8 (Chandra) 보고.",
  "li_173":"<b>2102.08493</b> — Duvvuri G. 외 2021, <i>Reconstructing the EUV Emission of Cool Dwarfs</i>. HST + Chandra 로부터 Barnard&#x27;s Star EUV 의 DEM 재구성. 복사 환경 컨텍스트 정보 제공.",
  "li_174":"<b><a href=\"https://arxiv.org/abs/2007.12459\">2007.12459</a></b> — Walterová M. &amp; Běhounková M. 2020, <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i>. 근접 암석 행성의 동기 / pseudo-synchronous 회전으로의 조석 despinning. 조석 잠금 결정의 근거.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>2410.00577</b> — Stefanov A. K. 외 2024, <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i>. transit 배제 (&quot;no evidence of transiting Barnard b, or any other body&quot;). 3σ 상한 i &lt; 87.9°.",
  "li_177":"<b><a href=\"https://arxiv.org/abs/1812.06712\">1812.06712</a></b> — Toledo-Padrón B. 외 2019, <i>Stellar activity analysis of Barnard&#x27;s Star</i>. P_rot = 145 ± 15 d, 장기 활동 사이클 3800 ± 600 d (~10 yr), log R&#x27;HK ≈ −5.86. 조용한 호스트·활동 사이클 추론의 기반.",
  "h3_178":"Read (instrument-only, not visual-informative)",
  "li_179":"(제한적. d-특화 deep_read 세트가 작음.)",
  "h3_180":"Not read — context-cites NOT in the paper cache (flagged for audit)",
  "p_181":"이들은 이전 드래프트에서 물리 컨텍스트로 인용되었으나 <b><code>docs/phase3/_papers/</code> 에 없어</b> 직접 검증할 수 없었습니다. 이들의 구체 수치는 Decisions 헤드라인 값으로 사용하지 않습니다.",
  "li_182":"<b>France K. 외 2020</b> (<a href=\"https://arxiv.org/abs/2009.01259\">arXiv:2009.01259</a>) — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf</i>. 캐시에 없음. 이전 드래프트의 구체 수치 (25% flare 듀티 사이클, 0.1 AU 에서 87 지구대기 Gyr⁻¹ 손실, ×25–28 스케일링, 10²⁹·²–10²⁹·⁵ erg flare 에너지) 는 검증할 수 없어 prose 에서 제거했고, González Hernández 2024 가 corroborate 하는 존재 + X-ray 컨텍스트만 유지합니다.",
  "li_183":"<b>Atri D. 2020</b> — 표면 복사 dose 스케일링. 캐시에 없음. <span class=\"field-tt\" data-ko-tip=\"표면 연간 방사선량 (mSv/yr). 지구 ≈ 2.4.\" data-en-tip=\"Annual surface radiation dose (mSv/yr). Earth natural ≈ 2.4.\"><code>surface_radiation_dose_msv_yr</code></span> 행은 자릿수 추정만이며 Confidence low.",
  "li_184":"<b>Killen 2007 / Stamenković &amp; Spohn / Makarov 2012 / Kopparapu 2014</b> — analog/context 인용 (Mercury exosphere, 용암 세계 열 모델, spin-orbit 프레임워크, HZ 안쪽 가장자리). 캐시에 standalone 으로 없음. 헤드라인 값이 아니라 정성적 analog 으로만 사용.",
  "h3_185":"Not read — no arXiv preprint or low-priority",
  "p_186":"d 의 bib 은 이름 충돌 잡음 (혜성 관측자 Barnard + 혜성 &quot;d&quot; 우연) 과 상기 인용된 공유 다행성 논문이 지배합니다. 주목할 스킵 항목.",
  "li_187":"Barnard 를 언급하지만 개별 행성 매개변수를 제약하지 않는 다중 저자 M 왜성 행성 발생률 논문.",
  "li_188":"Barnard 를 RV 표준으로 사용하는 TESS 표준 칸델라 광도 논문.",
  "h2_189":"Open items for follow-up",
  "li_190":"<b>직접 질량 / 반지름 측정</b>. d 는 transit 을 보이지 않습니다 (Stefanov 2024). Gaia DR4, JWST-MIRI 와의 미래 astrometric 또는 직접 영상 캠페인이 실제 질량과 반지름을 산출할 수 있습니다. cfg <code>radius_rearth = 0.694</code> 는 측정이 아니라 DB 질량-반지름 값입니다.",
  "li_191":"<b>질량-반지름 관계에 의한 조성</b>. M sin i 만으로는 조성 (암석 vs. 철 농축) 이 제약되지 않습니다. DB 반지름은 ρ ≈ 4.34 g/cc 를 함의하며, Mercury 류 철 농축 (더 조밀하고 작은) 내부도 cfg 변이로 viable.",
  "li_192":"<b>France 2020 (<a href=\"https://arxiv.org/abs/2009.01259\">2009.01259</a>) 재페치</b>. 고에너지-환경 논문을 재캐시해 듀티 사이클과 대기-손실 수치를 직접 검증으로 복원해야 합니다. 그때까지 대기-손실 prose 는 정성적입니다.",
  "li_193":"<b>표면-dose 논문 (Atri 류)</b>. 1차 복사 dose 스케일링 레퍼런스를 캐시해 <span class=\"field-tt\" data-ko-tip=\"표면 연간 방사선량 (mSv/yr). 지구 ≈ 2.4.\" data-en-tip=\"Annual surface radiation dose (mSv/yr). Earth natural ≈ 2.4.\"><code>surface_radiation_dose_msv_yr</code></span> 을 자릿수 추정 이상으로 단단하게 만들어야 합니다.",
  "li_194":"<b>휘발성 cold-trap 서명</b>. antistellar cold-trap 은 Gyr 시간 척도에 걸쳐 전달된 얼음을 retain 할 수 있습니다. 미래 cfg 변이는 <code>subsurface_ice</code> 패치를 추가할 수 있습니다.",
  "li_195":"<b>이심률 vs. 안정성</b>. Basant 2025 는 e = 0.04 를 보고하지만 안정성은 e &lt; 0.02 를 선호합니다. 더 단단한 prior 와의 미래 공동 피팅이 궤도 이심률 (그리고 pseudo-sync libration 노트) 을 개선할 수 있습니다.",
  "h2_196":"Related",
  "li_197":"<a href=\"barnards-star.html\">barnards-star</a> — 호스트 별. 조용한 노쇠 M4 V. 약한 flare 환경",
  "li_198":"<a href=\"barnards-star-b.html\">barnards-star-b</a> — 다음 바깥 형제 (여전히 뜨거운 암석)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>

</body>
</html>
