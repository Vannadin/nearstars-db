  "h2_149":"Surface synthesis",
  "p_150":"HD 219134 h has no solid surface — it is a Saturn-class H₂/He gas giant at Msini ≈ 0.340 M_Jup. The &quot;surface&quot; relevant for visual rendering is the cloud deck, conventionally referenced to the 1 bar pressure level where the optical opacity transitions from clear gas above to dense particulate-laden gas below.",
  "p_151":"The defining caveat is that <b>h does not transit</b>: its radius is unmeasured, so radius, gravity, density, and scale height are estimates flagged at low confidence. The cfg adopts an evolutionary-track estimate: Saturn itself is 0.83 R_Jup at 0.30 M_Jup, and Fortney 2007 cooling tracks for a 0.34 M_Jup giant at Gyr ages give ~0.9–1.0 R_Jup; the cfg picks 0.95 R_Jup as the mid-range, giving ~3.8 g⊕ surface gravity and ~0.55 g/cc bulk density (a low-density cold jovian, less dense even than Saturn&#x27;s 0.69 g/cc, as expected for a cooler less- compressed envelope). The radius could be revised by a future transit or direct-imaging detection.",
  "p_152":"The equilibrium temperature is just 113 K (derived) — the coldest in the system, comparable to Saturn&#x27;s ~95 K. At this temperature ammonia condenses into a white cloud deck at the ~0.5–1 bar level, exactly as on Saturn. The cfg renders h as a cold Saturn analog: a warm-cream banded jovian. Under the host&#x27;s 4858 K orange illumination, the intrinsically near-white ammonia clouds are perceived warmer than the Sun-illuminated Saturn, giving the warm-cream cloud tint <span class=\"hex-chip\" style=\"background:#f0e6d2\"></span><code>#f0e6d2</code> (a tie-break — no spectrum exists).",
  "h2_153":"Atmosphere synthesis",
  "p_154":"The atmospheric inference for h is theoretical (no transit, no spectrum), but the Saturn-class mass and the 113 K temperature fix it confidently as a cold jovian.",
  "p_155":"<b>Atmosphere present.</b> At 0.340 M_Jup, h is a hydrogen-helium gas giant by definition; the bulk H₂/He composition follows from the mass and the cold equilibrium temperature. The cfg adopts a cold solar-composition jovian inventory (Lodders 2003 protosolar abundances): H₂ ~85%, He ~13%, with CH₄, NH₃, and deep H₂O, and the condensation chemistry truncated at the 113 K equilibrium where ammonia ices out. This is the canonical cold-Saturn composition (a tie-break — no measured spectrum).",
  "p_156":"<b>Sky appearance.</b> From above the cloud deck, the sky is a warm-cream ammonia haze. The host star HD 219134 subtends only ~0.124° at h (about 1.2× the Sun&#x27;s apparent size from Earth — modest, because h is 3.1 AU out) and reads warm-orange. The insolation is just 0.027 S⊕, so the cloud deck is dimly lit; the internal heat flux (~1 W/m², a tie-break) contributes to the deep convective banding.",
  "h2_157":"Rotation &amp; spin synthesis",
  "p_158":"At 3.11 AU on a 6.15-year orbit, h is far too distant for any tidal interaction — the tidal-damping timescale exceeds the age of the universe, so h rotates freely and is not locked.",
  "p_159":"<b>KSP implementation note.</b> With no rotation measurement, the cfg assigns a Saturn-analog ~11-hour rotation period (a tie-break, low confidence — cold low-mass jovians rotate rapidly, like Saturn&#x27;s 10.7 h). Obliquity is set to a Saturn-like 26° (interesting-first tie-break) to give a visually distinctive ring-axis tilt and mild seasonal banding.",
  "p_160":"<b>Mild seasons.</b> The curated eccentricity is 0.06 — small but non-zero — giving a peri-to-apo insolation range of S = (1 ± e)⁻² × 0.027 ≈ 0.024 → 0.030 S⊕ over the 6.15-yr orbit. Combined with the 26° obliquity, this produces a gentle seasonal modulation of the cloud-band pattern, far milder than the inner planets because the absolute insolation is so low.",
  "h2_161":"Visual styling",
  "p_162":"Combining the atmosphere and ring decisions for a cold Saturn-class gas giant:",
  "li_163":"<b>Global appearance (orbit view).</b> A warm-cream banded jovian — a cold Saturn analog — with an optional Saturn-like icy ring tilted at ~26° to the orbital plane. The ring, if rendered, is the most visually distinctive feature in the outer system.",
  "li_164":"<b>Cloud bands.</b> Warm-cream zonal bands (<span class=\"hex-chip\" style=\"background:#f0e6d2\"></span><code>#f0e6d2</code>) with an ammonia-ice cloud deck at ~0.5–1 bar and belt/zone contrast (a tie-break — no GCM, Saturn-analog band structure).",
  "li_165":"<b>Limb haze.</b> A warm-cream ammonia haze (<span class=\"hex-chip\" style=\"background:#e8dcc4\"></span><code>#e8dcc4</code>) at the limb, giving a soft jovian terminator.",
  "li_166":"<b>Saturn-like ring (artistic option, NOT observed).</b> A single broad icy ring from ~0.0008 to ~0.0016 AU (≈ 1.2–2.3 planet radii), ring color <span class=\"hex-chip\" style=\"background:#e0d8c8\"></span><code>#e0d8c8</code> (icy near-neutral, faintly warmed by the orange host light), opacity 0.6 — visibly opaque-to-translucent. This is an artistic cfg option: no ring is observed (h is RV-only with no imaging), but a cold gas giant makes icy rings physically plausible, so the ring is offered per the disk-color policy with <code>ring_observed = false</code>. The cfg can ship h with or without the ring.",
  "li_167":"<b>Star in sky.</b> HD 219134 subtends only ~0.124° at h — about 1.2× the Sun&#x27;s angular size from Earth, warm-orange, illuminating the cloud deck at just ~0.027× Earth-noon brightness (a dim, cold-jovian sky).",
  "li_168":"<b>Sister planets in sky.</b> All five inner planets (b, c, d, f, g) appear interior to h as bright points; the system&#x27;s transiting pair and contested planets are far inside. Near-coplanar geometry.",
  "li_169":"<b>Optional moon system.</b> A cold Saturn-class giant at 3.1 AU could plausibly host a regular satellite system within its Hill sphere (the disk-color / ring-candidate note); this is a moon candidate for the stability simulator rather than a Phase 3 decision, and is not rendered here.",
  "h2_170":"Bibliography",
  "h3_171":"Read (visual-informative, drove decisions above)",
  "li_172":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT solution; the source for h&#x27;s orbit (P = 2247 d, a = 3.11 AU, e = 0.06) and minimum mass (Msini = 108.0 M⊕ = 0.340 M_Jup, recommended). <b>The anchor for h&#x27;s orbit and mass.</b> (h was also detected in Motalebi 2015 as the long-period giant.)",
  "li_173":"<b>Fortney J. J. et al. 2007</b> — <i>Planetary radii across five orders of magnitude in mass and stellar insolation</i>, ApJ 659, 1661 (<code>2007ApJ...659.1661F</code>, arXiv:astro-ph/0612671). Evolutionary radius tracks; gives the R ≈ 0.9–1.0 R_Jup estimate for a 0.34 M_Jup giant at Gyr ages. Drives the (low-confidence) <code>radius_rjup</code> estimate.",
  "li_174":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i>, ApJ 591, 1220 (<code>2003ApJ...591.1220L</code>). Protosolar abundances; sets the cold solar-composition jovian <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>.",
  "h3_175":"Read (context / methodology, not decision-driving)",
  "li_176":"<b>Motalebi F. et al. 2015</b> — A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). HARPS-N detection of the long-period giant; corroborates h&#x27;s orbit and mass.",
  "li_177":"<b>Li L. et al. 2018</b> — <i>Less absorbed solar energy and more internal heat for Jupiter</i>, Nat. Commun. 9, 3709 (<code>2018NatCo...9.3709L</code>). Saturn/Jupiter Bond albedo and internal-flux reference values used for the <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> and <code>intrinsic_luminosity_w_m2</code> tie-breaks.",
  "li_178":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited host parameters (L for the insolation/T_eq derivation).",
  "h3_179":"Read (instrument-only, not visual-informative)",
  "li_180":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). The transiting b/c study; h is non- transiting and far interior to nothing here, characterized only via the RV solution.",
  "h3_181":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_182":"The h-specific arXiv record is small (RV-only cold giant, no transit or imaging). The not-read set is dynamical-stability follow-ups (h anchors the outer system in the Vogt 2015 solution) and generic cold-jovian evolutionary-model papers that do not change the cold-Saturn rendering set by the mass and temperature. No ring or moon imaging exists (the ring is an artistic option, not an observation).",
  "h2_183":"Open items for follow-up",
  "li_184":"<b>True mass and radius.</b> h&#x27;s mass is Msini-only and the radius is an evolutionary-track estimate at low confidence. A future astrometric inclination (Gaia DR5+, where a 0.34 M_Jup planet at 3.1 AU around a nearby star is a strong astrometric target) or direct-imaging detection would convert Msini to true mass and constrain the radius.",
  "li_185":"<b>Ring confirmation.</b> The Saturn-like ring is an artistic option, <code>ring_observed = false</code>. No imaging exists to confirm or exclude a ring. The cfg ships h with the ring as an optional toggle; if a future direct-imaging campaign rules it out, the no-ring variant becomes the default.",
  "li_186":"<b>Moon system.</b> A cold Saturn-class giant at 3.1 AU could host a regular satellite system; this is a candidate for the stability simulator (<code>phase3/stability-sim/</code>) rather than a Phase 3 decision.",
  "li_187":"<b>Atmospheric spectrum.</b> No spectrum exists; a future direct-imaging spectrum would replace the tie-break composition and cloud tints with measured values.",
  "h2_188":"Related",
  "li_189":"<a href=\"hd-219134.html\">hd-219134</a> — host star Phase 3 synthesis",

  ko: {
  "p_1":"HD 219134 h 는 밝고 조용한 K3 V 왜성 HD 219134 의 차가운 외곽 가스 거인으로, a = 3.11 AU 의 2247 일 (6.15 년) 궤도에 작은 이심률 e = 0.06 을 가집니다 (Vogt et al. 2015, Keck/HIRES + APT recommended). RV-only 입니다 — transit 없음, 측정 반지름 없음 — 최소 질량은 Msini = 108.0 ± 6.36 M⊕ = <b>0.340 M_Jup</b> 인 cold Saturn-class 가스 거인입니다. 시스템에서 단연 가장 차갑습니다 — 프로젝트 공식 T_eq = 278.3 · L^0.25 / √a (L = 0.264) 에서 평형 온도는 zero albedo 에서 겨우 113 K 로, 토성의 ~95 K 에 견줄 만합니다. ~3.1 AU 에서 행성은 안쪽 super-Earth 계열보다 한참 바깥에 자리하며, 여섯 행성 시스템의 장주기 앵커입니다.",
  "p_2":"<b>NearStars 시나리오 선택은 K3 V 조명 아래 따뜻한 cream 으로 렌더링된 암모니아-얼음 구름 deck, 측정 반지름이 없는 (추정 전용, 낮은 신뢰도), 그리고 — 선택적 예술 feature 로서 — 토성 같은 얼음 고리계를 가진 cold Saturn-class 가스 거인입니다.</b> 0.340 M_Jup 와 113 K 에서 h 는 암모니아가 응결해 흰 구름 deck 을 만드는 차가운 jovian 으로, 토성과 매우 닮았습니다. 고리는 <b>관측되지 않았으나</b> (RV-only, 영상 없음), 차가운 가스 거인은 얼음 고리를 물리적으로 그럴듯하게 만들므로, disk-color 정책에 따라 토성 같은 고리를 예술적 cfg 옵션으로 제공하고 <code>ring_observed = false</code> 로 표시합니다. documented divergence 없음 — 모든 값은 Vogt 2015 Phase 2 recommended 질량, 제시된 유도, 또는 흥미로움 우선 tie-break (고리가 주된 것으로, 예술적이라 표시) 로 추적됩니다.",

  "td_148":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_149":"표면 합성",
  "p_150":"HD 219134 h 는 고체 표면이 없습니다 — Msini ≈ 0.340 M_Jup 의 Saturn-class H₂/He 가스 거인입니다. 시각 렌더링에 관련된 &quot;표면&quot;은 통상 1 bar 압력 레벨로 기준되는 구름 deck 으로, 여기서 광학 불투명도가 위의 맑은 기체에서 아래의 입자 가득한 조밀 기체로 전환됩니다.",
  "p_151":"결정적 단서는 <b>h 가 transit 하지 않는다</b>는 점입니다. 반지름이 측정되지 않아 반지름, 중력, 밀도, scale height 는 낮은 신뢰도로 표시된 추정입니다. cfg 는 진화-트랙 추정을 채택합니다 — 토성 자체는 0.30 M_Jup 에서 0.83 R_Jup 이고, Fortney 2007 냉각 트랙은 Gyr 나이의 0.34 M_Jup 거인에 대해 ~0.9–1.0 R_Jup 를 줍니다. cfg 는 mid-range 0.95 R_Jup 를 선택해 표면 중력 ~3.8 g⊕ 와 bulk 밀도 ~0.55 g/cc (토성의 0.69 g/cc 보다도 낮은 저밀도 차가운 jovian. 더 차갑고 덜 압축된 envelope 에서 예상됨) 를 줍니다. 반지름은 향후 transit 이나 직접 영상 검출로 수정될 수 있습니다.",
  "p_152":"평형 온도는 겨우 113 K (유도) 로 — 시스템에서 가장 차갑고 토성의 ~95 K 에 견줄 만합니다. 이 온도에서 암모니아가 ~0.5–1 bar 레벨의 흰 구름 deck 으로 응결하는데, 토성에서와 똑같습니다. cfg 는 h 를 차가운 토성 유사체로 렌더링합니다 — 따뜻한 cream 띠 jovian 입니다. 호스트의 4858 K 오렌지 조명 아래에서 본래 거의 흰 암모니아 구름은 태양 조명 토성보다 따뜻하게 인지되어, 따뜻한 cream 구름 tint <span class=\"hex-chip\" style=\"background:#f0e6d2\"></span><code>#f0e6d2</code> 를 줍니다 (tie-break — 스펙트럼 없음).",
  "h2_153":"대기 합성",
  "p_154":"h 의 대기 추론은 이론적이지만 (transit 없음, 스펙트럼 없음), Saturn-class 질량과 113 K 온도가 h 를 확실히 차가운 jovian 으로 고정합니다.",
  "p_155":"<b>대기 존재.</b> 0.340 M_Jup 에서 h 는 정의상 수소-헬륨 가스 거인이고, bulk H₂/He 조성은 질량과 차가운 평형 온도에서 따라 나옵니다. cfg 는 차가운 태양 조성 jovian 목록 (Lodders 2003 protosolar 존재비) 을 채택합니다 — H₂ ~85%, He ~13%, CH₄, NH₃, 심부 H₂O, 그리고 암모니아가 얼어붙는 113 K 평형에서 끊긴 응결 화학입니다. 이는 전형적인 차가운 토성 조성입니다 (tie-break — 측정 스펙트럼 없음).",
  "p_156":"<b>하늘 외관.</b> 구름 deck 위에서 하늘은 따뜻한 cream 암모니아 haze 입니다. 호스트 별 HD 219134 가 h 에서 겨우 ~0.124° (지구에서 본 태양 각 크기의 약 1.2 배 — h 가 3.1 AU 바깥이라 적당함) 를 차지하고 따뜻한 오렌지로 읽힙니다. 일사는 겨우 0.027 S⊕ 라 구름 deck 은 어둡게 조명되고, 내부 열 flux (~1 W/m², tie-break) 가 심부 대류 띠에 기여합니다.",
  "h2_157":"자전 &amp; spin 합성",
  "p_158":"6.15 년 궤도의 3.11 AU 에서 h 는 어떤 조석 상호작용에도 너무 멉니다 — 조석 damping timescale 이 우주 나이를 초과하므로, h 는 자유롭게 자전하고 고정되지 않습니다.",
  "p_159":"<b>KSP 구현 노트.</b> 자전 측정이 없어 cfg 는 토성 유사 ~11 시간 자전 주기를 할당합니다 (tie-break, 낮은 신뢰도 — 차가운 저질량 jovian 은 토성의 10.7 h 처럼 빠르게 자전). obliquity 는 시각적으로 독특한 고리축 기울기와 부드러운 계절 띠를 주기 위해 토성 같은 26° (흥미로움 우선 tie-break) 로 설정합니다.",
  "p_160":"<b>부드러운 계절.</b> curated 이심률은 0.06 — 작지만 0 이 아닙니다 — 6.15-yr 궤도에 걸쳐 peri-에서-apo 일사 범위 S = (1 ± e)⁻² × 0.027 ≈ 0.024 → 0.030 S⊕ 를 줍니다. 26° obliquity 와 결합하면 구름-띠 패턴의 부드러운 계절 변조를 만드는데, 절대 일사가 워낙 낮아 안쪽 행성들보다 훨씬 완만합니다.",
  "h2_161":"비주얼 스타일",
  "p_162":"cold Saturn-class 가스 거인의 대기와 고리 결정을 종합하면 다음과 같습니다.",
  "li_163":"<b>전역 외관 (궤도 뷰).</b> 따뜻한 cream 띠 jovian — 차가운 토성 유사체 — 으로, 궤도면에 ~26° 기울어진 선택적 토성 같은 얼음 고리를 동반합니다. 고리는 렌더링하면 외곽 시스템에서 가장 시각적으로 독특한 feature 입니다.",
  "li_164":"<b>구름 띠.</b> ~0.5–1 bar 의 암모니아-얼음 구름 deck 과 belt/zone 대비를 가진 따뜻한 cream 띠 (<span class=\"hex-chip\" style=\"background:#f0e6d2\"></span><code>#f0e6d2</code>) (tie-break — GCM 없음, 토성 유사 띠 구조).",
  "li_165":"<b>Limb haze.</b> limb 의 따뜻한 cream 암모니아 haze (<span class=\"hex-chip\" style=\"background:#e8dcc4\"></span><code>#e8dcc4</code>) 로, 부드러운 jovian terminator 를 줌.",
  "li_166":"<b>토성 같은 고리 (예술적 옵션, 관측 안 됨).</b> ~0.0008 에서 ~0.0016 AU (≈ 1.2–2.3 행성 반지름) 의 단일 넓은 얼음 고리, 고리 색 <span class=\"hex-chip\" style=\"background:#e0d8c8\"></span><code>#e0d8c8</code> (얼음 거의 중성, 오렌지 호스트 빛에 살짝 따뜻해짐), 불투명도 0.6 — 보이게 불투명-에서-반투명. 이는 예술적 cfg 옵션입니다 — 고리는 관측되지 않았으나 (h 는 RV-only 에 영상 없음), 차가운 가스 거인은 얼음 고리를 물리적으로 그럴듯하게 만들므로 disk-color 정책에 따라 고리를 <code>ring_observed = false</code> 로 제공합니다. cfg 는 h 를 고리와 함께 또는 없이 ship 할 수 있습니다.",
  "li_167":"<b>하늘의 별.</b> HD 219134 가 h 에서 겨우 ~0.124° 를 차지 — 지구에서 본 태양 각 크기의 약 1.2 배, 따뜻한 오렌지, 구름 deck 을 겨우 ~0.027× 지구 정오 밝기로 (어둡고 차가운 jovian 하늘) 조명.",
  "li_168":"<b>하늘의 자매 행성.</b> 다섯 안쪽 행성 (b, c, d, f, g) 이 모두 h 안쪽에 밝은 점으로 나타남. 시스템의 transit 쌍과 contested 행성들은 한참 안쪽에 있음. 거의 동일 평면 기하.",
  "li_169":"<b>선택적 위성계.</b> 3.1 AU 의 cold Saturn-class 거인은 Hill sphere 안에 정규 위성계를 그럴듯하게 거느릴 수 있습니다 (disk-color / ring-후보 노트). 이는 Phase 3 결정이 아니라 안정성 시뮬레이터용 위성 후보이며, 여기서는 렌더링하지 않습니다.",
  "h2_170":"참고 문헌",
  "h3_171":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_172":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT 해. h 의 궤도 (P = 2247 d, a = 3.11 AU, e = 0.06) 와 최소 질량 (Msini = 108.0 M⊕ = 0.340 M_Jup, recommended) 의 출처. <b>h 의 궤도와 질량의 앵커.</b> (h 는 Motalebi 2015 에서도 장주기 거인으로 검출됨.)",
  "li_173":"<b>Fortney J. J. et al. 2007</b> — <i>Planetary radii across five orders of magnitude in mass and stellar insolation</i>, ApJ 659, 1661 (<code>2007ApJ...659.1661F</code>, arXiv:astro-ph/0612671). 진화 반지름 트랙. Gyr 나이의 0.34 M_Jup 거인에 대해 R ≈ 0.9–1.0 R_Jup 추정을 줌. (낮은 신뢰도) <code>radius_rjup</code> 추정을 견인.",
  "li_174":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i>, ApJ 591, 1220 (<code>2003ApJ...591.1220L</code>). protosolar 존재비. 차가운 태양 조성 jovian <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> 을 정함.",
  "h3_175":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_176":"<b>Motalebi F. et al. 2015</b> — A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). 장주기 거인의 HARPS-N 검출. h 의 궤도와 질량을 보강.",
  "li_177":"<b>Li L. et al. 2018</b> — <i>Less absorbed solar energy and more internal heat for Jupiter</i>, Nat. Commun. 9, 3709 (<code>2018NatCo...9.3709L</code>). <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> 와 <code>intrinsic_luminosity_w_m2</code> tie-break 에 쓰인 토성/목성 Bond albedo 와 내부-flux 기준값.",
  "li_178":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 상속된 호스트 파라미터 (일사/T_eq 유도를 위한 L).",
  "h3_179":"읽음 (instrument-only, 시각 정보 아님)",
  "li_180":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). transit 하는 b/c 연구. h 는 비-transit 이고, 여기서는 RV 해를 통해서만 특성화됨.",
  "h3_181":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_182":"h 별 arXiv 기록은 적습니다 (RV-only 차가운 거인, transit 이나 영상 없음). 읽지 않은 세트는 동역학적 안정성 후속 (h 는 Vogt 2015 해에서 외곽 시스템을 앵커) 과, 질량과 온도로 정한 차가운 토성 렌더링을 바꾸지 않는 일반 차가운-jovian 진화-모델 논문입니다. 고리나 위성 영상은 없습니다 (고리는 예술적 옵션이지 관측이 아님).",
  "h2_183":"후속 항목",
  "li_184":"<b>진질량과 반지름.</b> h 의 질량은 Msini 전용이고 반지름은 낮은 신뢰도의 진화-트랙 추정입니다. 향후 천체측정 경사 (Gaia DR5+. 가까운 별 주위 3.1 AU 의 0.34 M_Jup 행성은 강한 천체측정 타깃) 나 직접 영상 검출이 Msini 를 진질량으로 변환하고 반지름을 제약할 것입니다.",
  "li_185":"<b>고리 확정.</b> 토성 같은 고리는 예술적 옵션으로 <code>ring_observed = false</code> 입니다. 고리를 확정하거나 배제할 영상이 없습니다. cfg 는 h 를 고리를 선택 토글로 한 채 ship 하며, 향후 직접 영상 캠페인이 고리를 배제하면 no-ring 변형이 기본값이 됩니다.",
  "li_186":"<b>위성계.</b> 3.1 AU 의 cold Saturn-class 거인은 정규 위성계를 거느릴 수 있습니다. 이는 Phase 3 결정이 아니라 안정성 시뮬레이터 (<code>phase3/stability-sim/</code>) 용 후보입니다.",
  "li_187":"<b>대기 스펙트럼.</b> 스펙트럼 없음. 향후 직접 영상 스펙트럼이 tie-break 조성과 구름 tint 를 측정값으로 대체합니다.",
  "h2_188":"Related",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
