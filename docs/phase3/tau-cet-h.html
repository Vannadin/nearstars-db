  "h2_176":"Surface synthesis",
  "p_177":"τ Ceti h is the system&#x27;s <b>Venus analog</b>. At 8.26 S⊕ insolation, even moderate primordial atmospheric outgassing leads to a runaway greenhouse: H₂O is photolyzed to H + O, the H escapes (via Jeans on this low-XUV host, more slowly than on Venus around the active early Sun, but still effective over 7 Gyr), and the O is locked into oxidized regolith. What remains is a CO₂-dominated thick atmosphere maintained by ongoing volcanic outgassing balanced against very slow escape on this quiet host.",
  "p_178":"The surface is therefore <b>hot, dry, and obscured</b>. Surface temperature is approximately 720 K (Venus&#x27;s is 735 K), surface pressure approximately 50 bar (Venus&#x27;s is 92 bar — h&#x27;s lower value reflects the metal-poor host&#x27;s reduced primordial volatile inventory). The atmosphere is so thick that horizontal heat transport homogenizes the dayside and nightside even for a slow 3:2 rotator; surface temperature contrast across the planet is at most a few K.",
  "p_179":"<b>Surface composition.</b> Volcanic plains with shield volcanoes, tessera-style highland blocks, and impact crater fields are the expected morphology — Venus-analog geology from Ivanov &amp; Head 2011&#x27;s Magellan-era reconstruction. The metal-poor host produces a more olivine-rich (Mg/Si &gt; 1) basalt than Venus&#x27;s tholeiitic; visually the surface basement is darker than terrestrial basalt (<span class=\"hex-chip\" style=\"background:#5a4838\"></span><code>#5a4838</code>), with localized iron-rich red-brown patches (<span class=\"hex-chip\" style=\"background:#7a3a20\"></span><code>#7a3a20</code>) from regional volcanic flows. <b>Most of this is invisible from orbit.</b> The cloud deck obscures the surface at all wavelengths except radar.",
  "p_180":"<b>Tidal heating possibly drives volcanism.</b> With e = 0.23 at a = 0.243 AU, the tidal flux is estimated at 0.05–0.5 W/m² — well above Earth&#x27;s continental heat flow (0.065 W/m²) and comparable to Io&#x27;s total surface heat flux (~2 W/m²) at the upper bound. The metal-poor mantle would have a slightly elevated melting point relative to Sol- system Venus, partially offsetting the tidal heat, but the net effect is probably active volcanism. Whether this manifests as Venus-like shield volcanism or Io-like sulfur volcanism depends on the volatile inventory; the cfg adopts the Venus-analog shield interpretation because the metal-poor host should reduce both Fe and S in the primordial budget.",
  "p_181":"<b>No water, no biosignatures.</b> Runaway-greenhouse history removes any chance of surface or subsurface water. Photolytic H escape over 7 Gyr should have removed multiple Earth oceans worth of H₂O. The remaining O is locked in the oxidized regolith and atmospheric CO₂.",
  "h2_182":"Atmosphere synthesis",
  "p_183":"The cfg adopts a <b>50-bar CO₂ runaway-greenhouse atmosphere with sulfate aerosol clouds</b> — a Venus analog tuned slightly thinner to reflect the metal-poor host&#x27;s lower primordial volatile inventory.",
  "p_184":"<b>Pressure choice — 50 bar.</b> Venus is 92 bar; Earth is 1 bar; Mars is 0.006 bar. For a 1.83 M⊕ body in the Venus-insolation regime on a metal-poor host, the steady-state atmospheric pressure depends on the integrated outgassing rate over Gyr timescales and the loss rate. Outgassing should be similar to Venus per unit volcanism, but with elevated tidal heat the volcanism rate may be higher. The cfg picks 50 bar as an intermediate value; defensible alternatives span 10 bar (Venus-thin, more like primordial Venus) to 92 bar (full Venus analog).",
  "p_185":"<b>Composition.</b> Venus-analog: CO₂ ~95%, N₂ ~3.5%, SO₂ ~150 ppm, H₂SO₄ aerosols, trace H₂O &lt;100 ppm. The H₂O concentration is suppressed below Venus&#x27;s 30 ppm because the metal-poor host produces less primordial water in the volatile inventory. Sulfate aerosols form from volcanic SO₂ + photolytic OH → H₂SO₄ at the cloud-top temperature ~250 K.",
  "p_186":"<b>Cloud morphology.</b> A global homogeneous sulfate haze obscures the surface at all wavelengths. Within the cloud deck, Venus-analog banded thermal structure is expected at low latitudes (Hadley-cell driven), with possible polar collar features as on Venus. Cloud-top altitude is ~50–70 km above the surface; cloud-top temperature is ~250 K. The cloud deck is the dominant visual feature of h.",
  "p_187":"<b>Sky appearance from the surface.</b> Yellow-cream haze obscures the star. Surface illumination is approximately 5% of incident flux — nearly twilight conditions at the surface despite 8.26 S⊕ at the cloud top. The view from the surface is a uniform yellow-brown glow, with no visible stellar disk; Venus-analog conditions. From orbit, h is a featureless yellow-cream pearl (<span class=\"hex-chip\" style=\"background:#e0cba0\"></span><code>#e0cba0</code>) with subtle banding.",
  "p_188":"<b>Loss mechanisms suppressed.</b> Unlike Venus around the active early Sun, h&#x27;s host is exceptionally quiet (log L_X ≤ 26.5, log R&#x27;HK = −4.95). XUV-driven hydrodynamic escape is negligible. H₂O photolysis happens slowly; the primordial water inventory has been bleeding off via Jeans escape over 7 Gyr but the integrated loss is much smaller than Venus&#x27;s. h is consequently a <i>more secure</i> Venus analog than Venus itself in terms of atmospheric retention — the thick CO₂ envelope should persist over geological timescales without active replenishment.",
  "h2_189":"Rotation &amp; spin synthesis",
  "p_190":"τ Ceti h&#x27;s eccentricity of 0.23 is the highest of the three Feng 2017 planets. At this eccentricity, the 3:2 spin-orbit resonance capture probability is high (Vinson 2017 Figure 5: &gt; 80% for e ≳ 0.10) and the cfg adopts <b>3:2</b> as the canonical spin-orbit state.",
  "p_191":"<b>Pseudo-synchronous rotation.</b> For 3:2 at P_orb = 49.41 d, the spin period is 49.41 × 2/3 ≈ 32.94 d. The solar day length is P_orb × P_spin / (P_orb − P_spin) = 49.41 × 32.94 / 16.47 ≈ 98.8 d (approximately 2 × P_orb). The slow rotation produces minimal Coriolis effect; atmospheric circulation should be Venus-like with a single Hadley cell per hemisphere.",
  "p_192":"<b>Tidal-lock timescale.</b> P = 49.41 d is far longer than g&#x27;s 20 d; τ_tidal scales as P^(13/3), so h&#x27;s tidal damping is roughly (49.41/20)^(13/3) ≈ 50× slower than g&#x27;s. Whether g is locked over 7 Gyr or not, h almost certainly is not fully locked — the 3:2 resonance with stable libration is the most plausible state.",
  "p_193":"<b>KSP implementation note.</b> For 3:2: <code>rotationPeriod</code> = (2/3) × 49.41 d × 86400 s/d ≈ 32.94 d ≈ 2.85 × 10⁶ s. Asynchronous fast-rotator alternative (much less likely): 24 h Earth analog.",
  "p_194":"<b>Obliquity.</b> Tidal damping over 7 Gyr drives obliquity to zero; libration-induced insolation variation from the e = 0.23 eccentric orbit is ±20% over the orbital period, producing significant &quot;seasonal&quot; forcing at the cloud-top level but smoothed by the thick atmosphere at the surface.",
  "p_195":"<b>Magnetic dynamo expectation.</b> A 2 M⊕ body with 3:2 slow rotation and a thick CO₂ atmosphere (which insulates the interior) is unlikely to have a sustained dynamo — Venus&#x27;s own field is induced- only. The cfg adopts a Venus-analog absence of global magnetic field, with possible weak induced magnetosphere from solar-wind interaction.",
  "h2_196":"Visual styling",
  "li_197":"<b>Global appearance.</b> A featureless yellow-cream pearl (<span class=\"hex-chip\" style=\"background:#e0cba0\"></span><code>#e0cba0</code>) with subtle low-latitude banding visible at PQS resolution. The cloud deck obscures any surface features. Visual character is closest to Venus but with a slightly cooler-yellow tint due to the metal-poor G8V illumination (less of the warm ochre that Venus shows under solar illumination).",
  "li_198":"<b>Cloud-top bands.</b> Subtle dark and bright bands at low latitudes from Hadley-cell circulation; polar collar feature may be visible at the level of the largest atmospheric structures.",
  "li_199":"<b>Day–night terminator.</b> Faintly visible because the thick atmosphere transports heat efficiently, but cloud-top illumination drops sharply at the terminator; the planet has a sharply defined illuminated crescent in optical view.",
  "li_200":"<b>Nightside appearance.</b> Dark with faint cyan glow from starlight reflecting off cloud tops; the lower atmosphere&#x27;s thermal IR emission would dominate at infrared wavelengths (not visible at typical KSP rendering). KSP nightside ambient ≈ 0.5% dayside.",
  "li_201":"<b>Atmosphere haze.</b> A broad warm yellow-cream haze (<span class=\"hex-chip\" style=\"background:#d8c490\"></span><code>#d8c490</code>) extends 60–80 km above the planet limb; visually much thicker than Venus because the cloud-top is higher relative to the planet radius. The haze is the most visually distinctive feature of h from orbit.",
  "li_202":"<b>No aurora.</b> No global magnetic field → no auroral oval.",
  "li_203":"<b>Star in sky from the cloud tops.</b> τ Ceti subtends 1.74° at h&#x27;s distance — 3.3× the Sun seen from Earth. The host is a bright pale-yellow disk under metal-poor G8V illumination. From the <i>surface</i>, the host is not directly visible — the sulfate cloud deck diffuses all incoming light into a featureless yellow-brown sky.",
  "li_204":"<b>Sister planets in sky.</b> g (innermost) at ~0.04° in conjunction, rarely visible against the bright sky background even from orbit; f at ~0.04°. The cold debris disk at ≥ 6 AU is far outside h&#x27;s orbit and appears as a faint amber-grey band on the night side.",
  "h2_205":"Bibliography",
  "h3_206":"Read (visual-informative, drove decisions above)",
  "li_207":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). Discovery + best constraint on h&#x27;s orbit (P = 49.41 ± 0.08 d), mass (Msini = 1.83 ± 0.68 M⊕), eccentricity (0.23 — highest of the three). Anchors every orbital and physical Decisions row.",
  "li_208":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, arXiv:1801.05415). Confirms 49.4-d signal stability; controversial flag in NEA reflects amplitude-to-noise concerns.",
  "li_209":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. 3:2 capture probability &gt; 80% for e ≳ 0.10; anchors the cfg&#x27;s 3:2 spin-orbit pick for h.",
  "li_210":"<b>Venus bond albedo + cloud morphology (standard value)</b> — Venus-analog bond albedo 0.75 + cloud structure template adopted for h. No single primary citation pinned; standard Venus reference value. Confidence low.",
  "li_211":"<b>Ivanov M. A. &amp; Head J. W. 2011</b> — <i>Venus geologic units from Magellan</i>. Surface morphology template for the obscured basement (volcanic plains, tessera highlands, impact craters).",
  "h3_212":"Read (context / methodology, not directly decision-driving)",
  "li_213":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones</i>. Inner- edge runaway-greenhouse limit for a G8V is ~1.0 S⊕; h at 7.74 S⊕ is firmly in the runaway regime.",
  "li_214":"<b>Lawler S. M. et al. 2014</b> — τ Ceti debris disk inclination ~35° (Herschel); adopted by MacGregor et al. 2016 (ALMA) and used here as h&#x27;s orbital plane default.",
  "li_215":"<b>Bolmont E. et al. 2020</b> — Tidal evolution framework; h&#x27;s e = 0.23 at 0.243 AU gives estimated 0.05–0.5 W/m² tidal flux.",
  "li_216":"<b>Makarov V. V. 2018</b> — Tidal locking timescales + 3:2 capture; confirms h cannot be 1:1 locked over 7 Gyr at P = 49.41 d.",
  "li_217":"<b>Way M. J. et al. 2025</b> — <i>Venus-analog GCM and atmospheric retention on quiet G-dwarf hosts</i>. General framework for Venus-analog atmospheric stability on a metal-poor low-XUV host; supports the 50-bar pick.",
  "h3_218":"Read (instrument / non-cfg-decisive)",
  "li_219":"<b>Pavlenko Y. V. et al. 2012</b> — host star context (Teff, [Fe/H], log R&#x27;HK).",
  "li_220":"<b>Schmitt J. H. M. M. et al. 1985</b> — host X-ray log L_X ≤ 26.5 (no XUV-driven escape).",
  "h3_221":"Not read — no arXiv preprint or low-priority (~14 papers)",
  "li_222":"<b>Tuomi 2013 + 2014 erratum</b> — superseded by Feng 2017.",
  "li_223":"<b>Various SETI / technosignature papers</b> — h is firmly uninhabitable, mostly irrelevant for biosignature catalog papers.",
  "li_224":"<b>Venus-specific atmospheric chemistry reviews</b> — generally applicable but not h-specific.",
  "h2_225":"Open items for follow-up",
  "li_226":"<b>Controversial flag (<code>pl_controv_flag = 1</code>).</b> Largest uncertainty of the three planets — Msini fractional error 0.37 is highest. Monitor for retraction or refinement.",
  "li_227":"<b>True mass.</b> Msini = 1.83 ± 0.68 M⊕; true mass depends on unknown i. Cfg adopts i ≈ 35° from disk → true mass ≈ 3.2 M⊕.",
  "li_228":"<b>User-input discrepancy.</b> The user request described a τ Cet h at P = 4562 d / a = 5.0 AU. The DB authoritative h is at P = 49.41 d / a = 0.243 AU. The 4562-d signal is plausibly a Feng 2018 §3.4 long-period candidate or a later (Lubin 2024) candidate not yet ingested. This Phase 3 synthesis treats the DB h (49.4 d). If the long-period candidate is later promoted to Phase 2 / Phase 3, a separate cfg variant or a re-named entry (e.g., &quot;tau Cet i&quot;) may be needed.",
  "li_229":"<b>Bare-rock cfg variant.</b> If the user prefers a Mercury-analog reading for h instead of Venus-analog (less likely given the much lower insolation than g), the bare-rock cfg variant from τ Cet g could be adapted. Not the canonical pick.",
  "li_230":"<b>Sulfur volcanism cfg variant.</b> If the elevated tidal heating is more aggressive (upper bound 0.5 W/m²) the planet may have Io-like sulfur volcanism rather than Venus-like shield volcanism. Visually this would produce a more vibrantly yellow- orange cloud deck. Preserved as cfg variant.",
  "li_231":"<b>Cloud-top wind speeds.</b> Venus has super-rotating cloud-top winds ~100 m/s. For h&#x27;s slower (49-d × 2/3 spin) rotation, the super-rotation could be even more extreme, potentially producing visible cloud-band motion at gameplay timescales. Logged for future cfg refinement.",
  "li_232":"<b>Lower-pressure variant (10 bar primordial Venus).</b> A thinner atmosphere at 10 bar would still produce runaway greenhouse but with a slightly cooler surface (~600 K) and possibly visible surface features through occasional cloud breaks. Less visually distinctive than the canonical 50-bar pick.",
  "h2_233":"Related",

  "p_1":"τ Ceti h 는 metal-poor G8V τ Ceti 주위를 49.41 일 주기로 0.243 AU 에서 도는 1.83 M⊕ (M sin i) RV 후보 행성입니다 (Feng 2017, <code>2017AJ....154..135F</code>). <code>db/systems/tau_cet.json</code> 에서 g (0.133 AU) 와 f (1.334 AU) 사이에 위치. 호스트 광도 0.488 L☉ 기준 조사량은 <b>8.26 S⊕</b> — 더 어둡고 차가운 호스트라는 점을 빼면 Venus 급 조사량. 평형 온도는 albedo 0 에서 472 K, Venus 형 구름 albedo 에서 334 K 로 H₂O 임계점보다 한참 위, 고전적 runaway-greenhouse 영역. 행성은 NEA 에서 <b>disputed</b> (<code>pl_controv_flag = 1</code>) 로 표시됩니다 — RV 단독, transit 없음, 직접 영상 없음. 주목할 점은 h 의 이심률 (0.23) 이 Feng 2017 세 행성 중 가장 높음 — 3:2-spin-orbit-capture 영역에 깨끗 하게 위치 (Vinson 2017 / Makarov 2018) 하며, 상승된 이심률이 적지 않은 수준의 추가 조석 가열에 기여.",
  "p_2":"<b>NearStars 시나리오 선택. 두꺼운 CO₂ runaway-greenhouse 대기, 표면을 가리는 황산염 에어로졸 구름 데크, 뜨겁고 건조한 암석 기반, 조용한 G8V 조명 아래 특징 없는 노랑-크림 구름-정상 팔레트의 Venus-analog.</b> 호스트의 조용한 XUV 환경이 핵심 물리 레버입니다 — 활성 K/M 왜성 주위의 Venus analog (runaway 대기 손실을 겪음) 와 달리, metal-poor 저활동 호스트 위 τ Ceti h 의 두꺼운 CO₂ envelope 은 <i>더</i> 안전합니다. 맨 암석과 중간 두께 대안은 cfg variant 로 보존됩니다.",

  "td_163":"지구형 BSE(bulk-silicate-Earth) 방사성 열류속(현재값 ~0.04 W/m²)을 질량으로 스케일. 방법은 Wang et al. 2020 (<code>2020A&amp;A...644A..19W</code>)의 외계행성 방사성 열 프레임워크를 따름. 다만 Eu→Th/U 호스트 원소비 보정은 호스트별 원소비를 큐레이션하지 않아 적용하지 않았고, 대신 지구형 원소비를 가정함",

  "td_175":"호스트 Teff (Pavlenko 2012)",
  "h2_176":"Surface synthesis",
  "p_177":"τ Ceti h 는 시스템의 <b>Venus analog</b> 입니다. 8.26 S⊕ 조사량에서는 적당한 원시 대기 탈가스조차 runaway greenhouse 로 이어집니다 — H₂O 가 H + O 로 광분해되고, H 가 탈출 (이 저-XUV 호스트에서는 활성 초기 태양 주위 Venus 보다 느리게 Jeans 로, 그래도 7 Gyr 에 걸쳐 효율적), O 는 산화된 regolith 에 잠김. 남는 것은 진행 중인 화산 탈가스가 이 조용한 호스트의 매우 느린 탈출과 균형을 이루어 유지되는 CO₂ 우세 두꺼운 대기.",
  "p_178":"따라서 표면은 <b>뜨겁고, 건조하고, 가려져</b> 있습니다. 표면 온도는 약 720 K (Venus 는 735 K), 표면 압력은 약 50 bar (Venus 는 92 bar — h 의 낮은 값은 metal-poor 호스트의 줄어든 원시 휘발성 인벤토리를 반영). 대기가 너무 두꺼워서, 느린 3:2 자전자의 경우에도 수평 열 수송이 dayside 와 nightside 를 균질화. 행성 전체의 표면 온도 대비는 기껏해야 몇 K.",
  "p_179":"<b>표면 조성.</b> Ivanov &amp; Head 2011 의 Magellan 시대 재구성에서 오는 Venus-analog 지질학 — shield 화산, tessera 스타일 고지 블록, 충돌구 들판이 예상 형태. metal-poor 호스트는 Venus 의 tholeiitic 보다 더 olivine 풍부 (Mg/Si &gt; 1) 현무암을 만듦. 시각적으로 표면 기반은 지구 현무암보다 어둡고 (<span class=\"hex-chip\" style=\"background:#5a4838\"></span><code>#5a4838</code>), 지역 화산 흐름에서 오는 국지적 철- 풍부 적-갈 패치 (<span class=\"hex-chip\" style=\"background:#7a3a20\"></span><code>#7a3a20</code>). <b>이 대부분은 궤도에서 보이지 않습니다.</b> 구름 데크가 레이더를 제외한 모든 파장에서 표면을 가립니다.",
  "p_180":"<b>조석 가열이 화산을 구동할 가능성.</b> a = 0.243 AU 에서 e = 0.23 으로 조석 플럭스는 0.05–0.5 W/m² 로 추정 — 지구 대륙 열류 (0.065 W/m²) 한참 위, 상한에서는 Io 총 표면 열류 (~2 W/m²) 와 비교 가능. metal-poor 맨틀은 Sol-system Venus 대비 살짝 상승된 용융점을 가져 조석 열을 부분적으로 상쇄하지만, 순 효과는 아마도 활성 화산 활동. 이것이 Venus 형 shield 화산 활동으로 나타날지 Io 형 황 화산 활동으로 나타날지는 휘발성 인벤토리에 의존. cfg 는 Venus-analog shield 해석을 채택 — metal-poor 호스트는 원시 예산에서 Fe 와 S 모두를 줄여야 하기 때문.",
  "p_181":"<b>물 없음, 생물 표지 없음.</b> runaway-greenhouse 이력은 표면이나 지하수의 가능성을 모두 제거. 7 Gyr 에 걸친 광분해 H 탈출은 지구 바다 여러 개 분량의 H₂O 를 제거했을 것. 남은 O 는 산화된 regolith 와 대기 CO₂ 에 잠겨 있음.",
  "h2_182":"Atmosphere synthesis",
  "p_183":"cfg 는 <b>황산염 에어로졸 구름을 가진 50-bar CO₂ runaway-greenhouse 대기</b> 를 채택 — metal-poor 호스트의 낮은 원시 휘발성 인벤토리를 반영해 살짝 더 얇게 튜닝된 Venus analog.",
  "p_184":"<b>압력 선택 — 50 bar.</b> Venus 는 92 bar, 지구는 1 bar, Mars 는 0.006 bar. Venus-조사량 영역의 1.83 M⊕ 체에서 metal-poor 호스트의 정상상태 대기 압력은 Gyr 시간 척도에 걸친 적분 탈가스 속도와 손실 속도에 의존. 단위 화산 활동당 탈가스는 Venus 와 비슷할 것이지만, 상승된 조석 열로 화산 활동 속도가 더 높을 수 있음. cfg 는 50 bar 를 중간 값으로 픽. 방어 가능한 대안은 10 bar (Venus-thin, 원시 Venus 에 더 가까움) 에서 92 bar (전체 Venus analog) 까지 걸침.",
  "p_185":"<b>조성.</b> Venus-analog. CO₂ ~95%, N₂ ~3.5%, SO₂ ~150 ppm, H₂SO₄ 에어로졸, 미량 H₂O &lt;100 ppm. metal-poor 호스트가 휘발성 인벤토리에서 더 적은 원시 물을 만들기 때문에 H₂O 농도는 Venus 의 30 ppm 아래로 억제. 황산염 에어로졸은 화산 SO₂ + 광분해 OH → H₂SO₄ 의 구름-정상 온도 ~250 K 에서 형성.",
  "p_186":"<b>구름 형태.</b> 전구 균질 황산염 안개가 모든 파장에서 표면을 가림. 구름 데크 안에서는 Venus-analog 띠 모양 열 구조가 저위도에서 예상 (Hadley-cell 구동) 되며, Venus 와 같은 극 collar 피처도 가능. 구름- 정상 고도는 표면 위 ~50–70 km. 구름-정상 온도는 ~250 K. 구름 데크는 h 의 지배적 시각 피처.",
  "p_187":"<b>표면에서의 하늘 모습.</b> 노랑-크림 안개가 별을 가림. 표면 조명은 구름 정상에서의 8.26 S⊕ 에도 불구하고 입사 플럭스의 약 5% — 거의 표면에서의 황혼 조건. 표면 시야는 보이는 별 원반 없는 균일한 노랑- 갈 글로우. Venus-analog 조건. 궤도에서 h 는 미세한 띠를 가진 특징 없는 노랑-크림 진주 (<span class=\"hex-chip\" style=\"background:#e0cba0\"></span><code>#e0cba0</code>).",
  "p_188":"<b>손실 메커니즘 억제됨.</b> 활성 초기 태양 주위 Venus 와 달리 h 의 호스트는 예외적으로 조용함 (log L_X ≤ 26.5, log R&#x27;HK = −4.95). XUV 구동 hydrodynamic 탈출 무시 가능. H₂O 광분해는 천천히 일어남. 원시 물 인벤토리는 7 Gyr 동안 Jeans 탈출로 빠져나갔지만 적분 손실은 Venus 의 그것보다 훨씬 작음. 결과적으로 h 는 대기 유지 관점에서 Venus 그 자체보다 <i>더 안전한</i> Venus analog — 두꺼운 CO₂ envelope 은 활발한 보충 없이도 지질학적 시간 척도에 걸쳐 지속되어야 함.",
  "h2_189":"Rotation &amp; spin synthesis",
  "p_190":"τ Ceti h 의 이심률 0.23 은 Feng 2017 세 행성 중 가장 높음. 이 이심률 에서 3:2 spin-orbit 공명 포획 확률은 높고 (Vinson 2017 Figure 5. e ≳ 0.10 에서 &gt; 80%) cfg 는 <b>3:2</b> 를 canonical spin-orbit 상태로 채택.",
  "p_191":"<b>의사 동기 자전.</b> P_orb = 49.41 d 의 3:2 의 경우 spin 주기는 49.41 × 2/3 ≈ 32.94 d. 태양일 길이는 P_orb × P_spin / (P_orb − P_spin) = 49.41 × 32.94 / 16.47 ≈ 98.8 d (대략 2 × P_orb). 느린 자전은 최소 Coriolis 효과를 만들고, 대기 순환은 반구당 단일 Hadley 셀을 가진 Venus 형.",
  "p_192":"<b>조석 고정 시간 척도.</b> P = 49.41 d 는 g 의 20 d 보다 훨씬 길고. τ_tidal 은 P^(13/3) 로 스케일하므로 h 의 조석 damping 은 g 의 약 (49.41/20)^(13/3) ≈ 50× 느림. g 가 7 Gyr 동안 고정되었든 아니든, h 는 거의 확실히 완전 고정이 아님 — 안정 libration 을 가진 3:2 공명이 가장 plausible 한 상태.",
  "p_193":"<b>KSP 구현 노트.</b> 3:2 의 경우. <code>rotationPeriod</code> = (2/3) × 49.41 d × 86400 s/d ≈ 32.94 d ≈ 2.85 × 10⁶ s. 비동기 빠른-자전자 대안 (가능성 훨씬 낮음). 24 h 지구 analog.",
  "p_194":"<b>Obliquity.</b> 7 Gyr 조석 damping 이 obliquity 를 0 으로 끌어냄. e = 0.23 의 이심 궤도에서 오는 libration 유도 조사량 변동은 궤도 주기에 걸쳐 ±20% 로 구름-정상 수준에서 의미 있는 &quot;계절&quot; 강제를 만들지만 두꺼운 대기가 표면에서는 smoothing.",
  "p_195":"<b>자기 dynamo 기대치.</b> 3:2 느린 자전과 (내부를 단열하는) 두꺼운 CO₂ 대기를 가진 2 M⊕ 체는 지속 dynamo 가능성 낮음 — Venus 자체의 자기장 도 유도 전용. cfg 는 Venus-analog 의 전구 자기장 부재 + 태양풍 상호작용에서 오는 약한 유도 자기권 가능을 채택.",
  "h2_196":"Visual styling",
  "li_197":"<b>전구 외관.</b> PQS 해상도에서 보이는 미세한 저위도 띠를 가진 특징 없는 노랑-크림 진주 (<span class=\"hex-chip\" style=\"background:#e0cba0\"></span><code>#e0cba0</code>). 구름 데크가 모든 표면 피처를 가림. 시각 캐릭터는 Venus 에 가장 가까움 — 단 metal-poor G8V 조명 때문에 살짝 더 차가운-노랑 톤 (Venus 가 태양 조명에서 보이는 따뜻한 황토가 덜함).",
  "li_198":"<b>구름-정상 띠.</b> Hadley-cell 순환에서 오는 저위도 미세한 어두운 밝은 띠. 가장 큰 대기 구조 수준에서 극 collar 피처 가능.",
  "li_199":"<b>낮-밤 terminator.</b> 두꺼운 대기가 열을 효율적으로 수송해 희미 하게 보임. 그러나 구름-정상 조명은 terminator 에서 급격히 떨어 지고, 행성은 광학 시야에서 또렷하게 정의된 조명 초승달.",
  "li_200":"<b>Nightside 외관.</b> 별빛이 구름 정상에 반사되는 희미한 cyan 글로우와 함께 어두움. 하부 대기의 열적 IR 방출이 적외선 파장 에서 지배 (전형적 KSP 렌더링에서는 안 보임). KSP nightside 환경광 ≈ dayside 의 0.5%.",
  "li_201":"<b>대기 안개.</b> 행성 림 위로 60–80 km 뻗는 넓은 따뜻한 노랑- 크림 안개 (<span class=\"hex-chip\" style=\"background:#d8c490\"></span><code>#d8c490</code>). 구름-정상이 행성 반지름 대비 더 높기 때문에 Venus 보다 시각적으로 훨씬 두꺼움. 안개는 궤도에서 h 의 가장 시각적으로 구별되는 피처.",
  "li_202":"<b>오로라 없음.</b> 전구 자기장 없음 → auroral 오발 없음.",
  "li_203":"<b>구름 정상에서 본 하늘의 별.</b> τ Ceti 는 h 거리에서 1.74° — 지구에서 본 태양의 3.3×. 호스트는 metal-poor G8V 조명 아래 밝은 옅은 노랑 원반. <i>표면</i> 에서는 호스트가 직접 보이지 않음 — 황산염 구름 데크가 모든 입사광을 특징 없는 노랑-갈 하늘로 확산.",
  "li_204":"<b>하늘의 자매 행성들.</b> g (가장 안쪽) 는 합 위치에서 ~0.04°. 궤도에서도 밝은 하늘 배경에 비해 거의 보이지 않음. f 는 ~0.04°. ≥ 6 AU 의 차가운 잔해 원반은 h 궤도 한참 바깥에 있고 밤 쪽에서 희미한 호박-그레이 띠로 보임.",
  "h2_205":"Bibliography",
  "h3_206":"Read (visual-informative, drove decisions above)",
  "li_207":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). 발견 + h 궤도 (P = 49.41 ± 0.08 d), 질량 (Msini = 1.83 ± 0.68 M⊕), 이심률 (0.23 — 세 행성 중 가장 높음) 의 최선 제약. 모든 궤도 및 물리 Decisions 행을 정박.",
  "li_208":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, arXiv:1801.05415). 49.4 d 신호 안정성 확인. NEA 의 controversial 플래그는 amplitude-to-noise 우려 반영.",
  "li_209":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. e ≳ 0.10 에서 3:2 포획 확률 &gt; 80%. h 의 3:2 spin-orbit cfg 픽 정박.",
  "li_210":"<b>Venus bond albedo + 구름 형태 (표준값)</b> — h 에 채택된 Venus-analog bond albedo 0.75 + 구름 구조 템플릿. 단일 primary 인용은 핀하지 않음. 표준 Venus 참조값. Confidence low.",
  "li_211":"<b>Ivanov M. A. &amp; Head J. W. 2011</b> — <i>Venus geologic units from Magellan</i>. 가려진 기반 (화산 평원, tessera 고지, 충돌구) 의 표면 형태 템플릿.",
  "h3_212":"Read (context / methodology, not directly decision-driving)",
  "li_213":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones</i>. G8V 의 inner-edge runaway-greenhouse 한계는 ~1.0 S⊕. 7.74 S⊕ 의 h 는 runaway 영역에 확실히 위치.",
  "li_214":"<b>Lawler S. M. et al. 2014</b> — τ Ceti 잔해 원반 경사 ~35° (Herschel). MacGregor et al. 2016 (ALMA) 이 채택했고 여기서는 h 의 궤도면 기본값으로 사용.",
  "li_215":"<b>Bolmont E. et al. 2020</b> — 조석 진화 프레임워크. 0.243 AU 의 h 가 e = 0.23 에서 0.05–0.5 W/m² 추정 조석 플럭스.",
  "li_216":"<b>Makarov V. V. 2018</b> — 조석 고정 시간 척도 + 3:2 포획. h 가 P = 49.41 d 에서 7 Gyr 동안 1:1 고정될 수 없음을 확인.",
  "li_217":"<b>Way M. J. et al. 2025</b> — <i>Venus-analog GCM and atmospheric retention on quiet G-dwarf hosts</i>. metal-poor 저-XUV 호스트 주위 Venus-analog 대기 안정성의 일반 프레임워크. 50-bar 픽 지지.",
  "h3_218":"Read (instrument / non-cfg-decisive)",
  "li_219":"<b>Pavlenko Y. V. et al. 2012</b> — 호스트 별 맥락 (Teff, [Fe/H], log R&#x27;HK).",
  "li_220":"<b>Schmitt J. H. M. M. et al. 1985</b> — 호스트 X 선 log L_X ≤ 26.5 (XUV 구동 탈출 없음).",
  "h3_221":"Not read — no arXiv preprint or low-priority (~14 papers)",
  "li_222":"<b>Tuomi 2013 + 2014 erratum</b> — Feng 2017 로 대체.",
  "li_223":"<b>SETI / technosignature 논문 다수</b> — h 는 거주 불가능이 확실 하며 생물 표지 카탈로그 논문에 거의 무관.",
  "li_224":"<b>Venus-특이 대기 화학 리뷰</b> — 일반적으로 적용 가능하지만 h-특이 아님.",
  "h2_225":"Open items for follow-up",
  "li_226":"<b>Controversial 플래그 (<code>pl_controv_flag = 1</code>).</b> 세 행성 중 가장 큰 불확실성 — Msini 분수 오차 0.37 이 가장 높음. 철회나 정제 모니터링.",
  "li_227":"<b>실제 질량.</b> Msini = 1.83 ± 0.68 M⊕. 실제 질량은 미지의 i 에 의존. cfg 는 원반에서 i ≈ 35° 채택 → 실제 질량 ≈ 3.2 M⊕.",
  "li_228":"<b>사용자 입력 불일치.</b> 사용자 요청은 τ Cet h 를 P = 4562 d / a = 5.0 AU 로 묘사. DB 의 권위 있는 h 는 P = 49.41 d / a = 0.243 AU. 4562-d 신호는 Feng 2018 §3.4 의 장주기 후보 또는 아직 ingest 되지 않은 이후 (Lubin 2024) 후보일 가능성. 이 Phase 3 합성은 DB 의 h (49.4 d) 를 다룸. 장주기 후보가 나중에 Phase 2 / Phase 3 으로 승급되면 별도 cfg variant 나 재명명 항목 (예: &quot;tau Cet i&quot;) 이 필요할 수 있음.",
  "li_229":"<b>맨 암석 cfg variant.</b> 사용자가 Venus-analog 대신 h 에 대해 수성-analog 해석을 선호하면 (g 보다 훨씬 낮은 조사량을 고려하면 가능성 낮음), τ Cet g 의 맨 암석 cfg variant 를 adapt 할 수 있음. canonical 픽은 아님.",
  "li_230":"<b>황 화산 활동 cfg variant.</b> 상승된 조석 가열이 더 공격적이면 (상한 0.5 W/m²), 행성은 Venus 형 shield 화산 활동 대신 Io 형 황 화산 활동을 가질 수 있음. 시각적으로 이것은 더 선명한 노랑- 주황 구름 데크를 만들 것. cfg variant 로 보존.",
  "li_231":"<b>구름-정상 풍속.</b> Venus 는 ~100 m/s 의 초회전 구름-정상 바람을 가짐. h 의 더 느린 (49-d × 2/3 spin) 자전에서 초회전은 더 극단적 일 수 있고, 게임플레이 시간 척도에서 잠재적으로 보이는 구름-띠 운동을 만들어냄. 미래 cfg 정제를 위해 로깅.",
  "li_232":"<b>저압력 variant (10 bar 원시 Venus).</b> 10 bar 의 더 얇은 대기는 여전히 runaway greenhouse 를 만들지만 살짝 더 시원한 표면 (~600 K) 과 가끔의 구름 틈을 통해 보이는 표면 피처를 가능하게 함. canonical 50-bar 픽보다 시각적으로 덜 구별됨.",
  "h2_233":"Related",
  "li_234":"<a href=\"tau-cet.md\">tau-cet</a> — 호스트 별 Phase 3 (G8V metal-poor. 조용함, 늙음, 잔해 원반 보유)",
  "li_235":"<a href=\"tau-cet-g.md\">tau-cet-g</a> — 가장 안쪽 자매. 뜨거운 맨 암석 수성-analog",
  "li_236":"<a href=\"tau-cet-f.md\">tau-cet-f</a> — 가장 바깥쪽 자매. snowball",
  "li_237":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 스키마",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
