  "h2_129":"Surface synthesis",
  "p_130":"YZ Cet b has no transit, eclipse, or transmission measurement, so everything about its surface is inferred from its minimum mass, orbit, and host illumination. The radius (0.913 R⊕) is a semi-empirical mass-radius estimate, not an observation; Pineda &amp; Villadsen 2023, who needed a radius for their SPI cross-section, bracketed it at 0.89–1.0 R⊕ assuming Earth-like density. The minimum mass M sin i = 0.70 M⊕ (Stock 2020) is a genuine lower bound; the true mass is higher by 1/sin i. For cfg purposes b is treated as a sub-Earth-to-Earth-mass rocky planet.",
  "p_131":"The key thermal fact is that b is <b>warm, not molten</b>. The equilibrium temperature at zero albedo is T_eq ≈ 471 K (computed here from L = 0.0022 L☉ and a = 0.01634 AU), and the insolation is ~8.2× Earth&#x27;s — elevated, but the M dwarf is so dim that even at 0.0163 AU b is far cooler than its tiny orbit alone would suggest. This is the same lesson as the inner TRAPPIST worlds: a planet hugging a faint red dwarf is not automatically a lava world. The substellar bare-rock peak temperature is ~520 K, comparable to Venus&#x27;s surface, not to a magma ocean.",
  "p_132":"<b>Color choice.</b> Under the host&#x27;s 3100 K red-orange illumination, b is rendered as a warm-toned iron-bearing basaltic surface (<span class=\"hex-chip\" style=\"background:#5a4438\"></span><code>#5a4438</code> primary) with oxidized iron-patch accents (<span class=\"hex-chip\" style=\"background:#7a3a22\"></span><code>#7a3a22</code>). This is deliberately warmer and lighter than the very-dark airless ultramafic black of the JWST-confirmed lava-rock TRAPPIST-1 b (<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code>), because YZ Cet b has no JWST eclipse forcing a fresh-ultramafic, near-zero-albedo surface — the interesting-first tie-break here favours a visibly textured, iron-toned warm rock over a featureless black sphere. The surface tint is low-confidence: with no eclipse or reflectance data, the mineralogy is unconstrained and the choice is aesthetic within the allowed window.",
  "p_133":"<b>Morphology.</b> Tidally locked (the 2.02-day orbit damps spin to synchronous rotation well within the system age), so the substellar point is fixed. Default texture is cratered rocky plains with a warm dayside and a cold nightside; no resurfacing mechanism is confirmed, so unlike TRAPPIST-1 b there are no forced fresh-lava features — though a thin substellar warm-spot brightening is a permissible visual touch.",
  "h2_134":"Atmosphere synthesis",
  "p_135":"No transmission spectrum exists for YZ Cet b, so its atmosphere is entirely a synthesis choice within the allowed window. Two physical considerations bracket it: (1) at T_eq ≈ 471 K and ~8.2× Earth insolation, a thin secondary atmosphere is thermally plausible but under constant erosion; (2) the host is a moderately active flaring M dwarf with a kG field and a strong stellar wind, and b orbits deep inside the stellar magnetosphere in the sub-Alfvénic regime — an XUV and particle environment hostile to atmosphere retention.",
  "p_136":"The decisive twist for b specifically is its <b>own magnetosphere</b>. Trigilio 2023&#x27;s SPI power balance requires b to present a magnetopause of R_MP ≥ 1.6–2.0 R_planet to the stellar wind, which means b must carry a real magnetic field (≥ 0.4 G at the pole) rather than just an ionospheric obstacle. A magnetosphere of that strength would partially shield a thin atmosphere from direct stellar-wind stripping — so the &quot;thin atmosphere&quot; reading is more defensible for b than for an unmagnetized close-in M-dwarf planet.",
  "p_137":"For NearStars the cfg adopts a <b>thin secondary atmosphere (~0.1 bar, CO₂/N₂)</b> as the interesting-first tie-break, with the conservative airless variant preserved in Open items. This is a low-confidence aesthetic choice: the atmosphere gives b a faint warm limb haze (<span class=\"hex-chip\" style=\"background:#caa37a\"></span><code>#caa37a</code>) and some day-night heat redistribution, which is visually more distinctive than a bare airless sphere and is consistent with — though not required by — the magnetosphere inference.",
  "p_138":"<b>Sky appearance.</b> If the thin atmosphere is present, the daytime sky under the 3100 K star is a dim red-orange with weak Rayleigh blue near the zenith. If b is airless instead, the sky is black and the star&#x27;s disk is sharp-edged. Either way the host star dominates the sky at ~5.1° angular diameter (about 10× the Sun from Earth), deep red-orange, and the two outer siblings (c, d) appear as bright moving &quot;stars.&quot;",
  "h2_139":"Rotation &amp; spin synthesis",
  "p_140":"YZ Cet b is tidally locked. At a = 0.0163 AU around a 0.137 M☉ star the tidal-locking timescale is far shorter than the system age (a few Gyr), so the planet rotates synchronously with its 2.02087-day orbit. The eccentricity (0.06 ± 0.06; Stock 2020) is poorly constrained and consistent with circular; at e ≲ 0.06 the 1:1 spin-orbit resonance is strongly favoured over 3:2 (Vinson 2017 / Makarov 2018: 3:2 is stable only above e ≈ 0.01 with significant triaxiality, and the low-e RV solution does not support that). Obliquity is damped to zero.",
  "p_141":"<b>KSP implementation note.</b> Rotation period = orbital period = 2.02087 days = 174 603 s. In Kopernicus the body&#x27;s <code>rotationPeriod</code> equals the orbital <code>period</code> in seconds.",
  "p_142":"<b>No seasons.</b> With obliquity = 0 and near-zero eccentricity, the substellar point is fixed in the surface frame.",
  "p_143":"<b>SPI synodic geometry.</b> The radio aurora&#x27;s visibility is governed by the synodic period between b&#x27;s orbit and the stellar rotation: P_syn = [P_orb⁻¹ − P_rot⁻¹]⁻¹ ≈ 2.082 d (Pineda &amp; Villadsen 2023, using P_rot = 68.46 d). This is the cadence at which b returns to the same position relative to the tilted stellar dipole, and it is why the SPI bursts recur near — but not exactly at — b&#x27;s orbital phase. For the cfg the flux-tube footpoint animation is keyed to the 2.02-day orbit with a slow 68-day modulation.",
  "h2_144":"Visual styling",
  "p_145":"Combining the surface, atmosphere, and magnetosphere decisions:",
  "li_146":"<b>Global color palette.</b> A warm iron-toned rocky world (<span class=\"hex-chip\" style=\"background:#5a4438\"></span><code>#5a4438</code> primary, <span class=\"hex-chip\" style=\"background:#7a3a22\"></span><code>#7a3a22</code> oxidized accent) under deep red-orange 3100 K light — lighter and warmer than the black airless lava-rock inner TRAPPIST worlds, reflecting b&#x27;s lack of a confirmed molten surface.",
  "li_147":"<b>Dayside.</b> Warm substellar hemisphere (~520 K peak) with textured rocky plains; a faint warm limb haze if the thin atmosphere is present.",
  "li_148":"<b>Terminator band.</b> Sharp and high-contrast if airless; softened by thin-atmosphere scattering in the adopted scenario.",
  "li_149":"<b>Nightside.</b> Cold; partially warmed by atmospheric redistribution in the thin-atmosphere reading, near-black if airless. Reflected light from siblings c and d at conjunction is the main nightside source.",
  "li_150":"<b>Magnetosphere / aurora (the headline).</b> b is the only NearStars planet with an indirectly measured magnetic field (≥ 0.4 G; Trigilio 2023). The cfg should render b&#x27;s own magnetosphere and auroral ovals at its magnetic poles, plus the Jupiter-Io-style flux tube linking b to the stellar magnetic poles — the visible expression of the confirmed SPI. Auroral brightening keyed to the 2.02-day orbit.",
  "li_151":"<b>Star in sky.</b> YZ Cet subtends ~5.1° in b&#x27;s sky (≈ 10× the Sun from Earth), a pale warm orange (3100 K → <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>), flooding the surface with ~8.2× Earth&#x27;s insolation in infrared-rich light. Frequent flares from the eruptive-variable host punctuate the illumination.",
  "li_152":"<b>Sister planets in sky.</b> c and d appear as bright moving points; near-coplanar compact system, so conjunctions are frequent.",
  "h2_153":"Bibliography",
  "h3_154":"Read (visual-informative, drove decisions above)",
  "li_155":"<b><a href=\"https://arxiv.org/abs/2305.00809\">2305.00809</a></b> Trigilio et al. 2023 — uGMRT 550–900 MHz confirmation of ARE from SPI at 4.37σ. Source for the <b>planet b magnetic field lower limit B ≥ 0.4 G</b> (R_MP ≥ 1.6–2.0 R_planet from the ARE power balance), the magnetosphere-present decision, and the sub-Alfvénic flux-tube geometry. The single most important paper for this planet.",
  "li_156":"<b><a href=\"https://arxiv.org/abs/2304.00031\">2304.00031</a></b> Pineda &amp; Villadsen 2023 — VLA 2–4 GHz coherent radio bursts folding to b&#x27;s 2.02087 d orbit. Source for the SPI driver identification (b, not c/d), the radius bracket (0.89–1.0 R⊕ for Earth-like density), the synodic-period geometry, and the sub-Alfvénic regime that makes b the flux-tube driver.",
  "li_157":"<b>2020A&amp;A...636A.119S</b> Stock et al. 2020 — Phase 2 recommended source for b&#x27;s orbit (P = 2.02087 d, a = 0.01634 AU, e = 0.06) and minimum mass (0.70 M⊕), plus the semi-empirical radius estimate (0.913 R⊕).",
  "h3_158":"Read (context / methodology, not decision-driving)",
  "li_159":"<b>2017A&amp;A...605L..11A</b> Astudillo-Defru et al. 2017 — discovery paper for b/c/d; earlier orbit/mass solution (P = 1.96876 d) retained as <code>recommended:false</code>. Context for the system architecture.",
  "li_160":"Host stellar synthesis (<code>yz-cet.md</code>) — the Teff/L/R/M/activity/field values that set b&#x27;s illumination and SPI environment.",
  "h3_161":"Read (instrument-only, not visual-informative)",
  "li_162":"The radio-interferometry methodology of both SPI papers (CASA reduction, Stokes V dynamic spectra, hollow-cone ARE model) underpins the magnetic-field numbers but yields no additional visual field.",
  "h3_163":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_164":"No JWST, transit, or transmission-spectroscopy paper exists for b (it does not transit), so there is no eclipse/atmosphere literature to read. The generic M-dwarf-wind and SPI-theory references (Saur 2013, Lanza 2009, Turnpenney 2018, Vidotto 2019) cited inside the two SPI papers are read for context but contribute no b-specific cfg number.",
  "h2_165":"Open items for follow-up",
  "li_166":"<b>Cfg variant: airless b.</b> The adopted thin-atmosphere reading is an interesting-first tie-break; the conservative airless variant (0 Pa, black sky, sharp limb) is preserved here as an alternative cfg the writer can ship. The magnetosphere (≥ 0.4 G) is retained in both variants.",
  "li_167":"<b>Radius is an estimate, not a measurement.</b> b does not transit; the 0.913 R⊕ figure is semi-empirical. If a future astrometric or direct-imaging mass / radius appears, the surface gravity, density, and SPI cross-section should be updated.",
  "li_168":"<b>Magnetic-field refinement.</b> The ≥ 0.4 G lower limit (Trigilio 2023) tightens if the full ARE high-frequency cutoff is measured or if the Alfvén-Wing scenario (which needs ≳ a few G; Pineda &amp; Villadsen 2023) is favoured by future monitoring. Update the field strength and magnetopause standoff accordingly.",
  "li_169":"<b>Atmosphere detection.</b> Only a future emission/phase-curve campaign (challenging for a non-transiting planet) could confirm or exclude the thin atmosphere; until then the pressure stays low-confidence.",
  "h2_170":"Related",
  "li_171":"<a href=\"yz-cet.html\">yz-cet</a> — host star; the M4.5 V flare star whose kG field anchors the SPI to this planet",
  "li_172":"<a href=\"yz-cet-c.html\">yz-cet-c</a> — next planet out (middle of the compact system)",

  "p_2":"<b>NearStars 시나리오 선택. 따뜻하고 조석 고정된 암석 행성으로, 얇거나 없는 이차 대기를 가지며 — 독특하게 — 자기권을 가집니다.</b> YZ Cet b 는 시스템의 확인된 항성-행성 자기 상호작용의 구동체입니다. Trigilio et al. 2023 은 오로라 전파 방출에서 <b>행성 극자기장이 최소 0.4 G</b> 임을 추론했는데, 이는 외계행성 자기장의 첫 (간접) 측정이고, Pineda &amp; Villadsen 2023 은 b 의 궤도로 folding 되는 SPI 전파 버스트를 검출합니다. 자기권이 이 행성의 헤드라인 특징입니다. 통과나 식, 투과 스펙트럼이 없으므로 표면과 대기는 low confidence 에 둡니다.",

  "h2_129":"Surface synthesis",
  "p_130":"YZ Cet b 는 통과나 식, 투과 측정이 없어, 표면에 관한 모든 것이 최소질량과 궤도, 호스트 조명에서 추론됩니다. 반지름 (0.913 R⊕) 은 관측이 아니라 준경험적 질량-반지름 추정입니다. SPI 단면에 반지름이 필요했던 Pineda &amp; Villadsen 2023 은 지구형 밀도를 가정해 0.89–1.0 R⊕ 로 bracket 했습니다. 최소질량 M sin i = 0.70 M⊕ (Stock 2020) 은 진짜 하한이고, 실제 질량은 1/sin i 만큼 더 큽니다. cfg 목적상 b 는 sub-지구질량~지구질량 암석 행성으로 다룹니다.",
  "p_131":"핵심 열적 사실은 b 가 <b>녹은 게 아니라 따뜻하다</b> 는 것입니다. 알베도 0 평형온도는 T_eq ≈ 471 K (여기서 L = 0.0022 L☉, a = 0.01634 AU 로 계산) 이고 일사량은 지구의 ~8.2 배입니다 — 높지만, M 왜성이 너무 어두워서 0.0163 AU 에서도 b 는 작은 궤도만으로 짐작되는 것보다 훨씬 차갑습니다. 이는 안쪽 TRAPPIST 세계와 같은 교훈입니다. 어두운 적색왜성을 바싹 끌어안은 행성이 자동으로 용암 세계가 되지는 않습니다. substellar 맨 암석 정점 온도는 ~520 K 로, 마그마 바다가 아니라 금성 표면에 필적합니다.",
  "p_132":"<b>색 선택.</b> 호스트의 3100 K 적등색 조명 아래 b 는 따뜻한 색조의 철 함유 basalt 표면 (<span class=\"hex-chip\" style=\"background:#5a4438\"></span><code>#5a4438</code> primary) 에 산화철 patch accent (<span class=\"hex-chip\" style=\"background:#7a3a22\"></span><code>#7a3a22</code>) 으로 렌더링합니다. 이는 JWST 로 확인된 용암-암석 TRAPPIST-1 b 의 매우 어두운 airless ultramafic 검정 (<span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code>) 보다 의도적으로 따뜻하고 밝습니다. YZ Cet b 에는 신선-ultramafic, near-zero 알베도 표면을 강제하는 JWST 식이 없기 때문입니다 — 여기서 interesting -first tie-break 는 밋밋한 검정 구체보다 눈에 띄게 텍스처가 있는 철-색조 따뜻한 암석을 선호합니다. 표면 색조는 low-confidence 입니다. 식이나 반사율 데이터가 없어 광물학이 제약되지 않고, 선택은 허용 범위 안의 미적 결정입니다.",
  "p_133":"<b>형태.</b> 조석 고정 (2.02 일 궤도가 시스템 나이 안에서 spin 을 동기 자전으로 damping) 이라 substellar 점이 고정됩니다. 기본 텍스처는 따뜻한 dayside 와 차가운 nightside 를 가진 cratered 암석 평원입니다. 확인된 재포장 메커니즘이 없으므로 TRAPPIST-1 b 와 달리 강제된 신선 -용암 지형은 없습니다 — 다만 얇은 substellar warm-spot 밝아짐은 허용되는 시각 터치입니다.",
  "h2_134":"Atmosphere synthesis",
  "p_135":"YZ Cet b 의 투과 스펙트럼이 없어, 대기는 전적으로 허용 범위 안의 합성 선택입니다. 두 물리적 고려가 이를 bracket 합니다. (1) T_eq ≈ 471 K 와 ~8.2 배 지구 일사량에서 얇은 이차 대기는 열적으로 그럴듯하나 끊임없는 침식을 받고, (2) 호스트는 kG 자기장과 강한 항성풍을 가진 적당히 활동적인 flaring M 왜성이며 b 는 sub-Alfvénic 영역에서 항성 자기권 깊숙이 공전합니다 — 대기 유지에 적대적인 XUV·입자 환경입니다.",
  "p_136":"b 만의 결정적 반전은 <b>자신의 자기권</b> 입니다. Trigilio 2023 의 SPI 전력 균형은 b 가 항성풍에 대해 R_MP ≥ 1.6–2.0 R_planet 의 magnetopause 를 제시하기를 요구하고, 이는 b 가 단순 ionosphere 장애물이 아니라 실제 자기장 (극에서 ≥ 0.4 G) 을 가져야 함을 뜻합니다. 그 정도 자기권 이면 얇은 대기를 직접적인 항성풍 stripping 으로부터 부분적으로 보호할 것이라 — &quot;얇은 대기&quot; 해석이 비자화 근접 M-왜성 행성보다 b 에 대해 더 방어 가능합니다.",
  "p_137":"NearStars 에는 interesting-first tie-break 로 <b>얇은 이차 대기 (~0.1 bar, CO₂/N₂)</b> 를 채택하고, 보수적 airless 변형은 Open items 에 보존합니다. 이는 low-confidence 미적 선택입니다. 대기가 있으면 b 는 희미한 따뜻한 사지 haze (<span class=\"hex-chip\" style=\"background:#caa37a\"></span><code>#caa37a</code>) 와 약간의 주야 열 재분배를 가지며, 이는 맨 airless 구체보다 시각적으로 독특하고 — 요구되지는 않지만 — 자기권 추론과 일관됩니다.",
  "p_138":"<b>하늘 외형.</b> 얇은 대기가 있으면 3100 K 별 아래 낮 하늘은 천정 부근에 약한 Rayleigh 파랑을 띤 흐린 적등색입니다. b 가 대신 airless 라면 하늘은 검고 별 원반은 sharp-edged 입니다. 어느 쪽이든 호스트 별이 ~5.1° 각지름 (지구에서 본 태양의 약 10 배) 으로 하늘을 지배하는 깊은 적등색이고, 두 바깥 형제 (c, d) 는 밝게 움직이는 &quot;별&quot; 로 보입니다.",
  "h2_139":"Rotation &amp; spin synthesis",
  "p_140":"YZ Cet b 는 조석 고정입니다. 0.137 M☉ 별 주위 a = 0.0163 AU 에서 조석 고정 시간척도는 시스템 나이 (수 Gyr) 보다 훨씬 짧아, 행성은 2.02087 일 궤도와 동기 자전합니다. 이심률 (0.06 ± 0.06. Stock 2020) 은 제약이 약하고 원궤도와 일관됩니다. e ≲ 0.06 에서 1:1 spin-orbit 공명이 3:2 보다 강하게 선호됩니다 (Vinson 2017 / Makarov 2018. 3:2 는 상당한 삼축성과 함께 e ≈ 0.01 이상에서만 안정이고, 낮은-e RV 해는 이를 뒷받침하지 않음). 자전축 기울기는 0 으로 damping 됩니다.",
  "p_141":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 2.02087 일 = 174 603 s. Kopernicus 에서 바디의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 같습니다.",
  "p_142":"<b>계절 없음.</b> 자전축 기울기 = 0 과 거의 0 인 이심률에서 substellar 점은 표면 좌표계에 고정됩니다.",
  "p_143":"<b>SPI synodic 기하.</b> 전파 오로라의 가시성은 b 의 궤도와 항성 자전 사이 synodic 주기로 좌우됩니다. P_syn = [P_orb⁻¹ − P_rot⁻¹]⁻¹ ≈ 2.082 d (Pineda &amp; Villadsen 2023, P_rot = 68.46 d 사용). 이는 b 가 기울어진 항성 쌍극자에 대해 같은 위치로 돌아오는 cadence 이고, SPI 버스트가 b 의 궤도 위상 부근에서 — 정확히는 아니게 — 재발하는 이유입니다. cfg 에서 flux-tube footpoint 애니메이션은 2.02 일 궤도에 키잉하고 느린 68 일로 변조합니다.",
  "h2_144":"Visual styling",
  "p_145":"표면, 대기, 자기권 결정을 결합하면.",
  "li_146":"<b>전체 색 팔레트.</b> 깊은 적등색 3100 K 빛 아래 따뜻한 철-색조 암석 세계 (<span class=\"hex-chip\" style=\"background:#5a4438\"></span><code>#5a4438</code> primary, <span class=\"hex-chip\" style=\"background:#7a3a22\"></span><code>#7a3a22</code> 산화 accent) — 확인된 용융 표면이 없는 b 를 반영해, 검은 airless 용암-암석 안쪽 TRAPPIST 세계보다 밝고 따뜻합니다.",
  "li_147":"<b>Dayside.</b> 따뜻한 substellar 반구 (~520 K 정점) 에 텍스처 있는 암석 평원. 얇은 대기가 있으면 희미한 따뜻한 사지 haze.",
  "li_148":"<b>Terminator 띠.</b> airless 면 sharp 하고 고대비. 채택 시나리오에서는 얇은-대기 산란으로 부드러워집니다.",
  "li_149":"<b>Nightside.</b> 차가움. 얇은-대기 해석에서는 대기 재분배로 부분 가열되고, airless 면 near-black. 충시 형제 c, d 의 반사광이 주된 nightside 광원.",
  "li_150":"<b>자기권 / 오로라 (헤드라인).</b> b 는 NearStars 에서 자기장이 간접 측정된 (≥ 0.4 G. Trigilio 2023) 유일한 행성입니다. cfg 는 b 자신의 자기권과 자기 극의 오로라 oval, 그리고 b 를 항성 자기 극에 잇는 목성-이오 식 flux tube — 확인된 SPI 의 시각 표현 — 를 렌더링해야 합니다. 오로라 밝아짐은 2.02 일 궤도에 키잉.",
  "li_151":"<b>하늘의 별.</b> YZ Cet 은 b 의 하늘에서 ~5.1° (지구에서 본 태양의 약 10 배) 를 차지하는 옅은 따뜻한 주황 (3100 K → <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>) 으로, 적외선이 풍부한 빛 ~8.2 배 지구 일사량으로 표면을 적십니다. 폭발 변광성 호스트의 잦은 flare 가 조명을 점점이 끊습니다.",
  "li_152":"<b>하늘의 형제 행성.</b> c 와 d 가 밝게 움직이는 점으로 보입니다. 거의 동일평면 조밀계라 충이 잦습니다.",
  "h2_153":"Bibliography",
  "h3_154":"Read (visual-informative, drove decisions above)",
  "li_155":"<b><a href=\"https://arxiv.org/abs/2305.00809\">2305.00809</a></b> Trigilio et al. 2023 — uGMRT 550–900 MHz 로 SPI 의 ARE 를 4.37σ 로 확인. <b>행성 b 자기장 하한 B ≥ 0.4 G</b> (ARE 전력 균형에서 R_MP ≥ 1.6–2.0 R_planet), magnetosphere-present 결정, sub-Alfvénic flux-tube 기하의 출처. 이 행성에서 가장 중요한 단일 논문이고 첫 간접 외계행성 B-장 측정입니다.",
  "li_156":"<b><a href=\"https://arxiv.org/abs/2304.00031\">2304.00031</a></b> Pineda &amp; Villadsen 2023 — b 의 2.02087 d 궤도로 folding 되는 VLA 2–4 GHz coherent 전파 버스트. SPI 구동체 식별 (c/d 가 아니라 b), 반지름 bracket (지구형 밀도 시 0.89–1.0 R⊕), synodic-period 기하, 그리고 b 를 flux-tube 구동체로 만드는 sub-Alfvénic 영역의 출처.",
  "li_157":"<b>2020A&amp;A...636A.119S</b> Stock et al. 2020 — b 의 궤도 (P = 2.02087 d, a = 0.01634 AU, e = 0.06) 와 최소질량 (0.70 M⊕), 준경험적 반지름 추정 (0.913 R⊕) 의 Phase 2 recommended 출처.",
  "h3_158":"Read (context / methodology, not decision-driving)",
  "li_159":"<b>2017A&amp;A...605L..11A</b> Astudillo-Defru et al. 2017 — b/c/d 발견 논문. 이전 궤도/질량 해 (P = 1.96876 d) 는 <code>recommended:false</code> 로 보존. 시스템 구조의 맥락.",
  "li_160":"항성 합성 (<code>yz-cet.md</code>) — b 의 조명과 SPI 환경을 정하는 Teff/L/R/M/활동/자기장 값.",
  "h3_161":"Read (instrument-only, not visual-informative)",
  "li_162":"두 SPI 논문의 전파-간섭계 방법론 (CASA 처리, Stokes V 동적 스펙트럼, hollow-cone ARE 모델) 은 자기장 수치를 떠받치지만 추가 시각 필드는 주지 않습니다.",
  "h3_163":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_164":"b 의 JWST, 통과, 투과-분광 논문은 없습니다 (b 는 통과하지 않음). 따라서 읽을 식/대기 문헌이 없습니다. 두 SPI 논문 안에 인용된 일반적인 M-왜성-풍 및 SPI-이론 참고문헌 (Saur 2013, Lanza 2009, Turnpenney 2018, Vidotto 2019) 은 맥락용으로 읽었지만 b-고유 cfg 수치는 주지 않습니다.",
  "h2_165":"Open items for follow-up",
  "li_166":"<b>cfg 변형: airless b.</b> 채택된 얇은-대기 해석은 interesting-first tie-break 입니다. 보수적 airless 변형 (0 Pa, 검은 하늘, sharp 사지) 은 작성자가 ship 할 수 있는 대안 cfg 로 여기 보존합니다. 자기권 (≥ 0.4 G) 은 두 변형 모두에서 유지됩니다.",
  "li_167":"<b>반지름은 측정이 아니라 추정.</b> b 는 통과하지 않습니다. 0.913 R⊕ 수치는 준경험적입니다. 미래 천체측정/직접영상 질량·반지름이 나오면 표면 중력, 밀도, SPI 단면을 갱신해야 합니다.",
  "li_168":"<b>자기장 정밀화.</b> ≥ 0.4 G 하한 (Trigilio 2023) 은 전체 ARE 고주파 cutoff 가 측정되거나 미래 모니터링이 Alfvén-Wing 시나리오 (≳ 수 G 필요. Pineda &amp; Villadsen 2023) 를 선호하면 좁혀집니다. 자기장 강도와 magnetopause standoff 를 그에 맞게 갱신.",
  "li_169":"<b>대기 검출.</b> 미래 방출/위상-곡선 캠페인 (비통과 행성에는 도전적) 만이 얇은 대기를 확인하거나 배제할 수 있습니다. 그때까지 압력은 low-confidence 입니다.",
  "h2_170":"Related",
  "li_171":"<a href=\"yz-cet.html\">yz-cet</a> — 호스트 별. kG 자기장이 이 행성에 SPI 를 정박시키는 M4.5 V flare star",
  "li_172":"<a href=\"yz-cet-c.html\">yz-cet-c</a> — 다음 바깥 행성 (조밀계 중간)",
  "li_173":"<a href=\"yz-cet-d.html\">yz-cet-d</a> — 최외측 행성",
  "li_174":"<a href=\"trappist-1-b.html\">trappist-1-b</a> — 비교 최내측 M-왜성 암석 행성이나 JWST 로 확인된 airless 용암-암석. YZ Cet b 의 미측정 표면 및 확인된 자기권과 대비",
  "li_175":"<a href=\"../wiki/reference__methodology.html\">methodology</a> — Decisions 표와 confidence 태그의 스키마",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
