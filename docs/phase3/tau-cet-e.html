  "h2_185":"Surface synthesis",
  "p_186":"In the Feng 2017 picture, τ Ceti e sat at 1.69 S⊕ — comparable to or slightly inside the conservative habitable zone inner edge for a G8V host (Kopparapu 2014: ~1.05 S⊕). At this insolation, e was the &quot;interesting&quot; planet of the four — warmer than Earth but not in the Venus-class runaway regime, with an equilibrium temperature of 317 K at zero albedo or 290 K under an Earth-analog 0.3 bond albedo, comfortably in the liquid-water range. Kopparapu et al. 2014&#x27;s optimistic inner edge (which extends inward to ~0.75 S⊕) was the framework most often cited when e was discussed as a habitability target between 2017 and 2025.",
  "p_187":"<b>The historical scenario assumed a partially-ocean-covered super- Earth.</b> With 3.93 M⊕ (M sin i) and a sub-Neptune-relation radius of 1.81 R⊕, the Feng 2017 picture supported a temperate world with a modest 1-bar N₂/CO₂ atmosphere, surface oceans covering perhaps 30–60% of the planet, and seasonal polar ice caps modulated by the 0.18 eccentricity. Surface temperature in this reading was ~295 K globally, with the substellar diurnal peak ~310 K and the nightside ~280 K — Earth-temperate with a stronger pole-to-equator gradient than Earth because of the slow asynchronous rotation.",
  "p_188":"<b>Color choice — Earth-analog with metal-poor host correction.</b> If e existed and were rendered, the primary surface tint <span class=\"hex-chip\" style=\"background:#7a6a58\"></span><code>#7a6a58</code> encodes a continental blend (basalt + sediment) under the cleaner- yellow G8V SED. The accent <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code> is reserved for vegetation- analog or olivine-rich patches — a tie-break that explicitly nods to the Andy Weir &quot;Adrian&quot; fictional rendering, which depicted vegetation- like features. <i>This is a fiction cross-reference, not a physical prediction.</i> No data ever supported a biosphere on e, and with the False Positive disposition the question is moot.",
  "p_189":"<b>Refutation context.</b> The Feng 2017 signal at 162 d turned out to be a stellar-activity artifact correlated with τ Ceti&#x27;s slow magnetic cycle — the 162-d period is roughly P_rot / 4 to 5 (the host rotates at 34 d in the Baliunas 1996 frame, or 46 d per Boro Saikia 2018 ZDI), placing the false signal in the harmonic regime typical of activity-induced RV noise on quiet G dwarfs. Cretignier 2021 first identified this with the YARARA post-processing technique; Figueira 2025 confirmed it with ESPRESSO&#x27;s sub-10 cm/s precision, where the 162-d signal failed to appear in the cleaner instrument&#x27;s data.",
  "h2_190":"Atmosphere synthesis",
  "p_191":"The atmosphere synthesis is the most thoroughly historical part of this document. No atmosphere was ever observed; the Feng 2017 picture assumed Earth-analog conditions because the inferred insolation placed e in the optimistic HZ, but the underlying signal is now considered an artifact.",
  "p_192":"<b>Pressure choice — 1 bar (historical).</b> The Feng 2017 picture&#x27;s Earth-analog default is 1 bar surface pressure. This was the working assumption in habitability discussions and in popular- science treatments (including <i>Project Hail Mary</i>&#x27;s Adrian rendering). Under Wordsworth 2015&#x27;s framework, an inner-HZ super- Earth at 1.69 S⊕ on a metal-poor quiet G dwarf could maintain a 1-bar N₂-dominated atmosphere over multi-Gyr timescales — XUV- driven hydrodynamic loss is negligible (log L_X ≤ 26.5; Schmitt 1985), Jeans escape for N₂ at Teq = 290 K is ineffective.",
  "p_193":"<b>Composition (historical).</b> Earth-analog with metal-poor host correction: N₂ ~78%, CO₂ ~2–5% (slightly elevated relative to Earth to maintain temperate Teff under the lower G8V insolation), H₂O vapor variable, trace O₂ uncertain (no biosphere assumed without evidence). The metal-poor host implies marginally less primordial volatile inventory than Earth had at the same orbital regime.",
  "p_194":"<b>Sky appearance (historical).</b> Pale blue-grey (<span class=\"hex-chip\" style=\"background:#8a99aa\"></span><code>#8a99aa</code>) Rayleigh scattering under the cleaner G8V SED — slightly cooler-toned than Earth&#x27;s sky because the host emits less blue continuum. The host star subtends 0.786° from e&#x27;s surface (about 1.5× the Sun&#x27;s angular size from Earth) — a bright pale-yellow disk under the metal-poor SED. Clouds would have appeared cleaner cream-white (<span class=\"hex-chip\" style=\"background:#ece6dc\"></span><code>#ece6dc</code>) rather than Earth&#x27;s warmer-toned clouds. Surface illumination would have been roughly 1.6× Earth&#x27;s irradiance — a bright Earth- like day with a marginally cooler color temperature.",
  "p_195":"<b>Loss mechanisms (historical context).</b> The host&#x27;s quiet XUV environment is the most important factor: e at 0.538 AU around a log R&#x27;HK = −4.95 quiet G dwarf would have experienced essentially no hydrodynamic escape over 7 Gyr. The atmosphere in the Feng 2017 picture was therefore an exceptionally secure 1-bar envelope — arguably more secure than Earth&#x27;s own (which experiences modest solar-wind erosion). This was part of the case for Adrian being a plausible long-term habitable world in the Andy Weir narrative.",
  "h2_196":"Rotation &amp; spin synthesis",
  "p_197":"If τ Ceti e existed, it would <b>not be tidally locked</b>. At P = 162.87 d and a = 0.538 AU around a 0.78 M☉ host, the tidal-lock timescale (Vinson 2017 formula, τ_lock ∝ a^6 / (M_p × Q × R_p^5)) is approximately 30 Gyr — well beyond the system age. Spin damping has not had time to operate.",
  "p_198":"<b>Pseudo-synchronous spin candidate.</b> With eccentricity 0.18, e would be a strong candidate for capture into a high-order spin- orbit resonance (Hut 1981 pseudo-synchronous rotation, ω_spin ≈ ω_orb × f(e)). At e = 0.18, Hut&#x27;s f(e) ≈ 1.4, giving a pseudo- synchronous spin period of ~116 d — a long but non-locked rotation. The 3:2 resonance is also possible at this eccentricity (Vinson 2017 capture probability ~30–50%), giving a spin period of ~109 d.",
  "p_199":"<b>Asynchronous fast rotator alternative.</b> If neither pseudo- synchronous nor 3:2 capture occurred, e could rotate at a primordial period of hours to days, with slow tidal damping over 7 Gyr incomplete because of the long orbital period. The cfg-historical default in this synthesis adopts a generic &quot;multi-week asynchronous slow rotator&quot; without specifying a precise value, because the question is moot for a refuted body.",
  "p_200":"<b>Obliquity.</b> Adopt Earth-analog 23° as a default tie-break. The 0.18 eccentricity gives orbital insolation variation of ±36% peak- to-trough — significantly stronger than Earth&#x27;s ±3.4% — producing substantial &quot;eccentricity seasons&quot; over the 162-day orbit. In the historical picture this would have driven polar ice-cap formation and seasonal hemispheric weather patterns.",
  "p_201":"<b>Magnetic dynamo expectation (historical).</b> A 4–5 M⊕ rocky body with multi-week rotation could plausibly sustain a moderate dynamo. RM22 (Rodríguez-Mozos &amp; Moya 2022, <code>2203.01065</code>) scaling gives a surface field of ~30 μT (comparable to Earth&#x27;s 25–65 μT). Not relevant to cfg because no cfg body is built.",
  "h2_202":"Visual styling",
  "p_203":"This section is the most cultural part of the synthesis, framing the planet &quot;as it was depicted&quot; rather than &quot;as it exists&quot; (because it does not).",
  "li_204":"<b>Global appearance (if it existed).</b> A blue-green-and-cream Earth-analog world with continental landmasses, partial ocean coverage, and seasonal polar ice. Visual character closest to a slightly larger, warmer Earth — the standard &quot;habitable super- Earth&quot; rendering that dominated the 2017–2025 popular-science treatments and Andy Weir&#x27;s depiction of Adrian.",
  "li_205":"<b>Dayside detail (historical reading).</b> Continents in mixed basalt-and-sediment <span class=\"hex-chip\" style=\"background:#7a6a58\"></span><code>#7a6a58</code> tones with vegetation-analog or olivine-rich patches <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code>. Ocean coverage 30–60% in <span class=\"hex-chip\" style=\"background:#2a4a68\"></span><code>#2a4a68</code> Rayleigh-blue, slightly cooler-toned than Earth&#x27;s oceans because of the metal-poor G8V SED. Cloud bands at low latitudes from Hadley-cell circulation.",
  "li_206":"<b>Terminator band (historical).</b> Soft cloud-and-shadow gradient characteristic of a temperate atmosphere — much less crisp than the airless Mercury-analog sibling g, much more developed than the snowball outer sibling f.",
  "li_207":"<b>Nightside appearance (historical).</b> Dark with cyan-white cloud highlights from starlight reflection. No urban lights because no biosphere was implied by the data — <i>Project Hail Mary</i>&#x27;s Adrian is depicted as uninhabited prior to the human expedition.",
  "li_208":"<b>Atmosphere haze (historical).</b> Pale blue-grey (<span class=\"hex-chip\" style=\"background:#8a99aa\"></span><code>#8a99aa</code>) Rayleigh limb glow ~30–50 km thick, similar in character to Earth&#x27;s blue limb but with a marginally cooler tone.",
  "li_209":"<b>Faint aurora (historical).</b> Possible diffuse green-tinted polar aurora at ~1 kR; not a defining feature of the rendering.",
  "li_210":"<b>Star in sky (historical).</b> τ Ceti would subtend 0.786° from e&#x27;s surface — about 1.5× the Sun&#x27;s angular size from Earth. A bright pale-yellow disk under the metal-poor G8V illumination, delivering 1.69× Earth&#x27;s irradiance at the substellar point.",
  "li_211":"<b>&quot;Adrian&quot; cultural cross-reference.</b> Andy Weir&#x27;s <i>Project Hail Mary</i> (2021) names e as Adrian and uses it as the protagonist&#x27;s mission target. The novel adopts Feng 2017&#x27;s orbital parameters (P ≈ 168 d, a ≈ 0.55 AU, M sin i = 3.93 M⊕) but constructs an environment that diverges from the habitable-Earth-analog framing — see the &quot;Weir&#x27;s Adrian&quot; bullet below. The 2025 ESPRESSO refutation post-dates the novel by four years. <b>Per a project decision, NearStars now includes e as a documented divergence</b> — it is rendered using this depicted reading despite the refuted signal (canonical = no planet); this Phase 3 markdown is the synthesis + cultural cross-reference home, paired with <code>docs/reference/cultural-context.md § Tau Ceti</code>.",
  "li_212":"<b>Weir&#x27;s Adrian — diverges from the historical Earth-analog rendering above.</b> <i>Project Hail Mary</i> does not depict Adrian as an Earth-analog blue-green ocean world. The novel&#x27;s stated parameters (compiled from Weir interviews + in-novel measurements) are: surface gravity 1.4 g, atmosphere 91% CO₂ / 7% CH₄ / 1% Ar / trace (no significant N₂ — plot-critical because Taumoeba is nitrogen-intolerant), green appearance from space, sampling carried out at 91.2 km altitude where p = 0.02 bar and T = −51 °C. Weir&#x27;s pressure structure implies a multi-bar CO₂-dominated surface atmosphere — closer to a temperate Venus-analog than to Earth. No ocean is described in the novel; the sampling mission targets upper-atmosphere clouds via a 10 km xenonite chain, never the surface. The vegetation- accent tone <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code> in the Decisions table above is the closest match to Weir&#x27;s &quot;green planet&quot; descriptor, but Weir&#x27;s rendering is <i>photochemical-haze green</i> (CH₄ + CO₂ + airborne Taumoeba biology), not vegetation green. Surface gravity 1.4 g implies Weir adopted a rockier (smaller-radius) mass-radius relation than the popular-science sub-Neptune fit (1.81 R⊕, 1.20 g) — closer to 1.68 R⊕ at the same 3.93 M⊕. Both the historical Earth-analog (table above) and Weir&#x27;s CO₂-haze reading are fiction at this point; neither is observed.",
  "h2_213":"Bibliography",
  "h3_214":"Read (signal history + refutation)",
  "li_215":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, <a href=\"https://arxiv.org/abs/1708.02051\">arXiv:1708.02051</a>). Original discovery paper. Reports e at P = 162.87 d, M sin i = 3.93 M⊕, e = 0.18. Anchors the historical Decisions rows above. Feng 2017 §6 itself cautions that e is the most amplitude-marginal of the four.",
  "li_216":"<b>Cretignier M. et al. 2021</b> — <i>YARARA: stellar-activity post-processing for HARPS RV</i>, A&amp;A 653, A43 (<code>2021A&amp;A...653A..43C</code>). First non-detection of the 162-d signal after stellar-activity decorrelation. Identifies the signal as activity-correlated rather than planetary.",
  "li_217":"<b>Figueira P. et al. 2025</b> — <i>ESPRESSO RV monitoring of τ Ceti: refutation of e and tightened limits on f/g/h</i>, A&amp;A 700, A174 (<code>2025A&amp;A...700A.174F</code>, doi:10.1051/0004-6361/202553869). Instrument-level confirmation that e is a stellar-activity artifact. ESPRESSO&#x27;s sub-10 cm/s precision is below the original Feng 2017 amplitude; the 162-d signal is absent. Drives the False Positive disposition adopted by NEA 2026-04-09.",
  "h3_218":"Read (context for habitability framing)",
  "li_219":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones around main-sequence stars</i>, ApJL 787, L29 (<a href=\"https://arxiv.org/abs/1404.5292\">arXiv:1404.5292</a>, cache <code>_papers/1404.5292.md</code>). Conservative HZ inner edge at ~1.05 S⊕ for a G8V; the optimistic inner edge extends inward to ~0.75 S⊕, placing Feng 2017&#x27;s e at 1.58 S⊕ comfortably inside the optimistic HZ and driving the popular-science framing of e as &quot;habitable.&quot; The gap between the conservative (~1.05 S⊕) and optimistic (~0.75 S⊕) inner edges was part of the debate over e&#x27;s habitability classification before refutation.",
  "li_220":"<b>Wordsworth &amp; Pierrehumbert 2015</b> (general atmospheric-escape argument) — used here as a generic atmosphere-retention reference underlying the 1-bar Earth-analog atmosphere assumed in the historical reading; specific title not pinned.",
  "h3_221":"Read (host star context)",
  "li_222":"<b>Pavlenko Y. V. et al. 2012</b> — host star [Fe/H] = −0.55, log R&#x27;HK = −4.95, Teff = 5344 K. Drove the historical metal-poor-host framing for the e atmosphere and color choices.",
  "li_223":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — gyrochronological age 7 ± 1.5 Gyr; relevant to the historical atmospheric-retention argument over multi-Gyr timescales.",
  "li_224":"<b>Schmitt J. H. M. M. et al. 1985</b> — host X-ray log L_X ≤ 26.5. The quiet XUV environment was central to the &quot;secure atmosphere&quot; framing in the historical reading.",
  "li_225":"<b>Boro Saikia S. et al. 2018</b> — ZDI 46-d rotation; relevant because the refuted 162-d signal lies at a harmonic of the host rotation, consistent with activity-induced false-detection.",
  "h3_226":"Read (cultural cross-reference)",
  "li_227":"<b>Weir A. 2021</b> — <i>Project Hail Mary</i> (novel). Names e as &quot;Adrian&quot; and uses it as the protagonist&#x27;s mission target. The novel pre-dates the 2025 refutation by four years and is the most prominent cultural anchor for the e detection. Documented in <code>docs/reference/cultural-context.md § Tau Ceti</code>.",
  "h3_228":"Read (fiction worldbuilding reference — Weir&#x27;s stated Adrian parameters)",
  "li_229":"<b>Weir A. — Scientific American Science Quickly podcast, &quot;The real science and the fun fiction behind Project Hail Mary&quot;</b>. Weir walks through the gravity / atmosphere derivation. Adopted Feng 2017&#x27;s M sin i = 3.93 M⊕ and back-calculated surface gravity ~1.4 g under a rocky mass-radius relation. Also explains why Tau Ceti: ~9 Gyr stellar age gives life a head start over Earth.",
  "li_230":"<b>Weir A. — Astronomy.com, &quot;Andy Weir on the science of Project Hail Mary&quot;</b>. Sources the deliberate single-genesis panspermia design: Adrian is the origin of Astrophage and the <i>only</i> Astrophage-resistant biosphere (Taumoeba is endemic there).",
  "li_231":"<b>Weir A. — Eridian worldbuilding companion document</b> (provided by user 2026-05-27 as <code>eridian.docx</code>). Authoritative Erid (40 Eri A b) parameters: <b>28 atm NH₃</b>, <b>210 °C</b> surface, <b>2.09 g</b>, <b>5.1-h sidereal day</b> (≈ 18 397 s), <b>25 × Earth</b> magnetic field, density 5 710 kg/m³, radius 12 835 km, mass 8.47 M⊕ (Ma 2018 measured). Also explicitly states the panspermia event seeded Earth + Erid from <b>Tau Ceti</b> — i.e. Adrian is the panspermia source, Erid + Earth the recipients. Cited here only to disambiguate Adrian-vs-Erid parameter conflation in popular summaries.",
  "li_232":"<b>Sky &amp; Telescope — &quot;Explore the Worlds of Project Hail Mary&quot; (2021)</b>. Confirms Weir wrote from the Feng 2017 detection picture pre-refutation. Frames Tau Cet e and 40 Eri A b as the two anchor real-exoplanet detections behind Adrian + Erid.",
  "li_233":"<b>Project Hail Mary Fandom Wiki — Adrian / Taumoeba / Astrophage pages</b>. Fan-compiled index of in-novel measurements (1.4 g, 91% CO₂ / 7% CH₄ / 1% Ar atmosphere, green appearance; Taumoeba habitat at 91.2 km / 0.02 bar / −51 °C; nitrogen-intolerance). Citation pointer into the novel text, not a primary authority.",
  "li_234":"<b>Wheeler D. — &quot;Project Hail Mary Stellar Map&quot; (dwheeler.com/essays/project-hail-mary-map.html)</b>. Third-party derivation showing Wheeler reconstructs Adrian&#x27;s orbit from Feng 2017 directly (P = 168 d, a = 0.552 AU). The novel does not state these numbers explicitly; they are inferred from the e identification.",
  "h3_235":"Not read — superseded or low-priority (~10 papers)",
  "li_236":"<b>Tuomi M. et al. 2013</b> + <b>Tuomi 2014 erratum</b> — earlier 5-planet τ Ceti claim that included e at slightly different parameters. Superseded by Feng 2017; both are now historical given the refutation.",
  "li_237":"<b>Various astrobiology speculation papers (2017–2024)</b> — habitability assessments of e under the Feng 2017 picture. No cfg relevance under the False Positive disposition; left unread for this synthesis.",
  "li_238":"<b>SETI / technosignature papers targeting e</b> — historical observations made before the refutation; no cfg relevance.",
  "h2_239":"Open items for follow-up",
  "li_240":"<b>Disposition is settled.</b> Unlike f / g / h (which remain <code>pl_controv_flag = 1</code> and are on retraction watch — see those Phase 3 syntheses for the open Figueira 2025 / future-ESPRESSO question), e&#x27;s disposition is final: False Positive Planet per NEA 2026-04-09. No further follow-up is expected to re-promote e.",
  "li_241":"<b>Cultural-context cross-reference is the canonical home.</b> Any future &quot;Adrian&quot; rendering — for example as a flavor-text Easter egg in a NearStars patch — should reference <code>docs/reference/cultural-context.md § Tau Ceti</code> rather than spawning a cfg body. The novel is fiction; the underlying planet is not.",
  "li_242":"<b>Sibling retraction watch.</b> Figueira 2025 also reports tightened limits on f / g / h. While none of the three is formally refuted yet (NEA still carries them as disputed), the f / g / h Phase 3 syntheses&#x27; Open items track the retraction-watch question. If a future ESPRESSO reanalysis refutes any of them, this template (historical-only Phase 3 with all-low Confidence) is the precedent.",
  "li_243":"<b><code>db/systems/tau_cet.json::meta.notes</code> should document the false-positive disposition for e.</b> Currently the DB simply omits e from <code>planets[]</code>; an explicit <code>meta.notes</code> entry citing Figueira 2025 + NEA 2026-04-09 would make the omission self-documenting rather than appearing as a curation gap to future readers.",
  "h2_244":"Related",

  "p_1":"τ Ceti e 는 본래 Feng et al. 2017 (<code>2017AJ....154..135F</code>, <a href=\"https://arxiv.org/abs/1708.02051\">arXiv:1708.02051</a>) 이 metal-poor G8V τ Ceti 주위에서 발표한 네 개 RV 행성 후보 중 하나였습니다 — 162.87 일 주기로 0.538 AU 에서 도는 3.93 M⊕ (M sin i) super-Earth 로, optimistic 거주가능영역 (Kopparapu et al. 2014) 의 안쪽 가장자리 바로 안에 자리잡고 있었습니다. 네 검출 중에서 처음부터 가장 disputed 한 신호였으며 — amplitude-to-noise 비가 가장 낮았고, Feng 2017 §6 가 항성 활동도에 의한 오염 우려를 직접 플래그했습니다.",
  "p_2":"<b>현재는 존재 가능성이 철회됨 — NEA 2026-04-09 가 False Positive 로 재분류</b>. Figueira et al. 2025 (<code>2025A&amp;A...700A.174F</code>, doi:10.1051/0004-6361/202553869) 의 ESPRESSO sub-10 cm/s RV 정밀도가 162 일 신호를 검출하지 못한 결과를 인용. Cretignier et al. 2021 (<code>2021A&amp;A...653A..43C</code>) 은 그보다 앞서 HARPS 데이터에 YARARA 항성-활동 후처리를 적용해 같은 부정적 결론에 도달했고, ESPRESSO 는 원래 신호가 행성이 아니라 항성 활동임을 기기 차원에서 확정했습니다. 프로젝트 결정에 따라 e 는 철회 이전 Feng 2017 값으로 <code>db/systems/tau_cet.json::planets[]</code> 에 <b>재등재</b>되며, 반박표기 documented divergence 입니다 (PHM Adrian 문화적 무게).",
  "p_3":"<b>이 Phase 3 합성은 documented divergence 입니다 — False Positive 처분에도 불구하고 프로젝트 결정으로 e 를 포함합니다.</b> cfg 는 철회 이전 Feng 2017 파라미터를 채택하며, 모든 행은 Confidence=low 입니다 — 근거 신호 자체가 이제는 아티팩트로 간주되고 canonical 판독은 &quot;행성 없음&quot;이기 때문입니다. 합성은 문화적 교차참조를 위해 Feng 2017 의 그림을 보존합니다 (이 행성은 Andy Weir 의 <i>Project Hail Mary</i> (2021) 에 등장하는 &quot;Adrian&quot; 의 실세계 모델이었습니다). rex-data-comparison §6 의 큐레이션 thread 와, 한때 확정으로 다뤄지던 검출이 False Positive 재분류 아래에서 어떻게 보이는지의 워크드 예시도 함께 보존합니다.",

  "h2_185":"Surface synthesis",
  "p_186":"Feng 2017 그림에서 τ Ceti e 는 1.69 S⊕ 에 있었습니다 — G8V 호스트의 보수적 거주가능영역 안쪽 가장자리 (Kopparapu 2014: ~1.05 S⊕) 와 비슷하거나 살짝 안쪽. 이 조사량에서 e 는 네 행성 중 &quot;흥미로운&quot; 하나였습니다 — 지구보다 따뜻하지만 금성형 runaway 영역은 아니며, 평형 온도는 albedo 0 에서 317 K, 지구형 0.3 bond albedo 아래 290 K — 액체 수 영역 안에 편하게 자리잡았습니다. Kopparapu et al. 2014 의 optimistic 안쪽 가장자리 (~0.75 S⊕ 까지 안쪽으로 확장) 는 2017 년과 2025 년 사이 e 가 거주가능 타겟으로 논의될 때 가장 자주 인용된 프레임워크였습니다.",
  "p_187":"<b>역사적 시나리오는 부분 해양 커버 super-Earth 를 가정합니다.</b> 3.93 M⊕ (M sin i) 와 sub-Neptune-관계 반지름 1.81 R⊕ 를 가진 Feng 2017 그림은, 적당한 1 bar N₂/CO₂ 대기와 행성의 30–60% 정도를 덮는 표면 해양, 그리고 0.18 이심률로 변조되는 계절성 극지 만년설을 가진 온대 세계를 지지했습니다. 이 reading 에서 표면 온도는 전구적으로 ~295 K, substellar 일주 피크는 ~310 K, nightside 는 ~280 K — 느린 비동기 자전 때문에 지구보다 강한 극-적도 그래디언트를 가진 지구-온대 조건입니다.",
  "p_188":"<b>색 선택 — 지구형에 metal-poor 호스트 보정.</b> e 가 존재해 렌더링 된다면, 1차 표면 색조 <span class=\"hex-chip\" style=\"background:#7a6a58\"></span><code>#7a6a58</code> 은 더 깨끗-노란 G8V SED 아래 대륙 혼합 (현무암 + 퇴적물) 을 인코딩합니다. 액센트 <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code> 은 식생- analog 또는 olivine 풍부 패치 용입니다 — Andy Weir 의 &quot;Adrian&quot; 픽션 렌더링이 식생 같은 피처를 묘사했음을 명시적으로 끄덕이는 tie-break. <i>이는 픽션 교차참조이지 물리적 예측이 아닙니다.</i> 어떤 데이터도 e 에 생물권을 지지한 적 없으며, False Positive 처분 아래 질문 자체가 무의미합니다.",
  "p_189":"<b>철회 맥락.</b> Feng 2017 의 162 d 신호는 τ Ceti 의 느린 자기 사이클 과 상관된 항성-활동 아티팩트로 밝혀졌습니다 — 162 d 주기는 대략 P_rot / 4–5 (호스트는 Baliunas 1996 프레임에서 34 d, Boro Saikia 2018 ZDI 로는 46 d 로 자전) 로, 조용한 G 왜성의 활동-유도 RV 잡음에 전형적인 고조파 영역에 놓입니다. Cretignier 2021 가 YARARA 후처리 기법으로 이를 처음 식별했고, Figueira 2025 가 ESPRESSO 의 sub-10 cm/s 정밀도로 확인 — 더 깨끗한 기기의 데이터에 162 d 신호가 나타나지 않습니다.",
  "h2_190":"Atmosphere synthesis",
  "p_191":"대기 합성은 이 문서에서 가장 철저히 역사적인 부분입니다. 어떤 대기도 관측된 적 없습니다. Feng 2017 그림이 지구형 조건을 가정한 것은 추정된 조사량이 e 를 optimistic HZ 에 위치시켰기 때문이지만, 근거 신호 자체가 이제 아티팩트로 간주됩니다.",
  "p_192":"<b>압력 선택 — 1 bar (역사적).</b> Feng 2017 그림의 지구형 기본값은 표면 압력 1 bar 입니다. 이것이 거주가능성 논의와 대중 과학 다룸 (이 중에는 <i>Project Hail Mary</i> 의 Adrian 렌더링이 포함됩니다) 에서의 작업 가정이었습니다. Wordsworth 2015 프레임워크 아래, 1.69 S⊕ 의 metal-poor 조용한 G 왜성 주위 inner-HZ super-Earth 는 다-Gyr 시간 척도로 1 bar N₂-우세 대기를 유지할 수 있습니다 — XUV 구동 hydrodynamic 손실은 무시 가능 (log L_X ≤ 26.5. Schmitt 1985), Teq = 290 K 에서 N₂ Jeans 탈출은 비효율적.",
  "p_193":"<b>조성 (역사적).</b> metal-poor 호스트 보정이 들어간 지구형. N₂ ~78%, CO₂ ~2–5% (G8V 의 더 낮은 조사량 아래 온대 Teff 를 유지하기 위해 지구 대비 약간 상승), H₂O 증기 가변, 미량 O₂ 불확실 (증거 없이는 생물권 가정 없음). metal-poor 호스트는 같은 궤도 영역의 지구가 가졌던 것보다 살짝 적은 원시 휘발성 인벤토리를 함의합니다.",
  "p_194":"<b>하늘 모습 (역사적).</b> 깨끗한 G8V SED 아래 옅은 청-그레이 (<span class=\"hex-chip\" style=\"background:#8a99aa\"></span><code>#8a99aa</code>) Rayleigh 산란 — 호스트가 청색 연속체를 덜 방출하므로 지구 하늘보다 살짝 더 차가운 톤. 호스트 별은 e 표면에서 0.786° 를 채웁니다 (지구 에서 본 태양의 약 1.5×) — metal-poor SED 아래 밝은 옅은 노랑 원반. 구름은 지구의 더 따뜻한 톤 구름이 아니라 깨끗한 크림-흰 (<span class=\"hex-chip\" style=\"background:#ece6dc\"></span><code>#ece6dc</code>) 으로 보였을 것. 표면 조명은 지구 조사량의 약 1.6× — 살짝 더 차가운 색 온도를 가진 밝은 지구형 하루.",
  "p_195":"<b>손실 메커니즘 (역사적 맥락).</b> 호스트의 조용한 XUV 환경이 가장 중요한 인자입니다. log R&#x27;HK = −4.95 의 조용한 G 왜성 주위 0.538 AU 의 e 는 7 Gyr 동안 본질적으로 어떤 hydrodynamic 탈출도 겪지 않았을 것입니다. Feng 2017 그림의 대기는 따라서 예외적으로 안전한 1 bar envelope 이었습니다 — 적당한 태양풍 침식을 겪는 지구 자신의 대기보다 오히려 더 안전했다고 주장할 수 있습니다. 이 점이 Adrian 을 Andy Weir 서사에서 그럴듯한 장기 거주가능 세계로 만든 근거의 일부였습니다.",
  "h2_196":"Rotation &amp; spin synthesis",
  "p_197":"τ Ceti e 가 존재한다면, <b>조석 고정되지 않습니다</b>. 0.78 M☉ 호스트 주위 P = 162.87 d, a = 0.538 AU 에서 조석 고정 시간 척도 (Vinson 2017 공식, τ_lock ∝ a^6 / (M_p × Q × R_p^5)) 는 대략 30 Gyr — 시스템 나이를 한참 넘어섭니다. spin damping 이 작동할 시간이 없었습니다.",
  "p_198":"<b>Pseudo-synchronous spin 후보.</b> 이심률 0.18 에서 e 는 고차 spin-orbit 공명 (Hut 1981 pseudo-synchronous 자전, ω_spin ≈ ω_orb × f(e)) 으로의 포획 강력 후보였을 것입니다. e = 0.18 에서 Hut 의 f(e) ≈ 1.4 가 pseudo-synchronous 자전 주기 ~116 d 를 줍니다 — 길지만 고정되지 않은 자전. 이 이심률에서 3:2 공명도 가능합니다 (Vinson 2017 포획 확률 ~30–50%, 자전 주기 ~109 d).",
  "p_199":"<b>비동기 빠른 자전자 대안.</b> pseudo-synchronous 도 3:2 포획도 일어나지 않았다면, e 는 시간에서 일 단위의 원시 주기로 자전했을 것이며, 긴 궤도 주기 때문에 7 Gyr 에 걸쳐 조석 damping 이 불완전. 이 합성의 cfg-역사적 기본값은 정확한 값을 지정하지 않고 일반적인 &quot;다주 비동기 느린 자전자&quot; 를 채택합니다 — 철회된 천체에 대해 질문이 무의미하기 때문.",
  "p_200":"<b>Obliquity.</b> Tie-break 기본값으로 지구형 23° 채택. 0.18 이심률은 ±36% peak-to-trough 의 궤도 조사량 변동을 줍니다 — 지구의 ±3.4% 보다 유의미하게 강함 — 162 일 궤도에 걸쳐 상당한 &quot;이심률 계절&quot; 을 일으킬 것. 역사적 그림에서 이것이 극지 만년설 형성과 계절성 반구 날씨 패턴을 구동했을 것입니다.",
  "p_201":"<b>자기 dynamo 기대치 (역사적).</b> 다주 자전을 가진 4–5 M⊕ 암석체는 적당한 dynamo 를 지지할 수 있습니다. RM22 (Rodríguez-Mozos &amp; Moya 2022, <code>2203.01065</code>) 스케일링은 표면 자기장 ~30 μT (지구의 25–65 μT 와 유사) 를 줍니다. cfg 천체가 만들어지지 않으므로 cfg 와 무관.",
  "h2_202":"Visual styling",
  "p_203":"이 절은 합성에서 가장 문화적인 부분으로, 행성을 &quot;존재하는 그대로&quot; 가 아니라 &quot;묘사되었던 그대로&quot; 로 프레이밍합니다 (존재하지 않으므로).",
  "li_204":"<b>전구 외관 (존재했다면).</b> 대륙 land mass, 부분 해양 커버리지, 계절성 극지 얼음을 가진 청-녹-크림 지구형 세계. 시각 캐릭터는 살짝 더 크고 따뜻한 지구에 가장 가깝습니다 — 2017–2025 대중 과학 다룸과 Andy Weir 의 Adrian 묘사를 지배한 표준 &quot;거주가능 super- Earth&quot; 렌더링.",
  "li_205":"<b>Dayside 디테일 (역사적 reading).</b> 현무암-퇴적물 혼합 톤 <span class=\"hex-chip\" style=\"background:#7a6a58\"></span><code>#7a6a58</code> 의 대륙에 식생-analog 또는 olivine 풍부 패치 <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code>. metal-poor G8V SED 때문에 지구의 해양보다 살짝 더 차가운 톤의 <span class=\"hex-chip\" style=\"background:#2a4a68\"></span><code>#2a4a68</code> Rayleigh-푸름 해양이 30–60% 커버. 낮은 위도에서는 Hadley-cell 순환으로 인한 구름 띠.",
  "li_206":"<b>Terminator 밴드 (역사적).</b> 온대 대기의 특징적 부드러운 구름- 그림자 그래디언트 — 무대기 Mercury-analog 자매 g 보다 한참 덜 또렷하고, snowball 외곽 자매 f 보다 한참 더 발달함.",
  "li_207":"<b>Nightside 외관 (역사적).</b> 어둠. 별빛 반사로 인한 cyan-white 구름 하이라이트. 데이터로 어떤 생물권도 함의되지 않으므로 도시 불빛 없음 — <i>Project Hail Mary</i> 의 Adrian 도 인간 원정 이전에는 무인으로 묘사됩니다.",
  "li_208":"<b>대기 안개 (역사적).</b> ~30–50 km 두께의 옅은 청-그레이 (<span class=\"hex-chip\" style=\"background:#8a99aa\"></span><code>#8a99aa</code>) Rayleigh 림 글로우. 지구의 푸른 림과 캐릭터는 비슷하지만 살짝 더 차가운 톤.",
  "li_209":"<b>희미한 오로라 (역사적).</b> ~1 kR 의 녹색 톤이 살짝 들어간 확산 극지 오로라 가능. 렌더링의 정의적 피처는 아님.",
  "li_210":"<b>하늘의 별 (역사적).</b> τ Ceti 는 e 표면에서 0.786° 를 채웠을 것 — 지구에서 본 태양의 약 1.5×. metal-poor G8V 조명 아래 밝은 옅은 노랑 원반으로, substellar 지점에서 지구 조사량의 1.69× 를 전달.",
  "li_211":"<b>&quot;Adrian&quot; 문화적 교차참조.</b> Andy Weir 의 <i>Project Hail Mary</i> (2021) 가 e 를 Adrian 이라 부르고 주인공의 임무 타겟으로 사용. 소설은 Feng 2017 의 궤도 파라미터 (P ≈ 168 d, a ≈ 0.55 AU, M sin i = 3.93 M⊕) 를 채택하지만 거주가능 Earth-analog 프레이밍 과는 다른 환경을 구축 — 아래 &quot;Weir&#x27;s Adrian&quot; 글머리표 참조. 2025 ESPRESSO 철회는 소설보다 4 년 늦습니다. <b>프로젝트 결정에 따라 NearStars 는 이제 e 를 documented divergence 로 포함</b>하며 — 철회된 신호에도 불구하고 이 묘사 판독으로 렌더링합니다 (canonical = 행성 없음). 이 Phase 3 마크다운이 합성 + <code>docs/reference/cultural-context.md § Tau Ceti</code> 와 짝을 이룬 문화적 교차참조 홈입니다.",
  "li_212":"<b>Weir 의 Adrian — 위의 역사적 Earth-analog 렌더링과 다름.</b> <i>Project Hail Mary</i> 는 Adrian 을 Earth-analog 푸른 해양 세계로 묘사하지 않습니다. 소설의 명시된 파라미터 (Weir 인터뷰 + 소설 내 측정값 종합). 표면 중력 1.4 g, 대기 91% CO₂ / 7% CH₄ / 1% Ar / 미량 (N₂ 없음 — Taumoeba 가 질소 불내성이라 plot 핵심), 우주 에서 본 녹색 외관, 91.2 km 고도에서 sampling 수행 (그 고도에서 p = 0.02 bar, T = −51 °C). Weir 의 압력 구조는 다 bar CO₂ 우세 표면 대기를 함의 — Earth 보다 Venus 온대 analog 에 가깝습니다. 소설에 묘사된 해양 없음. sampling 임무는 10 km xenonite chain 으로 대기 상층 클라우드를 타겟. 표면 도달 안 함. 위 Decisions 표의 식물 accent 톤 <span class=\"hex-chip\" style=\"background:#4a6840\"></span><code>#4a6840</code> 가 Weir 의 &quot;녹색 행성&quot; 묘사에 가장 근접하지만, Weir 의 렌더링은 <i>광화학 haze 녹색</i> (CH₄ + CO₂ + 대기 부유 Taumoeba 생물) 이지 식물 녹색이 아닙니다. 표면 중력 1.4 g 는 Weir 가 popular-science sub-Neptune 핏 (1.81 R⊕, 1.20 g) 보다 더 암석질 (반지름 더 작은) mass-radius 관계를 채택했음을 함의 — 같은 3.93 M⊕ 에서 1.68 R⊕ 근방. 역사적 Earth-analog (위 표) 와 Weir 의 CO₂-haze 둘 다 현 시점에서 픽션. 관측된 게 아닙니다.",
  "h2_213":"Bibliography",
  "h3_214":"Read (signal history + refutation)",
  "li_215":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, <a href=\"https://arxiv.org/abs/1708.02051\">arXiv:1708.02051</a>). 원래 발견 논문. e 를 P = 162.87 d, M sin i = 3.93 M⊕, e = 0.18 로 보고. 위 역사적 Decisions 행을 정박. Feng 2017 §6 자체가 e 가 네 행성 중 amplitude 가 가장 마지널함을 경계.",
  "li_216":"<b>Cretignier M. et al. 2021</b> — <i>YARARA: HARPS RV 의 항성-활동 후처리</i>, A&amp;A 653, A43 (<code>2021A&amp;A...653A..43C</code>). 항성-활동 탈상관 후 162 d 신호의 첫 미검출. 신호를 행성이 아니라 활동-상관 으로 식별.",
  "li_217":"<b>Figueira P. et al. 2025</b> — <i>τ Ceti ESPRESSO RV 모니터링. e 의 철회와 f/g/h 의 더 엄격한 한계</i>, A&amp;A 700, A174 (<code>2025A&amp;A...700A.174F</code>, doi:10.1051/0004-6361/202553869). e 가 항성-활동 아티팩트임을 기기 차원에서 확정. ESPRESSO 의 sub-10 cm/s 정밀도는 원래 Feng 2017 진폭 아래. 162 d 신호 부재. NEA 2026-04-09 이 채택한 False Positive 처분을 견인.",
  "h3_218":"Read (context for habitability framing)",
  "li_219":"<b>Kopparapu R. K. et al. 2014</b> — <i>주계열별 주위 거주가능영역</i>, ApJL 787, L29 (<a href=\"https://arxiv.org/abs/1404.5292\">arXiv:1404.5292</a>, 캐시 <code>_papers/1404.5292.md</code>). G8V 의 보수적 HZ 안쪽 가장자리는 ~1.05 S⊕. optimistic 안쪽 가장자리는 ~0.75 S⊕ 까지 안쪽으로 확장되어 Feng 2017 의 e 를 1.58 S⊕ 의 optimistic HZ 안에 편안하게 놓고, e 를 &quot;거주가능&quot; 으로 묘사한 대중 과학 프레이밍을 견인. 보수적 (~1.05 S⊕) 과 optimistic (~0.75 S⊕) 안쪽 가장자리 간의 차이는 철회 이전 e 의 거주가능성 분류 논쟁의 일부였음.",
  "li_220":"<b>Wordsworth &amp; Pierrehumbert 2015</b> (general atmospheric-escape argument) — 역사적 reading 에서 가정한 1 bar 지구형 대기 바닥의 일반 대기-유지 참조로 사용. 구체적 제목은 핀하지 않음.",
  "h3_221":"Read (host star context)",
  "li_222":"<b>Pavlenko Y. V. et al. 2012</b> — 호스트 별 [Fe/H] = −0.55, log R&#x27;HK = −4.95, Teff = 5344 K. e 대기와 색 선택에 대한 역사적 metal-poor-host 프레이밍 견인.",
  "li_223":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — gyrochronological 나이 7 ± 1.5 Gyr. 다-Gyr 시간 척도의 역사적 대기-유지 논의에 관련.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
