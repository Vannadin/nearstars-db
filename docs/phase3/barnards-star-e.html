  "td_169":"Barnard Teff",
  "h2_170":"Surface synthesis",
  "p_171":"Barnard e&#x27;s surface conditions are the most &quot;habitable-adjacent&quot; of the four planets — though still firmly outside any conservative HZ. Substellar dayside temperatures of ~470 K under the cfg&#x27;s thin-CO₂ atmosphere scenario allow basaltic regolith without partial melt; the surface tint (<span class=\"hex-chip\" style=\"background:#503020\"></span><code>#503020</code>) is the darkest and coolest of the four to reflect the lowest insolation. Terminator-ridge accent (<span class=\"hex-chip\" style=\"background:#6a4030\"></span><code>#6a4030</code>) provides modest visual variation.",
  "p_172":"The thin-atmosphere scenario opens the possibility of subtle geomorphic features absent on the airless siblings. If e ever experienced a wetter early phase before the cumulative XUV escape desiccated it, relict drainage networks or chemically weathered basaltic terrains could be preserved. The cfg&#x27;s <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> field includes &quot;possible relict aqueous-weathering features&quot; as a visual nuance — a tie-break choice motivated by the cooler-end of the four-planet ensemble.",
  "p_173":"The antistellar hemisphere remains a cold-trap, though at ~250 K (considerably warmer than b/c/d&#x27;s ~100–130 K) because the thin atmosphere allows nightside heat transport. Substellar-to-antistellar day-night temperature contrast is ~220 K — much smaller than the airless 600 K contrast on the other planets.",
  "p_174":"Mass-radius for 0.19 M⊕ Earth-analog rocky gives 0.58–0.69 R⊕; the cfg&#x27;s 0.64 R⊕ choice is midpoint. The density 4.0 g/cc is the lowest of the four planets — consistent with either (a) slight volatile enrichment (a few wt% H₂O / CO₂ in the mantle) or (b) simply the mass-radius slope for small rocky planets. A direct radius measurement would distinguish, but no transit detection exists.",
  "h2_175":"Atmosphere synthesis",
  "p_176":"The cfg adopts a thin CO₂-dominated secondary atmosphere for e as the canonical tie-break upgrade over the bare-rock baseline used for b/c/d. The motivating physics: at 2.45 S⊕ insolation and 0.0381 AU orbital distance, the France 2020 atmospheric loss rate scales down to roughly 1/5 the inner-system value per unit area. Cumulative loss over 10 Gyr is still high — ~10²–10³ Earth-atm equivalent — but plausibly within the budget of sustained volcanic outgassing for an 0.19 M⊕ planet over the same timescale. This produces a Venus-analog secondary atmosphere at a fraction of Venus&#x27;s column density: the cfg&#x27;s 0.01 bar surface pressure is ~10⁻⁴ of Venus&#x27;s 92 bar.",
  "p_177":"Composition: CO₂ 90%, N₂ 7%, trace H₂O / SO₂ / Ar. The CO₂ dominance follows from photodissociation-resistant outgassing chemistry common to Venus / hot-Mars analogs. Water vapor is locked at low abundance because surface temperatures preclude liquid water and any H₂O that outgasses is rapidly XUV-photolyzed with H escape. SO₂ trace is included because basaltic volcanism delivers sulfur compounds; in the thin-atmosphere regime, SO₂ photochemistry does not generate sustained sulfuric-acid cloud decks (unlike Venus&#x27;s thick atmosphere).",
  "p_178":"The cfg&#x27;s <code>atmosphere_tint_rgb_hex = #6a3a3a</code> represents the heavily red-shifted Rayleigh scattering under Barnard&#x27;s M4 V SED — much dimmer and redder than the blue sky of Earth, in line with the M-dwarf habitable-zone-planet color modeling reviewed for Proxima b. The atmosphere is too thin to produce strong scattering features from orbit; the limb haze is faint and warm-toned.",
  "p_179":"Cloud cover is minimal (5%) given the dry composition. No Venus-style sulfuric-acid clouds (the atmosphere is too thin and the SO₂ abundance too low); no water clouds (no surface water source). Sparse high-altitude cirrus (cfg <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>) is possible from trace water condensation in the upper atmosphere but provides only minor visual variation.",
  "p_180":"Aurora rendering is the most subtle of any planet in this synthesis: weak B-field + thin atmosphere + modest Barnard XUV produces ~5 kR intensity (half of Earth&#x27;s typical), visible only during peak flare states (~25% duty cycle). The primary emission color <span class=\"hex-chip\" style=\"background:#88ff88\"></span><code>#88ff88</code> traces CO₂⁺ Fox–Duffendack–Barker bands; this is a tie-break choice over a red-orange N₂⁺ alternative, motivated by the CO₂-dominated atmosphere.",
  "h2_181":"Rotation &amp; spin synthesis",
  "p_182":"e is tidally locked at 1:1 (synchronous). Tidal-locking timescales for a 0.19 M⊕ rocky planet at 0.0381 AU around a 0.16 M☉ M dwarf are well under 10⁵ years per Walterová 2020 — far shorter than the 10 Gyr age. Obliquity is damped to 0°.",
  "p_183":"Basant 2025 best-fit e = 0.04 ± 0.04 is consistent with circular; SPOCK stability requires e &lt; 0.02 for long-term 4-planet residency. Libration amplitude at the recommended low eccentricity is &lt; 1° and does not produce measurable diurnal modulation.",
  "p_184":"e&#x27;s 6.74-d orbit is the longest of the four planets, and its closeness to the conservative HZ inner edge (10 d) makes it the most relevant target for any future RV-based detection of an actual HZ planet at ~10-20 d. Basant 2025 explicitly rules out planets larger than ~0.5 M⊕ in the 10–42 d window with 99% confidence; future MAROON-X / ESPRESSO data could push this limit lower.",
  "h2_185":"Visual styling",
  "p_186":"e is the visual &quot;cool sibling&quot; of the family — the darkest primary tint (<span class=\"hex-chip\" style=\"background:#503020\"></span><code>#503020</code>), the only one with a visible (if faint) atmosphere, and the only one with even subtle aurora. From orbit it would appear as a dark red-brown disk with a barely perceptible red-violet limb haze (<span class=\"hex-chip\" style=\"background:#6a3a3a\"></span><code>#6a3a3a</code>) and occasional aurora bands during Barnard&#x27;s flare states.",
  "p_187":"Barnard subtends 2.6° in e&#x27;s sky — about 5× the apparent diameter of the Sun from Earth — the smallest angular size of the four-planet family but still a dominant feature of the daylight sky. The thin atmosphere produces a dim red-violet daytime sky color heavily reddened by Barnard&#x27;s SED, transitioning to near-black at the terminator.",
  "p_188":"Surface morphology is the most varied of the four — beyond the canonical basaltic regolith, possible relict aqueous-weathering features from an earlier (cooler) atmospheric phase could be preserved. In-game rendering should include the option for occasional &quot;riverbed&quot; or &quot;chemically-altered patch&quot; terrain features at low density.",
  "p_189":"Aurora bands during Barnard flares appear as faint greenish ribbons (<span class=\"hex-chip\" style=\"background:#88ff88\"></span><code>#88ff88</code>) at high magnetic latitudes (~60°) during the 25% flare duty cycle. Intensity is markedly lower than any Earth-analog reference; in-game brightness should be sub-cinematic, more like a subtle ambient glow than a dramatic light show. The cumulative surface dose (cfg 3000 mSv/yr) is the lowest of the four planets but still well above any habitable threshold.",
  "h2_190":"Bibliography",
  "h3_191":"Read (visual-informative, drove decisions above)",
  "li_192":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). The MAROON-X paper that promoted e from candidate (59% detection probability from ESPRESSO alone) to confirmed (79% from joint MAROON-X + ESPRESSO). P = 6.7392 d, Msini = 0.193 ± 0.033 M⊕, a = 0.0381 AU, T_eq = 340 K (A=0, full redistribution).",
  "li_193":"<b>González Hernández J. I. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>, arXiv:2410.00569). ESPRESSO data first identified e as a candidate signal.",
  "li_194":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). Atmospheric loss baseline; scales to e&#x27;s 0.0381 AU. The &quot;habitable at last&quot; framing motivates the thin-atmosphere tie-break for e over bare-rock alternative.",
  "li_195":"<b>Duvvuri G. et al. 2021</b> — <i>Reconstructing the EUV Emission of Cool Dwarfs</i> (arXiv:2102.08493). Quiescent EUV reconstruction; atmospheric escape modeling input.",
  "li_196":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i> (arXiv:2007.12459). Tidal-lock timescale.",
  "h3_197":"Read (context / methodology, not decision-driving)",
  "li_198":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star</i> (arXiv:1812.06712). Host activity cycle + rotation.",
  "h3_199":"Read (instrument-only, not visual-informative)",
  "li_200":"(None e-specific.)",
  "h3_201":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_202":"The e bibliography is the smallest of the four — e has no individual discovery paper and the bib is dominated by name-collision historical papers (Comet Barnard e 1881, 1885, 1887). Preserved in <code>docs/phase3/_bib/barnards-star-e.yaml</code> with <code>status: skipped</code>.",
  "h2_203":"Open items for follow-up",
  "li_204":"<b>Direct radius measurement</b>: as with all four planets, no transit. Future direct imaging or astrometry could refine the cfg&#x27;s <code>radius_rearth = 0.64</code> placeholder. e is the smallest and would be hardest to constrain.",
  "li_205":"<b>Bare-rock vs. thin-atmosphere variant</b>: the cfg&#x27;s thin-CO₂ scenario is a tie-break against bare-rock. If future atmospheric modeling for newly discovered cool sub-Earth USP planets (e.g., TOI-700-class) excludes thin CO₂ retention, the cfg should revert e to bare-rock. The atmospheric mass loss calculation from France 2020 is suggestive but not conclusive.",
  "li_206":"<b>Wet earlier-phase morphology</b>: the cfg includes &quot;relict aqueous-weathering features&quot; as visual variation. This is purely speculative; no direct evidence supports an earlier wet phase for any of the four Barnard planets.",
  "li_207":"<b>Aurora visibility</b>: the cfg encodes faint aurora during flares but the intensity is below the threshold of dramatic in-game rendering. The user may wish to dial this up for visual interest or down for realism.",
  "li_208":"<b>HZ inner-edge planet candidate</b>: Basant 2025 explicitly searches for a hypothetical Barnard f at P &gt; 10 d (in the HZ) and rules out planets &gt; 0.37–0.57 M⊕. Future MAROON-X monitoring could detect a lower-mass HZ planet — if found, it would supersede e as the outermost in the system.",
  "li_209":"<b>Resonance with c</b>: period ratio 1.634 ≈ 5/3 = 1.667. Whether e is in a near-resonant trap or simply near-resonant by coincidence affects long-term dynamics.",

  ko: {
  "p_1":"Barnard&#x27;s Star e 는 시스템에서 가장 바깥이며 가장 가벼운 4개 확정 sub-Earth 행성으로, 0.0381 AU 의 6.74-일 궤도에서 Msini = 0.193 ± 0.033 M⊕ 입니다. González Hernández 2024 ESPRESSO 데이터에서 가장 약한 후보였고, Basant 2025 가 공동 분석에 112 개의 MAROON-X RV 를 추가한 후에야 확정 상태로 격상되었습니다 — e analog 의 공동 피팅 검출 확률은 (ESPRESSO 단독) 59% 에서 (공동) 79% 로 상승해 정식 확인 임계값을 넘었습니다.",
  "p_2":"지구의 2.45× 일사에서, e 는 네 행성 중 가장 차가우며 평형 온도 340 K (Basant 2025 Table 3, A = 0, 완전 열재분배) — 금성의 232 K 에 가까 우며 어떤 액체 물 거주 가능 임계값보다 한참 위입니다. Kopparapu 2014 보수적 HZ 안쪽 가장자리는 Barnard 의 M4 V 호스트에 대해 P ≈ 10 d (a ≈ 0.115 AU) 에 있으며, e 는 6.74 d 에서 그 경계 바로 안쪽에 자리합니다 — 네 행성 중 HZ 에 가장 가깝지만 여전히 폭주 온실 매개 변수 공간에 단단히 위치합니다. cfg 는 e 를 경계선 금성 analog 로 해석합니다 — XUV-구동 escape 를 통해 10 Gyr 에 걸쳐 어떤 1차 물 대기도 잃기에 충분히 뜨겁지만, France 2020 의 손실 속도에 대해 모데 스트한 2차 CO₂ 대기가 plausible 하게 유지될 수 있는 네 중 유일한 것입니다.",
  "p_3":"궤도 이심률은 e = 0.04 ± 0.04 (Basant 2025 β-prior). 원과 일관 . 안정 성은 장기 4-행성 공존을 위해 e &lt; 0.02 를 요구합니다 (SPOCK 분석 당). 6.74-일 주기는 조석 잠금 시간 척도를 10⁵ 년 아래로 두어 (Walterová 2020) 동기 spin-orbit 구성을 보장합니다. c 와의 궤도 주기 비 (6.739 / 4.124 = 1.634) 는 5:3 mean-motion 공명에 가깝지만 정확하지는 않습니다.",
  "p_4":"<b>NearStars 시나리오 선택. 가능한 대기 유지 윈도우의 안쪽 가장자리에 있는 조석잠금 sub-Earth 질량 암석 행성입니다 — 네 형제 중 가장 차가운 (T_eq = 340 K) 으로, b/c/d 에 사용된 노출 암석 기준선에 대한 tie-break 업그레이드로 plausible 한 얇은 CO₂ 우위 2차 대기를 가집니다. 시각적 으로 미세한 Rayleigh 헤이즈가 있는 더 어둡고 더 차가운 톤의 노출 암석 세계.</b> 34 cfg 픽. 16 canonical-aligned, 18 tie-break. 노출 암석 대신 얇은 대기를 선택한 것이 네 행성 중 가장 흥미로운 tie-break 입니다. 문서화된 divergence 없음.",

  "td_169":"Barnard Teff",
  "h2_170":"Surface synthesis",
  "p_171":"Barnard e 의 표면 조건은 네 행성 중 가장 &quot;거주 가능에 인접&quot; 합니다 — 비록 여전히 어떤 보수적 HZ 의 한참 바깥에 있지만. cfg 의 얇은 CO₂ 대기 시나리오 하에서 ~470 K 의 substellar dayside 온도는 partial melt 없이 basalt regolith 를 허용합니다. 표면 톤 (<span class=\"hex-chip\" style=\"background:#503020\"></span><code>#503020</code>) 은 네 중 가장 어둡고 차가워, 가장 낮은 일사를 반영합니다. terminator 산능 액센트 (<span class=\"hex-chip\" style=\"background:#6a4030\"></span><code>#6a4030</code>) 가 모데스트한 시각 변동을 제공합니다.",
  "p_172":"얇은 대기 시나리오는 무대기 형제들에서 부재한 미묘한 지형 특징의 가능성을 엽니다. 만약 e 가 누적 XUV escape 가 desiccate 시키기 전에 더 이른 wet 단계를 경험했다면, relict 배수 네트워크 또는 화학적으로 weathered 된 basalt 지형이 보존될 수 있습니다. cfg 의 <span class=\"field-tt\" data-ko-tip=\"표면 지형 서술 (크레이터·용암류·빙하 등).\" data-en-tip=\"Surface morphology — craters, lava flows, glaciers, etc.\"><code>surface_morphology</code></span> 필드는 &quot;가능한 relict aqueous-weathering 특징&quot; 을 시각적 nuance 로 포함합니다 — 네-행성 앙상블의 더 차가운 끝에서 동기 부여된 tie-break 선택입니다.",
  "p_173":"antistellar 반구는 cold-trap 으로 남지만, ~250 K (b/c/d 의 ~100–130 K 보다 상당히 더 따뜻) 에서. 얇은 대기가 nightside 열 수송을 허용하기 때문입니다. substellar-to-antistellar 주야 온도 대비는 ~220 K — 다른 행성들의 무대기 600 K 대비보다 훨씬 작습니다.",
  "p_174":"0.19 M⊕ 지구 analog 암석의 질량-반지름은 0.58–0.69 R⊕ 를 줍니다. cfg 의 0.64 R⊕ 선택은 중간값. 4.0 g/cc 의 밀도는 네 행성 중 가장 낮음 — (a) 약간의 휘발성 농축 (mantle 의 H₂O / CO₂ 가 몇 wt%) 또는 (b) 단순 히 작은 암석 행성에 대한 질량-반지름 기울기와 일관. 직접 반지름 측정 이 구분할 수 있지만 transit 검출은 존재하지 않습니다.",
  "h2_175":"Atmosphere synthesis",
  "p_176":"cfg 는 b/c/d 에 사용된 노출 암석 기준선에 대한 canonical tie-break 업그레이드로 e 에 대해 얇은 CO₂ 우위 2차 대기를 채택합니다. 동기 부여 물리학. 2.45 S⊕ 일사와 0.0381 AU 궤도 거리에서, France 2020 의 대기 손실 속도는 단위 면적당 내부 시스템 값의 약 1/5 로 스케일 다운 됩니다. 10 Gyr 에 걸친 누적 손실은 여전히 높지만 (~10²–10³ 지구대기 등가), plausibly 0.19 M⊕ 행성의 같은 시간 척도에 걸친 지속적인 화산 outgassing 의 예산 내. 이는 금성의 칼럼 밀도의 작은 비율로 금성-analog 2차 대기를 생성합니다. cfg 의 0.01 bar 표면 압력은 금성의 92 bar 의 ~10⁻⁴.",
  "p_177":"조성. CO₂ 90%, N₂ 7%, 미량 H₂O / SO₂ / Ar. CO₂ 지배는 금성 / 뜨거운 Mars analog 에 공통적인 광-해리 저항성 outgassing 화학에서 따릅니다. 수증기는 낮은 abundance 에 잠겨 있는데, 표면 온도가 액체 물을 배제 하고 어떤 H₂O outgas 도 H escape 와 함께 빠르게 XUV-광분해되기 때문 입니다. SO₂ 미량은 basalt 화산 활동이 황 화합물을 전달하기 때문에 포함됩니다. 얇은 대기 영역에서 SO₂ 광화학은 지속적인 황산 구름 데크 (금성의 두꺼운 대기와 다름) 를 생성하지 않습니다.",
  "p_178":"cfg 의 <code>atmosphere_tint_rgb_hex = #6a3a3a</code> 는 Barnard 의 M4 V SED 아래 크게 적색화된 Rayleigh 산란을 나타냅니다 — 지구의 푸른 하늘보다 훨씬 어둑하고 빨갛고, Proxima b 에 대해 검토된 M 왜성 거주 가능 영역 행성 색 모델링과 일관됩니다. 대기는 너무 얇아서 궤도에서 강한 산란 특징 을 생성하지 못합니다. limb 헤이즈는 흐릿하고 따뜻한 톤입니다.",
  "p_179":"구름 면적은 건조한 조성을 고려해 최소 (5%) 입니다. 금성-스타일 황산 구름 없음 (대기가 너무 얇고 SO₂ abundance 가 너무 낮음). 물 구름 없음 (표면 물 소스 없음). 미량 물의 상부 대기 응축으로부터의 희소한 고도-고적운 (cfg <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>) 이 가능하지만 minor 시각 변동만 제공합니다.",
  "p_180":"오로라 렌더링은 이 합성의 어떤 행성보다도 가장 미묘합니다. 약한 B-field + 얇은 대기 + 모데스트한 Barnard XUV 가 ~5 kR 강도 (지구의 전형의 절반) 를 생성하며, 피크 flare 상태 동안에만 가시 (~25% 듀티 사이클). 1차 방출 색 <span class=\"hex-chip\" style=\"background:#88ff88\"></span><code>#88ff88</code> 는 CO₂⁺ Fox–Duffendack–Barker 밴드를 추적합니다. 이는 CO₂ 우위 대기에 의해 동기 부여된 빨강-오렌지 N₂⁺ 대안에 대한 tie-break 선택입니다.",
  "h2_181":"Rotation &amp; spin synthesis",
  "p_182":"e 는 1:1 (동기) 로 조석 잠겨 있습니다. 0.16 M☉ M 왜성 주위 0.0381 AU 의 0.19 M⊕ 암석 행성에 대한 조석-잠금 시간 척도는 Walterová 2020 에서 10⁵ 년을 한참 밑돌아 10 Gyr 나이보다 훨씬 짧습니다. 경사는 0° 로 감쇠.",
  "p_183":"Basant 2025 의 최적합 e = 0.04 ± 0.04 는 원과 일관. SPOCK 안정성은 장기 4-행성 거주를 위해 e &lt; 0.02 를 요구합니다. 권장 낮은 이심률에서 의 libration 진폭은 &lt; 1° 이며 측정 가능한 diurnal 변조를 만들지 않습니다.",
  "p_184":"e 의 6.74-일 궤도는 네 행성 중 가장 깁니다. 보수적 HZ 안쪽 가장자리 (10 d) 와의 근접성은 ~10–20 d 의 실제 HZ 행성에 대한 미래 RV 기반 검출에 가장 관련된 타겟이 되게 합니다. Basant 2025 는 10–42 d 윈도우 에서 ~0.5 M⊕ 보다 큰 행성을 99% 신뢰도로 명시적으로 배제합니다. 미래 MAROON-X / ESPRESSO 데이터는 이 한계를 더 낮출 수 있습니다.",
  "h2_185":"Visual styling",
  "p_186":"e 는 가족의 시각적 &quot;차가운 형제&quot; 입니다 — 가장 어두운 1차 톤 (<span class=\"hex-chip\" style=\"background:#503020\"></span><code>#503020</code>), 가시 (희미할지라도) 대기를 가진 유일한 것, 그리고 미묘한 오로라조차 가진 유일한 것. 궤도에서는 거의 인지할 수 없는 빨강-violet limb 헤이즈 (<span class=\"hex-chip\" style=\"background:#6a3a3a\"></span><code>#6a3a3a</code>) 와 Barnard 의 flare 상태 동안의 occasional 오로라 밴드를 가진 어두운 빨강-갈색 디스크로 나타날 것입니다.",
  "p_187":"Barnard 는 e 의 하늘에서 2.6° 를 차지 — 지구에서 본 태양의 약 5× — 네-행성 가족 중 가장 작은 각지름이지만 여전히 낮 하늘의 지배적 특징. 얇은 대기는 Barnard 의 SED 에 의해 크게 적색화된 어둑한 빨강- violet 낮 하늘 색을 만들며, terminator 에서 거의 검은색으로 전환됩 니다.",
  "p_188":"표면 형태는 네 중 가장 다양합니다 — canonical basalt regolith 너머 로, 더 이른 (더 차가운) 대기 단계에서의 가능한 relict aqueous-weathering 특징이 보존될 수 있습니다. 게임 내 렌더링은 낮은 밀도에서 occasional &quot;강바닥&quot; 또는 &quot;화학적으로 변형된 패치&quot; 지형 특징의 옵션을 포함해야 합니다.",
  "p_189":"Barnard flare 동안의 오로라 밴드는 25% flare 듀티 사이클 동안 높은 자기 위도 (~60°) 에서 흐릿한 녹색 리본 (<span class=\"hex-chip\" style=\"background:#88ff88\"></span><code>#88ff88</code>) 으로 나타납니다. 강도는 어떤 지구 analog 레퍼런스보다 현저히 낮습니다. 게임 내 밝기 는 극적인 빛의 쇼보다는 미묘한 주변 글로우에 가까운 sub-cinematic 이어야 합니다. 누적 표면 dose (cfg 3000 mSv/yr) 는 네 행성 중 가장 낮지만 여전히 어떤 거주 가능 임계값보다 잘 위에 있습니다.",
  "h2_190":"Bibliography",
  "h3_191":"Read (visual-informative, drove decisions above)",
  "li_192":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). e 를 후보 (ESPRESSO 단독 59% 검출 확률) 에서 확정 (공동 MAROON-X + ESPRESSO 79%) 으로 격상한 MAROON-X 논문. P = 6.7392 d, Msini = 0.193 ± 0.033 M⊕, a = 0.0381 AU, T_eq = 340 K (A=0, full redistribution).",
  "li_193":"<b>González Hernández J. I. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>, arXiv:2410.00569). ESPRESSO 데이터가 e 를 후보 신호로 처음 식별.",
  "li_194":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). 대기 손실 기준선. e 의 0.0381 AU 로 스케일. &quot;habitable at last&quot; 헤드라인이 e 에 대해 노출 암석 대신 얇은 대기 tie-break 동기 부여.",
  "li_195":"<b>Duvvuri G. et al. 2021</b> — <i>Reconstructing the EUV Emission of Cool Dwarfs</i> (arXiv:2102.08493). quiescent EUV 재구성. 대기 escape 모델링 입력.",
  "li_196":"<b>Walterová M. &amp; Běhounková M. 2020</b> — <i>Thermal and Orbital Evolution of Low-mass Exoplanets</i> (arXiv:2007.12459). 조석 잠금 시간 척도.",
  "h3_197":"Read (context / methodology, not decision-driving)",
  "li_198":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star</i> (arXiv:1812.06712). 호스트 활동 사이클 + 회전.",
  "h3_199":"Read (instrument-only, not visual-informative)",
  "li_200":"(e-특화 없음.)",
  "h3_201":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "p_202":"e 의 bib 은 네 중 가장 작습니다 — e 는 개별 발견 논문이 없고 bib 은 이름 충돌 역사 논문 (혜성 Barnard e 1881, 1885, 1887) 이 지배합니다. <code>docs/phase3/_bib/barnards-star-e.yaml</code> 에 <code>status: skipped</code> 로 보존.",
  "h2_203":"Open items for follow-up",
  "li_204":"<b>직접 반지름 측정</b>. 네 행성 모두와 마찬가지로 transit 없음. 미래 직접 영상화 또는 astrometry 가 cfg 의 <code>radius_rearth = 0.64</code> placeholder 를 개선할 수 있습니다. e 는 가장 작아 제약하기 가장 어려울 것입니다.",
  "li_205":"<b>노출 암석 vs. 얇은 대기 변이</b>. cfg 의 얇은 CO₂ 시나리오는 노출 암석에 대한 tie-break. 새로 발견된 차가운 sub-Earth USP 행성 (예. TOI-700 류) 에 대한 미래 대기 모델링이 얇은 CO₂ 유지를 배제 한다면, cfg 는 e 를 노출 암석으로 되돌려야 합니다. France 2020 의 대기 질량 손실 계산은 시사적이지만 결정적이지 않습니다.",
  "li_206":"<b>Wet 더 이른 단계 형태</b>. cfg 는 &quot;relict aqueous-weathering 특징&quot; 을 시각 변동으로 포함. 이는 순수 추측. 네 Barnard 행성 중 어느 것에 대해서도 더 이른 wet 단계의 직접 증거는 없습니다.",
  "li_207":"<b>오로라 가시성</b>. cfg 는 flare 동안 흐릿한 오로라를 인코딩하지만 강도는 극적인 게임 내 렌더링 임계값 아래. 사용자는 시각적 흥미를 위해 이를 올리거나 사실성을 위해 내릴 수 있습니다.",
  "li_208":"<b>HZ 안쪽 가장자리 행성 후보</b>. Basant 2025 는 HZ 의 P &gt; 10 d 의 가상 Barnard f 를 명시적으로 탐색해 &gt; 0.37–0.57 M⊕ 의 행성을 배제. 미래 MAROON-X 모니터링이 더 낮은 질량 HZ 행성을 검출할 수 있고, 발견되면 e 를 시스템의 가장 바깥으로 대체할 것입니다.",
  "li_209":"<b>c 와의 공명</b>. 주기 비 1.634 ≈ 5/3 = 1.667. e 가 근-공명 trap 에 있는지 단순히 우연으로 근-공명인지가 장기 동역학에 영향을 미 칩니다.",
  "h2_210":"Related",

  "li_212":"<a href=\"barnards-star-b.md\">barnards-star-b</a> — 가장 안쪽 (Ribas-반박 후). 노출 암석",
  "li_213":"<a href=\"barnards-star-c.md\">barnards-star-c</a> — 가장 무거움. 노출 암석",
  "li_214":"<a href=\"barnards-star-d.md\">barnards-star-d</a> — 가장 뜨거움. substellar partial-melt",

  "reports_index": "보고서 인덱스",
  "footer_note": "NearStars · Phase 3 합성 보고서 · barnards-star-e.md + ko/ 미러에서 자동 생성"
  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
