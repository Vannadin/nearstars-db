  "h2_143":"Stellar disk synthesis",
  "p_144":"Alpha Cen A&#x27;s disk is the Solar System&#x27;s closest analog to the Sun. At Kervella 2017&#x27;s interferometric angular diameter (8.502 ± 0.038 mas as measured from Earth), it would subtend 0.0085&quot; from Earth — about 1/65 of the Sun&#x27;s apparent diameter (1924&quot;). From its KSP homeworld equivalent (assuming a 1 AU analog orbit around Alpha A itself), the disk would appear ~22% larger than the Sun does from Earth, with ~52% greater luminous flux.",
  "p_145":"<b>Color choice.</b> At Teff = 5847 K (Porto de Mello 2008 high-resolution spectroscopy of the AB pair) the photospheric blackbody peaks at ~496 nm. After integrating CIE 1931 with the solar limb darkening kernel, the perceived chromaticity falls very close to the Sun&#x27;s D55 reference white — slightly cream-yellow, indistinguishable to the unaided eye. For KSP we adopt <span class=\"hex-chip\" style=\"background:#fff6e0\"></span><code>#fff6e0</code> (barely warmer than Sol&#x27;s typical <span class=\"hex-chip\" style=\"background:#fff5e6\"></span><code>#fff5e6</code>), reflecting the +57 K hotter Teff and accounting for slightly enhanced opacity from the super-solar metallicity ([Fe/H] = +0.24, Porto de Mello 2008).",
  "p_146":"<b>Granulation.</b> Bigot et al. 2008 detect the granulation noise in the asteroseismic photometric residuals — a &quot;salt and pepper&quot; texture on Mm scales (~1.5e-3 arcsec from Earth, unresolved by present instruments). At KSP rendering scale (the star is rendered as a billboard), this manifests only as a subtle 0.1-magnitude flicker on minute timescales if simulated; the Phase 3 cfg notes the characteristic timescale but does not require active simulation.",
  "p_147":"<b>Limb darkening.</b> Solar-equivalent quadratic coefficients (a ≈ b ≈ 0.30) reproduce the disk-edge dimming. Kervella 2017&#x27;s PIONIER analysis fits a Claret 4-parameter law; the quadratic reduction loses ~2% of disk-center brightness fidelity but is adequate for KSP rendering. Limb is moderately darkened (factor ~0.40 at μ = 0.1) and slightly redder near the edge due to increased path length through cooler upper photosphere.",
  "p_148":"<b>P-mode oscillations.</b> Bouchy &amp; Carrier 2002 and Bazot 2007 detect solar-like p-modes with envelope peak near 2.4 mHz (period ~7 minutes), amplitude ~25 cm/s in radial velocity. Visual manifestation is sub-percent disk-integrated flickering on 5–10-minute timescales — not visible to the unaided eye, but important for high-precision RV planet searches around this star. Not rendered in KSP.",
  "p_149":"<b>No magnetic Halo flares.</b> The 22-day rotation gives a very low Rossby number; combined with the deep convective envelope this results in a low-activity dynamo. Howard 2023 statistics place solar-twin flare-rate at ~10⁻³ M-class flares per day; superflares (EX &gt; 10³⁵ erg) are negligible at the system&#x27;s ~5 Gyr age.",
  "h2_150":"Activity and variability synthesis",
  "p_151":"DeWarf et al. 2010 monitored Alpha Cen A photometrically for 7 years (2003–2010) and spectroscopically for Ca II H&amp;K to derive both the rotation period and the activity cycle. Key findings:",
  "li_152":"<b>Rotation period</b>: 22 ± 3 days. Solar-like (the Sun has P_rot = 25.4 d at the equator, ~31 d at the poles, mean ~26 d). Slightly faster than Sun consistent with ~80% solar age (Joyce &amp; Chaboyer 2018 give 4.81 Gyr vs Sun&#x27;s 4.57 Gyr).",
  "li_153":"<b>Magnetic cycle</b>: ~19 yr (vs Sun&#x27;s 22-yr Hale cycle / 11-yr Schwabe cycle). DeWarf 2010 detected partial cycle in their baseline; the period is loosely constrained.",
  "li_154":"<b>log R&#x27;_HK</b>: -4.95 (mean), with cycle amplitude ~0.05 dex. Indicates lower mean chromospheric activity than Sun (log R&#x27;_HK_Sun ≈ -4.91 at activity max, -4.99 at min). Alpha A is at the inactive end of the G2 V activity envelope, consistent with age and slow rotation.",
  "li_155":"<b>X-ray luminosity</b>: log L_X ≈ 27.0 erg/s (Ayres 2014; Robrade &amp; Schmitt 2005). Cycle amplitude factor ~3× — modest compared to the Sun&#x27;s ~10× X-ray cycle.",
  "p_156":"<b>Spot coverage.</b> Estimated from photometric variability amplitude (&lt;1% peak-to-peak in V) and chromospheric activity index: &lt;1% disk coverage at cycle max. Visual: 1–3 small (~5° diameter) sunspot groups distributed mid-latitude during active periods. Spot temperature ~4300 K (umbra) and ~5500 K (penumbra) — about 1500 K below quiescent photosphere mean.",
  "p_157":"<b>No technosignatures detected.</b> Foster et al. 2022 (arXiv:2211.11756) optical-laser search and Smith et al. 2024 (arXiv:2206.14807) radio gravitational-lens technosignature search returned null results. Mentioned only for completeness; not visual.",
  "p_158":"<b>Coronal structure.</b> Wood et al. 2005 Ly-α astrosphere absorption detection gives stellar wind mass loss ~1.5e-14 M☉/yr, ~7% of solar mass loss. The hot corona (T ~ 2e6 K) is similar to Sun&#x27;s quiet-Sun state. For KSP this means visible coronal ray structure at totality / eclipse rendering, with red-shifted CME ejecta during flare events (rare).",
  "h2_159":"System geometry synthesis",
  "p_160":"The AB binary&#x27;s mutual visibility is a defining feature of the NearStars Alpha Cen experience.",
  "p_161":"<b>From Alpha A&#x27;s local frame</b>, Alpha Cen B traces an elliptical orbit with:",
  "li_162":"Period: 79.91 ± 0.01 yr (Pourbaix 2002, Kervella 2016)",
  "li_163":"Semi-major axis: 23.52 AU (combining a_arcsec = 17.57&quot; with d = 1.347 pc)",
  "li_164":"Eccentricity: 0.5179",
  "li_165":"Periastron separation: ~11.4 AU (~Saturn&#x27;s distance from Sun)",
  "li_166":"Apastron separation: ~35.7 AU (~Neptune&#x27;s distance)",
  "p_167":"This is large enough that AB cannot host stable circumbinary planets in their habitable zones, but small enough that each star&#x27;s planet inventory is dynamically influenced by the other. B&#x27;s apparent brightness from A&#x27;s surface varies between V ≈ -16 (periastron, ~5× brighter than Full Moon from Earth) and V ≈ -19 (no, wait — let me reconsider). At apastron, B subtends ~0.022° as seen from A; at periastron, ~0.066°. Integrated visual magnitude at periastron ~-21 (much brighter than Sun would appear from Saturn but as a ~point source). At apastron, ~-19 — comparable to a quarter-Moon brightness but still point-like.",
  "p_168":"<b>From a hypothetical Earth-analog around A</b> (1.25 AU, where the classical HZ would put it): the sun-in-sky is Alpha A at the same apparent diameter as Sun-from-Earth (since L=1.52 and orbit is ~1.25 AU). B appears as a brilliant variable point source ranging from V ≈ -20 (faintest) to V ≈ -22 (brightest). This is far brighter than Venus from Earth, providing dramatic illumination of the nightside hemisphere when in opposition. The shadow cast by B&#x27;s light is detectable but ~10^-3 of A&#x27;s daytime illumination.",
  "p_169":"<b>Proxima visibility.</b> From Alpha A&#x27;s surface, Proxima appears as a faint magnitude ~+5 star — visible to the unaided eye but unremarkable. Its apparent motion across the sky is ~0.1&quot;/yr (differential of system&#x27;s proper motion + Proxima&#x27;s small orbital motion around AB barycenter).",
  "p_170":"<b>No planets confirmed around A.</b> Wagner et al. 2021 NEAR coronagraphic search found C1 (a candidate at ~1.1 AU) which was later ascribed to a thermal background source. As of 2026-05-22, the most recent Beichman et al. 2025 (2508.03814) JWST/NIRCam coronagraphy reports a <i>candidate</i> warm giant in the HZ at ~1.5–2 AU, but the detection is one epoch and saturation-confused. For NearStars cfg this remains unincluded pending confirmation.",
  "h2_171":"Visual styling",
  "p_172":"Combining the disk and activity decisions:",
  "li_173":"<b>Global appearance.</b> A near-perfect Sun-twin. The unaided-eye observer cannot distinguish Alpha A from Sol; subtle differences (slightly higher color temperature due to higher Teff, slightly yellower-warmer due to higher metallicity) cancel out within visual gradient perception.",
  "li_174":"<b>Dayside illumination of orbiting bodies.</b> Same color temperature reference as Sol (~5810 K effective for surface illumination calculations). Atmospheric scattering on Earth-analogs produces similar blue-sky / yellow-sun appearance to Sol viewed from Earth.",
  "li_175":"<b>Disk brightness profile.</b> Solar-equivalent quadratic limb darkening; bright disk-center, ~40% relative brightness at the edge. No obvious latitude bands from rotation.",
  "li_176":"<b>Spot visibility.</b> At cycle max, 1–3 small dark spots at ±20–35° latitude, each ~5° angular diameter. Largest spots are visible at HZ orbit if directly imaged (KSP-equivalent: render procedural dark patches at activity-cycle-max times).",
  "li_177":"<b>Companion B.</b> Always present in the sky from any Alpha A orbit. At ~5° elongation min and ~16° at max (1.25 AU HZ orbit). Cycles between bright morning/evening star (apastron) and brilliant near-Sun companion (periastron) over the 79.91-yr period.",
  "li_178":"<b>Proxima Cen.</b> Magnitude ~+5 point source, ~2° from Alpha B (slow drift over centuries). Indistinguishable from background stars to the unaided eye.",
  "li_179":"<b>Spectral lines for AR overlay.</b> H-α at 6563 Å (red, dominant in chromospheric emission), Ca II H/K at 3933/3968 Å (blue-violet, diagnostic of activity), Mg I b triplet at 5167-5184 Å, Na D doublet at 5890/5896 Å.",
  "h2_180":"Bibliography",
  "h3_181":"Read (visual-informative, drove decisions above)",
  "li_182":"<b>2017A&amp;A...597A.137K</b> Kervella et al. 2017 — VLTI/PIONIER interferometric measurement of A&#x27;s angular diameter (8.502 ± 0.038 mas) and B&#x27;s (5.999 ± 0.025 mas). Definitive radius source. Bolometric luminosity derived from same data + Hipparcos parallax.",
  "li_183":"<b>2008A&amp;A...488..653P</b> Porto de Mello et al. 2008 — Differential high-resolution spectroscopic analysis of A and B. Definitive Teff and [Fe/H] source. Establishes the system as super-solar in metals.",
  "li_184":"<b>2018ApJ...864...99J</b> Joyce &amp; Chaboyer 2018 — MESA + asteroseismic modeling of both A and B. System age 4.81 ± 0.50 Gyr. Resolves long-standing tension between older (~6 Gyr) Bazot 2007 and Thévenin 2002 asteroseismic ages.",
  "li_185":"<b>2010ApJ...722..343D</b> DeWarf et al. 2010 — 7-year ground-based photometric + Ca II H&amp;K monitoring. Definitive rotation periods (22 d for A, 41 d for B), partial activity cycle, log R&#x27;_HK measurements.",
  "li_186":"<b>2016A&amp;A...586A..90P</b> Pourbaix &amp; Boffin 2016 — Dynamical binary orbit solution. Masses 1.1055 ± 0.0039 M☉ (A) and 0.9373 ± 0.0033 M☉ (B). The high-precision modern reference orbit.",
  "li_187":"<b>2017A&amp;A...598L...7K</b> Kervella, Thévenin &amp; Lovis 2017 — Kinematic confirmation that Proxima is gravitationally bound to AB at 8700 AU (e = 0.5, P = 547 kyr).",
  "li_188":"<b>2008A&amp;A...488..635B</b> Bigot et al. 2008 — Asteroseismic granulation noise detection and convective-overshoot constraint for A. Provides the granulation cell scale used in the visual cfg.",
  "li_189":"<b>2007A&amp;A...470..295B</b> Bazot et al. 2007 — HARPS asteroseismic p-mode detection. Confirms M = 1.105 ± 0.007 M☉ and R = 1.224 ± 0.003 R☉ via independent (non-dynamical) method.",
  "h3_190":"Read (context / methodology, not decision-driving)",
  "li_191":"<b>2508.03814</b> Beichman et al. 2025 — JWST/NIRCam coronagraphic candidate detection of a warm giant planet in A&#x27;s HZ. Mentioned in narrative as system context. NOT adopted into NearStars planet inventory pending confirmation (single epoch, saturation systematics).",
  "li_192":"<b>2104.10086</b> Akeson et al. 2021 — ALMA millimeter astrometry of AB. Improves orbit but does not change the Pourbaix 2002 solution meaningfully.",
  "li_193":"<b>2110.12565</b> Wagner et al. 2021 — NEAR/VLT thermal IR coronagraphic search. Reports C1 candidate which was later ascribed to background. Useful for context on planet limits.",
  "li_194":"<b>2105.00034</b> Quarles &amp; Lissauer 2018 — Exomoon dynamical stability in Alpha Cen-like binaries. Context for what kind of planet inventory is dynamically possible.",
  "li_195":"<b>2108.12650</b> Milankovitch cycles for Earth-analogue in AB binary. Quarles et al. — context for HZ-planet obliquity / climate evolution under binary perturbation.",
  "li_196":"<b>2015A&amp;A...582A..49H</b> Heiter et al. 2015 — FGK Gaia benchmark star analysis. Independent Teff = 5792 ± 16 K and [Fe/H] = +0.26 ± 0.08, cross-validates Porto de Mello.",
  "h3_197":"Read (instrument-only, not visual-informative)",
  "li_198":"<b>2211.11756</b> Foster et al. 2022 — Optical SETI search for laser emission from AB. Null result. Methodology only.",
  "li_199":"<b>2206.14807</b> Smith et al. 2022 — Solar-gravitational-lens radio technosignature search. Null result.",
  "li_200":"<b>2304.13779</b> Saide et al. 2023 — Mobile-tower radio leakage simulation. Methodology, not Alpha-specific science.",
  "li_201":"<b>2301.11314</b> Trees &amp; Stam 2023 — Reflected-light polarization signatures of Earth-/Venus-analog. Methodology.",
  "li_202":"<b>2405.13247</b> Pasquini et al. 2024 — Deep learning for RV planet detection. Methodology.",
  "h3_203":"Not read — no arXiv preprint available (96 papers)",
  "p_204":"The bulk of the bibliography consists of pre-2010 references, ADS abstracts of conference proceedings, and instrument-paper variants. Most are mass/radius/age cross-references that don&#x27;t add visual information beyond what the read-papers already provide. Key not-read examples:",
  "li_205":"&quot;Transit Search for Exoplanets around Alpha Centauri A and B with ASTERIA&quot; (CubeSat — Knapp 2020 dissertation work). Mentioned for null-result context.",
  "li_206":"Many AB pre-Hipparcos papers (Demarque 1986, etc.) — superseded.",
  "li_207":"Numerous proceedings (IAU symposia, AAS abstracts) that summarize results already in the read journal papers.",
  "p_208":"<b>User action requested.</b> If newer 2025–2026 papers on the candidate HZ giant planet detection become available (follow-ups to Beichman 2025 / 2508.03814), they may shift the system narrative and warrant a Phase 3 revision.",
  "p_209":"---",
  "h2_210":"Open items for follow-up",
  "li_211":"Confirm/refute the Beichman 2025 candidate HZ giant. If confirmed, add to NearStars planet inventory with appropriate Phase 3 planet synthesis.",
  "li_212":"Refine spot coverage at solar-cycle-max prediction with TESS sector observations (multi-year photometry now available for AB pair).",
  "li_213":"Cross-check Joyce &amp; Chaboyer 2018 system age against any post-2024 asteroseismic reanalyses (Gaia DR3 SED + Tess oscillation modes).",
  "li_214":"Visual disk tint hex should be calibrated against a renderer using CIE 1931 chromaticity from a 5810-K blackbody convolved with the solar-twin SED, not pure blackbody. Phase 4 task.",
  "li_215":"The convective-overshoot 0.10–0.15 H_p value is at the upper end of current model preferences; if a future MESA reanalysis settles at lower values, the granulation cell size estimate would shrink ~10%.",
  "li_216":"Cycle period uncertainty (DeWarf 2010 baseline ~7 yr only covers partial cycle) leaves the 19-yr value soft. Continuous monitoring to ~2030 would tighten this.",

  ko: {
  "p_1":"NearStars KSP mod 의 Phase 3 항성 synthesis (2026-05-22 작성).",
  "p_2":"Alpha Centauri A 는 태양계 밖에서 가장 태양과 닮은 별이면서 거리가 가깝고 잘 측정된 별입니다. 분광형 G2 V (태양과 같은 MK 분류) 의 왜성으로 질량 1.1055 ± 0.0039 M☉ (Pourbaix &amp; Boffin 2016 의 다중성계 역학 해), 반지름 1.2234 ± 0.0053 R☉ (Kervella et al. 2017 의 VLTI/PIONIER 간섭계), 광도 1.521 ± 0.013 L☉. 1.347 pc 거리에 있는 Alpha Centauri AB 쌍성의 약간 더 무거운 주성이며, Proxima Cen 이 약 8700 AU 거리에서 외곽 동반성으로 묶여 삼중성계를 구성합니다.",
  "p_3":"NearStars 에서의 목표는 Sun-twin 별이되 시각적으로는 지구 등가 거리에서 관찰했을 때 태양보다 시직경이 좀 더 크고, 광도가 약간 더 강하며, 유효 온도가 아주 살짝 낮다는 정도로 구분되도록 하는 것입니다. 2025년 기준으로 JWST/NIRCam 코로나그라프가 거주 가능 영역에 거대 행성 후보 (Beichman et al. 2025, arXiv:2508.03814 / &quot;Worlds Next Door&quot;) 를 보고했는데 — 이 검출은 현재 후보 단계이며 NearStars 행성 인벤토리에는 <i>반영하지 않지만</i>, 시스템의 서사를 형성합니다.",

  "td_142":"Local Interstellar Cloud; column density ≪ 1",
  "h2_143":"Stellar disk synthesis",
  "p_144":"Alpha Cen A 의 디스크는 태양계 가장 가까운 곳에서 태양과 가장 비슷한 analog 입니다. Kervella 2017 의 간섭계 시직경 8.502 ± 0.038 mas (지구 관측 기준) 에서 지구로부터의 시직경은 0.0085&quot; — 태양 시직경 1924&quot; 의 약 1/65. KSP 의 가상 모성 (Alpha A 자체 주위 1 AU analog 궤도 가정) 에서는 지구에서 보는 태양보다 시직경이 약 22% 더 크고, 광속(luminous flux) 은 약 52% 더 강하게 보입니다.",
  "p_145":"<b>색 선택.</b> Teff = 5847 K (Porto de Mello 2008 AB 쌍 고분해 분광) 에서 광구 흑체는 ~496 nm 에서 피크. 태양 limb darkening 커널과 함께 CIE 1931 적분하면, 인지되는 색도는 태양의 D55 reference white 와 매우 가까이 떨어집니다 — 옅은 cream-yellow, 육안으로는 구분 불가. KSP 는 <span class=\"hex-chip\" style=\"background:#fff6e0\"></span><code>#fff6e0</code> (Sol 의 일반적 <span class=\"hex-chip\" style=\"background:#fff5e6\"></span><code>#fff5e6</code> 보다 살짝 더 따뜻) 을 채택, 이는 +57 K 더 높은 Teff 와 super-solar 금속함량 ([Fe/H] = +0.24, Porto de Mello 2008) 의 약간 강화된 불투명도를 반영합니다.",
  "p_146":"<b>입상 (Granulation).</b> Bigot et al. 2008 은 진동학적 측광 잔차에서 입상 노이즈를 검출 — Mm 규모 &quot;salt and pepper&quot; 텍스처 (지구 기준 ~1.5e-3 arcsec, 현재 장비로는 미분해). KSP 렌더링 규모 (별은 빌보드로 렌더) 에서 이는 분 단위 시간 척도의 미세한 0.1 magnitude 깜빡임으로만 나타나며, 시뮬레이션 시. Phase 3 cfg 는 특성 시간만 노트로 남기고 활동 시뮬레이션은 요구하지 않습니다.",
  "p_147":"<b>Limb darkening.</b> Quadratic 계수 (a ≈ b ≈ 0.30) 의 태양 등가값이 디스크 가장자리 dimming 을 재현. Kervella 2017 의 PIONIER 분석은 Claret 4-parameter 법칙으로 피팅하나 KSP 에는 2계수 축약이 디스크 중심 밝기 충실도의 약 2% 만 손실시키며 충분합니다. Limb 는 적당히 어두워지고 (μ=0.1 에서 ~0.40 배), 경로 길이 증가로 인해 약간 더 적색.",
  "p_148":"<b>P-mode 진동.</b> Bouchy &amp; Carrier 2002 와 Bazot 2007 이 envelope peak ~2.4 mHz (주기 ~7분), 진폭 ~25 cm/s 의 태양형 p-mode 검출. 디스크 적분 밝기로 환산하면 5–10분 척도의 sub-percent 깜빡임 — 육안 불가시이나 이 별 주위 고정밀 RV 행성 탐색에는 중요. KSP 에서는 렌더링 안 함.",
  "p_149":"<b>Magnetic halo 플레어 없음.</b> 22일 자전은 매우 낮은 Rossby number 와 깊은 대류 envelope 결합으로 저활동 다이나모 결과. Howard 2023 통계는 태양 twin 플레어율을 ~10⁻³ M-class flare/day 로 보며, superflare (EX &gt; 10³⁵ erg) 는 ~5 Gyr 나이에서 무시 가능.",
  "h2_150":"Activity and variability synthesis",
  "p_151":"DeWarf et al. 2010 은 Alpha Cen A 를 측광으로 7년 (2003–2010), Ca II H&amp;K 로 분광 모니터링하여 자전주기와 활동 사이클을 도출. 주요 결과.",
  "li_152":"<b>자전주기</b>. 22 ± 3 일. 태양형 (태양 적도 P_rot = 25.4 d, 극 ~31 d, 평균 ~26 d). ~80% 태양 나이 (Joyce &amp; Chaboyer 2018 의 4.81 Gyr vs 태양 4.57 Gyr) 와 일관되게 태양보다 약간 빠름.",
  "li_153":"<b>자기 사이클</b>. ~19 yr (vs 태양 22-yr Hale / 11-yr Schwabe). DeWarf 2010 이 베이스라인 안에서 부분 사이클 검출; 주기는 느슨하게 제약됨.",
  "li_154":"<b>log R&#x27;_HK</b>. -4.95 (평균), 사이클 진폭 ~0.05 dex. 태양보다 평균 채층 활동이 낮음 (태양 log R&#x27;_HK ≈ -4.91 활동 극대, -4.99 극소). Alpha A 는 G2 V 활동 envelope 의 비활동 극단, 나이와 느린 자전과 일관.",
  "li_155":"<b>X-ray 광도</b>. log L_X ≈ 27.0 erg/s (Ayres 2014; Robrade &amp; Schmitt 2005). 사이클 진폭 factor ~3× — 태양 ~10× X-ray 사이클 대비 약함.",
  "p_156":"<b>흑점 점유.</b> 측광 변광 진폭 (V 에서 peak-to-peak &lt;1%) 과 채층 활동 지수에서 추정. 사이클 극대기 디스크 점유 &lt;1%. 시각. 극대 시 1–3개 작은 (~5° 시직경) 흑점 그룹이 중위도에 분포. 흑점 온도 ~4300 K (umbra), ~5500 K (penumbra) — 평온 광구 평균보다 약 1500 K 낮음.",
  "p_157":"<b>테크노시그너처 검출 안됨.</b> Foster et al. 2022 (arXiv:2211.11756) 의 광학 레이저 탐색과 Smith et al. 2024 (arXiv:2206.14807) 의 태양 중력렌즈 전파 탐색 모두 null. 완전성 목적으로만 언급; 시각 영향 없음.",
  "p_158":"<b>Corona 구조.</b> Wood et al. 2005 의 Ly-α astrosphere 흡수 검출은 항성풍 질량 손실 ~1.5e-14 M☉/yr, 태양 질량 손실의 ~7%. 뜨거운 corona (T ~ 2e6 K) 는 태양의 quiet-Sun 상태와 유사. KSP 에서는 totality/eclipse 렌더링 시 가시 coronal ray 구조 의미, flare 이벤트 시 적색 편이된 CME 분출 (드물게).",
  "h2_159":"System geometry synthesis",
  "p_160":"AB 쌍성계의 상호 가시성은 NearStars Alpha Cen 경험을 정의하는 특징입니다.",
  "p_161":"<b>Alpha A 의 국지 기준 프레임</b>에서 Alpha Cen B 는 타원 궤도를 그리며.",
  "li_162":"주기. 79.91 ± 0.01 yr (Pourbaix 2002, Kervella 2016)",
  "li_163":"장반경. 23.52 AU (a_arcsec = 17.57&quot; × d = 1.347 pc)",
  "li_164":"이심률. 0.5179",
  "li_165":"Periastron 분리. ~11.4 AU (~태양-토성 거리)",
  "li_166":"Apastron 분리. ~35.7 AU (~태양-해왕성 거리)",
  "p_167":"AB 가 거주 가능 영역 circumbinary 행성을 안정적으로 호스팅하기에는 너무 넓지만, 각 별의 행성 인벤토리가 상대 별의 영향을 받기에는 충분히 좁음. A 표면에서 B 의 겉보기 밝기는 periastron 에서 V ≈ -21 정도 (점광원이지만 지구에서 토성 거리의 태양 분광 등가), apastron 에서 V ≈ -19 (지구의 1/4 달 밝기 정도이지만 여전히 점광원).",
  "p_168":"<b>A 주위 가상 지구 analog</b> (1.25 AU, 고전 HZ) 의 경우. 하늘의 태양은 Alpha A 가 지구에서 보는 태양과 같은 시직경 (L=1.52 와 ~1.25 AU 궤도이므로). B 는 V ≈ -20 (가장 어두움) ~ V ≈ -22 (가장 밝음) 범위의 변광 밝은 점광원. 지구의 금성보다 훨씬 밝아, 반대편 (opposition) 일 때 야간 반구를 극적으로 조명. B 의 빛이 던지는 그림자는 검출 가능하나 A 의 주광에 비해 10⁻³ 수준.",
  "p_169":"<b>Proxima 가시성.</b> Alpha A 표면에서 Proxima 는 ~+5 등급의 희미한 별로 보임 — 육안으로 보이지만 평범. 천구 운동 ~0.1&quot;/yr (시스템 고유 운동 + AB 중심 주위 Proxima 소형 궤도 운동의 미분).",
  "p_170":"<b>A 주위 확인 행성 없음.</b> Wagner et al. 2021 NEAR 코로나그라프 탐색은 ~1.1 AU 의 C1 후보를 보고했으나 후에 열복사 배경원으로 귀속. 2026-05-22 기준 가장 최근의 Beichman et al. 2025 (2508.03814) JWST/NIRCam 코로나그라프는 ~1.5–2 AU HZ 내 <i>후보</i> 따뜻한 거대 행성을 보고; 단일 에포크이며 포화 혼동으로 검출 신뢰도 미정. NearStars cfg 는 확인 전까지 미포함.",
  "h2_171":"Visual styling",
  "p_172":"디스크와 활동 결정의 조합.",
  "li_173":"<b>전체 모습.</b> 거의 완벽한 Sun-twin. 육안 관찰자는 Alpha A 와 Sol 을 구분할 수 없음; 미세한 차이 (높은 Teff 로 인한 약간 높은 색온도, 높은 금속함량으로 인한 약간 더 노랑-따뜻) 가 시각 그라데이션 인식 안에서 상쇄.",
  "li_174":"<b>궤도체에 대한 dayside 조명.</b> Sol 과 동일한 색온도 reference (표면 조명 계산에 ~5810 K). 지구 analog 의 대기 산란은 Sol 의 지구 관측과 유사한 푸른 하늘 / 노랑 태양 외관을 만듭니다.",
  "li_175":"<b>디스크 밝기 프로파일.</b> 태양 등가 quadratic limb darkening; 디스크 중심 밝음, 가장자리에서 ~40% 상대 밝기. 자전으로 인한 명확한 위도 띠 없음.",
  "li_176":"<b>흑점 가시성.</b> 사이클 극대기에 ±20–35° 위도에 1–3개 작은 어두운 흑점, 각각 ~5° 시직경. 가장 큰 흑점은 직접 이미징되는 HZ 궤도에서 가시 (KSP 등가. 활동 사이클 극대 시점에 절차적 어두운 패치 렌더).",
  "li_177":"<b>동반성 B.</b> 어떤 Alpha A 궤도 어디에서나 늘 하늘에 존재. 1.25 AU HZ 궤도에서 ~5° elongation min, ~16° at max. 79.91-yr 주기 동안 밝은 아침/저녁 별 (apastron) 과 태양 가까이의 찬란한 동반성 (periastron) 사이를 순환.",
  "li_178":"<b>Proxima Cen.</b> ~+5 등급 점광원, Alpha B 에서 ~2° (수 세기에 걸친 느린 drift). 육안으로 배경 별들과 구분 불가.",
  "li_179":"<b>AR overlay 용 분광선.</b> H-α 6563 Å (적색, 채층 발광에서 지배적), Ca II H/K 3933/3968 Å (청-자색, 활동 진단), Mg I b triplet 5167-5184 Å, Na D doublet 5890/5896 Å.",
  "h2_180":"Bibliography",
  "h3_181":"Read (visual-informative, drove decisions above)",
  "li_182":"<b>2017A&amp;A...597A.137K</b> Kervella et al. 2017 — VLTI/PIONIER 의 A 의 시직경 (8.502 ± 0.038 mas) 과 B (5.999 ± 0.025 mas) 간섭계 측정. 결정적 반지름 소스. 같은 데이터 + Hipparcos parallax 에서 볼로미터 광도 도출.",
  "li_183":"<b>2008A&amp;A...488..653P</b> Porto de Mello et al. 2008 — A 와 B 의 차등 고분해 분광 분석. 결정적 Teff 와 [Fe/H] 소스. 시스템을 super-solar 금속함량으로 확립.",
  "li_184":"<b>2018ApJ...864...99J</b> Joyce &amp; Chaboyer 2018 — A 와 B 모두에 대한 MESA + 진동학 모델링. 시스템 나이 4.81 ± 0.50 Gyr. 오랜 기간 더 나이든 (~6 Gyr) Bazot 2007 와 Thévenin 2002 진동학 나이 간의 긴장을 해소.",
  "li_185":"<b>2010ApJ...722..343D</b> DeWarf et al. 2010 — 7년 지상 측광 + Ca II H&amp;K 모니터링. 결정적 자전주기 (A 22 d, B 41 d), 부분 활동 사이클, log R&#x27;_HK 측정.",
  "li_186":"<b>2016A&amp;A...586A..90P</b> Pourbaix &amp; Boffin 2016 — 역학 쌍성 궤도 해. 질량 1.1055 ± 0.0039 M☉ (A), 0.9373 ± 0.0033 M☉ (B). 고정밀 현대 reference 궤도.",
  "li_187":"<b>2017A&amp;A...598L...7K</b> Kervella, Thévenin &amp; Lovis 2017 — Proxima 가 AB 에 8700 AU 에서 중력적으로 묶여 있음을 운동학적으로 확인 (e = 0.5, P = 547 kyr).",
  "li_188":"<b>2008A&amp;A...488..635B</b> Bigot et al. 2008 — A 의 진동학적 입상 노이즈 검출과 대류 overshoot 제약. 시각 cfg 에 쓰는 입상 셀 규모를 제공.",
  "li_189":"<b>2007A&amp;A...470..295B</b> Bazot et al. 2007 — HARPS 진동학 p-mode 검출. 독립적 (비역학) 방법으로 M = 1.105 ± 0.007 M☉, R = 1.224 ± 0.003 R☉ 확인.",
  "h3_190":"Read (context / methodology, not decision-driving)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
