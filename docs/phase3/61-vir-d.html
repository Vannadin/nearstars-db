  "h2_157":"Surface synthesis",
  "p_158":"61 Vir d has <b>no rocky surface</b> in the cfg-rendering sense — the planet is a sub-Neptune with a continuous H/He envelope wrapped over a rocky/icy core. The visible &quot;surface&quot; the cfg renders is the cloud-deck at the ~1 bar reference level, where water-ice and ammonia-ice condensates combine with photochemical haze to produce a featureless globally cloud-covered appearance under solar-twin illumination.",
  "p_159":"The deep interior structure is inferred from mass–radius scaling for sub-Neptunes (Lopez &amp; Fortney 2014, Howe 2014). For Msini = 22.9 M⊕ at 0.48 AU around a G-dwarf, three mass–radius branches are observationally consistent:",
  "p_160":"1. <b>H/He envelope branch (canonical)</b> — 5–8% envelope mass over a rocky/icy core, giving R = 4.5–5.5 R⊕. Density ~1.0 g/cc. This is the cool sub-Neptune archetype, with a slightly thicker envelope than c because the cooler equilibrium temperature reduces photoevaporation pressure to negligible levels.",
  "p_161":"2. <b>Hycean / water-world branch</b> — ~30–50% water mass fraction with a thin H₂ atmosphere over a liquid-water layer, giving R ≈ 3.5–4.5 R⊕. Density ~1.8 g/cc. d&#x27;s mean T_eq ≈ 351 K is close to the inner edge of Madhusudhan 2021&#x27;s Hycean window (T_eq 200–400 K at the water-ice surface), making this branch genuinely viable for the mean orbit; however e=0.35 drives T_eq to 476 K at periastron, well above the liquid-water stability limit at a 1-bar surface pressure. The branch is preserved as a cfg variant.",
  "p_162":"3. <b>Iron-rich rocky branch</b> — pure rock+iron giving R ≈ 2.7 R⊕, density ≈ 6.5 g/cc. Excluded by Owen &amp; Wu 2017 photoevaporation physics: at 0.48 AU around a G-dwarf the loss rate over 6 Gyr is ~0.05% of any H/He envelope, far below the threshold for stripping. Loss-driven evolution does not produce this branch at d&#x27;s parameters.",
  "p_163":"The cfg adopts <b>branch 1 (H/He envelope)</b> as canonical, parallel to the c synthesis. d&#x27;s cooler envelope hosts a richer condensate chemistry than c (water-ice clouds become optically dominant at T_eq &lt; 400 K, supplementing the NH₃ / KCl / Na₂S population available at c&#x27;s warmer 478 K). The water-rich Hycean variant is more compelling for d than for c on the mean-orbit T_eq alone, but the periastron excursion disfavors it; the canonical reading remains the H/He sub-Neptune.",
  "p_164":"<b>Color choice.</b> Under solar-twin illumination, the dominant visible features are the upper-tropospheric water-ice cloud deck (producing the pale blue-white cloud-top tint <span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code>) and the underlying ammonia-ice deck at the deeper ~3-bar level. Photochemical haze (Lavvas 2017) is thinner than at c&#x27;s higher T_eq because the cooler stratosphere reduces methane photolysis efficiency; the Rayleigh-blue limb haze (<span class=\"hex-chip\" style=\"background:#b8c4d4\"></span><code>#b8c4d4</code>) is therefore more visible than at c, where the haze blanket dominates.",
  "p_165":"<b>Morphology under pseudo-synchronous rotation.</b> With a 123 d orbital period and e=0.35, the spin state is pseudo-synchronous (Hut 1981, Henning &amp; Hurford 2014) — rotation rate matching the orbital angular velocity at pericenter, giving a sidereal period of ~84 d (vs. the orbital 123 d). Showman 2009 and Lewis 2014 GCMs for cool sub-Neptunes in this rotation regime predict a moderate eastward super-rotating equatorial jet (~0.5 km/s, slower than at c because the longer rotation period weakens Coriolis-driven jet acceleration) driving subtle zonal banding. The bands are visible as soft contrast variations modulated by the strong eccentricity-driven seasonal cycle: near periastron the cloud deck thins and bands become slightly more defined; near apoastron the deck thickens into a near-uniform gradient.",
  "h2_166":"Atmosphere synthesis",
  "p_167":"d&#x27;s atmosphere is canonical cool sub-Neptune territory: a retained H/He primary envelope of 5–8% by mass over a rocky/icy core, with trace condensable volatiles (H₂O, CH₄, NH₃) and photochemical hazes that combine with deep water-ice and ammonia-ice cloud decks to produce the featureless visible disk.",
  "p_168":"<b>Retention argument.</b> Owen &amp; Wu 2017&#x27;s photoevaporation valley analysis places d far to the right of the loss boundary. For a 23 M⊕ core at 0.48 AU around a 0.822 L☉ G-dwarf, the XUV-driven mass loss rate scales to ~10⁵ g/s — about 10⁻⁴ of the envelope mass lost per Gyr. Over the 5.5 Gyr system age the total loss is ~10⁻³ of the envelope, completely negligible. d retains its primary atmosphere with the largest margin of any 61 Vir planet.",
  "p_169":"<b>Pressure profile.</b> No surface — the envelope is hydrostatically continuous from low-density gas at the top to multi-kbar supercritical H/He at the rocky-core boundary. The cfg adopts a 1-bar reference level for the &quot;cloud-top&quot; surface that the renderer treats as the visible disk. Scale height 165 km at this level is consistent with cool sub-Neptune scale-height estimates (Lewis 2014). Atmospheric composition follows the standard primordial-envelope model (Madhusudhan 2012, Moses 2013): H₂ ~74%, He ~24%, H₂O ~0.5%, CH₄ ~0.2%, NH₃ ~0.1%, with traces of CO, CO₂, HCN, and photochemical hazes. The condensable abundances are higher than at c because d&#x27;s cooler temperature allows deeper-mixed volatiles (especially H₂O and NH₃) to reach the visible deck without thermal dissociation.",
  "p_170":"<b>Clouds.</b> At T_eq ~ 351 K (mean) and pressures of 0.1–10 bar, the condensable species in equilibrium are water-ice (condensing at 273 K at the upper troposphere reference altitude), NH₃ ice (condensing at ~200 K at deeper altitudes), and NH₄SH (Lewis 1969 thermochemistry, ~5 bar level). Water-ice forms the optically dominant upper cloud deck; NH₃ ice and NH₄SH form deeper layers. Photochemical haze (Morley 2015, Lavvas 2017) from methane + HCN photolysis is present but thinner than at c&#x27;s warmer T_eq — the cooler stratosphere reduces the photochemical reaction efficiency.",
  "p_171":"<b>Sky appearance from a hypothetical aerostat at 1 bar.</b> The sky above is pale blue-white (<span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code>) with the disk of 61 Vir visible through the cloud cover as a moderately diffuse warm-yellow patch at angular diameter ~0.11° — about a fifth of the Sun&#x27;s apparent diameter from Earth. Surface brightness through the cloud deck is significantly reduced from the direct insolation level (S = 3.6 S⊕ at top of atmosphere becomes ~0.5 S⊕ at the 1-bar level after cloud attenuation). Day-night contrast at the cloud-top is moderate: ~55 K temperature difference between substellar (~340 K) and antistellar (~285 K) cloud-tops drives a pseudo-zonal circulation that smooths terminator features.",
  "p_172":"<b>Eccentricity-driven seasons.</b> The e=0.35 orbit drives a 4.3× modulation of insolation between periastron and apoastron, the largest of any 61 Vir planet. This is the dominant atmospheric forcing for d: at periastron the cloud deck thins (water-ice clouds partially sublimate as T_eq rises to 476 K and the upper troposphere warms above water-condensation temperature locally), revealing darker NH₃ and deeper haze layers; at apoastron the deck thickens and the disk appears more uniformly bright. The seasonal cycle period is 123 d, and the orbital phase determines a slow brightness modulation observable in reflected light at the few-percent level.",
  "p_173":"<b>Photochemical haze chemistry.</b> The 5568 K solar-twin SED gives a near-Earth-Sun UV-to-visible ratio. Methane photolysis at λ ≲ 200 nm produces HCN, C₂H₂, and higher-mass haze precursors (Lavvas 2017). The cooler stratosphere at d (compared to c) reduces the photolysis rate by ~3× at the same UV flux per molecule, giving a thinner haze layer that does not dominate the optical appearance. The H/He Rayleigh signature is therefore more visible at d than at c.",
  "h2_174":"Rotation &amp; spin synthesis",
  "p_175":"d&#x27;s spin state is determined by the balance of tidal-damping and eccentricity-pumping timescales. At a 123-day orbital period, 0.48 AU separation, and 23 M⊕ mass, the tidal locking timescale for an Earth-analog interior Q is ~5–15 Gyr (Henning &amp; Hurford 2014 scaling). This exceeds the 5.5 Gyr system age — d has not had time to reach 1:1 lock. Obliquity damping has been incomplete; the cfg picks 15° as a tie-break for visual seasonal modulation.",
  "p_176":"With eccentricity 0.35 (Vogt 2010), Hut 1981&#x27;s pseudo-synchronous state is the dominant attractor: rotation rate matching the orbital angular velocity at pericenter, giving a sidereal period of ~84 d (vs. the orbital 123 d). This produces a slowly drifting substellar point in the rotating frame, with the substellar longitude completing a full rotation in ~280 days.",
  "p_177":"<b>KSP implementation note.</b> The cfg adopts <code>rotation_period_days</code> = 84 (pseudo-synchronous, ~7 257 600 s in Kopernicus units). This is distinct from the orbital period and produces a non-locked, slow rotation that gives d a faint diurnal cycle combined with a strong seasonal cycle from the e=0.35 orbit.",
  "p_178":"<b>Obliquity.</b> Tidal damping is incomplete at d&#x27;s distance; the cfg picks 15° as a tie-break — large enough to give visible seasonal modulation of the cloud bands (cloud-belt latitudes shift with sub-solar latitude over the orbit), small enough to keep the near-coplanar inclination posterior of the 61 Vir system intact. The b/c inner planets have lower obliquity because of stronger tidal damping at smaller separations.",
  "p_179":"<b>Tidal heating.</b> Bolmont 2020 / Henning &amp; Hurford 2014 scaling for e=0.35 at 123 d period and 23 M⊕ mass gives a tidal heating contribution of 0.005–0.05 W/m². The higher eccentricity boosts the flux above c&#x27;s 0.001–0.01 W/m², but the longer period attenuates the overall budget. This is negligible relative to the ~50 W/m² absorbed mean insolation at the cloud-top, so d is firmly <b>insolation-dominated</b> in its thermal budget. The deep interior may host modest residual heat from formation + radiogenic decay (~0.01 W/m²), again small relative to insolation.",
  "p_180":"<b>Strong seasons.</b> Eccentricity 0.35 drives a 4.3× modulation of insolation over the orbit. Combined with the deep H/He envelope&#x27;s slow thermal response, the seasonal cycle manifests as cloud-deck thickness modulation rather than dramatic temperature swings — but the visible disk brightness modulates by ~10–15% over the 123 d orbit, the strongest seasonal photometric signature in the 61 Vir inner system.",
  "h2_181":"Visual styling",
  "p_182":"Combining the surface and atmosphere decisions:",
  "li_183":"<b>Global appearance (orbit view).</b> A pale blue-white, hazy disk with a soft cool overall tint (<span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code>) under solar-twin illumination. Slightly icier-looking than c, distinct enough to read as a &quot;cooler outer sub-Neptune&quot; at a glance. Faint zonal banding visible at high contrast; otherwise a featureless soft-edged sphere with a clearer Rayleigh-blue limb haze (<span class=\"hex-chip\" style=\"background:#b8c4d4\"></span><code>#b8c4d4</code>) than c.",
  "li_184":"<b>Cloud-top morphology.</b> Pseudo-zonal banding from the super-rotating equatorial jet (~3–4 bands across the disk, with faint contrast). Substellar region slightly brighter (~340 K warmer cloud + thicker condensate veil); antistellar slightly darker. Banding contrast strengthens near periastron (cloud deck thins) and weakens near apoastron (deck thickens into a smoother gradient).",
  "li_185":"<b>Eccentricity-driven seasonal cycle.</b> Over the 123 d orbit the visible disk modulates by ~10–15% in brightness — brightest near periastron (more reflected light from thinner cloud deck plus closer geometry) and dimmest near apoastron. The cfg can encode this as a slow ~123 d brightness pulsation tied to the orbital phase.",
  "li_186":"<b>Limb haze.</b> Pale blue Rayleigh scattering at λ ≲ 0.5 μm from the H/He upper atmosphere is more visible than at c because the photochemical haze blanket is thinner. Adds a soft cyan ring around the disk at the terminator, particularly noticeable at high phase angles.",
  "li_187":"<b>Nightside.</b> Reflected sister-planet light from c (small disk, inferior conjunction every ~55 d) and from b (very dim, distant). Nightside cloud-top temperature 285 K — too cool to be visible in optical thermal emission but bright in mid-IR (~10 μm).",
  "li_188":"<b>Star in sky.</b> 61 Vir subtends 0.108° at d — about a fifth of the Sun&#x27;s angular size from Earth at mean distance, swelling to ~0.166° at periastron and shrinking to ~0.080° at apoastron. Through the cloud deck it appears as a diffuse warm-yellow patch (<span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-encoded host tint), not a sharp disk. Surface illumination ~3.6× Earth&#x27;s at top of atmosphere (mean), ranging from ~8.6× at periastron to ~2.0× at apoastron.",
  "li_189":"<b>Sister planets in sky.</b> c (next inward at 0.22 AU) appears at angular size ~0.05° at superior conjunction and ~0.1° at inferior conjunction (every ~55 days); b (at 0.05 AU) is much smaller (~0.01° at maximum elongation) and not always visible from d&#x27;s vantage. Near-coplanar geometry; conjunctions are sky events for any in-system observer.",
  "li_190":"<b>Optional seasonal animation.</b> A slow modulation of cloud-deck brightness and band contrast over the 123 d orbit, synchronized with the orbital phase, would faithfully render the eccentricity-driven seasonal cycle. Higher-priority Phase 3.5 visual detail than for b or c because d&#x27;s seasonal swing is large enough to be visually noticeable.",
  "h2_191":"Bibliography",
  "h3_192":"Read (visual-informative, drove decisions above)",
  "li_193":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). The discovery paper. Reports d&#x27;s orbit (P=123.01 d, a=0.476 AU, e=0.35, ω=314°) and minimum mass (Msini = 22.9 ± 2.6 M⊕). HIRES + AAT joint RV solution. All Decisions table orbital + mass values anchor here.",
  "li_194":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation-valley physics. Places d far outside the loss boundary (XUV-driven loss ~10⁻³ of envelope over 6 Gyr). Anchors <code>atmosphere_present = true</code> with high confidence.",
  "li_195":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Sub-Neptune envelope mass-radius scaling. For 23 M⊕ with 5–8% H/He envelope, R = 4.5–5.5 R⊕; cfg picks 5.0 R⊕. Anchors the <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break.",
  "li_196":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>, arXiv:1311.0329). Sub-Neptune mass-radius diversity; supports the H/He envelope canonical reading and bounds the Hycean / water-rich alternative.",
  "li_197":"<b>Madhusudhan N. 2012</b> — <i>C/O ratio as a dimension for characterizing exoplanetary atmospheres</i>, ApJ 758, 36 (<code>2012ApJ...758...36M</code>, arXiv:1209.2412). Sub-Neptune primordial-envelope composition baseline; drives the H/He primary + trace condensable composition.",
  "li_198":"<b>Madhusudhan N. et al. 2021</b> — <i>Habitability and biosignatures of Hycean worlds</i>, ApJ 918, 1 (<code>2021ApJ...918....1M</code>, arXiv:2108.10888). Hycean class definition; d&#x27;s mean T_eq sits near the inner edge of the Hycean window. Drives the Open-items Hycean variant.",
  "li_199":"<b>Moses J. I. et al. 2013</b> — <i>Compositional diversity in the atmospheres of hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). Photochemistry of sub-Neptunes; informs the CH₄/HCN/photochemical-haze chain at d&#x27;s cooler stratosphere.",
  "li_200":"<b>Morley C. V. et al. 2015</b> — <i>Thermal emission and reflected light spectra of super Earths with flat transmission spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). Hazy sub-Neptune retrieval framework; informs the haze-thickness scaling between c (warmer) and d (cooler).",
  "li_201":"<b>Lavvas P. &amp; Koskinen T. 2017</b> — <i>Aerosol properties of the atmospheres of extrasolar giant planets</i>, ApJ 847, 32 (<code>2017ApJ...847...32L</code>, arXiv:1707.08077). Sub-Neptune photochemical haze formation mechanism; supports the thinner haze layer at d.",
  "li_202":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric circulation of hot Jupiters: coupled radiative-dynamical GCM</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). Establishes the super-rotating equatorial jet in tidally-influenced gas planets; informs d&#x27;s <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> (zonal banding).",
  "li_203":"<b>Lewis N. K. et al. 2014</b> — <i>GCMs of warm sub-Neptunes</i>, ApJ 795, 150 (<code>2014ApJ...795..150L</code>, arXiv:1410.0008). GCM scaling for the cool sub-Neptune regime; supports the pseudo-synchronous spin and the weaker equatorial-jet circulation at d&#x27;s longer rotation period.",
  "li_204":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). Pseudo-synchronous spin equilibrium for eccentric orbits; foundational citation for d&#x27;s spin state at e=0.35.",
  "li_205":"<b>Henning W. G. &amp; Hurford T. 2014</b> — <i>Tidal heating in multilayered terrestrial exoplanets</i>, ApJ 789, 30 (<code>2014ApJ...789...30H</code>, arXiv:1311.5904). Sub-Neptune tidal heating + spin-locking timescales; gives ~5–15 Gyr for d&#x27;s parameters (exceeds system age).",
  "li_206":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution</i> (<code>2020A&amp;A...644A.165B</code>, arXiv:2002.02015). Provides the tidal-heating flux scaling for d (0.005–0.05 W/m²).",
  "li_207":"<b>Lewis J. S. 1969</b> — <i>The clouds of Jupiter and the NH₃-H₂O and NH₃-H₂S systems</i>, Icarus 10, 365. Foundational thermochemistry for sub-Neptune cloud condensation sequences; gives the H₂O / NH₃ / NH₄SH layering at d&#x27;s T_eq.",
  "h3_208":"Read (context / methodology, not decision-driving)",
  "li_209":"<b>Rathsam A. et al. 2023</b> — <i>Lithium depletion in solar analogs</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589). Inherited from host-star synthesis. Phase 2 anchor for 61 Vir age (5.50 +0.78/-0.74 Gyr); sets the photoevaporation-evolution timescale.",
  "li_210":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters V</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360). Inherited from host-star synthesis. L = 0.8222 ± 0.0033 L☉ anchors the insolation derivation for d&#x27;s eccentric orbit.",
  "li_211":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs</i> (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Inherited from host-star synthesis. Activity-age 6.1 ± 1.7 Gyr — demoted to cross-check vs Rathsam 2023 isochrone (documented divergence in host-star reconciliation).",
  "li_212":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). Radius valley demographics; supports the H/He envelope canonical reading for d&#x27;s 23 M⊕ population.",
  "li_213":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i> (<code>2012MNRAS.424.1206W</code>, arXiv:1206.2370). Inherited from host-star synthesis. Cited briefly; the cold debris ring at 30 AU does not interact dynamically with d at 0.48 AU (d sits well inside the ring&#x27;s inner edge).",
  "li_214":"<b>Kreidberg L. et al. 2014</b> — <i>Clouds in the atmosphere of the super-Earth exoplanet GJ 1214 b</i>, Nature 505, 69 (<code>2014Natur.505...69K</code>, arXiv:1401.0022). Featureless sub-Neptune transmission spectrum reference; informs the global cloud cover expectation at d&#x27;s parameters.",
  "h3_215":"Read (instrument-only, not visual-informative)",
  "li_216":"<b>Marcy G. W. et al. 2014</b> — Kepler super-Earth statistics context.",
  "h3_217":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_218":"The d-specific arXiv record is small. The not-read set is predominantly:",
  "li_219":"<b>Dynamical-stability follow-ups</b> of the Vogt 2010 system; d&#x27;s e=0.35 is the most dynamically active element of the three-planet chain, but the system is stable within Vogt 2010&#x27;s solution.",
  "li_220":"<b>Transit search non-detections</b> confirming d does not transit; geometric transit probability for d at e=0.35, a=0.48 AU is ~0.6%, so the non-detection is consistent with random inclination.",
  "li_221":"<b>Generic photoevaporation-rate calculations</b> without 61 Vir-specific stellar wind models.",
  "h2_222":"Open items for follow-up",
  "li_223":"<b>True mass and radius from direct imaging.</b> d&#x27;s mass is Msini-only and its radius is a mass–radius scaling estimate. A future direct-imaging campaign would yield true mass + radius from a reflected-light detection; HabEx / LUVOIR era observation. d is the most favorable 61 Vir planet for direct imaging because of its largest angular separation from the host (~57 mas at maximum elongation).",
  "li_224":"<b>Cfg variant: Hycean / water-world envelope.</b> At d&#x27;s mean T_eq ~ 351 K (close to the inner edge of Madhusudhan 2021&#x27;s Hycean window), a water-rich envelope with thin H₂ atmosphere is observationally consistent with the H/He primary envelope. The e=0.35 orbit takes d to T_eq ~ 476 K at periastron, well above the liquid-water stability limit at 1 bar, disfavoring but not excluding the Hycean reading. Cfg variant would render d as a denser, less hazy, deeper-blue ocean-world disk with periodic storms triggered at periastron. Document as Phase 3.5 alternative.",
  "li_225":"<b>Cfg variant: rocky no-envelope alternative.</b> Photoevaporation physics strongly favors envelope retention (loss &lt; 0.1% over 6 Gyr) but a small residual probability remains for a pure-rocky 23 M⊕ planet (R ≈ 2.7 R⊕, density ~6.5 g/cc). Render would be a cooler rocky world — visually distinct from the haze-covered canonical reading. Preserve as cfg variant.",
  "li_226":"<b>Cfg variant: stronger seasonal storm system.</b> d&#x27;s e=0.35 drives a 4.3× insolation modulation, the largest in the 61 Vir system. GCM simulations targeted at the d-specific eccentricity could constrain whether this drives episodic storm features (cyclones, equatorial overshooting) that would warrant additional visual detail beyond the static cloud-band rendering. Phase 3.5 refinement.",
  "li_227":"<b>Future direct-imaging spectroscopy.</b> Although d does not transit, future direct-imaging spectroscopy could resolve the cloud-top composition. Refinement opportunities: H₂O/CH₄/NH₃ abundances, haze optical depth, deeper cloud composition (water-ice vs NH₃-ice vs NH₄SH).",
  "li_228":"<b>Atmospheric escape rate cross-check.</b> Owen &amp; Wu 2017 generic scaling already places d at negligible loss; a 61 Vir-specific stellar wind + XUV model (Vidotto-style) would confirm but not change the qualitative envelope-retention conclusion.",
  "h2_229":"Related",

  "p_2":"<b>NearStars 시나리오 선택. 보유된 H/He 일차 외피 (~5–8% 질량), H₂O 와 NH₃ 얼음으로 더 두꺼워진 응결 구름 데크, 옅은 zonal banding, 그리고 e = 0.35 궤도에 걸쳐 강하게 변조되는 일사를 가진 차갑고 이심한 sub-Neptune 입니다.</b> 이는 d 의 더 차가운 일조량 (S ≈ 3.6 S⊕, T_eq(A=0) ≈ 383 K, T_eq(A=0.3) ≈ 351 K) 과 높은 이심률에 적용된 K2-18 b / Hycean-인접 원형입니다. 대안 — 액체 물 층 위 얕은 H₂ 외피의 완전 Hycean 물-세계 — 는 Open items 의 cfg variant 로 보존합니다. d 의 평균 일조량이 Madhusudhan 2021 Hycean 윈도우의 안쪽 가장자리에 가깝지만, e = 0.35 궤도 excursion 이 근일점에서 그것을 runaway-greenhouse 경계 한참 안쪽까지 흔들기 때문입니다.",

  "h2_157":"Surface synthesis",
  "p_158":"61 Vir d 는 cfg-렌더링 의미의 <b>암석 표면이 없습니다</b> — 행성은 암석 / 얼음 핵 위에 H/He 외피가 연속적으로 감긴 sub-Neptune 입니다. cfg 가 렌더링하는 가시 &quot;표면&quot; 은 ~1 bar 기준 레벨의 구름 데크입니다. 거기서 물-얼음과 암모니아-얼음 응결물이 광화학 haze 와 결합해 솔라 트윈 조명 아래 featureless 전역 구름-덮인 외관을 생성합니다.",
  "p_159":"깊은 내부 구조는 sub-Neptune mass-radius 스케일링 (Lopez &amp; Fortney 2014. Howe 2014) 에서 추론됩니다. G 왜성 0.48 AU 의 Msini = 22.9 M⊕ 에서 관측적으로 일관된 mass-radius 분기 세 가지가 있습니다.",
  "p_160":"1. <b>H/He 외피 분기 (canonical).</b> 암석 / 얼음 핵 위 5–8% 외피 질량. R = 4.5–5.5 R⊕. 밀도 ~1.0 g/cc. 차가운 sub-Neptune 원형. c 보다 살짝 더 두꺼운 외피인데, 더 차가운 평형 온도가 광증발 압력을 무시 가능한 수준으로 줄이기 때문.",
  "p_161":"2. <b>Hycean / 물-세계 분기.</b> 액체 물 층 위에 얇은 H₂ 대기를 가진 ~30–50% 물 질량 비율. R ≈ 3.5–4.5 R⊕. 밀도 ~1.8 g/cc. d 의 평균 T_eq ≈ 351 K 는 Madhusudhan 2021 Hycean 윈도우 (물-얼음 표면에서 T_eq 200–400 K) 의 안쪽 가장자리에 가까워, 평균 궤도에서는 이 분기가 실제로 가능. 그러나 e=0.35 가 T_eq 를 근일점에서 476 K 까지 끌어 올려 1 bar 표면 압력의 액체 물 안정 한계 한참 위. 분기는 cfg variant 로 보존.",
  "p_162":"3. <b>철-풍부 암석 분기.</b> 순수 암석+철 R ≈ 2.7 R⊕. 밀도 ≈ 6.5 g/cc. Owen &amp; Wu 2017 광증발 물리에서 배제. G 왜성 0.48 AU 에서 6 Gyr 에 걸친 손실율은 어떤 H/He 외피의 ~0.05% 로, 벗기는 임계값 한참 아래. 손실 구동 진화는 d 의 파라미터에서 이 분기를 만들지 않음.",
  "p_163":"cfg 는 c 합성과 평행하게 <b>분기 1 (H/He 외피)</b> 을 canonical 로 채택 합니다. d 의 더 차가운 외피는 c 보다 더 풍부한 응결 화학을 호스트 합니다 (T_eq &lt; 400 K 에서 물-얼음 구름이 광학적으로 우세해져 c 의 더 따뜻한 478 K 에서 가능한 NH₃ / KCl / Na₂S 인구를 보충). 물-풍부 Hycean 변형은 평균-궤도 T_eq 단독으로는 c 보다 d 에 더 설득력 있지만, 근일점 excursion 이 그것을 불리하게 만듭니다. canonical 해석은 여전히 H/He sub-Neptune.",
  "p_164":"<b>색 선택.</b> 솔라 트윈 조명 아래 dominant 가시 feature 는 상부 대류권 물-얼음 구름 데크 (옅은 청-흰 구름-top 색조 <span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code> 생성) 와 그 아래 ~3 bar 레벨의 암모니아-얼음 데크입니다. 광화학 haze (Lavvas 2017) 는 c 의 더 높은 T_eq 보다 얇은데, 더 차가운 성층권이 메탄 광분해 효율을 줄이기 때문입니다. 따라서 Rayleigh-청 limb haze (<span class=\"hex-chip\" style=\"background:#b8c4d4\"></span><code>#b8c4d4</code>) 가 c 보다 더 가시적이고, haze 담요가 지배하는 c 와 구분됩니다.",
  "p_165":"<b>Pseudo-synchronous 자전 하의 형태.</b> 123 일 궤도 주기와 e=0.35 에서 spin 상태는 pseudo-synchronous (Hut 1981, Henning &amp; Hurford 2014) — 자전 율이 근일점 궤도 각속도와 일치하여 sidereal 주기는 ~84 일 (궤도의 123 일 대비). 이 자전 영역의 차가운 sub-Neptune 에 대한 Showman 2009 와 Lewis 2014 GCM 은 적당한 동풍 super-rotating 적도 jet (~0.5 km/s. c 보다 느림. 더 긴 자전 주기가 Coriolis 구동 jet 가속을 약화시키기 때문) 이 미묘한 zonal banding 을 구동한다고 예측. 띠는 강한 이심률 구동 계절 사이클로 변조되는 부드러운 대비 변동으로 가시. 근일점 근처에서는 구름 데크가 얇아져 띠가 살짝 더 또렷해지고, 원일점 근처에서는 데크가 거의 균일한 gradient 로 두꺼워짐.",
  "h2_166":"Atmosphere synthesis",
  "p_167":"d 의 대기는 표준적인 차가운 sub-Neptune 영역입니다. 암석 / 얼음 핵 위 5–8% 질량의 보유된 H/He 일차 외피, 미량 응결 휘발성 (H₂O, CH₄, NH₃), 그리고 깊은 물-얼음과 암모니아-얼음 구름 데크와 결합해 featureless 가시 디스크를 생성하는 광화학 haze.",
  "p_168":"<b>보유 논거.</b> Owen &amp; Wu 2017 의 광증발 valley 분석은 d 를 손실 경계 한참 오른쪽에 위치시킵니다. 0.822 L☉ G 왜성 0.48 AU 의 23 M⊕ 핵에서 XUV 구동 질량 손실율은 ~10⁵ g/s — Gyr 당 외피 질량의 약 10⁻⁴ 손실. 5.5 Gyr 시스템 나이에 걸쳐 총 손실은 외피의 ~10⁻³ 로 완전히 무시 가능. d 는 61 Vir 행성 중 가장 큰 마진으로 일차 대기를 보유합니다.",
  "p_169":"<b>압력 프로파일.</b> 표면 없음 — 외피는 상단의 저밀도 가스에서 암석-핵 경계의 다 kbar 초임계 H/He 까지 정수압적으로 연속. cfg 는 렌더러가 가시 디스크로 취급하는 &quot;구름-top&quot; 표면에 대해 1 bar 기준 레벨을 채택. 이 레벨의 스케일 높이 165 km 는 차가운 sub-Neptune 스케일 높이 추정 (Lewis 2014) 과 일관. 대기 조성은 표준 원시-외피 모델 (Madhusudhan 2012, Moses 2013) 을 따름. H₂ ~74%, He ~24%, H₂O ~0.5%, CH₄ ~0.2%, NH₃ ~0.1%, CO, CO₂, HCN 미량, 그리고 광화학 haze. 응결성 풍부도는 c 보다 높은데, d 의 더 차가운 온도가 깊이-혼합된 휘발성 (특히 H₂O 와 NH₃) 을 열적 해리 없이 가시 데크까지 도달하게 허용하기 때문입니다.",
  "p_170":"<b>구름.</b> T_eq ~ 351 K (평균) 와 압력 0.1–10 bar 에서 평형의 응결 종은 물-얼음 (상부 대류권 기준 고도에서 273 K 에 응결), NH₃ 얼음 (더 깊은 고도에서 ~200 K 에 응결), 그리고 NH₄SH (Lewis 1969 열화학, ~5 bar 레벨). 물-얼음이 광학적으로 우세한 상부 구름 데크 형성. NH₃ 얼음과 NH₄SH 가 더 깊은 층 형성. 광화학 haze (Morley 2015, Lavvas 2017) 는 메탄 + HCN 광분해에서 형성되어 존재하지만 c 의 더 따뜻한 T_eq 보다 얇음 — 더 차가운 성층권이 광화학 반응 효율을 줄임.",
  "p_171":"<b>1 bar 의 가상 비행선에서 본 하늘 외관.</b> 위쪽 하늘은 옅은 청-흰 (<span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code>) 이고, 61 Vir 디스크는 구름 덮임을 통해 각지름 ~0.11° 의 적당히 흩어진 따뜻한-노란 patch 로 보임 — 지구에서 본 태양 겉보기 지름의 약 5 분의 1. 구름 데크를 통한 표면 밝기는 직접 일사 수준에서 의미 있게 감소 (대기 상단에서 S = 3.6 S⊕ 가 구름 감쇠 후 1 bar 레벨 에서 ~0.5 S⊕). 구름-top 에서 day-night 대비는 적당 — substellar (~340 K) 와 antistellar (~285 K) 구름-top 의 ~55 K 온도차가 terminator feature 를 부드럽게 하는 pseudo-zonal 순환을 구동.",
  "p_172":"<b>이심률 구동 계절.</b> e=0.35 궤도는 근일점과 원일점 사이에서 4.3× 일사 변조를 구동하며, 어떤 61 Vir 행성보다 큽니다. 이것이 d 의 dominant 대기 강제력. 근일점에서 구름 데크가 얇아짐 (T_eq 가 476 K 로 오르고 상부 대류권이 국부적으로 물-응결 온도 위로 따뜻해지면서 물-얼음 구름이 부분적으로 승화), 더 어두운 NH₃ 와 더 깊은 haze 층이 드러남. 원일점 에서 데크가 두꺼워지고 디스크가 더 균일하게 밝게 보임. 계절 사이클 주기는 123 일이고, 궤도 위상이 반사광에서 수 % 수준으로 관측 가능한 느린 밝기 변조를 결정.",
  "p_173":"<b>광화학 haze 화학.</b> 5568 K 솔라 트윈 SED 는 거의 지구-태양 UV-to-가시 비율을 줌. λ ≲ 200 nm 의 메탄 광분해는 HCN, C₂H₂, 그리고 더 무거운 haze 전구체를 생성 (Lavvas 2017). d 의 더 차가운 성층권은 (c 와 비교 해서) 분자당 같은 UV flux 에서 광분해율을 ~3× 줄여, 광학 외관을 지배 하지 않는 더 얇은 haze 층을 줌. 따라서 H/He Rayleigh 시그니처는 c 보다 d 에서 더 가시적.",
  "h2_174":"Rotation &amp; spin synthesis",
  "p_175":"d 의 spin 상태는 조석-감쇠와 이심률-펌핑 시간 스케일의 균형으로 결정됩니다. 123 일 궤도 주기, 0.48 AU 분리, 23 M⊕ 질량에서 지구 아날로그 내부 Q 의 조석 고정 시간은 ~5–15 Gyr (Henning &amp; Hurford 2014 스케일링) 입니다. 이는 5.5 Gyr 시스템 나이를 초과합니다 — d 는 1:1 lock 에 도달할 시간이 없었습니다. obliquity 감쇠가 불완전했습니다. cfg 는 시각 계절 변조를 위해 15° 를 tie-break 으로 채택합니다.",
  "p_176":"이심률 0.35 (Vogt 2010) 에서 Hut 1981 의 pseudo-synchronous 상태가 dominant attractor. 자전율이 근일점 궤도 각속도와 일치하여 sidereal 주기는 ~84 일 (궤도의 123 일 대비). 이는 회전 frame 에서 천천히 drift 하는 substellar 점을 생성. substellar 경도가 ~280 일 만에 전체 회전 완료.",
  "p_177":"<b>KSP 구현 노트.</b> cfg 는 <code>rotation_period_days</code> = 84 (pseudo-synchronous, Kopernicus 단위로 ~7 257 600 초) 를 채택. 이는 궤도 주기와 구분되며, e=0.35 궤도의 강한 계절 사이클과 결합된 lock 안 된 느린 자전이 d 에 옅은 일주 사이클을 줍니다.",
  "p_178":"<b>Obliquity.</b> d 의 거리에서 조석 감쇠가 불완전. cfg 는 tie-break 으로 15° 채택 — 구름 띠의 가시 계절 변조를 줄 만큼 크고 (구름-띠 위도가 궤도에 걸쳐 sub-solar 위도와 함께 이동), 61 Vir 시스템의 거의 동일 평면 경사 posterior 를 유지할 만큼 작음. b/c 안쪽 행성은 더 작은 분리 에서의 더 강한 조석 감쇠 때문에 더 낮은 obliquity 를 가짐.",
  "p_179":"<b>조석 가열.</b> 123 일 주기와 23 M⊕ 질량에서 e=0.35 에 대한 Bolmont 2020 / Henning &amp; Hurford 2014 스케일링은 0.005–0.05 W/m² 의 조석 가열 기여를 줌. 더 높은 이심률이 c 의 0.001–0.01 W/m² 위로 flux 를 끌어 올리지만, 더 긴 주기가 전체 예산을 감쇠. 구름-top 흡수 평균 일사 ~50 W/m² 대비 무시 가능하므로 d 는 열 예산에서 단단히 <b>일사 지배</b> 입니다. 깊은 내부는 형성 + 방사성 붕괴 잔여 열 (~0.01 W/m²) 을 가질 수 있지만, 다시 일사 대비 작음.",
  "p_180":"<b>강한 계절.</b> 이심률 0.35 가 궤도에 걸쳐 4.3× 일사 변조를 구동. 깊은 H/He 외피의 느린 열 반응과 결합해 계절 사이클은 극적인 온도 변동이 아닌 구름-데크 두께 변조로 나타남 — 그러나 가시 디스크 밝기가 123 일 궤도에 걸쳐 ~10–15% 변조됩니다. 61 Vir 안쪽 시스템에서 가장 강한 계절 광도 시그니처.",
  "h2_181":"Visual styling",
  "p_182":"표면과 대기 결정을 결합하면 다음과 같습니다.",
  "li_183":"<b>전역 외관 (궤도 뷰).</b> 솔라 트윈 조명 아래 부드러운 차가운 전체 색조 (<span class=\"hex-chip\" style=\"background:#e0e4ec\"></span><code>#e0e4ec</code>) 의 옅은 청-흰, haze 가 낀 디스크. c 보다 살짝 더 얼음 같아 보이며, 한눈에 &quot;더 차가운 외측 sub-Neptune&quot; 으로 읽힐 만큼 구분됨. 높은 대비에서 옅은 zonal banding 가시. 그 외에는 c 보다 또렷한 Rayleigh-청 limb haze (<span class=\"hex-chip\" style=\"background:#b8c4d4\"></span><code>#b8c4d4</code>) 를 가진 featureless 부드러운- 가장자리 구.",
  "li_184":"<b>구름-top 형태.</b> super-rotating 적도 jet 의 pseudo-zonal banding (디스크 너머 ~3–4 띠, 옅은 대비). substellar 영역 약간 더 밝음 (~340 K 더 따뜻한 구름 + 더 두꺼운 응결 veil). antistellar 약간 더 어두움. 근일점 근처에서 banding 대비 강화 (구름 데크가 얇아짐), 원일점 근처에서 약화 (데크가 더 부드러운 gradient 로 두꺼워짐).",
  "li_185":"<b>이심률 구동 계절 사이클.</b> 123 일 궤도에 걸쳐 가시 디스크가 밝기 ~10–15% 변조 — 근일점 근처에서 가장 밝음 (더 얇은 구름 데크에서의 더 많은 반사광 + 더 가까운 기하학) 원일점 근처에서 가장 어두움. cfg 는 이를 궤도 위상에 묶인 느린 ~123 일 밝기 펄세이션으로 인코딩 가능.",
  "li_186":"<b>Limb haze.</b> H/He 상부 대기에서 λ ≲ 0.5 μm 의 옅은 청 Rayleigh 산란은 광화학 haze 담요가 더 얇기 때문에 c 보다 더 가시적. 높은 위상각에서 특히 두드러지는 부드러운 cyan 고리를 terminator 에서 디스크 주위에 추가.",
  "li_187":"<b>야간면.</b> c 에서 반사된 자매 행성 빛 (작은 디스크, 내합 ~55 일 마다) 과 b 에서 (매우 어둡고 멀음). 야간 구름-top 온도 285 K — 광학 열복사에는 너무 차갑지만 중적외 (~10 μm) 에서 밝음.",
  "li_188":"<b>하늘의 별.</b> 61 Vir 가 d 에서 0.108° 차지 — 평균 거리에서 지구에서 본 태양 각 크기의 약 5 분의 1. 근일점에서 ~0.166° 로 커지고 원일점 에서 ~0.080° 로 줄어듦. 구름 데크를 통해 또렷한 디스크가 아닌 흩어진 따뜻한-노란 patch (<span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-인코딩 호스트 색조) 로 보임. 표면 조명은 대기 상단에서 지구의 ~3.6 배 (평균), 근일점의 ~8.6 배부터 원일점의 ~2.0 배까지.",
  "li_189":"<b>하늘의 자매 행성.</b> c (다음 안쪽 0.22 AU) 가 외합 시 각 크기 ~0.05° 로, 내합 시 (55 일마다) ~0.1° 로 등장. b (0.05 AU) 는 훨씬 작고 (최대 elongation 에서 ~0.01°) d 의 시점에서 항상 보이지는 않음. 거의 동일 평면 기하학. 합은 시스템 내부 관측자에게 sky 이벤트.",
  "li_190":"<b>선택적 계절 애니메이션.</b> 궤도 위상과 동기화된 123 일 궤도에 걸친 구름-데크 밝기와 띠 대비의 느린 변조가 이심률 구동 계절 사이클을 충실하게 렌더링해 줌. b 나 c 보다 우선순위 높은 Phase 3.5 시각 디테일. d 의 계절 swing 이 시각적으로 알아챌 정도로 충분히 큼.",
  "h2_191":"Bibliography",
  "h3_192":"Read (visual-informative, drove decisions above)",
  "li_193":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). 발견 논문. d 의 궤도 (P=123.01 d, a=0.476 AU, e=0.35, ω=314°) 와 최소 질량 (Msini = 22.9 ± 2.6 M⊕) 보고. HIRES + AAT 결합 RV 해. Decisions 표의 모든 궤도 + 질량 값이 여기에 묶입니다.",
  "li_194":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발-valley 물리. d 를 손실 경계 한참 바깥에 위치 (XUV 구동 손실이 6 Gyr 에 걸쳐 외피의 ~10⁻³). high 신뢰도로 <code>atmosphere_present = true</code> 의 anchor.",
  "li_195":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). sub-Neptune envelope mass-radius 스케일링. 5–8% H/He 외피 23 M⊕ 에서 R = 4.5–5.5 R⊕. cfg 는 5.0 R⊕ 채택. <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break 의 anchor.",
  "li_196":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>, arXiv:1311.0329). sub-Neptune mass-radius 다양성. H/He 외피 canonical 해석을 지지하고 Hycean / 물-풍부 대안의 경계를 정함.",
  "li_197":"<b>Madhusudhan N. 2012</b> — <i>C/O ratio as a dimension for characterizing exoplanetary atmospheres</i>, ApJ 758, 36 (<code>2012ApJ...758...36M</code>, arXiv:1209.2412). sub-Neptune 원시-외피 조성 baseline. H/He 일차 + 미량 응결 조성을 견인.",
  "li_198":"<b>Madhusudhan N. et al. 2021</b> — <i>Habitability and biosignatures of Hycean worlds</i>, ApJ 918, 1 (<code>2021ApJ...918....1M</code>, arXiv:2108.10888). Hycean 등급 정의. d 의 평균 T_eq 가 Hycean 윈도우의 안쪽 가장자리에 위치. Open-items Hycean variant 를 견인.",
  "li_199":"<b>Moses J. I. et al. 2013</b> — <i>Compositional diversity in the atmospheres of hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). sub-Neptune 광화학. d 의 더 차가운 성층권에서의 CH₄/HCN/광화학-haze 사슬을 정보화.",
  "li_200":"<b>Morley C. V. et al. 2015</b> — <i>Thermal emission and reflected light spectra of super Earths with flat transmission spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). Haze 가 낀 sub-Neptune 검색 프레임워크. c (더 따뜻) 와 d (더 차가움) 사이의 haze 두께 스케일링을 정보화.",
  "li_201":"<b>Lavvas P. &amp; Koskinen T. 2017</b> — <i>Aerosol properties of the atmospheres of extrasolar giant planets</i>, ApJ 847, 32 (<code>2017ApJ...847...32L</code>, arXiv:1707.08077). sub-Neptune 광화학 haze 생성 메커니즘. d 의 더 얇은 haze 층을 지지.",
  "li_202":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric circulation of hot Jupiters: coupled radiative-dynamical GCM</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). 조석 영향을 받는 가스 행성 의 super-rotating 적도 jet 을 확립. d 의 <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> (zonal banding) 를 정보화.",
  "li_203":"<b>Lewis N. K. et al. 2014</b> — <i>GCMs of warm sub-Neptunes</i>, ApJ 795, 150 (<code>2014ApJ...795..150L</code>, arXiv:1410.0008). 차가운 sub-Neptune 영역에 대한 GCM 스케일링. d 의 더 긴 자전 주기에서 pseudo-synchronous spin 과 더 약한 적도-jet 순환을 지지.",
  "li_204":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). 이심 궤도의 pseudo-synchronous spin 평형. e=0.35 의 d 의 spin 상태에 대한 기초 인용.",
  "li_205":"<b>Henning W. G. &amp; Hurford T. 2014</b> — <i>Tidal heating in multilayered terrestrial exoplanets</i>, ApJ 789, 30 (<code>2014ApJ...789...30H</code>, arXiv:1311.5904). sub-Neptune 조석 가열 + spin-lock 시간 스케일. d 의 파라미터에서 ~5–15 Gyr 제공 (시스템 나이 초과).",
  "li_206":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution</i> (<code>2020A&amp;A...644A.165B</code>, arXiv:2002.02015). d 의 조석-가열 flux 스케일링 제공 (0.005–0.05 W/m²).",
  "li_207":"<b>Lewis J. S. 1969</b> — <i>The clouds of Jupiter and the NH₃-H₂O and NH₃-H₂S systems</i>, Icarus 10, 365. sub-Neptune 구름 응결 시퀀스에 대한 기초 열화학. d 의 T_eq 에서 H₂O / NH₃ / NH₄SH 층화 제공.",
  "h3_208":"Read (context / methodology, not decision-driving)",
  "li_209":"<b>Rathsam A. et al. 2023</b> — <i>Lithium depletion in solar analogs</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589). 호스트 합성에서 상속. 61 Vir 의 Phase 2 나이 앵커 (5.50 +0.78/-0.74 Gyr). 광증발 진화 시간 스케일을 결정.",
  "li_210":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters V</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360). 호스트 합성에서 상속. L = 0.8222 ± 0.0033 L☉ 가 d 의 이심 궤도 일사 유도의 앵커.",
  "li_211":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs</i> (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 호스트 합성에서 상속. 활동도-나이 6.1 ± 1.7 Gyr — Rathsam 2023 isochrone 에 대한 교차 확인으로 강등 (호스트 합성에서 documented divergence).",
  "li_212":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). 반지름 valley 인구. d 의 23 M⊕ 인구에 대한 H/He 외피 canonical 해석을 지지.",
  "li_213":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i> (<code>2012MNRAS.424.1206W</code>, arXiv:1206.2370). 호스트 합성에서 상속. 간략 히 인용. 30 AU 의 차가운 debris 고리는 0.48 AU 의 d 와 동역학적으로 상호작용하지 않음 (d 는 고리 안쪽 가장자리 한참 안에 위치).",
  "li_214":"<b>Kreidberg L. et al. 2014</b> — <i>Clouds in the atmosphere of the super-Earth exoplanet GJ 1214 b</i>, Nature 505, 69 (<code>2014Natur.505...69K</code>, arXiv:1401.0022). featureless sub-Neptune 투과 스펙트럼 참조. d 의 파라미터에서의 전역 구름 덮임 기대를 정보화.",
  "h3_215":"Read (instrument-only, not visual-informative)",
  "li_216":"<b>Marcy G. W. et al. 2014</b> — Kepler 슈퍼지구 통계 맥락.",
  "h3_217":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_218":"d 특정 arXiv 기록은 작습니다. 읽지 않은 집합은 주로 다음과 같습니다.",
  "li_219":"<b>Vogt 2010 시스템의 동역학 안정성 follow-up.</b> d 의 e=0.35 는 세-행성 사슬에서 가장 동역학적으로 활성 요소이지만, 시스템은 Vogt 2010 의 해 안에서 안정.",
  "li_220":"<b>트랜짓 탐색 non-detection.</b> d 가 트랜짓하지 않음을 확인. e=0.35, a=0.48 AU 에서 d 의 기하학적 트랜짓 확률은 ~0.6% 이므로 non-detection 은 무작위 경사와 일관.",
  "li_221":"<b>61 Vir 특정 항성풍 모델 없이 일반 광증발율 계산.</b>",
  "h2_222":"Open items for follow-up",
  "li_223":"<b>직접 영상에서의 진질량과 반지름.</b> d 의 질량은 Msini 전용이고 반지름은 mass-radius 스케일링 추정치. 미래의 직접 영상 캠페인이 반사광 검출에서 진질량 + 반지름을 산출. HabEx / LUVOIR 시대 관측. d 는 호스트로부터 가장 큰 각 분리 (최대 elongation 에서 ~57 mas) 때문에 직접 영상에 가장 유리한 61 Vir 행성.",
  "li_224":"<b>Cfg variant. Hycean / 물-세계 외피.</b> d 의 평균 T_eq ~ 351 K (Madhusudhan 2021 Hycean 윈도우의 안쪽 가장자리에 가까움) 에서 얇은 H₂ 대기를 가진 물-풍부 외피는 H/He 일차 외피와 관측적으로 일관. e=0.35 궤도가 d 를 근일점에서 T_eq ~ 476 K (1 bar 의 액체 물 안정 한계 한참 위) 까지 데려가, Hycean 해석을 불리하게 만들지만 배제하지는 않음. cfg variant 는 d 를 더 밀도 높고 덜 haze 가 낀, 더 깊은-청 ocean- 세계 디스크로 렌더링하며 근일점에서 촉발되는 주기적 폭풍을 가짐. Phase 3.5 대안으로 명시.",
  "li_225":"<b>Cfg variant. 암석 외피-없음 대안.</b> 광증발 물리가 외피 보유를 강하게 선호하지만 (6 Gyr 에 걸쳐 손실 &lt; 0.1%), 순수 암석 23 M⊕ 행성 (R ≈ 2.7 R⊕. 밀도 ~6.5 g/cc) 의 작은 잔여 확률 남아 있음. 렌더는 더 차가운 암석 세계 — haze 덮인 canonical 해석과 시각적으로 구분. cfg variant 로 보존.",
  "li_226":"<b>Cfg variant. 더 강한 계절 폭풍 시스템.</b> d 의 e=0.35 가 61 Vir 시스템 최대인 4.3× 일사 변조를 구동. d 특정 이심률에 표적된 GCM 시뮬레이션이 이것이 정적 구름-띠 렌더링 너머의 추가 시각 디테일을 요구하는 일시적 폭풍 feature (사이클론, 적도 overshooting) 를 구동 하는지 제약 가능. Phase 3.5 정밀화.",
  "li_227":"<b>미래 직접 영상 분광.</b> d 가 트랜짓하지 않지만 미래의 직접-영상 분광이 구름-top 조성을 분해할 수 있음. 정밀화 기회. H₂O/CH₄/NH₃ 풍부도, haze 광학 깊이, 더 깊은 구름 조성 (물-얼음 vs NH₃-얼음 vs NH₄SH).",
  "li_228":"<b>대기 탈출율 교차 점검.</b> Owen &amp; Wu 2017 일반 스케일링이 d 를 이미 무시 가능한 손실로 위치시킴. 61 Vir 특정 항성풍 + XUV 모델 (Vidotto 스타일) 이 외피-보유 결론의 정성적 의미를 바꾸지 않으면서 확인.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
