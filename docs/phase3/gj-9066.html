  "h2_82":"Surface synthesis",
  "p_83":"GJ 9066 has the deep red photosphere typical of a mid-M dwarf. At Teff = 3100 K (Cifuentes 2020) the SED peaks in the near-infrared near ~0.93 μm, and the optical continuum is heavily suppressed by TiO and VO molecular bands below ~0.7 μm — though not as totally strangled as the cooler M7 V Teegarden&#x27;s Star (2904 K). The spectroscopic Teff determinations run a little warmer than the SED value — Passegger 2019 gives 3154 ± 54 K and Schweitzer 2019 gives 3193 ± 51 K — but the ~90 K spread is sub-perceptible in the rendered tint. With R = 0.1646 R☉ (Schweitzer 2019) and L = 0.00254 L☉ the star is roughly 1/394 of the Sun&#x27;s luminosity, far too faint to see by eye (V ≈ 12.4) despite its 14.6-light-year proximity.",
  "p_84":"Unlike the directly-resolved CHARA radius of Barnard&#x27;s Star, the GJ 9066 radius is an SED quantity: at R = 0.1646 R☉ and 4.470 pc the limb-darkened angular diameter is only ~0.34 mas, below the ground-based interferometric floor, so Schweitzer 2019 closed Stefan-Boltzmann from the bolometric luminosity and Teff rather than measuring the disk. No metallicity is curated in the Phase 2 layer and none is synthesized here; the literature [Fe/H] values scatter (Passegger 2019 −0.13, Marfil 2021 −0.25) and at fixed Teff the metallicity effect on the rendered M-dwarf color is sub-perceptible, so project policy skips it.",
  "p_85":"The defining surface property is <b>strong magnetic activity expressed as a fast-rotating, spotted, flaring disk</b> — the opposite extreme from the catalog&#x27;s old quiet dwarfs. The fast 1.96-day rotation (Quirrenbach 2022) drives a vigorous dynamo: the chromospheric Ca II H&amp;K index sits in the active regime (log R&#x27;HK ≈ −4.79 to −4.16 across analyses) and the Hα is strongly and persistently in emission (pEW′ = −1.906 Å; Schöfer 2019). Interestingly the R-band photometric rotational amplitude is small (~3 mmag; Quirrenbach 2022), yet the chromatic RV modulation at 1.96 d is strong, which Quirrenbach interprets as chromospheric activity distributed fairly uniformly in longitude over a &quot;significantly structured photosphere.&quot; For cfg rendering this means a deep-red disk carrying a moderate cool-spot fraction drifting on the fast 1.96-day rotation, punctuated by frequent bright white-light flares — a much livelier surface than Barnard or Teegarden. There is no debris disk: no infrared-excess detection or resolved imaging has been reported, so the star is rendered diskless.",
  "h2_86":"Atmosphere synthesis",
  "p_87":"A main-sequence star has no &quot;atmosphere&quot; in the planetary cfg sense; for a stellar synthesis this section covers the chromosphere, corona, and flares — and for GJ 9066 the activity is the headline.",
  "p_88":"GJ 9066&#x27;s chromosphere and corona are those of an active mid-M dwarf driven by fast rotation. The chromospheric Ca II H&amp;K index is in the active regime — Astudillo-Defru 2017 gives log R&#x27;HK = −4.79 ± 0.42, Perger 2021 −4.46, Boro Saikia 2018 −4.16 (all via Quirrenbach 2022 Table 1) — and the Hα line is strongly in emission with temporally variable equivalent width (pEW′ = −1.906 Å; Schöfer 2019), the marker of a persistently warm, active chromosphere. The 1.96-day rotation gives a very small Rossby number, placing GJ 9066 near or in the saturated regime of the rotation–activity relation, where fast rotation begets a strong dynamo begets an active corona and chromosphere. This is the dynamical opposite of Barnard&#x27;s 145-day-rotation floor-level quiescence.",
  "p_89":"The defining feature is <b>frequent flaring</b>. GJ 9066 is a UV-Ceti eruptive flare star (the historical reason for its TZ Arietis variable-star designation; Kunkel 1968), and the ASAS-SN monitoring caught white-light flares with amplitude up to ΔV ≈ 0.87 mag (Rodríguez Martínez et al. 2020) — large optical brightenings against the deep-red quiescent continuum. Combined with the persistent Hα emission and the active corona, the picture is of a star that flares often and brightly rather than the rare-event punctuation of the old quiet dwarfs. For cfg purposes the corona/chromosphere layer is &quot;very active with frequent flares,&quot; and the flares are a near-continuous visual feature, not a rare event. No quantitative flare-frequency distribution is in the frozen Phase 2 layer, so the flare rate is left qualitative (flagged in Open items).",
  "p_90":"The activity has a direct bearing on the planet: GJ 9066 c orbits at a = 0.88 AU, far outside any habitable zone but bathed in the time-averaged XUV and frequent flare output of an active M dwarf. Over the star&#x27;s lifetime the cumulative high-energy dose at the planet is far higher than around a quiet dwarf — relevant context for any atmospheric chemistry on the giant or its hypothetical moons.",
  "h2_91":"Rotation &amp; spin synthesis",
  "p_92":"GJ 9066 rotates fast, with a photometric period P_rot = 1.96 ± 0.02 d (Quirrenbach 2022). The period is robustly triple-anchored: the OSN R and V photometry both show a strong 1.96 d peak (with its 2.03 d daily alias), the CARMENES RVs show a strong chromatic 1.96 d modulation that cannot be a Doppler companion signal, and the Hα and Ca II IRT activity indicators vary at the same period. This supersedes the older ~30 d rotation value (Astudillo-Defru 2017, cited by Feng 2020), which the multi-indicator CARMENES analysis revises decisively. A 1.96-day period is among the fastest in the M-dwarf catalog — the dynamical opposite of the very old slow rotators Barnard (145 d) and Teegarden (96 d).",
  "p_93":"This fast rotation is the engine of the star&#x27;s activity: at such a small Rossby number the rotation–activity relation predicts exactly the active-regime chromospheric and coronal emission observed. The young-ish age implied (no younger than the Hyades, ~750 Myr; Quirrenbach 2022) is consistent with a star that has not yet had time to magnetically brake to slow rotation. There is no measured activity cycle.",
  "p_94":"<b>KSP implementation note.</b> Stellar rotation period = 1.96 d = 169 344 s. In Kopernicus the star body&#x27;s <code>rotationPeriod</code> is set in seconds; unlike the slow old dwarfs, this fast rotation is short enough that a NearStars time-lapse could show visible rotation of the spotted disk over in-game hours.",
  "p_95":"The projected rotational velocity is only weakly constrained: Reiners 2018 sets v sin i &lt; 2 km/s (via Quirrenbach 2022), while the fast 1.96 d rotation at R = 0.1646 R☉ implies an equatorial velocity of ~4.3 km/s. The two are reconciled either by a low rotation-axis inclination (sin i small, the system seen relatively pole-on) or by the &lt; 2 km/s being a conservative upper limit at CARMENES resolution; the cfg records v sin i as an upper limit rather than a measurement. No asteroseismic constraint is available — GJ 9066 is far too cool and small for detectable p-mode oscillations. The rotation-axis inclination is otherwise unconstrained; for visual rendering NearStars adopts a generic axis orientation, though here — unlike the near-stationary old dwarfs — the fast spin does make the spotted-disk rotation a visible animated feature.",
  "h2_96":"Visual styling",
  "p_97":"In the NearStars renderer, GJ 9066 is portrayed as a pale warm orange M4.5 V flare star whose signature is its activity rather than its modest photosphere:",
  "li_98":"<b>Global appearance.</b> A pale warm orange disk encoded as <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>, the real integrated-SED color close to the 3100 K blackbody; the TiO/VO bands shift the displayed chromaticity only modestly. It is essentially the same hue as the M4.5 V YZ Cet (<span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>, identical Teff) and nearly flat against the M4 V Barnard&#x27;s Star (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>), all within the pale-warm-orange family. The illumination color temperature for scene lighting of the planet is driven directly by the 3100 K SED.",
  "li_99":"<b>Spotted surface.</b> A moderate cool-spot fraction (<code>visual_spot_coverage_max ≈ 0.15</code>) drifting on the fast 1.96-day rotation. The photometric amplitude is small, but the strong RV modulation implies a structured photosphere — rendered as slowly-evolving dark spot groups that rotate visibly across the disk on the short period.",
  "li_100":"<b>Flares (the headline).</b> Frequent bright white-light flares — a UV-Ceti eruptive variable with flares reaching ΔV ≈ 0.87 mag (Rodríguez Martínez 2020). Rendered as recurrent, prominent transient brightenings of the deep-red disk: this is a genuinely flaring star, the active opposite of the quiescent old dwarfs Barnard and Teegarden, and the flaring should read as a near-continuous feature.",
  "li_101":"<b>Nightside / corona.</b> A persistently warm chromosphere and active corona (strong Hα emission) support a faint chromospheric/coronal glow at the limb, brightening during flare events.",
  "li_102":"<b>Star in the planet&#x27;s sky.</b> From GJ 9066 c (a = 0.88 AU) the star subtends only ~0.10° — about 1/5 the Sun&#x27;s angular size from Earth — swinging between ~0.18° at periastron (0.475 AU) and ~0.068° at apoastron (1.285 AU) over the eccentric orbit. The disk is a small, deep red-orange, frequently-flaring point that floods the giant in faint infrared-rich light.",
  "li_103":"<b>From Earth.</b> GJ 9066 is a V ≈ 12.4 telescopic object, invisible to the naked eye despite its 14.6-light-year proximity, because of the tiny 0.00254 L☉ luminosity.",
  "h2_104":"Bibliography",
  "h3_105":"Read (drove Decisions above)",
  "li_106":"<b>Quirrenbach A. et al. 2022</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two saturnian planets orbiting active stars</i>, A&amp;A 663, A48 (<code>2022A&amp;A...663A..48Q</code>, doi:10.1051/0004-6361/202142915, arXiv:2203.16504). <b>Primary anchor.</b> Source for the Phase 2 recommended rotation period (1.96 ± 0.02 d, OSN R+V photometry + chromatic RV + Hα/Ca II IRT modulation), the planet c orbit (P = 771.36 d, e = 0.46, a = 0.88 AU, ω = 321.79°, M sin i = 0.21 M_Jup), and the host parameter table (M, R, L from Schweitzer 2019; Teff = 3154 K from Passegger 2019; activity indices). Refutes the Feng 2020 &quot;GJ 9066 b&quot; 242-day signal as a rotation/activity artifact. Also the white-light-flare and Hα-active classification context.",
  "li_107":"<b>Cifuentes C. et al. 2020</b> — <i>CARMENES input catalogue of M dwarfs. Photometric and astrometric properties</i>, A&amp;A 642, A115 (<code>2020A&amp;A...642A.115C</code>, doi:10.1051/0004-6361/202038295, arXiv:2007.15077). Phase 2 recommended source for the effective temperature (3100 K, 20-band SED fitting; VizieR J/A+A/642/A115, key Karmn J02002+130) and an alternative luminosity (0.002519 L☉) and radius (0.174 R☉).",
  "li_108":"<b>Schweitzer A. et al. 2019</b> — <i>The CARMENES search for exoplanets around M dwarfs. Different roads to radii and masses of the target stars</i>, A&amp;A 625, A68 (<code>2019A&amp;A...625A..68S</code>, doi:10.1051/0004-6361/201834965, arXiv:1904.06860). Phase 2 recommended source for the mass (0.1478 ± 0.0036 M☉, M–Mks + SED radius), radius (0.1646 ± 0.0053 R☉, Stefan-Boltzmann from L and Teff), and luminosity (0.00254 ± 0.00002 L☉, bolometric flux). The values adopted (rounded) in Quirrenbach 2022 Table 1.",
  "h3_109":"Read (context / methodology, not decision-driving)",
  "li_110":"<b>Feng F. et al. 2020</b> — <i>Search for Nearby Earth Analogs. III.  Detection of ten new planets, three planet candidates, and confirmation of three planets around eleven nearby M dwarfs</i>, ApJS 250, 29 (<code>2020ApJS..250...29F</code>, doi:10.3847/1538-4365/abb139, arXiv:2008.07998). The original RV discovery (Lick-Carnegie + HARPS + CARMENES) of the GJ 9066 system, proposing both &quot;GJ 9066 b&quot; (242 d, 30.9 M⊕) and &quot;GJ 9066 c&quot; (768 d, 71.6 M⊕). The &quot;c&quot; designation is retained for the surviving giant; &quot;b&quot; was refuted by Quirrenbach 2022. Source of the spectral-type M4.5 V label and the alternative planet c orbit/mass (recommended:false in the DB).",
  "h3_111":"Read (instrument-only, not visual-informative)",
  "li_112":"<b>Shan Y. et al. 2024</b> — <i>The CARMENES search for exoplanets around M dwarfs. Rotation periods in the guaranteed-time observation sample</i> (<code>2024A&amp;A...684A...9S</code>, arXiv:2401.09550). The CARMENES rotation-period catalog narratively flags TZ Ari as the lone RV-discovered planet host with P_rot &lt; 15 d; the per-star tabulated value lives in VizieR/CDS, not the fetched ar5iv body, so the rotation Decisions row traces to Quirrenbach 2022, not this catalog.",
  "h3_113":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_114":"The activity-index and rotation alternatives cited inside Quirrenbach 2022 Table 1 — Passegger 2019 (Teff, [Fe/H]), Marfil 2021 ([Fe/H]), Astudillo-Defru 2017 (log R&#x27;HK, superseded ~30 d rotation), Perger 2021 and Boro Saikia 2018 (log R&#x27;HK), Schöfer 2019 (Hα pEW′), Rodríguez Martínez 2020 (ASAS-SN flares), Kunkel 1968 (flare-star discovery) — are read for the activity and parameter rows via the Quirrenbach 2022 compilation but carry no separate cfg-decisive content beyond the values already used above. The full filtered bibliography is preserved in <code>docs/phase3/_bib/gj-9066.yaml</code>.",
  "h2_115":"Open items for follow-up",
  "li_116":"<b>Planet Phase 3 synthesis.</b> The single confirmed planet GJ 9066 c (warm, e = 0.46, M sin i ≈ 0.21 M_Jup sub-Saturn at 0.88 AU) is produced as a separate Phase 3 doc (<code>gj-9066-c.md</code>). The refuted Feng 2020 &quot;GJ 9066 b&quot; (242 d) should be recorded as refuted, mirroring the tau Cet e / 40 Eri A b treatment.",
  "li_117":"<b>Flare-rate quantification.</b> The UV-Ceti classification and the ASAS-SN ΔV ≈ 0.87 flare are qualitative; TZ Ari was not observed by TESS in cycles 1–4 (Quirrenbach 2022). A dedicated TESS / ground flare census would let a future cfg attach a quantitative <code>flare_rate_per_day</code> and <code>flare_energy_log_erg_max</code> to the rendering.",
  "li_118":"<b>Spot-coverage filling factor.</b> No measured cool-spot filling factor exists; the <code>visual_spot_coverage_max ≈ 0.15</code> is a tie-break. A Zeeman-Doppler-Imaging map or a TESS amplitude census would replace it.",
  "li_119":"<b>Rotation-axis inclination / v sin i tension.</b> The Reiners 2018 v sin i &lt; 2 km/s upper limit sits below the ~4.3 km/s equatorial velocity implied by the 1.96 d rotation and 0.1646 R☉ radius, hinting at a low rotation-axis inclination. A measured inclination would both resolve this and (via the RV M sin i) bound the planet&#x27;s true mass.",
  "li_120":"<b>Age.</b> No Phase 2 age array. If a future curation adds a gyrochronology or kinematic age, the low-confidence &quot;&gt; ~750 Myr&quot; context bound should be replaced.",

  ko: {
  "p_1":"GJ 9066 (= TZ Arietis = GJ 83.1 = LHS 11 = Karmn J02002+130; Gaia DR3 76868614540049408) 은 4.470 pc 거리의 M4.5 V 적색왜성으로, 알려진 동반성이 없는 단독성입니다. 태양에 가장 가까운 적색왜성 축에 들지만 (약 14.6 광년), V ≈ 12.4 (Gaia G = 10.68) 로 맨눈 가시성에 한참 못 미칩니다. 광학 연속체가 분자 밴드에 크게 억제되고 플럭스 대부분이 근적외선으로 나오기 때문입니다. 기본 파라미터는 frozen Phase 2 레이어에서, CARMENES 서베이로부터 가져옵니다. 유효온도 Teff = 3100 K (Cifuentes et al. 2020, SED fitting. 독립적인 분광 측정은 3154 ± 54 K, Passegger 2019, 와 3193 ± 51 K, Schweitzer 2019, 에 모임), 광도 L = 0.00254 ± 0.00002 L☉ (Schweitzer et al. 2019, bolometric flux), 반지름 R = 0.1646 ± 0.0053 R☉ 와 질량 M = 0.1478 ± 0.0036 M☉ (둘 다 Schweitzer et al. 2019) 입니다. 태양 광도의 약 1/394 에 불과하여 카탈로그에서 가장 어두운 호스트 축에 들며, 색조는 깊은 붉은빛입니다.",
  "p_2":"NearStars 에서 GJ 9066 을 규정하는 것은 이 별이 <b>매우 활동적인 빠른 자전 flare star</b> 라는 점입니다 — 늙고 조용한 바너드, 티가든과 정반대입니다. 자전은 단 P_rot = 1.96 ± 0.02 d (Quirrenbach et al. 2022, OSN R + V 측광 + 색채 RV + Hα / Ca II IRT 선 변조) 로, 카탈로그 에서 가장 빠르게 자전하는 호스트 축에 듭니다. 그리고 바로 flare 를 내기 때문에 역사적 변광성 명칭 TZ Arietis 를 달고 있습니다. BY-Dra 형 흑점 자전체이자 UV-Cet 형 폭발 flare star 로, 강하고 지속적인 Hα 방출 (pEW′ = −1.906 ± 0.025 Å, Schöfer et al. 2019) 과 ASAS-SN 광도곡선에서 ΔV ≈ 0.87 mag 에 이르는 백색광 flare (Rodríguez Martínez et al. 2020) 를 보입니다. 이 조합 — 빠른 자전, 강한 dynamo, 잦은 붉은 flare 하늘 — 이 시각적 개성을 정합니다.",
  "p_3":"GJ 9066 은 확인된 행성 하나, <b>GJ 9066 c</b> 를 거느립니다. 따뜻하고 강하게 이심성이 큰 (e = 0.46) sub-Saturn 질량 거대행성으로, a = 0.88 AU 에 있습니다 (M sin i ≈ 0.21 M_Jup ≈ 67 M⊕; Quirrenbach et al. 2022). 0.3 M☉ 아래 호스트 주위에서 알려진 몇 안 되는 거대행성 중 하나입니다. Feng et al. 2020 의 두 번째 후보 (&quot;GJ 9066 b&quot;, P ≈ 242 d) 는 Quirrenbach 2022 에 의해 자전/활동 아티팩트로 <b>반증</b> 되었으며 행성으로 취급하지 않습니다. 이 행성은 자체 Phase 3 합성 (<code>gj-9066-c.md</code>) 에서 다룹니다.",
  "p_4":"<b>NearStars 시나리오 선택. 깊은 붉은빛의, 매우 활동적인, 빠르게 자전하는 M4.5 V flare star — 강한 흑점과 잦은 백색광 flare 를 가진 BY-Dra / UV-Cet 형 폭발 변광성 — 로, 따뜻하고 이심성이 큰 sub-Saturn 거대행성 하나를 거느린 모습으로 렌더링합니다.</b> 항성 레이어는 frozen Phase 2 출처 (Cifuentes 2020 의 Teff, Schweitzer 2019 의 광도/반지름/질량, Quirrenbach 2022 의 자전/활동) 위에 정박합니다. 금속도나 나이 배열은 큐레이션되지 않았고, 알려진 circumstellar disk 도 없으며 지어내지 않습니다. tie-break 하나가 3100 K M4.5 V SED 의 시각 표면 색조를 정합니다. 흑점 면적과 flare 율 행은 정량적 filling factor 나 flare 빈도 분포가 Phase 2 레이어에 없어 low/medium confidence 에 자리합니다.",

  "h2_82":"Surface synthesis",
  "p_83":"GJ 9066 은 중간 M 왜성 전형의 깊은 붉은 광구를 가집니다. Teff = 3100 K (Cifuentes 2020) 에서 SED 는 근적외선 ~0.93 μm 에서 정점을 이루며, 광학 연속체는 ~0.7 μm 아래에서 TiO 와 VO 분자 밴드에 크게 억제됩니다 — 더 차가운 M7 V 티가든 별 (2904 K) 만큼 완전히 졸리지는 않지만요. 분광 Teff 측정은 SED 값보다 조금 더 뜨거워서 — Passegger 2019 가 3154 ± 54 K, Schweitzer 2019 가 3193 ± 51 K — ~90 K 폭이지만 렌더 색조에서는 인지할 수 없습니다. R = 0.1646 R☉ (Schweitzer 2019) 과 L = 0.00254 L☉ 에서 별은 태양 광도의 약 1/394 로, 14.6 광년 근접에도 맨눈으로 보기엔 너무 어둡습니다 (V ≈ 12.4).",
  "p_84":"바너드 별의 직접 분해된 CHARA 반지름과 달리, GJ 9066 반지름은 SED 량입니다. R = 0.1646 R☉ 과 4.470 pc 에서 사지 어두워짐 보정 각지름은 겨우 ~0.34 mas 로 지상 간섭계 바닥 아래이므로, Schweitzer 2019 는 원반을 측정하는 대신 bolometric 광도와 Teff 로부터 Stefan-Boltzmann 을 닫았습니다. Phase 2 레이어에 금속도가 큐레이션되지 않았고 여기서도 합성하지 않습니다. 문헌 [Fe/H] 값은 산포하며 (Passegger 2019 −0.13, Marfil 2021 −0.25), 고정 Teff 에서 금속도가 렌더 M-왜성 색에 주는 효과는 인지 불가하므로 프로젝트 정책상 스킵합니다.",
  "p_85":"표면의 결정적 특성은 <b>빠른 자전, 흑점, flare 로 표현되는 강한 자기 활동</b> 입니다 — 카탈로그의 늙고 조용한 왜성들과 정반대 극단입니다. 빠른 1.96 일 자전 (Quirrenbach 2022) 이 활발한 dynamo 를 구동합니다. 색채권 Ca II H&amp;K 지수는 활동 영역에 자리하고 (분석에 따라 log R&#x27;HK ≈ −4.79 ~ −4.16), Hα 는 강하고 지속적으로 방출됩니다 (pEW′ = −1.906 Å; Schöfer 2019). 흥미롭게도 R-band 측광 자전 진폭은 작은데 (~3 mmag; Quirrenbach 2022) 1.96 d 색채 RV 변조는 강한데, Quirrenbach 은 이를 &quot;상당히 구조화된 광구&quot; 위에 경도 방향으로 비교적 균일하게 분포한 색채권 활동으로 해석합니다. cfg 렌더링에서는 이것이 빠른 1.96 일 자전을 따라 떠도는 적당한 cool-spot 면적을 가진 깊은 붉은 디스크, 거기에 잦은 밝은 백색광 flare 가 박히는 모습을 뜻합니다 — 바너드나 티가든보다 훨씬 생동감 있는 표면입니다. debris disk 는 없습니다. 적외선 초과 검출이나 disk 분해 영상이 보고된 바 없어 별은 disk 없이 렌더링됩니다.",
  "h2_86":"Atmosphere synthesis",
  "p_87":"주계열성은 행성 cfg 의미의 &quot;대기&quot; 가 없습니다. 항성 합성에서 이 섹션은 색채권, 코로나, flare 를 다루며 — GJ 9066 의 경우 활동이 헤드라인입니다.",
  "p_88":"GJ 9066 의 색채권과 코로나는 빠른 자전이 구동하는 활동적 중간 M 왜성의 것입니다. 색채권 Ca II H&amp;K 지수는 활동 영역에 있습니다 — Astudillo-Defru 2017 이 log R&#x27;HK = −4.79 ± 0.42, Perger 2021 이 −4.46, Boro Saikia 2018 이 −4.16 (모두 Quirrenbach 2022 Table 1 경유) — 그리고 Hα 선은 가변 등가폭으로 강하게 방출됩니다 (pEW′ = −1.906 Å; Schöfer 2019). 지속적으로 따뜻하고 활동적인 색채권의 표지입니다. 1.96 일 자전은 매우 작은 Rossby number 를 주어, 자전-활동 관계의 포화 영역 근처 또는 안에 GJ 9066 을 놓습니다. 거기서는 빠른 자전이 강한 dynamo 를, 강한 dynamo 가 활동적 코로나와 색채권을 낳습니다. 이는 바너드의 145 일 자전 바닥 수준 정적 상태와 동역학적으로 정반대입니다.",
  "p_89":"규정적 특성은 <b>잦은 flare</b> 입니다. GJ 9066 은 UV-Cet 형 폭발 flare star 이며 (TZ Arietis 변광성 명칭의 역사적 이유; Kunkel 1968), ASAS-SN 모니터링은 진폭 ΔV ≈ 0.87 mag 까지의 백색광 flare 를 포착했습니다 (Rodríguez Martínez et al. 2020) — 깊은 붉은 정적 연속체 위의 큰 광학 밝아짐입니다. 지속적 Hα 방출과 활동적 코로나를 합치면, 늙은 조용한 왜성의 드문 사건 박자 찍기가 아니라 자주 그리고 밝게 flare 를 내는 별의 그림입니다. cfg 측면에서 코로나/색채권 레이어는 &quot;잦은 flare 로 매우 활동적&quot; 이며, flare 는 드문 사건이 아니라 거의 연속적인 시각 피처입니다. 정량적 flare 빈도 분포는 frozen Phase 2 레이어에 없으므로 flare 율은 정성적으로 남깁니다 (Open items 에 표시).",
  "p_90":"활동은 행성에 직접 영향을 줍니다. GJ 9066 c 는 a = 0.88 AU 에서 어떤 거주 가능 영역보다도 한참 밖을 돌지만, 활동적 M 왜성의 시간 평균 XUV 와 잦은 flare 출력에 노출됩니다. 별의 수명에 걸쳐 행성에서의 누적 고에너지 선량은 조용한 왜성 주위보다 훨씬 높습니다 — 거대행성이나 그 가설적 위성의 대기 화학에 관련된 맥락입니다.",
  "h2_91":"Rotation &amp; spin synthesis",
  "p_92":"GJ 9066 은 빠르게 자전하며, 측광 주기 P_rot = 1.96 ± 0.02 d (Quirrenbach 2022) 를 가집니다. 주기는 견고하게 삼중 정박됩니다. OSN R 과 V 측광 둘 다 강한 1.96 d 피크 (2.03 d 일별 alias 와 함께) 를 보이고, CARMENES RV 는 Doppler 동반성 신호일 수 없는 강한 색채 1.96 d 변조를 보이며, Hα 와 Ca II IRT 활동 지표가 같은 주기로 변동합니다. 이는 더 오래된 ~30 d 자전값 (Astudillo-Defru 2017, Feng 2020 인용) 을 대체하며, 다중 지표 CARMENES 분석이 이를 결정적으로 개정합니다. 1.96 일 주기는 M 왜성 카탈로그에서 가장 빠른 축에 듭니다 — 매우 늙은 느린 자전체 바너드 (145 d) 와 티가든 (96 d) 과 동역학적 으로 정반대입니다.",
  "p_93":"이 빠른 자전이 별 활동의 엔진입니다. 그렇게 작은 Rossby number 에서 자전-활동 관계는 관측된 활동 영역 색채권·코로나 방출을 정확히 예측합니다. 함의되는 젊은 듯한 나이 (Hyades, ~750 Myr, 보다 젊지 않음; Quirrenbach 2022) 는 아직 자기 braking 으로 느린 자전까지 spin down 할 시간이 없던 별과 일관됩니다. 측정된 활동 사이클은 없습니다.",
  "p_94":"<b>KSP 구현 노트.</b> 항성 자전 주기 = 1.96 d = 169 344 s. Kopernicus 에서 별 바디의 <code>rotationPeriod</code> 는 초 단위로 설정됩니다. 느린 늙은 왜성과 달리 이 빠른 자전은 충분히 짧아, NearStars 타임랩스가 게임 내 수 시간에 걸쳐 흑점 디스크의 가시적 자전을 보여 줄 수 있습니다.",
  "p_95":"투영 자전 속도는 약하게만 제약됩니다. Reiners 2018 이 v sin i &lt; 2 km/s 를 설정하는 한편 (Quirrenbach 2022 경유), 빠른 1.96 d 자전 × R = 0.1646 R☉ 은 적도 속도 ~4.3 km/s 를 함의합니다. 둘은 낮은 자전축 경사 (sin i 작음, 시스템을 비교적 극에서 봄) 또는 CARMENES 분해능에서 &lt; 2 km/s 가 보수적 상한이라는 것으로 화해됩니다. cfg 는 v sin i 를 측정이 아니라 상한으로 기록합니다. Asteroseismic 제약은 불가능합니다 — GJ 9066 은 검출 가능한 p-mode 진동에 비해 너무 차갑고 작습니다. 자전축 경사는 그밖에 제약되지 않습니다. 시각 렌더링에서 NearStars 는 일반적인 축 방향을 채택하지만, 여기서는 — 거의 정지한 늙은 왜성 과 달리 — 빠른 자전이 흑점 디스크 회전을 가시적 애니메이션 피처로 만듭니다.",
  "h2_96":"Visual styling",
  "p_97":"NearStars 렌더러에서 GJ 9066 은 옅은 따뜻한 주황빛의 M4.5 V flare star 로, 그 signature 가 수수한 광구가 아니라 활동인 모습으로 표현됩니다.",
  "li_98":"<b>전체 모습.</b> <span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code> 으로 인코딩된 옅은 따뜻한 주황 디스크 — 3100 K 흑체에 가까운 실제 적분-SED 색 — 로, TiO/VO 밴드는 표시 색도를 약간만 이동시킵니다. M4.5 V YZ Cet (<span class=\"hex-chip\" style=\"background:#ffd081\"></span><code>#ffd081</code>, 동일 Teff) 과 사실상 같은 색조이고 M4 V 바너드 별 (<span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>) 에 대비해 거의 평평하며, 모두 옅은 따뜻한 주황 계열입니다. 행성의 장면 조명 색온도는 3100 K SED 가 직접 구동합니다.",
  "li_99":"<b>흑점 표면.</b> 빠른 1.96 일 자전을 따라 떠도는 적당한 cool-spot 면적 (<code>visual_spot_coverage_max ≈ 0.15</code>). 측광 진폭은 작지만 강한 RV 변조가 구조화된 광구를 함의 — 짧은 주기에 디스크를 가로질러 가시적으로 회전하는 느리게 진화하는 어두운 흑점 그룹으로 렌더링.",
  "li_100":"<b>flare (헤드라인).</b> 잦은 밝은 백색광 flare — ΔV ≈ 0.87 mag 까지의 flare 를 내는 UV-Cet 형 폭발 변광성 (Rodríguez Martínez 2020). 깊은 붉은 디스크가 반복적으로, 두드러지게 일시적으로 밝아지는 모습으로 렌더링됩니다. 이것은 진짜 flare 하는 별로, 정적인 늙은 왜성 바너드·티가든의 활동적 반대이며, flaring 은 거의 연속적인 피처로 읽혀야 합니다.",
  "li_101":"<b>야면 / 코로나.</b> 지속적으로 따뜻한 색채권과 활동적 코로나 (강한 Hα 방출) 가 림에서 희미한 색채권/코로나 광채를 받쳐 주며, flare 사건 동안 밝아집니다.",
  "li_102":"<b>행성 하늘의 별.</b> GJ 9066 c (a = 0.88 AU) 에서 별은 겨우 ~0.10° 를 차지합니다 — 지구에서 본 태양 각크기의 약 1/5 — 이심 궤도에 걸쳐 근점 (0.475 AU) 에서 ~0.18°, 원점 (1.285 AU) 에서 ~0.068° 로 진동합니다. 디스크는 작고 깊은 적-주황의, 자주 flare 하는 점으로, 거대행성을 희미한 적외선-풍부 빛으로 적십니다.",
  "li_103":"<b>지구에서.</b> GJ 9066 은 V ≈ 12.4 망원경 천체로, 14.6 광년 근접에도 맨눈에 보이지 않습니다. 0.00254 L☉ 의 작은 광도 때문입니다.",
  "h2_104":"Bibliography",
  "h3_105":"Read (drove Decisions above)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
