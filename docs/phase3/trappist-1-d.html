  "h2_178":"Surface synthesis",
  "p_179":"The two innermost TRAPPIST-1 planets, b and c, have JWST emission and transmission data consistent with bare, dark, low-albedo rocky surfaces (Greene 2023, Zieba 2023, referenced extensively in Piaulet 2025). For d, direct emission constraints are not yet published, but the JWST transmission analysis treats a bare-rock scenario as fully consistent with the flat spectrum after stellar contamination is removed (Piaulet 2025 §8). We therefore extend the bare-rock interpretation to d, with the caveat that d sits at a cooler equilibrium temperature than b or c and could plausibly host condensed surface volatiles on its nightside.",
  "p_180":"<b>Color choice.</b> The host star is a 2566 K M8V dwarf — its SED peaks near 1.1 μm with a steep red continuum. Surface reflectance perceived by a human observer is shifted toward red-brown regardless of intrinsic mineral color (Domagal-Goldman 2010 for general M-dwarf surface illumination; not specifically d). For a fresh basaltic surface, the Mercury / Moon mare analog (broadband visible albedo ≈ 0.05–0.12, Hapke-corrected) is the closest Solar System reference. We pick <span class=\"hex-chip\" style=\"background:#2a2018\"></span><code>#2a2018</code> (dark gray-brown) with <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> iron-oxide patch tint.",
  "p_181":"<b>Tidal heating refinement.</b> Dobos 2019 (1902.03867) gives F_int(d) = 0.26 +0.14/-0.21 W/m² with mantle T_eq ≈ 1645 K (above rock solidus, supporting up to 35% melt by volume). The flux is just below the runaway-greenhouse critical value (273 W/m², per the same paper); with Bond albedo ≥ 0.3, d sits in the safe (non-runaway) regime. The cfg&#x27;s current A_B = 0.10 would technically put d into runaway if a substantial volatile reservoir existed — but the JWST-constrained near-airless interpretation (Piaulet 2025) resolves this tension by leaving essentially no water to run away.",
  "p_182":"<b>Iron oxide patches.</b> Photochemistry on long-tidally-locked terrestrial worlds tends to produce surface oxidation in regions accessible to stellar UV, even with extremely thin atmospheres (Turbet 2018 photolysis discussion in the context of dayside surface chemistry). We expect a patchy iron-oxide overlay biased toward the substellar quadrant. This is a low-confidence aesthetic call — no direct reflectance measurement exists.",
  "p_183":"<b>Morphology.</b> Three contributing processes inform the surface texture: (1) the ≲500 Myr magma ocean phase (Piaulet 2025 §8) leaves relict flow / fracture structures, (2) ~8 Gyr of impact accumulation on a tidally-locked surface (cratering biased toward leading hemisphere in the locked frame), and (3) potential induction heating from star-planet magnetic coupling (Grayver 2022, cited in Way 2025) could sustain limited volcanism — but no direct evidence forces this for d specifically. We default to lunar-highlands-density cratering with visible magma-ocean relict features near the dayside terminator (where freeze-front textures might be expected as the magma cooled non-uniformly under tidally-locked irradiation).",
  "h2_184":"Atmosphere synthesis",
  "p_185":"JWST NIRSpec/PRISM transmission spectroscopy over two transits (Piaulet-Ghorayeb 2025) yields a flat spectrum within ±100–150 ppm after stellar contamination correction. This excludes:",
  "li_186":"H₂-rich atmospheres thicker than ~0.01 bar at &gt;3σ (any metallicity ≲100× solar)",
  "li_187":"Cloud-free Titan-like (1.6% CH₄ in N₂), &gt;3σ",
  "li_188":"Archean Earth analogs at 1 bar, &gt;3σ (CH₄ partial pressure)",
  "li_189":"Cloud-free Venus (~92 bar CO₂), &gt;95%",
  "li_190":"Early Mars (1 bar CO₂), &gt;95%",
  "li_191":"Cloud-free modern Earth, &gt;95%",
  "p_192":"The remaining marginally-consistent scenarios (within 2σ):",
  "li_193":"Extremely thin (&lt;0.01 bar) Mars-like CO₂",
  "li_194":"Venus-like with high-altitude sulfuric acid clouds",
  "li_195":"Modern Earth-like with water clouds masking CO₂",
  "li_196":"Water-rich atmosphere where mbar-level stratospheric H₂O ice clouds form at the terminator (Turbet 2023 GCM predicts this for d specifically due to its position interior to the water condensation limit at 0.772 S⊕ — Piaulet 2025 §7.3)",
  "li_197":"Fully airless bare rock",
  "p_198":"For NearStars we adopt a synthesis of the &quot;very thin atmosphere + terminator water-ice clouds&quot; scenario:",
  "li_199":"<b>Pressure</b> at the 3σ JWST ceiling (~1000 Pa = 0.01 bar) rather than the airless extreme. This is the highest atmosphere mass still consistent with JWST data.",
  "li_200":"<b>Composition</b> dominated by N₂ with trace CO₂ and H₂O. CH₄ and NH₃ are excluded by photodissociation (Turbet 2018). H₂ is excluded by formation + escape arguments (Hori &amp; Ogihara 2020 cited in Piaulet 2025 §7.1). CO₂ at trace levels is marginally allowed and supported by outgassing models (Liggins 2021, Salman 2024). H₂O is required for the terminator cloud feature.",
  "li_201":"<b>Terminator clouds</b> as discrete high-altitude water-ice patches, not a full overcast. This matches the GCM prediction (Turbet 2023, Piaulet 2025 §7.3) and provides visual interest distinct from a fully bare planet.",
  "p_202":"<b>Interior-atmosphere coupling.</b> Acuña 2021 (2101.08172) characterizes d&#x27;s hydrosphere as not in global radiative balance (absorbed flux ≈ 33 W/m² below OLR), implying d is gradually cooling. With WMF in the 0.036–0.084 range and Earth-analog radiogenic flux, d&#x27;s volatile inventory could plausibly exist in condensed phases (liquid water or ice Ih) at the surface or in a subsurface layer. This is an alternative scenario to the chosen &quot;thin atmosphere + terminator water-ice clouds&quot; cfg — for the canonical NearStars output, we keep the JWST-constrained interpretation, but the cooling-and-condensing scenario is preserved as a cfg variant.",
  "p_203":"<b>Cloud-resonant aurora.</b> d&#x27;s adopted scenario — terminator H₂O ice clouds at mbar altitudes (Turbet 2023) — gives a unique auroral signature. Stellar-wind precipitation into the thin water-rich atmosphere dissociates H₂O into H and OH radicals, producing OH(A-X) UV emission at 308 nm. Crucially, the high-altitude ice clouds scatter this UV light back to visible wavelengths through Mie scattering, producing a pale cyan-white auroral glow concentrated at the terminator — distinct from Earth&#x27;s polar-cap aurora geometry. The intensity reaches ~200 kR (20× Earth), driven by the M-dwarf&#x27;s high stellar wind flux. For cfg rendering: primary <span class=\"hex-chip\" style=\"background:#b0e0e6\"></span><code>#B0E0E6</code> (pale cyan-white) along the terminator, secondary <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> (green) if local [OI] enhancement; interesting-first tie-break preferred the cloud-resonant visible rendering over the pure-UV alternative, which would be invisible.",
  "p_204":"<b>Sky appearance.</b> With 0.01 bar surface pressure, Rayleigh scattering is essentially absent on the dayside — the sky is near-black at the zenith even at midday, with the M8 star providing intense localized red-orange illumination (~2566 K color temperature). Toward the terminator, the high-altitude water-ice clouds catch oblique stellar light and appear as faint cyan-white streaks against the red-tinted horizon. The nightside sky is uncontaminated and shows the rest of the TRAPPIST-1 planet chain in conjunction (the seven planets are near-coplanar; Agol 2021).",
  "h2_205":"Rotation &amp; spin synthesis",
  "p_206":"The TRAPPIST-1 d system parameters force a strongly synchronous configuration. The orbital eccentricity is small (0.00638; Agol 2021), the obliquity is damped to zero by tidal forces over the system&#x27;s ≳7 Gyr age (Agol 2021 §6.2), and the spin-orbit resonance is most plausibly 1:1 — though Way 2025 notes that 3:2 spin-orbit states are not formally excluded (Correia 2014, Makarov 2018, Revol 2024) and runs two of his GCM simulations under that assumption. For NearStars we adopt the 1:1 case as the default; the 3:2 alternative would be a follow-up cfg variant.",
  "p_207":"<b>KSP implementation note.</b> True 1:1 tidal lock means rotation period = orbital period = 4.0508 days. In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds (349 989 s).",
  "p_208":"<b>No seasons.</b> With obliquity = 0 and effectively no eccentricity-driven libration (insolation variation &lt; 0.4% over an orbit), the substellar point is fixed in the surface frame. Visual ramifications: no day-night cycle for any surface location, no seasonal cap migration, no terminator drift.",
  "p_209":"<b>Magnetic dynamo expectation.</b> d&#x27;s small mass (0.39 M⊕) and slow tidally-locked rotation (4.05 d) make a strong dynamo difficult. RM22 (2203.01065) places sub-Earth-mass tidally-locked planets at ~0.02 × Earth dipole moment, giving ~1 μT surface field at the equator. The 56% induction-heating fraction (Kislyakova 2018) suggests an active liquid layer in d&#x27;s interior, so a weak residual dynamo is plausible. The cfg adopts a low-but-nonzero field — enough to support a faint cloud-resonant aurora at the terminator but not to deflect stellar wind from the bulk of the dayside.",
  "h2_210":"Visual styling",
  "p_211":"Combining the surface and atmosphere decisions:",
  "li_212":"<b>Global color palette.</b> Dark basalt body (<span class=\"hex-chip\" style=\"background:#2a2018\"></span><code>#2a2018</code> primary, <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> accent) seen under intense red-orange stellar light appears as a deep ochre-charcoal world with no green or blue channel. Highest visual contrast is at the terminator where the near-grazing light reveals topographic relief.",
  "li_213":"<b>Dayside.</b> Bright substellar region (~390 K, ~118 °C) with subdued features due to high near-zenith illumination flattening shadows. Iron-oxide patches strongest within ~30° of substellar point.",
  "li_214":"<b>Terminator band.</b> The most photogenic zone. High-altitude water ice clouds catch stellar light and appear as faint cyan-white wisps against the red surface. Substantial topographic shadow contrast.",
  "li_215":"<b>Nightside.</b> Cold (~150 K) and dark; only thermal IR emission, no visible-band features. KSP nightside lighting should be very low ambient — the only light source is starlight reflected from TRAPPIST-1 b, c (rare close conjunctions) or the outer planets.",
  "li_216":"<b>Atmosphere haze.</b> The 0.01 bar atmosphere is barely visible. Add a thin pale silver-blue limb haze (<span class=\"hex-chip\" style=\"background:#a8b0c0\"></span><code>#a8b0c0</code>) maybe 3–5 km thick, only visible against the dark space background at the planet&#x27;s limb.",
  "li_217":"<b>Star in sky.</b> TRAPPIST-1 subtends ~2.85° in d&#x27;s sky (about 5.7× the Sun&#x27;s angular size from Earth). Its color is deeply red-orange (≈2566 K blackbody → CIE chromaticity near <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code>), and the surface brightness is comparable to Mars-from-Mars solar brightness (~1.12 S⊕). At wavelengths beyond 1 μm the star is bright enough to show prominent solar flares (Howard 2023, cited in Piaulet 2025 §1) — for KSP, occasional flare lighting flickers would be a faithful but optional touch.",
  "li_218":"<b>Sister planets in sky.</b> When in inferior conjunction, TRAPPIST-1 c appears at angular size ~0.5° (similar to Earth&#x27;s Moon from Earth&#x27;s surface), TRAPPIST-1 e at ~0.3°. The near-coplanar geometry means these conjunctions are frequent (every few days).",
  "h2_219":"Bibliography",
  "h3_220":"Read (visual-informative, drove decisions above)",
  "li_221":"<b>2502.00132</b> Way 2025 — &quot;TRAPPIST-1 d: Exo-Venus, Exo-Earth or Exo-Dead?&quot; ROCKE-3D 3D GCM suite under 17 boundary-condition variants. Provides the climate-scenario envelope (Arid-Venus through Aquaplanet), surface temperature ranges, and an explicit comparison to Wolf 2017 / Turbet 2018 / Rushby 2020.",
  "li_222":"<b>2508.08416</b> Piaulet-Ghorayeb 2025 — JWST NIRSpec/PRISM transmission spectrum. Definitive observational constraint. Drives the atmosphere scenario choice and the bare-rock surface interpretation.",
  "li_223":"<b>2511.10801</b> Salman 2024 — Atmosphere-interior model with carbon cycle. Constrains outgassing composition as a function of mantle oxygen fugacity and initial water mass fraction. Supports trace-CO₂ + H₂O composition over H₂-rich.",
  "li_224":"<b>1902.03867</b> Dobos 2019 — Maxwell viscoelastic tidal heating model. F_int(d) = 0.26 W/m², mantle T 1645 K (up to 35% melt by volume). Identifies the runaway-greenhouse threshold for d&#x27;s albedo (A_B ≥ 0.3 needed if volatile reservoir present).",
  "li_225":"<b>2101.08172</b> Acuña 2021 — Hydrosphere characterization for the 7 planets. d&#x27;s WMF 3.6–8.4%, atmosphere not in radiative balance (cooling phase). Supports an alternative condensed-volatile scenario.",
  "li_226":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. MHD simulations placing the inner-planet magnetopauses near surface.",
  "li_227":"<b>2203.01065</b> RM22 — Magnetic moments of rocky planets. Sub-Earth-mass tidally-locked dynamo scaling.",
  "li_228":"<b>1910.09871</b> Atri 2019 — Surface-dose tables for stellar proton events.",
  "li_229":"<b>1710.08761</b> Kislyakova 2018 — Induction heating: d receives 56% of radiogenic flux from stellar-wind electromagnetic coupling; supports magma-ocean alternative scenario in d&#x27;s interior.",
  "h3_230":"Read (context / methodology, not decision-driving)",
  "li_231":"<b>1802.02250</b> de Wit 2018 — HST WFC3 atmospheric reconnaissance. Initial constraint on H₂-rich atmospheres (8σ for d). Superseded by Piaulet 2025 but historically the first non-detection.",
  "li_232":"<b>1810.05210</b> Moran 2018 — HST haze/cloud limits with updated masses. Showed metallicity &gt; 60× solar with tropospheric clouds consistent with HST. Superseded by JWST.",
  "li_233":"<b>2103.08600</b> Welbanks 2021 — Aurora retrieval framework. Predicted 10-transit JWST NIRSpec detection feasibility for CO₂-rich or N₂-rich d atmospheres. The Piaulet 2025 observation is the experimental realization of this prediction (with 2 transits, achieving the predicted sensitivity).",
  "li_234":"<b>2206.00028</b> Meadows 2022 — Atmospheric exchange biosignature false-positive (O₂ from d transported to e). Constrains plausible volatile transport mechanisms but not directly visual.",
  "li_235":"<b>2210.02484</b> Hill 2022 — Habitable-zone exoplanet catalog. Lists d as one of three transiting ≤2 R⊕ HZ planets favorable for follow-up alongside LHS 1140 b and K2-3 d. Context only.",
  "li_236":"<b>2304.12490</b> Hardegree-Ullman 2023 — ELT O₂ detectability survey. Estimates 16–55 years of integration to detect Earth-like O₂ on d–g with future ground-based ELTs. Not visual-informative but contextualizes the long-timescale observational future.",
  "h3_237":"Read (instrument-only, not visual-informative)",
  "li_238":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series characterization. Methodology reference for the Piaulet 2025 observation. Used <code>inject-recovery</code> simulations on TRAPPIST-1 d spectra but the planet appears only as a test case.",
  "h3_239":"Not read — no arXiv preprint available (22 papers)",
  "p_240":"These were surfaced by the ADS query but lack arXiv preprints; would require institutional library access or PDF paste. For Phase 3 d, the key papers in this set are:",
  "li_241":"<b>2025epsc.conf..178P</b> Piaulet-Ghorayeb 2025 EPSC abstract — likely a conference summary of the JWST paper already read (2508.08416). Skip.",
  "li_242":"<b>2024absc.conf00561M / 2024ESS.....550004M / 2023PSJ.....4..192M</b> Mullens et al. 2023–2024 — &quot;Feasibility of Detecting Biosignatures in the TRAPPIST-1 System.&quot; Three appearances of the same study at different venues. Likely not visual-informative (biosignature focus). Skip unless atmosphere decision needs review.",
  "li_243":"<b>Confirmation of a Dynamical Model for the TRAPPIST-1 Exoplanetary System</b> (no arXiv) — <i>potentially important for orbital parameters</i>. If this updates Agol 2021&#x27;s dynamics, the orbital decisions above may need revision. <b>Flagged for user paste if accessible.</b>",
  "li_244":"<b>ExoCAM: A Community Climate Modeling Tool</b> (no arXiv) — tool paper, not science. Skip.",
  "li_245":"<b>NIRISS Exploration of the Atmospheric diversity of Transiting exoplanets (NEAT)</b> — GTO program description, no science content. Skip.",
  "li_246":"<b>VizieR Online Data Catalog: NIR transmission spectra of TRAPPIST-1 planets (Zhang 2018)</b> — data catalog, content already in Zhang 2018 paper. Skip.",
  "li_247":"<b>Limits on Clouds and Hazes in the TRAPPIST-1 Planets: insights from the laboratory</b> — likely Moran 2020 lab follow-up to the 2018 paper. <b>Mild interest</b> for haze parameters; not decision-critical given JWST data.",
  "li_248":"<b>Insights into the atmospheres of the TRAPPIST-1 planets from the laboratory and modeling</b> — similar to above. Skip.",
  "li_249":"<b>Characterizing JWST NIRSpec&#x27;s Noise Performance with a Lab-Measured Time Series</b> — instrument, not science. Skip.",
  "li_250":"<b>Prospects for Biosignature Detection with JWST</b> (x2) — predates JWST data. Skip.",
  "li_251":"<b>Experimental Constraints for Improving Terrestrial Exoplanet Photochemical Models</b> — methodology, no specific d constraint. Skip.",
  "li_252":"Remaining ~10 entries: NEAT program / conference summaries.",
  "p_253":"<b>User action requested:</b> If the &quot;Confirmation of a Dynamical Model for the TRAPPIST-1 Exoplanetary System&quot; paper is accessible, please paste — it could refine the orbital parameters table above.",
  "p_254":"---",
  "h2_255":"Open items for follow-up",
  "li_256":"Validate the Bond albedo choice (0.10) against any future emission spectroscopy of d. T-1 b is at 0.0 ± 0.1 (Greene 2023), c is similar; d may differ if it retains any volatile/cloud component.",
  "li_257":"Refine surface tint hex codes when a renderer is available for visual testing under M8V illumination.",
  "li_258":"Cfg variant for 3:2 spin-orbit case (Way 2025 alt scenario) if any KSP/Principia gameplay distinction merits it.",
  "li_259":"Cross-check 0.01 bar atmosphere choice against the Kopernicus PQS+atmosphere interaction model — at this pressure the atmosphere is essentially decorative.",
  "li_260":"The Dobos 2019 albedo tension (A_B ≥ 0.3 needed to avoid runaway if any liquid water present) deserves explicit cfg attention if a future renderer wants to support a &quot;wet d&quot; variant. The canonical cfg sits at A_B = 0.10 under the airless / near-airless interpretation; the wet variant would need A_B ≥ 0.3.",
  "li_261":"The cloud-resonant aurora at the terminator is a unique cfg signature for d. It depends on the H₂O ice cloud altitude being above the auroral precipitation deposition layer — if future observations push the cloud altitude down, the cyan-white glow may need revision.",
  "li_262":"The 25 Sv/yr surface dose places d in Kerbalism&#x27;s &quot;high-radiation&quot; bracket; crew habitation would need shielding equivalent to ~2 m of regolith.",

  "h2_178":"표면 합성",
  "p_179":"TRAPPIST-1 의 가장 안쪽 두 행성 b 와 c 는 JWST emission / transmission 데이터가 어둡고 낮은 albedo 의 맨 암석 표면과 일관(Greene 2023, Zieba 2023, Piaulet 2025 에 광범위하게 인용). d 의 경우 emission 직접 제약은 아직 출판 안 됨이지만, JWST transmission 분석이 stellar contamination 제거 후 flat spectrum 과 완전히 일관된 맨 암석 시나리오로 처리(Piaulet 2025 §8). 따라서 맨 암석 해석을 d 까지 확장하되, d 는 b/c 보다 차가운 평형 온도에 위치해 nightside 에 응결된 표면 volatile 를 가질 가능성도 플로지블 이라는 caveat 동반.",
  "p_180":"<b>색 선택.</b> 호스트 별이 2566 K M8V dwarf — SED 가 1.1 μm 근처에서 peak 이고 가파른 적색 continuum. 인간 관찰자가 인지하는 표면 reflectance 는 본래 광물 색과 무관하게 적갈색으로 이동(Domagal-Goldman 2010 의 일반 M-dwarf 표면 조명; d 에 특화되진 않음). 신선한 basaltic 표면에 대해 Mercury / Moon mare analog (broadband visible albedo ≈ 0.05–0.12, Hapke 보정) 가 가장 가까운 태양계 reference. <span class=\"hex-chip\" style=\"background:#2a2018\"></span><code>#2a2018</code> (어두운 회갈색) 을 primary, <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> 산화철 patch tint 를 accent 로 선택.",
  "p_181":"<b>조석 가열 정교화.</b> Dobos 2019 (1902.03867) 가 Maxwell viscoelastic 모델로 F_int(d) = 0.26 +0.14/-0.21 W/m², mantle T_eq ≈ 1645 K (암석 solidus 위, 부피 기준 최대 35% melt 지지) 제시. 이 flux 는 같은 논문의 runaway-greenhouse 임계값(273 W/m²) 바로 아래; Bond albedo ≥ 0.3 이면 d 는 안전한 (non-runaway) 영역에 위치. 현재 cfg 의 A_B = 0.10 은 substantial volatile 저장고가 있을 경우 기술적으로는 d 를 runaway 로 밀어넣지만 — JWST 로 제약된 near-airless 해석(Piaulet 2025) 이 사실상 runaway 시킬 물이 없다는 점으로 이 긴장을 해소.",
  "p_182":"<b>산화철 patch.</b> 장기 tidally-locked 지구형 세계에서 광화학은 극도로 얇은 대기에서도 stellar UV 가 접근 가능한 영역에 표면 산화를 만드는 경향이 있음(Turbet 2018 의 dayside 표면 화학 맥락의 photolysis 논의). substellar 사분면 쪽으로 편향된 patchy 산화철 overlay 예상. 직접 reflectance 측정 없는 low-confidence 미적 선택.",
  "p_183":"<b>모양.</b> 표면 텍스처에 기여하는 세 과정. (1) ≲500 Myr 마그마 바다 페이즈(Piaulet 2025 §8) 가 relict flow / fracture 구조 남김, (2) tidally- locked 표면에 ~8 Gyr 충돌 누적(locked frame 에서 leading 반구 쪽 cratering 편향), (3) 별-행성 자기 결합으로부터의 induction heating 잠재성(Grayver 2022, Way 2025 에 인용) 으로 제한된 화산 활동 유지 가능 — 다만 d 에 대해서 이를 강제하는 직접 증거 없음. lunar-highlands-density cratering 을 기본값으로 채택, dayside terminator 근처에 visible 마그마 바다 relict feature (tidally-locked 조사 아래 비균일하게 식은 마그마의 freeze-front 텍스처가 예상되는 위치).",
  "h2_184":"대기 합성",
  "p_185":"JWST NIRSpec/PRISM transmission 분광 (transit 2회, Piaulet-Ghorayeb 2025) 이 stellar contamination 보정 후 ±100–150 ppm 내의 flat spectrum 산출. 이로 다음 배제.",
  "li_186":"~0.01 bar 보다 두꺼운 H₂-rich 대기, &gt;3σ (모든 metallicity ≲100× solar)",
  "li_187":"Cloud-free Titan-like (N₂ 안에 1.6% CH₄), &gt;3σ",
  "li_188":"1 bar 의 Archean Earth analog, &gt;3σ (CH₄ partial pressure)",
  "li_189":"Cloud-free Venus (~92 bar CO₂), &gt;95%",
  "li_190":"Early Mars (1 bar CO₂), &gt;95%",
  "li_191":"Cloud-free modern Earth, &gt;95%",
  "p_192":"2σ 내에서 marginally 일관된 남은 시나리오.",
  "li_193":"극도로 얇은 (&lt;0.01 bar) Mars-like CO₂",
  "li_194":"High-altitude 황산 구름이 있는 Venus-like",
  "li_195":"CO₂ 를 가리는 물 구름의 modern Earth-like",
  "li_196":"terminator 에서 mbar-level 성층권 H₂O 얼음 구름이 형성되는 water-rich 대기 (Turbet 2023 GCM 이 d 에 대해 특히 예측 — 0.772 S⊕ 의 water condensation 한계 안쪽 위치 때문, Piaulet 2025 §7.3)",
  "li_197":"완전한 대기 없는 맨 암석",
  "p_198":"NearStars 는 &quot;매우 얇은 대기 + terminator water-ice 구름&quot; 시나리오의 합성을 채택.",
  "li_199":"<b>압력</b> 을 JWST 3σ 상한(~1000 Pa = 0.01 bar) 에 둠. 대기 없음 극단이 아닌, JWST 데이터와 여전히 일관된 가장 두꺼운 대기 질량.",
  "li_200":"<b>조성</b> 은 N₂ 가 지배, 미량 CO₂ 와 H₂O. CH₄ 와 NH₃ 는 광분해로 배제 (Turbet 2018). H₂ 는 형성 + 탈출 논거로 배제 (Hori &amp; Ogihara 2020, Piaulet 2025 §7.1 에 인용). 미량 CO₂ 는 marginally 허용되며 outgassing 모델 지지 (Liggins 2021, Salman 2024). H₂O 는 terminator 구름 feature 에 필요.",
  "li_201":"<b>Terminator 구름</b> 은 full overcast 아닌 discrete high-altitude water-ice patch. GCM 예측(Turbet 2023, Piaulet 2025 §7.3) 과 일치하며 완전한 맨 행성과 구별되는 시각적 흥미 제공.",
  "p_202":"<b>내부-대기 결합.</b> Acuña 2021 (2101.08172) 이 d 의 hydrosphere 를 전역적으로 복사 평형이 아닌 상태로 특성화 (흡수 flux 가 OLR 보다 ≈ 33 W/m² 낮음) — 즉 d 는 점진적으로 냉각 중. WMF 가 0.036–0.084 범위이고 Earth-analog radiogenic flux 라면, d 의 volatile 인벤토리는 표면 또는 subsurface 층에서 응결 상태(액체 물 또는 ice Ih) 로 존재 가능. 선택된 &quot;얇은 대기 + terminator water-ice 구름&quot; cfg 에 대한 대안 시나리오 — canonical NearStars 출력은 JWST 제약 해석 유지하되, cooling-and- condensing 시나리오는 cfg 변형으로 보존.",
  "p_203":"<b>구름 공명 오로라.</b> d 가 채택한 시나리오 — mbar 고도의 터미네이터 H₂O 얼음 구름 (Turbet 2023) — 은 독특한 오로라 시그너처를 만듦. 항성풍 입자가 얇은 물-풍부 대기로 침투하면서 H₂O 를 H 와 OH 라디칼로 해리, OH (A-X) 308 nm UV 발광을 생성. 중요한 점은 고고도 얼음 구름이 이 UV 를 Mie scattering 으로 가시 파장까지 산란시켜 터미네이터에 집중된 옅은 cyan-white 오로라 광채를 만든다는 것 — 지구의 극관 오로라 기하와 구별됨. 강도는 ~200 kR (지구의 20배) 에 도달, M-dwarf 의 강한 항성풍 플럭스가 견인. cfg 렌더링용. 터미네이터를 따라 primary <span class=\"hex-chip\" style=\"background:#b0e0e6\"></span><code>#B0E0E6</code> (옅은 cyan- white), 국지 [OI] 강화 시 secondary <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> (녹색). interesting-first tie-break 가 보이지 않는 순수 UV 대안 대신 cloud-resonant 가시광 렌더링을 선호.",
  "p_204":"<b>하늘 외관.</b> 0.01 bar 표면 압력에서 dayside Rayleigh scattering 은 사실상 부재 — 정오에도 천정 근처는 거의 검고, M8 별이 강렬한 국지 적-오렌지 조명(~2566 K 색온도) 제공. terminator 쪽으로는 high-altitude water-ice 구름이 비스듬한 stellar light 를 받아 적색 hue 의 horizon 에 대비되는 옅은 cyan-white streak 로 나타남. Nightside 하늘은 오염되지 않고, 합(conjunction) 의 나머지 TRAPPIST-1 행성 체인을 보여줌 (7개 행성이 거의 동일 평면; Agol 2021).",
  "h2_205":"자전 &amp; spin 합성",
  "p_206":"TRAPPIST-1 d 시스템 파라미터가 강한 동기 회전 구성을 강제. 궤도 이심률은 작음(0.00638; Agol 2021), 황도 경사각은 시스템 ≳7 Gyr 나이 동안 조석력에 의해 0 으로 damping(Agol 2021 §6.2), 회전-궤도 공명은 가장 그럴듯하게 1:1 — 다만 Way 2025 는 3:2 회전-궤도 상태가 공식적으로 배제되지 않음을 지적(Correia 2014, Makarov 2018, Revol 2024) 하고 자신의 GCM 시뮬레이션 두 개를 그 가정 아래 실행. NearStars 는 1:1 케이스를 기본으로 채택; 3:2 대안은 후속 cfg 변형 가능.",
  "p_207":"<b>KSP 구현 노트.</b> 진정한 1:1 조석 고정은 자전 주기 = 궤도 주기 = 4.0508 일. Kopernicus 에서 body 의 <code>rotationPeriod</code> 가 궤도 <code>period</code> 와 같아야 함 (349 989 s).",
  "p_208":"<b>계절 없음.</b> 황도 경사각 = 0, eccentricity-driven libration 사실상 없음 (궤도당 insolation 변동 &lt; 0.4%) → substellar 점이 표면 frame 에서 고정. 시각적 영향. 모든 표면 위치에 day-night 사이클 없음, 계절적 극관 이동 없음, terminator drift 없음.",
  "p_209":"<b>자기 dynamo 기대치.</b> d 의 작은 질량(0.39 M⊕) 과 느린 조석 고정 자전 (4.05 d) 으론 강한 dynamo 가 어려움. RM22 (2203.01065) 가 sub-Earth-mass 조석 고정 행성을 지구 dipole moment 의 ~0.02 배에 위치시키며 적도 표면 자기장은 ~1 μT 수준. Kislyakova 2018 의 56% induction-heating 분율은 d 내부에 활성 액체 층이 존재함을 시사하므로 약한 잔류 dynamo 는 플로지블. cfg 는 낮지만 0 은 아닌 자기장 채택 — 터미네이터에서 옅은 cloud-resonant 오로라를 지지하기엔 충분하나 dayside 의 대부분에서 항성풍을 편향시키기엔 부족한 수준.",
  "h2_210":"비주얼 스타일",
  "p_211":"표면과 대기 결정 결합.",
  "li_212":"<b>전역 색 팔레트.</b> 어두운 basalt body (<span class=\"hex-chip\" style=\"background:#2a2018\"></span><code>#2a2018</code> primary, <span class=\"hex-chip\" style=\"background:#5a3220\"></span><code>#5a3220</code> accent) 가 강렬한 적-오렌지 별빛 아래 → 녹색이나 청색 채널 없는 깊은 ochre-charcoal 세계로 나타남. 가장 높은 시각 대비는 terminator 에서, near-grazing 빛이 지형 기복을 드러냄.",
  "li_213":"<b>Dayside.</b> 밝은 substellar 영역(~390 K, ~118 °C). near-zenith 조명이 그림자를 평탄화하므로 feature 가 흐려짐. 산화철 patch 는 substellar 점에서 ~30° 이내에 가장 강함.",
  "li_214":"<b>Terminator band.</b> 가장 사진발 좋은 영역. high-altitude water ice 구름이 stellar light 를 받아 적색 표면에 대비되는 옅은 cyan-white wisp 로 나타남. 상당한 지형 그림자 대비.",
  "li_215":"<b>Nightside.</b> 차가움(~150 K) 하고 어두움; 열적외 emission 만, visible 대역 feature 없음. KSP nightside 조명은 매우 낮은 ambient 여야 — 유일한 광원은 TRAPPIST-1 b, c(드문 close conjunction) 또는 외행성에서 반사된 starlight.",
  "li_216":"<b>Atmosphere haze.</b> 0.01 bar 대기는 거의 안 보임. 행성 limb 의 어두운 공간 배경에서만 보이는 3–5 km 두께의 옅은 silver-blue limb haze (<span class=\"hex-chip\" style=\"background:#a8b0c0\"></span><code>#a8b0c0</code>) 추가.",
  "li_217":"<b>하늘의 별.</b> TRAPPIST-1 이 d 의 하늘에서 ~2.85° 차지 (지구에서 본 태양 각 크기의 약 5.7배). 색은 깊은 적-오렌지 (≈2566 K blackbody → CIE chromaticity 가 <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code> 근처), 표면 밝기는 Mars-from-Mars 의 태양 밝기 비슷(~1.12 S⊕). 1 μm 이상 파장에서 별이 두드러진 solar flare 를 보일 만큼 밝음(Howard 2023, Piaulet 2025 §1 에 인용) — KSP 에서 가끔 flare 조명 깜빡임이 충실하지만 선택적인 터치.",
  "li_218":"<b>하늘의 자매 행성.</b> Inferior conjunction 시 TRAPPIST-1 c 가 각 크기 ~0.5° (지구 표면에서 본 달과 유사), TRAPPIST-1 e 가 ~0.3°. 거의 동일 평면 geometry 라 conjunction 이 자주(며칠마다) 일어남.",
  "h2_219":"참고 문헌",
  "h3_220":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_221":"<b>2502.00132</b> Way 2025 — &quot;TRAPPIST-1 d: Exo-Venus, Exo-Earth or Exo-Dead?&quot; 17 가지 boundary-condition 변형 아래의 ROCKE-3D 3D GCM 스위트. 기후 시나리오 envelope(Arid-Venus 부터 Aquaplanet), 표면 온도 범위, Wolf 2017 / Turbet 2018 / Rushby 2020 과의 명시적 비교 제공.",
  "li_222":"<b>2508.08416</b> Piaulet-Ghorayeb 2025 — JWST NIRSpec/PRISM transmission 스펙트럼. 결정적 관측 제약. 대기 시나리오 선택과 맨 암석 표면 해석 견인.",
  "li_223":"<b>2511.10801</b> Salman 2024 — 탄소 사이클이 있는 대기-내부 모델. mantle 산소 fugacity 와 초기 물 질량 분율의 함수로 outgassing 조성 제약. H₂-rich 보다 trace-CO₂ + H₂O 조성 지지.",
  "li_224":"<b>1902.03867</b> Dobos 2019 — Maxwell viscoelastic 조석 가열 모델. F_int(d) = 0.26 W/m², mantle T 1645 K (부피 기준 최대 35% melt). d 의 albedo 에 대한 runaway-greenhouse 임계값 식별 (volatile 저장고 존재 시 A_B ≥ 0.3 필요).",
  "li_225":"<b>2101.08172</b> Acuña 2021 — 7개 행성의 hydrosphere 특성화. d 의 WMF 3.6–8.4%, 대기는 복사 평형 아님 (냉각 페이즈). 응결 volatile 대안 시나리오 지지.",
  "li_226":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. 내행성 magnetopause 를 표면 근처에 두는 MHD 시뮬레이션.",
  "li_227":"<b>2203.01065</b> RM22 — 암석 행성의 자기 모멘트. Sub-Earth-mass 조석 고정 dynamo 스케일링.",
  "li_228":"<b>1910.09871</b> Atri 2019 — 항성 양성자 이벤트의 표면 도즈 테이블.",
  "li_229":"<b>1710.08761</b> Kislyakova 2018 — Induction heating. d 가 항성풍의 전자기 결합으로 radiogenic flux 의 56% 를 수령; d 내부 마그마 바다 대안 시나리오 지지.",
  "h3_230":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_231":"<b>1802.02250</b> de Wit 2018 — HST WFC3 대기 정찰. H₂-rich 대기에 대한 초기 제약(d 에 대해 8σ). Piaulet 2025 로 대체되었지만 역사적으로 첫 비검출.",
  "li_232":"<b>1810.05210</b> Moran 2018 — 업데이트된 질량과의 HST 안개/구름 한계. HST 와 일관된 tropospheric 구름과 metallicity &gt; 60× solar 보임. JWST 로 대체.",
  "li_233":"<b>2103.08600</b> Welbanks 2021 — Aurora 검색 프레임워크. CO₂-rich 또는 N₂-rich d 대기에 대한 10-transit JWST NIRSpec 검출 feasibility 예측. Piaulet 2025 관측이 이 예측의 실험적 실현(2 transit 으로 예측된 민감도 달성).",
  "li_234":"<b>2206.00028</b> Meadows 2022 — 대기 교환 biosignature false-positive (d 의 O₂ 가 e 로 운반). 그럴듯한 volatile 운반 메커니즘 제약하지만 직접 시각적 정보 아님.",
  "li_235":"<b>2210.02484</b> Hill 2022 — Habitable-zone exoplanet 카탈로그. d 를 LHS 1140 b 및 K2-3 d 와 함께 후속 관측에 유리한 transiting ≤2 R⊕ HZ 행성 셋 중 하나로 등재. 맥락만.",
  "li_236":"<b>2304.12490</b> Hardegree-Ullman 2023 — ELT O₂ 검출 가능성 서베이. 미래 지상 ELT 로 d–g 의 Earth-like O₂ 검출에 16–55 년 적분 추정. 시각 정보 아니지만 장기 관측 미래 맥락화.",
  "h3_237":"읽음 (instrument-only, 시각 정보 아님)",
  "li_238":"<b>2203.04173</b> Rustamkulov 2022 — JWST NIRSpec lab time-series 특성화. Piaulet 2025 관측의 방법론 reference. TRAPPIST-1 d 스펙트럼에 <code>inject-recovery</code> 시뮬레이션 사용했지만 행성은 test case 로만 등장.",
  "h3_239":"읽지 않음 — arXiv preprint 없음 (22 편)",
  "p_240":"ADS 쿼리로 surfacing 됐지만 arXiv preprint 가 없어 기관 도서관 접근이나 PDF paste 필요. Phase 3 d 의 핵심 논문은.",
  "li_241":"<b>2025epsc.conf..178P</b> Piaulet-Ghorayeb 2025 EPSC abstract — 이미 읽은 JWST 논문(2508.08416) 의 conference 요약일 가능성 높음. Skip.",
  "li_242":"<b>2024absc.conf00561M / 2024ESS.....550004M / 2023PSJ.....4..192M</b> Mullens et al. 2023–2024 — &quot;Feasibility of Detecting Biosignatures in the TRAPPIST-1 System.&quot; 같은 연구의 세 venue 출현. 시각 정보 아닐 가능성(biosignature 초점). 대기 결정 재검토 필요할 때만 확인.",
  "li_243":"<b>Confirmation of a Dynamical Model for the TRAPPIST-1 Exoplanetary System</b> (no arXiv) — <i>궤도 파라미터에 잠재적으로 중요</i>. 이 논문이 Agol 2021 의 dynamics 를 업데이트한다면 위 궤도 결정 수정 필요. <b>접근 가능 시 사용자 paste 요청 flag.</b>",
  "li_244":"<b>ExoCAM: A Community Climate Modeling Tool</b> (no arXiv) — 도구 논문, 과학 아님. Skip.",
  "li_245":"<b>NIRISS Exploration of the Atmospheric diversity of Transiting exoplanets (NEAT)</b> — GTO 프로그램 설명, 과학 콘텐츠 없음. Skip.",
  "li_246":"<b>VizieR Online Data Catalog: NIR transmission spectra of TRAPPIST-1 planets (Zhang 2018)</b> — 데이터 카탈로그, 콘텐츠는 Zhang 2018 논문에 이미 있음. Skip.",
  "li_247":"<b>Limits on Clouds and Hazes in the TRAPPIST-1 Planets: insights from the laboratory</b> — 2018 논문에 대한 Moran 2020 lab follow-up 가능성. haze 파라미터에 <b>약한 관심</b>; JWST 데이터로 결정에 critical 아님.",
  "li_248":"<b>Insights into the atmospheres of the TRAPPIST-1 planets from the laboratory and modeling</b> — 위와 유사. Skip.",
  "li_249":"<b>Characterizing JWST NIRSpec&#x27;s Noise Performance with a Lab-Measured Time Series</b> — 장비, 과학 아님. Skip.",
  "li_250":"<b>Prospects for Biosignature Detection with JWST</b> (x2) — JWST 데이터 이전. Skip.",
  "li_251":"<b>Experimental Constraints for Improving Terrestrial Exoplanet Photochemical Models</b> — 방법론, d 특화 제약 없음. Skip.",
  "li_252":"나머지 ~10 항목. NEAT 프로그램 / conference 요약.",
  "p_253":"<b>사용자 액션 요청.</b> &quot;Confirmation of a Dynamical Model for the TRAPPIST-1 Exoplanetary System&quot; 논문이 접근 가능하면 paste 부탁 — 위 궤도 파라미터 테이블 정교화 가능.",
  "p_254":"---",
  "h2_255":"후속 follow-up 항목",
  "li_256":"d 의 향후 emission 분광에 대해 Bond albedo 선택(0.10) 검증. T-1 b 는 0.0 ± 0.1 (Greene 2023), c 는 유사; d 는 volatile/구름 컴포넌트를 유지하면 다를 수 있음.",
  "li_257":"M8V 조명 아래 시각 테스트용 renderer 가 가능하면 표면 tint hex 코드 정교화.",
  "li_258":"3:2 회전-궤도 케이스 (Way 2025 alt 시나리오) cfg 변형 — KSP/Principia 게임플레이 구분이 정당화하면.",
  "li_259":"Kopernicus PQS+atmosphere 상호작용 모델에 대해 0.01 bar 대기 선택 교차 검증 — 이 압력에서 대기는 본질적으로 장식.",
  "li_260":"Dobos 2019 의 albedo 긴장 (액체 물이 있을 경우 runaway 회피에 A_B ≥ 0.3 필요) 은 미래 renderer 가 &quot;wet d&quot; 변형을 지원하려면 명시적인 cfg 주의 가치 있음. Canonical cfg 는 airless / near-airless 해석 아래 A_B = 0.10; wet 변형은 A_B ≥ 0.3 필요.",
  "li_261":"터미네이터의 cloud-resonant 오로라는 d 의 독특한 cfg 시그너처. H₂O 얼음 구름 고도가 오로라 입자 침전층보다 높다는 가정에 의존하므로, 향후 관측이 구름 고도를 낮춘다면 cyan-white 광채 결정 재검토 필요.",
  "li_262":"25 Sv/yr 표면 도즈는 d 를 Kerbalism 의 &quot;고방사선&quot; 등급에 위치시킴; 유인 거주는 ~2 m regolith 에 상응하는 차폐 필요.",
  "h2_263":"Related",
  "li_264":"<a href=\"trappist-1-c.md\">trappist-1-c</a> — 인접 내측 형제. 둘 다 신뢰도가 낮은 대기 시나리오.",
  "li_265":"<a href=\"trappist-1-e.md\">trappist-1-e</a> — 거주가능역 기준. d 는 HZ 의 안쪽 가장자리에 위치합니다.",
  "li_266":"<a href=\"trappist-1-f.md\">trappist-1-f</a> — 외측 형제. 둘 다 Wolf 2017 / Turbet GCM 에 의존.",
  "li_267":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 스키마와 신뢰도 룰.",
  "li_268":"<a href=\"../reference/mod-reference.md\">mod-reference</a> — 다운스트림 모드.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
