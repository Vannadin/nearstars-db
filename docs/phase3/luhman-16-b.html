  "p_1":"Luhman 16 B (WISE J104915.57−531906.1 B) is the famous one: the first brown dwarf — indeed the first object outside the Solar System — to have its cloud weather mapped across its surface (Crossfield et al. 2014). It is the <b>T0.5</b> secondary of the nearest brown-dwarf binary, 1.9938 ± 0.0004 pc away (Lazorenko &amp; Sahlmann 2018), sitting just on the T side of the L/T transition where the thick silicate clouds of the L dwarfs begin to break up and clear.",
  "p_2":"Like its primary it is deeply substellar — 28.5 M_Jup = 0.0273 M☉ (Lazorenko &amp; Sahlmann 2018), with the lithium test passed (Faherty 2014 detect the 6708 Å Li line at EW 3.8 Å, the first such detection in a T dwarf). Its bolometric luminosity log L/L☉ = −4.71 (≈ 1.9 × 10⁻⁵ L☉) and ~1280 K photosphere are within a whisker of A&#x27;s; the two differ not in brightness but in <b>behaviour</b>. Faherty 2014 find B runs ~50 K warmer in the grain-scattering near-IR windows, which they read as thinner clouds or patchy holes letting us see down to deeper, hotter gas.",

  "h2_54":"Surface synthesis",
  "p_55":"As with A there is no solid surface — the visible globe is the ~1280 K photosphere within an H/He envelope. The chemistry is that of an early T dwarf: broad Na and K resonance absorption still dominating the optical, but with methane now strengthening in the near-IR (Faherty 2014 note stronger CH₄ at 1.15 and 2.2 µm in B than in A) as the atmosphere cools past the transition. The defining difference from A is the cloud state: B&#x27;s silicate/iron decks are fragmenting. Where A is a smooth, uniformly clouded ball, B has thick-cloud regions interleaved with cleared holes that expose deeper, ~50 K hotter gas (Faherty 2014) — the cloud-fragmentation mechanism thought to drive the entire L→T transition.",
  "h2_56":"Atmosphere / cloud layer",
  "p_57":"This is the showpiece. B&#x27;s atmosphere is the best-characterised &quot;weather&quot; of any brown dwarf. The picture from a decade of monitoring: patchy condensate clouds organised into zonal bands by fast atmospheric jets, evolving on a rotation-to-rotation timescale (Gillon 2013&#x27;s light curves change shape from one night to the next). Crossfield 2014&#x27;s Doppler image — the first surface map of a brown dwarf — shows a large dark mid-latitude patch, a brighter near-polar region, and equatorial mottling. Apai 2021 reinterpret the multi-peaked, drifting periodicity as planetary-scale waves and high-speed jets, with a slow ~91 hr modulation possibly from vortex-dominated poles. For an EVE-style treatment B wants two or more cloud layers of differing opacity, organised into latitudinal bands, with bright clearings over a hotter (slightly more orange) deep layer and visible evolution over a few-hour rotation.",
  "h2_58":"Rotation &amp; spin",
  "p_59":"B&#x27;s rotation is well determined, and it is fast: Gillon 2013 measured P = 4.87 ± 0.01 hr from TRAPPIST photometry — the value the cfg adopts. Because the light curve is multi-peaked and epoch-dependent (the jets shift the dominant feature), later campaigns recover slightly different &quot;periods&quot;: Mancini 2015 got 5.1 hr, and Apai 2021&#x27;s TESS analysis a dominant 5.28 hr over ~100 rotations. The true rotation is ~4.9–5.3 hr; 4.87 hr is the canonical precise value. Crossfield 2014&#x27;s v sin i = 26.1 ± 0.2 km/s is consistent with this short period viewed close to equator-on. The fast spin is what makes the weather observable on a single night and is integral to the body&#x27;s character.",
  "h2_60":"Visual styling",
  "p_61":"The base color is blackbody incandescence at 1280 K — a deep red-orange (sRGB hue #FF5600 from <code>cie_color.py</code>), essentially identical to A&#x27;s 1310 K hue. As with A the body is extremely dim, so the rendered tint <span class=\"hex-chip\" style=\"background:#662200\"></span><code>#662200</code> is that hue scaled to a dark ember. The visual distinction between the two is therefore <b>not</b> color but texture: B should carry obvious, evolving banded cloud structure — dark thick-cloud lanes and brighter, slightly warmer (more orange) clearings where the hotter deep gas shows through — turning over on its ~4.9 hr spin. As with A, magenta is not used (a late-T/Y effect, not early-T; see Open items). Illumination color is set to the 1280 K temperature.",

  ko: {
  "p_1":"Luhman 16 B (WISE J104915.57−531906.1 B)는 그 유명한 천체입니다. 갈색왜성으로서, 그리고 사실상 태양계 밖 천체로서 처음으로 표면 전반의 구름 날씨가 매핑된 대상입니다(Crossfield et al. 2014). 이 천체는 가장 가까운 갈색왜성 쌍성의 <b>T0.5</b> 동반성으로 거리는 1.9938 ± 0.0004 pc이며(Lazorenko &amp; Sahlmann 2018), L 왜성의 두꺼운 규산염 구름이 부서지고 걷히기 시작하는 L/T 전이의 T쪽 경계에 막 걸쳐 있습니다.",
  "p_2":"주성과 마찬가지로 깊은 준항성으로 — 28.5 M_Jup = 0.0273 M☉(Lazorenko &amp; Sahlmann 2018) — 리튬 검정을 통과합니다(Faherty 2014이 6708 Å Li선을 EW 3.8 Å로 검출했으며, 이는 T 왜성에서의 첫 검출입니다). 복사광도 log L/L☉ = −4.71 (≈ 1.9 × 10⁻⁵ L☉)과 ~1280 K 광구는 A와 한 끗 차이로, 둘은 밝기가 아니라 <b>거동</b>에서 갈립니다. Faherty 2014은 B가 입자 산란 근적외 창에서 ~50 K 더 뜨겁게 나타난다는 것을 발견했고, 이를 더 얇은 구름이나 군데군데 뚫린 구멍으로 더 깊고 더 뜨거운 가스가 들여다보이는 것으로 해석합니다.",
  "p_3":"그 군데군데 얼룩짐이 이야기의 전부입니다. B가 ~4.9시간마다 자전함에 따라 밝은 구름 구멍과 어두운 두꺼운 구름 영역이 시야로 들고 나면서 밝기가 최대 ~11% (peak-to-peak)까지 출렁입니다(Gillon 2013). Crossfield 2014의 Doppler 지도는 &quot;크고 어두운 중위도 영역, 더 밝은 극 부근 영역, 적도의 얼룩무늬&quot;를 분해해냈고, Apai 2021의 100자전 TESS 광도곡선은 주기가 표류하고 갈라지는 모습을 보였는데, 이는 고정된 점이 아니라 고속 동서(zonal) 제트와 행성 규모 파동의 특징입니다.",
  "p_4":"<b>NearStars 시나리오 선택: 목성만 한 짙은 적색 준항성 구체로, 그 결정적 특징은 역동적이고 띠를 이루며 빠르게 진화하는 구름 날씨입니다 — 조용한 잉걸불 A의 분주한 동반체이며, 이 쌍은 27년 주기의 상호 궤도로 묶여 있습니다.</b> 물리값은 Phase 2 측정치를 따르고, 표면 색조 hex는 1280 K 흑체에서 계산한 tie-break이며, 구름 형태가 관측에 근거한 그 독특한 시각 요소입니다.",

  "h2_54":"표면 합성",
  "p_55":"A와 마찬가지로 고체 표면은 없습니다. 보이는 구체는 H/He 외피 안의 ~1280 K 광구입니다. 화학은 초기 T 왜성의 것으로, 넓은 Na·K 공명 흡수가 여전히 가시광을 지배하지만, 대기가 전이를 지나 식어감에 따라 이제 근적외에서 메탄이 강해지고 있습니다(Faherty 2014은 B가 A보다 1.15·2.2 µm에서 CH₄가 더 강하다고 지적). A와의 결정적 차이는 구름 상태로, B의 규산염/철 층은 조각나고 있습니다. A가 매끄럽고 균일하게 구름 낀 공이라면, B는 두꺼운 구름 영역 사이사이에 더 깊고 ~50 K 더 뜨거운 가스를 드러내는 트인 구멍이 얽혀 있습니다(Faherty 2014) — 이 구름 조각화 메커니즘이 L→T 전이 전체를 추동한다고 여겨집니다.",
  "h2_56":"대기 / 구름층",
  "p_57":"이것이 백미입니다. B의 대기는 어떤 갈색왜성보다도 가장 잘 규명된 &quot;날씨&quot;입니다. 10년간의 모니터링이 그린 그림은 다음과 같습니다. 빠른 대기 제트에 의해 동서 띠로 조직된, 군데군데 뚫린 응결물 구름이 자전 단위 시간 척도로 진화합니다 (Gillon 2013의 광도곡선은 밤마다 모양이 바뀝니다). Crossfield 2014의 Doppler 영상은 — 갈색왜성 최초의 표면 지도 — 크고 어두운 중위도 얼룩, 더 밝은 극 부근 영역, 적도의 얼룩무늬를 보여줍니다. Apai 2021은 여러 봉우리를 갖고 표류하는 주기성을 행성 규모 파동과 고속 제트로 재해석하며, 느린 ~91 hr 변조는 소용돌이가 지배하는 극에서 비롯됐을 가능성을 봅니다. EVE식 처리에서 B에는 불투명도가 서로 다른 둘 이상의 구름층이 위도 띠로 조직되고, 더 뜨거운(살짝 더 주황인) 깊은 층 위로 밝은 트임이 나며, 수 시간의 자전에 걸쳐 눈에 띄게 진화하는 모습이 어울립니다.",
  "h2_58":"자전과 스핀",
  "p_59":"B의 자전은 잘 결정되어 있고, 빠릅니다. Gillon 2013은 TRAPPIST 측광에서 P = 4.87 ± 0.01 hr를 측정했고, cfg는 이 값을 채택합니다. 광도곡선이 여러 봉우리를 갖고 에포크에 따라 달라지기 때문에(제트가 우세 특징을 옮김), 이후 캠페인들은 약간씩 다른 &quot;주기&quot;를 복원합니다. Mancini 2015은 5.1 hr를, Apai 2021의 TESS 분석은 ~100자전에 걸쳐 우세한 5.28 hr를 얻었습니다. 실제 자전은 ~4.9–5.3 hr이며, 4.87 hr가 canonical한 정밀값입니다. Crossfield 2014의 v sin i = 26.1 ± 0.2 km/s는 거의 적도 정면(equator-on)으로 본 이 짧은 주기와 부합합니다. 이 빠른 스핀이야말로 단 하룻밤에 날씨를 관측 가능하게 만드는 요소이며, 이 천체의 성격에 필수적입니다.",
  "h2_60":"시각 스타일",
  "p_61":"기준 색은 1280 K 흑체 백열입니다 — 짙은 적등색(sRGB 색상 #FF5600, <code>cie_color.py</code>)으로, A의 1310 K 색상과 본질적으로 동일합니다. A와 마찬가지로 이 천체는 극도로 어두워, 렌더링 색조 <span class=\"hex-chip\" style=\"background:#662200\"></span><code>#662200</code>은 그 색상을 어두운 잉걸불로 낮춘 값입니다. 따라서 둘의 시각적 구분은 색이 <b>아니라</b> 질감입니다. B는 뚜렷하게 진화하는 띠 구름 구조를 — 어두운 두꺼운 구름 띠와, 더 뜨거운 깊은 가스가 비쳐 보이는 더 밝고 살짝 더 따뜻한(더 주황인) 트임을 — 지녀야 하며, 이것이 ~4.9 hr 스핀에 따라 굴러갑니다. A와 마찬가지로 마젠타는 사용하지 않습니다 (후기 T/Y 효과이지 초기 T가 아닙니다; 후속 확인 항목 참조). 조명 색은 1280 K 온도로 설정합니다.",
  "h2_62":"참고문헌",

  "li_68":"Lazorenko &amp; Sahlmann 2018, A&amp;A 618, A111 (arXiv 1808.07835) — 역학적 질량, 시차.",
  "p_69":"<b>맥락:</b>",

  "h2_73":"후속 확인 항목",
  "li_74":"<b>마젠타 문제.</b> A와 마찬가지로 &quot;갈색왜성은 마젠타&quot;라는 재구성은 후기 T/Y 효과이며(깊은 CH₄ + Na/K가 녹–황색을 깎아냄), T0.5의 B는 전이를 막 지났을 뿐이라 붉은색을 유지합니다. 표시만 하고 채택하지 않습니다.",
  "li_75":"<b>반지름은 측정이 아닌 가정입니다</b>(0.9 R_Jup) — A와 같은 단서.",
  "li_76":"<b>구름 지도는 스냅숏입니다.</b> B의 날씨는 실제로 진화하며, 어떤 고정 구름 질감도 시간 평균일 뿐입니다. 역동적이고 띠를 이루며 빠르게 진화하는 성격이 정적 지도보다 충실한 선택입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
