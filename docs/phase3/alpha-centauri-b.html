  "h2_139":"Stellar disk synthesis",
  "p_140":"Alpha Cen B is the first nearby star where a K-class character is visually obvious. At 5316 K (Porto de Mello 2008) it sits ~500 K cooler than A and ~460 K cooler than the Sun. The disk-integrated chromaticity shifts the perceived color firmly into the warm-yellow zone — RGB ≈ <span class=\"hex-chip\" style=\"background:#ffe9c4\"></span><code>#ffe9c4</code> after CIE-D55 → blackbody mapping. Compared to A&#x27;s <span class=\"hex-chip\" style=\"background:#fff6e0\"></span><code>#fff6e0</code>, B is unambiguously warmer-toned and would be perceived as a &quot;K dwarf&quot; in a side-by-side comparison.",
  "p_141":"<b>Color choice.</b> Blackbody peak at ~545 nm (vs A&#x27;s 496 nm and Sun&#x27;s 502 nm). The B-V color (~0.90, Hipparcos) is similar to other K1 V comparison stars (61 Cyg A: K5 V at B-V = 1.06; 70 Oph A: K0 V at B-V = 0.86). The KSP tint should be visibly distinct from A but not as orange as 61 Cyg A.",
  "p_142":"<b>Angular diameter.</b> Kervella 2017&#x27;s PIONIER measurement gives 5.999 ± 0.025 mas as seen from Earth — about 30% smaller than A&#x27;s 8.502 mas. From a hypothetical Earth-analog around B at the L=0.503 flux-equivalent distance (0.71 AU), the disk would subtend ~0.71°, larger than the Sun&#x27;s 0.53° as seen from Earth and ~33% larger in solid angle (compensating for the lower luminosity at closer orbit).",
  "p_143":"<b>Limb darkening.</b> K-dwarf limb darkening is stronger than solar: edge brightness ~30% of disk-center (vs Sun&#x27;s ~40%). Adopt quadratic (a,b) = (0.35, 0.30). Limb appears slightly redder due to TiO band onset in the cooler upper photosphere (already detectable in B&#x27;s spectrum unlike A or Sun).",
  "p_144":"<b>Granulation.</b> Bigot et al. 2008 derived smaller granulation cells for B than A — consistent with the lower-mass deeper-convection expectation. Cells are ~1.0e-3 arcsec from Earth distance (slightly finer than A&#x27;s 1.3e-3). Visual flicker noise is somewhat larger amplitude (~0.15 magnitude/cell vs Sun&#x27;s 0.10) but on similar ~10-minute timescales.",
  "p_145":"<b>P-mode oscillations.</b> Carrier &amp; Bourban 2003 detect p-modes at envelope peak ~4.1 mHz (period ~4 minutes) with amplitude ~9 cm/s RV. This is higher frequency than A or Sun (consistent with higher surface gravity log g = 4.54 vs A&#x27;s 4.32). p-mode visual impact is sub-percent flickering on minutes timescale; same KSP treatment as A.",
  "p_146":"<b>No ASTERIA-class transits.</b> Knapp 2020 ASTERIA CubeSat transit search and ground-based RV searches (Dumusque 2012, retracted Rajpaul 2015) place strict limits on close-in (Earth-mass at P &lt; 50 d) planets. Phase 3 cfg does not include any B planets, consistent with current observational state.",
  "h2_147":"Activity and variability synthesis",
  "p_148":"Alpha Cen B is the more magnetically active member of the AB pair. Multiple independent monitoring campaigns confirm:",
  "li_149":"<b>Rotation period: 41 ± 3 days</b> (DeWarf et al. 2010 from photometric variability; consistent with v sin i = 1.0 ± 0.5 km/s from spectroscopy via i = 56° inclination assumption). Slower than A due to lower mass — Brun &amp; Browning 2017 dynamo theory predicts K-dwarf rotation typically 30–60 d at ~5 Gyr age.",
  "li_150":"<b>Magnetic cycle period: ~7 years</b>. First detected by Robrade &amp; Schmitt 2005 in XMM-Newton X-ray fluxes; confirmed in DeWarf 2010 photometry. Notable because it is <i>shorter</i> than the Sun&#x27;s 11-year Schwabe cycle despite B being a slower rotator — suggesting that the magnetic dynamo structure is different from the solar Babcock- Leighton picture.",
  "li_151":"<b>log R&#x27;_HK = -4.85</b> (DeWarf et al. 2010 mean over cycle). Moderately active for its rotation rate. Bcoll (longitudinal field strength) ≈ 5–15 G during cycle max (Boro Saikia et al. 2018 ZDI).",
  "li_152":"<b>X-ray luminosity: log L_X ≈ 27.3 erg/s</b> (Robrade &amp; Schmitt 2005). Factor ~2 higher than A in quiescence. The X-ray cycle amplitude is factor 4.5 — modest but well-measured over 2003–2012 monitoring.",
  "p_153":"<b>Spot coverage and visibility.</b> DeWarf 2010 derived peak-to-peak V photometric amplitude ~3% at cycle max, implying ~5% disk-area spot coverage. Spot temperature ~3600 K (umbra) and ~4800 K (penumbra). Visual: at cycle max, 3–5 dark spot groups distributed across mid-latitude (±15–40°), each ~8° angular diameter. The strong limb darkening + spot contrast makes B noticeably &quot;freckled&quot; when imaged at high resolution at cycle max.",
  "p_154":"<b>Flare rate.</b> Ayres 2014 derived modest flare rate from FUV/UV monitoring — log-amplitude distribution flatter than A, with ~10× higher rate for M-class equivalent flares. No superflares confirmed in the multi-decade baseline. K1 V old stars are generally moderate flare emitters compared to younger or fully convective M dwarfs.",
  "p_155":"<b>Coronal heating.</b> Robrade &amp; Schmitt 2005 derived T_corona ~ 2-3 MK at cycle max, ~1-1.5 MK at min — the same range as the Sun but shifted slightly. The hot loops are concentrated near magnetic network boundaries, similar to solar coronal hole geometry but denser.",
  "p_156":"<b>Magnetic geometry.</b> Boro Saikia et al. 2018 Zeeman Doppler imaging shows a predominantly dipole-dominant magnetic geometry at cycle min, transitioning to multipole-dominant at cycle max — a solar-like behavior but condensed into the 7-year cycle. The dipole tilt is ~30° from rotation axis.",
  "h2_157":"System geometry synthesis",
  "p_158":"The AB binary mutual visibility from B&#x27;s frame is the mirror image of A&#x27;s:",
  "li_159":"B orbits A at 23.5 AU semi-major axis with e = 0.5179.",
  "li_160":"From B&#x27;s surface, A appears as a brilliant variable star ranging from V ≈ -22 (apastron, but as a near-point source at 0.022° ang diameter) to V ≈ -24 (periastron, 0.066° ang diameter).",
  "li_161":"The illumination from A at B&#x27;s HZ-equivalent orbit (~0.71 AU around B) varies by factor (35.7/11.4)² = 9.8× over the binary orbital period, providing seasonal-like climate forcing.",
  "p_162":"<b>From a hypothetical Earth-analog around B</b> (0.71 AU, where the classical HZ would put it): the sun-in-sky is Alpha B at apparent diameter ~0.71° (33% larger angular size than Sun-from-Earth) but 1× luminosity (matched to L=0.503 at 0.71 AU). The chromaticity is the warm-yellow K1 V we adopted.",
  "p_163":"A&#x27;s flux at this orbit varies between:",
  "li_164":"Apastron: A is at 36.0 - 0.71 ≈ 35.3 AU from B-Earth → flux is 1.52 / 35.3² ≈ 0.0012 L_eff (vs 1.0 from B itself). Magnitude ~-19.5 (~2× full-Moon brightness).",
  "li_165":"Periastron: A at 11.4 - 0.71 ≈ 10.7 AU → flux 0.013 L_eff. Magnitude ~-22 (~30× full-Moon brightness, casts visible shadows).",
  "p_166":"Day vs night around B-Earth becomes dramatic: during the periastron phase, when A is in the night sky, it provides night-time illumination ~30× full-Moon — bright enough for surface activity without artificial lighting.",
  "p_167":"<b>Proxima visibility.</b> From B&#x27;s surface, Proxima is at the same apparent magnitude ~+5 and ~2° from A.",
  "p_168":"<b>No planets confirmed around B.</b> Dumusque et al. 2012 reported Alpha Cen Bb at P = 3.236 d, K = 0.51 m/s, but this was rebutted by Rajpaul et al. 2015 (the Gaussian-process activity model showed the signal was a sampling artifact). The Rajpaul retraction is one of the cleanest examples of why high-precision RV M-dwarf planet detection requires explicit activity modeling. As of 2026 no confirmed planets exist around B.",
  "h2_169":"Visual styling",
  "li_170":"<b>Global appearance.</b> A warm-yellow K1 V disk, unambiguously cooler/yellower than A or Sol. The observer would describe it as &quot;amber&quot; or &quot;warm cream&quot; — not orange yet, but visibly past the pure-white solar appearance.",
  "li_171":"<b>Dayside illumination of orbiting bodies.</b> Color temperature ~5290 K — atmospheric scattering on Earth-analog bodies produces slightly warmer sky tones than under solar illumination (sky perhaps <span class=\"hex-chip\" style=\"background:#a0c0e0\"></span><code>#a0c0e0</code> instead of pure <span class=\"hex-chip\" style=\"background:#87ceeb\"></span><code>#87ceeb</code>), with sunsets/sunrises exaggerated in red-orange.",
  "li_172":"<b>Disk brightness profile.</b> Stronger limb darkening than A; edge appears ~30% as bright as disk-center, with slight redward shift.",
  "li_173":"<b>Spot visibility.</b> At cycle max, 3–5 sunspot groups distributed across the visible hemisphere, each ~5–8° angular diameter, ~1700 K cooler than photosphere. KSP-equivalent: procedural dark patches that wax and wane over a 7-year cycle, visible as freckles on the rendered disk.",
  "li_174":"<b>Companion A.</b> Always present in the sky from any B orbit. At apastron, A is a brilliant ~0.02° disk; at periastron, ~0.07° disk subtly resolved (A has 1.42× B&#x27;s surface brightness due to higher Teff). Provides spectacular variable nighttime illumination over the 79.91-yr orbit.",
  "li_175":"<b>Proxima Cen.</b> Magnitude ~+5 point source ~2° from A. Unremarkable visually.",
  "li_176":"<b>Spectral lines.</b> Same dominant lines as A but with additional TiO bands developing in red wavelengths. H-α absorption is deeper (cooler photosphere), Ca II H/K cores show stronger emission reversal during cycle maxima.",
  "h2_177":"Bibliography",
  "h3_178":"Read (visual-informative, drove decisions above)",
  "li_179":"<b>2017A&amp;A...597A.137K</b> Kervella et al. 2017 — VLTI/PIONIER interferometric radius (5.999 ± 0.025 mas; R = 0.8632 ± 0.0037 R☉) and bolometric luminosity (0.503 ± 0.007 L☉).",
  "li_180":"<b>2008A&amp;A...488..653P</b> Porto de Mello et al. 2008 — Differential high-resolution spectroscopic Teff (5316 ± 28 K) and [Fe/H] (+0.25 ± 0.04). Pair-with-A measurement.",
  "li_181":"<b>2010ApJ...722..343D</b> DeWarf et al. 2010 — 7-yr photometric + Ca II H&amp;K monitoring. Rotation period 41 ± 3 d, partial activity cycle, log R&#x27;_HK = -4.85.",
  "li_182":"<b>2016A&amp;A...586A..90P</b> Pourbaix &amp; Boffin 2016 — Dynamical mass 0.9373 ± 0.0033 M☉.",
  "li_183":"<b>2006A&amp;A...446..635B</b> Bigot et al. 2006 — VLTI/VINCI Alpha B interferometry, granulation noise constraint. R = 0.863 ± 0.005 R☉ (precursor to Kervella 2017).",
  "li_184":"<b>2018ApJ...864...99J</b> Joyce &amp; Chaboyer 2018 — System age 4.81 ± 0.50 Gyr; coeval with A. Independent mass M_B = 0.934 ± 0.0061 M☉ via MESA + asteroseismology.",
  "li_185":"<b>2003A&amp;A...404.1087K</b> Kervella et al. 2003 — VLTI/VINCI early interferometry. Precursor measurement consistent with later Kervella 2017.",
  "li_186":"<b>1009.1652 (2010ApJ...717.1279A)</b> Ayres 2010 — X-ray, FUV, UV multi-wavelength monitoring of B, including activity cycle phase evolution. Provides cycle amplitude factor 4.5 used in cfg.",
  "li_187":"<b>1202.1265</b> Carrier &amp; Bourban 2003 — HARPS asteroseismic p-mode detection. Confirms log g = 4.54 ± 0.02; p-mode envelope at 4.1 mHz.",
  "li_188":"<b>1401.2211</b> Heller &amp; Armstrong 2014 — &quot;Superhabitability&quot; of K-dwarf worlds. Context for what makes B&#x27;s HZ planets interesting beyond just being habitable.",
  "h3_189":"Read (context / methodology, not decision-driving)",
  "li_190":"<b>0811.0673</b> Quintana 2002 — Planet formation in B&#x27;s HZ. Shows HZ planets are dynamically possible despite the AB perturbation.",
  "li_191":"<b>1009.1652</b> Robrade &amp; Schmitt 2012 — Continued X-ray monitoring to 2010, extends Robrade &amp; Schmitt 2005&#x27;s cycle detection.",
  "li_192":"<b>1506.07304</b> Rajpaul et al. 2015 — Gaussian-process activity model for RV time series. Methodology paper that retracts Dumusque 2012&#x27;s Alpha Cen Bb claim. Important context for null result on planets around B.",
  "li_193":"<b>1902.10711</b> Coffinet et al. 2019 — HARPS activity and telluric contamination of Alpha B observations. Relevant for the Dumusque/ Rajpaul controversy.",
  "li_194":"<b>1805.00929</b> Morel 2018 — Chemical composition of AB revisited. Independent confirmation of [Fe/H] = +0.24 and detailed individual element abundances. Cross-validates Porto de Mello 2008.",
  "li_195":"<b>1711.06320</b> Zhao et al. 2018 — Planet detectability around AB with various instruments. Context for current RV/transit limits.",
  "li_196":"<b>2211.11756</b> Foster et al. 2022 — Optical SETI search.",
  "h3_197":"Read (instrument-only, not visual-informative)",
  "li_198":"<b>2405.13247</b> Pasquini et al. 2024 — Deep learning for RV detection. Methodology.",
  "li_199":"&quot;Going to Alpha Centauri B and setting up a Radio Bridge&quot; — speculative interstellar communication paper. Not science.",
  "h3_200":"Not read — no arXiv preprint available (78 papers)",
  "p_201":"The bulk consist of pre-2010 references and conference summaries. Key not-read examples:",
  "li_202":"&quot;Fe II fluorescence in main-sequence K-dwarfs&quot; — likely Ayres pre-2008 paper. Skipped.",
  "li_203":"Multiple AAS abstracts and IAU symposium proceedings summarizing results in read papers.",
  "li_204":"ASTERIA CubeSat dissertation (Knapp 2020) — null transit search, cited for context but not visual-informative.",
  "p_205":"<b>User action requested.</b> If newer ZDI magnetic-imaging campaigns on Alpha B come online (e.g., expected SPIRou or NIRPS results 2026+), the spot-coverage and dipole tilt numbers may need revision.",
  "p_206":"---",
  "h2_207":"Open items for follow-up",
  "li_208":"The 7-year activity cycle timing is constrained by Robrade &amp; Schmitt 2012 to phase but the period uncertainty is ~1.5 yr. Additional cycles need to be tracked through 2030 for tighter period.",
  "li_209":"Spot temperature offset (-1700 K vs photosphere) is a K-dwarf-generic value, not measured directly for B. TESS or CHEOPS multi-color photometry could constrain.",
  "li_210":"Dipole tilt (~30°) from Boro Saikia 2018 ZDI is single-epoch; cycle-resolved magnetic mapping is in progress (NIRPS/SPIRou).",
  "li_211":"No confirmed planets, but RV upper limits (M sin i &lt; 4 M⊕ at P &lt; 50 d, Rajpaul 2015) leave room for a small companion. Phase 3 cfg should be revised if ESPRESSO long-baseline detects something.",
  "li_212":"The Knapp 2020 ASTERIA null transit result excludes Earth-radius planets at P &lt; 28 d at high confidence; no planet inventory decisions hinge on this.",
  "li_213":"The historical Bb retraction shapes how user-facing documentation should describe B&#x27;s planet inventory — explicitly &quot;no confirmed planets&quot; rather than just blank.",

  "td_138":"LIC, 무시 가능 reddening",
  "h2_139":"Stellar disk synthesis",
  "p_140":"Alpha Cen B 는 K-class 특성이 시각적으로 명확한 첫 근거리 별. 5316 K (Porto de Mello 2008) 는 A 보다 ~500 K 차갑고 태양보다 ~460 K 차가움. 디스크 적분 색도는 인지된 색을 warm-yellow 영역으로 확고히 이동 — CIE-D55 → 흑체 매핑 후 RGB ≈ <span class=\"hex-chip\" style=\"background:#ffe9c4\"></span><code>#ffe9c4</code>. A 의 <span class=\"hex-chip\" style=\"background:#fff6e0\"></span><code>#fff6e0</code> 와 비교하면 B 는 분명히 더 따뜻한 톤이고, 나란히 비교하면 &quot;K dwarf&quot; 로 인지됨.",
  "p_141":"<b>색 선택.</b> 흑체 피크 ~545 nm (vs A 의 496 nm, 태양의 502 nm). B-V 색 (~0.90, Hipparcos) 은 다른 K1 V 비교별과 유사 (61 Cyg A. K5 V at B-V = 1.06; 70 Oph A. K0 V at B-V = 0.86). KSP 색조는 A 와 시각적으로 다르되 61 Cyg A 만큼 주황이지 않게.",
  "p_142":"<b>시직경.</b> Kervella 2017 의 PIONIER 측정으로 지구 기준 5.999 ± 0.025 mas — A 의 8.502 mas 보다 약 30% 작음. B 주위 L=0.503 플럭스 등가 거리 (0.71 AU) 의 가상 지구 analog 에서 디스크는 ~0.71° 시직경, 지구에서 보는 태양의 0.53° 보다 크고 solid angle 기준 ~33% 더 큼 (closer orbit 에서 낮은 광도를 보상).",
  "p_143":"<b>Limb darkening.</b> K-dwarf limb darkening 은 태양보다 강함. 가장자리 밝기는 디스크 중심의 ~30% (태양 ~40%). Quadratic (a,b) = (0.35, 0.30) 채택. 더 차가운 상부 광구의 TiO band onset 으로 가장자리가 약간 더 적색 (A 나 태양과 달리 B 의 스펙트럼에서 이미 검출 가능).",
  "p_144":"<b>입상.</b> Bigot et al. 2008 은 B 가 A 보다 작은 입상 셀을 가짐을 도출 — 낮은 질량 깊은 대류 기대와 일관. 셀은 지구 거리에서 ~1.0e-3 arcsec (A 의 1.3e-3 보다 약간 더 미세). 시각 깜빡임 노이즈는 다소 큰 진폭 (~0.15 magnitude/cell vs 태양의 0.10) 이지만 유사한 ~10분 시간 척도.",
  "p_145":"<b>P-mode 진동.</b> Carrier &amp; Bourban 2003 이 envelope peak ~4.1 mHz (주기 ~4 분), 진폭 ~9 cm/s RV 의 p-mode 검출. A 나 태양보다 높은 주파수 (높은 표면 중력 log g = 4.54 vs A 의 4.32 와 일관). p-mode 시각 영향은 분 단위 sub-percent 깜빡임; A 와 동일한 KSP 처리.",
  "p_146":"<b>ASTERIA-class 통과 없음.</b> Knapp 2020 ASTERIA CubeSat 통과 탐색과 지상 RV 탐색 (Dumusque 2012, Rajpaul 2015 철회) 은 가까운 (P &lt; 50 d 에서 Earth-mass) 행성에 엄격한 한계 부여. Phase 3 cfg 는 현 관측 상태와 일관되게 B 행성 미포함.",
  "h2_147":"Activity and variability synthesis",
  "p_148":"Alpha Cen B 는 AB 쌍의 더 자기적으로 활동적인 멤버. 여러 독립 모니터링 캠페인이 확인.",
  "li_149":"<b>자전주기. 41 ± 3 일</b> (DeWarf et al. 2010 측광 변광에서; 분광 v sin i = 1.0 ± 0.5 km/s 와 i = 56° 기울기 가정으로 일관). A 보다 낮은 질량으로 인해 더 느림 — Brun &amp; Browning 2017 다이나모 이론은 K-dwarf 자전이 ~5 Gyr 나이에 보통 30–60 d 라 예측.",
  "li_150":"<b>자기 사이클 주기. ~7 년</b>. Robrade &amp; Schmitt 2005 가 XMM-Newton X-ray 플럭스에서 첫 검출; DeWarf 2010 측광에서 확인. 주목할 점은 자전이 더 느림에도 태양의 11년 Schwabe 사이클보다 <i>짧다</i>는 것 — 자기 다이나모 구조가 태양 Babcock-Leighton 그림과 다름을 시사.",
  "li_151":"<b>log R&#x27;_HK = -4.85</b> (DeWarf et al. 2010 사이클 평균). 자전 속도 대비 적당히 활동적. Bcoll (longitudinal field strength) ≈ 사이클 극대기 동안 5–15 G (Boro Saikia et al. 2018 ZDI).",
  "li_152":"<b>X-ray 광도. log L_X ≈ 27.3 erg/s</b> (Robrade &amp; Schmitt 2005). 평온 상태에서 A 보다 factor ~2 높음. X-ray 사이클 진폭은 factor 4.5 — 적당하나 2003–2012 모니터링에서 잘 측정.",
  "p_153":"<b>흑점 점유와 가시성.</b> DeWarf 2010 은 사이클 극대기에 peak-to-peak V 측광 진폭 ~3% 를 도출, ~5% 디스크 면적 흑점 점유 의미. 흑점 온도 ~3600 K (umbra), ~4800 K (penumbra). 시각. 극대기에 ±15–40° 중위도에 3–5개 어두운 흑점 그룹 분포, 각각 ~8° 시직경. 강한 limb darkening + 흑점 contrast 가 결합되어 극대기 고분해 이미징 시 B 는 눈에 띄게 &quot;주근깨가 있는&quot; 모습.",
  "p_154":"<b>Flare rate.</b> Ayres 2014 가 FUV/UV 모니터링에서 적당한 flare rate 도출 — log-진폭 분포가 A 보다 평평하며 M-class 등가 flare 의 rate 는 ~10× 높음. 다년간 baseline 에서 superflare 확인 없음. K1 V 노년 별은 대개 더 젊거나 완전 대류인 M dwarf 와 비교해서 적당한 flare emitter.",
  "p_155":"<b>Corona 가열.</b> Robrade &amp; Schmitt 2005 는 T_corona ~ 2-3 MK at 사이클 극대, ~1-1.5 MK at 극소 — 태양과 같은 범위지만 약간 이동. 뜨거운 loop 는 자기 네트워크 경계 근처에 집중, 태양 coronal hole 기하와 유사하나 더 조밀.",
  "p_156":"<b>자기 기하.</b> Boro Saikia et al. 2018 의 Zeeman Doppler 이미징은 사이클 극소기에 dipole-dominant 자기 기하, 극대기에 multipole-dominant 로 전이 — 태양형 행동이나 7년 사이클로 응축. dipole 기울기는 자전축 기준 ~30°.",
  "h2_157":"System geometry synthesis",
  "p_158":"B 프레임에서의 AB 쌍성 상호 가시성은 A 의 거울 이미지.",
  "li_159":"B 는 A 를 23.5 AU 장반경 e = 0.5179 로 공전.",
  "li_160":"B 표면에서 A 는 apastron 에서 V ≈ -22 (그러나 0.022° 시직경의 점광원에 가까움) ~ periastron 에서 V ≈ -24 (0.066° 시직경) 의 찬란한 변광 별.",
  "li_161":"B 의 HZ 등가 궤도 (B 주위 ~0.71 AU) 에서 A 의 플럭스는 쌍성 궤도 주기에 걸쳐 factor (35.7/11.4)² = 9.8× 변하여 계절형 기후 forcing 제공.",
  "p_162":"<b>B 주위 가상 지구 analog</b> (0.71 AU, 고전 HZ) 의 경우. 하늘의 태양은 Alpha B 가 시직경 ~0.71° (지구 태양보다 33% 큰 시직경) 이지만 0.71 AU 에서 L=0.503 매칭으로 1× 광도. 색도는 채택된 warm-yellow K1 V.",
  "p_163":"이 궤도에서 A 플럭스는 다음 사이에서 변동.",
  "li_164":"Apastron. A 는 B-지구에서 36.0 - 0.71 ≈ 35.3 AU → 플럭스는 1.52 / 35.3² ≈ 0.0012 L_eff (B 자체 1.0 대비). Magnitude ~-19.5 (~2× 보름달 밝기).",
  "li_165":"Periastron. A 는 B-지구에서 11.4 - 0.71 ≈ 10.7 AU → 플럭스 0.013 L_eff. Magnitude ~-22 (~30× 보름달 밝기, 가시 그림자 생성).",
  "p_166":"B-지구 주변의 낮-밤이 극적이 됨. periastron 단계 동안 A 가 밤하늘에 있을 때 ~30× 보름달의 야간 조명 제공 — 인공 조명 없이 표면 활동 가능한 밝기.",
  "p_167":"<b>Proxima 가시성.</b> B 표면에서 Proxima 는 동일한 시각 등급 ~+5, A 에서 ~2°.",
  "p_168":"<b>B 주위 확인 행성 없음.</b> Dumusque et al. 2012 가 P = 3.236 d, K = 0.51 m/s 의 Alpha Cen Bb 를 보고했으나 Rajpaul et al. 2015 가 반박 (Gaussian-process 활동 모델이 그 신호가 sampling artifact 임을 보여줌). Rajpaul 철회는 고정밀 RV M-dwarf 행성 검출이 명시적 활동 모델링을 요구하는 대표 사례. 2026 기준 B 주위 확인 행성 없음.",
  "h2_169":"Visual styling",
  "li_170":"<b>전체 모습.</b> warm-yellow K1 V 디스크, A 나 Sol 보다 분명히 더 차갑고/노랑. 관찰자는 &quot;amber&quot; 또는 &quot;warm cream&quot; 으로 묘사 — 아직 주황이지 않지만 순수 백색 태양 외관을 넘어선 모습.",
  "li_171":"<b>궤도체에 대한 dayside 조명.</b> 색온도 ~5290 K — 지구 analog 의 대기 산란이 태양 조명보다 약간 더 따뜻한 하늘 톤 (하늘은 순수 <span class=\"hex-chip\" style=\"background:#87ceeb\"></span><code>#87ceeb</code> 대신 <span class=\"hex-chip\" style=\"background:#a0c0e0\"></span><code>#a0c0e0</code> 정도), 일몰/일출이 적-주황 과장.",
  "li_172":"<b>디스크 밝기 프로파일.</b> A 보다 강한 limb darkening; 가장자리가 중심 대비 ~30% 밝기, 약간 적색 편이.",
  "li_173":"<b>흑점 가시성.</b> 사이클 극대기에 가시 반구 전반에 3–5개 흑점 그룹 분포, 각각 ~5–8° 시직경, 광구보다 ~1700 K 차가움. KSP 등가. 7년 사이클로 대형/소형 절차적 어두운 패치, 렌더링된 디스크에 주근깨로 가시.",
  "li_174":"<b>동반성 A.</b> B 의 어느 궤도에서나 늘 하늘에 존재. apastron 에서 A 는 찬란한 ~0.02° 디스크, periastron 에서 ~0.07° 디스크 미세 분해 (A 가 높은 Teff 로 B 의 1.42× 표면 밝기). 79.91-yr 궤도에 걸쳐 장관의 변광 야간 조명 제공.",
  "li_175":"<b>Proxima Cen.</b> A 에서 ~2° 의 ~+5 등급 점광원. 시각적으로 평범.",
  "li_176":"<b>분광선.</b> A 와 동일한 우세선이되 적색 파장에서 추가 TiO 밴드 발달. H-α 흡수는 더 깊음 (차가운 광구), Ca II H/K core 는 사이클 극대기 동안 더 강한 emission reversal 표시.",
  "h2_177":"Bibliography",

  "li_203":"다수 AAS abstract 및 IAU 심포지엄 proceedings 가 이미 읽은 paper 결과 요약.",
  "li_204":"ASTERIA CubeSat 학위논문 (Knapp 2020) — null 통과 탐색, 컨텍스트로만 인용; 시각 정보 없음.",
  "p_205":"<b>사용자 액션 요청.</b> Alpha B 에 대한 새로운 ZDI 자기 이미징 캠페인이 온라인되면 (예. 예상되는 SPIRou 또는 NIRPS 결과 2026+), 흑점 점유와 dipole 기울기 숫자 수정이 필요할 수 있습니다.",
  "p_206":"---",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
