  "p_1":"α Centauri B (HD 128621, HIP 71681, GJ 559 B) is the K1V secondary of the nearest stellar binary. Roughly two-thirds the mass and luminosity of its G2V companion α Cen A, B is a quiet, slightly metal-rich K-dwarf with the longest baseline of high-precision radial-velocity monitoring of any K star — a legacy of the planet hunt that culminated in the retracted Dumusque 2012 claim and the subsequent Rajpaul 2016 ruling-out.",

  "h2_79":"Surface synthesis",
  "p_80":"The photosphere of α Centauri B is a textbook quiet K1V — moderately metal-rich (Δ[Fe/H] = +0.25 vs. solar), 5236 K Teff, with 3D hydrodynamic granulation simulations (Bigot 2006, used by Kervella 2017) reproducing the VLTI/PIONIER visibility data better than 1D atmosphere models. The H-band power-law limb-darkening exponent α(B) = 0.1545 ± 0.0044 is slightly stronger than A&#x27;s, consistent with the cooler photosphere and steeper temperature gradient at the surface.",

  "li_101":"<b>Rajpaul V. et al. 2016</b> — <i>Ghost in the time series: no planet for Alpha Cen B</i>, MNRAS 456, L6 (arXiv:1510.05598). Window-function reanalysis of Dumusque 2012; rules out the claimed 3.236-d planet.",
  "li_102":"<b>Plavchan P. et al. 2015</b> — <i>What is the Mass of α Cen B b?</i> (arXiv:1503.01772). Independent re-analysis of Dumusque 2012; reaches the same conclusion.",
  "li_103":"<b>Demory B.-O. et al. 2015</b> — <i>HST search for the transit of the Earth-mass exoplanet α Centauri B b</i>, MNRAS 450, 2043 (arXiv:1503.07528). HST/STIS photometry rules out a transiting Earth-mass planet at the claimed 3.236-d period.",
  "li_104":"<b>Thompson A. P. G. et al. 2017</b> — <i>The changing face of α Centauri B: probing plage and stellar activity in K dwarfs</i>, A&amp;A 596, A21 (arXiv:1702.01647). Plage / spot latitudinal distribution and rotation-axis inclination constraint.",
  "li_105":"<b>Lisogorskyi M. et al. 2019</b> — <i>Activity and telluric contamination in HARPS observations of α Centauri B</i>, MNRAS 485, 4804 (arXiv:1902.10711). Characterizes the 1.5 m/s activity-driven RV jitter that gave rise to the Dumusque 2012 false claim.",

  "li_119":"Conference proceedings, interstellar-propulsion proposals, and SETI searches contribute no cfg-decisive content; preserved in <code>docs/phase3/_bib/alpha-centauri-b.yaml</code> with <code>status: skipped</code>.",
  "h2_120":"Open items for follow-up",
  "li_121":"<b>Independent inclination measurement</b>: Lisogorskyi 2019 and Thompson 2017 give overlapping but loose constraints (i = 30–70°). An asteroseismic rotational splitting analysis or interferometric spot mapping could tighten this.",
  "li_122":"<b>Cycle phase relationship</b>: Robrade 2016 §4 shows that B&#x27;s chromospheric and coronal cycles are ~π/2 out of phase. The cfg currently stores only the chromospheric cycle as the master phase; a coronal-cycle phase offset variant is a future cfg refinement.",

  ko: {
  "p_1":"α Centauri B (HD 128621, HIP 71681, GJ 559 B) 는 가장 가까운 별쌍의 K1V 이차성입니다. 동반자 G2V α Cen A 의 약 3분의 2 질량과 광도를 가진 조용 하고 살짝 금속이 풍부한 K 왜성이며, K 별 가운데서는 가장 긴 고정밀도 RV 모니터링 baseline 을 갖고 있습니다. 이는 Dumusque 2012 주장으로 정점을 찍었다가 이후 Rajpaul 2016 으로 배제된 행성 탐사의 유산입니다.",
  "p_2":"Pourbaix &amp; Boffin 2016 와 Kervella 2017 의 기본 파라미터는 매우 타이트 합니다. M_B = 0.9373 ± 0.0028 M☉, R_B = 0.8632 ± 0.0037 R☉ 두 값 모두 A 와 같은 분광 이중선 + 간섭계 해에서 공유됩니다. 유효 온도는 Porto de Mello 2008 의 5236 ± 51 K 로 K1V locus 의 더운 끝에 자리합니다. 표면 금속도는 +0.25 ± 0.04 로 사실상 A 와 동일하며, 공통 원시성운 형성과 일관됩니다. 시스템 나이 5.3 ± 0.3 Gyr 는 Joyce &amp; Chaboyer 2018 의 결합 asteroseismic + 고전 fit 으로 결정됩니다. 양쪽 별이 각자의 관측 제약을 동시에 만족해야 하기 때문에 구조상 A 와 같은 값입니다.",
  "p_3":"주계열 수명 비율로 따지면 더 나이가 많은데도 α Cen B 는 A 보다 활동적 입니다. log R&#x27;HK = −5.0 (Henry 1996 / DeWarf 2010) 가 K 왜성의 조용함– 활동성 경계에 걸쳐 있으며, 36–40 일 회전 주기 (DeWarf 2010) 는 8.1 년의 느리지만 지속적인 색채권 활동 사이클과 일관됩니다. X 선 광도가 이 주기로 변동하며 (Robrade 2016) 최대점에서 log L_X ≈ 27.5 cgs 에 도달합니다.",
  "p_4":"<b>없었던 행성.</b> Dumusque 외 2012 가 M sin i ≈ 1.13 M⊕ 의 후보 α Cen Bb 를 3.236 일 궤도에서 발표했는데, 이는 당시 RV 로 검출된 가장 낮은 질량 행성이었을 것입니다. Plavchan 2015 가 같은 데이터를 독립적으로 재분석 했지만 주장된 주기에서 유의미한 신호를 재현할 수 없었습니다. Rajpaul 외 2016 (&quot;Ghost in the time series&quot;) 는 Dumusque 신호가 HARPS 의 불규칙 샘플링 cadence 의 window-function artifact 임을 입증했습니다. Demory 2015 (HST 통과 측광) 도 Krishnamurthy 2021 (ASTERIA 통과 탐색) 도 어떤 행성 시그니처도 찾지 못했습니다. 현재 컨센서스는 α Cen B 주위에 확인된 행성이 없다는 것이며, B 의 시각적 HZ (~0.5–0.9 AU, Wang 2022, Heller 2014) 는 향후 탐사를 위한 동역학적으로 안정한 빈 분지로 남아 있습니다.",
  "p_5":"<b>NearStars 시나리오 선택. 조용하고 살짝 금속이 풍부한 K1V 별로 A 보다 긴 활동 사이클을 갖고, 확인된 행성은 없으며, A 의 크림과 구분되는 알아볼 수 있는 따뜻한 오렌지 시각 시그니처를 갖습니다.</b> 16 개 cfg 픽은 모두 canonical-aligned 이며, Dumusque 2012 의 역사는 Decisions 행 <code>has_planet_b: false</code> 와 Open items 에 포착됩니다.",

  "h2_79":"Surface synthesis",
  "p_80":"α Centauri B 의 광구는 교과서적인 조용한 K1V 입니다. 적당히 금속이 풍부 하고 (Δ[Fe/H] = +0.25 vs. 태양), Teff 5236 K 이며, 3D 유체역학 granulation 시뮬레이션 (Bigot 2006, Kervella 2017 가 사용) 이 VLTI/PIONIER 가시도 데이터를 1D 대기 모델보다 더 잘 재현합니다. H 밴드 power-law limb- darkening exponent α(B) = 0.1545 ± 0.0044 는 A 보다 살짝 강한데, 광구가 더 차고 표면 온도 기울기가 더 가파르다는 점과 일관됩니다.",
  "p_81":"8.1 년 활동 사이클 (DeWarf 2010) 동안의 흑점 면적은 A 보다 큽니다. log R&#x27;HK = −5.0 으로 B 는 적당히 활동적인 K 왜성 영역에 들어가며, 사이클 최대기의 활동 영역 면적은 가시 디스크의 ~1–2% 로 추정됩니다. 디스크 통합 HARPS 스펙트럼을 이용한 Thompson 2017 (arXiv:1702.01647) 의 plage 모델 링은 비대칭 위도 분포의 흑점 분포를 찾았으며, 이는 회전축이 ~30° 기울어 졌다는 가설과 일관됩니다. 태양의 ~7° 황도 경사와는 비슷하지만 구분되는 값입니다.",
  "p_82":"표면 granulation 은 A 보다 약간 더 붉고 더 잘게 쪼개져 있습니다. granulation 셀 크기는 압력 스케일 높이로 스케일되며, B 는 ~140 km, A 는 ~180 km 입니다 (Bigot 2006 STAGGER 시뮬레이션). 0.7 AU 의 가상 안쪽-HZ 행성에서 본 가시 디스크는 사이클 최대기에 간헐적인 어두운 흑점과 밝은 faculae 가 점점이 박힌, 살짝 더 채도가 높은 오렌지 limb-darkened 구로 보입니다.",
  "h2_83":"Atmosphere synthesis",
  "p_84":"색채권은 적당히 채워져 있으며, DeWarf 2010 가 12 년의 분광 모니터링에 걸쳐 Ca II H&amp;K 방출 사이클을 매핑했습니다. 전이 영역과 코로나는 8.1 년 사이클에 걸쳐 10 배 변동하는 X 선 방출을 만들어내며 (log L_X = 26.5–27.5 cgs, Robrade 2016), A 의 4 배 변조보다 다소 더 큰 변동성을 보이고 B 의 색채권 사이클로부터 약 π/2 만큼 위상이 어긋나 있습니다 (Robrade 2016 §4).",
  "p_85":"Lisogorskyi 2019 (arXiv:1902.10711) 는 α Cen B 의 활동 유발 RV jitter 를 HARPS 스펙트럼에서 ~1.5 m/s 진폭으로 회전 주기에 특성화했습니다. 처음에 Dumusque 2012 행성 신호로 보였던 잔여 신호입니다. 현대 RV 팀은 α Cen B 를 활동 decorrelation 방법의 벤치마크로 다루며 (Cretignier 2020, Wise 2018, Dumusque 2018), 천문학적 jitter 와 진짜 도플러 시프트를 구별할 목적에서 세계에서 가장 많이 모니터링되는 K1V 별로 만들었습니다.",
  "p_86":"항성풍 질량 손실은 태양의 약 0.6 배이며, X 선 광도와 (Wood 2002 관계) 스케일링됩니다. 코로나 질량 방출은 X 선 모니터링에서 적당한 빈도로 검출되지만, 어떤 광도 캠페인에서도 superflare 사건은 기록되지 않았습니다.",
  "h2_87":"Rotation &amp; spin synthesis",
  "p_88":"38 일 회전 주기 (DeWarf 2010, 범위 36–40 d) 는 K1V 로서는 느리지만 5.3 Gyr 나이와 Skumanich braking 으로 일관됩니다. 회전축 경사는 불확실합니다. Lisogorskyi 2019 가 jitter-진폭 변조를 기반으로 i ~ 30°–70° 를, DeWarf 2010 의 흑점 변조 envelope 가 같은 범위와 일관됨을 보입니다. NearStars 는 α Cen A 방향에서 본 시선축 기준 ~45° 기울어진 축을 채택하며, 이는 제약의 상위 중간 범위에 맞아떨어집니다.",
  "p_89":"B 에서 p-mode 의 asteroseismic 검출은 표면 광도가 낮아 A 보다 더 어렵지 만, Kjeldsen 2005 가 주파수 분리 Δν = 160.1 ± 0.1 μHz, ν_max ≈ 4000 μHz 의 37 개 mode 를 검출했습니다. K1V envelope 의 더 높은 주파수 밀도와 일관됩니다 (Joyce 2018 §2.3). 차등 회전은 직접 분해되지 않았습니다.",
  "h2_90":"Visual styling",
  "p_91":"NearStars 에서 α Cen B 는 <span class=\"hex-chip\" style=\"background:#ffcfa0\"></span><code>#ffcfa0</code> 광구 색조의 따뜻한 오렌지 K1V 로 렌더링되어, A 의 크림과 명확히 구분되며 카탈로그의 다른 K 왜성 (예: ε Eri) 과 시각적으로 비슷합니다. 5236 K 의 별 SED 가 게임 내 조명 엔진에 입력되어, B 의 거주가능영역에 있을 가상 행성에 A 의 태양-백색이 아닌 sunset 오렌지 ambient 조명을 만듭니다.",
  "p_92":"0.7 AU 의 안쪽-HZ 행성 후보에서 보면 B 가 각지름 1.1 arcmin (지구에서 본 태양의 약 두 배) 을 채우며, 눈에 띄게 따뜻한 빛을 비춥니다. ~11-36 AU 분리의 동반자 A 는 원일점에서 V = −5.0, 근일점에서 V = −7.0 까지 변하는 빛나는 점광원입니다 (아직 분해되지 않음). 지구에서 본 금성이 가장 크게 떨어졌을 때보다 약 두 배 밝은 정도이며, 행성 표면에 가시적인 그림자 를 드리울 수 있습니다.",
  "p_93":"흑점, faculae, Ca II plage 는 8.1 년마다 사이클 최대기 동안 적당한 스케일 로 렌더링됩니다. X 선 사이클의 위상 오프셋은 cfg <code>activity_cycle_years</code> 필드가 색채권 위상을 기준으로 처리합니다. Robrade 2016 의 X 선 사이클 위상 오프셋 (색채권 대비 90°) 은 Open items 의 별도 cfg 변형입니다.",
  "h2_94":"Bibliography",
  "h3_95":"Read (visual-informative, drove decisions above)",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
