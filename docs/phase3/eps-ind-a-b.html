  "h2_154":"Surface synthesis",
  "p_155":"ε Indi A b has no solid surface — it is a ~7.6 M_Jup H₂/He super-Jupiter. The &quot;surface&quot; relevant for rendering is the cloud deck, and ε Indi A b&#x27;s deck is the defining science result: a thick water-ice cloud layer reaching τ = 1 near 0.7 bar (Matthews 2026 best fit), sitting over an atmosphere with confirmed ammonia.",
  "p_156":"The temperature regime is the key to the palette. The planet radiates at ~275 K (Matthews 2024/2026), but this is <b>not</b> an insolation temperature — at 20.9 AU around a 0.239 L☉ star the radiative-equilibrium temperature is only ~43 K (derived), and the insolation is ~5.5 × 10⁻⁴ that of Earth. The ~275 K is set by the planet&#x27;s own internal heat: a 7.6 M_Jup giant at ~3.5 Gyr is still slowly contracting and radiating its formation energy, so it glows ~230 K hotter than its surroundings. This makes ε Indi A b a <b>self-luminous cold giant</b>, in the same regime as the cold brown dwarf WISE 0855 (~285 K), which Matthews 2026 found has a near-identical mid-IR color.",
  "p_157":"At ~275 K the condensation chemistry is dominated by water ice and ammonia rather than the silicate/iron clouds of hot giants. Ammonia is confirmed in the gas phase (Matthews 2026), and the preferred explanation for its anomalously shallow feature is that thick water-ice clouds blanket the atmosphere and suppress it. The cfg therefore renders ε Indi A b as a <b>muted, pale methane/ammonia-class giant</b> — water-ice and ammonia clouds are intrinsically near-white with a faint cold-blue cast, and under the warm K5 V (4700 K) illumination the perceived hue settles to a neutral pale off-white (<span class=\"hex-chip\" style=\"background:#dfe2dc\"></span><code>#dfe2dc</code> cloud, <span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code> limb). This is deliberately distinct from the warm cream-amber of a solar-illuminated Jupiter or of a younger/warmer jovian: ε Indi A b is a cold, desaturated world.",
  "p_158":"Belt–zone contrast is rendered as minimal. The convective drive at ~275 K with a near-global thick cloud deck is weak, and the suppressed ammonia feature and 3–5 µm faintness both point to a uniform, optically deep cover rather than a banded, gappy one (Matthews 2026 contrast ε Indi A b&#x27;s likely uniform cover with WISE 0855&#x27;s possible patchy holes). The cfg picks a near-featureless deck (<code>cloud_cover_fraction ≈ 0.95</code>) with only faint grey-green band shadows (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) where the deck thins — far more uniform than Jupiter&#x27;s vivid belts.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"<b>Pressure reference.</b> A gas giant has no solid surface; the cfg reference pressure is 1 bar (100 000 Pa). The physically meaningful level is the water-ice cloud top: Matthews 2026&#x27;s best-fit cloudy model reaches optical depth τ = 1 near 0.7 bar, so the visible &quot;surface&quot; of ε Indi A b is the cloud deck a little above the 1 bar level.",
  "p_161":"<b>Composition.</b> The bulk is H₂/He, as for any giant. The measured components are: <b>ammonia (NH₃), confirmed at 11σ</b> from the F1065C–F1140C = 0.88 ± 0.08 mag color (Matthews 2026) — making this the coldest planet with an ammonia detection — and <b>thick water-ice clouds</b>, the preferred explanation for the shallower-than-expected ammonia feature and the faint 3–5 µm emission. The best-fit cloudy atmosphere has elevated metallicity (~3× solar) and an elevated C/O ratio (~2.5× solar), which Matthews 2026 note remains a challenge for formation models for a planet this massive. Two alternative explanations for the shallow ammonia feature were considered and disfavored: a low-metallicity atmosphere (rejected because it would brighten the 3–5 µm flux above the ground-based upper limits) and an 85–95% nitrogen depletion (possible but more extreme than formation models predict). The cfg encodes the confirmed ammonia and the water-ice clouds with high confidence and the exact mixing ratios at medium confidence.",
  "p_162":"<b>Sky appearance from a cloud-top / moon observer.</b> From the cloud tops the sky is a thick, pale icy overcast — near-uniform off-white with little banding, lit by a small, distant, warm orange-amber star. ε Indi A subtends only ~1.1 arcmin (0.018°) at 20.9 AU, about 1/30 the Sun&#x27;s angular size from Earth — a brilliant orange-amber pinpoint, not a disk. The light is weak (~5.5 × 10⁻⁴ Earth&#x27;s insolation), so the dayside is dim; most of the planet&#x27;s energy comes from within. Far across the sky, at ~1459 AU, the brown-dwarf pair ε Indi B (Ba + Bb) hangs as two faint deep-red T-dwarf points — a striking, if dim, pair of &quot;stars&quot; unique to this system.",
  "p_163":"<b>Nightside.</b> No meaningful stellar illumination. The planet&#x27;s own internal flux keeps the cloud tops at ~275 K, radiating in the mid-infrared (peak ~10 µm) — invisible to the eye but exactly the band in which JWST/MIRI detected it. There is no expected visible aurora: the host&#x27;s quiet stellar wind at 20.9 AU is a very weak plasma driver, unlike the active-host jovians in the catalog.",
  "h2_164":"Rotation &amp; spin synthesis",
  "p_165":"No rotation measurement of ε Indi A b exists. The angular separation from the host (~3.65 arcsec, Matthews 2026) is wide and the planet is bright in the mid-IR, so a future high-resolution Doppler-broadening measurement (the Snellen 2014 β Pic b technique) is conceivable, but none has been made.",
  "p_166":"<b>Tidal damping argument.</b> At 20.9 AU around a 0.78 M☉ star, the tidal timescale for a Jupiter-class planet exceeds the age of the system by many orders of magnitude. ε Indi A b is <b>not</b> tidally locked; the cfg sets <code>tidally_locked = false</code>.",
  "p_167":"<b>Rotation period choice.</b> Among Solar System giants, rotation period scales weakly with mass and a massive giant inherits a large angular-momentum budget from disk accretion. The cfg picks a Jupiter-analog <code>rotation_period_hours = 10</code> — a within-window tie-break, not constrained by any measurement. A ~10 h rotation on a ~7.6 M_Jup giant produces strong Coriolis banding in principle, but at ~275 K with a thick uniform cloud deck the visible band contrast is suppressed (see Surface).",
  "p_168":"<b>Obliquity.</b> Tie-break aesthetic. The cfg picks 27° (Saturn-analog) for a visually distinct axis tilt that also reads naturally with the optional icy ring; Jupiter&#x27;s near-zero 3.1° would be less interesting and Uranus&#x27;s extreme tip is unmotivated. With the ~108 yr orbital period and weak insolation, obliquity drives no observable seasonal effect — the planet&#x27;s energy budget is internal.",
  "p_169":"<b>KSP implementation note.</b> Rotation period = 10 h = 36 000 s (<code>rotationPeriod = 36000</code>); obliquity ≈ 27° from the orbital normal.",
  "h2_170":"Visual styling",
  "p_171":"Combining the surface (cloud-deck) and atmosphere decisions, ε Indi A b renders as a cold, muted, pale super-Jupiter — the catalog&#x27;s coldest and most desaturated giant:",
  "li_172":"<b>Global appearance.</b> From orbit, ε Indi A b is a pale off-white disk (<span class=\"hex-chip\" style=\"background:#dfe2dc\"></span><code>#dfe2dc</code>) about 1.12 R_Jup (~80 000 km) across — slightly larger than Jupiter in radius but ~7.6× its mass, hence a dense, compact world. The appearance is muted and near-featureless: a thick water-ice cloud deck with minimal belt–zone contrast, deliberately distinct from the warm cream-amber of a sunlit Jupiter. This is a methane/ammonia-class cold giant, modeled visually on the WISE 0855 analog.",
  "li_173":"<b>Cloud-deck detail.</b> A near-global, optically very deep water-ice cloud cover (~95%) with only faint grey-green band shadows (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) where the deck thins. No vivid storms or Great-Red-Spot analog is constrained; cfg picks a calm, uniform deck for the cold, weakly-convective regime.",
  "li_174":"<b>Limb haze.</b> A pale, muted grey-green limb (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) — cold water-ice + ammonia scattering under the warm K5 V illumination, a thin desaturated halo rather than a bright cream limb.",
  "li_175":"<b>Nightside.</b> No stellar illumination to speak of; the cloud tops glow faintly in the mid-IR from internal heat (~275 K) — invisible to the eye, dark to a player&#x27;s view, with no visible aurora.",
  "li_176":"<b>Star in sky.</b> ε Indi A subtends only ~0.018° (1.1 arcmin) from the planet — about 1/30 the Sun&#x27;s angular size from Earth — a brilliant warm orange-amber (K5 V, <span class=\"hex-chip\" style=\"background:#ffb870\"></span><code>#ffb870</code>) pinpoint, delivering only ~5.5 × 10⁻⁴ Earth&#x27;s insolation. The dayside is dim and cold.",
  "li_177":"<b>Brown-dwarf pair in sky.</b> At ~1459 AU, ε Indi Ba + Bb (Chen 2022) appear as two faint deep-red T-dwarf points — too dim to light the planet but a distinctive pair in any wide-field render, marking ε Indi A b as part of a hierarchical K-dwarf + super-Jupiter + brown-dwarf-pair system.",
  "li_178":"<b>Optional icy ring (artistic — NOT observed).</b> A Saturn-like icy ring is offered as a cfg <i>variant</i>, not the default. <b>No ring has been observed</b> in any JWST/MIRI epoch (Matthews 2024, 2026), and the cfg default is <code>ring_present = false</code>. The variant is physically plausible — a cold (~275 K) giant readily retains a water-ice / ammonia-ice ring system — and would render as a pale, faintly bluish-white annulus, inclined to match the 27° obliquity. It is preserved in Open items as an opt-in, clearly flagged as artistic.",
  "h2_179":"Bibliography",
  "h3_180":"Read (visual-informative, drove decisions above)",
  "li_181":"<b>Matthews E. C. et al. 2026</b> — <i>A second visit to ε Ind Ab with JWST: new photometry confirms ammonia and suggests thick clouds in the exoplanet atmosphere of the closest super-Jupiter</i>, ApJL (doi:10.3847/2041-8213/ae5823, <a href=\"https://arxiv.org/abs/2603.08780\">arXiv:2603.08780</a>). Second JWST/MIRI coronagraphic epoch (F1140C, 11.3 µm) + archival data. <b>Confirms ammonia</b> (F1065C–F1140C = 0.88 ± 0.08 mag, 11σ); the shallow feature is best explained by <b>thick water-ice clouds</b> (best fit: 275 K, log g 4.5, 3× solar [M/H], 2.5× solar C/O, H₂O cloud τ = 416, τ = 1 near 0.7 bar). Re-fit orbit: M = 7.63 (+0.73/−0.70) M_Jup, a = 20.9 (+5.8/−3.3) AU, e = 0.244 (+0.11/−0.083), i = 102.3°, Ω = 44.6°, ω = 62°, P ≈ 108 yr. <b>Cornerstone paper</b> — drives the orbit, mass, and atmosphere Decisions rows. Phase 2 recommended anchor.",
  "li_182":"<b>Matthews E. C. et al. 2024</b> — JWST/MIRI direct-imaging discovery of ε Indi A b (<code>2024Natur.633..789M</code>, <a href=\"https://arxiv.org/abs/2503.01599\">arXiv:2503.01599</a>). First-epoch photometry at 10.6 and 15.5 µm; establishes the ~275 K cold giant, the 3–5 µm faintness (NaCo non-detection) implying elevated metallicity, and the common-proper-motion case. <b>Cornerstone paper.</b> (ar5iv full text not available in the cache — HTML-only stub; numbers taken from the abstract and from Matthews 2026&#x27;s recap.)",
  "li_183":"<b>Feng F. et al. 2019</b> — <i>Detection of the nearest Jupiter analog in radial velocity and astrometry data</i>, MNRAS 490, 5002 (<code>2019MNRAS.490.5002F</code>, doi:10.1093/mnras/stz2912, <a href=\"https://arxiv.org/abs/1910.06804\">arXiv:1910.06804</a>). RV + Hipparcos/Gaia astrometric detection; Phase 2 source for the host luminosity (0.239 L☉). The planet parameters here (a ≈ 11.6 AU, ~3.25 M_Jup, P ~45 yr) are the pre-JWST values, superseded by Matthews 2026; retained in the DB as <code>recommended:false</code>.",
  "h3_184":"Read (context / methodology, not decision-driving)",
  "li_185":"<b>Lundkvist M. S. et al. 2024</b> — <i>Low-amplitude solar-like oscillations in the K5 V star ε Indi A</i>, ApJ 964, 110 (<code>2024ApJ...964..110L</code>, <a href=\"https://arxiv.org/abs/2403.04509\">arXiv:2403.04509</a>). Host-star asteroseismic mass (0.782 M☉), R (0.713 R☉), Teff (4700 K), and the ~7.1 yr activity cycle. Provides the host stellar parameters that set the insolation and illumination-color-temperature rows. Detailed in the host Phase 3 (<code>docs/phase3/eps-ind-a.md</code>).",
  "li_186":"<b>Chen M. et al. 2022</b> — <i>Precise Dynamical Masses of ε Indi Ba and Bb</i> (<code>2022AJ....163..288C</code>, <a href=\"https://arxiv.org/abs/2205.08077\">arXiv:2205.08077</a>). Dynamical masses of the wide brown-dwarf pair (Ba T1–1.5 66.9 M_Jup, Bb T6 53.3 M_Jup at ~1459 AU) and the system activity-age (~3.5 Gyr) that frames ε Indi A b as a &quot;solar-age&quot; giant. Drives the brown-dwarf-pair context row.",
  "li_187":"<b>Feng F. et al. 2018</b> — <i>Detection of the closest Jovian exoplanet in the ε Indi triple system</i> (<code>2018arXiv180308163F</code>, <a href=\"https://arxiv.org/abs/1803.08163\">arXiv:1803.08163</a>). RV discovery preprint; earliest planet parameters (M sin i ~2.7 M_Jup, a ~12.8 AU), superseded by Feng 2019 / Matthews 2026; retained in the DB as <code>recommended:false</code>.",
  "h3_188":"Read (instrument-only, not visual-informative)",
  "li_189":"The JWST/MIRI coronagraphic reduction (spaceKLIP / pyKLIP RDI, four-quadrant phase mask, glow-stick background subtraction) and the orvara orbit-fit machinery in Matthews 2026 are the instrument backbone of the photometry and the mass but contribute no direct visual field beyond the numbers used above. The PICASO/Virga cloudy-atmosphere modeling supplies the cloud τ and best-fit parameters already cited.",
  "h3_190":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_191":"The Sonora Flame Skimmer / Elf Owl / Bobcat model grids and the WISE 0855 cooling-model references (Mukherjee 2024; Marley 2021; Kühnle 2025) cited inside Matthews 2026 are read for context but contribute no ε-Indi-A-b cfg number beyond the best-fit parameters already used. Upcoming JWST 3–20 µm spectroscopy (GO #8438, #8714) is not yet published. No further papers were fetched for this planet beyond the pinned set.",
  "h2_192":"Open items for follow-up",
  "li_193":"<b>JWST 3–20 µm spectroscopy (GO #8438, #8714).</b> Upcoming JWST observations should resolve whether the shallow ammonia feature is from water-ice clouds, low metallicity, or nitrogen depletion, and pin the metallicity, C/O, and cloud f_sed. If a spectrum arrives, re-derive <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>, <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span>, and the tint hex codes.",
  "li_194":"<b>Icy-ring cfg variant (artistic).</b> The default is <code>ring_present = false</code> — no ring is observed (Matthews 2024/2026). An optional pale icy-ring variant is preserved here for users who want it: physically plausible for a cold ~275 K giant, rendered as a faint bluish-white annulus inclined to the 27° obliquity. Clearly flagged as artistic, not data-driven.",
  "li_195":"<b>a–e degeneracy.</b> With ~30 yr of RV over a ~108 yr orbit, the semi-major axis and eccentricity are strongly correlated (Matthews 2026); near-circular solutions with a ≈ 19 AU are also allowed. Continued monitoring (Rajpoot et al. in prep.) will tighten both; the cfg should be updated if the orbit is refined.",
  "li_196":"<b>Rotation and obliquity.</b> Both are within-window tie-breaks (10 h, 27°). A future Doppler-broadening measurement at the ~3.65 arcsec separation would replace the rotation guess; obliquity is unlikely to be measured soon.",
  "li_197":"<b>Effective vs equilibrium temperature.</b> The cfg encodes both the measured ~275 K effective temperature (internal-heat-dominated) and the derived ~43 K radiative-equilibrium temperature. A future cfg should drive the planet&#x27;s thermal glow from the ~275 K internal value, not the insolation, to render the self-luminous cold giant faithfully.",
  "li_198":"<b>Phase 2 atmosphere ingest.</b> ε Indi A b has no Phase 2 atmosphere block in the DB (only orbital + physical). When the schema is extended, the Matthews 2026 ammonia detection and water-ice-cloud best-fit should be ingested as <code>atmosphere_measurements</code> records matching the cfg picks above.",
  "h2_199":"Related",
  "li_200":"<a href=\"eps-ind-a.md\">eps-ind-a</a> — host star Phase 3 synthesis; provides the K5 V M_star / R_star / L_star / age and the illumination-color-temperature reference, and the brown-dwarf-pair context",
  "li_201":"<a href=\"eps-eri-b.md\">eps-eri-b</a> — comparison cold jovian around a nearby K dwarf (~0.78 M_Jup, 3.5 AU, ~110 K); contrast ε Eri b&#x27;s lower-mass, insolation-set warm-cream Saturn-analog against ε Indi A b&#x27;s massive, internal-heat-dominated, water-ice-cloud cold giant",
  "li_202":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions schema",

  ko: {
  "p_1":"ε Indi A b 는 <b>태양에 가장 가까운 직접 촬영 차가운 거대 외계행성</b> 입니다 — 조용한 K5 V 왜성 ε Indi A (11.9 ly) 를 a = 20.9 (+5.8/−3.3) AU 에서 공전하는 ~7.6 M_Jup 슈퍼목성으로, 이심률 e = 0.244 (+0.11/−0.083), 궤도 주기 P ≈ 108 (+49/−25) yr 입니다 (Matthews et al. 2026, JWST/MIRI 영상 + Hipparcos–Gaia 측성 + 30 년치 RV). JWST/MIRI 가 10.6 과 15.5 µm 에서 먼저 촬영했고 (Matthews 2024), 두 번째 epoch 에서 11.3 µm 로 재검출 (Matthews 2026), 공통 고유운동으로 확인했습니다. 이 행성은 차갑고 태양-나이 (~3.5 Gyr) 인 거대 행성으로 대기 온도가 ~275 K 부근입니다 — 그리고 결정적으로, 그 온도는 별빛이 아니라 스스로의 내부열로 설정됩니다. 20.9 AU 에서 0.239 L☉ 별 주위의 일사량은 S ≈ 5.5 × 10⁻⁴ S⊕ 에 불과해, 복사-평형 온도는 겨우 ~43 K 입니다. 따라서 ε Indi A b 는 스스로 빛나며 수축하는 슈퍼목성으로, 주변보다 ~230 K 더 뜨겁게 복사합니다.",
  "p_2":"대기가 헤드라인입니다. Matthews 2026 은 F1065C–F1140C 색 0.88 ± 0.08 mag 를 측정했는데 — 10–11 µm 암모니아 밴드를 가로지르는 11σ 밝기 차이로 — <b>암모니아 (NH₃) 를 확인</b>하며, ε Indi A b 를 지금까지 암모니아가 검출된 가장 차가운 행성으로 만듭니다. 이 특징은 cloud-free solar-metallicity 모델 예측보다 얕은데, 저자들의 <b>선호 설명은 암모니아 특징과 근적외선 (3–5 µm) 방출 둘 다를 억제하는 두꺼운 물-얼음 구름</b> 입니다 (지상 아카이브 비검출과 일관). best-fit cloudy 모델은 275 K, log g ≈ 4.5, ~3× solar 금속도, ~2.5× solar C/O 대기에 매우 광학적으로 두꺼운 H₂O 구름 (column optical depth ~416, 0.7 bar 부근에서 τ = 1 도달) 을 가집니다.",
  "p_3":"<b>NearStars 시나리오 선택. 넓은 ~20.9 AU 이심 궤도의 차가운 (~275 K, 내부 가열) 슈퍼목성으로, 따뜻한 Jovian 호박색이 아니라 무채색에 가까운 창백한 메탄/암모니아-부류 거대 행성으로 — 밴드를 억제하는 두꺼운 물-얼음 구름, 확인된 암모니아, 그리고 선택적 예술적 토성형 얼음 고리 (표기. 미관측) 와 함께 — 렌더링합니다.</b> 궤도와 암모니아 + 물-얼음-구름 대기는 측정됐으므로 (Matthews 2026), 핵심 Decisions 행들은 canonical-aligned 입니다. 정확한 색조, 밴드 형태, 자전, 경사, 그리고 고리는 차가운-거대-행성 interesting-first 독법으로 기본값을 잡은 within-window tie-break 입니다. 관측된 고리는 없습니다. cfg 기본값은 <code>ring_present = false</code> 이고, 얼음 고리는 Open items 에 cfg 변종으로 보존됩니다.",

  "td_133":"에너지플럭스 다이나모 스케일링 (Christensen et al. 2009 <code>2009Natur.457..167C</code>. Reiners &amp; Christensen 2010 <code>1007.1514</code>). B_dip^pol = 9 G·(age/4.5 Gyr)^−0.33·(M/M_Jup)^0.93 → 7.6 M_Jup, ~3.5 Gyr 에서 B_eq ≈ 3200 µT (범위 2600–3700). 갈색왜성 경계에 가까워 나이가 많아도 자기장이 강하게 유지된다 (질량 지수가 1–5 M_J calibration 위로 외삽됨 → 추가 ~25% 계통오차). 이전의 임시 &quot;Jupiter 2배&quot; 를 대체. docs/reference/planetary-dynamo-scaling.md 참고",
  "td_134":"<span class=\"field-tt\" data-ko-tip=\"쌍극자 모멘트 (지구 = 1.0 단위).\" data-en-tip=\"Magnetic dipole moment in Earth units (Earth = 1.0).\"><code>magnetic_dipole_moment_normalized_earth</code></span>",

  "td_151":"4700",

  "td_153":"호스트 Phase 3 (<code>docs/phase3/eps-ind-a.md</code>) 에서 상속",
  "h2_154":"Surface synthesis",
  "p_155":"ε Indi A b 는 고체 표면이 없습니다 — ~7.6 M_Jup H₂/He 슈퍼목성입니다. 렌더링에 관련된 &quot;표면&quot; 은 구름 데크이고, ε Indi A b 의 데크가 바로 정의적 과학 결과입니다. 0.7 bar 부근에서 τ = 1 에 도달하는 두꺼운 물-얼음 구름층 (Matthews 2026 best fit) 이 암모니아가 확인된 대기 위에 얹혀 있습니다.",
  "p_156":"온도 영역이 색조의 열쇠입니다. 행성은 ~275 K 로 복사하지만 (Matthews 2024/2026), 이는 일사 온도가 <b>아닙니다</b> — 0.239 L☉ 별 주위 20.9 AU 에서 복사-평형 온도는 겨우 ~43 K (유도) 이고, 일사량은 지구의 ~5.5 × 10⁻⁴ 배 입니다. ~275 K 는 행성 스스로의 내부열로 설정됩니다. ~3.5 Gyr 의 7.6 M_Jup 거대 행성은 여전히 천천히 수축하며 형성 에너지를 복사하므로, 주변보다 ~230 K 더 뜨겁게 빛납니다. 이는 ε Indi A b 를 <b>스스로 빛나는 차가운 거대 행성</b> 으로 만드는데, Matthews 2026 이 거의 동일한 mid-IR 색을 발견한 차가운 갈색왜성 WISE 0855 (~285 K) 와 같은 영역입니다.",
  "p_157":"~275 K 에서 응결 화학은 뜨거운 거대 행성의 규산염/철 구름이 아니라 물 얼음과 암모니아가 지배합니다. 암모니아는 기체상에서 확인됐고 (Matthews 2026), 그 유난히 얕은 특징의 선호 설명은 두꺼운 물-얼음 구름이 대기를 덮어 이를 억제한다는 것입니다. 따라서 cfg 는 ε Indi A b 를 <b>무채색에 가까운 창백한 메탄/암모니아-부류 거대 행성</b> 으로 렌더링합니다 — 물-얼음과 암모니아 구름은 본질적으로 약한 cold-blue 기를 띤 근-백색이고, 따뜻한 K5 V (4700 K) 조명 아래에서 지각 색조는 중성 창백한 off-white (<span class=\"hex-chip\" style=\"background:#dfe2dc\"></span><code>#dfe2dc</code> 구름, <span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code> limb) 로 정착합니다. 이는 태양이 비춘 목성이나 더 어리고/따뜻한 jovian 의 따뜻한 cream-amber 와 의도적으로 구별됩니다. ε Indi A b 는 차갑고 탈채도된 세계입니다.",
  "p_158":"belt–zone 대비는 최소로 렌더링됩니다. 거의-전지구적 두꺼운 구름 데크를 가진 ~275 K 에서 대류 구동은 약하고, 억제된 암모니아 특징과 3–5 µm 흐림 둘 다 밴드 지고 틈이 있는 것보다 균일하고 광학적으로 깊은 커버를 가리킵니다 (Matthews 2026 은 ε Indi A b 의 균일한 커버 가능성을 WISE 0855 의 patchy 구멍 가능성과 대비). cfg 는 거의-특징-없는 데크 (<code>cloud_cover_fraction ≈ 0.95</code>) 에 데크가 얇아지는 곳의 희미한 회녹색 밴드 그림자 (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) 만 선택합니다 — 목성의 선명한 belt 보다 훨씬 균일합니다.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"<b>압력 기준.</b> 거대 행성은 고체 표면이 없습니다. cfg 기준 압력은 1 bar (100 000 Pa) 입니다. 물리적으로 의미 있는 고도는 물-얼음 구름 정상입니다. Matthews 2026 의 best-fit cloudy 모델은 0.7 bar 부근에서 광학 깊이 τ = 1 에 도달하므로, ε Indi A b 의 가시 &quot;표면&quot; 은 1 bar 레벨 조금 위의 구름 데크입니다.",
  "p_161":"<b>조성.</b> 본체는 어떤 거대 행성처럼 H₂/He 입니다. 측정된 성분은. F1065C–F1140C = 0.88 ± 0.08 mag 색에서 <b>11σ 로 확인된 암모니아 (NH₃)</b> (Matthews 2026) — 이로써 암모니아가 검출된 가장 차가운 행성 — 와, 예상보다 얕은 암모니아 특징 및 흐린 3–5 µm 방출의 선호 설명인 <b>두꺼운 물-얼음 구름</b> 입니다. best-fit cloudy 대기는 elevated 금속도 (~3× solar) 와 elevated C/O 비 (~2.5× solar) 를 가지는데, Matthews 2026 은 이것이 이렇게 질량 큰 행성에 대해 형성 모델의 난제로 남는다고 언급합니다. 얕은 암모니아 특징에 대한 두 대안 설명이 고려됐다 기각됐습니다. 저-금속도 대기 (3–5 µm flux 를 지상 상한 위로 밝히므로 기각) 와 85–95% 질소 고갈 (가능하나 형성 모델 예측보다 극단적) 입니다. cfg 는 확인된 암모니아와 물-얼음 구름을 high 신뢰도로, 정확한 혼합비를 medium 신뢰도로 인코딩합니다.",
  "p_162":"<b>구름 정상 / 위성 관측자에서의 하늘 외형.</b> 구름 정상에서 하늘은 두껍고 창백한 얼음빛 흐림입니다 — 밴딩이 거의 없는 근-균일 off-white 로, 작고 멀고 따뜻한 오렌지-호박색 별이 비춥니다. ε Indi A 는 20.9 AU 에서 ~1.1 arcmin (0.018°) 만 차지해, 지구에서 본 태양 각크기의 약 1/30 — 원반이 아니라 눈부신 오렌지-호박색 점입니다. 빛은 약하고 (지구 일사량의 ~5.5 × 10⁻⁴), 그래서 주간면은 어둡습니다. 행성 에너지의 대부분은 내부에서 옵니다. 하늘 건너편 멀리, ~1459 AU 에서, 갈색왜성 쌍 ε Indi B (Ba + Bb) 가 두 개의 희미한 깊은-적색 T-왜성 점으로 걸려 있습니다 — 이 시스템에 고유한, 희미하나마 인상적인 &quot;별&quot; 의 쌍입니다.",
  "p_163":"<b>야간면.</b> 의미 있는 항성 조명 없음. 행성 스스로의 내부 flux 가 구름 정상을 ~275 K 로 유지하며 중적외선 (정점 ~10 µm) 으로 복사합니다 — 눈에는 보이지 않지만 정확히 JWST/MIRI 가 검출한 밴드입니다. 기대되는 가시 오로라는 없습니다. 20.9 AU 에서 호스트의 조용한 항성풍은 매우 약한 플라스마 구동으로, 카탈로그의 활동적-호스트 jovian 과 다릅니다.",
  "h2_164":"Rotation &amp; spin synthesis",
  "p_165":"ε Indi A b 의 자전 측정은 없습니다. 호스트로부터의 각거리 (~3.65 arcsec, Matthews 2026) 가 넓고 행성이 mid-IR 에서 밝아, 미래의 고분해 Doppler-broadening 측정 (Snellen 2014 의 β Pic b 기법) 은 상상할 수 있으나 아직 이뤄지지 않았습니다.",
  "p_166":"<b>조석 감쇠 논거.</b> 0.78 M☉ 별 주위 20.9 AU 에서 목성-부류 행성의 조석 시간척도는 시스템 나이를 여러 자릿수 초과합니다. ε Indi A b 는 조석 고정이 <b>아닙니다</b>. cfg 는 <code>tidally_locked = false</code> 로 설정합니다.",
  "p_167":"<b>자전 주기 선택.</b> 태양계 거대 행성 중 자전 주기는 질량과 약하게 스케일하고, 질량 큰 거대 행성은 원반 강착에서 큰 각운동량 예산을 물려받습니다. cfg 는 목성형 <code>rotation_period_hours = 10</code> 을 선택합니다 — 어떤 측정으로도 제약되지 않은 within-window tie-break 입니다. ~7.6 M_Jup 거대 행성의 ~10 h 자전은 원칙적 으로 강한 코리올리 밴딩을 만들지만, ~275 K 에 두꺼운 균일 구름 데크라 가시 밴드 대비는 억제됩니다 (Surface 참조).",
  "p_168":"<b>경사 (obliquity).</b> Tie-break 미적 선택. cfg 는 27° (토성형) 를 선택해 선택적 얼음 고리와도 자연스럽게 읽히는 시각적으로 뚜렷한 축 기울기를 줍니다. 목성의 근-제로 3.1° 는 덜 흥미롭고 천왕성의 극단적 기울기는 동기가 없습니다. ~108 yr 궤도 주기와 약한 일사로, obliquity 는 관측 가능한 계절 효과를 만들지 않습니다 — 행성의 에너지 예산은 내부적입니다.",
  "p_169":"<b>KSP 구현 노트.</b> 자전 주기 = 10 h = 36 000 s (<code>rotationPeriod = 36000</code>). obliquity ≈ 27° (궤도 법선 기준).",
  "h2_170":"Visual styling",
  "p_171":"표면 (구름-데크) 과 대기 결정을 결합하면, ε Indi A b 는 차갑고 무채색에 가까운 창백한 슈퍼목성으로 렌더링됩니다 — 카탈로그에서 가장 차갑고 가장 탈채도된 거대 행성입니다.",
  "li_172":"<b>전체 외형.</b> 궤도에서 ε Indi A b 는 약 1.12 R_Jup (~80 000 km) 폭의 창백한 off-white 원반 (<span class=\"hex-chip\" style=\"background:#dfe2dc\"></span><code>#dfe2dc</code>) 입니다 — 반지름은 목성보다 약간 크지만 질량은 ~7.6 배라, 밀도 높고 압축된 세계입니다. 외형은 무채색에 가깝고 거의-특징-없습니다. belt–zone 대비가 최소인 두꺼운 물-얼음 구름 데크로, 태양이 비춘 목성의 따뜻한 cream-amber 와 의도적으로 구별됩니다. 시각적으로 WISE 0855 유사체를 모델로 한 메탄/암모니아-부류 차가운 거대 행성입니다.",
  "li_173":"<b>구름-데크 세부.</b> 거의-전지구적인, 광학적으로 매우 깊은 물-얼음 구름 커버 (~95%) 에 데크가 얇아지는 곳의 희미한 회녹색 밴드 그림자 (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) 만 있습니다. 제약된 선명한 폭풍이나 대적반 유사체는 없습니다. cfg 는 차갑고 약-대류 영역을 위해 차분하고 균일한 데크를 선택합니다.",
  "li_174":"<b>Limb 헤이즈.</b> 창백하고 무채색에 가까운 회녹색 limb (<span class=\"hex-chip\" style=\"background:#b8bcb0\"></span><code>#b8bcb0</code>) — 따뜻한 K5 V 조명 아래 차가운 물-얼음 + 암모니아 산란으로, 밝은 cream limb 가 아니라 얇은 탈채도된 halo 입니다.",
  "li_175":"<b>야간면.</b> 말할 만한 항성 조명 없음. 구름 정상이 내부열에서 중적외선으로 희미하게 빛납니다 (~275 K) — 눈에는 보이지 않고 플레이어 시야에는 어두우며, 가시 오로라는 없습니다.",
  "li_176":"<b>하늘의 별.</b> ε Indi A 는 행성에서 ~0.018° (1.1 arcmin) 만 차지합니다 — 지구에서 본 태양 각크기의 약 1/30 — 눈부신 따뜻한 오렌지-호박색 (K5 V, <span class=\"hex-chip\" style=\"background:#ffb870\"></span><code>#ffb870</code>) 점으로, 지구 일사량의 ~5.5 × 10⁻⁴ 만 전달합니다. 주간면은 어둡고 차갑습니다.",
  "li_177":"<b>하늘의 갈색왜성 쌍.</b> ~1459 AU 에서 ε Indi Ba + Bb (Chen 2022) 가 두 개의 희미한 깊은-적색 T-왜성 점으로 나타납니다 — 행성을 비추기엔 너무 어둡지만 광역 렌더에서는 뚜렷한 쌍으로, ε Indi A b 를 K-왜성 + 슈퍼목성 + 갈색왜성-쌍 계층 시스템의 일부로 표시합니다.",
  "li_178":"<b>선택적 얼음 고리 (예술적 — 미관측).</b> 토성형 얼음 고리는 기본값이 아니라 cfg <i>변종</i> 으로 제공됩니다. 어떤 JWST/MIRI epoch 에서도 <b>고리는 관측되지 않았고</b> (Matthews 2024, 2026), cfg 기본값은 <code>ring_present = false</code> 입니다. 이 변종은 물리적으로 그럴듯합니다 — 차가운 (~275 K) 거대 행성은 물-얼음 / 암모니아-얼음 고리계를 쉽게 유지합니다 — 그리고 27° obliquity 에 맞춰 기울어진 창백하고 약간 푸르스름한-흰 고리띠로 렌더링됩니다. Open items 에 opt-in 으로, 예술적이라고 분명히 표기해 보존됩니다.",
  "h2_179":"Bibliography",
  "h3_180":"Read (visual-informative, drove decisions above)",
  "li_181":"<b>Matthews E. C. et al. 2026</b> — <i>A second visit to ε Ind Ab with JWST: new photometry confirms ammonia and suggests thick clouds in the exoplanet atmosphere of the closest super-Jupiter</i>, ApJL (doi:10.3847/2041-8213/ae5823, <a href=\"https://arxiv.org/abs/2603.08780\">arXiv:2603.08780</a>). 두 번째 JWST/MIRI 관상 epoch (F1140C, 11.3 µm) + 아카이브 데이터. <b>암모니아 확인</b> (F1065C–F1140C = 0.88 ± 0.08 mag, 11σ). 얕은 특징은 <b>두꺼운 물-얼음 구름</b> 으로 가장 잘 설명 (best fit. 275 K, log g 4.5, 3× solar [M/H], 2.5× solar C/O, H₂O 구름 τ = 416, 0.7 bar 부근 τ = 1). 재-피팅 궤도. M = 7.63 (+0.73/−0.70) M_Jup, a = 20.9 (+5.8/−3.3) AU, e = 0.244 (+0.11/−0.083), i = 102.3°, Ω = 44.6°, ω = 62°, P ≈ 108 yr. <b>핵심 논문</b> — 궤도, 질량, 대기 Decisions 행을 구동. Phase 2 recommended 앵커.",
  "li_182":"<b>Matthews E. C. et al. 2024</b> — ε Indi A b 의 JWST/MIRI 직접 촬영 발견 (<code>2024Natur.633..789M</code>, <a href=\"https://arxiv.org/abs/2503.01599\">arXiv:2503.01599</a>). 10.6 과 15.5 µm 의 첫-epoch 측광. ~275 K 차가운 거대 행성, elevated 금속도를 함의하는 3–5 µm 흐림 (NaCo 비검출), 공통-고유운동 논거를 확립. <b>핵심 논문.</b> (캐시에 ar5iv 전문 없음 — HTML-only stub. 숫자는 초록과 Matthews 2026 의 요약에서 취함.)",
  "li_183":"<b>Feng F. et al. 2019</b> — <i>Detection of the nearest Jupiter analog in radial velocity and astrometry data</i>, MNRAS 490, 5002 (<code>2019MNRAS.490.5002F</code>, doi:10.1093/mnras/stz2912, <a href=\"https://arxiv.org/abs/1910.06804\">arXiv:1910.06804</a>). RV + Hipparcos/Gaia 측성 검출. 호스트 광도 (0.239 L☉) 의 Phase 2 출처. 여기서의 행성 파라미터 (a ≈ 11.6 AU, ~3.25 M_Jup, P ~45 yr) 는 pre-JWST 값으로 Matthews 2026 이 대체. DB 에 <code>recommended:false</code> 로 보존.",
  "h3_184":"Read (context / methodology, not decision-driving)",
  "li_185":"<b>Lundkvist M. S. et al. 2024</b> — <i>Low-amplitude solar-like oscillations in the K5 V star ε Indi A</i>, ApJ 964, 110 (<code>2024ApJ...964..110L</code>, <a href=\"https://arxiv.org/abs/2403.04509\">arXiv:2403.04509</a>). 호스트 별 측성지진 질량 (0.782 M☉), R (0.713 R☉), Teff (4700 K), 그리고 ~7.1 yr 활동 주기. 일사와 조명-색온도 행을 설정하는 호스트 항성 파라미터를 제공. 호스트 Phase 3 (<code>docs/phase3/eps-ind-a.md</code>) 에 상술.",
  "li_186":"<b>Chen M. et al. 2022</b> — <i>Precise Dynamical Masses of ε Indi Ba and Bb</i> (<code>2022AJ....163..288C</code>, <a href=\"https://arxiv.org/abs/2205.08077\">arXiv:2205.08077</a>). 넓은 갈색왜성 쌍의 역학 질량 (Ba T1–1.5 66.9 M_Jup, Bb T6 53.3 M_Jup, ~1459 AU) 과 ε Indi A b 를 &quot;태양-나이&quot; 거대 행성으로 틀 짓는 시스템 활동-나이 (~3.5 Gyr). 갈색왜성-쌍 맥락 행을 구동.",
  "li_187":"<b>Feng F. et al. 2018</b> — <i>Detection of the closest Jovian exoplanet in the ε Indi triple system</i> (<code>2018arXiv180308163F</code>, <a href=\"https://arxiv.org/abs/1803.08163\">arXiv:1803.08163</a>). RV 발견 프리프린트. 가장 이른 행성 파라미터 (M sin i ~2.7 M_Jup, a ~12.8 AU) 로, Feng 2019 / Matthews 2026 이 대체. DB 에 <code>recommended:false</code> 로 보존.",
  "h3_188":"Read (instrument-only, not visual-informative)",
  "li_189":"Matthews 2026 의 JWST/MIRI 관상 환원 (spaceKLIP / pyKLIP RDI, four-quadrant phase mask, glow-stick 배경 차감) 과 orvara 궤도-피팅 기계는 측광과 질량의 기기적 골격이지만, 위에서 쓴 숫자 이상의 직접 시각 필드를 주지는 않습니다. PICASO/Virga cloudy-대기 모델링이 구름 τ 와 best-fit 파라미터를 공급하며 이미 인용됐습니다.",
  "h3_190":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_191":"Matthews 2026 안에 인용된 Sonora Flame Skimmer / Elf Owl / Bobcat 모델 그리드와 WISE 0855 냉각-모델 참고문헌 (Mukherjee 2024. Marley 2021. Kühnle 2025) 은 맥락용으로 읽었지만, 이미 쓴 best-fit 파라미터 이상의 ε-Indi-A-b cfg 수치를 주지는 않습니다. 다가오는 JWST 3–20 µm 분광 (GO #8438, #8714) 은 아직 출판되지 않았습니다. 이 행성에 대해 핀된 세트 이상의 논문은 fetch 되지 않았습니다.",
  "h2_192":"Open items for follow-up",
  "li_193":"<b>JWST 3–20 µm 분광 (GO #8438, #8714).</b> 다가오는 JWST 관측은 얕은 암모니아 특징이 물-얼음 구름·저-금속도·질소 고갈 중 무엇 때문인지 가려야 하고, 금속도·C/O·구름 f_sed 를 못박아야 합니다. 스펙트럼이 나오면 <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>, <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span>, 색조 hex 를 재유도합니다.",
  "li_194":"<b>얼음-고리 cfg 변종 (예술적).</b> 기본값은 <code>ring_present = false</code> 입니다 — 관측된 고리가 없습니다 (Matthews 2024/2026). 원하는 사용자를 위해 선택적 창백한 얼음-고리 변종을 보존합니다. 차가운 ~275 K 거대 행성에 물리적으로 그럴듯하며, 27° obliquity 에 기울어진 희미한 푸르스름한-흰 고리띠로 렌더링됩니다. 데이터 기반이 아니라 예술적이라고 분명히 표기.",
  "li_195":"<b>a–e 축퇴.</b> ~108 yr 궤도에 ~30 yr RV 라 반장축과 이심률이 강하게 상관 됩니다 (Matthews 2026). a ≈ 19 AU 의 거의-원형 해도 허용됩니다. 지속 모니터링 (Rajpoot et al. in prep.) 이 둘 다 조일 것입니다. 궤도가 정밀화되면 cfg 를 갱신해야 합니다.",
  "li_196":"<b>자전과 경사.</b> 둘 다 within-window tie-break (10 h, 27°) 입니다. ~3.65 arcsec 분리에서의 미래 Doppler-broadening 측정이 자전 추정을 교체할 것 입니다. 경사는 곧 측정될 가능성이 낮습니다.",
  "li_197":"<b>유효 온도 대 평형 온도.</b> cfg 는 측정된 ~275 K 유효 온도 (내부-가열 지배) 와 유도된 ~43 K 복사-평형 온도를 모두 인코딩합니다. 미래 cfg 는 스스로 빛나는 차가운 거대 행성을 충실히 렌더링하려면 행성의 열 빛을 일사가 아니라 ~275 K 내부값으로 구동해야 합니다.",
  "li_198":"<b>Phase 2 대기 ingest.</b> ε Indi A b 는 DB 에 Phase 2 대기 블록이 없습니다 (궤도 + 물리만). 스키마가 확장되면 Matthews 2026 의 암모니아 검출과 물-얼음- 구름 best-fit 을 위 cfg 선택에 맞춘 <code>atmosphere_measurements</code> 레코드로 ingest 해야 합니다.",
  "h2_199":"Related",
  "li_200":"<a href=\"eps-ind-a.md\">eps-ind-a</a> — 호스트 별 Phase 3 합성. K5 V M_star / R_star / L_star / 나이 와 조명-색온도 기준, 그리고 갈색왜성-쌍 맥락을 제공",
  "li_201":"<a href=\"eps-eri-b.md\">eps-eri-b</a> — 비교용 가까운 K 왜성 주위 차가운 jovian (~0.78 M_Jup, 3.5 AU, ~110 K). ε Eri b 의 저-질량, 일사로-설정된 따뜻한-cream 토성-유사체를 ε Indi A b 의 질량 크고, 내부-열-지배, 물-얼음-구름 차가운 거대 행성과 대비",
  "li_202":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 스키마",
  "li_203":"<a href=\"../reference/mod-reference.md\">mod-reference</a> — 이 거대 행성의 대기 결정을 소비하는 하류 Kopernicus / EVE / Scatterer cfg 작성기",
  "li_204":"<a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> — REX 는 ε Indi A b 엔트리가 없음. 가장 가까운 직접 촬영 차가운 슈퍼목성은 NearStars 추가분",
  "title":"ε Indi A b — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",
  "reports_index": "보고서 인덱스",
  "footer_note": "NearStars · Phase 3 합성 보고서 · eps-ind-a-b.md + ko/ 미러에서 자동 생성"
  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
