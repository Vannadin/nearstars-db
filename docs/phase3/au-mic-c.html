  "h2_140":"Surface synthesis",
  "p_141":"AU Mic c sits at the lower edge of the sub-Neptune regime. Mass 14.46 M⊕ and radius 2.79 R⊕ give density 3.7 g/cc — consistent with either:",
  "p_142":"1. <b>Thin H/He envelope</b> (~5% by mass) over a rocky/iron core. Lopez &amp; Fortney 2014 mass-radius diagrams place 2.79 R⊕ / 14.46 M⊕ in the regime where ≤ 10% H/He envelope inflates a rocky core to the observed size. This is the canonical sub-Neptune interpretation and is the cfg&#x27;s default reading.",
  "p_143":"2. <b>Water-world variant</b> with a significant H₂O mantle (perhaps 30–40% by mass) and minimal hydrogen envelope. This is also consistent with the bulk density (Zeng 2019 mass-radius for water worlds) and would be a meaningful alternative — but the sub-Neptune valley (Fulton 2017, Owen &amp; Wu 2017) statistically favors the H/He-envelope interpretation for planets in c&#x27;s regime, and AU Mic&#x27;s youth (22 Myr) makes a primordial H/He envelope more likely retained than in older systems.",
  "p_144":"For NearStars purposes, the &quot;visible surface&quot; the player sees is the top of the H/He cloud deck at ~10⁶ Pa, rendered as a banded gaseous body with a less pronounced banding pattern than b (because of the smaller envelope mass + slower rotation). There is no rocky terrain to render. The interior structure — rocky/iron core, H₂O/silicate mantle, H/He envelope — affects density inversions but not the visible appearance.",
  "p_145":"The youth of the system continues to matter here. At 22 Myr, c is still contracting; its current density of 3.7 g/cc will increase to perhaps 4.5 g/cc at Gyr ages as the envelope cools and the planet shrinks by ~10–15% in radius. This is too subtle to render in a single cfg, but justifies treating the present-day inflated state as the default rather than an old-system equivalent.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"The atmosphere of c is not directly detected, but its existence and properties are constrained indirectly.",
  "p_148":"<b>Pressure.</b> The transit-derived radius pins the cloud-deck pressure to roughly 10⁶ Pa for a thin H/He envelope. If c is the water-world variant, the dominant gas at this pressure would be supercritical steam rather than H₂, but the visible cloud deck location would be similar. The cfg adopts the thin-envelope interpretation as the headline reading.",
  "p_149":"<b>Composition.</b> No direct atmospheric measurement exists for c at this writing. The composition is inferred from the bulk density + sub-Neptune mass-radius valley: H₂ ~80%, He ~15%, with trace H₂O, CH₄, NH₃, CO at near-solar abundance. Photochemical hazes from CH₄ photolysis under AU Mic&#x27;s intense XUV are expected; whether these condense into a haze layer comparable to Titan&#x27;s depends on the upper-atmosphere C/O ratio (not measured for c). The cfg adopts a moderate haze layer with cloud cover fraction 0.65 — slightly less than b&#x27;s 0.70 because of c&#x27;s reduced inflation and the lack of direct cloud-detection evidence.",
  "p_150":"<b>Sky appearance.</b> From low orbit, c looks like a smaller, less inflated version of b: muted red-brown bands under deep red M1V illumination, with the equatorial superrotation jet visible but less pronounced than b&#x27;s. The cloud-top color (<span class=\"hex-chip\" style=\"background:#b0987a\"></span><code>#b0987a</code>) is more muted than b&#x27;s (<span class=\"hex-chip\" style=\"background:#c0a880\"></span><code>#c0a880</code>) because of the higher gravity and reduced atmospheric scale height — less haze accumulation in the visible column. The star fills 3.7° in c&#x27;s sky (about 7× the Sun from Earth) and is the dominant illumination source; surface insolation is 6.5× Earth&#x27;s at the substellar cloud top, but red-shifted.",
  "p_151":"<b>Atmospheric escape.</b> With c at 0.119 AU receiving 6.5× Earth&#x27;s insolation, the XUV-driven escape rate is roughly an order of magnitude lower than b&#x27;s: ~10⁸ g/s under energy-limited assumptions with AU Mic&#x27;s saturated-regime XUV flux. This is sufficient to lose a few percent of the H/He envelope over the system&#x27;s projected lifetime — significant for the long-term evolution but minor for the present-day visual appearance. No He I 10830 Å detection has been attempted at c-equivalent precision; if attempted with current instruments, an escape-tail comparable to b&#x27;s is possible but at lower significance.",
  "h2_152":"Rotation &amp; spin synthesis",
  "p_153":"Tidal damping of an 18.86-day sub-Neptune at 0.119 AU around 0.51 M☉ proceeds on a timescale of ~10⁶–10⁷ years (Goldreich &amp; Soter 1966 with Neptune-like Q ≈ 10⁴); over the 22-Myr system age, c is likely fully locked into 1:1 spin-orbit synchronization, though the damping timescale is closer to the system age than for b. Eccentricity 0.18 (Mallorquin 2024) is high enough that the spin state could in principle settle into a higher-order resonance (3:2 like Mercury); however, the dominant tidal damping for puffy planets favors 1:1, and the cfg adopts the synchronous state. No spin–orbit angle measurement (Rossiter–McLaughlin) has been published for c at this writing.",
  "p_154":"<b>KSP implementation note.</b> Rotation period = orbital period = 18.859023 days (1 629 419.6 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code>.",
  "p_155":"<b>Mild seasonal modulation.</b> Obliquity damped to zero, but eccentricity 0.18 drives substantial insolation variation (1 +/- 36%) along the orbit. Periapsis insolation is ~9 S⊕, apoapsis ~4 S⊕ — a factor-of-2 variation. The thick atmosphere smooths this to ~30 K cloud-top temperature variation across the orbit, visible as a modest brightening of the dayside near periapsis.",
  "p_156":"<b>Day-night redistribution.</b> With a thinner H/He envelope than b&#x27;s, c&#x27;s atmosphere is less efficient at redistributing heat to the nightside. Expected day-night contrast: ~120 K (dayside 500 K, nightside 380 K). No phase-curve observation has been attempted; the host-star spot signal would dominate at AU Mic c&#x27;s transit depth.",
  "h2_157":"Visual styling",
  "p_158":"The visual presentation of AU Mic c is a softer, smaller cousin to b:",
  "li_159":"<b>Global appearance.</b> A warm sub-Neptune disk with muted zonal banding, lit by AU Mic at 3.7° angular diameter (7× the Sun from Earth — still dominant but no longer overwhelming). The disk shows muted red-brown bands (<span class=\"hex-chip\" style=\"background:#8a6a4c\"></span><code>#8a6a4c</code> for primary haze, <span class=\"hex-chip\" style=\"background:#b0987a\"></span><code>#b0987a</code> for zone clouds) — slightly more muted than b because of less atmospheric mass to render.",
  "li_160":"<b>Banded structure.</b> Equatorial superrotation jet produces a faint equatorial zone with darker mid-latitude belts. Polar regions show subtle hood-like darkening. Bands are narrower than b&#x27;s because of the smaller atmospheric scale height (60 km vs. 290 km) — they appear as fine stripes rather than broad zones. Tie-break: chose banded over uniform haze for visual interest.",
  "li_161":"<b>Cloud-top texture.</b> Less turbulent than b — c&#x27;s smaller scale height + slower rotation means eddies and Rossby waves develop more slowly. The cloud top reads as a relatively smooth banded surface with fine-scale perturbations.",
  "li_162":"<b>No prominent escape tail.</b> Unlike b, c&#x27;s atmospheric escape is estimated at ~10⁸ g/s — visible only as a faint extended halo rather than a comet-like tail. Cfg renders this as a subtle upper-atmosphere glow at the day-night terminator during super-flare events, not as a discrete trailing structure.",
  "li_163":"<b>Star in sky.</b> AU Mic subtends 3.7° in c&#x27;s sky (7× the Sun from Earth) — a moderate-sized deep-red disk dominating the daytime sky. Surface insolation 6.5× Earth&#x27;s at substellar cloud top. Super-flares brighten illumination by 1–3 magnitudes for tens of minutes — slightly less dramatic than at b because of greater distance.",
  "p_164":"The edge-on debris disk at 35–210 AU appears as a thin bright streak on either side of AU Mic, similar to the view from b but the disk&#x27;s inner edge is now angularly closer because c is itself farther out (disk inner edge at ~3.3° from AU Mic as seen from c, vs. ~5° from b). Sister planets b (inward) and d (inward) are visible as small dots at conjunction; e (outward, if confirmed) is also visible. Transits of b across AU Mic&#x27;s disk are visible from c (b&#x27;s orbital plane is within the same edge-on geometry); these would appear as small dark spots crossing the stellar disk lasting ~3 hours.",
  "h2_165":"Bibliography",
  "h3_166":"Read (visual-informative, drove decisions above)",
  "li_167":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). TESS Sector 27 + ground-based confirmation of c at 18.86 d; transit-derived radius 2.79 R⊕. Cornerstone discovery paper.",
  "li_168":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO + TESS joint analysis; refines c&#x27;s mass to 14.46 ± 3.24 M⊕ and radius to 2.79 ± 0.18 R⊕. <b>Adopted as headline source for mass and density.</b>",
  "li_169":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the Mass-Radius Relation for Sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Mass-radius envelope-mass-fraction calibration. c&#x27;s parameters give ~5% H/He envelope; drives the cfg surface pressure pick.",
  "li_170":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III: Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). The sub-Neptune / super-Earth radius valley at ~1.8 R⊕; c sits on the sub-Neptune side of the valley, statistically favoring the H/He envelope interpretation over the water-world variant.",
  "li_171":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation framework for the sub-Neptune valley; c at 6.5 S⊕ + AU Mic XUV is moderately above the threshold for envelope retention over Gyr timescales but well below it at 22 Myr.",
  "h3_172":"Read (context / methodology, not decision-driving)",
  "li_173":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13428). TESS discovery of b; provides context for the system&#x27;s overall stellar-activity environment and the multi-spot complexity of AU Mic&#x27;s lightcurve.",
  "li_174":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). First robust RV mass for b with GP detrending; methodology applied to c.",
  "li_175":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). TTV-based dynamical mass for b and c; introduces d candidate. Confirms c&#x27;s mass within Mallorquin 2024 uncertainty.",
  "li_176":"<b>Zeng L. et al. 2019</b> — <i>Growth model interpretation of planet size distribution</i>, PNAS 116, 9723 (<code>2019PNAS..116.9723Z</code>, arXiv:1906.04253). Water-world mass-radius models used for the c water-world variant interpretation.",
  "li_177":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric Circulation of Hot Jupiters</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). Equatorial-superrotation GCM framework, scaled to sub-Neptune temperature and rotation for the banded morphology pick.",
  "h3_178":"Read (instrument / non-decisive)",
  "li_179":"<b>Szabó Gy. M. et al. 2021</b> — <i>Spi-Ops campaign on AU Mic c</i> (<code>2021A&amp;A...654A.159S</code>, arXiv:2108.07984). CHEOPS transit timing for c; refines period and inclination but doesn&#x27;t drive visual cfg.",
  "h3_180":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_181":"Conference abstracts and proposal summaries for c-specific characterization (NIRSpec proposals, ground-based RM attempts) without published results don&#x27;t contribute cfg-decisive content. He I 10830 Å observations of c — if attempted — would meaningfully constrain the atmospheric escape rate; no such observation has been published as of this writing.",
  "h2_182":"Open items for follow-up",
  "li_183":"<b>Atmospheric detection.</b> No JWST or ground-based transmission spectrum has been published for c. NIRSpec/NIRISS observations could constrain composition and reveal whether the headline thin-H/He interpretation or the water-world variant is correct. If H₂O features are detected at high significance and H₂ features absent, switch the cfg to a water-world variant with <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> dominated by H₂O/CH₄/CO₂.",
  "li_184":"<b>He I 10830 Å observation.</b> A non-detection of He I escape from c would corroborate the smaller-escape-tail picture; a detection would imply the H/He envelope is being more rapidly stripped than estimated and the cfg&#x27;s atmospheric_escape_rate should be revised upward.",
  "li_185":"<b>Phase curve.</b> Spitzer/JWST phase curve of c would constrain the day-night temperature contrast and the cloud-top distribution. Until measured, the 500 K / 380 K picks remain at medium confidence.",
  "li_186":"<b>Cfg variant: water world.</b> The water-rich interpretation (Zeng 2019 mass-radius branch) is a meaningful alternative to the thin-H/He envelope. A &quot;c water world&quot; cfg variant could ship a steam-dominated atmosphere with H₂O ice clouds and a slightly different visual appearance (bluer-tinted clouds, less haze). Listed as a follow-up cfg variant.",
  "li_187":"<b>Mature-system variant.</b> At 1 Gyr, c would shrink to ~2.5 R⊕ as the envelope cools; a &quot;mature AU Mic c&quot; cfg variant could ship the deflated state for comparison.",

  "p_1":"AU Microscopii c 는 22 Myr 의 M1Ve flare star AU Mic 주위 18.86 d 궤도를 도는 2.79 ± 0.18 R⊕, 14.46 ± 3.24 M⊕ 의 따뜻한 sub-Neptune 입니다. Martioli et al. 2021 (A&amp;A 649, A177. <code>2021A&amp;A...649A.177M</code>. arXiv:2102.05288) 이 더 긴 주기 때문에 원래의 Sector 1 탐색에서 놓쳤던 TESS Sector 27 통과에서 행성을 발견했고, Mallorquin et al. 2024 (A&amp;A 689, A132. <code>2024A&amp;A...689A.132M</code>) 가 결합된 ESPRESSO + TESS 재분석으로 질량과 반지름을 모두 정밀화했습니다. bulk 밀도는 ≈ 3.7 g/cc — 지구의 약 2/3 — 로, 통상의 암석 super-Earth 보다는 낮지만 b 의 0.45 g/cc puffy 영역보다는 상당히 높습니다. c 는 가스 우세 sub-Neptune 과 물 풍부 암석 행성 사이의 질량-반지름 &quot;골짜기&quot; 에 앉습니다 — bulk 조성이 암석/철 코어 위의 ~5% H/He envelope 또는 최소한의 수소 envelope 위의 상당한 물 풍부 mantle 중 어느 것과도 일관됩니다. 이 글 작성 시점까지 대기 검출은 보고되지 않았습니다.",
  "p_2":"<b>NearStars 시나리오 선택. 조석 lock 된 따뜻한 sub-Neptune 으로, 물 풍부 암석/철 코어 위에 얇은 H/He envelope (~5% 질량). 구름 데크 표면 압력 ~10⁶ Pa, M-왜성 조명 하의 띠상 구조를 가진 적당한 구름 형태, 뜨거운 주간 측면, 그리고 c 의 더 깊은 중력 우물과 더 낮은 일사 때문에 b 보다 덜 두드러진 대기 탈출 시그너처.</b> 26 개 cfg 픽 모두 sub-Neptune 문헌 윈도우 안에서 canonical-aligned. 두 개는 tie-break (대기 색 hex, 구름 색 hex). documented divergence 없음.",

  "td_139":"host 별 Teff 에서",
  "h2_140":"Surface synthesis",
  "p_141":"AU Mic c 는 sub-Neptune 영역의 하단 가장자리에 앉습니다. 질량 14.46 M⊕ 와 반지름 2.79 R⊕ 가 밀도 3.7 g/cc 를 줍니다 — 다음 둘 중 하나와 일관됩니다.",
  "p_142":"1. <b>얇은 H/He envelope</b> (질량 ~5%) 위의 암석/철 코어. Lopez &amp; Fortney 2014 질량-반지름 다이어그램은 2.79 R⊕ / 14.46 M⊕ 를 ≤ 10% H/He envelope 가 암석 코어를 관측 크기로 부풀리는 영역에 둡니다. 이것이 canonical sub-Neptune 해석이고 cfg 의 기본 reading 입니다.",
  "p_143":"2. <b>water-world variant</b>. 상당한 H₂O mantle (질량 30–40% 정도) 과 최소한의 수소 envelope. 이도 bulk 밀도와 일관 (water world 에 대한 Zeng 2019 질량-반지름) 이고 의미 있는 대안 — 하지만 sub-Neptune 골짜기 (Fulton 2017. Owen &amp; Wu 2017) 가 c 의 영역에 있는 행성에 대해 H/He-envelope 해석을 통계적으로 선호하고, AU Mic 의 어린 나이 (22 Myr) 가 나이 든 시스템보다 primordial H/He envelope 가 더 잘 유지되었을 가능성을 만듭니다.",
  "p_144":"NearStars 의 목적에서 플레이어가 보는 &quot;가시 표면&quot; 은 ~10⁶ Pa 의 H/He 구름 데크 꼭대기로, b 보다 덜 두드러진 띠 패턴의 띠상 가스 천체로 렌더링됩니다 (더 작은 envelope 질량 + 더 느린 자전 때문). 렌더링할 암석 지형은 없습니다. 내부 구조 — 암석/철 코어, H₂O/규산염 mantle, H/He envelope — 는 밀도 inversion 에 영향을 주지만 가시 외관에는 영향을 주지 않습니다.",
  "p_145":"시스템의 어린 나이가 여기서도 계속 중요합니다. 22 Myr 에서 c 는 아직 수축 중입니다. 현재 밀도 3.7 g/cc 는 envelope 가 식고 행성이 반지름에서 ~10–15% 축소되면서 Gyr 나이에 약 4.5 g/cc 로 증가할 것입니다. 이는 단일 cfg 에서 렌더링하기엔 너무 미묘하지만, 나이 든 시스템 동급보다는 현재의 inflated 상태를 기본값으로 다루는 것을 정당화합니다.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"c 의 대기는 직접 검출되지 않았지만 그 존재와 속성은 간접적으로 제약됩니다.",
  "p_148":"<b>압력.</b> 통과 유도 반지름이 얇은 H/He envelope 의 구름 데크 압력을 대략 10⁶ Pa 로 고정합니다. c 가 water-world variant 라면 이 압력의 지배적 가스가 H₂ 가 아니라 초임계 증기일 것이지만, 가시 구름 데크 위치는 비슷할 것입니다. cfg 는 thin-envelope 해석을 headline reading 으로 채택합니다.",
  "p_149":"<b>조성.</b> 이 글 작성 시점까지 c 에 대한 직접 대기 측정이 없습니다. 조성은 bulk 밀도 + sub-Neptune 질량-반지름 골짜기에서 추론됩니다. H₂ ~80%, He ~15%, 미량 H₂O, CH₄, NH₃, CO 가 거의 태양 풍부도. AU Mic 의 강한 XUV 하 CH₄ 광분해로부터의 광화학 haze 가 예상됩니다. 이들이 Titan 에 견줄 만한 haze 층으로 응결할지는 상층 대기 C/O 비율 (c 에 대해 측정되지 않음) 에 의존합니다. cfg 는 cloud_cover_fraction 0.65 의 적당한 haze 층을 채택합니다 — c 의 인플레이션이 덜하고 직접 구름 검출 증거가 없어 b 의 0.70 보다 살짝 낮습니다.",
  "p_150":"<b>하늘 외관.</b> 저궤도에서 c 는 b 의 더 작고 덜 인플레이션된 버전 처럼 보입니다. 깊은 붉은 M1V 조명 하의 muted red-brown 띠. 적도 superrotation jet 이 보이지만 b 보다 덜 두드러집니다. 구름 꼭대기 색 (<span class=\"hex-chip\" style=\"background:#b0987a\"></span><code>#b0987a</code>) 은 b 의 (<span class=\"hex-chip\" style=\"background:#c0a880\"></span><code>#c0a880</code>) 보다 더 muted 입니다 — 더 높은 중력과 줄어든 대기 스케일 높이 때문에 가시 column 의 haze 축적이 적습니다. 별이 c 의 하늘에서 3.7° 를 채우고 (지구에서 본 태양의 약 7 배) 지배적 조명원입니다. substellar 구름 꼭대기에서 표면 일사량은 지구의 6.5 배. red-shift 됩니다.",
  "p_151":"<b>대기 탈출.</b> c 가 0.119 AU 에서 지구의 6.5 배 일사를 받으므로, XUV 구동 탈출률은 b 의 약 한 자릿수 낮습니다. AU Mic 의 포화 영역 XUV 플럭스 하 에너지 한정 가정에서 ~10⁸ g/s. 이는 시스템의 예상 수명에 걸쳐 H/He envelope 의 몇 % 를 잃기에는 충분합니다 — 장기 진화에 대해서는 의미 있지만 현재 시각 외관에 대해서는 미미합니다. c 등가 정밀도의 He I 10830 Å 검출이 시도된 적 없습니다. 현재 기기로 시도한다면 b 에 견줄 만한 탈출 꼬리가 가능하지만 낮은 유의성일 것입니다.",
  "h2_152":"Rotation &amp; spin synthesis",
  "p_153":"0.51 M☉ 주위 0.119 AU 의 18.86-d sub-Neptune 에 대한 조석 감쇠는 ~10⁶–10⁷ 년 시간 척도로 진행됩니다 (Goldreich &amp; Soter 1966, Neptune- like Q ≈ 10⁴). 22-Myr 시스템 나이에 걸쳐 c 는 1:1 spin-orbit 동기화 에 완전히 잠겨 있을 가능성이 큽니다. 다만 감쇠 시간 척도는 b 보다 시스템 나이에 더 가깝습니다. 이심률 0.18 (Mallorquin 2024) 은 spin 상태가 원리적으로 더 높은 차수의 공명 (Mercury 처럼 3:2) 으로 정착할 수 있을 만큼 충분히 높습니다. 다만 puffy 행성에 대한 지배적 조석 감쇠가 1:1 을 선호하고 cfg 는 동기화 상태를 채택합니다. 이 글 작성 시점까지 c 에 대한 spin–orbit 각도 측정 (Rossiter–McLaughlin) 은 출판되지 않았습니다.",
  "p_154":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 18.859023 일 (1 629 419.6 초). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 일치해야 함.",
  "p_155":"<b>약한 계절 변조.</b> Obliquity 는 0 으로 감쇠. 다만 이심률 0.18 이 궤도 따라 상당한 일사 변동을 구동 (1 +/- 36%). Periapsis 일사 ~9 S⊕, apoapsis ~4 S⊕ — 2 배 변동. 두꺼운 대기가 이를 ~30 K 구름 꼭대기 온도 변동으로 평탄화하며, periapsis 근처에서 주간이 적당히 밝아지는 것으로 보입니다.",
  "p_156":"<b>주야 재분배.</b> b 보다 얇은 H/He envelope 로 c 의 대기는 야간으로 열을 재분배하는 효율이 떨어집니다. 예상 주야 대비. ~120 K (주간 500 K, 야간 380 K). phase 곡선 관측 시도 없음. AU Mic c 통과 깊이 에서 host 별 흑점 신호가 지배할 것입니다.",
  "h2_157":"Visual styling",
  "p_158":"AU Mic c 의 시각 표현은 b 의 더 부드럽고 작은 사촌입니다.",
  "li_159":"<b>전반 외관.</b> muted zonal 띠를 가진 따뜻한 sub-Neptune 디스크. AU Mic 의 각지름 3.7° (지구에서 본 태양의 7 배 — 여전히 지배적 이지만 더 이상 압도적이지는 않음) 가 비춥니다. 디스크는 muted red-brown 띠 (<span class=\"hex-chip\" style=\"background:#8a6a4c\"></span><code>#8a6a4c</code> 주 haze, <span class=\"hex-chip\" style=\"background:#b0987a\"></span><code>#b0987a</code> zone 구름) 를 보입니다 — 렌더링할 대기 질량이 적어 b 보다 살짝 더 muted.",
  "li_160":"<b>띠 구조.</b> 적도 superrotation jet 이 옅은 적도 zone 과 더 어두운 중위도 belt 를 만듭니다. 극 영역은 미묘한 hood-like 어두워짐을 보입니다. 더 작은 대기 스케일 높이 (60 km vs. 290 km) 때문에 띠가 b 보다 좁습니다 — 넓은 zone 이 아니라 가는 줄로 보입니다. Tie-break. 시각적 흥미를 위해 균일 haze 가 아닌 띠 선택.",
  "li_161":"<b>구름 꼭대기 텍스처.</b> b 보다 덜 격렬함 — c 의 더 작은 스케일 높이 + 더 느린 자전이 eddy 와 Rossby wave 가 더 천천히 발달함을 의미합니다. 구름 꼭대기는 fine-scale 섭동을 가진 비교적 매끈한 띠 표면으로 읽힙니다.",
  "li_162":"<b>두드러진 탈출 꼬리 없음.</b> b 와 달리 c 의 대기 탈출은 ~10⁸ g/s 로 추정 — 혜성-like 꼬리가 아니라 옅은 확장 halo 로만 보임. cfg 는 이를 super-flare 이벤트 동안 주야 terminator 의 미묘한 상층 대기 glow 로 렌더링하며, 이산적 후행 구조는 아닙니다.",
  "li_163":"<b>하늘의 별.</b> AU Mic 이 c 의 하늘에서 3.7° 를 차지 (지구에서 본 태양의 7 배) — 주간 하늘을 지배하는 적당한 크기의 깊은 붉은 디스크. substellar 구름 꼭대기에서 표면 일사량 지구의 6.5 배. Super-flare 가 10–60 분간 조명을 1–3 등급 밝힙니다 — 거리가 더 멀어 b 에서보다는 살짝 덜 극적입니다.",
  "p_164":"35–210 AU 의 가장자리 정면 잔해 원반은 AU Mic 양옆으로 가늘고 밝은 줄로 보이며 b 에서 본 시야와 비슷하지만, c 가 더 바깥에 있어 원반의 안쪽 가장자리가 이제 각도상 더 가까워졌습니다 (c 에서 본 AU Mic 으로 부터의 원반 안쪽 가장자리 ~3.3°. b 에서 본 것은 ~5°). 자매 행성 b (안쪽) 와 d (안쪽) 가 conjunction 에서 작은 점으로 보입니다. e (바깥 쪽, 확인된다면) 도 보임. AU Mic 의 디스크를 가로지르는 b 의 통과가 c 에서 보입니다 (b 의 궤도면이 같은 가장자리 정면 기하 안에 있음). 이는 항성 디스크를 가로지르는 작은 어두운 점으로 ~3 시간 동안 보일 것입니다.",
  "h2_165":"Bibliography",
  "h3_166":"Read (visual-informative, drove decisions above)",
  "li_167":"<b>Martioli E. et al. 2021</b> — <i>AU Mic c: a second planet transiting the young M dwarf AU Mic</i>, A&amp;A 649, A177 (<code>2021A&amp;A...649A.177M</code>, arXiv:2102.05288). TESS Sector 27 + 지상 확인으로 18.86 d 의 c. 통과 유도 반지름 2.79 R⊕. cornerstone 발견 논문.",
  "li_168":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO + TESS 결합 분석. c 의 질량을 14.46 ± 3.24 M⊕, 반지름을 2.79 ± 0.18 R⊕ 로 정밀화. <b>질량과 밀도에 대한 headline 출처로 채택</b>.",
  "li_169":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the Mass-Radius Relation for Sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). 질량-반지름 envelope 질량 분율 보정. c 의 파라미터가 ~5% H/He envelope 를 줌. cfg 표면 압력 픽을 구동.",
  "li_170":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III: Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). ~1.8 R⊕ 의 sub-Neptune / super-Earth 반지름 골짜기. c 는 골짜기의 sub-Neptune 쪽에 앉아, water-world variant 보다 H/He envelope 해석을 통계적으로 선호.",
  "li_171":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The Evaporation Valley in the Kepler Planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). sub-Neptune 골짜기에 대한 광증발 프레임워크. 6.5 S⊕ + AU Mic XUV 의 c 는 Gyr 시간 척도에서 envelope 보전 임계점 위에 적당히 있지만 22 Myr 에서는 그 한참 아래.",
  "h3_172":"Read (context / methodology, not decision-driving)",
  "li_173":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13428). TESS 의 b 발견. 시스템 전반의 항성 활동 환경과 AU Mic 광도곡선의 다-흑점 복잡도에 대한 맥락 제공.",
  "li_174":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). GP detrending 으로 b 의 첫 견고한 RV 질량. c 에 적용된 방법론.",
  "li_175":"<b>Wittrock J. M. et al. 2023</b> — <i>Transit Timing Variation Measurements and Dynamical Mass Determination of the AU Mic System</i>, AJ 166, 232 (<code>2023AJ....166..232W</code>, arXiv:2310.10719). b 와 c 에 대한 TTV 기반 동역학 질량. d 후보 도입. Mallorquin 2024 의 불확실도 안에서 c 의 질량 확인.",
  "li_176":"<b>Zeng L. et al. 2019</b> — <i>Growth model interpretation of planet size distribution</i>, PNAS 116, 9723 (<code>2019PNAS..116.9723Z</code>, arXiv:1906.04253). c water-world variant 해석에 사용된 water-world 질량-반지름 모델.",
  "li_177":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric Circulation of Hot Jupiters</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). 적도 superrotation GCM 프레임워크. 띠 형태 픽을 위해 sub-Neptune 온도와 자전으로 스케일.",
  "h3_178":"Read (instrument / non-decisive)",
  "li_179":"<b>Szabó Gy. M. et al. 2021</b> — <i>Spi-Ops campaign on AU Mic c</i> (<code>2021A&amp;A...654A.159S</code>, arXiv:2108.07984). c 의 CHEOPS 통과 타이밍. 주기와 경사각을 정밀화하지만 시각 cfg 를 구동하지 않음.",
  "h3_180":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_181":"c 의 특성화에 대한 학회 초록과 제안 요약 (NIRSpec 제안, 지상 RM 시도) 은 출판된 결과 없이는 cfg-결정적 내용을 기여하지 않습니다. 시도된다면 c 의 He I 10830 Å 관측이 대기 탈출률을 의미 있게 제약할 것입니다. 이 글 작성 시점까지 그런 관측은 출판되지 않았습니다.",
  "h2_182":"Open items for follow-up",
  "li_183":"<b>대기 검출.</b> c 에 대해 JWST 나 지상 기반 투과 스펙트럼이 출판 되지 않았습니다. NIRSpec/NIRISS 관측이 조성을 제약하고 headline thin-H/He 해석이 옳은지 water-world variant 가 옳은지 드러낼 수 있습니다. H₂O 피처가 높은 유의성으로 검출되고 H₂ 피처가 부재 하면 cfg 를 H₂O/CH₄/CO₂ 가 지배하는 <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span> 의 water-world variant 로 전환.",
  "li_184":"<b>He I 10830 Å 관측.</b> c 에서 He I 탈출 비검출이 더 작은 탈출 꼬리 그림을 보강할 것입니다. 검출은 H/He envelope 가 추정보다 더 빠르게 스트립되고 있음을 함의하고 cfg 의 atmospheric_escape_rate 가 상향 조정되어야 함을 의미합니다.",
  "li_185":"<b>Phase 곡선.</b> c 의 Spitzer/JWST phase 곡선이 주야 온도 대비와 구름 꼭대기 분포를 제약할 것입니다. 측정될 때까지 500 K / 380 K 픽은 medium confidence 에 남아 있습니다.",
  "li_186":"<b>cfg variant. water world.</b> 물 풍부 해석 (Zeng 2019 질량-반지름 branch) 은 thin-H/He envelope 의 의미 있는 대안입니다. &quot;c water world&quot; cfg variant 가 H₂O 얼음 구름과 살짝 다른 시각 외관 (더 푸르스름한 구름, 더 적은 haze) 을 가진 증기 우세 대기를 배포할 수 있습니다. follow-up cfg variant 로 등재.",
  "li_187":"<b>성숙한 시스템 variant.</b> 1 Gyr 에서 c 는 envelope 가 식으면서 ~2.5 R⊕ 로 축소될 것입니다. &quot;성숙한 AU Mic c&quot; cfg variant 가 비교를 위해 deflated 상태를 배포할 수 있습니다.",
  "h2_188":"Related",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
