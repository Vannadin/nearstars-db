  "td_153":"Schweitzer 2019",
  "h2_154":"Surface synthesis",
  "p_155":"Teegarden d is the system&#x27;s cold outer rocky world — sub-Earth in mass, beyond the conservative habitable zone, and lacking the insolation needed to maintain liquid water under any plausible atmospheric composition. Dreizler 2024 §5.2 frames it explicitly: &quot;the newly discovered planet d is cold, residing on an orbit of about a month, resulting in temperatures akin to Jupiter or its icy moon Ganymede.&quot;",
  "p_156":"The Solar System analogs that bracket d&#x27;s parameter space are:",
  "li_157":"<b>Ganymede</b> (radius 2634 km, T_surface 110 K, no atmosphere): d would have higher T_surface (~130 K mean) due to its rocky composition and the modest direct M-dwarf flux, but the ice-covered surface analogy partially holds.",
  "li_158":"<b>Mercury</b> (radius 2440 km, T_surface 100-700 K, no atmosphere, thermal extremes from tidal lock partially synchronous, weak B- field): d&#x27;s tidally-locked surface extremes would resemble Mercury but at lower mean temperature.",
  "li_159":"<b>Cold Mars</b> (radius 3389 km, T_surface 130-280 K, 6 mbar CO₂ atmosphere, polar CO₂ frost cycle): the closest direct analog for d&#x27;s atmospheric state if a residual CO₂ atmosphere is present.",
  "p_160":"The cfg picks a hybrid scenario: <b>bare basaltic bedrock with extensive frost mottling</b>, a <b>trace ~5 mbar CO₂-N₂ atmosphere</b>, and a <b>seasonal CO₂ frost deposition cycle</b> on the nightside cold-trap.",
  "p_161":"Surface morphology:",
  "li_162":"<b>Substellar dayside (~200 K)</b>: Bare bedrock, primarily dark basalt / silicate. Frost patches in shadowed crater interiors but not general surface cover. Mercury-style impact crater morphology.",
  "li_163":"<b>Mid-latitudes / terminator (~130 K)</b>: Mixed bedrock and frost cover; CO₂ frost deposition cycles diurnally — but with a 26-day synchronous rotation, &quot;diurnal&quot; is actually orbital.",
  "li_164":"<b>Nightside (~60 K)</b>: Permanent CO₂-frost cold trap. Atmospheric pressure locally drops as CO₂ condenses out. Water ice may also be permanently stable here.",
  "p_165":"<b>Colour choice.</b> The bedrock under M7 V illumination reads as reddish-brown <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> rather than the gray of an Earth-Sun illuminated basalt — the red-shifted SED of the host star saturates the dark mafic minerals into a warm tone. The bright accent <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> (CO₂ frost and water ice) provides dramatic visual contrast against the dark bedrock background.",
  "p_166":"<b>Exposed ice patches.</b> Where present, water ice in cold traps would appear under M7 V illumination as bright cream-orange — distinct from CO₂ frost (also bright, slightly more bluish-pink). Player-visible ice deposits would be the most striking surface features.",
  "h2_167":"Atmosphere synthesis",
  "p_168":"No published GCM exists for d. The cfg picks a <b>trace ~5 mbar CO₂-N₂ atmosphere</b> as a &quot;cold Mars&quot; analog. Justification:",
  "p_169":"1. <b>Volatile delivery</b>: A 0.82-M⊕ rocky body in the cold zone should accrete enough volatiles during planet formation to outgas a thin atmosphere over Gyr timescales. 2. <b>Retention</b>: The 8-Gyr-old quiet star + d&#x27;s cold equilibrium temperature give modest atmospheric escape rates. A primordial atmosphere is more likely to have survived than at b&#x27;s hotter inner-HZ position. 3. <b>Surface freezing</b>: Mean T = 130 K is below the CO₂ frost point at 5 mbar (~150 K), so the nightside cold-trap would deposit CO₂ as ice, reducing atmospheric pressure. Earth-Mars-style seasonal cycle physics applies on the orbital timescale.",
  "p_170":"Composition assumed:",
  "li_171":"<b>Pressure</b> 5 mbar (500 Pa) — Mars-analog.",
  "li_172":"<b>Composition</b> CO₂ 70%, N₂ 28%, Ar 1%, H₂O trace.",
  "li_173":"<b>Clouds</b> Rare CO₂-ice clouds in the terminator twilight zone where surface T crosses CO₂ frost point seasonally.",
  "p_174":"<b>Sky appearance.</b> Almost negligible — only ~5 mbar of atmosphere produces minimal Rayleigh scattering. Sky is nearly black with the host star and sister planets prominently visible. The host appears as a dim red disk of 0.72° angular diameter (about 1.3× the Sun&#x27;s angular size from Earth) — much smaller than from b or c.",
  "p_175":"<b>Auroras</b> are essentially absent — no/trace atmosphere + likely weak magnetic field mean any incoming SEP particles deposit energy directly into the surface rather than producing emission.",
  "p_176":"The alternative cfg scenario is <b>fully airless Mercury-analog</b> — no atmosphere at all. This is consistent with d&#x27;s parameters if (a) volatile accretion was minimal during formation or (b) all primordial atmosphere was stripped during the pre-MS phase. The cfg picks the thin-atmosphere variant because it produces more interesting visuals (frost cycling, occasional CO₂-ice clouds) and because Mars-analog retention is at least as likely as Mercury-analog stripping for a 0.82 M⊕ rocky body at this distance.",
  "h2_177":"Rotation &amp; spin synthesis",
  "p_178":"P_orb = 26.13 d is firmly inside the Griessmeier 2009 tidal-lock timescale for an M = 0.089 M☉ host over 8 Gyr, so d is tidally evolved. But eccentricity 0.07 sits <b>above</b> the Vinson 2017 / Makarov 2018 threshold (3:2 stable only for e ≳ 0.01, exact 1:1 favoured below), so the spin settles into a <b>pseudo-synchronous</b> state — rotating slightly faster than the orbital mean motion, tracking the angular velocity at periastron — rather than a strict 1:1 lock. The substellar point therefore librates and slowly migrates rather than staying exactly fixed. Obliquity is damped to zero. The eccentricity is too small for a stable 3:2 capture, but large enough to forbid an exact synchronous rotation.",
  "p_179":"<b>KSP implementation note.</b> Pseudo-synchronous rotation period is within ~7% of the orbital period (set by the e=0.07 periastron angular velocity); the cfg uses rotation period ≈ orbital period = 26.13 days (2 257 632 s), the same value to Kopernicus precision, with the libration captured as slow substellar drift rather than a distinct period.",
  "p_180":"<b>Atmospheric circulation.</b> With only ~5 mbar of atmosphere there is minimal advection, but a weak superrotating jet might still exist. The atmospheric column is too thin to homogenize temperatures significantly — substellar (~200 K) and nightside (~60 K) differ by ~140 K. The temperature gradient drives the CO₂-frost cycle: CO₂ sublimates on the dayside as the local surface T crosses the frost point at the morning terminator, and deposits at the evening terminator. This is the orbital-period analog of Mars&#x27;s seasonal polar CO₂ cycle.",
  "p_181":"<b>No seasons.</b> Obliquity = 0.",
  "p_182":"<b>Magnetic dynamo.</b> Likely absent or extremely weak. d&#x27;s sub-Earth mass (0.82 M⊕) and slow pseudo-synchronous rotation give a small, slowly-rotating core that probably cannot sustain a self-organized dynamo over 8 Gyr. The cfg picks 5 μT equatorial as a crustal-remnant-only field — much weaker than b&#x27;s 25 μT.",
  "h2_183":"Visual styling",
  "p_184":"Combining surface and atmosphere decisions:",
  "li_185":"<b>Global appearance from orbit.</b> A small dark rocky world with bright frost mottling. The contrast between dark <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> bedrock and bright <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> frost gives a Mercury-like cratered look but with the frost coverage of a cold Mars. The thin atmosphere produces no limb haze.",
  "li_186":"<b>Dayside (substellar)</b>: Predominantly dark basalt. Impact craters punctuate the smooth basaltic plains; some craters have bright frost centers where ejecta exposed sub-surface ice.",
  "li_187":"<b>Terminator zone</b>: Mixed bedrock and frost. The most visually active region — the morning terminator shows CO₂ sublimation signatures as faint cloud puffs; the evening terminator shows CO₂ frost deposition. Color transitions from <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> bare rock to <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> frost across a few hundred km width.",
  "li_188":"<b>Nightside</b>: Permanent CO₂-frost cold trap. Surface is uniformly bright (very high frost albedo) but barely illuminated — frost visibility requires reflected light from the star (only at the edges of the trap), reflected light from sister planets b and c at conjunction, or starlight from background stars.",
  "li_189":"<b>Atmosphere haze</b>: Essentially absent. No discernible limb glow.",
  "li_190":"<b>Star in sky.</b> Teegarden&#x27;s Star subtends 0.72° (about 1.3× the Sun from Earth). Smallest apparent star in the system view.",
  "li_191":"<b>Sister planets in sky.</b> b at inferior conjunction (~0.15°, m_v ≈ −3); c at inferior conjunction (~0.1°, m_v ≈ −2). Both much smaller than from each other&#x27;s perspective. Conjunctions every 6 days for b and 20 days for c at the beat periods.",
  "p_192":"The overall visual impression should evoke Mercury crossed with cold Mars — a small, dark, frosted rocky body that is visually quiet but geologically detailed. From a player&#x27;s perspective, d is the system&#x27;s &quot;explore the rocks&quot; world, contrasting with b&#x27;s &quot;explore the ocean&quot; and c&#x27;s &quot;explore the ice&quot;.",
  "h2_193":"Bibliography",
  "h3_194":"Read (visual-informative, drove decisions above)",
  "li_195":"<b>Dreizler S. et al. 2024</b> — <i>Teegarden&#x27;s Star revisited. A nearby planetary system with at least three planets</i>, A&amp;A 684, A117 (<code>2024A&amp;A...684A.117D</code>, <a href=\"https://arxiv.org/abs/2402.00923\">arXiv:2402.00923</a>). The discovery paper for d. Provides P = 26.13 d, msini = 0.82 M⊕, a = 0.0791 AU, e = 0.07, T_eq = 159 K (A=0.3), S = 0.12 S⊕. The §5.2 comparison to &quot;Jupiter or Ganymede temperatures&quot; is the cfg&#x27;s primary qualitative anchor.",
  "h3_196":"Read (context / methodology, not decision-driving)",
  "li_197":"<b>Zechmeister M. et al. 2019</b> — Context for the host star (b and c discovery; planet d was not yet detected). <a href=\"https://arxiv.org/abs/1906.07196\">arXiv:1906.07196</a>.",
  "li_198":"<b>Schweitzer A. et al. 2019</b> — Stellar parameters (Teff 2904 K, L, R, M). <a href=\"https://arxiv.org/abs/1904.03231\">arXiv:1904.03231</a>.",
  "li_199":"<b>Wandel A. &amp; Tal-Or L. 2019</b> — Habitability framework (b and c only). <a href=\"https://arxiv.org/abs/1906.07704\">arXiv:1906.07704</a>. d falls outside their habitability zone.",
  "h3_200":"Read (instrument / non-cfg-decisive)",
  "li_201":"General Solar System cold-world references (Mercury, Mars, Ganymede analog physics) — not in the bib but used as reference frame.",
  "h3_202":"Not read — no arXiv preprint or low-priority",
  "p_203":"d&#x27;s bibliography is essentially empty by design — only Dreizler 2024 contains the discovery and the entire body of measurements. The cfg synthesis is therefore unusually dependent on a single paper plus Solar System analog reasoning.",
  "h2_204":"Open items for follow-up",
  "li_205":"<b>Atmospheric presence (CRITICAL UNKNOWN)</b>: No direct constraint exists for d. The cfg picks a thin Mars-analog atmosphere as a reasonable default. If a future occultation or thermal-emission observation finds the surface to be Mercury-airless, the cfg should remove the atmosphere and switch surface temperatures to pure radiative-equilibrium (substellar T might rise toward 270 K, nightside drops below 30 K). This airless Mercury-analog is the preserved tie-break variant.",
  "li_206":"<b>Truly Ganymede-analog ice-covered scenario</b>: Dreizler 2024 compares d to &quot;Ganymede temperatures&quot; — Ganymede is fully ice- covered (water-ice crust over a putative subsurface ocean), not bare rock. The cfg&#x27;s bedrock-primary choice is partly visual diversification (b is ocean, c is ice, d is rock) and partly reflects d&#x27;s higher density (~5 g/cc rocky vs Ganymede&#x27;s 1.9 g/cc). An ice-shell variant cfg with global water-ice crust is preserved here as an alternative.",
  "li_207":"<b>Frost cycle period</b>: With P_orb = 26 d the CO₂ frost cycle is fast. No paper has modeled this for d. A future thermal IR observation could detect the seasonal modulation directly.",
  "li_208":"<b>True mass and inclination</b>: Like b and c, d&#x27;s true mass at typical i = 60° geometric inclination would be ~0.95 M⊕ (still sub-Earth). Astrometric follow-up could constrain inclination.",
  "li_209":"<b>Subsurface ocean</b>: d&#x27;s cold surface could overlie a buried liquid water layer if heated by radiogenic decay + tidal dissipation — but with a 26-d orbit and modest eccentricity, tidal heating is small. Not currently rendered in cfg.",
  "li_210":"<b>No GCM specific to d</b>: All recent climate-modelling work on Teegarden&#x27;s system focused on b (Boukrouche 2025, 2024, 2026; Fujii 2026) or c (Hammond 2025). A dedicated cold-rocky GCM for d would significantly tighten the synthesis but does not exist.",
  "h2_211":"Related",

  ko: {
  "p_1":"티가든의 별 d 는 26.13 일 궤도, 궤도 장반경 0.0791 AU 의 최소질량 0.82 M⊕ sub-Earth 암석 행성입니다. 시스템에서 가장 최근에 발견된 행성 으로, Dreizler 2024 (<a href=\"https://arxiv.org/abs/2402.00923\">arXiv:2402.00923</a>) 가 결합된 CARMENES + ESPRESSO + MAROON-X + HPF 시선속도 데이터셋을 사용해 추가했습니다. K = 0.86 ± 0.17 m/s 검출은 다중 기기 적합의 잡음 바닥 근처지만, 베이지안 증거가 5 이상 개선되어 (Dreizler 2024 Table 10: d 를 포함한 model E 대 no-d 모델) — 더 복잡한 모델을 받아들이는 논문 자체의 유의성 기준 — 검출은 견고합니다. d 는 2019 Zechmeister CARMENES 발견 논문 이후에 발견된 시스템 내 유일한 행성입니다.",
  "p_2":"S = 0.12 S⊕ (Dreizler 2024) — 지구 입사 플럭스의 약 1/8 — 그리고 평형 온도 159 K (Bond 알베도 0.3) 또는 ~165 K (영 알베도) 에서, d 는 보수적 거주가능 영역 너머에 단단히 자리 잡고 있습니다. Dreizler 2024 §5.2 는 표면 온도를 명시적으로 &quot;목성 또는 그것의 얼음 위성 가니메데&quot; 와 비교합니다. 두꺼운 온실 대기가 없으면 d 는 얼어붙은 암석입니다. cfg 는 이를 그대로 렌더링하며, 황량한 암석 표면에는 수성을, 차가운 얼어붙은 바다 아날로그에는 가니메데를 비교합니다.",
  "p_3":"d 에 대해 발표된 GCM 모델링이 아직 없습니다 — 너무 차갑고 표준 HZ 카탈 로그 밖이라 Boukrouche 2025 (b 만), Hammond 2025 (b, c, 다른 안쪽-HZ 표적), 또는 Fujii 2026 (b 기준) 에 등장하지 않습니다. 따라서 cfg 합성은 Dreizler 2024 가 명시한 평형 온도와 태양계 아날로그 (수성, 가니메데, 차가운 화성) 에서 분석적 스케일링에 의존합니다.",
  "p_4":"<b>NearStars 시나리오 선택: 미량의 CO₂-N₂ 대기 (차가운 화성과 비슷함) 또는 어쩌면 대기-없음 (이 입사 플럭스에서 수성 아날로그) 을 가진 차가운 sub-Earth 황량한 암석 세계. cfg 는 얇은-대기 변형을 선택합니다. ~5 mbar CO₂-N₂ 잔존물 + 야간측의 계절적 CO₂ 서리 침전, 서리 얼룩을 가진 암반 1차 표면, 극지 / 차가운-트랩 영역의 드문 얼음 패치.</b> 이것이 cfg 의 &quot;차가운 암석&quot; 원형으로, b 의 거주가능 aquaplanet 및 c 의 전 지구 눈덩이와 대비됩니다.",

  "td_138":"<span class=\"field-tt\" data-ko-tip=\"오로라 발생 여부 (대기 + 자기장 동시 필요).\" data-en-tip=\"Auroral activity present — requires both atmosphere and magnetic field.\"><code>aurora_present</code></span>",
  "td_139":"false (또는 극도로 약함)",
  "td_140":"low",
  "td_141":"Tie-break: 대기-없음/미량 + 약한 B-장 — 유의한 오로라 없음",
  "td_142":"<span class=\"field-tt\" data-ko-tip=\"표면 연간 방사선량 (mSv/yr). 지구 ≈ 2.4.\" data-en-tip=\"Annual surface radiation dose (mSv/yr). Earth natural ≈ 2.4.\"><code>surface_radiation_dose_msv_yr</code></span>",

  "td_144":"low",
  "td_145":"Tie-break: 얇은 대기 + 약한 B-장은 화성과 같은 표면 선량을 줌; 조용한 M7 V 가 적당하게 유지",
  "td_146":"<span class=\"field-tt\" data-ko-tip=\"하늘에서 모항성의 시직경 (도). 지구에서 본 태양 ≈ 0.53°.\" data-en-tip=\"Host star angular diameter as seen from the planet (degrees). Sun-from-Earth ≈ 0.53°.\"><code>star_apparent_angular_diameter_deg</code></span>",
  "td_147":"0.72",
  "td_148":"high",
  "td_149":"유도: 2 × 0.107×0.00465 / 0.0791 × 57.3 = 0.72° (지구에서 본 태양의 1.3 배)",
  "td_150":"<span class=\"field-tt\" data-ko-tip=\"모항성 색온도 (K). 태양 ≈ 5778, M dwarf ≈ 2500-3500.\" data-en-tip=\"Host star illumination color temperature (K). Sun ≈ 5778, M dwarfs ≈ 2500–3500.\"><code>stellar_illumination_color_temp_k</code></span>",
  "td_151":"2904",
  "td_152":"high",
  "td_153":"Schweitzer 2019",
  "h2_154":"Surface synthesis",
  "p_155":"티가든 d 는 시스템의 차가운 바깥 암석 세계입니다 — sub-Earth 질량, 보수적 거주가능 영역 너머, 그리고 어떤 그럴듯한 대기 조성에서도 액체 물을 유지할 입사 플럭스를 결여합니다. Dreizler 2024 §5.2 는 이를 명시적으로 표현합니다. &quot;새로 발견된 행성 d 는 약 한 달의 궤도에 있고, 목성 또는 그것의 얼음 위성 가니메데와 비슷한 온도를 가진다.&quot;",
  "p_156":"d 의 매개변수 공간을 묶는 태양계 아날로그는 다음과 같습니다.",
  "li_157":"<b>가니메데</b> (반지름 2634 km, T_surface 110 K, 대기 없음): d 는 암석 조성과 적당한 직접 M-왜성 플럭스 때문에 더 높은 T_surface (~130 K 평균) 을 가지지만, 얼음 피복 표면 비유는 부분적으로 성립.",
  "li_158":"<b>수성</b> (반지름 2440 km, T_surface 100-700 K, 대기 없음, 부분 동기 자전의 조석 잠금으로 인한 열 극단, 약한 B-장): d 의 조석 고정 표면 극단은 수성과 비슷하겠지만 더 낮은 평균 온도에서.",
  "li_159":"<b>차가운 화성</b> (반지름 3389 km, T_surface 130-280 K, 6 mbar CO₂ 대기, 극지 CO₂ 서리 순환): 잔존 CO₂ 대기가 있다면 d 의 대기 상태에 가장 가까운 직접 아날로그.",
  "p_160":"cfg 는 하이브리드 시나리오를 선택합니다. <b>광범위한 서리 얼룩을 가진 황량한 현무암 암반</b>, <b>미량 ~5 mbar CO₂-N₂ 대기</b>, 그리고 야간측 차가운 트랩에서의 <b>계절적 CO₂ 서리 침전 순환</b>.",
  "p_161":"표면 형태론:",
  "li_162":"<b>substellar 주간측 (~200 K)</b>: 황량한 암반, 주로 어두운 현무암 / 규산염. 그늘진 크레이터 내부의 서리 패치는 있지만 일반 표면 피복이 아님. 수성식 충돌 크레이터 형태론.",
  "li_163":"<b>중위도 / 종단경계 (~130 K)</b>: 혼합된 암반과 서리 피복; CO₂ 서리 침전이 매일 순환하지만, 26 일 동기 자전에서 &quot;매일&quot; 은 사실 궤도적.",
  "li_164":"<b>야간측 (~60 K)</b>: 영구 CO₂-서리 차가운 트랩. CO₂ 응결로 국소적 대기 압력이 떨어짐. 물 얼음도 여기서 영구히 안정할 수 있음.",
  "p_165":"<b>색조 선택.</b> M7 V 조명 아래 암반은 지구-태양 조명의 현무암의 회색이 아니라 적갈색 <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> 으로 읽힙니다 — 모성의 빨강-치우친 SED 가 어두운 마픽 광물을 따뜻한 톤으로 포화시킵니다. 밝은 액센트 <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> (CO₂ 서리와 물 얼음) 는 어두운 암반 배경에 극적인 시각 대비를 제공합니다.",
  "p_166":"<b>노출된 얼음 패치.</b> 존재한다면, 차가운 트랩의 물 얼음은 M7 V 조명 아래 밝은 크림-주황으로 보일 것입니다 — CO₂ 서리 (역시 밝지만 약간 더 푸르스 름한 분홍) 와 구별됩니다. 플레이어가 볼 수 있는 얼음 침전물은 가장 두드러진 표면 특징이 될 것입니다.",
  "h2_167":"Atmosphere synthesis",
  "p_168":"d 에 대한 발표된 GCM 이 없습니다. cfg 는 &quot;차가운 화성&quot; 아날로그로 <b>미량 ~5 mbar CO₂-N₂ 대기</b> 를 선택합니다. 정당화는 다음과 같습니다.",
  "p_169":"1. <b>휘발성 전달</b>: 차가운 영역의 0.82-M⊕ 암석 천체는 행성 형성 중 Gyr 시간척도에 걸쳐 얇은 대기를 외기 방출하기에 충분한 휘발성을 모아야 합니다. 2. <b>보존</b>: 8-Gyr 의 늙고 조용한 별 + d 의 차가운 평형 온도는 적당한 대기 탈출률을 줍니다. 원시 대기는 b 의 더 뜨거운 안쪽-HZ 위치보다 살아남을 가능성이 큽니다. 3. <b>표면 동결</b>: 평균 T = 130 K 는 5 mbar 에서 CO₂ 서리점 (~150 K) 아래라, 야간측 차가운 트랩은 CO₂ 를 얼음으로 침전시켜 대기 압력을 감소시킵니다. 지구-화성식 계절 순환 물리가 궤도 시간척도에 적용됩니다.",
  "p_170":"가정된 조성:",
  "li_171":"<b>압력</b> 5 mbar (500 Pa) — 화성-아날로그.",
  "li_172":"<b>조성</b> CO₂ 70%, N₂ 28%, Ar 1%, H₂O 미량.",
  "li_173":"<b>구름</b> 표면 T 가 계절적으로 CO₂ 서리점을 교차하는 종단경계 황혼대 의 드문 CO₂-얼음 구름.",
  "p_174":"<b>하늘 모습.</b> 거의 무시할만함 — ~5 mbar 대기는 최소 Rayleigh 산란을 만듭니다. 하늘은 거의 검고 모성과 자매 행성이 두드러지게 보입니다. 모성은 0.72° 시지름의 어둑한 빨강 원반으로 보임 (지구에서 본 태양의 약 1.3 배) — b 나 c 에서보다 훨씬 작음.",
  "p_175":"<b>오로라</b> 는 본질적으로 없음 — 무/미량 대기 + 가능한 약한 자기장으로 들어오는 SEP 입자는 방출을 만드는 대신 표면에 에너지를 직접 침전시킵 니다.",
  "p_176":"대안 cfg 시나리오는 <b>완전히 무대기 수성-아날로그</b> 입니다 — 대기 전혀 없음. 이는 d 의 매개변수와 일치합니다 (a) 형성 중 휘발성 accretion 이 최소였거나 (b) 모든 원시 대기가 전-MS 단계에서 벗겨졌다면. cfg 는 얇은- 대기 변형을 선택하는데, 그것이 더 흥미로운 시각 (서리 순환, 가끔의 CO₂-얼음 구름) 을 만들고, 화성-아날로그 보존이 이 거리의 0.82 M⊕ 암석 천체에 대해 수성-아날로그 벗겨내기만큼 또는 그 이상으로 가능성 있기 때문입니다.",
  "h2_177":"Rotation &amp; spin synthesis",
  "p_178":"P_orb = 26.13 d 는 M = 0.089 M☉ 모성에 대해 8 Gyr 에 걸쳐 Griessmeier 2009 조석-고정 시간척도 안에 단단히 있어, d 는 조석적으로 진화했습니다. 그러나 이심률 0.07 은 Vinson 2017 / Makarov 2018 임계 (3:2 는 e ≳ 0.01 에서만 안정, 정확한 1:1 은 그 아래에서 선호) 보다 <b>위에</b> 있어, 자전은 엄밀한 1:1 잠금 대신 <b>pseudo-synchronous</b> 상태로 정착합니다 — 궤도 평균 운동보다 약간 빠르게, 근점에서의 각속도를 추적하며 자전합니다. 따라서 substellar 점은 정확히 고정된 채 머무는 대신 칭동하고 천천히 이동합니다. 자전축 기울기는 0 으로 감쇠됩니다. 이심률은 안정적 3:2 포획에는 너무 작지만, 정확한 동기 자전을 금지할 만큼은 큽니다.",
  "p_179":"<b>KSP 구현 노트.</b> pseudo-synchronous 자전 주기는 궤도 주기의 ~7% 안에 있습니다 (e=0.07 의 근점 각속도가 정함). cfg 는 자전 주기 ≈ 궤도 주기 = 26.13 일 (2 257 632 s) 을 사용하며, 이는 Kopernicus 정밀도에서 같은 값이고, 칭동은 별도 주기가 아니라 느린 substellar 이동으로 표현됩니다.",
  "p_180":"<b>대기 순환.</b> ~5 mbar 대기만으로는 advection 이 최소지만, 약한 초회전 제트는 여전히 존재할 수 있습니다. 대기 컬럼이 너무 얇아 온도를 유의하게 균질화하지 못합니다 — substellar (~200 K) 와 야간측 (~60 K) 의 차이가 ~140 K 입니다. 온도 구배는 CO₂-서리 순환을 구동합니다. CO₂ 는 아침 종단경계에서 국소 표면 T 가 서리점을 교차할 때 주간측에서 승화하고, 저녁 종단경계에서 침전됩니다. 이는 화성의 계절적 극지 CO₂ 순환의 궤도- 주기 아날로그입니다.",
  "p_181":"<b>계절 없음.</b> 자전축 기울기 = 0.",
  "p_182":"<b>자기 다이나모.</b> 가능성 있게 없음 또는 극도로 약함. d 의 sub-Earth 질량 (0.82 M⊕) 과 느린 pseudo-synchronous 자전은 8 Gyr 에 걸쳐 자체- 조직된 다이나모를 유지할 수 없을 만큼 작고 느리게 자전하는 핵을 줍니다. cfg 는 5 μT 적도 를 지각-잔존-only 장으로 선택 — b 의 25 μT 보다 훨씬 약함.",
  "h2_183":"Visual styling",
  "p_184":"표면과 대기 결정을 결합하면:",
  "li_185":"<b>궤도에서 본 전체 모습.</b> 밝은 서리 얼룩을 가진 작고 어두운 암석 세계. 어두운 <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> 암반과 밝은 <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> 서리의 대비가 차가운 화성의 서리 피복을 가진 수성-같은 분화구가 많은 모습을 줍니다. 얇은 대기는 림 안개를 만들지 않습니다.",
  "li_186":"<b>주간측 (substellar)</b>: 주로 어두운 현무암. 충돌 크레이터가 매끄러 운 현무암 평원을 점점이; 일부 크레이터는 ejecta 가 표면-아래 얼음을 노출시킨 밝은 서리 중심을 가짐.",
  "li_187":"<b>종단경계대</b>: 혼합된 암반과 서리. 가장 시각적으로 활성적인 영역 — 아침 종단경계는 희미한 구름 puff 로 CO₂ 승화 시그너처를 보임; 저녁 종단경계는 CO₂ 서리 침전을 보임. 색은 수백 km 너비에 걸쳐 <span class=\"hex-chip\" style=\"background:#6a5a4a\"></span><code>#6a5a4a</code> 황량한 암석에서 <span class=\"hex-chip\" style=\"background:#e8e0d4\"></span><code>#e8e0d4</code> 서리로 전이.",
  "li_188":"<b>야간측</b>: 영구 CO₂-서리 차가운 트랩. 표면은 균일하게 밝지만 (매우 높은 서리 알베도) 거의 조명되지 않음 — 서리 가시성은 별의 반사광 (트 랩의 가장자리에서만), 결합 시 자매 행성 b 와 c 의 반사광, 또는 배경별 의 별빛을 필요로 합니다.",
  "li_189":"<b>대기 안개</b>: 본질적으로 없음. 식별 가능한 림 빛 없음.",
  "li_190":"<b>하늘의 별.</b> 티가든의 별은 0.72° 시지름 (지구에서 본 태양의 약 1.3 배). 시스템 뷰에서 가장 작은 겉보기 별.",
  "li_191":"<b>하늘의 자매 행성.</b> b 가 내합에서 (~0.15°, m_v ≈ −3); c 가 내합에서 (~0.1°, m_v ≈ −2). 둘 다 서로의 시점에서보다 훨씬 작음. b 와는 박자 주기에서 6 일마다, c 와는 20 일마다 결합.",
  "p_192":"전체적 시각 인상은 차가운 화성과 교차한 수성을 환기시켜야 합니다 — 시각적으로 조용하지만 지질학적으로 상세한 작고 어둡고 서리 끼인 암석 천체. 플레이어 시점에서 d 는 시스템의 &quot;암석 탐험&quot; 세계로, b 의 &quot;바다 탐험&quot; 및 c 의 &quot;얼음 탐험&quot; 과 대비됩니다.",
  "h2_193":"Bibliography",
  "h3_194":"Read (visual-informative, drove decisions above)",
  "li_195":"<b>Dreizler S. et al. 2024</b> — <i>Teegarden&#x27;s Star revisited. A nearby planetary system with at least three planets</i>, A&amp;A 684, A117 (<code>2024A&amp;A...684A.117D</code>, <a href=\"https://arxiv.org/abs/2402.00923\">arXiv:2402.00923</a>). d 의 발견 논문. P = 26.13 d, msini = 0.82 M⊕, a = 0.0791 AU, e = 0.07, T_eq = 159 K (A=0.3), S = 0.12 S⊕ 제공. §5.2 의 &quot;목성 또는 가니메데 온도&quot; 비교가 cfg 의 1차 정성적 닻.",
  "h3_196":"Read (context / methodology, not decision-driving)",
  "li_197":"<b>Zechmeister M. et al. 2019</b> — 모성에 대한 맥락 (b 와 c 발견; d 는 아직 검출되지 않음). <a href=\"https://arxiv.org/abs/1906.07196\">arXiv:1906.07196</a>.",
  "li_198":"<b>Schweitzer A. et al. 2019</b> — 별 매개변수 (Teff 2904 K, L, R, M). <a href=\"https://arxiv.org/abs/1904.03231\">arXiv:1904.03231</a>.",
  "li_199":"<b>Wandel A. &amp; Tal-Or L. 2019</b> — 거주가능성 프레임 (b 와 c 만). <a href=\"https://arxiv.org/abs/1906.07704\">arXiv:1906.07704</a>. d 는 그들의 거주가능 영역 밖.",
  "h3_200":"Read (instrument / non-cfg-decisive)",
  "li_201":"일반 태양계 차가운-세계 참고 (수성, 화성, 가니메데 아날로그 물리) — bib 에는 없지만 참고 프레임으로 사용.",
  "h3_202":"Not read — no arXiv preprint or low-priority",
  "p_203":"d 의 참고문헌은 본질적으로 설계상 비어 있음 — 발견과 전체 측정값 본체 를 담은 것은 Dreizler 2024 단 하나입니다. cfg 합성은 따라서 단일 논문 과 태양계 아날로그 추론에 비정상적으로 의존합니다.",
  "h2_204":"Open items for follow-up",
  "li_205":"<b>대기 존재 (핵심 미지)</b>: d 에 대한 직접 제약이 없습니다. cfg 는 합리적 기본값으로 얇은 화성-아날로그 대기를 선택합니다. 미래의 차폐 또는 열-방출 관측이 표면을 수성식 무-대기로 찾으면, cfg 는 대기를 제거하고 표면 온도를 순수 복사-평형으로 전환해야 합니다 (substellar T 는 ~270 K 로 올라갈 수 있고, 야간측은 30 K 아래로 떨어짐). 이 무- 대기 수성-아날로그가 보존된 tie-break 변형입니다.",
  "li_206":"<b>진짜 가니메데-아날로그 얼음 피복 시나리오</b>: Dreizler 2024 는 d 를 &quot;가니메데 온도&quot; 와 비교 — 가니메데는 황량한 암석이 아니라 완전히 얼음 피복임 (가설적 표면-아래 바다 위의 물-얼음 지각). cfg 의 암반-1차 선택은 부분적으로 시각 다양화 (b 는 바다, c 는 얼음, d 는 암석) 이며 부분적으로 d 의 더 높은 밀도 (~5 g/cc 암석 대 가니메데의 1.9 g/cc) 를 반영합니다. 전 지구 물-얼음 지각을 가진 얼음-껍질 변형 cfg 는 여기에 대안으로 보존됩니다.",
  "li_207":"<b>서리 순환 주기</b>: P_orb = 26 d 에서 CO₂ 서리 순환은 빠릅니다. d 에 대해 이를 모델링한 논문 없음. 미래의 열 IR 관측이 계절 변조를 직접 검출할 수 있습니다.",
  "li_208":"<b>실제 질량과 경사</b>: b 와 c 와 같이, 전형적 i = 60° 기하학적 경사에서 d 의 실제 질량은 ~0.95 M⊕ 가 될 것입니다 (여전히 sub-Earth). 측성학적 follow-up 이 경사를 제약할 수 있습니다.",
  "li_209":"<b>표면-아래 바다</b>: d 의 차가운 표면은 방사성 붕괴 + 조석 소산으로 가열되면 묻힌 액체 물 층 위에 있을 수 있습니다 — 그러나 26-d 궤도와 적당한 이심률에서 조석 가열은 작습니다. 현재 cfg 에서 렌더링되지 않음.",
  "li_210":"<b>d 에 specific 한 GCM 없음</b>: 티가든 시스템에 대한 최근의 모든 기후- 모델링 작업은 b (Boukrouche 2025, 2024, 2026; Fujii 2026) 또는 c (Hammond 2025) 에 집중했습니다. d 에 헌신적인 차가운-암석 GCM 은 합성을 유의하게 조여줄 수 있지만 존재하지 않습니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
