  "h2_137":"Surface synthesis",
  "p_138":"61 Vir c has <b>no rocky surface</b> in the cfg-rendering sense — the planet is a sub-Neptune with a continuous H/He envelope wrapped over a rocky/icy core. The visible &quot;surface&quot; the cfg renders is the cloud-deck at the ~1 bar reference level, where photochemical haze and deep KCl / Na₂S clouds combine to produce a featureless globally cloud-covered appearance under solar-twin illumination.",
  "p_139":"The deep interior structure is inferred from mass–radius scaling for sub-Neptunes (Lopez &amp; Fortney 2014, Howe 2014). For Msini = 18.2 M⊕ at 0.22 AU around a G-dwarf, three mass–radius branches are observationally consistent:",
  "p_140":"1. <b>H/He envelope branch (canonical)</b> — 3–5% envelope mass over a rocky core, giving R = 4.0–5.0 R⊕. Density ~1.1 g/cc. This is the warm sub-Neptune archetype, indistinguishable in mass-only measurements from GJ 1214 b, HD 97658 b, or K2-18 b.",
  "p_141":"2. <b>Water-rich envelope branch</b> — ~20% water mass fraction over a rocky core with no H/He, giving R ≈ 3.5–4.0 R⊕. Density ~1.7 g/cc. Visually slightly bluer and less hazy than the H/He case (Madhusudhan 2021 Hycean class but smaller mass).",
  "p_142":"3. <b>Iron-rich rocky branch</b> — pure rock+iron giving R ≈ 2.4 R⊕, density ≈ 6.5 g/cc. Excluded by Owen &amp; Wu 2017 photoevaporation physics: a 2.4 R⊕ rocky planet at 18 M⊕ would be at the photoevaporation valley center, but at 0.22 AU around a G-dwarf the loss rate is far below the threshold for stripping a 3–5% H/He envelope. Loss-driven evolution does not produce this branch at c&#x27;s parameters.",
  "p_143":"The cfg adopts <b>branch 1 (H/He envelope)</b> as canonical. This is a tie-break against branch 2 (water-rich); both are observationally consistent at the RV level, but branch 1 is more common in the sub-Neptune population (Fulton 2017 radius valley, sub-Neptunes dominate at ~2.5 R⊕ peak). The water-rich branch is preserved as a cfg variant in Open items.",
  "p_144":"<b>Color choice.</b> Under solar-twin illumination, the dominant visible features are the photochemical haze layer in the upper stratosphere (producing the warm cream cloud-top tint <span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code>) and the deep KCl/Na₂S cloud deck at the ~1 bar reference level. The Rayleigh scattering signature of the H/He primary atmosphere contributes a faint blue tint at the limb (<span class=\"hex-chip\" style=\"background:#a8b8cc\"></span><code>#a8b8cc</code>), but the photochemical haze overlay damps it considerably — GJ 1214 b&#x27;s transmission spectrum (Kreidberg 2014) shows essentially no Rayleigh feature visible because the haze blocks short wavelengths.",
  "p_145":"<b>Morphology under pseudo-synchronous rotation.</b> With a 38 d orbital period and e=0.14, the spin state is most likely <b>pseudo-synchronous</b> (Hut 1981, Henning &amp; Hurford 2014) — rotation rate matching the orbital angular velocity at pericenter, ~30 d sidereal period rather than locked 38 d. Showman 2009 and Lewis 2014 GCMs for warm sub-Neptunes in this rotation regime predict a strong eastward super-rotating equatorial jet (~1 km/s) driving a thin zonal banding structure under the global haze deck. The bands are faint — order-unity-contrast clouds + haze blend them into a soft global gradient rather than a Jupiter-style sharp zonal stripes.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"c&#x27;s atmosphere is canonical sub-Neptune territory: a retained H/He primary envelope of 3–5% by mass over a rocky/icy core, with trace condensable volatiles (H₂O, CH₄, NH₃) and photochemical hazes that dominate the optical appearance.",
  "p_148":"<b>Retention argument.</b> Owen &amp; Wu 2017&#x27;s photoevaporation valley analysis places c well to the right of the loss boundary. For an 18 M⊕ core at 0.22 AU around a 0.822 L☉ G-dwarf, the XUV-driven mass loss rate scales to ~10⁷ g/s — about 0.1% of the envelope mass lost per Gyr. Over the 5.5 Gyr system age the total loss is ~0.8% of the envelope, well below the 3–5% nominal envelope mass. c retains its primary atmosphere comfortably.",
  "p_149":"<b>Pressure profile.</b> No surface — the envelope is hydrostatically continuous from low-density gas at the top to multi-kbar supercritical H/He at the rocky-core boundary. The cfg adopts a 1-bar reference level for the &quot;cloud-top&quot; surface that the renderer treats as the visible disk. Scale height 220 km at this level is consistent with sub-Neptune scale-height estimates (Lewis 2014). Atmospheric composition follows the standard primordial-envelope model (Madhusudhan 2012, Moses 2013): H₂ ~75%, He ~24%, H₂O ~0.3%, CH₄ ~0.1%, NH₃ ~0.05%, with traces of CO, CO₂, HCN, and photochemical hazes that dominate the optical appearance.",
  "p_150":"<b>Clouds.</b> At T_eq ~ 480 K and pressures of 0.1–10 bar, the condensable species in equilibrium are KCl (condensing at ~600 K), Na₂S (~700 K), and water ice (condensing at upper altitudes where T drops below 273 K). KCl/Na₂S clouds form the deep cloud deck; water-ice clouds form an upper-altitude condensate veil where the temperature inverts above the haze layer. Above all of this, photochemical haze (Morley 2015, Lavvas 2017) builds up from methane + HCN photolysis under solar-twin UV — producing the optically thick blanket that makes warm sub-Neptunes featureless in transmission spectroscopy.",
  "p_151":"<b>Sky appearance from a hypothetical aerostat at 1 bar.</b> The sky above is hazy cream-orange (<span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code>) with the disk of 61 Vir visible through the haze as a diffuse warm-yellow patch at angular diameter ~0.23° — about half the Sun&#x27;s apparent diameter from Earth. Surface brightness through the haze is significantly reduced from the direct insolation level (S = 17.4 S⊕ at top of atmosphere becomes ~3 S⊕ at the 1-bar level after haze attenuation). Day-night contrast is moderate: ~80 K temperature difference between the substellar cloud-top (~460 K) and antistellar cloud-top (~380 K) drives a pseudo-zonal circulation that smooths out sharp terminator features.",
  "p_152":"<b>Photochemical haze chemistry.</b> The 5568 K solar-twin SED gives a near-Earth-Sun UV-to-visible ratio. Methane photolysis at λ ≲ 200 nm produces HCN, C₂H₂, and higher-mass haze precursors that nucleate into the optically thick haze layer (Lavvas 2017). The haze is distributed across the stratosphere from ~0.01 to ~0.1 bar, with optical depth τ ≫ 1 at visible wavelengths — making c essentially opaque to direct surface viewing.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"c&#x27;s spin state is determined by the balance of tidal-damping and eccentricity-pumping timescales. At a 38-day orbital period, 0.22 AU separation, and 18 M⊕ mass, the tidal locking timescale for an Earth-analog interior Q is ~1–3 Gyr (Henning &amp; Hurford 2014 scaling). This is comparable to but shorter than the 5.5 Gyr system age — c has had time to damp obliquity and spin angular velocity but not necessarily to reach strict 1:1 lock.",
  "p_155":"With eccentricity 0.14 (Vogt 2010), Hut 1981&#x27;s pseudo-synchronous state is the most likely outcome: rotation rate matching the orbital angular velocity at pericenter, giving a sidereal period of ~30 d (vs. the orbital 38 d). This produces a slowly drifting substellar point in the rotating frame, with the substellar longitude completing a full rotation in ~150 days.",
  "p_156":"<b>KSP implementation note.</b> The cfg adopts <code>rotation_period_days</code> = 30 (pseudo-synchronous, ~2 590 000 s in Kopernicus units). This is distinct from the orbital period and produces a non-locked but slow rotation that gives c a faint diurnal cycle for any orbital observer.",
  "p_157":"<b>Obliquity.</b> Tidal damping has reduced obliquity but the pseudo-synchronous state allows non-zero residual obliquity. The cfg picks 5° as a tie-break — small enough to be dynamically plausible, large enough to give a faint seasonal modulation of the cloud bands.",
  "p_158":"<b>Tidal heating.</b> Bolmont 2020 / Henning &amp; Hurford 2014 scaling for e=0.14 at 38 d period and 18 M⊕ mass gives a tidal heating contribution of 0.001–0.01 W/m². This is negligible relative to the ~250 W/m² absorbed insolation at the cloud-top, so c is firmly <b>insolation-dominated</b> in its thermal budget. The deep interior may host modest residual heat from formation + radiogenic decay (~0.01 W/m²), again small relative to insolation.",
  "p_159":"<b>No seasons in the rocky-planet sense.</b> Eccentricity 0.14 drives a ±30% modulation of insolation over the orbit, but with pseudo-synchronous rotation and a deep gaseous envelope the thermal response is heavily damped — diurnal cycles average out at depth, and the visible cloud deck shifts by only a few Kelvin between peri and apo passages.",
  "h2_160":"Visual styling",
  "p_161":"Combining the surface and atmosphere decisions:",
  "li_162":"<b>Global appearance (orbit view).</b> A pale, hazy disk with a warm cream-orange overall tint (<span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code>) under solar-twin illumination. Faint zonal banding visible at high contrast settings; otherwise a featureless soft-edged sphere. Limb haze adds a steel-blue Rayleigh-scattered glow (<span class=\"hex-chip\" style=\"background:#a8b8cc\"></span><code>#a8b8cc</code>) at the day-night terminator.",
  "li_163":"<b>Cloud-top morphology.</b> Pseudo-zonal banding from the super-rotating equatorial jet (~3–5 bands across the disk, with faint contrast). Substellar region slightly brighter (~460 K warmer haze + thicker condensate veil); antistellar slightly darker.",
  "li_164":"<b>Photochemical haze layer.</b> Stratospheric haze ~10⁵ km altitude produces the dominant warm-cream visible color. Optical depth ≫ 1 blocks any view of deeper cloud structure — c is featureless at near-infrared and visible wavelengths.",
  "li_165":"<b>Limb haze.</b> Pale steel-blue Rayleigh scattering at λ ≲ 0.5 μm from the H/He upper atmosphere, attenuated but visible at the terminator and in transmission. Adds a soft cyan ring around the disk in oblique sunlight.",
  "li_166":"<b>Nightside.</b> Reflected sister-planet light from b (very dim, small disk) and d (similar magnitude, larger phase). Nightside cloud-top temperature 380 K — too cool to be visible in optical thermal emission but bright in mid-IR (~10 μm).",
  "li_167":"<b>Star in sky.</b> 61 Vir subtends 0.235° at c — about half the Sun&#x27;s angular size from Earth. Through the haze it appears as a diffuse warm-yellow patch (<span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-encoded host tint), not a sharp disk. Surface illumination ~17× Earth&#x27;s at top of atmosphere, ~3× Earth&#x27;s at the 1-bar cloud-top after haze attenuation.",
  "li_168":"<b>Sister planets in sky.</b> b (next inward at 0.05 AU) appears at angular size ~0.04° at inferior conjunction (every ~5 days); d (next outward at 0.48 AU) appears at ~0.1° at conjunction (every ~55 days). Near-coplanar geometry; conjunctions are sky events for any in-system observer.",
  "li_169":"<b>Optional banding animation.</b> A slow zonal drift of the cloud bands (timescale ~30 d, matching the pseudo-synchronous rotation period) would add subtle dynamism to the otherwise static-looking disk. Low-priority Phase 3.5 visual detail.",
  "h2_170":"Bibliography",
  "h3_171":"Read (visual-informative, drove decisions above)",
  "li_172":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). The discovery paper. Reports c&#x27;s orbit (P=38.021 d, a=0.2175 AU, e=0.14, ω=341°) and minimum mass (Msini = 18.2 ± 1.1 M⊕). HIRES + AAT joint RV solution. All Decisions table orbital + mass values anchor here.",
  "li_173":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation-valley physics. Places c well to the right of the loss boundary (XUV-driven loss ~0.6% of envelope over 6 Gyr). Anchors <code>atmosphere_present = true</code> with high confidence.",
  "li_174":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Sub-Neptune envelope mass-radius scaling. For 18 M⊕ with 3–5% H/He envelope, R = 4.0–5.0 R⊕; cfg picks 4.5 R⊕. Anchors the <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break.",
  "li_175":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>, arXiv:1311.0329). Sub-Neptune mass-radius diversity; supports the H/He envelope canonical reading and bounds the water-rich alternative.",
  "li_176":"<b>Madhusudhan N. 2012</b> — <i>C/O ratio as a dimension for characterizing exoplanetary atmospheres</i>, ApJ 758, 36 (<code>2012ApJ...758...36M</code>, arXiv:1209.2412). Sub-Neptune primordial-envelope composition baseline; drives the H/He primary + trace condensable composition.",
  "li_177":"<b>Moses J. I. et al. 2013</b> — <i>Compositional diversity in the atmospheres of hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). Photochemistry of sub-Neptunes; informs the CH₄/HCN/photochemical-haze chain.",
  "li_178":"<b>Morley C. V. et al. 2015</b> — <i>Thermal emission and reflected light spectra of super Earths with flat transmission spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). Hazy sub-Neptune retrieval framework; drives the <code>atmosphere_tint</code> and <code>cloud_tint</code> tie-break (warm cream haze under solar illumination).",
  "li_179":"<b>Lavvas P. &amp; Koskinen T. 2017</b> — <i>Aerosol properties of the atmospheres of extrasolar giant planets</i>, ApJ 847, 32 (<code>2017ApJ...847...32L</code>, arXiv:1707.08077). Sub-Neptune photochemical haze formation mechanism; informs the global cloud cover and haze optical depth.",
  "li_180":"<b>Kreidberg L. et al. 2014</b> — <i>Clouds in the atmosphere of the super-Earth exoplanet GJ 1214 b</i>, Nature 505, 69 (<code>2014Natur.505...69K</code>, arXiv:1401.0022). The canonical &quot;featureless transmission spectrum&quot; sub-Neptune; c is the warmer analog with similar expected visual.",
  "li_181":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric circulation of hot Jupiters: coupled radiative-dynamical GCM</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). Establishes the super-rotating equatorial jet in tidally-influenced gas planets; informs c&#x27;s <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> (zonal banding).",
  "li_182":"<b>Lewis N. K. et al. 2014</b> — <i>GCMs of warm sub-Neptunes</i>, ApJ 795, 150 (<code>2014ApJ...795..150L</code>, arXiv:1410.0008). GCM scaling for the ~38 d period sub-Neptune regime; supports the pseudo-synchronous spin and equatorial-jet circulation.",
  "li_183":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). Pseudo-synchronous spin equilibrium for eccentric orbits; foundational citation for c&#x27;s spin state.",
  "li_184":"<b>Henning W. G. &amp; Hurford T. 2014</b> — <i>Tidal heating in multilayered terrestrial exoplanets</i>, ApJ 789, 30 (<code>2014ApJ...789...30H</code>, arXiv:1311.5904). Sub-Neptune tidal heating + spin-locking timescales; gives ~1–3 Gyr for c&#x27;s parameters.",
  "li_185":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution</i> (<code>2020A&amp;A...644A.165B</code>, arXiv:2002.02015). Provides the tidal-heating flux scaling for c (0.001–0.01 W/m²).",
  "h3_186":"Read (context / methodology, not decision-driving)",
  "li_187":"<b>Rathsam A. et al. 2023</b> — <i>Lithium depletion in solar analogs</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589). Inherited from host-star synthesis. Phase 2 anchor for 61 Vir age (5.50 +0.78/-0.74 Gyr); sets the photoevaporation-evolution timescale.",
  "li_188":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters V</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360). Inherited from host-star synthesis. L = 0.8222 ± 0.0033 L☉ anchors the insolation derivation.",
  "li_189":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs</i> (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). Inherited from host-star synthesis. Activity-age 6.1 ± 1.7 Gyr — demoted to cross-check vs Rathsam 2023 isochrone (documented divergence in host-star reconciliation).",
  "li_190":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). Radius valley demographics; supports the H/He envelope canonical reading for c&#x27;s 18 M⊕ population.",
  "li_191":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i> (<code>2012MNRAS.424.1206W</code>, arXiv:1206.2370). Inherited from host-star synthesis. Cited briefly; the cold debris ring at 30 AU does not interact dynamically with c at 0.22 AU.",
  "li_192":"<b>Madhusudhan N. et al. 2021</b> — <i>Habitability and biosignatures of Hycean worlds</i>, ApJ 918, 1 (<code>2021ApJ...918....1M</code>, arXiv:2108.10888). Hycean alternative scenario for sub-Neptunes; relevant to d&#x27;s Open-items variant. Less applicable to c at its warmer T_eq but cited as the broader sub-Neptune classification framework.",
  "h3_193":"Read (instrument-only, not visual-informative)",
  "li_194":"<b>Marcy G. W. et al. 2014</b> — Kepler super-Earth statistics context.",
  "h3_195":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_196":"The c-specific arXiv record is small. The not-read set is predominantly:",
  "li_197":"<b>Dynamical-stability follow-ups</b> of the Vogt 2010 system.",
  "li_198":"<b>Transit search non-detections</b> confirming c does not transit; Geometric transit probability for c at e=0.14, a=0.22 AU is ~1.5%, so the non-detection is consistent with random inclination.",
  "li_199":"<b>Generic photoevaporation-rate calculations</b> without 61 Vir-specific stellar wind models.",
  "h2_200":"Open items for follow-up",
  "li_201":"<b>True mass and radius from direct imaging.</b> c&#x27;s mass is Msini-only and its radius is a mass–radius scaling estimate. A future direct-imaging campaign would yield true mass + radius from a reflected-light detection; HabEx / LUVOIR era observation.",
  "li_202":"<b>Cfg variant: water-rich Hycean-style envelope.</b> At c&#x27;s insolation (T_eq ~ 480 K), a water-rich envelope with H₂ atmosphere is observationally consistent with the H/He primary envelope. Cfg variant would render c as a denser, less hazy, deeper-blue disk. Document as Phase 3.5 alternative.",
  "li_203":"<b>Cfg variant: rocky no-envelope alternative.</b> Photoevaporation physics strongly favors envelope retention but a small residual probability remains for a pure-rocky 18 M⊕ planet (R ≈ 2.4 R⊕, density ~6.5 g/cc). Render would be a hot rocky world similar to b but cooler — visually distinct from the haze-covered canonical reading. Preserve as cfg variant.",
  "li_204":"<b>Future JWST or HabEx transmission spectroscopy.</b> Although c does not transit, future direct-imaging spectroscopy could resolve the cloud-top composition. Refinement opportunities: H₂O/CH₄/NH₃ abundances, haze optical depth, deeper cloud composition (KCl vs Na₂S vs ZnS).",
  "li_205":"<b>GCM-driven cloud morphology.</b> Lewis 2014 GCMs for warm sub-Neptunes predict zonal banding but the band contrast at c&#x27;s specific parameters has not been simulated. A targeted GCM run would constrain the <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> choice between &quot;global haze deck&quot; and &quot;haze + visible Jupiter-style bands.&quot;",
  "li_206":"<b>Atmospheric escape rate cross-check.</b> Owen &amp; Wu 2017 generic scaling supports envelope retention; a 61 Vir-specific stellar wind + XUV model (Vidotto-style) would refine the loss-rate estimate.",
  "h2_207":"Related",

  "p_1":"61 Vir c 는 G6.5V 솔라 트윈 61 Virginis 주위에서 RV 로 검출된 세 행성 중 가운데 행성이며, Vogt et al. 2010 (HIRES + AAT 결합 해) 가 보고 했습니다. 검출은 RV 전용이고 트랜짓이 없으므로, 직접 측정된 양은 궤도 주기 P = 38.021 ± 0.034 일, 장반경 a = 0.2175 AU, 이심률 e = 0.14, 근일점 인수 ω = 341°, 최소 질량 Msini = 18.2 ± 1.1 M⊕ 로 한정됩니다. 진질량은 18.2 M⊕ 이상이고, 시스템의 거의 edge-on 경사 posterior 에서 가장 그럴듯한 범위는 18–25 M⊕ 입니다. 반지름은 측정된 바 없습니다. 반사광 직접 영상은 미래 등급의 관측 (HabEx / LUVOIR 시대) 이기 때문에, 현재 상태의 대기는 제약되지 않습니다.",
  "p_2":"<b>NearStars 시나리오 선택. 보유된 H/He 일차 외피 (~3–5% 질량), 광화학 흡수체에서 비롯되는 haze 가 낀 성층권, 그리고 솔라 트윈 조명 아래 사실상 featureless 구름-덮인 디스크를 가진 따뜻한 sub-Neptune 입니다.</b> 이는 c 의 약간 더 따뜻한 일조량 (S ≈ 17 S⊕, T_eq(A=0) ≈ 525 K, T_eq(A=0.3) ≈ 478 K) 에 적용된 GJ 1214 b / HD 97658 b 우주화학 원형 입니다. 대안 — H/He 외피가 없는 암석 / 철-풍부 super-Neptune — 은 Open items 의 cfg variant 로 보존합니다. G 왜성 0.22 AU 의 18 M⊕ 코어에 대한 광증발 계산은 외피 보유를 단정적으로 선호하지만, 벌크 조성 mass-radius 분기는 트랜짓 없이는 관측적으로 축퇴되어 있기 때문입니다.",

  "td_136":"호스트 Teff (Rathsam 2023)",
  "h2_137":"Surface synthesis",
  "p_138":"61 Vir c 는 cfg-렌더링 의미의 <b>암석 표면이 없습니다</b> — 행성은 암석 / 얼음 핵 위에 H/He 외피가 연속적으로 감긴 sub-Neptune 입니다. cfg 가 렌더링하는 가시 &quot;표면&quot; 은 ~1 bar 기준 레벨의 구름 데크입니다. 거기서 광화학 haze 와 깊은 KCl / Na₂S 구름이 결합해 솔라 트윈 조명 아래 featureless 전역 구름-덮인 외관을 생성합니다.",
  "p_139":"깊은 내부 구조는 sub-Neptune mass-radius 스케일링 (Lopez &amp; Fortney 2014. Howe 2014) 에서 추론됩니다. G 왜성 0.22 AU 의 Msini = 18.2 M⊕ 에서 관측적으로 일관된 mass-radius 분기 세 가지가 있습니다.",
  "p_140":"1. <b>H/He 외피 분기 (canonical).</b> 암석 핵 위 3–5% 외피 질량. R = 4.0–5.0 R⊕. 밀도 ~1.1 g/cc. 따뜻한 sub-Neptune 원형으로, 질량-단독 측정에서 GJ 1214 b, HD 97658 b, 또는 K2-18 b 와 구분 불가.",
  "p_141":"2. <b>물-풍부 외피 분기.</b> 암석 핵 위 H/He 없이 ~20% 물 질량 비율. R ≈ 3.5–4.0 R⊕. 밀도 ~1.7 g/cc. H/He 경우보다 시각적으로 약간 더 푸르고 덜 haze 가 낀 모습 (Madhusudhan 2021 Hycean 등급이지만 더 작은 질량).",
  "p_142":"3. <b>철-풍부 암석 분기.</b> 순수 암석+철 R ≈ 2.4 R⊕. 밀도 ≈ 6.5 g/cc. Owen &amp; Wu 2017 광증발 물리에서 배제. 18 M⊕ 의 2.4 R⊕ 암석 행성은 광증발 valley 중심에 있지만, G 왜성 0.22 AU 에서 손실율은 3–5% H/He 외피를 벗기는 임계값 한참 아래. 손실 구동 진화는 c 의 파라미터에서 이 분기를 만들지 않음.",
  "p_143":"cfg 는 <b>분기 1 (H/He 외피)</b> 을 canonical 로 채택합니다. 이는 분기 2 (물-풍부) 에 대한 tie-break 입니다. 둘 다 RV 수준에서 관측적으로 일관 하지만, 분기 1 이 sub-Neptune 인구에서 더 흔합니다 (Fulton 2017 반지름 valley. sub-Neptune 이 ~2.5 R⊕ 피크에서 우세). 물-풍부 분기는 Open items 의 cfg variant 로 보존합니다.",
  "p_144":"<b>색 선택.</b> 솔라 트윈 조명 아래 dominant 가시 feature 는 상부 성층권 의 광화학 haze 층 (따뜻한 크림 구름-top 색조 <span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code> 생성) 과 ~1 bar 기준 레벨의 깊은 KCl/Na₂S 구름 데크입니다. H/He 일차 대기의 Rayleigh 산란 시그니처는 limb 에 옅은 청색 색조 (<span class=\"hex-chip\" style=\"background:#a8b8cc\"></span><code>#a8b8cc</code>) 를 기여하지만, 광화학 haze 오버레이가 그것을 상당히 감쇠합니다 — GJ 1214 b 의 투과 스펙트럼 (Kreidberg 2014) 은 haze 가 단파장을 차단하기 때문에 본질적 으로 가시 Rayleigh feature 가 없습니다.",
  "p_145":"<b>Pseudo-synchronous 자전 하의 형태.</b> 38 일 궤도 주기와 e=0.14 에서 spin 상태는 <b>pseudo-synchronous</b> 가 가장 그럴듯합니다 (Hut 1981, Henning &amp; Hurford 2014) — 자전율이 근일점 궤도 각속도와 일치하는 ~30 일 sidereal 주기 (lock 된 38 일이 아닌). 이 자전 영역의 따뜻한 sub-Neptune 에 대한 Showman 2009 와 Lewis 2014 GCM 은 전역 haze 데크 아래에 얇은 zonal banding 구조를 구동하는 강한 동풍 super-rotating 적도 jet (~1 km/s) 을 예측합니다. 띠는 옅음 — 단위 대비 정도의 구름 + haze 가 그것을 Jupiter 스타일의 또렷한 zonal 줄무늬가 아닌 부드러운 전역 gradient 로 섞어 버립니다.",
  "h2_146":"Atmosphere synthesis",
  "p_147":"c 의 대기는 표준적인 sub-Neptune 영역입니다. 암석 / 얼음 핵 위 3–5% 질량의 보유된 H/He 일차 외피, 미량 응결 휘발성 (H₂O, CH₄, NH₃), 그리고 광학 외관을 지배하는 광화학 haze.",
  "p_148":"<b>보유 논거.</b> Owen &amp; Wu 2017 의 광증발 valley 분석은 c 를 손실 경계 한참 오른쪽에 위치시킵니다. 0.822 L☉ G 왜성 0.22 AU 의 18 M⊕ 핵에서 XUV 구동 질량 손실율은 ~10⁷ g/s — Gyr 당 외피 질량의 약 0.1% 손실. 5.5 Gyr 시스템 나이에 걸쳐 총 손실은 외피의 ~0.8% 로, 3–5% 명목 외피 질량 한참 아래. c 는 일차 대기를 여유 있게 보유합니다.",
  "p_149":"<b>압력 프로파일.</b> 표면 없음 — 외피는 상단의 저밀도 가스에서 암석-핵 경계의 다 kbar 초임계 H/He 까지 정수압적으로 연속. cfg 는 렌더러가 가시 디스크로 취급하는 &quot;구름-top&quot; 표면에 대해 1 bar 기준 레벨을 채택합니다. 이 레벨의 스케일 높이 220 km 는 sub-Neptune 스케일 높이 추정 (Lewis 2014) 과 일관. 대기 조성은 표준 원시-외피 모델 (Madhusudhan 2012, Moses 2013) 을 따름. H₂ ~75%, He ~24%, H₂O ~0.3%, CH₄ ~0.1%, NH₃ ~0.05%, CO, CO₂, HCN 미량, 그리고 광학 외관을 지배하는 광화학 haze.",
  "p_150":"<b>구름.</b> T_eq ~ 480 K 와 압력 0.1–10 bar 에서 평형의 응결 종은 KCl (~600 K 응결), Na₂S (~700 K), 그리고 상부 고도에서 T 가 273 K 아래로 떨어지는 곳의 물 얼음. KCl/Na₂S 구름이 깊은 구름 데크를 형성. haze 층 위 온도 역전에서는 상부 고도 응결 veil 로 물 얼음 구름이 형성됨. 그 모든 것 위로는 솔라 트윈 UV 아래의 메탄 + HCN 광분해에서 광화학 haze (Morley 2015, Lavvas 2017) 가 축적됨 — 따뜻한 sub-Neptune 을 투과 분광에서 featureless 로 만드는 광학적으로 두꺼운 담요를 생성.",
  "p_151":"<b>1 bar 의 가상 비행선에서 본 하늘 외관.</b> 위쪽 하늘은 haze 가 낀 크림-주황 (<span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code>) 이고, 61 Vir 디스크는 haze 를 통해 각지름 ~0.23° 의 흩어진 따뜻한-노란 patch 로 보임 — 지구에서 본 태양 겉보기 지름의 약 절반. haze 를 통한 표면 밝기는 직접 일사 수준에서 의미 있게 감소 (대기 상단에서 S = 17.4 S⊕ 가 haze 감쇠 후 1 bar 레벨에서 ~3 S⊕). Day-night 대비는 적당 — substellar 구름-top (~460 K) 과 antistellar 구름-top (~380 K) 의 ~80 K 온도차가 또렷한 terminator feature 를 부드럽게 하는 pseudo-zonal 순환을 구동.",
  "p_152":"<b>광화학 haze 화학.</b> 5568 K 솔라 트윈 SED 는 거의 지구-태양 UV-to- 가시 비율을 줌. λ ≲ 200 nm 의 메탄 광분해는 HCN, C₂H₂, 그리고 광학 적으로 두꺼운 haze 층으로 핵형성하는 더 무거운 haze 전구체를 생성 (Lavvas 2017). haze 는 ~0.01 에서 ~0.1 bar 의 성층권 전체에 분포하며 가시 파장에서 광학 깊이 τ ≫ 1 — 본질적으로 c 를 직접 표면 관측에 대해 불투명하게 만듦.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"c 의 spin 상태는 조석-감쇠와 이심률-펌핑 시간 스케일의 균형으로 결정됩니다. 38 일 궤도 주기, 0.22 AU 분리, 18 M⊕ 질량에서 지구 아날로그 내부 Q 의 조석 고정 시간은 ~1–3 Gyr (Henning &amp; Hurford 2014 스케일링) 입니다. 이는 5.5 Gyr 시스템 나이에 견줄 만하지만 조금 짧습니다 — c 는 obliquity 와 spin 각속도를 감쇠시킬 시간은 있었지만 반드시 엄격한 1:1 lock 에 도달한 것은 아닙니다.",
  "p_155":"이심률 0.14 (Vogt 2010) 에서 Hut 1981 의 pseudo-synchronous 상태가 가장 그럴듯한 결과. 자전율이 근일점 궤도 각속도와 일치하여, sidereal 주기는 ~30 일 (궤도의 38 일 대비). 이는 회전 frame 에서 천천히 drift 하는 substellar 점을 생성. substellar 경도가 ~150 일 만에 전체 회전 완료.",
  "p_156":"<b>KSP 구현 노트.</b> cfg 는 <code>rotation_period_days</code> = 30 (pseudo-synchronous, Kopernicus 단위로 ~2 590 000 초) 을 채택. 이는 궤도 주기와 구분되며, 어떤 궤도 관측자에게 c 에 옅은 일주 사이클을 주는 lock 안 된 느린 자전을 생성.",
  "p_157":"<b>Obliquity.</b> 조석 감쇠가 obliquity 를 줄였지만 pseudo-synchronous 상태가 0 이 아닌 잔존 obliquity 를 허용. cfg 는 tie-break 으로 5° 채택 — 동역학적으로 그럴듯할 정도로 작고, 구름 띠에 옅은 계절 변조를 줄 정도로 큼.",
  "p_158":"<b>조석 가열.</b> 38 일 주기와 18 M⊕ 질량에서 e=0.14 에 대한 Bolmont 2020 / Henning &amp; Hurford 2014 스케일링은 0.001–0.01 W/m² 의 조석 가열 기여 를 줌. 구름-top 흡수 일사 ~250 W/m² 대비 무시 가능하므로 c 는 열 예산에서 단단히 <b>일사 지배</b> 입니다. 깊은 내부는 형성 + 방사성 붕괴 잔여 열 (~0.01 W/m²) 을 가질 수 있지만, 다시 일사 대비 작음.",
  "p_159":"<b>암석-행성 의미의 계절 없음.</b> 이심률 0.14 가 궤도에 걸쳐 일사를 ±30% 변조하지만, pseudo-synchronous 자전과 깊은 가스 외피에서 열 반응이 강하게 감쇠됩니다 — 일주 사이클이 깊이에서 평균화되고, 가시 구름 데크는 peri 와 apo 통과 사이에서 몇 K 만 이동합니다.",
  "h2_160":"Visual styling",
  "p_161":"표면과 대기 결정을 결합하면 다음과 같습니다.",
  "li_162":"<b>전역 외관 (궤도 뷰).</b> 솔라 트윈 조명 아래 따뜻한 크림-주황 전체 색조 (<span class=\"hex-chip\" style=\"background:#d8c8a8\"></span><code>#d8c8a8</code>) 의 옅고 haze 가 낀 디스크. 높은 대비 설정에서 옅은 zonal banding 가시. 그 외에는 featureless 부드러운-가장자리 구. limb haze 는 day-night terminator 에서 강철-청 Rayleigh 산란 glow (<span class=\"hex-chip\" style=\"background:#a8b8cc\"></span><code>#a8b8cc</code>) 추가.",
  "li_163":"<b>구름-top 형태.</b> super-rotating 적도 jet 의 pseudo-zonal banding (디스크 너머 ~3–5 띠, 옅은 대비). substellar 영역 약간 더 밝음 (~460 K 더 따뜻한 haze + 더 두꺼운 응결 veil). antistellar 약간 더 어두움.",
  "li_164":"<b>광화학 haze 층.</b> ~10⁵ km 고도의 성층권 haze 가 dominant 따뜻한 크림 가시색을 생성. 광학 깊이 ≫ 1 이 더 깊은 구름 구조의 시야를 차단 — c 는 근적외와 가시 파장에서 featureless.",
  "li_165":"<b>Limb haze.</b> H/He 상부 대기에서 λ ≲ 0.5 μm 의 옅은 강철-청 Rayleigh 산란. 감쇠되지만 terminator 와 투과에서 가시. 비스듬한 햇빛에서 디스크 주위에 부드러운 cyan 고리 추가.",
  "li_166":"<b>야간면.</b> b 에서 반사된 자매 행성 빛 (매우 어둡고 작은 디스크) 과 d 에서 (비슷한 등급, 더 큰 위상). 야간 구름-top 온도 380 K — 광학 열복사에는 너무 차갑지만 중적외 (~10 μm) 에서 밝음.",
  "li_167":"<b>하늘의 별.</b> 61 Vir 가 c 에서 0.235° 차지 — 지구에서 본 태양 각 크기의 약 절반. haze 를 통해 또렷한 디스크가 아닌 흩어진 따뜻한-노란 patch (<span class=\"hex-chip\" style=\"background:#fff2dc\"></span><code>#fff2dc</code> cfg-인코딩 호스트 색조) 로 보임. 표면 조명은 대기 상단에서 지구의 ~17 배, haze 감쇠 후 1 bar 구름-top 에서 지구의 ~3 배.",
  "li_168":"<b>하늘의 자매 행성.</b> b (다음 안쪽 0.05 AU) 가 내합 시 (5 일마다) 각 크기 ~0.04° 로 등장. d (다음 외측 0.48 AU) 가 합 시 (55 일마다) 각 크기 ~0.1° 로 등장. 거의 동일 평면 기하학. 합은 시스템 내부 관측 자에게 sky 이벤트.",
  "li_169":"<b>선택적 banding 애니메이션.</b> 구름 띠의 느린 zonal drift (시간 스케일 ~30 일, pseudo-synchronous 자전 주기와 일치) 가 정적으로 보이는 디스크에 미묘한 역동성을 추가해 줌. 우선순위 낮은 Phase 3.5 시각 디테일.",
  "h2_170":"Bibliography",
  "h3_171":"Read (visual-informative, drove decisions above)",
  "li_172":"<b>Vogt S. S. et al. 2010</b> — <i>A Super-Earth and Two Neptunes Orbiting the Nearby Sun-Like Star 61 Virginis</i>, ApJ 708, 1366 (<code>2010ApJ...708.1366V</code>). 발견 논문. c 의 궤도 (P=38.021 d, a=0.2175 AU, e=0.14, ω=341°) 와 최소 질량 (Msini = 18.2 ± 1.1 M⊕) 보고. HIRES + AAT 결합 RV 해. Decisions 표의 모든 궤도 + 질량 값이 여기에 묶입니다.",
  "li_173":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발-valley 물리. c 를 손실 경계 한참 오른쪽에 위치 (XUV 구동 손실이 6 Gyr 에 걸쳐 외피의 ~0.6%). high 신뢰도로 <code>atmosphere_present = true</code> 의 anchor.",
  "li_174":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). sub-Neptune envelope mass-radius 스케일링. 3–5% H/He 외피 18 M⊕ 에서 R = 4.0–5.0 R⊕. cfg 는 4.5 R⊕ 채택. <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> tie-break 의 anchor.",
  "li_175":"<b>Howe A. R. et al. 2014</b> — <i>Mass-radius relations and core-envelope decompositions of super-Earths and sub-Neptunes</i>, ApJ 787, 173 (<code>2014ApJ...787..173H</code>, arXiv:1311.0329). sub-Neptune mass-radius 다양성. H/He 외피 canonical 해석을 지지하고 물-풍부 대안의 경계를 정함.",
  "li_176":"<b>Madhusudhan N. 2012</b> — <i>C/O ratio as a dimension for characterizing exoplanetary atmospheres</i>, ApJ 758, 36 (<code>2012ApJ...758...36M</code>, arXiv:1209.2412). sub-Neptune 원시-외피 조성 baseline. H/He 일차 + 미량 응결 조성을 견인.",
  "li_177":"<b>Moses J. I. et al. 2013</b> — <i>Compositional diversity in the atmospheres of hot Neptunes</i>, ApJ 777, 34 (<code>2013ApJ...777...34M</code>, arXiv:1306.5178). sub-Neptune 광화학. CH₄/HCN/광화학-haze 사슬을 정보화.",
  "li_178":"<b>Morley C. V. et al. 2015</b> — <i>Thermal emission and reflected light spectra of super Earths with flat transmission spectra</i>, ApJ 815, 110 (<code>2015ApJ...815..110M</code>, arXiv:1511.01492). Haze 가 낀 sub-Neptune 검색 프레임워크. <code>atmosphere_tint</code> 와 <code>cloud_tint</code> tie-break 을 견인 (태양 조명 아래의 따뜻한 크림 haze).",
  "li_179":"<b>Lavvas P. &amp; Koskinen T. 2017</b> — <i>Aerosol properties of the atmospheres of extrasolar giant planets</i>, ApJ 847, 32 (<code>2017ApJ...847...32L</code>, arXiv:1707.08077). sub-Neptune 광화학 haze 생성 메커니즘. 전역 구름 덮임과 haze 광학 깊이를 정보화.",
  "li_180":"<b>Kreidberg L. et al. 2014</b> — <i>Clouds in the atmosphere of the super-Earth exoplanet GJ 1214 b</i>, Nature 505, 69 (<code>2014Natur.505...69K</code>, arXiv:1401.0022). 표준적 &quot;featureless 투과 스펙트럼&quot; sub-Neptune. c 는 비슷한 기대 시각의 더 따뜻한 아날로그.",
  "li_181":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric circulation of hot Jupiters: coupled radiative-dynamical GCM</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). 조석 영향을 받는 가스 행성 의 super-rotating 적도 jet 을 확립. c 의 <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> (zonal banding) 를 정보화.",
  "li_182":"<b>Lewis N. K. et al. 2014</b> — <i>GCMs of warm sub-Neptunes</i>, ApJ 795, 150 (<code>2014ApJ...795..150L</code>, arXiv:1410.0008). ~38 일 주기 sub-Neptune 영역에 대한 GCM 스케일링. pseudo-synchronous spin 과 적도-jet 순환을 지지.",
  "li_183":"<b>Hut P. 1981</b> — <i>Tidal evolution in close binary systems</i>, A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). 이심 궤도의 pseudo-synchronous spin 평형. c 의 spin 상태에 대한 기초 인용.",
  "li_184":"<b>Henning W. G. &amp; Hurford T. 2014</b> — <i>Tidal heating in multilayered terrestrial exoplanets</i>, ApJ 789, 30 (<code>2014ApJ...789...30H</code>, arXiv:1311.5904). sub-Neptune 조석 가열 + spin-lock 시간 스케일. c 의 파라미터에서 ~1–3 Gyr 제공.",
  "li_185":"<b>Bolmont E. et al. 2020</b> — <i>Tidal dissipation and obliquity evolution</i> (<code>2020A&amp;A...644A.165B</code>, arXiv:2002.02015). c 의 조석-가열 flux 스케일링 제공 (0.001–0.01 W/m²).",
  "h3_186":"Read (context / methodology, not decision-driving)",
  "li_187":"<b>Rathsam A. et al. 2023</b> — <i>Lithium depletion in solar analogs</i>, MNRAS 525, 4642 (<code>2023MNRAS.525.4642R</code>, doi:10.1093/mnras/stad2589). 호스트 합성에서 상속. 61 Vir 의 Phase 2 나이 앵커 (5.50 +0.78/-0.74 Gyr). 광증발 진화 시간 스케일을 결정.",
  "li_188":"<b>von Braun K. et al. 2014</b> — <i>Stellar diameters V</i>, MNRAS 438, 2413 (<code>2014MNRAS.438.2413V</code>, doi:10.1093/mnras/stt2360). 호스트 합성에서 상속. L = 0.8222 ± 0.0033 L☉ 가 일사 유도의 앵커.",
  "li_189":"<b>Mamajek E. E. &amp; Hillenbrand L. A. 2008</b> — <i>Improved Age Estimation for Solar-Type Dwarfs</i> (<code>2008ApJ...687.1264M</code>, arXiv:0807.1686). 호스트 합성에서 상속. 활동도-나이 6.1 ± 1.7 Gyr — Rathsam 2023 isochrone 에 대한 교차 확인으로 강등 (호스트 합성에서 documented divergence).",
  "li_190":"<b>Fulton B. J. et al. 2017</b> — <i>The California-Kepler Survey III. A Gap in the Radius Distribution of Small Planets</i>, AJ 154, 109 (<code>2017AJ....154..109F</code>, arXiv:1703.10375). 반지름 valley 인구. c 의 18 M⊕ 인구에 대한 H/He 외피 canonical 해석을 지지.",
  "li_191":"<b>Wyatt M. C. et al. 2012</b> — <i>Herschel imaging of 61 Vir</i> (<code>2012MNRAS.424.1206W</code>, arXiv:1206.2370). 호스트 합성에서 상속. 간략 히 인용. 30 AU 의 차가운 debris 고리는 0.22 AU 의 c 와 동역학적으로 상호작용하지 않음.",
  "li_192":"<b>Madhusudhan N. et al. 2021</b> — <i>Habitability and biosignatures of Hycean worlds</i>, ApJ 918, 1 (<code>2021ApJ...918....1M</code>, arXiv:2108.10888). sub-Neptune 의 Hycean 대안 시나리오. d 의 Open-items variant 와 관련. 더 따뜻한 T_eq 의 c 에는 덜 적용되지만 더 넓은 sub-Neptune 분류 프레임워크로 인용.",
  "h3_193":"Read (instrument-only, not visual-informative)",
  "li_194":"<b>Marcy G. W. et al. 2014</b> — Kepler 슈퍼지구 통계 맥락.",
  "h3_195":"Not read — no arXiv preprint or low-priority (~10 papers)",
  "p_196":"c 특정 arXiv 기록은 작습니다. 읽지 않은 집합은 주로 다음과 같습니다.",
  "li_197":"<b>Vogt 2010 시스템의 동역학 안정성 follow-up.</b>",
  "li_198":"<b>트랜짓 탐색 non-detection.</b> c 가 트랜짓하지 않음을 확인. e=0.14, a=0.22 AU 에서 c 의 기하학적 트랜짓 확률은 ~1.5% 이므로 non-detection 은 무작위 경사와 일관.",
  "li_199":"<b>61 Vir 특정 항성풍 모델 없이 일반 광증발율 계산.</b>",
  "h2_200":"Open items for follow-up",
  "li_201":"<b>직접 영상에서의 진질량과 반지름.</b> c 의 질량은 Msini 전용이고 반지름은 mass-radius 스케일링 추정치. 미래의 직접 영상 캠페인이 반사광 검출에서 진질량 + 반지름을 산출. HabEx / LUVOIR 시대 관측.",
  "li_202":"<b>Cfg variant. 물-풍부 Hycean 스타일 외피.</b> c 의 일조량 (T_eq ~ 480 K) 에서 H₂ 대기를 가진 물-풍부 외피는 H/He 일차 외피와 관측적으로 일관. cfg variant 는 c 를 더 밀도 높고 덜 haze 가 낀, 더 깊은-청 디스크로 렌더링. Phase 3.5 대안으로 명시.",
  "li_203":"<b>Cfg variant. 암석 외피-없음 대안.</b> 광증발 물리가 외피 보유를 강하게 선호하지만 순수 암석 18 M⊕ 행성 (R ≈ 2.4 R⊕. 밀도 ~6.5 g/cc) 의 작은 잔여 확률 남아 있음. 렌더는 b 와 비슷한 뜨거운 암석 세계지만 더 차가움 — haze 덮인 canonical 해석과 시각적으로 구분. cfg variant 로 보존.",
  "li_204":"<b>미래 JWST 또는 HabEx 투과 분광.</b> c 가 트랜짓하지 않지만, 미래의 직접-영상 분광이 구름-top 조성을 분해할 수 있음. 정밀화 기회. H₂O/CH₄/NH₃ 풍부도, haze 광학 깊이, 더 깊은 구름 조성 (KCl vs Na₂S vs ZnS).",
  "li_205":"<b>GCM 구동 구름 형태.</b> 따뜻한 sub-Neptune 에 대한 Lewis 2014 GCM 은 zonal banding 을 예측하지만 c 의 특정 파라미터에서의 띠 대비는 시뮬레이션된 바 없음. 표적 GCM 실행이 &quot;전역 haze 데크&quot; 와 &quot;haze + 가시 Jupiter 스타일 띠&quot; 사이의 <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span> 선택을 제약 가능.",
  "li_206":"<b>대기 탈출율 교차 점검.</b> Owen &amp; Wu 2017 일반 스케일링이 외피 보유를 지지. 61 Vir 특정 항성풍 + XUV 모델 (Vidotto 스타일) 이 손실율 추정을 정밀화.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
