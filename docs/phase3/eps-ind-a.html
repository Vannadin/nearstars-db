  "h2_81":"Surface synthesis",
  "p_82":"ε Indi A has the warm orange-amber photosphere typical of a late-K dwarf. At Teff = 4700 K (Lundkvist 2024) the SED peaks in the red-orange near ~620 nm, with the optical continuum shaped by the MgH and CaH molecular bands and the first TiO heads beginning to bite below ~6300 Å — far less suppressed than a true M dwarf, but distinctly cooler and more orange than the catalog&#x27;s earlier K dwarfs (40 Eri A K0.5 V at 5143 K, ε Eri K2 V at 5039 K). With R = 0.713 R☉ and L = 0.239 L☉ the star is roughly a quarter of the Sun&#x27;s luminosity; at 11.9 light-years this still places it well within naked-eye range (V = 4.66), the brightest star in the southern constellation Indus.",
  "p_83":"The defining surface property is quietness. The chromospheric Ca II H&amp;K index log R&#x27;HK = −4.72 (Chen 2022, adopting Pace 2013) marks ε Indi A as a quiet, intermediate-age K dwarf — slightly below the Sun&#x27;s mean activity and far below the active K dwarfs like ε Eri (−4.50). The slow ~35 d rotation (Feng 2018) is consistent with the ~3.5 Gyr activity age and with the magnetically-braked, unsaturated regime. Lundkvist 2024 recovered a ≈ 2600 d (≈ 7.1 yr) activity cycle by phase-folding 13 years of HARPS Ca II H&amp;K archive, and showed the asteroseismic mode amplitudes vary inversely with the cycle (they happened to catch the star near cycle minimum with HARPS in 2011 and near maximum with UVES in 2021). For cfg rendering this means a warm orange-amber disk carrying only a low cool-spot fraction (<code>visual_spot_coverage_max ≈ 0.05</code>) modulating slowly on the multi-year cycle — a calm photosphere, not a flaring one.",
  "p_84":"The asteroseismic detection is itself a remarkable surface property: ν_max = 5265 ± 110 µHz is the highest-frequency solar-like oscillation spectrum ever measured (Lundkvist 2024), surpassing α Cen B and τ Ceti. The oscillation amplitudes are tiny (~3.4 cm/s) — appropriate for a cool, quiet, low-luminosity dwarf — and are not a directly visible feature, but they anchor the asteroseismic mass that the cfg adopts.",
  "p_85":"No metallicity is curated in the Phase 2 layer and none is synthesized here; the literature value is slightly sub-solar ([Fe/H] ≈ −0.17, Lundkvist 2024; −0.06, Santos 2004), but at fixed Teff the effect on the rendered K-dwarf color is sub-perceptible and project policy skips it. There is no debris disk: no infrared-excess detection or resolved imaging of a disk around ε Indi A has been reported, so the star is rendered diskless.",
  "h2_86":"Atmosphere synthesis",
  "p_87":"A main-sequence star has no &quot;atmosphere&quot; in the planetary cfg sense; for a stellar synthesis this section covers the chromosphere, corona, and activity cycle.",
  "p_88":"ε Indi A&#x27;s chromosphere and corona are those of a quiet, intermediate-age K dwarf. The chromospheric Ca II H&amp;K index log R&#x27;HK = −4.72 (Chen 2022, adopting Pace 2013) sits below the solar mean, and the coronal X-ray activity is correspondingly low — the ROSAT all-sky survey gives an X-ray-to-bolometric ratio R_X = log(L_X/L_bol) ≈ −5.62 (via Chen 2022&#x27;s activity-age analysis), at the quiet end for a K dwarf. The slow ~35 d rotation (Feng 2018) places ε Indi A in the unsaturated, magnetically-braked regime, and the ~7.1 yr chromospheric cycle (Lundkvist 2024) is a Sun-like activity cycle — shorter than the Sun&#x27;s 11 yr but well-behaved and sinusoidal, with the asteroseismic amplitudes modulating in anti-phase with it.",
  "p_89":"There is no headline flaring or magnetospheric phenomenon here, unlike the catalog&#x27;s active dwarfs. ε Indi A is a calm, quiet star whose significance is its planetary and substellar companions rather than its own activity. For cfg purposes the corona / chromosphere layer is &quot;quiet, with a Sun-like ~7 yr activity cycle&quot; — distinct from both the near-dead-quiet old M dwarfs and the loud young/active K and M dwarfs.",
  "p_90":"The one subtlety worth encoding for a faithful render is the activity cycle: at cycle maximum the chromospheric emission and any cool-spot modulation strengthen modestly, and the asteroseismic mode amplitudes weaken — a coupled behavior that could drive a slow ~7 yr brightening / spot-coverage animation if a future cfg renders it.",
  "h2_91":"Rotation &amp; spin synthesis",
  "p_92":"ε Indi A rotates slowly, with a period P_rot ≈ 35 d (Feng 2018). The value is not a photometric rotation period — the star &quot;lacks a published photometric rotation period&quot; (Chen 2022) — but was derived from HARPS radial velocities combined with spectroscopic activity-index periodograms (NaD1/NaD2, R&#x27;HK, BIS), where the prominent 17.8 d signal is the half-rotation alias of the true ~35 d period (Feng 2018, &quot;The rotation period of ε Indi is about 35 d, approximately double 17.8 d&quot;). No formal uncertainty is published. This ~35 d value supersedes the older, shorter estimates of ~22 d (Saar &amp; Osten 1997) and ~20 d (Lachaume 1999) that were used in some earlier age determinations, and is corroborated by Feng 2019. The cfg adopts 35 d at medium confidence because of the absent σ and the non-photometric method.",
  "p_93":"<b>KSP implementation note.</b> Stellar rotation period ≈ 35 d = 3 024 000 s. In Kopernicus the star body&#x27;s <code>rotationPeriod</code> is set in seconds; the slow rotation makes spin-related visual foreshortening negligible.",
  "p_94":"The rotation feeds the age. ε Indi A&#x27;s age is one of the system&#x27;s long-standing open problems — Lundkvist 2024 notes estimates spanning 0.39–5 Gyr across rotation, activity, kinematic, and evolutionary methods. The shorter rotation periods (~20 d) used by Lachaume 1999 yielded younger ages (0.8–2.0 Gyr); the modern ~35 d period and the chromospheric activity push the age older. Chen 2022&#x27;s Bayesian activity-age method (log R&#x27;HK + X-ray + Tycho photometry) gives 3.48 (+0.78/−1.03) Gyr, consistent with Feng 2019&#x27;s ~4 Gyr and with the Cardoso 2012 evolutionary 3.7–4.3 Gyr — and this ~3.5 Gyr is what the cfg adopts as the system age (also relevant to the brown-dwarf cooling benchmarks and the &quot;solar-age giant&quot; framing of planet b). Because there is no Phase 2 age array, the age is carried at medium confidence as a literature-direct value.",
  "p_95":"The rotation-axis inclination is unconstrained for the photosphere. For NearStars visual rendering a generic axis orientation is adopted, since the slow rotation makes the precise spin axis visually unimportant for the disk.",
  "h2_96":"Visual styling",
  "p_97":"In the NearStars renderer, ε Indi A is portrayed as a warm orange-amber K5 V dwarf whose significance is its companions rather than its own modest, quiet photosphere:",
  "li_98":"<b>Global appearance.</b> A warm orange-amber disk encoded as <span class=\"hex-chip\" style=\"background:#ffb870\"></span><code>#ffb870</code>, the 4700 K blackbody continuum after molecular-band suppression of the blue — deeper-amber than the warmer K dwarfs in the catalog (40 Eri A K0.5 V <span class=\"hex-chip\" style=\"background:#ffd5a8\"></span><code>#ffd5a8</code>, ε Eri K2 V <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code>) and slightly more saturated than the pale-warm-orange M dwarfs (Barnard <span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>). K5 V sits between, and the tint is picked to read as the distinctly orange one among the nearby K dwarfs. The illumination color temperature for scene lighting is driven by the 4700 K SED.",
  "li_99":"<b>Quiet spotted surface.</b> A low cool-spot fraction (<code>visual_spot_coverage_max ≈ 0.05</code>) modulating slowly on the 35 d rotation and the ~7 yr activity cycle. A calm disk — a few small, slowly-evolving spot groups, not the busy spotted surface of an active K dwarf.",
  "li_100":"<b>Activity cycle (subtle).</b> A ~7.1 yr Sun-like chromospheric cycle (Lundkvist 2024) could be expressed as a slow, modest brightening of the chromospheric emission and a small rise in spot coverage at cycle maximum — a gentle multi-year animation, far weaker than ε Eri&#x27;s loud 2.9 yr cycle.",
  "li_101":"<b>No flares, no aurora.</b> Unlike the catalog&#x27;s active dwarfs, ε Indi A has no defining flaring or magnetospheric feature; it renders as a steady, calm orange-amber star.",
  "li_102":"<b>Companions in the sky (the headline).</b> The system&#x27;s visual interest is the companions. The cold super-Jupiter ε Indi A b orbits at ~20.9 AU — from the star it is a distant, faint point; from the planet the star subtends ~1.1 arcmin (0.018°), about 1/30 the Sun&#x27;s angular size from Earth, a brilliant orange-amber pinpoint. Far beyond, at ~1459 AU, the brown-dwarf pair ε Indi B (Ba + Bb) glows as two faint, deep-red T-dwarf points — invisibly dim to the eye from Earth but a striking pair in any wide-field render of the system.",
  "li_103":"<b>From Earth.</b> ε Indi A is a V = 4.66 naked-eye star in Indus, visible without a telescope despite its modest 0.239 L☉ luminosity because of its 11.9-light-year proximity — one of the nearest naked-eye stars in the sky.",
  "h2_104":"Bibliography",
  "h3_105":"Read (drove Decisions above)",
  "li_106":"<b>Lundkvist M. S. et al. 2024</b> — <i>Low-amplitude solar-like oscillations in the K5 V star ε Indi A</i>, ApJ 964, 110 (<code>2024ApJ...964..110L</code>, doi:10.3847/1538-4357/ad25f2, <a href=\"https://arxiv.org/abs/2403.04509\">arXiv:2403.04509</a>). Detects solar-like oscillations at ν_max = 5265 ± 110 µHz (highest-frequency ever measured), giving an asteroseismic mass M = 0.782 ± 0.023 M☉ via ν_max scaling with the interferometric R = 0.713 ± 0.006 R☉ (Rains 2020 θ_LD + Gaia d). Teff = 4700 ± 65 K and [Fe/H] = −0.17 from UVES; a ≈ 2600 d activity cycle from the HARPS R&#x27;HK archive. Phase 2 recommended anchor for mass/radius/Teff.",
  "li_107":"<b>Feng F. et al. 2019</b> — <i>Detection of the nearest Jupiter analog in radial velocity and astrometry data</i>, MNRAS 490, 5002 (<code>2019MNRAS.490.5002F</code>, doi:10.1093/mnras/stz2912, <a href=\"https://arxiv.org/abs/1910.06804\">arXiv:1910.06804</a>). RV + Hipparcos/Gaia astrometric detection of ε Indi A b; Phase 2 recommended source for the luminosity (0.239 L☉) and corroborating the ~35 d rotation and ~4 Gyr age. The planet orbit here (a ≈ 11.6 AU, ~3 M_Jup) is superseded by Matthews 2026.",
  "li_108":"<b>Feng F. et al. 2018</b> — <i>Detection of the closest Jovian exoplanet in the ε Indi triple system</i> (<code>2018arXiv180308163F</code>, <a href=\"https://arxiv.org/abs/1803.08163\">arXiv:1803.08163</a>). arXiv preprint; Phase 2 recommended source for the rotation period (~35 d, from RV + activity-index periodograms; the 17.8 d signal is the half-rotation alias). No refereed bibcode — superseded for the planet orbit by Feng 2019 / Matthews 2026.",
  "li_109":"<b>Chen M. et al. 2022</b> — <i>Precise Dynamical Masses of ε Indi Ba and Bb: Evidence of Slowed Cooling at the L/T Transition</i>, AJ 163, 288 (<code>2022AJ....163..288C</code>, doi:10.3847/1538-3881/ac66d2, <a href=\"https://arxiv.org/abs/2205.08077\">arXiv:2205.08077</a>). VLT/NACO relative + FORS2 absolute astrometry of the brown-dwarf pair: Ba (T1–1.5) 66.92 ± 0.36 M_Jup, Bb (T6) 53.25 ± 0.29 M_Jup. Phase 2 recommended source for ε Indi A&#x27;s activity index (log R&#x27;HK = −4.72, Pace 2013) and the adopted system age (3.48 +0.78/−1.03 Gyr, Bayesian activity-age) — also the source for the brown-dwarf-pair Decisions row.",
  "h3_110":"Read (context / methodology, not decision-driving)",
  "li_111":"<b>Matthews E. C. et al. 2024</b> — JWST/MIRI direct-imaging discovery of ε Indi A b (<code>2024Natur.633..789M</code>, <a href=\"https://arxiv.org/abs/2503.01599\">arXiv:2503.01599</a>). Establishes the ~275 K cold super-Jupiter and the elevated-metallicity / 3–5 µm faintness context. Drives the planet b synthesis (<code>docs/phase3/eps-ind-a-b.md</code>); cited here for the system framing. The ar5iv full text was not available in the cache (HTML-only stub); numbers are taken from the abstract and from Matthews 2026&#x27;s recap.",
  "li_112":"<b>Matthews E. C. et al. 2026</b> — <i>A second visit to ε Ind Ab with JWST</i>, ApJL (doi:10.3847/2041-8213/ae5823, <a href=\"https://arxiv.org/abs/2603.08780\">arXiv:2603.08780</a>). Second JWST/MIRI epoch confirming ammonia + suggesting thick water-ice clouds; refined mass 7.6 ± 0.7 M_Jup, a = 20.9 AU, e = 0.244. Drives the planet b synthesis; cited here for the system framing.",
  "li_113":"<b>Demory B.-O. et al. 2009</b> — VLTI/VINCI interferometric radius/Teff/L (<code>2009A&amp;A...505..205D</code>). Phase 2 alternative mass 0.762 ± 0.038 M☉ (via the Xia 2008 M–L relation), agreeing with Lundkvist 2024 within 1σ. VizieR-only (no ar5iv body); not table-verified in this session.",
  "li_114":"<b>Santos N. C. et al. 2004</b> — Spectroscopic metallicities for planet-host stars (<code>2004A&amp;A...415.1153S</code>). [Fe/H] = −0.06 ± 0.08 for ε Indi A (cited via Matthews 2026); context for the skipped-metallicity row.",
  "h3_115":"Read (instrument-only, not visual-informative)",
  "li_116":"The asteroseismic methodology of Lundkvist 2024 (HARPS/UVES RV time series, weighted power spectra, ν_max envelope fitting) and the astrometric methodology of Chen 2022 (NACO relative + FORS2 absolute astrometry, orvara-style orbit fits) are the instrument backbone of the mass and age determinations but contribute no direct visual field beyond the values already used above.",
  "h3_117":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_118":"The Demory 2009 VLTI/VINCI per-star interferometric table lives in VizieR (J/A+A/505/205) rather than an ar5iv body and was marked manual_followup in the bibliography; its mass value is carried as a Phase 2 alternative. Older rotation/age estimates (Saar &amp; Osten 1997 ~22 d, Lachaume 1999 ~20 d) are superseded by the Feng 2018 ~35 d period and the Chen 2022 activity age, and are retained only as historical context. No debris-disk papers exist to read (none reported).",
  "h2_119":"Stellar wind / astrosphere",
  "p_120":"ε Ind A is the textbook <b>compact astrosphere</b>: a moderate wind (Ṁ = 0.5 Ṁ⊙) running into a fast ~68 km/s ISM inflow stands off at only <b>~32 AU</b> — Wood 2005 explicitly calls it compact, and our 6D-astrometry V_ISM (69 km/s) reproduces Wood&#x27;s 68 km/s, validating the method. It cycles on <b>5.65 yr</b> (Laliotis 2023; matching Lovis 2011&#x27;s 4.71 yr). An active-ish old K dwarf whose measured X-ray output runs <b>~3× the quiescent Sun</b> (Wood 2005 RASS log L_X 27.39; Chen 2022&#x27;s R_X −5.62 agrees) — a punchier particle environment than its sedate age suggests.",

  "h2_149":"Open items for follow-up",
  "li_150":"<b>Planet Phase 3 synthesis.</b> ε Indi A b is produced as a separate Phase 3 doc (<code>eps-ind-a-b.md</code>), anchored on Matthews 2024/2026. It is the nearest directly-imaged cold super-Jupiter and the system&#x27;s headline feature.",
  "li_151":"<b>Brown-dwarf pair ε Indi B (pending DB addition).</b> Ba (T1–1.5, 66.9 M_Jup) + Bb (T6, 53.3 M_Jup) at ~1459 AU (Chen 2022) are not yet NearStars bodies. Adding them — with the Chen 2022 dynamical masses and the Ba–Bb mutual orbit — would let the cfg render the full ε Indi hierarchical triple. They are mentioned in this synthesis but no DB or Phase 3 doc is created for them here.",
  "li_152":"<b>Age.</b> No Phase 2 age array. The ~3.5 Gyr Chen 2022 activity age is a literature-direct value carried at medium confidence; if a future curation adds a gyrochronology, asteroseismic, or kinematic age, the cfg age should be replaced. The 0.39–5 Gyr literature spread (Lundkvist 2024) is the residual uncertainty.",
  "li_153":"<b>Rotation period uncertainty.</b> Feng 2018 reports &quot;~35 d&quot; with no formal σ and via an RV-activity-index (not photometric) method. A TESS or dedicated photometric rotation measurement would tighten the value and the gyrochronological age cross-check.",
  "li_154":"<b>Metallicity.</b> Skipped per project policy; literature ≈ −0.17 (Lundkvist 2024). If a future cfg needs a metallicity-reddening tweak the value is available, but the color effect is sub-perceptible at fixed Teff.",
  "li_155":"<b>Activity-cycle visualization fidelity.</b> The ~7.1 yr Sun-like cycle (Lundkvist 2024) is a tie-break visual choice for slow brightening / spot-coverage modulation; refine the cycle-phase anchoring to the game epoch once a renderer can show it.",

  ko: {
  "p_1":"ε Indi A (HD 209100, HIP 108870, GJ 845 A, HR 8387) 는 3.638 pc 거리의 K5 V 왜성으로 (Gaia DR3 시차 274.84 ± 0.10 mas), 약 11.9 광년 떨어져 있으며 태양에서 가장 가까운 항성계 중 하나의 호스트이자 주목할 만한 계층적 삼중성계의 주성입니다. 기본 파라미터는 frozen Phase 2 레이어에서 가져옵니다. 유효온도 Teff = 4700 ± 65 K (Lundkvist et al. 2024, 고분산 UVES 분광), 광도 L = 0.239 ± 0.001 L☉ (Feng et al. 2019, bolometric flux), 반지름 R = 0.713 ± 0.006 R☉ (Lundkvist et al. 2024, Rains et al. 2020 의 limb-darkened 각지름 θ_LD = 1.817 ± 0.013 mas 와 Gaia DR3 거리를 결합), 질량 M = 0.782 ± 0.023 M☉ (Lundkvist et al. 2024) 입니다. 이 질량은 측성지진학으로 결정됐다는 점에서 주목할 만합니다. Lundkvist 2024 는 ν_max = 5265 ± 110 µHz 에서 태양형 진동을 검출했는데, 이는 어떤 별에서 측정된 것 중 가장 높은 주파수의 태양형 진동으로, ε Indi A 를 진동이 측정된 가장 차가운 왜성으로 만듭니다. 이 별은 조용하고 느리게 자전하는 K 왜성입니다. 색채권 활동 지표는 log R&#x27;HK = −4.72 (Chen et al. 2022, Pace 2013 채택) 이고 자전 주기는 P_rot ≈ 35 d (Feng et al. 2018), HARPS Ca II H&amp;K 아카이브에서 검출된 색채권 활동 주기는 ≈ 2600 d (≈ 7.1 yr) 입니다 (Lundkvist 2024).",
  "p_2":"NearStars 에서 ε Indi A 를 특별하게 만드는 것은 그 시스템입니다. ε Indi A 는 <b>태양에 가장 가까운 직접 촬영 차가운 거대 외계행성</b> 인 ε Indi A b 를 거느립니다 — ~20.9 AU 궤도의 ~7.6 M_Jup 슈퍼목성으로, JWST 가 촬영한 첫 태양-나이 (~3.5 Gyr) 거대 외계행성이며 온도는 ~275 K 부근, 암모니아가 확인됐고 두꺼운 물-얼음 구름의 증거가 있습니다 (Matthews et al. 2024, 2026). 같은 별은 ~1459 AU 에서 <b>ε Indi B</b> 의 공전을 받는데, 이는 갈색왜성 쌍입니다 (Ba: T1–1.5, 66.9 M_Jup. Bb: T6, 53.3 M_Jup. Chen et al. 2022 역학 질량) — 하늘에서 가장 잘 특성화된 갈색왜성 축에 듭니다. 따라서 전체 ε Indi 시스템은 K 왜성, 차가운 슈퍼목성, 그리고 두 T-왜성 갈색왜성을 12 광년 안의 하나의 중력으로 묶인 계층 안에 담고 있습니다.",
  "p_3":"<b>NearStars 시나리오 선택. 따뜻한 오렌지-호박색의, 조용하고, 느리게 자전하는 K5 V 왜성 — 세 번째로 가까운 맨눈 K 왜성 — 으로, 가장 가까운 직접 촬영 차가운 슈퍼목성과 멀리 떨어진 갈색왜성 쌍 동반체를 거느린 모습으로 렌더링합니다.</b> 항성 레이어는 frozen Phase 2 출처 (Lundkvist 2024 질량/반지름/Teff, Feng 2019 광도, Feng 2018 자전, Chen 2022 활동 + 나이) 와 Chen 2022 의 갈색왜성 쌍 맥락 위에 정박합니다. 알려진 주변 원반은 없습니다 — 적외선 초과나 영상 검출 보고가 없으며 여기서 지어내지도 않습니다. tie-break 하나가 4700 K K5 V SED 의 시각 표면 색조를 정하고, 나이와 자전은 Phase 2 나이 배열이 없고 자전 방법이 측광이 아니라 RV-활동지표라서 medium 신뢰도에 둡니다.",

  "h2_81":"Surface synthesis",
  "p_82":"ε Indi A 는 후기-K 왜성에 전형적인 따뜻한 오렌지-호박색 광구를 가집니다. Teff = 4700 K (Lundkvist 2024) 에서 SED 는 적등색 ~620 nm 부근에서 정점을 이루고, 광학 연속체는 MgH 와 CaH 분자 밴드의 영향을 받으며 첫 TiO 머리가 ~6300 Å 아래에서 물어뜯기 시작합니다 — 진짜 M 왜성보다는 훨씬 덜 억제됐지만, 카탈로그의 더 이른 K 왜성 (5143 K 의 40 Eri A K0.5 V, 5039 K 의 ε Eri K2 V) 보다는 분명히 차갑고 더 오렌지색입니다. R = 0.713 R☉ 과 L = 0.239 L☉ 에서 별은 태양 광도의 약 1/4 입니다. 11.9 광년 거리에서도 이는 맨눈 범위 안에 들어와 (V = 4.66), 남쪽 인두스자리에서 가장 밝은 별이 됩니다.",
  "p_83":"규정하는 표면 속성은 조용함입니다. 색채권 Ca II H&amp;K 지표 log R&#x27;HK = −4.72 (Chen 2022, Pace 2013 채택) 는 ε Indi A 를 조용하고 중간 나이의 K 왜성으로 표시합니다 — 태양 평균 활동도보다 약간 낮고 ε Eri (−4.50) 같은 활동적인 K 왜성보다는 한참 아래입니다. 느린 ~35 d 자전 (Feng 2018) 은 ~3.5 Gyr 활동 나이와, 그리고 자기 제동된 비saturated 영역과 일관됩니다. Lundkvist 2024 는 13 년치 HARPS Ca II H&amp;K 아카이브를 위상 접어 ≈ 2600 d (≈ 7.1 yr) 활동 주기를 복원했고, 측성지진 모드 진폭이 주기와 반비례로 변함을 보였습니다 (HARPS 로는 2011 년 주기 최소 부근에서, UVES 로는 2021 년 주기 최대 부근에서 우연히 포착). cfg 렌더링에서는 다년 주기에 맞춰 천천히 변조되는 낮은 cool-spot 비율 (<code>visual_spot_coverage_max ≈ 0.05</code>) 만 띤 따뜻한 오렌지-호박색 원반이 됩니다 — flaring 하는 것이 아니라 차분한 광구입니다.",
  "p_84":"측성지진 검출 자체가 주목할 표면 속성입니다. ν_max = 5265 ± 110 µHz 는 어떤 별에서 측정된 것 중 가장 높은 주파수의 태양형 진동 스펙트럼으로 (Lundkvist 2024), α Cen B 와 τ Ceti 를 능가합니다. 진동 진폭은 매우 작고 (~3.4 cm/s) — 차갑고 조용하며 저광도인 왜성에 걸맞으며 — 직접 보이는 특징은 아니지만, cfg 가 채택하는 측성지진 질량을 정박시킵니다.",
  "p_85":"Phase 2 레이어에 금속도가 큐레이션되어 있지 않고 여기서 합성하지도 않습니다. 문헌값은 약간 sub-solar 이지만 ([Fe/H] ≈ −0.17, Lundkvist 2024. −0.06, Santos 2004), 고정 Teff 에서 렌더링 K-왜성 색에 미치는 영향은 sub-perception 이고 프로젝트 정책은 이를 스킵합니다. 잔해 원반은 없습니다. ε Indi A 주위 원반의 적외선 초과 검출이나 분해 영상 보고가 없으므로, 별은 원반 없이 렌더링됩니다.",
  "h2_86":"Atmosphere synthesis",
  "p_87":"주계열 별은 행성 cfg 의미의 &quot;대기&quot; 를 갖지 않습니다. 항성 합성에서 이 섹션은 색채권, 코로나, 활동 주기를 다룹니다.",
  "p_88":"ε Indi A 의 색채권과 코로나는 조용하고 중간 나이인 K 왜성의 것입니다. 색채권 Ca II H&amp;K 지표 log R&#x27;HK = −4.72 (Chen 2022, Pace 2013 채택) 는 태양 평균 아래에 있고, 코로나 X-선 활동도 그에 맞춰 낮습니다 — ROSAT 전천 서베이는 X-선-대-bolometric 비 R_X = log(L_X/L_bol) ≈ −5.62 (Chen 2022 의 활동-나이 분석 경유) 를 주는데, K 왜성치고 조용한 쪽 끝입니다. 느린 ~35 d 자전 (Feng 2018) 은 ε Indi A 를 비saturated, 자기 제동 영역에 두고, ~7.1 yr 색채권 주기 (Lundkvist 2024) 는 태양형 활동 주기입니다 — 태양의 11 yr 보다 짧지만 잘 정돈되고 사인꼴이며, 측성지진 진폭이 그와 반위상으로 변조됩니다.",
  "p_89":"여기에는 카탈로그의 활동적인 왜성과 달리 헤드라인 flaring 이나 자기권 현상이 없습니다. ε Indi A 는 차분하고 조용한 별로, 그 의미는 스스로의 활동이 아니라 행성·준항성 동반체에 있습니다. cfg 목적상 코로나 / 색채권 레이어는 &quot;조용하고 태양형 ~7 yr 활동 주기를 가진&quot; 으로, 거의-죽은-조용한 노령 M 왜성과도, 시끄러운 젊은/활동적인 K·M 왜성과도 구별됩니다.",
  "p_90":"충실한 렌더를 위해 인코딩할 만한 한 가지 미묘함은 활동 주기입니다. 주기 최대에서 색채권 방출과 cool-spot 변조가 적당히 강해지고 측성지진 모드 진폭이 약해지는 — 결합된 거동이라, 미래 cfg 가 렌더링한다면 느린 ~7 yr 밝아짐 / spot-coverage 애니메이션을 구동할 수 있습니다.",
  "h2_91":"Rotation &amp; spin synthesis",
  "p_92":"ε Indi A 는 P_rot ≈ 35 d (Feng 2018) 로 느리게 자전합니다. 이 값은 측광 자전 주기가 아니라 — 별은 &quot;출판된 측광 자전 주기가 없습니다&quot; (Chen 2022) — HARPS 시선속도를 분광 활동지표 주기도 (NaD1/NaD2, R&#x27;HK, BIS) 와 결합해 유도했는데, 두드러진 17.8 d 신호는 진짜 ~35 d 주기의 half-rotation alias 입니다 (Feng 2018, &quot;ε Indi 의 자전 주기는 약 35 d 로, 17.8 d 의 대략 두 배&quot;). 형식 불확실도는 출판되지 않았습니다. 이 ~35 d 값은 일부 초기 나이 결정에 쓰인 더 오래되고 짧은 추정 ~22 d (Saar &amp; Osten 1997) 와 ~20 d (Lachaume 1999) 를 대체하며, Feng 2019 이 보강합니다. cfg 는 35 d 를 medium 신뢰도로 채택하는데, σ 가 없고 방법이 비측광이기 때문입니다.",
  "p_93":"<b>KSP 구현 노트.</b> 항성 자전 주기 ≈ 35 d = 3 024 000 s. Kopernicus 에서 항성 바디의 <code>rotationPeriod</code> 는 초 단위로 설정합니다. 느린 자전이라 spin 관련 시각 foreshortening 은 무시할 만합니다.",
  "p_94":"자전은 나이로 이어집니다. ε Indi A 의 나이는 이 시스템의 오랜 미해결 문제 중 하나입니다 — Lundkvist 2024 는 자전·활동·운동학·진화 방법에 걸쳐 0.39–5 Gyr 에 분포하는 추정을 언급합니다. Lachaume 1999 가 쓴 더 짧은 자전 주기 (~20 d) 는 더 어린 나이 (0.8–2.0 Gyr) 를 냈고, 현대의 ~35 d 주기와 색채권 활동은 나이를 더 오래된 쪽으로 밉니다. Chen 2022 의 Bayesian 활동-나이 방법 (log R&#x27;HK + X-선 + Tycho 측광) 은 3.48 (+0.78/−1.03) Gyr 를 주는데, 이는 Feng 2019 의 ~4 Gyr 및 Cardoso 2012 진화론적 3.7–4.3 Gyr 와 일관됩니다 — 그리고 이 ~3.5 Gyr 가 cfg 가 채택하는 시스템 나이입니다 (갈색왜성 냉각 벤치마크와 행성 b 의 &quot;태양-나이 거대 행성&quot; 틀에도 관련). Phase 2 나이 배열이 없으므로 나이는 literature-direct 값으로 medium 신뢰도에 둡니다.",
  "p_95":"자전축 경사는 광구에 대해 제약되지 않습니다. NearStars 시각 렌더링에는 일반적인 축 배향을 채택합니다. 느린 자전 때문에 정확한 spin 축은 원반에 시각적으로 중요하지 않기 때문입니다.",
  "h2_96":"Visual styling",
  "p_97":"NearStars 렌더러에서 ε Indi A 는, 의미가 스스로의 수수하고 조용한 광구가 아니라 그 동반체에 있는 따뜻한 오렌지-호박색 K5 V 왜성으로 그려집니다.",
  "li_98":"<b>전체 외형.</b> <span class=\"hex-chip\" style=\"background:#ffb870\"></span><code>#ffb870</code> 으로 인코딩한 따뜻한 오렌지-호박색 원반. 분자 밴드가 파란 쪽을 억제한 뒤의 4700 K 흑체 연속체로 — 카탈로그의 더 따뜻한 K 왜성 (40 Eri A K0.5 V <span class=\"hex-chip\" style=\"background:#ffd5a8\"></span><code>#ffd5a8</code>, ε Eri K2 V <span class=\"hex-chip\" style=\"background:#ffd9a8\"></span><code>#ffd9a8</code>) 보다 깊은 호박색이고, 옅은 따뜻한 주황의 M 왜성 (바너드 <span class=\"hex-chip\" style=\"background:#ffd487\"></span><code>#ffd487</code>) 보다 약간 더 포화돼 있습니다. K5 V 가 그 사이에 위치하며, 가까운 K 왜성 중 뚜렷이 오렌지인 것으로 읽히도록 색조를 잡았습니다. 장면 조명 색온도는 4700 K SED 가 구동합니다.",
  "li_99":"<b>조용한 spotted 표면.</b> 35 d 자전과 ~7 yr 활동 주기에 맞춰 천천히 변조되는 낮은 cool-spot 비율 (<code>visual_spot_coverage_max ≈ 0.05</code>). 차분한 원반 — 활동적인 K 왜성의 분주한 spotted 표면이 아니라, 천천히 진화하는 작은 spot 군집 몇 개입니다.",
  "li_100":"<b>활동 주기 (미묘함).</b> ~7.1 yr 태양형 색채권 주기 (Lundkvist 2024) 는 주기 최대에서 색채권 방출의 느리고 적당한 밝아짐과 spot 비율의 작은 상승으로 표현할 수 있습니다 — ε Eri 의 시끄러운 2.9 yr 주기보다 훨씬 약한, 부드러운 다년 애니메이션입니다.",
  "li_101":"<b>flare 없음, 오로라 없음.</b> 카탈로그의 활동적인 왜성과 달리 ε Indi A 는 규정하는 flaring 이나 자기권 특징이 없습니다. 꾸준하고 차분한 오렌지-호박색 별로 렌더링됩니다.",
  "li_102":"<b>하늘의 동반체 (헤드라인).</b> 시스템의 시각적 흥미는 동반체에 있습니다. 차가운 슈퍼목성 ε Indi A b 는 ~20.9 AU 에서 공전합니다 — 별에서 보면 멀고 희미한 점이고, 행성에서 보면 별은 ~1.1 arcmin (0.018°) 를 차지해 지구에서 본 태양 각크기의 약 1/30, 눈부신 오렌지-호박색 점입니다. 훨씬 멀리 ~1459 AU 에서는 갈색왜성 쌍 ε Indi B (Ba + Bb) 가 두 개의 희미한 깊은-적색 T-왜성 점으로 빛납니다 — 지구에서 맨눈으로는 보이지 않을 만큼 어둡지만 시스템의 광역 렌더에서는 인상적인 쌍입니다.",
  "li_103":"<b>지구에서.</b> ε Indi A 는 인두스자리의 V = 4.66 맨눈 별로, 수수한 0.239 L☉ 광도에도 11.9 광년 근접 덕에 망원경 없이 보입니다 — 하늘에서 가장 가까운 맨눈 별 중 하나입니다.",
  "h2_104":"Bibliography",
  "h3_105":"Read (drove Decisions above)",
  "li_106":"<b>Lundkvist M. S. et al. 2024</b> — <i>Low-amplitude solar-like oscillations in the K5 V star ε Indi A</i>, ApJ 964, 110 (<code>2024ApJ...964..110L</code>, doi:10.3847/1538-4357/ad25f2, <a href=\"https://arxiv.org/abs/2403.04509\">arXiv:2403.04509</a>). ν_max = 5265 ± 110 µHz (역대 최고 주파수) 에서 태양형 진동을 검출해, 간섭계 R = 0.713 ± 0.006 R☉ (Rains 2020 θ_LD + Gaia d) 와 ν_max 스케일링으로 측성지진 질량 M = 0.782 ± 0.023 M☉ 도출. UVES 에서 Teff = 4700 ± 65 K, [Fe/H] = −0.17. HARPS R&#x27;HK 아카이브에서 ≈ 2600 d 활동 주기. 질량/반지름/Teff 의 Phase 2 recommended 앵커.",
  "li_107":"<b>Feng F. et al. 2019</b> — <i>Detection of the nearest Jupiter analog in radial velocity and astrometry data</i>, MNRAS 490, 5002 (<code>2019MNRAS.490.5002F</code>, doi:10.1093/mnras/stz2912, <a href=\"https://arxiv.org/abs/1910.06804\">arXiv:1910.06804</a>). RV + Hipparcos/Gaia 측성으로 ε Indi A b 검출. 광도 (0.239 L☉) 의 Phase 2 recommended 출처이며 ~35 d 자전과 ~4 Gyr 나이를 보강. 여기서의 행성 궤도 (a ≈ 11.6 AU, ~3 M_Jup) 는 Matthews 2026 으로 대체.",
  "li_108":"<b>Feng F. et al. 2018</b> — <i>Detection of the closest Jovian exoplanet in the ε Indi triple system</i> (<code>2018arXiv180308163F</code>, <a href=\"https://arxiv.org/abs/1803.08163\">arXiv:1803.08163</a>). arXiv 프리프린트. 자전 주기 (~35 d, RV + 활동지표 주기도. 17.8 d 신호는 half-rotation alias) 의 Phase 2 recommended 출처. 심사 bibcode 없음 — 행성 궤도는 Feng 2019 / Matthews 2026 으로 대체.",
  "li_109":"<b>Chen M. et al. 2022</b> — <i>Precise Dynamical Masses of ε Indi Ba and Bb: Evidence of Slowed Cooling at the L/T Transition</i>, AJ 163, 288 (<code>2022AJ....163..288C</code>, doi:10.3847/1538-3881/ac66d2, <a href=\"https://arxiv.org/abs/2205.08077\">arXiv:2205.08077</a>). VLT/NACO 상대 + FORS2 절대 측성으로 갈색왜성 쌍. Ba (T1–1.5) 66.92 ± 0.36 M_Jup, Bb (T6) 53.25 ± 0.29 M_Jup. ε Indi A 활동 지표 (log R&#x27;HK = −4.72, Pace 2013) 와 채택 시스템 나이 (3.48 +0.78/−1.03 Gyr, Bayesian 활동-나이) 의 Phase 2 recommended 출처 — 갈색왜성 쌍 Decisions 행의 출처이기도.",
  "h3_110":"Read (context / methodology, not decision-driving)",
  "li_111":"<b>Matthews E. C. et al. 2024</b> — ε Indi A b 의 JWST/MIRI 직접 촬영 발견 (<code>2024Natur.633..789M</code>, <a href=\"https://arxiv.org/abs/2503.01599\">arXiv:2503.01599</a>). ~275 K 차가운 슈퍼목성과 elevated-metallicity / 3–5 µm 흐림 맥락을 확립. 행성 b 합성 (<code>docs/phase3/eps-ind-a-b.md</code>) 을 구동하며, 여기서는 시스템 틀을 위해 인용. 캐시에 ar5iv 전문이 없어 (HTML-only stub), 숫자는 초록과 Matthews 2026 의 요약에서 취함.",
  "li_112":"<b>Matthews E. C. et al. 2026</b> — <i>A second visit to ε Ind Ab with JWST</i>, ApJL (doi:10.3847/2041-8213/ae5823, <a href=\"https://arxiv.org/abs/2603.08780\">arXiv:2603.08780</a>). 두 번째 JWST/MIRI epoch 으로 암모니아 확인 + 두꺼운 물-얼음 구름 제안. 정밀 질량 7.6 ± 0.7 M_Jup, a = 20.9 AU, e = 0.244. 행성 b 합성을 구동하며, 여기서는 시스템 틀을 위해 인용.",
  "li_113":"<b>Demory B.-O. et al. 2009</b> — VLTI/VINCI 간섭계 반지름/Teff/L (<code>2009A&amp;A...505..205D</code>). Phase 2 대안 질량 0.762 ± 0.038 M☉ (Xia 2008 M–L 관계 경유), Lundkvist 2024 와 1σ 안 일치. VizieR-only (ar5iv 본문 없음). 이번 세션에서 표-검증 안 됨.",
  "li_114":"<b>Santos N. C. et al. 2004</b> — 행성-호스트 별의 분광 금속도 (<code>2004A&amp;A...415.1153S</code>). ε Indi A 에 대해 [Fe/H] = −0.06 ± 0.08 (Matthews 2026 경유). 스킵된 금속도 행의 맥락.",
  "h3_115":"Read (instrument-only, not visual-informative)",
  "li_116":"Lundkvist 2024 의 측성지진 방법론 (HARPS/UVES RV 시계열, 가중 파워 스펙트럼, ν_max 엔벨로프 피팅) 과 Chen 2022 의 측성 방법론 (NACO 상대 + FORS2 절대 측성, orvara 식 궤도 피팅) 은 질량과 나이 결정의 기기적 골격이지만, 위에서 이미 쓴 값 이상의 직접 시각 필드를 주지는 않습니다.",
  "h3_117":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_118":"Demory 2009 의 VLTI/VINCI 별별 간섭계 표는 ar5iv 본문이 아니라 VizieR (J/A+A/505/205) 에 있어 bibliography 에서 manual_followup 으로 표시됐고, 그 질량값은 Phase 2 대안으로 보존됩니다. 더 오래된 자전/나이 추정 (Saar &amp; Osten 1997 ~22 d, Lachaume 1999 ~20 d) 은 Feng 2018 ~35 d 주기와 Chen 2022 활동 나이로 대체되어 역사적 맥락으로만 보존됩니다. 읽을 잔해-원반 논문은 없습니다 (보고된 바 없음).",
  "h2_119":"Stellar wind / astrosphere",
  "p_120":"ε Ind A 는 교과서적인 <b>compact astrosphere</b> 입니다. 적당한 항성풍 (Ṁ = 0.5 Ṁ⊙) 이 빠른 ~68 km/s ISM 유입과 부딪치며 겨우 <b>~32 AU</b> 에서 standoff 합니다 — Wood 2005 가 이를 명시적으로 compact 라 부르며, 우리의 6D-측성 V_ISM (69 km/s) 이 Wood 의 68 km/s 를 재현해 방법을 검증합니다. <b>5.65 년</b> 주기로 사이클링합니다 (Laliotis 2023. Lovis 2011 의 4.71 년과 일치). 다소 활동적인 노년 K 왜성인데, 측정된 X-ray 출력은 <b>정온 태양의 ~3×</b> 입니다 (Wood 2005 RASS log L_X 27.39, Chen 2022 R_X −5.62 도 동의) — 차분한 나이에 비해 입자 환경이 매운 편입니다.",

  "h2_149":"Open items for follow-up",
  "li_150":"<b>행성 Phase 3 합성.</b> ε Indi A b 는 별도 Phase 3 문서 (<code>eps-ind-a-b.md</code>) 로 만들며, Matthews 2024/2026 위에 정박합니다. 가장 가까운 직접 촬영 차가운 슈퍼목성이자 시스템의 헤드라인 특징입니다.",
  "li_151":"<b>갈색왜성 쌍 ε Indi B (DB 추가 대기).</b> Ba (T1–1.5, 66.9 M_Jup) + Bb (T6, 53.3 M_Jup), ~1459 AU (Chen 2022) 는 아직 NearStars 바디가 아닙니다. 이들을 — Chen 2022 역학 질량과 Ba–Bb 상호 궤도와 함께 — 추가하면 cfg 가 전체 ε Indi 계층적 삼중성계를 렌더링할 수 있습니다. 이 합성에서 언급하되 여기서 DB 나 Phase 3 문서를 만들지는 않습니다.",
  "li_152":"<b>나이.</b> Phase 2 나이 배열 없음. ~3.5 Gyr Chen 2022 활동 나이는 medium 신뢰도의 literature-direct 값입니다. 미래 큐레이션이 자이로크로놀로지, 측성지진, 운동학 나이를 추가하면 cfg 나이를 교체해야 합니다. 0.39–5 Gyr 문헌 분포 (Lundkvist 2024) 가 잔여 불확실성입니다.",
  "li_153":"<b>자전 주기 불확실도.</b> Feng 2018 은 &quot;~35 d&quot; 를 형식 σ 없이, RV-활동지표 (비측광) 방법으로 보고합니다. TESS 나 전용 측광 자전 측정이 있으면 값과 자이로크로놀로지 나이 교차검증을 다듬을 수 있습니다.",
  "li_154":"<b>금속도.</b> 프로젝트 정책에 따라 스킵. 문헌 ≈ −0.17 (Lundkvist 2024). 미래 cfg 가 금속도-적화 보정을 필요로 하면 값은 있으나, 고정 Teff 에서 색 효과는 sub-perception 입니다.",
  "li_155":"<b>활동-주기 시각화 충실도.</b> ~7.1 yr 태양형 주기 (Lundkvist 2024) 는 느린 밝아짐 / spot-coverage 변조의 tie-break 시각 선택입니다. 렌더러가 표현 가능해지면 주기-위상을 게임 epoch 에 맞춰 다듬습니다.",
  "h2_156":"Related",
  "li_157":"<a href=\"../wiki/reference__methodology.html\">methodology</a> — Decisions 표의 스키마 출처",
  "li_158":"<a href=\"eps-ind-a-b.html\">eps-ind-a-b</a> — 가장 가까운 직접 촬영 차가운 슈퍼목성 (~7.6 M_Jup, ~20.9 AU). JWST 암모니아 + 물-얼음 구름",
  "li_159":"<a href=\"eps-eri.html\">eps-eri</a> — 비교용 가까운 K 왜성 (K2 V). 확인된 거대 행성과 분해된 삼중-고리 원반을 가짐. ε Eri 의 시끄러운 활동 + 원반을 ε Indi A 의 조용하고 원반 없는 광구와 대비",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
