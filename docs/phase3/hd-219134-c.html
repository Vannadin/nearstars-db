  "h2_141":"Surface synthesis",
  "p_142":"HD 219134 c is the densest planet in the system and the second of the two transiting rocky super-Earths. Three anchors pin the synthesis:",
  "p_143":"1. <b>Measured mass and radius.</b> Gillon 2017&#x27;s Spitzer transit gives R = 1.511 ± 0.047 R⊕ and the combined transit + RV solution gives M = 4.36 ± 0.22 M⊕. The bulk density ρ ≈ 7.0 g/cc (derived) is the highest of any planet in the system — even denser than b — and firmly rocky/iron-rich, with no room for a volatile envelope. Gillon 2017 highlight the b/c pair as among the densest known transiting super-Earths.",
  "p_144":"2. <b>Insolation 64.5 S⊕, T_eq ≈ 789 K.</b> Cooler than b but still intensely hot. The substellar airless peak reaches ~970 K (derived), which is below the basalt solidus (~1300 K) — so unlike b, c has no substellar magma cap. It is a baked, dry rock rather than a lava world.",
  "p_145":"3. <b>Atmospheric loss.</b> As with b, any primordial H/He envelope was photoevaporated long ago (Owen &amp; Wu 2017), and the extreme density confirms there is no thick envelope. A secondary atmosphere is marginal at 789 K under the close-in XUV flux.",
  "p_146":"<b>Color choice.</b> Under the 4858 K K3 V orange illumination, c&#x27;s surface is rendered as a dark baked basaltic crust <span class=\"hex-chip\" style=\"background:#3a3026\"></span><code>#3a3026</code> — slightly browner and lighter than b&#x27;s near-melt <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code>, reflecting the cooler unmelted state. The accent <span class=\"hex-chip\" style=\"background:#8a3a1a\"></span><code>#8a3a1a</code> is a baked iron-oxide / regolith red-brown rather than a lava glow (a tie-break, interesting-first): c is below the melt point, so its distinctive feature is oxidized patchiness, not a glowing substellar cap.",
  "p_147":"<b>Morphology under tidal lock.</b> With no surface melt, c&#x27;s appearance is closer to a strongly-insolated Mercury: impact-cratered basaltic plains accumulated over the system age, baked and volatile-stripped, with no magma resurfacing to erase craters. The substellar hemisphere is the hottest but still solid; the antistellar hemisphere is cold, dark regolith with no cold-trap.",
  "h2_148":"Atmosphere synthesis",
  "p_149":"The atmospheric inference for c is theoretical but, like b, strongly constrained by the measured density. The cfg adopts the <b>airless</b> interpretation.",
  "p_150":"<b>Pressure choice.</b> Surface pressure 0 Pa (airless). At 7.0 g/cc, c is the densest planet in the system — pure rock and iron with no volatile envelope, and Owen &amp; Wu 2017&#x27;s photoevaporation physics places a 4.4 M⊕ core at 0.064 AU in the core-only regime. A secondary atmosphere at 789 K is marginal; the cfg picks airless. Because c is cooler than b, even surface outgassing into an exosphere is weaker, so c is effectively a bare rock.",
  "p_151":"<b>Composition.</b> No hydrostatic atmosphere. Any surface-sourced exosphere (Schaefer &amp; Fegley 2009 scaling) is fainter than b&#x27;s because the lower substellar temperature suppresses silicate volatilization; the column density is far below any Rayleigh threshold and gives no visible limb haze.",
  "p_152":"<b>Sky appearance.</b> No atmosphere means a uniformly black sky. HD 219134 dominates c&#x27;s dayside sky at angular diameter ~6.0° (about 12× the Sun&#x27;s apparent size from Earth), a warm-orange disk flooding the surface with ~64× Earth-noon brightness. The inner planet b appears as a bright point at conjunction; the outer planets are fainter. The limb is a clean edge from disk to space.",
  "h2_153":"Rotation &amp; spin synthesis",
  "p_154":"The 6.765-day orbital period at 0.064 AU around a 0.696 M☉ host gives a tidal-locking timescale far shorter than the system age (Hut 1981), so the 1:1 spin-orbit resonance is fully established and obliquity has damped to zero.",
  "p_155":"<b>Spin-orbit state.</b> The curated eccentricity is 0.062 — small but non-zero. This sits just above the e ≈ 0.01 boundary below which 1:1 is the only stable state, so a 3:2 resonance trap is in principle possible by analogy with Mercury (e = 0.205). However, slow eccentricity damping in a compact multi-planet chain favors 1:1 as the likely endpoint; the cfg adopts 1:1 (substellar point fixed) and notes the 3:2 alternative as a cfg variant in Open items.",
  "p_156":"<b>KSP implementation note.</b> Rotation period = orbital period = 6.765 days (584 496 s). In Kopernicus the body&#x27;s <code>rotationPeriod</code> should equal the orbital <code>period</code> in seconds.",
  "p_157":"<b>No seasons.</b> Obliquity damped to zero. The small eccentricity (e = 0.062) gives a peri-to-apo insolation range of S = (1 ± e)⁻² × 64.5 ≈ 57 → 73 S⊕ over the orbit, but with a fixed substellar point this manifests as a slight modulation of the dayside temperature rather than seasonal weather. Tidal heating at e = 0.062 is modest (Bolmont 2020 scaling); the surface energy budget is insolation-dominated.",
  "h2_158":"Visual styling",
  "p_159":"Combining the surface and atmosphere decisions:",
  "li_160":"<b>Global appearance (orbit view).</b> A dark-bodied rocky super-Earth, baked but unmelted, with dark basaltic plains and faint oxidized red-brown patchiness, fading to a black nightside. No glowing substellar cap (unlike b) — c is below the melt point.",
  "li_161":"<b>Dayside.</b> Hot (~970 K substellar) baked basalt, tint <span class=\"hex-chip\" style=\"background:#3a3026\"></span><code>#3a3026</code>, with <span class=\"hex-chip\" style=\"background:#8a3a1a\"></span><code>#8a3a1a</code> oxidized-iron accent patches. Mercury-analog cratered terrain rather than smooth lava plains.",
  "li_162":"<b>Nightside.</b> Cold (~130 K) and dark; same tint as the dayside but unlit. Visible only by sister-planet reflected light.",
  "li_163":"<b>Terminator band.</b> Sharp, due to the absence of atmospheric scattering. Crater rims and ridges throw long shadows in the grazing orange light.",
  "li_164":"<b>Atmosphere haze.</b> None visible; airless. The limb is a clean edge.",
  "li_165":"<b>Star in sky.</b> HD 219134 subtends ~6.0° at c — about 12× the Sun&#x27;s angular size from Earth. Warm-orange (4858 K), illuminating the surface at ~64× Earth-noon brightness.",
  "li_166":"<b>Sister planets in sky.</b> b (inner, at 0.0382 AU) is the most prominent neighbor at inferior conjunction, near-coplanar; the warm RV-only planets and distant giant h appear as bright points.",
  "h2_167":"Bibliography",
  "h3_168":"Read (visual-informative, drove decisions above)",
  "li_169":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). Spitzer photometry establishing c&#x27;s transit: R = 1.511 ± 0.047 R⊕, true mass 4.36 ± 0.22 M⊕, e = 0.062, T_eq ≈ 782 K; the densest planet in the system. <b>The anchor for c&#x27;s mass, radius, density, T_eq, and orbit.</b>",
  "li_170":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). Photoevaporation physics placing a 4.4 M⊕ core at 0.064 AU in the core-only regime. Supports <code>atmosphere_present = false</code>.",
  "li_171":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, <a href=\"https://arxiv.org/abs/0905.4045\">arXiv:0905.4045</a>). Hot-rocky outgassing chemistry; informs the (weak) exosphere reading.",
  "h3_172":"Read (context / methodology, not decision-driving)",
  "li_173":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I.</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). RV discovery of c; orbital context superseded by the Gillon 2017 transit solution.",
  "li_174":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited host parameters (R★, Teff, L); alternative c radius 1.415 R⊕ (recommended:false).",
  "li_175":"<b>Hut P. 1981</b> — A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). Equilibrium- tide locking timescale; anchors <code>tidally_locked = true</code>.",
  "li_176":"<b>Bolmont E. et al. 2020</b> — (<code>2020A&amp;A...644A.165B</code>). Tidal-heating scaling at e = 0.062.",
  "h3_177":"Read (instrument-only, not visual-informative)",
  "li_178":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>). The full six-planet RV solution; system context, no new c-specific visual constraint.",
  "h3_179":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_180":"The c-specific arXiv record is small. The not-read set is dynamical-stability follow-ups (c is stable in the Gillon 2017 solution) and generic interior-modeling papers that do not change the rocky/airless reading fixed by the measured 7.0 g/cc density.",
  "h2_181":"Open items for follow-up",
  "li_182":"<b>JWST thermal emission / eclipse.</b> Like b, c is a bright-host bare-rock target; a MIRI eclipse would measure the dayside brightness temperature and Bond albedo and refine the surface tints.",
  "li_183":"<b>Cfg variant: thin retained CO₂ atmosphere.</b> A thin high-mean-molecular-weight atmosphere (≲ 0.1–1 bar CO₂) remains formally possible. A cfg variant with a thin hazy atmosphere is preserved for the &quot;retained atmosphere&quot; reading.",
  "li_184":"<b>Cfg variant: 3:2 spin-orbit resonance.</b> At e = 0.062, c sits just above the 1:1-only boundary; a Mercury-analog 3:2 variant would render with a slowly drifting hottest-longitude. Document as a Phase 3.5 alternative.",
  "li_185":"<b>Surface mineralogy.</b> Hex codes are tie-break choices; future thermal-emission spectroscopy would refine them.",

  "p_1":"HD 219134 c 는 시스템의 두 번째 transit 행성으로, 밝고 조용한 K3 V 왜성 HD 219134 주위에서 b 바로 바깥에 있습니다. b 처럼 측정된 진질량과 측정된 반지름을 모두 가지고 있고 (Gillon et al. 2017, Spitzer 측광), M = 4.36 ± 0.22 M⊕, R = 1.511 ± 0.047 R⊕, 작은 이심률 e = 0.062 의 0.064 AU 6.765 일 궤도입니다. bulk 밀도는 시스템에서 가장 높아 ρ ≈ 7.0 g/cc — b 보다도 밀도가 높고, volatile envelope 없이 확고히 암석/철 풍부합니다. b 보다 차갑습니다 — TEPCat 은 T_eq ≈ 782 K 를 제시하고, 프로젝트 공식 T_eq = 278.3 · L^0.25 / √a (L = 0.264) 는 zero albedo 에서 789 K 를 줍니다.",
  "p_2":"<b>NearStars 시나리오 선택은 어두운 basalt 표면과 희미한 산화 / sub-melt accent 를 가진, 뜨겁고 매우 밀도 높은 무대기 암석 super-Earth 입니다 — b 보다 차갑고 basalt 용융점 아래라 substellar 마그마 cap 은 없지만, 여전히 구워지고 대기가 빈약한 암석입니다.</b> 789 K 와 지구의 ~64 배 일사에서 c 는 부분용융 임계 아래지만 물을 유지하기엔 너무 뜨겁습니다. 극단적인 측정 밀도 (7.0 g/cc) 가 다시 두꺼운 volatile envelope 을 배제합니다. 대안 — 유지된 얇은 CO₂ 대기 — 은 후속 항목에 cfg 변형으로 보존합니다.",

  "td_132":"지구형 BSE(bulk-silicate-Earth) 방사성 열류속(현재값 ~0.04 W/m²)을 ~4.4 M⊕ 암석 조성으로 질량 스케일. 방법은 Wang et al. 2020 (<code>2020A&amp;A...644A..19W</code>)의 외계행성 방사성 열 프레임워크를 따름. 다만 Eu→Th/U 호스트 원소비 보정은 호스트별 원소비를 큐레이션하지 않아 적용하지 않았고, 대신 지구형 원소비를 가정함",

  "td_140":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_141":"표면 합성",
  "p_142":"HD 219134 c 는 시스템에서 가장 밀도 높은 행성이며 transit 하는 두 암석 super-Earth 중 둘째입니다. 세 가지 앵커가 합성을 고정합니다.",
  "p_143":"1. <b>측정된 질량과 반지름.</b> Gillon 2017 의 Spitzer transit 이 R = 1.511 ± 0.047 R⊕ 를 주고, transit + RV 결합 해가 M = 4.36 ± 0.22 M⊕ 를 줍니다. bulk 밀도 ρ ≈ 7.0 g/cc (유도) 는 시스템 어떤 행성보다도 높습니다 — b 보다도 밀도가 높고, volatile envelope 이 들어갈 자리 없이 확고히 암석/철 풍부합니다. Gillon 2017 은 b/c 쌍을 알려진 transit super-Earth 중 가장 밀도 높은 축으로 강조합니다.",
  "p_144":"2. <b>일사 64.5 S⊕, T_eq ≈ 789 K.</b> b 보다 차갑지만 여전히 강렬하게 뜨겁습니다. substellar 무대기 정점은 ~970 K (유도) 에 도달하는데, 이는 basalt solidus (~1300 K) 아래입니다 — 그래서 b 와 달리 c 는 substellar 마그마 cap 이 없습니다. lava world 가 아니라 구워지고 메마른 암석입니다.",
  "p_145":"3. <b>대기 손실.</b> b 와 마찬가지로 어떤 원시 H/He envelope 도 오래전에 광증발했고 (Owen &amp; Wu 2017), 극단적 밀도가 두꺼운 envelope 이 없음을 확인합니다. 2차 대기는 가까운 XUV flux 아래 789 K 에서 미미합니다.",
  "p_146":"<b>색 선택.</b> 4858 K K3 V 오렌지 조명 아래에서 c 의 표면은 어두운 구워진 basalt 지각 <span class=\"hex-chip\" style=\"background:#3a3026\"></span><code>#3a3026</code> 으로 렌더링됩니다 — b 의 용융 임박 <span class=\"hex-chip\" style=\"background:#2a2422\"></span><code>#2a2422</code> 보다 약간 갈색이고 밝아, 더 차가운 미용융 상태를 반영합니다. accent <span class=\"hex-chip\" style=\"background:#8a3a1a\"></span><code>#8a3a1a</code> 은 용암 glow 가 아니라 구워진 산화철 / regolith 적갈색입니다 (tie-break, 흥미로움 우선). c 는 용융점 아래라 독특한 feature 가 빛나는 substellar cap 이 아니라 산화 얼룩입니다.",
  "p_147":"<b>조석 고정 하의 지형.</b> 표면 용융이 없어 c 의 외관은 강하게 일사를 받는 수성에 더 가깝습니다 — 시스템 나이에 걸쳐 누적된 충돌 cratered basalt 평원이 구워지고 volatile 이 제거되며, 크레이터를 지울 마그마 재포장이 없습니다. substellar 반구는 가장 뜨겁지만 여전히 고체이고, antistellar 반구는 차갑고 어두운 regolith 로 cold-trap 이 없습니다.",
  "h2_148":"대기 합성",
  "p_149":"c 의 대기 추론은 이론적이지만, b 처럼 측정된 밀도로 강하게 제약됩니다. cfg 는 <b>무대기</b> 해석을 채택합니다.",
  "p_150":"<b>압력 선택.</b> 표면 압력 0 Pa (무대기). 7.0 g/cc 에서 c 는 시스템에서 가장 밀도 높은 행성입니다 — volatile envelope 없는 순수 암석과 철이고, Owen &amp; Wu 2017 의 광증발 physics 가 0.064 AU 의 4.4 M⊕ core 를 core-only 영역에 둡니다. 789 K 에서 2차 대기는 미미해 cfg 는 무대기를 선택합니다. c 는 b 보다 차가워 exosphere 로의 표면 outgassing 마저 약하므로, 사실상 맨 암석입니다.",
  "p_151":"<b>조성.</b> 정수압 대기 없음. 어떤 표면 기원 exosphere (Schaefer &amp; Fegley 2009 스케일링) 도 b 의 것보다 희미한데, 더 낮은 substellar 온도가 silicate 휘발을 억누르기 때문입니다. column 밀도는 Rayleigh 임계 한참 아래라 보이는 limb haze 가 없습니다.",
  "p_152":"<b>하늘 외관.</b> 대기가 없으니 하늘은 균일하게 검습니다. HD 219134 가 c 의 dayside 하늘을 각지름 ~6.0° 로 지배하고 (지구에서 본 태양 각 크기의 약 12 배), 따뜻한 오렌지 disk 가 표면을 ~64× 지구 정오 밝기로 적십니다. 안쪽 행성 b 가 합 시 밝은 점으로 보이고, 바깥 행성들은 더 희미합니다. limb 는 disk 에서 우주로의 깔끔한 가장자리입니다.",
  "h2_153":"자전 &amp; spin 합성",
  "p_154":"0.696 M☉ 호스트 주위 0.064 AU 의 6.765 일 궤도 주기는 시스템 나이보다 훨씬 짧은 조석 고정 timescale (Hut 1981) 을 주므로, 1:1 회전-궤도 공명이 완전히 확립되었고 황도경사각도 0 까지 damping 되었습니다.",
  "p_155":"<b>회전-궤도 상태.</b> curated 이심률은 0.062 — 작지만 0 이 아닙니다. 이는 1:1 이 유일한 안정 상태가 되는 e ≈ 0.01 경계 바로 위라, 수성 (e = 0.205) 유사로 3:2 공명 trap 이 원칙적으로 가능합니다. 다만 조밀한 다행성 사슬에서 느린 이심률 damping 은 1:1 을 유력한 종착점으로 선호합니다. cfg 는 1:1 (substellar 점 고정) 을 채택하고 3:2 대안은 후속 항목에 cfg 변형으로 기록합니다.",
  "p_156":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 6.765 일 (584 496 s) 입니다. Kopernicus 에서 body 의 <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 초 단위로 동일하게 설정합니다.",
  "p_157":"<b>계절 없음.</b> obliquity 가 0 까지 damping 됨. 작은 이심률 (e = 0.062) 은 궤도에 걸쳐 peri-에서-apo 일사 범위 S = (1 ± e)⁻² × 64.5 ≈ 57 → 73 S⊕ 를 주지만, substellar 점이 고정되어 이는 계절 날씨가 아니라 dayside 온도의 약간의 변조로 나타납니다. e = 0.062 에서 조석 가열은 적당하고 (Bolmont 2020 스케일링), 표면 에너지 예산은 일사 지배입니다.",
  "h2_158":"비주얼 스타일",
  "p_159":"표면과 대기 결정을 종합하면 다음과 같습니다.",
  "li_160":"<b>전역 외관 (궤도 뷰).</b> 구워졌지만 녹지 않은 어두운 암석 super-Earth 로, 어두운 basalt 평원과 희미한 산화 적갈색 얼룩을 가지며 nightside 로 갈수록 검어집니다. (b 와 달리) 빛나는 substellar cap 은 없습니다 — c 는 용융점 아래입니다.",
  "li_161":"<b>Dayside.</b> 뜨거운 (~970 K substellar) 구워진 basalt, tint <span class=\"hex-chip\" style=\"background:#3a3026\"></span><code>#3a3026</code>, <span class=\"hex-chip\" style=\"background:#8a3a1a\"></span><code>#8a3a1a</code> 산화철 accent 얼룩. 매끄러운 용암 평원이 아니라 수성 유사 cratered 지형.",
  "li_162":"<b>Nightside.</b> 차갑고 (~130 K) 어두움. dayside 와 같은 tint 이지만 조명 없음. 자매 행성 반사광으로만 보임.",
  "li_163":"<b>Terminator band.</b> 대기 scattering 이 없어 또렷함. 크레이터 림과 능선이 스치는 오렌지 빛에 긴 그림자를 드리움.",
  "li_164":"<b>대기 haze.</b> 보이지 않음. 무대기. limb 는 깔끔한 가장자리.",
  "li_165":"<b>하늘의 별.</b> HD 219134 가 c 에서 ~6.0° 를 차지 — 지구에서 본 태양 각 크기의 약 12 배. 따뜻한 오렌지 (4858 K), 표면을 ~64× 지구 정오 밝기로 조명.",
  "li_166":"<b>하늘의 자매 행성.</b> b (안쪽, 0.0382 AU) 가 내합 시 가장 두드러진 이웃으로 거의 동일 평면. 따뜻한 RV-only 행성들과 먼 거인 h 는 밝은 점으로 보임.",
  "h2_167":"참고 문헌",
  "h3_168":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_169":"<b>Gillon M. et al. 2017</b> — <i>Two massive rocky planets transiting a K-dwarf 6.5 parsecs away</i>, Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>, doi:10.1038/s41550-017-0056). c 의 transit 을 확립한 Spitzer 측광. R = 1.511 ± 0.047 R⊕, 진질량 4.36 ± 0.22 M⊕, e = 0.062, T_eq ≈ 782 K. 시스템에서 가장 밀도 높은 행성. <b>c 의 질량, 반지름, 밀도, T_eq, 궤도의 앵커.</b>",
  "li_170":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, <a href=\"https://arxiv.org/abs/1705.10810\">arXiv:1705.10810</a>). 0.064 AU 의 4.4 M⊕ core 를 core-only 영역에 두는 광증발 physics. <code>atmosphere_present = false</code> 를 뒷받침.",
  "li_171":"<b>Schaefer L. &amp; Fegley B. 2009</b> — <i>Chemistry of silicate atmospheres of evaporating super-Earths</i>, ApJ 703, L113 (<code>2009ApJ...703L.113S</code>, <a href=\"https://arxiv.org/abs/0905.4045\">arXiv:0905.4045</a>). hot-rocky outgassing 화학. (약한) exosphere 해석에 정보 제공.",
  "h3_172":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_173":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I.</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). c 의 RV 발견. 궤도 맥락은 Gillon 2017 transit 해로 대체됨.",
  "li_174":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 상속된 호스트 파라미터 (R★, Teff, L). 대안 c 반지름 1.415 R⊕ (recommended:false).",
  "li_175":"<b>Hut P. 1981</b> — A&amp;A 99, 126 (<code>1981A&amp;A....99..126H</code>). 평형 조석 고정 timescale. <code>tidally_locked = true</code> 의 앵커.",
  "li_176":"<b>Bolmont E. et al. 2020</b> — (<code>2020A&amp;A...644A.165B</code>). e = 0.062 에서의 조석 가열 스케일링.",
  "h3_177":"읽음 (instrument-only, 시각 정보 아님)",
  "li_178":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>). 여섯 행성 RV 해 전체. 시스템 맥락. c 별 시각 제약은 없음.",
  "h3_179":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_180":"c 별 arXiv 기록은 적습니다. 읽지 않은 세트는 동역학적 안정성 후속 (c 는 Gillon 2017 해에서 안정) 과, 측정된 7.0 g/cc 밀도로 고정된 암석/무대기 해석을 바꾸지 않는 일반 내부-모델링 논문입니다.",
  "h2_181":"후속 항목",
  "li_182":"<b>JWST 열복사 / eclipse.</b> b 처럼 c 도 밝은 호스트의 맨 암석 타깃입니다. MIRI eclipse 가 dayside brightness temperature 와 Bond albedo 를 측정해 표면 tint 를 정밀화합니다.",
  "li_183":"<b>cfg 변형: 유지된 얇은 CO₂ 대기.</b> 얇은 고분자량 대기 (≲ 0.1–1 bar CO₂) 가 형식적으로 여전히 가능합니다. 얇은 hazy 대기를 가진 cfg 변형을 &quot;유지된 대기&quot; 해석을 위해 보존합니다.",
  "li_184":"<b>cfg 변형: 3:2 회전-궤도 공명.</b> e = 0.062 에서 c 는 1:1-전용 경계 바로 위입니다. 수성 유사 3:2 변형은 천천히 표류하는 최고온 경도로 렌더링됩니다. Phase 3.5 대안으로 기록.",
  "li_185":"<b>표면 광물학.</b> hex 코드는 tie-break 선택입니다. 향후 열복사 분광이 이들을 정밀화합니다.",
  "h2_186":"Related",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
