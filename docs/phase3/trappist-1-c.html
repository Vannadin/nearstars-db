  "li_151":"<b>Pressure</b> at 0.1 bar (10 kPa). Within Lincowski 2023&#x27;s 1σ consistency envelope for O₂-dominated compositions with low CO₂.",
  "li_152":"<b>Composition</b> dominated by O₂ (~98%) with trace H₂O vapor (~1%) and trace O₃ from photolysis (~100 ppm). CO₂ kept very low (~100 ppm) to honor the Zieba 2023 / Lincowski 2023 constraints. The O₂ origin is hydrodynamic-escape fossil: Luger &amp; Barnes 2015 show that an initial H₂O steam atmosphere on the early TRAPPIST-1 worlds would lose H to space and leave behind ~10 bar of O₂; later photolysis + surface oxidation reduces this to the observed thin-O₂ remnant.",
  "li_153":"<b>No clouds</b> in the canonical state. The thin O₂ atmosphere has insufficient water for cloud formation in steady state, and CO₂ is too low for CO₂-ice clouds.",
  "p_154":"<b>Sky appearance.</b> The 0.1 bar O₂ atmosphere has weak Rayleigh scattering (about 5% at 0.5 μm vs. Earth&#x27;s 1 bar of N₂+O₂). The sky near the substellar point is faintly dark-violet at the zenith, transitioning to a pale gray-orange near the limb where the stellar disk is bright. Toward the nightside, the sky is essentially black. O₃ Chappuis absorption (peaking near 0.6 μm) adds a subtle gray overtone in the day-side scattered light. The host star dominates the daytime sky at angular size 4.02° (about 8× the Sun&#x27;s angular size from Earth).",
  "h2_155":"Rotation &amp; spin synthesis",
  "p_156":"Tidal damping for c at 2.42-day period over 7.6 Gyr establishes the synchronous (1:1) configuration unambiguously. Obliquity damped to zero. Eccentricity is 0.00654 (Agol 2021) — too low to support a 3:2 resonance (Vinson 2017 finds 3:2 stable only for e ≳ 0.01).",
  "p_157":"<b>KSP implementation note.</b> Rotation period = orbital period = 2.4219 days (209 254 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_158":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.5%. The substellar point is fixed in the surface frame on geological timescales (modulo the slow precession noted for b).",
  "p_159":"<b>Eccentricity-driven tidal flexure.</b> With e = 0.00654 and an ultra-cool dwarf host, the tidal heating rate from forced libration is modest (Bolmont 2020: ~0.005–0.05 W/m² for c). Insufficient to drive active volcanism; consistent with the &quot;weathered surface&quot; inference.",
  "h2_160":"Visual styling",
  "p_161":"Combining surface and atmosphere decisions:",
  "li_162":"<b>Global color palette.</b> Dark weathered basalt body (<code>#2c2218</code> primary, <code>#604030</code> accent) under intense red-orange stellar light appears as a deep brown-charcoal world with subtle iron-oxide banding biased toward the substellar hemisphere. The thin O₂ atmosphere is essentially invisible from orbit except as a faint limb haze.",
  "li_163":"<b>Dayside.</b> Substellar region (~430 K subsolar peak, ~370 K general dayside) with iron-oxide patches strongest within 30° of substellar point. Subdued topographic relief — mature impact cratering, no active volcanism. Heat redistribution to nightside is weak but nonzero (~140 K nightside floor) due to the thin O₂ atmosphere.",
  "li_164":"<b>Terminator band.</b> Moderate topographic shadow contrast under grazing 2566 K light. Possible high-altitude pale-gray Rayleigh-scattered haze visible as a thin limb glow at low solar zenith angles.",
  "li_165":"<b>Nightside.</b> Cold (~140 K) and dark. Possible CO₂/H₂O frost in a narrow band ≳60° from substellar; appears as faint lighter patches under reflected light from sister planets. Thermal IR emission only in visible bands. KSP nightside ambient ≈ 5–10% of dayside.",
  "li_166":"<b>Atmosphere haze.</b> Thin pale gray-violet limb haze (<code>#3a3a40</code>), 3–8 km thick, visible against space at the planet&#x27;s limb only.",
  "li_167":"<b>Star in sky.</b> TRAPPIST-1 subtends 4.02° in c&#x27;s sky (8× the Sun from Earth). Color <code>#ff7a1a</code> (2566 K). Surface brightness ~2.27 S⊕ (similar to Venus&#x27;s insolation at Earth&#x27;s orbit). Flare activity identical to b — occasional prominent IR flares.",
  "li_168":"<b>Sister planets in sky.</b> b (next inward) appears at ~0.6° at inferior conjunction; d (next outward) at ~0.5° during conjunctions every 4–6 days. Near-coplanar geometry from Agol 2021.",
  "h2_169":"Bibliography",
  "h3_170":"Read (visual-informative, drove decisions above)",
  "li_171":"<b>2306.10150</b> Zieba 2023 — JWST/MIRI F1500W secondary eclipse of c. Fp/F★ = 421 ± 94 ppm, dayside T ≈ 380 K. Excludes Venus-analog and most CO₂-rich atmospheres. The discovery paper for c&#x27;s atmospheric upper limit.",
  "li_172":"<b>2308.05899</b> Lincowski 2023 — Broader atmosphere exploration for c using two-column climate+photochemistry. Finds thin O₂ low-CO₂ atmospheres consistent within 1σ. Drives the adopted O₂-dominated scenario.",
  "li_173":"<b>2509.02128</b> Ducrot 2025 — MIRI 15 μm phase curve of b and c. c dayside 369 ± 23 K, no nightside detection. Closes the atmospheric scenario space toward bare-rock / thin-O₂.",
  "li_174":"<b>2305.01250</b> Acuña 2023 — Interior-atmosphere modeling. Finds c most likely has a bare surface but cannot rule out a thin atmosphere. Supports the surface-vs-atmosphere degeneracy resolved by Lincowski 2023.",
  "li_175":"<b>2412.11987</b> Nicholls 2024 — Convective shutdown in lava-world atmospheres. Uses c as a case study; explores when magma oceans can persist under non-convective atmospheres. Informs the &quot;weathered surface&quot; vs. &quot;fresh ultramafic&quot; choice (c lands on weathered side).",
  "h3_176":"Read (context / methodology, not decision-driving)",
  "li_177":"<b>2412.16541</b> Stellar contamination correction using back-to-back b/c transits. Methodology relevant to all TRAPPIST-1 transmission; not directly visual-informative.",
  "li_178":"<b>2412.11627</b> Ducrot 2024 — b&#x27;s combined 12.8+15 μm eclipse analysis. Mentioned here because the bare-rock vs. CO₂-haze interpretation parallels c&#x27;s options.",
  "li_179":"<b>2507.02052</b> Uniform reanalysis of JWST MIRI 15 μm eclipses (frame-normalized PCA). Cross-check; consistent results.",
  "li_180":"<b>2505.03672</b> Statistical geochemical constraints on water outgassing as secondary-atmosphere source for TRAPPIST-1 planets. Background context for the &quot;fossil O₂&quot; inference.",
  "h3_181":"Read (instrument-only, not visual-informative)",
  "li_182":"<b>2409.19333</b> Stellar contamination correction methodology paper. Cited for completeness; no direct visual content for c.",
  "h3_183":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_184":"The c bibliography is smaller than b&#x27;s (32 vs 66). Most non-arXiv papers are conference summaries or sister-planet biosignature studies. Notable items skipped:",
  "li_185":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — likely the Nature Astronomy publication of Ducrot 2025 (covered via arXiv 2509.02128). Skip.",
  "li_186":"<b>2025arXiv...</b> various retraction / re-fit conference summaries. Skip unless any updates the c eclipse depth.",
  "p_187":"---",
  "h2_188":"Open items for follow-up",

  "li_190":"Cross-check the iron-oxide accent prominence against the c-specific predictions in Way 2024 / Cohen 2024 (TRAPPIST-1 surface oxidation modeling) if those become available.",

  "h2_133":"표면 합성",
  "p_134":"c 의 eclipse + phase-curve 데이터는 맨 어두운 low-albedo 표면 또는 최소 CO₂ 의 얇은 O₂ 지배 대기 어느 쪽과도 일관 (Zieba 2023, Lincowski 2023, Ducrot 2025). b 의 경우 Ducrot 2024 가 신선한 ultramafic 표면의 model-consistency 논거를 발견했지만 — c 의 eclipse 데이터는 unweathered 표면을 요구하지 않음. 역 해석도 가능. c 의 표면은 c 가 tidal + induction heating 이 더 적기 때문에 b 의 표면보다 상당히 노화됐을 수 있음 (Bolmont 2020 은 c 에서 tidal heating 이 ~10× 낮다고 추정하고, Grayver 2022 induction heating 도 같은 이유로 ~10× 낮음).",
  "p_135":"유의미한 resurfacing 없이 c 의 표면은 ~8 Gyr 의 충돌 폭격과 광화학적 풍화를 누적. 결과는 lunar highlands 또는 Mercury 의 intercrater 평원 (broadband visible albedo ≈ 0.06–0.10) 과 유사한 성숙한 어두운 low- albedo 표면, 그러나 후기 충돌로 전달된 표면 휘발성 물질의 UV 광분해로 substellar 반구 근처에 농축된 산화철 patch 포함.",
  "p_136":"<b>색 선택.</b> M8V 조명 아래의 풍화된 basalt. 어두운 basaltic primary <code>#2c2218</code> 는 풍화된 regolith 성숙도를 반영하기 위해 b 의 <code>#1a1612</code> 신선한 ultramafic 보다 약간 밝음. 산화철 accent <code>#604030</code> 은 b 보다 더 두드러짐. 이유는. (1) 표면이 더 노화되어 산화 시간이 더 있었고, (2) 얇은 O₂ 대기가 연속적인 저수준 산화제 공급을 제공.",
  "p_137":"<b>모양.</b> 활발한 resurfacing 없음은 보존된 충돌 기록 의미. 모든 크기 범위의 명확한 분화구, lunar highlands 에 접근하는 saturation 밀도. 초기 100–500 Myr 페이즈의 마그마 바다 잔존 feature (Krissansen-Totton 2022, TRAPPIST-1 시스템 마그마 바다 진화 논문) 는 후기 충돌 분지와 구별되는 넓은 highland 영역으로 여전히 부분적으로 보일 것.",

  "p_150":"NearStars 에서는 <b>0.1 bar O₂ 지배 얇은 대기</b> 채택.",
  "li_151":"<b>압력</b> 0.1 bar (10 kPa). 낮은 CO₂ 의 O₂ 지배 조성에 대한 Lincowski 2023 의 1σ 일관성 envelope 내.",
  "li_152":"<b>조성</b> 은 O₂ 지배 (~98%), 미량 H₂O vapor (~1%) 와 광분해의 미량 O₃ (~100 ppm). CO₂ 는 Zieba 2023 / Lincowski 2023 제약을 존중하기 위해 매우 낮게 유지 (~100 ppm). O₂ 기원은 hydrodynamic-escape fossil. Luger &amp; Barnes 2015 는 초기 TRAPPIST-1 세계의 H₂O 증기 대기가 H 를 우주로 잃고 ~10 bar O₂ 를 남길 것이라 보임; 이후 광분해 + 표면 산화가 이를 관측된 얇은 O₂ 잔재로 감소시킴.",
  "li_153":"<b>구름 없음</b> canonical 상태에서. 얇은 O₂ 대기는 steady state 에서 구름 형성에 충분한 물이 없고, CO₂ 는 CO₂-얼음 구름에 너무 낮음.",
  "p_154":"<b>하늘 외관.</b> 0.1 bar O₂ 대기는 약한 Rayleigh scattering 가짐 (지구의 1 bar N₂+O₂ 대비 0.5 μm 에서 약 5%). substellar 점 근처 하늘은 천정에서 옅게 dark-violet, stellar disk 가 밝은 limb 근처에서는 옅은 gray-orange 로 전환. nightside 쪽으로는 하늘이 본질적으로 검음. O₃ Chappuis 흡수 (0.6 μm 근처 피크) 가 dayside 산란광에 미묘한 회색 overtone 추가. 호스트 별이 4.02° 각 크기로 dayside 하늘 지배 (지구에서 본 태양 각 크기의 약 8배).",
  "h2_155":"자전 &amp; spin 합성",
  "p_156":"7.6 Gyr 에 걸친 2.42 일 주기의 c 에 대한 조석 damping 은 모호하지 않게 동기 (1:1) 구성을 확립. 황도 경사각은 0 으로 damping. eccentricity 는 0.00654 (Agol 2021) — 3:2 공명을 지지하기에는 너무 낮음 (Vinson 2017 은 3:2 가 e ≳ 0.01 에서만 안정적임을 발견).",
  "p_157":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 2.4219 일 (209 254 s). Kopernicus <code>rotationPeriod</code> 는 초 단위 궤도 <code>period</code> 와 일치해야 함.",
  "p_158":"<b>계절 없음.</b> 황도 경사각 = 0; libration 유도 insolation 변동 &lt; 0.5%. substellar 점은 표면 frame 에서 지질학적 시간 척도에 고정 (b 에서 지적된 느린 세차운동 modulo).",
  "p_159":"<b>Eccentricity 유도 조석 굴곡.</b> e = 0.00654 와 ultra-cool dwarf 호스트 로, 강제 libration 으로부터의 조석 가열 비율은 적당함 (Bolmont 2020. c 에 대해 ~0.005–0.05 W/m²). 활발한 화산 활동을 구동하기에 불충분; &quot;풍화된 표면&quot; 추론과 일관.",
  "h2_160":"비주얼 스타일",
  "p_161":"표면과 대기 결정 결합.",
  "li_162":"<b>전역 색 팔레트.</b> 어두운 풍화된 basalt body (<code>#2c2218</code> primary, <code>#604030</code> accent) 가 강렬한 적-오렌지 별빛 아래 → substellar 반구 쪽으로 편향된 미묘한 산화철 banding 의 깊은 brown-charcoal 세계로 나타남. 얇은 O₂ 대기는 옅은 limb haze 외에는 궤도에서 본질적으로 보이지 않음.",
  "li_163":"<b>Dayside.</b> Substellar 영역 (~430 K subsolar 피크, ~370 K 일반 dayside) 의 산화철 patch 가 substellar 점 30° 이내에서 가장 강함. 잔잔한 지형 기복 — 성숙한 충돌 cratering, 활발한 화산 활동 없음. nightside 로의 열 재분배는 약하지만 0 이 아님 (얇은 O₂ 대기로 인해 ~140 K nightside floor).",
  "li_164":"<b>Terminator band.</b> 2566 K 비스듬한 빛 아래의 적당한 지형 그림자 대비. 낮은 태양 천정각에서 옅은 limb glow 로 보이는 high-altitude 옅은 gray Rayleigh-산란 haze 가능.",
  "li_165":"<b>Nightside.</b> 차가움 (~140 K) 하고 어두움. substellar 에서 ≳60° 떨어진 좁은 띠에 CO₂/H₂O frost 가능; 자매 행성에서 반사된 빛 아래 옅은 더 밝은 patch 로 나타남. visible 대역에서 열적외 emission 만. KSP nightside ambient ≈ dayside 의 5–10%.",
  "li_166":"<b>Atmosphere haze.</b> 얇은 옅은 gray-violet limb haze (<code>#3a3a40</code>), 3–8 km 두께, 행성 limb 의 우주 배경에서만 보임.",
  "li_167":"<b>하늘의 별.</b> TRAPPIST-1 이 c 의 하늘에서 4.02° 차지 (지구에서 본 태양의 8배). 색 <code>#ff7a1a</code> (2566 K). 표면 밝기 ~2.27 S⊕ (지구 궤도 에서의 Venus insolation 과 유사). flare 활동은 b 와 동일 — 가끔 두드러진 IR flare.",
  "li_168":"<b>하늘의 자매 행성.</b> b (다음 안쪽) 가 inferior conjunction 시 ~0.6° 로 나타남; d (다음 바깥쪽) 가 4–6 일마다 conjunction 시 ~0.5°. Agol 2021 에서 거의 동일 평면 geometry.",
  "h2_169":"참고 문헌",
  "h3_170":"읽음 (시각-정보 제공, 위 결정 견인)",
  "li_171":"<b>2306.10150</b> Zieba 2023 — c 의 JWST/MIRI F1500W secondary eclipse. Fp/F★ = 421 ± 94 ppm, dayside T ≈ 380 K. Venus-analog 와 대부분의 CO₂-rich 대기 배제. c 의 대기 상한에 대한 발견 논문.",
  "li_172":"<b>2308.05899</b> Lincowski 2023 — two-column climate+photochemistry 사용한 c 의 더 넓은 대기 탐색. 얇은 O₂ 낮은 CO₂ 대기가 1σ 내에서 일관 발견. 채택된 O₂ 지배 시나리오 견인.",
  "li_173":"<b>2509.02128</b> Ducrot 2025 — b 와 c 의 MIRI 15 μm phase curve. c dayside 369 ± 23 K, nightside 비검출. 대기 시나리오 공간을 맨 암석 / 얇은 O₂ 쪽으로 닫음.",
  "li_174":"<b>2305.01250</b> Acuña 2023 — 내부-대기 모델링. c 가 맨 표면일 가능성이 가장 높지만 얇은 대기를 배제할 수 없음 발견. Lincowski 2023 가 해결한 표면-대기 degeneracy 지지.",
  "li_175":"<b>2412.11987</b> Nicholls 2024 — lava-world 대기의 convective shutdown. c 를 케이스 스터디로 사용; non-convective 대기 아래에서 마그마 바다가 지속될 수 있을 때 탐색. &quot;풍화된 표면&quot; vs. &quot;신선한 ultramafic&quot; 선택 알림 (c 는 풍화 쪽에 위치).",
  "h3_176":"읽음 (맥락 / 방법론, 결정 견인 안 함)",
  "li_177":"<b>2412.16541</b> back-to-back b/c transit 사용한 stellar contamination 보정. 모든 TRAPPIST-1 transmission 에 관련된 방법론; 직접 시각 정보는 아님.",
  "li_178":"<b>2412.11627</b> Ducrot 2024 — b 의 결합 12.8+15 μm eclipse 분석. 맨 암석 vs. CO₂-haze 해석이 c 의 옵션과 평행하기 때문에 여기 언급.",
  "li_179":"<b>2507.02052</b> JWST MIRI 15 μm eclipse 의 균일 재분석 (frame- normalized PCA). cross-check; 일관된 결과.",
  "li_180":"<b>2505.03672</b> TRAPPIST-1 행성의 secondary-atmosphere 소스로서 water outgassing 에 대한 통계적 지구화학적 제약. &quot;fossil O₂&quot; 추론의 배경 맥락.",
  "h3_181":"읽음 (instrument-only, 시각 정보 아님)",
  "li_182":"<b>2409.19333</b> Stellar contamination 보정 방법론 논문. 완전성을 위해 인용; c 에 대한 직접 시각 콘텐츠 없음.",
  "h3_183":"읽지 않음 — arXiv preprint 없음 또는 낮은 우선순위 (~20 편)",
  "p_184":"c 참고문헌은 b 의 것보다 작음 (32 vs 66). 비-arXiv 논문 대부분은 conference 요약 또는 자매 행성 biosignature 연구. 건너뛴 주목할 항목.",
  "li_185":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — Ducrot 2025 의 Nature Astronomy 출판일 가능성 높음 (arXiv 2509.02128 통해 다룸). Skip.",
  "li_186":"<b>2025arXiv...</b> 다양한 retraction / re-fit conference 요약. c eclipse depth 를 업데이트하는 경우가 아니라면 skip.",
  "p_187":"---",

  "li_189":"더 짧은 파장의 MIRI 필터 (예. c 의 F1280W) 에서의 향후 c emission 분광에 대해 0.1 bar O₂ 대기 선택 검증 — 대기 없음 대안은 통계적 으로 동등하게 일관되며 향후 renderer 가 &quot;맨 암석 형제&quot; b+c 페어링 이 필요하다면 선호될 수 있음.",
  "li_190":"Way 2024 / Cohen 2024 (TRAPPIST-1 표면 산화 모델링) 의 c-특화 예측에 대해 산화철 accent 두드러짐 cross-check, 이들이 사용 가능해질 때.",
  "li_191":"&quot;대기 없는 맨 암석&quot; 해석을 위한 cfg 변형, b 의 대기 없는 cfg 와 조율된 팔레트로 페어링.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
