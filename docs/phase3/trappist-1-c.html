  "h2_209":"Surface synthesis",
  "p_210":"The c eclipse + phase-curve data are consistent with either a bare, dark, low-albedo surface or a thin O₂-dominated atmosphere with minimal CO₂ (Zieba 2023, Lincowski 2023, Ducrot 2025). Unlike b — where Ducrot 2024 found a model-consistency argument for fresh ultramafic surfaces — c&#x27;s eclipse data do not require an unweathered surface. The inverse interpretation is also possible: c&#x27;s surface may be significantly older than b&#x27;s because c has less tidal + induction heating (Bolmont 2020 estimates tidal heating ~10× lower at c, and Grayver 2022 induction heating ~10× lower for the same reason).",
  "p_211":"The latest tidal heating estimates (Barr 2018 / 1712.05641 and Dobos 2019 / 1902.03867) revise c&#x27;s interior heat flux upward to <b>Io-class values</b> of 0.6–1.3 W/m² — an order of magnitude higher than the original &quot;scaled from b&quot; estimate. This implies c may host <b>active or recent volcanism</b>, possibly with surface eruptions of silicate magma. The cfg therefore widens its surface interpretation: weathered basalt remains the most common surface (over ~8 Gyr of impact accumulation), but <b>fresh basaltic resurfacing in localized &quot;hot spots&quot;</b> is now equally plausible. Visual rendering should show a mixed character — mature regolith dominant globally with brighter, less-weathered patches near regions of recent volcanism.",
  "p_212":"Interior composition is distinctive among the seven planets. Acuña 2021 (2101.08172) finds c&#x27;s water mass fraction is essentially zero (≤4×10⁻⁶), with a core-mass fraction of 0.24 ± 0.08. Barr 2018 reports c has the <b>highest mean density of any TRAPPIST-1 planet</b> (7642 kg/m³ — about 50% iron by mass). This iron-richness is independent of any specific composition model: c sits cleanly outside the water-rich range of the outer planets.",
  "p_213":"<b>Magnetic-induction heating reinforces the Io interpretation.</b> Kislyakova 2018 (1710.08761) computes induction heating from the stellar magnetic field for all 7 TRAPPIST-1 planets and finds c receives the <b>highest fraction</b> — 68% of radiogenic flux (vs. ~17% for b, ~56% for d, less for outer planets). Combined with Barr 2018&#x27;s Io-class tidal flux (1.32 W/m²), this gives c a total interior heat budget well above the partial-melt threshold. A near-surface magma reservoir, possibly with active surface volcanism, becomes a strong default (rather than a marginal alternative) — consistent with the already-revised Surface tint accent toward fresh-basalt and active resurfacing.",
  "p_214":"The interior composition is consistent with — but does not require — substantial water. Unterborn 2018 (1806.10084) finds c can be fit by either a small-core (≤23 wt% Fe) rocky interior with no volatile envelope, or a larger-core composition needing 8–34 wt% water; the two-body degeneracy is not resolvable from mass+radius alone. Grimm 2018 (1802.01377) gives a slightly lower mass (1.156 +0.142/−0.131 M⊕) than Agol 2021 (1.308 ± 0.056 M⊕), with a volatile probability ≥0.24 — i.e., c is consistent with no extended volatile envelope. The adopted &quot;weathered basalt&quot; surface is the simplest interpretation under these constraints.",
  "p_215":"<b>Color choice.</b> Weathered basalt under M8V illumination. The dark basaltic primary <span class=\"hex-chip\" style=\"background:#2c2218\"></span><code>#2c2218</code> is slightly lighter than b&#x27;s <span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> fresh-ultramafic to reflect the weathered-regolith maturity. The iron-oxide accent <span class=\"hex-chip\" style=\"background:#604030\"></span><code>#604030</code> is more prominent than on b because: (1) surface is older and has had more time to oxidize, and (2) the thin O₂ atmosphere provides a continuous low-level oxidant supply.",
  "p_216":"<b>Morphology.</b> No active resurfacing implies preserved impact record: well-defined craters at all size ranges, with a saturation density approaching the lunar highlands. Magma ocean relict features from the initial 100–500 Myr phase (Krissansen-Totton 2022, Magma Ocean Evolution paper for TRAPPIST-1 system) should still be partially visible as broad highland regions distinct from later impact basins.",
  "h2_217":"Atmosphere synthesis",
  "p_218":"Zieba 2023 (MIRI F1500W secondary eclipses, 4 visits) measured Fp/F★ = 421 ± 94 ppm at 15 μm. This corresponds to a dayside brightness temperature of 380 ± 31 K, consistent with a bare rock at low albedo or a thin, low-greenhouse atmosphere. The data exclude:",
  "li_219":"10 bar cloud-free atmospheres with ≥10 ppm CO₂",
  "li_220":"1 bar cloud-free atmospheres with significant CO₂",
  "li_221":"0.1 bar pure-CO₂ atmospheres",
  "li_222":"Venus-analog atmospheres with sulfuric-acid clouds (2.6σ)",
  "p_223":"Lincowski 2023 expanded the model space to include broader atmosphere types using a two-column climate-photochemistry coupled model. Within 2σ they find:",
  "li_224":"<b>Thin O₂ atmospheres</b> with low CO₂ (≲100 ppm) at 0.1 bar are consistent with the data",
  "li_225":"1–10 bar O₂ + 100 ppm CO₂ at 2.0–2.2σ",
  "li_226":"1–10 bar O₂ + up to 0.5% CO₂ at 2.9σ",
  "li_227":"Thin O₂ with up to 10% H₂O vapor (within 1σ)",
  "p_228":"Ducrot 2025 phase-curve closes the case further: c&#x27;s dayside is 369 ± 23 K, nightside undetected (≲ 110 ppm at 15 μm), no significant phase offset. Either bare-rock or thin O₂ remains consistent.",
  "p_229":"For NearStars we adopt <b>0.1 bar O₂-dominated thin atmosphere</b>:",
  "li_230":"<b>Pressure</b> at 0.1 bar (10 kPa). Within Lincowski 2023&#x27;s 1σ consistency envelope for O₂-dominated compositions with low CO₂.",
  "li_231":"<b>Composition</b> dominated by O₂ (~98%) with trace H₂O vapor (~1%) and trace O₃ from photolysis (~100 ppm). CO₂ kept very low (~100 ppm) to honor the Zieba 2023 / Lincowski 2023 constraints. The O₂ origin is hydrodynamic-escape fossil: Luger &amp; Barnes 2015 show that an initial H₂O steam atmosphere on the early TRAPPIST-1 worlds would lose H to space and leave behind ~10 bar of O₂; later photolysis + surface oxidation reduces this to the observed thin-O₂ remnant.",
  "li_232":"<b>No clouds</b> in the canonical state. The thin O₂ atmosphere has insufficient water for cloud formation in steady state, and CO₂ is too low for CO₂-ice clouds.",
  "p_233":"<b>Population-statistics support.</b> Gialluca 2024 (2405.02401) ran MCMC simulations of the post-runaway escape epoch for the inner TRAPPIST-1 planets under the joint constraint &quot;b airless + c thin O₂&quot;. Their result: with initial water ≥1 TO, <b>&gt;98% of c simulations retain an O₂-dominated atmosphere</b>; b/c-joint inversion gives initial water 8.2 +1.5/-1.0 Earth oceans. The 0.1 bar O₂ choice is therefore not only observation-consistent but is the dominant outcome of the post-runaway-greenhouse evolution.",
  "p_234":"<b>Auroral signature.</b> In a thin O₂-dominated atmosphere, the dominant precipitation-driven emission is [OI] 557.7 nm green (the same line that gives Earth its classic green aurora). Stellar wind compression brings the magnetopause to ~2 R_p (Garraffo 2017), which means the auroral oval — normally a high-latitude band on Earth — expands toward magnetic latitude ~35°. The result is a wide aurora band visible from substantial fractions of c&#x27;s nightside, not just the polar regions. Intensity reaches ~100 kR (≈10× Earth&#x27;s typical 10 kR) due to the constantly elevated stellar wind. Secondary O₂⁺ Second Negative emission near 330–400 nm contributes a violet edge; for cfg rendering, primary <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> green with <span class=\"hex-chip\" style=\"background:#a050b0\"></span><code>#A050B0</code> violet accent. The interesting-first tie-break favors this visible-wavelength rendering over the alternative UV-dominant emission palette, which would be invisible to the player.",
  "p_235":"<b>Sky appearance.</b> The 0.1 bar O₂ atmosphere has weak Rayleigh scattering (about 5% at 0.5 μm vs. Earth&#x27;s 1 bar of N₂+O₂). The sky near the substellar point is faintly dark-violet at the zenith, transitioning to a pale gray-orange near the limb where the stellar disk is bright. Toward the nightside, the sky is essentially black. O₃ Chappuis absorption (peaking near 0.6 μm) adds a subtle gray overtone in the day-side scattered light. The host star dominates the daytime sky at angular size 4.02° (about 8× the Sun&#x27;s angular size from Earth).",
  "h2_236":"Rotation &amp; spin synthesis",
  "p_237":"Tidal damping for c at 2.42-day period over 7.6 Gyr establishes the synchronous (1:1) configuration unambiguously. Obliquity damped to zero. Eccentricity is 0.00654 (Agol 2021) — too low to support a 3:2 resonance (Vinson 2017 finds 3:2 stable only for e ≳ 0.01).",
  "p_238":"<b>Possible magma ocean signature.</b> Bolmont 2020 (2002.02015) shows that TRAPPIST-1 b/c TTVs could hint at a high planetary Love number (k₂ ≳ 1.5), which would dynamically signal a liquid magma layer. Combined with the Io-class tidal flux (Barr 2018), this raises the prior on c hosting partial melt. The current TTV fits are noise-floor-limited, so the inference is tentative.",
  "p_239":"<b>Magnetic dynamo expectation.</b> c&#x27;s iron-rich interior (Barr 2018: 50% Fe by mass, highest density in the system) is the strongest pro-dynamo case among the inner planets, but the 2.4-day tidally-locked rotation severely limits dipolar field strength via the Rossby-number regime transition (Reiners &amp; Christensen 2010). RM22 (2203.01065) scaling predicts a multipolar/weak field at ~0.08 × Earth dipole moment, giving ~3 μT surface field at the equator. This is enough to deflect part of the stellar wind plasma and channel it into the auroral oval, but not enough to sustain Van-Allen-like radiation belts.",
  "p_240":"<b>KSP implementation note.</b> Rotation period = orbital period = 2.4219 days (209 254 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code> in seconds.",
  "p_241":"<b>No seasons.</b> Obliquity = 0; libration-induced insolation variation &lt; 0.5%. The substellar point is fixed in the surface frame on geological timescales (modulo the slow precession noted for b).",
  "p_242":"<b>Eccentricity-driven tidal flexure.</b> With e = 0.00654 and an ultra-cool dwarf host, the tidal heating rate from forced libration is modest. Brasser 2019 (1905.00512) gives k₂/Q in the range (0.4–2) × 10⁻⁴ from interior models, with a dynamical lower bound k₂/Q ≳ 1×10⁻³; representative moment-of-inertia C ≈ 0.286 (range 0.235–0.4). The implied surface tidal flux is ~10× lower than b&#x27;s (consistent with c&#x27;s larger orbital semi-major axis), keeping c in the &quot;insufficient to drive active volcanism&quot; regime — consistent with the &quot;weathered surface&quot; inference.",
  "h2_243":"Visual styling",
  "p_244":"Combining surface and atmosphere decisions:",
  "li_245":"<b>Global color palette.</b> Dark weathered basalt body (<span class=\"hex-chip\" style=\"background:#2c2218\"></span><code>#2c2218</code> primary, <span class=\"hex-chip\" style=\"background:#604030\"></span><code>#604030</code> accent) under intense red-orange stellar light appears as a deep brown-charcoal world with subtle iron-oxide banding biased toward the substellar hemisphere. The thin O₂ atmosphere is essentially invisible from orbit except as a faint limb haze.",
  "li_246":"<b>Dayside.</b> Substellar region (~430 K subsolar peak, ~370 K general dayside) with iron-oxide patches strongest within 30° of substellar point. Subdued topographic relief — mature impact cratering, no active volcanism. Heat redistribution to nightside is weak but nonzero (~140 K nightside floor) due to the thin O₂ atmosphere.",
  "li_247":"<b>Terminator band.</b> Moderate topographic shadow contrast under grazing 2566 K light. Possible high-altitude pale-gray Rayleigh-scattered haze visible as a thin limb glow at low solar zenith angles.",
  "li_248":"<b>Nightside.</b> Cold (~140 K) and dark. Possible CO₂/H₂O frost in a narrow band ≳60° from substellar; appears as faint lighter patches under reflected light from sister planets. Thermal IR emission only in visible bands. KSP nightside ambient ≈ 5–10% of dayside.",
  "li_249":"<b>Atmosphere haze.</b> Thin pale gray-violet limb haze (<span class=\"hex-chip\" style=\"background:#3a3a40\"></span><code>#3a3a40</code>), 3–8 km thick, visible against space at the planet&#x27;s limb only.",
  "li_250":"<b>Star in sky.</b> TRAPPIST-1 subtends 4.02° in c&#x27;s sky (8× the Sun from Earth). Color <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code> (2566 K). Surface brightness ~2.27 S⊕ (similar to Venus&#x27;s insolation at Earth&#x27;s orbit). Flare activity identical to b — occasional prominent IR flares.",
  "li_251":"<b>Sister planets in sky.</b> b (next inward) appears at ~0.6° at inferior conjunction; d (next outward) at ~0.5° during conjunctions every 4–6 days. Near-coplanar geometry from Agol 2021.",
  "h2_252":"Bibliography",
  "h3_253":"Read (visual-informative, drove decisions above)",
  "li_254":"<b>2306.10150</b> Zieba 2023 — JWST/MIRI F1500W secondary eclipse of c. Fp/F★ = 421 ± 94 ppm, dayside T ≈ 380 K. Excludes Venus-analog and most CO₂-rich atmospheres. The discovery paper for c&#x27;s atmospheric upper limit.",
  "li_255":"<b>2308.05899</b> Lincowski 2023 — Broader atmosphere exploration for c using two-column climate+photochemistry. Finds thin O₂ low-CO₂ atmospheres consistent within 1σ. Drives the adopted O₂-dominated scenario.",
  "li_256":"<b>2509.02128</b> Ducrot 2025 — MIRI 15 μm phase curve of b and c. c dayside 369 ± 23 K, no nightside detection. Closes the atmospheric scenario space toward bare-rock / thin-O₂.",
  "li_257":"<b>2305.01250</b> Acuña 2023 — Interior-atmosphere modeling. Finds c most likely has a bare surface but cannot rule out a thin atmosphere. Supports the surface-vs-atmosphere degeneracy resolved by Lincowski 2023.",
  "li_258":"<b>2412.11987</b> Nicholls 2024 — Convective shutdown in lava-world atmospheres. Uses c as a case study; explores when magma oceans can persist under non-convective atmospheres. Informs the &quot;weathered surface&quot; vs. &quot;fresh ultramafic&quot; choice (c lands on weathered side).",
  "li_259":"<b>1712.05641</b> Barr 2018 — Interior structures and tidal heating in TRAPPIST-1 planets. Drives the upward revision of c&#x27;s tidal heat flux to Io-class (1.32 W/m²). Identifies c as the iron-richest planet (highest density, ~50% Fe).",
  "li_260":"<b>1902.03867</b> Dobos 2019 — Tidal heating and habitability of TRAPPIST-1 exoplanets. Refined Maxwell viscoelastic model with Grimm 2018 masses. F_int(c) = 0.62 W/m². Confirms partial-melt interior.",
  "li_261":"<b>2101.08172</b> Acuña 2021 — Hydrosphere characterization. c WMF ≤ 4×10⁻⁶, CMF 0.24 ± 0.08. Drives the &quot;dry rocky&quot; interior choice.",
  "li_262":"<b>2405.02401</b> Gialluca 2024 — MCMC escape simulation. &gt;98% of c outcomes retain O₂ atmosphere. Strongly supports the 0.1 bar O₂ scenario.",
  "li_263":"<b>2002.02015</b> Bolmont 2020 — TTV Love-number constraint hinting at possible magma layer.",
  "li_264":"<b>1706.04617</b> Garraffo 2017 — Threatening Magnetic and Plasma Environment of TRAPPIST-1. MHD simulations placing the magnetopause at 1.5–2 R_p for inner planets.",
  "li_265":"<b>2203.01065</b> RM22 — Internal Structures and Magnetic Moments. Tidally-locked rocky planet dynamo scaling.",
  "li_266":"<b>1910.09871</b> Atri 2019 — Stellar Proton Event surface-dose tables; the radiation cfg reference.",
  "h3_267":"Read (context / methodology, not decision-driving)",
  "li_268":"<b>2412.16541</b> Stellar contamination correction using back-to-back b/c transits. Methodology relevant to all TRAPPIST-1 transmission; not directly visual-informative.",
  "li_269":"<b>2412.11627</b> Ducrot 2024 — b&#x27;s combined 12.8+15 μm eclipse analysis. Mentioned here because the bare-rock vs. CO₂-haze interpretation parallels c&#x27;s options.",
  "li_270":"<b>2507.02052</b> Uniform reanalysis of JWST MIRI 15 μm eclipses (frame-normalized PCA). Cross-check; consistent results.",
  "li_271":"<b>2505.03672</b> Statistical geochemical constraints on water outgassing as secondary-atmosphere source for TRAPPIST-1 planets. Background context for the &quot;fossil O₂&quot; inference.",
  "li_272":"<b>1802.01377</b> Grimm 2018 — TTV-derived masses and Bayesian interior fit. c&#x27;s volatile probability ≥0.24 (no extended water envelope required). Mass slightly lower than Agol 2021 but within uncertainty.",
  "li_273":"<b>1806.10084</b> Unterborn 2018 — Updated compositional models; c&#x27;s interior is degenerate between small-core rocky (no water) and larger-core wet (8–34 wt% water). Both options consistent with current cfg.",
  "li_274":"<b>1905.00512</b> Brasser, Barr &amp; Dobos 2019 — Tidal parameters for b and c. Drives the new <code>tidal_k2_over_Q</code> and <code>moment_of_inertia_C</code> entries in the decisions table. Note: the synthesis previously cited this paper as &quot;Bolmont 2020&quot; by mistake; corrected.",
  "h3_275":"Read (instrument-only, not visual-informative)",
  "li_276":"<b>2409.19333</b> Stellar contamination correction methodology paper. Cited for completeness; no direct visual content for c.",
  "h3_277":"Not read — no arXiv preprint or low-priority (~20 papers)",
  "p_278":"The c bibliography is smaller than b&#x27;s (32 vs 66). Most non-arXiv papers are conference summaries or sister-planet biosignature studies. Notable items skipped:",
  "li_279":"<b>2026NatAs.tmp...65G</b> &quot;No thick atmosphere around TRAPPIST-1 b and c from JWST thermal phase curves&quot; — likely the Nature Astronomy publication of Ducrot 2025 (covered via arXiv 2509.02128). Skip.",
  "li_280":"<b>2025arXiv...</b> various retraction / re-fit conference summaries. Skip unless any updates the c eclipse depth.",
  "p_281":"---",
  "h2_282":"Open items for follow-up",
  "li_283":"Validate the 0.1 bar O₂ atmosphere choice against any future c emission spectroscopy in shorter-wavelength MIRI filters (e.g., F1280W on c) — the airless alternative is statistically as consistent and might be preferred if a future renderer needs the &quot;bare rock siblings&quot; b+c pairing.",
  "li_284":"Cross-check the iron-oxide accent prominence against the c-specific predictions in Way 2024 / Cohen 2024 (TRAPPIST-1 surface oxidation modeling) if those become available.",
  "li_285":"Cfg variant for the &quot;airless bare-rock&quot; interpretation, paired with b&#x27;s airless cfg as a coordinated palette.",
  "li_286":"Refine the <span class=\"field-tt\" data-ko-tip=\"평균 밀도 (g/cm³). 지구 ≈ 5.5.\" data-en-tip=\"Bulk density in g/cm³. Earth ≈ 5.5.\"><code>density_g_cc</code></span> entry: the derived value (6.36) is slightly higher than Agol 2021&#x27;s reported 5.7, reflecting different uncertainty propagation. Phase 2 should reconcile.",
  "li_287":"Magnetic field strength is low-confidence scaling-based. Direct radio-emission upper limits (e.g., Vedantham 2020) could tighten the dipole moment range.",

  "h2_209":"Surface synthesis",
  "p_210":"c 의 eclipse + phase-curve 데이터는 어둡고 albedo 가 낮은 맨 표면이든, CO₂ 가 거의 없는 얇은 O₂ 지배 대기든 모두와 양립함 (Zieba 2023, Lincowski 2023, Ducrot 2025). b 의 경우에는 Ducrot 2024 가 신선한 ultramafic 표면을 뒷받침하는 모델 일관성 논거를 제시했지만, c 의 eclipse 데이터는 풍화되지 않은 표면을 요구하지 않음. 오히려 반대 해석도 가능함. c 는 tidal heating 과 induction heating 이 모두 b 보다 작기 때문에 표면이 b 보다 훨씬 더 오래되었을 가능성이 있음 (Bolmont 2020 의 추정상 c 의 tidal heating 은 ~10× 낮고, Grayver 2022 의 induction heating 도 같은 이유로 ~10× 낮음).",
  "p_211":"다만 최근 갱신된 조석 가열 추정치 (Barr 2018 / 1712.05641, Dobos 2019 / 1902.03867) 는 c 의 내부 heat flux 를 <b>Io 급 수준</b> 인 0.6–1.3 W/m² 로 끌어올림. 기존의 &quot;b 에서 스케일링한&quot; 추정보다 약 한 자리수 높은 값. 이로부터 c 가 <b>활발하거나 최근까지의 화산 활동</b> 을 가질 가능성, 심지어 규산염 마그마의 표면 분출까지도 시나리오 안에 들어옴. 따라서 cfg 는 표면 해석의 폭을 넓힘. 풍화된 basalt 가 여전히 가장 흔한 표면으로 남되 (~8 Gyr 의 충돌 누적), <b>국소적인 &quot;hot spot&quot; 에서의 신선한 basaltic resurfacing</b> 도 동등하게 그럴 듯한 후보로 다룸. 시각 적으로는 두 성격이 섞인 모습을 보여야 함. 전역적으로는 성숙한 regolith 가 지배적이되, 최근 화산 활동이 있었던 지역 부근에 더 밝고 덜 풍화된 patch 가 나타나는 식.",
  "p_212":"내부 조성도 7 개 행성 가운데 가장 두드러짐. Acuña 2021 (2101.08172) 은 c 의 water mass fraction 이 사실상 0 (≤4×10⁻⁶) 이고, core-mass fraction 은 0.24 ± 0.08 이라고 보고. Barr 2018 은 c 가 <b>TRAPPIST-1 7 행성 가운데 가장 높은 평균 밀도</b> (7642 kg/m³ — 질량의 약 50% 가 철) 를 가진다고 보고. 이 iron-richness 는 특정 조성 모델에 의존하지 않는 결과이며, c 는 바깥쪽 행성들의 water-rich 범위와는 명확히 동떨어진 위치에 있음.",
  "p_213":"<b>자기 유도 가열이 Io 해석을 뒷받침함.</b> Kislyakova 2018 (1710.08761) 은 7 개 TRAPPIST-1 행성 전부에 대해 항성 자기장에 의한 induction heating 을 계산했는데, c 가 받는 분율이 <b>가장 큼</b> — 방사성 flux 의 68% (b 는 ~17%, d 는 ~56%, 바깥쪽은 더 낮음). 여기에 Barr 2018 의 Io 급 조석 flux (1.32 W/m²) 까지 더해지면, c 의 내부 총 열 예산은 부분 용융 임계치를 한참 넘어섬. 표면 근처 마그마 저장소, 그리고 어쩌면 활발한 표면 화산 활동까지가 변두리 대안이 아니라 강한 기본 시나리오가 됨 — 이미 갱신한 Surface tint accent 의 신선한 basalt 와 활발한 resurfacing 쪽 방향과도 일관됨.",
  "p_214":"내부 조성은 상당량의 물과 양립 가능하지만 반드시 필요한 것은 아님. Unterborn 2018 (1806.10084) 은 c 를 휘발성 외피가 없는 작은 핵 (Fe ≤23 wt%) 의 암석 내부로도, 8–34 wt% 의 물이 필요한 더 큰 핵 조성 으로도 맞출 수 있다고 보고함. 질량과 반지름만으로는 이 이체 축퇴를 해소할 수 없음. Grimm 2018 (1802.01377) 은 Agol 2021 (1.308 ± 0.056 M⊕) 보다 약간 낮은 질량 (1.156 +0.142/−0.131 M⊕) 을 제시하며, 휘발성 확률 ≥0.24 — 즉 c 가 확장된 휘발성 외피를 갖지 않는 시나리오와도 일관. 이 제약 조건 아래에서는 &quot;풍화된 basalt&quot; 표면이 가장 단순한 해석.",
  "p_215":"<b>색 선택.</b> M8V 조명 아래의 풍화된 basalt. 어두운 basaltic primary <span class=\"hex-chip\" style=\"background:#2c2218\"></span><code>#2c2218</code> 는 풍화된 regolith 의 성숙도를 반영하기 위해 b 의 신선한 ultramafic <span class=\"hex-chip\" style=\"background:#1a1612\"></span><code>#1a1612</code> 보다 살짝 밝게 잡음. 산화철 accent <span class=\"hex-chip\" style=\"background:#604030\"></span><code>#604030</code> 은 b 보다 더 두드러지게 두는데, 이유는 두 가지. (1) 표면이 더 오래되어 산화가 진행될 시간이 충분했고, (2) 얇은 O₂ 대기가 지속적으로 저수준의 산화제를 공급하기 때문.",
  "p_216":"<b>Morphology.</b> 활발한 resurfacing 이 없다는 것은 충돌 기록이 그대로 보존된다는 뜻. 전 크기 영역에서 윤곽이 뚜렷한 분화구가 분포하며, 그 포화 밀도는 lunar highlands 에 근접함. 초기 100–500 Myr 의 마그마 바다 잔존 feature (Krissansen-Totton 2022, TRAPPIST-1 시스템에 대한 Magma Ocean Evolution 논문) 는 후기 충돌 분지와는 구분되는 넓은 highland 영역으로 일부 보일 것으로 예상.",
  "h2_217":"Atmosphere synthesis",
  "p_218":"Zieba 2023 (MIRI F1500W secondary eclipse, 4 visits) 은 15 μm 에서 Fp/F★ = 421 ± 94 ppm 을 측정. 이는 dayside brightness 온도 380 ± 31 K 에 해당하며, low albedo 의 맨 암석 또는 greenhouse 효과가 약한 얇은 대기와 일관됨. 데이터가 배제하는 시나리오.",
  "li_219":"≥10 ppm CO₂ 를 포함한 10 bar cloud-free 대기",
  "li_220":"유의한 CO₂ 를 포함한 1 bar cloud-free 대기",
  "li_221":"0.1 bar 의 순수 CO₂ 대기",
  "li_222":"황산 구름을 가진 Venus-analog 대기 (2.6σ)",
  "p_223":"Lincowski 2023 은 two-column climate-photochemistry coupled 모델을 사용해 더 폭넓은 대기 유형까지 탐색. 2σ 안에서 다음과 같은 결과.",
  "li_224":"낮은 CO₂ (≲100 ppm) 의 0.1 bar <b>얇은 O₂ 대기</b> 가 데이터와 일관됨",
  "li_225":"1–10 bar O₂ + 100 ppm CO₂ 는 2.0–2.2σ",
  "li_226":"1–10 bar O₂ + 0.5% 이하 CO₂ 는 2.9σ",
  "li_227":"최대 10% 의 H₂O 수증기를 포함한 얇은 O₂ (1σ 이내)",
  "p_228":"Ducrot 2025 의 phase curve 가 결정타. c 의 dayside 는 369 ± 23 K, nightside 는 검출되지 않으며 (15 μm 에서 ≲ 110 ppm), 유의한 phase offset 도 없음. 결국 맨 암석 또는 얇은 O₂ 시나리오 둘 다 살아남음.",
  "p_229":"NearStars 에서는 <b>0.1 bar O₂ 지배 얇은 대기</b> 를 채택.",
  "li_230":"<b>압력</b> 은 0.1 bar (10 kPa). 낮은 CO₂ 의 O₂ 지배 조성에 대한 Lincowski 2023 의 1σ 일관성 envelope 안에 위치.",
  "li_231":"<b>조성</b> 은 O₂ 가 지배적 (~98%) 이고, 미량의 H₂O 수증기 (~1%) 와 광분해로 만들어진 O₃ (~100 ppm) 가 포함. CO₂ 는 Zieba 2023 / Lincowski 2023 제약을 충족하도록 매우 낮게 (~100 ppm) 유지. O₂ 의 기원은 hydrodynamic-escape 후의 fossil 산소. Luger &amp; Barnes 2015 에 따르면 초기 TRAPPIST-1 행성들의 H₂O 증기 대기는 H 를 우주로 잃고 ~10 bar 정도의 O₂ 를 남겼을 것으로 예상되며, 이후 광분해와 표면 산화가 진행되어 현재의 얇은 O₂ 잔재 수준까지 줄어듦.",
  "li_232":"<b>구름 없음</b> 을 canonical 상태로 둠. 얇은 O₂ 대기는 정상 상태 에서 구름이 형성될 만큼 물이 충분하지 않으며, CO₂ 도 CO₂-얼음 구름을 만들기에는 너무 부족함.",
  "p_233":"<b>Population statistics 측면 지원.</b> Gialluca 2024 (2405.02401) 는 &quot;b 는 대기 없음 + c 는 얇은 O₂&quot; 라는 공동 제약 아래에서 안쪽 TRAPPIST-1 행성들에 대해 runaway escape 이후 시기를 MCMC 로 시뮬레이션. 결과는 다음과 같음. 초기 water 가 ≥1 TO 일 때 <b>c 시뮬레이션의 98% 이상이 O₂ 지배 대기를 유지</b> 하며, b/c 공동 역추론으로는 초기 water 가 8.2 +1.5/-1.0 Earth oceans 로 나옴. 즉 0.1 bar O₂ 선택은 관측과만 일관한 것이 아니라, runaway-greenhouse 이후 진화의 지배적인 결과이기도 함.",
  "p_234":"<b>오로라 시그니처.</b> 얇은 O₂ 지배 대기에서 입자 충돌이 만들어내는 지배적인 emission 은 [OI] 557.7 nm 의 녹색 (지구의 전형적인 녹색 오로라와 같은 선). 항성풍 압축이 magnetopause 를 ~2 R_p 까지 밀어 넣기 때문에 (Garraffo 2017), 지구에서는 고위도 좁은 띠에 머무는 오로라 oval 이 c 에서는 자기 위도 ~35° 까지 적도 쪽으로 확장됨. 그 결과로 오로라 띠가 극지방에 국한되지 않고 c 의 nightside 상당 부분에서 보이게 됨. 강도는 ~100 kR (지구의 평균 10 kR 대비 약 10 배) 에 이르는데, 항성풍이 상시적으로 강하기 때문. 보조적으로 330–400 nm 부근의 O₂⁺ Second Negative emission 이 보라색 가장자리를 보태며, cfg 렌더링에서는 primary <span class=\"hex-chip\" style=\"background:#4dff4d\"></span><code>#4DFF4D</code> 녹색에 <span class=\"hex-chip\" style=\"background:#a050b0\"></span><code>#A050B0</code> 보라색을 accent 로 둠. interesting-first tie-break 는 가시광 영역의 이 팔레트를, 플레이어 눈에는 보이지 않을 UV 지배 emission 대안보다 우선 선택함.",
  "p_235":"<b>Sky appearance.</b> 0.1 bar O₂ 대기의 Rayleigh scattering 은 약함 (지구의 1 bar N₂+O₂ 대비 0.5 μm 에서 약 5%). substellar 점 근처의 하늘은 천정에서는 옅은 dark-violet 으로 보이다가 stellar disk 가 밝은 limb 쪽으로 갈수록 옅은 gray-orange 톤으로 바뀜. nightside 방향의 하늘은 사실상 검음. O₃ Chappuis 흡수 (0.6 μm 부근에서 peak) 가 dayside 산란광에 미묘한 회색 overtone 을 더함. 호스트 별은 각지름 4.02° (지구에서 본 태양의 약 8 배) 로 dayside 하늘을 압도.",
  "h2_236":"Rotation &amp; spin synthesis",
  "p_237":"7.6 Gyr 동안 2.42 일 주기에 작용한 조석 damping 은 c 를 명확하게 동기 (1:1) 회전 상태로 고정시킴. 황도 경사각도 0 으로 damping. eccentricity 는 0.00654 (Agol 2021) 로, 3:2 공명을 유지하기엔 너무 낮음 (Vinson 2017 의 결론. 3:2 는 e ≳ 0.01 에서만 안정).",
  "p_238":"<b>마그마 바다 가능성의 시그니처.</b> Bolmont 2020 (2002.02015) 은 TRAPPIST-1 b/c 의 TTV 가 높은 행성 Love number (k₂ ≳ 1.5) 를 시사할 가능성을 보였는데, 이는 동역학적으로 액체 마그마 층의 존재를 의미하는 신호. Barr 2018 의 Io 급 조석 flux 와 합치면, c 가 부분 용융 상태를 가진다는 사전확률이 올라감. 다만 현재 TTV fit 은 noise-floor 에 묶여 있는 단계이므로 이 추론은 잠정적인 수준.",
  "p_239":"<b>자기 다이나모 기대치.</b> c 의 iron-rich 내부 (Barr 2018. 질량의 50% 가 Fe, 시스템 최고 밀도) 는 안쪽 행성 가운데 다이나모 측면에서 가장 유리한 케이스. 그러나 2.4 일짜리 조석 고정 자전이 Rossby number regime 전환 (Reiners &amp; Christensen 2010) 을 통해 dipolar 자기장 강도를 크게 제한함. RM22 (2203.01065) 스케일링은 multipolar/weak 자기장 영역, 즉 지구 dipole moment 의 0.08 배 수준을 예측하며, 적도 표면 자기장 은 ~3 μT 정도. 이는 항성풍 플라즈마의 일부를 휘게 해서 오로라 oval 로 채널링하기에는 충분하지만, Van-Allen 같은 안정 입자 포획대를 유지하기에는 부족한 수준.",
  "p_240":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 2.4219 일 (209 254 s). Kopernicus 의 <code>rotationPeriod</code> 는 초 단위 궤도 <code>period</code> 와 일치시켜야 함.",
  "p_241":"<b>계절 없음.</b> 황도 경사각이 0 이며, libration 으로 인한 insolation 변동도 &lt; 0.5% 에 불과. substellar 점은 지질학적 시간 척도에서 표면 좌표계상 고정된 위치를 유지 (b 에서 언급한 느린 세차 운동은 별개).",
  "p_242":"<b>Eccentricity 가 유도하는 조석 굴곡.</b> e = 0.00654 와 ultra-cool dwarf 호스트라는 조건에서 강제 libration 으로 인한 조석 가열률은 비교적 적당함. Brasser 2019 (1905.00512) 는 내부 모델로부터 k₂/Q 를 (0.4–2) × 10⁻⁴ 로 제시하며, 동역학적 하한은 k₂/Q ≳ 1×10⁻³, 대표 관성 모멘트 는 C ≈ 0.286 (범위 0.235–0.4). 이로부터 도출되는 표면 tidal flux 는 b 보다 ~10× 낮음 (c 의 더 큰 궤도 반장축과 일관) — 활발한 화산을 일으키기에는 부족한 영역에 머묾. &quot;풍화된 표면&quot; 추론과도 부합함.",
  "h2_243":"Visual styling",
  "p_244":"표면과 대기 결정을 종합.",
  "li_245":"<b>전역 색 팔레트.</b> 어두운 풍화 basalt 본체 (<span class=\"hex-chip\" style=\"background:#2c2218\"></span><code>#2c2218</code> primary, <span class=\"hex-chip\" style=\"background:#604030\"></span><code>#604030</code> accent) 가 강렬한 적색-주황 별빛을 받으면, substellar 반구 쪽으로 치우친 미묘한 산화철 banding 을 가진 깊은 갈색-차콜 세계로 보임. 얇은 O₂ 대기는 옅은 limb haze 외에는 궤도에서 사실상 보이지 않음.",
  "li_246":"<b>Dayside.</b> substellar 영역 (subsolar peak ~430 K, 일반 dayside ~370 K) 의 산화철 patch 는 substellar 점에서 30° 이내가 가장 강함. 지형 기복은 잔잔함 — 성숙한 충돌 cratering 만 있고 활발한 화산 활동은 없음. nightside 로의 열 재분배는 약하지만 0 이 아니며 (얇은 O₂ 대기의 효과), nightside floor 가 ~140 K 로 유지됨.",
  "li_247":"<b>Terminator band.</b> 2566 K 비스듬한 광선 아래에서 적당한 수준의 지형 그림자 대비. 낮은 태양 천정각에서는 high-altitude 의 옅은 gray Rayleigh-산란 haze 가 얇은 limb glow 로 보일 가능성.",
  "li_248":"<b>Nightside.</b> 차갑고 (~140 K) 어두움. substellar 점에서 ≳60° 떨어진 좁은 띠에 CO₂/H₂O frost 가 형성될 수 있으며, 자매 행성 에서 반사된 빛 아래에서는 살짝 밝은 patch 로 비침. 가시광에서는 열적외 emission 외에는 보이는 게 없음. KSP 의 nightside ambient 는 dayside 의 약 5–10% 수준.",
  "li_249":"<b>Atmosphere haze.</b> 두께 3–8 km 의 옅은 gray-violet limb haze (<span class=\"hex-chip\" style=\"background:#3a3a40\"></span><code>#3a3a40</code>). 우주를 배경으로 행성 limb 에서만 식별 가능.",
  "li_250":"<b>Star in sky.</b> c 의 하늘에서 TRAPPIST-1 의 각지름은 4.02° (지구 에서 본 태양의 8 배). 색은 <span class=\"hex-chip\" style=\"background:#ff7a1a\"></span><code>#ff7a1a</code> (2566 K). 표면 밝기는 ~2.27 S⊕ (지구 궤도에서의 금성 insolation 수준). flare 활동은 b 와 동일 — 가끔씩 두드러진 IR flare 가 나타남.",
  "li_251":"<b>Sister planets in sky.</b> b (안쪽 이웃) 가 inferior conjunction 때 ~0.6°, d (바깥쪽 이웃) 가 4–6 일마다 일어나는 conjunction 때 ~0.5° 로 보임. Agol 2021 에 따르면 거의 동일 평면 geometry.",
  "h2_252":"Bibliography",
  "h3_253":"Read (visual-informative, drove decisions above)",
  "li_254":"<b>2306.10150</b> Zieba 2023 — c 의 JWST/MIRI F1500W secondary eclipse. Fp/F★ = 421 ± 94 ppm, dayside T ≈ 380 K. Venus-analog 와 대부분의 CO₂-rich 대기 시나리오를 배제함. c 의 대기 상한에 대한 발견 논문.",
  "li_255":"<b>2308.05899</b> Lincowski 2023 — two-column climate+photochemistry 로 진행한 c 의 보다 넓은 대기 탐색. 낮은 CO₂ 의 얇은 O₂ 대기가 1σ 안에서 데이터와 일관함을 발견. 채택된 O₂ 지배 시나리오의 근거.",
  "li_256":"<b>2509.02128</b> Ducrot 2025 — b 와 c 의 MIRI 15 μm phase curve. c 의 dayside 369 ± 23 K, nightside 미검출. 대기 시나리오 공간을 맨 암석 / 얇은 O₂ 쪽으로 좁힘.",
  "li_257":"<b>2305.01250</b> Acuña 2023 — 내부-대기 결합 모델링. c 가 맨 표면 일 가능성이 가장 높지만 얇은 대기도 배제할 수 없음을 보임. Lincowski 2023 가 해소한 표면-대기 축퇴를 뒷받침.",
  "li_258":"<b>2412.11987</b> Nicholls 2024 — 용암 행성 대기에서의 대류 정지 현상. c 를 사례 연구로 다루며, 비대류 대기 아래에서 마그마 바다가 얼마나 지속될 수 있는지 탐색. &quot;풍화된 표면&quot; vs. &quot;신선한 ultramafic&quot; 선택의 판단 자료가 됨 (c 는 풍화 쪽).",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
