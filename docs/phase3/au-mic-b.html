  "h2_140":"Surface synthesis",
  "p_141":"AU Mic b has no surface in the rocky-planet sense. Mass 8.99 M⊕ and radius 4.79 R⊕ give density 0.45 g/cc — about a tenth of Earth&#x27;s and less than half of Neptune&#x27;s. Lopez &amp; Fortney 2014 mass-radius diagrams place this combination squarely in the H/He-envelope regime, with the hydrogen envelope contributing 25–35% of the planet&#x27;s total mass. The nominal &quot;surface&quot; — where pressure reaches a few × 10⁴ Pa and the optical depth becomes unity at the cloud deck — sits at roughly the 4.79 R⊕ radius reported by the transit; below that, pressure rises through 10⁵ → 10⁶ → 10⁷ Pa over a column of ~10 scale heights, and the gas transitions smoothly to supercritical fluid without a phase boundary. There is no terrain to render and no surface tint to specify.",
  "p_142":"For NearStars purposes, the &quot;visible surface&quot; the player sees is the top of the cloud deck. This is rendered as a banded gaseous body (see Visual styling) rather than as a textured solid; KSP&#x27;s stock gas-giant infrastructure with custom band textures is the appropriate analog. The body&#x27;s interior is presumed structured roughly like a warm Neptune: H/He envelope → H₂O/NH₃/CH₄ supercritical &quot;ice&quot; mantle → small rocky/iron core of perhaps 1–3 M⊕ (Cale 2021 §5 interior fit). None of this is visible.",
  "p_143":"The youth of the system matters here. At 22 Myr, b has not finished its primary Kelvin–Helmholtz contraction; its radius is ~1.5× larger than the equilibrium it will reach at Gyr ages, and its interior luminosity (Plavchan 2020 §6) is ~10× what an old equivalent would emit. This residual heat keeps the envelope inflated and is part of why the He I 10830 Å absorption is detectable (Allart 2023): the upper atmosphere is hot, ionized, and extended out to roughly 5–8 planet radii along the trailing wake.",
  "h2_144":"Atmosphere synthesis",
  "p_145":"The atmosphere is the planet, observationally and visually. Several constraints converge on the H/He-dominated puffy-Neptune picture.",
  "p_146":"<b>Pressure.</b> The transit-derived radius pins the location of the τ ≈ 1 cloud deck. Lopez &amp; Fortney 2014 inversion of mass + radius + age + insolation for sub-Saturns gives an H/He mass fraction of ~30% for b&#x27;s parameters; this implies a surface pressure (at the rocky core, if one exists) of ~10⁹ Pa, but the meaningful &quot;cfg surface pressure&quot; for KSP atmosphere rendering is the cloud-deck pressure of ~10⁷ Pa. The exact value depends on cloud-condensate chemistry (H₂O, NH₃, NH₄SH, depending on depth and temperature) and is not directly measured.",
  "p_147":"<b>Composition.</b> Allart 2023&#x27;s He I 10830 Å detection (~0.3% absorption during transit, marginal at 2.5σ in their nominal analysis but robust when combined with He I excess seen in CARMENES observations) requires an extended H/He atmosphere. Energy-limited escape calculations using AU Mic&#x27;s XUV flux (saturated regime; Stelzer 2013; Tristan 2023 flare census) yield mass-loss rates of 10⁹–10¹⁰ g/s, consistent with the Allart 2023 He I optical depth. This is sufficient to lose ~10% of the envelope mass over the system&#x27;s projected lifetime, but not to strip b entirely. Trace species (H₂O, CH₄, NH₃, CO) are assumed at near-solar abundance per the Lavie 2017 cool-Neptune photochemistry framework, with photochemical hazes generated by methane photolysis in the upper atmosphere.",
  "p_148":"<b>Sky appearance from low orbit.</b> A KSP player descending toward b&#x27;s cloud tops would see a Jupiter-like banded gas giant lit by a deep red star — but with the bands themselves muted toward red-brown by both photochemical haze and M-dwarf SED. Zonal jets are inferred from GCM-class hot-Neptune simulations (Showman 2009 hot-Jupiter analogs scaled for Neptune temperature and rotation); equatorial superrotation produces a single bright zone with darker mid-latitude belts. The polar regions are darker still — a hood-like discoloration where the photochemical haze accumulates under reduced insolation.",
  "p_149":"<b>Atmospheric escape and the comet-like tail.</b> AU Mic b is one of the best-characterized escaping atmospheres in any system; the He I 10830 Å absorption maps a trailing tail extending several planet radii behind b along the orbital direction (Allart 2023 §4). For NearStars cfg rendering, this corresponds to an EVE-side atmospheric escape feature — a faint ionized tail visible to a player at conjunction. The tail is sculpted by AU Mic&#x27;s stellar wind, which is anomalously strong (~10× solar; Plavchan 2020 §4 background); during super-flare events (5.6/day above 10³¹ erg, with occasional 10³⁴ erg events; Tristan 2023), the tail brightens dramatically as the upper atmosphere is briefly ionized to depths normally shielded by the bulk envelope.",
  "h2_150":"Rotation &amp; spin synthesis",
  "p_151":"Tidal damping of an 8.46-day Neptune-class planet at 0.07 AU around 0.51 M☉ proceeds on a timescale of ~10⁵–10⁶ years (Goldreich &amp; Soter 1966 with Neptune-like Q ≈ 10⁴); over the 22-Myr system age, b is tidally locked into a near-synchronous, pseudo-synchronous spin — at e = 0.07 the equilibrium rotation is only ~2% super-synchronous, so it renders as effectively 1:1. The Hirano 2020 Rossiter–McLaughlin measurement (λ = −2.96 +10.3/-10.6°) confirms that b&#x27;s orbital plane is aligned with AU Mic&#x27;s stellar rotation axis, which in turn aligns with the edge-on disk plane (Krist 2005; Schneider 2014). The system is coplanar at the ~5° level.",
  "p_152":"<b>KSP implementation note.</b> Rotation period = orbital period = 8.463446 days (731 241.7 s). Kopernicus <code>rotationPeriod</code> should match the orbital <code>period</code>.",
  "p_153":"<b>No seasons.</b> Obliquity damped to zero by tidal locking. Eccentricity 0.07 (Mallorquin 2024) drives a ~14% insolation variation along the orbit, which is significant — but the heat capacity of the H/He envelope smooths this out to a few-K cloud-top temperature variation across periapsis. No discrete &quot;seasons&quot; in the rocky-planet sense; instead, modest planet-wide brightening near periapsis when the substellar illumination peaks.",
  "p_154":"<b>Day-night redistribution.</b> With a thick H/He atmosphere, atmospheric heat transport from day to night is efficient. Phase-curve-class observations (not yet available for b — Spitzer phase curves were attempted but the host-star spot signal dominated) would show day-night contrast of ~150–250 K. The cfg picks 700 K dayside and 450 K nightside as a midrange estimate; both are within the GCM window for puffy Neptune at this insolation.",
  "h2_155":"Visual styling",
  "p_156":"The visual presentation of AU Mic b combines five elements:",
  "li_157":"<b>Global appearance.</b> A puffy warm-Neptune disk with subdued zonal bands, lit by a deep red M1V star at ~6° angular diameter (12× the Sun from Earth, dominating the sky). The disk itself shows muted red-brown bands (<span class=\"hex-chip\" style=\"background:#7c4a32\"></span><code>#7c4a32</code> for primary haze, <span class=\"hex-chip\" style=\"background:#c0a880\"></span><code>#c0a880</code> for zone clouds) — softer than Jupiter&#x27;s bold tan-and-white, both because of M-dwarf reddening and because photochemical haze blankets the cloud-top structure.",
  "li_158":"<b>Banded structure.</b> Equatorial superrotation jet produces a single bright zone at the equator with darker mid-latitude belts. Polar regions show a faint hood-like darkening where haze accumulates. Bands are ~10° wide in latitude, broadly resembling Jupiter&#x27;s structure but with reduced contrast and slower visual motion (rotation period 8.46 d locked → bands rotate with the planet&#x27;s orbit). Tie-break: chose banded over uniform haze for visual interest.",
  "li_159":"<b>Cloud-top texture.</b> Within each band, fine-scale eddies and Rossby-wave perturbations create a turbulent cloud-top texture — similar to a slowly-rotating Jupiter rendered through a sepia filter. Eddies advect with the zonal jet on weeks-to-months timescales.",
  "li_160":"<b>Atmospheric escape tail (the planet&#x27;s signature feature).</b> Allart 2023&#x27;s He I 10830 Å detection maps an ionized escaping outflow extending several planet radii behind b along the orbital direction. For KSP visual rendering this corresponds to a faint pink-violet comet-like tail visible in transmission geometry — most prominent when b is near conjunction with the observer. The tail brightens during AU Mic super-flare events. Color picked at <span class=\"hex-chip\" style=\"background:#ff6e8c\"></span><code>#ff6e8c</code> (H Balmer-α + Lyman-α downconvert) as a tie-break against a UV-only rendering that would be invisible.",
  "li_161":"<b>Star in sky.</b> AU Mic subtends 6.6° in b&#x27;s sky (12× the Sun from Earth) — a vast deep-red disk taking up roughly 1/30 of the full hemisphere. Surface illumination at the substellar cloud top is about 20.8× Earth&#x27;s, but red-shifted heavily into the near-IR; visually the cloud top appears bright but flat-toned rather than blue-sky bright. Super-flares (10³⁴ erg events several times per year; Tristan 2023) briefly brighten the illumination by 1–3 magnitudes for tens of minutes — visible as a transient brightening of the entire dayside.",
  "p_162":"The four close-in planets — c at 0.119 AU, d at ~0.105 AU, e at ~0.171 AU (if confirmed) — are visible from b as small dots, mostly at ≪ 1° angular diameter; the edge-on debris disk at 35–210 AU appears as a thin bright streak bisecting the sky on either side of AU Mic. b transits AU Mic&#x27;s stellar disk when viewed from beyond the system; observers on b would see the disk&#x27;s inner edge extending across the sky from ~5° from the central star outward to the horizon.",
  "h2_163":"Bibliography",
  "h3_164":"Read (visual-informative, drove decisions above)",
  "li_165":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS discovery of AU Mic b; transit-derived radius 4.0 R⊕ (later refined to 4.79); discussion of host XUV environment and atmospheric escape regime. Cornerstone paper.",
  "li_166":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). First robust RV mass with multi-instrument GP detrending; reports inflated low density consistent with puffy envelope.",
  "li_167":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO + TESS joint analysis; refines b&#x27;s mass to 8.99 ± 2.61 M⊕ and radius to 4.79 ± 0.29 R⊕; supersedes Cale 2021&#x27;s higher mass via improved stellar-activity modeling. <b>Adopted as headline source.</b>",
  "li_168":"<b>Allart R. et al. 2023</b> — <i>Homogeneous search for helium in the atmosphere of 11 gas giants with HST/STIS and CARMENES</i>, A&amp;A 677, A164 (<code>2023A&amp;A...677A.164A</code>, arXiv:2308.10891). Reports marginal-to-significant He I 10830 Å detection during AU Mic b transit; constrains escape rate and extended-atmosphere geometry. Drives the atmosphere-present and escape-tail cfg picks.",
  "li_169":"<b>Hirano T. et al. 2020</b> — <i>Evidence for Spin–Orbit Alignment in the TRAPPIST-1 System and Implications for the AU Mic system</i>, ApJ 899, L13 (<code>2020ApJ...899L..13H</code>, arXiv:2006.13654). Subaru IRD Rossiter–McLaughlin measurement of b; projected obliquity λ = −2.96°. Confirms orbital-plane alignment with disk + stellar spin.",
  "li_170":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the Mass-Radius Relation for Sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Mass-radius envelope-mass-fraction calibration. Applied to b gives ~30% H/He by mass; drives the cfg surface pressure picks.",
  "h3_171":"Read (context / methodology, not decision-driving)",
  "li_172":"<b>Klein B. et al. 2021</b> — <i>Investigating the young AU Mic system with SPIRou: stellar magnetic field and close-in planet mass</i>, MNRAS 502, 188 (<code>2021MNRAS.502..188K</code>, arXiv:2012.04970). SPIRou near-IR ZDI of AU Mic + RV; provides supporting stellar-activity context for the GP detrending used by Mallorquin 2024.",
  "li_173":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>). ZDI dipole 2 kG, total RMS 4.6 kG; sets the stellar magnetic-field context.",
  "li_174":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare census; rate 5.6/day above 10³¹ erg; relevant for atmosphere-escape and aurora timing.",
  "li_175":"<b>Lavie B. et al. 2017</b> — <i>HELIOS-RETRIEVAL: Open-source Nested Sampling Atmospheric Retrieval Code for Exoplanets</i>, AJ 154, 91 (<code>2017AJ....154...91L</code>, arXiv:1610.03216). Cool-Neptune photochemistry framework adopted for the trace-species composition.",
  "li_176":"<b>Sing D. K. et al. 2016</b> — <i>A continuum from clear to cloudy hot-Jupiter exoplanets without primordial water depletion</i>, Nature 529, 59 (<code>2016Natur.529...59S</code>, arXiv:1512.04341). Census of cloud-deck pressures in hot/warm gas giants; supports the 0.70 cloud-cover choice.",
  "li_177":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric Circulation of Hot Jupiters</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). Equatorial-superrotation GCM framework adopted (with cooler-temperature adaptation) for the banded morphology pick.",
  "h3_178":"Read (instrument / non-decisive)",
  "li_179":"<b>Martioli E. et al. 2020</b> — <i>AU Mic b transits revisited with TESS Sector 27</i> (early sector-27 release; not visual-informative).",
  "li_180":"<b>Szabó Gy. M. et al. 2021</b> — <i>Spi-Ops campaign on AU Mic b</i> (<code>2021A&amp;A...654A.159S</code>, arXiv:2108.07984). CHEOPS transit timing; not cfg-decisive.",
  "h3_181":"Not read — no arXiv preprint or low-priority (~25 papers)",
  "p_182":"Conference abstracts (DPS, EPSC), early TESS pipeline releases on AU Mic without independent reanalysis, He I follow-up campaigns that didn&#x27;t yield significant detections, and very recent PSJ early-access papers without arXiv preprints all contribute incrementally to the picture but don&#x27;t change cfg decisions. The full filtered bibliography is preserved in the planet&#x27;s <code>_bib/au-mic-b.yaml</code> (to be created) with <code>status: skipped</code> annotations.",
  "h2_183":"Open items for follow-up",
  "li_184":"<b>JWST atmospheric characterization.</b> A NIRSpec or NIRISS transmission spectrum of b would directly constrain composition and cloud structure; several proposals are accepted but not yet published at this writing. If a paper appears with molecular detections (H₂O, CH₄, CO, HCN), the cfg composition row should be re-fit and cloud_morphology may need refinement.",
  "li_185":"<b>He I 10830 Å follow-up.</b> Allart 2023&#x27;s detection is at modest significance. Independent confirmation from CARMENES or Keck/NIRSPEC would solidify the cfg&#x27;s escape-tail visual feature. If the detection is retracted, atmospheric_escape_rate_g_s drops by ~1 dex and the tail rendering should become subtler.",
  "li_186":"<b>Spitzer/JWST phase curve.</b> Direct dayside/nightside contrast measurement would constrain the 700 K / 450 K temperature picks. Phase curves through host-star activity remain challenging; deferring to JWST MIRI ECLIPSE program.",
  "li_187":"<b>Interior modeling.</b> Cale 2021 §5 sketches a Neptune-analog H/He + ices + rocky-core interior. A formal Bayesian retrieval (Acuña-class for super-Neptunes) hasn&#x27;t been published yet for b.",
  "li_188":"<b>Cfg variant: deflated future state.</b> b is currently puffy at 22 Myr; at 1 Gyr it would shrink to ~3 R⊕ at constant mass (Lopez &amp; Fortney 2014). A &quot;mature AU Mic system&quot; cfg variant could ship the deflated b for visual comparison.",
  "li_189":"<b>Coordination with c/d Phase 3.</b> The four close-in planets share AU Mic&#x27;s flare environment; if super-flare-driven atmosphere stripping arguments for d/e shift, the cfg-consistency check for b&#x27;s escape rate may need adjustment.",

  ko: {
  "p_1":"AU Microscopii b 는 22 Myr 전주계열 M1Ve flare star AU Microscopii 주위 8.463 d 궤도를 도는 4.79 ± 0.29 R⊕, 8.99 ± 2.61 M⊕ 의 저밀도 warm Neptune 입니다. Plavchan et al. 2020 (Nature 582, 497. <code>2020Natur.582..497P</code>. arXiv:2006.13248) 이 TESS 통과에서 행성을 발견했고, Cale et al. 2021 (AJ 162, 295. <code>2021AJ....162..295C</code>. arXiv:2109.13996) 이 host 별 흑점 신호의 가우시안 프로세스 detrending 후 첫 견고한 RV 질량을 제공했으며, Mallorquin et al. 2024 (A&amp;A 689, A132. <code>2024A&amp;A...689A.132M</code>) 가 ESPRESSO + TESS 재분석으로 질량과 반지름을 모두 정밀화했습니다. bulk 밀도는 ≈ 0.45 g/cc — Neptune 의 약 1/3 — 로 b 를 &quot;puffy / inflated sub-Saturn&quot; 영역에 깊숙이 놓는데, 이는 수소 envelope 가 아직 식어 수축할 시간을 갖지 못한 어린 통과 행성의 특징입니다. Allart et al. 2023 (A&amp;A 677, A164. <code>2023A&amp;A...677A.164A</code>. arXiv:2308.10891) 가 통과 동안 marginal-to- significant He I 10830 Å 흡수 시그너처를 보고했으며, 이는 확장된 탈출 H/He envelope 과 일관됩니다. Hirano et al. 2020 (ApJ 899, L13. <code>2020ApJ...899L..13H</code>. arXiv:2006.13654) 은 Rossiter–McLaughlin 로 투영 obliquity 를 측정했고 ~5° 안쪽으로 정렬됨을 발견 (λ = −2.96°), 이는 disk + 항성 자전축과 일관됩니다.",
  "p_2":"<b>NearStars 시나리오 선택. 조석 lock 된 puffy hot Neptune. 표면 압력 ~10⁷ Pa 의 확장된 H/He 우세 대기, M 왜성 조명 하의 Jupiter 밴드 analog 구름 구조, 뜨거운 주간 측면, 적당한 내부 열, 그리고 AU Mic super-flare 폭격에 의해 sculpting 된 활발히 탈출하는 상층 대기를 갖춥니다.</b> 27 개 cfg 픽 모두 puffy-Neptune 문헌 윈도우 안에서 canonical-aligned. 세 개는 tie-break (대기 색 hex, 구름 색 hex, 띠 패턴 선택). documented divergence 없음.",

  "p_141":"AU Mic b 는 암석 행성의 의미에서의 표면이 없습니다. 질량 8.99 M⊕ 와 반지름 4.79 R⊕ 가 밀도 0.45 g/cc 를 주는데, 이는 지구의 약 1/10 이고 Neptune 의 절반 미만입니다. Lopez &amp; Fortney 2014 질량-반지름 다이어그램은 이 조합을 H/He envelope 영역의 한가운데에 놓고, 수소 envelope 가 행성 전체 질량의 25–35% 를 기여합니다. 명목상의 &quot;표면&quot; — 압력이 몇 × 10⁴ Pa 에 도달하고 구름 데크에서 광학 깊이가 1 이 되는 곳 — 은 통과에서 보고된 약 4.79 R⊕ 반지름에 자리잡습니다. 그 아래로는 압력이 ~10 스케일 높이에 걸쳐 10⁵ → 10⁶ → 10⁷ Pa 로 올라가고, 가스는 상 경계 없이 초임계 유체로 매끄럽게 전이합니다. 렌더링할 지형이 없고 명시할 표면 색조도 없습니다.",
  "p_142":"NearStars 의 목적에서 플레이어가 보는 &quot;가시 표면&quot; 은 구름 데크 꼭대기입니다. 이는 텍스처가 있는 단단한 천체가 아니라 띠가 있는 가스 천체로 렌더링됩니다 (Visual styling 참조). KSP 의 stock 가스 자이언트 인프라에 커스텀 띠 텍스처가 적절한 analog 입니다. 천체의 내부는 따뜻한 Neptune 과 대체로 비슷한 구조로 가정됩니다. H/He envelope → H₂O/NH₃/CH₄ 초임계 &quot;얼음&quot; mantle → 1–3 M⊕ 정도의 작은 암석/철 코어 (Cale 2021 §5 내부 fit). 어느 것도 보이지 않습니다.",
  "p_143":"시스템의 어린 나이가 여기서 중요합니다. 22 Myr 에서 b 는 primary Kelvin–Helmholtz 수축을 마치지 않았습니다. 반지름이 Gyr 나이에 도달할 평형보다 ~1.5 배 크고, 내부 광도 (Plavchan 2020 §6) 가 나이 든 동급보다 ~10 배 큽니다. 이 잔열이 envelope 를 부풀린 채로 유지하며 He I 10830 Å 흡수가 검출 가능한 이유 중 하나 (Allart 2023) 입니다. 상층 대기가 뜨겁고, 이온화되어 있으며, 후행 wake 를 따라 약 5–8 행성 반지름까지 확장되어 있습니다.",
  "h2_144":"Atmosphere synthesis",
  "p_145":"대기는 관측적으로도 시각적으로도 행성 그 자체입니다. 여러 제약이 H/He 우세 puffy-Neptune 그림으로 수렴합니다.",
  "p_146":"<b>압력.</b> 통과 유도 반지름이 τ ≈ 1 구름 데크 위치를 고정합니다. sub-Saturn 에 대한 Lopez &amp; Fortney 2014 의 질량 + 반지름 + 나이 + 일사량 역산이 b 의 파라미터에 대해 H/He 질량 분율 ~30% 를 줍니다. 이는 (있다면) 암석 코어에서의 표면 압력 ~10⁹ Pa 를 함의하지만, KSP 대기 렌더링에 대한 의미 있는 &quot;cfg 표면 압력&quot; 은 구름 데크 압력 ~10⁷ Pa 입니다. 정확한 값은 구름 응결물 화학 (깊이와 온도에 따라 H₂O, NH₃, NH₄SH) 에 의존하며 직접 측정되지 않습니다.",
  "p_147":"<b>조성.</b> Allart 2023 의 He I 10830 Å 검출 (통과 동안 ~0.3% 흡수. 명목 분석에서는 2.5σ marginal 이지만 CARMENES 관측의 He I 초과와 결합하면 견고함) 은 확장된 H/He 대기를 요구합니다. AU Mic 의 XUV 플럭스 (포화 영역. Stelzer 2013. Tristan 2023 flare 센서스) 를 사용한 에너지 한정 탈출 계산은 10⁹–10¹⁰ g/s 의 질량 손실률을 주며, Allart 2023 의 He I 광학 깊이와 일관됩니다. 이는 시스템의 예상 수명에 걸쳐 envelope 질량의 ~10% 를 잃기에는 충분하지만 b 를 완전히 스트립하기에는 부족합니다. 미량 종 (H₂O, CH₄, NH₃, CO) 은 Lavie 2017 차가운-Neptune 광화학 프레임워크에 따라 거의 태양 풍부도로 가정되며, 상층 대기에서 메탄 광분해가 광화학 haze 를 생성합니다.",
  "p_148":"<b>저궤도에서의 하늘 외관.</b> b 의 구름 꼭대기로 내려가는 KSP 플레이어 는 깊은 붉은 별이 비추는 Jupiter-like 띠상 가스 자이언트를 볼 것입니다 — 다만 띠 자체가 광화학 haze 와 M-왜성 SED 양쪽 모두에 의해 red-brown 쪽으로 muted 되어 있습니다. zonal jet 은 hot-Neptune GCM 시뮬레이션 (Showman 2009 hot-Jupiter analog 를 Neptune 온도와 자전에 맞춰 스케일) 에서 추론됩니다. 적도 superrotation 이 더 어두운 중위도 belt 와 단일 밝은 zone 을 만듭니다. 극 영역은 더 어두움 — 광화학 haze 가 줄어든 일사 하에 축적되는 hood-like 변색입니다.",
  "p_149":"<b>대기 탈출과 혜성-like 꼬리.</b> AU Mic b 는 어떤 시스템에서든 가장 잘 특성화된 탈출 대기 중 하나입니다. Allart 2023 의 He I 10830 Å 흡수가 b 뒤편 궤도 방향을 따라 행성 반지름 몇 배에 걸쳐 뻗는 후행 꼬리를 매핑합니다 (Allart 2023 §4). NearStars cfg 렌더링에서 이는 EVE-사이드 대기 탈출 피처에 대응됩니다 — conjunction 의 관측자에게 보이는 옅은 이온화 꼬리. 꼬리는 AU Mic 의 이상하게 강한 항성풍 (~10× 태양. Plavchan 2020 §4 배경) 에 의해 sculpt 됩니다. super-flare 이벤트 동안 (10³¹ erg 위 5.6/일. Tristan 2023 의 가끔 10³⁴ erg 이벤트) 꼬리는 bulk envelope 가 보통 가리는 깊이까지 상층 대기가 잠시 이온화되며 극적으로 밝아집니다.",
  "h2_150":"Rotation &amp; spin synthesis",
  "p_151":"0.51 M☉ 주위 0.07 AU 의 8.46-d Neptune 급 행성에 대한 조석 감쇠는 ~10⁵–10⁶ 년 시간 척도로 진행됩니다 (Goldreich &amp; Soter 1966, Neptune- like Q ≈ 10⁴). 22-Myr 시스템 나이에 걸쳐 b 는 거의 동기에 가까운 의사 동기 (pseudo-synchronous) spin 으로 조석 잠금됩니다 — e = 0.07 에서 평형 자전은 ~2% 만 super-synchronous 라 사실상 1:1 로 렌더링됩니다. Hirano 2020 의 Rossiter–McLaughlin 측정 (λ = −2.96 +10.3/-10.6°) 은 b 의 궤도면이 AU Mic 의 항성 자전축 과 정렬됨을 확인하며, 그것이 다시 가장자리 정면 disk 평면 (Krist 2005. Schneider 2014) 과 정렬됩니다. 시스템은 ~5° 수준에서 coplanar 입니다.",
  "p_152":"<b>KSP 구현 노트.</b> 자전 주기 = 궤도 주기 = 8.463446 일 (731 241.7 초). Kopernicus <code>rotationPeriod</code> 는 궤도 <code>period</code> 와 일치해야 함.",
  "p_153":"<b>계절 없음.</b> 조석 lock 으로 obliquity 가 0 으로 감쇠. 이심률 0.07 (Mallorquin 2024) 가 궤도 따라 ~14% 일사 변동을 구동하는데, 이는 상당하지만 H/He envelope 의 열용량이 이를 거의 평탄화시켜 periapsis 에서 구름 꼭대기 온도 변동을 몇 K 로 만듭니다. 암석 행성 의미의 이산적 &quot;계절&quot; 은 없습니다. 대신 substellar 일사가 peak 일 때 periapsis 근처에서 행성 전체가 적당히 밝아집니다.",
  "p_154":"<b>주야 재분배.</b> 두꺼운 H/He 대기에서 주간에서 야간으로의 대기 열 운반은 효율적입니다. phase 곡선 급 관측 (b 에는 아직 없음 — Spitzer phase 곡선 시도가 있었으나 host 별 흑점 신호가 지배함) 은 ~150–250 K 의 주야 대비를 보일 것입니다. cfg 는 중간 추정값으로 주간 700 K 와 야간 450 K 를 택합니다. 두 값 모두 이 일사량에서의 puffy Neptune 에 대한 GCM 윈도우 안에 있습니다.",
  "h2_155":"Visual styling",
  "p_156":"AU Mic b 의 시각 표현은 다섯 요소를 결합합니다.",
  "li_157":"<b>전반 외관.</b> 절제된 zonal 띠를 가진 puffy warm-Neptune 디스크. ~6° 각지름의 깊은 붉은 M1V 별 (지구에서 본 태양의 12 배, 하늘 지배) 이 비춥니다. 디스크 자체는 muted red-brown 띠 (<span class=\"hex-chip\" style=\"background:#7c4a32\"></span><code>#7c4a32</code> 주 haze, <span class=\"hex-chip\" style=\"background:#c0a880\"></span><code>#c0a880</code> zone 구름) 를 보입니다 — Jupiter 의 대담한 tan-and-white 보다 부드러움. M-왜성 reddening 때문이기도 하고, 광화학 haze 가 구름 꼭대기 구조를 덮기 때문이기도 합니다.",
  "li_158":"<b>띠 구조.</b> 적도 superrotation jet 이 더 어두운 중위도 belt 와 적도의 단일 밝은 zone 을 만듭니다. 극 영역은 haze 가 축적되는 옅은 hood-like 어두워짐을 보입니다. 띠는 위도로 ~10° 폭이며, Jupiter 의 구조와 대체로 닮았지만 줄어든 대비와 더 느린 시각 운동을 갖습니다 (자전 주기 8.46 d lock → 띠가 행성의 궤도와 함께 자전). Tie-break. 시각적 흥미를 위해 균일 haze 가 아닌 띠 선택.",
  "li_159":"<b>구름 꼭대기 텍스처.</b> 각 띠 안에서 fine-scale eddy 와 Rossby wave 섭동이 격렬한 구름 꼭대기 텍스처를 만듭니다 — sepia 필터를 통해 렌더링된 천천히 자전하는 Jupiter 와 비슷. eddy 는 zonal jet 과 함께 수 주에서 수 개월의 시간 척도로 advect 됩니다.",
  "li_160":"<b>대기 탈출 꼬리 (행성의 시그너처 피처).</b> Allart 2023 의 He I 10830 Å 검출이 b 뒤편 궤도 방향을 따라 행성 반지름 몇 배에 걸쳐 뻗는 이온화 탈출 outflow 를 매핑합니다. KSP 시각 렌더링에 대해서 는 투과 기하에서 보이는 옅은 분홍-보라 혜성-like 꼬리에 대응됩니다. 관측자와의 conjunction 근처에서 가장 두드러집니다. 꼬리는 AU Mic super-flare 이벤트 동안 밝아집니다. 색은 <span class=\"hex-chip\" style=\"background:#ff6e8c\"></span><code>#ff6e8c</code> (H Balmer-α + Lyman-α downconvert) 로, 보이지 않을 UV-only 렌더링에 대한 tie-break 으로 선택.",
  "li_161":"<b>하늘의 별.</b> AU Mic 이 b 의 하늘에서 6.6° 를 차지 (지구에서 본 태양의 12 배) — 반구의 약 1/30 을 차지하는 광활한 깊은 붉은 디스크. 주간 구름 꼭대기에서 표면 일사량은 지구의 약 20.8 배 이지만 근적외선 쪽으로 크게 red-shift 됨. 시각적으로 구름 꼭대기는 밝지만 푸른 하늘의 밝음이 아니라 평탄한 톤으로 보입니다. Super-flare (연간 여러 차례의 10³⁴ erg 이벤트. Tristan 2023) 가 10–60 분간 조명을 1–3 등급 잠시 밝게 만듭니다 — 주간 전체의 일시적 밝아짐 으로 보임.",
  "p_162":"가까이 있는 네 행성 — c 가 0.119 AU, d 가 ~0.105 AU, e 가 ~0.171 AU (확인된다면) — 는 b 에서 작은 점으로 보이며 대부분 각지름 ≪ 1° 입니다. 35–210 AU 의 가장자리 정면 잔해 원반은 AU Mic 양옆 하늘을 이등분하는 가늘고 밝은 줄로 나타납니다. b 는 시스템 너머에서 볼 때 AU Mic 의 항성 디스크를 통과합니다. b 의 관측자는 disk 의 안쪽 가장자리가 중심 별에서 ~5° 부터 지평선 바깥까지 하늘을 가로질러 뻗는 것을 보게 됩니다.",
  "h2_163":"Bibliography",
  "h3_164":"Read (visual-informative, drove decisions above)",
  "li_165":"<b>Plavchan P. et al. 2020</b> — <i>A planet within the debris disk around the pre-main-sequence star AU Microscopii</i>, Nature 582, 497 (<code>2020Natur.582..497P</code>, arXiv:2006.13248). TESS 가 발견한 AU Mic b 의 통과 hot Neptune. 통과 유도 반지름 4.0 R⊕ (이후 4.79 로 정밀화). host XUV 환경과 대기 탈출 영역 논의. cornerstone 논문.",
  "li_166":"<b>Cale B. L. et al. 2021</b> — <i>Diving Beneath the Sea of Stellar Activity: Chromatic Radial Velocities of AU Mic b</i>, AJ 162, 295 (<code>2021AJ....162..295C</code>, arXiv:2109.13996). 다기기 GP detrending 으로 첫 견고한 RV 질량. puffy envelope 과 일관된 인플레이션 저밀도 보고.",
  "li_167":"<b>Mallorquin M. et al. 2024</b> — <i>AU Mic system characterized with ESPRESSO</i>, A&amp;A 689, A132 (<code>2024A&amp;A...689A.132M</code>). ESPRESSO + TESS 결합 분석. b 의 질량을 8.99 ± 2.61 M⊕ 로, 반지름을 4.79 ± 0.29 R⊕ 로 정밀화. 개선된 항성 활동 모델링으로 Cale 2021 의 더 높은 질량을 대체. <b>headline 출처로 채택</b>.",
  "li_168":"<b>Allart R. et al. 2023</b> — <i>Homogeneous search for helium in the atmosphere of 11 gas giants with HST/STIS and CARMENES</i>, A&amp;A 677, A164 (<code>2023A&amp;A...677A.164A</code>, arXiv:2308.10891). AU Mic b 통과 동안의 marginal-to-significant He I 10830 Å 검출 보고. 탈출률과 확장 대기 기하 제약. atmosphere-present 와 escape-tail cfg 픽을 구동.",
  "li_169":"<b>Hirano T. et al. 2020</b> — <i>Evidence for Spin–Orbit Alignment in the TRAPPIST-1 System and Implications for the AU Mic system</i>, ApJ 899, L13 (<code>2020ApJ...899L..13H</code>, arXiv:2006.13654). Subaru IRD 의 b 에 대한 Rossiter–McLaughlin 측정. 투영 obliquity λ = −2.96°. disk + 항성 자전축과의 궤도면 정렬 확인.",
  "li_170":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the Mass-Radius Relation for Sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). 질량-반지름 envelope 질량 분율 보정. b 에 적용하면 질량 ~30% H/He. cfg 표면 압력 픽을 구동.",
  "h3_171":"Read (context / methodology, not decision-driving)",
  "li_172":"<b>Klein B. et al. 2021</b> — <i>Investigating the young AU Mic system with SPIRou: stellar magnetic field and close-in planet mass</i>, MNRAS 502, 188 (<code>2021MNRAS.502..188K</code>, arXiv:2012.04970). AU Mic 의 SPIRou 근적외선 ZDI + RV. Mallorquin 2024 가 사용한 GP detrending 에 대한 항성 활동 맥락 제공.",
  "li_173":"<b>Donati J.-F. et al. 2023</b> — <i>The magnetic field topology and filling of the very active M dwarf AU Mic</i>, MNRAS 525, 455 (<code>2023MNRAS.525..455D</code>). ZDI 쌍극자 2 kG, 전체 RMS 4.6 kG. 항성 자기장 맥락 설정.",
  "li_174":"<b>Tristan I. I. et al. 2023</b> — <i>Catching the Flares of the AU Mic System with TESS</i>, ApJ 951, 33 (<code>2023ApJ...951...33T</code>, arXiv:2306.00077). TESS flare 센서스. 10³¹ erg 위 5.6/일 비율. 대기 탈출과 오로라 타이밍에 관련.",
  "li_175":"<b>Lavie B. et al. 2017</b> — <i>HELIOS-RETRIEVAL: Open-source Nested Sampling Atmospheric Retrieval Code for Exoplanets</i>, AJ 154, 91 (<code>2017AJ....154...91L</code>, arXiv:1610.03216). 미량 종 조성에 채택된 차가운 Neptune 광화학 프레임워크.",
  "li_176":"<b>Sing D. K. et al. 2016</b> — <i>A continuum from clear to cloudy hot-Jupiter exoplanets without primordial water depletion</i>, Nature 529, 59 (<code>2016Natur.529...59S</code>, arXiv:1512.04341). hot/warm 가스 자이언트의 구름 데크 압력 센서스. 0.70 cloud-cover 선택을 뒷받침.",
  "li_177":"<b>Showman A. P. et al. 2009</b> — <i>Atmospheric Circulation of Hot Jupiters</i>, ApJ 699, 564 (<code>2009ApJ...699..564S</code>, arXiv:0809.2089). 적도 superrotation GCM 프레임워크 (더 차가운 온도 적응 포함) 가 띠 형태 픽에 채택.",
  "h3_178":"Read (instrument / non-decisive)",
  "li_179":"<b>Martioli E. et al. 2020</b> — <i>AU Mic b transits revisited with TESS Sector 27</i> (초기 sector-27 릴리스. 시각적 정보 없음).",
  "li_180":"<b>Szabó Gy. M. et al. 2021</b> — <i>Spi-Ops campaign on AU Mic b</i> (<code>2021A&amp;A...654A.159S</code>, arXiv:2108.07984). CHEOPS 통과 타이밍. cfg-결정적이지 않음.",
  "h3_181":"Not read — no arXiv preprint or low-priority (~25 papers)",

  "li_185":"<b>He I 10830 Å 후속.</b> Allart 2023 의 검출은 적당한 유의성입니다. CARMENES 또는 Keck/NIRSPEC 의 독립 확인이 cfg 의 탈출 꼬리 시각 피처를 견고화할 것입니다. 검출이 철회되면 atmospheric_escape_rate_g_s 가 ~1 dex 내려가고 꼬리 렌더링이 더 미묘해져야 합니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
