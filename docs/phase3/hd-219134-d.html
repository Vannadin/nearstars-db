  "h2_109":"Surface synthesis",
  "p_110":"HD 219134 d has no solid surface in the conventional sense — at Msini ≈ 21 M⊕ with no measured radius, it is most plausibly a warm mini-Neptune / sub-Neptune with a thick volatile envelope over a rocky-icy core. The &quot;surface&quot; relevant for visual rendering is the cloud deck, conventionally referenced to the 1 bar pressure level.",
  "p_111":"The defining caveat is that <b>d does not transit</b>: its radius is unmeasured, so every radius-dependent quantity (radius, surface gravity, density, scale height) is an estimate flagged at low confidence. The cfg adopts a sub-Neptune mass-radius scaling (Lopez &amp; Fortney 2014; Wolfgang 2016): for ~21 M⊕ with a modest H/He + volatile envelope, R ≈ 2.5–3.5 R⊕, and the cfg picks 2.8 R⊕ as the mid-range. This gives a surface gravity ~2.7 g⊕ and a bulk density ~5.3 g/cc, both consistent with a sub-Neptune (a rocky-icy core under a gaseous envelope) rather than a bare rock — a 21 M⊕ pure-rock planet would be far too dense and small. The radius could be revised substantially by a future transit or direct-imaging detection.",
  "p_112":"<b>Color under K3 V illumination.</b> Under the 4858 K orange host SED, the cloud deck and haze are perceived warmer than they would be under Sol. The cfg renders a warm cream-tan cloud deck (<span class=\"hex-chip\" style=\"background:#e8d0aa\"></span><code>#e8d0aa</code>) with a warm-tan haze limb (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>). These are tie-break choices — no spectrum exists for d — defaulting to the warm sub-Neptune banded analog under orange-dwarf light.",
  "h2_113":"Atmosphere synthesis",
  "p_114":"The atmospheric inference for d is entirely theoretical (no transit, no spectrum), but the mass and temperature place it confidently in the sub-Neptune regime.",
  "p_115":"<b>Atmosphere present.</b> At Msini ≈ 21 M⊕ and T_eq ≈ 411 K, d sits well above the rocky / sub-Neptune transition; the photoevaporation valley (Owen &amp; Wu 2017) leaves planets of this mass at 0.24 AU around a K dwarf with their volatile envelopes intact. The cfg adopts a thick H₂/He-dominated atmosphere with enhanced metallicity, a water-cloud deck, and an overlying photochemical haze — the canonical warm sub-Neptune composition. This is a tie-break composition (no measured spectrum), defaulting to the standard sub-Neptune inventory.",
  "p_116":"<b>Sky appearance.</b> With a thick hazy atmosphere, the sky from the (reference 1 bar) cloud deck is a warm-tan overcast, brightening toward the substellar point. The host star HD 219134 subtends ~1.65° (about 3× the Sun&#x27;s apparent size from Earth) and reads warm-orange through the haze. Below the 1 bar level the atmosphere thickens into an opaque warm envelope; above it, a thin photochemical haze layer scatters the orange starlight.",
  "h2_117":"Rotation &amp; spin synthesis",
  "p_118":"Unlike the close-in transiting pair, d is far enough out (0.235 AU, 46.71 d) that tidal locking is not assured. For a ~21 M⊕ volatile planet at this separation around a 0.696 M☉ K dwarf, the tidal- despinning timescale is comparable to or longer than the system age, so the cfg adopts a <b>non-locked, slowly rotating</b> state rather than a 1:1 spin-orbit lock.",
  "p_119":"<b>KSP implementation note.</b> With no rotation measurement, the cfg assigns a generic sub-Neptune rotation period (a slow ~1 day analog is a reasonable placeholder; this is not a measured value and is flagged low confidence). Obliquity is set to a small value as a tie-break.",
  "p_120":"<b>No strong seasons.</b> The curated eccentricity is 0.0 (circularized in the Vogt 2015 fit), so insolation is steady around the orbit; there is no eccentricity-driven seasonal modulation. Any weather banding is driven by the internal heat flux and the steady 4.78 S⊕ insolation rather than by seasons.",
  "h2_121":"Visual styling",
  "p_122":"Combining the atmosphere decisions for a warm RV-only sub-Neptune:",
  "li_123":"<b>Global appearance (orbit view).</b> A warm cream-tan banded sub-Neptune disk, hazier and more featureless than a cold gas giant, with subtle zonal contrast under the orange host light.",
  "li_124":"<b>Cloud bands.</b> Warm cream-tan zonal bands (<span class=\"hex-chip\" style=\"background:#e8d0aa\"></span><code>#e8d0aa</code>) with a water- cloud deck and an overlying photochemical haze; banded contrast is muted (a tie-break — no GCM, no spectrum).",
  "li_125":"<b>Limb haze.</b> A warm-tan photochemical haze layer (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) scattering the orange starlight at the limb, giving a soft terminator rather than a sharp edge.",
  "li_126":"<b>Star in sky.</b> HD 219134 subtends ~1.65° at d — about 3× the Sun&#x27;s angular size from Earth, warm-orange through the haze, illuminating the cloud deck at ~4.8× Earth-noon brightness.",
  "li_127":"<b>Sister planets in sky.</b> The inner transiting pair (b, c) and the contested f appear interior; the temperate g and cold giant h are exterior. All near-coplanar, appearing as bright points.",
  "li_128":"<b>Low-confidence caveat (rendering note).</b> Because the radius is unmeasured, the rendered planet size is an estimate; the cfg should treat d&#x27;s disk scale as provisional pending a transit or direct-imaging radius.",
  "h2_129":"Bibliography",
  "h3_130":"Read (visual-informative, drove decisions above)",
  "li_131":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT solution; the source for d&#x27;s orbit (P = 46.71 d, a = 0.235 AU) and minimum mass (Msini = 21.3 ± 1.27 M⊕, recommended). <b>The anchor for d&#x27;s orbit and mass.</b>",
  "li_132":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). Sub-Neptune envelope mass-radius scaling; gives the R ≈ 2.5–3.5 R⊕ estimate range for ~21 M⊕. Drives the (low-confidence) <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> estimate.",
  "li_133":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). Photoevaporation physics; at ~21 M⊕ and 0.24 AU around a K dwarf, d retains its volatile envelope. Supports <code>atmosphere_present = true</code>.",
  "h3_134":"Read (context / methodology, not decision-driving)",
  "li_135":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I.</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). HARPS-N detection; gives the lower alternative Msini = 8.67 M⊕ (recommended:false) — the documented mass alternative for d.",
  "li_136":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic Mass-Radius Relationship for Sub-Neptunes</i>, ApJ 825, 19 (<code>2016ApJ...825...19W</code>, arXiv:1504.07557). Probabilistic M-R relation; corroborates the sub-Neptune radius estimate range.",
  "li_137":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). Inherited host parameters (L for the insolation/T_eq derivation).",
  "h3_138":"Read (instrument-only, not visual-informative)",
  "li_139":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). The transiting b/c study; d is non- transiting and not characterized here beyond the system context.",
  "h3_140":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_141":"The d-specific arXiv record is small (RV-only, no transit or atmospheric characterization). The not-read set is dynamical-stability follow-ups and generic sub-Neptune interior-modeling papers that do not change the warm-sub-Neptune reading set by the Msini and temperature.",
  "h2_142":"Open items for follow-up",
  "li_143":"<b>True mass and radius.</b> d&#x27;s mass is Msini-only and the radius is a sub-Neptune scaling estimate at low confidence. A future transit detection, astrometric inclination (Gaia DR5+), or direct-imaging campaign would convert Msini to true mass and constrain the radius — all radius-dependent fields would then move from low to medium/high confidence.",
  "li_144":"<b>Atmospheric spectrum.</b> No transmission or emission spectrum exists. A future JWST or direct-imaging spectrum would replace the tie-break composition and cloud tints with measured values.",
  "li_145":"<b>Mass alternative.</b> The Vogt 2015 Msini = 21.3 M⊕ (recommended) vs Motalebi 2015 Msini = 8.67 M⊕ difference is large; if a future RV reanalysis resolves it, the sub-Neptune-vs-super-Earth character of d (and its radius estimate) should be revisited.",
  "h2_146":"Related",

  "td_108":"호스트 Phase 3 에서 상속 (<code>docs/phase3/hd-219134.md</code>)",
  "h2_109":"표면 합성",
  "p_110":"HD 219134 d 는 통상적 의미의 고체 표면이 없습니다 — Msini ≈ 21 M⊕ 에 측정 반지름이 없어, 암석-얼음 core 위에 두꺼운 volatile envelope 을 가진 따뜻한 mini-Neptune / sub-Neptune 일 가능성이 가장 높습니다. 시각 렌더링에 관련된 &quot;표면&quot;은 통상 1 bar 압력 레벨로 기준되는 구름 deck 입니다.",
  "p_111":"결정적 단서는 <b>d 가 transit 하지 않는다</b>는 점입니다. 반지름이 측정되지 않아 모든 반지름 의존 양 (반지름, 표면 중력, 밀도, scale height) 이 낮은 신뢰도로 표시된 추정입니다. cfg 는 sub-Neptune mass-radius 스케일링 (Lopez &amp; Fortney 2014. Wolfgang 2016) 을 채택합니다 — ~21 M⊕ 에 적당한 H/He + volatile envelope 이면 R ≈ 2.5–3.5 R⊕ 이고, cfg 는 mid-range 2.8 R⊕ 를 선택합니다. 이는 표면 중력 ~2.7 g⊕ 와 bulk 밀도 ~5.3 g/cc 를 주며, 둘 다 맨 암석이 아니라 sub-Neptune (기체 envelope 아래 암석-얼음 core) 과 일관됩니다 — 21 M⊕ 순수 암석 행성은 너무 밀도 높고 작을 것입니다. 반지름은 향후 transit 이나 직접 영상 검출로 크게 수정될 수 있습니다.",
  "p_112":"<b>K3 V 조명 아래의 색.</b> 4858 K 오렌지 호스트 SED 아래에서 구름 deck 과 haze 는 Sol 아래보다 따뜻하게 인지됩니다. cfg 는 따뜻한 cream-tan 구름 deck (<span class=\"hex-chip\" style=\"background:#e8d0aa\"></span><code>#e8d0aa</code>) 과 따뜻한 tan haze limb (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) 을 렌더링합니다. 이들은 tie-break 선택입니다 — d 에는 스펙트럼이 없어, 오렌지 왜성 빛 아래의 따뜻한 sub-Neptune 띠 유사체를 기본값으로 합니다.",
  "h2_113":"대기 합성",
  "p_114":"d 의 대기 추론은 완전히 이론적이지만 (transit 없음, 스펙트럼 없음), 질량과 온도가 d 를 확실히 sub-Neptune 영역에 둡니다.",
  "p_115":"<b>대기 존재.</b> Msini ≈ 21 M⊕ 와 T_eq ≈ 411 K 에서 d 는 암석 / sub-Neptune 전이보다 한참 위에 자리합니다. 광증발 valley (Owen &amp; Wu 2017) 는 K 왜성 주위 0.24 AU 의 이 질량 행성에게 volatile envelope 을 온전히 남깁니다. cfg 는 금속도가 증강된 두꺼운 H₂/He 지배 대기, 물 구름 deck, 그 위 광화학 haze 를 채택합니다 — 전형적인 따뜻한 sub-Neptune 조성입니다. 이는 tie-break 조성으로 (측정 스펙트럼 없음), 표준 sub-Neptune 목록을 기본값으로 합니다.",
  "p_116":"<b>하늘 외관.</b> 두꺼운 hazy 대기에서 (기준 1 bar) 구름 deck 의 하늘은 따뜻한 tan 흐림으로, substellar 점 쪽으로 밝아집니다. 호스트 별 HD 219134 가 ~1.65° (지구에서 본 태양 각 크기의 약 3 배) 를 차지하고, haze 를 통해 따뜻한 오렌지로 읽힙니다. 1 bar 레벨 아래에서 대기는 불투명한 따뜻한 envelope 으로 두꺼워지고, 그 위로는 얇은 광화학 haze 층이 오렌지 별빛을 산란합니다.",
  "h2_117":"자전 &amp; spin 합성",
  "p_118":"가까운 transit 쌍과 달리 d 는 충분히 멀어 (0.235 AU, 46.71 d) 조석 고정이 보장되지 않습니다. 0.696 M☉ K 왜성 주위 이 거리의 ~21 M⊕ volatile 행성에 대해 조석 despinning timescale 은 시스템 나이와 비슷하거나 더 길어, cfg 는 1:1 회전-궤도 고정이 아니라 <b>비고정, 느린 자전</b> 상태를 채택합니다.",
  "p_119":"<b>KSP 구현 노트.</b> 자전 측정이 없어 cfg 는 일반적인 sub-Neptune 자전 주기를 할당합니다 (느린 ~1 일 유사체가 합리적인 placeholder. 측정값이 아니며 낮은 신뢰도로 표시). obliquity 는 tie-break 로 작은 값으로 설정합니다.",
  "p_120":"<b>강한 계절 없음.</b> curated 이심률은 0.0 (Vogt 2015 fit 에서 원형화됨) 이라 궤도에 걸쳐 일사가 일정합니다. 이심률 구동 계절 변조는 없습니다. 어떤 날씨 띠도 계절이 아니라 내부 열 flux 와 일정한 4.78 S⊕ 일사로 구동됩니다.",
  "h2_121":"비주얼 스타일",
  "p_122":"따뜻한 RV-only sub-Neptune 의 대기 결정을 종합하면 다음과 같습니다.",
  "li_123":"<b>전역 외관 (궤도 뷰).</b> 따뜻한 cream-tan 띠 sub-Neptune disk 로, 차가운 가스 거인보다 hazy 하고 feature 가 적으며, 오렌지 호스트 빛 아래 미묘한 띠 대비를 가집니다.",
  "li_124":"<b>구름 띠.</b> 물 구름 deck 과 그 위 광화학 haze 를 가진 따뜻한 cream-tan 띠 (<span class=\"hex-chip\" style=\"background:#e8d0aa\"></span><code>#e8d0aa</code>). 띠 대비는 약함 (tie-break — GCM 없음, 스펙트럼 없음).",
  "li_125":"<b>Limb haze.</b> 오렌지 별빛을 산란하는 따뜻한 tan 광화학 haze 층 (<span class=\"hex-chip\" style=\"background:#d8b890\"></span><code>#d8b890</code>) 으로, 또렷한 가장자리가 아니라 부드러운 terminator 를 줌.",
  "li_126":"<b>하늘의 별.</b> HD 219134 가 d 에서 ~1.65° 를 차지 — 지구에서 본 태양 각 크기의 약 3 배, haze 를 통해 따뜻한 오렌지, 구름 deck 을 ~4.8× 지구 정오 밝기로 조명.",
  "li_127":"<b>하늘의 자매 행성.</b> 안쪽 transit 쌍 (b, c) 과 contested f 가 안쪽에, 온대 g 와 차가운 거인 h 가 바깥쪽에 나타남. 모두 거의 동일 평면, 밝은 점으로 보임.",
  "li_128":"<b>낮은 신뢰도 단서 (렌더링 노트).</b> 반지름이 측정되지 않아 렌더링된 행성 크기는 추정입니다. cfg 는 transit 이나 직접 영상 반지름이 나올 때까지 d 의 disk 스케일을 잠정적으로 다뤄야 합니다.",
  "h2_129":"참고 문헌",
  "h3_130":"읽음 (시각 정보 제공, 위 결정을 견인)",
  "li_131":"<b>Vogt S. S. et al. 2015</b> — <i>Six Planets Orbiting HD 219134</i>, ApJ 814, 12 (<code>2015ApJ...814...12V</code>, doi:10.1088/0004-637X/814/1/12). Keck/HIRES + APT 해. d 의 궤도 (P = 46.71 d, a = 0.235 AU) 와 최소 질량 (Msini = 21.3 ± 1.27 M⊕, recommended) 의 출처. <b>d 의 궤도와 질량의 앵커.</b>",
  "li_132":"<b>Lopez E. D. &amp; Fortney J. J. 2014</b> — <i>Understanding the mass-radius relation for sub-Neptunes</i>, ApJ 792, 1 (<code>2014ApJ...792....1L</code>, arXiv:1311.0329). sub-Neptune envelope mass-radius 스케일링. ~21 M⊕ 에 대해 R ≈ 2.5–3.5 R⊕ 추정 범위를 줌. (낮은 신뢰도) <span class=\"field-tt\" data-ko-tip=\"반지름 (지구반지름 단위).\" data-en-tip=\"Radius in Earth-radius units.\"><code>radius_rearth</code></span> 추정을 견인.",
  "li_133":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley in the Kepler planets</i>, ApJ 847, 29 (<code>2017ApJ...847...29O</code>, arXiv:1705.10810). 광증발 physics. ~21 M⊕, K 왜성 주위 0.24 AU 에서 d 는 volatile envelope 을 유지. <code>atmosphere_present = true</code> 를 뒷받침.",
  "h3_134":"읽음 (맥락 / 방법론, 결정을 견인하지 않음)",
  "li_135":"<b>Motalebi F. et al. 2015</b> — <i>The HARPS-N Rocky Planet Search. I.</i>, A&amp;A 584, A72 (<code>2015A&amp;A...584A..72M</code>). HARPS-N 검출. 더 낮은 대안 Msini = 8.67 M⊕ (recommended:false) 제시 — d 의 기록된 질량 대안.",
  "li_136":"<b>Wolfgang A. et al. 2016</b> — <i>Probabilistic Mass-Radius Relationship for Sub-Neptunes</i>, ApJ 825, 19 (<code>2016ApJ...825...19W</code>, arXiv:1504.07557). 확률적 M-R 관계. sub-Neptune 반지름 추정 범위를 보강.",
  "li_137":"<b>Ligi R. et al. 2019</b> — A&amp;A 631, A92 (<code>2019A&amp;A...631A..92L</code>). 상속된 호스트 파라미터 (일사/T_eq 유도를 위한 L).",
  "h3_138":"읽음 (instrument-only, 시각 정보 아님)",
  "li_139":"<b>Gillon M. et al. 2017</b> — Nat. Astron. 1, 0056 (<code>2017NatAs...1E..56G</code>). transit 하는 b/c 연구. d 는 비-transit 이라 시스템 맥락을 넘어 여기서 특성화되지 않음.",
  "h3_140":"읽지 않음 — arXiv preprint 가 없거나 우선순위 낮음 (~소수)",
  "p_141":"d 별 arXiv 기록은 적습니다 (RV-only, transit 이나 대기 특성화 없음). 읽지 않은 세트는 동역학적 안정성 후속과, Msini 와 온도로 정한 따뜻한 sub-Neptune 해석을 바꾸지 않는 일반 sub-Neptune 내부-모델링 논문입니다.",
  "h2_142":"후속 항목",
  "li_143":"<b>진질량과 반지름.</b> d 의 질량은 Msini 전용이고 반지름은 낮은 신뢰도의 sub-Neptune 스케일링 추정입니다. 향후 transit 검출, 천체측정 경사 (Gaia DR5+), 또는 직접 영상 캠페인이 Msini 를 진질량으로 변환하고 반지름을 제약하면 — 모든 반지름 의존 필드가 낮음에서 medium/high 신뢰도로 이동합니다.",
  "li_144":"<b>대기 스펙트럼.</b> transmission 이나 emission 스펙트럼 없음. 향후 JWST 나 직접 영상 스펙트럼이 tie-break 조성과 구름 tint 를 측정값으로 대체합니다.",
  "li_145":"<b>질량 대안.</b> Vogt 2015 Msini = 21.3 M⊕ (recommended) vs Motalebi 2015 Msini = 8.67 M⊕ 차이가 큽니다. 향후 RV 재분석이 이를 해소하면, d 의 sub-Neptune-vs-super-Earth 성격 (과 반지름 추정) 을 재검토해야 합니다.",
  "h2_146":"Related",
  "li_147":"<a href=\"hd-219134.md\">hd-219134</a> — 호스트 별 Phase 3 합성",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
