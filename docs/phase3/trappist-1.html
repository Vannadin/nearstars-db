  "h2_90":"Surface synthesis",
  "p_91":"The photosphere is a 2566 K molecular atmosphere — TiO/VO bands gate the optical flux and H₂O the near-IR, which is why the photospheric color pipeline uses a real Pickles SED rather than a blackbody (a 2566 K blackbody renders <span class=\"hex-chip\" style=\"background:#ffa94f\"></span><code>#ffa94f</code>, noticeably redder than the band-structured truth). The star is also measurably <i>inflated</i>: <a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a> note the radius runs 8–14% above solar-metallicity evolutionary models, the classic signature of magnetic suppression of convection in active M dwarfs.",
  "p_92":"<b>Spots exist, but the contrast is subtle.</b> Kepler/K2 confirmed cool, stable spots (Luger 2017; Vida 2017), and JWST transmission spectra of the planets are contaminated at the 100–500 ppm level by a spot-dominated heterogeneous photosphere (<a href=\"https://arxiv.org/abs/2409.19333\">Radica 2024</a>). The best direct temperature measurement comes from <a href=\"https://arxiv.org/abs/2508.04793\">Vasilyev et al. 2025</a>, who watched individual magnetic features vanish during flares: the features fit 2350–2550 K — a few hundred kelvin of contrast at most, with per-feature projected areas of 0.06% (if fully black) to 1.5% (if penumbra-like) of the visible disk. The rendering consequence is a <i>dappled</i> disk: slightly darker, slightly redder patches drifting with the 3.295-day rotation, never the hard black naevi of a classical spotted-star texture.",
  "p_93":"<b>No spot–flare geometry correlation.</b> Vida et al. 2017 found flares at every rotational phase, only weakly favoring light-curve minimum — so flare placement in the renderer need not track the spot pattern.",
  "h2_94":"Atmosphere synthesis",
  "p_95":"The chromosphere and corona are active but modest by late-M flare star standards — <a href=\"https://arxiv.org/abs/1712.01911\">Van Grootel 2018</a> call it &quot;a low-activity M8,&quot; and <a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a> place it as less active than over half of nearby M7–M9 dwarfs, while stressing it &quot;remains an active star&quot; at 7.6 Gyr. Hα emission sits at log L_Hα/L_bol = −4.85 to −4.60; the XMM X-ray detection (<a href=\"https://arxiv.org/abs/1605.01564\">Wheatley 2017</a>) gives Lx/Lbol = 2–4×10⁻⁴ (log −3.52 ± 0.17) with a soft two-temperature corona (kT = 0.15 and 0.83 keV) — proportionally <i>solar-flare-level</i> X-ray heating on a star 2000× fainter, which is why the planets&#x27; radiation environment is severe even though the star is dim.",
  "p_96":"<b>The flare story is the load-bearing synthesis.</b> Three strands reconcile as follows:",
  "li_97":"<b>Rates.</b> K2 gave 42 flares in 74 days (median wait 28.1 h, <a href=\"https://arxiv.org/abs/1703.10130\">Vida 2017</a>). The 2026 joint JWST+K2 flare-frequency distribution (<a href=\"https://arxiv.org/abs/2605.05468\">Vasilyev 2026</a>) is a single power law (cumulative slope β = 0.753) across 10²⁹–10³³ erg: ~10³⁰-erg flares ~1000 times a year, and &gt;10³² erg superflares every ~25 days — ten times more often than pre-2026 estimates. The cfg adopts the 2026 law; Vida&#x27;s shallower β ≈ 0.59 and Paudel&#x27;s 0.6 were energy-range-limited fits now subsumed by it.",
  "li_98":"<b>Temperature (the color).</b> The H₂ thermostat (<a href=\"https://arxiv.org/abs/2601.00386\">Shapiro 2026</a>): heating the cool dense photosphere dissociates H₂, which soaks energy and caps flare regions near 4000 K. White-light flares run 3500–4000 K, briefly ~5000 K in the impulsive phase, settling to 3000–3500 K for tens of minutes. <a href=\"https://arxiv.org/abs/2512.04265\">Howard 2025</a> independently fit JWST flares with RADYN models at 2115–4010 K effective temperatures (filling factors 0.03–0.51%). The classic 9000–10000 K flare blackbody is a <i>solar</i> paradigm that does not operate below ~4000 K stellar Teff.",
  "li_99":"<b>The UV exception.</b> In the far-UV, <a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a> find sub-hour ~10²⁹-erg microflares with ~11000 K color temperature over a tiny ~0.011% of the disk — 400% amplitude in Lyα versus ~3–4% in the optical. Hot flare <i>cores</i> exist, but they are FUV-bright pinpoints; the visible-band event remains the warm 3500–4000 K brightening.",
  "p_100":"<b>XUV budget spread (recorded, not resolved).</b> <a href=\"https://arxiv.org/abs/1605.01564\">Wheatley 2017</a> bracket L_XUV/L_bol = 6–9×10⁻⁴ (~1.2–1.8×10²⁷ erg/s); <a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a> reconstruct 1.83×10²⁸ erg/s from Lyα — 30× the 2017-era value they quote (6.28×10²⁶), and ~5× above Howard&#x27;s adopted quiescent 3.75×10²⁷ (Wilson 2021). The Decisions table carries only the solid X-ray row; the XUV spread is an open item for the radiation-environment layer.",
  "h2_101":"Rotation &amp; spin synthesis",
  "p_102":"The 3.295 ± 0.003 d K2 period (<a href=\"https://arxiv.org/abs/1703.10130\">Vida 2017</a>) is secure and independently recovered in HST photometry at 3.27 ± 0.04 d (<a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a>); the older ground-based 1.40 d value (Gillon 2016, echoed in Wheatley 2017) is superseded. An honest tension remains on the spectroscopic side: v sin i = 6 ± 2 km/s (Reiners &amp; Basri 2010) would imply P_rot ≈ 0.99 d (0.74–1.48 d) at this radius — it was the 1.40 d value, not 3.295 d, that matched it — while the equatorial velocity at 3.295 d is only ~1.8 km/s. Vida et al. note the K2 Fourier spectrum shows no significant ~1 d feature, so the cfg adopts the twice-confirmed photometric period and leaves the v sin i discrepancy to the literature.",
  "p_103":"<b>Figure.</b> Fast spin on a small dense star gives q = Ω²R³/GM = 2.33×10⁻⁵; the fully convective Radau–Darwin branch (polytropic NMoI 0.205, J₂/q = 0.084) yields <b>J₂ ≈ 2.0×10⁻⁶</b> — ~500× Proxima&#x27;s (83.5-d spin) and edging out 40 Eri C&#x27;s fast-spun 1.6×10⁻⁶ as the roster&#x27;s largest M-dwarf J₂ (Fomalhaut A&#x27;s 1.0×10⁻⁴ still dominates overall). Dynamically it stays negligible even for planet b at 21 stellar radii (GR precession dominates), but per the 2026-07-12 always-emit policy the term is computed and Principia carries it. Visual oblateness f ≈ 1.5×10⁻⁵ — unrenderable, the disk stays round.",
  "p_104":"At 7.6 Gyr with a ~4 Gyr saturation spin-down knee (Fleming 2020, via <a href=\"https://arxiv.org/abs/2512.04265\">Howard 2025</a>), the star has left saturation yet still spins in days — ultracool dwarfs brake extraordinarily slowly, which is why an old star still delivers a young star&#x27;s flare schedule.",
  "h2_105":"Visual styling",
  "li_106":"<b>Photospheric tint <span class=\"hex-chip\" style=\"background:#ffcc70\"></span><code>#ffcc70</code></b> — from the Pickles real-SED ladder (<code>scripts/refs/stellar_photospheric_color.py</code>); 2566 K lies below the coolest Pickles M anchor, so the chromaticity clamps at the ladder floor. Per the color methodology this is a pale warm orange: the &quot;brick-red M dwarf&quot; trope is a color-index artifact, not a chromaticity. The 2566 K blackbody hex <span class=\"hex-chip\" style=\"background:#ffa94f\"></span><code>#ffa94f</code> is the lower bound if a redder art direction is ever wanted — the Pickles value is the data-grounded pick.",
  "li_107":"<b>Low-contrast mottling, not black spots.</b> Spot dapples at ~2350–2550 K against 2566 K: darken the tint locally by a few percent and pull faintly redward; individual features sub-percent to ~1.5% of the disk. Drift them with the 3.295-d rotation.",
  "li_108":"<b>Flares are warm orange, frequent, and small-area.</b> Render flare color at 3500–4000 K (≈ K-dwarf photosphere warmth — <span class=\"hex-chip\" style=\"background:#ffcc95\"></span><code>#ffcc95</code> territory per the same ladder), filling factors well under 1% of the disk, amplitudes a few percent in the optical. A &gt;10³²-erg superflare every ~25 game-days is the marquee event; ~daily lesser flares keep the star visibly alive. Never render blue-white solar-style flares on this star.",
  "li_109":"<b>In-sky presence.</b> From planet e (0.029 AU) the star spans ~2.4° — four to five Suns wide — a huge dim amber disk whose mottle and flares are directly visible scenery, which is why the low-contrast-spot and warm-flare rows above are gameplay-facing, not trivia.",
  "li_110":"<b>Firefly note.</b> Flare color here is <i>stellar surface</i> rendering, not reentry plasma — the Firefly composition-color policy (mod-original palette) is unaffected; this row feeds the star&#x27;s own emissive layer.",
  "h2_111":"Bibliography",
  "h3_112":"Read (deep-read, drives Decisions rows)",
  "li_113":"<b><a href=\"https://arxiv.org/abs/2010.01074\">Agol et al. 2021</a></b> — <i>Refining the transit timing and photometric analysis of TRAPPIST-1</i>. Mass/radius/Teff anchors (Phase 2 recommended rows). Cache note: local text is abstract-only; numeric rows rest on the Phase 2 curation (paper-verified) and the 2566 K prior restated in Radica 2024 §3.",
  "li_114":"<b><a href=\"https://arxiv.org/abs/1712.01911\">Van Grootel et al. 2018</a></b> — <i>Stellar parameters for TRAPPIST-1</i>. Bolometric luminosity 5.22×10⁻⁴ L☉; density 51.1 ρ☉; 600 G field restatement; &quot;low-activity M8&quot; characterization.",
  "li_115":"<b><a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a></b> — <i>On the Age of the TRAPPIST-1 System</i>. 7.6 ± 2.2 Gyr concordance age; Table 1 activity compendium (Hα, X-ray, v sin i); 8–14% radius inflation; &quot;old but active&quot; framing.",
  "li_116":"<b><a href=\"https://arxiv.org/abs/1703.10130\">Vida et al. 2017</a></b> — K2 flare survey: 42 flares/74 d, 3.295 d rotation, energy range 1.26×10³⁰–1.24×10³³ erg, no spot-phase correlation.",
  "li_117":"<b><a href=\"https://arxiv.org/abs/1605.01564\">Wheatley et al. 2017</a></b> — XMM-Newton X-ray detection: Lx/Lbol 2–4×10⁻⁴, two-temperature corona, XUV/bol 6–9×10⁻⁴.",
  "li_118":"<b><a href=\"https://arxiv.org/abs/2508.04793\">Vasilyev et al. 2025</a></b> — flares reveal magnetic-feature spectra: vanished features at 2350–2550 K, per-feature 0.06–1.5% of disk; MURaM M4 spot contrast.",
  "li_119":"<b><a href=\"https://arxiv.org/abs/2601.00386\">Shapiro et al. 2026</a></b> — the H₂ flare thermostat: white-light flares capped at ~3500–4000 K, ~1000/yr above 10³⁰ erg; mechanism ceases above ~4000 K Teff.",
  "li_120":"<b><a href=\"https://arxiv.org/abs/2605.05468\">Vasilyev et al. 2026</a></b> — single power-law FFD (β = 0.753) over four energy decades; superflares every 25 d; adopts 3500 K flare continuum.",
  "li_121":"<b><a href=\"https://arxiv.org/abs/2506.12140\">Berardo et al. 2025</a></b> — HST Lyα: frequent FUV microflares (11000 K, 0.011% of disk), rotation confirmation, XUV reconstruction 1.83×10²⁸ erg/s.",
  "li_122":"<b><a href=\"https://arxiv.org/abs/2409.19333\">Radica et al. 2024</a></b> — JWST NIRISS stellar contamination: spot-dominated retrievals, 100–500 ppm signatures, 2566 ± 50 K photosphere prior, spot grid floor 2300 K / faculae ≤ +1000 K.",
  "li_123":"<b><a href=\"https://arxiv.org/abs/2512.04265\">Howard et al. 2025</a></b> — RADYN NIR flare modeling: fiducial flare Teff 2115–4010 K with 0.03–0.51% filling factors; flares contaminate 50–70% of JWST transits.",
  "h3_124":"Context (cited through the read set; not deep-read here)",
  "li_125":"<b><a href=\"https://ui.adsabs.harvard.edu/abs/2016Natur.533..221G\">Gillon et al. 2016</a></b> / <b><a href=\"https://ui.adsabs.harvard.edu/abs/2017Natur.542..456G\">Gillon et al. 2017</a></b> — discovery papers; first stellar parameters and the superseded 1.40 d rotation alias; [Fe/H] source.",
  "li_126":"<b><a href=\"https://ui.adsabs.harvard.edu/abs/2017NatAs...1E.129L\">Luger et al. 2017</a></b> — K2 seven-planet paper; spot confirmation and the 3.3 d period the contamination literature cites.",
  "li_127":"<b>Reiners &amp; Basri 2010</b> — 600 G magnetic field and v sin i = 6 ± 2 km/s, quoted by Van Grootel 2018 and Wheatley 2017.",
  "li_128":"<b>Wilson et al. 2021</b> — quiescent XUV 3.75×10²⁷ erg/s used by Howard 2025 (one leg of the XUV spread).",
  "li_129":"<b>Fleming et al. 2020</b> — the ~4 Gyr saturation knee for ultracool spin-down.",
  "h3_130":"Not read — superseded or out of scope",
  "li_131":"Stassun 2019 / Ducrot 2020 / Grimm 2018 stellar rows — earlier or wider-error parameter sets, superseded by Agol 2021 in Phase 2.",
  "li_132":"Planet-focused atmosphere/escape papers in the system bibliography — consumed by the seven per-planet syntheses, not the host report.",
  "h2_133":"Open items for follow-up",
  "li_134":"<b>Agol 2021 cache is abstract-only.</b> The recommended M/R/Teff rows are Phase 2-verified, but a full-text re-fetch of <a href=\"https://arxiv.org/abs/2010.01074\">2010.01074</a> would let this report&#x27;s Step 10 trace land on the paper&#x27;s own tables rather than the curation layer + Radica&#x27;s restatement.",
  "li_135":"<b>XUV budget spread (×10).</b> Wheatley-band ~1.2–1.8×10²⁷ vs Berardo Lyα-reconstructed 1.83×10²⁸ erg/s. If the Kerbalism radiation layer is ever re-anchored for TRAPPIST-1, resolve this spread first (definition differences — X-ray+EUV band vs Lyα-scaled total — likely explain most of it).",
  "li_136":"<b>No stellar wind measurement.</b> The 2026-06-11 stellar-wind synthesis pass skipped TRAPPIST-1 for lack of mass-loss or astrosphere data — hence no wind/astrosphere section here. MHD wind-planet coupling papers exist in the system bib (simulation only); revisit if an observational constraint appears.",
  "li_137":"<b>Spot covering fraction is per-feature, not global.</b> Vasilyev 2025 measures individual vanished features (0.06–1.5% of disk); the global spot fraction remains retrieval-degenerate (Radica&#x27;s 0–50% prior). The low-contrast rendering rule is robust to this; a global fraction row is not currently supportable.",
  "li_138":"<b>Activity cycle unknown.</b> No cycle period exists for TRAPPIST-1 (flare monitoring baselines are too short); no <code>activity_cycle_years</code> row is emitted, unlike α Cen A/B.",

  ko: {
  "p_1":"TRAPPIST-1 은 NearStars 로스터의 초저온 앵커입니다. 12.467 pc 거리의 M8.0 V 왜성으로, 질량 0.0898 M☉ 로 수소 연소 한계 바로 위에 아슬아슬 하게 걸쳐 있으며, 반지름은 0.1192 R☉ — 목성만 한 크기의 별이 0.07 AU 안쪽에 통과하는 암석 행성 일곱 개를 거느립니다. 태양은 이 별보다 대략 2000 배 밝습니다. L = 5.22×10⁻⁴ L☉, Teff = 2566 K 에서 광구는 촛불 불꽃 바깥 껍질 온도에 놓이는데, 분자 화학 (TiO, VO, H₂O — 그리고 결정적으로 H₂) 이 스펙트럼은 물론 밝혀진 대로 플레어까지 좌우할 만큼 차갑습니다.",
  "p_2":"이 별의 물리 파라미터는 어떤 M 왜성보다도 잘 측정된 축에 듭니다. 행성 일곱 개가 통과하기 때문입니다. <a href=\"https://arxiv.org/abs/2010.01074\">Agol et al. 2021</a> (통과 시각 측정 + 광역학) 이 질량, 반지름, Teff 를 고정하고, <a href=\"https://arxiv.org/abs/1712.01911\">Van Grootel et al. 2018</a> 이 볼로메트릭 광도를 앵커링하며, <a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a> 이 7.6 ± 2.2 Gyr 의 concordance 나이를 줍니다 — 운동학과 활동도가 일치하는 <i>늙은</i> 별이면서도 여전히 자기적으로 활발합니다. 평균 밀도는 ~51 ρ☉ 로, NearStars 모든 중심별 중 가장 높습니다.",
  "p_3":"최근 두 결과가 이 별의 기본 아트 디렉션을 뒤집으며, 둘 다 cfg 에 반영됩니다. <b>첫째, 이 별의 플레어는 차갑습니다.</b> <a href=\"https://arxiv.org/abs/2601.00386\">Shapiro et al. 2026</a> 은 밀도 높고 차가운 광구에서 분자 수소 해리가 서모스탯 역할을 하여 백색광 플레어를 ~3500–4000 K 에서 상한을 걸어 버림을 보였습니다 — 모든 범용 렌더러가 가정하는 9000–10000 K 태양 플레어 흑체보다 거의 세 배 차갑습니다. TRAPPIST-1 의 플레어는 청백색 섬광이 아니라 따뜻한 오렌지빛 밝아짐입 니다. <b>둘째, 이 별의 반점은 저대비입니다.</b> <a href=\"https://arxiv.org/abs/2508.04793\">Vasilyev et al. 2025</a> 는 2350–2550 K 에서 사라지는 자기 피처를 측정했는데 — 2566 K 광구보다 겨우 수백 켈빈 낮을 뿐이라 — 표면은 검게 반점 박힌 디스크가 아니라 은은한 얼룩무늬 입니다.",
  "p_4":"<b>NearStars 시나리오 선택. 깊은 오렌지빛에 은은하게 얼룩진 초저온 왜성 (<span class=\"hex-chip\" style=\"background:#ffcc70\"></span><code>#ffcc70</code> 광구 색조) 으로, 따뜻한 오렌지 플레어가 잦게 일어나는 모습 으로 렌더링합니다 — 25 일마다 3500–4000 K 플레어 색의 슈퍼플레어 케이던스, 저대비 반점 얼룩, 그리고 얼룩무늬를 디스크 위로 눈에 띄게 실어 나르는 빠른 3.295 일 자전.</b>",

  "td_84":"medium",
  "td_85":"<code>stellar_photospheric_color.py</code> 를 통한 Pickles real-SED M 사다리. 2566 K 는 가장 차가운 앵커에서 clamp — 벽돌빛 붉은색이 아닌 옅은 따뜻한 오렌지 (Visual styling 참고)",

  "td_88":"medium",
  "td_89":"빠른 3.295-d 자전에서 나온 q = 2.33×10⁻⁵ 에 Radau–Darwin 폴리트로프 분기 (NMoI 0.205, J₂/q = 0.084). 상시-emit 항성 J₂ 정책에 따름 (<a href=\"../wiki/reference__body-figure-methodology.html\">body-figure-methodology</a>)",
  "h2_90":"Surface synthesis",
  "p_91":"광구는 2566 K 분자 대기입니다 — TiO/VO 밴드가 광학 플럭스를, H₂O 가 근적외선을 게이트하는데, 광구 색 파이프라인이 흑체 대신 실제 Pickles SED 를 쓰는 이유가 여기 있습니다 (2566 K 흑체는 <span class=\"hex-chip\" style=\"background:#ffa94f\"></span><code>#ffa94f</code> 로 렌더되어 밴드 구조를 반영한 실제값보다 눈에 띄게 붉습니다). 이 별은 또한 측정 가능한 수준으로 <i>팽창</i>해 있습니다. <a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a> 은 반지름이 태양 금속도 진화 모델보다 8–14% 크다고 지적하는데, 활동적 M 왜성에서 자기장이 대류를 억제하는 전형적 신호입니다.",
  "p_92":"<b>반점은 존재하지만 대비가 은은합니다.</b> Kepler/K2 는 차갑고 안정한 반점을 확인했으며 (Luger 2017; Vida 2017), 행성들의 JWST 투과 스펙트럼은 반점 지배적 비균질 광구 때문에 100–500 ppm 수준으로 오염됩니다 (<a href=\"https://arxiv.org/abs/2409.19333\">Radica 2024</a>). 가장 좋은 직접 온도 측정은 <a href=\"https://arxiv.org/abs/2508.04793\">Vasilyev et al. 2025</a> 에서 나오는데, 이들은 플레어 동안 개별 자기 피처가 사라지는 것을 관측했습니다. 피처는 2350–2550 K 로 fit 되어 — 기껏해야 수백 켈빈의 대비이며, 피처당 투영 면적은 가시 디스크의 0.06% (완전히 검을 경우) 부터 1.5% (반영 유사 일 경우) 입니다. 렌더링 귀결은 <i>얼룩진</i> 디스크입니다. 3.295 일 자전과 함께 떠도는, 살짝 더 어둡고 살짝 더 붉은 패치이지, 고전적 반점 항성 텍스처의 딱딱한 검은 모반이 결코 아닙니다.",
  "p_93":"<b>반점–플레어 지오메트리 상관 없음.</b> Vida et al. 2017 은 모든 자전 위상에서 플레어를 발견했고, 광도 곡선 최소점을 약하게만 선호했습니다 — 따라서 렌더러의 플레어 배치는 반점 패턴을 따라갈 필요가 없습니다.",
  "h2_94":"Atmosphere synthesis",
  "p_95":"색채권과 코로나는 활동적이지만 후기 M 플레어성 기준으로는 온건합니다 — <a href=\"https://arxiv.org/abs/1712.01911\">Van Grootel 2018</a> 은 이를 &quot;저활동 M8&quot; 로 부르고, <a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a> 은 인근 M7–M9 왜성 절반 이상보다 덜 활동적이라 자리매김하면서도 7.6 Gyr 에도 &quot;여전히 활동적인 별로 남아 있다&quot; 고 강조합니다. Hα 방출은 log L_Hα/L_bol = −4.85 to −4.60 에 놓이며, XMM X 선 검출 (<a href=\"https://arxiv.org/abs/1605.01564\">Wheatley 2017</a>) 은 부드러운 2온도 코로나 (kT = 0.15, 0.83 keV) 와 함께 Lx/Lbol = 2–4×10⁻⁴ (log −3.52 ± 0.17) 를 줍니다 — 2000 배 어두운 별인데도 비율로는 <i>태양 플레어 수준</i> 의 X 선 가열이라, 별이 어둠에도 행성들의 방사선 환경이 가혹한 이유입니다.",
  "p_96":"<b>플레어 이야기가 이 합성의 하중을 지탱합니다.</b> 세 갈래가 다음처럼 화해합니다.",
  "li_97":"<b>빈도.</b> K2 는 74 일에 42 개 플레어를 주었습니다 (중앙 대기 28.1 h, <a href=\"https://arxiv.org/abs/1703.10130\">Vida 2017</a>). 2026 년 JWST+K2 통합 플레어 빈도 분포 (<a href=\"https://arxiv.org/abs/2605.05468\">Vasilyev 2026</a>) 는 10²⁹–10³³ erg 전 구간에 걸친 단일 멱법칙 (누적 기울기 β = 0.753) 입니다 — ~10³⁰-erg 플레어가 연 ~1000 회, &gt;10³² erg 슈퍼플레어가 ~25 일마다 — 2026 년 이전 추정보다 열 배 더 잦습니다. cfg 는 2026 년 법칙을 채택하며, Vida 의 더 완만한 β ≈ 0.59 와 Paudel 의 0.6 은 에너지 구간이 제한된 fit 으로 이제 여기에 포섭됩니다.",
  "li_98":"<b>온도 (색).</b> H₂ 서모스탯 (<a href=\"https://arxiv.org/abs/2601.00386\">Shapiro 2026</a>). 차갑고 밀도 높은 광구를 가열하면 H₂ 가 해리되어 에너지를 흡수하고 플레어 영역을 4000 K 근처에서 상한합니다. 백색광 플레어는 3500–4000 K, 충격 단계에서 잠깐 ~5000 K 를 찍고, 수십 분 동안 3000–3500 K 로 가라앉습니다. <a href=\"https://arxiv.org/abs/2512.04265\">Howard 2025</a> 는 JWST 플레어를 RADYN 모델로 2115–4010 K 유효 온도 (filling factor 0.03–0.51%) 에서 독립적으로 fit 했습니다. 고전적 9000–10000 K 플레어 흑체는 ~4000 K 항성 Teff 아래에서는 작동하지 않는 <i>태양</i> 패러다임입니다.",
  "li_99":"<b>UV 예외.</b> 원자외선에서 <a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a> 는 디스크의 극히 작은 ~0.011% 에서 ~11000 K 색온도의 시간 미만 ~10²⁹-erg 마이크로 플레어를 발견합니다 — 광학의 ~3–4% 대비 Lyα 에서 400% 진폭입니다. 뜨거운 플레어 <i>코어</i> 는 존재하지만 FUV 로 밝은 점일 뿐이며, 가시 밴드 이벤트는 따뜻한 3500–4000 K 밝아짐으로 남습니다.",
  "p_100":"<b>XUV 예산 폭 (기록, 미해결).</b> <a href=\"https://arxiv.org/abs/1605.01564\">Wheatley 2017</a> 은 L_XUV/L_bol = 6–9×10⁻⁴ (~1.2–1.8×10²⁷ erg/s) 로 범위를 잡습니다. <a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a> 는 Lyα 로부터 1.83×10²⁸ erg/s 를 재구성하는데 — 이들이 인용하는 2017 년대 값 (6.28×10²⁶) 의 30 배이자, Howard 가 채택한 정상상태 3.75×10²⁷ (Wilson 2021) 의 ~5 배입니다. Decisions 표는 견고한 X 선 행만 담으며, XUV 폭은 방사선 환경 레이어의 미해결 항목입니다.",
  "h2_101":"Rotation &amp; spin synthesis",
  "p_102":"3.295 ± 0.003 d K2 주기 (<a href=\"https://arxiv.org/abs/1703.10130\">Vida 2017</a>) 는 확실하며 HST 광도에서 3.27 ± 0.04 d 로 독립 재확인됩니다 (<a href=\"https://arxiv.org/abs/2506.12140\">Berardo 2025</a>). 더 오래된 지상 관측 1.40 d 값 (Gillon 2016, Wheatley 2017 에서 반복) 은 대체됐습니다. 다만 분광 쪽에는 솔직한 긴장이 남아 있습니다. v sin i = 6 ± 2 km/s (Reiners &amp; Basri 2010) 는 이 반지름에서 P_rot ≈ 0.99 d (0.74–1.48 d) 를 함의하므로 — v sin i 와 맞았던 건 3.295 d 가 아니라 그 1.40 d 값이었고 — 3.295 d 에서의 적도 속도는 ~1.8 km/s 에 불과합니다. Vida 등은 K2 푸리에 스펙트럼에 유의미한 ~1 d 피처가 전혀 없다고 지적하며, cfg 는 두 번 확인된 측광 주기를 채택하고 v sin i 불일치는 문헌의 몫으로 남겨 둡니다.",
  "p_103":"<b>Figure.</b> 작고 밀도 높은 별의 빠른 자전은 q = Ω²R³/GM = 2.33×10⁻⁵ 를 줍니다. 완전 대류 Radau–Darwin 분기 (폴리트로프 NMoI 0.205, J₂/q = 0.084) 는 <b>J₂ ≈ 2.0×10⁻⁶</b> 를 내놓는데 — Proxima (83.5-d 자전) 의 ~500 배이며 40 Eri C 의 빠른 자전 1.6×10⁻⁶ 를 근소하게 앞질러 로스터 최대 M 왜성 J₂ 가 됩니다 (전체로는 Fomalhaut A 의 1.0×10⁻⁴ 가 여전히 지배적). 역학적으로는 21 항성 반지름에 있는 행성 b 에도 무시할 만하지만 (GR 세차가 지배), 2026-07-12 상시-emit 정책에 따라 항은 계산되어 Principia 가 실어 나릅니다. 시각적 편평도 f ≈ 1.5×10⁻⁵ — 렌더 불가능이며, 디스크는 둥글게 유지됩니다.",
  "p_104":"7.6 Gyr 에서 ~4 Gyr 포화 spin-down 무릎 (Fleming 2020, <a href=\"https://arxiv.org/abs/2512.04265\">Howard 2025</a> 경유) 과 함께, 이 별은 포화를 벗어났으면서도 여전히 며칠 단위로 자전합니다 — 초저온 왜성은 극도로 느리게 제동되며, 이것이 늙은 별이 여전히 젊은 별의 플레어 스케줄을 내놓는 이유입니다.",
  "h2_105":"Visual styling",
  "li_106":"<b>광구 색조 <span class=\"hex-chip\" style=\"background:#ffcc70\"></span><code>#ffcc70</code></b> — Pickles real-SED 사다리에서 나옵니다 (<code>scripts/refs/stellar_photospheric_color.py</code>). 2566 K 는 가장 차가운 Pickles M 앵커 아래에 있어 색도가 사다리 바닥에서 clamp 됩니다. 색 방법론에 따르면 이는 옅은 따뜻한 오렌지입니다. &quot;벽돌빛 붉은 M 왜성&quot; 통념은 색지수 아티팩트일 뿐 색도가 아닙니다. 더 붉은 아트 디렉션이 원한다면 2566 K 흑체 hex <span class=\"hex-chip\" style=\"background:#ffa94f\"></span><code>#ffa94f</code> 가 하한이며 — Pickles 값이 데이터 기반의 선택입니다.",
  "li_107":"<b>검은 반점이 아닌 저대비 얼룩.</b> 2566 K 대비 ~2350–2550 K 반점 얼룩. 색조를 국소적으로 몇 퍼센트 어둡게 하고 살짝 붉게 당깁니다. 개별 피처는 디스크의 1% 미만부터 ~1.5% 까지. 3.295-d 자전과 함께 떠돌게 합니다.",
  "li_108":"<b>플레어는 따뜻한 오렌지, 잦고, 소면적.</b> 플레어 색을 3500–4000 K 로 렌더 (≈ K 왜성 광구 따뜻함 — 같은 사다리에서 <span class=\"hex-chip\" style=\"background:#ffcc95\"></span><code>#ffcc95</code> 영역), filling factor 는 디스크의 1% 훨씬 아래, 진폭은 광학에서 수 퍼센트. ~25 게임일 마다의 &gt;10³²-erg 슈퍼플레어가 대표 이벤트이며, ~매일의 작은 플레어가 별을 눈에 띄게 살아 있게 유지합니다. 이 별에는 청백색 태양식 플레어를 결코 렌더하지 마십시오.",
  "li_109":"<b>하늘에서의 존재감.</b> 행성 e (0.029 AU) 에서 별은 ~2.4° 를 채웁니다 — 태양 네댓 개 폭의 — 얼룩과 플레어가 직접 보이는 풍경이 되는 거대하고 어두운 호박색 디스크이며, 위의 저대비 반점과 따뜻한 플레어 행이 잡학이 아니라 게임플레이 대면 요소인 이유입니다.",
  "li_110":"<b>Firefly 노트.</b> 여기서 플레어 색은 재진입 플라스마가 아니라 <i>항성 표면</i> 렌더링입니다 — Firefly 조성 색 정책 (모드 원본 팔레트) 은 영향받지 않으며, 이 행은 별 자체의 emissive 레이어를 먹입니다.",
  "h2_111":"Bibliography",
  "h3_112":"Read (deep-read, drives Decisions rows)",
  "li_113":"<b><a href=\"https://arxiv.org/abs/2010.01074\">Agol et al. 2021</a></b> — <i>Refining the transit timing and photometric analysis of TRAPPIST-1</i>. 질량/반지름/Teff 앵커 (Phase 2 recommended 행). 캐시 노트: 로컬 텍스트는 abstract 전용이라, 수치 행은 Phase 2 큐레이션 (논문 검증) 과 Radica 2024 §3 에서 재진술된 2566 K prior 에 근거합니다.",
  "li_114":"<b><a href=\"https://arxiv.org/abs/1712.01911\">Van Grootel et al. 2018</a></b> — <i>Stellar parameters for TRAPPIST-1</i>. 볼로메트릭 광도 5.22×10⁻⁴ L☉. 밀도 51.1 ρ☉. 600 G 자기장 재진술. &quot;저활동 M8&quot; 특성화.",
  "li_115":"<b><a href=\"https://arxiv.org/abs/1706.02018\">Burgasser &amp; Mamajek 2017</a></b> — <i>On the Age of the TRAPPIST-1 System</i>. 7.6 ± 2.2 Gyr concordance 나이. Table 1 활동도 개요 (Hα, X 선, v sin i). 8–14% 반지름 팽창. &quot;늙었지만 활동적&quot; 틀.",
  "li_116":"<b><a href=\"https://arxiv.org/abs/1703.10130\">Vida et al. 2017</a></b> — K2 플레어 서베이: 74 d 에 42 플레어, 3.295 d 자전, 에너지 범위 1.26×10³⁰–1.24×10³³ erg, 반점 위상 상관 없음.",
  "li_117":"<b><a href=\"https://arxiv.org/abs/1605.01564\">Wheatley et al. 2017</a></b> — XMM-Newton X 선 검출: Lx/Lbol 2–4×10⁻⁴, 2온도 코로나, XUV/bol 6–9×10⁻⁴.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
