  "h2_109":"Surface synthesis",
  "p_110":"The photosphere of TRAPPIST-1 is the smallest and coldest of any NearStars target star with a confirmed planetary system. The visible disk emits at T_eff = 2566 K (Agol 2021), with the spectral energy distribution heavily depressed shortward of 6500 Å by molecular TiO and VO opacity — most of the radiated flux emerges in the 1–3 μm range (Wilson 2021 Mega-MUSCLES). The bolometric luminosity is just 5.22 × 10⁻⁴ L☉ (Van Grootel 2018), about 1/1900 of Sol.",
  "p_111":"<b>Color choice.</b> The blackbody chromaticity for 2566 K places the human-perceived color in the deep orange-red, near <span class=\"hex-chip\" style=\"background:#ff5520\"></span><code>#ff5520</code>, with the band-suppression effect on the bluer continuum biasing the visual signature even further into the red. Compared to the Proxima Centauri tint <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> (2980 K), TRAPPIST-1 is darker and more saturated. From any habitable-zone planet — e and f at 0.029 and 0.038 AU — the star fills 1.8–2.5° angular diameter, several times the Sun&#x27;s apparent diameter from Earth.",
  "p_112":"<b>Photospheric inflation.</b> TRAPPIST-1&#x27;s measured stellar density (51 ρ☉, Delrez via Van Grootel 2018) is lower than solar-metallicity evolutionary models predict for a 0.089 M☉, 7.6 Gyr star. The radius appears inflated by 8–14% relative to the BHAC15 / CLES isochrone predictions (Burgasser 2017, Van Grootel 2018). Two interpretations remain viable: enhanced metallicity (perhaps approaching [Fe/H] = +0.40) that inflates the envelope via increased opacity, and magnetic-activity inflation through suppressed convective transport. Gonzales 2019 adds a third hypothesis — tidal forcing from the seven planets keeping the star&#x27;s outer layers slightly inflated. None of these can be definitively distinguished with current data; for cfg purposes the adopted R = 0.1192 R☉ (Agol 2021) is well-measured directly from transit duration + TTV-derived M, regardless of the inflation mechanism.",
  "p_113":"<b>Surface features.</b> TRAPPIST-1&#x27;s spotted surface is one of the most contested topics in its activity literature, with two viable interpretations. Roettenbacher &amp; Kane 2017 model the 3.3-day K2 variability with cool dark spots at T_spot ≈ 2200 K, comparable in contrast to typical mid-M dwarfs. This model explains the K2 light curve but predicts comparable variability at Spitzer 4.5 μm, which is not observed (the Spitzer epoch instead shows a 0.819-day period suggestive of evolved active regions). Morris 2018a explains the wavelength-dependent observations with three bright spots at T_spot ≳ 5300 K and tiny areal extent (R_spot / R* ≈ 0.004 each). These hot patches dominate the Kepler bandpass where the photospheric emission is heavily suppressed by molecular bands, but contribute negligibly at 4.5 μm where the photospheric Planck function dominates. Vasilyev 2025 adds JWST/NIRISS evidence for cool magnetic features — &quot;at most a few hundred K below the photosphere&quot; — that occasionally disappear during flares.",
  "p_114":"For the NearStars cfg, the bright-spot picture is adopted as the visual primary because it (a) explains the wavelength-dependent photometric signatures self-consistently, (b) offers a visually distinctive feature against the otherwise uniform red disk, and (c) matches the post-flare brightening that Vasilyev 2025 attributes to magnetic-feature disappearance. The dark-spot interpretation is preserved as a cfg variant in Open items. Realistically, both populations probably coexist on the disk.",
  "h2_115":"Atmosphere synthesis",
  "p_116":"TRAPPIST-1&#x27;s stellar atmosphere — chromosphere, transition region, corona — is characterized by Bourrier 2017 (Ly-α), Wheatley 2017 (X-ray), and Wilson 2021 (full UV-to-X-ray SED via the Mega-MUSCLES program). The defining tension is that the X-ray luminosity is comparable to Proxima Centauri&#x27;s (log L_X cgs = 26.6– 26.9 vs. Proxima&#x27;s quiescent ≈ 27.0), but the Ly-α line emission is roughly three times weaker than predicted from the L_X → L_Lyα relation calibrated on warmer M dwarfs. Bourrier 2017 interprets this as evidence that TRAPPIST-1&#x27;s chromosphere is moderately active while its corona retains warmer-M-dwarf flux levels — consistent with the late M-dwarf trend toward decoupling of the cooler atmospheric layers from the hot corona.",
  "p_117":"<b>Chromospheric activity.</b> log L_Hα / L_bol = −4.85 to −4.60 (Burgasser 2017 collation across multiple epochs). This places TRAPPIST-1 in the moderate-activity bracket for M8 V — neither the extremely quiet inactive M8 dwarfs nor the saturated-emission rapid rotators. Equivalent width measurements span 2.3–7.7 Å of Hα emission (Reiners &amp; Basri 2010 / Schmidt 2007 / Burgasser 2015), with the variation likely tracking either rotational modulation or the spot- filling-fraction evolution that Roettenbacher 2017 documents.",
  "p_118":"<b>Coronal X-rays.</b> XMM-Newton observed TRAPPIST-1 for 30 ks in December 2014 (Wheatley 2017), revealing a soft, two-temperature APEC plasma at kT = 0.15 and 0.83 keV. Variability over the 7.8 hr observation is statistically significant — likely a combination of rotational modulation (covering ~23% of the then-assumed 1.4-day period) and possible small flares. log L_X / L_bol = (2–4) × 10⁻⁴ puts the star in the saturated regime (Rossby number &lt;&lt; 0.1; per Roettenbacher 2017 §3.2). The integrated XUV luminosity is log L_XUV / L_bol = (6–9) × 10⁻⁴, sufficient to drive hydrodynamic mass loss from all seven planets (Bourrier 2017 calculations: total escape rates from 13–46 ton/s scaled across the planets).",
  "p_119":"<b>Flares and the saturated-activity regime.</b> Vida 2017 catalogued 42 K2 flares spanning 1.26 × 10³⁰ to 1.24 × 10³³ erg over the K2 Campaign 12 baseline of ~80 days, giving a flare rate of approximately 0.5/day above 10³⁰ erg. Cumulative-FFD analysis by Glazier 2020 extends the distribution to superflares using two years of Evryscope ground-based photometry, finding a rate of 4.2 +1.9/−0.2 superflares (≥10³³ erg) per year — moderate by ultracool dwarf standards, low enough that ozone-shielded habitable-zone atmospheres (if present) could recover between events. Howard 2025 applied RADYN radiative- hydrodynamic beam-heating models to six JWST-observed flares (2.2–8.7 × 10³⁰ erg) and found relatively weak electron beams (F_e = 10¹² erg/s/cm², E_cutoff ≤ 37 keV) compared to typical M-dwarf flares — consistent with the lower-than-expected optical flare temperatures noted by Maas 2022 and Howard 2023. Cumulatively, flares contribute ~1.35 +2.0/−0.15 × the quiescent XUV emission integrated over a year, so over the system&#x27;s 7.6 Gyr the flaring component has roughly doubled the total XUV irradiation history at the planets relative to a non-flaring star of the same quiescent luminosity.",
  "p_120":"<b>Magnetic field and dynamo.</b> Reiners &amp; Basri 2010 measured a mean Zeeman-broadened magnetic field of approximately 600 G from FeH absorption lines — weaker than the mid-M average of 1.6 ± 0.9 kG. TRAPPIST-1 is fully convective (M &lt; 0.35 M☉), so the dynamo is inevitably turbulent rather than α-Ω. The relatively slow rotation (if 3.3 d is the true period; or ~1 d if Spitzer&#x27;s faster modulation is the actual rotation) combined with the kG-class field puts the star in the saturated activity regime (Roettenbacher 2017 §3.2), where additional rotation would not increase the magnetic flux. Wilson 2021 Mega-MUSCLES provides the full UV-to-X-ray SED including a Differential Emission Measure model for the unobserved 100–912 Å EUV — a critical input for atmospheric escape calculations on the planets.",
  "h2_121":"Rotation &amp; spin synthesis",
  "p_122":"TRAPPIST-1&#x27;s photometric rotation period has been a source of considerable confusion. The discovery paper (Gillon 2016) reported P_rot = 1.40 ± 0.05 d from TRAPPIST-South ground photometry, consistent with the v sin i = 6 ± 2 km/s rotational velocity from Reiners &amp; Basri 2010 if R = 0.117 R☉ and i = 90°. K2 Campaign 12 short-cadence observations gave a strong 3.295 ± 0.003 d signal (Vida 2017, Luger 2017) that is the canonical literature value. Spitzer observations 76 days before the K2 epoch, however, show a 0.819-day periodicity consistent with the v sin i prediction (Roettenbacher &amp; Kane 2017).",
  "p_123":"The Spitzer/K2 disagreement implies that the surface evolves on weeks-to-months timescales — possibly fast enough that the &quot;rotation period&quot; measured photometrically is in fact an active-region lifetime rather than the literal stellar spin period (Morris 2018a makes the same argument). For the cfg we adopt P_rot = 3.295 d (Vida 2017) as the canonical literature value, with the caveat that the underlying spin period may be closer to ~1 d. This matters for the saturated-activity dynamo discussion (Section 4) but does not materially change the cfg visual rendering at typical KSP framerates.",
  "p_124":"<b>Differential rotation.</b> Vida 2017 detected a possible second photometric period at 2.915 d after pre-whitening the K2 light curve with the 3.295-day signal. If both signals represented true rotation at different latitudes, the implied surface shear (P_1 − P_2)/P̄ ≈ 0.12 would be too large for a fully convective M dwarf and is considered inconsistent with the deep-convection physics. The secondary signal is more likely a finite-lifetime active region than a differential-rotation signature.",
  "p_125":"<b>Inclination of the spin axis.</b> No direct measurement exists for TRAPPIST-1&#x27;s rotation axis. The planetary orbital plane is inclined 89.7°–89.9° to the line of sight (Agol 2021); if the stellar spin is roughly aligned with the orbital plane (as in Brady 2022 obliquity constraints from MAROON-X), the rotation axis tilts ≈ 60° from the line of sight (cfg-adopted value). For KSP rendering, this gives a visible polar tilt rather than the equator-on view that would happen for an exactly aligned binary system.",
  "p_126":"<b>KSP implementation note.</b> Sidereal rotation period in seconds = 3.295 d × 86400 s/d = 284,688 s. The Kopernicus <code>rotationPeriod</code> should be set to this value (or the alternative 0.819 d ≈ 70,766 s if the cfg variant chooses the Spitzer-epoch interpretation).",
  "p_127":"<b>No detected activity cycle.</b> Roettenbacher &amp; Kane 2017 search the combined K2+Spitzer epoch for periodicities longer than the rotation period and find no compelling cycle signal. Wargelin 2024 found a ~7-yr cycle for Proxima Centauri using comparable X-ray + UV monitoring, but TRAPPIST-1 has not been observed long enough for a similar detection. Until a multi-decade XMM/Swift campaign closes this gap, the cfg treats the X-ray + Hα emission as steady at quiescent levels with stochastic flare events on top.",
  "h2_128":"Visual styling",
  "p_129":"In the NearStars renderer, TRAPPIST-1 is portrayed as a tiny, deeply red-orange ultra-cool dwarf — visibly smaller and redder than Proxima Centauri.",
  "li_130":"<b>Global appearance.</b> Disk color <span class=\"hex-chip\" style=\"background:#ff5520\"></span><code>#ff5520</code> (deep orange-red at 2566 K blackbody peak); apparent angular diameter at typical habitable-zone distances 1.5–5.5° (b at 5.5°, e at 1.8°, h at 0.85°). The disk is among the smallest absolute physical sizes in the catalog at 0.1192 R☉ (about 82,930 km radius, comparable to Jupiter&#x27;s equatorial radius). From b at 0.0115 AU, TRAPPIST-1 is the largest single object in the sky.",
  "li_131":"<b>Photospheric texture.</b> Granulation pattern at sub-arcsecond scale (M-dwarf granules ~30 km, scaled with pressure scale height) — visible only on extreme close-up rendering. The disk shows mild limb darkening (cfg α ≈ 0.4 H-band per the Claret 2018 M-dwarf grid extrapolation), with the deepest red at the limb.",
  "li_132":"<b>Bright spots.</b> Three to five bright facular-plage features at T ≈ 5300 K appear as small warm-yellow-cream patches against the deep red disk (cfg <span class=\"hex-chip\" style=\"background:#ffa860\"></span><code>#ffa860</code> accent), each covering ~0.005% of the visible disk. These bright spots rotate into and out of view on the 3.3-day cycle. Per Vasilyev 2025, occasional flares trigger the disappearance of cooler dark magnetic features — a visual effect that can be implemented as a flare-time spot population shift in the cfg.",
  "li_133":"<b>Dark spots (cfg variant).</b> Alternative interpretation (Roettenbacher 2017): cool dark spots at T ≈ 2200 K covering ~1–5% of the disk in patchy distribution. The dark-spot variant is preserved as a cfg variant for users who prefer the canonical M-dwarf dark-spot picture.",
  "li_134":"<b>Flares.</b> Cumulative rate ~0.5/day above 10³⁰ erg (Vida 2017), with superflares (≥10³³ erg) at 4.2/yr (Glazier 2020). The Vida data show ~12% of flares are complex multi-peaked events. Visually, the cfg should brighten the star by 0.5–2 mag in the optical for 10³¹ erg events, lasting 10 min – 1 hr with characteristic Davenport 2014 fast-rise / slow-decay shape. The white-light flare spectrum is dominated by hydrogen Balmer continuum + Hα emission, so the flare-time color shifts slightly toward orange-red (Howard 2025 RADYN models predict 2000–4500 K effective flare temperature).",
  "li_135":"<b>Corona.</b> Faint blue-white halo extending out to ~2 R* during quiescent X-ray phases (Wheatley 2017 cycle minimum); brightens during flares and during the (unobserved) activity cycle peaks.",
  "li_136":"<b>Stellar wind.</b> Not directly visible but propagates as in-game space-weather events affecting planetary magnetospheres (Garraffo 2017 simulations).",
  "li_137":"<b>Lyman-α emission.</b> Resolved by HST/STIS (Bourrier 2017) — for KSP this is below the rendering threshold but represents the primary source of UV photolysis on the planetary atmospheres.",
  "p_138":"The seven planets are visually compact in TRAPPIST-1&#x27;s sky from each other&#x27;s perspective — at conjunction, neighboring planets can reach 0.5–1° angular size, making them prominent &quot;moons&quot; of the host system. The near-coplanar configuration (i = 89.7°–89.9° per Agol 2021) means most planet–planet conjunctions are also near- transits/eclipses, with frequent mutual occultations every few days.",
  "h2_139":"Bibliography",
  "h3_140":"Read (visual-informative, drove decisions above)",
  "li_141":"<b>Van Grootel V. et al. 2018</b> — <i>Stellar Parameters for TRAPPIST-1</i>, ApJ 853, 30 (<code>2018ApJ...853...30V</code>, arXiv:1712.01911). Revised parallax 82.4 ± 0.8 mas; final stellar parameters M = 0.089 ± 0.006 M☉, R = 0.121 ± 0.003 R☉, T_eff = 2516 ± 41 K, L = (5.22 ± 0.19) × 10⁻⁴ L☉. Documents the radius-inflation tension with solar-metallicity evolutionary models.",
  "li_142":"<b>Burgasser A. J. &amp; Mamajek E. E. 2017</b> — <i>On the Age of the TRAPPIST-1 System</i>, ApJ 845, 110 (<code>2017ApJ...845..110B</code>, arXiv:1706.02018). Concordance age 7.6 ± 2.2 Gyr from CMD, density, no-Li, surface gravity, kinematics, rotation, and magnetic activity proxies. Defines log L_Hα/L_bol = −4.85 to −4.60 dex; log L_X/L_bol = −3.52 ± 0.17 dex; v sin i = 6 km/s.",
  "li_143":"<b>Vida K. et al. 2017</b> — <i>Frequent flaring in the TRAPPIST-1 system — unsuited for life?</i>, ApJ 841, 124 (<code>2017ApJ...841..124V</code>, arXiv:1703.10130). K2 Campaign 12 short-cadence Fourier analysis; P_rot = 3.295 ± 0.003 d; 42 flares with energies 1.26 × 10³⁰ – 1.24 × 10³³ erg; 12% complex.",
  "li_144":"<b>Wheatley P. J. et al. 2017</b> — <i>Strong XUV irradiation of the Earth-sized exoplanets orbiting the ultracool dwarf TRAPPIST-1</i>, MNRAS 465, L74 (<code>2017MNRAS.465L..74W</code>, arXiv:1605.01564). XMM-Newton 30 ks; two-temperature APEC corona; L_X/L_bol = 2–4 × 10⁻⁴; L_XUV/L_bol = 6–9 × 10⁻⁴.",
  "li_145":"<b>Bourrier V. et al. 2017</b> — <i>Reconnaissance of the TRAPPIST-1 exoplanet system in the Lyman-α line</i>, A&amp;A 599, L3 (<code>2017A&amp;A...599L...3B</code>, arXiv:1702.07004). HST/STIS Ly-α reconstructed line profile; coldest exoplanet host with measured UV; Ly-α much weaker than expected from L_X relation — implies cooler atmosphere quieter than corona.",
  "li_146":"<b>Roettenbacher R. M. &amp; Kane S. R. 2017</b> — <i>The Stellar Activity of TRAPPIST-1 and Consequences for the Planetary Atmospheres</i>, ApJ 851, 77 (<code>2017ApJ...851...77R</code>, arXiv:1711.02676). K2 vs. Spitzer photometric period disagreement (3.30 d vs. 0.819 d); evolving spot pattern; dark-spot model with T_spot ≈ 2200 K.",
  "li_147":"<b>Morris B. M. et al. 2018</b> — <i>Possible Bright Starspots on TRAPPIST-1</i>, ApJ 857, 39 (<code>2018ApJ...857...39M</code>, arXiv:1803.04543). Bright-spot interpretation with three spots, R_spot/R* ≈ 0.004, T_spot ≳ 5300 K. Resolves the K2/Spitzer wavelength-dependent amplitude disagreement.",
  "li_148":"<b>Wilson D. J. et al. 2021</b> — <i>The Mega-MUSCLES Spectral Energy Distribution of TRAPPIST-1</i>, ApJ 911, 18 (<code>2021ApJ...911...18W</code>, arXiv:2102.11415). 5 Å – 100 μm SED combining HST COS+STIS, XMM- Newton, and DEM models; semi-empirical UV spectrum for atmospheric modeling of the planets.",
  "li_149":"<b>Glazier A. L. et al. 2020</b> — <i>Evryscope and K2 Constraints on TRAPPIST-1 Superflare Occurrence and Planetary Habitability</i>, ApJ 900, 27 (<code>2020ApJ...900...27G</code>, arXiv:2006.14712). Combined 170 nights Evryscope + 80 d K2; cumulative superflare rate (≥10³³ erg) = 4.2 +1.9/−0.2 per year.",
  "li_150":"<b>Vasilyev V. et al. 2025</b> — <i>Flares on TRAPPIST-1 Reveal the Spectrum of Magnetic Features on Its Surface</i>, ApJ 989, L53 (<code>2025ApJ...989L..53V</code>, arXiv:2508.04793). Post-flare flux enhancement in JWST/NIRISS; interpreted as flare-triggered disappearance of dark magnetic features; first inferred spectrum of an M8 active region.",
  "li_151":"<b>Howard W. S. et al. 2025</b> — <i>Separating Flare and Secondary Atmospheric Signals with RADYN Modeling of JWST Transmission Spectroscopy</i>, ApJ 994, L31 (<code>2025ApJ...994L..31H</code>, arXiv:2512.04265). RADYN beam-heating models for six JWST flares; TESS-to-XUV scaling factor R_XUV/TESS = 3.6 +0.6/−2.5; cumulative flare XUV = 1.35 × quiescent.",
  "li_152":"<b>Gonzales E. C. et al. 2019</b> — <i>A Reanalysis of the Fundamental Parameters and Age of TRAPPIST-1</i>, ApJ 886, 131 (<code>2019ApJ...886..131G</code>, arXiv:1909.13859). FIRE NIR spectroscopy + Gaia parallax; log L_bol = −3.216 ± 0.016; T_eff = 2628 ± 42 K; intermediate-gravity classification suggesting either magnetic inflation or tidal interaction with planets.",
  "h3_153":"Read (context / methodology, not decision-driving)",
  "li_154":"<b>Gillon M. et al. 2016</b> — <i>Temperate Earth-sized planets transiting a nearby ultracool dwarf star</i>, Nature 533, 221 (<code>2016Natur.533..221G</code>, arXiv:1605.07211). Discovery paper; original stellar parameters M = 0.082 ± 0.011 M☉, R = 0.114 ± 0.006 R☉, T = 2555 ± 85 K, P_rot = 1.40 ± 0.05 d (TRAPPIST-South ground photometry, now superseded by K2).",
  "li_155":"<b>Gillon M. et al. 2017</b> — <i>Seven temperate terrestrial planets around the nearby ultracool dwarf star TRAPPIST-1</i>, Nature 542, 456 (<code>2017Natur.542..456G</code>, arXiv:1703.01424). Spitzer 20-day campaign + planet discovery; [Fe/H] = +0.04 ± 0.08 from NIR spectroscopy.",
  "li_156":"<b>Luger R. et al. 2017</b> — <i>A seven-planet resonant chain in TRAPPIST-1</i>, Nature Astronomy 1, E.129 (<code>2017NatAs...1E.129L</code>, arXiv:1703.04166). K2 Campaign 12 observation; confirms P_rot = 3.3 d; characterizes TRAPPIST-1 as &quot;low-activity, middle-aged, late M dwarf&quot;.",
  "li_157":"<b>Reiners A. &amp; Basri G. 2010</b> — <i>A Volume-Limited Sample of 63 M7-M9.5 Dwarfs II. Activity, Magnetism, and the Fade of the Rotation-Dominated Dynamo</i>, ApJ 710, 924 (<code>2010ApJ...710..924R</code>, arXiv:0912.4259). Mean magnetic field 1.6 ± 0.9 kG for M7-M9.5 sample; TRAPPIST-1 specifically at ~600 G (referenced by Wheatley 2017 and Burgasser 2017).",
  "li_158":"<b>Filippazzo J. C. et al. 2015</b> — <i>Fundamental Parameters and Spectral Energy Distributions of Young and Field Age Objects with Masses Spanning the Stellar to Planetary Regime</i>, ApJ 810, 158 (<code>2015ApJ...810..158F</code>, arXiv:1508.01767). Baseline SED-fit fundamental parameters for ultracool dwarfs including TRAPPIST-1; pre-Van Grootel reference.",
  "li_159":"<b>Reiners A. et al. 2018</b> — <i>The CARMENES search for exoplanets around M dwarfs. High-resolution optical and near-infrared spectra of 324 survey stars</i>, A&amp;A 612, A49 (<code>2018A&amp;A...612A..49R</code>, arXiv:1711.06576). CARMENES Zeeman-broadening survey methodology; TRAPPIST-1 in the M-dwarf comparison sample.",
  "li_160":"<b>Garraffo C. et al. 2017</b> — <i>The Threatening Magnetic and Plasma Environment of the TRAPPIST-1 Planets</i>, ApJ 843, L33 (<code>2017ApJ...843L..33G</code>, arXiv:1706.04617). MHD stellar-wind simulations; sub-Alfvénic crossings for ~50% of inner-planet orbits.",
  "li_161":"<b>Ducrot E. et al. 2020</b> — <i>TRAPPIST-1: Global results of the Spitzer Exploration Science Program SPECULOOS</i>, A&amp;A 640, A112 (<code>2020A&amp;A...640A.112D</code>, arXiv:2006.13826). 5-year Spitzer campaign; alternative stellar density / R = 0.1234 R☉ measurement; superseded by Agol 2021 in DB.",
  "li_162":"<b>Paudel R. R. et al. 2018</b> — <i>K2 Ultracool Dwarfs Survey III. White Light Flares Are Ubiquitous in M6-L0 Dwarfs</i>, ApJ 858, 55 (<code>2018ApJ...858...55P</code>, arXiv:1803.07708). M6-L0 flare statistics; TRAPPIST-1 in the ultracool dwarf flare-rate-vs-age context.",
  "li_163":"<b>Morris B. M. et al. 2018b</b> — <i>Non-detection of Contamination by Stellar Activity in the Spitzer Transit Light Curves of TRAPPIST-1</i>, ApJ 863, L32 (<code>2018ApJ...863L..32M</code>, arXiv:1808.02808). Spitzer transit-timing residuals show no spot-crossing signatures; constrains the spot-on-transit-chord configuration.",
  "h3_164":"Read (instrument / non-cfg-decisive)",
  "li_165":"<b>Davoudi F. et al. 2024</b> — <i>Updated Spectral Characteristics for the Ultracool Dwarf TRAPPIST-1</i>, ApJ 970, L4 (<code>2024ApJ...970L...4D</code>). NIR spectral indices updated; no cfg-decisive parameters revised.",
  "li_166":"<b>Seli B. et al. 2021</b> — <i>Activity of TRAPPIST-1 analogue stars observed with TESS</i>, A&amp;A 650, A138 (arXiv:2103.13540). Comparison sample of M8 V dwarfs; provides flare-rate context but no TRAPPIST-1-specific new measurements.",
  "li_167":"<b>TRAPPIST-1 JWST Community Initiative et al. 2024</b> — <i>A roadmap for the atmospheric characterization of terrestrial exoplanets with JWST</i> (arXiv:2310.15895). System-level observational program rationale; cites stellar parameters from Agol 2021 + activity from Wilson 2021.",
  "li_168":"<b>Howard W. S. et al. 2023</b> — <i>Characterizing the Near-infrared Spectra of Flares from TRAPPIST-1 during JWST Transits</i>, ApJ 959, 64 (<code>2023ApJ...959...64H</code>, arXiv:2310.03792 — full text fetch failed, only abstract available). Predecessor to Howard 2025; characterizes lower-than-expected flare temperatures.",
  "h3_169":"Not read — no arXiv preprint or low-priority (~280 papers)",
  "p_170":"The stellar-focused bibliography includes ~280 lower-relevance papers filtered to <code>status: skipped</code> in <code>_bib/trappist-1.yaml</code>. Categories:",
  "li_171":"Mid-to-late-M-dwarf statistical papers that include TRAPPIST-1 in a sample but do not characterize it individually (~80 papers)",
  "li_172":"Planet-atmospheric-modeling papers that cite TRAPPIST-1 stellar parameters but contribute no new stellar measurement (~50 papers, many already covered in per-planet bibs b–h)",
  "li_173":"Conference proceedings, abstracts, mission-concept papers without arXiv (~80 papers)",
  "li_174":"SETI / radio-technosignature surveys targeting TRAPPIST-1 (~10 papers)",
  "li_175":"Pre-discovery brown-dwarf / ultracool-dwarf surveys with TRAPPIST-1 as one of many targets (~30 papers)",
  "li_176":"Theoretical M-dwarf habitability papers using TRAPPIST-1 as a reference target (~30 papers)",

  "h2_178":"Open items for follow-up",
  "li_179":"<b>Spot model resolution.</b> The dark-spot (Roettenbacher 2017) vs. bright-spot (Morris 2018a) interpretations remain observation-degenerate. A dedicated multi-band JWST + ground campaign (or future ELT high-resolution disk imaging) could break the degeneracy. Cfg variant: dark-spot scenario with T_spot = 2200 K and 1–5% filling fraction.",
  "li_180":"<b>True rotation period.</b> Whether the actual stellar spin is the K2-derived 3.295 d (Vida 2017) or closer to 0.819 d (Spitzer epoch, Roettenbacher 2017) is not resolved. v sin i = 6 km/s favors the shorter period for any reasonable R. A long-baseline multi-band photometric campaign tracking the periodicity-vs-epoch evolution would clarify whether the photometric signal is rotational or active-region-lifetime in origin.",
  "li_181":"<b>Activity cycle detection.</b> No clear chromospheric or coronal cycle has been detected. Comparison with Proxima Cen&#x27;s 7-yr X-ray cycle (Wargelin 2024) motivates a TRAPPIST-1 multi-decade XMM/Chandra monitoring program. Cfg phase synchronization at J2000.0 currently arbitrary; if a cycle is detected, the cfg&#x27;s activity-driven CME flux can track real-time progression.",
  "li_182":"<b>Radius inflation mechanism.</b> The 8–14% radius inflation over solar-metallicity evolutionary models (Burgasser 2017, Van Grootel 2018) remains unexplained. High-resolution optical spectroscopy for α-element abundances (Veyette 2016 method) could test the high-metallicity hypothesis. Alternatively, deeper magnetic- activity modeling (Feiden &amp; Chaboyer 2014) could test the spot-blocking interpretation.",
  "li_183":"<b>Howard 2023 (arXiv:2310.03792) full text refetch.</b> The arXiv full-text fetch failed during this synthesis pass; only the abstract was available for the bibliography entry. A retry against ar5iv (or manual paste) would let the cfg record the specific near-infrared flare effective temperatures.",
  "li_184":"<b>Re-check Gillon 2016 TRAPPIST-South 1.40-d photometric period.</b> Roettenbacher 2017 dismisses it as a spot-active-region artifact; if the bright-spot Morris 2018a interpretation is correct, the 1.40 d could be physical — half the K2 period from a two-spot symmetric configuration. The cfg adopts 3.295 d without prejudice.",

  ko: {
  "p_1":"TRAPPIST-1 (2MASS J23062928−0502285) 은 가까운 7행성 공명 사슬을 거느린 ultra-cool dwarf 입니다. Gaia DR3 거리 12.47 pc (시차 80.21 mas) 에 위치한 M8 V 별이고, 1.5–19 일 주기에 걸쳐 일곱 개의 지구 크기 세계가 공전합니다. 지금까지 특성화된 외계행성 host star 중에서 가장 작고 가장 차갑고 가장 어두운 별 중 하나로, log L<i>/L☉ = −3.28, 즉 태양 볼로메트릭 출력의 0.052% 에 불과합니다. 기본 매개변수는 2016년 발견 이후 여러 차례 정제되어 왔고 — 가장 최근에는 Agol 2021 의 TTV 기반 모델이 권장 세트로 자리잡았으며 DB Phase 2 층도 이를 채택합니다. M</i> = 0.0898 ± 0.0023 M☉, R* = 0.1192 ± 0.0013 R☉, T_eff = 2566 ± 26 K 입니다.",
  "p_2":"이 별은 자신의 분광형 기준으로는 활동도가 중간 정도입니다. K2 측광은 3.295 ± 0.003 일의 자전 주기를 주고 (Vida 2017, Luger 2017 확인), K2 광도곡선에는 80 일 동안 42 개의 flare 가 검출됐는데 에너지는 10³⁰–10³³ erg 범위에 걸쳐 있습니다 (Vida 2017). Evryscope 의 더 긴 모니터링은 superflare (≥10³³ erg) 발생률을 연 4.2 +1.9/−0.2 회로 좁혀 줍니다 (Glazier 2020). XMM-Newton 은 log L_X (cgs) = 26.6–26.9 의 부드러운 2온도 코로나를 검출하고 (Wheatley 2017), HST/STIS 는 Ly-α 라인을 분해해 — TRAPPIST-1 을 UV 라인이 측정된 가장 차가운 exoplanet host 로 만듭니다 (Bourrier 2017). 별의 나이는 7.6 ± 2.2 Gyr 이며 (Burgasser &amp; Mamajek 2017, CMD·밀도·운동학·리튬 없음 조건·자전· 활동도 지표의 합치), 행성계는 pre-main-sequence 이후의 긴 평형 단계에 들어가 있습니다.",
  "p_3":"<b>NearStars 시나리오 선택은 깊은 적색을 띠고 천천히 자전하는 ultra-cool dwarf 입니다. 중간 정도의 chromospheric 활동, 부드러운 X-ray 코로나, 빈번한 저에너지 flare 와 드문 superflare, 진화하는 magnetic feature 패턴, 그리고 일곱 개의 강하게 조사된 암석 행성을 오랫동안 빚어 온 7.6 Gyr 의 나이를 함께 가진 모습입니다.</b> cfg 결정 24 개 — 22 개는 canonical 일치, 2 개는 tie-break (점 충진율과 점-광구 온도 대비. Roettenbacher 의 어두운 점 해석과 Morris 의 밝은 점 해석이 모두 관측과 양립 가능합니다).",

  "h2_109":"Surface synthesis",
  "p_110":"TRAPPIST-1 의 광구는 NearStars 의 행성을 확인된 host star 중 가장 작고 가장 차갑습니다. 가시 원반은 T_eff = 2566 K (Agol 2021) 에서 방출되고, SED 는 6500 Å 보다 짧은 파장 영역에서 분자 TiO·VO opacity 로 강하게 억눌립니다 — 복사 flux 의 대부분은 1–3 μm 범위에서 흘러나옵니다 (Wilson 2021 Mega-MUSCLES). 볼로메트릭 광도는 5.22 × 10⁻⁴ L☉ 에 불과하고 (Van Grootel 2018), 이는 태양의 약 1/1900 입니다.",
  "p_111":"<b>색 선택.</b> 2566 K 흑체의 색좌표는 인간이 지각하는 색을 깊은 주황-적색의 <span class=\"hex-chip\" style=\"background:#ff5520\"></span><code>#ff5520</code> 근처에 놓고, 푸른 쪽 연속의 흡수대 억제는 시각 신호를 더 깊은 적색으로 밀어 넣습니다. Proxima Centauri 색조 <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> (2980 K) 와 비교하면 TRAPPIST-1 은 더 어둡고 더 채도가 높습니다. e 와 f (0.029 와 0.038 AU) 같은 거주 가능 영역 행성에서 보면, 별은 1.8–2.5° 의 시직경을 채워 지구에서 본 태양 시직경의 몇 배에 해당합니다.",
  "p_112":"<b>광구 팽창.</b> TRAPPIST-1 의 측정 항성 밀도 (51 ρ☉, Delrez via Van Grootel 2018) 는 0.089 M☉, 7.6 Gyr 별에 대한 태양 metallicity 진화 모델 예측보다 낮습니다. 반지름은 BHAC15 / CLES isochrone 예측 대비 8–14% 가량 팽창돼 보입니다 (Burgasser 2017, Van Grootel 2018). 두 가지 해석이 살아 있습니다 — 강화된 metallicity ([Fe/H] = +0.40 정도 까지) 가 increased opacity 를 통해 외피를 팽창시키는 시나리오, 그리고 magnetic-activity 가 convective transport 를 억제해 팽창시키는 시나리오. Gonzales 2019 는 세 번째 가설을 추가합니다 — 일곱 행성의 조석 forcing 이 별의 외층을 약간 부풀린 채로 유지한다는 안입니다. 현재 데이터로는 어느 쪽인지 결정적으로 가리지 못합니다. cfg 목적상 채택된 R = 0.1192 R☉ (Agol 2021) 는 transit duration 과 TTV 유도 질량으로 직접 잘 측정된 값이고, 팽창 메커니즘과 무관합니다.",
  "p_113":"<b>표면 특징.</b> TRAPPIST-1 의 점 패턴은 활동도 문헌에서 가장 논란이 큰 주제이며, 두 해석이 모두 살아 있습니다. Roettenbacher &amp; Kane 2017 은 K2 의 3.3 일 변조를 T_spot ≈ 2200 K 의 차가운 어두운 점으로 모델링 합니다 — 대비는 전형적 중-M dwarf 수준입니다. 이 모델은 K2 광도곡선은 설명하지만 Spitzer 4.5 μm 에서도 비슷한 변조를 예측하는데 관측은 그렇지 않습니다 (Spitzer epoch 은 0.819 일 주기를 보여 진화된 활동 영역을 시사합니다). Morris 2018a 는 파장 의존 관측을 T_spot ≳ 5300 ± 200 K 의 밝은 점 세 개로 설명하고, 각 점의 면적은 매우 작습니다 (R_spot / R* ≈ 0.004). 분자 흡수대로 광구 방출이 강하게 억제된 Kepler bandpass 에서는 이 뜨거운 패치가 지배하지만, 광구의 Planck 함수가 우세한 4.5 μm 에서는 거의 기여하지 않습니다. Vasilyev 2025 는 JWST/NIRISS 에서 차가운 magnetic feature 의 증거를 추가했고 — &quot;광구보다 기껏해야 몇백 K 낮은&quot; 온도이며 flare 와 함께 가끔 사라집니다.",
  "p_114":"NearStars cfg 에서는 밝은 점 그림을 시각적 주역으로 채택했습니다. 이유는 (a) 파장 의존 측광 신호를 자기 일관적으로 설명하고, (b) 다른 부분은 균질한 적색 원반에 대해 시각적으로 두드러진 특징을 제공하며, (c) Vasilyev 2025 가 magnetic feature 의 사라짐으로 돌리는 flare 후 밝아짐과 부합하기 때문입니다. 어두운 점 해석은 cfg 변형으로 Open items 에 보존됩니다. 현실적으로 두 집단은 원반 위에 공존할 가능성이 높습니다.",
  "h2_115":"Atmosphere synthesis",
  "p_116":"TRAPPIST-1 의 항성 대기 — 채층, 천이층, 코로나 — 는 Bourrier 2017 (Ly-α), Wheatley 2017 (X-ray), Wilson 2021 (Mega-MUSCLES 프로그램의 전체 UV-to-X-ray SED) 으로 특성화됩니다. 핵심 긴장 관계는 X-ray luminosity 가 Proxima Centauri 수준 (log L_X cgs = 26.6–26.9 vs Proxima 의 quiescent ≈ 27.0) 인 반면, Ly-α 라인 방출은 더 따뜻한 M dwarf 에서 보정된 L_X → L_Lyα 관계가 예측하는 값보다 약 3 배 약하다는 점입니다. Bourrier 2017 은 이를 TRAPPIST-1 의 채층은 적당히 활동적이지만 코로나는 더 따뜻한 M dwarf 의 flux 수준을 유지한다는 증거로 해석합니다 — 후기 M dwarf 에서 시원한 대기 층이 뜨거운 코로나와 탈동조화되는 추세와 일치하는 결과입니다.",
  "p_117":"<b>Chromospheric 활동도.</b> log L_Hα / L_bol = −4.85 ~ −4.60 (Burgasser 2017 이 여러 epoch 자료를 collation). 이 값은 TRAPPIST-1 을 M8 V 의 중간 활동도 구간에 둡니다 — 매우 조용한 비활동 M8 도, 포화 방출의 빠른 회전 별도 아닙니다. 등가폭 측정은 Hα 방출 2.3–7.7 Å 범위에 걸쳐 있고 (Reiners &amp; Basri 2010 / Schmidt 2007 / Burgasser 2015), 변동은 회전 변조 또는 Roettenbacher 2017 이 기록한 점 충진율 진화를 따를 가능성이 높습니다.",
  "p_118":"<b>Coronal X-ray.</b> XMM-Newton 은 2014년 12월에 TRAPPIST-1 을 30 ks 관측했고 (Wheatley 2017), kT = 0.15 와 0.83 keV 의 부드러운 2온도 APEC 플라스마를 드러냈습니다. 7.8 시간 관측 동안의 변동은 통계적으로 유의하며 — 그 당시 가정된 1.4 일 주기의 약 23% 를 덮는 회전 변조와 가능한 작은 flare 의 조합일 가능성이 큽니다. log L_X / L_bol = (2–4) × 10⁻⁴ 는 별을 포화 영역에 둡니다 (Rossby 수 &lt;&lt; 0.1, Roettenbacher 2017 §3.2). 적분 XUV luminosity 는 log L_XUV / L_bol = (6–9) × 10⁻⁴ 로, 모든 일곱 행성에서 hydrodynamic mass loss 를 구동할 만큼 충분합니다 (Bourrier 2017 계산: 행성들에 걸쳐 총 escape rate 13–46 ton/s).",
  "p_119":"<b>Flare 와 포화 활동도 영역.</b> Vida 2017 은 K2 의 사용 가능한 80 일 cadence 동안 1.26 × 10³⁰ ~ 1.24 × 10³³ erg 사이의 42 개 flare 를 목록화했고, 이는 10³⁰ erg 이상에서 약 0.53/일의 flare 발생률을 줍니다. Glazier 2020 은 Evryscope 지상 측광 2년치를 더해 누적 FFD 분석으로 분포를 superflare 까지 확장하고, 연 4.2 +1.9/−0.2 회의 superflare (≥10³³ erg) 발생률을 얻습니다 — ultracool dwarf 기준으로는 중간이고, 거주 가능 영역의 오존 보호 대기 (만약 존재한다면) 가 이벤트 사이에 회복할 수 있을 정도로 낮은 수준입니다. Howard 2025 는 RADYN 복사-유체역학 beam-heating 모델을 JWST 관측 6 개 flare (2.2–8.7 × 10³⁰ erg) 에 적용해, 전형적 M dwarf flare 보다 비교적 약한 전자 빔 (F_e = 10¹² erg/s/cm², E_cutoff ≤ 37 keV) 을 발견했습니다 — Maas 2022 와 Howard 2023 이 지적한 예상보다 낮은 광학 flare 온도와 일치하는 결과입니다. 누적적으로 flare 는 1년 적분 기준으로 정온 XUV 방출의 1.35 +2.0/−0.15 배를 기여하므로, 시스템의 7.6 Gyr 동안 flare 성분은 동일 정온 광도의 비flare 별 대비 행성에서의 총 XUV 조사 이력을 대체로 2 배 키워 왔습니다.",
  "p_120":"<b>자기장과 dynamo.</b> Reiners &amp; Basri 2010 은 FeH 흡수선의 Zeeman 선폭에서 평균 자기장 약 600 G 를 측정했습니다 — 중-M 평균인 1.6 ± 0.9 kG 보다 약합니다. TRAPPIST-1 은 완전 대류 (M &lt; 0.35 M☉) 이므로 dynamo 는 α-Ω 이 아니라 필연적으로 turbulent 입니다. 비교적 느린 회전 (3.3 일이 진짜 주기라면. Spitzer 의 더 빠른 변조가 실제 회전이라면 ~1 일) 과 kG 급 자기장이 결합하면 별은 포화 활동도 영역에 들어가 (Roettenbacher 2017 §3.2), 회전이 더 빨라져도 자기 flux 가 늘어나지 않습니다. Wilson 2021 Mega-MUSCLES 는 관측되지 않는 100–912 Å EUV 를 위한 Differential Emission Measure 모델을 포함한 전체 UV-to-X-ray SED 를 제공합니다 — 행성에서의 대기 escape 계산에 결정적인 입력입니다.",
  "h2_121":"Rotation &amp; spin synthesis",
  "p_122":"TRAPPIST-1 의 측광 자전 주기는 상당한 혼란의 원천이었습니다. 발견 논문 (Gillon 2016) 은 TRAPPIST-South 의 지상 측광에서 P_rot = 1.40 ± 0.05 일을 보고했고, 이는 R = 0.117 R☉, i = 90° 가정 시 Reiners &amp; Basri 2010 의 v sin i = 6 ± 2 km/s 와 일치합니다. K2 Campaign 12 의 short-cadence 관측은 3.295 ± 0.003 일의 강한 신호를 주었고 (Vida 2017, Luger 2017), 이것이 표준적 문헌 값입니다. 그러나 K2 epoch 76 일 전의 Spitzer 관측은 v sin i 예측과 일치하는 0.819 일 주기성을 보입니다 (Roettenbacher &amp; Kane 2017).",
  "p_123":"Spitzer 와 K2 의 불일치는 표면이 수 주에서 수 개월의 시간 척도에서 진화함을 시사합니다 — 어쩌면 측광으로 측정된 &quot;회전 주기&quot;가 실제로는 별의 spin 주기가 아니라 활동 영역의 수명일 만큼 빠를 수도 있습니다 (Morris 2018a 도 같은 주장). cfg 에서는 P_rot = 3.295 일 (Vida 2017) 을 표준 문헌 값으로 채택하되, 진짜 spin 주기는 ~1 일에 가까울 수 있다는 caveat 를 함께 둡니다. 이는 포화 활동도 dynamo 논의 (§4) 에서 중요하지만, 일반적인 KSP framerate 의 cfg 시각 렌더링은 크게 바뀌지 않습니다.",
  "p_124":"<b>Differential rotation.</b> Vida 2017 은 K2 광도곡선을 3.295 일 신호로 pre-whitening 한 뒤 2.915 일의 측광 2차 주기를 검출했습니다. 두 신호가 서로 다른 위도의 실제 회전이라면, 함의된 표면 shear (P_1 − P_2)/P̄ ≈ 0.12 는 완전 대류 M dwarf 에 비해 너무 크고 깊은 대류 물리와 모순됩니다. 2차 신호는 differential rotation 의 흔적이라기보다 유한 수명의 활동 영역일 가능성이 더 높습니다.",
  "p_125":"<b>Spin 축 경사.</b> TRAPPIST-1 의 자전축에 대한 직접 측정은 없습니다. 행성 궤도면은 시선과 89.7°–89.9° 기울어 있고 (Agol 2021), 항성 spin 이 궤도면과 대체로 정렬돼 있다면 (Brady 2022 MAROON-X obliquity 제약 처럼), 자전축은 시선으로부터 약 60° 기울어집니다 (cfg 채택값). KSP 렌더링에서는 동기 binary 의 정확한 정렬 시야가 아니라, 가시적인 극축 기울기를 줍니다.",
  "p_126":"<b>KSP 구현 노트.</b> Sidereal 자전 주기 (초 단위) = 3.295 일 × 86400 s/d = 284,688 s. Kopernicus 의 <code>rotationPeriod</code> 는 이 값으로 설정하면 됩니다 (또는 cfg 변형이 Spitzer-epoch 해석을 채택한다면 대안 값 0.819 일 ≈ 70,766 s).",
  "p_127":"<b>활동 주기 미검출.</b> Roettenbacher &amp; Kane 2017 은 K2+Spitzer 결합 epoch 에서 자전 주기보다 긴 주기성을 탐색했고 설득력 있는 cycle 신호를 찾지 못했습니다. Wargelin 2024 는 비슷한 X-ray + UV 모니터링으로 Proxima Centauri 에서 ~7 년 주기를 발견했지만, TRAPPIST-1 은 비슷한 검출이 가능할 만큼 길게 관측되지 않았습니다. 다년 XMM/Swift 캠페인이 이 공백을 메우기 전까지, cfg 는 X-ray + Hα 방출을 quiescent 수준의 정상 상태로 다루고 그 위에 확률적 flare 이벤트를 얹습니다.",
  "h2_128":"Visual styling",
  "p_129":"NearStars 렌더러에서 TRAPPIST-1 은 작고 깊은 적-주황의 ultra-cool dwarf 로 묘사됩니다 — Proxima Centauri 보다 눈에 띄게 작고 더 붉은 모습입니다.",
  "li_130":"<b>전체 외관.</b> 원반 색상 <span class=\"hex-chip\" style=\"background:#ff5520\"></span><code>#ff5520</code> (2566 K 흑체 정점의 깊은 주황-적색). 전형적인 거주 가능 영역 거리에서의 시직경 1.5–5.5° (b 에서 5.5°, e 에서 1.8°, h 에서 0.85°). 0.1192 R☉ (약 82,930 km 반경, 목성 적도 반경과 비슷한 수준) 의 절대 물리 크기는 카탈로그에서 가장 작은 축에 속합니다. b 의 0.0115 AU 에서 보면 TRAPPIST-1 은 하늘에서 가장 큰 단일 천체입니다.",
  "li_131":"<b>광구 텍스처.</b> 서브 arcsec 척도의 granulation 패턴 (M dwarf granule ~30 km, 압력 척도고에 따라 조정) — 극단적 close-up 렌더링에서만 보입니다. 원반은 약한 limb darkening 을 보이며 (Claret 2018 M-dwarf 그리드 외삽 기반 H 대역에서 cfg α ≈ 0.4), 가장 깊은 적색은 limb 에 나타납니다.",
  "li_132":"<b>밝은 점.</b> T ≈ 5300 K 의 facular plage 특징 3–5 개가 깊은 적색 원반을 배경으로 작은 따뜻한 노란-크림 패치 (cfg <span class=\"hex-chip\" style=\"background:#ffa860\"></span><code>#ffa860</code> accent) 로 나타나고, 각 패치는 가시 원반의 ~0.005% 를 차지합니다. 이 밝은 점들은 3.3 일 주기로 시야 안팎을 돕니다. Vasilyev 2025 에 따르면 가끔 flare 가 차가운 어두운 magnetic feature 의 소멸을 유발하는데 — 이 시각 효과는 cfg 에서 flare 시점의 점 인구 변동으로 구현할 수 있습니다.",
  "li_133":"<b>어두운 점 (cfg 변형).</b> 대안 해석 (Roettenbacher 2017): T ≈ 2200 K 의 차가운 어두운 점이 원반의 ~1–5% 를 패치 분포로 덮습니다. 어두운 점 변형은 표준적 M dwarf 어두운 점 그림을 선호하는 사용자를 위해 cfg variant 로 보존됩니다.",
  "li_134":"<b>Flare.</b> 10³⁰ erg 이상의 누적 발생률 ~0.5/일 (Vida 2017), superflare (≥10³³ erg) 는 4.2/년 (Glazier 2020). Vida 의 데이터에서는 flare 의 ~12% 가 복잡한 다중 피크 이벤트입니다. 시각적으로 cfg 는 10³¹ erg 이벤트에서 별을 광학 0.5–2 mag 만큼 밝게 해야 하고, 10 분 ~ 1 시간 지속되며 Davenport 2014 의 빠른 상승 / 느린 감쇠 특징적 형태를 보입니다. 백색광 flare 스펙트럼은 hydrogen Balmer 연속 + Hα 방출이 지배하므로, flare 시점 색은 주황-적색 쪽으로 약간 이동합니다 (Howard 2025 RADYN 모델은 2000–4500 K 의 유효 flare 온도 예측).",
  "li_135":"<b>코로나.</b> 정온 X-ray 단계에서는 약 2 R* 까지 뻗는 흐릿한 푸른-흰 halo 가 보이고 (Wheatley 2017 cycle 최저), flare 시점과 (미관측인) 활동 주기 정점에서 밝아집니다.",
  "li_136":"<b>항성풍.</b> 직접 보이지는 않지만, 행성 magnetosphere 에 영향을 주는 인게임 우주기상 이벤트로 전파됩니다 (Garraffo 2017 시뮬레이션).",
  "li_137":"<b>Lyman-α 방출.</b> HST/STIS 로 분해 (Bourrier 2017) — KSP 의 렌더링 문턱 아래이지만 행성 대기 UV 광분해의 주요 원천에 해당합니다.",
  "p_138":"일곱 행성은 서로의 시야에서 시각적으로 빽빽이 모여 있어서 — 회합 시점에 이웃 행성은 0.5–1° 의 시직경에 도달해 host 시스템의 두드러진 &quot;위성&quot; 처럼 보입니다. 거의 동일면 구조 (Agol 2021 에서 i = 89.7°–89.9°) 때문에 대부분의 행성-행성 회합은 동시에 거의 일식·엄폐가 되고, 며칠마다 빈번한 상호 occultation 이 일어납니다.",
  "h2_139":"Bibliography",
  "h3_140":"Read (visual-informative, drove decisions above)",
  "li_141":"<b>Van Grootel V. et al. 2018</b> — <i>Stellar Parameters for TRAPPIST-1</i>, ApJ 853, 30 (<code>2018ApJ...853...30V</code>, arXiv:1712.01911). 갱신된 시차 82.4 ± 0.8 mas. 최종 항성 매개변수 M = 0.089 ± 0.006 M☉, R = 0.121 ± 0.003 R☉, T_eff = 2516 ± 41 K, L = (5.22 ± 0.19) × 10⁻⁴ L☉. 태양 metallicity 진화 모델과의 반지름 팽창 긴장 관계를 기록.",
  "li_142":"<b>Burgasser A. J. &amp; Mamajek E. E. 2017</b> — <i>On the Age of the TRAPPIST-1 System</i>, ApJ 845, 110 (<code>2017ApJ...845..110B</code>, arXiv:1706.02018). CMD, 밀도, Li 없음, 표면 중력, 운동학, 자전, 자기 활동도 지표의 합치에서 도출한 7.6 ± 2.2 Gyr. log L_Hα/L_bol = −4.85 ~ −4.60 dex, log L_X/L_bol = −3.52 ± 0.17 dex, v sin i = 6 km/s 정의.",
  "li_143":"<b>Vida K. et al. 2017</b> — <i>Frequent flaring in the TRAPPIST-1 system — unsuited for life?</i>, ApJ 841, 124 (<code>2017ApJ...841..124V</code>, arXiv:1703.10130). K2 Campaign 12 의 short-cadence Fourier 분석. P_rot = 3.295 ± 0.003 일. 에너지 1.26 × 10³⁰ ~ 1.24 × 10³³ erg 의 flare 42 개. 12% 가 complex.",
  "li_144":"<b>Wheatley P. J. et al. 2017</b> — <i>Strong XUV irradiation of the Earth-sized exoplanets orbiting the ultracool dwarf TRAPPIST-1</i>, MNRAS 465, L74 (<code>2017MNRAS.465L..74W</code>, arXiv:1605.01564). XMM-Newton 30 ks. 2온도 APEC 코로나. L_X/L_bol = 2–4 × 10⁻⁴. L_XUV/L_bol = 6–9 × 10⁻⁴.",
  "li_145":"<b>Bourrier V. et al. 2017</b> — <i>Reconnaissance of the TRAPPIST-1 exoplanet system in the Lyman-α line</i>, A&amp;A 599, L3 (<code>2017A&amp;A...599L...3B</code>, arXiv:1702.07004). HST/STIS Ly-α 복원 라인 프로파일. UV 측정된 가장 차가운 exoplanet host. L_X 관계 예측보다 Ly-α 훨씬 약함 → 시원한 대기가 코로나보다 조용함.",
  "li_146":"<b>Roettenbacher R. M. &amp; Kane S. R. 2017</b> — <i>The Stellar Activity of TRAPPIST-1 and Consequences for the Planetary Atmospheres</i>, ApJ 851, 77 (<code>2017ApJ...851...77R</code>, arXiv:1711.02676). K2 vs Spitzer 측광 주기 불일치 (3.30 일 vs 0.819 일). 진화하는 점 패턴. T_spot ≈ 2200 K 의 어두운 점 모델.",
  "li_147":"<b>Morris B. M. et al. 2018</b> — <i>Possible Bright Starspots on TRAPPIST-1</i>, ApJ 857, 39 (<code>2018ApJ...857...39M</code>, arXiv:1803.04543). R_spot/R* ≈ 0.004, T_spot ≳ 5300 K 의 점 세 개를 가진 밝은 점 해석. K2/Spitzer 의 파장 의존 진폭 불일치를 해결.",
  "li_148":"<b>Wilson D. J. et al. 2021</b> — <i>The Mega-MUSCLES Spectral Energy Distribution of TRAPPIST-1</i>, ApJ 911, 18 (<code>2021ApJ...911...18W</code>, arXiv:2102.11415). HST COS+STIS, XMM-Newton, DEM 모델을 결합한 5 Å ~ 100 μm SED. 행성 대기 모델링용 반경험적 UV 스펙트럼.",
  "li_149":"<b>Glazier A. L. et al. 2020</b> — <i>Evryscope and K2 Constraints on TRAPPIST-1 Superflare Occurrence and Planetary Habitability</i>, ApJ 900, 27 (<code>2020ApJ...900...27G</code>, arXiv:2006.14712). Evryscope 170 일 + K2 80 일 결합. 누적 superflare 발생률 (≥10³³ erg) = 4.2 +1.9/−0.2 회/년.",
  "li_150":"<b>Vasilyev V. et al. 2025</b> — <i>Flares on TRAPPIST-1 Reveal the Spectrum of Magnetic Features on Its Surface</i>, ApJ 989, L53 (<code>2025ApJ...989L..53V</code>, arXiv:2508.04793). JWST/NIRISS 에서 flare 후 flux 증가. flare 가 유발한 어두운 magnetic feature 의 사라짐으로 해석. M8 활동 영역의 첫 추정 스펙트럼.",
  "li_151":"<b>Howard W. S. et al. 2025</b> — <i>Separating Flare and Secondary Atmospheric Signals with RADYN Modeling of JWST Transmission Spectroscopy</i>, ApJ 994, L31 (<code>2025ApJ...994L..31H</code>, arXiv:2512.04265). 6 개 JWST flare 의 RADYN beam-heating 모델. TESS-XUV 환산 인자 R_XUV/TESS = 3.6 +0.6/−2.5. 누적 flare XUV = 1.35 × quiescent.",
  "li_152":"<b>Gonzales E. C. et al. 2019</b> — <i>A Reanalysis of the Fundamental Parameters and Age of TRAPPIST-1</i>, ApJ 886, 131 (<code>2019ApJ...886..131G</code>, arXiv:1909.13859). FIRE NIR 분광 + Gaia 시차. log L_bol = −3.216 ± 0.016. T_eff = 2628 ± 42 K. 자기 inflation 또는 행성 조석 상호작용을 시사하는 intermediate-gravity 분류.",
  "h3_153":"Read (context / methodology, not decision-driving)",
  "li_154":"<b>Gillon M. et al. 2016</b> — <i>Temperate Earth-sized planets transiting a nearby ultracool dwarf star</i>, Nature 533, 221 (<code>2016Natur.533..221G</code>, arXiv:1605.07211). 발견 논문. 원래 항성 매개변수 M = 0.082 ± 0.011 M☉, R = 0.114 ± 0.006 R☉, T = 2555 ± 85 K. P_rot = 1.40 ± 0.05 일 (지금은 K2 가 대체).",
  "li_155":"<b>Gillon M. et al. 2017</b> — <i>Seven temperate terrestrial planets around the nearby ultracool dwarf star TRAPPIST-1</i>, Nature 542, 456 (<code>2017Natur.542..456G</code>, arXiv:1703.01424). Spitzer 20 일 캠페인과 행성 발견. NIR 분광에서 [Fe/H] = +0.04 ± 0.08.",
  "li_156":"<b>Luger R. et al. 2017</b> — <i>A seven-planet resonant chain in TRAPPIST-1</i>, Nature Astronomy 1, E.129 (<code>2017NatAs...1E.129L</code>, arXiv:1703.04166). K2 Campaign 12 관측. P_rot = 3.3 일 확인. TRAPPIST-1 을 &quot;낮은 활동도의 중년 후기 M dwarf&quot; 로 특성화.",
  "li_157":"<b>Reiners A. &amp; Basri G. 2010</b> — <i>A Volume-Limited Sample of 63 M7-M9.5 Dwarfs II</i>, ApJ 710, 924 (<code>2010ApJ...710..924R</code>, arXiv:0912.4259). M7-M9.5 표본의 평균 자기장 1.6 ± 0.9 kG. TRAPPIST-1 은 ~600 G (Wheatley 2017, Burgasser 2017 에서 참조).",
  "li_158":"<b>Filippazzo J. C. et al. 2015</b> — <i>Fundamental Parameters and Spectral Energy Distributions of Young and Field Age Objects with Masses Spanning the Stellar to Planetary Regime</i>, ApJ 810, 158 (<code>2015ApJ...810..158F</code>, arXiv:1508.01767). TRAPPIST-1 을 포함하는 ultracool dwarf 들의 기준 SED-적합 기본 매개변수. Van Grootel 이전의 참조.",
  "li_159":"<b>Reiners A. et al. 2018</b> — <i>The CARMENES search for exoplanets around M dwarfs. High-resolution optical and near-infrared spectra of 324 survey stars</i>, A&amp;A 612, A49 (<code>2018A&amp;A...612A..49R</code>, arXiv:1711.06576). CARMENES Zeeman 선폭 조사 방법론. TRAPPIST-1 이 M dwarf 비교 표본에 포함.",
  "li_160":"<b>Garraffo C. et al. 2017</b> — <i>The Threatening Magnetic and Plasma Environment of the TRAPPIST-1 Planets</i>, ApJ 843, L33 (<code>2017ApJ...843L..33G</code>, arXiv:1706.04617). MHD 항성풍 시뮬레이션. 안쪽 행성 궤도의 ~50% 가 sub-Alfvénic 통과.",
  "li_161":"<b>Ducrot E. et al. 2020</b> — <i>TRAPPIST-1: Global results of the Spitzer Exploration Science Program SPECULOOS</i>, A&amp;A 640, A112 (<code>2020A&amp;A...640A.112D</code>, arXiv:2006.13826). 5년 Spitzer 캠페인. 대안 항성 밀도 / R = 0.1234 R☉ 측정. DB 에서는 Agol 2021 이 대체.",
  "li_162":"<b>Paudel R. R. et al. 2018</b> — <i>K2 Ultracool Dwarfs Survey III. White Light Flares Are Ubiquitous in M6-L0 Dwarfs</i>, ApJ 858, 55 (<code>2018ApJ...858...55P</code>, arXiv:1803.07708). M6-L0 의 flare 통계. TRAPPIST-1 을 ultracool dwarf 의 flare-rate-vs-age 맥락에 둠.",
  "li_163":"<b>Morris B. M. et al. 2018b</b> — <i>Non-detection of Contamination by Stellar Activity in the Spitzer Transit Light Curves of TRAPPIST-1</i>, ApJ 863, L32 (<code>2018ApJ...863L..32M</code>, arXiv:1808.02808). Spitzer transit timing 잔차에서 spot-crossing 특징 없음. transit-chord 위의 점 분포에 제약.",
  "h3_164":"Read (instrument / non-cfg-decisive)",
  "li_165":"<b>Davoudi F. et al. 2024</b> — <i>Updated Spectral Characteristics for the Ultracool Dwarf TRAPPIST-1</i>, ApJ 970, L4 (<code>2024ApJ...970L...4D</code>). NIR 분광 지수 갱신. cfg 결정에 영향 줄 매개변수 변경 없음.",
  "li_166":"<b>Seli B. et al. 2021</b> — <i>Activity of TRAPPIST-1 analogue stars observed with TESS</i>, A&amp;A 650, A138 (arXiv:2103.13540). M8 V dwarf 비교 표본. flare-rate 맥락은 제공하지만 TRAPPIST-1 특정 새 측정은 없음.",
  "li_167":"<b>TRAPPIST-1 JWST Community Initiative et al. 2024</b> — <i>A roadmap for the atmospheric characterization of terrestrial exoplanets with JWST</i> (arXiv:2310.15895). 시스템 수준 관측 프로그램 동기. Agol 2021 의 항성 매개변수와 Wilson 2021 의 활동도를 인용.",
  "li_168":"<b>Howard W. S. et al. 2023</b> — <i>Characterizing the Near-infrared Spectra of Flares from TRAPPIST-1 during JWST Transits</i>, ApJ 959, 64 (<code>2023ApJ...959...64H</code>, arXiv:2310.03792 — 전체 텍스트 fetch 실패, abstract 만 가용). Howard 2025 의 선행 작업. 예상보다 낮은 flare 온도를 특성화.",

  "p_170":"항성 중심 bibliography 에는 <code>_bib/trappist-1.yaml</code> 에서 <code>status: skipped</code> 로 필터링된 관련도 낮은 논문이 ~280 편 포함됩니다. 분류는 다음과 같습니다.",

  "li_176":"TRAPPIST-1 을 참조 표적으로 사용한 이론적 M dwarf habitability 논문 (~30 편)",
  "p_177":"필터링된 전체 bib 는 <code>docs/phase3/_bib/trappist-1.yaml</code> 에 dropped 항목마다 <code>status: skipped</code> 주석이 달린 채 보존됩니다.",
  "h2_178":"Open items for follow-up",
  "li_179":"<b>점 모델 해결.</b> 어두운 점 (Roettenbacher 2017) 과 밝은 점 (Morris 2018a) 해석은 관측적으로 여전히 축퇴 상태입니다. 다중 대역 JWST + 지상 동시 관측 캠페인 (또는 미래 ELT 의 고분해능 원반 영상) 이 축퇴를 깰 수 있습니다. cfg 변형: T_spot = 2200 K, 1–5% 충진율의 어두운 점 시나리오.",
  "li_180":"<b>실제 자전 주기.</b> 실제 항성 spin 이 K2 의 3.295 일 (Vida 2017) 인지, Spitzer epoch 의 0.819 일 (Roettenbacher 2017) 에 더 가까운지 해소되지 않았습니다. v sin i = 6 km/s 는 합리적인 R 에 대해 더 짧은 주기를 선호합니다. 다중 대역의 긴 baseline 측광 캠페인이 epoch-vs-주기 진화를 추적하면, 측광 신호가 회전인지 활동-영역-수명 기원인지 명확히 할 수 있습니다.",
  "li_181":"<b>활동 주기 검출.</b> 명확한 chromospheric 또는 coronal cycle 이 검출되지 않았습니다. Proxima Cen 의 7년 X-ray cycle (Wargelin 2024) 과의 비교는 TRAPPIST-1 의 다년 XMM/Chandra 모니터링 프로그램의 근거가 됩니다. cfg 의 J2000.0 위상 동기화는 현재 임의 — cycle 이 검출되면 cfg 의 활동-구동 CME flux 가 실시간 진행을 추적할 수 있습니다.",
  "li_182":"<b>반지름 팽창 메커니즘.</b> 태양 metallicity 진화 모델 대비 8–14% 의 반지름 팽창 (Burgasser 2017, Van Grootel 2018) 은 미해명 상태입니다. α-원소 abundance 의 고해상도 광학 분광 (Veyette 2016 방법) 이 고 metallicity 가설을 검증할 수 있습니다. 또는 더 깊은 자기 활동도 모델링 (Feiden &amp; Chaboyer 2014) 이 spot-blocking 해석을 테스트할 수 있습니다.",
  "li_183":"<b>Howard 2023 (arXiv:2310.03792) 전체 텍스트 재조회.</b> 이 합성 과정에서 arXiv 전체 텍스트 fetch 가 실패했고, bibliography 항목에는 abstract 만 사용 가능했습니다. ar5iv 에 재시도하거나 (수동 paste) 하면 cfg 가 특정 NIR flare 유효 온도를 기록할 수 있습니다.",
  "li_184":"<b>Gillon 2016 TRAPPIST-South 1.40 일 측광 주기 재검토.</b> Roettenbacher 2017 은 이를 활동-영역 패턴의 아티팩트로 일축합니다. 만약 Morris 2018a 의 밝은 점 해석이 맞다면 1.40 일은 물리적일 수 있습니다 — 대칭적 두 점 구성에서 K2 주기의 절반이 되는 식입니다. cfg 는 편견 없이 3.295 일을 채택합니다.",
  "h2_185":"Related",

  "li_187":"<a href=\"proxima-cen.md\">proxima-cen</a> — 가장 가까운 M dwarf 비교 대상. 더 따뜻 (2980 K vs 2566 K), 더 빠른 회전 (82.6 일 vs 3.3 일), 더 강한 flare",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
