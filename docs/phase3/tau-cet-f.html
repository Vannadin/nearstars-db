  "h2_180":"Surface synthesis",
  "p_181":"τ Ceti f lies well outside the conservative habitable zone outer edge. Kopparapu 2014&#x27;s maximum-greenhouse outer limit for a G8V at Teff = 5370 K places the runaway-CO₂-cloud boundary at S ≈ 0.36 S⊕; f at 0.274 S⊕ is firmly beyond it. Without an active greenhouse, the planet&#x27;s equilibrium temperature is 202 K at zero albedo, or 184 K under an Earth-analog 0.3 bond albedo — comfortably below the water ice point. Wordsworth 2015 finds that thin secondary atmospheres (0.01–0.1 bar) on cold outer-HZ super-Earths cannot maintain surface liquid water in steady state; the cold-trap condensation of CO₂ on the nightside or polar regions caps atmospheric pressure and removes the greenhouse driver.",
  "p_182":"The cfg adopts a <b>Snowball super-Earth</b> surface morphology: a global H₂O ice crust several kilometers thick, locally fractured by the modest tidal stress from e = 0.16 and possibly cryovolcanically resurfaced near regions of higher heating. Pressure ridges, polygonal fracture patterns, and a faint dusting of CO₂ frost in the sublimation cold traps are the dominant terrain features. The surface is <i>not</i> the eyeball geometry of TRAPPIST-1 e/f: f is not tidally locked (P = 636 d, well beyond the tidal-lock timescale on a 0.78 M☉ host at 1.33 AU), so the substellar warming is transient as the dayside rotates over multi-week timescales. The ice cover is therefore approximately uniform, not concentrated by a fixed substellar hot spot.",
  "p_183":"<b>Color choice — clean cream-white under G8V light.</b> The host is neither M-dwarf-red nor solar-yellow but a slightly cooler G8V with the metal-poor SED contributing marginally cleaner-blue continuum (see the host Phase 3 synthesis Visual styling). Snow under this illumination appears pale cream-white (<span class=\"hex-chip\" style=\"background:#dcd4c8\"></span><code>#dcd4c8</code>) rather than the warm cream <span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code> that the same albedo would produce under the 2566 K TRAPPIST-1. The accent <span class=\"hex-chip\" style=\"background:#a89a88\"></span><code>#a89a88</code> for occasional exposed bedrock — at impact-crater rims, terminator ridges, and possibly the edges of cryovolcanic flows — is a weathered grey-brown consistent with metal-poor primordial silicate dust.",
  "p_184":"<b>Bedrock exposure is limited.</b> With 5–20% water mass fraction (consistent with f&#x27;s sub-Neptune-class density of ~3.7 g/cc from the M sin i estimate) most of the surface is buried under ice. The M-R-relation radius is itself low-confidence; if the true mass is higher (sin i ≲ 0.7, true M ≈ 5–6 M⊕) f could plausibly be a denser rocky world with thinner ice — but the volatile-rich envelope interpretation matches the sub-Neptune literature for outer-system super-Earths (Owen &amp; Wu 2017).",
  "p_185":"<b>Sub-glacial ocean possibility.</b> A buried liquid-water layer is plausible but not required. Radiogenic heating alone (Earth-analog 0.04 W/m²) is insufficient to maintain a global subsurface ocean without a thick insulating ice shell; tidal heating at e = 0.16 and a = 1.33 AU is small but non-zero (~0.01 W/m² estimated from Bolmont 2020-style scaling). If both heat sources combine and the ice shell is thick (≳ 50 km), a Europa-analog buried layer is possible. This is logged as a low-confidence feature and as an Open item.",
  "h2_186":"Atmosphere synthesis",
  "p_187":"No observation of f&#x27;s atmosphere exists. JWST has not targeted the planet (no transit detectable from Earth; HST/Hubble RV follow-up unproductive). The atmosphere synthesis is therefore entirely theoretical, anchored on (a) the quiet host XUV environment and (b) outer-HZ thin-secondary-atmosphere literature.",
  "p_188":"<b>Pressure choice — 0.1 bar.</b> Wordsworth 2015&#x27;s framework for super-Earths on quiet G/K hosts predicts that thermal-Jeans escape alone (no hydrodynamic loss on a host with log L_X ≤ 26.5 like τ Ceti) preserves a thin secondary atmosphere over multi-Gyr timescales. The cold-trap argument caps CO₂ partial pressure at the sublimation equilibrium for the coldest surface temperature (~190 K → CO₂ partial pressure ≲ 10 mbar); N₂ has no condensation trap above 80 K and accumulates outgassed N₂. 0.1 bar total pressure is a canonical default for this regime; 0.01 bar (Mars-thin) and 1 bar (Earth-thin) are both defensible alternatives within the unconstrained window.",
  "p_189":"<b>Composition.</b> N₂-dominated (~80%) with elevated CO₂ (~10–20%) relative to Earth — the cold-trap allows higher CO₂ partial pressure relative to atmospheric mass than on warm Earth. Trace H₂O vapor near the cirrus level only; most water frozen to the surface. Trace Ar from primordial outgassing. The metal-poor host means slightly less primordial nebular ice was iron-stained, but this is a second-order effect on the composition.",
  "p_190":"<b>Sky appearance.</b> A 0.1 bar atmosphere is barely visible from orbit — limb haze is faint, on the order of 10 km thick at the boundary. From the surface, the sky is a pale washed-out blue-white (<span class=\"hex-chip\" style=\"background:#7a7068\"></span><code>#7a7068</code>) shifted slightly cooler than Earth&#x27;s because of the host SED. Daytime is dim — illumination ~27% of Earth&#x27;s solar irradiance, roughly equivalent to a heavily overcast Earth day. The host star subtends 0.317° in f&#x27;s sky (about 60% of the Sun seen from Earth); it appears as a small pale-yellow disk, much less imposing than the red-orange sun an inhabitant of TRAPPIST-1 e would see.",
  "p_191":"<b>No flare modulation.</b> Unlike inner-edge M-dwarf HZ planets, f sees no XUV flare events. The host log R&#x27;HK = −4.95 places it among the most inactive G dwarfs ever surveyed; the atmospheric chemistry is stable on multi-Myr timescales with no episodic photochemistry shocks.",
  "h2_192":"Rotation &amp; spin synthesis",
  "p_193":"τ Ceti f is <b>not tidally locked</b>. At P = 636 d and a = 1.334 AU around a 0.78 M☉ host, the tidal-lock timescale (Vinson 2017 formula, τ_lock ∝ a^6 / (M_p × Q × R_p^5)) is comfortably longer than the system age of 7 Gyr; spin damping has not had time to operate. The planet rotates at an unknown rate that the cfg sets to an Earth-analog ~24 h day by default. A multi-week rotation period is also possible (a typical primordial spin period for an outer-HZ super-Earth, Heller 2011), but cannot be observationally constrained.",
  "p_194":"Eccentricity e = 0.16 is high enough that, if the planet had been captured into a 3:2 spin-orbit resonance during early evolution, the resonance would have been stable. Without observational evidence, the cfg adopts the simpler asynchronous fast rotator assumption.",
  "p_195":"<b>KSP implementation note.</b> With no tidal lock, <code>rotationPeriod</code> is not constrained to match <code>period</code>. Default to 24 hours (86 400 s) unless gameplay reasons favor a different value.",
  "p_196":"<b>Obliquity.</b> Adopt Earth-analog 23° as a default tie-break — no constraint, no preferred direction. Mild seasonal forcing (insolation varies by ~ ±9% over the eccentric orbit) is the only &quot;seasonal&quot; cycle, and at S = 0.27 S⊕ the surface temperature response is muted (≲ 4 K).",
  "p_197":"<b>Magnetic dynamo expectation.</b> A 4–5 M⊕ rocky body with a multi- week rotation could plausibly sustain a moderate dynamo. RM22 scaling gives a surface field strength on order 25 μT (~0.5× Earth) for these parameters. Not directly constrained; not central to the visual cfg.",
  "h2_198":"Visual styling",
  "li_199":"<b>Global appearance.</b> A pale cream-white snowball with subtle surface texture from glacial flow, polygonal fracturing, and impact craters. The atmosphere is barely visible as a faint blue- grey limb haze 10–15 km thick. Visual character is closest to a somewhat larger Europa or an outer-system Pluto-Charon variant — dominantly ice with terrain detail.",
  "li_200":"<b>Dayside detail.</b> Pressure ridges and fractures in the global ice cap visible at PQS resolution; warm cream where the M-dwarf warming is replaced by quiet G8V illumination (cleaner near-white, less ochre-shifted). Cryovolcanic plumes near regions of higher tidal/radiogenic flux possible (sparse, ≪ 1% of surface).",
  "li_201":"<b>Terminator band.</b> Sharp ice-and-shadow contrast — long shadows from cryovolcanic mounds, impact crater rims, and pressure ridges. The thin atmosphere produces minimal scattering, so the terminator transition is more crisp than Earth&#x27;s.",
  "li_202":"<b>Nightside appearance.</b> Dark with very faint cyan-white sheen from starlight reflecting off ice. KSP nightside ambient ≈ 0.5% dayside.",
  "li_203":"<b>Atmosphere haze.</b> Faint pale blue-grey (<span class=\"hex-chip\" style=\"background:#7a7068\"></span><code>#7a7068</code>) limb glow ~10 km thick — much fainter than Earth&#x27;s blue limb because the atmosphere is 1% Earth&#x27;s mass and the host SED has less blue flux than the Sun.",
  "li_204":"<b>Faint aurora.</b> Possible diffuse green-tinted polar aurora at ~1 kR during the rare host-magnetic-field perturbation events; not animated as a defining visual feature.",
  "li_205":"<b>Star in sky.</b> τ Ceti subtends 0.317° from f&#x27;s surface — a small pale-yellow disk, 60% of the Sun&#x27;s angular size from Earth. Surface illumination is roughly equivalent to a heavily overcast Earth day or twilight on a clear day, with the spectral peak shifted slightly cooler than the Sun.",
  "li_206":"<b>Sister planets in sky.</b> g (next inward) at angular size ~0.04° in conjunction (visible as a bright &quot;morning star&quot; point); h at ~0.04°. Conjunction events are rare due to the long orbital periods. The cold debris disk at ≥ 6 AU is <i>outside</i> f&#x27;s orbit and appears as a faint amber-grey band in the sky.",
  "h2_207":"Bibliography",
  "h3_208":"Read (visual-informative, drove decisions above)",
  "li_209":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). Discovery + best constraint on f&#x27;s orbit (P = 636.13 ± 11.7 d), mass (Msini = 3.93 ± 1.05 M⊕), eccentricity (0.16), and host mass (0.783 ± 0.012 M☉). Anchors every orbital and physical Decisions row.",
  "li_210":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system from HARPS RV</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, arXiv:1801.05415). Re-examination of the 4-planet system with expanded HARPS dataset; 636-d signal stable; controversial flag in NEA reflects the persisting amplitude-to-noise concerns.",
  "li_211":"<b>Wordsworth &amp; Pierrehumbert 2015</b> (general atmospheric-escape argument) — used here as a generic atmosphere-retention reference for the 0.1 bar N₂ / trace CO₂ secondary atmosphere adopted for f; specific title not pinned.",
  "li_212":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones around main-sequence stars</i>. Outer-edge maximum-greenhouse limit for a G8V at Teff = 5344 K is S ≈ 0.36 S⊕; f at 0.26 S⊕ is firmly outside.",
  "li_213":"<b>Pierrehumbert R. T. 2011</b> — <i>Hydrology, climate and physical state of cold outer-HZ super-Earths</i>. Snowball ice-dynamics template; bond albedo ~0.5 for global ice cover.",
  "h3_214":"Read (context / methodology, not directly decision-driving)",
  "li_215":"<b>MacGregor M. A. et al. 2016</b> — <i>τ Ceti debris disk ALMA imaging</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>). Disk plane inclination ~35°, the value assumed from Lawler et al. 2014 (Herschel) — adopted as the f orbital plane default (Feng 2017 also assumes coplanarity).",
  "li_216":"<b>Tuomi M. et al. 2013</b> — <i>Signals embedded in the radial velocity noise: τ Ceti 5-planet claim</i>, A&amp;A 551, A79 (<code>2013A&amp;A...551A..79T</code>). Earlier 5-planet detection; Feng 2017 retained 4 (e/f/g/h) and dropped 1 (b in old labeling). Useful for understanding the controversial-flag history.",
  "li_217":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley</i>. Sub- Neptune envelope retention vs. mass framework — supports the volatile-rich interpretation of f&#x27;s sub-Earth bulk density.",
  "li_218":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. 3:2 vs. 1:1 capture probabilities; f at P = 636 d is in the asynchronous-rotator regime.",
  "li_219":"<b>Bolmont E. et al. 2020</b> — <i>Tidal evolution of compact planetary systems</i>. Maxwell-viscoelastic tidal heating; f&#x27;s modest e = 0.16 at 1.33 AU gives ~0.01 W/m² estimated flux.",
  "h3_220":"Read (instrument / non-cfg-decisive)",
  "li_221":"<b>Pavlenko Y. V. et al. 2012</b> — host star [Fe/H] = −0.55, log R&#x27;HK = −4.95, Teff = 5344 K. Drives host context for all three planets.",
  "li_222":"<b>Schmitt J. H. M. M. et al. 1985</b> — host X-ray log L_X ≤ 26.5 cgs. Drives the &quot;no XUV-driven escape&quot; framing.",
  "h3_223":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_224":"<b>Tuomi 2013 erratum</b> — Tuomi 2014 (<code>2014MNRAS.441.1545T</code>) refines the noise model; superseded by Feng 2017.",
  "li_225":"<b>Various SETI/laser-search/technosignature papers</b> — no cfg relevance for the planet.",
  "li_226":"<b>Astrobiology speculation reviews</b> — generally place f in the &quot;marginal&quot; rather than &quot;habitable&quot; category and are not individually cfg-decisive.",
  "h2_227":"Open items for follow-up",
  "li_228":"<b>Controversial flag (<code>pl_controv_flag = 1</code>).</b> All three Feng 2017 planets are flagged disputed in NEA. The cfg treats them as present and synthesizes accordingly, but a Phase 2 / Phase 3 follow-up should monitor whether Figueira 2025 or a further ESPRESSO RV reanalysis confirms or retracts the 636-d signal. If retracted, this Phase 3 markdown should be archived not deleted.",
  "li_229":"<b>True mass.</b> Msini = 3.93 ± 1.05 M⊕ is the measured quantity; the true mass depends on the unknown orbital inclination i. The cfg adopts i ≈ 35° from the τ Ceti debris disk plane (assumed coplanar), giving true mass ≈ 6.8 M⊕. A future astrometric detection (Gaia DR4 binary catalog) could constrain i and therefore the true mass, possibly shifting f from sub-Neptune toward super-Earth bulk classification.",
  "li_230":"<b>Radius is assumed, not measured.</b> The DB stores radius 1.81 R⊕ from a sub-Neptune mass–radius relation. f does not transit, so this is unconstrained from below. If true mass is higher (sin i &lt; 0.7) and the planet is rocky-with-thin-ice rather than sub-Neptune-with-thick-envelope, R could be as low as 1.4 R⊕ with ρ ≈ 8 g/cc.",
  "li_231":"<b>User input: a P=4562 d / 5 AU &quot;h-candidate&quot;.</b> The user request for this synthesis described a τ Cet h at P = 4562 d and a ≈ 5.0 AU (near the asteroid-analog belt inner edge). The DB authoritative h is at P = 49.41 d / a = 0.243 AU. The 4562 d candidate is plausibly a Feng 2018 §3.4 long-period signal or a later RV-reanalysis candidate that the DB has not ingested. The curation question is logged in <code>db/systems/tau_cet.json</code> Open items; this Phase 3 synthesis treats f as the <i>outermost</i> current-DB planet at 1.33 AU, consistent with the DB.",
  "li_232":"<b>Bare-rock airless cfg variant.</b> An alternative reading: f has lost its volatile envelope completely (perhaps via giant impacts during the host&#x27;s old age). The bare-rock variant would show exposed silicate basement with weathering patterns under G8V illumination, no atmosphere haze, and a sharper terminator. Preserved as a cfg variant in the Open items; not the canonical pick.",
  "li_233":"<b>Sub-glacial ocean cfg detail.</b> If a future Europa-class interior model (extended to the super-Earth regime) confirms a buried liquid layer, the cfg could add a cryovolcanic plume Region pattern near regions of elevated heat flux. Currently treated as a Confidence=low feature, not animated.",
  "h2_234":"Related",

  "p_1":"τ Ceti f 는 metal-poor G8V τ Ceti 주위를 636 일 주기로 1.334 AU 에서 도는 3.93 M⊕ (M sin i) RV 후보 행성입니다 (Feng 2017, <code>2017AJ....154..135F</code>). 현재 <code>db/systems/tau_cet.json</code> 에 들어 있는 세 행성 중 가장 바깥쪽이며 (f, g, h 모두 Feng 2017 출처. e 는 호스트 Phase 3 합성에서 큐레이션 갭으로 기록), 호스트 광도 0.488 L☉ 기준 조사량은 0.27 S⊕ 로 — G8V 의 보수적 거주가능영역 바깥 경계 (Kopparapu 2014 maximum-greenhouse 한계 ≈ 0.36 S⊕) <b>바깥</b>입니다. f 의 평형 온도는 202 K (A=0) 또는 184 K (A=0.3) 이며, 이 호스트에서는 얇은 2차 대기로도 표면을 물 어는점 위로 데우지 못합니다. 행성은 NEA 에서 <b>disputed</b> (<code>pl_controv_flag = 1</code>) 로 표시됩니다 — RV 단독, transit 없음, 직접 영상 없음, JWST 후속 관측 없음. Feng 2018 (<code>2018A&amp;A...613A..76F</code>) 가 시스템을 재검토했을 때 636 일 신호 자체는 안정적이었지만, 일부 후속 분석 (Lubin 2024, 그리고 그 이전 Tuomi 2013 의 5-행성 주장 철회 이력) 은 SNR 을 마지널한 수준으로 봅니다.",
  "p_2":"<b>NearStars 시나리오 선택. 매장 가능 해양 위에 전구적 H₂O 얼음 외피를 덮은 차갑고 얇은 대기의 snowball super-Earth, 탈가스 잔존물인 희박한 N₂ + 미량 CO₂ 대기, 조용한 G8V 조명 아래 옅은 크림-그레이 표면 팔레트로 렌더링.</b> 직접 측정되지 않은 Decisions 항목에 대해서는 cfg 가 보수적입니다 — 압력, 조성, 표면 형태는 측정 제약이 아니라 조용한 G 왜성 주위 outer-HZ super-Earth 의 이론적 기본값입니다. 맨 암석 무대기 대안은 Open item 의 cfg variant 로 보존됩니다.",

  "h2_180":"Surface synthesis",
  "p_181":"τ Ceti f 는 보수적 거주가능영역 바깥 경계 한참 바깥에 놓입니다. Kopparapu 2014 의 maximum-greenhouse outer 한계는 Teff = 5370 K G8V 기준 runaway-CO₂-cloud 경계를 S ≈ 0.36 S⊕ 에 두는데, 0.274 S⊕ 의 f 는 명확히 그 너머입니다. 활성 온실효과가 없으면 행성의 평형 온도는 albedo 0 에서 202 K, 지구형 0.3 bond albedo 아래에서는 184 K — 모두 편안하게 물 어는점 아래입니다. Wordsworth 2015 는 조용한 G 왜성 주위의 차가운 outer-HZ super-Earth 에 얹힌 얇은 2차 대기 (0.01–0.1 bar) 는 정상상태에서 표면 액체 수를 유지할 수 없음을 보입니다 — nightside 나 극지방에서 CO₂ 가 cold-trap 응결되며 대기압을 상한 지우고 온실 구동력을 제거합니다.",
  "p_182":"cfg 는 <b>snowball super-Earth</b> 표면 형태를 채택합니다. 수 킬로미터 두께의 전구적 H₂O 얼음 외피가 e = 0.16 의 적당한 조석 응력으로 국지적으로 갈라지고, 가열이 큰 영역 근처에서는 cryovolcanic 재포장도 가능합니다. 압력 능선, 다각형 균열 패턴, 승화 cold-trap 의 희미한 CO₂ 서리가 지배적 지형 피처입니다. 표면은 TRAPPIST-1 e/f 의 안구 기하 (eyeball) 가 <i>아닙니다</i>. f 는 조석 고정되지 않으며 (P = 636 d 는 0.78 M☉ 호스트 1.33 AU 에서의 조석 고정 시간 척도보다 한참 길어), 다주 시간 척도로 dayside 가 회전함에 따라 substellar 가열은 일시적입니다. 따라서 얼음 덮개는 고정 substellar 핫스팟에 집중되지 않고 거의 균일합니다.",
  "p_183":"<b>색 선택 — G8V 빛 아래 깨끗한 크림-흰.</b> 호스트는 M 왜성 적색도 아니고 태양 노랑도 아닌, 살짝 더 차가운 G8V 에 metal-poor SED 가 미세하게 더 깨끗-푸른 연속체를 더한 것입니다 (호스트 Phase 3 합성의 Visual styling 참조). 이 조명 아래 눈은 옅은 크림-흰 (<span class=\"hex-chip\" style=\"background:#dcd4c8\"></span><code>#dcd4c8</code>) 으로 보이며, 같은 albedo 가 2566 K TRAPPIST-1 아래에서 만들었을 따뜻한 크림 <span class=\"hex-chip\" style=\"background:#d8d0c4\"></span><code>#d8d0c4</code> 와 대조적입니다. 충돌구 림, terminator 능선, cryovolcanic 흐름 가장자리에서 가끔 노출되는 기반암을 위한 액센트 <span class=\"hex-chip\" style=\"background:#a89a88\"></span><code>#a89a88</code> 는 metal-poor 원시 규산염 먼지와 일관된 풍화된 그레이-브라운입니다.",
  "p_184":"<b>기반암 노출은 제한적.</b> 수질량비 5–20% (Msini 추정에서 얻은 ~3.7 g/cc 의 sub-Neptune 계열 밀도와 일관) 이면 표면 대부분이 얼음 아래 묻힙니다. M-R 관계 반지름 자체가 low-confidence 이며 — 실제 질량이 더 크면 (sin i ≲ 0.7, 실제 M ≈ 5–6 M⊕) f 는 얇은 얼음 위 밀도 높은 암석 세계일 수 있지만 — 휘발성 풍부 envelope 해석이 바깥쪽 시스템 super-Earth 에 대한 sub-Neptune 문헌과 부합합니다 (Owen &amp; Wu 2017).",
  "p_185":"<b>sub-glacial 해양 가능성.</b> 매장 액체 수 층은 가능하지만 필수는 아닙니다. 두꺼운 단열 얼음 외피 없이 방사성 가열만으로는 (지구형 0.04 W/m²) 전구 지하 해양을 유지하기에 불충분합니다. e = 0.16 와 a = 1.33 AU 에서의 조석 가열은 작지만 0 은 아닙니다 (Bolmont 2020 스타일 스케일링에서 ~0.01 W/m² 추정). 두 열원이 결합하고 얼음 외피가 두껍다면 (≳ 50 km) Europa-analog 매장층이 가능합니다. low-confidence 피처로 로깅하고 Open item 으로 남깁니다.",
  "h2_186":"Atmosphere synthesis",
  "p_187":"f 대기에 대한 관측은 없습니다. JWST 는 행성을 타겟하지 않았고 (지구에서 검출 가능한 transit 없음. HST/Hubble RV 후속도 비생산적), 따라서 대기 합성은 (a) 조용한 호스트 XUV 환경과 (b) outer-HZ 얇은 2차 대기 문헌에 정박해 전적으로 이론적입니다.",
  "p_188":"<b>압력 선택 — 0.1 bar.</b> Wordsworth 2015 의 조용한 G/K 호스트 주위 super-Earth 프레임워크는, τ Ceti 처럼 log L_X ≤ 26.5 인 호스트 에서는 hydrodynamic 손실 없이 thermal-Jeans 탈출만으로도 얇은 2차 대기가 다-Gyr 시간 척도로 보존됨을 예측합니다. cold-trap 논리는 CO₂ 분압을 가장 차가운 표면 온도의 승화 평형 (~190 K → CO₂ 분압 ≲ 10 mbar) 으로 상한 짓고, N₂ 는 80 K 이상에서 응결 트랩이 없으므로 탈가스된 N₂ 가 누적됩니다. 총 압력 0.1 bar 는 이 영역의 canonical 기본값입니다. 0.01 bar (Mars-thin) 와 1 bar (Earth-thin) 모두 미제약 윈도우 안에서 방어 가능한 대안입니다.",
  "p_189":"<b>조성.</b> N₂ 우세 (~80%) 에 지구 대비 상승한 CO₂ (~10–20%) — cold-trap 이 대기 질량 대비 CO₂ 분압을 따뜻한 지구보다 높게 허용합니다. 권운 높이 근처에만 미량 H₂O 증기. 대부분의 물은 표면에 동결. 원시 탈가스 에서 미량 Ar. metal-poor 호스트는 원시 성운 얼음이 철로 덜 물들었음을 뜻하지만, 이는 조성에 대한 2차 효과입니다.",
  "p_190":"<b>하늘 모습.</b> 0.1 bar 대기는 궤도에서 거의 보이지 않으며 — 림 안개는 희미하고, 경계에서 두께 약 10 km 정도입니다. 표면에서는 하늘이 호스트 SED 때문에 지구보다 살짝 더 차갑게 이동한 옅은 워시드-아웃 청-백 (<span class=\"hex-chip\" style=\"background:#7a7068\"></span><code>#7a7068</code>) 입니다. 한낮은 어둑함 — 조명은 지구 태양 조사량의 ~27% 로, 두껍게 흐린 지구의 하루와 거의 같습니다. 호스트 별은 f 의 하늘에서 0.317° 를 채우며 (지구에서 본 태양의 60% 정도) 작은 옅은 노랑 원반으로 보입니다. TRAPPIST-1 e 의 거주자가 볼 적-주황 태양보다 한참 덜 위압적입니다.",
  "p_191":"<b>flare 변조 없음.</b> inner-edge M 왜성 HZ 행성들과 달리 f 는 XUV flare 이벤트를 보지 않습니다. 호스트의 log R&#x27;HK = −4.95 는 지금까지 서베이된 G 왜성 중 가장 비활성인 부류에 들고, 따라서 대기 화학은 다-Myr 시간 척도로 안정적이며 에피소드 광화학 충격이 없습니다.",
  "h2_192":"Rotation &amp; spin synthesis",
  "p_193":"τ Ceti f 는 <b>조석 고정되지 않습니다</b>. 0.78 M☉ 호스트 주위 P = 636 d, a = 1.334 AU 에서 조석 고정 시간 척도 (Vinson 2017 공식, τ_lock ∝ a^6 / (M_p × Q × R_p^5)) 는 시스템 나이 7 Gyr 보다 편안하게 길며 — spin damping 이 작동할 시간이 없었습니다. 행성은 미지의 속도로 자전하며 cfg 는 지구형 ~24 h 일을 기본값으로 둡니다. 다주 자전 주기 (outer-HZ super-Earth 의 전형적 원시 spin 주기, Heller 2011) 도 가능하지만 관측으로 제약할 수 없습니다.",
  "p_194":"이심률 e = 0.16 은, 만약 행성이 초기 진화에서 3:2 spin-orbit 공명에 포획되었다면 그 공명이 안정했을 만큼 충분히 높습니다. 관측 증거 없이는 cfg 가 더 단순한 비동기 빠른 자전자 가정을 채택합니다.",
  "p_195":"<b>KSP 구현 노트.</b> 조석 고정이 없으므로 <code>rotationPeriod</code> 는 <code>period</code> 에 일치할 필요가 없습니다. 게임플레이상의 이유가 다른 값을 선호하지 않는 한 기본값 24 시간 (86 400 s) 으로 둡니다.",
  "p_196":"<b>Obliquity.</b> Tie-break 기본값으로 지구형 23° 채택 — 제약 없음, 선호 방향 없음. 약한 계절 강제 (이심 궤도에 걸쳐 조사량이 ~±9% 변동) 만이 유일한 &quot;계절&quot; 사이클이며, S = 0.27 S⊕ 에서 표면 온도 응답은 둔합니다 (≲ 4 K).",
  "p_197":"<b>자기 dynamo 기대치.</b> 다주 자전을 가진 4–5 M⊕ 암석체는 적당한 dynamo 를 지지할 수 있습니다. RM22 스케일링은 이 파라미터 조합에서 표면 자기장 강도를 ~25 μT (~0.5× 지구) 로 줍니다. 직접 제약 없음. 시각 cfg 의 중심 요소 아님.",
  "h2_198":"Visual styling",
  "li_199":"<b>전구 외관.</b> 빙하 흐름, 다각형 균열, 충돌구로부터의 은은한 표면 텍스처를 가진 옅은 크림-흰 snowball. 대기는 10–15 km 두께의 희미한 청-그레이 림 안개로 거의 보이지 않습니다. 시각 캐릭터는 살짝 더 큰 Europa 나 외태양계 Pluto-Charon variant 에 가장 가깝 습니다 — 지형 디테일을 가진 얼음 우세 세계.",
  "li_200":"<b>Dayside 디테일.</b> 전구 얼음 외피의 압력 능선과 균열이 PQS 해상도에서 보이고, M 왜성 가열이 조용한 G8V 조명으로 대체되는 곳은 따뜻한 크림 (깨끗한 거의 흰색, 황토 편이가 덜함). 조석/ 방사성 플럭스가 높은 영역 근처에 cryovolcanic 분출 가능 (희박, 표면 ≪ 1%).",
  "li_201":"<b>Terminator 밴드.</b> 얼음과 그림자가 뚜렷이 대비됩니다 — cryovolcanic 봉우리, 충돌구 림, 압력 능선에서 긴 그림자. 얇은 대기는 최소 산란만 일으켜 terminator 전이는 지구의 그것보다 더 또렷합니다.",
  "li_202":"<b>Nightside 외관.</b> 어두움. 별빛이 얼음에 반사되는 아주 희미한 cyan-white 광택. KSP nightside 환경광 ≈ dayside 의 0.5%.",
  "li_203":"<b>대기 안개.</b> 희미한 옅은 청-그레이 (<span class=\"hex-chip\" style=\"background:#7a7068\"></span><code>#7a7068</code>) 림 글로우 ~10 km 두께 — 지구의 푸른 림보다 훨씬 희미. 대기 질량이 지구의 1% 이고 호스트 SED 가 태양보다 청색 플럭스가 적기 때문.",
  "li_204":"<b>희미한 오로라.</b> 드문 호스트 자기장 교란 이벤트에 ~1 kR 의 녹색 톤이 살짝 들어간 확산 극지 오로라 가능. 정의적 시각 피처로 애니메이션 처리하지 않음.",
  "li_205":"<b>하늘의 별.</b> τ Ceti 는 f 표면에서 0.317° 를 채웁니다 — 지구에서 본 태양의 60% 의 작은 옅은 노랑 원반. 표면 조명은 두껍게 흐린 지구의 하루나 맑은 날의 황혼과 비슷하며, 스펙트럼 피크는 태양 보다 살짝 더 차갑게 이동.",
  "li_206":"<b>하늘의 자매 행성들.</b> g (안쪽 다음) 는 합 위치에서 각지름 ~0.04° (밝은 &quot;샛별&quot; 점으로 보임). h 도 ~0.04°. 긴 궤도 주기 때문에 합 이벤트는 드뭅니다. ≥ 6 AU 의 차가운 잔해 원반은 f 궤도 <i>바깥</i>에 있고 하늘에서 희미한 호박-그레이 띠로 보입니다.",
  "h2_207":"Bibliography",
  "h3_208":"Read (visual-informative, drove decisions above)",
  "li_209":"<b>Feng F. et al. 2017</b> — <i>Color difference makes a difference: four planet candidates around τ Ceti</i>, AJ 154, 135 (<code>2017AJ....154..135F</code>, arXiv:1708.02051). 발견 + f 궤도 (P = 636.13 ± 11.7 d), 질량 (Msini = 3.93 ± 1.05 M⊕), 이심률 (0.16), 호스트 질량 (0.783 ± 0.012 M☉) 의 최선 제약. 모든 궤도 및 물리 Decisions 행을 정박.",
  "li_210":"<b>Feng F. et al. 2018</b> — <i>Detection limits on τ Ceti&#x27;s planet system from HARPS RV</i>, A&amp;A 613, A76 (<code>2018A&amp;A...613A..76F</code>, arXiv:1801.05415). 확장된 HARPS 데이터셋으로 4-행성 시스템 재검토. 636 d 신호 안정적. NEA 의 controversial 플래그는 지속되는 amplitude-to-noise 우려를 반영.",
  "li_211":"<b>Wordsworth &amp; Pierrehumbert 2015</b> (general atmospheric-escape argument) — f 에 채택한 0.1 bar N₂ / 미량 CO₂ 2차 대기의 일반 대기-유지 참조로 사용. 구체적 제목은 핀하지 않음.",
  "li_212":"<b>Kopparapu R. K. et al. 2014</b> — <i>Habitable zones around main-sequence stars</i>. Teff = 5344 K G8V 의 outer-edge maximum-greenhouse 한계는 S ≈ 0.36 S⊕. 0.26 S⊕ 의 f 는 명확히 바깥.",
  "li_213":"<b>Pierrehumbert R. T. 2011</b> — <i>Hydrology, climate and physical state of cold outer-HZ super-Earths</i>. snowball 얼음 동역학 템플릿. 전구 얼음 덮개의 bond albedo ~0.5.",
  "h3_214":"Read (context / methodology, not directly decision-driving)",
  "li_215":"<b>MacGregor M. A. et al. 2016</b> — <i>τ Ceti debris disk ALMA imaging</i>, ApJ 828, 113 (<code>2016ApJ...828..113M</code>). 원반면 경사 ~35°, Lawler et al. 2014 (Herschel) 에서 가져온 값 — f 궤도면 기본값으로 채택 (Feng 2017 도 공면 가정).",
  "li_216":"<b>Tuomi M. et al. 2013</b> — <i>Signals embedded in the radial velocity noise: τ Ceti 5-planet claim</i>, A&amp;A 551, A79 (<code>2013A&amp;A...551A..79T</code>). 초기 5-행성 검출. Feng 2017 가 4개 (e/f/g/h) 를 유지하고 1개 (구 라벨링의 b) 를 떨어뜨림. controversial 플래그 이력 이해에 유용.",
  "li_217":"<b>Owen J. E. &amp; Wu Y. 2017</b> — <i>The evaporation valley</i>. sub- Neptune envelope 유지 vs. 질량 프레임워크 — f 의 sub-Earth bulk density 에 대한 휘발성 풍부 해석을 지지.",
  "li_218":"<b>Vinson A. M. &amp; Hansen B. M. S. 2017</b> — <i>Spin-orbit dynamics of habitable-zone planets</i>. 3:2 vs. 1:1 포획 확률. P = 636 d 의 f 는 비동기 자전자 영역.",
  "li_219":"<b>Bolmont E. et al. 2020</b> — <i>Tidal evolution of compact planetary systems</i>. Maxwell-viscoelastic 조석 가열. f 의 적당한 e = 0.16 가 1.33 AU 에서 ~0.01 W/m² 추정 플럭스.",
  "h3_220":"Read (instrument / non-cfg-decisive)",
  "li_221":"<b>Pavlenko Y. V. et al. 2012</b> — 호스트 별 [Fe/H] = −0.55, log R&#x27;HK = −4.95, Teff = 5344 K. 세 행성 모두의 호스트 맥락 견인.",
  "li_222":"<b>Schmitt J. H. M. M. et al. 1985</b> — 호스트 X 선 log L_X ≤ 26.5 cgs. &quot;XUV 구동 탈출 없음&quot; 프레이밍 견인.",
  "h3_223":"Not read — no arXiv preprint or low-priority (~15 papers)",
  "li_224":"<b>Tuomi 2013 erratum</b> — Tuomi 2014 (<code>2014MNRAS.441.1545T</code>) 가 잡음 모델 정제. Feng 2017 로 대체.",
  "li_225":"<b>SETI/레이저-탐색/technosignature 논문 다수</b> — 행성에 대한 cfg 관련성 없음.",
  "li_226":"<b>천체생물학 추측 리뷰</b> — 일반적으로 f 를 &quot;거주가능&quot; 보다는 &quot;marginal&quot; 범주에 두며 개별적으로 cfg 결정적이지 않음.",
  "h2_227":"Open items for follow-up",
  "li_228":"<b>Controversial 플래그 (<code>pl_controv_flag = 1</code>).</b> Feng 2017 세 행성 모두 NEA 에서 disputed 로 플래그됩니다. cfg 는 이들을 존재 하는 것으로 다루고 그에 맞게 합성하지만, Phase 2 / Phase 3 후속이 Lubin 2024 나 미래 ESPRESSO RV 재분석이 636 d 신호를 확인할지 철회할지 모니터링해야 합니다. 철회되면 이 Phase 3 마크다운은 삭제가 아니라 archive 되어야 합니다.",
  "li_229":"<b>실제 질량.</b> Msini = 3.93 ± 1.05 M⊕ 가 측정량입니다. 실제 질량은 미지의 궤도 경사 i 에 의존. cfg 는 τ Ceti 잔해 원반면 (공면 가정) 에서 i ≈ 35° 를 채택해 실제 질량 ≈ 6.8 M⊕ 를 얻음. 미래 astrometric 검출 (Gaia DR4 binary 카탈로그) 이 i 를 제약해 실제 질량을, 따라서 f 의 sub-Neptune vs. super-Earth bulk 분류를 옮길 수 있음.",
  "li_230":"<b>반지름은 가정 값, 측정 아님.</b> DB 는 sub-Neptune mass–radius 관계에서 반지름 1.81 R⊕ 를 저장. f 는 transit 하지 않아 아래쪽 으로는 미제약. 실제 질량이 더 크고 (sin i &lt; 0.7) 행성이 두꺼운 envelope 의 sub-Neptune 이 아닌 얇은 얼음의 암석체라면, R 은 1.4 R⊕ 까지 낮아질 수 있고 ρ ≈ 8 g/cc.",
  "li_231":"<b>사용자 입력. P=4562 d / 5 AU &quot;h-후보&quot;.</b> 이 합성에 대한 사용자 요청은 τ Cet h 를 P = 4562 d, a ≈ 5.0 AU (소행성-analog 벨트 안쪽 가장자리 근처) 로 묘사했습니다. DB 의 권위 있는 h 는 P = 49.41 d / a = 0.243 AU. 4562 d 후보는 Feng 2018 §3.4 의 장주기 신호 또는 이후 (Lubin 2024) 후보 중 DB 가 ingest 하지 않은 것일 가능성. 큐레이션 질문은 <code>db/systems/tau_cet.json</code> 의 Open item 에 로깅됨. 이 Phase 3 합성은 f 를 1.33 AU 의 <i>가장 바깥쪽</i> 현재-DB 행성으로 다루며 DB 와 일치.",
  "li_232":"<b>맨 암석 무대기 cfg variant.</b> 대안적 해석은, f 가 휘발성 envelope 을 완전히 잃었을 가능성 (호스트의 노년 시기 거대 충돌로 인해). 맨 암석 variant 는 G8V 조명 아래 노출된 규산염 기반암과 풍화 패턴, 대기 안개 없음, 더 또렷한 terminator 를 보일 것. Open item 의 cfg variant 로 보존. canonical 픽은 아님.",
  "li_233":"<b>Sub-glacial 해양 cfg 디테일.</b> 미래의 (super-Earth 영역으로 확장된) Europa급 내부 모델이 매장 액체층을 확인하면, cfg 는 열 플럭스가 높은 영역 근처에 cryovolcanic 분출 Region 패턴을 추가할 수 있습니다. 현재는 Confidence=low 피처로 다루며 애니메이션 처리 안 함.",
  "h2_234":"Related",
  "li_235":"<a href=\"tau-cet.md\">tau-cet</a> — 호스트 별 Phase 3 (G8V metal-poor. 조용함, 늙음, 잔해 원반 보유)",
  "li_236":"<a href=\"tau-cet-g.md\">tau-cet-g</a> — 안쪽 자매. 뜨거운 맨 암석",
  "li_237":"<a href=\"tau-cet-h.md\">tau-cet-h</a> — 안쪽-중간 자매. Venus-analog",
  "li_238":"<a href=\"../reference/methodology.md\">methodology</a> — Decisions 스키마",
  "li_239":"<a href=\"../reference/rex-data-comparison.md\">rex-data-comparison</a> — §6 이 호스트 Phase 3 에서 참조한 τ Ceti e 큐레이션 갭을 문서화",
  "title":"τ Ceti f — Phase 3 Synthesis",
  "back_db": "← 데이터베이스로",

  }
};

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
