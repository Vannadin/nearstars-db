  "h2_94":"Surface synthesis",
  "p_95":"Barnard&#x27;s photosphere is among the dimmest in the NearStars catalog — 0.003558 L☉, 0.187 R☉, Teff 3195 K — making it about 1/280 of the Sun in bolometric power. At M4 V it sits two subtypes hotter than Proxima (M5.5V, 2980 K) and two cooler than HD 69830 / 61 Vir analogs, with a visible-band SED still dominated by TiO and VO molecular bands but already showing a more &quot;open&quot; pseudocontinuum than the deeper-red M5–M7 regime. The sub-solar [Fe/H] = −0.15 marginally weakens the TiO band depth versus a solar-metallicity M4, contributing to a slightly bluer continuum tint — the cfg&#x27;s <span class=\"hex-chip\" style=\"background:#bd4a2c\"></span><code>#bd4a2c</code> is offset toward brighter red-orange rather than the deeper red-brown of metal-rich M4 V references.",
  "p_96":"CHARA interferometric limb darkening (Rains 2021) constrains the radius to 0.5% precision but does not directly resolve the limb-darkening exponent in H band. The cfg adopts α ≈ 0.4 as a tie-break from the Claret 2018 PHOENIX grid interpolation; the actual profile depends on chromospheric filling that is poorly modeled in 1D atmospheres at this Teff. Cristofari 2024&#x27;s SPIRou NIR spectrum identifies &gt; 18 000 absorption features in the observed data but only ~6 800 in the matching PHOENIX-ACES model, a 2.7× discrepancy that underlines persistent M-dwarf atmosphere-model incompleteness.",
  "p_97":"Granulation simulations have not been performed at the resolution needed for in-game close-up rendering; M-dwarf granulation cells should scale to ~20–30 km across at this pressure scale height, slightly larger than Proxima&#x27;s but smaller than mid-M solar-analog references. Spot coverage during the activity cycle has not been directly TiO-band-modeled for Barnard owing to the low activity level; in-game spot fraction should remain at the 1–2% upper bound consistent with the Toledo-Padrón 2019 rotational modulation amplitude.",
  "h2_98":"Atmosphere synthesis",
  "p_99":"Barnard&#x27;s chromosphere and corona are the quietest among all well-studied M4 dwarfs. log R&#x27;HK = −5.69 (Toledo-Padrón 2019) places it more inactive than the modern Sun (log R&#x27;HK ≈ −4.9), and the chromospheric activity-induced RV signal at the 145-d rotation period has an upper limit of just 1 m s⁻¹ — small enough that the same paper recovered the rotation only through joint multi-spectrograph analysis of 14.5 years of data. The chromospheric Hα profile sits in mild absorption rather than emission, contradicting the legacy &quot;Ve&quot; classification adopted in some catalogs; the cfg uses &quot;M4.0 V&quot; accordingly.",
  "p_100":"The corona is faint. France et al. 2020 (Mega-MUSCLES) obtained contemporaneous HST STIS/COS and Chandra ACIS-S spectra and detected three discrete flares (two in FUV, one in X-ray) in a combined exposure of ~50 ks — yielding the headline 25% flare duty cycle. The quiescent X-ray luminosity is at the lower end of the M-dwarf locus (log L_X ~ 25.5 cgs, conservatively); during the flaring state it rises to log L_X ~ 27.5 with individual event energies of ~10²⁹·² erg over decay timescales of order 5000 s. The cfg encodes both the quiescent and flare-peak rates, plus the duty cycle, so downstream Kerbalism radiation-environment routines can sample the time-averaged exposure.",
  "p_101":"The XUV environment is more demanding for hypothetical habitable-zone planets than the optical activity suggests. Duvvuri 2021 reconstructed the EUV (100–912 Å) spectrum via differential emission measure modeling, finding a quiescent integrated flux of 0.018 erg cm⁻² s⁻¹ at 1 AU and a flaring flux of 0.146 erg cm⁻² s⁻¹ (~8× boost). France 2020 propagated these fluxes through a thermal + ion-loss escape model for a hypothetical unmagnetized terrestrial planet at the HZ (0.1 AU), finding that the quiescent XUV alone produces atmospheric heating rates comparable to modern-Earth solar maximum — <i>not</i> catastrophic. But integrated over the 25% flare duty cycle, the cumulative loss is ~87 Earth atmospheres Gyr⁻¹ (thermal hydrodynamic escape) + ~3 Earth-atm Gyr⁻¹ (ion-pickup escape). For the inner-system planets at a = 0.019–0.038 AU, these rates scale up by another 7–28× — a strong constraint against any retained primary atmosphere.",
  "p_102":"The magnetic field has been characterized in Stokes V (circular polarization) by the SPIRou Legacy Survey since 2018. Cristofari 2024 notes the existence of detailed magnetic measurements but does not itself extract the dipole strength; Reiners 2022 CARMENES Zeeman-broadening estimates point to a mean surface field of order 200 G — modest by M-dwarf standards (Proxima reaches ~4 kG; younger mid-M&#x27;s like AU Mic exceed 1 kG). The ordered dipole component inferred from spectropolarimetry is even smaller, consistent with the old age and slow rotation.",
  "h2_103":"Rotation &amp; spin synthesis",
  "p_104":"The 145 ± 15-d rotation period (Toledo-Padrón 2019) is among the longest measured for any field M dwarf and is the dynamical signature of 10 Gyr of magnetic braking. González Hernández 2024 independently recovers the period at 140 d in ESPRESSO chromospheric indicators plus its second harmonic at 71 d, in good agreement. The slow rotation reinforces the kinematic age estimate via the standard Newton 2018 / Engle 2018 gyrochronology relations for old M dwarfs.",
  "p_105":"The activity cycle of 10 ± 2 yr (Toledo-Padrón 2019) or 3200 d ≈ 8.8 yr (González Hernández 2024) modulates both the chromospheric activity indices and the long-term mean RV by a few m s⁻¹. The cycle is Sun-like in duration but driven by a much weaker dynamo, and its amplitude is consistent with the slow-rotator regime predicted by Reiners &amp; Mohanty 2012.",
  "p_106":"No asteroseismic oscillations have been detected in Barnard — the surface gravity is too high and the convective amplitudes too low, as for all M dwarfs. Differential rotation has not been resolved; inclination of the rotation axis is unconstrained.",
  "h2_107":"Visual styling",
  "p_108":"Barnard renders as a deep red M4 V in NearStars — the photospheric tint <span class=\"hex-chip\" style=\"background:#bd4a2c\"></span><code>#bd4a2c</code> sits between Proxima&#x27;s <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> deeper red and the warmer red-orange of mid-M references like the GJ 1214 / AU Mic analogs. The sub-solar [Fe/H] = −0.15 nudges the visible continuum slightly toward orange relative to a solar-metallicity M4 by weakening the TiO and VO molecular-band absorption that would otherwise dominate the 5500–7000 Å region.",
  "p_109":"The star is small in absolute angular size but large from each of its close-in planets: at d&#x27;s 0.0188 AU it subtends 5.3°, at b&#x27;s 0.0229 AU 4.3°, at c&#x27;s 0.0274 AU 3.6°, at e&#x27;s 0.0381 AU 2.6°. From all four, the star fills 5–10× the apparent angular diameter of the Sun seen from Earth — a constant dim red disk dominating the daylight sky.",
  "p_110":"Flares are visible but infrequent compared to Proxima. The France 2020 25% duty cycle implies ~1 detectable flare per 4 days of continuous observation in HST/Chandra-sensitive bands, but the individual flare energies are below the threshold that would produce a strong visible-band brightening at the star. The cfg&#x27;s <code>visual_flare_color_hex = #ff5e36</code> shifts color slightly toward orange during peak emission, mimicking the modest Hα + blue continuum brightening; intensity is markedly lower than the Proxima analog. Superflares (≥ 10³³ erg) have not been documented for Barnard, and the cfg does not include a separate superflare entry — the existing flare cfg covers the observed energy distribution.",
  "p_111":"The corona is rendered as a very faint blue-white halo, brightening slightly during the X-ray-bright phases of the 10-year cycle. The extended FUV flux dominates the high-energy SED but is invisible to unaided observation; in-game effects are limited to ambient illumination color shifts during flares and visible Hα brightening on the stellar disk.",
  "h2_112":"Bibliography",
  "h3_113":"Read (visual-informative, drove decisions above)",

  "li_115":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). MAROON-X confirmation of b, c, d, e at 30 cm/s precision; full 4-planet orbital + mass table.",
  "li_116":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star: very slow rotation and evidence for long-term activity cycle</i> (<code>2019MNRAS.488.5145T</code>, arXiv:1812.06712). P_rot = 145 ± 15 d; 10-yr cycle; log R&#x27;HK; age estimate.",
  "li_117":"<b>Cristofari P. et al. 2024</b> — <i>Comprehensive High-resolution Chemical Spectroscopy of Barnard&#x27;s Star with SPIRou</i> (arXiv:2310.12125). T_eff = 3231 ± 21 K alt fit; 15-element abundances; SPIRou spectropolarimetry baseline for B-field.",
  "li_118":"<b>Duvvuri G. et al. 2021</b> — <i>Reconstructing the Extreme Ultraviolet Emission of Cool Dwarfs Using Differential Emission Measure Polynomials</i> (arXiv:2102.08493). DEM EUV reconstruction; Barnard quiescent and flare EUV fluxes.",
  "li_119":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). Mega-MUSCLES HST + Chandra; 25% flare duty cycle; atmospheric loss rates at HZ.",
  "li_120":"<b>Mann A. W. et al. 2015</b> — <i>How to Constrain Your M Dwarf</i> (<code>2015ApJ...804...64M</code>, arXiv:1501.01635). M–K mass relation; DB recommended mass.",
  "li_121":"<b>Rains A. D. et al. 2021</b> — <i>Characterization of 92 southern TESS candidate planet hosts</i> (<code>2021MNRAS.504.5788R</code>, arXiv:2102.08133). CHARA interferometric radius for Barnard.",
  "li_122":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i> (<code>2012ApJ...757..112B</code>, arXiv:1208.2431). Independent interferometric R + Teff confirmation.",
  "li_123":"<b>Marfil E. et al. 2021</b> — <i>The CARMENES search for exoplanets around M dwarfs: Stellar atmospheric parameters</i> (<code>2021A&amp;A...656A.162M</code>, arXiv:2110.07329). [Fe/H] = −0.15.",
  "h3_124":"Read (context / methodology, not decision-driving)",
  "li_125":"<b>Lubin J. et al. 2021</b> — <i>Stellar Activity Manifesting at a One-year Alias Explains Barnard b as a False Positive</i> (<code>2021AJ....162...61L</code>; no arXiv). Refutes Ribas 2018 super-Earth. Cited via abstract.",
  "li_126":"<b>Ribas I. et al. 2018</b> — <i>A candidate super-Earth planet orbiting near the snow line of Barnard&#x27;s star</i> (<code>2018Natur.563..365R</code>, arXiv:1811.05955). Historical claim, refuted; preserved for literature continuity.",
  "li_127":"<b>Stefanov A. K. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i> (arXiv:2410.00577). Companion to González Hernández 2024 ruling out transits.",
  "li_128":"<b>Choi J. et al. 2013</b> — <i>Precise Doppler Monitoring of Barnard&#x27;s Star</i> (arXiv:1208.2273). Long-baseline RV constraints; pre-discovery upper limits.",
  "li_129":"<b>Paulson D. B. et al. 2006</b> — <i>Optical Spectroscopy of a Flare on Barnard&#x27;s Star</i> (arXiv:astro-ph/0511281). Single flare event characterization.",
  "li_130":"<b>Kürster M. et al. 2003</b> — <i>Low-level RV variability in Barnard&#x27;s Star</i> (arXiv:astro-ph/0303528). Secular acceleration + activity signatures.",

  "h3_132":"Read (instrument-only, not visual-informative)",

  "p_136":"The Barnard bibliography is large because of the star&#x27;s long history as a planet-search benchmark and its proximity. The skipped pool includes:",
  "li_137":"Pre-2000 spectral-type confirmations and proper-motion measurements",

  "h2_143":"Open items for follow-up",
  "li_144":"<b>Magnetic-field dipole strength via Stokes V</b>: Cristofari 2024 uses SPIRou polarimetric data but does not extract the longitudinal field. A targeted ZDI (Zeeman Doppler Imaging) analysis on the same data set would tighten the cfg <code>magnetic_total_field_G_mean</code> entry, currently a tie-break at 200 G.",
  "li_145":"<b>Lubin 2021 not fetched</b>: The canonical refutation of Ribas 2018 has no arXiv preprint. A user-pasted abstract or full text would let us upgrade the discussion of Ribas 2018 from &quot;abstract-cited&quot; to &quot;deep-read.&quot;",
  "li_146":"<b>Flare-rate calibration</b>: France 2020 reports a 25% duty cycle from one HST + Chandra epoch — a single observation snapshot. The cfg <code>flare_rate_per_day_total = 0.1</code> is a tie-break. TESS sector monitoring of Barnard could refine this if photometric sensitivity reaches the ~10²⁹-erg flare regime.",
  "li_147":"<b>Phase 3 metallicity range</b>: Marfil 2021 reports −0.15 ± 0.16 dex; Cristofari 2024 prefers ~ −0.5 dex as PHOENIX model input; Duvvuri 2021 adopts Ribas −0.32. A homogenized re-derivation across optical + NIR with consistent assumptions could narrow the range.",
  "li_148":"<b>Spot covering fraction</b>: in-game spot rendering currently uses the 1–2% photometric upper bound. A direct TiO-band-depth modulation analysis (Berdyugina 2017 framework) would refine the cycle-modulated coverage.",
  "li_149":"<b>DB spectral-type &quot;M4.0 Ve&quot;</b>: the legacy classification with the emission qualifier conflicts with the deeply inactive log R&#x27;HK and Hα-in-absorption profile. Recommend updating the DB to &quot;M4.0 V&quot;; the cfg drops the &quot;e&quot; already.",

  ko: {
  "p_1":"Barnard&#x27;s Star (GJ 699, HIP 87937) 는 태양으로부터 두 번째로 가까운 항성계로, α Centauri 삼중계 다음 1.828 pc 거리에 있습니다 (Gaia DR3 시차 547.0 ± 0.04 mas). 단독 M4.0 V 왜성이며 질량 0.161 ± 0.006 M☉ (Mann 2015 M–K 보정), 반지름 0.1868 ± 0.0011 R☉ (Rains 2021 CHARA 간섭계), 유효온도 3195 ± 28 K (González Hernández 2024 SED + 볼로미터릭 플럭스) 를 가집니다. 알려진 별 가운데 가장 큰 고유운동 (연 10.3 초각) 과 −110 km/s 의 시선속도를 보이는 운동학은 이 별을 명백히 은하 헤일로 인구에 위치시킵니다. Toledo-Padrón 외 2019 는 헤일로 멤버십에서 도출한 운동학적 나이를 10 ± 2 Gyr 로 추정하는데, 이는 Barnard 를 10 pc 이내에서 가장 오래된 별 중 하나로 만듭니다.",
  "p_2":"이 시스템에는 길고 복잡한 행성 탐색 역사가 있습니다. 1960–80 년대 Van de Kamp 의 astrometric 캠페인이 목성급 동반자를 주장했지만 확인되지 않았고, Ribas 외 2018 은 HARPS RV 앙상블에서 0.4 AU·233 일 주기의 super-Earth &quot;b&quot; 를 보고했지만 Lubin 외 2021 이 항성 활동의 1년 alias 로 반박했습니다. 현재 행성 목록은 González Hernández 외 2024 의 ESPRESSO 발견 — P = 3.15 d 의 sub-Earth, 완전히 다른 천체에 &quot;b&quot; 라벨을 재사용 — 과 Basant 외 2025 의 MAROON-X 확인 (후보 c, d, e 의 격상) 에 근거합니다. 네 행성 모두 단주기 (P &lt; 7 d), sub-Earth Msini 이며, 보수적 거주 가능 영역 안쪽 가장자리보다 한참 안쪽에 자리합니다 (Kopparapu 2014 의 inner HZ ≈ 0.1 AU, 이 항성 질량에서 P ≈ 10 d 에 해당).",
  "p_3":"활동도는 Barnard 의 결정적 항성 특징입니다. M4 왜성 중에서도 예외적으로 조용해서, log R&#x27;HK = −5.69 (Toledo-Padrón 2019) 는 활동 극소기의 태양보다 더 비활동적이며, 회전 주기는 145 ± 15 d 로 길고, 장기 자기 사이클은 10 ± 2 yr 로 González Hernández 2024 가 3200 d 에서 독립적으로 회수합니다. 그럼에도 Mega-MUSCLES 프로그램 (France 외 2020) 은 단일 HST + Chandra 캠페인에서 FUV 2건과 X선 1건의 flare 를 탐지했고, 이는 약 25% 의 flare 듀티 사이클을 의미합니다. 이 나이의 별로서는 높지만, 개별 flare 에너지 (~10²⁹·² – 10²⁹·⁵ erg) 는 Proxima 의 super-flare 영역보다 수 자리수 작습니다. France 2020 은 <i>정상상태</i> XUV 출력이 현대 지구의 태양 극대기와 비슷해서 대기 가열률이 파국적이지 않다고 결론짓지만, 25% 듀티 사이클을 적분한 누적 손실은 열적 하이드로다이내믹 escape 로 약 87 지구대기 Gyr⁻¹, 이온 픽업 escape 로 약 3 지구대기 Gyr⁻¹ 입니다. 이들의 헤드라인 — &quot;habitable at last?&quot; — 은 진정한 긴장을 포착합니다. Barnard 는 오래되고 조용한 M 왜성의 벤치마크이지만, 10 Gyr 누적 flare 환경은 여전히 대기를 침식합니다.",
  "p_4":"<b>NearStars 시나리오 선택. 145 일 회전, 약 200 G 의 모데스트한 표면 자기장, 양호한 정상상태 XUV 환경, 그리고 낮은 (~25%) flare 듀티 사이클을 ~10 년 사이클로 변조하는 헤일로-노쇠 M4 V 딥 레드 왜성입니다. 시각 스타일링은 차가운 3195 K 연속체, 금속성 부족이 금속이 풍부한 M4 대비 분자 밴드를 약간 푸르게 만드는 효과, 그리고 네 개의 뜨거운 암석 행성이 가까이서 받는 어둑한 조명을 강조합니다.</b> 17 cfg 픽 중 12 는 canonical-aligned, 5 는 tie-break 입니다 (X선 정상상태 수준, 자기장 RMS, 시각 hex 색상, flare 빈도 정규화, limb darkening 지수). 문서화된 divergence 는 없습니다.",

  "h2_94":"Surface synthesis",
  "p_95":"Barnard 의 광구는 NearStars 카탈로그에서 가장 어두운 편에 속합니다. 0.003558 L☉, 0.187 R☉, Teff 3195 K 로 볼로미터릭 출력은 태양의 약 1/280 입니다. M4 V 로서 Proxima (M5.5V, 2980 K) 보다 두 서브타입 더 뜨겁고 HD 69830 / 61 Vir 류 analog 보다 두 단계 더 차갑습니다. 가시 영역 SED 는 여전히 TiO 와 VO 분자 밴드가 지배하지만, 더 깊은 빨강의 M5–M7 영역보다 &quot;열린&quot; pseudocontinuum 을 이미 보입니다. sub-solar [Fe/H] = −0.15 는 태양 금속성 M4 대비 TiO 밴드 깊이를 약간 약화시키며, 이는 더 푸른 연속체 톤에 기여합니다. cfg 의 <span class=\"hex-chip\" style=\"background:#bd4a2c\"></span><code>#bd4a2c</code> 는 금속성이 풍부한 M4 V 의 더 깊은 빨강-갈색이 아닌 밝은 빨강-오렌지 쪽으로 편향됐습니다.",
  "p_96":"CHARA 간섭계 limb darkening (Rains 2021) 은 반지름을 0.5% 정밀도로 제약하지만 H 밴드 limb darkening 지수를 직접 분해하지는 않습니다. cfg 는 Claret 2018 PHOENIX grid 보간에서 가져온 α ≈ 0.4 를 tie-break 으로 채택합니다. 실제 프로파일은 이 Teff 의 1D 대기에서 잘 모델링되지 않는 색채권 filling 에 의존합니다. Cristofari 2024 의 SPIRou NIR 스펙트럼은 관측 데이터에서 18000 개 이상의 흡수 특징을 식별했지만 대응하는 PHOENIX-ACES 모델에서는 약 6800 개만 식별되며, 이 2.7× 격차는 지속적인 M 왜성 대기 모델 불완전성을 강조합니다.",
  "p_97":"게임 내 초근접 렌더링에 필요한 해상도의 granulation 시뮬레이션은 수행되지 않았습니다. M 왜성 granulation 셀은 이 압력 스케일 높이에서 ~20–30 km 너비로 스케일되어야 하며, 이는 Proxima 보다 약간 크지만 중간 M 태양 analog 보다는 작습니다. 활동 사이클 동안 흑점 면적은 낮은 활동 수준 때문에 Barnard 에 대해 직접 TiO 밴드 모델링되지 않았습니다. 게임 내 흑점 비율은 Toledo-Padrón 2019 회전 변조 진폭과 일관된 1–2% 상한에 머물러야 합니다.",
  "h2_98":"Atmosphere synthesis",
  "p_99":"Barnard 의 색채권과 코로나는 잘 연구된 모든 M4 왜성 중 가장 조용합니다. log R&#x27;HK = −5.69 (Toledo-Padrón 2019) 는 현대 태양 (log R&#x27;HK ≈ −4.9) 보다도 비활동적인 수준이며, 145 d 회전 주기에서의 색채권 활동 유도 RV 신호는 상한이 단지 1 m s⁻¹ 입니다. 너무 작아서 같은 논문이 14.5 년의 멀티 분광기 결합 분석을 통해서야 회전을 회수할 수 있었습니다. 색채권 Hα 프로파일은 방출이 아닌 약한 흡수 상태이며, 일부 카탈로그에 채택된 legacy &quot;Ve&quot; 분류와 모순됩니다. cfg 는 이에 따라 &quot;M4.0 V&quot; 를 사용합니다.",
  "p_100":"코로나는 희미합니다. France 외 2020 (Mega-MUSCLES) 은 HST STIS/COS 와 Chandra ACIS-S 동시 스펙트럼을 얻어 약 50 ks 의 결합 노출에서 세 개의 개별 flare (FUV 2건, X선 1건) 를 탐지했고, 이로부터 헤드라인의 25% flare 듀티 사이클을 도출했습니다. 정상상태 X선 광도는 M 왜성 영역의 하단 (log L_X ~ 25.5 cgs, 보수적으로) 이며 flare 상태에서는 log L_X ~ 27.5 까지 상승해서 ~5000 s decay 시간 스케일에 걸쳐 개별 사건 에너지 ~10²⁹·² erg 를 보입니다. cfg 는 정상상태 + flare 피크 속도 및 듀티 사이클을 함께 인코딩해서, 하류의 Kerbalism 복사 환경 루틴이 시간 평균 노출을 샘플링할 수 있도록 합니다.",
  "p_101":"XUV 환경은 광학 활동도가 시사하는 것보다 가상의 거주 가능 영역 행성에 더 까다롭습니다. Duvvuri 2021 이 differential emission measure 모델링으로 EUV (100–912 Å) 스펙트럼을 재구성한 결과, 1 AU 에서의 정상상태 적분 플럭스는 0.018 erg cm⁻² s⁻¹, flare 플럭스는 0.146 erg cm⁻² s⁻¹ (~8× 부스트) 입니다. France 2020 은 이 플럭스를 HZ (0.1 AU) 의 가상 자기장 없는 지구형 행성에 열적 + 이온 손실 escape 모델로 전파한 결과, 정상상태 XUV 만으로는 대기 가열률이 현대 지구의 태양 극대기 수준 — <i>파국이 아닌</i> — 임을 발견했습니다. 그러나 25% flare 듀티 사이클에 걸쳐 적분하면 누적 손실은 ~87 지구대기 Gyr⁻¹ (열적 하이드로다이내믹 escape) + ~3 지구대기 Gyr⁻¹ (이온 픽업 escape) 입니다. a = 0.019–0.038 AU 의 내부 시스템 행성에 대해 이 속도는 단위 면적당 7–28× 더 커지며, 유지된 1차 대기에 대한 강한 제약이 됩니다.",
  "p_102":"자기장은 SPIRou Legacy Survey 가 2018 년부터 Stokes V (원편광) 으로 특성화해 왔습니다. Cristofari 2024 는 자세한 자기 측정의 존재를 언급하지만 종방향 자기장 자체를 추출하지는 않습니다. Reiners 2022 CARMENES Zeeman broadening 추정은 약 200 G 의 평균 표면장을 시사합니다 — M 왜성 기준으로는 모데스트한 수준이며 (Proxima 는 약 4 kG 에 도달, AU Mic 같은 어린 중간 M 은 1 kG 초과), 분광 폴라리메트리에서 추론한 ordered 쌍극자 성분은 더 작아서 노쇠한 나이와 느린 회전과 일관됩니다.",
  "h2_103":"Rotation &amp; spin synthesis",
  "p_104":"145 ± 15-d 회전 주기 (Toledo-Padrón 2019) 는 모든 field M 왜성에 대해 측정된 가장 긴 회전 주기 중 하나이며, 10 Gyr 자기 제동의 동역학적 서명입니다. González Hernández 2024 가 ESPRESSO 색채권 지표에서 주기를 140 d 로, 2차 고조파를 71 d 로 독립적으로 회수해 잘 일치합니다. 느린 회전은 표준 Newton 2018 / Engle 2018 noisy M 왜성용 자이로 크로놀로지 관계를 통해 운동학적 나이 추정을 강화합니다.",
  "p_105":"10 ± 2 yr 의 활동 사이클 (Toledo-Padrón 2019) 또는 3200 d ≈ 8.8 yr (González Hernández 2024) 는 색채권 활동 인덱스와 장기 평균 RV 를 수 m s⁻¹ 변조합니다. 사이클은 지속 시간 측면에서 태양과 비슷하지만 훨씬 약한 다이나모로 구동되며, 진폭은 Reiners &amp; Mohanty 2012 가 예측한 느린 회전자 영역과 일관됩니다.",
  "p_106":"Barnard 에서 asteroseismic 진동은 검출되지 않습니다. 모든 M 왜성과 마찬가지로 표면 중력이 너무 크고 대류 진폭이 너무 작기 때문입니다. 미분 회전은 분해되지 않았으며 회전축의 경사도 제약되지 않았습니다.",
  "h2_107":"Visual styling",
  "p_108":"Barnard 는 NearStars 에서 딥 레드 M4 V 로 렌더링됩니다. 광구 톤 <span class=\"hex-chip\" style=\"background:#bd4a2c\"></span><code>#bd4a2c</code> 는 Proxima 의 더 깊은 빨강 <span class=\"hex-chip\" style=\"background:#c54c2a\"></span><code>#c54c2a</code> 와 GJ 1214 / AU Mic analog 같은 중간 M 레퍼런스의 따뜻한 빨강-오렌지 사이에 위치합니다. sub-solar [Fe/H] = −0.15 는 5500–7000 Å 영역을 지배하는 TiO 및 VO 분자 밴드 흡수를 약화시킴으로써 가시 연속체를 태양 금속성 M4 대비 오렌지 쪽으로 약간 밀어냅니다.",
  "p_109":"별은 절대 각도 크기는 작지만 가까운 행성들에서는 큽니다. d 의 0.0188 AU 에서 5.3°, b 의 0.0229 AU 에서 4.3°, c 의 0.0274 AU 에서 3.6°, e 의 0.0381 AU 에서 2.6° 를 차지합니다. 네 행성 모두에서 별은 지구에서 본 태양의 5–10× 각지름을 채우며, 낮 하늘을 지배하는 일정한 어둑한 빨강 원반으로 보입니다.",
  "p_110":"Flare 는 Proxima 대비 가시적이지만 드뭅니다. France 2020 의 25% 듀티 사이클은 HST/Chandra 민감 밴드에서 연속 관측 4 일당 약 1 flare 의 검출 가능성을 의미하지만, 개별 flare 에너지는 가시 영역에서 강한 brightening 을 일으키는 임계값 아래입니다. cfg 의 <code>visual_flare_color_hex = #ff5e36</code> 은 peak 방출 동안 색을 약간 오렌지 쪽으로 이동시켜 모데스트한 Hα + 푸른 연속체 brightening 을 흉내냅니다. 강도는 Proxima analog 보다 현저히 낮습니다. Superflare (≥ 10³³ erg) 는 Barnard 에 대해 문서화된 바 없으며, cfg 는 별도 superflare 항목을 포함하지 않습니다. 기존 flare cfg 가 관측된 에너지 분포를 커버합니다.",
  "p_111":"코로나는 매우 흐릿한 청백색 halo 로 렌더링되며 10 년 사이클의 X선 밝은 위상 동안 약간 밝아집니다. 확장된 FUV 플럭스가 고에너지 SED 를 지배 하지만 맨눈 관측에는 보이지 않습니다. 게임 내 효과는 flare 동안의 주변광 색 이동과 항성 디스크의 가시 Hα brightening 으로 제한됩니다.",
  "h2_112":"Bibliography",
  "h3_113":"Read (visual-informative, drove decisions above)",
  "li_114":"<b>González Hernández J. I. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star</i> (<code>2024A&amp;A...690A..79G</code>, arXiv:2410.00569). 현재 Barnard b 의 ESPRESSO 발견. 회전 주기 140 d, 장기 사이클 3200 d, Ribas 2018 반박.",
  "li_115":"<b>Basant R. et al. 2025</b> — <i>Four Sub-Earth Planets Orbiting Barnard&#x27;s Star from MAROON-X and ESPRESSO</i> (<code>2025ApJ...982L...1B</code>, arXiv:2503.08095). 30 cm/s 정밀도의 b, c, d, e MAROON-X 확인. 전체 4-행성 궤도 + 질량 테이블.",
  "li_116":"<b>Toledo-Padrón B. et al. 2019</b> — <i>Stellar activity analysis of Barnard&#x27;s Star: very slow rotation and evidence for long-term activity cycle</i> (<code>2019MNRAS.488.5145T</code>, arXiv:1812.06712). P_rot = 145 ± 15 d, 10-yr 사이클, log R&#x27;HK, 나이 추정.",
  "li_117":"<b>Cristofari P. et al. 2024</b> — <i>Comprehensive High-resolution Chemical Spectroscopy of Barnard&#x27;s Star with SPIRou</i> (arXiv:2310.12125). T_eff = 3231 ± 21 K 대안 피팅, 15-원소 abundance, B-field 의 SPIRou 분광 폴라리메트리 기준선.",
  "li_118":"<b>Duvvuri G. et al. 2021</b> — <i>Reconstructing the Extreme Ultraviolet Emission of Cool Dwarfs Using Differential Emission Measure Polynomials</i> (arXiv:2102.08493). DEM EUV 재구성, Barnard 정상상태 및 flare EUV 플럭스.",
  "li_119":"<b>France K. et al. 2020</b> — <i>The High-Energy Radiation Environment Around a 10 Gyr M Dwarf: Habitable at Last?</i> (arXiv:2009.01259). Mega-MUSCLES HST + Chandra, 25% flare 듀티 사이클, HZ 에서의 대기 손실률.",
  "li_120":"<b>Mann A. W. et al. 2015</b> — <i>How to Constrain Your M Dwarf</i> (<code>2015ApJ...804...64M</code>, arXiv:1501.01635). M–K 질량 관계, DB recommended 질량.",
  "li_121":"<b>Rains A. D. et al. 2021</b> — <i>Characterization of 92 southern TESS candidate planet hosts</i> (<code>2021MNRAS.504.5788R</code>, arXiv:2102.08133). Barnard CHARA 간섭계 반지름.",
  "li_122":"<b>Boyajian T. S. et al. 2012</b> — <i>Stellar Diameters and Temperatures II</i> (<code>2012ApJ...757..112B</code>, arXiv:1208.2431). 독립적 간섭계 R + Teff 확인.",
  "li_123":"<b>Marfil E. et al. 2021</b> — <i>The CARMENES search for exoplanets around M dwarfs: Stellar atmospheric parameters</i> (<code>2021A&amp;A...656A.162M</code>, arXiv:2110.07329). [Fe/H] = −0.15.",
  "h3_124":"Read (context / methodology, not decision-driving)",
  "li_125":"<b>Lubin J. et al. 2021</b> — <i>Stellar Activity Manifesting at a One-year Alias Explains Barnard b as a False Positive</i> (<code>2021AJ....162...61L</code>. no arXiv). Ribas 2018 super-Earth 반박. abstract 인용.",
  "li_126":"<b>Ribas I. et al. 2018</b> — <i>A candidate super-Earth planet orbiting near the snow line of Barnard&#x27;s star</i> (<code>2018Natur.563..365R</code>, arXiv:1811.05955). 역사적 클레임, 반박됨. 문헌 연속성을 위해 보존.",
  "li_127":"<b>Stefanov A. K. et al. 2024</b> — <i>A sub-Earth-mass planet orbiting Barnard&#x27;s star: No evidence of transits in TESS photometry</i> (arXiv:2410.00577). González Hernández 2024 와 짝을 이루는 transit 배제 논문.",
  "li_128":"<b>Choi J. et al. 2013</b> — <i>Precise Doppler Monitoring of Barnard&#x27;s Star</i> (arXiv:1208.2273). 장기 RV 제약, 발견 이전 상한.",
  "li_129":"<b>Paulson D. B. et al. 2006</b> — <i>Optical Spectroscopy of a Flare on Barnard&#x27;s Star</i> (arXiv:astro-ph/0511281). 단일 flare 사건 특성화.",
  "li_130":"<b>Kürster M. et al. 2003</b> — <i>Low-level RV variability in Barnard&#x27;s Star</i> (arXiv:astro-ph/0303528). secular acceleration + 활동 서명.",
  "li_131":"<b>Reiners A. et al. 2022</b> — M 왜성 CARMENES Zeeman 분석, Barnard 평균장 제약 (특정 Phase 3 arXiv 미인출 — sample 작업에서 추론).",
  "h3_132":"Read (instrument-only, not visual-informative)",
  "li_133":"<b>Liebert J. et al. 2005</b> — <i>Barnard&#x27;s Star and the M Dwarf Temperature Scale</i>. 캘리브레이션 방법론만.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
