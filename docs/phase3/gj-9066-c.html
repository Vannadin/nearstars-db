  "h2_154":"Surface synthesis",
  "p_155":"GJ 9066 c has no solid surface — it is a sub-Saturn-mass H₂/He gas giant (M sin i ≈ 0.21 M_Jup ≈ 67 M⊕, ~0.7× Saturn). The &quot;surface&quot; relevant for rendering is the cloud deck, conventionally referenced to the 1 bar pressure level where the optical opacity transitions from clear gas above to particulate-laden gas below.",
  "p_156":"The crucial surface fact is the <b>low and strongly variable insolation</b>. The host is only 0.00254 L☉, so even the time-averaged insolation at a = 0.88 AU is just S ≈ 0.0033 S⊕ and the equilibrium temperature is T_eq ≈ 66 K (A = 0). Because the orbit is strongly eccentric (e = 0.46), the insolation swings by a factor of ~7.3 over each 2.1-year orbit — from S ≈ 0.011 S⊕ (T_eq ≈ 90 K) at periastron (0.475 AU) to S ≈ 0.0015 S⊕ (T_eq ≈ 55 K) at apoastron (1.285 AU). This matches Quirrenbach 2022&#x27;s note of &quot;periodic variations of the insolation by a factor of more than seven.&quot; Even the periastron peak is cold by gas-giant standards — colder than Saturn (T_eq ≈ 81 K) for most of the orbit — so the condensation chemistry is firmly in the ammonia-ice-cloud-deck regime, with no warm-cloud or alkali-metal chemistry accessible.",
  "p_157":"The cfg renders GJ 9066 c as a cold, ammonia-cloud-deck sub-Saturn. The cloud deck reads as <b>muted warm cream</b> (<span class=\"hex-chip\" style=\"background:#d4c8b0\"></span><code>#d4c8b0</code>) — ammonia ice is intrinsically near-white, but under the deep-red 3100 K M4.5 V SED the perceived hue dims and shifts warm, far less luminous than the solar-lit cream of Saturn. Belt-zone contrast is muted (<code>cloud_cover ≈ 0.7</code>, soft banding) because the convective drive at T_eq ≈ 66 K and low internal heat flux is weak — a softly-banded disk rather than the vivid banding of an insolation-driven warm jovian. No surface features map to the interior; the planet is fully fluid down to the H₂/He metallic transition, with a possible heavy-element core inferred indirectly from the sub-Saturn mass (cfg encodes no core — no observational constraint).",
  "p_158":"<b>The radius is entirely model-inferred.</b> GJ 9066 c does not transit (RV-only detection), so no radius is measured. For a ~0.21 M_Jup cold sub-Saturn, mass-radius relations bracket ~0.8–0.9 R_Jup (Saturn itself is 0.299 M_Jup at 0.843 R_Jup; Thorngren 2016 cold-giant tracks), and the cfg picks 0.85 R_Jup (≈ 9.6 R⊕, the DB-stored estimate) at low confidence. Everything downstream of the radius — surface gravity, density, scale height — inherits this low-confidence flag.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"No transmission or thermal-emission spectrum of GJ 9066 c exists, and the planet does not transit — the only observational constraints are the RV orbit and the M sin i lower bound. The atmospheric composition is therefore drawn entirely from the solar-composition jovian default (Lodders 2003 protosolar abundance) with Saturn-like volatile enhancement, condensation chemistry truncated at the cold T_eq ≈ 55–90 K.",
  "p_161":"<b>Pressure reference.</b> Gas giants have no solid surface; the cfg reference pressure is set at 1 bar (100 000 Pa) near the ammonia cloud-deck level. Above 1 bar, pressure decreases with scale height H ≈ 35 km — large despite the low temperature because the sub-Saturn mass gives a low surface gravity (g ≈ 8.9 m/s² from 0.21 M_Jup, 0.85 R_Jup).",
  "p_162":"<b>Composition.</b> H₂ ≈ 88%, He ≈ 10% by volume — solar protosolar ratios. Volatiles: CH₄ ≈ 0.3% (Saturn-like, slightly enhanced over protosolar), NH₃ ≈ 200 ppm (depleted above the cloud deck by condensation at the cold T_eq), trace H₂O below. These abundances are entirely tie-break defaults — no spectrum constrains them — but the cfg picks Saturn-analog values because the sub-Saturn mass and cold equilibrium temperature most closely resemble Saturn among the Solar System giants.",
  "p_163":"<b>Sky appearance.</b> The cold T_eq and weak convective drive give a quiescent, low-contrast atmosphere: a thick high-altitude ammonia haze overlying faintly-banded cloud decks, with little of the vigorous storm activity of a warm jovian. The most dynamic atmospheric feature is the <b>seasonal insolation swing</b>: over each 2.1-year orbit the top-of-cloud forcing rises and falls by a factor of ~7, which would drive a modest seasonal cycle in cloud-deck altitude and haze opacity — the one time-variable signature on an otherwise static cold giant.",
  "p_164":"<b>From a Hill-sphere observer.</b> From a hypothetical large moon, the sub-Saturn would dominate the sky as a muted cream banded disk, while the host star is a tiny deep-red point — only ~0.10° at a = 0.88 AU, swinging to ~0.18° at periastron and ~0.068° at apoastron — that flares frequently (the host is a UV-Ceti flare star) and floods the scene with faint infrared-rich light. The contrast between the pale cream giant and the small, frequently-flaring red stellar point would be the system&#x27;s most distinctive view.",
  "h2_165":"Rotation &amp; spin synthesis",
  "p_166":"No direct rotation measurement of GJ 9066 c exists. RV detection constrains only the orbit, not the planet&#x27;s spin.",
  "p_167":"<b>Tidal damping argument.</b> At 0.88 AU around a 0.15 M☉ host, the tidal spin-down timescale for a sub-Saturn-mass giant is far longer than the age of the universe (Goldreich &amp; Soter 1966 scaling with jovian Q ≈ 10⁵). GJ 9066 c is <b>not</b> tidally locked; the cfg encodes <code>tidally_locked = false</code>. The eccentric orbit (e = 0.46) further argues against synchronization — pseudo-synchronous rotation at periastron, if anything, would be faster than the orbital mean motion, not locked to it.",
  "p_168":"<b>Rotation period choice.</b> Among Solar System giants, rotation period scales weakly with mass: Jupiter (1.0 M_Jup) ≈ 9.93 h, Saturn (0.3 M_Jup) ≈ 10.7 h, Uranus/Neptune (≈ 0.05 M_Jup) ≈ 16–17 h. For GJ 9066 c at 0.21 M_Jup — between Saturn and the ice giants in mass — the cfg picks <code>rotation_period_hours = 11</code> as a Saturn-analog value, a within-window tie-break, not constrained.",
  "p_169":"<b>Obliquity.</b> Tie-break aesthetic: cfg picks 25° (Saturn-analog) for a visually distinct axis tilt. With the 771-day orbital period and a moderate obliquity, the obliquity-driven seasons are minor compared to the eccentricity-driven insolation swing, which dominates the seasonal forcing.",
  "p_170":"<b>KSP implementation note.</b> Rotation period = 11 h = 39 600 s. Kopernicus <code>rotationPeriod = 39600</code>. Obliquity (axis-tilt cfg) = 25° from orbital normal. The dominant in-game dynamic for this body is not its spin but its eccentric orbit — the factor-7 insolation swing over each 2.1-year orbit.",
  "h2_171":"Visual styling",
  "p_172":"Combining surface (cloud-deck) and atmosphere decisions:",
  "li_173":"<b>Global appearance.</b> From orbit, GJ 9066 c reads as a muted cream banded sub-Saturn, ~0.85 R_Jup (≈ 9.6 R⊕, ~60 000 km — radius model-inferred, not measured). Belt-zone contrast is soft (<span class=\"hex-chip\" style=\"background:#d4c8b0\"></span><code>#d4c8b0</code> muted cream cloud deck), much less vivid than Jupiter because the cold T_eq ≈ 66 K and low insolation give weak convective drive. Banding covers ~70% of the disk.",
  "li_174":"<b>Cloud-deck detail.</b> Ammonia-ice cloud zones appear as smooth, pale cream bands with little storm structure — a quiescent cold giant. No Great-Red-Spot analog is constrained; cfg renders at most a few faint drift vortices as subtle visual interest.",
  "li_175":"<b>Seasonal swing (the dynamic feature).</b> Over each 2.1-year orbit the insolation rises and falls by a factor of ~7 (periastron 0.011 S⊕ → apoastron 0.0015 S⊕). A faithful render lets cloud-deck brightness and haze opacity breathe slightly with the orbital phase — brightest and warmest near periastron, dimmest near apoastron — the one time-variable cue on an otherwise static cold disk.",
  "li_176":"<b>Limb haze.</b> A muted cream limb glow (<span class=\"hex-chip\" style=\"background:#cabfa6\"></span><code>#cabfa6</code>), thin and dim — ammonia-deck scattering under deep-red M4.5 V illumination is far fainter than Jupiter&#x27;s solar-lit limb.",
  "li_177":"<b>Nightside.</b> No direct stellar illumination; the planet&#x27;s own faint internal flux produces only a near-IR thermal glow at ~66 K peak, invisible to the eye. Far dimmer than a young or warm jovian.",
  "li_178":"<b>Star in sky.</b> GJ 9066 subtends only ~0.10° from the planet at a = 0.88 AU — about 1/5 the Sun&#x27;s angular size from Earth — swinging to ~0.18° at periastron and ~0.068° at apoastron. It appears as a small, deep red-orange (M4.5 V) point that <b>flares frequently</b> (the host is a UV-Ceti eruptive flare star), the most animated element of the sky.",
  "li_179":"<b>Ring system.</b> No ring (<code>ring_present = false</code>) — a tie-break, since RV-only detection gives no imaging either way. A Saturn-like ring is preserved as a cfg variant (Open items) for users who prefer it.",
  "li_180":"<b>Sister planets in sky.</b> None — GJ 9066 c is the only confirmed planet; the Feng 2020 &quot;GJ 9066 b&quot; 242-day candidate was refuted (Quirrenbach 2022).",
  "h2_181":"Bibliography",
  "h3_182":"Read (visual-informative, drove decisions above)",
  "li_183":"<b>Quirrenbach A. et al. 2022</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two saturnian planets orbiting active stars</i>, A&amp;A 663, A48 (<code>2022A&amp;A...663A..48Q</code>, doi:10.1051/0004-6361/202142915, <a href=\"https://arxiv.org/abs/2203.16504\">arXiv:2203.16504</a>). <b>Primary anchor.</b> The GP + Keplerian RV fit (CARMENES + HIRES + HARPS) giving the Phase 2 recommended orbit (P = 771.36 d, e = 0.46, a = 0.88 AU, ω = 321.79°) and minimum mass (M sin i = 0.21 M_Jup ≈ 67 M⊕). Notes the factor-of-seven insolation swing from the eccentric orbit, the planet&#x27;s status as the second giant known around a &lt; 0.3 M☉ host (alongside GJ 3512 b), the disk-fragmentation formation hint, and the refutation of the Feng 2020 242-day &quot;GJ 9066 b&quot; as a rotation artifact.",
  "li_184":"<b>Feng F. et al. 2020</b> — <i>Search for Nearby Earth Analogs. III.</i>, ApJS 250, 29 (<code>2020ApJS..250...29F</code>, doi:10.3847/1538-4365/abb139, <a href=\"https://arxiv.org/abs/2008.07998\">arXiv:2008.07998</a>). Original RV discovery (Lick-Carnegie + HARPS + CARMENES) of GJ 9066 c (768 d, 71.6 M⊕, e = 0.33). The &quot;c&quot; designation is retained from this paper; the alternative orbit/mass are stored as recommended:false in the DB. Source of the M4.5 V spectral-type label.",
  "h3_185":"Read (context / methodology, not decision-driving)",
  "li_186":"<b>Thorngren D. P. et al. 2016</b> — <i>The Mass-Metallicity Relation for Giant Planets</i>, ApJ 831, 64 (<code>2016ApJ...831...64T</code>, <a href=\"https://arxiv.org/abs/1511.07854\">arXiv:1511.07854</a>). Cold-giant mass-radius / heavy-element relations; the framework for the model-inferred 0.85 R_Jup radius of a ~0.21 M_Jup cold sub-Saturn.",
  "li_187":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i>, ApJ 591, 1220 (<code>2003ApJ...591.1220L</code>). Protosolar abundance reference driving the atmosphere-composition default.",
  "li_188":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). Tidal-dissipation Q reference for the tidal-lock timescale argument.",
  "h3_189":"Read (instrument-only, not visual-informative)",
  "li_190":"The CARMENES / HIRES / HARPS radial-velocity and Gaussian-process methodology in Quirrenbach 2022 (Exo-Striker, quasi-periodic GP kernel to separate the 1.96 d rotation signal from the 771 d Keplerian) is the instrument backbone of the detection but contributes no direct visual field beyond the orbital elements already used above.",
  "h3_191":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_192":"No transit photometry, transmission spectrum, thermal-emission spectrum, or direct image of GJ 9066 c exists, so there are no observational atmosphere/radius papers to read — all atmosphere and radius rows are necessarily tie-break jovian-analog defaults. Generic cold-sub-Saturn mass-radius and atmosphere-chemistry references (beyond Thorngren 2016 and Lodders 2003) are read for context but contribute no GJ-9066-c-specific cfg number. The full filtered bibliography is preserved in <code>docs/phase3/_bib/gj-9066.yaml</code>.",
  "h2_193":"Open items for follow-up",
  "li_194":"<b>True mass — inclination is unconstrained.</b> GJ 9066 c is RV-only, so only M sin i ≈ 0.21 M_Jup is bounded; the true mass could be larger if the orbit is inclined. Quirrenbach 2022 notes the close (4.47 pc) host and large angular semi-major axis (~0.27″) make GJ 9066 c a favorable future direct-imaging target, and a Gaia astrometric acceleration search is the most sensitive near-term test of inclination / a third body. A measured inclination would convert M sin i to a true mass and tighten every mass-derived row.",
  "li_195":"<b>Radius is model-inferred, not measured.</b> No transit; the 0.85 R_Jup (≈ 9.6 R⊕) radius comes from cold-sub-Saturn mass-radius relations (Thorngren 2016). A future direct-imaging or (unlikely) transit detection would replace it and lift the density / gravity / scale-height rows from low confidence.",
  "li_196":"<b>Atmosphere spectrum.</b> All composition, cloud, and haze rows are tie-break jovian-analog defaults. A future direct-imaging spectrum (the favorable contrast Quirrenbach 2022 highlights) could yield CH₄ / NH₃ abundances and constrain the cloud-deck altitude, replacing the Decisions rows <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>, and <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span>.",
  "li_197":"<b>Eccentricity-driven seasonal rendering.</b> The factor-7 insolation swing (periastron → apoastron) is the planet&#x27;s defining dynamic feature. A future cfg revision could phase-lock cloud-deck brightness and haze opacity to the orbital phase so the player sees the giant &quot;breathe&quot; over each 2.1-year orbit.",
  "li_198":"<b>Ring tie-break preservation.</b> cfg picks <code>ring_present = false</code>, but RV-only detection gives no imaging constraint either way. A Saturn-like ring system is preserved here as the alternative cfg variant for users who prefer it.",

  "p_1":"GJ 9066 c (= Quirrenbach et al. 2022 명명에서 TZ Arietis b) 는 활동적 M4.5 V flare star GJ 9066 을 a = 0.88 ± 0.02 AU 에서 도는 따뜻하고 강하게 이심성이 큰 sub-Saturn 질량 거대행성입니다. 주기 771.36 ± 1.34 d (2.11 yr), 이심률 e = 0.46 ± 0.04 (Quirrenbach et al. 2022, CARMENES + HIRES + HARPS RV 에 Gaussian-process 활동 모델 적용) 입니다. 최소질량은 M sin i = 0.21 ± 0.02 M_Jup ≈ 67 ± 6 M⊕ — 토성 질량의 ~0.7 배 — 로, 0.3 M☉ 아래 호스트 주위에서 알려진 몇 안 되는 거대행성 중 하나입니다. Quirrenbach 2022 는 이를 &quot;0.3 M☉ 미만 질량의 호스트 주위에서 발견된 두 번째 거대행성&quot; 이라 부릅니다. Feng et al. 2020 이 발견했고 Quirrenbach 2022 가 회수·정밀화하면서, 동시에 동반 242 일 &quot;GJ 9066 b&quot; 신호를 항성 자전 아티팩트로 반증했습니다.",
  "p_2":"이 행성은 시선속도로만 검출됩니다. <b>진질량은 알 수 없고</b> (M sin i 하한, 경사 미제약), 통과가 없어 <b>반지름이 측정되지 않습니다</b>. 강한 이심률이 궤도에 걸쳐 7 배 조사량 진동을 구동하는데 (Quirrenbach 2022. &quot;7 배 넘는 조사량의 주기적 변화&quot;), 근점 0.475 AU 에서 원점 1.285 AU 까지입니다. 근점에서도 조사량은 낮습니다 — 호스트가 0.00254 L☉ 에 불과 — 그래서 평형온도는 차갑게 유지됩니다 (T_eq ≈ 90 K 근점, ≈ 55 K 원점, A = 0). 가장 따뜻한 가스행성 구름 화학 영역에는 한참 못 미칩니다.",
  "p_3":"<b>NearStars 시나리오 선택. 차갑고 (T_eq ≈ 55–90 K), 이심성이 큰 (e = 0.46) sub-Saturn 질량 거대행성으로, 2.1 년 궤도를 돌며 진질량과 반지름이 둘 다 미제약된 RV-only 천체입니다. 시각 스타일링은 깊은 붉은 M4.5 V 조명 아래 muted 크림으로 렌더링되는 암모니아-구름-덱 sub-Saturn 으로 다루며, 저조사량·약한 띠 구조 모습에 강한 계절 조사량 진동이 유일한 동적 피처입니다.</b> 궤도 결정은 Quirrenbach 2022 (Phase 2 recommended) 에 정박합니다. 질량은 M sin i 하한입니다. 반지름과 모든 대기/구름 행은 스펙트럼·통과·열지도가 없어 tie-break jovian-analog 기본값으로 low-confidence 로 표시합니다.",

  "h2_154":"Surface synthesis",
  "p_155":"GJ 9066 c 는 고체 표면이 없습니다 — sub-Saturn 질량 H₂/He 가스행성 입니다 (M sin i ≈ 0.21 M_Jup ≈ 67 M⊕, 토성의 ~0.7 배). 렌더링에 관련된 &quot;표면&quot; 은 구름 덱으로, 관습적으로 1 bar 압력 레벨 — 위쪽 맑은 기체에서 아래쪽 입자-실린 기체로 광학 불투명도가 전이하는 곳 — 에 기준합니다.",
  "p_156":"결정적 표면 사실은 <b>낮고 강하게 가변적인 조사량</b> 입니다. 호스트가 0.00254 L☉ 에 불과하므로, a = 0.88 AU 에서 시간 평균 조사량조차 겨우 S ≈ 0.0033 S⊕ 이고 평형온도는 T_eq ≈ 66 K (A = 0) 입니다. 궤도가 강하게 이심성이 크므로 (e = 0.46), 조사량은 각 2.1 년 궤도에 걸쳐 약 7.3 배 진동합니다 — 근점 (0.475 AU) 의 S ≈ 0.011 S⊕ (T_eq ≈ 90 K) 에서 원점 (1.285 AU) 의 S ≈ 0.0015 S⊕ (T_eq ≈ 55 K) 까지. 이는 Quirrenbach 2022 의 &quot;7 배 넘는 조사량의 주기적 변화&quot; 노트와 일치합니다. 근점 피크조차 가스행성 기준으로 차갑고 — 궤도 대부분에서 토성 (T_eq ≈ 81 K) 보다 차갑습니다 — 그래서 응결 화학은 확고히 암모니아-얼음-구름-덱 영역에 있으며, 접근 가능한 따뜻한-구름이나 알칼리-금속 화학은 없습니다.",
  "p_157":"cfg 는 GJ 9066 c 를 차가운 암모니아-구름-덱 sub-Saturn 으로 렌더링합니다. 구름 덱은 <b>muted 따뜻한 크림</b> (<span class=\"hex-chip\" style=\"background:#d4c8b0\"></span><code>#d4c8b0</code>) 으로 읽힙 니다 — 암모니아 얼음은 본질적으로 거의 흰색이지만, 깊은 붉은 3100 K M4.5 V SED 아래 인식 색조는 어두워지고 따뜻하게 이동하여, 토성의 태양-조명 크림보다 훨씬 덜 밝습니다. belt-zone 대비는 muted 합니다 (<code>cloud_cover ≈ 0.7</code>, 부드러운 띠). T_eq ≈ 66 K 와 낮은 내부 열류속 에서 대류 구동이 약하기 때문입니다 — 조사량 구동 따뜻한 jovian 의 선명한 띠가 아니라 부드럽게 띠진 디스크입니다. 표면 피처는 내부에 대응하지 않습니다. 행성은 H₂/He 금속 전이까지 완전히 유체이며, 차가운 무거운-원소 핵이 sub-Saturn 질량에서 간접 추론됩니다 (cfg 는 핵을 인코딩하지 않음 — 관측 제약 없음).",
  "p_158":"<b>반지름은 전적으로 모델 추론입니다.</b> GJ 9066 c 는 통과하지 않으므로 (RV-only 검출) 반지름이 측정되지 않습니다. ~0.21 M_Jup 차가운 sub-Saturn 의 경우 질량-반지름 관계가 ~0.8–0.9 R_Jup 을 묶고 (토성 자체가 0.843 R_Jup 의 0.299 M_Jup. Thorngren 2016 차가운-거대행성 트랙), cfg 는 low confidence 로 0.85 R_Jup (≈ 9.6 R⊕, DB 저장 추정) 을 선택합니다. 반지름의 하류 — 표면 중력, 밀도, 스케일 높이 — 는 모두 이 low-confidence 표시를 상속합니다.",
  "h2_159":"Atmosphere synthesis",
  "p_160":"GJ 9066 c 의 투과나 열방출 스펙트럼은 존재하지 않으며, 행성은 통과하지 않습니다 — 유일한 관측 제약은 RV 궤도와 M sin i 하한입니다. 따라서 대기 조성은 전적으로 태양 조성 jovian 기본값 (Lodders 2003 protosolar) 에 토성형 휘발물 강화를 더하고, 차가운 T_eq ≈ 55–90 K 에서 응결 화학을 절단하여 도출합니다.",
  "p_161":"<b>압력 기준.</b> 가스행성은 고체 표면이 없습니다. cfg 기준 압력은 암모니아 구름-덱 레벨 근처 1 bar (100 000 Pa) 로 설정합니다. 1 bar 위로는 압력이 스케일 높이 H ≈ 35 km 로 감소합니다 — 낮은 온도에도 크게 나오는데, sub-Saturn 질량이 낮은 표면 중력을 주기 때문입니다 (0.21 M_Jup, 0.85 R_Jup 에서 g ≈ 8.9 m/s²).",
  "p_162":"<b>조성.</b> H₂ ≈ 88%, He ≈ 10% (부피 기준) — 태양 protosolar 비율. 휘발물. CH₄ ≈ 0.3% (토성형, protosolar 보다 약간 강화), NH₃ ≈ 200 ppm (차가운 T_eq 에서 응결로 구름 덱 위에서 고갈), 아래 trace H₂O. 이 함량은 전적으로 tie-break 기본값 — 어떤 스펙트럼도 제약하지 않음 — 이지만, cfg 는 sub-Saturn 질량과 차가운 평형온도가 Solar System 거대행성 중 토성을 가장 닮았기에 Saturn-analog 값을 선택합니다.",
  "p_163":"<b>하늘 모습.</b> 차가운 T_eq 와 약한 대류 구동은 정적이고 저대비의 대기를 줍니다. 희미하게 띠진 구름 덱 위에 두꺼운 고고도 암모니아 haze 가 얹히고, 따뜻한 jovian 의 활발한 폭풍 활동은 거의 없습니다. 가장 동적인 대기 피처는 <b>계절 조사량 진동</b> 입니다. 각 2.1 년 궤도에 걸쳐 구름 상단 강제력이 약 7 배 오르내리며, 이는 구름-덱 고도와 haze 불투명도에 완만한 계절 사이클을 구동합니다 — 그밖에는 정적인 차가운 거대행성의 유일한 시간 가변 signature 입니다.",
  "p_164":"<b>Hill-sphere 관찰자에서.</b> 가설적 큰 위성에서 sub-Saturn 은 muted 크림 띠진 디스크로 하늘을 지배하고, 호스트 별은 작은 깊은 붉은 점 입니다 — a = 0.88 AU 에서 겨우 ~0.10°, 근점에서 ~0.18°, 원점에서 ~0.068° 로 진동 — 자주 flare 하고 (호스트는 UV-Cet flare star) 장면을 희미한 적외선-풍부 빛으로 적십니다. 창백한 크림 거대행성과 작고 자주 flare 하는 붉은 항성 점 사이의 대비가 시스템에서 가장 특징적인 풍경일 것입니다.",
  "h2_165":"Rotation &amp; spin synthesis",
  "p_166":"GJ 9066 c 의 직접 자전 측정은 존재하지 않습니다. RV 검출은 행성의 spin 이 아니라 궤도만 제약합니다.",
  "p_167":"<b>조석 감쇠 논거.</b> 0.15 M☉ 호스트 주위 0.88 AU 에서 sub-Saturn 질량 거대행성의 조석 spin-down 시간척도는 우주 나이보다 훨씬 깁니다 (Goldreich &amp; Soter 1966, jovian Q ≈ 10⁵ 스케일링). GJ 9066 c 는 조석 고정되지 <b>않으며</b>. cfg 는 <code>tidally_locked = false</code> 를 인코딩합니다. 이심 궤도 (e = 0.46) 는 동기화에 더욱 반대로 논증합니다 — 근점에서의 유사동기 자전이라면 오히려 궤도 평균 운동보다 빠를 것이지 거기에 고정되지 않습니다.",
  "p_168":"<b>자전 주기 선택.</b> Solar System 거대행성 중 자전 주기는 질량에 약하게 비례합니다. Jupiter (1.0 M_Jup) ≈ 9.93 h, 토성 (0.3 M_Jup) ≈ 10.7 h, 천왕성/해왕성 (≈ 0.05 M_Jup) ≈ 16–17 h. 질량으로 토성과 얼음 거대행성 사이인 0.21 M_Jup 의 GJ 9066 c 에 대해, cfg 는 <code>rotation_period_hours = 11</code> 을 Saturn-analog 값으로 선택합니다 — 윈도우 안 tie-break 으로, 제약되지 않음.",
  "p_169":"<b>자전축 기울기.</b> Tie-break 미학. cfg 는 시각적으로 구별되는 축 기울기를 위해 25° (Saturn-analog) 를 선택합니다. 771 일 궤도 주기와 적당한 기울기에서, 기울기 구동 계절은 계절 강제력을 지배하는 이심률 구동 조사량 진동에 비해 미미합니다.",
  "p_170":"<b>KSP 구현 노트.</b> 자전 주기 = 11 h = 39 600 s. Kopernicus <code>rotationPeriod = 39600</code>. 자전축 기울기 (axis-tilt cfg) = 궤도 법선에서 25°. 이 바디의 지배적 게임 내 동역학은 spin 이 아니라 이심 궤도 — 각 2.1 년 궤도에 걸친 7 배 조사량 진동 — 입니다.",
  "h2_171":"Visual styling",
  "p_172":"표면 (구름-덱) 과 대기 결정을 결합.",
  "li_173":"<b>전체 모습.</b> 궤도에서 GJ 9066 c 는 muted 크림 띠진 sub-Saturn, ~0.85 R_Jup (≈ 9.6 R⊕, ~60 000 km — 반지름은 모델 추론, 측정 아님) 으로 읽힙니다. belt-zone 대비는 부드럽고 (<span class=\"hex-chip\" style=\"background:#d4c8b0\"></span><code>#d4c8b0</code> muted 크림 구름 덱), Jupiter 보다 훨씬 덜 선명합니다. 차가운 T_eq ≈ 66 K 와 저조사량이 약한 대류 구동을 주기 때문입니다. 띠가 디스크의 ~70% 를 덮습니다.",
  "li_174":"<b>구름-덱 디테일.</b> 암모니아-얼음 구름 zone 이 매끄럽고 창백한 크림 띠로, 폭풍 구조가 거의 없이 나타납니다 — 정적인 차가운 거대행성. Great-Red-Spot 유사물은 제약되지 않음. cfg 는 미묘한 시각적 흥미로 기껏해야 희미한 drift 소용돌이 몇 개를 렌더링.",
  "li_175":"<b>계절 진동 (동적 피처).</b> 각 2.1 년 궤도에 걸쳐 조사량이 약 7 배 오르내림 (근점 0.011 S⊕ → 원점 0.0015 S⊕). 충실한 렌더는 구름-덱 밝기와 haze 불투명도가 궤도 위상에 따라 살짝 숨쉬게 합니다 — 근점 근처에서 가장 밝고 따뜻하며, 원점 근처에서 가장 어두움 — 그밖에는 정적인 차가운 디스크의 유일한 시간 가변 신호.",
  "li_176":"<b>림 haze.</b> muted 크림 림 광채 (<span class=\"hex-chip\" style=\"background:#cabfa6\"></span><code>#cabfa6</code>), 얇고 어두움 — 깊은 붉은 M4.5 V 조명 아래 암모니아-덱 산란은 Jupiter 의 태양-조명 림보다 훨씬 희미함.",
  "li_177":"<b>야면.</b> 직접 항성 조명 없음. 행성 자체의 희미한 내부 열류속이 ~66 K 피크의 근적외선 열 광채만 내며, 눈에는 보이지 않음. 젊거나 따뜻한 jovian 보다 훨씬 어두움.",
  "li_178":"<b>하늘의 별.</b> GJ 9066 은 a = 0.88 AU 에서 행성으로부터 겨우 ~0.10° 를 차지 — 지구에서 본 태양 각크기의 약 1/5 — 근점에서 ~0.18°, 원점에서 ~0.068° 로 진동. 작고 깊은 적-주황 (M4.5 V) 점으로 나타나 <b>자주 flare</b> 하며 (호스트는 UV-Cet 형 폭발 flare star), 하늘에서 가장 생동감 있는 요소.",
  "li_179":"<b>ring 시스템.</b> ring 없음 (<code>ring_present = false</code>) — tie-break. RV-only 검출이 어느 쪽이든 영상 제약을 주지 않기 때문. Saturn 형 ring 은 그것을 선호하는 사용자를 위해 cfg 변형 (Open items) 으로 보존.",
  "li_180":"<b>하늘의 자매 행성.</b> 없음 — GJ 9066 c 가 유일하게 확인된 행성. Feng 2020 &quot;GJ 9066 b&quot; 242 일 후보는 반증됨 (Quirrenbach 2022).",
  "h2_181":"Bibliography",
  "h3_182":"Read (visual-informative, drove decisions above)",
  "li_183":"<b>Quirrenbach A. et al. 2022</b> — <i>The CARMENES search for exoplanets around M dwarfs. Two saturnian planets orbiting active stars</i>, A&amp;A 663, A48 (<code>2022A&amp;A...663A..48Q</code>, doi:10.1051/0004-6361/202142915, <a href=\"https://arxiv.org/abs/2203.16504\">arXiv:2203.16504</a>). <b>Primary anchor.</b> GP + Keplerian RV 적합 (CARMENES + HIRES + HARPS) 으로 Phase 2 recommended 궤도 (P = 771.36 d, e = 0.46, a = 0.88 AU, ω = 321.79°) 와 최소질량 (M sin i = 0.21 M_Jup ≈ 67 M⊕) 을 줌. 이심 궤도에서의 7 배 조사량 진동, &lt; 0.3 M☉ 호스트 주위 두 번째 거대행성 지위 (GJ 3512 b 와 함께), disk-fragmentation 형성 힌트, Feng 2020 242 일 &quot;GJ 9066 b&quot; 의 자전 아티팩트 반증을 언급.",
  "li_184":"<b>Feng F. et al. 2020</b> — <i>Search for Nearby Earth Analogs. III.</i>, ApJS 250, 29 (<code>2020ApJS..250...29F</code>, doi:10.3847/1538-4365/abb139, <a href=\"https://arxiv.org/abs/2008.07998\">arXiv:2008.07998</a>). GJ 9066 c (768 d, 71.6 M⊕, e = 0.33) 의 원래 RV 발견 (Lick-Carnegie + HARPS + CARMENES). &quot;c&quot; 명명은 이 논문에서 유지. 대안 궤도/질량은 DB 에 recommended:false 로 저장. 분광형 M4.5 V 라벨의 출처.",
  "h3_185":"Read (context / methodology, not decision-driving)",
  "li_186":"<b>Thorngren D. P. et al. 2016</b> — <i>The Mass-Metallicity Relation for Giant Planets</i>, ApJ 831, 64 (<code>2016ApJ...831...64T</code>, <a href=\"https://arxiv.org/abs/1511.07854\">arXiv:1511.07854</a>). 차가운-거대행성 질량-반지름 / 무거운-원소 관계. ~0.21 M_Jup 차가운 sub-Saturn 의 모델 추론 0.85 R_Jup 반지름의 틀.",
  "li_187":"<b>Lodders K. 2003</b> — <i>Solar System Abundances and Condensation Temperatures of the Elements</i>, ApJ 591, 1220 (<code>2003ApJ...591.1220L</code>). 대기-조성 기본값을 구동하는 protosolar 함량 기준.",
  "li_188":"<b>Goldreich P. &amp; Soter S. 1966</b> — <i>Q in the Solar System</i>, Icarus 5, 375 (<code>1966Icar....5..375G</code>). 조석-고정 시간척도 논거의 조석 소산 Q 기준.",
  "h3_189":"Read (instrument-only, not visual-informative)",
  "li_190":"Quirrenbach 2022 의 CARMENES / HIRES / HARPS 시선속도 및 Gaussian-process 방법론 (Exo-Striker, 1.96 d 자전 신호를 771 d Keplerian 에서 분리하는 quasi-periodic GP 커널) 은 검출의 기기 근간이지만, 위에서 이미 쓴 궤도 요소 외에 직접적 시각 필드를 담지 않습니다.",
  "h3_191":"Not read — no arXiv preprint or low-priority (~handful)",
  "p_192":"GJ 9066 c 의 통과 측광, 투과 스펙트럼, 열방출 스펙트럼, 직접 영상은 존재하지 않으므로, 읽을 관측 대기/반지름 논문이 없습니다 — 모든 대기 와 반지름 행은 필연적으로 tie-break jovian-analog 기본값입니다. 일반 차가운-sub-Saturn 질량-반지름 및 대기-화학 참조 (Thorngren 2016 과 Lodders 2003 너머) 는 맥락으로 읽히지만 GJ-9066-c-특정 cfg 수치를 담지 않습니다. 전체 필터링된 bib 는 <code>docs/phase3/_bib/gj-9066.yaml</code> 에 보존됩니다.",
  "h2_193":"Open items for follow-up",
  "li_194":"<b>진질량 — 경사가 미제약.</b> GJ 9066 c 는 RV-only 이므로 M sin i ≈ 0.21 M_Jup 만 묶입니다. 궤도가 기울어져 있으면 진질량은 더 클 수 있습니다. Quirrenbach 2022 는 가까운 (4.47 pc) 호스트와 큰 각 반장축 (~0.27″) 이 GJ 9066 c 를 유리한 미래 직접-영상 표적으로 만든다고 언급하며, Gaia 천체측정 가속도 탐색이 경사 / 제3체에 대한 가장 민감한 근시일 시험입니다. 측정된 경사는 M sin i 를 진질량으로 변환하고 모든 질량-유도 행을 묶어 줍니다.",
  "li_195":"<b>반지름이 모델 추론, 측정 아님.</b> 통과 없음. 0.85 R_Jup (≈ 9.6 R⊕) 반지름은 차가운-sub-Saturn 질량-반지름 관계 (Thorngren 2016) 에서 옴. 미래의 직접 영상이나 (가능성 낮은) 통과 검출이 이를 대체하고 밀도 / 중력 / 스케일-높이 행을 low confidence 에서 끌어올립니다.",
  "li_196":"<b>대기 스펙트럼.</b> 모든 조성, 구름, haze 행은 tie-break jovian-analog 기본값입니다. 미래의 직접-영상 스펙트럼 (Quirrenbach 2022 가 강조한 유리한 대비) 이 CH₄ / NH₃ 함량을 산출하고 구름-덱 고도를 제약하여, Decisions 행 <span class=\"field-tt\" data-ko-tip=\"대기 조성 (주 성분과 분압 비율).\" data-en-tip=\"Atmospheric composition — main species and partial pressures.\"><code>atmosphere_composition</code></span>, <span class=\"field-tt\" data-ko-tip=\"구름 형태 (위도/경도 패턴 서술).\" data-en-tip=\"Cloud morphology — latitude/longitude patterns.\"><code>cloud_morphology</code></span>, <span class=\"field-tt\" data-ko-tip=\"본드 반사율. 전 파장 통합 반사율 (0–1).\" data-en-tip=\"Bond albedo. Fraction of stellar power reflected, integrated over all wavelengths (0–1).\"><code>bond_albedo</code></span> 를 대체할 수 있습니다.",
  "li_197":"<b>이심률 구동 계절 렌더링.</b> 7 배 조사량 진동 (근점 → 원점) 이 행성의 규정적 동적 피처입니다. 미래 cfg 개정이 구름-덱 밝기와 haze 불투명도를 궤도 위상에 phase-lock 하여, 플레이어가 각 2.1 년 궤도에 걸쳐 거대행성이 &quot;숨쉬는&quot; 모습을 보게 할 수 있습니다.",
  "li_198":"<b>ring tie-break 보존.</b> cfg 는 <code>ring_present = false</code> 를 선택하지만, RV-only 검출은 어느 쪽이든 영상 제약을 주지 않습니다. Saturn 형 ring 시스템은 그것을 선호하는 사용자를 위해 여기에 대안 cfg 변형 으로 보존됩니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
