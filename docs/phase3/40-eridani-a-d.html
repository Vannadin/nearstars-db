  "p_79":"The composition and pressure ceiling are canon (84/8/4 CO₂/N₂/SO₂, &lt; 1% Earth); the synthesis job is making them physically coherent, and they turn out to cohere well.",
  "p_80":"<b>The thin pressure is self-consistent, not arbitrary.</b> At 2.6 km/s escape velocity and ~275 K, thermal escape of CO₂ is slow but nonthermal stripping over Gyr is efficient — a Moon-mass body cannot <i>keep</i> an atmosphere, it can only <i>sustain</i> one in steady state between volcanic outgassing and escape. The ~800 Pa adopted value is the Mars-like equilibrium column such a balance plausibly holds; Weir&#x27;s &quot;&lt; 1% of Earth&quot; ceiling reads as exactly this regime.",
  "p_81":"<b>SO₂ is the smoking gun for active volcanism.</b> SO₂ photolyzes and condenses on ~decade timescales; a 4% standing fraction is impossible without continuous replenishment. The cfg therefore treats ongoing sulfur volcanism as canon-implied, while flagging the <i>heat source</i> as the honest weak point: tidal heating is negligible (e = 0.042 at 0.635 AU on a Moon-mass body), so the budget must be residual radiogenic + core-crystallization heat at 1.8 Gyr — marginal, low confidence, and recorded as an open item.",
  "p_82":"<b>Greenhouse and climate.</b> An 800 Pa CO₂ column adds a Mars-scale greenhouse (~6 K) — enough to matter at the frost line but not to transform the climate. No liquid water is stable at this pressure (the triple point is 611 Pa; only transient brines in the deepest basins could skirt it — left as a texture-pass suggestion, not a cfg claim).",
  "p_83":"<b>Astrophage context (fiction layer).</b> In PHM canon this world is where 40 Eridani&#x27;s Astrophage breed: the CO₂ atmosphere supplies the carbon, and the Petrova arc connects it to the star. NearStars keeps all Astrophage effects out of the physical rows — the arc is a visual-layer feature only (see below), and no cfg physical value depends on the fiction&#x27;s biology.",
  "h2_84":"Rotation &amp; spin synthesis",
  "p_85":"Tidal despinning scales steeply with distance: at 0.635 AU the timescale is roughly 16× that of c at 0.4 AU, putting d on the boundary between despun and primordial at the 1.8 Gyr system age. Neither a pure synchronous state nor a fast primordial spin is forced.",
  "p_86":"<b>Tie-break: a partially despun slow rotator at ~240 h.</b> A ~10-day solar day is the most visually productive choice consistent with the marginal despinning: long enough for the nightside to plunge and frost over, short enough that the frost terminator visibly lags sunrise — a moving frost line as the signature time-lapse feature. Obliquity is left small but nonzero (~5°) so the polar cold traps stay polar.",
  "h2_87":"Visual styling",
  "li_88":"<b>Global appearance.</b> A small, cold, basalt-brown world (<span class=\"hex-chip\" style=\"background:#6f665e\"></span><code>#6f665e</code>) mottled with pale sulfur-frost patches (<span class=\"hex-chip\" style=\"background:#d8d09a\"></span><code>#d8d09a</code>) concentrated at the poles and along the trailing nightside; thin crisp limb with a faint steel-blue twilight band (<span class=\"hex-chip\" style=\"background:#2e3550\"></span><code>#2e3550</code>).",
  "li_89":"<b>Frost terminator lag.</b> The renderable consequence of the 240-h day: a bright frost fringe trailing the dawn terminator where the night&#x27;s condensation has not yet sublimated.",
  "li_90":"<b>Vent glow (low-confidence flourish).</b> Sparse point-source volcanic vents may glow faintly on the nightside — admissible under the plausibility gate as localized volcanism, never as lava fields.",
  "li_91":"<b>The Petrova arc (fiction layer).</b> The system&#x27;s signature fictional feature: the migrating Astrophage stream between d and the K0.5 V primary, canonically emitting at the 25.984 μm Petrova wavelength (thermal IR — physically invisible to the eye; the faint deep-red arc rendering is licensed artistic translation of the novel&#x27;s own visual language). This cannot be expressed in Kopernicus/Scatterer cfg and is a <b>custom-plugin candidate</b> in the same class as the YZ Cet flux tube — backlogged for the plugin track, not emitted from this report.",
  "li_92":"<b>Sky companions.</b> The white-dwarf B / red-dwarf C pair as brilliant points, per the system-wide skyscape.",
  "h2_93":"Canonical alternatives",
  "p_94":"<b>The canonical reading is no planet.</b> No detection of any kind exists at this period; current catalogs list zero confirmed planets around 40 Eridani A. The body exists as the <i>Project Hail Mary</i> system-completion piece of the b/c/d documented-divergence ensemble.",

  "li_112":"<b><a href=\"https://arxiv.org/abs/1709.00478\">Bond et al. 2017</a></b> — IFMR system-coeval age (~1.8 Gyr) used in the interior-heat and despinning arguments.",
  "li_113":"<b>NearStars stability run</b> — <code>phase3/stability-sim/results/40_eridani_summary.json</code>: REBOUND WHFast, 10⁵ yr, energy error 4.6×10⁻¹¹, MEGNO 2.00, all bodies stable/calm (d eccentricity 0.013–0.047).",
  "h3_114":"Method references",
  "li_115":"Thin-atmosphere steady state (outgassing vs escape) and Mars-scale CO₂ greenhouse — textbook-level reasoning per the derived-value grounding policy&#x27;s textbook exception; formulas in <code>docs/reference/methodology.md</code>.",
  "li_116":"SO₂ photochemical lifetime / frost condensation — standard Io-literature background applied qualitatively; no numeric cfg row depends on it beyond the frost-placement tie-break.",
  "h2_117":"Open items for follow-up",
  "li_118":"<b>Volcanic heat budget is the weak point.</b> A Moon-mass body sustaining sulfur volcanism at 1.8 Gyr on radiogenic heat alone is marginal. If a later pass wants firmer ground, options are a slightly higher design eccentricity (tidal assist) or accepting waning, episodic volcanism — both stay within canon&#x27;s atmosphere.",
  "li_119":"<b>Petrova arc plugin.</b> The arc is backlogged for the custom-plugin track (same class as the YZ Cet flux tube; C#/Harmony work is delegated per project policy). This report intentionally emits no cfg for it.",
  "li_120":"<b>Rotation is pure tie-break.</b> Nothing in canon or physics pins the 240-h day; a Phase 4 board revision may re-pick it freely — the frost-terminator visual is the only thing at stake.",
  "li_121":"<b>Transient brines.</b> Surface pressure (800 Pa) sits just above water&#x27;s triple point (611 Pa); deepest-basin transient brines are physically admissible flavor for the texture pass but are deliberately not a cfg claim.",

  ko: {
  "p_1":"40 Eridani A d 는 <b>실재 검출이 없는 픽션-캐넌 천체</b>입니다. Andy Weir 의 <i>Project Hail Mary</i> (2021, p. 393)에 나오는 Rocky 고향 시스템의 세 번째 행성을 구현한 것으로, 표면 중력 0.2 g 에 지구 표면 기압의 1% 미만인 얇은 84% CO₂ / 8% N₂ / 4% SO₂ 대기를 두른 달 크기의 세계입니다 — 40 Eridani 페트로바 호 저편 끝의 아스트로파지 번식지이자, Tau Ceti 의 Adrian 에 해당하는 이 시스템의 로컬 대응 천체입니다. 물리적 패키지(반지름, 중력, 조성, 기압 상한)는 Weir 의 캐넌에서 그대로 가져왔고, 궤도는 동역학으로 검증한 NearStars 자체 설계입니다.",
  "p_2":"궤도(a = 0.635 AU, e = 0.042, P = 209.27 d)는 합성 필러인 c 바깥에서 2:1 주기비 근처에 배치했으며, 시스템의 나머지 천체와 같은 REBOUND 적분으로 검증했습니다 — WHFast 로 10⁵ 년, 상대 에너지 오차 4.6×10⁻¹¹, MEGNO = 2.00(정칙), 모든 천체가 안정적이고 이심률 변화도 잔잔합니다(<code>phase3/stability-sim/results/40_eridani_summary.json</code>; d 의 이심률은 0.013–0.047 범위 안에 머뭅니다).",
  "p_3":"이 설계의 뜻밖의 행운은 복사 조도입니다. 0.4078 L☉ 주성 주위 0.635 AU 에서 d 가 받는 조도는 <b>1.01 S⊕ — 지구 자신의 복사 조도</b> — 인데도 천체는 달 크기입니다. 그 대비(지구 온대 수준의 에너지 예산을 지구형 대기를 붙잡기엔 너무 작은 천체가 받는 상황)가 이 세계의 성격 전부입니다 — 얼음점의 암석에 화산성 대기가 속삭이듯 얇게 걸려 있는데, 2.6 km/s 의 탈출 속도로는 탈가스가 끊임없이 보충하는 만큼만 붙잡을 수 있어 스스로 얇을 수밖에 없습니다.",

  "h2_74":"Surface synthesis",
  "p_75":"크기와 중력은 캐넌이며, 나머지는 전부 거기서 따라 나옵니다. 0.2 g 의 1737 km 천체는 0.0149 M⊕ 에 ~4.0 g/cc 로 계산되는데 — 달보다 눈에 띄게 치밀하고, 이는 작은 분화된 철 핵을 함의하며, 마침 대기가 필요로 하는 잔류 화산 활동(아래)까지 뒷받침합니다. 1.8 Gyr 의 시스템 나이(Bond 2017 IFMR, 호스트 합성에서 채택)가 여기에 도움이 됩니다 — 달 질량의 천체는 달 자신의 4.5 Gyr 시점과 달리 그 나이에서는 아직 열적으로 완전히 죽지 않았습니다.",
  "p_76":"<b>얼음점의 세계.</b> 지구의 복사 조도를 받지만 진공에 가까운 대기를 지녀 평균 표면은 ~275 K 에 놓이는데 — 거의 정확히 물 서리선 위입니다. 합성은 그 점에 기댑니다 — 적도 낮면은 어는점 위로 올라 맨 어두운 현무암이 지배하고, 극지와 느린 야면은 그 아래로 한참 떨어져 서리를 모읍니다. 물이 있는 곳이면 어디든 물 얼음 서리가 생기지만, SO₂ 서리는 훨씬 차가운 트랩(~32 Pa 의 분압은 ~175 K 아래에서만 응결)을 필요로 해 극야에 국한됩니다 — 창백한 <span class=\"hex-chip\" style=\"background:#d8d09a\"></span><code>#d8d09a</code> 유황-서리 얼룩이 그 시각적 시그니처입니다.",
  "p_77":"<b>화산 지형.</b> 캐넌의 SO₂ 분율은 활발한 유황 화산 활동(Atmosphere 참조)을 강제하므로, 지형 판독은 더 오래된 크레이터 지각을 젊은 화산 평원이 점점이 찌르는 그림입니다 — 어두운 용암류, 열극 분출구, 밝은 서리-테두리 저온 트랩. 이는 화성 온도의 Io 팔레트입니다 — 유황 톤이 녹아 있기보다 죽여지고 얼어붙어 있습니다. 개연성 게이트에 따라 전지구 규모의 용암 렌더링은 <b>없으며</b>, 기껏해야 점광원 분출구 발광이 저신뢰 화산 활동의 장식으로만 허용됩니다.",
  "h2_78":"Atmosphere synthesis",
  "p_79":"조성과 기압 상한은 캐넌이며(84/8/4 CO₂/N₂/SO₂, 지구의 &lt; 1%), 합성의 몫은 그것들을 물리적으로 일관되게 만드는 것인데, 결과적으로 잘 맞아떨어집니다.",
  "p_80":"<b>얇은 기압은 임의가 아니라 자기정합적입니다.</b> 2.6 km/s 탈출 속도와 ~275 K 에서 CO₂ 의 열적 탈출은 느리지만, Gyr 규모의 비열적 스트리핑은 효율적입니다 — 달 질량 천체는 대기를 <i>유지</i>할 수 없고, 화산 탈가스와 탈출 사이의 정상 상태에서 대기를 <i>지탱</i>할 수 있을 뿐입니다. 채택한 ~800 Pa 값은 그런 균형이 그럴듯하게 붙잡는 화성 수준의 평형 기주이며, Weir 의 &quot;지구의 &lt; 1%&quot; 상한은 정확히 이 영역으로 읽힙니다.",
  "p_81":"<b>SO₂ 는 활발한 화산 활동의 결정적 증거입니다.</b> SO₂ 는 ~수십 년 규모로 광분해되고 응결합니다 — 4% 의 상시 분율은 연속적 보충 없이는 불가능합니다. 따라서 cfg 는 지속적 유황 화산 활동을 캐넌이 함의한 것으로 다루되, 정직한 약점으로서 <i>열원</i>에는 플래그를 답니다 — 조석 가열은 무시할 만하고(달 질량 천체가 0.635 AU 에서 e = 0.042), 따라서 예산은 1.8 Gyr 시점의 잔류 방사성 붕괴열 + 핵 결정화열이어야 합니다 — 경계선상이고, 저신뢰이며, 미해결 항목으로 기록합니다.",
  "p_82":"<b>온실효과와 기후.</b> 800 Pa 의 CO₂ 기주는 화성 규모의 온실효과(~6 K)를 더합니다 — 서리선에서는 유의미하지만 기후를 바꿔 놓을 정도는 아닙니다. 이 기압에서는 액체 물이 안정하지 않습니다(삼중점이 611 Pa; 가장 깊은 분지의 일시적 염수만이 이를 아슬아슬하게 비껴갈 수 있는데 — 텍스처 패스 제안으로만 남기고 cfg 주장으로는 두지 않습니다).",
  "p_83":"<b>아스트로파지 맥락(픽션 레이어).</b> PHM 캐넌에서 이 세계는 40 Eridani 의 아스트로파지가 번식하는 곳입니다 — CO₂ 대기가 탄소를 공급하고, 페트로바 호가 그것을 별과 잇습니다. NearStars 는 모든 아스트로파지 효과를 물리 행에서 배제합니다 — 호는 시각 레이어 피처일 뿐이며(아래 참조), 어떤 cfg 물리 값도 픽션의 생물학에 의존하지 않습니다.",
  "h2_84":"Rotation &amp; spin synthesis",
  "p_85":"조석 자전 감쇠는 거리에 따라 가파르게 스케일됩니다 — 0.635 AU 에서의 시간 척도는 0.4 AU 의 c 보다 대략 16 배로, 1.8 Gyr 시스템 나이에서 d 를 감쇠와 원시 자전의 경계에 둡니다. 순수한 동기 상태도, 빠른 원시 자전도 강제되지 않습니다.",
  "p_86":"<b>tie-break: ~240 h 의 부분 감쇠된 느린 자전체.</b> ~10 일 태양일은 경계선상의 감쇠와 정합하는 가장 시각적으로 생산적인 선택입니다 — 야면이 곤두박질쳐 서리로 뒤덮일 만큼 길고, 서리 명암경계가 일출을 눈에 띄게 뒤따를 만큼은 짧아 — 이동하는 서리선을 대표적 타임랩스 피처로 만듭니다. 자전 경사는 작지만 0 은 아니게(~5°) 남겨 극지 저온 트랩이 극지에 머물게 합니다.",
  "h2_87":"Visual styling",
  "li_88":"<b>전체 외관.</b> 창백한 유황-서리 얼룩(<span class=\"hex-chip\" style=\"background:#d8d09a\"></span><code>#d8d09a</code>)이 극지와 후행 야면을 따라 몰려 어룽진, 작고 차갑고 현무암-갈색인(<span class=\"hex-chip\" style=\"background:#6f665e\"></span><code>#6f665e</code>) 세계; 옅은 강청색 여명 띠(<span class=\"hex-chip\" style=\"background:#2e3550\"></span><code>#2e3550</code>)를 두른 얇고 또렷한 림.",
  "li_89":"<b>서리 명암경계 지연.</b> 240 h 자전일의 렌더링 가능한 결과 — 밤사이의 응결이 아직 승화하지 않은, 새벽 명암경계를 뒤따르는 밝은 서리 자락.",
  "li_90":"<b>분출구 발광(저신뢰 장식).</b> 드문 점광원 화산 분출구가 야면에서 희미하게 빛날 수 있음 — 개연성 게이트 아래 국소적 화산 활동으로 허용되며, 결코 용암 벌판으로는 안 됨.",
  "li_91":"<b>페트로바 호(픽션 레이어).</b> 이 시스템의 상징적 픽션 피처 — d 와 K0.5 V 주성 사이를 이동하는 아스트로파지 흐름으로, 캐넌상 25.984 μm 페트로바 파장(열적외선 — 물리적으로 눈에 보이지 않음; 희미한 짙은 붉은 호 렌더링은 소설 자신의 시각 언어를 예술적으로 옮긴 허용된 번역)으로 방출합니다. 이는 Kopernicus/Scatterer cfg 로 표현할 수 없으며 YZ Cet 플럭스 튜브와 같은 부류의 <b>커스텀 플러그인 후보</b> 로서 — 플러그인 트랙 백로그에 올려두며 이 리포트에서 emit 하지 않습니다.",
  "li_92":"<b>하늘의 동반체.</b> 시스템 전역 하늘 풍경에 따라 눈부신 점으로 보이는 백색왜성 B / 적색왜성 C 쌍.",
  "h2_93":"Canonical alternatives",
  "p_94":"<b>canonical 판독은 행성 없음입니다.</b> 이 주기에 어떤 종류의 검출도 존재하지 않으며, 현행 카탈로그는 40 Eridani A 주위에 확정된 행성을 하나도 싣지 않습니다. 이 천체는 b/c/d documented-divergence 앙상블의 <i>Project Hail Mary</i> 시스템-완성 조각으로서 존재합니다.",

  "h2_107":"Bibliography",
  "p_108":"픽션 천체에는 발견 문헌이 존재하지 않으므로, 참고문헌은 캐넌 출처, 호스트 그라운딩, 동역학 검증을 기록합니다.",

  "h3_114":"Method references",
  "li_115":"얇은 대기의 정상 상태(탈가스 대 탈출)와 화성 규모의 CO₂ 온실효과 — 도출값 그라운딩 정책의 교과서 예외에 따른 교과서 수준 추론; 공식은 <code>docs/reference/methodology.md</code> 에 있습니다.",
  "li_116":"SO₂ 광화학 수명 / 서리 응결 — 표준 Io 문헌 배경을 정성적으로 적용; 서리 배치 tie-break 을 넘어서는 어떤 수치 cfg 행도 이에 의존하지 않습니다.",
  "h2_117":"Open items for follow-up",
  "li_118":"<b>화산 열 예산이 약점입니다.</b> 달 질량 천체가 1.8 Gyr 시점에 방사성 붕괴열만으로 유황 화산 활동을 지탱하는 것은 경계선상입니다. 나중 패스가 더 단단한 근거를 원한다면, 설계 이심률을 약간 높이거나(조석 보조) 쇠퇴하는 간헐적 화산 활동을 받아들이는 선택지가 있습니다 — 둘 다 캐넌의 대기 안에 머뭅니다.",
  "li_119":"<b>페트로바 호 플러그인.</b> 호는 커스텀 플러그인 트랙 백로그에 올려두었으며 (YZ Cet 플럭스 튜브와 같은 부류; C#/Harmony 작업은 프로젝트 정책에 따라 위임). 이 리포트는 의도적으로 그에 대한 cfg 를 emit 하지 않습니다.",
  "li_120":"<b>자전은 순수 tie-break 입니다.</b> 캐넌에도 물리에도 240 h 자전일을 고정하는 것은 없으며, Phase 4 보드 개정이 자유롭게 다시 고를 수 있습니다 — 걸려 있는 것은 서리-명암경계 비주얼뿐입니다.",

let lang = localStorage.getItem('nearstars-lang') || 'ko';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('#lang-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

document.getElementById('lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('nearstars-lang', lang);
  applyLang();
});

applyLang();
</script>
