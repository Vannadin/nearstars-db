<!DOCTYPE html>
<!-- NearStars 3D 성도 뷰어 — build_starmap.py가 데이터를 주입해 생성 -->
<html lang="ko" data-ns="v2">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NearStars · 3D Star Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06070a; --surf1:rgba(255,255,255,.04); --surf2:rgba(255,255,255,.07);
  --pop:rgba(14,16,24,.86); --bd1:rgba(255,255,255,.09); --bd2:rgba(255,255,255,.14);
  --fg1:rgba(255,255,255,.94); --fg2:rgba(255,255,255,.74); --fg3:rgba(255,255,255,.52);
  --fg4:rgba(255,255,255,.34); --accent:#7aa8ff; --accent-glow:rgba(122,168,255,.34);
  --O:#b2c4ff;--B:#9eb8ff;--A:#cfdcff;--F:#f3f7c2;--G:#ffe28a;--K:#ffb47a;--M:#ff8a76;--X:#a3b0c8;
  --sans:'Geist','Inter',system-ui,'Noto Sans KR',sans-serif;
  --mono:'Geist Mono','SF Mono',Menlo,monospace; --r-card:14px; --r-chip:999px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--fg1);font-family:var(--sans)}
#stage{position:fixed;inset:0}
canvas{display:block}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:12px;
  padding:0 18px;z-index:20;background:linear-gradient(180deg,rgba(6,7,10,.82),transparent);pointer-events:none}
#topbar>*{pointer-events:auto}
#brand{font-weight:600;font-size:15px}
#brand .sub{color:var(--fg4);font-weight:400;font-size:12px;margin-left:8px}
.spacer{flex:1}
.btn{font-family:var(--sans);font-size:12px;color:var(--fg2);background:var(--surf1);border:1px solid var(--bd1);
  border-radius:8px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.16s}
.btn:hover{background:var(--surf2);color:var(--fg1)}
.btn.on{color:var(--accent);border-color:var(--accent-glow);background:rgba(122,168,255,.1)}
.btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5}
.btn.on .dot{opacity:1}
#legend{position:fixed;left:18px;bottom:18px;z-index:15;display:flex;flex-direction:column;gap:8px;
  background:var(--pop);border:1px solid var(--bd1);border-radius:var(--r-card);padding:12px 14px;backdrop-filter:blur(14px);max-width:240px}
#legend .h{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4)}
#legend .chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 9px;border-radius:var(--r-chip);color:#06070a}
.pchip{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:var(--r-chip);cursor:pointer;
  border:1px solid var(--bd2);color:var(--fg3);user-select:none;transition:.14s}
.pchip.on{background:var(--accent);border-color:var(--accent);color:#06070a;font-weight:600}
#legend .note{font-size:10.5px;color:var(--fg4);line-height:1.45}
#filter{position:fixed;right:18px;bottom:18px;z-index:15;width:240px;background:var(--pop);border:1px solid var(--bd1);
  border-radius:var(--r-card);padding:12px 15px;backdrop-filter:blur(14px)}
#filter .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
#filter .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4)}
#filter .val{font-family:var(--mono);font-size:12px;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
#info{position:fixed;top:64px;right:18px;width:320px;max-height:calc(100% - 150px);z-index:18;overflow-y:auto;
  background:var(--pop);border:1px solid var(--bd1);border-radius:var(--r-card);padding:18px 18px 16px;
  backdrop-filter:blur(16px);box-shadow:0 24px 80px -28px rgba(0,0,0,.7);display:none}
#info.show{display:block;animation:pop .26s cubic-bezier(.32,.72,0,1)}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
#info .close{position:absolute;top:12px;right:12px;color:var(--fg4);cursor:pointer;font-size:18px;line-height:1}
#info .close:hover{color:var(--fg1)}
#info h2{font-size:19px;font-weight:600;padding-right:24px;line-height:1.2}
#info .dist{font-family:var(--mono);font-size:12px;color:var(--fg3);margin-top:4px}
#info .sec{margin-top:16px}
#info .sec>.t{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4);margin-bottom:8px}
.comp,.pl{display:flex;align-items:center;gap:9px;padding:5px 0;border-top:1px solid var(--bd1)}
.comp:first-of-type,.pl:first-of-type{border-top:none}
.comp .pill{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:var(--r-chip);color:#06070a;flex-shrink:0}
.comp .nm{font-size:13px;color:var(--fg1)} .pl .nm{font-size:12.5px;color:var(--fg2)}
.comp .meta,.pl .meta{font-family:var(--mono);font-size:10.5px;color:var(--fg4);margin-left:auto;text-align:right}
.pl .swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#info .enter{margin-top:16px;width:100%;justify-content:center}
#info .nofly{margin-top:14px;font-size:11px;color:var(--fg4);text-align:center}
#labels{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden}
.label{position:absolute;transform:translate(-50%,-140%);white-space:nowrap;font-size:11.5px;color:var(--fg2);
  text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;will-change:transform;letter-spacing:.2px}
.label.confirmed{color:var(--fg1)}
.label.confirmed::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);margin-right:5px;vertical-align:middle}
.label.ring{font-family:var(--mono);color:var(--fg4);font-size:10px;transform:translate(-50%,-50%)}
.label.sun{color:#ffe28a;font-weight:600}
/* crosshair markers for real-size bodies (visible when zoomed in) */
.xhair{position:absolute;will-change:transform;pointer-events:none}
.xhair i{position:absolute;left:-7px;top:-7px;width:14px;height:14px;border:1px solid var(--xc);border-radius:50%;opacity:.85;box-shadow:0 0 6px var(--xc)}
.xhair::before,.xhair::after{content:'';position:absolute;left:0;top:-9px;width:1px;height:5px;background:var(--xc);opacity:.8;transform:translateX(-.5px)}
.xhair::after{top:auto;bottom:-9px}
.xhair .lbl{position:absolute;left:11px;top:-7px;white-space:nowrap;font-size:11px;color:var(--fg2);text-shadow:0 1px 3px #000}
.xhair.star .lbl{color:var(--fg1);font-weight:500}
#hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:14;font-size:11px;color:var(--fg4);text-align:center;pointer-events:none;transition:opacity .4s}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="stage"></div>
<div id="labels"></div>

<div id="topbar">
  <div id="brand">NearStars<span class="sub" data-i18n="subtitle">근방 항성계 3D 지도</span></div>
  <div class="spacer"></div>
  <button class="btn" id="toggleLabels"><span class="dot"></span><span data-i18n="allLabels">모든 라벨</span></button>
  <button class="btn on" id="toggleStems"><span class="dot"></span><span data-i18n="dropLines">수직선</span></button>
  <button class="btn" id="toggleOrbits"><span class="dot"></span><span data-i18n="orbits">궤도</span></button>
  <button class="btn" id="toggleFar"><span class="dot"></span><span data-i18n="beyond">50광년 밖</span></button>
  <button class="btn" id="toggleLang">EN</button>
</div>

<div id="legend">
  <div class="h" data-i18n="legendTitle">분광형 (색 = 표면온도)</div>
  <div class="chips" id="chips"></div>
  <div class="h" data-i18n="phaseTitle" style="margin-top:4px">큐레이션 단계</div>
  <div class="chips" id="phaseChips"></div>
  <div class="note" data-i18n="legendNote">별을 향해 그대로 줌인하면 실제 크기의 행성이 나타납니다(크로스헤어 표시). 크기·궤도는 실측, 색은 흑체 근사. 좌표계 = ICRS, 원점 = 태양.</div>
</div>

<div id="filter">
  <div class="row"><span class="lbl" data-i18n="distFilter">거리 필터</span><span class="val" id="distVal">50 ly</span></div>
  <input type="range" id="distSlider" min="4" max="800" value="50" step="1">
</div>

<div id="info">
  <div class="close" id="infoClose">×</div>
  <h2 id="infoName"></h2>
  <div class="dist" id="infoDist"></div>
  <div class="sec" id="infoCompSec"><div class="t" data-i18n="components">구성원</div><div id="infoComps"></div></div>
  <div class="sec" id="infoPlSec"><div class="t" data-i18n="planets">행성</div><div id="infoPls"></div></div>
  <button class="btn enter" id="infoEnter" data-i18n="flyHere">여기로 날아가기 →</button>
  <div class="nofly" id="infoNoFly" data-i18n="noPlanets">알려진 행성 없음</div>
</div>

<div id="hint" data-i18n="hint">드래그 = 회전 · 휠 = 줌 · WASD/화살표 = 이동(R·F 상하) · 클릭 = 정보 · 더블클릭 = 포커스</div>

<script type="module">
import * as THREE from 'three';

const DATA = JSON.parse(document.getElementById('starmap-data').textContent);
const SPEC = {O:'#b2c4ff',B:'#9eb8ff',A:'#cfdcff',F:'#f3f7c2',G:'#ffe28a',K:'#ffb47a',M:'#ff8a76',X:'#a3b0c8'};

/* ── units ────────────────────────────────────────────────────────────── */
const AU_PER_LY = 63241.077;      // scene unit = 1 AU
const R_SUN_AU  = 0.00465047;
const R_EARTH_AU= 4.26352e-5;
const DEG = Math.PI/180;

/* ── i18n ─────────────────────────────────────────────────────────────── */
const STR = {
  ko:{subtitle:'근방 항성계 3D 지도',allLabels:'모든 라벨',dropLines:'수직선',orbits:'궤도',beyond:'50광년 밖',
    legendTitle:'분광형 (색 = 표면온도)',

    distFilter:'거리 필터',phaseTitle:'큐레이션 단계',components:'구성원',planets:'행성',flyHere:'여기로 날아가기 →',noPlanets:'알려진 행성 없음',
    hint:'드래그 = 회전 · 휠 = 줌 · WASD/화살표 = 이동(R·F 상하) · 클릭 = 정보 · 더블클릭 = 포커스',
    ly:'광년',pc:'pc'},
  en:{subtitle:'3D map of nearby star systems',allLabels:'All labels',dropLines:'Drop lines',orbits:'Orbits',beyond:'Beyond 50 ly',
    legendTitle:'Spectral type (colour = surface temp)',
    legendNote:'Zoom straight into a star and its real-size planets appear (marked with crosshairs). Sizes & orbits are to scale; colour is a blackbody approx. Frame = ICRS, origin = Sol.',
    distFilter:'Distance filter',phaseTitle:'Curation phase',components:'Components',planets:'Planets',flyHere:'Fly here →',noPlanets:'No known planets',
    hint:'drag = rotate · wheel = zoom · WASD/arrows = move (R·F up/down) · click = info · double-click = focus',
    ly:'ly',pc:'pc'}
};
let lang='ko';
function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n; if(STR[lang][k]!==undefined) el.textContent=STR[lang][k];});
  document.getElementById('toggleLang').textContent = lang==='ko'?'EN':'한';
  if(selected) renderInfo(selected);
}
const t=k=>STR[lang][k];

/* ── renderer / scene ─────────────────────────────────────────────────── */
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true,logarithmicDepthBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
stage.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color('#06070a');
// near 1e-5 AU (resolve planets) .. far 1e8 AU (~1580 ly); log depth spans it
const camera=new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 1e-5, 1e8);
camera.position.set(0, 1.7e6, 3.4e6);
const controls=new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.zoomToCursor=true; controls.minDistance=1e-4; controls.maxDistance=1.2e8;
scene.add(new THREE.AmbientLight(0xffffff,1.0));

/* floating origin (in light-years). scene = M(P_ly - originLy)*U, M:(x,y,z)->(x,z,y) */
const originLy=new THREE.Vector3(0,0,0);
const U=AU_PER_LY;
function lyToScene(P){ return new THREE.Vector3((P.x-originLy.x),(P.z-originLy.z),(P.y-originLy.y)).multiplyScalar(U); }
function sceneToLyDelta(v){ return new THREE.Vector3(v.x/U, v.z/U, v.y/U); } // inverse of M, /U
const REBASE_AU=4000; // keep the look-at point near scene origin for float32 precision

/* glow texture */
function glowTexture(){
  const s=128,c=document.createElement('canvas');c.width=c.height=s;
  const g=c.getContext('2d'),grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,'rgba(255,255,255,1)');grd.addColorStop(.25,'rgba(255,255,255,.65)');
  grd.addColorStop(.55,'rgba(255,255,255,.18)');grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grd;g.fillRect(0,0,s,s);return new THREE.CanvasTexture(c);
}
const GLOW=glowTexture();

/* backdrop starfield (follows camera, sits at infinity) */
const backdrop=(function(){
  const n=1500,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){const r=1,th=i*2.399963,ph=Math.acos(1-2*((i+.5)/n));
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.cos(ph);pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(g,new THREE.PointsMaterial({color:0x6b7280,size:1.6,sizeAttenuation:false,transparent:true,opacity:.5}));
  pts.frustumCulled=false; scene.add(pts); return pts;
})();

/* reference rings on the ICRS x–y plane */
const ringGroup=new THREE.Group(); scene.add(ringGroup);
const ringLabels=[];
[5,10,25,50].forEach(r=>{
  const seg=160,pts=[];
  for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*r*U,0,Math.sin(a)*r*U));}
  ringGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x2a3346,transparent:true,opacity:.5})));
  ringLabels.push({r, local:new THREE.Vector3(r*U,0,0), el:mkLabel(r+' ly','label ring')});
});

function mkLabel(txt,cls){const el=document.createElement('div');el.className=cls||'label';el.textContent=txt;document.getElementById('labels').appendChild(el);return el;}

/* ── Kepler: element set → position (AU) in the host-local scene frame ─── */
function meanToTrue(M,e){
  let E=M; for(let k=0;k<10;k++){E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));}
  return 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
}
// orbit point at true anomaly nu → scene-AU vector (relative to focus/host)
function orbitPoint(a,e,iDeg,OmDeg,omDeg,nu){
  const r=a*(1-e*e)/(1+e*Math.cos(nu));
  const xp=r*Math.cos(nu), yp=r*Math.sin(nu);
  const i=(iDeg||0)*DEG, Om=(OmDeg||0)*DEG, om=(omDeg||0)*DEG;
  // Rz(om)
  let X=xp*Math.cos(om)-yp*Math.sin(om), Y=xp*Math.sin(om)+yp*Math.cos(om), Z=0;
  // Rx(i)
  let Y2=Y*Math.cos(i)-Z*Math.sin(i), Z2=Y*Math.sin(i)+Z*Math.cos(i); X=X;
  // Rz(Om)
  let X3=X*Math.cos(Om)-Y2*Math.sin(Om), Y3=X*Math.sin(Om)+Y2*Math.cos(Om), Z3=Z2;
  // ICRS-like (X3,Y3,Z3) → scene (x,z,y)
  return new THREE.Vector3(X3, Z3, Y3);
}
function orbitPhase(el){ // mean anomaly (rad) from M or 0
  if(el.M_deg!=null) return el.M_deg*DEG;
  return null;
}

/* ── build per-cluster nodes ──────────────────────────────────────────── */
const clusters=[];   // {data, node, glow, sysScale, bodies:[{kind,name,obj,rgb}], stem, labelEl, orbitsLines:[]}
const glowSprites=[];
DATA.clusters.forEach(c=>{
  const node=new THREE.Group();
  node.position.copy(lyToScene(new THREE.Vector3(c.pos[0],c.pos[1],c.pos[2])));
  scene.add(node);

  // map-scale glow marker (rep colour) at cluster origin
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:new THREE.Color(c.rep_rgb),
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  glow.userData.cluster=c; node.add(glow); glowSprites.push(glow);

  const bodies=[]; const orbitsLines=[];
  let sysScale=0.6;

  // components (real-size stars). Close pairs follow their measured
  // gravitational (Keplerian) relative orbit about the primary; wide pairs
  // (long period, no phase) sit at their measured astrometric offset.
  c.components.forEach((m,ci)=>{
    const off=m.offset_au; // ICRS AU
    let cpos;
    const o=m.orbit;
    if(o && o.a_au){
      let M0=0;
      if(o.T_jd!=null && o.P_yr && c.epoch_jd!=null) M0=2*Math.PI*((c.epoch_jd-o.T_jd)/365.25)/o.P_yr;
      const e=o.e||0, norm=x=>((x%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      cpos=orbitPoint(o.a_au,e,o.i_deg,o.Omega_deg,o.omega_deg, meanToTrue(norm(M0),e));
      // full relative-orbit ellipse (faint) — the gravitational path
      const ep=[];
      for(let k=0;k<=240;k++){const v=k/240*2*Math.PI; ep.push(orbitPoint(o.a_au,e,o.i_deg,o.Omega_deg,o.omega_deg,v));}
      const ell=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ep),
        new THREE.LineBasicMaterial({color:0x5a6a88,transparent:true,opacity:.38}));
      node.add(ell); orbitsLines.push(ell);
      // past trajectory — the arc swept over the last ~125° of mean anomaly, ending now
      const tp=[],span=2.2;
      for(let k=0;k<=90;k++){const mm=M0-span+span*(k/90); tp.push(orbitPoint(o.a_au,e,o.i_deg,o.Omega_deg,o.omega_deg, meanToTrue(norm(mm),e)));}
      const trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints(tp),
        new THREE.LineBasicMaterial({color:new THREE.Color(m.rgb),transparent:true,opacity:.8}));
      node.add(trail); orbitsLines.push(trail);
    } else {
      cpos=new THREE.Vector3(off[0],off[2],off[1]); // → scene (x,z,y), AU (measured)
    }
    sysScale=Math.max(sysScale, cpos.length());
    const cg=new THREE.Group(); cg.position.copy(cpos); node.add(cg);
    const rr=Math.max((m.radius_rsun||0.3)*R_SUN_AU, R_SUN_AU*0.08);
    const star=new THREE.Mesh(new THREE.SphereGeometry(1,24,16),
      new THREE.MeshBasicMaterial({color:new THREE.Color(m.rgb)}));
    star.scale.setScalar(rr); cg.add(star);
    bodies.push({kind:'star',name:m.name,obj:cg,rgb:m.rgb,r:rr});

    // planets hosted by this component
    c.planets.filter(p=>p.host_star===m.name && p.a_au).forEach((p,pi)=>{
      const a=p.a_au, e=(p.e!=null?p.e:0);
      sysScale=Math.max(sysScale, cpos.length()+a*(1+e));
      // orbit line
      const seg=220,pts=[];
      for(let k=0;k<=seg;k++){const nu=k/seg*Math.PI*2; pts.push(orbitPoint(a,e,p.i_deg,p.Omega_deg,p.omega_deg,nu));}
      const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color:0x4a5a78,transparent:true,opacity:.75}));
      cg.add(line); orbitsLines.push(line);
      // planet at its phase (true anomaly from M, else spread by index)
      let mean=orbitPhase(p); if(mean==null) mean=pi*2.399963;
      const nu=meanToTrue(mean, e);
      const pp=orbitPoint(a,e,p.i_deg,p.Omega_deg,p.omega_deg,nu);
      const pr=Math.max((p.radius_rearth||1)*R_EARTH_AU, R_EARTH_AU*0.6);
      const pm=new THREE.Mesh(new THREE.SphereGeometry(1,16,12),
        new THREE.MeshBasicMaterial({color:new THREE.Color(p.rgb||'#ccd2de')}));
      pm.scale.setScalar(pr); pm.position.copy(pp); cg.add(pm);
      bodies.push({kind:'planet',name:p.name,obj:pm,rgb:p.rgb||'#ccd2de',r:pr});
    });
  });

  // vertical drop line to the ICRS plane
  let stem=null;
  if(!c.is_sol){
    const yEnd=-c.pos[2]*U; // scene-y of the plane below the cluster (local)
    const sg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,yEnd,0)]);
    const col=new THREE.Color(c.rep_rgb).lerp(new THREE.Color('#0b0e16'),0.5);
    stem=new THREE.Line(sg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.42}));
    const foot=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.6}));
    foot.position.set(0,yEnd,0); foot.scale.setScalar(sysScale*0.08+50); stem.add(foot);
    node.add(stem);
  }

  let labelEl=null;
  if(c.is_sol) labelEl=mkLabel('Sol','label sun');
  else if(c.is_confirmed_set) labelEl=mkLabel(c.label,'label confirmed');

  clusters.push({data:c,node,glow,sysScale,bodies,stem,labelEl,orbitsLines});
});

/* legend */
const chips=document.getElementById('chips');
Object.entries(SPEC).forEach(([k,v])=>{const d=document.createElement('span');d.className='chip';d.textContent=k;d.style.background=v;chips.appendChild(d);});

/* phase filter chips (curation Phase 1–3) */
const phaseOn={1:true,2:true,3:true};
const phaseCount={1:0,2:0,3:0};
clusters.forEach(cl=>{ if(!cl.data.is_sol) phaseCount[cl.data.max_phase]=(phaseCount[cl.data.max_phase]||0)+1; });
const phaseChips=document.getElementById('phaseChips');
[1,2,3].forEach(ph=>{
  const d=document.createElement('span'); d.className='pchip on'; d.textContent='P'+ph+' ('+(phaseCount[ph]||0)+')';
  d.onclick=()=>{ phaseOn[ph]=!phaseOn[ph]; d.classList.toggle('on',phaseOn[ph]); applyFilter(); };
  phaseChips.appendChild(d);
});

/* ── floating-origin rebase ───────────────────────────────────────────── */
function recomputeNodes(){
  clusters.forEach(c=> c.node.position.copy(lyToScene(new THREE.Vector3(c.data.pos[0],c.data.pos[1],c.data.pos[2]))));
  ringGroup.position.copy(lyToScene(new THREE.Vector3(0,0,0)));
}
function rebaseToTarget(){
  const tgt=controls.target.clone();
  if(tgt.length()<REBASE_AU) return;
  originLy.add(sceneToLyDelta(tgt));
  camera.position.sub(tgt); controls.target.set(0,0,0);
  recomputeNodes();
}

/* ── interaction: click = info, fly here ──────────────────────────────── */
const ray=new THREE.Raycaster(); const mouse=new THREE.Vector2(); let selected=null;
function pick(e){
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(glowSprites.filter(g=>g.visible && g.material.opacity>0.05),false);
  return hits.length?hits[0].object.userData.cluster:null;
}
renderer.domElement.addEventListener('pointermove',e=>{ hoverCl=pick(e); renderer.domElement.style.cursor=hoverCl?'pointer':'default'; });
let hoverCl=null;
renderer.domElement.addEventListener('click',e=>{ const c=pick(e); if(c){selected=c; renderInfo(c); document.getElementById('info').classList.add('show');} });
// double-click: focus the nearest body when zoomed in, else fly to the system
function pickBody(e){
  let best=null,bd=34*34;
  clusters.forEach(cl=>{ if(!cl._active) return;
    cl.bodies.forEach(b=>{ if(!b._shown) return;
      const dx=b._sx-e.clientX, dy=b._sy-e.clientY, d=dx*dx+dy*dy;
      if(d<bd){bd=d;best=b;} });
  });
  return best;
}
renderer.domElement.addEventListener('dblclick',e=>{
  const b=pickBody(e); if(b){ focusBody(b); return; }
  const c=pick(e); if(c){ flyTo(c); }
});
document.getElementById('infoClose').onclick=()=>{document.getElementById('info').classList.remove('show'); selected=null;};
document.getElementById('infoEnter').onclick=()=>{ if(selected) flyTo(selected); };

function fmt(x,d=2){return x==null?'—':(+x).toFixed(d);}
function renderInfo(c){
  document.getElementById('infoName').textContent=(lang==='ko'&&c.label_ko)?c.label_ko:c.label;
  document.getElementById('infoDist').textContent=c.is_sol?'—':`${fmt(c.distance_ly,2)} ${t('ly')} · ${fmt(c.distance_pc,2)} ${t('pc')}`;
  const cc=document.getElementById('infoComps');cc.innerHTML='';
  c.components.forEach(m=>{
    const row=document.createElement('div');row.className='comp';
    const pill=document.createElement('span');pill.className='pill';pill.textContent=m.spec_class;pill.style.background=SPEC[m.spec_class]||SPEC.X;
    const nm=document.createElement('span');nm.className='nm';nm.textContent=m.name;
    const meta=document.createElement('span');meta.className='meta';meta.textContent=(m.spectype||'—')+(m.teff_k?(' · '+m.teff_k+'K'):'');
    row.append(pill,nm,meta);cc.appendChild(row);
  });
  const ps=document.getElementById('infoPls');ps.innerHTML='';
  document.getElementById('infoPlSec').style.display=c.planets.length?'block':'none';
  c.planets.forEach(p=>{
    const row=document.createElement('div');row.className='pl';
    const sw=document.createElement('span');sw.className='swatch';sw.style.background=p.rgb||'#ccd2de';
    const nm=document.createElement('span');nm.className='nm';nm.textContent=p.name;
    const meta=document.createElement('span');meta.className='meta';const b=[];
    if(p.radius_rearth)b.push(fmt(p.radius_rearth,1)+' R⊕'); if(p.a_au)b.push(fmt(p.a_au,2)+' AU');
    meta.textContent=b.join(' · ');row.append(sw,nm,meta);ps.appendChild(row);
  });
  document.getElementById('infoEnter').style.display=c.planets.length?'flex':'none';
  document.getElementById('infoNoFly').style.display=c.planets.length?'none':'block';
}

/* smooth fly to a cluster (rebase origin there, dolly to system scale) */
let fly=null;
function flyTo(c){
  const cl=clusters.find(x=>x.data===c); if(!cl) return;
  // rebase origin onto the cluster so local coords are tiny & precise
  originLy.set(c.pos[0],c.pos[1],c.pos[2]); recomputeNodes();
  const dist=Math.max(cl.sysScale*3.2, 0.4);
  const dir=new THREE.Vector3(0.35,0.5,1).normalize();
  fly={from:camera.position.clone(),to:dir.multiplyScalar(dist),tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
  document.getElementById('info').classList.remove('show');
}

/* focus the camera on a single body (rebase origin onto it, dolly close) */
function focusBody(b){
  b.obj.getWorldPosition(wp); const ws=wp.clone();          // body scene pos now
  originLy.add(sceneToLyDelta(ws));                          // origin → body
  camera.position.sub(ws); controls.target.sub(ws);         // keep view continuous
  recomputeNodes();                                         // body now at ~origin
  const dist=Math.max((b.r||R_EARTH_AU)*(b.kind==='star'?70:160), 5e-4);
  const dir=new THREE.Vector3(0.4,0.45,1).normalize();
  fly={from:camera.position.clone(),to:dir.multiplyScalar(dist),tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
}

/* ── toggles / filter ─────────────────────────────────────────────────── */
let showAllLabels=false, showStems=true, showOrbits=true, showFar=false, distLimit=50;
const btnLabels=document.getElementById('toggleLabels'), btnStems=document.getElementById('toggleStems'),
      btnOrbits=document.getElementById('toggleOrbits'), btnFar=document.getElementById('toggleFar');
btnLabels.onclick=()=>{showAllLabels=!showAllLabels;btnLabels.classList.toggle('on',showAllLabels);ensureLabels();};
btnStems.onclick=()=>{showStems=!showStems;btnStems.classList.toggle('on',showStems);applyFilter();};
btnOrbits.onclick=()=>{showOrbits=!showOrbits;btnOrbits.classList.toggle('on',showOrbits);};
btnFar.onclick=()=>{showFar=!showFar;btnFar.classList.toggle('on',showFar);
  const s=document.getElementById('distSlider'); s.value=showFar?800:50; distLimit=+s.value;
  document.getElementById('distVal').textContent=distLimit+' ly'; applyFilter();};
document.getElementById('toggleLang').onclick=()=>{lang=lang==='ko'?'en':'ko';applyLang();};
const slider=document.getElementById('distSlider');
slider.oninput=()=>{distLimit=+slider.value;document.getElementById('distVal').textContent=distLimit+' ly';applyFilter();};
btnOrbits.classList.add('on');

function clusterVisible(c){ return c.is_sol || (c.distance_ly<=distLimit && (showFar||!c.beyond_50ly) && phaseOn[c.max_phase]); }
function applyFilter(){
  clusters.forEach(cl=>{
    const vis=clusterVisible(cl.data);
    cl.node.visible=vis;
    if(cl.stem) cl.stem.visible=vis&&showStems;
    if(cl.labelEl) cl.labelEl.style.display=vis?'':'none';
  });
}
function ensureLabels(){
  clusters.forEach(cl=>{
    const need=showAllLabels||cl.data.is_sol||cl.data.is_confirmed_set;
    if(need&&!cl.labelEl) cl.labelEl=mkLabel(cl.data.label, cl.data.is_sol?'label sun':(cl.data.is_confirmed_set?'label confirmed':'label'));
    if(cl.labelEl) cl.labelEl.style.display=need?'':'none';
  });
  applyFilter();
}

/* ── crosshair pool (real-size bodies when zoomed in) ─────────────────── */
const xpool=[]; let xused=0;
function getXhair(){
  if(xused<xpool.length) return xpool[xused++];
  const el=document.createElement('div'); el.className='xhair';
  el.innerHTML='<i></i><span class="lbl"></span>';
  document.getElementById('labels').appendChild(el); xpool.push(el); xused++; return el;
}

/* ── per-frame LOD + projection ───────────────────────────────────────── */
const wp=new THREE.Vector3(), proj=new THREE.Vector3();
function projectToScreen(v){ proj.copy(v).project(camera);
  return {x:(proj.x*.5+.5)*innerWidth, y:(-proj.y*.5+.5)*innerHeight, on:proj.z<1}; }

function updateScene(){
  rebaseToTarget();
  backdrop.position.copy(camera.position);
  xused=0;
  const camPos=camera.position;
  clusters.forEach(cl=>{
    if(!cl.node.visible) return;
    const dist=camPos.distanceTo(cl.node.position);
    const full=cl.sysScale*7, enter=cl.sysScale*45;
    const t=Math.max(0,Math.min(1,(dist-full)/(enter-full))); // 1 = far (map), 0 = inside system
    // glow: constant screen size, fade out as we enter the system
    cl.glow.material.opacity=t;
    const gsz=(cl.data.is_sol?1.6:cl.data.rep_radius*1.5)*0.03*dist;
    cl.glow.scale.setScalar(gsz);
    const active=t<0.999; cl._active=active;
    // real bodies + orbits visible only when active
    cl.orbitsLines.forEach(l=>l.visible=active&&showOrbits);
    cl.bodies.forEach(b=>{ if(b.kind==='star') b.obj.visible=true; else b.obj.visible=active; });
    // crosshairs for active cluster bodies
    if(active){
      cl.bodies.forEach(b=>{
        b._shown=false;
        b.obj.getWorldPosition(wp);
        const s=projectToScreen(wp);
        if(!s.on||s.x<-40||s.x>innerWidth+40||s.y<-40||s.y>innerHeight+40) return;
        const el=getXhair();
        el.className='xhair'+(b.kind==='star'?' star':'');
        el.style.setProperty('--xc', b.rgb);
        el.style.left=s.x+'px'; el.style.top=s.y+'px'; el.style.display='';
        const lbl=el.firstElementChild.nextElementSibling; lbl.textContent=b.name;
        b._sx=s.x; b._sy=s.y; b._shown=true;
      });
    } else { cl.bodies.forEach(b=>b._shown=false); }
    // cluster name label (map scale)
    if(cl.labelEl){
      if(!active){ const s=projectToScreen(cl.node.position);
        if(s.on){cl.labelEl.style.display='';cl.labelEl.style.left=s.x+'px';cl.labelEl.style.top=s.y+'px';}
        else cl.labelEl.style.display='none';
      } else cl.labelEl.style.display='none';
    }
  });
  for(let i=xused;i<xpool.length;i++) xpool[i].style.display='none';
  // ring labels
  ringLabels.forEach(r=>{ const w=r.local.clone().add(ringGroup.position); const s=projectToScreen(w);
    r.el.style.display=(r.r<=distLimit&&s.on)?'':'none'; if(s.on){r.el.style.left=s.x+'px';r.el.style.top=s.y+'px';} });
}

/* ── keyboard fly (WASD + arrows) ─────────────────────────────────────── */
const keys={};
const MOVE=new Set(['KeyW','KeyA','KeyS','KeyD','KeyR','KeyF','Space','ShiftLeft',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);
addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT') return; if(MOVE.has(e.code)){keys[e.code]=true; e.preventDefault();} });
addEventListener('keyup',e=>{ keys[e.code]=false; });
const _f=new THREE.Vector3(),_r=new THREE.Vector3(),_mv=new THREE.Vector3();
function applyKeys(){
  _mv.set(0,0,0);
  camera.getWorldDirection(_f);
  _r.crossVectors(_f,camera.up).normalize();
  if(keys.KeyW||keys.ArrowUp) _mv.add(_f);
  if(keys.KeyS||keys.ArrowDown) _mv.addScaledVector(_f,-1);
  if(keys.KeyD||keys.ArrowRight) _mv.add(_r);
  if(keys.KeyA||keys.ArrowLeft) _mv.addScaledVector(_r,-1);
  if(keys.KeyR||keys.Space) _mv.add(camera.up);
  if(keys.KeyF||keys.ShiftLeft) _mv.addScaledVector(camera.up,-1);
  if(_mv.lengthSq()===0) return;
  _mv.normalize().multiplyScalar(controls.getDistance()*0.03); // speed scales with zoom
  camera.position.add(_mv); controls.target.add(_mv);
  fly=null; // a keypress cancels an in-progress fly
}

/* ── render loop ──────────────────────────────────────────────────────── */
function tick(){
  requestAnimationFrame(tick);
  applyKeys();
  if(fly){ fly.k=Math.min(1,fly.k+0.04);
    const e=1-Math.pow(1-fly.k,3);
    camera.position.lerpVectors(fly.from,fly.to,e);
    controls.target.lerpVectors(fly.tFrom,fly.tTo,e);
    if(fly.k>=1) fly=null;
  }
  controls.update();
  updateScene();
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},7000);

ensureLabels(); applyFilter(); applyLang(); tick();
</script>
</body>
</html>
