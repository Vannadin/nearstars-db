<!DOCTYPE html>
<!-- NearStars 3D 성도 뷰어 — build_starmap.py가 데이터를 주입해 생성 -->
<html lang="ko" data-ns="v2">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NearStars · 3D Star Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06070a; --surf1:rgba(255,255,255,.04); --surf2:rgba(255,255,255,.07);
  --pop:rgba(14,16,24,.86); --bd1:rgba(255,255,255,.09); --bd2:rgba(255,255,255,.14);
  --fg1:rgba(255,255,255,.94); --fg2:rgba(255,255,255,.74); --fg3:rgba(255,255,255,.52);
  --fg4:rgba(255,255,255,.34); --accent:#7aa8ff; --accent-glow:rgba(122,168,255,.34);
  --O:#b2c4ff;--B:#9eb8ff;--A:#cfdcff;--F:#f3f7c2;--G:#ffe28a;--K:#ffb47a;--M:#ff8a76;--X:#a3b0c8;
  --sans:'Geist','Inter',system-ui,'Noto Sans KR',sans-serif;
  --mono:'Geist Mono','SF Mono',Menlo,monospace; --r-card:14px; --r-chip:999px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--fg1);font-family:var(--sans)}
#stage{position:fixed;inset:0}
canvas{display:block}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:12px;
  padding:0 18px;z-index:20;background:linear-gradient(180deg,rgba(6,7,10,.82),transparent);pointer-events:none}
#topbar>*{pointer-events:auto}
#brand{font-weight:600;font-size:15px}
#brand .sub{color:var(--fg4);font-weight:400;font-size:12px;margin-left:8px}
.spacer{flex:1}
.btn{font-family:var(--sans);font-size:12px;color:var(--fg2);background:var(--surf1);border:1px solid var(--bd1);
  border-radius:8px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.16s}
.btn:hover{background:var(--surf2);color:var(--fg1)}
.btn.on{color:var(--accent);border-color:var(--accent-glow);background:rgba(122,168,255,.1)}
.btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5}
.btn.on .dot{opacity:1}
#legend{position:fixed;left:18px;bottom:18px;z-index:15;display:flex;flex-direction:column;gap:8px;
  background:var(--pop);border:1px solid var(--bd1);border-radius:var(--r-card);padding:12px 14px;backdrop-filter:blur(14px);max-width:240px}
#legend .h{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4)}
#legend .chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 9px;border-radius:var(--r-chip);color:#06070a}
.pchip{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:var(--r-chip);cursor:pointer;
  border:1px solid var(--bd2);color:var(--fg3);user-select:none;transition:.14s}
.pchip.on{background:var(--accent);border-color:var(--accent);color:#06070a;font-weight:600}
#legend .note{font-size:10.5px;color:var(--fg4);line-height:1.45}
#filter{position:fixed;right:18px;bottom:18px;z-index:15;width:240px;background:var(--pop);border:1px solid var(--bd1);
  border-radius:var(--r-card);padding:12px 15px;backdrop-filter:blur(14px)}
#filter .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
#filter .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4)}
#filter .val{font-family:var(--mono);font-size:12px;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
#info{position:fixed;top:64px;right:18px;width:320px;max-height:calc(100% - 150px);z-index:18;overflow-y:auto;
  background:var(--pop);border:1px solid var(--bd1);border-radius:var(--r-card);padding:18px 18px 16px;
  backdrop-filter:blur(16px);box-shadow:0 24px 80px -28px rgba(0,0,0,.7);display:none}
#info.show{display:block;animation:pop .26s cubic-bezier(.32,.72,0,1)}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
#info .close{position:absolute;top:12px;right:12px;color:var(--fg4);cursor:pointer;font-size:18px;line-height:1}
#info .close:hover{color:var(--fg1)}
#info h2{font-size:19px;font-weight:600;padding-right:24px;line-height:1.2}
#info .dist{font-family:var(--mono);font-size:12px;color:var(--fg3);margin-top:4px}
#info .sec{margin-top:16px}
#info .sec>.t{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4);margin-bottom:8px}
.comp,.pl{display:flex;align-items:center;gap:9px;padding:5px 0;border-top:1px solid var(--bd1)}
.comp:first-of-type,.pl:first-of-type{border-top:none}
.comp .pill{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:var(--r-chip);color:#06070a;flex-shrink:0}
.comp .nm{font-size:13px;color:var(--fg1)} .pl .nm{font-size:12.5px;color:var(--fg2)}
.comp.clickable,.pl.clickable{cursor:pointer;margin:0 -6px;padding-left:6px;padding-right:6px;border-radius:7px;transition:.14s}
.comp.clickable:hover,.pl.clickable:hover{background:var(--surf1)}
.comp.clickable:hover .nm,.pl.clickable:hover .nm{color:var(--accent)}
.comp.clickable .nm::after,.pl.clickable .nm::after{content:' →';color:var(--fg4);font-size:11px}
.comp .meta,.pl .meta{font-family:var(--mono);font-size:10.5px;color:var(--fg4);margin-left:auto;text-align:right}
.pl .swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.p3{margin-left:8px;flex-shrink:0;font-family:var(--mono);font-size:9.5px;color:var(--accent);text-decoration:none;
  border:1px solid var(--accent-glow);border-radius:var(--r-chip);padding:1px 6px;opacity:.85;transition:.14s}
.p3:hover{opacity:1;background:rgba(122,168,255,.12)}
#info .enter{margin-top:16px;width:100%;justify-content:center}
#info .nofly{margin-top:14px;font-size:11px;color:var(--fg4);text-align:center}
#labels{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden}
.label{position:absolute;transform:translate(-50%,-140%);white-space:nowrap;font-size:11.5px;color:var(--fg2);
  text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;will-change:transform;letter-spacing:.2px}
.label.confirmed{color:var(--fg1)}
.label.confirmed::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);margin-right:5px;vertical-align:middle}
.label.ring{font-family:var(--mono);color:var(--fg4);font-size:10px;transform:translate(-50%,-50%)}
.label.sun{color:#ffe28a;font-weight:600}
/* crosshair markers for real-size bodies (visible when zoomed in) */
.xhair{position:absolute;will-change:transform;pointer-events:none}
.xhair i{position:absolute;left:-7px;top:-7px;width:14px;height:14px;border:1px solid var(--xc);border-radius:50%;opacity:.85;box-shadow:0 0 6px var(--xc)}
.xhair::before,.xhair::after{content:'';position:absolute;left:0;top:-9px;width:1px;height:5px;background:var(--xc);opacity:.8;transform:translateX(-.5px)}
.xhair::after{top:auto;bottom:-9px}
.xhair .lbl{position:absolute;left:11px;top:-7px;white-space:nowrap;font-size:11px;color:var(--fg2);text-shadow:0 1px 3px #000}
.xhair.star .lbl{color:var(--fg1);font-weight:500}
/* selected body — larger accent crosshair with corner brackets */
.xhair.sel i{left:-12px;top:-12px;width:24px;height:24px;border-color:var(--accent);border-width:1.5px;opacity:1;box-shadow:0 0 12px var(--accent-glow),inset 0 0 6px var(--accent-glow)}
.xhair.sel::before,.xhair.sel::after{height:9px;background:var(--accent);opacity:1;width:1.5px}
.xhair.sel::before{top:-15px} .xhair.sel::after{bottom:-15px}
.xhair.sel .lbl{left:17px;color:var(--accent);font-weight:600;font-size:11.5px}
#hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:14;font-size:11px;color:var(--fg4);text-align:center;pointer-events:none;transition:opacity .4s}
#stabPanel{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:19;display:none;width:460px;
  background:var(--pop);border:1px solid var(--bd1);border-radius:var(--r-card);padding:13px 16px 12px;
  backdrop-filter:blur(16px);box-shadow:0 12px 48px -8px rgba(0,0,0,.7)}
#stabPanel.show{display:block}
#stabPanel .sx{position:absolute;top:9px;right:12px;color:var(--fg4);cursor:pointer;font-size:16px;line-height:1}
#stabPanel .sx:hover{color:var(--fg1)}
#stabPanel .st{font-size:11px;color:var(--fg3);margin-bottom:7px;padding-right:18px}
#stabPanel .st b{color:var(--fg1)}
#stabPanel .svar{display:flex;align-items:center;gap:9px;margin-bottom:9px}
#stabVariant{font-family:var(--sans);font-size:11px;color:var(--accent);background:var(--surf1);border:1px solid var(--accent-glow);border-radius:var(--r-chip);padding:3px 11px;cursor:pointer;flex-shrink:0}
#stabNote{font-size:11px;color:var(--fg4);line-height:1.4}
#stabPanel .sctl{display:flex;align-items:center;gap:11px}
#stabPlay{font-family:var(--sans);font-size:13px;color:var(--accent);background:var(--surf1);border:1px solid var(--accent-glow);border-radius:6px;padding:4px 0;cursor:pointer;width:40px;flex-shrink:0}
#stabSlider{flex:1;accent-color:var(--accent);cursor:pointer}
#stabPanel .srd{margin-top:9px;font-family:var(--mono);font-size:12px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#stabPanel .srd .warn{color:#ff5a3c;font-weight:600}
#stabChartBtn,#stabExpand{font-size:13px;background:var(--surf1);border:1px solid var(--bd1);border-radius:6px;padding:4px 7px;cursor:pointer;flex-shrink:0;line-height:1}
#stabChartBtn.on{border-color:var(--accent-glow);background:rgba(122,168,255,.12)}
#stabExpand:hover{border-color:var(--accent-glow);color:var(--fg1)}
#stabChart{display:block;width:100%;margin-top:10px;border-top:1px solid var(--bd1);padding-top:9px}
/* expand-to-modal: large readable charts over a dimmed backdrop */
#stabModal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(4,6,11,.72);backdrop-filter:blur(6px)}
#stabModal.show{display:flex}
#stabModal .card{width:86vw;height:84vh;max-width:1100px;background:var(--pop);border:1px solid var(--bd1);
  border-radius:var(--r-card);padding:16px 20px 18px;display:flex;flex-direction:column;box-shadow:0 24px 80px -12px rgba(0,0,0,.8)}
#stabModal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#stabModal .mh span:first-child{font-size:14px;color:var(--fg1)}
#stabModal .mx{cursor:pointer;color:var(--fg4);font-size:24px;line-height:1}
#stabModal .mx:hover{color:var(--fg1)}
#stabBigCanvas{flex:1;width:100%;min-height:0}
.hidden{display:none!important}
#zoomctl{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:16;display:flex;flex-direction:column;
  align-items:center;gap:7px;background:var(--pop);border:1px solid var(--bd1);border-radius:999px;
  padding:10px 7px;backdrop-filter:blur(14px);box-shadow:0 10px 36px -14px rgba(0,0,0,.6)}
#zoomctl .zb{width:22px;height:22px;border:none;background:var(--surf1);color:var(--fg2);border-radius:50%;
  font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
#zoomctl .zb:hover{background:var(--surf2);color:var(--fg1)}
#zoomSlider{writing-mode:vertical-lr;direction:rtl;width:6px;height:150px;accent-color:var(--accent);cursor:pointer}
#info.show ~ #zoomctl{right:350px} /* keep the zoom dock clear of the open detail panel (#info is 320px @ right:18px) */
#stage,canvas{touch-action:none} /* let OrbitControls own pinch/drag, not the browser */
/* ── mobile / touch layout ─────────────────────────────────────────────── */
@media (max-width:640px){
  #topbar{height:48px;gap:7px;padding:0 10px;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  #topbar::-webkit-scrollbar{display:none}
  #topbar>*{flex-shrink:0}
  #brand{font-size:13px} #brand .sub{display:none} .spacer{display:none}
  .btn{padding:8px 11px}
  #legend{left:10px;bottom:10px;max-width:46vw;padding:9px 10px;gap:6px;border-radius:11px}
  #legend .note{display:none}
  #legend .h{font-size:9px} .chip,.pchip{font-size:10px;padding:2px 7px}
  #filter{right:10px;left:auto;bottom:10px;width:46vw;padding:9px 10px;border-radius:11px}
  #filter .lbl{font-size:9px} #filter .val{font-size:11px}
  #info{top:auto;bottom:0;left:0;right:0;width:100%;max-height:64%;border-radius:16px 16px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom));border-left:none;border-right:none;border-bottom:none}
  #info.show{animation:sheet .28s cubic-bezier(.32,.72,0,1)}
  #info h2{font-size:17px} #info .enter{padding:11px 11px}
  #stabPanel{left:0;right:0;bottom:0;width:100%;min-width:0;transform:none;border-radius:16px 16px 0 0;
    max-height:82%;overflow-y:auto;padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
  #stabPanel.show{transform:none}
  #hint{bottom:auto;top:56px;font-size:10.5px;max-width:92vw;white-space:normal;line-height:1.4}
  /* on mobile #info is a bottom sheet — lift the zoom dock above it, back to the right edge */
  #info.show ~ #zoomctl{right:10px;top:auto;bottom:calc(64% + 14px);transform:none}
  /* expand-modal: use almost the full screen on a phone */
  #stabModal .card{width:94vw;height:88vh;padding:12px 12px 14px}
}
@keyframes sheet{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="stage"></div>
<div id="labels"></div>
<div id="hoverLabel" class="label" style="display:none"></div>

<div id="topbar">
  <a href="index.html" class="btn" id="backDb" title="NearStars DB">← DB</a>
  <div id="brand">NearStars<span class="sub" data-i18n="subtitle">근방 항성계 3D 지도</span></div>
  <div class="spacer"></div>
  <button class="btn" id="toggleLabels"><span class="dot"></span><span data-i18n="allLabels">모든 라벨</span></button>
  <button class="btn on" id="toggleStems"><span class="dot"></span><span data-i18n="dropLines">수직선</span></button>
  <button class="btn" id="toggleOrbits"><span class="dot"></span><span data-i18n="orbits">궤도</span></button>
  <button class="btn on" id="toggleAxes" title="별 자전축 — 금색: 측정된 i★(일부 PA), 청색: 공전면 정렬 가정"><span class="dot"></span><span data-i18n="spinAxes">자전축</span></button>
  <button class="btn" id="toggleHelio" title="항성권(heliosphere) — 항성풍 거품 + 성간풍 꼬리. 색=방사선 등급(노랑 medium·빨강 high), 크기=항성풍. 시스템 뷰에서. 모식적 스케일."><span class="dot"></span><span data-i18n="helio">항성권</span></button>
  <button class="btn" id="toggleWind" title="성간풍 벡터 지도 — 별 위치의 국부 성간물질(LISM) 흐름. R&L 2008 구름 장 보간."><span class="dot"></span><span data-i18n="windMap">성간풍</span></button>
  <button class="btn" id="toggleMotion"><span class="dot"></span><span data-i18n="motion">공간 운동</span></button>
  <button class="btn" id="toggleFar"><span class="dot"></span><span data-i18n="beyond">50광년 밖</span></button>
  <button class="btn" id="toggleLang">EN</button>
</div>

<div id="legend">
  <div class="h" data-i18n="legendTitle">분광형 (색 = 표면온도)</div>
  <div class="chips" id="chips"></div>
  <div class="h" data-i18n="phaseTitle" style="margin-top:4px">큐레이션 단계</div>
  <div class="chips" id="phaseChips"></div>
  <div class="note" data-i18n="legendNote">별을 향해 그대로 줌인하면 실제 크기의 행성이 나타납니다(크로스헤어 표시). 크기·궤도는 실측, 색은 흑체 근사. 좌표계 = ICRS, 원점 = 태양.</div>
</div>

<div id="filter">
  <div class="row"><span class="lbl" data-i18n="distFilter">거리 필터</span><span class="val" id="distVal">50 ly</span></div>
  <input type="range" id="distSlider" min="4" max="800" value="50" step="1">
  <div id="motionRow" style="display:none">
    <div class="row" style="margin-top:11px"><span class="lbl" data-i18n="lookback">룩백 시간</span><span class="val" id="lbVal">50 kyr</span></div>
    <input type="range" id="lbSlider" min="5" max="500" value="50" step="5">
  </div>
</div>

<div id="info">
  <div class="close" id="infoClose">×</div>
  <h2 id="infoName"></h2>
  <div class="dist" id="infoDist"></div>
  <div class="sec" id="infoCompSec"><div class="t" data-i18n="components">구성원</div><div id="infoComps"></div></div>
  <div class="sec" id="infoPlSec"><div class="t" data-i18n="planets">행성</div><div id="infoPls"></div></div>
  <button class="btn enter" id="infoEnter" data-i18n="flyHere">여기로 날아가기 →</button>
  <button class="btn enter" id="infoStab" style="display:none" data-i18n="stabBtn">안정성 시뮬 ▶</button>
  <div class="nofly" id="infoNoFly" data-i18n="noPlanets">알려진 행성 없음</div>
</div>

<div id="stabPanel">
  <div class="sx" id="stabClose">×</div>
  <div class="st" id="stabTitle"></div>
  <div class="svar"><button id="stabVariant" style="display:none"></button><span id="stabNote"></span></div>
  <div class="sctl"><button id="stabPlay">⏸</button><input type="range" id="stabSlider" min="0" max="100" value="0" step="1"><button id="stabChartBtn" title="charts">📈</button><button id="stabExpand" title="expand charts">⤢</button></div>
  <div class="srd" id="stabReadout"></div>
  <canvas id="stabChart" style="display:none"></canvas>
</div>

<div id="stabModal">
  <div class="card">
    <div class="mh"><span id="stabModalTitle"></span><span class="mx" id="stabModalClose">×</span></div>
    <canvas id="stabBigCanvas"></canvas>
  </div>
</div>

<div id="hint" data-i18n="hint">드래그 = 회전 · 휠 = 줌 · WASD/화살표 = 이동(R·F 상하) · 클릭 = 정보 · 더블클릭 = 포커스</div>

<div id="zoomctl">
  <button class="zb" id="zoomIn" title="Zoom in">+</button>
  <input type="range" id="zoomSlider" min="0" max="1000" value="500">

/* soft gaussian glow texture — compact support: alpha hits exactly 0 at the
   quad edge (no square boundary) and falls off smoothly (round, not boxy) */
function glowTexture(k){
  const s=256,c=document.createElement('canvas');c.width=c.height=s;
  const g=c.getContext('2d'),grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  const edge=Math.exp(-k);
  for(let i=0;i<=40;i++){const r=i/40;const a=Math.max(0,(Math.exp(-r*r*k)-edge)/(1-edge));grd.addColorStop(r,`rgba(255,255,255,${a})`);}
  g.fillStyle=grd;g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

/* ── heliosphere / interstellar-wind layers ───────────────────────────────
   Speckled teardrop astrosphere (Kerbalism look): blunt nose faces the wind
   (+v_rel = wind.nose), long tail downwind. Colour = radiation grade, size ∝
   stellar wind. Schematic scale (the real astrosphere dwarfs the planets). */
const HELIO_COL={low:0x46e0cf, medium:0xffd24a, high:0xff5a3c};
function makeHeliosphere(grade, wind, noseScene, R0){
  const N=2200, axis=noseScene.clone().normalize();
  let u=new THREE.Vector3(0,1,0); if(Math.abs(axis.y)>0.9) u.set(1,0,0);
  u.crossVectors(axis,u).normalize();
  const v=new THREE.Vector3().crossVectors(axis,u).normalize();
  const Rn=R0*(0.9+0.5*Math.sqrt(wind||1));         // nose standoff, wind-modulated
  const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const ct=2*Math.random()-1, th=Math.acos(ct), st=Math.sin(th), ph=2*Math.PI*Math.random();
    let r=Rn*Math.pow(2/(1+ct+1e-3),0.6);           // Shue-like: small nose, balloons to tail
    r=Math.min(r,Rn*5.5)*(0.9+0.18*Math.random());  // clamp tail + shell-thickness speckle
    pos[i*3]  =axis.x*ct*r + (u.x*Math.cos(ph)+v.x*Math.sin(ph))*st*r;
    pos[i*3+1]=axis.y*ct*r + (u.y*Math.cos(ph)+v.y*Math.sin(ph))*st*r;
    pos[i*3+2]=axis.z*ct*r + (u.z*Math.cos(ph)+v.z*Math.sin(ph))*st*r;
  }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({map:DOT,color:HELIO_COL[grade]||0xffd24a,size:Rn*0.07,
    sizeAttenuation:true,transparent:true,opacity:0.55,depthWrite:false,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(g,m); pts.frustumCulled=false; return pts;
}

/* interstellar-wind field: IDW over the LISM cloud vectors by angular distance on the
   sky (same model as the builder). Sample any ICRS direction → v_ISM (scene) + speed. */
const LISM=DATA.lism;
const _th0=(LISM?LISM.theta0_deg:20)*DEG;
function ismSample(dx,dy,dz){
  if(!LISM) return null;
  const n=Math.hypot(dx,dy,dz)||1, d=[dx/n,dy/n,dz/n];
  let wsum=0, v=[0,0,0];
  for(const cl of LISM.clouds){
    const dot=Math.max(-1,Math.min(1,d[0]*cl.c[0]+d[1]*cl.c[1]+d[2]*cl.c[2]));
    const th=Math.acos(dot), w=1/(th*th+_th0*_th0); wsum+=w;
    v[0]+=w*cl.v[0]; v[1]+=w*cl.v[1]; v[2]+=w*cl.v[2];
  }
  const sp=Math.hypot(v[0],v[1],v[2])/wsum;
  return {dir:new THREE.Vector3(v[0],v[2],v[1]).normalize(), speed:sp};  // ICRS→scene (x,z,y)
}

/* backdrop starfield (follows camera, sits at infinity) */

/* ISM-wind vector field: arrows on a lattice over the ICRS x–y reference plane (same
   plane as the rings). Each node samples the LISM cloud field for its sky direction. */
const windGroup=new THREE.Group(); windGroup.visible=false; scene.add(windGroup);
(function buildWindField(){
  if(!LISM) return;
  const STEP=10, MAX=50;                         // ly
  for(let gx=-MAX; gx<=MAX; gx+=STEP) for(let gy=-MAX; gy<=MAX; gy+=STEP){

    a.traverse(o=>{if(o.material){o.material.transparent=true;o.material.opacity=0.7;o.frustumCulled=false;}});
    windGroup.add(a);

/* ── Kepler: element set → position (AU) in the host-local scene frame ─── */
function meanToTrue(M,e){
  let E=M; for(let k=0;k<10;k++){E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));}
  return 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
}
// orbit point at true anomaly nu → scene-AU vector (relative to focus/host)
function orbitPoint(a,e,iDeg,OmDeg,omDeg,nu){
  const r=a*(1-e*e)/(1+e*Math.cos(nu));
  const xp=r*Math.cos(nu), yp=r*Math.sin(nu);
  const i=(iDeg||0)*DEG, Om=(OmDeg||0)*DEG, om=(omDeg||0)*DEG;
  // Rz(om)
  let X=xp*Math.cos(om)-yp*Math.sin(om), Y=xp*Math.sin(om)+yp*Math.cos(om), Z=0;
  // Rx(i)
  let Y2=Y*Math.cos(i)-Z*Math.sin(i), Z2=Y*Math.sin(i)+Z*Math.cos(i); X=X;
  // Rz(Om)
  let X3=X*Math.cos(Om)-Y2*Math.sin(Om), Y3=X*Math.sin(Om)+Y2*Math.cos(Om), Z3=Z2;
  // ICRS-like (X3,Y3,Z3) → scene (x,z,y)
  return new THREE.Vector3(X3, Z3, Y3);
}
function orbitPhase(el){ // mean anomaly (rad) from M or 0
  if(el.M_deg!=null) return el.M_deg*DEG;
  return null;
}
// Sky-true orbital plane. Exoplanet/disk elements are measured against the PLANE
// OF SKY (⟂ to the Sol→star line of sight): i=0 face-on, i=90 edge-on; Ω = PA of
// ascending node (North→East); ω = argument of periapsis. Build the orthonormal
// orbit frame in ICRS (right-handed — avoids the scene reflection's sign traps),
// then map each axis to scene (x,z,y). Returns {p,q}: in-plane unit vectors with
// p = periapsis direction, q ⟂ p (toward ν=90°). pos = ICRS [X,Y,Z] (ly).
function skyBasis(pos, iDeg, OmDeg, omDeg){
  const s=new THREE.Vector3(pos[0],pos[1],pos[2]);
  if(s.lengthSq()<1e-12) return null;       // Sol itself: no external line of sight
  s.normalize();
  let E=new THREE.Vector3().crossVectors(new THREE.Vector3(0,0,1), s); // east (incr RA)
  if(E.lengthSq()<1e-9) E.set(1,0,0); else E.normalize();              // star on the pole
  const N=new THREE.Vector3().crossVectors(s,E);                       // north (incr Dec)
  const i=(iDeg||0)*DEG, Om=(OmDeg||0)*DEG, om=(omDeg||0)*DEG;
  const node=N.clone().multiplyScalar(Math.cos(Om)).addScaledVector(E,Math.sin(Om));
  const n=s.clone().multiplyScalar(Math.cos(i))
    .addScaledVector(new THREE.Vector3().crossVectors(node,s), Math.sin(i)); // orbit normal
  const w=new THREE.Vector3().crossVectors(n,node);                   // in-plane ⟂ node
  const peri=node.clone().multiplyScalar(Math.cos(om)).addScaledVector(w,Math.sin(om));
  const q=new THREE.Vector3().crossVectors(n,peri);
  const toScene=v=>new THREE.Vector3(v.x,v.z,v.y);                    // ICRS → scene
  return {p:toScene(peri), q:toScene(q), n:toScene(n)};
}

// Spin-axis direction (scene space) from i★ (tilt to the line of sight: 0=pole-on,
// 90=equator-on) and the AXIS position angle (PA of the projected spin axis,
// North→East). Distinct from skyBasis, which takes the orbital NODE PA (Ω) — the
// projected axis sits 90° from the node line, so a measured spin-axis PA (Vega,
// Fomalhaut) must go in here directly, NOT into skyBasis's Ω slot.
function spinAxisDir(pos, iDeg, paDeg){
  const s=new THREE.Vector3(pos[0],pos[1],pos[2]);
  if(s.lengthSq()<1e-12) return new THREE.Vector3(0,1,0);
  s.normalize();
  let E=new THREE.Vector3().crossVectors(new THREE.Vector3(0,0,1), s);
  if(E.lengthSq()<1e-9) E.set(1,0,0); else E.normalize();
  const N=new THREE.Vector3().crossVectors(s,E);
  const i=(iDeg||0)*DEG, pa=(paDeg||0)*DEG;
  const skydir=N.clone().multiplyScalar(Math.cos(pa)).addScaledVector(E,Math.sin(pa)); // projected axis, N→E
  const a=s.clone().multiplyScalar(Math.cos(i)).addScaledVector(skydir,Math.sin(i));   // tilt i from LOS
  return new THREE.Vector3(a.x,a.z,a.y);  // ICRS → scene
}
function ellipsePoint(basis,a,e,nu){ // point on the sky-true ellipse (focus at star)
  const r=a*(1-e*e)/(1+e*Math.cos(nu));
  return basis.p.clone().multiplyScalar(r*Math.cos(nu)).addScaledVector(basis.q, r*Math.sin(nu));
}
// Perifocal→reference-frame cartesian (a.u.) from elements, reference plane = xy,
// reference x = +X (Ω measured from there). Used for the stability sim, whose
// REBOUND elements live in the system's near-coplanar frame (load.py subtracts 90°
// from transit inclinations), NOT the plane of sky. Returns {x,y,z} (unmapped).
function elemCart(a,e,iDeg,OmDeg,omDeg,nu){
  const r=a*(1-e*e)/(1+e*Math.cos(nu));
  const xp=r*Math.cos(nu), yp=r*Math.sin(nu);
  const i=(iDeg||0)*DEG, Om=(OmDeg||0)*DEG, om=(omDeg||0)*DEG;
  const X=xp*Math.cos(om)-yp*Math.sin(om), Y=xp*Math.sin(om)+yp*Math.cos(om);
  const Y2=Y*Math.cos(i), Z2=Y*Math.sin(i);
  return {x:X*Math.cos(Om)-Y2*Math.sin(Om), y:X*Math.sin(Om)+Y2*Math.cos(Om), z:Z2};
}
// Place a sim orbit: build the cartesian in the sim's coplanar frame, then project
// onto the system's true common-plane triad (ref = skyBasis at the reference
// inclination), so the orbit sits sky-true AND stays stable when Ω/ω are degenerate
// near coplanarity (the cartesian is well-defined even when the angles are not).
function simOrbitPoint(ref,a,e,iDeg,OmDeg,omDeg,nu){
  const c=elemCart(a,e,iDeg,OmDeg,omDeg,nu);
  return ref.p.clone().multiplyScalar(c.x).addScaledVector(ref.q,c.y).addScaledVector(ref.n,c.z);
}

/* ── build per-cluster nodes ──────────────────────────────────────────── */
const clusters=[];   // {data, node, glow, sysScale, bodies:[{kind,name,obj,rgb}], stem, labelEl, orbitsLines:[]}
const glowSprites=[];
DATA.clusters.forEach(c=>{
  const node=new THREE.Group();
  node.position.copy(lyToScene(new THREE.Vector3(c.pos[0],c.pos[1],c.pos[2])));
  scene.add(node);

  // map-scale marker: coloured soft halo + hot white-ish core (core is bright
  // enough to cross the bloom threshold → soft photographic glow)
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:new THREE.Color(c.rep_rgb),
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  glow.userData.cluster=c; node.add(glow); glowSprites.push(glow);
  const coreCol=new THREE.Color(c.rep_rgb).lerp(new THREE.Color(0xffffff),0.35);
  // apparent brightness ∝ distance falloff (farther from Sol → dimmer)

    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  node.add(core);
  // wide faint outer halo — a round, soft "bleed" replacing the bloom spread
  const outer=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:new THREE.Color(c.rep_rgb),
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  node.add(outer);

  const bodies=[]; const orbitsLines=[]; const stabPlanets=[]; const axisLines=[]; const helioObjs=[];
  // host outer extent (AU) → heliosphere base scale (so the bubble frames with the system)
  const pExt=Math.max(0.4,(c.planets||[]).reduce((m,p)=>Math.max(m,(p.a_au||0)*(1+(p.e||0))),0)*1.3);
  // register a planet that has a stability time-series: keep refs to its normal
  // line+mesh (to hide during playback) and make a morphing anim line+mesh.
  function regStab(p,line,mesh,hostVec,grp){
    if(!p.stability) return;
    // anim line/mesh are children of the HOST group (grp) so their vertices are tiny
    // (offset from the host, ~AU), not host-absolute (~13,900 AU for Proxima) — that
    // float32 quantization is what made the orbits render jagged.
    const al=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.95}));
    // preallocate position/colour buffers once and rewrite them in place each frame
    // (updateStability) — avoids a per-frame Float32BufferAttribute allocation + GC.
    al.geometry.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3*(SEG_STAB+1)),3));
    al.geometry.setAttribute('color',new THREE.BufferAttribute(new Float32Array(3*(SEG_STAB+1)),3));
    al.visible=false; al.frustumCulled=false; grp.add(al);
    const pr=Math.max((p.radius_rearth||1)*R_EARTH_AU, R_EARTH_AU*0.6);
    const am=new THREE.Mesh(new THREE.SphereGeometry(1,16,12),new THREE.MeshBasicMaterial({color:new THREE.Color(p.rgb||'#ccd2de')}));
    am.scale.setScalar(pr); am.visible=false; grp.add(am);
    stabPlanets.push({name:p.name,hostName:p.host_star,variants:p.stability,line,mesh,animLine:al,animMesh:am,
      host:hostVec.clone(),rgb:p.rgb||'#7aa8ff',pos:c.is_sol?null:c.pos, plane:dplane,
      // common-plane reference inclination: load.py subtracts 90° from a known
      // transit inclination (→ coplanar set ≈0), and uses 0 when i is unknown.
      iRef:(p.i_deg!=null?90:0)});

  let sysScale=0.6;
  // representative disk plane (inc, PA) for this system. Planets and a debris disk
  // are observed coplanar (the disk traces the system's invariable plane — e.g. AU
  // Mic's planets transit *because* they lie in its edge-on disk), so a planet with
  // an unmeasured inclination or node is drawn in this plane rather than defaulting
  // to face-on/Ω=0, which otherwise leaves orbit and disk wildly misaligned.
  let dplane=null;
  if(c.disks && c.disks.length){
    const main=c.disks.reduce((x,y)=>(y.outer_au>x.outer_au?y:x));
    dplane={inc:main.inc_deg||0, pa:main.pa_deg||0};

  //   1) the mean plane of its OWN HOST's planets that DO have a measured i —
  //      a transiting + RV system (e.g. HD 219134 b/c transit at i≈86°, d–h are
  //      RV) is near-coplanar, so the RV siblings share the transit plane instead
  //      of defaulting to face-on (which left them ~90° off their siblings);
  //   2) else the disk plane (coplanar with the debris disk);
  //   3) else face-on.

  // ~1000 AU from A — don't borrow the primary's unrelated transit plane.
  const hostPlane=hostName=>{
    const meas=c.planets.filter(p=>p.host_star===hostName && p.i_deg!=null);
    if(meas.length){
      const mi=meas.reduce((s,p)=>s+p.i_deg,0)/meas.length;
      const mO=meas.filter(p=>p.Omega_deg!=null);

  // gravitational (Keplerian) relative orbit about the primary; wide pairs

      const positions=[],colors=[],bg=new THREE.Color('#0a0d15'),col=new THREE.Color(m.rgb);
      for(let k=tj.length-1;k>=0;k--){const p=tj[k]; positions.push(p[0],p[2],p[1]); // oldest→now
        const cc=bg.clone().lerp(col,(tj.length-1-k)/(tj.length-1)); colors.push(cc.r,cc.g,cc.b);}
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
      g.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
      const trail=new THREE.Line(g,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.9}));
      node.add(trail); orbitsLines.push(trail);
    } else if(o && o.a_au){
      // Keplerian relative-orbit fallback (elements present, N-body rejected/absent)
      // — sky-true via skyBasis (Campbell elements are plane-of-sky), matching the
      // builder's kepler_trajectory orientation.
      let M0=0;
      if(o.T_jd!=null && o.P_yr && c.epoch_jd!=null) M0=2*Math.PI*((c.epoch_jd-o.T_jd)/365.25)/o.P_yr;
      const e=o.e||0, norm=x=>((x%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const ob=skyBasis(c.pos,o.i_deg,o.Omega_deg,o.omega_deg);
      const opt=nu=>ob?ellipsePoint(ob,o.a_au,e,nu):orbitPoint(o.a_au,e,o.i_deg,o.Omega_deg,o.omega_deg,nu);
      cpos=opt(meanToTrue(norm(M0),e));
      const ep=[];
      for(let k=0;k<=240;k++){ep.push(opt(k/240*2*Math.PI));}
      const ell=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ep),
        new THREE.LineBasicMaterial({color:0x5a6a88,transparent:true,opacity:.4}));
      node.add(ell); orbitsLines.push(ell);
    } else {
      cpos=new THREE.Vector3(off[0],off[2],off[1]); // → scene (x,z,y), AU (measured)
    }
    sysScale=Math.max(sysScale, cpos.length());
    const cg=new THREE.Group(); cg.position.copy(cpos); node.add(cg);
    const rr=Math.max((m.radius_rsun||0.3)*R_SUN_AU, R_SUN_AU*0.08);
    const star=new THREE.Mesh(new THREE.SphereGeometry(1,24,16),
      new THREE.MeshBasicMaterial({color:new THREE.Color(m.rgb)}));
    star.scale.setScalar(rr); cg.add(star);
    // close-up glow: real-radius-scaled (never engulfs the planets), fades in
    // as the map-scale glow fades out, so a zoomed-in star still looks luminous
    const sg=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,
      color:new THREE.Color(m.rgb).lerp(new THREE.Color(0xffffff),0.25),
      transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending}));
    sg.scale.setScalar(rr*11); cg.add(sg);
    bodies.push({kind:'star',name:m.name,obj:cg,rgb:m.rgb,r:rr,glow:sg});
    // spin axis. MEASURED stellar inclination i★ (and PA, for Vega/Fomalhaut) is used
    // where it exists — sky-true via skyBasis; rendered gold. Otherwise the axis falls
    // back to the system plane normal (spin–orbit-alignment ASSUMPTION) and is rendered
    // a dim blue. Sol uses the real 7.25° solar obliquity to the ecliptic (measured →
    // gold). A star with neither plane nor measurement gets a neutral vertical axis.
    { const apl=hostPlane(m.name);                              // {inc,pa} of the system plane, or null
      const measured = c.is_sol || (m.spin_i_deg!=null || m.spin_pa_deg!=null);
      let axN;
      if(c.is_sol){
        // solar rotation axis: 7.25° from the ecliptic normal toward the ascending node
        // of the solar equator (Ω=75.76°, J2000). Same element convention as orbitPoint
        // (Sol planet orbits use ecliptic-referenced elements), mapped ICRS→scene (x,z,y):
        // n_scene = (sin i·sin Ω, cos i, −sin i·cos Ω); i=0 → (0,1,0).
        const si=Math.sin(7.25*DEG), Om=75.76*DEG;
        axN=new THREE.Vector3(si*Math.sin(Om), Math.cos(7.25*DEG), -si*Math.cos(Om));
      }
      else if(m.spin_pa_deg!=null){
        // measured axis PA (Vega, Fomalhaut) — tilt = measured i★ if present, else the disk tilt.
        axN=spinAxisDir(c.pos, m.spin_i_deg!=null?m.spin_i_deg:(apl?apl.inc:0), m.spin_pa_deg);
      } else if(m.spin_i_deg!=null && apl){
        // measured i★, no PA: keep the disk/plane normal's azimuth (assume the spin
        // shares the disk's node direction) but RE-TILT to the measured i★. Done with
        // the real normal vector so there's no PA-sign guess. A genuine spin–disk
        // misalignment (e.g. tau Cet: spin 7° vs disk 35°) then shows as a real angle.
        const n=skyBasis(c.pos,apl.inc,apl.pa,0).n;
        const los=new THREE.Vector3(c.pos[0],c.pos[2],c.pos[1]);
        if(los.lengthSq()<1e-12) los.set(0,1,0); else los.normalize();
        const np=n.clone().addScaledVector(los,-n.dot(los));        // sky-plane part (azimuth dir)
        if(np.lengthSq()<1e-9) np.copy(n); else np.normalize();
        const ia=m.spin_i_deg*DEG;
        axN=los.multiplyScalar(Math.cos(ia)).addScaledVector(np,Math.sin(ia));
      } else if(m.spin_i_deg!=null){
        axN=spinAxisDir(c.pos, m.spin_i_deg, 0);                    // measured tilt only; azimuth unknown
      } else if(apl){
        axN=skyBasis(c.pos,apl.inc,apl.pa,0).n.clone();             // no measurement → plane normal (alignment)
      } else { axN=new THREE.Vector3(0,1,0); }
      const aL=rr*3.2;
      const axLine=new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([axN.clone().multiplyScalar(-aL), axN.clone().multiplyScalar(aL)]),
        new THREE.LineBasicMaterial({color: measured?0xffd27a:0x9fb6d6, transparent:true, opacity: measured?0.95:0.7}));
      axLine.frustumCulled=false; cg.add(axLine); axisLines.push(axLine); }

    // heliosphere bubble (stellar-wind hosts): speckled teardrop oriented by the
    // interstellar-wind direction (c.wind.nose, ICRS → scene), centred on the star.
    if(m.heliosphere && c.wind && c.wind.nose){
      const w=c.wind.nose, nose=new THREE.Vector3(w[0],w[2],w[1]);   // ICRS → scene (x,z,y)
      const hs=makeHeliosphere(m.heliosphere.grade, m.heliosphere.wind, nose, pExt);
      hs.visible=false; cg.add(hs); helioObjs.push(hs); }

    // planets hosted by this component
    const hpl=hostPlane(m.name);   // fallback plane for this host's RV (i-unknown) planets
    c.planets.filter(p=>p.host_star===m.name && p.a_au).forEach((p,pi)=>{
      const a=p.a_au, e=(p.e!=null?p.e:0);
      sysScale=Math.max(sysScale, cpos.length()+a*(1+e));
      // moving host (binary N-body) → draw the real-space epicycle at node level
      if(p.epicycle && p.epicycle.length){
        const ep=p.epicycle, pos=[],col=[],bg=new THREE.Color('#0a0d15'),pc=new THREE.Color(p.rgb||'#ccd2de');
        for(let k=ep.length-1;k>=0;k--){const q=ep[k]; pos.push(q[0],q[2],q[1]);
          const cc=bg.clone().lerp(pc,(ep.length-1-k)/(ep.length-1)); col.push(cc.r,cc.g,cc.b);}
        const g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
        g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
        const eline=new THREE.Line(g,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.85}));
        node.add(eline); orbitsLines.push(eline);
        const e0=ep[0], pr2=Math.max((p.radius_rearth||1)*R_EARTH_AU, R_EARTH_AU*0.6);
        const pm2=new THREE.Mesh(new THREE.SphereGeometry(1,16,12),new THREE.MeshBasicMaterial({color:new THREE.Color(p.rgb||'#ccd2de')}));
        pm2.scale.setScalar(pr2); pm2.position.set(e0[0],e0[2],e0[1]); node.add(pm2);
        bodies.push({kind:'planet',name:p.name,obj:pm2,rgb:p.rgb||'#ccd2de',r:pr2});
        regStab(p,eline,pm2,cpos,cg);
        return;
      }
      // orbit line — sky-true plane (i,Ω,ω vs the plane of sky); Sol keeps the
      // local frame (no external line of sight). Unmeasured i/Ω fall back to the
      // system's disk plane (coplanar assumption) so orbits aren't left face-on
      // beside an inclined disk. pb=null → fall back to orbitPoint.
      const ri = p.i_deg!=null?p.i_deg:(hpl?hpl.inc:null);
      const rOm = p.Omega_deg!=null?p.Omega_deg:(hpl?hpl.pa:null);
      const pb=c.is_sol?null:skyBasis(c.pos,ri,rOm,p.omega_deg);
      const opt=nu=>pb?ellipsePoint(pb,a,e,nu):orbitPoint(a,e,ri,rOm,p.omega_deg,nu);
      const seg=220,pts=[];
      for(let k=0;k<=seg;k++){pts.push(opt(k/seg*Math.PI*2));}
      const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color:0x4a5a78,transparent:true,opacity:.75}));
      cg.add(line); orbitsLines.push(line);
      // planet at its phase (true anomaly from M, else spread by index)
      let mean=orbitPhase(p); if(mean==null) mean=pi*2.399963;
      const nu=meanToTrue(mean, e);
      const pp=opt(nu);
      const pr=Math.max((p.radius_rearth||1)*R_EARTH_AU, R_EARTH_AU*0.6);
      const pm=new THREE.Mesh(new THREE.SphereGeometry(1,16,12),
        new THREE.MeshBasicMaterial({color:new THREE.Color(p.rgb||'#ccd2de')}));
      pm.scale.setScalar(pr); pm.position.copy(pp); cg.add(pm);
      bodies.push({kind:'planet',name:p.name,obj:pm,rgb:p.rgb||'#ccd2de',r:pr});
      regStab(p,line,pm,cpos,cg);
    });
  });

  // debris disk belts (Fomalhaut, AU Mic, …) around the primary, AU scale.
  // each belt = constant-width ribbon following an ellipse with the star at the
  // focus (so low-e belts read as near-concentric, the offset grows with e),
  // tilted by inclination. inner/outer radii, e, inc & kind from curated data
  // (Kalas/ALMA/JWST). kind: 'disk' broad fill, 'belt'/'ring' crisp outlines.
  const diskMeshes=[];
  if(c.disks){
    const base=new THREE.Color(c.rep_rgb).lerp(new THREE.Color(0xffffff),0.55);
    const dcol=base.clone().lerp(new THREE.Color(0xffd6a3),0.35); // warm dust tone
    // sky-true orientation: inclination from OUR line of sight (i=0 face-on,
    // i=90 edge-on), PA = position angle of the node, argp = argument of periapsis.
    // Per-belt PA/argp give the real apsidal/nodal MISALIGNMENT (Fomalhaut's
    // headline result), so the eccentric belts' radial swings clear each other in
    // 3D instead of stacking in one sector. {p,q} = {major(periapsis), minor}.
    const beltBasis=(incDeg,paDeg,argpDeg)=>{ const b=skyBasis(c.pos,incDeg,paDeg,argpDeg); return {u:b.p,m:b.q}; };
    const ribbon=(aMid,hw,e,uHat,mHat,seg)=>{ // → {inner:[],outer:[]} constant-width edges
      const inner=[],outer=[],C=new THREE.Vector3(),dir=new THREE.Vector3();
      for(let k=0;k<=seg;k++){ const nu=k/seg*2*Math.PI;
        const r=aMid*(1-e*e)/(1+e*Math.cos(nu));
        C.copy(uHat).multiplyScalar(r*Math.cos(nu)).addScaledVector(mHat,r*Math.sin(nu));
        dir.copy(C).normalize();
        inner.push(C.clone().addScaledVector(dir,-hw));
        outer.push(C.clone().addScaledVector(dir, hw)); }
      return {inner,outer};
    };
    // glowing surface band; additive so belts read as luminous faces (like the
    // thermal-IR JWST image), not just wireframe outlines. grad fades inner→outer.
    const fillBand=(inner,outer,op,grad)=>{
      const pos=[],col=[],idx=[],n=inner.length-1;
      const ci=dcol, co=dcol.clone().multiplyScalar(grad?0.3:1);
      for(let k=0;k<=n;k++){
        pos.push(inner[k].x,inner[k].y,inner[k].z, outer[k].x,outer[k].y,outer[k].z);
        col.push(ci.r,ci.g,ci.b, co.r,co.g,co.b); }
      for(let k=0;k<n;k++){ const a=k*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('color',new THREE.Float32BufferAttribute(col,3)); g.setIndex(idx);
      const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));
      m.visible=false; node.add(m); diskMeshes.push(m);
    };
    c.disks.forEach(b=>{
      const inc=b.inc_deg||0, kind=b.kind||'belt';
      // Render eccentricity only for the iconic main ring (mild, e=0.11). The other
      // belts are drawn as concentric semi-major-axis bands so the two real gaps stay
      // visible from any angle: distinct debris belts are separated by inclination
      // (different planes) and/or cleared gaps — they don't physically interpenetrate,
      // and a full eccentric swing with the (unpublished) apsidal angles would falsely
      // merge them. Plane misalignment is still shown via per-belt inclination/PA.
      const e=(kind==='ring')?(b.e||0):0;
      const {u,m}=beltBasis(inc,b.pa_deg||0,b.argp_deg||0);
      const aMid=(b.inner_au+b.outer_au)/2, hw=(b.outer_au-b.inner_au)/2;
      sysScale=Math.max(sysScale, (aMid*(1+e)+hw)*1.15);
      const {inner,outer}=ribbon(aMid,hw,e,u,m,200);
      fillBand(inner,outer, kind==='disk'?0.18 : kind==='ring'?0.26 : 0.22, kind==='disk');
      if(kind!=='disk'){ // faint edge outlines accent the gaps; surface carries the look
        const op=kind==='ring'?0.6:0.4;
        [inner,outer].forEach(edge=>{
          const line=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(edge),
            new THREE.LineBasicMaterial({color:dcol,transparent:true,opacity:op}));
          line.visible=false; node.add(line); diskMeshes.push(line);
        });
      }
      if(kind==='ring'){ // radiation-pressure small-grain halo (Kalas et al. 2005)
        const haloMid=b.outer_au*1.2, haloHw=b.outer_au*0.2;
        const h=ribbon(haloMid,haloHw,e,u,m,160);
        fillBand(h.inner,h.outer,0.05,true);
      }
    });
  }

  // vertical drop line to the ICRS plane
  let stem=null;
  if(!c.is_sol){
    const yEnd=-c.pos[2]*U; // scene-y of the plane below the cluster (local)
    const sg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,yEnd,0)]);
    const col=new THREE.Color(c.rep_rgb).lerp(new THREE.Color('#0b0e16'),0.5);
    stem=new THREE.Line(sg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.42}));
    const foot=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.6}));
    foot.position.set(0,yEnd,0); foot.scale.setScalar(sysScale*0.08+50); stem.add(foot);
    node.add(stem);
  }

  // space-motion trail (heliocentric linear drift through space; built on demand)
  let motion=null;
  if(!c.is_sol && c.vel && c.vel[0]!=null){
    const vly=new THREE.Vector3(c.vel[0],c.vel[1],c.vel[2]).multiplyScalar(KMS_TO_LYYR); // ICRS ly/yr
    const ml=new THREE.Line(new THREE.BufferGeometry(),
      new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.85}));
    ml.visible=false; ml.frustumCulled=false; node.add(ml);
    motion={line:ml, vly, rgb:c.rep_rgb};
  }

  let labelEl=null;
  if(c.is_sol) labelEl=mkLabel('Sol','label sun');
  else if(c.is_confirmed_set) labelEl=mkLabel(c.label,'label confirmed');

  clusters.push({data:c,node,glow,core,outer,sysScale,bodies,stem,labelEl,orbitsLines,motion,stabPlanets,diskMeshes,axisLines,helioObjs});
});

/* ── floating-origin rebase ───────────────────────────────────────────── */
function recomputeNodes(){
  clusters.forEach(c=> c.node.position.copy(lyToScene(new THREE.Vector3(c.data.pos[0],c.data.pos[1],c.data.pos[2]))));
  ringGroup.position.copy(lyToScene(new THREE.Vector3(0,0,0)));
  windGroup.position.copy(lyToScene(new THREE.Vector3(0,0,0)));
}
function rebaseToTarget(){
  const tgt=controls.target.clone();
  if(tgt.length()<REBASE_AU) return;
  originLy.add(sceneToLyDelta(tgt));
  camera.position.sub(tgt); controls.target.set(0,0,0);
  recomputeNodes();
}

/* ── interaction: click = info, fly here ──────────────────────────────── */
const ray=new THREE.Raycaster(); const mouse=new THREE.Vector2(); let selected=null, selBody=null;
function pick(e){
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(glowSprites.filter(g=>g.visible && g.material.opacity>0.05),false);
  return hits.length?hits[0].object.userData.cluster:null;
}
renderer.domElement.addEventListener('pointermove',e=>{ hoverCl=pick(e); renderer.domElement.style.cursor=hoverCl?'pointer':'default'; });
let hoverCl=null;
const hoverLabel=document.getElementById('hoverLabel');
function openInfo(c){ selected=c; renderInfo(c); document.getElementById('info').classList.add('show'); }
function selectAt(e){            // tap/click = select body or cluster, open info
  const b=pickBody(e);
  if(b){ selBody=b; const cl=clusters.find(x=>x.bodies.includes(b)); if(cl) openInfo(cl.data); return; }
  const c=pick(e);
  if(c){ openInfo(c); const cl=clusters.find(x=>x.data===c); selBody=cl?cl.bodies.find(x=>x.kind==='star'):null; }
}
function focusAt(e){            // double-tap/double-click = focus body, else fly to system
  const b=pickBody(e); if(b){ focusBody(b); return; }
  const c=pick(e); if(c) flyTo(c);
}
let _lastPtr='mouse';
renderer.domElement.addEventListener('pointerdown',e=>{ _lastPtr=e.pointerType||'mouse'; });
renderer.domElement.addEventListener('click',e=>{ if(_lastPtr==='touch') return; selectAt(e); }); // touch handled in pointerup
// double-click: focus the nearest body when zoomed in, else fly to the system
function pickBody(e){
  let best=null,bd=34*34;
  clusters.forEach(cl=>{ if(!cl._active) return;
    cl.bodies.forEach(b=>{ if(!b._shown) return;
      const dx=b._sx-e.clientX, dy=b._sy-e.clientY, d=dx*dx+dy*dy;
      if(d<bd){bd=d;best=b;} });
  });
  return best;
}
renderer.domElement.addEventListener('dblclick',e=>{ if(_lastPtr!=='mouse') return; focusAt(e); });
document.getElementById('infoClose').onclick=()=>{document.getElementById('info').classList.remove('show'); selected=null;};
document.getElementById('infoEnter').onclick=()=>{ if(selected) flyTo(selected); };
// touch: defer the single-tap (select/info) so a second tap can pre-empt it as a
// double-tap (focus). Without the delay the info sheet popped up on the first tap and
// covered the spot, blocking the second tap of the double-tap.
const isTouch = matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;
if(isTouch){
  document.getElementById('hint').dataset.i18n='hintTouch';
  let lastTap=0, lx=0, ly=0, tapTimer=null, dragStart=null;
  renderer.domElement.addEventListener('pointerdown',e=>{ if(e.pointerType==='touch') dragStart={x:e.clientX,y:e.clientY}; });
  renderer.domElement.addEventListener('pointerup',e=>{
    if(e.pointerType!=='touch') return;
    if(dragStart && Math.hypot(e.clientX-dragStart.x, e.clientY-dragStart.y)>14) return; // was a drag, not a tap
    const now=performance.now(), ex=e.clientX, ey=e.clientY, ev={clientX:ex,clientY:ey};
    if(now-lastTap<320 && Math.hypot(ex-lx,ey-ly)<32){           // double tap → focus, cancel pending single
      if(tapTimer){ clearTimeout(tapTimer); tapTimer=null; }
      lastTap=0; focusAt(ev);
    } else {                                                     // first tap → defer the select/info
      lastTap=now; lx=ex; ly=ey;
      if(tapTimer) clearTimeout(tapTimer);
      tapTimer=setTimeout(()=>{ tapTimer=null; selectAt(ev); }, 300);
    }
  });
}

function fmt(x,d=2){return x==null?'—':(+x).toFixed(d);}
function renderInfo(c){
  document.getElementById('infoName').textContent=(lang==='ko'&&c.label_ko)?c.label_ko:c.label;
  document.getElementById('infoDist').textContent=c.is_sol?'—':`${fmt(c.distance_ly,2)} ${t('ly')} · ${fmt(c.distance_pc,2)} ${t('pc')}`;
  // "Phase 3 ↗" link → the curated Phase 3 report page for that star/planet
  const mkP3=url=>{ const a=document.createElement('a'); a.className='p3'; a.href=url;
    a.target='_blank'; a.rel='noopener'; a.textContent='P3 ↗'; a.title=t('phase3');
    a.onclick=e=>e.stopPropagation(); return a; };
  const cc=document.getElementById('infoComps');cc.innerHTML='';
  const cl=clusters.find(x=>x.data===c);
  c.components.forEach(m=>{
    const row=document.createElement('div');row.className='comp';
    const pill=document.createElement('span');pill.className='pill';pill.textContent=m.spec_class;pill.style.background=SPEC[m.spec_class]||SPEC.X;
    const nm=document.createElement('span');nm.className='nm';nm.textContent=m.name;
    const meta=document.createElement('span');meta.className='meta';meta.textContent=(m.spectype||'—')+(m.teff_k?(' · '+m.teff_k+'K'):'');
    row.append(pill,nm,meta);
    if(m.phase3) row.append(mkP3(m.phase3));
    // click a component → fly to that star (reaches wide members like Proxima Cen,
    // which sit thousands of AU from the primary and can't be double-tapped at map scale)
    const body=cl&&cl.bodies.find(b=>b.kind==='star'&&b.name===m.name);
    if(body){ row.classList.add('clickable'); row.title=t('flyHere'); row.onclick=()=>flyToBody(body); }
    cc.appendChild(row);
  });
  const ps=document.getElementById('infoPls');ps.innerHTML='';
  document.getElementById('infoPlSec').style.display=c.planets.length?'block':'none';
  c.planets.forEach(p=>{
    const row=document.createElement('div');row.className='pl';
    const sw=document.createElement('span');sw.className='swatch';sw.style.background=p.rgb||'#ccd2de';
    const nm=document.createElement('span');nm.className='nm';nm.textContent=p.name;
    const meta=document.createElement('span');meta.className='meta';const b=[];
    if(p.radius_rearth)b.push(fmt(p.radius_rearth,1)+' R⊕'); if(p.a_au)b.push(fmt(p.a_au,2)+' AU');

/* smooth fly to a cluster (rebase origin there, dolly to system scale) */
let fly=null;
function flyTo(c){
  const cl=clusters.find(x=>x.data===c); if(!cl) return;
  // rebase origin onto the cluster so local coords are tiny & precise
  originLy.set(c.pos[0],c.pos[1],c.pos[2]); recomputeNodes();
  const dist=Math.max(cl.sysScale*3.2, 0.4);
  // disk systems: approach from the Sol→star line of sight so the fly-in lands on
  // the real Earth-view geometry (e.g. Fomalhaut's inclined ellipse, not edge-on).
  let dir;
  if(c.disks&&c.disks.length){
    const los=new THREE.Vector3(c.pos[0],c.pos[2],c.pos[1]);
    if(los.lengthSq()<1e-9) los.set(0,0,1); else los.normalize();
    dir=los.clone().negate().addScaledVector(new THREE.Vector3(0,1,0),0.35).normalize();
  } else {
    dir=new THREE.Vector3(0.35,0.5,1).normalize();
  }
  fly={from:camera.position.clone(),to:dir.multiplyScalar(dist),tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
  // keep the info panel open so its details + "Stability sim" button stay available
}

/* ── stability animation (REBOUND time-series → morphing orbit) ─────────── */
// orbit-variant labels + explanatory notes (real data vs game-adjusted)
const VAR_INFO={
  adopted:   {ko:{n:'채택 궤도',d:'게임 구현을 위해 안정화 조정한 궤도'}, en:{n:'Adopted',d:'orbit adjusted/stabilised for the game build'}},
  observed:  {ko:{n:'관측 궤도',d:'실제 측정 데이터 기반 (보정 전)'},     en:{n:'Observed',d:'based on real measured data (pre-adjustment)'}},
  confirmed: {ko:{n:'확정 행성',d:'확정 행성만 — 1 Myr 동안 안정'},        en:{n:'Confirmed',d:'confirmed planets only — stable over 1 Myr'}},
  candidates:{ko:{n:'전체 후보',d:'후보 포함 전체 — 1 Myr 내 이탈(불안정)'}, en:{n:'All candidates',d:'incl. candidates — ejects within 1 Myr (unstable)'}},
  sim:       {ko:{n:'시뮬',d:'시뮬레이션 궤도'},                          en:{n:'Sim',d:'simulated orbit'}},
