// variant display order (stable/adjusted shown first, alternate second)
const VAR_ORDER=['confirmed','adopted','sim','observed','candidates'];
// distinct per-planet identity colours — most planets share a near-white Teq
// fallback (#ccd2de), so the chart lines were indistinguishable. Assigned by the
// planet's index within its host group (stable across variant toggles) and reused
// for the planet's 3D marker so the chart legend matches the moving body.
const STAB_PAL=['#5b9cff','#ff7a4d','#3fd07a','#e8c84a','#c879ff','#ff5d8f','#4ad6d6','#b0d04a','#ff9f55','#9a8cff'];
let stabActive=false, stabRecs=[], stabIdx=0, stabPlaying=true, stabN=0, stabVar=0, stabSelCl=null, stabVarIds=[];
const stabPanel=document.getElementById('stabPanel'), stabPlayBtn=document.getElementById('stabPlay'),
      stabSlider=document.getElementById('stabSlider'), stabReadout=document.getElementById('stabReadout'),
      stabTitleEl=document.getElementById('stabTitle'), stabVarBtn=document.getElementById('stabVariant'),
      stabNoteEl=document.getElementById('stabNote'),
      stabChart=document.getElementById('stabChart'), stabChartBtn=document.getElementById('stabChartBtn'),
      stabExpandBtn=document.getElementById('stabExpand'), stabModal=document.getElementById('stabModal'),
      stabBigCanvas=document.getElementById('stabBigCanvas'), stabModalTitle=document.getElementById('stabModalTitle');
let stabShowChart=false, stabModalOpen=false;
let _stabLastIdx=-1, _stabLastVar=-1, _stabForce=true;   // skip per-frame recompute when paused & unchanged
const _stabMark=()=>{ _stabForce=true; };                // force one recompute (open / variant / lang change)
// e-tint colours reused each frame (avoid `new THREE.Color` per rec per frame)
const _ecHi=new THREE.Color(0xff5a3c), _ecMid=new THREE.Color(0xe0b070);
// current variant's series for a planet, or null if it has no data under the
// selected variant (e.g. a candidate planet has no 'confirmed' run) → it's hidden.
const recData=r=>{ const v=r.variants.find(x=>x.id===stabVarIds[stabVar]); return v?v.data:null; };
function stabRefresh(){   // apply the current variant: title chip, note, length, framing
  // union of variant ids across this host's planets, in display order
  const ids=new Set(); stabRecs.forEach(r=>r.variants.forEach(v=>ids.add(v.id)));
  stabVarIds=VAR_ORDER.filter(x=>ids.has(x)); ids.forEach(x=>{ if(!stabVarIds.includes(x)) stabVarIds.push(x); });
  if(stabVar>=stabVarIds.length) stabVar=0;
  const nv=stabVarIds.length;
  stabVarBtn.style.display = nv>1 ? '' : 'none';
  const id=stabVarIds[stabVar];
  const inf=VAR_INFO[id]?VAR_INFO[id][lang]:null;
  if(inf){ stabVarBtn.textContent=inf.n+(nv>1?' ⇄':''); stabNoteEl.textContent=inf.d; }
  const lens=stabRecs.map(recData).filter(Boolean).map(d=>d.length);
  stabN=lens.length?Math.max(...lens):1;
  stabSlider.max=stabN-1; stabSlider.step='any'; if(stabIdx>stabN-1) stabIdx=stabN-1;
  let ext=1; stabRecs.forEach(r=>{ const d=recData(r); if(d) d.forEach(s=>{ext=Math.max(ext,s[1]*(1+s[2]));}); });
  stabRecs._ext=ext;
  _stabMark();   // open / variant / lang change → force one recompute even if paused
}
function openStability(c){
  const cl=clusters.find(x=>x.data===c); if(!cl||!cl.stabPlanets.length) return;
  // hide any currently-animating orbit first — re-opening for a different host
  // (Alpha Cen A b ↔ Proxima) otherwise leaves the previous group's meshes drawn.
  if(stabActive) stabRecs.forEach(r=>{ r.animLine.visible=false; r.animMesh.visible=false; });
  // A cluster can host planets around widely separated stars (e.g. Alpha Centauri
  // A b and Proxima's planets ~13,900 AU apart). Group by host star and show one
  // host's system at a time — the one currently selected, else nearest the camera.
  const groups={}; cl.stabPlanets.forEach(r=>{ (groups[r.hostName]=groups[r.hostName]||[]).push(r); });
  const names=Object.keys(groups);
  let host=names[0];
  if(selBody && groups[selBody.name]) host=selBody.name;
  else if(names.length>1){ // nearest host to the current look-at point
    let best=Infinity; names.forEach(n=>{ const w=cl.node.position.clone().add(groups[n][0].host);
      const d=w.distanceTo(controls.target); if(d<best){best=d;host=n;} }); }
  stabRecs=groups[host]; stabSelCl=c; stabVar=0; stabIdx=0; stabPlaying=true; stabActive=true;
  // distinct identity colour per planet in this group (chart legend ↔ 3D marker)
  stabRecs.forEach((r,i)=>{ r.ccol=STAB_PAL[i%STAB_PAL.length];
    if(r.animMesh) r.animMesh.material.color.set(r.ccol); });
  stabPlayBtn.textContent='⏸';
  const hl=(lang==='ko'&&c.label_ko&&names.length===1)?c.label_ko:host;
  stabTitleEl.innerHTML=`<b>${hl}</b> · ${lang==='ko'?'궤도 진화':'orbit evolution'}`;
  stabRefresh();
  stabPanel.classList.add('show');
  // frame on the host star via a CONTINUOUS rebase (subtract the body's world pos),
  // not originLy.set(cluster) — the latter teleported the view to the cluster primary
  // first, which made Proxima's sim "jump to Alpha Centauri".
  const hostBody=cl.bodies.find(b=>b.kind==='star'&&b.name===host);
  if(hostBody){ hostBody.obj.getWorldPosition(wp); const ws=wp.clone();
    originLy.add(sceneToLyDelta(ws)); camera.position.sub(ws); controls.target.sub(ws); recomputeNodes(); }
  const dir=new THREE.Vector3(0.4,0.5,1).normalize();
  fly={from:camera.position.clone(),to:dir.clone().multiplyScalar(stabRecs._ext*4),
       tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
  document.getElementById('info').classList.remove('show');
}
function closeStability(){
  stabActive=false; stabPanel.classList.remove('show'); closeStabModal();
  stabRecs.forEach(r=>{ r.animLine.visible=false; r.animMesh.visible=false; });
  stabRecs=[];
}
document.getElementById('infoStab').onclick=()=>{ if(selected) openStability(selected); };
document.getElementById('stabClose').onclick=closeStability;
stabPlayBtn.onclick=()=>{ stabPlaying=!stabPlaying; stabPlayBtn.textContent=stabPlaying?'⏸':'▶'; };
stabSlider.oninput=()=>{ stabIdx=+stabSlider.value; stabPlaying=false; stabPlayBtn.textContent='▶'; };
stabVarBtn.onclick=()=>{ if(stabVarIds.length<2) return;
  stabVar=(stabVar+1)%stabVarIds.length; stabIdx=0; stabRefresh(); if(stabShowChart) drawStabChart(); };
stabChartBtn.onclick=()=>{ stabShowChart=!stabShowChart; stabChart.style.display=stabShowChart?'block':'none';
  stabChartBtn.classList.toggle('on',stabShowChart); if(stabShowChart) drawStabChart(); };
function openStabModal(){ if(!stabActive||!stabRecs.length) return;
  stabModalOpen=true; stabModal.classList.add('show');
  stabModalTitle.textContent=(stabTitleEl.textContent||'').trim();
  requestAnimationFrame(drawBigChart); }            // canvas needs layout before first paint
function closeStabModal(){ stabModalOpen=false; stabModal.classList.remove('show'); }
stabExpandBtn.onclick=openStabModal;
document.getElementById('stabModalClose').onclick=closeStabModal;
stabModal.onclick=e=>{ if(e.target===stabModal) closeStabModal(); };   // click backdrop to close
window.addEventListener('keydown',e=>{ if(e.key==='Escape'&&stabModalOpen) closeStabModal(); });

const _bgC=new THREE.Color('#0a0d15');
const _lerp=(a,b,t)=>a+(b-a)*t;
const _alerp=(a,b,t)=>{ let d=((b-a)%360+540)%360-180; return a+d*t; }; // shortest-path (deg)
function updateStability(){
  if(!stabActive) return;
  if(stabPlaying){ stabIdx+=0.25; if(stabIdx>=stabN-1) stabIdx=0; }  // ~100 snapshots/variant: 0.25 keeps loop duration (4 interp frames/snapshot)
  // paused and nothing moved → the orbit shape and chart are unchanged; skip the
  // whole recompute/repaint (a paused sim then costs nothing per frame).
  if(!(_stabForce || stabPlaying || stabIdx!==_stabLastIdx || stabVar!==_stabLastVar)) return;
  _stabForce=false; _stabLastIdx=stabIdx; _stabLastVar=stabVar;
  let maxE=-1,maxA=0,maxName='',tt=0;
  stabRecs.forEach(r=>{
    const d=recData(r);
    if(!d){ if(r.animLine) r.animLine.visible=false; if(r.animMesh) r.animMesh.visible=false; return; }  // not in this variant
    const n=d.length;
    // interpolate orbital elements between the recorded snapshots (5000 yr apart)
    // so the animation is continuous, not stepped — secular change is captured at
    // that cadence; in-between frames are a smooth lerp of (a,e,i,Ω,ω,f).
    const i0=Math.min(Math.floor(stabIdx),n-1), i1=Math.min(i0+1,n-1), f=stabIdx-i0;
    const c0=d[i0], c1=d[i1];
    const a=_lerp(c0[1],c1[1],f), e=Math.min(0.999,_lerp(c0[2],c1[2],f));
    const iD=_alerp(c0[3],c1[3],f), OmD=_alerp(c0[4],c1[4],f), omD=_alerp(c0[5],c1[5],f);
    const fAn=_alerp(c0[6],c1[6],f);
    if(r.line) r.line.visible=false; if(r.mesh) r.mesh.visible=false;
    // smooth analytic ellipse at this epoch's elements (precesses/tilts/pumps
    // over time); host at focus. e-tinted (blue→amber→red). Sky-true plane via
    // skyBasis (same frame as the static planet orbits); Sol falls back to local.
    // reference = the system's true common plane (sim elements are relative to it);
    // simOrbitPoint rotates the sim-frame ellipse onto it. Sol → local orbitPoint.
    // common-plane reference: the system's disk plane if it has one (planets are
    // coplanar with the disk), else the load.py iRef convention. Sol → local.
    const rb=r.plane?skyBasis(r.pos,r.plane.inc,r.plane.pa,0)
                    :(r.pos?skyBasis(r.pos,r.iRef,0,0):null);
    const opt=nu=>rb?simOrbitPoint(rb,a,e,iD,OmD,omD,nu):orbitPoint(a,e,iD,OmD,omD,nu);
    const ec=e>0.85?_ecHi:(e>0.55?_ecMid:(r._rgbC||(r._rgbC=new THREE.Color(r.rgb))));  // reused, no per-frame alloc
    const pa=r.animLine.geometry.attributes.position.array;   // rewrite preallocated buffers in place
    const ca=r.animLine.geometry.attributes.color.array;
    for(let k=0;k<=SEG_STAB;k++){const p=opt(k/SEG_STAB*2*Math.PI), j=k*3;
      pa[j]=p.x; pa[j+1]=p.y; pa[j+2]=p.z; ca[j]=ec.r; ca[j+1]=ec.g; ca[j+2]=ec.b;}
    r.animLine.geometry.attributes.position.needsUpdate=true;
    r.animLine.geometry.attributes.color.needsUpdate=true;
    r.animLine.visible=true;
    // planet at its true anomaly
    const pp=opt(fAn*DEG);
    r.animMesh.position.set(pp.x, pp.y, pp.z); r.animMesh.visible=true;
    tt=_lerp(c0[0],c1[0],f); if(e>maxE){maxE=e;maxA=a;maxName=r.name;}
  });
  stabSlider.value=stabIdx;
  const q=maxA*(1-maxE), nm=stabRecs.length>1?(maxName+' '):'';
  stabReadout.innerHTML=`t = ${Math.round(tt).toLocaleString()} ${t('yr')} · ${nm}e = ${maxE.toFixed(3)} · q = ${q.toFixed(2)} AU`
    + (q<0.08?` · <span class="warn">⚠ ${t('disrupt')}</span>`:'');
  stabT=tt;
  if(stabShowChart) drawStabChart();
  if(stabModalOpen) drawBigChart();
}

/* periapsis/apoapsis + inclination vs time, straight from the integration
   snapshots (d=[t,a,e,inc,Ω,ω,f]). Two stacked panels share the time axis; a
   cursor marks the current animation epoch. Ejections (e≥1) clip at the top of
   the radius panel — the runaway band is the instability signal. Renders to any
   canvas/size so the inline mini-chart and the expand-modal share one painter. */
let stabT=0;                                  // last animation epoch (for repaint on toggle/expand)
function paintStab(cv,W,H,curT){
  const recs=stabRecs.map(r=>({d:recData(r),rgb:r.ccol||r.rgb||'#7aa8ff',name:r.name})).filter(o=>o.d);
  if(!recs.length||W<40||H<40) return;
  const big=H>320, fs=big?13:9, lw=big?2.4:1.7, lwq=big?1.6:1.1;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  if(cv.width!==Math.round(W*dpr)||cv.height!==Math.round(H*dpr)){ cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr); }
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);
  const padL=big?58:38, padR=big?48:32, padT=big?26:18, labT=big?22:14, gap=big?44:26;
  const NP=2, ph=(H-padT-(NP-1)*gap-labT-12)/NP;     // two panels: radius, then inclination(left)+e(right)
  const y0r=padT, y0c=padT+ph+gap;
  const tMax=Math.max(1,...recs.map(o=>o.d[o.d.length-1][0]));
  let initQ=0; recs.forEach(o=>{ initQ=Math.max(initQ,o.d[0][1]*(1+o.d[0][2])); });
  let maxQ=0; recs.forEach(o=>o.d.forEach(s=>{ const QQ=s[1]*(1+Math.min(s[2],3)); if(isFinite(QQ)&&QQ>0)maxQ=Math.max(maxQ,QQ); }));
  const yMaxR=Math.min(maxQ,(initQ||1)*3.2)||1;
  let eMax=0; recs.forEach(o=>o.d.forEach(s=>{ if(isFinite(s[2]))eMax=Math.max(eMax,s[2]); }));
  const eCap=eMax>1?1.05:Math.max(0.05,eMax*1.15);     // bound systems auto-zoom; ejection clips past e=1
  let maxI=1; recs.forEach(o=>o.d.forEach(s=>{ if(isFinite(s[3]))maxI=Math.max(maxI,s[3]); }));
  maxI=Math.max(5,Math.ceil(maxI/5)*5);
  const xT=t=>padL+(t/tMax)*(W-padL-padR);
  const yR=v=>y0r+ph-(Math.min(Math.max(v,0),yMaxR)/yMaxR)*ph;
  const yI=v=>y0c+ph-(Math.min(v,maxI)/maxI)*ph;        // combined panel, LEFT scale (inclination)
  const yE=v=>y0c+ph-(Math.min(Math.max(v,0),eCap)/eCap)*ph;  // combined panel, RIGHT scale (eccentricity)
  const txt=getComputedStyle(document.body).getPropertyValue('--fg4')||'#8a93a8';
  const nf=v=>v.toFixed(v<1?2:v<10?1:0);
  g.font=fs+'px ui-monospace,SFMono-Regular,Menlo,monospace'; g.textBaseline='middle';
  const rot=(x,y0,lbl,col)=>{ g.save(); g.translate(x,y0+ph/2); g.rotate(-Math.PI/2); g.textAlign='center'; g.fillStyle=col||txt; g.fillText(lbl,0,0); g.restore(); };
  // radius panel
  if(big){ g.strokeStyle='rgba(120,135,165,.12)'; g.lineWidth=1; g.fillStyle=txt; g.textAlign='right';
    for(let t=1;t<4;t++){ const yy=y0r+ph*t/4; g.beginPath(); g.moveTo(padL,yy); g.lineTo(W-padR,yy); g.stroke();
      g.fillText(nf(yMaxR*(1-t/4)),padL-6,yy); } }
  g.strokeStyle='rgba(120,135,165,.3)'; g.lineWidth=1; g.strokeRect(padL,y0r,W-padL-padR,ph);
  g.fillStyle=txt; g.textAlign='right'; g.fillText(nf(yMaxR),padL-6,y0r+5); g.fillText('0',padL-6,y0r+ph-5);
  rot(big?16:10,y0r,'q–Q (AU)');
  // combined panel: LEFT axis = inclination (i °), RIGHT axis = eccentricity (e)
  const eClr='#ff9f55';                                // eccentricity tint for its axis/labels
  g.strokeStyle='rgba(120,135,165,.3)'; g.lineWidth=1; g.strokeRect(padL,y0c,W-padL-padR,ph);
  if(big){ g.strokeStyle='rgba(120,135,165,.12)'; g.lineWidth=1;
    for(let t=1;t<4;t++){ const yy=y0c+ph*t/4; g.beginPath(); g.moveTo(padL,yy); g.lineTo(W-padR,yy); g.stroke();
      g.fillStyle=txt; g.textAlign='right'; g.fillText(nf(maxI*(1-t/4)),padL-6,yy);
      g.fillStyle=eClr; g.textAlign='left'; g.fillText(nf(eCap*(1-t/4)),W-padR+6,yy); } }
  g.fillStyle=txt; g.textAlign='right'; g.fillText(nf(maxI),padL-6,y0c+5); g.fillText('0',padL-6,y0c+ph-5);
  rot(big?16:10,y0c,'i (°)');
  g.fillStyle=eClr; g.textAlign='left'; g.fillText(nf(eCap),W-padR+6,y0c+5); g.fillText('0',W-padR+6,y0c+ph-5);
  rot(W-(big?14:9),y0c,'e',eClr);
  // e=1 unbound threshold marker (right scale) — only when e reaches it (ejection)
  if(eCap>=1){ const y1=yE(1); g.strokeStyle='rgba(255,90,60,.5)'; g.lineWidth=1; g.setLineDash([4,3]);
    g.beginPath(); g.moveTo(padL,y1); g.lineTo(W-padR,y1); g.stroke(); g.setLineDash([]);
    g.fillStyle='rgba(255,120,90,.9)'; g.textAlign='left'; g.fillText('e=1',padL+4,y1-(big?7:5)); }
  g.textAlign='center'; g.fillStyle=txt;
  const tlab=tMax>=1e6?(tMax/1e6)+' Myr':tMax>=1e3?Math.round(tMax/1e3)+' kyr':Math.round(tMax)+' yr';
  g.fillText('0',padL,y0c+ph+labT-4); g.fillText(tlab,W-padR,y0c+ph+labT-4);
  // smooth polyline: quadratic curve through snapshot midpoints (raw points are
  // only ~200, so straight segments read as jagged). One colour per planet.
  const line=(o,acc,yfn,w,dash)=>{
    const pts=o.d.map(s=>[xT(s[0]),yfn(acc(s))]);
    if(!pts.length) return;
    g.beginPath(); g.moveTo(pts[0][0],pts[0][1]);
    for(let k=1;k<pts.length-1;k++){ const mx=(pts[k][0]+pts[k+1][0])/2, my=(pts[k][1]+pts[k+1][1])/2;
      g.quadraticCurveTo(pts[k][0],pts[k][1],mx,my); }
    const last=pts[pts.length-1]; g.lineTo(last[0],last[1]);
    g.setLineDash(dash||[]); g.strokeStyle=o.rgb; g.lineWidth=w; g.lineJoin='round'; g.stroke(); g.setLineDash([]); };
  recs.forEach(o=>{
    line(o,s=>s[1]*(1+s[2]),yR,lw);          // apoapsis (solid, left radius scale)
    line(o,s=>s[1]*(1-s[2]),yR,lwq,[3,2]);   // periapsis (dashed)
    line(o,s=>s[3],yI,lw);                    // inclination (solid, left scale)
    line(o,s=>s[2],yE,lwq,[3,2]);            // eccentricity (dashed, right scale)
  });
  if(curT!=null){ const cx=xT(Math.min(curT,tMax));
    g.strokeStyle='rgba(255,255,255,.5)'; g.lineWidth=1; g.setLineDash([3,3]);
    g.beginPath(); g.moveTo(cx,y0r); g.lineTo(cx,y0c+ph); g.stroke(); g.setLineDash([]); }
  // per-panel line-style key (solid/dashed differ by panel; the labels disambiguate)
  const keyBox=(y0,solidLbl,dashLbl)=>{
    g.font=fs+'px ui-monospace,SFMono-Regular,Menlo,monospace'; g.textBaseline='middle'; g.textAlign='left';
    const seg=big?20:13, gp=big?6:4, gap2=big?18:11;
    const w1=seg+gp+g.measureText(solidLbl).width, w2=seg+gp+g.measureText(dashLbl).width;
    const ky=y0+(big?14:10), kx=W-padR-(w1+gap2+w2)-6;
    g.fillStyle='rgba(10,13,21,.66)'; g.fillRect(kx-6,ky-(big?10:8),w1+gap2+w2+12,big?20:16);
    g.strokeStyle=txt; g.lineWidth=big?2:1.6; g.setLineDash([]);
    g.beginPath(); g.moveTo(kx,ky); g.lineTo(kx+seg,ky); g.stroke();
    g.fillStyle=txt; g.fillText(solidLbl,kx+seg+gp,ky);
    const dx=kx+w1+gap2; g.setLineDash([3,2]); g.lineWidth=big?1.4:1.1;
    g.beginPath(); g.moveTo(dx,ky); g.lineTo(dx+seg,ky); g.stroke(); g.setLineDash([]);
    g.fillStyle=txt; g.fillText(dashLbl,dx+seg+gp,ky); };
  const ko=lang==='ko';
  keyBox(y0r,(ko?'원일점':'apo')+' (Q)',(ko?'근일점':'peri')+' (q)');
  keyBox(y0c,(ko?'경사각':'incl')+' (i)',(ko?'이심률':'ecc')+' (e)');
  if(recs.length>1){ let lx=padL+4; g.textAlign='left'; g.textBaseline='middle'; const sw=big?10:7;
    recs.forEach(o=>{ g.fillStyle=o.rgb; g.fillRect(lx,y0r-(big?13:9),sw,big?4:3); g.fillStyle=txt;
      const nm=o.name.split(' ').pop(); g.fillText(nm,lx+sw+4,y0r-(big?10:7)); lx+=sw+6+g.measureText(nm).width+12; }); }
}
function drawStabChart(){   // inline mini-chart
  if(!stabActive||!stabShowChart||!stabRecs.length) return;
  const W=stabChart.clientWidth||(stabPanel.clientWidth-32), H=230;   // two panels (radius, incl+e)
  if(stabChart.style.height!==H+'px') stabChart.style.height=H+'px';
  paintStab(stabChart,W,H,stabT);
}
function drawBigChart(){    // expand-modal chart
  if(!stabModalOpen||!stabRecs.length) return;
  paintStab(stabBigCanvas,stabBigCanvas.clientWidth,stabBigCanvas.clientHeight,stabT);
}

/* focus the camera on a single body (rebase origin onto it, dolly close) */
function focusBody(b){
  selBody=b;                                                // highlight the focused body
  b.obj.getWorldPosition(wp); const ws=wp.clone();          // body scene pos now
  originLy.add(sceneToLyDelta(ws));                          // origin → body
  camera.position.sub(ws); controls.target.sub(ws);         // keep view continuous
  recomputeNodes();                                         // body now at ~origin
  const dist=Math.max((b.r||R_EARTH_AU)*(b.kind==='star'?70:160), 5e-4);
  const dir=new THREE.Vector3(0.4,0.45,1).normalize();
  fly={from:camera.position.clone(),to:dir.multiplyScalar(dist),tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
}
// fly to a specific component star, even one thousands of AU from the primary
// (e.g. Proxima Cen in the Alpha Centauri cluster). Rebase onto it, then start a
// controlled short zoom (teleport just outside) so the jump from map scale is clean.
function flyToBody(b){
  selBody=b;
  b.obj.getWorldPosition(wp); const ws=wp.clone();
  originLy.add(sceneToLyDelta(ws)); recomputeNodes();        // origin → body (now at ~0)
  const dist=Math.max((b.r||R_EARTH_AU)*120, 5e-4);
  const dir=new THREE.Vector3(0.4,0.45,1).normalize();
  camera.position.copy(dir).multiplyScalar(dist*9); controls.target.set(0,0,0); // start just outside
  fly={from:camera.position.clone(),to:dir.clone().multiplyScalar(dist),tFrom:controls.target.clone(),tTo:new THREE.Vector3(0,0,0),k:0};
}

/* ── zoom slider (log distance) — top = zoomed in, bottom = zoomed out ─── */
const zoomSlider=document.getElementById('zoomSlider');
const _LZMIN=Math.log(controls.minDistance), _LZMAX=Math.log(controls.maxDistance);
const distToZoom=d=>Math.max(0,Math.min(1000,Math.round((1-(Math.log(d)-_LZMIN)/(_LZMAX-_LZMIN))*1000)));
const zoomToDist=v=>Math.exp(_LZMIN+(1-v/1000)*(_LZMAX-_LZMIN));
function applyZoom(d){
  fly=null;                                                  // cancel any fly-in
  const dir=camera.position.clone().sub(controls.target);
  if(dir.lengthSq()<1e-12) dir.set(0,0,1);
  dir.normalize().multiplyScalar(Math.max(controls.minDistance,Math.min(controls.maxDistance,d)));
  camera.position.copy(controls.target).add(dir); controls.update();
}
zoomSlider.oninput=()=>applyZoom(zoomToDist(+zoomSlider.value));
document.getElementById('zoomIn').onclick =()=>applyZoom(controls.getDistance()*0.6);
document.getElementById('zoomOut').onclick=()=>applyZoom(controls.getDistance()/0.6);

/* ── toggles / filter ─────────────────────────────────────────────────── */
let showAllLabels=false, showStems=true, showOrbits=true, showFar=false, distLimit=50,
    showMotion=false, lookbackKyr=50, showAxes=true, showHelio=false, showWind=false;
const btnLabels=document.getElementById('toggleLabels'), btnStems=document.getElementById('toggleStems'),
      btnOrbits=document.getElementById('toggleOrbits'), btnFar=document.getElementById('toggleFar'),
      btnMotion=document.getElementById('toggleMotion'), btnAxes=document.getElementById('toggleAxes'),
      btnHelio=document.getElementById('toggleHelio'), btnWind=document.getElementById('toggleWind');
btnLabels.onclick=()=>{showAllLabels=!showAllLabels;btnLabels.classList.toggle('on',showAllLabels);ensureLabels();};
btnStems.onclick=()=>{showStems=!showStems;btnStems.classList.toggle('on',showStems);applyFilter();};
btnOrbits.onclick=()=>{showOrbits=!showOrbits;btnOrbits.classList.toggle('on',showOrbits);};
btnAxes.onclick=()=>{showAxes=!showAxes;btnAxes.classList.toggle('on',showAxes);};
btnHelio.onclick=()=>{showHelio=!showHelio;btnHelio.classList.toggle('on',showHelio);};
btnWind.onclick=()=>{showWind=!showWind;btnWind.classList.toggle('on',showWind);windGroup.visible=showWind;};
btnFar.onclick=()=>{showFar=!showFar;btnFar.classList.toggle('on',showFar);
  const s=document.getElementById('distSlider'); s.value=showFar?800:50; distLimit=+s.value;
  document.getElementById('distVal').textContent=distLimit+' ly'; applyFilter();};
btnMotion.onclick=()=>{ showMotion=!showMotion; btnMotion.classList.toggle('on',showMotion);
  document.getElementById('motionRow').style.display=showMotion?'':'none';
  if(showMotion) rebuildMotion(); applyFilter(); };
document.getElementById('toggleLang').onclick=()=>{lang=lang==='ko'?'en':'ko';applyLang();};
const slider=document.getElementById('distSlider');
slider.oninput=()=>{distLimit=+slider.value;document.getElementById('distVal').textContent=distLimit+' ly';applyFilter();};
const lb=document.getElementById('lbSlider');
lb.oninput=()=>{lookbackKyr=+lb.value;document.getElementById('lbVal').textContent=lookbackKyr+' kyr';rebuildMotion();};
btnOrbits.classList.add('on');

/* space-motion trails: linear heliocentric drift over the look-back time */
function rebuildMotion(){
  const spanYr=lookbackKyr*1000, bg=new THREE.Color('#0a0d15');
  clusters.forEach(cl=>{ const mo=cl.motion; if(!mo) return;
    const dly=mo.vly.clone().multiplyScalar(spanYr);                 // ICRS ly over span
    const end=new THREE.Vector3(-dly.x,-dly.z,-dly.y).multiplyScalar(U); // past endpoint (scene-AU)
    const N=24,pos=[],col=[],c=new THREE.Color(mo.rgb);
    for(let k=0;k<=N;k++){const f=k/N;                               // f:0 oldest → 1 now
      pos.push(end.x*(1-f),end.y*(1-f),end.z*(1-f));
      const cc=bg.clone().lerp(c,f); col.push(cc.r,cc.g,cc.b);}
    const g=mo.line.geometry;
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  });
}

function clusterVisible(c){ return c.is_sol || (c.distance_ly!=null && c.distance_ly<=distLimit && (showFar||!c.beyond_50ly) && phaseOn[c.max_phase]); }
function applyFilter(){
  clusters.forEach(cl=>{
    const vis=clusterVisible(cl.data);
    cl.node.visible=vis;
    if(cl.stem) cl.stem.visible=vis&&showStems;
    if(cl.motion) cl.motion.line.visible=vis&&showMotion;
    if(cl.labelEl && !cl.labelWanted) cl.labelEl.style.display='none';
  });
}
function ensureLabels(){
  clusters.forEach(cl=>{
    const need=showAllLabels||cl.data.is_sol||cl.data.is_confirmed_set;
    if(need&&!cl.labelEl) cl.labelEl=mkLabel(cl.data.label, cl.data.is_sol?'label sun':(cl.data.is_confirmed_set?'label confirmed':'label'));
    cl.labelWanted=need;                 // single source of truth; updateScene honors it
    if(cl.labelEl && !need) cl.labelEl.style.display='none';
  });
  applyFilter();
}

/* ── crosshair pool (real-size bodies when zoomed in) ─────────────────── */
const xpool=[]; let xused=0;
function getXhair(){
  if(xused<xpool.length) return xpool[xused++];
  const el=document.createElement('div'); el.className='xhair';
  el.innerHTML='<i></i><span class="lbl"></span>';
  document.getElementById('labels').appendChild(el); xpool.push(el); xused++; return el;
}

/* ── per-frame LOD + projection ───────────────────────────────────────── */
const wp=new THREE.Vector3(), proj=new THREE.Vector3();
function projectToScreen(v){ proj.copy(v).project(camera);
  return {x:(proj.x*.5+.5)*innerWidth, y:(-proj.y*.5+.5)*innerHeight, on:proj.z<1}; }

function updateScene(){
  rebaseToTarget();
  backdrop.position.copy(camera.position);
  xused=0;
  const camPos=camera.position;
  clusters.forEach(cl=>{
    if(!cl.node.visible) return;
    const dist=camPos.distanceTo(cl.node.position);
    const full=cl.sysScale*7, enter=cl.sysScale*45;
    const t=Math.max(0,Math.min(1,(dist-full)/(enter-full))); // 1 = far (map), 0 = inside system
    // glow: round sprite layers (core + halo + wide faint outer), constant
    // screen size, fading with zoom (t) and with distance from Sol (_appBright).
    const ab=cl.data._appBright;
    const gsz=(cl.data.is_sol?1.2:cl.data.rep_radius*1.5)*0.03*dist;
    cl.glow.material.opacity=t*ab*0.85;  cl.glow.scale.setScalar(gsz);
    cl.core.material.opacity=t*ab;       cl.core.scale.setScalar(gsz*0.32);
    cl.outer.material.opacity=t*ab*0.22; cl.outer.scale.setScalar(gsz*2.2);
    const active=t<0.999; cl._active=active;
    // real bodies + orbits visible only when active
    cl.orbitsLines.forEach(l=>l.visible=active&&showOrbits);
    if(cl.axisLines) cl.axisLines.forEach(l=>l.visible=active&&showAxes);
    if(cl.helioObjs) cl.helioObjs.forEach(h=>h.visible=active&&showHelio);   // bubbles: system view
    if(cl.diskMeshes) cl.diskMeshes.forEach(m=>m.visible=active);
    cl.bodies.forEach(b=>{ if(b.kind==='star'){ b.obj.visible=true; if(b.glow) b.glow.material.opacity=(1-t)*0.9; } else b.obj.visible=active; });
    // crosshairs for active cluster bodies
    if(active){
      cl.bodies.forEach(b=>{
        b._shown=false;
        b.obj.getWorldPosition(wp);
        const s=projectToScreen(wp);
        if(!s.on||s.x<-40||s.x>innerWidth+40||s.y<-40||s.y>innerHeight+40) return;
        const el=getXhair();
        el.className='xhair'+(b.kind==='star'?' star':'')+(b===selBody?' sel':'');
        el.style.setProperty('--xc', b.rgb);
        el.style.left=s.x+'px'; el.style.top=s.y+'px'; el.style.display='';
        const lbl=el.firstElementChild.nextElementSibling; lbl.textContent=b.name;
        b._sx=s.x; b._sy=s.y; b._shown=true;
      });
    } else { cl.bodies.forEach(b=>b._shown=false); }
    // cluster name label (map scale) — only when wanted (fixes all-labels toggle-off)
    if(cl.labelEl){
      if(cl.labelWanted && !active){ const s=projectToScreen(cl.node.position);
        if(s.on){cl.labelEl.style.display='';cl.labelEl.style.left=s.x+'px';cl.labelEl.style.top=s.y+'px';}
        else cl.labelEl.style.display='none';
      } else cl.labelEl.style.display='none';
    }
  });
  for(let i=xused;i<xpool.length;i++) xpool[i].style.display='none';
  // ring labels
  ringLabels.forEach(r=>{ const w=r.local.clone().add(ringGroup.position); const s=projectToScreen(w);
    r.el.style.display=(r.r<=distLimit&&s.on)?'':'none'; if(s.on){r.el.style.left=s.x+'px';r.el.style.top=s.y+'px';} });
  // hovered star name — shown even when its persistent label is off
  if(hoverCl){
    const hcl=clusters.find(x=>x.data===hoverCl);
    if(hcl && hcl.node.visible && !hcl.labelWanted){
      const s=projectToScreen(hcl.node.position);
      if(s.on){ hoverLabel.textContent=(lang==='ko'&&hoverCl.label_ko)?hoverCl.label_ko:hoverCl.label;
        hoverLabel.style.left=s.x+'px'; hoverLabel.style.top=s.y+'px'; hoverLabel.style.display=''; }
      else hoverLabel.style.display='none';
    } else hoverLabel.style.display='none';
  } else hoverLabel.style.display='none';
  updateStability();   // morph the simulated orbit (overrides normal orbit visibility)
}

/* ── keyboard fly (WASD + arrows) ─────────────────────────────────────── */
const keys={};
const MOVE=new Set(['KeyW','KeyA','KeyS','KeyD','KeyR','KeyF','Space','ShiftLeft',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);
addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT') return; if(MOVE.has(e.code)){keys[e.code]=true; e.preventDefault();} });
addEventListener('keyup',e=>{ keys[e.code]=false; });
const _f=new THREE.Vector3(),_r=new THREE.Vector3(),_mv=new THREE.Vector3();
function applyKeys(){
  _mv.set(0,0,0);
  camera.getWorldDirection(_f);
  _r.crossVectors(_f,camera.up).normalize();
  if(keys.KeyW||keys.ArrowUp) _mv.add(_f);
  if(keys.KeyS||keys.ArrowDown) _mv.addScaledVector(_f,-1);
  if(keys.KeyD||keys.ArrowRight) _mv.add(_r);
  if(keys.KeyA||keys.ArrowLeft) _mv.addScaledVector(_r,-1);
  if(keys.KeyR||keys.Space) _mv.add(camera.up);
  if(keys.KeyF||keys.ShiftLeft) _mv.addScaledVector(camera.up,-1);
  if(_mv.lengthSq()===0) return;
  _mv.normalize().multiplyScalar(controls.getDistance()*0.005); // speed scales with zoom
  camera.position.add(_mv); controls.target.add(_mv);
  fly=null; // a keypress cancels an in-progress fly
}

/* ── render loop ──────────────────────────────────────────────────────── */
function tick(){
  requestAnimationFrame(tick);
  applyKeys();
  if(fly){ fly.k=Math.min(1,fly.k+0.04);
    const e=1-Math.pow(1-fly.k,3);
    camera.position.lerpVectors(fly.from,fly.to,e);
    controls.target.lerpVectors(fly.tFrom,fly.tTo,e);
    if(fly.k>=1) fly=null;
  }
  controls.update();
  if(document.activeElement!==zoomSlider) zoomSlider.value=distToZoom(controls.getDistance());
  updateScene();
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},7000);

ensureLabels(); applyFilter(); applyLang(); tick();
</script>
</body>
