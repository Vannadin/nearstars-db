function torusSDF(x,y,z,P){
  const px = x*(x<0?P.ext:P.comp);
  const q1 = Math.sqrt((px*px+z*z)*P.dxy)-P.dist;
  const d1 = Math.sqrt(q1*q1+y*y)-P.rad;
  const q2 = Math.sqrt((px*px+z*z)*P.bdxy)-P.bdist;
  const d2 = Math.sqrt(q2*q2+y*y)-P.brad;
  let v = Math.max(d1,-d2);
  if(P.deform>0.001) v += Math.sin(px*5)*Math.sin(y*7)*Math.sin(z*6)*P.deform;
  return v;
}
function pauseSDF(x,y,z,P){
  let px = x + (P.off||0);            // 실험용 병진(비-cfg): 형태 전체를 꼬리쪽으로 물림
  px = px*(px<0?P.ext:P.comp);
  const py = y*P.hscale;
  let v = Math.sqrt(px*px+py*py+z*z)-P.rad;
  if(P.deform>0.001) v += Math.sin(px*5)*Math.sin(py*7)*Math.sin(z*6)*P.deform;
  return v;
}

let RMAX=70;
function sceneExtent(){
  let e=5;
  const belt=B=>{ if(!B.on)return;
    const m=B.dist+B.rad;
    e=Math.max(e, m/Math.min(B.comp,B.ext,1), m); };
  belt(state.inner); belt(state.outer);
  if(state.pause.on){ const P=state.pause;
    e=Math.max(e, P.rad/P.comp, P.rad/P.ext+(P.off||0), P.rad/P.hscale); }
  return Math.ceil(e*1.06);
}
function updateViewMax(){

// 현재 상태 → Kerbalism cfg (레거시 필드, 오늘 작동하는 스키마)
function nm(v){ return Math.round(v*1e5)/1e5; }
function toCfg(){
  const s=state,I=s.inner,O=s.outer,P=s.pause,L=[];
  L.push('// NearStars belt-viewer 내보내기 — 단위: 바디 반경, rad/h');
  L.push('// Kerbalism MM 패치에 붙여넣고 name + :NEEDS[...] 지정');
  if((P.off||0)>0.001) L.push('// ⚗ pause_offset '+nm(P.off)+' 는 뷰어 전용 실험 필드(실 cfg 아님) → 제외');
  const belt=(B,pre)=>{
    L.push('  has_'+pre+' = '+(B.on?'true':'false'));
    if(!B.on) return;
    L.push('  '+pre+'_dist = '+nm(B.dist));
    L.push('  '+pre+'_radius = '+nm(B.rad));
    if(Math.abs(B.dxy-1)>1e-4) L.push('  '+pre+'_deform_xy = '+nm(B.dxy));
    if(Math.abs(B.comp-1)>1e-4) L.push('  '+pre+'_compression = '+nm(B.comp));
    if(Math.abs(B.ext-1)>1e-4) L.push('  '+pre+'_extension = '+nm(B.ext));
    if(B.brad>1e-4){ L.push('  '+pre+'_border_dist = '+nm(B.bdist));
      L.push('  '+pre+'_border_radius = '+nm(B.brad));
      if(Math.abs(B.bdxy-1)>1e-4) L.push('  '+pre+'_border_deform_xy = '+nm(B.bdxy)); }
    if(B.deform>1e-3) L.push('  '+pre+'_deform = '+nm(B.deform));
  };
  L.push('RadiationModel'); L.push('{'); L.push('  name = nsCustom');
  belt(I,'inner'); belt(O,'outer');
  L.push('  has_pause = '+(P.on?'true':'false'));
  if(P.on){ L.push('  pause_radius = '+nm(P.rad));
    if(Math.abs(P.comp-1)>1e-4) L.push('  pause_compression = '+nm(P.comp));
    if(Math.abs(P.ext-1)>1e-4) L.push('  pause_extension = '+nm(P.ext));
    if(Math.abs(P.hscale-1)>1e-4) L.push('  pause_height_scale = '+nm(P.hscale));
    if(P.deform>1e-3) L.push('  pause_deform = '+nm(P.deform)); }
  L.push('}');
  L.push('RadiationBody'); L.push('{'); L.push('  name = <BodyName>'); L.push('  radiation_model = nsCustom');
  if(I.on){ L.push('  radiation_inner = '+nm(I.radiation));
    if(Math.abs(I.grad-3.3)>1e-4) L.push('  radiation_inner_gradient = '+nm(I.grad)); }
  if(O.on){ L.push('  radiation_outer = '+nm(O.radiation));
    if(Math.abs(O.grad-2.2)>1e-4) L.push('  radiation_outer_gradient = '+nm(O.grad)); }
  if(P.on) L.push('  radiation_pause = '+nm(P.radiation));
  const tilt=s.view.tilt; if(Math.abs(tilt)>1e-4) L.push('  geomagnetic_pole_lat = '+nm(90-tilt));
  const goff=s.view.offset||0; if(goff>1e-4) L.push('  geomagnetic_offset = '+nm(goff));
  L.push('}');
  if(P.on) L.push('// Shue-native pause (KerbalismShuePause PR 채택 시): pause_nose = '+nm(P.rad/P.comp)+
    ' · pause_alpha = '+nm(Math.log2(P.comp))+' · pause_tail = '+nm(P.rad/P.ext));
  return L.join('\n');
}
function copyCfg(btn){
  const txt=toCfg(), old=btn.textContent;
  const done=()=>{ btn.textContent='✓ 복사됨'; btn.classList.add('done');
    setTimeout(()=>{btn.textContent=old;btn.classList.remove('done');},1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done,()=>fallback(txt,done));
  } else fallback(txt,done);
}
function fallback(txt,done){
  const ta=document.createElement('textarea'); ta.value=txt;
  ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy');done();}catch(_){} document.body.removeChild(ta);
}

// ---- rendering ----
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const ro=document.getElementById('ro');
let SZ=420, img=null;
function resize(){
  const w=cv.clientWidth||420; SZ=Math.max(240,Math.min(460,Math.round(w)));
  cv.width=SZ; cv.height=SZ; img=ctx.createImageData(SZ,SZ); scheduleRender();
}
function doseAt(x,y){ // world coords -> {dose, zone}
  const v=state.view, tr=v.tilt*Math.PI/180, ca=Math.cos(tr), sa=Math.sin(tr);
  const xr=x*ca - y*sa, yr=x*sa + y*ca - (v.offset||0), z=v.z;
  let dose=0, zone=[];
  const mag=Math.sqrt(x*x+y*y+z*z);
  if(mag<1) return {dose:NaN,zone:'body',mag};
  if(state.inner.on){ const d=torusSDF(xr,yr,z,state.inner);
    if(d<0){ dose+=clamp(state.inner.grad*(-d)/state.inner.rad,0,1)*state.inner.radiation; zone.push('내대'); } }
  if(state.outer.on){ const d=torusSDF(xr,yr,z,state.outer);
    if(d<0){ dose+=clamp(state.outer.grad*(-d)/state.outer.rad,0,1)*state.outer.radiation; zone.push('외대'); } }
  let pd=1;
  if(state.pause.on){ pd=pauseSDF(xr,yr,z,state.pause);
    if(pd<0){ dose+=clamp(pd/-0.1332,0,1)*state.pause.radiation; if(!zone.length)zone.push('자기권 내'); } }
  return {dose,zone:zone.join('+')||'—',mag,pd};
}
function render(){
  if(!img)return;
  const v=state.view, R=v.R, wpp=(2*R)/SZ, d=img.data;
  const maxI=Math.max(state.inner.on?state.inner.radiation:0, state.outer.on?state.outer.radiation:0, 1e-6);
  const pa=state.pause.alpha!=null?state.pause.alpha:0.6;
  const tr=v.tilt*Math.PI/180, ca=Math.cos(tr), sa=Math.sin(tr), z=v.z, off=v.offset||0;
  for(let j=0;j<SZ;j++){
    const y=(SZ/2 - j)*wpp;
    for(let i=0;i<SZ;i++){
      const x=(i-SZ/2)*wpp;
      const xr=x*ca - y*sa, yr=x*sa + y*ca - off;
      const idx=(j*SZ+i)*4;
      const mag=Math.sqrt(x*x+y*y+z*z);
      let r,g,b;
      if(mag<1){ // body, sunlit toward +x
        const lit=clamp(0.32+0.5*(x/1),0.12,0.92);
        r=48*lit+18; g=58*lit+20; b=74*lit+24;
        d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=255; continue;
      }
      let dose=0;
      if(state.inner.on){const s=torusSDF(xr,yr,z,state.inner); if(s<0)dose+=clamp(state.inner.grad*(-s)/state.inner.rad,0,1)*state.inner.radiation;}
      if(state.outer.on){const s=torusSDF(xr,yr,z,state.outer); if(s<0)dose+=clamp(state.outer.grad*(-s)/state.outer.rad,0,1)*state.outer.radiation;}
      let pd=1;
      if(state.pause.on) pd=pauseSDF(xr,yr,z,state.pause);
      // base: space + faint magnetosphere interior (불투명도 pa 반영)
      r=5;g=7;b=13;
      if(state.pause.on && pd<0){ r+=(10-r)*pa; g+=(16-g)*pa; b+=(30-b)*pa; }
      if(dose>1e-4){ const c=inferno(dose/maxI); r=c[0];g=c[1];b=c[2]; }
      // pause boundary line (불투명도 pa 반영)
      if(state.pause.on && Math.abs(pd)< wpp*1.3){ r+=(57-r)*pa; g+=(207-g)*pa; b+=(217-b)*pa; }
      d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  // overlay: rings + axes
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.font='10px ui-monospace,monospace'; ctx.lineWidth=1;
  const c=SZ/2, ppr=SZ/(2*R);
  const step = R<=4?1 : R<=10?2 : R<=25?5 : 10;
  for(let rr=step;rr<=R;rr+=step){
    ctx.beginPath(); ctx.setLineDash([2,4]); ctx.arc(c,c,rr*ppr,0,7); ctx.stroke();
    ctx.setLineDash([]); ctx.fillText(rr+'',c+rr*ppr+2,c-2);
  }
  // axes
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.beginPath();
  ctx.moveTo(0,c);ctx.lineTo(SZ,c);ctx.moveTo(c,0);ctx.lineTo(c,SZ);ctx.stroke();
  // Shue 기준 곡선 r(θ)=r0·(2/(1+cosθ))^α — 항성정렬 프레임(tilt 무관), r0=현재 pause 노즈
  // 꼬리마감 L>r0이면: 연화 Shue 폐곡선(C∞ 단일식) + 순수 Shue 대조
  const alS=state.view.shue;
  if(alS>0.05 && state.pause.on){
    const P=state.pause;
    const nose=P.rad/P.comp-(P.off||0);
    if(nose>0.3){
      const L=P.rad/P.ext+(P.off||0);     // Kerbalism 계면 꼬리 길이에 연동 (pause_radius/extension + offset)
      const m=1;                          // 테이퍼 m=1 고정 (기저형, 노브 없음 — 오너 확정 2026-07-23)
      ctx.lineWidth=1.5;
      ctx.font='10px ui-monospace,monospace';
      if(L>nose*1.05){
        // ── 연화 Shue (단일 매끄러운 폐곡선, 이음매 없음):
        //    r(θ) = r0·((1+ε)/(ε+cos^{2m}(θ/2)))^{α/m},  ε = 1/((L/r0)^{m/α}−1)
        //    ε→0 = 순수 Shue 환원, θ=180°서 dr/dθ=0 (둥근 끝)
        const eps=1/(Math.pow(L/nose,m/alS)-1);
        // 대조용 순수 Shue(열림) — 희미하게
        ctx.strokeStyle='rgba(255,255,255,.20)'; ctx.setLineDash([3,5]);
        ctx.beginPath();
        let f2=true;
        for(let deg=-150;deg<=150;deg+=2){
          const th=deg*Math.PI/180;
          const rr2=nose*Math.pow(2/(1+Math.cos(th)),alS);
          const px2=c+rr2*Math.cos(th)*ppr, py2=c-rr2*Math.sin(th)*ppr;
          if(f2){ctx.moveTo(px2,py2);f2=false;} else ctx.lineTo(px2,py2);
        }
        ctx.stroke();
        // 연화 폐곡선
        ctx.strokeStyle='rgba(255,154,82,.95)'; ctx.setLineDash([6,4]);
        ctx.fillStyle='rgba(255,154,82,.055)';
        ctx.beginPath();
        f2=true;
        for(let i=0;i<=240;i++){
          const deg=-180+i*1.5;
          const cu=Math.cos(deg*Math.PI/360);          // cos(θ/2)
          const rr2=nose*Math.pow((1+eps)/(eps+Math.pow(cu*cu,m)),alS/m);
          const th=deg*Math.PI/180;
          const px2=c+rr2*Math.cos(th)*ppr, py2=c-rr2*Math.sin(th)*ppr;
          if(f2){ctx.moveTo(px2,py2);f2=false;} else ctx.lineTo(px2,py2);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,154,82,.95)';
        ctx.beginPath(); ctx.arc(c+nose*ppr,c,2.5,0,7); ctx.fill();
        ctx.fillText('연화 Shue (C∞)  α='+alS.toFixed(2)+' r0='+nose.toFixed(1)+' L='+L.toFixed(0)+'(pause 연동) ε='+eps.toFixed(4), c+nose*ppr+5, c-6);
        ctx.fillStyle='rgba(255,255,255,.5)';
        ctx.fillText('흰 점선 = 순수 Shue(열림) 대조', c-L*ppr*0.9, c+16);
      } else {
        // ── 열린 Shue (기존 동작)
        ctx.strokeStyle='rgba(255,154,82,.85)'; ctx.setLineDash([6,4]);
        ctx.beginPath();
        let first=true;
        for(let deg=-152;deg<=152;deg+=2){
          const th=deg*Math.PI/180;
          const rr2=nose*Math.pow(2/(1+Math.cos(th)),alS);
          const px2=c+rr2*Math.cos(th)*ppr, py2=c-rr2*Math.sin(th)*ppr;
          if(first){ctx.moveTo(px2,py2);first=false;} else ctx.lineTo(px2,py2);
        }
        ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,154,82,.9)';
        ctx.beginPath(); ctx.arc(c+nose*ppr,c,2.5,0,7); ctx.fill();
        ctx.fillText('Shue α='+alS.toFixed(2)+' (r0='+nose.toFixed(1)+')', c+nose*ppr+5, c-6);
      }
    }
  }
  ctx.restore();
  document.getElementById('scaleHi').textContent=fmt(maxI);
}
let raf=null;
function scheduleRender(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=null; viewMode==='3d'?render3d():render();}); }

// ================= 3D volume raymarcher (same SDFs, in GLSL) =================
let viewMode='2d';
const cv3=document.getElementById('cv3d');
let gl=null, prog=null, U={}, cam={yaw:0.6,pitch:0.35};

const VSH=`attribute vec2 aP;void main(){gl_Position=vec4(aP,0.,1.);}`;
const FSH=`precision highp float;
uniform vec2 uRes;uniform float uYaw,uPitch,uDistCam,uTilt,uMaxI,uBR;
uniform float uInnerOn,uOuterOn,uPauseOn,uOff;
uniform float iD,iR,iXY,iC,iE,iBD,iBR2,iBXY,iDef,iInt,iGr;
uniform float oD,oR,oXY,oC,oE,oBD,oBR2,oBXY,oDef,oInt,oGr;
uniform float pR,pC,pE,pH,pDef,pOff,pAlpha;
vec3 inferno(float t){t=clamp(t,0.,1.);
 const vec3 c0=vec3(0.000218940,0.001651005,-0.019480898);
 const vec3 c1=vec3(0.106513419,0.563956437,3.932712389);
 const vec3 c2=vec3(11.60249308,-3.972853966,-15.94239411);
 const vec3 c3=vec3(-41.70399613,17.43639888,44.35414520);
 const vec3 c4=vec3(77.16293570,-33.40235894,-81.80730926);
 const vec3 c5=vec3(-71.31942824,32.62606426,73.20951986);
 const vec3 c6=vec3(25.13112622,-12.24266895,-23.07032500);
 return clamp(c0+t*(c1+t*(c2+t*(c3+t*(c4+t*(c5+t*c6))))),0.,1.);}
float torus(vec3 p,float D,float R,float XY,float C,float E,float BD,float BR2,float BXY,float DEF){
 p.x*=p.x<0.0?E:C;
 float q1=sqrt((p.x*p.x+p.z*p.z)*XY)-D;
 float d1=sqrt(q1*q1+p.y*p.y)-R;
 float q2=sqrt((p.x*p.x+p.z*p.z)*BXY)-BD;
 float d2=sqrt(q2*q2+p.y*p.y)-BR2;
 float v=max(d1,-d2);
 if(DEF>0.001)v+=sin(p.x*5.)*sin(p.y*7.)*sin(p.z*6.)*DEF;
 return v;}
float pauseF(vec3 p){
 p.x+=pOff;
 p.x*=p.x<0.0?pE:pC; p.y*=pH;
 float v=length(p)-pR;
 if(pDef>0.001)v+=sin(p.x*5.)*sin(p.y*7.)*sin(p.z*6.)*pDef;
 return v;}
void main(){
 vec2 uv=(gl_FragCoord.xy*2.0-uRes)/uRes.y;
 float cy=cos(uYaw),sy=sin(uYaw),cp=cos(uPitch),sp=sin(uPitch);
 vec3 ro=uDistCam*vec3(cp*sy,sp,cp*cy);
 vec3 fw=normalize(-ro);
 vec3 rt=normalize(cross(fw,vec3(0.,1.,0.)));
 vec3 up=cross(rt,fw);
 vec3 rd=normalize(fw+0.62*(uv.x*rt+uv.y*up));
 float b=dot(ro,rd);
 float c=dot(ro,ro)-uBR*uBR;
 float h=b*b-c;
 vec3 col=vec3(0.); float a=0.;
 float ca=cos(radians(uTilt)),sa=sin(radians(uTilt));
 if(h>0.0){
  float t0=max(0.0,-b-sqrt(h)), t1=-b+sqrt(h);
  float dt=(t1-t0)/110.0;
  for(int i=0;i<110;i++){
   float t=t0+(float(i)+0.5)*dt;
   vec3 pw=ro+rd*t;
   if(dot(pw,pw)<1.0){
    vec3 n=normalize(pw);
    float lit=clamp(0.32+0.55*n.x,0.10,0.95);
    vec3 bod=vec3(0.20,0.24,0.30)*lit+vec3(0.055);
    col+=(1.0-a)*bod; a=1.0; break;}
   vec3 q=vec3(pw.x*ca-pw.y*sa, pw.x*sa+pw.y*ca-uOff, pw.z);
   float dose=0.0;
   if(uInnerOn>0.5){float d=torus(q,iD,iR,iXY,iC,iE,iBD,iBR2,iBXY,iDef);
     if(d<0.0)dose+=clamp(iGr*(-d)/iR,0.,1.)*iInt;}
   if(uOuterOn>0.5){float d=torus(q,oD,oR,oXY,oC,oE,oBD,oBR2,oBXY,oDef);
     if(d<0.0)dose+=clamp(oGr*(-d)/oR,0.,1.)*oInt;}
   if(dose>1e-4){
    float dn=dose/uMaxI;
    float aS=clamp(dn*13.0*dt/uBR,0.0,0.32);
    col+=(1.0-a)*inferno(dn)*aS*1.25; a+=(1.0-a)*aS;}
   if(uPauseOn>0.5){
    float pd=pauseF(q);
    float shell=exp(-abs(pd)/(uBR*0.006));
    float aP2=shell*24.0*dt/uBR*pAlpha;
    col+=(1.0-a)*vec3(0.22,0.81,0.85)*aP2;
    a+=(1.0-a)*aP2*0.5;
    if(pd<0.0){float aI=1.6*dt/uBR*pAlpha;
     col+=(1.0-a)*vec3(0.045,0.075,0.13)*aI; a+=(1.0-a)*aI*0.4;}}
   if(a>0.985)break;
  }}
 vec3 bg=vec3(0.020,0.027,0.051);
 col+=(1.0-a)*bg;
 gl_FragColor=vec4(col,1.0);}`;

function glInit(){
 if(gl)return true;
 gl=cv3.getContext('webgl',{antialias:false,depth:false});
 if(!gl){ro.innerHTML='WebGL을 사용할 수 없습니다';return false;}
 function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
 prog=gl.createProgram();
 gl.attachShader(prog,sh(gl.VERTEX_SHADER,VSH));
 gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FSH));
 gl.linkProgram(prog);
 if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
 gl.useProgram(prog);
 const buf=gl.createBuffer();
 gl.bindBuffer(gl.ARRAY_BUFFER,buf);
 gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
 const loc=gl.getAttribLocation(prog,'aP');
 gl.enableVertexAttribArray(loc);
 gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
 ['uRes','uYaw','uPitch','uDistCam','uTilt','uMaxI','uBR','uInnerOn','uOuterOn','uPauseOn','uOff',
  'iD','iR','iXY','iC','iE','iBD','iBR2','iBXY','iDef','iInt','iGr',
  'oD','oR','oXY','oC','oE','oBD','oBR2','oBXY','oDef','oInt','oGr',
  'pR','pC','pE','pH','pDef','pOff','pAlpha'].forEach(n=>U[n]=gl.getUniformLocation(prog,n));
 return true;
}
function resize3d(){
 const dpr=Math.min(window.devicePixelRatio||1,1.5);
 const w=Math.round((cv3.clientWidth||420)*dpr);
 if(w<10)return;
 cv3.width=w; cv3.height=w;
 if(gl)gl.viewport(0,0,w,w);
}
function render3d(){
 if(!glInit())return;
 if(cv3.width<10)resize3d();
 const s=state, v=s.view;
 const maxI=Math.max(s.inner.on?s.inner.radiation:0, s.outer.on?s.outer.radiation:0, 1e-6);
 gl.uniform2f(U.uRes,cv3.width,cv3.height);
 gl.uniform1f(U.uYaw,cam.yaw); gl.uniform1f(U.uPitch,cam.pitch);
 gl.uniform1f(U.uDistCam,v.R*2.6); gl.uniform1f(U.uBR,v.R*1.5);
 gl.uniform1f(U.uTilt,v.tilt); gl.uniform1f(U.uMaxI,maxI); gl.uniform1f(U.uOff,v.offset||0);
 gl.uniform1f(U.uInnerOn,s.inner.on?1:0);
 gl.uniform1f(U.uOuterOn,s.outer.on?1:0);
 gl.uniform1f(U.uPauseOn,s.pause.on?1:0);
 const I=s.inner,O=s.outer,P=s.pause;
 gl.uniform1f(U.iD,I.dist);gl.uniform1f(U.iR,I.rad);gl.uniform1f(U.iXY,I.dxy);
 gl.uniform1f(U.iC,I.comp);gl.uniform1f(U.iE,I.ext);gl.uniform1f(U.iBD,I.bdist);
 gl.uniform1f(U.iBR2,I.brad);gl.uniform1f(U.iBXY,I.bdxy);gl.uniform1f(U.iDef,I.deform);
 gl.uniform1f(U.iInt,I.radiation);gl.uniform1f(U.iGr,I.grad);
 gl.uniform1f(U.oD,O.dist);gl.uniform1f(U.oR,O.rad);gl.uniform1f(U.oXY,O.dxy);
 gl.uniform1f(U.oC,O.comp);gl.uniform1f(U.oE,O.ext);gl.uniform1f(U.oBD,O.bdist);
 gl.uniform1f(U.oBR2,O.brad);gl.uniform1f(U.oBXY,O.bdxy);gl.uniform1f(U.oDef,O.deform);
 gl.uniform1f(U.oInt,O.radiation);gl.uniform1f(U.oGr,O.grad);
 gl.uniform1f(U.pR,P.rad);gl.uniform1f(U.pC,P.comp);gl.uniform1f(U.pE,P.ext);
 gl.uniform1f(U.pH,P.hscale);gl.uniform1f(U.pDef,P.deform);
 gl.uniform1f(U.pOff,P.off||0);gl.uniform1f(U.pAlpha,P.alpha!=null?P.alpha:0.6);
 gl.drawArrays(gl.TRIANGLES,0,3);
 document.getElementById('scaleHi').textContent=fmt(maxI);
}
// mode switch
document.getElementById('mode').addEventListener('click',e=>{
 const b=e.target.closest('button'); if(!b)return;
 viewMode=b.dataset.m;
 document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));
 cv.style.display=viewMode==='2d'?'block':'none';
 cv3.style.display=viewMode==='3d'?'block':'none';
 if(viewMode==='3d'){resize3d();ro.innerHTML='드래그 = 회전 · 휠 = 줌';}
 else ro.innerHTML='커서를 올려보세요';
 scheduleRender();
});
// 3D interaction: drag rotate, wheel zoom
let drag=null;
cv3.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY};});
window.addEventListener('mousemove',e=>{
 if(!drag)return;
 cam.yaw -= (e.clientX-drag.x)*0.008;
 cam.pitch = clamp(cam.pitch+(e.clientY-drag.y)*0.008, -1.45, 1.45);
 drag={x:e.clientX,y:e.clientY};
 scheduleRender();
});
window.addEventListener('mouseup',()=>drag=null);
cv3.addEventListener('wheel',e=>{
 e.preventDefault();
 state.view.R=clamp(state.view.R*(e.deltaY>0?1.12:0.89),2,RMAX);
 syncControls(); scheduleRender();
},{passive:false});
cv3.addEventListener('touchstart',e=>{if(e.touches.length===1)drag={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
cv3.addEventListener('touchmove',e=>{
 if(!drag||e.touches.length!==1)return;
 const t=e.touches[0];
 cam.yaw-=(t.clientX-drag.x)*0.008;
 cam.pitch=clamp(cam.pitch+(t.clientY-drag.y)*0.008,-1.45,1.45);
 drag={x:t.clientX,y:t.clientY};
 scheduleRender();
},{passive:true});
cv3.addEventListener('touchend',()=>drag=null);
new ResizeObserver(()=>{if(viewMode==='3d'){resize3d();scheduleRender();}}).observe(cv3);

// hover readout
cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const px=(e.clientX-rect.left)/rect.width*SZ, py=(e.clientY-rect.top)/rect.height*SZ;
  const R=state.view.R, wpp=(2*R)/SZ;
  const x=(px-SZ/2)*wpp, y=(SZ/2-py)*wpp;
  const res=doseAt(x,y);
  if(res.zone==='body'){ ro.innerHTML=`위치 <b>(${x.toFixed(2)}, ${y.toFixed(2)})</b> R<br>바디 내부`; return; }
  ro.innerHTML=`위치 <b>(${x.toFixed(2)}, ${y.toFixed(2)})</b> R · |r|=${res.mag.toFixed(2)}<br>`+
    `dose <b>${res.dose.toFixed(2)}</b> rad/h · 구역 ${res.zone}`+
    (state.view.z>0?`<br><span class="z">slice z=${state.view.z.toFixed(2)}</span>`:'');
});
cv.addEventListener('mouseleave',()=>ro.innerHTML='커서를 올려보세요');

document.getElementById('foot').innerHTML=
 '충실도: <code>Inner/Outer_func</code>=토러스 SDF <code>max(d1,−d2)</code>(border 차집합), <code>Pause_func</code>=눌린 구, dose=<code>clamp(gradient·(−SDF)/radius,0,1)·intensity</code> — 전부 <code>src/Kerbalism/Radiation/Radiation.cs</code> 원문 그대로. '+
 '<code>deform</code>은 sin(x·5)sin(y·7)sin(z·6)이라 좌표평면 위에선 항등 0 — 2D에서 처음 켜면 <code>slice_z</code>가 최대 진폭 0.26으로 자동 설정됩니다(3D에선 그대로 보임). '+
 '3D 모드 = 같은 SDF를 GLSL로 이식해 볼륨 레이마칭(110스텝, 색=dose 방출·청록=계면 껍질). 드래그 회전·휠 줌. '+
 '<code>pause_offset</code> ⚗ = 실험용 병진 지오메트리(전체를 꼬리쪽으로 물림) — <b>Kerbalism cfg에 없는 필드</b>라 emit 불가, comp 방식과의 비교용. '+
 'Shue 오버레이 = r(θ)=r0·(2/(1+cosθ))^α (1997JGR...102.9497S), r0=현재 노즈(pause_radius/comp−offset), 항성정렬 프레임이라 tilt=0에서 비교 정확. '+
 '주황 = <b>연화 Shue</b> r(θ)=r0·((1+ε)/(ε+cos²(θ/2)))^α — 단일 C∞ 폐곡선(이음매·크리스 없음), 테이퍼 m=1 고정(기저형, 노브 없음). 꼬리 길이 L은 <b>Kerbalism 계면 꼬리에 연동</b>(pause_radius/extension+offset), ε=1/((L/r0)^{1/α}−1)로 정확히 L서 닫힘. L 연동 덕에 주간측은 순수 Shue와 ~0.3% 이내(흰 점선 대조). plugins/KerbalismShuePause 권장안. 「Shue 데모」 프리셋이 원클릭. '+
 '값은 슬라이더 또는 우측 숫자칸 직접 입력(범위 초과 허용). 뷰 반너비 슬라이더의 최대값은 장면 전체가 들어오는 크기로 자동 갱신(끝까지 밀면 전체 보기). '+
 '스톡 프리셋 = KSP-RO/ROKerbalism 실배포 cfg(2026-07-24 검증), 물리 프리셋 = 쌍극자 L-셸 수치 피팅(fit_belts.py, 캡션의 IoU), NearStars 프리셋 = Phase 4 도출. 근거·렌더: <a href="https://github.com/Vannadin/nearstars-db/wiki/Radiation-Belts">위키 Radiation Belts</a> · docs/reference/solar-system-radiation-belts.md';
