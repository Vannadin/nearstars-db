<!DOCTYPE html>
<!-- Procyon A Phase 2 measurement viewer — autogenerated by scripts/pipeline/build_phase2_html.py -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procyon A · Phase 2 measurements</title>
<link rel="stylesheet" href="../style.css">
<style>
.intro { color: #7a92ac; max-width: 780px; margin-bottom: 8px }
.intro b { color: #a0bcd8 }
h2 { margin-bottom: 10px }
h3 { margin: 14px 0 6px }

.plot { position: relative; margin: 8px 0 }
.plot svg { display: block; width: 100%; height: auto }
.plot .gridline { stroke: #152030; stroke-width: 1 }
.plot .axis { stroke: #3a5060; stroke-width: 1 }
.plot .tick-label { fill: #5a7090; font-size: 10px; font-family: var(--mono) }
.plot .point { fill: #5a8eb8 }
.plot .point.rec { fill: var(--ok); stroke: var(--ok-soft); stroke-width: 1.5 }
.plot .errbar { stroke: #3a6080; stroke-width: 1.2 }
.plot .errbar.rec { stroke: #5acc70 }
.plot .row-label { fill: #90a8c0; font-size: 11px; font-family: var(--sans) }
.plot .row-label.rec { fill: var(--ok-soft); font-weight: 600 }
.plot .axis-title { fill: #7a92ac; font-size: 11px; font-family: var(--mono) }

.mt { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px }
.mt th { padding: 7px 10px; background: var(--bg-card-alt); color: var(--fg-dim); font-size: 10px; text-transform: uppercase; text-align: left; font-weight: 700; letter-spacing: .5px; border-bottom: 1px solid var(--bd-strong) }
.mt td { padding: 6px 10px; border-top: 1px solid var(--bd-soft); color: #a8c0d8; font-family: var(--mono); font-size: 12px; vertical-align: top }
.mt td.nm { font-family: var(--sans); color: #a8c0d8 }
.mt tr.rec td { background: #0e1f1a }
.mt tr.rec td:first-child { border-left: 2px solid var(--ok) }
.rec-badge { color: var(--ok-soft); font-weight: 700; font-size: 11px; letter-spacing: .4px }
.method-pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase }
.method-ttv { background: #1a2f44; color: #7aaae0 }
.method-evolutionary_model { background: #2a2a18; color: #d8c870 }
.method-sed_fitting { background: #1f2438; color: #b0a8e8 }
.method-spectroscopic_calibration { background: #2a1f1f; color: #d0a098 }
.method-discovery { background: #1a3022; color: #80c898 }
.method-default { background: #1e2438; color: #90a8c0 }

.planets-grid { display: grid; grid-template-columns: 1fr; gap: 14px }
@media (min-width: 900px) { .planets-grid { grid-template-columns: 1fr 1fr } }
.planet-card h3 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap }
.planet-card h3 .deriv { font-size: 11px; color: #5a7890; font-family: var(--mono); font-weight: 400; letter-spacing: .2px }
.summary { font-size: 12px; color: #7a92ac; margin: 4px 0 10px; font-family: var(--mono) }

@media (max-width: 600px) {
  .intro { font-size: 12px }
  .summary { font-size: 11px }
  .plot .row-label { font-size: 10.5px }
  .plot .tick-label { font-size: 10px }
  .plot .axis-title { font-size: 10px }
  .mt thead { display: none }
  .mt, .mt tbody, .mt tr, .mt td { display: block; width: 100% }
  .mt tr { border: 1px solid #1a2333; border-radius: 6px; padding: 9px 11px; margin-bottom: 8px; background: #0a1018 }
  .mt tr.rec { border-left: 2px solid var(--ok); background: #0e1f1a; padding-left: 9px }
  .mt td { display: flex; justify-content: space-between; align-items: baseline; border: none; padding: 3px 0; gap: 10px; font-size: 12px }
  .mt td::before {
    content: attr(data-label);
    color: #5a7090; font-size: 10px; text-transform: uppercase; letter-spacing: .4px;
    font-family: var(--sans); font-weight: 600; flex-shrink: 0
  }
  .mt td:empty, .mt td[data-label="status"]:empty { display: none }
  .mt td.nm { justify-content: flex-start; flex-direction: column; align-items: flex-start; gap: 2px }
  .mt td.nm::before { margin-bottom: 1px }
}
</style>
</head>
<body>
<header>
  <h1>Procyon A <span>· Phase 2 measurements</span></h1>
  <div class="crumb"><a href="../index.html">← back to database</a> · <a href="../reports.html">reports</a></div>
</header>

<main id="root">
  <div style="color:#3a5068;padding:60px;text-align:center">Loading…</div>
</main>

<footer>
  Paper-by-paper measurement compilation from NASA Exoplanet Archive + curated overrides.
  Autogenerated from <code>db/stellar_props_curated.json</code> and <code>db/systems/procyon_a.json</code>.
</footer>

<script>
const SYSTEM_NAME = "Procyon A";
const JSON_FILENAME = "procyon_a";

// ─────────────────────────────────────────────────────────────────────────────
// Measurement category specs — each one declares the value/uncertainty keys
// and units that drive the plot/table for that category.
// ─────────────────────────────────────────────────────────────────────────────
const STELLAR_CATEGORIES = [
  { key: 'mass_measurements',         label: 'Mass',           value: 'value_msun',  err: 'uncertainty_msun',  xlabel: 'M☉ (solar masses)' },
  { key: 'radius_measurements',       label: 'Radius',         value: 'value_rsun',  err: 'uncertainty_rsun',  xlabel: 'R☉ (solar radii)' },
  { key: 'teff_measurements',         label: 'Teff',           value: 'value_k',     err: 'uncertainty_k',     xlabel: 'Teff (K)' },
  { key: 'luminosity_measurements',   label: 'Luminosity',     value: 'value_lsun',  err: 'uncertainty_lsun',  xlabel: 'L☉ (solar luminosities)' },
  { key: 'age_measurements',          label: 'Age',            value: 'value_gyr',   err: 'uncertainty_gyr',   xlabel: 'Gyr' },
  { key: 'metallicity_measurements',  label: '[Fe/H]',         value: 'value_dex',   err: 'uncertainty_dex',   xlabel: '[Fe/H] (dex)' },
  { key: 'rotation_measurements',     label: 'Rotation P_rot', value: 'value_days',  err: 'uncertainty_days',  xlabel: 'P_rot (days)' },
  { key: 'activity_measurements',     label: 'Activity',       value: 'value_log_rhk', err: null,             xlabel: "log R'_HK" },
];

// ─────────────────────────────────────────────────────────────────────────────
function errorbarPlot(rows, opts) {
  if (!rows.length) return '';
  const w = 720, rowH = 28, pad = {l:200, r:48, t:28, b:42};
  const h = pad.t + rows.length * rowH + pad.b;

  const vals = rows.flatMap(r => [
    (r.value ?? 0) - (r.err ?? 0),
    (r.value ?? 0) + (r.err ?? 0)
  ]);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  const span = hi - lo || Math.max(Math.abs(lo), 1);
  lo -= span * 0.08; hi += span * 0.08;
  const x = v => pad.l + (w - pad.l - pad.r) * (v - lo) / (hi - lo);

  function ticks(lo, hi, count) {
    const raw = (hi - lo) / count;
    const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(raw) || 1)));
    const norm = raw / mag;
    const step = (norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10) * mag;
    const start = Math.ceil(lo / step) * step;
    const out = [];
    for (let v = start; v <= hi; v += step) out.push(+v.toFixed(10));
    return out;
  }
  const tks = ticks(lo, hi, 5);

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  for (const t of tks) {
    svg += `<line class="gridline" x1="${x(t)}" y1="${pad.t-4}" x2="${x(t)}" y2="${h-pad.b+4}"/>`;
    svg += `<text class="tick-label" x="${x(t)}" y="${h-pad.b+16}" text-anchor="middle">${(+t.toPrecision(4))}</text>`;
  }
  svg += `<line class="axis" x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}"/>`;
  svg += `<text class="axis-title" x="${(pad.l + w - pad.r)/2}" y="${h-8}" text-anchor="middle">${opts.xlabel || ''}</text>`;

  rows.forEach((r, i) => {
    const y = pad.t + i * rowH + rowH/2;
    const cls = r.rec ? ' rec' : '';
    const label = r.doi
      ? `<a href="https://doi.org/${r.doi}" target="_blank"><text class="row-label${cls}" x="${pad.l-12}" y="${y+4}" text-anchor="end">${r.label}</text></a>`
      : `<text class="row-label${cls}" x="${pad.l-12}" y="${y+4}" text-anchor="end">${r.label}</text>`;
    svg += label;
    if (r.err != null && r.value != null) {
      const x0 = x(r.value - r.err), x1 = x(r.value + r.err);
      svg += `<line class="errbar${cls}" x1="${x0}" y1="${y}" x2="${x1}" y2="${y}"/>`;
      svg += `<line class="errbar${cls}" x1="${x0}" y1="${y-4}" x2="${x0}" y2="${y+4}"/>`;
      svg += `<line class="errbar${cls}" x1="${x1}" y1="${y-4}" x2="${x1}" y2="${y+4}"/>`;
    }
    if (r.value != null) {
      svg += `<circle class="point${cls}" cx="${x(r.value)}" cy="${y}" r="${r.rec ? 5 : 4}"/>`;
    }
  });
  svg += '</svg>';
  return `<div class="plot">${svg}</div>`;
}

function methodPill(method) {
  const cls = 'method-' + (['ttv','evolutionary_model','sed_fitting','spectroscopic_calibration','discovery'].includes(method) ? method : 'default');
  return `<span class="method-pill ${cls}">${method || '—'}</span>`;
}

function fnum(v, d) {
  if (v == null || isNaN(v)) return '—';
  return (+v).toFixed(d);
}

function refLink(m) {
  const text = m.reference || m.source || m.bibcode || 'paper';
  if (m.doi) return `<a href="https://doi.org/${m.doi}" target="_blank">${text}</a>`;
  if (m.bibcode) return `<a href="https://ui.adsabs.harvard.edu/abs/${encodeURIComponent(m.bibcode)}" target="_blank">${text}</a>`;
  return text;
}

function renderCategory(measurements, spec) {
  if (!measurements?.length) return '';
  const rows = measurements.map(m => ({
    label: m.reference || m.source || m.bibcode || '—',
    value: m[spec.value],
    err:   spec.err ? m[spec.err] : null,
    rec:   m.recommended,
    doi:   m.doi,
  }));
  let h = `<div class="card">
    <h3>${spec.label} measurements <span class="dim">· ${measurements.length} papers</span></h3>`;
  h += errorbarPlot(rows, {xlabel: spec.xlabel});
  h += `<table class="mt"><thead><tr>
    <th>Paper</th><th>Method</th><th>${spec.label}</th><th>±</th><th>frac. err</th><th></th>
    </tr></thead><tbody>`;
  measurements.forEach(m => {
    const v   = m[spec.value];
    const err = spec.err ? m[spec.err] : null;
    const frac = (v != null && err != null && v !== 0) ? (err / Math.abs(v) * 100).toFixed(1) + '%' : '—';
    h += `<tr${m.recommended ? ' class="rec"' : ''}>
      <td class="nm" data-label="Paper">${refLink(m)}</td>
      <td data-label="Method">${methodPill(m.method)}</td>
      <td data-label="${spec.label}">${fnum(v, 4)}</td>
      <td data-label="±">${fnum(err, 4)}</td>
      <td data-label="frac. err">${frac}</td>
      <td data-label="status">${m.recommended ? '<span class="rec-badge">REC ✓</span>' : ''}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function renderStellar(star) {
  const raw = star.raw || {};
  const cats = STELLAR_CATEGORIES.filter(c => (raw[c.key] || []).length);

  const dist_pc = star.derived?.distance_pc ?? 0;
  const spec    = raw.spectype ?? '—';

  let h = `<section>
    <h2>Host star — ${star.name}${star.component ? ' ' + star.component : ''}</h2>
    <div class="card">
      <p class="intro">${spec} at <b>${dist_pc.toFixed(2)} pc</b>
      (${(dist_pc * 3.262).toFixed(2)} ly). ${cats.length} measurement categories curated
      in array form. The <span class="rec-badge">RECOMMENDED ✓</span> entry per category
      feeds <code>build_systems.py</code>.</p>
    </div>`;
  for (const c of cats) h += renderCategory(raw[c.key], c);
  h += `</section>`;
  return h;
}

function renderPlanets(planets) {
  if (!planets?.length) return '';
  let h = `<section><h2>Planets — Phase 2 array form</h2>
    <div class="card">
      <p class="intro">Each planet's <code>physical</code>, <code>orbital</code>,
      <code>environment</code>, and <code>atmosphere</code> blocks can be a single dict
      (Phase 1 batch) or an array of paper-attributed measurements (Phase 2 curated).
      Recommended values feed the derived block in <code>db/systems/${JSON_FILENAME}.json</code>.</p>
    </div>
    <div class="planets-grid">`;

  planets.forEach(pl => {
    const cur = pl.curated || {};
    const phy = Array.isArray(cur.physical) ? cur.physical : (cur.physical ? [cur.physical] : []);
    const der = pl.derived || {};

    const m_rec = phy.find(p => p.recommended) || phy[0];
    h += `<div class="card planet-card">
      <h3>${pl.name}
        <span class="deriv">derived: m=${fnum(der.mass_mearth, 3)} M⊕, r=${fnum(der.radius_rearth, 3)} R⊕</span>
      </h3>`;
    if (phy.length) {
      h += `<table class="mt"><thead><tr>
        <th>Paper</th><th>Method</th><th>M (M⊕)</th><th>R (R⊕)</th><th></th>
        </tr></thead><tbody>`;
      phy.forEach(m => {
        h += `<tr${m.recommended ? ' class="rec"' : ''}>
          <td class="nm" data-label="Paper">${refLink(m)}</td>
          <td data-label="Method">${methodPill(m.method)}</td>
          <td data-label="M (M⊕)">${fnum(m.mass_mearth, 3)}</td>
          <td data-label="R (R⊕)">${fnum(m.radius_rearth, 3)}</td>
          <td data-label="status">${m.recommended ? '<span class="rec-badge">REC ✓</span>' : ''}</td>
        </tr>`;
      });
      h += `</tbody></table>`;
    } else {
      h += `<p class="summary">No <code>physical</code> measurements in curated block.</p>`;
    }
    h += `</div>`;
  });
  h += `</div></section>`;
  return h;
}

function renderSources(sources) {
  if (!sources?.length) return '';
  let h = `<section><h2>Sources — system-level provenance</h2>
    <div class="card"><table class="mt">
    <thead><tr><th>Reference</th><th>Bibcode</th><th>Used for</th></tr></thead>
    <tbody>`;
  sources.forEach(s => {
    const url = s.doi ? `https://doi.org/${s.doi}` : (s.bibcode ? `https://ui.adsabs.harvard.edu/abs/${encodeURIComponent(s.bibcode)}` : null);
    const title = url ? `<a href="${url}" target="_blank">${s.title}</a>` : s.title;
    h += `<tr>
      <td class="nm" data-label="Reference">${title}</td>
      <td data-label="Bibcode"><code>${s.bibcode || '—'}</code></td>
      <td data-label="Used for">${(s.used_for || []).join(', ')}</td>
    </tr>`;
  });
  h += `</tbody></table></div></section>`;
  return h;
}

fetch('../data.json')
  .then(r => r.json())
  .then(db => {
    const sys = db.find(s => s.system_name === SYSTEM_NAME);
    if (!sys) {
      document.getElementById('root').innerHTML =
        `<div style="color:#c07040;padding:60px;text-align:center">${SYSTEM_NAME} not found in data.json</div>`;
      return;
    }
    const root = document.getElementById('root');
    let h = '';
    h += renderStellar(sys.stars[0]);
    h += renderPlanets(sys.planets);
    h += renderSources(sys.sources || []);
    root.innerHTML = h;
  })
  .catch(err => {
    document.getElementById('root').innerHTML =
      `<div style="color:#c07040;padding:60px;text-align:center">Failed to load ../data.json: ${err}</div>`;
  });
</script>
</body>
</html>
