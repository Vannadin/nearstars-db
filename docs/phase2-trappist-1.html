<!DOCTYPE html>
<!-- TRAPPIST-1 Phase 2 measurement comparison viewer (paper-by-paper) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAPPIST-1 · Phase 2 measurements</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#c0cce0;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;line-height:1.5}
a{color:#4a88b8;text-decoration:none}
a:hover{text-decoration:underline}

header{padding:18px 28px;border-bottom:1px solid #1a2030;background:#0a0f1a;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
h1{font-size:18px;font-weight:700;color:#d8e4f0;letter-spacing:.3px}
h1 span{color:#4a88b8;font-weight:400}
.crumb{font-size:12px;color:#3a5870}
.crumb a{color:#4a6888}

main{max-width:1180px;margin:0 auto;padding:24px 24px 64px}
section{margin-bottom:32px}
h2{font-size:13px;font-weight:700;color:#5a88b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a2535}
h3{font-size:13px;font-weight:600;color:#a0bcd8;margin:14px 0 6px;letter-spacing:.2px}

.intro{color:#7a92ac;font-size:13px;max-width:780px;margin-bottom:8px}
.intro b{color:#a0bcd8}

.card{background:#0c121e;border:1px solid #182030;border-radius:8px;padding:14px 18px;margin-bottom:14px}

/* measurement plot */
.plot{position:relative;margin:8px 0}
.plot svg{display:block;width:100%;height:auto}
.plot .gridline{stroke:#152030;stroke-width:1}
.plot .axis{stroke:#3a5060;stroke-width:1}
.plot .tick-label{fill:#5a7090;font-size:10px;font-family:monospace}
.plot .point{fill:#5a8eb8}
.plot .point.rec{fill:#4aaa60;stroke:#7ad88e;stroke-width:1.5}
.plot .errbar{stroke:#3a6080;stroke-width:1.2}
.plot .errbar.rec{stroke:#5acc70}
.plot .row-label{fill:#90a8c0;font-size:11px;font-family:'Segoe UI',sans-serif}
.plot .row-label.rec{fill:#7ad88e;font-weight:600}
.plot .axis-title{fill:#7a92ac;font-size:11px;font-family:monospace}

/* tables */
.mt{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.mt th{padding:7px 10px;background:#0d1520;color:#5a7898;font-size:10px;text-transform:uppercase;text-align:left;font-weight:700;letter-spacing:.5px;border-bottom:1px solid #1a2535}
.mt td{padding:6px 10px;border-top:1px solid #131c28;color:#a8c0d8;font-family:monospace;font-size:12px;vertical-align:top}
.mt td.nm{font-family:'Segoe UI',sans-serif;color:#a8c0d8}
.mt tr.rec td{background:#0e1f1a}
.mt tr.rec td:first-child{border-left:2px solid #4aaa60}
.rec-badge{color:#7ad88e;font-weight:700;font-size:11px;letter-spacing:.4px}
.method-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.method-ttv{background:#1a2f44;color:#7aaae0}
.method-evolutionary_model{background:#2a2a18;color:#d8c870}
.method-sed_fitting{background:#1f2438;color:#b0a8e8}
.method-spectroscopic_calibration{background:#2a1f1f;color:#d0a098}
.method-discovery{background:#1a3022;color:#80c898}
.method-default{background:#1e2438;color:#90a8c0}

.dim{color:#3a5068}

/* planet card grid */
.planets-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:900px){.planets-grid{grid-template-columns:1fr 1fr}}
.planet-card h3{display:flex;align-items:center;gap:10px}
.planet-card h3 .deriv{font-size:11px;color:#5a7890;font-family:monospace;font-weight:400;letter-spacing:.2px}
.summary{font-size:12px;color:#7a92ac;margin:4px 0 10px;font-family:monospace}

footer{padding:20px 24px;border-top:1px solid #1a2030;color:#3a5068;font-size:11px;text-align:center}

/* mobile (≤600px) */
@media(max-width:600px){
  header{padding:12px 16px;gap:8px}
  h1{font-size:15px}
  main{padding:16px 12px 48px}
  .card{padding:10px 12px;margin-bottom:10px}
  h2{font-size:11px}
  h3{font-size:12px}
  .intro{font-size:12px}
  .mt th{padding:5px 7px;font-size:10px}
  .mt td{padding:5px 7px;font-size:11px}
  /* row label SVG 가독성 보존 — 폰트는 viewBox로 스케일되므로 자동 */
  .plot .row-label{font-size:10.5px}
  .summary{font-size:11px}
}
</style>
</head>

<body>
<header>
  <h1>TRAPPIST-1 <span>· Phase 2 measurements</span></h1>
  <div class="crumb"><a href="./index.html">← back to database</a></div>
</header>

<main id="root">
  <div style="color:#3a5068;padding:60px;text-align:center">Loading…</div>
</main>

<footer>
  Paper-by-paper mass/radius compilation from NASA Exoplanet Archive <code>ps</code> table.
  Curated 2026-05-20 · <a href="https://github.com/anthropics/claude-code">NearStars DB</a>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Plot helper: horizontal error-bar plot for an array of {label, value, err, rec, bibcode, doi}
// ─────────────────────────────────────────────────────────────────────────────
function errorbarPlot(rows, opts) {
  if (!rows.length) return '';
  const w = 720, rowH = 28, pad = {l:200, r:48, t:28, b:42};
  const h = pad.t + rows.length * rowH + pad.b;

  // domain padding
  const vals = rows.flatMap(r => [
    (r.value ?? 0) - (r.err ?? 0),
    (r.value ?? 0) + (r.err ?? 0)
  ]);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  const span = hi - lo || 1;
  lo -= span * 0.08; hi += span * 0.08;
  const x = v => pad.l + (w - pad.l - pad.r) * (v - lo) / (hi - lo);

  // nice ticks
  function ticks(lo, hi, count) {
    const raw = (hi - lo) / count;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    const step = (norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10) * mag;
    const start = Math.ceil(lo / step) * step;
    const out = [];
    for (let v = start; v <= hi; v += step) out.push(+v.toFixed(10));
    return out;
  }
  const tks = ticks(lo, hi, 5);

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  for (const t of tks) {
    svg += `<line class="gridline" x1="${x(t)}" y1="${pad.t-4}" x2="${x(t)}" y2="${h-pad.b+4}"/>`;
    svg += `<text class="tick-label" x="${x(t)}" y="${h-pad.b+16}" text-anchor="middle">${(+t.toPrecision(4))}</text>`;
  }
  // x axis
  svg += `<line class="axis" x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}"/>`;
  // x axis title
  svg += `<text class="axis-title" x="${(pad.l + w - pad.r)/2}" y="${h-8}" text-anchor="middle">${opts.xlabel || ''}</text>`;

  // rows
  rows.forEach((r, i) => {
    const y = pad.t + i * rowH + rowH/2;
    const cls = r.rec ? ' rec' : '';
    // label (clickable to DOI when present)
    const label = r.doi
      ? `<a href="https://doi.org/${r.doi}" target="_blank">
           <text class="row-label${cls}" x="${pad.l-12}" y="${y+4}" text-anchor="end">${r.label}</text>
         </a>`
      : `<text class="row-label${cls}" x="${pad.l-12}" y="${y+4}" text-anchor="end">${r.label}</text>`;
    svg += label;
    // error bar
    if (r.err != null && r.value != null) {
      const x0 = x(r.value - r.err), x1 = x(r.value + r.err);
      svg += `<line class="errbar${cls}" x1="${x0}" y1="${y}" x2="${x1}" y2="${y}"/>`;
      svg += `<line class="errbar${cls}" x1="${x0}" y1="${y-4}" x2="${x0}" y2="${y+4}"/>`;
      svg += `<line class="errbar${cls}" x1="${x1}" y1="${y-4}" x2="${x1}" y2="${y+4}"/>`;
    }
    // point
    if (r.value != null) {
      svg += `<circle class="point${cls}" cx="${x(r.value)}" cy="${y}" r="${r.rec ? 5 : 4}"/>`;
    }
  });
  svg += '</svg>';
  return `<div class="plot">${svg}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
function methodPill(method) {
  const cls = 'method-' + (['ttv','evolutionary_model','sed_fitting','spectroscopic_calibration','discovery'].includes(method) ? method : 'default');
  return `<span class="method-pill ${cls}">${method}</span>`;
}

function fnum(v, d) {
  if (v == null || isNaN(v)) return '—';
  return (+v).toFixed(d);
}

function refLink(m) {
  const text = m.reference || m.source || m.bibcode || 'paper';
  if (m.doi) return `<a href="https://doi.org/${m.doi}" target="_blank">${text}</a>`;
  if (m.bibcode) return `<a href="https://ui.adsabs.harvard.edu/abs/${encodeURIComponent(m.bibcode)}" target="_blank">${text}</a>`;
  return text;
}

// ─────────────────────────────────────────────────────────────────────────────
function renderStellar(star) {
  const raw = star.raw || {};
  const mass = raw.mass_measurements || [];
  const rad = raw.radius_measurements || [];

  let h = `<section>
    <h2>Host star — TRAPPIST-1</h2>
    <div class="card">
      <p class="intro">M7.5 V ultra-cool dwarf at <b>${(star.derived?.distance_pc ?? 0).toFixed(2)} pc</b>
      (${((star.derived?.distance_pc ?? 0) * 3.262).toFixed(2)} ly). Six independent stellar-mass
      measurements and five radius measurements are now curated in array form. The
      <span class="rec-badge">RECOMMENDED ✓</span> entry feeds <code>build_systems.py</code>.</p>
    </div>`;

  // Mass plot + table
  h += `<div class="card">
    <h3>Mass measurements <span class="dim">· ${mass.length} papers</span></h3>`;
  const massRows = mass.map(m => ({
    label: m.reference,
    value: m.value_msun,
    err: m.uncertainty_msun,
    rec: m.recommended,
    doi: m.doi,
  }));
  h += errorbarPlot(massRows, {xlabel: 'M☉ (solar masses)'});
  h += `<table class="mt">
    <thead><tr><th>Paper</th><th>Method</th><th>M (M☉)</th><th>± (M☉)</th><th>frac. err</th><th></th></tr></thead>
    <tbody>`;
  mass.forEach(m => {
    const frac = m.value_msun ? (m.uncertainty_msun / m.value_msun * 100).toFixed(1) + '%' : '—';
    h += `<tr${m.recommended ? ' class="rec"' : ''}>
      <td class="nm">${refLink(m)}</td>
      <td>${methodPill(m.method)}</td>
      <td>${fnum(m.value_msun, 4)}</td>
      <td>${fnum(m.uncertainty_msun, 4)}</td>
      <td>${frac}</td>
      <td>${m.recommended ? '<span class="rec-badge">REC ✓</span>' : ''}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  // Radius plot + table
  h += `<div class="card">
    <h3>Radius measurements <span class="dim">· ${rad.length} papers</span></h3>`;
  const radRows = rad.map(m => ({
    label: m.reference,
    value: m.value_rsun,
    err: m.uncertainty_rsun,
    rec: m.recommended,
    doi: m.doi,
  }));
  h += errorbarPlot(radRows, {xlabel: 'R☉ (solar radii)'});
  h += `<table class="mt">
    <thead><tr><th>Paper</th><th>Method</th><th>R (R☉)</th><th>± (R☉)</th><th>frac. err</th><th></th></tr></thead>
    <tbody>`;
  rad.forEach(m => {
    const frac = m.value_rsun ? (m.uncertainty_rsun / m.value_rsun * 100).toFixed(1) + '%' : '—';
    h += `<tr${m.recommended ? ' class="rec"' : ''}>
      <td class="nm">${refLink(m)}</td>
      <td>${methodPill(m.method)}</td>
      <td>${fnum(m.value_rsun, 4)}</td>
      <td>${fnum(m.uncertainty_rsun, 4)}</td>
      <td>${frac}</td>
      <td>${m.recommended ? '<span class="rec-badge">REC ✓</span>' : ''}</td>
    </tr>`;
  });
  h += `</tbody></table></div></section>`;
  return h;
}

function renderPlanets(planets) {
  let h = `<section><h2>Planets — Phase 2 array form</h2>
    <div class="card">
      <p class="intro">Each planet's <code>physical</code> block is now an array of paper-attributed
      measurements. Recommended values feed the derived block in
      <code>db/systems/trappist_1.json</code>. <b>Orbital</b> blocks remain
      single-dict (Phase 1) since inter-paper variation is &lt; 5%.</p>
    </div>
    <div class="planets-grid">`;

  planets.forEach(pl => {
    const cur = pl.curated || {};
    const phy = Array.isArray(cur.physical) ? cur.physical : [];
    const der = pl.derived || {};
    const massE = der.mass_kg != null ? (der.mass_kg / 5.972e24) : null;
    const radE = der.radius_m != null ? (der.radius_m / 6.371e6) : null;

    h += `<div class="card planet-card">
      <h3>${pl.name}
        <span class="deriv">→ derived M=${fnum(massE, 3)} M⊕ · R=${fnum(radE, 3)} R⊕</span>
      </h3>
      <div class="summary">${phy.length} paper measurement${phy.length===1?'':'s'} · recommended:
        ${(phy.find(p => p.recommended) || {}).source || '—'}</div>`;

    // Mass plot
    const massRows = phy.filter(p => p.true_mass_mearth != null).map(p => ({
      label: p.source.replace(/ et al\./, '+'),
      value: p.true_mass_mearth,
      err: p.uncertainty_mearth,
      rec: p.recommended,
      doi: p.doi,
    }));
    if (massRows.length) {
      h += errorbarPlot(massRows, {xlabel: 'mass (M⊕)'});
    }
    // Radius plot
    const radRows = phy.filter(p => p.radius_rearth != null).map(p => ({
      label: p.source.replace(/ et al\./, '+'),
      value: p.radius_rearth,
      err: p.uncertainty_rearth,
      rec: p.recommended,
      doi: p.doi,
    }));
    if (radRows.length) {
      h += errorbarPlot(radRows, {xlabel: 'radius (R⊕)'});
    }

    // detail table
    h += `<table class="mt">
      <thead><tr><th>Paper</th><th>M (M⊕)</th><th>R (R⊕)</th><th>Method</th><th></th></tr></thead>
      <tbody>`;
    phy.forEach(p => {
      const mstr = p.true_mass_mearth != null
        ? `${fnum(p.true_mass_mearth, 3)}<span class="dim"> ±${fnum(p.uncertainty_mearth, 3)}</span>` : '—';
      const rstr = p.radius_rearth != null
        ? `${fnum(p.radius_rearth, 3)}<span class="dim"> ±${fnum(p.uncertainty_rearth, 3)}</span>` : '—';
      h += `<tr${p.recommended ? ' class="rec"' : ''}>
        <td class="nm">${refLink(p)}</td>
        <td>${mstr}</td>
        <td>${rstr}</td>
        <td>${methodPill(p.method)}</td>
        <td>${p.recommended ? '<span class="rec-badge">REC ✓</span>' : ''}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });

  h += `</div></section>`;
  return h;
}

function renderSources(sources) {
  let h = `<section><h2>Sources — system-level provenance</h2>
    <div class="card"><table class="mt">
    <thead><tr><th>Reference</th><th>Bibcode</th><th>Used for</th></tr></thead>
    <tbody>`;
  sources.forEach(s => {
    const url = s.doi ? `https://doi.org/${s.doi}` : (s.bibcode ? `https://ui.adsabs.harvard.edu/abs/${encodeURIComponent(s.bibcode)}` : null);
    const title = url ? `<a href="${url}" target="_blank">${s.title}</a>` : s.title;
    h += `<tr>
      <td class="nm">${title}</td>
      <td><code>${s.bibcode || '—'}</code></td>
      <td>${(s.used_for || []).join(', ')}</td>
    </tr>`;
  });
  h += `</tbody></table></div></section>`;
  return h;
}

// ─────────────────────────────────────────────────────────────────────────────
fetch('./data.json')
  .then(r => r.json())
  .then(db => {
    const sys = db.find(s => s.system_name === 'TRAPPIST-1');
    if (!sys) {
      document.getElementById('root').innerHTML =
        '<div style="color:#c07040;padding:60px;text-align:center">TRAPPIST-1 not found in data.json</div>';
      return;
    }
    const root = document.getElementById('root');
    let h = '';
    h += renderStellar(sys.stars[0]);
    h += renderPlanets(sys.planets);
    h += renderSources(sys.sources || []);
    root.innerHTML = h;
  })
  .catch(err => {
    document.getElementById('root').innerHTML =
      `<div style="color:#c07040;padding:60px;text-align:center">Failed to load data.json: ${err}</div>`;
  });
</script>
</body>
</html>
