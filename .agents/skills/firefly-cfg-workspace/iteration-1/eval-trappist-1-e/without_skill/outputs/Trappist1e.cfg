// NearStars TRAPPIST-1 e Firefly re-entry plasma cfg — 1 bar N2/O2/CO2 atmosphere
ATMOFX_BODY
{
	name = Trappist1e
	config_version = 5

	// 1 bar surface pressure, ~9.5 km scale height (slightly larger than Earth due to 0.818 g);
	// N2/O2-dominated chemistry behaves much like Earth re-entry, so strength stays at 1.0.
	strength_multiplier = 1

	length_multiplier = 1
	opacity_multiplier = 1
	wrap_fresnel_modifier = 0

	// Same particle onset velocity as Earth/Kerbin — N2-rich diatomic atmosphere ionizes at
	// the same Mach regime.
	particle_threshold = 1800

	streak_probability = 0
	streak_threshold = 0

	// Plasma chemistry: dominant N2/O2 emission (N2+ First Negative blue-violet ~391 nm,
	// N2 Second Positive UV, [OI] green/red), with a warmer-orange shift relative to Earth
	// from the elevated CO2 (~1%, vs Earth's 0.04%) producing extra CO2+ Fox-Duffendack-Barker
	// red/orange (580-700 nm) and reduced O2 (~5% abiotic vs 21%) muting the cooler green
	// component. Net effect: Earth-like blue-white shock with a slightly warmer trail.
	Color
	{
		glow = 191 85 55 1.4
		glow_hot = 191 95 70 2.5

		trail_primary = 191 105 75 3
		trail_secondary = 191 75 45 1.5
		trail_tertiary = 74 80 191 2
		trail_streak = 74 80 191 2

		wrap_layer = 69 75 191 2
		wrap_streak = 191 105 75 3

		shockwave = 74 90 191 3
	}
}
