// Firefly atmospheric re-entry effects for ProximaCenB (NearStars planet pack)
// Source: docs/phase3/proxima-cen-b.md
//   atmosphere_present: true; surface_pressure ~1 bar; composition 95% N2, 5% CO2,
//   trace H2O + O2; scale_height ~11 km; tidally locked eyeball-Earth geometry.
// Plasma chemistry: predominantly N2 (Earth-like) with a small CO2 contribution
// that warms the trail palette compared to pure Earth. Streaks disabled
// (dense ~1 bar atmosphere, no rarefied-flow regime at re-entry altitudes).
ATMOFX_BODY:NEEDS[NearStars]
{
	name = ProximaCenB
	config_version = 5

	strength_multiplier = 1

	length_multiplier = 1
	opacity_multiplier = 1
	glow_multiplier = 1
	wrap_opacity_multiplier = 1
	wrap_fresnel_modifier = 0

	particle_threshold = 1800

	streak_probability = 0
	streak_threshold = 0

	Color
	{
		glow = 191 80 50 1.4
		glow_hot = 191 95 60 2.5

		trail_primary = 191 105 68 3
		trail_secondary = 191 75 40 1.5
		trail_tertiary = 90 85 191 2
		trail_streak = 90 85 191 2

		wrap_layer = 80 75 191 2
		wrap_streak = 191 105 68 3

		shockwave = 80 95 191 3
	}
}
