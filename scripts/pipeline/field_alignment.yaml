# phase3 keys that no board menu currently reaches. These are NOT errors — a
# phase3 decision without a board counterpart simply emits unopposed (phase3 is
# the value spine). Listed so the gap is visible when a board axis is designed.
phase3_only_families:
  - insolation_s_earth*        # derived illumination, never an owner choice
  - equilibrium_temp_k*        # derived; the board picks surface_temperature instead
  - density_g_cc               # derived from mass+radius
  - star_apparent_angular_diameter_deg*
  - stellar_illumination_color_temp_k
  - atmosphere_tint_rgb_hex    # board writes haze/clouds instead
  - disk_*                     # circumstellar disks: phase3 → Kopernicus Ring directly
  - visual_companion_event_*   # open-naming binary events (Firefly/Kopernicus)
  - dayside_brightness_temp_k_*  # JWST observables, not cfg inputs
  - spi_*                      # star-planet interaction (flux-tube plugin backlog)
