# phase4 메뉴명 ↔ phase3 Decisions 키 ↔ cfg 타깃 정렬표 (emit 선결 조건, pipeline-contract.md §3)
# regenerable: no — hand-curated contract data; edit here, never in the resolver
#
# Why this file exists
# --------------------
# phase4 boards name a field the way the owner picks it from a menu (`mass`,
# `radius`, `rotation_period`) — no units, because the board is an art-direction
# record. phase3 Decisions name the same quantity with its unit baked in
# (`mass_msun` / `mass_mearth` / `mass_mjup`). The two vocabularies therefore
# never collide on their own, and the resolver's phase4-over-phase3 override
# layer was a no-op until this map existed (resolver dry-run 2026-07-20:
# 0 natural collisions across the roster).
#
# Entry shape
# -----------
#   - phase4:  board menu name (the key written in `fields[].name`)
#     phase3:  candidate Decisions keys, PRIORITY ORDER. The resolver picks the
#              first candidate present in that body's report — this is how the
#              unit variant gets chosen per body class without the board
#              carrying a unit.
#     unit:    what the bare phase4 value means, per class (documentation +
#              the trap to check before emit does arithmetic)
#     cfg:     downstream emitter target(s). `-` = not emitted directly
#              (informational / feeds another field's synthesis).
#     applies: star | planet | any   (which db kind the entry is valid for)
#
# Coverage is reported, never assumed: `check_pipeline_flow.py` gate 10f counts
# phase4 names with no entry here and phase3 keys no board can reach.

alignment:

  # ── identity ────────────────────────────────────────────────────────────
  - phase4: body_type
    phase3: [spectral_type, object_type, disposition]
    unit: prose
    cfg: {kopernicus: "template selection"}
    applies: any
  - phase4: designation
    phase3: []
    unit: prose
    cfg: {kopernicus: "Properties/displayName"}
    applies: any
  - phase4: cultural_name
    phase3: []
    unit: prose
    cfg: {kopernicus: "Properties/displayName (cultural variant)"}
    applies: any
  - phase4: discoverability
    phase3: [detection_status]
    unit: prose
    cfg: {researchbodies: "IGNORELEVELS + ONDISCOVERY"}
    applies: any

  # ── bulk ────────────────────────────────────────────────────────────────
  - phase4: mass
    phase3: [mass_msun, mass_mearth, mass_mjup, mass_msini_mearth, mass_msini_mjup, mass_estimate_mearth_true]
    unit: {star: M_sun, planet: M_earth}
    cfg: {kopernicus: "Properties/mass", principia: "gravitational_parameter_km3_s2"}
    applies: any
  - phase4: radius
    phase3: [radius_rsun, radius_rearth, radius_rjup, radius_km]
    unit: {star: R_sun, planet: R_earth}
    cfg: {kopernicus: "Properties/radius", principia: "mean_radius_km"}
    applies: any
  - phase4: gravity
    phase3: [surface_gravity_g_earth]
    unit: {star: "m/s^2", planet: "m/s^2 (board writes absolute, phase3 writes g_earth)"}
    cfg: {kopernicus: "Properties/geeASL"}
    applies: any
  - phase4: age
    phase3: [age_gyr, total_age_gyr, characteristic_age_myr]
    unit: Gyr
    cfg: {}
    applies: any
  - phase4: cooling_age
    phase3: [cooling_age_myr]
    unit: Myr
    cfg: {}
    applies: star
  - phase4: rotation_period
    phase3: [rotation_period_days, rotation_period_hours, rotation_period_h, sidereal_period_days, spin_period_s]
    unit: {star: days, planet: hours}
    cfg: {kopernicus: "Properties/rotationPeriod (seconds)"}
    applies: any
  - phase4: obliquity
    phase3: [obliquity_deg]
    unit: deg
    cfg: {kopernicus: "Orbit/inclination + axial tilt handling"}
    applies: planet
  - phase4: spin_axis_orientation
    phase3: [spin_axis_inclination_deg, rotational_inclination_deg]
    unit: deg
    cfg: {principia: "spin axis (right ascension / declination)"}
    applies: any
  - phase4: flattening
    phase3: [stellar_oblateness_ratio]
    unit: dimensionless (f)
    cfg: {kopernicus: "VertexHeightOblateAdvanced a:b:c"}
    applies: any
  - phase4: geopotential_j2
    phase3: [figure_j2]
    unit: dimensionless (unnormalized J2)
    cfg: {principia: "principia_gravity_model.j2"}
    applies: any
  - phase4: geopotential_c22
    phase3: []
    unit: dimensionless (normalized C22)
    cfg: {principia: "geopotential_row C22"}
    applies: planet
  - phase4: j4
    phase3: []
    unit: dimensionless
    cfg: {principia: "geopotential_row J4"}
    applies: any
  - phase4: reference_radius
    phase3: []
    unit: m
    cfg: {principia: "principia_gravity_model.reference_radius"}
    applies: any
  - phase4: intrinsic_luminosity
    phase3: [luminosity_lsun, intrinsic_luminosity_w_m2]
    unit: {star: L_sun, planet: "W/m^2"}
    cfg: {kopernicus: "Properties/luminosity (star)"}
    applies: any
  - phase4: internal_heat
    phase3: [tidal_heating_w_m2, radiogenic_heat_w_m2, induction_heating_w_m2]
