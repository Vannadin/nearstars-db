/* space-motion trails: linear heliocentric drift over the look-back time */
function rebuildMotion(){
  const spanYr=lookbackKyr*1000, bg=new THREE.Color('#0a0d15');
  clusters.forEach(cl=>{ const mo=cl.motion; if(!mo) return;
    const dly=mo.vly.clone().multiplyScalar(spanYr);                 // ICRS ly over span
    const end=new THREE.Vector3(-dly.x,-dly.z,-dly.y).multiplyScalar(U); // past endpoint (scene-AU)
    const N=24,pos=[],col=[],c=new THREE.Color(mo.rgb);
    for(let k=0;k<=N;k++){const f=k/N;                               // f:0 oldest → 1 now
      pos.push(end.x*(1-f),end.y*(1-f),end.z*(1-f));
      const cc=bg.clone().lerp(c,f); col.push(cc.r,cc.g,cc.b);}
    const g=mo.line.geometry;
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  });
}

function clusterVisible(c){
  if(c.is_sol) return true;
  const inRange = c.distance_ly!=null && c.distance_ly<=distLimit && (showFar||!c.beyond_50ly);
  if(c.is_field) return showField && inRange;            // uncurated field: gated by its own toggle
  // "모든 별" on → keep curated markers visible even with their phase chip off
  // (they're not in the field layer, so they'd otherwise vanish); the drop line
  // still follows the phase chip so deselecting a phase only sheds its stems.
  return inRange && (phaseOn[c.max_phase] || showField);
}
function applyFilter(){
  clusters.forEach(cl=>{
    const vis=clusterVisible(cl.data);
    cl.node.visible=vis;
    if(cl.stem) cl.stem.visible=vis&&showStems&&phaseOn[cl.data.max_phase];
    if(cl.motion) cl.motion.line.visible=vis&&showMotion;
    if(cl.labelEl && !cl.labelWanted) cl.labelEl.style.display='none';
  });
}
function ensureLabels(){
  clusters.forEach(cl=>{
    const need=showAllLabels||cl.data.is_sol||cl.data.is_confirmed_set;
    if(need&&!cl.labelEl) cl.labelEl=mkLabel(cl.data.label, cl.data.is_sol?'label sun':(cl.data.is_confirmed_set?'label confirmed':'label'));
    cl.labelWanted=need;                 // single source of truth; updateScene honors it
    if(cl.labelEl && !need) cl.labelEl.style.display='none';
  });
  applyFilter();
}

/* ── crosshair pool (real-size bodies when zoomed in) ─────────────────── */
const xpool=[]; let xused=0;
function getXhair(){
  if(xused<xpool.length) return xpool[xused++];
  const el=document.createElement('div'); el.className='xhair';
  el.innerHTML='<i></i><span class="lbl"></span>';
  document.getElementById('labels').appendChild(el); xpool.push(el); xused++; return el;
}

/* ── per-frame LOD + projection ───────────────────────────────────────── */
const wp=new THREE.Vector3(), proj=new THREE.Vector3();
function projectToScreen(v){ proj.copy(v).project(camera);
  return {x:(proj.x*.5+.5)*innerWidth, y:(-proj.y*.5+.5)*innerHeight, on:proj.z<1}; }

function updateScene(){
  // skip the floating-origin rebase mid-fly: it would shift the coordinate frame
  // out from under fly.{from,to,tFrom,tTo} (stored in the pre-shift frame), which
  // made a sim launched from the far map view land in empty space.
  if(!fly) rebaseToTarget();
  backdrop.position.copy(camera.position);
  xused=0;
  const camPos=camera.position;
  clusters.forEach(cl=>{
    if(!cl.node.visible) return;
    const dist=camPos.distanceTo(cl.node.position);
    const full=cl.sysScale*7, enter=cl.sysScale*45;
    const t=Math.max(0,Math.min(1,(dist-full)/(enter-full))); // 1 = far (map), 0 = inside system
    // glow: round sprite layers (core + halo + wide faint outer), constant
    // screen size, fading only with zoom (t). Brightness is uniform — no Sol-distance
    // dimming (the camera isn't anchored at Sol in a free 3D view).
    const ab=1;
    const gsz=(cl.data.is_sol?1.2:cl.data.rep_radius*1.5)*0.01575*dist;   // tuned: tight + dim
    cl.glow.material.opacity=t*ab*0.5;   cl.glow.scale.setScalar(gsz);
    cl.core.material.opacity=t*ab*0.5;   cl.core.scale.setScalar(gsz*0.34);
    cl.outer.material.opacity=t*ab*0.2;  cl.outer.scale.setScalar(gsz*1.7);
    const active=t<0.999; cl._active=active;
    // real bodies + orbits visible only when active
    cl.orbitsLines.forEach(l=>l.visible=active&&showOrbits);
    if(cl.axisLines) cl.axisLines.forEach(l=>l.visible=active&&showAxes);
    if(cl.helioObjs) cl.helioObjs.forEach(h=>h.visible=active&&showHelio);   // bubbles: system view
    if(cl.diskMeshes) cl.diskMeshes.forEach(m=>m.visible=active);
    cl.bodies.forEach(b=>{ if(b.kind==='star'){ b.obj.visible=true; if(b.glow) b.glow.material.opacity=(1-t)*0.9; } else b.obj.visible=active; });
    // crosshairs for active cluster bodies
    if(active){
      cl.bodies.forEach(b=>{
        b._shown=false;
        b.obj.getWorldPosition(wp);
        const s=projectToScreen(wp);
        if(!s.on||s.x<-40||s.x>innerWidth+40||s.y<-40||s.y>innerHeight+40) return;
        const el=getXhair();
        el.className='xhair'+(b.kind==='star'?' star':'')+(b===selBody?' sel':'');
        el.style.setProperty('--xc', b.rgb);
        el.style.left=s.x+'px'; el.style.top=s.y+'px'; el.style.display='';
        const lbl=el.firstElementChild.nextElementSibling; lbl.textContent=b.name;
        b._sx=s.x; b._sy=s.y; b._shown=true;
      });
    } else { cl.bodies.forEach(b=>b._shown=false); }
    // cluster name label (map scale) — only when wanted (fixes all-labels toggle-off)
    if(cl.labelEl){
      if(cl.labelWanted && !active){ const s=projectToScreen(cl.node.position);
        if(s.on){cl.labelEl.style.display='';cl.labelEl.style.left=s.x+'px';cl.labelEl.style.top=s.y+'px';}
        else cl.labelEl.style.display='none';
      } else cl.labelEl.style.display='none';
    }
  });
  for(let i=xused;i<xpool.length;i++) xpool[i].style.display='none';
  // ring labels
  ringLabels.forEach(r=>{ const w=r.local.clone().add(ringGroup.position); const s=projectToScreen(w);
    r.el.style.display=(r.r<=distLimit&&s.on)?'':'none'; if(s.on){r.el.style.left=s.x+'px';r.el.style.top=s.y+'px';} });
  // hovered star name — shown even when its persistent label is off
  if(hoverCl){
    const hcl=clusters.find(x=>x.data===hoverCl);
    if(hcl && hcl.node.visible && !hcl.labelWanted){
      const s=projectToScreen(hcl.node.position);
      if(s.on){ hoverLabel.textContent=(lang==='ko'&&hoverCl.label_ko)?hoverCl.label_ko:hoverCl.label;
        hoverLabel.style.left=s.x+'px'; hoverLabel.style.top=s.y+'px'; hoverLabel.style.display=''; }
      else hoverLabel.style.display='none';
    } else hoverLabel.style.display='none';
  } else hoverLabel.style.display='none';
  updateStability();   // morph the simulated orbit (overrides normal orbit visibility)
}

/* ── keyboard fly (WASD + arrows) ─────────────────────────────────────── */
const keys={};
const MOVE=new Set(['KeyW','KeyA','KeyS','KeyD','KeyR','KeyF','Space','ShiftLeft',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);
addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT') return; if(MOVE.has(e.code)){keys[e.code]=true; e.preventDefault();} });
addEventListener('keyup',e=>{ keys[e.code]=false; });
const _f=new THREE.Vector3(),_r=new THREE.Vector3(),_mv=new THREE.Vector3();
function applyKeys(){
  _mv.set(0,0,0);
  camera.getWorldDirection(_f);
  _r.crossVectors(_f,camera.up).normalize();
  if(keys.KeyW||keys.ArrowUp) _mv.add(_f);
  if(keys.KeyS||keys.ArrowDown) _mv.addScaledVector(_f,-1);
  if(keys.KeyD||keys.ArrowRight) _mv.add(_r);
  if(keys.KeyA||keys.ArrowLeft) _mv.addScaledVector(_r,-1);
  if(keys.KeyR||keys.Space) _mv.add(camera.up);
  if(keys.KeyF||keys.ShiftLeft) _mv.addScaledVector(camera.up,-1);
  if(_mv.lengthSq()===0) return;
  _mv.normalize().multiplyScalar(controls.getDistance()*0.005); // speed scales with zoom
  camera.position.add(_mv); controls.target.add(_mv);
  fly=null; // a keypress cancels an in-progress fly
}

/* ── render loop ──────────────────────────────────────────────────────── */
/* ── moon-system playback (own real-time clock; stars + planets stay static) ── */
const moonCtl=document.createElement('div');
moonCtl.style.cssText='position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;display:none;align-items:center;gap:10px;background:#0d1018e6;border:1px solid #1c2433;border-radius:10px;padding:7px 12px;color:#e8edf6;font:13px -apple-system,system-ui,sans-serif;backdrop-filter:blur(6px)';
moonCtl.innerHTML='<button id="mPlay" style="width:30px;height:30px;border-radius:50%;border:0;background:#7aa2ff;color:#05060a;cursor:pointer;font-size:13px">❚❚</button>'
 +'<span id="mLbl" style="color:#8893a6">moon system</span>'
 +'<span id="mSpd" style="display:flex;gap:4px"></span>'
 +'<button id="mStab" title="1000-yr stability run" style="background:#141a26;border:1px solid #1c2433;color:#8893a6;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer">안정성</button>'
 +'<button id="mChartBtn" title="charts" style="background:#141a26;border:1px solid #1c2433;color:#8893a6;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer;display:none">📈</button>'
 +'<button id="mChartBig" title="expand" style="background:#141a26;border:1px solid #1c2433;color:#8893a6;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer;display:none">⤢</button>'
 +'<span id="mYr" style="color:#8893a6;font-variant-numeric:tabular-nums;min-width:62px;text-align:right"></span>';
document.body.appendChild(moonCtl);
// stability charts (reuses paintStab): q–Q / inclination / eccentricity over the 1000-yr run
const moonChart=document.createElement('canvas');
moonChart.style.cssText='position:fixed;left:50%;bottom:62px;transform:translateX(-50%);z-index:50;width:min(440px,92vw);display:none;background:#0d1018f2;border:1px solid #1c2433;border-radius:10px;backdrop-filter:blur(6px)';
document.body.appendChild(moonChart);
const moonTop=document.createElement('canvas');   // top-down (face-on) orbit view, big mode
moonTop.style.cssText='position:fixed;z-index:50;display:none;background:#0d1018f2;border:1px solid #1c2433;border-radius:10px;backdrop-filter:blur(6px)';
document.body.appendChild(moonTop);
let moonChartOn=false, moonChartBig=false, moonYr=null, moonFocus=null, _moonOrbitLegend=[];
moonTop.addEventListener('click',e=>{ const r=moonTop.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top;
  const hit=_moonOrbitLegend.find(b=>x>=b.x0&&x<=b.x1&&y>=b.y0&&y<=b.y1);
  moonFocus = hit ? (moonFocus===hit.name?null:hit.name) : null; });   // click legend = isolate; empty = all
const _mPlayBtn=moonCtl.querySelector('#mPlay'), _mStab=moonCtl.querySelector('#mStab'),
      _mYr=moonCtl.querySelector('#mYr'), _mChartBtn=moonCtl.querySelector('#mChartBtn'),
      _mChartBig=moonCtl.querySelector('#mChartBig');
_mChartBtn.onclick=()=>{ moonChartOn=!moonChartOn;
  _mChartBtn.style.borderColor=moonChartOn?'#7aa2ff':'#1c2433'; if(!moonChartOn) moonChart.style.display='none'; };
_mChartBig.onclick=()=>{ moonChartBig=!moonChartBig; _mChartBig.style.borderColor=moonChartBig?'#7aa2ff':'#1c2433'; };
function drawMoonChart(){
  if(!(moonStab&&moonChartOn)){ moonChart.style.display='none'; moonTop.style.display='none'; return; }
  // raw recs: ω is wrapped 0–360 (index 5) — used by the top-down view (per-step <180° → _alerp precesses smoothly)
  const rawRecs=MOON_SYS.filter(m=>m.stab&&m._near).map(m=>{ const d=m.stab.data,t0=m.stab.t0,t1=m.stab.t_end,n=d.length;
    return {rgb:m.rgb,name:m.name,d:d.map((s,j)=>[t0+(t1-t0)*j/Math.max(n-1,1),s[0],s[1],s[2],s[3],s[4],s[5]])}; });
  if(!rawRecs.length){ moonChart.style.display='none'; moonTop.style.display='none'; return; }
  const nS=rawRecs[0].d.length, idx=(moonT*4)%nS;                  // run scrub (matches the playhead)
  // chart recs: unwrap ω → CUMULATIVE turns (slope = precession rate) for the ω panel (full-span legible)
  const cumRecs=rawRecs.map(o=>{ let cum=0,prev=null;
    return {rgb:o.rgb,name:o.name,d:o.d.map(s=>{ if(prev!=null) cum+=((s[5]-prev)%360+540)%360-180; prev=s[5];
      return [s[0],s[1],s[2],s[3],s[4],cum,s[6]]; })}; });
  const chartRecs = moonFocus ? cumRecs.filter(o=>o.name===moonFocus) : cumRecs;   // legend isolates
  moonChart.style.display='block';
  if(moonChartBig){
    moonTop.style.display='block'; moonTop.style.left='3vw'; moonTop.style.bottom='74px';
    const tv=Math.min(360,Math.round(innerWidth*0.40),Math.round(innerHeight*0.5));
    moonTop.style.width=tv+'px'; moonTop.style.height=tv+'px';
    _moonOrbitLegend=paintOrbitTopDown(moonTop,tv,tv,idx,rawRecs,moonFocus,1);   // wrapped ω + fine cadence → orbit precesses smoothly
    moonChart.style.left='auto'; moonChart.style.right='3vw'; moonChart.style.transform='none'; moonChart.style.width='min(560px,52vw)';
  } else {
    moonTop.style.display='none';
    moonChart.style.left='50%'; moonChart.style.right='auto'; moonChart.style.transform='translateX(-50%)'; moonChart.style.width='min(440px,92vw)';
  }
  moonChart.style.bottom = moonChartBig ? '74px' : '62px';
  const W=moonChart.clientWidth||300, H=moonChartBig?Math.min(560,Math.round(innerHeight*0.6)):270;  // 3 panels (q–Q, i+e, ω); H>320 → "big" style
  if(moonChart.style.height!==H+'px') moonChart.style.height=H+'px';
  paintStab(moonChart,W,H,moonYr,chartRecs,{omega:true});
}
_mPlayBtn.onclick=()=>{moonPlay=!moonPlay;_mPlayBtn.textContent=moonPlay?'❚❚':'▶';};
_mStab.onclick=()=>{ moonStab=!moonStab; moonT=0;
  _mStab.style.color=moonStab?'#e8edf6':'#8893a6'; _mStab.style.borderColor=moonStab?'#7aa2ff':'#1c2433';
  if(!moonStab) _mYr.textContent=''; };   // 3D orbits are static (chart carries the evolution)
(function(){const c=moonCtl.querySelector('#mSpd');[0.25,1,4,16].forEach(s=>{const b=document.createElement('button');
  b.textContent=s+'×';b.dataset.s=s;
  b.style.cssText='background:#141a26;border:1px solid #1c2433;color:'+(s===moonSpeed?'#e8edf6':'#8893a6')+';border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer';
  b.onclick=()=>{moonSpeed=s;[...c.children].forEach(x=>x.style.color=(+x.dataset.s===s?'#e8edf6':'#8893a6'));};c.appendChild(b);});})();
let _moonLast=performance.now();
function updateMoons(){
  const now=performance.now(), dt=Math.min((now-_moonLast)/1000,0.1); _moonLast=now;
  if(moonPlay) moonT+=dt*moonSpeed;
  let near=false, yr=null;
  for(const m of MOON_SYS){
    // stability mode drives only the chart playhead (sim-year); the 3D orbit stays a
    // clean static ellipse. The real apsidal precession is ~30–76 turns / 1000 yr —
    // far too fast to render faithfully from the ~100 downsampled snapshots (it would
    // alias into a fake, jerky rotation), and it is not the stability signal. The
    // secular a/e/q–Q evolution (bounded = stable) lives in the chart instead.
    if(moonStab && m.stab && yr==null){ const d=m.stab.data, n=d.length, u=(moonT*4)%n;
      yr=m.stab.t0+(m.stab.t_end-m.stab.t0)*(u/Math.max(n-1,1)); }
    const nu=meanToTrue(m.M0+m.omega*moonT, m.e);
    m.mesh.position.copy(m.center).add(orbitPoint(m.a,m.e,m.i,m.Om,m.om,nu));
    m.mesh.getWorldPosition(wp); m._near=wp.distanceTo(camera.position)<0.3; if(m._near) near=true;
  }
  moonYr=yr;
  const show=MOON_SYS.length && near;
  moonCtl.style.display=show?'flex':'none';
  if(show){ _mLblSet();
    _mChartBtn.style.display=moonStab?'inline-block':'none';
    _mChartBig.style.display=(moonStab&&moonChartOn)?'inline-block':'none';
    _mYr.textContent=(moonStab&&yr!=null)?(Math.round(yr).toLocaleString()+(lang==='ko'?' 년':' yr')):''; }
  drawMoonChart();
}
function _mLblSet(){ moonCtl.querySelector('#mLbl').textContent=(lang==='ko'?(moonStab?'위성 안정성':'위성계'):(moonStab?'moon stability':'moon system')); }

function tick(){
  requestAnimationFrame(tick);
  applyKeys();
  if(fly){ fly.k=Math.min(1,fly.k+0.04);
    const e=1-Math.pow(1-fly.k,3);
    camera.position.lerpVectors(fly.from,fly.to,e);
    controls.target.lerpVectors(fly.tFrom,fly.tTo,e);
    if(fly.k>=1) fly=null;
  }
  controls.update();
  if(document.activeElement!==zoomSlider) zoomSlider.value=distToZoom(controls.getDistance());
  updateScene();
  updateMoons();
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},7000);

ensureLabels(); applyFilter(); applyLang(); tick();
</script>
</body>
