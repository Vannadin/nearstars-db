// TEST ARTIFACT — not the release path. Hand-written for the WS5 probe.
//
// Principia Keplerian path (Path 2): gravity_model ONLY, no principia_initial_state.
// Principia derives each body's state from the Kopernicus osculating elements
// (InsertCelestialJacobiKeplerian), so stock Kerbol/Kerbin/Mun need no Cartesian
// entries and the all-bodies-or-Log.Fatal consistency check never runs.
//
// Same four bodies and the same GM values as the release
// Patches/Principia/Real_NearStars-GravityModel.cfg — only the NEEDS tag differs:
// SolSystem is dropped so this applies on a stock-Kerbol base.
//
// gravitational_parameter is optional in Keplerian mode (Principia would fall back to
// Kopernicus gravParameter); it is stated explicitly so the two paths use identical masses.
//
// Rotational poles (axis_right_ascension / axis_declination / angular_frequency) are
// omitted — Principia defaults to -90/90 deg, aligned with the KSP frame. Same as release.

@principia_gravity_model:NEEDS[NearStarsSystem]
{
    body
    {
        name                    = AlphaCentauriA
        gravitational_parameter = +1.467136024398990e+11 km^3/s^2
    }
    body
    {
        name                    = AlphaCentauriB
        gravitational_parameter = +1.243913700288710e+11 km^3/s^2
    }
    body
    {
        name                    = ProximaCen
        gravitational_parameter = +1.620418892619800e+10 km^3/s^2
    }
    body
    {
        name                    = TRAPPIST1
        gravitational_parameter = +1.191757711361600e+10 km^3/s^2
    }
}
