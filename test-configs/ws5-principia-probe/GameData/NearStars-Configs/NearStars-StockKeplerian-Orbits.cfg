// TEST ARTIFACT — not the release path. Hand-written for the WS5 probe.
//
// Layers on top of the generated Kopernicus/stars.cfg (@Kopernicus:FOR[NearStarsSystem])
// to make it loadable on a STOCK KERBOL base under Principia's Keplerian path
// (Path 2: principia_gravity_model only, NO principia_initial_state).
//
// stars.cfg ships a placeholder Orbit (all four stars at referenceBody=Sun,
// semiMajorAxis=1e16, e=0, same phase) because the release path is Cartesian —
// Principia's initial_state overrides it. Under the Keplerian path the Kopernicus
// elements ARE the initial state, so the placeholder would put A and B at the same
// point. This patch replaces them with a real hierarchy.
//
// "Sun" is the stock star's internal body name, so referenceBody = Sun resolves on
// both stock Kerbol and Sol-Configs.
//
// Orbits (db/binary_orbits.json, Pourbaix & Correia 2017 / Kervella et al. 2017):
//   AlphaCentauriA   → Sun            4.158e16 m (4.395 ly, real distance; circular placeholder)
//   AlphaCentauriB   → AlphaCentauriA a=23.675 AU, real ORB6 grade-1 elements
//   ProximaCen       → AlphaCentauriA a=8700 AU, e=0.5 — periastron epoch UNCONSTRAINED
//                                     (phase_reliable=false); mean anomaly is arbitrary
//   TRAPPIST1        → Sun            3.848e17 m (40.7 ly; inclination/LAN chosen only to
//                                     separate it from the alpha Cen plane, not real sky position)
//
// UT0 is declared to be JD 2433282.5, matching the Cartesian variant's solar_system_epoch,
// so meanAnomalyAtEpochD for A-B is directly comparable between the two paths.
//
// Known tension: catalog a (23.675 AU, from parallax 742.12 mas) with our GM_A+GM_B gives
// P = 80.60 yr against the catalogued 79.91 yr (0.9%). a and GM are kept; the period is
// emergent. Principia uses a + GM, not P.

@Kopernicus:AFTER[NearStarsSystem]
{
    @Body[AlphaCentauriA]
    {
        @Properties
        {
            // Must enclose Proxima's apoapsis (1.952e15 m). Infinity (stars.cfg default)
            // is only valid for the root body.
            %sphereOfInfluence = 3.0e+15
        }
        @Orbit
        {
            %referenceBody            = Sun
            %semiMajorAxis            = 4.158e+16
            %eccentricity             = 0
            %inclination              = 0
            %longitudeOfAscendingNode = 0
            %argumentOfPeriapsis      = 0
            %meanAnomalyAtEpochD      = 0
            %epoch                    = 0
        }
    }

    @Body[AlphaCentauriB]
    {
        @Properties
        {
            %sphereOfInfluence = 1.0e+12
        }
        @Orbit
        {
            %referenceBody            = AlphaCentauriA
            %semiMajorAxis            = 3.54179e+12
            %eccentricity             = 0.5179
            %inclination              = 79.205
            %argumentOfPeriapsis      = 231.65
            %longitudeOfAscendingNode = 204.85
            %meanAnomalyAtEpochD      = 338.376
            %epoch                    = 0
        }
    }

    @Body[ProximaCen]
    {
        @Properties
        {
            %sphereOfInfluence = 1.5e+14
        }
        @Orbit
        {
            %referenceBody            = AlphaCentauriA
            %semiMajorAxis            = 1.302e+15
            %eccentricity             = 0.5
            %inclination              = 107.6
            %argumentOfPeriapsis      = 72.3
            %longitudeOfAscendingNode = 126.0
            %meanAnomalyAtEpochD      = 0        // periastron epoch unknown — arbitrary phase
            %epoch                    = 0
        }
    }

    @Body[TRAPPIST1]
    {
        @Properties
        {
            %sphereOfInfluence = 1.0e+15
        }
        @Orbit
        {
            %referenceBody            = Sun
            %semiMajorAxis            = 3.848e+17
            %eccentricity             = 0
            %inclination              = 25
            %longitudeOfAscendingNode = 140
            %argumentOfPeriapsis      = 0
            %meanAnomalyAtEpochD      = 0
            %epoch                    = 0
        }
    }
}
