# 오로라 발광종 — 금지선/밴드 + 밀도 의존 quenching 계수 (비-LTE 오로라 색 엔진 입력)
# Auroral emitters: forbidden/metastable lines + allowed bands, with collisional
# quenching rate coefficients. Aurora is NON-LTE (electron-impact excitation,
# low density), so color is set by which lines SURVIVE quenching at a given
# density, NOT by temperature. Model: line intensity ∝ x_source·n·yield·φ,
#   φ_forbidden = A_line / (A_total + Σ_q k_q·x_q·n),   φ_allowed = 1.
#
# Sources (lifetimes + quenching are standard aeronomy values, cross-checked
# against these reviews — not freshly extracted from a single measurement):
#   Lifetimes O(1D) τ~114s, O(1S) τ~0.84s — Slanger & Copeland, "Energetic Oxygen
#     in the Upper Atmosphere and the Laboratory" (review); rocket airglow
#     O(1S)/O(1D) quantum-yield studies (Planet. Space Sci.).
#   Quenching k [cm^3/s] — Rees 1989 "Physics and Chemistry of the Upper
#     Atmosphere"; Sobral et al. 1993 JGR 98 (O(1D)+O(3P)); O(1S) 75-115 km
#     quenching profile (Planet. Space Sci. 1973):
#   O(1D)+N2 ~2.0e-11, +O2 ~2.9e-11, +O ~8e-12, +CO2 ~7.5e-11
#   O(1S)+O2 ~4.0e-12, +O ~2e-13, +N2 ~1e-13, +CO2 ~3e-13
# yield = relative electron-impact / dissociative-recombination production.
#
# Airglow / meteoric-metal additions (~80-105 km layer, "other elements"):
#   Na D 589.0/589.6 — Slipher 1929; sodium nightglow from the meteoric Na layer
#     (chemiluminescence Na+O3 at night, resonance fluorescence by day).
#   OH Meinel (H+O3 ~87km) — strongest discrete nightglow emission, broad red/IR;
#     representative visible band heads (envelope), not individual rovibronic lines.
#   O I 777.4 — O+ radiative recombination (F-region), bright-aurora deep red.
#   Li 670.8 / K 766.5,769.9 / Ca+ 393.4,396.8 — meteoric metal resonance layers
#     (Plane et al. 2015, "The Mesosphere and Metals", Chem. Rev.). Mg/Fe are
#     UV (<300nm) so excluded from the visible model. Mars hosts a metal layer too
#     (MAVEN), so venus_mars carries a trace Na as well.

emitters:
  O_1D:                       # red (the high-altitude auroral red)
    source: O
    forbidden: true
    A_total: 8.9e-3
    yield: 3.0
    lines: [{nm: 630.0, A: 5.6e-3}, {nm: 636.4, A: 1.8e-3}]
    quench: {N2: 2.0e-11, O2: 2.9e-11, O: 8.0e-12, CO2: 7.5e-11}
  O_1S:                       # green (557.7 — the classic auroral green)
    source: O
    forbidden: true
    A_total: 1.19
    yield: 1.6
    lines: [{nm: 557.7, A: 1.06}]
    quench: {N2: 1.0e-13, O2: 4.0e-12, O: 2.0e-13, CO2: 3.0e-13}
  N2_1P:                      # First Positive — red/pink lower border (allowed, fast)
    source: N2
    forbidden: false
    yield: 1.3
    lines: [{nm: 650.0, A: 1.0}, {nm: 670.0, A: 1.0}, {nm: 686.0, A: 0.7}]
  N2p_1NG:                    # N2+ First Negative — blue-violet tops (needs hard e-/sunlit)
    source: N2
    forbidden: false
    yield: 0.5
    lines: [{nm: 391.4, A: 1.0}, {nm: 427.8, A: 0.5}, {nm: 470.9, A: 0.25}]
  N2_2P:                      # Second Positive — violet (allowed)
    source: N2
    forbidden: false
    yield: 0.3
    lines: [{nm: 357.7, A: 0.9}, {nm: 380.5, A: 0.7}, {nm: 405.9, A: 0.5}]
  H_Balmer:                   # gas-giant aurora (Jupiter/Saturn): H red/pink
    source: H
    forbidden: false
    yield: 1.0
    lines: [{nm: 656.3, A: 1.0}, {nm: 486.1, A: 0.3}, {nm: 434.0, A: 0.12}]
  He_D3:                      # He-rich aurora accent
    source: He
    forbidden: false
    yield: 0.5
    lines: [{nm: 587.6, A: 1.0}, {nm: 667.8, A: 0.3}]
  CO2p_UV:                    # CO2+ (Mars/Venus aurora) — mostly UV/violet edge
    source: CO2
    forbidden: false
    yield: 0.4
    lines: [{nm: 367.0, A: 1.0}, {nm: 423.0, A: 0.5}]
  # ── airglow / meteoric-metal layer (~80-105 km) — "other elements" ──
  Na_D:                       # sodium nightglow 589nm — meteoric Na layer ~90km (yellow)
    source: Na                #   Slipher 1929; Na D from meteoric ablation + Na+O3 chemiluminescence
    forbidden: false
    yield: 30.0
    lines: [{nm: 589.0, A: 1.0}, {nm: 589.6, A: 0.5}]    # D2:D1 = 2:1 (spin-orbit weights)
  OH_Meinel:                  # OH Meinel nightglow (H+O3, ~87km) — broad deep-red envelope
    source: O2                #   tied to the O2/O3 layer; representative visible Meinel band heads
    forbidden: false
    yield: 2.0
    lines: [{nm: 687.0, A: 0.6}, {nm: 720.0, A: 1.0}, {nm: 731.0, A: 0.8}]
  O_777:                      # OI 777.4 — O+ radiative recombination, bright aurora (deep red)
    source: O
    forbidden: false
    yield: 0.12
    lines: [{nm: 777.4, A: 1.0}]
  Li_red:                     # meteoric Li 670.8nm resonance (red, minor layer)
    source: Li
    forbidden: false
    yield: 18.0
    lines: [{nm: 670.8, A: 1.0}]
  K_red:                      # meteoric K 766.5/769.9nm resonance (deep-red edge, minor)
    source: K
    forbidden: false
    yield: 18.0
    lines: [{nm: 766.5, A: 1.0}, {nm: 769.9, A: 0.5}]
  Ca_II:                      # meteoric Ca+ 393.4/396.8nm (H&K, violet, twilight resonance)
    source: Ca
    forbidden: false
    yield: 18.0
    lines: [{nm: 393.4, A: 1.0}, {nm: 396.8, A: 0.5}]
