  - {name: NGP,    v0_kms: 37.0,  l_deg: 189.8, b_deg: -5.4,   region_l: 5,   region_b: 75,  near_pc: 8.5,  n: 15, chi2: 3.8}  # poor fit
  - {name: Leo,    v0_kms: 23.5,  l_deg: 191.3, b_deg: -8.9,   region_l: 270, region_b: 55,  near_pc: 11.1, n: 7,  chi2: 1.5}
  - {name: Dor,    v0_kms: 52.94, l_deg: 157.3, b_deg: -47.93, region_l: 270, region_b: -50, near_pc: 11.7, n: 4,  chi2: 0.8}  # only 4 sightlines
  - {name: Vel,    v0_kms: 45.2,  l_deg: 195.4, b_deg: -19.1,  region_l: 300, region_b: -45, near_pc: 14.9, n: 7,  chi2: 0.8}
  - {name: Cet,    v0_kms: 60.0,  l_deg: 197.11, b_deg: -8.72, region_l: 290, region_b: -40, near_pc: 15.5, n: 5,  chi2: 8.9}  # worst fit; extreme v

# Measured astrospheres within 55 ly. v_ism_stellar_kms = ISM-vs-star flow (STELLAR frame);
# theta_deg = angle of ISM upwind to our sightline; mdot_solar = mass-loss (x Sun, 2e-14 Msun/yr);
# cloud = LISM cloud the absorption is assigned to (default LIC unless noted, Wood Table 2);
