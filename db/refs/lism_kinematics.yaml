# X-ray-detected astrospheres (soft X-ray charge-exchange; independent of the Lyalpha method).
# mdot_solar runs SYSTEMATICALLY HIGHER than the Lyalpha values for the same stars -- a method
# tension, kept separate rather than merged into the table above. Kislyakova et al. 2024.
astrospheres_xray:
  - {star: "70 Ophiuchi", mdot_solar: 66.5, source: "2024NatAs...8..596K"}
  - {star: "eps Eri",     mdot_solar: 15.6, source: "2024NatAs...8..596K"}
  - {star: "61 Cygni",    mdot_solar: 9.6,  source: "2024NatAs...8..596K"}
