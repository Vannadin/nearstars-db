# 55광년 이내 국부 성간물질(LISM) 운동학 앵커 — 성간풍 속도장 + astrosphere 실측 census
#
# Feeds the viewer's heliosphere/astrotail orientation and the interstellar-wind map layer.
# v_rel = v_star(heliocentric) - v_ISM(heliocentric); tail = -v_rel, nose = +v_rel.
# Every value is pinned to a bibcode. Independently verified 2026-06-16 (6/6 core values match).
#
# CONVENTIONS (read before use):
#  - clouds[].(l_deg,b_deg) is the DOWNWIND direction (where the gas flows TOWARD),
#    Galactic, with v0_kms > 0. Heliocentric (solar rest) frame. Upwind/source apex is
#    the antipode (l-180 mod 360, -b). This is Redfield & Linsky 2008's convention.
#  - insitu_he is the in-situ IBEX He inflow given in ECLIPTIC inflow coords (flows toward),
#    a heliospheric measurement distinct from the spectroscopic LIC cloud vector. Mind the
#    frame/convention difference vs the cloud vectors when combining.
#  - astrospheres[].v_ism_stellar_kms is in the STELLAR rest frame (ISM-vs-star flow speed
#    an astrosphere constrains) -- NOT heliocentric. Use it for cloud assignment and for
#    wind strength (mdot), NOT as a heliocentric field anchor. The cloud vectors are the field.
#
# MODEL (hybrid): assign each star to its LISM cloud (by sky region, or by the explicit
# Wood cloud tag where measured), use that cloud's heliocentric vector as v_ISM; IDW-blend
# neighbouring cloud vectors for a smooth field. Reality is piecewise (clouds with sharp
# boundaries) -- the smooth field is a labelled approximation. 3D cloud depths are weakly
# constrained (sky direction is solid; near_pc is an UPPER LIMIT on the near edge, not a
# position). Subsonic v_rel -> no sharp bow shock/tail (idealization for slow movers).

meta:
  range_ly: 55
  frame: heliocentric
  cloud_direction_convention: downwind_galactic   # (l_deg,b_deg) = where gas flows toward
  verified: 2026-06-16
  primary_sources:
    clouds: "2008ApJ...673..283R"        # Redfield & Linsky 2008, ApJ 673, 283, Tables 16 & 18
    astrospheres: "2021ApJ...915...37W"  # Wood et al. 2021, ApJ 915, 37, Tables 2 & 3
    astrospheres_xray: "2024NatAs...8..596K"  # Kislyakova et al. 2024 (X-ray charge-exchange)
    insitu_he: "2015ApJS..220...28B"     # Bzowski/McComas et al. 2015 (IBEX He inflow)

# In-situ interstellar-neutral He inflow at the Sun (heliospheric, ecliptic inflow coords).
insitu_he:
  speed_kms: 25.8
  ecliptic_lambda_deg: 255.8   # flows toward (inflow); upwind apex = antipode
  ecliptic_beta_deg: 5.16
  temp_k: 7440
  source: "2015ApJS..220...28B"

# Representative LIC/G average R&L offer as the nearest thing to a "bulk" vector (parameter
# mean, not a true vector mean -- ~0.5 deg off in b from the Cartesian midpoint).
licg_mean:
  v0_kms: 26.74
  l_deg: 185.7
  b_deg: -16.95
  note: "(LIC+G)/2 parameter average, R&L 2008 Table 16; use only as a coarse fallback."
  source: "2008ApJ...673..283R"

# 15 warm clouds within ~15 pc. v0_kms toward Galactic (l_deg,b_deg) [downwind, heliocentric].
# region_l/region_b = cloud-center Galactic direction (Table 18). near_pc = nearest star with
# the cloud's absorption (upper limit on near edge). n = # sightlines, chi2 = reduced chi^2
# of the rigid-vector fit (>3 = poor fit, flag). All values: R&L 2008 Tables 16 & 18.
clouds:
  - {name: LIC,    v0_kms: 23.84, l_deg: 187.0, b_deg: -13.5,  region_l: 170, region_b: -10, near_pc: 2.6,  n: 79, chi2: 2.2}
  - {name: G,      v0_kms: 29.6,  l_deg: 184.5, b_deg: -20.6,  region_l: 315, region_b: 0,   near_pc: 1.3,  n: 21, chi2: 1.3}
  - {name: Blue,   v0_kms: 13.89, l_deg: 205.5, b_deg: -21.7,  region_l: 250, region_b: -30, near_pc: 2.6,  n: 10, chi2: 2.4}
  - {name: Aql,    v0_kms: 58.6,  l_deg: 187.0, b_deg: -50.8,  region_l: 40,  region_b: -5,  near_pc: 3.5,  n: 9,  chi2: 2.6}
  - {name: Eri,    v0_kms: 24.1,  l_deg: 196.7, b_deg: -17.7,  region_l: 70,  region_b: -20, near_pc: 3.5,  n: 8,  chi2: 0.3}
  - {name: Aur,    v0_kms: 25.22, l_deg: 212.0, b_deg: -16.4,  region_l: 210, region_b: 10,  near_pc: 3.5,  n: 9,  chi2: 2.1}
  - {name: Hyades, v0_kms: 14.69, l_deg: 164.2, b_deg: -42.8,  region_l: 180, region_b: -20, near_pc: 5.0,  n: 14, chi2: 1.3}
  - {name: Mic,    v0_kms: 28.45, l_deg: 203.0, b_deg: -3.3,   region_l: 40,  region_b: 15,  near_pc: 5.1,  n: 15, chi2: 0.5}
  - {name: Oph,    v0_kms: 32.25, l_deg: 217.7, b_deg: 0.8,    region_l: 45,  region_b: 25,  near_pc: 5.1,  n: 6,  chi2: 3.9}  # poor fit
