      basis: Tm3+ phosphor in LaOBr (LaOBr:Tm) emits narrow blue at 455nm — historical blue component of rare-earth X-ray intensifying screens (paired with Gd2O2S:Tb green and Y2O2S:Eu red for tri-color X-ray imaging). The chart's pale cyan-green is the wrong direction; true Tm3+ is saturated blue.
      source: Yen-Shionoya-Yamamoto 'Phosphor Handbook' 2nd ed Ch.5 (2007)
      emission_lines:
      - nm: 455.0
        intensity: 1000.0
        label: Tm3+ 1D2-3F4 (a)
      - nm: 477.0
        intensity: 400.0
        label: Tm3+ 1G4-3H6
      - nm: 650.0
        intensity: 200.0
        label: Tm3+ 1G4-3F4 minor red
      - nm: 360.0
        intensity: 100.0
        label: Tm3+ 1D2-3H6 UV
    phosphor_emission:
      status: visible
      hex: '#1a3aff'
      hex_basis: canonical_descriptor
      emission_lines:
      - nm: 455.0
        intensity: 1000.0
        label: Tm3+ 1D2→3F4 (LaOBr:Tm blue)
      - nm: 477.0
        intensity: 400.0
        label: Tm3+ 1G4→3H6 blue
      - nm: 650.0
        intensity: 200.0
        label: Tm3+ 1G4→3F4 red minor
      basis: Tm3+ 455nm blue dominant. LaOBr:Tm is the BLUE component of rare-earth X-ray intensifying screens (paired with Gd2O2S:Tb green and Y2O2S:Eu red for tri-color X-ray imaging). Tm:YAG laser at 2.0μm IR for surgical applications.
      source: Yen-Shionoya-Yamamoto Phosphor Handbook; X-ray screen literature
Yb:
  atomic_number: 70
  name: Ytterbium
  regimes:
    atomic_flame:
      status: not_visible_to_humans
      hex: null
      basis: 'Yb3+ has ONE excited 4f level (2F5/2) → ONE emission line at 980nm IR. No visible. Used as **sensitizer** in up-conversion phosphors (absorbs 980nm pump, transfers to Er/Ho/Tm co-dopant). Yb:YAG laser (1030-1080nm) is industrial workhorse. Pure Yb3+: zero visible. Chart''s pale teal is unsupported.'
