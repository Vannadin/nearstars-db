# Per-element plasma colors — multi-regime schema (v2).
#
# Each element has a `regimes:` block. The atomic_flame regime is
# populated for every element (preserves v1 data). reentry_plasma
# and aurora regimes are added in subsequent passes for the species
# where they're meaningfully different from atomic_flame.
# phosphor_emission regime added for lanthanides where Ln3+ in a
# solid host matrix is the chemistry-dominant signature (display
# phosphors, X-ray screens, etc.).
#
# Schema per regime:
#   status:    visible | no_flame_color | not_visible_to_humans
#              | too_radioactive | too_short | no_data | not_emitter
#   hex:       #rrggbb (lowercase 6-digit), or null if status != visible
#   hex_basis: cie_computed | canonical_descriptor | chart_approx
#              - cie_computed: derived from emission_lines via CIE
#                (scripts/refs/wavelength_to_rgb.py)
#              - canonical_descriptor: matches a standard color name
#                (crimson, lilac, etc.) — not naively recomputed
#              - chart_approx: visual estimate from Helmenstine 2017
#                — lowest confidence
#   emission_lines (when cie_computed): NIST lines + relative intensities
#   basis:     spectroscopic justification (free text)
#   source:    canonical reference

H:
  atomic_number: 1
  name: Hydrogen
  regimes:
    atomic_flame:
      status: visible
      hex: '#ffaab9'
      hex_basis: cie_computed
      emission_lines:
      - nm: 656.3
        intensity: 500.0
        label: Hα
      - nm: 486.1
        intensity: 100.0
        label: Hβ
      - nm: 434.0
        intensity: 50.0
        label: Hγ
      basis: Balmer Hα 656nm (red) dominant + Hβ 486nm (cyan); perceptual mix → hot pink
      source: NIST Atomic Spectra; Wikipedia Balmer series
    reentry_plasma:
      status: visible
      hex: '#caeaff'
      hex_basis: cie_computed
      emission_lines:
      - nm: 656.3
        intensity: 500.0
        label: Hα
      - nm: 486.1
        intensity: 200.0
        label: Hβ
      - nm: 434.0
        intensity: 100.0
        label: Hγ
      - nm: 410.2
        intensity: 50.0
        label: Hδ
      basis: Balmer series fully populated at 10000K. Hα still dominant red, but Hβ contribution grows relative to flame T. Slightly bluer pink.
      source: NIST H I; reentry spectroscopy lit
    aurora:
      status: visible
      hex: '#ffaab9'
      hex_basis: cie_computed
      emission_lines:
      - nm: 656.3
        intensity: 1000.0
        label: Hα Balmer
      - nm: 486.1
        intensity: 200.0
        label: Hβ Balmer
      - nm: 434.0
        intensity: 100.0
        label: Hγ Balmer
      basis: H Balmer α dominant. Proton aurora — incoming protons charge-exchange to neutral H, then emit Balmer. Diffuse, less intense than electron aurora.
      source: NIST H I; proton aurora literature
He:
  atomic_number: 2
  name: Helium
  regimes:
    atomic_flame:
      status: visible
      hex: '#ffa07a'
      hex_basis: canonical_descriptor
      basis: He I D3 587.6nm + multiple visible lines; discharge tube appears peach-orange
      source: NIST; Wikipedia Helium emission
    reentry_plasma:
      status: visible
      hex: '#f9ff24'
      hex_basis: cie_computed
      emission_lines:
      - nm: 587.6
        intensity: 500.0
        label: D3
      - nm: 667.8
        intensity: 200.0
      - nm: 706.5
        intensity: 200.0
      - nm: 501.6
        intensity: 150.0
      - nm: 471.3
        intensity: 100.0
      - nm: 388.9
        intensity: 200.0
        label: UV-blue
      basis: He I lines + more visible blue at high T. Slightly cooler than discharge tube peach.
      source: NIST He I; reentry spectra
    aurora:
      status: visible
      hex: '#ffe700'
      hex_basis: cie_computed
      emission_lines:
      - nm: 587.6
        intensity: 500.0
        label: D3
      - nm: 388.9
        intensity: 300.0
        label: He I UV-blue
      basis: Rare; observed in proton aurorae and very high-energy events.
      source: Aurora spectroscopy lit
Li:
  atomic_number: 3
  name: Lithium
  regimes:
    atomic_flame:
      status: visible
      hex: '#dc143c'
      hex_basis: canonical_descriptor
      basis: Li I doublet 670.8nm (resonance); classical crimson flame
      source: Wikipedia Flame test (crimson red); NIST 670.776/670.791nm
Be:
  atomic_number: 4
  name: Beryllium
  regimes:
    atomic_flame:
      status: no_flame_color
      hex: null
      basis: BeO/BeF salts produce no visible flame coloration; toxicity prevents standard flame-test
      source: Wikipedia Flame test (no characteristic color)
B:
  atomic_number: 5
  name: Boron
  regimes:
    atomic_flame:
      status: visible
      hex: '#3fcfa8'
      hex_basis: canonical_descriptor
      basis: BO2 green bands 518/546nm dominant; classical bright green flame
      source: Wikipedia Flame test (bright green); NIST B I lines
C:
  atomic_number: 6
  name: Carbon
  regimes:
    atomic_flame:
      status: visible
      hex: '#79ff2b'
      hex_basis: cie_computed
      emission_lines:
      - nm: 516.5
        intensity: 500.0
        label: C2 Swan d→a
      - nm: 473.7
        intensity: 400.0
        label: C2 Swan high-v
      - nm: 588.9
        intensity: 200.0
        label: C2 Swan low-v
      - nm: 388.3
        intensity: 300.0
        label: CN violet
      basis: Hot graphite continuum (incandescence) + C2 Swan bands 516/473nm in cool plasma; chart renders amber/orange for soot luminescence
      source: Helmenstine chart; NIST C I + Swan band literature
      reentry_note: At reentry temps (8000+K) C2 Swan green dominates over orange blackbody — see composition-color.md §3
    reentry_plasma:
      status: visible
      hex: '#22ff52'
      hex_basis: cie_computed
      emission_lines:
      - nm: 516.5
        intensity: 500.0
        label: C2 Swan d→a
      - nm: 473.7
        intensity: 400.0
        label: C2 Swan high-v
      - nm: 469.8
        intensity: 300.0
        label: C2 Swan
      - nm: 438.3
        intensity: 200.0
        label: CH band
      - nm: 388.3
        intensity: 400.0
        label: CN violet
      basis: At reentry temps C2 Swan green + CN violet dominate. Earth blackbody continuum from soot is absent in shock plasma.
      source: arXiv 2007.04869; Mars EDL camera footage
N:
  atomic_number: 7
  name: Nitrogen
  regimes:
    atomic_flame:
      status: visible
      hex: '#ff0071'
      hex_basis: cie_computed
      emission_lines:
      - nm: 391.4
        intensity: 500.0
        label: N2+ 1NG
      - nm: 427.8
        intensity: 300.0
        label: N2+ 1NG
      - nm: 670.0
        intensity: 200.0
        label: N2 1P band peak
      - nm: 337.1
        intensity: 200.0
        label: N2 2P UV
      basis: Atomic N is faint blue-violet in low-temp plasma; flame chemistry typically dark
      source: Helmenstine chart (deep blue-purple)
      reentry_note: At reentry temps N2+ 391nm + N2 1NG 670nm dominate — composition-color.md §3 "Earth-like"
    reentry_plasma:
      status: visible
      hex: '#ff0060'
      hex_basis: cie_computed
      emission_lines:
      - nm: 391.4
        intensity: 500.0
        label: N2+ 1NG
      - nm: 427.8
        intensity: 300.0
        label: N2+ 1NG
      - nm: 670.0
        intensity: 250.0
        label: N2 1P
      - nm: 744.2
        intensity: 100.0
        label: NI
      - nm: 821.6
        intensity: 150.0
        label: NI IR
      basis: N2+ 391nm First Negative + N2 1NG red — classic Earth reentry signature. Blue-violet hue is canonical.
      source: Air plasma optical spectra (ResearchGate); Earth reentry video
    aurora:
      status: visible
      hex: '#35ff00'
      hex_basis: cie_computed
      emission_lines:
      - nm: 346.6
        intensity: 100.0
        label: NI forbidden UV
      - nm: 519.8
        intensity: 200.0
        label: NI ²D→⁴S
      - nm: 520.0
        intensity: 200.0
        label: NI
      - nm: 746.8
        intensity: 300.0
        label: NI IR
      basis: Atomic N contributes weak green-yellow forbidden lines. Most visible 'aurora green' is actually OI 558nm, not N.
      source: NIST N I auroral
O:
  atomic_number: 8
  name: Oxygen
  regimes:
    atomic_flame:
      status: visible
      hex: '#ffda00'
      hex_basis: cie_computed
      emission_lines:
      - nm: 777.4
        intensity: 500.0
        label: OI triplet
      - nm: 615.7
        intensity: 200.0
        label: OI
      - nm: 557.7
        intensity: 100.0
        label: OI green forbidden (low-T plasma weak)
      - nm: 630.0
        intensity: 100.0
        label: OI red forbidden (low-T plasma weak)
      basis: OI 777nm + 615nm + auroral 558/630nm lines; cool plasma appears pale blue
      source: NIST O I; Helmenstine chart
      reentry_note: At reentry temps mixed with N2 → blue-violet plasma; see composition-color.md §3
    reentry_plasma:
      status: visible
      hex: '#ffe503'
      hex_basis: cie_computed
      emission_lines:
      - nm: 777.4
        intensity: 400.0
        label: OI triplet
      - nm: 615.7
        intensity: 300.0
        label: OI
      - nm: 557.7
        intensity: 200.0
        label: OI green
      - nm: 630.0
        intensity: 200.0
        label: OI red
      - nm: 844.6
        intensity: 200.0
        label: OI IR
      - nm: 436.8
        intensity: 100.0
        label: OI II
      basis: Atomic O lines stronger at reentry T than flame T. Combined with N2 in mixed atmospheres gives blue-violet (see N entry).
      source: NASA reentry spectroscopy
    aurora:
      status: visible
      hex: '#d3ff00'
      hex_basis: cie_computed
      emission_lines:
      - nm: 557.7
        intensity: 1000.0
        label: OI green forbidden ¹S→¹D
      - nm: 630.0
        intensity: 400.0
        label: OI red forbidden ¹D→³P
      - nm: 636.4
        intensity: 200.0
        label: OI red
      basis: OI 557.7nm green is the iconic auroral emission (1S→1D forbidden, τ≈0.7s, needs >100km altitude). 630.0nm red dominates at higher altitudes (>200km, 1D→3P forbidden, τ≈110s).
      source: NIST O I; Earth auroral physics literature
F:
  atomic_number: 9
  name: Fluorine
  regimes:
    atomic_flame:
      status: visible
      hex: '#ff0000'
      hex_basis: cie_computed
      emission_lines:
      - nm: 685.6
        intensity: 200.0
        label: F I
      - nm: 690.2
        intensity: 200.0
        label: F I
      - nm: 775.5
        intensity: 150.0
        label: ''
      basis: F I strongest lines are 685.6/690.2nm (deep red) and many in IR; perceptually faint, often categorized as no visible color
      source: NIST F I; Helmenstine chart (checkered)
Ne:
  atomic_number: 10
