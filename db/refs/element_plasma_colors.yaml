      status: visible
      hex: '#f5f5f5'
      hex_basis: canonical_descriptor
      basis: Mg I 285.2nm (UV) + green bands; pyrotechnic flame is brilliant white from continuum
      source: Wikipedia Flame test (brilliant white); NIST
    reentry_plasma:
      status: visible
      hex: '#2bff03'
      hex_basis: cie_computed
      emission_lines:
      - nm: 285.2
        intensity: 100.0
        label: Mg I UV (V≈0)
      - nm: 517.3
        intensity: 500.0
        label: Mg b1
      - nm: 518.4
        intensity: 400.0
        label: Mg b2
      - nm: 516.7
        intensity: 400.0
        label: Mg b3
      - nm: 448.1
        intensity: 100.0
        label: Mg II 4481
      basis: Mg b triplet 516-518nm strong at reentry T (meteor green). MgII 448 contributes mild blue.
      source: Meteor spectroscopy; NIST Mg I+II
    aurora:
      status: visible
      hex: '#2bff00'
      hex_basis: cie_computed
      emission_lines:
      - nm: 285.2
        intensity: 100.0
        label: Mg I UV
      - nm: 518.4
        intensity: 300.0
        label: Mg b2
      - nm: 516.7
        intensity: 300.0
        label: Mg b3
      - nm: 517.3
        intensity: 300.0
        label: Mg b1
      basis: Meteor-class aurora — Mg b triplet from incoming dust ablation in the upper atmosphere. Distinctive bright green meteor color.
      source: Meteor spectroscopy; Mg I NIST
Al:
  atomic_number: 13
  name: Aluminum
  regimes:
    atomic_flame:
      status: visible
      hex: '#e8e8e8'
      hex_basis: canonical_descriptor
      basis: Al I 396.2/394.4nm UV-violet emission. Real Al combustion (aluminum-powder pyrotechnics, thermite) appears brilliant white from Al2O3 thermal incandescence — continuum rather than atomic emission. Canonical descriptor is 'brilliant white'.
      source: Pyrotechnic literature (Conkling); NIST Al I
    reentry_plasma:
      status: visible
      hex: '#ff00a4'
      hex_basis: cie_computed
      emission_lines:
      - nm: 396.2
        intensity: 500.0
        label: Al I
      - nm: 394.4
        intensity: 400.0
        label: Al I
      - nm: 705.7
        intensity: 200.0
        label: Al II
      basis: Al I doublet UV-violet + Al II red. Hot rocky meteoroid green-violet.
      source: NIST Al I+II; meteor spectroscopy
Si:
  atomic_number: 14
  name: Silicon
  regimes:
