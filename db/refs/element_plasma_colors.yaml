      hex: '#ff3501'
      hex_basis: cie_computed
      emission_lines:
      - nm: 390.6
        intensity: 300.0
        label: Si I
      - nm: 288.2
        intensity: 100.0
        label: Si I UV
      - nm: 634.7
        intensity: 200.0
        label: Si II
      - nm: 637.1
        intensity: 200.0
        label: Si II
      basis: Si I UV-violet weak + Si II red enhances. Hot rocky vaporization.
      source: NIST Si I+II
P:
