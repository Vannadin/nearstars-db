  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Iron oxide vapor in meteor + lava-world atmospheres. Orange band system 580-620nm — but emission strength in shock-heated plasma not curated.
      source: Meteor spectroscopy
      upgrade_when: Phase 3 cites FeO band; meteor-class entry effects
    aurora:
      status: no_data
      hex: null
      basis: Meteor-class aurora chemistry; mostly Fe I atomic.
      source: Meteor aurora literature
      upgrade_when: —
MgO:
  formula: MgO
  mass_amu: 40.3
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Magnesium oxide rock vapor. Green band system 500nm — but emission largely overshadowed by atomic Mg b triplet (see element DB Mg entry).
      source: Meteor + lava chemistry
      upgrade_when: Phase 3 specifies MgO band over atomic Mg
    aurora:
      status: no_data
      hex: null
      basis: Atomic Mg dominates over MgO in low-density aurora.
      source: —
      upgrade_when: —
VO:
  formula: VO
  mass_amu: 66.94
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Vanadium oxide. Cool-dwarf atmospheric opacity signature; complex band system mostly in red/IR. Emission characteristics in plasma not characterized.
      source: Late M-dwarf + brown dwarf atmospheres
      upgrade_when: Late-M-dwarf planet Phase 3 with surface vapor
    aurora:
      status: no_data
      hex: null
      basis: Not applicable.
      source: —
      upgrade_when: —
HCl:
  formula: HCl
  mass_amu: 36.46
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Hydrogen chloride trace. UV-dominant emission; visible contribution faint. Venus + volcanic outgassing context.
      source: Venus atmospheric chemistry
      upgrade_when: Phase 3 Venus-class with HCl trace
    aurora:
      status: no_data
      hex: null
      basis: Photodissociates → H + Cl. Cl atomic emission cataloged in element DB.
      source: —
      upgrade_when: —
HF:
  formula: HF
  mass_amu: 20.01
  atoms: 2
