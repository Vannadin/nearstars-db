# Molecular plasma colors — reentry + aurora regimes.
#
# Companion DB to db/refs/element_plasma_colors.yaml. Captures the
# molecular-band emission that dominates the visible signature of
# reentry plasma (8000–15000 K shock layer) and aurora (low-density
# upper atmosphere forbidden + allowed transitions) for atmospherically-
# abundant species.
#
# Schema per molecule:
#   formula:   string (chemical formula)
#   mass_amu:  molecular mass (atomic mass units)
#   atoms:     number of atoms (1=mono, 2=diatomic, 3+=polyatomic)
#   regimes:
#     reentry_plasma: { status, hex, emission_bands, basis, source }
#     aurora:         { status, hex, emission_bands, basis, source }
#
# For polyatomic molecules at aurora altitudes (CO2, H2O, CH4, NH3, SO2):
# status=not_emitter with `dissociation_products` listing the atomic
# species that carry emission (look those up in element DB).

N2:
  formula: N2
  mass_amu: 28.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#5060c0'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 670.0
        intensity: 500.0
        label: N2 1P (vibrational head)
      - nm: 391.4
        intensity: 600.0
        label: N2+ 1NG
      - nm: 427.8
        intensity: 400.0
        label: N2+ 1NG
      basis: N2 1P red + N2+ 1NG violet. Earth-reentry visual signature is blue-violet — established by NASA reentry imaging. (Naive CIE mix of NIST relative intensities gives yellow because V(λ) heavily downweights violet at 391nm, but observed absolute photon flux at 391nm is high enough to dominate.)
      source: Air plasma optical spectra; NASA reentry imaging
    aurora:
      status: visible
      hex: '#7070d0'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 670.0
        intensity: 500.0
        label: N2 1P red lower border
      - nm: 391.4
        intensity: 800.0
        label: N2+ 1NG violet
      - nm: 427.8
        intensity: 500.0
        label: N2+ 1NG blue
      basis: Aurora — N2+ 391nm is the bright violet-blue band visible at the lower altitude limit (~100km).
      source: Earth aurora spectroscopy
N2+:
  formula: N2+
  mass_amu: 28.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#4060d0'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 391.4
        intensity: 1000.0
        label: 1NG (0,0)
      - nm: 427.8
        intensity: 600.0
        label: 1NG (0,1)
      basis: Ionized N2+ — First Negative bands 391+427nm. Pure violet-blue.
      source: Air plasma + auroral physics
    aurora:
      status: visible
      hex: '#5060d8'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 391.4
        intensity: 1000.0
        label: 1NG (0,0)
      - nm: 427.8
        intensity: 600.0
        label: 1NG (0,1)
      basis: N2+ 391nm violet is the bright lower-border auroral band.
      source: Earth aurora spectroscopy
O2:
  formula: O2
  mass_amu: 32.0
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#ff5300'
      hex_basis: cie_computed
      emission_bands:
      - nm: 762.0
        intensity: 300.0
        label: Atmospheric A-band
      - nm: 688.0
        intensity: 200.0
        label: B-band
      - nm: 628.0
        intensity: 100.0
        label: γ-band
      basis: O2 itself contributes mild red bands in shock plasma. Most visible emission from dissociation products (atomic O).
      source: NIST O2 + reentry literature
    aurora:
      status: not_visible_to_humans
      hex: null
      basis: O2 contributes mainly IR airglow at 864nm at aurora altitudes. Visible signature comes from dissociation product OI (see element DB).
      source: Airglow spectroscopy
OH:
  formula: OH
  mass_amu: 17.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: not_visible_to_humans
      hex: null
      basis: OH A-X bands at 309/315nm are UV. Reentry plasma perceptual contribution from OH is essentially nil.
      source: NIST OH; H2O combustion spectra
    aurora:
      status: not_visible_to_humans
      hex: null
      basis: OH Meinel bands at 700-880nm are near-IR airglow. Sky cameras need IR sensors to capture them.
      source: OH Meinel airglow literature
'NO':
  formula: 'NO'
  mass_amu: 30.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#00ff9d'
      hex_basis: cie_computed
      emission_bands:
      - nm: 237.0
        intensity: 100.0
        label: NO γ-band UV (V≈0)
      - nm: 440.0
        intensity: 200.0
        label: NO β-band
      - nm: 500.0
        intensity: 200.0
        label: NO continuum (recombination)
      basis: NO from N+O recombination in shock layer. γ-band UV mostly invisible; visible contribution faint blue-green from broad continuum (Venus airglow analog).
      source: Venus airglow studies; NIST NO
    aurora:
      status: visible
      hex: '#00ff98'
      hex_basis: cie_computed
      emission_bands:
      - nm: 500.0
        intensity: 200.0
        label: NO recombination continuum
      - nm: 440.0
        intensity: 100.0
      basis: NO continuum from N+O recombination — pale blue-green. Visible on Venus airglow.
      source: Venus airglow
CO:
  formula: CO
  mass_amu: 28.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#50d098'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 520.0
        intensity: 300.0
        label: CO Cameron a³Π-X¹Σ
      - nm: 425.0
        intensity: 200.0
        label: CO Ångström
      basis: CO Cameron bands green. Mars EDL camera footage shows this.
      source: arXiv 2007.04869; NASA Mars EDL
    aurora:
      status: visible
      hex: '#48c890'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 520.0
        intensity: 400.0
        label: CO Cameron
      - nm: 500.0
        intensity: 300.0
        label: CO Cameron
      basis: CO Cameron green is the visible signature of Mars aurora.
      source: Mars MAVEN aurora detection
CN:
  formula: CN
  mass_amu: 26.02
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#7080d0'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 388.3
        intensity: 500.0
        label: CN violet B-X (0,0)
      - nm: 387.1
        intensity: 400.0
        label: CN violet (1,1)
      - nm: 421.6
        intensity: 300.0
        label: CN red
      basis: CN violet 388nm is the iconic violet-blue band of CO2-atmosphere reentry plasma (Mars EDL signature).
      source: arXiv 2007.04869; Mars EDL imaging
    aurora:
      status: not_emitter
      hex: null
      basis: CN production requires N + C in vapor — possible in tholin haze upper atmosphere (Titan), but emission ratio in aurora-like conditions not well characterized.
      source: Titan upper-atmosphere photochemistry studies
C2:
  formula: C2
  mass_amu: 24.02
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#5fc890'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 516.5
        intensity: 500.0
        label: C2 Swan d-a (0,0) green
      - nm: 473.7
        intensity: 400.0
        label: C2 Swan (1,2) blue-green
      basis: C2 Swan bands — bright green signature of carbon-rich plasmas (Mars EDL + comet comas).
      source: Comet coma + arXiv 2007.04869 CO2 plasma
    aurora:
      status: not_emitter
      hex: null
      basis: C2 doesn't survive in low-density aurora environments; any C is typically in CO or CN.
      source: Upper atmosphere chemistry
H2:
  formula: H2
  mass_amu: 2.02
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#ffc142'
      hex_basis: cie_computed
      emission_bands:
      - nm: 656.3
        intensity: 800.0
        label: Hα (dissociation product)
      - nm: 486.1
        intensity: 200.0
        label: Hβ
      - nm: 600.0
        intensity: 300.0
        label: H2 Werner band visible
      basis: H2 mostly dissociates → atomic H Balmer dominates. Pink-red plasma. Gas-giant reentry chemistry.
      source: Brown dwarf aurora; H2 plasma physics
    aurora:
      status: visible
      hex: '#ffaab6'
      hex_basis: cie_computed
      emission_bands:
      - nm: 656.3
        intensity: 1000.0
        label: Hα (Lyman aurora secondary)
      - nm: 486.1
        intensity: 200.0
        label: Hβ
      basis: Jupiter/Saturn aurorae — dominantly UV (Lyman α 121nm + H2 Werner/Lyman bands). Visible band shows weak Hα.
      source: Jupiter Hubble aurora imaging
CH:
  formula: CH
  mass_amu: 13.02
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#3b00ff'
      hex_basis: cie_computed
      emission_bands:
      - nm: 431.3
        intensity: 400.0
        label: CH A-X (0,0) blue
      - nm: 387.1
        intensity: 200.0
        label: CH B-X UV
      - nm: 387.3
        intensity: 200.0
        label: CH
      basis: CH 431nm blue from methane dissociation in shock layer. Common in Titan / sub-Neptune reentry.
      source: Hydrocarbon combustion; comet spectra
    aurora:
      status: not_emitter
      hex: null
      basis: CH doesn't persist in low-density aurora; CH4 photolysis products are mostly C2H, C2H2 (no strong visible emitter).
      source: Titan photochemistry literature
CO2:
  formula: CO2
  mass_amu: 44.01
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: 'CO2 itself dissociates in shock layer. Visible plasma color comes from products: CO Cameron green + C2 Swan + CN violet + atomic O. See CO, C2, CN, O entries.'
      source: CO2 reentry chemistry; arXiv 2007.04869
      dissociation_products:
      - CO
      - C2
      - CN
      - O
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates above ~80 km. Emission goes to CO, O.
      source: Mars/Venus upper atmosphere photochemistry
      dissociation_products:
      - CO
      - O
H2O:
  formula: H2O
  mass_amu: 18.02
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: H2O dissociates → atomic H (Balmer) + OH (Meinel UV). Visible plasma is dominantly H Hα pink.
      source: Steam atmosphere reentry models
      dissociation_products:
      - H
      - OH
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates above ~80 km; emission from H Balmer + OH.
      source: Comet outgassing parallels
      dissociation_products:
      - H
      - OH
CH4:
  formula: CH4
  mass_amu: 16.04
  atoms: 5
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: CH4 dissociates → CH (431nm blue) + C2 (Swan green) + Hα. Titan reentry signature.
      source: Titan reentry; hydrocarbon combustion
      dissociation_products:
      - CH
      - C2
      - H
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates; products mostly aliphatic radicals without strong visible emission. Tholin chemistry forms haze.
      source: Titan upper-atmosphere photochemistry
      dissociation_products:
      - CH
      - C2H
      - C2H2
NH3:
  formula: NH3
  mass_amu: 17.03
  atoms: 4
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: NH3 dissociates → NH + H. Weak emission, mostly Hα + NH bands.
      source: Ice-giant atmosphere chemistry
      dissociation_products:
      - NH
      - H
      - N
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates; products N + H carry emission.
      source: Ice-giant photochemistry
      dissociation_products:
      - N
      - H
SO2:
  formula: SO2
  mass_amu: 64.06
  atoms: 3
  regimes:
    reentry_plasma:
      status: visible
      hex: '#00a9ff'
      hex_basis: cie_computed
      emission_bands:
      - nm: 280.0
        intensity: 100.0
        label: SO2 A-X UV (V≈0)
      - nm: 340.0
        intensity: 100.0
        label: SO2 UV
      - nm: 470.0
        intensity: 200.0
        label: SO continuum
      basis: SO2 dissociates to SO + O. Some weak visible continuum. Venus / Io plume reentry territory.
      source: Venus atmospheric chemistry; Io plume spectra
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates → SO + O. Io plasma torus has SO2+/S+/O+ ion emission but that's a different regime.
      source: Io plasma torus studies
      dissociation_products:
      - SO
      - O
SO:
  formula: SO
  mass_amu: 48.06
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#6c98a8'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 470.0
        intensity: 300.0
        label: SO A-X visible continuum
      - nm: 250.0
        intensity: 100.0
        label: SO A-X UV (V≈0)
      - nm: 282.0
        intensity: 100.0
        label: SO B-X UV
      basis: SO A 3Π - X 3Σ band system. Strong UV component + visible continuum near 470nm gives pale blue-green appearance. Co-emits with NO continuum in Venus airglow.
      source: Venus airglow studies; Io plasma torus; NIST SO
    aurora:
      status: visible
      hex: '#7aa8b8'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 470.0
        intensity: 200.0
        label: SO A-X visible
      - nm: 500.0
        intensity: 150.0
        label: SO continuum
      basis: SO contributes to airglow + Io magnetosphere aurora. Pale blue-green continuum.
      source: Io aurora observations; Venus night airglow
NH:
  formula: NH
  mass_amu: 15.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#ffb5c0'
      hex_basis: cie_computed
      emission_bands:
      - nm: 336.0
        intensity: 300.0
        label: NH A 3Π - X 3Σ (UV dominant)
      - nm: 470.0
        intensity: 80.0
        label: NH visible band (faint)
      - nm: 630.0
        intensity: 50.0
        label: NH (b 1Σ) faint
      basis: NH A 3Π - X 3Σ system. Dominant UV at 336nm; visible bands weak but present. NH3 dissociation product in ice-giant reentry.
      source: NIST NH; comet coma; ice-giant chemistry
    aurora:
      status: visible
      hex: '#00a9ff'
      hex_basis: cie_computed
      emission_bands:
      - nm: 336.0
        intensity: 400.0
        label: NH A-X UV
      - nm: 470.0
        intensity: 100.0
        label: NH visible faint
      basis: NH from NH3 photolysis in sub-Neptune / ice-giant upper atmosphere. Mostly UV; faint visible blue.
      source: Titan + ice-giant upper-atmosphere chemistry
H2S:
  formula: H2S
  mass_amu: 34.08
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: H2S dissociates in shock layer → SH + H, then → S + H. Visible plasma comes from SO continuum (if O present) + S atomic. Volcanic outgassing reentry signature.
      source: Venus + Io plume volcanic chemistry
      dissociation_products:
      - S
      - SO
      - H
    aurora:
      status: not_emitter
      hex: null
      basis: Photo-dissociates in upper atmosphere → S + H. Sulfur contributes to weak airglow if abundant.
      source: Volcanic photochemistry; Io plume
      dissociation_products:
      - S
      - H
O3:
  formula: O3
  mass_amu: 48.0
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: O3 dissociates rapidly above ~600K → O2 + O. At reentry temps, essentially zero O3 survives. Visible plasma from O atomic + O2 bands. Chappuis-band blue color is absorption, not emission.
      source: Atmospheric photochemistry; Chappuis band literature
      dissociation_products:
      - O2
      - O
    aurora:
      status: not_emitter
      hex: null
      basis: O3 photolysis above 80 km fuels OH Meinel airglow (O3 + hν → O2 + O*; O* + H2O → 2 OH*). Indirect emitter via OH.
      source: OH Meinel airglow mechanism
      dissociation_products:
      - OH
      - O
      - O2
HCN:
  formula: HCN
  mass_amu: 27.03
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: HCN dissociates → CN + H in shock layer. Visible signature is CN violet 388nm + Hα. Tholin haze + sub-Neptune reentry.
      source: Titan tholin chemistry; comet HCN observations
      dissociation_products:
      - CN
      - H
    aurora:
      status: not_emitter
      hex: null
      basis: Photodissociates in upper atmosphere → CN + H. CN violet from this process possible in Titan-class aurorae but observation limited.
      source: Titan upper-atmosphere photochemistry
      dissociation_products:
      - CN
      - H
TiO:
  formula: TiO
  mass_amu: 63.87
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Titanium monoxide is primarily a *thermal opacity* signature, not a plasma emitter. γ-system (A 3Φ - X 3Δ) red bands at 670/705/770nm dominate M-dwarf atmospheric opacity and lava-world surface glow. α-system (B 3Π - X 3Δ) at 487nm contributes blue-green minority. At reentry plasma temps (8000-15000 K) TiO dissociates to Ti + O — direct emission negligible.
      source: NIST TiO; M-dwarf opacity literature
      upgrade_when: Future `thermal_emission` regime is added (covers lava-world surface + cool-dwarf atmosphere thermal radiation, not shock-heated plasma)
    aurora:
      status: no_data
      hex: null
      basis: Not applicable at typical aurora altitudes — TiO requires high-T atmosphere where it's a thermal opacity signature, not an electron-impact emitter.
      source: —
      upgrade_when: Hot-Jupiter Phase 3 with very high-T upper atmosphere
SiO:
  formula: SiO
  mass_amu: 44.08
  atoms: 2
  regimes:
    reentry_plasma:
      status: not_visible_to_humans
      hex: null
      basis: Silicon monoxide emission is dominated by IR rotational-vibrational bands (fundamental at 8μm + overtones). Electronic transitions UV 220-280nm. Visible γ-system bands at 433/471nm exist but are perceptually negligible vs IR thermal continuum. Lava-world silicate vapor candidate.
      source: NIST SiO; lava-planet atmosphere models
      upgrade_when: Phase 3 lava world with explicit visible-band SiO emission scenario
    aurora:
      status: no_data
      hex: null
      basis: Not relevant at aurora altitudes (SiO requires high surface T).
      source: —
      upgrade_when: —
FeO:
  formula: FeO
  mass_amu: 71.84
  atoms: 2
  regimes:
    reentry_plasma:
      status: visible
      hex: '#ff6030'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 580.0
        intensity: 400.0
        label: FeO B-X (0,0) orange
      - nm: 597.0
        intensity: 350.0
        label: FeO B-X (0,1)
      - nm: 612.0
        intensity: 300.0
        label: FeO B-X (0,2)
      - nm: 560.0
        intensity: 200.0
        label: FeO B-X high-v
      basis: Iron monoxide B-X orange band system 580-612nm is the iconic afterglow color of meteor ablation — the orange streak you see behind a bright meteor is largely FeO chemiluminescence (Fe + O3 → FeO* + O2; FeO* → FeO + hν). Same chemistry in meteor-class reentry of rocky bodies.
      source: Meteor spectroscopy (Jenniskens 2007); NIST FeO B-X
    aurora:
      status: no_data
      hex: null
      basis: Meteor aurora signature is mostly atomic Fe (element DB) plus the FeO orange afterglow in the wake. Whether 'aurora' (magnetospheric) FeO emission exists for any natural body is not well documented.
      source: Meteor aurora literature
      upgrade_when: —
MgO:
  formula: MgO
  mass_amu: 40.3
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: MgO B 1Σ - X 1Σ green band system near 500nm exists, but in plasma MgO dissociates rapidly and the visible signature is dominated by atomic Mg b triplet (516.7/517.3/518.4nm — see element DB Mg entry). MgO direct emission contribution to perceived color is negligible vs atomic Mg.
      source: NIST MgO; meteor spectroscopy
      dissociation_products:
      - Mg
      - O
      upgrade_when: Phase 3 lava-world scenario where MgO molecular band is explicitly modeled vs atomic Mg
    aurora:
      status: no_data
      hex: null
      basis: Atomic Mg b triplet dominates in low-density meteor aurora.
      source: Meteor aurora literature
      dissociation_products:
      - Mg
      - O
      upgrade_when: —
VO:
  formula: VO
  mass_amu: 66.94
  atoms: 2
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: 'Vanadium monoxide γ-system 570-580nm + α-system 786-854nm (Wing-Ford band) is a diagnostic feature in late M-dwarf and brown-dwarf atmospheric opacity. Same caveat as TiO: it''s a thermal-opacity signature, not a shock-plasma emitter. At reentry temps dissociates to V + O.'
      source: NIST VO; late-M/brown-dwarf atmosphere literature (Allard et al.)
      upgrade_when: Future `thermal_emission` regime, OR a NearStars planet around an L-dwarf
    aurora:
      status: no_data
      hex: null
      basis: Not applicable.
      source: —
      upgrade_when: —
HCl:
  formula: HCl
  mass_amu: 36.46
  atoms: 2
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: HCl intrinsic emission is dominated by IR vibrational-rotational fundamentals (~3.4μm) + UV electronic transitions (170-220nm V→0). At plasma temps HCl dissociates rapidly to H + Cl. Visible signature inherits from atomic H Balmer + atomic Cl I (754nm + visible bands; see element DB).
      source: NIST HCl; Venus atmospheric chemistry
      dissociation_products:
      - H
      - Cl
    aurora:
      status: not_emitter
      hex: null
      basis: Photodissociates above ~80km → H + Cl. Visible contribution via atomic Cl (faint visible) + Hα.
      source: Atmospheric photochemistry
      dissociation_products:
      - H
      - Cl
HF:
  formula: HF
  mass_amu: 20.01
  atoms: 2
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: HF intrinsic emission is dominantly IR (3μm vibrational) + UV electronic. No significant visible band. At plasma temps dissociates → H + F. F atomic emission also mostly UV/IR — essentially invisible in this regime.
      source: NIST HF; comet HF observations
      dissociation_products:
      - H
      - F
    aurora:
      status: not_emitter
      hex: null
      basis: Photodissociates; products invisible. HF rarely seen in non-cometary aurora contexts.
      source: Comet HF literature
      dissociation_products:
      - H
      - F
C2H2:
  formula: C2H2
  mass_amu: 26.04
  atoms: 4
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: 'Acetylene undergoes stepwise plasma dissociation: C2H2 + e⁻ → C2H + H, C2H → C2 + H, 2C2H → C2 + C2H2. Visible signature is the sum of C2 Swan (516/473nm green) + CH (431nm blue) + atomic Hα. Titan tholin precursor + Jupiter auroral hydrocarbon chemistry.'
      source: Titan + sub-Neptune hydrocarbon photochemistry; Jupiter auroral H2/C chemistry
      dissociation_products:
      - C2
      - CH
      - H
    aurora:
      status: not_emitter
      hex: null
      basis: 'Photolyzes above ~80km in tholin chemistry. Products: C2H, C2, CH, H — direct emission via C2 Swan + Hα in Jovian-class aurora.'
      source: Titan upper-atmosphere photochemistry; Jupiter Hubble observations
      dissociation_products:
      - C2
      - CH
      - H
NH2:
  formula: NH2
  mass_amu: 16.02
  atoms: 3
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: Amidogen — NH3 photolysis intermediate. At reentry plasma temperatures NH2 dissociates rapidly to NH + H. Visible signature inherits from NH bands (336nm UV + faint visible) + atomic Hα.
      source: NIST NH2; ice-giant chemistry
      dissociation_products:
      - NH
      - H
    aurora:
      status: visible
      hex: '#e87850'
      hex_basis: canonical_descriptor
      emission_bands:
      - nm: 597.6
        intensity: 300.0
        label: NH2 α-band A-X (0,9,0)
      - nm: 610.6
        intensity: 350.0
