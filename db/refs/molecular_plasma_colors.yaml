H2SO4:
  formula: H2SO4
  mass_amu: 98.08
  atoms: 7
  regimes:
    reentry_plasma:
      status: not_emitter
      hex: null
      basis: Sulfuric acid — Venus cloud chemistry. Dissociates → SO3 + H2O → SO2 + O + ... Cascades to SO + S emission.
      source: Venus cloud chemistry
      dissociation_products:
      - SO3
      - SO2
      - SO
      - H2O
      - H
    aurora:
      status: not_emitter
      hex: null
      basis: Photolyzes; products feed SO + atomic S emission.
      source: Venus upper-atmosphere photochemistry
      dissociation_products:
