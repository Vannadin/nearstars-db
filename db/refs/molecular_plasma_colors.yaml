NH2:
  formula: NH2
  mass_amu: 16.02
  atoms: 3
  regimes:
    reentry_plasma:
      status: no_data
      hex: null
      basis: Amidogen — NH3 photolysis intermediate. Visible band system around 570-690nm (NH2 α-bands). Not characterized for our plasma regime.
