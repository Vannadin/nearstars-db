# Computed LTE atomic plasma-emission color per element — the periodic table's
# `lte_plasma` regime. Built by scripts/refs/build_lte_plasma_colors.py from NIST
# ASD neutral lines via the saha_boltzmann/cie_color machinery. Optically-thin
# neutral emission at 3500K (the element's spectral fingerprint).
#
# status: visible (hex + confidence + dominant_nm) | no_measured_spectra (null).
# confidence=low: dominant emission line sits where the eye barely responds
#   (alkali IR resonance lines) so the perceived color is edge-sensitive.
# This is the ATOMIC color; where the classic flame color is molecular (CaOH,
# SrOH) it differs from the curated flame regime — that is expected.
