      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_h_alpha_ew_angstrom: -0.044
      uncertainty_h_alpha_ew_angstrom: 0.016
      method: h_alpha
      recommended: true
      notes: Low-level, near-inactive.
      reference: Schofer et al. 2019
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
