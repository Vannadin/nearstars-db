      method: sed_fitting
      recommended: true
      notes: 'Cross-ID: G 192-15 = GJ 3380 = Karmn J06024+498.'
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3145
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.002072
      uncertainty_lsun: 2.45e-05
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    radius_measurements:
    - value_rsun: 0.1685
      uncertainty_rsun: 0.0057
      method: sed_fitting
      recommended: true
      notes: Stefan-Boltzmann within the same catalog (L + Teff).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_rsun: 0.1536
      uncertainty_rsun: 0.0059
      method: sed_fitting
      recommended: false
