stellar:
  Eta Cassiopeiae B:
    spectype: K7 V
    spectype_bibcode: 1989ApJS...71..245K
    spectype_reference: Keenan & McNeil 1989
    mass_measurements:
    - value_msun: 0.57
      uncertainty_msun: 0.03
      method: binary_orbit
      reference: Halbwachs et al. 2018 (Hipparcos-Gaia astrometric)
      bibcode: 2018A&A...619A..81H
      doi: 10.1051/0004-6361/201833377
      recommended: true
    radius_measurements:
    - value_rsun: 0.66
      uncertainty_rsun: 0.05
      method: spectroscopic_calibration
      reference: Stassun et al. 2019 (TICv8)
      bibcode: 2019AJ....158..138S
      doi: 10.3847/1538-3881/ab3467
      recommended: true
    floor_na:
      teff: Faint K7 companion not resolved in Luck 2017 / SPOCS / Gray 2003 (queries return only the
        primary). Checked 2026-07-20.
      luminosity: Not resolved separately (no per-component bolometric determination).
      activity: No per-component R'HK (blended spectroscopy).
      rotation: No per-component rotation measurement.
      age: No direct determination for B; coeval with A (~6.5 Gyr, Luck 2017 isochrone on the primary)
        but the inheritance is not curated as a measurement per the no-cross-paper rule.
