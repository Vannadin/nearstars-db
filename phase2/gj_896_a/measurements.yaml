stellar:
  GJ 896 A:
    spectype: M3.5 Ve
    spectype_reference: SIMBAD (BD+19 5116A); Curiel et al. 2022
    mass_measurements:
    - value_msun: 0.43599
      uncertainty_msun: 0.00092
      method: binary_orbit
      reference: Curiel et al. 2022
      bibcode: 2022AJ....164...93C
      doi: 10.3847/1538-3881/ac7c66
      recommended: true
    radius_measurements:
    - value_rsun: 0.35
      method: unverified
      reference: Curiel et al. 2022 (citing Morin et al. 2008; Pearce et al. 2020)
      bibcode: 2022AJ....164...93C
      doi: 10.3847/1538-3881/ac7c66
      recommended: true
      notes: 'Approximate radius ~0.35 Rsun. Curiel 2022 does not measure R; quotes it from prior literature,
        so method=unverified (a real literature value outside the radius enum, not a dubious one). No
        uncertainty published. Verbatim (2208.14553.md:191): "GJ 896A has a radius of ~0.35 R_sun (e.g.,
        Morin et al., 2008; Pearce et al., 2020)". Also stated in the intro (2208.14553.md:27): "GJ 896A,
        is an M3.5 star with ... a radius of 0.35 R_sun".'
    rotation_measurements:
    - value_days: 1.061
      method: unverified
      reference: Curiel et al. 2022 (citing Delfosse 1999; Morin 2008; Davison 2015; Pearce 2020)
      bibcode: 2022AJ....164...93C
      doi: 10.3847/1538-3881/ac7c66
      recommended: true
      notes: 'Fast rotator (P_rot = 1.061 d), consistent with an active M3.5Ve flare dwarf. Curiel 2022
        quotes this from prior literature (not its own measurement); the underlying determination is the
        Morin et al. 2008 spectropolarimetric/ZDI study of EQ Peg A. method=unverified because the value
        enters Curiel only as a literature compilation cite. No uncertainty published. Verbatim (2208.14553.md:27):
        "GJ 896A, is an M3.5 star with an estimated mass of 0.39 M_sun, a radius of 0.35 R_sun, a rotation
        period of 1.061 days, and a rotational inclination angle of 60 deg".'
