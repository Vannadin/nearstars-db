stellar:
  GJ 3323:
    mass_measurements:
    - value_msun: 0.164
      uncertainty_msun: null
      method: unverified
      reference: Astudillo Defru et al. 2017
      bibcode: 2017A&A...602A..88A
      doi: 10.1051/0004-6361/201630153
      recommended: true
    radius_measurements:
    - value_rsun: 0.119
      uncertainty_rsun: 0.027
      method: unverified
      reference: Astudillo Defru et al. 2017
      bibcode: 2017A&A...602A..88A
      doi: 10.1051/0004-6361/201630153
      recommended: true
    teff_measurements:
    - value_k: 3100
      method: sed_fitting
      recommended: true
      notes: CARMENES VOSA SED-grid (100 K grid, sigma~50 K).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3288
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.003612
      uncertainty_lsun: 5.94e-05
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    rotation_measurements:
    - value_days: 93.87
      method: photometric_variability
      recommended: true
      notes: Shan 2024 own determination; Schofer 2019 lists 88.5 d.
      reference: Shan et al. 2024
      bibcode: 2024A&A...684A...9S
      doi: 10.1051/0004-6361/202346794
    activity_measurements:
    - value_h_alpha_ew_angstrom: -0.638
      uncertainty_h_alpha_ew_angstrom: 0.012
      method: h_alpha
      recommended: true
      notes: Strong emission — active M4.0Ve; log LHa/Lbol = -4.579 (Schofer).
      reference: Schofer et al. 2019
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
    - value_log_rhk: -4.72
      uncertainty_log_rhk: 0.028
      method: log_rhk
      recommended: false
      notes: Compiled (Shan 2024).
      reference: Shan et al. 2024
      bibcode: 2024A&A...684A...9S
      doi: 10.1051/0004-6361/202346794
    floor_na:
      age: No published age (not in Engle 2024; Shan 2024 Age column undetermined; ADS sweep negative,
        2026-07-20).
