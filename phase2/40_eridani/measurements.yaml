stellar:
  40 Eridani C:
    teff_k: 3167
    teff_bibcode: 2015ApJ...804...64M
    spectype: M4.5 Ve
    mass_measurements:
    - value_msun: 0.198
      uncertainty_msun: 0.0042
      method: binary_orbit
      reference: Mason et al. 2021
      bibcode: 2021AJ....162...53M
      doi: 10.3847/1538-3881/abfaa2
      recommended: true
    - value_msun: 0.2041
      uncertainty_msun: 0.0064
      method: binary_orbit
      reference: Mason, Hartkopf & Miles 2017
      bibcode: 2017AJ....154..200M
      doi: 10.3847/1538-3881/aa803e
      recommended: false
    radius_measurements:
    - value_rsun: 0.274
      uncertainty_rsun: 0.011
      method: spectroscopic_calibration
      reference: Mann et al. 2015
      bibcode: 2015ApJ...804...64M
      doi: 10.1088/0004-637X/804/1/64
      recommended: true
    teff_measurements:
    - value_k: 3167
      uncertainty_k: 61
      method: low_res_spectroscopy
      reference: Mann et al. 2015
      bibcode: 2015ApJ...804...64M
      doi: 10.1088/0004-637X/804/1/64
      recommended: true
    luminosity_measurements:
    - value_lsun: 0.00651
      uncertainty_lsun: 0.00013
      method: bolometric_flux
