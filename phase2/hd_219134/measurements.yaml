stellar:
  HD 219134:
    teff_k: 4858
    spectype: K3 V
    meta_notes: 'Phase 2 (2026-05-31). Radius: Ligi et al. 2019 VEGA/CHARA interferometry (theta_LD =
      1.035 +/- 0.021 mas) gives R = 0.726 +/- 0.014 Rsun, replacing the prior DB unverified 0.778 Rsun
      (Gillon 2017). Mass tiebreak: Ligi 2019 report a DIRECT mass M = 0.696 +/- 0.078 Msun from the interferometric
      radius combined with the transit-derived stellar density (rho = 1.82 +/- 0.19 rho_sun); this is
      recommended over the evolutionary value (Motalebi 2015 SYCLIST 0.78 +/- 0.02; Ligi C2kSMO range
      0.755-0.810, reference model 0.755 +/- 0.040) because it is a measurement rather than a model, though
      it carries ~11% uncertainty and no clean schema method (recorded as method=unverified, the escape
      hatch for a real technique outside the whitelist). The two agree at ~1.5 sigma. Teff = 4858 +/-
      50 K (Ligi interferometric, F_bol + theta_LD); Motalebi SPC gives 4941 +/- 50 K (alt). Luminosity
      L = 0.264 +/- 0.004 Lsun (Ligi bolometric flux). Activity: Johnson et al. 2016 measure an 11.7 yr
      (4230 +/- 100 d) S-index magnetic cycle and a mean <log R''HK> = -4.89. Rotation is genuinely contested:
      Motalebi 2015 found 42.3 d from log R''HK + CCF FWHM/bisector periodograms; Johnson 2016 found 22.83
      +/- 0.03 d in the Ca II S_HK series (possibly the first harmonic of ~45 d differential rotation,
      and identical to planet f''s 22.8 d period — the basis for f being contested); Vogt 2015 estimated
      ~20 d from v sin i = 1.8 km/s. No photometric period exists (Vogt APT photometry is flat to ~0.0002
      mag), so all candidates use method=unverified. Recommended: Johnson 22.83 d (most precise, dedicated
      S_HK analysis), with the 42.3 d alternative documented. Age poorly constrained (models 0.2-13.8
      Gyr; activity ~3-9 Gyr) -> omitted. [Fe/H] skipped per policy. Effectively single: a V~9.4 M dwarf
      lies at ~106.6" (~700 AU projected, P~20 kyr; Eggleton & Tokovinin 2008 via Vogt 2015) -> meta note
      only, NOT a binary_orbits entry.'
    mass_measurements:
    - value_msun: 0.696
      uncertainty_msun: 0.078
      method: unverified
      reference: Ligi et al. 2019
      bibcode: 2019A&A...631A..92L
      doi: 10.1051/0004-6361/201936259
      recommended: true
    - value_msun: 0.78
      uncertainty_msun: 0.02
      method: evolutionary_model
      reference: Motalebi et al. 2015
      bibcode: 2015A&A...584A..72M
      doi: 10.1051/0004-6361/201526822
      recommended: false
    radius_measurements:
    - value_rsun: 0.726
      uncertainty_rsun: 0.014
      method: interferometry
      reference: Ligi et al. 2019
      bibcode: 2019A&A...631A..92L
      doi: 10.1051/0004-6361/201936259
      instrument: VEGA/CHARA
      angular_diameter_mas: 1.035
      angular_diameter_uncertainty_mas: 0.021
      recommended: true
      notes: 'VEGA/CHARA visible-wavelength interferometry, limb-darkened angular diameter theta_LD =
        1.035 +/- 0.021 mas. Replaces the prior DB unverified 0.778 Rsun. Verbatim: "we measure a stellar
        radius ... of R_star = 0.726 +/- 0.014 R_sun". Smaller than the earlier CHARA Classic value (Boyajian
        2012b theta = 1.106 +/- 0.007 mas) because VEGA reaches higher spatial frequencies.'
    - value_rsun: 0.77
      uncertainty_rsun: 0.02
      method: evolutionary_model
      reference: Vogt et al. 2015
      bibcode: 2015ApJ...814...12V
      doi: 10.1088/0004-637X/814/1/12
      recommended: false
      notes: 'Takeda et al. 2007 evolutionary R adopted by Vogt 2015 Table 1. Verbatim: "Takeda et al.
        (2007) derive mass and radius estimates of M/Msun = 0.794 and R/Rsun = 0.77". Consistent with
        the Ligi interferometric value at ~2 sigma.'
    teff_measurements:
    - value_k: 4858
      uncertainty_k: 50
      method: interferometry
      reference: Ligi et al. 2019
      bibcode: 2019A&A...631A..92L
      doi: 10.1051/0004-6361/201936259
      recommended: true
    - value_k: 4941
      uncertainty_k: 50
      method: high_res_spectroscopy
      reference: Motalebi et al. 2015
      bibcode: 2015A&A...584A..72M
      doi: 10.1051/0004-6361/201526822
      recommended: false
    luminosity_measurements:
    - value_lsun: 0.264
      uncertainty_lsun: 0.004
      method: bolometric_flux
      reference: Ligi et al. 2019
      bibcode: 2019A&A...631A..92L
      doi: 10.1051/0004-6361/201936259
      recommended: true
    rotation_measurements:
    - value_days: 22.83
      uncertainty_days: 0.03
      method: unverified
      reference: Johnson et al. 2016
      bibcode: 2016ApJ...821...74J
      doi: 10.3847/0004-637X/821/2/74
      recommended: true
      notes: 'From a sinusoid fit to the post-2007 Ca II S_HK time series (NOT photometric; no rotation
        enum maps to S_HK periodogram -> method=unverified). Verbatim: "This yielded a period of 22.83
        +/- 0.03 days with S_HK amplitude 0.0077 +/- 0.0003, which matches the orbital period of HD 219134
        f found by V15 to within one standard deviation" -- this coincidence is the basis for planet f
        being flagged controversial. CONTESTED: Motalebi 2015 instead found P_rot = 42.3 d (log R''HK
        + CCF FWHM/bisector); Johnson notes 22.83 d may be the first harmonic of a ~45 d period under
        solar-like differential rotation. Vogt 2015 estimated ~20 d from v sin i = 1.8 km/s. No formal
        uncertainty on the 42.3 d value.'
    - value_days: 42.3
      method: unverified
      reference: Motalebi et al. 2015
      bibcode: 2015A&A...584A..72M
      doi: 10.1051/0004-6361/201526822
      recommended: false
      notes: 'From GLS periodograms of log R''HK, CCF FWHM, and bisector span (HARPS-N). Verbatim: "A
        periodic variation around 42.3 days is indeed observed in the log R''HK as well as in the CCF
        FWHM and in the bisector span ... we can therefore safely consider the 42.3 days as a valid estimation
        of the rotational period of the star (P_rot)." No published formal uncertainty.'
    activity_measurements:
    - value_log_rhk: -4.89
      method: log_rhk
      reference: Johnson et al. 2016
      bibcode: 2016ApJ...821...74J
      doi: 10.3847/0004-637X/821/2/74
      recommended: true
