stellar:
  GJ 436:
    mass_measurements:
    - value_msun: 0.47
      uncertainty_msun: 0.07
      method: unverified
      reference: Maciejewski et al. 2014
      bibcode: 2014AcA....64..323M
      doi: null
      recommended: true
    radius_measurements:
    - value_rsun: 0.455
      uncertainty_rsun: 0.018
      method: unverified
      reference: Maciejewski et al. 2014
      bibcode: 2014AcA....64..323M
      doi: null
      recommended: true
    teff_measurements:
    - value_k: 3400
      method: sed_fitting
      recommended: true
      notes: CARMENES BT-Settl SED-grid Teff (100 K grid, sigma~50 K).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3505
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.024313
      uncertainty_lsun: 0.00034
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    rotation_measurements:
    - value_days: 44.6
      uncertainty_days: 2.0
      method: photometric_variability
      recommended: true
      notes: 'SuperWASP, FAP<1e-4; Suarez Mascareno lit 44.09 d. CONTESTED: Engle 2024 adopts 71.4 d for
        its gyro age — literature disagrees on GJ 436 Prot.'
      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_log_rhk: -5.457
      uncertainty_log_rhk: 0.062
      method: log_rhk
      recommended: true
      notes: N=171 HARPS spectra. Shan 2024 compiles -5.27.
      reference: Astudillo-Defru et al. 2017
      bibcode: 2017A&A...600A..13A
      doi: 10.1051/0004-6361/201527078
    age_measurements:
    - value_gyr: 4.6
      method: gyrochronology
      recommended: true
      notes: log Age = 0.659 +/- 0.076 dex -> 4.6 (+0.9/-0.7) Gyr; from adopted Prot 71.4 d (longer than
        the curated 44.6 d — see rotation note).
      reference: Engle 2024
      bibcode: 2024ApJ...960...62E
      doi: 10.3847/1538-4357/ad0840
