      reference: Passegger et al. 2019 (via Quirrenbach et al. 2022 Table 1)
      bibcode: 2019A&A...627A.161P
      doi: 10.1051/0004-6361/201935679
      recommended: false
    luminosity_measurements:
    - value_lsun: 0.00254
      uncertainty_lsun: 2.0e-05
      method: bolometric_flux
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
      recommended: true
    - value_lsun: 0.002519
      uncertainty_lsun: 3.3e-05
      method: bolometric_flux
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
      recommended: false
    rotation_measurements:
    - value_days: 1.96
      uncertainty_days: 0.02
      method: photometric_variability
      reference: Quirrenbach et al. 2022
      bibcode: 2022A&A...663A..48Q
      doi: 10.1051/0004-6361/202142915
      recommended: true
      notes: Active fast rotator (BY Dra / flare star). P_rot confirmed from OSN R + V band photometry
        (strong peak at 1.96 d) and corroborated by the chromatic 1.96 d RV modulation plus H-alpha /
        Ca II IRT line variability. Verbatim Quirrenbach 2022. "the rotation period is 1.96 +/- 0.02 d."
        Shan et al. 2024 (CARMENES rotation catalog, arXiv 2401.09550) narratively flags TZ Ari as the
        lone RV-discovered planet host with P_rot < 15 d, but its per-star tabulated value lives in VizieR/CDS,
        not the fetched ar5iv body. Earlier literature 30 d (Astudillo-Defru 2017, cited by Feng 2020)
        is the superseded value.
    activity_measurements:
    - value_h_alpha_ew_angstrom: -1.906
      uncertainty_h_alpha_ew_angstrom: 0.025
      method: h_alpha
      reference: Schoefer et al. 2019 (via Quirrenbach et al. 2022 Table 1)
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
      recommended: true
    - value_log_rhk: -4.79
      uncertainty_log_rhk: 0.42
      method: log_rhk
      reference: Astudillo-Defru et al. 2017 (via Quirrenbach et al. 2022 Table 1)
      bibcode: 2017A&A...600A..13A
      doi: 10.1051/0004-6361/201527078
      recommended: false
    floor_na:
