stellar:
  Fomalhaut:
    teff_k: 8590
    teff_bibcode: 2012ApJ...754L..20M
    spectype: A4 V
    spectype_bibcode: 1989ApJS...71..245K
    spectype_reference: Keenan & McNeil 1989
    meta_notes: 'Stellar Phase 2 curated 2026-05-30 under curation-data-contract (Tier 1 inversion fix).
      Mass/radius/Teff/luminosity/age all anchored on Mamajek 2012 (2012ApJ...754L..20M), the dedicated
      age paper that re-derives the fundamental parameters and all values are cache-verified from its
      text + Table 2: mass 1.92 +/- 0.02 Msun (mean of 4 evolutionary-track sets, protosolar composition),
      R 1.842 +/- 0.019 Rsun and Teff 8590 +/- 73 K (van Belle 1999 relation from Absil 2009 theta_LD
      2.223 +/- 0.022 mas + Davis 2005 f_bol), L 16.63 +/- 0.48 Lsun (bolometric, Davis f_bol + van Leeuwen
      2007 parallax), age 440 +/- 40 Myr (weighted mean of Fomalhaut A isochronal 450 +/- 40 and the TW
      PsA companion''s gyro/Li/X-ray ages 400 +/- 70). RADIUS/Teff DIVERGENCE: Davis et al. 2005 give
      a smaller R 1.744 / hotter Teff 8819 because they did NOT subtract the resolved circumstellar K-band
      excess; Absil 2009 corrected for it (theta_LD 2.223 mas), so the Mamajek/Absil values are preferred.
      The angular diameter is mildly oblate (1.021, Absil 2009), gravity darkening is mild (not pole-on
      like Vega). [Fe/H] near-solar: Mamajek assumes protosolar (Z 0.017, motivated by the solar metallicity
      of companion TW PsA); Dunkin 1997 measured -0.03; A-star spectroscopic [Fe/H] is scattered/unreliable
      (Erspamer 2003 +0.43). ROTATION: only v sin i ~93 km/s (Royer 2007 compilation, 85-100 km/s spread);
      NO measured photometric period for the A-star (the 10.3 d period belongs to the K-dwarf companion
      TW PsA) -- not recorded. ACTIVITY: log R''HK is not physically defined for an A4 V star (no convective
      dynamo) and no standalone coronal X-ray detection of the A primary exists -- intentionally not recorded.'
    mass_measurements:
    - value_msun: 1.92
      uncertainty_msun: 0.02
      method: evolutionary_model
      reference: Mamajek 2012
      bibcode: 2012ApJ...754L..20M
      doi: 10.1088/2041-8205/754/2/L20
      recommended: true
    radius_measurements:
    - value_rsun: 1.842
      uncertainty_rsun: 0.019
      method: interferometry
      reference: Mamajek 2012
      bibcode: 2012ApJ...754L..20M
      doi: 10.1088/2041-8205/754/2/L20
      instrument: VLTI/VINCI (theta_LD from Absil et al. 2009)
      angular_diameter_mas: 2.223
      angular_diameter_uncertainty_mas: 0.022
      recommended: true
      notes: R from van Belle 1999 relation using Absil 2009 excess-corrected theta_LD 2.223 mas + Davis
        2005 f_bol. Davis 2005 (uncorrected) gives a smaller R 1.744 / hotter Teff 8819.
    teff_measurements:
    - value_k: 8590
      uncertainty_k: 73
      method: interferometry
      reference: Mamajek 2012
      bibcode: 2012ApJ...754L..20M
      doi: 10.1088/2041-8205/754/2/L20
      recommended: true
    luminosity_measurements:
    - value_lsun: 16.63
      uncertainty_lsun: 0.48
      method: bolometric_flux
      reference: Mamajek 2012
      bibcode: 2012ApJ...754L..20M
      doi: 10.1088/2041-8205/754/2/L20
      recommended: true
    metallicity_measurements:
    - value_dex: -0.03
      method: high_res_spectroscopy
      reference: Dunkin et al. 1997
      bibcode: 1997MNRAS.286..604D
      recommended: true
    age_measurements:
    - value_gyr: 0.44
      uncertainty_gyr: 0.04
      method: isochrone
      reference: Mamajek 2012
      bibcode: 2012ApJ...754L..20M
      recommended: true
    inclination_measurements:
    - value_deg: null
      position_angle_deg: 65
      position_angle_uncertainty_deg: 3
      method: spectro_astrometry
      reference: Le Bouquin et al. 2009
      bibcode: 2009A&A...498L..41L
      recommended: true
      notes: 'VLTI/AMBER Br-gamma spectro-astrometry: projected spin-axis PA only; i_star unconstrained
        (>15 deg floor). PA ~ debris-ring PA.'
    rotation_measurements:
    - value_days: 0.98
      method: v_sin_i
      reference: Hadjara et al. 2014
      bibcode: 2014A&A...569A..45H
      doi: 10.1051/0004-6361/201424185
      recommended: true
      notes: No directly measured rotation period exists. Derived from the VLTI/AMBER differential-phase
        3-D spin solution V_eq sin i = 93 +/- 16 km/s, i_star = 90 +/- 9 deg (equator-on), R_eq = 1.8
        +/- 0.2 R_sun; with i measured ~90 deg this is a true period (~23.5 h), not an upper limit. Consistent
        with Royer 2007 v sin i = 93 km/s.
    - value_days: 0.98
      method: v_sin_i
      reference: Royer et al. 2007
      bibcode: 2007A&A...463..671R
      doi: 10.1051/0004-6361:20065224
      recommended: false
      notes: Independent spectroscopic v sin i = 93 km/s (HD 216956); period assumes the Hadjara 2014
        i = 90 deg. Corroborates the recommended value.
