stellar:
  GJ 229:
    mass_measurements:
    - value_msun: 0.509
      uncertainty_msun: 0.02
      method: unverified
      reference: Feng et al. 2022
      bibcode: 2022ApJS..262...21F
      doi: 10.3847/1538-4365/ac7e57
      recommended: true
    teff_measurements:
    - value_k: 3700
      method: sed_fitting
      recommended: true
      notes: GJ 229 A = HD 42581 A = Karmn J06105-218 (the famous T-dwarf host primary).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3837
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.0526
      uncertainty_lsun: 0.00238
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    radius_measurements:
    - value_rsun: 0.5581
      uncertainty_rsun: 0.0197
      method: sed_fitting
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_rsun: 0.5231
      uncertainty_rsun: 0.019
      method: sed_fitting
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    rotation_measurements:
    - value_days: 27.3
      uncertainty_days: 0.2
      method: photometric_variability
      recommended: true
      notes: ASAS; Schofer 2019 and Astudillo 2017 (~25 d) consistent.
      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_h_alpha_ew_angstrom: 0.003
      uncertainty_h_alpha_ew_angstrom: 0.009
      method: h_alpha
      recommended: true
      notes: ~0 in Halpha.
      reference: Schofer et al. 2019
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
    - value_log_rhk: -4.669
      uncertainty_log_rhk: 0.132
      method: log_rhk
      recommended: false
      notes: Moderately active in Ca II — consistent with the 27 d rotation.
      reference: Astudillo-Defru et al. 2017
      bibcode: 2017A&A...600A..13A
      doi: 10.1051/0004-6361/201527078
    age_measurements:
    - value_gyr: 2.82
      uncertainty_gyr: 0.43
      method: gyrochronology
      recommended: true
      notes: 'Converted from log Age = 0.45 +/- 0.062 dex: 2.82 (+0.43/-0.38) Gyr; uncertainty = larger
        side. Prot 27.3 d.'
      reference: Engle et al. 2024
      bibcode: 2024ApJ...960...62E
      doi: 10.3847/1538-4357/ad0840
