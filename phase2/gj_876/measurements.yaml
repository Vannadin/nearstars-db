stellar:
  GJ 876:
    mass_measurements:
    - value_msun: 0.32
      uncertainty_msun: 0.03
      method: unverified
      reference: Rivera et al. 2010
      bibcode: 2010ApJ...719..890R
      doi: 10.1088/0004-637x/719/1/890
      recommended: true
    radius_measurements:
    - value_rsun: 0.3
      uncertainty_rsun: null
      method: unverified
      reference: Rivera et al. 2010
      bibcode: 2010ApJ...719..890R
      doi: 10.1088/0004-637x/719/1/890
      recommended: true
    teff_measurements:
    - value_k: 3200
      method: sed_fitting
      recommended: true
      notes: CARMENES BT-Settl SED-grid Teff (100 K grid, sigma~50 K).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3377
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.012712
      uncertainty_lsun: 0.00025
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    rotation_measurements:
    - value_days: 81.0
      uncertainty_days: 0.8
      method: photometric_variability
      recommended: true
      notes: ASAS; lit 96.7 d (Rivera 2005), Engle 87.95 d.
      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_log_rhk: -5.496
      uncertainty_log_rhk: 0.057
      method: log_rhk
      recommended: true
      notes: N=184.
      reference: Astudillo-Defru et al. 2017
      bibcode: 2017A&A...600A..13A
      doi: 10.1051/0004-6361/201527078
    age_measurements:
    - value_gyr: 5.3
      method: gyrochronology
      recommended: true
      notes: log Age = 0.726 +/- 0.095 dex -> 5.3 (+1.3/-1.0) Gyr; Prot 87.95 d.
      reference: Engle 2024
      bibcode: 2024ApJ...960...62E
      doi: 10.3847/1538-4357/ad0840
