stellar:
  55 Cnc:
    teff_k: 5196
    teff_bibcode: 2011ApJ...740...49V
    spectype: K0IV-V
    mass_measurements:
    - value_msun: 0.905
      uncertainty_msun: 0.015
      method: evolutionary_model
      reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      doi: 10.1088/0004-637X/740/1/49
      recommended: true
      source_title: 'The 55 Cancri System: Fundamental Stellar Parameters, Habitable Zone Planet, and
        Super-Earth Diameter'
    - value_msun: 1.015
      uncertainty_msun: 0.051
      method: evolutionary_model
      reference: Crida et al. 2018 (via Moutou et al. 2025 Table 1)
      bibcode: 2026A&A...705A.190M
      doi: 10.1051/0004-6361/202556146
      recommended: false
    radius_measurements:
    - value_rsun: 0.943
      uncertainty_rsun: 0.01
      method: interferometry
      instrument: CHARA Array
      angular_diameter_mas: 0.711
      angular_diameter_uncertainty_mas: 0.004
      reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      doi: 10.1088/0004-637X/740/1/49
      arxiv: '1107.1936'
      recommended: true
      source_title: 'The 55 Cancri System: Fundamental Stellar Parameters, Habitable Zone Planet, and
        Super-Earth Diameter'
      notes: 'R = 0.943 +/- 0.010 Rsun from CHARA limb-darkened angular diameter theta_LD = 0.711 +/-
        0.004 mas (theta_UD = 0.685 +/- 0.004 mas) combined with Hipparcos parallax. Verbatim Table 1
        (1107.1936.md:25, 1107.1936.md:24). RE-ANCHOR: the DB previously carried this exact 0.943 value
        with method=unverified mis-attributed to Bourrier 2018, which itself cites von Braun 2011 for
        R (1807.04301.md:21).'
    - value_rsun: 0.98
      uncertainty_rsun: 0.016
      method: unverified
      reference: Moutou et al. 2025 (Table 1, citing Crida et al. 2018)
      bibcode: 2026A&A...705A.190M
      doi: 10.1051/0004-6361/202556146
      recommended: false
      notes: R = 0.980 +/- 0.016 Rsun tabulated in Moutou Table 1 (2510.11523.md:20). Larger than the
        direct CHARA radius; method not explicitly stated in cached text (transit-density-derived per
        Crida 2018), so recorded as unverified and not adopted.
    teff_measurements:
    - value_k: 5196
      uncertainty_k: 24
      method: interferometry
      reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      doi: 10.1088/0004-637X/740/1/49
      recommended: true
    - value_k: 5172
      uncertainty_k: 18
      method: high_res_spectroscopy
      reference: Yee et al. 2017 (via Bourrier 2018 Table 1)
      bibcode: 2018A&A...619A...1B
      doi: 10.1051/0004-6361/201833154
      recommended: false
    - value_k: 5198
      uncertainty_k: 31
      method: high_res_spectroscopy
      reference: Moutou et al. 2025 (SPIRou Zeeturbo)
      bibcode: 2026A&A...705A.190M
      doi: 10.1051/0004-6361/202556146
      recommended: false
    luminosity_measurements:
    - value_lsun: 0.582
      uncertainty_lsun: 0.014
      method: bolometric_flux
      reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      doi: 10.1088/0004-637X/740/1/49
      recommended: true
    rotation_measurements:
    - value_days: 38.8
      uncertainty_days: 0.05
      method: photometric_variability
      reference: Bourrier et al. 2018
      bibcode: 2018A&A...619A...1B
      doi: 10.1051/0004-6361/201833154
      recommended: true
      notes: P_rot = 38.8 +/- 0.05 d, adopted by Bourrier 2018 from a sine fit to the H-alpha activity-index
        residuals (Table 1, 1807.04301.md:29; method detail 1807.04301.md:50,56). Season-9 APT photometry
        gives 40.4 +/- 0.8 d and the weighted-mean of all photometric seasons 40.04 +/- 0.39 d; consistent
        with the ~39 d Ca II period of Henry et al. 2000 and 42.7 +/- 2.5 d (Fischer 2008). Moutou 2025
        independently recovers P_rot = 38.7 +/- 0.8 d (GPR; 2510.11523.md:90,32) and adopts 39 d (ZDI,
        Folsom 2020).
    activity_measurements:
    - value_log_rhk: -5.03
      method: log_rhk
      reference: Bourrier et al. 2018
      bibcode: 2018A&A...619A...1B
      doi: 10.1051/0004-6361/201833154
      recommended: true
    sources_extra:
    - reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      note: Companion arXiv ids 1106.1152 (full fundamental-properties paper, von Braun 2011b) and 1107.1936
        (cached AAS proceedings carrying the Table 1 anchor values).
    meta_notes: 'A-B binary has NO published Keplerian orbit. 55 Cnc B (M4.5V) sits at a projected separation
      of ~1065 au (84 arcsec visual; Eggenberger 2004 / Mugrauer 2006), with an estimated orbital period
      of ~30000 yr (Moutou 2025; 2510.11523.md:128,140). Left UNMODELED (note only); do not synthesize
      binary_orbit. Hipparcos V cross-check: DB Gaia-converted V = 5.9501 agrees with the literature/Hipparcos
      V = 5.95 quoted by Bourrier 2018 (1807.04301.md:11) -- no Gaia-saturation discrepancy. [Fe/H] skipped
      per project policy (lit. ~0.31-0.42 dex, super-metal-rich).'
    age_measurements:
    - value_gyr: 10.2
      uncertainty_gyr: 2.5
      method: isochrone
      reference: von Braun et al. 2011
      bibcode: 2011ApJ...740...49V
      doi: 10.1088/0004-637X/740/1/49
      recommended: true
      notes: Isochrone fit anchored on the CHARA interferometric radius (R = 0.943 +/- 0.010 Rsun, Teff
        5196 K), M = 0.905 Msun.
    - value_gyr: 8.1
      uncertainty_gyr: 3.54
      method: gyrochronology
      reference: Maxted et al. 2015
      bibcode: 2015A&A...577A..90M
      doi: 10.1051/0004-6361/201525774
      recommended: false
      notes: Table 4 gyrochronological estimate (Prot 39.0 +/- 9.0 d); same paper's isochronal 10.91 +/-
        1.62 Gyr agrees with von Braun.
