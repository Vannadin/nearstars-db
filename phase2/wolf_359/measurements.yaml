stellar:
  Wolf 359:
    spectype: M6 V
    spectype_bibcode: 1991ApJS...77..417K
    spectype_reference: Kirkpatrick et al. 1991
    mass_measurements:
    - value_msun: 0.11
      uncertainty_msun: 0.011
      method: spectroscopic_calibration
      reference: Pineda et al. 2021 (M dwarf mass-luminosity)
      bibcode: 2021ApJ...918...40P
      doi: 10.3847/1538-4357/ac0aea
      recommended: true
    radius_measurements:
    - value_rsun: 0.144
      uncertainty_rsun: 0.005
      method: spectroscopic_calibration
      reference: Pineda et al. 2021 (Stefan-Boltzmann from L+Teff)
      bibcode: 2021ApJ...918...40P
      doi: 10.3847/1538-4357/ac0aea
      recommended: true
    teff_measurements:
    - value_k: 2800
      method: sed_fitting
      recommended: true
      notes: Mann 2015 2818 +/- 60 K, excellent agreement. Not in Schweitzer.
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    luminosity_measurements:
    - value_lsun: 0.001109
      uncertainty_lsun: 2.31e-05
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    rotation_measurements:
    - value_days: 2.704
      uncertainty_days: 0.003
      method: photometric_variability
      recommended: true
      notes: K2 photometry, FAP<1e-4. Fast rotator — young/active.
      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_h_alpha_ew_angstrom: -7.22
      uncertainty_h_alpha_ew_angstrom: 0.08
      method: h_alpha
      recommended: true
      notes: Halpha in emission (active flare star); log LHa/Lbol = -3.982. Negative pEW = emission.
      reference: Schofer et al. 2019
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
    floor_na:
      age: No published numeric age (fast 2.7 d rotation + Halpha emission imply youth but no gyro/kinematic
        value exists; not in Engle 2024; ADS sweep negative, 2026-07-20).
