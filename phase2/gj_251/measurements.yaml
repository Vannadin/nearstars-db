stellar:
  GJ 251:
    mass_measurements:
    - value_msun: 0.35
      uncertainty_msun: 0.05
      method: unverified
      reference: Beard et al. 2025
      bibcode: 2025AJ....170..279B
      doi: 10.3847/1538-3881/ae0e20
      recommended: true
    radius_measurements:
    - value_rsun: 0.36
      uncertainty_rsun: 0.01
      method: unverified
      reference: Beard et al. 2025
      bibcode: 2025AJ....170..279B
      doi: 10.3847/1538-3881/ae0e20
      recommended: true
    teff_measurements:
    - value_k: 3400
      method: sed_fitting
      recommended: true
      notes: CARMENES VOSA SED-grid (100 K grid, sigma~50 K).
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    - value_k: 3451
      uncertainty_k: 51
      method: high_res_spectroscopy
      recommended: false
      reference: Schweitzer et al. 2019
      bibcode: 2019A&A...625A..68S
      doi: 10.1051/0004-6361/201834965
    luminosity_measurements:
    - value_lsun: 0.01598
      uncertainty_lsun: 0.000351
      method: bolometric_flux
      recommended: true
      reference: Cifuentes et al. 2020
      bibcode: 2020A&A...642A.115C
      doi: 10.1051/0004-6361/202038295
    rotation_measurements:
    - value_days: 122.0
      method: photometric_variability
      recommended: true
      notes: GJ 251 b discovery paper; Shan 2024 Pbest 122.0 d agrees.
      reference: Stock et al. 2020
      bibcode: 2020A&A...643A.112S
      doi: 10.1051/0004-6361/202038820
    - value_days: 18.1
      uncertainty_days: 0.3
      method: photometric_variability
      recommended: false
      notes: SuperWASP 18.1 d — likely alias/harmonic, superseded by the ~122 d period (Stock 2020).
      reference: Diez Alonso et al. 2019
      bibcode: 2019A&A...621A.126D
      doi: 10.1051/0004-6361/201833316
    activity_measurements:
    - value_h_alpha_ew_angstrom: 0.002
      uncertainty_h_alpha_ew_angstrom: 0.01
      method: h_alpha
      recommended: true
      notes: ~0 — inactive.
      reference: Schofer et al. 2019
      bibcode: 2019A&A...623A..44S
      doi: 10.1051/0004-6361/201834114
    - value_log_rhk: -5.38
      uncertainty_log_rhk: 0.024
      method: log_rhk
      recommended: false
      notes: Compiled (Shan 2024).
      reference: Shan et al. 2024
      bibcode: 2024A&A...684A...9S
      doi: 10.1051/0004-6361/202346794
    floor_na:
      age: No published age (not in Engle 2024; Shan 2024 Age column undetermined; ADS sweep negative,
        2026-07-20).
