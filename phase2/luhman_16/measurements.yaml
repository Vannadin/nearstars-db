# Luhman 16 AB (WISE J104915.57-531906.1 AB) Phase 2 measurements -- both BD components, no planets.
# The nearest brown-dwarf binary (~6.5 ly), chosen in-game implementation BD slot.
# Mass (binary_orbit): L&S 2018 recommended (longest baseline + cache-verifiable; Bedin 2024
#   ar5iv-empty, Garcia 2017 larger errors) -- alternates kept, ~5% spread > error bars.
# Radius: assumed 0.9 R_Jup (Faherty 2014, Vrba 2004 prescription) -- no measured radius exists.
# Teff/luminosity: Faherty 2014 Table 4 (1406.1518.md:193). Age: Li I + no low-gravity, 0.1-3 Gyr.
# Rotation: B = Gillon 2013 4.87 hr (first BD weather variability, cache-verified 1304.0481.md:7,39);
#   A = Apai 2021 6.94 hr TENTATIVE (2101.02253.md:91, "we speculate"), recorded unverified.
# Per-value cache pins in docs/phase3/_bib/luhman-16.yaml; rationale in context-notes.md.
stellar:
  Luhman 16 A:
    teff_k: 1310
    teff_bibcode: 2014ApJ...790...90F
    spectype: L7.5
    mass_measurements:
    - value_msun: 0.0320
      uncertainty_msun: 0.0003
      method: binary_orbit
      reference: Lazorenko & Sahlmann 2018
      bibcode: 2018A&A...618A.111L
      doi: 10.1051/0004-6361/201833626
      recommended: true
    - value_msun: 0.0338
      uncertainty_msun: 0.0002
      method: binary_orbit
      reference: Bedin et al. 2024
      bibcode: 2024AN....34530158B
      doi: 10.1002/asna.20230158
      recommended: false
    - value_msun: 0.0327
      uncertainty_msun: 0.0011
      method: binary_orbit
      reference: Garcia et al. 2017
      bibcode: 2017ApJ...846...97G
      doi: 10.3847/1538-4357/aa844f
      recommended: false
    radius_measurements:
    - value_rsun: 0.090
      uncertainty_rsun: 0.010
      method: evolutionary_model
      reference: Faherty et al. 2014
      bibcode: 2014ApJ...790...90F
      doi: 10.1088/0004-637X/790/2/90
      arxiv: '1406.1518'
      recommended: true
      notes: 'No measured radius exists for either component. Faherty 2014 adopts R = 0.9 R_Jup
        (= 0.090 Rsun) via the Vrba et al. 2004 prescription to derive Teff from Lbol (1406.1518.md:137);
        this is the standard field-brown-dwarf radius assumption, not a measurement. ~0.08-0.10 Rsun
        over the 0.1-3 Gyr age range.'
    teff_measurements:
    - value_k: 1310
      uncertainty_k: 30
      method: sed_fitting
      reference: Faherty et al. 2014
      bibcode: 2014ApJ...790...90F
      doi: 10.1088/0004-637X/790/2/90
      recommended: true
    luminosity_measurements:
    - value_lsun: 2.14e-05
      uncertainty_lsun: 2.0e-06
      method: bolometric_flux
      reference: Faherty et al. 2014
      bibcode: 2014ApJ...790...90F
      doi: 10.1088/0004-637X/790/2/90
      recommended: true
    age_measurements:
    - value_gyr: 1.5
      uncertainty_gyr: 1.5
      method: unverified
      reference: Faherty et al. 2014
      bibcode: 2014ApJ...790...90F
      doi: 10.1088/0004-637X/790/2/90
      recommended: true
    rotation_measurements:
    - value_days: 0.2892
      uncertainty_days: 0.02
      method: unverified
      reference: Apai et al. 2021
      bibcode: 2021ApJ...906...64A
      doi: 10.3847/1538-4357/abcb97
      recommended: true
      notes: 'P_rot ~ 6.94 hr is a TENTATIVE attribution to component A (Apai 2021 TESS periodogram,
        "we speculate"; 2101.02253.md:91). A is poorly constrained: Mancini 2015 ~8 hr, Millar-Blanchaer
        2020 assumed 5 or 8 hr; Gillon 2013 detected no periodic signal in A. v sin i = 17.6 km/s
        (Crossfield 2014), slower than B. Recorded unverified; do not treat as a firm period.'
  Luhman 16 B:
    teff_k: 1280
    teff_bibcode: 2014ApJ...790...90F
    spectype: T0.5
    mass_measurements:
    - value_msun: 0.0273
