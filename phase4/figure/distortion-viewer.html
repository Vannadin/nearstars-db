<!DOCTYPE html>
<!-- NearStars 천체 figure 왜곡(편평/삼축) 3D 인스펙터 — 드래그 궤도 회전, 자체완결, CDN 없음 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NearStars — 천체 왜곡 3D</title>
<style>
  :root { --bg:#06080f; --panel:#10131e; --ink:#e8ecf6; --dim:#8893a8; --line:#222838; --accent:#6fb4ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(circle at 50% -10%, #131a2e, #06080f 62%); color:var(--ink);
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; }
  header { padding:20px 18px 6px; text-align:center; }
  h1 { margin:0 0 4px; font-size:19px; }
  .sub { color:var(--dim); font-size:12.5px; max-width:640px; margin:0 auto; }
  .wrap { max-width:760px; margin:0 auto; padding:0 16px 30px; }
  .bodybar { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin:14px 0 10px; }
  .bodybar button { background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:20px;
                    padding:6px 13px; font-size:13px; cursor:pointer; transition:.12s; }
  .bodybar button:hover { color:var(--ink); border-color:#39455e; }
  .bodybar button.on { background:var(--accent); color:#06080f; border-color:var(--accent); font-weight:600; }
  .stage { position:relative; background:#0a0d16; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  canvas { display:block; width:100%; height:58vh; min-height:320px; touch-action:none; cursor:grab; }
  canvas.drag { cursor:grabbing; }
  .hud { position:absolute; left:14px; top:12px; pointer-events:none; }
  .hud .nm { font-size:17px; font-weight:600; } .hud .ty { color:var(--dim); font-size:12px; }
  .hud .mt { color:var(--accent); font-size:13px; font-variant-numeric:tabular-nums; margin-top:3px; }
  .hud .gv { color:var(--dim); font-size:11px; font-variant-numeric:tabular-nums; }
  .hint { position:absolute; right:13px; bottom:11px; color:var(--dim); font-size:11px; pointer-events:none; text-align:right; }
  .controls { display:flex; gap:20px; align-items:center; justify-content:center; flex-wrap:wrap; margin:14px 0 0;
              padding:12px; background:var(--panel); border:1px solid var(--line); border-radius:12px; }
  .controls label { color:var(--dim); font-size:12px; }
  .controls output { color:var(--accent); font-weight:600; font-variant-numeric:tabular-nums; }
  input[type=range]{ width:170px; accent-color:var(--accent); vertical-align:middle; }
  footer { color:var(--dim); font-size:11px; text-align:center; padding:14px 20px 0; }
  code { background:#0c0f18; padding:1px 5px; border-radius:5px; color:#cdd6ea; }
</style>
</head>
<body>
<header>
  <h1>NearStars — 천체 figure 왜곡 인스펙터</h1>
  <p class="sub">드래그로 사방에서 돌려보고 휠/핀치로 확대하세요. 축비 a:b:c는 figure 방법론(<code>body_figure.py</code>)에서 도출. 왜곡은 미세하니 과장 슬라이더로 키워 보세요.</p>
</header>
<div class="wrap">
  <div class="bodybar" id="bodybar"></div>
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="hud"><div class="nm" id="h_nm"></div><div class="ty" id="h_ty"></div><div class="mt" id="h_mt"></div><div class="gv" id="h_gv"></div></div>
    <div class="hint">드래그 = 회전 · 휠 = 확대<br>점선 = 기준 구</div>
  </div>
  <div class="controls">
    <label>왜곡 과장 <output id="exo">×3.0</output></label>
    <input type="range" id="ex" min="1" max="8" step="0.5" value="3">
    <label><input type="checkbox" id="spin" checked> 천천히 자동회전</label>
    <label><input type="checkbox" id="ref" checked> 기준 구</label>
  </div>
  <footer>실제(×1)에선 대부분 거의 구입니다 — Dante만 ×1에서도 뚜렷한 계란형. <b>편평(oblate)</b>은 극이 눌려 위/아래서 보면 납작, <b>삼축(triaxial)</b>은 적도면에서 한 축이 길쭉(모행성 방향). 빨간 표시 = 장축(a, 삼축의 모행성 방향).</footer>
</div>
<script>
const BODIES = [
  {nm:"Polyphemus", ty:"가스자이언트 (편평)", a:1.149,b:1.149,c:1, kind:"obl", mt:"f ≈ 13%", gv:"J₂ 0.023", col:[212,184,140]},
  {nm:"Dante",      ty:"화산 위성 (삼축)",    a:1.167,b:1.042,c:1, kind:"tri", mt:"a−c ≈ 16%  (a/c 1.17)", gv:"C₂₂ 0.012", col:[200,120,70]},
  {nm:"Chaos",      ty:"얼음 위성 (편평)",    a:1.075,b:1.075,c:1, kind:"obl", mt:"f ≈ 7%",  gv:"J₂ 0.026", col:[210,228,240]},
  {nm:"Erid",       ty:"슈퍼지구 (편평)",     a:1.051,b:1.051,c:1, kind:"obl", mt:"f ≈ 4.8%", gv:"J₂ 0.014", col:[150,170,200]},
  {nm:"Hades",      ty:"암석 위성 (삼축)",    a:1.053,b:1.013,c:1, kind:"tri", mt:"a−c ≈ 5%", gv:"C₂₂ 0.004", col:[140,132,120]},
  {nm:"기준 구",    ty:"완전한 구 (비교용)",  a:1,b:1,c:1,         kind:"ref", mt:"a:b:c = 1:1:1", gv:"", col:[110,120,140]},
];
function sphereMesh(st,sl){ const v=[],f=[];
  for(let i=0;i<=st;i++){ const th=Math.PI*i/st; for(let j=0;j<=sl;j++){ const ph=2*Math.PI*j/sl;
    v.push([Math.sin(th)*Math.cos(ph),Math.sin(th)*Math.sin(ph),Math.cos(th)]); } }
  for(let i=0;i<st;i++)for(let j=0;j<sl;j++){ const a=i*(sl+1)+j,b=a+sl+1; f.push([a,b,a+1]); f.push([b,b+1,a+1]); }
  return {v,f}; }
const MESH=sphereMesh(46,64);
const L=(()=>{const d=[-0.45,0.5,0.78],m=Math.hypot(...d);return d.map(x=>x/m);})();

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let cur=0, exag=3, az=22, el=-20, zoom=1, dragging=false, lx=0, ly=0, spinOn=true;
function resize(){ const r=cv.getBoundingClientRect(), dpr=Math.min(2,devicePixelRatio||1);
  cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); CW=r.width; CH=r.height; }
let CW,CH;
addEventListener('resize',resize);

// 드래그 궤도 회전
cv.addEventListener('pointerdown',e=>{dragging=true;cv.classList.add('drag');lx=e.clientX;ly=e.clientY;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{ if(!dragging)return; az+=(e.clientX-lx)*0.5; el+=(e.clientY-ly)*0.5;
  el=Math.max(-89,Math.min(89,el)); lx=e.clientX; ly=e.clientY; });
function endDrag(){dragging=false;cv.classList.remove('drag');}
cv.addEventListener('pointerup',endDrag); cv.addEventListener('pointercancel',endDrag);
cv.addEventListener('wheel',e=>{ e.preventDefault(); zoom*=Math.exp(-e.deltaY*0.0012); zoom=Math.max(0.5,Math.min(4,zoom)); },{passive:false});

function project(p,sx,sy,sz,A,E){
  let x=p[0]*sx,y=p[1]*sy,z=p[2]*sz;
  const cA=Math.cos(A),sA=Math.sin(A); let x1=x*cA-y*sA,y1=x*sA+y*cA,z1=z;   // yaw (z)
  const cE=Math.cos(E),sE=Math.sin(E); let y2=y1*cE-z1*sE,z2=y1*sE+z1*cE;    // pitch (x)
  return [x1,y2,z2];
}
function render(){
  ctx.clearRect(0,0,CW,CH);
  const b=BODIES[cur];
  const sx=1+(b.a-1)*exag, sy=1+(b.b-1)*exag, sz=1+(b.c-1)*exag, mx=Math.max(sx,sy,sz);
  const R=Math.min(CW,CH)*0.40/mx*zoom;
  const A=az*Math.PI/180, E=el*Math.PI/180, cx=CW/2, cy=CH/2;
  const P=MESH.v.map(p=>project(p,sx,sy,sz,A,E));
  // Phong: 타원체 해석 법선(smooth) + 디퓨즈 + 스페큘러. V=(0,0,1).
  const tris=MESH.f.map(f=>{
    const u0=MESH.v[f[0]],u1=MESH.v[f[1]],u2=MESH.v[f[2]];
    let nx=(u0[0]+u1[0]+u2[0])/sx, ny=(u0[1]+u1[1]+u2[1])/sy, nz=(u0[2]+u1[2]+u2[2])/sz; // 해석 법선 ∝ (dir/s)
    const nl=Math.hypot(nx,ny,nz)||1; const n=project([nx/nl,ny/nl,nz/nl],1,1,1,A,E);   // 뷰공간 법선
    const dif=Math.max(0, n[0]*L[0]+n[1]*L[1]+n[2]*L[2]);
    const spc=Math.pow(Math.max(0, 2*dif*n[2]-L[2]), 30);   // R·V, V=(0,0,1)
    const a=P[f[0]],b2=P[f[1]],c=P[f[2]];
    return {f, d:(a[2]+b2[2]+c[2])/3, dif, spc};
  }).sort((u,v)=>u.d-v.d);
  const sp=p=>[cx+p[0]*R, cy-p[1]*R];
  const [r,g,bl]=b.col, amb=0.13;
  for(const t of tris){ const [i,j,k]=t.f, pa=sp(P[i]),pb=sp(P[j]),pc=sp(P[k]);
    const s=amb+0.92*t.dif, hi=210*t.spc;
    ctx.fillStyle=`rgb(${Math.min(255,r*s+hi)|0},${Math.min(255,g*s+hi)|0},${Math.min(255,bl*s+hi)|0})`;
    ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);ctx.lineTo(pc[0],pc[1]);ctx.closePath();
    ctx.fill(); ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=0.6; ctx.stroke(); }   // stroke=fill로 seam 봉합
  // 기준 구(점선) — 왜곡 대비
  if(document.getElementById('ref').checked && b.kind!=="ref"){
    const r0=Math.min(CW,CH)*0.40/mx*zoom;  // 반경 1에 해당
    ctx.strokeStyle="rgba(255,255,255,0.22)"; ctx.setLineDash([4,5]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy,r0,0,2*Math.PI); ctx.stroke(); ctx.setLineDash([]);
  }
  // 장축(a) 표시 — 삼축의 모행성 방향
  if(b.kind==="tri"){
    const tip=sp(project([1,0,0],sx,sy,sz,A,E)), tipN=sp(project([1.18,0,0],sx,sy,sz,A,E));
    ctx.strokeStyle="#ff6a52"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(tip[0],tip[1]); ctx.lineTo(tipN[0],tipN[1]); ctx.stroke();
    ctx.fillStyle="#ff6a52"; ctx.font="11px sans-serif"; ctx.fillText("a → 모행성", tipN[0]+4, tipN[1]+3);
  }
}
function loop(){ if(spinOn && !dragging) az+=0.25; render(); requestAnimationFrame(loop); }

// UI
const bar=document.getElementById('bodybar');
BODIES.forEach((b,i)=>{ const bt=document.createElement('button'); bt.textContent=b.nm;
  bt.onclick=()=>{cur=i; setBody();}; bar.appendChild(bt); });
function setBody(){ const b=BODIES[cur];
  [...bar.children].forEach((c,i)=>c.classList.toggle('on',i===cur));
  h_nm.textContent=b.nm; h_ty.textContent=b.ty; h_mt.textContent=b.mt; h_gv.textContent=b.gv;
}
document.getElementById('ex').addEventListener('input',e=>{exag=parseFloat(e.target.value); exo.textContent='×'+exag.toFixed(1);});
document.getElementById('spin').addEventListener('change',e=>spinOn=e.target.checked);
const h_nm=document.getElementById('h_nm'),h_ty=document.getElementById('h_ty'),h_mt=document.getElementById('h_mt'),h_gv=document.getElementById('h_gv'),exo=document.getElementById('exo');
resize(); setBody(); requestAnimationFrame(loop);
</script>
</body>
</html>
