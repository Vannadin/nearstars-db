<!DOCTYPE html>
<!-- NearStars 천체 figure 왜곡(편평/삼축) 3D 시각화 — 자체완결, CDN 없음 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NearStars — 천체 왜곡 3D</title>
<style>
  :root { --bg:#06080f; --panel:#10131e; --ink:#e8ecf6; --dim:#8893a8; --line:#222838; --accent:#6fb4ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(circle at 50% -10%, #131a2e, #06080f 60%); color:var(--ink);
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; }
  header { padding:22px 20px 8px; text-align:center; }
  h1 { margin:0 0 4px; font-size:20px; letter-spacing:.2px; }
  .sub { color:var(--dim); font-size:13px; max-width:680px; margin:0 auto; }
  .controls { display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap;
              padding:14px; margin:14px auto; max-width:560px; background:var(--panel); border:1px solid var(--line); border-radius:12px; }
  .controls label { color:var(--dim); font-size:12px; }
  .controls output { color:var(--accent); font-weight:600; font-variant-numeric:tabular-nums; }
  input[type=range] { width:200px; accent-color:var(--accent); vertical-align:middle; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:14px; padding:0 18px 40px; max-width:1100px; margin:0 auto; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 12px 14px; text-align:center; }
  .card canvas { width:100%; height:170px; display:block; }
  .nm { font-weight:600; margin-top:6px; }
  .ty { color:var(--dim); font-size:12px; }
  .mt { color:var(--accent); font-size:12px; font-variant-numeric:tabular-nums; margin-top:3px; }
  .gv { color:var(--dim); font-size:11px; font-variant-numeric:tabular-nums; }
  .tag { display:inline-block; font-size:10px; padding:1px 7px; border-radius:20px; margin-top:5px; }
  .tag.tri { background:#3a1f1f; color:#ffb4a0; } .tag.obl { background:#1f2c3a; color:#9cd0ff; } .tag.ref { background:#22262f; color:#8893a8; }
  footer { color:var(--dim); font-size:11px; text-align:center; padding:0 20px 30px; max-width:720px; margin:0 auto; }
  code { background:#0c0f18; padding:1px 5px; border-radius:5px; color:#cdd6ea; }
</style>
</head>
<body>
<header>
  <h1>NearStars — 천체 figure 왜곡 (편평 · 삼축)</h1>
  <p class="sub">자전 편평(oblate)과 조석 삼축(triaxial)으로 구에서 벗어난 정도를 3D로 봅니다. 회전하는 각 천체의 축비 a:b:c는 figure 방법론(<code>body_figure.py</code>)에서 도출한 값입니다. 왜곡은 미세하므로 슬라이더로 과장해 보세요.</p>
</header>
<div class="controls">
  <label>왜곡 과장 <output id="exo">×3.0</output></label>
  <input type="range" id="ex" min="1" max="8" step="0.5" value="3">
  <label><input type="checkbox" id="showref" checked> 기준 구 표시</label>
</div>
<div class="grid" id="grid"></div>
<footer>실제 비율(×1)에선 대부분 거의 구로 보입니다 — Dante만 ×1에서도 뚜렷한 계란형입니다. 색은 표면 팔레트 근사. 기울인 시점이라 oblate는 극 눌림이, triaxial은 회전하며 길쭉/납작이 번갈아 보입니다.</footer>
<script>
// a,b,c = 축비(c=1 최소축); axis x=a(장축/적도), y=b, z=c(극). type obl=축대칭 편평, tri=삼축.
const BODIES = [
  {nm:"Polyphemus", ty:"가스자이언트", a:1.149,b:1.149,c:1, kind:"obl", mt:"f ≈ 13%", gv:"J₂ 0.023", col:[212,184,140]},
  {nm:"Dante",      ty:"화산 위성",    a:1.167,b:1.042,c:1, kind:"tri", mt:"a−c ≈ 16%", gv:"C₂₂ 0.012", col:[200,120,70]},
  {nm:"Chaos",      ty:"얼음 위성",    a:1.075,b:1.075,c:1, kind:"obl", mt:"f ≈ 7%",  gv:"J₂ 0.026", col:[210,228,240]},
  {nm:"Erid",       ty:"슈퍼지구",     a:1.051,b:1.051,c:1, kind:"obl", mt:"f ≈ 4.8%", gv:"J₂ 0.014", col:[150,170,200]},
  {nm:"Hades",      ty:"암석 위성",    a:1.053,b:1.013,c:1, kind:"tri", mt:"a−c ≈ 5%", gv:"C₂₂ 0.004", col:[140,132,120]},
  {nm:"기준 구",    ty:"완전한 구",    a:1,b:1,c:1,         kind:"ref", mt:"a:b:c = 1:1:1", gv:"", col:[90,98,115]},
];
// 구 메시
function sphereMesh(st, sl){
  const v=[], f=[];
  for(let i=0;i<=st;i++){ const th=Math.PI*i/st; for(let j=0;j<=sl;j++){ const ph=2*Math.PI*j/sl;
    v.push([Math.sin(th)*Math.cos(ph), Math.sin(th)*Math.sin(ph), Math.cos(th)]); } }
  for(let i=0;i<st;i++) for(let j=0;j<sl;j++){ const a=i*(sl+1)+j, b=a+sl+1;
    f.push([a,b,a+1]); f.push([b,b+1,a+1]); }
  return {v,f};
}
const MESH = sphereMesh(28, 36);
const L = (()=>{ const d=[-0.5,0.55,0.75], m=Math.hypot(...d); return d.map(x=>x/m); })();
const EL = -22*Math.PI/180; // 시점 기울기(약간 위에서)

function draw(cv, body, exag, t){
  const ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(body.kind==="ref" && !document.getElementById('showref').checked) return;
  // 과장 적용된 표시 축 (편차만 과장)
  const sx=1+(body.a-1)*exag, sy=1+(body.b-1)*exag, sz=1+(body.c-1)*exag;
  const mx=Math.max(sx,sy,sz);
  const R=Math.min(W,H)*0.40/mx;
  const A=t*0.5; // 자전(극축 z 둘레)
  const cA=Math.cos(A), sA=Math.sin(A), cE=Math.cos(EL), sE=Math.sin(EL);
  const P=MESH.v.map(p=>{
    let x=p[0]*sx, y=p[1]*sy, z=p[2]*sz;        // 타원체
    let x1=x*cA - y*sA, y1=x*sA + y*cA, z1=z;     // z축 자전
    let y2=y1*cE - z1*sE, z2=y1*sE + z1*cE;       // x축 기울기
    return [x1, y2, z2];
  });
  const tris=MESH.f.map(f=>{
    const A0=P[f[0]],B0=P[f[1]],C0=P[f[2]];
    const ux=B0[0]-A0[0],uy=B0[1]-A0[1],uz=B0[2]-A0[2];
    const vx=C0[0]-A0[0],vy=C0[1]-A0[1],vz=C0[2]-A0[2];
    let nx=uy*vz-uz*vy, ny=uz*vx-ux*vz, nz=ux*vy-uy*vx;
    const nl=Math.hypot(nx,ny,nz)||1; nx/=nl;ny/=nl;nz/=nl;
    const depth=(A0[2]+B0[2]+C0[2])/3;
    const lit=Math.max(0.12, nx*L[0]+ny*L[1]+nz*L[2]);
    return {f, depth, lit};
  }).sort((a,b)=>a.depth-b.depth);
  const cx=W/2, cy=H/2;
  const sp=p=>[cx+p[0]*R, cy-p[1]*R];
  for(const tr of tris){
    if(tr.depth<0 && body.kind!=="ref"){} // (그릴 것)
    const [a,b,c]=tr.f, pa=sp(P[a]),pb=sp(P[b]),pc=sp(P[c]);
    const sh=tr.lit, [r,g,bl]=body.col;
    ctx.fillStyle=`rgb(${r*sh|0},${g*sh|0},${bl*sh|0})`;
    ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.lineTo(pc[0],pc[1]); ctx.closePath(); ctx.fill();
  }
  // 적도/극 윤곽 힌트: 기준 구 점선 (왜곡 비교용)
  if(body.kind!=="ref"){
    ctx.strokeStyle="rgba(255,255,255,0.16)"; ctx.setLineDash([3,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(cx,cy, R, R, 0,0,2*Math.PI); ctx.stroke(); ctx.setLineDash([]);
  }
}

const grid=document.getElementById('grid'), canvases=[];
for(const b of BODIES){
  const card=document.createElement('div'); card.className='card';
  const cv=document.createElement('canvas'); cv.width=380; cv.height=340; cv.style.height='170px';
  card.appendChild(cv);
  card.insertAdjacentHTML('beforeend',
    `<div class="nm">${b.nm}</div><div class="ty">${b.ty}</div>`+
    `<div class="mt">${b.mt}</div>${b.gv?`<div class="gv">${b.gv}</div>`:''}`+
    `<span class="tag ${b.kind}">${b.kind==='tri'?'삼축 (계란형)':b.kind==='obl'?'편평 (납작)':'기준'}</span>`);
  grid.appendChild(card); canvases.push({cv,b});
}
const exEl=document.getElementById('ex'), exo=document.getElementById('exo');
let exag=3;
exEl.addEventListener('input',()=>{ exag=parseFloat(exEl.value); exo.textContent='×'+exag.toFixed(1); });
document.getElementById('showref').addEventListener('change',()=>{});
let t0=null;
function loop(ts){ if(t0===null)t0=ts; const t=(ts-t0)/1000;
  for(const {cv,b} of canvases) draw(cv,b,exag,t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
