<!doctype html>
<!-- 40 Eridani A 행성계(b Erid/c/d Threeworld) 3D 궤도 뷰어: 1 Myr 안정성 시뮬 검증 a/e/i 반영, Keplerian 운동·근접공명 3:1/2:1. three@0.160(로컬 CDN). -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>40 Eri A 행성계 3D 뷰어</title>
<style>
  :root{ --bg:#05060a; --panel:#0d1018e6; --line:#1c2433; --ink:#e8edf6; --dim:#8893a6; --acc:#7aa2ff; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",Segoe UI,Roboto,sans-serif}
  #stage{position:fixed;inset:0} canvas{display:block;touch-action:none}
  #title{position:fixed;top:10px;right:14px;z-index:5;font-weight:600;font-size:15px;text-align:right}
  #title small{color:var(--dim);font-weight:400;margin-left:6px;font-size:12px}
  #hint{position:fixed;bottom:12px;right:14px;z-index:5;color:var(--dim);font-size:11.5px}
  #panel{position:fixed;top:46px;left:12px;width:300px;max-height:calc(100% - 60px);overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;z-index:4;backdrop-filter:blur(8px);font-size:13px}
  .grp{margin-bottom:13px;border-bottom:1px solid var(--line);padding-bottom:11px}.grp:last-child{border:0}
  .grp h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px;font-weight:600}
  .pl{border:1px solid var(--line);border-radius:9px;padding:8px 9px;margin-bottom:7px}
  .pl .h{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .pl .nm{font-weight:600;font-size:12.5px}.pl .tag{font-size:10px;color:var(--dim);margin-left:auto}
  .pl .row{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;line-height:1.5}
  .pl .row b{color:var(--ink)}
  .ctrl{margin:8px 0}.ctrl label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--dim);margin-bottom:4px}
  .ctrl label b{color:var(--ink);font-weight:600}
  input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:var(--line);border-radius:3px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid #05060a}
  .ck{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);cursor:pointer;margin:6px 0}.ck input{accent-color:var(--acc)}
  .verdict{font-size:11.5px;color:#7fd1a0;line-height:1.5} .verdict .w{color:#ffb454}
</style>
</head>
<body>
<div id="stage"></div>
<div id="title">40 Eridani A 행성계 <small>b Erid · c · d Threeworld · 드래그로 회전</small></div>
<div id="hint">드래그=회전 · 휠=줌 · 우클릭=이동</div>
<div id="panel">
  <div class="grp"><h3>행성 (1 Myr 시뮬 검증 a/e/i)</h3><div id="plist"></div></div>
  <div class="grp"><h3>시점 / 표시</h3>
    <div class="ctrl"><label>속도 <b id="vSpd">1×</b></label><input type="range" id="rSpd" min="0" max="60" step="0.5" value="14"></div>
    <label class="ck"><input type="checkbox" id="ckOrbit" checked> 궤도선</label>
    <label class="ck"><input type="checkbox" id="ckHZ" checked> 거주가능권(~0.64 AU)</label>
    <label class="ck"><input type="checkbox" id="ckScale" checked> 궤도면 격자</label>
  </div>
  <div class="grp"><h3>안정성 (REBOUND 1 Myr)</h3>
    <div class="verdict">✓ 1e5 yr 랜덤위상 MEGNO 2.000 robust STABLE<br>장반경 고정 · Erid e≤0.04 비펌핑 · 상호경사 ≤2.5°<br>
    c–d 근접 2:1 (b–c 비공명) · DB/공식뷰어 반영<br>e_max Erid 0.04·c 0.095·d 0.048</div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// 1 Myr 시뮬 검증 요소 (a AU, e, i deg, 표시반경 R⊕, 색, 라벨)
const M_STAR=0.78;
const PL=[
  {id:'b', nm:'Erid (b)',       a:0.224, e:0.040, inc:0.0, om:20, Om:0,   M0:10,  R:1.54, col:0x3a6db0, tag:'super-Earth 2.09g·고리'},
  {id:'c', nm:'c',              a:0.40,  e:0.040, inc:1.5, om:70, Om:40,  M0:200, R:0.38, col:0x9a8e7e, tag:'수성급 필러'},
  {id:'d', nm:'Threeworld (d)', a:0.635, e:0.042, inc:2.5, om:130,Om:110, M0:300, R:0.27, col:0xb8b4ac, tag:'달크기 frost CO₂'},
];
const RAD=v=>v*Math.PI/180;
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1)); renderer.setSize(innerWidth,innerHeight); stage.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x05060a);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.001,1000);
camera.position.set(0.9,0.7,1.25);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.minDistance=0.15; controls.maxDistance=8;

scene.add(new THREE.AmbientLight(0x223044,0.6));
const starLight=new THREE.PointLight(0xffe9d5,2.2,0,1.4); scene.add(starLight);
// 별 40 Eri A (K0.5V 따뜻한 색)
const star=new THREE.Mesh(new THREE.SphereGeometry(0.055,48,32), new THREE.MeshBasicMaterial({color:0xffe9d5}));
scene.add(star);
const glow=new THREE.Mesh(new THREE.SphereGeometry(0.085,32,24), new THREE.MeshBasicMaterial({color:0xffd9b0,transparent:true,opacity:0.22,side:THREE.BackSide})); scene.add(glow);
{ const n=700,p=new Float32Array(n*3); for(let i=0;i<n;i++){const r=30+Math.random()*120,t=Math.random()*6.28,ph=Math.acos(2*Math.random()-1);
  p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.cos(ph);p[i*3+2]=r*Math.sin(ph)*Math.sin(t);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xcdd6ea,size:0.6,sizeAttenuation:false,transparent:true,opacity:0.7}))); }

// 거주가능권 고리 + 궤도면 격자
const hz=new THREE.Mesh(new THREE.RingGeometry(0.55,0.73,96,1),
  new THREE.MeshBasicMaterial({color:0x2f6f4a,transparent:true,opacity:0.16,side:THREE.DoubleSide})); hz.rotation.x=Math.PI/2; scene.add(hz);
const grid=new THREE.Mesh(new THREE.RingGeometry(0.06,0.85,64,1),
  new THREE.MeshBasicMaterial({color:0x121a2a,transparent:true,opacity:0.22,side:THREE.DoubleSide})); grid.rotation.x=Math.PI/2; scene.add(grid);

const R_DISP=r=>0.012+r*0.020;  // 표시반경(과장)
// 궤도면 회전(경사 inc, 승교점 Om) 적용 헬퍼: 궤도평면 좌표(x,z) → 3D
function orient(v, incDeg, OmDeg){
  const i=RAD(incDeg), O=RAD(OmDeg);
  // 먼저 inc(x축 회전), 다음 Om(y축 회전). y=up=궤도법선 기준
  let x=v.x, y=v.y, z=v.z;
  // inc about x
  let y1=y*Math.cos(i)-z*Math.sin(i), z1=y*Math.sin(i)+z*Math.cos(i);
  // Om about y
  let x2=x*Math.cos(O)+z1*Math.sin(O), z2=-x*Math.sin(O)+z1*Math.cos(O);
  return new THREE.Vector3(x2,y1,z2);
}
function keplerXY(a,e,Mdeg,omDeg){ // 궤도평면 내 위치 (perihelion=om 방향), y=0 평면
  let M=RAD(Mdeg), E=M; for(let k=0;k<60;k++) E=M+e*Math.sin(E);
  const xv=a*(Math.cos(E)-e), yv=a*Math.sqrt(1-e*e)*Math.sin(E);
  const w=RAD(omDeg), xr=xv*Math.cos(w)-yv*Math.sin(w), yr=xv*Math.sin(w)+yv*Math.cos(w);
  return new THREE.Vector3(xr,0,yr);
}
const planets=[], orbits=[];
for(const p of PL){
  // 궤도선
  const pts=[]; for(let k=0;k<=180;k++){ const v=keplerXY(p.a,p.e,k*2 - p.om + 0, p.om);
    // 위 호출은 부정확 — 아래서 진위치는 별도. 궤도선은 E로 직접:
    const E=k/180*Math.PI*2; const xv=p.a*(Math.cos(E)-p.e), yv=p.a*Math.sqrt(1-p.e*p.e)*Math.sin(E);
    const w=RAD(p.om); let xr=xv*Math.cos(w)-yv*Math.sin(w), zr=xv*Math.sin(w)+yv*Math.cos(w);
    pts.push(orient(new THREE.Vector3(xr,0,zr), p.inc, p.Om)); }
  const og=new THREE.BufferGeometry().setFromPoints(pts);
  const ol=new THREE.LineLoop(og, new THREE.LineBasicMaterial({color:p.col,transparent:true,opacity:0.55})); scene.add(ol); orbits.push(ol);
  const pm=new THREE.Mesh(new THREE.SphereGeometry(R_DISP(p.R),24,18), new THREE.MeshStandardMaterial({color:p.col,roughness:1,metalness:0,emissive:p.col,emissiveIntensity:0.12}));
  scene.add(pm); planets.push(pm);
  p.period=Math.sqrt(p.a**3/M_STAR); // yr
}
// 패널 행성 목록
document.getElementById('plist').innerHTML=PL.map(p=>{
  const Pd=(p.period*365.25).toFixed(0);
  return `<div class="pl"><div class="h"><span class="dot" style="background:#${p.col.toString(16).padStart(6,'0')}"></span>`+
    `<span class="nm">${p.nm}</span><span class="tag">${p.tag}</span></div>`+
    `<div class="row">a <b>${p.a} AU</b> · e <b>${p.e}</b> · i <b>${p.inc}°</b> · P <b>${Pd} d</b></div></div>`;}).join('');

let SPD=14, t0=0;
const sEl=document.getElementById('rSpd'), sOut=document.getElementById('vSpd');
sEl.addEventListener('input',()=>{SPD=parseFloat(sEl.value); sOut.textContent=SPD.toFixed(1)+'×';}); sOut.textContent=SPD+'×';
document.getElementById('ckOrbit').addEventListener('change',e=>orbits.forEach(o=>o.visible=e.target.checked));
document.getElementById('ckHZ').addEventListener('change',e=>hz.visible=e.target.checked);
document.getElementById('ckScale').addEventListener('change',e=>grid.visible=e.target.checked);

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
let last=null;
function loop(ts){ requestAnimationFrame(loop);
  if(last==null)last=ts; const dt=(ts-last)/1000; last=ts; t0+=dt*SPD*0.02; // 시뮬연도
  PL.forEach((p,j)=>{ const n=2*Math.PI/p.period; const Mdeg=p.M0 + (n*t0)*180/Math.PI;
    const v=keplerXY(p.a,p.e,Mdeg,p.om); planets[j].position.copy(orient(v,p.inc,p.Om)); });
  const s=1+0.04*Math.sin(t0*5); glow.scale.setScalar(s);
  controls.update(); renderer.render(scene,camera); }
requestAnimationFrame(loop);
</script>
</body>
</html>
