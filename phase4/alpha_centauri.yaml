      - { name: limb_darkening, value: "표준 (적색쪽 강함)", op: set }
      - { name: spots_faculae, value: "moderate ~1–3% 피복률, 중위도 흑점군 여럿", op: set }
      - { name: corona, value: "A보다 밝음 (log Lx 27.04)", op: set }
      - { name: flares, value: "occasional (플레어성 아님)", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        Derived from observed measurements (Teff·X-ray log Lx 27.04·DeWarf2010 8.84yr cycle). Spot count=owner-delegated decision (for texture), moderate
        ~1–3%, more spot groups than A. color=K1V Teff passthrough.
      evidence_ko: >
        관측 측정서 도출(Teff·X선 log Lx 27.04·DeWarf2010 8.84yr cycle). 흑점량=오너 위임 결정(텍스처용) 보통
        ~1–3%, A보다 흑점군 多. 색=K1V Teff passthrough.
    refs: ["2010ApJ...722..343D", "docs/reference/stellar-photospheric-color-methodology.md"]

  # ── 항성 자전축/J2/발견성 — 2026-07-12 silent-passthrough 점검서 신설 ──────────
  - body: Alpha Centauri A
    axis: bulk.spin_axis_orientation
    status: gated                     # 2026-07-12 오너 선택 — 측정 없음 (silent-passthrough 해소)
    driver: [art-direction]
    narrative: >
      No i★ measurement → owner choice: a Sun-like small ~7° tilt from the AB orbital-plane normal (analogy to the Sun-ecliptic 7.25°). The polar azimuth is
      a free emit orientation (ICRS pole RA/Dec conversion is at the emit stage). The visual effect is minor, but it replaces the silent default of "perfectly aligned 0°"
      with an explicit decision.
    narrative_ko: >
      i★ 측정 없음 → 오너 선택: AB 궤도면 법선에서 태양 유사 ~7° 소기울기(태양-황도 7.25° 유비). 극 방위각은
      emit 배향 자유(ICRS 극 RA/Dec 변환은 emit 단계). 시각 효과는 미미하나 "완전 정렬 0°"라는 침묵 기본값을
      명시 결정으로 대체.
    fields:
      - { name: spin_axis_orientation, value: "AB 궤도면 법선 + ~7° tilt (방위각 자유, ICRS 극 RA/Dec 변환 at emit)", op: set }
      - { name: obliquity, value: 7, unit: deg, op: set }
    gate:
      criterion: [physics]
      verdict: pass-in-window
      evidence: >
        With no measurement, only a physical-range gate: alignment is the default expectation from close-pair formation·tidal evolution, and a small tilt (≲10°) is
        unobjectionable by analogy to the Sun (7.25°). Consistent with all observations.
      evidence_ko: >
        측정 부재라 물리 범위 게이트만: 근접쌍 형성·조석 진화상 정렬 기대가 기본이고 소기울기(≲10°)는 태양
        (7.25°) 유비로 무난. 어떤 관측과도 충돌 없음.

  - body: Alpha Centauri B
    axis: bulk.spin_axis_orientation
    status: gated                     # 2026-07-12 오너 선택 — 측정 45° 채택 (silent-passthrough 해소)
    driver: [observation]
    narrative: >
      i★ = 45° (+9/−19) measurement adopted (Dumusque 2014, SOAP activity/RV modeling, low-conf). Departing from the orbital inclination ~79°,
      the minimum 3D misalignment is |79−45| ≈ 34° — an interesting measured reading of spin-orbit misalignment (interesting-first).
      Polar azimuth unconstrained → adopt the same PA as the orbital pole (misalignment-minimizing reading, 34°). ICRS pole RA/Dec conversion is at the emit stage.
      Consistent with the viewer's i★ layer (measured=gold).
    narrative_ko: >
      i★ = 45°(+9/−19) 측정 채택(Dumusque 2014, SOAP activity/RV modeling, low-conf). 궤도 경사 ~79°와
      어긋나 최소 3D 비정렬 |79−45| ≈ 34° — 스핀-궤도 비정렬이라는 흥미로운 실측 읽기(interesting-first).
      극 방위각 미구속 → 궤도극과 같은 PA 채택(비정렬 최소화 읽기, 34°). ICRS 극 RA/Dec 변환은 emit 단계.
      뷰어 i★ 레이어(측정=금색)와 정합.
    fields:
      - { name: spin_axis_orientation, value: "i★ 45° (LOS 기준, 측정) · PA=궤도극 정렬 → 궤도면 대비 비정렬 ~34°", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        Adopts the measured value as-is (45° +9/−19, recommended). The misalignment itself is a measurement implication — the only assumption is the azimuth (minimum-misalignment
        reading). Kept low-conf due to the large uncertainty; a candidate for update on follow-up measurements.
      evidence_ko: >
        측정값 그대로 채택(45° +9/−19, recommended). 비정렬 자체가 측정 함의 — 가정은 방위각(최소 비정렬
        읽기)뿐. 불확도 커서 low-conf 유지, 후속 측정 시 갱신 후보.
    refs: [2014ApJ...796..133D]

  - body: Alpha Centauri A
    axis: bulk.geopotential_j2
    status: gated                     # 2026-07-12 오너 정책 — 항성 J2 상시 계산·emit (무시가능 처리 금지)
    driver: [physics]
    narrative: >
      Rotational flattening J2 = 4.8e-7. Solar-anchored q-scaling (J2 = 0.0105·q — helioseismology solar J2 2.18e-7,
      Pijpers 1998 anchor; Radau-Darwin is invalid at stellar NMoI ~0.06 so not used, body-figure-methodology §2):
      q = ω²R³/GM = 4.59e-5 (M 1.1055 M⊙·R 1.2234 R⊙·P_rot 22±3d) → J2 4.8e-7 (±~30% from P_rot uncertainty).
      reference_radius = equatorial radius 8.511e8 m. Owner policy (2026-07-12): stellar J2 is always computed·emitted regardless of size —
      Principia integrates this term. [The original "negligible, not emitted" passthrough row was replaced by owner directive the same day.]
    narrative_ko: >
      회전 편평 J2 = 4.8e-7. 태양앵커 q-스케일링(J2 = 0.0105·q — 헬리오사이즈몰로지 태양 J2 2.18e-7,
      Pijpers 1998 앵커; Radau-Darwin은 항성 NMoI ~0.06서 무효라 미사용, body-figure-methodology §2):
      q = ω²R³/GM = 4.59e-5 (M 1.1055 M⊙·R 1.2234 R⊙·P_rot 22±3d) → J2 4.8e-7 (P_rot 불확도로 ±~30%).
      reference_radius = 적도반경 8.511e8 m. 오너 정책(2026-07-12): 항성 J2는 크기 무관 항상 계산·emit —
      Principia가 이 항을 적분. [당초 "무시가능 미방출" passthrough 행을 같은 날 오너 지시로 교체.]
    fields:
      - { name: geopotential_j2, value: 4.8e-7, op: set }
      - { name: reference_radius, value: 8.511e8, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        q (4.59e-5, DB recommended mass·radius·rotation) × measured solar J2/q (0.0105) = 4.8e-7 — ~2.3× the Sun's (2.1e-7),
        consistent with the faster rotation (22d vs 25.4d)+larger radius. Within the FGK-dwarf similar-structure range.
      evidence_ko: >
        q(4.59e-5, DB recommended 질량·반경·자전) × 태양 측정 J2/q(0.0105) = 4.8e-7 — 태양(2.1e-7)의
        ~2.3배로, 더 빠른 자전(22d vs 25.4d)+큰 반지름과 정합적. FGK 왜성 유사구조 범위 내.
    refs: ["docs/reference/body-figure-methodology.md"]

  - body: Alpha Centauri B
    axis: bulk.geopotential_j2
    status: gated                     # 2026-07-12 오너 정책 — 항성 J2 상시 계산·emit
    driver: [physics]
    narrative: >
      Rotational flattening J2 = 5.7e-8. Same solar-anchored scaling: q = 5.48e-6 (M 0.9373 M⊙·R 0.8632 R⊙·P_rot 41±3d)
      → J2 5.7e-8 (±~15%). reference_radius = equatorial radius 6.005e8 m. Slower rotation+smaller radius, so ~1/4 the Sun's —
      but emitted per owner policy. See the A row and body-figure-methodology §2 for the detailed derivation·policy.
    narrative_ko: >
      회전 편평 J2 = 5.7e-8. 같은 태양앵커 스케일링: q = 5.48e-6 (M 0.9373 M⊙·R 0.8632 R⊙·P_rot 41±3d)
      → J2 5.7e-8 (±~15%). reference_radius = 적도반경 6.005e8 m. 느린 자전+작은 반지름이라 태양의 ~1/4 —
      그래도 오너 정책대로 emit. 상세 산식·정책은 A 행 및 body-figure-methodology §2 참조.
    fields:
      - { name: geopotential_j2, value: 5.7e-8, op: set }
      - { name: reference_radius, value: 6.005e8, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        q (5.48e-6, DB recommended) × measured solar J2/q (0.0105) = 5.7e-8. K1V is slightly less condensed than the Sun, so the actual value
        may be marginally higher (room for an upward coefficient), but the order is unchanged — within the FGK approximation range.
      evidence_ko: >
