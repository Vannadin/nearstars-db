        calm Saturn-like zonal band is the physical default; turbulence adopted for visual drama
        (interesting-first, explicit).
      evidence_ko: >
        형태학 = 목성형 난류 밴딩(band 경계 소용돌이·festoon 多) + 중위도 단일 대형 anticyclone. 구름 coverage =
        Phase 3 0.9. 대형 폭풍 = 가라앉은 Rayleigh 파란 눈(Avatar canon), 색은 banding 행의 폭풍 눈 값. emit 시
        구름 텍스처(EVE)/PQS로 구현 — 본 행은 art 의도 기록, 색 값은 banding 행에 통합. 오버라이드 근거:
        T_int<110K → 잔잔한 토성형 zonal band가 물리 기본값; 난류는 시각 드라마로 채택(interesting-first, 명시).

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.aurora
    status: gated                 # documented-divergence — Phase 3는 aurora 없음, Phase 4가 가시 연출. 색만 조성-고정
    driver: [visual]
    depends_on: "magnetosphere(자기장 결정) — 오로라 가둠/세기는 자기권에 의존, 그 행 먼저 확정 필요"
    narrative: >
      The poles glow rose-magenta — a deliberate color rhyme against Pandora's cyan bioluminescence: planet pink,
      moon cyan. The tint itself is not a choice: a hydrogen-helium sky can only glow in hydrogen's reds and
      violets, and with no atomic oxygen there is no Earth-style green to be had. The honest divergence is
      visibility — the quiet star drives too little plasma for a bright aurora, so Phase 3 said "none"; Phase 4
      stages a faint one anyway so the contrast reads on screen.
    narrative_ko: >
      극지방이 rose-magenta로 빛난다 — Pandora의 청록 생물발광과 의도적으로 운을 맞춘 색이다. 행성은 분홍, 달은
      청록. 색조 자체는 선택이 아니다. 수소-헬륨 하늘은 수소의 적색과 보라로만 빛날 수 있고, 원자 산소가 없어
      지구식 초록은 나올 수 없다. 정직한 일탈은 가시성이다 — 조용한 별은 밝은 오로라를 피울 플라스마를 대주지
      못해 Phase 3는 "없음"이라 했지만, Phase 4는 화면에서 대비가 읽히도록 희미한 오로라를 연출한다.
    fields:
      - { name: aurora, value: "극 rose-magenta (H Balmer-α 적색 + H2 Fulcher/Balmer-β/γ 보라)", op: set, phase3_default: "aurora_present=false (medium)" }
    gate:
      criterion: [composition-lock]
      verdict: owner-override
      evidence: >
        The H2/He atmosphere fixes the color (not a choice): H Balmer-α red + H2 Fulcher / Balmer-β/γ violet. No
        atomic oxygen, so no Earth-style green. Most of the output is UV (visible aurora faint) — the divergence
        is staging it visible. sRGB extracted at emit from element_plasma_colors.yaml /
        molecular_plasma_colors.yaml. Override basis: Phase 3 aurora_present=false (medium) — the quiet G2V wind
        (log R'HK −4.95) is a weak plasma driver at 1.6 AU; departure from the AI-synthesized default, color
        composition-fixed so in-window.
      evidence_ko: >
        H2/He 대기가 색을 고정(선택 아님): H Balmer-α 적색 + H2 Fulcher / Balmer-β/γ 보라. 원자 산소 없어
        지구식 녹색 불가. 대부분 출력은 UV(가시 오로라 희미) — 발산은 "보이게 연출"한 점. sRGB는 emit 시
        element_plasma_colors.yaml / molecular_plasma_colors.yaml에서 추출. 오버라이드 근거: Phase 3
        aurora_present=false(medium) — 조용한 G2V 항성풍(log R'HK −4.95)이 1.6 AU서 약한 플라스마 구동원;
        AI-합성 기본값에서의 이탈이며 색은 조성-고정이라 in-window.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: magnetism.magnetic_field
    status: gated                 # 4b 완료 (2026-06-22) — dynamo 스케일링 근거화
    driver: [physics]
    narrative: >
      The dynamo gives Polyphemus a field of about 170 microtesla at the equator — eight times Saturn's, forty
      percent of Jupiter's, sitting between the two but leaning jovian. The number comes from the project's
      standard dynamo scaling recipe fed with the planet's mass and age, and the same formula sanity-checks
      against Jupiter. The honest caveat: this mass sits at the bottom edge of the giant regime, and if helium
      stratification has set in the way it has at Saturn, the real field could be several times weaker. The owner
      reviewed that quieter alternative and kept the strong reading — it is this field that carries the aurora
      and the radiation belts.
    narrative_ko: >
      다이나모가 적도 기준 약 170마이크로테슬라의 자기장을 만든다 — 토성의 8배, 목성의 40%, 둘 사이에서 목성
      쪽으로 기운 값이다. 숫자는 프로젝트 표준 다이나모 스케일링 레시피에 행성의 질량과 나이를 넣어 얻었고,
      같은 식이 목성으로 검산된다. 정직한 단서 하나 — 이 질량은 거인 영역의 바닥 언저리라, 토성처럼 헬륨
      성층화가 진행됐다면 실제 자기장은 몇 배 약할 수 있다. 오너는 그 조용한 대안을 검토한 끝에 강한 읽기를
      유지했고, 오로라와 방사선대를 떠받치는 것이 바로 이 자기장이다.
    fields:
      - { name: magnetic_field, value: 170, unit: uT, op: set, phase3_default: "170 µT (Phase 3도 근거 교정됨)" }
      - { name: magnetic_field_polar, value: 345, unit: uT, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Reiners & Christensen 2010 (arXiv:1007.1514) depth-corrected dipole interpolation gives 0.378 M_Jup·5.3 Gyr
        → B_eq 172 µT (B_pol ≈ 345 µT). Passes the Jupiter same-equation sanity check. Phase 3 itself was corrected
        from an ungrounded ~500µT to 170µT → agreement. canonical = docs/reference/planetary-dynamo-scaling.md.
        Group 7 facet-walk (2026-06-22): owner kept 170µT (A, the R&C scaling value); the He-stratified Saturn-class
        weak-field alternative (B, ~20–50µT) was reviewed and rejected. caveat: 0.378 M_Jup is the giant-regime
        lower edge — with He stratification the actual value could be lower (Saturn ~21µT). conf low–med.
      evidence_ko: >
        Reiners & Christensen 2010(arXiv:1007.1514) depth-corrected dipole 보간으로 0.378 M_Jup·5.3 Gyr → B_eq
        172 µT(B_pol ≈ 345 µT). 목성 동일식 sanity check 통과. Phase 3 자체도 미근거 ~500µT에서 170µT로 교정
        완료 → 일치. canonical = docs/reference/planetary-dynamo-scaling.md. group 7 facet-walk(2026-06-22):
