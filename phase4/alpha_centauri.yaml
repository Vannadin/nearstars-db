        (0.89 ρ⊕)면 철핵은 거대(super-Mercury) 아닌 중간 크기지만, 조석열(e강제 ~0.005)+방사성이 핵을 펄펄 끓여
        활발히 대류 → 지구급 장. 화산·빠른 대륙이동과 같은 열원(조석열)을 공유(인과 묶임). 위성 중 이례적(가니메데만
        약한 dynamo). 언옵타늄 부스트는 grounding서 제외(현실고증) — 그냥 강한 고유 자기장. 부유산 띄울 정도는
