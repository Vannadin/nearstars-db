  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: environment.radiation
    status: gated                 # 4b 완료 (2026-06-22)
    driver: [physics, gameplay]
    depends_on: "magnetism.magnetic_field / magnetosphere (위 두 행)"
    narrative: >
      Each moon gets its radiation station: Dante extreme, Hades severe, Pandora moderate and livable, Cassandra
      low, Chaos low but variable. The interesting reconciliation is that the field alone is too weak for the
      canon's brutal numbers: it is Dante's furious volcanism, feeding sulfur plasma into the belts at hundreds
      of times Io's rate, that makes the inner zone so deadly without inflating the field. Pandora stays habitable
      exactly as the canon says: it orbits in the gap between the two belts and shields its surface with its own
      Earth-class field, no unobtanium required, just a good dynamo. The per-moon grades: Dante extreme
      (>4,500 rem/day), Hades severe, Pandora moderate and habitable, Cassandra low, Chaos low and variable.
    narrative_ko: >
      위성마다 방사선 자리가 정해진다. 재미있는 화해는 자기장만으로는 캐넌의 흉악한 수치가 안 나온다는 점이다. Io의 수백 배로
      끓는 Dante의 화산이 황 플라스마를 벨트에 퍼부어, 자기장을 부풀리지 않고도 안쪽 지대를 그렇게 치명적으로
      만든다. Pandora는 캐넌 그대로 살 만하다. 두 벨트 사이 틈새를 돌면서 자기만의 지구급 자기장으로 표면을
      가린다. 언옵타늄은 필요 없고, 좋은 다이나모면 된다. 위성별 등급: Dante 극심(>4,500 rem/day), Hades 심함,
      Pandora 중간·거주가능, Cassandra 낮음, Chaos 낮음·가변.
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window        # 캐넌 >4500은 Dante 화산-source로 화해(場 발산 불요)
      evidence: >
        Dose is set by field + source: despite 170µT (~0.4× Jupiter, ~8× Saturn; weak vs Jupiter for belt
        generation), Dante (820× Io volcanism) supplies enormous SO₂/sulfur plasma to the belt, so a strong belt
        forms. Dante innermost extreme (>4,500 rem/day), Hades near the peak (~2–3 R_p). The canon ">4,500
        rem/day" is reconciled via this volcanic source without inflating the field (see the Dante env.radiation
        row). Pandora is habitable via the gap between the two belts + its own strong intrinsic dipole (Fe-core
        dynamo, Earth-class; details in the Pandora magnetism row); unobtanium is excluded from the physics
        grounding. Pandora's distance is fixed by the 32h tidal lock and does not move.
      evidence_ko: >
        선량은 場+공급원으로 결정: 170µT(목성 ~0.4×, 토성 ~8×, 벨트생성엔 목성比 약함)이지만 Dante(820× Io
        화산)가 막대한 SO₂/황 플라스마를 벨트에 공급해 강벨트 성립. Dante 최내곽 극심(>4,500 rem/day), Hades
        피크(~2–3 R_p) 근처. 캐넌 ">4,500 rem/day"는 場 발산 없이 이 화산-source로 화해(Dante env.radiation 행
        참조). Pandora는 두 벨트 사이 gap + 자체 강한 고유 dipole(Fe핵 dynamo, 지구급; 세부는 Pandora
        magnetism 행)로 거주가능; 언옵타늄은 물리 grounding서 제외. Pandora 거리는 32h 조석고정에 묶여 이동 안 함.

