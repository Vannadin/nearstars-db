      limb_darkening=표준(적색쪽 강함). spots_faculae=보통 — 피복률 ~1–3%(A의 ~2배 활동도·clean 8.84yr
      cycle·X선 A보다 밝음), 중위도 흑점군 여럿(umbra+penumbra) + faculae 뚜렷. corona=A보다 밝음(log Lx
      27.04 vs 26.78). flares=가끔(A보다 활동적, 단 플레어성 아님). 흑점량=오너 위임 결정(텍스처용) 보통 ~1–3%,
      A보다 흑점군 多. 색=K1V Teff passthrough. [2026-07-12 점검: Teff 5260→5316K(DB), factor~10 제거(A의
