  - body: Alpha Centauri A b
    axis: satellites
    status: gated                  # 135k 갭 = J2 적용 후에도 안정 (TRACE+leapfrog 일치). 3:2-락은 J2로 탈락.
    driver: fiction                # SPEC class D (+ orbit는 stability-optimization)
    target: "판도라 + canon 명명 5위성 (Dante·Hades·Pandora·Cassandra·Chaos)"
    gate:
      criterion: [stability, hill-stability, resonance]
      verdict: pass-in-window
      evidence: >
        IAS15 1000yr (α Cen A·B 두 별 포함 N-body, 외곽 2위성 역행 반영): CHAOTIC_BUT_HILL_STABLE
        — 5위성 전부 Hill-bound·calm, 이젝션 0, Hades e 0.032–0.052 유지, Pandora 0.02 R_Hill.
        바너드/TRAPPIST-1과 같은 등급(갇힘, 게임 안전). results/_moons_alpha_centauri.
      resonance_scan: >
        Hades 반장축 125k→172.5k 스캔(results/_moons_resonance_scan.md): 안전대는 저반장축
        빈틈(127.5k–135k). 강공명은 역효과 — 2:1(Dante)=157.5k는 Pandora 5:3과 중첩돼
        이젝션, 140k–170k 전체가 카오스→이젝션(질량 큰 Pandora가 강공명 교란).
      resonance_lock: >
        공명각 libration 연구(results/_moons_resonance_lock.md, 300yr·1500샘플): 내측 쌍에
        공명 락 **불가**(소거법 확정). 3:2는 정확값(131k)에 놔도 공명각 순환(coverage 358°, 캡처
        실패) — Pandora secular 교란이 약공명을 씻음. 2:1(167k)은 Pandora 5:3·3:2 사이서 이젝션.
        e_max가 128~135k 전 구간 ~0.056 동일 = 공명 펌핑 전무. 따라서 135k 빈틈은 취향이 아니라
        유일한 안정 안. 함의: Hades e가 공명 유지 안 됨 → 현실 조석이면 가열 감쇠. canon ">900K"는
        고정-Pandora계에서 비자기일관(라플라스 해법은 관측우선이 차단). e=0.056은 "주어진 값"으로
        채택하는 documented limitation.
      phase_scan_update: >
        위상 스캔(results/_moons_phase_scan.md)이 위 "락 불가"를 뒤집음 — 단일시드(M0=0)
        artifact였음. Hades 초기 평균근점이각 M0≈180°(Dante 반대편)에서 3:2가 **실제 libration**
        (coverage 258°), 스캔 중 최저 MEGNO 8.1, **Hades e ~0.122로 ~2배 펌핑** = 조석가열을
        물리적으로 지지 + Pandora 불변(관측우선 유지). 단 넓은진폭(~130°)·약카오스·300yr이라
        장기(1000yr+) 확인 필요. 현 게이트값(135k gap, e동결)은 확인 전까지 유지; 3:2-락(131k,
        epoch M0≈180°)이 이를 대체할 선두 후보.
      lock_confirm_1000yr: >
        [점질량 한정, J2로 철회됨 — j2_confirm 참조] 점질량 1000yr(results/_moons_3to2lock)에선
        통과였음 — Hades 131k/M0=180° libration 지속(coverage 261°), Hades e 0.086–0.124로 공명
        유지. 당시 135k gap을 대체할 게이트 후보로 권장했으나, **J2 적용 후 락이 이탈해 권고 철회**.
      j2_confirm: >
        **[2026-06-20 J2 재검증 — 결정적] results/_moons_j2/.** Principia가 천체간에 적용하는
        폴리페무스 J2(=0.023)를 위성 시뮬에 주입(자체구현 scripts/j2.py, 해석 세차율과 <0.1% 검증).
        결과가 점질량 권고를 **뒤집음**:
        • **135k 갭 = J2에도 STABLE** (TRACE 1000yr, 5위성 bound·calm, Hades e 0.02–0.05).
        • **3:2-락(131k/M0=180°) = J2로 UNSTABLE** — Hades t≈510yr 이탈. J2의 근점/승교점 세차가
          가장자리(~130° 폭) libration을 detune→순환→e 펌핑→이탈. 락이 주던 자기일관 조석가열
          근거가 사라짐 → Hades e≈0.05는 다시 "주어진 값"(documented limitation)으로 복귀.
        • **결정: 135k 갭 유지, 3:2-락 채택 철회.**
        **충실도(Principia 프록시 = leapfrog 고정 10분, 절대좌표):** 갭은 leapfrog서도 STABLE
        (|dE/E|1.5e-10) — 정밀(TRACE)·Principia급 일치 → 채택 레이아웃은 게임서도 견고. 락은
        적분기 민감(leapfrog는 유지, TRACE는 이탈 — 저차수가 섬세한 공명이탈을 놓침; Principia 12차는
        TRACE에 가까움) → 칼날 설정 회피 근거 추가. WHFast는 Jacobi라 위성-행성-별 계층 표현 불가라
        프록시 부적격(위성 런이 늘 IAS15/TRACE였던 이유).
      inclination_scan: >
        [4a 큰경사 의향 검증] results/_moons_inclination_scan.md. **점질량**: s≈30°까지 bound,
        s=40° 이젝션(코자이 ~39°, 최대경사 Hades). **J2 적용(TRACE 300yr)**: J2가 안쪽 위성을
        적도면에 앵커링해 코자이 펌핑 억제 → **s=40°까지 bound**(한계가 안쪽 Hades→외측 역행
        Chaos로 이동, e_max 0.88 @s40). 시각분산 스윗스팟 J2서 s≈25–30°까지 가능.
      spread_adopted: >
        **[2026-06-20 채택] s=25° 분산 확정** (results/_moons_j2/spread25). 1000yr TRACE+J2:
        STABLE, |dE/E| 8.2e-9, 5위성 전부 bound·calm, **전 위성 근일점 > 폴리페무스 표면**
        (Dante q 96.8k > 71.5k, 나머지 여유). 채택 경사: Dante 12.5°/Hades 25°/Pandora 0°(적도
        고정)/Cassandra 162.5°/Chaos 150°(역행 보존). 내측 e는 분산 줘도 낮음(Dante 0.03·Hades
        0.05, J2 적도앵커 덕). moons 표 inc_deg + hypotheticals/alpha_centauri.json 반영 완료.
      cotilt_scan: >
        [동시틸트, J2] results/_moons_cotilt_scan.md (TRACE 300yr): 락이 J2로 죽은 뒤라 동시틸트의
        "락+분산" 목적은 성립 안 함. θ=0°(완전 동일평면)은 이탈, θ=10–30°는 bound지만 φ 전부 순환
        (락 없음), 차등 승교점 세차로 Dante–Hades 상호경사 최대~60° 드리프트(동일평면 유지 안 됨).
    moons:                         # a/e/inc는 게이트 통과한 설계값(inc=s=25 분산); 질량·반경은 INVENTED(Pandora·Cassandra지름만 canon)
      - { name: Dante,     order: 1, a_km: 100000, e: 0.01, inc_deg: 12.5, mass_kg: 8.0e21, radius_km: 900,  note: "최내곽, Roche 가장자리(유체 98.3k 밖, q 96.8k>표면), 화산 moonlet. inc=0.5×s." }
