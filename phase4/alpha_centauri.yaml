      - { name: flattening, value: 0.13, op: set, note: "= (3J₂+q)/2 파생 에코 (J₂ 0.023, q 0.19), 시각 oblate 슬롯; 대형 q라 1차식이 다소 하한" }
      - { name: spin_axis_orientation, value: "obliquity 5° 방위, 자유 emit (eclipse duty 94% bound)", op: set }
      - { name: internal_heat, value: "negligible (T_int<110K, 내부플럭스 ≲6% insolation, 자발광 아님)", op: set }
      - { name: geopotential_c22, value: null, na_reason: "가스자이언트 자유 자전이라 축대칭, 조석 삼축 없음 (zonal J2/J4만, 전용 행)" }
      - { name: age, value: 5.3, unit: Gyr, op: set, phase3_default: "5.3 Gyr (α Cen A 상속)" }
