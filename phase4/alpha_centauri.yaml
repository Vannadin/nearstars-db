      Pandora는 이 계 전체가 존재하는 이유다. 지구보다 약간 작은 0.8g 위성이자 Na'vi의 모천이고, NearStars를
      통틀어 유일한 거주가능 천체다. 공식적으로는 Alpha Centauri A b의 셋째 위성이며, 아바타 이름은 설명
      텍스트에만 붙는 문화명으로 남는다. 실제 검출이 뒤에 없는 순수 픽션이라 발견은 어려운 길로 간다 — 모든
      난도에서 플레이어가 관측으로 직접 찾아야 한다.
    fields:
      - { name: body_type, value: "거주가능 지구형 위성 (sub-Earth, 0.645 M⊕, 0.8 g, 반경 5724 km)", op: set }
      - { name: designation, value: "Alpha Centauri A b III", op: set }
      - { name: cultural_name, value: "Pandora", op: set }
      - { name: discoverability, value: "fictional", op: set }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: "The only habitable body (special handling). discoverability=fictional (synthetic moon, no real detection) → RB IGNORELEVELS F F F F (observation-discovered at all difficulties), researchbodies-cfg db-mapping canonical."
      evidence_ko: "유일 거주가능체(특별 취급). discoverability=fictional(합성 위성, 실검출 없음) → RB IGNORELEVELS F F F F(전 난도 관측-발견), researchbodies-cfg db-mapping canonical."
    discoverability_cfg: {category: fictional, ignorelevels: "F F F F", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Pandora
    axis: bulk                     # mass/radius/gravity/rotation/obliquity (facet-walk 2026-06-22)
    body_class: tidally_locked     # §3.2 템플릿 앵커
    status: gated
    driver: [canon, physics]
    narrative: >
      The canon hands us four body numbers that cannot all be true at once, so the owner kept the two a visitor
      would actually feel — the size and the 0.8 g gravity — and derived the rest, landing the density realistically
      between Mars and Earth. The day is 32 hours, tide-locked to Polyphemus, chosen over the canon's 27 because the
      wider orbit keeps the ocean's tidal budget safely below runaway. The axis tilt is simply the orbit's own ~10°
      lean — for a locked moon the canon's "29°" never described a free spin axis anyway. Inside, radioactive decay
      and a gentle tidal knead keep the rock warm enough to drive the volcanoes, the fast continental drift, and the
      magnetic dynamo all from the same fire; the tide also pulls the moon faintly egg-shaped, invisible to the eye
      but real to the orbit. The floating Hallelujah mountains are lore, not bulk physics. The whole configuration
      was re-simulated and holds.
    narrative_ko: >
      캐넌은 동시에 참일 수 없는 네 개의 신체 수치를 건넨다. 그래서 오너는 방문자가 실제로 체감할 두 값 — 크기와
      0.8g 중력 — 을 지키고 나머지를 도출했으며, 밀도는 화성과 지구 사이에 현실적으로 안착했다. 하루는 32시간,
      Polyphemus에 조석고정이다. 캐넌의 27시간 대신 고른 이유는 더 넓은 궤도가 바다의 조석 예산을 폭주 아래로
      안전하게 지켜서다. 자전축 기울기는 궤도 자체의 ~10° 기울임 그대로다 — 고정된 위성에게 캐넌의 "29°"는
      애초에 자유 자전축을 뜻한 적이 없다. 내부에서는 방사성 붕괴와 부드러운 조석 반죽이 암석을 데워 화산, 빠른
      대륙이동, 자기 다이나모를 전부 같은 불로 굴리고, 조석은 달을 희미하게 계란형으로 당긴다 — 눈에는 안 보여도
      궤도에는 실재한다. 떠 있는 할렐루야 산맥은 lore이지 벌크 물리가 아니다. 이 구성 전체를 재시뮬레이션으로
      검증했고, 버틴다.
    fields:
      - { name: radius, value: 5724, unit: km, op: set, note: "canon 지름 11,447" }
      - { name: mass, value: 3.85e24, unit: kg, op: set, phase3_default: "옵션 B: 0.8g 고정 → 0.645 M⊕" }
      - { name: gravity, value: 0.8, unit: g, op: set, note: "canon 체감값" }
      - { name: flattening, value: 5.2e-3, op: set, note: "= (5/2)·J₂ 평균적도 spheroid — 시각상 사실상 구 (a−c≈47 km는 C22 행 note)" }
      - { name: reference_radius, value: 5724, unit: km, op: set, note: "J2/C22 기준 반경 = radius" }
      - { name: rotation_period, value: 32, unit: h, op: set, note: "조석고정 (canon 27h 대신)" }
      - { name: obliquity, value: 10, unit: deg, op: set, note: "궤도경사서 옴" }
      - { name: internal_heat, value: "방사성 + 약한 조석 (e강제 ~0.005) → 화산·대륙이동·dynamo 구동", op: set }
      - { name: geopotential_j2, value: 2.06e-3, reference_radius_km: 5724, op: set, note: "= 10/3·C̄₂₂, φ0.95 — 0.645 M⊕(3.85e24 kg) 재계산 (구 5.5e-4계는 기각된 0.72 M⊕ 기반)" }
      - { name: geopotential_c22, value: 6.2e-4, op: set, note: "조석 삼축; 편평 0.83%(a−c≈47 km), 시각상 구 — 궤도 섭동에만 실재" }
      - { name: age, value: 5.3, unit: Gyr, op: set }
      - { name: spin_axis_orientation, value: "orbit normal", op: set }
    gate:
      criterion: [canon-consistency, physics]
      verdict: owner-override
      evidence: >
        Canon 4 values (0.72 M⊕·0.8g·5724km·1.2 ρ⊕) mutually inconsistent → adopt radius+gravity (option B), derive
        mass 0.645 M⊕ (3.85e24 kg)·density ~0.89 ρ⊕ (~4900 kg/m³, Mars↔Earth). Canon 1.2 ρ⊕ (=6617 kg/m³) requires
        super-Mercury iron fraction (unrealistic for a habitable body) and contradicts canon's own mass+radius
        (→0.99 ρ⊕) → rejected. rotation=tidal lock 32h (vs canon 27h — ocean tidal-budget robustness, see
        satellites final_2026_06_21); obliquity canon 29°→~10° = the orbital inclination (locked moon: "spin-axis
        29°" originally meant the orbital-plane obliquity, not a free axis). internal_heat=radiogenic + weak tidal
        (forced e ~0.005), shared source with volcanism·drift·dynamo. Tidal C̄₂₂≈6.2e-4 (φ=0.95, recomputed for
        0.645 M⊕), flattening 0.83% — visually spherical, real to the orbit (body-figure-methodology.md).
        spin_axis=orbit normal; age 5.3 Gyr inherited. ✅ mass B re-sim STABLE (results/_pandora_massB, 1000yr
        TRACE+J2(0.023), |ΔE/E| 7.6e-9, 5 moons bound·calm·ejections 0, Pandora e≤0.0075 ocean-safe) — a light
        perturber, as expected.
      evidence_ko: >
        canon 4값(0.72 M⊕·0.8g·5724km·1.2 ρ⊕) 상호 불일치 → 반경+중력 채택(옵션 B), mass 0.645 M⊕(3.85e24 kg)·
        밀도 ~0.89 ρ⊕(~4900 kg/m³, 화성↔지구) 도출. canon 1.2 ρ⊕(=6617 kg/m³)는 super-Mercury급 철 함량 필요
        (거주가능체에 비현실) + canon 자기 질량+반경(→0.99 ρ⊕)과도 모순 → 기각. rotation=조석고정 32h(canon 27h
        대신 — 해양 조석예산 robustness, satellites final_2026_06_21 참조); obliquity canon 29°→~10° = 궤도경사
        (고정 위성: "자전축 29°"는 본래 궤도면 황도경사, 자유 축 아님). internal_heat=방사성 + 약한 조석(e강제
        ~0.005), 화산·대륙이동·dynamo와 열원 공유. 조석 C̄₂₂≈6.2e-4(φ=0.95, 0.645 M⊕ 재계산), 편평 0.83% —
        시각상 구, 궤도엔 실재(body-figure-methodology.md). spin_axis=궤도 법선; age 5.3 Gyr 상속. ✅ mass B
        재시뮬 STABLE(results/_pandora_massB, 1000yr TRACE+J2(0.023), |ΔE/E| 7.6e-9, 5위성 bound·calm·이젝션 0,
        Pandora e≤0.0075 해양안전) — 예상대로 가벼운 교란체.

  - body: Pandora
    axis: atmosphere               # composition/pressure/temperature/greenhouse/breathability (group 4, facet-walk 2026-06-22)
    status: gated
    driver: [canon, physics]
    narrative: >
      The air is the canon's, kept faithfully: mostly nitrogen with oxygen, a heavy dose of carbon dioxide, a
      strange xenon richness, and toxic traces — about a tenth denser than Earth's at the surface. Raw sunlight out
      here would leave the moon frozen; it is the thick CO₂ greenhouse, a mild cousin of the Venus mechanism, that
      lifts the surface to livable warmth, with a gentle great-season swing as the parent planet rides its
      eccentric orbit. So the habitability is honestly earned by the atmosphere, not by tides or a convenient star.
      Kerbals can breathe it — the game does not model toxicity — while the human-lethal chemistry survives as
      Kerbalism report lore. Full altitude profiles are generated at emit.
    narrative_ko: >
      대기는 캐넌 그대로 충실히 지켰다. 질소가 주성분에 산소가 있고, 이산화탄소가 듬뿍, 기묘하게 제논이 풍부하며,
      독성 미량 성분이 섞여 있다 — 지표 기압은 지구보다 십분의 일쯤 높다. 이 거리의 맨 햇빛으로는 얼어붙을
      운명이지만, 두터운 CO₂ 온실 — 금성 메커니즘의 온건한 사촌 — 이 지표를 살 만한 온도까지 끌어올리고, 모행성이
      찌그러진 궤도를 도는 대로 대계절이 잔잔하게 오간다. 그러니 거주가능성은 조석이나 편리한 별이 아니라 대기가
      정직하게 벌어 온 것이다. Kerbal은 이 공기를 숨 쉴 수 있다 — 게임은 독성을 모델링하지 않는다 — 그리고 인간에게
      치명적인 화학은 Kerbalism 레포트 lore로 살아남는다. 고도별 전체 프로파일은 emit 때 생성된다.
    fields:
      - { name: composition, value: "N₂ 주성분 + O₂ + CO₂ >18% + Xe 5.5% + CH₄ + H₂S >1% (canon)", op: set }
      - { name: pressure, value: 1.1, unit: atm, op: set, note: "canon ~20% 빽빽" }
      - { name: temperature, value: 290, unit: K, op: set, note: "Teq ~225K + CO₂ 온실 +70K; great-season ±15–25K" }
      - { name: greenhouse, value: "강함 (CO₂>18%+CH₄+H₂S 구동, +70K lift)", op: set }
      - { name: scale_height, value: "도출 (무거운 CO₂+0.8g)", op: set }
      - { name: escape, value: "안정 (지구형 0.8g)", op: set }
      - { name: breathability, value: true, op: set, note: "O₂ 존재 but lore-독성; stock atmosphereContainsOxygen=true" }
    gate:
      criterion: [canon-consistency, physics]
      verdict: pass-in-window
      evidence: >
        Faithful to canon composition (N₂ + O₂ + CO₂ >18% + Xe 5.5% + CH₄ + H₂S >1%) and pressure (~1.1 atm, canon
        ~20% denser). Teq ~225K (Polyphemus-system insolation) + high-CO₂ greenhouse +70K → surface ~290K,
        great-season ±15–25K — physically justified (a mild version of the Venusian mechanism); the lift is
        greenhouse, not tidal/stellar. scale_height derived (heavy CO₂ + 0.8g); escape stable (Earth-like 0.8g).
        breathability: KSP stock does not model toxicity → atmosphereContainsOxygen=true (jets·Kerbal breathing),
        human toxicity is a Kerbalism flag/report lore. Altitude T/P curves generated at emit from the
        cool-giant/Earth-like model (the eccentricity curve reads the parent Polyphemus e for the great-season —
        a delicate emit value, see the facet-checklist).
      evidence_ko: >
        canon 조성(N₂ + O₂ + CO₂ >18% + Xe 5.5% + CH₄ + H₂S >1%)·압력(~1.1 atm, canon ~20% 빽빽) 충실. Teq
        ~225K(폴리페무스계 입사) + 고CO₂ 온실 +70K → 지표 ~290K, great-season ±15–25K — 물리 정당(금성식
        메커니즘의 온건판); lift는 조석/항성 아닌 온실. scale_height 도출(무거운 CO₂+0.8g); escape 안정(지구형
        0.8g). breathability: KSP 스톡은 독성 미모델 → atmosphereContainsOxygen=true(제트·Kerbal 호흡), 인간
        독성은 Kerbalism 플래그/레포트 lore. 고도별 T/P 커브는 emit 시 cool-giant/지구형 모델서 생성
        (eccentricity curve는 부모 폴리페무스 e를 읽어 great-season 반영 — delicate emit 값, facet-checklist 참조).

  - body: Pandora
    axis: surface                  # type/hydrosphere/biosphere/tectonics/terrain/ice_caps/albedo/temp (group 5, facet-walk 2026-06-22)
    status: gated
    driver: [canon, art, physics]
    narrative: >
      Pandora is a mountain world with an even split of land and sea — more continent than Earth ever had, and
      almost none of it flat. Lush rainforest climbs the highlands, glowing faintly cyan along plants and
      coastlines at night, while active volcanic belts and unusually fast continental drift run on the same
      internal heat that powers the dynamo. Ice survives only on the highest summits and at the poles. The
      floating Hallelujah mountains get their homage as dramatic stone arches and overhangs — the game's terrain
      cannot levitate, and the owner approved the honest substitute; the unobtanium explanation stays in report
      lore.
    narrative_ko: >
      Pandora는 육지와 바다가 반반인 산악 세계다 — 지구가 가져본 적 없는 육지 비중인데, 그중 평평한 땅은 거의
      없다. 무성한 우림이 고지대를 타고 오르고, 밤이면 식물과 해안선을 따라 청록빛이 은은하게 번지며, 활동적인
      화산대와 유난히 빠른 대륙이동은 다이나모를 돌리는 것과 같은 내부열로 굴러간다. 얼음은 최고봉 정상과
      극지방에만 남는다. 떠 있는 할렐루야 산맥은 극적인 돌 아치와 오버행으로 오마주된다 — 게임 지형은 부양할 수
      없고, 오너는 이 정직한 대체를 승인했다. 언옵타늄 설명은 레포트 lore에 머문다.
    fields:
      - { name: surface_type, value: "지구형, 육지:대양 ≈ 50:50, 산악 우세", op: set }
      - { name: hydrosphere, value: "액체 물 대양/바다 (~50%, 290K 안정)", op: set }
      - { name: biosphere, value: "무성한 우림 + 고생물 다양성, 청록 생물발광", op: set }
      - { name: tectonics, value: "활화산대 + 빠른 대륙이동 (조석+방사성)", op: set }
      - { name: terrain, value: "산악+화산대+고지대 산맥, 부유산=PQS 아치/오버행 오마주", op: set }
      - { name: ice_caps, value: "고봉 정상 + 극관에만 (제한적)", op: set }
      - { name: albedo, value: 0.30, op: set }
      - { name: surface_temperature, value: 290, unit: K, op: set }
    gate:
      criterion: [canon-consistency, physics]
      verdict: pass-in-window
      evidence: >
        Owner art-direction (2026-06-22): 5-1 floating mountains=PQS arch homage approved (KSP terrain cannot
        levitate; actual levitation excluded, unobtanium=report lore). land:ocean ≈ 50:50 (vs Earth 30:70),
        mountains dominant·flatland scarce. hydrosphere=liquid water ~50%, stable at 290K (group 4 greenhouse);
        tectonics=active volcanic belts + fast drift (tidal+radiogenic, same origin as the dynamo). Ice caps=high
        peaks+polar caps only (limited at mean 290K); albedo ~0.30 (Earth-class from land·clouds·some ice/snow).
        Bioluminescence=subtle (a bit of plants + a bit of coastline) → rendered in the appearance row.
      evidence_ko: >
        오너 art-direction(2026-06-22): 5-1 부유산=PQS 아치 오마주 승인(KSP 지형 부양 불가; 실제 부양 배제,
        언옵타늄=레포트 lore). 육지:대양 ≈ 50:50(지구 30:70 대비), 산악 우세·평지 희소. hydrosphere=액체 물
        ~50%, 290K 안정(group 4 온실); tectonics=활화산대 + 빠른 대륙이동(조석+방사성, dynamo와 동근).
        빙관=고봉+극관만(평균 290K라 제한적); albedo ~0.30(육지·구름·일부 빙설로 지구급). 생물발광=은은(식물
        약간 + 해안 약간) → appearance 행서 렌더.

  - body: Pandora                  # A b III
    axis: magnetism.magnetic_field
    status: gated
    driver: [physics, canon]
    narrative: >
      Pandora carries a field roughly twice Earth's — nearly unheard-of for a moon. The same tidal kneading that
      fuels its volcanoes keeps the iron core churning, and the brisk 32-hour spin keeps that churn organized into
      a clean dipole; the owner took the top of the physically defensible range, in the interesting-first spirit.
      The field is honest physics with no unobtanium boost, and it is nowhere near enough to levitate mountains —
      that mystery is deliberately left unexplained, leaking into science reports only as hints. The magnetic
      anomaly around the floating mountains, the "flux vortex", becomes its own biome with anomaly science and a
      local aurora of its own.
    narrative_ko: >
      Pandora는 지구의 대략 두 배 자기장을 두른다 — 위성으로서는 거의 전례가 없는 세기다. 화산을 먹이는 것과
      같은 조석 반죽이 철핵을 계속 휘젓고, 경쾌한 32시간 자전이 그 휘저음을 깔끔한 쌍극으로 정돈한다. 오너는
      물리적으로 변호 가능한 범위의 꼭대기를 골랐다 — interesting-first 정신 그대로다. 이 자기장은 언옵타늄
      부스트 없는 정직한 물리이고, 산을 띄우기에는 어림도 없다 — 그 미스터리는 일부러 설명하지 않은 채 과학
      레포트에 힌트로만 흘린다. 부유산 일대의 자기 이상, "플럭스 볼텍스"는 자기 이상 과학과 제 몫의 국소
      오로라를 갖는 독자 바이옴이 된다.
    fields:
      - { name: magnetic_field, value: "75 µT (~1.8× 지구; rocky-dynamo ℳ⁺ 상한, 조석-구동 Fe 핵 dynamo, 32h 자전 쌍극)", op: set }
      - { name: magnetic_field_polar, value: 150, unit: uT, op: set }
    refs: ["docs/reference/rocky-planet-dynamo-methodology.md"]
    gate:
      criterion: [canon-consistency, physics]
      verdict: pass-in-window
      evidence: >
        Canon Fe core + strong magnetic field. Grounded in the rocky-dynamo ladder (RM22/OC06), NOT the giant energy-flux law (which would wrongly give a
        near-parent-giant field). At this density (0.89 ρ⊕) the iron core is medium-sized, not huge (super-Mercury), but tidal heat (forced e ~0.005)+radiogenic
        heat keep it vigorously convecting, and the fast 32 h spin keeps the dynamo dipolar → the ℳ⁺ upper bound, ~1.8× Earth (75 µT eq / 150 µT polar) — not
        "Earth-class" but a strong few-×-Earth field, the interesting-first high end (earlier 140 µT ≈ 0.82× Polyphemus was giant-law over-application, rejected).
        Shares the same heat source (tidal heat) as the volcanism·fast continental drift (causally linked). Unusual among moons (only Ganymede has a
        weak dynamo). The unobtanium boost is excluded from the grounding (realism) — just a strong intrinsic field. Not enough to levitate mountains
        (that is a canon/report mystery). Downstream report seed: the "seemingly able to mine what seems unminable"
        nuance — leak the floating-mountain/flux-vortex mechanism into reports as a mystery/easter-egg without
        physical assertion; the high-field zone is a formal biome (gameplay row).
      evidence_ko: >
        캐넌 Fe 핵 + 강한 자기장. 암석형 다이나모 사다리(RM22/OC06)로 근거화 — 거대행성 에너지플럭스 법칙 아님
        (그걸 쓰면 모행성급 자기장이 잘못 나옴). B밀도(0.89 ρ⊕)면 철핵은 거대(super-Mercury) 아닌 중간 크기지만,
        조석열(e강제 ~0.005)+방사성이 왕성히 대류시키고 빠른 32h 자전이 쌍극 유지 → ℳ⁺ 상한 ~1.8× 지구(적도 75 / 극 150 µT).
        "지구급"이 아니라 지구 수 배의 강장이며 interesting-first 상한 선택(이전 140 µT ≈ Polyphemus 0.82배는 giant-법칙 과적용이라 기각).
        화산·빠른 대륙이동과 같은 열원(조석열)을 공유(인과 묶임). 위성 중 이례적(가니메데만
        약한 dynamo). 언옵타늄 부스트는 grounding서 제외(현실고증) — 그냥 강한 고유 자기장. 부유산 띄울 정도는
        아님(그건 canon/report 미스터리). 후행 레포트 씨앗: "채굴 불가능할 것 같은 물질을 채굴할 수 있을 듯한"
        뉘앙스 — 부유산/플럭스 볼텍스 메커니즘을 물리 단언 없이 미스터리/이스터에그로 레포트에 흘릴 것; 고자기장
        구역은 정식 바이옴(gameplay 행).

  - body: Pandora
    axis: magnetism.magnetosphere
    status: gated
    driver: [physics, canon]
    narrative: "The intrinsic magnetosphere shields the surface. Per canon, located in the gap *between* Polyphemus's two belts + its own strong field → habitable."
    narrative_ko: "고유 자기권이 표면 차폐. 캐넌대로 Polyphemus 두 벨트 *사이(gap)*에 위치 + 자체 강자기장 → 거주가능."
    fields:
      - { name: magnetosphere, value: "고유 자기권 표면 차폐 (Polyphemus 두 벨트 사이 gap 위치)", op: set }
    gate:
      criterion: [canon-consistency]
      verdict: pass-in-window
      evidence: "An Earth-class intrinsic field + between-belts (canon gap) is enough to shield the surface — no ultra-strong field needed. The physical basis for habitability."
      evidence_ko: "지구급 고유장 + between-belts(canon gap)면 표면 차폐 충분 — 초강자기장 불요. 거주가능의 물리 근거."

  - body: Pandora
    axis: magnetism.radiation_belts
    status: superseded            # → 2026-07-24 refit 행이 대체(오너 승인): 값 보존, 손수 토러스 지오메트리를 L-셸 수치 피팅으로 교체 + 패킹 문자열 필드를 개별 cfg 필드로 구조화. provenance용.
    driver: [physics]
    refs: ["docs/reference/planetary-magnetosphere-geometry-methodology.md", "docs/reference/solar-system-radiation-belts.md"]
    narrative: >
      Strong-field embedded mini-belt — sub-regime 3b (NOT a Ganymede weak-field analog). Pandora's 75 µT eq is ~19× the 3.9 µT
      local Polyphemus field at 3.53 R_p. In isolation it would carry a magnetosphere bigger than Earth's (standalone ~17 R_moon);
      embedded, Polyphemus's local magnetic pressure (~6 µPa, ~3000× a solar-wind ram) compresses it ~7× to a field-crossover
      standoff (75/3.9)^(1/3) ≈ 2.6 R_moon. The high 19× dominance keeps the field mostly closed (small polar cusps), so Pandora's
      thick habitable atmosphere sustains a REAL CRAND inner belt — Earth-KIND, not Ganymede-negligible — GCR-screened by Polyphemus
      + gap-starved, hence radiation_inner ≈ 4 rad/h (~0.4× ROKerbalism Earth's 10.4). Single narrow belt only (the compressed
      magnetosphere has no room for Earth's two), cut above the atmosphere by a loss-cone D-shape (inner_border_radius 1.05 R_moon).
      The field's dominant role is shielding the surface from Polyphemus's belt; the CRAND belt is an orbital-altitude hazard that
      feeds the aurora, not a surface one. Derived via the magnetosphere-geometry methodology (Part D, strong-field 3b); the
      real-world weak-field contrast is Ganymede (solar-system-radiation-belts.md). Lengths are in R_moon (Pandora radii).
    narrative_ko: >
      강장 임베디드 미니벨트 — sub-regime 3b(가니메데 약장 아날로그가 아님). Pandora 적도장 75 µT는 3.53 R_p 위치 Polyphemus
      국소장 3.9 µT의 ~19배. 독립이라면 지구보다 큰 자기권(단독 ~17 R_moon)이지만, 임베딩되면 Polyphemus 국소 자기압
      (~6 µPa, 항성풍 ram의 ~3000배)이 ~7배 압축해 場교차 standoff (75/3.9)^(1/3) ≈ 2.6 R_moon이 됨. 19배 우세로 場이 대부분
      폐쇄(극 cusp 작음)라, Pandora의 두꺼운 거주가능 대기가 실질 CRAND 내대를 유지 — 지구-KIND이지 가니메데식 무시가능이
      아님 — Polyphemus GCR 차폐 + gap 기아로 radiation_inner ≈ 4 rad/h(ROKerbalism 지구 10.4의 ~0.4배). 단일 좁은 벨트만
      (압축 자기권이라 지구식 2벨트 불가), 손실원뿔 D형으로 대기 위에서 잘림(inner_border_radius 1.05 R_moon). 場의 주역할은
      Polyphemus 벨트로부터 표면 차폐이고, CRAND 벨트는 지표가 아니라 궤도 고도 위협이며 오로라를 먹임. 자기권-지오메트리
      방법론(Part D 강장 3b)으로 도출. 실제 약장 대조군은 가니메데(solar-system-radiation-belts.md). 길이 단위는 R_moon(Pandora 반경).
    fields:
      - { name: radiation_model, value: "pandoramini (has_inner=true, inner_dist=1.4, inner_radius=0.5, inner_border_dist=0.0001, inner_border_radius=1.05 [D-cut above atmosphere], has_outer=false, has_pause=true, pause_radius=2.6) — all in R_moon", op: set }
      - { name: radiation_inner, value: 4.0, unit: "rad/h", op: set, phase3_default: "2.0 (구값: 약장 gap-기아 가정)" }
      - { name: radiation_pause, value: -0.01, unit: "rad/h", op: set }
      - { name: geomagnetic_pole_lat, value: 80, unit: deg, op: set, note: "= 90° − 자기축 기울기 ~10°; magnetic_dipole_tilt_deg 확정 시 따름" }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Derived via planetary-magnetosphere-geometry-methodology Part D, strong-field embedded sub-regime 3b. Standoff =
        field-crossover (B_moon 75 / B_parent_local 3.9)^(1/3) ≈ 2.6 R_moon — the parent's local magnetic pressure compresses a
        standalone ~17 R_moon magnetosphere by ~7×. radiation_inner 4.0 = ~0.4× ROKerbalism Earth's 10.4: a real CRAND belt from
        the thick atmosphere (Earth-KIND), GCR-screened by Polyphemus + gap-starved (Part B — intensity is source/loss, NOT a field
        readout). D-cut (inner_border_radius 1.05) keeps the belt above the atmosphere, not below the surface. radiation_pause -0.01
        = stock scale (the shield is the pause's presence, not the value). Caveat: rad/h is a tuning target, conf low — a
        fiction-premise strong-field embedded moon with no Solar-System exemplar (Ganymede is the real weak-field 3a contrast).
      evidence_ko: >
        planetary-magnetosphere-geometry-methodology Part D 강장 임베디드 sub-regime 3b로 도출. Standoff = 場교차
        (B_moon 75 / B_parent_local 3.9)^(1/3) ≈ 2.6 R_moon — 모행성 국소 자기압이 단독 ~17 R_moon 자기권을 ~7배 압축.
        radiation_inner 4.0 = ROKerbalism 지구 10.4의 ~0.4배: 두꺼운 대기의 실질 CRAND 벨트(지구-KIND), Polyphemus GCR
        차폐 + gap 기아(Part B — 강도는 소스/손실이지 場 아님). D컷(inner_border_radius 1.05)이 벨트를 지표 아래가 아니라
        대기 위에서 자름. radiation_pause -0.01 = 스톡 스케일(차폐는 pause의 존재이지 값 아님). caveat: rad/h는 튜닝 타깃,
        conf low — 태양계 선례 없는 fiction-premise 강장 임베디드 위성(실제 약장 대조군은 가니메데 3a).

  - body: Pandora
    axis: magnetism.radiation_belts
    status: gated                 # 2026-07-24 refit (위 superseded 행 대체; 물리값 보존, 지오메트리만 L-셸 피팅 + 필드 구조화)
    driver: [physics]
    refs: ["docs/reference/planetary-magnetosphere-geometry-methodology.md", "docs/reference/solar-system-radiation-belts.md"]
    narrative: >
      A shape-only refit of the superseded row above — every physical value survives unchanged: the compressed mini-magnetosphere
      (standoff 2.6 R_moon), a single thin CRAND belt at 4 rad/h cut off just above the atmosphere, and the ~10° dipole tilt.
      What changed is how those facts are drawn: the belt is now the numerically fitted closed-field-line region instead of a
      hand-placed doughnut, and the magnetopause is encoded so the game actually puts its nose at 2.6 (the old encoding misread
      that field). Owner approved this refit-shape-only scope 2026-07-24. All lengths in R_moon.
    narrative_ko: >
      위 superseded 행의 모양-한정 refit — 물리값은 전부 그대로다: 압축된 미니 자기권(standoff 2.6 R_moon), 대기 바로 위에서
      잘리는 얇은 단일 CRAND 벨트 4 rad/h, 자기축 기울기 ~10°. 바뀐 것은 그 사실들을 그리는 방식뿐이다. 벨트는 손으로 놓은
      도넛 대신 폐쇄 자력선 영역을 수치 피팅한 모양이 됐고, 자기권계면은 게임이 노즈를 실제로 2.6에 놓도록 재인코딩했다
      (구행의 인코딩은 그 필드를 오독했었다). 2026-07-24 오너가 모양-refit-한정 스코프 승인. 길이 단위는 전부 R_moon.
    fields:
      - { name: radiation_model, value: nearstars_pandora, op: set }
      - { name: inner_dist, value: 1.0193, unit: R_moon, op: set }
      - { name: inner_radius, value: 0.8489, unit: R_moon, op: set }
      - { name: inner_deform_xy, value: 0.7196, op: set }
      - { name: inner_border_dist, value: 0.0971, unit: R_moon, op: set }
      - { name: inner_border_radius, value: 0.9349, unit: R_moon, op: set }
      - { name: inner_border_deform_xy, value: 0.8829, op: set }
      - { name: pause_radius, value: 2.99, unit: R_moon, op: set, note: "= 노즈(standoff) 2.6 × comp 1.15 (nose = pause_radius/pause_compression)" }
      - { name: pause_compression, value: 1.15, op: set }
      - { name: pause_extension, value: 0.6, op: set }
      - { name: radiation_inner, value: 4.0, unit: "rad/h", op: set, phase3_default: "2.0 (구값: 약장 gap-기아 가정)" }
      - { name: radiation_pause, value: -0.01, unit: "rad/h", op: set }
      - { name: geomagnetic_pole_lat, value: 80, unit: deg, op: set, note: "= 90° − 자기축 기울기 ~10°; magnetic_dipole_tilt_deg 확정 시 따름" }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Physics unchanged from the superseded row (methodology Part D strong-field embedded 3b: field-crossover standoff
        2.6, CRAND source, GCR-screened + gap-starved 4 rad/h — Part B regime call, conf low). New here: geometry = fit_belts.py
        fit of the closed-line drift shell L 1.15–2.2 with the 1.05 loss-cone cut (IoU 0.98, same standard as the solar-system
        audit); pause encoded with the audited nose semantics, standoff 2.6 preserved exactly (pause_radius 2.99 / compression
        1.15); the packed radiation_model string became individual cfg fields the emitter reads directly.
      evidence_ko: >
        물리는 superseded 행과 동일(방법론 Part D 강장 임베디드 3b — 場교차 standoff 2.6, CRAND 소스, GCR 차폐 + gap 기아
        4 rad/h, Part B regime call, conf low). 이 행의 신규분 — 지오메트리 = 폐쇄 자력선 드리프트 셸 L 1.15–2.2 + 손실원뿔
        컷 1.05를 fit_belts.py로 피팅(IoU 0.98, 태양계 감사와 동일 기준). pause = 감사된 노즈 의미론으로 인코딩, standoff
        2.6 정확 보존(pause_radius 2.99 / compression 1.15). 패킹 문자열이던 radiation_model은 emitter가 직접 읽는 개별
        cfg 필드로 구조화.

  - body: Pandora
    axis: appearance               # base_colour/clouds/biolum/aurora/specular (group 6, facet-walk 2026-06-22)
    status: gated
    driver: [canon, art, physics]
    narrative: >
      From orbit Pandora reads as an Earth marble tilted green — with half the surface land, the vegetation
      outweighs the ocean blue under white weather clouds. Night is where it earns its keep: cyan bioluminescence
      traces the plants and coastlines below while a fierce, multicolored aurora burns overhead — oxygen greens
      and reds with nitrogen violet, deliberately distinct from the parent planet's hydrogen pink, and the two
      lights share the sky. The aurora's violence is honest: the moon sits inside Polyphemus's magnetosphere,
      bathed in Dante's sulfur plasma, holding a strong field of its own — the same recipe that lights Jupiter via
      Io. A second, local aurora oval hangs over the flux-vortex anomaly, marking the floating mountains from
      space. There are no city lights — the Na'vi build none.
    narrative_ko: >
      궤도에서 본 Pandora는 초록으로 기운 지구 마블이다 — 표면 절반이 육지라, 흰 기상 구름 아래로 식생이 대양의
      파랑을 눌러 이긴다. 진가는 밤에 나온다. 아래에서는 청록 생물발광이 식물과 해안선을 따라 그려지고, 위에서는
      격렬한 다색 오로라가 탄다 — 산소의 초록·적색에 질소의 보라, 모행성의 수소 핑크와 일부러 구분되는 색이고, 두
      빛은 한 하늘을 나눈다. 오로라의 사나움은 정직하다. 이 위성은 Polyphemus 자기권 안에서 Dante의 황 플라스마에
      잠긴 채 제 몫의 강한 자기장을 쥐고 있다 — Io를 통해 목성을 밝히는 것과 같은 레시피다. 플럭스 볼텍스 자기
      이상 위에는 두 번째 국소 오로라 오벌이 걸려, 우주에서 부유산의 위치를 표시한다. 도시 불빛은 없다 — Na'vi는
      아무것도 짓지 않는다.
    fields:
      - { name: base_colour, value: "지구식 초록 식생 + 파란 대양 + 흰 구름 마블", op: set }
      - { name: clouds, value: "흰 물구름, 활발한 기상", op: set }
      - { name: emission_glow, value: "은은한 청록 야간 생물발광 (식물+해안)", op: set }
      - { name: aurora, value: "격렬·다색 (O₂ 초록 557.7/630nm + N₂⁺ 청보라 391nm + 적색) + 국소 플럭스-볼텍스 오벌", op: set }
      - { name: specular, value: "대양 sun-glint (OceanFX)", op: set }
      - { name: haze, value: "지구식 파란 Rayleigh 림", op: set }
      - { name: artificial, value: "none (Na'vi 전산업)", op: set }
      - { name: rings, value: "none", op: set }
    gate:
      criterion: [visual-checklist, composition-lock]
      verdict: pass-in-window
      evidence: >
        Owner (2026-06-22): vegetation=Earth-style green (a), aurora=intense (a). The aurora color is composition-fixed (O₂ green 557.7nm + red 630nm,
        N₂⁺ blue-violet 391nm + red band) — distinguished from Polyphemus's H₂ pink. The intensity is physically justified: strong field + Dante sulfur plasma
        torus + position inside the Polyphemus magnetosphere = a Jupiter Io-torus strong-aurora analog. Local aurora:
        the flux-vortex high-field anomaly concentrates particle precipitation off the poles → an additional local
        oval centered on that zone, separate from the polar-cap aurora. Bioluminescence (ground cyan) and aurora (overhead
        multicolor) coexist at night. Aurora sRGB extracted at emit from element/molecular_plasma_colors.yaml
        (O₂/N₂/CO₂); bioluminescence=EVE/emissive night texture; specular=ocean sun-glint (OceanFX); haze=Earth-style
        blue Rayleigh limb; artificial/city-lights=∅ (Na'vi pre-industrial).
      evidence_ko: >
        오너(2026-06-22): 식생=지구식 초록(a), 오로라=강렬(a). 오로라 색은 조성-고정(O₂ 초록 557.7nm + 적색 630nm,
        N₂⁺ 청보라 391nm + 적색 밴드) — 폴리페무스 H₂ 핑크와 구분. 강도는 물리 정당: 강자기장 + Dante 황 플라스마
        토러스 + 폴리페무스 자기권 내 위치 = 목성 Io-토러스 강오로라 아날로그. 국소 오로라: 플럭스 볼텍스 고자기
        이상이 입자 강하를 비극지로 모음 → 극관 오로라와 별개로 그 구역 중심의 추가 오벌. 생물발광(지상 청록)과
        오로라(상공 다색)가 야간 공존. 오로라 sRGB는 emit 시 element/molecular_plasma_colors.yaml서
        추출(O₂/N₂/CO₂); 생물발광=EVE/emissive 야간 텍스처; specular=대양 sun-glint(OceanFX); haze=지구식 파란
        Rayleigh 림; artificial/도시 불빛=∅(Na'vi 전산업).

