        강벨트 성립. Dante 최내곽 극심, Hades 피크(~2–3 R_p) 근처. 캐넌 ">4,500 rem/day"는 場 발산 없이 이
        화산-source로 화해. Pandora는 두 벨트 사이 gap + 자체 강 dipole 차폐로 거주가능.

  - body: Alpha Centauri A b
