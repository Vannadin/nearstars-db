      evidence: >
        Canon Fe core + strong magnetic field. Grounded in the rocky-dynamo ladder (RM22/OC06), NOT the giant energy-flux law (which would wrongly give a
        near-parent-giant field). At this density (0.89 ρ⊕) the iron core is medium-sized, not huge (super-Mercury), but tidal heat (forced e ~0.005)+radiogenic
        heat keep it vigorously convecting, and the fast 32 h spin keeps the dynamo dipolar → the ℳ⁺ upper bound, ~1.8× Earth (75 µT eq / 150 µT polar) — not
        "Earth-class" but a strong few-×-Earth field, the interesting-first high end (earlier 140 µT ≈ 0.82× Polyphemus was giant-law over-application, rejected).
        Shares the same heat source (tidal heat) as the volcanism·fast continental drift (causally linked). Unusual among moons (only Ganymede has a
        weak dynamo). The unobtanium boost is excluded from the grounding (realism) — just a strong intrinsic field. Not enough to levitate mountains
        (that is a canon/report mystery).
      evidence_ko: >
        캐넌 Fe 핵 + 강한 자기장. 암석형 다이나모 사다리(RM22/OC06)로 근거화 — 거대행성 에너지플럭스 법칙 아님
        (그걸 쓰면 모행성급 자기장이 잘못 나옴). B밀도(0.89 ρ⊕)면 철핵은 거대(super-Mercury) 아닌 중간 크기지만,
        조석열(e강제 ~0.005)+방사성이 왕성히 대류시키고 빠른 32h 자전이 쌍극 유지 → ℳ⁺ 상한 ~1.8× 지구(적도 75 / 극 150 µT).
        "지구급"이 아니라 지구 수 배의 강장이며 interesting-first 상한 선택(이전 140 µT ≈ Polyphemus 0.82배는 giant-법칙 과적용이라 기각).
        화산·빠른 대륙이동과 같은 열원(조석열)을 공유(인과 묶임). 위성 중 이례적(가니메데만
        약한 dynamo). 언옵타늄 부스트는 grounding서 제외(현실고증) — 그냥 강한 고유 자기장. 부유산 띄울 정도는
        아님(그건 canon/report 미스터리).

