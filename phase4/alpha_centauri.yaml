      age 5.3 Gyr. gravity 202 m/s² = GM/R² derived echo (Kopernicus geeASL slot). spin_axis_orientation and
      geopotential_j2 (+reference_radius) are handled by dedicated rows (union rule).
    narrative_ko: >
      §3.2 앵커 — DB 측정 passthrough 에코: mass 1.1055 M⊙ · radius 1.2234 R⊙(8.511e8 m) · P_rot 22 d ·
      age 5.3 Gyr. gravity 202 m/s² = GM/R² 파생 에코(Kopernicus geeASL 슬롯). spin_axis_orientation과
      geopotential_j2(+reference_radius)는 전용 행이 담당(union rule).
    fields:
      - { name: mass, value: 1.1055, unit: M_sun, op: passthrough }
