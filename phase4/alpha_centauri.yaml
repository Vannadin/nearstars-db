        2:1(167k)은 Pandora 5:3·3:2 사이서 이젝션. e_max가 128~135k 전 구간 ~0.056 동일 = 공명 펌핑 전무. 따라서
        135k 빈틈은 취향이 아니라 유일한 안정 안. 함의: Hades e가 공명 유지 안 됨 → 현실 조석이면 가열 감쇠. canon
        ">900K"는 고정-Pandora계에서 비자기일관(라플라스 해법은 관측우선이 차단). e=0.056은 "주어진 값"으로 채택하는
        documented limitation.
      phase_scan_update: >
        위상 스캔(results/_moons_phase_scan.md)이 위 "락 불가"를 뒤집음 — 단일시드(M0=0) artifact였음. Hades 초기
        평균근점이각 M0≈180°(Dante 반대편)에서 3:2가 실제 libration(coverage 258°), 스캔 중 최저 MEGNO 8.1, Hades
