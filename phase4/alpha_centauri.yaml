      - { name: inner_border_deform_xy, value: 0.8829, op: set }
      - { name: pause_radius, value: 2.99, unit: R_moon, op: set, note: "= 노즈(standoff) 2.6 × comp 1.15 (nose = pause_radius/pause_compression)" }
      - { name: pause_compression, value: 1.15, op: set }
