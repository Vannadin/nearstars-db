      Center of the stability window. Reconciled the representative value from 1.9→1.6 within Beichman's preferred a<2 AU family.
    narrative_ko: >
      안정창 중앙. Beichman 선호 a<2 AU 패밀리에서 대표값 1.9→1.6으로 정합.
    fields:
      - { name: semi_major_axis_au, value: 1.6, unit: AU, op: set, phase3_default: "1.6 AU (Beichman 선호 a<2 AU 패밀리; 대표값 1.9→1.6 정합)" }
    gate:
      criterion: [stability]
      verdict: pass-in-window
