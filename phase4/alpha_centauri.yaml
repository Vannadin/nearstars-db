  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: rings                    # 고리 최종 확정 (2026-06-21 시뮬 검증). appearance.rings 대체.
    status: gated
    driver: [visual, observation]
    narrative: >
      Polyphemus keeps its rings, but as a ghost: a faint blue-white ice-dust E-ring so tenuous it almost honors
      the canon's "no rings", while still supplying the extra brightness the imaging needed. Its structure reads
      from the moons: icy Chaos feeds the ring with cryovolcanic plumes the way Enceladus feeds Saturn's E-ring,
      and Cassandra shepherds its inner edge. The ring splits into two annuli with a gap where Chaos orbits:
      physically the little moon cannot clear that lane, but a static ring drawn through a tilted moon's path
      would visibly break every orbit, so the gap is placed to vacate it. The ring plane follows Chaos's long-term
      average orbit rather than any single snapshot, so it stays believable over century-long campaigns as the
      moon wobbles around it. Its blue-white ice palette, chosen over a dark carbonaceous one, fixes Chaos as an
      icy body.
    narrative_ko: >
      Polyphemus는 고리를 지키되 유령으로 만든다. 캐넌의 "고리 없음"을 거의 존중할 만큼 흐릿한 청백색 얼음-먼지
      E고리인데, 이미징이 요구한 여분의 밝기는 그대로 공급한다. 구조는 위성들에서 읽힌다. 얼음체 Chaos가
      엔셀라두스가 토성 E고리를 먹이듯 cryovolcanic 플룸으로 고리를 먹이고, Cassandra가 안쪽 가장자리를 친다.
      고리는 두 환형으로 갈라지고 그 사이 간극을 Chaos가 돈다. 물리적으로 이 작은 달은 제 길을 비울 수 없지만,
      정적인 고리가 기운 달의 경로를 관통해 매 공전마다 화면이 깨져 보이므로 그 궤도를 비우는 간극을 둔다.
      고리면은 어느 한 순간의 스냅샷이 아니라 Chaos 궤도의 장기 평균면을 따라, 달이 그 둘레를 흔들리는 수백 년
      캠페인에도 그럴듯함이 유지된다. 어두운 탄소질 대신 고른 청백 얼음 팔레트가 Chaos를 얼음체로 확정한다.
    fields:
      - { name: ring_structure, value: "2-annulus: 안쪽 800000–1410000 km / 바깥 1590000–2500000 km", op: set }
      - { name: ring_inner_annulus_km, value: "800000–1410000", op: set }
      - { name: ring_outer_annulus_km, value: "1590000–2500000", op: set }
      - { name: ring_gap_km, value: "1410000–1590000 (Chaos at 1500000 km)", op: set }
      - { name: ring_opacity, value: 9.0e-5, op: set }
      - { name: ring_color, value: "#cdd9e4", op: set }
      - { name: ring_plane, value: "Chaos MEAN (Laplace) plane, retrograde inc ~175° rel. parent orbit (NOT the epoch 179° snapshot); anchor static ring here so Chaos librates ±sym about it", op: set }
      - { name: ring_composition, value: "water-ice dust (blue-white)", op: set }
      - { name: ring_brightness_R_jup, value: 0.05, op: set }
    gate:
      criterion: [stability, visual-checklist]
      verdict: owner-override
      evidence: >
        A physical gap is impossible: in a test-particle sim (Sim B, ring_clearing.py 2000yr, results/_ring_clearing), Chaos is
        too small at mass ratio μ≈7.5e-7 to clear any gap (even particles at Chaos's semi-major axis survive). So the gap is intentional for
        rendering purposes, not dynamics. To narrow the gap, Chaos e was lowered 0.10→0.02 (results/_chaos_e002, STABLE):
        the radial excursion ±150k→±30k km, so a ~180k km gap clears it cleanly. Brightness sums orthogonally as area∝R², so an "apparent
        +0.05 R_Jup" corresponds to an equivalent disk ~0.32 R_Jup (~23k km). Beichman 2025 §5.3 (arXiv:2508.03814) "Planet Ring
        System Models": their preferred model is an optically thick ring inside Roche (Saturn-½ cross-section, equivalent disk 64,000 km), and
        our faint E-ring corresponds to their optically thin dust alternative (Kennedy 2011 irregular-satellite grinding).
        Ring-plane precession verification (dense 8000-snapshot leapfrog 2000yr, results/_principia2000_dense): Chaos
        mean plane = retrograde inc 175.4° rel. orbital plane (sim-frame normal [0.50,-0.80,-0.33]); instantaneous↔mean plane 10.9°;
        libration about the mean plane RMS 5.7°/max 12.6° (period ~56yr). Fixing to the epoch plane, the excursion is ~±6° (returns within 50yr) but
        grows to 14/18° at 1000/2000yr, bounded by the mean-plane anchor. Dynamic tracking (ring↔live orbital plane linkage) is a long-term C#-plugin
        task (not possible in cfg). Emit shape: Kopernicus rings are circular concentric annuli only (no
        eccentricity) → 2 Ring nodes (inner 800k–1.41M, outer 1.59M–2.5M km; gap 1.41M–1.59M with Chaos at 1.5M)
        sharing Chaos's mean plane (Laplace, retrograde inc ~175° rel. orbital plane, NOT the epoch 179° snapshot);
        a diffuse E-ring is axisymmetric at steady state (perihelion precession randomized), so a circular annulus
        is faithful, and the reduced Chaos e (0.02) is absorbed into the gap margin. Apparent +0.05 R_Jup (τ≈9e-5,
        equivalent disk ~23k km = 13% of Beichman's Saturn-½ cross-section) keeps the planet at the gated
        1.0 R_Jup while matching the ~1.05 R_Jup observed flux. Feed (art-first): Chaos water
        cryovolcanic plumes (Enceladus→E-ring isomorphism; physics caveat = insufficient tidal heat at 20 R_p,
        Chaos.surface divergence_note; adopted as art; sputtering/sublimation secondary supply). Color:
        blue-white ice-dust #cdd9e4, fine water-ice grains scattering
        wavelength-dependently (small particles → blue dominance; Saturn E-ring/Enceladus precedent) → Chaos
        confirmed icy (inherited by group 10 satellites); the Phoebe-type dark carbonaceous alternative (C)
        rejected; visual impact small at τ≈9e-5.
      evidence_ko: >
        물리적 간극은 불가: 테스트입자 시뮬(Sim B, ring_clearing.py 2000yr, results/_ring_clearing)에서 Chaos는
        질량비 μ≈7.5e-7로 너무 작아 어떤 간극도 못 비움(Chaos 반장축의 입자까지 생존). 그래서 갭은 동역학이 아닌
        렌더링 목적의 의도적 부여. 간극을 좁히려 Chaos e를 0.10→0.02로 낮춤(results/_chaos_e002, STABLE):
        반경 흔들림 ±150k→±30k km라 ~180k km 갭이면 깔끔히 비움. 밝기는 면적∝R²로 직교 합산이라 "겉보기
        +0.05 R_Jup"는 등가원반 ~0.32 R_Jup(~23k km)에 해당. Beichman 2025 §5.3(arXiv:2508.03814) "Planet Ring
        System Models": 그들의 선호 모델은 Roche 안쪽 광학적으로 두꺼운 고리(토성½ 단면, 등가원반 64,000 km)이고,
        우리 흐릿한 E고리는 그들이 제시한 광학적으로 얇은 먼지 대안(Kennedy 2011 불규칙위성 분쇄)에 해당.
        고리면 세차 검증(dense 8000-snapshot leapfrog 2000yr, results/_principia2000_dense): Chaos
        평균면 = 역행 inc 175.4° rel 공전면(sim-frame normal [0.50,-0.80,-0.33]); 순간면↔평균면 10.9°;
        평균면 둘레 libration RMS 5.7°/max 12.6°(주기 ~56yr). epoch면 고정 시 이탈 ~±6°(50yr에 되돌아옴)이나
        1000/2000yr엔 14/18°까지 커짐, 평균면 앵커로 유계화. 동적 추종(고리↔라이브 궤도면 연동)은 C# 플러그인
        장기과제(cfg 불가). emit 형상: Kopernicus 고리는 원형 동심 annulus만 가능(이심률 불가) → Ring 노드
        2개(안쪽 800k–1.41M, 바깥 1.59M–2.5M km; 간극 1.41M–1.59M에 Chaos 1.5M)가 Chaos 평균면(Laplace, 역행
        inc ~175° rel 공전면, epoch 순간면 179° 아님)을 공유; 확산 E고리는 정상상태에서 축대칭(근점 세차
        무작위화)이라 원형 annulus가 충실하고, 작아진 Chaos e(0.02)는 간극 여유로 흡수. 겉보기 +0.05 R_Jup
        (τ≈9e-5, 등가원반 ~23k km = Beichman 토성½ 단면의 13%)라 행성은 게이트값 1.0 R_Jup 유지하며 ~1.05
        R_Jup 관측 플럭스 정합. feed(art-first): Chaos 물 cryovolcanic 플룸(엔셀라두스→E고리 동형;
        물리 caveat = 20 R_p서 조석열 부족, Chaos.surface divergence_note; 그래도 art 채택;
        sputtering/승화는 보조 공급). 색: 청백 얼음-먼지 #cdd9e4, 고운 물-얼음 알갱이의 파장 의존
        산란(작은 입자 → 청색 우세; 토성 E-ring/엔셀라두스 선례) → Chaos 얼음체 확정(group 10 satellites 상속);
        Phoebe형 어두운 탄소질 대안(C) 기각; τ≈9e-5라 시각 임팩트 작음.
    refs: ["2508.03814", "phase3/stability-sim/STABILITY_REPORT.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: gameplay                   # group 11 (facet-walk 2026-06-22; biome map 결정 정정)
    status: gated
    driver: [gameplay]
    narrative: >
      Its signature blue storm stands as a distinct landmark among Polyphemus's latitude bands.
    narrative_ko: >
      시그니처 파란 폭풍이 Polyphemus의 위도 띠들 사이에서 뚜렷한 랜드마크로 선다.
    fields:
      - { name: science_biomes, value: "위도 띠(적도대/북·남 온대 belt/북·남극) + 시그니처 폭풍(깊은 파란 눈) 독자 바이옴", op: set, colors: {"Equatorial":"#C9A26B","North Temperate":"#E4D3B0","South Temperate":"#A6784E","North Polar":"#9DB0C4","South Polar":"#B0A0AE","The Eye":"#244C8A"} }   # provisional naturalistic biome-map display colors (S↓, Promised Worlds convention); names TBC
      - { name: sphere_of_influence_tuning, value: "auto from mass (조정 불요)", op: passthrough }
      - { name: timewarp_limits, value: "대기 위 표준", op: passthrough }
    gate:
      criterion: [gameplay]
      verdict: pass-in-window
      evidence: >
        No solid surface → no landing situation; science = atmospheric-flight ("flying above X")/space only. Gas
        giants still carry a biome map (Jool/RSS Sol precedent, flight biomes via a lat/lon biome map): latitude
        bands (equatorial zone/N·S temperate belts/N·S poles) + the signature-storm (deep blue eye) dedicated
        biome (group 6 landmark = science landmark). Full ScienceValues block defined (landed/splashed token
        values, unreachable, inert). SOI=auto from mass (no tuning); timewarp=standard above the atmosphere.
      evidence_ko: >
        고체 표면 없음 → 착륙 상황 미발생; 과학 = 대기-비행("X 상공 비행")/우주뿐. 가스자이언트도 biome map
        보유(Jool/RSS Sol 선례, 위경도 biome map으로 비행 바이옴): 위도 띠(적도대/북·남 온대 belt/북·남극) +
        시그니처 폭풍(깊은 파란 눈) 독자 바이옴(group 6 랜드마크 = 과학 명소). ScienceValues 전체 블록 정의
        (landed/splashed는 도달 불가라 토큰값, inert). SOI=질량서 자동(조정 불요); timewarp=대기 위 표준.

  # ── group 5 surface = N/A (가스자이언트, 고체 표면 없음 — 구름덱은 atmosphere/appearance) ──
  # ── group 6 appearance = banding/haze/clouds/aurora/rings gated (facet-walk 2026-06-22); emission_glow/specular/artificial/surface = N/A ──
  # ── group 8 environment = radiation gated; stellar_wind/activity/heliosphere/habitable_zone = 별-레벨(항성 A·B서 다룸) ──

  # ── 항성 A·B: magnetism / environment (2026-06-22 audit 백로그 #2) ────────────────
  - body: Alpha Centauri A
    axis: environment.activity        # + radiation passthrough 묶음
    refs: ["2010ApJ...722..343D", "1996AJ....111..439H", "2016A&A...596A..52R", "2014AJ....147...59A"]
    status: passthrough               # 측정치 (audit 확인) — 변경 없음
    driver: [passthrough]
    narrative: >
      A quiet star, measured end to end and passed through untouched: a 22-day rotation, a calm chromosphere, and
      a faint X-ray corona that breathes by a factor of ten over a tentative ~19-year cycle — it even spent
      2005–2013 in a Maunder-minimum-like lull. The one intervention was a correction, not a choice: a review
      found A's and B's X-ray values swapped and put them back.
    narrative_ko: >
      조용한 별이고, 끝에서 끝까지 측정값이라 손대지 않고 통과시킨다. 22일 자전, 잔잔한 채층, 그리고 잠정
      ~19년 주기로 열 배쯤 숨 쉬는 희미한 X선 코로나 — 2005–2013년에는 마운더최소기 같은 저상태까지 겪었다.
      유일한 개입은 선택이 아니라 교정이었다. 점검에서 A와 B의 X선 값이 뒤바뀐 것을 발견해 제자리로 돌렸다.
    fields:
      - { name: activity, value: "P_rot 22d, log R'HK −4.95, X-ray log Lx ~26.78 (cycle swing ~10), cycle ~19.1yr (tentative)", op: passthrough, note: "Lx=Robrade&Schmitt2016(2005–2013 마운더최소기형 저상태), cycle=Ayres2014 tentative; radiation_surface ≈0.8 유지; 2026-07-12 점검서 A/B X선 스왑 교정" }

  - body: Alpha Centauri A
    axis: magnetism.magnetic_field
    status: gated                     # 신규 도출 proxy (low conf)
    driver: [physics]
    narrative: >
      Nobody has directly mapped this star's magnetic field — it sits too far south for the usual survey catalogs.
      But by every activity measure it is the Sun's twin, so the board hands it the Sun's own large-scale field of
      one to two gauss as a proxy. A dedicated literature pull of direct measurements could firm this up later; for
      now it is honest low confidence.
    narrative_ko: >
      이 별의 자기장을 직접 지도화한 사람은 아직 없다 — 통상적인 서베이 카탈로그가 닿기엔 너무 남쪽 하늘이다.
      하지만 모든 활동도 지표에서 태양의 쌍둥이라, 보드는 태양 자신의 대규모 자기장 1–2가우스를 proxy로 쥐여
      준다. 나중에 직접 측정 문헌을 당겨 오면 다질 수 있고, 지금은 정직한 저신뢰다.
    fields:
      - { name: magnetic_field, value: "~1–2 G (large-scale surface, solar-twin proxy)", op: set }
    gate:
      criterion: [activity-proxy]
      verdict: pass-in-window
      evidence: >
        No direct ZDI (α Cen is southern-sky, so absent from the BCool/Marsden2014 table). log R'HK −4.95 + Rossby≈1.8 (≈Sun) → proxied to the solar
        BCool large-scale field ~1–2 G. The planetary dynamo-scaling.md does not apply to stars — grounded via activity/Rossby.
        For higher confidence a ZDI literature pull (HARPSpol/Folsom-type) is needed — not in the current cache.
      evidence_ko: >
        직접 ZDI 없음(α Cen 남천이라 BCool/Marsden2014 표 부재). log R'HK −4.95 + Rossby≈1.8(≈태양) → 태양
        BCool 대규모장 ~1–2 G로 proxy. 행성 dynamo-scaling.md은 항성 미적용 — activity/Rossby로 근거화.
        고신뢰 원하면 ZDI 문헌 pull(HARPSpol/Folsom류) 필요 — 현 캐시엔 없음.
    refs: [2010ApJ...722..343D]

  - body: Alpha Centauri A
    axis: environment.stellar_wind
    status: superseded            # → 2026-07-12 재게이트 행이 대체 — 분배가 재앵커 전 스테일 X선 기반이라 역전
    driver: [physics]
    narrative: >
      [SUPERSEDED — replaced by the re-gate row below] Original Ṁ_A ≈ 1 Ṁ⊙ (X-ray weighted A≈1·B≈0.6). Based on the pre-reanchor X-ray
      (which held A brighter), so the split was reversed — the current DB has B brighter (A 26.78 vs B 27.04).
    narrative_ko: >
      [SUPERSEDED — 아래 재게이트 행이 대체함] 원안 Ṁ_A ≈ 1 Ṁ⊙ (X선 가중 A≈1·B≈0.6). 재앵커 전 X선
      (A가 더 밝다고 본 값) 기반이라 분배가 역전돼 있었음 — 현 DB는 B가 더 밝음(A 26.78 vs B 27.04).
    fields:
      - { name: stellar_wind, value: 1, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }

  - body: Alpha Centauri A
    axis: environment.stellar_wind
    status: gated                     # 2026-07-12 재게이트 — 현 DB X선으로 플럭스 가중 재계산
    driver: [physics]
    narrative: >
      What is actually measured is the two stars' combined wind, blowing one shared bubble around the pair; how it
      divides between them is our assumption, weighted by which star shines harder in X-rays. With the corrected
      numbers the smaller, more active B turns out nearly three times windier, leaving A a quarter share — the old
      split had it exactly backwards, built on the stale swapped X-ray values. The re-split ripples outward:
      Polyphemus feels a gentler wind, and its magnetosphere grew slightly in the same pass.
    narrative_ko: >
      실제로 측정된 것은 두 별을 하나의 거품으로 감싸는 합산 풍이고, 그것이 둘 사이에 어떻게 나뉘는지는 어느
      별이 X선에서 더 세게 빛나는지로 가중한 우리의 가정이다. 교정된 수치로는 더 작고 활동적인 B가 세 배 가까이
      드세서 A에게는 사분의 일 몫이 남는다 — 옛 분배는 뒤바뀐 스테일 X선 값 위에 서 있어 정확히 거꾸로였다.
      재분배는 바깥으로 번진다. Polyphemus는 더 순한 바람을 맞게 됐고, 같은 패스에서 그 자기권도 약간 자랐다.
    fields:
      - { name: stellar_wind, value: 0.5, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }
    gate:
      criterion: [derived-grounding]
      verdict: owner-override   # 합산만 측정, per-star 분배는 가정
      evidence: >
        Only the combined ~2 Ṁ⊙ is measured (Wood 2001 shared astrosphere); the per-star split is a Wood 2002
        surface-X-ray-flux-weighted assumption (Ṁ/area ∝ F_X^1.34), not a direct measurement. Recomputed with the
        current DB X-ray (A 26.78 Robrade&Schmitt2016 / B 27.04 DeWarf2010)·radii (1.223/0.863 R⊙) → F_X ratio
        B/A ≈ 3.7 → Ṁ ratio B/A ≈ 2.9 → A≈0.5·B≈1.5. The old row (A≈1/B≈0.6) was reversed because it was based on
        pre-reanchor stale X-ray. Ripple: A b magnetosphere ram 0.75→0.38 nPa @1.6 AU, R_mp 21→~23.5 R_p (^1/6
        robust; that row was synchronously corrected).
      evidence_ko: >
        측정된 것은 합산 ~2 Ṁ⊙뿐(Wood 2001 공유 astrosphere); per-star 분배는 Wood 2002 표면 X선 플럭스 가중
        가정(Ṁ/area ∝ F_X^1.34)이지 직접 측정이 아님. 현 DB X선(A 26.78 Robrade&Schmitt2016 / B 27.04
        DeWarf2010)·반지름(1.223/0.863 R⊙)로 재계산 → F_X 비 B/A ≈ 3.7 → Ṁ 비 B/A ≈ 2.9 → A≈0.5·B≈1.5.
        구행(A≈1/B≈0.6)은 재앵커 전 스테일 X선 기반이라 역전돼 있었음. 리플: A b 자기권 ram 0.75→0.38 nPa
        @1.6 AU, R_mp 21→~23.5 R_p(^1/6 강건, 해당 행 동기 교정 완료).
    refs: [2001ApJ...547L..49W, 2002ApJ...574..412W, 2016A&A...596A..52R, 2010ApJ...722..343D]

  - body: Alpha Centauri A
    axis: environment.heliosphere     # SHARED — 시스템 대표로 A에 기록
    refs: ["2001ApJ...547L..49W"]
    status: passthrough
    driver: [passthrough]
    narrative: >
      The two stars blow one shared wind bubble, its nose standing about 176 AU out against the inflowing G-cloud
      gas — a measured astrosphere, recorded on A as the system representative. The bubble's exact facing direction
      is low-confidence and only a future plugin could render it anyway; the stock game cannot draw it.
    narrative_ko: >
      두 별은 하나의 풍 거품을 공유해 불고, 그 코는 흘러드는 G-구름 가스를 밀며 약 176 AU 밖에 선다 — 측정된
      astrosphere이며 시스템 대표로 A에 기록한다. 거품이 정확히 어느 방향을 보는지는 저신뢰인 데다 어차피 훗날
      플러그인만 렌더할 수 있다 — 스톡 게임은 그리지 못한다.
    fields:
      - { name: heliosphere, value: "~176 AU shared astrosphere standoff (G-cloud 유입 ~25 km/s)", op: passthrough, note: "Wood2001 Lyα; 176 AU = 120·√2·26/25; apex ~187°/+22°는 plugin-only·low-conf" }

  - body: Alpha Centauri A
    axis: appearance                  # group 6 [star] facet-walk 2026-06-23 — 관측 기반
    status: gated
    driver: [observation]
    narrative: >
      Up close, A is simply the Sun with the serial numbers filed off: the same yellow-white light, the same
      boiling granulation, the same soft darkening toward the limb. It is if anything tidier than the Sun — a few
      small spots with faint bright patches around them, a weak corona dimmer than its companion's, and flares so
      rare they barely register. Everything follows from the measurements; the one owner call was how many spots
      to paint on the texture, and the answer was "very few".
    narrative_ko: >
      가까이서 본 A는 그냥 일련번호만 지운 태양이다. 같은 황백색 빛, 같은 끓는 granulation, 가장자리로 갈수록
      같은 부드러운 어두워짐. 오히려 태양보다 단정하다 — 작은 흑점 몇 개와 그 둘레의 희미한 밝은 반점, 동반성보다
      어두운 약한 코로나, 그리고 거의 기록되지 않을 만큼 드문 플레어. 전부 측정값에서 따라 나오며, 유일한 오너
      결정은 텍스처에 흑점을 몇 개나 그릴지였다 — 답은 "아주 조금"이었다.
    fields:
      - { name: color, value: "#fff4ea", op: set, phase3_default: "G2V, Teff 5847K (황백, 거의 태양)" }
      - { name: granulation, value: "solar-type 대류 granule", op: set }
      - { name: limb_darkening, value: "solar-type (표준)", op: set }
      - { name: spots_faculae, value: "sparse ~0.1–0.3% 피복률", op: set }
      - { name: corona, value: "present (weak, X-ray log Lx ~26.78)", op: set }
      - { name: flares, value: "rare (플레어성 아님)", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        All derived from observed measurements (G2V Teff 5847K → sRGB ~#fff4ea; P_rot 22d·log R'HK −4.95 → sparse
        spots ~0.1–0.3% coverage below solar; X-ray log Lx ~26.78 → weak corona, dimmer than B; not flare-active).
        Spot count=owner-delegated decision (for texture), sparse ~0.1–0.3%, cleaner than B. color/granulation/limb=
        measured passthrough. 2026-07-12 review: Teff 5790→5847K (DB), corona X-ray value swap corrected — the color
        hex is a below-perception difference, kept.
      evidence_ko: >
        전부 관측 측정서 도출(G2V Teff 5847K → sRGB ~#fff4ea; P_rot 22d·log R'HK −4.95 → 흑점 희소, 피복률
        ~0.1–0.3%로 태양 이하; X선 log Lx ~26.78 → 약한 코로나, B보다 어두움; 플레어성 아님). 흑점량=오너 위임
        결정(텍스처용) 희소 ~0.1–0.3%, B보다 깨끗. 색/granulation/limb=측정 passthrough. 2026-07-12 점검: Teff
        5790→5847K(DB), corona X선 수치 스왑 교정 — 색 hex는 지각 이하 차이라 유지.
    refs: ["2010ApJ...722..343D", "2016A&A...596A..52R", "2014AJ....147...59A", "docs/reference/stellar-photospheric-color-methodology.md"]

  - body: Alpha Centauri B
    axis: environment.activity
    refs: ["2010ApJ...722..343D", "2016A&A...596A..52R"]
    status: passthrough
    driver: [passthrough]
    narrative: >
      The orange companion is the livelier of the pair: a brighter X-ray corona than A's and one of the
      cleanest-measured activity cycles of any star, ticking along at 8.84 years. All measured, all passed
      through. A review here too was corrective rather than creative — B had been wearing some of A's numbers,
      and only after untangling them did the data actually agree with the "B is the active one" story.
    narrative_ko: >
      주황빛 동반성은 둘 중 더 팔팔한 쪽이다. 코로나는 A보다 X선에서 밝고, 활동 사이클은 8.84년으로 어느 별과
      견줘도 손꼽히게 깨끗하게 측정돼 있다. 전부 측정값이고 전부 통과시킨다. 여기서도 점검은 창작이 아니라
      교정이었다 — B가 A의 수치 일부를 걸치고 있었고, 그걸 풀어낸 뒤에야 데이터가 "활동적인 쪽은 B"라는 서사와
      실제로 맞아떨어졌다.
    fields:
      - { name: activity, value: "P_rot 41d, log R'HK −4.85, clean 8.84yr cycle (DeWarf2010), X-ray log Lx 27.04 (contrast ~4.5)", op: passthrough, note: "K1V; contrast ~4.5=태양 진폭의 절반; radiation_surface ≈1.4(A의 ~2배, Lx 비 1.8 정합, 플레어성 아님); 2026-07-12 점검 P_rot 38→41d·R'HK −5.0→−4.85(DB recommended)·factor~10은 A 특성이라 제거" }

  - body: Alpha Centauri B
    axis: magnetism.magnetic_field
    status: gated                     # proxy (low conf)
    driver: [physics]
    narrative: >
      B gets a field half again to twice A's — two to four gauss. As a cooler orange dwarf its convection runs
      deeper, making the dynamo more efficient, and the star backs that up with its metronome-clean activity cycle
      and the brighter corona. Like A it has never been directly mapped, so this too is a proxy, revisable upward
      if a direct measurement ever lands.
    narrative_ko: >
      B는 A의 1.5–2배, 즉 2–4가우스를 받는다. 더 차가운 주황 왜성이라 대류가 깊게 돌아 다이나모 효율이 높고, 그
      효율을 메트로놈처럼 깨끗한 활동 사이클과 더 밝은 코로나가 실증한다. A처럼 직접 지도화된 적은 없어 이 값도
      proxy이며, 직접 측정이 나오면 상향될 수 있다.
    fields:
      - { name: magnetic_field, value: "~2–4 G (large-scale surface, A보다 강함)", op: set }
    gate:
      criterion: [activity-proxy]
      verdict: pass-in-window
      evidence: >
        K1V has a longer τ_conv, Rossby≈1.4<A → a more efficient dynamo (corroborated by the clean 8.84yr cycle periodicity + X-ray log Lx 27.04 >
        A 26.78). ~1.5–2× A. No direct ZDI → proxy (low–med); could be revised upward on a ZDI pull. 2026-07-12
        review: the "factor~10 modulation" corroboration was A's property, replaced with the clean-cycle corroboration.
      evidence_ko: >
        K1V는 τ_conv 길어 Rossby≈1.4<A → 더 효율적 dynamo(clean 8.84yr cycle 주기성 + X선 log Lx 27.04 >
        A 26.78 방증). A의 ~1.5–2배. 직접 ZDI 없음 → proxy(low–med); ZDI pull 시 상향 가능. 2026-07-12 점검:
        "factor~10 modulation" 방증은 A의 특성이라 clean cycle 방증으로 교체.
    refs: [2010ApJ...722..343D]

  - body: Alpha Centauri B
    axis: environment.stellar_wind
    status: superseded            # → 2026-07-12 재게이트 행이 대체 — A 행과 동일 사유(스테일 X선 기반 역전)
    driver: [physics]
    narrative: >
      [SUPERSEDED — replaced by the re-gate row below] Original Ṁ_B ≈ 0.6 Ṁ⊙. The original logic "more active but the absolute wind is weaker than A's"
      leaned on stale X-ray (which held A brighter) — the current DB has B brighter in X-ray (27.04 vs 26.78).
    narrative_ko: >
      [SUPERSEDED — 아래 재게이트 행이 대체함] 원안 Ṁ_B ≈ 0.6 Ṁ⊙. "더 활동적이나 절대 풍은 A보다 약함"이라는
      원 논리는 스테일 X선(A가 더 밝다고 본 값)에 기댄 것 — 현 DB는 B가 X선 더 밝음(27.04 vs 26.78).
    fields:
      - { name: stellar_wind, value: 0.6, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }

  - body: Alpha Centauri B
    axis: environment.stellar_wind
    status: gated                     # 2026-07-12 재게이트 — 현 DB X선으로 플럭스 가중 재계산
    driver: [physics]
    narrative: >
      B takes the lion's share of the pair's measured combined wind — three quarters of it. Its surface blazes
      nearly four times harder in X-rays than A's (a brighter corona squeezed onto a smaller star), and wind
      scales with that blaze, so the active orange dwarf dominates the breeze as befits its temperament. The split
      remains an assumption on top of a measured total; the arithmetic lives in A's matching row.
    narrative_ko: >
      B는 측정된 합산 풍의 대부분 — 사분의 삼 — 을 가져간다. 표면은 A보다 X선에서 네 배 가까이 세게 타오르고
      (더 작은 별에 더 밝은 코로나가 눌러 담겼다) 풍은 그 타오름을 따라 스케일하니, 활동적인 주황 왜성이
      기질대로 바람도 지배한다. 이 분배는 측정된 총량 위에 얹은 가정이며, 산식은 A의 대응 행에 있다.
    fields:
      - { name: stellar_wind, value: 1.5, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }
    gate:
      criterion: [derived-grounding]
      verdict: owner-override   # 합산만 측정, per-star 분배는 가정
      evidence: >
        Only the combined ~2 Ṁ⊙ is measured (Wood 2001 shared astrosphere); the per-star split A≈0.5/B≈1.5 is a
        Wood 2002 surface-X-ray-flux-weighted assumption (Ṁ/area ∝ F_X^1.34; B's F_X ~3.7× A's from brighter Lx +
        smaller radius). Recomputed with the current DB X-ray (A 26.78 / B 27.04)·radii (1.223/0.863 R⊙) → Ṁ ratio B/A ≈ 2.9.
        The old row (B≈0.6) was reversed because it was based on pre-reanchor stale X-ray. Detailed derivation in
        the A re-gate row.
      evidence_ko: >
        측정된 것은 합산 ~2 Ṁ⊙뿐(Wood 2001 공유 astrosphere); per-star 분배 A≈0.5/B≈1.5는 Wood 2002 표면 X선
        플럭스 가중 가정(Ṁ/area ∝ F_X^1.34; B의 F_X는 더 밝은 Lx + 더 작은 반지름으로 A의 ~3.7배). 현 DB
        X선(A 26.78 / B 27.04)·반지름(1.223/0.863 R⊙)로 재계산 → Ṁ 비 B/A ≈ 2.9. 구행(B≈0.6)은 재앵커 전
        스테일 X선 기반이라 역전돼 있었음. 상세 산식은 A 재게이트 행.
    refs: [2001ApJ...547L..49W, 2002ApJ...574..412W, 2016A&A...596A..52R, 2010ApJ...722..343D]

  - body: Alpha Centauri B
    axis: appearance                  # group 6 [star] facet-walk 2026-06-23 — 관측 기반
    status: gated
    driver: [observation]
    narrative: >
      B glows a warm yellow-orange, visibly a different star from its twin-like partner. Its face is busier too:
      several mid-latitude spot groups with prominent bright patches, coarser granulation, a corona that outshines
      A's, and the occasional flare — active, but never violent. As with A, the physics comes straight from the
      measurements; the owner's call was the spot dressing on the texture, and B got the heavier hand.
    narrative_ko: >
      B는 따뜻한 황등색으로 빛나, 태양을 빼닮은 짝과 한눈에 다른 별이다. 표면도 더 부산하다. 중위도 흑점군이
      여럿에 밝은 반점이 뚜렷하고, granulation은 더 굵으며, 코로나는 A보다 밝고, 플레어도 가끔 인다 — 활동적이되
      난폭하진 않다. A와 마찬가지로 물리는 측정값에서 곧장 나오고, 오너의 결정은 텍스처의 흑점 분장이었다 —
      B가 더 진한 손길을 받았다.
    fields:
      - { name: color, value: "#ffdcb0", op: set, phase3_default: "K1V, Teff 5316K (황등)" }
      - { name: granulation, value: "대류 granule (약간 큼)", op: set }
      - { name: limb_darkening, value: "표준 (적색쪽 강함)", op: set }
      - { name: spots_faculae, value: "moderate ~1–3% 피복률, 중위도 흑점군 여럿", op: set }
      - { name: corona, value: "A보다 밝음 (log Lx 27.04)", op: set }
      - { name: flares, value: "occasional (플레어성 아님)", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        Derived from observed measurements (K1V Teff 5316K → sRGB ~#ffdcb0; ~2× A's activity·clean 8.84yr cycle
        DeWarf2010·X-ray log Lx 27.04 > A 26.78 → moderate spots ~1–3%, several mid-latitude groups umbra+penumbra
        + prominent faculae; occasional flares, not flare-active; limb darkening stronger toward the red;
        granulation slightly larger). Spot count=owner-delegated decision (for texture), moderate ~1–3%, more spot
        groups than A. color=K1V Teff passthrough. 2026-07-12 review: Teff 5260→5316K (DB), factor~10 removed (A's
        property) — the color hex is a below-perception difference, kept.
      evidence_ko: >
        관측 측정서 도출(K1V Teff 5316K → sRGB ~#ffdcb0; A의 ~2배 활동도·clean 8.84yr cycle DeWarf2010·X선
        log Lx 27.04 > A 26.78 → 흑점 보통 ~1–3%, 중위도 흑점군 여럿 umbra+penumbra + faculae 뚜렷; 플레어
        가끔, 플레어성 아님; limb darkening 적색쪽 강함; granulation 약간 큼). 흑점량=오너 위임 결정(텍스처용)
        보통 ~1–3%, A보다 흑점군 多. 색=K1V Teff passthrough. 2026-07-12 점검: Teff 5260→5316K(DB), factor~10
        제거(A의 특성) — 색 hex는 지각 이하 차이라 유지.
    refs: ["2010ApJ...722..343D", "docs/reference/stellar-photospheric-color-methodology.md"]

  # ── 항성 자전축/J2/발견성 — 2026-07-12 silent-passthrough 점검서 신설 ──────────
  - body: Alpha Centauri A
    axis: bulk.spin_axis_orientation
    status: gated                     # 2026-07-12 오너 선택 — 측정 없음 (silent-passthrough 해소)
    driver: [art-direction]
    narrative: >
      No i★ measurement → owner choice: a Sun-like small ~7° tilt from the AB orbital-plane normal (analogy to the Sun-ecliptic 7.25°). The polar azimuth is
      a free emit orientation (ICRS pole RA/Dec conversion is at the emit stage). The visual effect is minor, but it replaces the silent default of "perfectly aligned 0°"
      with an explicit decision.
    narrative_ko: >
      i★ 측정 없음 → 오너 선택: AB 궤도면 법선에서 태양 유사 ~7° 소기울기(태양-황도 7.25° 유비). 극 방위각은
      emit 배향 자유(ICRS 극 RA/Dec 변환은 emit 단계). 시각 효과는 미미하나 "완전 정렬 0°"라는 침묵 기본값을
      명시 결정으로 대체.
    fields:
      - { name: spin_axis_orientation, value: "AB 궤도면 법선 + ~7° tilt (방위각 자유, ICRS 극 RA/Dec 변환 at emit)", op: set }
      - { name: obliquity, value: 7, unit: deg, op: set }
    gate:
      criterion: [physics]
      verdict: pass-in-window
      evidence: >
        With no measurement, only a physical-range gate: alignment is the default expectation from close-pair formation·tidal evolution, and a small tilt (≲10°) is
        unobjectionable by analogy to the Sun (7.25°). Consistent with all observations.
      evidence_ko: >
        측정 부재라 물리 범위 게이트만: 근접쌍 형성·조석 진화상 정렬 기대가 기본이고 소기울기(≲10°)는 태양
        (7.25°) 유비로 무난. 어떤 관측과도 충돌 없음.

  - body: Alpha Centauri B
    axis: bulk.spin_axis_orientation
    status: gated                     # 2026-07-12 오너 선택 — 측정 45° 채택 (silent-passthrough 해소)
    driver: [observation]
    narrative: >
      Unlike A, B actually has a spin-axis measurement — and it says something interesting: the star's axis leans
      a good 34° away from the orbital plane's pole, a genuine spin-orbit misalignment read straight from the data
      rather than invented for flavor. The board adopts it, taking the reading that keeps the misalignment at its
      measured minimum since the compass direction of the tilt is unconstrained. The uncertainty is large, so this
      stays a low-confidence value to be revisited when better measurements arrive.
    narrative_ko: >
      A와 달리 B에는 실제 자전축 측정이 있다 — 그리고 그 측정이 흥미로운 이야기를 한다. 별의 축이 궤도면 극에서
      34°나 기울어 있다는, 맛내기로 지어낸 것이 아니라 데이터에서 곧장 읽힌 진짜 스핀-궤도 비정렬이다. 보드는
      이를 채택하되, 기울기의 방위각이 미구속이므로 비정렬을 측정된 최솟값으로 유지하는 읽기를 취한다. 불확도가
      커서 저신뢰 값으로 남기고, 더 나은 측정이 오면 다시 본다.
    fields:
      - { name: spin_axis_orientation, value: "i★ 45° (LOS 기준, 측정) · PA=궤도극 정렬 → 궤도면 대비 비정렬 ~34°", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        Adopts the measured value as-is: i★ = 45° (+9/−19), Dumusque 2014 SOAP activity/RV modeling, DB recommended,
        low-conf. vs orbital inclination ~79° → minimum 3D misalignment |79−45| ≈ 34° — the misalignment itself is a
        measurement implication (interesting-first); the only assumption is the azimuth (PA = orbital pole,
        minimum-misalignment reading). ICRS pole RA/Dec conversion at the emit stage; consistent with the viewer's
        i★ layer (measured=gold). Kept low-conf due to the large uncertainty; update candidate on follow-up.
      evidence_ko: >
        측정값 그대로 채택: i★ = 45°(+9/−19), Dumusque 2014 SOAP activity/RV modeling, DB recommended, low-conf.
        궤도 경사 ~79° 대비 최소 3D 비정렬 |79−45| ≈ 34° — 비정렬 자체가 측정 함의(interesting-first); 가정은
        방위각뿐(PA=궤도극, 최소 비정렬 읽기). ICRS 극 RA/Dec 변환은 emit 단계; 뷰어 i★ 레이어(측정=금색)와
        정합. 불확도 커서 low-conf 유지, 후속 측정 시 갱신 후보.
    refs: [2014ApJ...796..133D]

  - body: Alpha Centauri A
    axis: bulk.geopotential_j2
    status: gated                     # 2026-07-12 오너 정책 — 항성 J2 상시 계산·emit (무시가능 처리 금지)
    driver: [physics]
    narrative: >
      Even a sedate star bulges a little at its waist, and by owner policy that bulge is always computed and
      emitted no matter how small — the n-body engine integrates the term, so it gets a real number, not a shrug.
      A's bulge comes out at roughly twice the Sun's, which is just what its faster spin and larger girth should
      produce; the recipe scales from the Sun's own precisely measured figure. An earlier "negligible, not
      emitted" row was replaced the same day the policy landed.
    narrative_ko: >
      점잖은 별도 허리는 조금 부풀고, 오너 정책상 그 팽대는 아무리 작아도 항상 계산해 emit한다 — n-body 엔진이
      이 항을 적분하므로, 어깨 으쓱이 아니라 실제 숫자를 받아야 한다. A의 팽대는 태양의 대략 두 배로 나오는데,
      더 빠른 자전과 더 큰 몸집이라면 딱 그래야 할 값이다. 레시피는 태양 자신의 정밀 측정 figure에서 스케일한다.
      당초의 "무시가능, 미방출" 행은 정책이 내려온 같은 날 교체됐다.
    fields:
      - { name: geopotential_j2, value: 4.8e-7, op: set }
      - { name: reference_radius, value: 8.511e8, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Solar-anchored q-scaling (J2 = 0.0105·q — helioseismology solar J2 2.18e-7, Pijpers 1998 anchor;
        Radau-Darwin invalid at stellar NMoI ~0.06 so not used, body-figure-methodology §2): q = ω²R³/GM = 4.59e-5
        (M 1.1055 M⊙·R 1.2234 R⊙·P_rot 22±3d, DB recommended) → J2 4.8e-7 (±~30% from P_rot uncertainty) — ~2.3×
        the Sun's (2.1e-7), consistent with the faster rotation (22d vs 25.4d)+larger radius. Within the FGK-dwarf
        similar-structure range. reference_radius = equatorial radius 8.511e8 m.
      evidence_ko: >
        태양앵커 q-스케일링(J2 = 0.0105·q — 헬리오사이즈몰로지 태양 J2 2.18e-7, Pijpers 1998 앵커; Radau-Darwin은
        항성 NMoI ~0.06서 무효라 미사용, body-figure-methodology §2): q = ω²R³/GM = 4.59e-5(M 1.1055 M⊙·R 1.2234
        R⊙·P_rot 22±3d, DB recommended) → J2 4.8e-7(P_rot 불확도로 ±~30%) — 태양(2.1e-7)의 ~2.3배로, 더 빠른
        자전(22d vs 25.4d)+큰 반지름과 정합적. FGK 왜성 유사구조 범위 내. reference_radius = 적도반경 8.511e8 m.
    refs: ["docs/reference/body-figure-methodology.md"]

  - body: Alpha Centauri B
    axis: bulk.geopotential_j2
    status: gated                     # 2026-07-12 오너 정책 — 항성 J2 상시 계산·emit
    driver: [physics]
    narrative: >
      Rotational flattening J2 = 5.7e-8. Same solar-anchored scaling: q = 5.48e-6 (M 0.9373 M⊙·R 0.8632 R⊙·P_rot 41±3d)
      → J2 5.7e-8 (±~15%). reference_radius = equatorial radius 6.005e8 m. Slower rotation+smaller radius, so ~1/4 the Sun's —
      but emitted per owner policy. See the A row and body-figure-methodology §2 for the detailed derivation·policy.
    narrative_ko: >
      회전 편평 J2 = 5.7e-8. 같은 태양앵커 스케일링: q = 5.48e-6 (M 0.9373 M⊙·R 0.8632 R⊙·P_rot 41±3d)
      → J2 5.7e-8 (±~15%). reference_radius = 적도반경 6.005e8 m. 느린 자전+작은 반지름이라 태양의 ~1/4 —
      그래도 오너 정책대로 emit. 상세 산식·정책은 A 행 및 body-figure-methodology §2 참조.
    fields:
      - { name: geopotential_j2, value: 5.7e-8, op: set }
      - { name: reference_radius, value: 6.005e8, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        q (5.48e-6, DB recommended) × measured solar J2/q (0.0105) = 5.7e-8. K1V is slightly less condensed than the Sun, so the actual value
        may be marginally higher (room for an upward coefficient), but the order is unchanged — within the FGK approximation range.
      evidence_ko: >
        q(5.48e-6, DB recommended) × 태양 측정 J2/q(0.0105) = 5.7e-8. K1V는 태양보다 응집 약간 덜해
        실제값은 소폭 위일 수 있으나(계수 상향 여지) 차수 불변 — FGK 근사 범위 내.
    refs: ["docs/reference/body-figure-methodology.md"]

  # ── 항성 bulk 앵커 (SPEC §3.2 템플릿 정규화, 2026-07-12) ────────────────────
  - body: Alpha Centauri A
    axis: bulk                        # 템플릿 앵커 — DB 측정 passthrough 에코 (spin_axis·J2는 전용 행)
    refs: ["2016A&A...594A.107K", "2016A&A...586A..90P", "2018ApJ...864...99J", "2007A&A...470..295B", "2017A&A...597A.137K", "2003A&A...404.1087K", "2010ApJ...722..343D", "2016A&A...588A..77B", "2002A&A...392L...9T"]
    body_class: star
    status: passthrough
