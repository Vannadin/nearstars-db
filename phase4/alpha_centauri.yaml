  - body: Alpha Centauri B
    axis: magnetism.magnetic_field
    status: gated                     # proxy (low conf)
    driver: [physics]
    narrative: >
      Large-scale surface field ~2–4 G (stronger than A). K1V has a longer τ_conv, Rossby≈1.4<A → a more efficient dynamo (corroborated by the orderly
      periodicity of the clean 8.84yr cycle + brighter X-ray than A). ~1.5–2× A. No direct ZDI → proxy (low–med). Could be revised upward on a ZDI
      pull. [2026-07-12 review: the "factor~10 modulation" corroboration was A's property, replaced with the clean-cycle corroboration.]
    narrative_ko: >
      대규모 표면장 ~2–4 G (A보다 강함). K1V는 τ_conv 길어 Rossby≈1.4<A → 더 효율적 dynamo(clean 8.84yr
      cycle의 정연한 주기성 + X선 A보다 밝음이 방증). A의 ~1.5–2배. 직접 ZDI 없음 → proxy(low–med). ZDI pull
      시 상향 가능. [2026-07-12 점검: "factor~10 modulation" 방증은 A의 특성이라 clean cycle 방증으로 교체.]
    fields:
      - { name: magnetic_field, value: "~2–4 G (large-scale surface, A보다 강함)", op: set }
    gate:
      criterion: [activity-proxy]
      verdict: pass-in-window
      evidence: >
        K1V has a longer τ_conv, Rossby≈1.4<A → a more efficient dynamo (corroborated by the clean 8.84yr cycle periodicity + X-ray log Lx 27.04 >
        A 26.78). ~1.5–2× A. No direct ZDI → proxy (low–med).
      evidence_ko: >
        K1V는 τ_conv 길어 Rossby≈1.4<A → 더 효율적 dynamo(clean 8.84yr cycle 주기성 + X선 log Lx 27.04 >
        A 26.78 방증). A의 ~1.5–2배. 직접 ZDI 없음 → proxy(low–med).
    refs: [2010ApJ...722..343D]

  - body: Alpha Centauri B
    axis: environment.stellar_wind
    status: superseded            # → 2026-07-12 재게이트 행이 대체 — A 행과 동일 사유(스테일 X선 기반 역전)
    driver: [physics]
    narrative: >
      [SUPERSEDED — replaced by the re-gate row below] Original Ṁ_B ≈ 0.6 Ṁ⊙. The original logic "more active but the absolute wind is weaker than A's"
      leaned on stale X-ray (which held A brighter) — the current DB has B brighter in X-ray (27.04 vs 26.78).
    narrative_ko: >
      [SUPERSEDED — 아래 재게이트 행이 대체함] 원안 Ṁ_B ≈ 0.6 Ṁ⊙. "더 활동적이나 절대 풍은 A보다 약함"이라는
      원 논리는 스테일 X선(A가 더 밝다고 본 값)에 기댄 것 — 현 DB는 B가 X선 더 밝음(27.04 vs 26.78).
    fields:
      - { name: stellar_wind, value: 0.6, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }

  - body: Alpha Centauri B
    axis: environment.stellar_wind
    status: gated                     # 2026-07-12 재게이트 — 현 DB X선으로 플럭스 가중 재계산
    driver: [physics]
    narrative: >
      Ṁ_B ≈ 1.5 Ṁ⊙ (B's share of the combined ~2 Ṁ⊙). Following the Wood 2002 relation as-is, weighted by surface X-ray flux (Ṁ/area ∝ F_X^1.34):
      B's surface X-ray flux is ~3.7× A's (brighter Lx + smaller radius) → as befits an active K dwarf, B dominates the wind too.
      See the A re-gate row for the detailed derivation.
      Owner-override rationale: only the combined ~2 Ṁ⊙ is measured (Wood 2001 shared astrosphere); the per-star split
      A≈0.5/B≈1.5 is an X-ray-surface-flux-weighted assumption (Wood 2002 relation), not a direct measurement.
    narrative_ko: >
      Ṁ_B ≈ 1.5 Ṁ⊙ (합산 ~2 Ṁ⊙의 B 몫). Wood 2002 관계 원형대로 표면 X선 플럭스 가중(Ṁ/area ∝ F_X^1.34):
      B는 표면 X선 플럭스가 A의 ~3.7배(더 밝은 Lx + 더 작은 반지름) → 활동적인 K왜성답게 풍도 B가 지배.
      상세 산식은 A 재게이트 행 참조.
      오너-오버라이드 근거: 합산 ~2 Ṁ⊙만 측정됨(Wood 2001 공유 astrosphere); per-star 분배 A≈0.5/B≈1.5는
      X선 표면플럭스 가중 가정(Wood 2002 관계)이지 직접 측정이 아님.
    fields:
      - { name: stellar_wind, value: 1.5, unit: Mdot_sun, op: set, phase3_default: "합산 ~2 Ṁ⊙ (Wood 2001 측정)" }
    gate:
      criterion: [derived-grounding]
      verdict: owner-override   # 합산만 측정, per-star 분배는 가정
      evidence: >
        Recomputed with F_X^1.34 weighting from the current DB X-ray (A 26.78 / B 27.04)·radii (1.223/0.863 R⊙) → Ṁ ratio B/A ≈ 2.9.
        The old row (B≈0.6) was reversed because it was based on pre-reanchor stale X-ray.
      evidence_ko: >
        현 DB X선(A 26.78 / B 27.04)·반지름(1.223/0.863 R⊙)로 F_X^1.34 가중 재계산 → Ṁ 비 B/A ≈ 2.9.
        구행(B≈0.6)은 재앵커 전 스테일 X선 기반이라 역전돼 있었음.
    refs: [2001ApJ...547L..49W, 2002ApJ...574..412W, 2016A&A...596A..52R, 2010ApJ...722..343D]

