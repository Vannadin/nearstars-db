        mass 120 M⊕(0.38 M_Jup) = Phase 3 토대값, J2·밀도·조석·dynamo 입력; age 5.3 Gyr는 α Cen A 상속.
        internal_heat 미미: T_int<110K, 내부플럭스 ≲insolation의 6%(늙은 저질량 토성급 → 잔여열 작음), 복사평형
