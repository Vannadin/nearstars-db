# α Centauri Phase 4 결정 보드 (schema v2) — A b(Polyphemus) 중심. (body × axis) 행별 상태. DB 불변, staging 기록
# 4a 창작 초안 = polyphemus-art-direction.md, 궤도 과정 = STABILITY_REPORT / ALPHA_CEN_AB_DYNAMICS_STUDY
schema_version: 2
system: alpha_centauri
status: staged
updated: 2026-06-20

decisions:
  # ── 궤도 (Kozai-안정 최적화 완료) ──────────────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: identity
    status: gated                 # 2026-06-22 facet-walk
    driver: [classification]
    narrative: >
      Polyphemus is the system's flagship: a temperate Saturn-class gas giant of hydrogen and helium, 120 Earth
      masses, cool enough to raise water clouds. It orbits Alpha Centauri A as a real direct-imaging candidate, and
      keeps its Avatar name as a cultural label over the formal designation Alpha Centauri A b.
    narrative_ko: >
      Polyphemus는 이 계의 간판이다. 수소·헬륨으로 이루어진 온화한 토성급 가스자이언트로, 지구 질량 120배에
      물구름이 뜰 만큼 서늘하다. 실제 직접촬영 후보로서 Alpha Centauri A를 돌며, 공식 표기 Alpha Centauri A b
      위에 아바타 이름을 문화명으로 유지한다.
    fields:
      - { name: body_type, value: "temperate Saturn (H₂/He gas giant, 120 M⊕, Teq 225K, Class I/II water clouds)", op: set }
      - { name: designation, value: "Alpha Centauri A b", op: set }
      - { name: cultural_name, value: "Polyphemus", op: set }
      - { name: discoverability, value: "observation-discovered (candidate)", op: set }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        body_type=temperate Saturn (H₂/He, 120 M⊕, Teq 225K, water clouds Class I/II); designation/cultural per the
        designations block. discoverability=adopt the real measurement: JWST direct-imaging candidate → IGNORELEVELS
        T F F F (visible from the start only at Easy; Normal/Medium/Hard require observational discovery), real
        detection cited in ONDISCOVERY (arXiv:2508.03812, Sanghi & Beichman); the star α Cen A=naked_eye → T T T T
        always visible. Mapping canonical = researchbodies-cfg skill (references/db-mapping.md);
        emit input = the top-level discoverability list the skill reads (body/category/message/ref).
        [[project_nearstars_discoverability_researchbodies]]
      evidence_ko: >
        body_type=온화 토성급(H₂/He, 120 M⊕, Teq 225K, 물구름 Class I/II); designation/cultural은 designations
        블록. discoverability=실측 채택: JWST 직접촬영 candidate → IGNORELEVELS T F F F(Easy만 시작 가시,
        Normal/Medium/Hard는 관측 발견), ONDISCOVERY에 실검출 인용(arXiv:2508.03812, Sanghi & Beichman); 항성
        α Cen A=naked_eye → T T T T 항상 가시. 매핑 canonical = researchbodies-cfg 스킬(references/db-mapping.md);
        emit 입력 = 스킬이 읽는 top-level discoverability 리스트(body/category/message/ref).
        [[project_nearstars_discoverability_researchbodies]]
    refs: ["2508.03812"]
    discoverability_cfg: {category: candidate, ignorelevels: "T F F F", ref: "2025arXiv250803812S", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit.semi_major_axis_au
    status: gated
    driver: [window-selection]
    narrative: >
      Center of the stability window. Reconciled the representative value from 1.9→1.6 within Beichman's preferred a<2 AU family.
    narrative_ko: >
      안정창 중앙. Beichman 선호 a<2 AU 패밀리에서 대표값 1.9→1.6으로 정합.
    fields:
      - { name: semi_major_axis_au, value: 1.6, unit: AU, op: set, phase3_default: "1.6 AU (Beichman 선호 a<2 AU 패밀리; 대표값 1.9→1.6 정합)" }
    gate:
      criterion: [stability]
      verdict: pass-in-window
      evidence: "Center of the stability window. HZ-stable verified over 1e5 yr (orbit stays 1.37–1.84 AU); the 1.6 AU center is our stability-sim result, not an observed value."
      evidence_ko: "안정창 중앙. HZ-안정 1e5 yr 검증(궤도 1.37–1.84 AU 유지); 1.6 AU 중앙은 관측값이 아니라 우리 안정성 시뮬 결과."
    refs: ["2508.03812", "2508.03814", "phase3/stability-sim/STABILITY_REPORT.md", "phase3/stability-sim/ALPHA_CEN_AB_DYNAMICS_STUDY.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit.eccentricity
    status: gated
    driver: [window-selection]
    narrative: >
      Center of the stability window, e=0.1. The observationally preferred e≈0.4 is Kozai-unstable → preserved as a Canonical alternative.
    narrative_ko: >
      안정창 중앙 e=0.1. 관측 선호 e≈0.4는 Kozai-불안정 → Canonical alternative로 보존.
    fields:
      - { name: eccentricity, value: 0.1, op: set, phase3_default: "안정창 중앙 e=0.1 (관측 선호 e≈0.4는 Kozai-불안정 → Canonical alternative로 보존)" }
    gate:
      criterion: [stability]
      verdict: pass-in-window
      evidence: "Center of the e≈0–0.18 stability window. The observed e≈0.4 is KL-unstable (e→0.95 within 30 kyr, IAS15); e=0.1 is a stability-sim selection, not the observed value."
      evidence_ko: "e≈0–0.18 안정창 중앙. 관측 e≈0.4는 KL-불안정(30 kyr 내 e→0.95, IAS15); e=0.1은 관측값이 아니라 안정성 시뮬 선택."
    refs: ["2508.03812", "phase3/stability-sim/STABILITY_REPORT.md", "phase3/stability-sim/ALPHA_CEN_AB_DYNAMICS_STUDY.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit.inclination_deg
    status: gated                 # 2026-06-22 — 상호경사 16° prograde 확정, 절대 sky-frame은 자유 emit 배향
    driver: [stability, window-selection]
    narrative: >
      The planet rides 16° above the binary's plane, orbiting the same way the two stars turn. The observed solutions
      near 50° and 130° would let the companion star wrench the orbit apart, so the board keeps the middle of the
      stable range instead, and choosing the low prograde branch also collapses the observation's two-way ambiguity
      into a single clean answer. Only this 16° mutual tilt is binding; how the whole system faces the game's sky is
      a free orientation, settled in the orbit row.
    narrative_ko: >
      행성은 쌍성면에서 16° 기울어, 두 별이 도는 것과 같은 방향으로 돈다. 관측이 가리키는 ~50°·~130° 해는
      동반성이 궤도를 비틀어 찢어 놓는 값이라, 보드는 대신 안정 범위의 한가운데를 잡았고, 낮은 순행 가지를
      고르면서 관측의 양갈래 모호성도 하나의 답으로 정리된다. 구속되는 것은 이 16° 상호경사뿐이고, 계 전체가
      게임 하늘을 어떻게 향할지는 자유 배향으로 orbit 행에서 정한다.
    fields:
      - { name: inclination_deg, value: 16, unit: deg, op: set, phase3_default: "mutual_inclination_deg=16 (안정창 0–35°의 중앙); 관측 ~50°/~130°는 Kozai-불안정이라 미채택" }
    gate:
      criterion: [stability, error-bar]
      verdict: documented-divergence
      divergence_note: >
        Beichman Table 4 observations ~50° (prograde)/~130° (retrograde, i_AB=79.24°), together with e≈0.4, are ECL Kozai-unstable
        (e→0.95+, moon system disrupts). NearStars adopts 16° prograde at the center of the stability window (≲35°; ≳45° is Kozai),
        recorded in the Phase 3 Canonical alternatives. Being 16° low-inclination prograde, it also resolves the observed bimodal ambiguity into a single solution.
      divergence_note_ko: >
        Beichman Table 4 관측 ~50°(prograde)/~130°(retrograde, i_AB=79.24°)는 e≈0.4와 함께 ECL Kozai-불안정
        (e→0.95+, 위성계 붕괴). NearStars는 안정창(≲35°, ≳45°는 Kozai) 중앙 16° prograde 채택. Phase 3
        Canonical alternatives에 기록. 16° 저경사 prograde라 관측의 bimodal 모호성도 단일해로 해소.
      evidence: >
        Observations ~50°/~130°, together with e≈0.4, are Kozai-unstable (our IAS15/MEGNO scans). 16° mutual prograde is the stability-sim-selected center of the window (0–35°), not an observed value.
      evidence_ko: >
        관측 ~50°/~130°는 e≈0.4와 함께 Kozai-불안정(우리 IAS15/MEGNO 스캔). 16° mutual prograde는 안정성 시뮬이 고른 안정창(0–35°) 중앙이며 관측값이 아님.
    refs: ["2508.03812", "phase3/stability-sim/STABILITY_REPORT.md", "phase3/stability-sim/ALPHA_CEN_AB_DYNAMICS_STUDY.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit                      # was orbit.elements_residual — Ω/ω/mean_anomaly + spin-orbit + lagrange (facet-walk 2026-06-22)
    status: gated
    driver: [emit, classification]
    narrative: >
      Polyphemus is placed so that in August 2024 it sits along the direction JWST detected it, with that state wound
      back to the game's 1950 start epoch. Only the sighting direction is reproduced: along that line the
      stability-safe orbit reaches under half the observed separation, an intrinsic limit of an orbit tuned for
      stability rather than for the observed geometry. The planet spins freely on a roughly ten-hour day, since a
      giant this far out never tidally locks, and the film's Lagrange-point co-orbital planetoids are not present.
      Its starting elements are a snapshot from the verified stability run, so the system begins mid-evolution
      rather than at round design values.
    narrative_ko: >
      Polyphemus는 2024년 8월에 JWST가 검출한 방향에 서도록 배치되고, 그 상태가 게임 시작 에포크인 1950년으로
      되감긴다. 재현되는 것은 관측 방향뿐이다. 그 시선을 따라 안정성용으로 고른 궤도는 관측된 분리의 절반에도
      못 미치는데, 이는 관측 기하가 아니라 안정성에 맞춘 궤도의 본질적 한계다. 행성은 약 10시간 주기로 자유
      자전하며(이 거리의 거인은 조석고정되지 않는다) 영화의 라그랑주점 공궤도 planetoid는 존재하지 않는다.
      시작 궤도요소는 검증된 안정성 런의 스냅샷이라, 계가 딱 떨어지는 설계값이 아니라 진화 중인 상태에서 시작한다.
    fields:
      - { name: longitude_ascending_node, value: 273.10, unit: deg, op: set, note: "관측-방향 정합값(AB면 프레임). PA 83.5° 매칭 상태 → 1950 에포크. 제약은 AB면 대비 16° mutual(매칭 15.88°)" }
      - { name: argument_periapsis, value: 122.38, unit: deg, op: set, note: "관측-방향 정합값(AB면 프레임)" }
      - { name: mean_anomaly, value: 90.05, unit: deg, op: set, note: "1950 에포크로 되감은 위상. 관측 위상 ma_2024=321.46° − 38.64바퀴 → 90.05°. 74.6년 뒤(2024) PA 83.5° 도달" }
      - { name: epoch, value: 0, op: set, note: "게임 epoch 0 = 태양계 에포크 JD 2433282.5 (1950.0). mean_anomaly는 이 에포크 기준으로 되감김" }
      - { name: spin_orbit_resonance, value: "none", op: set, note: "free ~10h rotator (1.6 AU giant는 5 Gyr에도 미잠김)" }
      - { name: lagrange_placement, value: "none", op: set, note: "Poly-L4/L5 코오비탈 planetoid 제외 (불필요; binary 트로이 안정성 미검증)" }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        Orientation is free in principle (observation weak/bimodal; only the 16° mutual binds) and pinned to the
        detection geometry. The build() sim is sky-anchored (load.py feeds the binary i/Ω/ω verbatim from the
        J2000 solution); scripts/scan_pa_match.py sweeps the trajectory forward-only and picks the phase whose
        sky-projected PA best matches the JWST/MIRI Aug-2024 detection (PA 83.5° E of N; Beichman 2025 Table 2 S1):
        match 83.66° (err 0.16°); that state is rewound to the game epoch (JD 2433282.5 = 1950.0) via mean anomaly
        (period 1.9307 yr, Δt 74.6 yr = 38.64 orbits): ma_2024 321.46° → ma_1950 90.05°. Direction only: along PA
        83.5° the adopted 1.6 AU/e=0.1 orbit reaches ~0.75 AU projected vs the observed ~2.0 AU (that PA sits near
        the projected ellipse's minor axis; the major axis lies along the real binary node Ω=204.85°). The shortfall
        is intrinsic to the stability-selected orbit. Typed defaults = the t=500yr osculating snapshot
        (scripts/snapshot_elements.py → results/_snapshot500/elements.log; frame AB-plane,
        x-axis=A→B at t=500; snapshot mutual 16.127°); changing to any value preserving the 16° mutual is legal;
        snapshot a/e (1.5936 AU/0.0756) oscillates around the design anchors kept by the a/e/inc rows; epoch=0
        (game epoch, Sol-Configs convention). Caveats: plane elements are t*≈1957 osculating (precession ~0.1° to
        1950, negligible); the rewind assumes the in-game period equals 1.9307 yr. A 1.6 AU giant remains unlocked
        even at 5 Gyr → free rotator. The canon Poly-L4/L5 co-orbital planetoids (337/611km) are excluded
        (unnecessary; binary Trojan stability unverified).
      evidence_ko: >
        배향은 원칙상 자유(관측 약/bimodal, 구속은 16° mutual뿐)이며 검출 기하에 고정. build()
        시뮬은 하늘 앵커됨(load.py가 쌍성 i/Ω/ω를 J2000 해에서 그대로 주입). scripts/scan_pa_match.py가 궤적을
        순방향 스윕해 하늘 투영 PA가 JWST/MIRI 2024-08 검출(PA 83.5° 북→동, Beichman 2025 Table 2 S1)에 가장
        가까운 위상을 선택: 83.66°(오차 0.16°). 그 상태를 평균근점이각으로 게임 에포크(JD 2433282.5 = 1950.0)로
        되감음(주기 1.9307년, Δt 74.6년 = 38.64바퀴): ma_2024 321.46° → ma_1950 90.05°. 정합은 방향뿐. PA 83.5°
        선상에서 채택 궤도(1.6 AU/e=0.1)는 투영 ~0.75 AU까지만 닿음(관측 ~2.0 AU; 그 PA는 투영 타원의 단축 근처,
        장축은 실측 쌍성 노드 Ω=204.85° 방향). 이 분리 부족은 안정성-선택 궤도의 본질적 한계다. typed
        기본값 = t=500yr osculating 스냅샷(scripts/snapshot_elements.py →
        results/_snapshot500/elements.log, 프레임 AB면·x축=t=500의 A→B, 스냅샷 mutual 16.127°); 16° mutual만
        보존하면 어떤 값으로 바꿔도 합법; 스냅샷 a/e(1.5936 AU/0.0756)는 a/e/inc 행이 유지하는 설계 앵커 주위의
        진동값. epoch=0(게임 epoch, Sol-Configs 관행). 캐비엇: 궤도면 요소는 t*≈1957 osculating(1950까지 세차
        ~0.1°, 무시가능), 되감기는 인게임 주기 1.9307년 전제. 1.6 AU 거인은 5 Gyr에도 미잠김 → free rotator.
        캐넌 Poly-L4/L5 공궤도 planetoid(337/611km)는 제외(불필요, binary 트로이 안정성 미검증).
    refs: ["2508.03814", "2508.03812", "phase3/stability-sim/STABILITY_REPORT.md"]

  # ── 벌크 (canon↔관측 밀도 충돌) ───────────────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.radius
    status: gated                 # ring-model 반경 채택 (Phase 3 tie-break), 2026-06-19 정정
    driver: [window-selection]
    narrative: >
      Polyphemus is exactly Jupiter-sized yet strikingly light: barely half the density of water. Its brightness
      admits two readings: a bare, somewhat larger planet, or a Jupiter-sized one whose rings make up the missing
      cross-section. NearStars takes the ring reading, consistent with its ring system, keeping the ring-free
      planet as a recorded alternative; the mass is the same either way. The film's "denser than Jupiter" would
      nearly double the mass and is set aside, since observation outranks canon.
    narrative_ko: >
      Polyphemus는 정확히 목성 크기인데 눈에 띄게 가볍다. 물 밀도의 절반이 될까 말까다. 밝기는 두 가지로 읽을
      수 있다. 고리 없는 조금 더 큰 행성이거나, 목성 크기 행성에 고리가 모자란 단면적을 보태는 해이거나.
      NearStars는 고리 해를 택해 자신의 고리계와 정합시키고, 고리 없는 행성은 대안으로 보존한다. 질량은 어느
      쪽이든 같다. 영화의 "목성보다 밀도 높다"는 질량을 거의 두 배로 불려야 해서 접었다. 관측이 캐넌보다
      우선한다.
    fields:
      - { name: radius, value: 1.0, unit: R_jup, op: set, phase3_default: "1.0 R_Jup (ring-model tie-break; ring-free 대안은 1.1–1.15 R_Jup)" }
    gate:
      criterion: [error-bar]
      verdict: pass-in-window
      evidence: >
        1.0 R_Jup (71,492 km), ρ ~0.47 g/cc (from 120 M⊕ + 1.0 R_Jup). Of the two solutions in Beichman §5.3, the
        ring-model (radius 1.0 R_Jup + rings account for the excess cross-section) is adopted. The mass is
        ~120 M⊕ in both solutions (the difference is radius only). Coupled with appearance.rings: a small radius
        only holds if rings exist. The ring-free 1.1–1.15 is a preserved alternative. The prior commit's
        1.05 R_Jup/0.40 was a mis-transcription of the raw imaging estimate → cfg-ready 1.0/~0.47. The canon
        "denser than Jupiter" (ρ>1.33 → 220 M⊕+) is not adopted (observation first).
      evidence_ko: >
        1.0 R_Jup(71,492 km), ρ ~0.47 g/cc(120 M⊕ + 1.0 R_Jup서 도출). Beichman §5.3 두 해 중 ring-model(반경
        1.0 R_Jup + 고리가 초과 단면적 담당)을 채택. 질량은 두 해 모두 ~120 M⊕(차이는 반경뿐). appearance.rings와
        커플링: 작은 반경은 고리가 있어야만 성립. ring-free 1.1–1.15는 보존된 대안. 직전 커밋의 1.05 R_Jup/0.40은
        raw 이미징 추정치를 잘못 옮긴 것 → cfg-ready 1.0/~0.47. canon "목성보다 밀도 큼"(ρ>1.33 → 220 M⊕↑)은
        미채택(관측 우선).
    refs: ["2508.03814"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.geopotential_j2     # 편평도 (Principia j2 + reference_radius) — emit 필드 + 위성 동역학 입력
    status: gated                  # 2026-06-20 확정 — J2 위성 시뮬 완료(자체구현 j2.py로 주입·검증)
    driver: [physical]             # 자전+밀도에서 도출(아트디렉션 아님)
    narrative: >
      A ten-hour day flattens this puffy giant into a visibly oblate globe. The bulge follows from the rotation
      rate and an interior mass concentration assumed to lie between Saturn's and Jupiter's, via the standard
      textbook relation, which reproduces both planets well. It is not merely cosmetic: fed into the moon
      simulation, the bulge reshapes the satellite layout, keeping the adopted spacing stable while the
      once-favored resonance lock falls apart. An independent figure pass reached the same numbers.
    narrative_ko: >
      10시간짜리 하루가 이 푸석한 거인을 눈에 띄게 납작한 구체로 만든다. 팽대는 자전 속도와 "토성과 목성 사이"로
      가정한 내부 질량 집중도에서 교과서 표준 관계식으로 계산되며, 이 식은 두 행성을 잘 재현한다. 단순 겉모습이
      아니다. 위성 시뮬레이션에 넣으면 팽대가 위성 배치를 바꿔, 채택한 간격 배치는 팽대를 포함해도 안정한 반면
      한때 유력했던 공명 락은 무너진다. 독립적으로 수행한 figure 패스도 같은 수치에 도달했다.
    fields:
      - { name: geopotential_j2, value: 0.023, reference_radius_km: 71492, op: set, phase3_default: "J2 ≈ 0.023 (범위 0.017–0.033; 절단보정 ~0.025–0.026)" }
      - { name: reference_radius, value: 71492, unit: km, op: set }
      - { name: j4, value: -0.001, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Radau–Darwin (Helled+2011 eq.3, arXiv:1109.1627), NMoI=(2/3)[1-(2/5)√(5m/(m+3J2)-1)], m=ω²R̄³/GM (mean
        radius; Polyphemus m≈0.19, self-consistently iterated with f≈0.13). Structural assumption NMoI=0.23 (range
        0.21–0.26, from giant-planet measurements: Jupiter 0.265, Saturn ~0.21, ice giants ~0.22–0.24;
        Helled+2011/2020 arXiv:2007.10783, Fortney+2018 arXiv:1609.06324; a 0.4 M_Jup low-density body is less
        condensed than Saturn → NMoI slightly higher) → J2≈0.023 (central), range 0.017–0.033 (span dominated by the
        NMoI assumption), J4≈-0.001. Calibration: the same equation reproduces Jupiter J2 -0.0%·Saturn -10.3% (known
        first-order error; m≈0.19 > Saturn's 0.14 → truncation underpredicts, corrected ~0.025–0.026). Input
        calibration J2: Jupiter=Iess2018, Saturn=Durante2017. Gas giant = axisymmetric → zonal only (j2[+j4]).
        J2=0.023 injected into the moon sim and verified (scripts/j2.py; reboundx incompatible with rebound 5.x,
        so custom rebound additional_forces, M&D vector form, <0.1% against the analytic precession rate), flipping
        the moon decisions via 135k-gap stability·3:2-lock escape (Principia applies J2 to inter-body computations,
        so this input was decisive). The figure pass independently re-confirmed
        (body-figure-methodology.md; visual oblate mesh a:b:c ≈ 1.149:1.149:1.0, VertexHeightOblateAdvanced, base
        radius=polar radius).
      evidence_ko: >
        Radau–Darwin(Helled+2011 eq.3, arXiv:1109.1627), NMoI=(2/3)[1-(2/5)√(5m/(m+3J2)-1)], m=ω²R̄³/GM(평균반경;
        폴리페무스 m≈0.19, f≈0.13과 자기일관 반복). 구조 가정 NMoI=0.23(범위 0.21–0.26, 거대행성 실측: 목성
        0.265·토성 ~0.21·빙왕성 ~0.22–0.24, Helled+2011/2020 arXiv:2007.10783, Fortney+2018 arXiv:1609.06324;
        0.4 M_Jup 저밀도체는 토성보다 덜 응축 → NMoI 약간 높음) → J2≈0.023(central), 범위 0.017–0.033(폭은 NMoI
        가정이 지배), J4≈-0.001. calibration: 같은 식이 목성 J2 -0.0%·토성 -10.3% 재현(알려진 1차 오차; m≈0.19가
        토성 0.14보다 커 절단이 과소예측 → 보정 ~0.025–0.026). 입력 calibration J2: 목성=Iess2018,
        토성=Durante2017. 가스자이언트=축대칭 → zonal only(j2[+j4]). J2=0.023을 위성 시뮬에 주입 검증
        완료(scripts/j2.py; reboundx가 rebound 5.x 비호환이라 자체 구현, rebound additional_forces, M&D 벡터형,
        해석 세차율과 <0.1%), 135k 갭 안정·3:2-락 이탈로 위성 결정을 뒤집음(Principia는 천체간 연산에도 J2를
        적용하므로 이 입력이 결정적). figure 패스가 독립 재확인(body-figure-methodology.md; 시각
        oblate 메시 a:b:c ≈ 1.149:1.149:1.0, VertexHeightOblateAdvanced, base radius=극반경).
    refs: ["docs/reference/body-figure-methodology.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.obliquity
    status: gated                  # 5° 확정 (2026-06-22) — 재시뮬 STABLE + 일식 duty 검증
    driver: [visual, physics]
    narrative: >
      The spin axis leans just 5° from the orbital plane. A Saturn-like 27° would only serve to tilt the rings
      photogenically, but the ring instead lies in Chaos's orbital plane, so the axis stays nearly upright. Three
      tilts live independent lives: the 5° spin axis, the moons riding about 10° above the orbital plane on a
      shared node line, and the ring following Chaos. The moon system is stable at this tilt, and the small lean
      happens to make eclipses on Pandora more frequent, with natural "eclipse seasons" as the companion star
      works the geometry.
    narrative_ko: >
      자전축은 공전면에서 딱 5° 기운다. 토성 같은 27°는 오직 고리를 그림 좋게 기울이는 데나 쓸모가 있는데, 고리는
      그 대신 Chaos 궤도면에 놓이므로 축은 거의 곧게 선다. 세 기울기가 서로 독립적으로 산다. 5° 자전축, 공통
      노드선을 타고 공전면 위 ~10°를 도는 위성들, 그리고 Chaos를 따라가는 고리. 위성계는 이 기울기에서 안정하고,
      작은 기울기가 마침 Pandora의 일식을 더 잦게 만들어 동반성이 기하를 흔드는 대로 "일식 시즌"이 자연 발생한다.
    fields:
      - { name: obliquity, value: 5, unit: deg, op: set, phase3_default: "27° (토성-유추 tie-break, 고리 기울기용 → 폐기)" }
    gate:
      criterion: [stability, visual-checklist]
      verdict: owner-override
      evidence: >
        Re-sim (TRACE 1000yr J2, --j2-obliquity-deg 5, results/_obliq5) STABLE, Pandora e≤0.0123. Moon system
        shares a common node line (coherent warp; the sim loader gives every moon a parent node,
        load.add_hypotheticals); inclinations keep the design-of-record (inner Dante/Hades/Pandora ~9–11°,
        retrograde Cassandra/Chaos ~176/179°, rel. Polyphemus orbital plane;
        phase3/stability-sim/hypotheticals/alpha_centauri.json; 1000yr STABLE _finalv2). Ring ≠ 5° equatorial
        plane; ring = Chaos's orbital plane (Chaos-fed E-ring → shepherd-moon plane; near-coplanar retrograde
        ~180°). Eclipse check: θ (Pandora plane ↔ Polyphemus orbital plane) 0–18.9°, mean 9.5°, duty
        94.2% (75.5% at 0°): the 5° tilt partly cancels the companion's forcing, so eclipses are actually more
        frequent; companion perturbation makes θ oscillate → "eclipse seasons" arise naturally.
      evidence_ko: >
        재시뮬(TRACE 1000yr J2, --j2-obliquity-deg 5, results/_obliq5) STABLE, Pandora e≤0.0123. 위성계는 공통
        노드선 공유(coherent warp; 시뮬 로더가 전 위성에 부모 노드 부여, load.add_hypotheticals), 경사는
        design-of-record 유지(inner Dante/Hades/Pandora ~9–11°·역행 Cassandra/Chaos ~176/179°, Polyphemus 공전면
        대비; phase3/stability-sim/hypotheticals/alpha_centauri.json; 1000yr STABLE _finalv2). 고리 ≠ 5° 적도면;
        고리 = Chaos 궤도면(Chaos 생성 E-고리 → shepherd 위성면; ~180° 근접-공면 역행). 일식 검증: θ(Pandora면↔Polyphemus 궤도면)
        0–18.9°, 평균 9.5°, duty 94.2%(0°는 75.5%): 5°가 동반성 요동을 부분 상쇄해 일식이 오히려 잦음. 동반성
        섭동으로 θ 요동 → "일식 시즌" 자연발생.
    refs: ["phase3/stability-sim/STABILITY_REPORT.md"]

