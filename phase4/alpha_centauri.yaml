      - >
        라플라스 1:2:4 공명 사슬 (Dante 100k : Hades 158.7k : Pandora 252k) — 조석가열을 능동
        펌핑해 자기일관시키는 매력적 안이나, Pandora를 252k로 옮기려면 폴리페무스 질량을 관측
        120 M⊕ → 168 M⊕로 부풀려야 함(영화 위성배치에 관측 행성을 맞추는 격). 관측 우선 원칙으로
        기각(2026-06-19). 따라서 Pandora a=225,000은 관측질량+27h로 사실상 고정, 빈틈 배치 유지.
    decided:
      - "무명 9위성: 추가 안 함(사용자 2026-06-19). 명명 5위성만 — 어차피 전부 창작이므로."
      - "최외곽 2위성 역행(canon): 반영(Cassandra·Chaos inc 178/175). 100yr STABLE 확인."
    deferred:
      - "Poly-L4/L5: 위성 아닌 폴리페무스 *공전* L4/L5 공궤도 planetoid(337/611km) → 항성중심 트로이 시뮬 별건."
      - >
        [4a 의향] 시각적 배치를 위해 궤도경사각 더 크게(현재 near-coplanar라 판도라 하늘서 한 줄로
        겹침 → 위성별 sky 위도 분산). 4b 안정성 재검 필요(Hill 구 깊이면 적당 경사 OK, 어디까지가
