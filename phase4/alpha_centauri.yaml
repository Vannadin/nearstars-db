    refs: ["2508.03812", "2508.03814"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit.eccentricity
    status: gated
    driver: [window-selection]
    narrative: >
      Center of the stability window, e=0.1. The observationally preferred e≈0.4 is Kozai-unstable → preserved as a Canonical alternative.
    narrative_ko: >
      안정창 중앙 e=0.1. 관측 선호 e≈0.4는 Kozai-불안정 → Canonical alternative로 보존.
    fields:
      - { name: eccentricity, value: 0.1, op: set, phase3_default: "안정창 중앙 e=0.1 (관측 선호 e≈0.4는 Kozai-불안정 → Canonical alternative로 보존)" }
    gate:
      criterion: [stability]
      verdict: pass-in-window
      evidence: "Center of the e≈0–0.18 stability window. The observed e≈0.4 is KL-unstable (e→0.95 within 30 kyr, IAS15)."
      evidence_ko: "e≈0–0.18 안정창 중앙. 관측 e≈0.4는 KL-불안정(30 kyr 내 e→0.95, IAS15)."

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit.inclination_deg
    status: gated                 # 2026-06-22 — 상호경사 16° prograde 확정, 절대 sky-frame은 자유 emit 배향
    driver: [stability, window-selection]
    narrative: >
      The planet rides 16° above the binary's plane, orbiting the same way the two stars turn. The observed solutions
      near 50° and 130° would let the companion star wrench the orbit apart, so the board keeps the middle of the
      stable range instead — and choosing the low prograde branch also collapses the observation's two-way ambiguity
      into a single clean answer. Only this 16° mutual tilt is binding; how the whole system faces the game's sky is
      a free orientation, settled in the orbit row.
    narrative_ko: >
      행성은 쌍성면에서 16° 기울어, 두 별이 도는 것과 같은 방향으로 돈다. 관측이 가리키는 ~50°·~130° 해는
      동반성이 궤도를 비틀어 찢어 놓는 값이라, 보드는 대신 안정 범위의 한가운데를 잡았다 — 낮은 순행 가지를
      고르면서 관측의 양갈래 모호성도 하나의 답으로 정리된다. 구속되는 것은 이 16° 상호경사뿐이고, 계 전체가
      게임 하늘을 어떻게 향할지는 자유 배향으로 orbit 행에서 정한다.
    fields:
      - { name: inclination_deg, value: 16, unit: deg, op: set, phase3_default: "mutual_inclination_deg=16 (안정창 0–35°의 중앙); 관측 ~50°/~130°는 Kozai-불안정이라 미채택" }
    gate:
      criterion: [stability, error-bar]
      verdict: documented-divergence
      divergence_note: >
        Beichman Table 4 observations ~50° (prograde)/~130° (retrograde, i_AB=79.24°), together with e≈0.4, are ECL Kozai-unstable
        (e→0.95+, moon system disrupts). NearStars adopts 16° prograde at the center of the stability window (≲35°; ≳45° is Kozai) —
        recorded in the Phase 3 Canonical alternatives. Being 16° low-inclination prograde, it also resolves the observed bimodal ambiguity into a single solution.
      divergence_note_ko: >
        Beichman Table 4 관측 ~50°(prograde)/~130°(retrograde, i_AB=79.24°)는 e≈0.4와 함께 ECL Kozai-불안정
        (e→0.95+, 위성계 붕괴). NearStars는 안정창(≲35°, ≳45°는 Kozai) 중앙 16° prograde 채택 — Phase 3
        Canonical alternatives에 기록. 16° 저경사 prograde라 관측의 bimodal 모호성도 단일해로 해소.
      evidence: >
        Observations ~50°/~130°, together with e≈0.4, are Kozai-unstable. 16° mutual prograde is the center of the stability window (0–35°).
      evidence_ko: >
        관측 ~50°/~130°는 e≈0.4와 함께 Kozai-불안정. 16° mutual prograde는 안정창(0–35°) 중앙.
    refs: ["2508.03812"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: orbit                      # was orbit.elements_residual — Ω/ω/mean_anomaly + spin-orbit + lagrange (facet-walk 2026-06-22)
    status: gated
    driver: [emit, classification]
    narrative: >
      This row fixes where Polyphemus actually stands in space and time. Its orientation was originally left free —
      any placement keeping the 16° mutual tilt was legal — but the owner later pinned it to reality: the orbit is
      phased so that in August 2024 the planet sits exactly along the direction JWST saw it, then wound back to the
      game's 1950 start epoch. Only the direction could be matched; the stability-safe orbit physically cannot reach
      the observed separation along that line of sight, a shortfall the owner accepted as the price of a stable
      system. The planet spins freely on a roughly ten-hour day — a giant this far out never tidally locks — and the
      film's co-orbital planetoids at the Lagrange points were deliberately left out. The concrete numbers are a
      snapshot from the verified simulation, so the system starts mid-evolution rather than at suspiciously round
      values.
    narrative_ko: >
      이 행은 Polyphemus가 실제로 공간과 시간 어디에 서 있는지를 못 박는다. 배향은 원래 자유였지만(16° 상호경사만
      지키면 어떤 배치든 합법) 오너가 나중에 현실에 고정했다. 2024년 8월에 행성이 JWST가 본 바로 그 방향에 서도록
      궤도의 위상을 맞춘 뒤, 게임 시작 에포크인 1950년으로 되감았다. 맞출 수 있었던 것은 방향뿐이다 — 안정성을
      위해 고른 궤도는 그 시선 방향으로 관측된 분리까지 물리적으로 닿지 못하며, 오너는 이를 안정한 계의 대가로
      수용했다. 행성은 약 10시간 주기로 자유 자전하고(이 거리의 거인은 조석고정되지 않는다) 영화의 라그랑주점
      공궤도 planetoid들은 의도적으로 뺐다. 구체적 수치는 검증된 시뮬레이션의 스냅샷이라, 계가 수상할 만큼 딱
      떨어지는 값이 아니라 진화 중인 상태에서 시작한다.
    fields:
      - { name: longitude_ascending_node, value: 273.10, unit: deg, op: set, note: "관측-방향 정합값(AB면 프레임). PA 83.5° 매칭 상태 → 1950 에포크. 제약은 AB면 대비 16° mutual(매칭 15.88°)" }
      - { name: argument_periapsis, value: 122.38, unit: deg, op: set, note: "관측-방향 정합값(AB면 프레임)" }
      - { name: mean_anomaly, value: 90.05, unit: deg, op: set, note: "1950 에포크로 되감은 위상. 관측 위상 ma_2024=321.46° − 38.64바퀴 → 90.05°. 74.6년 뒤(2024) PA 83.5° 도달" }
      - { name: epoch, value: 0, op: set, note: "게임 epoch 0 = 태양계 에포크 JD 2433282.5 (1950.0). mean_anomaly는 이 에포크 기준으로 되감김" }
      - { name: spin_orbit_resonance, value: "none", op: set, note: "free ~10h rotator — 1.6 AU giant는 5 Gyr에도 미잠김" }
      - { name: lagrange_placement, value: "none", op: set, note: "Poly-L4/L5 코오비탈 planetoid 의도적 제외 (오너 2026-06-22)" }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        Orientation: free in principle (observation weak/bimodal; only the 16° mutual binds), pinned to the detection
        geometry 2026-07-21 (v3). The build() sim is sky-anchored (load.py feeds the binary i/Ω/ω verbatim from the
        J2000 solution); scripts/scan_pa_match.py sweeps the trajectory forward-only and picks the phase whose
        sky-projected PA best matches the JWST/MIRI Aug-2024 detection (PA 83.5° E of N; Beichman 2025 Table 2 S1) —
        match 83.66° (err 0.16°); that state is rewound to the game epoch (JD 2433282.5 = 1950.0) via mean anomaly
        (period 1.9307 yr, Δt 74.6 yr = 38.64 orbits): ma_2024 321.46° → ma_1950 90.05°. Direction only: along PA
        83.5° the adopted 1.6 AU/e=0.1 orbit reaches ~0.75 AU projected vs the observed ~2.0 AU (that PA sits near
        the projected ellipse's minor axis; the major axis lies along the real binary node Ω=204.85°) — intrinsic to
        the stability-selected orbit, accepted (owner 2026-07-21). Typed defaults = the t=500yr osculating snapshot
        (v2 2026-07-11, scripts/snapshot_elements.py → results/_snapshot500/elements.log; frame AB-plane,
        x-axis=A→B at t=500; snapshot mutual 16.127°); changing to any value preserving the 16° mutual is legal;
        snapshot a/e (1.5936 AU/0.0756) oscillates around the design anchors kept by the a/e/inc rows; epoch=0
        (game epoch, Sol-Configs convention). Caveats: plane elements are t*≈1957 osculating (precession ~0.1° to
        1950, negligible); the rewind assumes the in-game period equals 1.9307 yr. A 1.6 AU giant remains unlocked
        even at 5 Gyr → free rotator. The canon Poly-L4/L5 co-orbital planetoids (337/611km) are intentionally
        excluded (owner decision 2026-06-22 — unnecessary; binary Trojan stability unverified).
      evidence_ko: >
        배향 — 원칙상 자유(관측 약/bimodal, 구속은 16° mutual뿐)였고 2026-07-21(v3) 검출 기하에 고정. build()
        시뮬은 하늘 앵커됨(load.py가 쌍성 i/Ω/ω를 J2000 해에서 그대로 주입). scripts/scan_pa_match.py가 궤적을
        순방향 스윕해 하늘 투영 PA가 JWST/MIRI 2024-08 검출(PA 83.5° 북→동, Beichman 2025 Table 2 S1)에 가장
        가까운 위상을 선택 — 83.66°(오차 0.16°). 그 상태를 평균근점이각으로 게임 에포크(JD 2433282.5 = 1950.0)로
        되감음(주기 1.9307년, Δt 74.6년 = 38.64바퀴): ma_2024 321.46° → ma_1950 90.05°. 정합은 방향뿐 — PA 83.5°
        선상에서 채택 궤도(1.6 AU/e=0.1)는 투영 ~0.75 AU까지만 닿음(관측 ~2.0 AU; 그 PA는 투영 타원의 단축 근처,
        장축은 실측 쌍성 노드 Ω=204.85° 방향) → 안정성-선택 궤도의 본질적 한계로 수용(오너 2026-07-21). typed
        기본값 = t=500yr osculating 스냅샷(v2 2026-07-11, scripts/snapshot_elements.py →
        results/_snapshot500/elements.log, 프레임 AB면·x축=t=500의 A→B, 스냅샷 mutual 16.127°); 16° mutual만
        보존하면 어떤 값으로 바꿔도 합법; 스냅샷 a/e(1.5936 AU/0.0756)는 a/e/inc 행이 유지하는 설계 앵커 주위의
        진동값. epoch=0(게임 epoch, Sol-Configs 관행). 캐비엇 — 궤도면 요소는 t*≈1957 osculating(1950까지 세차
        ~0.1°, 무시가능), 되감기는 인게임 주기 1.9307년 전제. 1.6 AU 거인은 5 Gyr에도 미잠김 → free rotator.
        캐넌 Poly-L4/L5 공궤도 planetoid(337/611km)는 의도적 제외(오너 결정 2026-06-22 — 불필요, binary 트로이
        안정성 미검증).
    refs: ["2508.03814", "2508.03812"]

  # ── 벌크 (canon↔관측 밀도 충돌) ───────────────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.radius
    status: gated                 # ring-model 반경 채택 (Phase 3 tie-break), 2026-06-19 정정
    driver: [window-selection]
    narrative: >
      Polyphemus is exactly Jupiter-sized yet strikingly light — barely half the density of water. The imaging
      offered two readings of its brightness: a bare, somewhat larger planet, or a Jupiter-sized one whose rings
      supply the missing cross-section. The board takes the ring solution, which locks hand-in-glove with the
      decision to keep the rings; the ring-free reading survives as a recorded alternative, and the mass is the
      same either way. The film's "denser than Jupiter" would nearly double the mass and is set aside —
      observation outranks canon. An earlier transcription slip that briefly made the radius 1.05 R_Jup is
      corrected here for the record.
    narrative_ko: >
      Polyphemus는 정확히 목성 크기인데 눈에 띄게 가볍다 — 물 밀도의 절반이 될까 말까다. 이미징은 밝기를 두
      가지로 읽을 수 있었다. 고리 없는 조금 더 큰 행성이거나, 목성 크기 행성에 고리가 모자란 단면적을 보태는
      해이거나. 보드는 고리 해를 택했고, 이는 고리를 유지한 결정과 맞물려 돌아간다. 고리 없는 해는 대안으로
      보존되며 질량은 어느 쪽이든 같다. 영화의 "목성보다 밀도 높다"는 질량을 거의 두 배로 불려야 해서 접었다 —
      관측이 캐넌보다 우선한다. 반경을 잠시 1.05 R_Jup로 만들었던 이전 전사 실수도 여기서 기록으로 바로잡는다.
    fields:
      - { name: radius, value: 1.0, unit: R_jup, op: set, phase3_default: "1.0 R_Jup (ring-model tie-break; ring-free 대안은 1.1–1.15 R_Jup)" }
    gate:
      criterion: [error-bar]
      verdict: pass-in-window
      evidence: >
        1.0 R_Jup (71,492 km), ρ ~0.47 g/cc (from 120 M⊕ + 1.0 R_Jup). Of the two solutions in Beichman §5.3, the
        ring-model (radius 1.0 R_Jup + rings account for the excess cross-section) is adopted. The mass is
        ~120 M⊕ in both solutions (the difference is radius only). Coupled with appearance.rings — a small radius
        only holds if rings exist. The ring-free 1.1–1.15 is a preserved alternative. The prior commit's
        1.05 R_Jup/0.40 was a mis-transcription of the raw imaging estimate → cfg-ready 1.0/~0.47. The canon
        "denser than Jupiter" (ρ>1.33 → 220 M⊕+) is not adopted (observation first).
      evidence_ko: >
        1.0 R_Jup(71,492 km), ρ ~0.47 g/cc(120 M⊕ + 1.0 R_Jup서 도출). Beichman §5.3 두 해 중 ring-model(반경
        1.0 R_Jup + 고리가 초과 단면적 담당)을 채택. 질량은 두 해 모두 ~120 M⊕(차이는 반경뿐). appearance.rings와
        커플링 — 작은 반경은 고리가 있어야만 성립. ring-free 1.1–1.15는 보존된 대안. 직전 커밋의 1.05 R_Jup/0.40은
        raw 이미징 추정치를 잘못 옮긴 것 → cfg-ready 1.0/~0.47. canon "목성보다 밀도 큼"(ρ>1.33 → 220 M⊕↑)은
        미채택(관측 우선).
    refs: ["2508.03814"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.geopotential_j2     # 편평도 (Principia j2 + reference_radius) — emit 필드 + 위성 동역학 입력
    status: gated                  # 2026-06-20 확정 — J2 위성 시뮬 완료(자체구현 j2.py로 주입·검증)
    driver: [physical]             # 자전+밀도에서 도출(아트디렉션 아님)
    narrative: >
      A ten-hour day flattens this puffy giant noticeably, and the game needs that bulge as a number — it visibly
      reshapes the globe, and more importantly it steers the moons' orbits. The bulge is computed from the rotation
      rate and an interior mass concentration assumed to sit between Saturn's and Jupiter's, using the standard
      textbook relation, and the same formula reproduces Jupiter and Saturn well enough to trust it here. Feeding
      the result back into the moon simulation actually flipped the satellite layout: the adopted spacing stays
      stable with the bulge included, while the once-favored resonance lock falls apart. A later, independent
      figure pass reached the same numbers.
    narrative_ko: >
      10시간짜리 하루는 이 푸석한 거인을 눈에 띄게 납작하게 만들고, 게임은 그 팽대를 숫자로 필요로 한다 —
      눈에 보이는 구형 왜곡이자, 더 중요하게는 위성 궤도를 젓는 손이기 때문이다. 팽대는 자전 속도와 "토성과
      목성 사이"로 가정한 내부 질량 집중도에서 교과서 표준 관계식으로 계산했고, 같은 식이 목성·토성을 충분히
      잘 재현해 여기서도 믿을 만하다. 결과를 위성 시뮬레이션에 되먹이자 위성 배치가 실제로 뒤집혔다 — 채택한
      간격 배치는 팽대를 넣어도 안정한 반면, 한때 유력했던 공명 락은 무너진다. 뒤에 독립적으로 수행한 figure
      패스도 같은 수치에 도달했다.
    fields:
      - { name: geopotential_j2, value: 0.023, reference_radius_km: 71492, op: set, phase3_default: "J2 ≈ 0.023 (범위 0.017–0.033; 절단보정 ~0.025–0.026)" }
      - { name: reference_radius, value: 71492, unit: km, op: set }
      - { name: j4, value: -0.001, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Radau–Darwin (Helled+2011 eq.3, arXiv:1109.1627), NMoI=(2/3)[1-(2/5)√(5m/(m+3J2)-1)], m=ω²R̄³/GM (mean
        radius; Polyphemus m≈0.19, self-consistently iterated with f≈0.13). Structural assumption NMoI=0.23 (range
        0.21–0.26, from giant-planet measurements — Jupiter 0.265, Saturn ~0.21, ice giants ~0.22–0.24;
        Helled+2011/2020 arXiv:2007.10783, Fortney+2018 arXiv:1609.06324; a 0.4 M_Jup low-density body is less
        condensed than Saturn → NMoI slightly higher) → J2≈0.023 (central), range 0.017–0.033 (span dominated by the
        NMoI assumption), J4≈-0.001. Calibration: the same equation reproduces Jupiter J2 -0.0%·Saturn -10.3% (known
        first-order error; m≈0.19 > Saturn's 0.14 → truncation underpredicts, corrected ~0.025–0.026). Input
        calibration J2: Jupiter=Iess2018, Saturn=Durante2017. Gas giant = axisymmetric → zonal only (j2[+j4]).
        J2=0.023 injected into the moon sim and verified (scripts/j2.py — reboundx incompatible with rebound 5.x,
        so custom rebound additional_forces, M&D vector form, <0.1% against the analytic precession rate) — flips
        the moon decisions via 135k-gap stability·3:2-lock escape (Principia applies J2 to inter-body computations,
        so this input was decisive). The 2026-06-25 figure pass independently re-confirmed
        (body-figure-methodology.md; visual oblate mesh a:b:c ≈ 1.149:1.149:1.0, VertexHeightOblateAdvanced, base
        radius=polar radius).
      evidence_ko: >
        Radau–Darwin(Helled+2011 eq.3, arXiv:1109.1627), NMoI=(2/3)[1-(2/5)√(5m/(m+3J2)-1)], m=ω²R̄³/GM(평균반경;
        폴리페무스 m≈0.19, f≈0.13과 자기일관 반복). 구조 가정 NMoI=0.23(범위 0.21–0.26, 거대행성 실측 — 목성
        0.265·토성 ~0.21·빙왕성 ~0.22–0.24; Helled+2011/2020 arXiv:2007.10783, Fortney+2018 arXiv:1609.06324;
        0.4 M_Jup 저밀도체는 토성보다 덜 응축 → NMoI 약간 높음) → J2≈0.023(central), 범위 0.017–0.033(폭은 NMoI
        가정이 지배), J4≈-0.001. calibration: 같은 식이 목성 J2 -0.0%·토성 -10.3% 재현(알려진 1차 오차; m≈0.19가
        토성 0.14보다 커 절단이 과소예측 → 보정 ~0.025–0.026). 입력 calibration J2: 목성=Iess2018,
        토성=Durante2017. 가스자이언트=축대칭 → zonal only(j2[+j4]). J2=0.023을 위성 시뮬에 주입 검증
        완료(scripts/j2.py — reboundx가 rebound 5.x 비호환이라 자체 구현, rebound additional_forces, M&D 벡터형,
        해석 세차율과 <0.1%) — 135k 갭 안정·3:2-락 이탈로 위성 결정을 뒤집음(Principia는 천체간 연산에도 J2를
        적용하므로 이 입력이 결정적). 2026-06-25 figure 패스가 독립 재확인(body-figure-methodology.md; 시각
        oblate 메시 a:b:c ≈ 1.149:1.149:1.0, VertexHeightOblateAdvanced, base radius=극반경).
    refs: ["docs/reference/body-figure-methodology.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.obliquity
    status: gated                  # 5° 확정 (2026-06-22) — 재시뮬 STABLE + 일식 duty 검증
    driver: [visual, physics]
    narrative: >
      The spin axis leans just 5° from the orbital plane. Phase 3 had suggested a Saturn-like 27°, but that number
      existed only to tilt the rings photogenically — once the ring was laid in Chaos's orbital plane instead, the
      rationale evaporated and the owner brought the axis nearly upright. Three tilts now live independent lives:
      the 5° spin axis, the moons riding about 10° above the orbital plane on a shared node line, and the ring
      following Chaos. A re-run of the moon simulation confirmed the change rocks nothing, and as a bonus the small
      tilt makes eclipses on Pandora more frequent, with natural "eclipse seasons" as the companion star works the
      geometry.
    narrative_ko: >
      자전축은 공전면에서 딱 5° 기운다. Phase 3는 토성 같은 27°를 제안했지만 그 숫자는 오로지 고리를 그림 좋게
      기울이기 위해 존재했다 — 고리를 Chaos 궤도면에 눕히기로 하면서 근거가 증발했고, 오너는 축을 거의 곧게
      세웠다. 이제 세 기울기가 서로 독립적으로 산다. 5° 자전축, 공통 노드선을 타고 공전면 위 ~10°를 도는
      위성들, 그리고 Chaos를 따라가는 고리. 위성 시뮬레이션 재검으로 이 변경이 아무것도 흔들지 않음을 확인했고,
      덤으로 작은 기울기 덕에 Pandora의 일식이 오히려 잦아지며 동반성이 기하를 흔드는 대로 "일식 시즌"이 자연
      발생한다.
    fields:
      - { name: obliquity, value: 5, unit: deg, op: set, phase3_default: "27° (토성-유추 tie-break, 고리 기울기용 → 폐기)" }
    gate:
      criterion: [stability, visual-checklist]
      verdict: owner-override
      evidence: >
        Re-sim (TRACE 1000yr J2, --j2-obliquity-deg 5, results/_obliq5) STABLE — Pandora e≤0.0123. Moon system
        shares a common node line (coherent warp; the sim loader gives every moon a parent node,
        load.add_hypotheticals); inclinations keep the design-of-record (inner Dante/Hades/Pandora ~9–11°,
        retrograde Cassandra/Chaos ~176/179°, rel. Polyphemus orbital plane —
        phase3/stability-sim/hypotheticals/alpha_centauri.json; 1000yr STABLE _finalv2). Ring ≠ 5° equatorial
        plane; ring = Chaos's orbital plane (Chaos-fed E-ring → shepherd-moon plane; near-coplanar retrograde
        ~180°) — owner correction 2026-07-14; the earlier "moons + ring share the 5° equatorial plane" wording was
        wrong on both counts. Eclipse check: θ (Pandora plane ↔ Polyphemus orbital plane) 0–18.9°, mean 9.5°, duty
        94.2% (75.5% at 0°) — the 5° tilt partly cancels the companion's forcing, so eclipses are actually more
        frequent; companion perturbation makes θ oscillate → "eclipse seasons" arise naturally.
      evidence_ko: >
        재시뮬(TRACE 1000yr J2, --j2-obliquity-deg 5, results/_obliq5) STABLE — Pandora e≤0.0123. 위성계는 공통
        노드선 공유(coherent warp; 시뮬 로더가 전 위성에 부모 노드 부여, load.add_hypotheticals), 경사는
        design-of-record 유지(inner Dante/Hades/Pandora ~9–11°·역행 Cassandra/Chaos ~176/179°, Polyphemus 공전면
        대비 — phase3/stability-sim/hypotheticals/alpha_centauri.json; 1000yr STABLE _finalv2). 고리 ≠ 5° 적도면;
        고리 = Chaos 궤도면(Chaos 생성 E-고리 → shepherd 위성면; ~180° 근접-공면 역행) — 2026-07-14 오너 정정,
        이전 "위성+고리 5° 적도면 공유" 표기는 둘 다 부정확했음. 일식 검증: θ(Pandora면↔Polyphemus 궤도면)
        0–18.9°, 평균 9.5°, duty 94.2%(0°는 75.5%) — 5°가 동반성 요동을 부분 상쇄해 일식이 오히려 잦음. 동반성
        섭동으로 θ 요동 → "일식 시즌" 자연발생.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.rotation_period
    status: gated                  # 2026-07-15 — Avatar canon [GAME] 자전 채택 (기존 "목성/토성 유추 conf low" 오귀속 정정)
    driver: [canon]
    narrative: >
      The day is 10.35 hours — the midpoint of the rotation range the Avatar game canon actually states. An earlier
      note had dismissed the value as a low-confidence Jupiter/Saturn analogy; the survey showed the canon number
      is real, so the attribution is corrected and the canon midpoint adopted. A giant this far out never tidally
      locks, and the fast spin is precisely what powers the pronounced equatorial bulge recorded in the figure rows.
    narrative_ko: >
      하루는 10.35시간 — 아바타 게임 캐넌이 실제로 명시한 자전 범위의 중간값이다. 이전 기록은 이 값을 신뢰도
      낮은 목성/토성 유추로 치부했지만, 조사 결과 캐넌 수치가 실재해 귀속을 바로잡고 캐넌 중간값을 채택했다.
      이 거리의 거인은 조석고정되지 않으며, 빠른 자전이야말로 figure 행들에 기록된 뚜렷한 적도팽대의 동력이다.
    fields:
      - { name: rotation_period, value: 10.35, unit: h, op: set, phase3_default: "10 h (구 오귀속: 목성/토성 유추 conf low)" }
    gate:
      criterion: [canon-consistency]
      verdict: pass-in-window
      evidence: "Adopts the midpoint of the Avatar canon [GAME] rotation 10.1–10.6 h (polyphemus-art-direction.md 2026-06-19 survey, line 235–236; canon also quotes 9.7 h in the core/magnetic-field frame). The former '10 h Jupiter/Saturn analogy, conf low' was a misattribution. Fast rotation → consistent with a large equatorial bulge (flattening 0.13, q~0.19, J₂ 0.023 — bulk anchor)."
      evidence_ko: "Avatar canon [GAME] 자전 10.1–10.6 h(polyphemus-art-direction.md 2026-06-19 조사, line 235–236; 캐넌은 핵/자기장 기준 9.7 h도 병기)의 중간값 채택. 기존 '10 h 목성/토성 유추 conf low'는 오귀속. 빠른 자전 → 큰 적도팽대(flattening 0.13, q~0.19, J₂ 0.023 — bulk anchor)와 정합."

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk                       # was bulk.residual — mass + spin_axis + internal_heat + age (facet-walk 2026-06-22)
    body_class: free_rotator         # §3.2 템플릿 앵커 — radius/rotation/obliquity/J2는 전용 행 (union rule)
    status: gated
    driver: [physics, classification]
    narrative: >
      The remaining bulk facts, gathered in one place: the planet weighs 120 Earth masses, inherits its
      5.3-billion-year age from the star, and runs on sunlight rather than inner fire — the opposite of the
      self-luminous eps Ind A b, though even its faint leftover warmth helps stir the bands and weather. The one
      free knob, the compass direction the tilted axis points, is left to the emit stage within the range that
      keeps Pandora's eclipses frequent.
    narrative_ko: >
      남은 벌크 사실들을 한자리에 모았다. 행성은 지구 질량 120배이고, 별에게서 53억 년 나이를 물려받았으며,
      내부의 불이 아니라 햇빛으로 산다 — 자발광하는 eps Ind A b의 정반대다. 다만 희미하게 남은 내부 온기도
      띠와 날씨를 젓는 데는 한몫한다. 하나 남은 자유 손잡이인 기운 자전축의 방위는, Pandora의 일식이 잦게
      유지되는 범위 안에서 emit 단계로 넘긴다.
    fields:
      - { name: mass, value: 120, unit: M_earth, op: set, phase3_default: "120 M⊕ (0.38 M_Jup)" }
      - { name: gravity, value: 9.36, unit: m/s2, op: set, phase3_default: "GM/R² 파생 에코 (1-bar 반경 71492 km 기준)" }
      - { name: flattening, value: 0.13, op: set, note: "= (3J₂+q)/2 파생 에코 (J₂ 0.023, q 0.19) — 시각 oblate 슬롯; 대형 q라 1차식이 다소 하한" }
      - { name: spin_axis_orientation, value: "obliquity 5° 방위, 자유 emit (eclipse duty 94% bound)", op: set }
      - { name: internal_heat, value: "negligible (T_int<110K, 내부플럭스 ≲6% insolation, 자발광 아님)", op: set }
      - { name: geopotential_c22, value: null, na_reason: "가스자이언트 자유 자전 — 축대칭이라 조석 삼축 없음 (zonal J2/J4만, 전용 행)" }
      - { name: age, value: 5.3, unit: Gyr, op: set, phase3_default: "5.3 Gyr (α Cen A 상속)" }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        mass 120 M⊕ (0.38 M_Jup) = Phase 3 foundation value, input to J2·density·tides·dynamo; age 5.3 Gyr
        inherited from α Cen A. internal_heat negligible: T_int<110K, internal flux ≲6% of insolation (old
        low-mass Saturn-class → small residual heat), radiative equilibrium dominant, not self-luminous —
        insolation-set, contrast eps Ind A b. spin_axis_orientation = azimuth of the 5° obliquity, free emit
        (de-perfect) = emit-noise within the eclipse-favorable bound (duty 94%).
      evidence_ko: >
        mass 120 M⊕(0.38 M_Jup) = Phase 3 토대값, J2·밀도·조석·dynamo 입력; age 5.3 Gyr는 α Cen A 상속.
        internal_heat 미미: T_int<110K, 내부플럭스 ≲insolation의 6%(늙은 저질량 토성급 → 잔여열 작음), 복사평형
        지배·자발광 아님 — insolation-set, eps Ind A b와 대비. spin_axis_orientation = obliquity 5°의 방위, 자유
        emit(de-perfect) = eclipse-favorable 범위(duty 94%) 내 emit-noise.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: atmosphere                 # composition/pressure/temperature/scale_height/breathability/greenhouse/escape (group 4, 2026-06-22)
    status: gated
    driver: [physics, classification]
    narrative: >
      The air is hydrogen and helium, modestly enriched in heavy elements the way a Saturn-class planet should be,
      and the visible deck is water and ammonium-hydrosulfide cloud — the planet is just warm enough that ammonia
      never freezes into cloud of its own, a fact that quietly shapes its whole look. The board anchors the deck at
      225 K and one bar; nobody breathes here and nothing escapes, and with no surface there is nothing for a
      greenhouse to lift — the deep interior is hot but never rendered. Full temperature and pressure profiles are
      generated at emit from a standard cool-giant model grid, and the eccentric orbit legally drives a
      great-season cycle. The 225 K anchor assumes a moderate albedo; brighter water clouds could make the planet
      colder without changing its class, so the conservative reading is adopted.
    narrative_ko: >
      대기는 수소와 헬륨이고, 토성급 행성답게 무거운 원소가 적당히 농축되어 있으며, 눈에 보이는 덱은 물과
      황화수소암모늄 구름이다 — 암모니아가 제 구름으로 얼어붙지 못할 만큼만 따뜻한데, 이 사실이 행성의 인상
      전체를 조용히 결정한다. 보드는 구름덱을 225 K·1 bar에 앵커한다. 여기서 숨 쉴 수는 없고 대기가 달아나지도
      않으며, 표면이 없으니 온실이 끌어올릴 것도 없다 — 깊은 내부는 뜨겁지만 렌더되지 않는다. 온도·기압의 전체
      프로파일은 emit 때 표준 cool-giant 모델 격자로 생성되고, 찌그러진 궤도가 대계절 순환을 합법적으로
      구동한다. 225 K 앵커는 무난한 알베도 가정값이라 실제 물구름이 더 밝으면 더 차가울 수 있지만 분류는
      그대로다 — 보수적 읽기를 채택했다.
    fields:
      - { name: composition, value: "H₂/He bulk, [M/H]+0.5~1.0, clouds H₂O·NH₄SH (NH₃ 비응결), C/O 2.5×", op: set }
      - { name: pressure, value: 1, unit: bar, op: set, phase3_default: "1 bar 기준 앵커" }
      - { name: temperature, value: 225, unit: K, op: set, phase3_default: "구름덱 225K 앵커 (A_B=0.3 가정)" }
      - { name: scale_height, value: "프로파일서 도출", op: set }
      - { name: breathability, value: false, op: set }
      - { name: greenhouse, value: "none (표면 없어 surface-lift 없음)", op: set }
      - { name: escape, value: "negligible (거대질량)", op: set }
    gate:
      criterion: [classification, error-bar]
      verdict: pass-in-window
      evidence: >
        Composition: H₂/He bulk, [M/H]+0.5~1.0 = Thorngren2016 mass-metallicity expectation for the mass (not an
        assumption); condensing species H₂O·NH₄SH — at 225K the skin T≈189K never reaches the NH₃ condensation
        point 150K, so ammonia stays gaseous (consistent with appearance.banding); C/O 2.5× (§5.2).
        temperature/pressure are not scalars — at emit the cool-giant radiative-convective grid (Sonora Bobcat
        2107.07434 / Fortney2007 astro-ph/0612671, _bib/gas-giant-atmosphere.yaml) generates
        temperatureCurve+pressureCurve, anchored at cloud-deck 225K/1 bar; the great-season uses
        temperatureEccentricityBiasCurve (e=0.1>threshold, passes the divide-by-zero guard). Classification
        Class II water clouds (Sudarsky2003). Teq 225K assumes A_B=0.3 — with Class II albedo 0.5–0.8 it could be
        colder (still Class II; adopted conservatively). breathability false (atmosphereContainsOxygen=false);
        escape negligible (giant mass); greenhouse: no surface-lift (cloud deck=radiative layer, deep interior hot
        along the adiabat but not rendered); scale_height derived from the profile.
      evidence_ko: >
        composition: H₂/He bulk, [M/H]+0.5~1.0 = Thorngren2016 질량-금속성의 해당 질량 예상값(가정 아님); 응결
        구름종 H₂O·NH₄SH — 225K서 skin T≈189K가 NH₃ 응결점 150K에 못 닿아 기체 잔류(appearance.banding 정합);
        C/O 2.5×(§5.2). temperature/pressure는 스칼라 아님 — emit서 cool-giant 복사대류 격자(Sonora Bobcat
        2107.07434 / Fortney2007 astro-ph/0612671, _bib/gas-giant-atmosphere.yaml)로
        temperatureCurve+pressureCurve 생성, 앵커=구름덱 225K/1 bar; great-season은
        temperatureEccentricityBiasCurve(e=0.1>임계, divide-by-zero 가드 통과). 분류 Class II 물구름
        (Sudarsky2003). Teq 225K는 A_B=0.3 가정 — Class II 알베도 0.5–0.8이면 더 차가울 여지(여전히 Class II,
        보수적 채택). breathability 불가(atmosphereContainsOxygen=false); escape 무시(거대질량); greenhouse:
        surface-lift 없음(구름덱=복사층, 깊은 곳은 단열선으로 뜨겁되 미렌더); scale_height는 프로파일서 도출.
    refs: ["2107.07434", "astro-ph/0612671"]

  # ── 외형 (banding/haze/aurora 4b 게이트 완료 2026-06-22) ─────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.banding
    status: gated                 # group 6 facet-walk 완료 (2026-06-22) — 3색 띠 + 가라앉은 파란 폭풍
    driver: [visual]
    narrative: >
      Polyphemus wears three colors: white zones of water cloud, red-brown bands where photochemical pigments stain
      the deck, and slate-blue belts where gaps in the cloud expose the deep atmosphere's blue scatter. Its
      signature storm inverts Jupiter's — not a raised red spot but a sunken eye, the deepest gap of all and
      therefore the most saturated azure on the planet, matching the canon's "darkest blue storm". The palette is
      physics-bounded but owner-tuned: the white comes from the cloud chemistry, the band red was pushed to 70% of
      Jupiter's belt color, and the blues are honest scattered light, not methane trickery. Because the host star
      is a solar twin, the colors render almost exactly as painted, with no reddening correction. One deliberate
      liberty is on record — the turbulent, festooned Jupiter-style banding is visual drama; a planet this calm
      would more naturally wear Saturn's quiet stripes (that call lives in the clouds row).
    narrative_ko: >
      Polyphemus는 세 가지 색을 입는다. 물구름의 흰 zone, 광화학 색소가 덱을 물들인 적갈색 띠, 그리고 구름
      틈새로 깊은 대기의 푸른 산란이 비치는 슬레이트블루 belt. 시그니처 폭풍은 목성을 뒤집는다 — 솟은 붉은 점이
      아니라 가라앉은 눈이고, 가장 깊은 틈이기에 행성에서 가장 짙은 azure이며, 캐넌의 "제일 짙은 파란 폭풍"과
      맞아떨어진다. 팔레트는 물리로 테두리 치고 오너가 조율했다. 흰색은 구름 화학에서 오고, 띠의 적색은 목성
      belt색의 70%로 밀었으며, 파랑은 메탄 눈속임이 아니라 정직하게 산란된 빛이다. 모항성이 태양 쌍둥이라 칠한
      색이 거의 그대로 렌더되고 붉은 보정이 필요 없다. 의도적 일탈 하나를 기록한다 — 소용돌이와 festoon이 이는
      목성풍 난류 밴딩은 시각적 드라마이고, 이만큼 조용한 행성이라면 토성의 얌전한 줄무늬가 더
      자연스럽다(그 결정은 clouds 행에 있다).
    fields:
      - { name: banding_base, value: "#eef1f4", op: set, phase3_default: "#eef1f4 (물/NH4SH zone, Sudarsky Class II)", verdict: pass-in-window }
      - { name: banding_chromophore, value: "#b4784e", window: "#a8703f–#bc8055", op: set, verdict: pass-in-window }
      - { name: banding_belt, value: "#647e96", window: "#5a6e82–#6e8499", op: set, verdict: pass-in-window }
      - { name: banding_storm_eye, value: "#214a72", window: "#1e4068–#2a5480", op: set, verdict: pass-in-window, note: "구름 렌더 tint — biome-map 'The Eye' 픽셀 #244C8A(gameplay.science_biomes)와 파이프라인이 달라 의도적으로 별개" }
      - name: banding_morphology
        value: "Jovian turbulent banding (band 경계 소용돌이·festoon 多)"
        op: set
        verdict: owner-override
    gate:
      criterion: [visual-checklist]
      verdict: pass-in-window        # 색·메커니즘 in-window; 난류 밴딩만 field-level documented-divergence
      evidence: >
        White zones = water/NH4SH cloud tops (#eef1f4, Sudarsky Class II; at 225K skin T≈189K never reaches the
        NH3 condensation point 150K — unlike Jupiter the tropopause never cools that far — so no ammonia cloud;
        visible deck = water/NH4SH). Red-brown chromophore = NH4SH radiolysis sulfur + CH4/PH3 photolysis
        hydrocarbon tholins absorbing blue·UV (cold-giant photochemistry, in-window); gold owner-adjusted to
        Jupiter belt red 70%. Slate-blue belts = Rayleigh scattering of the deep H2/He column exposed in shallow
        cloud gaps (haze attenuates saturation). Storm eye = the deepest gap → longest Rayleigh column → most
        saturated azure (inverse Great Red Spot; Rayleigh not methane absorption, so no cobalt over-saturation
        concern). Color methodology = atmosphere-reflected-color-methodology.md (Polyphemus is its worked example;
        α Cen A=G2V solar twin → white point≈Sun, renders nearly as-is) — a different mechanism from
        composition-color.md (reentry luminescence). Only the white has a Phase 3 hex basis; red-brown/blue/azure
        are owner art tie-breaks within the physical window. Condensation stratigraphy = Sudarsky 2000/2003 +
        Morley 2014 (pinned in docs/phase3/_bib/gas-giant-atmosphere.yaml). banding_morphology owner-override:
        T_int<110K → a calm Saturn-like zonal band is the physical default; Jovian turbulence adopted for visual
        drama (interesting-first, explicit not silent; same decision as appearance.clouds).
      evidence_ko: >
        흰 zone = 물/NH4SH 구름탑(#eef1f4, Sudarsky Class II; 225K는 skin T≈189K로 NH3 응결점 150K에 끝내 못
        닿음 — 목성과 달리 대류권계면이 거기까지 안 식음 — 암모니아 구름 없음, 가시 덱 = 물/NH4SH). 적갈
        chromophore = NH4SH 복사 생성물 황 + CH4/PH3 광분해 탄화수소 톨린의 청·UV 흡수(cold-giant 광화학,
        in-window); 금색은 목성 belt 적색 70%로 오너 조정. 슬레이트블루 belt = 얕은 구름틈에 드러난 깊은 H2/He
        컬럼의 Rayleigh 산란(haze가 채도 감쇄). 폭풍 눈 = 가장 깊은 틈 → 가장 긴 Rayleigh 컬럼 → 가장 진한
        azure(대적점의 역; 메탄 흡수 아닌 Rayleigh라 cobalt 과채도 우려 불필요). 색 방법론 =
        atmosphere-reflected-color-methodology.md(Polyphemus가 그 문서의 worked example; α Cen A=G2V
        태양쌍둥이 → white point≈태양, 거의 그대로 렌더) — composition-color.md(재진입 발광)와는 다른 메커니즘.
        흰색만 Phase 3 hex 근거, 적갈/청/azure는 물리 창 내 오너 art tie-break. 응결 층서 = Sudarsky 2000/2003 +
        Morley 2014(docs/phase3/_bib/gas-giant-atmosphere.yaml 핀). banding_morphology 오너-오버라이드:
        T_int<110K → 잔잔한 토성형 zonal band가 물리 기본값; 목성형 난류는 시각 드라마로 채택(interesting-first,
        silent 아닌 명시; appearance.clouds와 동일 결정).

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.haze
    status: gated                 # group 6 facet-walk (2026-06-22) — 금색→목성 적색 70% 오너 조정
    driver: [visual]
    narrative: >
      The red-brown stain on the bands comes from photochemical haze — sulfur compounds and hydrocarbon tholins
      cooked out of the upper atmosphere by starlight. Jupiter and Saturn both wear pigment haze of this kind
      despite being far colder, so on the warmer Polyphemus the mechanism works if anything better. Within that
      physical window the owner chose a thicker pigment coat than Saturn's gold: Jupiter's belt red at 70% strength.
    narrative_ko: >
      띠를 물들인 적갈색은 광화학 haze에서 온다 — 별빛이 상층 대기를 구워 만든 황 화합물과 탄화수소 톨린이다.
      훨씬 추운 목성과 토성도 이런 색소 haze를 두르고 있으니, 더 따뜻한 Polyphemus에서는 이 메커니즘이 오히려
      더 잘 작동한다. 그 물리 창 안에서 오너는 토성의 금색 대신 더 두꺼운 색소 코팅을 골랐다 — 목성 belt 적색의
      70% 세기다.
    fields:
      - { name: haze, value: "#b4784e", window: "#a8703f–#bc8055", op: set }
    gate:
      criterion: [visual-checklist]
      verdict: pass-in-window
      evidence: >
        Photochemical chromophore haze (NH4SH sulfur + CH4/PH3 photolysis hydrocarbon tholins) justified by
        cold-giant analogy — Jupiter (Teq~110K)·Saturn (~90K) show pigment haze from UV photolysis
        (NH3/CH4/PH3→hydrocarbons/tholins); Polyphemus (225K, H2/He+CH4, NH3 non-condensing, G2V UV) is warmer
        than both, so the mechanism holds even better. composition-color.md treats haze chromophores as a layer
        separate from the bulk (Titan tholins/sub-Neptune photochemistry); the red-brown is reflected light, so it
        does not come from the plasma yaml (that file is reentry plasma). Owner tie-break within the Jupiter-belt
        window #a8703f–#bc8055, default #b4784e.
      evidence_ko: >
        광화학 크로모포어 haze(NH4SH 황 + CH4/PH3 광분해 탄화수소 톨린)는 cold-giant 유추로 정당 —
        목성(Teq~110K)·토성(~90K)이 UV 광분해(NH3/CH4/PH3→탄화수소/톨린)로 색소 haze를 보이고,
        Polyphemus(225K, H2/He+CH4, NH3 비응결, G2V UV)는 둘보다 따뜻해 메커니즘이 오히려 잘 성립.
        composition-color.md은 haze 크로모포어를 bulk 밖 별도 층으로 다룸(Titan 톨린/sub-Neptune 광화학);
        적갈색은 반사광이라 plasma yaml서 안 나옴(그 파일은 재진입 플라스마). 목성-belt 창 #a8703f–#bc8055 내
        오너 tie-break, 기본 #b4784e.

