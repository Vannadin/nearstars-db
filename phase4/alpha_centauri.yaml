# α Centauri Phase 4 결정 보드 (schema v2) — A b(Polyphemus) 중심. (body × axis) 행별 상태. DB 불변, staging 기록
# 4a 창작 초안 = polyphemus-art-direction.md, 궤도 과정 = STABILITY_REPORT / ALPHA_CEN_AB_DYNAMICS_STUDY
schema_version: 2
system: alpha_centauri
status: staged
updated: 2026-06-20

decisions:
  # ── 궤도 (Kozai-안정 최적화 완료) ──────────────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: identity
    status: gated                 # 2026-06-22 facet-walk
    driver: [classification]
    narrative: >
      Polyphemus is the system's flagship: a temperate Saturn-class gas giant — hydrogen-helium air, 120 Earth masses,
      cool enough for water clouds — formally Alpha Centauri A b, keeping its Avatar name as the cultural name.
      It is a real direct-imaging candidate, and the game honors that status: with the optional discovery mod the
      planet must be found by telescope (only the easiest setting shows it from the start), while the star itself is
      always visible, and the discovery message quotes the real detection. Nothing here was invented — the only
      decision was adopting the planet's real observational status as its discovery difficulty.
    narrative_ko: >
      Polyphemus는 이 계의 간판이다. 수소-헬륨 대기에 지구 질량 120배, 물구름이 뜰 만큼 서늘한 온화한 토성급
      가스자이언트로, 공식 표기는 Alpha Centauri A b이고 아바타 이름은 문화명으로 남는다. 실제 직접촬영 후보로
      검출된 행성이라 게임도 그 지위를 그대로 따른다. 옵셔널 발견 모드에서는 망원경 관측으로 찾아야 하고(가장
      쉬운 난도에서만 처음부터 보임) 항성 자체는 항상 보이며, 발견 메시지에는 실제 검출이 인용된다. 지어낸 것은
      없다 — 유일한 결정은 실제 관측 지위를 발견 난도로 채택한 것뿐이다.
    fields:
      - { name: body_type, value: "temperate Saturn (H₂/He gas giant, 120 M⊕, Teq 225K, Class I/II water clouds)", op: set }
      - { name: designation, value: "Alpha Centauri A b", op: set }
      - { name: cultural_name, value: "Polyphemus", op: set }
      - { name: discoverability, value: "observation-discovered (candidate)", op: set }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        body_type=temperate Saturn (H₂/He, 120 M⊕, Teq 225K, water clouds Class I/II); designation/cultural per the
        designations block. discoverability=adopt the real measurement — JWST direct-imaging candidate → IGNORELEVELS
        T F F F (visible from the start only at Easy; Normal/Medium/Hard require observational discovery), real
        detection cited in ONDISCOVERY (arXiv:2508.03812, Sanghi & Beichman); the star α Cen A=naked_eye → T T T T
        always visible. Mapping canonical = researchbodies-cfg skill (references/db-mapping.md, revised 2026-06-22);
        emit input = the top-level discoverability list the skill reads (body/category/message/ref); patch emission
        (emit_researchbodies_cfg.py) batched at the end. [[project_nearstars_discoverability_researchbodies]]
      evidence_ko: >
        body_type=온화 토성급(H₂/He, 120 M⊕, Teq 225K, 물구름 Class I/II); designation/cultural은 designations
        블록. discoverability=실측 채택 — JWST 직접촬영 candidate → IGNORELEVELS T F F F(Easy만 시작 가시,
        Normal/Medium/Hard는 관측 발견), ONDISCOVERY에 실검출 인용(arXiv:2508.03812, Sanghi & Beichman); 항성
        α Cen A=naked_eye → T T T T 항상 가시. 매핑 canonical = researchbodies-cfg 스킬(references/db-mapping.md,
        2026-06-22 개정); emit 입력 = 스킬이 읽는 top-level discoverability 리스트(body/category/message/ref);
        패치 방출(emit_researchbodies_cfg.py)은 말미 일괄. [[project_nearstars_discoverability_researchbodies]]
    refs: ["2508.03812"]
    discoverability_cfg: {category: candidate, ignorelevels: "T F F F", ref: "2025arXiv250803812S", skill: "researchbodies-cfg/references/db-mapping.md"}

