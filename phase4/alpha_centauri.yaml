      - { name: Chaos,     order: "outermost named", a_km: 1500000, e: 0.10, inc_deg: 175.0, retrograde: true, mass_kg: 5.4e20, radius_km: 400, note: "Miranda형 균열. 역행(canon). 역행이라 0.7 R_Hill까지 안정." }
