        [2026-06-21 SUPERSEDED → final_2026_06_21 참조]
        [2026-06-20 채택] s=25° 분산 확정 (results/_moons_j2/spread25). 1000yr TRACE+J2: STABLE, |dE/E| 8.2e-9,
