  - body: Alpha Centauri A b
    axis: rings                    # 고리 최종 확정 (2026-06-21 시뮬 검증). appearance.rings 대체.
    status: gated
    driver: visual + observation
    target: >
      흐릿한 Chaos-fed E고리(토성 E링 아날로그) 채택. canon "고리 없음"을 존중하는
      거의 안 보이는 wisp 수준. Chaos가 공급, Cassandra가 안쪽 양치기. 두 환형으로 나뉘고
      (800k~1.41M·1.59M~2.5M km) 그 사이 간극(1.41M~1.59M)에서 Chaos(1.5M km)가 공전.
      고리면은 Chaos 궤도면(역행 inc 179°)에 맞춤. 밝기 +0.05 R_Jup(τ≈9e-5, 등가원반 ~23k km =
      Beichman 토성½ 단면의 13%)이라 행성은 1.05 R_Jup 유지하며 ~1.10 R_Jup 관측 플럭스 정합.
    gate:
      criterion: [stability, visual-checklist]
      verdict: documented-divergence
      divergence_note: >
        고리 간극은 의도된 아트 디렉션(art > 고증). 물리적으론 Chaos가 못 비우지만,
        Kopernicus 고리는 평면 디스크라 역행으로 기운 Chaos가 연속 고리에 묻히면 고리면이
        매 공전마다 위성을 관통해 보임 → 깨짐. 이를 피하려 Chaos 궤도를 비우는 간극을 둠.
      evidence: >
        물리적 간극은 불가 — 테스트입자 시뮬(Sim B, ring_clearing.py 2000yr, results/_ring_clearing)에서
        Chaos는 질량비 μ≈7.5e-7로 너무 작아 어떤 간극도 못 비움(Chaos 반장축의 입자까지 생존).
        그래서 갭은 동역학이 아닌 렌더링 목적의 의도적 부여. 간극을 좁히려 Chaos e를 0.10→0.02로
        낮춤(results/_chaos_e002, STABLE) — 반경 흔들림 ±150k→±30k km라 ~180k km 갭이면 깔끔히 비움.
        밝기는 면적∝R²로 직교 합산이라 "겉보기 +0.05 R_Jup"는 등가원반 ~0.32 R_Jup(~23k km)에 해당.
      grounding: >
        Beichman 2025 §5.3(arXiv:2508.03814) "Planet Ring System Models". 그들의 선호 모델은
        Roche 안쪽 광학적으로 두꺼운 고리(토성½ 단면, 등가원반 64,000 km)이고, 우리 흐릿한
        E고리는 그들이 제시한 광학적으로 얇은 먼지 대안(Kennedy 2011 불규칙위성 분쇄)에 해당.
        밝기는 주로 행성 본체에 싣고 고리는 +0.05 R_Jup 보조 기여로 둠.
      kopernicus_note: >
        Kopernicus 고리는 원형 동심 annulus만 가능(이심률 불가)이라 Ring 노드 2개로 방출
        (안쪽 800k~1.41M, 바깥 1.59M~2.5M km), 그 사이가 간극. 둘 다 Chaos 궤도면 공유. 확산
        E고리는 정상상태에서 축대칭이라(근점 세차 무작위화) 원형 annulus가 충실하고, 작아진
        Chaos e(0.02)는 간극 여유로 흡수됨.

