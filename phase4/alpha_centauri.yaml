      눈 — 가 돈다. 솔직히 내부열이 이 정도로 적은 행성이라면 얌전한 토성 쪽이 물리적으로 자연스럽다. 난류는
      시각적 드라마를 위한 오너의 의도적 선택이며, 슬쩍 끼워 넣지 않고 명시적 일탈로 기록한다. 덮임률은 Phase 3
      값을 그대로 쓰고, 색은 banding 행에 있으며, 형태는 emit 때 구름 텍스처로 그려진다.
    fields:
      - { name: clouds, value: "Jovian turbulent banding + 중위도 단일 anticyclone", op: set }
      - { name: cloud_coverage, value: 0.9, op: set, phase3_default: "0.9 (Phase 3)" }
