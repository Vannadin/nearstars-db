      K1V·more active. P_rot 41±3d·log R'HK −4.85·clean 8.84yr cycle (DeWarf2010, top-grade)·X-ray log Lx 27.04,
      min-to-peak contrast ~4.5 (half the solar amplitude). radiation_surface ≈1.4 (~2× A — consistent with the Lx ratio 1.8, but
      not flare-active). Measured, emitted as-is. [2026-07-12 review: P_rot 38→41d·R'HK −5.0→−4.85 (DB recommended),
      the factor~10 removed as it is A's property — only after the correction do the numbers agree with the "B more active" narrative.]
    narrative_ko: >
      K1V·더 활동적. P_rot 41±3d·log R'HK −4.85·clean 8.84yr cycle(DeWarf2010, 최고급)·X선 log Lx 27.04,
      min-to-peak contrast ~4.5(태양 진폭의 절반). radiation_surface ≈1.4 (A의 ~2배 — Lx 비 1.8 정합, 단
      플레어성 아님). 측정 emit 그대로. [2026-07-12 점검: P_rot 38→41d·R'HK −5.0→−4.85(DB recommended),
      factor~10은 A의 특성이라 제거 — 교정 후에야 "B 더 활동적" 서사와 수치가 정합.]
    fields:
