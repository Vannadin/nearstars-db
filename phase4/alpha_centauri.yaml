        컷 1.05를 fit_belts.py로 피팅(IoU 0.98, 태양계 감사와 동일 기준). pause = 감사된 노즈 의미론으로 인코딩, standoff
        2.6 정확 보존(pause_radius 2.99 / compression 1.15). 패킹 문자열이던 radiation_model은 emitter가 직접 읽는 개별
