      - { name: radiation_inner, value: 4.0, unit: "rad/h", op: set, phase3_default: "2.0 (구값: 약장 gap-기아 가정)" }
      - { name: radiation_pause, value: -0.01, unit: "rad/h", op: set }
      - { name: geomagnetic_pole_lat, value: 80, unit: deg, op: set, note: "= 90° − 자기축 기울기 ~10°; magnetic_dipole_tilt_deg 확정 시 따름" }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Physics unchanged from the superseded row (methodology Part D strong-field embedded 3b: field-crossover standoff
        2.6, CRAND source, GCR-screened + gap-starved 4 rad/h — Part B regime call, conf low). New here: geometry = fit_belts.py
        fit of the closed-line drift shell L 1.15–2.2 with the 1.05 loss-cone cut (IoU 0.98, same standard as the solar-system
        audit); pause encoded with the audited nose semantics, standoff 2.6 preserved exactly (pause_radius 2.99 / compression
        1.15); the packed radiation_model string became individual cfg fields the emitter reads directly.
      evidence_ko: >
