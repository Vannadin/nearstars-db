  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: atmosphere                 # composition/pressure/temperature/scale_height/breathability/greenhouse/escape (group 4, 2026-06-22)
    status: gated
    driver: [physics, classification]
    narrative: >
      The air is hydrogen and helium, modestly enriched in heavy elements the way a Saturn-class planet should be,
      and the visible deck is water and ammonium-hydrosulfide cloud: the planet is just warm enough that ammonia
      never freezes into cloud of its own, a fact that quietly shapes its whole look. The board anchors the deck at
      225 K and one bar; nobody breathes here and nothing escapes, and with no surface there is nothing for a
      greenhouse to lift. The deep interior is hot but never rendered. Full temperature and pressure profiles are
      generated at emit from a standard cool-giant model grid, and the eccentric orbit legally drives a
      great-season cycle. The 225 K anchor assumes a moderate albedo; brighter water clouds could make the planet
      colder without changing its class, so the conservative reading is adopted.
    narrative_ko: >
      대기는 수소와 헬륨이고, 토성급 행성답게 무거운 원소가 적당히 농축되어 있으며, 눈에 보이는 덱은 물과
      황화수소암모늄 구름이다. 암모니아가 제 구름으로 얼어붙지 못할 만큼만 따뜻한데, 이 사실이 행성의 인상
      전체를 조용히 결정한다. 보드는 구름덱을 225 K·1 bar에 앵커한다. 여기서 숨 쉴 수는 없고 대기가 달아나지도
      않으며, 표면이 없으니 온실이 끌어올릴 것도 없다. 깊은 내부는 뜨겁지만 렌더되지 않는다. 온도·기압의 전체
      프로파일은 emit 때 표준 cool-giant 모델 격자로 생성되고, 찌그러진 궤도가 대계절 순환을 합법적으로
      구동한다. 225 K 앵커는 무난한 알베도 가정값이라 실제 물구름이 더 밝으면 더 차가울 수 있지만 분류는
      그대로다. 보수적 읽기를 채택했다.
    fields:
      - { name: composition, value: "H₂/He bulk, [M/H]+0.5~1.0, clouds H₂O·NH₄SH (NH₃ 비응결), C/O 2.5×", op: set }
      - { name: pressure, value: 1, unit: bar, op: set, phase3_default: "1 bar 기준 앵커" }
      - { name: temperature, value: 225, unit: K, op: set, phase3_default: "구름덱 225K 앵커 (A_B=0.3 가정)" }
      - { name: scale_height, value: "프로파일서 도출", op: set }
      - { name: breathability, value: false, op: set }
      - { name: greenhouse, value: "none (표면 없어 surface-lift 없음)", op: set }
      - { name: escape, value: "negligible (거대질량)", op: set }
    gate:
      criterion: [classification, error-bar]
      verdict: pass-in-window
      evidence: >
        Composition: H₂/He bulk, [M/H]+0.5~1.0 = Thorngren2016 mass-metallicity expectation for the mass (not an
        assumption); condensing species H₂O·NH₄SH: at 225K the skin T≈189K never reaches the NH₃ condensation
        point 150K, so ammonia stays gaseous (consistent with appearance.banding); C/O 2.5× (§5.2).
        temperature/pressure are not scalars: at emit the cool-giant radiative-convective grid (Sonora Bobcat
        2107.07434 / Fortney2007 astro-ph/0612671, _bib/gas-giant-atmosphere.yaml) generates
        temperatureCurve+pressureCurve, anchored at cloud-deck 225K/1 bar; the great-season uses
        temperatureEccentricityBiasCurve (e=0.1>threshold, passes the divide-by-zero guard). Classification
        Class II water clouds (Sudarsky2003). Teq 225K assumes A_B=0.3: with Class II albedo 0.5–0.8 it could be
        colder (still Class II; adopted conservatively). breathability false (atmosphereContainsOxygen=false);
        escape negligible (giant mass); greenhouse: no surface-lift (cloud deck=radiative layer, deep interior hot
        along the adiabat but not rendered); scale_height derived from the profile.
      evidence_ko: >
        composition: H₂/He bulk, [M/H]+0.5~1.0 = Thorngren2016 질량-금속성의 해당 질량 예상값(가정 아님); 응결
        구름종 H₂O·NH₄SH: 225K서 skin T≈189K가 NH₃ 응결점 150K에 못 닿아 기체 잔류(appearance.banding 정합);
        C/O 2.5×(§5.2). temperature/pressure는 스칼라 아님: emit서 cool-giant 복사대류 격자(Sonora Bobcat
        2107.07434 / Fortney2007 astro-ph/0612671, _bib/gas-giant-atmosphere.yaml)로
        temperatureCurve+pressureCurve 생성, 앵커=구름덱 225K/1 bar; great-season은
        temperatureEccentricityBiasCurve(e=0.1>임계, divide-by-zero 가드 통과). 분류 Class II 물구름
        (Sudarsky2003). Teq 225K는 A_B=0.3 가정: Class II 알베도 0.5–0.8이면 더 차가울 여지(여전히 Class II,
        보수적 채택). breathability 불가(atmosphereContainsOxygen=false); escape 무시(거대질량); greenhouse:
        surface-lift 없음(구름덱=복사층, 깊은 곳은 단열선으로 뜨겁되 미렌더); scale_height는 프로파일서 도출.
    refs: ["2107.07434", "astro-ph/0612671"]

  # ── 외형 (banding/haze/aurora 4b 게이트 완료 2026-06-22) ─────────────────────
  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.banding
    status: gated                 # group 6 facet-walk 완료 (2026-06-22) — 3색 띠 + 가라앉은 파란 폭풍
    driver: [visual]
    narrative: >
      Polyphemus wears three colors: white zones of water cloud, red-brown bands where photochemical pigments stain
      the deck, and slate-blue belts where gaps in the cloud expose the deep atmosphere's blue scatter. Its
      signature storm inverts Jupiter's: not a raised red spot but a sunken eye, the deepest gap of all and
      therefore the most saturated azure on the planet, matching the canon's "darkest blue storm". The palette is
      physics-bounded but owner-tuned: the white comes from the cloud chemistry, the band red was pushed to 70% of
      Jupiter's belt color, and the blues are honest scattered light, not methane trickery. Because the host star
      is a solar twin, the colors render almost exactly as painted, with no reddening correction. One deliberate
      liberty is on record: the turbulent, festooned Jupiter-style banding is visual drama; a planet this calm
      would more naturally wear Saturn's quiet stripes (that call lives in the clouds row).
    narrative_ko: >
      Polyphemus는 세 가지 색을 입는다. 물구름의 흰 zone, 광화학 색소가 덱을 물들인 적갈색 띠, 그리고 구름
      틈새로 깊은 대기의 푸른 산란이 비치는 슬레이트블루 belt. 시그니처 폭풍은 목성을 뒤집는다. 솟은 붉은 점이
      아니라 가라앉은 눈이고, 가장 깊은 틈이기에 행성에서 가장 짙은 azure이며, 캐넌의 "제일 짙은 파란 폭풍"과
      맞아떨어진다. 팔레트는 물리로 테두리 치고 오너가 조율했다. 흰색은 구름 화학에서 오고, 띠의 적색은 목성
      belt색의 70%로 밀었으며, 파랑은 메탄 눈속임이 아니라 정직하게 산란된 빛이다. 모항성이 태양 쌍둥이라 칠한
      색이 거의 그대로 렌더되고 붉은 보정이 필요 없다. 의도적 일탈 하나를 기록한다. 소용돌이와 festoon이 이는
      목성풍 난류 밴딩은 시각적 드라마이고, 이만큼 조용한 행성이라면 토성의 얌전한 줄무늬가 더
      자연스럽다(그 결정은 clouds 행에 있다).
    fields:
      - { name: banding_base, value: "#eef1f4", op: set, phase3_default: "#eef1f4 (물/NH4SH zone, Sudarsky Class II)", verdict: pass-in-window }
      - { name: banding_chromophore, value: "#b4784e", window: "#a8703f–#bc8055", op: set, verdict: pass-in-window }
      - { name: banding_belt, value: "#647e96", window: "#5a6e82–#6e8499", op: set, verdict: pass-in-window }
      - { name: banding_storm_eye, value: "#214a72", window: "#1e4068–#2a5480", op: set, verdict: pass-in-window, note: "구름 렌더 tint — biome-map 'The Eye' 픽셀 #244C8A(gameplay.science_biomes)와 파이프라인이 달라 의도적으로 별개" }
      - name: banding_morphology
        value: "Jovian turbulent banding (band 경계 소용돌이·festoon 多)"
        op: set
        verdict: owner-override
    gate:
      criterion: [visual-checklist]
      verdict: pass-in-window        # 색·메커니즘 in-window; 난류 밴딩만 field-level documented-divergence
      evidence: >
        White zones = water/NH4SH cloud tops (#eef1f4, Sudarsky Class II; at 225K skin T≈189K never reaches the
        NH3 condensation point 150K (unlike Jupiter the tropopause never cools that far), so no ammonia cloud;
        visible deck = water/NH4SH). Red-brown chromophore = NH4SH radiolysis sulfur + CH4/PH3 photolysis
        hydrocarbon tholins absorbing blue·UV (cold-giant photochemistry, in-window); chromophore set to
        Jupiter belt red 70%. Slate-blue belts = Rayleigh scattering of the deep H2/He column exposed in shallow
        cloud gaps (haze attenuates saturation). Storm eye = the deepest gap → longest Rayleigh column → most
        saturated azure (inverse Great Red Spot; Rayleigh not methane absorption, so no cobalt over-saturation
        concern). Color methodology = atmosphere-reflected-color-methodology.md (Polyphemus is its worked example;
        α Cen A=G2V solar twin → white point≈Sun, renders nearly as-is), a different mechanism from
        composition-color.md (reentry luminescence). Only the white has a Phase 3 hex basis; red-brown/blue/azure
        are art tie-breaks within the physical window. Condensation stratigraphy = Sudarsky 2000/2003 +
        Morley 2014 (pinned in docs/phase3/_bib/gas-giant-atmosphere.yaml). banding_morphology is a field-level
        owner-override: T_int<110K → a calm Saturn-like zonal band is the physical default; Jovian turbulence
        adopted for visual drama (interesting-first, explicit not silent; same as appearance.clouds).
      evidence_ko: >
        흰 zone = 물/NH4SH 구름탑(#eef1f4, Sudarsky Class II; 225K는 skin T≈189K로 NH3 응결점 150K에 끝내 못
        닿음(목성과 달리 대류권계면이 거기까지 안 식음), 암모니아 구름 없음, 가시 덱 = 물/NH4SH). 적갈
        chromophore = NH4SH 복사 생성물 황 + CH4/PH3 광분해 탄화수소 톨린의 청·UV 흡수(cold-giant 광화학,
        in-window); 금색은 목성 belt 적색 70%로 오너 조정. 슬레이트블루 belt = 얕은 구름틈에 드러난 깊은 H2/He
        컬럼의 Rayleigh 산란(haze가 채도 감쇄). 폭풍 눈 = 가장 깊은 틈 → 가장 긴 Rayleigh 컬럼 → 가장 진한
        azure(대적점의 역; 메탄 흡수 아닌 Rayleigh라 cobalt 과채도 우려 불필요). 색 방법론 =
        atmosphere-reflected-color-methodology.md(Polyphemus가 그 문서의 worked example; α Cen A=G2V
        태양쌍둥이 → white point≈태양, 거의 그대로 렌더), composition-color.md(재진입 발광)와는 다른 메커니즘.
        흰색만 Phase 3 hex 근거, 적갈/청/azure는 물리 창 내 art tie-break. 응결 층서 = Sudarsky 2000/2003 +
        Morley 2014(docs/phase3/_bib/gas-giant-atmosphere.yaml 핀). banding_morphology는 field-level
        owner-override: T_int<110K → 잔잔한 토성형 zonal band가 물리 기본값; 목성형 난류는 시각 드라마로
        채택(interesting-first, silent 아닌 명시; appearance.clouds와 동일).
    refs: ["docs/reference/atmosphere-reflected-color-methodology.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.haze
    status: gated                 # group 6 facet-walk (2026-06-22) — 금색→목성 적색 70% 오너 조정
    driver: [visual]
    narrative: >
      The red-brown stain on the bands comes from photochemical haze: sulfur compounds and hydrocarbon tholins
      cooked out of the upper atmosphere by starlight. Jupiter and Saturn both wear pigment haze of this kind
      despite being far colder, so on the warmer Polyphemus the mechanism works if anything better. Within that
      physical window the deck carries a thicker pigment coat than Saturn's gold: Jupiter's belt red at 70% strength.
    narrative_ko: >
      띠를 물들인 적갈색은 광화학 haze에서 온다. 별빛이 상층 대기를 구워 만든 황 화합물과 탄화수소 톨린이다.
      훨씬 추운 목성과 토성도 이런 색소 haze를 두르고 있으니, 더 따뜻한 Polyphemus에서는 이 메커니즘이 오히려
      더 잘 작동한다. 그 물리 창 안에서 덱은 토성의 금색 대신 더 두꺼운 색소 코팅을 두른다. 목성 belt 적색의
      70% 세기다.
    fields:
      - { name: haze, value: "#b4784e", window: "#a8703f–#bc8055", op: set }
    gate:
      criterion: [visual-checklist]
      verdict: pass-in-window
      evidence: >
        Photochemical chromophore haze (NH4SH sulfur + CH4/PH3 photolysis hydrocarbon tholins) justified by
        cold-giant analogy: Jupiter (Teq~110K)·Saturn (~90K) show pigment haze from UV photolysis
        (NH3/CH4/PH3→hydrocarbons/tholins); Polyphemus (225K, H2/He+CH4, NH3 non-condensing, G2V UV) is warmer
        than both, so the mechanism holds even better. composition-color.md treats haze chromophores as a layer
        separate from the bulk (Titan tholins/sub-Neptune photochemistry); the red-brown is reflected light, so it
        does not come from the plasma yaml (that file is reentry plasma). Art tie-break within the Jupiter-belt
        window #a8703f–#bc8055, default #b4784e.
      evidence_ko: >
        광화학 크로모포어 haze(NH4SH 황 + CH4/PH3 광분해 탄화수소 톨린)는 cold-giant 유추로 정당하다.
        목성(Teq~110K)·토성(~90K)이 UV 광분해(NH3/CH4/PH3→탄화수소/톨린)로 색소 haze를 보이고,
        Polyphemus(225K, H2/He+CH4, NH3 비응결, G2V UV)는 둘보다 따뜻해 메커니즘이 오히려 잘 성립.
        composition-color.md은 haze 크로모포어를 bulk 밖 별도 층으로 다룸(Titan 톨린/sub-Neptune 광화학);
        적갈색은 반사광이라 plasma yaml서 안 나옴(그 파일은 재진입 플라스마). 목성-belt 창 #a8703f–#bc8055 내
        art tie-break, 기본 #b4784e.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.clouds
    status: gated                 # group 6 facet-walk (2026-06-22) — 형태학 명시 결정
    driver: [visual]
    narrative: >
      The cloud deck churns like Jupiter's: vortices and festoons along the band boundaries, plus one big
      mid-latitude storm, the sunken blue eye. A planet with this little internal heat would more naturally look
      like placid Saturn, so the turbulence is a deliberate choice for visual drama, recorded as an explicit
      divergence. Coverage stays at the Phase 3 value, the colors live in the banding row, and the shapes are
      painted onto cloud textures at emit.
    narrative_ko: >
      구름덱은 목성처럼 끓는다. band 경계마다 소용돌이와 festoon이 일고, 중위도에 큰 폭풍 하나(가라앉은 파란
      눈)가 돈다. 내부열이 이 정도로 적은 행성이라면 얌전한 토성 쪽이 더 자연스러우니, 난류는 시각적 드라마를
      위한 의도적 선택이며 명시적 일탈로 기록한다. 덮임률은 Phase 3 값을 그대로 쓰고, 색은 banding 행에 있으며,
      형태는 emit 때 구름 텍스처로 그려진다.
    fields:
      - { name: clouds, value: "Jovian turbulent banding + 중위도 단일 anticyclone", op: set }
      - { name: cloud_coverage, value: 0.9, op: set, phase3_default: "0.9 (Phase 3)" }
    gate:
      criterion: [visual-checklist]
      verdict: owner-override
      evidence: >
        Morphology = Jovian turbulent banding (many band-boundary vortices·festoons) + a single large mid-latitude
        anticyclone. Cloud coverage = Phase 3 0.9. The large storm = a sunken Rayleigh blue eye (Avatar canon),
        colored per the banding row's storm-eye value. Realized at emit via cloud textures (EVE)/PQS; this row
        records the art intent, color values integrated in the banding row. Override basis: T_int<110K → a
        calm Saturn-like zonal band is the physical default; turbulence adopted for visual drama
        (interesting-first, explicit).
      evidence_ko: >
        형태학 = 목성형 난류 밴딩(band 경계 소용돌이·festoon 多) + 중위도 단일 대형 anticyclone. 구름 coverage =
        Phase 3 0.9. 대형 폭풍 = 가라앉은 Rayleigh 파란 눈(Avatar canon), 색은 banding 행의 폭풍 눈 값. emit 시
        구름 텍스처(EVE)/PQS로 구현; 본 행은 art 의도 기록, 색 값은 banding 행에 통합. 오버라이드 근거:
        T_int<110K → 잔잔한 토성형 zonal band가 물리 기본값; 난류는 시각 드라마로 채택(interesting-first, 명시).

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: appearance.aurora
    status: gated                 # documented-divergence — Phase 3는 aurora 없음, Phase 4가 가시 연출. 색만 조성-고정
    driver: [visual]
    depends_on: "magnetosphere(자기장 결정): 오로라 가둠/세기는 자기권에 의존, 그 행 먼저 확정 필요"
    narrative: >
      The poles glow rose-magenta, a deliberate color rhyme against Pandora's cyan bioluminescence: planet pink,
      moon cyan. The tint itself is not a choice: a hydrogen-helium sky can only glow in hydrogen's reds and
      violets, and with no atomic oxygen there is no Earth-style green to be had. The honest divergence is
      visibility: the quiet star drives too little plasma for a bright aurora, so Phase 3 said "none"; Phase 4
      stages a faint one anyway so the contrast reads on screen.
    narrative_ko: >
      극지방이 rose-magenta로 빛난다. Pandora의 청록 생물발광과 의도적으로 운을 맞춘 색이다. 행성은 분홍, 달은
      청록. 색조 자체는 선택이 아니다. 수소-헬륨 하늘은 수소의 적색과 보라로만 빛날 수 있고, 원자 산소가 없어
      지구식 초록은 나올 수 없다. 정직한 일탈은 가시성이다. 조용한 별은 밝은 오로라를 피울 플라스마를 대주지
      못해 Phase 3는 "없음"이라 했지만, Phase 4는 화면에서 대비가 읽히도록 희미한 오로라를 연출한다.
    fields:
      - { name: aurora, value: "극 rose-magenta (H Balmer-α 적색 + H2 Fulcher/Balmer-β/γ 보라)", op: set, phase3_default: "aurora_present=false (medium)" }
    gate:
      criterion: [composition-lock]
      verdict: owner-override
      evidence: >
        The H2/He atmosphere fixes the color (not a choice): H Balmer-α red + H2 Fulcher / Balmer-β/γ violet. No
        atomic oxygen, so no Earth-style green. Most of the output is UV (visible aurora faint); the divergence
        is staging it visible. sRGB extracted at emit from element_plasma_colors.yaml /
        molecular_plasma_colors.yaml. Override basis: Phase 3 aurora_present=false (medium), the quiet G2V wind
        (log R'HK −4.95) a weak plasma driver at 1.6 AU; departure from the AI-synthesized default, color
        composition-fixed so in-window.
      evidence_ko: >
        H2/He 대기가 색을 고정(선택 아님): H Balmer-α 적색 + H2 Fulcher / Balmer-β/γ 보라. 원자 산소 없어
        지구식 녹색 불가. 대부분 출력은 UV(가시 오로라 희미); 발산은 "보이게 연출"한 점. sRGB는 emit 시
        element_plasma_colors.yaml / molecular_plasma_colors.yaml에서 추출. 오버라이드 근거: Phase 3
        aurora_present=false(medium): 조용한 G2V 항성풍(log R'HK −4.95)이 1.6 AU서 약한 플라스마 구동원;
        AI-합성 기본값에서의 이탈이며 색은 조성-고정이라 in-window.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: magnetism.magnetic_field
    status: gated                 # 4b 완료 (2026-06-22) — dynamo 스케일링 근거화
    driver: [physics]
    narrative: >
      The dynamo gives Polyphemus a field of about 170 microtesla at the equator: eight times Saturn's, forty
      percent of Jupiter's, sitting between the two but leaning jovian. The number comes from the project's
      standard dynamo scaling recipe fed with the planet's mass and age, and the same formula sanity-checks
      against Jupiter. The honest caveat: this mass sits at the bottom edge of the giant regime, and if helium
      stratification has set in the way it has at Saturn, the real field could be several times weaker. That
      quieter alternative is set aside for the strong reading; it is this field that carries the aurora and the
      radiation belts.
    narrative_ko: >
      다이나모가 적도 기준 약 170마이크로테슬라의 자기장을 만든다. 토성의 8배, 목성의 40%, 둘 사이에서 목성
      쪽으로 기운 값이다. 숫자는 프로젝트 표준 다이나모 스케일링 레시피에 행성의 질량과 나이를 넣어 얻었고,
      같은 식이 목성으로 검산된다. 정직한 단서 하나. 이 질량은 거인 영역의 바닥 언저리라, 토성처럼 헬륨
      성층화가 진행됐다면 실제 자기장은 몇 배 약할 수 있다. 그 조용한 대안은 접고 강한 읽기를 택했으며,
      오로라와 방사선대를 떠받치는 것이 바로 이 자기장이다.
    fields:
      - { name: magnetic_field, value: 170, unit: uT, op: set, phase3_default: "170 µT (Phase 3도 근거 교정됨)" }
      - { name: magnetic_field_polar, value: 345, unit: uT, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        Reiners & Christensen 2010 (arXiv:1007.1514) depth-corrected dipole interpolation gives 0.378 M_Jup·5.3 Gyr
        → B_eq 172 µT (B_pol ≈ 345 µT). Passes the Jupiter same-equation sanity check. Phase 3 itself was corrected
        from an ungrounded ~500µT to 170µT → agreement. canonical = docs/reference/planetary-dynamo-scaling.md.
        The He-stratified Saturn-class weak-field alternative (~20–50µT) was considered and set aside. caveat:
        0.378 M_Jup is the giant-regime lower edge: with He stratification the actual value could be lower
        (Saturn ~21µT). conf low–med.
      evidence_ko: >
        Reiners & Christensen 2010(arXiv:1007.1514) depth-corrected dipole 보간으로 0.378 M_Jup·5.3 Gyr → B_eq
        172 µT(B_pol ≈ 345 µT). 목성 동일식 sanity check 통과. Phase 3 자체도 미근거 ~500µT에서 170µT로 교정
        완료 → 일치. canonical = docs/reference/planetary-dynamo-scaling.md. He 성층화 토성급 약장 대안
        (~20–50µT)은 검토 후 접었다. caveat: 0.378 M_Jup은 자이언트 영역 하한이라 He 성층화면 실제 더 낮을 수도
        (토성 ~21µT). conf low–med.
    refs: ["docs/reference/planetary-dynamo-scaling.md"]

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: magnetism.magnetosphere
    status: gated                 # 4b 완료 (2026-06-22)
    driver: [physics]
    narrative: >
      The magnetic bubble's nose stands about 23.5 planetary radii out, far enough that all five moons live
      inside it. That sorts the family: Dante, Hades, and Pandora sit in radiation-belt territory, Cassandra in
      the intermediate zone, and Chaos rides just inside the boundary, where a gust of stellar wind can briefly
      leave it exposed. The size barely budges however the inputs wiggle, because the standoff distance responds
      only to the sixth root of the field.
    narrative_ko: >
      자기 거품의 코는 행성 반지름의 약 23.5배 밖에 선다. 다섯 위성이 전부 그 안에 살 만큼 멀다. 이 크기가
      식구들을 줄 세운다. Dante·Hades·Pandora는 방사선대 영역에, Cassandra는 중간 지대에 있고, Chaos는 경계
      바로 안쪽을 날아 항성풍이 몰아치면 잠시 밖에 노출될 수 있다. standoff 거리는 자기장의 6제곱근에만
      반응해서, 입력이 어지간히 흔들려도 크기는 꿈쩍하지 않는다.
    fields:
      - { name: magnetosphere, value: 23.5, unit: R_p, op: set, phase3_default: "R_mp ≈ 23.5 R_p (5위성 전부 자기권 내)" }
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        Chapman-Ferraro balance (170µT dipole vs α Cen A stellar-wind ram 0.38 nPa @1.6 AU, reflecting the
        Ṁ_A≈0.5 Ṁ⊙ share). The ^1/6 dependence makes it
        robust to inputs (even at 500µT, R_mp 33 R_p). Dante(1.54)·Hades(2.07)·Pandora(3.53 R_p)=radiation belts,
        Cassandra(8.4)=intermediate, Chaos(21)=just inside the magnetopause (may exit on the dayside during wind
        variations).
      evidence_ko: >
        Chapman-Ferraro 균형(170µT dipole vs α Cen A 항성풍 ram 0.38 nPa @1.6 AU, Ṁ_A≈0.5 Ṁ⊙ 몫 반영).
        ^1/6 의존이라 입력에 강건(500µT라도 R_mp
        33 R_p). Dante(1.54)·Hades(2.07)·Pandora(3.53 R_p)=방사선대, Cassandra(8.4)=중간, Chaos(21)=자기권계면
        바로 안쪽(풍 변동 시 주간측 이탈 가능).

