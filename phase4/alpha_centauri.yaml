      limb_darkening=standard (stronger toward the red). spots_faculae=moderate — coverage ~1–3% (~2× A's activity·clean 8.84yr
      cycle·brighter X-ray than A), several mid-latitude spot groups (umbra+penumbra) + prominent faculae. corona=brighter than A (log Lx
      27.04 vs 26.78). flares=occasional (more active than A, but not flare-active). Spot count=owner-delegated decision (for texture), moderate ~1–3%,
