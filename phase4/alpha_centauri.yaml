        위성 시뮬에 주입(자체구현 scripts/j2.py, 해석 세차율과 <0.1% 검증). 결과가 점질량 권고를 뒤집음:
        • 135k 갭 = J2에도 STABLE (TRACE 1000yr, 5위성 bound·calm, Hades e 0.02–0.05).
        • 3:2-락(131k/M0=180°) = J2로 UNSTABLE — Hades t≈510yr 이탈. J2의 근점/승교점 세차가 가장자리(~130° 폭)
