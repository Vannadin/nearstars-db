    target: "흰 zone(물/NH4SH 구름) + 적갈 chromophore 띠(목성 적색 70%) + 슬레이트블루 belt(구름틈 Rayleigh)의 3색 띠 + 중위도 대형 폭풍 1개(가장 깊은 구름틈=가장 진한 azure)"
    driver: visual
    gate:
      criterion: [visual-checklist]
      verdict: partial            # 색·메커니즘 in-window; 목성형 난류 밴딩만 art-forward documented-divergence
      evidence: >
        흰 zone = 물/NH4SH 구름탑(#eef1f4, Sudarsky Class II). 225K는 skin T≈189K로 NH3 응결점 150K에
        끝내 못 닿아(목성과 달리 대류권계면이 150K까지 안 식음) 암모니아는 기체로 남고 구름 안 됨 → 가시 덱은
        물/NH4SH. 적갈 chromophore 띠 = NH4SH 복사 생성물(황 화합물) + CH4/PH3 광분해 탄화수소 톨린이
        청·UV 흡수 → 적갈(cold-giant 광화학 in-window); 금색→목성 belt 적색 70%로 오너 조정. 슬레이트블루
        belt = 얕은 구름틈에 드러난 깊은 H2/He 대기의 Rayleigh 산란(haze가 채도 감쇄). 중위도 대형 폭풍 =
        가장 깊은 구름틈이라 Rayleigh 컬럼이 가장 길어 가장 진한 azure — 목성 대적점의 역(솟은 적색 점이 아닌
        가라앉은 파란 눈), Avatar canon "제일 짙은 파란 폭풍"과 일치. 파랑은 메탄 흡수 아닌 Rayleigh라 cobalt
        과채도 우려 불필요. 목성형 난류 밴딩 = art-forward documented-divergence(아래 appearance.clouds 행).
      cfg_colors: "zone #eef1f4(물/NH4SH, Phase3) · chromophore 띠 #b4784e(목성적색 70%, 창 #a8703f–#bc8055) · belt #647e96(슬레이트블루 Rayleigh, 창 #5a6e82–#6e8499) · 폭풍 눈 #214a72(가장 깊은 Rayleigh, 창 #1e4068–#2a5480)"
      emit_note: >
        반사광 구름 띠 색은 composition-color.md(재진입 플라스마)서 안 나옴 — 흰색만 Phase3 hex 근거,
