      - { name: spin_axis_orientation, value: "orbit normal", op: set }
    gate:
      criterion: [canon-consistency, physics]
      verdict: documented-divergence
      divergence_note: >
        canon 4값(0.72 M⊕·0.8g·5724km·1.2 ρ⊕)이 상호 불일치 → 반경+중력(B)을 채택하고 질량·밀도는 도출.
        canon 1.2 ρ⊕(=6617 kg/m³)는 super-Mercury급 철 함량이 필요해 거주가능체에 비현실 + canon 자기 질량+반경
        (→0.99 ρ⊕)과도 모순이라 비채택. obliquity도 canon 29°→~10° 발산(궤도경사 10° 유지, 안정성 우선; 단
        조석고정이라 "자전축 29°"는 본래 궤도면 황도경사를 뜻함 — 자유 obliquity 아님). 부유산(Hallelujah)은
        art/lore(언옵타늄 초전도)라 물리 bulk 속성 아님.
      evidence: >
        ✅ mass B(3.85e24) 재시뮬 STABLE 검증 완료 (results/_pandora_massB, 1000yr TRACE+J2(0.023), |ΔE/E|
        7.6e-9, 5위성 bound·calm·이젝션0, Pandora e≤0.0075 해양안전). 예상대로 가벼운 교란체라 안정 유지.

