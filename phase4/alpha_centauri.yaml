    axis: appearance.rings
    status: superseded            # → rings 결정으로 대체(2026-06-21). 얇은 Roche-zone 밀집고리 개념 폐기, 흐릿한 연속 E고리 채택. 이 행은 provenance용, live gate 없음(미방출).
    driver: [visual, observation]
    narrative: >
      [SUPERSEDED — rings 행이 대체함] 원안: 디스크를 가로지르는 얇고 어두운 framing line(토성급 아님).
      Avatar canon = 고리 없음; Beichman §5.3 ring-model 반경 fit 채택(관측 우선)이 원 divergence 근거였음.
      미해결이던 "고리 위치 = 로슈 한계 분석"은 별개 작업으로 남아 있었음. 2026-06-21에 얇은 Roche-zone 밀집고리
      개념을 폐기하고 흐릿한 연속 E고리(rings 행)로 대체함 — 이 행은 provenance로만 보존하며 live gate 없이 미방출.

  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: rings                    # 고리 최종 확정 (2026-06-21 시뮬 검증). appearance.rings 대체.
    status: gated
    driver: [visual, observation]
    narrative: >
      흐릿한 Chaos-fed E고리(토성 E링 아날로그) 채택. canon "고리 없음"을 존중하는 거의 안 보이는 wisp 수준.
      Chaos가 공급, Cassandra가 안쪽 양치기. 두 환형으로 나뉘고(800k~1.41M·1.59M~2.5M km) 그 사이 간극
      (1.41M~1.59M)에서 Chaos(1.5M km)가 공전. 고리면은 Chaos 궤도면(역행 inc 179°)에 맞춤. 밝기 +0.05 R_Jup
      (τ≈9e-5, 등가원반 ~23k km = Beichman 토성½ 단면의 13%)이라 행성은 1.0 R_Jup(bulk.radius 게이트값) 유지하며
      ~1.05 R_Jup 관측 플럭스 정합. Kopernicus 고리는 원형 동심 annulus만 가능(이심률 불가)이라 Ring 노드 2개로 방출(안쪽
      800k~1.41M, 바깥 1.59M~2.5M km), 그 사이가 간극. 둘 다 Chaos 궤도면 공유. 확산 E고리는 정상상태에서
      축대칭이라(근점 세차 무작위화) 원형 annulus가 충실하고, 작아진 Chaos e(0.02)는 간극 여유로 흡수됨.
      group 9 facet-walk(2026-06-22): 오너 선택(A) = 푸른 흰빛 얼음-먼지 고리. 고운 물-얼음 알갱이가 파장에 따라
      산란(작은 입자 → 청색 우세, 토성 E-ring/엔셀라두스 선례). → Chaos를 얼음체로 확정(group 10 satellites가 상속;
      Phoebe형 어두운 탄소질 대안 기각). 색 ≈ 옅은 ice-blue #cdd9e4(거의 안 보이는 wisp라 opacity τ≈9e-5로 시각
      임팩트 작음). 어두운/적갈 탄소질(C) 대안은 미채택. feed(2026-06-23, art-first): 공급원 Chaos가 물
      cryovolcanic 플룸으로 고리를 먹임(엔셀라두스→토성 E-고리 동형). 이는 'E-고리' 명명을 현실과 정합시킴. 물리
      caveat=Chaos 20 R_p서 조석열 부족(Chaos.surface divergence_note); 그래도 art 채택. sputtering/승화는 보조 공급.
    fields:
      - { name: ring_structure, value: "2-annulus: 안쪽 800000–1410000 km / 바깥 1590000–2500000 km", op: set }
      - { name: ring_inner_annulus_km, value: "800000–1410000", op: set }
      - { name: ring_outer_annulus_km, value: "1590000–2500000", op: set }
      - { name: ring_gap_km, value: "1410000–1590000 (Chaos at 1500000 km)", op: set }
      - { name: ring_opacity, value: 9.0e-5, op: set }
      - { name: ring_color, value: "#cdd9e4", op: set }
      - { name: ring_plane, value: "Chaos orbit plane (retrograde inc 179°)", op: set }
      - { name: ring_composition, value: "water-ice dust (blue-white)", op: set }
      - { name: ring_brightness_R_jup, value: 0.05, op: set }
    gate:
      criterion: [stability, visual-checklist]
      verdict: documented-divergence
      divergence_note: >
        고리 간극은 의도된 아트 디렉션(art > 고증). 물리적으론 Chaos가 못 비우지만, Kopernicus 고리는 평면
        디스크라 역행으로 기운 Chaos가 연속 고리에 묻히면 고리면이 매 공전마다 위성을 관통해 보임 → 깨짐. 이를
        피하려 Chaos 궤도를 비우는 간극을 둠.
      evidence: >
        물리적 간극은 불가 — 테스트입자 시뮬(Sim B, ring_clearing.py 2000yr, results/_ring_clearing)에서 Chaos는
        질량비 μ≈7.5e-7로 너무 작아 어떤 간극도 못 비움(Chaos 반장축의 입자까지 생존). 그래서 갭은 동역학이 아닌
        렌더링 목적의 의도적 부여. 간극을 좁히려 Chaos e를 0.10→0.02로 낮춤(results/_chaos_e002, STABLE) —
        반경 흔들림 ±150k→±30k km라 ~180k km 갭이면 깔끔히 비움. 밝기는 면적∝R²로 직교 합산이라 "겉보기
        +0.05 R_Jup"는 등가원반 ~0.32 R_Jup(~23k km)에 해당. Beichman 2025 §5.3(arXiv:2508.03814) "Planet Ring
        System Models" — 그들의 선호 모델은 Roche 안쪽 광학적으로 두꺼운 고리(토성½ 단면, 등가원반 64,000 km)이고,
        우리 흐릿한 E고리는 그들이 제시한 광학적으로 얇은 먼지 대안(Kennedy 2011 불규칙위성 분쇄)에 해당.
    refs: ["2508.03814"]

