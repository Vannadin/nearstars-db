      태양형(표준). spots_faculae=희소 — 피복률 ~0.1–0.3%(태양 수준 이하, P_rot 22d·조용한 활동도), 작은 흑점 소수 +
      흑점 주변 약한 faculae. corona=존재(X선 log Lx ~26.78, 약 — B보다 어두움). flares=드묾(플레어성 아님). 전부
      관측 측정서 도출(Teff·P_rot·log R'HK −4.95·X선). 흑점량=오너 위임 결정(텍스처용) 희소 ~0.1–0.3%, B보다 깨끗.
      색/granulation/limb=측정 passthrough. [2026-07-12 점검: Teff 5790→5847K(DB), corona X선 수치 스왑 교정 —
      색 hex는 지각 이하 차이라 유지.]
    fields:
      - { name: color, value: "#fff4ea", op: set, phase3_default: "G2V, Teff 5847K (황백, 거의 태양)" }
      - { name: granulation, value: "solar-type 대류 granule", op: set }
      - { name: limb_darkening, value: "solar-type (표준)", op: set }
      - { name: spots_faculae, value: "sparse ~0.1–0.3% 피복률", op: set }
      - { name: corona, value: "present (weak, X-ray log Lx ~26.78)", op: set }
      - { name: flares, value: "rare (플레어성 아님)", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        All derived from observed measurements (Teff·P_rot·log R'HK −4.95·X-ray). Spot count=owner-delegated decision (for texture), sparse ~0.1–0.3%,
        cleaner than B. color/granulation/limb=measured passthrough.
      evidence_ko: >
        전부 관측 측정서 도출(Teff·P_rot·log R'HK −4.95·X선). 흑점량=오너 위임 결정(텍스처용) 희소 ~0.1–0.3%,
        B보다 깨끗. 색/granulation/limb=측정 passthrough.
    refs: ["2010ApJ...722..343D", "2016A&A...596A..52R", "2014AJ....147...59A", "docs/reference/stellar-photospheric-color-methodology.md"]

  - body: Alpha Centauri B
