  - body: Alpha Centauri A b
    kopernicus_name: Polyphemus
    axis: bulk.geopotential_j2     # 편평도 (Principia j2 + reference_radius) — emit 필드 + 위성 동역학 입력
    status: gated                  # 2026-06-20 확정 — J2 위성 시뮬 완료(자체구현 j2.py로 주입·검증)
    driver: [physical]             # 자전+밀도에서 도출(아트디렉션 아님)
    narrative: >
      J2 ≈ 0.023 (1차 RD, 절단보정 ~0.025–0.026); 범위 0.017–0.033; J4 ≈ -0.001; reference_radius = 1.0 R_Jup.
      논문 근거(derived-value 규칙). Radau–Darwin 관계식 — Helled, Anderson, Schubert, Stevenson 2011 eq.3
      (arXiv:1109.1627), NMoI=(2/3)[1-(2/5)√(5m/(m+3J2)-1)], m=ω²R̄³/GM(평균반경). 구조 가정 NMoI=C/MR²=0.23
      (범위 0.21–0.26): 거대행성 실측(목성 0.265, 토성 ~0.21, 빙왕성 ~0.22–0.24; Helled+2011/2020
      arXiv:2007.10783, Fortney+2018 arXiv:1609.06324)에서 0.4 M_Jup·저밀도(0.47)는 토성보다 덜 응축→NMoI 약간
      높음. 폴리페무스 m≈0.19(평균반경, f≈0.13 자기일관 반복). → J2≈0.023(central). calibration 검증: 같은 식이
      목성 J2 -0.0%, 토성 -10.3% 재현(알려진 1차 오차). m≈0.19가 토성(0.14)보다 커 1차 절단이 과소예측 → 실제
      ~10–20%↑(보정 ~0.025–0.026). 불확실성 폭은 NMoI 가정이 지배. 가스자이언트=축대칭→zonal only(j2[+j4]).
      입력 calibration J2: 목성=Iess2018, 토성=Durante2017.
      선행조건 해소(2026-06-20): J2=0.023을 위성 시뮬에 주입 완료 — reboundx가 rebound 5.x 비호환이라 자체
      구현(scripts/j2.py, rebound additional_forces, M&D 벡터형, 해석 세차율과 <0.1% 검증). 이 J2가 위성 궤도
      결정을 실제로 뒤집음(satellites axis 참조): off-resonance 135k 갭은 J2에도 안정, 3:2-락은 J2 detuning으로
      Hades 이탈. emit 값 불변(J2≈0.023, reference_radius 1.0 R_Jup). 2026-06-25 figure 패스가 독립적으로
      재확인(body-figure-methodology.md) — 시각 oblate 메시 a:b:c ≈ 1.149:1.149:1.0 (VertexHeightOblateAdvanced,
      base radius=극반경). Principia가 천체간 연산에도 J2 적용 → 위성 동역학의 입력이었고, 그 입력이 결정적이었음.
    fields:
      - { name: geopotential_j2, value: 0.023, reference_radius_km: 71492, op: set, phase3_default: "J2 ≈ 0.023 (범위 0.017–0.033; 절단보정 ~0.025–0.026)" }
      - { name: j4, value: -0.001, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        Radau–Darwin(Helled+2011 eq.3, arXiv:1109.1627) NMoI=0.23 가정 → J2≈0.023(central), 범위 0.017–0.033.
        calibration: 같은 식이 목성 -0.0%·토성 -10.3% 재현(알려진 1차 오차). J2=0.023을 위성 시뮬에 주입 검증
        완료(scripts/j2.py, 해석 세차율과 <0.1%) — 135k 갭 안정·3:2-락 이탈로 위성 결정을 뒤집음. figure 패스가
        독립 재확인(body-figure-methodology.md).
    refs: ["1109.1627", "2007.10783", "1609.06324"]

