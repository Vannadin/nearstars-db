        • 결정: 135k 갭 유지, 3:2-락 채택 철회.
        충실도(Principia 프록시 = leapfrog 고정 10분, 절대좌표): 갭은 leapfrog서도 STABLE (|dE/E|1.5e-10) — 정밀
        (TRACE)·Principia급 일치 → 채택 레이아웃은 게임서도 견고. 락은 적분기 민감(leapfrog는 유지, TRACE는 이탈 —
