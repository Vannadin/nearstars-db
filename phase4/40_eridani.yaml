  - body: "40 Eridani A b"
    axis: atmosphere
    status: gated
    driver: ["PHM blend (book physics + film visual), greenhouse completed"]
    narrative: >
      기압 **~28 atm**(Weir 책 canon 유지; Howe 블로그의 ~9.67 atm 재해석[선내압 ⅓ × 29]은 대안 reading으로 병기하나 Weir 설정 자료가 28–29 atm 절대치라
      미채택). 조성=**깊은 환원성 NH₃ + CH₄ (+H₂O)**. NH₃는 Weir(불투명·블라인드 전제), CH₄는 해왕성식 적색흡수로 **파랑을 물리적으로 산출**(차가운 환원성 대기에 자연 공존). ⚠
      NH₃ 지배는 광화학적 fragile(UV→N₂+H₂, 보충원 필요) — 책 given. **구름 구조(영화 외형의 물리)**: 낮은 고도 흰 물구름 + 그 위 두꺼운 맑은 Rayleigh 기둥 → **짙은
      파랑에 흰 구름이 점점이** (해왕성+지구식; 구름 *고도*가 색을 가름 — 금성식 고층운이면 허옇고, 저층운+맑은 기둥이면 파랑). 물구름=물 순환 → 표면 액체물(내해, G5). **온도(Weir 계산
      완성)**: 플럭스 ~8–9× 지구, 알베도 ~0.3(저층운+맑은 기둥) → T_eq ~157°C, + 적당한 온실(~+55–65 K) → 표면 **~210–220°C**. 28기압 물 끓는점 227°C
      *아래* → **액체물 유지**(분포=G5: 육지우세+내해). Weir 210°C는 무대기 평형값이었으나(온실 누락), 알베도 냉각 + 적당한 온실이 그 근처로 복귀 → 책 숫자 구제. ⚠ 가정: 온실
      bounded(NH₃ runaway 아님) → 끓는점 직하 "압력솥 대양". **블라인드 정합**: 28기압 기체+구름이 빛 강감쇠(Howe: 29 atm NH₃ ≈ 바닷물 150m) → 우주에선 파랑,
