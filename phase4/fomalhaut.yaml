        오너 G2 확정 2026-06-26 — 측정값 전부 passthrough(Mamajek 2012). 편평 ~2.2%: 임계 아래지만 시각 oblate emit +
        약한 중력감광(극~300K↑) 채택(오너 art, 빠른 A형 상징). alt=Davis2005(8819K/1.744R☉) 병기.
