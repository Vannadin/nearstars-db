  - body: Fomalhaut
    axis: bulk                        # §3.2 템플릿 앵커 — spin_axis·J2(+reference_radius)는 전용 행 (union rule)
    body_class: star
    status: gated
    driver: [observation, art-direction]
    narrative: >
      M **1.92 M☉** · R **1.842 R☉** · Teff **8590 K** · L **16.63 L☉** · age **440 Myr**(젊음, Castor moving group) ·
      [Fe/H] ≈ 태양(−0.03). 전부 Mamajek 2012(VLTI excess-corrected) 측정 → emit 그대로. **Canonical alternative**: Davis 2005
      (excess 미보정, R 1.744 R☉·Teff 8819 K — 더 뜨겁고 작음)는 병기, excess 보정한 Mamajek 채택.
      **자전**: v sin i **93±9 km/s**(Głębocki/Royer 군집) · P_rot 직접 측정 없음 — **측정 i★=90°±9°(Hadjara2014)로 도출
      P_rot ≈ 24.0 h(1.00 d)** [2026-07-12 점검: 구기록 "i≈65° 가정 → ~0.97 d"를 측정 기반으로 갱신 — 값은 근소 차].
      **figure (오너 G2, 2026-06-26)**: **약한 시각 편평 emit** — 편평 **~2.2%(a/c 1.022)**(k₂ 경로 계산과 Roche 추정 일치;
      Absil 2009 간섭계 1.021 정합). 로스터 가시 임계(~5%) 아래지만 오너가 "유명한 빠른 A형 자전체" 표현으로 시각 oblate 채택.
      + **중력감광**(von Zeipel, 극이 적도보다 ~300K 뜨거움 → 고경사 시점서 미세 극-밝아짐; 분해 map 없음 → 추정 low).
      VertexHeightOblateAdvanced 메시, 시각 기준반경=극반경 (body-figure-methodology.md).
      [2026-07-12: 구 "j2(중력) OMIT" 문구는 항성 J2 상시-emit 오너 정책으로 대체 — 아래 bulk.geopotential_j2 행이 live.
      spin_axis도 별도 행으로 분리.] gravity 155 m/s² = GM/R² 파생 에코(Kopernicus geeASL 슬롯).
