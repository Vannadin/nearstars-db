  - body: Fomalhaut
    axis: magnetism.magnetic_field
    status: gated
    driver: [classification]
    narrative: >
      **magnetic_field = 없음/미검출.** A4V(8590K)는 표면 수소가 거의 완전전리라 불투명도 범프가 사라져 **외피가 복사평형** —
      깊은 대류 외피가 없어 **태양식 αΩ dynamo 불가**(대류경계 ~F0–F2, Kraft break 위). → 자기 가열 채층/코로나·흑점·플레어·
      활동주기 전무, log R'HK 정의 안 됨.
      **documented nuance (화석장)**: A형은 dynamo 대신 **fossil field**를 *가질 수* 있음 — Ap/Bp(A/B의 ~10%)는 형성기에 갇힌
      kG급 잔존장(대류 없어 안정·보존), 정상 A형도 Vega처럼 ~0.6G **초미약장** 검출 사례(Lignières2009·Petit2010, 소멸 중 화석장
      추정). 단 **Fomalhaut는 정상 A형이라 강한 화석장 미검출**, 초미약장 보고도 없음 — 있어도 dynamo식 활동(채층 가열·흑점·플레어)은
      못 만듦. → cfg=무자기·무활동. magnetosphere/radiation_belts = N/A(항성).
    fields:
      - { name: magnetic_field, value: "none/미검출 (복사 외피, dynamo 불가; fossil field도 미검출)", op: set }
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        오너 G4 확정 2026-06-26 — 무자기/무활동. A4V 복사 외피→αΩ dynamo 불가(대류경계 위). nuance: A형은 fossil field
        가능(Ap/Bp kG·정상A형 Vega식 0.6G 초미약장)이나 Fomalhaut 정상A형이라 미검출, 있어도 활동 무관. log R'HK 정의
        안 됨. 약 X선은 동반성 TW PsA 탓(Schröder&Schmitt2007).
    refs: [2007A&A...475..677S]

  - body: Fomalhaut
    axis: environment
    status: passthrough
    driver: [passthrough]
    narrative: >
      activity/플레어 **없음**(dynamo 부재, magnetism 행). stellar_wind **미미**(A4V는 O/B형 line-driven wind만큼 뜨겁지 않음 → 약풍,
      astrosphere 비강조). X-ray 상한(ROSAT log Lx < 27.5, 동반성 TW PsA 귀속). **광구 UV 강함**(8590K Wien 꼬리 <200nm 다량 —
      내행성 대기침식 구동요인이나 **확정 행성 없어** 대상 없음); 채층 Lyα 없어 XUV/EUV 비율은 낮음. habitable_zone ~3.5–6 AU
      (Kopparapu A4V)이나 디스크가 10–158 AU로 HZ 밖 cold 영역 → 학술 표기일 뿐 거주 바디 없음. 측정/분류 → emit 그대로.
    fields:
      - { name: activity, value: "none (dynamo 부재); X-ray 상한 log Lx < 27.5 (동반성 귀속)", op: passthrough }
      - { name: stellar_wind, value: "미미 (약풍, line-driven 아님)", op: passthrough }
      - { name: uv_xray_flux, value: "광구 UV 강함 (8590K Wien 꼬리), XUV/EUV 낮음", op: passthrough }
      - { name: habitable_zone, value: "~3.5–6 AU (학술 표기; 거주 바디 없음)", op: passthrough }

  # ── 항성 자전축/J2 — 2026-07-12 항성 점검서 신설 (구 OMIT/i~65° 가정 대체) ──────
  - body: Fomalhaut
    axis: bulk.spin_axis_orientation
    status: gated                     # 측정 채택 — 로스터 유일 완전 3D 실측 극
    driver: [observation]
    narrative: >
      **완전 3D 실측 자전축 채택**: i★ = 90°±9°(적도향, Hadjara2014 SCIROCCO 최초 3D 해) + PA_rot 65.6°±5°
      (Hadjara2014; Le Bouquin2009 AMBER 스펙트로 아스트로메트리 PA 65°±3°와 일치). **하늘 투영 정렬은 확실** —
      PA_star ⊥ 디스크 PA 156°(Le Bouquin 2009: "행성계 각운동량이 항성 스핀과 동일선상이라는 표준 시나리오를
      검증"). **3D 정렬은 경계적**: 측정 i★ 90° vs 디스크 경사 ~66°(Kalas2005)는 1.5–2σ 긴장 — 측정값(90°)을
      1차 채택, 디스크 정렬(66°)은 하한 병기. 구기록의 "i~65°"는 가정이었음(Le Bouquin은 PA만 측정) — 측정으로 대체.
    fields:
      - { name: spin_axis_orientation, value: "i★ 90°±9° (측정, 적도향) · PA_rot 65.6°±5° (측정, 디스크 PA에 수직) — 로스터 유일 3D 실측 극", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        i★·PA 둘 다 간섭계 측정(Hadjara2014·Le Bouquin2009) — 가정 없는 유일 항성 극. 디스크와의 3D 비정렬
        후보(~24°, 1.5–2σ)는 측정 불확도 안이라 단정하지 않고 기록만. 상세 = phase4/figure/fomalhaut-j2-research.md §3.
    refs: [2014A&A...569A..45H, 2009A&A...498L..41L, 2005Natur.435.1067K]

  - body: Fomalhaut
    axis: bulk.geopotential_j2
    status: gated                     # 오너 정책 2026-07-12 — 항성 J2 상시 계산·emit (구 OMIT 대체). 로스터 항성 최대
    driver: [physics]
    narrative: >
      회전 편평 J2 = **1.0e-4 — 로스터 항성 압도적 최대**(40 Eri C 1.6e-6의 ~65배, 태양의 ~480배). 조기형이라
      폴리트로프/태양앵커 대신 **근점이동상수(k₂) 경로**: J2 = (2/3)·k₂·q (Sterne 1939 정립; 태양 검증 —
      앵커 J2/q 0.0105 역산 k₂ 0.0158 = Claret 태양값). k₂ = 0.0036(log −2.44, Claret 2004 그리드 2.0 M☉
      트랙 @440 Myr — Teff 8515K로 Fomalhaut 재현; 모델 계통 ~±25%). q = V_eq²R/GM = 0.044 (v sin i 93±9 ·
      측정 i★ 90°±9 → V_eq ≈ 93 km/s · R_eq 1.842 R☉) → **J2 1.0e-4, 방어 밴드 0.8–1.3e-4**(빠른 자전 1차
      절단 +10–20% vs k₂ 계통 −25%가 부분 상쇄; i★ 하한 66°면 1.25e-4). f ≈ 0.022 (a/c 1.022 — bulk 행의
      시각 편평 2.2%와 자기일관, Roche 추정과도 일치). reference_radius = 적도반경 1.2815e9 m.
      근거화 전문 = phase4/figure/fomalhaut-j2-research.md.
    fields:
      - { name: geopotential_j2, value: 1.0e-4, op: set, note: "방어 밴드 0.8–1.3e-4" }
      - { name: reference_radius, value: 1.2815e9, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: methodology-derived
      evidence: >
        입력 전부 측정(M/R Mamajek2012 · v sin i 93±9 군집값 · i★ 90°±9 Hadjara2014) + 이론 그리드 k₂(Claret
        2004, 태양 크로스체크로 계통 ±25% 정량화). Altair/Vega(f 0.10–0.25) 대비 ~2.5–3× 느린 자전이라 f 0.022는
        정확히 기대 위치 — sanity 통과. 방법 = body-figure-methodology.md §2 조기형 분기(2026-07-12 신설).
    refs: [1939MNRAS..99..451S, 2004A&A...424..919C, 2014A&A...569A..45H, 2012ApJ...754L..20M, 2009ApJ...698.1778R]

  - body: Fomalhaut
    axis: rings
    status: gated
    driver: [observation, physics, art-direction]
    narrative: >
      **간판 = 3중 debris-disk** (오너 G6=가, 2026-06-26: 3벨트 다 emit, 각자 경사로 JWST misalignment 재현).
      **① warm inner** 10–78 AU · i **47.8°**·PA 329.6° · 넓은 PR-drag 유입 디스크(narrow asteroid-belt 아님) · T~150K(pre-JWST SED).
      **② intermediate** 83–104 AU · i **67.5°**·PA 329.6° · e~0.3(가변) · mm 미검출(희박, Chittidi 2025) · 미지 행성 sculpting 추정.
      **③ cold main** 133–158 AU(폭 ~25, Δa/a 0.13) · i **65.6°**·PA 337.9°·ω 22.5° · **e 0.11**(유명한 "Eye of Sauron" 편심, ~14 AU offset) ·
      T 65K · dust 0.015 M⊕(mm-cm; 모천체 4–10 M⊕) · 날카로운 내연(shepherd 추정).
      **색(현행 Mie 방법론 재실행 2026-06-26, scripts/phase3/disk_color_mie.py)**: 전 벨트 **얼음입자**(~50–80% 물얼음, Sommer 2025;
      PR-drag로 외고리 파편 공유) + A형 큰 blowout(a_min 4.33µm) → 회색-크림. **warm/intermediate = 합성** faithful `#fff4e5` /
      vivid `#ffe0b0`·`#ffe2b1`(B/I 0.68). **cold = 측정값 `#d6d8da`(회색) 유지**(Kalas 2005 HST·Acke 2012 — measure-vs-synthesize
      규칙상 합성서 제외, 불변). pack=faithful 기본 + vivid alt 병기.
      **JWST 헤드라인**: 내부(47.8°) vs 외부(65.6°) 강한 misalignment → 벨트별 다른 경사로 표현.
      **제외/한계**: Fomalhaut b("Dagon")=충돌 dust cloud 반박(Gáspár&Rieke 2020)→**제외**(flavor만, 바디 아님). "Great Dust Cloud"=
      배경 은하(Kennedy 2023)→미렌더. ⚠ Kopernicus Ring=평평한 원형 → cold 편심 offset 표현 불가(Principia/커스텀/미래 volumetric 몫,
