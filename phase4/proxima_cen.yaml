      criterion: [derived-grounding]
      verdict: pass-in-window
      rationale: >
        G6 "희미한 플레어-오로라" 채택이 **약한 장 존재**를 이미 함의 → G7은 그 정량·명시(별도 art 선택 없는 derived 축).
