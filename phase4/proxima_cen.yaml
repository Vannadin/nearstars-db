      CH₄가 상층서 빨강 흡수하기 때문인데, c는 Teq~40K(내부열 보태도 ~50–60K, 둘 다 CH₄ 응결점 90K 아래)라 **CH₄가 얼어
      빠져 빨강 흡수 기체 부재 → 진청 메커니즘 약함** → H/He + 고층 얼음·haze의 **거의 중성 회백 + 약한 Rayleigh 청**.
      1.5 AU·M5.5라 **극도로 어두움**, Proxima reddening은 빛 자체가 약해 미미. 고유색 ~#c4d0d8(창백 회청), 표시=매우 dim
      (저광량+약한 온기끼). b(황토)·d(회갈)와 또 다른 극 = **창백 회백**.
    fields:
      - name: base_color
        value: "#c4d0d8 (창백 회청/회백; 거의 중성 + 약한 Rayleigh 청)"
        op: set
      - name: clouds
        value: "H/He + 고층 얼음·haze (해왕성처럼 파랗지 않음 — CH₄ 응결로 진청 메커니즘 약함)"
        op: set
    gate:
      criterion: [visual-checklist, composition-lock]
      verdict: pass-in-window
      evidence: >
        rationale: "차가운 mini-Neptune은 덜 파랑"은 grounded — CH₄ 응결(<90K)로 기체 CH₄ 빨강흡수 사라짐(해왕성 72K
        대비). 색=대기 반사색 문서 §6 엔진(H/He Rayleigh + 약 흡수, 얼음 haze). G4서 미룬 색 디테일을 여기서 확정. 내부열
        effective ~50–60K도 CH₄ 동결 유지라 결론 불변(internal-heat 문서).

        brightness_note: **절대 dimness(1.5 AU·M5.5)는 cfg 비인자** — KSP/Kopernicus는 바디를 normalize해 가시
        렌더하므로 실세계 어두움은 인게임에 안 반영됨. 외형 결정의 본질 = **색(창백 회백)**이지 밝기 아님. dimness는 실세계
        trivia로만 기록.

        paper: 색=docs/reference/atmosphere-reflected-color-methodology.md(Rayleigh+haze). 온도=tidally-locked-temperature
        + internal-heat-luminosity 문서(Teq 40K, T_eff ~50–60K). 시각 standout=고리(G9, 밝은 얼음).

