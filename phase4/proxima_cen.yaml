  - body: Proxima Centauri c I
    axis: surface
    status: gated
    driver: [classification, visual]
    # MIGRATION-FLAG: 표면 hex 색(#dcd6c6/#6e4632/#e8eef0)은 narrative 원문에 보존, typed 색필드 미분해 (emit 말미 art-pass).
    narrative: >
      **명왕성/트리톤 아날로그 — 이원(bimodal) 지형 + 위도 구조**(오너 a, 2026-06-23). 조성=N₂/CH₄/CO/H₂O 얼음 + tholin.
      **공간 배치(오너)**: **적갈 tholin 지대 = 적도대**(가장 많이 조명·따뜻 → 톨린 생성 + 휘발성 손실; 명왕성 Cthulhu식
      저albedo) / **밝은 N₂/CH₄ 얼음 = 극관**(가장 추워 휘발성 cold-trap → 고albedo 창백 크림; 트리톤 밝은 극관식). 휘발성
      이동 물리와 정합. 크라이오볼케이노 시그니처 **제외**(오너). Bond albedo 전반 높음(~0.5–0.7, 명왕성급) 단 공간 변동 큼.
      고유색=크림 N₂(극) ~#dcd6c6 · 적갈 tholin(적도) ~#6e4632 · 물얼음 청백 패치. 조석고정. **+ sub-c eyeball**(오너 2026-06-23):
      c·고리 마주보는 sub-c 지점에 **고리-얼음 신선 코팅 → 밝고 톨린 없는 국소 원형 영역**(고리 바로 밖 shepherd 위성이라
      쓸어담은 ring-ice가 톨린을 매몰; 트리톤/Iapetus식 한쪽 코팅). 고유색 신선 얼음 백 ~#e8eef0.
    fields:
      - name: surface_type
        value: "ice (명왕성/트리톤 아날로그, bimodal: 적도 tholin + 극 N₂/CH₄ 빙관 + sub-c 신선얼음 eyeball)"
        op: set
      - name: albedo
        value: "~0.5–0.7 (Bond, 명왕성급, 공간 변동 큼)"
