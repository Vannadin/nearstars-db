  # ── 항성 자전축/J2 — 2026-07-12 항성 점검서 신설 (silent-passthrough 해소) ──
  - body: Proxima Centauri
    axis: bulk.spin_axis_orientation
    status: gated                     # 측정 채택 (Klein 2021 ZDI)
    driver: [observation]
    narrative: >
      i★ = 47°±7° 측정 채택(Klein, Donati et al. 2021 ZDI, DB recommended). 극 방위각 미구속 → emit 배향
      자유(ICRS 극 RA/Dec 변환은 emit 단계). 행성 b/c/d 궤도 경사는 전부 미측정(DB null)이라 스핀-궤도
      정렬 여부는 진술 불가 — 궤도 emit이 배향을 정할 때 이 항성 적도면이 기준 후보.
    fields:
      - { name: spin_axis_orientation, value: "i★ 47°±7° (LOS 기준, 측정) · PA 자유, ICRS 변환 at emit", op: set }
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        ZDI 측정값 그대로 채택(47°±7°, recommended). 가정은 극 방위각뿐. 행성 궤도 경사 미측정이라
        정렬 주장 없음.
    refs: [2020MNRAS.500.1844K]

  - body: Proxima Centauri
    axis: bulk.geopotential_j2
    status: gated                     # 오너 정책 2026-07-12 — 항성 J2 상시 계산·emit
    driver: [physics]
    narrative: >
      회전 편평 J2 = 3.7e-9. 완전 대류 M왜성이라 태양앵커 스케일링 대신 **Radau-Darwin 복귀**: n=3/2
      폴리트로프 NMoI ≈ 0.205(Chandrasekhar 1939)는 R-D 유효범위(≥0.13) 안 → J2/q = 0.084.
      q = ω²R³/GM = 4.42e-8 (M 0.1221 M☉·R 0.141 R☉·P_rot 83.5d, 전부 DB recommended) → J2 3.7e-9
      (±~25%, 반지름 불확도 지배). reference_radius = 적도반경 9.809e7 m. 방법·M왜성 분기 =
      body-figure-methodology.md §2 (2026-07-12 확장).
    fields:
      - { name: geopotential_j2, value: 3.7e-9, op: set }
      - { name: reference_radius, value: 9.809e7, unit: m, op: set }
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        느린 자전(83.5d)+작은 반지름이라 q 자체가 태양의 ~1/470 — 로스터 최소 J2. 그래도 오너 정책
        (항성 J2 무시가능 처리 금지, Principia 플레이 중요)대로 계산값 emit. 태양 비율(0.0105) 대신
        M왜성 폴리트로프 계수(0.084)를 쓴 것은 응집도 차이의 물리적 귀결.
    refs: [1939isss.book.....C, 2009A&A...505..205D, 1998AJ....116..429B, 2025A&A...700A..11S]

  # ── 행성 b (대륙형 호수 세계, 무생물) — facet-walk 2026-06-23 ──────────
  - body: Proxima Centauri b
    axis: identity
    status: gated
    driver: [classification, observation]
    narrative: >
      body_type=암석 지구형 — **대륙형 호수 세계**(직하 고지대 + 흩어진 호수/내해 모자이크 → 야간측 빙관, **무생물**).
      eyeball 아님. designation=Proxima Centauri b(고유명 없음). discoverability=confirmed(Anglada-Escudé 2016, RV).
    fields:
      - name: body_type
        value: "암석 지구형 — 대륙형 호수 세계 (직하 고지대 + 흩어진 호수/내해 + 야간측 빙관, 무생물)"
        op: set
      - name: designation
        value: "Proxima Centauri b (고유명 없음)"
        op: set
      - name: discoverability
        value: "confirmed (Anglada-Escudé 2016, RV)"
        op: set
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        confirmed(RV) → RB IGNORELEVELS T F F F. 기후=대륙형 호수(eyeball 회피, 로스터 다양성; 직하-고지대 전제라
        TRAPPIST-1 e와 자연 분기). 생명 없음.
    discoverability_cfg: {category: confirmed, ignorelevels: "T F F F", ref: "2016Natur.536..437A (Anglada-Escudé 2016)", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Proxima Centauri b
    axis: orbit                       # a/e/inc/lock = 측정 passthrough
    status: passthrough
    driver: [passthrough]
    narrative: >
      a=0.04848 AU · P=11.18465d · e≈0(SM2025) · inc 미측정(비통과) · 조석고정(락타임 <10⁵yr). Ω/ω/M free-emit.
    fields:
      - name: semi_major_axis_au
        value: 0.04848
        unit: AU
