        value: 4.0e-2
        op: set
        note: "=(5/2)·J₂ → a/c~1.04 (>2% 가시 삼축, 계란형). Mimas 실제 앵커(q_s 0.0186 동일, 가시 삼축). 오블레이트 메쉬 emit 대상"
