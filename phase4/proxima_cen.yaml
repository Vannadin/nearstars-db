        op: set
        note: "≈0.88·q_s (q_s 0.0184 = n²R³/GM, a=4 R_c 초근접; 얼음체 Europa 앵커). 동기위성 figure §3"
      - name: geopotential_c22
        value: 4.9e-3
        op: set
        note: "=0.30·J₂ (J₂=10/3·C̄₂₂ 조석 삼축; 축차 a−c:b−c=4:1)"
