        op: passthrough
        note: "≈0 measured (SM2025); inc 미측정(비통과). emit 주의: e≈0 + 0.7bar 대기 → Kopernicus temperatureEccentricityBiasCurve 0-나눗셈 트랩 → 측정값이라 noise 금지 → emit시 곡선 suppress"
      - name: tidal_lock
        value: "1:1 (락타임 <10⁵yr); Ω/ω/M free-emit"
        op: passthrough

  - body: Proxima Centauri b
    axis: bulk                        # §3.2 템플릿 앵커 — mass=등방 prior 중앙 진질량(결정), 나머지 passthrough/tie-break
    body_class: tidally_locked
    status: gated
    driver: [window-selection, observation]
    narrative: >
      mass 1.22 M⊕(등방 prior 중앙 진질량) · radius ~1.07 R⊕ · g ~1.07 · 밀도 ~5.5 g/cm³(지구형 암석) · 조석고정 ·
      obliquity ~0 · age ~4.85 Gyr. [§3.2 정규화 2026-07-12] 조석고정의 자명 귀결 승격: rotation = 공전주기
      11.186 d(DB), spin_axis = 궤도 법선. figure는 body-figure-methodology.md §6 워크드 값 승격 —
      q_s 2.8e-5 → J2 ≈ 2.8e-5 · 조석 C̄₂₂ ≈ 8e-6 (reference_radius 6817 km = radius). [2026-07-14]
      internal_heat 표면 미미(radiogenic ~Earth-scale, T_eff≈T_eq §7) — 값의 몫은 G7 약한 dynamo 구동원.
    fields:
      - name: mass
        value: 1.22
        unit: M_earth
        op: set
        phase3_default: "Msini 1.055 M⊕ (RV 최소질량, SM2025)"
        note: "등방 prior 중앙 진질량"
      - name: radius
        value: 1.07
        unit: R_earth
        op: set
        note: "비통과 tie-break(질량-반경); g~1.07·밀도~5.5 g/cm³ 지구형 암석"
      - name: gravity
        value: 1.07
        unit: g
        op: set
        note: "GM/R² 파생 에코"
      - name: flattening
        value: 7.0e-5
        op: set
        note: "= (5/2)·J₂ 평균적도 spheroid (J₂ 2.8e-5) — 시각상 구"
      - name: rotation_period
        value: 11.186
        unit: d
        op: set
        note: "= 공전주기 (조석고정, DB curated)"
      - name: spin_axis_orientation
        value: "궤도 법선에서 Cassini ε(~0.03°)만큼 Laplace pole 쪽 offset (State 1 평형); 방위각 de-perfect-at-emit"
        op: set
      - name: geopotential_j2
        value: 2.8e-5
        op: set
        note: "≈ q_s (동기 자전, body-figure-methodology §6 워크드)"
      - name: geopotential_c22
        value: 8.0e-6
        op: set
        note: "영구 조석 삼축 (§6 워크드) — emit 임계 판단은 emit 단계"
      - name: reference_radius
        value: 6817
        unit: km
        op: set
        note: "J2/C22 기준 반경 = radius"
      - name: internal_heat
        value: "negligible (표면)"
        op: set
        note: "radiogenic ~Earth-scale ~0.08 W/m² (T_int~35K), 표면 T_eff≈T_eq(§7); 내부열 몫은 G7 약한 dynamo(RM22) 구동"
      - name: obliquity
        value: 0
        unit: deg
        op: set
        note: "≈0 = Cassini State 1 평형 (가정 아님·계산). |g|/α=0.017 (Laplace–Lagrange 승교점율 g + 동기 α, ≪ 공명 임계 ~1.1) → ε₁=(|g|/α)·sinI ≈0.02–0.05° (근접-공면 궤도 I). 극단 obliquity 없음. method=cassini-state-obliquity-methodology.md"
      - name: age
        value: 4.85
        unit: Gyr
        op: set
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        rationale: RV Msini는 최소값. 무작위 방향 궤도의 중앙 경사각 60°(sin60=0.866) → 진질량 중앙값 = Msini×1.1547
        = 1.22 M⊕. NearStars Barnard 선례와 동일 방식(class A). 가스행성 아님은 질량통계로 확정(radius valley 아래,
        ~1 M⊕는 H/He 미보유 + 플레어 광증발).

        paper: Ho & Turner 2011 (ApJ 739, 26; arXiv:1007.0245) "Posterior Distribution of sin(i)…". CAVEAT: 등방
        ×1.1547은 단순가정 중앙값 — sin(i) 사후분포는 모집단 질량함수에 의존하며, 가파른 질량함수면 보정이 더 작아져
        (진질량이 Msini에 더 근접) ×1.1547은 상한쪽 추정. 즉 1.22는 '등방-prior 관례값', 실제 기대값은 1.055~1.22
        하단 가능. 선례(Barnard) 일관 위해 1.22 채택, 이 caveat 명기.

        caveat: radius 1.07 R⊕는 비통과 tie-break(질량-반경). 1.22 M⊕ 채택으로 g~1.07·밀도~5.5 재도출(지구형 유지).
    refs: ["1007.0245"]

  - body: Proxima Centauri b
    axis: atmosphere                  # G4 — 기압=오너 결정 0.7 bar, 나머지 방법론 도출
    status: gated
    driver: [classification, window-selection]
    narrative: >
      surface_pressure=0.7 bar(오너 결정 2026-06-23). composition=N₂ 지배 + CO₂ ~3%(온실로 직하 빙점 위 유지),
      μ≈28.5 g/mol. **Bond albedo A≈0.33**(G5 표면서 cascade — 밝은 anorthosite 고지 + 직하 구름덱이 데이샤이드 알베도를
      0.30→0.33으로 올림; 오너 "평균 알베도 조금↑" 2026-06-23). breathability=불가(무생물·무산소, atmosphereContainsOxygen=false).
      scale_height H≈7 km(=RT/μg, T~250K·g 10.5·μ 28.5 — 기압엔 무관). escape=M왜성 플레어 stripping 위험이나
      호수세계 전제로 보유 채택(게이트 참조).
    # MIGRATION-FLAG: derived_temps 는 비표준 행-레벨 키로 프로즈 원문 보존 (validator 무시). 온도값 typed field 로 병기.
    derived_temps: >
      **Teq≈228K(A 0.33, 기압 무관 — G5 albedo cascade)**. 조석고정 1:1 → Layer-3 GCM(Boutle2017 ~1 bar N₂+CO₂ 케이스를
      0.7 bar + A 0.33로 약간 하향): 직하 ~282–288K(여전히 >273K → 액체 호수 유지)·야간 ~150–162K(빙관)·평균 ~243–248K.
      직하 데이샤이드 호수 + 나머지 빙결 = G1 "대륙형 호수 세계"와 정합. (A를 0.43까지 올려야 직하가 빙점 — 0.33은 충분한 마진.)
    fields:
      - name: pressure
        value: 0.7
        unit: bar
        op: set
        phase3_default: "Phase 3 합성 대기(있으면) — 본 결정이 art-direction 기압/조성 확정값"
        note: "오너 결정 2026-06-23"
      - name: composition
        value: "N₂ 지배 + CO₂ ~3% (μ≈28.5 g/mol)"
        op: set
      - name: temperature
        value: 228
        unit: K
        op: set
        note: "Teq (A 0.33, 기압 무관). 직하 ~282–288K·야간 ~150–162K·평균 ~243–248K (Layer-3 GCM)"
      - name: scale_height
        value: 7
        unit: km
        op: set
        note: "=RT/μg (T~250K·g 10.5·μ 28.5)"
      - name: breathability
        value: false
        op: set
        note: "무생물·무산소, atmosphereContainsOxygen=false"
      - name: escape
        value: "M왜성 플레어 stripping 위험이나 호수세계 전제로 보유 채택"
        op: set
    gate:
      criterion: [classification, retention, error-bar]
      verdict: documented-divergence
      divergence_note: >
        대기 문서 3-gate: cosmic shoreline 위지만 M왜성 강플레어·항성풍 stripping(Dong2017·Ribas2016) 위험이라 "보유"는
        자동이 아님. G1 호수세계(액체 물)가 대기 보유를 요구하므로 Meadows2018 "온대/거주가능" 분기를 명시 tie-break로 채택.
        Garraffo2016 자기차폐가 도울 수 있으나 불확실 — 발산으로 명기.
      evidence: >
        locking_note: 새 locking 문서 교차검증 — 0.7 bar는 대기 열조석이 약해 Leconte2015 비동기 caveat 미발동 → G3의
        1:1·obliquity 0 견고(오히려 1 bar보다 안전).

        collapse_note: CO₂ ~3% @0.7 bar(분압 ~21 mbar)의 frost point ~135K < 야간 150–165K → CO₂ 미동결, 야간측
        대기붕괴 회피.

        paper: 기압/μ/scale-height = docs/reference/exoplanet-atmosphere-methodology.md. 온도 3계층 =
        docs/reference/tidally-locked-temperature-methodology.md (Layer-3 앵커 Turbet2016·Boutle2017, 검증 id는 그 문서).

  - body: Proxima Centauri b
    axis: surface                     # G5 — 대륙형 호수 세계 표면; 색=표면색 문서, A=Bond cascade
    status: gated
    driver: [classification, visual]
    narrative: >
      대륙 = **2색**(오너 1+2 조합): 회녹색 마픽 저지(올리빈/휘석질 현무암 mare, Fe²⁺ 결정장 → 어두운 회녹, A~0.1) +
      밝은 장석질 고지(anorthosite highlands, A~0.2–0.25). **화성형 적색 아님** — 무생물·무산소(G4)라 철이 환원(Fe²⁺)
      상태 유지, O→Fe³⁺ 전하이동(적색 슬로프) 미발생. 직하 호수/내해 = 어두운 물(A~0.07, G1 캐나다/지중해형 산재).
      야간 빙관 = 밝은 물얼음(A~0.5–0.6, 살짝 청색). 직하 구름덱 = 물구름(Yang2013 안정화 피드백, 데이샤이드 알베도↑).
    # MIGRATION-FLAG: bond_albedo_cascade / cfg_colors_intrinsic 는 비표준 행-레벨 키로 프로즈+hex 원문 보존 (색은 emit 말미 art-pass, typed 색필드 미분해).
    bond_albedo_cascade: >
      Bond albedo는 **일사받는 데이샤이드만** 결정(1:1 고정 → 야간측 일사 0 → 밝은 빙관은 Bond에 미기여, 과대평가 회피).
      데이샤이드 면적가중 = 어두운 마픽+호수(낮음) + 밝은 anorthosite 고지·직하 구름(높음) → **A≈0.33**. G4 Teq 228K와
      맞물림 → cascade 닫힘. 오너 "평균 알베도 조금↑"은 밝은 고지 추가로 물리적 정당화(0.30→0.33), 온도는 G4서 동기 하향.
    cfg_colors_intrinsic: >
      고유(중립광/태양 기준) 반사색 — cfg 저장값, 렌더러가 항성광 적용(Proxima-lit 표시색은 appearance/G6).
      마픽 저지 #3c4339(창 #353b32–#444b40) · 장석질 고지 #928c81(창 #88827a–#9d978c) ·
      직하 호수 #1d2c3a(창 #182430–#223240) · 야간 빙관 #dde6ec(창 #d4dde6–#e8eef2) · 직하 구름덱 #eef1f4.
    fields:
      - name: surface_type
        value: "rock (2색 대륙: 회녹 마픽 저지 + 장석질 고지)"
        op: set
      - name: albedo
        value: 0.33
        op: set
        note: "Bond, 데이샤이드 면적가중 (G4 Teq 228K와 cascade)"
      - name: hydrosphere
        value: "직하 호수/내해 (어두운 물 A~0.07, 산재)"
        op: set
      - name: ice_caps
        value: "야간 빙관 (밝은 물얼음 A~0.5–0.6, 살짝 청색)"
        op: set
    gate:
      criterion: [classification, visual-checklist]
      verdict: pass-in-window
      evidence: >
        rationale: 색조/패턴은 interesting-first 축(표면색 문서 §1 posture) — 묶이는 hard tie는 면적가중 Bond
        albedo뿐(→온도 cascade). 대륙 어두움·비적색은 환원 산화상태로 grounded(표면색 문서 §2: 산화상태가 색 최대 레버).
        2색(mare/highland) + 호수·빙관·구름의 다요소 = interesting-first 다양성, eyeball 회피(G1 대륙형 호수 유지).

        paper: 표면색·Bond albedo = docs/reference/surface-color-albedo-methodology.md (Fe²⁺ 결정장 §2, Bond=q·p §6).
        직하 구름 피드백 = 온도 문서 Layer-3(Yang2013).

        emit_note: Kopernicus 표면색/biome emit는 프로젝트 말미 일괄. 색조 sRGB는 표면색 문서 + atmosphere-reflected-color
        엔진으로 조성→색 합성(emit 단계). 야간 빙관/직하 호수/2색 대륙 = biome 구획 후보.

  - body: Proxima Centauri b
    axis: appearance                  # G6 — Proxima-lit 표시색 + 디스크 종합 + 희미 플레어-오로라
    status: gated
    driver: [visual, observation]
    narrative: >
      종합 인상 = **따뜻한 황토/적갈 디스크**(Proxima M5.5, Teff 2904K reddening). 조석고정 → 직하 반구가 별 향함.
      가장 밝은 = 직하 물구름 소용돌이(크림-화이트), 둘레로 reddening된 2색 대륙(움버 저지 + 테라코타 고지) + 산재한
      검붉은 호수, 터미네이터 너머 크림빛 야간 빙관. **폴리페무스(G2V 태양쌍둥이광=고유색 거의 그대로)와 결정 대비** —
      여기선 별빛 자체가 붉어 디스크 전체가 따뜻하게 물듦. + **희미한 플레어-오로라**(아래 게이트).
    # MIGRATION-FLAG: cfg_colors_displayed 는 비표준 행-레벨 키로 프로즈+hex 원문 보존 (표시 팔레트, emit 말미 정밀화).
    cfg_colors_displayed: >
      Proxima reddening 적용 근사(§6 엔진, illuminant=별; emit서 정밀화). 마픽 저지 #3e2c16(움버) ·
      장석 고지 #9a5e38(테라코타) · 직하 호수 #1d1810(검붉은 근흑) · 야간 빙관 #dda176(크림-복숭아, 청색 죽음) ·
      직하 구름 #f0d8bf(크림화이트). 고유색은 G5 cfg_colors_intrinsic.
    fields:
      - name: base_color
        value: "따뜻한 황토/적갈 디스크 (Proxima M5.5 Teff 2904K reddening)"
        op: set
      - name: aurora
        value: "희미·간헐 플레어-오로라, 적자색 (magenta-violet)"
        op: set
    gate:
      criterion: [visual-checklist, composition-lock]
      verdict: documented-divergence
      divergence_note: >
        aurora_divergence: 희미·간헐(플레어 시) 오로라를 의도 연출. **행성 자기장은 미측정**(외계행성 장 직접탐지 사례
        없음; Pérez-Torres2021 2012.02116 전파 SPI는 잠정·항성 플레어 기원). 게다가 조석고정 느린 자전 → 암석 dynamo 약할
        가능성↑(Driscoll&Olson2011, RM22 스케일링). 단 드라이버(별)는 강력 — 잦은 슈퍼플레어 입자플럭스 막대(별
        environment.activity 측정값). 그래서 "약한 장 가정 + 강한 구동 → 희미·간헐 오로라"를 documented-divergence로
        채택(장 존재를 약하게 가정, 명기).
      evidence: >
        palette_note: 표시 팔레트는 derived(in-window) — 고유 반사색(G5) × Proxima SED를 §6 엔진으로 렌더한 결과.
        별색 reddening은 물리.

        aurora_color: 색은 composition-lock(in-window) — N₂ 지배·**무산소**(G4) 대기라 Earth의 OI 557nm 녹색(O 풍부
        필요)은 죽고, N₂ 1st Positive 적·N₂⁺ 391nm 자색 지배 → **적자색(magenta-violet) 오로라**. composition-color.md
        aurora regime.

        paper: 자기장 관측 현황 = Garcia-Sage2017(2017ApJ...844L..13G, 장 가정 보호모델)·Garraffo2016·Pérez-Torres2021
        (2012.02116 전파탐색). 약한장 근거 = 조석고정→느린자전 dynamo(Driscoll&Olson2011 2011Icar..213...12D, RM22).
        오로라색 = composition-color.md.
    refs: ["2017ApJ...844L..13G", "2012.02116", "2011Icar..213...12D"]

  - body: Proxima Centauri b
    axis: magnetism.magnetic_field    # G7 — 암석 dynamo(RM22)+조석고정 penalty → 약한 장. G6서 함의된 결정 명시
    status: gated
    driver: [derived-grounding]
    narrative: >
      **약한 행성 자기장**(차수 ≲0.1–0.3× 지구, ≲ 수 µT 표면), **활성 dynamo 여부 자체가 불확실**. 미측정 — 외계행성 장
      직접탐지 사례 없음(Pérez-Torres2021 전파 SPI 잠정). **Zapatero Osorio2026(arXiv:2605.22925)이 b SPI를 플레어 강도
      변조(b 공전주기 주기성)로 검출 → 자기적 상호작용 흔적이나, d와 달리 b는 자기장 값 미도출**(phase-lock 아님). 방법 =
      암석장 RM22 스케일링 + 조석고정 penalty(dynamo 문서 regime 4). 약함 동인 두 가지: (1) 조석고정 P=11.2일 느린 자전이
      임계자전 아래 → dynamo 약화, (2) 노쇠 ~4.85 Gyr 핵 냉각 → 코어 대류 약화. conf=low.
    fields:
      - name: magnetic_field
        value: "약한 (차수 ≲0.1–0.3× 지구, ≲ 수 µT 표면); 활성 dynamo 여부 불확실, conf=low"
        op: set
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        rationale: G6 "희미한 플레어-오로라" 채택이 **약한 장 존재**를 이미 함의 → G7은 그 정량·명시(별도 art 선택 없는
        derived 축). 자이언트 energy-flux 법칙(Christensen2009)은 부적용 — 암석체라 RM22 경로. 강한 장 가정은 근거
        없음(미측정+느린자전+노쇠).

        coupling: G4 retention divergence 강화 — 약한 장 → 자기차폐 미약 → M왜성 stripping 무방비(Garcia-Sage2017·
        Garraffo2016: 장이 있어도 Proxima 활동성엔 보호 어려움) → "보유"를 documented-divergence로 둔 게 정당. G6 오로라
        희미함과도 정합. environment.radiation(G8)에도 입력 — 약한 자기권 → 표면 방사선 환경 가혹(플레어 직격).

        paper: 암석 dynamo = docs/reference/planetary-dynamo-scaling.md regime 4(RM22 2203.01065 + Garraffo2017 +
        조석lock penalty). 노쇠/느린자전 약화 = Driscoll&Olson2011.
    refs: ["2605.22925", "2203.01065"]

  - body: Proxima Centauri b
    axis: environment                 # G8 — 별 측정 환경 + G7 약한장에서 도출 (radiation/wind/heliosphere)
    status: gated
    driver: [derived-grounding]
    narrative: >
      radiation(표면)=**가혹** — 약한 자기권(G7) + 잦은 슈퍼플레어(별 measured: 1.49회/일, ≥10³³erg ~3/년, X선 log Lx
      27정온→28.5피크) + 근접궤도 0.0485 AU 직격. 0.7 bar 대기가 일부 column 차폐하나 약한 장이라 플레어가 대기 직타 →
      G1 무생물·G11 해저드의 물리 근거. stellar_wind=**강함**(근접 → wind ram 큼, Dong2017 escape 구동 = G4 retention
      divergence 입력). heliosphere=**astrosphere 심부**(행성 0.0485 AU ≪ standoff ~55 AU[Wood2001] → 항상 항성풍 내부,
      ISM 직접 미관측).
    fields:
      - name: radiation
        value: "가혹 (약한 자기권 + 슈퍼플레어 + 0.0485 AU 직격)"
        op: set
      - name: stellar_wind
        value: "강함 (근접 wind ram 큼, Dong2017 escape 구동)"
        op: set
      - name: heliosphere
        value: "astrosphere 심부 (0.0485 AU ≪ standoff ~55 AU)"
        op: set
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      evidence: >
        rationale: 전부 별 measured 환경(environment.activity/stellar_wind/heliosphere) + G7 약한 자기권에서 도출 —
        별도 art 선택 없는 derived 축. radiation 등급(Kerbalism 매핑)은 high이되 정확 tier는 G11 gameplay서 확정.

        coupling: G4 retention divergence(풍-구동 escape)·G1 무생물(방사선 적대)·G11 해저드의 공통 입력. G7 약한 장이
        radiation 가혹의 직접 원인.

        paper: 별 환경 측정 출처는 별 섹션(environment.activity/wind/heliosphere; Vida2019·Wargelin2024·Wood2001 등).
        대기 escape = exoplanet-atmosphere-methodology.md Gate2(Dong2017·Ribas2016).

  - body: Proxima Centauri b
    axis: rings                       # G9 — 없음
    status: gated
    driver: [classification]
    narrative: "고리 없음. 근접 암석행성, 관측 근거·픽션 없음 → 단순 부재."
    fields:
      - name: ring_structure
        value: "none"
        op: set
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: "암석 지구형엔 고리 기본 부재. 디스크 조작 방지 원칙([[project_nearstars_ring_fabrication]]) — feature 없으면 없음으로."

  - body: Proxima Centauri b
    axis: satellites                  # G10 — 없음 (근접 조석환경 물리적 예외)
    status: gated
    driver: [stability, classification]
    narrative: >
      위성 없음. Hill 반경 R_H = a·(m_p/3M★)^⅓ = 0.0485 AU×0.0215 ≈ 156,000 km, 순행 안정역 ~0.3–0.5 R_H(50–78k km)로
      좁고, **조석고정 근접 행성**이라 강한 항성조석이 Gyr 스케일로 위성 궤도 불안정화 → 큰 위성 미보유가 일반적.
    gate:
      criterion: [stability, classification]
      verdict: pass-in-window
      evidence: >
        [[feedback_gameplay_variety]]의 "그 자리에 아무것도 없어야 함" **물리적 예외** — 근접 조석환경이 안정 위성을 막아
