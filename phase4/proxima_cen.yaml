        note: "평균 표면장 (Reiners&Basri2008/Reiners2022 CARMENES); 대규모 dipole 0.135 kG (Klein2021 ZDI, 주로 poloidal); spin incl 47°±7°"

  - body: Proxima Centauri
    axis: environment.activity        # 플레어 별 핵심 — 측정
    status: passthrough
    driver: [passthrough]
    narrative: >
      P_rot 83.5±0.5d(Benedict1998 HST) · 7년 사이클(Wargelin2017 X선+UV+광학, DB 핀 2017MNRAS.464.3281W) ·
      log R'HK −5.65±0.17(정온 활동도 낮음). **플레어**: 총 1.49회/일(Vida2019 TESS), 슈퍼플레어(≥10³³ erg)
      ~3회/년, ultra ~0.5회/년. X선 log Lx ~27.0 정온 / ~28.5 플레어피크. 역설(노쇠 느린자전인데 빈번
      슈퍼플레어)은 7년 사이클 변조로 화해. 측정 emit. [2026-07-12 점검: 사이클 인용 Wargelin2024→2017로
      DB recommended 핀과 정렬.]
    fields:
      - name: activity
        value: "P_rot 83.5±0.5d (Benedict1998 HST), 7년 사이클 (Wargelin2017), log R'HK −5.65±0.17"
        op: passthrough
      - name: flares
        value: "1.49회/일 (Vida2019 TESS); 슈퍼플레어 ≥10³³erg ~3회/년, ultra ~0.5회/년; X선 log Lx ~27.0 정온→28.5 피크"
        op: passthrough

  - body: Proxima Centauri
    axis: environment.stellar_wind    # 측정
    status: passthrough
    driver: [passthrough]
    narrative: >
      Ṁ ≤0.2 Ṁ☉(Wood2001 astrospheric Lyα 상한). 풍-지배 아닌 **플레어-지배** 환경. L_bol 낮아 절대 풍 약함.
    fields:
      - name: stellar_wind
        value: 0.2
        unit: Mdot_sun
        op: passthrough
        note: "≤0.2 (Wood2001 astrospheric Lyα 상한). 플레어-지배 환경, 절대 풍 약함"

  - body: Proxima Centauri
    axis: environment.heliosphere     # SHARED 시스템 대표
    status: passthrough
    driver: [passthrough]
    narrative: >
      Astrosphere standoff ≲55 AU(Wood2001). 국부 ISM 유입 ~25 km/s(Wood2005, α Cen AB와 동일 G-cloud 흐름).
    fields:
      - name: heliosphere
        value: "astrosphere standoff ≲55 AU (Wood2001); ISM 유입 ~25 km/s (Wood2005, α Cen AB와 동일 G-cloud)"
