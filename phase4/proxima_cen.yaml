# Proxima Centauri (α Cen C / GJ 551) Phase 4 결정 보드 — 별 + 행성 b/c/d. (body × axis) 행별 상태. DB 불변, staging 기록
# 실관측 시스템 → 대부분 Phase 3 측정/합성값 passthrough, 소수 art/divergence + discoverability만 결정. grounding=docs/phase3/proxima-cen*.md
system: proxima_cen
status: staged
updated: 2026-06-23

decisions:
  # ── 별 (Proxima Cen, M5.5Ve 플레어 별) — facet-walk 2026-06-23 ──────────
  - body: Proxima Centauri
    axis: identity
    status: gated
    driver: classification + observation
    value: >
      body_type=M5.5Ve 적색왜성(플레어 별). 태양 최근접성, α Cen AB에 ~13,000 AU 약결합. designation=Proxima Centauri
      (α Cen C / GJ 551). discoverability=confirmed(맨눈 불가, 망원경 검출 — Innes 1915).
    gate:
      criterion: [classification]
      verdict: pass-in-window
      note: "α Cen A·B(naked_eye, 밝은 별)와 달리 Proxima는 겉보기 11등이라 맨눈 불가 → category=confirmed(망원경 검출사와 정합), naked_eye 아님. 오너 결정(a)."
    discoverability_cfg: {category: confirmed, ignorelevels: "T F F F", ref: "Innes 1915 (telescopic discovery)", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Proxima Centauri
    axis: bulk                        # 측정 passthrough
    status: passthrough
    note: >
      M 0.1221±0.0022 M☉(SM2025 진화모델) · R 0.141±0.011 R☉(Demory2009 VLTI) · Teff 2904±51K(Passegger2019) ·
      L 0.00157 L☉ · age ~4.85±0.5 Gyr(kinematic, 포획 vs 동시생성 미정). 전부 고신뢰 측정 → emit 그대로.

  - body: Proxima Centauri
    axis: appearance                  # [star] group 6 — 관측 기반 + 흑점 결정
    status: gated
    driver: observation
    value: >
      color=M5.5V 심적색 #c54c2a(TiO/VO/H₂O가 <6500Å 강억제). limb_darkening α~0.4(Claret2018 M-dwarf 보간, tie-break).
      **spots_faculae=보통~다소 많음 ~3–5%**(활동적 M왜성 큰 spot; 83d 자전 변조 검출=spot 존재; A·B보다 多). flare 색
      #ff5e2a(Hα)는 참조용 — **동적 플레어는 cfg 렌더 불가**라 visual passthrough, 효과는 environment.radiation/activity로.
    gate: {criterion: [observation], verdict: pass-in-window, note: "색/limb=측정·tie-break passthrough. 흑점량=오너 위임 결정(텍스처용) ~3–5%. 플레어 visual 드롭(KSP 동적 플레어 미지원, 오너 확인)."}

  - body: Proxima Centauri
    axis: magnetism.magnetic_field    # 측정
    status: passthrough
    note: "평균 표면장 0.6 kG(Reiners&Basri2008/Reiners2022 CARMENES), 대규모 dipole 0.135 kG(Klein2021 ZDI, 주로 poloidal). spin incl 47°±7°. 측정 emit."

  - body: Proxima Centauri
    axis: environment.activity        # 플레어 별 핵심 — 측정
    status: passthrough
    note: >
      P_rot 83.5±0.5d(Benedict1998 HST) · 7년 사이클(Wargelin2024 X선+UV+광학) · log R'HK −5.65±0.17(정온 활동도 낮음).
      **플레어**: 총 1.49회/일(Vida2019 TESS), 슈퍼플레어(≥10³³ erg) ~3회/년, ultra ~0.5회/년. X선 log Lx ~27.0 정온
      / ~28.5 플레어피크. 역설(노쇠 느린자전인데 빈번 슈퍼플레어)은 7년 사이클 변조로 화해. 측정 emit.

  - body: Proxima Centauri
    axis: environment.stellar_wind    # 측정
    status: passthrough
    note: "Ṁ ≤0.2 Ṁ☉(Wood2001 astrospheric Lyα 상한). 풍-지배 아닌 **플레어-지배** 환경. L_bol 낮아 절대 풍 약함."

  - body: Proxima Centauri
    axis: environment.heliosphere     # SHARED 시스템 대표
    status: passthrough
    note: "Astrosphere standoff ≲55 AU(Wood2001). 국부 ISM 유입 ~25 km/s(Wood2005, α Cen AB와 동일 G-cloud 흐름)."

  # ── 행성 b (대륙형 호수 세계, 무생물) — facet-walk 2026-06-23 ──────────
  - body: Proxima Centauri b
    axis: identity
    status: gated
    driver: classification + observation
    value: >
      body_type=암석 지구형 — **대륙형 호수 세계**(직하 고지대 + 흩어진 호수/내해 모자이크 → 야간측 빙관, **무생물**).
      eyeball 아님. designation=Proxima Centauri b(고유명 없음). discoverability=confirmed(Anglada-Escudé 2016, RV).
    gate:
      criterion: [classification]
      verdict: pass-in-window
      note: "confirmed(RV) → RB IGNORELEVELS T F F F. 기후=대륙형 호수(eyeball 회피, 로스터 다양성; 직하-고지대 전제라 TRAPPIST-1 e와 자연 분기). 생명 없음."
    discoverability_cfg: {category: confirmed, ignorelevels: "T F F F", ref: "2016Natur.536..437A (Anglada-Escudé 2016)", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Proxima Centauri b
    axis: orbit                       # a/e/inc/lock = 측정 passthrough
    status: passthrough
    note: "a=0.04848 AU · P=11.18465d · e≈0(SM2025) · inc 미측정(비통과) · 조석고정(락타임 <10⁵yr). Ω/ω/M free-emit."

  - body: Proxima Centauri b
    axis: bulk                        # mass=등방 prior 중앙 진질량(결정), 나머지 passthrough/tie-break
    status: gated
    driver: window-selection + observation
    value: "mass 1.22 M⊕(등방 prior 중앙 진질량) · radius ~1.07 R⊕ · g ~1.07 · 밀도 ~5.5 g/cm³(지구형 암석) · 조석고정 · obliquity ~0 · age ~4.85 Gyr"
    phase3_default: "Msini 1.055 M⊕ (RV 최소질량, SM2025)"
    gate:
      criterion: [derived-grounding]
      verdict: pass-in-window
      rationale: >
        RV Msini는 최소값. 무작위 방향 궤도의 중앙 경사각 60°(sin60=0.866) → 진질량 중앙값 = Msini×1.1547 = 1.22 M⊕.
        NearStars Barnard 선례와 동일 방식(class A). 가스행성 아님은 질량통계로 확정(radius valley 아래, ~1 M⊕는 H/He 미보유 + 플레어 광증발).
      paper: >
        Ho & Turner 2011 (ApJ 739, 26; arXiv:1007.0245) "Posterior Distribution of sin(i)…". CAVEAT: 등방 ×1.1547은
        단순가정 중앙값 — sin(i) 사후분포는 모집단 질량함수에 의존하며, 가파른 질량함수면 보정이 더 작아져(진질량이
        Msini에 더 근접) ×1.1547은 상한쪽 추정. 즉 1.22는 '등방-prior 관례값', 실제 기대값은 1.055~1.22 하단 가능.
        선례(Barnard) 일관 위해 1.22 채택, 이 caveat 명기.
      caveat: "radius 1.07 R⊕는 비통과 tie-break(질량-반경). 1.22 M⊕ 채택으로 g~1.07·밀도~5.5 재도출(지구형 유지)."

  - body: Proxima Centauri b
    axis: atmosphere                  # G4 — 기압=오너 결정 0.7 bar, 나머지 방법론 도출
    status: gated
    driver: classification + window-selection
    value: >
      surface_pressure=0.7 bar(오너 결정 2026-06-23). composition=N₂ 지배 + CO₂ ~3%(온실로 직하 빙점 위 유지),
      μ≈28.5 g/mol. **Bond albedo A≈0.33**(G5 표면서 cascade — 밝은 anorthosite 고지 + 직하 구름덱이 데이샤이드 알베도를
      0.30→0.33으로 올림; 오너 "평균 알베도 조금↑" 2026-06-23). breathability=불가(무생물·무산소, atmosphereContainsOxygen=false).
      scale_height H≈7 km(=RT/μg, T~250K·g 10.5·μ 28.5 — 기압엔 무관). escape=M왜성 플레어 stripping 위험이나
      호수세계 전제로 보유 채택(게이트 참조).
    derived_temps: >
      **Teq≈228K(A 0.33, 기압 무관 — G5 albedo cascade)**. 조석고정 1:1 → Layer-3 GCM(Boutle2017 ~1 bar N₂+CO₂ 케이스를
      0.7 bar + A 0.33로 약간 하향): 직하 ~282–288K(여전히 >273K → 액체 호수 유지)·야간 ~150–162K(빙관)·평균 ~243–248K.
      직하 데이샤이드 호수 + 나머지 빙결 = G1 "대륙형 호수 세계"와 정합. (A를 0.43까지 올려야 직하가 빙점 — 0.33은 충분한 마진.)
    phase3_default: "Phase 3 합성 대기(있으면) — 본 결정이 art-direction 기압/조성 확정값."
    gate:
      criterion: [classification, retention, error-bar]
      verdict: documented-divergence
      rationale: >
        대기 문서 3-gate: cosmic shoreline 위지만 M왜성 강플레어·항성풍 stripping(Dong2017·Ribas2016) 위험이라 "보유"는
        자동이 아님. G1 호수세계(액체 물)가 대기 보유를 요구하므로 Meadows2018 "온대/거주가능" 분기를 명시 tie-break로 채택.
        Garraffo2016 자기차폐가 도울 수 있으나 불확실 — 발산으로 명기.
      locking_note: >
        새 locking 문서 교차검증 — 0.7 bar는 대기 열조석이 약해 Leconte2015 비동기 caveat 미발동 → G3의 1:1·obliquity 0 견고
        (오히려 1 bar보다 안전).
      collapse_note: >
        CO₂ ~3% @0.7 bar(분압 ~21 mbar)의 frost point ~135K < 야간 150–165K → CO₂ 미동결, 야간측 대기붕괴 회피.
      paper: >
        기압/μ/scale-height = docs/reference/exoplanet-atmosphere-methodology.md. 온도 3계층 =
        docs/reference/tidally-locked-temperature-methodology.md (Layer-3 앵커 Turbet2016·Boutle2017, 검증 id는 그 문서).

  - body: Proxima Centauri b
    axis: surface                     # G5 — 대륙형 호수 세계 표면; 색=표면색 문서, A=Bond cascade
    status: gated
    driver: classification + visual
    value: >
      대륙 = **2색**(오너 1+2 조합): 회녹색 마픽 저지(올리빈/휘석질 현무암 mare, Fe²⁺ 결정장 → 어두운 회녹, A~0.1) +
      밝은 장석질 고지(anorthosite highlands, A~0.2–0.25). **화성형 적색 아님** — 무생물·무산소(G4)라 철이 환원(Fe²⁺)
      상태 유지, O→Fe³⁺ 전하이동(적색 슬로프) 미발생. 직하 호수/내해 = 어두운 물(A~0.07, G1 캐나다/지중해형 산재).
      야간 빙관 = 밝은 물얼음(A~0.5–0.6, 살짝 청색). 직하 구름덱 = 물구름(Yang2013 안정화 피드백, 데이샤이드 알베도↑).
    bond_albedo_cascade: >
      Bond albedo는 **일사받는 데이샤이드만** 결정(1:1 고정 → 야간측 일사 0 → 밝은 빙관은 Bond에 미기여, 과대평가 회피).
      데이샤이드 면적가중 = 어두운 마픽+호수(낮음) + 밝은 anorthosite 고지·직하 구름(높음) → **A≈0.33**. G4 Teq 228K와
      맞물림 → cascade 닫힘. 오너 "평균 알베도 조금↑"은 밝은 고지 추가로 물리적 정당화(0.30→0.33), 온도는 G4서 동기 하향.
    cfg_colors_intrinsic: >
      고유(중립광/태양 기준) 반사색 — cfg 저장값, 렌더러가 항성광 적용(Proxima-lit 표시색은 appearance/G6).
      마픽 저지 #3c4339(창 #353b32–#444b40) · 장석질 고지 #928c81(창 #88827a–#9d978c) ·
      직하 호수 #1d2c3a(창 #182430–#223240) · 야간 빙관 #dde6ec(창 #d4dde6–#e8eef2) · 직하 구름덱 #eef1f4.
    gate:
      criterion: [classification, visual-checklist]
      verdict: pass-in-window
      rationale: >
        색조/패턴은 interesting-first 축(표면색 문서 §1 posture) — 묶이는 hard tie는 면적가중 Bond albedo뿐(→온도 cascade).
        대륙 어두움·비적색은 환원 산화상태로 grounded(표면색 문서 §2: 산화상태가 색 최대 레버). 2색(mare/highland) +
        호수·빙관·구름의 다요소 = interesting-first 다양성, eyeball 회피(G1 대륙형 호수 유지).
      paper: 표면색·Bond albedo = docs/reference/surface-color-albedo-methodology.md (Fe²⁺ 결정장 §2, Bond=q·p §6). 직하 구름 피드백 = 온도 문서 Layer-3(Yang2013).
      emit_note: >
        Kopernicus 표면색/biome emit는 프로젝트 말미 일괄. 색조 sRGB는 표면색 문서 + atmosphere-reflected-color 엔진으로
        조성→색 합성(emit 단계). 야간 빙관/직하 호수/2색 대륙 = biome 구획 후보.
