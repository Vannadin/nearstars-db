# Proxima Centauri (α Cen C / GJ 551) Phase 4 결정 보드 — 별 + 행성 b/c/d. (body × axis) 행별 상태. DB 불변, staging 기록
# 실관측 시스템 → 대부분 Phase 3 측정/합성값 passthrough, 소수 art/divergence + discoverability만 결정. grounding=docs/phase3/proxima-cen*.md
schema_version: 2
system: proxima_cen
status: staged
updated: 2026-07-12

decisions:
  # ── 별 (Proxima Cen, M5.5Ve 플레어 별) — facet-walk 2026-06-23 ──────────
  - body: Proxima Centauri
    axis: identity
    status: gated
    driver: [classification, observation]
    narrative: >
      body_type=M5.5Ve 적색왜성(플레어 별). 태양 최근접성, α Cen AB에 ~13,000 AU 약결합. designation=Proxima Centauri
      (α Cen C / GJ 551). discoverability=confirmed(맨눈 불가, 망원경 검출 — Innes 1915).
    fields:
      - name: body_type
        value: "M5.5Ve 적색왜성(플레어 별)"
        op: set
      - name: designation
        value: "Proxima Centauri (α Cen C / GJ 551)"
        op: set
      - name: discoverability
        value: "confirmed (맨눈 불가, 망원경 검출 — Innes 1915)"
        op: set
    gate:
      criterion: [classification]
      verdict: pass-in-window
      evidence: >
        α Cen A·B(naked_eye, 밝은 별)와 달리 Proxima는 겉보기 11등이라 맨눈 불가 → category=confirmed(망원경 검출사와
        정합), naked_eye 아님. 오너 결정(a).
    discoverability_cfg: {category: confirmed, ignorelevels: "T F F F", ref: "Innes 1915 (telescopic discovery)", skill: "researchbodies-cfg/references/db-mapping.md"}

  - body: Proxima Centauri
    axis: bulk                        # §3.2 템플릿 앵커 — 측정 passthrough 에코 (spin_axis·J2는 전용 행)
    body_class: star
    status: passthrough
    driver: [passthrough]
    narrative: >
      M 0.1221±0.0022 M☉(SM2025 진화모델) · R 0.141±0.011 R☉(Demory2009 VLTI) · Teff 2904±51K(Passegger2019) ·
      L 0.00157 L☉ · age ~4.85±0.5 Gyr(kinematic, 포획 vs 동시생성 미정) · P_rot 83.5 d(DB recommended, J2 행과
      동일 입력). gravity 1684 m/s² = GM/R² 파생 에코(Kopernicus geeASL 슬롯). spin_axis_orientation·
      geopotential_j2(+reference_radius)는 전용 행이 담당(union rule). 전부 고신뢰 측정 → emit 그대로.
    fields:
      - name: mass
        value: 0.1221
        unit: M_sun
        op: passthrough
        note: "±0.0022 (SM2025 진화모델)"
      - name: radius
        value: 0.141
        unit: R_sun
        op: passthrough
        note: "±0.011 (Demory2009 VLTI)"
      - name: gravity
        value: 1684
        unit: m/s2
        op: passthrough
        phase3_default: "GM/R² 파생 에코"
      - name: flattening
        value: 2.8e-8
        op: set
        note: "= (3J₂+q)/2 파생 에코 (J₂ 3.7e-9, q 4.4e-8) — 시각 oblate 슬롯"
      - name: rotation_period
        value: 83.5
        unit: d
        op: passthrough
        note: "DB recommended — bulk.geopotential_j2 행과 동일 입력"
      - name: intrinsic_luminosity
        value: 0.00157
        unit: L_sun
        op: passthrough
      - name: age
        value: 4.85
        unit: Gyr
        op: passthrough
        note: "±0.5 (kinematic; 포획 vs 동시생성 미정). Teff 2904±51K (Passegger2019)"

  - body: Proxima Centauri
    axis: appearance                  # [star] group 6 — 관측 기반 + 흑점 결정
    status: gated
    driver: [observation]
    narrative: >
      color=M5.5V 물리색 #ffcc75(옅은 따뜻한 주황 — 실측 Pickles SED→CIE; TiO/VO/H₂O는 색지수·광도엔 크나 밝기-정규화 표시색조엔 미미). 옛 #c54c2a(심적색)은 광도/색조 혼동 render 짐작이라 폐기. limb_darkening α~0.4(Claret2018 M-dwarf 보간, tie-break).
      **spots_faculae=보통~다소 많음 ~3–5%**(활동적 M왜성 큰 spot; 83d 자전 변조 검출=spot 존재; A·B보다 多). flare 색
      #ff5e2a(Hα)는 참조용 — **동적 플레어는 cfg 렌더 불가**라 visual passthrough, 효과는 environment.radiation/activity로.
    fields:
      - name: color
        value: "#ffcc75"
        op: set
        phase3_default: "#c54c2a (심적색, 광도/색조 혼동 render 짐작 → 폐기)"
        note: "M5.5V 물리색, 실측 Pickles SED→CIE"
      - name: limb_darkening
        value: 0.4
        op: set
        note: "α~0.4 (Claret2018 M-dwarf 보간, tie-break)"
      - name: spots_faculae
        value: "~3–5% (보통~다소 많음; 83d 자전 변조 검출)"
        op: set
      - name: flares
        value: "#ff5e2a (Hα, 참조용 — 동적 플레어 cfg 렌더 불가, visual passthrough)"
        op: set
    gate:
      criterion: [observation]
      verdict: pass-in-window
      evidence: >
        색 정정 2026-06-24 — 물리색 #ffcc75(실측 Pickles SED→CIE), 옛 #c54c2a 폐기. limb=tie-break passthrough.
        흑점량=오너 위임 결정(텍스처용) ~3–5%. 플레어 visual 드롭(KSP 동적 플레어 미지원, 오너 확인).

